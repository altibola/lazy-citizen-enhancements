name: Update community translations

# ON-DEMAND ONLY (workflow_dispatch) — no schedule for now.
#
# Checks the upstream community-translation repos for new commits and, when
# something changed (or force=true), re-runs the merge pipeline
# (--skip-generate: re-uses the *_enhancements.ini already on the branch,
# only re-downloads the original translations and re-merges) and commits
# the result back to the chosen branch.
#
# Version traceability — every run makes explicit:
#   - Actions step summary: stored (processed) vs current (upstream) commit
#     of each translation source, with links.
#   - VERSIONS.md (committed): game build + original translation versions +
#     exactly which inputs were fed to the enhancement generator.
#   - Commit message: per-language old → new commit SHAs.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to update (default: repository default branch)'
        required: false
        default: ''
      force:
        description: 'Run even if translations are up-to-date'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  update-translations:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # push commits back to the branch

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install lxml zstandard

      # ── 3. Smart Citizen scripts (needed for the merge step) ─────────────────
      - name: Set up Smart Citizen tools
        run: |
          chmod +x setup_smart_citizen.sh
          ./setup_smart_citizen.sh

      # ── 4. Guard: pipeline artifacts must already exist on this branch ────────
      - name: Check for existing pipeline artifacts
        id: guard
        run: |
          if [ -f "enhancements/version.json" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "enhancements/version.json not found on this branch."
            echo "Run the full pipeline first (--download or local P4K), then commit."
          fi

      # ── 5. Compare stored vs upstream translation versions ────────────────────
      # Writes the version table to the step summary (stored = what the
      # enhancement script consumed last; current = upstream HEAD).
      - name: Check translation source versions
        id: check
        if: steps.guard.outputs.ready == 'true'
        run: python .github/scripts/check_translations.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 6. Run pipeline (skip DataForge generation, just re-merge) ───────────
      - name: Re-run pipeline with updated translations
        if: >
          steps.guard.outputs.ready == 'true' &&
          (steps.check.outputs.changed == 'true' || inputs.force == 'true')
        run: |
          python src/run_pipeline.py \
            --skip-extract \
            --skip-generate
        env:
          PYTHONIOENCODING: utf-8

      # ── 6b. Regenerate fully-localized variants (*_all) ────────────────
      # The *_all* variants merge the just-updated base.ini with the
      # glossary-translated enhancement texts, so they must be rebuilt
      # whenever the base translation changes.
      - name: Re-translate enhancement texts
        if: >
          steps.guard.outputs.ready == 'true' &&
          (steps.check.outputs.changed == 'true' || inputs.force == 'true')
        run: python src/translate_enhancements.py
        env:
          PYTHONIOENCODING: utf-8

      # ── 7. Publish the post-run version manifest ──────────────────────────────
      # VERSIONS.md is regenerated by the pipeline; mirror it into the step
      # summary so the run page shows exactly which original versions were
      # consumed and what the generator received.
      - name: Publish version manifest to run summary
        if: >
          steps.guard.outputs.ready == 'true' &&
          (steps.check.outputs.changed == 'true' || inputs.force == 'true')
        run: python src/versions_report.py --github-summary --stdout-only

      # ── 8. Commit and push changes back to the branch ────────────────────────
      # Runs even when translations are up-to-date: the check refreshes the
      # README version-status table ("Last verified" timestamp), which is
      # worth committing so the repo front page proves freshness.
      - name: Commit translation update
        if: steps.guard.outputs.ready == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/ enhancements/ translations/ VERSIONS.md README.md
          if git diff --staged --quiet; then
            echo "Nothing changed after re-run — skipping commit."
            exit 0
          fi

          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          SUMMARY="${{ steps.check.outputs.summary }}"

          # Per-language original-version lines for the commit body,
          # taken from the updated version.json (the pinned source commits).
          VERSIONS_BODY=$(python - <<'EOF'
          import json
          data = json.load(open("enhancements/version.json", encoding="utf-8"))
          print(f"game build: {data.get('version')} ({data.get('environment')})")
          for lang, sha in sorted(data.get("translations", {}).items()):
              print(f"{lang}: original source commit {sha}")
          EOF
          )

          git commit -m "chore(translations): auto-update on ${BRANCH}

          ${SUMMARY}

          Source versions consumed by this run:
          ${VERSIONS_BODY}

          [skip ci]"
          python src/git_push_clean.py
