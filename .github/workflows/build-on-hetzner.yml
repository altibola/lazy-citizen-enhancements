name: Build on Hetzner

# ON-DEMAND ONLY (workflow_dispatch) — no schedule.
#
# Provisions an ephemeral Hetzner Cloud server with Terraform, runs the FULL
# pipeline there (--download: RSI CDN auth + global.ini + Game2.dcb + unforge
# + enhancement generation + merge), pushes the build/{p4cl} branch and opens
# the PR — then ALWAYS destroys the server, even on failure.
#
# Required repository secrets:
#   HCLOUD_TOKEN     Hetzner Cloud API token (project read+write)
#   RSI_USERNAME     RSI account login
#   RSI_PASSWORD     RSI account password
#
# If your RSI account has MFA enabled, pass the current code in the
# rsi_mfa_code input when dispatching (codes are short-lived; the session is
# cached on the ephemeral server only for the duration of the build).

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Game channel to build from'
        required: true
        default: 'LIVE'
        type: choice
        options: ['LIVE', 'PTU', 'EPTU']
      rsi_mfa_code:
        description: 'Current RSI MFA code (only if your account requires it)'
        required: false
        default: ''
      branch:
        description: 'Repo branch to build from'
        required: false
        default: 'main'
      server_type:
        description: 'Hetzner server type'
        required: false
        default: 'cpx31'
        type: choice
        options: ['cpx21', 'cpx31', 'cpx41', 'cpx51']
      location:
        description: 'Hetzner location'
        required: false
        default: 'fsn1'
        type: choice
        options: ['fsn1', 'nbg1', 'hel1', 'ash', 'hil']

concurrency:
  group: hetzner-build   # one server at a time — shared terraform state name
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      pull-requests: write

    env:
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      TF_VAR_server_name: lce-build-${{ github.run_id }}
      TF_VAR_server_type: ${{ inputs.server_type }}
      TF_VAR_location: ${{ inputs.location }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      # ── 2. Terraform ─────────────────────────────────────────────────────────
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false   # raw `terraform output -raw` in scripts

      # ── 3. Provision the build server ────────────────────────────────────────
      - name: Provision Hetzner server
        run: |
          chmod +x infra/hetzner/scripts/*.sh
          infra/hetzner/scripts/provision.sh

      # ── 4. Run the pipeline on the server ────────────────────────────────────
      - name: Run remote build
        run: infra/hetzner/scripts/run_build.sh
        env:
          RSI_USERNAME: ${{ secrets.RSI_USERNAME }}
          RSI_PASSWORD: ${{ secrets.RSI_PASSWORD }}
          RSI_MFA_CODE: ${{ inputs.rsi_mfa_code }}
          SC_CHANNEL: ${{ inputs.channel }}
          GIT_BRANCH: ${{ inputs.branch }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 5. ALWAYS destroy the server ─────────────────────────────────────────
      - name: Destroy Hetzner server
        if: always()
        run: infra/hetzner/scripts/destroy.sh

      # ── 6. Surface the resulting version manifest ────────────────────────────
      # The build branch was pushed by create_pr.py on the server; show its
      # VERSIONS.md (original translation versions + generator inputs) here.
      - name: Publish build version manifest to run summary
        if: success()
        run: |
          git fetch origin '+refs/heads/build/*:refs/remotes/origin/build/*' || true
          LATEST=$(git for-each-ref --sort=-committerdate --count=1 \
                     --format='%(refname:short)' 'refs/remotes/origin/build/*')
          {
            echo "## Build result: \`${LATEST:-unknown}\`"
            echo ""
            if [ -n "${LATEST}" ] && git cat-file -e "${LATEST}:VERSIONS.md" 2>/dev/null; then
              git show "${LATEST}:VERSIONS.md"
            else
              echo "_VERSIONS.md not found on the build branch._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
