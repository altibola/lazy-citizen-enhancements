#cloud-config
# Build-host bootstrap for lazy-citizen-enhancements.
#
# Installs:
#   - python3 + venv + pip      → pipeline (lxml, zstandard installed per-run)
#   - git                       → clone repo + smart-citizen
#   - mono-complete + binfmt    → run unforge.exe / unp4k.exe (.NET Framework)
#     binfmt-support registers the CLR loader so chmod +x *.exe can be exec'd
#     directly, which is how pak_extract.py invokes them.

package_update: true
package_upgrade: false

packages:
  - git
  - python3
  - python3-venv
  - python3-pip
  - mono-complete
  - binfmt-support
  - ca-certificates
  - curl

runcmd:
  # Make sure the CLI binfmt is registered (mono package usually does this).
  - [update-binfmts, --enable, cli]
  # Marker checked by run_build.sh before starting the build.
  - [touch, /var/lib/cloud/instance/lce-ready]

final_message: "LCE build host ready after $UPTIME seconds"
