hurston_RetrieveConsignment_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE RECURSOS EXTERNOS\n\nCONTRATO: Barrido de Instalaciones y Recuperación de Paquetes\nAFILIACIÓN DEL CONTRATISTA: Independiente\nDIRECTOR DE RECURSOS EXTERNOS: G. Livingston\nEVALUACIÓN DEL RIESGO: Alto\nCONTRATACIÓN URGENTE: Sí\n\nHurston ha sabido que los Nine Tails están atacando ~mission(Location|address). Nuestras fuerzas in situ han sufrido numerosas bajas y han dejado de responder a las comunicaciones. Los informes iniciales indicaban que la banda estaba intentando obtener material confidencial recientemente entregado en las instalaciones. Afortunadamente, contamos con medidas de seguridad que deberían darnos tiempo para responder. Necesitamos un operativo que se dirija a las instalaciones inmediatamente, recupere esas cajas y las entregue en un lugar seguro.\n\nUsted y cualquier refuerzo que decida traer están autorizados a tomar las medidas necesarias cuando se enfrenten a los intrusos. Los sospechosos son considerados armados y peligrosos. Hurston no proporcionará apoyo material y/o actualizaciones sobre el estado de las fuerzas de seguridad de la instalación. \n\nLos materiales confidenciales se entregaron discretamente junto con otras cajas en un envío y se guardaron bajo llave en nuestra cámara acorazada automatizada. Los códigos de recuperación necesarios para acceder a ellos se guardan en datapads en poder del personal de seguridad superior. Busque esas tarjetas de datos e introduzca los códigos de envío en el transportador de paquetes para recuperar las cajas. El pago se enviará una vez que todos los materiales confidenciales hayan sido entregados a ~mission(dropoff1|address). \n\n\n** La información transmitida puede contener material confidencial y/o privilegiado. Queda prohibida la revisión, retransmisión, difusión u otro uso de esta información, o la adopción de medidas en función de la misma, por parte de personas o entidades que no sean el destinatario previsto. **\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Guards x4, Hostiles x22
hurston_RetrieveConsignment_title_001=Defender el sitio y recuperar el envío <EM4>[500–4,000 Rep]</EM4>
hurston_UGF_defend_E_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE RECURSOS EXTERNOS\n\nCONTRATO: Protección de instalaciones\nAFILIACIÓN DEL CONTRATISTA: Independiente\nDIRECTOR DE RECURSOS EXTERNOS: T. Spooner\nEVALUACIÓN DEL RIESGO: Alto\nCONTRATACION URGENTE: No\n\nUna pequeña banda local ha estado haciendo amenazas contra ~mission(Location|Address) y Hurston Security está buscando un contratista para reunir un equipo de seguridad para proteger las instalaciones contra cualquier incursión.\n\nEl pago se enviará una vez que se confirme que las instalaciones son seguras. \n\n\n\n** La información transmitida puede contener material confidencial y/o privilegiado. Queda prohibida la revisión, retransmisión, difusión o cualquier otro uso de esta información por personas o entidades distintas de su destinatario. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x1, Hostiles x10, Private Security x4, Sentries x6\n<EM4>Unknown:</EM4> 11
hurston_UGF_defend_E_title_001=Proteger las instalaciones contra amenazas <EM4>[500 Rep]</EM4>
hurston_UGF_defend_VH_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE RECURSOS EXTERNOS\n\nCONTRATO: Protección de instalaciones\nAFILIACIÓN DEL CONTRATISTA: Independiente\nDIRECTOR DE RECURSOS EXTERNOS: T. Spooner\nEVALUACIÓN DEL RIESGO: Muy Alto\nCONTRATACION URGENTE: No\n\nUna creciente facción de forajidos ha estado haciendo amenazas contra ~mission(Location|Address) y Hurston Security requiere un contratista para reunir un equipo de seguridad y vigilar las instalaciones contra cualquier incursión.\n\nEl pago se enviará una vez que se confirme que las instalaciones son seguras. \n\n\n\n** La información transmitida puede contener material confidencial y/o privilegiado. Queda prohibida la revisión, retransmisión, difusión o cualquier otro uso de esta información por personas o entidades distintas de su destinatario. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x3, Hostiles x8, Private Security x4, Sentries x4\n<EM4>Unknown:</EM4> 21
hurston_UGF_defend_VH_title_001=Proteger las instalaciones de hostiles peligrosos <EM4>[500 Rep]</EM4>
hurston_UGF_defend_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE RECURSOS EXTERNOS\n\nCONTRATO: Protección de instalaciones\nAFILIACIÓN DEL CONTRATISTA: Independiente\nDIRECTOR DE RECURSOS EXTERNOS: T. Spooner\nEVALUACIÓN DEL RIESGO: Alto\nCONTRATACION URGENTE: No\n\nCriminales locales han estado haciendo amenazas contra ~mission(Location|Address) y Hurston Security está buscando un contratista para reunir un equipo de seguridad para proteger las instalaciones contra cualquier incursión.\n\nEl pago se enviará una vez que se confirme que las instalaciones son seguras. \n\n\n\n** La información transmitida puede contener material confidencial y/o privilegiado. Queda prohibida la revisión, retransmisión, difusión o cualquier otro uso de esta información por personas o entidades distintas de su destinatario. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x8, Private Security x4, Sentries x8\n<EM4>Unknown:</EM4> 10
hurston_UGF_defend_title_001=Proteger las instalaciones contra hostiles <EM4>[500 Rep]</EM4>
hurston_UGF_destroy_E_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE RECURSOS EXTERNOS\n\nCONTRATO: Eliminación de contrabando\nAFILIACIÓN DEL CONTRATISTA: Independiente\nDIRECTOR DE RECURSOS EXTERNOS: R. Russel\nEVALUACIÓN DEL RIESGO: Media\nCONTRATO URGENTE: No\n\nLos matones locales han estado utilizando ~mission(Location|Address) para fabricar grandes cantidades de contrabando. Hurston Security requiere que un contratista vaya a las instalaciones y destruya todo el contrabando que allí se almacena.\n\nEl pago se enviará una vez eliminado todo el contrabando. \n\n\n\n** La información transmitida puede contener material confidencial y/o privilegiado. Queda prohibida la revisión, retransmisión, difusión u otro uso de esta información, o la adopción de medidas en función de la misma, por parte de personas o entidades que no sean el destinatario previsto. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Civilians x4
hurston_UGF_destroy_E_title_001=Eliminar el alijo de contrabando <EM4>[500 Rep]</EM4>
hurston_UGF_destroy_H_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE RECURSOS EXTERNOS\n\nCONTRATO: Eliminación de contrabando\nAFILIACIÓN DEL CONTRATISTA: Independiente\nDIRECTOR DE RECURSOS EXTERNOS: R. Russel\nEVALUACIÓN DEL RIESGO: Muy alto\nCONTRATACIÓN URGENTE: No\n\nUn pequeño sindicato ha estado utilizando ~mission(Location|Address) para fabricar grandes cantidades de narcóticos altamente peligrosos. Hurston Security busca un contratista que vaya a las instalaciones y elimine todo el contrabando que allí se almacena.\n\nEl pago se enviará una vez eliminado todo el contrabando. \n\n\n\n** La información transmitida puede contener material confidencial y/o privilegiado. Queda prohibida cualquier revisión, retransmisión, difusión u otro uso de esta información, o cualquier acción basada en ella, por parte de personas o entidades que no sean el destinatario previsto. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
hurston_UGF_destroy_H_title_001=Eliminar el alijo de estupefacientes <EM4>[500 Rep]</EM4>
hurston_UGF_destroy_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE RECURSOS EXTERNOS\n\nCONTRATO: Eliminación de contrabando\nAFILIACIÓN DEL CONTRATISTA: Independiente\nDIRECTOR DE RECURSOS EXTERNOS: R. Russel\nEVALUACIÓN DEL RIESGO: Alta\nCONTRATO URGENTE: No\n\nSe han identificado delincuentes locales que utilizan ~mission(Location|Address) para fabricar grandes cantidades de ilegales. Hurston Security requiere que un contratista vaya a las instalaciones y elimine todo el contrabando que allí se almacena.\n\nEl pago se enviará una vez eliminado todo el contrabando. \n\n\n\n** La información transmitida puede contener material confidencial y/o privilegiado. Queda prohibida la revisión, retransmisión, difusión u otro uso de esta información, o la adopción de medidas en función de la misma, por parte de personas o entidades que no sean el destinatario previsto. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
