crusader_platform_EliminateAll_description_001=Tras su último intento de asedio, las fuerzas de Nueve Colas han comenzado a realizar incursiones selectivas en un esfuerzo por seguir interrumpiendo las operaciones de los Cruzados. El ataque actual tiene como objetivo ~mission(MissionCluster|Address) y es vital que pongamos fin a la agresión allí. \n\nCrusader Security está buscando un contratista dispuesto a limpiar a todos los operadores de Nine Tails en el área. Los contratistas deben esperar usar la fuerza y se les recomienda encarecidamente que consideren traer refuerzos. \n\nCONTRATO AUTORIZADO POR:\nOficial de Enlace Bautista\nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x20
crusader_platform_EliminateAll_title_001=Repeler asalto en Orison <EM4>[500 Rep]</EM4>
crusader_platform_EliminateSpecific_desc=Crusader Security ha recibido información de que una redada de Nueve Colas que se está produciendo actualmente en ~mission(MissionCluster|Address) incluye a un destacado ejecutor de pandillas. Poner fin a esta redada y llevar a los responsables ante la justicia es una de las principales prioridades de Crusader Security. Es por eso que estamos buscando un contratista dispuesto a ir a ~mission(MissionCluster|Name) para detener la amenaza y detener al ejecutor que la lidera.\n\nUna vez en el sitio, tendrás que agotar las fuerzas de Nueve Colas hasta que estés capaz de sacar ~mission(TargetName) .\n\nTeniendo en cuenta la brutalidad desplegada por Nueve Colas durante su reciente asedio, recomendamos que los contratistas estén preparados para usar la fuerza y les recomendamos encarecidamente que consideren traer refuerzos.\n\nCONTRATO AUTORIZADO POR:\nOficial de enlace Gibbs\nID# 91G66BW0\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Backup x6, Boss x1, Hostiles x19
crusader_platform_EliminateSpecific_title=Nine Tails Enforcer Bounty (HRT) <EM4>[1,000 Rep]</EM4>
crusader_platform_MultiEliminateAll_description_001=Tras su último intento de asedio, las fuerzas de Nine Tails han comenzado a realizar incursiones selectivas en un esfuerzo por seguir perturbando las operaciones en Crusader. El ataque actual ha tenido como objetivo varios edificios en ~mission(MissionCluster|Address) y es vital que pongamos fin a la agresión allí.\n\nCrusader Security está buscando un contratista dispuesto a limpiar todos los operadores de Nine Tails en la zona. Los contratistas deben prever el uso de la fuerza y se les recomienda encarecidamente que consideren la posibilidad de traer refuerzos. \n\nCONTRATO AUTORIZADO POR:\nOficial de Enlace Bautista\nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x60
crusader_platform_MultiEliminateAll_title_001=Repeler varias incursiones en Orison <EM4>[500–2,000 Rep]</EM4>
crusader_platform_MultiEliminateSpecific_desc=Crusader Security ha recibido información de que una redada de los Nine Tails que se está produciendo actualmente en ~mission(MissionCluster|Address) incluye a varios destacados miembros de bandas. Acabar con esta redada y llevar a los responsables ante la justicia es una prioridad máxima para Crusader Security. Por eso estamos buscando a un contratista dispuesto a ir y detener a los que la dirigen.\n\nEn cada lugar de ataque, tendrás que reducir las fuerzas de Nine Tails hasta que puedas sacar al ejecutor al mando.\n\nConsiderando la brutalidad desplegada por Nine Tails durante su reciente asedio, recomendamos que los contratistas estén preparados para usar la fuerza y les animamos encarecidamente a que consideren la posibilidad de traer refuerzos.\n\nCONTRATO AUTORIZADO POR:\nOficial de Enlace Gibbs\nID# 91G66BW0\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Backup x16, Boss x4, Hostiles x45
crusader_platform_MultiEliminateSpecific_title=Nine Tails Enforcer Bounties (VHRT) <EM4>[1,000–4,000 Rep]</EM4>
crusader_retakelocation_kareah_desc_001=El puesto de seguridad Kareah está siendo atacado por un número desconocido de asaltantes. \n\nCrusader está buscando contratistas que se desplacen rápidamente a la comisaría y eliminen a todos los intrusos en las inmediaciones antes de que nuestras fuerzas de seguridad se vean desbordadas. \n\nNo estamos seguros de si el objetivo de los atacantes es el contrabando de nuestro almacén de pruebas o nuestra base de datos CrimeStat, pero sea lo que sea lo que buscan, hay que acabar con ellos. Recibirás una bonificación de combate por cada objetivo neutralizado. \n\nAl aceptar este contrato, te comprometes a cumplir todos los protocolos de Crusader Security: Si daña a algún guardia u otro contratista autorizado mientras esté en la estación, su contrato se rescindirá y se le marcará como objetivo. \n\nEl tiempo es esencial, pero asegúrese de estar bien equipado para manejar a los hostiles antes de responder. \n\nCONTRATO AUTORIZADO POR: \nOficial de Enlace Bautista \nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
