blacjac_recoverspace_desc_intro=ATTN: Mercenarios / Cazarrecompensas con experiencia en manipulación de carga\n\nNos acaban de informar de que un ladrón llamado ~mission(TargetName) está volando por ahí con su botín más reciente a bordo de su nave.\n\nNormalmente, haríamos que alguien arrestara al bastardo y acabáramos con él, pero ahora mismo lo más importante es que se recupere la mercancía robada. \n\nSi esto te parece lo tuyo, estarás autorizado a localizar a ~mission(TargetName|Last), asegurar el ~mission(Item) robado como puedas y entregarlo a ~mission(Destination|Address). ~mission(Contractor|RecoverSpaceTimed)~mission(Danger)\n\n\nGracias,\nGloria Mesa\n\nSupervisor de Contrato Privado\nBlacJac Security, "Protección Proporcionada"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
