mgClovus_opensalvage_desc_001=La fortuna nos ha sonreído una vez más. Acabo de enterarme de una batalla cerca de ~mission(Location) que acaba de tener lugar lejos de las miradas indiscretas de cualquier red de comunicaciones entrometida, y aún no se han enviado refuerzos de ninguna de las fuerzas implicadas. Esto significa que existe una oportunidad para que un alma emprendedora limpie el cementerio.\n \nMe gustaría extender esta oportunidad a todos mis contactos de confianza. Cualquiera y todos los interesados pueden tener la ubicación... por el precio correcto. Las coordenadas se proporcionarán una vez que acepten el contrato y permanecerán disponibles hasta que decidan rescindirlo.\n\nPor supuesto, la velocidad será esencial, ya que no sólo se enfrentarán a la competencia potencial de otros salvadores, sino también a la inminente posibilidad de que lleguen refuerzos para inspeccionar el campo de batalla. \n\nSi sigues dudando, recuerda que la fortuna favorece a los audaces.\n\n-cd\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Friendlies:</EM4> Salvageable Ships x8
