MTPS_eliminateall_dc_desc_001=ACERCA DEL TRABAJO\nmicroTech Protection Services está buscando un mercenario profesional orientado a los detalles que pueda ayudarnos de manera rápida y segura a eliminar por completo al grupo de forajidos que ha obtenido temporalmente el control de la ~mission(Location) en ~mission(Location|Address) .\n\nRESPONSABILIDADES\n• Proporcionar transporte propio a ~mission(Location|Address) .\n• Retirar a todos los miembros de la fuerza forajida hostil; usando la fuerza según sea necesario. \n\nCUALIFICACIONES MÍNIMAS\n• 2 años de experiencia combinada en mercenarios y seguridad.\n• Acceso a equipo de combate y modo de transporte.\n• Disponible para despliegue inmediato.\n\nCUALIFICACIONES PREFERIDAS\n• Experiencia en hostilidad rápida de -técnicas de escalada.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Juggernauts x2, Soldiers x12, Technicians x2
MTPS_eliminateall_dc_title_001=Eliminar la fuerza hostil <EM4>[500 Rep]</EM4>
MTPS_eliminateboss_dc_desc_001=ACERCA DEL TRABAJO\nmicroTech Protection Services está buscando un cazarrecompensas calificado para detener ~mission(TargetName) que hasta ahora ha podido evadir la captura. Están coordinando una incursión activa en ~mission(Location|Address) y creemos que finalmente pueden ser atraídos a salir de su escondite si sus fuerzas que atacan la ~mission(Location) se enfrentan a una resistencia lo suficientemente fuerte. \n\nRESPONSABILIDADES\n• Proporcionar transporte propio a ~mission(Location|Address) .\n• Neutralizar a los asociados criminales de ~mission(TargetName) cerca de la ~mission(Location) para atraer al objetivo a la intemperie.\n• Neutralizar ~mission(TargetName) ; usando la fuerza si es necesario.\n\nCUALIFICACIONES MÍNIMAS\n• Acceso a equipo de combate y modo de transporte.\n• Disponible para despliegue inmediato.\n\nCUALIFICACIONES PREFERIDAS\n• Capacidad para manejar situaciones de alta presión.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x1, Soldiers x7, Technicians x5
MTPS_eliminateboss_dc_title_001=Captar recompensa: ~mission(TargetName) (HRT) <EM4>[500 Rep]</EM4>
MTPS_eliminateboss_multi_dc_desc_001=ACERCA DEL TRABAJO\nmicroTech Protection Services está buscando un cazarrecompensas calificado para detener ~mission(TargetName) que hasta ahora ha podido evadir la captura. Están coordinando una redada activa que se ha extendido por ~mission(Location|Address) . \n\nNuestra esperanza es que finalmente puedas sacarlos de su escondite si te enfrentas a sus fuerzas en varios puntos de ataque diferentes. Con sus números lo suficientemente debilitados, lo más probable es que ~mission(TargetName|Last) corra el riesgo de quedar expuesto y usted podrá enfrentarlos directamente.\n\nRESPONSABILIDADES\n• Proporcionar transporte propio a ~mission(Location|Address) .\n• Enfréntate a los asociados criminales de ~mission(TargetName) para sacar al objetivo a la luz pública.\n• Neutraliza ~mission(TargetName) ; usando la fuerza si es necesario.\n\nCUALIFICACIONES MÍNIMAS\n• Acceso a equipo de combate y modo de transporte.\n• Disponible para despliegue inmediato.\n\nCUALIFICACIONES PREFERIDAS\n• Capacidad para manejar situaciones de alta presión.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Backup x5, Juggernauts x1, Soldiers x18, Technicians x32
MTPS_eliminateboss_multi_dc_title_001=Recompensa segura: ~mission(TargetName) (VHRT) <EM4>[1,000 Rep]</EM4>
MTPS_eliminatespecific_dc_desc_001=ACERCA DEL TRABAJO\nmicroTech Protection Services está buscando un cazarrecompensas calificado para capturar ~mission(TargetName) de ~mission(Location|Address) . Fueron vistos recientemente cerca de la ~mission(Location) y se cree que todavía están en esa área.\n\nAunque puede haber otros delincuentes activos en el sitio, su principal objetivo debe ser completar la recompensa.\n\nRESPONSABILIDADES\ n• Proporcionar transporte propio a ~mission(Location|Address) .\n• Neutralizar ~mission(TargetName) ; usando la fuerza según sea necesario.\n\nCUALIFICACIONES MÍNIMAS\n• Acceso a equipo de combate y modo de transporte.\n• Disponible para despliegue inmediato.\n\nCUALIFICACIONES PREFERIDAS\n• Capacidad para manejar situaciones de alta presión.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Juggernauts x1, Snipers x5, Soldiers x14
MTPS_eliminatespecific_dc_title_001=Recompensa activa: ~mission(TargetName) (MRT) <EM4>[500 Rep]</EM4>
MTPS_searchbody_danger_dc_desc_001=ACERCA DEL TRABAJO\nmicroTech Protection Services está buscando un contratista calificado para ayudar en la búsqueda de ~mission(TargetName) quien fue visto por última vez cerca de ~mission(Location) en ~mission(Location|Address) pero cuyo paradero actual se desconoce. \n\nNuestra investigación preliminar nos ha llevado a sospechar que detrás de su desaparición puede haber algún crimen. Como tal, se recomienda extremar la precaución ya que puede haber actores hostiles involucrados.\n\nRESPONSABILIDADES\n• Proporcionar transporte propio a ~mission(Location|address) .\n• Confirmar la ubicación de ~mission(TargetName) y si están sigue vivo.\n\nCUALIFICACIONES MÍNIMAS\n• 2 años de experiencia en seguridad.\n• Disponible para implementación inmediata.\n\nCUALIFICACIONES PREFERIDAS\n• Experiencia en la realización de investigaciones de personas desaparecidas.\n• Capacidad para manejar situaciones de alta presión.\ norte\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
MTPS_searchbody_dc_desc_001=ACERCA DEL TRABAJO\nDespués de recibir un informe de que ~mission(TargetName) ha desaparecido, microTech Protection Services está buscando un contratista calificado para comenzar una búsqueda en el sitio de ~mission(Location|Address) para conocer su paradero actual. La persona desaparecida fue vista por última vez ingresando a la ~mission(Location) por lo que se recomienda comenzar la búsqueda allí.\n\nRESPONSABILIDADES\n• Proporcionar transporte propio a ~mission(Location|address) .\n• Confirmar la ubicación de ~mission(TargetName) y si todavía están vivos.\n\nCUALIFICACIONES MÍNIMAS\n• 2 años de experiencia en seguridad.\n• Disponible para implementación inmediata.\n\nCUALIFICACIONES PREFERIDAS\n• Experiencia en la realización de investigaciones de personas desaparecidas.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
NTLockdown_FleetDestroy_Antagonist_MBroker_desc=Ahora que Crusader ha encontrado su flota, parece que los Nine Tails por fin se han dado cuenta de lo útil que puede ser un poco de ayuda extra.\n\nResumiendo, están buscando algún músculo contratado para mantener a Crusader a raya. Tú y todos los voluntarios recibiréis una paga por cada nave de seguridad que derribéis. \n\nY además de eso, si todos vosotros mantenéis a Crusader ocupado el tiempo suficiente para que los Nine Tails terminen lo que demonios sea que estén tramando con este bloqueo cuántico, obtendréis una gran bonificación.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
NTLockdown_FleetDestroy_MBroker_desc=Crusader Security ha confirmado la ubicación de la flota forajida de las Nine Tails responsable y se está movilizando ahora para poner fin al bloqueo cuántico de ~mission(Location).\n\nEstamos buscando de nuevo profesionales de seguridad capacitados para unirse a nuestros esfuerzos de respuesta de emergencia y ayudar a neutralizar esta peligrosa amenaza.\n\nAntes de aceptar, tenga en cuenta que se espera que los Nine Tails ofrezcan una resistencia considerable y que, hasta que se ponga fin al bloqueo, no será posible el Salto Cuántico en el sector.\n\nCONTRATO AUTORIZADO POR:\nDirectora Sasha Rust\nID# 122L964G\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +4,000
NTLockdown_FleetDestroy_MBroker_name=Bloqueo ilegal - Neutralización de la Flota de las Nine Tails <EM4>[4,000 Rep]</EM4>
NTLockdown_FleetFind_Antagonist_MBroker_desc=Les dije a los Nine Tails que bloquear el Salto Cuántico para mantener toda una zona como rehén iba a atraer la atención equivocada, pero ¿me escuchan? No. Ahora Crusader tiene docenas de naves de escaneo ahí fuera metiendo sus narices en cosas que preferiría mantener ocultas. \n\nPor eso estoy intentando contratar a tanta gente como pueda para que me ayude. Quiero pagarte por cada nave escáner Crusader que elimines. \n\nDe hecho, incluso les subiré la tarifa por nave si todos llegan a un cierto número de muertes. Llámalo un incentivo de rendimiento.\n\nY si realmente te sientes como un triunfador, elimina a cualquier tonto lo suficientemente valiente como para tratar de llevar carga a la estación bloqueada. Tengo algunos proveedores que agradecerán la demanda extra.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
NTLockdown_FleetFind_MBroker_desc=Crusader Security se ha enterado de que la organización criminal conocida como las Nine Tails ha establecido un bloqueo ilegal alrededor de ~mission(Location) y ha detenido todo el tráfico cuántico entrante y saliente en el sector.\n\nLa flota fuera de la ley debe ser localizada, y el bloqueo terminado.\n\nSolicitamos urgentemente a cualquier profesional de seguridad entrenado en el sistema que se una a las fuerzas de Crusader Security y proteja a nuestras naves de exploración mientras buscan la ubicación de la flota de Nine Tails causante de este bloqueo.\n\nPor favor, tenga en cuenta que con el Salto Cuántico inhabilitado y numerosos hostiles en la zona, esto debe considerarse una operación de alto riesgo. Se recomienda encarecidamente a todos los pilotos que se unan a este esfuerzo de respuesta de emergencia que lleven el equipo adecuado y el depósito de combustible lleno. \n\nCONTRATO AUTORIZADO POR:\nDirector Sasha Rust\nID# 122L964G\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +4,000
NTLockdown_FleetFind_MBroker_name=Bloqueo ilegal - Buscando responsables de la Flota de las Nine Tails <EM4>[4,000 Rep]</EM4>
NTLockdown_StationSupply_MBroker_desc=El bloqueo cuántico ilegal de ~mission(Location) ha interrumpido las rutas comerciales normales y los artículos de primera necesidad escasean. \n\nCrusader Security busca comerciantes y transportistas para proporcionar los tan necesarios suministros médicos a la estación. \n\nLos precios ofrecidos por la administración de la estación se ajustarán para reflejar la situación con las Nine Tails y, además, Crusader proporcionará una bonificación de peligro al transferir con éxito los suministros médicos debido al aumento del riesgo. \n\nGracias de antemano por su apoyo en estos tiempos difíciles.\n\nCONTRATO AUTORIZADO POR:\nDirectora Sasha Rust\nID# 122L964G\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
NorthRock_Delivery_Local_DerelictOutpost_Desc_01=El asunto es el siguiente: un cliente nuestro (que debería haberse gastado los créditos extra en una escolta Northrock) ha sufrido un ataque a una de sus naves y ahora necesita que nos encarguemos de una operación de recuperación de un importante paquete que le han robado.\n\nPor suerte, hemos tenido suerte y hemos podido localizar a los responsables en ~mission(Pickup1|Address). Necesitamos que te dirijas allí y recuperes el paquete. Podrás identificarlo por su número de serie: #~mission(item1|serialnumber).\n\nEspero que los forajidos opongan resistencia, pero recuerda que no son la prioridad.\n\nUna vez que tengas el paquete, llévalo de vuelta al cliente en ~mission(Dropoff1|Address). \n\nUna última cosa, asegúrate de llevar una nave que tenga espacio suficiente para algo de carga. No quiero que llegues hasta allí en tu Gladius o lo que sea sólo para tener que volver.\n\nSiéntete orgulloso de nosotros,\n\nBraden Corchado\nOficial de Logística - Sucursal de Stanton\nGrupo de Servicio Northrock\n\n* RESUMEN DE LA OPERACIÓN DE RETIRADA*\n* Recupera el paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n* Entrégalo en ~mission(Dropoff1|Address)\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
NorthRock_Delivery_Local_DerelictOutpost_Desc_02=El asunto es el siguiente: un cliente nuestro (que debería haberse gastado los créditos extra en una escolta Northrock) ha sufrido un ataque a una de sus naves y ahora necesita que nos encarguemos de una operación de recuperación de unos paquetes importantes que le han robado.\n\nPor suerte, hemos tenido suerte y hemos podido localizar a los responsables en ~mission(Pickup1|Address). Necesitamos que te dirijas allí y recuperes los paquetes. Podrás identificarlos por sus números de serie: #~mission(item1|serialnumber),\n#~mission(item2|serialnumber) y\n#~mission(item3|serialnumber).\n\nEspero que los forajidos opongan resistencia, pero recuerda que no son la prioridad.\n\nUna vez tengas los paquetes, entrégalos en sus respectivos destinos: ~mission(Dropoff1|Address), ~mission(Dropoff2|Address) y ~mission(Dropoff3|Address). \n\nUna última cosa, asegúrate de llevar una nave con espacio suficiente para la carga. No quiero que llegues hasta allí en tu Gladius o lo que sea sólo para tener que volver.\n\nHaz que nos sintamos orgullosos,\n\nBraden Corchado\nOficial de Logística - Sucursal de Stanton\nGrupo de Servicio Northrock\n\n*RESUMEN DE LA OPERACIÓN DE RETIRADA*\n* Recuperar paquetes #~mission(item1|serialnumber), #~mission(item2|serialnumber) y #~mission(item3|serialnumber) de ~mission(Pickup1|Address)\n* Entregar a ~mission(Dropoff1|Address), ~mission(Dropoff2|Address) y ~mission(Dropoff3|Address)\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
NorthRock_Delivery_Local_DerelictOutpost_Desc_03=El asunto es el siguiente: un cliente nuestro (que debería haberse gastado los créditos extra en una escolta Northrock) ha sufrido un ataque a una de sus naves y ahora necesita que nos encarguemos de una operación de recuperación de unos paquetes importantes que le han robado.\n\nPor suerte, hemos tenido suerte y hemos podido localizar a los responsables en distintos puestos avanzados abandonados. Necesitamos que te dirijas allí y recuperes los paquetes. Podrás identificarlos por sus números de serie: #~mission(item1|serialnumber), #~mission(item2|serialnumber) y #~mission(item3|serialnumber).\n\nEspero que los forajidos opongan resistencia, pero recuerda que no son la prioridad.\n\nUna vez que tengas los paquetes, llévalos de vuelta al cliente en ~mission(Dropoff1|Address). \n\nUna última cosa, asegúrate de llevar una nave que tenga suficiente espacio para la carga. No quiero que llegues hasta allí en tu Gladius o lo que sea sólo para tener que volver.\n\nHaz que nos sintamos orgullosos,\n\nBraden Corchado\nOficial de Logística - Sucursal de Stanton\nGrupo de Servicio Northrock\n\n* RESUMEN DE LA OPERACIÓN DE RETIRADA*\n* Recupera los paquetes #~mission(item1|serialnumber), #~mission(item2|serialnumber) y #~mission(item3|serialnumber) de ~mission(Pickup1|Address)\n* Entrégalos en ~mission(Dropoff1|Address)\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
