mtps_bounty_fps_desc_first_001=ACERCA DEL TRABAJO\nmicroTech Protection Services necesita nuevos cazarrecompensas cualificados para ampliar nuestra lista actual. Para evaluar tus habilidades, nos gustaría que nos ayudaras en la captura de ~mission(TargetName) de ~mission(Location|Address).\n\nAunque habrá otros criminales en el lugar, tu principal objetivo debe ser completar la recompensa.\n\nRESPONSABILIDADES\n- Proporcionar transporte propio a ~mission(Location|Address).\n- Neutralizar ~mission(TargetName); utilizando la fuerza si es necesario.\n\nCUALIFICACIONES MÍNIMAS\n- Pertenencia al Gremio de Cazarrecompensas y certificación adecuada.\n- Acceso a equipo de combate y medio de transporte.\n- Disponibilidad para el despliegue inmediato.\n\nCUALIFICACIONES PREFERENTES\n- Capacidad para manejar situaciones de alta presión.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x4, Reinforcements x9, Targets x1
mtps_bounty_fps_desc_rehire_001=ACERCA DEL TRABAJO\nAunque su rendimiento en el pasado no ha estado a la altura de nuestros estándares, microTech Protection Services ha decidido ofrecerle una oportunidad para redimirse. \n\nPara reevaluar tus habilidades, nos gustaría que detuvieses a ~mission(TargetName) de ~mission(Location|Address).\n\nAunque habrá otros criminales en el lugar, tu principal objetivo debe ser completar la recompensa.\n\nRESPONSABILIDADES\n- Proporcionar transporte propio a ~mission(Location|Address).\n- Neutralizar ~mission(TargetName); utilizando la fuerza si es necesario.\n\nCUALIFICACIONES MÍNIMAS\n- Pertenencia al Gremio de Cazarrecompensas y certificación adecuada.\n- Acceso a equipo de combate y medio de transporte.\n- Disponibilidad para el despliegue inmediato.\n\nCUALIFICACIONES PREFERENTES\n- Capacidad para manejar situaciones de alta presión.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x4, Reinforcements x9, Targets x1
