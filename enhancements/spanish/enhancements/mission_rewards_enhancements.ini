Tutorial01_MissionDesc=Enhorabuena por dar tus primeros pasos en el universo!\n\nA lo largo de este tutorial, aprenderás a moverte tanto a pie como en el espacio. \n\nEn primer lugar, te ayudaremos a familiarizarte con algunos controles básicos de movimiento y con el uso de tu mobiGlas mientras aún estás dentro de tu "Hab" (o habitación). Sigue los objetivos y consejos de tu HUD (pantalla de visualización) para avanzar en esta misión.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Starter, Unique
Tutorial02_MissionDesc=Bien hecho!\n\nCon la primera parte ya realizada, ahora deberías tener cierta familiaridad básica con los controles de movimiento, la gestión de tu hambre y sed, y algunas de las funciones básicas de tu mobiGlas - a saber, el Gestor de Contratos y tu Diario.\n\nEsta siguiente sección te ayudará a familiarizarte con el área de ~mission(Location|Name) y te llevará a visitar ~mission(StoreName), una tienda de armas aquí en ~mission(Location|Name).\n\nPuedes comprar allí, y en otras tiendas como esa, usando UEC (United Earth Credits). Durante la fase Alfa del desarrollo de Star Citizen, utilizaremos una moneda llamada aUEC (Alpha United Earth Credits). Se trata de una moneda temporal diseñada específicamente para probar la economía y el equilibrio del juego.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Starter, Unique
Tutorial03_MissionDesc=Ya casi has terminado el tutorial. Lo único que te queda es emprender el vuelo!\n\nUna vez finalizados tus asuntos en ~mission(Location|Name), es hora de abandonar la ciudad y, finalmente, el planeta. Dirígete  hasta las lanzaderas de tránsito ~mission(TransitNameShort). Estos transbordadores pueden llevarte por todo ~mission(Location|Name), pero tu destino es el puerto espacial, donde se te ha proporcionado temporalmente una Anvil C8 Piscis.\n\nEsta nave exploradora es una gran nave de iniciación, perfecta para los nuevos pilotos que buscan hacerse con sus alas.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Starter, Unique
UDM_LocalDelivery_desc_01=Saludos, socio naviero cualificado!\n\n¿Buscas una excusa para surcar los cielos con tu nave de carga? Gane créditos y explore el área local con el siguiente itinerario cuidadosamente seleccionado -\n\nPAQUETE PARA RECOGIDA\n - Paquete #~mission(item1|serialnumber) desde ~mission(Pickup1|Address)\n\nLUGAR DE ENTREGA\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n\nSi ser su propio supervisor y que le paguen por pilotar su propia nave suena como el trabajo perfecto, este contrato es justo lo que estaba buscando. \n\nEstamos deseando trabajar con usted,\n\nUnified Distribution Management\n -Delivering the Total Package-\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_LocalDelivery_desc_02=Saludos a los socios de transporte cualificados!\n\n¿Listo para contribuir a nuestra creciente y expansiva red de reparto?  ¿Tiene a su disposición una nave capaz de transportar varios paquetes y volar entre cuerpos planetarios locales y satélites? Tenemos justo la oportunidad para usted con este itinerario cuidadosamente seleccionado -\n\nPAQUETES PARA RECOGER (CUALQUIER PEDIDO)\n - Paquete #~mission(item1|serialnumber) desde ~mission(Pickup1|Address)\n - Paquete #~mission(item2|serialnumber) desde ~mission(Pickup2|Address)\n\nLUGARES DE ENTREGA (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n - Paquete #~mission(item2|serialnumber) a ~mission(Dropoff2|Address)\n\nSi esto le parece interesante, por favor, ¡acepte esta oferta de inmediato! \n\nEsperamos poder trabajar con usted,\n\nUnified Distribution Management\n -Delivering the Total Package-\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_LocalDelivery_desc_03=Saludos, socio naviero cualificado!\n\n¿Le interesa ganar créditos desde la comodidad de su propio buque de carga?  Entonces el siguiente itinerario cuidadosamente seleccionado puede ser justo la oportunidad que ha estado buscando -\n\nPAQUETES PARA RECOGIDA (CUALQUIER PEDIDO)\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n - Paquete #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n - Paquete #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n\nLUGARES DE ENTREGA (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n - Paquete #~mission(item2|serialnumber) a ~mission(Dropoff2|Address)\n - Paquete #~mission(item3|serialnumber) a ~mission(Dropoff3|Address)\n\nAcepte este contrato y estará en camino.\n\nEsperamos trabajar con usted,\n\nUnified Distribution Management\n -Delivering the Total Package-\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_LocalDelivery_desc_04=Saludos ¡Compañero de envíos cualificado!\n\n¿Estás buscando oportunidades interesantes en el sector de los envíos? Si tiene una actitud positiva y una gran capacidad de carga, tenemos la oportunidad perfecta para usted.\n\nPAQUETES PARA RECOGER (CUALQUIER PEDIDO)\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n - Paquete #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n    - Paquete #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n - Paquete #~mission(item4|serialnumber) de ~mission(Pickup4|Address)\n\nLUGARES DE ENTREGA (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n - Paquete #~mission(item2|serialnumber) a ~mission(Dropoff2|Address)\n - Paquete #~mission(item3|serialnumber) to ~mission(Dropoff3|Address)\n - Paquete #~mission(item4|serialnumber) to ~mission(Dropoff4|Address)\n\nAsí que recoge ese contrato y manos a la obra.\n\nEstamos deseando trabajar con usted,\n\nUnified Distribution Management\n -Delivering the Total Package-\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_LocalDelivery_desc_05=Saludos, socio naviero cualificado!\n\n¿Estás buscando una nueva y emocionante carrera desde la comodidad de tu propio buque de carga?  Entonces el siguiente itinerario puede ser justo la oportunidad que ha estado buscando -\n\nPAQUETES PARA RECOGER (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n - Paquete #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n - Paquete #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n - Paquete #~mission(item4|serialnumber) de ~mission(Pickup4|Address)\n - Paquete #~mission(item5|serialnumber) de ~mission(Pickup5|Address)\n\nLUGARES DE ENTREGA (CUALQUIER ORDEN)\n    - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n - Paquete #~mission(item2|serialnumber) a ~mission(Dropoff2|Address)\n - Paquete #~mission(item3|serialnumber) a ~mission(Dropoff3|Address)\n    - Paquete #~mission(item4|serialnumber) a ~mission(Dropoff4|Address)\n - Paquete #~mission(item5|serialnumber) a ~mission(Dropoff5|Address)\n\nTodo lo que necesitas hacer es aceptar el contrato y estarás en camino.\n\nEstaremos encantados de trabajar con usted,\n\nUnified Distribution Management\n -Delivering the Total Package-\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_LocalDelivery_desc_intro=Saludos a los posibles socios de transporte cualificados!\n\n¿Listo para contribuir a nuestra red de reparto en crecimiento y expansión?  ¿Tiene a su disposición una nave capaz de transportar varios paquetes y volar entre cuerpos planetarios locales y satélites? ¡Unified Distribution Management está buscando un piloto como usted! \n\nNos encantaría evaluar tu potencial de contratación con este itinerario cuidadosamente seleccionado -\n\nPAQUETE PARA RECOGIDA\n - Paquete #~mission(item1|serialnumber) desde ~mission(Pickup1|Address)\n\nLUGAR DE ENTREGA\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n\nSi esto suena como algo que te interesa, ¡acepta esta oferta de inmediato! \n\nEsperamos poder trabajar con usted,\n\nUnified Distribution Management\n -Delivering the Total Package-\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +250
UDM_LocalDelivery_desc_rehire=Saludos Antiguo Socio Naviero Cualificado!\n\n¿Listo para otra oportunidad de utilizar su buque de carga para ganar créditos? Unified Distribution Management ha elegido el siguiente itinerario cuidadosamente seleccionado como la forma perfecta de volver a evaluar sus habilidades -\n\nPAQUETES PARA RECOGER (CUALQUIER PEDIDO)\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n - Paquete #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n - Paquete #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n\nLUGARES DE ENTREGA (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n - Paquete #~mission(item2|serialnumber) a ~mission(Dropoff2|Address)\n - Paquete #~mission(item3|serialnumber) a ~mission(Dropoff3|Address)\n \nEsperamos volver a trabajar con usted,\n\nGestión de Distribución Unificada\n -Delivering the Total Package-\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
