northrock_bounty_title_first=Contrato Pro Tem Bounty <EM4>[500 Rep]</EM4>
northrock_groupbounty_desc_intro=Hola,\n\nEspero que todo vaya bien. Puede que ya me haya puesto en contacto, pero quería asegurarme de presentarme. Soy oficial de logística del Grupo de Servicios Northrock, la principal empresa de seguridad independiente que opera en el sistema Stanton en la actualidad, proporcionando una variedad de servicios a los principales organismos gubernamentales, así como a diversas empresas privadas. La razón por la que me pongo en contacto con usted es porque creemos que alguien con sus habilidades podría ser de gran ayuda para nuestros clientes. \n\nNo sólo eso, sino que creo que encajaríamos bien con usted. Tradicionalmente, nuestros contratistas cobran más que muchos de nuestros competidores en el sistema, y muchos de ellos me cuentan lo mucho que disfrutan cuando se les encarga el trabajo desafiante e interesante que ofrecemos. \n\nAhora bien, Northrock se atiene a normas muy estrictas, así que antes de que podamos hacer nada oficial, tendrás que conseguir el estatus de contratista aprobado completando un contrato pro tem. \n\nEsperaba que pudieras capturar a varios miembros buscados de una banda de forajidos: ~mission(Target1), ~mission(Target2), y ~mission(Target3).\n\nHazlo y veremos cómo conseguirte más trabajo.\n\nEspero tener noticias tuyas pronto, \n\nBraden Corchado\nOficial de Logística - Sucursal de Stanton\nGrupo de Servicio Northrock\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x15, Targets x6
northrock_groupbounty_desc_rehire=Hola,\n\nHe estado pensando en todo lo que ha pasado y he decidido hablar con la dirección. Han accedido a darte otra oportunidad, pero sólo si completas con éxito un contrato para nosotros.\n\nPodemos estudiar la posibilidad de reincorporarte a tu puesto de trabajo si consigues traer a este trío de criminales:\n~mission(Target1)\n~mission(Target2)\n~mission(Target3)\n\nEvadieron al último asociado que fue tras ellos, así que traerlos a todos te haría ganar algunos puntos.\n\nEspero que te hayas espabilado desde tu último trabajo.\n\nBraden Corchado\nOficial de Logística - Sucursal de Stanton\nGrupo de Servicios Northrock\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x15, Targets x3
