Covalex_courier_todc_small_desc_001=¡Hola!\n\nRecibí una solicitud para transferir algunos paquetes a ~mission(Dropoff1) en ~mission(Dropoff1|Address) . Bastante sencillo a medida que avanzan estas cosas.\n\nPAQUETES PARA RECOGER (CUALQUIER PEDIDO) \n · Paquete # ~mission(item1|serialnumber) de la ~mission(Pickup1|Address) \n · Paquete # ~mission(item2|serialnumber) de ~mission(Pickup2|Address) \n · Paquete # ~mission(item3|serialnumber) de ~mission(Pickup3|Address) \n · Paquete # ~mission(item4|serialnumber) de ~mission(Pickup4|Address) \n · Paquete # ~mission(item5|serialnumber) de la ~mission(Pickup5|Address) \n\nUBICACIÓN DE ENTREGA\n · Todos los paquetes entregados a la ~mission(Dropoff1) en ~mission(Dropoff1|Address) \n\nAprecio que te hayas tomado el tiempo para abordar esto por mí, \n\nChase Hewitt\nJr. Coordinador de Logística\nCovalex Shipping \n'Todo lo que necesite, donde lo necesite.'\n\n\n\n\n\n\n\nCovalex Shipping es una sociedad de responsabilidad limitada. Al aceptar este contrato, usted acepta todos los términos y condiciones descritos en nuestra 'Guía de información complementaria para trabajadores independientes v.2948.01.29' ampliada. Covalex Shipping no es responsable de ningún daño que ocurra mientras opera como contratista independiente.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
