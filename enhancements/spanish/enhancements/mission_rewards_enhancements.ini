mg_klim_localdelivery_drugprod_desc_intro=Normalmente, me gusta cocinar todo desde cero. Orgullo del producto y todo eso. Pero de vez en cuando, ya sea por demasiada demanda o demasiado calor o lo que sea, necesito confiar en otros laboratorios para un pedido. \n\nPero aquí tengo las manos atadas, así que me vendría bien alguien que me ayudara a supervisar toda la cadena de producción. No podría pensar en nadie mejor y más disponible que tú.\n\n~mission(Itinerary)\n\nSólo no te distraigas en el medio y te alejes. Ocurre más a menudo de lo que crees. Consigue terminar la lista completa, y me encargaré de que te lleves una buena parte de los beneficios.\n\n-Wallace\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +1,000
