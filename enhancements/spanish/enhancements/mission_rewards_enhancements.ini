headhunters_eliminatespecific_desc_001=Alguna información interesante acaba de caer en mi regazo. Supongo que el notorio líder de XenoThreat ~mission(TargetName) está escondido en ~mission(Location|Address) trabajando en una gran operación para ellos. Oportunidad perfecta para matar a ese pedazo de mierda de una vez por todas.\n\nLa cosa es que los Xenos tienen sus ojos puestos en todas las operaciones de Headhunter en este momento. No hay manera de que podamos movilizar y desplegar una tripulación sin que ~mission(TargetName|Last) reciba un aviso. Así que te ofrezco la oportunidad de hacer de Pyro un lugar mejor y ganar algunos créditos al mismo tiempo.\n\nSi estás interesado, te sugiero que te prepares y busques refuerzos antes de salir. Sólo te pagarán si eliminas ~mission(TargetName|Last) , pero no dudes en matar a cualquier otro pequeño XenoThugs que pueda estar escondido allí con ellos. \n\nSe guarda.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x1
