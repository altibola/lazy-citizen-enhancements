Criminal_RetrieveData_Reclaimer_desc=He estado buscando un paquete de datos en particular y, justo cuando tengo un respiro, la nave es atacada por una Reclaimer de Nine Tails reconvertida llamada Black Kite. Intenté entrar en los servidores de la Black Kite para ver si habían copiado los datos, pero no pude encontrar una forma de pasar remotamente sus protocolos de encriptación sin la llave física.\n\nAhí es donde entras tú. Necesito a alguien que entre en su nave, consiga su clave de desencriptación y desencripte el servidor para poder descargar lo que necesito a distancia.\n\nEres lo suficientemente listo como para saber con quién estamos tratando, así que planea en consecuencia. Ya que esto va a irritar a algunos poderosos, no dejemos nada al azar. Destruye la Black Kite cuando termines para cubrirnos el trasero.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Unknown:</EM4> 8
DataDownload_Mobi_Description=WIP He oído que eres la persona adecuada para este trabajo, así que iré al grano. Hemos localizado una estación de falsificación de UEC en un antiguo naufragio. Si llegas a la estación de falsificación rápidamente, podrás descargar el UEC por ti mismo. Tienen algunos guardias defendiendo el lugar, pero estoy seguro de que podrás manejarlo. Ah, y un último aviso. No soy la única persona con esta información, así que espera una pelea.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
