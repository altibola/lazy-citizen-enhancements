cfp_searchbody_danger_cave_desc_001=Hola,\n\nHemos estado intentando ponernos en contacto con un local conocido como ~mission(TargetName) , pero no hemos tenido noticias suyas en unos días. Por lo que he podido descubrir, estaban explorando cerca de ~mission(Location|Address) , que es un conocido punto de acceso ilegal. \n\nEspero que puedas ir allí por nosotros y ver si puedes localizarlos, o peor aún, sus restos. ~mission(Location|CaveSize) \n\nSi puedes encontrarlos, se ofrece una recompensa. \n\nGracias,\n\nLima Endicott\nDespachador principal\nCiudadanos por Pyro\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_searchbody_danger_cave_title_001=Desaparecido: ~mission(TargetName) <EM4>[50 Rep]</EM4>
cfp_searchbody_danger_outpost_desc_001=Hola,\n\nDesafortunadamente, uno de nuestros socios comunitarios, ~mission(TargetName) , ha estado desaparecido durante unos días. Su familia se puso en contacto con Citizens for Pyro en busca de ayuda y les dije que haríamos lo que pudiéramos. Dicho esto, con tanto tiempo transcurrido, no tengo demasiadas esperanzas. \n\nCualquiera que sea su estado actual, esperaba que pudieras ser nuestro ojo en el terreno en este caso. Existe una gran posibilidad de que se dirigieran a ~mission(Location|Address) , un área que se sabe que es muy peligrosa.\n\nSi puedes localizarlos y confirmar su estado, de una forma u otra, me ocuparé de Estamos debidamente compensados.\n\nGracias,\n\nLima Endicott\nDespachador principal\nCiudadanos por Pyro\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_searchbody_danger_outpost_title_001=Desaparecido: ~mission(TargetName) <EM4>[50 Rep]</EM4>
cfp_searchbody_danger_station_desc_001=Oye,\n\nEstoy bastante preocupado por uno de nuestros contratistas locales, ~mission(TargetName) . Terminaron un intercambio en ~mission(Location|Address) y no se les ha vuelto a ver desde entonces. Estamos escuchando informes de que se han estado infiltrando forajidos allí, y si eso es cierto, sospecho que podría haber sucedido lo peor.\n\nDe cualquier manera, ~mission(TargetName|First) ha hecho un buen trabajo para nosotros en el pasado y Odiaría que terminaran siendo uno más de los desaparecidos de Pyro. Si estás dispuesto a encontrarlos por mí, me encargaré de que recibas una recompensa. \n\nSolo ten cuidado. Odio que tú también desaparezcas.\n\nGracias,\n\nLima Endicott\nDespachador principal\nCiudadanos por Pyro\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
cfp_searchbody_nodanger_cave_desc_001=Oye,\n\n ~mission(TargetName) es un local que solo ha realizado algunos trabajos para Citizen for Pyro, pero eran prometedores. Eso fue hasta que desaparecieron mientras exploraban ~mission(Location|Address) la semana pasada. Desafortunadamente, no me enteré hasta hoy. Las posibilidades de supervivencia en este punto son bastante escasas, pero sigo pensando que vale la pena confirmar qué les pasó.\n \nMe vendría bien tu ayuda en esto si estás interesado. Y además de ser una buena acción, el pago debería hacer que valga la pena el esfuerzo. ~mission(Location|CaveSize) \n\nGracias,\n\nLima Endicott\nDespachador principal\nCiudadanos de Pyro\n\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_searchbody_nodanger_cave_title_001=Desaparecido, presuntamente Muerto: ~mission(TargetName) <EM4>[50 Rep]</EM4>
cfp_searchbody_nodanger_outpost_desc_001=Oye,\n\nSe suponía que uno de nuestra gente, ~mission(TargetName) , estaba haciendo un trabajo de exploración preliminar en ~mission(Location|Address) , pero nunca informaron. Espero que simplemente se hayan encontrado. algo de mala suerte, pero muy a menudo aquí hasta el más mínimo paso en falso puede resultar fatal.\n\nTe agradecería que te dirigieras hacia allí y vieras si puedes localizarlos. Sería fantástico si los encontraras con vida, pero si no, creo que lo mínimo que podemos hacer por su familia es cerrar el camino.\n\nGracias,\n\nLima Endicott\nDespachador principal\nCiudadanos por Pyro\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_searchbody_nodanger_outpost_title_001=Desaparecido, presuntamente Muerto: ~mission(TargetName) <EM4>[50 Rep]</EM4>
cfp_searchbody_nodanger_station_desc_001=Oye,\n\nDos lugareños con los que trabajamos estaban rescatando objetos en ~mission(Location|Address) cuando tuvieron algunos problemas con equipos defectuosos. Uno logró escapar, pero su compañero, ~mission(TargetName) desafortunadamente se quedó atrás.\n\nCon el último estado en el que se informó que se encontraban, supongo que no lograron sobrevivir, pero me gustaría estar seguro. Si estás dispuesto, me vendría bien tu ayuda para encontrar sus restos.\n\nSi puedes localizarlos, me encargaré de que recibas una compensación adecuada por el esfuerzo.\n\nGracias,\n\nLima Endicott \nDespachador principal\nCiudadanos por Pyro\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
claimsweep_desc=~mission(Contractor|ClaimSweepDescription)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Turrets:</EM4> 3 (hostile)
claimsweep_title=~mission(Contractor|ClaimSweepTitle) <EM4>[50 Rep]</EM4>
combatassist_desc=ATENCIÓN: Un repetidor ECN en su sector ha recibido una señal de emergencia emitida por una nave en peligro. Se ruega a todas las naves disponibles en la zona capaces de prestar ayuda que lo hagan inmediatamente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
commarray_hack_desc=~mission(Description)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
commarray_repair_desc=~mission(Description)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
commarray_repair_title=~mission(Title) <EM4>[1,000 Rep]</EM4>
covalex_UGF_collect_desc_001=Hola,\n\nTengo una entrega que necesito que se lleve a cabo. El pedido está esperando en ~mission(Location|Address) para ser llevado a ~mission(Destination|Address). \n\nEstoy seguro de que estarás bien, pero para la divulgación completa, estoy viendo un montón de advertencias de seguridad aparecen para esta área. Parece que ha habido un puñado de ataques en esa zona en los últimos días. No digo que vayas a encontrarte con nada, pero probablemente sería mejor que llevaras un poco de protección.\n\nBuena suerte,\n\nChase Hewitt\nJr. Coordinador de Logística\nCovalex Shipping \n'Cualquier cosa que necesites, donde la necesites.'\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Unknown:</EM4> 4
covalex_UGF_collect_title_001=Entrega piloto de Covalex <EM4>[500 Rep]</EM4>
covalex_delivery_desc_0006=Hola,\n\n~mission(Contractor|Reaction)\n\nHe encontrado el contrato de envío perfecto para que te encargues de él. Hay un envío esperando en ~mission(Location|Address) para ser llevado a ~mission(Destination|Address). Suena bien, ¿verdad? ~mission(Contractor|Timed)~mission(Contractor|Danger)\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordinador de Logística\nCovalex Shipping \n'Lo que necesites, donde lo necesites.'\n\n\n\n\n\n\n\nCovalex Shipping es una sociedad de responsabilidad limitada. Al aceptar este contrato, usted está de acuerdo con todos los términos y condiciones descritos en nuestra 'Guía de Información Suplementaria para Trabajadores Independientes v.2948.01.29'. Covalex Shipping no se responsabiliza de los daños que se produzcan mientras trabaje como contratista independiente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexrand_desc=~mission(Description)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0001=Hola,\n\nEntenderé perfectamente si no quieres ayudar con esto, pero si puedes sería increíble.\n\nVerás, mi novio falleció durante la tragedia de Covalex Gundo. Dijeron que me devolverían todas las cosas de Scott una vez terminada la investigación, pero por lo que sé, ya hace tiempo que se hizo y todavía no me han dado ninguna indicación de cuándo podré recuperar sus propiedades. Ya ha sido bastante duro lidiar con todo esto, y saber que un paquete va a aparecer en uno o dos meses y abrirá todas estas heridas, es demasiado. Preferiría lidiar con ello ahora y acabar de una vez. Si pudieras encontrar la manera de conseguir sus efectos personales (ID de empleado nº 104) y dejarlos en ~mission(Destination), te estaría muy agradecida.\n\nGracias por tu ayuda,\nAnya\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0002=Mi hermano fue uno de los que murieron cuando explotó la estación de Covalex cerca de Crusader. Y lo que es peor, estaba cogiendo prestado algo mío cuando ocurrió. Ahora un imbécil de la burocracia intenta decirme que tengo que esperar para recuperar mis cosas. Sí, claro. ¿Primero matan a mi hermano y ahora quieren que tenga paciencia? El nervio de estos jillos corporativos. Olvida eso. En vez de eso, pensé en contratar a alguien para que fuera a Gundo a por mis cosas y las llevara a ~mission(Destination) por mí. Quiero decir, ¿qué demonios van a hacer al respecto? De todos modos, es lo que mi hermano hubiera querido. Va a ser la caja marcada 156.\n\n- Ed\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0003=Hola,\n\nEs un poco incómodo para mí hablar de esto, pero resulta que una de las personas que falleció en el desastre de la estación de Covalex, Kyomi Santos, me legó algo en su testamento. Me sorprendió oírlo, pero al parecer ahora soy la orgullosa propietaria de todo lo guardado en la caja nº 173. La gente de Covalex dice que podré conseguirlo cuando la estación vuelva a abrir, pero... esta es la parte incómoda... Realmente lo necesito ahora. Normalmente esperaría, pero estoy intentando montar mi propio negocio (hago pasteles con la forma de los mundos natales de la gente) y los créditos que consiga vendiéndolo me serán de gran ayuda. Ahora tengo un poco guardado que puedo usar para pagar a alguien que lo entregue desde Gundo a ~mission(Destination) por mí. Sé que todo esto es un poco irregular, pero si hubiera otra forma no estaría preguntando.\n\nGracias por la ayuda,\nThrace\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0004=Lamentablemente, mi hijo Nico fue una de las víctimas del trágico accidente de la estación de Gundo de Covelex y todavía no me han devuelto todos sus efectos personales. Entiendo que tienen que hacer las cosas de acuerdo con la normativa, pero me parece inconcebible que no hagan algunas concesiones a los familiares en duelo. Con ese fin, estoy buscando a alguien que pueda ir a la comisaría por mí. Para que quede claro, Gundo se considera actualmente fuera de los límites, lo que significa que esto no estaría por encima del tablero, pero creo que mi situación merece una consideración especial. Mi hermana dice que la tarifa que estoy ofreciendo es la cantidad correcta por recuperar la caja con las pertenencias de Nico (#964) y llevarlas a ~mission(Destination), así que espero poder encontrar a una persona competente para resolver este asunto rápidamente.\n\nAtentamente,\nGloria Theolone\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0005=Me dijeron que podía encontrar a alguien aquí que fuera a Gundo por mí y cogiera una caja que pertenecía a mi mujer. Si no te suena el nombre, es la estación donde tuvieron el gran accidente. Mi mujer trabajaba para Covalex y sé que eso no va a hacer que su pérdida sea más fácil, pero lo único que quiero es recuperar las cosas de Claudia. Pienso en su colección de fotos o en el collar que le regalé, ahí, en esa fría estación muerta, en una caja con el número 249, y no me parece bien. Ella se merece algo mejor. ¿Qué te parece? ¿Estás dispuesto a ir a Gundo y llevar su caja de vuelta a ~mission(Destination)?\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0006=Hola,\n\nEstoy buscando a alguien para ir a la estación de Covalex Gundo cerca de Crusader y agarrar algunos artículos. Sé que puede sonar a robo, pero son las cosas de mi padre. Verás, él estaba en la estación Gundo cuando tuvo su accidente. Mi madre dice que tenemos que esperar hasta que Covalex lo diga, pero no creo que sea justo porque le echo mucho de menos. Me gustaría tener algo para recordarle y no quiero esperar más porque podría empezar a olvidar cosas. Te pagaré para que me consigas la caja 510 y la lleves a ~mission(Destination) para que pueda tenerla.\n\nMuchas gracias,\nBaylor Ward\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
crus_markerhunt_from=Sociedad Histórica de Crusader\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
crusader_RetrieveConsignment_desc_001=Los informes indican que nuestro personal de seguridad en ~mission(Location|Address) ha sido aniquilado por un grupo de Nine Tails, que intentan robar materiales confidenciales entregados recientemente en las instalaciones. Crusader Security necesita un contratista experimentado para expulsar a los hostiles y asegurar estos materiales confidenciales. \n\nBasándonos en los informes iniciales, recomendamos encarecidamente que venga bien equipado y considere la posibilidad de traer refuerzos. Por motivos de seguridad, los materiales confidenciales se transportaron allí como parte de una remesa con otras cajas y se encerraron en una cámara acorazada automatizada. Los códigos de recuperación para acceder a los envíos están almacenados en datapads en poder de personal de seguridad de alto rango. Una vez encontradas, utiliza los códigos apropiados en la cinta transportadora de paquetes para recuperar las cajas. \n\nCuando tengas todas las cajas, entrégalas en ~mission(dropoff1|address) para recibir el pago.\n\nCONTRATO AUTORIZADO POR: \nOficial de Enlace Bautista \nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Guards x4, Hostiles x54
crusader_RetrieveConsignment_title_001=Apoyar a las fuerzas de seguridad y asegurar el envío <EM4>[500–4,000 Rep]</EM4>
crusader_UGF_defend_E_desc_001=Crusader Security se ha enterado de que ~mission(Location|Address) está siendo amenazada por una banda local y queremos contratar a un contratista para que forme un equipo de seguridad que haga frente a cualquier ataque. \n\nEsta banda tiene algunos antecedentes, pero en general está bastante verde. Espero que sea relativamente sencillo para usted y su equipo.\n\nCONTRATO AUTORIZADO POR:\nOficial de Enlace Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x1, Hostiles x10, Private Security x4, Sentries x6\n<EM4>Unknown:</EM4> 11
crusader_UGF_defend_E_title_001=Proteger el emplazamiento contra hostiles <EM4>[500 Rep]</EM4>
crusader_UGF_defend_VH_desc_001=Crusader Security ha sabido que ~mission(Location|Address) está siendo amenazada por una conocida banda que opera en la zona y estamos buscando contratar a un equipo de seguridad experimentado para hacer frente a cualquier ataque. \n\nProcura asegurarte de que quienquiera que traigas esté debidamente cualificado. Vais a necesitar toda la ayuda posible para hacer frente a este grupo.\n\nCONTRATO AUTORIZADO POR:\nOficial de Enlace Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x3, Hostiles x8, Private Security x4, Sentries x4\n<EM4>Unknown:</EM4> 21
crusader_UGF_defend_VH_title_001=Proteger el emplazamiento de hostiles peligrosos <EM4>[500 Rep]</EM4>
crusader_UGF_defend_desc_001=Crusader Security se ha enterado de que ~mission(Location|Address) está siendo amenazada por un grupo de delincuentes y queremos contratar a un contratista que forme un equipo de seguridad para repeler cualquier ataque. \n\nSé que puedes tener la tentación de tratar de manejar esto por tu cuenta, pero tienes que formar un equipo para esto. Créeme, los créditos no merecen la pena si lo intentas en solitario.\n\nCONTRATO AUTORIZADO POR:\nOficial de Enlace Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x8, Private Security x4, Sentries x8\n<EM4>Unknown:</EM4> 10
crusader_UGF_defend_title_001=Proteger el sitio contra hostiles graves <EM4>[500 Rep]</EM4>
crusader_UGF_destroy_E_desc_001=Hemos descubierto que un grupo está intentando montar su propio negocio de drogas en ~mission(Location|Address). Aunque parecen ser matones normales de bajo nivel, el producto que producen es tóxico y responsable de la muerte de varios civiles, por lo que no podemos permitir que se siga vendiendo.\n\nEstamos trabajando en una operación más amplia que acabará con ellos para siempre, pero mientras tanto tenemos que detener el flujo de sus drogas. Por eso Crusader quiere que vayas al lugar y destruyas el alijo que tienen allí.\n\nSin duda tendrán guardias protegiendo el alijo, pero no espero que sean una gran amenaza.\n\nCONTRATO AUTORIZADO POR:\nOficial de Enlace Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Civilians x4
crusader_UGF_destroy_E_title_001=Destruir las drogas ilegales <EM4>[500 Rep]</EM4>
crusader_UGF_destroy_H_desc_001=Un sindicato novato se ha establecido en ~mission(Location|Address) y ha estado intentando introducirse en el mercado de la droga. Por desgracia, su producto se ha relacionado con varias muertes en Crusader y sus alrededores. Con lo potente que es, supone una grave amenaza para la población. \n\nCrusader está trabajando para acabar con toda la operación, pero mientras su producto siga circulando, los cadáveres empezarán a acumularse. \n\nQueremos que vayas al sitio y destruyas el alijo que tienen allí antes de que tengan la oportunidad de venderlo. Sin embargo, debes esperar que su alijo esté extremadamente bien vigilado.\n\nCONTRATO AUTORIZADO POR:\nOficial de Enlace Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
crusader_UGF_destroy_H_title_001=Destruir el contrabando mortal <EM4>[500 Rep]</EM4>
crusader_UGF_destroy_desc_001=Hemos estado investigando una reciente oleada de sobredosis y todas parecen tener su origen en un lote defectuoso de medicamentos fabricados en ~mission(Location|Address). \n\nEstoy trabajando con otros contratistas para descubrir a los responsables, pero la gente sigue muriendo mientras el producto siga ahí fuera. \n\nQuiero que vayas al lugar y destruyas el alijo que tienen allí. Debería darnos algo de tiempo antes de cerrarlos definitivamente.\n\nTendrán guardias protegiendo su suministro, así que prepárate para enfrentarte a hostiles.\n\nCONTRATO AUTORIZADO POR:\nOficial de Enlace Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
crusader_UGF_destroy_title_001=Destruir los narcóticos tóxicos <EM4>[500 Rep]</EM4>
crusader_UGF_eliminateall_allies_desc_001=Crusader Security se ha enterado de que ~mission(Location|Address) está siendo amenazada actualmente por un grupo de criminales.\n\nAunque tenemos personal de seguridad en el lugar, estamos buscando contratar contratistas adicionales para ayudarles a repeler cualquier ataque. \n\nAhora, como contratista, no estoy seguro de lo acostumbrado que estás a trabajar con un equipo, pero no quiero oír nada sobre "fuego amigo" o va a haber problemas.\n\nCONTRATO AUTORIZADO POR:\nOficial de Enlace Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
crusader_UGF_eliminateall_allies_desc_intro=En un esfuerzo por aumentar la seguridad de Crusader y sus alrededores, Crusader Security está buscando personas cualificadas para ayudar con el trabajo de seguridad en el sector. \n\nHemos determinado que usted posee las habilidades necesarias para ofrecerle un contrato inicial de prueba. Ayudará a Crusader Security a hacer frente a un pequeño grupo hostil que ha estado amenazando a ~mission(Location|Address). \n\nTenga en cuenta que ya tenemos personal de seguridad en el lugar, por lo que tendrá que tener cuidado con el fuego amigo.\n\nUna vez completado con éxito este contrato, podrá solicitar cualquier trabajo de seguridad futuro que esté disponible.\n\nCONTRATO AUTORIZADO POR:\nOficial de Enlace Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
crusader_UGF_eliminateall_allies_desc_rehire=¡Enhorabuena! Crusader Security ha decidido ofrecerte otra oportunidad como contratista de seguridad. Con un poco de trabajo duro y esfuerzo, esperamos que puedas superar cualquier problema de rendimiento anterior. \n\nEn primer lugar, sin embargo, para reevaluar tu viabilidad, nos gustaría que ayudaras a Crusader Security a hacer frente a un grupo de forajidos que han estado haciendo amenazas contra ~mission(Location|Address).\n\nAhora, ya que has tenido problemas de rendimiento en el pasado, voy a recordarte que no se tolerará el fuego amigo.\n\nTras la finalización con éxito de esta prueba, su elegibilidad será restaurada y una vez más será capaz de solicitar trabajo de seguridad con Crusader.\n\nCONTRATO AUTORIZADO POR:\nOficial de Enlace Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
crusader_UGF_eliminateall_allies_title_001=Proporcionar respaldo <EM4>[500 Rep]</EM4>
crusader_UGF_eliminateall_allies_title_intro=Evaluación de trabajo de seguridad <EM4>[500 Rep]</EM4>
crusader_UGF_eliminateall_allies_title_rehire=Reevaluación de los trabajos de seguridad <EM4>[500 Rep]</EM4>
crusader_UGF_eliminateall_desc_001=Crusader Security ha tenido conocimiento de que ~mission(Location|Address) está siendo utilizada actualmente como base de operaciones para numerosas actividades ilegales.\n\nCon el fin de poner fin a este "nido de criminales", estamos buscando un contratista que acuda al lugar y desaloje a todos los ocupantes. Por la fuerza si es necesario.\n\nCONTRATO AUTORIZADO POR:\nOficial de Enlace Bautista\nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Nine Tails x4
crusader_UGF_eliminateall_nocivs_desc_001=Crusader Security se ha enterado de que ~mission(Location|Address) se utiliza actualmente como base de operaciones para numerosas actividades ilegales.\n\nPara poner fin a este "nido de criminales", buscamos un contratista que vaya al lugar y elimine todos los elementos hostiles. Por la fuerza si es necesario.\n\nY para que lo sepas, a veces bandas como esta traen a civiles para que trabajen para ellas, a menudo mediante coacción. No hace falta decirlo, pero si ven civiles, deben protegerlos. Crusader Security no puede permitir que uno de sus contratistas vaya por ahí disparando indiscriminadamente a la gente.\n\nCONTRATO AUTORIZADO POR:\nOficial de Enlace Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13\n<EM4>Friendlies:</EM4> Civilians x4
crusader_UGF_eliminateall_title_001=Despejar nido criminal <EM4>[500 Rep]</EM4>
crusader_bounty_desc_first=En un esfuerzo por aumentar la seguridad de Crusader y sus alrededores, Crusader Security está buscando personas cualificadas para ayudar con el cobro de recompensas en la zona. \n\nHemos evaluado que posees las habilidades necesarias y, como tal, nos gustaría ofrecerte un contrato de recompensa inicial de prueba para ~mission(TargetName) visto por última vez en ~mission(Location|Address). \n\nUna vez completado con éxito este contrato, se le incluirá en la lista de autónomos verificados de Crusader y podrá optar a cualquier trabajo futuro de recolección de recompensas que esté disponible.\n\n\nCONTRATO AUTORIZADO POR:\nOficial de enlace Bautista\nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
crusader_bounty_desc_rehire=Buenas noticias. Crusader Security ha decidido ofrecerte otra oportunidad como contratista de recompensas. Esperamos que durante este tiempo hayas corregido cualquier problema de rendimiento del pasado y puedas volver a ser un activo útil.\n\nSin embargo, primero tenemos que volver a evaluarte y, como tal, nos gustaría que completaras este contrato de recompensas para ~mission(TargetName). \n\nUna vez completada con éxito esta prueba, será restaurado a la lista de Freelancers Verificados de Crusader y será elegible para cualquier trabajo futuro de recolección de recompensas cuando esté disponible.\n\n\nCONTRATO AUTORIZADO POR:\nOficial de Enlace Bautista\nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
crusader_bounty_fps_UGF_desc_001=Gracias a una reciente detención, hemos averiguado la ubicación de una recompensa activa con el nombre de ~mission(TargetName). Actualmente se cree que están escondidos en ~mission(Location|Address). Se le ha autorizado a entrar en el lugar, encontrarlos y resolver la recompensa.\n\nTenemos motivos para creer que habrá otros elementos criminales en el lugar, pero por el momento, sólo ~mission(TargetName|Last) es de su incumbencia. \n\nCONTRATO AUTORIZADO POR:\nOficial de Enlace Gibbs\nID# 91G66BW0\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
crusader_bounty_fps_UGF_nocivs_desc_001=Hemos tenido suerte y algunos escaneos recientes de ~mission(Location|Address) han mostrado que una recompensa abierta con el nombre de ~mission(TargetName) se esconde allí. Se te ha autorizado a entrar en el lugar, encontrarlos y resolver la recompensa.\n\nSin embargo, además de la recompensa y sus cómplices criminales, es probable que en el lugar también haya civiles. Aunque estamos impacientes por acabar con ~mission(TargetName|Last), no podemos permitir que haya víctimas civiles. Tengan cuidado al enfrentarse a los hostiles. \n\nCONTRATO AUTORIZADO POR:\nOficial de Enlace Gibbs\nID# 91G66BW0\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
