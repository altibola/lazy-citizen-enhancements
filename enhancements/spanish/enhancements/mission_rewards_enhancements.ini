RetrieveDatapad_desc=\n\nHace unos días, contraté a la tripulación del "Orgullo de Arliss" para que obtuviera unos datos importantes para mí. Hicieron el trabajo sin problemas, pero el cabrón del capitán se comunicó conmigo exigiendo más créditos. Resulta que tampoco era la primera vez que intentaba hacer este truco, porque en medio de la "negociación" conmigo, su nave fue atacada por unos individuos muy cabreados que querían darle una lección.\n\nNuestra comunicación se cortó cuando empezó el tiroteo y eso fue lo último que supe de él. Supongo que está como fantasma, pero quiero que te dirijas al Pride of Arliss e intentes conseguir mis datos del datapad personal del capitán.\n\nUna vez que los tengas, estableceré un canal de transmisión seguro en el área de descanso ARC-L1. Viaja hasta allí y cuando estés al alcance, envíame los datos a través de este contrato para que te pague.\n  \nTampoco intentes joderme. El karma puede ser un verdadero gilipollas.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Unknown:</EM4> 1
Roughready_bounty_desc_002=Rough & Ready ha estado en el negocio con ~mission(TargetName) durante años, pero esa relación ha empeorado. Durante un tiempo les suministramos combustible a crédito, pero cuando llegó el momento de cobrarlo, el cobarde se escondió. Si ~mission(TargetName|Last) no puede pagar con créditos, supongo que pagarán con su vida.\n\nUn asociado acaba de registrar ~mission(TargetName|Last) en ~mission(Location|Address) . Me encantaría que vinieras allí ahora para hacer pagar a ese bastardo tacaño.\n\nPor cierto, parece que ~mission(TargetName|Last) no viaja sola, así que me aseguraré de que estés completamente abastecido antes de ir tras ellos. \n\n- Ahumado\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
Roughready_destroyitems_fuel_desc_01=Si estás buscando algunos créditos fáciles, tengo una oferta para ti.\n\nMira, se rumorea que ~mission(Location|Address) está funcionando como un depósito de combustible. No deben haber recibido la nota de que el comercio de combustible en Pyro pertenece a Rough & Ready.\n\nEs por eso que irás allí y destruirás sus reservas de combustible. Deberían ser fáciles de detectar. Son los grandes tanques de almacenamiento amarillos repartidos por el puesto de avanzada. Pero ten cuidado, hay emplazamientos de torretas que defienden el área, así que asegúrate de estar listo para esquivar sus disparos o volar las armas por las nubes. \n\nDejaré que usted elija cómo manejar la demostración. Bombs sería mi primera opción, pero no me importa mucho mientras el trabajo esté terminado.\n\n- Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Turrets:</EM4> present (hostile)
Roughready_destroyitems_fuel_title_01=Combustible para el fuego <EM4>[50 Rep]</EM4>
Ruto_Assassin_Sync_E_Desc=Esto es lo que pasa. ~mission(TargetName) y ~mission(TargetName2) tienen que morir al mismo tiempo. Desafortunadamente, no van a estar en el mismo lugar.\n\nUn doble impacto puede sonar complicado, pero si contratas algunas armas adicionales no debería ser tan difícil hacer dos impactos simultáneamente.\n\nAsegúrate de encontrar gente que tenga habilidades ya que sé de buena fuente que cada uno volará con algunos escoltas para "protección".\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x2
Ruto_Assassin_Sync_E_Title=juntos para siempre <EM4>[500 Rep]</EM4>
Ruto_Assassin_Sync_H_Desc=Tengo otro par que necesita muerte simultánea. Parece que cada vez es más popular como opción de asesinato. \n\nEsta vez son ~mission(TargetName) y ~mission(TargetName2). Se supone que ambos son operadores bastante hábiles y no volarán solos. \n\nYo me aseguraría de que quienquiera que te ayude en esta misión pueda enfrentarse a una pelea.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x2
Ruto_Assassin_Sync_H_Title=el doble de dolor de cabeza <EM4>[500 Rep]</EM4>
Ruto_Assassin_Sync_Intro_Desc=¿Adivina qué tienen en común ~mission(TargetName) y ~mission(TargetName2)? \n\nVas a matarlos a los dos!\n\nLo difícil es que necesito que los mates al mismo tiempo para que uno no tenga oportunidad de escapar, o peor aún, matar a la persona que intenta matarlo. \n\nAsí que forma un equipo para rastrear a un objetivo mientras tú te encargas del otro. Divide y vencerás!\n\nY a pesar del hecho de que hicieron un lío lo suficientemente grande como para que los mataran, tengo entendido que son relativamente ligeros. No esperes encontrar demasiada resistencia.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x1, Targets x2
Ruto_Assassin_Sync_Intro_Title=liberación simultánea <EM4>[500 Rep]</EM4>
Ruto_Assassin_Sync_M_Desc=Espero de verdad que no seas amigo de ~mission(TargetName) o ~mission(TargetName2) porque necesito que los fantasmees a los dos... al mismo tiempo...\n\nPor supuesto que no nos lo pondrían fácil y viajarían en la misma nave o algo así de obvio. No. Vas a tener que reunir un equipo para poder derribar a ambos objetivos simultáneamente. \n\nTan pronto como uno de ellos esté muerto, prepárate para derribar al otro también. No podemos arriesgarnos a que ninguno de los dos escape.\n\nY creo que debería mencionar que no sólo ambos son muy buenos pilotos, sino que también viajarán con refuerzos. Nada que no puedan manejar, estoy seguro.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x2
Ruto_Assassin_Sync_M_Title=amigos hasta el final <EM4>[500 Rep]</EM4>
Ruto_Assassin_Sync_S_Desc=Si me hubieras preguntado, te habría dicho que ~mission(TargetName) y ~mission(TargetName2) acabarían matándose mutuamente. Pero en lugar de eso vas a tener el honor de matarlos a los dos al mismo tiempo.\n\nAunque vas a tener que trabajar para ello.\n\nCada uno es un problema. Graves antecedentes, altamente entrenados y demasiado listos para volar sin refuerzos.\n\nReúne a la mejor tripulación que puedas en esta ocasión. La necesitarás. Y no seas tacaño. No puedes gastar créditos si estás muerto.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x2
Ruto_Assassin_Sync_S_Title=doble problema <EM4>[500 Rep]</EM4>
Ruto_Assassin_Sync_VE_Desc=Es bastante conmovedor cuando te encuentras con una pareja que está dispuesta a morir el uno por el otro. Estúpido pero conmovedor.\n\n~mission(TargetName) y ~mission(TargetName2) eligieron apoyarse el uno al otro y ahora se han ido y los han matado.\n\nEncuentra a un amigo tuyo y caza a cada uno de estos dos. Asegúrate de matarlos al mismo tiempo. Llámalo justicia poética.\n\nDeberían morir bastante fácil. Tal vez tengan una nave o dos con ellos, pero no creo que sea nada de que preocuparse.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x2, Targets x2
Ruto_Assassin_Sync_VE_Title=la muerte nos separa <EM4>[500 Rep]</EM4>
Ruto_Assassin_Sync_VH_Desc=~mission(TargetName) y ~mission(TargetName2). ¿Creo que pueden estar relacionados? ¿O saliendo? Realmente no importa, alguien quiere matarlos. \n\nLo he arreglado para que puedas golpearlos cuando no estén volando juntos. Es más seguro para ti. Ambos son asuntos serios y vuelan con refuerzos igualmente serios.\n\nAsegúrate de que tú y tu tripulación cronometráis vuestros ataques. No quiero que uno de ellos quede vivo o será un verdadero dolor de cabeza.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x2
Ruto_Assassin_Sync_VH_Title=dos por el precio de dos <EM4>[500 Rep]</EM4>
