cfp_RetrieveConsignment_desc_001=¿Estás disponible para un trabajo? Una de nuestras ubicaciones seguras fue atacada por delincuentes y robaron material altamente confidencial. Como puedes imaginar, Citizens for Pyro está ansioso por recuperarlos lo antes posible.\n\nGracias a un contacto local, pudimos rastrear a los forajidos hasta ~mission(Location|address) donde almacenan la información confidencial. materiales dentro de una bóveda automatizada segura. Para acceder a él, primero deberá encontrar el código de recuperación correspondiente e ingresarlo en el transportador de paquetes de la bóveda. Nuestra mejor suposición es que uno de los líderes forajidos llevará consigo el código, por lo que es muy probable que tengas que comunicarte con ellos directamente para obtenerlo.\n \nUna vez que hayas obtenido el material confidencial , queremos que lo entregues a ~mission(dropoff1|address) .\n\nHarás una gran diferencia para muchas personas si logras lograrlo.\n\nGracias de antemano,\n\ nLima Endicott\nDespachador principal\nCiudadanos por Pyro\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Hostiles x54
