vaughn_assassination_VE_desc_intro=En primer lugar, permítanme que me presente. Por decirlo de forma bastante dramática, negocio con vidas. \n\nLa gente me contrata cuando hay que extinguir algún alma, y yo a cambio empleo a la persona perfecta para que sirva de extinguidor. Esto proporciona seguridad a todas las partes implicadas, ya que ninguna conoce la identidad de la otra. Una situación ideal en lo que a estas cosas se refiere.\n\nHace poco me enteré de que podrías poseer habilidades que te harían útil para mí y decidí que valdría la pena investigar la validez de esta afirmación. \n \nSi tienes algún interés en forjar una relación de trabajo, necesitaré una demostración de dichas habilidades. \n\nBusca y mata discretamente a ~mission(TargetName) en ~mission(Location|Address).\n\nHazlo con éxito y serás recompensado. No sólo eso, sino que habrás demostrado ser digno de mayor consideración.\n\nAtentamente,\nVaughn\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +250\n<EM4>Hostiles:</EM4> Targets x1
vaughn_assassination_VE_desc_rehire=No es frecuente en la vida que tengamos otra oportunidad de causar una primera impresión, pero yo voy a proporcionártela.\n\nDecir que me decepcionó cómo transcurrieron las cosas en tu último intento de asesinato sería quedarme muy corto. Sin embargo, aquí tienes la oportunidad de demostrar que eres capaz de más. \n\nMata a ~mission(TargetName) en ~mission(Location|Address) y haré borrón y cuenta nueva. \n\nAtentamente,\nVaughn\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250\n<EM4>Hostiles:</EM4> Targets x1
vaughn_assassination_VE_title_intro=Una oportunidad para impresionar <EM4>[100–500 Rep]</EM4>
