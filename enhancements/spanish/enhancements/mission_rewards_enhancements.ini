hurston_UGF_eliminateall_allies_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE RECURSOS EXTERNOS\n\nCONTRATO: Protección de instalaciones\nAFILIACIÓN DEL CONTRATISTA: Independiente\nDIRECTOR DE RECURSOS EXTERNOS: T. Spooner\nEVALUACIÓN DEL RIESGO: Alto\nCONTRATACIÓN URGENTE: No\n\nEl personal de seguridad de ~mission(Location|Address) está siendo amenazado por un elemento criminal local y Hurston Security está buscando contratistas para reforzar sus defensas y eliminar a cualquier hostil que intente entrar en el lugar.\n\nTenga en cuenta que sólo está autorizado a enfrentarse a hostiles confirmados. Agredir a cualquier miembro del personal de seguridad del lugar supondrá el incumplimiento del contrato.\n\nEl pago se enviará una vez que se confirme que las instalaciones son seguras. \n\n\n\n** La información transmitida puede contener material confidencial y/o privilegiado. Queda prohibida la revisión, retransmisión, difusión o cualquier otro uso de esta información por personas o entidades distintas de su destinatario. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
hurston_UGF_eliminateall_allies_desc_intro=HURSTON DYNAMICS\nDEPARTAMENTO DE RECURSOS EXTERNOS\n\nCONTRATO: Protección de instalaciones\nAFILIACIÓN DEL CONTRATISTA: Independiente\nDIRECTOR DE RECURSOS EXTERNOS: T. Spooner\nEVALUACIÓN DEL RIESGO: Alto\nCONTRATACIÓN URGENTE: No\n\nUn grupo criminal local ha estado amenazando ~mission(Location|Address) y Hurston Security está buscando contratistas para reforzar sus defensas y eliminar a cualquier hostil que intente entrar en el lugar.\n\nTenga en cuenta que sólo está autorizado a enfrentarse a hostiles confirmados. Agredir a cualquier miembro del personal de seguridad del lugar supondrá el incumplimiento del contrato.\n\nEl pago se enviará una vez que se confirme que la instalación es segura. La finalización con éxito de esta evaluación le permitirá ser considerado para futuros trabajos como contratista de seguridad.\n\n\n\n** La información transmitida puede contener material confidencial y/o privilegiado. Queda prohibida la revisión, retransmisión, difusión o cualquier otro uso de esta información por personas o entidades distintas de su destinatario. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
hurston_UGF_eliminateall_allies_desc_rehire=HURSTON DYNAMICS\nDEPARTAMENTO DE CONTRATACIÓN EXTERNA\n\nCONTRATO: Protección de instalaciones\nAFILIACIÓN DEL CONTRATISTA: Independiente\nDIRECTOR DE CONTRATACIÓN EXTERNA: T. Spooner\nEVALUACIÓN DEL RIESGO: Alto\nCONTRATO URGENTE: No\n\nNuestro departamento realiza reevaluaciones periódicas de antiguos contratistas de seguridad y ha determinado que usted puede ser un candidato adecuado para una posible reincorporación.\n\nPara recuperar su estatus, Hurston Security está buscando contratistas que ayuden a eliminar un elemento criminal local que amenaza ~mission(Location|Address).\n\nTenga en cuenta que sólo está autorizado a enfrentarse a hostiles confirmados. Agredir a cualquier personal de seguridad en el lugar resultará en un incumplimiento de contrato.\n\nEl pago se enviará una vez que se confirme que la instalación es segura. La finalización con éxito de esta reevaluación le permitirá ser considerado para futuros trabajos como contratista de seguridad.\n\n\n\n** La información transmitida puede contener material confidencial y/o privilegiado. Queda prohibida la revisión, retransmisión, difusión o cualquier otro uso de esta información por personas o entidades distintas de su destinatario. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
