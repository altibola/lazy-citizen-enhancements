Jumptown2_Criminal_MBroker_desc=Tengo buenas noticias para ti. Mientras hablamos, hay una instalación automatizada que está produciendo paquete tras paquete de producto de primera calidad que está prácticamente maduro para ser tomado.\n\nTodo lo que tienes que hacer es ir allí, tratar con un matón o dos, tomar todo lo que puedas, y venderlo con un gran beneficio. No debería ser ningún problema. Y hay un montón de gente por ahí que pagaría buenos créditos por quitarte un producto así de las manos.\n\nHablando de créditos, no voy a dar las coordenadas de esta instalación por la bondad de mi corazón. Creo que es justo pedir una comisión por una información tan buena.\n\nYo no esperaría demasiado. No estoy seguro de cuánto tiempo estará funcionando el sitio.\n\n-Ruto\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Jumptown2_Lawful_MBroker_desc_BlacJac=ATTN: Operadores mercenarios verificados\n\nHemos podido rastrear una reciente oleada de contrabando hasta una instalación de producción automatizada en ~mission(Location|Address). No podemos estar seguros de cuánto tiempo más estará en funcionamiento, por lo que BlacJac necesita a alguien en el lugar para barrer, asegurar el contrabando y transportarlo hasta nosotros en ~mission(Destination|Address).\n\nNo hemos podido determinar qué tipo de fuerza hostil estará presente, pero sea lo que sea lo que te encuentres, estás autorizado a usar la fuerza letal que sea necesaria. \n\nCuanto más contrabando consiga traernos, más créditos ganará.\n\nGracias,\nTeniente Aaron Riegert\n\nSupervisor de contrato privado\nBlacJac Security, "Protección proporcionada"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Jumptown2_Lawful_MBroker_desc_CruSec=Crusader Security se ha enterado de que una instalación de producción ilegal en ~mission(Location|Address) se utiliza actualmente para fabricar contrabando. \n\nBuscamos un contratista que asegure el lugar, confisque el contrabando y lo entregue a nuestro depósito de pruebas en ~mission(Destination|Address).\n\nAhora bien, se trata de una instalación automatizada, por lo que no está claro durante cuánto tiempo estarán fabricando, ni siquiera cuánta gente puede haber en el lugar. Para estar seguro, yo iría esperando encontrar una fuerte resistencia.\n\nSu compensación total se basará en cómo los paquetes se entregan de forma segura en las pruebas.\n\nCONTRATO AUTORIZADO POR:\nOficial de Enlace Vanzant\nID# 712L921P\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Jumptown2_Lawful_MBroker_desc_Hurston=HURSTON DYNAMICS\nDEPARTAMENTO DE RECURSOS EXTERNOS\n\nCONTRATO: Confiscación de contrabando\nAFILIACIÓN DEL CONTRATISTA: Independiente\nDIRECTOR DE RECURSOS EXTERNOS: T. Odington\nEVALUACIÓN DEL RIESGO: Alto\nCONTRATACION URGENTE: No\n\nHurston Security ha tenido conocimiento de una planta de produccion automatica activa e ilegal en ~mission(Location|Address) y esta buscando un contratista para asegurar el lugar y confiscar tantos paquetes de contrabando como sea posible para entregarlos a una instalacion de Hurston Security ~mission(Destination|Address) para su eliminacion inmediata.\n\nEsta autorizado a utilizar cualquier fuerza necesaria para completar su objetivo. El pago se basará en la cantidad de contrabando asegurado. \n\n\n\n\n** La información transmitida puede contener material confidencial y/o privilegiado. Queda prohibida la revisión, retransmisión, difusión u otro uso de esta información por personas o entidades que no sean el destinatario previsto. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Jumptown2_Lawful_MBroker_desc_MicroTech=ACERCA DEL TRABAJO\nmicroTech Protection Services está buscando un profesional de la seguridad orientado a los detalles que pueda ayudarnos a asegurar el contrabando de un sitio de producción automatizado ilegal en ~mission(Location|Address). Los paquetes tendrán que ser entregados a la ~mission(Destination|Address) para su destrucción.\n\nRESPONSABILIDADES\n- Proporcionar transporte propio a la ~mission(Location|Address).\n- Manejar cualquier hostil que se encuentre dentro del sitio; utilizando la fuerza si es necesario.\n- Asegurar el contrabando y entregarlo a la ~mission(Destination|Address)\n\nCUALIFICACIONES MÍNIMAS\n- 2 años de experiencia combinada como mercenario y/o seguridad.\n- Acceso a equipo de combate y medio de transporte.\n- Disponibilidad para el despliegue inmediato.\n\nCUALIFICACIONES PREFERENTES\n- Experiencia con técnicas de desescalada rápida de hostilidades.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
