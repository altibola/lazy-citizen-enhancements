DynamicEvent_FleetWeek2022_Description=*PARA DIFUSIÓN INMEDIATA EN TODO EL SISTEMA*\n\nAtención, las fuerzas de Nine Tails han tomado el control de varias plataformas comerciales cerca de Orison. Utilizando un Inversor de Identidad Amigo o Enemigo (IFFI), se han apoderado del espacio aéreo restringido que rodea las plataformas y sólo las naves afiliadas a Nine Tails pueden acceder a la zona. Esto ha dificultado gravemente los intentos iniciales de Crusader Security de retomar las plataformas. Por ello, Crusader ha solicitado la ayuda de las fuerzas de la CDF para apagar el inversor y eliminar toda presencia hostil. Se anima a todos los voluntarios de la CDF disponibles a proporcionar apoyo.\n\nInformación adicional:\n* Mientras el inversor está activo y el espacio aéreo inaccesible, la CDF ha conseguido hacerse con el control de un sistema de lanzaderas local y dirigirlo para acceder a la Plataforma Solanki sin que lo sepan las Nine Tails. Los voluntarios tendrán que dirigirse a la sala de exposiciones de Crusader Industries en la Plataforma Comercial y llegar a la azotea para encontrar la lanzadera que viajará a las plataformas ocupadas.\n* Se cree que la IFFI se encuentra en un contenedor de almacenamiento cerrado con llave en una barcaza de carga atracada en el Centro de Administración central.\n* Los códigos de acceso al contenedor de la IFFI están en posesión del líder de las fuerzas de las Nine Tails, Mendo Ren. \n* La experiencia pasada con Mendo Ren indica que es poco probable que muestre su cara y se arriesgue a ser capturado. Sin embargo, si todos sus lugartenientes son neutralizados, creemos que no tendrá más remedio que tomar el mando de las fuerzas en persona y darnos la oportunidad de recuperarle los códigos.\n* Además del sistema de lanzaderas, Crusader Security nos ha informado de que hay varios vehículos en las plataformas a disposición de la CDF. Estos vehículos serán la única forma de llegar al Centro de Administración. NOTA - Si todos los vehículos dentro del espacio aéreo restringido son destruidos antes de que el inversor pueda ser apagado, entonces no habrá forma de llegar a la barcaza de carga y la CDF se verá obligada a retirarse.\n* Las plataformas están protegidas por armas Anti-Aéreas controladas por Nine Tails.\n\nPor favor, ten en cuenta que la SAIC Rowena Dulli de la Defensa es la agregada oficial a la CDF y dirigirá la operación.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Unknown:</EM4> 54
