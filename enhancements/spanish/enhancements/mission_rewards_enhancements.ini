UDM_courier_fromdc_med_desc_001=¡Saludos, socio de envío calificado!\n\nHoy es el día perfecto para obtener experiencia adicional de envío de primera mano.\n\nSi tiene un barco con almacenamiento adecuado, hay una buena cantidad de paquetes en la ~mission(Pickup1) en ~mission(Pickup1|Address) listo para ser entregado. \n\nHablamos de una gran oportunidad para el crecimiento profesional.\n\nPAQUETES PARA RECOGER \n · Todos los paquetes en ~mission(Pickup1) en ~mission(Pickup1|Address) \n\nUBICACIONES DE ENTREGA (CUALQUIER PEDIDO)\ n · Paquete # ~mission(item1|serialnumber) a la ~mission(Dropoff1|Address) \n · Paquete # ~mission(item2|serialnumber) a la ~mission(Dropoff2|Address) \n · Paquete # ~mission(item3|serialnumber) a la ~mission(Dropoff3|Address) \n · Paquete # ~mission(item4|serialnumber) a la ~mission(Dropoff4|Address) \n · Paquete # ~mission(item5|serialnumber) a la ~mission(Dropoff5|Address) \n · Paquete # ~mission(item6|serialnumber) a la ~mission(Dropoff5|Address) \n · Paquete # ~mission(item7|serialnumber) a la ~mission(Dropoff6|Address) \n · Paquete # ~mission(item8|serialnumber) a la ~mission(Dropoff6|Address) \n · Paquete # ~mission(item9|serialnumber) a la ~mission(Dropoff7|Address) \n · Paquete # ~mission(item10|serialnumber) a la ~mission(Dropoff7|Address) \n\nEsperamos trabajar con usted,\n\nUnified Distribution Management\n -Entregando el paquete total-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
UDM_courier_fromdc_small_desc_001=¡Saludos, socio de envío calificado!\n\nSi está buscando una forma sencilla de ganar créditos, ¡no busque más! Hay algunos paquetes esperando ser entregados en ~mission(Pickup1|Address) en ~mission(Pickup1) .\n\nPAQUETES PARA RECOGER \n · Todos los paquetes en ~mission(Pickup1) en ~mission(Pickup1|Address) \n\nUBICACIONES DE ENTREGA (CUALQUIER PEDIDO)\n · Paquete # ~mission(item1|serialnumber) a la ~mission(Dropoff1|Address) \n · Paquete # ~mission(item2|serialnumber) a la ~mission(Dropoff2|Address) \n · Paquete # ~mission(item3|serialnumber) a la ~mission(Dropoff3|Address) \n · Paquete # ~mission(item4|serialnumber) a la ~mission(Dropoff4|Address) \n · Paquete # ~mission(item5|serialnumber) a la ~mission(Dropoff5|Address) \n\nEsperamos trabajar con usted,\n\nUnified Distribution Management\n -Entrega del paquete total-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_courier_todc_med_desc_001=¡Saludos, socio de envío calificado!\n\n¿Listo para intentar entregar un envío de paquetes bastante grande? Entonces, ¿qué tal si ayudas a llevar esta asignación a ~mission(Dropoff1) en ~mission(Dropoff1|Address) ? ¡Primero despeje suficiente espacio en su nave y estará todo listo!\n\nPAQUETES PARA RECOGER (CUALQUIER PEDIDO) \n · Paquete # ~mission(item1|serialnumber) de ~mission(Pickup1|Address) \n · Paquete # ~mission(item2|serialnumber) de ~mission(Pickup2|Address) \n · Paquete # ~mission(item3|serialnumber) de ~mission(Pickup3|Address) \n · Paquete # ~mission(item4|serialnumber) de ~mission(Pickup4|Address) \n · Paquete # ~mission(item5|serialnumber) de ~mission(Pickup5|Address) \n · Paquete # ~mission(item6|serialnumber) de ~mission(Pickup5|Address) \n · Paquete # ~mission(item7|serialnumber) de la ~mission(Pickup6|Address) \n · Paquete # ~mission(item8|serialnumber) de la ~mission(Pickup6|Address) \n · Paquete # ~mission(item9|serialnumber) de ~mission(Pickup7|Address) \n · Paquete # ~mission(item10|serialnumber) de ~mission(Pickup7|Address) \n\nUBICACIÓN DE ENTREGA\n · Todos los paquetes entregados al ~mission(Dropoff1) en ~mission(Dropoff1|Address) \n\nEsperamos trabajar con usted,\n\nUnified Distribution Management\n -Entrega del paquete total-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
UDM_courier_todc_small_desc_001=¡Saludos, socio de envío calificado!\n\n¿Está interesado en una ruta de envío sencilla y sin muchas complicaciones? \n¡Entonces llevar algunos paquetes a la ~mission(Dropoff1) en ~mission(Dropoff1|Address) debería ser el trabajo perfecto para usted!\nPAQUETES PARA RECOGER (CUALQUIER PEDIDO) \n · Paquete # ~mission(item1|serialnumber) desde ~mission(Pickup1|Address) \n · Paquete # ~mission(item2|serialnumber) desde ~mission(Pickup2|Address) \n · Paquete # ~mission(item3|serialnumber) desde ~mission(Pickup3|Address) \n · Paquete # ~mission(item4|serialnumber) de la ~mission(Pickup4|Address) \n · Paquete # ~mission(item5|serialnumber) de la ~mission(Pickup5|Address) \n\nUBICACIÓN DE ENTREGA\ n · Todos los paquetes entregados a la ~mission(Dropoff1) en ~mission(Dropoff1|Address) \n\nEsperamos trabajar con usted,\n\nUnified Distribution Management\n -Entrega del paquete total-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_internaldelivery_dc_desc_001=¡Saludos, gestor de paquetes cualificado!\n\n¿Está emocionado de profundizar en el complejo mundo de la gestión de almacenamiento y la realineación de instalaciones? Entonces no pierda esta oportunidad de ayudar a organizar los siguientes paquetes en ~mission(Location|Address) .\n\nPAQUETES PARA RECOGER (CUALQUIER PEDIDO)\n · Paquete # ~mission(item1|serialnumber) de ~mission(Pickup1) \n · Paquete # ~mission(item2|serialnumber) de la ~mission(Pickup2) \n\n\nUBICACIONES DE ENTREGA (CUALQUIER PEDIDO)\n · Paquete # ~mission(item1|serialnumber) a la ~mission(Dropoff1) \n · Paquete # ~mission(item2|serialnumber) a ~mission(Dropoff2) \n\nSi esto parece algo que le interesa, ¡acepte esta oferta de inmediato! \n\nEsperamos trabajar con usted,\n\nUnified Distribution Management\n -Entregando el paquete total-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_internaldelivery_dc_desc_003=¡Saludos, gestor de paquetes cualificado!\n\n¿Listo para afrontar un trabajo desafiante pero gratificante en una empresa de envío adyacente? Entonces tenemos una oportunidad perfecta para usted en ~mission(Location|Address) .\n\nPAQUETES PARA RECOGER (CUALQUIER PEDIDO)\n · Paquete # ~mission(item1|serialnumber) de ~mission(Pickup1) \n · Paquete # ~mission(item2|serialnumber) de la ~mission(Pickup2) \n · Paquete # ~mission(item3|serialnumber) de la ~mission(Pickup3) \n · Paquete # ~mission(item4|serialnumber) de ~mission(Pickup4) \n\nUBICACIONES DE ENTREGA (CUALQUIER PEDIDO)\n · Paquete # ~mission(item1|serialnumber) a la ~mission(Dropoff1) \n · Paquete # ~mission(item2|serialnumber) a la ~mission(Dropoff2) \n · Paquete # ~mission(item3|serialnumber) a la ~mission(Dropoff3) \n · Paquete # ~mission(item4|serialnumber) a la ~mission(Dropoff4) \n\nAsí que recoge ese contrato y vamos manos a la obra.\n\nEsperamos trabajar con usted,\n\nUnified Distribution Management\n -Entrega del paquete total-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
UDM_internaldelivery_dc_desc_005=¡Saludos, administrador de paquetes calificado!\n\nSi bien es posible que no vayan demasiado lejos, los siguientes paquetes en ~mission(Location|Address) aún deben manejarse con cuidado experto. ¿Es usted el experto que estamos buscando?\n\nPAQUETES PARA RECOGER (CUALQUIER PEDIDO)\n · Paquete # ~mission(item1|serialnumber) de la ~mission(Pickup1) \n · Paquete # ~mission(item2|serialnumber) de ~mission(Pickup2) \n · Paquete # ~mission(item3|serialnumber) de ~mission(Pickup3) \n · Paquete # ~mission(item4|serialnumber) de ~mission(Pickup4) \n · Paquete # ~mission(item5|serialnumber) de la ~mission(Pickup5) \n · Paquete # ~mission(item6|serialnumber) de la ~mission(Pickup6) \n\nUBICACIONES DE ENTREGA (CUALQUIER PEDIDO)\n · Paquete # ~mission(item1|serialnumber) a la ~mission(Dropoff1) \n · Paquete # ~mission(item2|serialnumber) a la ~mission(Dropoff2) \n · Paquete # ~mission(item3|serialnumber) a la ~mission(Dropoff3) \n · Paquete # ~mission(item4|serialnumber) a la ~mission(Dropoff4) \n · Paquete # ~mission(item5|serialnumber) a la ~mission(Dropoff5) \n · Paquete # ~mission(item6|serialnumber) a la ~mission(Dropoff6) \n\nTodo lo que necesita hacer es aceptar el contrato y estará en camino.\n\nEsperamos trabajar con usted,\n\nUnified Distribution Management\n -Entrega el paquete total-\n\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000
