UDM_UGF_collect_desc_001=Saludos ¡Compañero de reparto cualificado!\n\nSi estás buscando trabajo como piloto de reparto, ¡tenemos la oportunidad perfecta para ti! \n\nUna recogida está esperando en ~mission(Location|Address) para ser entregada en ~mission(Destination|Address). Suena divertido, ¿verdad?\n\nAdvertencia, se han producido varias alertas de seguridad en la zona. Asegúrate de llevar contigo algunas medidas defensivas para mantenerte a salvo.\n\nSi esto suena como algo en lo que estás interesado, ¡acepta esta oferta ahora mismo! \n\nEstaremos encantados de trabajar con usted,\n\nUnified Distribution Management\n -Delivering the Total Package-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Unknown:</EM4> 4
