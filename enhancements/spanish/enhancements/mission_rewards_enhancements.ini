RedWind_Delivery_Illegal_Desc_01=RED WIND LINEHAUL\n'SUS BIENES EN BUENAS MANOS'\n----------------------------\n\nTengo otro trabajo especial en el que podría utilizarte. Debería ser un trabajo rápido.\n\nPAQUETE PARA RECOGIDA\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n\nLUGAR DE ENTREGA\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n\nY por favor recuerda no molestar a los clientes ni a ninguno de sus invitados. La profesionalidad es la clave aquí. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Desc_02=RED WIND LINEHAUL\n'SUS BIENES EN BUENAS MANOS'\n----------------------------\n\nTengo otro trabajo especial que necesito un piloto en el que pueda confiar.\n\nPAQUETES PARA RECOGER (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n - Paquete #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n\nLUGARES DE ENTREGA (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) to ~mission(Dropoff1|Address)\n - Paquete #~mission(item2|serialnumber) to ~mission(Dropoff2|Address)\n\nEste es un cliente muy importante para nosotros así que por favor trátelos a ellos y a sus paquetes con extra respeto.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Desc_03=RED WIND LINEHAUL\n'SUS BIENES EN BUENAS MANOS'\n----------------------------\n\nHa llegado otro trabajo especial de uno de nuestros clientes más privados.\n\nPAQUETES PARA RECOGIDA (CUALQUIER PEDIDO)\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n - Paquete #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n - Paquete #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n\nLUGARES DE ENTREGA (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n - Paquete #~mission(item2|serialnumber) a ~mission(Dropoff2|Address)\n - Paquete #~mission(item3|serialnumber) a ~mission(Dropoff3|Address)\n\nRecuerda intentar pasar desapercibido. Lo último que quiere este cliente es llamar la atención sobre su negocio, y lo último que quiero es un cliente insatisfecho. Especialmente en este caso.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Desc_04=RED WIND LINEHAUL\n'SUS BIENES EN BUENAS MANOS'\n----------------------------\n\nTengo otra carrera especial. Me imaginé que serías el piloto adecuado para encargarte.\n\nPAQUETES PARA RECOGER (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n - Paquete #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n - Paquete #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n - Paquete #~mission(item4|serialnumber) de ~mission(Pickup4|Address)\n\nDROP (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n - Paquete #~mission(item2|serialnumber) a ~mission(Dropoff2|Address)\n - Paquete #~mission(item3|serialnumber) a ~mission(Dropoff3|Address)\n - Paquete #~mission(item4|serialnumber) a ~mission(Dropoff4|Address)\n\nUna vez más, ser inteligente y guardar silencio sobre cualquier cosa que pueda ver u oír mientras estás ahí fuera. Recuerda, sólo estás allí por los paquetes.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Desc_05=RED WIND LINEHAUL\n'SUS BIENES EN BUENAS MANOS'\n----------------------------\n\nTengo otro trabajo especial para el que podría necesitarte. Este es un poco más complicado, ya que hay unos cuantos paquetes más que controlar. Aquí está la lista:\n\nPAQUETES PARA RECOGER (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n - Paquete #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n - Paquete #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n - Paquete #~mission(item4|serialnumber) de ~mission(Pickup4|Address)\n - Paquete #~mission(item5|serialnumber) de ~mission(Pickup5|Address)\n\nLUGARES DE DESPLAZAMIENTO (CUALQUIER (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n - Paquete #~mission(item2|serialnumber) a ~mission(Dropoff2|Address)\n - Paquete #~mission(item3|serialnumber) a ~mission(Dropoff3|Address)\n - Paquete #~mission(item4|serialnumber) a ~mission(Dropoff4|Address)\n - Paquete #~mission(item5|serialnumber) a ~mission(Dropoff5|Address)\n\nAsegúrate de que los paquetes correctos llegan a su destino. Usted realmente no quiere tener que explicar una confusión a estos clientes en particular.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Desc_Intro=RED WIND LINEHAUL\n'SUS BIENES EN BUENAS MANOS'\n----------------------------\n\nSé que ha hecho un trabajo sólido para nosotros en el pasado, así que pensé que podría ver si estaba interesado en manejar un poco de una carrera especial para nosotros que está un poco más lejos en el sistema de lo que ha estado haciendo hasta ahora.\n\nEn pocas palabras, necesitamos un piloto que esté dispuesto a mantener la cabeza gacha, centrarse en entregar los paquetes y, lo más importante, no hacer muchas preguntas.\n\nVerás, para una empresa más pequeña como nosotros, mantenernos por delante de la competencia significa que tenemos que ofrecer a nuestros clientes algo que no pueden conseguir en otro sitio: discreción. En Red Wind, mientras tengas los créditos te llevamos lo que sea a donde sea. ¿Entendido?\n\nSi te parece bien, veamos cómo te va en esta carrera -\n\nPAQUETES PARA RECOGER (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n - Paquete #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n - Paquete #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n\nDROP OFF UBICACIONES (EN CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n - Paquete #~mission(item2|serialnumber) a ~mission(Dropoff2|Address)\n - Paquete #~mission(item3|serialnumber) a ~mission(Dropoff3|Address)\n\nUn último consejo, probablemente sería bueno evitar cualquier retraso innecesario una vez que tengas los paquetes a bordo, por ejemplo ser registrado por la policía local. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500
