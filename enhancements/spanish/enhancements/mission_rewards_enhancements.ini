headhunters_eliminateall_XT_derelicts_desc_01=Uno de nuestros jueces se enteró de que XenoThreat intentaba entrar en nuestro territorio. Parece que están intentando hacerse cargo de ~mission(Location|Address) . No queremos permitir que esos psicópatas consigan más presencia en el sistema de la que ya tienen, por lo que estamos poniendo algo de credibilidad en juego para que se den por vencidos.\n\nQueremos que vengas. ellos duro. No desesperes hasta que todo el lugar sea un cementerio. Le enviaremos su pago una vez que los cuerpos estén listos para ser enterrados.\n\n- Polizones.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x2, Snipers x2, Soldiers x4, Technicians x3\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
