Headhunters_bounty_desc_001=Los Headhunters recientemente prestaron créditos a ~mission(TargetName) bajo algunas condiciones claras. Específicamente, devuélvenos el dinero o te mataremos. Es una locura pensar que eso no fue un incentivo suficiente, pero aquí hemos superado la fecha límite de pago. Ahora, por mucho que nos guste ~mission(TargetName|First) , necesito que cumplas nuestra promesa.\n\n ~mission(TargetName|Last) fue vista por última vez en ~mission(Location|Address) . Localízalos, hazles fantasmas y cobra. Es tan simple como eso. \n\nSe guarda.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
Headhunters_bounty_desc_002=Se acabó el tiempo para ~mission(TargetName) . El skav está muy atrasado en pagarles a los Headhunters, así que necesito que los elimines. \n\nMátalos, no golpéalos, por si acaso no está claro. \n\nAlguien vio recientemente ~mission(TargetName|Last) alrededor de ~mission(Location|Address) , así que dirígete allí y elimínalos. \n\nRevelación completa: hemos recibido informes de que utilizaron algunos de nuestros créditos para contratar protección adicional. Prepárese en consecuencia. \n\nSe guarda.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
Headhunters_bounty_desc_003=~mission(TargetName) tomó prestados muchos créditos de los Headhunters y pensó que lo más inteligente era tratar de esconderse en lugar de devolvernos el dinero, así que necesito que alguien haga un ejemplo de ~mission(TargetName|Last) .\n\nEllos acaban de ser vistos en ~mission(Location|Address) , por lo que recomendaría ir allí ahora antes de que el rastro se enfríe. ~mission(TargetName|Last) es una persona paranoica, así que no se sorprenda si no están solos. Manéjelo como quiera, siempre y cuando ~mission(TargetName|Last) sea polvo cuando haya terminado. \n\nSe guarda.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
Headhunters_bounty_title_001=Perezoso <EM4>[50 Rep]</EM4>
Headhunters_bounty_title_002=Vencido <EM4>[100 Rep]</EM4>
Headhunters_bounty_title_003=Aviso de colección <EM4>[250 Rep]</EM4>
Headhunters_bounty_xenothreat_desc_001=Los Headhunters se enteraron de que se está preparando una operación XenoThreat que tiene como objetivo a uno de nuestros equipos. No tenemos detalles precisos sobre el plan pero sabemos que ~mission(TargetName) lo está organizando. En lugar de sentarnos y esperar a que suceda algo, hemos decidido ser proactivos. \n\n ~mission(TargetName|Last) acaba de ser visto con otras personas alrededor de ~mission(Location|Address) . No podemos movilizar a nadie lo suficientemente rápido para llegar allí. Quiero que corras allí y realices un ataque preventivo. \n\nSe guarda.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Headhunters_bounty_xenothreat_desc_002=XenoThreat recientemente golpeó el bastión de Headhunters. Te ahorraré los detalles, pero le hicieron una mierda realmente atroz a nuestra tripulación. Hemos identificado al líder de la operación como ~mission(TargetName) y estamos buscando una pequeña venganza. No nos importa lo que haga para realizar el trabajo. Sólo que ~mission(TargetName|Last) está muerta. \n\nUna fuente nos acaba de decir que puedes rastrear esta escoria de XenoThreat en ~mission(Location|Address) . Este psicópata es un profesional y nunca viaja solo, así que no esperes que sacarlo sea un paseo por el parque. \n\nSe guarda.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Headhunters_bounty_xenothreat_desc_003=~mission(TargetName) se reveló recientemente como un topo de XenoThreat. Todo tiene sentido ahora porque el skav era un gran imbécil. Desafortunadamente, se separaron antes de que pudiéramos manejarlo nosotros mismos. \n\nBasándonos en todo lo que aprendieron sobre nuestras operaciones, necesitamos que los eliminemos pronto. Ven a uno de nosotros venir y vuelven a correr, pero pensé que alguien como tú tiene más posibilidades de acercarse lo suficiente para disparar. \n\nAcabamos de enterarnos ~mission(TargetName|Last) andaba por ahí ~mission(Location|Address) . Parece que también hay otras naves protegiéndolos. ¿Crees que tienes la habilidad para librar al verso de un bastardo traidor y sus amigos bastardos? \n\nSe guarda.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Headhunters_claimsweep_desc_easy=Algún tonto está tratando de desenterrar a los Headhunters. Algunos centinelas orbitales fueron lanzados a ~mission(Location|Address) para espiarnos. También hemos visto una nave revisándolos. Propuesta sencilla para ti. Ve a eliminar a los centinelas de allí y te pagaremos por ello. ¿Eso suena como algo que te gustaría?\n\nEn cuanto a la nave, puedes hacer lo que quieras con él, pero si te ve, no te sorprendas si intenta recuperar algo. Así es como van estas cosas.\n\nPolizones.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Hostiles:</EM4> Hostile Wave x3, Prospectors x1\n<EM4>Turrets:</EM4> 2 (hostile)
Headhunters_claimsweep_desc_hard=Algunos idiotas piensan que pueden espiar descaradamente a los Headhunters y salirse con la suya. Han instalado varios centinelas orbitales en ~mission(Location|Address) y tienen algunas naves patrullando el área. No sabemos quién está detrás de esto pero, sinceramente, no nos importa. Sólo necesitamos que desaparezca. \n\nHáganos saber si le apetece poner a algunos bastardos realmente descarados en su lugar. Le pagaremos bien y le entregaremos los créditos en el momento en que finalice el trabajo. \n\nTen en cuenta que en realidad solo nos preocupamos por los centinelas. Las naves que tienen patrullando sólo son una preocupación si se interponen en tu camino o si intentan llamar a algunos amigos para que te detengan. \n \nStows fuera.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250\n<EM4>Hostiles:</EM4> Hostile Wave x5, Prospectors x4\n<EM4>Turrets:</EM4> 4 (hostile)
Headhunters_claimsweep_desc_intro=Tengo una pequeña molestia con la que los Headhunters necesitan lidiar. Hay un centinela orbital en ~mission(Location|Address) que algún pequeño y molesto alborotador instaló para espiar nuestras operaciones. ¿Quieres conseguir algunos créditos fáciles y hacerlos explotar por nosotros?\n\nSe esconde.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Turrets:</EM4> 1 (hostile)
Headhunters_claimsweep_desc_medium=Los cazadores de cabezas están buscando un mercenario que haga una pequeña limpieza por nosotros. Descubrí que alguien está intentando espiarnos en ~mission(Location|Address) . No puedo dejar que eso siga así. Necesitamos un operador capacitado para encargarse de los centinelas orbitales que dejaron allí y, si es necesario, encargarse de cualquiera de sus naves que se interponga en su camino. Parece una operación bien ejecutada, por lo que realizarla puede que no sea fácil, pero seguro que debería ser divertido. \n\nDéjanos saber si eres el indicado para el concierto. Los créditos se transferirán una vez que nuestros escaneos muestren que ya no están. \n\nSe guarda.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostile Wave x4, Prospectors x2\n<EM4>Turrets:</EM4> 3 (hostile)
Headhunters_claimsweep_desc_rand=Los cazatalentos descubrieron recientemente algunos centinelas orbitales centrados en nuestras operaciones y no nos gusta nada. Estoy buscando pagarle a alguien para que vaya a ~mission(Location|Address) y deje muy claro que deben mantenerse al margen de nuestro negocio. Dudo que sean receptivos a una discusión al respecto, así que estaría dispuesto a desalojarlos con extrema fuerza. \n\nSegún nuestros escaneos, esto no será un paseo por el parque. No sería mala idea venir preparado con mucha munición. El pago se enviará de inmediato una vez finalizado el trabajo. \n\nSe guarda.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostile Wave x32, Prospectors x5\n<EM4>Turrets:</EM4> 4 (hostile)
