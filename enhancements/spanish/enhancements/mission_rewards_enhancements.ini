Xenothreat_bounty_headhunter_desc_001=XenoThreat ha colocado una orden de eliminación en ~mission(TargetName) . Como miembro de nivel Clips de la pandilla Headhunters, ~mission(TargetName|Last) ha liderado operaciones dirigidas a agentes, misiones e infraestructura de XenoThreat. Por estas transgresiones, XenoThreat pagará a cualquiera que localice y asesine con éxito ~mission(TargetName|Last) . \n\nACTUALIZACIÓN DE UBICACIÓN: ~mission(TargetName|Last) fue vista cerca de ~mission(Location|Address) no hace mucho. Si decide aceptar este contrato, debe dirigirse a las coordenadas de inmediato. ~mission(TargetName|Last) sabe que los estamos buscando y ha estado viajando con una escolta recientemente. No se sorprenda si no están solos.\n\nComm. Especificaciones. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Xenothreat_bounty_headhunter_desc_002=XenoThreat ha colocado una orden de eliminación en ~mission(TargetName) . ~mission(TargetName|Last) , un conocido miembro de la pandilla Headhunters, ha traicionado a la humanidad al ser un conocido aliado alienígena que se asocia con ellos tanto a título personal como comercial. XenoThreat quiere que estas asociaciones traidoras se detengan inmediatamente antes de que aporten más influencia alienígena a Pyro. Pagaremos a cualquiera que localice y asesine con éxito ~mission(TargetName|Last) por estos crímenes contra la Humanidad. \n\nACTUALIZACIÓN DE LA UBICACIÓN: ~mission(TargetName|Last) fue vista recientemente con una escolta en ~mission(Location|Address) . \n\nCom. Especificaciones. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Xenothreat_bounty_headhunter_desc_003=XenoThreat ha colocado una orden de matar al jefe de ~mission(TargetName) . Como miembro de la pandilla Headhunters, ~mission(TargetName|Last) pirateó los sistemas XenoThreat para robar información sobre nuestras operaciones y personal. El daño causado sólo puede rectificarse garantizando que ~mission(TargetName|Last) nunca pueda volver a hacer algo como esto. Es por eso que XenoThreat pagará a cualquiera que pueda rastrear y asesinar ~mission(TargetName|Last) . \n\nACTUALIZACIÓN DE LA UBICACIÓN: Escaneos recientes identificaron ~mission(TargetName|Last) viajando con otras naves cerca de ~mission(Location|Address) . \n\nCom. Especificaciones. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Xenothreat_destroyitems_CFP_vehicle_desc_01=Los “activistas” de sillón de Ciudadanos por Pyro continúan intentando extender su influencia por todo el sistema. Con tu ayuda, existe la oportunidad de cortar sus operaciones desde la raíz.\n\nEl grupo está utilizando ~mission(Location|Address) para distribuir suministros a independientes dispersos por todo el planeta. Si destruimos la ~mission(ship) ubicada allí, su red caerá.\n\nEl bombardeo enviaría un mensaje claro, pero dejaré que usted decida los medios de destrucción.\n\nCom. Especificaciones. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Xenothreat_theft_outpost_cfp_desc_001=Deje que la mentirosa UEE diga que no están involucrados en las operaciones de Citizens for Pyro simplemente porque "donan" suministros a una organización de ayuda terciaria que luego se los entrega inmediatamente. \n\nAcabamos de enterarnos de que uno de estos envíos de ayuda del gobierno fue entregado en un puesto avanzado alineado con Ciudadanos por Pyro. Es por eso que te pagaremos para que asaltes ~mission(Pickup1|Address) y reclames la ~mission(item) para la causa. Una vez que entregue todo a ~mission(Dropoff1|Address) podemos redistribuir el envío para ayudar en nuestra lucha. Nada mejor que utilizar los recursos del enemigo en su contra. \n\nPero no creas que simplemente te entregarán las cosas. Aunque se supone que Citizens for Pyro está aquí para traer la paz, es mejor que estés preparado para enfrentarte cara a cara con ellos. \n\nCom. Especificaciones. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Xenothreat_theft_outpost_headhunters_desc_001=Por mucho que XenoThreat se haya esforzado por hacer de Pyro un refugio puro para los humanos, no todos están alineados con nuestros objetivos. El principal de ellos son los Headhunters, que se han degradado al contratar a un transportista alienígena para que les entregue suministros. Perdimos la oportunidad de alcanzar ese envío, pero aún queremos enviar el mensaje de que en este sistema no se tolerará trabajar con extraterrestres en cualquier capacidad. \n\nEse envío se entregó a ~mission(Pickup1|Address) . Queremos que alguien llegue al puesto de avanzada, reclame el ~mission(item) y lo lleve a ~mission(Dropoff1|Address) para que podamos deshacernos de él adecuadamente. \n\n¿Estás dispuesto a mantener a Pyro libre de influencias alienígenas?\n\nComm. Especificaciones. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Xenothreat_theft_station_cfp_desc_001=Los ciudadanos de Pyro se han atrincherado en ~mission(Pickup1|Address) . Para evitar que se sientan demasiado cómodos en esa estación, queremos mostrarles cómo es realmente la vida en nuestro sistema. Te pagaremos para que vayas a la estación, tomes la ~mission(item) y mates a cualquiera que se interponga en tu camino. \n\nEl pago depende de que usted entregue esos suministros a ~mission(Dropoff1|Address) . Cualquiera que mates será sólo un beneficio. \n\nCom. Especificaciones. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Xenothreat_theft_station_roughready_desc_001=No estoy seguro de haber tenido el placer de tratar con Rough & Ready, pero la pandilla está enfocada en acaparar el mercado de combustible en Pyro. Juego inteligente, pero que no podemos permitir que suceda sin que nos den algunas concesiones. Como actualmente no están interesados en negociar, nos vemos obligados a mostrarles lo que les sucede a quienes se oponen a nosotros.\n\nHemos identificado ~mission(Pickup1|Address) como un objetivo principal para tal ataque. También sabemos que recientemente recibieron algunos suministros que deberían ser un precio adecuado por su obstinación. Una vez dentro de la estación, haz lo que sea necesario para confiscar el ~mission(item) . Enviaremos el pago una vez que los haya entregado a ~mission(Dropoff1|Address) . \n\nCom. Especificaciones. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
