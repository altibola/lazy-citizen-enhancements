BHG_Certification_Criminal_Desc=Por recomendación de uno de nuestros miembros, al Gremio de Cazarrecompensas le gustaría ofrecerle la oportunidad de obtener su Certificación de Detención de Sospechosos.\n\nEsto significaría que está cualificado para rastrear y detener a sospechosos buscados que han demostrado ser más escurridizos que los típicos cazarrecompensas. Suelen tener habilidades de pilotaje avanzadas, un comportamiento difícil de predecir y más recursos que un objetivo normal, lo que los convierte en un verdadero desafío. \n\nPara completar con éxito este proceso de certificación, debes capturar al sospechoso buscado ~mission(TargetName).\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50
BHG_Certification_Criminal_Title=Certificado de detención de sospechosos <EM4>[50 Rep]</EM4>
BHG_Certification_Easy_Desc=Basándose en una evaluación de tus habilidades en desarrollo, el Gremio de Cazarrecompensas quiere ofrecerte la oportunidad de obtener tu Certificado de Rastreador Principiante.\n\nEste permiso significaría que estás cualificado para rastrear y capturar Objetivos de Bajo Riesgo (LRT). Estos criminales suelen pilotar naves más pequeñas, pero suelen llevar escolta, lo que los convierte en un reto mayor.\n\nPara completar con éxito este proceso de certificación, debes capturar a un criminal de rango LRT con el nombre de ~mission(TargetName) visto por última vez en ~mission(Location|Address).\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 3
BHG_Certification_Easy_Title=Certificación de Rastreador Principiante <EM4>[50 Rep]</EM4>
BHG_Certification_EscapedConvict_Desc=Debido al aumento de fugitivos en la zona, el Gremio de Cazarrecompensas quiere ofrecerte la oportunidad de obtener tu Certificación de Recuperación de Fugitivos.\n\nEsto significaría que estás cualificado para rastrear y capturar a convictos fugados. Estos individuos desesperados a menudo pueden resultar bastante difíciles de recapturar, lo que requiere habilidades especiales y una gran intuición.\n\nPara completar con éxito este proceso de certificación, debes capturar al fugitivo ~mission(TargetName). \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50
BHG_Certification_EscapedConvict_Title=Certificación de recuperación de fugitivos <EM4>[50 Rep]</EM4>
BHG_Certification_Hard_Desc=Como tu prestigio en la comunidad sigue creciendo, el Gremio de Cazarrecompensas te ofrece la oportunidad de obtener una Licencia de Rastreador Oficial.\n\nEsta licencia significaría que estás cualificado para rastrear y capturar Objetivos de Alto Riesgo (HRT). Estos criminales pueden viajar en naves más grandes con varias tripulaciones y escoltas. Las capacidades ofensivas y defensivas adicionales los convierten en objetivos difíciles para todos los miembros del gremio, excepto para los más expertos.\n\nPara completar con éxito este proceso de certificación, debes detener a un criminal de alto riesgo con el nombre de ~mission(TargetName) visto por última vez en ~mission(Location|Address).\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 3
BHG_Certification_Hard_Title=Certificación de la licencia Journeyman Tracker <EM4>[50 Rep]</EM4>
BHG_Certification_Medium_Desc=Con el progreso que has hecho en el desarrollo de tus habilidades, al Gremio de Cazarrecompensas le gustaría ofrecerte la oportunidad de obtener tu Licencia de Rastreador completa.\n\nEsta licencia significaría que estás cualificado para rastrear y capturar Objetivos de Riesgo Moderado (MRT). Estos criminales suelen pilotar naves de tamaño medio con varias escoltas. Esta clase de forajidos constituye la mayor parte de los contratos con los que se encuentran los cazarrecompensas.\n\nPara completar con éxito este proceso de certificación, debes capturar a un criminal de rango MRT con el nombre de ~mission(TargetName) visto por última vez en ~mission(Location|Address).\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 2
BHG_Certification_Medium_Title=Certificación de licencia de rastreador <EM4>[50 Rep]</EM4>
BHG_Certification_Super_Desc=Como reconocimiento a su pericia en el oficio, el Gremio de Cazarrecompensas quiere ofrecerle la oportunidad de obtener una Licencia de Maestro Rastreador.\n\nEsta licencia significaría que está cualificado para rastrear y capturar Objetivos de Riesgo Extremo (ERT). Se trata de criminales que viajan en naves subcapitales con escolta pesada. Esta clase de recompensa sólo se asigna a los rastreadores más experimentados.\n\nPara completar con éxito este proceso de certificación, debes capturar a un criminal clasificado ERT con el nombre de ~mission(TargetName) visto por última vez en ~mission(Location|Address).\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 4
BHG_Certification_Super_Title=Certificación de licencia de Master Tracker <EM4>[50 Rep]</EM4>
BHG_Certification_VeryEasy_Desc=Basándose en una evaluación de tus habilidades, el Gremio de Cazarrecompensas quiere ofrecerte la oportunidad de obtener el Certificado de Aprendiz Rastreador.\n\nEste permiso significaría que estás cualificado para rastrear y capturar Objetivos de Muy Bajo Riesgo (VLRT). Estos criminales suelen pilotar naves más pequeñas y rara vez llevan más de una escolta. Ideal para Cazarrecompensas que están empezando.\n\nPara completar con éxito este proceso de certificación, debes capturar a un criminal de rango VLRT con el nombre de ~mission(TargetName) visto por última vez en ~mission(Location|Address).\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 2
BHG_Certification_VeryEasy_Title=Certificación Rastreador Aprendiz <EM4>[50 Rep]</EM4>
BHG_Certification_VeryHard_Desc=Gracias a su probado historial, el Gremio de Cazarrecompensas quiere ofrecerle la oportunidad de obtener una Licencia de Rastreador Avanzado.\n\nEsta licencia significaría que está cualificado para rastrear y capturar Objetivos de Muy Alto Riesgo (VHRT). Estos criminales pueden viajar en grandes naves de tripulación múltiple con escolta pesada. Con múltiples hostiles a los que enfrentarse, los encuentros con estos objetivos a menudo pueden ser letales.\n\nPara completar con éxito este proceso de certificación, debes detener a un criminal de rango VHRT con el nombre de ~mission(TargetName) visto por última vez en ~mission(Location|Address).\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 4
BHG_Certification_VeryHard_Title=Certificación de licencia de rastreador avanzado <EM4>[50 Rep]</EM4>
