Covalex_internaldelivery_dc_desc_005=Hola,\n\nHay un montón de paquetes en ~mission(Location|address) que deben transportarse por las instalaciones hasta su lugar de almacenamiento adecuado. Significaría mucho si pudieras encargarte personalmente de que todo se ordene.\n\nPAQUETES PARA RECOGER (CUALQUIER PEDIDO)\n · Paquete # ~mission(item1|serialnumber) de ~mission(Pickup1) \n · Paquete # ~mission(item2|serialnumber) de ~mission(Pickup2) \n · Paquete # ~mission(item3|serialnumber) de ~mission(Pickup3) \n · Paquete # ~mission(item4|serialnumber) de ~mission(Pickup4) \n · Paquete # ~mission(item5|serialnumber) de la ~mission(Pickup5) \n · Paquete # ~mission(item6|serialnumber) de la ~mission(Pickup6) \n\n\nUBICACIONES DE ENTREGA (CUALQUIER PEDIDO)\n · Paquete # ~mission(item1|serialnumber) a la ~mission(Dropoff1) \n · Paquete # ~mission(item2|serialnumber) a la ~mission(Dropoff2) \n · Paquete # ~mission(item3|serialnumber) a la ~mission(Dropoff3) \n · Paquete # ~mission(item4|serialnumber) a la ~mission(Dropoff4) \n · Paquete # ~mission(item5|serialnumber) a la ~mission(Dropoff5) \n · Paquete # ~mission(item6|serialnumber) a la ~mission(Dropoff6) \n\n\nRealmente aprecio todo lo que haces,\n\nChase Hewitt\nJr. Coordinador de Logística\nCovalex Shipping \n'Todo lo que necesite, donde lo necesite.'\n\n\n\n\n\n\n\nCovalex Shipping es una sociedad de responsabilidad limitada. Al aceptar este contrato, usted acepta todos los términos y condiciones descritos en nuestra 'Guía de información complementaria para trabajadores independientes v.2948.01.29' ampliada. Covalex Shipping no es responsable de ningún daño que ocurra mientras opera como contratista independiente.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000
