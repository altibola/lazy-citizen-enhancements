mtps_UGF_destroy_E_desc_001=ACERCA DEL TRABAJO\nmicroTech Protection Services busca un mercenario o profesional de la seguridad orientado a los detalles para presentarse en ~mission(Location|Address) y destruir el contrabando que allí se almacena. \n\nRESPONSABILIDADES\n- Proporcionar transporte propio a ~mission(Location|Address).\n- Limpiar el lugar de contrabando; utilizando la fuerza si es necesario.\n\nCUALIFICACIONES MÍNIMAS\n- 2 años de experiencia combinada como mercenario y/o seguridad.\n- Acceso a equipo de combate y medio de transporte.\n- Disponible para despliegue inmediato.\n\nCUALIFICACIONES PREFERENTES\n- Sin problemas de adicción en curso.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Civilians x4
mtps_UGF_destroy_E_title_001=Limpiar el lugar de contrabando <EM4>[500 Rep]</EM4>
mtps_UGF_destroy_H_desc_001=ACERCA DEL TRABAJO\nmicroTech Protection Services busca un mercenario o profesional de la seguridad orientado a los detalles para presentarse en ~mission(Location|Address) y destruir los narcóticos que allí se almacenan. \n\nRESPONSABILIDADES\n- Proporcionar transporte propio a ~mission(Location|Address).\n- Limpiar el lugar de narcóticos; utilizando la fuerza si es necesario.\n\nCUALIFICACIONES MÍNIMAS\n- 2 años de experiencia combinada como mercenario y/o seguridad.\n- Acceso a equipo de combate y medio de transporte.\n- Disponible para despliegue inmediato.\n\nCUALIFICACIONES PREFERENTES\n- Sin problemas de adicción en curso.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
mtps_UGF_destroy_H_title_001=Limpiar el sitio de narcóticos <EM4>[500 Rep]</EM4>
mtps_UGF_destroy_desc_001=ACERCA DEL TRABAJO\nmicroTech Protection Services busca un mercenario o profesional de la seguridad orientado a los detalles para presentarse en ~mission(Location|Address) y destruir las drogas que allí se almacenan. \n\nRESPONSABILIDADES\n- Proporcionar transporte propio a ~mission(Location|Address).\n- Limpiar el lugar de drogas; utilizando la fuerza si es necesario.\n\nCUALIFICACIONES MÍNIMAS\n- 2 años de experiencia combinada como mercenario y/o seguridad.\n- Acceso a equipo de combate y medio de transporte.\n- Disponible para despliegue inmediato.\n\nCUALIFICACIONES PREFERENTES\n- Sin problemas de adicción en curso.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
mtps_UGF_destroy_title_001=Sitio limpio de drogas <EM4>[500 Rep]</EM4>
mtps_UGF_eliminateall_allies_desc_001=ACERCA DEL TRABAJO\nmicroTech Protection Services busca un profesional mercenario orientado a los detalles que pueda ayudar de forma rápida y segura al equipo de seguridad destinado en ~mission(Location|Address) a proteger el lugar contra amenazas hostiles. \n\nTenga en cuenta que no se tolerará ningún fuego amigo, accidental o de otro tipo. \n\nRESPONSABILIDADES\n- Proporcionar transporte propio a la ~mission(Location|Address).\n- Ayudar al equipo de seguridad local a proteger el lugar; utilizar la fuerza si es necesario.\n- Evitar cualquier incidente de fuego amigo.\n\nCUALIFICACIONES MÍNIMAS\n- 2 años de experiencia combinada como mercenario y/o seguridad.\n- Acceso a equipo de combate y medio de transporte.\n- Disponibilidad para despliegue inmediato.\n\nCUALIFICACIONES PREFERIDAS\n- Experiencia con técnicas de desescalada rápida de hostilidad.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
mtps_UGF_eliminateall_allies_desc_intro=ACERCA DEL EMPLEO\nmicroTech Protection Services necesita nuevos profesionales de la seguridad, cualificados y orientados al detalle, para ampliar nuestra plantilla actual. Para evaluar sus habilidades, nos gustaría que ayudara a proteger ~mission(Location|Address) contra amenazas hostiles. \n\nRESPONSABILIDADES\n- Proporcionar transporte propio a ~mission(Location|Address).\n- Ayudar a proteger el lugar; utilizando la fuerza si es necesario.\n- Evitar cualquier incidente de fuego amigo.\n\nREQUISITOS MÍNIMOS\n- 2 años de experiencia combinada en mercenarios y/o seguridad.\n- Acceso a equipo de combate y medio de transporte.\n- Disponible para despliegue inmediato.\n\nCUALIFICACIONES PREFERENTES\n- Experiencia con técnicas de desescalada rápida de hostilidad.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
mtps_UGF_eliminateall_allies_desc_rehire=ACERCA DEL TRABAJO\nAunque su rendimiento en el pasado no ha estado a la altura de nuestros estándares, microTech Protection Services ha decidido ofrecerle una oportunidad para redimirse. \n\nEn un esfuerzo por reevaluar sus habilidades, microTech Protection Services desea que colabore en la protección de ~mission(Location|Address) contra amenazas hostiles. \n\nRESPONSABILIDADES\n- Proporcionar transporte propio a ~mission(Location|Address).\n- Ayudar a proteger el lugar; utilizando la fuerza si es necesario.\n- Evitar cualquier incidente de fuego amigo.\n\nREQUISITOS MÍNIMOS\n- 2 años de experiencia combinada como mercenario y/o seguridad.\n- Acceso a equipo de combate y medio de transporte.\n- Disponible para despliegue inmediato.\n\nCUALIFICACIONES PREFERENTES\n- Experiencia con técnicas de desescalada rápida de hostilidad.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
