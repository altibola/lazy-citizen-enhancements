RedWind_LocalDelivery_desc_01=RED WIND LINEHAUL\n'SUS BIENES EN BUENAS MANOS'\n----------------------------\n\nNecesito un piloto independiente disponible para una entrega local rápida.\n\nPAQUETE PARA RECOGER\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n\nLUGAR DE ENTREGA\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n\nIntenta mantener la nariz limpia cuando estés ahí fuera. Si tienes paquetes de Red Wind a bordo, se agradece un cierto nivel de profesionalidad.\n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250
RedWind_LocalDelivery_desc_02=RED WIND LINEHAUL\n'SUS BIENES EN BUENAS MANOS'\n----------------------------\n\nBuscando un piloto para ejecutar un par de paquetes -\n\nPAQUETES PARA RECOGIDA (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n - Paquete #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n\nLUGARES DE ENTREGA (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n - Paquete #~mission(item2|serialnumber) a ~mission(Dropoff2|Address)\n\nNecesito que se haga rápido y sin meteduras de pata.\n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_LocalDelivery_desc_03=RED WIND LINEHAUL\n'SUS BIENES EN BUENAS MANOS'\n----------------------------\n\nHola a todos, Tengo un contrato en juego para cualquier piloto con una nave en la lista -\n\nPAQUETES PARA RECOGER (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n - Paquete #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n - Paquete #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n\nENTREGA UBICACIONES (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n - Paquete #~mission(item2|serialnumber) a ~mission(Dropoff2|Address)\n - Paquete #~mission(item3|serialnumber) a ~mission(Dropoff3|Address)\n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_LocalDelivery_desc_04=RED WIND LINEHAUL\n'SUS BIENES EN BUENAS MANOS'\n----------------------------\n\nHa llegado una misión que necesita un piloto disponible.\n\nPAQUETES PARA RECOGER (EN CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n - Paquete #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n - Paquete #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n - Paquete #~mission(item4|serialnumber) de ~mission(Pickup4|Address)\n\nDROP (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n - Paquete #~mission(item2|serialnumber) a ~mission(Dropoff2|Address)\n    - Paquete #~mission(item3|serialnumber) a ~mission(Dropoff3|Address)\n - Paquete #~mission(item4|serialnumber) a ~mission(Dropoff4|Address)\n\nY para que quede claro, tienes que proporcionar tu propio carguero. Asegúrate de que tienes espacio.\n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_LocalDelivery_desc_05=RED WIND LINEHAUL\n'SUS BIENES EN BUENAS MANOS'\n----------------------------\n\nArme una carrera de varias paradas que necesite un piloto.\n\nPAQUETES PARA RECOGER (EN CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n - Paquete #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n - Paquete #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n - Paquete #~mission(item4|serialnumber) de ~mission(Pickup4|Address)\n - Paquete #~mission(item5|serialnumber) de ~mission(Pickup5|Address)\n\nLUGARES DE DESPLAZAMIENTO (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n - Paquete #~mission(item2|serialnumber) a ~mission(Dropoff2|Address)\n - Paquete #~mission(item3|serialnumber) a ~mission(Dropoff3|Address)\n    - Paquete #~mission(item4|serialnumber) a ~mission(Dropoff4|Address)\n - Paquete #~mission(item5|serialnumber) a ~mission(Dropoff5|Address)\n\nAsegúrate de que tu nave tiene espacio para todas estas recogidas.\n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_LocalDelivery_desc_intro=RED WIND LINEHAUL\n'SUS BIENES EN BUENAS MANOS'\n----------------------------\n\nEstamos buscando contratar a un piloto independiente que esté interesado en realizar una ruta local para nosotros.\n\nPAQUETES PARA RECOGIDA (CUALQUIER PEDIDO)\n - Paquete #~mission(item1|serialnumber) desde ~mission(Pickup1|Address)\n\nLUGARES DE ENTREGA (CUALQUIER PEDIDO)\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n\nSi consigues esto, podemos ver otros contratos en el futuro.\n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +100
RedWind_LocalDelivery_desc_rehire=RED WIND LINEHAUL\n'SUS BIENES EN BUENAS MANOS'\n----------------------------\n\nAunque hace tiempo que no te contratamos, nos vendría bien la ayuda extra ahora mismo.\n\nPAQUETES PARA RECOGER (CUALQUIER PEDIDO)\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n - Paquete #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n - Paquete #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n\nENTREGA UBICACIONES (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n - Paquete #~mission(item2|serialnumber) a ~mission(Dropoff2|Address)\n - Paquete #~mission(item3|serialnumber) a ~mission(Dropoff3|Address)\n\nSi se realiza esta entrega, podemos volver a hacerla más regular.\n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
