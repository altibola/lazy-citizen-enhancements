LingFamily_UGF_collect_desc_001=Hola,\n\nNecesitamos que recojas una entrega para nosotros en ~mission(Location|Address) y luego la lleves a ~mission(Destination|Address).\n\nOriginalmente iba a enviar a mi hermano Ricki para que se encargara de esto, pero dijo que la zona es demasiado peligrosa. Supongo que ha habido un montón de advertencias de seguridad por allí, pero mientras tengas cuidado y lleves algunas armas o lo que sea, estoy seguro de que estarás bien. Probablemente ni siquiera te encuentres con nada. \n\nGracias, \nConni Ling\nCoordinadora de envíos\nLing Family Hauling\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Unknown:</EM4> 4
