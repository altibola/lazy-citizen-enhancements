northrock_boarders_890J_desc_001=Un cliente ejecutivo acaba de informarnos de que su 890 Jump ha sido interceptada en ~mission(Location) y abordada por forajidos. Preferirían que esto se tratara en privado debido a la naturaleza sensible de los datos confidenciales que se almacenan a bordo. \n\nSu primera prioridad será expulsar a todos los forajidos lo antes posible para poder enviar un equipo de recuperación que devuelva la nave a su propietario. Cuanto más tiempo tengan los forajidos el control de la nave, mayor será la probabilidad de que se pierda. Le recomiendo que adquiera un equipo para esta salida para agilizar las cosas. \n\nTenga en cuenta que gracias a un pequeño contingente de personal de seguridad que permaneció a bordo, todos los miembros supervivientes de la tripulación pudieron huir en una nave de escape. Se desconoce el estado actual del resto del personal de seguridad, pero por si acaso, mantén un ojo abierto cuando te enfrentes a los hostiles.\n\nEn segundo lugar, si es posible, el cliente está *muy* interesado en evitar el robo de los datos antes mencionados. Si eres capaz de detener el robo de sus almacenes de datos confidenciales antes de que sean transmitidos, se te otorgará una generosa bonificación.\n\nHuelga decir que se trata de un cliente al que me gustaría mucho mantener contento. \n\nBraden Corchado\nOficial de Logística - Sucursal de Stanton\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
northrock_boarders_890J_title_001=URGENTE: Acción de abordaje en curso <EM4>[8,000 Rep]</EM4>
northrock_bounty_PVP_desc_first=Hola,\n\nEspero que no te importe, pero me he enterado de tu estatus en el Gremio de Cazarrecompensas y quería preguntarte si estarías interesado en contratar a Northrock Service Group, una de las empresas de seguridad privada mejor valoradas del sistema.\n\nSi estás interesado, el primer paso sería completar una captura de sospechosos pro tem. Es menos una evaluación y más una oportunidad para asegurarnos de que podemos tener una buena relación de trabajo. \n\nEl sospechoso que perseguirías se conoce como ~mission(TargetName). Se sabe que son particularmente escurridizos, así que puede que tengas mucho trabajo por delante.\n\nEspero tener noticias tuyas pronto, \n\nBraden Corchado\nOficial de Logística - Sucursal de Stanton\nGrupo de Servicios Northrock\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500
northrock_bounty_PVP_desc_rehire=Hola de nuevo,\n\nHa pasado un tiempo, espero que todo esté bien. Sé que las cosas no terminaron en los mejores términos, pero después de hablarlo con la dirección, me gustaría ofrecerte una oportunidad para redimirte. Tenías potencial y odio pensar que no tuviste una oportunidad adecuada para demostrar de lo que eres capaz.\n\nDetén a ~mission(TargetName) y podremos ver cómo se restablece tu situación laboral.\n\nBraden Corchado\nOficial de Logística - Sucursal de Stanton\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
northrock_bounty_PVP_title_001=Detener al sospechoso: ~mission(TargetName) <EM4>[500 Rep]</EM4>
northrock_bounty_PVP_title_first=Detención Pro Tem de un sospechoso <EM4>[500 Rep]</EM4>
northrock_bounty_PVP_title_rehire=Detención Pro Tem de Sospechosos (Reevaluación) <EM4>[500 Rep]</EM4>
northrock_bounty_desc_first=Hola,\n\nEspero que todo vaya bien. Puede que ya me haya puesto en contacto contigo, pero por si acaso, quería enviarte un mensaje de nuevo. Soy oficial de logística de la sucursal de Stanton del Grupo de Servicios Northrock, una de las empresas de seguridad privada mejor valoradas del sistema, y estamos buscando ampliar nuestra cartera de contratistas cualificados.\n\nAhora bien, aunque estás certificado por el Gremio de Cazarrecompensas, Northrock necesitará que completes un contrato pro tempore para asegurarse de que eres un buen partido. Creo que voy a empezar a recoger la recompensa en ~mission(TargetName). Fueron vistos por última vez en ~mission(Location|Address). \n\nHazlo y veremos cómo conseguirte más trabajo.\n\nEspero tener noticias tuyas pronto, \n\nBraden Corchado\nOficial de Logística - Sucursal de Stanton\nGrupo de Servicios Northrock\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
northrock_bounty_fps_UGF_boss_desc_001=Hola, \n\nTengo una recompensa interesante para ti. Un criminal de alto nivel llamado ~mission(TargetName) ha sido localizado en ~mission(Location|Address). \n\nBasándonos en nuestra información, es muy poco probable que el objetivo esté sentado y esperando al aire libre. Lo más probable es que tengas que infiltrarte en las instalaciones y atraerlos. \n\nAlgo como un gran tiroteo debería ser suficiente para hacer el truco. \n\nMucha suerte,\n\nBraden Corchado\nOficial de Logística - Sucursal de Stanton\nNorthrock Service Group\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- F55 LMG\n- LH86 Pistol\n- [S1-A] Defiance Arms Tactical\n- [S1-A] Defiance Core Tactical\n- [S1-A] Defiance Helmet Tactical\n- [S1-A] Defiance Legs Tactical\n- [S1-A] F55 LMG Magazine (150 cap)\n- [S1-A] Lynx Arms\n- [S1-A] Lynx Core\n- [S1-A] Lynx Legs\n- [S1-A] Oracle Helmet\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Backup x4, Boss x1, Hostiles x2, Soldiers x4, Technicians x4\n<EM4>Applicant:</EM4> +4,000 Rep\n<EM4>Failure Penalty:</EM4> -2,000 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
northrock_bounty_fps_UGF_boss_nocivs_desc_001=Hola, \n\nTengo un contrato para ti que requiere un poco más de táctica de lo habitual. Un criminal de alto nivel llamado ~mission(TargetName) se esconde con un gran contingente de forajidos en ~mission(Location|Address). \n\nNuestra información sugiere que lo más probable es que las fuerzas de ~mission(TargetName|Last) actúen como línea defensiva para proteger a su jefe. Mi mejor suposición es que tendrás que enfrentarte a ellos antes de acceder a ~mission(TargetName|Last).\n\nDicho esto, no quiero que dispares indiscriminadamente. A veces estos forajidos tienen civiles cerca y hay que tratarlos como no combatientes.\n\nMucha suerte,\n\nBraden Corchado\nOficial de Logística - Sucursal de Stanton\nGrupo de Servicio Northrock\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- F55 LMG\n- LH86 Pistol\n- [S1-A] Defiance Arms Tactical\n- [S1-A] Defiance Core Tactical\n- [S1-A] Defiance Helmet Tactical\n- [S1-A] Defiance Legs Tactical\n- [S1-A] F55 LMG Magazine (150 cap)\n- [S1-A] Lynx Arms\n- [S1-A] Lynx Core\n- [S1-A] Lynx Legs\n- [S1-A] Oracle Helmet\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Backup x4, Boss x1, Hostiles x2, Soldiers x8, Technicians x4\n<EM4>Friendlies:</EM4> Civilians x4\n<EM4>Applicant:</EM4> +8,000 Rep\n<EM4>Failure Penalty:</EM4> -4,000 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
northrock_bounty_fps_title_001=Asignación de recompensa: ~mission(TargetName) (HRT) <EM4>[BP]</EM4> <EM4>[4,000–8,000 Rep]</EM4>
northrock_bounty_prisoner_desc_001=El criminal convicto ~mission(TargetName) se ha escapado de un centro de rehabilitación local y Northrock ha sido contratado para devolver al recluso a custodia. Según mi experiencia, los presos fugados no suelen rendirse pacíficamente, así que utiliza cualquier método que puedas para encontrar y someter al fugado. \n\nPodría valer la pena vigilar lugares donde podrían intentar limpiar su expediente. No sería la primera vez que un preso intenta borrar su condena tras fugarse.\n\nBuena caza,\n\nBraden Corchado\nOficial de Logística - Sucursal de Stanton\nGrupo de Servicio Northrock\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
northrock_bounty_prisoner_desc_intro=Hola,\n\nMe llamo Braden Corchado y soy oficial de logística de Northrock Service Group, la principal empresa de seguridad de propiedad independiente que opera en el sistema Stanton. Puede que ya me haya puesto en contacto con usted, pero intentamos acercarnos a cualquiera que cumpla nuestros elevados estándares y animarle a completar un contrato pro tempore. \n\nNo hay nada mejor que convertirse en contratista de Northrock. Gozamos de una sólida reputación por ofrecer un trabajo interesante y estimulante a un precio superior al de muchos de nuestros competidores en el sistema. \n\nAhora, para obtener la aprobación, usted tendrá que detener a  ~mission(TargetName). Se han escapado recientemente del centro de detención y tu trabajo consistirá en seguirles la pista antes de que desaparezcan por completo de la red. \n\nUna pequeña pista es que es seguro asumir que el objetivo va a ir a tratar de limpiar sus antecedentes. Te recomiendo que triangules tu búsqueda entre el centro de detención del que se escaparon y los lugares en los que pueden piratear el sistema de registros.\n\nTermina esto y veremos cómo conseguirte más trabajo.\n\nEspero tener noticias tuyas pronto, \n\nBraden Corchado\nOficial de Logística - Sucursal de Stanton\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500
northrock_bounty_prisoner_desc_rehire=Hola,\n\nSé que ha pasado un poco de tiempo, pero si todavía estás interesado en hacer trabajo por contrato para Northrock, convencí a la dirección para que te diera una reevaluación. Si puedes completar con éxito una recompensa para nosotros, podemos ver cómo se restablece tu situación laboral.\n\nEste contrato pro tempore es para rastrear a los criminales fugados ~mission(TargetName). Intenta por todos los medios llegar hasta ellos antes de que puedan borrar su registro en el punto de acceso a la base de datos o el trabajo va a ser significativamente más difícil.\n\nEsperamos poder confiar en ti en esto.\n \nBraden Corchado\nOficial de Logística - Sucursal de Stanton\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
northrock_bounty_prisoner_title_001=Escapee Bounty Assignment: ~mission(TargetName) <EM4>[500 Rep]</EM4>
northrock_bounty_prisoner_title_intro=Contrato de recompensa Pro Tem Escapee <EM4>[500 Rep]</EM4>
northrock_bounty_prisoner_title_rehire=Contrato de recompensa por evasión pro tempore (reevaluación) <EM4>[500 Rep]</EM4>
