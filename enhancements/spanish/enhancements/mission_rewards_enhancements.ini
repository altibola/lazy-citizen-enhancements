headhunters_eliminateall_outpost_desc_01=Algunos imbéciles se niegan a pagarnos lo que nos deben. El problema es que estos idiotas se jactan de ello. Si lo hubieran mantenido en secreto, podríamos habernos ocupado de esto de manera más quirúrgica, pero ahora necesitamos enviar un mensaje.\n\nLos tontos están operando desde ~mission(Location|Address) . Necesitamos que se vayan todos. Hazlo lo más fuerte que puedas. Le enviaremos su pago una vez que todos nos hayamos ocupado.\n\n- Polizones.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
