BlockadeRunner_Title=BlockadeRunner Title <EM4>[1,000 Rep]</EM4>
BrightSky_Desc=La CDF se ha asociado con Anvil Aerospace para encontrar a los operativos más capaces del sistema. \n\nSi encuentras una de estas certificaciones Platino, podrás canjear el billete en un quiosco de la nave en New Deal, Astro Armada o Crusader Showroom por un F8C gratis. \n\nLa pega es que tu identidad y ubicación se han compartido con los participantes de todo el sistema. Para todos los demás, si puedes detener al poseedor del billete antes de que llegue al quiosco, podrás reclamar el billete para ti.\n\nQuien lo consiga no sólo recibirá este caza de superioridad de nueva generación, sino que también demostrará que tiene lo que hay que tener para las misiones más duras de la CDF.\n\nBuena suerte.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
