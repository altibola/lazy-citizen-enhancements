vaughn_assassination_FPS_UGF_illegal_boss_desc_001=No sé si conoces ~mission(Location|Address), pero ~mission(TargetName) es quien lleva la voz cantante allí. Necesito que los eliminen.\n\nMe temo que es más fácil decirlo que hacerlo. Son notoriamente reacios a ocuparse de los asuntos personalmente, prefiriendo que sus subordinados se encarguen del trabajo sucio. Dicho esto, elimina a suficientes subordinados y no tendrán más remedio que tratar contigo ellos mismos.\n\nAtentamente,\nVaughn\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Pulverizer LMG\n- Tripledown Pistol\n- [S1-A] Carnifex Armor Core\n- [S1-A] Carnifex Armor Legs\n- [S1-A] Citadel Arms Base\n- [S1-A] Citadel Core Base\n- [S1-A] Citadel Legs Base\n- [S1-A] Fortifier Helmet Base\n- [S1-A] Pulverizer LMG Magazine (120 Cap)\n- [S1-A] Tripledown Pistol Magazine (12 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Backup x4, Boss x1, Hostiles x10\n<EM4>Elite Assassin:</EM4> +8,000 Rep\n<EM4>Failure Penalty:</EM4> -4,000 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
vaughn_assassination_FPS_UGF_illegal_desc_001=Dicen que no hay honor entre ladrones. Hoy, al parecer, su objetivo es uno de los suyos. \n\nPor favor, dirígete a ~mission(Location|Address) y mata a ~mission(TargetName). Lo que hagas con los otros allí depende enteramente de ti.\n\nEarnestly,\nVaughn\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Deadrig Shotgun\n- Killshot Rifle\n- [S1-A] Badami Helmet\n- [S1-A] Deadrig Shotgun Magazine (8 cap)\n- [S1-A] Killshot Rifle Magazine (45 Cap)\n- [S1-A] Overlord Arms Supernova\n- [S1-A] Overlord Core Supernova\n- [S1-A] Overlord Helmet Supernova\n- [S1-A] Overlord Legs Supernova\n- [S1-A] Piecemeal Armor Arms\n- [S1-A] Piecemeal Armor Core\n- [S1-A] Piecemeal Armor Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 10\n<EM4>Low Level Assassin:</EM4> +1,000 Rep\n<EM4>Failure Penalty:</EM4> -500 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
vaughn_assassination_FPS_UGF_illegal_title_001=Todo llega a su fin <EM4>[BP]</EM4> <EM4>[1,000–8,000 Rep]</EM4>
vaughn_assassination_FPS_UGF_legal_boss_desc_001=Un alto funcionario de seguridad llamado ~mission(TargetName) está a punto de ver cómo su larga carrera llega a un final muy violento y repentino. Aunque actualmente se encuentra en ~mission(Location|Address), no será fácil llegar hasta él. Me temo que será necesario un poco de trabajo para sacarlos. \n\nRecomiendo matar a un número suficiente de sus subordinados para que se vean obligados a enfrentarse a ti personalmente. Por supuesto, una vez que decidan finalmente mostrar su cara, debería ser un asunto bastante sencillo. \n\nSinceramente,\nVaughn\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Pulverizer LMG\n- Tripledown Pistol\n- [S1-A] Carnifex Armor Core\n- [S1-A] Carnifex Armor Legs\n- [S1-A] Citadel Arms Base\n- [S1-A] Citadel Core Base\n- [S1-A] Citadel Legs Base\n- [S1-A] Fortifier Helmet Base\n- [S1-A] Pulverizer LMG Magazine (120 Cap)\n- [S1-A] Tripledown Pistol Magazine (12 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Backup x4, Boss x1, Hostiles x10\n<EM4>High Value Assassin:</EM4> +4,000 Rep\n<EM4>Failure Penalty:</EM4> -2,000 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
vaughn_assassination_FPS_UGF_legal_desc_001=Un agente de seguridad llamado ~mission(TargetName) necesita desesperadamente una jubilación anticipada. Actualmente está destinado en ~mission(Location|Address) junto con un montón de otros tipos ansiosos con uniforme. \n\nSiéntete libre de satisfacer tus caprichos violentos, pero sólo la muerte de ~mission(TargetName) te hará merecedor de mi crédito y agradecimiento.\n\nAtentamente,\nVaughn\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13, Targets x1
vaughn_assassination_FPS_UGF_legal_title_001=Se les echará de menos <EM4>[BP?]</EM4> <EM4>[500–4,000 Rep]</EM4>
