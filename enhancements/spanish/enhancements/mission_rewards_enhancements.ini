Hurston_bounty_boss_dc_desc_001=OUTSOURCING DE HURSTON DYNAMICS\nCONTRATO: Cobro de recompensas\nGERENTE DE OUTSOURCE: I. Takao\nEVALUACIÓN DE RIESGOS: Objetivo de alto riesgo (apoyo armado)\n\nHurston Dynamics está buscando un contratista para completar una recompensa por ~mission(TargetName) . Esta recompensa ha resultado extremadamente difícil de alcanzar hasta ahora, pero los informes de inteligencia han rastreado al objetivo y a una cohorte de sus asociados conocidos hasta ~mission(Location|Address) . \n\nSin embargo, existe una gran posibilidad de que ~mission(TargetName|Last) no se arriesgue a una confrontación a menos que se vea absolutamente obligado a hacerlo. Nuestra recomendación es que neutralices primero a una parte importante de los aliados del criminal para poder sacarlos. El informe indica que un gran grupo de estos hostiles se encuentra actualmente cerca de la ~mission(Location) .\n\nEl pago se realizará solo después de que la recompensa se haya considerado completa.\n\n\n\n\n** La información transmitido puede contener material confidencial y/o privilegiado. Está prohibida cualquier revisión, retransmisión, difusión u otro uso o adopción de medidas basándose en esta información por parte de personas o entidades distintas del destinatario previsto. **\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Juggernauts x1, Snipers x2, Soldiers x13, Technicians x3
Hurston_bounty_boss_dc_title_001=Recompensa esquiva: ~mission(TargetName) (HRT) <EM4>[500 Rep]</EM4>
Hurston_bounty_multiboss_dc_desc_001=OUTSOURCING DE HURSTON DYNAMICS\nCONTRATO: Cobro de recompensas\nGERENTE DE OUTSOURCE: I. Takao\nEVALUACIÓN DE RIESGOS: Objetivo de muy alto riesgo (apoyo armado)\n\nHurston Dynamics está buscando un contratista para completar una recompensa por ~mission(TargetName) . Se acaba de informar que este objetivo y la gran fuerza hostil con la que viajan están atacando ~mission(Location|Address) . \n\nSin embargo, si su modus operandi es cierto, ~mission(TargetName|Last) normalmente ha permanecido oculto durante los ataques, prefiriendo dirigir sus fuerzas desde lejos. Te recomendamos que primero te concentres en reducir sus aliados y, una vez que su número se haya debilitado significativamente, ~mission(TargetName|Last) no tendrá más remedio que enfrentarte directamente. \n\nEl pago se liberará solo después de que la recompensa se haya considerado completa.\n\n\n\n\n** La información transmitida puede contener material confidencial y/o privilegiado. Está prohibida cualquier revisión, retransmisión, difusión u otro uso o adopción de medidas basándose en esta información por parte de personas o entidades distintas del destinatario previsto. **\norte\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Backup x5, Juggernauts x1, Soldiers x18, Technicians x32
Hurston_bounty_multiboss_dc_title_001=Recompensa evasiva: ~mission(TargetName) (VHRT) <EM4>[1,000 Rep]</EM4>
Hurston_eliminateall_dc_desc_001=OUTSOURCING DE HURSTON DYNAMICS\nCONTRATO: Neutralizar la fuerza hostil\nGERENTE DE OUTSOURCE: T. Dalik\nEVALUACIÓN DE RIESGOS: Alto\n\nNuestras fuerzas de seguridad han sido notificadas de una incursión ilegal en curso en ~mission(Location|Address) , y necesitamos un operador independiente capaz de eliminar a los actores hostiles. \n\nSegún el personal del sitio, los forajidos se encuentran actualmente escondidos cerca de la ~mission(Location) . Acérquese con precaución y esté preparado para usar fuerza letal si los forajidos se resisten a ser eliminados.\n\nEl pago sólo se autorizará una vez que la ubicación haya sido efectivamente despejada.\n\n\n\n\n** La información transmitida puede contener material confidencial y/o privilegiado. Está prohibida cualquier revisión, retransmisión, difusión u otro uso o adopción de medidas basándose en esta información por parte de personas o entidades distintas del destinatario previsto. **\norte\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> CQC x20, Soldiers x4
Hurston_eliminateall_dc_title_001=Neutralizar la incursión de forajidos <EM4>[500 Rep]</EM4>
Hurston_eliminatespecifc_dc_desc_001=OUTSOURCING DE HURSTON DYNAMICS\nCONTRATO: Cobro de recompensas\nGERENTE DE OUTSOURCE: T. Davik\nEVALUACIÓN DE RIESGOS: Objetivo de riesgo moderado\n\nHurston Dynamics está buscando un contratista para completar una recompensa por ~mission(TargetName) . Los informes de Intel han rastreado el objetivo hasta ~mission(Location|Address) donde fueron vistos por última vez cerca de ~mission(Location) . \n\nEsté preparado para que resistan la detención y para el uso de fuerza letal si es necesario.\n\nEl pago se liberará sólo después de que la recompensa se haya considerado completa.\n \n\n\n\n** La información transmitido puede contener material confidencial y/o privilegiado. Está prohibida cualquier revisión, retransmisión, difusión u otro uso o adopción de medidas basándose en esta información por parte de personas o entidades distintas del destinatario previsto. **\norte\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> CQC x18, Juggernauts x1, Snipers x2, Soldiers x6
Hurston_eliminatespecifc_dc_title_001=Recompensa ubicada: ~mission(TargetName) (MRT) <EM4>[500 Rep]</EM4>
Hurston_searchbody_dc_desc_001=HURSTON DYNAMICS OUTSOURCING\nCONTRATO: Localizar persona desaparecida\nGERENTE DE OUTSOURCE: I. Takao\nEVALUACIÓN DE RIESGOS: Bajo\n\nEl personal de ~mission(Location|Address) ha presentado recientemente un informe de personas desaparecidas para una ~mission(TargetName) . Han estado desaparecidos durante varios días y fueron vistos por última vez dirigiéndose a la ~mission(Location) .\n\nTe han contratado para realizar una búsqueda en el sitio de ~mission(TargetName|Last) y ver si puedes determinar su paradero. \n\nEl pago depende de la devolución de un registro de su ubicación actual, vivo o muerto.\n\n\n\n\n** La información transmitida puede contener material confidencial y/o privilegiado. Está prohibida cualquier revisión, retransmisión, difusión u otro uso o adopción de medidas basándose en esta información por parte de personas o entidades distintas del destinatario previsto. **\norte\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
