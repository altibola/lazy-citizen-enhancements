cfp_recovery_desc_001=Oye,\n\nNos vendría bien tu ayuda.\n\nUna local con la que trabajamos estaba completando una entrega para nosotros, pero desafortunadamente, se topó con algunos forajidos y tuvo que entregar su ~mission(item) . El lado positivo es que los forajidos no notaron los rastreadores que colocamos en la carga y ahora sabemos que llevaron su botín a ~mission(pickup1|address) . \n\nNos gustaría que recuperaras los paquetes y terminaras de entregarlos a ~mission(dropoff1|address) . No me imagino que los forajidos los entreguen voluntariamente, pero no te pediría que te pusieras en peligro si estos suministros no fueran de importancia crítica.\n\nEntonces, ¿qué dices?\n\nLima Endicott\nDespachador principal\nCiudadanos de Pyro\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
