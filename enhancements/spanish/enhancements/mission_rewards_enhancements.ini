xenothreat_destroy_server_HH_desc_01=Uno de nuestros corredores de datos desapareció mientras transportaba información operativa vital. Hace unas horas, determinamos que fueron atacados por un grupo de asalto de Headhunters y que el contenido de los almacenes de datos de la nave fue transferido a sus servidores en ~mission(Location|Address) . \n\nSi bien tenemos todas las razones para creer que nuestro cifrado se mantendrá, no podemos correr el riesgo de que el contenido de esos archivos quede expuesto. Se le ordena que se dirija allí y se asegure de que nuestros datos permanezcan privados destruyendo los servidores de Headhunter.\n\nLe recomiendo encarecidamente que sea minucioso. Arrasa con todo y con todos los que puedas.\n\nComm. Especificaciones. Engler\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
xenothreat_destroy_server_HH_title_01=Formateo Total del Servidor <EM4>[50 Rep]</EM4>
xenothreat_eliminateall_CFP_outpost_desc_01=Ya no se puede permitir que el grupo de instigadores que se autodenomina "Ciudadanos por Pyro" continúe difundiendo sus mentiras y propaganda sin repercusiones.\n\nComo un claro recordatorio de quién controla realmente Pyro, hemos emitido una orden de matar para erradicar a todos los "Ciudadanos por Pyro". ”presencia en ~mission(Location|Address) . Es probable que haya resistencia, pero esperamos que la manejes sin dificultad. Haz lo que te indiquen y te pagarán bien por tu trabajo.\n\nComm. Especificaciones. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
xenothreat_eliminateall_CFP_outpost_title_01=Orden de muerte: "Ciudadanos" en ~mission(location) <EM4>[1,000 Rep]</EM4>
xenothreat_eliminatespecific_desc_001=Los esfuerzos de XenoThreat para evitar que influencias externas infecten este sistema están siendo probados por un grupo que se atreve a llamarse Ciudadanos por Pyro. Un miembro destacado del grupo, ~mission(TargetName) , ha establecido operaciones en ~mission(Location|Address) y ya está trabajando arduamente para difundir sus mentiras y propaganda a cualquiera que esté dispuesto a escuchar. Si queremos que Pyro siga siendo independiente de la UEE y de la influencia alienígena, entonces se debe hacer algo al respecto ahora. \n\nEs por eso que XenoThreat está emitiendo una orden de eliminación para ~mission(TargetName|Last) . Y sabiendo lo importantes que son para las operaciones de Citizens for Pyro, no me sorprendería que tuvieras que abrirte camino a través de un grupo de sus seguidores más fanáticos antes de siquiera poder dispararles. Pero recuerde ~mission(TargetName|Last) es su objetivo, y el pago depende únicamente de que usted se asegure de eliminarlos. \n\nCom. Especificaciones. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Unknown:</EM4> 1
xenothreat_eliminatespecific_desc_002=Los Headhunters han reunido un equipo de ataque especial cuyo único propósito es atacar, perturbar y socavar nuestras operaciones. Por mucho que me resista a admitirlo, han tenido algunos pequeños éxitos y rápidamente se están convirtiendo en una preocupación. \n\nXenoThreat sabe que la mejor manera de matar una serpiente es cortándole la cabeza, por lo que estamos emitiendo una orden de matar al comandante del equipo de ataque ~mission(TargetName) , quien según nuestras fuentes de inteligencia, se ha estado escondiendo en ~mission(Location|Address) desde hace unos días. \n\nEsperaría una fuerte resistencia por parte de las fuerzas Headhunter allí. Por lo que hemos oído, ~mission(TargetName|Last) obtuvo este comando en parte debido a la feroz lealtad que inspiran en los demás. Reunir a su propia tripulación para abordar esto sería una estrategia operativa sólida. \n\nFeliz caza de cabezas,\n\nCom. Especificaciones. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Unknown:</EM4> 1
xenothreat_eliminatespecific_title_001=Lucha por un Pyro Libre <EM4>[1,000 Rep]</EM4>
xenothreat_eliminatespecific_title_002=De Caza <EM4>[1,000 Rep]</EM4>
