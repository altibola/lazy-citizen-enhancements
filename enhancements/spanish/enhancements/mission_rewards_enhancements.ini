mg_pacheco_prisonerbreak_desc_002=Este es el trato: un par de veteranos se han quedado atrapados haciendo un trabajo para mí y quiero que les ayudes. \n\nUn mecánico amigo se ha encargado de que su transporte de prisioneros tenga problemas en el camino, venteando la puerta delantera y deteniendo la nave. Irás, despacharás a cualquier seguridad que escolte el transporte, encontrarás el manifiesto de prisioneros a bordo y lo usarás para localizar los criopods de mi tripulación.\n\nLas paletas que busco son ~mission(NameSave2), ~mission(NameKill1), ~mission(NameSave3) y ~mission(NameSave1). Todos han sido leales y se merecen algo mejor que pudrirse en la cárcel.\n\nAl menos creo que han sido leales... Todavía me estoy preguntando cómo les pillaron en primer lugar. No puedo evitar la sensación de que uno de ellos puede haber estado traficando. Te diré qué, si encuentras alguna prueba de que uno de mi tripulación ha estado trabajando con la Abogacía, liquida su criópodo y me encargaré de que recibas una bonificación. \n\nUna vez que hayas activado las cápsulas correctas y mi gente empiece a descongelarse, lárgate de ahí y deja que el equipo de recuperación se encargue del resto. Esta última parte es importante. Verás, una vez que estén descongelados, serán enviados a retiro. No tiene sentido que sepan más de mi negocio de lo que ya saben, es decir, no quiero que estos lunáticos vean tu cara o siquiera sepan que existes. \n\nUna vez que estés de vuelta en tu camino, te enviaré una pila considerable de credenciales bien merecidas.\n\nAhora, en caso de que estés teniendo alguna idea en la línea de "¿Por qué no simplemente libero a todos?" o "¿No sería más fácil callarlos a todos permanentemente?" Olvídalo. La política de todo esto es más complicada de lo que necesitas saber. Sólo confía en mí cuando te digo que si algún preso extra es liberado o muere sin que yo lo ordene, tú serás el que pague. ¿Quieres todo tu dinero? Haz lo que se te dice y ya está. \n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +100
mg_pacheco_prisonerbreak_desc_003=Este es el trato: un par de veteranos se han quedado atrapados haciendo un trabajo para mí y quiero que les ayudes. \n\nUn mecánico amigo se ha encargado de que su transporte de prisioneros tenga problemas en el camino, venteando la puerta delantera y deteniendo la nave. Irás, despacharás a cualquier seguridad que escolte el transporte, encontrarás el manifiesto de prisioneros a bordo y lo usarás para localizar los criopods de mi tripulación.\n\nLas paletas que busco son ~mission(NameKill1), ~mission(NameSave2), ~mission(NameSave1) y ~mission(NameSave3). Todos han sido leales y se merecen algo mejor que pudrirse en la cárcel.\n\nAl menos creo que han sido leales... Todavía me estoy preguntando cómo les pillaron en primer lugar. No puedo evitar la sensación de que uno de ellos puede haber estado traficando. Te diré qué, si encuentras alguna prueba de que uno de mi tripulación ha estado trabajando con la Abogacía, liquida su criópodo y me encargaré de que recibas una bonificación. \n\nUna vez que hayas activado las cápsulas correctas y mi gente empiece a descongelarse, lárgate de ahí y deja que el equipo de recuperación se encargue del resto. Esta última parte es importante. Verás, una vez que estén descongelados, serán enviados a retiro. No tiene sentido que sepan más de mi negocio de lo que ya saben, es decir, no quiero que estos lunáticos vean tu cara o siquiera sepan que existes. \n\nUna vez que estés de vuelta en tu camino, te enviaré una pila considerable de credenciales bien merecidas.\n\nAhora, en caso de que estés teniendo alguna idea en la línea de "¿Por qué no simplemente libero a todos?" o "¿No sería más fácil callarlos a todos permanentemente?" Olvídalo. La política de todo esto es más complicada de lo que necesitas saber. Sólo confía en mí cuando te digo que si algún preso extra es liberado o muere sin que yo lo ordene, tú serás el que pague. ¿Quieres todo tu dinero? Haz lo que se te dice y ya está. \n\n-Twitch\n\n<EM3>M