hurston_bounty_desc_intro=HURSTON DYNAMICS\nDEPARTAMENTO DE RECURSOS EXTERNOS\n\nCONTRATO: Recogida de recompensas\nAFILIACIÓN DEL CONTRATISTA: Independiente\nDIRECTOR DE RECURSOS EXTERNOS: ~mission(Contractor|Auth)\nEVALUACIÓN DE RIESGOS: ~mission(Danger)\nCONTRATO URGENTE: ~mission(Contractor|BountyTimed)\n\nDespués de repetidos y continuos delitos menores, se ha emitido una recompensa por el siguiente individuo - ~mission(TargetName).\n \nPara evaluar su potencial para ayudar en la captura de criminales más escurridizos, Hurston Dynamics evaluará su capacidad para localizar y detener a ~mission(TargetName|Last) por cualquier medio a su disposición. La información más reciente sobre el paradero actual de ~mission(TargetName|Last) indica que fue visto por última vez en ~mission(Location|Address).\n\nEl pago sólo se efectuará una vez que se haya pagado la recompensa. \n \n\n** La información transmitida puede contener material confidencial y/o privilegiado. Queda prohibida la revisión, retransmisión, difusión o cualquier otro uso de esta información por parte de personas o entidades distintas de su destinatario. **\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
hurston_bounty_desc_rehire=HURSTON DYNAMICS\nDEPARTAMENTO DE RECURSOS EXTERNOS\n\nCONTRATO: Recogida de recompensas\nAFILIACIÓN DEL CONTRATISTA: Independiente\nDIRECTOR DE RECURSOS EXTERNOS: ~mission(Contractor|Auth)\nEVALUACIÓN DE RIESGOS: ~mission(Danger)\nRUSH CONTRACT: ~mission(Contractor|BountyTimed)\n\nNuestro departamento realiza reevaluaciones periódicas de antiguos cazarrecompensas y ha determinado que usted puede ser un candidato adecuado para una posible reincorporación.\n\nComo demostración de su idoneidad, capture con éxito al siguiente individuo buscado: \n~mission(TargetName).\n \nLa información más reciente sobre el paradero actual de ~mission(TargetName|Last) es que fue visto por última vez en ~mission(Location|Address).\n\nLa reincorporación como cazarrecompensas de Hurston Dynamics y el pago se producirán tras la finalización satisfactoria de este contrato.\n \n\n** La información transmitida puede contener material confidencial y/o privilegiado. Queda prohibida cualquier revisión, retransmisión, difusión u otro uso de esta información, o cualquier acción basada en ella, por parte de personas o entidades que no sean el destinatario previsto. **\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
hurston_bounty_fps_UGF_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE OUTSOURCING\n\nCONTRATO: Cobro de recompensas\nAFILIACIÓN DEL CONTRATISTA: Independiente\nGERENTE DE OUTSOURCE: I. Takao\nEVALUACIÓN DE RIESGOS: Objetivo de riesgo moderado (probablemente apoyo armado)\nCONTRATO RUSH: No\n\nHurston Dynamics está buscando un contratista para completar una recompensa por ~mission(TargetName) . \n\nLos informes de Intel han rastreado el objetivo hasta ~mission(Location|Address) . Se sabe que este sitio es frecuentado por delincuentes que probablemente estén armados y sean hostiles. Interactúe con ellos como mejor le parezca, pero su principal prioridad es la neutralización de ~mission(TargetName|Last) .\n\nEl pago se liberará solo después de que la recompensa se haya considerado completa.\n \n\n** La información transmitido puede contener material confidencial y/o privilegiado. Está prohibida cualquier revisión, retransmisión, difusión u otro uso o adopción de medidas basándose en esta información por parte de personas o entidades distintas del destinatario previsto. **\norte\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13, Targets x1
hurston_bounty_fps_UGF_nocivs_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE OUTSOURCING\n\nCONTRATO: Cobro de recompensas\nAFILIACIÓN DEL CONTRATISTA: Independiente\nGERENTE DE OUTSOURCE: L. Paleski\nEVALUACIÓN DE RIESGOS: Objetivo de riesgo moderado (probablemente apoyo armado)\nCONTRATO RUSH: No\n\nHurston Dynamics está buscando un contratista para completar una recompensa por ~mission(TargetName) . \n\nLos informes de Intel han localizado el paradero actual del objetivo en ~mission(Location|Address) . Si bien puedes enfrentarte a cualquier delincuente en el sitio como mejor te parezca, todos los civiles en el lugar deben estar protegidos.\n\nEl pago se liberará solo después de que la recompensa se haya considerado completa.\n \n\n* * La información transmitida puede contener material confidencial y/o privilegiado. Está prohibida cualquier revisión, retransmisión, difusión u otro uso o adopción de medidas basándose en esta información por parte de personas o entidades distintas del destinatario previsto. **\n\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
hurston_bounty_fps_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE OUTSOURCING\n\nCONTRATO: Cobro de recompensas\nAFILIACIÓN DEL CONTRATISTA: Independiente\nGERENTE DE OUTSOURCE: ~mission(Contractor|Auth) \nEVALUACIÓN DE RIESGOS: Objetivo de riesgo moderado (posible apoyo armado)\nCONTRATO RUSH: ~mission(Contractor|BountyTimed) \n\nBajo la autoridad de Hurston Dynamics otorgada por la UEE, se ha emitido una recompensa por ~mission(TargetName) relacionada con crímenes contra la corporación. \n\nSe cree que el sujeto fue localizado recientemente en ~mission(Location|Address) , potencialmente con varios aliados. Es posible que se requiera fuerza para obtener acceso al sitio y neutralizar ~mission(TargetName|Last) . ~mission(Location|CaveSize) \n\nEl pago se liberará solo después de que la recompensa se haya considerado completa.\n \n\n** La información transmitida puede contener material confidencial y/o privilegiado. Está prohibida cualquier revisión, retransmisión, difusión u otro uso o adopción de medidas basándose en esta información por parte de personas o entidades distintas del destinatario previsto. **\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
