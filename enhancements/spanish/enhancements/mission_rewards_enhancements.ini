mg_miles_capturegang_complete_desc=\nTodos los miembros de alto rango de la banda de Arlington están ahora entre rejas y su banda criminal está fuera de servicio. \n\nEste fue un arresto bastante impresionante. Buen trabajo.\n\n-Miles\n\nMiles Eckhart\nFundador y CEO\nEckhart Security, LLC.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
mg_miles_capturegang_desc_001=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Group Warrant\nCONTRACTOR STATUS: Independent\nApproval code: = ~mission(Contractor|ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\n*********\n__Background Information__\nA group warrant has been issued for the notorious Arlington ship jacking gang after their recent brazen attempted theft of an Idris from a repair yard. While the heist was stopped, the members of the group have scattered to the black. Eckhart Security has been granted the bounty for the immediate capture of all high-level gang members: Maltrox Arlington, Kass Dent, Nicks Cantwell,  Sam ‘Weepy’ Arlington, Oslo Arlington, and Les Arlington.\n*********\n\nAn anonymous comm has tipped us off that Les Arlington, child of gang leader Maltrox Arlington, had been spotted picking up a delivery at a Covalex transfer center. We will provide you with the coordinates of where we believe their current whereabouts are.\n\nLes is an experienced pilot who has been flying for almost as long as they’ve been walking and usually serves as the gang’s get-away pilot. It may be worthwhile to bring extra support ships in order to cut off any attempts at escape.\n\nYou are authorized to use whatever force is necessary to neutralize the target. \n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
mg_miles_capturegang_desc_002=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Group Warrant\nCONTRACTOR STATUS: Independent\nApproval code: = ~mission(Contractor|ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\n*********\n__Background Information__\nA group warrant has been issued for the notorious Arlington ship jacking gang after their recent brazen attempted theft of an Idris from a repair yard. While the heist was stopped, the members of the group have scattered to the black. Eckhart Security has been granted the bounty for the immediate capture of all high-level gang members: Maltrox Arlington, Kass Dent, Nicks Cantwell, Sam ‘Weepy’ Arlington, Oslo Arlington, and Les Arlington.\n*********\n\nWe have received word that Nicks Cantwell, long-time acquaintance and confident of Maltrox Arlington, was spotted trying to purchase a high-density mining laser, the kind frequently used in past ship-jacking attempts to strategically breach hulls. We have provided coordinates for Nicks’ last known location.  \n\nNicks is a highly regarded munitions expert among criminal circles and often leaves a path of destruction in his wake. It is advised to bring an increased level of firepower to this encounter.\n\nYou are authorized to use whatever force is necessary to neutralize the target. \n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1
mg_miles_capturegang_desc_003=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Group Warrant\nCONTRACTOR STATUS: Independent\nApproval code: = ~mission(Contractor|ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\n*********\n__Background Information__\nA group warrant has been issued for the notorious Arlington ship jacking gang after their recent brazen attempted theft of an Idris from a repair yard. While the heist was stopped, the members of the group have scattered to the black. Eckhart Security has been granted the bounty for the immediate capture of all high-level gang members: Maltrox Arlington, Kass Dent, Nicks Cantwell, Sam ‘Weepy’ Arlington, Oslo Arlington, and Les Arlington.\n*********\n\nSam ‘Weepy’ Arlington was flagged by automated security systems at an R&R after being involved in a drunken brawl. Weepy was able to clear the station before response teams arrived, but we have been able to track him down to where we currently think he’s holed up.\n\nWeepy is gang leader Maltrox Arlington’s uncle and main enforcer. His anger issues combined with a long history of substance abuse make him a true wildcard. Expect him to put up significant resistance when cornered by you and your mustered forces.\n\nYou are authorized to use whatever force is necessary to neutralize the target. \n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x2, Targets x1
mg_miles_capturegang_desc_004=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Group Warrant\nCONTRACTOR STATUS: Independent\nApproval code: = ~mission(Contractor|ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\n*********\n__Background Information__\nA group warrant has been issued for the notorious Arlington ship jacking gang after their recent brazen attempted theft of an Idris from a repair yard. While the heist was stopped, the members of the group have scattered to the black. Eckhart Security has been granted the bounty for the immediate capture of all high-level gang members: Maltrox Arlington, Kass Dent, Nicks Cantwell, Sam ‘Weepy’ Arlington, Oslo Arlington, and Les Arlington.\n*********\n\nRecently a security terminal was illegally accessed using a unique custom cryptokey that had been utilized in a heist last year by one Oslo Arlington, the younger sibling of gang leader Maltrox Arlington. While we we’re unable to positively confirm if the terminal was hacked by Oslo or not, we feel it is worth investigating.\n\nExtremely intelligent, tech savvy and a renowned strategist, Oslo has proven difficult to capture in the past. If this lead does result in finding Oslo, a well coordinated tactical strike team would be advantageous to a successful engagement. \n\nYou are authorized to use whatever force is necessary to neutralize the target. \n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
mg_miles_capturegang_desc_005=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Group Warrant\nCONTRACTOR STATUS: Independent\nApproval code: = ~mission(Contractor|ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\n*********\n__Background Information__\nA group warrant has been issued for the notorious Arlington ship jacking gang after their recent brazen attempted theft of an Idris from a repair yard. While the heist was stopped, the members of the group have scattered to the black. Eckhart Security has been granted the bounty for the immediate capture of all high-level gang members: Maltrox Arlington, Kass Dent, Nicks Cantwell, Sam ‘Weepy’ Arlington, Oslo Arlington, and Les Arlington.\n*********\n\nTwo bank guards were reported missing last week. A few hours ago, their bodies turned up in a trash heap in Magnus with their biometrics stolen. Thankfully, a nearby dumpling cart had a security camera that captured the corpses being dropped. Facial recognition was able to ID one Kass Dent, romantic partner to Maltrox Arlington and parent of Les Arlington. Using the vid to construct a timeline, we have provided the coordinates of where Kass is currently believed to be hiding. \n\nKass is suspected of a long list of murders, with these two only being the most recent. We recommend only bringing highly skilled wingman to try and keep the casualty count at a minimum.  \n\nYou are authorized to use whatever force is necessary to neutralize the target. \n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1
mg_miles_capturegang_desc_006=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Group Warrant\nCONTRACTOR STATUS: Independent\nApproval code: = ~mission(Contractor|ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\n*********\n__Background Information__\nA group warrant has been issued for the notorious Arlington ship jacking gang after their recent brazen attempted theft of an Idris from a repair yard. While the heist was stopped, the members of the group have scattered to the black. Eckhart Security has been granted the bounty for the immediate capture of all high-level gang members: Maltrox Arlington, Kass Dent, Nicks Cantwell, Sam ‘Weepy’ Arlington, Oslo Arlington, and Les Arlington.\n*********\n\nMaltrox Arlington has been keeping a low profile recently, but we think he's come out of hiding. A patrol was refueling at a station when one of their ships was boosted. Maltrox is the most likely suspect. While the regtag was temporarily deactivated, we have been able to trace the ship’s quantum signature and have provided you those coordinates.\n\nA third generation criminal, the Arlington gang has been under Maltrox’s leadership for the past six years. Be aware, this is a smart, aggressive, and very dangerous target. The more resources you can bring to bear, the more likely it is that we can bring Maltrox in one and for all. \n\nYou are authorized to use whatever force is necessary to neutralize the target. \n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1
mg_miles_capturegang_desc_idris=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Group Warrant\nCONTRACTOR STATUS: Independent\nApproval code: = ~mission(Contractor|ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nIt appears that second time's the charm for the Arlington gang. After one failed attempt, the recently escaped criminal family has managed to boost an Idris from a repair yard. Now we know what the mining laser and biometrics they stole were for. \n\nSince we had such success capturing them the first time, Eckhart Security has been granted the warrant for the gang’s arrest. This is going to take considerable firepower to bring down a capital ship of this ability.\n\nYou are authorized to use whatever force is necessary to track down the Idris and neutralize the gang.\n\nPayment will be issued upon successful completion of contract and will be adjusted based on the final evaluation of you and your team's combat effectiveness rating. \n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 5/7\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1
