cfp_delivery_title_002=Multiples entregas Listas <EM4>[50 Rep]</EM4>
cfp_destroy_idris_desc_001=Oye, \n\nLos rumores son ciertos. XenoThreat ha desplegado un Idris para acechar y atacar a Citizens for Pyro en una dramática escalada de su hostilidad hacia nosotros. Acabamos de recibir la noticia de que la nave, bajo el mando de ~mission(TargetName) , avanza hacia ~mission(Location|Address) . No podemos llevar nuestras propias fuerzas allí lo suficientemente rápido para luchar contra ellos y necesitamos ayuda desesperadamente. \n\nEstamos buscando contratar a alguien lo suficientemente valiente como para llevárselo a estos bastardos. No basta con ahuyentarlos, debemos garantizar que no puedan volver a perseguirnos. \n\nNo estoy seguro de si te has enfrentado a un Idris antes, pero es una tarea difícil para alguien que la realiza solo. Recomiendo encarecidamente reclutar a otras personas para la causa. \n\nMejor,\n\nLima Endicott\nDespachador principal\nCiudadanos por Pyro\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x15, Targets x1
