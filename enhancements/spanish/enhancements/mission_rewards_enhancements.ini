GMCapture_Desc=Para probar la preparación de nuestros equipos de respuesta, nos gustaría que voluntarios simularan un asalto contra un Idris de las CDF neutralizando y tomando el control del buque.\n\nPara ser claros, el objetivo del ejercicio no es destruir el Idris, sino para que intente abordar la nave y mantener el control de ella el mayor tiempo posible. Los voluntarios deben esperar encontrar resistencia total por parte de la tripulación altamente capacitada del Idris y se les anima a obtener una huella actualizada de antemano.\n\nLas coordenadas se proporcionarán al confirmar su participación.\n\nGracias y buena suerte.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
