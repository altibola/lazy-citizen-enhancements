Headhunters_defend_XT_VH_desc_001=HH Pyro RegionB VH TheGoldenRiviera EliminateAll\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x2, Snipers x2, Soldiers x9, Technicians x2\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Headhunters_defend_XT_VH_title_001=Headhunters defend XT VH title 001 <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
Headhunters_eliminateall_caves_desc_01=Oye,\n\nAlgunos matones de poca monta están escondidos en ~mission(Location|Address) . No les haría caso, excepto que los arrogantes skags intentaron atacar un puesto avanzado bajo nuestra protección.\n\nLos ahuyentamos sin problemas, pero no podemos permitir que ese tipo de falta de respeto quede impune. Nuestros Clips están ocupados con peces más grandes, por lo que nos gustaría que usted se encargue de esto por nosotros. \n\n ~mission(Location|CaveSize) Y dado que estos bastardos ya están bajo tierra, ni siquiera necesitarás molestarte en enterrarlos cuando hayas terminado.\n\nPolizones.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x2, Soldiers x6\n<EM4>Neutral:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Headhunters_eliminateall_caves_title_01=Una rápida represalia <EM4>[BP]</EM4> <EM4>[50 Rep]</EM4>
Headhunters_theft_outpost_xenothreat_desc_001=XenoThreat destruyó recientemente una de nuestras naves de suministros. No estoy seguro de si pensaron que estaba lleno de armas fabricadas por extraterrestres, colonos Tevarin o lo que sea, pero ahora nos estamos quedando sin algunas cosas. Parece justo que XenoThreat pague por lo que hicieron. \n\nNecesito que alguien tome la ~mission(item) de ~mission(Pickup1|Address) y la entregue en ~mission(Dropoff1|Address) .\n\nDudo mucho que estos imbéciles te permitan tener en tus manos estas cajas. sin oponer resistencia. Probablemente sea mejor reunir una tripulación y equiparse antes de partir.\n\nPlegarias\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
HexPenetrator_Bounty_desc=Nuestros analistas han examinado la información confiscada a esos equipos de reconocimiento de XenoThreat, pero los datos parecen estar bloqueados detrás de un sofisticado sistema de encriptación y requieren una clave criptográfica personalizada para acceder.\n\nHemos logrado localizar a varios lugartenientes de XenoThreat operando en el sistema, usted Debemos encontrar e involucrarnos con los sospechosos y ver si están en posesión de una clave criptográfica que nos permita acceder a la información.\n\nComo recordatorio, el ejército ha donado generosamente algunos viejos F7A Hornets para los miembros de la CDF que llevan adelante esta iniciativa. hasta el final.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
HexPenetrator_Comm_Description=Uno de los sospechosos capturados durante los ataques recientes reveló que XenoThreat busca acceder de forma remota a una serie de conjuntos de comunicaciones alrededor del sistema.\n\nHacer que XenoThreat escuche las comunicaciones es extremadamente peligroso para las personas que viven aquí, por lo que se ha reclutado a la CDF para reinicie la matriz de comunicaciones y luego defiéndala de cualquier XenoThreat Vanguards que intente volver a conectarse a los servidores. \n\nUna vez que esos Vanguard hayan sido derrotados, elimine cualquier barco hostil que quede en el área.\n\nComo recordatorio, el ejército ha donado generosamente algunos viejos F7A Hornets para los miembros de la CDF que llevarán esta iniciativa hasta el final.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Hostiles:</EM4> Hostile Wave x17
HexPenetrator_DataHeist_description=Recibimos pistas de que XenoThreat tiene la intención de lanzar otro ataque al sistema Stanton. La CDF ha solicitado a la Defensoría que cree una nueva iniciativa llamada Operación Overdrive para detener este ataque antes de que suceda. \n\nLas FDC están enviando voluntarios para infiltrarse y obtener información que pueda dar una idea de lo que están planeando. No hace falta decir que se espera una fuerte resistencia por parte de cualquier XenoAmenaza en el lugar.\n\nComo incentivo adicional, el ejército ha donado generosamente algunos viejos F7A Hornets para los miembros de la CDF que llevan esta iniciativa hasta el final.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Hostiles:</EM4> Hostiles x54, Technicians x2\n<EM4>Unknown:</EM4> 12
HexPenetrator_Incursion_Desc=Oleadas de naves XenoThreat han estado ingresando al sistema Stanton y atacando a civiles al azar. No podemos decir si se trata de un ataque aislado o una reacción a nuestras iniciativas recientes, pero necesitamos que se detengan.\n\nComo recordatorio, el ejército ha donado generosamente algunos viejos F7A Hornets para los miembros de las CDF que apoyan esta iniciativa. el fin.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
HexPenetrator_Kareah_Desc=Atención a todos los voluntarios de las FCD, recibimos una llamada de socorro del puesto de seguridad Kareah. Resulta que XenoThreat usó los sistemas de comunicación como distracción para atraer a las fuerzas del orden y poder lanzar un ataque a la estación.\n\nHemos aprendido que están intentando acceder a sus sistemas, por lo que todos los voluntarios deben desviarse inmediatamente a Vuelve a tomar Kareah y elimina todas las fuerzas de XenoThreat.\n\nComo recordatorio, el ejército ha donado generosamente algunos viejos F7A Hornets para los miembros de la CDF que llevarán esta iniciativa hasta el final.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Hostiles:</EM4> Hostile Wave x3
HexPenetrator_RecoverDeliver_description=Atención, voluntarios de la FCD, XenoThreat ha desaparecido de la red. Sospechamos que se han apagado para prepararse para la fase final de su plan. \n\nLa historia ha demostrado que a XenoThreat le gusta luchar, por lo que es lógico que esto pueda ser un ataque de algún tipo, por lo que estamos convocando a voluntarios para que entreguen suministros a la estación Gateway cerca del punto de salto de Stanton-Pyro para apuntalar un posible asalto.\n\nComo recordatorio, el ejército ha donado generosamente algunos viejos F7A Hornets para los miembros de la CDF que llevarán esta iniciativa hasta el final.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
HexPenetrator_RewardRecord_Desc=Gracias por su diligencia en esta Iniciativa Overdrive. \n\nComo prometimos, le hemos aprobado para una actualización de un F7C mk ii civil a un F7A mk ii de grado militar, si tiene uno.\n\nAdemás, se le ha otorgado un alquiler temporal de un F7A militar. mk ii al que puedes acceder en tu ASOP.\n\n\n_________________\n\nPara actualizar, visita el sitio web de RSI para aplicar el token, luego reinicia el juego y accede al barco.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
