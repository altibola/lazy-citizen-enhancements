p_protectandresupply_PreXeno_desc=Atención, voluntarios de las CDF, XenoThreat finalmente lanzó su ataque contra la estación Jericho en Pyro Gateway en Stanton.\n\nLa Armada ha solicitado a las fuerzas de las CDF que ayuden a combatir las fuerzas de XenoThreat en el área y/o recuperar suministros de los escombros y entregarlos de manera segura a Jericho. estación. \n\nLa Marina ha organizado un estipendio comunitario para gestionar la distribución del pago. Esto se distribuirá entre todos los voluntarios de la FCD en intervalos asignados. Aparecerá un indicador en su HUD para medir estos pagos.\n\nTenga en cuenta que los suministros son muy volátiles si no se manejan correctamente. Tenga cuidado al transportar estos materiales:\n* Zeta-Prolanide se degrada con el tiempo hasta descomponerse por completo.\n* El compuesto AcryliPlex se vuelve explosivamente inestable si se daña.\n* Diluthermex libera un pulso de energía destructivo si se expone a viajes cuánticos.\n\ nSAIC Rowena Dulli de Advocacy es la agregada oficial de la CDF y dirigirá la operación.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Difficulty (1-7):</EM4> 5/7\n<EM4>Rep:</EM4> +4,000
p_protectandresupply_PreXeno_title=Iniciativa Overdrive: Emboscada Xenothreat - Refuerzos Necesarios <EM4>[4,000 Rep]</EM4>
p_protectandresupply_desc_v2=*PARA PUBLICACIÓN INMEDIATA EN TODO EL SISTEMA*\n\nAtención, las fuerzas de XenoThreat comenzaron a tender una emboscada a los convoyes navales que transportaban suministros vitales mientras se dirigían a la estación INS Jericho en el sistema Stanton. La Marina ha solicitado a las fuerzas de la CDF que ayuden a recuperar estos suministros de los escombros y entregarlos de manera segura a la estación de Jericho. \n\nLa Marina ha organizado un estipendio comunitario para gestionar la distribución del pago. Esto se distribuirá entre todos los voluntarios de la FCD en intervalos asignados. Aparecerá un indicador en su HUD para medir estos pagos.\n\nTenga en cuenta que algunos de estos suministros son muy volátiles si no se manejan correctamente. Tenga cuidado al transportar estos materiales:\n* Zeta-Prolanide se degrada con el tiempo hasta descomponerse por completo.\n* El compuesto AcryliPlex se vuelve explosivamente inestable si se daña.\n* Diluthermex libera un pulso de energía destructivo si se expone a viajes cuánticos.\n \ Además, aunque no son tan volátiles, la Armada todavía necesita con urgencia los suministros de DynaFlex perdidos durante el ataque para completar las reparaciones del Javelin y deberían ser una prioridad para la recuperación. \n\nAdemás, es posible que todavía haya enemigos hostiles de XenoThreat en el área, así que tenga cuidado. También se insta a los voluntarios de las FDC con experiencia en combate a que contribuyan a proteger estas áreas de las fuerzas persistentes de XenoAmenaza.\n\nSAIC Rowena Dulli de Advocacy es la agregada oficial de las FDC y dirigirá la operación.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 5/7\n<EM4>Rep:</EM4> +4,000
p_protectandresupply_title=CDF ALERTA: Emboscada Xenothreat - Refuerzos Necesarios <EM4>[4,000 Rep]</EM4>
p_showdown_PreXeno_desc=Atención, las fuerzas navales se han reagrupado para el asalto final que XenoThreat ha estado planeando. La Marina ha solicitado oficialmente a los voluntarios de las CDF que ayuden a brindar apoyo de combate en este esfuerzo final para asegurar nuestro sistema. Esto incluirá voluntarios fuera de aquellos que han participado en la Iniciativa Overdrive.\n\nSAIC Rowena Dulli de Advocacy es la agregada oficial de la CDF y dirigirá la operación.\n\nSi tiene éxito, esto completará esta Iniciativa Overdrive serie y recibirás acceso temporal a los F7A Hornets o una actualización gratuita si actualmente posees un F7C.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Difficulty (1-7):</EM4> 5/7\n<EM4>Rep:</EM4> +4,000
p_showdown_PreXeno_title=Iniciativa Overdrive: Ataque a XenoThreat <EM4>[4,000 Rep]</EM4>
p_showdown_desc=*PARA DIFUSIÓN INMEDIATA EN TODO EL SISTEMA*\n\nAtención, las fuerzas navales se han reagrupado para un asalto final a la manada de forajidos XenoThreat que han estado asolando el Sistema Stanton. La Armada ha solicitado oficialmente voluntarios de la CDF para ayudar a proporcionar apoyo de combate en este empuje final para asegurar nuestro sistema.\n\nSAIC Rowena Dulli de la Abogacía es la agregada oficial a la CDF y dirigirá la operación.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 5/7\n<EM4>Rep:</EM4> +4,000
p_showdown_title=CDF ALERT: Ataque a XenoThreat <EM4>[4,000 Rep]</EM4>
