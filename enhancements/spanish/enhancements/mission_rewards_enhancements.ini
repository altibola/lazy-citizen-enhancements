Covalex_LocalDelivery_desc_01=Hola!\n\nTenemos que encargarnos de una entrega local, si estás disponible. \n\nPAQUETE PARA RECOGIDA\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n\nLUGAR DE ENTREGA\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordinador de Logística\nCovalex Shipping \n'Lo que necesite, donde lo necesite'.\n\n\n\n\n\n\n\nCovalex Shipping es una sociedad de responsabilidad limitada. Al aceptar este contrato, usted está de acuerdo con todos los términos y condiciones descritos en nuestra 'Guía de Información Suplementaria para Trabajadores Independientes v.2948.01.29'. Covalex Shipping no se responsabiliza de los daños que se produzcan mientras trabaje como contratista independiente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Covalex_LocalDelivery_desc_02=¡Hola!\n\nOtra carrera apareció en mi cola y pensé en enviártela. Debería ser una carrera rápida con un par de paradas.\n\nPAQUETES PARA RECOGER (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n - Paquete #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n\nLUGARES DE ENTREGA (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n - Paquete #~mission(item2|serialnumber) a ~mission(Dropoff2|Address)\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordinador de Logística\nCovalex Shipping \n'Lo que necesite, donde lo necesite'.\n\n\n\n\n\n\n\nCovalex Shipping es una sociedad de responsabilidad limitada. Al aceptar este contrato, usted está de acuerdo con todos los términos y condiciones descritos en nuestra 'Guía de Información Suplementaria para Trabajadores Independientes v.2948.01.29'. Covalex Shipping no se responsabiliza de los daños que se produzcan mientras trabaje como contratista independiente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Covalex_LocalDelivery_desc_03=Hola,\n\nRealmente espero que estés libre porque estamos absolutamente ocupados en este momento. Aquí hay una tirada local que esperaba que pudieras recoger. \n\nPAQUETES PARA RECOGER (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n - Paquete #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n - Paquete #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n\nLUGARES DE ENTREGA (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n - Paquete #~mission(item2|serialnumber) a ~mission(Dropoff2|Address)\n - Paquete #~mission(item3|serialnumber) a ~mission(Dropoff3|Address)\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordinador de Logística\nCovalex Shipping \n'Lo que necesite, donde lo necesite'.\n\n\n\n\n\n\n\nCovalex Shipping es una sociedad de responsabilidad limitada. Al aceptar este contrato, usted está de acuerdo con todos los términos y condiciones descritos en nuestra 'Guía de Información Suplementaria para Trabajadores Independientes v.2948.01.29'. Covalex Shipping no se responsabiliza de los daños que se produzcan mientras trabaje como contratista independiente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Covalex_LocalDelivery_desc_04=Hola,\n\nTengo una entrega con tu nombre si estás disponible. Es un puñado, así que asegúrate de que tienes sitio.\n\nPAQUETES PARA RECOGER (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n - Paquete #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n    - Paquete #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n - Paquete #~mission(item4|serialnumber) de ~mission(Pickup4|Address)\n\nLUGARES DE ENTREGA (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n - Paquete #~mission(item2|serialnumber) a ~mission(Dropoff2|Address)\n - Paquete #~mission(item3|serialnumber) a ~mission(Dropoff3|Address)\n - Paquete #~mission(item4|serialnumber) a ~mission(Dropoff4|Address)\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordinador de Logística\nCovalex Shipping \n'Lo que necesite, donde lo necesite'.\n\n\n\n\n\n\n\nCovalex Shipping es una sociedad de responsabilidad limitada. Al aceptar este contrato, usted está de acuerdo con todos los términos y condiciones descritos en nuestra 'Guía de Información Suplementaria para Trabajadores Independientes v.2948.01.29'. Covalex Shipping no se responsabiliza de los daños que se produzcan mientras trabaje como contratista independiente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Covalex_LocalDelivery_desc_05=¡Hola!\n\nNecesito un montón de paquetes movidos si tienes el tiempo y el espacio. Aquí está la lista.\n\nPAQUETES PARA RECOGER (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n - Paquete #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n - Paquete #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n - Paquete #~mission(item4|serialnumber) de ~mission(Pickup4|Address)\n - Paquete #~mission(item5|serialnumber) de ~mission(Pickup5|Address)\n\nLUGARES DE ENTREGA (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n - Paquete #~mission(item2|serialnumber) a ~mission(Dropoff2|Address)\n - Paquete #~mission(item3|serialnumber) a ~mission(Dropoff3|Address)\n - Paquete #~mission(item4|serialnumber) a ~mission(Dropoff4|Address)\n - Paquete #~mission(item5|serialnumber) a ~mission(Dropoff5|Address)\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordinador de Logística\nCovalex Shipping \n'Lo que necesite, donde lo necesite'.\n\n\n\n\n\n\n\nCovalex Shipping es una sociedad de responsabilidad limitada. Al aceptar este contrato, usted está de acuerdo con todos los términos y condiciones descritos en nuestra 'Guía de Información Suplementaria para Trabajadores Independientes v.2948.01.29'. Covalex Shipping no se responsabiliza de los daños que se produzcan mientras trabaje como contratista independiente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Covalex_LocalDelivery_desc_intro=Hola!\n\nCovalex busca actualmente nuevos repartidores. Para ver si eres material de Covalex o no, hemos preparado la siguiente ruta de entrega como evaluación de tus habilidades.\n\nPAQUETE PARA RECOGER\n - Paquete #~mission(item1|serialnumber) desde ~mission(Pickup1|Address)\n\nLUGAR DE ENTREGA\n - Paquete #~mission(item1|serialnumber) hasta ~mission(Dropoff1|Address)\n\nCompletar con éxito este recorrido te certificará como contratista oficial de Covalex.\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordinador de Logística\nCovalex Shipping \n'Lo que necesites, donde lo necesites.'\n\n\n\n\n\n\n\nCovalex Shipping es una sociedad de responsabilidad limitada. Al aceptar este contrato, usted está de acuerdo con todos los términos y condiciones descritos en nuestra 'Guía de Información Suplementaria para Trabajadores Independientes v.2948.01.29'. Covalex Shipping no se responsabiliza de los daños que se produzcan mientras trabaje como contratista independiente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500
Covalex_LocalDelivery_desc_rehire=Hola,\n\nDesde Covalex ha estado sufriendo de una abundancia de entregas y la falta de contratistas, yo era capaz de administración a reconsiderar su estado. Todo lo que tienes que hacer es completar con éxito la siguiente entrega y estarás de vuelta en la rotación.\n\nPAQUETES PARA RECOGER (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n - Paquete #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n - Paquete #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n\nLUGARES DE RECOGIDA (CUALQUIER ORDEN)  (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n - Paquete #~mission(item2|serialnumber) a ~mission(Dropoff2|Address)\n - Paquete #~mission(item3|serialnumber) a ~mission(Dropoff3|Address)\n\nBuena suerte. Sería genial tenerte en la lista de nuevo.\n\nChase Hewitt\nJr. Coordinador de Logística\nCovalex Shipping \n'Cualquier cosa que necesites, donde la necesites.'\n\n\n\n\n\n\n\nCovalex Shipping es una sociedad de responsabilidad limitada. Al aceptar este contrato, usted está de acuerdo con todos los términos y condiciones descritos en nuestra 'Guía de Información Suplementaria para Trabajadores Independientes v.2948.01.29'. Covalex Shipping no se responsabiliza de los daños que se produzcan mientras trabaje como contratista independiente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
