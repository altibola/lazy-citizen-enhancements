Covalex_courier_fromdc_large_desc_001=Hola,\n\nTenemos un envío bastante grande esperando en la ~mission(Pickup1) en ~mission(Pickup1|Address) que está listo para ser entregado.\n\nCon esta cantidad de cajas para transportar, probablemente sería bueno para tener un par de manos extra para ayudar a transferir todo dentro y fuera de su barco.\n\nPAQUETES PARA RECOGER \n · Todos los paquetes en la ~mission(Pickup1) en ~mission(Pickup1|Address) \n\nUBICACIONES DE ENTREGA (CUALQUIER PEDIDO)\n · Paquete # ~mission(item1|serialnumber) a la ~mission(Dropoff1|Address) \n · Paquete # ~mission(item2|serialnumber) a la ~mission(Dropoff2|Address) \n · Paquete # ~mission(item3|serialnumber) a la ~mission(Dropoff3|Address) \n · Paquete # ~mission(item4|serialnumber) a la ~mission(Dropoff4|Address) \n · Paquete # ~mission(item5|serialnumber) a la ~mission(Dropoff5|Address) \n · Paquete # ~mission(item6|serialnumber) a la ~mission(Dropoff5|Address) \n · Paquete # ~mission(item7|serialnumber) a la ~mission(Dropoff6|Address) \n · Paquete # ~mission(item8|serialnumber) a la ~mission(Dropoff6|Address) \n · Paquete # ~mission(item9|serialnumber) a la ~mission(Dropoff7|Address) \n · Paquete # ~mission(item10|serialnumber) a la ~mission(Dropoff7|Address) \n · Paquete # ~mission(item11|serialnumber) a la ~mission(Dropoff8|Address) \n · Paquete # ~mission(item12|serialnumber) a ~mission(Dropoff8|Address) \n · Paquete # ~mission(item13|serialnumber) a ~mission(Dropoff9|Address) \n · Paquete # ~mission(item14|serialnumber) a ~mission(Dropoff9|Address) \n · Paquete # ~mission(item15|serialnumber) a la ~mission(Dropoff9|Address) \n\nMucha suerte,\n\nChase Hewitt\nJr. Coordinador de Logística\nCovalex Shipping \n'Todo lo que necesite, donde lo necesite.'\n\n\n\n\n\n\n\nCovalex Shipping es una sociedad de responsabilidad limitada. Al aceptar este contrato, usted acepta todos los términos y condiciones descritos en nuestra 'Guía de información complementaria para trabajadores independientes v.2948.