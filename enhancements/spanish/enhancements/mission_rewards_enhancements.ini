mtps_UGF_eliminateall_desc_001=ACERCA DEL TRABAJO\nmicroTech Protection Services está buscando un profesional de la seguridad orientado a los detalles que pueda ayudarnos de forma rápida y segura en la eliminación completa de los ocupantes ilegales que han obtenido temporalmente el control de ~mission(Location|Address).\n\nRESPONSABILIDADES\n- Proporcionar transporte propio a ~mission(Location|Address).\n- Retirar a todos los ocupantes ilegales que se encuentren en el lugar; utilizando la fuerza si es necesario.\n\nCUALIFICACIONES MÍNIMAS\n- 2 años de experiencia combinada como mercenario y/o seguridad.\n- Acceso a equipo de combate y medio de transporte.\n- Disponibilidad para despliegue inmediato.\n\nCUALIFICACIONES PREFERENTES\n- Experiencia con técnicas de desescalada rápida de hostilidad.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
mtps_UGF_eliminateall_nocivs_desc_001=ACERCA DEL TRABAJO\nmicroTech Protection Services busca un profesional mercenario orientado a los detalles que pueda ayudarnos de forma rápida y segura en la eliminación completa de los ocupantes ilegales que se han hecho temporalmente con el control de ~mission(Location|Address).\n\nTenga en cuenta que nuestra información muestra que hay trabajadores civiles en el lugar. Dado que su conexión con la banda no está clara, deben ser considerados no combatientes. Cualquier acción hostil hacia ellos no será tolerada. \n\nRESPONSABILIDADES\n- Proporcionar transporte propio a la ~mission(Location|Address).\n- Retirar a todos los ocupantes hostiles que se encuentren en el lugar; utilizando la fuerza si es necesario.\n- Garantizar la seguridad de los civiles que puedan encontrarse en el lugar. \n\nCUALIFICACIONES MÍNIMAS\n- 2 años de experiencia combinada en mercenarios y/o seguridad.\n- Acceso a equipo de combate y medio de transporte.\n- Disponibilidad para despliegue inmediato.\n\nCUALIFICACIONES PREFERIDAS\n- Experiencia con técnicas de desescalada rápida de hostilidades.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13\n<EM4>Friendlies:</EM4> Civilians x4
mtps_UGF_eliminateall_title_001=Expulsar a los ocupantes ilegales <EM4>[500 Rep]</EM4>
mtps_bounty_desc_ERT=ACERCA DEL TRABAJO\nmicroTech Protection Services busca un cazarrecompensas cualificado para detener al objetivo de riesgo extremo ~mission(TargetName) de ~mission(Location|Address). \n\nUn objetivo de riesgo extremo normalmente pilota una nave de clase subcapital, tiene varios aliados fuertemente armados y se espera que sea muy difícil de detener. Puede ser útil llevar personal de apoyo para ayudar en la lucha contra este objetivo.\n\nRESPONSABILIDADES\n- Proporcionar transporte propio a ~mission(Location|Address).\n- Neutralizar ~mission(TargetName); utilizando la fuerza si es necesario.\n\nCUALIFICACIONES MÍNIMAS\n- Pertenencia al Gremio de Cazarrecompensas y certificación apropiada.\n- Acceso a un vehículo adecuadamente equipado para el combate.\n- Disponibilidad para el despliegue inmediato.\n\nCUALIFICACIONES PREFERIDAS\n- Capacidad para manejar situaciones de alta presión.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
mtps_bounty_desc_HRT=ACERCA DEL TRABAJO\nmicroTech Protection Services busca un cazarrecompensas cualificado para detener al objetivo de alto riesgo ~mission(TargetName) de ~mission(Location|Address). \n\nUn objetivo de alto riesgo suele pilotar una nave grande con tripulación múltiple, tiene varios aliados conocidos y se espera que sea difícil de detener. Puede ser útil llevar personal de apoyo para ayudar en la lucha contra este objetivo.\n\nRESPONSABILIDADES\n- Proporcionar transporte propio a ~mission(Location|Address).\n- Neutralizar ~mission(TargetName); utilizando la fuerza si es necesario.\n\nCUALIFICACIONES MÍNIMAS\n- Pertenencia al Gremio de Cazarrecompensas y certificación apropiada.\n- Acceso a un vehículo adecuadamente equipado para el combate.\n- Disponibilidad para el despliegue inmediato.\n\nCUALIFICACIONES PREFERIDAS\n- Capacidad para manejar situaciones de alta presión.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
mtps_bounty_desc_LRT=ACERCA DEL TRABAJO\nmicroTech Protection Services busca un cazarrecompensas cualificado para detener al objetivo de bajo riesgo ~mission(TargetName) de ~mission(Location|Address). \n\nUn objetivo de bajo riesgo normalmente pilota una nave monoplaza, tiene varios aliados conocidos y debería ser fácil de capturar.\n\nRESPONSABILIDADES\n- Proporcionar transporte propio a ~mission(Location|Address).\n- Neutralizar ~mission(TargetName); utilizando la fuerza si es necesario.\n\nCUALIFICACIONES MÍNIMAS\n- Pertenencia al Gremio de Cazarrecompensas y certificación adecuada.\n- Acceso a un vehículo adecuadamente equipado para el combate.\n- Disponibilidad para el despliegue inmediato.\n\nCUALIFICACIONES PREFERIDAS\n- Capacidad para manejar situaciones de alta presión.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
mtps_bounty_desc_MRT=ACERCA DEL TRABAJO\nmicroTech Protection Services busca un cazarrecompensas cualificado para detener al objetivo de riesgo moderado ~mission(TargetName) de ~mission(Location|Address). \n\nUn objetivo de riesgo moderado normalmente pilota una pequeña embarcación con tripulación múltiple, tiene varios aliados conocidos y puede ser ligeramente difícil de detener.\n\nRESPONSABILIDADES\n- Proporcionar transporte propio a ~mission(Location|Address).\n- Neutralizar ~mission(TargetName); utilizando la fuerza si es necesario.\n\nCUALIFICACIONES MÍNIMAS\n- Pertenencia al Gremio de Cazarrecompensas y certificación adecuada.\n- Acceso a un vehículo adecuadamente equipado para el combate.\n- Disponibilidad para el despliegue inmediato.\n\nCUALIFICACIONES PREFERIDAS\n- Capacidad para manejar situaciones de alta presión.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
mtps_bounty_desc_VLRT=ACERCA DEL TRABAJO\nmicroTech Protection Services busca un cazarrecompensas cualificado para detener al objetivo de muy bajo riesgo ~mission(TargetName) de ~mission(Location|Address). \n\nUn objetivo de muy bajo riesgo normalmente pilota una nave monoplaza, tiene pocos aliados conocidos y debería ser relativamente fácil de detener.\n\nRESPONSABILIDADES\n- Proporcionar transporte propio a ~mission(Location|Address).\n- Neutralizar a ~mission(TargetName); utilizando la fuerza si es necesario.\n\nCUALIFICACIONES MÍNIMAS\n- Pertenencia al Gremio de Cazarrecompensas y certificación adecuada.\n- Acceso a un vehículo adecuadamente equipado para el combate.\n- Disponibilidad para el despliegue inmediato.\n\nCUALIFICACIONES PREFERIDAS\n- Capacidad para manejar situaciones de alta presión.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x1, Targets x1
mtps_bounty_desc_intro=ACERCA DEL TRABAJO\nmicroTech Protection Services necesita nuevos cazarrecompensas cualificados para ampliar nuestra lista actual. Para evaluar sus habilidades, nos gustaría que nos ayudara en la captura de ~mission(TargetName) de ~mission(Location|Address).\n\n\nRESPONSABILIDADES\n- Proporcionar transporte propio a ~mission(Location|Address).\n- Neutralizar ~mission(TargetName); utilizando la fuerza si es necesario.\n\nCUALIFICACIONES MÍNIMAS\n- Pertenencia al Gremio de Cazarrecompensas y certificación adecuada.\n- Acceso a un vehículo adecuadamente equipado para el combate.\n- Disponibilidad para el despliegue inmediato.\n\nCUALIFICACIONES PREFERIDAS\n- Capacidad para manejar situaciones de alta presión.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
mtps_bounty_desc_rehire=ACERCA DEL TRABAJO\nAunque su rendimiento en el pasado no ha estado a la altura de nuestros estándares, microTech Protection Services ha decidido ofrecerle una oportunidad para redimirse. \n\nPara reevaluar tus habilidades, nos gustaría que detuvieses a ~mission(TargetName) de ~mission(Location|Address).\n\nRESPONSABILIDADES\n- Proporcionar transporte propio a ~mission(Location|Address).\n- Neutralizar a ~mission(TargetName); usando la fuerza si es necesario.\n\nCUALIFICACIONES MÍNIMAS\n- Pertenencia al Gremio de Cazarrecompensas y certificación adecuada.\n- Acceso a un vehículo adecuadamente equipado para el combate.\n- Disponibilidad para el despliegue inmediato.\n\nCUALIFICACIONES PREFERIDAS\n- Capacidad para manejar situaciones de alta presión.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
mtps_bounty_fps_UGF_desc_001=ACERCA DEL TRABAJO\nmicroTech Protection Services busca un cazarrecompensas cualificado para detener a ~mission(TargetName) de ~mission(Location|Address). \n\nAunque habrá otros criminales en el lugar, tu principal objetivo debe ser completar la recompensa.\n\nRESPONSABILIDADES\n- Proporcionar transporte propio a ~mission(Location|Address).\n- Neutralizar a ~mission(TargetName); utilizando la fuerza si es necesario.\n\nCUALIFICACIONES MÍNIMAS\n- Pertenencia al Gremio de Cazarrecompensas y certificación adecuada.\n- Acceso a equipo de combate y medio de transporte.\n- Disponibilidad para el despliegue inmediato.\n\nCUALIFICACIONES PREFERENTES\n- Capacidad para manejar situaciones de alta presión.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
mtps_bounty_fps_UGF_nocivs_desc_001=ACERCA DEL TRABAJO\nmicroTech Protection Services busca un cazarrecompensas cualificado para ayudar en la captura de ~mission(TargetName) de ~mission(Location|Address). Somos conscientes de que puede haber civiles en el lugar, así que tenga cuidado con el posible fuego cruzado.\n\nRESPONSABILIDADES\n- Proporcionar transporte propio a ~mission(Location|Address).\n- Neutralizar ~mission(TargetName); utilizando la fuerza si es necesario.\n- Asegurarse de que no haya víctimas civiles.\n\nCUALIFICACIONES MÍNIMAS\n- Pertenencia al Gremio de Cazarrecompensas y certificación apropiada.\n- Acceso a equipo de combate y medio de transporte.\n- Disponibilidad para despliegue inmediato.\n\nCUALIFICACIONES PREFERIDAS\n- Capacidad para manejar situaciones de alta presión.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
