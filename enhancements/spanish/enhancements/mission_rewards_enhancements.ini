Eckhart_Assassin_Sync_E_Desc_001=Se ha fijado un precio en las cabezas de ~mission(TargetName) y ~mission(TargetName2). \n\nAunque tener que acertar a dos objetivos no es tan raro, el cliente quiere enviar un mensaje muy específico, por lo que necesita que los objetivos acierten exactamente en el mismo momento. Los créditos extra deberían compensar la molestia.\n\nY desafortunadamente, ya que la pareja no viaja junta, no hace falta decir que para lograrlo vas a necesitar algo de ayuda. Asegúrate de llevar a gente de confianza que pueda manejar más de una nave, ya que se sabe que los objetivos viajan con refuerzos. \n\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x2
Eckhart_Assassin_Sync_E_Title_001=Grifo doble <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_H_Desc_001=El contrato es para dos objetivos que deben ser eliminados al mismo tiempo. \n\nSupongo que al cliente le preocupa que si no los eliminan juntos, uno de ellos se vuelva oscuro e intente vengarse.\n\nSe hacen llamar ~mission(TargetName) y ~mission(TargetName2).\n\nBúscate un equipo, divide y vencerás.\n\nY asegúrate de que quien sea tenga habilidades, porque estos dos tienen fama de aguantar bien en una pelea y seguro que no estarán solos. Prepárate para que te den problemas.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x2
Eckhart_Assassin_Sync_H_Title_001=Dos en la cabeza <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_Intro_Desc_001=Me ha llegado un encargo interesante. Necesito dos objetivos separados: ~mission(TargetName) y ~mission(TargetName2) \n\nEl problema es que, si uno se entera de que el otro ha sido atacado, se irán a tierra. No podemos arriesgarnos a perder a ninguno de los dos. \n\nHará falta mucha coordinación, pero quiero que les des a los dos al mismo tiempo. \n\nY como no puedes estar en dos sitios a la vez, necesitarás encontrar a alguien de confianza que te ayude.\n\nPor suerte, mi información dice que ambos objetivos deberían viajar solos. Eso debería facilitarte un poco las cosas.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x1, Targets x2
Eckhart_Assassin_Sync_Intro_Title_001=Desmantelamiento coordinado <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_M_Desc_001=Tengo un contrato para eliminar a dos promesas que han estado causando problemas. Tiene que ser limpio, ambos hechos al mismo tiempo, o de lo contrario podrían causar aún más problemas.  En resumen, necesitarás ayuda en este caso.\n\nTanto ~mission(TargetName) como ~mission(TargetName2) saben cómo manejarse, y la gente con la que vuelan tampoco es ninguna broma. Puedes esperar que cada uno de ellos esté custodiado por unas cuantas naves.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x2
Eckhart_Assassin_Sync_M_Title_001=Doble eliminación <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_S_Desc_001=Normalmente, la pareja ~mission(TargetName) y ~mission(TargetName2) sería demasiado para afrontarla junta. Ambos son lo mejor que se puede hacer en combate aéreo y la tripulación con la que vuelan es casi igual de buena.\n\nPero hace poco se separaron -no se sabe muy bien por qué- y por el momento vuelan por separado.  Alguien piensa que esta puede ser la mejor oportunidad para acabar con ellos. \n\nReúne personal de confianza y planea un ataque simultáneo contra ambos objetivos. Es demasiado peligroso arriesgarse a que uno de ellos sobreviva después de un movimiento tan directo contra ellos.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x2
Eckhart_Assassin_Sync_S_Title_001=Divide y vencerás <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_VE_Desc_001=Tengo otro par que necesitan ser eliminados:\n~mission(TargetName) y ~mission(TargetName2)\n\nHan estado en el viento desde hace unos días, pero acaba de aparecer. Si no los atrapamos ahora, no estoy seguro de que tengamos otra oportunidad.  Necesitas reclutar a un compañero para asegurarte de que ambos objetivos son alcanzados al mismo tiempo.\n\nEn cuanto a que opongan resistencia, ~mission(TargetName) es conocida por traer consigo a un amigo para que les cubra las espaldas, y sospecho que ~mission(TargetName2) hará lo mismo.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x2, Targets x2
Eckhart_Assassin_Sync_VE_Title_001=Combo uno-dos <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_VH_Desc_001=~mission(TargetName) y ~mission(TargetName2).\n\nDos serios operadores que han decidido recientemente hacer un movimiento contra su jefe. Cada uno de ellos viaja con una pequeña armada altamente entrenada y se adentra en territorio que no les pertenece.\n\nTú, y quienquiera que reclutes para ayudar, vais a acabar con ellos y tiene que ser a la vez para que no puedan reagruparse.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x2
Eckhart_Assassin_Sync_VH_Title_001=Combinación mortal <EM4>[500 Rep]</EM4>
