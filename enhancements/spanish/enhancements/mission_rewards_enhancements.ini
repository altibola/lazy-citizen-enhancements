hurston_UGF_eliminateall_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE RECURSOS EXTERNOS\n\nCONTRATO: Barrido de instalaciones\nAFILIACIÓN DEL CONTRATISTA: Independiente\nDIRECTOR DE RECURSOS EXTERNOS: G. Livingston\nEVALUACIÓN DE RIESGOS: Alto\nCONTRATACIÓN URGENTE: No\n\nHurston busca un contratista dispuesto a desalojar a los ocupantes criminales de ~mission(Location|Address).\n\nEl lugar ha sido utilizado para albergar numerosas actividades ilegales, por lo que es imperativo que sea asegurado. \n\nEstás autorizado a tomar las medidas que sean necesarias. El pago se enviará una vez que se confirme que la instalación está limpia. \n\n\n\n** La información transmitida puede contener material confidencial y/o privilegiado. Queda prohibida la revisión, retransmisión, difusión o cualquier otro uso de esta información por personas o entidades distintas de su destinatario. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x20, Sentries x10, Snipers x2
hurston_UGF_eliminateall_nocivs_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE RECURSOS EXTERNOS\n\nCONTRATO: Barrido de instalaciones\nAFILIACIÓN DEL CONTRATISTA: Independiente\nDIRECTOR DE RECURSOS EXTERNOS: K. Restle\nEVALUACIÓN DE RIESGOS: Alto\nCONTRATACIÓN URGENTE: No\n\nHurston busca un contratista dispuesto a desalojar a los ocupantes criminales de ~mission(Location|Address).\n\nEl lugar ha sido utilizado para albergar numerosas actividades ilegales, por lo que es imperativo que esté asegurado. \n\nTen en cuenta que solo puedes enfrentarte a hostiles confirmados. Asaltar a cualquier civil en el lugar se considerará una violación de su contrato. \n\nEl pago se enviará una vez que se confirme que la instalación está despejada. \n\n\n\n** La información transmitida puede contener material confidencial y/o privilegiado. Se prohíbe cualquier revisión, retransmisión, difusión u otro uso de esta información por personas o entidades que no sean el destinatario. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13\n<EM4>Friendlies:</EM4> Civilians x4
