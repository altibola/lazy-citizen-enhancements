missionManager_Charlie_Description=Necesidad inmediata de un Investigador Privado experimentado y discreto cerca de Crusader para investigar un asunto de seguros.\n\nTarifa plana. Sin gastos. Fecha de inicio será lo antes posible. Se deben presentar pruebas suficientes para completar el contrato.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
mtps_RetrieveConsignment_desc_001=ACERCA DEL TRABAJO\nmicroTech Protection Services necesita un profesional de la seguridad para una operación de recuperación en ~mission(Location). El lugar está siendo atacado y las fuerzas de seguridad no responden y se les da por muertos. Creemos que los materiales confidenciales entregados recientemente a las instalaciones para su almacenamiento temporal fueron el objetivo del ataque. Su principal objetivo será recoger esas cajas y entregarlas en un lugar seguro. \n\nPor razones de seguridad, los materiales confidenciales se entregaron como parte de un envío mayor y se aseguraron en la cámara acorazada automatizada. Los materiales tienen códigos de recuperación únicos que deben introducirse en el teclado del transportador de paquetes. Los protocolos exigen que sólo los altos cargos de seguridad puedan llevar un datapad que contenga un código, por lo que tendrás que localizarlos antes de recuperar las cajas. Una vez aseguradas, entrega todo el material confidencial a ~mission(dropoff1) para que te paguen.\n\nRESPONSABILIDADES\n- Proporciona transporte propio a ~mission(Location|address).\n- Usa la fuerza si es necesario para recoger el material confidencial.\n- Entrega el material confidencial a ~mission(dropoff1|address).\n\nREQUISITOS MÍNIMOS\n- 2 años de experiencia combinada como mercenario y/o seguridad.\n- Acceso a equipo de combate. \n- Acceso a una nave espacial que pueda transportar carga.\n- Disponibilidad para despliegue inmediato.\n\nCUALIFICACIONES PREFERENTES\n- Experiencia con técnicas de desescalada rápida de hostilidad.\n- Experiencia transportando carga importante.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Guards x4, Hostiles x54
mtps_RetrieveConsignment_title_001=Defender la ubicación y entregar el envío <EM4>[500–4,000 Rep]</EM4>
mtps_UGF_defend_E_desc_001=ACERCA DEL TRABAJO\nmicroTech Protection Services busca un profesional mercenario orientado a los detalles que pueda reunir un equipo de seguridad para proteger ~mission(Location|Address) contra cualquier amenaza menor. \n\nRESPONSABILIDADES\n- Proporcionar transporte propio a ~mission(Location|Address).\n- Proporcionar equipo de seguridad propio para ayudar.\n- Proteger el lugar contra amenazas hostiles; utilizando la fuerza si es necesario.\n\nCUALIFICACIONES MÍNIMAS\n- 2 años de experiencia combinada como mercenario y/o seguridad.\n- Acceso a equipo de combate y medio de transporte.\n- Disponibilidad para despliegue inmediato.\n\nCUALIFICACIONES PREFERIDAS\n- Experiencia en gestión de equipos.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x1, Hostiles x10, Private Security x4, Sentries x6\n<EM4>Unknown:</EM4> 11
mtps_UGF_defend_E_title_001=Defender la ubicación frente a amenazas menores <EM4>[500 Rep]</EM4>
mtps_UGF_defend_VH_desc_001=ACERCA DEL TRABAJO\nmicroTech Protection Services busca un profesional mercenario orientado a los detalles que pueda formar un equipo de seguridad para proteger ~mission(Location|Address) contra amenazas hostiles graves. \n\nRESPONSABILIDADES\n- Proporcionar transporte propio a ~mission(Location|Address).\n- Proporcionar equipo de seguridad propio para ayudar.\n- Proteger el lugar contra amenazas hostiles; utilizando la fuerza si es necesario.\n\nCUALIFICACIONES MÍNIMAS\n- 2 años de experiencia combinada en mercenarios y/o seguridad.\n- Acceso a equipo de combate y medio de transporte.\n- Disponibilidad para despliegue inmediato.\n\nCUALIFICACIONES PREFERIDAS\n- Experiencia en gestión de equipos.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x3, Hostiles x8, Private Security x4, Sentries x4\n<EM4>Unknown:</EM4> 21
mtps_UGF_defend_VH_title_001=Defender la ubicación frente a amenazas graves <EM4>[500 Rep]</EM4>
mtps_UGF_defend_desc_001=ACERCA DEL TRABAJO\nmicroTech Protection Services busca un profesional mercenario orientado a los detalles que pueda formar un equipo de seguridad para proteger ~mission(Location|Address) contra amenazas hostiles. \n\nRESPONSABILIDADES\n- Proporcionar transporte propio a ~mission(Location|Address).\n- Proporcionar equipo de seguridad propio para ayudar.\n- Proteger el lugar contra amenazas hostiles; utilizando la fuerza si es necesario.\n\nCUALIFICACIONES MÍNIMAS\n- 2 años de experiencia combinada en mercenarios y/o seguridad.\n- Acceso a equipo de combate y medio de transporte.\n- Disponibilidad para despliegue inmediato.\n\nCUALIFICACIONES PREFERIDAS\n- Experiencia en gestión de equipos.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x8, Private Security x4, Sentries x8\n<EM4>Unknown:</EM4> 10
