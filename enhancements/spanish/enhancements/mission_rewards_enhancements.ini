LingFamily_LocalDelivery_desc_01=Hola,\n\nEspero que estés disponible para hacer una entrega. ~mission(Contractor|Family)\n\nPAQUETE PARA RECOGIDA\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n\nLUGAR DE ENTREGA\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n\nAvísame si puedes hacerlo.\n\nGracias, \nConni Ling\nCoordinador de Envíos\nLing Family Hauling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250
LingFamily_LocalDelivery_desc_02=Hola,\n\nNecesitamos a alguien para hacer un recorrido de entrega. ~mission(Contractor|Family)\n\nPAQUETES PARA RECOGIDA (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n - Paquete #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n\nLUGARES DE ENTREGA (CUALQUIER ORDEN)  OFF LOCATIONS (ANY ORDER)\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n - Paquete #~mission(item2|serialnumber) a ~mission(Dropoff2|Address)\n\nEspero que estés disponible.\n\nGracias, \nConni Ling\nCoordinadora de envíos\nLing Family Hauling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
LingFamily_LocalDelivery_desc_03=Hola,\n\nNecesitamos que hagas un envío para nosotros. ~mission(Contractor|Family). Aquí tienes un desglose:\n\nPAQUETES PARA RECOGIDA (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n - Paquete #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n - Paquete #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n\nLUGARES DE ENTREGA (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n - Paquete #~mission(item2|serialnumber) a ~mission(Dropoff2|Address)\n - Paquete #~mission(item3|serialnumber) a ~mission(Dropoff3|Address)\n\nGracias, \nConni Ling\nCoordinadora de Envíos\nLing Family Hauling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
LingFamily_LocalDelivery_desc_04=Tengo una solicitud de entrega que podría utilizar.\n~mission(Contractor|Family)\n\nPAQUETES PARA RECOGER (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n - Paquete #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n - Paquete #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n - Paquete #~mission(item4|serialnumber) de ~mission(Pickup4|Address)\n\nLUGARES DE ENTREGA (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n - Paquete #~mission(item2|serialnumber) a ~mission(Dropoff2|Address)\n - Paquete #~mission(item3|serialnumber) a ~mission(Dropoff3|Address)\n - Paquete #~mission(item4|serialnumber) a ~mission(Dropoff4|Address)\n\nGracias,\nConni Ling\nCoordinadora de Envíos\nLing Family Hauling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
LingFamily_LocalDelivery_desc_05=Hola,\n\nSé que Conni normalmente se encarga de estas cosas, pero está fuera por la tarde. De todos modos, tengo un descenso de tamaño de ejecución para usted.\n\nDe todos modos, si estoy leyendo la factura correctamente, el envío es - \n\nPAQUETES PARA RECOGER (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n - Paquete #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n - Paquete #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n - Paquete #~mission(item4|serialnumber) de ~mission(Pickup4|Address)\n - Paquete #~mission(item5|serialnumber) de ~mission(Pickup5|Address)\n\nUBICACIONES DROP (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n - Paquete #~mission(item2|serialnumber) a ~mission(Dropoff2|Address)\n - Paquete #~mission(item3|serialnumber) a ~mission(Dropoff3|Address)\n - Paquete #~mission(item4|serialnumber) a ~mission(Dropoff4|Address)\n - Paquete #~mission(item5|serialnumber) a ~mission(Dropoff5|Address)\n\nBuena suerte ahí fuera.\n\n-Davi Ling\nPropietario \nLing Family Hauling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
LingFamily_LocalDelivery_desc_intro=Hola,\n\nSomos una pequeña empresa familiar de reparto que actualmente busca nuevos contratistas en la zona de Crusader. \n\nSi usted está interesado en trabajar con nosotros, la siguiente entrega sería una gran prueba para ver si usted es un buen partido para la empresa.\n\nPAQUETE PARA RECOGIDA\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n\nLUGAR DE ENTREGA\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n\nSi todo va bien, se convertirá en el nuevo miembro de Ling Family Hauling.\n\nGracias, \nConni Ling\nCoordinador de Envíos\nLing Family Hauling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +100
LingFamily_LocalDelivery_desc_rehire=Hola,\n\nNo me emociona tener que hacer esto, pero tenemos escasez de contratistas y más entregas que nunca. Estoy dispuesto a darte otra oportunidad, pero necesitas completar la siguiente entrega. \n\nPAQUETES PARA RECOGER (CUALQUIER PEDIDO)\n - Paquete #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n - Paquete #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n - Paquete #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n\nLUGARES DE ENTREGA (CUALQUIER PEDIDO)  LUGARES DE ENTREGA (CUALQUIER ORDEN)\n - Paquete #~mission(item1|serialnumber) a ~mission(Dropoff1|Address)\n - Paquete #~mission(item2|serialnumber) a ~mission(Dropoff2|Address)\n - Paquete #~mission(item3|serialnumber) a ~mission(Dropoff3|Address)\n\nGracias, \nConni Ling\nCoordinadora de Envíos\nLing Family Hauling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
