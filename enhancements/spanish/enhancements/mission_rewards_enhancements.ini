cfp_defend-criminals_desc_001=~Mission(location|address) está bajo amenaza de ataque por parte de forajidos y ha pedido ayuda. Necesitamos que alguien los proteja y ahuyente a los forajidos. \n\nAsegúrate de permanecer cerca después de su ataque inicial. Con demasiada frecuencia, los forajidos ganan peleas simplemente enviando más cuerpos de los que cualquiera puede defender razonablemente, así que asegúrate de luchar contra los refuerzos antes de abandonar el área. \n\nLima Endicott\nDespachador principal\nCiudadanos por Pyro\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro]</EM4>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM4>[Pyro RegionB]</EM4>\n- Karna "Fate" Rifle\n- [S1-A] Artimex Arms (Modified)\n- [S1-A] Artimex Core (Modified)\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x6, Juggernauts x2, Soldiers x10, Technicians x4\n<EM4>Neutral:</EM4> +75 Rep\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend-criminals_title_001=Defender ~mission(Location) de los forajidos <EM4>[BP]</EM4> <EM4>[75–200 Rep]</EM4>
cfp_defend-xenothreat_desc_001=Nos enteramos de que XenoThreat está a punto de lanzar un ataque a ~mission(Location|Address) . Si tienen éxito, se espera que el número de víctimas sea elevado. Espero que con tu ayuda para defenderlos podamos asegurarnos de que eso no suceda.\n \nSabemos por encuentros pasados que XenoThreat envía varios grupos de asalto para llevar a cabo sus ataques, así que asegúrate de no irte. el puesto de avanzada hasta que hayas rechazado todos los refuerzos. \n\nLima Endicott\nDespachador principal\nCiudadanos por Pyro\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Fate" Rifle\n- [S1-A] Artimex Arms (Modified)\n- [S1-A] Artimex Core (Modified)\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x9, Soldiers x7, Technicians x9\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend-xenothreat_desc_002=¡Urgente!\n\nXenoThreat tiene como objetivo ~mission(Location|Address) para enviar un mensaje a otros colonos sobre lo que sucede si aceptan nuestro apoyo. \n\nSi eres capaz de defenderte de ellos, estoy seguro de que enviarán fuerzas adicionales, por lo que tendrás que defenderte para múltiples ataques. Dado que XenoThreat tiene muchos recursos a su disposición, deberías pensar en reclutar a otros para que te ayuden a mantener a todos a salvo.\n\nTodos contamos contigo.\n\nLima Endicott\nDespachador principal\nCiudadanos de Pyro\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x2, Juggernauts x1, Snipers x2, Soldiers x4, Technicians x4\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend-xenothreat_desc_003=¡Urgente!\n\nXenoThreat se está movilizando para una incursión masiva para borrar ~mission(Location|Address) del mapa. Eres su única esperanza de soportar este asalto y protegerlos de la crueldad de XenoThreat.\n\nSé que te estoy pidiendo que te pongas en la línea de fuego, pero Pyro no cambiará a menos que personas como tú sean lo suficientemente valientes para asumir estos peligros. Ninguna cantidad de créditos podría compararse con el bien que harías al intervenir.\n\nSi estás dispuesto y eres capaz de asumir esta misión, asegúrate de llevar algunos aliados contigo. Sin duda, XenoThreat enviará refuerzos más fuertes una vez que se den cuenta de que están sufriendo pérdidas.\n\nCreemos en ti.\n\nLima Endicott\nDespachador principal\nCiudadanos para Pyro\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> CQC x4, Juggernauts x2, Snipers x3, Soldiers x8, Technicians x4\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
