Redwind_internaldelivery_dc_desc_001=RED WIND LINEHAUL\n'SUS BIENES EN BUENAS MANOS'\n----------------------\n\nLa gente de ~mission(Location|Address) están haciendo una limpieza y quieren que algunos paquetes se muevan por las instalaciones.\n\nPAQUETES PARA RECOGER (CUALQUIER PEDIDO)\n · Paquete # ~mission(item1|serialnumber) de ~mission(Pickup1) \n · Paquete # ~mission(item2|serialnumber) de la ~mission(Pickup2) \n\nUBICACIONES DE ENTREGA (CUALQUIER PEDIDO)\n · Paquete # ~mission(item1|serialnumber) a la ~mission(Dropoff1) \n · Paquete # ~mission(item2|serialnumber) a la ~mission(Dropoff2) \n\nNecesitan que se haga de manera eficiente y sin muchas molestias.\n\n\nNO ACEPTE ESTE CONTRATO, a menos que sea confiable. Red Wind tiene una reputación en la que nuestros clientes confían y por una buena razón. \n\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Redwind_internaldelivery_dc_desc_003=RED WIND LINEHAUL\n'SUS PRODUCTOS EN BUENAS MANOS'\n------------------------------------\n\nTengo algunas cajas que necesito reorganizándose en ~mission(Location|Address) .\n\nPAQUETES PARA RECOGER (CUALQUIER PEDIDO)\n · Paquete # ~mission(item1|serialnumber) de ~mission(Pickup1) \n · Paquete # ~mission(item2|serialnumber) de la ~mission(Pickup2) \n · Paquete # ~mission(item3|serialnumber) de la ~mission(Pickup3) \n · Paquete # ~mission(item4|serialnumber) de la ~mission(Pickup4) \n \nUBICACIONES DE ENTREGA (CUALQUIER PEDIDO)\n · Paquete # ~mission(item1|serialnumber) a la ~mission(Dropoff1) \n · Paquete # ~mission(item2|serialnumber) a la ~mission(Dropoff2) \n · Paquete # ~mission(item3|serialnumber) a la ~mission(Dropoff3) \n · Paquete # ~mission(item4|serialnumber) a la ~mission(Dropoff4) \n\n\nA TODOS LOS VETERANOS: Red Wind agradece su servicio a nuestro ¡Imperio! ¡Tus luchas significan nuestra libertad! \norte\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
Redwind_internaldelivery_dc_desc_005=RED WIND LINEHAUL\n'SUS BIENES EN BUENAS MANOS'\n----------------------------\n\nParece que hubo un Un pequeño problema logístico en ~mission(Location|Address) y necesitan que alguien se asegure de que los paquetes extraviados terminen donde se supone que deben ir dentro de las instalaciones.\n\nPAQUETES PARA RECOGER (CUALQUIER PEDIDO)\n · Paquete # ~mission(item1|serialnumber) de la ~mission(Pickup1) \n · Paquete # ~mission(item2|serialnumber) de la ~mission(Pickup2) \n · Paquete # ~mission(item3|serialnumber) de ~mission(Pickup3) \n · Paquete # ~mission(item4|serialnumber) de ~mission(Pickup4) \n · Paquete # ~mission(item5|serialnumber) de ~mission(Pickup5) \n · Paquete # ~mission(item6|serialnumber) de la ~mission(Pickup6) \n\n\nUBICACIONES DE ENTREGA (CUALQUIER PEDIDO)\n · Paquete # ~mission(item1|serialnumber) a la ~mission(Dropoff1) \n · Paquete # ~mission(item2|serialnumber) a la ~mission(Dropoff2) \n · Paquete # ~mission(item3|serialnumber) a la ~mission(Dropoff3) \n · Paquete # ~mission(item4|serialnumber) a la ~mission(Dropoff4) \ n · Paquete # ~mission(item5|serialnumber) a la ~mission(Dropoff5) \n · Paquete # ~mission(item6|serialnumber) a la ~mission(Dropoff6) \n\n\n\nLa confianza va en dos direcciones: por Al aceptar este contrato, usted se compromete a no fastidiarnos y Red Wind Linehaul se compromete a tratarlo de la misma manera. \norte\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000
Redwind_internaldelivery_dc_title_001=Manejador de paquetes de viento rojo <EM4>[500–2,000 Rep]</EM4>
RepairOxygenKiosk_DescriptionLong=Hola Huéspedes,\n\nRecientemente hemos sido alertados de que uno de nuestros Dispensadores de Oxígeno ha sufrido un error técnico. Como sabéis, estos quioscos son vitales para garantizar que tengáis suficiente oxígeno a mano mientras participáis en nuestro Programa de Liberación Laboral.\n\nEstamos buscando a algún huésped disponible para que reinicie el quiosco. Eso debería reconectar el quiosco a la red y resolver el problema. El primer huésped que sea capaz de completar esta tarea no sólo será recompensado con méritos, sino también con la satisfacción de que está haciendo que el lugar de trabajo sea más seguro para otros huéspedes.\n\nGracias.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100
RepairOxygenKiosk_Title=Oportunidad de mantenimiento de reclusos <EM4>[100 Rep]</EM4>
