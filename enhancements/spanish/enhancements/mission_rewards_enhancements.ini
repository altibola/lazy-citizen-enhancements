blacjac_RetrieveConsignment_desc_001=ATTN: Mercenarios con experiencia en manipulación de carga\n\nNine Tails están asaltando actualmente una de nuestras instalaciones en ~mission(Location|address). Como acaban de recibir una entrega de material confidencial, no creemos que se trate de una coincidencia. BlacJac necesita que alguien se apresure a llegar al lugar y asegurar estas importantes cajas antes de que lo hagan los Nine Tails. Está autorizado a usar fuerza letal contra cualquiera que intente detenerle. \n\nComo parte de nuestro protocolo de seguridad estándar, los materiales confidenciales se integraron en otro envío y se aseguraron en la cámara acorazada automatizada. Tendrá que encontrar los códigos de recuperación correspondientes al envío e introducirlos en el transportador de paquetes para recuperar las cajas. Los códigos de recuperación se almacenan localmente en datapads y sólo se entregan al personal de alto rango, así que tendrás que localizarlos primero. Esperemos que estén vivos para ayudarte, pero teniendo en cuenta el apagón total de las comunicaciones, nos tememos que no sea el caso. \n\nUna vez que haya reunido todos los materiales confidenciales, tendrán que ser entregados a ~mission(dropoff1|address). El pago depende de su entrega.\n\nGracias,\nGloria Mesa\n\nSupervisor de Contrato Privado\nBlacJac Security, "Protección Proporcionada"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Guards x4, Hostiles x54
blacjac_RetrieveConsignment_title_001=Proteger el emplazamiento y procurar la consignación <EM4>[500–4,000 Rep]</EM4>
blacjac_UGF_defend_E_desc_001=ATTN: Operadores mercenarios verificados\n\nUno de los emplazamientos bajo la responsabilidad de BlacJac se ha enfrentado a unos cuantos forajidos locales. Nos gustaría que se dirigieran a ~mission(Location|Address) y aseguraran el lugar de estas amenazas hostiles.\n\nPor los primeros informes, espero que sea un asunto bastante sencillo, pero si les hace sentir mejor, no duden en reclutar un equipo que les proporcione apoyo adicional.\n\nGracias,\nGloria Mesa\n\nSupervisora de contratos privados\nBlacJac Security, "Protección proporcionada"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x1, Hostiles x10, Private Security x4, Sentries x6\n<EM4>Unknown:</EM4> 11
blacjac_UGF_defend_E_title_001=Defender el sitio de amenazas menores <EM4>[500 Rep]</EM4>
blacjac_UGF_defend_VH_desc_001=ATTN: Operadores Mercenarios Verificados\n\nHe recibido un informe de que algunos operadores están planeando hacer un movimiento contra ~mission(Location|Address). BlacJac quiere que formes un equipo y defiendas el lugar de esta peligrosa amenaza.\n\nSe recomienda encarecidamente que no intentes realizar este contrato en solitario. Contratar a un equipo de mercenarios cualificados para proporcionar apoyo sería la ruta más inteligente.\n\nGracias,\nGloria Mesa\n\nSupervisor de Contrato Privado\nBlacJac Security, "Protección Proporcionada"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x3, Hostiles x8, Private Security x4, Sentries x4\n<EM4>Unknown:</EM4> 21
blacjac_UGF_defend_VH_title_001=Defender el sitio de una amenaza peligrosa <EM4>[500 Rep]</EM4>
blacjac_UGF_defend_desc_001=ATTN: Operadores Mercenarios Verificados\n\nNos han llegado noticias de que algunos musculosos locales han estado haciendo amenazas contra ~mission(Location|Address). BlacJac quiere que formes un equipo y protejas el lugar de estas amenazas hostiles.\n\nY por mucho que nos gusten los créditos, no te recomiendo que intentes hacer esto en solitario. Contratar a un equipo sería beneficioso para tu sustento.\n\nGracias,\nGloria Mesa\n\nSupervisor de Contrato Privado\nBlacJac Security, "Protección Proporcionada"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x8, Private Security x4, Sentries x8\n<EM4>Unknown:</EM4> 10
blacjac_UGF_defend_title_001=Defender el sitio de las amenazas <EM4>[500 Rep]</EM4>
blacjac_UGF_destroy_E_desc_001=ATTN: Operadores mercenarios verificados\n\nParece que hay un nuevo operador intentando fabricar drogas en ~mission(Location|Address), pero el producto que está produciendo es extremadamente tóxico. \n\nEstamos estudiando cómo llevar a cabo las detenciones, pero lo importante es evitar que se distribuyan más suministros. Necesito que vayas allí y destruyas las drogas que están almacenando.\n\nEs muy probable que la instalación no esté abandonada, así que podrías encontrarte con estos matones cuando vayas allí, así que prepárate para una pelea. Pero si su destreza con las armas se parece a su química, probablemente no será una gran pelea. \n\nGracias,\nGloria Mesa\n\nSupervisora de Contratos Privados\nBlacJac Security, "Protección Proporcionada"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Civilians x4
blacjac_UGF_destroy_E_title_001=Eliminar el alijo de drogas <EM4>[500 Rep]</EM4>
blacjac_UGF_destroy_H_desc_001=ATTN: Operadores mercenarios verificados\n\nAlgunos químicos emprendedores han creado un nuevo producto que es el doble de potente y el doble de letal que el producto normal. Hemos podido rastrear algunas muestras hasta la fuente en ~mission(Location|Address). \n\nBlacJac quiere que te dirijas allí lo antes posible para destruir todo el lote antes de que pueda dañar a la población. Podemos preocuparnos de hacer arrestos más tarde.\n\nPor todo lo que sabemos de esta banda, deberías esperar encontrar una fuerte resistencia al intentar limpiar el alijo.\n\n\nGracias,\nGloria Mesa\n\nSupervisora de Contratos Privados\nSeguridad BlacJac, "Protección Proporcionada"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
blacjac_UGF_destroy_H_title_001=Destruir drogas peligrosas <EM4>[500 Rep]</EM4>
blacjac_UGF_destroy_desc_001=ATTN: Operadores mercenarios verificados\n\nNos han informado de que un sindicato ha pinchado un paquete de droga de un rival y está causando el caos en las calles. Los forenses han identificado la fuente, una planta de producción en ~mission(Location|Address). Se dice que los fabricantes de la droga ni siquiera saben que tienen una cosecha envenenada entre manos.\n\nEstamos estudiando cómo manejar los arrestos, pero lo importante es sacar esta mierda de las calles ahora. Necesito que vayas allí y destruyas las drogas que están almacenando en el lugar.\n\nNo estarán contentos con ello, así que probablemente tendrás una pelea en tus manos, pero lo importante es limpiar el producto.\n\nGracias,\nGloria Mesa\n\nSupervisora de Contratos Privados\nBlacJac Security, "Protección Proporcionada"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
blacjac_UGF_destroy_title_001=Deshacerse de las drogas <EM4>[500 Rep]</EM4>
blacjac_UGF_eliminateall_allies_desc_001=ATTN: Operadores mercenarios verificados\n\nEl equipo de seguridad de ~mission(Location|Address) nos ha informado de que algunos de los canallas locales han estado lanzando ataques. BlacJac quiere que vayas al lugar y ayudes a protegerlo de amenazas hostiles.\n\nAsegúrate de comprobar tu fuego allí. No quiero oír hablar de ningún incidente azul contra azul.\n\nGracias,\nGloria Mesa\n\nSupervisor de Contrato Privado\nSeguridad BlacJac, "Protección Proporcionada"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
blacjac_UGF_eliminateall_allies_desc_intro=ATTN: Operadores Mercenarios Verificados\n\nBlacJac está buscando ampliar nuestra lista de profesionales de la seguridad. Para evaluar si eres una buena opción, nos gustaría que prestaras apoyo en ~mission(Location|Address) ya que han estado teniendo problemas con algunos hostiles en la zona.\n\nSi eres capaz de ayudar a proteger el lugar y eliminar la amenaza, podremos ofrecerte más trabajo de seguridad.\n\nTen en cuenta que no se tolerarán incidentes de fuego amigo.\n\nBuena suerte,\nGloria Mesa\n\nSupervisor de Contrato Privado\nBlacJac Security, "Protección Proporcionada"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
blacjac_UGF_eliminateall_allies_desc_rehire=ATTN: Antiguo operador mercenario\n\nSoy consciente de que BlacJac ha dejado de ofrecer trabajos de seguridad, pero debido a cambios de personal se ha decidido ofrecerte otra oportunidad.\n\nNos han informado de que ~mission(Location|Address) necesita ayuda para enfrentarse a una banda local de forajidos. BlacJac quiere que vayas al lugar y ayudes a eliminar esta amenaza.\n\nY como ya estás en la cuerda floja, no quiero oír que has estado involucrado en ningún incidente de fuego amigo.\n\nSi eres capaz de llevar a cabo esta operación, podemos ver si te readmiten.\n\nGracias,\nGloria Mesa\n\nSupervisor de Contratos Privados\nBlacJac Security, "Protección Proporcionada"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
blacjac_UGF_eliminateall_allies_title_001=Proteger el sitio <EM4>[500 Rep]</EM4>
blacjac_UGF_eliminateall_allies_title_intro=Contrato de prueba de emplazamientos protegidos <EM4>[500 Rep]</EM4>
blacjac_UGF_eliminateall_allies_title_rehire=Contrato de prueba de emplazamientos protegidos <EM4>[500 Rep]</EM4>
blacjac_UGF_eliminateall_desc_001=ATTN: Operadores mercenarios verificados\n\nNos han informado de que ~mission(Location|Address) está siendo utilizada por algunos criminales locales como base de operaciones. BlacJac necesita que se barra el lugar y se saque de allí a cualquier habitante. \n\nEstá autorizado a usar fuerza letal si es necesario.\n\nGracias,\nGloria Mesa\n\nSupervisor de Contratos Privados\nBlacJac Security, "Protección Proporcionada"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x15
blacjac_UGF_eliminateall_nocivs_desc_001=ATTN: Operadores mercenarios verificados\n\nNos han informado de que ~mission(Location|Address) está siendo utilizada por algunos criminales locales como base de operaciones. BlacJac quiere que barráis el lugar y eliminéis a los hostiles. \n\nNuestros primeros informes muestran que hay una buena probabilidad de que la banda tenga algunos civiles trabajando para ellos en el lugar. No queremos ser noticia, así que recuerden que sólo pueden enfrentarse a hostiles confirmados. \n\nGracias,\nGloria Mesa\n\nSupervisora de Contratos Privados\nBlacJac Security, "Protección Proporcionada"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13\n<EM4>Friendlies:</EM4> Civilians x4
blacjac_UGF_eliminateall_title_001=Limpieza del sitio <EM4>[500 Rep]</EM4>
blacjac_bounty_desc_ERT=ATTN: Cazarrecompensas\n\nEs posible que ya hayas oído hablar de ~mission(TargetName). Son un objetivo de riesgo extremo y han estado apareciendo en los titulares recientemente. Esperamos que puedas formar un equipo de respuesta y ayudar a BlacJac a acabar con ellos para siempre. Nuestra información más reciente indica que su nave subcapital y sus escoltas fuertemente armados sobrevuelan ~mission(Location|Address).\n \nTe recomiendo que te asegures de tener una huella actualizada antes de salir. Por si acaso. \n\nBuena suerte,\nGloria Mesa\n\nSupervisora de contratos privados\nBlacJac Security, "Protección proporcionada"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
blacjac_bounty_desc_HRT=ATTN: Cazarrecompensas\n\nTu próxima recompensa, ~mission(TargetName), se considera un objetivo de alto riesgo por una buena razón. Se sabe que viajan con una gran potencia de fuego y van escoltados por suficiente protección como para que cualquiera se lo piense dos veces antes de buscar pelea.\n\nLas fuentes indican que ~mission(TargetName|Last) se esconde en ~mission(Location|Address). Cuando salgas a buscarlos, asegúrate de estar preparado. Incluso podrías pensar en llevar refuerzos. \n\nGracias,\nGloria Mesa\n\nSupervisora de contratos privados\nBlacJac Security, "Protección proporcionada"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
blacjac_bounty_desc_LRT=ATTN: Cazarrecompensas\n\nHa llegado una recompensa por un objetivo de bajo riesgo llamado ~mission(TargetName). El objetivo en sí no es mucho de lo que preocuparse, pero parece que suelen volar en manada, así que hay muchas posibilidades de que tengan algunos amigos cuando los localicéis.\n\nHablando de eso, yo empezaría la caza en ~mission(Location|Address) ya que tenemos informes de que han sido vistos en la zona.\n\nGracias,\nGloria Mesa\n\nSupervisor de contratos privados\nBlacJac Security, "Protección proporcionada"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
blacjac_bounty_desc_MRT=ATTN: Cazarrecompensas\n\nNecesitamos que resuelvan la ~mission(TargetName), una recompensa de riesgo moderado vista por última vez en ~mission(Location|Address) pilotando una pequeña nave con varias tripulaciones. \n\nNo pudimos obtener detalles sobre qué pilotaban exactamente, pero parece que llevaban algunas otras naves con ellos. Prepárate para un poco de resistencia cuando vengas.\n\nGracias,\nGloria Mesa\n\nSupervisor de Contrato Privado\nSeguridad BlacJac, "Protección Proporcionada"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
blacjac_bounty_desc_VHRT=ATTN: Cazarrecompensas\n\nBlacJac acaba de recibir la noticia de que un objetivo de muy alto riesgo, ~mission(TargetName), ha sido visto moviéndose por las rutas de vuelo de ~mission(Location|Address) pilotando una formidable nave con una fuerte escolta. \n\nQueremos cerrar esta recompensa antes de que cometan más crímenes. Reúne los recursos o el apoyo que necesites y sal en cuanto puedas.\n\nGracias,\nGloria Mesa\n\nSupervisora de contratos privados\nBlacJac Security, "Protección proporcionada"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
blacjac_bounty_desc_VLRT=ATTN: Cazarrecompensas\n\nTengo un objetivo de muy bajo riesgo del que necesito que os ocupéis: ~mission(TargetName).\n\nSu última ubicación conocida fue ~mission(Location|Address).\n\nSe trata de una recompensa de baja amenaza, así que espero que puedas eliminarla bastante rápido. Normalmente pilotan una nave pequeña y no tienen muchos conocidos. No hay nada más sencillo que eso.\n\nGracias,\nGloria Mesa\n\nSupervisor de contratos privados\nBlacJac Security, "Protección proporcionada"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x1, Targets x1
blacjac_bounty_desc_intro=ATTN: Cazarrecompensas\n\nNo sé si te interesa, pero BlacJac está buscando ampliar nuestra lista de cazarrecompensas. Tenemos más trabajos de los que nuestros contratistas actuales pueden manejar, así que espero que puedas ayudarnos a cubrir algunas de las vacantes. \n\nTus cualificaciones parecen buenas sobre el papel, pero antes de hacer nada oficial, BlacJac necesita ver cómo te desenvuelves en el campo de primera mano. Incluso tenemos un caso de prueba preparado: queremos que te encargues de ~mission(TargetName). Fueron vistos por última vez en ~mission(Location|Address). Debería ser una recompensa bastante sencilla sin demasiada resistencia. Perfecto para afilar los dientes.\n\nBuena suerte,\nGloria Mesa\n\nSupervisor de contratos privados\nBlacJac Security, "Protección proporcionada"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
blacjac_bounty_desc_rehire=ATTN: Antiguo cazarrecompensas de BlacJac\n\nSé que tu última cacería de recompensas para BlacJac no fue bien, pero el aumento de casos significa que tienes la suerte de tener otra oportunidad.\n\nSi eres capaz de completar la recompensa de ~mission(TargetName) en ~mission(Location|Address), entonces podremos ver si te reincorporan.\n\nGracias,\nGloria Mesa\n\nSupervisora de Contratos Privados\nBlacJac Security, "Protección Proporcionada"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
blacjac_bounty_fps_UGF_desc_001=ATTN: Cazarrecompensas\n\nTengo una recompensa que hay que cobrar en ~mission(TargetName). El cabrón se esconde en ~mission(Location|Address) con un montón de escoria, así que ten cuidado al entrar.\n\nGracias,\nGloria Mesa\n\nSupervisor de contratos privados\nBlacJac Security, "Protección proporcionada"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13, Targets x1
blacjac_bounty_fps_UGF_nocivs_desc_001=ATTN: Cazarrecompensas\n\nNecesito que cojan una recompensa por el nombre de ~mission(TargetName) en ~mission(Location|Address). Aunque puede haber otros cómplices criminales en la escena, quiero que tengáis cuidado con los civiles o trabajadores que puedan estar allí.\n\nYa tengo bastante con lo que lidiar, así que no necesito estar explicando por qué un contratista disparó a un grupo de civiles.\n\n\nGracias,\nGloria Mesa\n\nSupervisor de Contratos Privados\nBlacJac Security, "Protección Proporcionada"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
blacjac_bounty_fps_desc_001=ATTN: Cazarrecompensas\n\nBlacJac tiene una recompensa que necesita ser cobrada. Perp va por: ~mission(TargetName). \n\nHemos podido localizarlos en ~mission(Location|Address) pero no tenemos una evaluación completa de las condiciones sobre el terreno, así que tengan cuidado al entrar en el lugar.\n\nGracias,\nGloria Mesa\n\nSupervisor de contratos privados\nBlacJac Security, "Protección proporcionada"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
blacjac_bounty_fps_desc_first=ATTN: Cazarrecompensas\n\nTengo más recompensas que cazarrecompensas en este momento, así que estoy buscando ampliar nuestra lista. \n\nSi hacéis un buen trabajo en este primero, habrá más contratos. \n\nVeamos cómo te va con la recompensa de ~mission(TargetName). Se cree que se esconden en ~mission(Location|Address). \n\nGracias,\nGloria Mesa\n\nSupervisor de Contrato Privado\nBlacJac Security, "Protección Proporcionada"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13, Targets x1
blacjac_bounty_fps_desc_rehire=ATTN: Antiguo Cazarrecompensas BlacJac\n\nSé que BlacJac dejó de darte contratos de cazarrecompensas, pero los tiempos cambian y aquí estamos dándote otra oportunidad.\n\nSi eres capaz de completar la recompensa en ~mission(TargetName) en ~mission(Location|Address) entonces podemos ver si te reincorporamos.\n\nGracias,\nGloria Mesa\n\nSupervisora de Contratos Privados\nSeguridad BlacJac, "Protección Proporcionada"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13, Targets x1
