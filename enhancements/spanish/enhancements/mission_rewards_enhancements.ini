PU_GhostHollow_Information_Desc=¿Alguna vez has querido que los créditos aparezcan por arte de magia? Un montón de viejos terminales de crédito CCB están actualmente activos y falsificando transacciones bancarias para desviar fondos a quienquiera que controle los terminales. Si quieres participar, te vendo las coordenadas por un módico precio. Será mejor que te des prisa si quieres hacer una jugada. No sé cuánto tiempo seguirá funcionando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
