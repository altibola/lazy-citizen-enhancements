shubin_claimsweep_desc_easy=PUESTO: Seguridad / Mercenario \nUBICACIÓN: ~mission(LagrangeLocation)\nEXPERIENCIA LABORAL: Piloto de Combate (Experiencia Militar un plus)\nCONDICIONES*: \nAcabamos de recibir la noticia de que un contratista de Shubin ha sido expulsado de una de nuestras reclamaciones por unos forajidos que operan allí ilegalmente. Para complicar aún más las cosas, han instalado algunos centinelas orbitales para protegerse mientras minan. \n\nNuestra esperanza es contratar a un mercenario que pueda buscar y destruir a los centinelas en ~mission(location). Si te encuentras con un minero ilegal en el lugar, ten en cuenta que es práctica común que estos tipos contacten con los refuerzos para pedir ayuda. Sería mejor neutralizarlos lo antes posible antes de que puedan hacerlo. \n\n\n\n\n*Shubin Interstellar es un contratista que ofrece igualdad de oportunidades. Al aceptar este contrato usted asume todos y cada uno de los riesgos asociados al trabajo aquí descrito y en ningún caso Shubin Interstellar podrá ser considerada responsable de los daños que se produzcan durante la duración del contrato.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x3, Prospectors x1\n<EM4>Turrets:</EM4> 1 (hostile)
shubin_claimsweep_desc_hard=PUESTO: Seguridad / Mercenario \nUBICACIÓN: ~mission(LagrangeLocation)\nEXPERIENCIA LABORAL: Piloto de Combate (Experiencia Militar un Plus)\nPLAZOS*: \nUn equipo minero local independiente de Stanton estaba trabajando ~mission(Location) como contratistas de Shubin Interstellar cuando una fuerza hostil atacó y se apoderó del lugar. Creemos que los perpetradores siguen en el yacimiento utilizando el equipo abandonado para cosechar el valioso mineral que allí se encuentra.\n\nEntre el equipo perdido había un puñado de centinelas orbitales que, por desgracia, aún no se habían desplegado por completo en el momento del ataque. Los escaneos de largo alcance del yacimiento nos han llevado a la conclusión de que los forajidos han activado los centinelas orbitales y los están utilizando para proteger sus operaciones ilegales.\n\nPara recuperar el yacimiento, buscamos contratistas que vayan a ~mission(Location), destruyan los centinelas orbitales y limpien el yacimiento de mineros hostiles. Se recomienda encarecidamente la eficiencia, ya que existe un alto riesgo de que pidan refuerzos en cuanto descubran que están siendo desalojados. \n\n\n\n\n*Shubin Interstellar es un contratista que ofrece igualdad de oportunidades. Al aceptar este contrato, usted asume todos y cada uno de los riesgos asociados al trabajo aquí descrito y Shubin Interstellar no podrá ser considerada responsable de ningún daño que se produzca durante la duración del contrato.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x5, Prospectors x4\n<EM4>Turrets:</EM4> 4 (hostile)
shubin_claimsweep_desc_intro=PUESTO: Seguridad / Mercenario \nUBICACIÓN: ~mission(LagrangeLocation)\nEXPERIENCIA LABORAL: Piloto de combate (se valorará experiencia militar)\nCONDICIONES*: \nRecientemente se ha descubierto que una mina de Shubin ha sido explotada ilegalmente por un minero sin escrúpulos. Aunque parece que el minero ya no roba mineral del yacimiento, ha dejado un centinela orbital que nos impide recuperarlo gracias a su capacidad ofensiva.\n\nBuscamos un mercenario dispuesto a viajar a ~mission(location) para cazar al centinela y destruirlo como preparación para que Shubin recupere el yacimiento.\n\n\n\n\n*Shubin Interstellar es un contratista que ofrece igualdad de oportunidades. Al aceptar este contrato usted está asumiendo todos y cada uno de los riesgos asociados con el trabajo descrito en este documento y de ninguna manera Shubin Interstellar puede ser considerado responsable de cualquier daño acumulado durante la duración del contrato.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Turrets:</EM4> 1 (hostile)
shubin_claimsweep_desc_med=PUESTO: Seguridad / Mercenario \nUBICACIÓN: ~mission(LagrangeLocation)\nEXPERIENCIA LABORAL: Piloto de Combate (Experiencia Militar un plus)\nPLAZOS*: \nSe ha descubierto que una explotación minera interestelar Shubin recientemente adquirida y pendiente de procesamiento ha sido asaltada por un grupo de mineros deshonestos que están robando activamente mineral del lugar.  Aunque las autoridades locales han sido notificadas, existe la preocupación de que valiosos activos puedan ser cosechados antes de que una investigación oficial pueda ser lanzada.\n\nPor lo tanto, como es nuestro derecho como titulares de reclamos, deseamos asegurar una fuerza mercenaria para ir a ~mission(Location) y destruir los varios centinelas orbitales que están protegiendo esta operación ilegal. Se recomienda precaución, ya que todavía puede haber algunos mineros ilegales en el lugar, junto con los refuerzos que puedan reunir. \n\n\n\n\n*Shubin Interstellar es un contratista que ofrece igualdad de oportunidades. Al aceptar este contrato usted asume todos los riesgos asociados con el trabajo descrito en este documento y de ninguna manera Shubin Interstellar se hace responsable de los daños y perjuicios sufridos durante la duración del contrato.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x4, Prospectors x2\n<EM4>Turrets:</EM4> 3 (hostile)
shubin_claimsweep_desc_rand=PUESTO: Seguridad / Mercenario \nUBICACIÓN: ~mission(LagrangeLocation)\nEXPERIENCIA LABORAL: Piloto de combate (se valorará experiencia militar)\nCONDICIONES*: \nMientras realizábamos una inspección de las reclamaciones de Shubin en el sector, nos enteramos con desaliento de que un pequeño equipo de forajidos se ha instalado en ~mission(Location) y ha estado recolectando recursos ilegalmente. Peor aún, han establecido un perímetro defensivo con varios centinelas orbitales repartidos por el lugar, lo que nos dificulta su desalojo. \n\nPara que podamos recuperar el lugar reclamado, buscamos contratistas mercenarios que encuentren y destruyan el puñado de centinelas orbitales. La dificultad añadida a la tarea es que no sabemos con exactitud cuál es la fuerza de combate de estos mineros proscritos. Si se les da la oportunidad de convocar refuerzos, podemos esperar cualquier cosa, desde un pequeño contingente hasta un escuadrón completo de combatientes entrenados. \n\n\n\n\n*Shubin Interstellar es un contratista con igualdad de oportunidades. Al aceptar este contrato, usted asume todos y cada uno de los riesgos asociados con el trabajo aquí descrito y Shubin Interstellar no podrá ser considerada responsable de ningún daño que se produzca durante la duración del contrato.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x32, Prospectors x5\n<EM4>Turrets:</EM4> 4 (hostile)
