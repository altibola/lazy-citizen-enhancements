mg_ruto_RetrieveConsignment_desc_001=Hola, recientemente escuché un poco de información de que ~mission(Location|Address) recibió algunos materiales confidenciales que son de gran interés para un conocido mío. Tan interesante que están dispuestos a pagar para que alguien asalte las instalaciones, tome los productos y los entregue en ~mission(DropOff1|address) . Ahora espero que haya mucha seguridad, que probablemente dará pelea, así que traería una o dos armas. \n\nSe dice que los materiales confidenciales se entregaron en un envío junto con otras cosas y ahora se están almacenando en la bóveda automatizada de las instalaciones. Los oficiales de seguridad superiores en el sitio llevan datapads que contienen códigos de recuperación utilizados para acceder a la bóveda. Tendrás que conseguir un datapad antes de usar el transportador de paquetes para recuperar las cajas. \n\nSi necesita un poco de edulcorante, he visto el manifiesto y puedo confirmar que las otras cajas que se almacenan en las instalaciones son una buena opción. A mi cliente no le importa lo que le pase, así que es tuyo para hacer lo que quieras. Haga esto bien y esas cajas adicionales podrían ser una buena ventaja además de la tarifa de envío para usted.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Guards x4, Hostiles x54
mg_ruto_RetrieveConsignment_title_001=obtener la mercancía <EM4>[500–4,000 Rep]</EM4>
mg_ruto_UGF_destroy_E_desc_001=Parece que hay un nuevo advenedizo en el sector que no ha estado pagando las cuotas correctas a la gente adecuada. Para darles una pequeña lección, mi cliente quiere que vayas a ~mission(Location|Address) y destruyas toda la droga que haya en el lugar.\n\nEs probable que los matones de bajo nivel que tienen en el lugar monten un escándalo e intenten detenerte. Manéjalos como quieras, pero deshacerte del producto es lo más importante.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Civilians x4
mg_ruto_UGF_destroy_E_title_001=suministro limitado <EM4>[100 Rep]</EM4>
mg_ruto_UGF_destroy_H_desc_001=Un cliente mío está intentando negociar un acuerdo, pero no está teniendo mucha suerte. La otra parte siente que tiene toda la ventaja porque está cómodamente sentada sobre una pila de inventario. Para ayudar a avanzar en las negociaciones, voy a necesitar que te dirijas a ~mission(Location|Address) y destruyas todas las drogas que hay en el lugar. \n\nAhora bien, debería decirte que el lugar está protegido por gente muy seria, así que llegar al alijo va a ser un poco complicado, pero confío en que encontrarás la manera. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
mg_ruto_UGF_destroy_H_title_001=liquidación de existencias <EM4>[100 Rep]</EM4>
mg_ruto_UGF_destroy_desc_001=A uno de mis clientes no le ha gustado nada enterarse de que alguien se ha metido en su territorio. Ahora, en lugar de seguir el camino más tradicional de matar a algunas personas y comenzar todo un asunto, han optado por enviar un tipo diferente de mensaje en su lugar.\n\nVas a ir a ~mission(Location|Address) y destruir todas las drogas en el lugar. \n\nPor supuesto, si alguien quiere buscar pelea contigo, siéntete libre de defenderte, pero deshacerse del producto es lo más importante.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
mg_ruto_UGF_destroy_title_001=agotado <EM4>[100 Rep]</EM4>
mg_ruto_UGF_eliminateall_Lawnocivs_desc_001=Todo el mundo guarda rencor, ¿verdad? Quiero decir, cuando te pillan cometiendo un crimen, entiendo que estés un poco amargado, pero así es el juego, ¿no?\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostiles x15\n<EM4>Friendlies:</EM4> Civilians x4
mg_ruto_UGF_eliminateall_Lawnocivs_title_001=vivir y dejar que un contratista independiente se ocupe de la venganza <EM4>[100 Rep]</EM4>
mg_ruto_UGF_eliminateall_civsonly_desc_001=Un nuevo competidor está produciendo a un cliente y quiere echarle un cable.\n\nTe dirigirás a ~mission(Location|Address) y matarás a todos los civiles que trabajan allí. \n\nHaz lo que quieras con los matones armados que vigilan a los trabajadores, pero recuerda que no son la prioridad. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostiles x10\n<EM4>Friendlies:</EM4> Civilians x4
mg_ruto_UGF_eliminateall_civsonly_title_001=demasiados cocineros <EM4>[100 Rep]</EM4>
mg_ruto_UGF_eliminateall_desc_001=Esto es un poco agresivo para mi gusto, pero los créditos son los créditos, ¿no?\n\nTengo un cliente que está buscando un individuo altamente motivado para dirigirse a ~mission(Location|Address) y matar a todos los que están allí. \n\nBásicamente, empezar a disparar y no parar. Te pagarán una vez que el sitio esté despejado.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostiles x15
mg_ruto_UGF_eliminateall_nocivs_desc_001=Conozco a alguien que quiere abrir un nuevo negocio, pero le está costando contratar a los trabajadores cualificados que necesita.\n\nEl caso es que ha encontrado al equipo perfecto en ~mission(Location|Address), pero la gente para la que trabajan no quiere dejarlos marchar. Incluso contrataron guardias armados adicionales para asegurarse de ello.\n\nLo que quiero que hagas, es ir allí y matar a todos los guardias mientras te aseguras de que todos los trabajadores permanezcan ilesos. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostiles x15\n<EM4>Friendlies:</EM4> Civilians x4
mg_ruto_UGF_eliminateall_nocivs_title_001=la buena ayuda es difícil de encontrar <EM4>[100 Rep]</EM4>
mg_ruto_UGF_eliminateall_title_001=haciendo un lío <EM4>[100 Rep]</EM4>
mg_ruto_UGF_steal_desc_001=Este debe ser un timbre para alguien como tú. Hay un paquete retenido en ~mission(Location|Address) y necesito que lo lleves a ~mission(Destination|Address). \n\nHay un pequeño problema que debes saber. Va a haber una tonelada de mierda de seguridad allí. Pero estoy seguro de que todo irá bien.\n\n:)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100
mg_ruto_UGF_steal_title_001=coger y llevar <EM4>[100 Rep]</EM4>
mg_ruto_clearcrimestat_norep_desc_01=Hola a todos. Aún no hemos tenido la oportunidad de trabajar juntos, pero estoy en un aprieto y me vendría bien otro cuerpo. No a cambio de nada, por supuesto. Estoy a favor de un buen quid pro quo.\n\nSe suponía que uno de mis socios que estaba cumpliendo condena en Klescher me traería un datachip, pero luego se callaron. Ahora asumo que están muertos, pero este es el trato: si terminas su trabajo, yo limpio tu crimestat. No está mal, ¿verdad?\n\nAl parecer, tu predecesor planeaba usar unos viejos túneles para escapar. Dijo que no eran precisamente de fácil acceso, pero confío en que puedas averiguarlo. Supongo que encontrarás su cuerpo en algún lugar de allí y, si tenemos suerte, aún llevará el chip encima.\n\nUna vez lo tengas, termina de salir como puedas. Luego tráeme los datos. Hay un lugar cerca donde puedes subir el contenido del chip. Aunque deberías tener cuidado con la seguridad de Hurston. Han sido una molestia últimamente, así que no me sorprendería que te los encontraras. Después de obtener los datos y validarlos, borraré tu crimestat. \n\nEntonces podrás irte y disfrutar de tu nueva libertad. Si haces esto bien, tal vez tenga más trabajo lucrativo para ti en el futuro.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 5
mg_ruto_clearcrimestat_norep_title_01=¿necesitas una salida? <EM4>[50 Rep]</EM4>
mg_ruto_clearcrimestat_rep_desc_01=Hola. He oído que terminaste en Klescher que es un verdadero lastre. Pero en realidad podría ser un día de suerte para los dos.\n\nResumiendo, tenía a alguien sacando a escondidas un datachip de la prisión, pero nunca me lo devolvieron. Sé a ciencia cierta que no han salido de las instalaciones, así que creo que algo podría haberles pasado. Aunque trágico, el negocio debe continuar. Si puedes conseguir el chip y terminar el trabajo, puedo limpiar tu crimestat por ti. ¿Qué me dices?\n\nPor supuesto, no sé exactamente hasta dónde llegaron, pero puedo decirte que la prisión tiene toda una red de túneles ocultos que mi hombre planeaba usar para escapar. Mi suposición es que su cadáver se está pudriendo en algún lugar allí.\n\nUna vez que encuentres el cuerpo, espero que el chip todavía esté en él. Cuando lo tengas, termina de escapar y tráeme los datos. Hay un lugar cerca donde puedes subir el contenido del chip. \n\nUna advertencia, sin embargo, es posible que desee tener cuidado con Hurston Seguridad. Han sido una molestia últimamente, así que no me sorprendería que te encontraras con ellos.\n\nCuando tenga los datos borraré tu crimestat y entonces, voila, serás libre y limpio. Lo que hagas después es cosa tuya.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 5
mg_ruto_clearcrimestat_rep_title_01=ayudémonos mutuamente <EM4>[50 Rep]</EM4>
mg_ruto_collect_reclaimer_desc=Hola. \n\nNine Tails tiene un pequeño problema. Resulta que tienen un pequeño negocio paralelo en el comercio clandestino de órganos. Es un área de la que generalmente me mantengo alejado, pero un concierto es un concierto, ¿no? Parece que una de sus carnicerías móviles a bordo del "October Rising" fue pillada por la seguridad privada mientras cortaba. Ahora los Nine Tails están dispuestos a cortar lazos con la nave y su tripulación (que probablemente estén todos muertos de todos modos), pero necesitan que les extraigan una caja en particular. Supongo que era un pedido especial o algo así.\n\nEn cualquier caso, sube a bordo del October Rising, coge el paquete y lárgate.\n\nLa seguridad sigue rondando por aquí, así que ten cuidado y quizás trae a algunos amigos, pero recuerda, tu prioridad es el paquete. Si quieres ahorrarte más problemas, también puedes apagar la red de comunicaciones más cercana si quieres evitar las estadísticas criminales por, ya sabes, matar a un grupo de seguridad. Pero bueno, hazlo tú.\n\nUna vez que estés fuera, deja el paquete en la clínica de Grim HEX y yo me encargaré de tu pago.\n\nMuy fácil,\n\nRuto\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Pirates x3, Private Security x11\n<EM4>Unknown:</EM4> 1
