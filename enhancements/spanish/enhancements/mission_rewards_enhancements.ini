WSTR_TimeTrial_repeat_desc_01=¿Listo para establecer una nueva marca personal con la Liga Amateur de Carreras Wildstar?\n\n~mission(RaceDetails)\n\nDESCARGO DE RESPONSABILIDAD\nWildstar Racing requiere que el piloto contratado sea el piloto del vehículo, no se permiten sustitutos ni suplentes. Tenga en cuenta que Wildstar Racing utiliza pistas de acceso público y que puede haber otras personas presentes. Wildstar Racing no se hace responsable de ningún daño que pueda sufrir su nave durante la carrera.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
