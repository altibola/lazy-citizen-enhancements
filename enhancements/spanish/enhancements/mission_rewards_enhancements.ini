cfp_delivery_desc_001=Hola, \n\nMe enteré que la gente está esperando un envío de suministros importante que no ha llegado. Resulta que accidentalmente lo llevaron al lugar equivocado. Mientras investigamos cómo ocurrió el error, necesitamos que alguien se dirija a ~mission(Pickup1|Address) para recoger el paquete # ~mission(item1|serialnumber) y lo entregue en la ubicación correcta en ~mission(Dropoff1|Address) . \n\n¿Estás disponible para la carrera?\n\nLima Endicott\nLead Dispatcher\nCitizens for Pyro\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_delivery_desc_002=Oye, \n\nNecesito que te entreguen dos paquetes. El paquete # ~mission(item1|serialnumber) debe tomarse de ~mission(Pickup1|Address) y llevarse a ~mission(Dropoff1|Address) , y el paquete # ~mission(item2|serialnumber) va desde ~mission(Pickup2|Address) a ~mission(Dropoff2|Address) . Debería ser una manera fácil de ganar algunos créditos. \n\nVuele seguro, \n\nLima Endicott\nDespachador principal\nCiudadanos por Pyro\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_delivery_desc_003=Oye, \n\nDe vez en cuando, a Citizens for Pyro le gusta sorprender a los miembros estacionados en nuestros puestos de avanzada con un pequeño obsequio para mantener la moral alta. Tenemos el siguiente lote listo, pero necesitamos que alguien haga las entregas por nosotros. ¿Tiene algún interés en difundir el buen humor?\n\nAquí está la lista de entrega. Siéntete libre de eliminarlos en cualquier orden. \n\n- El paquete # ~mission(item1|serialnumber) va de ~mission(Pickup1|Address) a ~mission(Dropoff1|Address) .\n- Paquete # ~mission(item2|serialnumber) va desde ~mission(Pickup2|Address) a ~mission(Dropoff2|Address) .\n- El paquete # ~mission(item3|serialnumber) va de ~mission(Pickup3|Address) a ~mission(Dropoff3|Address) . \n\nGracias,\n\nLima Endicott\nDespachador principal\nCiudadanos por Pyro\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_delivery_desc_004=Hola,\n\nSi queremos que la gente común se mude a Pyro, debemos mostrarles que los servicios básicos son confiables. Hacer que cosas como las entregas sean confiables para que la gente no lo piense dos veces es exactamente lo que los ciudadanos de Pyro están aquí para hacer. ¿Quieres ayudarnos con esto? \n\nTenemos varias entregas listas para realizar. Hazlos en el orden que quieras. Lo único que importa es que lleguen allí. \n\n- El paquete # ~mission(item1|serialnumber) va de ~mission(Pickup1|Address) a ~mission(Dropoff1|Address) .\n- Paquete # ~mission(item2|serialnumber) va desde ~mission(Pickup2|Address) a ~mission(Dropoff2|Address) .\n- Paquete # ~mission(item3|serialnumber) va de ~mission(Pickup3|Address) a ~mission(Dropoff3|Address) .\n- Paquete # ~mission(item4|serialnumber) va de ~mission(Pickup4|Address) a ~mission(Dropoff4|Address) .\n\n\nVuela seguro,\n\nLima Endicott\nDespachador principal\nCiudadanos de Pyro\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_delivery_desc_005=Oye,\n\nSupongo que hubo un problema técnico con nuestro sistema que marcaba ciertos paquetes como entregados cuando nunca lo fueron. Todavía estoy desenredando el desorden, pero tengo algunos resueltos y listos para comenzar. \n\n- El paquete # ~mission(item1|serialnumber) va de ~mission(Pickup1|Address) a ~mission(Dropoff1|Address) .\n- Paquete # ~mission(item2|serialnumber) va desde ~mission(Pickup2|Address) a ~mission(Dropoff2|Address) .\n- Paquete # ~mission(item3|serialnumber) va de ~mission(Pickup3|Address) a ~mission(Dropoff3|Address) .\n- Paquete # ~mission(item4|serialnumber) va de ~mission(Pickup4|Address) a ~mission(Dropoff4|Address) .\n- Paquete # ~mission(item5|serialnumber) va de ~mission(Pickup5|Address) a ~mission(Dropoff5|Address) .\n \nSería bueno que los rectifiquemos de inmediato si está disponible. \n\nMejor,\n\nLima Endicott\nDespachador principal\nCiudadanos de Pyro\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
