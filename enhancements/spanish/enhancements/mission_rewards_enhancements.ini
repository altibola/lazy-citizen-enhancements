redwind_UGF_collect_desc_001=RED WIND LINEHAUL\n'SUS BIENES EN BUENAS MANOS'\n----------------------------\n\nTengo un envío esperando a ser transportado desde ~mission(Location|Address) a ~mission(Destination|Address). \n\nVoy a ser franco con usted sin embargo, este lugar no tiene la más limpia de las reputaciones. Dicho esto, todavía necesitan paquetes entregados y tienen créditos, así que está todo bien. Pero si entras ahí, hay muchas posibilidades de que te metas en problemas.\n\nNo aceptes el trabajo si no puedes manejar eso.\n\n\n\nA TODOS LOS VETERANOS - ¡Red Wind aprecia vuestro servicio a nuestro Imperio! ¡Vuestras luchas significan nuestra libertad! \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Unknown:</EM4> 4
redwind_UGF_collect_title_001=SE NECESITA PILOTO DE ENTREGA DE RED WIND <EM4>[500 Rep]</EM4>
redwind_courier_dc_small_title_001=Ruta de envío local de Red Wind <EM4>[500–1,000 Rep]</EM4>
redwind_courier_fromdc_med_desc_001=RED WIND LINEHAUL\n'SUS BIENES EN BUENAS MANOS'\n----------------------\n\nRecibí una solicitud de ~mission(Pickup1|Address) que tienen una buena cantidad de paquetes esperando en la ~mission(Pickup1) que necesitan ser entregados. \n\nAntes de aceptar el contrato, asegúrate de tener un barco con suficiente espacio. El rayo tractor tampoco haría daño.\n\nPAQUETES PARA RECOGER \n · Todos los paquetes en ~mission(Pickup1) en ~mission(Pickup1|Address) \n\nUBICACIONES DE ENTREGA (CUALQUIER PEDIDO)\n · Paquete # ~mission(item1|serialnumber) a la ~mission(Dropoff1|Address) \n · Paquete # ~mission(item2|serialnumber) a la ~mission(Dropoff2|Address) \n · Paquete # ~mission(item3|serialnumber) a la ~mission(Dropoff3|Address) \n · Paquete # ~mission(item4|serialnumber) a la ~mission(Dropoff4|Address) \n · Paquete # ~mission(item5|serialnumber) a la ~mission(Dropoff5|Address) \n · Paquete # ~mission(item6|serialnumber) a la ~mission(Dropoff5|Address) \n · Paquete # ~mission(item7|serialnumber) a la ~mission(Dropoff6|Address) \n · Paquete # ~mission(item8|serialnumber) a la ~mission(Dropoff6|Address) \n · Paquete # ~mission(item9|serialnumber) a la ~mission(Dropoff7|Address) \n · Paquete # ~mission(item10|serialnumber) a la ~mission(Dropoff7|Address) \n\n\nSOMOS IGUALDAD DE OPORTUNIDADES: Red Wind Linehaul es y siempre ha sido un contratista que ofrece igualdad de oportunidades. Si cree que puede hacer un buen trabajo para nosotros, regístrese. \norte\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
redwind_courier_fromdc_small_desc_001=RED WIND LINEHAUL\n'SUS BIENES EN BUENAS MANOS'\n----------------------\nLa gente de ~mission(Pickup1|Address) tienen pocos paquetes en la ~mission(Pickup1) que quieren entregar. Créditos fáciles para realizar una carga y entrega básica.\n\nPAQUETES PARA RECOGER \n · Todos los paquetes en ~mission(Pickup1) en ~mission(Pickup1|Address) \n\nUBICACIONES DE ENTREGA (CUALQUIER PEDIDO)\n · Paquete # ~mission(item1|serialnumber) a la ~mission(Dropoff1|Address) \n · Paquete # ~mission(item2|serialnumber) a la ~mission(Dropoff2|Address) \n · Paquete # ~mission(item3|serialnumber) a la ~mission(Dropoff3|Address) \n · Paquete # ~mission(item4|serialnumber) a la ~mission(Dropoff4|Address) \n · Paquete # ~mission(item5|serialnumber) a la ~mission(Dropoff5|Address) \n\n\nA TODOS LOS VETERANOS: ¡Red Wind agradece su servicio a nuestro Imperio! ¡Tus luchas significan nuestra libertad! \norte\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
redwind_courier_todc_med_desc_001=RED WIND LINEHAUL\n'SUS BIENES EN BUENAS MANOS'\n----------------------------\n\nHay una asignación considerable de paquetes que deben llevarse a ~mission(Dropoff1) en ~mission(Dropoff1|Address) . Siempre que su nave tenga suficiente espacio, esta debería ser una ejecución relativamente sencilla.\n\nPAQUETES PARA RECOGER (CUALQUIER PEDIDO) \n · Paquete # ~mission(item1|serialnumber) de ~mission(Pickup1|Address) \ n · Paquete # ~mission(item2|serialnumber) de la ~mission(Pickup2|Address) \n · Paquete # ~mission(item3|serialnumber) de la ~mission(Pickup3|Address) \n · Paquete # ~mission(item4|serialnumber) de la ~mission(Pickup4|Address) \n · Paquete # ~mission(item5|serialnumber) de la ~mission(Pickup5|Address) \n · Paquete # ~mission(item6|serialnumber) de la ~mission(Pickup5|Address) \n · Paquete # ~mission(item7|serialnumber) de la ~mission(Pickup6|Address) \n · Paquete # ~mission(item8|serialnumber) de ~mission(Pickup6|Address) \n · Paquete # ~mission(item9|serialnumber) de la ~mission(Pickup7|Address) \n · Paquete # ~mission(item10|serialnumber) de la ~mission(Pickup7|Address) \n\nUBICACIÓN DE ENTREGA\n · Todos los paquetes entregados a la ~mission(Dropoff1) en ~mission(Dropoff1|Address) \n\n\n\nNO ACEPTE ESTE CONTRATO, a menos que sea confiable. Red Wind tiene una reputación en la que nuestros clientes confían y por una buena razón. \norte\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
redwind_courier_todc_small_desc_001=RED WIND LINEHAUL\n'SUS BIENES EN BUENAS MANOS'\n----------------------\n\nTengo un pequeño montón de paquetes que deben tomarse y llevarse a ~mission(Dropoff1) en ~mission(Dropoff1|Address) . Considerando todos los aspectos, debería ser bastante simple.\n\nPAQUETES PARA RECOGER (CUALQUIER PEDIDO) \n · Paquete # ~mission(item1|serialnumber) de la ~mission(Pickup1|Address) \n · Paquete # ~mission(item2|serialnumber) de ~mission(Pickup2|Address) \n · Paquete # ~mission(item3|serialnumber) de ~mission(Pickup3|Address) \n · Paquete # ~mission(item4|serialnumber) de ~mission(Pickup4|Address) \n · Paquete # ~mission(item5|serialnumber) de la ~mission(Pickup5|Address) \n\nUBICACIÓN DE ENTREGA\n · Todos los paquetes entregados a la ~mission(Dropoff1) en ~mission(Dropoff1|Address) \n\n\n\nLa confianza es de dos direcciones: al aceptar este contrato, usted se compromete a no fastidiarnos y Red Wind Linehaul se compromete a tratarlo a usted de la misma manera. \norte\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
roughready_bounty_cargoship_desc_001=Rough & Ready proporcionó recientemente servicios de abastecimiento de combustible para un transportista llamado ~mission(TargetName) , quien acordó entregarnos su próxima carga de suministros como compensación. Bueno, acabamos de descubrir que el skag mentiroso vendió su último envío a una banda rival. \n\nEstamos buscando a alguien para localizar y eliminar ~mission(TargetName|Last) por la traición. \n\nUn viejo amigo mío acaba de ver el skag en ~mission(Location|Address) . Parece que llevan más cargamento que no viene hacia nosotros y viajan con escolta. Solo te pagamos para que tumbes la nave, así que cualquier cosa que encuentres a bordo es tuya.\n\n- Smokey\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
roughready_bounty_cargoship_desc_002=Mis asociados y yo llegamos a un acuerdo con un transportista llamado ~mission(TargetName) para entregarnos suministros. Lo curioso es que el envío nunca apareció. Afirmaron que los piratas asaltaron su nave y se llevaron nuestros suministros, pero resulta que esa historia es 100% estiércol ranta.\n\nMentir para retractarse de nuestro acuerdo no puede quedar sin respuesta y dejarás ese mensaje muy claro. ~mission(TargetName|Last) fue vista recientemente con una escolta en ~mission(Location|Address) . Mientras mates ~mission(TargetName|Last) , no nos importa lo que pase con la carga que transportan. \n\n- Ahumado\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1
roughready_bounty_cargoship_desc_003=Un imbécil que se hace llamar ~mission(TargetName) ha estado ejecutando un plan en el que su nave de carga solicita servicios de reabastecimiento de combustible solo para tender una emboscada a nuestras naves cuando llegan allí. Incluso cargó la maldita cosa con carga real para asegurarse de que pase los escaneos. Hemos corrido la voz para que nadie en Rough & Ready vuelva a caer en la trampa, pero quiero que este skag sea castigado. \n\nCreo que ~mission(TargetName|Last) conoce a mucha de nuestra gente a simple vista, así que supongo que será mejor pagarte para que te encargues de ello. Escuché que fueron vistos alrededor de ~mission(Location|Address) . Dirígete allí ahora y ocúpate de ese carguero y de cualquiera que lo proteja de una vez por todas. \n\n- Ahumado\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
roughready_bounty_desc_001=¿Interesado en cazar un poco? \n\n ~mission(TargetName) saboteó uno de nuestros envíos de combustible y nos costó un montón de créditos, así que estoy buscando a alguien que les haga pagar por lo que hicieron. Acabo de recibir la noticia ~mission(TargetName|Last) fue detectada en ~mission(Location|Address) . Si te diriges allí ahora, es muy probable que puedas seguir su rastro y acabar con ellos para siempre. \n\n ~mission(TargetName|Last) no funcionó solo, así que no te sorprendas si viajan con protección adicional.\n\n- Smokey\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
roughready_bounty_desc_003=Tengo una situación delicada que necesita ser manejada. Después de años de ser un miembro leal de Rough & Ready, ~mission(TargetName) desertó de la pandilla y anda comprando secretos para nuestros rivales. Necesitamos ~mission(TargetName|Last) se elimine inmediatamente. \n\nCon cosas como esta, he descubierto que siempre es mejor pagarle a alguien que no esté asociado con nosotros para que haga la escritura. Los escaneos detectaron ~mission(TargetName|Last) cerca de ~mission(Location|Address) no hace mucho. Te pagaremos bien si vas allí ahora y los cuidas por nosotros. \n\n ~mission(TargetName|Last) no es idiota y sabe que los perseguiremos. Prepárate para una pelea increíble y no esperes que estén solos.\n\n- Smokey \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
roughready_claimsweep_desc_easy=El equipo de Rough & Ready está buscando a alguien que se encargue de una situación delicada. Hemos descubierto una nave y centinelas orbitales en ~mission(Location|Address) espiándonos. Estamos en un aprieto porque no queremos comenzar una pelea más grande con quien esté detrás de esto. Por eso buscamos personal contratado que pueda encargarse de ello de forma rápida y discreta. ¿Interesado?\n\nLo último, una vez que estés allí, asegúrate de mantener un ojo en ese nave. Apuesto a que tan pronto como empieces a volar a sus centinelas, intentarán traer ayuda para detenerte.\n \n- Smokey\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x3, Prospectors x1\n<EM4>Turrets:</EM4> 2 (hostile)
roughready_claimsweep_desc_hard=El equipo de Rough & Ready está buscando un mercenario independiente interesado en algo pesado. Hemos estado atentos a una situación en desarrollo en ~mission(Location|Address) donde naves están vigilando varios centinelas orbitales que espían nuestras operaciones. \n\nAhora bien, puede que haya nacido en la noche, pero no fue anoche. Considerando la manera tan descarada en que están organizados, quienquiera que sea el responsable tenía que saber que eventualmente lo descubriríamos. Casi se siente como si estuvieran incitando a R&R a atacarlo, y no quiero que caigamos en ello. \n\nEn lugar de eso, lo harás por nosotros y recibirás una buena cantidad de créditos por tu esfuerzo. Las naves estacionadas allí sospecharán menos de que se acerque una nave no afiliada y harán más difícil culparnos del ataque. \n\nSolo asegúrate de planificar en consecuencia antes de entrar. Tal vez traigas tus propios refuerzos en caso de que alguno de sus naves escape y llame a algunos de los suyos. \n\n- Ahumado\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x5, Prospectors x4\n<EM4>Turrets:</EM4> 4 (hostile)
roughready_claimsweep_desc_intro=Mis asociados y yo nos encontramos en una pequeña situación y nos vendría bien un poco de ayuda. Hay un centinela orbital en ~mission(Location|Address) que nos está espiando. No sabemos quién lo puso allí, pero seguro que no puede quedarse allí. \n\nLa cosa es que, ante todo, somos personas con mentalidad empresarial y nos preocupa que si lo explotamos nosotros mismos, empezará a ser una mierda. Por eso es mejor que lo haga alguien como tú. Debería ser un trabajo rápido y fácil para alguien interesado en ganar algunos créditos. \n\n- Ahumado\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Turrets:</EM4> 1 (hostile)
roughready_claimsweep_desc_medium=Recientemente hice un descubrimiento interesante: alguien instaló un puñado de centinelas orbitales en ~mission(Location|Address) . Supongo que están intentando conseguir información sobre nuestras operaciones allí. Incluso tienen algunas naves vigilando para asegurarse de que no les pase nada. \n\nPor supuesto, queremos que estos bastardos desaparezcan, pero me preocupa que deshacernos de ellos nosotros mismos sea malo para el negocio. Por eso buscamos un poco de "negación plausible". Alguien externo a R&R para eliminar el problema, de modo que quienquiera que esté detrás no pueda vincularnos directamente con el ataque. Sé que esto no será un paseo por el parque, especialmente con esos guardias acechando. ¿Quién sabe cuántos refuerzos tendrán preparados? Pero si logra hacerlo, estamos preparados para que le paguen bien. \n\n¿Crees que tienes las habilidades para lograrlo? \n\n- Ahumado\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x4, Prospectors x2\n<EM4>Turrets:</EM4> 3 (hostile)
roughready_delivery_station_desc_001=RR Pyro Checkmate Local 1box Single Courier\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 1/7 | Complexity 1/7 | Risk 1/7 | Knowledge 1/7
roughready_delivery_station_title_001=roughready delivery station title 001
roughready_eliminateall_hangar_desc_01=Algunos forajidos se quedaron más tiempo de lo esperado en una de nuestras estaciones. Intentaron engañarnos rápidamente, pero ahora están atrapados en ~mission(Location|Address) . Necesitamos que los elimines. \n\nRough & Ready no quiere que ninguno de ellos quede vivo cuando hayas terminado. No importa lo complicado que sea siempre y cuando esté hecho, ¿entendido?\n\n- Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x24, Soldiers x2
roughready_eliminateall_maintenance_desc_01=Rough & Ready tiene un problema con las ratas. Uno de nuestros equipos intentó provocar un pequeño motín y ahora se han hecho cargo de ~mission(Location|Address) .\n\nComo no puedo estar 100% seguro de que no tengan simpatizantes a bordo de la estación, los quiero. encargarse de acabar con estos traidores por mí.\n\nSi puedes solucionar nuestro pequeño problema de plagas, te pagarán generosamente. Simplemente no dejes a ninguno de ellos con vida. No quiero que nadie más tenga ideas divertidas.\n\n- Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x21
roughready_salvage_E_desc_001=RR Pyro Checkmate VE Civilians Salvage\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Friendlies:</EM4> Salvageable Ships x1
roughready_salvage_E_title_001=roughready salvage E title 001
roughready_salvage_M_desc_001=RR Pyro Checkmate M Civilians Salvage\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Friendlies:</EM4> Salvageable Ships x1
roughready_salvage_M_title_001=roughready salvage M title 001
roughready_searchbody_danger_station_desc_001=Después de escuchar rumores de que podríamos haber tenido un caso grave de ocupantes ilegales en ~mission(Location|Address) , envié a una de mis personas de más confianza a investigar. \n\nLa mala noticia es que no he vuelto a saber nada de ellos desde entonces. \n\nMe gustaría que vinieras y vieras si puedes encontrar el paradero actual de ~mission(TargetName) . Dejaré que tú elijas cómo quieres lidiar con cualquier escoria que encuentres. \n\nConfirma dónde está ~mission(TargetName|last) y habrá una recompensa para ti.\n\n- Smokey \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
roughready_searchbody_nodanger_station_desc_001=Tengo gente de izquierda y derecha preguntándome si sé qué pasó con ~mission(TargetName) . Ahora, personalmente, estaría más que feliz de verlos irse para siempre, pero por alguna razón tienen amigos en las altas esferas que exigen respuestas. \n\nNo puedo permitir que nadie de mi gente se embarque en una búsqueda inútil, pero tú, por otro lado, pareces el candidato perfecto. Vaya a ~mission(Location|Address) y vea si puede encontrar qué les pasó. Te pagarán si descubres dónde están. \n\n10 créditos dicen que se drogaron demasiado y se desmayaron en un rincón oscuro en algún lugar. \n\n-Ahumado\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
