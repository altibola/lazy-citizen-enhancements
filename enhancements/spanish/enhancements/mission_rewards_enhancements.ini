ServiceBeacon_Escort_Mission_Desc=~serviceBeacon(InitiatorName) solicita escolta en la ubicación: ~serviceBeacon(InitiatorLocation). Si es aceptado, se le pagará ~serviceBeacon(PaymentAmount) aUEC/Minuto hasta que sea CANCELADO por el Iniciador o ABANDONADO por el Proveedor de Servicios. \n\nNOTA: El contrato y el pago comenzarán una vez que se reúna con el Cliente. \n\nDistancia a ~serviceBeacon(InitiatorName) : ~serviceBeacon(DistToInitiator)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
