TarPits_ShipStrip_desc_001=Tenemos un trabajo de reciclado en particular en el que nos vendrían bien unas manos extra. \n\nNecesitamos que encuentres una ~mission(ship) que fue perforada alrededor de ~mission(location). Seguridad ya lo está buscando y si lo encuentran, seguro que lo identifican y nos meteremos en un montón de problemas.\n\nAsí que queremos que lo limpies antes de que nadie lo vea. Arranca todo el casco para que nadie pueda decir a quién perteneció, no dejes ni una mota de pintura, y obviamente mantén la boca cerrada sobre cualquier cosa que veas. \n\nTe daremos crédito y todo lo que desguaces es tuyo. Pero si los de seguridad encuentran la nave antes de que termines, todos estaremos jodidos y no te pagaremos, así que no nos decepciones.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Friendlies:</EM4> Salvageable Ships x1
Tarpits_assassinate_dc_desc_001=No tengo tiempo que perder, así que iré directo al grano: ~mission(TargetName) debe estar muerta y quiero que lo hagas. Puede encontrarlos cerca de ~mission(Location) en ~mission(Location|address) . No estarán solos, pero no te distraigas con esos otros montones inútiles. Solo te pagan por sacar ~mission(TargetName|Last) .\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x18, Juggernauts x1, Snipers x2, Soldiers x9, Technicians x3
Tarpits_destroyitem_dc_desc_001=Estoy buscando enviar un mensaje contundente a la tripulación en ~mission(Location|Address) y sé la manera perfecta de hacerlo: daños a la propiedad.\n\nTodo lo que necesitas hacer es atacar y destruir algunas cosas. aquí y allá, y realmente llevar a casa una importante lección sobre el respeto a los superiores. \n\nHaz eso por mí y me sentiré muy feliz. Y generoso.\n\n¿Interesado?\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Tarpits_eliminateboss_dc_desc_001=Hemos tenido la mira puesta en eliminar ~mission(TargetName) desde hace un tiempo, pero nunca hemos podido encontrar el momento adecuado. Basta de esperar. Vas a crear el momento adecuado para nosotros.\n\nDirígete a ~mission(Location|Address) y elimina a un grupo de delincuentes que corren por ~mission(Location) . Mata a suficientes perdedores y ~mission(TargetName|Last) no tendrá más opción que enfrentarte a ti ellos mismos. Ahí es cuando los sacas y te ganas un buen día de pago. \norte\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x20, Juggernauts x1, Snipers x2, Soldiers x7
Tarpits_theft_mines_dc_desc_001=Esperaba que estuvieras interesado en hacer un pequeño trabajo para nosotros. Tengo algunos productos en ~mission(Location|Address) que son perfectos para tomar. El único problema (y es grande) es que los cabrones que dirigen el lugar tienen toda la zona llena de minas de proximidad. \n\nNecesitarás encontrar alguna manera de lograrlo o, si no te molesta, alguna forma de activar el lote. De cualquier manera, trata de no hacerte estallar. Luego solo necesitas tomar las cosas y llevarlas a ~mission(Destination|Address) .\n\nNo será fácil lograrlo, pero si lo haces, te prometo que haré que valga la pena. \norte\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
