BHG_ShipWaveAttack_DrawOutBoss_VH_Desc_001=BountyHuntersGuild ShipWaveAttack DrawOutBoss Stanton VeryHard\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x27\n<EM4>Probationary Guild Member:</EM4> +250 Rep
BHG_ShipWaveAttack_DrawOutBoss_VH_Title_001=BHG ShipWaveAttack DrawOutBoss VH Title 001 <EM4>[250 Rep]</EM4>
Bitzeroes_bombingrun_dc_desc_001=Hemos estado intentando acceder a algunos datos confidenciales en ~mission(Location|Address) pero parece que solo hay una puerta trasera que podemos usar. El problema es que necesitamos a alguien en el sitio para activarlo. Y realmente me refiero a activarlo.\n\nSi puedes dirigirte allí y destruir parte de su infraestructura, los sistemas de respaldo de emergencia se activarán y deberíamos poder acceder a todo lo que queramos. \n\nOjalá pudiera ver la expresión de sorpresa en los rostros de los delincuentes que dirigen el lugar cuando sucede.\n\n-Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Turrets:</EM4> present (hostile)
Bitzeroes_bombingrun_dc_title_001=En humo <EM4>[500–2,000 Rep]</EM4>
Bitzeroes_destroygen_locked_dc_desc_001=Necesito tu ayuda en un trabajo, pero no puedo detallar demasiado los detalles. Si eso no funciona para ti, no te preocupes.\n\nTe dirigirás a ~mission(Location|Address) y volarás un generador de energía para nosotros. Ahora mantienen el generador bajo llave, por lo que primero tendrás que buscar los códigos de acceso. Afortunadamente, normalmente guardan copias del código en datapads. (Cree que los mantendrá a salvo de ser pirateados).\n\nSi destruyes ese generador, lo siguiente que explotará será tu cuenta bancaria.\n\n- Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Bitzeroes_destroygen_locked_dc_title_001=Apagón obligatorio <EM4>[500 Rep]</EM4>
Bitzeroes_destroyitem_dc_desc_001=No entraré en la larga y aburrida historia de por qué, pero hay algunos fragmentos de ~mission(Location|Address) que necesitamos destruir. La parte importante es que quiero pagarte una gran cantidad de créditos para que lo hagas. Casi siento que deberías pagarnos por esto por lo divertido que va a ser.\n\nNi siquiera me importa cómo lo hagas. Granadas, lanzacohetes, Torpedo Burrito de un día, todo es lo mismo para nosotros.\n\n-Bit Zeros \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Bitzeroes_destroyitem_dc_title_001=Mal funcionamiento mayor <EM4>[500 Rep]</EM4>
Bitzeroes_destroyservers_locked_dc_desc_001=Hola,\n\nTenemos un problema en el que podríamos necesitar tu ayuda. Uno de nuestros antiguos nuevos reclutas hizo un completo trabajo de mierda en un hack y terminó dejando una huella digital tan desordenada que bien podría ser una confesión completa. \n\nUna eliminación remota no será lo suficientemente buena, así que quiero que vayas a ~mission(Location|Address) y te asegures de que sus servidores de datos desaparezcan.\n\nComo si esto no fuera un problema lo suficientemente grande Ya es un desastre, los códigos de acceso a la puerta cerrada de la sala de servidores solo se almacenan físicamente en el sitio. Eso significa que primero tendrás que liberar un datapad con el código antes de poder acercarte a ellos.\n\nPero no te preocupes. Me aseguraré de que los créditos valga la pena. \n\n- Ceros de bits\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
Bitzeroes_destroyservers_locked_dc_title_001=Servidor No Encontrado <EM4>[1,000 Rep]</EM4>
Bitzeroes_destroystash_dc_desc_001=Los manipuladores de ~mission(Location|Address) decidieron que sería una buena idea interferir con nuestro negocio, y ahora debemos hacerles saber inequívocamente que estaban equivocados. \n\nUn poco de husmeo en sus datos y pudimos descubrir dónde guardan los idiotas su escondite. Ahora todo lo que necesitamos que hagas es que vayas allí y destruyas hasta el último fragmento. \n\nFigura que debería aclarar el punto.\n\n- Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Bitzeroes_destroystash_dc_title_001=Golpéalos donde duele <EM4>[500 Rep]</EM4>
Bitzeroes_eliminateall_dc_desc_001=Los pequeños cretinos viscosos de ~mission(Location|Address) nos han estado vendiendo datos basura mientras intentaban hacer un doble trato. No podemos dejarlo así.\n\nQueremos que les enseñes una última lección y elimines a todos los cobardes que puedas encontrar. Lo último que supe es que estaban escondidos cerca de la ~mission(Location) . \n\nDerrama su sangre y nosotros llenaremos tu billetera. \n\n-Ceros de bits\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Juggernauts x2, Soldiers x12, Technicians x2
Bitzeroes_eliminateall_dc_title_001=Borrar permanentemente <EM4>[1,000 Rep]</EM4>
Bitzeroes_heist_buyin_dc_desc_001=Estoy viendo un registro de transferencia de inventario en este momento que está a punto de estallar con una gran cantidad de carga muy valiosa que prácticamente está pidiendo a gritos ser robada. Seguro que probablemente haya algunas personas allí cuidando los bienes, pero cuanto más dura sea la lucha, más dulce será el botín, ¿verdad?\n\nNormalmente, estaríamos dedicados a un trabajo como este, pero tenemos otro objetivo en la mira ahora mismo y Odiaría que se pudriera información tan buena. \n\n¿Qué dices? ¿Quieres hacerlo? Envíame algunos créditos y la ubicación es toda tuya.\n\n-Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Unknown:</EM4> 10
Bitzeroes_theft_dc_desc_001=Muy bien,\n\nEn ~mission(Location|Address) hay algunas cosas que tienen en su poder y que necesitan ser liberadas. Seguro que habrá algunos guardias o personas preocupadas con las que tendrás que tratar, pero en su mayor parte es una transacción relativamente sencilla: toma las cosas de ~mission(Location) y llévalas a nosotros en ~mission(Destination|Address) . \n\nA veces lo simple es lo mejor.\n\n-Bit Zeros \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
Bitzeroes_theft_dc_title_001=Reasignación de propiedad <EM4>[500–1,000 Rep]</EM4>
Bitzeroes_theft_mines_dc_desc_001=Realmente espero que aceptes hacer esto ya que no parece haber mucha gente ansiosa por enfrentarse a un montón de minas de proximidad. Mira, hay una puntuación que obtuvimos en ~mission(Location|Address) pero la seguridad física está resultando más difícil de lo esperado. \n\nSi puedes encontrar una manera de navegar a través de las minas o posiblemente una manera de activarlas de forma remota, debería ser relativamente fácil agarrar los bienes y salir de allí. Déjalos en ~mission(Destination|Address) y obtendrás más créditos de los que te corresponde por asumir el riesgo.\n\n-Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
