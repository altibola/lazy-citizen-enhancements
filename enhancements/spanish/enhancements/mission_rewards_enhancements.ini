mg_miles_groupbounty_desc_001=TIPO DE CONTRATO: Orden de arresto grupal\nESTADO DEL CONTRATISTA: Independiente\nCódigo de aprobación: = ~mission(Contractor|ApprovalCode) \n\nPARA PROCESAMIENTO INMEDIATO\n\nEn relación con un delito cometido conjuntamente, se ha emitido una orden de arresto grupal para:\n ~mission(Target1) \n ~mission(Target2) \n ~mission(Target3) \n\nActualmente se cree que ya no viajan juntos para evadir la captura y que pronto podrían huir del sistema. Debería considerar seriamente contratar ayuda adicional para ejecutar todas las órdenes en el plazo limitado. \n\nEstás autorizado a utilizar cualquier fuerza que sea necesaria para neutralizar los objetivos. \n\nEl pago se emitirá al completar exitosamente el contrato cuando todos los objetivos hayan sido tratados en el tiempo asignado.\n\nEste contrato no es negociable.\n\nEste mensaje puede contener contenido confidencial, propietario, privilegiado y/o privado. información. La información está destinada a ser utilizada por la persona o entidad designada anteriormente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x6, Targets x3
