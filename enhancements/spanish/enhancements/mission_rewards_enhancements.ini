XenoThreat_claimsweep_desc_easy=Nuestro movimiento de resistencia crece día a día, pero eso conlleva cierta atención no deseada. Escaneos recientes descubrieron centinelas orbitales en ~mission(Location|Address) y una nave realizando un patrón de patrulla. Creemos que esto es parte de una campaña de espionaje dirigida a XenoThreat, probablemente financiada por la UEE. \n\nEstamos buscando un mercenario experimentado dispuesto a destruir a los centinelas lo antes posible. Como ya tienen ojos y oídos sobre nosotros, enviar a alguien de fuera de la organización llamaría menos la atención. Si aceptas el trabajo, te pagarán puntualmente una vez que los centinelas sean destruidos.\n \nAhora, aunque la nave patrulla no es el objetivo principal, sospechamos que si escapa podría tener refuerzos en reserva. Podría ser inteligente solucionarlo rápidamente. \n\nSi decides ayudarnos, XenoThreat recordará que eres alguien dispuesto a luchar por lo que es correcto.\n\nComm. Especificaciones. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Hostiles:</EM4> Hostile Wave x3, Prospectors x1\n<EM4>Turrets:</EM4> 2 (hostile)
XenoThreat_claimsweep_desc_hard=Escaneos recientes descubrieron varios centinelas orbitales y naves en ~mission(Location|Address) . Creemos que son parte de una campaña de espionaje dirigida a XenoThreat, en respuesta a nuestras acciones recientes en el sistema Stanton. Parece que XenoThreat debe estar haciendo algo bien, si están aquí espiando de esta manera.\n\nEstamos buscando un mercenario experimentado y altamente capacitado dispuesto a eliminar esta operación. Si no quieres que Pyro se convierta en un sistema de vigilancia, esta es tu oportunidad de detenerlo. Los centinelas probablemente no sean un problema demasiado grande, pero presta atención a las naves patrulleras. Si logran escaparse, tendrás muchos más problemas para respirar. \n\nRecibirá nuestra gratitud y un pago considerable una vez que haya terminado el trabajo. \n\nCom. Especificaciones. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250\n<EM4>Hostiles:</EM4> Hostile Wave x5, Prospectors x4\n<EM4>Turrets:</EM4> 4 (hostile)
XenoThreat_claimsweep_desc_intro=Parece que nuestra lucha por liberar a la Humanidad tiene nerviosos a los perros falderos del gobierno en la Tierra. Escaneos recientes descubrieron un centinela orbital en ~mission(Location|Address) que creemos que es parte de una campaña de espionaje de la UEE. Los buenos créditos dicen que están entregando los datos directamente a los propios slinks. \n\nHasta ahora sólo se ha detectado un centinela, pero quién sabe hasta qué punto crecerá la operación si no se desconecta. No debería ser demasiado problema para un mercenario experto. Si eso le suena familiar, el pago se enviará de inmediato una vez que se destruya el centinela. Además, XenoThreat recordará que eres alguien dispuesto a luchar por lo que es correcto.\n\nComm. Especificaciones. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Turrets:</EM4> 1 (hostile)
XenoThreat_claimsweep_desc_medium=¿Valoras la libertad de la Humanidad? Si es así, te ofrezco la oportunidad de demostrarlo. Escaneos recientes descubrieron centinelas orbitales y naves patrulleras en ~mission(Location|Address) . Creemos que son parte de una campaña de espionaje de la UEE dirigida a XenoThreat. Es importante que detengamos su recopilación de inteligencia antes de lanzar nuestra próxima misión.\n\nEstamos buscando un mercenario experimentado dispuesto a eliminar estas fuerzas de inmediato. Los centinelas son la prioridad, pero las naves podrían resultar un problema mayor si se les permite escapar. Tendrás que evaluar la situación más de cerca una vez que estés en el sitio. \n\nPodríamos encargarnos nosotros mismos, pero queremos enviar un contratista para que la escoria detrás de esto no sepa quién los golpeó. El pago se enviará inmediatamente al finalizar. Además, la satisfacción de saber que estás ayudando a una buena causa.\n\nComm. Especificaciones. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostile Wave x4, Prospectors x2\n<EM4>Turrets:</EM4> 3 (hostile)
XenoThreat_claimsweep_desc_rand=Parece que la UEE está intensificando sus esfuerzos para detener nuestro movimiento. Uno de nuestros pilotos descubrió algunos centinelas orbitales y naves en ~mission(Location|Address) . Creemos que son parte de una campaña de espionaje de la UEE dirigida a XenoThreat y es vital detenerla antes de que recopilen algo que pueda dañar nuestros esfuerzos en curso.\n\nEstamos buscando un mercenario capacitado dispuesto a eliminar esta amenaza y detenerla. invasión de la privacidad antes de que se extienda aún más. ¿Quién sabe cuánto crecerá esta operación si no se desconecta inmediatamente? El pago hará que valga la pena y se enviará rápidamente una vez que todo esté hecho pedazos. \n\nVéalo hecho y ayude a ser parte del lado correcto de la historia.\n\nComm. Especificaciones. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostile Wave x32, Prospectors x5\n<EM4>Turrets:</EM4> 4 (hostile)
