item_Desc_SHLD_GODI_S02_FR76=Tipo de artículo: Generador de Escudo\nFabricante: Gorgon Defender Industries\nTamaño: 2\nGrado: A\nClase: Militar\n\nPerfeccionado tras años de pruebas exhaustivas en el mundo real por parte de los militares, el FR-76 de Gorgon Defender Industries es el generador de escudos definitivo. Perfecto para todos, desde la gente que defiende la línea del frente hasta los que exploran la frontera.\n\n--- STATS ---\nMax HP: 10,560  |  Regen: 2,323 HP/s\nDowned Delay: 10.5s  |  Damaged Delay: 5.3s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,650  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 750
item_Desc_SHLD_GODI_S02_SecureShield=Tipo de artículo: Generador de Escudo\nFabricante: Gorgon Defender Industries\nTamaño: 2\nGrado: D\nClase: Militar\n\nConsigue protección de grado militar para tu nave con el SecureShield de Gorgon Defender Industries. Su tecnología de emisores de vanguardia permite una absorción de escudo superior en todo el espectro de tipos de daño.\n\n--- STATS ---\nMax HP: 10,560  |  Regen: 1,901 HP/s\nDowned Delay: 13.9s  |  Damaged Delay: 7.0s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,650  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 500
item_Desc_SHLD_GODI_S03_FR86=Tipo de artículo: Generador de Escudo\nFabricante: Gorgon Defender Industries\nTamaño: 3\nGrado: A\nClase: Militar\n\nEl FR-86 de Gorgon está probado y es de confianza. Ningún otro generador de escudos de gran tamaño ofrece un rendimiento y una durabilidad tan excepcionales.\n\n--- STATS ---\nMax HP: 105,600  |  Regen: 23,232 HP/s\nDowned Delay: 11.6s  |  Damaged Delay: 5.8s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 2,060  |  IR: 0\nPower Draw: 5 PU/s\nComponent HP: 2,100
item_Desc_SHLD_GODI_S03_FullBlock=Tipo de artículo: Generador de Escudo\nFabricante: Gorgon Defender Industries\nTamaño: 3\nGrado: B\nClase: Militar\n\nFabricado por antiguos residentes de Caliban, el gran generador de escudos FullBlock de Gorgon ha sido puesto a prueba en repetidas ocasiones por militares y ciudadanos. Eso significa que puedes contar con él independientemente de a lo que te enfrentes.\n\n--- STATS ---\nMax HP: 105,600  |  Regen: 21,120 HP/s\nDowned Delay: 12.7s  |  Damaged Delay: 6.3s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 2,060  |  IR: 0\nPower Draw: 5 PU/s\nComponent HP: 1,800
item_Desc_SHLD_GODI_S03_SecureScreen=Tipo de artículo: Generador de Escudo\nFabricante: Gorgon Defender Industries\nTamaño: 3\nGrado: D\nClase: Militar\n\nGorgon Defender Industries aporta poderío militar a su generador de escudos básico de gran tamaño. Con la mejor durabilidad de su clase, el SecureScreen fue construido para recibir una paliza y sobrevivir.\n\n--- STATS ---\nMax HP: 105,600  |  Regen: 19,008 HP/s\nDowned Delay: 15.3s  |  Damaged Delay: 7.7s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 2,060  |  IR: 0\nPower Draw: 5 PU/s\nComponent HP: 1,400
item_Desc_SHLD_SECO_S01_HEX=Tipo de artículo: Generador de escudo\nFabricante: Seal Corporation\nTamaño: 1\nGrado: B\nClase: Civil\n\nPrepara tu nave para cualquier circunstancia instalando un HEX de Seal Corporation. Su rendimiento y durabilidad equilibrados lo convierten en una opción ideal y versátil para aquellos que no saben adónde les llevará su próxima aventura.\n\n--- STATS ---\nMax HP: 2,160  |  Regen: 432 HP/s\nDowned Delay: 9.1s  |  Damaged Delay: 4.5s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 750  |  IR: 0\nPower Draw: 2 PU/s\nComponent HP: 170
item_Desc_SHLD_SECO_S02_BLOC=Tipo de artículo: Generador de escudo\nFabricante: Seal Corporation\nTamaño: 2\nGrado: B\nClase: Civil\n\nEl generador de escudos BLOC de Seal Corporation fue el primero en utilizar el revolucionario semiconductor de núcleo cuántico de la empresa para reducir el consumo de energía del componente sin comprometer su rendimiento.\n\n--- STATS ---\nMax HP: 7,200  |  Regen: 1,440 HP/s\nDowned Delay: 10.0s  |  Damaged Delay: 5.0s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,130  |  IR: 0\nPower Draw: 3 PU/s\nComponent HP: 470
item_Desc_SHLD_SECO_S02_RPEL=Tipo de artículo: Generador de escudo\nFabricante: Seal Corporation\nTamaño: 2\nGrado: D\nClase: Civil\n\nComprueba por qué más gente confía en Seal Corporation para proteger su nave que en cualquier otra compañía. Con el generador de escudos RPEL puedes estar seguro de que estarás aislado del peligro.\n\n--- STATS ---\nMax HP: 7,200  |  Regen: 1,296 HP/s\nDowned Delay: 12.1s  |  Damaged Delay: 6.0s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,130  |  IR: 0\nPower Draw: 3 PU/s\nComponent HP: 360
item_Desc_SHLD_SECO_S03_ARMOR=Tipo de artículo: Generador de escudo\nFabricante: Seal Corporation\nTamaño: 3\nGrado: B\nClase: Civil\n\nARMOR es el mejor generador de escudos de Seal Corps. Fue utilizado ampliamente por los militares antes de que su tecnología de escudos fuera desclasificada para uso civil.\n\n--- STATS ---\nMax HP: 72,000  |  Regen: 14,400 HP/s\nDowned Delay: 11.0s  |  Damaged Delay: 5.5s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,500  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 1,300
item_Desc_SHLD_SECO_S03_GUARD=Tipo de artículo: Generador de escudo\nFabricante: Seal Corporation\nTamaño: 3\nGrado: C\nClase: Civil\n\nNo temas enfrentarte a lo desconocido con el GUARD de Seal Corp. Este generador de escudo equilibra rendimiento, durabilidad y sigilo para permitir al usuario utilizar el escudo de la forma que más le convenga.\n\n--- STATS ---\nMax HP: 72,000  |  Regen: 13,680 HP/s\nDowned Delay: 12.1s  |  Damaged Delay: 6.0s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,500  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 1,100
item_Desc_SHLD_SECO_S03_HAVEN=Tipo de artículo: Generador de escudo\nFabricante: Seal Corporation\nTamaño: 3\nGrado: D\nClase: Civil\n\nEl HAVEN es un admirado generador de escudos para grandes naves. El diseño sencillo y limpio de Seal Corp hace que la reparación del componente sea una tarea fácil y asequible, y no ha hecho más que aumentar su popularidad con el paso de los años.\n\n--- STATS ---\nMax HP: 72,000  |  Regen: 12,960 HP/s\nDowned Delay: 13.3s  |  Damaged Delay: 6.7s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,500  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 990
item_Desc_SHLD_YORM_S01_Jaghte=Tipo de artículo: Generador de Escudo\nFabricante: Yorm\nTamaño: 1\nGrado: B\nClase: Competición\n\nConstruido pensando en el rendimiento, el generador de escudos de competición Jaghte de Yorm prioriza la salud del escudo y la tasa de generación sobre la fuerza y el sigilo.\n\n--- STATS ---\nMax HP: 1,920  |  Regen: 384 HP/s\nDowned Delay: 7.7s  |  Damaged Delay: 3.9s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 818  |  IR: 0\nPower Draw: 2 PU/s\nComponent HP: 91
item_Desc_SHLD_YORM_S02_Bamoty=Tipo de artículo: Generador de Escudo\nFabricante: Yorm\nTamaño: 2\nGrado: D\nClase: Competición\n\nEl Bamoty es la versión de Yorm de un generador de escudos de estilo comercial. Este componente de tamaño medio le ha granjeado a la empresa un mayor número de seguidores porque equilibra a la perfección rendimiento, durabilidad y sigilo.\n\n--- STATS ---\nMax HP: 6,400  |  Regen: 1,152 HP/s\nDowned Delay: 10.3s  |  Damaged Delay: 5.1s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,230  |  IR: 0\nPower Draw: 3 PU/s\nComponent HP: 200
item_Desc_SHLD_YORM_S02_Haltur=Tipo de artículo: Generador de Escudo\nFabricante: Yorm\nTamaño: 2\nGrado: B\nClase: Competición\n\nLa fuerte salud de su escudo y su excepcional tasa de generación otorgan al Haltur la mejor clasificación de rendimiento de todos los escudos de su clase. Amado por los corredores y los que prefieren alejarse del peligro en lugar de absorberlo.\n\n--- STATS ---\nMax HP: 6,400  |  Regen: 1,280 HP/s\nDowned Delay: 8.5s  |  Damaged Delay: 4.2s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,230  |  IR: 0\nPower Draw: 3 PU/s\nComponent HP: 250
item_Desc_SHLD_YORM_S02_Trenta=Tipo de artículo: Generador de Escudo\nFabricante: Yorm\nTamaño: 2\nGrado: C\nClase: Competición\n\nUna opción ideal para los corredores que buscan un generador de escudo que proporcione un rendimiento y una durabilidad por encima de la media. Además, la carcasa del Trenta está fabricada con una aleación de magnesio que lo hace resistente y ligero a la vez.\n\n--- STATS ---\nMax HP: 6,400  |  Regen: 1,216 HP/s\nDowned Delay: 9.3s  |  Damaged Delay: 4.7s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,230  |  IR: 0\nPower Draw: 3 PU/s\nComponent HP: 220
