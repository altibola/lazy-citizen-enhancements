item_descQDRV_RSI_S02_Khaos_SCItem=Tipo de artículo: Quantum Drive\nFabricante: RSI\nTamaño: 2\nGrado: C \nClase: Civil\n\nEl Khaos de RSI ha sido ajustado para proporcionar un rendimiento fiable con una construcción fiable. Una vez que lo lleves puesto, apreciarás el orden que este propulsor cuántico aporta al caos de los viajes.\n\n--- STATS ---\nQT Speed: 201 Mm/s  |  Spool: 6s\nCooldown: 16.9s\nFuel/Gm: 0.0101\nQT Fuel Use: 16 μ/s\nAccel:  S1: 3,000,000  |  S2: 13,200,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 3 PU/s\nComponent HP: 410\nSignatures:  EM: 27,000  |  IR: 0\nOverheat Temp: 383K\nMax Distortion: 3,500
item_descQDRV_RSI_S03_Metis_SCItem=Tipo de artículo: Quantum Drive\nFabricante: RSI\nTamaño: 3\nGrado: C\nClase: Civil\n\nNo hay lugar para el error cuando se dobla el espacio y el tiempo para viajar distancias increíbles. Así que confíe en RSI, una empresa que ha suministrado componentes de calidad al público desde los albores de los vuelos espaciales.\n\n--- STATS ---\nQT Speed: 246 Mm/s  |  Spool: 7s\nCooldown: 9.4s\nFuel/Gm: 0.0599\nQT Fuel Use: 26 μ/s\nAccel:  S1: 1,800,000  |  S2: 11,600,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 4 PU/s\nComponent HP: 1,100\nSignatures:  EM: 36,000  |  IR: 0\nOverheat Temp: 383K\nMax Distortion: 5,500
item_descQDRV_RSI_S03_Tyche_SCItem=Tipo de artículo: Quantum Drive\nFabricante: RSI\nTamaño: 3\nGrado: B\nClase: Civil\n\nEl propulsor cuántico Tyche equilibra armoniosamente rendimiento, durabilidad y sigilo para crear un componente completo capaz de manejar con destreza una gran variedad de situaciones.\n\n--- STATS ---\nQT Speed: 295 Mm/s  |  Spool: 7s\nCooldown: 9.1s\nFuel/Gm: 0.0541\nQT Fuel Use: 21 μ/s\nAccel:  S1: 2,160,000  |  S2: 13,900,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 4 PU/s\nComponent HP: 1,300\nSignatures:  EM: 36,000  |  IR: 0\nOverheat Temp: 394K\nMax Distortion: 6,000
item_descQDRV_TARS_S01_Wayfare_SCItem=Tipo de artículo: Quantum Drive\nFabricante: Tarsus \nTamaño: 1\nGrado: D \nClase: Civil\n\nVelocidad a través del espacio sin romper el banco. El Warfare es un pequeño propulsor cuántico de Tarsus diseñado específicamente para ayudar a que los viajes espaciales sean asequibles para las masas.\n\n--- STATS ---\nQT Speed: 138 Mm/s  |  Spool: 4s\nCooldown: 10.0s\nFuel/Gm: 0.0101\nQT Fuel Use: 8 μ/s\nAccel:  S1: 4,170,000  |  S2: 12,500,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 2 PU/s\nComponent HP: 130\nSignatures:  EM: 15,000  |  IR: 0\nOverheat Temp: 372K\nMax Distortion: 1,950
item_descQDRV_TARS_S02_Quest_SCItem=Tipo de artículo: Quantum Drive\nFabricante: Tarsus \nTamaño: 2\nGrado: D \nClase: Civil\n\n¿Por qué jugar con la perfección? Tarsus lleva siglos fabricando la unidad Quest para proporcionar a todo el mundo un componente de tamaño medio asequible que les lleve en sus aventuras.\n\n--- STATS ---\nQT Speed: 168 Mm/s  |  Spool: 6s\nCooldown: 18.0s\nFuel/Gm: 0.0112\nQT Fuel Use: 19 μ/s\nAccel:  S1: 2,500,000  |  S2: 11,000,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 3 PU/s\nComponent HP: 360\nSignatures:  EM: 22,500  |  IR: 0\nOverheat Temp: 372K\nMax Distortion: 3,050
item_descQDRV_TARS_S03_Drifter_SCItem=Tipo de artículo: Quantum Drive\nFabricante: Tarsus\nTamaño: 3\nGrado: D\nClase: Civil\n\nEquilibrio entre artesanía y coste, el Drifter ofrece las renombradas prestaciones de Tarsus a un precio asequible.\n\n--- STATS ---\nQT Speed: 205 Mm/s  |  Spool: 7s\nCooldown: 10.0s\nFuel/Gm: 0.0663\nQT Fuel Use: 31 μ/s\nAccel:  S1: 1,500,000  |  S2: 9,680,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 4 PU/s\nComponent HP: 990\nSignatures:  EM: 30,000  |  IR: 0\nOverheat Temp: 372K\nMax Distortion: 4,700
item_descQDRV_TARS_S03_Wanderer_SCItem=Tipo de artículo: Quantum Drive\nFabricante: Tarsus\nTamaño: 3\nGrado: C\nClase: Civil\n\nTarsus diseñó y ajustó cuidadosamente el Wanderer para convertirlo en una unidad cuántica sólida en todos los sentidos, lo que lo convierte en uno de los componentes más populares de su venerada gama.\n\n--- STATS ---\nQT Speed: 246 Mm/s  |  Spool: 7s\nCooldown: 10.0s\nFuel/Gm: 0.0644\nQT Fuel Use: 26 μ/s\nAccel:  S1: 1,800,000  |  S2: 11,600,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 4 PU/s\nComponent HP: 1,100\nSignatures:  EM: 30,000  |  IR: 0\nOverheat Temp: 383K\nMax Distortion: 5,500
item_descQDRV_WETK_S02_XL1_SCItem=Tipo de artículo: Quantum Drive\nFabricante: Wei-Tek\nTamaño: 2\nGrado: A \nClase: Militar\n\nPuede que Wei-Tek sea una empresa nueva, pero su línea de componentes de grado militar ya está ganando notoriedad. El XL-1 es su primera unidad de quantum medio que combina de forma experta rendimiento y durabilidad.\n\n--- STATS ---\nQT Speed: 324 Mm/s  |  Spool: 6s\nCooldown: 22.9s\nFuel/Gm: 0.0240\nQT Fuel Use: 11 μ/s\nAccel:  S1: 4,830,000  |  S2: 21,300,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 4 PU/s\nComponent HP: 840\nSignatures:  EM: 26,300  |  IR: 0\nOverheat Temp: 453K\nMax Distortion: 7,000
item_descQDRV_WETK_S03_Balandin_SCItem=Tipo de artículo: Quantum Drive\nFabricante: Wei-Tek\nTamaño: 3\nGrado: B\nClase: Militar\n\nWei-Tek construyó el Balandin pensando en el personal militar y de seguridad. Tras una serie de pruebas realizadas por veteranos, los ingenieros aceleraron los tiempos de bobinado y calibración, al tiempo que mejoraron la precisión y estabilidad del componente.\n\n--- STATS ---\nQT Speed: 339 Mm/s  |  Spool: 7s\nCooldown: 12.3s\nFuel/Gm: 0.1352\nQT Fuel Use: 21 μ/s\nAccel:  S1: 2,480,000  |  S2: 16,000,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 5 PU/s\nComponent HP: 2,100\nSignatures:  EM: 33,800  |  IR: 0\nOverheat Temp: 438K\nMax Distortion: 10,000
