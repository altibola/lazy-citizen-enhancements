vehicle_DescAEGS_Retaliator=Fabricante: Aegis Dynamics\nEnfoque: Heavy Gunship\n\nEsta remodelación civil del Retaliator actualiza el chasis del barco militar con espacio vacío que se puede equipar con varios módulos para satisfacer sus necesidades.\n\n--- STATS ---\nSCM: 205 m/s  |  Max: 1,100 m/s\nBoost: +400 m/s  /  -206 m/s\nCrew: 1  |  Length: 70.5m  |  Class: Combate\nTurrets: 12\nCoolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 18,480\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 116  |  E 110  |  D 0  |  T 0\nInsurance: 25.74 min base  |  8.58 min express
vehicle_DescAEGS_Sabre=Fabricante: Aegis Dynamics\nEnfoque: Stealth Fighter\n\nParte de la Fase Dos de nuevos modelos de naves de Aegis Dynamics, el Sabre fue diseñado como caza de superioridad espacial para aquellas situaciones en las que se necesita dejar una huella más ligera. Diseñado para responder con rapidez, el Sabre es más que capaz de establecer el dominio del campo de batalla en cualquier escenario de combate.\n\n--- STATS ---\nSCM: 223 m/s  |  Max: 1,235 m/s\nBoost: +480 m/s  /  -230 m/s\nCrew: 1  |  Length: 24.5m  |  Class: Combate  |  Role: Caza furtivo\nMRacks: 2× S4\nShields: 2× S1  |  Coolers: 2× S1  |  Power: 2× S1  |  QD: S1\nArmor HP: 2,772\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 20  |  E 16  |  D 0  |  T 0\nInsurance: 9.45 min base  |  3.15 min express
vehicle_DescAEGS_Sabre_Comet=Fabricante: Aegis Dynamics\nEnfoque: Stealth Fighter\n\nCreado como parte de la serie 'Masters of Flight' junto con el simulador de vuelo Arena Commander, el Comet rinde homenaje al famoso piloto Capitán Kamur Dalion por su trabajo con Aegis para marcar el comienzo de una nueva era en el diseño de naves de combate. Este Sable viene equipado con un equipo especializado para combates aéreos y una librea personalizada de edición especial que rinde homenaje a esta emblemática nave.\n\n--- STATS ---\nCrew: 1  |  Length: 24.5m  |  Class: Combate  |  Role: Caza furtivo\nMRacks: 2× S4\nShields: 2× S1  |  Coolers: 2× S1  |  Power: 2× S1  |  QD: S1\nArmor HP: 2,772\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 20  |  E 16  |  D 0  |  T 0\nInsurance: 9.45 min base  |  3.15 min express
