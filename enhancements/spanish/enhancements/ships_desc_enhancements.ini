vehicle_DescCRUS_Starlifter_M2=Fabricante: Crusader Industries\nEnfoque: Carga media / Combate\n\nEl Hércules M2 es el primer starlifter táctico de la UEE. La potente combinación de capacidad, maniobrabilidad, durabilidad y robusto armamento de este transporte a gran escala garantiza que la carga y la tripulación lleguen a su destino de una pieza.\n\n--- STATS ---\nSCM: 160 m/s  |  Max: 950 m/s\nBoost: +320 m/s  /  -170 m/s\nCrew: 3  |  Length: 70.0m  |  Class: Transporte  |  Role: Carguero mediano\nTurrets: 3\nCoolers: 2× S3  |  QD: S3\nArmor HP: 23,400\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 385  |  E 300  |  D 0  |  T 0\nInsurance: 25.00 min base  |  8.00 min express
vehicle_DescDRAK_Buccaneer=Fabricante: Drake Interplanetary\nEnfoque: Interdicción\n\nEl Buccaneer ha sido diseñado desde cero para volar y luchar como tú vives. Aquí no hay interiores de cuero ni hiperalmohadas: el Bucc es un caza diseñado para maniobrar y luchar por encima de sus posibilidades. Este caza fronterizo puede mantenerse en las peores condiciones para mantener con vida a las tripulaciones espaciales.\n\n--- STATS ---\nSCM: 240 m/s  |  Max: 1,400 m/s\nBoost: +600 m/s  /  -260 m/s\nCrew: 1  |  Length: 15.2m  |  Class: Combate  |  Role: Caza ligero\nShields: S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,160\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 8  |  D 0  |  T 0\nInsurance: 5.40 min base  |  1.80 min express
