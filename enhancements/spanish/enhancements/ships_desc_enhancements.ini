vehicle_DescCRUS_Starlifter_A2=Fabricante: Crusader Industries\nEnfoque: Carguero mediano / Cañonera\n\nLa cañonera A2 se ha utilizado con efectos devastadores en asaltos aéreos, operaciones de búsqueda y rescate e iniciativas de desembarco. Con más del doble de potencia de fuego que el M2 y un compartimento de bombas personalizado capaz de transportar una asombrosa carga útil, el A2 es ideal para cualquiera que transporte grandes cantidades de carga por cielos potencialmente hostiles.\n\n--- STATS ---\nSCM: 160 m/s  |  Max: 950 m/s\nBoost: +320 m/s  /  -170 m/s\nCrew: 8  |  Length: 70.0m  |  Class: Combate  |  Role: Bombardero pesado\nTurrets: 12\nInsurance: 39.24 min base  |  13.08 min express
