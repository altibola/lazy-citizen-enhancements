vehicle_DescANVL_Hurricane=Fabricante: Anvil Aerospace\nEnfoque: Caza Pesado\n\nLas cosas grandes vienen en envases pequeños: el Huracán es una nave espacial de combate que empaqueta un golpe mortal en un fuselaje pequeño. La nave compensa su falta de comodidades con su potente armamento: seis cañones capaces de abrirse paso a través de casi cualquier cosa. Los pilotos del Huracán aún no han encontrado un escudo enemigo que no puedan derribar.\n\n--- STATS ---\nSCM: 214 m/s  |  Max: 1,125 m/s\nBoost: +480 m/s  /  -225 m/s\nCrew: 1  |  Length: 0.0m  |  Class: Combate  |  Role: Caza pesado\nShields: S2  |  Coolers: 2× S1  |  Power: 2× S1  |  QD: S1\nArmor HP: 9,900\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 54  |  E 29  |  D 0  |  T 0\nInsurance: 8.55 min base  |  2.85 min express
