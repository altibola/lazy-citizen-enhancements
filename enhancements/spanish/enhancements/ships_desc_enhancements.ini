vehicle_DescMISC_Razor=Fabricante: Mirai \nEnfoque: Carreras\n\nEsta avanzada nave de carreras cuenta con un avanzado armazón espacial de materiales compuestos que antepone la velocidad pura a todo lo demás... es la nave para los pilotos que quieren dejar a la competencia en el polvo.\n\n--- STATS ---\nSCM: 265 m/s  |  Max: 1,450 m/s\nBoost: +595 m/s  /  -290 m/s\nCrew: 1  |  Length: 12.5m  |  Class: Competición  |  Role: Carreras\nInsurance: 6.08 min base  |  2.02 min express
vehicle_DescMISC_Razor_EX=Fabricante: Mirai\nEnfoque: Sigilo\n\nEquipado con materiales que reducen la visibilidad, el Razor EX era un modelo especial de la UEE Advocacy para su uso en operaciones de vigilancia y extracción. Aunque finalmente se rechazó el uso generalizado del EX, se lanzó una variante del modelo para los ciudadanos que deseaban pasar más desapercibidos.\n\n--- STATS ---\nSCM: 265 m/s  |  Max: 1,450 m/s\nBoost: +595 m/s  /  -290 m/s\nCrew: 1  |  Length: 12.5m  |  Class: Combate  |  Role: Caza furtivo\nShields: S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nInsurance: 5.91 min base  |  1.97 min express
vehicle_DescMISC_Razor_LX=Fabricante: Mirai\nEnfoque: Lujo\n\nLa Razor se ha sobrealimentado. El LX cuenta con un motor overclockeado que le permite alcanzar velocidades de vértigo. Esta potencia tiene un coste, ya que reduce la maniobrabilidad y el armamento, por lo que es ideal para las carreras en línea recta. Pero quién necesita armas cuando estás dejando a tu competencia en el polvo.\n\n--- STATS ---\nSCM: 275 m/s  |  Max: 1,525 m/s\nBoost: +490 m/s  /  -290 m/s\nCrew: 1  |  Length: 12.5m  |  Class: Competición  |  Role: Carreras\nInsurance: 6.08 min base  |  2.02 min express
vehicle_DescMISC_Reliant=Fabricante: MISC\nEnfoque: Carga Ligera\n\nCon la Reliant Kore, MISC añade a su ya impresionante línea de naves, una nave espacial más pequeña de clase introductoria. Utilizando diseños avanzados de Xi'An, la Reliant cuenta con alas anchas y elegantes, propulsores omnidireccionales y una cabina biplaza totalmente articulada que admite los modos de vuelo horizontal y vertical. Todo ello, combinado con una mayor capacidad de carga que muchas naves de su clase, hace de la Kore una elección natural para el transporte de corto alcance, o con la simple adición de unos pocos componentes opcionales, esta nave puede hacer cualquier cosa que sueñes.\n\n--- STATS ---\nCrew: 1  |  Length: 14.8m  |  Class: Transporte  |  Role: Inicial / Carguero ligero\nGuns: 2  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,200\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 0.68 min base  |  0.00 min express
vehicle_DescMISC_Reliant_Mako=Fabricante: MISC\nEnfoque: Informar\n\nEl Imperio depende de la información al segundo, por lo que los reporteros necesitan poder ir allí donde se producen las noticias: donde sea y cuando sea. El Mako ofrece toda la flexibilidad y fiabilidad de un MISC Reliant combinada con un paquete de cámaras Cernan de última generación para capturar cada momento con la claridad y precisión necesarias para aparecer en los titulares.\n\n--- STATS ---\nSCM: 220 m/s  |  Max: 1,150 m/s\nBoost: +480 m/s  /  -250 m/s\nCrew: 1  |  Length: 14.8m  |  Class: Asistencia  |  Role: Rastreo\nGuns: 2  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,200\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 5.36 min base  |  1.79 min express
vehicle_DescMISC_Reliant_Sen=Fabricante: MISC\nEnfoque: Ciencia ligera\n\nMagallanes, Pierce, Croshaw, nombres que resuenan en la historia gracias a su espíritu aventurero, una naturaleza curiosa y una nave fiable. La Reliant Sen es una versátil plataforma científica móvil; equipada con capacidades de largo alcance para llevarte más lejos, durante más tiempo, y el avanzado conjunto de sensores Samos. Perfecta para el aspirante a explorador que desea susurrar su nombre en los pasillos de la historia.\n\n--- STATS ---\nSCM: 220 m/s  |  Max: 1,150 m/s\nBoost: +480 m/s  /  -250 m/s\nCrew: 1  |  Length: 14.8m  |  Class: Industrial  |  Role: Investigación mediano\nGuns: 2  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,200\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 4.82 min base  |  1.61 min express
vehicle_DescMISC_Reliant_Tana=Fabricante: MISC\nEnfoque: Caza ligero\n\nCon la humanidad en constante expansión por el universo, la necesidad de un caza ligero y versátil ha aumentado con ella. Fácil de mantener y de construcción robusta, el Reliant Tana es una opción ideal para la defensa de fronteras y puestos avanzados gracias a su planta de energía de alto rendimiento, escudos más resistentes y montajes de armas adicionales.\n\n--- STATS ---\nSCM: 222 m/s  |  Max: 1,150 m/s\nBoost: +480 m/s  /  -250 m/s\nCrew: 1  |  Length: 14.8m  |  Class: Combate  |  Role: Caza ligero\nGuns: 2  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 3,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 4.82 min base  |  1.61 min express
vehicle_DescMISC_Starfarer=Fabricante: MISC MISC\nEnfoque: Reabastecimiento pesado\n\nEl Starfarer difiere de los cargueros a granel tradicionales en un aspecto clave: es una plataforma dedicada al combustible. El Starfarer no sólo está diseñado para cargar, almacenar y proteger unidades de estasis de combustible, sino también para recibir gases espaciales y refinarlos para su uso sin aterrizar. Y aunque sobresale en esto, el Starfarer también puede utilizarse para transportar cápsulas de carga a granel tradicionales.\n\n--- STATS ---\nSCM: 106 m/s  |  Max: 845 m/s\nBoost: +295 m/s  /  -106 m/s\nCrew: 1  |  Length: 102.0m  |  Class: Asistencia  |  Role: Repostador pesado\nTurrets: 1\nShields: 3× S3  |  Coolers: 2× S3  |  Power: S3  |  QD: S3\nArmor HP: 12,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 315  |  E 360  |  D 0  |  T 0\nInsurance: 18.00 min base  |  6.00 min express
vehicle_DescMISC_Starfarer_Gemini=Fabricante: MISC\nFoco: Reabastecimiento Pesado\n\nEl ejército del Imperio Unido de la Tierra utiliza una variante adaptada del Starfarer para sus operaciones de primera línea. El G2M Gemini, más comúnmente el Starfarer Gemini o "Star G", intercambia algo de capacidad de carga y maniobrabilidad a cambio de blindaje reforzado, mayor protección, motores más potentes y versiones más potentes de las tres torretas tripuladas.\n\n--- STATS ---\nSCM: 106 m/s  |  Max: 845 m/s\nBoost: +295 m/s  /  -106 m/s\nCrew: 2  |  Length: 102.0m  |  Class: Asistencia  |  Role: Repostador pesado\nTurrets: 1\nShields: 3× S3  |  Coolers: 2× S3  |  Power: S3  |  QD: S3\nArmor HP: 18,150\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 331  |  E 378  |  D 0  |  T 0\nInsurance: 35.34 min base  |  11.78 min express
