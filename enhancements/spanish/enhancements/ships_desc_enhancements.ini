vehicle_DescORIG_100i=Fabricante: Origin Jumpworks\nEnfoque: Starter / Touring\n\nRecorre el universo con la combinación perfecta de lujo y rendimiento. La 100i cuenta con el sistema de combustible AIR patentado por Origin Jumpworks, lo que la convierte en la nave más eficiente y ecológica del mercado. Capaz de realizar vuelos de larga distancia para los que la mayoría de las naves de su tamaño no están equipadas, la 100i es perfecta para pilotos en solitario que buscan llamar la atención sin sacrificar funcionalidad ni fiabilidad.\n\n--- STATS ---\nSCM: 223 m/s  |  Max: 1,230 m/s\nBoost: +610 m/s  /  -290 m/s\nCrew: 1  |  Length: 19.0m  |  Class: Exploración  |  Role: Inicial / Exploración\nGuns: 2\nShields: S1  |  Coolers: 2× ?  2× S1  |  Power: S1  |  QD: S1\nArmor HP: 1,920\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 7  |  D 0  |  T 0\nInsurance: 3.36 min base  |  1.12 min express
vehicle_DescORIG_125a=Fabricante: Origin Jumpworks\nEnfoque: Starter / Light Fighter\n\nLos riesgos están para correrlos, pero ¿por qué arriesgarse a quedarse sin combustible en el fragor de la batalla? Con el sistema de combustible AIR, un paquete de armas mejorado y todo el lujo y refinamiento que esperas de Origin Jumpworks, el 125a ha sido diseñado para los inconformistas más exigentes.\n\n--- STATS ---\nSCM: 230 m/s  |  Max: 1,260 m/s\nBoost: +610 m/s  /  -300 m/s\nCrew: 1  |  Length: 19.0m  |  Class: Combate  |  Role: Caza ligero\nGuns: 2\nShields: S1  |  Coolers: 2× ?  2× S1  |  Power: S1  |  QD: S1\nArmor HP: 1,920\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 7  |  D 0  |  T 0\nInsurance: 4.54 min base  |  1.51 min express
vehicle_DescORIG_135c=Fabricante: Origin Jumpworks\nEnfoque: Arrancador / Carguero Ligero\n\nCon una cantidad engañosa de espacio de almacenamiento en su chasis elegante y estilizado, y el sistema de combustible AIR patentado por Origin, el modelo 135c es la elección obvia para músicos, mensajeros y cualquiera que intente que empiece la fiesta. Llega rápido y luce bien mientras lo haces.\n\n--- STATS ---\nSCM: 220 m/s  |  Max: 1,250 m/s\nBoost: +610 m/s  /  -290 m/s\nCrew: 1  |  Length: 19.0m  |  Class: Transporte  |  Role: Carguero ligero\nGuns: 2\nShields: S1  |  Coolers: 2× ?  2× S1  |  Power: S1  |  QD: S1\nArmor HP: 1,920\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 7  |  D 0  |  T 0\nInsurance: 3.78 min base  |  1.26 min express
vehicle_DescORIG_300i=Fabricante: Origin Jumpworks\nFocus: Touring\n\nSi vas a viajar por las estrellas... ¿por qué no hacerlo con estilo? La 300i es la primera nave espacial de lujo de Origin Jumpworks. Es un elegante asesino plateado que envía un mensaje tanto con su silueta como con sus cañones de partículas.\n\n--- STATS ---\nSCM: 258 m/s  |  Max: 1,440 m/s\nBoost: +550 m/s  /  -270 m/s\nCrew: 1  |  Length: 27.0m  |  Class: Exploración  |  Role: Turismo de lujo\nMRacks: 2× S2\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 1,920\nDmg Mult: P 0.80x  |  E 0.65x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 7  |  D 0  |  T 0\nInsurance: 7.76 min base  |  2.59 min express
vehicle_DescORIG_315p=Fabricante: Origin Jumpworks\nEnfoque: Pathfinder\n\nLa exploración es la vocación más elevada del hombre. Prepárate para cartografiar horizontes lejanos con la pieza tecnológica más sofisticada del hombre, el Origin 315p. Con una planta motriz más robusta y un paquete de escaneo personalizado, diseñado exclusivamente por Chimera Communications.\n\n--- STATS ---\nSCM: 258 m/s  |  Max: 1,460 m/s\nBoost: +550 m/s  /  -270 m/s\nCrew: 1  |  Length: 27.0m  |  Class: Exploración  |  Role: Exploración\nMRacks: 2× S2\nShields: 2× S1  |  Coolers: 2× S1  |  QD: S1\nArmor HP: 1,920\nDmg Mult: P 0.80x  |  E 0.65x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 7  |  D 0  |  T 0\nInsurance: 5.18 min base  |  1.73 min express
vehicle_DescORIG_325a=Fabricante: Origin Jumpworks\nEnfoque: Interdicción\n\nQue sea una galaxia dura no significa que tengas que sacrificar tu comodidad: el 325a puede salir victorioso de cualquier combate aéreo. La 325a cuenta con una avanzada carga útil de armamento, así como con un sistema de puntería personalizado diseñado especialmente para la 325a por WillsOp.\n\n--- STATS ---\nSCM: 260 m/s  |  Max: 1,430 m/s\nBoost: +600 m/s  /  -270 m/s\nCrew: 1  |  Length: 27.5m  |  Class: Combate  |  Role: Interceptor\nMRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 1,920\nDmg Mult: P 0.80x  |  E 0.65x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 7  |  D 0  |  T 0\nInsurance: 6.21 min base  |  2.07 min express
vehicle_DescORIG_350r=Fabricante: Origin Jumpworks\nEnfoque: Carreras\n\nLa serie 300 de Origin Jumpwork es la fusión definitiva de elegancia y astroingeniería. Cada componente está calibrado individualmente para garantizar que tu nave se mantenga en perfecta armonía. El 350r, con diferencia el miembro más rápido de la familia, reenfoca la potencia del 300 y la traduce en velocidad pura.\n\n--- STATS ---\nSCM: 265 m/s  |  Max: 1,500 m/s\nBoost: +490 m/s  /  -270 m/s\nCrew: 1  |  Length: 27.0m  |  Class: Competición  |  Role: Carreras\nMRacks: 2× S2\nShields: 2× S1  |  Coolers: 2× S1  |  QD: S1\nArmor HP: 1,920\nDmg Mult: P 0.80x  |  E 0.65x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 7  |  D 0  |  T 0\nInsurance: 10.14 min base  |  3.38 min express
