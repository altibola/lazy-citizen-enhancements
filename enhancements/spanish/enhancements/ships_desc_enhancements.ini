vehicle_DescANVL_Lightning_F8C_Exec=Fabricante: Anvil Aerospace \nEnfoque: Cazas pesados\n\nSiempre dispuesto a mejorar hasta casi la perfección, Anvil se ha coordinado con el Chairman's Club para crear esta impresionante obra de arte del vuelo, el F8C Lighting Executive Edition. El casco ha sido bellamente acentuado con una exclusiva librea premium, mientras que en la cabina encontrará suntuosos detalles dorados y metálicos, una digna corona para este rey de los cazas pesados.\n\n--- STATS ---\nCrew: 1  |  Length: 26.0m  |  Class: Combate  |  Role: Caza pesado\nMRacks: 2× S4\nShields: 2× S2  |  Coolers: 2× S1  |  Power: S2  |  QD: S1\nArmor HP: 10,890\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 54  |  E 29  |  D 0  |  T 0\nInsurance: 16.03 min base  |  5.34 min express
