vehicle_DescANVL_Valkyrie_CitizenCon=Fabricante: Anvil Aerospace \nEnfoque: Militar / Industrial\n\nDurante más de un siglo, las naves Anvil se han distinguido en innumerables operaciones de combate civiles y militares. Honra esa orgullosa tradición de seguridad con la edición limitada Liberator Edition Valkyrie, que incluye un exclusivo paquete de adornos conmemorativo del debut de la nave en la CitizenCon 2948.\n\n--- STATS ---\nCrew: 1  |  Length: 48.0m  |  Class: Combate  |  Role: Desembarco de tropas\nTurrets: 7\nShields: 2× S2  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 23,760\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 139  |  E 88  |  D 0  |  T 0\nInsurance: 19.82 min base  |  4.98 min express
