vehicle_DescXIAN_Scout=Fabricante: Aopoa\nEnfoque: Caza ligero\n\nLa corporación Xi'an Aopoa fabrica un modelo de exportación del Qhire Khartu, el Khartu-al, para su venta a civiles humanos como explorador. El modelo de exportación cuenta con el mismo equipo de maniobra de Xi'an, pero con superficies de control modificadas para uso humano y un armamento más limitado.\n\n--- STATS ---\nSCM: 224 m/s  |  Max: 1,183 m/s\nBoost: +504 m/s  /  -254 m/s\nCrew: 1  |  Length: 32.0m  |  Class: Combate  |  Role: Caza ligero\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,400\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 10  |  E 9  |  D 0  |  T 0\nInsurance: 5.06 min base  |  1.69 min express
vehicle_DescXNAA_SantokYai=Fabricante: Aopoa\nEnfoque: Caza mediano\n\nAprovechando el poder de los sistemas de vuelo Xi'an de próxima generación, propulsores de doble vector mejorados y un paquete de armas desalentador, Aopoa ha creado un caza que conserva la ágil destreza y el manejo firme del la marca es conocida.\n\n--- STATS ---\nSCM: 227 m/s  |  Max: 1,161 m/s\nBoost: +493 m/s  /  -225 m/s\nCrew: 1  |  Length: 24.0m  |  Class: Combate  |  Role: Caza mediano\nInsurance: 7.50 min base  |  2.50 min express
vehicle_Descprobe_comms_1_a=Fabricante: Chimera Communications \nEnfoque: Recon\n\nEl Auris, del fabricante Chimera Communications, permite recoger y almacenar fácilmente las transmisiones, lo que lo hace ideal para la monitorización de actividades de corto alcance. Diseñado para ser prácticamente invisible mientras funciona, este monitor pasivo de recopilación de datos (PDC) de baja potencia es perfecto para proporcionar seguridad adicional a cualquier estación o instalación con un registro detallado de las transmisiones de datos y los registros de tráfico de buques locales. Además, el transmisor de ráfaga de reserva incluido permite transferir los almacenes de datos en caso de emergencia, lo que proporciona una mayor tranquilidad.\n\n--- STATS ---\nCrew: 1  |  Length: 18.0m  |  Class: Transporte  |  Role: Carguero ligero\nShields: S1  |  Coolers: S1  |  Power: S3\nInsurance: 33.33 min base  |  3.33 min express
