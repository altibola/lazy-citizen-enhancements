vehicle_DescRSI_Zeus_CL=Fabricante: Roberts Space Industries\nEnfoque: carga media\n\nListo para transportar a toda una nueva generación de viajeros a través del universo, Roberts Space Industries se enorgullece de presentar una nave estelar con ocho siglos de desarrollo: la nueva nave espacial Zeus Mk II. Rindiendo homenaje al diseño clásico que lanzó a la Humanidad a las estrellas en 2140, el Zeus Mk II se ha actualizado para superar los estándares modernos y al mismo tiempo conservar el corazón de este querido ícono espacial. Con un enfoque en el comercio, la edición Zeus Mk II CL cuenta con espacio de carga adicional y una viga tractora ideal para manejar grandes volúmenes de carga.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,000 m/s\nBoost: +400 m/s  /  -210 m/s\nCrew: 3  |  Length: 46.0m  |  Class: Transporte  |  Role: Carguero mediano\nShields: 3× S2\nInsurance: 10.67 min base  |  2.67 min express
