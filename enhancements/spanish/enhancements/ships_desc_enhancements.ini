vehicle_DescAEGS_Gladius_Valiant=Fabricante: Aegis Dynamics\nFoco: Caza Ligero \n\nCreado como parte de la serie 'Masters of Flight' junto con el simulador de vuelo Arena Commander, el Valiant rinde tributo a la famosa piloto de defensa Condi Hillard por ser la primera humana en derrotar a un Vanduul en combate. Este Gladius viene equipado con una dotación especializada para combates aéreos y una librea personalizada de edición especial que rinde homenaje a su emblemática nave.\n\n--- STATS ---\nCrew: 1  |  Length: 21.0m  |  Class: Combate  |  Role: Caza ligero\nMRacks: 4× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 3,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 5.83 min base  |  1.94 min express
