vehicle_DescRSI_Constellation_Phoenix=Fabricante: RSI\nEnfoque: Touring\n\nUna nave espacial de lujo dedicada al capitán estelar exigente. La Constellation Phoenix puede utilizarse como nave de mando de la organización y cuenta con un lujoso interior rediseñado. Incluye una zona oculta amortiguada por sensores para su carga más preciada. La Phoenix viene con un rover Lynx y un caza Kruger P-72 Archimedes.\n\n--- STATS ---\nSCM: 185 m/s  |  Max: 995 m/s\nBoost: +385 m/s  /  -191 m/s\nCrew: 1  |  Length: 63.5m  |  Class: Exploración  |  Role: Turismo de lujo\nTurrets: 1  |  MRacks: 4× S4\nShields: S3  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 13,440\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 116  |  E 110  |  D 0  |  T 0\nInsurance: 24.30 min base  |  8.10 min express
