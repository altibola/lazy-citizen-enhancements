vehicle_DescAEGS_Javelin=Fabricante: Aegis Dynamics\nEnfoque: Destructor\n\nDiseñada para ser utilizada por el ejército de la UEE, la Javelin es una enorme nave capital modular que puede ser apropiada para uso empresarial. Con un interior detallado, muchas opciones de espacio modular y una gran capacidad de tripulación, la Javelin es una nave que se ha hecho un nombre en una gran variedad de funciones.\n\n--- STATS ---\nSCM: 50 m/s  |  Max: 900 m/s\nBoost: +290 m/s  /  -230 m/s\nCrew: 1  |  Length: 0.0m  |  Class: Destructor  |  Role: Destructor\nTurrets: 28\nShields: 4× S4  |  Coolers: 4× S4  |  Power: 4× S4  |  QD: S4\nArmor HP: 117,810\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 539  |  E 473  |  D 0  |  T 0\nInsurance: 168.75 min base  |  56.25 min express
vehicle_DescAEGS_Reclaimer=Fabricante: Aegis Dynamics\nEnfoque: Reciclado Pesado\n\nLa Aegis Reclaimer es una nave de reciclado industrial. Equipada con una bahía de carga reforzada, una unidad de salto de largo alcance y cápsulas de lanzamiento para drones no tripulados, la Recuperadora es una nave ideal para aprovechar los restos de naufragios en el espacio profundo. Los haces tractores, los focos, las opciones de escáner y los puertos de acoplamiento completan las herramientas de esta nave espacial capaz y utilitaria.\n\n--- STATS ---\nSCM: 110 m/s  |  Max: 870 m/s\nBoost: +290 m/s  /  -115 m/s\nCrew: 1  |  Length: 160.0m  |  Class: Industrial  |  Role: Reciclador pesado\nTurrets: 3\nShields: S4  |  Coolers: S4  |  Power: S4  |  QD: S3\nArmor HP: 32,912\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 495  |  E 418  |  D 0  |  T 0\nInsurance: 30.69 min base  |  10.23 min express
