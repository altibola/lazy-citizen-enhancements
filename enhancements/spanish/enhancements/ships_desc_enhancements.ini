vehicle_DescRSI_Perseus=Fabricante: RSI\nEnfoque: Cañonera\n\nCuando RSI se propuso hacer la declaración moderna definitiva en prevención persuasiva, miraron hacia su propio pasado, a las históricas cañoneras designadas Perseo. Capaz de destrozar goliats de clase subcapital, la mera presencia de una cañonera Perseo en un escuadrón de bloqueo o patrulla basta para hacer que tus enemigos más agresivos se lo piensen dos veces antes de entablar combate, al igual que su homónimo de época.\n\n--- STATS ---\nSCM: 150 m/s  |  Max: 1,050 m/s\nBoost: +350 m/s  /  -160 m/s\nCrew: 6  |  Length: 100.0m  |  Class: Combate  |  Role: Cañonera pesada\nInsurance: 38.00 min base  |  9.50 min express
