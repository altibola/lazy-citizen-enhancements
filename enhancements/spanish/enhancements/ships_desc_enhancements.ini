vehicle_DescARGO_RAFT=Fabricante: Argo Astronautics\nEnfoque: Carga\n\nEl Argo RAFT cuenta con una fuerte bodega de carga de 96 SCU, y es capaz de transportar hasta tres contenedores de carga estandarizados de 32 SCU. Perfecto para transportistas principiantes y profesionales por igual, el RAFT es una solución ideal para el transporte de carga local fiable.\n\n--- STATS ---\nSCM: 140 m/s  |  Max: 990 m/s\nBoost: +340 m/s  /  -150 m/s\nCrew: 2  |  Length: 39.5m  |  Class: Transporte  |  Role: Carguero mediano\nInsurance: 14.00 min base  |  2.00 min express
