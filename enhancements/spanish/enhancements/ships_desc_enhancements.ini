vehicle_DescMISC_Freelancer=Fabricante: MISC\nEnfoque: Carguero mediano\n\nLas grandes corporaciones utilizan los Freelancers como naves mercantes de largo recorrido, pero los capitanes independientes que desean operar en los confines de la galaxia los reutilizan con la misma frecuencia como naves dedicadas a la exploración.\n\n--- STATS ---\nSCM: 197 m/s  |  Max: 1,050 m/s\nBoost: +400 m/s  /  -205 m/s\nCrew: 1  |  Length: 38.0m  |  Class: Transporte  |  Role: Carguero ligero\nTurrets: 1  |  MRacks: 2× S3  2× S4\nShields: 3× S2  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 10,560\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 41  |  E 43  |  D 0  |  T 0\nInsurance: 12.99 min base  |  4.33 min express
vehicle_DescMISC_Freelancer_DUR=Fabricante: MISC\nEnfoque: Expedición \n\nLa variante DUR del Freelancer está especializada en la exploración. Sacrificar el 25% de la capacidad de carga de la Freelancer estándar por un motor de salto mejorado, un escáner más avanzado y un depósito de combustible ampliado puede parecer una mala decisión para algunos, pero aquellos que valoran el descubrimiento por encima del beneficio encontrarán en ella su nave preferida.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,100 m/s\nBoost: +403 m/s  /  -205 m/s\nCrew: 1  |  Length: 38.0m  |  Class: Exploración  |  Role: Expedición\nTurrets: 1  |  MRacks: 2× S3  2× S4\nShields: 3× S2  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 10,560\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 41  |  E 43  |  D 0  |  T 0\nInsurance: 12.99 min base  |  4.33 min express
vehicle_DescMISC_Freelancer_MAX=Fabricante: MISC\nEnfoque: Carga media\n\nVariante Freelancer con capacidad de carga adicional a expensas del armamento. La variante Freelancer MAX sacrifica armamento por una mayor capacidad de carga, lo que la hace ideal para el transporte de equipos o materias primas.\n\n--- STATS ---\nSCM: 195 m/s  |  Max: 1,025 m/s\nBoost: +395 m/s  /  -205 m/s\nCrew: 1  |  Length: 38.0m  |  Class: Transporte  |  Role: Carguero mediano\nTurrets: 1  |  MRacks: 2× S3  2× S4\nShields: 3× S2  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 10,560\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 41  |  E 43  |  D 0  |  T 0\nInsurance: 16.46 min base  |  5.49 min express
vehicle_DescMISC_Freelancer_MIS=Fabricante: MISC\nEnfoque: Cañonera\n\nEl MIS Freelancer es una variante militarizada de edición limitada de la clásica nave mercante desarrollada por la UEE. Se produjeron en cantidades muy reducidas debido a algunos incidentes iniciales con la carga útil. Esta versión sacrifica la mayor parte de la capacidad de carga para dar paso a los misiles.\n\n--- STATS ---\nSCM: 204 m/s  |  Max: 1,000 m/s\nBoost: +410 m/s  /  -205 m/s\nCrew: 1  |  Length: 38.0m  |  Class: Combate  |  Role: Cañonera\nTurrets: 1  |  MRacks: 4× S4  S5\nShields: 3× S2  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 15,840\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 41  |  E 43  |  D 0  |  T 0\nInsurance: 15.59 min base  |  5.20 min express
vehicle_DescMISC_Hull_A=Fabricante: MISC\nEnfoque: Carga media\n\nEl casco más pequeño y asequible. La Hull A es ideal para aquellos que se inician en la galaxia por su cuenta. La Hull A es muy similar al Aurora y al Mustang, pero carece de su naturaleza "multiusos". Mientras que los otros cambian capacidad de carga por potencia de fuego o velocidad, el casco A es 100% transporte para misiones.\n\n--- STATS ---\nSCM: 185 m/s  |  Max: 1,050 m/s\nBoost: +385 m/s  /  -195 m/s\nCrew: 1  |  Length: 30.0m  |  Class: Transporte  |  Role: Carguero ligero\nShields: S2  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 4,840\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 18  |  E 19  |  D 0  |  T 0\nInsurance: 5.95 min base  |  1.98 min express
vehicle_DescMISC_Hull_C=Fabricante: MISC\nEnfoque: Carguero pesado\n\nA menudo llamado la nave más común de la galaxia, el Hull C es el más producido de la gama y muchos lo consideran el más versátil. Diseñado para alcanzar el "punto ideal" entre los transportes más pequeños para una sola persona y los enormes supercargueros que componen el resto de la gama, el Hull C ofrece la modularidad expansiva de las naves más grandes y al mismo tiempo conserva un mínimo de la maniobrabilidad permitida por el bajo final del rango.\n\n--- STATS ---\nSCM: 110 m/s  |  Max: 890 m/s\nBoost: +290 m/s  /  -100 m/s\nCrew: 1  |  Length: 91.2m  |  Class: Transporte  |  Role: Carguero pesado\nShields: 3× S3  |  Power: S3\nArmor HP: 12,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 315  |  E 360  |  D 0  |  T 0\nInsurance: 45.00 min base  |  15.00 min express
vehicle_DescMISC_Prospector=Fabricante: MISC\nEnfoque: Minería\n\nDurante años, el Prospector ha sido la embarcación minera preferida del universo para los operadores en solitario. Con la elegante sensibilidad de diseño de MISC y un montón de herramientas de minería de alta tecnología mejoradas, el Prospector 2947 equilibra a la perfección forma y funcionalidad.\n\n--- STATS ---\nSCM: 156 m/s  |  Max: 994 m/s\nBoost: +371 m/s  /  -160 m/s\nCrew: 1  |  Length: 26.5m  |  Class: Industrial  |  Role: Minería ligero\nShields: 3× S1  |  Coolers: S2  |  Power: S2  |  QD: S1\nArmor HP: 8,228\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 18  |  E 19  |  D 0  |  T 0\nInsurance: 9.00 min base  |  3.00 min express
