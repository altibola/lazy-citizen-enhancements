vehicle_DescANVL_Terrapin=Fabricante: Anvil Aerospace\nEnfoque: Pathfinder\n\nPresentamos la nave de exploración Anvil Aerospace U4A-3 clase Terrapin. La Terrapin fue desarrollada a finales del siglo XXVIII para servir como primera nave en la reestructuración defensiva de la Armada del Imperio. La consigna del Terrapin es la protección, con amplios sistemas de escudos y capas de blindaje diseñadas para proporcionar la máxima defensa posible al piloto y la tripulación. Aunque carece de la maniobrabilidad de un caza dedicado, mantiene un avanzado y contundente arsenal de armas destinado a mantener a raya al más temible asaltante vanduul.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,150 m/s\nBoost: +320 m/s  /  -240 m/s\nCrew: 1  |  Length: 20.0m  |  Class: Asistencia  |  Role: Exploración\nInsurance: 7.88 min base  |  2.62 min express
