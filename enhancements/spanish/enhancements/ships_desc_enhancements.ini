vehicle_DescORIG_X1_Velocity=Fabricante: Origin Jumpworks\nEnfoque: Carreras\n\n¿Cómo hacer que lo rápido vaya más rápido? El X1 Velocity de Origin Jumpworks se atreve a superar los límites de la velocidad reduciendo el X1 básico a sus elementos básicos, eliminando el soporte del arma e incorporando nuevos compuestos Syntek para crear un chasis más ligero y reducir el peso total.\n\n--- STATS ---\nSCM: 222 m/s  |  Max: 611 m/s\nBoost: +302 m/s  /  -142 m/s\nCrew: 1  |  Length: 1.6m  |  Class: Competición  |  Role: Carreras\nShields: ?  |  Coolers: S0  |  Power: S0\nArmor HP: 1,560\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.15 min base  |  0.05 min express
