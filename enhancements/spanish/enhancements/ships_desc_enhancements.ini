vehicle_DescCNOU_Mustang_Beta=Fabricante: Consolidated Outland \nFocus: Pathfinder\n\nEl Mustang Beta, con su autonomía sin precedentes, está hecho para vuelos de larga duración. El motor de salto Tarsus Leaper estándar de fábrica permite al Beta viajar a los sistemas más lejanos de la galaxia con facilidad, mientras que los exclusivos habitáculos Com4T de la nave harán que el viaje parezca como si nunca hubieras salido de casa.\n\n--- STATS ---\nSCM: 228 m/s  |  Max: 1,218 m/s\nBoost: +500 m/s  /  -260 m/s\nCrew: 1  |  Length: 21.5m  |  Class: Exploración  |  Role: Exploración\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,000\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 10  |  E 9  |  D 0  |  T 0\nInsurance: 3.71 min base  |  1.24 min express
vehicle_DescCNOU_Mustang_Delta=Fabricante: Consolidated Outland \nEnfoque: Caza ligero\n\nAunque puede que no sea capaz de enfrentarse a algunas de las naves militares específicas, al reforzar la ya de por sí sólida construcción del casco del Mustang con la propia línea de blindaje de reducción de masa de clase Caballería de Consolidated Outland, el Delta tiene una firma de sección transversal reducida que iguala el campo de juego.\n\n--- STATS ---\nSCM: 226 m/s  |  Max: 1,195 m/s\nBoost: +500 m/s  /  -260 m/s\nCrew: 1  |  Length: 21.5m  |  Class: Combate  |  Role: Caza ligero\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,000\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 10  |  E 9  |  D 0  |  T 0\nInsurance: 4.01 min base  |  1.34 min express
vehicle_DescCNOU_Mustang_Gamma=Fabricante: Consolidated Outland \nEnfoque: Carreras\n\nLos equipos de diseño e ingeniería de Consolidated Outland han conseguido retocar y perfeccionar el Mustang hasta convertirlo en un admirable coche de carreras. El resultado final, el Mustang Gamma, ofrece una aceleración suave y potencia a raudales gracias a un innovador paquete que incluye tres potentes motores Magma Jet para conseguir el máximo empuje.\n\n--- STATS ---\nSCM: 244 m/s  |  Max: 1,230 m/s\nBoost: +533 m/s  /  -273 m/s\nCrew: 1  |  Length: 21.5m  |  Class: Competición  |  Role: Carreras\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,000\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 10  |  E 9  |  D 0  |  T 0\nInsurance: 7.28 min base  |  2.43 min express
vehicle_DescCNOU_Mustang_Omega=Fabricante: Consolidated Outland \nEnfoque: Racing\n\nConsolidated Outland se asoció con la empresa de tuneado personalizado Accelerated Mass Design para crear una edición limitada de carreras que cuenta con una toma de combustible aumentada para un reciclaje más rápido del ya impresionante sistema de sobrealimentación de la nave. Para rematar la colaboración, AMD recurrió al artista underground residente Sektor8 para diseñar el dinámico trabajo de pintura.\n\n--- STATS ---\nSCM: 244 m/s  |  Max: 1,230 m/s\nBoost: +533 m/s  /  -273 m/s\nCrew: 1  |  Length: 21.5m  |  Class: Competición  |  Role: Carreras\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,000\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 10  |  E 9  |  D 0  |  T 0\nInsurance: 7.28 min base  |  2.43 min express
