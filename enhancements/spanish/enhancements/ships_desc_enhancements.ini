vehicel_DescANVL_Valkyrie=Fabricante: Anvil Aerospace \nEnfoque: Militar / Industrial\n\nEl Valkyrie sube la apuesta en el transporte de tropas. Diseñada para transportar hasta veinte soldados, además de vehículos, a los lugares más hostiles, esta nave militar lista para el conflicto es una fuerza formidable, tanto ofensiva como defensivamente. Construido pensando en los militares y los contratistas privados de defensa, el Valkyrie es uno de los transportes de personal más eficientes y eficaces de su clase.\n\n--- STATS ---\nSCM: 207 m/s  |  Max: 1,110 m/s\nBoost: +431 m/s  /  -245 m/s\nCrew: 1  |  Length: 48.0m  |  Class: Combate  |  Role: Desembarco de tropas\nTurrets: 6\nShields: 2× S2  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 23,760\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 139  |  E 88  |  D 0  |  T 0\nInsurance: 19.82 min base  |  4.98 min express
vehicl_DescMISC_Hull_B=Fabricante: MISC\nEnfoque: Carga pesada\n\nEl MISC Hull B es una opción resistente para pilotos que buscan un transporte de carga exclusivo. Si bien no es tan grande como algunos de los otros modelos de la serie Hull, el perfil más pequeño del Hull B proporciona mayor flexibilidad y más opciones de acceso.\n\n--- STATS ---\nSCM: 145 m/s  |  Max: 960 m/s\nBoost: +340 m/s  /  -180 m/s\nCrew: 2  |  Length: 71.0m  |  Class: Transporte  |  Role: Carguero mediano\nInsurance: 11.66 min base  |  2.85 min express
vehicle_DescAEGS_Avenger_Stalker=Fabricante: Aegis Dynamics\nEnfoque: Interdicción\n\nInicialmente diseñado como la nave de transporte de primera línea de Aegis para el ejército, el Avenger Stalker tomó un camino diferente, teniendo finalmente una larga e histórica carrera como la nave de patrulla estándar de la UEE Advocacy. Utilizando su bodega de carga para el transporte de prisioneros, el Avenger presenta un casco robusto y fiable y la capacidad de montar motores más grandes de lo esperado.\n\n--- STATS ---\nSCM: 262 m/s  |  Max: 1,425 m/s\nBoost: +610 m/s  /  -280 m/s\nCrew: 1  |  Length: 20.0m  |  Class: Combate  |  Role: Interceptor\nGuns: 2× S1 (empty)  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 1,232\nDmg Mult: P 0.80x  |  E 0.65x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 4.86 min base  |  1.62 min express
vehicle_DescAEGS_Avenger_Titan=Fabricante: Aegis Dynamics\nEnfoque: Carga ligera \n\nAl carecer de las celdas de prisioneros del Stalker o del generador PEM del Warlock, la bodega del Titan está libre para transportar carga. Si unimos ese espacio disponible a las probadas y auténticas habilidades de combate del Avenger, obtenemos un carguero ligero que es más que capaz de manejarse por sí solo en un combate.\n\n--- STATS ---\nSCM: 262 m/s  |  Max: 1,425 m/s\nBoost: +610 m/s  /  -280 m/s\nCrew: 1  |  Length: 20.0m  |  Class: Transporte  |  Role: Carguero ligero\nGuns: 2× S1 (empty)  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,640\nDmg Mult: P 0.80x  |  E 0.65x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 4.05 min base  |  1.35 min express
vehicle_DescAEGS_Avenger_Titan_Renegade=Fabricante: Aegis Dynamics\nEnfoque: Light Freight\n\nCreado como parte de la serie 'Masters of Flight' en conjunto con el simulador de vuelo Arena Commander, el Renegade rinde homenaje al famoso piloto Danny Solomon por su notable trabajo con Advocacy to hacer justicia a Bremen. Este Avenger Titan viene equipado con un equipamiento especializado en peleas de perros y una decoración de edición especial personalizada en honor a este nave icónica.\n\n--- STATS ---\nCrew: 1  |  Length: 20.0m  |  Class: Transporte  |  Role: Carguero ligero\nGuns: 2× S1 (empty)  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,640\nDmg Mult: P 0.80x  |  E 0.65x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 4.05 min base  |  1.35 min express
vehicle_DescAEGS_Avenger_Warlock=Fabricante: Aegis Dynamics\nFoco: Interdicción\n\nEl Avenger Warlock fue construido con una única filosofía de diseño: detener naves, no destruirlas. Probablemente lo más parecido a un caza no letal, el Warlock está equipado con un generador EMP Behring REP-8, capaz de emitir una potente onda electromagnética para inutilizar cualquier dispositivo electrónico lo suficientemente desafortunado como para encontrarse dentro del radio de la explosión.\n\n--- STATS ---\nSCM: 262 m/s  |  Max: 1,425 m/s\nBoost: +610 m/s  /  -280 m/s\nCrew: 1  |  Length: 20.0m  |  Class: Combate  |  Role: Interdicción\nGuns: 2× S1 (empty)  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,640\nDmg Mult: P 0.80x  |  E 0.65x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 4.86 min base  |  1.62 min express
vehicle_DescAEGS_Eclipse=Fabricante: Aegis Dynamics\nEnfoque: Bombardero furtivo\n\nEl Aegis Eclipse es un bombardero diseñado para entrar y atacar antes incluso de ser visto. Tras un extenso servicio con la UEE, este equipo militar de alta tecnología hizo su debut en el mercado civil en 2947.\n\n--- STATS ---\nSCM: 210 m/s  |  Max: 1,100 m/s\nBoost: +510 m/s  /  -215 m/s\nCrew: 1  |  Length: 24.5m  |  Class: Combate  |  Role: Bombardero furtivo\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,464\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 16.54 min base  |  5.51 min express
