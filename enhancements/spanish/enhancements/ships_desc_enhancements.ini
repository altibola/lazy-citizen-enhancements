vehicle_DescAEGS_Gladius=Fabricante: Aegis Dynamics\nEnfoque: Caza ligero\n\nEl Gladius es un diseño antiguo que se ha ido actualizando a lo largo de los años para mantenerse al día con la tecnología moderna. En los círculos militares, el Gladius es muy apreciado por sus prestaciones y su sencillez. El Gladius es un caza ligero y rápido que se centra en los combates aéreos, por lo que resulta ideal como interceptor o nave de escolta.\n\n--- STATS ---\nSCM: 226 m/s  |  Max: 1,193 m/s\nBoost: +520 m/s  /  -268 m/s\nCrew: 1  |  Length: 21.0m  |  Class: Combate  |  Role: Caza ligero\nMRacks: 4× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 3,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 5.83 min base  |  1.94 min express
