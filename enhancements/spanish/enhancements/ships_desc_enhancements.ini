vehicle_DescESPR_Talon=Fabricante: Esperia\nEnfoque: Caza ligero\n\nEl Talon representa el esfuerzo continuo de Esperia por preservar los diseños de naves tevarinas históricamente significativos. Se trata de una nave de combate monoplaza maniobrable con blindaje ligero pero con potentes escudos direccionales "Phalanx". La Talon está hecha para golpear primero y con fuerza antes de utilizar los escudos para cubrir su huida.\n\n--- STATS ---\nSCM: 225 m/s  |  Max: 1,190 m/s\nBoost: +500 m/s  /  -260 m/s\nCrew: 1  |  Length: 24.0m  |  Class: Combate  |  Role: Caza ligero\nCoolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 3,000\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 8  |  E 10  |  D 0  |  T 0\nInsurance: 11.34 min base  |  3.78 min express
