vehicle_DescCRUS_Starfighter_Inferno=Fabricante: Crusader Industries Crusader Industries\nEnfoque: Caza Pesado\n\nYa sea liderando una tripulación o cazando grandes naves en solitario, el Ares Inferno es una fuerza a tener en cuenta. Esta variante balística equipada con Gatling atraviesa el blindaje de las cañoneras y convierte en polvo a los cazas más pequeños en cuestión de segundos.\n\n--- STATS ---\nSCM: 205 m/s  |  Max: 1,050 m/s\nBoost: +385 m/s  /  -210 m/s\nCrew: 1  |  Length: 27.0m  |  Class: Combate  |  Role: Caza pesado\nShields: 2× S2  |  Coolers: 3× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 14,400\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 50  |  E 36  |  D 0  |  T 0\nInsurance: 10.30 min base  |  3.43 min express
