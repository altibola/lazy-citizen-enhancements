vehicle_DescARGO_SRV=Fabricante: Argo Astronautics Argo Astronautics\nEnfoque: Industrial, Civil\n\nCuando se trata de hacer el trabajo, Argo no se anda con chiquitas. Desde el simple remolque de carga y mercancías hasta las angustiosas operaciones de búsqueda y rescate, el SRV puede con todo. El sistema de tractor a medida utiliza una innovadora combinación de placa y brazo, que permite un uso en solitario sin esfuerzo, así como un remolque en equipo de precisión para trabajos de mayor envergadura. Su tripulación y pasajeros también estarán seguros gracias a los duraderos escudos y al blindaje de alta resistencia que mantienen la cabina y los componentes a salvo cuando la situación se pone peliaguda.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,100 m/s\nBoost: +460 m/s  /  -235 m/s\nCrew: 1  |  Length: 31.5m  |  Class: Asistencia\nShields: S2  |  Coolers: S2  |  Power: S2  |  QD: S2\nArmor HP: 3,740\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 10  |  E 9  |  D 0  |  T 0\nInsurance: 13.22 min base  |  4.75 min express
vehicle_DescBanu_Defender=Fabricante: Banu \nEnfoque: Caza ligero\n\nConozca al Defensor Banu, un caza de tripulación múltiple cuyo diseño de mosaico destaca la tecnología de una variedad de especies. Con un modesto alojamiento para su tripulación y fácil acceso a los componentes, el Defensor recibe su nombre de la función que desempeña: la primera línea de defensa contra los ataques enemigos. Por eso el Defender es el compañero ideal del Merchantman: uno para el transporte pesado y el otro para los combates mortales.\n\n--- STATS ---\nSCM: 222 m/s  |  Max: 1,175 m/s\nBoost: +480 m/s  /  -255 m/s\nCrew: 1  |  Length: 24.5m  |  Class: Combate  |  Role: Caza ligero\nMRacks: 2× S3\nShields: S2  |  Coolers: 2× S1  |  Power: 2× S1  |  QD: S1\nArmor HP: 5,400\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 20  |  E 16  |  D 0  |  T 0\nInsurance: 13.61 min base  |  4.54 min express
vehicle_DescCNOU_HoverQuad=Fabricante: Consolidated Outland\nEnfoque: Transporte\n\nDiseñado como vehículo terrestre de acompañamiento para el Nomad, el elegante chasis angular del HoverQuad utiliza cuatro plataformas gravitacionales para una maniobrabilidad máxima, lo que lo convierte en el transporte perfecto por todo tipo de superficies.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 550 m/s\nBoost: +280 m/s  /  -120 m/s\nCrew: 1  |  Length: 1.4m  |  Class: Exploración  |  Role: Pasajeros\nCoolers: S0  |  Power: S0\nArmor HP: 1,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.15 min base  |  0.05 min express
vehicle_DescCNOU_Mustang_Alpha=Fabricante: Consolidated Outland \nEnfoque: Light Freight\n\nInspirado por la visión de vanguardia del CEO de Consolidated Outland, Silas Koerner, el Mustang Alpha es una nave espacial elegante y con estilo que utiliza aleaciones ultraligeras para llevar las relaciones de potencia al límite, aunque a veces de manera insegura. Y ahora, con el Cargo Carrier opcional, puedes disfrutar de las ventajas del Alpha sin sacrificar la capacidad de carga.\n\n--- STATS ---\nSCM: 228 m/s  |  Max: 1,218 m/s\nBoost: +500 m/s  /  -260 m/s\nCrew: 1  |  Length: 21.5m  |  Class: Multi-Rol  |  Role: Inicial / Carguero ligero\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,000\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 10  |  E 9  |  D 0  |  T 0\nInsurance: 0.68 min base  |  0.00 min express
