vehicle_DescESPR_Prowler=Fabricante: Esperia\nEnfoque: Dropship\n\nLlamado así por la designación militar UPE, el Merodeador es una versión modernizada de la infame nave de abordaje Tevarin de la Primera Guerra Tevarin. La eficacia del Merodeador como vehículo de despliegue rápido de personal se debía principalmente a su silencio. Con el Merodeador, encontrará la fusión perfecta de dos culturas: la elegancia y la eficacia de la máquina de guerra tevarin combinadas con la fiabilidad de la tecnología moderna de la UEE.\n\n--- STATS ---\nSCM: 212 m/s  |  Max: 1,200 m/s\nBoost: +450 m/s  /  -240 m/s\nCrew: 1  |  Length: 34.0m  |  Class: Combate  |  Role: Desembarco de tropas\nShields: 2× S2  |  Coolers: 2× S2  |  Power: S2  |  QD: S2\nArmor HP: 12,150\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 32  |  E 39  |  D 0  |  T 0\nInsurance: 23.22 min base  |  7.74 min express
