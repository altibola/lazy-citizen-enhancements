vehicle_DescDRAK_Herald=Fabricante: Drake Interplanetary\nEnfoque: Datos medios\n\nEl Drake Herald es una nave pequeña y blindada diseñada para llevar información de forma segura del Punto A al Punto B. Con un potente motor central (para tránsito a alta velocidad y para generar la energía necesaria para un cifrado/contención de datos eficaz), un software de cifrado avanzado y un núcleo informático blindado, el Herald es único entre las naves espaciales personales en el sentido de que está diseñado para "limpiarse" fácilmente cuando corre peligro de ser capturado.\n\n--- STATS ---\nSCM: 245 m/s  |  Max: 1,450 m/s\nBoost: +670 m/s  /  -260 m/s\nCrew: 1  |  Length: 24.8m  |  Class: Transporte  |  Role: Rastreo mediano\nInsurance: 2.02 min base  |  0.68 min express
