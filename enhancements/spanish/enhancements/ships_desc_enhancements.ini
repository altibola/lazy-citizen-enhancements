vehicle_DescDRAK_Cutlass_Blue=Fabricante: Drake Interplanetary\nFoco: Interdicción\n\nElegante, malvado y real. El Cutlass Blue añade misiles, un motor más agresivo y celdas de Durasteel en la bahía de carga al modelo estándar. El Cutlass Blue es la nave de patrulla estándar de la milicia exterior.\n\n--- STATS ---\nSCM: 220 m/s  |  Max: 1,165 m/s\nBoost: +467 m/s  /  -230 m/s\nCrew: 3  |  Length: 37.5m  |  Class: Combate  |  Role: Interdicción\nInsurance: 9.99 min base  |  3.33 min express
vehicle_DescDRAK_Cutlass_Red=Fabricante: Drake Interplanetary\nEnfoque: Médico\n\nEl Cutlass Red convierte la bodega de carga estándar en una instalación médica bien equipada que incluye un Autodoc. Esta ambulancia estelar cuenta con el transpondedor Echo Nav-E7, un escáner de largo alcance y un collar de acoplamiento Secure Plus, lo que la hace ideal para búsqueda y rescate. Este modelo también presenta una apariencia única de Red Crossbones.\n\n--- STATS ---\nSCM: 212 m/s  |  Max: 1,125 m/s\nBoost: +460 m/s  /  -230 m/s\nCrew: 2  |  Length: 37.5m  |  Class: Asistencia  |  Role: Sanitario\nInsurance: 14.99 min base  |  5.00 min express
vehicle_DescDRAK_Cutlass_Steel=Fabricante: Drake Interplanetary\nEnfoque: Caza Medio / Transporte de Tropas Medio\n\nCon el Cutlass Steel, Drake Interplanetary ha reinventado una vez más su diseño clásico para crear una nave de transporte de combate de nueva generación mediante la adición de asientos de salto dedicados y un arsenal ampliado. Es un verso peligroso ahí fuera, y el Cutlass Steel está listo para abrirse paso a través de lo que se interponga en el camino de usted y su dedicada tripulación.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,100 m/s\nBoost: +420 m/s  /  -240 m/s\nCrew: 3  |  Length: 37.5m  |  Class: Combate  |  Role: Desembarco de tropas\nInsurance: 11.99 min base  |  4.00 min express
vehicle_DescDRAK_Cutter=Fabricante: Drake Interplanetary\nEnfoque: Carga Ligera\n\nDiseñada para gente trabajadora de todo tipo, la Cutter ofrece 4 SCU de espacio de carga y un montón de fuerza en un chasis áspero y compacto. Es una nave que realmente encarna el espíritu de Drake: que no importa quién seas o lo que hagas, puedes alcanzar las estrellas.\n\n--- STATS ---\nSCM: 180 m/s  |  Max: 1,010 m/s\nBoost: +380 m/s  /  -160 m/s\nCrew: 1  |  Length: 20.0m  |  Class: Exploración  |  Role: Inicial / Exploración\nShields: S1  |  Coolers: S1  |  Power: S1  |  QD: S1\nArmor HP: 1,980\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 8  |  D 0  |  T 0\nInsurance: 3.37 min base  |  1.12 min express
vehicle_DescDRAK_Cutter_Rambler=Fabricante: Drake Interplanetary\nEnfoque: Expedición\n\nLos jefes de Drake escucharon lo que tenías que decir y su respuesta fue el Cutter Rambler. Basado en el original, el Rambler conserva 2 SCU completos de espacio de carga al tiempo que agrega las comodidades solicitadas y suficiente espacio de almacenamiento personal para hacer que incluso el viaje más largo pase en un instante.\n\n--- STATS ---\nCrew: 1  |  Length: 20.0m  |  Class: Exploración  |  Role: Expedición\nCoolers: S1  |  Power: S1  |  QD: S1\nArmor HP: 1,980\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 8  |  D 0  |  T 0\nInsurance: 1.25 min base  |  0.00 min express
vehicle_DescDRAK_Cutter_Scout=Fabricante: Drake Interplanetary\nEnfoque: Reconocimiento\n\nAl combinar el marco compacto y tosco del Cutter con lo esencial, Drake tomó una nave ya impresionante y lo transformó en la nave de exploración ideal. Con capacidades mejoradas de radar y escaneo combinadas con más potencia y refrigeración, el Cutter Scout está listo para volar por delante del resto.\n\n--- STATS ---\nSCM: 180 m/s  |  Max: 1,010 m/s\nBoost: +380 m/s  /  -160 m/s\nCrew: 1  |  Length: 20.0m  |  Class: Exploración  |  Role: Exploración\nCoolers: S2  |  Power: S2\nArmor HP: 1,980\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 8  |  D 0  |  T 0\nInsurance: 3.87 min base  |  1.28 min express
vehicle_DescDRAK_Dragonfly=Fabricante: Drake Interplanetary\nEnfoque: Carreras\n\nEl Drake Dragonfly es la nave chata perfecta para cualquiera que busque vivir al límite. Sin nada que separe al piloto de los peligros del espacio, ¡el Dragonfly es tanto una aventura como una nave! La conversión de modo dual permite que el Dragonfly funcione en tierra o en el espacio, y un segundo asiento orientado hacia atrás significa que incluso puedes llevar un pasajero.\n\n--- STATS ---\nSCM: 190 m/s  |  Max: 523 m/s\nBoost: +270 m/s  /  -120 m/s\nCrew: 1  |  Length: 7.0m  |  Class: Competición  |  Role: Carreras\nGuns: 2\nCoolers: S0  |  Power: S0\nArmor HP: 1,170\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.10 min base  |  0.00 min express
