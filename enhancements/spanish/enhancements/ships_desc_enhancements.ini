vehicle_DescARGO_MPUV=Fabricante: Argo Astronautics\nEnfoque: Carguero Ligero\n\nEl MPUV Cargo de Argo Astronautics es una nave mercante de transferencia especializada. Un estibador intergaláctico omnipresente, un gran número de MPUV Cargos se encargan de cargar y descargar mercancías en naves que de otro modo no podrían aterrizar en planetas o diques secos, como la Hull D y la Orion. Algunos capitanes de transportistas eligen poseer y operar su propio Argo, mientras que otros prefieren contratar a los propietarios locales de Argos que se encuentran en muchos de los puertos más concurridos.\n\n--- STATS ---\nSCM: 170 m/s  |  Max: 890 m/s\nBoost: +360 m/s  /  -140 m/s\nCrew: 1  |  Length: 10.5m  |  Class: Transporte  |  Role: Carguero ligero\nShields: S1  |  Coolers: 2× S0  |  Power: S0\nArmor HP: 1,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.17 min base  |  0.00 min express
vehicle_DescARGO_MPUV_Tractor=Fabricante: Argo Astronautics\nEnfoque: Manipulación de carga\n\nEl Argo Astronautics MPUV-1T está equipado con un rayo tractor que le permite mover cómodamente contenedores de carga dentro y fuera de embarcaciones de transporte más grandes. Su menor tamaño y maniobrabilidad lo convierten en un vehículo de apoyo ideal en zonas de aterrizaje y estaciones espaciales.\n\n--- STATS ---\nSCM: 175 m/s  |  Max: 895 m/s\nBoost: +365 m/s  /  -145 m/s\nCrew: 1  |  Length: 10.5m  |  Class: Transporte  |  Role: Carguero ligero\nTurrets: 1\nShields: S1  |  Coolers: S0  |  Power: S0\nArmor HP: 1,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.17 min base  |  0.00 min express
vehicle_DescARGO_MPUV_Transport=Fabricante: Argo Astronautics\nEnfoque: Transporte\n\nEl Argo Astronautics MPUV-1P (comúnmente "Argo Personnel"). Esta versión del Argo está orientada a una responsabilidad sencilla pero increíblemente importante: trasladar a un grupo de personas de un lugar a otro. La Armada de la UEE utiliza MPUV-1P de forma extensiva, y cualquier nuevo recluta probablemente pueda recordar aquellos aterradores momentos en los que una nave de este tipo les llevó a su primera misión espacial. En manos civiles, las naves Argo Personnel se adaptan para todo, desde servicios de taxi estándar hasta su uso como naves de lanzamiento de combate improvisadas. La Argo MPUV-1P es capaz de transportar hasta ocho humanos y su equipo.\n\n--- STATS ---\nSCM: 170 m/s  |  Max: 890 m/s\nBoost: +360 m/s  /  -140 m/s\nCrew: 1  |  Length: 10.5m  |  Class: Transporte  |  Role: Pasajeros\nShields: S1  |  Coolers: 2× S0  |  Power: S0\nArmor HP: 1,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.68 min base  |  0.23 min express
vehicle_DescARGO_Mole=Fabricante: Argo Astronautics\nEnfoque: Minería\n\nEl icónico extractor láser multioperador de Argo, más comúnmente conocido como MOLE, le permite trabajar con mayor rapidez y eficacia que nunca, gracias a su sistema de minería trilateral patentado. Tres estaciones de extracción articuladas controladas independientemente permiten una potencia máxima y una versatilidad casi ilimitada. El MOLE vive según el adagio "muchas manos hacen un trabajo ligero".\n\n--- STATS ---\nSCM: 140 m/s  |  Max: 960 m/s\nBoost: +340 m/s  /  -150 m/s\nCrew: 5  |  Length: 45.0m  |  Class: Industrial  |  Role: Minería mediano\nShields: S3  |  Coolers: S3  |  Power: S3  |  QD: S2\nArmor HP: 11,220\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 45  |  E 40  |  D 0  |  T 0\nInsurance: 13.50 min base  |  4.50 min express
