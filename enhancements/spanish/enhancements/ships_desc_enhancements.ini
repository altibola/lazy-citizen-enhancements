vehicle_DescKRIG_P52_Merlin=Fabricante: Kruger Intergalactic\nEnfoque: Snub Fighter\n\nDiseñado en colaboración con RSI, este elegante caza de corto alcance representa la primera nave producida bajo la marca Kruger Intergalactic. Utilizando siglos de experiencia en fabricación, la precisión compacta del casco Kruger se combina perfectamente con los fiables propulsores RSI para otorgar al Merlin un manejo y una maniobrabilidad excepcionales, garantizando al mismo tiempo que sea capaz de desempeñar una gran variedad de funciones, desde el combate hasta la exploración.\n\n--- STATS ---\nSCM: 275 m/s  |  Max: 1,450 m/s\nBoost: +605 m/s  /  -290 m/s\nCrew: 1  |  Length: 12.0m  |  Class: Combate  |  Role: Caza auxiliar\nGuns: 1\nShields: S1  |  Coolers: 2× S1  |  Power: S1\nArmor HP: 360\nDmg Mult: P 0.85x  |  E 0.70x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 2.65 min base  |  0.88 min express
