item_DescMISL_S01_CS_FSKI_Spark=Fabricante: Firestorm Kinetics\nSeñal de seguimiento: Sección transversal\nTamaño: 1\n\nLos que creen que el tamaño no importa harían bien en mantenerse alejados del Spark de Firestorm Kinetics. Este ligero misil de proximidad, que utiliza la sección transversal, tiene una potencia considerable.\n\n--- STATS ---\nLifetime: 15.00s\nLock Range: 1.7 km – 10.0 km\nArm Time: 0.8s  |  Arm Dist: 1.1 km  |  Min Detonate: 5 m\nDamage: 800.0 (Phys)\nBlast Radius: 2 m\nComponent HP: 25
item_DescMISL_S01_EM_BEHR_Pioneer=Fabricante: Behring\nSeñal de seguimiento: Electromagnética\nTamaño: 1\n\nBehring se enorgullece de su fiabilidad y el Pioneer no es una excepción. El sistema de seguimiento Oracle EM actualizado se ha probado una y otra vez en numerosos informes de pruebas de consumidores contra misiles de proximidad de clase similar.\n\n--- STATS ---\nLifetime: 15.00s\nLock Range: 1.7 km – 10.0 km\nArm Time: 1.3s  |  Arm Dist: 1.8 km  |  Min Detonate: 5 m\nDamage: 750.0 (Phys)\nBlast Radius: 14 m\nComponent HP: 25
item_DescMISL_S01_EM_THCN_TaskForce=Fabricante: Thermyte Concern\nSeñal de seguimiento: Electromagnética\nTamaño: 1\n\nAventurándose en el mercado armamentístico, Thermyte Concern ha reunido sus amplios conocimientos sobre explosivos de demolición para crear el TaskForce. Un misil de ataque ligero con seguimiento EM y un sistema de propulsión de primera clase que proporciona una mezcla eficaz de velocidad y potencia de fuego para establecer el dominio del campo de batalla.\n\n--- STATS ---\nLifetime: 15.00s\nLock Range: 1.7 km – 10.0 km\nArm Time: 1.0s  |  Arm Dist: 1.4 km  |  Min Detonate: 5 m\nDamage: 700.0 (Phys)\nBlast Radius: 14 m\nComponent HP: 25
item_DescMISL_S01_IR_BEHR_Marksman=Fabricante: Behring\nSeñal de seguimiento: Infrarrojo\nTamaño: 1\n\nLa serie Marksman de misiles de proximidad de Behring se ha ganado tanta reputación por su capacidad de rastrear una amplia gama de firmas de calor como por su daño de proximidad de efecto de área.\n\n--- STATS ---\nLifetime: 15.00s\nLock Range: 1.7 km – 10.0 km\nArm Time: 1.5s  |  Arm Dist: 2.1 km  |  Min Detonate: 5 m\nDamage: 650.0 (Phys)\nBlast Radius: 2 m\nComponent HP: 25
item_DescMISL_S01_IR_VNCL_Arrow=Fabricante: Vanduul\nSeñal de seguimiento: Infrarrojo\nTamaño: 1\n\nComúnmente conocido por su designación militar, el Arrow es un pequeño misil de ataque infrarrojo que se ha convertido en un pilar del arsenal de Vanduul.\n\n--- STATS ---\nLifetime: 15.00s\nLock Range: 1.7 km – 10.0 km\nArm Time: 1.0s  |  Arm Dist: 1.4 km  |  Min Detonate: 5 m\nDamage: 600.0 (Phys)\nBlast Radius: 3 m\nComponent HP: 25
item_DescMISL_S02_CS_FSKI_Tempest=Fabricante: Firestorm Kinetics\nSeñal de seguimiento: Sección transversal\nTamaño: 2\n\nLa Tempest se diseñó pensando únicamente en la aniquilación. Utilizando la tecnología de puntería de FireStorm Kinetics, este misil de proximidad se fija en la sección transversal de un objetivo para llevar los conflictos a una rápida conclusión.\n\n--- STATS ---\nLifetime: 30.00s\nLock Range: 1.8 km – 10.0 km\nArm Time: 1.2s  |  Arm Dist: 1.3 km  |  Min Detonate: 5 m\nDamage: 17,544.6 (Phys: 3508.9 / Energy: 14035.7)\nBlast Radius: 3 m\nComponent HP: 25
item_DescMISL_S02_CS_THCN_StrikeForce=Fabricante: Thermyte Concern\nSeñal de Rastreo: Sección transversal\nTamaño: 2\n\nEl StrikeForce es la última culminación de la expansión de Thermyte Concern en la industria de misiles, mostrando notables mejoras en el diseño y en la sección transversal de puntería.\n\n--- STATS ---\nLifetime: 30.00s\nLock Range: 1.8 km – 10.0 km\nArm Time: 1.2s  |  Arm Dist: 1.3 km  |  Min Detonate: 5 m\nDamage: 1,600.0 (Phys)\nBlast Radius: 2 m\nComponent HP: 25
item_DescMISL_S02_EM_TALN_Dominator=Fabricante: Talon\nSeñal de seguimiento: Electromagnética\nTamaño: 2\n\nDiseñado para rastrear la firma electromagnética del adversario, el misil de ataque Dominator es un paquete de artillería de precisión diseñado para establecer el dominio táctico del campo de batalla.\n\n--- STATS ---\nLifetime: 30.00s\nLock Range: 1.8 km – 10.0 km\nArm Time: 1.2s  |  Arm Dist: 1.3 km  |  Min Detonate: 5 m\nDamage: 1,500.0 (Phys)\nBlast Radius: 4 m\nComponent HP: 25
item_DescMISL_S02_IR_FSKI_Ignite=Fabricante: Firestorm Kinetics\nSeñal de seguimiento: Infrarrojos\nTamaño: 2\n\nEl Ignite es la marca principal de Firestorm de misiles de ataque de búsqueda de calor que es la definición de Fire and Forget. Simplemente déjelo volar y disfrute del espectáculo.\n\n--- STATS ---\nLifetime: 30.00s\nLock Range: 1.8 km – 10.0 km\nArm Time: 1.2s  |  Arm Dist: 1.3 km  |  Min Detonate: 5 m\nDamage: 1,440.0 (Phys)\nBlast Radius: 3 m\nComponent HP: 25
item_DescMISL_S02_IR_NOVP_Rattler=Fabricante: Nova Pyrotechnica\nSeñal de seguimiento: Infrarrojos\nTamaño: 2\n\nEl Rattler es un misil de racimo rentable que sin duda atraerá a una gran variedad de pilotos. Cuando se dispara, el Rattler rastreará la señal infrarroja del oponente y creará una andanada inicial que debilitará el blindaje o los escudos, dejando al objetivo vulnerable a toda la carga que le sigue.\n\n--- STATS ---\nLifetime: 10.00s\nLock Range: 1.8 km – 5.0 km\nArm Time: 1.2s  |  Arm Dist: 1.3 km  |  Min Detonate: 5 m\nDamage: 1,370.0 (Phys)\nBlast Radius: 4 m\nComponent HP: 25
