item_DescMISL_S03_CS_FSKI_Arrester=Fabricante: Firestorm Kinetics\nSeñal de seguimiento: Sección transversal\nTamaño: 3\n\nUtilizando la sección transversal para cazar a su presa, el misil de proximidad Firestorm Arrester hace un trabajo rápido con los enemigos atrapados en la mira.\n\n--- STATS ---\nLifetime: 35.00s\nLock Range: 1.9 km – 25.0 km\nArm Time: 1.5s  |  Arm Dist: 1.3 km  |  Min Detonate: 5 m\nDamage: 3,200.0 (Phys)\nBlast Radius: 5 m\nComponent HP: 25
