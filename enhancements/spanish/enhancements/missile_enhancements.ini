item_DescMISL_S05_CS_TALN_Stalker=Fabricante: Talon\nSeñal de seguimiento: Sección transversal\nTamaño: 5\n\nCon seguimiento de sección transversal dedicado, el Talon Stalker ha perdurado a lo largo de los años como un torpedo de ataque de precisión con la máxima potencia de parada.\n\n--- STATS ---\nLifetime: 60.00s\nLock Range: 2.0 km – 30.0 km\nArm Time: 2.0s  |  Arm Dist: 1.1 km  |  Min Detonate: 5 m\nDamage: 18,000.0 (Phys)\nBlast Radius: 11 m\nComponent HP: 50
item_DescMISL_S05_EM_TALN_Reaper=Fabricante: Talon\nSeñal de seguimiento: Electromagnética\nTamaño: 5\n\nEl torpedo de ataque Reaper presenta una relación rendimiento-gasto destructiva favorable y un conjunto de seguimiento Talon EM probado.\n\n--- STATS ---\nLifetime: 60.00s\nLock Range: 2.0 km – 30.0 km\nArm Time: 2.0s  |  Arm Dist: 1.1 km  |  Min Detonate: 5 m\nDamage: 15,500.0 (Phys)\nBlast Radius: 10 m\nComponent HP: 50
item_DescMISL_S05_EM_TALN_Scimitar=Fabricante: Talon\nSeñal de seguimiento: Electromagnética\nTamaño: 5\n\nEl misil Scimitar rastrea objetivos a través de su firma EM para entregar una devastadora carga útil de tamaño cinco.\n\n--- STATS ---\nLifetime: 60.00s\nLock Range: 50 m – 30.0 km\nArm Time: 1.5s  |  Arm Dist: 840 m  |  Min Detonate: 5 m\nDamage: 14,500.0 (Phys)\nBlast Radius: 10 m\nComponent HP: 50
item_DescMISL_S05_IR_TALN_Valkyrie=Fabricante: Talon\nSeñal de seguimiento: Infrarrojos\nTamaño: 5\n\nEl equipo de diseño de torpedos Talon ha hecho todo lo posible para su último torpedo de ataque Valkyrie creando una solución de empuje de varios niveles con capacidades de seguimiento por infrarrojos de última generación.\n\n--- STATS ---\nLifetime: 60.00s\nLock Range: 2.0 km – 30.0 km\nArm Time: 2.0s  |  Arm Dist: 1.1 km  |  Min Detonate: 5 m\nDamage: 12,000.0 (Phys)\nBlast Radius: 10 m\nComponent HP: 50
item_DescMISL_S07_IR_TALN_Hellion=Fabricante: Talon\nSeñal de seguimiento: Infrarrojos\nTamaño: 7\n\nCon una carga útil considerable y un avanzado conjunto de sensores de búsqueda de calor, el misil Hellion de Talon puede ser eficaz contra agresores de todos los tamaños.\n\n--- STATS ---\nLifetime: 80.00s\nLock Range: 50 m – 35.0 km\nArm Time: 3.0s  |  Arm Dist: 1.5 km  |  Min Detonate: 5 m\nDamage: 90,000.0 (Phys)\nBlast Radius: 16 m\nComponent HP: 200
item_DescMISL_S09_CS_TALN_Argos=Fabricante: Talon\nSeñal de seguimiento: Sección transversal\nTamaño: 9\n\nEl torpedo de ataque Talon Argos presenta un diseño clásico y sencillo que se basa en unos estándares de fabricación exigentes y en un sistema de puntería de sección transversal clásico.\n\n--- STATS ---\nLifetime: 30.00s\nArm Time: 1.5s  |  Arm Dist: 675 m  |  Min Detonate: 5 m\nDamage: 421,685.9 (Phys: 26065.5 / Energy: 395620.4)\nBlast Radius: 5 m\nComponent HP: 1,000
