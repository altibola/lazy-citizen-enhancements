item_Descksar_sniper_ballistic_01=Fabricante: Kastak Arms\nTipo de artículo: Rifle de francotirador\nClase: Balístico\n\nTamaño del cargador: 8\nCadencia de fuego: 30 rpm\nAlcance efectivo: 120 m\n\nAccesorios: Óptica (S3), Cañón (N/A), Bajo cañón (S2)\n\nEl Scalpel es un rifle de francotirador único y versátil de Kastak Arms. Diseñado con dos cañones apilados uno encima del otro, tiene dos modos de disparo para que puedas adaptar tu tiro a la situación. Puede realizar un único y potente disparo a larga distancia, o disparar ambos cañones en rápida sucesión para crear una ráfaga de dos disparos.\n\n--- STATS ---\nWeight: 5.1 kg\nFire Rate: 600 RPM\nFire Modes: Burst / Semi-Auto\nAlpha Dmg: 45.0 (Phys)  |  DPS: 450.0\nAmmo: 12\nVelocity: 875 m/s  |  Absolute Range: 1.8 km\nFull Dmg to: 335 m  |  Min Dmg: 45.0
item_Descksar_sniper_ballistic_01_blue_white01=Fabricante: Kastak Arms\nTipo de artículo: Rifle de francotirador\nClase: Balístico\n\nTamaño del cargador: 8\nVelocidad de disparo: 30 rpm\nAlcance efectivo: 120 m\n\nAccesorios: Óptica (S3), Cañón (N/A) , Underbarrel (T2)\n\nEl Scalpel es un rifle de francotirador único y versátil de Kastak Arms. Diseñado con una configuración vertical de dos cañones, tiene dos modos de disparo para que puedas adaptar tu disparo a la situación para realizar un disparo único y potente desde una larga distancia, o disparar ambos cañones en rápida sucesión para crear una ráfaga de doble disparo. Esta edición especial de Permafrost presenta colores azules y grises que recuerdan a un glaciar bajo un cielo invernal cegador.\n\n--- STATS ---\nWeight: 5.1 kg\nFire Rate: 600 RPM\nFire Modes: Burst / Semi-Auto\nAlpha Dmg: 45.0 (Phys)  |  DPS: 450.0\nAmmo: 12\nVelocity: 875 m/s  |  Absolute Range: 1.8 km\nFull Dmg to: 335 m  |  Min Dmg: 45.0
item_Desclbco_pistol_energy_01=Fabricante: Lightning Bolt Co. \nTipo de artículo: Pistola\nClase: Electrón\n\nTamaño de la Batería: 10\nCadencia de Fuego: 350 rpm\nAlcance Efectivo: 35m\n\nAccesorios: Óptica (S1), Bajo cañón (S1)\n\nLa excelencia en ingeniería sólo araña la superficie de la inconfundible pistola Yubarev. Irina Arkadova, ex mercenaria reconvertida en magnate de la fabricación de armas, supervisó todos los aspectos del arma, dotándola de potencia, funcionalidad y estilo. Con una empuñadura clásica de madera y un cañón de diseño vanguardista, la Yubarev dispara un electrón cargado que no sólo impacta en el objetivo, amplificando la carga con cada impacto, sino que puede propagarse a otros objetivos conductores dentro del alcance.\n\n--- STATS ---\nWeight: 1.6 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 41.0 (Energy: 32.5 / Distort: 7.5 / Stun: 1.0)  |  DPS: 239.2\nAmmo: 10\nVelocity: 500 m/s  |  Absolute Range: 1.0 km\nFull Dmg to: 20 m  |  Drop: -0.10/m  |  Min Dmg: 1.5
