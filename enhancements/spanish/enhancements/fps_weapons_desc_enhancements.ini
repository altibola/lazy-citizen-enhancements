item_Desckegr_fire_extinguisher_01=Fabricante: KE Group\nTipo de artículo: Extintor\nClase: Gadget\n\nTamaño del cargador: Bidón de gas\nTasa de fuego: Constante\nAlcance efectivo: 3-4 m\n\nEl extintor APX de KE Group ha sido considerado el mejor equipo de seguridad para el consumidor durante más de una década, lo que lo convierte en el estándar de la industria en la prevención de incendios. Lleno de un compuesto refrigerante gaseoso patentado, el extintor puede sofocar rápidamente cualquier fuego a la vista. La pantalla digital del dispositivo le permite controlar la temperatura local para ayudarle a contener y eliminar los riesgos de incendio.\n\n--- STATS ---\nWeight: 3.2 kg\nFire Rate: 600 RPM\nFire Modes: Auto\nAlpha Dmg: 18.0 (Thermal)  |  DPS: 180.0\nAmmo: 3,000\nRegen: 0/s  |  Cooldown: 3.0s  |  Cost/Shot: 1\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
item_Descklwe_lmg_energy_01=Fabricante: Klaus & Werner\nTipo de artículo: LMG\nClase: Energía (Láser)\n\nTamaño de Batería: 100\nCadencia de Fuego: 400 rpm\nAlcance Efectivo: 40 m\n\nAccesorios: Óptica (S2), Cañón (S2), Bajo el cañón (S3)\n\nKlaus & Werner ha creado un arma icónica con el probado y verdadero LMG láser Demeco. Utilizado ampliamente en enfrentamientos militares, este favorito de la infantería de corto a medio alcance se ha construido con la estabilidad y la precisión a la vanguardia.\n\n--- STATS ---\nWeight: 9.8 kg\nFire Rate: 800 RPM\nFire Modes: Auto\nAlpha Dmg: 11.5 (Energy)  |  DPS: 153.3\nAmmo: 100\nVelocity: 600 m/s  |  Absolute Range: 2.4 km
