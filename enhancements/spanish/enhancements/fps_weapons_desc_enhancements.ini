item_Descbehr_lmg_ballistic_01=Fabricante: Behring\nTipo de artículo: LMG\nClase: Balística\n\nTamaño del cargador: 120\nCadencia de fuego: 800 rpm\nAlcance efectivo: 40 m\n\nAccesorios: Óptica (S2), Cañón (S2), Bajo cañón (S3)\n\nBehring diseñó la FS-9 para ser una fuerza arrolladora en el campo de batalla. Esta ametralladora ligera cuenta con un modo totalmente automático que la hace ideal para realizar fuego de cobertura o detener a los enemigos que avanzan. La FS-9 también es aclamada por su capacidad para mantener la precisión mientras desata fuego sostenido.\n\n--- STATS ---\nWeight: 6.8 kg\nFire Rate: 650 RPM\nFire Modes: Auto\nAlpha Dmg: 14.5 (Phys)  |  DPS: 157.1\nAmmo: 75\nVelocity: 600 m/s  |  Absolute Range: 1.2 km\nFull Dmg to: 50 m  |  Drop: -0.01/m  |  Min Dmg: 10.0
item_Descbehr_lmg_ballistic_01_luminalia_green01=Fabricante: Behring\nTipo de artículo: LMG\nClase: Balística\n\nTamaño del cargador: 120\nCadencia de fuego: 800 rpm\nAlcance efectivo: 40 m\n\nAccesorios: Óptica (S2), Cañón (S2), Bajo cañón (S3)\n\nBehring diseñó la FS-9 para ser una fuerza arrolladora en el campo de batalla. Esta ametralladora ligera cuenta con un modo totalmente automático que la hace ideal para realizar fuego de cobertura o detener a los enemigos que avanzan. La FS-9 también es aclamada por su capacidad para mantener la precisión mientras desata fuego sostenido. La edición Evergreen abraza el espíritu Luminalia utilizando un color tradicional de las fiestas con su vibrante tinte verde.\n\n--- STATS ---\nWeight: 6.8 kg\nFire Rate: 650 RPM\nFire Modes: Auto\nAlpha Dmg: 14.5 (Phys)  |  DPS: 157.1\nAmmo: 75\nVelocity: 600 m/s  |  Absolute Range: 1.2 km\nFull Dmg to: 50 m  |  Drop: -0.01/m  |  Min Dmg: 10.0
