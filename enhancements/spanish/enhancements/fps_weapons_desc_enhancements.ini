item_Deschdgw_pistol_ballistic_01=Fabricante: Hedeby Gunworks\nTipo de artículo: Pistola Frag\nClase: Balística\n\nTamaño del cargador: 8\nCadencia de fuego: 140 rpm\nAlcance efectivo: 80 m / 10 m (cargada)\n\nAccesorios: Óptica (S1), Cañón (S1), Bajo cañón (S1)\n\nAunque la Salvo puede usarse como una pistola normal, Hedeby no se detuvo ahí. Con un tirón más largo del gatillo, se inyecta un cebo congelador en la recámara y, al soltarlo, el pesado percutor golpea con fuerza suficiente para pulverizar el casquillo superenfriado. Desarrollada accidentalmente como un intento de mitigar el sobrecalentamiento, esta opción de fuego cargado descarga un mortífero rocío de fragmentos de alta velocidad seguido de un estampido estremecedor para los oídos.\n\n--- STATS ---\nWeight: 0.8 kg\nFire Rate: 170 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 45.0 (Phys)  |  DPS: 127.5\nAmmo: 8\nVelocity: 550 m/s  |  Absolute Range: 1.1 km\nFull Dmg to: 30 m  |  Drop: -0.08/m  |  Min Dmg: 25.0
