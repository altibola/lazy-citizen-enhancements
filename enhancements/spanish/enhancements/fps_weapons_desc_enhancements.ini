item_Descgmni_sniper_ballistic_01=Fabricante: Gemini\nTipo de artículo: Rifle de francotirador\nClase: Balística\n\nTamaño del cargador: 15\nCadencia de fuego: 120 rpm\nAlcance efectivo: 80 m\n\nAccesorios: Óptica (S3), Cañón (S2), Bajo cañón (S2)\n\nDevasta a distancia con el rifle de francotirador A03. Magistralmente diseñado por Clem, cofundador de Gemini Tevarin, el arma equilibra un diseño elegante y ergonómico con una potente pegada balística. El A03 ofrece una impresionante cadencia de tiro para un rifle de francotirador que sacrifica la precisión en favor de la urgencia cuando se requieren disparos sucesivos. Teniendo en cuenta su renombrado diseño y sus características únicas, es fácil ver por qué el A03 se ha convertido en el favorito de los profesionales de la seguridad de todo el imperio.\n\n--- STATS ---\nWeight: 4.7 kg\nFire Rate: 225 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 42.5 (Phys)  |  DPS: 159.4\nAmmo: 15\nVelocity: 800 m/s  |  Absolute Range: 1.6 km\nFull Dmg to: 150 m  |  Drop: -0.02/m  |  Min Dmg: 35.0
