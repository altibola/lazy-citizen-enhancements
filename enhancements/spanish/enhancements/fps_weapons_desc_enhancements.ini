item_Descklwe_smg_energy_01=Fabricante: Klaus & Werner\nTipo de artículo: SMG\nClase: Láser\n\nTamaño de la batería: 45\nCadencia de fuego: 562,5 rpm\nAlcance efectivo: 25m\n\nAccesorios: Óptica (S1), Cañón (S1), Bajo el cañón (S1)\n\nLa experta artesanía de Klaus & Werner se muestra una vez más en todo su esplendor para hacer que el rifle compacto de energía láser Lumin V sea aún más letal y fiable. Un nuevo modo de "disparo automático a intervalos" lanza ráfagas de cinco disparos cuando se mantiene pulsado el gatillo, aprovechando la saturación del objetivo que se produce con el disparo automático al tiempo que proporciona pausas para recompensar la puntería. Incluso cuando se está constantemente al ataque, el excelente diseño del arma proporciona un bajo retroceso y una dispersión ajustada.\n\n--- STATS ---\nWeight: 2.6 kg\nFire Rate: 700 RPM\nFire Modes: Burst\nAlpha Dmg: 21.0 (Energy)  |  DPS: 245.0\nAmmo: 45\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
item_Descklwe_smg_energy_blue_gold_01=Fabricante: Klaus & Werner\nTipo de artículo: SMG\nClase: Láser\n\nTamaño de la batería: 45\nVelocidad de disparo: 562,5 rpm\nAlcance efectivo: 25 m\n\nAccesorios: Óptica (S1), Cañón (S1), Debajo del cañón (S1)\n\nLa experta artesanía de Klaus & Werner está una vez más en plena exhibición para hacer que el rifle de energía láser compacto Lumin V sea aún más letal y confiable. Un nuevo modo de "disparo automático a intervalos" dispara ráfagas de cinco disparos cuando se mantiene presionado el gatillo, utilizando la saturación del objetivo que viene con el disparo automático y al mismo tiempo proporciona pausas para recompensar la puntería. Incluso cuando está constantemente atacando, el excelente diseño del arma proporciona un retroceso bajo y una apertura ajustada. La atrevida combinación de colores azul y dorado le da a la edición Valor un atractivo valiente y digno.\n\n--- STATS ---\nWeight: 2.6 kg\nFire Rate: 700 RPM\nFire Modes: Burst\nAlpha Dmg: 21.0 (Energy)  |  DPS: 245.0\nAmmo: 45\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
item_Descklwe_sniper_energy_01_Luminalia_red01=Fabricante: Klaus & Werner\nTipo de artículo: Rifle de francotirador\nClase: Energía (Láser)\n\nTamaño de Batería: 20\nCadencia de Fuego: 50 rpm\nAlcance Efectivo: 100 m\n\nAccesorios: Óptica (S3), Cañón (S2), Bajo cañón (S2)\n\nEl rifle de energía de largo alcance Arrowhead Modelo VI de Klaus & Werner cuenta con un cuerpo compuesto de fibra de vidrio capaz de soportar cualquier cantidad de entornos rigurosos tanto en la atmósfera como fuera de ella. Construido con una culata de precisión, visor compuesto y bípode incorporado, el Arrowhead ofrece un arma estable y devastadora para los operadores que quieren mantener la distancia, pero permanecer en la lucha. Lanzada por primera vez durante Luminalia, la edición Lamplighter se inspira en el tradicional color rojo de las fiestas.\n\n--- STATS ---\nWeight: 6.8 kg\nFire Rate: 70 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 50.0 (Energy)  |  DPS: 58.3\nAmmo: 16\nVelocity: 1,000 m/s  |  Absolute Range: 4.0 km
item_Descksar_pistol_ballistic_01_IAE2023=Fabricante: Kastak Arms\nTipo de artículo: Pistola\nClase: Balística\n\nTamaño del cargador: 6\nVelocidad de disparo: 180 rpm \nAlcance efectivo: 100 m\n\nAccesorios: Óptica (S1), Cañón (S1), Debajo del cañón ( S1)\n\nA menudo llamado "cañón de mano" de Kastak Arms, el Coda puede finalizar un enfrentamiento con una sola bala de calibre .50, aunque su gran potencia puede hacer que el retroceso del Coda sea difícil de manejar. Teniendo en cuenta el tamaño limitado del cargador y su considerable potencia, se desaconseja el fuego sostenido en favor de disparos únicos más precisos. Diseñada en honor a IAE 2953, la edición Ascension tiene detalles en acero y cobre inspirados en Syulen de Gatac Manufacture.\n\n--- STATS ---\nWeight: 1.3 kg\nFire Rate: 180 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 60.0 (Phys)  |  DPS: 180.0\nAmmo: 6\nVelocity: 550 m/s  |  Absolute Range: 1.1 km\nFull Dmg to: 55 m  |  Drop: -0.20/m  |  Min Dmg: 35.0
item_Descksar_pistol_ballistic_01_headhunters01=Fabricante: Kastak Arms\nTipo de artículo: Pistola\nClase: Balística\n\nTamaño del cargador: 6\nCadencia de fuego: 180 rpm \nAlcance efectivo: 100 m\n\nAccesorios: Óptica (S1), Cañón (S1), Bajo cañón (S1)\n\nA menudo llamada el "cañón de mano" de Kastak Arms, la Coda puede poner fin a un enfrentamiento con una sola bala del calibre .50, aunque su gran potencia puede hacer que el retroceso de la Coda sea difícil de manejar. Teniendo en cuenta el tamaño limitado de su cargador y su considerable retroceso, se desaconseja el fuego sostenido en favor de disparos individuales más precisos. El siempre audaz Isidro "Nighthawk" Renard imbuyó esa energía en este diseño de tintes morados y negros para la línea Legendary Bounty Hunter.\n\n--- STATS ---\nWeight: 1.3 kg\nFire Rate: 180 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 60.0 (Phys)  |  DPS: 180.0\nAmmo: 6\nVelocity: 550 m/s  |  Absolute Range: 1.1 km\nFull Dmg to: 55 m  |  Drop: -0.20/m  |  Min Dmg: 35.0
