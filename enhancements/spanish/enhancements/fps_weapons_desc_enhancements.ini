item_Descgmni_smg_ballistic_01_green_grey01=Fabricante: Gemini\nTipo de artículo: SMG\nClase: Balístico\n\nTamaño del cargador: 50\nVelocidad de disparo: 1100 rpm\nAlcance efectivo: 35 m\n\nAccesorios: Cañón (S1), Óptica (S1), Debajo del cañón (S1) \n\nFácil de manejar y una belleza para la vista con su estilo con detalles en púrpura, el C54 es un SMG elegante y equilibrado con precisión de Gemini. Su marco de polímero liviano y su diseño ergonómico lo hacen ideal para combates cuerpo a cuerpo. El C54 es capaz de disparar rondas de 10 mm en modo totalmente automático para proporcionar el máximo apoyo y saturación del objetivo para garantizar que cualquier enfrentamiento termine rápidamente. Esta edición especial de Luckbringer verde y gris lanzada para Stella Fortuna 2954 es una excelente manera de tener la suerte de tu lado.\n\n--- STATS ---\nWeight: 2.0 kg\nFire Rate: 925 RPM\nFire Modes: Auto\nAlpha Dmg: 11.5 (Phys)  |  DPS: 177.3\nAmmo: 50\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 15 m  |  Drop: -0.20/m  |  Min Dmg: 7.5
