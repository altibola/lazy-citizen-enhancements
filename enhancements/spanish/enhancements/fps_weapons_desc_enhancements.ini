item_Descbehr_lmg_ballistic_01_xenothreat01=Fabricante: Behring\nTipo de artículo: LMG\nClase: Balística\n\nTamaño del cargador: 120\nCadencia de fuego: 800 rpm\nAlcance efectivo: 40 m\n\nAccesorios: Óptica (S2), Cañón (S2), Bajo cañón (S3)\n\nBehring diseñó la FS-9 para ser una fuerza arrolladora en el campo de batalla. Esta ametralladora ligera cuenta con un modo totalmente automático que la hace ideal para realizar fuego de cobertura o detener a los enemigos que avanzan. La FS-9 también es aclamada por su capacidad para mantener la precisión mientras desata fuego sostenido. Para esta entrada en la línea Legendary Bounty Hunters, el famoso rastreador Farook "Stoneface" Norris ha diseñado un look para su amada FS-9 LMG con llamativos toques de rojo sobre un tinte base gris.\n\n--- STATS ---\nWeight: 6.8 kg\nFire Rate: 650 RPM\nFire Modes: Auto\nAlpha Dmg: 14.5 (Phys)  |  DPS: 157.1\nAmmo: 75\nVelocity: 600 m/s  |  Absolute Range: 1.2 km\nFull Dmg to: 50 m  |  Drop: -0.01/m  |  Min Dmg: 10.0
item_Descbehr_lmg_ballistic_01_yellow_grey01=Fabricante: Behring\nTipo de artículo: LMG\nClase: Balístico\n\nTamaño del cargador: 75\nVelocidad de disparo: 800 rpm\nAlcance efectivo: 40 m\n\nAccesorios: Óptica (S2), Cañón (S2), Debajo del cañón (S3) )\n\nBehring diseñó el FS-9 para que fuera una fuerza abrumadora en el campo de batalla. Esta ametralladora ligera cuenta con un modo completamente automático que la hace ideal para lanzar fuego de cobertura o frenar el avance de los enemigos. El FS-9 también es aclamado por su capacidad para mantener la precisión mientras lanza fuego sostenido. Actualizada con nuevos colores amarillo y gris, esta edición especial Finish Line es un homenaje a las carreras de naves espaciales.\n\n--- STATS ---\nWeight: 6.8 kg\nFire Rate: 650 RPM\nFire Modes: Auto\nAlpha Dmg: 14.5 (Phys)  |  DPS: 157.1\nAmmo: 75\nVelocity: 600 m/s  |  Absolute Range: 1.2 km\nFull Dmg to: 50 m  |  Drop: -0.01/m  |  Min Dmg: 10.0
item_Descbehr_pistol_ballistic_01=Fabricante: Behring\nTipo de artículo: Pistola\nClase: Balística\n\nTamaño del cargador: 20\nVelocidad de disparo: 450 rpm\nAlcance efectivo: 25 m\n\nAccesorios: Óptica (S1), Cañón (S1), Debajo del cañón (S1) )\n\nGracias a un diseño aerodinámico y un marco de polímero liviano que ayuda a minimizar el retroceso, es fácil ver por qué el versátil y confiable S-38 de Behring se ha convertido en un arma confiable en todo el Imperio, tanto para los ciudadanos como para los agentes del orden.\n\n--- STATS ---\nWeight: 0.9 kg\nFire Rate: 450 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 22.5 (Phys)  |  DPS: 168.8\nAmmo: 20\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 20 m  |  Drop: -0.25/m  |  Min Dmg: 16.0
