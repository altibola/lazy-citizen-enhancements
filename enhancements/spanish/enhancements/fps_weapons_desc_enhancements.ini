item_Descklwe_lmg_energy_01_purple_blue01=Fabricante: Klaus & Werner\nTipo de artículo: LMG\nClase: Energía (Láser)\n\nTamaño de la batería: 100\nVelocidad de disparo: 400 rpm\nAlcance efectivo: 40 m\n\nAccesorios: Óptica (S2), Cañón (S2) ), Underbarrel (T3)\n\nKlaus & Werner han creado un arma icónica con la probada y verdadera LMG láser Demeco. Utilizado ampliamente en enfrentamientos militares, este favorito de la infantería de corto a medio alcance ha sido construido con estabilidad y precisión a la vanguardia. La edición Ultraviolet presenta llamativos colores violeta y orquídea.\n\n--- STATS ---\nWeight: 9.8 kg\nFire Rate: 800 RPM\nFire Modes: Auto\nAlpha Dmg: 11.5 (Energy)  |  DPS: 153.3\nAmmo: 100\nVelocity: 600 m/s  |  Absolute Range: 2.4 km
item_Descklwe_pistol_energy_01=Fabricante: Klaus & Werner\nTipo de artículo: Pistola\nClase: Energía (Láser)\n\nTamaño de la Batería: 30\nCadencia de Fuego: 300 rpm\nAlcance Efectivo: 30 m\n\nAccesorios: Óptica (S1), Cañón (S1), Bajo el cañón (S1)\n\nEl Arclight Modelo II de Klaus & Werner, un láser de mano que se hizo famoso por ser el arma de Kyle Fenris en la exitosa serie de televisión The Frontier, se ha hecho extremadamente popular en el mercado civil. A pesar de su atractivo mediático, el Modelo II ofrece una cadencia de fuego superior a la de cualquiera de sus homólogas balísticas. Aunque esto puede disminuir el poder de parada del arma, su célula de potencia ofrece disparos más que suficientes para terminar el trabajo.\n\n--- STATS ---\nWeight: 1.4 kg\nFire Rate: 700 RPM\nFire Modes: Burst / Semi-Auto\nAlpha Dmg: 18.0 (Energy)  |  DPS: 210.0\nAmmo: 30\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
item_Descklwe_pistol_energy_01_chromic01=Fabricante: Klaus & Werner\nTipo de artículo: Pistola\nClase: Energía (Láser)\n\nTamaño de la batería: 30\nCadencia de fuego: 300 rpm\nAlcance efectivo: 30 m\n\nEl Arclight Modelo II de Klaus & Werner, un láser de mano que se hizo famoso por ser el arma de Kyle Fenris en la exitosa serie de televisión The Frontier, se ha hecho extremadamente popular en el mercado civil. A pesar de su atractivo mediático, el Modelo II ofrece una cadencia de fuego superior a la de cualquiera de sus homólogas balísticas. Aunque esto puede disminuir el poder de parada del arma, su célula de potencia ofrece disparos más que suficientes para terminar el trabajo. Esta edición exclusiva Glimmer presenta un revestimiento iridiscente distintivo que hace que el arma brille con diferentes colores según las condiciones de iluminación y el ángulo desde el que se mire.\n\n--- STATS ---\nWeight: 1.4 kg\nFire Rate: 700 RPM\nFire Modes: Burst / Semi-Auto\nAlpha Dmg: 18.0 (Energy)  |  DPS: 210.0\nAmmo: 30\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
item_Descklwe_pistol_energy_01_engraved01=Fabricante: Klaus & Werner\nTipo de artículo: Pistola\nClase: Energía (Láser)\n\nTamaño de la Batería: 30\nCadencia de Fuego: 300 rpm\nAlcance Efectivo: 30 m\n\nAccesorios: Óptica (S1), Cañón (S1), Bajo el cañón (S1)\n\nEl Arclight Modelo II de Klaus & Werner, un láser de mano que se hizo famoso por ser el arma de Kyle Fenris en la exitosa serie de televisión The Frontier, se ha hecho extremadamente popular en el mercado civil. A pesar de su atractivo mediático, el Modelo II ofrece una cadencia de fuego superior a la de cualquiera de sus homólogas balísticas. Aunque eso puede disminuir el poder de parada del arma, su célula de potencia ofrece disparos más que suficientes para terminar el trabajo. La edición Herrero se distingue por incluir grabados geométricos en el armazón y la empuñadura, además de un guardamonte texturizado.\n\n--- STATS ---\nWeight: 1.4 kg\nFire Rate: 700 RPM\nFire Modes: Burst / Semi-Auto\nAlpha Dmg: 18.0 (Energy)  |  DPS: 210.0\nAmmo: 30\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
item_Descklwe_rifle_energy_01=Fabricante: Klaus & Werner\nTipo de artículo: Rifle de Asalto\nClase: Energía (Láser)\n\nTamaño de la Batería: 45\nCadencia de Fuego: 450 rpm\nAlcance Efectivo: 50 m\n\nAccesorios: Óptica (S2), Cañón (S2), Bajo cañón (S2)\n\nLas armas de asalto fiables nunca pasan de moda. Klaus & Werner mantiene esa tradición al presentar el Gallant. Este rifle de asalto basado en energía es capaz de proporcionar un fuego preciso y sostenido a objetivos hasta media distancia, mientras que su sistema de energía de alta capacidad permite a los operadores disparar considerablemente más tiros por batería.\n\n--- STATS ---\nWeight: 3.8 kg\nFire Rate: 900 RPM\nFire Modes: Burst\nAlpha Dmg: 21.0 (Energy)  |  DPS: 315.0\nAmmo: 45\nVelocity: 1,200 m/s  |  Absolute Range: 4.8 km
