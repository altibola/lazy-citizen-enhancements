item_Descgmni_shotgun_ballistic_01_pink_red01=Fabricante: Gemini\nTipo de artículo: Escopeta\nClase: Balística\n\nTamaño del cargador: 18\nVelocidad de disparo: 120 rpm / 60 rpm\nAlcance efectivo: 15 m / 35 m\n\nAccesorios: Óptica (S1), Cañón ( N/A), Underbarrel (T2)\n\nEl R97 combina un diseño elegante y poder de frenado para un arma elegante y efectiva para combates cuerpo a cuerpo. Esta escopeta balística de Gemini presenta dos modos de disparo distintos: un modo semiautomático de dispersión amplia ideal para causar daño rápido y un modo enfocado que ofrece un mayor alcance a expensas de algo de potencia. Esta flexibilidad de combate ha convertido al R97 en un arma de defensa personal popular en todo el Imperio. Protéjase a usted y a su ser querido con la edición especial Kismet del R97, que presenta colores rosa y negro que recuerdan al barco que Yuri Ilyin voló para localizar a su amante perdida Corazon Tan en el clásico video Coramor.\n\n--- STATS ---\nWeight: 2.4 kg\nFire Rate: 455 RPM\nFire Modes: Shotgun / Semi-Auto\nAlpha Dmg: 32.0 x8 (Phys)  |  DPS: 242.7\nAmmo: 18\nVelocity: 225 m/s  |  Absolute Range: 450 m\nFull Dmg to: 12 m  |  Drop: -0.05/m  |  Min Dmg: 1.2
