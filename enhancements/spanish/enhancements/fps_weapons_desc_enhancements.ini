item_Descapar_special_ballistic_02=Fabricante: Apocalypse Arms\nTipo de Objeto: Lanzamisiles\nClase: Balístico\n\nCargador: 3\nCadencia de fuego: 300 rpm (ráfaga de 3 disparos)\nAlcance efectivo: 2 km\n\nAccesorios: Óptica (N/A), Cañón (N/A), Bajo cañón (N/A)\n\nSúbete el Animus al hombro e iguala a la oposición en el campo de batalla. Este lanzamisiles de Apocalypse Arms cuenta con un cañón giratorio que dispara rápidamente tres misiles, lo que lo convierte en el arma perfecta para arrasar fuerzas terrestres o dañar vehículos y naves pequeñas. Cuando necesites sembrar la destrucción para salvarte, puedes confiar en Apocalypse Arms.\n\n--- STATS ---\nWeight: 16.8 kg\nFire Rate: 300 RPM\nFire Modes: Semi-Auto
