item_DescKSAR_pistol_ballistic_01=Fabricante: Kastak Arms\nTipo de artículo: Pistola\nClase: Balística\n\nTamaño del cargador: 6\nCadencia de fuego: 180 rpm \nAlcance efectivo: 100 m\n\nAccesorios: Óptica (S1), Cañón (S1), Bajo cañón (S1)\n\nA menudo llamada el "cañón de mano" de Kastak Arms, la Coda puede poner fin a un enfrentamiento con una sola bala del calibre .50, aunque su gran potencia puede hacer que el retroceso de la Coda sea difícil de manejar. Dado el tamaño limitado de su cargador y su fuerte retroceso, se desaconseja el fuego sostenido en favor de disparos individuales más precisos.\n\n--- STATS ---\nWeight: 1.3 kg\nFire Rate: 180 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 60.0 (Phys)  |  DPS: 180.0\nAmmo: 6\nVelocity: 550 m/s  |  Absolute Range: 1.1 km\nFull Dmg to: 55 m  |  Drop: -0.20/m  |  Min Dmg: 35.0
item_DescKsar_rifle_energy_01_blue_gold_01=Fabricante: Kastak Arms\nTipo de artículo: Rifle de asalto\nClase: Energía (Plasma)\n\nTamaño de la batería: 35\nVelocidad de disparo: 500 rpm\nAlcance efectivo: 50 m\n\nAccesorios: Óptica (S2), Cañón (S2) ), Underbarrel (T2)\n\nEl Karna es un rifle de asalto de plasma clásico de Kastak Arms. Este mauler de rango medio presenta modos de disparo en ráfaga, cargado y completamente automático para permitir ajustes situacionales rápidos y fáciles. Además de su reconocida potencia de fuego, el aspecto robusto y la confiabilidad del Karna la han convertido en una de las armas más populares de Kastak Arms. La atrevida combinación de colores azul y dorado le da a la edición Valor un atractivo valiente y digno.\n\n--- STATS ---\nWeight: 3.5 kg\nFire Rate: 600 RPM\nFire Modes: Auto / Charge / Semi-Auto\nAlpha Dmg: 17.5 (Energy)  |  DPS: 175.0\nAmmo: 35\nVelocity: 600 m/s  |  Absolute Range: 1.2 km\nFull Dmg to: 20 m  |  Drop: -0.11/m  |  Min Dmg: 14.5
item_Descapar_special_ballistic_01=Fabricante: Apocalypse Arms\nTipo de artículo: Cañón de riel\nClase: Balística\n\nTamaño del cargador: 5\nCadencia de fuego: 60 rpm\nAlcance efectivo: 200 m\n\nAccesorios: Óptica (N/A), Cañón (N/A), Bajo el cañón (S4)\n\nIgualmente devastador para amenazas mayores y vehículos hostiles, este cañón de riel montado en el hombro de Apocalypse Arms utiliza electroimanes para lanzar su carga con precisión a grandes distancias, convirtiéndolo en el azote de la tierra, el aire y el espacio.\n\n--- STATS ---\nWeight: 12.1 kg\nFire Rate: 70 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 10.0 (Phys)  |  DPS: 11.7\nAmmo: 5\nVelocity: 50 m/s  |  Absolute Range: 200 m
