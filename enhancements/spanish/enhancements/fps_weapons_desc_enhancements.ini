item_Descsasu_pistol_toy_01_shared=Fabricante: Sakura Sun\nTipo de artículo: Pistola de juguete\nClase: Dardos de espuma\n\nTamaño del cargador: 10\nCadencia de disparo: 450 rpm\nAlcance efectivo: 35m\n\nHaz que el fuego amigo sea divertido con la Sakura Sun WowBlast Desperado. Dispara dardos de espuma a tus amigos o enemigos ficticios con estas coloridas pistolas de plástico. Ya sea para matar el tiempo en una zona de aterrizaje o durante una larga travesía por las estrellas, la línea de juguetes WowBlast proporciona diversión y entretenimiento desenfadado para toda la familia. La pistola de juguete Desperado está disponible en varios colores vibrantes, ¡cada uno con un efecto de sonido único!\n\n--- STATS ---\nWeight: 0.1 kg\nFire Rate: 63 RPM\nFire Modes: Semi-Auto\nAmmo: 10\nVelocity: 20 m/s  |  Absolute Range: 300 m
