item_descklwe_sniper_energy_01=Fabricante: Klaus & Werner\nTipo de artículo: Rifle de francotirador\nClase: Energía (Láser)\n\nTamaño de Batería: 20\nCadencia de Fuego: 50 rpm\nAlcance Efectivo: 100 m\n\nAccesorios: Óptica (S3), Cañón (S2), Bajo cañón (S2)\n\nEl rifle de energía de largo alcance Arrowhead Modelo VI de Klaus & Werner cuenta con un cuerpo compuesto de fibra de vidrio capaz de soportar cualquier cantidad de entornos rigurosos tanto en la atmósfera como fuera de ella. Construido con una culata de precisión, visor compuesto y bípode incorporado, el Arrowhead ofrece un arma estable y devastadora para los operadores que quieren mantener su distancia, pero permanecer en la lucha.\n\n--- STATS ---\nWeight: 6.8 kg\nFire Rate: 70 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 50.0 (Energy)  |  DPS: 58.3\nAmmo: 16\nVelocity: 1,000 m/s  |  Absolute Range: 4.0 km
