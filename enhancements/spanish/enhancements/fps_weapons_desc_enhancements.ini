item_Descbehr_glauncher_ballistic_01=Fabricante: Behring\nTipo de Objeto: Lanzagranadas\nClase: Balística\n\nTamaño del cargador: 6\nCadencia de fuego: 40 rpm\nAlcance efectivo: Variable (80m)\n\nAccesorios: Óptica (S1), Cañón (N/A), Bajo el cañón (S1)\n\nEl lanzagranadas GP-33 MOD de calidad militar dispara granadas de 40 mm para despejar habitaciones y hacer salir a los enemigos que están a cubierto gracias al diseño de precisión de Behring que prepara cada granada para que explote al impactar.\n\n--- STATS ---\nWeight: 5.3 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 12.5 (Phys)  |  DPS: 12.5\nAmmo: 6\nVelocity: 50 m/s  |  Absolute Range: 200 m
