item_Descgmni_shotgun_ballistic_01=Fabricante: Gemini\nTipo de artículo: Escopeta\nClase: Balística\n\nTamaño del cargador: 10\nCadencia de fuego: 120 rpm / 60 rpm\nAlcance efectivo: 15 m / 35 m\n\nAccesorios: Óptica (S1), Cañón (N/A), Bajo cañón (S2)\n\nLa R97 combina un diseño elegante y potencia de parada para un arma cuerpo a cuerpo elegante y eficaz. Esta escopeta balística de Gemini presenta dos modos de disparo distintos: un modo semiautomático de amplia dispersión ideal para infligir daño rápido y un modo concentrado que ofrece un mayor alcance a expensas de algo de potencia. Esta flexibilidad de combate ha convertido a la R97 en un arma de defensa personal muy popular en todo el Imperio.\n\n--- STATS ---\nWeight: 2.4 kg\nFire Rate: 455 RPM\nFire Modes: Shotgun / Semi-Auto\nAlpha Dmg: 32.0 x8 (Phys)  |  DPS: 242.7\nAmmo: 18\nVelocity: 225 m/s  |  Absolute Range: 450 m\nFull Dmg to: 12 m  |  Drop: -0.05/m  |  Min Dmg: 1.2
