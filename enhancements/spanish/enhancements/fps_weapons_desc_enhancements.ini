item_Desclbco_sniper_energy_01=Fabricante: Lightning Bolt Co. \nTipo de Objeto: Rifle de francotirador\nClase: Electrón\n\nTamaño del cargador: 5\nCadencia de fuego: 30 rpm\nAlcance efectivo: 150m+\n\nAccesorios: Óptica (S3), Bajo cañón (S2)\n\nEl Atzkav es un rifle de francotirador de precisión único de Lightning Bolt Co. Una vez activada la palanca de carga, dispara con precisión un electrón cargado para infligir un importante daño energético que se propaga a los objetivos conductores cercanos. Este efecto de impulso especial también deja una carga residual en la zona de impacto que aumenta el daño infligido por los siguientes disparos de electrones. Además de las capacidades especiales de disparo del rifle, el Atzkav es más conocido por su cañón distintivo que crepita con energía al activar su siguiente disparo.\n\n--- STATS ---\nWeight: 9.1 kg\nFire Rate: 30 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 165.0 (Energy: 120.0 / Distort: 35.0 / Stun: 10.0)  |  DPS: 82.5\nAmmo: 8\nVelocity: 500 m/s  |  Absolute Range: 1.0 km\nFull Dmg to: 350 m  |  Drop: -0.01/m  |  Min Dmg: 30.0
item_Desclbco_sniper_energy_01_acid01=Fabricante: Lightning Bolt Co. \nTipo de Objeto: Rifle de francotirador\nClase: Electrón\n\nTamaño de la Batería: 5\nCadencia de Fuego: 30 rpm\nAlcance Efectivo: 150m+\n\nAccesorios: Óptica (S3), Bajo cañón (S2)\n\nEl Atzkav es un rifle de francotirador de precisión único de Lightning Bolt Co. Una vez activada la palanca de carga, dispara con precisión un electrón cargado para infligir un importante daño energético que se propaga a los objetivos conductores cercanos. Este efecto de impulso especial también deja una carga residual en la zona de impacto que aumenta el daño infligido por los siguientes disparos de electrones. Junto a las capacidades especiales de disparo del rifle, el Atzkav es más conocido por su cañón distintivo que crepita con energía al alimentar su siguiente disparo. La edición Venom integra un vibrante revestimiento verde en el arma.\n\n--- STATS ---\nWeight: 9.1 kg\nFire Rate: 30 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 165.0 (Energy: 120.0 / Distort: 35.0 / Stun: 10.0)  |  DPS: 82.5\nAmmo: 8\nVelocity: 500 m/s  |  Absolute Range: 1.0 km\nFull Dmg to: 350 m  |  Drop: -0.01/m  |  Min Dmg: 30.0
