item_DescGMNI_rifle_ballistic_01=Fabricante: Gemini\nTipo de artículo: Rifle de Asalto\nClase: Balística\n\nTamaño del cargador: 30\nCadencia de fuego: 300 rpm / 900 rpm\nAlcance efectivo: 50 m\n\nAccesorios: Óptica (S2), Cañón (S2), Bajo cañón (S2)\n\nCon el S71, Gemini diseñó un rifle de asalto ergonómico ideal para enfrentamientos a media distancia. Equipado con un calibre más pequeño que otras armas de su clase, el S71 se ha hecho popular entre los profesionales militares privados por su estética elegante y su precisión.\n\n--- STATS ---\nWeight: 2.5 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 21.5 (Phys)  |  DPS: 179.2\nAmmo: 30\nVelocity: 1,200 m/s  |  Absolute Range: 2.4 km\nFull Dmg to: 100 m  |  Drop: -0.10/m  |  Min Dmg: 17.5
