item_DescGRIN_TractorBeam_002_shared=Fabricante: Greycat Industrial\nTipo de artículo: Rayo tractor\nÁngulo máximo: 60°\nAlcance máximo: 150 m\nDistancia de fuerza total: 75 m\n\nRespaldado por su garantía certificada Soft-Touch®, el rayo tractor SureGrip de Greycat es un pilar de su catálogo de productos gracias a su fiable alcance y control.\n\n--- STATS ---\nWeight: 100.0 kg\nFire Modes: Viga tractora\nAmmo: 0\nVelocity: 0 m/s  |  Range: 0 m\nPower Draw: 3 PU/s\nComponent HP: 1,050\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescGRIN_TractorBeam_002_shared_UT1=Fabricante: Greycat Industrial\nTipo de artículo: Rayo tractor\nÁngulo máximo: 60°\nAlcance máximo: 130 m\nDistancia de fuerza total: 55 m\n\nEsta variante de servicio pesado del rayo tractor SureGrip de Greycat sacrifica rango a cambio de potencia adicional para Manejar objetos más grandes y pesados. Como resultado, el dispositivo se utiliza más comúnmente en una variedad de aplicaciones industriales donde su potencia adicional lo convierte en una herramienta esencial.\n\n--- STATS ---\nWeight: 100.0 kg\nFire Modes: Viga tractora\nAmmo: 0\nVelocity: 0 m/s  |  Range: 0 m\nPower Draw: 3 PU/s\nComponent HP: 1,050\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescGRIN_TractorBeam_002_shared_UT2=Fabricante: Greycat Industrial\nÁngulo máximo: 80°\nAlcance máximo: 130 m\nDistancia de fuerza total: 55 m\n\nEsta variante de precisión del rayo tractor SureGrip de Greycat sacrifica parte de la potencia y el alcance del modelo base a cambio de un más amplio. Ángulo de manipulación y mayor agarre de la correa, lo que hace que sea mucho más difícil soltar un objeto. Esta precisión convierte a este modelo en una herramienta imprescindible para cualquier empresa que requiera un manejo cuidadoso.\n\n--- STATS ---\nWeight: 100.0 kg\nFire Modes: Viga tractora\nAmmo: 0\nVelocity: 0 m/s  |  Range: 0 m\nPower Draw: 3 PU/s\nComponent HP: 1,050\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescGRIN_TractorBeam_003_shared=Fabricante: Greycat Industrial\nTipo de artículo: Viga del tractor\nÁngulo máximo: 80°\nAlcance máximo: 135 m\nDistancia de fuerza total: 50 m\n\nLa viga del tractor ViseLock es una evolución de la tecnología estándar de la industria de Greycat, con mejoras adicionales específicamente destinado a ayudar a las fuerzas de seguridad a controlar sus objetivos. En su diseño, Greycat sacrificó algo de fuerza de sujeción a mayores distancias para lograr una atadura más poderosa de la que es más difícil escapar.\n\n--- STATS ---\nWeight: 100.0 kg\nFire Modes: Viga tractora\nAmmo: 0\nVelocity: 0 m/s  |  Range: 0 m\nPower Draw: 3 PU/s\nComponent HP: 1,050\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescGRIN_TractorBeam_004_S3=Fabricante: Greycat Industrial\nTipo de artículo: Viga de remolque\nÁngulo máximo: 160°\nAlcance máximo: 250 m\nDistancia de fuerza total: 200 m\n\nLa elección segura de los equipos de recuperación en todo el imperio, la viga de remolque SafeTow de Greycat Industrial cuenta con suficiente fuerza, potencia y control para transportar carga pesada y vehículos completos a través del universo.\n\n--- STATS ---\nWeight: 100.0 kg\nFire Modes: Viga tractora\nAmmo: 0\nVelocity: 0 m/s  |  Range: 0 m\nPower Draw: 3 PU/s\nComponent HP: 1,050\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescGRIN_TractorBeam_S1=Fabricante: Greycat Industrial\nTipo de artículo: Viga tractora\n\nLa última incorporación de Greycat a su línea de vigas tractoras probadas en campo es una incorporación fiable a su catálogo. Aparte de una relación de tracción/retirada más eficiente, el último modelo no supone un gran avance con respecto a los modelos anteriores. El SureGrip tiene ajustes para apuntar y extraer todo, desde fragmentos de asteroides hasta tripulantes a la deriva, respaldado por la garantía certificada Soft-Touch® de Greycat.\n\n--- STATS ---\nWeight: 200.0 kg\nFire Modes: Viga tractora\nAmmo: 0\nVelocity: 0 m/s  |  Range: 0 m\nPower Draw: 4 PU/s\nComponent HP: 1,050\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
