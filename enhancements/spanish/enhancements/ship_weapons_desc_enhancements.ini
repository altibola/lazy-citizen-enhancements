item_DescKRON_LaserCannon_S1=Fabricante: Kroneg\nTipo de artículo: Cañón láser\nTamaño: 1\n\nInflige un daño masivo a distancia con la línea FL de cañones láser de Kroneg. El FL-11 puede disparar lentamente, pero proporciona una potencia de fuego considerable para un arma de tamaño uno.\n\n--- STATS ---\nWeight: 120.0 kg\nFire Rate: 250 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 49.2 (Energy)  |  DPS: 205.2\nAmmo: 25\nRegen: 1,267/s  |  Cooldown: 1.6s  |  Cost/Shot: 52\nVelocity: 1,200 m/s  |  Range: 2.0 km\nPower Draw: 1 PU/s\nComponent HP: 550\nSignatures:  EM: 408  |  IR: 0\nOverheat Temp: 450K
item_DescKRON_LaserCannon_S2=Fabricante: Kroneg\nTipo de artículo: Cañón láser\nTamaño: 2\n\nInflige un daño masivo a distancia con la línea FL de cañones láser de Kroneg. El FL-22 de tamaño 2 brilla a media y larga distancia gracias a un diseño que minimiza la caída del daño.\n\n--- STATS ---\nWeight: 300.0 kg\nFire Rate: 250 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 74.0 (Energy)  |  DPS: 308.5\nAmmo: 25\nRegen: 1,904/s  |  Cooldown: 1.7s  |  Cost/Shot: 79\nVelocity: 1,196 m/s  |  Range: 2.2 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 545  |  IR: 0\nOverheat Temp: 450K
item_DescKRON_LaserCannon_S3=Fabricante: Kroneg\nTipo de artículo: Cañón Láser\nTamaño: 3\n\nInflige un daño masivo a distancia con la línea FL de cañones láser de Kroneg. Encarnando la filosofía de diseño práctico de Kroneg, el FL-33 sigue siendo uno de los cañones láser de tamaño tres más fiables y destructivos disponibles en la actualidad.\n\n--- STATS ---\nWeight: 750.0 kg\nFire Rate: 250 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 110.8 (Energy)  |  DPS: 461.7\nAmmo: 25\nRegen: 2,850/s  |  Cooldown: 1.8s  |  Cost/Shot: 118\nVelocity: 1,184 m/s  |  Range: 2.4 km\nPower Draw: 2 PU/s\nComponent HP: 1,024\nSignatures:  EM: 681  |  IR: 0\nOverheat Temp: 450K
item_DescMISL_S01_CS_FSKI_Spark=Fabricante: Firestorm Kinetics\nSeñal de seguimiento: Sección transversal\nTamaño: 1\n\nLos que creen que el tamaño no importa harían bien en mantenerse alejados del Spark de Firestorm Kinetics. Este ligero misil de proximidad, que utiliza la sección transversal, tiene una potencia considerable.\n\n--- STATS ---\nWeight: 63.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S01_EM_BEHR_Pioneer=Fabricante: Behring\nSeñal de seguimiento: Electromagnética\nTamaño: 1\n\nBehring se enorgullece de su fiabilidad y el Pioneer no es una excepción. El sistema de seguimiento Oracle EM actualizado se ha probado una y otra vez en numerosos informes de pruebas de consumidores contra misiles de proximidad de clase similar.\n\n--- STATS ---\nWeight: 51.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S01_EM_THCN_TaskForce=Fabricante: Thermyte Concern\nSeñal de seguimiento: Electromagnética\nTamaño: 1\n\nAventurándose en el mercado armamentístico, Thermyte Concern ha reunido sus amplios conocimientos sobre explosivos de demolición para crear el TaskForce. Un misil de ataque ligero con seguimiento EM y un sistema de propulsión de primera clase que proporciona una mezcla eficaz de velocidad y potencia de fuego para establecer el dominio del campo de batalla.\n\n--- STATS ---\nWeight: 25.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S01_IR_BEHR_Marksman=Fabricante: Behring\nSeñal de seguimiento: Infrarrojo\nTamaño: 1\n\nLa serie Marksman de misiles de proximidad de Behring se ha ganado tanta reputación por su capacidad de rastrear una amplia gama de firmas de calor como por su daño de proximidad de efecto de área.\n\n--- STATS ---\nWeight: 56.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S01_IR_VNCL_Arrow=Fabricante: Vanduul\nSeñal de seguimiento: Infrarrojo\nTamaño: 1\n\nComúnmente conocido por su designación militar, el Arrow es un pequeño misil de ataque infrarrojo que se ha convertido en un pilar del arsenal de Vanduul.\n\n--- STATS ---\nWeight: 70.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S02_CS_FSKI_Tempest=Fabricante: Firestorm Kinetics\nSeñal de seguimiento: Sección transversal\nTamaño: 2\n\nLa Tempest se diseñó pensando únicamente en la aniquilación. Utilizando la tecnología de puntería de FireStorm Kinetics, este misil de proximidad se fija en la sección transversal de un objetivo para llevar los conflictos a una rápida conclusión.\n\n--- STATS ---\nWeight: 121.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S02_CS_THCN_StrikeForce=Fabricante: Thermyte Concern\nSeñal de Rastreo: Sección transversal\nTamaño: 2\n\nEl StrikeForce es la última culminación de la expansión de Thermyte Concern en la industria de misiles, mostrando notables mejoras en el diseño y en la sección transversal de puntería.\n\n--- STATS ---\nWeight: 72.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S02_EM_TALN_Dominator=Fabricante: Talon\nSeñal de seguimiento: Electromagnética\nTamaño: 2\n\nDiseñado para rastrear la firma electromagnética del adversario, el misil de ataque Dominator es un paquete de artillería de precisión diseñado para establecer el dominio táctico del campo de batalla.\n\n--- STATS ---\nWeight: 136.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S02_IR_FSKI_Ignite=Fabricante: Firestorm Kinetics\nSeñal de seguimiento: Infrarrojos\nTamaño: 2\n\nEl Ignite es la marca principal de Firestorm de misiles de ataque de búsqueda de calor que es la definición de Fire and Forget. Simplemente déjelo volar y disfrute del espectáculo.\n\n--- STATS ---\nWeight: 113.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S02_IR_NOVP_Rattler=Fabricante: Nova Pyrotechnica\nSeñal de seguimiento: Infrarrojos\nTamaño: 2\n\nEl Rattler es un misil de racimo rentable que sin duda atraerá a una gran variedad de pilotos. Cuando se dispara, el Rattler rastreará la señal infrarroja del oponente y creará una andanada inicial que debilitará el blindaje o los escudos, dejando al objetivo vulnerable a toda la carga que le sigue.\n\n--- STATS ---\nWeight: 133.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S02_IR_VNCL_Bullet=Fabricante: Vanduul\nSeñal de seguimiento: Infrarrojo\nTamaño: 2\n\nLos pilotos de la Armada han desarrollado un sano respeto por este misil de ataque Vanduul de puntería infrarroja, formalmente designado Bullet.\n\n--- STATS ---\nWeight: 113.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S03_CS_FSKI_Arrester=Fabricante: Firestorm Kinetics\nSeñal de seguimiento: Sección transversal\nTamaño: 3\n\nUtilizando la sección transversal para cazar a su presa, el misil de proximidad Firestorm Arrester hace un trabajo rápido con los enemigos atrapados en la mira.\n\n--- STATS ---\nWeight: 119.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S03_EM_FSKI_Thunderbolt=Fabricante: Firestorm Kinetics\nSeñal de seguimiento: Electromagnética \nTamaño: 3\n\nGracias a la ágil estructura del Firestorm Thunderbolt y al sistema de puntería EM, este misil de proximidad es una sólida elección para una amplia variedad de escenarios de combate.\n\n--- STATS ---\nWeight: 119.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S03_IR_NOVP_Viper=Fabricante: Nova Pyrotechnica\nSeñal de seguimiento: Infrarrojos\nTamaño: 3\n\nNova ha trabajado duro para asegurar que su misil de ataque Viper de seguimiento por infrarrojos haga honor a su nombre realizando ataques ágiles y letales contra objetivos hostiles.\n\n--- STATS ---\nWeight: 189.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S03_IR_VNCL_Chaos=Fabricante: Vanduul\nSeñal de seguimiento: Infrarrojo\nTamaño: 3\n\nLos instructores de vuelo naval a menudo incluyen el misil de ataque Caos de búsqueda de calor en las simulaciones de ataque de Vanduul, citando que su velocidad y fuerza da a los nuevos reclutas el respeto apropiado por el enemigo al que se enfrentarán.\n\n--- STATS ---\nWeight: 171.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S04_CS_TALN_Assailant=Fabricante: Talon\nSeñal de seguimiento: Sección transversal\nTamaño: 4\n\nEl misil Assailant de Talon es una solución armamentística perfecta para ataques de precisión contra adversarios motivados.\n\n--- STATS ---\nWeight: 224.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S04_EM_TALN_Raptor=Fabricante: Talon\nSeñal de seguimiento: Electromagnética\nTamaño: 4\n\nUtilizando un seguimiento electromagnético avanzado y un vuelo de precisión equilibrada, el misil de ataque Talon Raptor es un complemento feroz para el arsenal de cualquier nave.\n\n--- STATS ---\nWeight: 221.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S04_IR_BEHR_Pathfinder=Fabricante: Behring\nSeñal de seguimiento: Infrarrojo\nTamaño: 4\n\nEl misil de proximidad Pathfinder ha sido un miembro consistente del ya robusto arsenal de Behring gracias a su probado sistema de propulsión y su matriz de guía de búsqueda de calor.\n\n--- STATS ---\nWeight: 203.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S04_IR_VNCL_Dragon=Fabricante: Vanduul\nSeñal de Rastreo: Infrarrojo\nTamaño: 4\n\nDesignado el Dragón, este misil de ataque de rastreo infrarrojo Vanduul tiene una temible reputación ganada por el número de naves navales destruidas atribuidas a su poder destructivo.\n\n--- STATS ---\nWeight: 212.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S05_CS_TALN_Stalker=Fabricante: Talon\nSeñal de seguimiento: Sección transversal\nTamaño: 5\n\nCon seguimiento de sección transversal dedicado, el Talon Stalker ha perdurado a lo largo de los años como un torpedo de ataque de precisión con la máxima potencia de parada.\n\n--- STATS ---\nWeight: 303.0 kg\nComponent HP: 50\nOverheat Temp: 450K
item_DescMISL_S05_EM_TALN_Reaper=Fabricante: Talon\nSeñal de seguimiento: Electromagnética\nTamaño: 5\n\nEl torpedo de ataque Reaper presenta una relación rendimiento-gasto destructiva favorable y un conjunto de seguimiento Talon EM probado.\n\n--- STATS ---\nWeight: 326.0 kg\nComponent HP: 50\nOverheat Temp: 450K
item_DescMISL_S05_EM_TALN_Scimitar=Fabricante: Talon\nSeñal de seguimiento: Electromagnética\nTamaño: 5\n\nEl misil Scimitar rastrea objetivos a través de su firma EM para entregar una devastadora carga útil de tamaño cinco.\n\n--- STATS ---\nWeight: 314.0 kg\nComponent HP: 50\nOverheat Temp: 450K
item_DescMISL_S05_IR_TALN_Valkyrie=Fabricante: Talon\nSeñal de seguimiento: Infrarrojos\nTamaño: 5\n\nEl equipo de diseño de torpedos Talon ha hecho todo lo posible para su último torpedo de ataque Valkyrie creando una solución de empuje de varios niveles con capacidades de seguimiento por infrarrojos de última generación.\n\n--- STATS ---\nWeight: 314.0 kg\nComponent HP: 50\nOverheat Temp: 450K
item_DescMISL_S07_IR_TALN_Hellion=Fabricante: Talon\nSeñal de seguimiento: Infrarrojos\nTamaño: 7\n\nCon una carga útil considerable y un avanzado conjunto de sensores de búsqueda de calor, el misil Hellion de Talon puede ser eficaz contra agresores de todos los tamaños.\n\n--- STATS ---\nWeight: 452.0 kg\nComponent HP: 200\nOverheat Temp: 450K
item_DescMISL_S09_CS_TALN_Argos=Fabricante: Talon\nSeñal de seguimiento: Sección transversal\nTamaño: 9\n\nEl torpedo de ataque Talon Argos presenta un diseño clásico y sencillo que se basa en unos estándares de fabricación exigentes y en un sistema de puntería de sección transversal clásico.\n\n--- STATS ---\nWeight: 449.0 kg\nComponent HP: 1,000\nOverheat Temp: 450K
