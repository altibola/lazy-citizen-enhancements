item_DescHRST_Storm_LaserRepeater_S3=Fabricante: Hurston Dynamics\nTipo de artículo: Repetidor láser\nTamaño: 3\n\nHurston Dynamics se ha asociado con Tumbril Land Systems para crear el potente repetidor láser Reign-3 específicamente para la torreta del vehículo de asalto Storm. Utilizando la tecnología de cascada patentada de Hurston Dynamics, el Reign-3 ofrece un mayor rendimiento y una mayor producción de energía a medida que el ritmo frenético del combate comienza a calentarse.\n\n--- STATS ---\nWeight: 150.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 350.0 (Energy)  |  DPS: 2,041.7\nAmmo: 75\nRegen: 4,853/s  |  Cooldown: 0.8s  |  Cost/Shot: 84\nVelocity: 1,480 m/s  |  Range: 1.9 km\nPower Draw: 1 PU/s\nComponent HP: 1,024\nSignatures:  EM: 320  |  IR: 0\nOverheat Temp: 450K
item_DescJOKR_DistortionCannon_S1=Fabricante: Joker Engineering\nTipo de artículo: Cañón de Distorsión\nTamaño: 1\n\nLos genios de Joker lo han vuelto a hacer. El cañón automático de distorsión Suckerpunch es un arma de largo alcance que drena la fuente de alimentación de su objetivo en lugar de dañar el cuerpo físico de la nave, por lo que es ideal para la aplicación de la ley u otras aplicaciones.\n\n--- STATS ---\nWeight: 96.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 81.0 (Distort)  |  DPS: 135.0\nAmmo: 25\nRegen: 750/s  |  Cooldown: 1.6s  |  Cost/Shot: 90\nVelocity: 1,080 m/s  |  Range: 1.5 km\nPower Draw: 1 PU/s\nComponent HP: 550\nSignatures:  EM: 408  |  IR: 0\nOverheat Temp: 450K
item_DescJOKR_DistortionCannon_S2=Fabricante: Joker Engineering\nTipo de objeto: Cañón de distorsión\nTamaño: 2\n\nGolpea silenciosamente desde lejos con el Suckerpunch. El cañón de distorsión de largo alcance de tamaño 2 de Joker drena el sistema de energía de un objetivo, dejándolo indefenso para defenderse de lo que has planeado a continuación. Una opción ideal para las fuerzas del orden, cazarrecompensas y otras operaciones no letales.\n\n--- STATS ---\nWeight: 240.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 121.5 (Energy: 0.0 / Distort: 121.5)  |  DPS: 202.5\nAmmo: 25\nRegen: 1,125/s  |  Cooldown: 1.7s  |  Cost/Shot: 135\nVelocity: 1,076 m/s  |  Range: 1.6 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 545  |  IR: 0\nOverheat Temp: 450K
item_DescJOKR_DistortionCannon_S3=Fabricante: Joker Engineering\nTipo de artículo: Cañón de Distorsión\nTamaño: 3\n\nCuando quieras atrapar a tu presa sin hacer daño utiliza el Suckerpunch. Este cañón de distorsión de tamaño tres de Joker agota el sistema de energía del objetivo, por lo que es una excelente y eficaz adición no letal a tu arsenal.\n\n--- STATS ---\nWeight: 600.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 182.5 (Distort)  |  DPS: 304.2\nAmmo: 25\nRegen: 1,690/s  |  Cooldown: 1.8s  |  Cost/Shot: 203\nVelocity: 1,066 m/s  |  Range: 1.8 km\nPower Draw: 2 PU/s\nComponent HP: 1,024\nSignatures:  EM: 681  |  IR: 0\nOverheat Temp: 450K
item_DescKBAR_BallisticCannon_S1=Fabricante: KnightBridge Arms\nTipo de artículo: Cañón Balístico\nTamaño: 1\n\nEl auto cañón de nivel de entrada de la línea de espadas de KnightBridge Arms, el Longsword Serie 9 dispara una ronda balística diseñada para su uso contra una variedad de hostiles blindados al tiempo que permite a los pilotos mantener una distancia saludable de los objetivos.\n\n--- STATS ---\nWeight: 76.8 kg\nFire Rate: 250 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 48.6 (Phys)  |  DPS: 202.5\nAmmo: 495\nVelocity: 1,200 m/s  |  Range: 2.5 km\nPower Draw: 0 PU/s\nComponent HP: 850\nSignatures:  EM: 38  |  IR: 0\nOverheat Temp: 450K
item_DescKBAR_BallisticCannon_S2=Fabricante: KnightBridge Arms\nTipo de artículo: Cañón Balístico\nTamaño: 2\n\nKnightBridge Arms sabe que cuando se trata de batalla, tener el arma adecuada puede marcar la diferencia. Con sus potentes proyectiles balísticos, el versátil Greatsword Serie 10 de tamaño 2 te llevará hasta el final del conflicto gracias a su largo alcance y su gran potencial de daño.\n\n--- STATS ---\nWeight: 192.0 kg\nFire Rate: 250 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 73.0 (Phys)  |  DPS: 304.1\nAmmo: 492\nVelocity: 1,196 m/s  |  Range: 2.7 km\nPower Draw: 0 PU/s\nComponent HP: 850\nSignatures:  EM: 38  |  IR: 0\nOverheat Temp: 450K
item_DescKBAR_BallisticCannon_S3=Fabricante: KnightBridge Arms\nTipo de artículo: Cañón Balístico\nTamaño: 3\n\nEl Broadsword Serie 11 de KnightBridge Arms es el auto cañón balístico de tamaño tres al que acuden los pilotos cuando quieren las 3 D's: distancia, fiabilidad y daño.\n\n--- STATS ---\nWeight: 480.0 kg\nFire Rate: 250 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 109.3 (Phys)  |  DPS: 455.2\nAmmo: 489\nVelocity: 1,184 m/s  |  Range: 3.0 km\nPower Draw: 0 PU/s\nComponent HP: 2,850\nSignatures:  EM: 38  |  IR: 0\nOverheat Temp: 450K
item_DescKLWE_LaserRepeater_S1=Fabricante: Klaus & Werner\nTipo de artículo: Repetidor láser\nTamaño: 1\n\nCon un diseño de disparo secuencial de tres cañones, el repetidor láser Klaus & Werner CF-117 Bulldog es capaz de suministrar rondas de energía de alta velocidad manteniendo la eficiencia térmica, lo que lo convierte en un favorito entre los nuevos pilotos que equipan su primera nave.\n\n--- STATS ---\nWeight: 24.0 kg\nFire Rate: 750 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 11.3 (Energy)  |  DPS: 141.2\nAmmo: 70\nRegen: 1,355/s  |  Cooldown: 0.7s  |  Cost/Shot: 22\nVelocity: 1,500 m/s  |  Range: 1.6 km\nPower Draw: 0 PU/s\nComponent HP: 525\nSignatures:  EM: 152  |  IR: 0\nOverheat Temp: 450K
item_DescKLWE_LaserRepeater_S2=Fabricante: Klaus & Werner\nTipo de artículo: Repetidor láser\nTamaño: 2\n\nEl CF-227 Badger es el fiable láser de repetición de tamaño dos de Klaus & Werner. Su mayor potencia y alta cadencia de fuego lo convierten en un sólido contendiente en cualquier combate.\n\n--- STATS ---\nWeight: 60.0 kg\nFire Rate: 750 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 26.2 (Energy)  |  DPS: 328.1\nAmmo: 75\nRegen: 2,025/s  |  Cooldown: 0.8s  |  Cost/Shot: 32\nVelocity: 1,495 m/s  |  Range: 1.7 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 203  |  IR: 0\nOverheat Temp: 450K
item_DescKLWE_LaserRepeater_S3=Fabricante: Klaus & Werner\nTipo de artículo: Repetidor láser\nTamaño: 3\n\nEl CF-337 Panther es el modelo de tamaño tres de la línea de repetidores láser de Klaus & Werner. El Panther es una verdadera arma de disparar y olvidar con una relación respetable entre consumo de energía y daño. Los pilotos que equipan sus naves con Panther rara vez se arrepienten de la decisión.\n\n--- STATS ---\nWeight: 200.0 kg\nFire Rate: 750 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 43.6 (Energy)  |  DPS: 545.6\nAmmo: 75\nRegen: 3,031/s  |  Cooldown: 0.7s  |  Cost/Shot: 48\nVelocity: 1,480 m/s  |  Range: 1.9 km\nPower Draw: 1 PU/s\nComponent HP: 1,500\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescKLWE_LaserRepeater_S4=Fabricante: Klaus & Werner\nTipo de artículo: Repetidor láser\nTamaño: 4\n\nCuando una nave se te echa encima con un CF-447 Rhino, es una experiencia que pocos pilotos olvidarán. Este formidable repetidor láser de tamaño 4 de Klaus & Werner es muy adecuado para enfrentamientos a media distancia, pero es muy potente de cerca.\n\n--- STATS ---\nWeight: 375.0 kg\nFire Rate: 750 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 65.4 (Energy)  |  DPS: 817.9\nAmmo: 75\nRegen: 4,544/s  |  Cooldown: 0.8s  |  Cost/Shot: 73\nVelocity: 1,440 m/s  |  Range: 2.2 km\nPower Draw: 1 PU/s\nComponent HP: 1,650\nSignatures:  EM: 304  |  IR: 0\nOverheat Temp: 450K
item_DescKLWE_LaserRepeater_S5=Fabricante: Klaus & Werner\nTipo de artículo: Repetidor láser\nTamaño: 5\n\nCon un mordisco tan temible como su homónimo con colmillos, el repetidor láser Klaus & Werner CF-557 Galdereen es una opción sólida para una amplia gama de vehículos gracias a su alta cadencia de fuego y eficacia constante.\n\n--- STATS ---\nWeight: 938.0 kg\nFire Rate: 750 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 98.2 (Energy)  |  DPS: 1,227.4\nAmmo: 75\nRegen: 6,819/s  |  Cooldown: 0.9s  |  Cost/Shot: 109\nVelocity: 1,390 m/s  |  Range: 3.2 km\nPower Draw: 1 PU/s\nSignatures:  EM: 354  |  IR: 0\nOverheat Temp: 450K
item_DescKLWE_LaserRepeater_S6=Fabricante: Klaus & Werner\nTipo de artículo: Repetidor láser\nTamaño: 6\n\nEsta bestia de repetidor láser de Klaus & Werner cuenta con tres enormes cañones que advierten a cualquiera que vea un nave con el CF-667 que tal vez quiera pensárselo mejor antes de atacar.\n\n--- STATS ---\nWeight: 2340.0 kg\nFire Rate: 750 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 147.3 (Energy)  |  DPS: 1,841.6\nAmmo: 75\nRegen: 10,231/s  |  Cooldown: 0.9s  |  Cost/Shot: 164\nVelocity: 1,350 m/s  |  Range: 4.8 km\nPower Draw: 1 PU/s\nComponent HP: 4,224\nSignatures:  EM: 405  |  IR: 0\nOverheat Temp: 450K
item_DescKLWE_MassDriver_S1=Fabricante: Klaus & Werner\nTipo de artículo: Mass Driver Cannon\nTamaño: 1\n\nDerriba objetivos lejanos con el Sledge I Mass Driver Cannon. Klaus & Werner han utilizado tecnología de cañón de riel para disparar proyectiles balísticos de gran daño a larga distancia. Sin embargo, asegúrate de que cada disparo cuenta, ya que el arma sacrifica la cadencia de fuego por un daño bruto y devastador.\n\n--- STATS ---\nWeight: 192.0 kg\nFire Rate: 30 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 225.0 (Phys)  |  DPS: 112.5\nAmmo: 105\nVelocity: 1,155 m/s  |  Range: 3.0 km\nPower Draw: 1 PU/s\nComponent HP: 1,050\nSignatures:  EM: 540  |  IR: 0\nOverheat Temp: 450K
item_DescKLWE_MassDriver_S10=Descripción del cañón de riel Idris\n\n--- STATS ---\nWeight: 700.0 kg\nFire Rate: 6 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 144,160.0 (Phys)  |  DPS: 14,416.0\nAmmo: 1,500\nVelocity: 939 m/s  |  Range: 12.0 km\nPower Draw: 5 PU/s\nComponent HP: 727,680\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescKLWE_MassDriver_S2=Fabricante: Klaus & Werner\nTipo de artículo: Cañón Mass Driver\nTamaño: 2\n\nEl Cañón Mass Driver Sledge II de Klaus & Werner es un arma balística muy contundente capaz de disparar varios tipos de munición. Sin embargo, la mayor capacidad de penetración de escudos de esta arma tiene un coste. El espacio del cargador es limitado, por lo que la munición debe reponerse con regularidad. Al no utilizar proyectiles basados en energía, el conductor de masas K&W tiene un coste de energía reducido y, por tanto, resulta en una firma EM reducida.\n\n--- STATS ---\nWeight: 480.0 kg\nFire Rate: 30 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 525.0 (Phys)  |  DPS: 262.5\nAmmo: 105\nVelocity: 1,151 m/s  |  Range: 3.2 km\nPower Draw: 2 PU/s\nComponent HP: 2,050\nSignatures:  EM: 720  |  IR: 0\nOverheat Temp: 450K
item_DescKLWE_MassDriver_S3=Fabricante: Klaus & Werner\nTipo de artículo: Mass Driver Cannon\nTamaño: 3\n\nEl Sledge III es la variante de tamaño tres de la popular serie de cañones Mass Driver de Klaus & Werner. Aunque su disparo es lento, el arma combina con éxito la filosofía de diseño sencillo de la empresa con la tecnología punta de los cañones de riel para disparar proyectiles balísticos con precisión quirúrgica a distancia.\n\n--- STATS ---\nWeight: 1200.0 kg\nFire Rate: 30 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 1,125.0 (Phys)  |  DPS: 562.5\nAmmo: 102\nVelocity: 1,140 m/s  |  Range: 3.6 km\nPower Draw: 2 PU/s\nComponent HP: 3,050\nSignatures:  EM: 900  |  IR: 0\nOverheat Temp: 450K
item_DescKRIG_BallisticGatling_S2=Fabricante: Kruger Intergalactic\nTipo de artículo: Ballistic Gatling\nTamaño: 2\n\nUna variante personalizada de la línea de cañones giratorios Tigerstrike de Kruger Intergalactic, este potente cañón se diseñó junto con el equipo que trabajaba en el P-52 Merlin para garantizar que encajara a la perfección con las elegantes líneas del casco del caza ligero sin dejar de disparar rápidamente ronda tras ronda con la fiabilidad que se espera de un arma Kruger.\n\n--- STATS ---\nWeight: 26.7 kg\nFire Rate: 1,200 RPM\nFire Modes: Auto\nAlpha Dmg: 22.5 (Phys)  |  DPS: 450.0\nAmmo: 4,626\nVelocity: 1,346 m/s  |  Range: 2.2 km\nPower Draw: 0 PU/s\nComponent HP: 850\nSignatures:  EM: 27  |  IR: 0\nOverheat Temp: 450K
item_DescKRIG_LaserCannon_S3=Fabricante: Kruger Intergalactic\nTipo de artículo: Cañón láser\nTamaño: 3\n\nFabricado con piezas de precisión forjadas con tolerancias extremadamente ajustadas, diseñado para una gestión térmica de primera clase y ensamblado para superar todos los estándares de la industria, el auto cañón láser Quarreler fue creado por Kruger Intergalactic para una verdadera fiabilidad defensiva.\n\n--- STATS ---\nWeight: 400.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 218.7 (Energy)  |  DPS: 546.8\nAmmo: 25\nRegen: 3,375/s  |  Cooldown: 1.8s  |  Cost/Shot: 202\nVelocity: 1,184 m/s  |  Range: 2.4 km\nPower Draw: 2 PU/s\nComponent HP: 2,850\nSignatures:  EM: 649  |  IR: 0\nOverheat Temp: 450K
