item_DescMXOX_EMP_Device=Fabricante: MaxOx\nTipo de objeto: Generador de ráfagas\nTamaño: 1\nTipo de daño: EMP\n\nEl TroMag de MaxOx es un generador de ráfagas centrado en EMP bien diseñado y fiable. Su popularidad ha aumentado con los años a medida que los pilotos buscan alternativas al REP-8 de Behring. El TroMag presume de un tiempo de carga más rápido que su principal competidor, pero tiene un radio efectivo menor, lo que deja a los pilotos la decisión de si prefieren la velocidad o el tamaño.\n\n--- STATS ---\nWeight: 10.0 kg\nPower Draw: 1 PU/s\nComponent HP: 150\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescMXOX_NeutronCannon_S1=Fabricante: MaxOx\nTipo de artículo: Cañón de neutrones\nTamaño: 1\n\nEl cañón de neutrones NN-13 de MaxOx ofrece una enorme carga de energía a expensas de la velocidad y la eficiencia energética. Uno podría argumentar las virtudes de la velocidad, la cadencia de fuego y la distancia sobre el daño, pero el argumento se vuelve irrelevante si sólo necesitas acertar una vez.\n\n--- STATS ---\nWeight: 32.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 101.2 (Energy)  |  DPS: 253.0\nAmmo: 25\nRegen: 1,500/s  |  Cooldown: 0.5s  |  Cost/Shot: 90\nVelocity: 765 m/s  |  Range: 1.2 km\nPower Draw: 1 PU/s\nComponent HP: 550\nSignatures:  EM: 205  |  IR: 0\nOverheat Temp: 450K
item_DescMXOX_NeutronCannon_S2=Fabricante: MaxOx\nTipo de artículo: Cañón de neutrones\nTamaño: 2\n\nBasándose en la tecnología del NN-13, el NN-14 de MaxOx ofrece un aumento significativo de la potencia del cañón automático de neutrones para dar a cada disparo un golpe devastador. Sin embargo, ese mayor daño conlleva un mayor consumo de su central eléctrica.\n\n--- STATS ---\nWeight: 80.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 152.8 (Energy)  |  DPS: 382.0\nAmmo: 25\nRegen: 2,250/s  |  Cooldown: 0.4s  |  Cost/Shot: 135\nVelocity: 762 m/s  |  Range: 1.3 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 273  |  IR: 0\nOverheat Temp: 450K
