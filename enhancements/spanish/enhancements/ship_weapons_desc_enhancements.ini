Item_DescBEHR_LaserCannon_S4=Fabricante: Behring\nTipo de artículo: Cañón Láser\nTamaño: 4\n\nEl M6A de Behring es un versátil auto cañón de energía de alta velocidad, diseñado para proporcionar para mantener a su enemigo a distancia sin sacrificar su poder de parada.\n\n--- STATS ---\nWeight: 2250.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 615.3 (Energy)  |  DPS: 1,025.5\nAmmo: 25\nRegen: 6,330/s  |  Cooldown: 1.4s  |  Cost/Shot: 379\nVelocity: 1,152 m/s  |  Range: 2.8 km\nPower Draw: 2 PU/s\nComponent HP: 2,000\nSignatures:  EM: 792  |  IR: 0\nOverheat Temp: 450K
item_DescAEGS_EMP_Device=Fabricante: Behring\nTipo de artículo: Generador PEM\n\nEl REP-8 es un generador de ráfagas PEM de Behring. Equilibra un tiempo de carga manejable con una fuerte explosión de daño por distorsión que derriba los componentes electrónicos atrapados en su radio. Su sólida ingeniería y siglos de uso lo han convertido en un elemento disuasorio no letal estándar en todo el Imperio.\n\n--- STATS ---\nWeight: 4000.0 kg\nPower Draw: 1 PU/s\nComponent HP: 150\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescAEGS_EMP_Sentinel_S4=Fabricante: Behring\nTipo de objeto: Generador de ráfagas\nTamaño: 4\nTipo de daño: PEM\n\nInflige daño de distorsión con el generador de ráfagas REP-VS construido específicamente para el Aegis Vanguard Sentinel. Behring modificó la tecnología utilizada en su reputado REP-8 para diseñar un arma no letal eficaz que se integra a la perfección con el Sentinel.\n\n--- STATS ---\nWeight: 4000.0 kg\nPower Draw: 1 PU/s\nComponent HP: 150\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescAMRS_LaserCannon_S1=Fabricante: Amon & Reese Co.\nTipo de artículo: Cañón láser\nTamaño: 1\n\nEl Omnisky III es el modelo base de la línea de cañones láser automáticos de A&R para naves pequeñas y tiene una cadencia de fuego, una producción de daños y un alcance comparables a los de otras armas de su clase. Utiliza componentes de calidad media en su diseño, ofreciendo un notable aumento de la eficiencia energética respecto a algunos de sus competidores menos caros.\n\n--- STATS ---\nWeight: 144.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 97.2 (Energy)  |  DPS: 243.0\nAmmo: 25\nRegen: 1,500/s  |  Cooldown: 0.5s  |  Cost/Shot: 90\nVelocity: 1,200 m/s  |  Range: 2.0 km\nPower Draw: 1 PU/s\nComponent HP: 550\nSignatures:  EM: 446  |  IR: 0\nOverheat Temp: 450K
item_DescAMRS_LaserCannon_S2=Fabricante: Amon & Reese Co.\nTipo de artículo: Cañón láser\nTamaño: 2\n\nEl Omnisky VI es el autocañón láser de tamaño medio del fabricante A&R. Presume de un mayor daño, alcance y consumo de energía que su hermano pequeño, el Omnisky III, y utiliza muchos de los mismos componentes, lo que se traduce en una eficiencia energética media.\n\n--- STATS ---\nWeight: 360.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 145.8 (Energy)  |  DPS: 364.5\nAmmo: 25\nRegen: 2,250/s  |  Cooldown: 0.5s  |  Cost/Shot: 135\nVelocity: 1,196 m/s  |  Range: 2.2 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 594  |  IR: 0\nOverheat Temp: 450K
item_DescAMRS_LaserCannon_S3=Fabricante: Amon & Reese Co.\nTipo de artículo: Cañón láser\nTamaño: 3\n\nEl Omnisky IX es la versión de tamaño tres del popular cañón láser automático de Amon & Reese. La baja cadencia de fuego del arma se ve compensada por su alcance efectivo, que le permite efectuar un potente disparo desde lejos.\n\n--- STATS ---\nWeight: 900.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 218.7 (Energy)  |  DPS: 546.8\nAmmo: 25\nRegen: 3,375/s  |  Cooldown: 0.5s  |  Cost/Shot: 202\nVelocity: 1,184 m/s  |  Range: 2.4 km\nPower Draw: 2 PU/s\nComponent HP: 1,024\nSignatures:  EM: 743  |  IR: 0\nOverheat Temp: 450K
item_DescAMRS_LaserCannon_S4=Fabricante: Amon & Reese Co.\nTipo de artículo: Cañón láser\nTamaño: 4\n\nLa fiable línea de autocañones láser de Amon & Reese continúa con el Omnisky XII. Aunque de disparo lento, este láser de tamaño cuatro es capaz de lanzar con eficacia devastadoras ráfagas de rayos láser desde una distancia considerable.\n\n--- STATS ---\nWeight: 280.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 327.9 (Energy)  |  DPS: 819.7\nAmmo: 25\nRegen: 5,060/s  |  Cooldown: 0.5s  |  Cost/Shot: 303\nVelocity: 1,152 m/s  |  Range: 2.8 km\nPower Draw: 1 PU/s\nComponent HP: 1,650\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescAMRS_LaserCannon_S5=Fabricante: Amon & Reese Co.\nTipo de artículo: Cañón láser\nTamaño: 5\n\nLa reputación de Amon & Reese de fabricar armas potentes y fiables está encarnada por su línea Omnisky de cañones láser automáticos. El Omnisky XV es la versión de tamaño cinco del arma que ha ayudado a defender el Imperio durante siglos.\n\n--- STATS ---\nWeight: 5630.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 492.2 (Energy)  |  DPS: 1,230.4\nAmmo: 25\nRegen: 7,595/s  |  Cooldown: 0.5s  |  Cost/Shot: 455\nVelocity: 1,112 m/s  |  Range: 4.0 km\nPower Draw: 2 PU/s\nComponent HP: 2,500\nSignatures:  EM: 1,040  |  IR: 0\nOverheat Temp: 450K
item_DescAMRS_LaserCannon_S6=Fabricante: Amon & Reese Co.\nTipo de artículo: Cañón láser\nTamaño: 6\n\nApodado "Augustus" por los ingenieros de Amon & Reese en honor al emperador romano que fundó la notable "Decimoctava Legión", este enorme autocañón láser de tamaño seis golpea con fuerza a grandes distancias, lo que convierte al Omnisky XVIII en una forma eficaz de mantener a raya a los enemigos.\n\n--- STATS ---\nWeight: 14100.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 738.4 (Energy)  |  DPS: 1,846.0\nAmmo: 25\nRegen: 11,395/s  |  Cooldown: 0.5s  |  Cost/Shot: 683\nVelocity: 1,080 m/s  |  Range: 6.0 km\nPower Draw: 2 PU/s\nComponent HP: 4,224\nSignatures:  EM: 1,190  |  IR: 0\nOverheat Temp: 450K
item_DescAMRS_ScatterGun_S3=Fabricante: Amon & Reese Co.\nTipo de artículo: Escopeta de plasma\nTamaño: 3\n\nTu nave sembrará el caos con la escopeta de plasma PyroBurst de A&R. Eficaz en espacios reducidos, la PyroBurst esparce proyectiles de plasma autodetonantes, sacrificando la precisión milimétrica por la saturación de la zona.\n\n--- STATS ---\nWeight: 450.0 kg\nFire Rate: 70 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 396.0 x8 (Energy)  |  DPS: 462.0\nAmmo: 75\nRegen: 2,567/s  |  Cooldown: 0.4s  |  Cost/Shot: 440\nVelocity: 844 m/s  |  Range: 1.3 km\nPower Draw: 1 PU/s\nComponent HP: 1,550\nSignatures:  EM: 450  |  IR: 0\nOverheat Temp: 450K
item_DescAPAR_BallisticGatling_S4=Fabricante: Apocalypse Arms\nTipo de artículo: Ballistic Gatling\nTamaño: 4\n\nSi no está roto, no lo arregles. Y si quieres que se rompa, apúntale con un Revenant. Sólidamente construida sobre una base de tecnología centenaria, Apocalypse Arms da un giro innovador a diseños probados en batalla para crear una robusta Gatling balística que puede lanzar la muerte a través del vacío. Aunque tarda en girar y enfriarse, la fiabilidad de la Revenant la convierte en una de las favoritas de aquellos que esperan encontrar problemas.\n\n--- STATS ---\nWeight: 2340.0 kg\nFire Rate: 900 RPM\nFire Modes: Auto\nAlpha Dmg: 189.9 (Phys)  |  DPS: 2,848.5\nAmmo: 3,801\nVelocity: 1,215 m/s  |  Range: 6.0 km\nPower Draw: 0 PU/s\nComponent HP: 16,500\nSignatures:  EM: 36  |  IR: 0\nOverheat Temp: 450K
item_DescAPAR_BallisticGatling_S6=Fabricante: Apocalypse Arms\nTipo de artículo: Gatling balístico\nTamaño: 6\n\nReminiscencia de una era pasada de combate espacial, este brutal Gatling balístico de tamaño seis de Apocalypse Arms es un arma muy deliberada. Tómate un momento mientras el tambor del Draugar gira a toda velocidad para saborear la ruina y la destrucción que estás a punto de desatar.\n\n--- STATS ---\nWeight: 1950.0 kg\nFire Rate: 1,200 RPM\nFire Modes: Auto\nAlpha Dmg: 142.4 (Phys)  |  DPS: 2,848.0\nAmmo: 3,309\nVelocity: 1,215 m/s  |  Range: 6.0 km\nPower Draw: 0 PU/s\nComponent HP: 4,224\nSignatures:  EM: 33  |  IR: 0\nOverheat Temp: 450K
item_DescAPAR_BallisticScatterGun_S1=Fabricante: Apocalypse Arms\nTipo de artículo: Cañón de dispersión balística\nTamaño: 1\n\nSiembra el terror en el campo de batalla con el Havoc de Apocalypse Arms. Esta escopeta de dispersión de tamaño uno inflige un daño masivo a corta distancia, lo que la convierte en el arma perfecta para acabar un combate.\n\n--- STATS ---\nWeight: 60.0 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 374.4 x8 (Phys)  |  DPS: 374.4\nAmmo: 2,040\nVelocity: 900 m/s  |  Range: 1.3 km\nPower Draw: 0 PU/s\nComponent HP: 1,550\nSignatures:  EM: 41  |  IR: 0\nOverheat Temp: 450K
item_DescAPAR_BallisticScatterGun_S2=Fabricante: Apocalypse Arms\nTipo de artículo: Cañón de dispersión balística\nTamaño: 2\n\nEl Hellion de Apocalypse Arms es un cañón de dispersión de tamaño dos que satura a los objetivos con munición balística en espacios reducidos. La funcionalidad de munición inteligente del arma le permite cambiar entre munición estándar y especial.\n\n--- STATS ---\nWeight: 150.0 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 560.0 x8 (Phys)  |  DPS: 560.0\nAmmo: 2,019\nVelocity: 897 m/s  |  Range: 1.4 km\nPower Draw: 0 PU/s\nComponent HP: 1,550\nSignatures:  EM: 41  |  IR: 0\nOverheat Temp: 450K
item_DescAPAR_BallisticScatterGun_S3=Fabricante: Apocalypse Arms\nTipo de artículo: Cañón de dispersión balística\nTamaño: 3\n\nEl cañón de dispersión Predator se abalanza sobre los oponentes cercanos con una abrumadora descarga de munición balística. La versión de tamaño tres de la temida escopeta de dispersión de Apocalypse Arms cambia el alcance efectivo por una amplia dispersión.\n\n--- STATS ---\nWeight: 375.0 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 840.0 x8 (Phys)  |  DPS: 840.0\nAmmo: 1,980\nVelocity: 888 m/s  |  Range: 1.5 km\nPower Draw: 0 PU/s\nComponent HP: 1,550\nSignatures:  EM: 41  |  IR: 0\nOverheat Temp: 450K
item_DescAPAR_MassDriver_S2=Fabricante: Apocalypse Arms\nTipo de artículo: Cañón Mass Driver\nTamaño: 2\n\nSiempre vale la pena estar preparado, y si alguna vez ocurre una desgracia, te alegrarás de tener a mano un Mass Driver Strife de Apocalypse Arms. Puede que sus aceleradores electromagnéticos necesiten un poco de energía, pero lo compensa con la rapidez con la que dispara sus proyectiles de alta velocidad. Verlo atravesar tu objetivo es suficiente para mejorar cualquier mal día. Eso sí, ten cuidado de no dejar que se sobrecaliente.\n\n--- STATS ---\nWeight: 600.0 kg\nFire Rate: 30 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 525.0 (Phys)  |  DPS: 262.5\nAmmo: 84\nVelocity: 1,151 m/s  |  Range: 3.2 km\nPower Draw: 2 PU/s\nComponent HP: 1,050\nSignatures:  EM: 792  |  IR: 0\nOverheat Temp: 450K
