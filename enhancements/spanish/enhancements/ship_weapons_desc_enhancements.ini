item_DescBEHR_LaserCannon_S2=Fabricante: Behring\nTipo de artículo: Cañón Láser\nTamaño: 2\n\nEl M4A es el auto cañón láser de segundo nivel de Behring. Su mayor tamaño implica un mayor consumo de energía a cambio de una mayor potencia. La cadencia de fuego y la eficiencia energética son comparables a las del modelo M3A.\n\n--- STATS ---\nWeight: 360.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 273.4 (Energy)  |  DPS: 455.6\nAmmo: 25\nRegen: 2,815/s  |  Cooldown: 0.8s  |  Cost/Shot: 168\nVelocity: 1,196 m/s  |  Range: 2.2 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 495  |  IR: 0\nOverheat Temp: 450K
