item_DescBEHR_LaserCannon_S3=Fabricante: Behring\nTipo de artículo: Cañón Láser\nTamaño: 3\n\nCuando se diseñan cañones automáticos de energía, el M5A de Behring proporciona el estándar con el que se miden, debido a su largo alcance de enganche y baja caída de daño.\n\n--- STATS ---\nWeight: 900.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 410.2 (Energy)  |  DPS: 683.6\nAmmo: 25\nRegen: 4,220/s  |  Cooldown: 1.3s  |  Cost/Shot: 253\nVelocity: 1,184 m/s  |  Range: 2.4 km\nPower Draw: 1 PU/s\nComponent HP: 1,024\nSignatures:  EM: 644  |  IR: 0\nOverheat Temp: 450K
