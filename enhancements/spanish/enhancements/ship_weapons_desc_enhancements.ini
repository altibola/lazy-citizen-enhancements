item_DescBEHR_BallisticGatling_S4=Fabricante: Behring\nTipo de artículo: Gatling balística\nTamaño: 4\n\nLa AD4B, la versión de Behring de la gatling balística clásica, incluye un mecanismo de disparo de ciclo cristalino en el sistema giratorio de alta velocidad para maximizar la eficacia en enfrentamientos sostenidos con un mínimo de fallos de disparo. La próxima vez que un agresor intensifique una situación hostil, haga que se arrepienta de su decisión haciendo girar esta arma abrumadora y eficaz.\n\n--- STATS ---\nWeight: 375.0 kg\nFire Rate: 900 RPM\nFire Modes: Auto\nAlpha Dmg: 84.4 (Phys)  |  DPS: 1,266.0\nAmmo: 5,220\nVelocity: 1,296 m/s  |  Range: 2.8 km\nPower Draw: 0 PU/s\nComponent HP: 1,650\nSignatures:  EM: 36  |  IR: 0\nOverheat Temp: 450K
