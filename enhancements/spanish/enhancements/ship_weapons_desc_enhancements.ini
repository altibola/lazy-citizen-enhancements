item_DescBEHR_LaserRepeater_VNG_S2=Fabricante: Behring\nTipo de artículo: Repetidor láser\nTamaño: 2\n\nAegis encargó a Behring el diseño de un repetidor láser específico para su línea Vanguard. El resultado fue el GVSR, que cumplía los exigentes estándares de Aegis al proporcionar una cadencia de fuego constante sin sobrecargar la planta de energía de la nave.\n\n--- STATS ---\nWeight: 90.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 99.7 (Energy)  |  DPS: 581.7\nAmmo: 75\nRegen: 3,232/s  |  Cooldown: 0.8s  |  Cost/Shot: 55\nVelocity: 1,495 m/s  |  Range: 1.7 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 289  |  IR: 0\nOverheat Temp: 450K
item_DescBOMB_S03_FSKI_Thunderball=Fabricante: FireStorm Kinetics\nTipo de artículo: Bomba explosiva\nTamaño: 3\n\nAtaca a las fuerzas terrestres desde una distancia segura con la Thunderball. A pesar de su pequeño tamaño, estas bombas S3 contienen una potente carga útil, lo que permite a los usuarios desplegar varias bombas para abrumar a un objetivo estacionario o lanzarlas a intervalos para alcanzar objetivos en movimiento. La Thunderball utiliza las aletas Atmo-Xact patentadas por FireStorm Kinetics, que se despliegan una vez lanzadas para proporcionar orientación adicional en ruta hacia el objetivo.\n\n--- STATS ---\nWeight: 252.0 kg\nComponent HP: 1,000\nOverheat Temp: 450K
item_DescBOMB_S05_FSKI_Stormburst=Fabricante: FireStorm Kinetics\nTipo de artículo: Bomba explosiva\nTamaño: 5\n\nCausa estragos en las fuerzas terrestres desde el cielo con la Stormburst. Diseñadas por FireStorm Kinetics para maximizar el impacto destructivo con un tamaño más moderado, estas bombas S5 presentan una munición compuesta mixta para diezmar objetivos blindados. La Stormburst también utiliza las aletas Atmo-Xact patentadas por FireStorm Kinetics para garantizar que la carga útil alcance su objetivo.\n\n--- STATS ---\nWeight: 252.0 kg\nComponent HP: 1,000\nOverheat Temp: 450K
item_DescBOMB_S10_FSKI_Colossus=Fabricante: FireStorm Kinetics\nTipo de objeto: Bomba explosiva\nTamaño: 10\n\nLos enemigos de abajo no tendrán ninguna oportunidad contra una Colossus. FireStorm Kinetics ha diseñado esta enorme bomba S10 para devastar objetivos terrestres, ya sean vehículos o estructuras. Diseñada para ser lanzada desde gran altura, la Colossus cuenta con aletas Atmo-Xact patentadas que se despliegan para proporcionar una guía adicional en ruta hacia el objetivo.\n\n--- STATS ---\nWeight: 951.0 kg\nComponent HP: 1,000\nOverheat Temp: 450K
