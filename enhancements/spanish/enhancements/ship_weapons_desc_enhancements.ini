item_DescMISL_S09_EM_TALN_Seeker=Fabricante: Talon\nSeñal de seguimiento: Electromagnética\nTamaño: 9\n\nEl torpedo Seeker de Talon es un torpedo de precisión, EM-targeting capaz de entregar una carga masiva de forma rápida y precisa.\n\n--- STATS ---\nWeight: 447.0 kg\nComponent HP: 667\nOverheat Temp: 450K
