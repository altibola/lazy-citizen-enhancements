item_DescBEHR_BallisticGatling_SF7B_S7=Fabricante: Behring\nTipo de artículo: Gatling balístico\nTamaño: 7\n\nLucha contra grandes naves espaciales y destroza rápidamente las más pequeñas con el Gatling balístico SF7B. Construida específicamente para el caza estelar Ares Inferno, el arma se integra perfectamente en el cuerpo de la nave. La impresionante cadencia de fuego del arma desata rondas de alta densidad que atraviesan blindajes y escudos, lo que la convierte en la elección perfecta para situaciones en las que la saturación del objetivo es clave.\n\n--- STATS ---\nWeight: 5860.0 kg\nFire Rate: 900 RPM\nFire Modes: Auto\nAlpha Dmg: 292.0 (Phys)  |  DPS: 4,380.0\nAmmo: 2,994\nVelocity: 1,179 m/s  |  Range: 7.3 km\nPower Draw: 0 PU/s\nComponent HP: 6,750\nSignatures:  EM: 36  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_BallisticRepeater_S1=Fabricante: Behring\nTipo de artículo: Repetidor balístico\nTamaño: 1\n\nDisparando desde dos cañones, el SW16BR1 "Buzzsaw" puede abrumar a los agresores a media y corta distancia. La artesanía experta de Behring permite que el arma participe en tiroteos sostenidos antes de necesitar un enfriamiento, lo que la convierte en un excelente repetidor balístico básico.\n\n--- STATS ---\nWeight: 36.0 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 36.0 (Phys)  |  DPS: 300.0\nAmmo: 2,664\nVelocity: 1,500 m/s  |  Range: 2.0 km\nPower Draw: 0 PU/s\nComponent HP: 525\nSignatures:  EM: 40  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_BallisticRepeater_S2=Fabricante: Behring\nTipo de artículo: Repetidor balístico\nTamaño: 2\n\nEl SW16BR2 Sawbuck es la contribución de Behring al creciente mercado de los repetidores balísticos. Su configuración de doble cañón de disparo secuencial ofrece un punto intermedio eficaz para los operadores que buscan una mayor cadencia de fuego que un cañón, pero sin el temor de sobrecalentamiento que se obtendría con un gatling.\n\n--- STATS ---\nWeight: 90.0 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 54.0 (Phys)  |  DPS: 450.0\nAmmo: 2,637\nVelocity: 1,495 m/s  |  Range: 2.2 km\nPower Draw: 0 PU/s\nComponent HP: 850\nSignatures:  EM: 40  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_BallisticRepeater_S3=Fabricante: Behring\nTipo de artículo: Repetidor balístico\nTamaño: 3\n\nÁbrete camino fuera de los problemas con este repetidor balístico Behring de tamaño tres. El SW16BR3 "Shredder" distribuye el calor a través de ambos cañones para mantenerlo disparando cuando más se necesita. La agrupación de disparos del arma y la caída del daño la hacen más letal a media o corta distancia.\n\n--- STATS ---\nWeight: 225.0 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 81.0 (Phys)  |  DPS: 675.0\nAmmo: 2,589\nVelocity: 1,480 m/s  |  Range: 2.4 km\nPower Draw: 0 PU/s\nComponent HP: 1,024\nSignatures:  EM: 40  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_BallisticRepeater_VNG_S2=Fabricante: Behring\nTipo de artículo: Repetidor balístico\nTamaño: 2\n\nSólo los propietarios de Vanguard pueden equipar esta versión única de la línea de repetidores balísticos de Behring en el morro de su nave. El BRVS está cuidadosamente calibrado para que su descarga balística se dispare lo suficientemente rápido como para proporcionar la máxima saturación del objetivo, mientras que su ventilación mejorada reduce el sobrecalentamiento frecuente.\n\n--- STATS ---\nWeight: 90.0 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 54.0 (Phys)  |  DPS: 450.0\nAmmo: 2,637\nVelocity: 1,495 m/s  |  Range: 2.2 km\nPower Draw: 0 PU/s\nComponent HP: 850\nSignatures:  EM: 40  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_DistortionCannon_VNG_S2=Fabricante: Behring\nTipo de artículo: Cañón de distorsión\nTamaño: 2\n\nInutiliza naves sin dañar a su tripulación ni su carga con el EVSD de Behring. Este cañón de distorsión cuenta con gran parte de la misma tecnología líder en la industria utilizada en otras armas de Behring, pero está diseñado específicamente para ser montado en el morro de un Aegis Vanguard.\n\n--- STATS ---\nWeight: 360.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 81.0 (Distort)  |  DPS: 202.5\nAmmo: 25\nRegen: 1,125/s  |  Cooldown: 1.4s  |  Cost/Shot: 90\nVelocity: 1,076 m/s  |  Range: 1.6 km\nPower Draw: 1 PU/s\nComponent HP: 550\nSignatures:  EM: 594  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_DistortionRepeater_VNG_S2=Fabricante: Behring\nTipo de artículo: Repetidor de distorsión\nTamaño: 2\n\nLío con el sistema eléctrico de un agresor con el ATVS de Behring. Este repetidor de distorsión disruptivo y no letal sólo es compatible con la montura de morro del Aegis Vanguard.\n\n--- STATS ---\nWeight: 90.0 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 27.0 (Distort)  |  DPS: 225.0\nAmmo: 75\nRegen: 1,125/s  |  Cooldown: 0.5s  |  Cost/Shot: 27\nVelocity: 1,346 m/s  |  Range: 1.3 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 243  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_LaserCannon_S1=Fabricante: Behring\nTipo de artículo: Cañón láser\nTamaño: 1\n\nEl M3A es el autocañón láser básico de Behring. La configuración del autocañón ofrece un daño modesto por proyectil y una cadencia de fuego bastante baja. Al ser la oferta más básica de la línea de armas de Behring, presenta un bajo consumo de energía, pero una escasa eficiencia energética. Compensa sus defectos con su bajo coste, una característica que muchos pilotos buscan cuando equipan sus naves con poco presupuesto.\n\n--- STATS ---\nWeight: 144.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 182.2 (Energy)  |  DPS: 303.8\nAmmo: 25\nRegen: 1,867/s  |  Cooldown: 0.8s  |  Cost/Shot: 112\nVelocity: 1,200 m/s  |  Range: 2.0 km\nPower Draw: 1 PU/s\nComponent HP: 550\nSignatures:  EM: 348  |  IR: 0\nOverheat Temp: 450K
