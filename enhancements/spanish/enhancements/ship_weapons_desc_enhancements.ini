item_DescHRST_LaserRepeater_S1=Fabricante: Hurston Dynamics\nTipo de artículo: Repetidor láser\nTamaño: 1\n\nEl repetidor láser Attrition-1 cuenta con la exclusiva tecnología en cascada de Hurston Dynamics que proporciona un mayor rendimiento mientras se mantiene un fuego láser sostenido. El resultado es un arma de tamaño uno que recompensa a un operador hábil.\n\n--- STATS ---\nWeight: 24.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 34.0 (Energy)  |  DPS: 198.3\nAmmo: 75\nRegen: 2,155/s  |  Cooldown: 0.7s  |  Cost/Shot: 37\nVelocity: 1,500 m/s  |  Range: 1.6 km\nPower Draw: 0 PU/s\nComponent HP: 524\nSignatures:  EM: 167  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserRepeater_S2=Fabricante: Hurston Dynamics\nTipo de artículo: Repetidor Laser\nTamaño: 2\n\nCuando la batalla se está calentando, es cuando la tecnología láser en cascada de Hurston Dynamics realmente brilla. Con el repetidor Attrition-2 de tamaño 2, un operador puede utilizar ráfagas sostenidas de fuego láser para traducir el exceso de calor en un mayor rendimiento del arma.\n\n--- STATS ---\nWeight: 60.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 55.0 (Energy)  |  DPS: 320.8\nAmmo: 75\nRegen: 3,232/s  |  Cooldown: 0.7s  |  Cost/Shot: 55\nVelocity: 1,495 m/s  |  Range: 1.7 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 223  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserRepeater_S3=Fabricante: Hurston Dynamics\nTipo de Artículo: Repetidor Laser\nTamaño: 3\n\nEn lugar de limitar el rendimiento de su arma para aumentar la estabilidad, la tecnología en cascada de Hurston Dynamics permite al operador decidir. Aunque el sobrecalentamiento es un riesgo, los periodos más largos de fuego sostenido con el repetidor láser Attrition-3 aumentarán el rendimiento, ya que el exceso de calor se traduce en una mayor producción de energía.\n\n--- STATS ---\nWeight: 150.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 86.0 (Energy)  |  DPS: 501.7\nAmmo: 75\nRegen: 4,853/s  |  Cooldown: 0.7s  |  Cost/Shot: 84\nVelocity: 1,480 m/s  |  Range: 1.9 km\nPower Draw: 1 PU/s\nComponent HP: 1,024\nSignatures:  EM: 278  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserRepeater_S4=Fabricante: Hurston Dynamics\nTipo de artículo: Repetidor Láser\nTamaño: 4\n\nHurston Dynamics ha integrado completamente su tecnología láser en cascada en su línea de repetidores Attrition. El Attrition-4 de tamaño 4 no es una excepción, funcionando a su máximo rendimiento cuando está cerca de su máxima capacidad térmica.\n\n--- STATS ---\nWeight: 375.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 150.0 (Energy)  |  DPS: 875.0\nAmmo: 75\nRegen: 3,000/s  |  Cooldown: 0.8s  |  Cost/Shot: 125\nVelocity: 1,440 m/s  |  Range: 2.2 km\nPower Draw: 1 PU/s\nComponent HP: 1,650\nSignatures:  EM: 334  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserRepeater_S5=Fabricante: Hurston Dynamics\nTipo de Artículo: Repetidor Láser\nTamaño: 5\n\nMás que un simple repetidor láser de tamaño cinco, el Attrition-5 de Hurston Dynamics cuenta con una avanzada tecnología en cascada que permite que el arma mejore significativamente su rendimiento cuanto más tiempo mantenga su salida de energía.\n\n--- STATS ---\nWeight: 938.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 150.0 (Energy)  |  DPS: 875.0\nAmmo: 75\nRegen: 10,914/s  |  Cooldown: 0.8s  |  Cost/Shot: 187\nVelocity: 1,390 m/s  |  Range: 3.2 km\nPower Draw: 1 PU/s\nComponent HP: 2,640\nSignatures:  EM: 390  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserRepeater_S6=Fabricante: Hurston Dynamics\nTipo de artículo: Repetidor Laser\nTamaño: 6\n\nCon la tecnología en cascada de Hurston Dynamics, el repetidor laser Attrition-6 maximiza su potencial de combate. Es común que las armas se calienten cuando se usan intensamente en combate, pero lo que diferencia a este repetidor de tamaño 6 es que la energía térmica se traduce directamente en una mayor fuerza ofensiva.\n\n--- STATS ---\nWeight: 2340.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 505.4 (Energy)  |  DPS: 2,947.9\nAmmo: 75\nRegen: 16,377/s  |  Cooldown: 0.8s  |  Cost/Shot: 281\nVelocity: 1,350 m/s  |  Range: 4.8 km\nPower Draw: 1 PU/s\nComponent HP: 4,224\nSignatures:  EM: 446  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserScattergun_S1=Fabricante: Hurston Dynamics\nTipo de Articulo: Cañón de dispersión láser\nTamaño: 1\n\nGracias a su integración de la tecnología de cascada láser de Hurston Dynamics, el cañón de dispersión Dominance-1 es capaz de infligir más daño cuanto más se acerque el arma de tamaño uno a su capacidad térmica máxima de seguridad.\n\n--- STATS ---\nWeight: 48.0 kg\nFire Rate: 50 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 504.0 x8 (Energy)  |  DPS: 420.0\nAmmo: 75\nRegen: 1,867/s  |  Cooldown: 0.3s  |  Cost/Shot: 70\nVelocity: 900 m/s  |  Range: 999 m\nPower Draw: 1 PU/s\nComponent HP: 1,550\nSignatures:  EM: 248  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserScattergun_S2=Fabricante: Hurston Dynamics\nTipo de artículo: Cañón de dispersión láser\nTamaño: 2\n\nCuanto más duro es el combate, más duro funciona el cañón de dispersión Dominance-2. A medida que aumentan sus niveles térmicos, el arma de tamaño 2 de Hurston Dynamics es capaz de utilizar la tecnología de cascada para convertir ese potencial térmico en un ataque cuerpo a cuerpo aún más mortífero.\n\n--- STATS ---\nWeight: 120.0 kg\nFire Rate: 50 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 792.0 x8 (Energy)  |  DPS: 660.0\nAmmo: 75\nRegen: 2,933/s  |  Cooldown: 0.3s  |  Cost/Shot: 110\nVelocity: 897 m/s  |  Range: 1.1 km\nPower Draw: 1 PU/s\nComponent HP: 1,550\nSignatures:  EM: 330  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserScattergun_S3=Fabricante: Hurston Dynamics\nTipo de artículo: Cañón de dispersión láser\nTamaño: 3\n\nEl cañón de dispersión Dominance-3 de Hurston Dynamics muestra la tecnología en cascada del fabricante de armas. A medida que el operador sigue disparando el arma de tamaño tres, más capaz es de convertir el calor generado en ataques cada vez más devastadores.\n\n--- STATS ---\nWeight: 300.0 kg\nFire Rate: 50 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 1,116.0 x8 (Energy)  |  DPS: 930.0\nAmmo: 75\nRegen: 4,133/s  |  Cooldown: 0.4s  |  Cost/Shot: 155\nVelocity: 888 m/s  |  Range: 1.2 km\nPower Draw: 1 PU/s\nComponent HP: 1,550\nSignatures:  EM: 413  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_Nova_BallisticCannon_S5=Fabricante: Hurston Dynamics\nTipo de Artículo: Cañón Balístico\nTamaño: 5\n\nDiseñado específicamente para el tanque Nova, el cañón balístico Slayer de Hurston Dynamics ganó su ilustre reputación a través de innumerables enfrentamientos en el campo de batalla durante la Segunda Guerra Tevarin. Esta bestia del campo de batalla destaca contra objetivos blindados y emplazamientos fortificados disparando proyectiles de artillería de gran calibre con una precisión y velocidad asombrosas. Hurston colaboró estrechamente con Tumbril cuando el fabricante de carros decidió recuperar el Nova. Aunque respetaron meticulosamente el diseño original del Slayer, Hurston tambien lo actualizo para el siglo 30 mejorando la velocidad de giro, la resistencia al calor y el software asociado para proporcionar una interfaz de usuario de artillero de ultima generacion.\n\n--- STATS ---\nWeight: 7500.0 kg\nFire Rate: 12 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 13,500.0 (Phys)  |  DPS: 2,700.0\nAmmo: 363\nVelocity: 973 m/s  |  Range: 6.0 km\nPower Draw: 0 PU/s\nComponent HP: 20,000\nSignatures:  EM: 50  |  IR: 0\nOverheat Temp: 450K
