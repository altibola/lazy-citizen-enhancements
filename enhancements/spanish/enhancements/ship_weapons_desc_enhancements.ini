item_DescASAD_DistortionRepeater_S1=Fabricante: Associated Science & Development\nTipo de artículo: Repetidor de distorsión\nTamaño: 1\n\nLa energía es la sangre vital de toda nave, y el DR Modelo-XJ1 de ASD es la elección ideal para desangrar a los hostiles. Este repetidor de distorsión de última generación te permite interrumpir la potencia de los objetivos, inutilizando las amenazas de forma eficaz.\n\n--- STATS ---\nWeight: 24.0 kg\nFire Rate: 400 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 25.7 (Distort)  |  DPS: 171.3\nAmmo: 75\nRegen: 750/s  |  Cooldown: 0.8s  |  Cost/Shot: 26\nVelocity: 1,350 m/s  |  Range: 1.2 km\nPower Draw: 0 PU/s\nComponent HP: 525\nSignatures:  EM: 167  |  IR: 0\nOverheat Temp: 450K
item_DescASAD_DistortionRepeater_S2=Fabricante: Associated Science & Development\nTipo de artículo: Repetidor de Distorsión\nTamaño: 2\n\nAvanzando en el campo de las armas de distorsión, el repetidor DR Modelo-XJ2 de ASD proporciona una disrupción táctica de energía que limitará severamente la capacidad operativa de cualquier nave objetivo.\n\n--- STATS ---\nWeight: 60.0 kg\nFire Rate: 400 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 38.5 (Distort)  |  DPS: 256.7\nAmmo: 75\nRegen: 1,123/s  |  Cooldown: 0.8s  |  Cost/Shot: 38\nVelocity: 1,346 m/s  |  Range: 1.3 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 223  |  IR: 0\nOverheat Temp: 450K
item_DescASAD_DistortionRepeater_S3=Fabricante: Associated Science & Development\nTipo de artículo: Repetidor de distorsión\nTamaño: 3\n\nApague las acciones hostiles y las fuentes de alimentación de los objetivos con el DR Modelo-XJ3, un repetidor de distorsión de gran alcance desarrollado por los laboratorios de investigación de armas avanzadas de ASD.\n\n--- STATS ---\nWeight: 150.0 kg\nFire Rate: 400 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 57.9 (Energy: 0.0 / Distort: 57.9)  |  DPS: 386.0\nAmmo: 75\nRegen: 1,689/s  |  Cooldown: 0.8s  |  Cost/Shot: 58\nVelocity: 1,332 m/s  |  Range: 1.4 km\nPower Draw: 1 PU/s\nComponent HP: 1,024\nSignatures:  EM: 278  |  IR: 0\nOverheat Temp: 450K
item_DescBANU_TachyonCannon_S1=Fabricante: Banu\nTipo de artículo: Cañón de taquiones\nTamaño: 1\n\nPopularizado por un souli banu, el cañón de taquiones Singe inflige un daño energético devastador a grandes distancias. Aunque tarda en dispararse, el veloz proyectil de taquiones alcanza a los objetivos casi instantáneamente, lo que convierte al Singe en la elección favorita de las naves de seguridad banu. Aunque los banu han olvidado hace tiempo el origen de esta arma de alta tecnología, varias opciones de diseño únicas han llevado a los estudiosos a sospechar que los banu podrían haberse apropiado de la tecnología en su cultura, en lugar de inventarla ellos mismos.\n\n--- STATS ---\nWeight: 192.0 kg\nFire Rate: 90 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 202.5 (Energy)  |  DPS: 303.8\nAmmo: 25\nRegen: 1,500/s  |  Cooldown: 1.6s  |  Cost/Shot: 300\nVelocity: 1,050 m/s  |  Range: 3.0 km\nPower Draw: 1 PU/s\nComponent HP: 550\nSignatures:  EM: 594  |  IR: 0\nOverheat Temp: 450K
