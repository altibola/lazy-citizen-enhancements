item_Mining_MiningLaser_Drake_Default_S0_Desc=item_Mining_MiningLaser_Drake_Default_S0\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,150  |  Range: 40m→45m\n<EM4>Extraction:</EM4>  DPS: 1,295  |  Range: 40m→45m\n<EM4>Modifiers:</EM4>  Instability: +35%  |  Optimal Charge Window: +40%  |  Resistance: +25%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Greycat_1_S1_Desc=Fabricante: Greycat Industrial\nTipo de artículo: Láser de Minería \nTamaño: 1\n\nAlcance Óptimo: 30m\nAlcance Máximo: 90m\n\nPotencia Láser Minero: 504 - 2520\nPotencia Láser Extracción: 1850\n\nRanuras Módulo: 1\n\nInestabilidad Láser: -10%\nTasa Óptima Ventana de Carga: +40%\nMateriales inertes: -30%\n\nTamaño óptimo de la ventana de carga: -60%\n\nGreycat clasifica el Lancet MH1 como un láser de apoyo que se utiliza mejor cuando se mina con otros. Mientras que el pequeño tamaño de la ventana de carga óptima del láser de minería significa que la precisión es clave, el Lancet MH1 destaca en la reducción de la cantidad de materiales inertes recogidos por el láser de extracción. Para las cuadrillas de mineros, es un láser de apoyo ideal para utilizar junto a otros láseres.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 2,520  |  Range: 30m→90m\n<EM4>Extraction:</EM4>  DPS: 1,850  |  Range: 30m→90m\n<EM4>Modifiers:</EM4>  Instability: -10%  |  Optimal Charge Window: -60%  |  Inert Filter: +30%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Greycat_1_S2_Desc=Fabricante: Greycat Industrial\nTipo de artículo: Láser Minero \nTamaño: 2\n\nAlcance Óptimo: 45m\nAlcance Máximo: 135m\n\nPotencia Láser Minero: 900 - 3600\nPotencia Láser Extracción: 2590\n\nRanuras Módulo: 2\n\nInestabilidad Láser: -10%\nTasa Óptima Ventana de Carga: +40%\nMateriales inertes: -40%\n\nTamaño óptimo de la ventana de carga: -60%\n\nGreycat clasifica el Lancet MH2 como un láser de apoyo que se utiliza mejor cuando se mina con otros. Mientras que el pequeño tamaño de la ventana de carga óptima del láser minero implica que la precisión es clave, el Lancet MH2 destaca a la hora de rellenarla una vez encontrada y de reducir la cantidad de materiales inertes recogidos por el láser de extracción. Para las cuadrillas de mineros, es un láser de apoyo ideal para utilizar junto a otros láseres.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,600  |  Range: 45m→135m\n<EM4>Extraction:</EM4>  DPS: 2,590  |  Range: 45m→135m\n<EM4>Modifiers:</EM4>  Instability: -10%  |  Optimal Charge Window: -60%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Greycat_Default_S0_Desc=Fabricante: Greycat Industrial\nTipo de artículo: Láser Minero \nTamaño: 0\n\nAlcance Óptimo: 15m\nAlcance máximo: 20m\nRendimiento de recogida: 0.01 SCU/s\nRadio del punto de recogida: 1m\n\nEl Arbor se ha convertido en el láser minero más anunciado del universo gracias a los exigentes estándares y a la destreza empresarial de Greycat Industrial. El MHV toma el mismo diseño clásico y lo reimagina para un equipo de minería más compacto sin dejar de ofrecer el rendimiento sólido y fiable en el que confían los mineros.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 1  |  Range: 5m→15m\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Greycat_Default_S1_Desc=Fabricante: Greycat Industrial\nTipo de artículo: Láser Minero \nTamaño: 1\n\nAlcance Óptimo: 60m\nAlcance Máximo: 180m\n\nPotencia Láser Minero: 189 - 1890\nPotencia Láser Extracción: 1850\n\nRanuras Módulo: 1\n\nInestabilidad Láser: -35%\nTamaño Ventana Carga Óptima: +40%\nMateriales inertes: -30%\n\nResistencia: +25%\n\nEl Arbor MH1 se convirtió en el láser minero más anunciado del universo gracias a los exigentes estándares y la destreza comercial de Greycat Industrial. El láser gozó del favor de las operaciones industriales y en solitario por su equilibrio entre velocidad y seguridad, a la vez que incorporaba un sistema de filtración especial que reduce la cantidad de material inerte recogido. Greycat aprovechó esta reputación para conseguir contratos exclusivos que convirtieron al Arbor MH1 en el cabezal láser estándar de la mayoría de las naves mineras.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 1,890  |  Range: 60m→180m\n<EM4>Extraction:</EM4>  DPS: 1,850  |  Range: 60m→180m\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Greycat_Default_S2_Desc=Fabricante: Greycat Industrial\nTipo de artículo: Láser de minería \nTamaño: 2\n\nAlcance óptimo: 90m\nAlcance máximo: 270m\n\nPotencia del láser de minería: 480 - 2400\nPotencia del láser de extracción: 2590\n\nRanuras para módulos: 2\n\nInestabilidad del láser: -35%\nTamaño óptimo de la ventana de carga: +40%\nMateriales inertes: -40%\n\nResistencia: +25%\n\nEl Arbor MH2 es la versión de tamaño dos de la anunciada serie de láseres mineros Arbor de Greycat. Al igual que la variante más pequeña, el diseño sólido y fiable del Arbor MH2 se ha ganado el favor de las operaciones industriales y en solitario por su equilibrio entre velocidad y seguridad, a la vez que incorpora un sistema de filtración especial que reduce la cantidad de material inerte recogido.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 2,400  |  Range: 90m→270m\n<EM4>Extraction:</EM4>  DPS: 2,590  |  Range: 90m→270m\n<EM4>Modifiers:</EM4>  Instability: -35%  |  Optimal Charge Window: +40%  |  Resistance: +25%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Shubin_1_S1_Desc=Fabricante: Shubin Interstellar\nTipo de Objeto: Láser minero \nTamaño: 1\n\nAlcance óptimo: 45m\nAlcance Máximo: 135m\n\nPotencia Láser Minero: 105 - 2100\nPotencia Láser Extracción: 1295\n\nRanuras Módulo: 1\n\nResistencia: -30%\nTasa Óptima Ventana de Carga: +20%\nMateriales inertes: -30%\n\nInestabilidad Láser: +10%\n\nEl Hofstede-S1 se diseñó con una estructura de rejilla cristalina patentada que amortigua la resistencia natural de un yacimiento mientras se extrae y recoge menos materiales inertes al extraer. Más eficaz a corto y medio alcance, el aumento de inestabilidad que conlleva significa que el láser debe manejarse con cuidado.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 2,100  |  Range: 45m→135m\n<EM4>Extraction:</EM4>  DPS: 1,295  |  Range: 45m→135m\n<EM4>Modifiers:</EM4>  Instability: +10%  |  Optimal Charge Window: +60%  |  Resistance: -30%  |  Inert Filter: +30%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Shubin_1_S2_Desc=Fabricante: Shubin Interstellar\nTipo de Objeto: Láser minero \nTamaño: 2\n\nAlcance óptimo: 60m\nAlcance Máximo: 180m\n\nPotencia Láser Minero: 336 - 3360\nPotencia Láser Extracción: 1295\n\nRanuras Módulo: 2\n\nResistencia: -30%\nTasa Óptima Ventana de Carga: +20%\nMateriales inertes: -40%\n\nInestabilidad Láser: +10%\n\nEl Hofstede-S2 se diseñó con una estructura de rejilla cristalina patentada que amortigua la resistencia natural de un yacimiento mientras se extrae y recoge menos materiales inertes al extraer. Más eficaz a corto y medio alcance, el aumento de inestabilidad que conlleva significa que el láser debe manejarse con cuidado.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,360  |  Range: 60m→180m\n<EM4>Extraction:</EM4>  DPS: 1,295  |  Range: 60m→180m\n<EM4>Modifiers:</EM4>  Instability: +10%  |  Optimal Charge Window: +60%  |  Resistance: -30%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Shubin_2_S1_Desc=Fabricante: Shubin Interstellar\nTipo de Objeto: Láser minero \nTamaño: 1\n\nAlcance óptimo: 45m\nAlcance Máximo: 135m\n\nPotencia Láser Minero: 378 - 2220\nPotencia Láser Extracción: 2220\n\nRanuras Módulo: 0\n\nResistencia: -45%\nTamaño Ventana Carga Óptima: +20%\nMateriales inertes: -30%\n\nInestabilidad Láser: +35%\n\nShubin diseñó el Klein-S1 para generar un potente láser que agiliza la minería. Esta potencia conlleva un riesgo adicional al aumentar la inestabilidad del láser, pero si se utiliza correctamente, el Klein-S1 puede cosechar recompensas rápidamente para el minero cuidadoso.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 2,520  |  Range: 45m→135m\n<EM4>Extraction:</EM4>  DPS: 2,220  |  Range: 45m→135m\n<EM4>Modifiers:</EM4>  Instability: +35%  |  Optimal Charge Window: +20%  |  Resistance: -45%  |  Inert Filter: +30%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Shubin_2_S2_Desc=Fabricante: Shubin Interstellar\nTipo de Objeto: Láser minero \nTamaño: 2\n\nAlcance óptimo: 60m\nAlcance Máximo: 180m\n\nPotencia del láser minero: 720 - 3600\nPotencia del láser de extracción: 2775\n\nRanuras para módulos: 1\n\nResistencia: -45%\nTamaño óptimo de la ventana de carga: +20%\nMateriales inertes: -40%\n\nInestabilidad Láser: +35%\n\nShubin diseñó el Klein-S2 para generar un potente láser que agiliza la minería. Esta potencia conlleva un riesgo adicional al aumentar la inestabilidad del láser, pero si se utiliza correctamente, el Klein-S2 puede cosechar recompensas rápidamente para el minero cuidadoso.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,600  |  Range: 60m→180m\n<EM4>Extraction:</EM4>  DPS: 2,775  |  Range: 60m→180m\n<EM4>Modifiers:</EM4>  Instability: +35%  |  Optimal Charge Window: +20%  |  Resistance: -45%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Thermyte_1_S1_Desc=Fabricante: Thermyte Concern\nTipo de artículo: Láser de minería \nTamaño: 1\n\nAlcance óptimo: 45m\nAlcance Máximo: 135m\n\nPotencia Láser Minero: 420 - 2100\nPotencia Láser Extracción: 2775\n\nRanuras Módulo: 2\n\nInestabilidad Láser: -10%\nTamaño Ventana Carga Óptima: +20%\nMateriales inertes: -30%\n\nResistencia: +10%\nTasa de Ventana de Carga Óptima: -40%\n\n\nEl Impact I destaca en diversas situaciones de minería. Las lentes de enfoque especiales facilitan el trabajo en un yacimiento al estabilizar el láser y aumentar la ventana de carga óptima. Hay desventajas, incluyendo el aumento de la resistencia del depósito y una ventana de carga óptima de llenado más lento, pero Thermyte Concern también proporcionó dos ranuras de módulos para permitir a los mineros personalizar mejor el láser para la tarea en cuestión.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 2,100  |  Range: 45m→135m\n<EM4>Extraction:</EM4>  DPS: 2,775  |  Range: 45m→135m\n<EM4>Modifiers:</EM4>  Instability: -10%  |  Optimal Charge Window: +20%  |  Resistance: +10%  |  Inert Filter: +30%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Thermyte_1_S2_Desc=Fabricante: Thermyte Concern\nTipo de artículo: Láser de minería \nTamaño: 2\n\nAlcance óptimo: 60m\nAlcance Máximo: 180m\n\nPotencia Láser Minero: 840 - 3360\nPotencia Láser Extracción: 3145\n\nRanuras Módulo: 3\n\nInestabilidad del láser: -10%\nTamaño óptimo de la ventana de carga: +20%\nMateriales inertes: -40%\n\nResistencia: +10%\nVelocidad óptima de la ventana de carga: -40%\n\nEl Impact II destaca en diversas situaciones de minería. Las lentes de enfoque especiales facilitan el trabajo en un yacimiento al estabilizar el láser y aumentar la ventana de carga óptima. Hay desventajas, incluyendo el aumento de la resistencia del depósito y una ventana de carga óptima de llenado más lento, pero Thermyte Concern también proporcionó tres ranuras de módulos para permitir a los mineros personalizar mejor el láser para la tarea en cuestión.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,360  |  Range: 60m→180m\n<EM4>Extraction:</EM4>  DPS: 3,145  |  Range: 60m→180m\n<EM4>Modifiers:</EM4>  Instability: -10%  |  Optimal Charge Window: +20%  |  Resistance: +10%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Thermyte_2_S1_Desc=Fabricante: Thermyte Concern\nTipo de artículo: Láser de minería \nTamaño: 1\n\nAlcance óptimo: 15m\nAlcance Máximo: 45m\n\nPotencia Láser Minero: 630 - 3150\nPotencia Láser Extracción: 1850\n\nRanuras Módulo: 2\n\nResistencia: -30%\nMateriales Inertes: -30%\n\nTamaño óptimo de la ventana de carga: -40%\n\nPara algunos, el uso eficaz del Helix I se ha convertido en signo de un verdadero profesional de la minería. Thermyte Concern dotó al láser de una potencia impresionante que puede sortear la resistencia de un yacimiento, pero también requiere un manejo preciso para alcanzar la ventana de carga óptima. El Helix I, que se despliega mejor a corta distancia, cuenta con dos ranuras para módulos, de modo que los mineros pueden adaptar el láser a su gusto.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,150  |  Range: 15m→45m\n<EM4>Extraction:</EM4>  DPS: 1,850  |  Range: 15m→45m\n<EM4>Modifiers:</EM4>  Optimal Charge Window: -40%  |  Resistance: -30%  |  Inert Filter: +30%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Thermyte_2_S2_Desc=Fabricante: Thermyte Concern\nTipo de artículo: Láser de minería\nTamaño: 2\n\nRango óptimo: 30 m\nRango máximo: 90 m\n\nPotencia del láser de minería: 1020 - 4080\nPotencia del láser de extracción: 2590\n\nRanuras para módulos: 3\ n\nResistencia: -30%\nNivel de material inerte: -40%\n\nTamaño de ventana de carga óptima: -40%\n\nPara algunos, el uso eficaz de Helix II se ha convertido en una señal de un verdadero profesional de la minería. Thermyte Concern le dio al láser una potencia impresionante que puede superar la resistencia de un depósito pero también requiere un manejo preciso para alcanzar la ventana de carga óptima. Helix II, que se implementa mejor a corta distancia, cuenta con tres ranuras para módulos para que los mineros puedan adaptar el láser a su gusto.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 4,080  |  Range: 30m→90m\n<EM4>Extraction:</EM4>  DPS: 2,590  |  Range: 30m→90m\n<EM4>Modifiers:</EM4>  Optimal Charge Window: -40%  |  Resistance: -30%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
