item_DescBEHR_LaserCannon_S5=Fabricante: Behring\nTipo de artículo: Cañón Láser\nTamaño: 5\n\nEste versátil auto cañón de energía de larga distancia es lo último de la Serie M de Behring. El M7A está diseñado para actuar como disuasor de alto impacto efectivo a media y larga distancia. El nuevo sistema de lentes AC8 minimiza la pérdida de potencia de parada con la distancia, haciendo que cada disparo sea igual de efectivo a distancias más largas.\n\n--- STATS ---\nWeight: 5630.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 921.8 (Energy)  |  DPS: 1,536.3\nAmmo: 25\nRegen: 9,483/s  |  Cooldown: 1.5s  |  Cost/Shot: 569\nVelocity: 1,112 m/s  |  Range: 4.0 km\nPower Draw: 2 PU/s\nComponent HP: 2,500\nSignatures:  EM: 941  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_LaserCannon_S6=Fabricante: Behring\nTipo de artículo: Cañón Láser\nTamaño: 6\n\nEl auto cañón láser M8A ejemplifica el extenso historial de Behring en el diseño y construcción de armamento naval. El resultado es un arma de energía fiable y eficaz, capaz de enfrentarse a grandes escaramuzas o a precisas maniobras defensivas.\n\n--- STATS ---\nWeight: 14100.0 kg\nFire Rate: 120 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 900.0 (Energy)  |  DPS: 1,800.0\nAmmo: 25\nRegen: 14,292/s  |  Cooldown: 1.5s  |  Cost/Shot: 854\nVelocity: 1,080 m/s  |  Range: 6.0 km\nPower Draw: 2 PU/s\nComponent HP: 4,224\nSignatures:  EM: 1,090  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_LaserCannon_S7=Fabricante: Behring\nTipo de artículo: Cañón láser\nTamaño: 7\n\nGolpea el corazón de tus enemigos con el devastador impacto del cañón automático de energía M9A de Behring. Cuando está completamente cargada, la enorme potencia de frenado de esta arma láser tiene el potencial de detener incluso a las naves capitales en seco.\n\n--- STATS ---\nWeight: 6870000.0 kg\nFire Rate: 10 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 200,000.0 (Phys)  |  DPS: 33,333.3\nAmmo: 21\nVelocity: 924 m/s  |  Range: 12.0 km\nPower Draw: 6 PU/s\nComponent HP: 708,660\nSignatures:  EM: 3,020  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_LaserCannon_SF7E_S7=Fabricante: Behring\nTipo de artículo: Cañón láser\nTamaño: 7\n\nLos ingenieros de Behring y Crusader colaboraron para hacer del cañón láser SF7E el arma ideal para el Ares Ion Star Fighter. Un armazón a medida permite que la enorme arma se integre perfectamente en el cuerpo de la nave. Ideal para enfrentamientos a larga distancia con naves espaciales grandes y de clase capital, la impresionante precisión del SF7E y su elevado daño por disparo lo convierten en un arma devastadora en manos de un tirador experto.\n\n--- STATS ---\nWeight: 35200.0 kg\nFire Rate: 55 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 5,150.0 (Energy)  |  DPS: 4,720.8\nAmmo: 25\nRegen: 21,355/s  |  Cooldown: 1.9s  |  Cost/Shot: 1,200\nVelocity: 1,048 m/s  |  Range: 7.3 km\nPower Draw: 3 PU/s\nComponent HP: 6,750\nSignatures:  EM: 1,450  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_LaserCannon_VNG_S2=Fabricante: Behring\nTipo de artículo: Cañón láser\nTamaño: 2\n\nEl clásico M4A ha sido especialmente retocado por Behring para crear el VS (Vanguard Special), un arma láser diseñada para satisfacer los requisitos exclusivos del Aegis. El arma montada por defecto en el morro del Vanguard Warden, el VS sólo puede cargarse en otras variantes del Vanguard.\n\n--- STATS ---\nWeight: 360.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 273.0 (Energy)  |  DPS: 455.0\nAmmo: 25\nRegen: 2,808/s  |  Cooldown: 1.5s  |  Cost/Shot: 168\nVelocity: 1,196 m/s  |  Range: 2.2 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 708  |  IR: 0\nOverheat Temp: 450K
