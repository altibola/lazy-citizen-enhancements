item_Descksar_shotgun_energy_01=Fabricante: Kastak Arms\nTipo de Item: Espingarda\nClasse: Energia (Plasma)\n\nTamanho da Bateria: 12\nCadência de Tiro: 60 rpm\nAlcance Efetivo: 20 m\n\nAcessórios: Mira (S1), Cano (S3 ), Underflow (S2)\n\nA Devastator da Kastak Arms é uma espingarda de plasma capaz de disparar rajadas de plasma sustentadas, de médio alcance e alta penetração para combate corpo a corpo, limpeza e outras operações de combate. Quando a situação exige alto poder de impacto, a Devastator é a escolha certa.\n\n--- STATS ---\nWeight: 5.0 kg\nFire Rate: 60 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 120.0 x12 (Energy)  |  DPS: 120.0\nAmmo: 12\nVelocity: 300 m/s  |  Absolute Range: 600 m\nFull Dmg to: 14 m  |  Drop: -0.10/m  |  Min Dmg: 5.5
item_Descksar_shotgun_energy_01_black_purple01=Fabricante: Kastak Arms\nTipo de Item: Espingarda\nClasse: Energia (Plasma)\n\nTamanho da Bateria: 12\nCadência de Tiro: 60 rpm\nAlcance Efetivo: 20 m\n\nEsta espingarda elétrica semiautomática da Kastak Arms proporciona rajadas de plasma de alto impacto, ideais para combate próximo. A edição Voyager aprimora o visual com um acabamento metálico xadrez com reflexos azuis. Uma combinação ultrajante de preto, ciano e roxo torna a edição “Rager” ainda mais divertida.\n\n--- STATS ---\nWeight: 5.0 kg\nFire Rate: 60 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 120.0 x12 (Energy)  |  DPS: 120.0\nAmmo: 12\nVelocity: 300 m/s  |  Absolute Range: 600 m\nFull Dmg to: 14 m  |  Drop: -0.10/m  |  Min Dmg: 5.5
