item_Desclbco_sniper_energy_01=Fabricante: Lightning Bolt Co. \nTipo de Item: Rifle de Precisão\nClasse: Eletrônico\n\nCapacidade do Carregador: 5\nCadência de Tiro: 30 rpm\nAlcance Efetivo: 150m+\n\nAcessórios: Mira (S3), Acessório Inferior (S2)\n\nO Atzkav é um rifle de precisão exclusivo da Lightning Bolt Co. Depois que a alça de carregamento é ativada, ele dispara com precisão um elétron carregado, causando dano de energia significativo que se propaga para alvos condutores próximos. Este efeito especial de pulso também deixa uma carga residual na área atingida, aumentando o dano dos disparos de elétrons subsequentes. Além das características especiais de tiro do rifle, o Atzkav é mais conhecido por seu cano distinto, que estala com energia no próximo tiro.\n\n--- STATS ---\nWeight: 9.1 kg\nFire Rate: 30 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 165.0 (Energy: 120.0 / Distort: 35.0 / Stun: 10.0)  |  DPS: 82.5\nAmmo: 8\nVelocity: 500 m/s  |  Absolute Range: 1.0 km\nFull Dmg to: 350 m  |  Drop: -0.01/m  |  Min Dmg: 30.0
