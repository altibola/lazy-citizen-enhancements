item_Descgmni_rifle_ballistic_01_mr01=Fabricante: Gemini\nTipo de Item: Rifle de Assalto\nClasse: Balística\n\nTamanho do Carregador: 30\nCadência de Tiro: 300 rpm / 900 rpm\nAlcance Efetivo: 50 m\n\nAcessórios: Mira (S2), Cano (S2), Cano Inferior (S2)\n\nCom a S71, a Gemini projetou um rifle de assalto ergonômico ideal para combates de médio alcance. Utilizando um projétil de calibre menor do que outras armas de sua classe, a S71 tornou-se popular entre profissionais militares privados por sua estética elegante e precisão rigorosa. \n\nA edição Purgatory Camo ostenta um perfil monocromático estiloso.\n\n--- STATS ---\nWeight: 2.5 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 21.5 (Phys)  |  DPS: 179.2\nAmmo: 30\nVelocity: 1,200 m/s  |  Absolute Range: 2.4 km\nFull Dmg to: 100 m  |  Drop: -0.10/m  |  Min Dmg: 17.5
item_Descgmni_shotgun_ballistic_01=Fabricante: Gemini\nTipo de Item: Espingarda\nClasse: Balística\n\nTamanho do Carregador: 18\nCadência de Tiro: 120 rpm / 60 rpm\nAlcance Efetivo: 15 m / 35 m\n\nAcessórios: Mira (S1), Cano (N/A), Acessório Inferior (S2)\n\nO R97 combina design fino e poder de penetração para criar uma arma de combate corpo a corpo elegante e eficaz. Esta espingarda balística Gemini apresenta dois modos de tiro diferentes - um modo semiautomático de ampla distribuição que é ideal para danos rápidos e um modo focado que oferece maior alcance às custas de algum desempenho. Esta flexibilidade de combate tornou o R97 uma arma de defesa pessoal popular em todo o Império.\n\n--- STATS ---\nWeight: 2.4 kg\nFire Rate: 455 RPM\nFire Modes: Shotgun / Semi-Auto\nAlpha Dmg: 32.0 x8 (Phys)  |  DPS: 242.7\nAmmo: 18\nVelocity: 225 m/s  |  Absolute Range: 450 m\nFull Dmg to: 12 m  |  Drop: -0.05/m  |  Min Dmg: 1.2
item_Descgmni_shotgun_ballistic_01_firerats01=Fabricante: Gemini\nTipo de Item: Espingarda\nClasse: Balística\n\nTamanho do Carregador: 18\nCadência de Tiro: 120 rpm / 60 rpm\nAlcance Efetivo: 15 m / 35 m\n\nAcessórios: Mira (S1), Cano (N/A), Acessório Inferior (S2)\n\nA R97 combina design elegante e poder de parada para uma arma elegante e eficaz para uso em ambientes fechados. Essa espingarda balística da Gemini apresenta dois modos de disparo distintos: um modo semiautomático de amplo alcance, ideal para causar danos rápidos, e um modo focado que oferece maior alcance à custa de alguma potência. Essa flexibilidade de combate tornou a R97 uma arma de defesa pessoal popular em todo o Império. A edição Scorched apresenta uma pátina de chama exclusiva.\n\n--- STATS ---\nWeight: 2.4 kg\nFire Rate: 455 RPM\nFire Modes: Shotgun / Semi-Auto\nAlpha Dmg: 32.0 x8 (Phys)  |  DPS: 242.7\nAmmo: 18\nVelocity: 225 m/s  |  Absolute Range: 450 m\nFull Dmg to: 12 m  |  Drop: -0.05/m  |  Min Dmg: 1.2
item_Descgmni_shotgun_ballistic_01_pink_red01=Fabricante: Gemini\nTipo de Item: Espingarda\nClasse: Balística\n\nTamanho do Carregador: 18\nCadência de Tiro: 120 rpm / 60 rpm\nAlcance Efetivo: 15 m / 35 m\n\nAcessórios: Mira (S1), Cano (N/A), Acessório Inferior (S2)\n\nA R97 combina um design elegante e poder de travagem para uma arma elegante e eficaz para uso próximo. Esta espingarda balística da Gemini possui dois modos de disparo distintos - um modo semi-automático de grande alcance ideal para causar danos rápidos e um modo focado que oferece maior alcance à custa de alguma potência. Esta flexibilidade de combate tornou a R97 numa arma de defesa pessoal popular em todo o Império. Protege-te a ti e à tua cara-metade com a edição especial Kismet da R97, que apresenta uma cor rosa e preta que faz lembrar a nave que Yuri Ilyin pilotou para encontrar a sua amada perdida, Corazon Tan, no clássico vídeo Coramor.\n\n--- STATS ---\nWeight: 2.4 kg\nFire Rate: 455 RPM\nFire Modes: Shotgun / Semi-Auto\nAlpha Dmg: 32.0 x8 (Phys)  |  DPS: 242.7\nAmmo: 18\nVelocity: 225 m/s  |  Absolute Range: 450 m\nFull Dmg to: 12 m  |  Drop: -0.05/m  |  Min Dmg: 1.2
item_Descgmni_shotgun_ballistic_01_red_black01=Fabricante: Gemini\nTipo de Item: Espingarda\nClasse: Balística\n\nTamanho do Carregador: 18\nCadência de Tiro: 120 rpm / 60 rpm\nAlcance Efetivo: 15 m / 35 m\n\nAcessórios: Mira (S1), Cano (N/A), Acessório Inferior (S2)\n\nA R97 combina design elegante e poder de parada para uma arma elegante e eficaz para uso em ambientes fechados. Essa espingarda balística da Gemini apresenta dois modos de disparo distintos: um modo semiautomático de amplo alcance, ideal para causar danos rápidos, e um modo focado que oferece maior alcance à custa de alguma potência. Essa flexibilidade de combate tornou a R97 uma arma de defesa pessoal popular em todo o Império. A edição “Righteous” apresenta uma pintura vermelha arrojada, perfeita para mostrar sua dedicação à luta.\n\n--- STATS ---\nWeight: 2.4 kg\nFire Rate: 455 RPM\nFire Modes: Shotgun / Semi-Auto\nAlpha Dmg: 32.0 x8 (Phys)  |  DPS: 242.7\nAmmo: 18\nVelocity: 225 m/s  |  Absolute Range: 450 m\nFull Dmg to: 12 m  |  Drop: -0.05/m  |  Min Dmg: 1.2
item_Descgmni_shotgun_ballistic_01_reward01=Fabricante: Gemini\nTipo de Item: Espingarda\nClasse: Balística\n\nTamanho do Carregador: 18\nCadência de Tiro: 120 rpm / 60 rpm\nAlcance Efetivo: 15 m / 35 m\n\nAcessórios: Ópticos (S1), Cano (N/A), Cano Inferior (S2)\n\nA R97 combina um design elegante e poder de parada para uma arma de curto alcance refinada e eficaz. Esta escopeta balística da Gemini apresenta dois modos de disparo distintos — um modo semiautomático de dispersão ampla, ideal para causar dano rápido, e um modo focado que oferece maior alcance às custas de um pouco de potência. Esta flexibilidade em combate tornou a R97 uma arma de defesa pessoal popular em todo o Império. \n\nEsta edição apresenta um padrão ousado de camuflagem digital vermelha.\n\n--- STATS ---\nWeight: 2.4 kg\nFire Rate: 455 RPM\nFire Modes: Shotgun / Semi-Auto\nAlpha Dmg: 32.0 x8 (Phys)  |  DPS: 242.7\nAmmo: 18\nVelocity: 225 m/s  |  Absolute Range: 450 m\nFull Dmg to: 12 m  |  Drop: -0.05/m  |  Min Dmg: 1.2
item_Descgmni_smg_ballistic_01_Luminalia=Fabricante: Gemini\nTipo de Item: SMG\nClasse: Balístico\n\nTamanho do Carregador: 50\nCadência de Tiro: 1.100 rpm\nAlcance Efetivo: 35m\n\nAcessórios: Cano (S1),Mira (S1), Acessório Inferior (S1)\n\nO C54 é um SMG elegante e precisamente balanceado da Gemini, fácil de manusear e bonito de se ver. A estrutura leve de polímero e o design ergonômico o tornam ideal para uso em combate corpo a corpo. O C54 é capaz de disparar cartuchos de 10 mm em modo totalmente automático para fornecer suporte máximo e saturação do alvo, garantindo que cada combate termine rapidamente. A edição Luminalia apresenta um design festivo em vermelho e verde.\n\n--- STATS ---\nWeight: 2.0 kg\nFire Rate: 925 RPM\nFire Modes: Auto\nAlpha Dmg: 11.5 (Phys)  |  DPS: 177.3\nAmmo: 50\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 15 m  |  Drop: -0.20/m  |  Min Dmg: 7.5
item_Descgmni_smg_ballistic_01_blue_white01=Fabricante: Gemini\nTipo de Item: SMG\nClasse: Balístico\n\nTamanho do Carregador: 50\nCadência de Tiro: 1.100 rpm\nAlcance Efetivo: 35 m\n\nAcessórios: Cano (S1), Mira (S1), Acessório Inferior (S1)\n\nFácil de manusear e bonita de se ver, a C54 é uma SMG elegante e precisamente equilibrada da Gemini. Sua estrutura de polímero leve e seu design ergonômico a tornam ideal para combates a curta distância. A C54 é capaz de disparar cartuchos de 10 mm em modo totalmente automático para proporcionar a máxima saturação do alvo e garantir que qualquer combate termine rapidamente. Criada para homenagear a equipe Origin Racing, essa SMG é basicamente branca com detalhes em preto e azul.\n\n--- STATS ---\nWeight: 2.0 kg\nFire Rate: 925 RPM\nFire Modes: Auto\nAlpha Dmg: 11.5 (Phys)  |  DPS: 177.3\nAmmo: 50\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 15 m  |  Drop: -0.20/m  |  Min Dmg: 7.5
