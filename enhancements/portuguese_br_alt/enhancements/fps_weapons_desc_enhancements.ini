item_Descvolt_lmg_energy_01=Fabricante: Verified Offworld Laser Technologies\nTipo de Item: LMG\nClasse: Energia (Elétron)\n\nTamanho da Bateria: 165\nCadência de Tiro: 550 rpm - 220 rpm\nAlcance Eficaz: 50 m\n\nAcessórios: Mira (S3), Acessório Inferior (S3)\n\nOs engenheiros da VOLT criaram a LMG Fresnel para levar uma poderosa arma de energia para a linha de frente, capaz de iniciar um combate com uma rajada rápida de disparos letais. À medida que a arma aquece, os disparos se tornam mais lentos e poderosos, mas cuidado com o superaquecimento. Uma arma desta magnitude exige uma base sólida; os operadores são incentivados a atirar em posição agachada para melhor controle do recuo.\n\n--- STATS ---\nWeight: 6.0 kg\nFire Rate: 550 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 9.0 (Energy)  |  DPS: 82.5\nAmmo: 165\nVelocity: 1,100 m/s  |  Absolute Range: 4.4 km
item_Descvolt_lmg_energy_01_collector01=Fabricante: Verified Offworld Laser Technologies\nTipo de Item: LMG\nClasse: Energia (Elétron)\n\nTamanho da Bateria: 165\nCadência de Tiro: 550 rpm - 220 rpm\nAlcance Eficaz: 50 m\n\nAcessórios: Mira (S3), Acessório Inferior (S3)\n\nOs engenheiros da VOLT criaram a LMG Fresnel para levar uma poderosa arma de energia para a linha de frente, capaz de iniciar um combate com uma rajada rápida de disparos letais. À medida que a arma aquece, os disparos se tornam mais lentos e poderosos, mas cuidado com o superaquecimento. Uma arma desta magnitude exige uma base sólida; os operadores são incentivados a atirar em posição agachada para melhor controle do recuo.\n\nA edição Deepwater combina um azul desgastado com detalhes em preto profundo.\n\n--- STATS ---\nWeight: 6.0 kg\nFire Rate: 550 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 9.0 (Energy)  |  DPS: 82.5\nAmmo: 165\nVelocity: 1,100 m/s  |  Absolute Range: 4.4 km
item_Descvolt_lmg_energy_01_collector02=Fabricante: Verified Offworld Laser Technologies\nTipo de Item: LMG\nClasse: Energia (Elétron)\n\nTamanho da Bateria: 165\nCadência de Tiro: 550 rpm - 220 rpm\nAlcance Efetivo: 50m\n\nAcessórios: Mira (S3), Acessório Inferior (S3)\n\nOs engenheiros da VOLT criaram a LMG Fresnel para trazer uma arma de energia poderosa para as linhas de frente, uma que possa iniciar um combate com uma rajada rápida de explosões letais. À medida que a arma aquece, os disparos se tornam mais lentos e mais potentes, mas tome cuidado com o superaquecimento. Uma arma desta magnitude exige uma base forte; os operadores são encorajados a disparar de uma posição agachada para permitir um melhor gerenciamento do recuo.\n\nA edição Yormandi é verde manchada com um gráfico do réptil feroz ao lado.\n\n--- STATS ---\nWeight: 6.0 kg\nFire Rate: 550 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 9.0 (Energy)  |  DPS: 82.5\nAmmo: 165\nVelocity: 1,100 m/s  |  Absolute Range: 4.4 km
