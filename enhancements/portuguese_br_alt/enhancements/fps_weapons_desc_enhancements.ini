item_DescGMNI_rifle_ballistic_01=Fabricante: Gemini\nTipo de Item: Rifle de Assalto\nClasse: Balístico\n\nTamanho do Carregador: 30\nCadência de Tiro: 300 rpm / 900 rpm\nAlcance Efetivo: 50 m\n\nAcessórios: Mira (S2), Cano (S2), Acessório Inferior (S2)\n\nCom o S71, a Gemini desenvolveu um rifle de assalto ergonômico que é ideal para operações de médio alcance. Apresentando um calibre menor do que outras armas de sua classe, o S71 é popular entre militares privados por sua estética elegante e precisão precisa.\n\n--- STATS ---\nWeight: 2.5 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 21.5 (Phys)  |  DPS: 179.2\nAmmo: 30\nVelocity: 1,200 m/s  |  Absolute Range: 2.4 km\nFull Dmg to: 100 m  |  Drop: -0.10/m  |  Min Dmg: 17.5
item_DescGMNI_rifle_ballistic_01_collector01=Fabricante: Gemini\nTipo de Item: Rifle de Assalto\nClasse: Balística\n\nTamanho do Carregador: 30\nCadência de Tiro: 300 rpm / 900 rpm\nAlcance Efetivo: 50 m\n\nAcessórios: Ópticos (S2), Cano (S2), Cano Inferior (S2)\n\nCom o S71, a Gemini projetou um rifle de assalto ergonômico, ideal para confrontos de médio alcance. Utilizando um calibre menor do que outras armas de sua classe, o S71 tornou-se popular entre profissionais militares privados por sua estética elegante e precisão rigorosa.\n\nA edição Hemlock apresenta um padrão de camuflagem verde.\n\n--- STATS ---\nWeight: 2.5 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 21.5 (Phys)  |  DPS: 179.2\nAmmo: 30\nVelocity: 1,200 m/s  |  Absolute Range: 2.4 km\nFull Dmg to: 100 m  |  Drop: -0.10/m  |  Min Dmg: 17.5
item_DescGMNI_rifle_ballistic_01_grey_red01=Fabricante: Gemini\nTipo de Item: Rifle de Assalto\nClasse: Balístico\n\nTamanho do Carregador: 30\nCadência de Tiro: 300 rpm / 900 rpm\nAlcance Efetivo: 50 m\n\nAcessórios: Mira (S2), Cano (S2), Acessório Inferior (S2)\n\nCom o S71, a Gemini projetou um rifle de assalto ergonômico ideal para combates de médio alcance. Com uma munição de calibre menor do que outras armas de sua classe, o S71 tornou-se popular entre os profissionais militares privados por sua estética elegante e precisão. A edição “Justified” apresenta um cinza frio e detalhes em vermelho brilhante.\n\n--- STATS ---\nWeight: 2.5 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 21.5 (Phys)  |  DPS: 179.2\nAmmo: 30\nVelocity: 1,200 m/s  |  Absolute Range: 2.4 km\nFull Dmg to: 100 m  |  Drop: -0.10/m  |  Min Dmg: 17.5
item_DescGMNI_rifle_ballistic_01_yellow_blue01=Fabricante: Gemini\nTipo de Item: Rifle de Assalto\nClasse: Balístico\n\nTamanho do Carregador: 30\nCadência de Tiro: 300 rpm / 900 rpm\nAlcance Efetivo: 50 m\n\nAcessórios: Mira (S2), Cano (S2), Acessório Inferior (S2)\n\nCom o S71, a Gemini projetou um rifle de assalto ergonômico ideal para combates de médio alcance. Com uma munição de calibre menor do que outras armas de sua classe, o S71 tornou-se popular entre os profissionais militares privados por sua estética elegante e precisão. O amarelo neon arrojado e o azul vívido se combinam para fazer com que o fuzil oficial da Murray Cup Racing se destaque da multidão.\n\n--- STATS ---\nWeight: 2.5 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 21.5 (Phys)  |  DPS: 179.2\nAmmo: 30\nVelocity: 1,200 m/s  |  Absolute Range: 2.4 km\nFull Dmg to: 100 m  |  Drop: -0.10/m  |  Min Dmg: 17.5
item_DescGMNI_smg_ballistic_01=Fabricante: Gemini\nTipo de Item: SMG\nClasse: Balístico\n\nTamanho do Carregador: 40\nCadência de Tiro: 1.100 rpm\nAlcance Efetivo: 35m\n\nAcessórios: Cano (S1),Mira (S1), Acessório Inferior (S1)\n\nO C54 é um SMG fino e precisamente balanceado da Gemini. É fácil de usar e é lindo por si só com seu design com detalhes em roxo. A estrutura leve de polímero e o design ergonômico o tornam ideal para uso em combate corpo a corpo. O C54 é capaz de disparar cartuchos de 10 mm em modo totalmente automático para fornecer suporte máximo e saturação do alvo, garantindo que cada combate termine rapidamente.\n\n--- STATS ---\nWeight: 2.0 kg\nFire Rate: 925 RPM\nFire Modes: Auto\nAlpha Dmg: 11.5 (Phys)  |  DPS: 177.3\nAmmo: 50\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 15 m  |  Drop: -0.20/m  |  Min Dmg: 7.5
item_DescGMNI_smg_ballistic_01_grey_red01=Fabricante: Gemini\nTipo de Item: SMG\nClasse: Balístico\n\nTamanho do Carregador: 50\nCadência de Tiro: 1.100 rpm\nAlcance Efetivo: 35 m\n\nAcessórios: Cano (S1), Mira (S1), Acessório Inferior (S1)\n\nFácil de manusear e uma beleza de se ver com seu estilo acentuado em roxo, a C54 é uma SMG elegante e precisamente equilibrada da Gemini. Sua estrutura de polímero leve e seu design ergonômico a tornam ideal para combates a curta distância. A C54 é capaz de disparar projéteis de 10 mm em modo totalmente automático para proporcionar o máximo de apoio e saturação do alvo, garantindo que qualquer combate termine rapidamente. A edição “Justified” apresenta um cinza frio e detalhes em vermelho brilhante.\n\n--- STATS ---\nWeight: 2.0 kg\nFire Rate: 925 RPM\nFire Modes: Auto\nAlpha Dmg: 11.5 (Phys)  |  DPS: 177.3\nAmmo: 50\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 15 m  |  Drop: -0.20/m  |  Min Dmg: 7.5
item_DescKSAR_pistol_ballistic_01=Fabricante: Kastak Arms\nTipo de Item: Pistola\nClasse: Balística\n\nTamanho do Carregador: 6\nCadência de Tiro: 180 rpm \nAlcance Efetivo: 100 m\n\nAcessórios: Mira (S1), Cano (S1), Acessório Inferior (S1)\n\nMuitas vezes chamado de "canhão de mão" da Kastak Arms, o Coda é capaz de encerrar uma batalha com um único cartucho calibre .50, embora o recuo do Coda seja difícil de controlar devido ao seu poder considerável. Dado o tamanho limitado do carregador e o recuo significativo, o fogo sustentado é desencorajado em favor de tiros únicos mais precisos.\n\n--- STATS ---\nWeight: 1.3 kg\nFire Rate: 180 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 60.0 (Phys)  |  DPS: 180.0\nAmmo: 6\nVelocity: 550 m/s  |  Absolute Range: 1.1 km\nFull Dmg to: 55 m  |  Drop: -0.20/m  |  Min Dmg: 35.0
item_DescKsar_rifle_energy_01_blue_gold_01=Fabricante: Kastak Arms\nTipo de Item: Rifle de Assalto\nClasse: Energia (Plasma)\n\nTamanho da Bateria: 35\nCadência de Tiro: 500 rpm\nAlcance Efetivo: 50 m\n\nAcessórios: Mira (S2), Cano (S2), Acessório Inferior (S2)\n\nO Karna é um rifle de assalto de plasma clássico da Kastak Arms. Esse fuzil de médio alcance apresenta modos de disparo carregado e totalmente automático para permitir ajustes situacionais rápidos e fáceis. Além de seu renomado poder de fogo, a aparência robusta e a confiabilidade do Karna o tornaram uma das armas mais populares da Kastak Arms. O ousado esquema de cores azul e dourado confere à edição Valor um apelo valente e digno.\n\n--- STATS ---\nWeight: 3.5 kg\nFire Rate: 600 RPM\nFire Modes: Auto / Charge / Semi-Auto\nAlpha Dmg: 17.5 (Energy)  |  DPS: 175.0\nAmmo: 35\nVelocity: 600 m/s  |  Absolute Range: 1.2 km\nFull Dmg to: 20 m  |  Drop: -0.11/m  |  Min Dmg: 14.5
item_Descapar_special_ballistic_01=Fabricante: Apocalypse Arms\nTipo de Item: Canhão Elétrico\nClasse: Balístico\n\nTamanho do Carregador: 5\nCadência de Tiro: 60 rpm\nAlcance Efetivo: 200 m\n\nAcessórios: Mira (N/A), Cano (N/A), Acessório Inferior (S4)\n\nUsando eletroímãs para entregar sua carga com precisão por longas distâncias, este canhão elétrico montado no ombro da Apocalypse Arms é o flagelo da terra, do ar e do espaço.\n\n--- STATS ---\nWeight: 12.1 kg\nFire Rate: 70 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 10.0 (Phys)  |  DPS: 11.7\nAmmo: 5\nVelocity: 50 m/s  |  Absolute Range: 200 m
item_Descapar_special_ballistic_01_mat01=Fabricante: Apocalypse Arms\nTipo de Item: Canhão Elétrico\nClasse: Balístico\n\nTamanho do Carregador: 5\nCadência de Tiro: 60 rpm\nAlcance Efetivo: 200 m\n\nAcessórios: Mira (N/A), Cano (N/A), Acessório Inferior (S4)\n\nIgualmente devastador para ameaças maiores e veículos hostis, esse canhão elétrico montado no ombro da Apocalypse Arms usa eletroímãs para entregar sua carga útil com precisão em grandes distâncias, tornando-o o Flagelo da terra, do ar e do espaço. Um dos muitos itens que Wikelo adquiriu em suas viagens, a edição “Quite Useful” é um item obrigatório para qualquer colecionador sério.\n\n--- STATS ---\nWeight: 12.1 kg\nFire Rate: 70 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 10.0 (Phys)  |  DPS: 11.7\nAmmo: 5\nVelocity: 50 m/s  |  Absolute Range: 200 m
item_Descapar_special_ballistic_02=Fabricante: Apocalypse Arms\nTipo de Item: Lançador de Mísseis\nClasse: Balístico\n\nTamanho do Carregador: 3\nCadência de Tiro: 300 rpm (salva de 3 tiros)\nAlcance Efetivo: 2 km\n\nAcessórios: Mira (N/A), Barrel (N/A), Acessório Inferior (N/A)\n\nLevante o Animus até o ombro e esmague o inimigo no campo de batalha. Este lançador de foguetes da Apocalypse Arms possui um cano giratório que dispara três foguetes rapidamente, tornando-o a arma perfeita para destruir tropas terrestres ou danificar veículos e pequenas naves. Quando precisar causar destruição para se salvar, você pode contar com Apocalypse Arms.\n\n--- STATS ---\nWeight: 16.8 kg\nFire Rate: 300 RPM\nFire Modes: Semi-Auto
item_Descapar_special_ballistic_02_mat01=Fabricante: Apocalypse Arms\nTipo de Item: Lançador de Mísseis\nClasse: Balístico\n\nTamanho do Carregador: 3\nCadência de Tiro: 300 rpm (rajada de 3 tiros)\nAlcance Efetivo: 2 km\n\nAcessórios: Mira (N/A), Cano (N/A), Acessório Inferior (N/A)\n\nLevante o Animus em seu ombro e nivele a oposição no campo de batalha. Esse lançador de mísseis da Apocalypse Arms apresenta um cano giratório que dispara rapidamente três mísseis, tornando-o a arma perfeita para obliterar forças terrestres ou danificar veículos e pequenas naves. Quando você precisar semear a destruição para se salvar, pode confiar na Apocalypse Arms. Um dos muitos itens que Wikelo adquiriu em suas viagens, a edição “Quite Useful” é um item obrigatório para qualquer colecionador sério.\n\n--- STATS ---\nWeight: 16.8 kg\nFire Rate: 300 RPM\nFire Modes: Semi-Auto
item_Descbehr_binoculars_01=O altamente preciso Telêmetro Monocular XDL da Behring é tão adequado para uma expedição quanto para o campo de batalha. Construído de forma robusta com lentes de alta qualidade, display de fácil leitura e modo de amplificação de luz, o XDL fornece ampliação de 10x para medir com precisão a distância de alvos distantes usando laser.\n\n--- STATS ---\nWeight: 1.5 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto
item_Descbehr_binoculars_01_collector01=O altamente preciso Telêmetro Monocular XDL da Behring é tão adequado para expedições quanto para o campo de batalha. Construído de forma robusta, com lentes de alta qualidade, visor de fácil leitura e modo de amplificação de luz, o XDL oferece ampliação de 10x para fornecer medições a laser de distância exata em alvos distantes de forma confiável.\n\nA edição Mark I apresenta um acabamento em cinza e azul-aço.\n\n--- STATS ---\nWeight: 1.5 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto
item_Descbehr_binoculars_01_tint01=O altamente preciso Telêmetro Monocular XDL da Behring é tão adequado em uma expedição quanto no campo de batalha. Construído de forma robusta com lentes de alta qualidade, display de fácil leitura e modo de amplificação de luz, o XDL fornece aumento de 10x para medir com precisão a distância a alvos distantes usando laser.\n\nA edição Snowfall apresenta acabamento branco impecável.\n\n--- STATS ---\nWeight: 1.5 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto
item_Descbehr_binoculars_01_tint02=O altamente preciso Telêmetro Monocular XDL da Behring é tão adequado em uma expedição quanto no campo de batalha. Construído de forma robusta com lentes de alta qualidade, display de fácil leitura e modo de amplificação de luz, o XDL fornece aumento de 10x para medir com precisão a distância a alvos distantes usando laser.\n\nA edição Tactical apresenta acabamento preto.\n\n--- STATS ---\nWeight: 1.5 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto
item_Descbehr_binoculars_01_tint03=O altamente preciso Telêmetro Monocular XDL da Behring é tão adequado em uma expedição quanto no campo de batalha. Construído de forma robusta com lentes de alta qualidade, display de fácil leitura e modo de amplificação de luz, o XDL fornece aumento de 10x para medir com precisão a distância a alvos distantes usando laser.\n\nA edição Forest apresenta acabamento bicolor em verde claro e escuro.\n\n--- STATS ---\nWeight: 1.5 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto
item_Descbehr_glauncher_ballistic_01=Fabricante: Behring\nTipo de Item: Lança-Granadas\nClasse: Balístico\n\nTamanho do Carregador: 6\nCadência de Tiro: 40 rpm\nAlcance Efetivo: Variável (80m)\n\nAcessórios: Mira (S1), Cano (N/A), Lower Barrel (S1)\n\nO lançador GP-33 MOD de nível militar dispara granadas de 40 mm para limpar espaços e expulsar inimigos atrás de cobertura, graças ao design de precisão de Behring que prepara cada granada para ser lançada no momento da explosão de impacto.\n\n--- STATS ---\nWeight: 5.3 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 12.5 (Phys)  |  DPS: 12.5\nAmmo: 6\nVelocity: 50 m/s  |  Absolute Range: 200 m
item_Descbehr_glauncher_ballistic_01_black01=Fabricante: Behring\nTipo de Item: Lança-Granadas\nClasse: Balístico\n\nTamanho do Carregador: 6\nCadência de Tiro: 40 rpm\nAlcance Efetivo: Variável (80m)\n\nAcessórios: Mira (S1), Cano (N/A), Lower Barrel (S1)\n\nO lançador GP-33 MOD de nível militar dispara granadas de 40 mm para limpar espaços e expulsar inimigos atrás de cobertura, graças ao design de precisão de Behring que prepara cada granada para ser lançada no momento da explosão de impacto. A combinação das cores preto e cinza confere à edição Thunderclap uma aparência sutil adequada para qualquer profissional de segurança.\n\n--- STATS ---\nWeight: 5.3 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 12.5 (Phys)  |  DPS: 12.5\nAmmo: 6\nVelocity: 50 m/s  |  Absolute Range: 200 m
item_Descbehr_glauncher_ballistic_01_cen01=Fabricante: Behring\nTipo de Item: Lança-Granadas\nClasse: Balístico\n\nTamanho do Carregador: 6\nCadência de Tiro: 40 rpm\nAlcance Efetivo: Variável (80m)\n\nAcessórios: Mira (S1), Acessório Inferior (S1)\n\nO lançador GP-33 MOD de nível militar dispara granadas de 40 mm para limpar espaços e forçar os inimigos a saírem da cobertura, graças ao design de precisão de Behring que prepara cada granada para explodir com o impacto. A edição Ashfall combina azul escuro, cinza e preto para um visual sutil, mas elegante.\n\n--- STATS ---\nWeight: 5.3 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 12.5 (Phys)  |  DPS: 12.5\nAmmo: 6\nVelocity: 50 m/s  |  Absolute Range: 200 m
item_Descbehr_glauncher_ballistic_01_imp01=Fabricante: Behring\nTipo de Item: Lança-Granadas\nClasse: Balístico\n\nTamanho do Carregador: 6\nCadência de Tiro: 40 rpm\nAlcance Efetivo: Variável (80m)\n\nAcessórios: Mira (S1), Acessório Inferior (S1)\n\nO lançador militar GP-33 MOD dispara granadas de 40 mm para limpar espaços e expulsar inimigos atrás de cobertura, graças ao design de precisão de Behring que prepara cada granada para explodir com o impacto. Um acabamento leve e metálico no cano e na coronha diferencia a Copperhead Edition de outras versões e chama a atenção.\n\n--- STATS ---\nWeight: 5.3 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 12.5 (Phys)  |  DPS: 12.5\nAmmo: 6\nVelocity: 50 m/s  |  Absolute Range: 200 m
item_Descbehr_glauncher_ballistic_01_mat01=Fabricante: Behring\nTipo de Item: Lançador de Granadas\nClasse: Balístico\n\nTamanho do Carregador: 6\nCadência de Tiro: 40 rpm\nAlcance Efetivo: Variável (80 m)\n\nAcessórios: Mira (S1), Cano (N/A), Acessório Inferior (S1)\n\nO lançador GP-33 MOD de nível militar dispara granadas de 40 mm para limpar salas e expulsar inimigos atrás de cobertura, graças ao design de precisão da Behring que prepara cada granada para explodir com o impacto. Um dos muitos itens que Wikelo adquiriu em suas viagens, a edição “Quite Useful” é um item obrigatório para qualquer colecionador sério.\n\n--- STATS ---\nWeight: 5.3 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 12.5 (Phys)  |  DPS: 12.5\nAmmo: 6\nVelocity: 50 m/s  |  Absolute Range: 200 m
item_Descbehr_glauncher_ballistic_01_shin=Fabricante: Behring\nTipo de Item: Lança-Granadas\nClasse: Balístico\n\nTamanho do Carregador: 6\nCadência de Tiro: 40 rpm\nAlcance Efetivo: Variável (80m)\n\nAcessórios: Mira (S1), Acessório Inferior (S1)\n\nO lançador GP-33 MOD de nível militar dispara granadas de 40 mm para limpar espaços e forçar os inimigos a saírem da cobertura, graças ao design de precisão de Behring que prepara cada granada para explodir com o impacto. A Edição Umber é decorada em ferrugem e laranja.\n\n--- STATS ---\nWeight: 5.3 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 12.5 (Phys)  |  DPS: 12.5\nAmmo: 6\nVelocity: 50 m/s  |  Absolute Range: 200 m
item_Descbehr_lmg_ballistic_01=Fabricante: Behring\nTipo de Item: LMG\nClasse: Balístico\n\nTamanho do Carregador: 75\nCadência de Tiro: 800 rpm\nAlcance Efetivo: 40 m\n\nAcessórios: Mira (S2), Cano (S2), Acessório Inferior (S3)\n\nBehring projetou o FS-9 para ser uma força esmagadora no campo de batalha. Esta metralhadora leve possui um modo totalmente automático, tornando-a ideal para fornecer fogo de cobertura ou impedir o avanço dos inimigos. O FS-9 também é elogiado por sua capacidade de manter a precisão sob fogo contínuo.\n\n--- STATS ---\nWeight: 6.8 kg\nFire Rate: 650 RPM\nFire Modes: Auto\nAlpha Dmg: 14.5 (Phys)  |  DPS: 157.1\nAmmo: 75\nVelocity: 600 m/s  |  Absolute Range: 1.2 km\nFull Dmg to: 50 m  |  Drop: -0.01/m  |  Min Dmg: 10.0
item_Descbehr_lmg_ballistic_01_luminalia_green01=Fabricante: Behring\nTipo de Item: LMG\nClasse: Balístico\n\nTamanho do Carregador: 75\nCadência de Tiro: 800 rpm\nAlcance Efetivo: 40 m\n\nAcessórios: Mira (S2), Cano (S2), Acessório Inferior (S3)\n\nBehring projetou o FS-9 para ser uma força esmagadora no campo de batalha. Esta metralhadora leve possui um modo totalmente automático, tornando-a ideal para fornecer fogo de cobertura ou impedir o avanço dos inimigos. O FS-9 também é elogiado por sua capacidade de manter alta precisão durante disparos sustentados. A Evergreen Edition abraça o espírito da Luminalia ao usar uma cor tradicional de férias com seu tom verde brilhante.\n\n--- STATS ---\nWeight: 6.8 kg\nFire Rate: 650 RPM\nFire Modes: Auto\nAlpha Dmg: 14.5 (Phys)  |  DPS: 157.1\nAmmo: 75\nVelocity: 600 m/s  |  Absolute Range: 1.2 km\nFull Dmg to: 50 m  |  Drop: -0.01/m  |  Min Dmg: 10.0
item_Descbehr_lmg_ballistic_01_tint01=Fabricante: Behring\nTipo de Item: LMG\nClasse: Balística\n\nTamanho do Carregador: 75\nCadência de Tiro: 800 rpm\nAlcance Efetivo: 40 m\n\nAcessórios: Mira (S2), Cano (S2), Cano Inferior (S3)\n\nA Behring projetou a FS-9 para ser uma força esmagadora no campo de batalha. Esta metralhadora leve apresenta um modo totalmente automático que a torna ideal para fornecer fogo de cobertura ou conter o avanço de inimigos. A FS-9 também é aclamada por sua capacidade de manter a precisão enquanto desfere fogo sustentado. A edição Blacklist apresenta um acabamento em preto escuro.\n\n--- STATS ---\nWeight: 6.8 kg\nFire Rate: 650 RPM\nFire Modes: Auto\nAlpha Dmg: 14.5 (Phys)  |  DPS: 157.1\nAmmo: 75\nVelocity: 600 m/s  |  Absolute Range: 1.2 km\nFull Dmg to: 50 m  |  Drop: -0.01/m  |  Min Dmg: 10.0
item_Descbehr_lmg_ballistic_01_xenothreat01=Fabricante: Behring\nTipo de Item: LMG\nClasse: Balístico\n\nTamanho do Carregador: 75\nCadência de Tiro: 800 rpm\nAlcance Efetivo: 40 m\n\nAcessórios: Mira (S2), Cano (S2), Acessório Inferior (S3)\n\nBehring projetou o FS-9 para ser uma força esmagadora no campo de batalha. Esta metralhadora leve possui um modo totalmente automático, tornando-a ideal para fornecer fogo de cobertura ou impedir o avanço dos inimigos. O FS-9 também é elogiado por sua capacidade de manter a precisão durante disparos sustentados. Para esta entrada na série Legendary Bounty Hunters, o famoso rastreador Farook “Stoneface” Norris criou um visual para seu amado FS-9 LMG que apresenta impressionantes toques de vermelho em uma base cinza.\n\n--- STATS ---\nWeight: 6.8 kg\nFire Rate: 650 RPM\nFire Modes: Auto\nAlpha Dmg: 14.5 (Phys)  |  DPS: 157.1\nAmmo: 75\nVelocity: 600 m/s  |  Absolute Range: 1.2 km\nFull Dmg to: 50 m  |  Drop: -0.01/m  |  Min Dmg: 10.0
item_Descbehr_lmg_ballistic_01_yellow_grey01=Fabricante: Behring\nTipo de Item: LMG\nClasse: Balística\n\nTamanho do Carregador: 75\nCadência de Tiro: 800 rpm\nAlcance Efetivo: 40 m\nAcessórios: Mira (S2), Cano (S2), Acessório Inferior (S3)\n\nBehring concebeu a FS-9 para ser uma força avassaladora no campo de batalha. Esta metralhadora ligeira possui um modo totalmente automático que a torna ideal para lançar fogo de cobertura ou conter o avanço dos inimigos. A FS-9 é também aclamada pela sua capacidade de manter a precisão enquanto dispara de forma sustentada. Atualizada com novas cores amarelas e cinzentas, esta edição especial da Finish Line é uma homenagem às corridas de naves espaciais.\n\n--- STATS ---\nWeight: 6.8 kg\nFire Rate: 650 RPM\nFire Modes: Auto\nAlpha Dmg: 14.5 (Phys)  |  DPS: 157.1\nAmmo: 75\nVelocity: 600 m/s  |  Absolute Range: 1.2 km\nFull Dmg to: 50 m  |  Drop: -0.01/m  |  Min Dmg: 10.0
item_Descbehr_pistol_ballistic_01=Fabricante: Behring\nTipo de Item: Pistola\nClasse: Balística\n\nTamanho do Carregador: 15\nCadência de Tiro: 450 rpm\nAlcance Efetivo: 25 m\n\nAcessórios: Mira (S1), Cano (S1), Acessório Inferior (S1)\n\nGraças a um design simplificado e uma estrutura de polímero leve que minimiza o recuo, é fácil ver por que o versátil e confiável S-38 da Behring se tornou uma arma confiável para cidadãos e policiais em todo o império.\n\n--- STATS ---\nWeight: 0.9 kg\nFire Rate: 450 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 22.5 (Phys)  |  DPS: 168.8\nAmmo: 20\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 20 m  |  Drop: -0.25/m  |  Min Dmg: 16.0
item_Descbehr_pistol_ballistic_01_300=Fabricante: Behring\nTipo de Item: Pistola\nClasse: Balística\n\nTamanho do Carregador: 15\nCadência de Tiro: 450 rpm\nAlcance Efetivo: 25 m\n\nAcessórios: Mira (S1), Cano (S1), Acessório Inferior (S1)\n\nGraças ao design simplificado e à estrutura de polímero leve que minimiza o recuo, é fácil ver por que a versátil e confiável S-38 da Behring se tornou uma arma confiável em todo o Reich. Esta edição especial apresenta um trenó Imperial Blue para comemorar os esforços contínuos de "One Empire", uma iniciativa governamental de base comunitária.\n\n--- STATS ---\nWeight: 0.9 kg\nFire Rate: 450 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 22.5 (Phys)  |  DPS: 168.8\nAmmo: 20\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 20 m  |  Drop: -0.25/m  |  Min Dmg: 16.0
item_Descbehr_pistol_ballistic_01_firerats01=Fabricante: Behring\nTipo de Item: Pistola\nClasse: Balística\n\nTamanho do Carregador: 20\nCadência de Tiro: 450 rpm\nAlcance Efetivo: 25 m\n\nAcessórios: Mira (S1), Cano (S1), Acessório Inferior (S1)\n\nGraças a um design aerodinâmico e a uma armação de polímero leve que ajuda a minimizar o recuo, é fácil ver por que a versátil e confiável S-38 da Behring se tornou uma arma secundária confiável em todo o Império, tanto para cidadãos quanto para policiais. A edição Scorched apresenta uma pátina de chama exclusiva.\n\n--- STATS ---\nWeight: 0.9 kg\nFire Rate: 450 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 22.5 (Phys)  |  DPS: 168.8\nAmmo: 20\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 20 m  |  Drop: -0.25/m  |  Min Dmg: 16.0
item_Descbehr_rifle_ballistic_01=Fabricante: Behring\nTipo de Item: Rifle de assalto\nClasse: Balístico\n\nTamanho do Carregador: 30\nCadência de Tiro: 550 rpm\nAlcance Efetivo: 50 m\n\nAcessórios: Mira (S2), Cano (S2), Acessório Inferior (S2)\n\nO clássico rifle P4-AR da Behring apresenta uma coronha dobrável e um cano encurtado, o que o torna a escolha ideal para tiroteios a curta distância. Sua precisão e facilidade geral de uso fazem com que seja universalmente valorizado entre os usuários de segurança, militares e civis.\n\n--- STATS ---\nWeight: 2.6 kg\nFire Rate: 810 RPM\nFire Modes: Auto / Semi-Auto\nAlpha Dmg: 12.0 (Phys)  |  DPS: 162.0\nAmmo: 40\nVelocity: 550 m/s  |  Absolute Range: 1.1 km\nFull Dmg to: 40 m  |  Drop: -0.05/m  |  Min Dmg: 10.0
