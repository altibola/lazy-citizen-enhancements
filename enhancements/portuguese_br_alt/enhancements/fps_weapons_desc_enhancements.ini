item_Descklwe_lmg_energy_01_mr01=Fabricante: Klaus & Werner\nTipo de Item: LMG\nClasse: Energia (Laser)\n\nTamanho da Bateria: 100\nCadência de Tiro: 400 rpm\nAlcance Efetivo: 40 m\n\nAcessórios: Mira (S2), Cano (S2), Cano Inferior (S3)\n\nA Klaus & Werner criou uma arma icônica com a testada e comprovada LMG laser Demeco. Utilizada extensivamente em combates militares, esta favorita da infantaria para curto e médio alcance foi construída com a estabilidade e a precisão em primeiro plano. \n\nA edição Purgatory Camo mistura tons de cinza para um design elegante e direto ao ponto.\n\n--- STATS ---\nWeight: 9.8 kg\nFire Rate: 800 RPM\nFire Modes: Auto\nAlpha Dmg: 11.5 (Energy)  |  DPS: 153.3\nAmmo: 100\nVelocity: 600 m/s  |  Absolute Range: 2.4 km
