item_Descnone_shotgun_ballistic_01=Fabricante: Desconhecido\nTipo de Item: Espingarda\nClasse: Balistico\n\nTamanho do Carregador: 8\nCadência de Tiro: 120 rpm\nAlcance Efetivo: 0-10 m\n\nAcessórios: N/A\n\nA Deadrig é uma espingarda de cano duplo de alta potência com um design simples, montada a partir de restos de ferro-velho. Priorizando o poder acima de tudo, a Deadrig carece do refinamento das armas produzidas em massa e sofre forte recuo.\n\n--- STATS ---\nWeight: 4.2 kg\nFire Rate: 50 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 72.0 x8 (Phys)  |  DPS: 60.0\nAmmo: 8\nVelocity: 300 m/s  |  Absolute Range: 600 m\nFull Dmg to: 7 m  |  Drop: -0.05/m  |  Min Dmg: 6.0
