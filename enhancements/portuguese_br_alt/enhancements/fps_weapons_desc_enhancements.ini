item_Descbehr_rifle_ballistic_02_civilian_store01=Fabricante: Behring \nTipo de Item: Rifle de Assalto\nClasse: Balística\n\nTamanho do Carregador: 15\nCadência de Tiro: 475 rpm\nAlcance Efetivo: 100 m\n\nAcessórios: Ópticos (S2), Cano (S2), Cano Inferior (S2)\n\nDescendente direto da arma padrão dos fuzileiros navais da UEE, a Behring projetou o P8-AR semiautomático para fornecer aos civis em todo o império uma arma direta e confiável para se defenderem contra hostis agressivos.\n\nA edição Dominion Camo adiciona um padrão de camuflagem verde escuro ao rifle.\n\n--- STATS ---\nWeight: 2.4 kg\nFire Rate: 235 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 45.0 (Phys)  |  DPS: 176.2\nAmmo: 15\nVelocity: 1,150 m/s  |  Absolute Range: 2.3 km\nFull Dmg to: 50 m  |  Drop: -0.10/m  |  Min Dmg: 40.0
item_Descbehr_shotgun_ballistic_01=Fabricante: Behring\nTipo de Item: Espingarda\nClasse: Balística\n\nTamanho do Carregador: 12\nCadência de Tiro: 75 rpm\nAlcance Efetivo: 15 m\n\nAcessórios: Mira (S1), Cano (S3), Acessório Inferior (S2)\n\nOriginalmente desenvolvida para os militares, Behring decidiu vender a espingarda balística BR-2 ao público em geral depois que os primeiros testadores de armas pediram para levar uma para casa. Com seu modo de tiro semiautomático, que proporciona penetração devastadora em muito pouco tempo, o BR-2 é a escolha ideal tanto para missões ofensivas quanto defensivas.\n\n--- STATS ---\nWeight: 2.4 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 350.0 x10 (Phys)  |  DPS: 875.0\nAmmo: 99,999\nVelocity: 550 m/s  |  Absolute Range: 4.4 km
item_Descbehr_shotgun_ballistic_01_blue_white01=Fabricante: Behring\nTipo de Item: Espingarda\nClasse: Balística\n\nTamanho do Carregador: 12\nCadência de Tiro: 75 rpm\nAlcance Efetivo: 15 m\n\nAcessórios: Mira (S1), Cano (S3), Acessório Inferior (S2)\n\nOriginalmente projetada para as forças armadas, a Behring decidiu vender a espingarda balística BR-2 para o público em geral depois que os testadores iniciais da arma continuaram pedindo para levar uma para casa. Com um modo de disparo semiautomático que pode proporcionar rapidamente um poder de parada devastador, a BR-2 é a escolha ideal para operações ofensivas e defensivas. Essa edição especial Permafrost apresenta uma coloração azul e cinza que lembra uma geleira sob um céu de inverno ofuscante.\n\n--- STATS ---\nWeight: 2.4 kg\nFire Rate: 90 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 88.0 x8 (Phys)  |  DPS: 132.0\nAmmo: 12\nVelocity: 225 m/s  |  Absolute Range: 450 m\nFull Dmg to: 12 m  |  Drop: -0.05/m  |  Min Dmg: 10.0
item_Descbehr_shotgun_ballistic_01_mr01=Fabricante: Behring\nTipo de Item: Espingarda\nClasse: Balística\n\nTamanho do Carregador: 12\nCadência de Tiro: 75 rpm\nAlcance Efetivo: 15 m\n\nAcessórios: Mira (S1), Cano (S3), Cano Inferior (S2)\n\nOriginalmente projetada para as forças militares, a Behring decidiu vender a escopeta balística BR-2 ao público geral após os testadores iniciais da arma continuarem pedindo para levar uma para casa. Apresentando um modo de disparo semiautomático que pode entregar rapidamente um poder de parada devastador, a BR-2 é a escolha ideal tanto para operações ofensivas quanto defensivas. O acabamento cinza sobre cinza da edição Purgatory Camo cria um perfil elegante e utilitário.\n\n--- STATS ---\nWeight: 2.4 kg\nFire Rate: 90 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 88.0 x8 (Phys)  |  DPS: 132.0\nAmmo: 12\nVelocity: 225 m/s  |  Absolute Range: 450 m\nFull Dmg to: 12 m  |  Drop: -0.05/m  |  Min Dmg: 10.0
item_Descbehr_shotgun_ballistic_01_tint01=Fabricante: Behring\nTipo de Item: Espingarda\nClasse: Balística\n\nTamanho do Carregador: 12\nCadência de Tiro: 75 rpm\nAlcance Efetivo: 15 m\n\nAcessórios: Ópticos (S1), Cano (S3), Cano Inferior (S2)\n\nOriginalmente projetada para as forças militares, a Behring decidiu vender a escopeta balística BR-2 ao público geral depois que os testadores iniciais da arma continuaram pedindo para levar uma para casa. Apresentando um modo de disparo semiautomático que pode desferir rapidamente um poder de parada devastador, a BR-2 é a escolha ideal tanto para operações ofensivas quanto defensivas.\n\nA edição Blacklist apresenta um acabamento preto.\n\n--- STATS ---\nWeight: 2.4 kg\nFire Rate: 90 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 88.0 x8 (Phys)  |  DPS: 132.0\nAmmo: 12\nVelocity: 225 m/s  |  Absolute Range: 450 m\nFull Dmg to: 12 m  |  Drop: -0.05/m  |  Min Dmg: 10.0
item_Descbehr_smg_ballistic_01=Fabricante: Behring\nTipo de Item: SMG\nClasse: Balístico\n\nTamanho do Carregador: 45\nCadência de Tiro: 800 rpm\nAlcance Efetivo: 30 m\n\nAcessórios: Mira (S1), Cano (S1), Acessório Inferior (S1)\n\nQuando a melhor força de combate do universo escolhe uma arma como arma padrão, vale a pena se levantar e prestar atenção. A P8-SC fabricada pela Behring tem sido a submetralhadora balística preferida dos fuzileiros do UEE desde que saiu da linha de montagem, mas desde então muitos confiaram nesta arma para sua própria segurança e proteção pessoal.\n\n--- STATS ---\nWeight: 1.9 kg\nFire Rate: 850 RPM\nFire Modes: Auto / Burst\nAlpha Dmg: 13.8 (Phys)  |  DPS: 194.8\nAmmo: 45\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 15 m  |  Drop: -0.06/m  |  Min Dmg: 10.0
item_Descbehr_smg_ballistic_01_IAE2022=Fabricante: Behring\nTipo de Item: SMG\nClasse: Balístico\n\nTamanho do Carregador: 45\nCadência de Tiro: 800 rpm\nAlcance Efetivo: 30 m\n\nAcessórios:Mira (S1), Cano (S1), Acessório Inferior (S1)\n\nQuando a melhor força de combate do universo escolhe uma arma como arma padrão, vale a pena se levantar e prestar atenção. A P8-SC fabricada pela Behring tem sido a submetralhadora balística preferida dos fuzileiros do UEE desde que saiu da linha de montagem, mas desde então muitos têm confiado nesta arma para sua própria segurança e proteção pessoal. A edição "Red Alert" mistura cinza e vermelho brilhante para um design arrojado e dinâmico.\n\n--- STATS ---\nWeight: 1.9 kg\nFire Rate: 850 RPM\nFire Modes: Auto / Burst\nAlpha Dmg: 13.8 (Phys)  |  DPS: 194.8\nAmmo: 45\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 15 m  |  Drop: -0.06/m  |  Min Dmg: 10.0
item_Descbehr_smg_ballistic_01_iae2501=Fabricante: Behring\nTipo de Item: SMG\nClasse: Balística\n\nCapacidade do Carregador: 45\nCadência de Tiro: 800 rpm\nAlcance Eficaz: 30 m\n\nAcessórios: Mira (S1), Cano (S1), Acessório Inferior (S1)\n\nQuando a força de combate mais poderosa do universo escolhe uma arma como padrão, vale a pena prestar atenção. A P8-SC, fabricada pela Behring, é a submetralhadora balística preferida dos Fuzileiros UEE desde que saiu da linha de produção, mas desde então, muitos passaram a confiar nesta arma para sua própria segurança e proteção. A edição Epoque apresenta coloração azul-marinho e preta com detalhes em ouro barroco e asas estilizadas em ambos os lados do punho.\n\n--- STATS ---\nWeight: 1.9 kg\nFire Rate: 850 RPM\nFire Modes: Auto / Burst\nAlpha Dmg: 13.8 (Phys)  |  DPS: 194.8\nAmmo: 45\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 15 m  |  Drop: -0.06/m  |  Min Dmg: 10.0
item_Descbehr_sniper_ballistic_01=Fabricante: Behring\nTipo de Item: Rifle Sniper\nClasse: Balística\n\nCapacidade do Carregador: 8\nCadência de Tiro: 20 rpm\nAlcance Eficaz: 120 m\n\nAcessórios: Mira (S3), Cano (S2), Acessório Inferior (S2)\n\nO rifle sniper balístico Behring P6-LR compensa sua baixa cadência de tiro com munição de alto poder, eficaz a longa distância. Com um visor de zoom variável e um cano feito de uma liga proprietária de alta resistência, o P6-LR foi projetado para entregar desempenho quando mais necessário.\n\n--- STATS ---\nWeight: 6.9 kg\nFire Rate: 55 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 100.0 (Phys)  |  DPS: 91.7\nAmmo: 8\nVelocity: 725 m/s  |  Absolute Range: 1.4 km\nFull Dmg to: 550 m  |  Drop: -10.00/m  |  Min Dmg: 90.0
