item_Descklwe_pistol_energy_01=Fabricante: Klaus & Werner\nTipo de Item: Pistola\nClasse: Energia (Laser)\n\nTamanho da Bateria: 30\nCadência de Tiro: 300 rpm\nAlcance Efetivo: 30 m\n\nAcessórios: Mira (S1), Cano (S1), Lower Barrel (S1)\n\nUm laser portátil que ficou famoso como a arma de Kyle Fenris na série de sucesso The Frontier, o Klaus & Werner Model II Arclight é extremamente popular no mercado civil. Apesar do seu apelo mediático, o Modelo II oferece uma cadência de tiro mais elevada do que qualquer um dos seus homólogos balísticos. Embora isso possa reduzir o poder de penetração da arma, sua célula de energia fornece tiros mais que suficientes para realizar o trabalho.\n\n--- STATS ---\nWeight: 1.4 kg\nFire Rate: 700 RPM\nFire Modes: Burst / Semi-Auto\nAlpha Dmg: 18.0 (Energy)  |  DPS: 210.0\nAmmo: 30\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
item_Descklwe_pistol_energy_01_chromic01=Fabricante: Klaus & Werner\nTipo de Item: Pistola\nClasse: Energia (Laser)\n\nTamanho da Bateria: 30\nCadência de Tiro: 300 rpm\nAlcance Efetivo: 30 m\n\nO Klaus & Werner Model II Arclight é um Laser de mão, que ficou conhecido como a arma de Kyle Fenris na série de sucesso The Frontier e é muito popular no mercado civil. Apesar do seu apelo mediático, o Modelo II oferece uma cadência de tiro mais elevada do que qualquer um dos seus homólogos balísticos. Embora isso possa reduzir o poder de penetração da arma, sua célula de energia fornece tiros mais que suficientes para realizar o trabalho. Esta edição exclusiva de mica apresenta um revestimento iridescente distinto que faz com que a arma brilhe em cores diferentes dependendo das condições de iluminação e do ângulo de visão.\n\n--- STATS ---\nWeight: 1.4 kg\nFire Rate: 700 RPM\nFire Modes: Burst / Semi-Auto\nAlpha Dmg: 18.0 (Energy)  |  DPS: 210.0\nAmmo: 30\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
item_Descklwe_pistol_energy_01_engraved01=Fabricante: Klaus & Werner\nTipo de Item: Pistola\nClasse: Energia (Laser)\n\nTamanho da Bateria: 30\nCadência de Tiro: 300 rpm\nAlcance Efetivo: 30 m\n\nAcessórios: Mira (S1), Cano (S1), Lower Barrel (S1)\n\nUm laser portátil que ficou famoso como a arma de Kyle Fenris na série de sucesso The Frontier, o Klaus & Werner Model II Arclight é extremamente popular no mercado civil. Apesar do seu apelo mediático, o Modelo II oferece uma cadência de tiro mais elevada do que qualquer um dos seus homólogos balísticos. Embora isso possa reduzir o poder de penetração da arma, sua célula de energia fornece tiros mais que suficientes para realizar o trabalho. A edição Herrero apresenta gravuras geométricas na armação e no punho, bem como um guarda-mato texturizado.\n\n--- STATS ---\nWeight: 1.4 kg\nFire Rate: 700 RPM\nFire Modes: Burst / Semi-Auto\nAlpha Dmg: 18.0 (Energy)  |  DPS: 210.0\nAmmo: 30\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
item_Descklwe_rifle_energy_01=Fabricante: Klaus & Werner\nTipo de Item: Rifle de assalto\nClasse: Energia (Laser)\n\nTamanho da Bateria: 45\nCadência de Tiro: 450 rpm\nAlcance Efetivo: 50 m\n\nAcessórios: Mira (S2), Barrel (S2), Acessório Inferior (S2)\n\nFuzis de assalto confiáveis nunca saem de moda. Klaus & Werner continua esta tradição com a introdução do Gallant. Este rifle de assalto baseado em energia é capaz de disparar de forma precisa e sustentada em alvos de médio alcance, enquanto seu sistema de energia de alto desempenho permite ao operativo disparar significativamente mais tiros por bateria.\n\n--- STATS ---\nWeight: 3.8 kg\nFire Rate: 900 RPM\nFire Modes: Burst\nAlpha Dmg: 21.0 (Energy)  |  DPS: 315.0\nAmmo: 45\nVelocity: 1,200 m/s  |  Absolute Range: 4.8 km
item_Descklwe_rifle_energy_01_IAE2022=Fabricante: Klaus & Werner\nTipo de Item: Rifle de assalto\nClasse: Energia (Laser)\n\nTamanho da Bateria: 45\nCadência de Tiro: 450 rpm\nAlcance Efetivo: 50 m\n\nAcessórios: Mira (S2), Barrel (S2), Acessório Inferior (S2)\n\nFuzis de assalto confiáveis nunca saem de moda. Klaus & Werner continua esta tradição com a introdução do Gallant. Este rifle de assalto baseado em energia é capaz de disparar tiros precisos e sustentados em alvos de médio alcance, enquanto seu sistema de energia de alto desempenho permite ao operativo disparar significativamente mais tiros por bateria. A edição "Red Alert" mistura cinza e vermelho brilhante para criar um design arrojado e dinâmico.\n\n--- STATS ---\nWeight: 3.8 kg\nFire Rate: 900 RPM\nFire Modes: Burst\nAlpha Dmg: 21.0 (Energy)  |  DPS: 315.0\nAmmo: 45\nVelocity: 1,200 m/s  |  Absolute Range: 4.8 km
item_Descklwe_rifle_energy_01_sf01=Fabricante: Klaus & Werner\nTipo de Item: Rifle de Assalto\nClasse: Energia (Laser)\n\nTamanho da Bateria: 45\nCadência de Tiro: 450 rpm\nAlcance Efetivo: 50 m\n\nAcessórios: Mira (S2), Cano (S2), Cano Inferior (S2)\n\nArmas de assalto confiáveis nunca saem de moda. A Klaus & Werner mantém essa tradição ao revelar a Gallant. Este rifle de assalto baseado em energia é capaz de fornecer fogo preciso e sustentado contra alvos a médio alcance, enquanto seu sistema de energia de alta capacidade permite que os operadores disparem consideravelmente mais tiros por bateria.\n\nA edição Conviction Camo utiliza uma seleção difusa de cinzas para ajudar a se misturar em ambientes mais urbanos.\n\n--- STATS ---\nWeight: 3.8 kg\nFire Rate: 900 RPM\nFire Modes: Burst\nAlpha Dmg: 21.0 (Energy)  |  DPS: 315.0\nAmmo: 45\nVelocity: 1,200 m/s  |  Absolute Range: 4.8 km
item_Descklwe_rifle_energy_01_store01=Fabricante: Klaus & Werner\nTipo de Item: Rifle de Assalto\nClasse: Energia (Laser)\n\nTamanho da Bateria: 45\nCadência de Tiro: 450 rpm\nAlcance Efetivo: 50 m\n\nAcessórios: Ópticos (S2), Cano (S2), Cano Inferior (S2)\n\nArmas de assalto confiáveis nunca saem de moda. A Klaus & Werner mantém essa tradição ao revelar o Gallant. Este rifle de assalto baseado em energia é capaz de fornecer disparos precisos e sustentados em alvos até médio alcance, enquanto seu sistema de energia de alta capacidade permite que os operadores efetuem consideravelmente mais disparos por bateria.\n\nA edição Redline apresenta uma pintura base vermelha feroz com destaques em preto e dourado.\n\n--- STATS ---\nWeight: 3.8 kg\nFire Rate: 900 RPM\nFire Modes: Burst\nAlpha Dmg: 21.0 (Energy)  |  DPS: 315.0\nAmmo: 45\nVelocity: 1,200 m/s  |  Absolute Range: 4.8 km
item_Descklwe_smg_energy_01=Fabricante: Klaus & Werner\nTipo de Item: SMG\nClasse: Laser\n\nTamanho da Bateria: 45\nCadência de Tiro: 562,5 rpm\nAlcance Efetivo: 25m\n\nAcessórios: Mira (S1), Cano (S1), Acessório Inferior (S1)\n\nA habilidade especializada da Klaus & Werner está mais uma vez em plena exibição para tornar o rifle de energia compacto a laser Lumin V ainda mais mortal e confiável. Um novo modo de "disparo automático com intervalo" dispara barragens de cinco cartuchos quando o gatilho é pressionado, utilizando a saturação do alvo que vem com o disparo automático e, ao mesmo tempo, oferecendo pausas para recompensar a mira. Mesmo quando está constantemente atacando, o excelente design da arma proporciona baixo recuo e uma distribuição apertada.\n\n--- STATS ---\nWeight: 2.6 kg\nFire Rate: 700 RPM\nFire Modes: Burst\nAlpha Dmg: 21.0 (Energy)  |  DPS: 245.0\nAmmo: 45\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
item_Descklwe_smg_energy_blue_gold_01=Fabricante: Klaus & Werner\nTipo de Item: SMG\nClasse: Laser\n\nTamanho da Bateria: 45\nCadência de Tiro: 562,5 rpm\nAlcance Efetivo: 25m\n\nAcessórios: Mira (S1), Barril (S1), Acessório Inferior (S1)\n\nA especialista em fabricar armas  Klaus & Werner está mais uma vez em plena exibição para tornar o rifle de energia compacto a laser Lumin V ainda mais mortal e confiável. Um novo modo de “intervalo de disparo automático” dispara barragens de cinco tiros quando o gatilho é pressionado, utilizando a saturação do alvo que vem com o disparo automático e, ao mesmo tempo, proporcionando pausas para recompensar a mira. Mesmo quando está constantemente no ataque, o excelente design da arma proporciona baixo recuo e uma propagação estreita. O ousado esquema de cores azul e dourado confere à edição Valor um apelo valente e digno.\n\n--- STATS ---\nWeight: 2.6 kg\nFire Rate: 700 RPM\nFire Modes: Burst\nAlpha Dmg: 21.0 (Energy)  |  DPS: 245.0\nAmmo: 45\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
item_Descklwe_sniper_energy_01_Luminalia_red01=Fabricante: Klaus & Werner\nTipo de Item: Rifle de Precisão\nClasse: Energia (Laser)\n\nTamanho da Bateria: 20\nCadência de Tiro: 50 rpm\nAlcance Efetivo: 100 m\n\nAcessórios: Mira (S3), Cano (S2), Acessório Inferior (S2)\n\nO rifle de energia de longo alcance Arrowhead Modelo VI da Klaus & Werner apresenta um corpo composto de fibra de vidro que pode suportar qualquer tipo de ambiente hostil, tanto atmosférico quanto externo. Equipada com uma coronha de precisão, uma mira composta e um bipé embutido, a Arrowhead é uma arma estável e destrutiva para usuários que desejam ir longe, mas permanecer na luta. Lançada pela primeira vez durante a Luminalia, a Lamplighter Edition é inspirada na tradicional cor vermelha do feriado.\n\n--- STATS ---\nWeight: 6.8 kg\nFire Rate: 70 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 50.0 (Energy)  |  DPS: 58.3\nAmmo: 16\nVelocity: 1,000 m/s  |  Absolute Range: 4.0 km
item_Descksar_pistol_ballistic_01_IAE2023=Fabricante: Kastak Arms\nTipo de Item: Pistola\nClasse: Balística\n\nTamanho do Carregador: 6\nCadência de Tiro: 180 rpm\nAlcance Efetivo: 100 m\n\nAcessórios: Mira (S1), Cano (S1), Acessório Inferior (S1)\n\nMuitas vezes chamado de "canhão de mão" da Kastak Arms, o Coda pode encerrar um combate com um único projétil de calibre .50, embora a potência substancial possa tornar o recuo do Coda difícil de lidar. Considerando o tamanho limitado do carregador e o coice substancial, o disparo contínuo é desencorajado em favor de tiros únicos mais precisos. Projetada em homenagem ao IAE 2953, a edição Ascension tem detalhes em aço e cobre inspirados na Syulen da Gatac Manufacture.\n\n--- STATS ---\nWeight: 1.3 kg\nFire Rate: 180 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 60.0 (Phys)  |  DPS: 180.0\nAmmo: 6\nVelocity: 550 m/s  |  Absolute Range: 1.1 km\nFull Dmg to: 55 m  |  Drop: -0.20/m  |  Min Dmg: 35.0
item_Descksar_pistol_ballistic_01_headhunters01=Fabricante: Kastak Arms\nTipo de Item: Pistola\nClasse: Balística\n\nTamanho do Carregador: 6\nCadência de Tiro: 180 rpm \nAlcance Efetivo: 100 m\n\nAcessórios: Mira (S1), Cano (S1), Acessório Inferior (S1)\n\nMuitas vezes chamado de "canhão de mão" da Kastak Arms, o Coda é capaz de encerrar uma batalha com um único cartucho calibre .50, embora o recuo do Coda seja difícil de controlar devido ao seu poder considerável. Dado o tamanho limitado do carregador e o recuo significativo, o fogo sustentado é desencorajado em favor de tiros únicos mais precisos. O sempre ousado Isidro “Nighthawk” Renard canalizou essa energia neste design roxo e preto para a linha Legendary Bounty Hunter.\n\n--- STATS ---\nWeight: 1.3 kg\nFire Rate: 180 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 60.0 (Phys)  |  DPS: 180.0\nAmmo: 6\nVelocity: 550 m/s  |  Absolute Range: 1.1 km\nFull Dmg to: 55 m  |  Drop: -0.20/m  |  Min Dmg: 35.0
