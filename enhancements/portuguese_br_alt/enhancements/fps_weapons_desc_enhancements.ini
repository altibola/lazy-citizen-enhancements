item_Descbehr_rifle_ballistic_02_black01=Fabricante: Behring \nTipo de Item: Rifle de Assalto\nClasse: Balístico\n\nTamanho do Carregador: 15\nCadência de Tiro: 475 rpm\nAlcance Efetivo: 100 m\n\nAcessórios: Mira (S2), Cano (S2), Acessório Inferior (S2)\n\nDescendente direto da arma padrão dos fuzileiros navais do UEE, a Behring criou o P8-AR semiautomático para oferecer aos civis de todo o império uma arma simples e confiável para se defenderem de inimigos agressivos. Equipado com uma pintura preta fosca, o rifle da edição especial “Blackguard” é perfeito para operações noturnas.\n\n--- STATS ---\nWeight: 2.4 kg\nFire Rate: 235 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 45.0 (Phys)  |  DPS: 176.2\nAmmo: 15\nVelocity: 1,150 m/s  |  Absolute Range: 2.3 km\nFull Dmg to: 50 m  |  Drop: -0.10/m  |  Min Dmg: 40.0
