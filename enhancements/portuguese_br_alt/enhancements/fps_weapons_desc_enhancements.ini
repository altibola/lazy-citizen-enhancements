item_Desckegr_fire_extinguisher_01=Fabricante: KE Group\nTipo de Item: Extintor de Incêndio\nClasse: Dispositivo\n\nTamanho do Carregador: Cilindro de Gás\nCadência de Tiro: Constante\nAlcance Efetivo: 3-4 m\n\nO extintor de incêndio APX do KE Group foi classificado como o melhor equipamento de segurança de consumo da categoria por mais de uma década, tornando-o o padrão da indústria em prevenção de incêndio. Abastecido com um composto de resfriamento gasoso patenteado, o extintor pode abafar rapidamente qualquer incêndio à vista. A tela digital do dispositivo permite monitorar a temperatura local para ajudar a conter e eliminar riscos de incêndio.\n\n--- STATS ---\nWeight: 3.2 kg\nFire Rate: 600 RPM\nFire Modes: Auto\nAlpha Dmg: 18.0 (Thermal)  |  DPS: 180.0\nAmmo: 3,000\nRegen: 0/s  |  Cooldown: 3.0s  |  Cost/Shot: 1\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
item_Descklwe_lmg_energy_01=Fabricante: Klaus & Werner\nTipo de Item: LMG\nClasse: Energia (Laser)\n\nTamanho da Bateria: 100\nCadência de Tiro: 400 rpm\nAlcance Efetivo: 40 m\n\nAcessórios: Mira (S2), Cano (S2), Acessório Inferior (S3)\n\nKlaus & Werner criou uma arma icônica com a LMG a laser Demeco testada e comprovada. Usada extensivamente em combates militares, essa arma favorita da infantaria de curto a médio alcance foi construída com estabilidade e precisão em primeiro plano.\n\n--- STATS ---\nWeight: 9.8 kg\nFire Rate: 800 RPM\nFire Modes: Auto\nAlpha Dmg: 11.5 (Energy)  |  DPS: 153.3\nAmmo: 100\nVelocity: 600 m/s  |  Absolute Range: 2.4 km
