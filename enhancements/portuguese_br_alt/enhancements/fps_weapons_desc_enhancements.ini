item_Descsasu_pistol_toy_01_shared=Fabricante: Sakura Sun\nTipo de Item: Arma de brinquedo\nGrau: Arrow de espuma\n\nCapacidade do Carregador: 10\nCadência de Tiro: 450 rpm\nAlcance Efetivo: 35m\n\nAtirar com amigos é divertido com o Sakura Sun WowBlast Desperado . Com essas armas de brinquedo de plástico ultracoloridas, você pode disparar dardos de espuma de maneira divertida contra amigos ou inimigos fictícios. Seja para passar o tempo na zona de pouso ou durante uma longa viagem pelas estrelas, a linha de brinquedos WowBlast oferece emoção e entretenimento alegres para toda a família. A arma de brinquedo Desperado está disponível em uma variedade de cores brilhantes, cada uma com um efeito sonoro único!\n\n--- STATS ---\nWeight: 0.1 kg\nFire Rate: 63 RPM\nFire Modes: Semi-Auto\nAmmo: 10\nVelocity: 20 m/s  |  Absolute Range: 300 m
item_Descutfl_crossbow_ballistic_01=Fabricante: UltiFlex\nTipo de Item: Besta\n \nTamanho do Carregador: 5\nCadência de Tiro: 60 rpm\nAlcance Efetivo: 50 m\n \nAcessórios: Mira (S3), Cano Inferior (S3)\n \nOs artesãos da UltiFlex passaram por centenas de protótipos para descobrir o material leve perfeito, com a combinação certa de força e flexibilidade para sua balestra Novian, uma companheira ideal para tudo, desde expedições na fronteira até infiltrações táticas. Com um puxão em sua ação de disparo, a Novian lança, quase em silêncio, um dardo pesado que se estilhaça no impacto, causando danos devastadores a alvos de curto alcance.\n\n--- STATS ---\nWeight: 3.5 kg\nFire Rate: 42 RPM\nFire Modes: Auto\nAlpha Dmg: 133.0 (Energy: 123.0 / Stun: 10.0)  |  DPS: 93.1\nAmmo: 5\nVelocity: 185 m/s  |  Absolute Range: 1.9 km
