item_DescBOMB_S03_FSKI_Thunderball=Fabricante: FireStorm Kinetics\nTipo de Item: Bomba Explosiva\nTamanho: 3\n\nA Thunderball permite que você ataque tropas terrestres de cima a uma distância segura. Apesar de seu pequeno tamanho, essas bombas S3 têm uma carga útil poderosa, permitindo ao usuário implantar múltiplas bombas para dominar um alvo estacionário ou soltá-las em intervalos para atingir alvos em movimento. O Thunderball está equipado com barbatanas Atmo-Xact patenteadas pela FireStorm Kinetics, que são implantadas após o lançamento e fornecem orientação adicional no caminho para o alvo.\n\n--- STATS ---\nWeight: 252.0 kg\nComponent HP: 1,000\nOverheat Temp: 450K
item_DescBOMB_S05_FSKI_Stormburst=Fabricante: FireStorm Kinetics\nTipo de Item: Bomba Explosiva\nTamanho: 5\n\nUse o Stormburst para destruir tropas terrestres pelo ar. Projetadas pela FireStorm Kinetics para maximizar o impacto destrutivo em tamanho moderado, essas bombas S5 apresentam uma munição composta mista que dizima alvos blindados. O Stormburst também utiliza aletas Atmo-Xact patenteadas da FireStorm Kinetics para garantir que a carga útil atinja seu alvo.\n\n--- STATS ---\nWeight: 252.0 kg\nComponent HP: 1,000\nOverheat Temp: 450K
item_DescBOMB_S10_FSKI_Colossus=Fabricante: FireStorm Kinetics\nTipo de Item: Bomba Explosiva\nTamanho: 10\n\nPés subterrâneos não têm chance contra um Colosso. A FireStorm Kinetics projetou esta enorme bomba S10 para destruir alvos terrestres, sejam eles veículos ou estruturas. Destinado a lançamentos em grandes altitudes, o Colossus possui barbatanas patenteadas Atmo-Xact que são implantadas no caminho até o alvo para fornecer orientação adicional.\n\n--- STATS ---\nWeight: 951.0 kg\nComponent HP: 1,000\nOverheat Temp: 450K
