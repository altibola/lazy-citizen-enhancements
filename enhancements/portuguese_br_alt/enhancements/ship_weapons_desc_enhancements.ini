item_DescMISL_S01_IR_VNCL_Arrow=Fabricante: Vanduul\nSinal de Rastreamento: Infravermelho\nTamanho: 1\n\nComumente conhecido por sua designação militar, o Arrow é um pequeno míssil infravermelho que se tornou uma parte importante do armamento Vanduul.\n\n--- STATS ---\nWeight: 70.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S02_CS_FSKI_Tempest=Fabricante: Firestorm Kinetics\nSinal de Rastreamento: Seção Transversal\nTamanho: 2\n\nO Tempest foi projetado com nada além de destruição em mente. Usando a tecnologia de mira da FireStorm Kinetics, este míssil de proximidade captura a seção transversal de um alvo para encerrar rapidamente o conflito.\n\n--- STATS ---\nWeight: 121.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S02_CS_THCN_StrikeForce=Fabricante: Thermyte Concern\nSinal de Rastreamento: Seção Transversal\nTamanho: 2\n\nO StrikeForce é o mais recente culminar da expansão da Thermyte Concern na indústria de mísseis e apresenta melhorias notáveis no design e seção transversal de aquisição de alvos.\n\n--- STATS ---\nWeight: 72.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S02_EM_TALN_Dominator=Fabricante: Talon\nSinal de Rastreamento: Eletromagnético\nTamanho: 2\n\nProjetado para detectar a assinatura eletromagnética do inimigo, o míssil Dominator é uma arma de precisão projetada para garantir o domínio tático no campo de batalha.\n\n--- STATS ---\nWeight: 136.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S02_IR_FSKI_Ignite=Fabricante: Firestorm Kinetics\nSinal de Rastreamento: Infravermelho\nTamanho: 2\n\nO Ignite é a primeira marca de míssil de busca de calor da Firestorm que é a definição de "dispare e esqueça". Apenas deixe-os voar e aproveite o show.\n\n--- STATS ---\nWeight: 113.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S02_IR_NOVP_Rattler=Fabricante: Nova Pyrotechnica\nSinal de Rastreamento: Infravermelho\nTamanho: 2\n\nO Rattler é um míssil cluster de baixo custo que sem dúvida atrairá uma ampla gama de pilotos. Quando disparado, o Rattler detecta a assinatura IV do inimigo e cria uma barragem de abertura que enfraquece a armadura ou escudos, deixando o alvo vulnerável à carga total que se segue.\n\n--- STATS ---\nWeight: 133.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S02_IR_VNCL_Bullet=Fabricante: Vanduul\nSinal de Rastreamento: Infravermelho\nTamanho: 2\n\nOs pilotos da Marinha desenvolveram um respeito saudável por este míssil teleguiado infravermelho Vanduul, oficialmente conhecido como Bullet.\n\n--- STATS ---\nWeight: 113.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S03_CS_FSKI_Arrester=Fabricante: Firestorm Kinetics\nSinal de Rastreamento: Seção Transversal\nTamanho: 3\n\nO míssil de proximidade Firestorm Arrester usa mira de seção transversal para caçar suas presas, despachando rapidamente os inimigos em sua mira.\n\n--- STATS ---\nWeight: 119.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S03_EM_FSKI_Thunderbolt=Fabricante: Firestorm Kinetics\nSinal de Rastreamento: Eletromagnético\nTamanho: 3\n\nA estrutura manobrável do Firestorm Thunderbolt e o sistema de mira EM tornam este míssil de proximidade uma escolha sólida para uma variedade de cenários de combate.\n\n--- STATS ---\nWeight: 119.0 kg\nComponent HP: 25\nOverheat Temp: 450K
