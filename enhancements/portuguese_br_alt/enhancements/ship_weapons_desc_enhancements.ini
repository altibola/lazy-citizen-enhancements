item_DescBEHR_LaserCannon_S7=Fabricante: Behring\nTipo de Item: Canhão Laser\nTamanho: 7\n\nAtaque os corações de seus inimigos com o efeito devastador do canhão automático de energia M9A de Behring. Quando totalmente carregada, o enorme poder de parada desta arma laser tem o potencial de paralisar até mesmo naves capitais.\n\n--- STATS ---\nWeight: 6870000.0 kg\nFire Rate: 10 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 200,000.0 (Phys)  |  DPS: 33,333.3\nAmmo: 21\nVelocity: 924 m/s  |  Range: 12.0 km\nPower Draw: 6 PU/s\nComponent HP: 708,660\nSignatures:  EM: 3,020  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_LaserCannon_SF7E_S7=Fabricante: Behring\nTipo de Item: Canhão Laser\nTamanho: 7\n\nEngenheiros de Behring e Crusader trabalharam juntos para fazer do Canhão Laser SF7E a arma ideal para a Ares Ion Star Fighter. Graças a um casco feito sob medida, a enorme arma se encaixa perfeitamente no casco da nave. O SF7E é ideal para batalhas de longo alcance com naves espaciais grandes e importantes. Sua impressionante precisão e alto dano por tiro fazem deles uma arma devastadora nas mãos de um atirador habilidoso.\n\n--- STATS ---\nWeight: 35200.0 kg\nFire Rate: 55 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 5,150.0 (Energy)  |  DPS: 4,720.8\nAmmo: 25\nRegen: 21,355/s  |  Cooldown: 1.9s  |  Cost/Shot: 1,200\nVelocity: 1,048 m/s  |  Range: 7.3 km\nPower Draw: 3 PU/s\nComponent HP: 6,750\nSignatures:  EM: 1,450  |  IR: 0\nOverheat Temp: 450K
