item_DescGMISL_S01_CS_FSKI_Spark=Fabricante: Firestorm Kinetics \nSinal de Rastreamento: Seção Transversal (CS) \nTamanho: 1 \n\nAqueles que acreditam que o tamanho não importa fariam bem em manter distância do Firestorm Kinetics Spark. Utilizando rastreamento por seção transversal, este míssil de proximidade leve possui um impacto considerável. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 63.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S01_EM_BEHR_Pioneer=Fabricante: Behring \nSinal de Rastreamento: Eletromagnético (EM) \nTamanho: 1 \n\nA Behring orgulha-se da confiabilidade e o Pioneer não é exceção. O sistema de rastreamento EM Oracle atualizado provou seu valor repetidas vezes em inúmeros relatórios de testes de consumidores contra mísseis de proximidade de classe similar. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 51.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S01_EM_THCN_TaskForce=Fabricante: Thermyte Concern \nSinal de Rastreamento: Eletromagnético (EM) \nTamanho: 1 \n\nAventurando-se no mercado de armas, a Thermyte Concern reuniu seu amplo conhecimento em explosivos de demolição para criar o TaskForce. Um míssil de ataque leve com rastreamento EM e um sistema de propulsão de ponta que oferece uma mistura eficiente de velocidade e poder de fogo para estabelecer dominância no campo de batalha. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 25.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S01_IR_BEHR_Marksman=Fabricante: Behring \nSinal de Rastreamento: Infravermelho (IR) \nTamanho: 1 \n\nA série de mísseis de proximidade Marksman da Behring conquistou tanta reputação por sua capacidade de rastrear uma ampla gama de assinaturas de calor quanto por seu dano de proximidade com efeito de área. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 56.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S02_CS_FSKI_Tempest=Fabricante: Firestorm Kinetics \nSinal de Rastreamento: Seção Transversal (CS) \nTamanho: 2 \n\nO Tempest foi projetado com nada além de aniquilação em mente. Utilizando a tecnologia de rastreamento da Firestorm Kinetics, este míssil de proximidade trava na seção transversal do alvo para levar os conflitos a uma conclusão rápida. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 121.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S02_CS_THCN_StrikeForce=Fabricante: Thermyte Concern \nSinal de Rastreamento: Seção Transversal (CS) \nTamanho: 2 \n\nO StrikeForce é o culminar mais recente da expansão da Thermyte Concern na indústria de mísseis, apresentando melhorias notáveis em design e rastreamento por seção transversal. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 72.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S02_EM_TALN_Dominator=Fabricante: Talon \nSinal de Rastreamento: Eletromagnético (EM) \nTamanho: 2 \n\nProjetado para rastrear a assinatura eletromagnética de um oponente, o míssil de ataque Dominator é um pacote de munição de precisão projetado para estabelecer dominância tática no campo de batalha. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 136.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S02_IR_FSKI_Ignite=Fabricante: Firestorm Kinetics \nSinal de Rastreamento: Infravermelho (IR) \nTamanho: 2 \n\nO Ignite é a marca principal de mísseis de ataque guiados por calor da Firestorm, sendo a definição de "Dispare e Esqueça". Basta deixá-lo voar e aproveitar o show. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 113.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S03_EM_FSKI_Thunderbolt=Fabricante: Firestorm Kinetics \nSinal de Rastreamento: Eletromagnético (EM) \nTamanho: 3 \n\nGraças à estrutura ágil e ao sistema de rastreamento EM do Firestorm Thunderbolt, este míssil de proximidade é uma escolha sólida para uma ampla variedade de cenários de combate. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 449.0 kg\nComponent HP: 1,000\nOverheat Temp: 450K
item_DescGMISL_S03_IR_NOVP_Viper=Fabricante: Nova Pyrotechnica \nSinal de Rastreamento: Infravermelho (IR) \nTamanho: 3 \n\nA Nova trabalhou duro para garantir que seu míssil de ataque Viper com rastreamento infravermelho fizesse jus ao nome, entregando ataques ágeis e letais contra alvos hostis. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 133.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S04_CS_TALN_Assailant=Fabricante: Talon \nSinal de Rastreamento: Seção Transversal (CS) \nTamanho: 4 \n\nO míssil Assailant da Talon é uma solução de armamento perfeita para ataques de precisão contra oponentes motivados. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 224.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S04_IR_BEHR_Pathfinder=Fabricante: Behring \nSinal de Rastreamento: Infravermelho (IR) \nTamanho: 4 \n\nO míssil de proximidade Pathfinder tem sido um membro constante do já robusto arsenal da Behring, graças ao seu sistema de propulsão testado e aprovado e sua matriz de orientação por calor. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 203.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S05_CS_TALN_Stalker=Fabricante: Talon \nSinal de Rastreamento: Seção Transversal (CS) \nTamanho: 5 \n\nCom rastreamento dedicado por seção transversal, o Talon Stalker perdurou ao longo dos anos como um torpedo de ataque de precisão com máximo poder de parada. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 303.0 kg\nComponent HP: 50\nOverheat Temp: 450K
item_DescGMISL_S05_EM_TALN_Reaper=Fabricante: Talon \nSinal de Rastreamento: Eletromagnético (EM) \nTamanho: 5 \n\nO torpedo de ataque Reaper apresenta uma proporção favorável de rendimento destrutivo em relação ao custo e um conjunto de rastreamento EM comprovado da Talon. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 326.0 kg\nComponent HP: 50\nOverheat Temp: 450K
item_DescGMISL_S05_EM_TALN_Scimitar=Fabricante: Talon \nSinal de Rastreamento: Eletromagnético (EM) \nTamanho: 5 \n\nO míssil Scimitar rastreia alvos através de sua assinatura EM para entregar uma carga devastadora de tamanho cinco. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 314.0 kg\nComponent HP: 50\nOverheat Temp: 450K
item_DescGMISL_S05_IR_TALN_Valkyrie=Fabricante: Talon \nSinal de Rastreamento: Infravermelho (IR) \nTamanho: 5 \n\nA equipe de design de torpedos da Talon não mediu esforços para o seu mais recente torpedo de ataque Valkyrie, criando uma solução de empuxo multinível com capacidades de rastreamento infravermelho de última geração. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 314.0 kg\nComponent HP: 50\nOverheat Temp: 450K
item_DescGMISL_S07_IR_TALN_Hellion=Fabricante: Talon \nSinal de Rastreamento: Infravermelho (IR) \nTamanho: 7 \n\nCarregando uma carga considerável e um conjunto avançado de sensores de busca de calor, o míssil Hellion da Talon pode ser eficaz contra agressores de todos os tamanhos. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 452.0 kg\nComponent HP: 200\nOverheat Temp: 450K
item_DescGMISL_S09_CS_TALN_Argos=Fabricante: Talon \nSinal de Rastreamento: Seção Transversal (CS) \nTamanho: 9 \n\nO torpedo de ataque Talon Argos apresenta um design clássico e direto que conta com padrões de fabricação rigorosos e um sistema de rastreamento por seção transversal clássico. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 449.0 kg\nComponent HP: 667\nOverheat Temp: 450K
item_DescGMISL_S09_EM_TALN_Seeker=Fabricante: Talon \nSinal de Rastreamento: Eletromagnético (EM) \nTamanho: 9 \n\nO torpedo Seeker da Talon é um torpedo de precisão com rastreamento EM, capaz de entregar uma carga massiva de forma rápida e precisa. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 447.0 kg\nComponent HP: 667\nOverheat Temp: 450K
item_DescGMISL_S09_IR_TALN_Typhoon=Fabricante: Talon \nSinal de Rastreamento: Infravermelho (IR) \nTamanho: 9 \n\nProjetado pela Talon, o torpedo de ataque Typhoon com busca de calor entrega uma carga pesada que certamente servirá como um dissuasor contra quaisquer outras ações hostis. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 452.0 kg\nComponent HP: 667\nOverheat Temp: 450K
item_DescGRIN_TractorBeam_002_shared=Fabricante: Greycat Industrial\nTipo de Item: Raio Trator\nÂngulo Máximo: 60°\nAlcance Máximo: 150 m\nDistância de Força Total: 75 m\n\nApoiado por sua garantia certificada Soft-Touch®, o feixe de tração SureGrip da Greycat é um dos pilares de seu catálogo de produtos graças ao seu alcance e controle confiáveis.\n\n--- STATS ---\nWeight: 100.0 kg\nFire Modes: Raio Trator\nAmmo: 0\nVelocity: 0 m/s  |  Range: 0 m\nPower Draw: 3 PU/s\nComponent HP: 1,050\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescGRIN_TractorBeam_002_shared_UT1=Fabricante: Greycat Industrial\nTipo de Item: Raio do Trator\nÂngulo Máximo: 60°\nAlcance Máximo: 130 m\nDistância de Força Total: 55 m\n\nEsta variante para serviço pesado do feixe de tração SureGrip da Greycat sacrifica o alcance em troca de potência adicional para lidar com objetos maiores e mais pesados, tornando-o uma ferramenta essencial em uma variedade de aplicações industriais.\n\n--- STATS ---\nWeight: 100.0 kg\nFire Modes: Raio Trator\nAmmo: 0\nVelocity: 0 m/s  |  Range: 0 m\nPower Draw: 3 PU/s\nComponent HP: 1,050\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescGRIN_TractorBeam_002_shared_UT2=Fabricante: Greycat Industrial\nÂngulo Máximo: 80°\nAlcance Máximo: 130 m\nDistância de Força Total: 55 m\n\nEssa variante de precisão do feixe de tração SureGrip da Greycat sacrifica parte da potência e do alcance do modelo básico em troca de um ângulo mais amplo de manipulação e maior aderência do cabo, permitindo o manuseio cuidadoso de mercadorias mais delicadas.\n\n--- STATS ---\nWeight: 100.0 kg\nFire Modes: Raio Trator\nAmmo: 0\nVelocity: 0 m/s  |  Range: 0 m\nPower Draw: 3 PU/s\nComponent HP: 1,050\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescGRIN_TractorBeam_003_shared=Fabricante: Greycat Industrial\nTipo de Item: Raio do Trator\nÂngulo Máximo: 80°\nAlcance Máximo: 135 m\nDistância de Força Total: 50 m\n\nO feixe de tração ViseLock é uma evolução da tecnologia padrão do setor da Greycat, com melhorias adicionais destinadas especificamente a ajudar as forças de segurança a conter seus alvos. Em seu design, a Greycat sacrificou um pouco da força de retenção em distâncias maiores para obter uma corda mais potente e mais difícil de escapar.\n\n--- STATS ---\nWeight: 100.0 kg\nFire Modes: Raio Trator\nAmmo: 0\nVelocity: 0 m/s  |  Range: 0 m\nPower Draw: 3 PU/s\nComponent HP: 1,050\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescGRIN_TractorBeam_004_S3=Fabricante: Greycat Industrial\nTipo de Item: Raio de Reboque\nÂngulo Máximo: 160°\nAlcance Máximo: 250 m\nDistância de Força Total: 200 m\n\nA escolha segura das equipes de recuperação em todo o império, o raio de reboque SafeTow da Greycat Industrial possui força, potência e controle suficientes para transportar cargas pesadas e veículos em todo o 'verso'.\n\n--- STATS ---\nWeight: 100.0 kg\nFire Modes: Raio Trator\nAmmo: 0\nVelocity: 0 m/s  |  Range: 0 m\nPower Draw: 3 PU/s\nComponent HP: 1,050\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescGRIN_TractorBeam_S1=Fabricante: Greycat Industrial\nTipo de Item: Trator Beam\n\nA mais nova adição da Greycat à sua linha de tratores comprovada em campo é uma adição confiável ao seu catálogo. Além de uma relação pull/pull mais eficiente, o modelo mais recente difere pouco dos modelos anteriores. O SureGrip é ajustado para mirar e extrair tudo, desde fragmentos de asteroides até membros da tripulação à deriva, apoiado pela garantia certificada Soft-Touch® da Greycat.\n\n--- STATS ---\nWeight: 200.0 kg\nFire Modes: Raio Trator\nAmmo: 0\nVelocity: 0 m/s  |  Range: 0 m\nPower Draw: 4 PU/s\nComponent HP: 1,050\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_BallisticCannon_S7=Tipo de Item: Torreta de Canhão Balístico\nFabricante: Hurston Dynamics\nTamanho: 7\n\nLeve sua conquista aos céus com o canhão balístico Conqueror-7 da Hurston Dynamics. Feitos sob medida para a torreta dorsal da Idris da Aegis, esses canhões são capazes de atingir naves maiores à distância, encerrando combates antes mesmo de começarem.\n\n--- STATS ---\nWeight: 115.0 kg\nFire Rate: 50 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 4,000.0 (Phys)  |  DPS: 3,333.3\nAmmo: 800\nVelocity: 1,048 m/s  |  Range: 9.1 km\nPower Draw: 0 PU/s\nComponent HP: 6,750\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserBeam_S10_Bespoke=Fabricante: Hurston Dynamics\nTipo: Feixe Laser\nTamanho: 10\n\nDesenvolvida em conjunto com os engenheiros da Aegis, esta arma de feixe de laser sob medida da Hurston Dynamics é altamente precisa, oferecendo à Idris-K uma arma devastadora em seu arsenal.\n\n--- STATS ---\nAmmo: 60\nRegen: 1,700/s  |  Cooldown: 5.0s  |  Cost/Shot: 43\nVelocity: 1,200 m/s  |  Range: 8.0 km\nPower Draw: 1 PU/s\nComponent HP: 750,000\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserRepeater_S1=Fabricante: Hurston Dynamics\nTipo de Item: Repetidor Laser\nTamanho: 1\n\nO repetidor laser Attrition-1 apresenta a tecnologia em cascata exclusiva da Hurston Dynamics, que fornece maior desempenho enquanto mantém o disparo do laser consistente. O resultado é uma arma tamanho 1 que recompensa um operador habilidoso.\n\n--- STATS ---\nWeight: 24.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 34.0 (Energy)  |  DPS: 198.3\nAmmo: 75\nRegen: 2,155/s  |  Cooldown: 0.7s  |  Cost/Shot: 37\nVelocity: 1,500 m/s  |  Range: 1.6 km\nPower Draw: 0 PU/s\nComponent HP: 524\nSignatures:  EM: 167  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserRepeater_S2=Fabricante: Hurston Dynamics\nTipo de Item: Repetidor Laser\nTamanho: 2\n\nQuando a batalha esquenta, a tecnologia de laser em cascata da Hurston Dynamics realmente se destaca. O repetidor Attrition-2 de tamanho dois permite que um operador use rajadas sustentadas de tiro de laser para converter o excesso de calor em maior poder de arma.\n\n--- STATS ---\nWeight: 60.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 55.0 (Energy)  |  DPS: 320.8\nAmmo: 75\nRegen: 3,232/s  |  Cooldown: 0.7s  |  Cost/Shot: 55\nVelocity: 1,495 m/s  |  Range: 1.7 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 223  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserRepeater_S3=Fabricante: Hurston Dynamics\nTipo de Item: Repetidor Laser\nTamanho: 3\n\nEm vez de limitar o poder da arma para aumentar a estabilidade, a tecnologia em cascata da Hurston Dynamics dá ao operador a escolha. Embora o superaquecimento seja um risco, o fogo contínuo prolongado com o Repetidor Laser Attrition-3 aumenta o desempenho à medida que o excesso de calor é convertido em maior produção de energia.\n\n--- STATS ---\nWeight: 150.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 86.0 (Energy)  |  DPS: 501.7\nAmmo: 75\nRegen: 4,853/s  |  Cooldown: 0.7s  |  Cost/Shot: 84\nVelocity: 1,480 m/s  |  Range: 1.9 km\nPower Draw: 1 PU/s\nComponent HP: 1,024\nSignatures:  EM: 278  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserRepeater_S4=Fabricante: Hurston Dynamics\nTipo de Item: Amplificador Laser\nTamanho: 4\n\nA Hurston Dynamics integrou totalmente sua tecnologia de laser em cascata em sua linha de amplificadores Attrition. O Tamanho 4 Attrition-4 não é exceção, operando com desempenho máximo à medida que se aproxima de sua capacidade térmica máxima.\n\n--- STATS ---\nWeight: 375.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 150.0 (Energy)  |  DPS: 875.0\nAmmo: 75\nRegen: 3,000/s  |  Cooldown: 0.8s  |  Cost/Shot: 125\nVelocity: 1,440 m/s  |  Range: 2.2 km\nPower Draw: 1 PU/s\nComponent HP: 1,650\nSignatures:  EM: 334  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserRepeater_S5=Fabricante: Hurston Dynamics\nTipo de Item: Repetidor Laser\nTamanho: 5\n\nO Attrition-5 da Hurston Dynamics é mais do que um simples repetidor laser tamanho 5. Possui tecnologia avançada em cascata que permite que a arma melhore seu desempenho significativamente quanto mais tempo ela mantiver sua produção de energia.\n\n--- STATS ---\nWeight: 938.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 150.0 (Energy)  |  DPS: 875.0\nAmmo: 75\nRegen: 10,914/s  |  Cooldown: 0.8s  |  Cost/Shot: 187\nVelocity: 1,390 m/s  |  Range: 3.2 km\nPower Draw: 1 PU/s\nComponent HP: 2,640\nSignatures:  EM: 390  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserRepeater_S6=Fabricante: Hurston Dynamics\nTipo de Item: Repetidor Laser\nTamanho: 6\n\nCom a tecnologia em cascata da Hurston Dynamics, o repetidor laser Attrition-6 maximiza seu potencial de combate. É comum que as armas aqueçam sob uso pesado em combate, mas o que diferencia este repetidor de tamanho 6 dos outros é que a energia térmica é traduzida diretamente em maior poder ofensivo.\n\n--- STATS ---\nWeight: 2340.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 505.4 (Energy)  |  DPS: 2,947.9\nAmmo: 75\nRegen: 16,377/s  |  Cooldown: 0.8s  |  Cost/Shot: 281\nVelocity: 1,350 m/s  |  Range: 4.8 km\nPower Draw: 1 PU/s\nComponent HP: 4,224\nSignatures:  EM: 446  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserScattergun_S1=Fabricante: Hurston Dynamics\nTipo de Item: Espingarda Laser\nTamanho: 1\n\nGraças à integração da tecnologia de cascata de laser da Hurston Dynamics, a Espingarda Dominance-1 é capaz de causar mais danos quanto mais próximo o tamanho da arma estiver. sua capacidade máxima de calor segura.\n\n--- STATS ---\nWeight: 48.0 kg\nFire Rate: 50 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 504.0 x8 (Energy)  |  DPS: 420.0\nAmmo: 75\nRegen: 1,867/s  |  Cooldown: 0.3s  |  Cost/Shot: 70\nVelocity: 900 m/s  |  Range: 999 m\nPower Draw: 1 PU/s\nComponent HP: 1,550\nSignatures:  EM: 248  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserScattergun_S2=Fabricante: Hurston Dynamics\nTipo de Item: Espingarda Laser\nTamanho: 2\n\nQuanto mais difícil a luta, mais difícil a Espingarda Dominance-2 funciona. À medida que as térmicas aumentam, a arma Tamanho 2 da Hurston Dynamics é capaz de utilizar a tecnologia em cascata para transformar o potencial térmico em um ataque de curto alcance ainda mais mortal.\n\n--- STATS ---\nWeight: 120.0 kg\nFire Rate: 50 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 792.0 x8 (Energy)  |  DPS: 660.0\nAmmo: 75\nRegen: 2,933/s  |  Cooldown: 0.3s  |  Cost/Shot: 110\nVelocity: 897 m/s  |  Range: 1.1 km\nPower Draw: 1 PU/s\nComponent HP: 1,550\nSignatures:  EM: 330  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserScattergun_S3=Fabricante: Hurston Dynamics\nTipo de Item: Espingarda Laser\nTamanho: 3\n\nA Espingarda Dominance-3 da Hurston Dynamics é um exemplo da tecnologia em cascata do fabricante de armas. Quanto mais o operador disparar a arma tamanho 3, melhor poderá converter o calor gerado em ataques cada vez mais devastadores.\n\n--- STATS ---\nWeight: 300.0 kg\nFire Rate: 50 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 1,116.0 x8 (Energy)  |  DPS: 930.0\nAmmo: 75\nRegen: 4,133/s  |  Cooldown: 0.4s  |  Cost/Shot: 155\nVelocity: 888 m/s  |  Range: 1.2 km\nPower Draw: 1 PU/s\nComponent HP: 1,550\nSignatures:  EM: 413  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_Nova_BallisticCannon_S5=Fabricante: Hurston Dynamics\nTipo de Item: Canhão Balístico\nTamanho: 5\n\nO canhão balístico Slayer da Hurston Dynamics foi desenvolvido especificamente para o tanque Nova e ganhou uma excelente reputação em inúmeras batalhas durante a Segunda Guerra Tevarin. Esta fera do campo de batalha se destaca contra alvos blindados e posições fortificadas, disparando projéteis de artilharia de grande calibre com incrível precisão e velocidade. Hurston trabalhou em estreita colaboração com Tumbril quando o fabricante do tanque decidiu reviver o Nova. Embora tenham mantido cuidadosamente o design original do Slayer, Hurston o atualizou para o século 30, melhorando a velocidade de movimento panorâmico, a resistência ao calor e o software associado para criar uma interface de usuário de ponta para o atirador.\n\n--- STATS ---\nWeight: 7500.0 kg\nFire Rate: 12 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 13,500.0 (Phys)  |  DPS: 2,700.0\nAmmo: 363\nVelocity: 973 m/s  |  Range: 6.0 km\nPower Draw: 0 PU/s\nComponent HP: 20,000\nSignatures:  EM: 50  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_Pyro_LaserRepeater_S1=Fabricante: Hurston Dynamics\nTipo de Item: Repetidor Laser\nTamanho: 1\n\nEste repetidor laser Ardor-1 foi recuperado no sistema Pyro. Fabricado pela primeira vez em 2724, a série Ardor tornou-se popular por seu design de cano dividido que ajudava a atenuar o calor ao sustentar o fogo. A Hurston acabou parando de fabricar a arma em favor da linha Attrition de repetidores laser. Apesar dos efeitos do tempo e do uso constante, a arma ainda é procurada por causa do desempenho consistente proporcionado pelo design especializado e pela construção sólida da Hurston Dynamic.\n\n--- STATS ---\nWeight: 24.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 36.0 (Energy)  |  DPS: 210.0\nAmmo: 75\nRegen: 1,875/s  |  Cooldown: 0.7s  |  Cost/Shot: 64\nVelocity: 1,500 m/s  |  Range: 1.6 km\nPower Draw: 0 PU/s\nComponent HP: 524\nSignatures:  EM: 167  |  IR: 0\nOverheat Temp: 450K
