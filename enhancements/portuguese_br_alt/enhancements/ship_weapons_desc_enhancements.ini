item_Mining_MiningLaser_Drake_Default_S0_Desc=Fabricante: Drake Interplanetary\nTipo de Item: Laser de Mineração\nTamanho: 1\n\nAlcance Ideal: 40m\nAlcance Máximo: 45m\nPotência do Laser de Mineração: 3150\n\nSlots  de Módulo: 2\n\nResistência: +25%\nInstabilidade do Laser: +35%\nNível de Material Inerte: -30%\nTaxa da Janela de Carga Ideal: -40%\n\nPersonalizado para a Drake Golem, esse laser de mineração foi projetado para aqueles que estão começando uma carreira na mineração. Ele foi cuidadosamente calibrado para garantir uma experiência fácil para o operador e reduzir a probabilidade de acidentes catastróficos.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,150  |  Range: 40m→45m\n<EM4>Extraction:</EM4>  DPS: 1,295  |  Range: 40m→45m\n<EM4>Modifiers:</EM4>  Instability: +35%  |  Optimal Charge Window: +40%  |  Resistance: +25%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Greycat_1_S1_Desc=Fabricante: Greycat Industrial\nTipo de Item: Laser de mineração \nTamanho: 1\n\nAlcance ideal: 30m\nAlcance máximo: 90m\n\nPotência do Laser de Mineração: 504 - 2520\nPotência do laser de extração: 1850\n\nSlots de módulo: 1\n\nInstabilidade do laser: -10%\nTaxa ideal da janela de carga: +40%\nMateriais inertes: -30%\n\nTamanho Ideal da Janela de Carga: -60%\n\nA Greycat classifica o Lancet MH1 como um laser de suporte, melhor usado ao minerar com outros. Embora a pequena janela de carga ideal do laser de mineração signifique que a precisão é fundamental, o Lancet MH1 é excelente na redução da quantidade de materiais inertes coletados pelo laser de extração. Para equipes de mineração, é um laser de suporte ideal que pode ser usado junto com outros lasers.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 2,520  |  Range: 30m→90m\n<EM4>Extraction:</EM4>  DPS: 1,850  |  Range: 30m→90m\n<EM4>Modifiers:</EM4>  Instability: -10%  |  Optimal Charge Window: -60%  |  Inert Filter: +30%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Greycat_1_S2_Desc=Fabricante: Greycat Industrial\nTipo de Item: Laser de mineração \nTamanho: 2\n\nAlcance ideal: 45m\nAlcance máximo: 135m\n\nPotência do Laser de Mineração: 900 - 3600\nPotência do laser de extração: 2590\n\nSlots de módulo: 2\n\nEstabilidade do laser: -10%\nTaxa ideal da janela de carga: +40%\nMateriais inertes: -40%\n\nTamanho Ideal da Janela de Carga: -60%\n\nA Greycat classifica o Lancet MH2 como um laser de suporte, melhor usado ao minerar com outros. Embora a pequena janela de carga ideal do laser de mineração exija precisão, o Lancet MH2 preenche a janela assim que a encontra, reduzindo a quantidade de inertes coletados pelo laser de extração. Para equipes de mineração, é um laser de suporte ideal que pode ser usado junto com outros lasers.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,600  |  Range: 45m→135m\n<EM4>Extraction:</EM4>  DPS: 2,590  |  Range: 45m→135m\n<EM4>Modifiers:</EM4>  Instability: -10%  |  Optimal Charge Window: -60%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Greycat_Default_S0_Desc=Fabricante: Greycat Industrial\nTipo de Item: Laser de mineração \nTamanho: 0\n\nAlcance ideal: 15m\nAlcance máximo: 20m\nTaxa de transferência de coleta: 0,01 SCU/s\nRaio do ponto de coleta: 1m\n\nO Arbor é graças a os padrões exigentes e as habilidades empreendedoras da Greycat Industrial tornaram-se o laser de mineração mais famoso do universo. O MHV pega o mesmo design clássico e o redesenha para uma plataforma de mineração mais compacta, ao mesmo tempo em que oferece o desempenho sólido e confiável em que os mineradores confiam.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 1  |  Range: 5m→15m\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Greycat_Default_S1_Desc=Fabricante: Greycat Industrial\nTipo de Item: Laser de mineração \nTamanho: 1\n\nAlcance ideal: 60m\nAlcance máximo: 180m\n\nPotência do Laser de Mineração: 189 - 1890\nPotência do laser de extração: 1850\n\nSlots de módulo: 1\n\nInstabilidade do Las: -35%\nTamanho Ideal da Janela de Carga: +40%\nMateriais inertes: -30%\n\nResistência: +25%\n\nO Arbor MH1 se tornou o laser de mineração mais conhecido em o universo graças aos padrões exigentes e ao conhecimento de negócios da Greycat Industrial. O laser tem sido bem recebido pelas operações industriais e individuais porque oferece equilíbrio entre velocidade e segurança e também possui um sistema de filtro especial que reduz a quantidade de material inerte coletado. A Greycat capitalizou essa reputação e garantiu contratos exclusivos que tornaram o Arbor MH1 o cabeçote laser padrão na maioria das naves de mineração.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 1,890  |  Range: 60m→180m\n<EM4>Extraction:</EM4>  DPS: 1,850  |  Range: 60m→180m\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Greycat_Default_S2_Desc=Fabricante: Greycat Industrial\nTipo de Item: Laser de mineração \nTamanho: 2\n\nAlcance ideal: 90m\nAlcance máximo: 270m\n\nPotência do Laser de Mineração: 480 - 2400\nPotência do laser de extração: 2590\n\nSlots de módulo: 2\n\nLas instabilidade: -35%\nTamanho Ideal da Janela de Carga: +40%\nMateriais inertes: -40%\n\nResistência: +25%\n\nO Arbor MH2 é a versão tamanho dois do aclamado sistema de mineração Arbor da Greycat série laser. Assim como a versão menor, o Arbor MH2 impressiona pelo seu design sólido e confiável que oferece equilíbrio entre velocidade e segurança, além de um sistema de filtro especial que reduz a quantidade de material inerte coletado.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 2,400  |  Range: 90m→270m\n<EM4>Extraction:</EM4>  DPS: 2,590  |  Range: 90m→270m\n<EM4>Modifiers:</EM4>  Instability: -35%  |  Optimal Charge Window: +40%  |  Resistance: +25%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Shubin_1_S1_Desc=Fabricante: Shubin Interstellar\nTipo de Item: Laser de mineração \nTamanho: 1\n\nAlcance ideal: 45m\nAlcance máximo: 135m\n\nPotência do Laser de Mineração: 105 - 2100\nPotência do laser extrator: 1295\n\nSlots de módulo: 1\n\nResistência W: -30%\nTaxa de janela de carga ideal: +20%\nMateriais inertes: -30%\n\nInstabilidade do laser: +10%\n\nO Hofstede-S1 foi desenvolvido com uma estrutura de rede de cristal patenteada que amortece e absorve menos substâncias inertes durante a degradação. O laser é mais eficaz em distâncias curtas e médias, mas deve ser usado com cautela devido ao aumento da instabilidade associado.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 2,100  |  Range: 45m→135m\n<EM4>Extraction:</EM4>  DPS: 1,295  |  Range: 45m→135m\n<EM4>Modifiers:</EM4>  Instability: +10%  |  Optimal Charge Window: +60%  |  Resistance: -30%  |  Inert Filter: +30%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Shubin_1_S2_Desc=Fabricante: Shubin Interstellar\nTipo de Item: Laser de mineração \nTamanho: 2\n\nAlcance ideal: 60m\nAlcance máximo: 180m\n\nPotência do Laser de Mineração: 336 - 3360\nPotência do laser extrator: 1295\n\nSlots de módulo: 2\n\nResistência W: -30%\nTaxa de janela de carga ideal: +20%\nMateriais inertes: -40%\n\nInstabilidade do laser: +10%\n\nO Hofstede-S2 foi desenvolvido com uma estrutura de rede de cristal patenteada que amortece e coleta menos substâncias inertes durante a degradação. O laser é mais eficaz em distâncias curtas e médias, mas deve ser usado com cautela devido ao aumento da instabilidade associado.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,360  |  Range: 60m→180m\n<EM4>Extraction:</EM4>  DPS: 1,295  |  Range: 60m→180m\n<EM4>Modifiers:</EM4>  Instability: +10%  |  Optimal Charge Window: +60%  |  Resistance: -30%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Shubin_2_S1_Desc=Fabricante: Shubin Interstellar\nTipo de Item: Laser de mineração \nTamanho: 1\n\nAlcance ideal: 45m\nAlcance máximo: 135m\n\nPotência do Laser de Mineração: 378 - 2220\nPotência do laser extrator: 2220\n\nSlots de módulo: 0\n\nResistência W: -45%\nTamanho Ideal da Janela de Carga: +20%\nMateriais inertes: -30%\n\nInstabilidade do laser: +35%\n\nShubin projetou o Klein-S1 para produzir um laser poderoso que acelera a degradação. Este poder acarreta riscos adicionais, pois aumenta a instabilidade do laser, mas quando usado corretamente, o Klein-S1 pode rapidamente se tornar uma vantagem para o minerador cauteloso.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 2,520  |  Range: 45m→135m\n<EM4>Extraction:</EM4>  DPS: 2,220  |  Range: 45m→135m\n<EM4>Modifiers:</EM4>  Instability: +35%  |  Optimal Charge Window: +20%  |  Resistance: -45%  |  Inert Filter: +30%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Shubin_2_S2_Desc=Fabricante: Shubin Interstellar\nTipo de Item: Laser de mineração \nTamanho: 2\n\nAlcance ideal: 60m\nAlcance máximo: 180m\n\nPotência do Laser de Mineração: 720 - 3600\nPotência do laser extrator: 2775\n\nSlots de módulo: 1\n\nResistência W: -45%\nTamanho Ideal da Janela de Carga: +20%\nMateriais inertes: -40%\n\nInstabilidade do laser: +35%\n\nShubin projetou o Klein-S2 para produzir um laser poderoso que acelera a degradação. Este poder acarreta riscos adicionais, pois aumenta a instabilidade do laser, mas quando usado corretamente, o Klein-S2 pode rapidamente se tornar uma vantagem para o mineiro cauteloso.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,600  |  Range: 60m→180m\n<EM4>Extraction:</EM4>  DPS: 2,775  |  Range: 60m→180m\n<EM4>Modifiers:</EM4>  Instability: +35%  |  Optimal Charge Window: +20%  |  Resistance: -45%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Thermyte_1_S1_Desc=Fabricante: Thermyte Concern\nTipo de Item: Laser de mineração \nTamanho: 1\n\nAlcance ideal: 45m\nAlcance máximo: 135m\n\nPotência do Laser de Mineração: 420 - 2100\nPotência do laser de extração: 2775\n\nSlots de módulo: 2\n\nInstabilidade do laser: -10%\nTamanho Ideal da Janela de Carga: +20%\nMateriais inertes: -30%\n\nResistência: +10%\nTaxa ideal da janela de carga: -40%\n\n\nO Impacto I é ideal para uma variedade de situações de mineração. Lentes de foco especiais facilitam o processamento de um depósito, estabilizando o laser e aumentando a janela de carregamento ideal. As desvantagens incluem maior resistência ao depósito e uma janela de carga ideal de preenchimento mais lento, mas a Thermyte Concern também incluiu dois slots de módulo para permitir que os mineradores adaptem melhor o laser à tarefa em questão.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 2,100  |  Range: 45m→135m\n<EM4>Extraction:</EM4>  DPS: 2,775  |  Range: 45m→135m\n<EM4>Modifiers:</EM4>  Instability: -10%  |  Optimal Charge Window: +20%  |  Resistance: +10%  |  Inert Filter: +30%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Thermyte_1_S2_Desc=Fabricante: Thermyte Concern\nTipo de Item: Laser de mineração \nTamanho: 2\n\nAlcance ideal: 60m\nAlcance máximo: 180m\n\nPotência do Laser de Mineração: 840 - 3360\nPotência do laser de extração: 3145\n\nSlots de módulo: 3\n\nInstabilidade do laser: -10%\nTamanho Ideal da Janela de Carga: +20%\nMateriais inertes: -40%\n\nResistência: +10%\nTaxa ideal da janela de carga: -40%\n\nO Impact II é ideal para uma variedade de situações de mineração. Lentes de foco especiais facilitam o processamento de um depósito, estabilizando o laser e aumentando a janela de carregamento ideal. As desvantagens incluem maior resistência ao depósito e uma janela de carga ideal de preenchimento mais lento, mas a Thermyte Concern também incluiu três slots de módulo para permitir que os mineradores adaptem melhor o laser à tarefa em questão.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,360  |  Range: 60m→180m\n<EM4>Extraction:</EM4>  DPS: 3,145  |  Range: 60m→180m\n<EM4>Modifiers:</EM4>  Instability: -10%  |  Optimal Charge Window: +20%  |  Resistance: +10%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Thermyte_2_S1_Desc=Fabricante: Thermyte Concern\nTipo de Item: Laser de mineração \nTamanho: 1\n\nAlcance ideal: 15m\nAlcance máximo: 45m\n\nPotência do Laser de Mineração: 630 - 3150\nPotência do laser de extração: 1850\n\nSlots de módulo: 2\n\nResistência: -30%\nMateriais inertes: -30%\n\nTamanho Ideal da Janela de Carga: -40%\n\nPara alguns, o uso eficaz do Helix I é um sinal de um verdadeiro profissional de mineração. A Thermyte Concern deu ao laser uma potência impressionante que pode contornar a resistência de um depósito, mas também requer um manuseio preciso para atingir a janela de carga ideal. Melhor usado de perto, o Helix I possui dois slots de módulo que permitem aos mineradores personalizar o laser de acordo com sua preferência.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,150  |  Range: 15m→45m\n<EM4>Extraction:</EM4>  DPS: 1,850  |  Range: 15m→45m\n<EM4>Modifiers:</EM4>  Optimal Charge Window: -40%  |  Resistance: -30%  |  Inert Filter: +30%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
