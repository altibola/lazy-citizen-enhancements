item_descMining_Head_S00_Helix_SCItem=Fabricante: Thermyte Concern\nTipo de Item: Laser de Mineração\nTamanho: S0\nClasse: B\nAlcance Ideal: 30 m\nAlcance Máximo: 30 m\nRaio de Coleta: 1 m\nProdução de Extração: 5 cSCU/s\n \nTransferência de Energia: 50\nInstabilidade: 0%\nResistência: 0 %\nTamanho Ideal da Janela de Carga: -40 %\nTaxa Ideal da Janela de Carga: +20 %\nPotência Mínima: 15%\n\nO laser de mineração mais potente, o laser mais forte\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 1  |  Range: 8m→18m\n<EM4>Modifiers:</EM4>  Optimal Charge Window: -40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_descMining_Head_S00_Hofstede_SCItem=Fabricante: Shubin Interstellar\nTipo de Item: Laser de Mineração\nTamanho: S0\nClasse: B\nAlcance Ideal: 30 m\nAlcance Máximo: 30 m\nRaio de Coleta: 1 m\nProdução de Extração: 4 cSCU/s\n \nTransferência de Energia: 35\nInstabilidade: +30 %\nResistência: -40 %\nTamanho Ideal da Janela de Carga: +40 %\nTaxa Ideal da Janela de Carga: +20 %\nPotência Mínima: 20%\n\nEssa é a cabeça de mineração padrão para o ROC DS, um pouco mais forte que o Arbor\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 1  |  Range: 8m→18m\n<EM4>Modifiers:</EM4>  Instability: +30%  |  Optimal Charge Window: +40%  |  Resistance: -40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_descMining_Head_S00_Klein_SCItem=Fabricante: Argo Astronautics\nTipo de Item: Laser de Mineração\nTamanho: S0\nClasse: C\nFaixa Ideal: 25 m\nAlcancemáximo: 25 m\nRaio de Coleta: 1 m\nProdução de Extração: 4 cSCU/s\nTransferência de Energia: 35\nInstabilidade: +30 %\nResistência: -40 %\nTamanho Ideal da Janela de Carga: +40 %\nTaxa Ideal da Janela de Carga: 0%\nPotência min: 20%\n\nO laser de mineração Lawson foi desenvolvido pela Argo Astronautics e ajustado especificamente para o ATLS GEO para tornar a mineração de recursos do traje de força o mais intuitiva possível.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 1  |  Range: 5m→15m\n<EM4>Modifiers:</EM4>  Instability: +30%  |  Optimal Charge Window: +40%  |  Resistance: -40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
