item_DescBEHR_BallisticGatling_SF7B_S7=Fabricante: Behring\nTipo de Item: Gatling Balístico\nTamanho: 7\n\nCom o Gatling balístico SF7B você pode enfrentar grandes naves espaciais e destruir rapidamente naves menores. A arma foi projetada especificamente para a Ares Inferno Star Fighter e se encaixa perfeitamente no casco da nave. A impressionante cadência de tiro da arma libera projéteis de alta densidade que penetram armaduras e escudos, tornando-a a escolha perfeita para situações em que a saturação do alvo é crítica.\n\n--- STATS ---\nWeight: 5860.0 kg\nFire Rate: 900 RPM\nFire Modes: Auto\nAlpha Dmg: 292.0 (Phys)  |  DPS: 4,380.0\nAmmo: 2,994\nVelocity: 1,179 m/s  |  Range: 7.3 km\nPower Draw: 0 PU/s\nComponent HP: 6,750\nSignatures:  EM: 36  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_BallisticRepeater_S1=Fabricante: Behring\nTipo de Item: Repetidor Balístico\nTamanho: 1\n\nO SW16BR1 "Buzzsaw" dispara de dois barris e pode dominar atacantes em distâncias médias a curtas. Graças ao artesanato especializado de Behring, a arma pode ser usada em tiroteios sustentados antes de exigir um período de resfriamento, tornando-a um excelente rifle balístico de repetição de nível básico.\n\n--- STATS ---\nWeight: 36.0 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 36.0 (Phys)  |  DPS: 300.0\nAmmo: 2,664\nVelocity: 1,500 m/s  |  Range: 2.0 km\nPower Draw: 0 PU/s\nComponent HP: 525\nSignatures:  EM: 40  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_BallisticRepeater_S2=Fabricante: Behring\nTipo de Item: Repetidor Balístico\nTamanho: 2\n\nO SW16BR2 Sawbuck é a contribuição da Behring para o crescente mercado de repetidores balísticos. Sua configuração de cano duplo com disparo sequencial fornece um meio-termo eficaz para operativos que desejam uma cadência de tiro mais alta do que um canhão, mas não precisam se preocupar com superaquecimento como um Gatling.\n\n--- STATS ---\nWeight: 90.0 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 54.0 (Phys)  |  DPS: 450.0\nAmmo: 2,637\nVelocity: 1,495 m/s  |  Range: 2.2 km\nPower Draw: 0 PU/s\nComponent HP: 850\nSignatures:  EM: 40  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_BallisticRepeater_S3=Fabricante: Behring\nTipo de Item: Repetidor Balístico\nTamanho: 3\n\nVocê pode escapar de problemas com este repetidor balístico da Behring em tamanho três. O SW16BR3 "Shredder" distribui o calor pelos dois canos para manter a arma disparando no momento crucial. O agrupamento de tiros da arma e a redução do dano a tornam particularmente mortal a médio ou curto alcance.\n\n--- STATS ---\nWeight: 225.0 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 81.0 (Phys)  |  DPS: 675.0\nAmmo: 2,589\nVelocity: 1,480 m/s  |  Range: 2.4 km\nPower Draw: 0 PU/s\nComponent HP: 1,024\nSignatures:  EM: 40  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_BallisticRepeater_VNG_S2=Fabricante: Behring\nTipo de Item: Repetidor Balístico\nTamanho: 2\n\nSomente proprietários da Vanguard podem anexar esta versão exclusiva da linha de amplificadores balísticos da Behring ao nariz de sua nave. O BRVS foi cuidadosamente calibrado para permitir que sua barragem balística dispare com rapidez suficiente para atingir a saturação máxima do alvo, enquanto sua ventilação aprimorada reduz o superaquecimento comum.\n\n--- STATS ---\nWeight: 90.0 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 54.0 (Phys)  |  DPS: 450.0\nAmmo: 2,637\nVelocity: 1,495 m/s  |  Range: 2.2 km\nPower Draw: 0 PU/s\nComponent HP: 850\nSignatures:  EM: 40  |  IR: 0\nOverheat Temp: 450K
