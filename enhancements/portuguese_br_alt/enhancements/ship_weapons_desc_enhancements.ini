item_DescGATS_BallisticGatling_S1=Fabricante: Gallenson Tactical Systems\nTipo de Item: Gatling Balístico\nTamanho: 1\n\nO GT-210 YellowJacket pode ser pequeno, mas tem um ferrão poderoso. Esta arma balística de alta velocidade é perfeita para atingir alvos móveis menores, e seu sistema de entrega de munição DTX-8 elimina quase completamente os congestionamentos de armas devido a tiros perdidos.\n\n--- STATS ---\nWeight: 24.0 kg\nFire Rate: 1,600 RPM\nFire Modes: Auto\nAlpha Dmg: 7.6 (Phys)  |  DPS: 201.6\nAmmo: 4,440\nVelocity: 1,350 m/s  |  Range: 2.0 km\nPower Draw: 0 PU/s\nComponent HP: 550\nSignatures:  EM: 36  |  IR: 0\nOverheat Temp: 450K
