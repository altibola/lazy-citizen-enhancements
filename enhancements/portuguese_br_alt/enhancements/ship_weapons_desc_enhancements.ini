item_DescBEHR_DistortionRepeater_VNG_S2=Fabricante: Behring\nTipo de Item: Repetidor de Distorção\nTamanho: 2\n\nCom o ATVS da Behring você pode interromper o sistema elétrico de um invasor. Este repetidor de distorção perturbador e não letal só é compatível com o suporte de nariz Aegis Vanguard.\n\n--- STATS ---\nWeight: 90.0 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 27.0 (Distort)  |  DPS: 225.0\nAmmo: 75\nRegen: 1,125/s  |  Cooldown: 0.5s  |  Cost/Shot: 27\nVelocity: 1,346 m/s  |  Range: 1.3 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 243  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_LaserCannon_S1=Fabricante: Behring\nTipo de Item: Canhão Laser\nTamanho: 1\n\nO M3A é o canhão automático laser básico da Behring. A configuração do canhão automático oferece danos modestos por projétil e uma cadência de tiro relativamente baixa. A oferta mais simples na gama de armas da Behring, apresenta baixo consumo de energia, mas baixa eficiência energética. Ele compensa suas deficiências sendo barato – uma qualidade que muitos pilotos procuram quando equipam suas naves dentro do orçamento.\n\n--- STATS ---\nWeight: 144.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 182.2 (Energy)  |  DPS: 303.8\nAmmo: 25\nRegen: 1,867/s  |  Cooldown: 0.8s  |  Cost/Shot: 112\nVelocity: 1,200 m/s  |  Range: 2.0 km\nPower Draw: 1 PU/s\nComponent HP: 550\nSignatures:  EM: 348  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_LaserCannon_S1_CleanAir=Fabricante: Behring\nTipo de Item: Canhão Laser\nTamanho: 1\n\nA M3A é o canhão laser automático de entrada da Behring. A configuração de canhão automático oferece dano moderado por projétil e uma cadência de tiro razoavelmente baixa. Como a oferta mais básica na linha de armas da Behring, apresenta baixo consumo de energia, mas pouca eficiência energética. Compensa suas deficiências por ser barata, uma característica que muitos pilotos procuram ao equipar suas naves com um orçamento limitado.\n\nA edição Defense Division apresenta um padrão de camuflagem urbana cinza e foi concedida àqueles que ajudaram a Defense Division da Alliance Aid durante o momento de necessidade de Levski.\n\n--- STATS ---\nWeight: 144.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 182.2 (Energy)  |  DPS: 303.8\nAmmo: 25\nRegen: 1,867/s  |  Cooldown: 0.8s  |  Cost/Shot: 112\nVelocity: 1,200 m/s  |  Range: 2.0 km\nPower Draw: 1 PU/s\nComponent HP: 550\nSignatures:  EM: 348  |  IR: 0\nOverheat Temp: 450K
