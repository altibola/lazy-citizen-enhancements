item_DescMISL_S01_EM_BEHR_Pioneer=Fabricante: Behring\nSinal de Rastreamento: Eletromagnético\nTamanho: 1\n\nBehring se orgulha de sua confiabilidade e a Pioneer não é exceção. O sistema de rastreamento Oracle EM atualizado provou seu valor repetidamente em vários testes de consumidores contra mísseis de proximidade com classificação semelhante.\n\n--- STATS ---\nWeight: 51.0 kg\nComponent HP: 25\nOverheat Temp: 450K
