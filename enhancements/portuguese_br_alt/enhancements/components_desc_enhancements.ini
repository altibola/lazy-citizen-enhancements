item_DescCOOL_JUST_S03_ChillMax_SCItem=Tipo de Item: Resfriador\nFabricante: Juno Starwerk\nTamanho: 3\nGrau: A \nClasse: Industrial\n\nO nome Chill-Max é tão simples quanto o design desta caixa térmica Juno Starwerk. Este refrigerador industrial altamente cotado tem sido um favorito entre os operativos de transporte durante séculos.\n\n--- STATS ---\nCooling Rate: 58 CR/s\nPower Draw: 5 PU/s\nComponent HP: 1,500\nSignatures:  EM: 2,480  |  IR: 11,900\nOverheat Temp: 810K
