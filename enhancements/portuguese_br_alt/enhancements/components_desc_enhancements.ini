item_DescCOOL_AEGS_S01_Bracer=Tipo de Item: Resfriador\nFabricante: Aegis Dynamics \nTamanho: 1\nGrau: C\nClasse: Militar\n\nPara quem procura um resfriador intermediário sólido e confiável, não existe nada melhor que o Bracer de Aegis. Este sistema de resfriamento de estrutura pequena oferece desempenho sólido e durabilidade para manter sua nave funcionando em todos os cilindros.\n\n--- STATS ---\nCooling Rate: 34 CR/s\nPower Draw: 3 PU/s\nComponent HP: 180\nSignatures:  EM: 1,490  |  IR: 7,260\nOverheat Temp: 750K
item_DescCOOL_AEGS_S01_Polar=Tipo de Item: Resfriador\nFabricante: Aegis Dynamics \nTamanho: 1\nGrau: B\nClasse: Militar\n\nO resfriador Aegis Polar foi construído para atender às demandas exigentes do serviço militar diário e possui uma estrutura reforçada para maior durabilidade. Você pode confiar no Polar para manter sua nave fresco quando você entrar no meio da batalha.\n\n--- STATS ---\nCooling Rate: 34 CR/s\nPower Draw: 3 PU/s\nComponent HP: 210\nSignatures:  EM: 1,490  |  IR: 7,260\nOverheat Temp: 825K
