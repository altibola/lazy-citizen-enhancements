item_descQDRV_RSI_S02_Khaos_SCItem=Tipo de Item: Motor quântico\nFabricante: RSI\nTamanho: 2\nGrau: C \nClasse: Civil\n\nO Khaos da RSI foi ajustado para proporcionar um desempenho confiável com uma construção confiável. Quando estiver com ele instalado, você apreciará a ordem que essa unidade quântica traz para o caos das viagens.\n\n--- STATS ---\nQT Speed: 201 Mm/s  |  Spool: 6s\nCooldown: 16.9s\nFuel/Gm: 0.0101\nQT Fuel Use: 16 μ/s\nAccel:  S1: 3,000,000  |  S2: 13,200,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 3 PU/s\nComponent HP: 410\nSignatures:  EM: 27,000  |  IR: 0\nOverheat Temp: 383K\nMax Distortion: 3,500
item_descQDRV_RSI_S03_Metis_SCItem=Tipo de Item: Motor quântico\nFabricante: RSI\nTamanho: 3\nGrau: C\nClasse: Civil\n\nNão há espaço para erros ao dobrar o espaço e o tempo para viajar distâncias incríveis. Portanto, deposite sua confiança na RSI, uma empresa que fornece componentes de qualidade ao público desde o início dos voos espaciais.\n\n--- STATS ---\nQT Speed: 246 Mm/s  |  Spool: 7s\nCooldown: 9.4s\nFuel/Gm: 0.0599\nQT Fuel Use: 26 μ/s\nAccel:  S1: 1,800,000  |  S2: 11,600,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 4 PU/s\nComponent HP: 1,100\nSignatures:  EM: 36,000  |  IR: 0\nOverheat Temp: 383K\nMax Distortion: 5,500
item_descQDRV_RSI_S03_Tyche_SCItem=Tipo de Item: Motor quântico\nFabricante: RSI\nTamanho: 3\nGrau: B\nClasse: Civil\n\nO motor quântico Tyche equilibra harmoniosamente o desempenho, a durabilidade e a discrição para criar um componente completo capaz de lidar habilmente com uma variedade de situações.\n\n--- STATS ---\nQT Speed: 295 Mm/s  |  Spool: 7s\nCooldown: 9.1s\nFuel/Gm: 0.0541\nQT Fuel Use: 21 μ/s\nAccel:  S1: 2,160,000  |  S2: 13,900,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 4 PU/s\nComponent HP: 1,300\nSignatures:  EM: 36,000  |  IR: 0\nOverheat Temp: 394K\nMax Distortion: 6,000
item_descQDRV_TARS_S01_Wayfare_SCItem=Tipo de Item: Motor quântico\nFabricante: Tarsus \nTamanho: 1\nGrau: D \nClasse: Civil\n\nVelocidade pelo espaço sem gastar muito. O Warfare é um pequeno motor quântico da Tarsus que foi projetado especificamente para ajudar a tornar as viagens espaciais acessíveis para as massas.\n\n--- STATS ---\nQT Speed: 138 Mm/s  |  Spool: 4s\nCooldown: 10.0s\nFuel/Gm: 0.0101\nQT Fuel Use: 8 μ/s\nAccel:  S1: 4,170,000  |  S2: 12,500,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 2 PU/s\nComponent HP: 130\nSignatures:  EM: 15,000  |  IR: 0\nOverheat Temp: 372K\nMax Distortion: 1,950
item_descQDRV_TARS_S02_Quest_SCItem=Tipo de Item: Motor quântico\nFabricante: Tarsus \nTamanho: 2\nGrau: D \nClasse: Civil\n\nPor que mexer com a perfeição? A Tarsus fabrica o motor Quest há séculos para fornecer a todos um componente de tamanho médio acessível para levá-los em suas aventuras.\n\n--- STATS ---\nQT Speed: 168 Mm/s  |  Spool: 6s\nCooldown: 18.0s\nFuel/Gm: 0.0112\nQT Fuel Use: 19 μ/s\nAccel:  S1: 2,500,000  |  S2: 11,000,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 3 PU/s\nComponent HP: 360\nSignatures:  EM: 22,500  |  IR: 0\nOverheat Temp: 372K\nMax Distortion: 3,050
item_descQDRV_TARS_S03_Drifter_SCItem=Tipo de Item: Motor quântico\nFabricante: Tarsus\nTamanho: 3\nGrau: D\nClasse: Civil\n\nEquilibrando a habilidade e o custo, o Drifter oferece o renomado desempenho da Tarsus a um preço acessível.\n\n--- STATS ---\nQT Speed: 205 Mm/s  |  Spool: 7s\nCooldown: 10.0s\nFuel/Gm: 0.0663\nQT Fuel Use: 31 μ/s\nAccel:  S1: 1,500,000  |  S2: 9,680,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 4 PU/s\nComponent HP: 990\nSignatures:  EM: 30,000  |  IR: 0\nOverheat Temp: 372K\nMax Distortion: 4,700
item_descQDRV_TARS_S03_Wanderer_SCItem=Tipo de Item: Motor quântico\nFabricante: Tarsus\nTamanho: 3\nGrau: C\nClasse: Civil\n\nA Tarsus projetou e ajustou cuidadosamente o Wanderer em um motor quântico sólido e versátil, tornando-o um dos componentes mais populares em sua linha reverenciada.\n\n--- STATS ---\nQT Speed: 246 Mm/s  |  Spool: 7s\nCooldown: 10.0s\nFuel/Gm: 0.0644\nQT Fuel Use: 26 μ/s\nAccel:  S1: 1,800,000  |  S2: 11,600,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 4 PU/s\nComponent HP: 1,100\nSignatures:  EM: 30,000  |  IR: 0\nOverheat Temp: 383K\nMax Distortion: 5,500
item_descQDRV_WETK_S02_XL1_SCItem=Tipo de Item: Motor quântico\nFabricante: Wei-Tek\nTamanho: 2\nGrau: A \nClasse: Militar\n\nA Wei-Tek pode ser uma empresa nova, mas sua linha de componentes de nível militar já está ganhando notoriedade. O XL-1 é seu principal motor quântico médio que combina com maestria desempenho e durabilidade.\n\n--- STATS ---\nQT Speed: 324 Mm/s  |  Spool: 6s\nCooldown: 22.9s\nFuel/Gm: 0.0240\nQT Fuel Use: 11 μ/s\nAccel:  S1: 4,830,000  |  S2: 21,300,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 4 PU/s\nComponent HP: 840\nSignatures:  EM: 26,300  |  IR: 0\nOverheat Temp: 453K\nMax Distortion: 7,000
item_descQDRV_WETK_S03_Balandin_SCItem=Tipo de Item: Motor quântico\nFabricante: Wei-Tek\nTamanho: 3\nGrau: B\nClasse: Militar\n\nA Wei-Tek construiu o Balandin pensando no pessoal militar e de segurança. Após uma série de testes realizados por veteranos, os engenheiros aceleraram os tempos de carregamento e calibração e, ao mesmo tempo, melhoraram a precisão e a estabilidade do componente.\n\n--- STATS ---\nQT Speed: 339 Mm/s  |  Spool: 7s\nCooldown: 12.3s\nFuel/Gm: 0.1352\nQT Fuel Use: 21 μ/s\nAccel:  S1: 2,480,000  |  S2: 16,000,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 5 PU/s\nComponent HP: 2,100\nSignatures:  EM: 33,800  |  IR: 0\nOverheat Temp: 438K\nMax Distortion: 10,000
