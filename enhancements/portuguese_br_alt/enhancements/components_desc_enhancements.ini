item_DescCOOL_JUST_S01_Hydrocel=Tipo de Item: Resfriador\nFabricante: Juno Starwerk \nTamanho: 1\nGrau: D\nClasse: Industrial\n\nCom o robusto Hydrocel, um resfriador industrial básico do renomado fabricante Juno Starwerk, sua nave permanecerá eficiente por mais tempo.\n\n--- STATS ---\nCooling Rate: 29 CR/s\nPower Draw: 3 PU/s\nComponent HP: 130\nSignatures:  EM: 1,490  |  IR: 5,940\nOverheat Temp: 614K
item_DescCOOL_JUST_S01_Thermax=Tipo de Item: Resfriador\nFabricante: Juno Starwerk \nTamanho: 1\nGrau: C\nClasse: Industrial\n\nJuno Starwerk fez isso de novo. Com os coolers Thermax, a Juno elevou o padrão em coolers industriais econômicos para todos os orçamentos. Esses pequenos coolers oferecem desempenho e durabilidade acima da média sem gastar muito.\n\n--- STATS ---\nCooling Rate: 32 CR/s\nPower Draw: 3 PU/s\nComponent HP: 150\nSignatures:  EM: 1,490  |  IR: 6,530\nOverheat Temp: 675K
item_DescCOOL_JUST_S02_CoolCore=Tipo de Item: Resfriador\nFabricante: Juno Starwerk \nTamanho: 2\nGrau: C\nClasse: Industrial\n\nO nome CoolCore já diz tudo. Este resfriador foi projetado por Juno Starwerk para trabalhar tão duro quanto você. Ele garante que toda sua nave opere dentro dos parâmetros de temperatura desejados.\n\n--- STATS ---\nCooling Rate: 41 CR/s\nPower Draw: 4 PU/s\nComponent HP: 420\nSignatures:  EM: 1,980  |  IR: 8,710\nOverheat Temp: 675K
item_DescCOOL_JUST_S02_Hydrojet=Tipo de Item: Resfriador\nFabricante: Juno Starwerk \nTamanho: 2\nGrau: D\nClasse: Industrial\n\nSe sua nave superaquecer, quase todas as tarefas se tornarão não apenas mais difíceis, mas também potencialmente perigosas para você e sua tripulação. Com o HydroJet básico da Juno Starwerk, você pode ter certeza de que o calor é controlado por um refrigerador projetado por um dos nomes mais confiáveis do setor.\n\n--- STATS ---\nCooling Rate: 38 CR/s\nPower Draw: 4 PU/s\nComponent HP: 370\nSignatures:  EM: 1,980  |  IR: 7,920\nOverheat Temp: 614K
