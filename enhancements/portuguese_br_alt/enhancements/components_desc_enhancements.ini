item_DescCOOL_JUST_S03_ThermalCore=Tipo de Item: Resfriador\nFabricante: Juno Starwerk \nTamanho: 3\nGrau: C\nClasse: Industrial\n\nQuando você está no meio de uma tarefa importante, você não quer perder tempo pensando se o seu resfriador está à altura. Propósito cumprido. Agora você não precisa mais fazer isso. Com o confiável resfriamento de médio porte ThermalCore da Juno Starwerk integrado, você pode eliminar as suposições do gerenciamento térmico.\n\n--- STATS ---\nCooling Rate: 52 CR/s\nPower Draw: 5 PU/s\nComponent HP: 1,200\nSignatures:  EM: 2,480  |  IR: 10,900\nOverheat Temp: 675K
