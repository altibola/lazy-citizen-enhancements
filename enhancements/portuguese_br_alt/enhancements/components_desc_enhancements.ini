item_DescCOOL_ACOM_S01_QuickCool=Tipo de Item: Resfriador\nFabricante: ACOM\nTamanho: 1\nGrau: D\nClasse: Competição\n\nO QuikCool oferece melhor desempenho que outros coolers de sua classe. Este componente competitivo da ACOM é um dos coolers básicos mais poderosos disponíveis, embora sacrifique alguma durabilidade.\n\n--- STATS ---\nCooling Rate: 32 CR/s\nPower Draw: 2 PU/s\nComponent HP: 62\nSignatures:  EM: 818  |  IR: 5,400\nOverheat Temp: 614K
item_DescCOOL_ACOM_S02_AbsoluteZero_SCItem=Tipo de Item: Resfriador\nFabricante: ACOM\nTamanho: 2\nGrau: B \nClasse: Competição\n\nO Resfriador AbsoluteZero, originalmente desenvolvido para pilotos de corrida, leva o desempenho ao limite. Este componente de alta qualidade da ACOM apresenta um novo sistema de circulação de refrigerante que mantém os sistemas da sua nave resfriados acima de tudo.\n\n--- STATS ---\nCooling Rate: 46 CR/s\nPower Draw: 3 PU/s\nComponent HP: 210\nSignatures:  EM: 1,230  |  IR: 7,850\nOverheat Temp: 743K
item_DescCOOL_ACOM_S02_IceDive_SCItem=Tipo de Item: Resfriador\nFabricante: ACOM\nTamanho: 2\nGrau: C \nClasse: Competição\n\nO IceDive oferece desempenho superior a outros coolers de tamanho médio em sua classe, mas ao preço de altas assinaturas IV e EM gerado.\n\n--- STATS ---\nCooling Rate: 46 CR/s\nPower Draw: 3 PU/s\nComponent HP: 190\nSignatures:  EM: 1,230  |  IR: 7,850\nOverheat Temp: 675K
