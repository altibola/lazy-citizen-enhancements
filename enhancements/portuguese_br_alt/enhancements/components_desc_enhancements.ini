item_DescCOOL_AEGS_S02_Arctic=Tipo de Item: Resfriador\nFabricante: Aegis Dynamics \nTamanho: 2\nGrau: C\nClasse: Militar\n\nO Ártico oferece o tipo de durabilidade que tornou os produtos Aegis um produto básico nas forças armadas. É um resfriador Mil-Spec econômico, projetado para suportar os rigores do combate sem sacrificar o desempenho.\n\n--- STATS ---\nCooling Rate: 46 CR/s\nPower Draw: 4 PU/s\nComponent HP: 490\nSignatures:  EM: 1,980  |  IR: 9,440\nOverheat Temp: 750K
