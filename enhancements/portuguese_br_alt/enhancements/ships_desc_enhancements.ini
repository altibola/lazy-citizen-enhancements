vehicle_DescMISC_Fortune=Fabricante: MISC\nFoco: Sucateamento Leve\n\nPara aqueles prontos para elevar sua profissão ao próximo nível, os engenheiros da MISC criaram cuidadosamente a Fortune como a melhor embarcação de pequeno porte para recuperação da categoria. Equipada com um braço de reciclagem versátil e um elevador de carga, a MISC Fortune foi construída desde as estruturas para transformar lixo em tesouro.\n\n\n--- STATS ---\nSCM: 143 m/s  |  Max: 975 m/s\nBoost: +350 m/s  /  -150 m/s\nCrew: 1  |  Length: 26.5m  |  Class: Industrial  |  Role: Sucateamento Leve\nCoolers: S2  |  Power: S2  |  QD: S1\nArmor HP: 4,114\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 5.18 min base  |  1.30 min express
vehicle_DescMISC_Fortune_Teach=Fabricante: MISC\nFoco: Sucateamento Leve\n\nPara aqueles prontos para elevar sua profissão ao próximo nível, os engenheiros da MISC criaram cuidadosamente a Fortune como a melhor embarcação de pequeno porte para recuperação da categoria. Equipada com um braço de reciclagem versátil e um elevador de carga, a MISC Fortune foi construída desde as estruturas para transformar lixo em tesouro.\n\nAtendendo às difíceis condições de trabalho de Nyx, a Teach's Ship Shop equipou esta edição especial com um conjunto de armas personalizado, apresentando componentes robustos para que você possa lidar melhor com a tarefa em mãos.\n\n--- STATS ---\nCrew: 1  |  Length: 26.5m  |  Class: Industrial  |  Role: Sucateamento Leve\nCoolers: S2  |  Power: S2  |  QD: S1\nArmor HP: 4,114\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 5.18 min base  |  1.30 min express
vehicle_DescMISC_Freelancer=Fabricante: MISC\nFoco: Carga Leve\n\nAs Freelancers são usadas como naves mercantes de longa distância por grandes corporações, mas são com a mesma frequência adaptadas como naves de exploração dedicadas por capitães independentes que desejam operar nas margens da galáxia.\n\n--- STATS ---\nSCM: 197 m/s  |  Max: 1,050 m/s\nBoost: +400 m/s  /  -205 m/s\nCrew: 1  |  Length: 38.0m  |  Class: Transportador  |  Role: Frete Leve\nTurrets: 1  |  MRacks: 2× S3  2× S4\nShields: 3× S2  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 10,560\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 41  |  E 43  |  D 0  |  T 0\nInsurance: 12.99 min base  |  4.33 min express
vehicle_DescMISC_Freelancer_DUR=Fabricante: MISC\nFoco: Expedição \n\nA variante Freelancer DUR é especializada em exploração. Sacrificar 25% da capacidade de carga da Freelancer padrão por um motor de salto aprimorado, um escâner mais avançado e um tanque de combustível expandido pode parecer uma má decisão para alguns, mas aqueles que valorizam a descoberta em vez do lucro descobrirão que este é sua nave preferida.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,100 m/s\nBoost: +403 m/s  /  -205 m/s\nCrew: 1  |  Length: 38.0m  |  Class: Exploração  |  Role: Expedição\nTurrets: 1  |  MRacks: 2× S3  2× S4\nShields: 3× S2  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 10,560\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 41  |  E 43  |  D 0  |  T 0\nInsurance: 12.99 min base  |  4.33 min express
vehicle_DescMISC_Freelancer_MAX=Fabricante: MISC\nFoco: Frete Médio\n\nVariante Freelancer com capacidade de carga adicional em detrimento de armas. A variante Freelancer MAX sacrifica o armamento por uma maior capacidade de carga, tornando-a ideal para transporte de equipamentos ou matérias-primas.\n\n--- STATS ---\nSCM: 195 m/s  |  Max: 1,025 m/s\nBoost: +395 m/s  /  -205 m/s\nCrew: 1  |  Length: 38.0m  |  Class: Transportador  |  Role: Frete Médio\nTurrets: 1  |  MRacks: 2× S3  2× S4\nShields: 3× S2  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 10,560\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 41  |  E 43  |  D 0  |  T 0\nInsurance: 16.46 min base  |  5.49 min express
vehicle_DescMISC_Freelancer_MIS=Fabricante: MISC\nFoco: Nave de Guerra\n\nA Freelancer MIS é uma variante militarizada de edição limitada da clássica nave mercantil desenvolvida pelo UEE. Estas foram produzidas em quantidades muito pequenas devido a alguns incidentes iniciais de carga. Esta versão sacrifica a maior parte da capacidade de carga para dar lugar aos mísseis.\n\n--- STATS ---\nSCM: 204 m/s  |  Max: 1,000 m/s\nBoost: +410 m/s  /  -205 m/s\nCrew: 1  |  Length: 38.0m  |  Class: Combate  |  Role: Guerra\nTurrets: 1  |  MRacks: 4× S4  S5\nShields: 3× S2  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 15,840\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 41  |  E 43  |  D 0  |  T 0\nInsurance: 15.59 min base  |  5.20 min express
vehicle_DescMISC_Hull_A=Fabricante: MISC\nFoco: Carga Leve\n\nA menor e mais acessível das Hull. A Hull A é ótima para quem está começando na galáxia por conta própria. A Hull A é muito semelhante à Aurora e à Mustang, mas carece da natureza "pau para toda obra". Enquanto as outras trocam capacidade de carga por poder de fogo ou velocidade, a Hull A é 100% focada na missão de transporte.\n\n--- STATS ---\nSCM: 185 m/s  |  Max: 1,050 m/s\nBoost: +385 m/s  /  -195 m/s\nCrew: 1  |  Length: 30.0m  |  Class: Transportador  |  Role: Frete Leve\nShields: S2  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 4,840\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 18  |  E 19  |  D 0  |  T 0\nInsurance: 5.95 min base  |  1.98 min express
vehicle_DescMISC_Hull_C=Fabricante: Misc \nFoco: Frete pesada \n\ntambém Chamada de nave mais comum na galáxia, o casco C é o mais produzido da faixa e é considerado por muitos como o mais versátil. Destinado a atingir o 'ponto ideal' entre os transportes menores de pessoa única e os enormes superfreighters que compõem o restante do alcance, a Hull C oferece a modularidade expansiva das naves maiores, mantendo um modicum da manobrabilidade permitida o baixoFim do intervalo.\n\n--- STATS ---\nSCM: 110 m/s  |  Max: 890 m/s\nBoost: +290 m/s  /  -100 m/s\nCrew: 1  |  Length: 91.2m  |  Class: Transportador  |  Role: Frete Pesado\nShields: 3× S3  |  Power: S3\nArmor HP: 12,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 315  |  E 360  |  D 0  |  T 0\nInsurance: 45.00 min base  |  15.00 min express
vehicle_DescMISC_Prospector=Fabricante: MISC\nFoco: Mineração Leve\n\nPor anos, a Prospector tem sido a embarcação de mineração preferida do universo para operadores solo. Apresentando a sensibilidade de design elegante da MISC e uma série de ferramentas de mineração de alta tecnologia atualizadas, a Prospector 2947 equilibra perfeitamente forma e funcionalidade.\n\n--- STATS ---\nSCM: 156 m/s  |  Max: 994 m/s\nBoost: +371 m/s  /  -160 m/s\nCrew: 1  |  Length: 26.5m  |  Class: Industrial  |  Role: Mineração Leve\nShields: 3× S1  |  Coolers: S2  |  Power: S2  |  QD: S1\nArmor HP: 8,228\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 18  |  E 19  |  D 0  |  T 0\nInsurance: 9.00 min base  |  3.00 min express
vehicle_DescMISC_Prospector_Collector_Indust=Fabricante: MISC\nFoco: Mineração Leve\n\nPor anos, a Prospector tem sido a embarcação de mineração preferida do universo para operadores solo. Apresentando a sensibilidade de design elegante da MISC e uma série de ferramentas de mineração de alta tecnologia atualizadas, a Prospector 2947 equilibra perfeitamente forma e funcionalidade. \n\nWikelo oi. Fiz modificações úteis para tornar a nave ainda mais industriosa. Você vai gostar.\n\n--- STATS ---\nCrew: 1  |  Length: 26.5m  |  Class: Industrial  |  Role: Mineração Leve\nShields: 3× S1  |  Coolers: S2  |  Power: S2  |  QD: S1\nArmor HP: 8,228\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 18  |  E 19  |  D 0  |  T 0\nInsurance: 9.00 min base  |  3.00 min express
vehicle_DescMISC_Razor=Fabricante: Mirai \nFoco: Corrida\n\nEste piloto avançado apresenta uma estrutura aeroespacial composta avançada que coloca a velocidade pura acima de tudo... é a nave para pilotos que querem deixar a competição comendo poeira.\n\n--- STATS ---\nSCM: 265 m/s  |  Max: 1,450 m/s\nBoost: +595 m/s  /  -290 m/s\nCrew: 1  |  Length: 12.5m  |  Class: Competição  |  Role: Corrida\nInsurance: 6.08 min base  |  2.02 min express
vehicle_DescMISC_Razor_EX=Fabricante: Mirai\nFoco: Furtivo\n\nEquipado com materiais de redução de assinatura, a Razor EX foi feita sob medida para o UEE Advocacy para uso em operações de vigilância e extração. Embora o EX tenha sido rejeitado para uso geral, uma variante do modelo foi lançada para o público que desejava manter um perfil discreto.\n\n--- STATS ---\nSCM: 265 m/s  |  Max: 1,450 m/s\nBoost: +595 m/s  /  -290 m/s\nCrew: 1  |  Length: 12.5m  |  Class: Combate  |  Role: Caça Furtivo\nShields: S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nInsurance: 5.91 min base  |  1.97 min express
vehicle_DescMISC_Razor_LX=Fabricante: Mirai\nFoco: Corrida\n\nA Razor recebe uma supercarga. A LX apresenta um motor com overclock para liberar velocidades máximas alucinantes. Esse poder tem um custo, com redução na manobrabilidade e no armamento, tornando-a ideal para corridas de linha reta. Mas quem precisa de armas quando você está deixando sua competição para trás?\n\n--- STATS ---\nSCM: 275 m/s  |  Max: 1,525 m/s\nBoost: +490 m/s  /  -290 m/s\nCrew: 1  |  Length: 12.5m  |  Class: Competição  |  Role: Corrida\nInsurance: 6.08 min base  |  2.02 min express
vehicle_DescMISC_Reliant=Fabricante: MISC\nFoco: Inicial / Carga Leve\n\nCom a Reliant Kore, a MISC adiciona à sua já impressionante linha de naves uma espaçonave menor de classe introdutória. Utilizando designs avançados Xi’An, a Reliant apresenta asas largas e elegantes, propulsores omnidirecionais e um cockpit de dois lugares totalmente articulado que suporta modos de voo horizontal e vertical. Tudo isso se combina com uma Capacidade de Carga maior do que muitas naves de sua classe para tornar a Kore uma escolha natural para transporte de curto alcance ou, com a simples adição de alguns componentes opcionais, esta nave versátil pode fazer qualquer coisa que você sonhar.\n\n--- STATS ---\nCrew: 1  |  Length: 14.8m  |  Class: Transportador  |  Role: Inicial / Frete Leve\nGuns: 2  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,200\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 0.68 min base  |  0.00 min express
vehicle_DescMISC_Reliant_Mako=Fabricante: MISC\nFoco: Reportagem\n\nO Império depende de informações atualizadas, e é por isso que os repórteres devem ser capazes de ir onde as notícias acontecem: onde e quando quiser. É aí que entra o Mako, combinando a flexibilidade e confiabilidade de uma MISC Reliant com um pacote de câmera Cernan de última geração para capturar cada momento com a clareza e precisão que fazem as manchetes.\n\n--- STATS ---\nSCM: 220 m/s  |  Max: 1,150 m/s\nBoost: +480 m/s  /  -250 m/s\nCrew: 1  |  Length: 14.8m  |  Class: Suporte  |  Role: Reportador\nGuns: 2  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,200\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 5.36 min base  |  1.79 min express
vehicle_DescMISC_Reliant_Sen=Fabricante: MISC\nFoco: Ciência da Luz\n\nMagalhães, Pierce, Croshaw - nomes que ressoam na história graças ao seu espírito aventureiro, sua natureza curiosa e sua nave confiável. A Reliant Sen é uma plataforma científica versátil e móvel equipada com recursos de longo alcance para levá-lo cada vez mais longe, bem como o avançado sistema de sensores Samos. Perfeito para o aspirante a explorador que deseja sussurrar seu nome nos corredores da história.\n\n--- STATS ---\nSCM: 220 m/s  |  Max: 1,150 m/s\nBoost: +480 m/s  /  -250 m/s\nCrew: 1  |  Length: 14.8m  |  Class: Industrial  |  Role: Ciencia Leve\nGuns: 2  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,200\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 4.82 min base  |  1.61 min express
vehicle_DescMISC_Reliant_Tana=Fabricante: MISC\nFoco: Caça Estelar Leve\n\nÀ medida que a humanidade continua a se expandir por todo o universo, a necessidade de um caça estelar leve e versátil também aumentou. A construção robusta e de fácil manutenção da Reliant Tana é ideal para defender fronteiras e postos avançados, graças ao seu motor personalizado de alto desempenho, escudos mais fortes e suportes de armas adicionais.\n\n--- STATS ---\nSCM: 222 m/s  |  Max: 1,150 m/s\nBoost: +480 m/s  /  -250 m/s\nCrew: 1  |  Length: 14.8m  |  Class: Combate  |  Role: Caça Leve\nGuns: 2  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 3,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 4.82 min base  |  1.61 min express
vehicle_DescMISC_Starfarer=Fabricante: MISC\nFoco: reabastecimento pesado\n\nA Starfarer difere dos graneleiros convencionais em um ponto crucial: é uma plataforma de combustível especial. A Starfarer foi projetado não apenas para carregar, armazenar e proteger unidades de estase de propelente, mas também para receber gases do espaço e prepará-los para uso sem pouso. Além desta tarefa, a Starfarer também pode ser utilizado para transportar contêineres convencionais para granéis.\n\n--- STATS ---\nSCM: 106 m/s  |  Max: 845 m/s\nBoost: +295 m/s  /  -106 m/s\nCrew: 1  |  Length: 102.0m  |  Class: Suporte  |  Role: Abastecimento Pesado\nTurrets: 1\nShields: 3× S3  |  Coolers: 2× S3  |  Power: S3  |  QD: S3\nArmor HP: 12,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 315  |  E 360  |  D 0  |  T 0\nInsurance: 18.00 min base  |  6.00 min express
vehicle_DescMISC_Starfarer_Gemini=Fabricante: MISC\nFoco: Reabastecimento Pesado\n\nOs militares do United Empire of Earth usam uma variante adaptada da Starfarer para suas operações na linha de frente. O G2M Gemini, mais comumente a Starfarer Gemini ou "Star G", troca alguma capacidade de carga e manobrabilidade por uma blindagem reforçada, maior escudo, motores mais potentes e versões mais fortes das três torres tripuladas.\n\n--- STATS ---\nSCM: 106 m/s  |  Max: 845 m/s\nBoost: +295 m/s  /  -106 m/s\nCrew: 2  |  Length: 102.0m  |  Class: Suporte  |  Role: Abastecimento Pesado\nTurrets: 1\nShields: 3× S3  |  Coolers: 2× S3  |  Power: S3  |  QD: S3\nArmor HP: 18,150\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 331  |  E 378  |  D 0  |  T 0\nInsurance: 35.34 min base  |  11.78 min express
vehicle_DescMISC_Starfarer_Teach=Fabricante: MISC\nFoco: Reabastecimento Pesado\n\nA Starfarer difere dos cargueiros de grande volume tradicionais numa caraterística chave: é uma plataforma de combustível dedicada. A Starfarer foi projetada não apenas para carregar, armazenar e proteger unidades de estase de combustível, mas também para absorver gases espaciais e refiná-los para uso sem a necessidade de pousar. E embora se destaque nisso, a Starfarer também pode ser usada para transportar cápsulas de carga de grande volume tradicionais.\n\nAtendendo às difíceis condições de trabalho de Nyx, a Teach's Ship Shop equipou esta edição especial com um *loadout* (conjunto de equipamentos) personalizado que apresenta componentes robustos para que você possa enfrentar melhor o trabalho em questão.\n\n--- STATS ---\nCrew: 1  |  Length: 102.0m  |  Class: Suporte  |  Role: Abastecimento Pesado\nTurrets: 1\nShields: 3× S3  |  Coolers: 2× S3  |  Power: S3  |  QD: S3\nArmor HP: 12,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 315  |  E 360  |  D 0  |  T 0\nInsurance: 18.00 min base  |  6.00 min express
vehicle_DescMISC_Starlancer_MAX_Collector_Indust=Fabricante: MISC\nFoco: Carga Média\n \nPara aqueles que buscam expandir suas operações de transporte, os engenheiros da MISC atualizaram a Starlancer MAX com um porão extra espaçoso pronto para transportar carga e veículos. Combinada com acomodações confortáveis para viagens longas e um pacote defensivo completo para quando você sai do caminho comum, é fácil ver por que a Starlancer MAX é a transportadora preferida para pilotos industriosos por todo o universo.\n\n--- STATS ---\nCrew: 1  |  Length: 90.0m  |  Class: Transportador  |  Role: Frete Médio\nTurrets: 2\nArmor HP: 12,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 315  |  E 360  |  D 0  |  T 0\nInsurance: 12.33 min base  |  3.08 min express
vehicle_DescMISC_Starlancer_TAC_Collector_Military=Fabricante: MISC\nFoco: Canhoneira\n \nPara aqueles que procuram uma nave versátil que possa se sustentar sozinha em uma luta, os engenheiros atualizaram a Starlancer TAC com um pacote ofensivo agressivo pronto para enfrentar os inimigos mais ferozes. Quando você aceita um trabalho de alto risco e alta recompensa, a Starlancer TAC está lá para garantir que você e sua tripulação sejam capazes de levá-lo até o fim.\n\nWikelo aqui. Fiz modificações úteis para tornar a nave muito mais parecida com um caça. Muito impressionante.\n\n--- STATS ---\nCrew: 1  |  Length: 90.0m  |  Class: Combate  |  Role: Guerra\nTurrets: 9\nShields: 2× S3  |  Coolers: S3  |  Power: S3  |  QD: S2\nArmor HP: 18,150\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 347  |  E 396  |  D 0  |  T 0\nInsurance: 13.33 min base  |  3.33 min express
vehicle_DescMISC_Starlite=Fabricante: MISC\nFoco: Reabastecimento Leve\n\nSe existe uma constante no universo, é que as naves eventualmente ficarão sem combustível. É aí que entra a Starlite. Apresentando duas cápsulas de combustível padrão e um design elegante e simplificado, a Starlite foi meticulosamente projetada pelos engenheiros da MISC para oferecer serviços de reabastecimento a naves necessitadas, onde quer que estejam presas.\n\n--- STATS ---\nSCM: 150 m/s  |  Max: 970 m/s\nBoost: +340 m/s  /  -160 m/s\nCrew: 1  |  Length: 32.0m  |  Class: Suporte  |  Role: Reabastecimento Leve\nInsurance: 5.82 min base  |  1.45 min express
