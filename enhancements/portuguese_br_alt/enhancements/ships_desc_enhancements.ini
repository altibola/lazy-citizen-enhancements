vehicle_DescDRAK_Clipper=Fabricante: Drake Interplanetary\nFoco: Generalista\n \nSe há uma coisa que todo capitão precisa levar a sério ao se preparar para a jornada pelas estrelas é "esperar o inesperado". Com um compartimento de carga, instalações médicas e capacidades de fabricação, juntamente com a sensibilidade de design prático da Drake, a Clipper é a multifuncional perfeita para qualquer novo empreendimento espacial.\n\n--- STATS ---\nSCM: 205 m/s  |  Max: 1,000 m/s\nBoost: +405 m/s  /  -230 m/s\nCrew: 1  |  Length: 26.5m  |  Class: Exploração  |  Role: Generalista\nInsurance: 8.17 min base  |  2.05 min express
vehicle_DescDRAK_Command_Module=Fabricante: Drake Interplanetary\nFoco: Logística\n\nAté os capitães mais experientes sabem quando o melhor curso de ação é reduzir suas perdas e viver para lutar outro dia. Com este módulo de comando destacável, a Drake garantiu que operadores cautelosos possam se extrair do corpo principal da nave e fazer uma saída rápida com facilidade, caso surja a necessidade.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,100 m/s\nBoost: +350 m/s  /  -220 m/s\nCrew: 2  |  Length: 20.0m  |  Class: Transporte  |  Role: Transporte\nInsurance: 3.00 min base  |  0.00 min express
vehicle_DescDRAK_Corsair=Fabricante: Drake Interplanetary\nFoco: Expedição\n\nAtenda ao chamado do espaço inexplorado e aproveite o espírito de exploração com a Drake Corsair. Utilizando um design de chassi assimétrico único, esta exploradora versátil pode ir aonde quer que os ventos da aventura o levem.\n\n--- STATS ---\nSCM: 190 m/s  |  Max: 1,025 m/s\nBoost: +390 m/s  /  -205 m/s\nCrew: 4  |  Length: 53.0m  |  Class: Exploração  |  Role: Expedição\nInsurance: 17.01 min base  |  5.67 min express
vehicle_DescDRAK_Corsair_PYAM_Exec=Fabricante: Drake Interplanetary\nFoco: Expedição\n\nAtenda ao chamado do espaço inexplorado e aproveite o espírito de exploração com a Drake Corsair. Utilizando um design de chassi assimétrico único, esta exploradora versátil pode ir aonde quer que os ventos da aventura o levem. Esta variante apresenta uma pintura e um conjunto de armas exclusivos para a nave.\n\n--- STATS ---\nCrew: 4  |  Length: 53.0m  |  Class: Exploração  |  Role: Expedição\nInsurance: 17.01 min base  |  5.67 min express
vehicle_DescDRAK_Cutlass_Black=Fabricante: Drake Interplanetary\nFoco: Carga Leve / Caça Médio\n\nA Drake Interplanetary afirma que a Cutlass Black é uma solução de baixo custo e fácil manutenção para unidades de milícia locais dentro do sistema. O compartimento de carga maior que a média, o assento do RIO e o suporte de tração dedicado são, insiste a literatura da empresa, para facilitar as operações de busca e salvamento.\n\n--- STATS ---\nSCM: 217 m/s  |  Max: 1,150 m/s\nBoost: +465 m/s  /  -230 m/s\nCrew: 3  |  Length: 37.5m  |  Class: Multifunção  |  Role: Frete Leve / Caça Médio\nInsurance: 9.99 min base  |  3.33 min express
