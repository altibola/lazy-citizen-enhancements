TheCollector_ShipMod_F7_Hornet_VehicleDesc=Fabricante: Anvil Aerospace\nFoco: Caça Médio\n \nRefinando seu renomado caça de superioridade militar com a tecnologia mais atual, a Anvil Aerospace criou a F7C-M Super Hornet Mk II, mantendo o segundo assento e a torreta esférica que tornaram o original uma verdadeira ameaça a ser enfrentada.\n\nOlá, eu sou Wikelo. Fiz alterações na nave. Já era impressionante, sim, mas ficou ainda melhor.\n\n--- STATS ---\nCrew: 2  |  Length: 24.0m  |  Class: Combate  |  Role: Caça Médio\nShields: S1\nInsurance: 10.17 min base  |  2.55 min express
TheCollector_ShipMod_MISC_Fortune_VehicleDesc=Fabricante: MISC\nFoco: Sucateamento\n\nPara quem está pronto para elevar sua profissão ao próximo nível, os engenheiros da MISC cuidadosamente criaram a Fortune como uma nave de sucateamento pequena e de primeira linha. Equipado com um braço de sucateamento versátil e um elevador de carga, o MISC Fortune foi construído do chassi para transformar lixo em tesouro.\n\nOlá, eu sou Wikelo. Você gosta de encontrar coisas para fazer outras coisas. Eu também. Essa nave é muito boa para isso. Wikelo fez um pequeno aprimoramento.\n\n--- STATS ---\nCrew: 1  |  Length: 26.5m  |  Class: Industrial  |  Role: Sucateamento Leve\nArmor HP: 4,114\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 5.18 min base  |  1.30 min express
TheCollector_ShipMod_MRAI_GuardianQI_VehicleDesc=Fabricante: Mirai\nFoco: Interdição\n\nNão é surpreendente que hostis possam fugir quando confrontados com um oponente poderoso, mas graças às suas capacidades de bloqueio quântico, o Mirai Guardian QI garante que seus inimigos não poderão lutar outro dia. Pegando as melhores características da Guardian base, os engenheiros da Mirai fizeram da variante QI o complemento ideal para qualquer força de proteção.\n\nWikelo gosta muito dessa nave. Teve que entrar e brincar com ela. Adicionou partes para torná-la ainda mais útil. Aproveite.\n\n--- STATS ---\nCrew: 1  |  Length: 24.3m  |  Class: Combate  |  Role: Interdição\nInsurance: 12.00 min base  |  3.00 min express
TheCollector_ShipMod_MRAI_Pulse_VehicleDesc=Fabricante: Mirai\nFoco: Combate\n \nOs engenheiros da Mirai se propuseram a criar uma moto de canópia aberta capaz de mais. Uma conexão mais íntima entre piloto e desempenho com uma silhueta ajustada. Uma forma mais intuitiva de dominar paisagens formidáveis com um sistema grav-lev responsivo. Uma experiência de combate mais inteligente com uma arma customizada totalmente integrada ao espírito do veículo. O resultado final? A Pulse da Mirai.\n\nWikelo passou muito tempo no planeta para ser rápido. Fez algumas mudanças para você ir rápido também. Você vai gostar.\n\n--- STATS ---\nCrew: 1  |  Length: 3.5m  |  Class: Combate  |  Role: Desbravador\nArmor HP: 1,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 6  |  E 4  |  D 0  |  T 0\nInsurance: 0.15 min base  |  0.05 min express
