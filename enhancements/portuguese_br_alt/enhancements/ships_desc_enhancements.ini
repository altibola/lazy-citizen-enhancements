vehicle_DescDRAK_Cutlass_Blue=Fabricante: Drake Interplanetary\nFoco: Interdição\n\nElegante, implacável e autêntica. A Cutlass Blue adiciona mísseis, um motor mais agressivo e células de retenção Durasteel no compartimento de carga ao modelo padrão. A Cutlass Blue é a nave padrão da milícia do outro mundo, preferido para patrulhas.\n\n--- STATS ---\nSCM: 220 m/s  |  Max: 1,165 m/s\nBoost: +467 m/s  /  -230 m/s\nCrew: 3  |  Length: 37.5m  |  Class: Combate  |  Role: Interdição\nInsurance: 9.99 min base  |  3.33 min express
vehicle_DescDRAK_Cutlass_Red=Fabricante: Drake Interplanetary\nFoco: Médico\n\nA Cutlass Red converte o compartimento de carga padrão em uma instalação médica bem equipada, incluindo um Autodoc. Esta ambulância estelar apresenta o Nav-E7 Echo Transponder, um escâner de longo alcance e um colar de Acoplamento Secure Plus, tornando-a ideal para busca e resgate. Este modelo também apresenta uma pintura Red Crossbones exclusiva.\n\n--- STATS ---\nSCM: 212 m/s  |  Max: 1,125 m/s\nBoost: +460 m/s  /  -230 m/s\nCrew: 2  |  Length: 37.5m  |  Class: Suporte  |  Role: Médico\nInsurance: 14.99 min base  |  5.00 min express
vehicle_DescDRAK_Cutlass_Steel=Fabricante: Drake Interplanetary\nFoco: Transporte de Tropas\n\nCom a Cutlass Steel, a Drake Interplanetary reinventou mais uma vez seu design clássico para criar uma nave de transporte de combate de próxima geração através da adição de assentos de salto dedicados e um arsenal expandido. É um universo perigoso lá fora, e a Cutlass Steel está pronta para abrir caminho através de qualquer coisa que se coloque entre você e sua tripulação dedicada.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,100 m/s\nBoost: +420 m/s  /  -240 m/s\nCrew: 3  |  Length: 37.5m  |  Class: Combate  |  Role: Transporte de Tropa\nInsurance: 11.99 min base  |  4.00 min express
vehicle_DescDRAK_Cutter=Fabricante: Drake Interplanetary\nFoco: Inicial / Desbravadora\n\nProjetada para pessoas trabalhadoras de todos os tipos, a Cutter concentra 4 SCU de espaço de carga e muito vigor em uma estrutura robusta e compacta. É uma nave que incorpora verdadeiramente o espírito da Drake: que não importa quem você seja ou o que faça, você pode alcançar as estrelas.\n\n--- STATS ---\nSCM: 180 m/s  |  Max: 1,010 m/s\nBoost: +380 m/s  /  -160 m/s\nCrew: 1  |  Length: 20.0m  |  Class: Exploração  |  Role: Inicial / Desbravador\nShields: S1  |  Coolers: S1  |  Power: S1  |  QD: S1\nArmor HP: 1,980\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 8  |  D 0  |  T 0\nInsurance: 3.37 min base  |  1.12 min express
vehicle_DescDRAK_Cutter_Rambler=Fabricante: Drake Interplanetary\nFoco: Expedição\n\nOs chefes da Drake ouviram o que você tinha a dizer e a resposta foi a Cutter Rambler. Com base no original, a Rambler preserva 2 SCU completos de espaço de carga, ao mesmo tempo que adiciona os confortos solicitados e armazenamento pessoal suficiente para fazer com que até a viagem mais longa passe num piscar de olhos.\n\n--- STATS ---\nCrew: 1  |  Length: 20.0m  |  Class: Exploração  |  Role: Expedição\nCoolers: S1  |  Power: S1  |  QD: S1\nArmor HP: 1,980\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 8  |  D 0  |  T 0\nInsurance: 1.25 min base  |  0.00 min express
vehicle_DescDRAK_Cutter_Scout=Fabricante: Drake Interplanetary\nFoco: Desbravadora\n\nReduzindo a estrutura robusta e compacta da Cutter ao essencial, a Drake pegou uma nave já impressionante e a transformou no veículo de reconhecimento ideal. Apresentando capacidades aprimoradas de radar e escaneamento combinadas com mais potência e resfriamento, a Cutter Scout está pronta para voar à frente do grupo.\n\n--- STATS ---\nSCM: 180 m/s  |  Max: 1,010 m/s\nBoost: +380 m/s  /  -160 m/s\nCrew: 1  |  Length: 20.0m  |  Class: Exploração  |  Role: Desbravador\nCoolers: S2  |  Power: S2\nArmor HP: 1,980\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 8  |  D 0  |  T 0\nInsurance: 3.87 min base  |  1.28 min express
vehicle_DescDRAK_Dragonfly=Fabricante: Drake Interplanetary\nFoco: Corrida\n\nA Drake Dragonfly é a mini nave perfeita para quem quer viver no limite. Sem nada separando o piloto dos perigos do espaço, a Dragonfly é tanto uma aventura quanto uma nave! A conversão de modo duplo permite que a Dragonfly opere no solo ou no espaço, e um segundo assento voltado para trás significa que você pode até levar um passageiro!\n\n--- STATS ---\nSCM: 190 m/s  |  Max: 523 m/s\nBoost: +270 m/s  /  -120 m/s\nCrew: 1  |  Length: 7.0m  |  Class: Competição  |  Role: Corrida\nGuns: 2\nCoolers: S0  |  Power: S0\nArmor HP: 1,170\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.10 min base  |  0.00 min express
