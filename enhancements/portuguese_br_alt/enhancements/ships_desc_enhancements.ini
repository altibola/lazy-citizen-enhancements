vehicle_DescANVL_C8R_Pisces_Rescue=Fabricante: Anvil Aerospace\nFoco: Médico\n\nCom a adição de uma Cama Médica Tier 3 a bordo, a C8R Pisces pode tratar ferimentos leves e manter um paciente estável enquanto o transporta para a segurança de uma nave maior, estação ou instalação médica próxima, tornando-a um recurso inestimável para busca e salvamento de curto alcance.\n\n--- STATS ---\nCrew: 1  |  Length: 16.0m  |  Class: Suporte  |  Role: Médico\nGuns: 2\nShields: S1  |  Coolers: S1  |  Power: S1\nInsurance: 4.59 min base  |  1.53 min express
vehicle_DescANVL_C8X_Pisces_Expedition=Fabricante: Anvil Aerospace\nFoco: Desbravadora\n\nExibindo mais armas e uma pintura de edição limitada, a C8X Pisces Expedition transforma a robusta nave dependente em uma embarcação de exploração independente perfeitamente viável. Com sua estrutura compacta, manobrabilidade ágil e assentos para três pessoas, a Pisces Expedition está pronta para enfrentar suas próprias aventuras.\n\n--- STATS ---\nCrew: 1  |  Length: 16.0m  |  Class: Exploração  |  Role: Desbravador\nGuns: 4\nShields: S1  |  Coolers: S1  |  Power: S1  |  QD: S1\nInsurance: 3.36 min base  |  1.12 min express
