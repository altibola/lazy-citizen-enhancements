vehicle_DescCNOU_Mustang_Beta=Fabricante: Consolidated Outland \nFoco: Desbravador\n\nA Mustang Beta, com autonomia sem precedentes, é feita para voos de longa duração. O Motor de Salto Tarsus Leaper padrão de fábrica permite que a Beta viaje até os sistemas mais distantes da galáxia com facilidade, enquanto os alojamentos Com4T exclusivos da nave farão com que a viagem pareça como se você nunca tivesse saído de casa.\n\n--- STATS ---\nSCM: 228 m/s  |  Max: 1,218 m/s\nBoost: +500 m/s  /  -260 m/s\nCrew: 1  |  Length: 21.5m  |  Class: Exploração  |  Role: Desbravador\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,000\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 10  |  E 9  |  D 0  |  T 0\nInsurance: 3.71 min base  |  1.24 min express
vehicle_DescCNOU_Mustang_Delta=Fabricante: Consolidated Outland \nFoco: Caça Leve\n\nEmbora possa não ser capaz de enfrentar algumas das naves especificamente militares, ao reforçar a já resistente construção do casco da Mustang com a própria linha de Armadura de Redução de Massa da Classe de Cavalaria da Consolidated Outland, a Delta tem uma assinatura transversal reduzida que equilibra o campo de jogo.\n\n--- STATS ---\nSCM: 226 m/s  |  Max: 1,195 m/s\nBoost: +500 m/s  /  -260 m/s\nCrew: 1  |  Length: 21.5m  |  Class: Combate  |  Role: Caça Leve\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,000\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 10  |  E 9  |  D 0  |  T 0\nInsurance: 4.01 min base  |  1.34 min express
vehicle_DescCNOU_Mustang_Gamma=Fabricante: Consolidated Outland \nFoco: Corrida\n\nAs equipes de design e engenharia da Consolidated Outland conseguiram ajustar e refinar a Mustang em uma corredora admirável. O resultado final, a Mustang Gamma, tem aceleração suave e potência sob demanda graças a um pacote inovador com três potentes motores Magma Jet para impulso máximo.\n\n--- STATS ---\nSCM: 244 m/s  |  Max: 1,230 m/s\nBoost: +533 m/s  /  -273 m/s\nCrew: 1  |  Length: 21.5m  |  Class: Competição  |  Role: Corrida\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,000\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 10  |  E 9  |  D 0  |  T 0\nInsurance: 7.28 min base  |  2.43 min express
vehicle_DescCNOU_Mustang_Omega=Fabricante: Consolidated Outland \nFoco: Corrida\n\nA Consolidated Outland se uniu à empresa de ajustes personalizados Accelerated Mass Design para criar uma corredora de edição limitada que apresenta uma entrada de combustível aprimorada para uma reciclagem mais rápida do já impressionante sistema de impulso da nave. Para encerrar a colaboração, a AMD recrutou o artista underground residente Sektor8 para projetar a pintura dinâmica.\n\n--- STATS ---\nSCM: 244 m/s  |  Max: 1,230 m/s\nBoost: +533 m/s  /  -273 m/s\nCrew: 1  |  Length: 21.5m  |  Class: Competição  |  Role: Corrida\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,000\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 10  |  E 9  |  D 0  |  T 0\nInsurance: 7.28 min base  |  2.43 min express
