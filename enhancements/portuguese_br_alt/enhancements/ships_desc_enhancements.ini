vehicle_DescANVL_Hornet_F7CM=Fabricante: Anvil Aerospace\nFoco: Caça Médio\n\nO mais próximo do equipamento Militar, o que é legalmente possível para um modelo Civil, a F7C-M Super Hornet recoloca a torreta esférica e oferece peças quase militares sob o capô. Provando que duas cabeças pensam melhor que uma, um segundo assento foi adicionado para dividir a logística e a tarefa de combate, tornando a Super Hornet um alvo verdadeiramente assustador de se enfrentar.\n\n--- STATS ---\nSCM: 219 m/s  |  Max: 1,142 m/s\nBoost: +477 m/s  /  -249 m/s\nCrew: 1  |  Length: 28.2m  |  Class: Combate  |  Role: Caça Médio\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 6,600\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 24  |  E 13  |  D 0  |  T 0\nInsurance: 9.72 min base  |  3.24 min express
vehicle_DescANVL_Hornet_F7CM_Heartseeker=Fabricante: Anvil Aerospace\nFoco: Caça Médio\n\nProjetada para pilotos cujo verdadeiro amor é a emoção de um duelo angustiante, a edição limitada F7C-M Heartseeker é 'a única' para os verdadeiros obstinados em combate. Carregada com componentes de última geração e equipada com quatro imponentes canhões laser Behring, esta feroz erradicadora aprimora a lendária proficiência de combate da Super Hornet para oferecer a você a última palavra em combate espacial.\n\n--- STATS ---\nCrew: 1  |  Length: 28.2m  |  Class: Combate  |  Role: Caça Médio\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 6,600\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 24  |  E 13  |  D 0  |  T 0\nInsurance: 9.72 min base  |  3.24 min express
vehicle_DescANVL_Hornet_F7CM_Heartseeker_Mk2=Fabricante: Anvil Aerospace\nFoco: Caça Médio\nQuando a F7C-M Super Hornet foi atualizada para a Mk II, não havia dúvida de que a Anvil Aerospace daria o mesmo tratamento à edição especial Heartseeker. Com seu robusto pacote de armas projetado para pilotos cujo verdadeiro amor é a emoção de um angustiante dogfight, a edição limitada da F7C-M Heartseeker Mk II está pronta para se tornar a nave favorita de uma nova geração de verdadeiros fanáticos por combate.\n\n--- STATS ---\nCrew: 2  |  Length: 24.0m  |  Class: Combate  |  Role: Caça Médio\nShields: 3× S1  |  Coolers: 2× S1  |  Power: S2  |  QD: S1\nInsurance: 11.17 min base  |  2.80 min express
