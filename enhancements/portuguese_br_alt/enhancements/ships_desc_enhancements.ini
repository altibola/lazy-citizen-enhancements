vehicle_DescESPR_Stinger=Fabricante: Esperia\nFoco: Caça Pesado\n \nCausando estragos nas fronteiras da Humanidade, este caça pesado Vanduul, designado 'Stinger' pela Marinha do UEE, conquistou um legado manchado de sangue como uma grande ameaça tanto para pilotos quanto para naves capitais. Originalmente destinado ao treinamento de esquadrões agressores, a Esperia agora está disponibilizando sua réplica detalhada para a população civil em geral. \n\n\n--- STATS ---\nSCM: 207 m/s  |  Max: 1,050 m/s\nBoost: +440 m/s  /  -230 m/s\nCrew: 1  |  Length: 36.0m  |  Class: Combate  |  Role: Caça Pesado\nInsurance: 25.30 min base  |  6.30 min express
vehicle_DescESPR_Talon=Fabricante: Esperia\nFoco: Caça Leve\n\nA Talon representa o esforço contínuo da Esperia para preservar os projetos historicamente significativos das naves Tevarin. Uma nave de combate manobrável de assento único com armadura leve, mas poderosos escudos direcionais "Phalanx", a Talon é feita para atacar primeiro e com força antes de usar os escudos para cobrir sua fuga.\n\n--- STATS ---\nSCM: 225 m/s  |  Max: 1,190 m/s\nBoost: +500 m/s  /  -260 m/s\nCrew: 1  |  Length: 24.0m  |  Class: Combate  |  Role: Caça Leve\nCoolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 3,000\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 8  |  E 10  |  D 0  |  T 0\nInsurance: 11.34 min base  |  3.78 min express
