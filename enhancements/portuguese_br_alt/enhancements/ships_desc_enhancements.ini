vehicle_DescORIG_X1_Velocity=Fabricante: Origin Jumpworks\nFoco: Corrida\n\nComo tornar as coisas rápidas ainda mais rápidas? A X1 Velocity da Origin Jumpworks ousa ultrapassar os limites da velocidade eliminando a base\n\n--- STATS ---\nSCM: 222 m/s  |  Max: 611 m/s\nBoost: +302 m/s  /  -142 m/s\nCrew: 1  |  Length: 1.6m  |  Class: Competição  |  Role: Corrida\nShields: ?  |  Coolers: S0  |  Power: S0\nArmor HP: 1,560\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.15 min base  |  0.05 min express
vehicle_DescORIG_m50=Fabricante: Origin Jumpworks\nFoco: Corrida\n\nSe você deseja ir do ponto A ao ponto B o mais rápido possível e com o máximo de estilo possível, então a M50 da Origin é para você. Com seus motores superalimentados neutralizando um pequeno carregamento de armas, a M50 é uma nave que se move RÁPIDO.\n\n--- STATS ---\nSCM: 280 m/s  |  Max: 1,575 m/s\nBoost: +490 m/s  /  -290 m/s\nCrew: 1  |  Length: 11.5m  |  Class: Competição  |  Role: Corrida\nGuns: 2× S1 (empty)  |  MRacks: 2× S1\nShields: S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 960\nDmg Mult: P 0.85x  |  E 0.70x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 7  |  D 0  |  T 0\nInsurance: 6.08 min base  |  2.02 min express
vehicle_DescRSI_Apollo_Medivac=Fabricante: RSI\nFoco: Médico\n\nAlém da blindagem superior e dos racks de mísseis duplos, o modelo 2948 Apollo Medivac homenageia o clássico filme 2910, Astromedics: Back from the Brink, com uma pintura que recria com precisão a Kithara, a protagonista.\n\n--- STATS ---\nSCM: 175 m/s  |  Max: 1,000 m/s\nBoost: +340 m/s  /  -180 m/s\nCrew: 2  |  Length: 54.0m  |  Class: Suporte  |  Role: Médico\nInsurance: 18.17 min base  |  4.55 min express
vehicle_DescRSI_Apollo_Triage=Fabricante: RSI\nFoco: Tecnologia médica\n\nA lendária Apollo Triage da Roberts Space Industries é o padrão ouro entre veículos médicos e de emergência rápidos. Atualizado para suportar a tecnologia de regeneração, a Apollo tem uma longa história de fornecimento de assistência crítica ao Império e além por mais de dois séculos.\n\n--- STATS ---\nSCM: 170 m/s  |  Max: 1,025 m/s\nBoost: +345 m/s  /  -180 m/s\nCrew: 2  |  Length: 54.0m  |  Class: Suporte  |  Role: Médico\nInsurance: 17.50 min base  |  4.38 min express
vehicle_DescRSI_Apollo_Triage_Collector_Stealth=Fabricante: RSI\nFoco: Médico\n\nA lendária Apollo Triage da Roberts Space Industries é o padrão ouro em veículos de evacuação médica e resposta rápida de emergência. Atualizada para suportar tecnologia de regeneração, a Apollo tem uma longa história fornecendo auxílio crítico ao Império e além por mais de dois séculos.\n\nWikelo aqui. Fiz modificações úteis para tornar a nave muito mais difícil de ver. Furtiva.\n\n--- STATS ---\nCrew: 2  |  Length: 54.0m  |  Class: Suporte  |  Role: Médico\nInsurance: 17.50 min base  |  4.38 min express
vehicle_DescRSI_Aurora_CL=Fabricante: RSI\nFoco: Frete Leve\n\nPersonalizado para excursões mercantis e comerciais, a Aurora Clipper é o veículo perfeito para aspirantes a empreendedores e comerciantes experientes. Trocando um gerador de energia menor e recursos de blindagem por uma capacidade de carga expandida, a Clipper aumenta a vantagem do veículo mercante pessoal.\n\n--- STATS ---\nCrew: 1  |  Length: 19.0m  |  Class: Transportador  |  Role: Frete Leve\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nInsurance: 2.43 min base  |  0.81 min express
vehicle_DescRSI_Aurora_ES=Fabricante: RSI\nFoco: Inicial / Desbravadora\n\nA Aurora é a descendente moderna da espaçonave X-7 da Roberts Space Industries, que testou os primeiríssimos motores de salto. Utilitária ao extremo, a Aurora é a nave perfeita para iniciantes: o que lhe falta em estilo, ela compensa com amplo espaço para módulos de melhoria.\n\n--- STATS ---\nCrew: 1  |  Length: 19.0m  |  Class: Multifunção  |  Role: Inicial / Desbravador\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nInsurance: 2.16 min base  |  0.72 min express
vehicle_DescRSI_Aurora_LN=Fabricante: RSI\nFoco: Caça Leve\n\nCom um gerador de escudo mais robusto e um par de pontos de arma adicionais, a Legionnaire é um caça de combate dedicado, capaz de enfrentar qualquer obstáculo que o universo tenha a oferecer.\n\n--- STATS ---\nCrew: 1  |  Length: 19.0m  |  Class: Combate  |  Role: Caça Leve\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nInsurance: 2.92 min base  |  0.97 min express
vehicle_DescRSI_Aurora_LX=Fabricante: RSI\nFoco: Desbravador\n\nTenha orgulho de suas raízes com a nova Aurora Deluxe, construído para o piloto exigente que nunca se esquece de onde veio. O LX apresenta um interior em couro envernizado que garante conforto em longas distâncias em preto profundo.\n\n--- STATS ---\nCrew: 1  |  Length: 19.0m  |  Class: Exploração  |  Role: Desbravador\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nInsurance: 2.70 min base  |  0.90 min express
vehicle_DescRSI_Aurora_MR=Fabricante: RSI\nFoco: Inicial / Caça Leve\n\nTalvez você esteja procurando por algo que ofereça Capacidade de Carga, mas que também tenha capacidades de combate? A Aurora Marque vem com um par de lasers de qualidade Behring e um sistema de resfriamento de armas de alta qualidade.\n\n--- STATS ---\nCrew: 1  |  Length: 19.0m  |  Class: Combate  |  Role: Caça Leve\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nInsurance: 2.92 min base  |  0.97 min express
vehicle_DescRSI_Aurora_Mk2=Fabricante: Roberts Space Industries\nFoco: Inicial / Carga Leve\n \nUma nova abordagem para uma nave clássica, a Roberts Space Industries reimaginou a testada e aprovada Aurora desde as estruturas. Apresentando a Aurora Mk II. Tudo, desde o desempenho e a usabilidade da nave até o seu estilo, foi revisado com uma nova geração de pilotos em mente. Além disso, esta versão mais recente introduz um novo truque para a série Aurora – módulos intercambiáveis. Em vez de prender os pilotos a uma única carreira, esses módulos permitem uma especialização operacional direta a partir do conforto do seu hangar. Seja você um proprietário de primeira viagem ou um piloto experiente pronto para uma atualização no seu veículo diário, a Aurora Mk II está à sua espera.\n\n--- STATS ---\nSCM: 225 m/s  |  Max: 1,230 m/s\nBoost: +460 m/s  /  -240 m/s\nCrew: 1  |  Length: 27.4m  |  Class: Multifunção  |  Role: Inicial / Caça Leve\nInsurance: 5.82 min base  |  1.45 min express
vehicle_DescRSI_Aurora_SE=Fabricante: RSI\nFoco: Multitarefa\n\nIntegrando o que havia de melhor na série Aurora Mk I, tão amada por gerações, esta edição especial atinge um equilíbrio impressionante para permitir que os pilotos lidem com uma ampla gama de tarefas. Com a Aurora Mk I SE estacionada em seu hangar, esta nave versátil certamente se tornará sua escolha diária graças à sua habilidade de lidar com qualquer desafio que a vida coloque em seu caminho.\n\n--- STATS ---\nCrew: 1  |  Length: 19.0m  |  Class: Combate  |  Role: Caça Leve\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nInsurance: 2.92 min base  |  0.97 min express
vehicle_DescRSI_Constellation_Andromeda=Fabricante: RSI\nFoco: Frete Médio / Nave de Guerra\n\nA Constellation Andromeda, um cargueiro para vários passageiros, é a nave mais popular na atual produção da RSI. As Constellations são adoradas tanto por contrabandistas quanto por comerciantes porque são modulares, de alta potência... e têm uma aparência absolutamente icônica.\n\n--- STATS ---\nSCM: 190 m/s  |  Max: 1,000 m/s\nBoost: +390 m/s  /  -191 m/s\nCrew: 1  |  Length: 63.5m  |  Class: Multifunção  |  Role: Frete Médio / Guerra\nTurrets: 2  |  MRacks: 4× S4  4× S5\nShields: S3  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 20,160\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 116  |  E 110  |  D 0  |  T 0\nInsurance: 13.50 min base  |  4.50 min express
vehicle_DescRSI_Constellation_Aquila=Fabricante: RSI\nFoco: Expedição\n\nProjetado pela RSI para atravessar fronteiras distantes, a Constellation Aquila apresenta um cockpit redesenhado para máxima visibilidade, sensores avançados, uma nave P-52 e um rover Ursa para exploração planetária. Descubra por si mesmo por que os exploradores do 'verso escolhem a Aquila como capitão.\n\n--- STATS ---\nSCM: 180 m/s  |  Max: 1,075 m/s\nBoost: +380 m/s  /  -191 m/s\nCrew: 1  |  Length: 63.5m  |  Class: Exploração  |  Role: Expedição\nTurrets: 2  |  MRacks: 4× S5\nShields: S3  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 20,160\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 116  |  E 110  |  D 0  |  T 0\nInsurance: 16.20 min base  |  5.40 min express
vehicle_DescRSI_Constellation_Phoenix=Fabricante: RSI\nFoco: Turismo de Luxo\n\nUma espaçonave de luxo dedicada para o capitão estelar exigente. A Constellation Phoenix pode ser operada como uma nave de comando de organização e apresenta um luxuoso interior redesenhado. Inclui uma área oculta com amortecimento de sensores para sua carga mais preciosa. A Phoenix vem com um rover Lynx e um caça Kruger P-72 Archimedes.\n\n--- STATS ---\nSCM: 185 m/s  |  Max: 995 m/s\nBoost: +385 m/s  /  -191 m/s\nCrew: 1  |  Length: 63.5m  |  Class: Exploração  |  Role: Turismo de Luxo\nTurrets: 1  |  MRacks: 4× S4\nShields: S3  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 13,440\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 116  |  E 110  |  D 0  |  T 0\nInsurance: 24.30 min base  |  8.10 min express
vehicle_DescRSI_Constellation_Phoenix_Emerald=Fabricante: RSI \nFoco: Turismo de Luxo\n\nSeja você uma socialite exigente ou um festeiro descontraído, a Constellation Phoenix Emerald é o seu passaporte pessoal para o entretenimento. Com uma cabine interna elegante projetada especificamente para festividades e uma pintura de edição limitada "da sorte", a Emerald é o local perfeito para saborear uma taça de Radegast Gold ou virar um Sleeping Tiger Malt verde enquanto voa luxuosamente pelas estrelas. Só não esqueça de trazer um piloto designado.\n\n--- STATS ---\nCrew: 1  |  Length: 63.5m  |  Class: Exploração  |  Role: Turismo de Luxo\nTurrets: 1  |  MRacks: 4× S4\nShields: S3  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 13,440\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 116  |  E 110  |  D 0  |  T 0\nInsurance: 24.30 min base  |  8.10 min express
vehicle_DescRSI_Constellation_Taurus=Fabricante: RSI\nFoco: Frete Médio\n\nAproveite a aventura de uma Constellation com vários tripulantes e com um orçamento limitado! A Constellation Taurus é um cargueiro dedicado. Totalmente configurável, Mas sem todos os enfeites e firulas, a Taurus é uma ótima maneira de começar com naves tripuladas.\n\n--- STATS ---\nSCM: 180 m/s  |  Max: 950 m/s\nBoost: +380 m/s  /  -191 m/s\nCrew: 1  |  Length: 70.0m  |  Class: Transportador  |  Role: Frete Médio\nTurrets: 2  |  MRacks: 4× S5\nShields: S3  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 13,440\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 116  |  E 110  |  D 0  |  T 0\nInsurance: 17.10 min base  |  5.70 min express
vehicle_DescRSI_Constellation_Taurus_Collector_Military=Fabricante: RSI\nFoco: Frete Médio\n\nAparelhada para se concentrar totalmente no transporte, a Taurus oferece o maior espaço de carga de todas as naves da linha Constellation da RSI. O que ele perde em versatilidade é mais do que compensado em lucros potenciais graças aos seus feixes de tração, um sistema de liberação de carga para descarregamento rápido e um porão de segurança reforçado com revestimento tecnológico.\n\nWikelo aqui. Fiz modificações úteis para tornar a nave muito mais parecida com um caça. Muito impressionante.\n\n--- STATS ---\nCrew: 1  |  Length: 70.0m  |  Class: Transportador  |  Role: Frete Médio\nTurrets: 2  |  MRacks: 4× S5\nArmor HP: 13,440\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 116  |  E 110  |  D 0  |  T 0\nInsurance: 17.10 min base  |  5.70 min express
vehicle_DescRSI_Hermes=Fabricante: Roberts Space Industries\nFoco: Carga Média\n\nAo contrário de seu homônimo mítico, a RSI Hermes não é nenhuma trapaceira - ela é realmente tão rápida. Apresentando um pacote de propulsores inovador e sob medida, uma impressionante gama de medidas defensivas e um porão de carga considerável, a Hermes está pronta para acelerar entregas até seus destinos finais. Mesmo em locais de descarga perigosos onde outros transportadores não ousariam ir.\n\n--- STATS ---\nSCM: 180 m/s  |  Max: 1,200 m/s\nBoost: +370 m/s  /  -170 m/s\nCrew: 2  |  Length: 58.0m  |  Class: Transportador  |  Role: Frete Médio\nInsurance: 11.18 min base  |  2.80 min express
vehicle_DescRSI_Mantis=Fabricante: RSI\nFoco: Interdição\n\nPare as naves em seu caminho com a principal nave de Bloqueio Quântico da RSI. A Mantis apresenta um Dispositivo de Bloqueio Quântico feito sob medida da Wei-Tek, capaz de arrancar naves da VQ com seu Bloqueador Quântico e evitar fugas precipitadas com seu Bloqueador Quântico.\n\n--- STATS ---\nSCM: 236 m/s  |  Max: 1,400 m/s\nBoost: +605 m/s  /  -257 m/s\nCrew: 1  |  Length: 30.0m  |  Class: Combate  |  Role: Interdição\nInsurance: 6.48 min base  |  2.16 min express
vehicle_DescRSI_Meteor=Fabricante: RSI\nFoco: Caça Médio\n\nEquipada com um poder de fogo impressionante, a Meteor é uma visão que os inimigos prefeririam não ver. Inspirado na icônica Mantis, este caça pesado abre mão da interceptação quântica e, em vez disso, apresenta dois canhões balísticos S5 sob medida e quatro suportes de mísseis S4 de carga única, fazendo da Meteor uma força capaz de iluminar o céu como uma estrela cadente.\n\n--- STATS ---\nSCM: 229 m/s  |  Max: 1,405 m/s\nBoost: +570 m/s  /  -235 m/s\nCrew: 1  |  Length: 30.0m  |  Class: Combate  |  Role: Caça Médio\nInsurance: 13.50 min base  |  4.50 min express
vehicle_DescRSI_Meteor_Collector_Military=Fabricante: RSI\nFoco: Caça Médio\n\nCarregando um poder de fogo considerável, a Meteor é uma visão que os inimigos não vão querer ter. Inspirada na icônica Mantis, este caça pesado dispensa a coerção quântica e, em vez disso, apresenta dois canhões balísticos S5 personalizados e quatro racks de mísseis S4 de carga única; tornando a Meteor uma força capaz de iluminar o céu como uma estrela cadente.\n\nEsta variante apresenta uma pintura e um carregamento exclusivos para a nave.\n\n--- STATS ---\nCrew: 1  |  Length: 30.0m  |  Class: Combate  |  Role: Caça Médio\nInsurance: 13.50 min base  |  4.50 min express
vehicle_DescRSI_Meteor_Collector_Stealth=Fabricante: RSI\nFoco: Caça Médio\n\nCom um poder de fogo considerável, o Meteor é uma visão que os inimigos não vão querer ter. Inspirando-se no icónico Mantis, este caça pesado dispensa a aplicação quântica e, em vez disso, apresenta dois canhões balísticos S5 sob medida e quatro suportes de mísseis S4 de carga única; tornando o Meteor uma força capaz de iluminar o céu como uma estrela cadente.\n\nWikelo por aqui. Fiz modificações úteis para tornar a nave muito mais difícil de ver. Furtivo.\n\n--- STATS ---\nCrew: 1  |  Length: 30.0m  |  Class: Combate  |  Role: Caça Médio\nInsurance: 13.50 min base  |  4.50 min express
vehicle_DescRSI_Perseus=Fabricante: RSI\nFoco: Canhoneira Pesada\n\nQuando a RSI decidiu criar a declaração moderna definitiva em prevenção persuasiva, eles olharam para o seu próprio passado, para as históricas canhoneiras designadas Perseus. Capaz de destruir golias de classe sub-capital, a mera presença de uma canhoneira Perseus em um bloqueio ou esquadrão de patrulha é suficiente para fazer seus inimigos mais agressivos pensarem duas vezes antes de atacar, exatamente como sua homônima clássica.\n\n--- STATS ---\nSCM: 150 m/s  |  Max: 1,050 m/s\nBoost: +350 m/s  /  -160 m/s\nCrew: 6  |  Length: 100.0m  |  Class: Combate  |  Role: Nave de Guerra Pesada\nInsurance: 38.00 min base  |  9.50 min express
vehicle_DescRSI_Polaris=Fabricante: Roberts Space Industries\nFoco: Corveta\n\nA Polaris é uma nave capital ágil da classe corveta que possui um poder poderoso com um conjunto completo de torretas e torpedos. Destinada a ser usada tanto comoo uma nave de patrulha quanto um carro-chefe para operações de milícias, a Polaris tem capacidade para realizar operações de busca e salvamento, missões de ataque leve e patrulhas de segurança geral. A Polaris inclui instalações de reparar, rearmar e reabastecer um único caça, bombardeiro leve ou nave de apoio.\n\n--- STATS ---\nSCM: 145 m/s  |  Max: 940 m/s\nBoost: +250 m/s  /  -155 m/s\nCrew: 12  |  Length: 181.0m  |  Class: Combate  |  Role: Corveta\nTurrets: 22\nShields: S4  |  Coolers: S4  |  Power: S4  |  QD: S3\nArmor HP: 48,960\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 495  |  E 418  |  D 0  |  T 0\nInsurance: 75.83 min base  |  18.96 min express
vehicle_DescRSI_Salvation=Fabricante: Roberts Space Industries\nFoco: Sucateamento\n \nPor séculos, a Roberts Space Industries se orgulhou de criar veículos que não apenas atendem às necessidades dos pilotos, mas superam as expectativas. Embora a RSI Salvation possa parecer uma simples nave de salvamento à primeira vista, cada detalhe, desde o braço de salvamento, a unidade de processamento a bordo, até o armazenamento externo conveniente, foi refinado e otimizado para fazer até mesmo um amador se sentir um especialista.\n\n--- STATS ---\nSCM: 205 m/s  |  Max: 1,150 m/s\nBoost: +290 m/s  /  -230 m/s\nCrew: 1  |  Length: 8.5m  |  Class: Industrial  |  Role: Inicial / Sucateamento Leve\nInsurance: 6.00 min base  |  1.50 min express
vehicle_DescRSI_Scorpius=Fabricante: RSI\nFoco: Caça Pesado\n\nCom uma configuração de asa dupla adaptável e uma revolucionária torreta remota montada em trilho, a Scorpius oferece cobertura de fogo sem precedentes, permitindo aplicações defensivas e de assalto.\n\n--- STATS ---\nSCM: 230 m/s  |  Max: 1,385 m/s\nBoost: +590 m/s  /  -235 m/s\nCrew: 2  |  Length: 32.0m  |  Class: Combate  |  Role: Caça Pesado\nGuns: 4  |  MRacks: 4× S4\nShields: S2  |  Coolers: 2× S1  |  Power: 2× ?  2× S1  |  QD: S1\nArmor HP: 8,640\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 50  |  E 40  |  D 0  |  T 0\nInsurance: 7.59 min base  |  2.53 min express
vehicle_DescRSI_Scorpius_Antares=Fabricante: RSI\nFoco: Caça Pesado\n\nA RSI atualizou a assinatura da configuração de asa dupla adaptável da Scorpius e adicionou um Amortecedor Quântico e um Dispositivo de EMP sob medida, projetados exclusivamente por sua equipe interna para criar a poderosa Scorpius Antares. Construída com poder de interrupção em mente, a Scorpius Antares foi projetada para encerrar qualquer perseguição rapidamente.\n\n--- STATS ---\nSCM: 230 m/s  |  Max: 1,385 m/s\nBoost: +590 m/s  /  -235 m/s\nCrew: 2  |  Length: 32.0m  |  Class: Combate  |  Role: Caça Pesado\nGuns: 4  |  Turrets: 1  |  MRacks: 4× S4\nShields: S2  |  Coolers: 2× S1  |  Power: ?  3× S1  |  QD: S1\nArmor HP: 8,640\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 50  |  E 40  |  D 0  |  T 0\nInsurance: 7.59 min base  |  2.53 min express
vehicle_DescRSI_Scorpius_Collector_Stealth=Fabricante: RSI\nFoco: Caça Pesado\n\nCom uma configuração adaptável de duas asas e uma revolucionária torreta remota montada em trilho, a Scorpius oferece cobertura de fogo sem precedentes, permitindo aplicações defensivas e de assalto.\n\nWikelo aqui. Fiz modificações úteis para tornar a nave muito mais difícil de ser vista. Furtiva.\n\n--- STATS ---\nCrew: 2  |  Length: 32.0m  |  Class: Combate  |  Role: Caça Pesado\nGuns: 4  |  MRacks: 4× S4\nPower: 2× ?\nArmor HP: 8,640\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 50  |  E 40  |  D 0  |  T 0\nInsurance: 7.59 min base  |  2.53 min express
vehicle_DescRSI_Zeus_CL=Fabricante: Roberts Space Industries\nFoco: Frete Médio\n\nPronta para transportar toda uma nova geração de viajantes pelo universo, a Roberts Space Industries tem o orgulho de apresentar uma nave estelar que está sendo construída há oito séculos - a novíssima espaçonave Zeus Mk II. Prestando homenagem ao design clássico que lançou a Humanidade às estrelas em 2140, a Zeus Mk II foi atualizada para exceder os padrões modernos, mantendo ao mesmo tempo o coração deste amado ícone da viagem espacial.  Com foco no comércio, a edição Zeus Mk II CL apresenta espaço de carga adicional e raio trator ideal para movimentar grandes volumes de carga.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,000 m/s\nBoost: +400 m/s  /  -210 m/s\nCrew: 3  |  Length: 46.0m  |  Class: Transportador  |  Role: Frete Médio\nShields: 3× S2\nInsurance: 10.67 min base  |  2.67 min express
vehicle_DescRSI_Zeus_ES=Fabricante: Roberts Space Industries\nFoco: Expedição\n\nPronta para transportar uma nova geração de viajantes pelo universo, a Roberts Space Industries tem o orgulho de apresentar uma nave estelar com oito séculos de história — a novíssima espaçonave Zeus Mk II. Prestando homenagem ao design clássico que lançou a Humanidade às estrelas em 2140, a Zeus Mk II foi atualizada para superar os padrões modernos, mantendo o coração deste amado ícone espacial. Com foco na exploração, a edição Zeus Mk II ES apresenta um pacote de radar robusto para encontrar novas descobertas, além de armamento e blindagem aprimorados para ajudar a trazê-las de volta para casa.\n\n\n--- STATS ---\nSCM: 205 m/s  |  Max: 1,100 m/s\nBoost: +405 m/s  /  -210 m/s\nCrew: 3  |  Length: 46.0m  |  Class: Exploração  |  Role: Expedição\nShields: 4× S2\nInsurance: 8.67 min base  |  2.17 min express
vehicle_DescRSI_Zeus_ES_Collector_Indust=Fabricante: Roberts Space Industries\nFoco: Expedição\n\nPronta para transportar uma nova geração de viajantes pelo universo, a Roberts Space Industries tem o orgulho de apresentar uma nave estelar com oito séculos de história — a novíssima espaçonave Zeus Mk II. Prestando homenagem ao design clássico que lançou a Humanidade às estrelas em 2140, a Zeus Mk II foi atualizada para superar os padrões modernos, mantendo o coração deste amado ícone espacial. Com foco na exploração, a edição Zeus Mk II ES apresenta um pacote de radar robusto para encontrar novas descobertas, além de armamento e blindagem aprimorados para ajudar a trazê-las de volta para casa.\n\n--- STATS ---\nCrew: 3  |  Length: 46.0m  |  Class: Exploração  |  Role: Expedição\nInsurance: 8.67 min base  |  2.17 min express
vehicle_DescVNCL_Mauler=Fabricante: Clãs Vanduul\nFoco: Destróier\n\nA Mauler é uma enorme nave de escolta essencial para a frota Vanduul. Este tanque de nave dá aos seus pilotos um gosto de poder, com seu design angular de vários níveis, uma vasta gama de armamentos e pontas afiadas nas laterais tanto para aerodinâmica quanto para causar medo.\n\n--- STATS ---\nSCM: 140 m/s  |  Max: 850 m/s\nBoost: +270 m/s  /  -150 m/s\nCrew: 19  |  Length: 425.0m  |  Class: Combate  |  Role: Destroier\nTurrets: 62  10× S6\nShields: 3× S4  |  Coolers: 2× S4  |  Power: S4  |  QD: S4\nArmor HP: 72,930\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 528  |  E 378  |  D 0  |  T 0\nInsurance: 33.33 min base  |  3.33 min express
vehicle_DescVNCL_Scythe=Fabricante: Esperia\nFoco: Caça Médio\n\nA Scythe rapidamente se tornou o símbolo da raça Vanduul e é o soldado de infantaria em todos os ataques e o alvo de todo piloto de caça humano. A Scythe tem uma elevada carga útil de armas, mas o seu verdadeiro trunfo é a sua manobrabilidade, que reside nos seus dois motores principais e nos doze motores de manobra.\n\n--- STATS ---\nSCM: 222 m/s  |  Max: 1,150 m/s\nBoost: +480 m/s  /  -230 m/s\nCrew: 1  |  Length: 33.0m  |  Class: Combate  |  Role: Caça Médio\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 6,600\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 22  |  E 14  |  D 0  |  T 0\nInsurance: 5.91 min base  |  1.97 min express
vehicle_DescXIAN_Nox=Fabricante: Aopoa\nFoco: Corrida\n\nAcelere com a 2947 Nox. Esta veloz e manobrável corredora de cabine aberta da Aopoa é capaz de voar pelas superfícies dos planetas ou pelo espaço profundo. Disponível pela primeira vez no espaço humano, a Nox foi redesenhada especificamente para pilotos humanos e está pronta para correr.\n\n--- STATS ---\nSCM: 225 m/s  |  Max: 619 m/s\nBoost: +305 m/s  /  -145 m/s\nCrew: 1  |  Length: 1.4m  |  Class: Competição  |  Role: Corrida\nCoolers: S0  |  Power: S0\nArmor HP: 1,560\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.10 min base  |  0.00 min express
vehicle_DescXIAN_Nox_Kue=Fabricante: Aopoa \nFoco: Corrida\n\nDerivando seu nome da palavra Xi’an para “impulso”, a Nox Kue oferece isso e muito mais. Esta versão limitada da corredora de cabine aberta apresenta um impressionante acabamento prateado escovado e foi criada especificamente para comemorar a venda inaugural das primeiras Nox para pilotos humanos.\n\n--- STATS ---\nCrew: 1  |  Length: 1.4m  |  Class: Competição  |  Role: Corrida\nCoolers: S0  |  Power: S0\nArmor HP: 1,560\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.10 min base  |  0.00 min express
vehicle_DescXIAN_Scout=Fabricante: Aopoa\nFoco: Caça Leve\n\nA corporação Xi'an Aopoa fabrica um modelo de exportação do Qhire Khartu, a Khartu-al, para venda a civis humanos como um batedor/explorador dedicado. O modelo de exportação apresenta o mesmo equipamento de manobra Xi'an, mas superfícies de controle modificadas para uso humano e um armamento mais limitado.\n\n--- STATS ---\nSCM: 224 m/s  |  Max: 1,183 m/s\nBoost: +504 m/s  /  -254 m/s\nCrew: 1  |  Length: 32.0m  |  Class: Combate  |  Role: Caça Leve\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,400\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 10  |  E 9  |  D 0  |  T 0\nInsurance: 5.06 min base  |  1.69 min express
vehicle_DescXNAA_SantokYai=Fabricante: Aopoa\nFoco: Caça Médio\n\nAproveitando o poder dos sistemas de voo Xi'an de próxima geração, propulsores de vetor duplo atualizados e um pacote de armas assustador, Aopoa criou um caça que mantém a destreza ágil e o manuseio rígido pelos quais a marca é conhecida.\n\n--- STATS ---\nSCM: 227 m/s  |  Max: 1,161 m/s\nBoost: +493 m/s  /  -225 m/s\nCrew: 1  |  Length: 24.0m  |  Class: Combate  |  Role: Caça Médio\nInsurance: 7.50 min base  |  2.50 min express
vehicle_Descprobe_comms_1_a=Fabricante: Chimera Communications \nFoco: Reconhecimento\n\nA Auris, da fabricante Chimera Communications, permite coletar e armazenar facilmente transmissões, tornando-a ideal para monitoramento de atividades de curto alcance. Projetada para ser virtualmente invisível durante a operação, este Monitor de Coleta Passiva de Dados (CPD) de baixa potência é perfeito para fornecer segurança extra a qualquer estação ou instalação com registro detalhado de transmissões de dados e registros de tráfego de naves locais. Além disso, o transmissor de rajadas de backup incluído permite a transferência dos bancos de dados em caso de emergência, proporcionando maior tranquilidade.\n\n--- STATS ---\nCrew: 1  |  Length: 18.0m  |  Class: Transportador  |  Role: Frete Leve\nShields: S1  |  Coolers: S1  |  Power: S3\nInsurance: 33.33 min base  |  3.33 min express
vehicle_descANVL_Paladin=Fabricante: Anvil Aerospace\nFoco: Nave de Guerra\n\nProjetada pela Anvil Aerospace, a Paladin é um combate intimidador na linha de frente que causa um impacto ousado sempre que chega à batalha. Seja executando uma operação perigosa ou liderando o ataque contra adversidades esmagadoras, com seu poderoso conjunto de armas e artilharia com torreta, a Paladin está pronta para ir ao resgate.\n\n--- STATS ---\nSCM: 175 m/s  |  Max: 950 m/s\nBoost: +340 m/s  /  -200 m/s\nCrew: 4  |  Length: 0.0m  |  Class: Guerra  |  Role: Guerra\nInsurance: 24.00 min base  |  6.00 min express
vehicle_descMISC_Starlancer_MAX=Fabricante: MISC\nFoco: Carga Média\n \nPara aqueles que buscam expandir suas operações de transporte, os engenheiros da MISC atualizaram a Starlancer MAX com um porão extra espaçoso, pronto para transportar carga e veículos. Aliada a acomodações confortáveis para viagens mais longas e um pacote defensivo completo para quando você sai do caminho comum, é fácil ver por que a Starlancer MAX é a transportadora de escolha para pilotos industriosos por todo o universo.\n\n--- STATS ---\nCrew: 1  |  Length: 90.0m  |  Class: Transportador  |  Role: Frete Médio\nTurrets: 2\nShields: S3  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 12,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 315  |  E 360  |  D 0  |  T 0\nInsurance: 12.33 min base  |  3.08 min express
vehicle_descMISC_Starlancer_TAC=Fabricante: MISC\nFoco: Canhoneira\n \nPara aqueles que procuram uma nave versátil que possa se sustentar sozinha em uma luta, os engenheiros atualizaram a Starlancer TAC com um pacote ofensivo agressivo pronto para enfrentar os inimigos mais ferozes. Quando você aceita um trabalho de alto risco e alta recompensa, a Starlancer TAC está lá para garantir que você e sua tripulação sejam capazes de levá-lo até o fim.\n\n--- STATS ---\nSCM: 150 m/s  |  Max: 960 m/s\nBoost: +315 m/s  /  -155 m/s\nCrew: 1  |  Length: 90.0m  |  Class: Combate  |  Role: Guerra\nTurrets: 9\nShields: 2× S3  |  Coolers: S3  |  Power: S3  |  QD: S2\nArmor HP: 18,150\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 347  |  E 396  |  D 0  |  T 0\nInsurance: 13.33 min base  |  3.33 min express
vehicles_DescOrbital_Sentry=O Supervisor Broad & Raibee permite a vigilância de atividades defensivas em uma área específica. Quando uma ameaça é detectada, o Supervisor é capaz de atacar e atacar inimigos não autorizados com eficiência brutal. Isto o torna perfeito para garantir segurança adicional para qualquer estação, instalação ou área controlada.\n\n--- STATS ---\nCrew: 1  |  Length: 18.0m  |  Class: Combate  |  Role: Torreta\nTurrets: 1\nShields: S2  |  Coolers: S3  |  Power: S3\nInsurance: 33.33 min base  |  3.33 min express
vehicles_DescOrbital_Sentry_Prototype_1=Os detalhes desse protótipo de monitor defensivo são de propriedade intelectual da Hurston Dynamics e são confidenciais. A Hurston Dynamics não é responsável por quaisquer danos causados a indivíduos que invadam os locais de teste do DM-7R1.\n\n--- STATS ---\nCrew: 1  |  Length: 18.0m  |  Class: Combate  |  Role: Torreta\nTurrets: 1\nShields: S3  |  Coolers: S3  |  Power: S3\nInsurance: 33.33 min base  |  3.33 min express
