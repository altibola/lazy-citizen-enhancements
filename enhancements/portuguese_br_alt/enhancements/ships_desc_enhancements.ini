vehicle_DescDRAK_Golem=Fabricante: Drake Interplanetary\nFoco: Inicial / Mineração Leve\n\nCom a Golem, a Drake projetou a nave ideal para os interessados em iniciar uma carreira na mineração. A nave apresenta um laser de mineração sob medida e a capacidade de carregar 32 SCU de recursos valiosos. No estilo clássico da Drake, a Golem é uma nave construída para um propósito específico que prioriza a função em vez de adornos.\n\n--- STATS ---\nSCM: 203 m/s  |  Max: 1,010 m/s\nBoost: +280 m/s  /  -210 m/s\nCrew: 1  |  Length: 7.0m  |  Class: Industrial  |  Role: Inicial / Mineração Leve\nInsurance: 3.00 min base  |  0.75 min express
vehicle_DescDRAK_Golem_Collector_Indust=Fabricante: Drake Interplanetary\nFoco: Inicial / Mineração Leve\n\nCom a Golem, a Drake projetou a nave ideal para os interessados em iniciar uma carreira na mineração. A nave apresenta um laser de mineração sob medida e a capacidade de carregar 32 SCU de recursos valiosos. No estilo clássico da Drake, a Golem é uma nave construída para um propósito específico que prioriza a função em vez de adornos.\n\nWikelo oi. Fiz modificações úteis para tornar a nave ainda mais industriosa. Você vai gostar.\n\n--- STATS ---\nCrew: 1  |  Length: 7.0m  |  Class: Industrial  |  Role: Inicial / Mineração Leve\nInsurance: 3.00 min base  |  0.75 min express
vehicle_DescDRAK_Golem_OX=Fabricante: Drake Interplanetary\nFoco: Carga Leve\n \nCom a Golem OX, a Drake transformou o cavalo de batalha confiável na nave de carga ideal para o transporte de suprimentos e equipamentos. Feita para pilotos que preferem a função em vez de adornos, a OX dobra a capacidade da original com espaço para 64 SCU e apresenta um feixe trator para tornar as transferências de carga suaves como seda.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,000 m/s\nBoost: +280 m/s  /  -210 m/s\nCrew: 1  |  Length: 7.0m  |  Class: Industrial  |  Role: Frete Leve\nInsurance: 3.00 min base  |  0.75 min express
vehicle_DescDRAK_Golem_Teach=Fabricante: Drake Interplanetary\nFoco: Inicial / Mineração Leve\n\nCom a Golem, a Drake projetou a nave ideal para os interessados em iniciar uma carreira na mineração. A nave apresenta um laser de mineração sob medida e a capacidade de carregar 32 SCU de recursos valiosos. No estilo clássico da Drake, a Golem é uma nave construída para um propósito específico que prioriza a função em vez de adornos.\n\nAtendendo às difíceis condições de trabalho de Nyx, a Teach's Ship Shop equipou esta edição especial com um conjunto de armas personalizado, apresentando componentes robustos para que você possa lidar melhor com a tarefa em mãos.\n\n--- STATS ---\nCrew: 1  |  Length: 7.0m  |  Class: Industrial  |  Role: Inicial / Mineração Leve\nInsurance: 3.00 min base  |  0.75 min express
vehicle_DescDRAK_Herald=Fabricante: Drake Interplanetary\nFoco: Dados Médios\n\nA Drake Herald é uma pequena nave blindada projetada para levar informações com segurança do Ponto A ao Ponto B. Com um potente motor central (para trânsito em alta velocidade e geração da energia necessária para a criptografia/contenção eficaz de dados), software de criptografia avançado e um núcleo de computador blindado, a Herald é única entre as espaçonaves pessoais, pois foi projetada para ser facilmente "limpa" quando em perigo de captura.\n\n--- STATS ---\nSCM: 245 m/s  |  Max: 1,450 m/s\nBoost: +670 m/s  /  -260 m/s\nCrew: 1  |  Length: 24.8m  |  Class: Transportador  |  Role: Dados Médio\nInsurance: 2.02 min base  |  0.68 min express
vehicle_DescDRAK_Ironclad=Fabricante: Drake Interplanetary\nFoco: Carga Pesada\n \nO universo tem se tornado cada vez mais perigoso, e a simples tentativa de ganhar a vida se tornou um assunto potencialmente letal. É por isso que a Drake construiu o cargueiro mais resistente para voar nas rotas marítimas, armado com um conjunto intimidador de torres, um generoso compartimento de carga e um conveniente raio trator.\n\n--- STATS ---\nSCM: 110 m/s  |  Max: 900 m/s\nBoost: +290 m/s  /  -130 m/s\nCrew: 7  |  Length: 13.4m  |  Class: Transportador  |  Role: Frete Pesado\nInsurance: 18.00 min base  |  6.00 min express
vehicle_DescDRAK_Ironclad_Assault=Fabricante: Drake Interplanetary\nFoco: Transporte de Tropas\n \nQuando a entrega especial que você precisa fazer é uma incursão completa, você precisa da Drake Ironclad Assault. Além de comportar vários veículos terrestres em seu porão, ela possui torres ao longo de sua parte inferior para limpar o caminho para o pouso, e até mesmo um compartimento de fabricação para reparos de emergência.\n\n--- STATS ---\nSCM: 130 m/s  |  Max: 940 m/s\nBoost: +320 m/s  /  -150 m/s\nCrew: 7  |  Length: 13.4m  |  Class: Combate  |  Role: Canhoneira Pesada\nInsurance: 18.00 min base  |  6.00 min express
vehicle_DescDRAK_Pitbull=Fabricante: Drake Interplanetary\nFoco: Mini Caça\n\nUma máquina de combate enxuta e implacável. A Pitbull combina manobras de alta velocidade com poder de fogo bruto para trazer a você um rolo compressor de impacto pesado — tudo em um pacote pequeno de piloto único.\n\n--- STATS ---\nSCM: 232 m/s  |  Max: 1,275 m/s\nBoost: +555 m/s  /  -270 m/s\nCrew: 1  |  Length: 6.0m  |  Class: Mini Caça  |  Role: Mini Caça\nInsurance: 2.00 min base  |  0.60 min express
vehicle_DescDRAK_Vulture=Fabricante: Drake Interplanetary\nFoco: Sucateamento Leve\n\nNão responda a ninguém, elimine o intermediário e jogue a cautela ao vento. Rasgue destroços como um profissional e construa seu próprio lugar no grande vazio atrás do manche desta máquina de sucateamento áspera e robusta da Drake Interplanetary.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,100 m/s\nBoost: +350 m/s  /  -240 m/s\nCrew: 1  |  Length: 34.0m  |  Class: Industrial  |  Role: Sucateamento Leve\nShields: 3× S1  |  Coolers: 2× S1  |  Power: 2× S1  |  QD: S1\nArmor HP: 6,732\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 18  |  E 16  |  D 0  |  T 0\nInsurance: 9.00 min base  |  3.00 min express
vehicle_DescDRAK_Vulture_Teach=Fabricante: Drake Interplanetary\nFoco: Sucateamento Leve\n\nNão responda a ninguém, elimine o intermediário e jogue a cautela ao vento. Desmembre destroços como um profissional e conquiste seu próprio lugar no vasto vazio pilotando esta máquina de resgate áspera e robusta da Drake Interplanetary.\n\nAtendendo às difíceis condições de trabalho de Nyx, a Teach's Ship Shop equipou esta edição especial com um *loadout* (conjunto de equipamentos) personalizado que apresenta componentes robustos para que você possa enfrentar melhor o trabalho em questão.\n\n--- STATS ---\nCrew: 1  |  Length: 34.0m  |  Class: Industrial  |  Role: Sucateamento Leve\nShields: 3× S1  |  Coolers: 2× S1  |  Power: 2× S1  |  QD: S1\nArmor HP: 6,732\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 18  |  E 16  |  D 0  |  T 0\nInsurance: 9.00 min base  |  3.00 min express
vehicle_DescESPR_Blade=Fabricante: Vanduul Clans\nFoco: Caça Leve\n\nEsses caças leves, designados como 'Blade', são frequentemente usados pelos Vanduul como batedores e para ataques de primeira onda. Também têm servido bem como unidades de escaramuça devido à sua velocidade, permitindo perseguir qualquer nave que tente fugir da área. Por algumas décadas, esquadrões agressivos do United Empire of Earth operaram caças Blade réplicas produzidos sob contrato exclusivo pela Esperia, Inc.\n\n--- STATS ---\nSCM: 227 m/s  |  Max: 1,191 m/s\nBoost: +500 m/s  /  -260 m/s\nCrew: 1  |  Length: 20.5m  |  Class: Combate  |  Role: Caça Leve\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 3,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 7  |  D 0  |  T 0\nInsurance: 10.33 min base  |  3.44 min express
vehicle_DescESPR_Glaive=Fabricante: Esperia\nFoco: Caça Médio\n\nO Glaive é uma versão simétrica do Scythe. Geralmente pilotado por Vanduul com mais experiência em combate, são mais bem armados e possuem duas enormes lâminas/asas, ao contrário da única no Scythe padrão.\n\n--- STATS ---\nSCM: 218 m/s  |  Max: 1,150 m/s\nBoost: +480 m/s  /  -230 m/s\nCrew: 1  |  Length: 33.0m  |  Class: Combate  |  Role: Caça Médio\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 6,600\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 22  |  E 14  |  D 0  |  T 0\nInsurance: 7.59 min base  |  2.53 min express
vehicle_DescESPR_Prowler=Fabricante: Esperia\nFoco: Transporte de Tropas\n\nNomeada após a designação militar da UPE, a Prowler é uma versão modernizada da infame nave de abordagem Tevarin da Primeira Guerra Tevarin. A eficácia da Prowler como um veículo de implantação rápida de pessoal deveu-se principalmente ao seu silêncio. Com a Prowler, você encontrará a fusão perfeita de duas culturas: a elegância e a eficácia da máquina de guerra Tevarin combinadas com a confiabilidade da moderna tecnologia da UEE.\n\n--- STATS ---\nSCM: 212 m/s  |  Max: 1,200 m/s\nBoost: +450 m/s  /  -240 m/s\nCrew: 1  |  Length: 34.0m  |  Class: Combate  |  Role: Transporte de Tropa\nShields: 2× S2  |  Coolers: 2× S2  |  Power: S2  |  QD: S2\nArmor HP: 12,150\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 32  |  E 39  |  D 0  |  T 0\nInsurance: 23.22 min base  |  7.74 min express
vehicle_DescESPR_Prowler_Utility=Fabricante: Esperia\nFoco: Carga Leve\n\nEmbora não existam exemplares conhecidos desta nave histórica fabricados pelos Tevarin, historiadores da Esperia estudaram relatórios de campo militares contemporâneos da UPE para reconstruir esta Prowler modificada. Usada pelos militares Tevarin para entregar suprimentos urgentemente necessários às linhas de frente, a Prowler Utility combina um feixe trator com um porão totalmente acessível, juntamente com o armamento ainda significativo da nave de guerra, para tornar a transferência de carga em condições de campo de batalha uma operação de precisão.\n\n--- STATS ---\nSCM: 208 m/s  |  Max: 1,110 m/s\nBoost: +437 m/s  /  -240 m/s\nCrew: 1  |  Length: 34.0m  |  Class: Transportador  |  Role: Frete Leve\nShields: 2× S2  |  Coolers: 2× S2  |  Power: S2  |  QD: S2\nArmor HP: 12,150\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 32  |  E 39  |  D 0  |  T 0\nInsurance: 21.00 min base  |  5.25 min express
