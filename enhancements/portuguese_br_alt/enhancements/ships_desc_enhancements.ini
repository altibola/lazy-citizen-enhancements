vehicle_DescCRUS_Starfighter_Inferno_Collector_Military=Fabricante: Crusader Industries\nFoco: Caça Pesado\n\nSeja liderando uma tripulação ou caçando grandes naves sozinho, a Ares Inferno é uma força a ser reconhecida. Esta variante equipada com Gatling balístico rasga a blindagem de naves de combate e reduz caças menores a pó em segundos.\n\nWikelo aqui. Fez modificações úteis para tornar a nave muito mais parecida com um caça. Muito impressionante.\n\n--- STATS ---\nCrew: 1  |  Length: 27.0m  |  Class: Combate  |  Role: Caça Pesado\nShields: 2× S2  |  Coolers: 3× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 14,400\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 50  |  E 36  |  D 0  |  T 0\nInsurance: 10.30 min base  |  3.43 min express
vehicle_DescCRUS_Starfighter_Ion=Fabricante: Crusader Industries\nFoco: Caça Pesado\n\nDesperte o medo nos corredores das mais formidáveis naves e fragatas com a Ares Ion. Esta variante equipada com laser dispara tiros extremamente poderosos para desativar rapidamente os escudos até mesmo das maiores naves inimigas.\n\n--- STATS ---\nCrew: 1  |  Length: 27.0m  |  Class: Combate  |  Role: Caça Pesado\nShields: 2× S2  |  Coolers: 3× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 14,400\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 50  |  E 36  |  D 0  |  T 0\nInsurance: 10.30 min base  |  3.43 min express
vehicle_DescCRUS_Starfighter_Ion_Collector_Stealth=Fabricante: Crusader Industries\nFoco: Caça Pesado\n\nInspire medo nos corredores das mais formidáveis naves de combate e fragatas com a Ares Ion. Esta variante equipada com laser dispara tiros extremamente poderosos para desativar rapidamente os escudos até das maiores embarcações inimigas.\n\nWikelo aqui. Fez modificações úteis para tornar a nave muito mais difícil de ser vista. Astuto.\n\n--- STATS ---\nCrew: 1  |  Length: 27.0m  |  Class: Combate  |  Role: Caça Pesado\nShields: 2× S2  |  Coolers: 3× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 14,400\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 50  |  E 36  |  D 0  |  T 0\nInsurance: 10.30 min base  |  3.43 min express
vehicle_DescCRUS_Starlifter_A2=Fabricante: Crusader Industries\nFoco: Bombardeiro Pesado\n\nA A2 Starlifter tem sido usada com efeitos devastadores em assaltos aéreos, operações de busca e salvamento e iniciativas de desembarque. Com mais que o dobro do poder de fogo da M2, e um compartimento de bombas personalizado capaz de entregar uma carga impressionante, a A2 atende a qualquer pessoa que transporte quantidades massivas de carga através de céus potencialmente hostis.\n\n--- STATS ---\nSCM: 160 m/s  |  Max: 950 m/s\nBoost: +320 m/s  /  -170 m/s\nCrew: 8  |  Length: 70.0m  |  Class: Combate  |  Role: Bombardeiro Pesado\nTurrets: 12\nInsurance: 39.24 min base  |  13.08 min express
vehicle_DescCRUS_Starlifter_A2_Collector_Military=Fabricante: Crusader Industries\nFoco: Bombardeiro Pesado\n\nA A2 Starlifter tem sido usada com efeitos devastadores em assaltos aéreos, operações de busca e salvamento e iniciativas de desembarque. Com mais que o dobro do poder de fogo da M2, e um compartimento de bombas personalizado capaz de entregar uma carga impressionante, a A2 atende a qualquer pessoa que transporte quantidades massivas de carga através de céus potencialmente hostis.\n\nWikelo aqui. Fiz modificações úteis para tornar a nave muito mais parecida com um caça. Muito impressionante.\n\n--- STATS ---\nCrew: 8  |  Length: 70.0m  |  Class: Combate  |  Role: Bombardeiro Pesado\nTurrets: 12\nInsurance: 39.24 min base  |  13.08 min express
vehicle_DescCRUS_Starlifter_C2=Fabricante: Crusader Industries\nFoco: Carga Pesada\n\nUtilizando a estrutura militar patenteada da Hercules e expandindo a capacidade de carga, sacrificando quase nada em poder de fogo, a C2 arrebatou o setor privado. Ela se tornou o padrão da indústria para equipes de corrida, revendedores e fabricantes de naves, organizações de construção, corporações de mineração e até mesmo grupos de entretenimento de turnê em larga escala.\n\n--- STATS ---\nCrew: 2  |  Length: 70.0m  |  Class: Transportador  |  Role: Frete Médio\nTurrets: 2\nCoolers: 2× S3  |  QD: S3\nArmor HP: 13,000\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 385  |  E 300  |  D 0  |  T 0\nInsurance: 32.70 min base  |  10.90 min express
vehicle_DescCRUS_Starlifter_M2=Fabricante: Crusader Industries\nFoco: Carga Pesada\n\nA M2 Hercules é a principal transportadora tática da UEE. A potente combinação de capacidade, manobrabilidade, durabilidade e o robusto conjunto de armas desta transportadora de larga escala garante que sua carga e tripulação cheguem ao destino em segurança.\n\n--- STATS ---\nSCM: 160 m/s  |  Max: 950 m/s\nBoost: +320 m/s  /  -170 m/s\nCrew: 3  |  Length: 70.0m  |  Class: Transportador  |  Role: Frete Médio\nTurrets: 3\nCoolers: 2× S3  |  QD: S3\nArmor HP: 23,400\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 385  |  E 300  |  D 0  |  T 0\nInsurance: 25.00 min base  |  8.00 min express
vehicle_DescDRAK_Buccaneer=Fabricante: Drake Interplanetary\nFoco: Caça Leve\n\nA Buccaneer foi projetada do zero para voar e lutar da maneira que você vive. Nada de interiores de couro ou hiper-almofadas aqui: a Bucc é uma briguenta projetada para manobrar e lutar acima de sua categoria de peso. Este caça de fronteira robusto pode ser mantido nas piores condições para manter vivas tripulações espaciais reais e trabalhadoras.\n\n--- STATS ---\nSCM: 240 m/s  |  Max: 1,400 m/s\nBoost: +600 m/s  /  -260 m/s\nCrew: 1  |  Length: 15.2m  |  Class: Combate  |  Role: Caça Leve\nShields: S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,160\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 8  |  D 0  |  T 0\nInsurance: 5.40 min base  |  1.80 min express
vehicle_DescDRAK_Caterpillar=Fabricante: Drake Interplanetary\nFoco: Carga Média\n\nIntroduzida pela primeira vez em 2871, a Caterpillar da Drake Interplanetary provou por muito tempo ser uma embarcação multitarefa confiável e econômica, capaz de ser equipada para tudo, desde operações mercantis até suporte de combate. Há muito aclamada como uma alternativa arduamente conquistada à onipresente série Hull, a Caterpillar é um cargueiro que não economiza em armamento ou personalização.\n\n--- STATS ---\nSCM: 130 m/s  |  Max: 900 m/s\nBoost: +300 m/s  /  -120 m/s\nCrew: 1  |  Length: 13.4m  |  Class: Transportador  |  Role: Frete Médio\nTurrets: 2\nShields: 3× S3  |  Coolers: 2× S3  |  Power: S3  |  QD: S3\nArmor HP: 16,830\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 315  |  E 300  |  D 0  |  T 0\nInsurance: 18.63 min base  |  6.21 min express
