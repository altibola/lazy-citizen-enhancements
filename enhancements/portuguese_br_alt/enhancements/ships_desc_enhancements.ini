vehicle_DescMRAI_Guardian_MX_Collector_Military=Fabricante: Mirai\nFoco: Caça Pesado\n\nPegando a estrutura do caça Guardian e adicionando ainda mais opções ofensivas, o Mirai Guardian MX possui poder de fogo e blindagem adicionais ideais para sobrecarregar os oponentes. Embora não seja tão ágil quanto a Guardian base, este caça pesado ainda é mais manobrável do que muitas outras naves de sua classe.\n\nWikelo por aqui. Fiz modificações úteis para tornar a nave muito mais parecida com um caça. Muito impressionante.\n\n--- STATS ---\nCrew: 1  |  Length: 26.0m  |  Class: Combate  |  Role: Caça Pesado\nInsurance: 8.33 min base  |  2.08 min express
vehicle_DescMRAI_Pulse=Fabricante: Mirai\nFoco: Combate\nOs engenheiros da Mirai se propuseram a criar uma moto de capota aberta capaz de fazer mais. Uma conexão mais íntima entre o piloto e o desempenho com uma silhueta que se ajusta à forma. Uma maneira mais intuitiva de domar paisagens formidáveis com um sistema grav-lev responsivo. Uma experiência de combate mais inteligente com uma arma personalizada totalmente integrada ao espírito do veículo. O resultado final? A Mirai Pulse.\n\n--- STATS ---\nSCM: 204 m/s  |  Max: 561 m/s\nBoost: +284 m/s  /  -124 m/s\nCrew: 1  |  Length: 3.5m  |  Class: Combate  |  Role: Desbravador\nCoolers: S0  |  Power: S0\nArmor HP: 1,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 6  |  E 4  |  D 0  |  T 0\nInsurance: 0.15 min base  |  0.05 min express
