vehicle_DescANVL_Valkyrie_CitizenCon=Fabricante: Anvil Aerospace \nFoco: Transporte de Tropas\n\nPor mais de um século, as naves da Anvil se distinguiram em inúmeras operações de combate civis e militares. Honre essa orgulhosa tradição de segurança com a edição limitada Liberator da Valkyrie, apresentando um pacote exclusivo de acabamento comemorando a estreia da nave na CitizenCon 2948.\n\n--- STATS ---\nCrew: 1  |  Length: 48.0m  |  Class: Combate  |  Role: Transporte de Tropa\nTurrets: 7\nShields: 2× S2  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 23,760\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 139  |  E 88  |  D 0  |  T 0\nInsurance: 19.82 min base  |  4.98 min express
vehicle_DescARGO_MOTH=Fabricante: Argo Astronautics\nFoco: Sucateamento Médio\n\nExperimente os séculos de expertise industrial da Argo com a MOTH. Utilizando um chassi testado e comprovado como base, a MOTH apresenta três torres de sucateamento dedicadas e um carregador automático de sucata externo, para que uma tripulação de quatro pessoas possa desmantelar, rasgar e armazenar sucata tão rápido quanto consigam alcançá-la.\n\n--- STATS ---\nSCM: 140 m/s  |  Max: 960 m/s\nBoost: +340 m/s  /  -150 m/s\nCrew: 3  |  Length: 0.0m  |  Class: Industrial  |  Role: Sucateamento Médio\nInsurance: 12.50 min base  |  3.13 min express
vehicle_DescARGO_MPUV=Fabricante: Argo Astronautics\nFoco: Frete Leve\n\nA MPUV Cargo da Argo Astronautics é uma nave dedicada para transferência de mercadorias. Como um estivador intergaláctico onipresente, um grande número de MPUV Cargos são responsáveis por carregar e descarregar mercadorias em naves que de outra forma não poderiam pousar em planetas ou docas secas, como a Hull D e a Orion. Alguns capitães de transportes optam por possuir e operar sua própria Argo, enquanto outros preferem contratar os proprietários locais de Argos encontrados em muitos dos portos mais movimentados.\n\n--- STATS ---\nSCM: 170 m/s  |  Max: 890 m/s\nBoost: +360 m/s  /  -140 m/s\nCrew: 1  |  Length: 10.5m  |  Class: Transportador  |  Role: Frete Leve\nShields: S1  |  Coolers: 2× S0  |  Power: S0\nArmor HP: 1,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.17 min base  |  0.00 min express
vehicle_DescARGO_MPUV_Tractor=Fabricante: Argo Astronautics\nFoco: Carga Leve\n\nA Argo Astronautics MPUV-1T está equipada com um feixe trator para permitir que ela mova convenientemente recipientes de carga para dentro e para fora de naves de transporte maiores. Seu tamanho menor e manobrabilidade a tornam um veículo de suporte ideal em zonas de pouso e estações espaciais.\n\n--- STATS ---\nSCM: 175 m/s  |  Max: 895 m/s\nBoost: +365 m/s  /  -145 m/s\nCrew: 1  |  Length: 10.5m  |  Class: Transportador  |  Role: Frete Leve\nTurrets: 1\nShields: S1  |  Coolers: S0  |  Power: S0\nArmor HP: 1,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.17 min base  |  0.00 min express
vehicle_DescARGO_MPUV_Transport=Fabricante: Argo Astronautics\nFoco: Passageiros\n\nA Argo Astronautics MPUV-1P (comumente "Argo Personnel"). Esta versão da Argo é voltada para uma responsabilidade simples, mas incrivelmente importante: mover grupos de pessoas de um lugar para outro. A Marinha da UEE usa a MPUV-1P extensivamente, e qualquer novo recruta provavelmente se lembra daqueles momentos terríveis em que tal nave os transportou para sua primeira designação espacial. Em mãos civis, as naves Argo Personnel são adaptadas para tudo, desde serviços de táxi padrão até o uso como naves de desembarque de combate improvisadas. A Argo MPUV-1P é capaz de transportar até oito humanos e seus equipamentos.\n\n--- STATS ---\nSCM: 170 m/s  |  Max: 890 m/s\nBoost: +360 m/s  /  -140 m/s\nCrew: 1  |  Length: 10.5m  |  Class: Transportador  |  Role: Passageiro\nShields: S1  |  Coolers: 2× S0  |  Power: S0\nArmor HP: 1,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.68 min base  |  0.23 min express
vehicle_DescARGO_Mole=Fabricante: Argo Astronautics\nFoco: Mineração Média\n\nO icônico extrator a laser multioperador da Argo, mais comumente referido como MOLE, permite que você trabalhe de forma mais rápida e eficaz do que nunca, graças ao seu sistema de mineração trilateral patenteado. Três estações de extração articuladas e controladas independentemente permitem potência máxima e versatilidade quase ilimitada. A MOLE vive pelo ditado "muitas mãos tornam o trabalho leve".\n\n--- STATS ---\nSCM: 140 m/s  |  Max: 960 m/s\nBoost: +340 m/s  /  -150 m/s\nCrew: 5  |  Length: 45.0m  |  Class: Industrial  |  Role: Mineração Média\nShields: S3  |  Coolers: S3  |  Power: S3  |  QD: S2\nArmor HP: 11,220\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 45  |  E 40  |  D 0  |  T 0\nInsurance: 13.50 min base  |  4.50 min express
vehicle_DescARGO_Mole_Teach=Fabricante: Argo Astronautics\nFoco: Mineração Média\n\nO icônico extrator a laser multioperador da Argo, mais comumente referido como MOLE, permite que você trabalhe de forma mais rápida e eficaz do que nunca, graças ao seu sistema de mineração trilateral patenteado. Três estações de extração articuladas e controladas independentemente permitem potência máxima e versatilidade quase ilimitada. A MOLE vive pelo ditado "muitas mãos tornam o trabalho leve".\n\nAtendendo às difíceis condições de trabalho de Nyx, a Teach's Ship Shop equipou esta edição especial com um conjunto de armas personalizado, apresentando componentes robustos para que você possa lidar melhor com a tarefa em mãos.\n\n--- STATS ---\nCrew: 5  |  Length: 45.0m  |  Class: Industrial  |  Role: Mineração Média\nShields: S3  |  Coolers: S3  |  Power: S3  |  QD: S2\nArmor HP: 11,220\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 45  |  E 40  |  D 0  |  T 0\nInsurance: 13.50 min base  |  4.50 min express
vehicle_DescARGO_RAFT=Fabricante: Argo Astronautics\nFoco: Carga Média\n\nA Argo RAFT apresenta um robusto compartimento de carga de 192 SCU e é capaz de transportar recipientes de carga padronizados de 32 SCU. Perfeita tanto para transportadores iniciantes quanto para velhos profissionais, a RAFT é uma solução ideal para o transporte confiável de carga local.\n\n--- STATS ---\nSCM: 140 m/s  |  Max: 990 m/s\nBoost: +340 m/s  /  -150 m/s\nCrew: 2  |  Length: 39.5m  |  Class: Transportador  |  Role: Frete Médio\nInsurance: 14.00 min base  |  2.00 min express
vehicle_DescARGO_RAFT_Collector_Indust=Fabricante: Argo Astronautics\nFoco: Carga Média\n\nA Argo RAFT apresenta um robusto compartimento de carga de 192 SCU e é capaz de transportar recipientes de carga padronizados de 32 SCU. Perfeita tanto para transportadores iniciantes quanto para velhos profissionais, a RAFT é uma solução ideal para o transporte confiável de carga local.\n\nWikelo oi. Fiz modificações úteis para tornar a nave ainda mais industriosa. Você vai gostar.\n\n--- STATS ---\nCrew: 2  |  Length: 39.5m  |  Class: Transportador  |  Role: Frete Médio\nInsurance: 14.00 min base  |  2.00 min express
vehicle_DescARGO_SRV=Fabricante: Argo Astronautics\nFoco: Recuperação\n\nQuando se trata de realizar o trabalho, a Argo não brinca em serviço. Desde o simples reboque de fretes e carga até operações angustiantes de busca e salvamento, a SRV lida com o que quer que você coloque em seu caminho. O sistema de tração sob medida utiliza uma combinação inovadora de placa e braço, permitindo o uso solo sem esforço, bem como o reboque de precisão em equipe para trabalhos maiores. Sua tripulação e passageiros também permanecem seguros graças aos escudos duráveis e à blindagem pesada que mantêm o cockpit e os componentes protegidos quando a situação fica difícil.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,100 m/s\nBoost: +460 m/s  /  -235 m/s\nCrew: 1  |  Length: 31.5m  |  Class: Suporte  |  Role: Recuperação\nShields: S2  |  Coolers: S2  |  Power: S2  |  QD: S2\nArmor HP: 3,740\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 10  |  E 9  |  D 0  |  T 0\nInsurance: 13.22 min base  |  4.75 min express
vehicle_DescBanu_Defender=Fabricante: Banu \nFoco: Caça Leve\n\nConheça a Banu Defender, um caça com múltipla tripulação cujo design remendado destaca a tecnologia de uma variedade de espécies. Apresentando acomodações modestas para sua tripulação e fácil acesso aos componentes, a Defender recebe esse nome devido à função que desempenha: a primeira linha de defesa contra ataques inimigos. É por isso que a Defender é o companheiro ideal para o Mercador: um para fazer o transporte pesado e o outro para realizar as lutas aéreas mortais.\n\n--- STATS ---\nSCM: 222 m/s  |  Max: 1,175 m/s\nBoost: +480 m/s  /  -255 m/s\nCrew: 1  |  Length: 24.5m  |  Class: Combate  |  Role: Caça Leve\nMRacks: 2× S3\nShields: S2  |  Coolers: 2× S1  |  Power: 2× S1  |  QD: S1\nArmor HP: 5,400\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 20  |  E 16  |  D 0  |  T 0\nInsurance: 13.61 min base  |  4.54 min express
vehicle_DescCNOU_HoverQuad=Fabricante: Consolidated Outland\nFoco: Passageiros\n\nProjetado como um veículo terrestre complementar para a Nomad, a estrutura angular e elegante do HoverQuad utiliza quatro sapatas gravlev para manobrabilidade máxima, tornando-o o transporte perfeito através de todos os tipos de superfícies.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 550 m/s\nBoost: +280 m/s  /  -120 m/s\nCrew: 1  |  Length: 1.4m  |  Class: Exploração  |  Role: Passageiro\nCoolers: S0  |  Power: S0\nArmor HP: 1,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.15 min base  |  0.05 min express
vehicle_DescCNOU_Mustang_Alpha=Fabricante: Consolidated Outland \nFoco: Inicial / Carga Leve\n\nInspirada pela visão de vanguarda do CEO da Consolidated Outland, Silas Koerner, a Mustang Alpha é uma espaçonave elegante e estilosa que utiliza ligas ultraleves para levar as relações de potência aos limites, embora às vezes de forma insegura. E agora, com o Transportador de Carga opcional, você pode ter as vantagens da Alpha sem sacrificar a Capacidade de Carga.\n\n--- STATS ---\nSCM: 228 m/s  |  Max: 1,218 m/s\nBoost: +500 m/s  /  -260 m/s\nCrew: 1  |  Length: 21.5m  |  Class: Multifunção  |  Role: Inicial / Frete Leve\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,000\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 10  |  E 9  |  D 0  |  T 0\nInsurance: 0.68 min base  |  0.00 min express
