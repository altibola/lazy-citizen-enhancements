vehicle_DescANVL_Terrapin=Fabricante: Anvil Aerospace\nFoco: Desbravador\n\nApresentando a nave de Varredura/Exploração Anvil Aerospace U4A-3 classe-Terrapin. A Terrapin foi desenvolvida perto do final do século 28 para servir como a primeira nave na reestruturação defensiva da Marinha do Império. A palavra de ordem da Terrapin é proteção, com extensos sistemas de escudo e camadas de blindagem projetadas para fornecer a máxima defesa possível ao piloto e à tripulação. Embora não tenha a capacidade de manobra de um caça dedicado, ela mantém um conjunto avançado e contundente de armas destinadas a manter o mais temível invasor Vanduul afastado.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,150 m/s\nBoost: +320 m/s  /  -240 m/s\nCrew: 1  |  Length: 20.0m  |  Class: Suporte  |  Role: Desbravador\nInsurance: 7.88 min base  |  2.62 min express
