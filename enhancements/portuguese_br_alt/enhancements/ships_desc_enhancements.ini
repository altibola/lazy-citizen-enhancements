vehicle_DescCRUS_Star_Runner=Fabricante: Crusader Industries\nFoco: Frete Médio\n\nSe você precisar chegar rápido e ileso, a Mercury bate todos os quesitos esperados de uma nave de entrega confiável e muito mais. Construída com os mesmos princípios de engenharia e design que fizeram da Crusader Industries a fabricante preferida para transporte galáctico em qualquer escala, a Mercury Star Runner permitirá que você fique à frente do cronograma, dos problemas e da concorrência.\n\n--- STATS ---\nSCM: 217 m/s  |  Max: 1,300 m/s\nBoost: +510 m/s  /  -218 m/s\nCrew: 1  |  Length: 51.0m  |  Class: Transportador  |  Role: Frete Médio\nInsurance: 21.00 min base  |  7.00 min express
