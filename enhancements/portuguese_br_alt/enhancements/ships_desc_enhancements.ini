vehicle_DescORIG_X1=Fabricante: Origin Jumpworks\nFoco: Passageiros\n\nBem-vindo ao próximo nível com a X1, o veículo de cabine aberta de alto desempenho da Origin Jumpworks. Construída com polímeros leves, a X1 leva a velocidade e a agilidade a um novo patamar graças à tecnologia de motor perfeitamente integrada e ao posicionamento dos propulsores de vetor de articulação. Design inovador e engenharia de alta qualidade se unem para criar uma experiência de voo sem igual.\n\n--- STATS ---\nSCM: 207 m/s  |  Max: 569 m/s\nBoost: +287 m/s  /  -127 m/s\nCrew: 1  |  Length: 1.6m  |  Class: Exploração  |  Role: Passageiro\nShields: ?  |  Coolers: S0  |  Power: S0\nArmor HP: 1,560\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.15 min base  |  0.05 min express
