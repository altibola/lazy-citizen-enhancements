vehicle_DescANVL_Hornet_F7CR=Fabricante: Anvil Aerospace\nFoco: Desbravador\n\nSe a Ghost é feita para se esconder, a Tracker é feita para procurar. A F7C-R Tracker possui um conjunto de radar avançado, tornando-a ideal para exploradores do espaço profundo que exigem profundidade e precisão em seus pacotes de varreduras. Milícias locais e unidades mercenárias maiores também redirecionarão as Trackers para atuarem como naves C&C móveis para seus esquadrões.\n\n--- STATS ---\nSCM: 219 m/s  |  Max: 1,142 m/s\nBoost: +477 m/s  /  -249 m/s\nCrew: 1  |  Length: 28.2m  |  Class: Exploração  |  Role: Desbravador\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 6,600\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 24  |  E 13  |  D 0  |  T 0\nInsurance: 8.10 min base  |  2.70 min express
