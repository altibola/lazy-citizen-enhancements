vehicel_DescANVL_Valkyrie=Fabricante: Anvil Aerospace \nFoco: Transporte de Tropas\n\nA Valkyrie eleva o nível no transporte de tropas. Projetada para carregar até vinte soldados, além de veículos, para os locais mais hostis, esta nave de especificações militares pronta para o conflito é uma força formidável, tanto ofensiva quanto defensivamente. Construída pensando em empreiteiras de defesa privadas e militares, a Valkyrie é um dos transportes de pessoal mais eficientes e eficazes de sua classe.\n\n--- STATS ---\nSCM: 207 m/s  |  Max: 1,110 m/s\nBoost: +431 m/s  /  -245 m/s\nCrew: 1  |  Length: 48.0m  |  Class: Combate  |  Role: Transporte de Tropa\nTurrets: 6\nShields: 2× S2  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 23,760\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 139  |  E 88  |  D 0  |  T 0\nInsurance: 19.82 min base  |  4.98 min express
vehicl_DescMISC_Hull_B=Fabricante: MISC\nFoco: Carga Média\n\nA MISC Hull B é uma opção robusta para pilotos que buscam um transporte de carga dedicado. Embora não seja tão grande quanto alguns dos outros modelos da série Hull, o perfil menor da Hull B oferece maior flexibilidade e mais opções de acesso.\n\n--- STATS ---\nSCM: 145 m/s  |  Max: 960 m/s\nBoost: +340 m/s  /  -180 m/s\nCrew: 2  |  Length: 71.0m  |  Class: Transportador  |  Role: Frete Médio\nInsurance: 11.66 min base  |  2.85 min express
vehicle_DescAEGS_Avenger_Stalker=Fabricante: Aegis Dynamics\nFoco: Interceptadora\n\nInicialmente projetada como a nave de porta-aviões de linha de frente da Aegis para os militares, a Avenger Stalker tomou um caminho diferente, tendo por fim uma longa e memorável carreira como a nave de patrulha padrão da Advocacia da UEE. Utilizando seu compartimento de carga para transporte de prisioneiros, a Avenger apresenta um casco robusto e confiável e a capacidade para suportes de motor maiores do que o esperado.\n\n--- STATS ---\nSCM: 262 m/s  |  Max: 1,425 m/s\nBoost: +610 m/s  /  -280 m/s\nCrew: 1  |  Length: 20.0m  |  Class: Combate  |  Role: Interceptador\nGuns: 2× S1 (empty)  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 1,232\nDmg Mult: P 0.80x  |  E 0.65x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 4.86 min base  |  1.62 min express
vehicle_DescAEGS_Avenger_Titan=Fabricante: Aegis Dynamics\nFoco:Frete Leve \n\nSem as Células de Prisioneiros da Stalker ou o Gerador de PEM da Warlock, o porão da Titã está livre para transportar carga. Combine esse espaço disponível com as habilidades de combate testadas e comprovadas da Avenger e você tem um transportador de carga leve que é mais do que capaz de se defender em uma luta.\n\n--- STATS ---\nSCM: 262 m/s  |  Max: 1,425 m/s\nBoost: +610 m/s  /  -280 m/s\nCrew: 1  |  Length: 20.0m  |  Class: Transportador  |  Role: Frete Leve\nGuns: 2× S1 (empty)  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,640\nDmg Mult: P 0.80x  |  E 0.65x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 4.05 min base  |  1.35 min express
vehicle_DescAEGS_Avenger_Titan_Renegade=Fabricante: Aegis Dynamics\nFoco: Frete Leve\n\nCriada como parte da série ‘Masters of Flight’ em conjunto com o simulador de voo Arena Commander, a Renegade presta homenagem ao famoso piloto Danny Solomon por seu notável trabalho com a Advocacy para trazer justiça a Bremen. Esta Avenger Titan vem equipada com uma configuração especializada focada em combates aéreos e uma pintura personalizada de edição especial em homenagem a esta icônica nave.\n\n--- STATS ---\nCrew: 1  |  Length: 20.0m  |  Class: Transportador  |  Role: Frete Leve\nGuns: 2× S1 (empty)  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,640\nDmg Mult: P 0.80x  |  E 0.65x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 4.05 min base  |  1.35 min express
vehicle_DescAEGS_Avenger_Warlock=Fabricante: Aegis Dynamics\nFoco: Interdição\n\nA Avenger Warlock foi construída com uma única filosofia de design: pare as naves, não as destrua. Provavelmente o mais próximo de um caça não letal, a Warlock é equipada com um Gerador de PEM Behring REP-8, capaz de emitir uma poderosa onda eletromagnética para desativar qualquer dispositivo eletrônico que tenha a infelicidade de estar dentro do raio da explosão.\n\n--- STATS ---\nSCM: 262 m/s  |  Max: 1,425 m/s\nBoost: +610 m/s  /  -280 m/s\nCrew: 1  |  Length: 20.0m  |  Class: Combate  |  Role: Interdição\nGuns: 2× S1 (empty)  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,640\nDmg Mult: P 0.80x  |  E 0.65x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 4.86 min base  |  1.62 min express
vehicle_DescAEGS_Eclipse=Fabricante: Aegis Dynamics\nFoco: Bombardeiro Furtivo\n\nA Aegis Eclipse é um bombardeiro projetado para entrar e atacar antes mesmo de ser avistada. Após extenso serviço no UEE, este equipamento militar de alta tecnologia estreou no mercado civil em 2947.\n\n--- STATS ---\nSCM: 210 m/s  |  Max: 1,100 m/s\nBoost: +510 m/s  /  -215 m/s\nCrew: 1  |  Length: 24.5m  |  Class: Combate  |  Role: Bombardeiro Furtivo\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,464\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 16.54 min base  |  5.51 min express
vehicle_DescAEGS_Firebird_Collector_Milt=Fabricante: Aegis Dynamics\nFoco: Caça Furtivo\n \nQuando as escaramuças de linha de frente exigem uma ofensiva rápida e decisiva, a Sabre Firebird é o caça médio ideal para qualquer arsenal. Utilizando a já comprovada em batalha Sabre Raven, a Aegis projetou a variante Firebird com um lançador de mísseis aprimorado, capaz de enfrentar uma ampla gama de ameaças.\n\n--- STATS ---\nCrew: 1  |  Length: 24.5m  |  Class: Combate  |  Role: Caça Furtivo\nMRacks: S3\nArmor HP: 4,752\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 20  |  E 16  |  D 0  |  T 0\nInsurance: 7.56 min base  |  2.52 min express
vehicle_DescAEGS_Gladius=Fabricante: Aegis Dynamics\nFoco: Caça Leve\n\nA Gladius é um design antigo que foi atualizado ao longo dos anos para acompanhar tecnologia moderna. Nos círculos militares, a Gladius é apreciada pelo seu desempenho e simplicidade. Um caça rápido e leve com foco em combate aéreo, a Gladius é uma interceptadora ou nave de escolta ideal.\n\n--- STATS ---\nSCM: 226 m/s  |  Max: 1,193 m/s\nBoost: +520 m/s  /  -268 m/s\nCrew: 1  |  Length: 21.0m  |  Class: Combate  |  Role: Caça Leve\nMRacks: 4× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 3,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 5.83 min base  |  1.94 min express
vehicle_DescAEGS_Gladius_Dunlevy=Fabricante: Aegis Dynamics\nFoco: Caça Leve\n\nHonre a famosa Capitã que moldou o curso do esquadrão de elite de caças da Marinha do UEE com a variante Dunlevy para o Aegis Gladius. Esta nave especial presta homenagem à Capitã Alexandra Dunlevy e ao Squadron 42 com detalhes em vermelho sobre uma base de pintura cinza e componentes de nível militar.\n\n--- STATS ---\nCrew: 1  |  Length: 21.0m  |  Class: Combate  |  Role: Caça Leve\nMRacks: 4× S3\nQD: S1\nArmor HP: 3,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 5.83 min base  |  1.94 min express
vehicle_DescAEGS_Gladius_PIR=Aegis Gladius Pirate\n\n--- STATS ---\nCrew: 1  |  Length: 21.0m  |  Class: Combate  |  Role: Caça Leve\nMRacks: 4× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 3,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 10.12 min base  |  1.94 min express
vehicle_DescAEGS_Gladius_Valiant=Fabricante: Aegis Dynamics\nFoco: Caça Leve \n\nCriada como parte da série 'Masters of Flight' em conjunto com o simulador de voo Arena Commander, a Valiant presta homenagem ao famoso piloto de defesa Condi Hillard por ser o primeiro humano registrado a derrotar um Vanduul em combate. Esta Gladius vem equipada com um conjunto especializado em combate aéreo e uma pintura de edição especial personalizada em homenagem à sua nave icônica.\n\n--- STATS ---\nCrew: 1  |  Length: 21.0m  |  Class: Combate  |  Role: Caça Leve\nMRacks: 4× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 3,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 5.83 min base  |  1.94 min express
vehicle_DescAEGS_Hammerhead=Fabricante: Aegis Dynamics \nFoco: Nave de Guerra Pesada\n\nUma nave de patrulha rápida com múltiplas torretas projetadas para combater caças, a Hammerhead é igualmente adequada para apoiar naves capitais maiores em uma frota ou atuar como carro-chefe para grupos de caças.\n\n--- STATS ---\nSCM: 160 m/s  |  Max: 1,000 m/s\nBoost: +340 m/s  /  -170 m/s\nCrew: 2  |  Length: 120.0m  |  Class: Combate  |  Role: Nave de Guerra Pesada\nTurrets: 6\nShields: 2× S3  |  Coolers: 2× S3  |  Power: 2× S3  |  QD: S3\nArmor HP: 25,740\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 531  |  E 380  |  D 0  |  T 0\nInsurance: 48.60 min base  |  16.20 min express
vehicle_DescAEGS_Idris_M=Fabricante: Aegis Dynamics\nFoco: Fragata\n\nMaior que um bombardeiro, mas menor que um nave de linha, as fragatas ocupam um espaço interessante no panteão das naves de guerra navais. Embora não possuam a armadura pesada e as armas de capital de um cruzador, a Marinha do UEE valoriza suas fragatas, pois são manobráveis e podem ser adaptadas para uso em uma ampla gama de cenários de combate.\n\n--- STATS ---\nCrew: 1  |  Length: 243.0m  |  Class: Combate  |  Role: Fragata\nTurrets: 1\nInsurance: 253.00 min base  |  63.25 min express
vehicle_DescAEGS_Idris_P=Fabricante: Aegis Dynamics\nFoco: Fragata\n\nUma segunda variante 'peacekeeper', desenvolvida para os serviços de patrulha do UEE, a Idris-P remove as armas de combate naval e o canhão de montagem espinhal padrão em favor de maior capacidade de carga e velocidade superior.\n\n--- STATS ---\nCrew: 1  |  Length: 243.0m  |  Class: Combate  |  Role: Fragata\nArmor HP: 72,930\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 528  |  E 462  |  D 0  |  T 0\nInsurance: 199.00 min base  |  49.75 min express
vehicle_DescAEGS_Idris_P_Collector_Military=Fabricante: Aegis Dynamics\nFoco: Fragata\n\nUma variante "peacekeeper" marca dois desenvolvida para os serviços de patrulha da UEE, a Idris-P remove o canhão navio-a-navio e o suporte espinhal da nave padrão em favor de capacidade de carga adicional e velocidade superior.\n\nWikelo aqui. Fiz modificações úteis para fazer nave lutar mais difícil. Muito impressionante.\n\n--- STATS ---\nCrew: 1  |  Length: 243.0m  |  Class: Combate  |  Role: Fragata\nArmor HP: 72,930\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 528  |  E 462  |  D 0  |  T 0\nInsurance: 199.00 min base  |  49.75 min express
vehicle_DescAEGS_Javelin=Fabricante: Aegis Dynamics \nFoco: Destróier\n\nDesenvolvido para os militares do UEE, a Javelin é uma nave enorme, modular e de grande capacidade que pode ser usada para fins corporativos. Com interior detalhado, muitas opções de espaço modular e alta capacidade de tripulação, a Javelin é uma nave que se destacou em diversas funções.\n\n--- STATS ---\nSCM: 50 m/s  |  Max: 900 m/s\nBoost: +290 m/s  /  -230 m/s\nCrew: 1  |  Length: 0.0m  |  Class: Destroier  |  Role: Destroier\nTurrets: 28\nShields: 4× S4  |  Coolers: 4× S4  |  Power: 4× S4  |  QD: S4\nArmor HP: 117,810\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 539  |  E 473  |  D 0  |  T 0\nInsurance: 168.75 min base  |  56.25 min express
vehicle_DescAEGS_Reclaimer=Fabricante: Aegis Dynamics\nFoco: Sucateamento Pesado\n\nA Aegis Reclaimer é uma nave de sucateamento industrial. Equipada com um compartimento de carga reforçado, um sistema de salto de longo alcance e cápsulas de lançamento para drones não tripulados, a Reclaimer é uma nave ideal para aproveitar destroços no espaço profundo. Raios tratores, holofotes, opções de escâner e portas de acoplamento completam as ferramentas desta espaçonave utilitária e capaz.\n\n--- STATS ---\nSCM: 110 m/s  |  Max: 870 m/s\nBoost: +290 m/s  /  -115 m/s\nCrew: 1  |  Length: 160.0m  |  Class: Industrial  |  Role: Sucateamento Pesado\nTurrets: 3\nShields: S4  |  Coolers: S4  |  Power: S4  |  QD: S3\nArmor HP: 32,912\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 495  |  E 418  |  D 0  |  T 0\nInsurance: 30.69 min base  |  10.23 min express
vehicle_DescAEGS_Reclaimer_Teach=Fabricante: Aegis Dynamics\nFoco: Sucateamento Pesado\n\nA Aegis Reclaimer é uma nave industrial de resgate (salvamento). Equipada com um compartimento de carga reforçado, um motor de salto de longo alcance e pods de lançamento para drones não tripulados, a Reclaimer é uma nave ideal para aproveitar destroços no espaço profundo. Raio trator, holofotes, opções de scanner e portas de acoplagem completam as ferramentas desta espaçonave capaz e utilitária.\n\nAtendendo às difíceis condições de trabalho de Nyx, a Teach's Ship Shop equipou esta edição especial com um *loadout* (conjunto de equipamentos) personalizado que apresenta componentes robustos para que você possa enfrentar melhor o trabalho em questão.\n\n--- STATS ---\nCrew: 1  |  Length: 160.0m  |  Class: Industrial  |  Role: Sucateamento Pesado\nTurrets: 3\nShields: S4  |  Coolers: S4  |  Power: S4  |  QD: S3\nArmor HP: 32,912\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 495  |  E 418  |  D 0  |  T 0\nInsurance: 30.69 min base  |  10.23 min express
vehicle_DescAEGS_Redeemer=Fabricante: Aegis Dynamics\nFoco: Nave de Guerra \n\nProjetado pela Aegis Dynamics, a Redeemer é uma poderosa nave de combate capaz de se manter em combate com uma poderosa carga de armas. Dotada de torretas e mísseis, a Redeemer também funciona como uma nave de desembarque blindada capaz de levar soldados para a linha de frente.\n\n--- STATS ---\nSCM: 203 m/s  |  Max: 1,050 m/s\nBoost: +400 m/s  /  -215 m/s\nCrew: 4  |  Length: 51.0m  |  Class: Combate  |  Role: Guerra\nGuns: 2  |  Turrets: 7  |  MRacks: 2× S4\nShields: 6× S2  |  Coolers: S3  |  Power: 2× S3  |  QD: S2\nArmor HP: 21,120\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 116  |  E 110  |  D 0  |  T 0\nInsurance: 28.35 min base  |  9.45 min express
vehicle_DescAEGS_Retaliator=Fabricante: Aegis Dynamics\nFoco: Modular\n\nEsta reforma civil da Retaliator atualiza o chassi da nave militar com espaço livre capaz de ser equipado com vários módulos para atender às suas necessidades.\n\n--- STATS ---\nSCM: 205 m/s  |  Max: 1,100 m/s\nBoost: +400 m/s  /  -206 m/s\nCrew: 1  |  Length: 70.5m  |  Class: Combate  |  Role: Modular\nTurrets: 12\nCoolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 18,480\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 116  |  E 110  |  D 0  |  T 0\nInsurance: 25.74 min base  |  8.58 min express
vehicle_DescAEGS_Sabre=Fabricante: Aegis Dynamics\nFoco: Caça Furtivo\n\nParte da Fase Dois de novos modelos de naves da Aegis Dynamics, a Sabre foi projetada como um caça de superioridade espacial para aquelas situações em que você precisa deixar uma pegada mais leve. Projetada para responder rapidamente, a Sabre é mais do que capaz de estabelecer o domínio do campo de batalha em qualquer número de cenários de combate.\n\n--- STATS ---\nSCM: 223 m/s  |  Max: 1,235 m/s\nBoost: +480 m/s  /  -230 m/s\nCrew: 1  |  Length: 24.5m  |  Class: Combate  |  Role: Caça Furtivo\nMRacks: 2× S4\nShields: 2× S1  |  Coolers: 2× S1  |  Power: 2× S1  |  QD: S1\nArmor HP: 2,772\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 20  |  E 16  |  D 0  |  T 0\nInsurance: 9.45 min base  |  3.15 min express
vehicle_DescAEGS_Sabre_Comet=Fabricante: Aegis Dynamics\nFoco: Caça Furtivo\n\nCriada como parte da série ‘Masters of Flight’ em conjunto com o simulador de voo Arena Commander, a Comet presta homenagem ao famoso piloto Capitão Kamur Dalion por seu trabalho com a Aegis para inaugurar uma nova era no design de naves de combate. Esta Sabre vem equipada com um conjunto especializado em combate aéreo e uma pintura de edição especial personalizada em homenagem a esta nave icônica.\n\n--- STATS ---\nCrew: 1  |  Length: 24.5m  |  Class: Combate  |  Role: Caça Furtivo\nMRacks: 2× S4\nShields: 2× S1  |  Coolers: 2× S1  |  Power: 2× S1  |  QD: S1\nArmor HP: 2,772\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 20  |  E 16  |  D 0  |  T 0\nInsurance: 9.45 min base  |  3.15 min express
vehicle_DescAEGS_Sabre_Firebird=Fabricante: Aegis Dynamics\nFoco: Caça Furtivo\n \nQuando as escaramuças de linha de frente exigem uma ofensiva rápida e decisiva, a Sabre Firebird é o caça médio ideal para qualquer arsenal. Utilizando a já comprovada em batalha Sabre Raven, a Aegis projetou a variante Firebird com um lançador de mísseis aprimorado, capaz de enfrentar uma ampla gama de ameaças.\n\n--- STATS ---\nSCM: 240 m/s  |  Max: 1,400 m/s\nBoost: +600 m/s  /  -260 m/s\nCrew: 1  |  Length: 24.5m  |  Class: Combate  |  Role: Caça Furtivo\nMRacks: S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: 2× S1  |  QD: S1\nArmor HP: 4,752\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 20  |  E 16  |  D 0  |  T 0\nInsurance: 7.56 min base  |  2.52 min express
vehicle_DescAEGS_Sabre_Peregrine=Fabricante: Aegis Dynamics\nFoco: Corrida\nDepois de ver o que os fãs da Sabre Raven conseguiram realizar com o caça na pista de corrida, a equipe de design da Aegis Dynamics se inspirou para criar uma variante oficial de corrida para a ágil nave. Eis a Sabre Peregrine. Com um design aerodinâmico e com propulsores adicionais, esse pássaro ágil está pronto para voar até a linha de chegada.\n\n--- STATS ---\nSCM: 267 m/s  |  Max: 1,447 m/s\nBoost: +655 m/s  /  -277 m/s\nCrew: 1  |  Length: 24.5m  |  Class: Competição  |  Role: Corrida\nMRacks: 1\nShields: 2× S1  |  Coolers: 2× S1  |  Power: 2× S1  |  QD: S1\nArmor HP: 1,584\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 20  |  E 16  |  D 0  |  T 0\nInsurance: 7.56 min base  |  2.52 min express
vehicle_DescAEGS_Sabre_Peregrine_Collector_Competition=Fabricante: Aegis Dynamics\nFoco: Corrida\nDepois de ver o que os fãs da Sabre Raven conseguiram realizar com o caça na pista de corrida, a equipe de design da Aegis Dynamics se inspirou para criar uma variante oficial de corrida para a nave ágil. Eis a Sabre Peregrine. Com um design aerodinâmico e com propulsores adicionais, esse pássaro ágil está pronto para voar até a linha de chegada.\n\n--- STATS ---\nCrew: 1  |  Length: 24.5m  |  Class: Competição  |  Role: Corrida\nMRacks: 1\nArmor HP: 1,584\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 20  |  E 16  |  D 0  |  T 0\nInsurance: 7.56 min base  |  2.52 min express
vehicle_DescAEGS_Sabre_Raven=Fabricante: Aegis Dynamics \nFoco: Interdição \n\nA Aegis Dynamics elevou o padrão mais uma vez com sua variante Raven, mantendo toda a velocidade e manobrabilidade de sua antecessora Sabre, mas com uma assinatura de nave mais baixa, tornando-a uma infiltradora rápida e furtiva.\n\n--- STATS ---\nSCM: 240 m/s  |  Max: 1,400 m/s\nBoost: +600 m/s  /  -260 m/s\nCrew: 1  |  Length: 24.5m  |  Class: Combate  |  Role: Interdição\nMRacks: 2\nShields: 2× S1  |  Coolers: 2× S1  |  Power: 2× S1  |  QD: S1\nArmor HP: 2,218\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 20  |  E 16  |  D 0  |  T 0\nInsurance: 7.56 min base  |  2.52 min express
vehicle_DescAEGS_Tiburon=Fabricante: Aegis Dynamics\nFoco: Canhoneira Pesada\n\nUma evolução de um design comprovado da Aegis, a configuração anti-nave capital da Tiburon compreende uma arma de feixe montada na espinha e voltada para a frente, complementada por torres montadas nas laterais.\n\n--- STATS ---\nSCM: 150 m/s  |  Max: 975 m/s\nBoost: +330 m/s  /  -160 m/s\nCrew: 7  |  Length: 121.0m  |  Class: Combate  |  Role: Nave de Guerra Pesada\nTurrets: 1\nCoolers: 2× S3  |  Power: 2× S3\nInsurance: 48.60 min base  |  16.20 min express
vehicle_DescAEGS_Vanguard=Fabricante: Aegis Dynamics\nFoco: Caça Pesado\n\nUm caça buldogue de ataque pesado que possui amplo armamento montado na frente, projetada para destruir os escudos e armaduras de outras espaçonaves. Assim chamados porque seu alcance de salto múltiplo lhes permite formar a vanguarda de qualquer expedição militar, as Vanguards prestaram serviço extensivo contra os Vanduul.\n\n--- STATS ---\nSCM: 210 m/s  |  Max: 1,075 m/s\nBoost: +458 m/s  /  -220 m/s\nCrew: 1  |  Length: 48.0m  |  Class: Combate  |  Role: Caça Pesado\nGuns: 5  |  Turrets: 1  |  MRacks: 4× S4\nShields: 2× S2  |  Coolers: 2× S2  |  Power: S2  |  QD: S2\nArmor HP: 9,900\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 50  |  E 40  |  D 0  |  T 0\nInsurance: 18.22 min base  |  6.07 min express
vehicle_DescAEGS_Vanguard_Harbinger=Fabricante: Aegis Dynamics\nFoco: Caça Pesado / Bombardeiro\n\nA Vanguard Harbinger é o caça/bombardeiro padrão da Terra, convertendo a cápsula de fuga padrão da Warden em um potente compartimento de bombas. O alcance estendido da Vanguard e o perfil relativamente pequeno significam que ela pode ir onde naves baseadas em porta-aviões ou bombardeiros estratégicos maiores não conseguem, golpear com força e retornar à base.\n\n--- STATS ---\nSCM: 212 m/s  |  Max: 1,085 m/s\nBoost: +462 m/s  /  -224 m/s\nCrew: 1  |  Length: 48.0m  |  Class: Combate  |  Role: Caça Pesado / Bombardeiro\nGuns: 5  |  Turrets: 1  |  MRacks: 4× S4  S5\nShields: 2× S2  |  Coolers: 2× S2  |  Power: S2  |  QD: S2\nArmor HP: 9,900\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 50  |  E 40  |  D 0  |  T 0\nInsurance: 16.39 min base  |  5.46 min express
vehicle_DescAEGS_Vanguard_Hoplite=Fabricante: Aegis Dynamics\nFoco: Nave de Desembarque \n\nA Vanguard Hoplite é um cruzamento entre o vitorioso caça de espaço profundo Vanguard e uma nave de abordagem dedicada. Adaptada de designs comprovados de naves de assalto, a Hoplite é a ferramenta perfeita para a inserção de uma equipe de ataque blindada com poder de fogo suficiente para retirá-los de lá novamente.\n\n--- STATS ---\nSCM: 209 m/s  |  Max: 1,115 m/s\nBoost: +435 m/s  /  -246 m/s\nCrew: 1  |  Length: 48.0m  |  Class: Combate  |  Role: Transporte de Tropa\nGuns: 5  |  Turrets: 1  |  MRacks: 2× S4\nShields: 2× S2  |  Coolers: 2× S2  |  Power: S2  |  QD: S2\nArmor HP: 14,850\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 50  |  E 40  |  D 0  |  T 0\nInsurance: 13.25 min base  |  4.42 min express
vehicle_DescAEGS_Vanguard_Sentinel=Fabricante: Aegis Dynamics\nFoco: Caça Pesado \n\nA Vanguard Sentinel é uma nave projetada para lutar com inteligência em vez de enfrentar os inimigos de frente. A conversão apresenta um cockpit de RA, um pod de guerra eletrônica externo, mísseis de engodo e um conjunto de cargas EMP. As Vanguard Sentinels frequentemente fornecem suporte de combate necessário para operações combinadas. Uma Sentinel solitária é frequentemente pareada com bombardeiros Harbinger e escoltas Warden para grandes missões de ataque.\n\n--- STATS ---\nSCM: 217 m/s  |  Max: 1,075 m/s\nBoost: +462 m/s  /  -224 m/s\nCrew: 1  |  Length: 48.0m  |  Class: Combate  |  Role: Caça Pesado / Bombardeiro\nGuns: 5  |  Turrets: 1  |  MRacks: 4× S4\nShields: 2× S2  |  Coolers: 2× S2  |  Power: S2  |  QD: S2\nArmor HP: 9,900\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 50  |  E 40  |  D 0  |  T 0\nInsurance: 18.22 min base  |  6.07 min express
vehicle_DescANVL_Arrow=Fabricante: Anvil Aerospace \nFoco: Caça Leve\n\nDesign incomparável, velocidade máxima incrível e capacidade de manobra ultra-responsiva fazem da Arrow o caça mais ágil em sua classe. Com um pacote de armas robusto que fornece poder de fogo de sobra, este é verdadeiramente o caça leve clássico, atualizado para a próxima geração de combate.\n\n--- STATS ---\nSCM: 229 m/s  |  Max: 1,215 m/s\nBoost: +515 m/s  /  -265 m/s\nCrew: 1  |  Length: 17.2m  |  Class: Combate  |  Role: Caça Leve\nShields: S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 3,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 12  |  E 6  |  D 0  |  T 0\nInsurance: 5.27 min base  |  1.76 min express
vehicle_DescANVL_Asgard=Fabricante: Anvil Aerospace\nFoco: Transporte de Tropas\n \nÀ medida que as batalhas de hoje continuam a crescer em escala e complexidade, a Anvil Aerospace entende o impacto que um único veículo pode ter no resultado. Apresentamos a Asgard. A próxima geração no transporte de veículos terrestres, a Anvil Asgard apresenta uma rampa de carregamento rápido, um compartimento considerável para armazenar com segurança seu veículo de assalto preferido e uma pesada matriz de armamentos para garantir o acesso até mesmo aos locais de desembarque com maior densidade de combate.\n\n--- STATS ---\nSCM: 203 m/s  |  Max: 1,075 m/s\nBoost: +425 m/s  /  -240 m/s\nCrew: 1  |  Length: 48.0m  |  Class: Combate  |  Role: Transporte de Tropa\nTurrets: 1\nShields: 4× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 23,760\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 139  |  E 88  |  D 0  |  T 0\nInsurance: 17.00 min base  |  4.25 min express
