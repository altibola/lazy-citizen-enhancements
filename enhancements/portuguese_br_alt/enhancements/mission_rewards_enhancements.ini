Covalex_HaulCargo_MultiToSingle_Waste_Waste_Stanton1=Olá,\n\nPreciso que o lixo seja coletado de alguns locais da Hurston e depois levado para um elevador de carga em <EM4>~mission(Destination|Address)</EM4>. Não se preocupe, nenhum dos contêineres é maior que <EM4>~mission(MissionMaxSCUSize)</EM4>.\n\nLOCAIS DE COLETA (QUALQUER ORDEM)\n\n~mission(MultiToSingleToken)\n\nFato divertido: Hurston é o único planeta em Stanton que não separa seu lixo e sucata. Um de seus trabalhadores me disse que a empresa fez uma análise de custo-benefício há décadas que determinou que não valia a pena implementar um sistema em todo o planeta para facilitar isso. Não é a coisa mais "Hurston" de todas?\n\nA propósito, nós encorajamos veementemente os contratados a trazerem um <EM4>raio trator portátil</EM4> (handheld tractor beam).\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nCoordenador de Logística Jr.\nCovalex Shipping  \n'Tudo o que você precisar, onde você precisar.'\n\n\n\n\n\n\n\nCovalex Shipping é uma sociedade anônima de responsabilidade limitada. Para incentivar entregas dentro do prazo e prevenir fraudes em transportes de carga, a Covalex Shipping estabelecerá um limite de tempo de entrega e, após o vencimento, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será rateado de acordo com o percentual de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 3/7\n<EM4>Rep:</EM4> +2,000
Covalex_HaulCargo_MultiToSingle_desc_RawOre_Stanton1=Olá,\n\nHurston está solicitando que priorizemos as coletas das instalações de mineração locais para liberar espaço para o que eles estão extraindo. Aqui estão todos os lugares que você precisa ir: \n\nLOCAIS DE COLETA (QUALQUER ORDEM)\n\n~mission(MultiToSingleToken)\n\nUma vez coletado, tudo precisa chegar a um elevador de carga em <EM4>~mission(Destination|Address)</EM4>. Eles disseram que todos os contêineres terão no máximo <EM4>~mission(MissionMaxSCUSize)</EM4> de tamanho. Parece algo que você pode lidar? \n\nA propósito, nós encorajamos veementemente os contratados a trazerem um <EM4>raio trator portátil</EM4> (handheld tractor beam).\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nCoordenador de Logística Jr.\nCovalex Shipping  \n'Tudo o que você precisar, onde você precisar.'\n\n\n\n\n\n\n\nCovalex Shipping é uma sociedade anônima de responsabilidade limitada. Para incentivar entregas dentro do prazo e prevenir fraudes em transportes de carga, a Covalex Shipping estabelecerá um limite de tempo de entrega e, após o vencimento, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será rateado de acordo com o percentual de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 3/7\n<EM4>Rep:</EM4> +1,000
