Shubin_Industrial_GroundVehicle_Stanton_VH_Solar_Desc_001=ANÚNCIO: Ordem de Compra\nLOCALIZAÇÃO: <EM4>~mission(System) </EM4>\n\nTERMOS*: \nA Shubin Interstellar está atualmente procurando cumprir outra ordem de compra de materiais raros. Agradecemos sua ajuda nesta questão.\n\nExistem apenas alguns locais conhecidos onde estes materiais podem ser obtidos, principalmente em locais agora extintos do Hathor Group em <EM4>Daymar e Aberdeen</EM4>. Nossa sugestão seria ir para as Platform Alignment Facilities (PAF) e tentar reativar sua Orbital Laser Platform (OLP) para acessar os materiais abaixo da superfície do planeta.\n\nLembrete, como esta é uma ordem de compra e não um contrato de mineração, espera-se que você forneça seu próprio equipamento, como um <EM4>~mission(Hint_Tool)</EM4>.\n\nQuando estiver pronto para nos vender os materiais solicitados, deposite-os no elevador de carga localizado em <EM4>~mission(Destination|Address)</EM4>.\n\n*Ao aceitar este contrato, você assume todos e quaisquer riscos associados ao trabalho aqui descrito e de forma alguma a Shubin Interstellar pode ser responsabilizada por quaisquer danos acumulados durante a duração do contrato.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 3/7 | Knowledge 6/7\n<EM4>Veteran Contractor:</EM4> +200 Rep
