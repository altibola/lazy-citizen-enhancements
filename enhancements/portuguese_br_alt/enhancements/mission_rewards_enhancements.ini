Shubin_Industrial_ShipMining_VH_Org_Desc_001=ANÚNCIO: Ordem de Compra\nLOCALIZAÇÃO: <EM4>~mission(System) </EM4>\n\nTERMOS*: \nA Shubin Interstellar está atualmente procurando cumprir outra ordem de compra para uma variedade de materiais refinados. Esta ordem de compra é mais complexa do que o normal, exigindo múltiplos métodos de mineração, mas como você provou sua habilidade até agora, achamos que você e sua equipe estão prontos para o desafio.\n\nLembrete, os <EM4>materiais devem ser refinados antes da entrega</EM4> e, como esta é uma ordem de compra e não um contrato de mineração, espera-se que você forneça seu próprio equipamento, como um <EM4>~mission(Hint_Tool)</EM4>.\n\nQuando estiver pronto para nos vender os materiais solicitados, deposite-os no elevador de carga localizado em <EM4>~mission(Destination|Address)</EM4>.\n\n*Ao aceitar este contrato, você assume todos e quaisquer riscos associados ao trabalho aqui descrito e de forma alguma a Shubin Interstellar pode ser responsabilizada por quaisquer danos acumulados durante a duração do contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Shubin_RG_ShipMining_Rank4_Org]</EM4>\n- Arclight "Nightstalker" Pistol\n- Arclight "Warhawk" Pistol\n- [S1-A] Arclight Pistol Battery (30 cap)\n- [S1-A] Aril Arms\n- [S1-A] Aril Core\n- [S1-A] Aril Helmet\n- [S1-A] Aril Legs\n- Arclight "Stormfall" Pistol\n- Arclight Pistol\n- [S1-A] Horizon Helmet\n- [S1-A] Venture Arms\n- [S1-A] Venture Core\n- [S1-A] Venture Legs\n\n<EM4>[Shubin_RG_ShipMining_Rank4_Org, Rank 0–1]</EM4>\n- [IND-S0-C] Surveyor-Go\n- [IND-S1-C] Surveyor-Lite\n- [IND-S2-C] Surveyor\n- [IND-S3-C] Surveyor-Max\n- [MIN-S0-A] Arbor MHV Mining Laser\n- [MIN-S0-B] Helix\n- [MIN-S0-B] Hofstede\n- [MIN-S0-C] Lawson Mining Laser\n\n<EM4>[Shubin_RG_ShipMining_Rank4_Org, Rank 2–3]</EM4>\n- [IND-S0-B] BroadSpec-Go\n- [IND-S2-B] BroadSpec\n- [IND-S4-B] BroadSpec-Max\n- [MIN-S1-A] Arbor MH1 Mining Laser\n- [MIN-S1-A] Helix I Mining Laser\n- [MIN-S1-A] Hofstede-S1 Mining 