Foxwell_DefendLocation_E_Desc_001=Naves indo e vindo de <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> estão sendo alvo de forças hostis. O pessoal de lá nos contratou para lidar com esse problema imediatamente.\n\nPrecisamos de alguém que vá até lá o quanto antes e comece a enfrentar essas naves. A situação parece estar em constante mudança, então vou te manter atualizado sobre onde sua presença é mais necessária. \n\nPelo esforço e dedicação, também pagaremos um bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4> ao contratado principal por cuidar disso.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n‘Segurança, do Seu Jeito’\n\nA Foxwell Enforcement é uma especialista em segurança credenciada e licenciada para operar por todo o UEE. Estamos sempre em busca de novos operadores para se juntar à nossa equipe. Se você ou alguém que conhece estiver interessado, entre em contato com um de nossos representantes de contratos.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- [S1-A] Antium Arms Storm\n- [S1-A] Antium Core Storm\n- [S1-A] Antium Helmet Storm\n- [S1-A] Antium Legs Storm\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4, Hostiles x2, Reinforcements x8\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
