XenoThreat_claimsweep_title_rand=Eliminar sentidas <EM4>[100 Rep]</EM4>
Xenothreat_bounty_headhunter_desc_001=XenoThreat colocou uma ordem de morte em ~mission(TargetName). Como membro do nível de clipes da gangue Headhunters, ~mission(TargetName|Last) liderou operações que visam agentes, missões e infraestrutura da XenoThreat. Para essas transgressões, a XenoThreat pagará a qualquer pessoa que rastreie e assassine com sucesso ~mission(TargetName|Last).\n\nATUALIZAÇÃO DE LOCALIZAÇÃO: ~mission(TargetName|Last) foi visto perto de ~mission(Location|Address) há pouco tempo. Se você decidir aceitar este contrato, vá para as coordenadas imediatamente.~mission(TargetName|Last) sabe que estamos procurando por eles e estamos viajando com uma escolta recentemente. Não se surpreenda se eles não estiverem sozinhos. \n\nEsp. Com. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Xenothreat_bounty_headhunter_desc_002=XenoThreat colocou uma ordem de morte em ~mission(TargetName). Um membro conhecido da gangue Headhunters, ~mission(TargetName|Last) traiu a humanidade por ser um aliado alienígena conhecido que se associa a eles em uma capacidade pessoal e comercial. A XenoThreat quer que essas associações traidores parem imediatamente antes de trazer mais influência alienígena ao Pyro. Pagaremos a qualquer pessoa que rastreie com sucesso e assassinato ~mission(TargetName|Last) por esses crimes contra a humanidade.\n\nATUALIZAÇÃO DE LOCALIZAÇÃO: ~mission(TargetName|Last) foi recentemente visto com uma escolta em ~mission(Location|Address).\n\nEsp. Com. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Xenothreat_bounty_headhunter_desc_003=XenoThreat colocou uma ordem de morte na cabeça de ~mission(TargetName). Como membro da gangue Headhunters, ~mission(TargetName|Last) invadiu os sistemas XenoThreat para roubar informações sobre nossas operações e pessoal. O dano causado só pode ser corrigido, garantindo que ~mission(TargetName|Last) nunca mais possa fazer algo assim. É por isso que a XenoThreat pagará a qualquer pessoa que possa rastrear e assassinar ~mission(TargetName|Last).\n\nATUALIZAÇÃO DE LOCALIZAÇÃO: varreduras recentes identificadas ~mission(TargetName|Last) viajando com outras naves perto de ~mission(Location|Address).\n\nEsp. Com. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Xenothreat_destroyitems_CFP_vehicle_desc_01=Os “ativistas” de poltrona da Citizens for Prosperity continuam tentando espalhar sua influência por todo o sistema. Com sua ajuda, há uma oportunidade de cortar suas operações pela raiz.\n\nO grupo está usando a ~mission(location|address) para distribuir suprimentos para os independentes espalhados pelo planeta. Se destruirmos a ~mission(ship) localizada lá, a rede deles cairá.\n\nO bombardeio enviaria uma mensagem clara, mas deixarei que vocês decidam os meios de destruição.\n\nEsp. Com. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Xenothreat_theft_outpost_cfp_desc_001=Deixe para o UEE mentiroso dizer que eles não estão envolvidos nas operações dos cidadãos para o Pyro simplesmente porque eles "doam" suprimentos para uma organização de ajuda terciária que então imediatamente os entrega.\n\nwe acabou de receber a notícia de que uma dessas remessas de ajuda do governo foi deixada em um posto avançado alinhado por Pyro.É por isso que pagaremos a você a invadir a ~mission(Pickup1|Address) e reivindicar a ~mission(item) para a causa. Depois de entregar tudo a ~mission(Dropoff1|Address), podemos redistribuir a remessa para ajudar em nossa luta. Nada melhor do que usar os recursos dos inimigos contra eles.\n\nbut não pensa que eles apenas entregarão as coisas para você. Embora os cidadãos de Pyro estejam supostamente aqui para trazer a paz, é melhor você estar preparado para se aprofundar com eles.\n\nEsp. Com. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Xenothreat_theft_outpost_headhunters_desc_001=Por mais que a XenoThreat tenha se esforçado para tornar Pyro um refúgio puro para os humanos, nem todos estão alinhados com nossos objetivos. O principal deles são os Headhunters, que se rebaixaram ao contratar um transportador alienígena para entregar suprimentos a eles. Perdemos a chance de acertar esse carregamento, mas ainda assim queremos enviar a mensagem de que trabalhar com alienígenas em qualquer capacidade não será tolerado neste sistema. \n\nEssa remessa foi entregue em ~mission(Pickup1|Address). Queremos que alguém vá até o posto avançado, pegue ~mission(item) e leve para ~mission(Dropoff1|Address) para que possamos descartar adequadamente. \n\nVocê está disposto a manter Pyro livre da influência alienígena?\n\nEsp. Com. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Xenothreat_theft_station_cfp_desc_001=Os cidadãos para o Pyro se envolveram em ~mission(Pickup1|Address). Para impedir que fiquem muito confortáveis naquela estação, queremos mostrar a eles como é realmente a vida em nosso sistema. Pagaremos você para chegar à estação, pegar a ~mission(item) e matar qualquer pessoa que atrapalhe.\n\nPagamento depende de você entregar esses suprimentos para ~mission(Dropoff1|Address). Qualquer pessoa que você matar será apenas uma vantagem.\n\nEsp. Com. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Xenothreat_theft_station_roughready_desc_001=Não sei se você já teve o prazer de lidar com a Rough & Ready, mas a gangue está concentrada em dominar o mercado de combustível em Pyro. Uma jogada inteligente, mas que não podemos deixar acontecer sem que eles nos façam algumas concessões. Como eles não estão interessados em negociar, somos forçados a mostrar a eles o que acontece com aqueles que se opõem a nós.\n\nIdentificamos a ~mission(Pickup1|Address) como um alvo principal para esse ataque. Também sabemos que eles receberam recentemente alguns suprimentos que devem ser um preço adequado para sua obstinação. Uma vez dentro da estação, faça o que for necessário para confiscar o ~mission(item). Enviaremos o pagamento assim que você os entregar na ~mission(Dropoff1|Address).      \n\nEsp. Com. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
