ServiceBeacon_Escort_Mission_Desc=~mission(InitiatorName) solicita uma escolta no local: ~mission(InitiatorLocation). Se você for aceito, você receberá ~mission(PaymentAmount) aUEC/minuto até ser CANCELADO pelo iniciador ou ABANDONADO pelo Provedor do Serviço. \n\nNOTA: O contrato e o pagamento começam assim que você se encontrar com o cliente. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
ServiceBeacon_Heal_Mission_Desc=~mission(InitiatorName) precisa de ajuda médica em ~mission(InitiatorLocation). O pagamento será ~mission(PaymentAmount) aUEC. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
ServiceBeacon_PersonalTransport_Mission_Desc=~mission(InitiatorName) solicita um transporte de ~mission(InitiatorLocation) para ~mission(SelectedDestination). Após a conclusão bem-sucedida deste serviço, você receberá ~mission(PaymentAmount) aUEC.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
ServiceBeacon_Revive_Mission_Desc=~mission(InitiatorName) requer tratamento médico de emergência em: ~mission(InitiatorLocation). O pagamento é ~mission(PaymentAmount) aUEC. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Shubin_Industrial_GroundVehicle_Nyx_VH_Interstellar_Desc_001=ANÚNCIO: Ordem de Compra\nLOCALIZAÇÃO: <EM4>~mission(System) </EM4>\n\nTERMOS*: \nA Shubin Interstellar está atualmente procurando cumprir outra ordem de compra de materiais raros. Agradecemos sua ajuda nesta questão.\n\nExistem apenas alguns locais conhecidos onde estes materiais podem ser obtidos, principalmente em locais agora extintos do Hathor Group em <EM4>Daymar e Aberdeen</EM4>. Nossa sugestão seria ir para as Platform Alignment Facilities (PAF) e tentar reativar sua Orbital Laser Platform (OLP) para acessar os materiais abaixo da superfície do planeta.\n\nLembrete, como esta é uma ordem de compra e não um contrato de mineração, espera-se que você forneça seu próprio equipamento, como um <EM4>~mission(Hint_Tool)</EM4>.\n\nQuando estiver pronto para nos vender os materiais solicitados, deposite-os no elevador de carga localizado em <EM4>~mission(Destination|Address)</EM4>.\n\n*Ao aceitar este contrato, você assume todos e quaisquer riscos associados ao trabalho aqui descrito e de forma alguma a Shubin Interstellar pode ser responsabilizada por quaisquer danos acumulados durante a duração do contrato.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 4/7 | Knowledge 6/7\n<EM4>Veteran Contractor:</EM4> +200 Rep
Shubin_Industrial_GroundVehicle_Nyx_VH_Interstellar_Title_001=ORDEM DE COMPRA GG: MINÉRIO MINERADO POR VEÍCULO <EM4>[200 Rep]</EM4>
Shubin_Industrial_GroundVehicle_Pyro_E_DiscoverPlanetary_Desc_001=ANÚNCIO: Ordem de Compra\nLOCALIZAÇÃO: <EM4>~mission(System) </EM4>\n\nTERMOS*: \nDevido a mudanças em nossa cadeia de suprimentos, a Shubin Interstellar está atualmente procurando comprar uma variedade de materiais de mineradores independentes que operam na área. Embora vender em um centro comercial possa lhe render um preço mais competitivo do que cumprir nossa ordem, muitos mineradores consideram que fortalecer seus laços com a Shubin é um investimento sábio a longo prazo para suas carreiras.\n\n~~mission(Hint_Location) Para uma lista abrangente de onde encontrar estes minerais, consulte <EM4>Mining Fundamentals #2: Where to Mine</EM4> em seu Journal no mobiGlas. Enquanto estiver lá, sinta-se à vontade para ler a primeira parte <EM4>Mining Fundamentals #1: Basic Overview</EM4> se quiser uma atualização sobre como obter os materiais.\n\nComo esta é uma ordem de compra e não um contrato de mineração, espera-se que você forneça seu próprio equipamento, como um <EM4>~mission(Hint_Tool)</EM4>.\n\nQuando estiver pronto para nos vender os materiais solicitados, deposite-os no elevador de carga localizado em <EM4>~mission(Destination|Address)</EM4>.\n\n*Ao aceitar este contrato, você assume todos e quaisquer riscos associados ao trabalho aqui descrito e de forma alguma a Shubin Interstellar pode ser responsabilizada por quaisquer danos acumulados durante a duração do contrato.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +100 Rep
Shubin_Industrial_GroundVehicle_Pyro_E_DiscoverPlanetary_Title_001=ORDEM DE COMPRA PEQUENA: MINÉRIO MINERADO POR VEÍCULO <EM4>[100 Rep]</EM4>
Shubin_Industrial_GroundVehicle_Pyro_H_Solar_Desc_001=ANÚNCIO: Ordem de Compra\nLOCALIZAÇÃO: <EM4>~mission(System) </EM4>\n\nTERMOS*: \nA Shubin Interstellar está atualmente procurando cumprir outra ordem de compra para uma variedade de materiais. Agradecemos sua ajuda nesta questão.\n\n~mission(Hint_Location) \n\nLembrete, como esta é uma ordem de compra e não um contrato de mineração, espera-se que você forneça seu próprio equipamento, como um <EM4>~mission(Hint_Tool)</EM4>.\n\nQuando estiver pronto para nos vender os materiais solicitados, deposite-os no elevador de carga localizado em <EM4>~mission(Destination|Address)</EM4>.\n\n*Ao aceitar este contrato, você assume todos e quaisquer riscos associados ao trabalho aqui descrito e de forma alguma a Shubin Interstellar pode ser responsabilizada por quaisquer danos acumulados durante a duração do contrato.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Sr. Contractor:</EM4> +200 Rep
