Foxwell_EliminateAll_NonHostiles_desc_001=Fomos contratados para cuidar de uma situação delicada. Uma gangue se instalou na <EM4>~mission(Location|Address)</EM4> que precisamos limpar. O único problema é que ainda há alguns civis lá também.\n\nProcuramos alguém com habilidades e bom senso de gatilho para se livrar desses bandidos sem ferir nenhum inocente. \n\nEstamos procurando alguém com habilidades e bom senso de gatilho para se livrar desses bandidos sem ferir pessoas inocentes. Se for você, pegue seu equipamento e vá até lá. \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança, do seu jeito'\n\nA Foxwell Enforcement é uma empresa especializada em segurança licenciada para operar em todo o UEE. Estamos sempre procurando novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes contratuais.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostiles x13\n<EM4>Friendlies:</EM4> Civilians x4\n<EM4>Security Contractor:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -1,000 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
