hurston_bounty_desc_intro=HURSTON DYNAMICS\nDEPARTAMENTO DE TERCEIRIZAÇÃO\n\nCONTRATO: Coleta de Recompensas\nAFILIAÇÃO DO CONTRATADO: Independente\nGERENTE DE TERCEIRIZAÇÃO: ~mission(Contractor|Auth)\nAVALIAÇÃO DE RISCO: ~mission(Danger)\nCONTRATO URGENTE: ~mission(Contractor|BountyTimed)\n\nDepois de repetidos e contínuos delitos, uma recompensa foi emitida para o seguinte indivíduo - ~mission(TargetName).\n \nPara avaliar seu potencial em ajudar na captura de criminosos mais esquivos, a Hurston Dynamics avaliará sua capacidade de localizar e prender ~mission(TargetName|Last) por qualquer meio à sua disposição. As informações mais recentes sobre o paradeiro atual de ~mission(TargetName|Last) indicam que ele foi visto pela última vez em ~mission(Location|Address).\n\nO pagamento será liberado somente depois que a recompensa coletada. \n \n\n** As informações transmitidas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
hurston_bounty_desc_rehire=HURSTON DYNAMICS\nDEPARTAMENTO DE TERCEIRIZAÇÃO\n\nCONTRATO: Coleta de Recompensas\nAFILIAÇÃO DO CONTRATADO: Independente\nGERENTE DE TERCEIRIZAÇÃO: ~mission(Contractor|Auth)\nAVALIAÇÃO DE RISCO: ~mission(Danger)\nCONTRATO URGENTE: ~mission(Contractor|BountyTimed)\n\nNosso departamento realiza reavaliações periódicas de caçadores de recompensas anteriores e determinou que você pode ser um candidato adequado para uma possível reintegração.\n\nComo demonstração de sua adequação, prenda com sucesso o seguinte indivíduo procurado: \n~mission(TargetName).\n \nAs informações mais recentes sobre o paradeiro atual de ~mission(TargetName|Last) é que ele foi visto pela última vez em ~mission(Location|Address).\n\nA readmissão como caçador de recompensas da Hurston Dynamics e o pagamento seguirão a conclusão bem-sucedida deste contrato.\n \n\n** As informações transmitidas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
hurston_bounty_fps_UGF_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE TERCEIRIZAÇÃO\nCONTRATO: Coleta de Recompensas\nAFILIAÇÃO DO CONTRATADO: Independente\nGERENTE DE TERCEIRIZAÇÃO: I. Takao\nAVALIAÇÃO DE RISCO: Alvo de Risco Desconhecido (Possível Apoio Armado)\nCONTRATO URGENTE: Não\n\nHurston Dynamics está procurando um empreiteiro, que coleta uma recompensa por ~mission(TargetName). \n\nRelatórios da inteligência rastrearam o alvo até ~mission(Location|Address). Este local é conhecido por ser frequentado por criminosos que provavelmente estão armados e hostis. Lide com eles como achar melhor, mas sua principal prioridade é Neutralize ~mission(TargetName|Last).\n\nO pagamento não será liberado até que a recompensa seja considerada concluída.\n\n\n** As informações enviadas podem contenham material confidencial e/ou privilegiado. É proibida qualquer revisão, encaminhamento, distribuição ou outro uso destas informações ou qualquer ação com base nessas informações por qualquer pessoa ou entidade que não seja o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13, Targets x1
hurston_bounty_fps_UGF_nocivs_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE TERCEIRIZAÇÃO\n\nCONTRATO: Coleta de Recompensas\nAFILIAÇÃO DO CONTRATADO: Independente\nGERENTE DE TERCEIRIZAÇÃO: L. Paleski\nAVALIAÇÃO DE RISCO: Alvo de Risco Desconhecido (Possível Apoio Armado)\nCONTRATO URGENTE: Não\n\nA Hurston Dynamics está buscando um contratado para completar uma recompensa por ~mission(TargetName). \n\nOs relatórios da inteligência localizaram o paradeiro atual do alvo em ~mission(Location|Address). Embora você possa interagir com qualquer criminoso no local conforme achar adequado, todos os civis no local devem ser protegidos.\n\nO pagamento será liberado somente depois que a recompensa for considerada concluída.\n \n\n* * As informações transmitidas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
hurston_bounty_fps_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE TERCEIRIZAÇÃO\nCONTRATO: Coleta de Recompensas\nAFILIAÇÃO DO CONTRATADO: Independente\nGERENTE DE TERCEIRIZAÇÃO: ~mission(Contractor|Auth)\nAVALIAÇÃO DE RISCO: Alvo de Risco Desconhecido (Possível Apoio Armado)\nCONTRATO URGENTE: ~mission(Contractor|BountyTimed)\n\nSob a autoridade da Hurston Dynamics, conforme concedido pelo UEE, uma recompensa foi colocada em ~mission(TargetName) em relação a crimes contra a empresa. \n\nAcredita-se que o alvo esteve recentemente em ~mission(Location|Address), possivelmente com vários aliados. A força pode ser necessária para obter acesso ao local e Neutralize ~mission(TargetName|Last). ~mission(Location|CaveSize)\n\nO pagamento não será liberado até que a recompensa seja considerada concluída.\n\n\n** As informações enviadas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, encaminhamento, distribuição ou outro uso destas informações por qualquer pessoa ou entidade que não seja o destinatário pretendido. **\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
