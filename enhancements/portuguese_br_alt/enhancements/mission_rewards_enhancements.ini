LingFamily_LocalDelivery_desc_01=Oi,\n\nEspero que esteja disponível para fazer uma entrega. ~mission(Contractor|Family)\n\nPACOTE PARA RETIRADA\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> em <EM4>~mission(Pickup1|Address)</EM4>\n\nLOCAL DE ENTREGA\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>\n\nMe avise se puder fazer.\n\nPor último, seria uma boa ideia trazer um <EM4>raio trator portátil</EM4> junto.\n\nObrigado,\nConni Ling\nCoordenadora de Remessas\nLing Family Hauling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250
