UDM_LocalDelivery_desc_intro=Saudações, Potencial Parceiro Qualificado de Transporte!\n\nPronto para contribuir com nossa crescente e expandida rede de entregas? Tem uma nave à sua disposição capaz de carregar vários pacotes e voar entre corpos planetários e satélites locais? Unified Distribution Management está procurando um piloto como você!\n\nGostaríamos de avaliar seu potencial de contratação com este itinerário cuidadosamente selecionado -\n\nPACOTE PARA COLETA\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> do <EM4>~mission(Pickup1|Address)</EM4>\n\nLOCAL DE ENTREGA\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>\n\nSe isso soa interessante, aceite esta oferta imediatamente! Apenas lembre-se de trazer seu próprio <EM4>raio trator portátil</EM4> para máxima eficiência. \n\nEsperamos trabalhar com você,\n\nUnified Distribution Management\n -Entregando o Pacote Completo-\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +250
