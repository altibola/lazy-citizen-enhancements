Covalex_courier_fromdc_med_desc_001=Olá, \n\nTenho um pedido de tamanho decente pronto para ser retirado em ~mission(Pickup1) em ~mission(Pickup1|Address). Apenas certifique-se de que você tenha uma nave grande o suficiente para carregar tudo! \n\nPACOTES PARA COLETA \n     - Todos os pacotes na <EM4>~mission(Pickup1)</EM4> em <EM4>~mission(Pickup1|endereço)</EM4>\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n     - Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para a <EM4>~mission(Dropoff1|Address)</EM4>\n     - Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para <EM4>~mission(Dropoff2|Address)</EM4>\n     - Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para <EM4>~mission(Dropoff3|Address)</EM4>\n     - Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> para <EM4>~mission(Dropoff4|Address)</EM4>\n     - Pacote <EM4>#~mission(Item5|SerialNumber)</EM4> para <EM4>~mission(Dropoff5|Address)</EM4>\n     - Pacote <EM4>#~mission(Item6|SerialNumber)</EM4> para <EM4>~mission(Dropoff5|Address)</EM4>\n     - Pacote <EM4>#~mission(Item7|SerialNumber)</EM4> para <EM4>~mission(Dropoff6|Address)</EM4>\n     - Pacote <EM4>#~mission(Item8|SerialNumber)</EM4> para <EM4>~mission(Dropoff6|Address)</EM4>\n     - Pacote <EM4>#~mission(Item9|SerialNumber)</EM4> para <EM4>~mission(Dropoff7|Address)</EM4>\n     - Pacote <EM4>#~mission(Item10|SerialNumber)</EM4> para <EM4>~mission(Dropoff7|Address)</EM4>\n\nTenha um ótimo dia,\n\nChase Hewitt\nCoordenador de Logística Júnior\nCovalex Shipping \n'Tudo o que você precisar, em qualquer lugar que precisar.'\n\n\n\n\n\nA Covalex Shipping é uma empresa de responsabilidade limitada. Ao aceitar este contrato, você está concordando com todos os termos e condições descritos em nosso 'Independent Workers Supplemental Information Guide v.2948.01.29' estendido. A Covalex Shipping não é responsável por quaisquer danos que ocorram enquanto estiver operando como um contratado independente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
