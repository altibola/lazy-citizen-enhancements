missionManager_Charlie_Description=Necessidade imediata de um investigador particular experiente e discreto perto de Crusader para investigar uma questão de seguro..\n\nValor fixo, sem despesas. A data de início será o mais breve possível. Devem ser apresentadas provas suficientes para concluir o contrato.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
mtps_RetrieveConsignment_desc_001=SOBRE O TRABALHO\nA microTech Protection Services precisa de um profissional de segurança para uma operação de recuperação em ~mission(Location). O local está atualmente sob ataque e as forças de segurança no local não respondem, e são consideradas mortas. Acreditamos que materiais confidenciais entregues recentemente nas instalações para retenção temporária foram o alvo da operação. Seu foco principal será coletar essas caixas e entregá-las em um local seguro. \n\nPor razões de segurança, os materiais confidenciais foram entregues como parte de uma remessa maior e protegidos no cofre automatizado. Os materiais possuem códigos de recuperação exclusivos que devem ser inseridos no teclado da esteira de embalagens. Os protocolos exigem que apenas oficiais de segurança seniores possam carregar um datapad contendo um código, mas considerando a situação volátil, não podemos garantir que o Nine Tails  não tenha tomado posse deles. Depois de protegidos, entregue todos os materiais confidenciais à ~mission(dropoff1) para pagamento.\n\nRESPONSABILIDADES\n• Fornecer transporte próprio para ~mission(Location|address).\n• Usar força conforme necessário para coletar os materiais confidenciais. \n• Entregue os materiais confidenciais em ~mission(dropoff1|address).\n\nQUALIFICAÇÕES MÍNIMAS\n• 2 anos de experiência combinada em mercenários e/ou segurança.\n• Acesso a equipamento de combate. \n• Acesso a uma nave espacial que pode transportar carga.\n• Disponível para implantação imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n• Experiência com técnicas rápidas de redução da hostilidade.\n• Experiência no transporte de cargas importantes.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Guards x4, Hostiles x54
mtps_RetrieveConsignment_title_001=DEFENDA A LOCALIZAÇÃO E ENTREGUE OS MATERIAIS CONFIDENCIAIS <EM4>[500–4,000 Rep]</EM4>
mtps_UGF_defend_E_desc_001=SOBRE O TRABALHO\nmicroTech Protection Services está procurando um mercenário detalhista que possa montar uma equipe de segurança para proteger a ~mission(Location|Address) de ameaças menores. \n\nRESPONSABILIDADES\n• Fornecer transporte próprio para ~mission(Location|Address).\n• Fornecer equipe de segurança própria para suporte.\n• Proteger o local de ameaças hostis; se necessário, usando a força.\n\nQUALIFICAÇÕES MÍNIMAS\n• 2 anos de experiência combinada como mercenário e/ou força de segurança.\n• Acesso a equipamento de combate e transporte.\n• Pronto para implantação imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS \n• Experiência em liderança de equipe.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x1, Hostiles x10, Private Security x4, Sentries x6\n<EM4>Unknown:</EM4> 11
mtps_UGF_defend_E_title_001=DEFENDA A LOCALIZAÇÃO CONTRA AMEAÇAS MENORES <EM4>[500 Rep]</EM4>
mtps_UGF_defend_VH_desc_001=SOBRE O TRABALHO\nmicroTech Protection Services está procurando um mercenário detalhista que possa montar uma equipe de segurança para proteger ~mission(Location|Address) de sérias ameaças inimigas. \n\nRESPONSABILIDADES\n• Fornecer transporte próprio para ~mission(Location|Address).\n• Fornecer equipe de segurança própria para suporte.\n• Proteger o local de ameaças hostis; se necessário, usando a força.\n\nQUALIFICAÇÕES MÍNIMAS\n• 2 anos de experiência combinada como mercenário e/ou força de segurança.\n• Acesso a equipamento de combate e transporte.\n• Pronto para implantação imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS \n• Experiência em liderança de equipe.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x3, Hostiles x8, Private Security x4, Sentries x4\n<EM4>Unknown:</EM4> 21
mtps_UGF_defend_VH_title_001=DEFENDA O LOCAL CONTRA AMEAÇAS GRAVES <EM4>[500 Rep]</EM4>
mtps_UGF_defend_desc_001=SSOBRE O TRABALHO\nmicroTech Protection Services está procurando um mercenário detalhista que possa montar uma equipe de segurança para proteger ~mission(Location|Address) de ameaças hostis. \n\nRESPONSABILIDADES\n• Fornecer transporte próprio para ~mission(Location|Address).\n• Fornecer equipe de segurança própria para suporte.\n• Proteger o local de ameaças hostis; se necessário, usando a força.\n\nQUALIFICAÇÕES MÍNIMAS\n• 2 anos de experiência combinada como mercenário e/ou força de segurança.\n• Acesso a equipamento de combate e transporte.\n• Pronto para implantação imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS \n• Experiência em liderança de equipe.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x8, Private Security x4, Sentries x8\n<EM4>Unknown:</EM4> 10
mtps_UGF_defend_title_001=DEFENDA A LOCALIZAÇÃO CONTRA AMEAÇAS MODERADAS <EM4>[500 Rep]</EM4>
mtps_UGF_destroy_E_desc_001=SOBRE O TRABALHO\nA microTech Protection Services está procurando um mercenário ou especialista em segurança detalhista para se reportar à ~mission(Location|Address) e destruir o contrabando armazenado lá. \n\nRESPONSABILIDADES\n• Fornecer transporte próprio para ~mission(Location|Address).\n• Limpar o local de contrabando; usando a força conforme necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n• 2 anos de experiência combinada como mercenário e/ou ou força de segurança.\n• Acesso a equipamentos de combate e meios de transporte.\n• Disponível para implantação imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n• Sem problemas contínuos de dependência.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Civilians x4
mtps_UGF_destroy_E_title_001=Destrua os Contrabandos do Local <EM4>[500 Rep]</EM4>
mtps_UGF_destroy_H_desc_001=SOBRE O TRABALHO: A microTech Protection Services está procurando um mercenário detalhista ou especialista em segurança para se reportar a ~mission(Location|Address) e destruir os narcóticos armazenados lá. \n\nRESPONSABILIDADES\n• Transporte próprio para ~mission(Location|Address).\n• Descarte de drogas no local, usando força se necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n• 2 anos de experiência combinada como mercenário e/ou força de segurança.\n• Acesso a equipamento de combate e transporte.\n• Disponível para implantação imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n• Sem problemas contínuos de dependência.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
mtps_UGF_destroy_H_title_001=DESTRUA OS NARCÓTICOS DO LOCAL <EM4>[500 Rep]</EM4>
mtps_UGF_destroy_desc_001=SOBRE O TRABALHO: A microTech Protection Services está procurando um mercenário detalhista ou especialista em segurança para se reportar a ~mission(Location|Address) e destruir as drogas armazenadas lá. \n\nRESPONSABILIDADES\n• Transporte próprio até a ~mission(Location|Address).\n• Limpeza do local de medicamentos; usando a força, se necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n• 2 anos de experiência combinada em mercenários e/ou segurança.\n• Acesso a equipamento de combate e transporte.\n• Disponível para implantação imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n• Sem problemas contínuos de dependência.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
mtps_UGF_destroy_title_001=Destrua as Drogas do Local <EM4>[500 Rep]</EM4>
mtps_UGF_eliminateall_allies_desc_001=SOBRE O TRABALHO\nmicroTech Protection Services está procurando um Mercenário detalhista que possa ajudar de forma rápida e segura a equipe de segurança estacionada em ~mission(Location|Address) na proteção do local contra ameaças hostis. \n\nEsteja ciente de que qualquer fogo amigo, acidental ou não, não será tolerado. \n\nRESPONSABILIDADES\n• Fornecer transporte próprio até a ~mission(Location|Address).\n• Ajudar a equipe de segurança local a proteger o local; use a força, se necessário.\n• Evite incidentes de fogo amigo.\n\nQUALIFICAÇÕES MÍNIMAS\n• 2 anos de experiência combinada como mercenário e/ou guarda de segurança.\n• Acesso a equipamento de combate e transporte.\n• Pronto para mobilizar imediatamente. \n\nQUALIFICAÇÕES PREFERENCIAIS\n• Experiência com técnicas rápidas de redução da escalada durante hostilidades.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
mtps_UGF_eliminateall_allies_desc_intro=SOBRE O TRABALHO\nmicroTech Protection Services precisa de profissionais de segurança novos, qualificados e orientados a detalhes para expandir nossa lista existente. Para avaliar suas capacidades, gostaríamos que você nos ajudasse a proteger ~mission(Location|Address) de ameaças hostis. \n\nRESPONSABILIDADES\n• Transporte próprio para ~mission(Location|Address).\n• Auxiliar na proteção do local, usando força se necessário.\n• Prevenir incidentes de fogo amigo.\n\nQUALIFICAÇÕES MÍNIMAS\n• 2 anos experiência combinada como mercenário e/ou força de segurança.\n• Acesso a equipamento de combate e transporte.\n• Prontidão operacional imediata.\n\nQUALIFICAÇÕES DESEJADAS\n• Experiência com técnicas para rápida redução das hostilidades.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
mtps_UGF_eliminateall_allies_desc_rehire=SOBRE O TRABALHO\nMesmo que seu desempenho passado não tenha atendido aos nossos padrões, a microTech Protection Services decidiu dar a você uma chance de se redimir. \n\nEm um esforço para reavaliar suas capacidades, a microTech Protection Services deseja que você ajude a proteger a ~mission(Location|Address) contra ameaças hostis. \n\nRESPONSABILIDADES\n• Transporte próprio até ~mission(Location|Address).\n• Auxiliar na proteção do local; usando a força, se necessário.\n• Evitar incidentes de fogo amigo.\n\nQUALIFICAÇÕES MÍNIMAS\n• 2 anos de experiência como mercenário e/ou força de segurança.\n• Acesso a equipamento de combate e transporte.\n• Operacional imediato prontidão. \n\nQUALIFICAÇÕES DESEJADAS\n• Experiência com técnicas para redução rápida das hostilidades.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
mtps_UGF_eliminateall_allies_title_001=Defender Ocupantes <EM4>[500 Rep]</EM4>
mtps_UGF_eliminateall_allies_title_intro=AVALIAÇÃO DO CONTRATADO DE SEGURANÇA <EM4>[500 Rep]</EM4>
mtps_UGF_eliminateall_allies_title_rehire=REAVALIAÇÃO DO CONTRATADO DE SEGURANÇA <EM4>[500 Rep]</EM4>
mtps_UGF_eliminateall_desc_001=SOBRE O TRABALHO\nA microTech Protection Services está procurando um profissional de segurança meticuloso para nos ajudar a remover de forma rápida e segura os ocupantes ilegais que obtiveram temporariamente o controle da ~mission(Location|Address).\n\nResponsabilidades\n• Fornecer seu próprio transporte para ~mission(Location|Address).\n• Remova quaisquer invasores ilegais que residam no local; usar a força, se necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n• 2 anos de experiência combinada em mercenários e/ou segurança.\n• Acesso a equipamento de combate e transporte.\n• Prontidão operacional imediata.\n\nQUALIFICAÇÕES PREFERÁVEIS\n• Experiência com técnicas para diminuir rapidamente a hostilidade.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
mtps_UGF_eliminateall_nocivs_desc_001=SOBRE O TRABALHO\nmicroTech Protection Services está procurando um mercenário detalhista que possa nos ajudar de forma rápida e segura na eliminação completa de ocupantes ilegais que ganharam temporariamente o controle de ~mission(Location|Address). Dado que a sua ligação ao gangue não é clara, devem ser considerados não-combatentes. Qualquer ação hostil contra eles não será tolerada. \n\nRESPONSABILIDADES\n• Fornecer transporte próprio para a ~mission(Location|Address).\n• Remover qualquer pessoal inimigo presente no local; use a força, se necessário.\n• Garantir a segurança de quaisquer civis que possam estar no local. \n\nQUALIFICAÇÕES MÍNIMAS\n• 2 anos de experiência combinada como mercenário e/ou força de segurança.\n• Acesso a equipamento de combate e transporte.\n• Pronto para mobilização imediata.\n\nQUALIFICAÇÕES DESEJADAS\n• Experiência com técnicas para uma rápida redução das hostilidades. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13\n<EM4>Friendlies:</EM4> Civilians x4
mtps_UGF_eliminateall_title_001=Expulse os Residentes Ilegais <EM4>[500 Rep]</EM4>
mtps_bounty_desc_ERT=SOBRE O TRABALHO\nA microTech Protection Services está procurando um caçador de recompensas qualificado para apreender o alvo de risco extremo ~mission(TargetName) de ~mission(Location|Address). \n\nUm alvo de risco extremo normalmente pilota uma embarcação de classe sub-capital, tem vários aliados fortemente armados e espera-se que seja muito difícil de ser apreendido. Pode ser útil trazer uma equipe de suporte para ajudar a engajar esse alvo.\n\nRESPONSABILIDADES\n• Fornecer transporte próprio para ~mission(Location|Address).\n• Neutralizar ~mission(TargetName); usando a força conforme necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n• Associação à Bounty Hunters Guild e certificação apropriada.\n• Acesso a veículo adequadamente equipado para combate.\n• Disponível para implantação imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n• Capacidade de lidar com situações de alta pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
mtps_bounty_desc_HRT=SOBRE O TRABALHO\nA microTech Protection Services está procurando um caçador de recompensas qualificado para apreender o alvo de alto risco ~mission(TargetName) de ~mission(Location|Address). \n\nUm alvo de alto risco normalmente pilota uma grande embarcação com tripulação múltipla, tem vários aliados conhecidos e espera-se que seja difícil de ser apreendido. Pode ser útil trazer uma equipe de suporte para ajudar a engajar esse alvo.\n\nRESPONSABILIDADES\n• Fornecer transporte próprio para ~mission(Location|Address).\n• Neutralizar ~mission(TargetName); usando a força conforme necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n• Associação à Bounty Hunters Guild e certificação apropriada.\n• Acesso a veículo adequadamente equipado para combate.\n• Disponível para implantação imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n• Capacidade de lidar com situações de alta pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
mtps_bounty_desc_LRT=SOBRE O TRABALHO\nA microTech Protection Services está procurando um caçador de recompensas qualificado para apreender o alvo de baixo risco ~mission(TargetName) de ~mission(Location|Address). \n\nUm alvo de baixo risco normalmente pilota uma nave monolugar, tem vários aliados conhecidos e deve ser fácil de capturar.\n\nRESPONSABILIDADES\n• Fornecer transporte próprio para ~mission(Location|Address).\n• Neutralizar ~mission(TargetName); usando a força conforme necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n• Associação à Bounty Hunters Guild e certificação apropriada.\n• Acesso a veículo adequadamente equipado para combate.\n• Disponível para implantação imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n• Capacidade de lidar com situações de alta pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
mtps_bounty_desc_MRT=SOBRE O TRABALHO\nA microTech Protection Services está procurando um caçador de recompensas qualificado para apreender o alvo de risco moderado ~mission(TargetName) de ~mission(Location|Address). \n\nUm alvo de risco moderado normalmente pilota uma pequena embarcação com tripulação múltipla, tem vários aliados conhecidos e pode ser um pouco difícil de ser capturado.\n\nRESPONSABILIDADES\n• Fornecer transporte próprio para ~mission(Location|Address).\n• Neutralizar ~mission(TargetName); usando a força conforme necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n• Associação à Bounty Hunters Guild e certificação apropriada.\n• Acesso a veículo adequadamente equipado para combate.\n• Disponível para implantação imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n• Capacidade de lidar com situações de alta pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
mtps_bounty_desc_VLRT=SOBRE O TRABALHO\nA microTech Protection Services está procurando um caçador de recompensas qualificado para apreender o alvo de risco muito baixo ~mission(TargetName) de ~mission(Location|Address). \n\nUm alvo de risco muito baixo normalmente pilota uma nave monolugar, tem poucos aliados conhecidos e deve ser relativamente fácil de ser apreendido.\n\nRESPONSABILIDADES\n• Fornecer transporte próprio para ~mission(Location|Address).\n• Neutralizar ~mission(TargetName); usando a força conforme necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n• Associação à Bounty Hunters Guild e certificação apropriada.\n• Acesso a veículo adequadamente equipado para combate.\n• Disponível para implantação imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n• Capacidade de lidar com situações de alta pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x1, Targets x1
mtps_bounty_desc_intro=SOBRE O TRABALHO\nA microTech Protection Services precisa de novos caçadores de recompensas qualificados para expandir nossa lista existente. Para avaliar suas habilidades, gostaríamos que você nos ajudasse na apreensão de ~mission(TargetName) de ~mission(Location|Address).\n\n\nRESPONSABILIDADES\n• Fornecer transporte próprio para ~mission(Location|Address) .\n• Neutralizar ~mission(TargetName); usando a força conforme necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n• Associação à Bounty Hunters Guild e certificação apropriada.\n• Acesso a veículo adequadamente equipado para combate.\n• Disponível para implantação imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n• Capacidade de lidar com situações de alta pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
mtps_bounty_desc_rehire=SOBRE O TRABALHO\nEmbora seu desempenho anterior não tenha correspondido aos nossos padrões, a microTech Protection Services decidiu oferecer a você uma chance de se redimir. \n\nPara reavaliar suas habilidades, gostaríamos que você apreendesse ~mission(TargetName) de ~mission(Location|Address).\n\nRESPONSABILIDADES\n• Fornecer transporte próprio para ~mission(Location|Address).\n• Neutralizar ~mission(TargetName); usando a força conforme necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n• Associação à Bounty Hunters Guild e certificação apropriada.\n• Acesso a veículo adequadamente equipado para combate.\n• Disponível para implantação imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n• Capacidade de lidar com situações de alta pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
mtps_bounty_fps_UGF_desc_001=SOBRE O TRABALHO\nA microTech Protection Services está procurando um caçador de recompensas qualificado para apreender ~mission(TargetName) de ~mission(Location|Address). \n\nEmbora haja outros criminosos no local, seu foco principal deve ser completar a recompensa.\n\nRESPONSABILIDADES\n• Fornecer transporte próprio para ~mission(Location|Address).\n• Neutralizar ~mission(TargetName); usando a força conforme necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n• Associação à Bounty Hunters Guild e certificação apropriada.\n• Acesso a equipamento de combate e meio de transporte.\n• Disponível para implantação imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n• Habilidade para lidar com situações de alta pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
mtps_bounty_fps_UGF_nocivs_desc_001=SOBRE O TRABALHO\nA microTech Protection Services está procurando um caçador de recompensas qualificado para auxiliar na apreensão de ~mission(TargetName) de ~mission(Location|Address). Estamos cientes de que pode haver civis no local, portanto, esteja atento a possíveis fogos cruzados.\n\nRESPONSABILIDADES\n• Fornecer transporte próprio para ~mission(Location|Address).\n• Neutralizar ~mission(TargetName); usando a força conforme necessário.\n• Garantir que não haja vítimas civis.\n\nQUALIFICAÇÕES MÍNIMAS\n• Associação à Bounty Hunters Guild e certificação apropriada.\n• Acesso a equipamento de combate e meio de transporte.\n• Disponível para implantação imediata.\ n\nQUALIFICAÇÕES PREFERENCIAIS\n• Capacidade de lidar com situações de alta pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
mtps_bounty_fps_desc_001=SOBRE O TRABALHO\nA microTech Protection Services está procurando um caçador de recompensas qualificado para apreender ~mission(TargetName) de ~mission(Location|Address). \n\nEmbora haja outros criminosos no local, seu foco principal deve ser completar a recompensa.\n\nRESPONSABILIDADES\n• Fornecer transporte próprio para ~mission(Location|Address).\n• Neutralizar ~mission(TargetName); usando a força conforme necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n• Associação à Bounty Hunters Guild e certificação apropriada.\n• Acesso a equipamento de combate e meio de transporte.\n• Disponível para implantação imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n• Habilidade para lidar com situações de alta pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
mtps_bounty_fps_desc_first_001=SOBRE O TRABALHO\nA microTech Protection Services precisa de novos caçadores de recompensas qualificados para expandir nossa lista existente. Para avaliar suas habilidades, gostaríamos que você nos ajudasse na apreensão de ~mission(TargetName) de ~mission(Location|Address).\n\nEmbora haja outros criminosos no local, seu foco principal deve ser completar a recompensa.\n\nRESPONSABILIDADES\n• Fornecer transporte próprio para ~mission(Location|Address).\n• Neutralizar ~mission(TargetName); usando a força conforme necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n• Associação à Bounty Hunters Guild e certificação apropriada.\n• Acesso a equipamento de combate e meio de transporte.\n• Disponível para implantação imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n• Habilidade para lidar com situações de alta pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x4, Reinforcements x9, Targets x1
mtps_bounty_fps_desc_rehire_001=SOBRE O TRABALHO\nEmbora seu desempenho anterior não tenha correspondido aos nossos padrões, a microTech Protection Services decidiu oferecer a você uma chance de se redimir. \n\nPara reavaliar suas habilidades, gostaríamos que você apreendesse ~mission(TargetName) de ~mission(Location|Address).\n\nEmbora haja outros criminosos no local, seu foco principal deve ser completar a recompensa .\n\nRESPONSABILIDADES\n• Fornecer transporte próprio para ~mission(Location|Address).\n• Neutralizar ~mission(TargetName); usando a força conforme necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n• Associação à Bounty Hunters Guild e certificação apropriada.\n• Acesso a equipamento de combate e meio de transporte.\n• Disponível para implantação imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n• Habilidade para lidar com situações de alta pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x4, Reinforcements x9, Targets x1
