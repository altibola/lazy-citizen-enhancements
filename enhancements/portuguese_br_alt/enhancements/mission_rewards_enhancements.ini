Foxwell_X2_AttackIdris_Desc=Temos a localização exata de uma Idris da XenoThreat com suporte de caças em <EM4>~mission(Location|Address)</EM4>. A disciplina de comunicações deles é péssima. De acordo com o falatório no rádio, o Comandante está a bordo da Idris. Não me lembro da última vez que tivemos uma pista tão forte sobre ele. Esta pode ser a chance de decapitar toda a operação. \n\nQuer participar?\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança garantida, licenciada para operar em toda a UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 7/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Defenders x10, Targets x1\n<EM4>Neutral:</EM4> +120,000 Rep
Foxwell_X2_AttackIdris_Title=Alvo: Grupo de Ataque XenoThreat <EM4>[120,000 Rep]</EM4>
Foxwell_X2_DrawOutBoss_Desc=Interceptamos um sinal de localização que coloca <EM>~mission(TargetName)</EM4> e sua ala de ataque pessoal em <EM4>~mission(Location|Address)</EM4>. Eles têm sido alguns dos executores mais brutais da XenoThreat desde a sua fundação. \n\n<EM>~mission(TargetName|Last)</EM4> não é de recuar de uma briga, então atinja as naves deles com força, cause dano suficiente e eles não conseguirão resistir a se juntar à ação. Assim que estiverem em campo aberto, eles serão seu alvo principal.\n\nPronto para ir?\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança garantida, licenciada para operar em toda a UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x32\n<EM4>Neutral:</EM4> +8,400 Rep
Foxwell_X2_DrawOutBoss_Title=Eliminar Executor da XenoThreat <EM4>[8,400 Rep]</EM4>
Foxwell_X2_ShipAmbush_Desc=Recebi informações sólidas sobre a rota de voo de uma ala de ataque da XenoThreat. Procuro contratantes que possam partir agora e se posicionar em <EM4>~mission(Location|Address)</EM4> antes deles. As condições locais irão mascarar as assinaturas do seu scanner para que você possa dar a eles a surpresa de suas vidas. Vamos transformar os caçadores em caça.\n\nInteressado?\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança garantida, licenciada para operar em toda a UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Wave x7, Targets x1\n<EM4>Neutral:</EM4> +4,000 Rep
Foxwell_X2_ShipAmbush_Title=EMBOSCADA À ALA DE ATAQUE XENOTHREAT <EM4>[4,000 Rep]</EM4>
Foxwell_X2_ShipDefend_Desc=Um sinal de socorro veio de <EM4>~mission(Location|Address)</EM4> sobre uma nave sob ataque da XenoThreat. O piloto relata que seus escudos estão falhando e eles não conseguem despistar os atacantes.\n\nA nave é uma <EM4>~mission(Ship)</EM4>, mas o piloto é Humano, o que, de acordo com o modo de pensar distorcido da XenoThreat, o torna um traidor da Humanidade e um alvo para o seu ódio.\n\nEstamos procurando operadores para irem até lá e fazerem o bem.\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança garantida, licenciada para operar em toda a UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +4,000 Rep
Foxwell_X2_ShipDefend_Title=Urgente - Nave sob Ataque da XenoThreat <EM4>[4,000 Rep]</EM4>
Foxwell_X2_ShipWaves_Desc=Múltiplos relatos estão chegando sobre naves da XenoThreat se concentrando em <EM4>~mission(Location|Address)</EM4>\nEstamos procurando contratantes prontos para levar a luta até eles. \n\nEles querem que acreditemos que a razão está do lado deles. Eles querem que acreditemos que possuem uma força esmagadora. Esta é uma chance de mostrar a eles que sabemos a verdade.\n\nNão vou mentir, isso é mais do que apenas um simples contrato de segurança para mim. Eu realmente odeio esses babacas intolerantes e tudo o que eles defendem.\n\nEstá comigo?\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança garantida, licenciada para operar em toda a UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x16\n<EM4>Neutral:</EM4> +3,800 Rep
Foxwell_X2_ShipWaves_Title=INTERDITAR FORÇA DE ATAQUE XENOTHREAT <EM4>[3,800 Rep]</EM4>
Foxwell_bombingrun_E_desc_001=Acabamos de receber a localização de um posto avançado de fora da lei onde alguns criminosos em ascensão têm se reunido. Agora, nosso cliente diz que não há razão para enfrentar essas pessoas diretamente. Em vez disso, você terá como alvo as linhas de suprimentos deles.\n\nVoe até <EM4>~mission(Location|Address)</EM4> e destrua os estoques de combustível deles enquanto lida com qualquer resistência mínima que possam oferecer. Ficará a seu critério o quanto você enfrentará as forças hostis, só não esqueça que seu objetivo principal é garantir que esses tanques de combustível fiquem fora de operação.\n\nEste é um contrato de nível amarelo, então o pagamento será proporcional.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança com garantia licenciada para operar em toda a UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_bombingrun_E_title_001=CONTRATO NÍVEL AMARELO: INTERROMPER OPERAÇÕES <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_bombingrun_H_desc_001=Surgiu uma oportunidade para um cliente agir contra um grupo de criminosos que tem assediado seus negócios.\n\nDe acordo com relatos, esse grupo de fora da lei está atualmente escondido em <EM4>~mission(Location|Address)</EM4>. O cliente acha que este é um bom momento para pegá-los desprevenidos e levá-los à justiça. O trabalho é destruir seus tanques de combustível e pôr fim às suas operações de contrabando de uma vez por todas.\n\nEssas pessoas não devem ser subestimadas. É melhor trazer reforços e voar baixo para evitar as torres. A prioridade, como sempre, são os tanques de combustível.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança com garantia licenciada para operar em toda a UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_bombingrun_H_title_001=CONTRATO NÍVEL LARANJA: DESTRUIR INFRAESTRUTURA FORA DA LEI <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
Foxwell_bombingrun_M_desc_001=Precisamos de um contratado perspicaz para uma operação de ataque e fuga. O cliente diz que alguns bandidos locais têm se congregado em números preocupantes e fomos encarregados de desestruturar sua base de operações.\n\nVá até <EM4>~mission(Location|Address)</EM4> e destrua seus tanques de combustível. Se você tiver sucesso, podemos atrasar os planos dessas pessoas por um tempo e, o mais importante, sem ter que lidar com elas diretamente.\n\nRelatos mostram que há algumas naves circulando pela área e algumas torres de defesa. Apenas foque nos tanques de combustível e você ficará bem.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança com garantia licenciada para operar em toda a UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_bombingrun_M_title_001=CONTRATO NÍVEL LARANJA: ELIMINAR SUPRIMENTOS DE COMBUSTÍVEL <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
Foxwell_bombingrun_S_desc_001=Estamos procurando uma equipe mercenária altamente competente para auxiliar em uma demolição desafiadora para um cliente VIP.\n\nOs fora da lei operando em <EM4>~mission(Location|Address)</EM4> foram identificados como uma ameaça de crescente preocupação na área e, para ajudar a lidar com essa situação, sua equipe está sendo encarregada de destruir os tanques de combustível no local.\n\nNo entanto, não será tão fácil quanto apenas entrar e sair — espere lidar com múltiplos hostis e torres que estarão à sua espera. Quanto mais forte for sua tripulação, melhores serão suas chances de completar esta operação com sucesso.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança com garantia licenciada para operar em toda a UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_bombingrun_S_title_001=CONTRATO NÍVEL VERMELHO: DESTRUIR INFRAESTRUTURA FORA DA LEI <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
Foxwell_bombingrun_VE_desc_001=Um bando de fora da lei tem assediado nosso cliente e recentemente as coisas pioraram. Eles tomaram a propriedade dele e esgotamos todas as outras opções.\n\nPrecisamos de um piloto decente para ir até <EM4>~mission(Location|Address)</EM4> e destruir seus tanques de combustível. Se você puder cortar os suprimentos deles, poderá abrir caminho para o cliente retomar sua propriedade.\n\nEsta não deve ser uma tarefa difícil. Você pode encontrar uma nave ou duas e talvez algumas torres, mas você foi autorizado a usar força letal. Tudo o que precisamos que você faça é entrar lá, destruir os tanques de combustível e sair.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança com garantia licenciada para operar em toda a UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_bombingrun_VE_title_001=CONTRATO NÍVEL AMARELO: LIMITANDO AMEAÇA POTENCIAL <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_bombingrun_VH_desc_001=A Foxwell foi contratada por um cliente para participar de uma operação de vários estágios em uma base de fora da lei conhecida em <EM4>~mission(Location|Address)</EM4> e precisa de um piloto forte para desempenhar seu papel nisso.\n\nVocê, e quaisquer naves de apoio adicionais que organizar, serão encarregados de destruir os tanques de combustível localizados lá para preparar o terreno para o restante da operação a seguir.\n\nInfelizmente, este lugar está fervilhando de naves e torres antiaéreas. Portanto, certifique-se de que você e seu pessoal estejam prontos e lembre-se: os tanques de combustível são sua prioridade. Não há necessidade de ser um herói.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança com garantia licenciada para operar em toda a UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_bombingrun_VH_title_001=CONTRATO NÍVEL VERMELHO: DEMOLIÇÃO DE CONTÊINERES DE COMBUSTÍVEL <EM4>[BP]</EM4> <EM4>[250 Rep]</EM4>
GFS_ShipWaveAttack_Mission01_Desc=Procurando ganhar experiência prática crítica em batalhas contra uma variedade de alvos e situações? Então o meu Desafio de Combate pode ser o ajuste perfeito para você.\n\nPor favor, entenda que este curso é destinado a pilotos que já dominaram o básico do voo e estão prontos para levar suas habilidades para o próximo nível. Se você está começando e quer aprender os fundamentos, recomendaria passar algumas horas em um simpod do Arena Commander. Mas, para aqueles prontos para enfrentar um verdadeiro desafio, eu realmente acredito que os estudantes aprendem melhor praticando. \n\nFoi por isso que projetei esses oito cenários para serem o mais realistas possível. Prometo que isso é o mais próximo do treinamento de pilotos de combate da Marinha que você pode obter sem se alistar, então não espere muito apoio. <EM4>O risco de ferimentos a você ou à sua nave deve ser levado muito a sério.</EM4>\n\nCENÁRIOS DO GAUNTLET:\n1. Alvos Únicos\n2. Múltiplos Alvos\n3. Prioridade de Alvo\n4. Alvo Furtivo\n5. Mísseis e Contramedidas\n6. Alvos Multicrew\n7. Corveta com Escoltas\n8. Encontro com Nave Capital\n\nEntão, se você está pronto para se desafiar e provar que tem o que é preciso para ser um grande piloto, o primeiro cenário se concentrará em lidar com um único alvo. Dirija-se a <EM4>~mission(Location|Address)</EM4> para começar.\n\nComo bônus, a conclusão bem-sucedida do cenário garantirá ao contratado original um prêmio de <EM4>~mission(ScripAmount) Scrip da MG</EM4>.\n\nDICAS DA PROFISSÃO:\n- Consciência Situacional – Não se concentre tanto em atingir um alvo que você não esteja observando sua trajetória de voo. Não adianta destruir o inimigo se você voar direto para um asteroide.\n\nBoa sorte por aí, \nInstrutor Gilly    \n\n\nSOBRE A ESCOLA DE VOO DO GILLY \nO Instrutor Lucas “Gilly” Baramsco serviu em seis esquadrões e tem mais de dez anos de experiência no ensino. Seja um aluno com zero experiência de voo ou um profissional procurando aprimorar suas habilidades, a Escola de Voo Gilly oferece uma variedade de cursos para “Lançar Sua Carreira de Piloto.” \n\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3
GFS_ShipWaveAttack_Mission01_Title=Desafio de Combate - CENÁRIO #1
GFS_ShipWaveAttack_Mission02_Desc=Parabéns por completar a primeira parte deste curso de oito partes.\n\nO cenário dois se concentrará em como lidar com múltiplos alvos ao mesmo tempo. O objetivo aqui é te dar uma melhor noção de como equilibrar ofensiva e defensiva.\n\nSempre que estiver pronto, pegue uma nave de combate e vá até <EM4>~mission(Location|Address)</EM4> para começar.\n\nComo bônus, a conclusão bem-sucedida do cenário dará ao titular do contrato original um prêmio de <EM4>~mission(ScripAmount) Scrip da MG</EM4>.\n\nDICAS DA PROFISSÃO:\n- Escolha Sua Luta - Para situações em que você está enfrentando múltiplos alvos com ameaça igual, sua melhor estratégia é focar em neutralizar um alvo por vez para reduzir gradualmente a quantidade de fogo inimigo.\n\nBoa sorte por aí,\nInstrutor Gilly\n\nSOBRE A ESCOLA DE VOOS DO GILLY\nO Instrutor Lucas “Gilly” Baramsco serviu em seis esquadrões e tem mais de dez anos de experiência no ensino. Seja um aluno sem experiência de voo ou um profissional buscando aprimorar suas habilidades, a Escola de Voos Gilly oferece uma variedade de cursos para “Lançar Sua Carreira de Piloto.”\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3
GFS_ShipWaveAttack_Mission02_Title=Desafio de Combate - CENÁRIO #2
GFS_ShipWaveAttack_Mission03_Desc=Parabéns por completar a segunda parte deste curso de oito partes.\n\nO terceiro cenário introduz considerações táticas na mistura. Desta vez, as naves atacantes são de classes distintas com aplicações distintas no campo de batalha. Saber quais alvos priorizar é vital para sobreviver a confrontos contra múltiplas naves.\n\nSempre que estiver pronto, vá até <EM4>~mission(Location|Address)</EM4> para começar.\n\nComo bônus, a conclusão bem-sucedida do cenário dará ao titular do contrato original um prêmio de <EM4>~mission(ScripAmount) Scrip da MG</EM4>.\n\nDICAS DA PROFISSÃO:\n- Maior Eles São – Tente avaliar qual ameaça é a mais perigosa e elimine-a primeiro.\n- Escudos – Se você estiver levando muito dano, não tenha medo de acelerar e deixar seus escudos se regenerarem.\n\nBoa sorte por aí,\nInstrutor Gilly\n\nSOBRE A ESCOLA DE VOOS DO GILLY\nO Instrutor Lucas “Gilly” Baramsco serviu em seis esquadrões e tem mais de dez anos de experiência no ensino. Seja um aluno sem experiência de voo ou um profissional buscando aprimorar suas habilidades, a Escola de Voos Gilly oferece uma variedade de cursos para “Lançar Sua Carreira de Piloto.”\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4
GFS_ShipWaveAttack_Mission03_Title=Desafio de Combate - CENÁRIO #3
GFS_ShipWaveAttack_Mission04_Desc=Parabéns por completar a terceira parte deste curso de oito partes.\n\nBons pilotos de combate sabem que nem todas as ameaças são aparentes. São as ameaças que você não espera que podem ser as mais devastadoras. O cenário quatro é focado em como identificar e lidar com alvos furtivos. Esperamos que, ao final, você entenda o quão importante seu radar é para determinar com quem você realmente está enfrentando. Espere que naves regulares e furtivas venham atrás de você.\n\nDirija-se a <EM4>~mission(Location|Address)</EM4> sempre que estiver pronto e lembre-se de manter os olhos no seu radar.\n\nComo bônus, a conclusão bem-sucedida do cenário dará ao titular do contrato original um prêmio de <EM4>~mission(ScripAmount) Scrip da MG</EM4>.\n\nDICAS DA PROFISSÃO:\n- Ataques Surpresa - Pingar seus arredores pode, às vezes, revelar naves ocultas. Esteja preparado para contatos aparecerem inesperadamente.\n\nBoa sorte por aí,\nInstrutor Gilly\n\nSOBRE A ESCOLA DE VOOS DO GILLY\nO Instrutor Lucas “Gilly” Baramsco serviu em seis esquadrões e tem mais de dez anos de experiência no ensino. Seja um aluno sem experiência de voo ou um profissional buscando aprimorar suas habilidades, a Escola de Voos Gilly oferece uma variedade de cursos para “Lançar Sua Carreira de Piloto.”\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4
GFS_ShipWaveAttack_Mission04_Title=Desafio de Combate - CENÁRIO #4
GFS_ShipWaveAttack_Mission05_Desc=Parabéns por completar a quarta parte deste curso de oito partes.\n\nO quinto cenário foca em táticas defensivas. Saber quando tomar medidas evasivas e usar contramedidas como iscas ou ruídos é essencial para sua sobrevivência. Por isso, os agressores neste exercício estarão armados com mísseis.\n\nCertifique-se de que suas contramedidas estejam totalmente abastecidas e depois vá até <EM4>~mission(Location|Address)</EM4> para começar.\n\nComo bônus, a conclusão bem-sucedida do cenário dará ao titular do contrato original um prêmio de <EM4>~mission(ScripAmount) Scrip da MG</EM4>.\n\nDICAS DA PROFISSÃO:\n- Pronto para Lançar - Acesso fácil às suas iscas e contramedidas pode ser crítico para o seu sucesso ao lidar com fogo de mísseis inimigos.\n- Enfrente e Lute - Resista à tentação de usar o pós-combustor para escapar, pois você aumentará sua assinatura e tornará mais fácil para o míssil atingir você. Eles provavelmente serão muito mais rápidos do que você de qualquer forma.\n- Feche a Distância - Embora possa parecer contra-intuitivo, se aproximar de uma nave inimiga pode ser uma vantagem. Mísseis têm um alcance mínimo e, se você estiver dentro dele, não poderão travar em você.\n\nBoa sorte por aí,\nInstrutor Gilly\n\nSOBRE A ESCOLA DE VOOS DO GILLY\nO Instrutor Lucas “Gilly” Baramsco serviu em seis esquadrões e tem mais de dez anos de experiência no ensino. Seja um aluno sem experiência de voo ou um profissional buscando aprimorar suas habilidades, a Escola de Voos Gilly oferece uma variedade de cursos para “Lançar Sua Carreira de Piloto.”\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4
GFS_ShipWaveAttack_Mission05_Title=Desafio de Combate - CENÁRIO #5
GFS_ShipWaveAttack_Mission06_Desc=Parabéns por completar a quinta parte deste curso de oito partes.\n\nEstou trazendo as armas pesadas para o cenário seis. É hora de você enfrentar naves maiores, de múltiplos tripulantes, o que traz alguns novos desafios. Não só você terá que lidar com seu poder de fogo aprimorado, mas seus escudos multifacetados significam que você precisará atacar uma face do escudo constantemente para causar dano real. Mais fácil falar do que fazer quando ambos estão se movendo a velocidades tão rápidas.\n\nDirija-se a <EM4>~mission(Location|Address)</EM4> sempre que estiver pronto.\n\nComo bônus, a conclusão bem-sucedida do cenário dará ao titular do contrato original um prêmio de <EM4>~mission(ScripAmount) Scrip da MG</EM4>.\n\nDICAS DA PROFISSÃO:\n- Vantagem de Tamanho – Ao enfrentar uma nave maior, tente ficar longe da parte frontal dela, pois geralmente é onde está localizada a maior parte de seu fogo ofensivo.\n\nBoa sorte por aí,\nInstrutor Gilly\n\nSOBRE A ESCOLA DE VOOS DO GILLY\nO Instrutor Lucas “Gilly” Baramsco serviu em seis esquadrões e tem mais de dez anos de experiência no ensino. Seja um aluno sem experiência de voo ou um profissional buscando aprimorar suas habilidades, a Escola de Voos Gilly oferece uma variedade de cursos para “Lançar Sua Carreira de Piloto.”\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x3
GFS_ShipWaveAttack_Mission06_Title=Desafio de Combate - CENÁRIO #6
GFS_ShipWaveAttack_Mission07_Desc=Parabéns por completar a sexta parte deste curso de oito partes.\n\nVocê adquiriu muita experiência ao longo dos últimos seis cenários, e agora é hora de colocar tudo em prática. O cenário sete coloca você contra uma nave da classe corveta e seus escoltas. Este encontro prolongado irá testar seus limites e colocar tudo o que você aprendeu à prova.\n\nA única coisa que falta é entender o limite das suas habilidades. Para simplificar, você não pode fazer tudo sozinho. Desenvolver e manter relações com outros pilotos que você possa chamar para apoio é realmente a última peça do quebra-cabeça. Não estou dizendo que você não pode superar encontros como este sozinho, mas até a Marinha não envia seus pilotos de elite para uma patrulha sozinhos.\n\nUma vez que você tenha decidido se vai fazer isso sozinho ou chamar apoio, vá até <EM4>~mission(Location|Address)</EM4> para iniciar o encontro.\n\nComo bônus, a conclusão bem-sucedida do cenário dará ao titular do contrato original um prêmio de <EM4>~mission(ScripAmount) Scrip da MG</EM4>.\n\nDICAS DA PROFISSÃO\n- Força na Diversidade – Pense sobre os papéis que seus aliados estarão desempenhando e escolha com cuidado quem trazer para ajudar a equilibrar pontos fortes e fracos. Você vai querer naves capazes de enfrentar a Corveta enquanto outras lidam com o escolta.\n\nBoa sorte por aí,\nInstrutor Gilly\n\nSOBRE A ESCOLA DE VOOS DO GILLY\nO Instrutor Lucas “Gilly” Baramsco serviu em seis esquadrões e tem mais de dez anos de experiência no ensino. Seja um aluno sem experiência de voo ou um profissional buscando aprimorar suas habilidades, a Escola de Voos Gilly oferece uma variedade de cursos para “Lançar Sua Carreira de Piloto.”\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x4
GFS_ShipWaveAttack_Mission07_Title=Desafio de Combate - CENÁRIO #7
GFS_ShipWaveAttack_Mission08_Desc=Bem-vindo ao último cenário do Desafio de Combate.\n\nAo longo deste curso, você teve a oportunidade de experimentar as táticas avançadas de combate e defesa necessárias para sobreviver a uma variedade de encontros. Agora é hora de colocar todas essas novas habilidades e conhecimentos à prova contra uma grande nave capital e algumas naves de escolta.\n\nVocê já sabe o procedimento. Assim que você e todos os seus aliados estiverem prontos, encontre o caminho até <EM4>~mission(Location|Address)</EM4> para ver como você se sai quando realmente for colocado à prova.\n\nComo bônus, a conclusão bem-sucedida do cenário dará ao titular do contrato original um prêmio de <EM4>~mission(ScripAmount) Scrip da MG</EM4>.\n\nDICAS DA PROFISSÃO\n- Paciência é uma Virtude – Se você tiver equilibrado bem sua esquadrão, deverá conseguir sair por cima, apenas não espere que seja uma luta rápida. Naves desse tamanho não caem facilmente.\n\nBoa sorte por aí,\nInstrutor Gilly\n\nSOBRE A ESCOLA DE VOOS DO GILLY\nO Instrutor Lucas “Gilly” Baramsco serviu em seis esquadrões e tem mais de dez anos de experiência no ensino. Seja um aluno sem experiência de voo ou um profissional buscando aprimorar suas habilidades, a Escola de Voos Gilly oferece uma variedade de cursos para “Lançar Sua Carreira de Piloto.”\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 7/7 | Risk 7/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x5
GFS_ShipWaveAttack_Mission08_Title=Desafio de Combate - CENÁRIO #8
GMCapture_Desc=Para testar a preparação das nossas equipas de resposta, gostaríamos que os voluntários simulassem um assalto a uma Idris da CDF neutralizando e assumindo o controlo da nave.\n\nPara ser claro, o objetivo do exercício não é destruir a Idris, mas sim tentar entrar na embarcação e manter o controlo da mesma o máximo de tempo possível. Os voluntários devem esperar encontrar resistência total por parte da tripulação altamente treinada da Idris e são encorajados a obter uma impressão atualizada de antemão.\n\nAs coordenadas serão fornecidas após a confirmação da vossa participação.\n\nObrigado e boa sorte.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
