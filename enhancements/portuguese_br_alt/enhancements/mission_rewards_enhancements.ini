UDM_courier_fromdc_med_desc_001=Saudações, Parceiro de Envio Qualificado!\n\nHoje é o dia perfeito para ganhar mais experiência prática em remessas.\n\nSe você tem uma nave com armazenamento adequado, há uma boa quantidade de pacotes na ~mission(Pickup1) em ~mission(Pickup1|Address) prontos para serem entregues.\n\nFale sobre uma ótima oportunidade de crescimento na carreira.\n\nPACOTES PARA COLETA \n     · Todos os Pacotes em <EM4>~mission(Pickup1)</EM4> em <EM4>~mission(Pickup1|Address)</EM4>\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para o <EM4>~mission(Dropoff1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para o <EM4>~mission(Dropoff2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para o <EM4>~mission(Dropoff3|Address)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> para o <EM4>~mission(Dropoff4|Address)</EM4>\n     · Pacote <EM4>#~mission(Item5|SerialNumber)</EM4> para o <EM4>~mission(Dropoff5|Address)</EM4>\n     · Pacote <EM4>#~mission(Item6|SerialNumber)</EM4> para o <EM4>~mission(Dropoff5|Address)</EM4>\n     · Pacote <EM4>#~mission(Item7|SerialNumber)</EM4> para o <EM4>~mission(Dropoff6|Address)</EM4>\n     · Pacote <EM4>#~mission(Item8|SerialNumber)</EM4> para o <EM4>~mission(Dropoff6|Address)</EM4>\n     · Pacote <EM4>#~mission(Item9|SerialNumber)</EM4> para o <EM4>~mission(Dropoff7|Address)</EM4>\n     · Pacote <EM4>#~mission(Item10|SerialNumber)</EM4> para o <EM4>~mission(Dropoff7|Address)</EM4>\n\nEstamos ansiosos para trabalhar com você,\n\nUnified Distribution Management\n -Entregando o Pacote Completo-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
UDM_courier_fromdc_small_desc_001=Saudações, Parceiro de Envio Qualificado!\n\nSe você está em busca de uma forma simples de ganhar créditos, então não procure mais! Há alguns pacotes esperando para serem entregues em ~mission(Pickup1|Address) em ~mission(Pickup1).\n\nPACOTES PARA COLETA \n     · Todos os Pacotes em <EM4>~mission(Pickup1)</EM4> em <EM4>~mission(Pickup1|Address)</EM4>\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para o <EM4>~mission(Dropoff1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para o <EM4>~mission(Dropoff2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para o <EM4>~mission(Dropoff3|Address)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> para o <EM4>~mission(Dropoff4|Address)</EM4>\n     · Pacote <EM4>#~mission(Item5|SerialNumber)</EM4> para o <EM4>~mission(Dropoff5|Address)</EM4>\n\nEstamos ansiosos para trabalhar com você,\n\nUnified Distribution Management\n -Entregando o Pacote Completo-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
