PU_GhostHollow_Information_Desc=Você já quis fazer com que a grana aparecesse magicamente? Alguns terminais de crédito antigos do CCB estão atualmente ativos e falsificam transacções bancárias para desviar fundos para quem controla os terminais. Se você quiser participar, venderei as coordenadas por uma pequena taxa. Você deve se apressar se quiser um pedaço do bolo. Não sei quanto tempo vai durar.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
