LingFamily_RecoverCargo_Easy_Description=Olá,\n\nProcurando um trabalho rápido? Tenho um cliente que está aguardando uma remessa, mas nosso transportador teve problemas no motor. Parece que não conseguem fazê-lo funcionar, então precisamos de alguém para assumir.\n\nVoe até <EM4>~mission(Location|Address)</EM4> e você verá a nave deles. Não tem erro – é a que está parada no meio do espaço. Certifique-se de trazer um <EM4>raio trator de alta potência</EM4> junto com uma nave decente que possa carregar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>.\n\nAssim que tiver coletado as mercadorias, leve-as para o elevador de carga em <EM4>~mission(Destination|Address)</EM4>.\n\nObrigado,  \nReyes Ling \nCoordenador de Logística de Carga \nLing Family Hauling \n\n\n\n\n\n\n\nA Ling Family Hauling sabe que este é um universo perigoso e imprevisível e estabeleceu vários protocolos para proteger tanto você quanto a carga de nossos clientes. Para garantir que você não seja punido por circunstâncias fora de seu controle, o pagamento total será proporcional à porcentagem de carga entregue com sucesso. Um cronômetro de entrega será definido para cada transporte. Qualquer carga que permanecer não entregue após a expiração será sinalizada como roubada e tratada como tal. Todas as coletas e entregas devem ser carregadas automaticamente ou feitas em um elevador de carga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Rookie:</EM4> +100 Rep
LingFamily_RecoverCargo_Easy_Title=RECUPERAÇÃO DE REMESSA DA LING <EM4>[100 Rep]</EM4>
LingFamily_RecoverCargo_Hard_Description=Olá,\n\nAlgumas notícias tristes. Infelizmente, nosso transportador teve problemas e precisou abandonar a carga que deveria entregar. Não tivemos mais notícias dele, então estamos assumindo o pior.\n\nEstamos em processo de contato com a família dele e temos consciência de que este é um momento muito sensível, mas também não podemos nos dar ao luxo de deixar um trabalho incompleto. Nossos rastreadores mostram que a carga ainda está intacta em <EM4>~mission(Location|Address)</EM4>.\n\nSe você pudesse terminar a entrega, ficaríamos muito gratos. Não estamos detectando nenhuma nave por perto, então deve ser seguro para você coletar. Traga um <EM4>raio trator de alta potência</EM4> e uma nave que possa carregar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>.\n\nEntregue a carga no elevador de carga em <EM4>~mission(Destination|Address)</EM4> e nós cuidaremos do resto.\n\nObrigado,  \nReyes Ling \nCoordenador de Logística de Carga \nLing Family Hauling \n\n\n\n\n\n\n\nA Ling Family Hauling sabe que este é um universo perigoso e imprevisível e estabeleceu vários protocolos para proteger tanto você quanto a carga de nossos clientes. Para garantir que você não seja punido por circunstâncias fora de seu controle, o pagamento total será proporcional à porcentagem de carga entregue com sucesso. Um cronômetro de entrega será definido para cada transporte. Qualquer carga que permanecer não entregue após a expiração será sinalizada como roubada e tratada como tal. Todas as coletas e entregas devem ser carregadas automaticamente ou feitas em um elevador de carga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Member:</EM4> +200 Rep
LingFamily_RecoverCargo_Hard_Title=Concluir Remessa Ling Abandonada <EM4>[200 Rep]</EM4>
LingFamily_RecoverCargo_Medium_Description=Oi,\n\nTenho um trabalho relativamente direto para você, se estiver interessado.\n\nUm de nossos pilotos ignorou um aviso de manutenção e, com certeza, algumas horas depois, a nave quebrou em <EM4>~mission(Location|Address)</EM4>. Eles estão voltando para o escritório agora, mas poderíamos contar com um transportador confiável que tenha uma nave grande o suficiente para transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> para completar o transporte para nós.\n\nAcha que pode nos ajudar? Você só precisa coletar a remessa parada e entregá-la no elevador de carga em <EM4>~mission(Destination|Address)</EM4>. E eu provavelmente não preciso dizer isso, mas um <EM4>raio trator de alta potência</EM4> seria útil de se ter por perto.\n\nObrigado,  \nReyes Ling \nCoordenador de Logística de Carga \nLing Family Hauling \n\n\n\n\n\n\n\nA Ling Family Hauling sabe que este é um universo perigoso e imprevisível e estabeleceu vários protocolos para proteger tanto você quanto a carga de nossos clientes. Para garantir que você não seja punido por circunstâncias fora de seu controle, o pagamento total será proporcional à porcentagem de carga entregue com sucesso. Um cronômetro de entrega será definido para cada transporte. Qualquer carga que permanecer não entregue após a expiração será sinalizada como roubada e tratada como tal. Todas as coletas e entregas devem ser carregadas automaticamente ou feitas em um elevador de carga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Junior:</EM4> +150 Rep
LingFamily_RecoverCargo_Medium_Title=Resgatar Entrega Incompleta da Ling <EM4>[150 Rep]</EM4>
LingFamily_RecoverCargo_Super_Description=Ei,\n\nSorte a nossa que conseguimos um dos maiores contratos da nossa vida e os motores do nosso transportador travaram. Eles tentaram o melhor para consertar, mas parece que simplesmente não está acontecendo.\n\nVocê pode voar até <EM4>~mission(Location|Address)</EM4> e pegar a carga para nós? É muito importante mostrarmos ao nosso cliente que somos tão confiáveis quanto os outros grandes players por aí.\n\nApenas para que saiba, esta é uma remessa grande. Você precisará de uma nave que possa lidar com <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e um <EM4>raio trator de alta potência</EM4> para mover tudo. Depois de transferi-la para sua nave, entregue-a no elevador de carga em <EM4>~mission(Destination|Address)</EM4> e enviaremos a confirmação ao cliente.\n\nConsiderando as circunstâncias, estamos pagando acima das taxas de mercado para quem puder concluir isso.\n\nObrigado,  \nReyes Ling \nCoordenador de Logística de Carga \nLing Family Hauling \n\n\n\n\n\n\n\nA Ling Family Hauling sabe que este é um universo perigoso e imprevisível e estabeleceu vários protocolos para proteger tanto você quanto a carga de nossos clientes. Para garantir que você não seja punido por circunstâncias fora de seu controle, o pagamento total será proporcional à porcentagem de carga entregue com sucesso. Um cronômetro de entrega será definido para cada transporte. Qualquer carga que permanecer não entregue após a expiração será sinalizada como roubada e tratada como tal. Todas as coletas e entregas devem ser carregadas automaticamente ou feitas em um elevador de carga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Unknown:</EM4> 1\n<EM4>Senior:</EM4> +300 Rep
LingFamily_RecoverCargo_Super_Title=Remessa Ling Parada com Entrega Pendente <EM4>[300 Rep]</EM4>
LingFamily_RecoverCargo_VeryEasy_Description=Ei,\n\nA questão é a seguinte: um de nossos transportadores teve problemas em <EM4>~mission(Location|Address)</EM4> e teve que abandonar a nave. Você poderia ir até lá e nos ajudar a terminar a entrega?\n\nNão é um trabalho enorme de forma alguma, mas você ainda precisará de um <EM4>raio trator de alta potência</EM4> e uma nave com espaço suficiente para armazenar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>.\n \nDeixe a carga no elevador de carga em <EM4>~mission(Destination|Address)</EM4> e enviaremos os créditos.\n\nObrigado,  \nReyes Ling \nCoordenador de Logística de Carga \nLing Family Hauling \n\n\n\n\n\n\n\nA Ling Family Hauling sabe que este é um universo perigoso e imprevisível e estabeleceu vários protocolos para proteger tanto você quanto a carga de nossos clientes. Para garantir que você não seja punido por circunstâncias fora de seu controle, o pagamento total será proporcional à porcentagem de carga entregue com sucesso. Um cronômetro de entrega será definido para cada transporte. Qualquer carga que permanecer não entregue após a expiração será sinalizada como roubada e tratada como tal. Todas as coletas e entregas devem ser carregadas automaticamente ou feitas em um elevador de carga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Trainee:</EM4> +50 Rep
LingFamily_RecoverCargo_VeryEasy_Title=Terminar Entrega Interrompida da Ling <EM4>[50 Rep]</EM4>
LingFamily_RecoverCargo_VeryHard_Description=Ei,\n\nPreciso de um contratado confiável para nos ajudar com uma situação.\n\nUm de nossos transportadores abandonou o contrato no meio e agora a carga do nosso cliente está presa em trânsito. Acho que estavam tentando negociar uma taxa melhor conosco, mas não é assim que a Ling faz negócios. De qualquer forma, eles terminaram e precisamos desesperadamente que a remessa seja concluída.\n\nA Petra e eu trabalhamos com este cliente há anos e construímos um bom relacionamento. Seria uma pena jogar tudo fora por causa de um transportador não confiável. Você pode ir até <EM4>~mission(Location|Address)</EM4> e coletar a remessa? Você precisará de um <EM4>raio trator de alta potência</EM4> e uma nave que possa carregar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>.\n\nLeve a remessa para o elevador de carga em <EM4>~mission(Destination|Address)</EM4> e faremos o seu pagamento o mais rápido possível. Agradeceríamos muito sua ajuda com isso e tenho certeza de que nosso cliente também.\n\nObrigado,  \nReyes Ling \nCoordenador de Logística de Carga \nLing Family Hauling \n\n\n\n\n\n\n\nA Ling Family Hauling sabe que este é um universo perigoso e imprevisível e estabeleceu vários protocolos para proteger tanto você quanto a carga de nossos clientes. Para garantir que você não seja punido por circunstâncias fora de seu controle, o pagamento total será proporcional à porcentagem de carga entregue com sucesso. Um cronômetro de entrega será definido para cada transporte. Qualquer carga que permanecer não entregue após a expiração será sinalizada como roubada e tratada como tal. Todas as coletas e entregas devem ser carregadas automaticamente ou feitas em um elevador de carga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Experienced:</EM4> +200 Rep
LingFamily_RecoverCargo_VeryHard_Title=Entrega de Carga Ling Abandonada <EM4>[200 Rep]</EM4>
LingFamily_UGF_collect_desc_001=Olá, \n\nPrecisamos que você colete uma entrega para nós em <EM4>~mission(Location|Address)</EM4> e depois leve-a para <EM4>~mission(Destination|Address)</EM4>.\n\nOriginalmente, eu ia enviar meu irmão Ricki para cuidar disso, mas ele disse que a área é muito perigosa. Acho que houve um monte de avisos de segurança por lá, mas desde que você seja cuidadoso e traga algumas armas ou algo assim, tenho certeza de que ficará bem. Provavelmente você nem vai se deparar com nada. \n\nObrigada, \nConni Ling\nCoordenadora de Remessas\nLing Family Hauling\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Unknown:</EM4> 4
LingFamily_UGF_collect_title_001=Entrega de Pacotes Para Ling <EM4>[500 Rep]</EM4>
