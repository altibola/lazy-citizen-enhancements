Foxwell_DefendLocation_M_Desc_001=Recebemos relatos de clientes sobre ataques de criminosos a naves nas proximidades de <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4>. Eles estão completamente cercados, e qualquer um que tente entrar ou sair vira alvo. Todas as tentativas de resolver a situação só resultaram em mais reforços dos criminosos.\n\nO cliente está desesperado por uma solução, então estamos contratando alguém para restaurar a paz na área. Se surgirem outros problemas depois que você chegar, eu te enviarei instruções sobre como ajudar.  \n\nPrecisamos de alguém nisso com urgência. E para tornar o contrato mais atraente, o contratado principal também receberá um pagamento bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n‘Segurança, do Seu Jeito’\n\nA Foxwell Enforcement é uma especialista em segurança credenciada e licenciada para operar por todo o UEE. Estamos sempre em busca de novos operadores para se juntar à nossa equipe. Se você ou alguém que conhece estiver interessado, entre em contato com um de nossos representantes de contratos.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- [S1-A] Antium Arms Storm\n- [S1-A] Antium Core Storm\n- [S1-A] Antium Helmet Storm\n- [S1-A] Antium Legs Storm\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4, Hostiles x2, Interdiction Ships x1, Reinforcements x14\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
