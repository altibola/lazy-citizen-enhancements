Foxwell_DestroyNarcotics_M_desc_001=Fomos contratados para cuidar de um problema em <EM4>~mission(Location|Address)</EM4>. Houve um recente aumento de atividade na área ligada ao tráfico de drogas. Parece ser uma operação bem administrada e há uma preocupação crescente de que ela se expanda mais se não for interrompida. Há alguma chance de você estar disponível para garantir que isso não aconteça?   \n\nO trabalho é bem simples. Vá até o local e destrua o estoque de drogas deles. Dessa forma, eles não terão credenciais para expandir ainda mais suas operações. No entanto, eu não esperaria que eles facilitassem as coisas para você. Guardas armados são vistos regularmente nas instalações, portanto, certifique-se de ter equipamento suficiente para lidar com eles também. \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma empresa especializada em segurança licenciada para operar em todo o UEE. Estamos sempre procurando novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes contratuais.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4\n<EM4>Security Contractor:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
