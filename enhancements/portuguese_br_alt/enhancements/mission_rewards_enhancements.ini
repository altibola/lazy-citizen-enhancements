TheCollector_Ships_ARGO_Raft_Desc=RAFT muito útil. Wikelo pega e faz muito muito útil. Faz trabalho e faz você feliz. Você quer? Traz itens para Wikelo para troca.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_ARGO_Raft_Title=Pronto para a RAFT? <EM4>[30 Rep]</EM4>
TheCollector_Ships_Anvil_Asgard_Desc=Wikelo modifica Asgard para que ela lute mais. Você em briga, esse mod você quer. Além disso, bom negócio na troca. Só traz itens aqui e eu dou nave pra você.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +250
TheCollector_Ships_Anvil_Asgard_Title=Mod de Luta Asgard <EM4>[250 Rep]</EM4>
TheCollector_Ships_Constellation_Taurus_Desc=Wikelo encontrou planos para construir nave Constellation Taurus. Nave boa, mas Wikelo faz um pouco melhor. Mais bonita também. Se quiser, traga os materiais.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +250
TheCollector_Ships_Constellation_Taurus_TItle=Quer nave Taurus <EM4>[250 Rep]</EM4>
TheCollector_Ships_Crusader_A2_Desc=Traga a Wikelo os itens e eu faço para você o A2 Starlifter que luta melhor. Faz guerra tão bem que você vai chamar de A1! Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +500
TheCollector_Ships_Crusader_A2_Title=STARLIFTER A2 MODIFICAÇÃO DE GUERRA <EM4>[500 Rep]</EM4>
TheCollector_Ships_Drake_Golem_Dec=O universo precisa de recursos, então Wikelo sempre respeita quem cava. Boa profissão. Se você está começando e quer turbinar a nave Golem, eu posso ajudar. \n\nTraga. \n\nEu faço.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_Drake_Golem_Title=GOLEM É INCRÍVEL <EM4>[30 Rep]</EM4>
TheCollector_Ships_F7_MK2_Desc=Sei o quanto vocês Humanos gostam da Marinha, então Wikelo tem uma agora. Se quiser versão Wikelo do F7 mk2, traga coisas e você consegue. Muito engraçado. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_F7_MK2_TItle=F7 da Marinha do Wikelo <EM4>[100 Rep]</EM4>
TheCollector_Ships_F8C_Mil_Desc=Posso fazer uma versão personalizada da F8 que pega boa nave de combate e a deixa ainda melhor. Traga as coisas e eu faço. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +250
TheCollector_Ships_F8C_Milt_TItle=F8 MODIFICAÇÃO DE GUERRA <EM4>[250 Rep]</EM4>
TheCollector_Ships_F8C_Stealth_Desc=Tenho as peças para construir nave útil para quem gosta de se esgueirar e depois lutar. Pego nave F8C e a deixo ainda melhor. Coloquei o que Wikelo vai precisar para construir para você. Agora você decide. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +250
TheCollector_Ships_F8C_Stealth_TItle=Furador Furtivo <EM4>[250 Rep]</EM4>
TheCollector_Ships_Firebird_Desc=Estive fuçando na nave Aegis Sabre. Firebird é bem bombardeira. Boa construção, mas posso fazer algumas mudanças divertidas. Se quiser, posso fazer. Dá uma olhada e me avisa. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_Firebird_TItle=MODIFICAÇÃO DE FIREBIRD <EM4>[100 Rep]</EM4>
TheCollector_Ships_Fortune_Indus_Desc=Olá, praticando para fazer nave voar melhor. Xi'an ajudam humanos a fazer nave. Voa bem. Recolhe bem. Mas Wikelo pode fazer melhor se quiser. Traga coisas e farei. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_Fortune_Indus_TItle=NAVE FORTUNE PARA VOCÊ <EM4>[30 Rep]</EM4>
TheCollector_Ships_GuardianMX_Desc=Vocês Humanos gostam de combinações de letras estranhas. É muito engraçado. Nave Guardian muito útil, mas se você quiser ainda mais útil, me traga coisas. Eu te dou uma nave melhor. Parece melhor. Age melhor.\n\nObrigado. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_GuardianMX_Title=Guardian WiK-X <EM4>[100 Rep]</EM4>
TheCollector_Ships_GuardianQI_Desc=Nave inseto de novo. Essa ajuda a derrubar outras naves, mas se quiser que derrube melhor. Posso fazer. Veja a lista e diga a Wikelo. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_GuardianQI_TItle=Nave destruidora Guardian <EM4>[100 Rep]</EM4>
TheCollector_Ships_Guardian_Desc=Essa nave parece inseto do Protetorado. Visual divertido. Picada dolorida. Wikelo pode fazer versão personalizada para você se quiser. Faça inimigos sentirem a picada. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_Guardian_TItle=MODIFICAÇÃO DE COMBATE GUARDIAN <EM4>[100 Rep]</EM4>
TheCollector_Ships_Idris_Desc=Porque Wikelo fez bons negócios com você, faz essa troca muito especial para você. Idris é nave poderosa perfeita para pessoa grande importante como você. Wikelo até fez modificação para fazer ela mais perigosa! Traz poucos itens e nave é sua.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Ships_Idris_Title=Idris Especial Para Matar
TheCollector_Ships_Intrepid_Desc=Se está procurando uma nave Intrepid que seja mais intrepid. Wikelo pode ajudar. Traga coisas e receberá toques especiais de Wikelo na nave e uma pintura nova bonita. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_Intrepid_TItle=Melhoria Intrepid <EM4>[30 Rep]</EM4>
TheCollector_Ships_Kruger_Wolf_Desc=Se você quer ficar quieto e fazer surpresa nas pessoas, esse Lobo é o que você quer. Wikelo modifica para ficar super furtivo. Troca por ele quando você traz os itens que eu quero.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_Kruger_Wolf_Title=ONDE ESTÁ O LOBO? AQUI ESTÁ O LOBO <EM4>[30 Rep]</EM4>
TheCollector_Ships_MISC_Prospector_Desc=Wikelo ama pedras. Quer ajudar você a pegar mais pedras melhores. Fez essa Prospector mais melhor para esse trabalho difícil. Troca itens e pode ter.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_MISC_Prospector_Title=Perspectivas Parecem Boas <EM4>[30 Rep]</EM4>
TheCollector_Ships_Meteor_Desc=Meteor grande. É pesada. Tem muitas armas. Mas Wikelo descobriu uma maneira de deixá-la ainda melhor. Você tem coisas que eu vou pegar para fazer isso.\n\nÉ só isso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_Meteor_Title=RSI Meteor Mod <EM4>[30 Rep]</EM4>
TheCollector_Ships_Nox_Desc=Wikelo conhece muitos Xi'an. Falam devagar mas são muito interessantes se tiver paciência. Essa é coisinha muito rápida para atravessar planeta. Wikelo fez alguns ajustes para deixá-la mais ágil. Se quiser, Wikelo faz para você. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Ships_Nox_TItle=MODIFICAÇÃO NOXY <EM4>[20 Rep]</EM4>
TheCollector_Ships_Peregrine_Desc=Wikelo não quer correr, mas ainda pode deixar nave rápida mais rápida. Se quiser, traga coisas para mim, e vá mais rápido.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_Peregrine_TItle=MODIFICAÇÃO PEREGRINE WIKELO <EM4>[30 Rep]</EM4>
TheCollector_Ships_Prowler_Util_Desc=Wikelo trabalha duro. Você trabalha duro. Prowler Utility trabalha duro. Mas se você me trouxer os itens certos, eu faço ele trabalhar ainda mais, e então você trabalha menos duro. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +250
TheCollector_Ships_Prowler_Util_Title=PROWLER MAIS UTILITÁRIA <EM4>[250 Rep]</EM4>
TheCollector_Ships_Pulse_Desc=Wikelo gosta muito dessa navezinha Humana. Pulse parece bem rápida. Pode ter muitas configurações para deixá-la mais veloz. Se quiser, posso te dar uma Pulse configurada que gosto. Tenho lista do que quero pelo trabalho. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Ships_Pulse_TItle=Pulse Plus <EM4>[20 Rep]</EM4>
TheCollector_Ships_Scorpius_Desc=Não sei o que o nome quer dizer, mas a nave é muito rápida e muito boa em combate. Com ajuste, pode ficar melhor. Você vê a lista do que Wikelo precisa, vai buscar e eu faço. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_Scorpius_TItle=Construir uma Scorpius Modificada <EM4>[100 Rep]</EM4>
TheCollector_Ships_Spirit_C1_Desc=Wikelo adora nave cargueira útil. Spirit é muito útil. Se quiser uma, posso fazer para você. Só traga o que preciso e eu faço. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_Spirit_C1_TItle=MODIFICAÇÃO DE CARGA DA SPIRIT <EM4>[30 Rep]</EM4>
TheCollector_Ships_Starfighter_Inferno_Desc=Starfighter Inferno é uma boa nave, mas e se você quiser que ela seja ainda melhor em combate? Wikelo sabe exatamente o que fazer. Traga-me os itens e eu farei isso para você. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_Starfighter_Inferno_Title=Starfighter Inferno Especial <EM4>[100 Rep]</EM4>
TheCollector_Ships_Starfighter_Ion_Desc=Starfighter Ion é uma boa nave, mas poderia ser mais furtiva, sim? Surpreenda seus inimigos quando atirar neles. Eu posso ajudar com isso. Preciso dos itens certos e então posso entregar a você. Traga-os para mim. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_Starfighter_Ion_Title=Starfighter Ion Furtivo <EM4>[100 Rep]</EM4>
TheCollector_Ships_Starlancer_ATC_Desc=Se você gosta de muito espaço para mover coisas, Wikelo pode fazer coisas úteis e maravilhosas com nave da MISC pra você. Traga as peças e eu vou te dar uma versão ainda melhor do que os Xi'an conseguem fazer.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +250
TheCollector_Ships_Starlancer_ATC_Title=Nova Nave Starlancer de Mover Coisas Grandes <EM4>[250 Rep]</EM4>
TheCollector_Ships_Starlift_Max_Desc=Se você quiser transportar muitas coisas. Nave Hercules, muito boa para isso. Wikelo até conhece souli lá do Protetorado que começou a usar. Muito grande. Wikelo pode fazer versão parecida se você trouxer o que preciso. Veja a lista e me diga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +250
TheCollector_Ships_Starlift_Max_TItle=Mais que uma Max <EM4>[250 Rep]</EM4>
TheCollector_Ships_Terrapin_Medic_Desc=Wikelo não conhece essa palavra humana, mas essa nave é muito útil quando as coisas ficam perigosas. Se quiser, posso dar uma nova versão dela. Talvez mais útil?\n\nVocê pilota e me conta. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_Terrapin_Medic_Title=O QUE É TERRAPIN? <EM4>[100 Rep]</EM4>
TheCollector_Ships_Ursa_Desc=Wikelo também está entrando em naves. Deu uma olhada na Ursa e melhorou. Traga peças para mim e eu faço para você. Explorar planeta vai ficar melhor. Vai lá.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Ships_Ursa_TItle=FAZER UM MODIFICAÇÃO DA URSA <EM4>[20 Rep]</EM4>
TheCollector_Ships_Wolf_Unique_Desc=Você tem sido bom parceiro de troca para Wikelo. Oferece essa modificação de Lobo muito especial. Faz a troca ainda melhor - Traz o que eu quero e eu dou o Lobo especial E Armadura Antium E uma VOLT LMG. Negócio muito bom para meu cliente muito bom.\n\n<EM3>ITEM REWARDS</EM3>\n- Antium Helmet Midnight Sun\n- Antium Core Midnight Sun\n- Antium Arms Midnight Sun\n- Antium Legs Midnight Sun\n- Fresnel "Deepwater" Energy LMG\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Ships_Wolf_Unique_Title=O Lobo Mais Especial
TheCollector_Ships_ZeusCL_Desc=Wikelo pode fazer nova versão da nave cargueira Zeus. Se quiser, traga o que for necessário, e então você terá a nave. Justo. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_ZeusCL_TItle=Zeus de Carga Especial <EM4>[100 Rep]</EM4>
TheCollector_Ships_ZeusES_Desc=Wikelo pode fazer nova versão da nave Zeus. Eu sei que é uma nave importante para os Humanos. Não sei bem por quê, mas sim, nave muito útil. Enfim, posso melhorar e deixar um pouco mais bonita. O que preciso está listado, se quiser, traga. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_ZeusES_TItle=Zeus Especial <EM4>[30 Rep]</EM4>
