UWC_Refueling_easy_desc_001=Olá,\n\nSe você estiver equipado para reabastecimento, talvez goste desta missão. \n\nUm sinalizador acaba de ser ativado em <EM4>~mission(Location|Address)</EM4>, de um cliente cuja <EM4>~mission(Ship)</EM4> está com o tanque vazio, então certifique-se de que seus tanques de combustível estejam cheios.\n\nA nave do cliente pagará a você à taxa de <EM4>~mission(FuelRate) aUEC por SCU de Hidrogênio</EM4> e <EM4>~mission(QTFuelRate) aUEC por SCU de Quantum</EM4>, e como um contratado do United Wayfarers Club, você também se qualificará para a taxa de serviço do UWC listada acima após a conclusão.\n\nParece ser um trabalho rápido e sem complicações, mas nunca é demais manter seus scanners ativos.\nDeixe-me saber se estiver interessado e vamos colocar essas boas pessoas em seu caminho.\n\nAguardo seu retorno,\n\nDina Deloit\nCentro de Despacho\nUnited Wayfarers Club\n"Estamos com você"\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Bendix\n- Ezra\n- Harkin\n- Lindstrom\n- Marlin\n- Norfield\n- RN-7s\n- Torrez\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Targets x1\n<EM4>Friendlies:</EM4> Recipient x1\n<EM4>Unknown:</EM4> 2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Neutral:</EM4> +200 Rep\n<EM4>Jr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
UWC_Refueling_easy_title_001=SOLICITAÇÃO DE REABASTECIMENTO: ~mission(Ship) <EM4>[BP]</EM4> <EM4>[100–200 Rep]</EM4>
UWC_Refueling_high_desc_001=Oi,\n\nOutro dia, outro sinalizador. Há uma <EM4>~mission(Ship)</EM4> com o tanque vazio em <EM4>~mission(Location|Address)</EM4>. A nave do cliente pagará a você à taxa de <EM4>~mission(FuelRate) aUEC por SCU de Hidrogênio</EM4> e <EM4>~mission(QTFuelRate) aUEC por SCU de Quantum</EM4>, e como um contratado do United Wayfarers Club, você também se qualificará para a taxa de serviço do UWC listada acima após a conclusão.\n\nNão vou mentir: é um lugar horrível para ficar preso e um lugar pior ainda para ser pego de surpresa. Perdemos pessoas boas por lá — até os que tiveram sorte voltaram para casa com partes faltando.\n\nSe decidir aceitar o trabalho, faça-me um favor e mantenha os olhos bem abertos. Se você tiver um parceiro com tempo livre, talvez seja bom pedir um pouco de reforço.\n\nTalvez eu esteja sendo paranoica, mas isso não significa que eles não estejam atrás de você, como a Mamãe Deloit costumava dizer. \nNa verdade, ela nunca disse isso — mas tenho certeza de que diria se vivesse disso.\n\nApenas faça o trabalho e volte para casa em segurança, ok?\n\nDina Deloit\nCentro de Despacho\nUnited Wayfarers Club\n"Estamos com você"\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Bendix\n- Ezra\n- Harkin\n- Lindstrom\n- Marlin\n- Norfield\n- RN-7s\n- Torrez\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 3/7 | Risk 4/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Targets x4\n<EM4>Friendlies:</EM4> Recipient x1\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
UWC_Refueling_high_title_001=SOLICITAÇÃO CRÍTICA DE REABASTECIMENTO: ~mission(Ship) <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
UWC_Refueling_intro_desc_001=Ei!\n\nAqui é a DD do United Wayfarers Club.\n\nO UWC oferece serviços de reparo, rearmamento e reabastecimento em toda a UEE. Por acaso, estamos à procura de novos afiliados cujas naves estejam equipadas para reabastecimento. Se você tem os tanques de combustível e gosta de ver as pessoas felizes em te encontrar, o UWC pode ser o clube para você.\n\nE se você acha que pode ser, tenho um sinalizador ativo que você pode gostar.\n\nSe por acaso você gostar, um conselho de quem sabe: <EM4>certifique-se de que seus tanques de combustível estejam cheios antes de partir</EM4>.\n\nUm membro do Clube ficou sem combustível em <EM4>~mission(Location|Address)</EM4>. Não tenho certeza dos detalhes, como eles acabaram lá sem "Suco de Viagem", mas o UWC não gosta de deixar ninguém na mão.\n\nA nave do cliente pagará a você à taxa de <EM4>~mission(FuelRate) aUEC por SCU de Hidrogênio</EM4> e <EM4>~mission(QTFuelRate) aUEC por SCU de Quantum</EM4>. Como um contratado do United Wayfarers Club, você também se qualificará para a taxa de serviço do UWC listada acima após a conclusão.\n\nÉ um trajeto direto. Perfeito se você quiser sentir como é esse tipo de trabalho. Vá lá, encha os tanques da <EM4>~mission(Ship)</EM4> deles e coloque-os em seu caminho. Faça trajetos assim o suficiente e o processo se tornará memória muscular. Até lá, há uma <EM4>entrada de diário</EM4> no seu mobiGlas chamada ""Protocolos de Reabastecimento"" que cobre o básico.\n\nNão houve relatos de atividade fora da lei naquele setor, mas fique alerta. Eu sempre recomendo que você busque uma rotatividade rápida. Quanto antes terminar, mais cedo poderei arranjar outro contrato para você. O UWC está sempre procurando novos afiliados. \n\nAnsiosa para trabalhar com você.\n\nDina Deloit\nCentro de Despacho\nUnited Wayfarers Club\n"Estamos com você"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Friendlies:</EM4> Recipient x1\n<EM4>Neutral:</EM4> +200 Rep
UWC_Refueling_intro_title_001=UWC ESTÁ CONTRATANDO REABASTECEDORES <EM4>[200 Rep]</EM4>
UWC_Refueling_moderate_desc_001=Ei, você!\n\nTenho um sinalizador em <EM4>~mission(Location|Address)</EM4>. Dizem que seus tanques estão secos e estão pedindo um reabastecimento completo. Se estiver interessado, tenho a sensação de que eles ficarão muito felizes em te ver.\n\nA nave do cliente pagará a você à taxa de <EM4>~mission(FuelRate) aUEC por SCU de Hidrogênio</EM4> e <EM4>~mission(QTFuelRate) aUEC por SCU de Quantum</EM4>, e como um contratado do United Wayfarers Club, você também se qualificará para a taxa de serviço do UWC listada acima após a conclusão.\n\nEles estão presos em uma área com má reputação, embora as coisas tenham estado um pouco mais calmas ultimamente. Ainda assim, vale a pena ficar alerta, eu diria, caso ainda haja problemas espreitando por lá. \n\nDe qualquer forma, quanto antes todos puderem voltar a voar — e isso inclui você — melhor.\n\nBons caminhos,\n\nDina Deloit\nCentro de Despacho\nUnited Wayfarers Club\n"Estamos com você"\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Bendix\n- Ezra\n- Harkin\n- Lindstrom\n- Marlin\n- Norfield\n- RN-7s\n- Torrez\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 3/7 | Risk 4/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Targets x3\n<EM4>Friendlies:</EM4> Recipient x1\n<EM4>Jr. Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
UWC_Refueling_moderate_title_001=SOLICITAÇÃO URGENTE DE REABASTECIMENTO: ~mission(Ship) <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
UWC_Refueling_multiple_med_desc_001=Olá novamente,\n\nTenho um sinalizador em <EM4>~mission(Location|Address)</EM4> e este é dos grandes. Uma pequena frota inteira de naves ficou sem combustível ao mesmo tempo. Coordenação impressionante e falta de planejamento ao mesmo tempo. \n\nA nave do cliente pagará a você à taxa de <EM4>~mission(FuelRate) aUEC por SCU de Hidrogênio</EM4> e <EM4>~mission(QTFuelRate) aUEC por SCU de Quantum</EM4>, e como um contratado do United Wayfarers Club, você também se qualificará para a taxa de serviço do UWC listada acima após a conclusão.\n\nEsperamos que, como a área em que estão é bem segura, não haja muitos problemas espreitando, mas hoje em dia nunca se sabe. Não faria mal colocá-los de volta para voar o mais rápido que você conseguir.\n\nBons caminhos,\n\nDina Deloit\nCentro de Despacho\nUnited Wayfarers Club\n"Estamos com você"\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Bendix\n- Ezra\n- Harkin\n- Lindstrom\n- Marlin\n- Norfield\n- RN-7s\n- Torrez\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Targets x3\n<EM4>Friendlies:</EM4> Recipient x3\n<EM4>Sr. Contractor:</EM4> +50 Rep\n<EM4>Head Contractor:</EM4> +50 Rep\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
UWC_Refueling_multiple_med_title_001=REABASTECIMENTO URGENTE DE FROTA <EM4>[BP]</EM4> <EM4>[50–150 Rep]</EM4>
Vaughn_EliminateSpecific_FPS_Rockcracker_Maintenance_desc_001=Tenho tido dificuldade em rastrear este alvo. Eles fazem parte de uma gangue conhecida como Claw Salamanders, que costuma ser bastante itinerante. No entanto, parece que o grupo tem tentado colocar uma antiga Estação QV Breaker operacional novamente e acho que esta pode ser a chance de eliminar ~mission(TargetName) de uma vez por todas.\n\nComece sua busca em ~mission(Location|Address). Essas estações podem ser bem cavernosas às vezes, então pode ser necessário um pouco de esforço para localizar o alvo quando você estiver no local.\n\nNo entanto, tenho toda a confiança em suas habilidades,\nVaughn\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Juggernauts x1\n<EM4>Jr. Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Vaughn_EliminateSpecific_FPS_Rockcracker_Power_desc_001=Um pedido chegou à minha mesa a respeito do fim prematuro de um tal ~mission(TargetName), um membro dos Claw Salamander que está atualmente rastejando por uma antiga Estação QV Breaker.\n\nÉ muito provável que você os encontre em ~mission(Location|Address). Esteja ciente, porém, de que com uma estação deste tamanho, pode levar um tempo de busca para rastreá-los.\n\nEspero que aproveite seu tempo em Nyx,\nVaughn\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Juggernauts x1\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Vaughn_EliminateSpecific_FPS_Rockcracker_Warehouse_desc_001=Há um membro da gangue de Nyx, os Claw Salamanders, ~mission(TargetName), que entrou para a minha lista de malvados. Eles estiveram foragidos por um bom tempo, mas acabaram de reaparecer em uma antiga estação de mineração no Cinturão Keeger. Nosso dia de sorte será o último deles.\n\nDizem que você pode encontrá-los em ~mission(Location|Address). Infelizmente, há uma grande chance de você ter que fazer alguns reparos na própria estação antes de conseguir acessar aquela área específica.\n\nMas tenho certeza de que você está mais do que pronto para o desafio.\n\nAtenciosamente,\nVaughn\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Juggernauts x1\n<EM4>Neutral:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Vaughn_EliminateSpecific_FPS_Rockcracker_title_001=Uma Pausa Bem Merecida <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
WSTR_TimeTrial_repeat_desc_01=Pronto para estabelecer um novo recorde pessoal com a Wildstar Racing Amateur League? \n\n~mission(RaceDetails)\n\nISENÇÃO DE RESPONSABILIDADE\nA Wildstar Racing exige que o piloto contratado seja o piloto do veículo, não sendo permitidos substitutos ou substitutos. Lembre-se de que a Wildstar Racing utiliza pistas acessíveis ao público e que outras pessoas podem estar presentes. A Wildstar Racing não é responsável por nenhum dano que sua nave possa sofrer durante a corrida.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
