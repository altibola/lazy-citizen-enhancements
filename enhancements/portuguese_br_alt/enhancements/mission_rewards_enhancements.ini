bhg_bounty_desc_ShatteredBlade_001=--------------------------------------------------------\n-------------- CONTRATO DE RECOMPENSA ---------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma caçada oficial.\n\nNOME: ~mission(TargetName)\nSISTEMA: Nyx\nAVALIAÇÃO DE RISCO: Alta\nÚLTIMA LOCALIZAÇÃO CONHECIDA: ~mission(Location|Address)\nAFILIAÇÕES CONHECIDAS: Shattered Blade\nOBSERVAÇÕES: O grupo Shattered Blade é conhecido por atacar os Vanduul para adquirir e vender tecnologia do mercado negro; entretanto, também há relatos de que usam violência contra figuras de autoridade que interferem em seus assuntos.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca da Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Mercenary Guild e autorizado a operar tanto na UEE quanto além, de acordo com os Atos da Autoridade de Xenocomércio.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Defenders x18, Targets x2\n<EM4>Probationary Guild Member:</EM4> +500 Rep (Failure: -250)\n<EM4>Probationary Guild Member:</EM4> +1,000 Rep (Failure: -500)\n<EM4>Probationary Guild Member:</EM4> +2,000 Rep (Failure: -1,000)\n<EM4>Probationary Guild Member:</EM4> +8,000 Rep (Failure: -4,000)\n<EM4>Probationary Guild Member:</EM4> +16,000 Rep (Failure: -8,000)\n<EM4>Blueprint Reward:</EM4> Guaranteed
bhg_bounty_desc_XT_001=--------------------------------------------------------\n----------------- CONTRATO DE RECOMPENSA -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName) \nSISTEMA: ~mission(System)\nAVALIAÇÃO DE RISCO: ~mission(Danger)\nÚLTIMA LOCALIZAÇÃO CONHECIDA:  ~mission(Location|Address)\nAFILIAÇÕES CONHECIDAS: XenoThreat\nOBSERVAÇÕES: A Xenothreat demonstrou agressão não provocada contra qualquer força de segurança. É provável que haja outros membros do grupo presentes, portanto exerça cautela ao engajar.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca da Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Mercenary Guild e autorizado a operar tanto na UEE quanto além, de acordo com os Atos da Xenotrade Authority.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 7/7\n<EM4>Hostiles:</EM4> Defenders x17, Targets x1\n<EM4>Probationary Guild Member:</EM4> +16,000 Rep\n<EM4>Failure Penalty:</EM4> -8,000 Rep
bhg_bounty_desc_gen_001=--------------------------------------------------------\n----------------- CONTRATO DE RECOMPENSA -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName) \nSISTEMA: ~mission(System)\nAVALIAÇÃO DE RISCO: ~mission(Danger)\nÚLTIMA LOCALIZAÇÃO CONHECIDA:  ~mission(Location|Address)\nAFILIAÇÕES CONHECIDAS: <Nenhuma>\nOBSERVAÇÕES: O alvo possui vários associados com antecedentes criminais, portanto pode não estar sozinho. Arme-se e exerça cautela ao engajar.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca da Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Mercenary Guild e autorizado a operar tanto na UEE quanto além, de acordo com os Atos da Xenotrade Authority.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Defenders x17, Targets x2\n<EM4>Probationary Guild Member:</EM4> +500 Rep (Failure: -100)\n<EM4>Probationary Guild Member:</EM4> +500 Rep (Failure: -250)\n<EM4>Probationary Guild Member:</EM4> +1,000 Rep (Failure: -500)\n<EM4>Probationary Guild Member:</EM4> +2,000 Rep (Failure: -1,000)\n<EM4>Probationary Guild Member:</EM4> +8,000 Rep (Failure: -4,000)\n<EM4>Probationary Guild Member:</EM4> +16,000 Rep (Failure: -8,000)
