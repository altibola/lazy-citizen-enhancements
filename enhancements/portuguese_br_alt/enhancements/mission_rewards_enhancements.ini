LingFamily_LocalDelivery_desc_04=Recebemos uma solicitação de entrega que precisa de você.\n~mission(Contractor|Family)\n\nPACOTES PARA RETIRADA (ORDEM INDIFERENTE)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> em <EM4>~mission(Pickup1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> em <EM4>~mission(Pickup2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> em <EM4>~mission(Pickup3|Address)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> em <EM4>~mission(Pickup4|Address)</EM4>\n\nLOCAIS DE ENTREGA (ORDEM INDIFERENTE)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para <EM4>~mission(Dropoff2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para <EM4>~mission(Dropoff3|Address)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> para <EM4>~mission(Dropoff4|Address)</EM4>\n\nPor último, seria uma boa ideia trazer um <EM4>raio trator portátil</EM4> junto.\n\nObrigado,\nConni Ling\nCoordenadora de Remessas\nLing Family Hauling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
LingFamily_LocalDelivery_desc_05=Olá,\n\nSei que normalmente a Conni cuida disso, mas ela está ausente esta tarde. De qualquer forma, temos uma entrega de bom tamanho para você.\n\nPelo que entendi da fatura, a remessa é - \n\nPACOTES PARA RETIRADA (ORDEM INDIFERENTE)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> em <EM4>~mission(Pickup1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> em <EM4>~mission(Pickup2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> em <EM4>~mission(Pickup3|Address)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> em <EM4>~mission(Pickup4|Address)</EM4>\n     · Pacote <EM4>#~mission(Item5|SerialNumber)</EM4> em <EM4>~mission(Pickup5|Address)</EM4>\n\nLOCAIS DE ENTREGA (ORDEM INDIFERENTE)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para <EM4>~mission(Dropoff2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para <EM4>~mission(Dropoff3|Address)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> para <EM4>~mission(Dropoff4|Address)</EM4>\n     · Pacote <EM4>#~mission(Item5|SerialNumber)</EM4> para <EM4>~mission(Dropoff5|Address)</EM4>\n\nBoa sorte aí.\n\n-Davi Ling\nProprietário\nLing Family Hauling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
LingFamily_LocalDelivery_desc_intro=Oi,\n\nSomos uma pequena empresa familiar de entregas atualmente procurando novos contratados na área de Crusader.\n\nSe estiver interessado em trabalhar conosco, a entrega a seguir será um ótimo teste para avaliar se você é um bom candidato para a empresa.\n\nPACOTE PARA RETIRADA\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> em <EM4>~mission(Pickup1|Address)</EM4>\n\nLOCAL DE ENTREGA\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>\n\nSe tudo correr bem, você se tornará o mais novo membro da Ling Family Hauling.\n\nPor último, seria uma boa ideia trazer um <EM4>raio trator portátil</EM4> junto.\n\nObrigado,\nConni Ling\nCoordenadora de Remessas\nLing Family Hauling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +100
LingFamily_LocalDelivery_desc_rehire=Olá,\n\nNão estou muito animado em ter que fazer isso, mas estamos com falta de contratados e mais entregas do que nunca. Estou disposto a lhe dar mais uma chance, mas precisa completar a seguinte entrega.\n\nPACOTES PARA RETIRADA (ORDEM INDIFERENTE)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> em <EM4>~mission(Pickup1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> em <EM4>~mission(Pickup2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> em <EM4>~mission(Pickup3|Address)</EM4>\n\nLOCAIS DE ENTREGA (ORDEM INDIFERENTE)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para <EM4>~mission(Dropoff2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para <EM4>~mission(Dropoff3|Address)</EM4>\n\nPor último, seria uma boa ideia trazer um <EM4>raio trator portátil</EM4> junto.\n\nObrigado,\nConni Ling\nCoordenadora de Remessas\nLing Family Hauling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
