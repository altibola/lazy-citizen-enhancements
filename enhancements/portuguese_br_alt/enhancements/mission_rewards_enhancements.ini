BHG_Certification_Criminal_Desc=--------------------------------------------------------\n----------------- CONTRATO DE RECOMPENSA -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName) \nSISTEMA: Desconhecido\nAVALIAÇÃO DE RISCO: Alta\nÚLTIMA LOCALIZAÇÃO CONHECIDA: Desconhecida\nAFILIAÇÕES CONHECIDAS: <Nenhuma>\nOBSERVAÇÕES: Sob recomendação de um de nossos membros, a Bounty Hunters Guild gostaria de oferecer a você a oportunidade de obter sua Certificação de Captura de Suspeitos.\n\nIsso significaria que você está qualificado para rastrear e capturar suspeitos procurados que se mostraram mais difíceis de capturar do que recompensas típicas. Eles frequentemente possuem habilidades avançadas de pilotagem, comportamento difícil de prever e mais recursos do que um alvo comum, tornando-os um verdadeiro desafio.\n\nPara concluir com sucesso este processo de certificação, você deve capturar o suspeito procurado <EM4>~mission(TargetName)</EM4>.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca da Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Mercenary Guild e autorizado a operar tanto na UEE quanto além, de acordo com os Atos da Autoridade Xenotrade.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50
BHG_Certification_Criminal_Title=CERTIFICADO DE PRISÃO DO SUSPEITO <EM4>[50 Rep]</EM4>
BHG_Certification_Easy_Desc=--------------------------------------------------------\n----------------- CONTRATO DE RECOMPENSA -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName) \nSISTEMA: ~mission(System)\nAVALIAÇÃO DE RISCO: Baixo\nÚLTIMA LOCALIZAÇÃO CONHECIDA: ~mission(Location)\nAFILIAÇÕES CONHECIDAS: <None>\nNOTAS: Com base em uma avaliação de suas habilidades em desenvolvimento, a Bounty Hunters Guild gostaria de oferecer a você a chance de obter sua permissão de Rastreador Iniciante (Tracker Beginner's Permit).\n\nEsta permissão significaria que você está qualificado para rastrear e prender Alvos de Baixo Risco (LRT). Esses criminosos tradicionalmente pilotam naves menores, mas geralmente possuem algumas escoltas, o que os torna mais desafiadores.\n\nPara concluir com sucesso este processo de certificação, você deve prender um criminoso de nível LRT de nome <EM4>~mission(TargetName)</EM4>, visto pela última vez em <EM4>~mission(Location|Address)</EM4>.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca da Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Mercenary Guild e autorizado a operar tanto na UEE quanto além, de acordo com os Atos da Xenotrade Authority.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 3
