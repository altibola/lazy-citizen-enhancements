Covalex_RecoverCargo_Easy_Description=Olá,\n\nTenho um cliente que está me mandando mensagens a manhã toda sobre uma remessa que deveria ter recebido e, quando verifiquei a carga, descobri que ela está completamente parada no meio do espaço.\n\nIsso é obviamente ruim por uma série de razões, e não apenas porque tive que passar 20 minutos sendo xingada. Você pode dar um pulo em <EM4>~mission(Location|Address)</EM4> e ver o que aconteceu? O contrato original exigia uma nave que pudesse carregar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>, então certifique-se de ter isso e um <EM4>raio trator de alta potência</EM4>.\n\nAssim que tiver a carga, pode garantir que ela seja entregue no elevador de carga em <EM4>~mission(Destination|Address)</EM4>? Muitíssimo obrigada.\n\n~mission(Contractor|SignOff)\n\nElla Tieno \nCoordenadora de Logística Jr.\nCovalex Shipping   \n'Tudo o que você precisa, onde quer que precise.' \n\n\n\n\n\n\n\nA Covalex Shipping é uma sociedade de responsabilidade limitada. Para incentivar entregas pontuais e evitar fraudes no transporte de carga, a Covalex Shipping estabelecerá um limite de tempo de entrega e, após o vencimento, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será proporcional à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Rookie:</EM4> +100 Rep
Covalex_RecoverCargo_Easy_Title=PEQUENA REMESSA DA COVALEX PRECISA DE RECUPERAÇÃO <EM4>[100 Rep]</EM4>
Covalex_RecoverCargo_Hard_Description=Oi, é a El.\n\nPreciso de um transportador para um trabalho o mais rápido possível. Um de nossos contratados teve uma "emergência pessoal" e teve que abandonar a nave, e parece que não vai voltar. Nada ideal, sério.\n\nA boa notícia é que a carga ainda está intacta, pelo menos de acordo com o rastreador. Seria uma grande vitória para mim se você pudesse terminar o trabalho pegando a carga em <EM4>~mission(Location|Address)</EM4> e levando-a para o elevador de carga em <EM4>~mission(Destination|Address)</EM4>.\n\nParece que esta era bem grande, você precisará de uma nave que possa transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e um <EM4>raio trator de alta potência</EM4> para mover tudo. Agradeço muito sua ajuda.\n\n~mission(Contractor|SignOff)\n\nElla Tieno \nCoordenadora de Logística Jr.\nCovalex Shipping   \n'Tudo o que você precisa, onde quer que precise.' \n\n\n\n\n\n\n\nA Covalex Shipping é uma sociedade de responsabilidade limitada. Para incentivar entregas pontuais e evitar fraudes no transporte de carga, a Covalex Shipping estabelecerá um limite de tempo de entrega e, após o vencimento, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será proporcional à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Member:</EM4> +200 Rep
Covalex_RecoverCargo_Hard_Title=GRANDE REMESSA DA COVALEX PRECISA DE RECUPERAÇÃO <EM4>[200 Rep]</EM4>
Covalex_RecoverCargo_Medium_Description=Ei, aqui é a El,\n\nTenho um caso estranho para você. Eu estava verificando as estatísticas de entrega da última semana e notei algumas discrepâncias. Parece que temos algumas entregas marcadas como concluídas, mas os rastreadores de carga ainda constam como ativos.\n\nUma delas está localizada em <EM4>~mission(Location|Address)</EM4>, então eu esperava que você pudesse voar até lá e chegar ao fundo disso. O pedido diz que o transportador estava usando uma nave que podia carregar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>, então certifique-se de ter o mesmo. Um <EM4>raio trator de alta potência</EM4> também é indispensável para esta.\n\nEssa carga precisava ter sido entregue ontem, então assim que a tiver, leve-a para um elevador de carga em <EM4>~mission(Destination|Address)</EM4> e eu organizarei o seu pagamento.\n\n~mission(Contractor|SignOff)\n\nElla Tieno \nCoordenadora de Logística Jr.\nCovalex Shipping   \n'Tudo o que você precisa, onde quer que precise.' \n\n\n\n\n\n\n\nA Covalex Shipping é uma sociedade de responsabilidade limitada. Para incentivar entregas pontuais e evitar fraudes no transporte de carga, a Covalex Shipping estabelecerá um limite de tempo de entrega e, após o vencimento, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será proporcional à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Junior:</EM4> +150 Rep
Covalex_RecoverCargo_Medium_Title=REMESSA MÉDIA DA COVALEX PRECISA DE RECUPERAÇÃO <EM4>[150 Rep]</EM4>
Covalex_RecoverCargo_Super_Description=Ei,\n\nSó estou procurando contratados que sejam os melhores dos melhores para esta. Um de nossos clientes mais valiosos está esperando uma remessa incrivelmente importante que agora está seriamente atrasada.\n\nAqui na Covalex, nos orgulhamos de tratar todos os nossos clientes igualmente, oferecendo níveis de serviço excepcionais, independentemente do que estejamos entregando. Dito isto, se perdermos este contrato, alguém vai se dar mal e eu realmente não posso permitir que essa pessoa seja eu.\n\nO rastreador informa que a nave do último contratado está em <EM4>~mission(Location|Address)</EM4>. Não arrisque nada nesta; você precisará de uma nave que comporte <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e um <EM4>raio trator de alta potência</EM4> para coletar tudo.\n\nEntregue a remessa no elevador de carga em <EM4>~mission(Destination|Address)</EM4> e poderemos deixar toda essa bagunça para trás. E você ganhará uma pilha considerável de créditos no processo. Nada mal, certo?\n\n~mission(Contractor|SignOff)\n\nElla Tieno \nCoordenadora de Logística Jr.\nCovalex Shipping   \n'Tudo o que você precisa, onde quer que precise.' \n\n\n\n\n\n\n\nA Covalex Shipping é uma sociedade de responsabilidade limitada. Para incentivar entregas pontuais e evitar fraudes no transporte de carga, a Covalex Shipping estabelecerá um limite de tempo de entrega e, após o vencimento, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será proporcional à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Senior:</EM4> +300 Rep
Covalex_RecoverCargo_Super_Title=Recuperar Remessa VIP da Covalex <EM4>[300 Rep]</EM4>
Covalex_RecoverCargo_VeryEasy_Description=Olá,\n\nEu tinha um contratado que deveria entregar algumas coisas para nós, mas ele desapareceu completamente do radar. Localizei a nave dele e não tenho ideia do que aconteceu, mas eles estão flutuando em algum lugar por <EM4>~mission(Location|Address)</EM4>. Se você pudesse ir até lá, recuperar a carga e levá-la ao elevador de carga em <EM4>~mission(Destination|Address)</EM4>, estaria me fazendo um grande favor.\n\nNão se esqueça de trazer um <EM4>raio trator de alta potência</EM4> para mover toda a carga. Ah, e uma nave que possa transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>.\n\n~mission(Contractor|SignOff)\n\nElla Tieno \nCoordenadora de Logística Jr.\nCovalex Shipping   \n'Tudo o que você precisa, onde quer que precise.' \n\n\n\n\n\n\n\nA Covalex Shipping é uma sociedade de responsabilidade limitada. Para incentivar entregas pontuais e evitar fraudes no transporte de carga, a Covalex Shipping estabelecerá um limite de tempo de entrega e, após o vencimento, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será proporcional à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Rookie:</EM4> +50 Rep\n<EM4>Trainee:</EM4> +50 Rep
Covalex_RecoverCargo_VeryEasy_Title=PEQUENA REMESSA DA COVALEX PRECISA DE RECUPERAÇÃO <EM4>[50 Rep]</EM4>
Covalex_RecoverCargo_VeryHard_Description=Olá,\n\nA situação é a seguinte. Depois de passar uma hora no comunicador falando com o transportador, tentando ajudá-lo a diagnosticar o que há de errado com a nave, foi decidido que agora precisamos de alguém para ir até <EM4>~mission(Location|Address)</EM4> e completar a entrega.\n\nEsta é bem grande. Você precisará de uma nave que possa armazenar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e, a menos que você seja super forte, um <EM4>raio trator de alta potência</EM4> para deslocar tudo.\n\nEu realmente apreciaria se pudéssemos apenas terminar este serviço. Leve a carga para o elevador de carga em <EM4>~mission(Destination|Address)</EM4> e poderemos deixar tudo isso para trás.\n\n~mission(Contractor|SignOff)\n\nElla Tieno \nCoordenadora de Logística Jr.\nCovalex Shipping   \n'Tudo o que você precisa, onde quer que precise.' \n\n\n\n\n\n\n\nA Covalex Shipping é uma sociedade de responsabilidade limitada. Para incentivar entregas pontuais e evitar fraudes no transporte de carga, a Covalex Shipping estabelecerá um limite de tempo de entrega e, após o vencimento, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será proporcional à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Experienced:</EM4> +200 Rep
Covalex_RecoverCargo_VeryHard_Title=REMESSA A GRANEL DA COVALEX PRECISA DE RECUPERAÇÃO <EM4>[200 Rep]</EM4>
Covalex_courier_dc_small_title_001=Rota de Remessa Local da Covalex <EM4>[500–2,000 Rep]</EM4>
Covalex_courier_fromdc_large_desc_001=Olá,\n\nTemos uma remessa de tamanho considerável aguardando em ~mission(Pickup1) em ~mission(Pickup1|Address) que está pronta para ser entregue.\n\nCom esse número de caixas para transportar, provavelmente seria bom ter um par extra de mãos para ajudar a transferir tudo para dentro e para fora de sua nave.\n\nPACOTES PARA COLETA\n - Todos os pacotes  <EM4>~mission(Pickup1)</EM4> em <EM4>~mission(Pickup1|Address)</EM4>\n\nLocais de entrega (QUALQUER ORDEM)\n     - Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>\n     - Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para <EM4>~mission(Dropoff2|Address)</EM4>\n     - Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para <EM4>~mission(Dropoff3|Address)</EM4>\n     - Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> para <EM4>~mission(Dropoff4|Address)</EM4>\n     - Pacote <EM4>#~mission(Item5|SerialNumber)</EM4> para <EM4>~mission(Dropoff5|Address)</EM4>\n     - Pacote <EM4>#~mission(Item6|SerialNumber)</EM4> para <EM4>~mission(Dropoff5|Address)</EM4>\n     - Pacote <EM4>#~mission(Item7|SerialNumber)</EM4> para <EM4>~mission(Dropoff6|Address)</EM4>\n     - Pacote <EM4>#~mission(Item8|SerialNumber)</EM4> para <EM4>~mission(Dropoff6|Address)</EM4>\n     - Pacote <EM4>#~mission(Item9|SerialNumber)</EM4> para <EM4>~mission(Dropoff7|Address)</EM4>\n     - Pacote <EM4>#~mission(Item10|SerialNumber)</EM4> para <EM4>~mission(Dropoff7|Address)</EM4>\n     - Pacote <EM4>#~mission(Item11|SerialNumber)</EM4> para <EM4>~mission(Dropoff8|Address)</EM4>\n     - Pacote <EM4>#~mission(Item12|SerialNumber)</EM4> para <EM4>~mission(Dropoff8|Address)</EM4>\n     - Pacote <EM4>#~mission(Item13|SerialNumber)</EM4> para <EM4>~mission(Dropoff9|Address)</EM4>\n     - Pacote <EM4>#~mission(Item14|SerialNumber)</EM4> para <EM4>~mission(Dropoff9|Address)</EM4>\n     - Pacote <EM4>#~mission(Item15|SerialNumber)</EM4> para <EM4>~mission(Dropoff9|Address)</EM4>\n\nBoa sor