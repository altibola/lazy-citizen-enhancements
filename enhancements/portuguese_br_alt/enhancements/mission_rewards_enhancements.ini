DeadSaints_HaulCargo_AToB_desc_Cryopods_Danger=Tenho uma interessante. Algumas pessoas que foram enganadas com contratos de vida/trabalho com a Hurston Dynamics querem se afastar o máximo possível de Lorville. Eles fecharam um acordo com um transportador de pessoas e foram colocados no gelo. Agora eles só precisam de alguém para buscá-los e lhes dar uma carona. \n\nSe você está disposto a contrabandear "picolés", você encontrará ~mission(total) criopods em <EM4>~mission(Location|Address)</EM4> que precisam ir para <EM4>~mission(Destination|Address)</EM4>. Certifique-se de ter espaço no seu compartimento de carga para contêineres de tamanho <EM4>~mission(MissionMaxSCUSize)</EM4>. Se você usar um <EM4>raio trator portátil</EM4>, você deverá conseguir carregar todos antes que a segurança da Hurston perceba. \n\nA HD não está muito disposta a deixar alguém escapar de seus contratos, então tome cuidado. Eles atiram para matar. \n\nSe você conseguir fazer isso, há um bom pagamento esperando por você.\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x6\n<EM4>Rookie:</EM4> +100 Rep
DeadSaints_HaulCargo_AToB_desc_ToGrimHEX_Danger=Se você está procurando créditos, os Saints precisam de alguém com experiência em transporte para fazer uma corrida de suprimentos de <EM4>~mission(Location|Address)</EM4> para <EM4>~mission(Destination|Address)</EM4>. \n\nVocê vai precisar de uma nave que possa transportar <EM4>contêineres de carga</EM4> de tamanho <EM4>~mission(MissionMaxSCUSize)</EM4> e um <EM4>raio trator portátil</EM4> para mover as caixas. \n\nNão abra as caixas, mas só para você saber, a maior parte deste material é legal, mas nem tudo. Tente não cruzar o caminho de ninguém que possa criar um problema para você. Entendeu?\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x1\n<EM4>Rookie:</EM4> +100 Rep
DeadSaints_HaulCargo_AToB_intro_desc=Me chame de Twitch. Eu administro os Dead Saints. \n\nDuvido que seja a primeira vez que você ouve falar de nós, mas caso não tenha ouvido, fazemos muitas coisas, e uma delas é transportar mercadorias que precisam de manuseio discreto. \n\nConsegui suas informações com um dos meus contatos. Eles dizem que você tem as qualidades que gostamos em um transportador, o que funciona para mim, porque estamos procurando um. \n\nAqui está minha proposta – estamos oferecendo créditos ao piloto que possa transportar uma carga especial para nós. O porão da sua nave precisará de espaço para <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>, e você precisará de um <EM4>raio trator portátil</EM4> (handheld tractor beam) para carregar e descarregar. Tudo que você precisa fazer é levar tudo de <EM4>~mission(Location|Address)</EM4> para <EM4>~mission(Destination|Address)</EM4> sem envolver a segurança.\n \nSe você conseguir realizar o trabalho, os Saints terão mais contratos para você no futuro.\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x38\n<EM4>Trainee:</EM4> +50 Rep\n<EM4>Trainee:</EM4> +100 Rep
DeadSaints_HaulCargo_AToB_intro_title=DEAD SAINTS - Transporte de Carga Experimental <EM4>[50–100 Rep]</EM4>
DeadSaints_HaulCargo_AToB_title=DEAD SAINTS -- Classificação ~mission(ReputationRank), Rota de Carga Escala ~mission(CargoGradeToken) <EM4>[100 Rep]</EM4>
DeadSaints_HaulCargo_MultiToSingle_desc_Drugs_Danger=Um dos nossos melhores distribuidores foi pego em Stanton, então precisamos de um substituto. O cara era um vendedor incrível, mas um contrabandista de merda. Precisamos de alguém que não vá de cara em uma patrulha de segurança ou em um bando de piratas para pegar alguma mercadoria nestes locais:\n\nLOCAIS DE COLETA (QUALQUER ORDEM) \n\n~mission(MultiToSingleToken)\n\nE traga tudo para <EM4>~mission(Destination|Address)</EM4> antes que a segurança perceba o que está acontecendo. Você precisará de espaço suficiente na sua nave para contêineres de tamanho <EM4>~mission(MissionMaxSCUSize)</EM4>, e um <EM4>raio trator portátil</EM4> deve tornar o carregamento e descarregamento fácil e agradável. \n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x6\n<EM4>Rookie:</EM4> +100 Rep
DeadSaints_HaulCargo_MultiToSingle_title=DEAD SAINTS - Classificação ~mission(ReputationRank) - Transporte de Carga ~mission(CargoGradeToken) <EM4>[100 Rep]</EM4>
DeadSaints_HaulCargo_SingleToMulti_desc_Altruciatoxin_Danger_Timed=Estamos procurando alguém discreto para mover um novo lote de Altruciatoxina para vários compradores. Sim, é ilegal, mas só se você for pego. \n\nO carregamento está em <EM4>~mission(Location|Address)</EM4>. Você precisará levá-lo para estes pontos de entrega:\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n\n~mission(SingleToMultiToken)\n\nCertifique-se de que sua nave possa transportar contêineres de tamanho <EM4>~mission(MissionMaxSCUSize)</EM4>, e não se esqueça de levar um <EM4>raio trator portátil</EM4>. Não sei como você planeja mover as caixas, caso contrário.\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x12\n<EM4>Rookie:</EM4> +100 Rep
DeadSaints_HaulCargo_SingleToMulti_desc_Drugs_Danger_Timed=Temos um carregamento de contrabando que precisa ser transportado para alguns lugares diferentes. Se você gosta de créditos, vá para <EM4>~mission(Location|Address)</EM4>, carregue tudo e leve para estes pontos de entrega: \n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n\n~mission(SingleToMultiToken)\n\nVocê vai precisar de um <EM4>raio trator portátil</EM4> para mover as caixas e espaço suficiente no seu porão de carga para contêineres de tamanho <EM4>~mission(MissionMaxSCUSize)</EM4>. \n\nEvite outras naves, se puder. A segurança irá prender você se eles descobrirem o que você está transportando, e os invasores simplesmente o levarão para eles mesmos. \n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x6\n<EM4>Rookie:</EM4> +100 Rep
DeadSaints_HaulCargo_SingleToMulti_desc_Stormwal_Danger_Timed=Se você tem uma nave rápida, consegue transportar contêineres de tamanho <EM4>~mission(MissionMaxSCUSize)</EM4> discretamente e adora receber um pagamento enorme, precisamos que você vá imediatamente para <EM4>~mission(Location|Address)</EM4> e leve o que encontrar lá para estes pontos de entrega:\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM) \n\n~mission(SingleToMultiToken) \n\nOs compradores estão pagando um prêmio para colocar as mãos em carne fresca de stormwal. Fique alerta. Se a segurança pegar você com isso, seu pescoço estará em jogo. Se for esperto, use um <EM4>raio trator portátil</EM4> para carregar tudo rapidamente. \n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x6\n<EM4>Rookie:</EM4> +100 Rep
DeadSaints_HaulCargo_SingleToMulti_title=DEAD SAINTS - Classificação ~mission(ReputationRank) - Transporte de Carga ~mission(CargoGradeToken) <EM4>[100 Rep]</EM4>
DeadSaints_RecoverCargo_Easy_Description=Sabe quando você faz uma pergunta a alguém e tem a sensação de que está mentindo, mas você escolhe dar-lhe o benefício da dúvida? É. É com isso que estou lidando agora.\n\nDois "transportadores especialistas" que contratei para levar algum equipamento para mim tiveram problemas e acabaram abandonando minhas mercadorias em <EM4>~mission(Location|Address)</EM4>. Desnecessário dizer que ordenei um ataque contra eles, mas o que eu preciso de você é que vá recuperar essa carga. O rastreador diz que a carga ainda está na nave, então você só precisará de um <EM4>raio trator de alta capacidade</EM4> (a heavy-duty tractor beam) e sua própria nave para recuperá-la.\n\nVocê pode encontrar alguns necrófagos à espreita por lá, mas duvido que tenha algum problema com eles.\n\nQuando terminar, leve o material para <EM4>~mission(Destination|Address)</EM4> e eu providenciarei uma recompensa para você.\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Unknown:</EM4> 1\n<EM4>Jr. Contractor:</EM4> +100 Rep
DeadSaints_RecoverCargo_Easy_Title=Limpando a Bagunça de Outro <EM4>[100 Rep]</EM4>
DeadSaints_RecoverCargo_Hard_Description=Alguns novatos atingiram minha equipe de transporte no caminho para fazer uma entrega. Nosso rastreador está nos dizendo que nossa nave ainda está localizada em <EM4>~mission(Location|Address)</EM4>, então preciso que você vá até lá e pegue a carga. Você precisará de um <EM4>raio trator de alta capacidade</EM4> (a heavy-duty tractor beam) para arrastar as mercadorias para fora da nave.\n\nEu apostaria que quem nos atacou ainda está lá esperando. Arme-se, traga sua tripulação e, se puder, dê-lhes um tiro em meu nome.\n\nAssim que recuperar nossas mercadorias, entregue-as no elevador de carga localizado em <EM4>~mission(Destination|Address)</EM4>.\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Unknown:</EM4> 1\n<EM4>Sr. Contractor:</EM4> +200 Rep
DeadSaints_RecoverCargo_Hard_Title=Recuperando Nossas Mercadorias <EM4>[200 Rep]</EM4>
DeadSaints_RecoverCargo_Medium_Description=Você tem uma nave e <EM4>um raio trator de alta potência</EM4>? Ótimo. Tenho trabalho para você.\n\nNão sei como souberam que estávamos chegando, mas um dos meus transportadores foi atacado em <EM4>~mission(Location|Address)</EM4>. O piloto parou de responder, então presumo que tenha sido apagado, mas o rastreador de carga está estacionário por enquanto.\n\nEspere que os desgraçados que pegaram meu piloto ainda estejam por lá, então traga reforços. Pegue a carga e caia fora, não preciso arriscar mais nenhum transportador bom nessa bagunça.\n\nLeve os produtos para o elevador de carga em <EM4>~mission(Destination|Address)</EM4> e eu enviarei seu pagamento.\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Unknown:</EM4> 1\n<EM4>Contractor:</EM4> +150 Rep
DeadSaints_RecoverCargo_Medium_Title=Operação de Recuperação <EM4>[150 Rep]</EM4>
DeadSaints_RecoverCargo_Super_Description=Uma tripulação rival conseguiu colocar as mãos em nossas rotas de entrega e agora eles têm uma das minhas naves de carga encurralada em <EM4>~mission(Location|Address)</EM4>.\n\nAgora a nave está lá, sendo guardada por uma tripulação completa desses idiotas. Eles devem estar esperando que alguém apareça com uma nave de transporte, mas você vai chegar primeiro.\n\nVá para lá com sua própria tripulação e um <EM4>raio trator de alta capacidade</EM4> (heavy-duty tractor beam) para levar as mercadorias. Certifique-se de que sejam as melhores pessoas que você tem. Seria um erro subestimar esses bastardos.\n\n"Ghoste-os" (Livre-se deles) e traga minha carga de volta para o elevador de carga em <EM4>~mission(Destination|Address)</EM4> e eu garanto que você será seriamente recompensado por isso.\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Unknown:</EM4> 1\n<EM4>Head Contractor:</EM4> +300 Rep
DeadSaints_RecoverCargo_Super_Title=Perdido, Mas Não Sumido <EM4>[300 Rep]</EM4>
DeadSaints_RecoverCargo_VeryEasy_Description=Um dos meus transportadores encontrou problemas em <EM4>~mission(Location|Address)</EM4> e foi forçado a abandonar a nave. Eu preciso que alguém vá até lá com um <EM4>raio trator de alta capacidade</EM4> (a heavy-duty tractor beam) para pegar a carga e terminar o trabalho.\n\nEles estavam carregando um bom suprimento de equipamento para mim, e a última coisa que preciso é que algum "do-gooder" (pessoa que quer fazer o bem) o encontre e o rastreie até nós.\n\nSe você encontrar alguém, não precisa ser amigável. Apenas atire no idiota e pegue meu equipamento. Entendido?\n\nLeve-o para o elevador de carga em <EM4>~mission(Destination|Address)</EM4> e eu garantirei que você receba uma parte da venda.\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2\n<EM4>Unknown:</EM4> 1\n<EM4>Neutral:</EM4> +50 Rep
DeadSaints_RecoverCargo_VeryEasy_Title=Finalizando o Trabalho <EM4>[50–200 Rep]</EM4>
DeadSaints_RecoverCargo_VeryHard_Description=Temos um problema. Alguma gangue da qual ninguém ouviu falar está tentando fazer nome atacando nossas naves de transporte. Eles acham que podem fazer um grande show de como são durões, invadindo nossos transportadores e agindo como se fossem grandes figurões. Amadores.\n\nO problema é que eles tiveram sorte durante o último ataque. Nosso piloto mal escapou com vida, mas a nave deles ainda está parada, cheia de suprimentos, em <EM4>~mission(Location|Address)</EM4>.\n\nChame uma equipe em quem você confia e seu <EM4>raio trator de alta capacidade</EM4> (heavy-duty tractor beam) e vá para lá imediatamente.\n\nDepois, entregue o equipamento no elevador de carga em <EM4>~mission(Destination|Address)</EM4>. Se você fizer isso por mim, eu lhe darei uma boa parte da venda.\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Unknown:</EM4> 1\n<EM4>Veteran Contractor:</EM4> +200 Rep
DynamicEvent_FleetWeek2022_Description=*LANÇAMENTO IMEDIATO EM TODO O SISTEMA* *Atenção, as forças da Nine Tails assumiram o controle de várias plataformas de negociação perto de Orison. Usando um Inversor de Identidade Amigo ou Inimigo (IIAI), eles assumiram o controle do espaço aéreo restrito ao redor das plataformas, permitindo que apenas naves pertencentes à Nine Tails acessassem a área. Isto prejudicou severamente as tentativas iniciais de Security de retomar as plataformas. Por esta razão, a Crusader pediu às forças da CDF que ajudassem a desligar o inversor e a eliminar toda a presença inimiga. Solicita-se que todos os voluntários disponíveis da CDF forneçam assistência.\n\nInformações adicionais:\n* Enquanto o inversor está ativo e o espaço aéreo está inacessível, a CDF conseguiu obter o controle de um sistema de transporte local e direcioná-lo para chegar ao Solanki plataforma sem o conhecimento da Nine Tails. Os voluntários devem ir ao showroom de Industries na plataforma de negociação e subir ao telhado para encontrar o transporte que viaja para as plataformas ocupadas.\n* Acredita-se que o IIAI esteja em um contêiner de armazenamento trancado em uma barcaça acoplada no Centro Administrativo Central.\n* Os códigos de acesso do contêiner IIAI estão em posse do líder das forças Nine Tails, Mendo Ren. \n* A experiência anterior com Mendo Ren sugere que é improvável que ele se revele e arrisque ser capturado. No entanto, se todos os seus tenentes forem neutralizados, acreditamos que ele não terá escolha a não ser assumir pessoalmente o comando das tropas e nos permitir obter os códigos dele.\n* Além do sistema de transporte, a Crusader Security nos informou que há existem vários veículos nas plataformas que as CDF podem comandar. Esses veículos serão a única forma de chegar ao centro administrativo. NOTA - Se todos os veículos dentro do espaço aéreo restrito forem destruídos antes que o inversor possa ser desligado, não haverá como chegar à barcaça e a CDF será forçado a recuar.\n* As plataformas serão controladas pela Nine Tails Anti - Armas aéreas protegidas.\n\nObserve que Rowena Dulli da SAIC, da Advocacy, é a adida oficial da CDF e liderará a operação.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Unknown:</EM4> 54
EckhartSecurity_Defend_E_Desc_001=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHOS\n\nTIPO DE CONTRATO: Defender Local\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nUm cliente interceptou comunicações entre membros de gangues e descobriu que eles estão planejando um ataque a <EM4>~mission(Location|Address)</EM4>. Agora eles precisam de nossa ajuda para garantir que o ataque não seja bem-sucedido.   \n\nProcuramos um contratado que possa defender o local dessa ofensiva. Não tenho informações específicas sobre os fora da lei, mas duvido que eles sejam tão habilidosos se nosso cliente quebrou suas comunicações tão facilmente. \n\nO pagamento será emitido após a conclusão bem-sucedida do contrato.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou da entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Boss x1, Hostiles x10, Private Security x4, Sentries x6\n<EM4>Unknown:</EM4> 11\n<EM4>Security Trainee:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -1,000 Rep
EckhartSecurity_Defend_E_Title_001=Proteger Local <EM4>[500 Rep]</EM4>
EckhartSecurity_Defend_H_Desc_001=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHOS\n\nTIPO DE CONTRATO: Defender Local\nÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nHá um problema sério se formando para um de nossos clientes em <EM4>~mission(Location|Address)</EM4>. Eles foram avisados de que uma equipe de fora da lei altamente qualificada está de olho em invadir e ocupar esse local. Fomos contratados para garantir que isso não aconteça. \n\nPreciso de um contratado para ir ao local imediatamente. Com base nas informações fornecidas pelo cliente, não será uma tarefa fácil. Recomendamos enfaticamente que você traga aliados e muitos suprimentos para ajudar a evitar o ataque iminente.   \n\nO pagamento será emitido após a conclusão bem-sucedida do contrato.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou da entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 3/7 | Risk 6/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Boss x3, Hostiles x8, Private Security x4, Sentries x4\n<EM4>Unknown:</EM4> 21\n<EM4>Lead Security Contractor:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -4,000 Rep
EckhartSecurity_Defend_H_Title_001=Repelir Invasores <EM4>[500 Rep]</EM4>
EckhartSecurity_Defend_M_Desc_001=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHOS\n\nTIPO DE CONTRATO: Defender Local\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nRecebemos a notícia de que os bandidos estão de olho no ataque à <EM4>~mission(Location|Address)</EM4>. Nosso cliente está preocupado com o fato de o ataque ser iminente e solicitou que a segurança fosse enviada para o local imediatamente. Se você estiver interessado e disponível, reúna todos os suprimentos e o apoio de que precisa e vá para o local imediatamente.  \n\nO pagamento será emitido após a conclusão bem-sucedida do contrato.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou da entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x12, Private Security x4, Sentries x8\n<EM4>Unknown:</EM4> 10\n<EM4>Security Contractor:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -2,000 Rep
