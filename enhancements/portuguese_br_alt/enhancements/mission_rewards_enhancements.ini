mg_miles_capturegang_complete_desc=\nTodos os membros seniores da gangue de Arlington estão agora atrás das grades e sua gangue criminosa está incapacitada. \n\nEssa foi uma prisão bastante impressionante. Bom trabalho.\n\n-Miles\n\nMiles Eckhart\nFundador e CEO\nEckhart Security, LLC.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
mg_miles_capturegang_desc_001=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHOS\n\nTIPO DE CONTRATO: Mandado de grupo\nSTATUS DO CONTRATADO: Independente\nCódigo de aprovação: = ~mission(Contractor|ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\n*********\n__Informação Básica__\nUm mandado de grupo foi emitido para a notória gangue de ladrões de naves de Arlington após a recente tentativa descarada de roubo de uma Idris de um estaleiro de reparos. Embora o roubo tenha sido impedido, os membros do grupo se dispersaram. A Eckhart Security recebeu a recompensa pela captura imediata de todos os membros de alto nível da gangue: Maltrox Arlington, Kass Dent, Nicks Cantwell, Sam 'Weepy' Arlington, Oslo Arlington e Les Arlington.\n*********\n\nUm informante anônimo nos avisou que Les Arlington, filho do líder da gangue Maltrox Arlington, foi visto fazendo uma entrega em um centro de transferência da Covalex. Forneceremos a você as coordenadas de onde acreditamos que eles estejam atualmente.\n\nLes é um piloto experiente que voa há quase tanto tempo quanto anda e geralmente serve como piloto de fuga da gangue. Pode valer a pena trazer naves de apoio extras para impedir qualquer tentativa de fuga.\n\nVocê está autorizado a usar qualquer força necessária para neutralizar o alvo. \n\nO pagamento será emitido após a conclusão bem-sucedida do contrato.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou da entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
mg_miles_capturegang_desc_002=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHOS\n\nTIPO DE CONTRATO: Mandado de grupo\nSTATUS DO CONTRATADO: Independente\nCódigo de aprovação: = ~mission(Contractor|ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\n*********\n__Informação Básica__\nUm mandado de grupo foi emitido para a notória gangue de ladrões de naves de Arlington após a recente tentativa descarada de roubo de uma Idris de um estaleiro de reparos. Embora o roubo tenha sido impedido, os membros do grupo se dispersaram. A Eckhart Security recebeu a recompensa pela captura imediata de todos os membros de alto nível da gangue: Maltrox Arlington, Kass Dent, Nicks Cantwell, Sam 'Weepy' Arlington, Oslo Arlington e Les Arlington.\n*********\n\nRecebemos a informação de que Nicks Cantwell, conhecido de longa data e confidente de Maltrox Arlington, foi visto tentando comprar um laser de mineração de alta densidade, do tipo frequentemente usado em tentativas anteriores de roubo de naves para romper estrategicamente os cascos. Fornecemos as coordenadas da última localização conhecida de Nicks.  \n\nNicks é um especialista em munições altamente reconhecido nos círculos criminosos e frequentemente deixa um rastro de destruição. É aconselhável trazer um nível maior de poder de fogo para esse encontro.\n\nVocê está autorizado a usar qualquer força necessária para neutralizar o alvo. \n\nO pagamento será emitido após a conclusão bem-sucedida do contrato.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou da entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1
mg_miles_capturegang_desc_003=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHOS\n\nTIPO DE CONTRATO: Mandado de grupo\nSTATUS DO CONTRATADO: Independente\nCódigo de aprovação: = ~mission(Contractor|ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\n*********\n__Informação Básica__\nUm mandado de grupo foi emitido para a notória gangue de ladrões de naves de Arlington após a recente tentativa descarada de roubo de uma Idris de um estaleiro de reparos. Embora o roubo tenha sido impedido, os membros do grupo se dispersaram. A Eckhart Security recebeu a recompensa pela captura imediata de todos os membros de alto nível da gangue: Maltrox Arlington, Kass Dent, Nicks Cantwell, Sam 'Weepy' Arlington, Oslo Arlington e Les Arlington.\n*********\n\nSam 'Weepy' Arlington foi flagrado por sistemas de segurança automatizados em um R&R após se envolver em uma briga de bêbados. Weepy conseguiu sair da estação antes da chegada das equipes de resposta, mas conseguimos rastreá-lo até o local onde achamos que ele está escondido.\n\nWeepy é tio e principal executor do líder de gangue Maltrox Arlington. Seus problemas de raiva combinados com um longo histórico de abuso de substâncias fazem dele um verdadeiro curinga. Espere que ele ofereça resistência significativa quando for encurralado por você e suas forças reunidas.\n\nVocê está autorizado a usar qualquer força necessária para neutralizar o alvo. \n\nO pagamento será emitido após a conclusão bem-sucedida do contrato.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou da entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x2, Targets x1
mg_miles_capturegang_desc_004=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHOS\n\nTIPO DE CONTRATO: Mandado de grupo\nSTATUS DO CONTRATADO: Independente\nCódigo de aprovação: = ~mission(Contractor|ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\n*********\n__Informação Básica__\nUm mandado de grupo foi emitido para a notória gangue de ladrões de naves de Arlington após a recente tentativa descarada de roubo de uma Idris de um estaleiro de reparos. Embora o roubo tenha sido impedido, os membros do grupo se dispersaram. A Eckhart Security recebeu a recompensa pela captura imediata de todos os membros de alto nível da gangue: Maltrox Arlington, Kass Dent, Nicks Cantwell, Sam 'Weepy' Arlington, Oslo Arlington e Les Arlington.\n*********\n\nRecentemente, um terminal de segurança foi acessado ilegalmente usando uma criptochave personalizada exclusiva que havia sido utilizada em um assalto no ano passado por um tal de Oslo Arlington, o irmão mais novo do líder da gangue Maltrox Arlington. Embora não possamos confirmar positivamente se o terminal foi hackeado por Oslo ou não, achamos que vale a pena investigar.\n\nExtremamente inteligente, conhecedor de tecnologia e um estrategista renomado, Oslo provou ser difícil de capturar no passado. Se essa pista resultar em encontrar Oslo, uma equipe de ataque tático bem coordenada seria vantajosa para um envolvimento bem-sucedido. \n\nVocê está autorizado a usar qualquer força necessária para neutralizar o alvo. \n\nO pagamento será emitido após a conclusão bem-sucedida do contrato.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou da entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
mg_miles_capturegang_desc_005=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHOS\n\nTIPO DE CONTRATO: Mandado de grupo\nSTATUS DO CONTRATADO: Independente\nCódigo de aprovação: = ~mission(Contractor|ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\n*********\n__Informação Básica__\nUm mandado de grupo foi emitido para a notória gangue de ladrões de naves de Arlington após a recente tentativa descarada de roubo de uma Idris de um estaleiro de reparos. Embora o roubo tenha sido impedido, os membros do grupo se dispersaram. A Eckhart Security recebeu a recompensa pela captura imediata de todos os membros de alto nível da gangue: Maltrox Arlington, Kass Dent, Nicks Cantwell, Sam 'Weepy' Arlington, Oslo Arlington e Les Arlington.\n*********\n\nDois guardas de banco foram dados como desaparecidos na semana passada. Algumas horas atrás, seus corpos apareceram em uma pilha de lixo em Magnus com seus dados biométricos roubados. Felizmente, um carrinho de bolinhos nas proximidades tinha uma câmera de segurança que capturou os cadáveres sendo jogados. O reconhecimento facial foi capaz de identificar Kass Dent, parceiro romântico de Maltrox Arlington e pai de Les Arlington. Usando o vídeo para construir uma linha do tempo, fornecemos as coordenadas de onde se acredita que Kass esteja se escondendo no momento. \n\nKass é suspeito de uma longa lista de assassinatos, sendo que esses dois são apenas os mais recentes. Recomendamos que você traga apenas um ala altamente qualificado para tentar manter o número de baixas em um mínimo.  \n\nVocê está autorizado a usar qualquer força necessária para neutralizar o alvo. \n\nO pagamento será emitido após a conclusão bem-sucedida do contrato.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou da entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1
mg_miles_capturegang_desc_006=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHOS\n\nTIPO DE CONTRATO: Mandado de grupo\nSTATUS DO CONTRATADO: Independente\nCódigo de aprovação: = ~mission(Contractor|ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\n*********\n__Informação Básica__\nUm mandado de grupo foi emitido para a notória gangue de ladrões de naves de Arlington após a recente tentativa descarada de roubo de uma Idris de um estaleiro de reparos. Embora o roubo tenha sido impedido, os membros do grupo se dispersaram. A Eckhart Security recebeu a recompensa pela captura imediata de todos os membros de alto nível da gangue: Maltrox Arlington, Kass Dent, Nicks Cantwell, Sam 'Weepy' Arlington, Oslo Arlington e Les Arlington.\n*********\n\nMaltrox Arlington tem se mantido discreta recentemente, mas achamos que ela saiu do esconderijo. Uma patrulha estava reabastecendo em uma estação quando uma de suas naves foi roubada. Maltrox é a suspeita mais provável. Embora o regtag tenha sido temporariamente desativado, conseguimos rastrear a assinatura quântica da nave e lhe fornecemos essas coordenadas.\n\nCriminosos de terceira geração, a gangue Arlington está sob a liderança de Maltrox há seis anos. Esteja ciente de que esse é um alvo inteligente, agressivo e muito perigoso. Quanto mais recursos você puder usar, maior será a probabilidade de prendermos Maltrox de uma vez por todas. \n\nVocê está autorizado a usar qualquer força necessária para neutralizar o alvo. \n\nO pagamento será emitido após a conclusão bem-sucedida do contrato.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou da entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1
mg_miles_capturegang_desc_idris=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHOS\n\nTIPO DE CONTRATO: Mandado de grupo\nSTATUS DO CONTRATADO: Independente\nCódigo de aprovação: = ~mission(Contractor|ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nParece que a segunda vez é a melhor para a gangue de Arlington. Depois de uma tentativa fracassada, a família criminosa que escapou recentemente conseguiu roubar uma Idris de um pátio de reparos. Agora sabemos para que serviam o laser de mineração e a biometria que eles roubaram.\n\nComo tivemos tanto sucesso ao capturá-los da primeira vez, a Eckhart Security recebeu o mandado de prisão da gangue. Será necessário um poder de fogo considerável para derrubar uma nave capital dessa capacidade.\n\nVocê está autorizado a usar toda a força necessária para rastrear a Idris e neutralizar a gangue.\n\nO pagamento será emitido após a conclusão bem-sucedida do contrato e será ajustado com base na avaliação final da classificação de eficácia de combate de você e de sua equipe. \n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou da entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 5/7\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1
