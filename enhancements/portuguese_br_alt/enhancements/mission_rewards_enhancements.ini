Eckhart_ShipAmbush_E_desc=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Emboscada de Nave\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nUm cliente nosso tem recebido ameaças anônimas em uma tentativa de chantageá-lo, e após um pequeno trabalho de campo de nossa parte, conseguimos rastreá-lo até um indivíduo que pilota um <EM4>~mission(AmbushTarget)</EM4> específico. O cliente quer que cuidemos deste chantagista antes que ele tenha a chance de concretizar a ameaça.\n\nCom base em nossa avaliação, o alvo não deve ser muito difícil de lidar. Ele voa regularmente perto de <EM4>~mission(Location|Address)</EM4>, que possui uma <EM4>nuvem de emissão</EM4> que é um local ideal para desligar sua nave e ficar à espreita. Às vezes o alvo está sozinho, mas frequentemente viaja com outras naves de um único assento como proteção. É melhor ser estratégico ao lançar sua emboscada ou o <EM4>~mission(AmbushTarget)</EM4> pode ter a chance de escapar. Não queremos perder este. Alertaremos outros contratados na área sobre a emboscada para que possam ajudar assim que ela começar.\n\nO pagamento será emitido após a conclusão bem-sucedida do contrato. O cliente também adicionou um pagamento bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4> para o contratado principal.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] Lightstrike I Cannon\n- [E-S2-A] Lightstrike II Cannon\n- [E-S3-A] Lightstrike III Cannon\n- [STH-S1-C] SonicLite\n- [STH-S2-C] Cirrus\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Allies x2, Hostile Wave x7, Targets x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Eckhart_ShipAmbush_E_title=HORA DE DAR UMA LIÇÃO <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Eckhart_ShipAmbush_H_desc=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Emboscada de Nave\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nProcurando um contratado competente que possa recrutar um ala para ajudar a executar uma emboscada. O alvo é um <EM4>~mission(AmbushTarget)</EM4> que esteve envolvido em várias operações contra um de nossos clientes mais importantes. Ao neutralizá-lo de uma vez por todas, tornará a vida do nosso cliente muito mais fácil. Embora o ~mission(AmbushTarget) seja nosso foco, ele geralmente não voa para lugar nenhum sem uma escolta considerável, incluindo naves grandes.\n\nRecebemos informações de que este grupo passará por <EM4>~mission(Location|Address)</EM4> em breve. Há alguma chance de você se apressar e chegar lá antes deles? Esse local tem uma <EM4>nuvem de emissão</EM4> na qual você pode desligar sua nave e se esconder. Assim, quando eles passarem, você deverá ter a vantagem.\n\nO pagamento será emitido após a conclusão bem-sucedida do contrato. O cliente sabe que este será difícil, então ele incluiu um pagamento bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4> que irá para o contratado principal.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] Lightstrike I Cannon\n- [E-S2-A] Lightstrike II Cannon\n- [E-S3-A] Lightstrike III Cannon\n- [STH-S1-C] SonicLite\n- [STH-S2-C] Cirrus\n- [E-S1-A] FL-11 Cannon\n- [E-S2-A] FL-22 Cannon\n- [E-S3-A] FL-33 Cannon\n- [STH-S1-B] DeltaMax\n- [STH-S2-B] GammaMax\n- [E-S4-A] Lightstrike IV Cannon\n- [E-S5-A] Lightstrike V Cannon\n- [E-S6-A] Lightstrike VI Cannon\n- [STH-S1-A] Slipstream\n- [STH-S2-A] Eclipse\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Allies x1, Hostile Wave x13, Targets x5\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
