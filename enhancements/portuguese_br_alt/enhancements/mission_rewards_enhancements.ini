headhunters_killship_gen_vlrt_desc_001=Temos uma presa pequena que acha que pode atacar os Headhunters e se safar. Então, ~mission(TargetName) tentou derrubar um de nossos esconderijos e acha que pode se safar. \n\nDa última vez que ouvimos, ele foi visto perto de ~mission(Location|Address). Precisamos de alguém para ir até lá e enviar uma mensagem muito clara sobre quem é o poder reinante no sistema.\n\nFaça isso de forma rápida e limpa.\n\nStows desligando.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1\n<EM4>Jr. Contractor:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_killship_gen_vlrt_rank0_desc_001=Você nos conhece. Sabe o que fazemos. O sistema está ficando um pouco lotado, por isso estamos procurando alguns bons soldados para ajudar a manter nosso lugar aqui.\n\nSe estiver disposto a isso e não se importar em sujar as mãos, temos algo para provar que você é o  que estamos procurando.\n\n~mission(TargetName) era um ex-membro que nos denunciou à XenoThreat e fez com que alguns de seus irmãos e irmãs fossem mortos. Agora ele acha que pode viver sua vida sem consequências.\n\nElimine-o. Você é promovido. Parece uma troca justa.\n\nEle foi visto nas proximidades de ~mission(Location|Address), então vá até lá e cuide disso.\n\nStows desligando.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1\n<EM4>Neutral:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
