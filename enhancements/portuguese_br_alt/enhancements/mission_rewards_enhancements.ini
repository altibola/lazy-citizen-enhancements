Foxwell_EliminateAll_Allies_desc_001=Soube que os bandidos estão tentando invadir a <EM4>~mission(Location|Address)</EM4>. Há forças de segurança locais lá, mas elas estão lutando para impedir esse ataque.\n\nPreciso de um contratado para ir até lá e ajudar a cuidar dos agressores. Leve bastante equipamento e tenha cuidado ao atacar os alvos. Não quero ouvir falar de nenhum membro da equipe de segurança que tenha sido pego no fogo cruzado.    \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA oxwell Enforcement é uma empresa especializada em segurança licenciada para operar em todo o UEE. Estamos sempre procurando novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes contratuais.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5\n<EM4>Security Trainee:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
