headhunters_killship_cfp_vhrt_desc_001=Tenho um alvo de platina que precisa ser derrubado. O ~mission(TargetName) é um dos responsáveis pela segurança da Citizens for Prosperity. Embora ~mission(TargetName|Last) possa ter se esquecido, os Headhunters se lembram de seu trabalho com uma empresa de mercenários há alguns anos, que levou à morte de cinco irmãos e irmãs. Queremos sangue por sangue.\n\nEle foi visto rondando ~mission(Location|Address), então você ainda deve conseguir encontrá-lo lá.\n\nEle é um bastardo malvado, portanto, traga alguns amigos, mas certifique-se de que ele acabe morto.\n\nStows desligando.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1\n<EM4>Head Contractor:</EM4> +1,200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
