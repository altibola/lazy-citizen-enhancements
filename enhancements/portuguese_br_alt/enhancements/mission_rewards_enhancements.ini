Foxwell_EliminateAll_desc_001=Procurando alguém disposto a retirar o lixo de <EM4>~mission(Location|Address)</EM4>. Parece que uma gangue se instalou no local sem a permissão dos proprietários. Então, eles nos contrataram para tirá-los de lá da maneira que acharmos melhor. </EM4>\n\nEu levaria bastante munição, se fosse você. Duvido que eles queiram sair por vontade própria. \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma empresa especializada em segurança licenciada para operar em todo o UEE. Estamos sempre procurando novos operadores para se juntar à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Juggernauts x1, Snipers x5, Soldiers x12\n<EM4>Jr. Security Contractor:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -500 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
