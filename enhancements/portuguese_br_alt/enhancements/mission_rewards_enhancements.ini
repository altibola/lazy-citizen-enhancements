redwind_UGF_collect_desc_001=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nTenho uma carga esperando para ser transportada de <EM4>~mission(Location|Address)</EM4> para <EM4>~mission(Destination|Address)</EM4>. \n\nMas vou ser sincero com você, esse local não tem a reputação mais limpa. Dito isso, eles ainda precisam que os pacotes sejam entregues e têm créditos, então está tudo certo. Mas se você for até lá, há uma boa chance de ter problemas.\n\nNão aceite o trabalho se não puder lidar com isso.\n\n\n\nA TODOS OS VETERANOS - A Red Wind agradece seu serviço ao nosso Império! Suas lutas significam nossa liberdade!  \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Unknown:</EM4> 4
redwind_UGF_collect_title_001=PROCURA-SE PILOTO DE ENTREGA DA RED WIND <EM4>[500 Rep]</EM4>
redwind_courier_dc_small_title_001=Rota de Remessa Local da Red Wind <EM4>[500–1,000 Rep]</EM4>
redwind_courier_fromdc_med_desc_001=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nRecebemos uma solicitação de ~mission(Pickup1|Address) informando que há um bom número de pacotes aguardando em ~mission(Pickup1) que precisam ser entregues.\n\nAntes de aceitar o contrato, certifique-se de que sua nave tem espaço suficiente. Um trator também pode ajudar.\n\nPACOTES PARA COLETA\n     · Todos os pacotes em <EM4>~mission(Pickup1)</EM4> em <EM4>~mission(Pickup1|Address)</EM4>\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para <EM4>~mission(Dropoff2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para <EM4>~mission(Dropoff3|Address)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> para <EM4>~mission(Dropoff4|Address)</EM4>\n     · Pacote <EM4>#~mission(Item5|SerialNumber)</EM4> para <EM4>~mission(Dropoff5|Address)</EM4>\n     · Pacote <EM4>#~mission(Item6|SerialNumber)</EM4> para <EM4>~mission(Dropoff5|Address)</EM4>\n     · Pacote <EM4>#~mission(Item7|SerialNumber)</EM4> para <EM4>~mission(Dropoff6|Address)</EM4>\n     · Pacote <EM4>#~mission(Item8|SerialNumber)</EM4> para <EM4>~mission(Dropoff6|Address)</EM4>\n     · Pacote <EM4>#~mission(Item9|SerialNumber)</EM4> para <EM4>~mission(Dropoff7|Address)</EM4>\n     · Pacote <EM4>#~mission(Item10|SerialNumber)</EM4> para <EM4>~mission(Dropoff7|Address)</EM4>\n\nSOMOS UMA EMPRESA INCLUSIVA - A Red Wind Linehaul é e sempre foi uma contratado de oportunidades iguais. Se você acha que pode fazer um bom trabalho para nós, então por todos os meios, inscreva-se.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
redwind_courier_fromdc_small_desc_001=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\nO pessoal de ~mission(Pickup1|Address) tem alguns pacotes em ~mission(Pickup1) que querem que sejam entregues. Créditos fáceis por um carregamento e entrega simples.\n\nPACOTES PARA COLETA\n     · Todos os pacotes em <EM4>~mission(Pickup1)</EM4> em <EM4>~mission(Pickup1|Address)</EM4>\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para <EM4>~mission(Dropoff2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para <EM4>~mission(Dropoff3|Address)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> para <EM4>~mission(Dropoff4|Address)</EM4>\n     · Pacote <EM4>#~mission(Item5|SerialNumber)</EM4> para <EM4>~mission(Dropoff5|Address)</EM4>\n\nA TODOS OS VETERANOS - A Red Wind agradece seu serviço ao nosso Império! Seus sacrifícios garantem nossa liberdade!\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
redwind_courier_todc_med_desc_001=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nTemos um bom número de pacotes que precisam ser levados para ~mission(Dropoff1) em ~mission(Dropoff1|Address). Contanto que sua nave tenha espaço suficiente, essa deve ser uma entrega relativamente simples.\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> de <EM4>~mission(Pickup1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> de <EM4>~mission(Pickup2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> de <EM4>~mission(Pickup3|Address)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> de <EM4>~mission(Pickup4|Address)</EM4>\n     · Pacote <EM4>#~mission(Item5|SerialNumber)</EM4> de <EM4>~mission(Pickup5|Address)</EM4>\n     · Pacote <EM4>#~mission(Item6|SerialNumber)</EM4> de <EM4>~mission(Pickup5|Address)</EM4>\n     · Pacote <EM4>#~mission(Item7|SerialNumber)</EM4> de <EM4>~mission(Pickup6|Address)</EM4>\n     · Pacote <EM4>#~mission(Item8|SerialNumber)</EM4> de <EM4>~mission(Pickup6|Address)</EM4>\n     · Pacote <EM4>#~mission(Item9|SerialNumber)</EM4> de <EM4>~mission(Pickup7|Address)</EM4>\n     · Pacote <EM4>#~mission(Item10|SerialNumber)</EM4> de <EM4>~mission(Pickup7|Address)</EM4>\n\nLOCAL DE ENTREGA\n     · Todos os pacotes entregues em <EM4>~mission(Dropoff1)</EM4> em <EM4>~mission(Dropoff1|Address)</EM4>\n\nNÃO ACEITE ESTE CONTRATO - a menos que você seja confiável. A Red Wind tem uma reputação em que nossos clientes confiam — e com razão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
redwind_courier_todc_small_desc_001=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nTemos alguns pacotes que precisam ser recolhidos e levados para ~mission(Dropoff1) em ~mission(Dropoff1|Address). Tudo considerado, deve ser um serviço bem simples.\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> de <EM4>~mission(Pickup1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> de <EM4>~mission(Pickup2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> de <EM4>~mission(Pickup3|Address)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> de <EM4>~mission(Pickup4|Address)</EM4>\n     · Pacote <EM4>#~mission(Item5|SerialNumber)</EM4> de <EM4>~mission(Pickup5|Address)</EM4>\n\nLOCAL DE ENTREGA\n     · Todos os pacotes entregues em <EM4>~mission(Dropoff1)</EM4> em <EM4>~mission(Dropoff1|Address)</EM4>\n\nCONFIANÇA É MÃO DUPLA - Ao aceitar este contrato, você se compromete a não nos passar para trás, e a Red Wind Linehaul promete o mesmo a você.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
roughready_bounty_cargoship_desc_001=Rough & Ready recentemente prestou serviços de abastecimento para um transportador chamado ~mission(TargetName), que concordou em entregar sua próxima carga de suprimentos para nós como compensação. Bem, acabamos de descobrir que malandro mentiroso vendeu sua última remessa para uma gangue rival.\n\nNós estamos procurando alguém para rastrear e eliminar ~mission(TargetName|Last) pela traição.\n\nUm velho amigo meu acabou de ver o malandro em ~mission(Location|Address). Parece que eles estão carregados com mais carga que não está chegando e viajando com uma escolta. Estamos pagando apenas para tirar a nave, então qualquer coisa que você achar a bordo é sua para manter. \n\n- Smokey\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
roughready_bounty_cargoship_desc_002=Meus associados e eu intermediamos um acordo com um Hauler chamado ~mission(TargetName) para fornecer suprimentos para nós. O engraçado é que a remessa nunca apareceu. Eles alegaram que os piratas invadiram a nave e pegaram nossos suprimentos, mas acontece que o esterco de Ranta 100% da história.~mission(TargetName|Last) foi visto recentemente com uma acompanhante em ~mission(Location|Address). Desde que você mate ~mission(TargetName|Last), não nos importamos com o que acontece com a carga que eles estão transportando.\n\n- Smokey \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1
roughready_bounty_cargoship_desc_003=Algum idiota com o nome ~mission(TargetName) está executando um esquema em que a nave de carga solicita serviços de reabastecimento apenas para emboscar nossas naves quando chegarem lá. Até carregou a maldita coisa com carga real para garantir que ela passe as varreduras. Nós espalhamos a notícia para que ninguém em Rough & Ready caia na armadilha novamente, mas eu quero que esse malandro punido.\n\ni Think ~mission(TargetName|Last) conhece muito do nosso povo à vista, então acho que será melhor pagar você para cuidar disso. Ouvi dizer que eles foram vistos em torno da ~mission(Location|Address). Vá para lá agora e cuide daquela nave de carga e qualquer pessoa que o proteja de uma vez por todas.\n\n- Smokey\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
roughready_bounty_desc_001=Interessado em fazer um pouco de caça?\n\n ~mission(TargetName) sabotou um de nossos remessas de combustível e nos custou uma tonelada de creds, por isso estou procurando alguém para fazer com que eles paguem pelo que fizeram. Acabei de receber o Word ~mission(TargetName|Last) foi visto em ~mission(Location|Address). Se você for para lá agora, há uma boa chance de você pegar a trilha deles e levá -los para sempre.\n\n ~mission(TargetName|Last) não funcionou sozinho, então não se surpreenda se eles estiverem viajando com proteção extra. \n\n- Smokey \n\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
roughready_bounty_desc_003=Eu tenho uma situação delicada que precisa de lidar. Depois de anos sendo um membro leal da Rough & Ready, ~mission(TargetName) desertou da gangue e está lá fora, segredos de compras para nossos rivais. Precisamos de ~mission(TargetName|Last) Ghosted imediatamente.\n\nCom coisas assim, achei sempre melhor pagar a alguém não associado conosco para fazer a ação. As varreduras pegadas ~mission(TargetName|Last) perto de ~mission(Location|Address) não muito tempo atrás. Vamos pagar bem para ir para lá agora e cuidar de nós para nós.\n\n ~mission(TargetName|Last) não é um idiota e sabe que iremos depois deles. Esteja preparado para uma luta infernal e não espere que eles estejam sozinhos. \n\n- Smokey  \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
roughready_claimsweep_desc_easy=A equipe da Rough & Ready está procurando alguém para lidar com uma situação delicada. Descobrimos uma nave e sentinelas orbitais em ~mission(location|address) Spyin 'em nós. Estamos um pouco vinculados porque não queremos iniciar uma briga maior com quem está por trás disso.É por isso que procuramos uma ajuda contratada que possa cuidar rapidamente e discretamente cuidar disso para nós. Interessado?Aposto assim que você começar a explodir suas sentinelas, eles tentarão trazer alguma ajuda para impedi-lo. \n\n- Smokey \n\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x3, Prospectors x1\n<EM4>Turrets:</EM4> 2 (hostile)
roughready_claimsweep_desc_hard=A equipe da Rough & Ready está procurando um Merc independente interessado em algo pesado. Estamos de olho em uma situação em desenvolvimento na ~mission(location|address), onde as naves estão guardando várias sentinelas orbitais espionando nossas operações.\n\nAgora, eu poderia ter nascido à noite, mas não foi ontem à noite. Considerando a maneira flagrante da maneira que eles estão configurados, quem quer que tenha que saber que acabaríamos descobrindo. Quase parece que eles estão isolando o R&R a atacá -lo, e eu não quero que cantamos por isso.\n\ninstead, você fará isso por nós e receberá uma boa quantidade de creds pelo seu esforço. As naves estacionados haverão menos suspeitos de uma nave não afiliado se aproximando e dificultam o ataque a nós.\n\nCertifique -se de planejar de acordo antes de entrar. Talvez traga seus próprios reforços, caso qualquer um de seus naves escape e chame por alguns deles.\n\n- Smokey \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x5, Prospectors x4\n<EM4>Turrets:</EM4> 4 (hostile)
roughready_claimsweep_desc_intro=Meus associados e eu nos encontramos em uma pequena situação e poderíamos usar alguma ajuda. Há uma sentinela orbital em ~mission(location|address) que está nos espionando. Não sabemos quem colocou lá, mas com certeza não pode ficar.\n\nA coisa é que somos pessoas que pensam nos negócios, em primeiro lugar, e preocupam que, se explodirmos, começará a merda.É por isso que é melhor se alguém como você faz isso. Deve ser um show rápido e fácil para alguém interessado em ganhar alguns Creds.\n\n- Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Turrets:</EM4> 1 (hostile)
roughready_claimsweep_desc_medium=Recentemente, fez uma descoberta interessante de que alguém estabeleceu um punhado de sentinelas orbitais em ~mission(location|address). Acho que eles estão tentando obter algumas informações sobre nossas operações lá. Eles até têm alguns naves guardando para garantir que nada aconteça com eles. Não é claro, queremos que esses bastardos desaparecessem, mas estou preocupado que se livrar dele seria ruim para os negócios.É por isso que estamos procurando uma "negação plausível". Alguém de fora da P&R para eliminar o problema, então quem está por trás dele não pode amarrar diretamente o ataque de volta para nós. Eu sei que isso não será uma caminhada no parque, especialmente com esses guardas à espreita. Quem sabe quantos reforços eles têm pronto?Mas se você conseguir fazê -lo, estamos preparados para vê -lo pago corretamente.\n\nAcha que você tem as habilidades para conseguir isso?\n\n- Smokey \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x4, Prospectors x2\n<EM4>Turrets:</EM4> 3 (hostile)
roughready_delivery_station_desc_001=Alguma chance de você estar em ~mission(Destination)?\n\nPreciso de uma caixa transportada de <EM4>~mission(Location|Address)</EM4> para <EM4>~mission(Destination|Address)</EM4>. Leve-a até lá dentro do prazo e intacta e você terá os créditos mais fáceis de ganhar.   \n\n-Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 1/7 | Complexity 1/7 | Risk 1/7 | Knowledge 1/7
roughready_delivery_station_title_001=Passeio por ~mission(Destination)
roughready_eliminateall_hangar_desc_01=Recebemos alguns bandidos em excesso de boas -vindas em uma de nossas estações. Eles tentaram puxar um rápido para nós, mas agora estão presos em ~mission(location|address). Precisamos que você limpe -os.\n\nRough & Ready não quer que um deles sai vivos quando você terminar. Não se importe com o quão bagunçado fica o tempo que for feito, entendeu? \n\n- Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x24, Soldiers x2
roughready_eliminateall_maintenance_desc_01=Rough & Ready tem um problema com ratos. Uma de nossas equipes tentou organizar um pequeno motim e agora eles assumiram ~mission(location|address).\n\nComo não posso ter 100% de certeza de que eles não têm simpatizantes a bordo da estação, quero você para lidar com a eliminação desses traidores para mim.\n\nSe você conseguir resolver nosso pequeno problema de pragas, você será bem pago. Só não deixe nenhum deles vivo. Não quero que mais ninguém tenha ideias engraçadas.\n\n- Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x21
roughready_salvage_E_desc_001=Tive algumas naves destroçadas rebocadas para ~mission(Location|Address). Eles estão totalmente fora de serviço e precisam urgentemente de sucateamento. Se estiver interessado em recuperar o que sobrou, pode ser todo seu, por um preço justo também.\n\nAlém disso, você não precisa se preocupar muito com distrações enquanto estiver trabalhando, pois estará perto de uma de nossas estações e nós garantimos que as pessoas se comportem bem.\n\n- Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Friendlies:</EM4> Salvageable Ships x1
roughready_salvage_E_title_001=NAVES DESTRUÍDAS À VENDA
roughready_salvage_M_desc_001=Soube que há algumas naves perto de ~mission(Location|Address) flutuando sozinhas. É um bom sucateamento, mas nenhuma de nossas equipes tem tempo no momento. Pensamos em lhe dar a primeira chance.\n\nSe quiser as coordenadas, nós as venderemos a você por um preço. Depois, você estará livre para limpar os destroços como quiser e vender tudo com um bom lucro. Agora, você pode ter problemas com os catadores rivais, mas tenho certeza de que não será nada com que você não possa lidar.\n\n- Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Friendlies:</EM4> Salvageable Ships x1
roughready_salvage_M_title_001=SUCATEAMENTO DE NAVES DESTRUÍDAS À DERIVA
roughready_searchbody_danger_station_desc_001=Depois de ouvir rumores de que poderíamos ter tido um caso grave de invasores em ~mission(Location|Address), enviei um dos meus funcionários mais confiáveis para investigar. \n\nA má notícia é que não ouvi falar dele desde então. \n\nGostaria que você fosse até lá e visse se consegue descobrir o paradeiro atual de ~mission(TargetName).  Deixarei a seu critério como você quer lidar com qualquer escória que encontrar. \n\nConfirme onde está ~mission(TargetName|Last) e você receberá uma recompensa.\n\n- Smokey \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
roughready_searchbody_nodanger_station_desc_001=Tenho pessoas a torto e a direito me perguntando se sei o que aconteceu com ~mission(TargetName). Pessoalmente, eu ficaria mais do que feliz em vê-lo partir para sempre, mas, por algum motivo, ele tem amigos em altos cargos exigindo respostas.\n\nNão posso dispensar nenhum dos meus funcionários para sair em uma caça aos marrecos, por isso estou procurando o candidato perfeito para ir até ~mission(Location|Address) e descobrir o que aconteceu com ~mission(TargetName|Last). Você será pago se descobrir onde ele está.\n\nAposto 10 créditos que ele se drogou demais e desmaiou em um canto escuro em algum lugar.\n\n-Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
