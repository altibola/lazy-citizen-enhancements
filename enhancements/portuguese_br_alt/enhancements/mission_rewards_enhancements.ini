BHG_Certification_VeryEasy_Desc=--------------------------------------------------------\n----------------- CONTRATO DE RECOMPENSA -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName) \nSISTEMA: ~mission(System)\nAVALIAÇÃO DE RISCO: Muito Baixo\nÚLTIMA LOCALIZAÇÃO CONHECIDA: ~mission(Location)\nAFILIAÇÕES CONHECIDAS: <None>\nNOTAS: Com base em uma avaliação de suas habilidades, a Bounty Hunters Guild gostaria de oferecer a você a chance de obter sua Permissão de Treinamento de Rastreador.\n\nEsta permissão significaria que você está qualificado para rastrear e prender Alvos de Risco Muito Baixo (VLRT). Esses criminosos tradicionalmente pilotam naves menores e raramente possuem mais de uma escolta. Ideal para Caçadores de Recompensa que estão apenas começando.\n\nPara concluir com sucesso este processo de certificação, você deve prender um criminoso de nível VLRT de nome <EM4>~mission(TargetName)</EM4>, visto pela última vez em <EM4>~mission(Location|Address)</EM4>.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca da Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Mercenary Guild e autorizado a operar tanto na UEE quanto além, de acordo com os Atos da Xenotrade Authority.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 2
BHG_Certification_VeryEasy_Title=CERTIFICAÇÃO DE PERMISSÃO DE TREINAMENTO DE RASTREADOR <EM4>[50 Rep]</EM4>
BHG_Certification_VeryHard_Desc=--------------------------------------------------------\n----------------- CONTRATO DE RECOMPENSA -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName) \nSISTEMA: ~mission(System) \nAVALIAÇÃO DE RISCO: Muito Alto\nÚLTIMA LOCALIZAÇÃO CONHECIDA: ~mission(Location)\nAFILIAÇÕES CONHECIDAS: <None>\nNOTAS: Com seu histórico comprovado, a Bounty Hunters Guild gostaria de oferecer a você a chance de obter uma Licença de Rastreador Avançado.\n\nEsta licença significaria que você está qualificado para rastrear e prender Alvos de Risco Muito Alto (VHRT). Esses criminosos podem viajar em naves maiores com tripulação múltipla e escoltas pesadas. Com múltiplos hostis para lidar, os encontros com esses alvos podem ser letais.\n\nPara concluir com sucesso este processo de certificação, você deve prender um criminoso de nível VHRT de nome <EM4>~mission(TargetName)</EM4>, visto pela última vez em <EM4>~mission(Location|Address)</EM4>.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca da Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Mercenary Guild e autorizado a operar tanto na UEE quanto além, de acordo com os Atos da Xenotrade Authority.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 4
BHG_Certification_VeryHard_Title=CERTIFICAÇÃO DE LICENÇA DE RASTREADOR AVANÇADO <EM4>[50 Rep]</EM4>
BHG_ShipWaveAttack_DrawOutBoss_H_Desc_001=--------------------------------------------------------\n-------------- CONTRATO DE RECOMPENSA ---------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName) \nAVALIAÇÃO DE RISCO: Alto\nÚLTIMA LOCALIZAÇÃO CONHECIDA:  ~mission(Location|Address)\nAFILIAÇÕES CONHECIDAS: Desconhecidas\nNOTAS: Este alvo em particular tem se mostrado muito difícil de capturar. Eles tendem a permanecer escondidos, a menos que haja uma ameaça grande o suficiente para exigir sua atenção. É por isso que você e sua equipe de apoio precisarão eliminar subordinados suficientes para atrair sua ira. Apenas permaneça no local, elimine quaisquer hostis que aparecerem, e o alvo eventualmente deverá se revelar.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca da Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Mercenary Guild e autorizado a operar tanto na UEE quanto além, de acordo com os Atos da Xenotrade Authority.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x24\n<EM4>Probationary Guild Member:</EM4> +200 Rep
BHG_ShipWaveAttack_DrawOutBoss_H_Title_001=Recompensa Reclusa: ~mission(TargetName) | Risco Alto <EM4>[200 Rep]</EM4>
BHG_ShipWaveAttack_DrawOutBoss_S_Desc_001=--------------------------------------------------------\n-------------- CONTRATO DE RECOMPENSA ---------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName) \nAVALIAÇÃO DE RISCO: Extremo\nÚLTIMA LOCALIZAÇÃO CONHECIDA:  ~mission(Location|Address)\nAFILIAÇÕES CONHECIDAS: Desconhecidas\nNOTAS: Este alvo em particular tem se mostrado muito difícil de capturar. Eles tendem a permanecer escondidos, a menos que haja uma ameaça grande o suficiente para exigir sua atenção. É por isso que você e sua frota de apoio mais confiável precisarão eliminar subordinados suficientes para forçá-los a confrontá-lo. Apenas permaneça no local, elimine quaisquer hostis que aparecerem, e o alvo eventualmente chegará em sua nave capital.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca da Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Mercenary Guild e autorizado a operar tanto na UEE quanto além, de acordo com os Atos da Xenotrade Authority.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 7/7 | Risk 7/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x33\n<EM4>Probationary Guild Member:</EM4> +300 Rep
BHG_ShipWaveAttack_DrawOutBoss_S_Title_001=Recompensa Reclusa: ~mission(TargetName) | Risco Extremo <EM4>[300 Rep]</EM4>
BHG_ShipWaveAttack_DrawOutBoss_VH_Desc_001=--------------------------------------------------------\n-------------- CONTRATO DE RECOMPENSA ---------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName) \nAVALIAÇÃO DE RISCO: Muito Alto\nÚLTIMA LOCALIZAÇÃO CONHECIDA:  ~mission(Location|Address)\nAFILIAÇÕES CONHECIDAS: Desconhecidas\nNOTAS: Este alvo em particular tem se mostrado muito difícil de capturar. Eles raramente são vistos, a menos que sejam solicitados a lidar pessoalmente com uma ameaça grande o suficiente. É por isso que você e sua equipe de apoio precisarão eliminar subordinados suficientes para garantir que eles venham enfrentá-lo. Apenas permaneça no local, elimine quaisquer hostis que aparecerem, e o alvo eventualmente deverá se revelar.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca da Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Mercenary Guild e autorizado a operar tanto na UEE quanto além, de acordo com os Atos da Xenotrade Authority.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x27\n<EM4>Probationary Guild Member:</EM4> +250 Rep
BHG_ShipWaveAttack_DrawOutBoss_VH_Title_001=Recompensa Reclusa: ~mission(TargetName) | Risco Muito Alto <EM4>[250 Rep]</EM4>
Bitzeroes_bombingrun_dc_desc_001=Estamos tentando acessar alguns dados confidenciais em ~mission(Location|Address), mas parece haver apenas um backdoor que podemos usar. O problema é que precisamos de alguém no local para acioná-la. E eu realmente quero dizer acioná-lo.\n\nSe você puder ir até lá e destruir parte da infraestrutura deles, os sistemas de backup de emergência entrarão em operação e poderemos acessar tudo o que quisermos. \n\nGostaria de poder ver a cara de surpresa dos marginais que dirigem o local quando isso acontecer.\n\n-Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Turrets:</EM4> present (hostile)
Bitzeroes_bombingrun_dc_title_001=Fumegando <EM4>[500–2,000 Rep]</EM4>
Bitzeroes_destroygen_locked_dc_desc_001=Preciso de sua ajuda em um trabalho, mas não posso detalhar muito os detalhes. Se isso não der para você, não se preocupe.\n\nVocê irá para ~mission(Location|Address) e explodirá um gerador de energia para nós. Agora, eles mantêm o gerador trancado, então você terá que procurar os códigos de acesso primeiro. Felizmente, eles costumam manter cópias do código em datapads. (Acham que isso os manterá a salvo de serem hackeados.)\n\nSe você conseguir destruir o gerador, sua conta bancária será a próxima a explodir.\n\n- Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Bitzeroes_destroygen_locked_dc_title_001=APAGÃO OBRITATÓRIO <EM4>[500 Rep]</EM4>
Bitzeroes_destroyitem_dc_desc_001=Não vou entrar na longa e enfadonha história do motivo, mas há algumas partes da ~mission(Location|Address) que precisamos destruir. A parte importante é que quero lhe pagar uma boa quantidade de créditos para fazer isso. Quase sinto que você deveria nos pagar por isso, pois será muito divertido.\n\nNão importa como você vai fazer isso. Granadas, lançador de foguetes, Torpedo Burrito velho, para nós é tudo a mesma coisa.\n\n-Bit Zeros \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Bitzeroes_destroyitem_dc_title_001=Grande Defeito <EM4>[500 Rep]</EM4>
Bitzeroes_destroyservers_locked_dc_desc_001=Olá,\n\nTemos um problema no qual poderíamos contar com sua ajuda. Um de nossos ex-novos recrutas fez um trabalho completamente ruim em um hack e acabou deixando um rastro digital tão bagunçado que poderia muito bem ser uma confissão completa. \n\nUma exclusão remota não será suficiente, portanto, quero que você vá até ~mission(Location|Address) e certifique-se de que os servidores de dados deles sejam apagados da existência.\n\nComo se isso já não fosse uma bagunça grande o suficiente, os códigos de acesso à porta trancada da sala do servidor só são armazenados fisicamente no local. Isso significa que você terá que liberar um datapad com o código antes mesmo de chegar perto deles.\n\nNão se preocupe. Farei com que os créditos valham todo o incômodo.  \n\n- Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
Bitzeroes_destroyservers_locked_dc_title_001=SERVIDOR NÃO ENCONTRADO <EM4>[1,000 Rep]</EM4>
Bitzeroes_destroystash_dc_desc_001=Os idiotas em ~mission(Location|Address) decidiram que seria uma boa ideia interferir em nossos negócios, e agora precisamos informá-los inequivocamente de que estavam enganados. \n\nUm pouco de investigação em seus dados e conseguimos descobrir onde os idiotas guardam seus estoques. Agora tudo o que precisamos que você faça é ir até lá e destruir tudo. \n\nAcho que isso deve ser o suficiente para mostrar o ponto de vista.\n\n-Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Bitzeroes_destroystash_dc_title_001=ACERTE-OS ONDE DÓI <EM4>[500 Rep]</EM4>
Bitzeroes_eliminateall_dc_desc_001=Os cretinos nojentos de ~mission(Location|Address) estão nos vendendo dados inúteis enquanto tentam fazer um acordo duplo. Não podemos deixar isso passar.\n\nQueremos que você lhes dê uma última lição e elimine todos os covardes que encontrar. A última coisa que ouvi é que eles estavam escondidos perto de ~mission(Location). \n\nDerrame o sangue deles e nós encheremos sua carteira. \n\n-Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Juggernauts x2, Soldiers x12, Technicians x2
Bitzeroes_eliminateall_dc_title_001=REMOÇÃO PERMANENTE <EM4>[1,000 Rep]</EM4>
Bitzeroes_heist_buyin_dc_desc_001=Estou analisando agora mesmo um registro de transferência de inventário que está transbordando com uma grande quantidade de carga muito valiosa que está praticamente implorando para ser roubada. É claro que provavelmente há algumas pessoas guardando as mercadorias, mas quanto mais difícil for a luta, mais doce será o saque, certo? \n\nNormalmente, estaríamos dispostos a fazer um trabalho como esse, mas temos outro alvo em nossa mira agora e eu odiaria que informações tão boas apodrecessem.  \n\nO que você acha? Quer tentar? Envie-me alguns créditos e o local será todo seu.\n\n-Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Unknown:</EM4> 10
Bitzeroes_theft_dc_desc_001=Tudo bem,\n\nEm ~mission(Location|Address) há alguns itens em posse deles que precisam ser recuperados. Claro, pode haver alguns guardas ou pessoas preocupadas com quem você terá que lidar, mas, na maior parte, é uma transação relativamente simples – pegue os itens em ~mission(Location) e leve-os para nós em ~mission(Destination|Address).\n\nÀs vezes, o simples é o melhor.\n\n-Bit Zeros\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
Bitzeroes_theft_dc_title_001=REATRIBUIÇÃO DE PROPRIEDADE <EM4>[500–1,000 Rep]</EM4>
Bitzeroes_theft_mines_dc_desc_001=Eu realmente espero que você concorde em fazer isso, pois não parece haver muita gente disposta a enfrentar um monte de minas de proximidade. Veja, há um esquema que obtivemos em ~mission(Location|Address), mas a segurança física está se mostrando mais difícil do que o esperado. \n\nSe você conseguir encontrar uma maneira de navegar pelas minas ou possivelmente uma maneira de acioná-las remotamente, deve ser relativamente fácil pegar as mercadorias e sair de lá. Deixe-as em ~mission(Destination|Address) e você receberá mais do que sua parte justa dos créditos por ter assumido o risco.\n\n-Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
BlockadeRunner_Counter_Desc=Dizem que muita Zeta-Prolanide foi roubada de ~mission(Location|address).\n\nSe você encontrar alguma, traga-a para ~mission(DropOffLocation|address) e faremos com que você consiga um bom preço.\n\nE se não, você pode abandonar essa oferta, sem ressentimentos.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
BlockadeRunner_Desc=*PARA DIVULGAÇÃO IMEDIATA EM TODO O SISTEMA*\n\nUma frota hostil de naves equipadas com bloqueadores quânticos criou um bloqueio em torno de ~mission(Location|address), desativou as torres defensivas da estação e roubou um grande suprimento de Zeta-Prolanide. Em resposta, a CDF recebeu autorização para ativar sua força de voluntários. \n\nEmbora a situação geral seja terrível, o roubo de Zeta-Prolanide é nossa prioridade. Sem ação direta, a perda das reservas de Zeta-Prolanide do setor pode ter um efeito devastador para a economia mais ampla de todo o sistema. \n\nEnquanto as forças de segurança locais estão investigando a incursão, elas rastrearam o inventário roubado em vários locais. Os voluntários da CDF têm a tarefa de ir até esses locais, recuperar a Zeta-Prolanide roubada e transferi-la de volta para a estação antes que o material se degrade completamente e não seja mais viável. Mas tenha cuidado, pois as informações sugerem que agrupamentos maiores de Zeta-Prolanide têm uma presença maior de foras da lei.\n\nComo o tempo é essencial, é altamente recomendável ter um feixe de tração para ajudar na movimentação da carga.\n\nComo incentivo adicional, os voluntários receberão pagamentos regulares de bônus por seus esforços combinados.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
BlockadeRunner_Title=ALERTA DA CDF: Furadores de Bloqueio de ~mission(Location) <EM4>[1,000 Rep]</EM4>
BrightSky_Desc=A CDF fez parceria com a Anvil Aerospace para encontrar os agentes mais capazes no sistema. \n\nSe você encontrar uma dessas certificações Platinum, poderá resgatar o ticket por uma F8C grátis em um quiosque de nave no New Deal, Astro Armada ou Crusader Showroom. \nO problema é que sua identidade e localização foram compartilhadas com os participantes em todo o sistema. Para todos os outros, se você conseguir parar o portador do ticket antes que ele chegue ao quiosque, você poderá reivindicá-lo como seu.\n\nQuem conseguir fazer isso não apenas pegará esse caça superior de próxima geração, mas também provará que ele tem o que é preciso para as missões da CDF mais difíceis.\n\nBoa sorte.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
CFP_Delivery_Outpost_Multi_desc_001=Oi,\n\nA Citizens for Prosperity precisa de ajuda para mover suprimentos em um dos nossos postos avançados. As caixas precisam ser retiradas de <EM4>~mission(Location|Address)</EM4> e levadas para <EM4>~mission(Destination|Address)</EM4>.\n\nNão parece muito difícil, né? Só garanta que esteja usando um par de sapatos confortáveis. Ah, e pra facilitar sua vida, eu levaria um <EM4>raio trator portátil</EM4> com você.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +200 Rep\n<EM4>Contractor:</EM4> +400 Rep\n<EM4>Sr. Contractor:</EM4> +800 Rep
CFP_Delivery_Outpost_Multi_title_001=ENTREGA ENTRE POSTOS AVANÇADOS EM ~mission(Destination) - MÚLTIPLAS CAIXAS <EM4>[200–800 Rep]</EM4>
CFP_Delivery_Outpost_desc_001=Oi,\n\nTemos uma oportunidade para qualquer transportador interessado em ajudar a Citizens for Prosperity.\n\nHá uma caixa que precisa ser movida de <EM4>~mission(Location|Address)</EM4> para <EM4>~mission(Destination|Address)</EM4>. Não deve demorar muito, se você estiver pelo posto avançado e disponível.\n\nAh, e pra facilitar sua vida, eu levaria um <EM4>raio trator portátil</EM4> com você.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Neutral:</EM4> +50 Rep
CFP_Delivery_Outpost_title_001=ENTREGA ENTRE POSTO AVANÇADO EM ~mission(Destination) <EM4>[50 Rep]</EM4>
CFP_RecoverCargo_Easy_Description=A vida é difícil na fronteira, e cada entrega para os nossos colonos é importante. Realmente não podemos nos dar ao luxo de perder mais nada este ano.\n\nUm de nossos principais fornecedores foi atingido por um grupo de fora da lei em <EM4>~mission(Location|Address)</EM4> e parou de responder. Temo o pior, mas se ainda pudermos recuperar os suprimentos que eles estavam transportando, isso poderá fazer uma enorme diferença.\n\nAs chances são de que os fora da lei que os atacaram ainda estejam espreitando por lá, então fique atento. Assim que tiver lidado com eles, pegue a carga e leve-a para o elevador de carga em <EM4>~mission(Destination|Address)</EM4>. Certifique-se de estar pilotando uma nave que possa carregar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e traga também um <EM4>raio trator de alta potência</EM4>.\n\nVoem com segurança,\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- C54 SMG\n- P8-SC SMG\n- S71 Rifle\n- [S1-A] C54 SMG Magazine (50 cap)\n- [S1-A] G-2 Helmet Woodland\n- [S1-A] ORC-mkV Arms\n- [S1-A] ORC-mkV Core\n- [S1-A] ORC-mkV Legs\n- [S1-A] ORC-mkX Arms Woodland\n- [S1-A] ORC-mkX Core Woodland\n- [S1-A] ORC-mkX Helmet Woodland\n- [S1-A] ORC-mkX Legs Woodland\n- [S1-A] P8-SC SMG Magazine (45 cap)\n- [S1-A] S71 Rifle Magazine (30 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Unknown:</EM4> 1\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
CFP_RecoverCargo_Easy_Title=Remessa de Suprimentos Interceptada <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
CFP_RecoverCargo_Hard_Description=Estávamos em processo de entrega de uma remessa urgente para o pessoal em <EM4>~mission(Destination|Address)</EM4> quando nosso piloto encontrou um grupo de fora da lei. Eles tentaram fugir, mas já era tarde demais.\n\nMas há uma ponta de esperança. Os rastreadores mostram que a carga ainda está intacta, localizada em <EM4>~mission(Location|Address)</EM4>. Há uma boa chance de os fora da lei estarem vigiando-a enquanto localizam uma nave grande o suficiente para transportar tudo. Embora eu não queira arriscar perder outro piloto, a necessidade da carga a bordo é desesperadora o suficiente para justificar a decisão de enviar alguém para recuperá-la.\n\nIsso não será fácil, esses fora da lei não mostraram piedade ao nosso piloto. Você precisará eliminá-los primeiro antes de recuperar a carga. Traga uma nave que possa armazenar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e um <EM4>raio trator de alta potência</EM4> para a movimentação. Entregue-a no elevador de carga em <EM4>~mission(Destination)</EM4> e vamos consertar as coisas.\n\nVoe com segurança,\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- C54 SMG\n- P8-SC SMG\n- S71 Rifle\n- [S1-A] C54 SMG Magazine (50 cap)\n- [S1-A] G-2 Helmet Woodland\n- [S1-A] ORC-mkV Arms\n- [S1-A] ORC-mkV Core\n- [S1-A] ORC-mkV Legs\n- [S1-A] ORC-mkX Arms Woodland\n- [S1-A] ORC-mkX Core Woodland\n- [S1-A] ORC-mkX Helmet Woodland\n- [S1-A] ORC-mkX Legs Woodland\n- [S1-A] P8-SC SMG Magazine (45 cap)\n- [S1-A] S71 Rifle Magazine (30 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Unknown:</EM4> 1\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
CFP_RecoverCargo_Hard_Title=Suprimentos Cruciais Precisam ser Recuperados <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
CFP_RecoverCargo_Medium_Description=Uma nave da Citizens for Prosperity foi emboscada por um grupo de fora da lei em <EM4>~mission(Location|Address)</EM4> e precisamos de um piloto habilidoso para ajudá-los.\n\nPerdemos o contato com eles no meio da comunicação, mas parecia que estavam sob fogo pesado. Pode ser tarde demais para eles, mas os suprimentos vitais que carregavam ainda podem ser bem aproveitados. Voe até lá, elimine quaisquer hostis e recupere a remessa. Você precisará de uma nave que comporte <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e um <EM4>raio trator de alta potência</EM4> para transportar os suprimentos para sua nave.\n\nLeve-os para o elevador de carga em <EM4>~mission(Destination|Address)</EM4> e eu garanto que serão bem utilizados.\n\nFique seguro lá fora,\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- C54 SMG\n- P8-SC SMG\n- S71 Rifle\n- [S1-A] C54 SMG Magazine (50 cap)\n- [S1-A] G-2 Helmet Woodland\n- [S1-A] ORC-mkV Arms\n- [S1-A] ORC-mkV Core\n- [S1-A] ORC-mkV Legs\n- [S1-A] ORC-mkX Arms Woodland\n- [S1-A] ORC-mkX Core Woodland\n- [S1-A] ORC-mkX Helmet Woodland\n- [S1-A] ORC-mkX Legs Woodland\n- [S1-A] P8-SC SMG Magazine (45 cap)\n- [S1-A] S71 Rifle Magazine (30 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Unknown:</EM4> 1\n<EM4>Jr. Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
CFP_RecoverCargo_Medium_Title=Recuperando Suprimentos Valiosos <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
CFP_RecoverCargo_Super_Description=Eu normalmente não pediria a alguém para fazer algo tão arriscado, mas estas são circunstâncias excepcionais.\n\nNosso piloto estava transportando uma carga vital quando foi alvo de um grupo de fora da lei. Sob nenhuma circunstância podemos permitir que eles coloquem as mãos na carga.\n\nCom o tamanho da força hostil que atacou, você não conseguirá fazer isso sozinho; você precisará trazer uma tripulação qualificada com você para <EM4>~mission(Location|Address)</EM4> a fim de eliminar esses fora da lei e recuperar a carga. Certifique-se de que pelo menos um de vocês tenha uma nave que possa armazenar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e um <EM4>raio trator de alta potência</EM4>.\n\nSe por algum milagre você conseguir recuperar essa carga, leve-a para o elevador de carga localizado em <EM4>~mission(Destination|Address)</EM4>.\n\nÉ pedir muito, mas se você conseguir realizar isso, terá a minha gratidão e a de toda a organização.\n\nBoa sorte,\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- C54 SMG\n- P8-SC SMG\n- S71 Rifle\n- [S1-A] C54 SMG Magazine (50 cap)\n- [S1-A] G-2 Helmet Woodland\n- [S1-A] ORC-mkV Arms\n- [S1-A] ORC-mkV Core\n- [S1-A] ORC-mkV Legs\n- [S1-A] ORC-mkX Arms Woodland\n- [S1-A] ORC-mkX Core Woodland\n- [S1-A] ORC-mkX Helmet Woodland\n- [S1-A] ORC-mkX Legs Woodland\n- [S1-A] P8-SC SMG Magazine (45 cap)\n- [S1-A] S71 Rifle Magazine (30 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Unknown:</EM4> 1\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
CFP_RecoverCargo_Super_Title=OPERAÇÃO ESPECIAL DE RECUPERAÇÃO <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
CFP_RecoverCargo_VeryHard_Description=Mais e mais naves da CFP estão sendo visadas ultimamente e, apesar de nossos melhores esforços para manter nossas rotas comerciais discretas, ainda estamos perdendo transportadores para ataques de fora da lei.\n\nNosso piloto em <EM4>~mission(Location|Address)</EM4> é a última vítima. Dói-me pensar em quanto perdemos, mas enquanto houver pessoas que precisam da nossa ajuda, temos que continuar lutando.\n\nSe você tiver uma nave que possa carregar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e um <EM4>raio trator de alta potência</EM4>, precisamos que você vá até o local acima e recupere essa carga.\n\nIsso não será fácil; o piloto era um dos nossos melhores e não cairia sem lutar. Não vamos subestimar esses fora da lei, traga uma tripulação de confiança e protejam-se uns aos outros.\n\nAssim que tiver a carga, entregue-a no elevador de carga em <EM4>~mission(Destination|Address)</EM4> e eu farei o processamento.\n\nBoa sorte e cuide-se,\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- C54 SMG\n- P8-SC SMG\n- S71 Rifle\n- [S1-A] C54 SMG Magazine (50 cap)\n- [S1-A] G-2 Helmet Woodland\n- [S1-A] ORC-mkV Arms\n- [S1-A] ORC-mkV Core\n- [S1-A] ORC-mkV Legs\n- [S1-A] ORC-mkX Arms Woodland\n- [S1-A] ORC-mkX Core Woodland\n- [S1-A] ORC-mkX Helmet Woodland\n- [S1-A] ORC-mkX Legs Woodland\n- [S1-A] P8-SC SMG Magazine (45 cap)\n- [S1-A] S71 Rifle Magazine (30 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Unknown:</EM4> 1\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
CFP_RecoverCargo_VeryHard_Title=A Remessa de Carga Deve Ser Finalizada <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
CFP_SabotageRelays_HH_001_Desc=A violência nunca é nossa primeira escolha, mas às vezes deve ser usada como medida preventiva.\n\nEstamos planejando um ataque a um posto avançado controlado pelos Headhunters e precisamos da sua ajuda.\n\nPrecisamos garantir que, se algo der errado, eles não possam chamar reforços e agravar a situação. É aí que você entra. Você precisa ir até <EM4>~mission(Location|Address)</EM4> e desativar as torres de comunicação. Deve haver um <EM4>painel de controle localizado no topo</EM4> de cada torre que você pode usar para desativá-las.\n\nSe você conseguir fazer isso, os Citizens for Prosperity poderão ganhar terreno vital em Pyro.\n\nTambém vale lembrar para contratos futuros que você pode optar por desativar as torres de comunicação em vez de arriscar uma luta com naves de reforço.\n\nFique atento e seguro.\n\nObrigado,\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +75
CFP_SabotageRelays_HH_001_Title=DESATIVAR TORRES DE COMUNICAÇÃO DOS HEADHUNTERS <EM4>[75 Rep]</EM4>
CFP_SabotageRelays_XT_001_Desc=Os Citizens for Prosperity estão ansiosos para ajudar o povo de Pyro, e isso começa libertando-os do domínio da XenoThreat.\n\nEstamos preparando uma equipe para infiltrar um de seus postos avançados, mas precisamos que alguém vá à frente para desativar as torres de comunicação primeiro. Uma vez que essas torres estejam offline, eles não poderão chamar reforços e podemos prosseguir com nosso plano.\n\nDirija-se a <EM4>~mission(Location|Address)</EM4> e encontre as torres. No <EM4>topo há um painel de controle</EM4> que pode ser usado para desativá-las.\n\nAlém disso, vale notar que a maioria dos postos avançados usa um sistema semelhante, então você saberá como desativar as torres de comunicação em vez de arriscar enfrentar naves de reforço ao realizar outras tarefas.\n\nBoa sorte,\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +100
CFP_SabotageRelays_XT_001_Title=DESATIVAR TORRES DE COMUNICAÇÃO DA XENOTHREAT <EM4>[100 Rep]</EM4>
CFP_SecurityPatrol_E_Desc_001=Notamos um aumento no tráfego em uma das rotas de viagem que monitoramos. É provável que não sejamos os únicos prestando atenção. Gostaria que você fosse até lá em uma nave pronta para combate e se certificasse de que não há foras da lei tentando se aproveitar dessa sensação de segurança.\n\nAssim que aceitar este contrato, siga para o <EM4>marcador de localização</EM4> em seu HUD e escaneie os pontos de passagem ao longo da rota. Após todos terem sido garantidos, o contratado principal receberá um bônus de <EM4>~mission(ScripAmount) Scrip MG.</EM4>\n\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Targets x15\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +100 Rep
CFP_SecurityPatrol_E_Title_001=Patrulhar Rotas de Viagem de Risco <EM4>[100 Rep]</EM4>
CFP_SecurityPatrol_H_Desc_001=Identificamos um setor que tem sido assolado por ataques de foras da lei recentemente e, esperançosamente, com a sua ajuda, podemos mudar isso. Sugerimos <EM4>trazer algum reforço</EM4> em naves prontas para combate para confrontar quaisquer forças hostis que você possa encontrar.\n\nAssim que aceitar este contrato, siga para o <EM4>marcador de localização</EM4> em seu HUD e escaneie os pontos de passagem ao longo da rota. Após todos terem sido garantidos, o contratado principal receberá um bônus de <EM4>~mission(ScripAmount) Scrip MG.</EM4>\n\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Targets x54\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Sr. Contractor:</EM4> +200 Rep
CFP_SecurityPatrol_H_Title_001=PATRULHAR ÁREA DE CAÇA DE FORAS DA LEI <EM4>[200 Rep]</EM4>
CFP_SecurityPatrol_M_Desc_001=Os foras da lei têm aumentado a atividade em uma das rotas mais populares do sistema e esperamos fornecer um impedimento antes que o problema fuja do controle. Por isso, gostaríamos que você fosse até lá em uma nave pronta para combate e lidasse com quaisquer hostis que possa encontrar.\n\nAssim que aceitar este contrato, siga para o <EM4>marcador de localização</EM4> em seu HUD e escaneie os pontos de passagem ao longo da rota. Após todos terem sido garantidos, o contratado principal receberá um bônus de <EM4>~mission(ScripAmount) Scrip MG.</EM4>\n\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Targets x23\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +150 Rep
CFP_SecurityPatrol_M_Title_001=Patrulhar Rotas de Viagem Perigosas <EM4>[150 Rep]</EM4>
CFP_SecurityPatrol_S_Desc_001=Após semanas vendo as taxas de criminalidade aumentarem, conseguimos identificar um setor que acreditamos ser a fonte da atividade de foras da lei que tem se espalhado pelas áreas circundantes. Embora seja demais esperar erradicar todas as ameaças, acreditamos que, ao enviar patrulhas de combate para a área, podemos começar a reverter esta tendência preocupante. Nossos analistas de combate internos recomendam trazer cerca de <EM4>três companheiros de esquadrão</EM4> em naves prontas para combate para confrontar quaisquer forças hostis que você possa encontrar.\n\nAssim que aceitar este contrato, siga para o <EM4>marcador de localização</EM4> em seu HUD e escaneie os pontos de passagem ao longo da rota. Após todos terem sido garantidos, o contratado principal receberá um bônus de <EM4>~mission(ScripAmount) Scrip MG.</EM4>\n\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 7/7\n<EM4>Hostiles:</EM4> Targets x88\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Head Contractor:</EM4> +300 Rep
CFP_SecurityPatrol_S_Title_001=Patrulhar Setor Extremamente Perigoso <EM4>[300 Rep]</EM4>
CFP_SecurityPatrol_VE_Desc_001=Precisamos de alguém com experiência em combate para patrulhar uma rota de viagem para nós. Ao longo dos anos, descobrimos que é bom ir até lá e nos tornarmos visíveis. Às vezes, um piloto como você viajando por uma área é suficiente para dissuadir quaisquer foras da lei em potencial. Mas, caso você encontre algum que esteja se sentindo um pouco mais ambicioso, é recomendável uma nave pronta para combate.\n\nAssim que aceitar este contrato, siga para o <EM4>marcador de localização</EM4> em seu HUD. Depois de escanear todos os pontos de passagem e garantir que a rota esteja segura, o contratado principal receberá um bônus de <EM4>~mission(ScripAmount) Scrip MG.</EM4>\n\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Targets x4\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep
CFP_SecurityPatrol_VE_Title_001=Patrulhar Rotas de Viagem <EM4>[100 Rep]</EM4>
CFP_SecurityPatrol_VH_Desc_001=Identificamos um setor que tem sido cada vez mais atormentado por ataques de foras da lei e achamos que, se começarmos a patrulhar ativamente a área, podemos reverter a situação. Recomendamos reunir pelo menos <EM4>dois companheiros de esquadrão</EM4> para ir até lá em naves prontas para combate e confrontar quaisquer forças hostis que você possa encontrar.\n\nAssim que aceitar este contrato, siga para o <EM4>marcador de localização</EM4> em seu HUD e escaneie os pontos de passagem ao longo da rota. Após todos terem sido garantidos, o contratado principal receberá um bônus de <EM4>~mission(ScripAmount) Scrip MG.</EM4>\n\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Targets x66\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Veteran Contractor:</EM4> +250 Rep
CFP_SecurityPatrol_VH_Title_001=Patrulhar Setor Perigoso de Foras da Lei <EM4>[250 Rep]</EM4>
CFP_ShipWaveAttack_ClearHostiles_Desc_E_001=Para ajudar a proteger nossos pilotos, a Citizens for Prosperity costuma recomendar o uso de rotas menos tradicionais pelo sistema. No entanto, parece que uma gangue de fora da lei ficou sabendo e começou a organizar emboscadas repetidas ao longo de uma dessas trajetórias de voo. Em vez de apenas contornar o problema e correr o risco de que ele persista na nova rota, sentimos que seria prudente enfrentar esses fora da lei de frente.\n\nVocê e quaisquer naves de apoio que recrutar deverão ir até ~mission(Location|Address) e neutralizar quaisquer hostis que encontrar à espera lá. Eles são conhecidos por operar em grupos menores, por isso é vital que você aguarde até que todos os hostis tenham sido eliminados.\n\nSua assistência é muito apreciada,\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x12\n<EM4>Jr. Contractor:</EM4> +100 Rep
CFP_ShipWaveAttack_ClearHostiles_Desc_H_001=Uma frota criminosa se estabeleceu em um setor que a Citizens For Prosperity está tentando desenvolver, e todo o progresso parou devido às suas ações violentas. É imperativo para nossos objetivos de longo prazo que encontremos uma maneira de neutralizar esta frota antes que causem mais danos.\n\nVocê e suas naves de apoio mais confiáveis irão para ~mission(Location|Address) e neutralizarão quaisquer hostis que encontrarem à espera lá. Eles são conhecidos por operar em grupos menores, então é vital que você aguarde até que todos os hostis tenham sido eliminados.\n\nSua assistência é muito apreciada,\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x22\n<EM4>Sr. Contractor:</EM4> +200 Rep
CFP_ShipWaveAttack_ClearHostiles_Desc_M_001=Parece que sempre que começamos a fazer um progresso real no sistema, os fora da lei estão lá para nos empurrar um passo para trás. Recentemente havíamos limpado ~mission(Location|Address), apenas para saber que uma nova gangue de fora da lei se estabeleceu lá, usando o local como ponto de partida para vários empreendimentos criminosos.\n\nComo não podemos permitir que essa podridão se espalhe, você e algumas naves de apoio estão encarregados de ir até lá para eliminar todos os grupos da gangue. Depois de lidar com um grupo, certifique-se de esperar até que todos os grupos hostis tenham sido eliminados.\n\nSaiba que você está ajudando a fazer uma diferença real,\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x13\n<EM4>Contractor:</EM4> +150 Rep
CFP_ShipWaveAttack_ClearHostiles_Desc_VE_001=Recentemente, tivemos relatórios de incidentes de vários contratados da Citizens for Prosperity no sistema que tiveram problemas com um grupo de caça de fora da lei operando em ~mission(Location|Address).\n\nPara ajudar a restabelecer rotas mais seguras através desse setor, você será enviado para lá para enfrentar esses fora da lei. O grupo é conhecido por viajar em bandos menores, por isso é importante que você e qualquer reforço que trouxer aguardem na área para lidar com todos eles, caso contrário, há uma chance de a ameaça permanecer.\n\nObrigado por nos ajudar,\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Neutral:</EM4> +100 Rep
CFP_ShipWaveAttack_ClearHostiles_Title_E_001=Limpar Hostis da Rota da CFP <EM4>[100 Rep]</EM4>
CFP_ShipWaveAttack_ClearHostiles_Title_H_001=Neutralizar Frota Criminosa Perigosa <EM4>[200 Rep]</EM4>
CFP_ShipWaveAttack_ClearHostiles_Title_M_001=Remover Gangue Emergente do Setor <EM4>[150 Rep]</EM4>
CFP_ShipWaveAttack_ClearHostiles_Title_VE_001=AJUDAR A LIDAR COM GRUPO DE CAÇA DE FORA DA LEI <EM4>[100 Rep]</EM4>
CleanAir_Collect-Milestone1_desc=\nDeixe-me começar dizendo que seu trabalho contínuo ajudando os esforços da Alliance Aid até agora fez uma diferença considerável não apenas para nós na Rayari, mas para o restante das organizações que coordenam com a Divisão de Coleta. É por isso que eu quis entrar em contato com você diretamente. \n\nEmbora tenhamos dado grandes passos no combate a esta crise de saúde contínua, há uma preocupação entre nossos pesquisadores de que o Mofo Molina tenha o potencial de sofrer mutação para uma nova cepa fúngica. \nPara garantir que nossa investigação contínua sobre o mofo seja o mais precisa possível, gostaríamos que você fosse até a fonte do crescimento em Levski e <EM4> colhesse novas amostras do Mofo Molina </EM4> diretamente lá. \n\nDepois de coletar as amostras, você precisará entregá-las em <EM4>~mission(Destination|Address)</EM4>. \n\nObrigada por sua ajuda nesta conjuntura vital. \n\nNarina Lerrem\nGerente Sênior\nTerceirização de Pesquisa Clínica\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Unique, Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Unknown:</EM4> 1\n<EM4>Rep:</EM4> +424
CleanAir_Collect-Milestone1_title=Alliance Aid: Amostras de Mofo Molina <EM4>[424 Rep]</EM4>
CleanAir_Courier_Combat_desc=ATENÇÃO A TODOS OS ENTREGADORES DA FTL\nPARA ATRIBUIÇÃO IMEDIATA\n\n**DETALHES DO CONTRATO** \n\nLOCAL DE COLETA – Uma nave da FTL transportando uma entrega para a Alliance Aid caiu em <EM4>~mission(Location|Address)</EM4>. É necessário um entregador para recuperar o pacote e continuar a entrega.\n\nLOCAL DE ENTREGA – O pacote deve ser levado para <EM4>~mission(Destination|Target|Address)</EM4>. \n\nNÍVEL DE AMEAÇA – Há uma grande chance de que o entregador tenha sido atacado por foras da lei ansiosos para adquirir os suprimentos vitais necessários para deter o surto de mofo Molina em Levski. Esperam-se <EM4>confrontos de nível médio</EM4>.\n\nTRANSPORTE – Todas as necessidades de transporte devem ser providenciadas pelo entregador. \n\nA FTL Courier Services agradece por nos ajudar a fazer a nossa parte pela Alliance Aid.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Unknown:</EM4> 3\n<EM4>Rep:</EM4> +225
CleanAir_Courier_Derelict_desc=ATENÇÃO A TODOS OS ENTREGADORES DA FTL\nPARA ATRIBUIÇÃO IMEDIATA\n\n**DETALHES DO CONTRATO** \n\nLOCAL DE COLETA – Uma nave da FTL transportando uma entrega para a Alliance Aid não concluiu seu contrato. A última localização conhecida indica que ela ainda está em <EM4>~mission(Location|Address)</EM4>. É necessário um entregador para recuperar o pacote e continuar a entrega.\n\nLOCAL DE ENTREGA – O pacote deve ser levado para <EM4>~mission(Destination|Target|Address)</EM4>. \n\nNÍVEL DE AMEAÇA – Não está claro o que aconteceu com a nave, mas suspeitamos de um mau funcionamento. Ainda assim, recomenda-se cautela. Esperam-se <EM4>confrontos de baixo nível</EM4>.\n\nTRANSPORTE – Todas as necessidades de transporte devem ser providenciadas pelo entregador. \n\nA FTL Courier Services orgulha-se de estar auxiliando nos esforços da Alliance Aid para ajudar a combater o surto em Levski.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 6\n<EM4>Rep:</EM4> +150
CleanAir_Courier_Derelict_title=ALLIANCE AID: RECUPERAÇÃO DE PACOTE VITAL <EM4>[150 Rep]</EM4>
CleanAir_Courier_title=Alliance Aid: Precisa-se de Entregador <EM4>[225 Rep]</EM4>
CleanAir_DefendShip_Easy_desc=Perdemos o contato com um comboio de suprimentos da Alliance Aid e tememos que ele possa estar sob ataque de foras da lei. Precisamos que você corra para <EM4>~mission(Location|Address)</EM4> e dê suporte a eles. Qualquer atraso nos esforços de ajuda em curso pode custar vidas em Levski.\n\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Rep:</EM4> +150
CleanAir_DefendShip_Easy_title=Alliance Aid: Nave em Apuros <EM4>[150 Rep]</EM4>
CleanAir_DefendShip_Hard_desc=Todos têm se unido à Alliance Aid para ajudar com a crise contínua em Levski, mas parece que não se pode fazer o bem neste universo sem atrair o mal. Um dos comboios de ajuda crítica acaba de ser atacado por uma poderosa frota de foras da lei. Precisamos que você <EM4>reúna sua própria frota</EM4> e mobilize-se para <EM4>~mission(Location|Address)</EM4> o mais rápido possível. Com sorte, você poderá corrigir este erro antes que seja tarde demais.\n\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Rep:</EM4> +300
CleanAir_DefendShip_Hard_title=Alliance Aid: Nave sob Ataque <EM4>[300 Rep]</EM4>
CleanAir_DefendShip_Medium_desc=Você imaginaria que esses foras da lei teriam a decência de não interferir nos esforços de ajuda, mas, infelizmente, recebemos a notícia de que um comboio da Alliance Aid está sob ataque. Esses criminosos parecem ser uma ameaça séria, então recomenda-se que você <EM4>traga algum apoio</EM4> com você. \n\nQuando estiver pronto, vá para <EM4>~mission(Location|Address)</EM4> e enfrente esses criminosos de frente.\n\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Rep:</EM4> +225
CleanAir_DefendShip_Medium_title=Alliance Aid: Nave em Perigo <EM4>[225 Rep]</EM4>
CleanAir_Defense-Milestone1_desc=Como você tem trabalhado tanto ajudando a Divisão de Defesa, eu quis trazer este contrato diretamente a você. É um caso um tanto delicado. Dois VIPs adoeceram e a preocupação era que, se a notícia de que estavam sendo transportados se espalhasse, eles se tornariam alvos importantes.\n\nInfelizmente, parece que foi exatamente o que aconteceu. Nossas tentativas de levá-los clandestinamente de Nyx para Stanton para tratamento médico falharam, e agora a nave que os transporta está sob ataque. \n\nPrecisamos que você se apresse até <EM4>~mission(Location|Address)</EM4>, neutralize os atacantes e garanta que as criopods cheguem em segurança ao elevador de carga em <EM4>~mission(Destination|Address)</EM4>. \n\nNa verdade, eu quero que você se certifique de ter uma nave que possa transportar as cápsulas criogênicas, caso o transporte original esteja danificado demais para seguir viagem.\n\nEspero sinceramente que você consiga realizar esta missão de resgate. \n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Unique, Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Unknown:</EM4> 1\n<EM4>Rep:</EM4> +675
CleanAir_Defense-Milestone1_title=ALLIANCE AID: MISSÃO DE RESGATE URGENTE <EM4>[675 Rep]</EM4>
CleanAir_EscortShip_Easy_desc=A Citizens for Prosperity precisa de um piloto experiente em combate para fornecer suporte extra a um piloto da Alliance Aid que está realizando uma viagem vital de <EM4>~mission(Location|Address)</EM4> para o esforço contínuo de ajuda. \n\nOs foras da lei têm lançado mais ataques devido ao aumento da atividade causado pelo surto do mofo Molina, então será seu trabalho garantir que eles permaneçam seguros enquanto completam seu trabalho. Esta rota é relativamente segura, então não espero muitos problemas, mas é melhor não arriscar.\n\nSe estiver interessado, você deve se encontrar lá e aguardar novas instruções.\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2, Reinforcements x4\n<EM4>Friendlies:</EM4> Escort Wings x1\n<EM4>Rep:</EM4> +120
CleanAir_EscortShip_Easy_title=Alliance Aid: Precisa-se de Escolta <EM4>[120 Rep]</EM4>
CleanAir_EscortShip_Hard_desc=A Alliance Aid tem uma nave vital para o esforço de ajuda partindo de <EM4>~mission(Location|Address)</EM4>. Eles receberam ameaças confiáveis de que podem ser atacados e estão procurando reforçar a segurança.\n\nQuando estiver pronto, dirija-se ao ponto de encontro com <EM4>quaisquer naves de combate adicionais que você possa recrutar</EM4> e aguarde novas instruções.\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x2, Reinforcements x4\n<EM4>Friendlies:</EM4> Escort Wings x1\n<EM4>Rep:</EM4> +150
CleanAir_EscortShip_Hard_title=ALLIANCE AID: NECESSÁRIO DESTACAMENTO DE PROTEÇÃO <EM4>[150 Rep]</EM4>
CleanAir_EscortShip_Medium_desc=Fui contatado por um representante da Alliance Aid que está profundamente preocupado com um de seus contratados saindo de <EM4>~mission(Location|Address)</EM4>. As naves que ajudam no esforço de socorro têm atraído muita atenção de foras da lei e eles temem que, sem proteção extra, não consigam concluir seu trabalho vital. \n\nDevido ao aumento do nível de risco e ao valor da nave, convém que você <EM4>traga algum apoio de combate</EM4> próprio.\n\nSe estiver interessado, vá para o ponto de encontro e aguarde novas instruções.\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x2, Reinforcements x4\n<EM4>Friendlies:</EM4> Escort Wings x1\n<EM4>Rep:</EM4> +135
CleanAir_EscortShip_Medium_title=ALLIANCE AID: SEGURANÇA NECESSÁRIA <EM4>[135 Rep]</EM4>
CleanAir_Hauling_Bulk_MedicalSupplies_desc=Olá,\n\nO surto do Mal do Povo causado pelo Mofo Molina sobrecarregou a disponibilidade de suprimentos médicos. Tenho uma rota prioritária de grande escala aqui para reabastecer <EM4>~mission(Destination|Address)</EM4> com os produtos farmacêuticos e equipamentos necessários. Alguma chance de você estar disponível?\n\nA coleta para este transporte é em <EM4>~mission(Location|Address)</EM4>. Você lidará com contêineres de até <EM4>~mission(MissionMaxSCUSize)</EM4> de tamanho. Certifique-se de trazer um <EM4>raio trator portátil</EM4> e uma nave que comporte contêineres desse tamanho. \n\nElla Tieno\nCoord. de Logística Jr.\nCovalex Shipping \n"Tudo o que você precisa, onde quer que precise."\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +540
CleanAir_Hauling_Bulk_MedicalSupplies_desc_02=Olá,\n\nCom a emergência contínua em Levski, a Alliance Aid precisa de todos os esforços para ajudar a transportar suprimentos médicos suficientes para salvar o maior número possível de vidas. Há um transporte de grande escala em <EM4>~mission(Location|Address)</EM4> pronto para ser levado para <EM4>~mission(Destination|Address)</EM4>.\n\nEsta rota precisa de um transportador com uma nave que possa conter <EM4>contêineres de carga de ~mission(MissionMaxSCUSize)</EM4>. Você também precisará de um <EM4>raio trator portátil</EM4> para lidar com as caixas. \n\nPor favor, avise-nos se puder cuidar disso para nós. \n\nTransporte Seguro, \nReyes Ling \nCoordenador de Logística de Carga\nLing Family Hauling\n\nA Ling Family Hauling sabe que este é um universo perigoso e imprevisível e estabeleceu diversos protocolos para proteger tanto você quanto a carga de nosso cliente. Para garantir que você não seja punido por circunstâncias fora de seu controle, o pagamento total será proporcional à porcentagem de carga entregue com sucesso. Um cronômetro de entrega será definido para cada transporte. Qualquer carga que permanecer sem entrega após a expiração será sinalizada como roubada e tratada como tal. Todas as coletas e entregas devem ser carregadas automaticamente ou feitas em um elevador de carga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Rep:</EM4> +285
CleanAir_Hauling_Bulk_MedicalSupplies_title=ALLIANCE AID: TRANSPORTE INTERESTELAR DE GRANDE CARGA (MÉDICO) <EM4>[540 Rep]</EM4>
CleanAir_Hauling_Bulk_MedicalSupplies_title_02=ALLIANCE AID: TRANSPORTE DE CARGA MÉDICA - GRANDE ESCALA <EM4>[285 Rep]</EM4>
CleanAir_Hauling_Bulk_MoldSample_desc=Ei,\n\nUma equipe especial de contenção em <EM4>~mission(Location|Address)</EM4> coletou e embalou de forma segura amostras suficientes de mofo Molina para um transporte em larga escala. Pesquisadores em <EM4>~mission(Destination|Address)</EM4> aguardam ansiosamente sua chegada para que possam continuar seus testes. Alguma chance de você fazer essa rota por nós?\n\nConfirmei com a equipe de contenção que eles usaram contêineres de nível de risco biológico, então não há risco de você contrair o Mal do Povo. Apenas traga uma nave que possa transportar <EM4>contêineres de carga de ~mission(MissionMaxSCUSize)</EM4> e um <EM4>raio trator portátil</EM4>.\n\nEspero que seja um transporte seguro e tranquilo para você,\n\nElla Tieno\nCoord. de Logística Jr.\nCovalex Shipping \n"Tudo o que você precisa, onde quer que precise."\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +600
CleanAir_Hauling_Bulk_MoldSample_title=Alliance Aid: Transporte Interestelar de Grande Carga (Pesquisa) <EM4>[600 Rep]</EM4>
CleanAir_Hauling_Bulk_MoldTreatment_desc=Oi,\n\nAs pessoas estão suspirando de alívio por um tratamento para o Mal do Povo ter sido encontrado, mas ainda não saímos do perigo. Ainda há muitas pessoas sofrendo. Esperamos que você possa ajudar a causa lidando com um transporte em larga escala do material. \n\nSe estiver disponível, precisamos que você retire em <EM4>~mission(Location|Address)</EM4> e depois voe até <EM4>~mission(Destination|Address)</EM4>. Lembre-se de trazer um <EM4>raio trator portátil</EM4> e uma nave que possa conter <EM4>contêineres de carga de ~mission(MissionMaxSCUSize)</EM4>. \n \n\nTransporte Seguro, \nReyes Ling \nCoordenador de Logística de Carga\nLing Family Hauling\n\nA Ling Family Hauling sabe que este é um universo perigoso e imprevisível e estabeleceu diversos protocolos para proteger tanto você quanto a carga de nosso cliente. Para garantir que você não seja punido por circunstâncias fora de seu controle, o pagamento total será proporcional à porcentagem de carga entregue com sucesso. Um cronômetro de entrega será definido para cada transporte. Qualquer carga que permanecer sem entrega após a expiração será sinalizada como roubada e tratada como tal. Todas as coletas e entregas devem ser carregadas automaticamente ou feitas em um elevador de carga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +570 Rep\n<EM4>Tier 2:</EM4> +600 Rep
CleanAir_Hauling_Bulk_MoldTreatment_title=Alliance Aid: Transporte de Carga de Tratamento - Grande Escala <EM4>[570–600 Rep]</EM4>
CleanAir_Hauling_Bulk_Ventfilters_desc=Ei,\n\nAjude-nos a pôr um fim à Aflição do Povo transportando novos filtros de ventilação para locais que precisam de substituições. \n\nAqui está uma rota para eles de <EM4>~mission(Location|Address)</EM4> para <EM4>~mission(Destination|Address)</EM4>. Este é um transporte em larga escala, então traga uma nave que caiba tudo. O manifesto também especifica que o maior contêiner com o qual você lidará é de <EM4>~mission(MissionMaxSCUSize)</EM4>. Recomendamos fortemente trazer um <EM4>raio trator portátil</EM4> para lidar com eles. \n\nObrigado por se juntar a nós e à Alliance Aid para ajudar a levar esta crise ao fim!\n\nElla Tieno\nCoord. de Logística Jr.\nCovalex Shipping \n"Tudo o que você precisa, onde quer que precise."\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +600
CleanAir_Hauling_Bulk_Ventfilters_title=Alliance Aid: Transporte Interestelar de Grande Carga (Filtros) <EM4>[600 Rep]</EM4>
CleanAir_Hauling_Small_Cryopods_desc=Olá,\n\nTenho uma ordem de transporte extremamente importante e sensível aqui que espero que você possa realizar. Para reduzir as fatalidades do surto de mofo Molina, aqueles que sofrem do Mal do Povo estão sendo colocados em criopods para impedir que a doença progrida antes de receberem o tratamento necessário. \n\nVocê pode ir até <EM4>~mission(Location|Address)</EM4> para retirar um transporte de pequena escala de criopods e levá-los para <EM4>~mission(Destination|Address)</EM4> para que possam receber a ajuda necessária? \n\nSe você nunca lidou com um criopod antes, precisará de uma nave com um porão que comporte um contêiner de até <EM4>~mission(MissionMaxSCUSize)</EM4> de tamanho. Um <EM4>raio trator portátil</EM4> também será necessário para movê-los. \n\nObrigado por se juntar a nós e à Alliance Aid para ajudar a levar esta crise ao fim!\n\nElla Tieno\nCoord. de Logística Jr.\nCovalex Shipping \n"Tudo o que você precisa, onde quer que precise."\n\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +390
CleanAir_Hauling_Small_Cryopods_title=ALLIANCE AID: TRANSPORTE INTERESTELAR DE PEQUENA CARGA (CÁPSULAS CRIOGÊNICAS) <EM4>[390 Rep]</EM4>
CleanAir_Hauling_Small_MedicalSupplies_desc=Ei,\n\nHouve um aumento na demanda por suprimentos médicos desde que o surto de mofo Molina começou. É por isso que a equipe médica em <EM4>~mission(Destination|Address)</EM4> está ficando sem alguns itens essenciais e não pode esperar pelo reabastecimento regular. Alguma chance de você estar disponível para fazer uma rota prioritária para lá agora?\n\nAs mercadorias estão prontas e aguardando em <EM4>~mission(Location|Address)</EM4>. É um transporte de pequena escala, mas você ainda precisará de um <EM4>raio trator portátil</EM4>. Parece que os contêineres terão até <EM4>~mission(MissionMaxSCUSize)</EM4> de tamanho.\n\nEspero que seja um transporte seguro e tranquilo para você, \n\nElla Tieno\nCoord. de Logística Jr.\nCovalex Shipping \n"Tudo o que você precisa, onde quer que precise."\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +360
CleanAir_Hauling_Small_MedicalSupplies_desc_02=Oi,\n\nParece que as pessoas esgotaram seus recursos médicos tentando descobrir como tratar o Mal do Povo. A Alliance Aid está sobrecarregada com pedidos de transporte de suprimentos médicos no momento. Você pode me ajudar a concluir um deles?\n\nAqui está um de pequena escala pronto para começar. Os suprimentos estão em <EM4>~mission(Location|Address)</EM4> e a entrega deve ser feita em <EM4>~mission(Destination|Address)</EM4>. Tudo o que é necessário é um <EM4>raio trator portátil</EM4> para mover a carga e uma nave que comporte <EM4>contêineres de carga de ~mission(MissionMaxSCUSize)</EM4>. \n\n\nTransporte Seguro, \nReyes Ling \nCoordenador de Logística de Carga\nLing Family Hauling\n\nA Ling Family Hauling sabe que este é um universo perigoso e imprevisível e estabeleceu diversos protocolos para proteger tanto você quanto a carga de nosso cliente. Para garantir que você não seja punido por circunstâncias fora de seu controle, o pagamento total será proporcional à porcentagem de carga entregue com sucesso. Um cronômetro de entrega será definido para cada transporte. Qualquer carga que permanecer sem entrega após a expiração será sinalizada como roubada e tratada como tal. Todas as coletas e entregas devem ser carregadas automaticamente ou feitas em um elevador de carga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Rep:</EM4> +225
CleanAir_Hauling_Small_MedicalSupplies_title=ALLIANCE AID: TRANSPORTE INTERESTELAR DE PEQUENA CARGA (MÉDICO) <EM4>[360 Rep]</EM4>
CleanAir_Hauling_Small_MedicalSupplies_title_02=ALLIANCE AID: TRANSPORTE DE CARGA MÉDICA - PEQUENA ESCALA <EM4>[225 Rep]</EM4>
CleanAir_Hauling_Small_MoldSample_desc=Olá,\n\nCientistas em <EM4>~mission(Destination|Address)</EM4> estão desesperados para colocar as mãos em amostras de mofo Molina para que possam submetê-las a uma bateria de testes. Acabamos de receber a notícia de que há um pequeno transporte de amostras aguardando em <EM4>~mission(Location|Address)</EM4> para que eles as utilizem. Você está disponível para fazer esta rota? \n\nVocê precisará de uma nave que comporte contêineres de carga de até <EM4>~mission(MissionMaxSCUSize)</EM4> de tamanho, e um <EM4>raio trator portátil</EM4> para lidar com eles. Finalmente, para sua tranquilidade, as amostras de mofo foram embaladas de forma segura e protegida dentro das caixas, então não há risco de você ficar doente. \n\n\nElla Tieno \nCoord. de Logística Jr. \nCovalex Shipping \n"Tudo o que você precisa, onde quer que precise."\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +405
CleanAir_Hauling_Small_MoldSample_title=Alliance Aid: Transporte Interestelar de Pequena Carga (Pesquisa) <EM4>[405 Rep]</EM4>
CleanAir_Hauling_Small_MoldTreatment_desc=Oi,\n\nNós nos juntamos ao esforço para ajudar os afetados pelo surto de mofo Molina. Há um transporte de pequena escala de tratamento urgentemente necessário aguardando coleta em <EM4>~mission(Location|Address)</EM4> para ser entregue em <EM4>~mission(Destination|Address)</EM4>. Alguma chance de você estar disponível? \n \nTudo o que você precisará é de uma nave que comporte <EM4>contêineres de carga de ~mission(MissionMaxSCUSize)</EM4> e um <EM4>raio trator portátil</EM4> para facilitar a movimentação da carga. \n \n\nTransporte Seguro, \nReyes Ling \nCoordenador de Logística de Carga\nLing Family Hauling\n\nA Ling Family Hauling sabe que este é um universo perigoso e imprevisível e estabeleceu diversos protocolos para proteger tanto você quanto a carga de nosso cliente. Para garantir que você não seja punido por circunstâncias fora de seu controle, o pagamento total será proporcional à porcentagem de carga entregue com sucesso. Um cronômetro de entrega será definido para cada transporte. Qualquer carga que permanecer sem entrega após a expiração será sinalizada como roubada e tratada como tal. Todas as coletas e entregas devem ser carregadas automaticamente ou feitas em um elevador de carga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +225 Rep\n<EM4>Tier 2:</EM4> +405 Rep
CleanAir_Hauling_Small_MoldTreatment_title=Alliance Aid: Transporte de Carga de Tratamento - Pequena Escala <EM4>[225–405 Rep]</EM4>
CleanAir_Hauling_Small_Ventfilters_desc=Olá,\n\nEste surto de Mofo Molina realmente deixou as pessoas nervosas. Os pedidos de transporte para novos filtros de ventilação estão indo às alturas, até mesmo de lugares que não usavam aqueles filtros baratos da Gyson. \n\nDe qualquer forma, tenho um transporte desse tipo aqui que esperava que você pudesse resolver. É um transporte de pequena escala de filtros aguardando em <EM4>~mission(Location|Address)</EM4> que precisa ir para <EM4>~mission(Destination|Address)</EM4>. Você está livre para cuidar disso? \n\nDe acordo com os detalhes do transporte, os contêineres serão de tamanho <EM4>~mission(MissionMaxSCUSize)</EM4> ou menores. Não se esqueça de trazer um <EM4>raio trator portátil</EM4> para ajudar a mover tudo. \n\nAgradecemos por assumir essa rota importante por nós!\n\nElla Tieno\nCoord. de Logística Jr.\nCovalex Shipping \n"Tudo o que você precisa, onde quer que precise."\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +405
CleanAir_Hauling_Small_Ventfilters_title=Alliance Aid: Transporte Interestelar de Pequena Carga (Filtros) <EM4>[405 Rep]</EM4>
CleanAir_Hauling_Supply_Cryopods_desc=Olá,\n\nCom as instalações médicas completamente sobrecarregadas pelo surto de mofo Molina, eles recorreram à colocação de pessoas em criopods para evitar que fiquem mais doentes. Felizmente, o pessoal em <EM4>~mission(Destination|Address)</EM4> liberou espaço hospitalar para tratar um punhado de pessoas afetadas. Tudo o que precisam agora são dos pacientes.\n\nProcuro alguém disposto a retirar alguns criopods de <EM4>~mission(Location|Address)</EM4> com uma nave que comporte contêineres de até <EM4>~mission(MissionMaxSCUSize)</EM4> de tamanho. Você também precisará de um <EM4>raio trator portátil</EM4>. Não tenho certeza se você já moveu um criopod antes, mas não é exatamente algo que se possa carregar na mão. \n\n\nElla Tieno\nCoord. de Logística Jr.\nCovalex Shipping \n"Tudo o que você precisa, onde quer que precise."\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +465
CleanAir_Hauling_Supply_Cryopods_title=ALLIANCE AID: TRANSPORTE INTERESTELAR DE CARGA MÉDIA (CÁPSULAS CRIOGÊNICAS) <EM4>[465 Rep]</EM4>
CleanAir_Hauling_Supply_MedicalSupplies_desc=Espero que esta mensagem o encontre bem,\n\nAs coisas estão um pouco mais malucas do que o normal por aqui devido à quantidade de pilotos nossos que acabaram adoecendo enquanto faziam rotas para Levski. Felizmente, a Covalex está contribuindo com a "Alliance Aid", então esperamos poder deixar todo esse assunto para trás em breve. \n\nAtualmente, tenho um transporte de média escala de suprimentos médicos aguardando em <EM4>~mission(Location|Address)</EM4>. Realmente preciso de alguém para levá-lo até <EM4>~mission(Destination|Address)</EM4>, para que a equipe de lá possa operar com capacidade total. \n\nO maior contêiner nesta rota será de tamanho <EM4>~mission(MissionMaxSCUSize)</EM4>, então tenha uma nave que possa lidar com eles. Ah, e não se esqueça do seu <EM4>raio trator portátil</EM4>. \n\nObrigado por se juntar a nós e à Alliance Aid para ajudar a levar esta crise ao fim!\n\nElla Tieno\nCoord. de Logística Jr.\nCovalex Shipping \n"Tudo o que você precisa, onde quer que precise."\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +465
CleanAir_Hauling_Supply_MedicalSupplies_desc_02=Olá,\n\nPrecisamos da sua ajuda! Suprimentos médicos estão em alta demanda depois que o surto de mofo Molina esgotou os estoques. Felizmente, há um transporte de média escala do material em <EM4>~mission(Location|Address)</EM4> pronto para ser levado para <EM4>~mission(Destination|Address)</EM4>.\n\nEsta rota precisa de um transportador com uma nave que comporte <EM4>contêineres de carga de ~mission(MissionMaxSCUSize)</EM4>. Você também precisará de um <EM4>raio trator portátil</EM4> para lidar com as caixas. \n\nPor favor, avise-me se puder cuidar disso para nós. \n\nTransporte Seguro, \nReyes Ling \nCoordenador de Logística de Carga\nLing Family Hauling\n\nA Ling Family Hauling sabe que este é um universo perigoso e imprevisível e estabeleceu diversos protocolos para proteger tanto você quanto a carga de nosso cliente. Para garantir que você não seja punido por circunstâncias fora de seu controle, o pagamento total será proporcional à porcentagem de carga entregue com sucesso. Um cronômetro de entrega será definido para cada transporte. Qualquer carga que permanecer sem entrega após a expiração será sinalizada como roubada e tratada como tal. Todas as coletas e entregas devem ser carregadas automaticamente ou feitas em um elevador de carga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Rep:</EM4> +390
CleanAir_Hauling_Supply_MedicalSupplies_title=ALLIANCE AID: TRANSPORTE INTERESTELAR DE CARGA MÉDIA (MÉDICO) <EM4>[465 Rep]</EM4>
CleanAir_Hauling_Supply_MedicalSupplies_title_02=ALLIANCE AID: TRANSPORTE DE CARGA MÉDICA - MÉDIA ESCALA <EM4>[390 Rep]</EM4>
CleanAir_Hauling_Supply_MoldSample_desc=Ei,\n\nTenho uma rota importante aqui que precisamos que seja realizada. Há um transporte de média escala de amostras de mofo Molina embaladas com segurança e aguardando em <EM4>~mission(Location|Address)</EM4>. Preciso de alguém para retirar os contêineres e levá-los até <EM4>~mission(Destination|Address)</EM4> para auxiliar na pesquisa deles. \n \nEmbora o mofo seja extremamente tóxico, esses contêineres manterão você seguro. Tudo o que você precisa se preocupar é em ter uma nave grande o suficiente para carregar contêineres de carga de até <EM4>~mission(MissionMaxSCUSize)</EM4> de tamanho. Além disso, você precisará de um <EM4>raio trator portátil</EM4> para poder mover tudo de forma rápida e eficiente. \n\nAgradecemos por assumir essa rota importante por nós!\n\nElla Tieno \nCoord. de Logística Jr. \nCovalex Shipping \n"Tudo o que você precisa, onde quer que precise."\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +465
CleanAir_Hauling_Supply_MoldSample_title=ALLIANCE AID: TRANSPORTE INTERESTELAR DE CARGA MÉDIA (PESQUISA) <EM4>[465 Rep]</EM4>
CleanAir_Hauling_Supply_MoldTreatment_desc=Ei,\n\nÉ de partir o coração ouvir o que está acontecendo com as pessoas em Levski com esse surto de mofo Molina, não é? Nossa família decidiu fazer todo o possível para ajudar com a Alliance Aid. Temos um transporte de média escala de antifúngico aguardando coleta em <EM4>~mission(Location|Address)</EM4> para ser levado para <EM4>~mission(Destination|Address)</EM4>. Acha que pode cuidar disso para nós?\n\nAntes de ir, certifique-se de trazer uma nave que comporte <EM4>contêineres de carga de ~mission(MissionMaxSCUSize)</EM4>. Você também precisará de um <EM4>raio trator portátil</EM4> para lidar com os contêineres. \n \n\nTransporte Seguro, \nReyes Ling \nCoordenador de Logística de Carga\nLing Family Hauling\n\nA Ling Family Hauling sabe que este é um universo perigoso e imprevisível e estabeleceu diversos protocolos para proteger tanto você quanto a carga de nosso cliente. Para garantir que você não seja punido por circunstâncias fora de seu controle, o pagamento total será proporcional à porcentagem de carga entregue com sucesso. Um cronômetro de entrega será definido para cada transporte. Qualquer carga que permanecer sem entrega após a expiração será sinalizada como roubada e tratada como tal. Todas as coletas e entregas devem ser carregadas automaticamente ou feitas em um elevador de carga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +375 Rep\n<EM4>Tier 2:</EM4> +465 Rep
CleanAir_Hauling_Supply_MoldTreatment_title=ALLIANCE AID: TRANSPORTE DE CARGA DE TRATAMENTO - MÉDIA ESCALA <EM4>[375–465 Rep]</EM4>
CleanAir_Hauling_Supply_Ventfilters_desc=Ei,\n\nHá um transporte de média escala de novos filtros de ventilação em <EM4>~mission(Location|Address)</EM4> aguardando para ir para <EM4>~mission(Destination|Address)</EM4>. Você está disponível para cuidar disso? \n\nA equipe em <EM4>~mission(Destination)</EM4> está obviamente muito ansiosa para receber esses novos filtros e não para de me amolar sobre esse transporte até que eu dê uma previsão de entrega. Não é de se admirar, com o quão preocupados todos estão com esse surto de mofo Molina. Deve ser uma rota fácil. Tudo o que é necessário é uma nave que comporte contêineres de tamanho <EM4>~mission(MissionMaxSCUSize)</EM4> ou menores, e um <EM4>raio trator portátil</EM4>. \n\nElla Tieno\nCoord. de Logística Jr.\nCovalex Shipping \n"Tudo o que você precisa, onde quer que precise."\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +465
CleanAir_Hauling_Supply_Ventfilters_title=ALLIANCE AID: TRANSPORTE INTERESTELAR DE CARGA MÉDIA (FILTROS) <EM4>[465 Rep]</EM4>
CleanAir_Killship_Easy_desc=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Neutralizar Nave \nCÓDIGO DE APROVAÇÃO = RT-04\n\nPARA PROCESSAMENTO IMEDIATO\n\nCom carregamentos valiosos sendo transportados para Levski graças a toda essa iniciativa da Alliance Aid, os foras da lei estão felizes da vida visando os transportadores carregados. Um canalha em particular, <EM4>~mission(TargetName)</EM4>, já atingiu meia dúzia de naves até agora e todos estão ansiosos para interromper essa onda de crimes.\n\nEles foram vistos pela última vez hostilizando naves em <EM4>~mission(Location|Address)</EM4>. Vá até lá e neutralize a nave deles. O pagamento será efetuado assim que forem neutralizados. \n\nEste contrato é não negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. A informação destina-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 2\n<EM4>Rep:</EM4> +75
CleanAir_Killship_Easy_title=ALLIANCE AID: LADRÃO DE SUPRIMENTOS <EM4>[75 Rep]</EM4>
CleanAir_Killship_Hard_desc=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Neutralizar Nave \nCÓDIGO DE APROVAÇÃO = RT-06\n\nPARA PROCESSAMENTO IMEDIATO\n\nUma das gangues locais de Nyx, os Moraine, tem se aproveitado da emergência atual em Levski e conta com um de seus melhores pilotos, <EM4>~mission(TargetName)</EM4>, liderando ataques contra quaisquer transportadores da Alliance Aid que conseguirem encontrar. No ritmo em que estão roubando suprimentos do esforço de ajuda, a menos que sejam parados logo, muitas pessoas doentes em Levski ficarão sem o auxílio de que precisam.\n\nConseguimos rastrear o grupo até <EM4>~mission(Location|Address)</EM4>, mas antes de partir, você precisará fazer seu próprio recrutamento. A menos que você <EM4>leve alguns alas com você</EM4>, não temos certeza se será capaz de neutralizar este bando específico de foras da lei. \n\nEste contrato é não negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. A informação destina-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Unknown:</EM4> 4\n<EM4>Rep:</EM4> +225
CleanAir_Killship_Hard_title=ALLIANCE AID: CAÇADORES DE TRANSPORTADORES <EM4>[225 Rep]</EM4>
CleanAir_Killship_Medium_desc=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Neutralizar Nave \nCÓDIGO DE APROVAÇÃO = RT-05\n\nPARA PROCESSAMENTO IMEDIATO\n\nParece que a People's Alliance não é a única ansiosa para colocar as mãos nos recursos necessários para combater o surto de Mofo Molina. A gangue Moraine tem atacado as rotas de navegação com força, tentando capturar o máximo de transportadores possível. Um membro em particular, <EM4>~mission(TargetName)</EM4>, e sua tripulação têm sido especialmente bem-sucedidos, derrubando mais de uma dúzia de naves. O pessoal que organiza a Alliance Aid está ansioso para ver este problema crescente ser resolvido.\n\nRelatórios recentes indicam que a área de caça deles é perto de <EM4>~mission(Location|Address)</EM4>. Vá até lá com quaisquer naves de apoio que desejar e neutralize-os antes que mais suprimentos vitais sejam perdidos. \n\nEste contrato é não negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. A informação destina-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Unknown:</EM4> 3\n<EM4>Rep:</EM4> +150
CleanAir_Killship_Medium_title=Alliance Aid: Saqueadores de Recursos <EM4>[150 Rep]</EM4>
CleanAir_RecoverCargo_Easy_desc=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Recuperação de Carga \nCÓDIGO DE APROVAÇÃO = JJ-11\n\nPARA PROCESSAMENTO IMEDIATO\n\nCom todas essas naves da Alliance Aid transportando cargas valiosas por aí, os fora da lei na área entraram em um frenesi alimentar. Acabamos de receber notícias de um de seus alvos mais recentes via sinalizador de emergência e precisamos que você vá até <EM4>~mission(Location|Address)</EM4>, avalie a situação, <EM4>neutralize quaisquer hostis restantes</EM4> na área e, se necessário, proteja a remessa para entrega em <EM4>~mission(Destination|Address)</EM4>.\n\nCertifique-se de trazer um <EM4>raio trator portátil</EM4> para manusear a carga. \n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. A informação destina-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2\n<EM4>Unknown:</EM4> 2\n<EM4>Rep:</EM4> +300
CleanAir_RecoverCargo_Easy_title=Alliance Aid: Tentativa de Roubo de Carga <EM4>[300 Rep]</EM4>
CleanAir_RecoverCargo_Hard_desc=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Recuperação de Carga \nCÓDIGO DE APROVAÇÃO = JJ-13\n\nPARA PROCESSAMENTO IMEDIATO\n\nA Alliance Aid acabou de entrar em contato em pânico. Uma remessa vital com a qual eles contavam não apareceu. Todos os sinais indicam que ela foi roubada por ladrões ao longo do caminho, então eles estão contando conosco para garantir que ela seja entregue. \n\nVocê deve seguir para <EM4>~mission(Location|Address)</EM4>, avaliar a situação, <EM4>neutralizar quaisquer hostis restantes</EM4> na área e garantir a remessa para entrega em <EM4>~mission(Destination|Address)</EM4>. Certifique-se de ter <EM4>algumas naves de apoio</EM4> com você, caso as coisas fiquem extra difíceis. \n\nCertifique-se de trazer um <EM4>raio trator portátil</EM4> para manusear a carga. \n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. A informação destina-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Unknown:</EM4> 2\n<EM4>Rep:</EM4> +600
CleanAir_RecoverCargo_Hard_title=Alliance Aid: Frustrar Roubo de Carga <EM4>[600 Rep]</EM4>
CleanAir_RecoverCargo_Medium_desc=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Recuperação de Carga \nCÓDIGO DE APROVAÇÃO = JJ-12\n\nPARA PROCESSAMENTO IMEDIATO\n\nNada como uma emergência para trazer à tona o pior das pessoas. Este mofo Molina está matando pessoas por todos os lados, e o que a escória deste sistema decide fazer? Isso mesmo, eles estão por aí tentando sequestrar remessas vitais. A Alliance Aid quer que garantamos que eles não saiam impunes. \n\nVocê deve seguir para <EM4>~mission(Location|Address)</EM4>, avaliar a situação, <EM4>neutralizar quaisquer hostis restantes</EM4> na área e garantir a remessa para entrega em <EM4>~mission(Destination|Address)</EM4>. Espero que esses sequestradores ofereçam uma boa luta, então sinta-se à vontade para levar algum reforço se desejar.\n\nCertifique-se de trazer um <EM4>raio trator portátil</EM4> para manusear a carga. \n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. A informação destina-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Unknown:</EM4> 2\n<EM4>Rep:</EM4> +450
CleanAir_RecoverCargo_Medium_title=Alliance Aid: Deter Roubo de Carga <EM4>[450 Rep]</EM4>
CleanAir_ResourceGathering_Bulk_Filters_desc=ANÚNCIO: Coleta de Recursos \nLOCALIZAÇÃO: Sistema Pyro, Sistema Stanton\nEXPERIÊNCIA DE TRABALHO: Mineração, Comércio de Mercadorias\nTERMOS*: \nA Shubin Interstellar está intensificando esforços para ajudar a deter a propagação do Mal do Povo. Nossas instalações estão auxiliando nos esforços para produzir os filtros de ventilação tão necessários para substituir os defeituosos, responsáveis pela propagação do perigoso Mofo Molina, mas precisamos da sua ajuda para atingir essa meta ambiciosa. \n\nNossos estoques atuais de um recurso importante não são suficientes, por isso precisamos de contratados que possam entregar uma remessa de grande escala em <EM4>~mission(Destination|Address)</EM4>.\n\nRecursos vinculados a outro contrato não serão aceitos. \n\n*A Shubin Interstellar é uma contratante de igualdade de oportunidades. Ao aceitar este contrato, você assume todo e qualquer risco associado ao trabalho aqui descrito e, de forma alguma, a Shubin Interstellar poderá ser responsabilizada por quaisquer danos acumulados durante a vigência do contrato.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 6/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +589 Rep\n<EM4>Tier 2:</EM4> +603 Rep
CleanAir_ResourceGathering_Bulk_Filters_title=ALLIANCE AID: COLETAR RECURSO DE FABRICAÇÃO - GRANDE ESCALA <EM4>[589–603 Rep]</EM4>
CleanAir_ResourceGathering_Bulk_MoldResearch_desc=A todos os contratados disponíveis,\n\nOs cientistas da Rayari estão trabalhando ininterruptamente para auxiliar no tratamento do atual surto fúngico em Levski. Devido a problemas logísticos, nossa equipe em <EM4>~mission(Destination|Address)</EM4> está ficando sem um recurso essencial em suas pesquisas. Perder a produção naquele local prejudicaria o esforço da Alliance Aid em curar as pessoas que sofrem desta terrível aflição em tempo hábil.\n\nÉ por isso que estamos ansiosos pela ajuda de qualquer pessoa que possa encontrar e entregar este suprimento vital em <EM4>~mission(Destination)</EM4>.\n\nPor favor, lembre-se de que mercadorias contratadas são rastreadas por seus proprietários legais e não podem ser aceitas.\n\nJuntos podemos tornar o universo melhor para todos.\n\nNarina Lerrem\nGerente Sênior\nTerceirização de Pesquisa Clínica\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 6/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +589 Rep\n<EM4>Tier 2:</EM4> +609 Rep
CleanAir_ResourceGathering_Bulk_MoldResearch_title=Alliance Aid: Grande Suprimento de Recurso de Pesquisa <EM4>[589–609 Rep]</EM4>
CleanAir_ResourceGathering_Small_Filters_desc=ANÚNCIO: Coleta de Recursos \nLOCALIZAÇÃO: Sistema Pyro, Sistema Stanton\nEXPERIÊNCIA DE TRABALHO: Mineração, Comércio de Mercadorias\nTERMOS*: \nComo membro da Alliance Aid, a Shubin Interstellar dedica-se a auxiliar na produção do máximo possível de filtros de ventilação de alta qualidade. Esses filtros são fundamentais para deter a propagação do Mofo Molina e evitar que mais pessoas sejam atingidas pelo Mal do Povo. \n\nAcabamos de receber notícias de nossa instalação em <EM4>~mission(Destination|Address)</EM4> de que o estoque de um recurso vital está ficando baixo. Nosso fornecedor normal não poderá fazer uma rota de reabastecimento por um tempo, então esperamos que você possa fazer uma remessa de pequena escala agora para suprir essa lacuna. \n \nSe estiver disponível, basta adquiri-lo da forma que considerar melhor e trazê-lo para nossa instalação, e nós o compensaremos bem.\n\nRecursos vinculados a outro contrato não serão aceitos.\n\n*A Shubin Interstellar é uma contratante de igualdade de oportunidades. Ao aceitar este contrato, você assume todo e qualquer risco associado ao trabalho aqui descrito e, de forma alguma, a Shubin Interstellar poderá ser responsabilizada por quaisquer danos acumulados durante a vigência do contrato.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +327 Rep\n<EM4>Tier 2:</EM4> +365 Rep
CleanAir_ResourceGathering_Small_Filters_title=ALLIANCE AID: COLETAR RECURSO DE FABRICAÇÃO - PEQUENA ESCALA <EM4>[327–365 Rep]</EM4>
CleanAir_ResourceGathering_Small_MoldResearch_desc=A todos os contratados disponíveis,\n\nA Rayari precisa de sua assistência. Como parte do esforço da Alliance Aid, nossos cientistas mudaram todo o seu foco para ajudar Levski a lidar com o mofo Molina. Infelizmente, o progresso da equipe está estagnado devido à falta de um recurso essencial.\n\nObtê-lo de nossos distribuidores regulares pode levar semanas. Considerando quantas pessoas precisam desesperadamente de ajuda, interromper a pesquisa por tanto tempo impactaria seriamente nosso esforço. Esperamos encontrar indivíduos motivados dispostos a procurar e entregar uma remessa de pequena escala para entrega em <EM4>~mission(Destination|Address)</EM4>. \n\nPor favor, lembre-se de que mercadorias contratadas são rastreadas por seus proprietários legais e não podem ser aceitas. \n\nJuntos podemos tornar o universo melhor para todos.\n\nNarina Lerrem\nGerente Sênior\nTerceirização de Pesquisa Clínica\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +303 Rep\n<EM4>Tier 2:</EM4> +309 Rep
CleanAir_ResourceGathering_Small_MoldResearch_desc_harvestable=A todos os contratados disponíveis,\n\nA Rayari precisa de sua assistência. Como parte do esforço da Alliance Aid, nossos cientistas mudaram todo o seu foco para ajudar Levski a lidar com o mofo Molina. Infelizmente, o progresso da equipe está estagnado devido à falta de um recurso essencial.\n\nObtê-lo de nossos distribuidores regulares pode levar semanas. Considerando quantas pessoas precisam desesperadamente de ajuda, interromper a pesquisa por tanto tempo impactaria seriamente nosso esforço. Esperamos encontrar indivíduos motivados dispostos a procurar e entregar uma remessa de pequena escala para entrega em <EM4>~mission(Destination|Address)</EM4>. \n\nSe precisar de ajuda para localizar este recurso, sugiro consultar o <EM4>"Guia do Coletor"</EM4> em seu Diário no mobiGlas para mais informações.\n\nPor favor, lembre-se de que mercadorias contratadas são rastreadas por seus proprietários legais e não podem ser aceitas. \n\nJuntos podemos tornar o universo melhor para todos.\n\nNarina Lerrem\nGerente Sênior\nTerceirização de Pesquisa Clínica\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +255
CleanAir_ResourceGathering_Small_MoldResearch_title=Alliance Aid: Pequeno Suprimento de Recurso de Pesquisa <EM4>[255–309 Rep]</EM4>
CleanAir_ResourceGathering_Supply_Filters_desc=ANÚNCIO: Coleta de Recursos \nLOCALIZAÇÃO: Sistema Pyro, Sistema Stanton\nEXPERIÊNCIA DE TRABALHO: Mineração, Comércio de Mercadorias\nTERMOS*: \nA Shubin Interstellar está redirecionando uma parte considerável do nosso foco para auxiliar na produção de filtros de ventilação para ajudar a deter a propagação do Mofo Molina. Embora tenhamos a capacidade e o desejo de ajudar, nosso acesso a um recurso específico está dificultando nossos esforços.\n\nEstamos procurando indivíduos motivados dispostos a procurar e entregar um suprimento de média escala para nossa instalação em <EM4>~mission(Destination|Address)</EM4> para que os esforços de ajuda possam continuar avançando.\n\nRecursos vinculados a outro contrato não serão aceitos.\n\n*A Shubin Interstellar é uma contratante de igualdade de oportunidades. Ao aceitar este contrato, você assume todo e qualquer risco associado ao trabalho aqui descrito e, de forma alguma, a Shubin Interstellar poderá ser responsabilizada por quaisquer danos acumulados durante a vigência do contrato.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 5/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +449 Rep\n<EM4>Tier 2:</EM4> +463 Rep
CleanAir_ResourceGathering_Supply_Filters_title=ALLIANCE AID: COLETAR RECURSO DE FABRICAÇÃO - MÉDIA ESCALA <EM4>[449–463 Rep]</EM4>
CleanAir_ResourceGathering_Supply_MoldResearch_desc=A todos os contratados disponíveis,\n\nBoas notícias! A Rayari está trabalhando arduamente para ajudar a curar o Mal do Povo. Infelizmente, tem sido extremamente difícil obter um recurso essencial através de nossas fontes normais. Para nos ajudar a expandir o acesso a ele, ofereceremos uma excelente taxa para aqueles que ajudarem a encontrar e entregá-lo aos nossos cientistas em <EM4>~mission(Destination|Address)</EM4>.\n\nPor favor, lembre-se de que mercadorias contratadas são rastreadas por seus proprietários legais e não podem ser aceitas. \n\nJuntos podemos tornar o universo melhor para todos.\n\nNarina Lerrem\nGerente Sênior\nTerceirização de Pesquisa Clínica\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +446 Rep\n<EM4>Tier 2:</EM4> +463 Rep
CleanAir_ResourceGathering_Supply_MoldResearch_title=ALLIANCE AID: SUPRIMENTO MÉDIO DE RECURSO DE PESQUISA <EM4>[446–463 Rep]</EM4>
CleanAir_Transport-Milestone1_desc=Tudo bem, esta vai ser um pouco diferente. Veja, com tudo o que está acontecendo com a Alliance Aid, tivemos uma falha em nossos contratos e uma remessa importante acabou passando despercebida. Como vidas estão em jogo, e você já fez tanto para ajudar a Divisão de Transporte, eu estava esperando que você pudesse dar um passo à frente e fazer uma corrida dupla para nós?\n\nHá uma carga de escala média de <EM4>tratamento para Mofo Molina em microTech</EM4> e uma remessa de <EM4>filtros de ventilação em Hurston</EM4> aguardando a coleta. Você precisará fazer as duas paradas, carregar tudo e levar para <EM4>~mission(Destination|Address)</EM4>. \n \nPara lidar com a carga, sua nave deve ser grande o suficiente para transportar contêineres de carga de até <EM4>~mission(MissionMaxSCUSize)</EM4> em tamanho. \n\nE eu verificaria duas vezes para garantir que você esteja com seu <EM4>raio trator portátil</EM4> antes de sair. Seria uma dor de cabeça enorme se você esquecesse de levar um!  \n\nÉ realmente incrível da sua parte ajudar dessa forma,\n\nElla Tieno \nCoordenadora de Logística Jr. \nCovalex Shipping \n'Tudo o que você precisa, onde quer que precise.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Unique, Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Unknown:</EM4> 1\n<EM4>Rep:</EM4> +1,166
CleanAir_Transport-Milestone1_title=ALLIANCE AID: TRANSPORTE INTERESTELAR DUPLO (MÉDICO / FILTROS) <EM4>[1,166 Rep]</EM4>
Covalex_Delivery_Nyx_Medium_Desc_001=Olá,\n\nEsta aqui é bem direta - Temos um monte de coisas que precisam ser movidas por Nyx e precisamos de um contratado competente com um <EM4>raio trator portátil</EM4> e uma nave que possa carregar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>.\n\nDetalhes em anexo. Boa sorte lá fora!\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nCoordenadora de Logística Jr.\nCovalex Shipping\n'Tudo o que você precisa, onde quer que precise.'\n\n\n\n\n\n\n\nA Covalex Shipping é uma sociedade de responsabilidade limitada. Para incentivar entregas pontuais e evitar fraudes no transporte de carga, a Covalex Shipping estabelecerá um limite de tempo de entrega e, após o vencimento, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será proporcional à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Neutral:</EM4> +100 Rep
Covalex_Delivery_Nyx_Medium_Title_001=ENTREGA COVALEX NYX - MÉDIA DISTÂNCIA <EM4>[100 Rep]</EM4>
Covalex_Delivery_Stanton_Hard_Desc_001=Olá,\n\nPreciso de um contratado confiável para retirar alguns pacotes para nós e entregá-los ao seu destino.\n\nEsta rota é mais longa, então certifique-se de ter combustível suficiente e não se esqueça de um <EM4>raio trator portátil</EM4>.\n\nE não tenho certeza do que você planejava pilotar, mas precisará de uma nave que possa transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>.\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nCoordenadora de Logística Jr.\nCovalex Shipping\n'Tudo o que você precisa, onde quer que precise.'\n\n\n\n\n\n\n\nA Covalex Shipping é uma sociedade de responsabilidade limitada. Para incentivar entregas pontuais e evitar fraudes no transporte de carga, a Covalex Shipping estabelecerá um limite de tempo de entrega e, após o vencimento, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será proporcional à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +100 Rep
Covalex_Delivery_Stanton_Hard_Title_001=ENTREGA COVALEX STANTON - LONGA DISTÂNCIA <EM4>[100 Rep]</EM4>
Covalex_Delivery_Stanton_Medium_Desc_001=Olá,\n\nProcuro um contratado com uma nave que possa carregar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> para realizar uma entrega para nós em Stanton.\n\nEsta não é uma rota de entrega particularmente longa, mas você se deslocará entre alguns locais diferentes. Para garantir que as coisas corram bem, traga combustível suficiente e um <EM4>raio trator portátil</EM4> para agilizar a movimentação das caixas.\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nCoordenadora de Logística Jr.\nCovalex Shipping\n'Tudo o que você precisa, onde quer que precise.'\n\n\n\n\n\n\n\nA Covalex Shipping é uma sociedade de responsabilidade limitada. Para incentivar entregas pontuais e evitar fraudes no transporte de carga, a Covalex Shipping estabelecerá um limite de tempo de entrega e, após o vencimento, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será proporcional à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Neutral:</EM4> +100 Rep
Covalex_Delivery_Stanton_Medium_Title_001=ENTREGA COVALEX STANTON - MÉDIA DISTÂNCIA <EM4>[100 Rep]</EM4>
Covalex_Delivery_Stanton_Super_Desc_001=Tenho uma tarefa especial - Muitos pacotes prontos para serem entregues pelo sistema. É um pouco mais do que o normal, então só estou entrando em contato com meus melhores contratados para esta.\n\nObviamente, uma parte desse pagamento será para cobrir seu combustível, porque você irá super longe com esta. Você também precisará de todo o equipamento de sempre, como um <EM4>raio trator portátil</EM4> e uma nave com espaço para armazenar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>.\n\nBoa sorte. Estou contando com você.\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nCoordenadora de Logística Jr.\nCovalex Shipping\n'Tudo o que você precisa, onde quer que precise.'\n\n\n\n\n\n\n\nA Covalex Shipping é uma sociedade de responsabilidade limitada. Para incentivar entregas pontuais e evitar fraudes no transporte de carga, a Covalex Shipping estabelecerá um limite de tempo de entrega e, após o vencimento, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será proporcional à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Sr. Contractor:</EM4> +200 Rep
Covalex_Delivery_Stanton_Super_Title_001=Entrega Especial Covalex - Sistema Stanton <EM4>[200 Rep]</EM4>
Covalex_Delivery_Stanton_VeryHard_Desc_001=Olá,\n\nA Covalex precisa de mãos seguras para retirar alguns pacotes e levá-los onde precisam ir.\n\nDesignando esta como uma entrega de longa distância, portanto, estoque combustível e suprimentos. E definitivamente certifique-se de trazer um <EM4>raio trator portátil</EM4>.\n\nQuanto à nave a trazer, você também precisará de algo que possa mover <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>.\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nCoordenadora de Logística Jr.\nCovalex Shipping\n'Tudo o que você precisa, onde quer que precise.'\n\n\n\n\n\n\n\nA Covalex Shipping é uma sociedade de responsabilidade limitada. Para incentivar entregas pontuais e evitar fraudes no transporte de carga, a Covalex Shipping estabelecerá um limite de tempo de entrega e, após o vencimento, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será proporcional à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Contractor:</EM4> +150 Rep
Covalex_Delivery_Stanton_VeryHard_Title_001=ENTREGA COVALEX STANTON - MUITO LONGA DISTÂNCIA <EM4>[150 Rep]</EM4>
Covalex_HaulCargo_AToB_Intro_desc=Ganhando reconhecimentos como 'Top 10 Companhias de Frete da Imperial Finances' e 'Transporte Mais Confiável de 2945 da Delivery Digest', a Covalex está mais ocupada do que nunca. E isso significa mais carga indo para mais lugares. É aí que você entra.\n\nA Covalex está procurando pilotos confiáveis e esforçados para se juntar à nossa família em expansão. Você tem acesso a uma nave que possa transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>? Você pode passar por uma verificação de antecedentes da Advocacy, se necessário? Então, um universo de oportunidades está esperando por você.\n\nSimplesmente complete um 'Teste de Avaliação' pegando um carregamento de <EM4>~mission(Item)</EM4> em um elevador de carga em <EM4>~mission(Location|Address)</EM4> e entregando-o com sucesso em um elevador de carga em <EM4>~mission(Destination|Address)</EM4>.\n\nApós a conclusão satisfatória, você estará elegível para se tornar parte da vasta rede de especialistas em transporte independentes da Covalex Shipping*.\n\nA propósito, nós encorajamos veementemente os contratados a trazerem um <EM4>raio trator portátil</EM4> (handheld tractor beam).\n\n\nCovalex Shipping  \n'Tudo o que você precisar, onde você precisar.'\n\n\n\n\n\n\n\n*Covalex Shipping é uma sociedade anônima de responsabilidade limitada. Para incentivar entregas dentro do prazo e prevenir fraudes em transportes de carga, a Covalex Shipping estabelecerá um limite de tempo de entrega e, após o vencimento, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será rateado de acordo com o percentual de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +50
Covalex_HaulCargo_AToB_Intro_title=Oportunidade Para Transportador Independente de Cargas <EM4>[100 Rep]</EM4>
Covalex_HaulCargo_AToB_Rehire_desc=Olá,\n\nTenho uma boa notícia para você. A Covalex concluiu recentemente uma avaliação de nosso grupo de contratados e decidiu reconsiderar seu status como transportador de carga. Para se requalificar, tudo o que você precisa é concluir com sucesso a seguinte entrega.\n\nPegue <EM4>~mission(Item)</EM4> em um elevador de carga em <EM4>~mission(Location|Address)</EM4> e entregue-o em um elevador de carga em <EM4>~mission(Destination|Address)</EM4>. Para concluir este transporte de maneira rápida e eficiente, você precisará de uma nave que possa carregar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>.\n\nEsperamos que tudo corra bem para que possamos recebê-lo de volta à equipe.\n\nA propósito, nós encorajamos veementemente os contratados a trazerem um <EM4>raio trator portátil</EM4> (handheld tractor beam).\n\nCovalex Shipping  \n'Tudo o que você precisar, onde você precisar.'\n\n\n\n\n\n\n\nCovalex Shipping é uma sociedade anônima de responsabilidade limitada. Para incentivar entregas dentro do prazo e prevenir fraudes em transportes de carga, a Covalex Shipping estabelecerá um limite de tempo de entrega e, após o vencimento, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será rateado de acordo com o percentual de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +50
Covalex_HaulCargo_AToB_Rehire_title=REAVALIAÇÃO DE TRANSPORTE DE CARGA DA COVALEX <EM4>[50 Rep]</EM4>
Covalex_HaulCargo_AToB_Scrap=Olá,\n\nHá algum lixo esperando em um elevador de carga em <EM4>~mission(Location|Address)</EM4> que precisa ir para um elevador de carga em <EM4>~mission(Destination|Address)</EM4> para processamento. Confirmei que os contêineres não serão maiores que <EM4>~mission(MissionMaxSCUSize)</EM4>. \n\nMinha mãe teria adorado este trabalho. Ela é daquelas que acha que todo ferro-velho está cheio de tesouros escondidos. Não consigo nem dizer quantas horas passei entediado a seguindo em um. Se isso faz seu estilo, aqui está a chance de realmente ganhar créditos indo para um.\n\nA propósito, nós encorajamos veementemente os contratados a trazerem um <EM4>raio trator portátil</EM4> (handheld tractor beam).\n \n~mission(Contractor|SignOff)\n\nChase Hewitt\nCoordenador de Logística Jr.\nCovalex Shipping  \n'Tudo o que você precisar, onde você precisar.'\n\n\n\n\n\n\n\nCovalex Shipping é uma sociedade anônima de responsabilidade limitada. Para incentivar entregas dentro do prazo e prevenir fraudes em transportes de carga, a Covalex Shipping estabelecerá um limite de tempo de entrega e, após o vencimento, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será rateado de acordo com o percentual de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 3/7\n<EM4>Rep:</EM4> +500
Covalex_HaulCargo_AToB_Stanton_Interstellar=Olá,\n\nTem interesse em fazer a perna Stanton de uma rota interestelar? \n\nHá um transporte de <EM4>~mission(Item)</EM4> esperando em contêineres <EM4>~mission(MissionMaxSCUSize)</EM4> ou menores para ser coletado de um elevador de carga em <EM4>~mission(Location|Address)</EM4> e entregue em um elevador de carga em <EM4>~mission(Destination|Address)</EM4>. Não é necessário levá-lo além disso. Tenho outra pessoa escalada para transportá-lo através do salto para seu destino final. \n\nA propósito, nós encorajamos veementemente os contratados a trazerem um <EM4>raio trator portátil</EM4> (handheld tractor beam).\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nCoordenador de Logística Jr.\nCovalex Shipping  \n'Tudo o que você precisar, onde você precisar.'\n\n\n\n\n\n\n\nCovalex Shipping é uma sociedade anônima de responsabilidade limitada. Para incentivar entregas dentro do prazo e prevenir fraudes em transportes de carga, a Covalex Shipping estabelecerá um limite de tempo de entrega e, após o vencimento, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será rateado de acordo com o percentual de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +2,000
Covalex_HaulCargo_AToB_title=CLASSIFICAÇÃO ~mission(ReputationRank) - Transporte de Carga ~mission(CargoGradeToken) Direto <EM4>[BP?]</EM4> <EM4>[50–4,000 Rep]</EM4>
Covalex_HaulCargo_AtoB_desc_DeliverAll=Oi,\n\nÉ o seguinte, eu preciso de alguém bom para uma rota especial. Temos um cliente importante que está ameaçando levar seus negócios para outro lugar, porque suas entregas estão consistentemente faltando carga. Eles estão exigindo que 100% da carga seja entregue nesta rota, ou eles não pagarão. Como isso foi antes do meu tempo e meu supervisor quer mostrar que não acontecerá de novo, eles concordaram com isso. Enfim, acho que você pode ser a pessoa certa. \n\nSe você também estiver disposto a correr esse risco, aqui estão todos os detalhes pertinentes. A carga pode ser coletada de <EM4>~mission(Location|Address)</EM4> e entregue em <EM4>~mission(Destination|Address)</EM4>. Parece que o maior contêiner de carga que você precisará manusear é <EM4>~mission(MissionMaxSCUSize)</EM4>, então certifique-se de trazer uma nave grande o suficiente e um <EM4>raio trator portátil</EM4> (handheld tractor beam) para ajudar a mover esses contêineres. \n \n~mission(Contractor|SignOff) \n\nElla Tieno \nCoordenadora de Logística Jr.\nCovalex Shipping   \n'Tudo o que você precisar, onde você precisar.'\n\n\n\n\n\n\n\nCovalex Shipping é uma sociedade anônima de responsabilidade limitada. Para incentivar entregas dentro do prazo e prevenir fraudes em transportes de carga, a Covalex Shipping estabelecerá um limite de tempo de entrega e, após o vencimento, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será rateado de acordo com o percentual de carga entregue com sucesso.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-A] Palisade\n- [IND-S2-A] Rampart\n- [IND-S3-A] Parapet\n- [MIL-S1-A] VK-00\n- [MIL-S1-B] Siren\n- [MIL-S2-A] XL-1\n- [MIL-S2-B] Yeager\n- [MIL-S3-A] TS-2\n- [MIL-S3-B] Balandin\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x24\n<EM4>Blueprint Reward:</EM4> Guaranteed
Covalex_HaulCargo_AtoB_desc_FromLevski=Olá,\n\nA People’s Alliance nos contratou para mover um carregamento de carga de Levski para <EM4>~mission(Destination|Address)</EM4>. Honestamente, estou surpreso que eles exportem algumas dessas coisas, mas acho que devem vender algo para poderem pagar por tudo que importam. \n\nPara a rota em si, você precisará de uma nave que possa transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e um <EM4>raio trator portátil</EM4> (handheld tractor beam) para manusear os contêineres. Isso deve ser tudo.\n\n~mission(Contractor|SignOff)\n  \nElla Tieno \nCoordenadora de Logística Jr.\nCovalex Shipping   \n'Tudo o que você precisar, onde você precisar.' \n\n\n\n\n\n\n\nCovalex Shipping é uma sociedade anônima de responsabilidade limitada. Para incentivar entregas dentro do prazo e prevenir fraudes em transportes de carga, a Covalex Shipping estabelecerá um limite de tempo de entrega e, após o vencimento, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será rateado de acordo com o percentual de carga entregue com sucesso.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-A] Palisade\n- [IND-S2-A] Rampart\n- [IND-S3-A] Parapet\n- [MIL-S1-A] VK-00\n- [MIL-S1-B] Siren\n- [MIL-S2-A] XL-1\n- [MIL-S2-B] Yeager\n- [MIL-S3-A] TS-2\n- [MIL-S3-B] Balandin\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x24\n<EM4>Blueprint Reward:</EM4> Guaranteed
Covalex_HaulCargo_AtoB_desc_FromRuinStation=Ei, é a El. \n\nTenho um cliente em <EM4>~mission(Location|Address)</EM4> que precisa que sua carga seja coletada na Ruin Station. Eles estão esperando lá há um tempo e estão começando a ficar um pouco impacientes. Há alguma chance de você cuidar disso para nós? \n\nVocê precisará de uma nave que possa acomodar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e um <EM4>raio trator portátil</EM4> (handheld tractor beam) para poder movê-los. \n\n~mission(Contractor|SignOff)\n\nElla Tieno \nCoordenadora de Logística Jr.\nCovalex Shipping   \n'Anything you need, anywhere you need it.' \n\n\n\n\n\n\n\nCovalex Shipping é uma sociedade anônima de responsabilidade limitada. Para incentivar entregas dentro do prazo e prevenir fraudes em transportes de carga, a Covalex Shipping estabelecerá um limite de tempo de entrega e, após o vencimento, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será rateado de acordo com o percentual de carga entregue com sucesso.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-A] Palisade\n- [IND-S2-A] Rampart\n- [IND-S3-A] Parapet\n- [MIL-S1-A] VK-00\n- [MIL-S1-B] Siren\n- [MIL-S2-A] XL-1\n- [MIL-S2-B] Yeager\n- [MIL-S3-A] TS-2\n- [MIL-S3-B] Balandin\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x24\n<EM4>Blueprint Reward:</EM4> Guaranteed
Covalex_HaulCargo_AtoB_desc_ProcessedFood_Stanton2=Olá, \n\nParece que Orison precisa de outro reabastecimento de alimentos processados e gelo pressurizado. Eles têm este material em um cronograma de entrega padrão, mas acabaram de solicitar um envio o mais rápido possível. \n\nVocê está disponível para fazer a rota? O material (contêineres de <EM4>~mission(MissionMaxSCUSize)</EM4> ou menores) está esperando para ser retirado de um elevador de carga em <EM4>~mission(Location|Address)</EM4>. Deve ser uma rota rápida e fácil para você, até um elevador de carga em <EM4>~mission(Destination|Address)</EM4>. \n\nA propósito, nós encorajamos veementemente os contratados a trazerem um <EM4>raio trator portátil</EM4> (handheld tractor beam).\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nCoordenador de Logística Jr.\nCovalex Shipping  \n'Tudo o que você precisar, onde você precisar.'\n\n\n\n\n\n\n\nCovalex Shipping é uma sociedade anônima de responsabilidade limitada. Para incentivar entregas dentro do prazo e prevenir fraudes em transportes de carga, a Covalex Shipping estabelecerá um limite de tempo de entrega e, após o vencimento, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será rateado de acordo com o percentual de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +2,000
Covalex_HaulCargo_AtoB_desc_RawOre_Stanton1=Olá,\n\nUm gerente de logística da Hurston acabou de solicitar a coleta prioritária em suas instalações. Parece que eles encontraram uma nova jazida de minério e precisam abrir espaço para o que estão extraindo.\n\nO minério bruto precisa ser movido de um elevador de carga em <EM4>~mission(Location|Address)</EM4> para um elevador de carga em <EM4>~mission(Destination|Address)</EM4>. Serão contêineres de <EM4>~mission(MissionMaxSCUSize)</EM4> ou menores. Parece algo que você pode lidar? \n\nA propósito, nós encorajamos veementemente os contratados a trazerem um <EM4>raio trator portátil</EM4> (handheld tractor beam).\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nCoordenador de Logística Jr.\nCovalex Shipping  \n'Tudo o que você precisar, onde você precisar.'\n\n\n\n\n\n\n\nCovalex Shipping é uma sociedade anônima de responsabilidade limitada. Para incentivar entregas dentro do prazo e prevenir fraudes em transportes de carga, a Covalex Shipping estabelecerá um limite de tempo de entrega e, após o vencimento, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será rateado de acordo com o percentual de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 3/7\n<EM4>Rep:</EM4> +500
Covalex_HaulCargo_AtoB_desc_RefinedOre_Stanton4=Olá, \n\n<EM4>~mission(Destination|Address)</EM4> precisa de uma entrega de minério refinado para manter suas linhas de produção funcionando. A carga (contêineres de <EM4>~mission(MissionMaxSCUSize)</EM4> ou menores) está pronta e esperando para ser coletada em um elevador de carga em <EM4>~mission(Location|address)</EM4>. Alguma chance de você estar disponível para coletá-la e entregá-la em um elevador de carga em ~mission(Destination)?\n\nA propósito, nós encorajamos veementemente os contratados a trazerem um <EM4>raio trator portátil</EM4> (handheld tractor beam).\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nCoordenador de Logística Jr.\nCovalex Shipping  \n'Tudo o que você precisar, onde você precisar.'\n\n\n\n\n\n\n\nCovalex Shipping é uma sociedade anônima de responsabilidade limitada. Para incentivar entregas dentro do prazo e prevenir fraudes em transportes de carga, a Covalex Shipping estabelecerá um limite de tempo de entrega e, após o vencimento, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será rateado de acordo com o percentual de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +50
Covalex_HaulCargo_AtoB_desc_ScrapWaste_Stanton3=Olá,\n\nHá um monte de sucata e resíduos esperando em um elevador de carga em <EM4>~mission(Location|Address)</EM4> que precisa ir para um elevador de carga em <EM4>~mission(Destination|Address)</EM4> para classificação. Eu sei que a ArcCorp iniciou uma iniciativa para reduzir o desperdício e reciclar mais sucata no planeta, mas ainda não vi nenhuma diminuição neste tipo de transporte da parte deles.\n\nVocê está disponível para mover este lote de lixo sortido (contêineres de <EM4>~mission(MissionMaxSCUSize)</EM4> ou menores) para fora do planeta para eles? \n\nA propósito, nós encorajamos veementemente os contratados a trazerem um <EM4>raio trator portátil</EM4> (handheld tractor beam).\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nCoordenador de Logística Jr.\nCovalex Shipping  \n'Tudo o que você precisar, onde você precisar.'\n\n\n\n\n\n\n\nCovalex Shipping é uma sociedade anônima de responsabilidade limitada. Para incentivar entregas dentro do prazo e prevenir fraudes em transportes de carga, a Covalex Shipping estabelecerá um limite de tempo de entrega e, após o vencimento, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será rateado de acordo com o percentual de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +50
Covalex_HaulCargo_AtoB_desc_ToLevski=Olá, \n\nHá um monte de carga em <EM4>~mission(Location|Address)</EM4> que precisa ser movida para Levski. A People's Alliance tem um pedido constante para este material porque eles precisam desesperadamente, mas não é fácil conseguir em Nyx. Engraçado como eles não querem fazer parte da UEE, mas ainda dependem de nós para sua sobrevivência.\n\nEnfim, você precisará de um <EM4>raio trator portátil</EM4> (handheld tractor beam) e uma nave que possa transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> para concluir este serviço.\n\n~mission(Contractor|SignOff) \n \nElla Tieno \nCoordenadora de Logística Jr.\nCovalex Shipping   \n'Tudo o que você precisar, onde você precisar.' \n\n\n\n\n\n\n\nCovalex Shipping é uma sociedade anônima de responsabilidade limitada. Para incentivar entregas dentro do prazo e prevenir fraudes em transportes de carga, a Covalex Shipping estabelecerá um limite de tempo de entrega e, após o vencimento, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será rateado de acordo com o percentual de carga entregue com sucesso.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-A] Palisade\n- [IND-S2-A] Rampart\n- [IND-S3-A] Parapet\n- [MIL-S1-A] VK-00\n- [MIL-S1-B] Siren\n- [MIL-S2-A] XL-1\n- [MIL-S2-B] Yeager\n- [MIL-S3-A] TS-2\n- [MIL-S3-B] Balandin\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x24\n<EM4>Blueprint Reward:</EM4> Guaranteed
