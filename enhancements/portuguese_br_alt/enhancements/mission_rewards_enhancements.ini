ItemGathering_ASD_Desc=Hockrow Agency \nArquivo de Caso #JD10285\nInvestigador Principal: Arken Mallor\n\nAtualização do Caso: \nAo analisar os arquivos, notei algumas referências a uma amostra de laboratório específica que poderia ser útil para nossa equipe analisar. Não tenho certeza de onde ela está exatamente, mas se você vasculhar a Instalação Onyx, deverá conseguir encontrar a amostra e trazê-la para mim.\n\nAções do Investigador do Contrato:\nExplore a <EM4>Ala de Pesquisa da Instalação Onyx</EM4> e <EM4>localize a Amostra de Laboratório</EM4> e entregue-a em <EM4>~mission(Destination|Address)</EM4>.\n\nNotas Adicionais:\nCuidado com possíveis forças hostis no local.\n\nViaje para Onyx em um veículo que possa ser armazenado em um hangar grande.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7
ItemGathering_ASD_Title=DOSSIÊ JORRIT: AMOSTRA DE LABORATÓRIO
Jumptown2_Criminal_MBroker_desc=Tenho boas notícias para você. Enquanto você lê esta mensagem, neste momento há uma instalação automatizada que está produzindo pacotes e mais pacotes de um produto de alta qualidade praticamente pronto para ser aproveitado..\n\nTudo o que você precisa fazer é ir até lá, lidar com um ou dois bandidos, pegar o que puder e vender com um lucro enorme. Isto não deverá ser um problema. Tem muitas pessoas que pagariam bons créditos para comprar o produto de voce.\n\nPor falar em créditos, Não vou dar as coordenadas da instalação assim de graça. Cobrarei um valor negociavel desta informação muito valiosa.\n\nEu não demoraria muito. Não sei por quanto tempo o local vai continuar funcionando.\n\n-Ruto\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Jumptown2_Lawful_MBroker_desc_BlacJac=ATENÇÃO: Operadores Mercenários Verificados\n\nFomos capazes de rastrear uma recente onda de contrabando até uma instalação de produção automatizada em ~mission(Location|Address). Não podemos ter certeza de quanto tempo mais o local estará em funcionamento, portanto, BlacJac precisa de alguém no local para fazer uma varredura, proteger o contrabando e transportá-lo para nós até ~mission(Destination|Address).\n\nNão conseguimos determinar que tipo de força hostil estará presente, mas, seja o que for que você encontrar, você está autorizado a usar força letal conforme necessário.\n\nQuanto mais contrabando você conseguir trazer para nós, mais créditos você ganhará.\n\nObrigado,\nTenente Aaron Riegert\nSupervisor de Contrato Privado\nBlacJac Security, "Proteção Fornecida"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Jumptown2_Lawful_MBroker_desc_CruSec=A Crusader Security descobriu que uma instalação de produção ilegal em ~mission(Location|Address) está sendo usada atualmente para fabricar contrabando. \n\nEstamos procurando um contratado para proteger o local, confiscar qualquer contrabando e entregá-lo a nós em ~mission(Destination|Address). O terminal administrativo de mercadorias permitirá que você envie o contrabando para nosso depósito de provas e receba seu pagamento.\n\nComo se trata de uma instalação automatizada, não está claro por quanto tempo eles estarão produzindo ou mesmo quantas pessoas podem estar no local. Por segurança, eu entraria esperando encontrar forte resistência.\n\nSua remuneração total será baseada em como os pacotes são entregues com segurança nas evidências.\n\nCONTRATO AUTORIZADO POR:\nOficial de Ligação Vanzant\nID# 712L921P\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Jumptown2_Lawful_MBroker_desc_Hurston=HURSTON DYNAMICS\nDEPARTAMENTO DE TERCEIRIZAÇÃO\n\nCONTRATO: Confiscar contrabando\nAFILIAÇÃO DO CONTRATADO: Independente\nGERENTE DE TERCEIRIZAÇÃO: T. Odington\nAVALIAÇÃO DE RISCO: Alto\nCONTRATO URGENTE: Não\n\nA Hurston Security tomou conhecimento de uma instalação de produção automatizada ilegal ativa em ~mission(Location|Address) e está procurando um contratado para proteger o local e confiscar o maior número possível de pacotes de contrabando para entrega em uma instalação da Hurston Security ~mission(Destination|Address) para descarte imediato. A transferência do contrabando e a atribuição do pagamento de sua recompensa devem ser feitas por meio do terminal administrativo de commodities existente.\n\nVocê está autorizado a usar qualquer força necessária para concluir seu objetivo. O pagamento será baseado na quantidade de contrabando assegurada. \n\nAs informações transmitidas podem conter material confidencial e/ou privilegiado.É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Jumptown2_Lawful_MBroker_desc_MicroTech=SOBRE O TRABALHO\nOs Serviços de Proteção da microTech estão procurando um profissional de segurança detalhista que possa nos ajudar a proteger o contrabando de um local de produção automatizado ilegal em ~mission(Location|Address). Os pacotes precisarão então ser levados para ~mission(Destination|Address) e transferidos para nossa posse para destruição por meio do terminal administrativo de mercadorias. \n\nRESPONSABILIDADES\n- Fornecer transporte próprio para a ~mission(Location|Address).\n- Gerenciar quaisquer hostis encontrados no local; usar a força conforme necessário.\n- Proteger o contrabando e entregá-lo nos terminais de mercadorias na ~mission(Destination|Address)\n\nQUALIFICAÇÕES MÍNIMAS\n- 2 anos de experiência combinada em mercenários e/ou segurança. \n- Acesso a equipamento de combate e meio de transporte.\n- Disponível para mobilização imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n- Experiência com técnicas de redução rápida de hostilidade.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Kaboos_Intro_Description=ESPECIFICAÇÕES DA MISSÃO\n\nÁrea de Operação: Nyx System\nForças Hostis: Desconhecidas\nEspecificações de Equipamento: Nave com Classificação de Combate, Armas Pessoais\nBriefing: A InterSec foi recrutada pela UEE para coletar informações sobre um grupo de <EM4>negociantes do mercado negro de peças Vanduul</EM4>, que foram ligados aos experimentos Vanduul ilegais que ocorrem na Instalação Onyx da ASD. A UEE está ansiosa para entender e pôr fim às suas operações.\n\nCom base em evidências extraídas das instalações da ASD, conseguimos potencialmente rastrear a localização de um de seus locais de armazenamento.\n\nUma vez aceito, dirija-se à antiga <EM4>estação de Logística da QV Planet Services</EM4> e entraremos em contato.\n\n\nRespeitosamente,\n\nDeacon Tobin\nGerente de Operações\nInterSec Defense Solutions\n\nEsta comunicação consiste em informações confidenciais destinadas exclusivamente ao destinatário. Por favor, desconsidere se recebido por engano e notifique o remetente. Todas as operações são conduzidas por conta e risco pessoal do contratado e devem aderir à UEE e à lei do sistema, quando aplicável.\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Boss x2, CQC x30, Juggernauts x2, Snipers x4, Soldiers x19, Technicians x5\n<EM4>Unknown:</EM4> 57\n<EM4>Jr. Contractor:</EM4> +100 Rep
Kaboos_Intro_Title=Contrabandistas de Tecnologia Vanduul <EM4>[100 Rep]</EM4>
Kaboos_Mission_Description=ESPECIFICAÇÕES DA MISSÃO\n\nÁrea de Operação: Nyx System\nForças Hostis: Foras da Lei presentes e armados\nEspecificações de Equipamento: Nave com Classificação de Combate, Armas Pessoais\nBriefing: A InterSec precisa dos seus serviços mais uma vez.\n\nA inteligência que você coletou anteriormente tem sido inestimável na identificação de vários compradores proeminentes de peças Vanduul obtidas ilegalmente. No entanto, desde então, a Shattered Blade continuou suas operações e a UEE está solicitando que <EM4>atualizemos nossas informações de inteligência.</EM4>\n\nAcreditamos que mais informações podem ser recuperadas das instalações de armazenamento localizadas na antiga <EM4>estação QV Logistics.</EM4>\n\nOs parâmetros da operação não mudaram desde a sua última missão: encontre os <EM4>dados criptografados</EM4> e use a <EM4>chave de descriptografia</EM4> para decifrar e fazer o upload da lista para nós. A Shattered Blade terá reforçado a área desde a última vez, então espere resistência.\n\nBoa sorte. Entraremos em contato.\n\n\nRespeitosamente,\n\nDeacon Tobin\nGerente de Operações\nInterSec Defense Solutions\n\nEsta comunicação consiste em informações confidenciais destinadas exclusivamente ao destinatário. Por favor, desconsidere se recebido por engano e notifique o remetente. Todas as operações são conduzidas por conta e risco pessoal do contratado e devem aderir à UEE e à lei do sistema, quando aplicável.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Pulse "Blacklist" Pistol\n- Quartz "Black Op" Energy SMG\n- Quartz Energy SMG\n- [S1-A] Pulse Laser Pistol Battery (60 Cap)\n- [S1-A] Quartz Energy SMG Battery (45 cap)\n- [S1-A] Testudo Arms\n- [S1-A] Testudo Arms Clanguard\n- [S1-A] Testudo Core\n- [S1-A] Testudo Core Clanguard\n- [S1-A] Testudo Helmet\n- [S1-A] Testudo Helmet Clanguard\n- [S1-A] Testudo Legs\n- [S1-A] Testudo Legs Clanguard\n- [S2-A] Testudo Backpack\n- [E-S1-A] Attrition-1 Repeater\n- [E-S2-A] Attrition-2 Repeater\n- [E-S3-A] Attrition-3 Repeater\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Boss x1\n<EM4>Unknown:</EM4> 16\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Kaboos_Mission_Title=RECUPERAR INFORMAÇÃO ADICIONAL DE CONTRABANDISTAS <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Kill_Civ_Desc_001=Mate o traficante que ficou com mais do que sua parte nos lucros\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostiles x1, Targets x1
LingFamily_HaulCargo_AToB_Intro_desc=Olá, \n \nAqui é Petra Ling, e estou orgulhosa de lhe oferecer uma nova e empolgante oportunidade de parceria com a Ling Family Hauling. Quando meus pais iniciaram esta empresa, o objetivo deles era fornecer entregas de correio rápidas e confiáveis em toda a área de Crusader. Rapidamente se tornou um sucesso, e à medida que nossa reputação cresceu, nossas operações também cresceram. \n \nAgora, sob minha administração, a Ling Family Hauling está dando o próximo grande passo – transporte de carga. A demanda por este novo serviço está crescendo mais rápido do que eu esperava, e isso é uma ótima notícia para nós dois. \n \nSe você sempre quis ser um transportador, posso realizar seus sonhos. A melhor maneira de aprender algo é fazendo, e eu tenho uma carga de <EM4>~mission(Item)</EM4> que precisa ir de <EM4>~mission(Location|Address)</EM4> para <EM4>~mission(Destination|Address)</EM4>. \n\nNão é necessária experiência prévia, mas aqui estão algumas coisas a serem lembradas. Todas as coletas e entregas devem ser feitas em um elevador de carga ou carregadas automaticamente (*autoloaded*). Você precisará de uma nave que possa comportar <EM4>contêineres de ~mission(MissionMaxSCUSize) de carga</EM4> e um <EM4>raio trator portátil</EM4> para movê-los.\n \nApós a conclusão bem-sucedida desta entrega, você será promovido ao status de 'contratado de confiança' e mais transportes estarão disponíveis para você. \n\n \nAtenciosamente, \nPetra Ling \nDiretora Geral de Operações de Carga \nLing Family Hauling \n\n \n\n \n\n \n\nA Ling Family Hauling sabe que é um universo perigoso e imprevisível e estabeleceu vários protocolos para proteger tanto você quanto a carga de nosso cliente. Para garantir que você não seja punido por circunstâncias fora do seu controle, o pagamento total será rateado de acordo com a porcentagem de carga entregue com sucesso. Um temporizador de entrega será definido para cada transporte. Qualquer carga que permanecer não entregue após sua expiração será marcada como roubada e tratada como tal. Todas as coletas e entregas devem ser carregadas automaticamente (*autoloaded*) ou feitas em um elevador de carga.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-B] Guardian\n- [IND-S2-B] Citadel\n- [IND-S3-B] Barbican\n- [STH-S1-A] Spectre\n- [STH-S1-B] Zephyr\n- [STH-S2-A] Spicule\n- [STH-S2-B] Bolt\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Trainee:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
LingFamily_HaulCargo_AToB_Intro_title=Oportunidade de Transporte de Carga com Ling Hauling <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
LingFamily_HaulCargo_AToB_desc_Fruit_Timed=Olá, \n \nNormalmente Reyes agenda nossos transportes, mas ela saiu para o dia, e acabei de receber uma comunicação perguntando sobre uma corrida simples e direta de <EM4>~mission(Location|Address)</EM4> para <EM4>~mission(Destination|Address)</EM4>. A carga é uma remessa de frutas que perderá valor se estragar. Não queremos irritar este cliente, então agradeceríamos se você concluísse isso em tempo hábil. \n\nAqui estão outros detalhes que você deve saber. O maior contêiner usado é <EM4>~mission(MissionMaxSCUSize)</EM4>, então não se esqueça do seu <EM4>raio trator portátil</EM4>. \n\n \nAtenciosamente, \nPetra Ling \nDiretora Geral de Operações de Carga \nLing Family Hauling\n\n\n\n\n\n\n\nA Ling Family Hauling sabe que é um universo perigoso e imprevisível e estabeleceu vários protocolos para proteger tanto você quanto a carga de nosso cliente. Para garantir que você não seja punido por circunstâncias fora do seu controle, o pagamento total será rateado de acordo com a porcentagem de carga entregue com sucesso. Um temporizador de entrega será definido para cada transporte. Qualquer carga que permanecer não entregue após sua expiração será marcada como roubada e tratada como tal. Todas as coletas e entregas devem ser carregadas automaticamente (*autoloaded*) ou feitas em um elevador de carga.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-B] Guardian\n- [IND-S2-B] Citadel\n- [IND-S3-B] Barbican\n- [STH-S1-A] Spectre\n- [STH-S1-B] Zephyr\n- [STH-S2-A] Spicule\n- [STH-S2-B] Bolt\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Rookie:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
LingFamily_HaulCargo_AToB_desc_Party_Timed=Olá, \n\nAcho que o pessoal em <EM4>~mission(Destination|Address)</EM4> está planejando uma festa e precisa de ajuda para adquirir tudo em tempo hábil. Você precisará fazer várias coletas para esta, incluindo uma em Nyx para pegar um gin Jynx. Não sei se você já experimentou, mas é uma especialidade de Nyx. Algumas pessoas não conseguem superar o fato de que ele brilha em rosa, mas eu adoro. Tem um toque verdadeiramente único.\n\nAqui estão as coletas: \n\nLOCAIS DE COLETA (QUALQUER ORDEM) \n\n~mission(MultiToSingleToken) \n\nLembre-se de trazer um <EM4>raio trator portátil</EM4>, pois você estará manuseando contêineres de carga de até <EM4>~mission(MissionMaxSCUSize)</EM4>. \n\n \nBoas Viagens, \nReyes Ling \nCoordenador de Logística de Carga \nLing Family Hauling\n\n\n\n\n\n\n\nA Ling Family Hauling sabe que é um universo perigoso e imprevisível e estabeleceu vários protocolos para proteger tanto você quanto a carga de nosso cliente. Para garantir que você não seja punido por circunstâncias fora do seu controle, o pagamento total será rateado de acordo com a porcentagem de carga entregue com sucesso. Um temporizador de entrega será definido para cada transporte. Qualquer carga que permanecer não entregue após sua expiração será marcada como roubada e tratada como tal. Todas as coletas e entregas devem ser carregadas automaticamente (*autoloaded*) ou feitas em um elevador de carga.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-B] Guardian\n- [IND-S2-B] Citadel\n- [IND-S3-B] Barbican\n- [STH-S1-A] Spectre\n- [STH-S1-B] Zephyr\n- [STH-S2-A] Spicule\n- [STH-S2-B] Bolt\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rookie:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
