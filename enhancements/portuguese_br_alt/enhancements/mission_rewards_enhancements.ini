XenoThreat_claimsweep_desc_easy=Nosso movimento de resistência está crescendo a cada dia, mas isso vem acompanhado de uma atenção indesejada.  Varreduras recentes descobriram sentinelas orbitais em ~mission(location|address) e uma nave executando um padrão de patrulha. Acreditamos que isso faz parte de uma campanha de espionagem que tem como alvo a XenoThreat, provavelmente financiada pelo UEE.\n\nEstamos procurando um mercenário experiente disposto a destruir as sentinelas o mais rápido possível.  Como eles já têm olhos e ouvidos em nós, enviar alguém de fora da organização chamaria menos atenção. Se você aceitar o trabalho, será pago imediatamente assim que as sentinelas forem destruídas.\n\nAgora, embora a nave de patrulha não seja o alvo principal, suspeitamos que, se ela escapar, poderá ter reforços de reserva. Talvez seja inteligente lidar com ela imediatamente.\n\nSe você decidir nos ajudar, a XenoThreat se lembrará de que você é alguém disposto a lutar pelo que é certo.\n\nEsp. Com. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Hostiles:</EM4> Hostile Wave x3, Prospectors x1\n<EM4>Turrets:</EM4> 2 (hostile)
XenoThreat_claimsweep_desc_hard=Varreduras recentes descobriram várias sentinelas orbitais e naves em ~mission(location|address). Acreditamos que eles fazem parte de uma campanha de espionagem que tem como alvo a XenoThreat, em resposta às nossas ações recentes no sistema Stanton. Parece que a XenoThreat deve estar fazendo algo certo, se eles estão aqui espionando dessa forma.\n\nEstamos procurando um mercenário experiente e altamente qualificado que esteja disposto a eliminar essa operação. Se você não quer que Pyro se torne um sistema de vigilância, esta é a sua chance de impedi-los. As sentinelas provavelmente não serão um grande problema, mas preste atenção nas naves de patrulha. Se elas conseguirem escapar, você terá muito mais problemas para resolver. \n\nVocê terá nossa gratidão e um pagamento considerável quando o trabalho estiver concluído. \n\nEsp. Com. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250\n<EM4>Hostiles:</EM4> Hostile Wave x5, Prospectors x4\n<EM4>Turrets:</EM4> 4 (hostile)
XenoThreat_claimsweep_desc_intro=Parece que nossa luta para libertar a humanidade levou os cachorros do governo de volta à terra se sentindo nervosos. As varreduras recentes descobriram uma sentinela orbital em ~mission(location|address) que acreditamos fazer parte de uma campanha de espionagem UEE. Bons créditos dizem que estão entregando os dados diretamente aos próprios slinks.\n\nSomente uma sentry foi detectada até agora, mas quem sabe o tamanho da operação crescerá se não for retirado. Não deve ser muito problema para um merche qualificado. Se isso soar como você, o pagamento será enviado prontamente assim que a sentinela for destruída. Além disso, a XenoThreat lembrará que você é alguém disposto a lutar pelo que é certo. \n\nEsp. Com. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Turrets:</EM4> 1 (hostile)
XenoThreat_claimsweep_desc_medium=Você valoriza a liberdade da humanidade?Nesse caso, estou oferecendo a você a chance de provar isso. Digitalizações recentes descobriram sentinelas orbitais e naves patrulhando em ~mission(location|address). Acreditamos que eles fazem parte de uma campanha de espionagem UEE visando a XenoThreat.É importante impedir que a reunião de inteligência deles antes de lançarmos nossa próxima missão. \n\nNós procurando um mercador experiente disposto a eliminar essas forças imediatamente. As sentinelas são a prioridade, mas as naves podem ser um problema maior se tiverem permissão para escapar. Você precisará avaliar a situação mais de perto quando estiver no local.\n\nNós poderiamos cuidar dele nós mesmos, mas querer enviar um contratado para que a escória por trás disso não saiba quem os atingiu. O pagamento será enviado imediatamente após a conclusão. Além disso, a satisfação de saber que você está ajudando uma boa causa. \n\nEsp. Com. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostile Wave x4, Prospectors x2\n<EM4>Turrets:</EM4> 3 (hostile)
XenoThreat_claimsweep_desc_rand=Parece que o UEE está intensificando seus esforços para interromper nosso movimento. Um de nossos pilotos descobriu algumas sentinelas e naves orbitais em ~mission(location|address). Acreditamos que eles fazem parte de uma campanha de espionagem de UEE visando a XenoThreat e é vital que seja interrompido antes que eles coloquem qualquer coisa que possa prejudicar nossos esforços contínuos. Invasão de privacidade antes de se espalhar ainda mais. Quem sabe quanto maior essa operação ficará se não for retirada imediatamente?O pagamento fará valer a pena e será enviado prontamente quando tudo for soprado para bits.\n\nVeja como foi feito, e ajude a fazer parte do lado direito da história. \n\nEsp. Com. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostile Wave x32, Prospectors x5\n<EM4>Turrets:</EM4> 4 (hostile)
XenoThreat_claimsweep_title_easy=Sentas de silêncio <EM4>[50 Rep]</EM4>
XenoThreat_claimsweep_title_hard=Annihilate Sentries <EM4>[250 Rep]</EM4>
XenoThreat_claimsweep_title_intro=Rescisão de vigilância <EM4>[50 Rep]</EM4>
