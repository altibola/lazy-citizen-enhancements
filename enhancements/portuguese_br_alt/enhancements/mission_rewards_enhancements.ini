xenothreat_destroy_server_HH_desc_01=Um de nossos datarunners desapareceu enquanto transportava informações operacionais vitais. Algumas horas atrás, determinamos que eles foram atingidos por um grupo de ataque de Headhunters e o conteúdo dos armazenamentos de dados da nave foi transferido para seus servidores em ~mission(location|address). \n\nEmbora tenhamos todos os motivos para acreditar que nossa criptografia será mantida, não podemos correr o risco de que o conteúdo desses arquivos seja exposto. Você está recebendo ordens de ir até lá e garantir que nossos dados permaneçam privados, destruindo os servidores dos Headhunters.\n\nEu recomendo fortemente que você seja minucioso. Destrua tudo e todos que puder.\n\nEsp. Com. Engler\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
xenothreat_destroy_server_HH_title_01=Limpeza Total do Servidor <EM4>[50 Rep]</EM4>
xenothreat_eliminateall_CFP_outpost_desc_01=Não se pode mais permitir que o grupo de instigadores que se autodenomina “Citizens for Prosperity” continue a espalhar suas mentiras e propaganda sem repercussão.\n\nComo um lembrete nítido de quem realmente controla Pyro, emitimos uma ordem de morte para erradicar toda a presença de “Citizens” em ~mission(location|address). É provável que haja resistência, mas esperamos que você lide com isso com pouca dificuldade. Faça o que foi determinado e você será bem pago por seu trabalho.\n\nEsp. Com. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
xenothreat_eliminateall_CFP_outpost_title_01=Ordem para Matar: "“Citizens" em ~mission(location) <EM4>[1,000 Rep]</EM4>
xenothreat_eliminatespecific_desc_001=Os esforços da XenoThreat para impedir que influências externas infectem esse sistema estão sendo testados por um grupo que ousa se autodenominar Citizens for Prosperity. Um membro proeminente do grupo, ~mission(TargetName), estabeleceu operações em ~mission(Location|Address) e já está trabalhando duro para espalhar suas mentiras e propaganda para qualquer um que queira ouvir. Se quisermos que Pyro permaneça independente do UEE e da influência alienígena, então algo deve ser feito sobre isso agora.  \n\nÉ por isso que a XenoThreat está emitindo uma ordem de assassinato para ~mission(TargetName|Last). E sabendo como eles são importantes para as operações da Citizens for Prosperity, eu não ficaria surpreso se você tivesse que lutar para passar por um grupo de seus seguidores mais fanáticos antes mesmo de ter uma chance contra eles. Mas lembre-se de que ~mission(TargetName|Last) é o seu alvo, e o pagamento depende exclusivamente de você garantir que eles sejam eliminados. \n\nEsp. Com. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Unknown:</EM4> 1
xenothreat_eliminatespecific_desc_002=Os Headhunters reuniram uma equipe de ataque especial cujo único propósito é atacar, interromper e minar nossas operações. Por mais que eu relute em admitir, eles tiveram alguns pequenos sucessos e estão rapidamente se tornando uma preocupação. \n\nXenoThreat sabe que a melhor maneira de matar uma cobra é cortando sua cabeça, então estamos emitindo uma ordem de morte para o comandante da equipe de ataque ~mission(TargetName), que de acordo com nossas fontes de inteligência, está escondido em ~mission(Location|Address) há alguns dias. \n\nEu esperaria uma forte resistência das forças Headhunters de lá. Pelo que ouvimos, ~mission(TargetName|Last) recebeu esse comando parcialmente por causa da lealdade feroz que inspiram nos outros. Reunir a sua própria equipe para resolver isto seria uma estratégia operacional sólida. \n\nFeliz Head Hunting,\n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Unknown:</EM4> 1
xenothreat_eliminatespecific_title_001=Lute por uma Pyro livre <EM4>[1,000 Rep]</EM4>
xenothreat_eliminatespecific_title_002=CAÇANDO CABEÇAS <EM4>[1,000 Rep]</EM4>
