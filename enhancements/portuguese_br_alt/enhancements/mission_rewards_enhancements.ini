TarPits_ShipStrip_desc_001=Temos um trabalho de sucateamento específico onde precisaríamos de algumas mãos extras. \n\nPrecisamos que você encontre uma ~mission(ship) que foi destruída perto de ~mission(location). A segurança já está procurando por ele e, se a encontrarem, com certeza irão identificá-la e teremos muitos problemas.\n\nPortanto, queremos que você a desfaça antes que alguém a veja. Rasgue todo o casco para que ninguém saiba a quem ela pertence, não deixe nenhuma mancha de pintura para trás e, claro, mantenha a boca fechada sobre tudo o que vê. Nós iremos compensá-lo e você poderá ficar com tudo o que descartar. Mas se a segurança encontrar a nave antes de você terminar, estaremos todos ferrados e você não será pago, então não nos decepcione.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Friendlies:</EM4> Salvageable Ships x1
Tarpits_assassinate_dc_desc_001=Não tenho tempo a perder, então vou direto ao ponto: ~mission(TargetName) precisa ser morto e quero que você o faça. Você pode encontrá-lo perto da ~mission(Location) em ~mission(Location|address). Ele não estará sozinho, mas não se distraia com esses imundices. Você só será pago se eliminar ~mission(TargetName|Last).\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x18, Juggernauts x1, Snipers x2, Soldiers x9, Technicians x3
Tarpits_destroyitem_dc_desc_001=Estou querendo enviar uma mensagem forte para a equipe da ~mission(Location|Address) e sei a maneira perfeita de fazer isso - danos à propriedade.\n\nTudo o que você precisa fazer é ir até lá, destruir algumas coisas aqui e ali e realmente transmitir uma lição importante sobre o respeito aos seus superiores. \n\nFaça isso por mim e me sentirei muito feliz. E generoso.\n\nInteressado?\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Tarpits_eliminateboss_dc_desc_001=Já faz algum tempo que estamos de olho em ~mission(TargetName), mas nunca conseguimos encontrar o momento certo. Chega de esperar. Você vai criar o momento certo para nós.\n\nVá para ~mission(Location|Address) e elimine um bando de marginais que circulam em ~mission(Location). Mate um número suficiente desses perdedores e ~mission(TargetName|Last) não terá escolha a não ser enfrentar você. É nesse momento que você os derruba e ganha um bom e gordo pagamento. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x20, Juggernauts x1, Snipers x2, Soldiers x7
Tarpits_theft_mines_dc_desc_001=Eu espero que você esteja interessado em fazer um pequeno trabalho para nós. Temos algumas mercadorias em ~mission(Location|Address) que são perfeitas para serem levadas. O único problema é que - e é um grande problema - os bastardos que dirigem o local têm toda a área equipada com minas de proximidade. \n\nVocê precisará encontrar uma maneira de passar por elas ou, se não puder se incomodar, uma maneira de acioná-las. De qualquer forma, tente não se explodir. Depois, é só pegar o material e levá-lo para ~mission(Destination|Address).\n\nNão será fácil, mas, se você conseguir, prometo que valerá a pena.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Test_Description=Descrição da missão (WIP)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
Test_Title_Revenge_01=Vingança 01 (WIP) <EM4>[500 Rep]</EM4>
TheCollector_Conversion_Favors_Desc=Talvez Wikelo não tenha algo que você queira feito (o que é estranho, mas tudo bem). Velho Wikelo daria <EM4>favores</EM4>, um jeito muito bom de provar que você trabalha para mim. Colete o suficiente e troque quando eu tiver algo que você queira.\n\nTraga as coisas para <EM4>~mission(destination|ListAll)</EM4> e trocarei por um favor.\n\nAdeus.\n\n<EM3>ITEM REWARDS</EM3>\n- Wikelo Favor\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Conversion_Favors_Desc_1=Wikelo tem outro jeito de conseguir <EM4>favores</EM4> se você estiver interessado. \n\nSeu mercenário tem metal <EM4>scrip</EM4>, usado como favores, mas feito de um metal muito interessante que Wikelo precisa para um novo projeto.\n\nSe você trouxer scrips para <EM4>~mission(destination|ListAll)</EM4>, trocarei por um favor.\n\nAdeus.\n\n<EM3>ITEM REWARDS</EM3>\n- Wikelo Favor\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Conversion_Favors_Desc_2=Se você quiser outra maneira de conseguir <EM4>favores</EM4> de Wikelo, tenho algo para você. Wikelo precisa de <EM4>scrip</EM4> dado pelo grupo do Conselho. Wikelo não faz parte da guilda de ladrões, mas tem negócios de vez em quando.\n\nSe você trouxer scrips para <EM4>~mission(destination|ListAll)</EM4>, trocarei por um favor.\n\nAdeus.\n\n<EM3>ITEM REWARDS</EM3>\n- Wikelo Favor\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Conversion_Favors_Desc_3=Tenho um novo jeito de conseguir <EM4>favores</EM4> de Wikelo. Ouvi muito sobre coisas de minhoca em tempestades de radiação. Feitas de muitas partes interessantes que Wikelo encontra utilidade. \n\nSe você trouxer as partes para <EM4>~mission(destination|ListAll)</EM4>, trocarei por um favor.\n\nAdeus.\n\n<EM3>ITEM REWARDS</EM3>\n- Wikelo Favor\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Conversion_Favors_Title=Transforme Coisas em Favores
TheCollector_Conversion_Favors_Title_1=TROCAR SCRIP DE MERCENÁRIO POR FAVORES?
TheCollector_Conversion_Favors_Title_2=Trocar Scrip do Council por Favores?
TheCollector_Conversion_Favors_Title_3=Trocar Partes de Vermes por Favores?
TheCollector_Conversion_SpecialFavors_Desc=Wikelo precisa de grandes quantidades de <EM4>quantainium</EM4> e está disposto a te dar uma bela Polaris em troca, mas também sabe que muitos humanos não têm muito espaço, então você negocia conforme avança. Wikelo lhe dará <EM4>partes da Polaris</EM4> se você quiser trocar quantainium. Funciona como favores. Ajude Wikelo a lembrar o quanto você deu. \n\nTraga quantainium para <EM4>~mission(destination|ListAll)</EM4> e ele trocará por partes.\n\nTchau.\n\n<EM3>ITEM REWARDS</EM3>\n- Polaris Bit\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Conversion_SpecialFavors_Title=Quer Polaris? Preciso algo especial.
TheCollector_Intro_Desc=Olá, eu sou Wikelo. Adição recente ao seu sistema e muito animado por estar aqui. Passei muito tempo aqui na UEE e fico feliz em passar mais.\n\nTenho um lugar onde faço coisas a partir de outras coisas.\n\nPreciso de uma pessoa para me trazer coisas úteis para terminar o projeto em que estou trabalhando. Você tem a lista. Pegue, por favor. Estou em <EM4>~mission(destination|ListAll)</EM4>.\n\nDarei um item pela sua ajuda.\n\nAlém disso, quando terminar, se quiser fazer mais, tenho muitas coisas que posso fabricar na minha humilde oficina. Venha, olhe o pôster bonito e então decida o que quer que eu faça.\n\nTchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Rep:</EM4> +10
TheCollector_Intro_Title=Wikelo Chega ao Sistema <EM4>[10 Rep]</EM4>
TheCollector_Lunch_Desc=Vocês humanos me mantêm muito ocupado, Wikelo. Trabalho mais do que quando estava na antiga guilda. Mas Wikelo está com muita fome agora e não consegue comida.\n\nPor favor, ajude. Traga comida e bebida para o Empório Wikelo em <EM4>~mission(destination|ListAll)</EM4>.\n\nAgradeço muito sua ajuda. Darei algo em troca.\n\nAdeus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Lunch_Title=Muita Fome
TheCollector_Menu_Desc_PolarisShip=Wikelo recentemente conseguiu muitos projetos em troca com um humano que não é muito esperto. Agora pode fazer uma nave muito grande.\n\nNão é barato e precisa de muitas peças, mas farei. Se você quiser, vá rápido, isso custa muito para Wikelo, então não poderei fazer por muito tempo, mas gosto do novo sistema Humano, então quero agradecer a todos pela recepção.\n\nTraga para <EM4>~mission(destination|ListAll)</EM4> se quiser.\n\nAdeus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +1,000
TheCollector_Menu_Title_PolarisShip=AGORA FAÇA POLARIS. OFERTA DE CURTO PRAZO. <EM4>[1,000 Rep]</EM4>
TheCollector_Mod_ATLS_Geo_Grad1_Desc=Wikelo viajou para um planeta Humano e achou muito frio, mas muito bonito. Isso lembra disso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Mod_ATLS_Geo_Grad1_Name=Cor da Neve ATLS <EM4>[20 Rep]</EM4>
TheCollector_Mod_ATLS_Geo_Grad2_Desc=Muitos locais de trabalho Humanos têm cor laranja. Deve significar trabalho para você. Essa roupa funciona. Faz sentido.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Mod_ATLS_Geo_Grad2_Name=Linha Laranja ATLS <EM4>[20 Rep]</EM4>
TheCollector_Mod_ATLS_Geo_Grad3_Desc=Wikelo deu cores vermelho escuro e verde para fazer as pernas do ATLS parecerem que estão resfriando do calor. Muito bonito.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Mod_ATLS_Geo_Grad3_Name=Cor Metal Frio ATLS <EM4>[20 Rep]</EM4>
TheCollector_Recipes_Desc_ApolloSkin=Apollo é uma nave muito boa. Seria muito melhor se a nave fosse vermelha. Wikelo torna todas as coisas possíveis. Você troca pelo que eu quero e temos um acordo.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Recipes_Desc_AtlsJump=Encontrar peça muito divertida para adicionar ao grande traje humano que permite pular bem alto. Agora você atira e pula. Empolgante.\n\nSe quiser, traga isso para <EM4>~mission(destination|ListAll)</EM4>. Irei fazer.\n\nWikelo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Recipes_Desc_AtlsPew=Olá. Sei que você humano gosta de estranho traje metálico. Que tal traje metálico com ikti? Desculpa, ikti é palavra Banu, vocês chamam de 'arma.'\n\nSe quiser, traga as coisas que eu disser e farei para você. Arma vai atirar. Causar muito dano.\n\nTchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Recipes_Desc_Battle=Traga-me armaduras e outras coisas e eu lhe darei uma armadura de teste especial. Primeira versão. Muito especial. Traga e eu darei. Tchau.\n\n<EM3>ITEM REWARDS</EM3>\n- Palatino Helmet Mark I\n- Palatino Arms Mark I\n- Palatino Legs Mark I\n- Palatino Core Mark I\n- Palatino Backpack Mark I\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +25
TheCollector_Recipes_Desc_BigBooma=Wikelo encontrar arma muito estranha mas funcional enquanto vagava por seus sistemas. É muito simples mas muito eficaz. Se você me trouxer coisas, eu mostro o que eu faço com ela.\n\nMuito divertido.\n\n<EM3>ITEM REWARDS</EM3>\n- Boomtube "Clanguard" Rocket Launcher\n- Boomtube Rocket\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_GMNI_Shotgun=Atirar pode fazer sujeira. Sangue humano vermelho por todo lado. Não é um problema com esta escopeta. Os respingos se misturam perfeitamente! Eu a entrego a você se me der tudo o que quero na lista. Boa troca.\n\n<EM3>ITEM REWARDS</EM3>\n- R97 "Crimson Camo" Shotgun\n- R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_HeavyUtil=Você precisa de um traje utilitário. Bom para trabalho. Se quiser, Wikelo pode deixá-lo mais vistoso. Vai ficar muito bom. Veja o que o Wikelo precisa e traga.\n\n<EM3>ITEM REWARDS</EM3>\n- Corbel Helmet Crush\n- Corbel Core Crush\n- Corbel Arms Crush\n- Corbel Legs Crush\n- Novikov Backpack Crush\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Recipes_Desc_Hush=Você quer ficar escondido. Wikelo entende. Não faz perguntas sobre o porquê. Mas o que fazer quando você está na neve? Wikelo tem um traje para isso.\n\nSeja bem-vindo.\n\n<EM3>ITEM REWARDS</EM3>\n- Geist Armor Arms Snow Camo\n- Geist Armor Core Snow Camo\n- Geist Armor Helmet Snow Camo\n- Geist Armor Legs Snow Camo\n- Geist Backpack Snow Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +25
TheCollector_Recipes_Desc_IrrArm=Wikelo teve ideia empolgante durante breve descanso do trabalho. Estava pensando nos pequenos vermes brilhantes em Pyro e viu armadura se transformar para parecer com eles.\n\nSe você me trouxer as peças, leve para <EM4>~mission(destination|ListAll)</EM4> e farei para você, então você também poderá brilhar.\n\nTchau.\n\n<EM3>ITEM REWARDS</EM3>\n- Bokto Core\n- Bokto Arms\n- Bokto Legs\n- Bokto Helmet\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +25
TheCollector_Recipes_Desc_KopSkull=Olá. Posso fazer alteração divertida em arma se quiser. Usar pele de kopion como padrão e pequeno crânio pendurado. Muito eficaz. Disparo melhora bastante.\n\nTudo que precisa é me trazer as peças em <EM4>~mission(destination|ListAll)</EM4> e farei.\n\nTchau.\n\n<EM3>ITEM REWARDS</EM3>\n- Parallax "Fun Kopion Skull" Energy Assault Rifle\n- Parallax Rifle Battery (80 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_L22Wolf=Wikelo muito animado. Ter ideia para novo material. Mas fabricar é muito difícil. Muito complicado. Preciso de ajuda para fabricar uma amostra de teste. Eu dou o projeto, você faz, traz para mim e eu troco. Dou para você a L-22 Wolf extra especial. Muito poderosa, muito lobo.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Metamaterial Test #146\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Blueprint Reward:</EM4> Guaranteed
TheCollector_Recipes_Desc_MiltSkull=Olá. Posso fazer versão de arma se você for soldado kopion. Fazer material parecido com camuflagem de soldado, mas com crânio morto na frente. Arma também atira melhor.\n\nSe quiser, traga peça para <EM4>~mission(destination|ListAll)</EM4> e farei.\n\n<EM3>ITEM REWARDS</EM3>\n- Parallax "Fun Military Skull" Energy Assault Rifle\n- Parallax Rifle Battery (80 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_Molten=Se você tem uma armadura, Wikelo pode fazê-la parecer quente. Boa aparência para uma armadura útil. Traga-me os itens e eu farei.\n\n<EM3>ITEM REWARDS</EM3>\n- Strata Core Heatwave\n- Strata Arms Heatwave\n- Strata Legs Heatwave\n- Strata Helmet Heatwave\n- Strata Backpack Heatwave\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +25
TheCollector_Recipes_Desc_NoneAR=Este rifle é muito bom para atirar, mas poderia ter um design mais bonito. Wikelo consertou. Parece muito bom agora. Dou a você para troca. Traga-me as coisas, eu lhe dou o rifle. Até lhe dou o projeto se precisar.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Killshot "Dominion Camo" Rifle\n\n<EM3>ITEM REWARDS</EM3>\n- Killshot "Dominion Camo" Rifle\n- Killshot Rifle Magazine (45 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10\n<EM4>Blueprint Reward:</EM4> Guaranteed
TheCollector_Recipes_Desc_NonePistol=Você precisa de uma arma boa, sim? Tenho uma para você. Pequena, mas poderosa. Como uma pimenta balalu extra picante. Wikelo faz esta pistola parecer extra picante também. Você traz coisas que eu preciso e eu faço uma troca.\n\nTchau.\n\n<EM3>ITEM REWARDS</EM3>\n- Tripledown "Heatwave" Pistol\n- Tripledown Pistol Magazine (12 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_RedHunterArmor=Wikelo ouviu dizer que os humanos acham que vermelho é a cor da paixão e da raiva. Esta armadura é boa para ambas. Você me entrega os itens da lista e esta armadura vermelha é sua.\n\n<EM3>ITEM REWARDS</EM3>\n- Monde Helmet Crimson Camo\n- Monde Core Crimson Camo\n- Monde Arms Crimson Camo\n- Monde Legs Crimson Camo\n- Warden Backpack Crimson Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_SandArmour=Olá, sei que muitos humanos querem saldínio por causa do problema de regeneração. Créditos são bons, sim, mas Wikelo pode usar isso, chifre de kopion e outras coisas para fazer armadura especial.\n\nQuando terminar, você será muito resistente. Muito assustador.\n\nVocê verá os itens necessários. Traga para <EM4>~mission(destination|ListAll)</EM4> e eu faço para você.\n\nTchau.\n\n<EM3>ITEM REWARDS</EM3>\n- Ana Arms Endro\n- Ana Legs Endro\n- Ana Core Endro\n- Ana Helmet Endro\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +25
TheCollector_Recipes_Desc_SlimyLMG=Esta arma tem a imagem de uma criatura incrível na lateral. Use-a e ela fará você grande e forte como um Yormandi. Cospe relâmpagos. Traga-me meus itens e então você a receberá. Tchau.\n\n<EM3>ITEM REWARDS</EM3>\n- Fresnel "Yormandi" Energy LMG\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_SpikeyArmor=Vanduul têm maneiras estranhas. Eu nunca falo com eles, meu velho costumava falar, mas Wikelo não. Enfim, embora não sejam amigáveis, eles fazem coisas interessantes. Se você quiser, Wikelo pode fazer você se parecer mais com eles.\n\nTraga coisas. Farei isso.\n\nTchau.\n\n<EM3>ITEM REWARDS</EM3>\n- Testudo Helmet Clanguard\n- Testudo Arms Clanguard\n- Testudo Core Clanguard\n- Testudo Legs Clanguard\n- Testudo Backpack Clanguard\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +25
TheCollector_Recipes_Desc_VGLflightsuit=Naves têm janelas grandes. Todos podem ver você voando. Você deve estar com a melhor aparência. Wikelo tem um traje de voo muito bom para você. Faça a troca, traga-me o que eu preciso e Wikelo dá o traje. Dou o projeto também se você não tiver.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Tailwind Flight Helmet Dominion Camo\n- [S1-A] Tailwind Flight Suit Dominion Camo\n\n<EM3>ITEM REWARDS</EM3>\n- Tailwind Flight Suit Dominion Camo\n- Tailwind Flight Helmet Dominion Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10\n<EM4>Blueprint Reward:</EM4> Guaranteed
TheCollector_Recipes_Desc_VoltThwack=Sente que arma não está brava o suficiente? Espingarda VOLT é muito poderosa, muito perigosa, mas não assusta? Traga para mim. Posso deixar muito assustadora e brava.\n\nEles vão te respeitar então. Traga para <EM4>~mission(destination|ListAll)</EM4> e faremos.\n\nTchau.\n\n<EM3>ITEM REWARDS</EM3>\n- Prism "Irradiated" Laser Shotgun\n- Prism Laser Shotgun Battery (20 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_ZipZap=Quer atirar de longe e continuar escondido. Mas está nevando? Wikelo tem uma arma pra você.\n\nTraga as coisas. Eu dou.\n\nTchau.\n\n<EM3>ITEM REWARDS</EM3>\n- Zenith "Snow Camo" Laser Sniper Rifle\n- Zenith Laser Sniper Rifle Battery (22 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
