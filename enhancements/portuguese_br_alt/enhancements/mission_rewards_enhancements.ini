Shubin_Industrial_HandMining_Nyx_M_PlanetarySystem_Desc_001=CONTRATO: Ordem de Mineração\nLOCALIZAÇÃO: Nyx\n\nDETALHES:\nUma de nossas equipes de prospecção confirmou recentemente que os asteroides que abrigam as Estações QV Breaker em todo o Cinturão Keeger de Nyx contêm um tipo de minério raro, Sadaryx.\n\nNo entanto, devido à dificuldade de acesso a essas estações e aos riscos inerentes envolvidos, estamos buscando equipes de mineração externas para lidar com a extração.\n\nNão temos uma localização confirmada de onde os depósitos de Sadaryx estão situados dentro da estação, mas recomendamos começar pelas seções de cavernas onde os minerais se formam naturalmente. Se tiver muita sorte, poderá até encontrar alguns cristais no armazenamento que foram minerados pelas antigas equipes de trabalho da QV.\n\n<EM4>TERMOS*:</EM4>\nSua equipe precisará obter acesso a uma <EM4>Estação QV Breaker</EM4>, coletar o <EM4>minério Sadaryx</EM4> necessário e entregá-lo no elevador de carga localizado em <EM4>~mission(Destination|Address)</EM4>.\n\nIsso exigirá uma <EM4>Multi-Tool com um Acessório de Mineração</EM4> e um entendimento básico de mineração manual.\n\nNossas equipes de prospecção relataram que estas estações podem ter sido infiltradas por fora da lei. Recomenda-se cautela.\n\n*Ao aceitar este contrato, você assume todo e qualquer risco associado ao trabalho aqui descrito e, de forma alguma, a Shubin Interstellar poderá ser responsabilizada por quaisquer danos acumulados durante a vigência do contrato.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +100 Rep
Shubin_Industrial_HandMining_Nyx_M_PlanetarySystem_Title_001=PEQUENA ORDEM DE MINERAÇÃO: SADARYX <EM4>[100 Rep]</EM4>
