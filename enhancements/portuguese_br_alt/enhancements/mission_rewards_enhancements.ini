MTPS_eliminateall_dc_desc_001=SOBRE O TRABALHO\nA microTech Protection Services está procurando um profissional mercenário orientado aos detalhes que possa nos ajudar de forma rápida e segura na remoção completa do grupo fora da lei que obteve temporariamente o controle de ~mission(Location) em ~mission(Location|Address).\n\nRESPONSABILIDADES\n- Fornecer transporte próprio até ~mission(Location|Address).\n- Remover todos os membros da força hostil fora da lei, usando a força conforme necessário. \n\nQUALIFICAÇÕES MÍNIMAS\n- 2 anos de experiência combinada em mercenarismo e segurança.\n- Acesso a equipamento de combate e meio de transporte.\n- Disponível para mobilização imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n- Experiência com técnicas de redução rápida de hostilidade.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Juggernauts x2, Soldiers x12, Technicians x2
MTPS_eliminateall_dc_title_001=REMOVER FORÇA HOSTIL <EM4>[500 Rep]</EM4>
MTPS_eliminateboss_dc_desc_001=SOBRE O TRABALHO\nA microTech Protection Services está procurando um caçador de recompensas qualificado para prender ~mission(TargetName), que até agora tem conseguido escapar da captura. Ele está coordenando uma incursão ativa em ~mission(Location|Address), e acreditamos que pode finalmente ser atraído para fora do esconderijo se suas forças que atacam ~mission(Location) enfrentarem resistência forte o suficiente. \n\nRESPONSABILIDADES\n- Fornecer transporte próprio até ~mission(Location|Address).\n- Neutralizar os associados criminosos de ~mission(TargetName) perto de ~mission(Location) para atrair o alvo para o campo aberto. \n- Neutralizar ~mission(TargetName); usando a força, se necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n- Acesso a equipamento de combate e meio de transporte.\n- Disponível para mobilização imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n- Capacidade de lidar com situações de alta pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x1, Soldiers x7, Technicians x5
MTPS_eliminateboss_dc_title_001=RECOMPENSA DE APREENSÃO: ~mission(TargetName) (HRT) <EM4>[500 Rep]</EM4>
MTPS_eliminateboss_multi_dc_desc_001=SOBRE O TRABALHO\nA microTech Protection Services está procurando um caçador de recompensas qualificado para prender ~mission(TargetName) que, até o momento, conseguiu escapar da captura. Ele está coordenando uma incursão ativa que se espalhou por toda a ~mission(Location|Address).  \n\nNossa esperança é que você possa finalmente tirá-lo do esconderijo se confrontar as forças dele em vários pontos de ataque diferentes. Com o número deles suficientemente enfraquecido,  ~mission(TargetName|Last) provavelmente correrá o risco de se expor e você poderá confrontá-lo diretamente.\n\nRESPONSABILIDADES\n- Forneça transporte próprio até ~mission(Location|Address).\n-Confronte os associados criminosos d ~mission(TargetName) para atrair o alvo para o campo aberto. \n- Neutralizar a ~mission(TargetName); usando a força, se necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n- Acesso a equipamento de combate e meio de transporte.\n- Disponível para mobilização imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n- Capacidade de lidar com situações de alta pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Backup x5, Juggernauts x1, Soldiers x18, Technicians x32
MTPS_eliminateboss_multi_dc_title_001=Garantir Recompensa: ~mission(TargetName) (VHRT) <EM4>[1,000 Rep]</EM4>
MTPS_eliminatespecific_dc_desc_001=SOBRE O TRABALHO\nA microTech Protection Services está procurando um caçador de recompensas qualificado para prender ~mission(TargetName) de ~mission(Location|Address). Ele foi visto recentemente perto de ~mission(Location) e acredita-se que ainda esteja nessa área.\n\nEmbora possa haver outros criminosos ativos no local, seu foco principal deve ser completar a recompensa.\n\nRESPONSABILIDADES\n- Fornecer transporte próprio até ~mission(Location|Address). \n- Neutralizar ~mission(TargetName); usando a força conforme necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n- Acesso a equipamento de combate e meio de transporte.\n- Disponível para mobilização imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n- Capacidade de lidar com situações de alta pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Juggernauts x1, Snipers x5, Soldiers x14
MTPS_eliminatespecific_dc_title_001=Recompensa Ativa: ~mission(TargetName) (MRT) <EM4>[500 Rep]</EM4>
MTPS_searchbody_danger_dc_desc_001=SOBRE O TRABALHO\nA microTech Protection Services está procurando um contratado qualificado para ajudar na busca de ~mission(TargetName) que foi visto pela última vez perto de ~mission(Location) em ~mission(Location|Address), mas cujo paradeiro atual é desconhecido. \n\nNossa investigação preliminar nos levou a suspeitar que um crime pode estar por trás de seu desaparecimento. Dessa forma, recomenda-se maior cautela, pois pode haver agentes hostis envolvidos.\n\nRESPONSABILIDADES\n- Fornecer transporte próprio para ~mission(Location|address).\n- Confirmar a localização de ~mission(TargetName) e se ainda está vivo. \n\nQUALIFICAÇÕES MÍNIMAS\n- 2 anos de experiência em segurança.\n- Disponível para mobilização imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n- Experiência em conduzir investigações de pessoas desaparecidas.\n- Capacidade de lidar com situações de alta pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
MTPS_searchbody_dc_desc_001=SOBRE O TRABALHO\nDepois de receber um relatório de que ~mission(TargetName) está desaparecido, a microTech Protection Services está procurando um prestador de serviços qualificado para iniciar uma busca no local de ~mission(Location|Address) para descobrir seu paradeiro atual. O indivíduo desaparecido foi visto pela última vez entrando em ~mission(Location), portanto, recomenda-se iniciar a busca lá.\n\nRESPONSABILIDADES\n- Fornecer transporte próprio até ~mission(Location|Address). \n- Confirmar a localização de ~mission(TargetName) e se ainda está vivo.\n\nQUALIFICAÇÕES MÍNIMAS\n- 2 anos de experiência em segurança.\n- Disponível para mobilização imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n- Experiência em conduzir investigações de pessoas desaparecidas.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
NTLockdown_FleetDestroy_Antagonist_MBroker_desc=Agora que a Crusader encontrou sua frota, a Nine Tails parece ter finalmente percebido o quão útil uma ajudinha extra pode ser.\n\nResumindo a história, eles estão procurando por alguns bandidos contratados para manter a Crusader sob controle. . Você e todos os outros voluntários receberão uma recompensa por cada nave de segurança retirado. \n\nE se você mantiver a Crusader ocupado por tempo suficiente para que a Nine Tails termine o que quer que esteja tentando fazer com esse impedimento quântico, você receberá um grande bônus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
NTLockdown_FleetDestroy_MBroker_desc=A Crusaders Security confirmou a localização da frota dos foras-da-lei Nine Tails e agora está se mobilizando para acabar com o impedimento quântico em ~mission(Location).\n\nEstamos mais uma vez procurando profissionais de segurança treinados para se juntarem aos nossos esforços de resposta a emergências e ajudar para neutralizar esta ameaça perigosa.\n\nAntes de se comprometer, esteja ciente de que haverá uma resistência significativa da Nine Tails e que até o fim do bloqueio, viagens quânticas neste setor não serão possíveis.\n\nCONTATO APROVADO POR:\nDiretora Sasha Rust\nID# 122L964G\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +4,000
NTLockdown_FleetDestroy_MBroker_name=Bloqueio Ilegal - Neutralize a Frota Nine Tails <EM4>[4,000 Rep]</EM4>
NTLockdown_FleetFind_Antagonist_MBroker_desc=Eu disse a Nine Tails que bloquear a viagem quântica para manter uma área inteira como refém atrairia o tipo errado de atenção, mas eles me ouviram? Não. Agora a Crusader tem dezenas de escâners por aí enfiando o nariz em coisas que prefiro manter escondidas. \n\nÉ por isso que estou tentando contratar o máximo de pessoas possível para me ajudar. Quero pagar por cada nave escâner Crusader que você destruir. \nEu até aumentarei seu preço por nave se todos vocês atingirem um certo número de mortes. Chame isso de incentivo de desempenho. E se você realmente estiver se sentindo um nerd, elimine qualquer idiota corajoso o suficiente para tentar entregar carga na estação bloqueada. Tenho alguns fornecedores que apreciarão a demanda adicional.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
NTLockdown_FleetFind_MBroker_desc=A Crusader Security descobriu que a organização criminosa conhecida como Nine Tails estabeleceu um bloqueio ilegal em torno de ~mission(Location) e interrompeu todo o tráfego quântico de entrada e saída neste setor.\n\nA frota sem lei deve ser encontrada e o bloqueio terminará .\n\nPedimos a todos os profissionais de segurança treinados no sistema que se juntem às forças da Crusader Security e protejam nossas naves de varredura enquanto localizam a localização da frota Nine Tails que causou este bloqueio. Tenha em mente que esta operação é de alto risco devido a a viagem quântica desativada e os numerosos inimigos nesta área. Recomenda-se fortemente que todos os pilotos que participam nesta operação de resgate estejam adequadamente equipados e carreguem um tanque de combustível cheio. \n\nContrato autorizado por:\nDiretora Sasha Rust\nID# 122L964G\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +4,000
NTLockdown_FleetFind_MBroker_name=Bloqueio ilegal - Encontre a frota Nine Tails responsável <EM4>[4,000 Rep]</EM4>
NTLockdown_StationSupply_MBroker_desc=O impedimento quântico ilegal em ~mission(Location) interrompeu as rotas comerciais normais e suprimentos vitais estão em falta. \n\nA Crusader Security está procurando comerciantes e transportadores para abastecer a estação com suprimentos médicos urgentemente necessários. \n\nOs preços oferecidos pela administração da estação serão ajustados à situação na Nine Tails e, além disso, devido ao aumento do risco, a Crusader concederá um bônus de perigo se os suprimentos médicos forem transportados com sucesso. \n\nAgradeço antecipadamente pelo seu apoio durante estes tempos difíceis.\n\nCONTATO APROVADO POR:\nDiretora Sasha Rust\nID# 122L964G\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
NorthRock_Delivery_Local_DerelictOutpost_Desc_01=O negócio é o seguinte: um cliente nosso (que deveria ter gasto os créditos extras para uma escolta Northrock) teve uma de suas naves atacada e agora precisa de nós para executar uma operação de recuperação de um pacote importante que foi roubado.\n\nFelizmente, tivemos uma chance e conseguimos rastrear as pessoas responsáveis até <EM4>~mission(Pickup1|Address)</EM4>. Precisamos que você vá até lá e recupere o pacote. Você poderá identificá-lo pelo número de série: <EM4>#~mission(Item1|SerialNumber)</EM4>.\n\nEspero que os criminosos reajam, mas lembre-se de que eles não são a prioridade.\n\nDepois de pegar o pacote, leve-o de volta para o cliente em <EM4>~mission(Dropoff1|Address)</EM4>. \n\nUma última coisa: certifique-se de trazer uma nave que tenha espaço suficiente para alguma carga. Não quero que você chegue até lá em sua Gladius ou qualquer outra coisa e tenha que voltar atrás.\n\nDeixe-nos orgulhosos,\n\nBraden Corchado\nOficial de Logística - Filial de Stanton\nNorthrock Service Group\n\n*RESUMO DA OPERAÇÃO DE RECUPERAÇÃO*\n* Recuperar o pacote <EM4>#~mission(Item1|SerialNumber)</EM4> de <EM4>~mission(Pickup1|Address)</EM4>\n* Entregar em <EM4>~mission(Dropoff1|Address)</EM4>\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
NorthRock_Delivery_Local_DerelictOutpost_Desc_02=É o seguinte – um cliente nosso (que deveria ter gasto os créditos extras em uma escolta da Northrock) teve uma de suas naves atacada e agora eles precisam que lideremos uma operação de recuperação de alguns pacotes importantes que foram roubados.\n\nAinda bem que tivemos sorte e conseguimos rastrear os responsáveis até <EM4>~mission(Pickup1|Address)</EM4>. Precisamos que você vá até lá e recupere os pacotes. Você conseguirá identificá-los pelos seus números de série: <EM4>#~mission(Item1|SerialNumber)</EM4>,\n<EM4>#~mission(Item2|SerialNumber)</EM4> e\n<EM4>#~mission(Item3|SerialNumber)</EM4>.\n\nEspero que os foras da lei resistam, mas lembre-se de que eles não são a prioridade.\n\nAssim que tiver os pacotes, entregue-os aos seus respectivos destinos: <EM4>~mission(Dropoff1|Address)</EM4>, <EM4>~mission(Dropoff2|Address)</EM4> e <EM4>~mission(Dropoff3|Address)</EM4>.\n\nUma última coisa, certifique-se de trazer uma nave que tenha espaço suficiente para a carga. Não queremos que você chegue até lá na sua Gladius ou seja lá o que for, apenas para ter que voltar.\n\nNos orgulhe,\n\nBraden Corchado\nOficial de Logística - Filial Stanton\nNorthrock Service Group\n\n*RESUMO DA OPERAÇÃO DE RECUPERAÇÃO*\n* Recupere os Pacotes <EM4>#~mission(Item1|SerialNumber)</EM4>, <EM4>#~mission(Item2|SerialNumber)</EM4> e <EM4>#~mission(Item3|SerialNumber)</EM4> em <EM4>~mission(Pickup1|Address)</EM4>\n* Entregue em <EM4>~mission(Dropoff1|Address)</EM4>, <EM4>~mission(Dropoff2|Address)</EM4> e <EM4>~mission(Dropoff3|Address)</EM4>\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
NorthRock_Delivery_Local_DerelictOutpost_Desc_03=O negócio é o seguinte: um cliente nosso (que deveria ter gasto os créditos extras para uma escolta Northrock) teve uma de suas naves atacada e agora precisa de nós para realizar uma operação de recuperação de alguns pacotes importantes que foram roubados.\n\nFelizmente, tivemos uma chance e conseguimos localizar as pessoas responsáveis em diferentes postos avançados abandonados. Precisamos que você vá até lá e recupere os pacotes. Você poderá identificá-los por seus números de série: <EM4>#~mission(Item1|SerialNumber)</EM4>, <EM4>#~mission(Item2|SerialNumber)</EM4> e <EM4>#~mission(Item3|SerialNumber)</EM4>.\n\nEspero que os criminosos reajam, mas lembre-se de que eles não são a prioridade.\n\nDepois de obter os pacotes, leve-os de volta ao cliente em <EM4>~mission(Dropoff1|Address)</EM4>. \n\nUma última coisa: certifique-se de levar uma nave que tenha espaço suficiente para a carga. Não quero que você chegue até lá com sua Gladius ou qualquer outra coisa e tenha que voltar atrás.\n\nDeixe-nos orgulhosos,\n\nBraden Corchado\nOficial de Logística - Filial de Stanton\nNorthrock Service Group\n\n*RESUMO DA OPERAÇÃO DE RECUPERAÇÃO*\n* Recuperar pacotes <EM4>#~mission(Item1|SerialNumber)</EM4>, <EM4>#~mission(Item2|SerialNumber)</EM4> e <EM4>#~mission(Item3|SerialNumber)</EM4> de <EM4>~mission(Pickup1|Address)</EM4>\n* Entregar em <EM4>~mission(Dropoff1|Address)</EM4>\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
