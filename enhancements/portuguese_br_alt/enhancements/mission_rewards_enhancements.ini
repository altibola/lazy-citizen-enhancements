headhunters_killship_xenothreat_ert_desc_001=Preciso que você seja rápido nessa. Há um tenente da XenoThreat chamado ~mission(TargetName) que está buscando ar. A Juíza acha que essa é uma grande chance de atrapalhar o comando da XenoThreat, eliminando-o. Ouvi dizer que ~mission(TargetName|Last) foi visto voando ao redor de ~mission(Location|Address), portanto, chegue lá rápido antes que ele desapareça novamente.\n\nEu levaria algum apoio, duvido que ele caia sem lutar. \n\nStows desligando\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 7/7 | Risk 7/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1\n<EM4>Elite Contractor:</EM4> +3,200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_killship_xenothreat_ert_title_001=Apague Alguns XenoLixos <EM4>[BP]</EM4> <EM4>[3,200 Rep]</EM4>
headhunters_maintenance_H_desc_001=As tempestades em <EM4>~mission(Location|Address)</EM4> estão sendo um verdadeiro problema. Um dos nossos postos foi completamente destruído ontem e precisa de reparos sérios, então estamos procurando ajuda.\n\nAcho que você vai precisar trazer <EM4>aproximadamente seis fusíveis</EM4>, uma <EM4>ferramenta de salvamento</EM4> e <EM4>cânisters de CMR suficientes para consertar no máximo oito tubos danificados</EM4>. Isso deve cobrir, mas você terá os números exatos no local.\n\nEsse lugar é um inferno.\n\nEsperamos que você saiba o que está fazendo, mas só por precaução, o <EM4>“Guia de Manutenção”</EM4> no seu mobiGlas Journal pode valer a pena conferir.\n\nStows.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Head Contractor:</EM4> +400 Rep
headhunters_maintenance_H_title_001=~mission(Location) precisa de reparos massivos <EM4>[400 Rep]</EM4>
headhunters_maintenance_M_desc_001=Precisamos de alguém habilidoso com ferramentas para ir até <EM4>~mission(Location|Address)</EM4> e ajudar com alguns reparos. Nosso último técnico resolveu a maior parte, mas ainda há algumas coisas que precisam de atenção.\n\nAcho que se você tiver <EM4>seis fusíveis</EM4>, uma <EM4>ferramenta de salvamento</EM4> e <EM4>cânisters de CMR suficientes para consertar cerca de cinco tubos</EM4>, estará coberto.\n\nEsperamos que você saiba o que está fazendo, mas só por precaução, o <EM4>“Guia de Manutenção”</EM4> no seu mobiGlas Journal pode valer a pena conferir.\n\nStows.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Sr. Contractor:</EM4> +100 Rep
headhunters_maintenance_M_title_001=~mission(Location) PRECISA DE VÁRIOS REPAROS <EM4>[100 Rep]</EM4>
headhunters_maintenance_local_E_desc_001=Ei, se você está lendo isto, precisamos de uma mão. Um de nossos postos em <EM4>~mission(Location|Address)</EM4> foi atingido por uma tempestade forte e sofreu alguns danos. Nenhum de nossos técnicos habituais está disponível (ou vivo) para ir até lá, então queremos contratar alguém para consertar alguns fusíveis (não sei exatamente quantos, mas <EM4>no máximo três</EM4> acho). Se você puder trazer uma <EM4>ferramenta de salvamento</EM4> com <EM4>cânisters de CMR suficientes para consertar cerca de três tubos</EM4>, deve ser suficiente.\n\nEsperamos que você saiba o que está fazendo, mas só por precaução, o <EM4>“Guia de Manutenção”</EM4> no seu mobiGlas Journal pode valer a pena conferir.\n\nStows desligando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 4/7\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Jr. Contractor:</EM4> +50 Rep
headhunters_maintenance_local_E_title_001=~mission(Location) precisa de alguns reparos <EM4>[25–50 Rep]</EM4>
headhunters_maintenance_local_H_desc_001=Em <EM4>~mission(Location|Address)</EM4>, o lugar foi completamente destruído em uma tempestade e precisa de reparos sérios.\n\nSe alguém aí tiver <EM4>um monte de fusíveis</EM4> (eu ouvi que <EM4>seis</EM4> são suficientes), uma <EM4>ferramenta de sucateamento</EM4>, e <EM4>recipientes de CMR suficientes para lidar com uns oito canos quebrados</EM4>, nós vamos te pagar para fazer o serviço.\n\nEspero que você saiba o que está fazendo, mas, caso contrário, o <EM4>“Guia de Manutenção”</EM4> no seu mobiGlas pode ser uma boa leitura.\n\nStows desligando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 1/7 | Complexity 1/7 | Risk 1/7 | Knowledge 2/7
headhunters_maintenance_local_H_title_001=~mission(Location) precisa de reparos massivos
headhunters_maintenance_local_M_desc_001=Estou enviando um pedido para quem estiver por perto. Temos uma grande ordem de trabalho para um dos nossos postos em <EM4>~mission(Location|Address)</EM4>. Parece que precisamos de <EM4>seis fusíveis</EM4> consertados. Você também vai precisar de uma <EM4>ferramenta de sucateamento</EM4> com <EM4>recipientes de CMR suficientes para consertar uns cinco canos</EM4> para evitar que o lugar desabe.\n\nSe você trouxer tudo o que for necessário para consertá-los, nós vamos te pagar.\n\nEspero que você saiba o que está fazendo, mas, caso contrário, o <EM4>“Guia de Manutenção”</EM4> no seu mobiGlas pode ser uma boa leitura.\n\nStows desligando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 1/7 | Complexity 1/7 | Risk 1/7 | Knowledge 2/7
headhunters_maintenance_local_M_title_001=~mission(Location) PRECISA DE VÁRIOS REPAROS
headhunters_multikillship_base_Generic_M_desc_001=Ao longo dos anos, muitas gangues de aspirantes peitaram  Headhunters pensando que poderiam forçar sua entrada no sistema. Nós ainda estamos aqui. Eles não estão. Mas parece que os sobreviventes desses grupos decidiram se unir e tentar novamente. Parece que algumas pessoas nunca aprendem.\n\nO último grupo atacou alguns de nossos comboios durante as viagens de abastecimento. Descobrimos que eles estão perto de ~mission(Location|Address) e provavelmente estão se rearmando para outro ataque. \n\nQueremos que você vá até lá e faça com que eles desejem ter morrido com sua antiga gangue.\n\nStows desligando\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Defenders x6, Targets x2\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_multikillship_base_Generic_M_title_001=Destrua Algumas Naves <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
headhunters_sabotage_generators_E_CFP_desc_001=Temos grandes planos prestes a acontecer, mas, infelizmente, a Citizens for Prosperity tem pessoas por perto em ~mission(Location|Address).\n\nComo não posso me dar ao luxo de ter esses bastardos nos atrapalhando, quero que você vá até lá e destrua os geradores de energia deles.\n\nIsso deve mantê-los afastados até terminarmos nossos negócios. \n\n-Stows desligando\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Jr. Contractor:</EM4> +75 Rep
headhunters_sabotage_generators_E_CFP_title_001=Corte a Energia da Citizens For Prosperity <EM4>[75 Rep]</EM4>
headhunters_sabotage_generators_VE_desc_001=Este é um trabalho bastante simples. Temos alguns idiotas em ~mission(Location|Address) que estão se achando melhores do que são. Vá e desligue a energia deles para lembrá-los de que os Headhunters estão no comando.\n\n-Stows desligando\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Jr. Contractor:</EM4> +25 Rep
headhunters_sabotage_generators_VE_title_001=Desligue a Energia em ~mission(Location) <EM4>[25 Rep]</EM4>
headhunters_sabotage_generators_multi_M_desc_001=Temos alguns saqueadores que se enraizaram em ~mission(Location|Address). Temos nossos próprios planos para lá e precisamos que o local seja limpo. \n\nÉ por isso que eu quero que você vá e desligue a energia deles. Vamos ver se isso não fará com que esses ratos abandonem o local para sempre.\n\n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Sr. Contractor:</EM4> +200 Rep
headhunters_sabotage_generators_multi_M_title_001=Derrube a Energia <EM4>[200 Rep]</EM4>
headhunters_sabotage_servers_E_CFP_desc_001=Longa história, curta - um Headhunter fez uma merda feia e agora a Citizens for Prosperity colocou as mãos em alguns dados que podem realmente nos causar danos. \n\nO desgraçado vai precisar de um tempo para se recuperar, então cabe a você limpar a bagunça. Você pode ir até ~mission(Location|Address) e destruir os servidores que estão armazenados lá? Quero ter certeza de que não há chance de essas informações serem divulgadas.\n\n-Stows desligando\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Jr. Contractor:</EM4> +75 Rep
headhunters_sabotage_servers_E_CFP_title_001=Limpe os Servidores da Citizens for Prosperity <EM4>[75 Rep]</EM4>
headhunters_sabotage_servers_H_XT_Title_001=Apague os Servidores da XenoThreat <EM4>[75–1,500 Rep]</EM4>
headhunters_sabotage_servers_H_XT_desc_001=Algo acabou de cair no meu colo e é bom demais para deixar passar. A coleta de informações da XenoThreat é um pouco lendária nos círculos em que atuo e acontece que eles estão armazenando um monte de suas melhores informações em ~mission(Location|Address).\n\nSeria uma pena se alguém, como você, fosse até lá e explodisse tudo, não é? \n\n-Stows desligando\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Contractor:</EM4> +75 Rep\n<EM4>Veteran Contractor:</EM4> +1,500 Rep
headhunters_sabotage_servers_M_CFP_desc_001=Parece que os bastardos da Citizens for Prosperity estão reunindo informações sobre nós. Eles vão tentar nos cortar de vários fluxos de receita e nos deixar sem dinheiro. Não podemos deixar isso acontecer. \n\nVá até ~mission(Location|Address) e destrua o armazenamento de dados deles. \n\nIsso deve ensiná-los a não meter o nariz onde não são chamados.\n\n-Stows desligando\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Jr. Contractor:</EM4> +75 Rep\n<EM4>Jr. Contractor:</EM4> +200 Rep
headhunters_sabotage_servers_M_CFP_title_001=Apagar a Fazenda de Dados da Citizens for Prosperity <EM4>[75–200 Rep]</EM4>
headhunters_sabotage_servers_VH_XT_desc_001=Estou tão furioso que mal consigo enxergar direito. Um Headhunter em quem eu achava que podia confiar acabou de passar para a XenoThreat. Sim, os alienígenas mataram sua família. É uma merda, mas não se vira as costas para seu pessoal. \n\nPara piorar a situação, o bastardo deu à XenoThreat um monte de informações nossas. Tenho outras pessoas rastreando o traidor, mas preciso que você se encarregue de apagar os dados roubados para mim. Eles estão sendo mantidos em servidores em ~mission(Location|Address).\n\n-Stows desligando\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Elite Contractor:</EM4> +3,200 Rep
headhunters_sabotage_servers_VH_XT_title_001=Elimine os Servidores da XenoThreat <EM4>[3,200 Rep]</EM4>
hurston_RetrieveConsignment_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE TERCEIRIZAÇÃO\n\nCONTRATO: Varredura de Instalações e Recuperação de Pacotes\nAFILIAÇÃO DO CONTRATADO: Independente\nGERENTE DE TERCEIRIZAÇÃO: G. Livingston\nAVALIAÇÃO DE RISCO: Alto\nCONTRATO URGENTE: Sim\n\nHurston descobriu que o ataque da Nine Tails a ~mission(Location|address). As nossas forças no terreno sofreram pesadas baixas e já não respondem às comunicações. Relatos iniciais indicam que a gangue estava tentando obter material confidencial que foi entregue recentemente nas instalações. Felizmente, temos salvaguardas que nos devem dar tempo para responder. Precisamos de um agente para ir imediatamente às instalações, recuperar as caixas e movê-las para um local seguro. Você e os reforços que traz consigo estão autorizados a tomar qualquer ação necessária para enfrentar os intrusos. Os suspeitos são considerados armados e perigosos. Hurston não fornecerá suporte material e/ou atualizações sobre a situação das forças de segurança das instalações. \n\nOs materiais confidenciais foram entregues discretamente em uma remessa junto com outras caixas e trancados em nosso cofre automatizado. Os códigos necessários para acessar as caixas estão em blocos de dados mantidos por seguranças seniores. Localize esses blocos de dados e insira os códigos de rastreamento na esteira de pacotes para recuperar as caixas. O pagamento será feito assim que todos os materiais confidenciais forem entregues em ~mission(dropoff1|address). \n\n\n** As informações enviadas podem conter material confidencial e/ou proprietário. É proibida qualquer revisão, encaminhamento, distribuição ou outro uso destas informações por qualquer pessoa ou entidade que não seja o destinatário pretendido. **\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Guards x4, Hostiles x22
hurston_RetrieveConsignment_title_001=Defenda o Local e Recupere os Materiais Confidenciais <EM4>[500–4,000 Rep]</EM4>
hurston_UGF_defend_E_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE TERCEIRIZAÇÃO\n\nCONTRATO: Proteção de Instalações\nAFILIAÇÃO DO CONTRATADO: Independente\nGERENTE DE TERCEIRIZAÇÃO: T. Spooner\nAVALIAÇÃO DE RISCO: Alto\nCONTRATO URGENTE: Não\n\nUma pequena gangue local tem feito ameaças contra a ~mission(Location|Address) e a Hurston Security está procurando um contratado para montar uma equipe de segurança para proteger a instalação contra quaisquer incursões.\n\nO pagamento será enviado assim que a instalação for confirmada como segura. \n\n\n** As informações transmitidas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x1, Hostiles x10, Private Security x4, Sentries x6\n<EM4>Unknown:</EM4> 11
hurston_UGF_defend_E_title_001=PROTEJA A INSTALAÇÃO CONTRA AMEAÇAS <EM4>[500 Rep]</EM4>
hurston_UGF_defend_VH_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE TERCEIRIZAÇÃO\n\nCONTRATO: Proteção de instalações\nAFILIAÇÃO DO CONTRATADO: Independente\nGERENTE DE TERCEIRIZAÇÃO: T. Spooner\nAVALIAÇÃO DE RISCO: Muito Alto\nCONTRATO URGENTE: Não\n\nUma facção fora da lei em crescimento tem feito ameaças contra a ~mission(Location|Address) e a Hurston Security exige que um contratado monte uma equipe de segurança e proteja a instalação contra quaisquer incursões.\n\nO pagamento será enviado assim que a instalação for confirmada como segura. \n\n\n** As informações transmitidas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x3, Hostiles x8, Private Security x4, Sentries x4\n<EM4>Unknown:</EM4> 21
hurston_UGF_defend_VH_title_001=PROTEJA A INSTALAÇÃO CONTRA INIMIGOS PERIGOSOS <EM4>[500 Rep]</EM4>
hurston_UGF_defend_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE TERCEIRIZAÇÃO\n\nCONTRATO: Proteção de Instalações\nAFILIAÇÃO DO CONTRATADO: Independente\nGERENTE DE TERCEIRIZAÇÃO: T. Spooner\nAVALIAÇÃO DE RISCO: Alta\nCONTRATO URGENTE: Nenhum\n\nCriminosos locais fizeram ameaças contra ~mission(Location|Address) . e a Hurston Security está procurando um empreiteiro para montar uma equipe de segurança para proteger a instalação contra quaisquer incursões.\n\nO pagamento será feito assim que a instalação for confirmada como segura. \n\n\n\n** As informações enviadas podem conter material confidencial e/ou confidencial. É proibida qualquer revisão, encaminhamento, distribuição ou outro uso destas informações por qualquer pessoa ou entidade que não seja o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x8, Private Security x4, Sentries x8\n<EM4>Unknown:</EM4> 10
hurston_UGF_defend_title_001=PROTEJA A INSTALAÇÃO CONTRA HOSTIS <EM4>[500 Rep]</EM4>
hurston_UGF_destroy_E_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE TERCEIRIZAÇÃO\n\nCONTRATO: Eliminação de Contrabando\nAFILIAÇÃO DO CONTRATADO: Independente\nGERENTE DE TERCEIRIZAÇÃO: R. Russel\nAVALIAÇÃO DE RISCO: Médio\nCONTRATO URGENTE: Nenhum\n\nCriminosos locais usaram ~mission(Location|Address) .para produzir grandes quantidades de contrabando. A Hurston Security exige que um empreiteiro vá até a instalação e destrua todo o contrabando armazenado lá.\n\nO pagamento será feito assim que todo o contrabando for destruído. \n\n\n\n** As informações enviadas podem conter material confidencial e/ou confidencial. É proibida qualquer revisão, encaminhamento, distribuição ou outro uso destas informações ou qualquer ação com base nessas informações por qualquer pessoa ou entidade que não seja o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Civilians x4
hurston_UGF_destroy_E_title_001=Destrua o Estoque de Contrabando <EM4>[500 Rep]</EM4>
hurston_UGF_destroy_H_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE TERCEIRIZAÇÃO\n\nCONTRATO: Eliminação de Contrabando\nAFILIAÇÃO DO CONTRATADO: Independente\nGERENTE DE TERCEIRIZAÇÃO: R. Russel\nAVALIAÇÃO DE RISCO: Muito Alto\nCONTRATO URGENTE: Não\n\nUm pequeno sindicato tem usado a ~mission(Location|Address) para fabricar grandes quantidades de narcóticos altamente perigosos. A Hurston Security está procurando um contratado para ir até a instalação e eliminar todo o contrabando armazenado lá.\n\nO pagamento será enviado assim que todo o contrabando for eliminado. \n\n\n** As informações transmitidas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
hurston_UGF_destroy_H_title_001=DESTRUA O ESTOQUE DE NARCÓTICOS <EM4>[500 Rep]</EM4>
hurston_UGF_destroy_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE TERCEIRIZAÇÃO\n\nCONTRATO: Eliminação de Contrabando\nAFILIAÇÃO DO CONTRATADO: Independente\nGERENTE DE TERCEIRIZAÇÃO: R. Russel\nAVALIAÇÃO DE RISCO: Alto\nCONTRATO URGENTE: Não\n\nCriminosos locais foram identificados usando ~mission(Location|Address) para fabricar grandes quantidades de produtos ilegais. A Hurston Security exige que um contratado vá até a instalação e elimine todo o contrabando armazenado lá.\n\nO pagamento será enviado assim que todo o contrabando for eliminado. \n\n\n** As informações transmitidas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
hurston_UGF_destroy_title_001=Destrua o Estoque de Drogas <EM4>[500 Rep]</EM4>
hurston_UGF_eliminateall_allies_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE TERCEIRIZAÇÃO\n\nCONTRATO: Proteção de Instalações\nAFILIAÇÃO DO CONTRATADO: Independente\nGERENTE DE TERCEIRIZAÇÃO: T. Spooner\nAVALIAÇÃO DE RISCO: Alto\nCONTRATO URGENTE: Não\n\nA equipe de segurança da ~mission(Location|Address) está sendo ameaçada por um elemento criminoso local e a Hurston Security está buscando contratados para reforçar suas defesas e eliminar quaisquer hostis que tentem invadir o local.\n\nObserve que você só tem autorização para enfrentar hostis confirmados. Agredir qualquer equipe de segurança no local resultará em uma violação do contrato.\n\nO pagamento será enviado assim que a instalação for confirmada como segura. \n\n\n** As informações transmitidas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
hurston_UGF_eliminateall_allies_desc_intro=HURSTON DYNAMICS\nDEPARTAMENTO DE TERCEIRIZAÇÃO\n\nCONTRATO: Proteção de Instalações\nAFILIAÇÃO DO CONTRATADO: Independente\nGERENTE DE TERCEIRIZAÇÃO: T. Spooner\nAVALIAÇÃO DE RISCO: Alto\nCONTRATO URGENTE: Não\n\nUm grupo criminoso local tem ameaçado a ~mission(Location|Address)  e a Hurston Security está buscando contratados para reforçar suas defesas e eliminar quaisquer hostis que tentem invadir o local.\n\nObserve que você só está autorizado a se envolver com hostis confirmados. Agredir qualquer equipe de segurança no local resultará em uma quebra de contrato.\n\nO pagamento será enviado assim que a instalação for confirmada como segura. A conclusão bem-sucedida desta avaliação permitirá que você seja considerado para futuros trabalhos como prestador de serviços de segurança.\n\n\n** As informações transmitidas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
hurston_UGF_eliminateall_allies_desc_rehire=HURSTON DYNAMICS\nDEPARTAMENTO DE TERCEIRIZAÇÃO\n\nCONTRATO: Proteção de Instalações\nAFILIAÇÃO DO CONTRATADO: Independente\nGERENTE DE TERCEIRIZAÇÃO: T. Spooner\nAVALIAÇÃO DE RISCO: Alto\nCONTRATO URGENTE: Não\n\nNosso departamento realiza regularmente reavaliações de prestadores de serviços de segurança anteriores e tem determinou que você pode ser um candidato adequado para uma possível reintegração.\n\nPara recuperar seu status, a Hurston Security está procurando prestadores de serviços para ajudar a eliminar um elemento criminoso local que está ameaçando a ~mission(Location|Address).\n\nObservação, que você só está aprovado para lidar com inimigos confirmados. Um ataque ao pessoal de segurança no local resultará na quebra do contrato.\n\nO pagamento será feito assim que a instalação for confirmada como segura. A conclusão bem-sucedida desta reavaliação permitirá que você seja considerado para futuras atribuições de segurança.\n\n\n\n** As informações enviadas podem conter material confidencial e/ou proprietário. É proibida qualquer revisão, encaminhamento, distribuição ou outro uso destas informações por qualquer pessoa ou entidade que não seja o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
