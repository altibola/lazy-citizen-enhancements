UDM_courier_todc_small_desc_001=Saudações, Parceiro de Envio Qualificado!\n\nInteressado em uma rota de entrega simples sem muitas complicações? Então levar alguns pacotes para ~mission(Dropoff1) em ~mission(Dropoff1|Address) deve ser o trabalho perfeito para você!\n\nPACOTES PARA COLETA (QUALQUER ORDEM) \n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> de <EM4>~mission(Pickup1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> de <EM4>~mission(Pickup2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> de <EM4>~mission(Pickup3|Address)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> de <EM4>~mission(Pickup4|Address)</EM4>\n     · Pacote <EM4>#~mission(Item5|SerialNumber)</EM4> de <EM4>~mission(Pickup5|Address)</EM4>\n\nLOCAL DE ENTREGA\n     · Todos os pacotes entregues em <EM4>~mission(Dropoff1)</EM4> em <EM4>~mission(Dropoff1|Address)</EM4>\n\nEstamos ansiosos para trabalhar com você,\n\nUnified Distribution Management\n -Entregando o Pacote Completo-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_internaldelivery_dc_desc_001=Saudações, Manipulador Qualificado de Pacotes!\n\nEmpolgado para mergulhar no complexo mundo da gestão de armazenamento e realinhamento de instalações? Então não perca esta chance de ajudar a organizar os seguintes pacotes em <EM4>~mission(Location|Address)</EM4>.\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> de <EM4>~mission(Pickup1)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> de <EM4>~mission(Pickup2)</EM4>\n\n\nLOCAIS PARA ENTREGA (QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para <EM4>~mission(Dropoff2)</EM4>\n\nSe isso soa como algo que lhe interessa, aceite esta oferta agora mesmo! \n\nEstamos ansiosos para trabalhar com você,\n\nUnified Distribution Management\n -Entregando o Pacote Completo-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_internaldelivery_dc_desc_003=Saudações, Manipulador Qualificado de Pacotes!\n\nPronto para encarar um trabalho desafiador, porém recompensador, em uma capacidade adjacente ao envio? Então temos uma oportunidade perfeita para você em <EM4>~mission(Location|Address)</EM4>. \n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> de <EM4>~mission(Pickup1)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> de <EM4>~mission(Pickup2)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> de <EM4>~mission(Pickup3)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> de <EM4>~mission(Pickup4)</EM4>\n\nLOCAIS PARA ENTREGA (QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para <EM4>~mission(Dropoff2)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para <EM4>~mission(Dropoff3)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> para <EM4>~mission(Dropoff4)</EM4>\n\nEntão aceite o contrato e vamos começar o trabalho.\n\nEstamos ansiosos para trabalhar com você,\n\nUnified Distribution Management\n -Entregando o Pacote Completo-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
UDM_internaldelivery_dc_desc_005=Saudações, Manipulador Qualificado de Pacotes!\n\nEmbora os pacotes a seguir não precisem viajar muito, eles ainda precisam ser manuseados com cuidado especial. Você é o especialista que estamos procurando?\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> de <EM4>~mission(Pickup1)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> de <EM4>~mission(Pickup2)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> de <EM4>~mission(Pickup3)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> de <EM4>~mission(Pickup4)</EM4>\n     · Pacote <EM4>#~mission(Item5|SerialNumber)</EM4> de <EM4>~mission(Pickup5)</EM4>\n     · Pacote <EM4>#~mission(Item6|SerialNumber)</EM4> de <EM4>~mission(Pickup6)</EM4>\n\nLOCAIS PARA ENTREGA (QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para <EM4>~mission(Dropoff2)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para <EM4>~mission(Dropoff3)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> para <EM4>~mission(Dropoff4)</EM4>\n     · Pacote <EM4>#~mission(Item5|SerialNumber)</EM4> para <EM4>~mission(Dropoff5)</EM4> \n     · Pacote <EM4>#~mission(Item6|SerialNumber)</EM4> para <EM4>~mission(Dropoff6)</EM4>\n\nTudo o que você precisa fazer é aceitar o contrato e você estará a caminho.\n\nEstamos ansiosos para trabalhar com você,\n\nUnified Distribution Management\n -Entregando o Pacote Completo-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000
