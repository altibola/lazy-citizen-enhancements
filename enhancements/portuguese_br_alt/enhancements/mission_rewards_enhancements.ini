Intersec_TSG_Assist_Solo_Desc_001=ESPECIFICAÇÕES DA MISSÃO\n\nÁrea de Operação: Sistema Nyx \nForças Hostis: Vanduul\nEspecificações de Equipamento: Pronto para Combate\nBriefing: \nUma embarcação de segurança da Aliança do Povo de classe Idris chamada Tranquility está atualmente em combate com uma <EM>nave capital Vanduul</EM4> perto de uma antiga <EM4>estação de Extração de QV</EM4> e a Intersec está procurando pilotos de combate para dar apoio.\n\nParta para a AO e <EM4>ataque os caças Vanduul para que a Tranquility possa focar na nave capital</EM4>. \n\nBoa sorte,   \n\nDeacon Tobin \nGerente de Operações \nInterSec Defense Solutions  \n\nEsta comunicação consiste em informações confidenciais destinadas exclusivamente ao destinatário. Por favor, desconsidere se recebida por erro e notifique o remetente. Todas as operações são conduzidas por conta e risco pessoal do contratante e devem aderir às leis da UEE e do sistema onde aplicável.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [B-S1-A] Deadbolt I Cannon\n- [B-S2-A] Deadbolt II Cannon\n- [B-S3-A] Deadbolt III Cannon\n- [MIL-S1-B] ForceWall\n- [MIL-S2-B] CoverAll\n- [MIL-S3-B] FullBlock\n- [S1-A] Tailwind Flight Helmet Blackbolt\n- [S1-A] Tailwind Flight Helmet Green Streak\n- [S1-A] Tailwind Flight Suit\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x5, Hostiles x1\n<EM4>Friendlies:</EM4> Friendlies x1\n<EM4>Rep:</EM4> +200\n<EM4>Blueprint Reward:</EM4> Guaranteed
Intersec_TSG_Assist_Solo_Title_001=Auxiliar a Nave Tranquility da People's Alliance <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
Intersec_TSG_BombRun_Solo_Desc_001=ESPECIFICAÇÕES DA MISSÃO\n\nÁrea de Operação: Sistema Nyx \nForças Hostis: Shattered Blade\nEspecificações de Equipamento: Naves de Combate com Armamento Pesado\nBriefing: \nAtivos locais indicaram que elementos da Shattered Blade estão tentando reconstruir uma de suas estações e a Intersec está procurando um piloto para garantir que isso não aconteça.\n\nEles conseguiram reativar as defesas básicas de torres, mas atualmente têm apenas <EM4>dois relés de energia ativados</EM4>. Estes serão seus alvos, pois <EM4>não podem ser destruídos por armas de energia; você precisará trazer armas balísticas ou munição pesada para ser eficaz</EM4>. \n\nA reativação desta estação permitiria que a Shattered Blade tentasse recuperar uma base neste sistema e não podemos permitir que isso aconteça.\n\nBoa sorte,   \n\nDeacon Tobin \nGerente de Operações \nInterSec Defense Solutions  \n\nEsta comunicação consiste em informações confidenciais destinadas exclusivamente ao destinatário. Por favor, desconsidere se recebida por erro e notifique o remetente. Todas as operações são conduzidas por conta e risco pessoal do contratante e devem aderir às leis da UEE e do sistema onde aplicável.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [B-S4-A] Deadbolt IV Cannon\n- [B-S5-A] Deadbolt V Cannon\n- [B-S6-A] Deadbolt VI Cannon\n- [MIL-S1-B] Polar\n- [MIL-S2-B] Permafrost\n- [MIL-S3-B] Tempest\n- [S1-A] Tailwind Flight Helmet Adrenaline\n- [S1-A] Tailwind Flight Helmet Big Bite\n- [S1-A] Tailwind Flight Suit\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Rep:</EM4> +200\n<EM4>Blueprint Reward:</EM4> Guaranteed
Intersec_TSG_BombRun_Solo_Title_001=BOMBARDEIO ESTRATÉGICO <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
Intersec_TSG_Group_Desc_001=ESPECIFICAÇÕES DA MISSÃO\n\nÁrea de Operação: Sistema Nyx \nForças Hostis: Shattered Blade\nEspecificações de Equipamento: Grupo de Ataque\nBriefing: \nRecebemos a notícia de que uma nave de segurança da People's Alliance chamada Tranquility encontrou a Shattered Blade escondida em uma antiga estação de Extração de QV. Os detalhes são vagos, mas conectaremos você com ativos locais assim que estiver no local. \n\nA Intersec está procurando uma equipe para intervir e proteger a Tranquility e seu pessoal. Com base em discussões com o capitão da Tranquility, você <EM4>precisará de armas balísticas e munição pesada para romper as defesas da estação</EM4> e, por fim, <EM4>colocar botas no chão para salvar o piloto deles</EM4>.\n\n<EM4>Recrutar naves adicionais</EM4> para apoiá-lo nesta missão é absolutamente crítico. Você <EM4>precisará de uma variedade de tipos de naves</EM4> para equilibrar múltiplas zonas de combate no espaço e no solo.\n\nRespeitosamente,   \n\nDeacon Tobin \nGerente de Operações \nInterSec Defense Solutions  \n\nEsta comunicação consiste em informações confidenciais destinadas exclusivamente ao destinatário. Por favor, desconsidere se recebida por erro e notifique o remetente. Todas as operações são conduzidas por conta e risco pessoal do contratante e devem aderir às leis da UEE e do sistema onde aplicável.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Novian "Ghostmaker" Crossbow\n- Novian "Nighthunter" Crossbow\n- Novian "Wildshot" Crossbow\n- Novian Crossbow\n- [S1-A] BlackFire Racing Flight Suit\n- [S1-A] BlackFire Racing Helmet\n- [S1-A] BlueFlame Racing Flight Suit\n- [S1-A] BlueFlame Racing Helmet\n- [S1-A] Tailwind Flight Helmet Airwolf\n- [S1-A] Tailwind Flight Helmet Blue Skies\n- [S1-A] Tailwind Flight Helmet Frostshock\n- [S1-A] Tailwind Flight Helmet Thunderstruck\n- [S1-A] WhiteHot Racing Flight Suit\n- [S1-A] WhiteHot Racing Helmet\n- [E-S1-A] Omnisky III Cannon\n- [E-S2-A] Omnisky VI Cannon\n- [E-S3-A] Omnisky IX Cannon\n- [E-S4-A] Omnisky XII Cannon\n- [E-S5-A] Omnisky XV Cannon\n- [E-S6-A] Omnisky XVIII Cannon\n- [MIL-S1-A] JS-300\n- [MIL-S2-A] JS-400\n- [MIL-S3-A] QuadraCell MX\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 6/7 | Risk 7/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x53, Maulers x1, Reinforcements x2\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Unknown:</EM4> 20\n<EM4>Rep:</EM4> +300\n<EM4>Blueprint Reward:</EM4> Guaranteed
