Foxwell_DefendEntitesAndEscort_VE_Desc=Para quaisquer pilotos na área – um grupo de bandidos está visando um de nossos clientes em <EM4>~mission(Location|Address)</EM4>, especificamente seus <EM4>~mission(Objects)</EM4> e as naves de manutenção que os gerenciam. Pelas nossas informações, são apenas alguns marginais tentando ganhar créditos rápidos, mas eles também são do tipo que causam danos reais se você ficar no caminho deles.\n\nSe você cuidar deles e realocar a nave e a tripulação do cliente com segurança, ofereceremos <EM4>~mission(ScripAmount) MG Scrip</EM4> ao contratante principal.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança garantida, licenciada para operar em toda a UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Nyx]</EM4>\n- [CIV-S0-A] Tepilo\n- [CIV-S0-C] Fridan\n- [CIV-S0-C] Frost-Star SL\n- [CIV-S1-A] Gelid\n- [CIV-S1-C] ArcticStorm\n- [CIV-S1-C] Berian\n- [CIV-S1-C] Frost-Star\n- [CIV-S2-A] Aufeis\n- [CIV-S2-C] ColdSnap\n- [CIV-S2-C] Frost-Star EX\n- [CIV-S2-C] Graupel\n- [CIV-S3-A] Kragen\n- [CIV-S3-B] Elsen\n- [CIV-S3-C] Draug\n- [CIV-S3-C] Frost-Star XL\n- [CIV-S3-C] FrostBurn\n\n<EM4>[Pyro]</EM4>\n- [CIV-S0-B] IonWave\n- [CIV-S0-C] Radix\n- [CIV-S1-B] IonBurst\n- [CIV-S1-B] MagnaBloom\n- [CIV-S1-C] LightBlossom\n- [CIV-S1-C] PowerBolt\n- [CIV-S2-B] IonSurge\n- [CIV-S2-B] Radiance\n- [CIV-S2-C] FullForce\n- [CIV-S3-B] Celestial\n- [CIV-S3-B] IonSurge Pro\n- [CIV-S3-C] FullForce Pro\n- [CIV-S3-C] NewDawn\n\n<EM4>[Stanton]</EM4>\n- [CIV-S1-A] 7SA 'Concord'\n- [CIV-S1-D] INK\n- [CIV-S2-A] 7MA 'Lorica'\n- [CIV-S2-D] RPEL\n- [CIV-S3-A] 7CA 'Nargun'\n- [CIV-S3-D] HAVEN\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</E