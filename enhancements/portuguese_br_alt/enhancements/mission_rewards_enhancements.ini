p_protectandresupply_PreXeno_desc=Atenção voluntários da CDF, a XenoThreat finalmente lançou seu ataque contra a estação INS-Jericho em Stanton.\n\nA Marinha solicitou que as forças da CDF ajudem a combater as forças da XenoThreat na área e/ou recuperem suprimentos dos destroços e os entreguem com segurança à estação Jericho. \n\nA Marinha organizou um estipêndio comunitário para lidar com a distribuição do pagamento. Isso será distribuído entre todos os voluntários da CDF em intervalos designados. Um indicador aparecerá em seu HUD para medir esses pagamentos.\n\nPor favor, observe que os suprimentos são altamente voláteis se não forem manuseados corretamente. Tenha cuidado ao transportar esses materiais:\n* O Zeta-Prolanide se degrada com o tempo até se decompor completamente.\n* O AcryliPlex Composite se torna explosivamente instável se for danificado.\n* O Diluthermex libera um pulso de energia destrutivo se for exposto a viagens quânticas.\n\nA SAIC Rowena Dulli, da Advocacia, é a adida oficial da CDF e comandará a operação.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Difficulty (1-7):</EM4> 5/7\n<EM4>Rep:</EM4> +4,000
p_protectandresupply_PreXeno_title=Iniciativa Overdrive: Emboscada da Xenothreat - Apoio Necessario <EM4>[4,000 Rep]</EM4>
p_protectandresupply_desc_v2=*LANÇAMENTO IMEDIATO EM TODO O SISTEMA*\n\nAtenção, as forças XenoThreat atacaram naves de comboio da Marinha a caminho da Estação INS Jericho no Sistema Stanton. \n\nA Marinha solicitou às forças da CDF que combatam as forças da XenoThreat na área e/ou recuperem suprimentos dos destroços e os transportem com segurança para a Estação de Jericho. \n\nA Marinha organizou uma bolsa comunitária para regular a distribuição de salários. Este é distribuído entre todos os voluntários da CDF em determinados intervalos. Um indicador aparecerá no seu HUD para medir esses pagamentos.\n\nObserve que os suprimentos são muito voláteis se não forem tratados adequadamente. Tenha cuidado ao transportar esses materiais:\n* A Zeta-Prolanide se decompõe com o tempo até se dissolver completamente.\n* O composto AcryliPlex se torna explosivamente instável se danificado.\n* O Diluthermex libera um pulso destrutivo de energia quando é submetido a viagens quânticas.\n\nRowana Dulli, da SAIC Advocacy, é adida oficial da CDF e liderará a operação.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 5/7\n<EM4>Rep:</EM4> +4,000
p_protectandresupply_title=ALERTA CDF: Ataque Xenothreat - Suporte Necessario <EM4>[4,000 Rep]</EM4>
p_showdown_PreXeno_desc=Atenção, as forças navais se reagruparam para o ataque final que a XenoThreat vem planejando. A Marinha solicitou oficialmente qualquer voluntário da CDF para ajudar a fornecer suporte de combate nesse esforço final para proteger nosso sistema. Isso incluirá outros voluntários além daqueles que participaram da Iniciativa Overdrive.\n\nA SAIC Rowena Dulli, da Advocacy, é a adida oficial da CDF e comandará a operação.\n\nSe for bem-sucedida, esta série da Iniciativa Overdrive será concluída e você receberá acesso temporário aos F7A Hornets ou uma atualização gratuita se já tiver um F7C.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Difficulty (1-7):</EM4> 5/7\n<EM4>Rep:</EM4> +4,000
p_showdown_PreXeno_title=Iniciativa Overdrive: Ataque a XenoThreat <EM4>[4,000 Rep]</EM4>
p_showdown_desc=*PARA DIVULGAÇÃO IMEDIATA EM TODO O SISTEMA*\n\nAtenção, as forças navais se reagruparam para um ataque final ao bando de foras-da-lei XenoThreat que tem assolado o Sistema Stanton. A Marinha solicitou oficialmente que todos os voluntários da CDF ajudem a fornecer apoio de combate neste esforço final para proteger nosso sistema.\n\nSAIC Rowena Dulli, da Advocacy, é a adida oficial da CDF e comandará a operação.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 5/7\n<EM4>Rep:</EM4> +4,000
p_showdown_title=ALERTA CDF: Ataque a XenoThreat <EM4>[4,000 Rep]</EM4>
