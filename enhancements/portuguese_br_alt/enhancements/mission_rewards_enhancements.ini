Tutorial01_MissionDesc=Parabéns pelos seus primeiros passos no universo!\n\nDurante este tutorial você aprenderá como se mover tanto a pé quanto no espaço. \n\nPrimeiro, vamos familiarizá-lo com alguns controles básicos de movimento e como usar seu mobiGlas enquanto você ainda estiver em seu "hab" (ou residência). Siga os objetivos e as pistas no seu HUD (heads-up display) para completar esta missão.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Starter, Unique
Tutorial02_MissionDesc=Muito bem! \n\nCom a primeira parte concluída, agora você deve ter alguma familiaridade básica com os controles de movimento, o gerenciamento de sua fome e sede e algumas das principais funcionalidades do seu mobiGlas, ou seja, o Gerenciador de Contratos e seu Jornal. \n\nEsta próxima seção o ajudará a se familiarizar com ~mission(Location|Name) e o levará a visitar ~mission(StoreName), uma loja de armas aqui em ~mission(Location|Name).\n\nVocê pode fazer compras lá e em outras lojas como essa usando United Earth Credits (UEC). Durante a fase Alfa do desenvolvimento do Star Citizen, usaremos uma moeda chamada aUEC (Alpha United Earth Credits). Essa é uma moeda temporária projetada especificamente para testar a economia e o equilíbrio no jogo.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Starter, Unique
Tutorial03_MissionDesc=Você está quase terminando o tutorial. Tudo o que resta é voar!\n\nCom seus negócios na ~mission(Location|Name) concluídos, é hora de deixar a cidade - e, eventualmente, o planeta. Dirija-se aos transportes da ~mission(TransitNameShort). Esses transportes podem levá-lo por toda a ~mission(Location|Name), mas seu destino é o espaçoporto, onde uma Anvil C8 Pisces foi temporariamente disponibilizada para você.\n\nEssa nave de reconhecimento é uma ótima nave inicial, perfeita para novos pilotos que querem ganhar asas.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Starter, Unique
UDM_LocalDelivery_desc_01=Saudações, Parceiro Qualificado de Transporte!\n\nProcurando uma desculpa para pegar a rota com sua nave cargueira pronta? Ganhe créditos e explore a área local com o seguinte itinerário cuidadosamente selecionado -\n\nPACOTE PARA COLETA\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> do <EM4>~mission(Pickup1|Address)</EM4>\n\nLOCAL DE ENTREGA\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>\n\nSe ser seu próprio supervisor e ser pago para pilotar sua própria nave soa como o emprego perfeito, este contrato é exatamente o que você procura. Apenas lembre-se de trazer seu próprio <EM4>raio trator portátil</EM4> para máxima eficiência. \n\nEsperamos trabalhar com você,\n\nUnified Distribution Management\n -Entregando o Pacote Completo-\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_LocalDelivery_desc_02=Saudações, Parceiro Qualificado de Transporte!\n\nPronto para contribuir com nossa rede de entregas em expansão? Tem uma nave à sua disposição capaz de carregar vários pacotes e viajar entre corpos planetários e satélites locais? Temos a oportunidade perfeita para você com o seguinte itinerário cuidadosamente selecionado -\n\nPACOTES PARA COLETA (ORDEM QUALQUER)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> do <EM4>~mission(Pickup1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> do <EM4>~mission(Pickup2|Address)</EM4>\n\nLOCAIS DE ENTREGA (ORDEM QUALQUER)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para <EM4>~mission(Dropoff2|Address)</EM4>\n\nSe isso soa interessante, aceite a oferta imediatamente! Apenas lembre-se de trazer seu próprio <EM4>raio trator portátil</EM4> para máxima eficiência. \n\nEsperamos trabalhar com você,\n\nUnified Distribution Management\n -Entregando o Pacote Completo-\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_LocalDelivery_desc_03=Saudações, Parceiro Qualificado de Transporte!\n\nInteressado em ganhar créditos do conforto de sua própria nave cargueira? Então o seguinte itinerário cuidadosamente selecionado pode ser exatamente a oportunidade que você procura -\n\nPACOTES PARA COLETA (ORDEM QUALQUER)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> do <EM4>~mission(Pickup1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> do <EM4>~mission(Pickup2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> do <EM4>~mission(Pickup3|Address)</EM4>\n\nLOCAIS DE ENTREGA (ORDEM QUALQUER)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para <EM4>~mission(Dropoff2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para <EM4>~mission(Dropoff3|Address)</EM4>\n\nAceite este contrato e você estará a caminho. Apenas lembre-se de trazer seu próprio <EM4>raio trator portátil</EM4> para máxima eficiência. \n\nEsperamos trabalhar com você,\n\nUnified Distribution Management\n -Entregando o Pacote Completo-\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_LocalDelivery_desc_04=Saudações, Parceiro Qualificado de Transporte!\n\nEstá procurando oportunidades empolgantes no setor de entregas? Se você tem uma atitude proativa e um espaço considerável para carga, temos a oportunidade perfeita para você.\n\nPACOTES PARA COLETA (ORDEM QUALQUER)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> do <EM4>~mission(Pickup1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> do <EM4>~mission(Pickup2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> do <EM4>~mission(Pickup3|Address)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> do <EM4>~mission(Pickup4|Address)</EM4>\n\nLOCAIS DE ENTREGA (ORDEM QUALQUER)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para <EM4>~mission(Dropoff2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para <EM4>~mission(Dropoff3|Address)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> para <EM4>~mission(Dropoff4|Address)</EM4>\n\nEntão aceite o contrato e vamos ao trabalho. Apenas lembre-se de trazer seu próprio <EM4>raio trator portátil</EM4> para máxima eficiência. \n\nEsperamos trabalhar com você,\n\nUnified Distribution Management\n -Entregando o Pacote Completo-\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
