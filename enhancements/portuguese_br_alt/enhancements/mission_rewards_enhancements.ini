Eckhart_ShipAmbush_Intro_desc=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Emboscada de Nave\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nEstamos procurando contratados com experiência em combate que estejam dispostos a sujar as mãos, por assim dizer. Um cliente nosso foi traído por um <EM4>~mission(AmbushTarget)</EM4> e estávamos esperando uma oportunidade para resolver o problema. Depois de rastreá-los por várias semanas, identificamos <EM4>~mission(Location|Address)</EM4> como o local ideal para interceptá-los. O local apresenta uma <EM4>nuvem de emissão</EM4> onde você pode se esconder e desligar sua nave enquanto espera pelo <EM4>~mission(AmbushTarget)</EM4>.\n\nA inteligência sugere que eles podem viajar com uma escolta. Se o fizerem, você também terá que lidar com eles. Como este é o seu primeiro contrato, teremos outros contratados na área que podem ajudar assim que você atacar.\n\nO pagamento será emitido após a conclusão bem-sucedida do contrato. Há também um pagamento bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4> neste para o contratado principal.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] Lightstrike I Cannon\n- [E-S2-A] Lightstrike II Cannon\n- [E-S3-A] Lightstrike III Cannon\n- [STH-S1-C] SonicLite\n- [STH-S2-C] Cirrus\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Allies x1, Hostile Wave x6, Targets x2\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Eckhart_ShipAmbush_Intro_title=Nova Oportunidade - Ataque de Emboscada <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Eckhart_ShipAmbush_M_desc=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Emboscada de Nave\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nPreciso de alguém para derrubar um <EM4>~mission(AmbushTarget)</EM4> e lidar com as naves de escolta que o protegem. Eles já interferiram em várias de nossas operações em andamento e se tornaram um problema real em vários casos da Eckhart Security. Não tenho certeza de qual é o objetivo final deles, mas isso não importará quando você lidar com eles.\n\nDeixamos escapar que estaremos trabalhando em um trabalho em <EM4>~mission(Location|Address)</EM4>, o que deve servir de isca para atraí-los. O local é ideal para uma emboscada por causa da <EM4>nuvem de emissão</EM4>, que é um lugar perfeito para desligar e se esconder até que você esteja pronto para atacar. Se você estiver disponível, o <EM4>~mission(AmbushTarget)</EM4> e seus escoltas devem estar passando em breve.\n\nO pagamento será emitido após a conclusão bem-sucedida do contrato. O contratado principal também receberá um pagamento bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] Lightstrike I Cannon\n- [E-S2-A] Lightstrike II Cannon\n- [E-S3-A] Lightstrike III Cannon\n- [STH-S1-C] SonicLite\n- [STH-S2-C] Cirrus\n- [E-S1-A] FL-11 Cannon\n- [E-S2-A] FL-22 Cannon\n- [E-S3-A] FL-33 Cannon\n- [STH-S1-B] DeltaMax\n- [STH-S2-B] GammaMax\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Allies x1, Hostile Wave x6, Targets x3\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Eckhart_ShipAmbush_M_title=LANÇAR ATAQUE SURPRESA <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
Eckhart_ShipAmbush_S_desc=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Emboscada de Nave\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nRecentemente, enviamos um contratado atrás de um <EM4>~mission(AmbushTarget)</EM4>, que estava liderando uma equipe que visava as operações de um cliente extremamente importante. Infelizmente, foi uma armadilha e perdemos algumas boas pessoas. Não podemos deixar o alvo escapar novamente, então decidimos que o melhor curso de ação é dar a eles uma dose de seu próprio remédio.\n\nEmboscarmos este alvo parece ser o curso de ação mais seguro, e identificamos um bom local para tal ataque. Há uma <EM4>nuvem de emissão</EM4> perto de <EM4>~mission(Location|Address)</EM4> pela qual o alvo e sua equipe frequentemente passam voando. Você pode desligar sua nave e se esconder lá até estar pronto para atacar. Esta equipe é implacável e extremamente habilidosa. Não cometa o mesmo erro do contratado anterior e vá sozinho. Seria melhor você trazer alguns amigos de confiança para ajudar a lidar com esta equipe.\n\nO pagamento será emitido após a conclusão bem-sucedida do contrato. Além disso, incluiremos um pagamento bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4> para o contratado principal por cuidar disso.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] Lightstrike I Cannon\n- [E-S2-A] Lightstrike II Cannon\n- [E-S3-A] Lightstrike III Cannon\n- [STH-S1-C] SonicLite\n- [STH-S2-C] Cirrus\n- [E-S1-A] FL-11 Cannon\n- [E-S2-A] FL-22 Cannon\n- [E-S3-A] FL-33 Cannon\n- [STH-S1-B] DeltaMax\n- [STH-S2-B] GammaMax\n- [E-S4-A] Lightstrike IV Cannon\n- [E-S5-A] Lightstrike V Cannon\n- [E-S6-A] Lightstrike VI Cannon\n- [STH-S1-A] Slipstream\n- [STH-S2-A] Eclipse\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Allies x1, Hostile Wave x10, Targets x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Eckhart_ShipAmbush_S_title=Emboscada Altamente Perigosa <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
Eckhart_ShipAmbush_VE_desc=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Emboscada de Nave\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nUm de nossos clientes tem sido vítima de assédio constante, então chegou a hora de enviar uma mensagem clara de cessação e desistência, eliminando seu valioso <EM4>~mission(AmbushTarget)</EM4>. O marginal em questão segue uma rotina bastante previsível, tornando-o suscetível a uma emboscada. Identificamos <EM4>~mission(Location|Address)</EM4> como o local ideal. Ele apresenta uma <EM4>nuvem de emissão</EM4> onde você pode se esconder e desligar sua nave enquanto espera.\n\nA propósito, o <EM4>~mission(AmbushTarget)</EM4> muitas vezes voa sozinho, mas às vezes é acompanhado por um amigo em uma nave de um único assento. Nenhum dos dois deve lhe dar muito trabalho, mas temos outros contratados na área que podem ajudar assim que você atacar.\n\nO pagamento será emitido após a conclusão bem-sucedida do contrato. Há também um pagamento bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4> neste para o contratado principal.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] Lightstrike I Cannon\n- [E-S2-A] Lightstrike II Cannon\n- [E-S3-A] Lightstrike III Cannon\n- [STH-S1-C] SonicLite\n- [STH-S2-C] Cirrus\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Allies x1, Hostile Wave x6, Targets x2\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Eckhart_ShipAmbush_VE_title=Acertar Uma Conta <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Eckhart_ShipAmbush_VH_desc=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Emboscada de Nave\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nUm cliente de alto perfil perdeu recentemente um carregamento importante quando um piloto o traiu e fugiu com seu produto. Após semanas de caçada, descobrimos que ele estava conectado a um bando de foras da lei, então o cliente está nos procurando para dissuadir problemas futuros semelhantes. O alvo final é o piloto de um <EM4>~mission(AmbushTarget)</EM4>, que lidera a equipe responsável. Isso não será fácil. Eles não vão a lugar nenhum sem caças de escolta e naves subcapitais. É por isso que recomendamos que você encontre um amigo de confiança ou dois que possam lidar com isso com você.\n\nInformações coletadas por nossos analistas indicam que eles voam frequentemente perto de uma <EM4>nuvem de emissão</EM4> próxima a <EM4>~mission(Location|Address)</EM4>, o que proporcionaria uma excelente área para armar um ataque surpresa.\n\nO pagamento será emitido após a conclusão bem-sucedida do contrato. Também estamos adicionando um pagamento bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4> que irá para o contratado principal.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] Lightstrike I Cannon\n- [E-S2-A] Lightstrike II Cannon\n- [E-S3-A] Lightstrike III Cannon\n- [STH-S1-C] SonicLite\n- [STH-S2-C] Cirrus\n- [E-S1-A] FL-11 Cannon\n- [E-S2-A] FL-22 Cannon\n- [E-S3-A] FL-33 Cannon\n- [STH-S1-B] DeltaMax\n- [STH-S2-B] GammaMax\n- [E-S4-A] Lightstrike IV Cannon\n- [E-S5-A] Lightstrike V Cannon\n- [E-S6-A] Lightstrike VI Cannon\n- [STH-S1-A] Slipstream\n- [STH-S2-A] Eclipse\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 5/7 | Risk 7/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Allies x1, Hostile Wave x12, Targets x4\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
