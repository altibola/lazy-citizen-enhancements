mg_pacheco_desc=~mission(Description)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
mg_pacheco_prisonerbreak_desc_002=O negócio é o seguinte: Alguns veteranos foram pegos fazendo um trabalho para mim e quero que você os ajude. \n\nUm mecânico amigável providenciou para que o transporte da prisão deles tivesse problemas durante o trajeto, abrindo a porta da frente e parando a nave. Você irá, despachará qualquer segurança que esteja escoltando o transporte, encontrará o manifesto de prisioneiros a bordo e o usará para localizar as cápsulas criogênicas da minha tripulação.\n\nOs picolés que estou procurando são ~mission(NameSave2), ~mission(NameKill1), ~mission(NameSave3), and ~mission(NameSave1). Todos foram leais e merecem algo melhor do que apodrecer na cadeia. Pelo menos acho que foram leais... Ainda estou me perguntando como eles foram presos em primeiro lugar. Não consigo me livrar da sensação de que um deles pode estar traficando em dobro. Vamos fazer o seguinte: se você encontrar alguma prova de que um dos meus tripulantes está trabalhando com a Advocacy, liquide a cápsula criogênica e eu lhe darei um bônus. \n\nDepois de ativar as cápsulas certas e meu pessoal começar a descongelar, saia daí e deixe a equipe de recuperação cuidar do resto. Essa última parte é importante. Assim que forem descongelados, eles serão enviados para a aposentadoria. Não faz sentido que eles saibam mais sobre meus negócios do que já sabem, ou seja, não quero que esses idiotas vejam seu rosto ou sequer saibam que você existe. \n\nAssim que você voltar ao seu caminho, enviarei uma grande pilha de créditos bem merecidos.\n\nAgora, caso você esteja tendo alguma ideia do tipo "Por que eu simplesmente não liberto todo mundo?" ou "Não seria mais fácil calar todos eles permanentemente?" Esqueça isso. A política dessa coisa toda é mais complicada do que você precisa saber. Apenas confie em mim quando digo que, se algum prisioneiro extra for libertado ou morrer sem que eu tenha ordenado isso, você será o único a pagar. Quer todo o seu dinheiro? Faça o que eu mandar e pronto. \n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +100
mg_pacheco_prisonerbreak_desc_003=O negócio é o seguinte: Alguns veteranos foram pegos fazendo um trabalho para mim e quero que você os ajude. \n\nUm mecânico amigável providenciou para que o transporte da prisão deles tivesse problemas durante o trajeto, abrindo a porta da frente e parando a nave. Você irá, despachará qualquer segurança que esteja escoltando o transporte, encontrará o manifesto de prisioneiros a bordo e o usará para localizar as cápsulas criogênicas da minha tripulação.\n\nOs picolés que estou procurando são ~mission(NameKill1), ~mission(NameSave2), ~mission(NameSave1), and ~mission(NameSave3). Todos foram leais e merecem algo melhor do que apodrecer na cadeia. Pelo menos acho que foram leais... Ainda estou me perguntando como eles foram presos em primeiro lugar. Não consigo me livrar da sensação de que um deles pode estar traficando em dobro. Vamos fazer o seguinte: se você encontrar alguma prova de que um dos meus tripulantes está trabalhando com a Advocacy, liquide a cápsula criogênica e eu lhe darei um bônus. \n\nDepois de ativar as cápsulas certas e meu pessoal começar a descongelar, saia daí e deixe a equipe de recuperação cuidar do resto. Essa última parte é importante. Assim que forem descongelados, eles serão enviados para a aposentadoria. Não faz sentido que eles saibam mais sobre meus negócios do que já sabem, ou seja, não quero que esses idiotas vejam seu rosto ou sequer saibam que você existe. \n\nAssim que você voltar ao seu caminho, enviarei uma grande pilha de créditos bem merecidos.\n\nAgora, caso você esteja tendo alguma ideia do tipo "Por que eu simplesmente não liberto todo mundo?" ou "Não seria mais fácil calar todos eles permanentemente?" Esqueça isso. A política dessa coisa toda é mais complicada do que você precisa saber. Apenas confie em mim quando digo que, se algum prisioneiro extra for libertado ou morrer sem que eu tenha ordenado isso, você será o único a pagar. Quer todo o seu dinheiro? Faça o que eu mandar e pronto. \n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100
mg_pacheco_title=~mission(Title) <EM4>[100–1,000 Rep]</EM4>
mg_ruto_RetrieveConsignment_desc_001=Olá, recentemente ouvi uma pequena informação de que a ~mission(location|address) recebeu alguns materiais confidenciais que são de grande interesse para um conhecido meu. Tão interessante que eles estão dispostos a pagar para que alguém invada as instalações, pegue os materiais e os entregue na ~mission(DropOff1|address). Agora, espero que haja muitos seguranças, que provavelmente vão lutar, então eu levaria uma ou duas armas. \n\nDizem que os materiais confidenciais foram entregues em uma remessa junto com outras coisas e agora estão sendo armazenados no cofre automatizado da instalação. Os agentes de segurança sênior no local carregam datapads contendo códigos de recuperação usados para acessar o cofre. Você terá que colocar as mãos em um datapad antes de usar a esteira de pacotes para recuperar as caixas. \n\nSe você precisar de um pouco de incentivo, eu vi o manifesto e posso confirmar que as outras caixas que estão sendo armazenadas na instalação são bastante seletivas. Meu cliente não está nem aí para o que acontece com elas, portanto, elas são suas para fazer o que quiser. Se fizer isso direito, essas caixas extras poderão ser um bom bônus além da taxa de entrega para você.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Guards x4, Hostiles x54
mg_ruto_RetrieveConsignment_title_001=recebeu a mercadoria <EM4>[500–4,000 Rep]</EM4>
mg_ruto_UGF_destroy_E_desc_001=Parece que há um novo iniciante na indústria que não pagou as taxas certas às pessoas certas. Para lhe ensinar uma pequena lição, meu cliente quer que você vá até a ~mission(Location|Address) e destrua todas as drogas no local.\n\nOs pequenos bandidos que eles têm no local provavelmente irão se revoltar e tentar detê-lo. Lide com eles como quiser, mas o mais importante é se livrar do produto.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Civilians x4
mg_ruto_UGF_destroy_E_title_001=oferta limitada <EM4>[100 Rep]</EM4>
mg_ruto_UGF_destroy_H_desc_001=Um cliente meu está tentando negociar um acordo, mas não está tendo muita sorte. A outra parte sente que tem toda a vantagem porque está confortavelmente sentada em uma pilha de estoque. Para avançar nas negociações, preciso que você dirija até ~mission(Location|Address) e destrua todas as drogas no local. \n\nAgora eu provavelmente deveria lhe dizer que o lugar é protegido por pessoas muito sérias, então chegar ao esconderijo será um pouco difícil, mas confio que você encontrará um caminho. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
mg_ruto_UGF_destroy_H_title_001=LIMPEZA DE INVENTÁRIO <EM4>[100 Rep]</EM4>
mg_ruto_UGF_destroy_desc_001=Um dos meus clientes estava insatisfeito porque alguém estava interferindo em seu território. Agora, em vez de seguir o caminho tradicional e matar algumas pessoas e começar uma coisa toda, eles decidiram enviar um tipo diferente de mensagem.\n\nVocê irá para ~mission(Location|Address) e todas as drogas Destroy no local . \n\nSe alguém quiser brigar com você, é claro que você pode se defender, mas se livrar do produto é o mais importante.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
mg_ruto_UGF_destroy_title_001=esgotado <EM4>[100 Rep]</EM4>
mg_ruto_UGF_eliminateall_Lawnocivs_desc_001=Todo mundo tem rancor, certo? Quer dizer, quando você é pego por um crime, eu entendo ficar um pouco chateado, mas o jogo é esse, certo?\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostiles x15\n<EM4>Friendlies:</EM4> Civilians x4
mg_ruto_UGF_eliminateall_Lawnocivs_title_001=Viva e vingue-se de um empreiteiro independente <EM4>[100 Rep]</EM4>
mg_ruto_UGF_eliminateall_civsonly_desc_001=Um cliente está sendo produzido por um novo concorrente e quer acabar com tudo.\n\nVocê vai para ~mission(Location|Address) e mata todos os civis que trabalham lá. \n\nFaça o que quiser com os bandidos armados que protegem os trabalhadores, mas lembre-se que eles não são a prioridade. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostiles x10\n<EM4>Friendlies:</EM4> Civilians x4
mg_ruto_UGF_eliminateall_civsonly_title_001=muitos cozinheiros <EM4>[100 Rep]</EM4>
mg_ruto_UGF_eliminateall_desc_001=Isso é um pouco agressivo para o meu gosto, mas créditos são créditos, certo? Tenho um cliente que procura uma pessoa altamente motivada para ir até ~mission(Location|Address) e matar todos que estiverem lá. \nBasta começar a atirar e não parar. Você será pago assim que o local for liberado.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostiles x15
mg_ruto_UGF_eliminateall_nocivs_desc_001=Conheço alguém que quer começar um novo negócio, mas está tendo dificuldade em contratar o talento que precisa.\n\nBem, ele encontrou a equipe perfeita em ~mission(Location|Address), mas as pessoas com quem eles trabalham pois não os deixarei ir. Eles até contrataram guardas armados extras para garantir isso.\n\nO que eu quero de você é que vá lá e mate todos os guardas, garantindo que todos os trabalhadores permaneçam ilesos. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostiles x15\n<EM4>Friendlies:</EM4> Civilians x4
mg_ruto_UGF_eliminateall_nocivs_title_001=É DIFÍCIL ENCONTRAR BOA AJUDA <EM4>[100 Rep]</EM4>
mg_ruto_UGF_eliminateall_title_001=pegajoso e desajeitado <EM4>[100 Rep]</EM4>
mg_ruto_UGF_steal_desc_001=Este aqui deve ser um bom sinal para alguém como você. Há um pacote sendo guardado em ~mission(Location|Address) e preciso que você o leve para ~mission(Destination|Address). \n\nHá um problema muito pequeno que você deve saber. Haverá uma tonelada de segurança lá embaixo. Mas tenho certeza de que não haverá problema.\n\n:)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100
mg_ruto_UGF_steal_title_001=PARA PEGAR E LEVAR COM VOCÊ <EM4>[100 Rep]</EM4>
mg_ruto_clearcrimestat_norep_desc_01=Olá a todos. Ainda não tivemos a oportunidade de trabalhar juntos, mas estou em apuros aqui e preciso de outra pessoa. Não é à toa, é claro. Estou sempre pronto para algo bom em troca. Um dos meus funcionários, que estava em Klescher há algum tempo, deveria me trazer um chip de dados, mas depois desapareceu. Agora presumo que eles estejam mortos, mas o negócio é o seguinte: se você fizer o trabalho dele, acabarei com sua taxa de criminalidade. Nada mal, certo? Aparentemente, seu antecessor queria usar alguns túneis antigos para escapar. Ele disse que não era exatamente fácil de chegar, mas confio que você conseguirá descobrir. Suponho que você encontrará o corpo dele em algum lugar e, se tivermos sorte, ele ainda terá o chip. Depois de pegá-lo, termine a fuga da melhor maneira possível. Então traga os dados para mim. Há um local próximo onde você pode fazer upload do conteúdo do chip. Mas você deve ter cuidado com a Hurston Security. Eles têm causado muitos problemas ultimamente, então não ficaria surpreso se você os encontrasse. Depois de receber e analisar os dados, excluirei seu Status Criminal. \nEntão você pode aproveitar sua liberdade recém-adquirida. Se você fizer isso direito, poderei ter um trabalho mais lucrativo para você mais tarde.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 5
mg_ruto_clearcrimestat_norep_title_01=PRECISA DE UMA SAÍDA? <EM4>[50 Rep]</EM4>
mg_ruto_clearcrimestat_rep_desc_01=Olá a todos. Ouvi dizer que você acabou em Klescher, o que é um verdadeiro horror. Mas na verdade pode ser um dia de sorte para nós dois.\n\nResumindo a história, alguém contrabandeou um chip de dados para fora da prisão, mas eles nunca me responderam. Eu sei com certeza que eles não saíram das instalações, então acho que algo pode ter acontecido com eles. Por mais trágico que seja, o trabalho deve continuar. Se você conseguir o chip e terminar o trabalho, posso diminuir sua taxa de criminalidade para você. Claro, não sei exatamente até onde eles chegaram, mas posso dizer que a prisão tem toda uma rede de túneis escondidos que meu cara queria usar para escapar. Suspeito que o corpo dele esteja apodrecendo em algum lugar. Quando encontrar o corpo, espero que o chip ainda esteja com ele. Assim que tiver, pare de escapar e me dê os dados. Há um local próximo onde você pode fazer upload do conteúdo do chip. \nUm aviso, porém, você deve ter cuidado com a Hurston Security. Eles têm causado muitos problemas ultimamente, então não ficaria surpreso se você os encontrasse. Assim que tiver os dados, limparei seu computador e pronto, você estará livre e limpo. O que você faz depois depende inteiramente de você.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 5
mg_ruto_clearcrimestat_rep_title_01=Vamos ajudar uns aos outros <EM4>[50 Rep]</EM4>
mg_ruto_collect_reclaimer_desc=Olá!\n\nA Nine Tails tem um pequeno problema. Acontece que eles têm um pequeno negócio paralelo no comércio de órgãos clandestinos. Essa é uma área da qual eu geralmente gosto de ficar bem longe, mas show é show, certo? Parece que um de seus açougues móveis a bordo do "October Rising" foi preso pela segurança privada enquanto estava em ação. Agora a Nine Tails está disposta a cortar relações com a nave e sua tripulação (que provavelmente está toda morta), mas precisam que uma determinada caixa seja extraída. De qualquer forma, suba a bordo do October Rising, pegue o pacote e saia.\n\nA segurança ainda está por perto, portanto, tome cuidado e talvez leve alguns amigos, mas lembre-se, sua prioridade é o pacote. Se quiser evitar aborrecimentos extras, você também pode bloquear a área desligando a matriz de comunicação mais próxima se quiser evitar status criminal por, você sabe, matar um grupo de seguranças. Mas, ei, você faz isso.\n\nDepois de sair, deixe o pacote na clínica em Grim HEX e eu providenciarei o pagamento.\n\nFácil, fácil. \n\nRuto\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Pirates x3, Private Security x11\n<EM4>Unknown:</EM4> 1
