Foxwell_EliminateAll_PAF_M_desc_001=Estamos rastreando um grupo de foras-da-lei que está causando problemas para um de nossos clientes. Parece que eles se estabeleceram em uma antiga instalação da Hathor. Não sei quais são os planos deles com essa antiga instalação, mas nosso cliente está ansioso para cuidar deles.\n\nProcurando alguém para ir até <EM4>~mission(Location|Address)</EM4> e neutralizar esses alvos.\n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma empresa especializada em segurança licenciada para operar em todo o UEE. Estamos sempre procurando novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes contratuais.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Attackers x30, Boss x4, CQC x2, Defenders x12, Hostiles x91, Juggernauts x1, Kopions x2, Sentries x1, Snipers x5, Soldiers x16, Targets x1, Technicians x2\n<EM4>Friendlies:</EM4> Civilians x20\n<EM4>Applicant:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -500 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
