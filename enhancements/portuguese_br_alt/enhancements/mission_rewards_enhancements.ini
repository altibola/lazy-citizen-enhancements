UDM_UGF_collect_desc_001=Saudações, Parceiro Qualificado de Transporte!\n\nSe você está procurando trabalho como piloto de entrega, temos a oportunidade perfeita para você! \n\nUma coleta está esperando em <EM4>~mission(Location|Address)</EM4> para ser entregue em <EM4>~mission(Destination|Address)</EM4>. Parece divertido, certo?\n\nAviso: houve vários alertas de segurança sinalizados na área. Não se esqueça de trazer algumas medidas defensivas para que você possa se manter seguro.\n\nSe isso parece ser algo em que você está interessado, aceite esta oferta imediatamente! \n\nEstamos ansiosos para trabalhar com você,\n\nUnified Distribution Management\n - Entregando o Pacote Completo-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Unknown:</EM4> 4
