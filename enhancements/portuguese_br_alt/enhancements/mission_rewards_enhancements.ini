foxwell_DefendShip_E_desc_001=A Foxwell está procurando um piloto de combate disponível para prestar assistência imediata a uma ~mission(Ship) que está sendo atacada próxima de ~mission(Location|Address). Não identificamos os autores do ataque, mas nos garantiram que se trata de uma força pequena.\n\nPor favor, despache rapidamente e elimine todos os hostis. Precisamos que o cliente passe por lá, pois ele ainda não nos pagou.\n\nBoa sorte,\n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma empresa especializada em segurança licenciada para operar em todo o UEE. Estamos sempre procurando novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes contratuais.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x3\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Blueprint Reward:</EM4> Guaranteed
foxwell_DefendShip_E_title_001=CONTRATO NÍVEL AMARELO: NAVE SOB ATAQUE <EM4>[BP]</EM4>
foxwell_DefendShip_H_desc_001=Acabou de chegar um contrato de emergência sobre uma briga perto de ~mission(Location|Address). Aparentemente, um grupo de naves foi emboscado por bandidos liderados por ~mission(TargetName), que é procurado em vários planetas por assassinato e roubo de naves. A Foxwell está procurando pilotos de combate de alto nível para proteger os clientes contra eles.\n\nEste foi marcado como um contrato de nível vermelho, portanto, é realmente perigoso. Se você tem pessoas que poderia trazer, provavelmente deveria. Se trouxer, você também deve informá-las sobre as políticas de contratação da Foxwell. \n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma empresa especializada em segurança licenciada para operar em todo o UEE. Estamos sempre procurando novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes contratuais.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostiles x9\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Blueprint Reward:</EM4> Guaranteed
foxwell_DefendShip_H_title_001=CONTRATO NÍVEL VERMELHO: NAVE SOB ATAQUE <EM4>[BP]</EM4>
foxwell_DefendShip_M_desc_001=Tenho um contrato de nível laranja para qualquer piloto de combate disponível. Uma ~mission(Ship) está sendo atacada nas proximidades de ~mission(Location|Address) e precisa desesperadamente de assistência. Não temos certeza de quantos são os agressores, mas eles parecem motivados e perigosos, portanto, tenha cuidado.\n\nUma vez no local, enfrente e destrua todos os hostis que encontrar e proteja o cliente. Assim que eles transferirem os créditos, encaminharemos seu pagamento.\n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma empresa especializada em segurança licenciada para operar em todo o UEE. Estamos sempre procurando novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes contratuais.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Blueprint Reward:</EM4> Guaranteed
foxwell_DefendShip_M_title_001=CONTRATO NÍVEL LARANJA: ~mission(Ship) PRECISA DE AJUDA <EM4>[BP]</EM4>
