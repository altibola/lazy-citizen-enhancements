BHG_Certification_Hard_Desc=--------------------------------------------------------\n----------------- CONTRATO DE RECOMPENSA -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName) \nSISTEMA: ~mission(System) \nAVALIAÇÃO DE RISCO: Alto\nÚLTIMA LOCALIZAÇÃO CONHECIDA: ~mission(Location)\nAFILIAÇÕES CONHECIDAS: <None>\nNOTAS: À medida que sua reputação na comunidade continua a crescer, a Bounty Hunters Guild gostaria de oferecer a você a chance de obter uma Licença de Rastreador Profissional (Journeyman Tracker License).\n\nEsta licença significaria que você está qualificado para rastrear e prender Alvos de Alto Risco (HRT). Esses criminosos podem viajar em naves maiores com tripulação múltipla e diversas escoltas. As capacidades ofensivas e defensivas adicionais os tornam alvos difíceis para todos, exceto para os membros mais habilidosos da guilda.\n\nPara concluir com sucesso este processo de certificação, você deve prender um criminoso de nível HRT de nome <EM4>~mission(TargetName)</EM4>, visto pela última vez em <EM4>~mission(Location|Address)</EM4>.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca da Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Mercenary Guild e autorizado a operar tanto na UEE quanto além, de acordo com os Atos da Xenotrade Authority.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 3
