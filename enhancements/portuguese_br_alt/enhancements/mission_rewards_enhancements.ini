FTL_Courier_Nyx_Easy_Desc_001=CONTRATO FTL DISPONÍVEL\nPARA ATRIBUIÇÃO IMEDIATA\n\n**DETALHES DO CONTRATO**\nA FTL requer um entregador de nível inicial para concluir entregas em Nyx.\nO entregador deve fornecer o próprio transporte.\nTreinamento prévio em levantamento manual é preferível, com a <EM4>capacidade de mover caixas de até 0,25 SCU</EM4> de peso.\nAo aceitar este contrato, você concorda em assumir total responsabilidade pela segurança dos pacotes atribuídos.\n\n~mission(Contractor|SignOff)\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S0-B] Defiant\n- [IND-S1-B] Colossus\n- [IND-S2-B] Huracan\n- [IND-S2-B] Sedulity\n- [IND-S3-B] Agni\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
FTL_Courier_Nyx_Easy_Title_001=ENTREGADOR NÍVEL INICIAL NECESSÁRIO EM NYX <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
FTL_Courier_Stanton_Easy_Desc_001=CONTRATO FTL DISPONÍVEL\nPARA ATRIBUIÇÃO IMEDIATA\n\n**DETALHES DO CONTRATO** \nUm entregador de nível inicial confiável e esforçado é necessário para realizar uma entrega em Stanton.\nVocê será responsável por fornecer seu próprio transporte.\nContratados interessados precisam da <EM4>capacidade de levantar caixas de até 0,25 SCU</EM4>.\nOs contratados são empregados de forma independente e, portanto, não são cobertos pelo seguro da empresa FTL.\n\n~mission(Contractor|SignOff)\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S0-B] Defiant\n- [IND-S1-B] Colossus\n- [IND-S2-B] Huracan\n- [IND-S2-B] Sedulity\n- [IND-S3-B] Agni\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Neutral:</EM4> +500 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
