shubin_claimsweep_desc_easy=POSTAGEM: Segurança / Mercenário \nLOCAL: ~mission(LagrangeLocation)\nEXPERIÊNCIA DE TRABALHO: Piloto de Combate (Experiência Militar é um Plus)\nTERMOS*: \nAcabamos de receber a notícia de que um contratado da Shubin foi expulso de uma de nossas concessões por bandidos que estão operando lá ilegalmente. Para complicar ainda mais as coisas, eles criaram algumas sentinelas orbitais para se protegerem enquanto exploram. \n\nNossa esperança é contratar um mercenário que possa procurar e destruir as sentinelas em ~mission(location). Se você encontrar algum mineiro ilegal no local, lembre-se de que é prática comum que esses tipos entrem em contato com reforços para obter assistência. Talvez seja melhor neutralizá-los o mais rápido possível antes que possam fazê-lo. \n\n\n\n\n*A Shubin Interstellar é uma Empresa que oferece oportunidades iguais. Ao aceitar este contrato, você está assumindo todos os riscos associados ao trabalho descrito aqui e de nenhuma maneira a Shubin Interstellar pode ser responsabilizada por quaisquer danos acumulados durante a vigência do contrato.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x3, Prospectors x1\n<EM4>Turrets:</EM4> 1 (hostile)
shubin_claimsweep_desc_hard=POSTAGEM: Segurança / Mercenário \nLOCAL: ~mission(LagrangeLocation)\nEXPERIÊNCIA DE TRABALHO: Piloto de Combate (Experiência Militar é um Plus)\nTERMOS*: \nUma equipe de mineração local independente, de Stanton, estava trabalhando em ~mission(Location) como contratados da Shubin Interestelar quando uma força hostil atacou e assumiu o local. Acreditamos que os perpetradores ainda estão na concessão, usando o equipamento deixado para trás para colher os minérios valiosos para si próprios.\n\nEntre os equipamentos perdidos estava um punhado de sentinelas orbitais que, infelizmente, ainda não haviam sido totalmente implantadas no momento do ataque. Varreduras de longo alcance da concessão nos levaram a concluir que os bandidos ativaram as sentinelas orbitais e as estão usando para proteger suas operações ilegais.\n\nPara recuperar o local, estamos procurando contratados para irem até ~mission(Location), destruir as sentinelas orbitais e limpar o local de mineradores hostis. A eficiência é fortemente recomendada, pois há alto risco de que eles peçam reforços quando descobrirem que estão sendo despejados. \n\n\n\n\n*A Shubin Interstellar é uma Empresa que oferece oportunidades iguais. Ao aceitar este contrato, você está assumindo todos os riscos associados ao trabalho descrito aqui e de nenhuma maneira a Shubin Interstellar pode ser responsabilizada por quaisquer danos acumulados durante a vigência do contrato.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x5, Prospectors x4\n<EM4>Turrets:</EM4> 4 (hostile)
shubin_claimsweep_desc_intro=POSTAGEM: Segurança / Mercenário \nLOCAL: ~mission(LagrangeLocation)\nEXPERIÊNCIA DE TRABALHO: Piloto de Combate (Experiência Militar é um Plus)\nTERMOS*: \nRecentemente descobriu-se que uma concessão de mineração da Shubin foi ilegalmente invadida por um minerador renegado. Embora o próprio minerador pareça não estar mais roubando minério do local, ele deixou para trás uma sentinela orbital que está nos impedindo de recuperá-lo, graças às suas capacidades ofensivas.\n\nEstamos procurando um mercenário disposto a viajar até ~mission(location) para caçar a sentinela e destruí-la, e preparar para a retomada do local pela Shubin.\n\n\n\n\n*A Shubin Interstellar é uma Empresa que oferece oportunidades iguais. Ao aceitar este contrato, você está assumindo todos os riscos associados ao trabalho descrito aqui e de nenhuma maneira a Shubin Interstellar pode ser responsabilizada por quaisquer danos acumulados durante a vigência do contrato.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Turrets:</EM4> 1 (hostile)
shubin_claimsweep_desc_med=POSTAGEM: Segurança / Mercenário \nLOCAL: ~mission(LagrangeLocation)\nEXPERIÊNCIA DE TRABALHO: Piloto de Combate (Experiência Militar um Plus)\nTERMOS*: \nUma concessão de mineração da Shubin Interstellar recentemente adquirida, aguardando processamento, foi descoberta como tendo sido atacada por uma empresa de mineração desonesta que está ativamente roubando minérios do local. Embora as autoridades locais tenham sido notificadas, existe a preocupação de que bens valiosos possam ser extraídos antes que uma investigação oficial possa ser iniciada.\n\nPortanto, como é nosso direito como detentores de concessões, desejamos garantir uma força mercenária para ir para ~mission(Location) e destruir as diversas sentinelas orbitais que protegem esta operação ilegal. Aconselha-se cautela, pois ainda pode haver alguns mineradores ilegais no local, juntamente com quaisquer reforços que eles reúnam. \n\n\n\n\n*A Shubin Interstellar é uma Empresa que oferece oportunidades iguais. Ao aceitar este contrato, você está assumindo todos os riscos associados ao trabalho descrito aqui e de nenhuma maneira a Shubin Interstellar pode ser responsabilizada por quaisquer danos acumulados durante a vigência do contrato.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x4, Prospectors x2\n<EM4>Turrets:</EM4> 3 (hostile)
shubin_claimsweep_desc_rand=POSTAGEM: Segurança / Mercenário \nLOCAL: ~mission(LagrangeLocation)\nEXPERIÊNCIA DE TRABALHO: Piloto de Combate (Experiência Militar é um Plus)\nTERMOS*: \nAo conduzirmos uma pesquisa sobre as concessões da Shubin no setor, ficamos desanimados ao saber que uma pequena equipe de bandidos se estabeleceu em ~mission(Location) e tem explorado recursos ilegalmente. Pior, eles estabeleceram um perímetro defensivo com várias sentinelas orbitais espalhadas pelo local, tornando difícil para nós expulsá-los. \n\nPara que possamos retomar o local reivindicado, estamos procurando mercenários contratados para encontrar e destruir o punhado de sentinelas orbitais. O que acrescenta dificuldade adicional à tarefa é que não temos certeza da força exata de combate desses mineradores foras da lei. Se lhes for dada a oportunidade de convocar reforços, esperem qualquer coisa, desde uma pequena contingência até um esquadrão completo de combatentes treinados. \n\n\n\n\n*A Shubin Interstellar é uma Empresa que oferece oportunidades iguais. Ao aceitar este contrato, você está assumindo todos os riscos associados ao trabalho descrito aqui e de nenhuma maneira a Shubin Interstellar pode ser responsabilizada por quaisquer danos acumulados durante a vigência do contrato.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x32, Prospectors x5\n<EM4>Turrets:</EM4> 4 (hostile)
shubin_rockcracker_pvp_desc_01=CONTRATO: Transferência de Direitos de Mineração\nLOCALIZAÇÃO: Nyx\n\nDETALHES:\nOs prospectores da Shubin Interstellar descobriram recentemente a localização de uma QV Breaker Station de Serviço Planetário abandonada perto do cinturão Keeger. Essas estações eram originalmente usadas pela empresa extinta para colher recursos valiosos de dentro de asteroides, mas o conhecimento de suas localizações exatas foi perdido ao longo dos anos. \n\nEmbora esta estação em particular esteja offline, nossa equipe de batedores acredita que ela possa se tornar funcional novamente com os reparos necessários. Além disso, se for reativada, já existe um asteroide rico em recursos no local, pronto para ser quebrado pelo laser de mineração da estação. \n\nInfelizmente, com todos os diversos desafios que surgem ao operar em Nyx, a Shubin não possui atualmente a largura de banda disponível para lidar com os reparos mencionados por conta própria. Isso, no entanto, criou uma oportunidade para uma operação de mineração independente interessada, como a sua. \n\n<EM4>TERMOS*:</EM4>\nEstamos disponibilizando os <EM4>direitos de mineração compartilhados</EM4> para esta QV Breaker Station. Após a compra, forneceremos as coordenadas da estação para você e sua tripulação. (Lembre-se de que quaisquer outras partes interessadas que comprarem os direitos de mineração também terão acesso à estação.) Sua tripulação estará livre para ir até lá com uma <EM4>nave de mineração</EM4>, restaurar o <EM4>laser de mineração da estação</EM4> para um estado operacional, quebrar o asteroide e <EM4>colher os recursos</EM4> em seu interior. \n\nPor favor, note que, como este é um contrato compartilhado, podemos oferecer esses direitos de mineração a preços reduzidos, mas os recursos no asteroide estarão disponíveis por ordem de <EM4>chegada</EM4> em relação a quaisquer outras equipes de mineração no local. Além disso, há também a chance de que outras partes interessadas, como fora da lei, descubram a localização da estação por conta própria. Recomenda-se cautela. \n\n*Ao aceitar este contrato, você assume todos e quaisquer riscos associados ao trabalho aqui descrito e, de forma alguma, a Shubin Interstellar pode ser responsabilizada por quaisquer danos acumulados durante a vigência do contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 "Kismet" Shotgun\n- R97 "Righteous" Shotgun\n- [S1-A] Monde Arms Delta Camo\n- [S1-A] Monde Arms Hemlock Camo\n- [S1-A] Monde Core Delta Camo\n- [S1-A] Monde Core Hemlock Camo\n- [S1-A] Monde Helmet Delta Camo\n- [S1-A] Monde Helmet Hemlock Camo\n- [S1-A] Monde Legs Delta Camo\n- [S1-A] Monde Legs Hemlock Camo\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Blueprint Reward:</EM4> Guaranteed
