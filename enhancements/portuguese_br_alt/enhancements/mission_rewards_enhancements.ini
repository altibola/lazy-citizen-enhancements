Foxwell_HaulCargo_AToB_OLP_desc_01=Procurando um contratado com as habilidades e nave certas para uma missão importante. Foras da lei emboscaram um Hull C transportando uma carga de <EM4>~mission(CargoGradeToken)</EM4> e a levaram para <EM4>~mission(Location|Address)</EM4>. Fomos contratados para recuperar tudo.\n\nA carga está armazenada em algum lugar de uma instalação abandonada da Hathor. O lugar é grande e cheio de foras da lei. Precisamos de alguém para recuperar os bens do elevador de carga e entregá-los de volta ao <EM4>elevador de carga em ~mission(Destination|Address)</EM4>. Não espere que seja moleza. Traga bastante munição e uma nave que possa transportar contêineres de <EM4>~mission(MissionMaxSCUSize)</EM4>.\n\nTambém não faria mal trazer um <EM4>raio trator portátil</EM4> com você.\n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança licenciada para operar em todo o UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa equipe. Se você ou alguém que conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_HaulCargo_AToB_OLP_title_01=CONTRATO NÍVEL VERMELHO: RECUPERAR TRANSPORTE DE CARGA <EM4>[BP]</EM4>
Foxwell_HaulCargo_AToB_PAF_desc_01=Uma equipe recentemente invadiu um centro de distribuição e levou uma carga de <EM4>~mission(CargoGradeToken)</EM4>. A Foxwell foi contratada para recuperar todos esses bens. Estamos recebendo relatórios de que esses foras da lei estão usando antigas instalações da Hathor como depósitos, e acreditamos que os itens roubados estão atualmente em <EM4>~mission(Location|Address)</EM4>.\n\nSe estiver interessado, você precisará de uma nave capaz de transportar contêineres de <EM4>~mission(MissionMaxSCUSize)</EM4>. Duvido que consiga entrar e sair desse PAF sem ser notado, então é melhor estar preparado para limpar o local. Uma vez seguro, recolha os bens do elevador de carga e entregue-os ao <EM4>elevador de carga em ~mission(Destination|Address)</EM4>.\n\nTambém não faria mal trazer um <EM4>raio trator portátil</EM4> com você.\n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança licenciada para operar em todo o UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa equipe. Se você ou alguém que conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_HaulCargo_AToB_PAF_title_01=CONTRATO NÍVEL VERMELHO: RECUPERAÇÃO DE CARGA ROUBADA <EM4>[BP]</EM4>
Foxwell_HaulCargo_MultiToSingle_desc_01=Algo estranho está acontecendo nas antigas instalações de mineração Hathor. Tanto as plataformas de alinhamento quanto as plataformas laser orbitais foram abandonadas e estão acumulando poeira há décadas, mas foras da lei começaram a usá-las como base de operações.\n\nFomos contratados por uma parte interessada que recentemente perdeu muita carga importante para uma dessas gangues. Atualmente, os pertences deles estão guardados em <EM4>~mission(Location1|Address)</EM4> e <EM4>~mission(Location2|Address)</EM4>, mas há um temor crescente de que a gangue possa descarregar suas mercadorias em breve. Por isso fomos contratados para atacar ambas as instalações Hathor, recuperar a carga dos elevadores de carga e levá-la ao elevador de carga em <EM4>~mission(Destination|Address)</EM4>.\n\nAqui estão os detalhes sobre o que pegar em cada local. Não importa a ordem em que faça isso, desde que tudo seja coletado e entregue. Apenas certifique-se de trazer uma nave capaz de transportar contêineres de <EM4>~mission(MissionMaxSCUSize)</EM4>. Também não faria mal trazer um <EM4>raio trator portátil</EM4> com você.\n\n~mission(MultiToSingleToken)\n\nA Foxwell não conseguiu explorar esses locais, mas se fosse você, esperaria enfrentar resistência armada séria. Melhor trazer bastante equipamento e alguns aliados.\n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança licenciada para operar em todo o UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa equipe. Se você ou alguém que conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_HaulCargo_MultiToSingle_title_01=CONTRATO NÍVEL VERMELHO: LIBERAR PAFs, RECUPERAR CARGA E ENTREGAR À OLP <EM4>[BP]</EM4>
Foxwell_Mercenary_Rehire_desc_001=Devido a uma reestruturação corporativa, a Foxwell tem algumas novas vagas que precisam ser preenchidas imediatamente. A Foxwell sabe que você já expressou interesse nessa linha de trabalho e estamos pensando se você gostaria de tentar novamente um contrato.\n\nUm de nossos clientes precisa de suporte em <EM4>~mission(Location|Address)</EM4>, onde suas forças de segurança estão lutando para lidar com uma incursão de fora da lei. Vá até lá e ajude as forças locais a se livrarem do problema antes que seja tarde demais. \n\nConclua este contrato com sucesso e a Foxwell terá prazer em enviar mais trabalhos para você.\n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma empresa especializada em segurança licenciada para operar em todo o UEE. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes contratuais.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5\n<EM4>Applicant:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_Mercenary_Rehire_title_001=Ainda Procurando Trabalho? <EM4>[BP]</EM4> <EM4>[500 Rep]</EM4>
Foxwell_SecurityPatrol_E_Desc_001=Precisamos de alguém para neutralizar uma patrulha de segurança. Você deverá ir até o <EM4>marcador de localização</EM4> no seu HUD e escanear diversos pontos de verificação designados, garantindo que estejam seguros. \n\nOs satélites nessa região têm apresentado problemas ultimamente. Não sabemos exatamente o que está acontecendo por lá, então é melhor estar preparado caso surja alguma complicação.\n\nConclua este contrato e o contratado principal receberá um pagamento bônus de <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n‘Segurança, do Seu Jeito’\n\nA Foxwell Enforcement é uma especialista em segurança credenciada e licenciada para operar por todo o UEE. Estamos sempre em busca de novos operadores para se juntar à nossa equipe. Se você ou alguém que conhece estiver interessado, entre em contato com um de nossos representantes de contratos.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sanguine" Energy Assault Rifle\n- [S1-A] Antium Arms Sand\n- [S1-A] Antium Core Sand\n- [S1-A] Antium Helmet Sand\n- [S1-A] Antium Legs Sand\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Targets x15\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_SecurityPatrol_E_Title_001=CONTRATO DE NÍVEL AMARELO: VARREDURA DE SEGURANÇA <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_SecurityPatrol_H_Desc_001=Várias naves desconhecidas foram avistadas em áreas frequentadas por transportadores que entregam mercadorias para nosso cliente. Eles estão preocupados que essas naves estejam monitorando os transportadores em preparação para uma emboscada, então nos contrataram para patrulhar a área. \n\nComece indo até o <EM4>marcador de localização</EM4> no seu HUD e escaneie o local para garantir que esteja limpo. Depois disso, enviaremos você para outras áreas a fim de escanear possíveis ameaças. Recomendamos que leve um <EM4>companheiro de ala</EM4> e bastante suprimentos para estar pronto para o que quer que apareça.     \n\nSaiba também que completar este contrato com sucesso renderá ao contratado principal um pagamento bônus de <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n‘Segurança, do Seu Jeito’\n\nA Foxwell Enforcement é uma especialista em segurança credenciada e licenciada para operar por todo o UEE. Estamos sempre em busca de novos operadores para se juntar à nossa equipe. Se você ou alguém que conhece estiver interessado, entre em contato com um de nossos representantes de contratos.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sanguine" Energy Assault Rifle\n- [S1-A] Antium Arms Sand\n- [S1-A] Antium Core Sand\n- [S1-A] Antium Helmet Sand\n- [S1-A] Antium Legs Sand\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Targets x54\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_SecurityPatrol_H_Title_001=CONTRATO DE NÍVEL LARANJA: AMEAÇA POTENCIAL À SEGURANÇA <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
Foxwell_SecurityPatrol_M_Desc_001=Um cliente está preocupado com atividades próximas a alguns de seus interesses. Fomos contratados para patrulhar a área e realizar varreduras em diversos locais. Interessado? Se sim, vá até o <EM4>marcador de localização</EM4> no seu HUD para iniciar a patrulha.\n\nO cliente não foi específico quanto às ameaças, mas desconfia que algo não está certo por lá. Esperamos conseguir trazer um pouco de tranquilidade para ele.\n\nAlém disso, o cliente providenciou um pagamento bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4> para o contratado principal.\n\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n‘Segurança, do Seu Jeito’\n\nA Foxwell Enforcement é uma especialista em segurança credenciada e licenciada para operar por todo o UEE. Estamos sempre em busca de novos operadores para se juntar à nossa equipe. Se você ou alguém que conhece estiver interessado, entre em contato com um de nossos representantes de contratos.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sanguine" Energy Assault Rifle\n- [S1-A] Antium Arms Sand\n- [S1-A] Antium Core Sand\n- [S1-A] Antium Helmet Sand\n- [S1-A] Antium Legs Sand\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Targets x23\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_SecurityPatrol_M_Title_001=CONTRATO DE NÍVEL LARANJA: PATRULHA DE SEGURANÇA <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
Foxwell_SecurityPatrol_S_Desc_001=Precisamos de um piloto experiente em combate para uma patrulha importante. Um cliente de destaque está farto de criminosos atacando suas naves e satélites. Fomos contratados para escanear as áreas em questão e lidar com quaisquer forças hostis. A patrulha começa no <EM4>marcador de localização</EM4> no seu HUD antes de seguir para vários outros locais que você deverá limpar.\n\nNão sabemos exatamente o que você vai encontrar por lá, mas com base nas informações compartilhadas pelo cliente, frequentemente há grupos de cinco a sete caças circulando pela região. Alguns inclusive contam com naves maiores liderando o ataque. Isso significa que você deve estar preparado para um combate pesado. Se possível, tente recrutar pelo menos <EM4>três amigos</EM4> para ajudar. Mesmo um piloto veterano vai precisar de todo o apoio possível contra essa turma.   \n\nComo essa será uma missão difícil, o contratado principal receberá um pagamento bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4> ao final da patrulha.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n‘Segurança, do Seu Jeito’\n\nA Foxwell Enforcement é uma especialista em segurança credenciada e licenciada para operar por todo o UEE. Estamos sempre em busca de novos operadores para se juntar à nossa equipe. Se você ou alguém que conhece estiver interessado, entre em contato com um de nossos representantes de contratos.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sanguine" Energy Assault Rifle\n- [S1-A] Antium Arms Sand\n- [S1-A] Antium Core Sand\n- [S1-A] Antium Helmet Sand\n- [S1-A] Antium Legs Sand\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 7/7\n<EM4>Hostiles:</EM4> Targets x84\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
