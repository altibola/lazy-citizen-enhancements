Shubin_Rockcracker_CollectLenses_Desc_001=CONTRATO: Ordem de Fabricação\nLOCALIZAÇÃO: Nyx\n\nDETALHES:\nSe por acaso você tiver outro trabalho que o leve a uma das Estações de Britagem da QV no Cinturão Keeger, a Shubin Interstellar estaria altamente interessada em contratá-lo para obter um suprimento de lentes de foco para laser de mineração, que são difíceis de encontrar.\n\n<EM4>TERMOS*:</EM4>\nEmbora possa haver algumas lentes de foco que possam ser recuperadas do armazenamento da Estação de Britagem da QV, o mais provável é que você precise fabricá-las usando <EM4>cristais de Sadaryx</EM4> e o fabricante de lentes local. Embora o minério seja raro, estas Estações de Britagem normalmente possuem veios de sadaryx que podem ser minerados diretamente com uma <EM4>Multi-Tool com um Acessório de Mineração</EM4>.\n\nEntregue as lentes obtidas no elevador de carga localizado em <EM4>~mission(Destination|Address)</EM4> para processamento.\n\nContratantes relataram que estas estações podem ter sido infiltradas por foras da lei, portanto, recomenda-se cautela.\n\n*Ao aceitar este contrato, você assume todo e qualquer risco associado ao trabalho aqui descrito e de forma alguma a Shubin Interstellar poderá ser responsabilizada por quaisquer danos acumulados durante a vigência do contrato.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +100 Rep
