LingFamily_HaulCargo_MultiToSingle_desc_CFPAmenities=Ei, \n \nAlguma chance de você estar disposto a fazer um transporte para Pyro? Eu sei que pode ficar perigoso lá, mas é por uma boa causa. Um grupo de novos membros do CFP se mudou para <EM4>~mission(Destination|Address)</EM4> e teve dificuldade em se adaptar à vida no sistema. Todos deixaram coisas para trás em Stanton, porque o transportador deles não tinha espaço, então fomos contratados para pegar tudo e levar para eles. \n\nAqui estão as coletas:\n\nLOCAIS DE COLETA (QUALQUER ORDEM) \n\n~mission(MultiToSingleToken) \n\nOs líderes do CFP esperam que levar estas coisas para eles faça o sistema parecer mais um lar. Vamos garantir que este corra bem. Lembre-se de equipar seu <EM4>raio trator portátil</EM4> e uma nave que caiba <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>.\n\n \nBoas Viagens, \nReyes Ling \nCoordenador de Logística de Carga \nLing Family Hauling\n\n\n\n\n\n\n\nA Ling Family Hauling sabe que é um universo perigoso e imprevisível e estabeleceu vários protocolos para proteger tanto você quanto a carga de nosso cliente. Para garantir que você não seja punido por circunstâncias fora do seu controle, o pagamento total será rateado de acordo com a porcentagem de carga entregue com sucesso. Um temporizador de entrega será definido para cada transporte. Qualquer carga que permanecer não entregue após sua expiração será marcada como roubada e tratada como tal. Todas as coletas e entregas devem ser carregadas automaticamente (*autoloaded*) ou feitas em um elevador de carga.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-B] Guardian\n- [IND-S2-B] Citadel\n- [IND-S3-B] Barbican\n- [STH-S1-A] Spectre\n- [STH-S1-B] Zephyr\n- [STH-S2-A] Spicule\n- [STH-S2-B] Bolt\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Rookie:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
