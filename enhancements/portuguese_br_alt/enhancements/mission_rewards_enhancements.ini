ForceDepletion_Desc=Elimine os membros da Organização Nine Tails. \nPara cada membro neutralizado você receberá 500 UEC e ao completar receberá 1000 UEC como bônus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +4,000
ForceDepletion_Title=ELIMINAR MEMBROS DA ORGANIZAÇÃO NINE TAILS <EM4>[4,000 Rep]</EM4>
Foxwell_DefendDestructibleEntites_E_Desc_001=Algum piloto disposto na área? Preciso de proteção em <EM4>~mission(Location|Address)</EM4> para um cliente. Um bando de marginais tem visado seus <EM4>~mission(Objects)</EM4> e, se nada for feito, eles causarão danos reais. Preciso de alguém para proteger a propriedade do cliente o máximo possível e lidar com os bandidos.\n\nPelas informações que conseguimos reunir, esses bandidos são amadores, mas podem causar problemas se você não tiver cuidado. Portanto, se você conseguir realizar isso nos padrões da Foxwell, ofereceremos <EM4>~mission(ScripAmount) MG Scrip</EM4> ao contratante principal.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança garantida, licenciada para operar em toda a UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x10\n<EM4>Rep:</EM4> +100\n<EM4>Blueprint Reward:</EM4> 100% chance (Easy only)\n\n<EM4>? = only the Easy variant awards blueprints</EM4>
Foxwell_DefendDestructibleEntites_E_Title_001=CONTRATO NÍVEL AMARELO: PROTEGER ~mission(Objects) <EM4>[BP?]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_DefendDestructibleEntites_H_Desc_001=Um de nossos clientes de alta prioridade está sob ataque de uma gangue criminosa que visa seus <EM4>~mission(Objects)</EM4> em <EM4>~mission(Location|Address)</EM4>. Os bens do cliente são valiosos, então precisamos mantê-los seguros a todo custo, mas não vou mentir – será um grande desafio, pois esses bandidos estão determinados a causar danos reais.\n\nSe fosse eu, não hesitaria em <EM>trazer reforços</EM4> para lidar com eles. Eles não são brincadeira, por isso estamos oferecendo uma recompensa bem merecida de <EM4>~mission(ScripAmount) MG Scrip</EM4> ao contratante principal que lidar com esses sujeitos com sucesso.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança garantida, licenciada para operar em toda a UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x17\n<EM4>Rep:</EM4> +200\n<EM4>Blueprint Reward:</EM4> 100% chance (Hard only)\n\n<EM4>? = only the Hard variant awards blueprints</EM4>
Foxwell_DefendDestructibleEntites_H_Title_001=CONTRATO NÍVEL LARANJA: PROTEGER ~mission(Objects) <EM4>[BP?]</EM4> <EM4>[200 Rep]</EM4>
Foxwell_DefendDestructibleEntites_M_Desc_001=Espero que você possa fornecer serviços de proteção em <EM4>~mission(Location|Address)</EM4>. Um de nossos clientes de alta prioridade está tendo problemas sérios com um bando de marginais visando seus ~mission(Objects). É necessário manter os bens o mais seguros e intactos possível. O cliente espera o serviço pelo qual paga, então não estrague tudo ou poderemos perder um cliente fiel.\n\nPor enquanto, ainda estamos um pouco no escuro em relação a esses marginais, mas se você conseguir realizar isso nos padrões da Foxwell, ofereceremos <EM4>~mission(ScripAmount) MG Scrip</EM4> ao contratante principal.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança garantida, licenciada para operar em toda a UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x15\n<EM4>Rep:</EM4> +150\n<EM4>Blueprint Reward:</EM4> 100% chance (Medium only)\n\n<EM4>? = only the Medium variant awards blueprints</EM4>
Foxwell_DefendDestructibleEntites_M_Title_001=CONTRATO NÍVEL LARANJA: DEFENDER ~mission(Objects) <EM4>[BP?]</EM4> <EM4>[150 Rep]</EM4>
Foxwell_DefendDestructibleEntites_S_Desc_001=Um contrato de emergência acabou de chegar sobre uma gangue de bandidos violentos causando estragos em uma das infraestruturas de nossos clientes VIP. Se disponível, precisamos que você corra para <EM4>~mission(Location|Address)</EM4> e defenda os <EM4>~mission(Objects)</EM4> extremamente valiosos do cliente a todo custo.\n\nA Foxwell conhece muito bem esse grupo, então acredite em mim quando digo que esses pilotos não devem ser subestimados. Recomendo fortemente que você organize uma <EM>força de apoio altamente competente</EM> para voar com você até o local.\n\nSe você conseguir sobreviver ao encontro com a propriedade do cliente intacta, adicionaremos <EM4>~mission(ScripAmount) MG Scrip</EM4> para qualquer contratante principal corajoso o suficiente para aceitar este trabalho.\n\nFique seguro e boa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança garantida, licenciada para operar em toda a UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 7/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x22\n<EM4>Rep:</EM4> +300\n<EM4>Blueprint Reward:</EM4> 100% chance (Super only)\n\n<EM4>? = only the Super variant awards blueprints</EM4>
Foxwell_DefendDestructibleEntites_S_Title_001=CONTRATO NÍVEL VERMELHO: PROTEGER ~mission(Objects) <EM4>[BP?]</EM4> <EM4>[300 Rep]</EM4>
Foxwell_DefendDestructibleEntites_VE_Desc_001=Chamando todos os pilotos – um de nossos clientes está procurando proteção para seus <EM4>~mission(Objects)</EM4>, localizados em <EM4>~mission(Location|Address)</EM4>. Pelo que apuramos, os atacantes são um grupo de marginais amadores que provavelmente não perceberam o valor dos bens que estão tentando destruir, apenas causando estragos por diversão. Ainda assim, a propriedade do cliente é importante, portanto deve ser mantida o mais intacta possível.\n\nSe você cuidar deles nos padrões da Foxwell, ofereceremos <EM4>~mission(ScripAmount) MG Scrip</EM4> ao contratante principal.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança garantida, licenciada para operar em toda a UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Rep:</EM4> +100\n<EM4>Blueprint Reward:</EM4> 100% chance (VeryEasy only)\n\n<EM4>? = only the VeryEasy variant awards blueprints</EM4>
Foxwell_DefendDestructibleEntites_VE_Title_001=CONTRATO NÍVEL AMARELO: DEFENDER ~mission(Objects) <EM4>[BP?]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_DefendDestructibleEntites_VH_Desc_001=Apoio urgente de naves necessário em <EM4>~mission(Location|Address)</EM4>. Uma organização criminosa destrutiva conhecida vem testando os limites com a propriedade de um de nossos clientes há meses, e agora o caos se instalou com eles visando os <EM4>~mission(Objects)</EM4> do cliente. Esses bens são altamente valiosos, então precisamos mantê-los seguros a todo custo – embora saibamos que não será uma tarefa fácil.\n\nNão consigo enfatizar o suficiente o quão perigosos esses sujeitos são, então eu não hesitaria em <EM>trazer reforços</EM> para lidar com eles. Se você e os bens saírem intactos, ofereceremos uma recompensa bem merecida de <EM4>~mission(ScripAmount) MG Scrip</EM4> ao contratante principal.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança garantida, licenciada para operar em toda a UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x17\n<EM4>Rep:</EM4> +250\n<EM4>Blueprint Reward:</EM4> 100% chance (VeryHard only)\n\n<EM4>? = only the VeryHard variant awards blueprints</EM4>
Foxwell_DefendDestructibleEntites_VH_Title_001=CONTRATO NÍVEL VERMELHO: DEFENDER ~mission(Objects) <EM4>[BP?]</EM4> <EM4>[250 Rep]</EM4>
Foxwell_DefendEntitesAndEscort_E_Desc=Precisamos de um contratante para fornecer serviços de comboio e proteção em <EM4>~mission(Location|Address)</EM4>. Um de nossos clientes de elite está sob ataque de um bando de marginais visando seus <EM4>~mission(Objects) e naves</EM4>. Você precisará manter a tripulação segura enquanto atravessam a área, além de garantir que os bens permaneçam intactos. Esses bandidos parecem que podem causar danos reais, então certifique-se de enfrentá-los com cautela ou o cliente pode não ser o único a sofrer perdas pesadas.\n\nSe você conseguir realizar isso nos padrões da Foxwell, ofereceremos <EM4>~mission(ScripAmount) MG Scrip</EM4> como compensação ao contratante principal.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança garantida, licenciada para operar em toda a UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Nyx]</EM4>\n- [CIV-S0-A] Tepilo\n- [CIV-S0-C] Fridan\n- [CIV-S0-C] Frost-Star SL\n- [CIV-S1-A] Gelid\n- [CIV-S1-C] ArcticStorm\n- [CIV-S1-C] Berian\n- [CIV-S1-C] Frost-Star\n- [CIV-S2-A] Aufeis\n- [CIV-S2-C] ColdSnap\n- [CIV-S2-C] Frost-Star EX\n- [CIV-S2-C] Graupel\n- [CIV-S3-A] Kragen\n- [CIV-S3-B] Elsen\n- [CIV-S3-C] Draug\n- [CIV-S3-C] Frost-Star XL\n- [CIV-S3-C] FrostBurn\n\n<EM4>[Pyro]</EM4>\n- [CIV-S0-B] IonWave\n- [CIV-S0-C] Radix\n- [CIV-S1-B] IonBurst\n- [CIV-S1-B] MagnaBloom\n- [CIV-S1-C] LightBlossom\n- [CIV-S1-C] PowerBolt\n- [CIV-S2-B] IonSurge\n- [CIV-S2-B] Radiance\n- [CIV-S2-C] FullForce\n- [CIV-S3-B] Celestial\n- [CIV-S3-B] IonSurge Pro\n- [CIV-S3-C] FullForce Pro\n- [CIV-S3-C] NewDawn\n\n<EM4>[Stanton]</EM4>\n- [CIV-S1-A] 7SA 'Concord'\n- [CIV-S1-D] INK\n- [CIV-S2-A] 7MA 'Lorica'\n- [CIV-S2-D] RPEL\n- [CIV-S3-A] 7CA 'Nar