bhg_bounty_desc_ASD_Engineering_001=--------------------------------------------------------\n----------------- CONTRATO DE RECOMPENSA -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName) \nSISTEMA: Stanton\nAVALIAÇÃO DE RISCO: Médio\nÚLTIMA LOCALIZAÇÃO CONHECIDA:  ~mission(Location|Address)\nAFILIAÇÕES CONHECIDAS: <Nenhuma>\nOBSERVAÇÕES: Rastreamos este alvo até a <EM4>ala de Engenharia</EM4> de uma instalação de pesquisa abandonada da Associated Science and Development. Apesar de desativada, diversos saqueadores e outros indivíduos suspeitos são conhecidos por frequentar a área.\n\nA própria instalação também pode representar risco, pois a natureza da pesquisa conduzida ali é desconhecida. Fique atento a possíveis perigos ambientais enquanto persegue o alvo.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca da Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Mercenary Guild e autorizado a operar tanto na UEE quanto além, de acordo com os Atos da Xenotrade Authority.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Palatino Arms Sunstone\n- [S1-A] Palatino Core Sunstone\n- [S1-A] Palatino Helmet Sunstone\n- [S1-A] Palatino Legs Sunstone\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Captain x1\n<EM4>Rep:</EM4> +50\n<EM4>Blueprint Reward:</EM4> Guaranteed
bhg_bounty_desc_ASD_Research_001=--------------------------------------------------------\n----------------- CONTRATO DE RECOMPENSA -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName) \nSISTEMA: Stanton\nAVALIAÇÃO DE RISCO: Médio\nÚLTIMA LOCALIZAÇÃO CONHECIDA:  ~mission(Location|Address)\nAFILIAÇÕES CONHECIDAS: <Nenhuma>\nOBSERVAÇÕES: Rastreamos este alvo até a <EM4>ala de Pesquisa</EM4> de uma instalação abandonada da Associated Science and Development. Apesar de desativada, diversos saqueadores e outros indivíduos suspeitos são conhecidos por frequentar a área.\n\nA própria instalação também pode representar risco, pois a natureza da pesquisa conduzida ali é desconhecida. Fique atento a possíveis perigos ambientais enquanto persegue o alvo.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca da Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Mercenary Guild e autorizado a operar tanto na UEE quanto além, de acordo com os Atos da Xenotrade Authority.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Palatino Arms Daystar\n- [S1-A] Palatino Arms Metropolis\n- [S1-A] Palatino Core Daystar\n- [S1-A] Palatino Core Metropolis\n- [S1-A] Palatino Helmet Daystar\n- [S1-A] Palatino Helmet Metropolis\n- [S1-A] Palatino Legs Daystar\n- [S1-A] Palatino Legs Metropolis\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Captain x5\n<EM4>Rep:</EM4> +50\n<EM4>Blueprint Reward:</EM4> Guaranteed
bhg_bounty_desc_FPS_intro=--------------------------------------------------------\n----------------- CONTRATO DE RECOMPENSA -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName) \nSISTEMA: Stanton\nAVALIAÇÃO DE RISCO: Médio\nÚLTIMA LOCALIZAÇÃO CONHECIDA:  ~mission(Location|Address)\nAFILIAÇÕES CONHECIDAS: <Nenhuma>\nOBSERVAÇÕES: Esta recompensa preliminar é oferecida como uma avaliação formal de suas habilidades. A conclusão bem-sucedida deste contrato levará a novos trabalhos de recompensa.\n\nAcredita-se que o alvo estará a pé e bem armado, portanto esteja preparado para um tiroteio. Além disso, podem existir outras forças hostis no local; embora não sejam o foco principal, pode ser necessário enfrentá-las durante a perseguição do alvo.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca da Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Mercenary Guild e autorizado a operar tanto na UEE quanto além, de acordo com os Atos da Xenotrade Authority.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Unknown:</EM4> 1\n<EM4>Rep:</EM4> +50
bhg_bounty_desc_HeadHunters_001=--------------------------------------------------------\n----------------- CONTRATO DE RECOMPENSA -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName) \nSISTEMA: ~mission(System)\nAVALIAÇÃO DE RISCO: ~mission(Danger)\nÚLTIMA LOCALIZAÇÃO CONHECIDA:  ~mission(Location|Address)\nAFILIAÇÕES CONHECIDAS: HeadHunters\nOBSERVAÇÕES: Os Headhunters são uma organização criminosa de reputação, com histórico de confrontos com a lei. É provável que haja outros membros da gangue presentes, portanto exerça cautela ao engajar.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca da Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Mercenary Guild e autorizado a operar tanto na UEE quanto além, de acordo com os Atos da Xenotrade Authority.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Defenders x12, Targets x2\n<EM4>Probationary Guild Member:</EM4> +2,000 Rep (Failure: -1,000)\n<EM4>Probationary Guild Member:</EM4> +8,000 Rep (Failure: -4,000)
bhg_bounty_desc_Rockcracker_Power_001=--------------------------------------------------------\n----------------- CONTRATO DE RECOMPENSA -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName) \nSISTEMA: Nyx\nAVALIAÇÃO DE RISCO: Médio\nÚLTIMA LOCALIZAÇÃO CONHECIDA: ~mission(Location|Address)\nAFILIAÇÕES CONHECIDAS: Claw Salamanders\nNOTAS: Estas antigas e abandonadas Estações QV Breaker devem ser abordadas com cautela. Elas não apenas estão em um estado de deterioração significativa, mas são frequentemente habitadas por fauna perigosa e foras da lei, como os membros da gangue associada do alvo.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca de Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Guilda de Mercenários e autorizada a operar tanto na UEE quanto além, de acordo com as Leis da Autoridade de Xenotrade.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Juggernauts x1\n<EM4>Probationary Guild Member:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
