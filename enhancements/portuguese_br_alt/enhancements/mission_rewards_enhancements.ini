Foxwell_DefendEntitesAndEscort_S_Desc=Um SOS de emergência acaba de chegar de uma equipe de manutenção a serviço de um dos clientes VIP da Foxwell. Se disponível, pedimos que você vá para <EM4>~mission(Location|Address)</EM4> o mais rápido possível. Ao enfrentar os atacantes, espera-se que você proteja os <EM4>~mission(Objects) do cliente e qualquer uma de suas naves que possa precisar de assistência</EM4>.\n\nEsta está longe de ser a primeira vez que vemos esses marginais em particular, então acredite em mim quando digo que esses pilotos não devem ser subestimados. Recomendo fortemente que você organize uma <EM>força de apoio altamente competente</EM> para voar com você até o local.\n\nSe você conseguir defender com sucesso os interesses do cliente, ofereceremos <EM4>~mission(ScripAmount) MG Scrip</EM4> como compensação ao contratante principal corajoso o suficiente para aceitar este trabalho.\n\nFique seguro e boa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança garantida, licenciada para operar em toda a UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Nyx]</EM4>\n- [CIV-S0-A] Tepilo\n- [CIV-S0-C] Fridan\n- [CIV-S0-C] Frost-Star SL\n- [CIV-S1-A] Gelid\n- [CIV-S1-C] ArcticStorm\n- [CIV-S1-C] Berian\n- [CIV-S1-C] Frost-Star\n- [CIV-S2-A] Aufeis\n- [CIV-S2-C] ColdSnap\n- [CIV-S2-C] Frost-Star EX\n- [CIV-S2-C] Graupel\n- [CIV-S3-A] Kragen\n- [CIV-S3-B] Elsen\n- [CIV-S3-C] Draug\n- [CIV-S3-C] Frost-Star XL\n- [CIV-S3-C] FrostBurn\n- [E-S1-A] CF-117 Bulldog Repeater\n- [E-S2-A] CF-227 Badger Repeater\n- [E-S3-A] CF-337 Panther Repeater\n- [E-S4-A] CF-447 Rhino Repeater\n- [E-S5-A] CF-557 Galdereen Repeater\n- [E-S6-A] CF-667 Mammoth Repeater\n- [MIL-S0-A] V60-26\n\n<EM4>[Pyro]</EM4>\n- [C