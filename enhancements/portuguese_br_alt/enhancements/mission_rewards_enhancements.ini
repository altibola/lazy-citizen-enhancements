Covalex_courier_todc_small_desc_001=Olá!\n\nRecebi uma solicitação para transferir alguns pacotes para ~mission(Dropoff1) em ~mission(Dropoff1|Address). Bastante simples, como essas coisas são.\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n     - Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> de <EM4>~mission(Pickup1|Address)</EM4>\n     - Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> de <EM4>~mission(Pickup2|Address)</EM4>\n     - Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> de <EM4>~mission(Pickup3|Address)</EM4>\n     - Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> de <EM4>~mission(Pickup4|Address)</EM4>\n     - Pacote <EM4>#~mission(Item5|SerialNumber)</EM4> de <EM4>~mission(Pickup5|Address)</EM4>\n\nLOCAL DE ENTREGA\n - Todos os pacotes entregues para <EM4>~mission(Dropoff1)</EM4> em <EM4>~mission(Dropoff1|Address)</EM4>\n\nAgradeço por você ter dedicado seu tempo para resolver isso para mim, \n\nChase Hewitt\nJr. Coordenador de Logística\nCovalex Shipping \n'Tudo o que você precisar, em qualquer lugar que precisar.'\n\n\n\n\n\nA Covalex Shipping é uma empresa de responsabilidade limitada. Ao aceitar este contrato, você está concordando com todos os termos e condições descritos em nosso 'Independent Workers Supplemental Information Guide v.2948.01.29' estendido. A Covalex Shipping não é responsável por quaisquer danos que ocorram enquanto estiver operando como um contratado independente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Covalex_internaldelivery_dc_desc_001=Olá!\n\nEstou precisando de um par extra de mãos em <EM4>~mission(Location|Address)</EM4> para ajudar a mover alguns itens entre alguns dos locais de armazenamento dentro da instalação. Quando os locais ficam tão grandes, eles precisam de toda a ajuda logística que puderem obter!  \n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n - Pacote <EM4>#~mission(Item1|SerialNumber) de <EM4>~mission(Pickup1)</EM4>\n     - Pacote <EM4>#~mission(Item2|SerialNumber) de <EM4>~mission(Pickup2)</EM4>\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n     - Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1)</EM4>\n     - Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para <EM4>~mission(Dropoff2)</EM4>\n\nBoa sorte! \n\nChase Hewitt\nCoordenador de Logística Júnior\nCovalex Shipping \n'Tudo o que você precisar, em qualquer lugar que precisar.'\n\n\n\n\n\nA Covalex Shipping é uma empresa de responsabilidade limitada. Ao aceitar este contrato, você está concordando com todos os termos e condições descritos em nosso 'Independent Workers Supplemental Information Guide v.2948.01.29' estendido. A Covalex Shipping não é responsável por quaisquer danos que ocorram enquanto estiver operando como um contratado independente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Covalex_internaldelivery_dc_desc_003=Olá, \n\nRecebi uma solicitação de <EM4>~mission(Location|Address)</EM4> para ajudar a realocar internamente alguns pacotes de onde eles estão sendo armazenados atualmente. Achei que você poderia estar disposto a fazer isso.\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n     - Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> de <EM4>~mission(Pickup1)</EM4>\n     - Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> de <EM4>~mission(Pickup2)</EM4>\n     - Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> de <EM4>~mission(Pickup3)</EM4>\n     - Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> de <EM4>~mission(Pickup4)</EM4>\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n     - Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1)</EM4>\n     - Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para <EM4>~mission(Dropoff2)</EM4>\n     - Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para <EM4>~mission(Dropoff3)</EM4>\n     - Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> para <EM4>~mission(Dropoff4)</EM4>\n\nTenha um bom dia!\n\nChase Hewitt\nJr. Coordenador de Logística\nCovalex Shipping \n'Tudo o que você precisar, em qualquer lugar que você precisar.'\n\n\n\n\n\n\nA Covalex Shipping é uma empresa de responsabilidade limitada. Ao aceitar este contrato, você está concordando com todos os termos e condições descritos em nosso 'Independent Workers Supplemental Information Guide v.2948.01.29' estendido. A Covalex Shipping não é responsável por quaisquer danos que ocorram enquanto estiver operando como um contratado independente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
Covalex_internaldelivery_dc_desc_005=Olá,\n\nHá uma pilha de pacotes em <EM4>~mission(Location|Address)</EM4> que precisam ser transportados pela instalação para o local de armazenamento apropriado. Significaria muito se você pudesse cuidar pessoalmente para que tudo seja resolvido.\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> do(a) <EM4>~mission(Pickup1)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> do(a) <EM4>~mission(Pickup2)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> do(a) <EM4>~mission(Pickup3)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> do(a) <EM4>~mission(Pickup4)</EM4>\n     · Pacote <EM4>#~mission(Item5|SerialNumber)</EM4> do(a) <EM4>~mission(Pickup5)</EM4>\n     · Pacote <EM4>#~mission(Item6|SerialNumber)</EM4> do(a) <EM4>~mission(Pickup6)</EM4>\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para o(a) <EM4>~mission(Dropoff1)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para o(a) <EM4>~mission(Dropoff2)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para o(a) <EM4>~mission(Dropoff3)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> para o(a) <EM4>~mission(Dropoff4)</EM4>\n     · Pacote <EM4>#~mission(Item5|SerialNumber)</EM4> para o(a) <EM4>~mission(Dropoff5)</EM4>\n     · Pacote <EM4>#~mission(Item6|SerialNumber)</EM4> para o(a) <EM4>~mission(Dropoff6)</EM4>\n\n\nRealmente agradeço tudo o que você faz,\n\nChase Hewitt\nCoordenador de Logística Jr.\nCovalex Shipping  \n'Tudo o que você precisar, onde você precisar.'\n\n\n\n\n\n\n\nCovalex Shipping é uma sociedade anônima de responsabilidade limitada. Ao aceitar este contrato, você concorda com todos os termos e condições conforme descritos em nosso 'Guia Suplementar de Informações para Trabalhadores Independentes v.2948.01.29'. A Covalex Shipping não se responsabiliza por quaisquer danos que ocorram durante a operação como um contratado independente.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000
Covalex_internaldelivery_dc_title_001=Operador de Pacote da Covalex <EM4>[500–2,000 Rep]</EM4>
Criminal_RetrieveData_Reclaimer_desc=Estou procurando um determinado pacote de dados e, logo quando consigo uma folga, a nave é atacada por uma Reclaimer convertida da Nine Tails chamada Black Kite. Tentei invadir os servidores da Black Kite para ver se eles copiaram os dados, mas não consegui encontrar uma maneira de passar remotamente pelos protocolos de criptografia sem a chave física. Preciso de alguém que invada a nave deles, obtenha a chave de descriptografia e descriptografe o servidor para que eu possa baixar remotamente o que preciso.\n\nVocê é inteligente o suficiente para saber com quem estamos lidando aqui, portanto, planeje de acordo. Como isso vai mexer com algumas penas poderosas, não vamos deixar nada ao acaso. Destrua a Black Kite quando terminar para proteger nossos dois traseiros.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Unknown:</EM4> 8
DataDownload_Mobi_Description=WIP Ouvi dizer que você é a pessoa certa para este trabalho, então vou direto ao assunto. Localizamos uma estação de falsificação de UEC num antigo local de destroços. Se você for rapidamente para a estação de falsificação, poderá fazer o download do UEC por conta própria. Há alguns guardas defendendo o local dos destroços, mas tenho certeza de que você será capaz de lidar com isso. Ah, e um aviso final. Não sou a única pessoa com essa informação, então espere uma briga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
