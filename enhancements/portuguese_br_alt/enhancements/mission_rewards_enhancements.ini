Eckhart_EscortShips_VE_desc=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Escolta de Nave\nCÓDIGO DE APROVAÇÃO: = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nUm cliente solicitou um contratado com disponibilidade imediata para fornecer suporte extra a várias naves que estão deixando uma base de asteroides localizada em <EM4>~mission(Location|Address)</EM4>). Assim que aceitar, encontre-se lá e aguarde mais instruções. Neste caso, seu trabalho é fornecer suporte para a passagem segura deles. Hostis podem estar presentes, mas não devem ser muito difíceis de lidar.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] M3A Cannon\n- [E-S2-A] M4A Cannon\n- [E-S3-A] M5A Cannon\n- [STH-S1-C] Shimmer\n- [STH-S2-C] Obscura\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2, Hostiles x1, Reinforcements x6\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
