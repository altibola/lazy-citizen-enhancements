RAIN_CollectResources_storm_desc_001=Para todos os contratados disponíveis,\n\nNós da Rayari estamos dedicando toda nossa energia para deter a crise da tecnologia de regeneração, mas para que nossos cientistas continuem seus esforços, eles precisam de recursos que os fornecedores da empresa não conseguiram entregar. \n\nHá uma grande população de kopions expostos à radiação perto de <EM4>~mission(Location)</EM4>. A Rayari está buscando um contratado para coletar <EM4>chifres de kopion irradiados</EM4> e entregá-los em <EM4>~mission(Destination|Address)</EM4>. Devido à escassez deste recurso, estamos preparados para pagar uma alta taxa pelo serviço. \n\nJuntos podemos tornar o universo melhor para todos.\n\nNarina Lerrem\nGerente Sênior\nTerceirização de Pesquisa Clínica\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Contractor:</EM4> +150 Rep
RAIN_CollectResources_storm_desc_002=Para todos os contratados disponíveis,\n\nNós da Rayari não medimos esforços para conter a crise de regeneração em andamento, mas para continuar com seus esforços, nossos cientistas precisam de um recurso raro que os fornecedores da empresa não conseguem obter. \n\nA Rayari está buscando um contratado experiente para reunir <EM4>pérolas irradiadas de valakkar</EM4>, que podem ser extraídas de valakkars adultos que foram amplamente expostos à radiação. Nossos scans localizaram uma população qualificada dentro da tempestade perto de <EM4>~mission(Location)</EM4>. Como esses animais são altamente perigosos, a Rayari está preparada para pagar generosamente a quem ajudar na coleta das pérolas. \n\nDepois de obtidas, por favor, leve esses recursos valiosos para <EM4>~mission(Destination|Address)</EM4>.\n\nJuntos podemos tornar o universo melhor para todos.\n\nNarina Lerrem\nGerente Sênior\nTerceirização de Pesquisa Clínica\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Contractor:</EM4> +150 Rep
RAIN_CollectResources_storm_desc_003=Para todos os contratados disponíveis,\n\nNós da Rayari estamos dedicando toda nossa energia para deter a crise da tecnologia de regeneração, mas para continuar seus esforços nossos cientistas precisam de materiais que os fornecedores da empresa não conseguem obter. \n\nA Rayari está buscando um contratado experiente para reunir <EM4>presas irradiadas de valakkar</EM4>, que podem ser extraídas de valakkars adultos amplamente expostos à radiação. Nossos scans revelaram a existência de uma população qualificada dentro da tempestade perto de <EM4>~mission(Location)</EM4>. \n\nComo esses animais são altamente perigosos, a Rayari está oferecendo pagamento premium a quem puder ajudar na coleta das presas.  \n\nDepois de obtidas, por favor, leve esses recursos valiosos para <EM4>~mission(Destination|Address)</EM4>.\n\nJuntos podemos tornar o universo melhor para todos.\n\nNarina Lerrem\nGerente Sênior\nTerceirização de Pesquisa Clínica\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Contractor:</EM4> +150 Rep
RAIN_CollectResources_storm_desc_004=Para todos os contratados disponíveis,\n\nNós da Rayari estamos trabalhando dia e noite para resolver a atual crise de regeneração, mas para continuar seus esforços, nossos cientistas precisam de recursos raros que os fornecedores da empresa não conseguem entregar. \n\nEstamos buscando um contratado para garantir um <EM4>ovo irradiado de valakkar</EM4>. Nossos scans confirmaram várias tempestades radioativas com presença conhecida de valakkar em Pyro I; você pode encontrar um transporte perto de <EM4>~mission(Location)</EM4> que o levará para dentro da tempestade. Mais uma coisa, a análise indica que esses ovos decaem com o tempo; o estado do ovo não deve afetar nossa pesquisa, mas quanto antes, melhor.\n\nDevido aos riscos à saúde associados à exposição à radiação, necessários para garantir uma amostra viável, a Rayari está pronta para pagar bem a quem conseguir coletar e entregar este item com segurança.\n\nDepois de obtido, por favor, leve este recurso valioso para <EM4>~mission(Destination|Address)</EM4>.\n\nJuntos podemos tornar o universo melhor para todos.\n\nNarina Lerrem\nGerente Sênior\nTerceirização de Pesquisa Clínica\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Contractor:</EM4> +150 Rep
