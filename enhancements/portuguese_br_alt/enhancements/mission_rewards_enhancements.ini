HeadHunters_RecoverCargo_Easy_Description=Conseguimos interceptar uma nave que transportava algumas mercadorias em <EM4>~mission(Location|Address)</EM4>, mas tivemos um problema – nossos rapazes não tinham espaço suficiente em suas naves para armazená-la. Quer ganhar uns créditos rápidos? Vá até lá e pegue o material. Pode haver alguns necrófagos por lá agora, então fique alerta.\n\nApenas não se esqueça de trazer um <EM4>raio trator de alta capacidade</EM4> (heavy-duty tractor beam), pois a coisa é pesada.\n\nQuando terminar, entregue-o no elevador de carga em <EM4>~mission(Destination|Address)</EM4> e nós cuidaremos do resto.\n\nStows fora.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Unknown:</EM4> 1\n<EM4>Jr. Contractor:</EM4> +100 Rep
HeadHunters_RecoverCargo_Easy_Title=Pegando o que é nosso <EM4>[100 Rep]</EM4>
HeadHunters_RecoverCargo_Hard_Description=Procuro um transportador para pegar uma carga para mim. O problema é que tem um porém.\n\nA carga está na traseira de uma nave abandonada localizada em <EM4>~mission(Location|Address)</EM4>. Como você deve ter imaginado, essa carga não é nossa, mas com certeza não merece ir para mais ninguém. Maldito seja se aqueles babacas da CFP colocarem as mãos nela antes de nós.\n\nSeria uma sorte danada se fôssemos os primeiros a saber disso, mas aposto que vai ter mais naves circulando por lá do que moscas em uma carcaça de kopion. Se você tiver alguns parceiros em quem confia, traga-os junto e apague esses idiotas. E não esqueça do seu <EM4>raio trator de alta potência</EM4>, é claro.\n\nSe você conseguir pegar essa carga e levá-la ao elevador de carga em <EM4>~mission(Destination|Address)</EM4>, posso te dar uma boa fatia da venda.\n\nStows encerrando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Unknown:</EM4> 1\n<EM4>Sr. Contractor:</EM4> +200 Rep
HeadHunters_RecoverCargo_Hard_Title=PRÊMIO ACUMULADO <EM4>[200 Rep]</EM4>
HeadHunters_RecoverCargo_Medium_Description=Um dos nossos pilotos deveria trazer um carregamento de volta para nós, mas parece que ele se meteu em problemas em <EM4>~mission(Location|Address)</EM4>. Ou ele teve os miolos estourados por todo o cockpit, ou pirou e abandonou a nave. Para o bem dele, espero que seja a primeira opção, para que eu não tenha que caçar esse idiota. O que é importante agora é que nossa carga está parada lá.\n\nSe você tem um <EM4>raio trator de alta capacidade</EM4> (heavy-duty tractor beam) e uma nave decente, pode ir até lá e pegar nosso material? É provável que os idiotas que atacaram meu piloto ainda estejam lá, e aposto que eles são bem durões.\n\nSe você sair vivo, leve a carga para o elevador de carga em ~mission(Destination|Address) e eu providenciarei seu pagamento.\n\nStows fora.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Unknown:</EM4> 1\n<EM4>Contractor:</EM4> +150 Rep
HeadHunters_RecoverCargo_Medium_Title=Terminar o trabalho <EM4>[150 Rep]</EM4>
HeadHunters_RecoverCargo_Super_Description=Esta será divertida para você. Acabamos de receber a notícia de que uma nave de transporte quebrou em <EM4>~mission(Location|Address)</EM4>. O único problema é que parece que todo mundo sabe disso. O lugar está infestado de foras da lei de todos os tipos tentando pôr as mãos na carga a bordo. É aí que você entra.\n\nSe você conseguir reunir seus melhores pilotos e um <EM4>raio trator de alta capacidade</EM4> (a heavy-duty tractor beam), você pode eliminar a concorrência e pegar a carga. Não vai ser fácil, no entanto. Um dos meus batedores disse que os idiotas que guardam esta nave têm tecnologia de ponta.\n\nEu já tenho um comprador esperando, você só precisa levar a carga para o elevador de carga em <EM4>~mission(Destination|Address)</EM4> e eu enviarei os créditos.\n\nStows fora.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Unknown:</EM4> 1\n<EM4>Head Contractor:</EM4> +300 Rep
HeadHunters_RecoverCargo_Super_Title=VALE A PENA O INCÔMODO <EM4>[300 Rep]</EM4>
HeadHunters_RecoverCargo_VeryEasy_Description=Acabei de receber a notícia de uma nave abandonada com uma grande pilha de carga madura para ser colhida. Se estiver interessado, você precisará ir para <EM4>~mission(Location|Address)</EM4>. A notícia pode ter se espalhado, então provavelmente há alguns "skags" (vagabundos) por perto, mas é só dar um jeito neles e pegar o esconderijo.\n\nTraga a carga para o elevador de carga em ~mission(Destination|Address) e eu lhe darei seus créditos.\n\nCertifique-se de ter um <EM4>raio trator de alta capacidade</EM4> (heavy-duty tractor beam) com você também, não faço ideia de quão grande ou pequena é essa carga.\n\nStows fora.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2\n<EM4>Unknown:</EM4> 1\n<EM4>Neutral:</EM4> +50 Rep
HeadHunters_RecoverCargo_VeryEasy_Title=Pegar e Levar <EM4>[50 Rep]</EM4>
HeadHunters_RecoverCargo_VeryHard_Description=É o seguinte, eu tenho uma situação em <EM4>~mission(Location|Address)</EM4> e preciso de alguém com cérebro para resolver isso para mim. Um ex-piloto meu pensou que poderia fechar um acordo com outra gangue e, sem surpresa, não deu certo para ele. Agora minha carga está parada e sendo guardada por um monte de idiotas esperando que o transportador deles venha buscá-la.\n\nPreciso que você vá lá com um <EM4>raio trator de alta capacidade</EM4> (heavy-duty tractor beam) e uma equipe forte para recuperar minha mercadoria antes que ela se vá para sempre.\n\nLeve tudo para o elevador de carga em <EM4>~mission(Destination|Address)</EM4> e eu lhe darei uma fatia generosa dos lucros.\n\nStows fora.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Unknown:</EM4> 1\n<EM4>Veteran Contractor:</EM4> +200 Rep
HeadHunters_RecoverCargo_VeryHard_Title=Recebendo o que Merecemos <EM4>[200 Rep]</EM4>
HeadHunters_ShipAmbush_E_desc_001=Tem interesse em eliminar um <EM4>~mission(AmbushTarget)</EM4> para nós? \n\nNão deve ser muito difícil. Já fizemos o trabalho de campo e descobrimos que eles estão programados para passar por <EM4>~mission(Location|Address)</EM4> em breve. Basta ficar fora do radar na nuvem de emissão próxima e você terá uma boa vantagem sobre eles.\n\nEles podem passar sozinhos ou com alguns amigos. Todos seriam naves de assento único, mas eles sabem se defender bem em um combate. Vamos colocar algumas forças na região para fornecer apoio assim que a diversão começar.\n\nSe você conseguir isso, eu vou dar <EM4>~mission(ScripAmount) Scrip do Concil</EM4> ao contratado principal pelo trabalho bem feito.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x2, Hostile Wave x7, Targets x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +1,000 Rep
HeadHunters_ShipAmbush_E_title_001=Ataque Silencioso <EM4>[100–1,000 Rep]</EM4>
HeadHunters_ShipAmbush_H_desc_001=Uma esquadrão de naves recentemente atacou um dos nossos comboios, e dez créditos dizem que eles vão tentar fazer isso de novo. Estamos procurando alguém para lançar um ataque de represália antes que isso aconteça.\n\nIdentificamos os idiotas como consistindo em várias naves grandes e uma escolta considerável. Acreditamos que o líder está pilotando um <EM4>~mission(AmbushTarget)</EM4> e definimos essa nave como o alvo principal. Como é um esquadrão grande e agressivo, um ataque surpresa parece uma boa estratégia. Eles costumam passar por <EM4>~mission(Location|Address)</EM4>, que possui uma nuvem de emissão para se esconder. Seja inteligente e paciente, e ataque quando o momento for certo.\n\nA menos que você se considere um verdadeiro ás, provavelmente é melhor trazer alguns amigos. Talvez você consiga atrair pessoas deixando-as saber que podem vasculhar os destroços em busca de objetos valiosos depois que o serviço estiver feito.\n\nE além disso, vou dar ao contratado principal um bônus de <EM4>~mission(ScripAmount) Scrip do Concil</EM4> para adoçar o negócio.\n\nStows desligando.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x13, Targets x5\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
HeadHunters_ShipAmbush_H_title_001=ATAQUE DE REPRESÁLIA <EM4>[200–2,000 Rep]</EM4>
HeadHunters_ShipAmbush_Intro_desc_001=Temos uma oportunidade para alguém ansioso para mostrar suas habilidades de pilotagem. Os Headhunters têm entrado em conflito com este idiota que pilota um <EM4>~mission(AmbushTarget)</EM4> e vamos acabar com isso de uma vez por todas.\n\nVocê vai nos ajudar a armar uma armadilha para eles. Veja bem, há uma <EM4>nuvem de emissão</EM4> perto de <EM4>~mission(Location|Address)</EM4> pela qual eles voam frequentemente.\n\nVá para lá, esconda-se dentro da nuvem desligando sua nave e ataque o idiota assim que o vir, juntamente com quaisquer outras naves de um único assento burras o suficiente para voar com ele. Você fará o primeiro ataque sozinho, mas colocaremos algumas naves de suporte por perto para ajudar a terminar o trabalho.\n\nE em honra de ser o seu primeiro ataque surpresa para nós, há um bônus de <EM4>~mission(ScripAmount) Council Scrip</EM4> para o contratado principal no final do trabalho.\n\nStows fora.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x6, Targets x2\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +500 Rep
HeadHunters_ShipAmbush_Intro_title_001=Preparando Uma Armadilha <EM4>[100–500 Rep]</EM4>
HeadHunters_ShipAmbush_M_desc_001=Um dos nossos Clips deu uma ordem de eliminação para um <EM4>~mission(AmbushTarget)</EM4>. Que tal fazê-los felizes e eliminar essa ameaça?\n\nAqui está o que você precisa saber. O alvo e sua escolta estão programados para passar por <EM4>~mission(Location|Address)</EM4>. Parece que há uma nuvem de emissão próxima que pode esconder o sinal da sua nave. Fique lá até estar pronto para atacar.\n\nO Clip só se importa em eliminar o alvo. Qualquer coisa de valor que você encontrar nos destroços é toda sua.\n\nE além disso, vou dar ao contratado principal um bônus de <EM4>~mission(ScripAmount)</EM4> Scrip do Concil para adoçar o negócio.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x6, Targets x3\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
HeadHunters_ShipAmbush_M_title_001=OPERAÇÃO DE EMBOSCADA <EM4>[150–2,000 Rep]</EM4>
HeadHunters_ShipAmbush_S_desc_001=Os Headhunters estão procurando alguém com as habilidades e a tripulação para executar uma missão de elite. Uma fragata militar e naves de escolta estão perseguindo um dos nossos Clips pelo sistema. Não sabemos as intenções deles, mas não podem ser boas. A ideia é que, enquanto eles estão concentrados no alvo, conseguimos alguém para reunir uma tripulação e atacar.\n\nJá escolhemos um local. Se você for até <EM4>~mission(Location|Address)</EM4>, há uma nuvem de emissão que é exatamente o que precisamos. Vá até lá com amigos, desligue suas naves e espere o <EM4>~mission(AmbushTarget)</EM4> e suas escoltas passarem.\n\nCom um bônus de <EM4>~mission(ScripAmount) Scrip do Concil</EM4> para o contratado principal, o pagamento por si só já deve valer a pena, mas você também pode ficar com tudo o que encontrar nos destroços.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x10, Targets x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Tier 2:</EM4> +16,000 Rep
HeadHunters_ShipAmbush_S_title_001=OPERAÇÃO DE ELITE <EM4>[300–16,000 Rep]</EM4>
HeadHunters_ShipAmbush_VE_desc_001=Algum imbecil pilotando um <EM4>~mission(AmbushTarget)</EM4> foi pego espionando nossas operações. Nós os mandamos embora com um aviso, mas logo os vimos fazendo a mesma coisa em outro lugar. Como não entenderam a mensagem, parece que precisamos mandar uma mensagem mais forte.\n\nHá uma nuvem de emissão perto de <EM4>~mission(Location|Address)</EM4> pela qual eles passam com frequência. Um ótimo lugar para desligar, se esconder e lançar um ataque surpresa. Às vezes eles voam sozinhos, às vezes estão com outras naves de um único piloto. Vai ser tudo com você no primeiro golpe, mas colocaremos algumas naves de apoio por perto para ajudar a finalizar o trabalho.\n\nE se você precisar de uma motivação extra, há um bônus de <EM4>~mission(ScripAmount) Scrip do Concil</EM4> para o contratado principal ao final da missão.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x6, Targets x2\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +500 Rep
HeadHunters_ShipAmbush_VE_title_001=Festa Surpresa <EM4>[100–500 Rep]</EM4>
HeadHunters_ShipAmbush_VH_desc_001=Algumas pessoas não parecem satisfeitas conosco. Recebemos informações de que várias naves sub-capitais e uma quantidade de escoltas estão mirando nossas operações. Achamos que a melhor maneira de evitar problemas é atacá-los antes que eles nos atinjam.\n\nTemos um <EM4>~mission(AmbushTarget)</EM4> na mira, que faz parte desse esquadrão, e parece que eles costumam passar por <EM4>~mission(Location|Address)</EM4>, um local perfeito para um ataque surpresa. Uma nuvem de emissão próxima pode esconder você e qualquer pessoa que você levar para reforçar.\n\nNão vou adoçar a situação. Isso não vai ser fácil. Mas a recompensa deve valer a pena. Finalize o trabalho e o contratado principal recebe um bônus de <EM4>~mission(ScripAmount) Scrip do Concil</EM4>.\n\nAlém disso, quem sabe o que você pode encontrar flutuando entre os destroços.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 5/7 | Risk 7/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x12, Targets x4\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Tier 2:</EM4> +8,000 Rep
HeadHunters_ShipAmbush_VH_title_001=ATAQUE TÁTICO <EM4>[250–8,000 Rep]</EM4>
Headhunters_DefendDestructibleEntites_E_Desc_001=Alguns idiotas com uma noção seriamente inflada de seu lugar no 'verso tomaram a maldita decisão tola de atacar os <EM>~mission(Objects)</EM4> em <EM4>~mission(Location|Address)</EM4>. Temos algumas coisas em jogo por lá, então não podemos deixar que saiam impunes.\n\nSe estiver interessado em ajudar, chegue lá e lide com esses sujeitos antes que causem muito dano. Não acho que você vá suar muito para dar um jeito neles.\n\nAlém disso, vou adoçar a oferta dando ao contratante principal <EM4>~mission(ScripAmount) Council Scrip</EM4> apenas para mostrar minha gratidão.\n\nStows encerrando.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x10\n<EM4>Rep:</EM4> +100
Headhunters_DefendDestructibleEntites_E_Title_001=Proteger ~mission(Objects) Contra Invasores <EM4>[100 Rep]</EM4>
Headhunters_DefendDestructibleEntites_H_Desc_001=Recebi notícias de alguns aliados nossos lá em <EM4>~mission(Location|Address)</EM4> de que estão sendo atacados. Uma gangue com a qual já tivemos problemas antes está tentando assumir o controle, começando por destruir seus <EM4>~mission(Objects)</EM4>.\n\nEssa equipe é desprezível de ponta a ponta, mas eles não estão para brincadeira e sabem se virar em uma luta. Vai dar um pouco de trabalho garantir que não explodam tudo. Você pode até considerar <EM>trazer alguma ajuda</EM> junto.\n\nLide com isso direito e darei ao contratante principal <EM4>~mission(ScripAmount) Council Scrip</EM4>.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x17\n<EM4>Rep:</EM4> +200
Headhunters_DefendDestructibleEntites_H_Title_001=Impedir Gangue de Destruir ~mission(Objects) <EM4>[200 Rep]</EM4>
Headhunters_DefendDestructibleEntites_M_Desc_001=Nossos amigos em <EM4>~mission(Location|Address)</EM4> foram comprometidos. Uma gangue nova na área os está ameaçando, visando seus <EM4>~mission(Objects)</EM4>.\n\nSe eles forem destruídos, será seriamente ruim para os negócios, então quero você lá imediatamente em serviço de proteção.\n\nSe precisar de motivação extra, estou adicionando <EM4>~mission(ScripAmount) Council Scrip</EM4> para o contratante principal.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x15\n<EM4>Tier 1:</EM4> +150 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
Headhunters_DefendDestructibleEntites_M_Title_001=Segurar ~mission(Objects) Contra Rivais <EM4>[150–2,000 Rep]</EM4>
Headhunters_DefendDestructibleEntites_S_Desc_001=Nossos parceiros em <EM4>~mission(Location|Address)</EM4> precisam de ajuda. Uma equipe fora da lei rival está infestando a área e atacando os <EM4>~mission(Objects)</EM4> de lá. Isso já seria ruim o suficiente, mas este local é absolutamente crítico para nossos planos futuros na região e é importante pra caramba que ele permaneça em ordem.\n\nCom a escala deste ataque e a habilidade desses pilotos, não há dúvida de que um <EM>apoio confiável</EM> lhe seria útil. Reúna sua tripulação, voe até o local e pare esses lambe-botas antes que causem qualquer dano duradouro.\n\nPara provar o quão sérios estamos em fazer isso direito, o contratante principal ganhará <EM4>~mission(ScripAmount) Council Scrip</EM4> por garantir que absolutamente nada dê errado.\n\n- Stow\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 7/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x22\n<EM4>Rep:</EM4> +300
Headhunters_DefendDestructibleEntites_S_Title_001=Guardar ~mission(Objects) a Todo Custo <EM4>[300 Rep]</EM4>
Headhunters_DefendDestructibleEntites_VE_Desc_001=Você não precisa de todos os detalhes, mas os Headhunters têm interesse no que acontece lá em <EM4>~mission(Location|Address)</EM4> e acabei de saber que eles estão sendo atormentados por alguns novatos agressivos.\n\nOs idiotas estão tentando paralisar o local destruindo seus <EM>~mission(Objects)</EM4>. Eu não vou aceitar isso.\n\nChegue lá e forneça proteção antes que tudo seja destruído. Esses otários são pesos-leves, então não deve ser um problema muito grande para você lidar.\n\nLimpe todos eles e eu lançarei <EM4>~mission(ScripAmount) Council Scrip</EM4> para quem aceitar este trabalho como bônus.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Rep:</EM4> +100
Headhunters_DefendDestructibleEntites_VE_Title_001=Manter ~mission(Objects) Seguros Contra Novatos <EM4>[100 Rep]</EM4>
Headhunters_DefendDestructibleEntites_VH_Desc_001=Um bando de mercenários foi enviado para mexer com nossos interesses lá em <EM4>~mission(Location|Address)</EM4>. Parece que alguém recebeu a dica de que, se os <EM>~mission(Objects)</EM4> de lá forem destruídos, isso interromperá severamente as operações dos Headhunters na área. Esse é um problema que eu quero que você resolva.\n\nNão vou mentir, esses mercenários não são brincadeira. Seria tolice ir sozinho. É por isso que você precisará estar totalmente abastecido e encontrar <EM>alguns amigos de confiança</EM> para voarem na sua ala.\n\nEsta operação precisa ocorrer sem imprevistos, então estou oferecendo ao contratante principal <EM4>~mission(ScripAmount) Council Scrip</EM4> por um trabalho bem feito.\n\nStows encerrando.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x17\n<EM4>Rep:</EM4> +250
Headhunters_DefendDestructibleEntites_VH_Title_001=DEFENDER ~mission(Objects) CONTRA MERCENÁRIOS <EM4>[250 Rep]</EM4>
Headhunters_DefendLocation_E_Desc_001=Alguns idiotas com desejo de morrer estão atacando nossas naves em torno de <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4>. Não podemos deixar que saiam impunes. Quer fazer as honras?\n\nSe sim, vá até lá e ataque-os. A tripulação está rastreando os movimentos dos atacantes e eu passarei atualizações conforme surgirem.\n\nTambém vou aumentar a recompensa dando ao contratado principal um bônus de <EM4>~mission(ScripAmount) Créditos do Conselho</EM4> só para mostrar minha gratidão.\n\nStows desligando.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4, Hostiles x2, Reinforcements x8\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +1,000 Rep
Headhunters_DefendLocation_E_Title_001=Proteja Nosso Posto <EM4>[100–1,000 Rep]</EM4>
Headhunters_DefendLocation_H_Desc_001=Recebemos informações que naves dos Headhunters a caminho de <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> estão sendo atacados. Escaneamentos revelaram forças inimigas na região querendo atacar nossas operações.\n\nSão muitos inimigos para uma só pessoa lidar. Se puder, reúna seu equipamento e alguns amigos, vamos precisar de você lá.\n\nOs locais e alvos dos ataques podem mudar. Não se preocupe com os detalhes agora, só vá até lá que eu te direi onde é necessário.\n\nSe fizer isso direito, darei ao contratado principal um bônus de <EM4>~mission(ScripAmount) Créditos do Conselho</EM4>.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x5, Hostiles x3, Interdiction Ships x2, Reinforcements x16\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
Headhunters_DefendLocation_H_Title_001=Ajude os Headhunters em ~mission(DefendLocationWrapperLocation) <EM4>[200–2,000 Rep]</EM4>
Headhunters_DefendLocation_M_Desc_001=Nosso espaço aéreo ao redor de <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> foi comprometido. Naves inimigas ameaçam a base e nossas naves na área. Temos que acabar com isso agora, então prepare-se e vá até lá.\n\nSe precisar de motivação extra, estou adicionando um bônus de <EM4>~mission(ScripAmount) Créditos do Conselho</EM4> para o contratado principal.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4, Hostiles x2, Interdiction Ships x1, Reinforcements x14\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
Headhunters_DefendLocation_M_Title_001=GARANTA NOSSO ESPAÇO AÉREO <EM4>[150–2,000 Rep]</EM4>
Headhunters_DefendLocation_S_Desc_001=Nossa equipe em <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> precisa de ajuda. Naves inimigas estão atacando tudo na área. Isso já é ruim, mas este local possui equipamentos e pessoal cruciais que não podem ser destruídos ou comprometidos.\n\nDada a gravidade do ataque, você vai precisar de uma nave totalmente equipada e companheiros confiáveis. Reúna sua equipe, voe para o local, e eu enviarei as instruções de onde você é mais necessário.\n\nPara mostrar que levamos isso a sério, o contratado principal ganhará um bônus de <EM4>~mission(ScripAmount) Créditos do Conselho</EM4> caso nada dê errado.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x10, Hostiles x3, Interdiction Ships x6, Reinforcements x20\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Tier 2:</EM4> +16,000 Rep
Headhunters_DefendLocation_S_Title_001=Restaurar a Ordem em ~mission(DefendLocationWrapperLocation) <EM4>[300–16,000 Rep]</EM4>
Headhunters_DefendLocation_VE_Desc_001=Headhunters que vão e vêm de <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> estão sendo perturbados por alguns invasores agressivos. Precisamos resolver isso antes que vire um problema sério.\n\nVá até lá e eu atualizarei sobre o que esses incômodos estão fazendo para que você possa caçá-los.\n\nSe limpar tudo, darei <EM4>~mission(ScripAmount) Créditos do Conselho</EM4> de bônus para quem aceitar essa missão.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2, Hostiles x1, Reinforcements x6\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +500 Rep
Headhunters_DefendLocation_VE_Title_001=ELIMINE A INCÔMODA PRESENÇA <EM4>[100–500 Rep]</EM4>
Headhunters_DefendLocation_VH_Desc_001=Procuro alguém que saiba dogfight e que consiga recrutar outros para a causa dos Headhunters. Nosso centro operacional em <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4>, assim como qualquer nave que vá para lá ou volte, está sendo alvo de forças hostis. Precisamos de suporte urgente.\n\nNão vou mentir, a área está bem perigosa. Por isso, esteja totalmente equipado e reúna amigos confiáveis para voar ao seu lado. Quando sua equipe estiver pronta, vá para lá e eu avisarei se houver novos focos de combate na área.\n\nEsta operação precisa ser perfeita, então ofereço ao contratado principal um bônus de <EM4>~mission(ScripAmount) Créditos do Conselho</EM4> pelo bom trabalho.\n\nStows desligando.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x7, Hostiles x3, Interdiction Ships x4, Reinforcements x16\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Tier 2:</EM4> +8,000 Rep
Headhunters_DefendLocation_VH_Title_001=Pare o Ataque em ~mission(DefendLocationWrapperLocation) <EM4>[250–8,000 Rep]</EM4>
Headhunters_Delivery_Outpost_Multi_desc_001=Temos várias caixas em <EM4>~mission(Location|Address)</EM4> que precisam ser levadas para <EM4>~mission(Destination|Address)</EM4>. Parece simples, certo? Bem, não é bem assim.\n\nO idiota que deveria transportar essas coisas machucou as costas tentando levar tudo de uma vez. Então, sabe como é, talvez traga um <EM4>raio trator portátil</EM4> e leve-os um de cada vez como uma pessoa normal. Mas, hey, não deixe eu dizer como fazer seu trabalho. Apenas faça.\n\nStows desligando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +200 Rep\n<EM4>Contractor:</EM4> +400 Rep\n<EM4>Sr. Contractor:</EM4> +800 Rep
Headhunters_Delivery_Outpost_Multi_title_001=UM POUCO DE SERVIÇO PESADO EM ~mission(Destination) <EM4>[200–800 Rep]</EM4>
Headhunters_Delivery_Outpost_desc_001=Temos uma caixa em <EM4>~mission(Location|Address)</EM4> que precisa ser levada até <EM4>~mission(Destination|Address)</EM4>. Pode fazer isso rapidinho?\n\nPode ser o trabalho mais fácil que já passei. A única ameaça real é tropeçar nos próprios pés. Também seria inteligente trazer um <EM4>raio trator portátil</EM4> junto. \n\nStows desligando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Neutral:</EM4> +50 Rep
Headhunters_Delivery_Outpost_title_001=Tarefa para ~mission(Destination) <EM4>[50 Rep]</EM4>
Headhunters_EliminateAll_OLP_H_desc_001=Surpresa, surpresa. Parece que nem todo mundo está feliz com o fato de os Headhunters estarem fazendo incursões em Stanton. Uma equipe em particular tem batido em nosso pessoal e depois voltado correndo para <EM4>~mission(Location|Address)</EM4>. \n\nQuero que você vá até lá e lhes dê um gostinho do próprio remédio. A remoção desses lambe-botas deve enviar uma mensagem bem clara sobre o que acontece se você nos atrapalhar. \n\n\nStows desligando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x10, Juggernauts x4
Headhunters_EliminateAll_OLP_H_title_001=Entregue uma Mensagem
Headhunters_EliminateAll_PAF_H_desc_001=Soube-se que estamos expandindo para Stanton e uma equipe local atacou algumas de nossas casas seguras. Conseguimos rastrear os bastardos até um antigo local de mineração de Hathor. \n\nVocê está disposto a mostrar a eles como os Headhunters lidam com as coisas? Se sim, vá até <EM4>~mission(Location|Address)</EM4> e mostre a eles que estamos falando sério. \n\n\n- Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x10, Juggernauts x4
Headhunters_EliminateAll_PAF_H_title_001=Mostre a Eles Quem Manda
Headhunters_EliminateSpecific_PAF_desc_001=Não consigo acreditar na quantidade de criminosos que estão rastejando por esse maldito sistema. Acho que teremos que abrir espaço para nós mesmos. \n\nTenho uma lista de líderes de alto nível aqui. Nada traz mais caos e desordem para as gangues existentes do que um bom ataque de decapitação. O próximo alvo é <EM4>~mission(TargetName)</EM4>, que rastreamos até <EM4>~mission(Location|Address)</EM4>. Está a fim de apagá-los?   \n\nEssas antigas instalações da plataforma Hathor são grandes e espalhadas. Duvido que haja uma maneira de fazer isso e não atrair a atenção de seus soldados de infantaria. Não vai ser fácil, mas parece divertido.\n\n- Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x10, Juggernauts x4
Headhunters_EliminateSpecific_PAF_title_001=Apague ~mission(TargetName)
Headhunters_HaulCargo_AToB_OLP_Illegal_desc_01=Precisamos de alguém para pegar uma carga para nós. Estávamos usando um velho PAF Hathor para entregas secretas, mas uma gangue local se estabeleceu lá e não conseguimos recuperar nosso material.\n\nSe estiver afim de causar um pouco de confusão, pegue a carga do elevador de carga em <EM4>~mission(Location|Address)</EM4> e entregue no elevador de carga em <EM4>~mission(Destination|Address)</EM4>. \n\nPelo que ouvi, o lugar está cheio de perigos. Não vai ser fácil recuperar nosso material, mas é por isso que estamos pagando você.\n\nSó certifique-se de ter uma nave que suporte uma carga de <EM4>~mission(MissionMaxSCUSize)</EM4> e tente não levar um tiro no processo. Também seria inteligente trazer um <EM4>raio trator portátil</EM4> junto. \n\nStows desligando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Neutral:</EM4> +1,000 Rep
Headhunters_HaulCargo_AToB_OLP_title_01=RECUPERAÇÃO DE CARGA <EM4>[1,000 Rep]</EM4>
Headhunters_HaulCargo_AToB_PAF_Illegal_desc_01=Não vou entediá-lo com detalhes, tudo o que precisa saber é: um dos nossos transportadores foi atacado e agora nossas mercadorias estão num elevador de carga em <EM4>~mission(Location|Address)</EM4>. \n\nFica a seu critério como retirar a carga, mas se acabar eliminando alguns dos nossos rivais no processo, não vou reclamar. Quando tiver o material, leve-o ao elevador de carga em <EM4>~mission(Destination|Address)</EM4> e depois acertamos seu pagamento.\n\nTambém seria inteligente trazer um <EM4>raio trator portátil</EM4> junto. \n\nStows desligando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Neutral:</EM4> +1,000 Rep
Headhunters_HaulCargo_AToB_PAF_title_01=INVENTÁRIO DE CARGA <EM4>[1,000 Rep]</EM4>
Headhunters_HaulCargo_MultiToSingle_desc_01=Estávamos usando os antigos PAF <EM4>~mission(Location1|Address)</EM4> e <EM4>~mission(Location2|Address)</EM4> como depósitos, mas parece que alguns malucos espertos descobriram esses locais e estão tentando roubar nossa carga para si.\n\nFelizmente, as mercadorias ainda estão lá — por enquanto. Precisamos que alguém vá até o PAF e OLP, pegue nosso material dos elevadores de carga e leve até o elevador de carga em <EM4>~mission(Destination|Address)</EM4>, onde poderemos guardá-lo em segurança.\n\nSegue a lista do que precisa ser recolhido. Não importa a ordem. Certifique-se de levar uma nave que possa armazenar pelo menos <EM4>~mission(MissionMaxSCUSize)</EM4>.\n\n~mission(MultiToSingleToken)\n\nPrepare-se para lidar com qualquer problema que encontrar pelo caminho. Também seria inteligente trazer um <EM4>raio trator portátil</EM4> junto. \n\nStows desligando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Neutral:</EM4> +1,000 Rep
Headhunters_HaulCargo_MultiToSingle_title_01=Pegando Nossas Coisas de Volta <EM4>[1,000 Rep]</EM4>
Headhunters_SabotageRelays_CFP_001_Desc=A CFP acha que está segura em <EM4>~mission(Location|Address)</EM4>, mas temos grandes planos para eles. Você vai abrir caminho para nós indo até lá e desligando suas torres de comunicação.\n\nDeve haver um <EM4>terminal de controle no topo</EM4> que você pode usar para desligar a torre. Se você fizer isso, eles não poderão chamar reforços. Então podemos mostrar a esses vagabundos a quem pertence este sistema.\n\nA maioria dos postos avançados usa o mesmo sistema, então isso será útil na próxima vez que você quiser garantir que reforços não atrapalhem.\n\n\nStows fora.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +75
Headhunters_SabotageRelays_CFP_001_Title=DESLIGAR AS COMUNICAÇÕES DA CFP <EM4>[75 Rep]</EM4>
Headhunters_SabotageRelays_XT_001_Desc=Estamos planejando atingir alguns idiotas da XenoThreat onde dói, mas precisamos ser inteligentes. Por isso, estamos enviando você primeiro para derrubar suas torres de comunicação, assim eles não poderão chamar reforços. Se você fizer isso, podemos entrar e sair antes que eles percebam.\n\nVá até <EM4>~mission(Location|Address)</EM4> e suba nas torres de comunicação. Deve haver um <EM4>painel de controle no topo</EM4> que pode ser usado para desligá-las.\n\nNa verdade, o mesmo vale para a maioria dos outros postos avançados. Em vez de lidar com reforços, você pode simplesmente desligar as torres de comunicação. Mas, se você quiser dar um susto em alguns Xenothreat, eu não vou reclamar.\n\n\nStows fora.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +100
Headhunters_SabotageRelays_XT_001_Title=Silenciar a XenoThreat <EM4>[100 Rep]</EM4>
Headhunters_SecurityPatrol_E_Desc_001=Os Headhunters têm se expandido, mas ainda precisam de ajuda para se familiarizar com nosso novo território. Eu tenho uma rota pronta para verificar pontos que queremos escanear.\n\nEsta rota começa no <EM4>marcador de localização</EM4> em seu HUD e analisará mais alguns locais depois disso, mas eu o atualizarei à medida que os liberarmos. Não estou esperando que você encontre problemas, mas não há garantias. O problema parece nos seguir.\n\nConclua isso e eu darei ao contratado principal <EM4>~mission(ScripAmount) Council Scrip</EM4> como agradecimento.\n\nStows fora.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Targets x15\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +1,000 Rep
Headhunters_SecurityPatrol_E_Title_001=Batedor e Escaneamento <EM4>[100–1,000 Rep]</EM4>
Headhunters_SecurityPatrol_H_Desc_001=Notei um aumento nos ataques a naves Headhunter e isso está me deixando nervoso. Temos um importante carregamento de reabastecimento que não podemos perder, e preciso de ajuda para determinar qual rota enviar. Eu juntei alguns pontos potenciais nos quais eu me instalaria se fosse atacá-los. Você pode visitar e limpar quaisquer marginais que possam estar escondidos lá?\n\nA rota começa no <EM4>marcador de localização</EM4> em seu HUD. Depois que você escanear e limpar o que estiver lá, eu o enviarei para algumas outras áreas que podem funcionar. Tenho ouvido dizer que as pessoas têm circulado por esses pontos, então seria inteligente <EM4>trazer um amigo</EM4> para proteger suas costas.\n\nSe você chegar ao fim, darei ao contratado principal um bônus de <EM4>~mission(ScripAmount) Council Scrip</EM4> como agradecimento.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Targets x54\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
Headhunters_SecurityPatrol_H_Title_001=Procurando Problemas <EM4>[200–2,000 Rep]</EM4>
Headhunters_SecurityPatrol_M_Desc_001=O Clip local quer informações atuais sobre vários dos nossos setores. Não sei o que eles estão procurando, mas não vou perguntar. Meu trabalho é encontrar alguém disposto a passar e escanear esses locais. Você está disponível?\n\nTudo o que você precisa fazer é ir para o <EM4>marcador de localização</EM4> em seu HUD, fazer uma varredura e, se estiver limpo, passar para o próximo ponto. Se você encontrar algum problema, resolva-o.\n\nNão parece muito difícil, parece? Além disso, darei ao contratado principal um bônus de <EM4>~mission(ScripAmount) Council Scrip</EM4> como agradecimento.\n\n\nStows fora.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Targets x23\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
Headhunters_SecurityPatrol_M_Title_001=Patrulha Espacial <EM4>[150–2,000 Rep]</EM4>
Headhunters_SecurityPatrol_S_Desc_001=Tem uns idiotas tentando nos expulsar do sistema. Você está disposto a revidar?\n\nVeja bem, há algumas pessoas que realmente não nos querem aqui e começaram a enviar grupos de caça de cinco a sete naves, muitas vezes com uma nave de combate maior, para lugares onde estamos construindo nossa presença. É hora de mostrarmos que estamos aqui para ficar.\n\nEu juntei alguns pontos, começando no <EM4>marcador de localização</EM4> em seu HUD, onde estamos vendo os encontros mais hostis. Preciso que você visite cada um e escaneie para ver se conseguimos atraí-los para uma luta.\n\nSei que este vai ser difícil, então não seja arrogante e tente ir sozinho. Se eu fosse você, traria pelo menos <EM4>três amigos</EM4> a bordo para suporte. Para fazer valer a pena, prometo um bônus de <EM4>~mission(ScripAmount) Council Scrip</EM4> para o contratado principal que conseguir realizar isso.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 7/7\n<EM4>Hostiles:</EM4> Targets x87\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Tier 2:</EM4> +16,000 Rep
Headhunters_SecurityPatrol_S_Title_001=CAÇAR ALGUMAS CABEÇAS <EM4>[300–16,000 Rep]</EM4>
Headhunters_SecurityPatrol_VE_Desc_001=Os Headhunters querem algumas informações sobre o que está acontecendo em torno do território. Já instalamos alguns satélites de monitoramento, mas nada supera uma boa e velha patrulha. Você topa?\n\nSe sim, vá para o <EM4>marcador de localização</EM4> em seu HUD. Comece escaneando essa região e depois nós o guiaremos para mais alguns pontos sobre os quais queremos informações.\n\nE se você precisar de motivação extra, há um bônus de <EM4>~mission(ScripAmount) Council Scrip</EM4> para o contratado principal no final do trabalho.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Targets x4\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +500 Rep
Headhunters_SecurityPatrol_VE_Title_001=VEJA O QUE HÁ LÁ FORA <EM4>[100–500 Rep]</EM4>
Headhunters_SecurityPatrol_VH_Desc_001=Estamos enfrentando resistência de gente que não parece feliz com a nossa presença aqui. Pessoas descobriram nossos esconderijos e começaram a enviar esquadrões para atacar nossas naves. Topa visitar alguns desses pontos para mostrar que não vamos recuar?\n\nSe sim, comece verificando o que há ao redor do <EM4>marcador de localização</EM4> no seu HUD. A partir daí, eu te guiarei para outros pontos quentes que precisamos checar. Melhor se preparar antes de sair. Recomendo carregar munição e convencer <EM4>dois amigos</EM4> a se juntarem à patrulha.\n\nVocê faz isso pelos Headhunters e eu garanto que o contratado principal receba um bônus de <EM4>~mission(ScripAmount) Créditos do Conselho</EM4>.\n\nStows desligando.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Targets x66\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Tier 2:</EM4> +8,000 Rep
Headhunters_SecurityPatrol_VH_Title_001=MANTER NOSSA POSIÇÃO <EM4>[250–8,000 Rep]</EM4>
Headhunters_bounty_desc_001=Os Headhunters recentemente emprestaram créditos a ~mission(TargetName) sob algumas condições claras. Especificamente, pague-nos de volta ou nós o mataremos. É estranho pensar que isso não foi um incentivo suficiente, mas aqui estamos nós após o prazo de pagamento. Agora, por mais que gostemos de ~mission(TargetName|First), preciso que você cumpra a nossa promessa.\n\n~mission(TargetName|Last) foi visto pela última vez em ~mission(Location|Address). Rastreie-os, elimine-os e receba o pagamento. É simples assim. \n\nStows desligando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
Headhunters_bounty_desc_002=O tempo acabou para a ~mission(TargetName). O catador está muito atrasado no pagamento dos Headhunters, então preciso que você os mate. \n\nMate-os, não bata neles, caso não tenha ficado claro. \n\nAlguém avistou recentemente  ~mission(TargetName|Last) perto de ~mission(Location|Address), então vá até lá e acabe com eles.  \n\nDivulgação completa, recebemos informações de que eles usaram algumas de nossas credenciais para contratar proteção extra. Prepare-se de acordo. \n\nStows desligando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
Headhunters_bounty_desc_003=~mission(TargetName) pegou emprestado um monte de Creds dos caçadores de cabeça e pensei que a jogada inteligente era tentar se esconder em vez de nos pagar de volta, então eu preciso de alguém para fazer um exemplo de ~mission(TargetName|Last).foram vistos em ~mission(Location|Address), então eu recomendo ir lá agora antes que a trilha fique fria.~mission(TargetName|Last) é um tipo paranóico, então não se surpreenda se não estiverem sozinhos. Lidar com isso como você quiser, desde que ~mission(TargetName|Last) seja poeira quando terminar.\n\nStows desligando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
Headhunters_bounty_title_001=Caloteiro <EM4>[50 Rep]</EM4>
Headhunters_bounty_title_002=Vencido <EM4>[100 Rep]</EM4>
Headhunters_bounty_title_003=AVISO DE COLEÇÃO <EM4>[250 Rep]</EM4>
Headhunters_bounty_xenothreat_desc_001=Os Headhunters receberam a notícia de que há uma operação XenoThreat em andamento que tem como alvo uma de nossas equipes. Não temos detalhes precisos sobre o plano, mas sabemos que ~mission(TargetName) a está organizando. Em vez de ficarmos sentados esperando que algo aconteça, decidimos ser proativos. \n\n~mission(TargetName|Last) acabou de ser visto com outros ao redor de ~mission(Location|Address). Não conseguimos mobilizar ninguém com rapidez suficiente para chegar lá. Quero que você corra para lá e faça um ataque preventivo. \n\nStows desligando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Headhunters_bounty_xenothreat_desc_002=A XenoThreat atingiu recentemente uma fortaleza dos Headhunters. Vou poupá-lo dos detalhes, mas eles fizeram algo realmente hediondo com nossa equipe. Identificamos o líder da operação como ~mission(TargetName) e estamos procurando uma pequena vingança. Não nos importa o que você fará para realizar o trabalho. Apenas que ~mission(TargetName|Last) esteja morto. \n\nUma fonte acabou de nos dizer que você pode rastrear essa escória XenoThreat em ~mission(Location|Address). Esse tarado é um profissional e nunca viaja sozinho, portanto, não ache que eliminá-lo seja um passeio no parque.  \n\nStows desligando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Headhunters_bounty_xenothreat_desc_003=Recentemente, foi revelado que ~mission(TargetName) era um espião da XenoThreat. Tudo faz sentido agora porque o catador era um grande idiota. Infelizmente, eles se separaram antes que pudéssemos resolver o problema sozinhos. \n\nCom base em tudo o que eles aprenderam sobre nossas operações, precisamos eliminá-los imediatamente. Se virem um de nós se aproximando, vão correr de novo, mas achei que alguém como você tem mais chance de chegar perto o suficiente para um tiro mortal. \n\nAcabamos de saber que a ~mission(TargetName|Last) estava rondando a ~mission(Location|Address). Parece que há outras naves por perto protegendo-os também. Você acha que tem a habilidade necessária para livrar o universo de um bastardo traidor e seus amigos bastardos?  \n\nStows desligando.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Headhunters_claimsweep_desc_easy=Algum idiota está tentando desenterrar a sujeira dos Headhunters. Algumas sentinelas orbitais foram colocadas em ~mission(location|address) para nos espionar. Também avistamos uma nave verificando-as. Uma proposta simples para você. Elimine as sentinelas de lá e nós lhe pagaremos por isso. Parece algo que você gostaria de fazer?\n\nQuanto à nave, você pode fazer o que quiser com ela, mas se ela o avistar, não se surpreenda se ela tentar chamar reforços. É assim que essas coisas acontecem.\n\nStows desligando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Hostiles:</EM4> Hostile Wave x3, Prospectors x1\n<EM4>Turrets:</EM4> 2 (hostile)
Headhunters_claimsweep_desc_hard=Alguns idiotas acham que podem espionar descaradamente os Headhunters e sair impunes. Eles montaram várias sentinelas orbitais em ~mission(location|address) e têm algumas naves patrulhando a área. Não sabemos quem está por trás disso, mas sinceramente não nos importamos. Só precisamos que ele desapareça. \n\nInforme-nos se você quiser colocar alguns bastardos realmente impetuosos em seu devido lugar. Nós lhe pagaremos bem e entregaremos os créditos assim que o trabalho for concluído. \n\nLembre-se de que, na verdade, só nos preocupamos com as sentinelas. As naves que eles têm patrulhando só são uma preocupação se ficarem em seu caminho ou se tentarem chamar alguns amigos para impedi-lo. \n \nStows desligando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250\n<EM4>Hostiles:</EM4> Hostile Wave x5, Prospectors x4\n<EM4>Turrets:</EM4> 4 (hostile)
Headhunters_claimsweep_desc_intro=Tenho um pequeno incômodo que os Headhunters precisam que seja resolvido. Há uma sentinela orbital em ~mission(location|address) que algum encrenqueiro irritante montou para espionar nossas operações. Quer ganhar alguns créditos fáceis e explodi-la para nós?\n\nStows desligando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Turrets:</EM4> 1 (hostile)
Headhunters_claimsweep_desc_medium=Os Headhunters estão procurando um mercenário para fazer um pouco de limpeza para nós. Descobriram que alguém está tentando nos espionar em ~mission(location|address). Não posso deixar isso ficar assim. Precisamos de um operador qualificado para cuidar das sentinelas orbitais que eles soltaram por lá e, se necessário, lidar com qualquer uma de suas naves que atrapalhem o seu caminho. Parece um OP decentemente executado, então acertar isso pode não ser fácil, mas com certeza deve ser divertido.\n\nDeixe-nos saber se você é a pessoa certa para o trabalho. Os creds serão transferidos assim que nossas varreduras mostrarem que se foram.\n\nStows desligando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostile Wave x4, Prospectors x2\n<EM4>Turrets:</EM4> 3 (hostile)
Headhunters_claimsweep_desc_rand=Os Headhunters descobriram recentemente algumas sentinelas orbitais focadas em nossas operações e não gostamos nem um pouco disso. Estou querendo pagar alguém para ir até ~mission(location|address) e deixar bem claro que eles devem ficar longe de nossos negócios. Duvido que eles sejam receptivos a uma discussão sobre o assunto, portanto, eu estaria preparado para expulsá-los com força extrema. \n\nCom base em nossas varreduras, isso não será um passeio no parque. Não seria uma má ideia vir preparado com bastante munição. O pagamento será enviado prontamente assim que o trabalho for concluído. \n\nStows desligando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostile Wave x32, Prospectors x5\n<EM4>Turrets:</EM4> 4 (hostile)
Headhunters_claimsweep_title_easy=Elimine a escuta <EM4>[50 Rep]</EM4>
Headhunters_claimsweep_title_hard=Exterminar Eavesdroppers <EM4>[250 Rep]</EM4>
Headhunters_claimsweep_title_intro=Apague a espionagem <EM4>[50 Rep]</EM4>
Headhunters_claimsweep_title_medium=Erradicar escutas de escutas <EM4>[100 Rep]</EM4>
Headhunters_claimsweep_title_rand=Execute escutas de escutas <EM4>[100 Rep]</EM4>
Headhunters_defend_XT_VH_desc_001=A XenoThreat está em pé de guerra no momento. Eles lançaram ataques simultâneos a vários locais dos Headhunters e sobrecarregaram nossos combatentes. Soube que eles planejam invadir ~mission(Location|Address) em seguida, e não conseguimos levar ninguém para defendê-la. \n\nEstou querendo pagar alguém para reunir uma equipe, juntar suprimentos e montar uma defesa forte para nós. Vou ser honesto com você, isso está se preparando para ser uma luta infernal. Os Xenos estão enviando algumas de suas forças mais experientes para lá. Não há muito mais que eu possa dizer, exceto que eles provavelmente vão escalonar a chegada de suas forças, eliminá-los todos e você será muito bem pago. \n\nAcha que pode estar à altura da ocasião?  \n\n-Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x2, Snipers x2, Soldiers x9, Technicians x2\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Headhunters_defend_XT_VH_title_001=BLOQUEIO A EXPANSÃO DA XENOTHREAT <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
Headhunters_eliminateall_caves_desc_01=Olá, \n\nAlguns bandidos estão escondidos em ~mission(Location|Address). Não lhes daria atenção, exceto pelo fato de que esses idiotas arrogantes tentaram atacar um posto avançado sob nossa proteção.\n\nNós os expulsamos sem grandes problemas, mas não podemos deixar esse tipo de desrespeito passar impune. Nossos Clips estão ocupados com peixes maiores, então gostaríamos que você cuidasse disso para nós. \n\nStows desligando.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x2, Soldiers x6\n<EM4>Neutral:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Headhunters_eliminateall_caves_title_01=UMA REPRESÁLIA RÁPIDA <EM4>[BP]</EM4> <EM4>[50 Rep]</EM4>
Headhunters_theft_outpost_xenothreat_desc_001=pu theft outpost pyro hh vs xt pyro6\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
HexPenetrator_Bounty_desc=Nossos analistas examinaram as informações apreendidas dessas equipes de reconhecimento da XenoThreat, mas os dados parecem estar bloqueados por um sistema de criptografia sofisticado e exigem uma criptochave personalizada para serem acessados.\n\nConseguimos localizar vários tenentes da XenoThreat operando no sistema, você deve encontrar e enfrentar os suspeitos e ver se eles possuem uma criptochave que nos permitirá acessar a informação.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
HexPenetrator_Comm_Description=Um dos suspeitos capturados durante os ataques recentes revelou que a XenoThreat está tentando acessar remotamente uma série de Matrizes de Comunicação em todo o sistema.\n\nTer a XenoThreat ouvindo as comunicações é extremamente perigoso para as pessoas que vivem aqui, então a CDF foi convocado para redefinir a Matriz de Comunicação e defendê-la de quaisquer Vanguards da XenoThreat que tentarão se reconectar aos servidores. \n\nDepois que essas Vanguards forem derrotadas, elimine todos as naves hostis restantes na área.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Hostiles:</EM4> Hostile Wave x17
HexPenetrator_DataHeist_description=Recebemos dicas de que a XenoThreat pretende lançar outro ataque ao sistema Stanton. A CDF solicitou à Advocacy a criação de uma nova iniciativa chamada Operação Overdrive para impedir este ataque antes que aconteça. \n\nA CDF está enviando voluntários para se infiltrarem e obterem qualquer informação que possa dar uma visão sobre o que eles estão planejando. Não preciso te dizer que espere forte resistência de qualquer XenoThreat no local.\n\nTenha cuidado, a XenoThreat tem provado consistentemente estar em oposição violenta à UEE e a qualquer pessoa que atue em seu nome.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Hostiles:</EM4> Hostiles x54, Technicians x2\n<EM4>Unknown:</EM4> 12
HexPenetrator_Incursion_Desc=Ondas de naves XenoThreat têm invadido o sistema Stanton e atacado civis aleatórios. Não podemos dizer se este é um ataque isolado ou uma reação às nossas iniciativas recentes, mas precisamos que elas parem.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
HexPenetrator_Kareah_Desc=Atenção todos os voluntários da CDF, recebemos um pedido de socorro do Security Post Kareah. Acontece que a XenoThreat usou as Matrizes de Comunicação como uma distração para atrair a polícia para que pudessem lançar um ataque à estação.\n\nSoubemos que eles estão tentando acessar seus sistemas, então todos os voluntários devem desviar imediatamente para retomar Kareah e eliminar todas as forças da XenoThreat.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Hostiles:</EM4> Hostile Wave x3
HexPenetrator_RecoverDeliver_description=Atenção, voluntários da CDF, a XenoThreat saiu da rede. Suspeitamos que eles tenham se escondido para se prepararem para a fase final de seu plano. \n\nA história provou que a XenoThreat gosta de lutar, então é lógico que isso pode ser algum tipo de ataque. Estamos convocando voluntários para entregar suprimentos na estação Gateway perto do ponto de salto Stanton-Pyro para ajuda-los em um possível ataque.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
HexPenetrator_RewardRecord_Desc=Obrigado por sua diligência nessa Iniciativa Overdrive. \n\nComo prometido, aprovamos sua atualização de uma F7C mk ii civil para uma F7A mk ii de nível militar, se você tiver um.\n\nAlém disso, você recebeu um aluguel temporário de uma F7A mk ii militar que pode ser acessado em seu ASOP.\n\n\n_________________\n\nPara upgrade, visite o site da RSI para aplicar o token, reinicie o jogo e acesse a nave.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
Highpoint_KillAnimal_OneType_desc=Temos monitorado uma situação em <EM4>~mission(Location)</EM4> em relação a um aumento na população de <EM4>~mission(Creature)</EM4> nos últimos meses. Nossos modelos indicam que, se isso continuar, muitas das plantas e animais nativos serão afetados negativamente. É imperativo que a população de <EM4>~mission(Creature)</EM4> seja reduzida antes que isso aconteça.     \n\nSe puder ajudar, consulte <EM4>“O Guia da Vida Selvagem de Stanton”</EM4> em seu Journal para obter mais detalhes sobre a criatura visada.\n\nCumprimentos, \n\nWanda Werkheiser\nGerente de Contratos\nHighpoint Wilderness Specialists\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7
Highpoint_KillAnimals_MultiType_H_desc=As plantas e os animais nativos próximos à <EM4>~mission(Location)</EM4> estão à beira de um colapso ambiental devido ao aumento drástico da população de várias espécies invasoras. Fomos contratados para reduzir drasticamente a população atual dessas espécies para ajudar a evitar um colapso ambiental. Precisamos de um exterminador dedicado e altamente qualificado para cumprir esse contrato.     \n\nVocê pode se familiarizar melhor com as criaturas em questão consultando <EM4>“The Guide to Stanton Wildlife”</EM4> em seu Jornal.     \n\nCumprimentos, \n\nWanda Werkheiser\nGerente de Contratos\nHighpoint Wilderness Specialists\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7
Highpoint_KillAnimals_MultiType_H_title=ESFORÇO INTENSIVO DE ERRADICAÇÃO
Highpoint_KillAnimals_MultiType_M_desc=A Highpoint Wilderness Specialists se dedica a manter o equilíbrio dos delicados ecossistemas do império. Um cliente nos contratou recentemente para avaliar o impacto ambiental de várias criaturas invasoras perto de <EM4>~mission(Location)</EM4>. Determinamos que, para preservar a ordem natural da região, é necessário um abate consciente dessas espécies.  \n\nEstamos procurando alguém capaz e disposto a ajudar nesse esforço. Consulte <EM4>“O Guia da Vida Selvagem de Stanton”</EM4> em seu Jornal para obter mais informações sobre as criaturas que estão sendo visadas.     \n\nCumprimentos,\n\nWanda Werkheiser\nGerente de Contratos\nHighpoint Wilderness Specialists\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7
Highpoint_KillAnimals_MultiType_M_title=Eliminar Criaturas Invasoras
Highpoint_KillAnimals_OneType_title=REDUZIR SUPERPOPULAÇÃO
Highpoint_KillAnimals_rockcracker_desc_E_001=Se você tiver algum trabalho que vá levá-lo a uma daquelas antigas Estações de Britagem QV no Cinturão Keeger, temos algo mais em que poderíamos usar sua ajuda enquanto estiver lá.\n \nFomos contatados recentemente pela People's Alliance para auxiliar em uma iniciativa que visa preparar essas estações abandonadas para reparos. Infelizmente, uma infestação de Valakkar está criando sérios problemas não apenas para a infraestrutura das estações, mas também para as chances de elas voltarem a operar um dia. Devido ao status do Valakkar como uma espécie invasora, decidimos que o abate é a única opção viável.\n \nReduza o número de Valakkars em qualquer uma das antigas Estações de Britagem QV e ofereceremos um pagamento.\n \nAtenciosamente,\n \nWanda Werkheiser\n\nGerente de Contratos\n\nHighpoint Wilderness Specialists\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Highpoint_KillAnimals_rockcracker_title_E_001=REDUZIR POPULAÇÃO DE VALAKKAR NA BREAKER STATION <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Highpoint_KillAnimals_storm_H_desc_001=Como consequência da tempestade de radiação em curso em Pyro I, alguns dos kopions invasores foram irradiados. Isso representa uma ameaça à saúde da fauna nativa e àqueles que vivem e trabalham em <EM4>~mission(Location)</EM4>. \n\nEstamos em busca de um contratado qualificado que possa eliminar quaisquer kopions irradiados dentro e ao redor de <EM4>~mission(Location|Address)</EM4>. Não aceite este contrato a menos que tenha as armas e o equipamento adequados para operar com segurança em um ambiente radioativo. \n\nSua compensação será ajustada de acordo com os riscos associados a este contrato.\n\nAtenciosamente,\n\nWanda Werkheiser\nGerente de Contratos\nHighpoint Wilderness Specialists\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7
Highpoint_KillAnimals_storm_H_title_001=Eliminar Kopions Irradiados
Hockcrow_SearchBody_Easy_Description_001=Hockrow Agency \nArquivo de Caso #MP51132\nInvestigador Chefe: Arken Mallor\n\nResumo do Caso: \nNecessitamos de um agente para nos ajudar a localizar o paradeiro atual de um funcionário de um cliente. Eles estavam em missão em ~mission(System), mas não se apresentaram. Nosso cliente está começando a temer o pior.\n\nAções do Investigador Contratado:\nLocalize <EM4>~mission(MissingPersonList)</EM4> em <EM4>~mission(Location|Address)</EM4> e confirme o status deles. \n\nSe estiverem mortos, examine o corpo de perto para que possamos verificar o óbito via seu mobiGlas.\n\nNotas Adicionais:\nEste contrato foi sinalizado como <EM4>combate provável</EM4>, portanto, prepare-se adequadamente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +100 Rep
Hockcrow_SearchBody_Easy_Title_001=LOCALIZAR FUNCIONÁRIO DESAPARECIDO <EM4>[100 Rep]</EM4>
Hockcrow_SearchBody_Hard_Description_001=Hockrow Agency \nArquivo de Caso #MP45648\nInvestigador Chefe: Arken Mallor\n\nResumo do Caso: \nUm cliente nos encarregou de rastrear um de seus familiares que desapareceu. Após apresentar comportamento errático, cortaram todas as comunicações e partiram para ~mission(System). Conseguimos rastrear o paradeiro geral, mas precisamos de um investigador para ir até lá pessoalmente avaliar a situação.\n\nAções do Investigador Contratado:\nLocalize <EM4>~mission(MissingPersonList)</EM4> em <EM4>~mission(Location|Address)</EM4> e confirme o status deles. \n\nSe estiverem mortos, examine o corpo de perto para que possamos verificar o óbito via seu mobiGlas.\n\nNotas Adicionais:\nHá uma alta chance de você encontrar hostis enquanto conduz sua busca. Recomendamos considerar trazer reforços para apoiá-lo.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Sr. Contractor:</EM4> +200 Rep
Hockcrow_SearchBody_Hard_Title_001=Localizar Familiar Desaparecido <EM4>[200 Rep]</EM4>
Hockcrow_SearchBody_Medium_Description_001=Hockrow Agency \nArquivo de Caso #MP74384\nInvestigador Chefe: Arken Mallor\n\nResumo do Caso: \nHavíamos enviado uma equipe de duas pessoas para ~mission(System) para investigar um caso, mas não recebemos relatórios deles por vários dias. Neste momento, somos forçados a assumir que encontraram um obstáculo imprevisto e podem precisar de resgate ou, pior, foram mortos.\n\n\nAções do Investigador Contratado:\nLocalize <EM4>~mission(MissingPersonList)</EM4> em <EM4>~mission(Location|Address)</EM4> e confirme o status deles. \n\nSe estiverem mortos, examine o corpo de perto para que possamos verificar o óbito via seu mobiGlas.\n\nNotas Adicionais:\nConsidere a natureza perigosa da investigação deles; há uma chance muito forte de haver hostis no local.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Contractor:</EM4> +150 Rep
Hockcrow_SearchBody_Medium_Title_001=Localizar Equipe Desaparecida <EM4>[150 Rep]</EM4>
Hockcrow_SearchBody_Super_Description_001=Hockrow Agency \nArquivo de Caso #MP65648\nInvestigador Chefe: Arken Mallor\n\nResumo do Caso: \nUma tripulação inteira desapareceu enquanto realizava um contrato em ~mission(System) para um cliente cujos detalhes completos, infelizmente, não estou autorizado a revelar. Digamos apenas que não era o trabalho mais seguro e o fato de a tripulação não estar respondendo às comunicações não é surpreendente, mas é preocupante. É vital apurarmos o que aconteceu com eles. \n\nAções do Investigador Contratado:\nLocalize <EM4>~mission(MissingPersonList)</EM4> em <EM4>~mission(Location|Address)</EM4> e confirme o status deles. \n\nSe estiverem mortos, examine o corpo de perto para que possamos verificar o óbito via seu mobiGlas.\n\nNotas Adicionais:\nEsta investigação tem alto potencial para a presença de hostis agressivos e perigosos no local. Arme-se adequadamente e considere trazer outros associados qualificados com você.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Head Contractor:</EM4> +300 Rep
Hockcrow_SearchBody_Super_Title_001=LOCALIZAR TRIPULAÇÃO DESAPARECIDA <EM4>[300 Rep]</EM4>
Hockcrow_SearchBody_VeryEasy_Description_001=Hockrow Agency \nArquivo de Caso #MP51643\nInvestigador Chefe: Arken Mallor\n\nResumo do Caso: \nProcurando um agente para confirmar o status de um cliente. Ele e seu parceiro perderam uma reunião agendada e todas as tentativas de contatá-los provaram ser vãs. A última notícia que tivemos foi que estavam realizando alguns negócios em ~mission(System) e tememos que possam ser vítimas de alguma tragédia infeliz.\n\nAções do Investigador Contratado:\nLocalize <EM4>~mission(MissingPersonList)</EM4> em <EM4>~mission(Location|Address)</EM4> e confirme o status deles. \n\nSe estiverem mortos, examine o corpo de perto para que possamos verificar o óbito via seu mobiGlas.\n\nNotas Adicionais:\nSeja cauteloso ao conduzir sua busca. Se o cliente sofreu danos, seria lamentável que você encontrasse o mesmo destino.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Neutral:</EM4> +100 Rep
Hockcrow_SearchBody_VeryEasy_Title_001=Localizar Clientes Desaparecidos <EM4>[100 Rep]</EM4>
Hockcrow_SearchBody_VeryHard_Description_001=Hockrow Agency \nArquivo de Caso #MP12854\nInvestigador Chefe: Arken Mallor\n\nResumo do Caso:\nFomos solicitados a rastrear dois contratados que trabalham para um cliente nosso após perderem o contato com eles. A última informação é que viajavam juntos em ~mission(System). Até que a situação exata possa ser avaliada, nosso cliente está em um padrão de espera. \n\nAções do Investigador Contratado:\nLocalize <EM4>~mission(MissingPersonList)</EM4> em <EM4>~mission(Location|Address)</EM4> e confirme o status deles. \n\nSe estiverem mortos, examine o corpo de perto para que possamos verificar o óbito via seu mobiGlas.\n\nNotas Adicionais:\nVocê irá para o que é considerado um local particularmente perigoso. Reforços são altamente recomendados para este encontro.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Veteran Contractor:</EM4> +200 Rep
Hockcrow_SearchBody_VeryHard_Title_001=Localizar Contratados Desaparecidos <EM4>[200 Rep]</EM4>
Hockrow_FacilityDelve_P1M1_desc=Hockrow Agency \nArquivo de Caso #JD10285\nInvestigador Principal: Arken Mallor\n\nResumo do Caso: \nUm cliente solicitou que a Hockrow compile um dossiê completo sobre o infame cientista <EM4>Dr. Logan Jorrit</EM4>. Acredita-se que seja responsável pelos incidentes no local Lazarus da Associated Science & Development, e o cliente está ansioso para obter uma visão mais ampla sobre o Dr. Logan e sua pesquisa.\n\nAções do Investigador Contratado: \nObtenha acesso à <EM4>Instalação Onyx</EM4> da ASD, que está fechada, onde o Dr. Jorrit foi anteriormente o Cientista Chefe. Uma vez lá, localize e <EM4>acesse os arquivos de pessoal do laboratório de pesquisa</EM4> para que possamos entender o que estava acontecendo.\n\nNotas Adicionais:\nO farol QT para o local foi desativado quando a instalação ficou inoperante, então você terá que pilotar o último trecho manualmente.\n\nEmbora a ASD tenha oficialmente fechado a instalação, cautela ainda é recomendada. Não apenas os laboratórios podem ser perigosos, mas a área ao redor mostra sinais de visitantes recentes. Saqueadores ou ocupantes podem estar no local.\n\nTambém consegui um código de identificação de funcionário para você, então enquanto estiver a trabalho, poderá acessar os computadores lá.\n\nAlém disso, a Instalação Onyx possui apenas grandes hangares disponíveis, então planeje seu deslocamento adequadamente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 3/7
Hockrow_FacilityDelve_P1M1_title=DOSSIÊ JORRIT: ARQUIVOS DE PESSOAL ONYX
Hockrow_FacilityDelve_P1M2_desc=Hockrow Agency \nArquivo de Caso #JD10285\nInvestigador Principal: Arken Mallor\n\nAtualização do Caso: \nA partir dos arquivos de pessoal recuperados na Instalação Onyx, agora sabemos que o Dr. Jorrit visitou recentemente o local e acessou arquivos enquanto estava lá. O próximo passo será seguir essa pista e tentar descobrir exatamente o que o Dr. Jorrit estava fazendo em seu antigo laboratório.\n\nAções do Investigador Contratado:\nExplore a ala de <EM4>Engenharia</EM4> e <EM4>acesse os arquivos recentes do Dr. Jorrit</EM4>.\n\nNotas Adicionais:\nEncontrei uma solução alternativa para o problema do QT, então você poderá viajar diretamente para o local a partir de agora.\n\nEsteja atento a possíveis forças hostis no local.\n\nViaje para Onyx em um veículo que possa ser armazenado em um hangar grande.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 3/7
Hockrow_FacilityDelve_P1M2_title=DOSSIÊ JORRIT: ACESSAR ARQUIVOS DE ENGENHARIA
Hockrow_FacilityDelve_P1M3_desc=Hockrow Agency\nArquivo do Caso nº JD10285\nInvestigador Principal: Arken Mallor\n\nAtualização do Caso:\nOs arquivos que você encontrou na Engenharia confirmam que o Dr. Jorrit está ativamente perseguindo algo no local, mas ainda não está claro o que ele está fazendo. Espero que, se você conseguir encontrar os dados que ele acessou na ala de Pesquisa, isso nos traga mais clareza.\n\nAções do Investigador Contratado:\nExplore a ala de <EM4>Pesquisa</EM4> para localizar e <EM4>acessar os arquivos recentes do Dr. Jorrit</EM4>.\n\nNotas Adicionais:\nFique atento a possíveis forças hostis no local.\n\nViaje até Onyx em um veículo que possa ser armazenado em um hangar grande.\n\nDepois que você acessar esses arquivos, enviarei <EM4>5 Unidades de Armazenamento Seguras</EM4> com cópias de todos os dados que reunimos até agora. Você poderá coletá-las em sua localização residencial.\n\n<EM3>ITEM REWARDS</EM3>\n- ASD Secure Drive\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 3/7
Hockrow_FacilityDelve_P1M3_title=DOSSIÊ JORRIT: ACESSAR ARQUIVOS DE PESQUISA
Hockrow_FacilityDelve_P2M1_Repeat_desc=Hockrow Agency\nArquivo do Caso nº JD10285\nInvestigador Principal: Arken Mallor\n\nAtualização do Caso:\nSeria útil ter os dados mais recentes da anomalia energética para podermos compará-los com os que você entregou da última vez. Qualquer diferença entre os dois conjuntos pode ser útil.\n\nAções do Investigador Contratado:\nExplore a ala de <EM4>Engenharia</EM4>, <EM4>recupere os dados da Anomalia Energética</EM4> e entregue-os em <EM4>~mission(Destination|Address)</EM4>.\n\nNotas Adicionais:\nFique atento a possíveis forças hostis no local.\n\nViaje até Onyx em um veículo que possa ser armazenado em um hangar grande.\n\nAssim que você entregar esses dados, enviarei uma <EM4>Unidade de Armazenamento Segura ASD</EM4> que poderá ser coletada em sua localização residencial.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Fresnel Energy LMG\n- Zenith Laser Sniper Rifle\n- [S1-A] Corbel Arms Mire\n- [S1-A] Corbel Core Mire\n- [S1-A] Corbel Helmet Mire\n- [S1-A] Corbel Legs Mire\n- [S1-A] Fresnel Energy LMG Battery (165 Cap)\n- [S1-A] Geist Armor Arms Forest\n- [S1-A] Geist Armor Core Forest\n- [S1-A] Geist Armor Helmet Forest\n- [S1-A] Geist Armor Legs Forest\n- [S3-A] Novikov Backpack Mire\n\n<EM3>ITEM REWARDS</EM3>\n- ASD Secure Drive\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
Hockrow_FacilityDelve_P2M1_Repeat_title=DOSSIÊ JORRIT: DADOS ATUALIZADOS DA ANOMALIA ENERGÉTICA <EM4>[BP]</EM4>
Hockrow_FacilityDelve_P2M1_desc=Hockrow Agency \nArquivo do Caso #JD10285\nInvestigador Principal: Arken Mallor\n\nAtualização do Caso: \nA revisão dos arquivos recentes do Dr. Jorrit que você me enviou nos deixou com mais perguntas do que respostas. Embora saibamos com certeza que o doutor esteve dentro da Onyx, ainda não sabemos os detalhes do que ele estava fazendo. O cliente está ansioso para que aprendamos mais sobre o que exatamente Jorrit está fazendo, então receio que você tenha que voltar.\n\nTenho algumas ideias sobre como podemos usar os sistemas da instalação para localizar as atividades do Dr. Jorrit, embora desta vez você tenha que me trazer os dados fisicamente para que possamos analisá-los adequadamente. Primeiro, os sensores de energia na Engenharia. Eles ainda estão ativos e sensíveis o suficiente para captar qualquer leitura anômala.\n\nAções do Investigador do Contrato:\nExplore a <EM4>Ala de Engenharia</EM4> e <EM4>recupere os dados da Anomalia Energética</EM4> e entregue-os em <EM4>~mission(Destination|Address)</EM4>.\n\nNotas Adicionais:\nEsteja atento a possíveis forças hostis no local.\n\nViaje para Onyx em um veículo que possa ser armazenado em um hangar grande.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7
Hockrow_FacilityDelve_P2M1_title=DOSSIÊ JORRIT: RECUPERE OS DADOS DA ANOMALIA ENERGÉTICA
Hockrow_FacilityDelve_P2M2_Repeat_desc=Hockrow Agency\nArquivo do Caso nº JD10285\nInvestigador Principal: Arken Mallor\n\nAtualização do Caso:\nPor uma questão de cautela extrema, seria bom verificar se os sistemas de segurança detectaram algo novo desde o último lote de dados que você entregou. Assim, podemos garantir que estamos atualizados sobre o que tem acontecido lá embaixo.\n\nAções do Investigador Contratado:\nExplore a ala de <EM4>Pesquisa</EM4>, <EM4>recupere os dados de Segurança</EM4> e entregue-os em <EM4>~mission(Destination|Address)</EM4>.\n\nNotas Adicionais:\nFique atento a possíveis forças hostis no local.\n\nViaje até Onyx em um veículo que possa ser armazenado em um hangar grande.\n\nAssim que você entregar esses dados, enviarei uma <EM4>Unidade de Armazenamento Segura ASD</EM4> que poderá ser coletada em sua localização residencial.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Fresnel "Rockfall" Energy LMG\n- Zenith "Landslide" Laser Sniper Rifle\n- [S1-A] Corbel Arms Patina\n- [S1-A] Corbel Core Patina\n- [S1-A] Corbel Helmet Patina\n- [S1-A] Corbel Legs Patina\n- [S1-A] Fresnel Energy LMG Battery (165 Cap)\n- [S1-A] Geist Armor Arms\n- [S1-A] Geist Armor Core\n- [S1-A] Geist Armor Helmet\n- [S1-A] Geist Armor Legs\n- [S3-A] Novikov Backpack Patina\n\n<EM3>ITEM REWARDS</EM3>\n- ASD Secure Drive\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
Hockrow_FacilityDelve_P2M2_Repeat_title=DOSSIÊ JORRIT: DADOS DE SEGURANÇA ATUALIZADOS <EM4>[BP]</EM4>
Hockrow_FacilityDelve_P2M2_desc=Hockrow Agency \nArquivo do Caso #JD10285\nInvestigador Principal: Arken Mallor\n\nAtualização do Caso: \nConseguimos extrair dados muito interessantes do que você entregou, mas ainda não temos um quadro claro o suficiente. O que aprendemos concretamente é que o sistema de monitoramento de segurança de Onyx ainda está operacional. Os dados de lá serão seu próximo alvo.\n\nAções do Investigador do Contrato:\nExplore a <EM4>Ala de Pesquisa</EM4> e <EM4>recupere os dados de Segurança</EM4> e entregue em <EM4>~mission(Destination|Address)</EM4>.\n\nNotas Adicionais:\nEsteja atento a possíveis forças hostis no local.\n\nViaje para Onyx em um veículo que possa ser armazenado em um hangar grande.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7
Hockrow_FacilityDelve_P2M2_title=DOSSIÊ JORRIT: RECUPERE OS DADOS DE SEGURANÇA
Hockrow_FacilityDelve_P2M3_Repeat_desc=Hockrow Agency\nArquivo do Caso nº JD10285\nInvestigador Principal: Arken Mallor\n\nAtualização do Caso:\nUm dos maiores problemas em investigações em andamento é a defasagem das informações. Para ajudar a evitar isso, vou pedir que você retorne a Onyx e colete os dados mais recentes dos sensores sísmicos. Seria bom ver o que as últimas leituras indicam.\n\nAções do Investigador Contratado:\nExplore a ala de <EM4>Pesquisa</EM4>, <EM4>recupere os dados Sísmicos</EM4> e entregue-os em <EM4>~mission(Destination|Address)</EM4>.\n\nNotas Adicionais:\nFique atento a possíveis forças hostis no local.\n\nViaje até Onyx em um veículo que possa ser armazenado em um hangar grande.\n\nAssim que você entregar esses dados, enviarei uma <EM4>Unidade de Armazenamento Segura ASD</EM4> que poderá ser coletada em sua localização residencial.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Zenith "Thunderstrike" Laser Sniper Rifle\n- [S1-A] Corbel Arms Halcyon\n- [S1-A] Corbel Core Halcyon\n- [S1-A] Corbel Helmet Halcyon\n- [S1-A] Corbel Legs Halcyon\n- [S1-A] Geist Armor Arms Desert\n- [S1-A] Geist Armor Arms Whiteout\n- [S1-A] Geist Armor Core Desert\n- [S1-A] Geist Armor Core Whiteout\n- [S1-A] Geist Armor Helmet Desert\n- [S1-A] Geist Armor Helmet Whiteout\n- [S1-A] Geist Armor Legs Desert\n- [S1-A] Geist Armor Legs Whiteout\n- [S1-A] Zenith Laser Sniper Rifle Battery (22 Cap)\n- [S3-A] Novikov Backpack Halcyon\n\n<EM3>ITEM REWARDS</EM3>\n- ASD Secure Drive\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
Hockrow_FacilityDelve_P2M3_Repeat_title=DOSSIÊ JORRIT: DADOS SÍSMICOS ATUALIZADOS <EM4>[BP]</EM4>
Hockrow_FacilityDelve_P2M3_desc=Hockrow Agency \nArquivo do Caso #JD10285\nInvestigador Principal: Arken Mallor\n\nAtualização do Caso: \nGraças ao último lote de dados que você entregou, estamos começando a preencher as lacunas sobre o que o Dr. Jorrit está fazendo lá embaixo. Temos uma linha do tempo aproximada de suas atividades. Parece que ele tem mais coisas entrando em Onyx do que saindo, o que é interessante. Vamos precisar de mais inteligência. Há um experimento antigo funcionando lá que monitora pequenas mudanças sísmicas. Se você puder entregar esses dados para mim, isso nos ajudará a localizar alguns dos movimentos ao redor da instalação.\n\nAções do Investigador do Contrato:\nExplore a <EM4>Ala de Pesquisa</EM4> e <EM4>recupere os dados Sísmicos</EM4> e entregue em <EM4>~mission(Destination|Address).</EM4>\n\nNotas Adicionais:\nEsteja atento a possíveis forças hostis no local.\n\nViaje para Onyx em um veículo que possa ser armazenado em um hangar grande.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7
Hockrow_FacilityDelve_P2M3_title=DOSSIÊ JORRIT: RECUPERE OS DADOS SÍSMICOS
Hockrow_FacilityDelve_P2M4_Repeat_title=DOSSIÊ JORRIT: DADOS ATUALIZADOS DE CONSUMO DE ENERGIA <EM4>[BP]</EM4>
Hockrow_FacilityDelve_P2M4_desc=Hockrow Agency\nArquivo do Caso nº JD10285\nInvestigador Principal: Arken Mallor\n\nAtualização do Caso:\nOs dados sísmicos que você extraiu revelaram algumas descobertas interessantes. Minha especialista acredita que Jorrit pode estar realizando escavações lá embaixo. Detesto imaginar o que ele está fazendo, mas é nosso trabalho descobrir. Acho que estamos perto de desvendar isso, então quero que você volte a Onyx e colete os dados de Consumo de Energia. Se conseguirmos rastrear o fluxo de energia dos últimos meses, um padrão deverá surgir.\n\nAções do Investigador Contratado:\nExplore a ala de <EM4>Engenharia</EM4> e <EM4>envie os dados de Consumo de Energia</EM4>.\n\nNotas Adicionais:\nFique atento a possíveis forças hostis no local.\n\nViaje até Onyx em um veículo que possa ser armazenado em um hangar grande.\n\nAssim que você entregar esses dados, enviarei <EM4>10 Unidades de Armazenamento Seguras</EM4> com cópias das informações que reunimos até agora. Você poderá coletá-las em sua localização residencial.\n\n<EM3>ITEM REWARDS</EM3>\n- ASD Secure Drive\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7
Hockrow_FacilityDelve_P2M4_title=DOSSIÊ JORRIT: DADOS DE USO DE ENERGIA
Hockrow_FacilityDelve_P3M1_desc=Hockrow Agency \nArquivo de Caso #JD10285\nInvestigador Principal: Arken Mallor\n\nAtualização do Caso: \nTodas as suas investigações em Onyx valeram a pena. Consegui confirmar que Jorrit operava um laboratório não oficial no Site-B da instalação para conduzir um experimento chamado “Projeto Hyperion”. Enviarei suas <EM4>anotações de laboratório para seu diário mobiGlas</EM4> assim que você começar, mas resumindo, o sujeito está tentando fazer os Humanos evoluírem ou algo assim.\n\nO cliente quer os dados experimentais, então você vai voltar a Onyx e fazer tudo que for necessário para colocar o Projeto Hyperion em andamento. \n\nAções do Investigador do Contrato:\nPrepare o experimento coletando um <EM4>código de Reagente na ala de Engenharia</EM4> e um <EM4>código de Catalisador na ala de Pesquisa</EM4>.\n\nDepois de obtê-los, dirija-se ao <EM4>Laboratório no Site-B</EM4> e <EM4>execute o experimento</EM4> para que possa <EM4>enviar os resultados</EM4>.\n\nNotas Adicionais:\nComo este é um laboratório ativo, pode haver segurança ASD no local.\n \nViaje para Onyx em um veículo que possa ser armazenado em um hangar grande.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Fresnel "Molten" Energy LMG\n- Zenith "Darkwave" Laser Sniper Rifle\n- [S1-A] Geist Armor Arms ASD Edition\n- [S1-A] Geist Armor Core ASD Edition\n- [S1-A] Geist Armor Helmet ASD Edition\n- [S1-A] Geist Armor Legs ASD Edition\n- [S1-A] Zenith Laser Sniper Rifle Battery (22 Cap)\n- [MIL-S1-B] DynaFlux\n- [MIL-S2-B] Bolide\n- [MIL-S3-B] Fulgur\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Blueprint Reward:</EM4> 100% chance (Repeat only)\n\n<EM4>? = only the Repeat variant awards blueprints</EM4>
Hockrow_FacilityDelve_P3M1_title=DOSSIÊ JORRIT: PROJETO HYPERION <EM4>[BP?]</EM4>
Hurston_bounty_boss_dc_desc_001=TERCERIZAÇÃO DA HURSTON DYNAMICS\nCONTRATO: Coleta de Recompensa\nGERENTE DE TERCEIRIZAÇÃO: I. Takao\nAVALIAÇÃO DE RISCO: Alvo de Alto Risco (Suporte Armado)\n\nA Hurston Dynamics está buscando um prestador de serviços para concluir uma recompensa de ~missison(TargetName). Esse alvo tem se mostrado extremamente evasivo até o momento, mas os relatórios de inteligência rastrearam o alvo e um grupo de seus associados conhecidos até ~mission(Location|Address). \n\nNo entanto, há uma grande chance de que ~mission(TargetName|Last) não se arrisque a um confronto, a menos que seja absolutamente forçado a isso. Recomendamos que você neutralize uma parte significativa dos aliados do criminoso primeiro, a fim de atraí-lo. O relatório indica que um grande grupo desses hostis está atualmente próximo à ~mission(Location).\n\nO pagamento será liberado somente depois que a recompensa for considerada completa.\n\n\n\n\n** As informações transmitidas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Juggernauts x1, Snipers x2, Soldiers x13, Technicians x3
Hurston_bounty_boss_dc_title_001=ALVO EVASIVO: ~mission(TargetName) (HRT) <EM4>[500 Rep]</EM4>
Hurston_bounty_multiboss_dc_desc_001=TERCEIRIZAÇÃO DA HURSTON DYNAMICS\nCONTRATO: Coleta de Recompensa\nGERENTE DE TERCEIRIZAÇÃO: I. Takao\nAVALIAÇÃO DE RISCO: Alvo de Risco Muito Alto (Apoio Armado)\n\nA Hurston Dynamics está buscando um prestador de serviços para concluir uma recompensa de ~mission(TargetName). Esse alvo e a grande força hostil com a qual ele está viajando acabaram de ser reportados como invasores de ~mission(Location|Address). \n\nNo entanto, se seu modus operandi for verdadeiro, ~mission(TargetName|Last) normalmente permanece oculto durante os ataques, preferindo direcionar suas forças à distância. Recomendamos que você se concentre em reduzir o número de aliados primeiro e, quando o número deles for significativamente enfraquecido, ~mission(TargetName|Last) não terá escolha a não ser confrontá-lo diretamente. \n\nO pagamento será liberado somente depois que a recompensa for considerada completa. \n\n\n\n\n** As informações transmitidas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Backup x5, Juggernauts x1, Soldiers x18, Technicians x32
Hurston_bounty_multiboss_dc_title_001=ALVO EVASIVO: ~mission(TargetName) (VHRT) <EM4>[1,000 Rep]</EM4>
Hurston_eliminateall_dc_desc_001=TERCEIRIZAÇÃO DA HURSTON DYNAMICS\nCONTRATO: Neutralizar Força Hostil\nGERENTE DE TERCEIRIZAÇÃO: T. Dalik\nAVALIAÇÃO DE RISCO: Alto\n\nNossas forças de segurança foram notificadas de uma incursão de fora da lei em andamento em ~mission(Location|Address) e precisamos de um operador independente capaz de eliminar os agentes hostis. \n\nDe acordo com a equipe local, os fora da lei estão atualmente escondidos perto de ~mission(Location). Aproxime-se com cuidado e esteja preparado para usar força letal se os criminosos resistirem a serem removidos.\n\nO pagamento só será autorizado quando o local for efetivamente liberado.\n\n\n\n\n** As informações transmitidas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> CQC x20, Soldiers x4
Hurston_eliminateall_dc_title_001=NEUTRALIZAR INCURSAO DE CRIMINOSOS <EM4>[500 Rep]</EM4>
Hurston_eliminatespecifc_dc_desc_001=TERCEIRIZAÇÃO DA HURSTON DYNAMICS\nCONTRATO: Coleta de Recompensa\nGERENTE DE TERCEIRIZAÇÃO: T. Davik\nAVALIAÇÃO DE RISCO: Alvo de Risco Moderado\n\nA Hurston Dynamics está buscando um prestador de serviços para concluir uma recompensa de ~mission(TargetName). Relatórios de inteligência rastrearam o alvo até ~mission(Location|Address), onde ele foi visto pela última vez perto de ~mission(Location). \n\nEsteja preparado para que ele resista à apreensão e para o uso de força letal, se necessário.\n\nO pagamento será liberado somente depois que a recompensa for considerada finalizada.\n \n\n\n** As informações transmitidas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> CQC x18, Juggernauts x1, Snipers x2, Soldiers x6
Hurston_eliminatespecifc_dc_title_001=Recompensa Localizada: ~mission(TargetName) (MRT) <EM4>[500 Rep]</EM4>
Hurston_searchbody_dc_desc_001=TERCEIRIZAÇÃO DA HURSTON DYNAMICS\nCONTRATO: Localizar Pessoa Desaparecida\nGERENTE DE TERCEIRIZAÇÃO: I. Takao\nAVALIAÇÃO DE RISCO: Baixo\n\nA equipe de ~mission(Location|Address) registrou recentemente um relatório de pessoas desaparecidas para um ~mission(TargetName). Ele está desaparecido há vários dias e foi visto pela última vez indo para ~mission(Location).\n\nVocê está sendo contratado para realizar uma busca no local de ~mission(TargetName|Last) e ver se consegue determinar seu paradeiro. \n\nO pagamento depende do retorno de um registro de sua localização atual, viva ou morta.\n\n\n\n\n** As informações transmitidas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
InterSec_KillShip_Vanduul_Desc_Super_001=ESPECIFICAÇÕES DA MISSÃO\n\nÁrea de Operação: Sistema Nyx\nForças Hostis: Vanduul\nEspecificações de Equipamento: Nave com Classificação de Combate\nBriefing: A InterSec exige os serviços de um piloto habilidoso que esteja preparado para auxiliar na derrubada de um perigoso alvo Vanduul que esteve envolvido em numerosos ataques.\n\nAs incursões Vanduul têm aumentado recentemente, representando uma ameaça não apenas para o sistema de Nyx, mas para a UEE como um todo. É imperativo que essas aparições sejam respondidas de forma rápida e eficiente.\n\nExigimos que você voe para o último avistamento conhecido da nave Vanduul em <EM4>~mission(Location|Address)</EM4> e os elimine imediatamente.\n\nPilotos Vanduul são altamente habilidosos e extremamente perigosos. Engaje o inimigo imediatamente e não hesite – eles não demonstrarão a mesma misericórdia.\n\nA compensação proporcional ao risco do contrato será concedida.\n\n\nRespeitosamente,\nDeacon Tobin\nGerente de Operações\nInterSec Defense Solutions\n\nEsta comunicação consiste em uma oferta não vinculativa que, após aceitação, pode ser imediatamente rescindida por qualquer uma das partes sem aviso prévio. Todas as operações são conduzidas por conta e risco pessoal do contratado e devem aderir à lei do sistema, quando aplicável.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
InterSec_KillShip_Vanduul_Title_Super_001=Eliminar Nave Vanduul <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
InterSec_ResourceGathering_Cryopods_Desc=ESPECIFICAÇÕES DA MISSÃO\n\nÁrea de Operação: Sistema Nyx\nForças Hostis: Foras da Lei presentes e armados\nEspecificações de Equipamento: <EM4>Nave com Capacidade de Carga</EM4>, Armas Pessoais, <EM4>Raio Trator de Alta Capacidade</EM4> (Heavy-Duty Tractor Beam)\nBriefing: \nNossa inteligência mais recente mostra que a Shattered Blade reabasteceu seu estoque de cadáveres Vanduul e em breve os transferirá da antiga <EM4>estação QV Logistics</EM4> que estão operando para um comprador interessado. A UEE não pode ter outro incidente como o que aconteceu com a ASD, então eles estão ansiosos para que <EM4>recuperemos as criopods</EM4> e as entreguemos ao <EM4>elevador de carga em ~mission(Destination|Address)</EM4>.\n\nEmbora os membros da Shattered Blade presentes no local possam oferecer resistência, eles não são o foco da sua missão. Lide com eles conforme a necessidade e recupere as criopods. \n\nRespeitosamente,\n\nDeacon Tobin\nGerente de Operações\nInterSec Defense Solutions\n\nEsta comunicação consiste em informações confidenciais destinadas exclusivamente ao destinatário. Por favor, desconsidere se recebido por engano e notifique o remetente. Todas as operações são conduzidas por conta e risco pessoal do contratado e devem aderir à UEE e à lei do sistema, quando aplicável.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Pulse Laser Pistol\n- [S1-A] Pulse Laser Pistol Battery (60 Cap)\n- [S1-A] Testudo Arms Earthshake\n- [S1-A] Testudo Core Earthshake\n- [S1-A] Testudo Helmet Earthshake\n- [S1-A] Testudo Legs Earthshake\n- [S2-A] Testudo Backpack Earthshake\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 6/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
InterSec_ResourceGathering_Cryopods_Title=Recuperar Cadáveres Vanduul <EM4>[BP]</EM4>
InterSec_ResourceGathering_Tech_Desc=ESPECIFICAÇÕES DA MISSÃO\n\nÁrea de Operação: Sistema Nyx\nForças Hostis: Foras da Lei presentes e armados\nEspecificações de Equipamento: Nave com Classificação de Combate, Armas Pessoais\nBriefing: \nPara evitar que a Shattered Blade inunde o mercado negro com contrabando xeno, a UEE encarregou a InterSec de <EM4>recuperar um esconderijo de Placas e Metal Vanduul</EM4> da antiga <EM4>estação QV Logistics</EM4> que a gangue tem ocupado. Depois de ter os materiais em sua posse, entregue-os no elevador de carga em <EM4>~mission(Destination|Address)</EM4>.\n\nCom base na sua experiência anterior, não seria surpreendente se a Shattered Blade oferecer resistência, mas certifique-se de que seu foco seja a recuperação dos materiais.\n\nRespeitosamente,\n\nDeacon Tobin\nGerente de Operações\nInterSec Defense Solutions\n\nEsta comunicação consiste em informações confidenciais destinadas exclusivamente ao destinatário. Por favor, desconsidere se recebido por engano e notifique o remetente. Todas as operações são conduzidas por conta e risco pessoal do contratado e devem aderir à UEE e à lei do sistema, quando aplicável.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Pulse Laser Pistol\n- [S1-A] Pulse Laser Pistol Battery (60 Cap)\n- [S1-A] Testudo Arms Earthshake\n- [S1-A] Testudo Core Earthshake\n- [S1-A] Testudo Helmet Earthshake\n- [S1-A] Testudo Legs Earthshake\n- [S2-A] Testudo Backpack Earthshake\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 6/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
InterSec_ResourceGathering_Tech_Title=Recuperar Tecnologia Vanduul <EM4>[BP]</EM4>
InterSec_SecurityPatrol_H_Desc_001=ESPECIFICAÇÕES DA MISSÃO\n\nÁrea de Operação: Sistema Nyx\nForças Hostis: Foras da Lei\nEspecificações de Equipamento: Naves com Classificação de Combate\nBriefing: A InterSec recebeu informações de que foras da lei estão planejando lançar um ataque a um alvo dentro da UEE. Em um esforço para evitar que isso aconteça, precisamos de um contratado para patrulhar um setor que acreditamos que esses foras da lei estão usando para se preparar para o ataque.\n\nA atividade de foras da lei neste setor é mais alta do que o normal, então a InterSec recomenda que você <EM4>traga reforço</EM4> (backup). Quando estiver pronto, dirija-se ao <EM4>marcador de localização</EM4> em seu HUD e escaneie os pontos de passagem ao longo da rota. Assim que você confirmar que todo o setor está limpo, o contratado principal receberá um bônus de <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\nRespeitosamente,\n\nDeacon Tobin\nGerente de Operações\nInterSec Defense Solutions\n\nEsta comunicação consiste em uma oferta não vinculativa que, após aceitação, pode ser imediatamente rescindida por qualquer uma das partes sem aviso prévio. Todas as operações são conduzidas por conta e risco pessoal do contratado e devem aderir à lei do sistema, quando aplicável.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Quartz "Deadfall" Energy SMG\n- Quartz "Lumen" Energy SMG\n- [S1-A] Quartz Energy SMG Battery (45 cap)\n- [S1-A] Testudo Arms Nightveil\n- [S1-A] Testudo Arms Turfwar\n- [S1-A] Testudo Core Nightveil\n- [S1-A] Testudo Core Turfwar\n- [S1-A] Testudo Helmet Nightveil\n- [S1-A] Testudo Helmet Turfwar\n- [S1-A] Testudo Legs Nightveil\n- [S1-A] Testudo Legs Turfwar\n- [S2-A] Testudo Backpack Nightveil\n- [S2-A] Testudo Backpack Turfwar\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Targets x54\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
