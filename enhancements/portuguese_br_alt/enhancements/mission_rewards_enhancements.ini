RedWind_RecoverCargo_Easy_Description=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nUm de nossos transportadores teve problemas no motor enquanto transportava uma carga para nós e foi forçado a abandonar sua nave. Procuramos um contratante que possa recuperar a carga e completar a entrega. Você precisará trazer seu próprio <EM4>raio trator de alta potência</EM4> para transportar a carga para sua nave. Detalhes abaixo.\n\nLOCAL DE RECUPERAÇÃO\n     · <EM4>~mission(Location|Address)</EM4>\n\nLOCAL DE ENTREGA\n     · Elevador de carga em <EM4>~mission(Destination|Address)</EM4>\n\nEsteja avisado, o local de recuperação não foi verificado como seguro. Você pode encontrar um fora da lei oportunista tentando levar a carga para si, então fique em alerta.\n\nTENHA ORGULHO DO SEU TRABALHO – Mesmo como contratante, você está representando a Red Wind Linehaul. Não faça nada intencionalmente para prejudicar a reputação da empresa.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Unknown:</EM4> 1\n<EM4>Trainee:</EM4> +100 Rep
RedWind_RecoverCargo_Easy_Title=RECUPERAÇÃO DE CARfGA FÁCIL DA RED WIND <EM4>[100 Rep]</EM4>
RedWind_RecoverCargo_Hard_Description=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nEstamos com problemas para completar uma missão de transporte e precisamos de um contratado confiável com experiência trabalhando em ambientes perigosos para completar o trabalho. Apenas como aviso, a carga está em uma nave abandonada cercada por múltiplos foras da lei altamente perigosos. Aconselhamos veementemente que você traga algum apoio com você e um <EM4>raio trator de alta potência</EM4> para recuperar os bens do cliente. Detalhes a seguir:\n\nLOCAL DE RECUPERAÇÃO\n     · <EM4>~mission(Location|Address)</EM4>\n\nLOCAL DE ENTREGA\n     · Elevador de carga em <EM4>~mission(Destination|Address)</EM4>\n\nComo isso é um pouco arriscado, estamos oferecendo um pagamento proporcional. Deixarei a seu critério decidir como distribuí-lo à sua tripulação.\n\nTENHA ORGULHO DO SEU TRABALHO – Mesmo como contratado, você está representando a Red Wind Linehaul. Não faça nada intencionalmente para prejudicar a reputação da empresa.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Unknown:</EM4> 1\n<EM4>Junior:</EM4> +200 Rep
RedWind_RecoverCargo_Hard_Title=RECUPERAÇÃO DE CARGA DESAFIADORA DA RED WIND <EM4>[200 Rep]</EM4>
RedWind_RecoverCargo_Medium_Description=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nUm transportador da Red Wind foi emboscado por alguns foras da lei e agora a carga de nossos clientes está parada enquanto eles se preparam para roubá-la. Precisamos de um piloto com um <EM4>raio trator de alta potência</EM4> e uma nave pronta para combate para ir ao local abaixo e recuperar a carga antes que ela se perca de vez.\n\nLOCAL DE RECUPERAÇÃO\n     · <EM4>~mission(Location|Address)</EM4>\n\nLOCAL DE ENTREGA\n     · Elevador de carga em <EM4>~mission(Destination|Address)</EM4>\n\nO piloto relatou múltiplos hostis, então certifique-se de levar isso a sério. \n\nTODA OPORTUNIDADE CONTA – Aproveite ao máximo o que lhe é dado, mostre-nos que você pode lidar com mais trabalho.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Unknown:</EM4> 1\n<EM4>Rookie:</EM4> +150 Rep
RedWind_RecoverCargo_Medium_Title=RECUPERAÇÃO DE CARGA DIRETA DA RED WIND <EM4>[150 Rep]</EM4>
RedWind_RecoverCargo_Super_Description=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nTemos uma tarefa especial apenas para os contratantes mais competentes. Um de nossos transportadores que, infelizmente, não está mais entre nós, não conseguiu completar seu último trabalho. A carga que ele deveria entregar está parada em sua antiga nave no local listado abaixo.\n\nLOCAL DE RECUPERAÇÃO\n     · <EM4>~mission(Location|Address)</EM4>\n\nLOCAL DE ENTREGA\n     · Elevador de carga em <EM4>~mission(Destination|Address)</EM4>\n\nNão vou fazer rodeios, este é um trabalho extremamente desafiador. Você precisará trazer uma equipe forte de pilotos habilidosos para lidar com os foras da lei que mataram o contratante anterior e um <EM4>raio trator de alta potência</EM4> para recuperar a carga do cliente. Dito isso, se você aceitar este contrato, faremos valer o seu tempo.\n\nCOMO FOI O NOSSO DESEMPENHO – Preencha nossa curta pesquisa de feedback em nossa página do Spectrum para ter a chance de participar de nosso sorteio mensal de prêmios.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Unknown:</EM4> 1\n<EM4>Experienced:</EM4> +300 Rep
RedWind_RecoverCargo_Super_Title=RECUPERAÇÃO DE CARGA ESPECIAL DA RED WIND <EM4>[300 Rep]</EM4>
RedWind_RecoverCargo_VeryHard_Description=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nEstamos procurando um piloto altamente qualificado que possa recuperar a carga de nosso cliente. Por favor, aceite este contrato apenas se você tiver experiência lidando com situações extremamente hostis envolvendo múltiplos combatentes. Membros adicionais da tripulação e um <EM4>raio trator de alta potência</EM4> são altamente recomendados.\n\nLOCAL DE RECUPERAÇÃO\n     · <EM4>~mission(Location|Address)</EM4>\n\nLOCAL DE ENTREGA\n     · Elevador de carga em <EM4>~mission(Destination|Address)</EM4>\n\nA carga deve estar no compartimento da nave abandonada. O cliente já expressou frustração em relação ao atraso da carga, então, por favor, trabalhe de forma rápida e eficiente.\n\nSEJA RESILIENTE – A vida é difícil e às vezes você tem que aguentar o tranco. Continue e não deixe que isso te derrube.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Unknown:</EM4> 1\n<EM4>Member:</EM4> +200 Rep
RedWind_RecoverCargo_VeryHard_Title=RECUPERAÇÃO DE CARGA PERIGOSA DA RED WIND <EM4>[200 Rep]</EM4>
Redwind_internaldelivery_dc_desc_001=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nO pessoal lá em <EM4>~mission(Location|Address)</EM4> está fazendo uma limpeza e quer que alguns pacotes sejam movidos pela instalação.\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n· Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> de <EM4>~mission(Pickup1)</EM4>\n· Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> de <EM4>~mission(Pickup2)</EM4>\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n· Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1)</EM4>\n· Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para <EM4>mission(Dropoff2)</EM4>\n\nEles precisam disso feito de forma eficiente e sem muitos problemas.\n\nNÃO PEGUE ESTE CONTRATO - a menos que você seja confiável. A Red Wind tem uma reputação que nossos clientes confiam, e com razão.\n\nmission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Redwind_internaldelivery_dc_desc_003=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nTem algumas caixas que precisam ser reorganizadas em <EM4>~mission(Location|Address)</EM4>.\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n· Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> de <EM4>~mission(Pickup1)</EM4>\n· Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> de <EM4>~mission(Pickup2)</EM4>\n· Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> de <EM4>~mission(Pickup3)</EM4>\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n· Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1)</EM4>\n· Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para <EM4>~mission(Dropoff2)</EM4>\n· Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para <EM4>mission(Dropoff3)</EM4>\n\nmission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
Redwind_internaldelivery_dc_desc_005=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nParece que houve um pequeno problema logístico em <EM4>~mission(Location|Address)</EM4> e eles precisam de alguém para garantir que os pacotes extraviados cheguem aos seus destinos dentro da instalação.\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> do <EM4>~mission(Pickup1)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> do <EM4>~mission(Pickup2)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> do <EM4>~mission(Pickup3)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> do <EM4>~mission(Pickup4)</EM4>\n     · Pacote <EM4>#~mission(Item5|SerialNumber)</EM4> do <EM4>~mission(Pickup5)</EM4>\n     · Pacote <EM4>#~mission(Item6|SerialNumber)</EM4> do <EM4>~mission(Pickup6)</EM4>\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para o <EM4>~mission(Dropoff1)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para o <EM4>~mission(Dropoff2)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para o <EM4>~mission(Dropoff3)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> para o <EM4>~mission(Dropoff4)</EM4>\n     · Pacote <EM4>#~mission(Item5|SerialNumber)</EM4> para o <EM4>~mission(Dropoff5)</EM4>\n     · Pacote <EM4>#~mission(Item6|SerialNumber)</EM4> para o <EM4>~mission(Dropoff6)</EM4>\n\nCONFIANÇA É MÃO DUPLA - Ao aceitar este contrato, você se compromete a não nos prejudicar, e a Red Wind Linehaul se compromete a tratá-lo da mesma forma. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000
Redwind_internaldelivery_dc_title_001=Operador de Pacotes Red Wind <EM4>[500–2,000 Rep]</EM4>
RepairOxygenKiosk_DescriptionLong=Olá convidados,\n\nRecentemente fomos informados de que um de nossos dispensadores de oxigênio apresentou um erro técnico. Como você sabe, esses quiosques são importantes para garantir que você tenha disponibilidade adequada de oxigênio enquanto participa do nosso Programa de Liberação de Trabalho.\n\nEstamos buscando qualquer hóspede disponível para reiniciar o quiosque. Isso deve reconectar o quiosque à rede e resolver o problema. O primeiro convidado a completar esta tarefa será recompensado não só com mérito, mas também com a satisfação de tornar o local de trabalho mais seguro para outros convidados.\n\nObrigado.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100
RepairOxygenKiosk_Title=OPORTUNIDADE DE MANUTENÇÃO DE PRISIONEIROS <EM4>[100 Rep]</EM4>
