crusader_bounty_title_VH=Recompensa Emitida Para ~mission(TargetName) (VHRT) <EM4>[500 Rep]</EM4>
crusader_bounty_title_first=REVISÃO DE RECOMPENSA DE FREELANCER VERIFICADA <EM4>[500 Rep]</EM4>
crusader_bounty_title_rehire=REAVALIACAO DE RECOMPENSA DE FREELANCER VERIFICADO <EM4>[500 Rep]</EM4>
crusader_platform_EliminateAll_description_001=Após a última tentativa de cerco, as forças da Nine Tails começaram a realizar ataques direcionados em um esforço para continuar a interromper as operações da Crusader. O ataque atual teve como alvo a ~mission(MissionCluster|Address) e é vital que coloquemos um fim à agressão lá. \n\nA Crusader Security está procurando contratados dispostos a eliminar todos os operativos da Nine Tails na área. Os contratados devem esperar o uso da força e são fortemente encorajados a considerar a possibilidade de trazer reforços. \n\nCONTRATO AUTORIZADO POR:\nOficial de ligação Bautista\nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x20
crusader_platform_EliminateAll_title_001=REPELIR INVASÃO EM ORISON <EM4>[500 Rep]</EM4>
crusader_platform_EliminateSpecific_desc=A Crusader Security recebeu informações de que uma invasão da Nine Tails que está ocorrendo atualmente em ~mission(MissionCluster|Address) inclui um importante Executor da gangue. Acabar com essa invasão e levar os responsáveis à justiça é uma das principais prioridades da Crusader Security. É por isso que estamos procurando um prestador de serviços disposto a ir à ~mission(MissionCluster|Name) para interromper a ameaça e prender o Executor que a lidera.\n\nUma vez no local, você precisará esgotar as forças da Nine Tails até conseguir eliminar ~mission(TargetName). \n\nConsiderando a brutalidade empregada pela Nine Tails durante seu recente cerco, recomendamos que os contratados estejam preparados para usar a força e os incentivamos fortemente a considerar a possibilidade de trazer reforços.\n\nCONTRATO AUTORIZADO POR:\nOficial de Ligação Gibbs\nID# 91G66BW0\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Backup x6, Boss x1, Hostiles x19
crusader_platform_EliminateSpecific_title=CAÇA AO EXECUTOR DA NINE TAILS (HRT) <EM4>[1,000 Rep]</EM4>
crusader_platform_MultiEliminateAll_description_001=Após sua última tentativa de cerco, as forças da Nine Tails começaram a realizar ataques direcionados em um esforço para continuar a interromper as operações da Crusader. O ataque atual teve como alvo vários prédios em ~mission(MissionCluster|Address) e é vital que coloquemos um fim à agressão lá.\n\nA Segurança da Crusader está procurando uma empresa contratada que esteja disposta a eliminar todos os operativos da Nine Tails na área. Os contratados devem esperar o uso da força e são fortemente encorajados a considerar a possibilidade de trazer reforços. \n\nCONTRATO AUTORIZADO POR:\nOficial de ligação Bautista\nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x60
crusader_platform_MultiEliminateAll_title_001=REPELIR MÚLTIPLAS INVASOES EM ORISON <EM4>[500–2,000 Rep]</EM4>
crusader_platform_MultiEliminateSpecific_desc=A Crusader Security recebeu informações de que uma invasão da Nine Tails que está ocorrendo atualmente em ~mission(MissionCluster|Address) inclui vários Executores da gangue. Acabar com essa invasão e levar os responsáveis à justiça é uma das principais prioridades da Crusader Security. É por isso que estamos procurando um prestador de serviços disposto a ir e prender os responsáveis.\n\nEm cada local de ataque, você precisará esgotar as forças da Nine Tails até conseguir atrair o executor responsável. \n\nConsiderando a brutalidade empregada pela Nine Tails durante seu recente cerco, recomendamos que os contratados estejam preparados para usar a força e os incentivamos fortemente a considerar a possibilidade de trazer reforços.\n\nCONTRATO AUTORIZADO POR:\nOficial de ligação Gibbs\nID# 91G66BW0\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Backup x16, Boss x4, Hostiles x45
crusader_platform_MultiEliminateSpecific_title=CAÇA AO EXECUTOR DA NINE TAILS (VHRT) <EM4>[1,000–4,000 Rep]</EM4>
crusader_retakelocation_kareah_desc_001=O Security Post Kareah está sob ataque de um número desconhecido de atacantes. \n\nA Crusader está procurando empreiteiros para viajar rapidamente até a estação e eliminar qualquer intruso próximo antes que nossas forças de segurança sejam sobrecarregadas. \n\nNão temos certeza se os invasores têm como alvo o contrabando em nossa sala de evidências ou em nosso banco de dados de Status Criminal, mas seja o que for que estejam planejando, temos que lidar com eles. Você ganha um bônus de combate para cada alvo neutralizado. \nAo aceitar este contrato, você concorda em seguir todos os protocolos da Crusader Security: Se você violar qualquer guarda ou outro contratado autorizado enquanto estiver na estação, seu contrato será rescindido e você será marcado como alvo. \n\nO tempo é essencial, mas certifique-se de estar bem equipado para lidar com os inimigos antes de reagir. \n\nCONTRATO AUTORIZADO POR: \nOficial de Ligação Bautista \nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
