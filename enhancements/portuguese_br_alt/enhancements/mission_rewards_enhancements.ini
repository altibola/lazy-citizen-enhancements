headhunters_ChainElimAll_1C_AttackCFP_E_desc_001=Soube que a segurança da CFP está ficando um pouco mais agressiva e começou a expulsar as pessoas das casas que construíram com a sucata do sistema, que querem vingança, por isso vieram até nós.\n\nVá até ~mission(Location|Address) e limpe a CFP de lá. Deve ser bem fácil e tranquilo, com um bom pagamento.\n\nStows desligando.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x2, Soldiers x5, Technicians x5\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_1C_AttackCFP_E_title_001=UM POUCO DE RETALIAÇÃO <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
headhunters_ChainElimAll_1C_AttackXT_M_desc_001=Acabei de receber autorização da minha Juíza para começar a combater a XenoThreat. Estou de olho em alguns pontos sob o controle deles perto de ~mission(Location|Address).\n\nEu lhe darei os alvos a serem atingidos, você mata todos que encontrar. Diabos, eu mesmo adoraria ir, parece divertido.\n\n-Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x2, Soldiers x5, Technicians x5\n<EM4>Sr. Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_1C_AttackXT_M_title_001=Eliminando Alguns Lixos da XenoThreat <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
headhunters_ChainElimAll_1C_ElimSpec_AttackCFP_M_desc_001=Temos tentado jogar limpo com esse pessoal da Citizens for Prosperity, mas eles deixaram bem claro que não temos lugar em seu “sistema seguro”. O uso de mercenários para segurança tem causado todo tipo de violência irracional, como quando esse idiota da ~mission(TargetName) abriu fogo contra um grupo de colonos para afastá-los de um posto avançado que eles estavam de olho. Portanto, agora as luvas estão caindo.\n\nPreciso de alguns trabalhadores para ir até ~mission(Location|Address) e eliminar ~mission(TargetName|Last). É provável que eles fiquem escondidos até que você prove que é uma ameaça suficiente, portanto, certifique-se de causar algum dano.\n\nStows desligando.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x4, Juggernauts x1, Soldiers x5, Technicians x5\n<EM4>Veteran Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_1C_ElimSpec_AttackCFP_M_title_001=Expulsando a CFP <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
headhunters_ChainElimAll_2C_ElimSpec_AttackCFP_H_desc_001=Recebi a notícia da minha Juíza de que devemos retomar alguns dos postos avançados que a CFP assumiu. Eles estão um pouco irritados com o fato de a CFP estar se estabelecendo tanto no sistema e acham que isso está fazendo com que os Headhunters pareçam fracos.\n\nEncontrei alguns candidatos perto de ~mission(Location|Address) que precisam de eliminação. A cereja do bolo é que o chefe de segurança de lá é ~mission(TargetName). Não sei se você já ouviu falar dele, mas ele atiraram em um punhado de Clips no mês passado, então é uma situação em que todos ganham. Recuperar um pouco de território e dar um soco em alguém que realmente merece.\n\nStows desligando.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x5, Juggernauts x1, Soldiers x6, Technicians x6\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_2C_ElimSpec_AttackCFP_H_title_001=Varrer e Limpar Alguns Lugares da CFP <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
headhunters_ChainElimAll_2C_ElimSpec_AttackXT_H_desc_001=Preciso de alguns bons soldados com gosto pela violência para atacar alguns esconderijos da XenoThreat localizados nos arredores de ~mission(Location|Address). Eu lhe darei os detalhes se você estiver interessado, mas você terá que acabar com dois grupos separados de esconderijos. \n\nTambém soubemos que ~mission(TargetName) está à espreita por lá. Se você eliminar um número suficiente de vagabundos da XenoThreat, ele aparecerá. \n\nQuando o fizer, coloque uma bala nele.\n\nStows desligando.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x4, Juggernauts x1, Soldiers x5, Technicians x6\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_2C_ElimSpec_AttackXT_H_title_001=Tomando Terreno da XenoThreat <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
headhunters_ChainElimAll_3C_ElimSpec_AttackCFP_VH_desc_001=Temos um grande problema aqui. Precisamos de uma equipe para ir até ~mission(Location|Address). Dizem que a CFP está escondida em três agrupamentos diferentes na área. Nossa Juíza quer que todos sejam eliminados. Parece que um de seus mercenários, um verdadeiro patife chamado ~mission(TargetName), está escondido em um deles. Queremos que você vá até lá, limpe todos eles e elimine ~mission(TargetName|Last).\n\nGanhe uma boa grana no processo.\n\nStows desligando.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x6, Juggernauts x1, Soldiers x8, Technicians x8\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_3C_ElimSpec_AttackCFP_VH_title_001=Ataque um Complexo da CFP <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
headhunters_ChainElimAll_3C_ElimSpec_AttackXT_VH_desc_001=Tenho uma tarefa suculenta para qualquer executor de grande porte que queira receber um grande pagamento. Em ~mission(Location|Address), temos um território da XenoThreat administrado por um verdadeiro bastardo chamado ~mission(TargetName). Se você está no sistema há tempo suficiente, provavelmente já ouviu falar de ~mission(TargetName|Last) ou pelo menos viu o trabalho dele. O malandro tem a tendência de deixar corpos onde quer que vá.\n\nDe qualquer forma, a Juiza quer que essa área seja limpa, o que significa que você deve atacar todos os três agrupamentos e matar todos os sujos da XenoThreat que encontrar. Mate o suficiente e ~mission(TargetName|Last) não conseguirá se esconder.\n\nAcabe com todos eles e tome uma com a gente.\n\nStows desligando.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 6/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x6, Juggernauts x1, Soldiers x10, Technicians x8\n<EM4>Head Contractor:</EM4> +400 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_3C_ElimSpec_AttackXT_VH_title_001=Derrubando um Esconderijo da XenoThreat <EM4>[BP]</EM4> <EM4>[400 Rep]</EM4>
headhunters_ChainElimAll_AttackCFP_E_desc_001=Procuramos alguém que tenha coceira no dedo do gatilho. Estamos querendo atacar alguns CFP em ~mission(Location|Address) e tomá-lo para nós. Mas é preciso jogar com inteligência. Há vários postos avançados satélites ao redor da base principal e todos eles têm segurança, portanto, você deve eliminar cada um deles antes de tomar a base principal.\n\nMas, se você quiser ir direto para o fundo e lutar contra todos os reforços, é com você. Contanto que você consiga fazer isso.\n\Stows desligando.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 6/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x6, Snipers x4, Soldiers x6, Technicians x4\n<EM4>Head Contractor:</EM4> +400 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_AttackCFP_E_title_001=Hora de ir pra cima da CFP <EM4>[BP]</EM4> <EM4>[400 Rep]</EM4>
headhunters_ChainElimAll_AttackGen_E_desc_001=Estamos procurando alguns batedores para atacar com violência alguns idiotas locais que estão fazendo trabalhos no sistema contra os Headhunters. Tentamos entrar em contato para explicar o erro de suas escolhas, mas eles mataram nosso mensageiro, então agora vamos com a opção B.\n\nVocê os encontrará escondidos perto de ~mission(Location|Address). Vá até lá e repinte as paredes com o sangue deles.\n\nDivirta-se.\n\nStows desligando.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 6/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x6, Snipers x4, Soldiers x9, Technicians x4\n<EM4>Elite Contractor:</EM4> +400 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_AttackGen_E_title_001=Entrar em guerra <EM4>[BP]</EM4> <EM4>[400 Rep]</EM4>
headhunters_ChainElimAll_Boss_XenoThreat_VH_desc_001=Esses idiotas da XenoThreat são como alopratas. Toda vez que você pensa que os eliminou, eles voltam a aparecer. Parece que eles voltaram a fazer o que sempre fazem e estão tentando criar algo grande. Não faço ideia do que seja, mas fomos liberados para impedi-lo antes que comece.\n\nUm grupo de figurões da XenoThreat está supostamente se reunindo em ~mission(Location|Address) para planejar ou apenas se enfurecer ou seja lá o que for que eles fazem, mas nós vamos acabar com isso. Ou você vai.\n\nVá até lá e acabe com todos que encontrar. Sem dúvida, tenho certeza de que os grandes entrarão na briga. É o que eles sempre fazem.\n\nEssa vai ser difícil. Por mais que eu odeie a XenoThreat, eles são muito bons em uma briga, portanto, tome cuidado e traga ajuda se puder.\n\nStows desligando.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 6/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x90, Juggernauts x4\n<EM4>Elite Contractor:</EM4> +400 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_Boss_XenoThreat_VH_title_001=Ataque o comando da XenoThreat <EM4>[BP]</EM4> <EM4>[400 Rep]</EM4>
headhunters_EliminateAll_XenoThreat_H_desc_001=Um dos nossos encontrou um grupo de XenoThreat escondido perto de ~mission(Location|Address). Não temos certeza se estão entrincheirados ou apenas de passagem, mas queremos atingi-los antes que se movam.\n\nTalvez você possa levar algumas pessoas, caso as tenha, pois a XenoThreat não costuma cair fácil. Chegue lá e lembre-os de quem é o poder nesse sistema.\n\nEstiva desligando\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x2, Juggernauts x1, Snipers x1, Soldiers x2, Technicians x1\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateAll_XenoThreat_H_title_001=Ataque a XenoThreat em ~mission(Location) <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
headhunters_EliminateSpecific_Asteroid_Generic_M_desc_001=Preciso cuidar de alguém. Ele está escondido perto de ~mission(Location|Address). Não tenho certeza se você quer saber quem é, mas o nome dele é ~mission(TargetName). Não há muito o que dizer, um bandido local que matou alguém que estava ligado a ele.\n\nEle está fugindo, então deve estar nervoso. Eu me aproximaria com cautela.\n\nStows desligando\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Ravager-212 Twin Shotgun\n- Ripper "Sunblock" SMG\n- [S1-A] Deadrig Shotgun Magazine (8 cap)\n- [S1-A] Dust Devil Armor Arms\n- [S1-A] Dust Devil Armor Core\n- [S1-A] Dust Devil Armor Legs\n- [S1-A] Manticore Helmet\n- [S1-A] Ravager-212 Twin Shotgun Magazine (16 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x30, Juggernauts x4\n<EM4>Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_Asteroid_Generic_M_title_001=Preciso de uma morte me ~mission(Location) <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
headhunters_EliminateSpecific_Asteroid_Generic_VE_desc_001=Soube de uma equipe que está fazendo trabalhos e construindo uma reputação para si mesma. Como eles disseram que não querem ter nada a ver com os Headhunters, estamos tentando separá-los antes que se tornem um problema. O líder deles é um vagabundo chamado ~mission(TargetName) e achamos que, se ele se deparasse com a ponta errada de uma bala, o resto deles se desintegraria.\n\nFomos informados de que você pode encontrar ~mission(TargetName|Last) nas proximidades de ~mission(Location|Address). Vá até lá e cuide disso.\n\nEles não devem ser um grande problema para um profissional como você.\n\nStows desligando\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- Coda "Big Boss" Pistol\n- Coda "Nighthawk" Pistol\n- Coda Pistol\n- Scalpel Sniper Rifle\n- [S1-A] Coda Pistol Magazine (6 cap)\n- [S1-A] Morozov-SH Arms\n- [S1-A] Morozov-SH Core\n- [S1-A] Morozov-SH Helmet\n- [S1-A] Morozov-SH Legs\n- [S1-A] Scalpel Sniper Rifle Magazine (12 cap)\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- Devastator "Midnight" Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator Shotgun\n- [S1-A] Devastator Shotgun Battery (12 cap)\n- [S1-A] Morozov-SH Arms Thule\n- [S1-A] Morozov-SH Core Thule\n- [S1-A] Morozov-SH Helmet Thule\n- [S1-A] Morozov-SH Legs Thule\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x24, Soldiers x3\n<EM4>Neutral:</EM4> +50 Rep\n<EM4>Jr. Contractor:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_Asteroid_Generic_VE_title_001=Golpe no espaço profundo <EM4>[BP]</EM4> <EM4>[50 Rep]</EM4>
headhunters_EliminateSpecific_CFP_E_desc_001=Meu chefe está procurando um batedor disponível. Os Headhunters estão procurando retomar ~mission(Location|Address). Os Mercs da CFP de lá estão se preparando para uma longa luta. Olhe, não queremos matar ninguém que não seja necessário, então estamos procurando outras opções.\n\nA segurança de lá está sendo comandada por ~mission(TargetName) e minha Juíza acha que, se ele for eliminado, o resto vai se dispersar. Derramar um pouco de sangue é melhor do que muito, certo?\n\n-Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Coda "Big Boss" Pistol\n- Coda "Nighthawk" Pistol\n- Coda Pistol\n- Scalpel Sniper Rifle\n- [S1-A] Coda Pistol Magazine (6 cap)\n- [S1-A] Morozov-SH Arms\n- [S1-A] Morozov-SH Core\n- [S1-A] Morozov-SH Helmet\n- [S1-A] Morozov-SH Legs\n- [S1-A] Scalpel Sniper Rifle Magazine (12 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x1, Juggernauts x1, Snipers x1, Soldiers x2, Technicians x2\n<EM4>Jr. Contractor:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_CFP_E_title_001=Tiro no caos <EM4>[BP]</EM4> <EM4>[50 Rep]</EM4>
headhunters_EliminateSpecific_CFP_H_desc_001=Os Headhunters estão lançando um ataque perto de ~mission(Location|Address). Esse ex-fuzileiro naval idiota chamado ~mission(TargetName) tem enviado seus mercenários para limpar os acampamentos próximos se eles não entregarem suas armas.\n\nEmbora toda a segurança tenha sido liberada, ~mission(TargetName|Last) foi destacado. Em sua última incursão, eles espancaram um invasor até a morte por ter respondido. Acontece que esse invasor era primo de um de nossos Clips, então ele está pagando mais para garantir que a justiça seja feita.\n\nMas tome cuidado, ~mission(TargetName|Last) pode ser um canalha que está se preparando para isso; ele ainda é ex-militar, então não será fácil derrubá-lo.\n\n-Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Devastator "Midnight" Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator Shotgun\n- [S1-A] Devastator Shotgun Battery (12 cap)\n- [S1-A] Morozov-SH Arms Thule\n- [S1-A] Morozov-SH Core Thule\n- [S1-A] Morozov-SH Helmet Thule\n- [S1-A] Morozov-SH Legs Thule\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> CQC x6, Juggernauts x2, Snipers x4, Soldiers x6, Technicians x4\n<EM4>Head Contractor:</EM4> +1,200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_CFP_H_title_001=Alvo Pago na CFP <EM4>[BP]</EM4> <EM4>[1,200 Rep]</EM4>
headhunters_EliminateSpecific_CFP_M_desc_001=Preciso de um gatilho disponível para derrubar um alvo em um posto avançado da CFP. Ele é uma verdadeira figura chamado ~mission(TargetName). Um mercenário da velha guarda cheio de crueldade.\n\nOuvi dizer que ele está em ~mission(Location|Address). Passe por lá e acabe com ele. Tente não causar muitos danos. Ele é o alvo, não qualquer outra pessoa.\n\nStows desligando\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- Coda "Big Boss" Pistol\n- Coda "Nighthawk" Pistol\n- Coda Pistol\n- Scalpel Sniper Rifle\n- [S1-A] Coda Pistol Magazine (6 cap)\n- [S1-A] Morozov-SH Arms\n- [S1-A] Morozov-SH Core\n- [S1-A] Morozov-SH Helmet\n- [S1-A] Morozov-SH Legs\n- [S1-A] Scalpel Sniper Rifle Magazine (12 cap)\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- Devastator "Midnight" Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator Shotgun\n- [S1-A] Devastator Shotgun Battery (12 cap)\n- [S1-A] Morozov-SH Arms Thule\n- [S1-A] Morozov-SH Core Thule\n- [S1-A] Morozov-SH Helmet Thule\n- [S1-A] Morozov-SH Legs Thule\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x1, Snipers x2, Soldiers x3, Technicians x4\n<EM4>Jr. Contractor:</EM4> +75 Rep\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_CFP_M_title_001=Preicsod e um CFP apagado <EM4>[BP]</EM4> <EM4>[75–100 Rep]</EM4>
headhunters_EliminateSpecific_Defector_desc_001=Essa merda me entristece. Não sei se você já cruzou o caminho de ~mission(TargetName) em suas negociações conosco. Achei que ele fosse muito bom. Ele esteve com os Headhunters por anos, mas algo deve ter acontecido porque ele foi correndo para a CFP em busca de proteção. Entregou alguns de nossos irmãos e irmãs ao longo do caminho.\n\nTodos os Juízes estão furiosos e querem sangue. É aí que você entra. Vá para ~mission(Location|Address), encontre ~mission(TargetName|Last) e mate- o. Não precisa ser nada sofisticado. Só quero o resultado.\n\nQue vergonha.\n\nStows desligando\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Devastator "Midnight" Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator Shotgun\n- [S1-A] Devastator Shotgun Battery (12 cap)\n- [S1-A] Morozov-SH Arms Thule\n- [S1-A] Morozov-SH Core Thule\n- [S1-A] Morozov-SH Helmet Thule\n- [S1-A] Morozov-SH Legs Thule\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x1, Juggernauts x1, Snipers x2, Soldiers x3\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_Defector_title_001=Apague um traidor <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
headhunters_EliminateSpecific_Generic_E_desc_001=Procurando por batedores disponíveis para um trabalho rápido. Em ~mission(Location|Address), eles estão sendo atacados por alguns gênios liderados por ~mission(TargetName). Já lutamos contra ~mission(TargetName|Last) no passado, portanto, não é surpresa que ele não tenha se ligado. \n\nQueremos que você vá até lá e os derrote. Mate quem quiser, mas ~mission(TargetName|Last) deve ser o seu foco.\n\nStows desligando\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Devastator "Midnight" Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator Shotgun\n- [S1-A] Devastator Shotgun Battery (12 cap)\n- [S1-A] Morozov-SH Arms Thule\n- [S1-A] Morozov-SH Core Thule\n- [S1-A] Morozov-SH Helmet Thule\n- [S1-A] Morozov-SH Legs Thule\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x1, Snipers x2, Soldiers x3, Technicians x4\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_Generic_E_title_001=Mate o rei <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
headhunters_EliminateSpecific_Generic_M_desc_001=Tenho uma equipe que tem atacado naves da Headhunter ultimamente. Seu líder é uma verdadeira figura chamada ~mission(TargetName). Nós os rastreamos até ~mission(Location|Address), então estamos procurando alguém para acabar com eles de vez.\n\nEsse grupo gosta de lutar, mas não deve ser um problema para alguém como você. \n\nVá até lá e dê jeito nisso.\n\nStows desligando\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Coda "Big Boss" Pistol\n- Coda "Nighthawk" Pistol\n- Coda Pistol\n- Scalpel Sniper Rifle\n- [S1-A] Coda Pistol Magazine (6 cap)\n- [S1-A] Morozov-SH Arms\n- [S1-A] Morozov-SH Core\n- [S1-A] Morozov-SH Helmet\n- [S1-A] Morozov-SH Legs\n- [S1-A] Scalpel Sniper Rifle Magazine (12 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x1, Snipers x1, Soldiers x2, Technicians x2\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Neutral:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_Generic_M_title_001=Preciso de alguém apgado <EM4>[BP]</EM4> <EM4>[25–50 Rep]</EM4>
headhunters_EliminateSpecific_Generic_VH_desc_001=Meus chefes informaram que estamos saldando dívidas antigas. Tenho uma carta branca pra um assassino antigo chamado ~mission(TargetName) que acumulou uma grande lista de mortes. Descobrimos que ele estava se escondendo com algumas pessoas em ~mission(Location|Address) que não são muito fãs de nós, portanto, provavelmente não vão gostar muito de você. ~mission(TargetName|Last) é o alvo aqui, mas talvez você tenha que se misturar com eles.\n\nNovamente, sempre que tentamos eliminar ~mission(TargetName|Last), ele mata o assassino. Acho que você se sairá melhor, mas eu levaria reforços, se for o caso.\n\nBoa sorte.\n\n-Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Coda "Big Boss" Pistol\n- Coda "Nighthawk" Pistol\n- Coda Pistol\n- Scalpel Sniper Rifle\n- [S1-A] Coda Pistol Magazine (6 cap)\n- [S1-A] Morozov-SH Arms\n- [S1-A] Morozov-SH Core\n- [S1-A] Morozov-SH Helmet\n- [S1-A] Morozov-SH Legs\n- [S1-A] Scalpel Sniper Rifle Magazine (12 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> CQC x5, Juggernauts x1, Snipers x3, Soldiers x5, Technicians x4\n<EM4>Head Contractor:</EM4> +1,200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_Generic_VH_title_001=Luz verde para ~mission(TargetName|Last) <EM4>[BP]</EM4> <EM4>[1,200 Rep]</EM4>
headhunters_EliminateSpecific_XenoThreat_H_desc_001=Os Headhunters acabaram de reunir uma equipe para atacar ~mission(Location|Address) e eliminar a XenoThreat de lá, mas estou querendo adicionar um seguro extra. \n\nVeja bem, há um grande atirador lá chamado ~mission(TargetName) que está na cadeia de comando da XenoThreat e queremos que ele seja eliminado. Todos os outros que você matar serão um molho, mas ele é seu alvo principal.\n\n-Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Coda "Big Boss" Pistol\n- Coda "Nighthawk" Pistol\n- Coda Pistol\n- Scalpel Sniper Rifle\n- [S1-A] Coda Pistol Magazine (6 cap)\n- [S1-A] Morozov-SH Arms\n- [S1-A] Morozov-SH Core\n- [S1-A] Morozov-SH Helmet\n- [S1-A] Morozov-SH Legs\n- [S1-A] Scalpel Sniper Rifle Magazine (12 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Juggernauts x1, Snipers x1, Soldiers x2, Technicians x2\n<EM4>Sr. Contractor:</EM4> +75 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_XenoThreat_H_title_001=Tenente da XenoThreat precisa ser morto <EM4>[BP]</EM4> <EM4>[75 Rep]</EM4>
headhunters_EliminateSpecific_XenoThreat_VH_desc_001=O negócio é o seguinte: acabamos de receber a notícia de que um jogador poderoso da XenoThreat chamado ~mission(TargetName) acabou de sair do esconderijo e foi visto em ~mission(Location|Address). \n\nOs Headhunters estão ansiosos para apgar esse imbecil há meses, por isso lançamos um ataque contra o posto avançado, mas a Juiza quer ter certeza de que ~mission(TargetName|Last) não escapará, por isso ela quer usar você como garantia.\n\nSerá uma morte difícil no meio de uma zona de guerra, mas pagaremos se você conseguir.\n\nStows desligando\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Coda "Big Boss" Pistol\n- Coda "Nighthawk" Pistol\n- Coda Pistol\n- Scalpel Sniper Rifle\n- [S1-A] Coda Pistol Magazine (6 cap)\n- [S1-A] Morozov-SH Arms\n- [S1-A] Morozov-SH Core\n- [S1-A] Morozov-SH Helmet\n- [S1-A] Morozov-SH Legs\n- [S1-A] Scalpel Sniper Rifle Magazine (12 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x3, Snipers x2, Soldiers x4, Technicians x3\n<EM4>Veteran Contractor:</EM4> +600 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_XenoThreat_VH_title_001=Procurado: ~mission(TargetName) <EM4>[BP]</EM4> <EM4>[600 Rep]</EM4>
headhunters_EliminateSpecific_XenoThreat_desc_001=Tenho uma pista sobre um XenoThreat que tem sido um pé no saco. Não tenho certeza se você já ouviu o nome, mas ~mission(TargetName) é um canalha até mesmo para os padrões de XenoThreat. Cruel, sádico e, ainda por cima, um babaca. Queremos que alguém chame seu número. Você está disposto a isso?\n\nA última notícia foi que ele estava em algum lugar perto de ~mission(Location|Address). Vá até lá e acabe com ele. Muito simples.\n\nStows desligando\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Devastator "Midnight" Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator Shotgun\n- [S1-A] Devastator Shotgun Battery (12 cap)\n- [S1-A] Morozov-SH Arms Thule\n- [S1-A] Morozov-SH Core Thule\n- [S1-A] Morozov-SH Helmet Thule\n- [S1-A] Morozov-SH Legs Thule\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x1, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Veteran Contractor:</EM4> +400 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_XenoThreat_title_001=Derrube um  XenoThreat <EM4>[BP]</EM4> <EM4>[400 Rep]</EM4>
headhunters_HaulCargo_RegionLink_desc_001=Você tem feito um bom trabalho para nós, então tenho um favor a pedir. Ainda vou pagar você, mas é um favor. Temos uma carga que precisa ser transportada de <EM4>~mission(Location|Address)</EM4> para <EM4>~mission(Destination|Address)</EM4> e o cara que ia fazer isso acabou ficando do lado errado de uma antecâmara de ar… mas enfim, o trabalho ainda precisa ser feito.\n\nSó que você vai precisar de uma nave capaz de transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>. Um <EM4>raio trator portátil</EM4> também seria inteligente levar junto.\n\nSe puder resolver isso para mim, seria ótimo.\n\n- Stows desligando\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +200 Rep
headhunters_HaulCargo_RegionLink_title_001=Pedido de transporte. <EM4>[200 Rep]</EM4>
headhunters_bombingrun_E_CFP_desc_001=Parece que não consigo passar um dia sem acordar com um dos meus funcionários reclamando sobre como a Citizens for Prosperity está dificultando a vida deles. \n\nEventualmente, vamos acabar com esses benfeitores do sistema, mas, por enquanto, vou me contentar com um pouco de paz e tranquilidade. \n\nVá para ~mission(Location|Address) e destrua os depósitos de combustível que a CFP tem lá. Isso deve, pelo menos, mantê-los fora de nossos negócios por um tempo.\n\n-Stows desligando\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Contractor:</EM4> +200 Rep
headhunters_bombingrun_E_CFP_title_001=DESTRUA OS SUPRIMENTOS DE COMBUSTÍVEL DA CITIZENS FOR PROSPERITY <EM4>[100–200 Rep]</EM4>
headhunters_bombingrun_E_desc_001=Alguns concorrentes criaram raízes em ~mission(Location|Address) e estão realmente atrapalhando nossas operações na área.\n\nAgora, parte de mim vê algum potencial nos novatos, então espero trazê-los para o grupo, mas, ao mesmo tempo, não posso me dar ao luxo de tê-los voando por aí causando problemas.\n\nEm vez disso, quero que você vá e exploda os tanques de combustível deles. Isso deve mantê-los no chão por tempo suficiente para que eu possa colocar algum juízo em suas cabeças duras.\n\n-Stows desligando\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Jr. Contractor:</EM4> +100 Rep
headhunters_bombingrun_E_title_001=ZONA DE RESTRIÇÃO DE VOO <EM4>[100 Rep]</EM4>
headhunters_bombingrun_H_XT_desc_001=Parece que a XenoThreat obteve as mesmas informações que nós e está tentando realizar o mesmo trabalho que nós. \n\nQuero que você tire a concorrência da jogada. Vá para ~mission(Location|Address) e destrua os tanques de combustível que eles têm lá.\n\nAssim, meu pessoal poderá terminar sem se preocupar com a XenoThreat atrapalhando a festa.\n\n-Stows desligando\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Contractor:</EM4> +100 Rep
headhunters_bombingrun_H_XT_title_001=EXPLODA AS RESERVAS DE COMBUSTÍVEL DA XENOTHREAT <EM4>[100 Rep]</EM4>
headhunters_bombingrun_H_desc_001=Olha, os Headhunters não perdem tempo com vingancinhas medíocres, mas eu também não vou deixar esse absurdo passar.\n\nAlgum babaca eliminou um grupo da minha equipe e tem se gabado por todo canto sobre isso. Também ouvi dizer que esse miolo-mole está estocando combustível quântico em <EM4>~mission(Location|Address)</EM4>. Eu adoraria ver como eles lidam com um calor de verdade quando você voar até lá e queimar tudo o que eles construíram até o chão. Ah, e com a quantidade de poder de fogo que eles reuniram por lá, não seria inteligente voar sozinho nessa, então leve uma equipe com você.\n\n-Stows desligando\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Sr. Contractor:</EM4> +200 Rep
headhunters_bombingrun_H_title_001=Acabando com o Estoque Deles <EM4>[200 Rep]</EM4>
headhunters_bombingrun_M_CFP_desc_001=Estou ficando muito cansado de ver a Citizens for Prosperity metendo o nariz onde não é chamada. \n\nComecei a pensar que seria muito bom aterrar a frota deles por um tempo. Explodimos os tanques de combustível deles em ~mission(Location|Address) e esses idiotas não irão a lugar algum rapidamente.\n\nParece ser o seu tipo de coisa?\n\n-Stows desligando\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Sr. Contractor:</EM4> +200 Rep
headhunters_bombingrun_M_CFP_title_001=EXPLODA AS RESERVAS DE COMBUSTÍVEL DA CITIZENS FOR PROSPERITY <EM4>[100–200 Rep]</EM4>
headhunters_bombingrun_M_title_001=PARANDO A CONCORRÊNCIA <EM4>[150 Rep]</EM4>
headhunters_bombingrun_S_desc_001=Ouvimos notícias de que uma nova gangue está planejando um ataque a um local em <EM4>~mission(Location|Address)</EM4>. Eles acham que, se conseguirem destruir os suprimentos de combustível, o lugar será deles.\n\nMas o que eles não sabem é que vamos enviar você primeiro para explodir os tanques de combustível, para que possamos reivindicar o local antes deles. Se tudo correr conforme o planejado, podemos limpar o local e ferrar com essa gangue ao mesmo tempo. Dois coelhos com uma cajadada só.\n\nO único problema é que este lugar está armado até os dentes. Traga uma tripulação e tire esses tanques de combustível de ação. Nós cuidaremos do resto.\n\n-Stows desligando\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Head Contractor:</EM4> +300 Rep
headhunters_bombingrun_S_title_001=Sendo mais Esperto que nossos Inimigos <EM4>[300 Rep]</EM4>
headhunters_bombingrun_VE_desc_001=Os Headhunters não chegaram onde estão hoje sendo bonzinhos. Rastreamos o esconderijo de um bando de novatos desprezíveis que estão invadindo nosso território. Preciso que você envie uma mensagem.\n\nVá até <EM4>~mission(Location|Address)</EM4> e exploda os tanques de combustível deles. Eles vão pensar duas vezes antes de se meterem em nossas operações quando seus navios estiverem em terra.\n\n-Stows desligando\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Neutral:</EM4> +100 Rep
headhunters_bombingrun_VE_title_001=Impedindo a Decolagem dos Novatos <EM4>[100 Rep]</EM4>
headhunters_bombingrun_VH_XT_desc_001=Não vou entrar na longa e complicada política de por que estou pedindo que você faça isso, mas é o suficiente para que você saiba que eu quero que isso seja feito. \n\nVá para ~mission(Location|Address) e exploda as reservas de combustível da XenoThreat lá. Isso realmente me ajudará a sair de uma situação difícil.\n\n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Elite Contractor:</EM4> +3,200 Rep
headhunters_bombingrun_VH_XT_title_001=DESTRUA AS RESERVAS DE COMBUSTÍVEL DA XENOTHREAT <EM4>[3,200 Rep]</EM4>
headhunters_bombingrun_VH_desc_001=Tenho um plano para lidar com um rato que anda me dando trabalho e preciso de uma mão.\n\nUm cliente deu calote em algumas dívidas e agora decidiu que não vai pagar. Recebi uma dica de que ele está se escondendo em <EM4>~mission(Location|Address)</EM4>. Se você destruir os tanques de combustível dele, ele não terá escolha a não ser reconsiderar suas decisões de merda.\n\nSó não subestime esse canalha. Ele pode ser burro, mas não é estúpido, se é que me entende. Ouvi dizer que este lugar está infestado de naves e torres; você teria que ser um completo miolo-mole para não levar reforços.\n\n-Stows desligando\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Veteran Contractor:</EM4> +250 Rep
headhunters_bombingrun_VH_title_001=Encurralando um Rato <EM4>[250 Rep]</EM4>
headhunters_bombingrun_killship_M_desc_001=Todos têm falado sobre um novo jogador chamado ~mission(TargetName) que está operando a partir de ~mission(Location|Address). Ele se tornou uma preocupação real para os Headhunters. \n\nÉ hora de acabar com ele. \n\nVá até lá, elimine ~mission(TargetName|Last) e, em seguida, esvazie os depósitos de combustível que eles têm lá para convencer os remanescentes a irem embora. \n\nImagino que, depois de fazer isso, ninguém se lembrará do nome dele.\n\n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Defenders x2, Targets x1\n<EM4>Sr. Contractor:</EM4> +200 Rep
headhunters_bombingrun_killship_M_title_001=Convencer Novatos a Abandonar o Setor <EM4>[200 Rep]</EM4>
headhunters_bombingrun_multi_E_CFP_desc_001=Todos os dias parece que o Citizens for Prosperity está por aí tentando fisgar mais pessoas para a sua causinha de merda e dificultar a vida de gente trabalhadora como nós.\n\nAcho que eles poderiam usar um lembrete sobre quem realmente manda aqui. Vá até ~mission(Location|Address) e detone o lugar.\n\nNada como um pouco de dano à propriedade para deixar uma mensagem clara.\n\n-Stows desligando\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Jr. Contractor:</EM4> +100 Rep
headhunters_bombingrun_multi_E_CFP_title_001=ENSINAR UMA LIÇÃO À CITIZENS FOR PROSPERITY <EM4>[100 Rep]</EM4>
headhunters_bombingrun_sabotage_servers_VH_desc_001=Quando as pessoas aprenderão que não podem fazer o que quiserem no território da Headhunter? Esses idiotas estão planejando um grande trabalho e acharam que eu os deixaria escapar? Nem no inferno.\n\nQuero que você voe até ~mission(Location|Address) e destrua seus tanques de combustível e servidores de dados. Mostre a eles o que os Headhunters realmente pensam deles.\n\nVamos ver se eles tentarão fazer alguma coisa depois disso.\n\n-Stows desligando\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Elite Contractor:</EM4> +3,200 Rep
headhunters_bombingrun_sabotage_servers_VH_title_001=IMPEÇA RIVAIS DE LANÇAREM UM ASSALTO <EM4>[3,200 Rep]</EM4>
headhunters_bounty_Pyro1_desc=pu bounty pve pyro headhunters generic pyro1\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
headhunters_bounty_Pyro2_desc=pu bounty pve pyro headhunters generic pyro2\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
headhunters_bounty_Pyro3_desc=pu bounty pve pyro headhunters generic pyro3\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
headhunters_bounty_Pyro5_desc=pu bounty pve pyro headhunters generic pyro5\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
headhunters_bounty_Pyro6_desc=pu bounty pve pyro headhunters generic pyro6\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
headhunters_defend_xt_desc_001=Esses punks da XenoThreat lançaram um ataque contra ~mission(Location|Address), por isso estamos procurando pessoas para combatê-los. \n\nVá até lá e acabe com todas os XenoThreats que você vir.\n\nStows desligando\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_defend_xt_title_001=PRECISO DE APOIO EM POSTO AVANÇADO <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
headhunters_defendship_LRT_PA_desc_001=Está ocupado? Um recruta promissor estava fazendo uma entrega especial para mim, mas encontrou problemas com a People’s Alliance perto de <EM4>~mission(Location|Address)</EM4>. Essa é por minha conta. Eu sabia que ele não era o melhor piloto de combate, mas achei que conseguiria fazer isso sem cruzar com outras naves. \n\nDisse para ele aguentar firme e fazer de tudo para continuar vivo até o reforço chegar. Não deve ser muito problema para alguém com suas habilidades.  \n\n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +100 Rep
headhunters_defendship_LRT_PA_title_001=Headhunter Precisa de Ajuda <EM4>[100 Rep]</EM4>
headhunters_defendship_LRT_desc_001=Acabei de receber a notícia de que um Headhunter perto de ~mission(Location|Address) se envolveu em uma briga e agora não consegue levar isso até o fim. O idiota quer que eu salve seu traseiro.\n\nAcho que sou mole, porque na verdade vou pagar para você fazer isso por mim. O que você acha? Quer salvar a vida de um idiota?\n\n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +150 Rep
headhunters_defendship_LRT_title_001=Piloto da Headhunter em Apuros <EM4>[150 Rep]</EM4>
headhunters_defendship_MRT_PA_desc_001=Alguns membros da People’s Alliance com desejo de morrer decidiram atacar uma de nossas naves. Preciso de alguém que vá imediatamente até <EM4>~mission(Location|Address)</EM4> e mostre a eles o que acontece quando se mexe com os Headhunters.\n\nStows desligando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +150 Rep
headhunters_defendship_MRT_PA_title_001=REFORÇO NECESSÁRIO IMEDIATAMENTE <EM4>[150 Rep]</EM4>
headhunters_defendship_MRT_desc_001=Um dos meus pilotos não estava pensando direito e se envolveu em um monte de problemas em ~mission(Location|Address). \n\nO que realmente importa é que o tolo tem uma carga cheia. Não posso me dar ao luxo de perder as coisas que ele está carregando, então eu agradeceria se você pudesse libertá-lo para mim.\n\n- Stows desligando\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +200 Rep
headhunters_defendship_MRT_title_001=Nave da Headhunter Precisa de Apoio <EM4>[200 Rep]</EM4>
headhunters_defendship_VLRT_PA_desc_001=Parece que algumas pessoas simplesmente não sabem lutar no espaço. Enviei um recruta jovem para uma patrulha e agora estou sendo bombardeado com mensagens dizendo que ele mal está conseguindo se segurar. Pedi para me atualizarem sobre com quem ele estava enfrentando, e quase caí da cadeira de tanto rir.    \n\nSe esse novato não consegue lidar com uma nave da People’s Alliance, então com certeza ainda não está pronto para missões de voo. Mesmo assim, agradeceria se você pudesse salvar a pele dele.\n\nSe estiver livre, pode ir até <EM4>~mission(Location|Address)</EM4> e mostrar como se faz?\n\n-Stows\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x2\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep
headhunters_defendship_VLRT_PA_title_001=Ajudar Recruta dos Headhunters <EM4>[100 Rep]</EM4>
headhunters_defendship_VLRT_desc_001=Parece que temos alguns novatos tentando interferir em nossas operações ao atacar uma nave da Headhunter perto de ~mission(Location|Address). Não tenho certeza de como eles esperavam se safar com isso.\n\nEles precisam aprender da maneira mais difícil que não é assim que as coisas funcionam em Pyro. Você está disposto a ir até lá e dar uma lição nesses bastardos?\n\n- Stows desligando\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep
headhunters_defendship_VLRT_title_001=PILOTO DA HEADHUNTER PRECISA DE UMA MÃO <EM4>[100 Rep]</EM4>
headhunters_defendship_multi_HRT_PA_desc_001=Enviei naves para investigar um sinal de socorro, mas acabou sendo uma emboscada da People’s Alliance. Eles têm lutado com tudo para escapar, mas não conseguem se desvencilhar.\n\nVamos mandar ajuda imediatamente. Acha que pode ir até <EM4>~mission(Location|Address)</EM4> para oferecer apoio?\n\n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Sr. Contractor:</EM4> +200 Rep
headhunters_defendship_multi_HRT_PA_title_001=APLIQUE O GOLPE DE MISERICÓRDIA <EM4>[200 Rep]</EM4>
headhunters_defendship_multi_SRT_PA_desc_001=Nos metemos em uma grande enrascada aqui. Uma nave dos Headhunters em uma missão importante foi atacada perto de <EM4>~mission(Location|Address)</EM4>. Não posso entrar em muitos detalhes, mas é absolutamente vital que eles sobrevivam. A People’s Alliance sabe disso também, porque estão jogando tudo o que têm contra eles.\n\nNão vou dourar a pílula. Esta é uma situação extremamente séria da qual muitos não sairiam vivos. Se você conseguir, vou cantar seus louvores e garantir que seja bem pago.\n\n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Head Contractor:</EM4> +300 Rep
headhunters_defendship_multi_SRT_PA_title_001=PROCURANDO UM MALDITO HERÓI <EM4>[300 Rep]</EM4>
headhunters_defendship_multi_VHRT_PA_desc_001=Um dos nossos Clips está em apuros. Acabei de receber uma comunicação dizendo que o comboio deles está sendo cercado pela People’s Alliance e precisa de ajuda imediatamente. Bem, eles disseram isso de um jeito mais... colorido. Só vou dizer que não quero ouvir o que vão me dizer se não sobreviverem e forem forçados a regenerar.\n\nA situação deve ser séria se esse Clip está surtando. Preciso muito que você vá até <EM4>~mission(Location|Address)</EM4> imediatamente e garanta que eles saiam vivos dessa.\n\nStows, desligando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Veteran Contractor:</EM4> +250 Rep
headhunters_defendship_multi_VHRT_PA_title_001=REÚNA-SE PARA AJUDAR O COMBOIO DOS CLIPS <EM4>[250 Rep]</EM4>
headhunters_eliminateall_XT_derelicts_desc_01=Um de nossos Juízes ficou sabendo que a XenoThreat está tentando entrar em nosso território. Parece que eles estão tentando assumir o controle de ~mission(Location|Address). Não queremos que esses psicopatas consigam mais espaço no sistema do que já têm, por isso estamos colocando algumas credenciais em jogo para fazê-los recuar.\n\nQueremos que você os ataque com força. Não desista até que todo o local seja um cemitério. Enviaremos seu pagamento quando os corpos estiverem prontos para serem enterrados.\n\n- Stows desligando\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x2, Snipers x2, Soldiers x4, Technicians x3\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_XT_derelicts_title_01=GUERRA DE TERRITÓRIO <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
headhunters_eliminateall_base_Generic_E_desc_001=A situação é a seguinte: temos alguns bandidos que se acham os melhores, fugindo de uma base perto de ~mission(Location|Address). Não sei que merda tóxica eles estão bebendo, mas acharam que seria uma boa ideia entrar em contato com alguns Clips da Headhunter. Matei um, feri mais três. Por isso, estou querendo enviar alguém para lá para explodir a ambição deles diretamente de seus crânios.\n\nVá até lá e faça isso. \n\n- Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x27\n<EM4>Jr. Contractor:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_base_Generic_E_title_001=Preciso de um matador <EM4>[BP]</EM4> <EM4>[50 Rep]</EM4>
headhunters_eliminateall_cfp_E_desc_001=Preciso de alguém para varrer ~mission(Location|Address). As forças de segurança da CFP tomaram o posto avançado de um grupo de moradores locais que estavam lá há anos. Pelo que ouvi, deram uma surra neles, então eles vieram até os Headhunters pedindo vingança. \n\nPreciso que seja feito rápido e limpo. \n\nStows desligando\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x1, Juggernauts x2, Snipers x1, Soldiers x2, Technicians x2\n<EM4>Jr. Contractor:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_cfp_E_title_001=Atacando um local da CFP <EM4>[BP]</EM4> <EM4>[50 Rep]</EM4>
headhunters_eliminateall_cfp_M_desc_001=A Juíza disse que devemos atacar ~mission(Location|Address). É propriedade da CFP e a segurança de lá não tem sido muito hospitaleira com alguns moradores locais, então eles precisam ir.\n\nEles podem falar muito sobre trazer segurança, mas eles têm armas e estão mais do que felizes em usá-las.\n\nStows desligando\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x2, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Jr. Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_cfp_M_title_001=Luz verde para ~mission(Location) <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
headhunters_eliminateall_cfp_desc_001=O negócio é o seguinte. Alguns dos mercenários que a CFP contratou como segurança atiraram em alguns Headhunters que estavam apenas se movendo pelo sistema. Eles nem estavam fazendo nada, apenas voando.\n\nDe qualquer forma, nós os rastreamos até ~mission(Location|Address) e queremos nos vingar. Pegue seu equipamento e seja nossa arma, faremos com que valha a pena.\n\n- Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_cfp_title_001=BUSCANDO UM POUCO DE VIGANÇA <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
headhunters_eliminateall_outpost_desc_01=Alguns idiotas estão se recusando a nos pagar o que nos é devido. O problema é que esses idiotas estão se gabando disso. Se eles tivessem mantido o silêncio, poderíamos ter resolvido o problema de forma mais cirúrgica, mas agora precisamos enviar uma mensagem.\n\nOs idiotas estão operando a partir de ~mission(Location|Address). Precisamos que todos eles desapareçam. Faça tanto barulho quanto puder. Enviaremos seu pagamento assim que todos forem atendidos.\n\n- Stows desligando\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_outpost_title_01=GERENCIAMENTO DE REPUTAÇÃO <EM4>[BP]</EM4> <EM4>[25–300 Rep]</EM4>
headhunters_eliminateall_retrievestolen_base_Generic_M_desc_001=Uma equipe local decidiu atacar um de nossos comboios e roubar nossas coisas. Eles escaparam, mas não vamos deixá-los comemorar por muito tempo. Quero que você vá até ~mission(Location|Address), onde eles têm uma base, queime-os até virar cinzas e recupere nossas coisas. \n\nQuando você tiver a carga, leve-a para ~mission(Destination|Address) e todos nós poderemos esquecer que esses idiotas existiram.\n\nStows desligando\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x27\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_retrievestolen_base_Generic_M_title_001=Carga e morte <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
headhunters_eliminateall_xt_desc_001=É triste dizer isso, mas perdemos um de nossos postos avançados para a XenoThreat. É terrível, se quer saber, mas é por isso que estamos procurando alguém que tenha tempo e munição para recuperá-lo.\n\nSe for você, vá até ~mission(Location|Address) e recupere-o.\n\nStows desligando.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x4, Technicians x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_xt_title_001=Luz verde em ~mission(Location) <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
headhunters_eliminatespecific_desc_001=Algumas informações interessantes acabaram de cair no meu colo. Acho que o notório líder da XenoThreat ~mission(TargetName) está escondido na ~mission(location|address) trabalhando em alguma grande operação para eles. Oportunidade perfeita para matar o pedaço de merda de uma vez por todas. O problema é que os Xenos estão de olho em todas as operações da Headhunter no momento. Não há como mobilizarmos e enviarmos uma equipe sem que ~mission(TargetName|Last) seja avisada. Portanto, estou lhe oferecendo a chance de tornar Pyro um lugar melhor e ganhar alguns créditos ao mesmo tempo.\n\nSe estiver interessado, sugiro que se prepare e encontre reforços antes de sair. Você só será pago se eliminar ~mission(TargetName|Last), mas não hesite em matar qualquer outro XenoThugs que possa estar escondido lá com eles.  \n\nStows desligando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x1
headhunters_eliminatespecific_title_001=PRONTO PARA RETRIBUIÇÃO <EM4>[1,000 Rep]</EM4>
headhunters_killship_asteroid_rank0_desc_001=O negócio é o seguinte: os caçadores de talentos estão procurando expandir seu pool de talentos e têm algumas vagas para quem tiver coragem.\n\nHá uma verdadeira figura chamada ~mission(TargetName) que acha que tem sido muito esperto ao roubar cargas dos transportadores que circulam pelo sistema. Pedimos uma parte de seus lucros como um imposto de licenciamento para continuar operando. Quando ~mission(TargetName|Last) respondeu, foi muito desrespeitoso.\n\nRastreamos a nave dele até ~mission(Location|Address) e precisamos que ele seja eliminado. Você deve saber que ele está sendo esperto e se aproximando de alguns aliados para não ficar sozinho.\n\nFaça isso e nós o consideraremos para futuros trabalhos da Headhunter.\n\nStows desligando\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1\n<EM4>Neutral:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_killship_asteroid_rank0_title_001=ALVO ATINGIDO PARA UM CAMINHO MAIS RÁPIDO <EM4>[BP]</EM4> <EM4>[50 Rep]</EM4>
headhunters_killship_asteroid_rank1_desc_001=Há um ninho que precisa ser eliminado ao redor de ~mission(Location|Address) que foi tomado por alguns invasores. Não nos importamos com a maioria deles, mas soubemos que eles estão abrigando ~mission(TargetName), que tem um longo histórico de roubo de itens da Headhunter. Chegou a hora de acabar com eles.\n\nDizem que ~mission(TargetName|Last) está em uma nave, mas pode contar com as defesas da base para protegê-lo, portanto, tenha cuidado. Se você os matar, será pago. \n\nVocê sabe, o de sempre.\n\nStows desligando\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1\n<EM4>Jr. Contractor:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_killship_asteroid_rank1_title_001=Alvo em ~mission(Location) <EM4>[BP]</EM4> <EM4>[50 Rep]</EM4>
headhunters_killship_cfp_hrt_desc_001=Preciso que outra nave da CFP seja eliminada. Ela pertence a ~mission(TargetName), que está expulsando os moradores de suas casas se eles não aceitarem a ajuda da Citizens for Prosperity. Ele é uma verdadeira figura e recebemos autorização para acabar com ele.\n\nA nave dele foi vista nas proximidades de ~mission(Location|Address), portanto, vá até lá e faça acontecer.\n\nStows desligando.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1\n<EM4>Veteran Contractor:</EM4> +600 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
