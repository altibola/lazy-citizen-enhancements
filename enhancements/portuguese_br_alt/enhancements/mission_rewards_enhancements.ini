Intersec_DefendShip_Desc_Easy_001=ESPECIFICAÇÕES DA MISSÃO\n\nÁrea de Operação: Sistema Nyx \nForças Hostis: Foras da Lei\nEspecificações de Equipamento: Nave de Combate \nBriefing: Requer-se assistência urgente para um agente da InterSec que está atualmente sob fogo em <EM4>~mission(Location|Address)</EM4>.\n\nUm grupo de foras da lei havia previamente capturado nosso agente com a intenção de extrair informações confidenciais, mas milagrosamente ele conseguiu escapar. Infelizmente, os foras da lei em perseguição agora o têm encurralado.\n\nDevido ao número de naves atacantes, estamos oferecendo compensação adicional para cobrir o perigo extra. <EM4>É altamente aconselhável recrutar naves adicionais</EM4> para dar suporte nesta missão.\n\nAtenciosamente, \n\nDeacon Tobin \nGerente de Operações \nInterSec Defense Solutions \n\nEsta comunicação consiste em informações confidenciais destinadas unicamente ao destinatário. Por favor, desconsidere se recebida por engano e notifique o remetente. Todas as operações são conduzidas sob o risco pessoal do contratado e devem aderir à lei da UEE e do sistema, quando aplicável.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Pulse "Rouge" Pistol\n- [S1-A] Pulse Laser Pistol Battery (60 Cap)\n- [S1-A] Testudo Arms Combustion\n- [S1-A] Testudo Core Combustion\n- [S1-A] Testudo Helmet Combustion\n- [S1-A] Testudo Legs Combustion\n- [S2-A] Testudo Backpack Combustion\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
