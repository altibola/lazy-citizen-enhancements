HeadHunters_DefendEntitesAndEscort_VE_Desc=Não vou entediá-lo com os detalhes minuciosos, mas acredite em mim quando digo que <EM4>~mission(Location|Address)</EM4> é importante para os Headhunters. Então imagine o quão p*to eu estou ao saber que eles estão sendo atormentados por alguns novatos agressivos que estão obcecados em destruir seus <EM>~mission(Objects)</EM4>. Isso não vai ficar assim.\n\nChegue lá e forneça proteção antes que tudo seja destruído, incluindo <EM4>quaisquer naves aliadas</EM4> na área. Esperamos que cérebros ocos como esses não representem um desafio muito grande para uma estrela em ascensão como você.\n\nLimpe todos eles e eu lançarei <EM4>~mission(ScripAmount) Council Scrip</EM4> para quem aceitar este trabalho.\n\n- Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Nyx]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [CIV-S0-B] Kelvid\n- [CIV-S0-D] Winter-Star SL\n- [CIV-S1-B] Cryo-Star\n- [CIV-S1-B] Endo\n- [CIV-S1-B] FlashFreeze\n- [CIV-S1-D] BlastChill\n- [CIV-S1-D] Winter-Star\n- [CIV-S2-B] Cryo-Star EX\n- [CIV-S2-B] FullFrost\n- [CIV-S2-B] Taiga\n- [CIV-S2-D] WhiteOut\n- [CIV-S2-D] Winter-Star EX\n- [CIV-S3-B] Cryo-Star XL\n- [CIV-S3-B] FrostBite\n- [CIV-S3-D] ColdSurge\n- [CIV-S3-D] Winter-Star XL\n\n<EM4>[Pyro]</EM4>\n- [CIV-S0-D] DuraJet\n- [CIV-S1-D] ZapJet\n- [CIV-S2-A] Lotus\n- [CIV-S2-D] SparkJet\n- [CIV-S3-A] TigerLilly\n- [CIV-S3-D] SparkJet Pro\n- [IND-S0-B] Defiant\n\n<EM4>[Stanton]</EM4>\n- [CIV-S0-C] PIN\n- [CIV-S1-B] 6SA 'Arbiter'\n- [CIV-S1-B] HEX\n- [CIV-S1-C] 5SA 'Rhada'\n- [CIV-S1-C] WEB\n- [CIV-S2-B] 6MA 'Kozane'\n- [CIV-S2-B] BLOC\n- [CIV-S2-C] 5MA 'Chimalli'\n- [CIV-S2-C] STOP\n- [CIV-S3-B] 6CA 'Bila'\n- [CIV-S3-C] 5CA 'Akura'\n- [CIV-S3-C] GUARD\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x5, Reinforcements x3\n<EM4>Friendlies:</EM4> Escort Wings x2\n<EM4>Rep:</EM4> +100\n<EM4>Blueprint Reward:</EM4> Guaranteed
HeadHunters_DefendEntitesAndEscort_VE_Title=MANTER ~mission(Location) EM SEGURANÇA <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
HeadHunters_DefendEntitesAndEscort_VH_Desc=Bem, eu achei que tínhamos feito um bom trabalho em manter as coisas discretas, mas parece que o fato de <EM4>~mission(Location|Address)</EM4> ter laços com os Headhunters vazou. Agora há alguns operadores pesados causando grandes problemas por lá, visando os <EM>~mission(Objects)</EM4> e geralmente me causando uma dor de cabeça enorme.\n\nCom a quantidade de poder de fogo que esses intrusos estão carregando, você vai precisar trazer uma <EM4>tripulação própria</EM4> para dar conta disso. Especialmente porque preciso que você proteja quaisquer <EM4>naves aliadas</EM4> que precisem de ajuda.\n\nEsta operação precisa ocorrer sem imprevistos, então estou oferecendo ao contratante principal <EM4>~mission(ScripAmount) Council Scrip</EM4> por um trabalho bem feito.\n\nStows encerrando.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Nyx]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [CIV-S0-B] Kelvid\n- [CIV-S0-D] Winter-Star SL\n- [CIV-S1-B] Cryo-Star\n- [CIV-S1-B] Endo\n- [CIV-S1-B] FlashFreeze\n- [CIV-S1-D] BlastChill\n- [CIV-S1-D] Winter-Star\n- [CIV-S2-B] Cryo-Star EX\n- [CIV-S2-B] FullFrost\n- [CIV-S2-B] Taiga\n- [CIV-S2-D] WhiteOut\n- [CIV-S2-D] Winter-Star EX\n- [CIV-S3-B] Cryo-Star XL\n- [CIV-S3-B] FrostBite\n- [CIV-S3-D] ColdSurge\n- [CIV-S3-D] Winter-Star XL\n- [B-S1-A] Tarantula GT-870 Mark 1 Cannon\n- [B-S1-A] YellowJacket GT-210 Gatling\n- [B-S2-A] Scorpion GT-215 Gatling\n- [B-S2-A] Tarantula GT-870 Mark 2 Cannon\n- [B-S3-A] Mantis GT-220 Gatling\n- [B-S3-A] Tarantula GT-870 Mark 3 Cannon\n- [MIL-S3-A] V880\n\n<EM4>[Pyro]</EM4>\n- [CIV-S0-D] DuraJet\n- [CIV-S1-D] ZapJet\n- [CIV-S2-A] Lotus\n- [CIV-S2-D] SparkJet\n- [CIV-S3-A] TigerLilly\n- [CIV-S3-D] SparkJet Pro\n- [IND-S0-B] Defiant\n- [B-S4-A] AD4B Ballistic Gatling\n- [B-S5-A] AD5B Ballistic Gatling\n- [B-S6-A] AD6B Ballistic Gatling\n- [MIL-S1-A] V801-11\n- [MIL-S2-A] V801-12\n\n<EM4>[Stanton]</EM4>\n- [CIV-S0-C] PIN\n- [CIV-S1-B] 6SA 'Arbiter'\n- [CIV-S1-B] HEX\n- [CIV-S1-C] 5SA 'Rhada'\n- [CIV-S1-C] WEB\n- [CIV-S2-B] 6MA 'Kozane'\n- [CIV-S2-B] BLOC\n- [CIV-S2-C] 5MA 'Chimalli'\n- [CIV-S2-C] STOP\n- [CIV-S3-B] 6CA 'Bila'\n- [CIV-S3-C] 5CA 'Akura'\n- [CIV-S3-C] GUARD\n- [B-S1-A] SW16BR1 “Buzzsaw” Repeater\n- [B-S2-A] SW16BR2 “Sawbuck” Repeater\n- [B-S3-A] SW16BR3 “Shredder” Repeater\n- [MIL-S1-B] Tige\n- [MIL-S2-B] Vigilance\n- [MIL-S3-B] Devoue\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x24, Interdiction Ships x4, Reinforcements x16\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Rep:</EM4> +250\n<EM4>Blueprint Reward:</EM4> Guaranteed
