EckhartSecurity_EliminateAll_DC_Desc_001=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Limpar Localização\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nUm cliente está enviando comunicações frenéticas de que um de seus locais está sob ataque. Precisamos de um contratado que possa se apressar para <EM4>~mission(Location|Address)</EM4> e limpar o local de atores hostis.\n\nDe acordo com o pessoal no local, os foras da lei estão atualmente escondidos perto de <EM4>~mission(Location)</EM4>. Aproxime-se com cautela e esteja preparado para usar força letal se os foras da lei resistirem à remoção.\n\nO pagamento será emitido após a conclusão bem-sucedida do contrato.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x20, Juggernauts x2, Snipers x4, Soldiers x12, Technicians x2\n<EM4>Security Trainee:</EM4> +500 Rep (Failure: -50)\n<EM4>Security Trainee:</EM4> +500 Rep
EckhartSecurity_EliminateAll_DC_Title_001=Expulsar Criminosos <EM4>[500 Rep]</EM4>
EckhartSecurity_EliminateAll_storm_data_H_desc_001=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHOS\n\nTIPO DE CONTRATO: Limpar Localização\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPROCESSAMENTO IMEDIATO\n\nRecebemos um pedido urgente da Associated Science & Development para fornecer apoio de combate em ~mission(Location). Aparentemente, eles foram atacados por foras da lei e suas forças de segurança não conseguiram lidar com a situação sozinhas. \n\nVocê está autorizado a ir até o local e auxiliar os elementos de segurança locais na eliminação dos foras da lei, mas a ASD se reserva o direito de restringir seu acesso a certas áreas.\n\nEsta é uma operação de combate confirmada, então prepare-se adequadamente.\n\nEste contrato não é egociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações são destinadas ao uso do indivíduo ou entidade designado acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x4, Soldiers x9, Technicians x4\n<EM4>Applicant:</EM4> +2,000 Rep
EckhartSecurity_EliminateAll_storm_data_H_title_001=Apoio de Combate: ~mission(Location) <EM4>[2,000 Rep]</EM4>
EckhartSecurity_EliminateAll_storm_shut_H_desc_001=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHOS\n\nTIPO DE CONTRATO: Limpar Localização\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPROCESSAMENTO IMEDIATO\n\nRecebemos um pedido de emergência da Associated Science & Development solicitando que qualquer operador disponível se apresente em ~mission(Location) para lidar com hostis que tomaram uma de suas instalações. \n\nAo chegar, você deverá engajar e eliminar todos os elementos hostis. A ASD informou que essa instalação fornece serviço de transporte para um de seus centros de pesquisa incorporados, mas foi muito clara ao dizer que você **não está autorizado** a viajar até lá. Invasores serão abatidos, e você **não será exceção**, então mantenha-se na área de operações designada.\n\nEste contrato é inegociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações são destinadas ao uso do indivíduo ou entidade designado acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x4, Soldiers x9, Technicians x4\n<EM4>Applicant:</EM4> +2,000 Rep
EckhartSecurity_EliminateAll_storm_shut_H_title_001=SOLICITANDO AJUDA <EM4>[2,000 Rep]</EM4>
EckhartSecurity_EliminateBoss_DC_Desc_001=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHOS\n\nTIPO DE CONTRATO: Caçada\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nRecebemos informações úteis sobre um procurado perigoso, que se mostrou extremamente evasivo. <EM4>~mission(TargetName)</EM4> foi visto com um contingente dedicado de associados conhecidos em <EM4>~mission(Location|Address)</EM4>. Estamos procurando um contratado pronto e disposto a executar essa recompensa antes que ele desapareça novamente.\n\nCom base nas tentativas anteriores de prender esse criminoso, há uma boa chance de que <EM4>~mission(TargetName|Last)</EM4> tente evitar um confronto direto e, em vez disso, envie seus aliados para confrontá-lo. Acreditamos que neutralizar essas forças de proteção e destruir a rede de segurança que elas fornecem é a melhor maneira de atrair a <EM4>~mission(TargetName|Last)</EM4> para enfrentá-lo diretamente. \n\nEspere enfrentar uma força significativa e habilidosa. Aconselhamos que você se planeje adequadamente. O pagamento será emitido após a conclusão bem-sucedida do contrato.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou da entidade designada acima.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [B-S2-A] Tigerstrike T-19P\n- [B-S4-A] C-788 Cannon\n- [B-S4-A] Revenant Gatling\n- [B-S6-A] Draugar Gatling\n- [MIL-S1-B] Fierell Cascade\n- [MIL-S2-B] UltraFlux\n- [MIL-S3-B] MegaFlux\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x32, Juggernauts x1, Snipers x2, Soldiers x13, Technicians x3\n<EM4>Security Trainee:</EM4> +500 Rep\n<EM4>Jr. Security Contractor:</EM4> +500 Rep\n<EM4>Blueprint Reward:</EM4> 100% chance (EliminateBoss only)\n\n<EM4>? = only the EliminateBoss variant awards blueprints</EM4>
EckhartSecurity_EliminateBoss_DC_Title_001=CAÇADA DE ALTO RISCO: ~mission(TargetName) <EM4>[BP?]</EM4> <EM4>[500 Rep]</EM4>
EckhartSecurity_Mercenary_Rehire_Desc_001=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHOS\n\nTIPO DE CONTRATO: Avaliação - Defender Localização\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nA Eckhart Security continua a avaliar possíveis novos contratados. De acordo com nossos registros, você já tentou um contrato de teste anteriormente. Entendemos como essa linha de trabalho pode ser exigente e imprevisível e gostaríamos de lhe dar outra chance de concluir um contrato de qualificação. \n\nSe estiver interessado, apresente-se em <EM4>~mission(Location|Address)</EM4> pronto para defender o local de um ataque de foras da lei. Conclua este contrato com êxito para receber pagamento e mais oportunidades de trabalho da Eckhart Security.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou da entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Boss x1, Hostiles x10, Private Security x4, Sentries x6\n<EM4>Unknown:</EM4> 11\n<EM4>Applicant:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -1,000 Rep
EckhartSecurity_Mercenary_Rehire_Title_001=REAVALIAÇÃO DE CONTRATADO DE SEGURANÇA <EM4>[500 Rep]</EM4>
EckhartSecurity_RecoverCargo_Easy_Description=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Recuperação de Carga\nCódigo de aprovação: = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nA carga do cliente estava no meio do transporte quando eles tiveram problemas na nave, e agora um grupo de fora da lei oportunistas está tentando lucrar com isso.\n\nSe aceitar, vá até <EM4>~mission(Location|Address)</EM4> e lide com os fora da lei que guardam a carga. Extraia-a usando um <EM4>raio trator de alta potência</EM4>, recupere a carga, carregue-a em uma nave que possa transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e deposite-a no elevador de carga em <EM4>~mission(Destination|Address)</EM4>.\n\nEste contrato é não negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. A informação destina-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Unknown:</EM4> 1\n<EM4>Jr. Contractor:</EM4> +100 Rep
EckhartSecurity_RecoverCargo_Easy_Title=CARGA DO CLIENTE PRECISA DE RECUPERAÇÃO <EM4>[100 Rep]</EM4>
EckhartSecurity_RecoverCargo_Hard_Description=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Recuperação de Carga\nCódigo de aprovação: = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nTemos um transporte precisando de apoio em <EM4>~mission(Location|Address)</EM4>. O sinal estava instável, mas as comunicações faziam parecer que um grupo de fora da lei descobriu o que estavam transportando e tentou tomar deles.\n\nConsiderando o estado das coisas antes de perdermos o contato, estou tratando isso como uma missão de recuperação. Múltiplos hostis são esperados no local, portanto, uma tripulação qualificada é crucial para o sucesso desta operação. Haverá um alto volume de carga para lidar, então será necessária uma nave que possa carregar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e um <EM4>raio trator de alta potência</EM4>.\n\nApós a extração bem-sucedida da carga, entregue no elevador de carga em <EM4>~mission(Destination|Address)</EM4>.\n\nEste contrato é não negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. A informação destina-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Unknown:</EM4> 1\n<EM4>Sr. Contractor:</EM4> +200 Rep
EckhartSecurity_RecoverCargo_Hard_Title=RECUPERAÇÃO DE REMESSA DE ALTO RISCO <EM4>[200 Rep]</EM4>
EckhartSecurity_RecoverCargo_Medium_Description=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Recuperação de Carga\nCódigo de aprovação: = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nProcurando por um contratado competente que possa salvar uma situação complicada. O piloto de confiança de um cliente aparentemente não era tão confiável e fugiu com uma remessa. Mas, felizmente, nossos rastreadores informam que a remessa está estática no momento, esperando para ser coletada. Se jogarmos nossas cartas direito, ainda há tempo para resolver isso.\n\nA nave abandonada está localizada em <EM4>~mission(Location|Address)</EM4> e será necessário um <EM4>raio trator de alta potência</EM4> para transportar as mercadorias. Uma nave que possa lidar com <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> é uma necessidade, e espere contato de quaisquer fora da lei para quem este piloto traidor esperava vender.\n\nUma vez recuperada, entregue a carga no elevador de carga em <EM4>~mission(Destination|Address)</EM4>.\n\nEste contrato é não negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. A informação destina-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Unknown:</EM4> 1\n<EM4>Contractor:</EM4> +150 Rep
EckhartSecurity_RecoverCargo_Medium_Title=OP. PADRÃO DE RECUPERAÇÃO DE CARGA <EM4>[150 Rep]</EM4>
EckhartSecurity_RecoverCargo_Super_Description=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Recuperação de Carga\nCódigo de aprovação: = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nEmitindo uma chamada imediata para um contratado altamente qualificado para retomar a carga de um cliente localizada em <EM4>~mission(Location|Address)</EM4>.\n\nO cliente contratou um transportador especialista para levar algo discretamente, mas parece que algumas informações sobre a remessa foram hackeadas ou vazadas. O piloto foi atacado e agora a remessa está à deriva. Precisamos que você e quaisquer naves de apoio que trouxer cheguem ao local antes que a carga seja perdida de vez.\n\nVocê precisará de um <EM4>raio trator de alta potência</EM4> e de uma nave capaz de armazenar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>.\n\nApós avaliar a situação e a importância que o cliente deu à recuperação da carga, decidimos conceder um pagamento alto pela entrega bem-sucedida da remessa no elevador de carga localizado em <EM4>~mission(Destination|Address)</EM4>.\n\nEste contrato é não negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. A informação destina-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Unknown:</EM4> 1\n<EM4>Head Contractor:</EM4> +300 Rep
EckhartSecurity_RecoverCargo_Super_Title=Retomada de Carga de Risco Extremo <EM4>[300 Rep]</EM4>
EckhartSecurity_RecoverCargo_VeryEasy_Description=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Recuperação de Carga\nCódigo de aprovação: = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nUm dos meus clientes estava no processo de transportar carga quando foi atacado por um grupo de fora da lei. Não conseguimos contatar a tripulação a bordo, mas os rastreadores indicam que a carga permanece intacta.\n\nPrecisamos de um contratado para ir até <EM4>~mission(Location|Address)</EM4>, recuperar a carga e entregá-la no elevador de carga localizado em <EM4>~mission(Destination|Address)</EM4>. Uma nave que possa armazenar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e um <EM4>raio trator de alta potência</EM4> são essenciais para isso. Atualmente, não detectamos nenhum hostil, mas isso pode mudar quando você chegar.\n\nEste contrato é não negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. A informação destina-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2\n<EM4>Unknown:</EM4> 1\n<EM4>Neutral:</EM4> +50 Rep
EckhartSecurity_RecoverCargo_VeryEasy_Title=Retomada de Carga de Baixo Risco <EM4>[50 Rep]</EM4>
EckhartSecurity_RecoverCargo_VeryHard_Description=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Recuperação de Carga\nCódigo de aprovação: = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nChamando um contratado qualificado para recuperar uma remessa deslocada localizada em <EM4>~mission(Location|Address)</EM4>. O transportador do cliente estava levando uma carga de alto valor quando decidiu responder a um sinalizador de socorro e foi emboscado por um grupo de fora da lei. O cliente acredita que seu piloto se foi, mas que sua carga ainda pode ser recuperada.\n\nAs informações que temos até agora são de que você precisará de uma nave que possa carregar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>, um <EM4>raio trator de alta potência</EM4> para deslocar os produtos, bem como suas naves de apoio para ajudar a lidar com os fora da lei no local.\n\nO cliente estará esperando que a entrega concluída seja feita no elevador de carga em <EM4>~mission(Destination|Address)</EM4>.\n\nEste contrato é não negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. A informação destina-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Unknown:</EM4> 1\n<EM4>Veteran Contractor:</EM4> +200 Rep
EckhartSecurity_RecoverCargo_VeryHard_Title=EXTRAÇÃO DE CARGA CRÍTICA <EM4>[200 Rep]</EM4>
Eckhart_Assassin_Sync_E_Desc_001=Um preço foi colocado nas cabeças de ~mission(TargetName) e ~mission(TargetName2). \n\nEmbora não seja estranho que dois alvos precisem ser atingidos, o cliente deseja transmitir uma mensagem muito específica e, portanto, os dois alvos precisam ser atingidos exatamente no mesmo momento. Os créditos adicionais devem compensar o esforço.\n\nE como os dois infelizmente não estão viajando juntos, nem é preciso dizer que você precisará de ajuda para conseguir isso. Certifique-se de trazer pessoas em quem você confia para lidar com mais de uma nave, pois os alvos costumam viajar com reforços. \n\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x2
Eckhart_Assassin_Sync_E_Title_001=Toque Duas Vezes <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_H_Desc_001=A missão é para dois alvos que devem ser eliminados ao mesmo tempo. \n\nPresumo que o cliente esteja preocupado porque, se não forem eliminados juntos, um deles se esconderá e tentará se vingar.\n\nEles se autodenominam ~mission(TargetName) e ~mission(TargetName2). \n\nEscolha uma equipe, divida e conquiste.\n\nE certifique-se de que quem quer que seja tenha habilidades, porque esses dois são conhecidos por serem capazes de se defender em uma luta, e você certamente não estará sozinho. Esteja preparado para que eles lhe causem problemas.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x2
Eckhart_Assassin_Sync_H_Title_001=Dois em Mente <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_Intro_Desc_001=Recebi uma tarefa interessante. Preciso eliminar dois alvos diferentes: ~mission(TargetName) e ~mission(TargetName2) \n\nO problema é que se um dos dois alvos descobrir que o outro foi atingido, eles cairão. Não podemos arriscar perder nenhum deles. \n\nIsso exigirá uma coordenação considerável, mas quero que você encontre os dois exatamente ao mesmo tempo. \nE como você não pode estar em dois lugares ao mesmo tempo, você precisa encontrar alguém em quem possa confiar para ajudá-lo.\n\nFelizmente, minhas informações dizem que ambos os destinos devem viajar sozinhos. Isso deve tornar as coisas um pouco mais fáceis para você.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x1, Targets x2
Eckhart_Assassin_Sync_Intro_Title_001=REMOÇÃO COORDENADA <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_M_Desc_001=Tenho a tarefa de eliminar dois homens promissores que estão causando problemas. Tem que estar limpo, as duas coisas têm que ser feitas ao mesmo tempo, senão podem causar mais problemas. Resumindo, você vai precisar de ajuda com isso.\n\nTanto ~mission(TargetName) quanto ~mission(TargetName2) sabem como lidar com eles mesmos, e nem as pessoas com quem voam para desprezar. Você pode esperar que cada um deles seja guardado por algumas naves.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x2
Eckhart_Assassin_Sync_M_Title_001=Eliminacao Dupla <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_S_Desc_001=Normalmente o par ~mission(TargetName) e ~mission(TargetName2) seria demais para incluir juntos. Ambos são os melhores quando se trata de combates aéreos, e a tripulação com quem voam é quase tão boa.\n\nMas recentemente eles se separaram - não sei por que - e estão voando separados por um momento. Alguém acha que esta é a melhor chance de eliminá-los. \n\nReúna algumas pessoas em quem você possa confiar e planeje um ataque simultâneo aos dois alvos. É muito perigoso arriscar que algum deles permaneça vivo após um ataque tão direto.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x2
Eckhart_Assassin_Sync_S_Title_001=Dividir e Conquistar <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_VE_Desc_001=Eu tenho outro par que precisa ser eliminado: ~mission(TargetName) e ~mission(TargetName2)\n\nEles estão no vento há alguns dias, mas acabaram de ressurgir. Se não os conseguirmos agora, não tenho certeza se teremos outra chance. Você precisará trazer um parceiro para garantir que ambos os alvos sejam atingidos ao mesmo tempo.\n\nNo que diz respeito a resistir, ~mission(TargetName) é conhecido por trazer um amigo para protegê-lo, e eu suspeito que ~mission(TargetName2) fará o mesmo.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x2, Targets x2
Eckhart_Assassin_Sync_VE_Title_001=Combinação Um-Dois <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_VH_Desc_001=~mission(TargetName) e ~mission(TargetName2).\n\nDois agentes sérios que recentemente decidiram agir contra seu chefe. Cada um dos dois viaja com uma armada pequena e bem treinada e penetra profundamente em território que não lhes pertence. Você e qualquer pessoa que você recrutar para ajudar irão eliminá-los, ambos ao mesmo tempo, para que eles não possam se reagrupar.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x2
Eckhart_Assassin_Sync_VH_Title_001=Combinação Mortal <EM4>[500 Rep]</EM4>
Eckhart_EscortShips_E_desc=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Escolta de Nave\nCÓDIGO DE APROVAÇÃO: = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nUm grupo de naves localizadas em <EM4>~mission(Location|Address)</EM4> está solicitando uma escolta. Se aceitar, dirija-se imediatamente ao local e aguarde instruções. O cliente alega que esta escolta é puramente uma medida de precaução, mas isso não significa que você deve baixar a guarda. Espere algumas forças hostis e lide com elas de forma adequada.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] M3A Cannon\n- [E-S2-A] M4A Cannon\n- [E-S3-A] M5A Cannon\n- [STH-S1-C] Shimmer\n- [STH-S2-C] Obscura\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4, Hostiles x2, Reinforcements x8\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Eckhart_EscortShips_E_title=Escolta Executiva <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Eckhart_EscortShips_H_desc=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Escolta de Nave\nCÓDIGO DE APROVAÇÃO: = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nNecessidade de um contratado que possa se apresentar agora. Um cliente se meteu em apuros em <EM4>~mission(Location|Address)</EM4> e precisa de uma escolta para se afastar de uma base de asteroides. Eles relataram múltiplas naves hostis e bem armadas, o que significa que você precisará da sua própria equipe para lidar com elas. Com base no relato do cliente, esses atacantes parecem altamente motivados, então provavelmente não recuarão facilmente.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [B-S1-A] Havoc Scattergun\n- [B-S2-A] Hellion Scattergun\n- [B-S3-A] Predator Scattergun\n- [E-S3-A] Quarreler Cannon\n- [STH-S1-A] Mirage\n- [STH-S2-A] Umbra\n- [D-S1-A] Suckerpunch Cannon\n- [D-S2-A] Suckerpunch-L Cannon\n- [D-S3-A] Suckerpunch-XL Cannon\n- [STH-S1-B] Veil\n- [STH-S2-B] Sheut\n- [E-S1-A] M3A Cannon\n- [E-S2-A] M4A Cannon\n- [E-S3-A] M5A Cannon\n- [STH-S1-C] Shimmer\n- [STH-S2-C] Obscura\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x5, Hostiles x3, Interdiction Ships x2, Reinforcements x16\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
