InterSec_SecurityPatrol_S_Desc_001=ESPECIFICAÇÕES DA MISSÃO\n\nÁrea de Operação: Sistema Nyx\nForças Hostis: Vanduul\nEspecificações de Equipamento: Naves com Classificação de Combate\nBriefing: Há uma preocupação crescente de que grupos de caça Vanduul estejam avançando ainda mais em Nyx. A primeira linha de defesa contra essa invasão são patrulhas aumentadas. A InterSec identificou um setor que teve um aumento na atividade Vanduul e está procurando alguém para patrulhar a região e fornecer uma atualização sobre ela.\n\nVocê começará sua patrulha em um <EM4>marcador de localização</EM4> enviado ao seu HUD e, em seguida, escaneará uma série de pontos de passagem ao longo de uma rota designada. As naves Vanduul neste setor são altamente habilidosas e agressivas, então a InterSec recomenda veementemente que você <EM4>traga várias naves prontas para combate como reforço</EM4> (backup).\n\nA InterSec entende o imenso perigo em que você estará nesta patrulha, então enviaremos um bônus especial de <EM4>~mission(ScripAmount) MG Scrip</EM4> para o contratado principal assim que o setor estiver limpo.\n\nRespeitosamente,\n\nDeacon Tobin\nGerente de Operações\nInterSec Defense Solutions\n\nEsta comunicação consiste em uma oferta não vinculativa que, após aceitação, pode ser imediatamente rescindida por qualquer uma das partes sem aviso prévio. Todas as operações são conduzidas por conta e risco pessoal do contratado e devem aderir à lei do sistema, quando aplicável.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Quartz "Deadfall" Energy SMG\n- Quartz "Lumen" Energy SMG\n- [S1-A] Quartz Energy SMG Battery (45 cap)\n- [S1-A] Testudo Arms Nightveil\n- [S1-A] Testudo Arms Turfwar\n- [S1-A] Testudo Core Nightveil\n- [S1-A] Testudo Core Turfwar\n- [S1-A] Testudo Helmet Nightveil\n- [S1-A] Testudo Helmet Turfwar\n- [S1-A] Testudo Legs Nightveil\n- [S1-A] Testudo Legs Turfwar\n- [S2-A] Testudo Backpack Nightveil\n- [S2-A] Testudo Backpack Turfwar\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 7/7\n<EM4>Hostiles:</EM4> Targets x51\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
