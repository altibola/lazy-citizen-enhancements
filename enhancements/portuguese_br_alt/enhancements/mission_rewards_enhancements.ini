recovery_desc=~mission(Contractor|RecoverItemDescription)\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Nyx]</EM4>\n- R97 "Kismet" Shotgun\n- R97 "Righteous" Shotgun\n- [S1-A] Monde Arms Delta Camo\n- [S1-A] Monde Arms Hemlock Camo\n- [S1-A] Monde Core Delta Camo\n- [S1-A] Monde Core Hemlock Camo\n- [S1-A] Monde Helmet Delta Camo\n- [S1-A] Monde Helmet Hemlock Camo\n- [S1-A] Monde Legs Delta Camo\n- [S1-A] Monde Legs Hemlock Camo\n- [S1-A] R97 Shotgun Magazine (18 cap)\n- Custodian "Midnight" SMG\n- Custodian "Scorched" SMG\n- Custodian SMG\n- [S1-A] Arden-SL Arms\n- [S1-A] Arden-SL Core\n- [S1-A] Arden-SL Helmet\n- [S1-A] Arden-SL Legs\n- [S1-A] Custodian SMG Magazine (60 cap)\n\n<EM4>[Stanton]</EM4>\n- Lumin V SMG\n- [S1-A] Inquisitor Arms Black\n- [S1-A] Inquisitor Arms Grey\n- [S1-A] Inquisitor Core Black\n- [S1-A] Inquisitor Core Grey\n- [S1-A] Inquisitor Legs Black\n- [S1-A] Inquisitor Legs Grey\n- [S1-A] Lumin V SMG Battery (45 cap)\n- [S1-A] Morningstar Helmet Icefall\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
