Foxwell_DefendEntitesAndEscort_VH_Desc=Ajuda urgente de naves necessária em <EM4>~mission(Location|Address)</EM4>. Um bando de marginais criminosos destrutivos que vem tentando fazer nome recentemente atacou com força um de nossos clientes de alta prioridade, <EM4>atacando suas naves e visando os ~mission(Objects) do cliente</EM4>. Será seu trabalho manter todos e tudo em segurança – embora não seja uma tarefa fácil.\n\nNão consigo enfatizar o suficiente o quão perigosos esses atacantes são, portanto certifique-se de <EM>trazer reforços</EM> para lidar com eles. Se você, a tripulação e as infraestruturas saírem intactas, ofereceremos uma quantia generosa de <EM4>~mission(ScripAmount) MG Scrip</EM4> ao contratante principal.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança garantida, licenciada para operar em toda a UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Nyx]</EM4>\n- [CIV-S0-A] Tepilo\n- [CIV-S0-C] Fridan\n- [CIV-S0-C] Frost-Star SL\n- [CIV-S1-A] Gelid\n- [CIV-S1-C] ArcticStorm\n- [CIV-S1-C] Berian\n- [CIV-S1-C] Frost-Star\n- [CIV-S2-A] Aufeis\n- [CIV-S2-C] ColdSnap\n- [CIV-S2-C] Frost-Star EX\n- [CIV-S2-C] Graupel\n- [CIV-S3-A] Kragen\n- [CIV-S3-B] Elsen\n- [CIV-S3-C] Draug\n- [CIV-S3-C] Frost-Star XL\n- [CIV-S3-C] FrostBurn\n- [E-S1-A] CF-117 Bulldog Repeater\n- [E-S2-A] CF-227 Badger Repeater\n- [E-S3-A] CF-337 Panther Repeater\n- [E-S4-A] CF-447 Rhino Repeater\n- [E-S5-A] CF-557 Galdereen Repeater\n- [E-S6-A] CF-667 Mammoth Repeater\n- [MIL-S0-A] V60-26\n\n<EM4>[Pyro]</EM4>\n- [CIV-S0-B] IonWave\n- [CIV-S0-C] Radix\n- [CIV-S1-B] IonBurst\n- [CIV-S1-B] MagnaBloom\n- [CIV-S1-C] LightBlossom\n- [CIV-S1-C] PowerBolt\n- [CIV-S2-B] IonSurge\n- [CIV-S2-B] Radiance\n- [CIV-S2-C] FullForce\n- [CIV-S3-B] Celestial\n- [CIV-S3-B] IonSurge Pro\n- [CIV-S3-C] FullForce Pro\n- [CIV-S3-C] NewDawn\n- [D-S1-A] DR Model-XJ1 Repeater\n- [D-S2-A] DR Model-XJ2 Repeater\n- [D-S3-A] DR Model-XJ3 Repeater\n- [MIL-S1-A] Glacier\n- [MIL-S2-A] Avalanche\n- [MIL-S3-A] Blizzard\n\n<EM4>[Stanton]</EM4>\n- [CIV-S1-A] 7SA 'Concord'\n- [CIV-S1-D] INK\n- [CIV-S2-A] 7MA 'Lorica'\n- [CIV-S2-D] RPEL\n- [CIV-S3-A] 7CA 'Nargun'\n- [CIV-S3-D] HAVEN\n- [E-S4-A] Attrition-4 Repeater\n- [E-S5-A] Attrition-5 Repeater\n- [E-S6-A] Attrition-6 Repeater\n- [MIL-S0-B] Sens\n- [MIL-S1-B] Tige\n- [MIL-S3-A] FR-86\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x24, Interdiction Ships x4, Reinforcements x16\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Rep:</EM4> +250\n<EM4>Blueprint Reward:</EM4> Guaranteed
