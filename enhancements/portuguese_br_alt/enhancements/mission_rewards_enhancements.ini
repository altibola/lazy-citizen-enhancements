Foxwell_SecurityPatrol_VE_Desc_001=Hora de realizar uma patrulha de rotina para um de nossos clientes de longa data. A rota consiste em uma série de pontos que precisam ser visitados e escaneados para confirmar que tudo está conforme o esperado. Deve ser simples o bastante.  \n\nSe estiver interessado, aceite o contrato e vá até o <EM4>marcador de localização</EM4> no seu HUD para começar. Complete a missão e o contratado principal receberá um pagamento bônus de <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n‘Segurança, do Seu Jeito’\n\nA Foxwell Enforcement é uma especialista em segurança credenciada e licenciada para operar por todo o UEE. Estamos sempre buscando novos operadores para se juntar à nossa equipe. Se você ou alguém que conhece estiver interessado, entre em contato com um de nossos representantes de contratos.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sanguine" Energy Assault Rifle\n- [S1-A] Antium Arms Sand\n- [S1-A] Antium Core Sand\n- [S1-A] Antium Helmet Sand\n- [S1-A] Antium Legs Sand\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Targets x4\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_SecurityPatrol_VE_Title_001=CONTRATO DE NÍVEL AMARELO: PATRULHA DE ROTINA <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_SecurityPatrol_VH_Desc_001=Um cliente precisa da nossa ajuda. Criminosos estão circulando por certos setores onde ele realiza negócios, atacando quem quer que encontrem. Nosso cliente já perdeu várias naves e não pode perder mais nenhuma. \n\nPrecisamos de alguém para patrulhar essas áreas e atrair qualquer força hostil. A missão começa com você indo até o <EM4>marcador de localização</EM4> no seu HUD e fazendo a varredura. Depois, enviaremos vários outros pontos de patrulha para você escanear. \n\nPelas informações, esses grupos de naves contam com pilotos habilidosos e agressivos. É melhor estar pronto para o combate se encontrar algum deles. Seria bom ter pelo menos <EM4>dois pilotos confiáveis</EM4> ao seu lado para essa missão.\n\nAo final de uma patrulha bem-sucedida, o contratado principal receberá um pagamento bônus de <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\nMantenha a calma,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n‘Segurança, do Seu Jeito’\n\nA Foxwell Enforcement é uma especialista em segurança credenciada e licenciada para operar por todo o UEE. Estamos sempre em busca de novos operadores para se juntar à nossa equipe. Se você ou alguém que conhece estiver interessado, entre em contato com um de nossos representantes de contratos.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sanguine" Energy Assault Rifle\n- [S1-A] Antium Arms Sand\n- [S1-A] Antium Core Sand\n- [S1-A] Antium Helmet Sand\n- [S1-A] Antium Legs Sand\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Targets x63\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_SecurityPatrol_VH_Title_001=CONTRATO DE NÍVEL VERMELHO: PATRULHA DE SEGURANÇA DE ALTO RISCO <EM4>[BP]</EM4> <EM4>[250 Rep]</EM4>
Foxwell_ShipAmbush_E_desc_001=Um fora da lei que estava foragido finalmente retornou ao sistema. Parece que ele esperava que desaparecer por um tempo faria a gente se esquecer dele. Eles nem estão tentando esconder sua identidade ou variar sua rotina, o que significa que sabemos exatamente onde ele estará.\n\nAs últimas informações indicam que ele está voando um <EM4>~mission(AmbushTarget)</EM4> e passará por <EM4>~mission(Location|Address)</EM4> em breve. Já encontrei uma nuvem de emissão que é um lugar perfeito para você se esconder, desligar sua nave e esperar. A única variável real é se ele estará sozinho ou não. Ouvimos dizer que às vezes ele anda com amigos que voam naves de assento único. Desferir o primeiro golpe surpresa será importante, pois essa equipe é experiente em combate, mas teremos reforços prontos para oferecer suporte, se necessário.\n\nRealize essa missão e daremos ao contratado principal um pagamento bônus de <EM4>~mission(ScripAmount) Scrip da MG</EM4>.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma empresa de segurança licenciada para operar em todo o UEE. Estamos sempre à procura de novos operadores para fazer parte da nossa família. Se você ou alguém que conhece tiver interesse, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sunstone" Energy Assault Rifle\n- [S1-A] Antium Arms Jet\n- [S1-A] Antium Core Jet\n- [S1-A] Antium Legs Jet\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x2, Hostile Wave x7, Targets x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipAmbush_E_title_001=CONTRATO DE NÍVEL AMARELO: ATAQUE SURPRESA <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_ShipAmbush_H_desc_001=Recentemente, um <EM4>~mission(AmbushTarget)</EM4> enganou as forças da Foxwell com um falso sinal de resgate. Quando nossas forças perceberam o que estava acontecendo, uma esquadrilha de naves desferiu um ataque devastador e apenas um contratado da Foxwell sobreviveu. Seus logs de escaneamento identificaram a nave isca, e desde então nossos batedores estão monitorando-os.\n\nNossa vigilância revelou que a esquadrilha segue um padrão de voo regular que acreditamos poder explorar. Há uma grande nuvem de emissão em <EM4>~mission(Location|Address)</EM4> que a torna um ponto ideal para se posicionar. Acha que tem o que é necessário para lidar com isso por nós? \n\nSerá você contra o <EM4>~mission(AmbushTarget)</EM4>, outras naves grandes e uma escolta considerável. Gostaria de poder ser mais específico, mas essa equipe rotaciona regularmente as naves da esquadrilha. Seria inteligente trazer algum apoio, para não ser sobrecarregado pelo número deles.   \n\nComplete a missão e daremos ao contratado principal um pagamento bônus de <EM4>~mission(ScripAmount) Scrip da MG</EM4>.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma empresa de segurança licenciada para operar em todo o UEE. Estamos sempre à procura de novos operadores para fazer parte da nossa família. Se você ou alguém que conhece tiver interesse, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sunstone" Energy Assault Rifle\n- [S1-A] Antium Arms Jet\n- [S1-A] Antium Core Jet\n- [S1-A] Antium Legs Jet\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x12, Targets x5\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipAmbush_H_title_001=CONTRATO DE NÍVEL LARANJA: DEVOLVER O FAVOR <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
Foxwell_ShipAmbush_M_desc_001=A Foxwell tem rastreado um <EM4>~mission(AmbushTarget)</EM4> usado por fora da lei e descobriu um padrão em seus movimentos. A nave deve passar por <EM4>~mission(Location|Address)</EM4> em breve.\n\nEstamos procurando um contratado disposto a correr até lá, se esconder na nuvem de emissão e, então, armar a emboscada no momento certo. Normalmente, há naves de escolta com o <EM4>~mission(AmbushTarget)</EM4>. Cuidado para não se antecipar e comprometer sua posição. O elemento surpresa é crucial, pelo que li.\n\nRealize isso e daremos ao contratado principal um pagamento bônus de <EM4>~mission(ScripAmount) Scrip da MG</EM4>.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma empresa de segurança licenciada para operar em todo o UEE. Estamos sempre à procura de novos operadores para fazer parte da nossa família. Se você ou alguém que conhece tiver interesse, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sunstone" Energy Assault Rifle\n- [S1-A] Antium Arms Jet\n- [S1-A] Antium Core Jet\n- [S1-A] Antium Legs Jet\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x5, Targets x3\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Contractor:</EM4> +2,000 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipAmbush_M_title_001=CONTRATO DE NÍVEL LARANJA: PREPARAR UMA ARMADILHA <EM4>[BP]</EM4> <EM4>[150–2,000 Rep]</EM4>
Foxwell_ShipAmbush_S_desc_001=Recebemos alguns comunicados sobre ataques recentes realizados por um <EM4>~mission(AmbushTarget)</EM4> e suas naves de escolta. Após abrirmos um arquivo, começamos a rastrear os movimentos da nave e notamos que ela costuma passar por uma nuvem de emissão perto de <EM4>~mission(Location|Address)</EM4>. Queremos usar isso a nosso favor para lançar um ataque surpresa. \n\nUma vez no local, você deve se esconder na nuvem de emissão para ocultar sua assinatura o suficiente para permitir o primeiro golpe. Infelizmente, a Foxwell não pode fornecer reforços adicionais para essa operação, então você será responsável por trazer as forças de apoio necessárias. Você pode precisar de ajuda também. A tripulação do ~mission(AmbushTarget) é agressiva e experiente em combate.        \n\nSe você cuidar disso para nós, haverá um pagamento bônus de <EM4>~mission(ScripAmount) Scrip da MG</EM4> para o contratado principal.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma empresa de segurança licenciada para operar em todo o UEE. Estamos sempre à procura de novos operadores para fazer parte da nossa família. Se você ou alguém que conhece tiver interesse, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sunstone" Energy Assault Rifle\n- [S1-A] Antium Arms Jet\n- [S1-A] Antium Core Jet\n- [S1-A] Antium Legs Jet\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x6, Targets x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipAmbush_S_title_001=CONTRATO DE NÍVEL VERMELHO: ATAQUE SURPRESA <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
Foxwell_ShipAmbush_VE_desc_001=Gostaria de nos ajudar a dar um fim em um bandido? \n\nFomos contratados para caçar um fora da lei que pilota um <EM4>~mission(AmbushTarget)</EM4>. Não deve ser muito difícil, já que ele usa a mesma rota de voo todos os dias. Isso o torna um alvo principal para uma emboscada, se é que já vi um. Analisei a rota e determinei que <EM4>~mission(Location|Address)</EM4> é o local ideal para atacar. Há uma nuvem de emissão lá que será perfeita para esconder a assinatura de sua nave enquanto você espera.\n\nO trabalho é simples, se você estiver interessado. Vá para o local, esconda-se, desligue a nave e espere que ele passe voando. Às vezes ele viaja sozinho, mas frequentemente tem outras naves de um único assento com ele. Não deve ser muito difícil de lidar para um profissional. Além disso, ainda teremos reforços por perto e prontos para serem acionados assim que o ataque começar.\n\nSe você conseguir, daremos ao contratado principal um pagamento bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nBoa sorte,\n\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança, Do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança licenciada e garantida para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sunstone" Energy Assault Rifle\n- [S1-A] Antium Arms Jet\n- [S1-A] Antium Core Jet\n- [S1-A] Antium Legs Jet\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x6, Targets x2\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Neutral:</EM4> +500 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipAmbush_VE_title_001=CONTRATO DE NÍVEL AMARELO: EMBOSCAR UM AMADOR <EM4>[BP]</EM4> <EM4>[100–500 Rep]</EM4>
Foxwell_ShipAmbush_VH_desc_001=A Foxwell recebeu informações de um cliente importante de que fora da lei formaram um esquadrão que tem percorrido o sistema com naves subcapitais e caças de escolta. Nosso cliente está preocupado que, se deixados sem controle, os fora da lei formarão mais desses esquadrões de ataque e desestabilizarão a segurança do sistema. Fomos contratados para eliminar esse grupo antes que isso aconteça. \n\nPrecisamos de um contratado confiante e habilidoso para essa tarefa. A boa notícia é que já temos um plano. Uma das naves usadas por esse esquadrão, uma <EM4>~mission(AmbushTarget)</EM4>, foi roubada do nosso cliente, que ainda consegue rastrear seus movimentos. Eles compartilharam os dados de localização conosco e descobrimos que esse esquadrão frequentemente passa por <EM4>~mission(Location|Address)</EM4>. Fizemos um reconhecimento da área e descobrimos que uma grande nuvem de emissão torna o local ideal para uma emboscada.  \n\nNão vou mentir, não vai ser fácil. Não temos forças adicionais disponíveis para serem enviadas, então seria bom trazer seu próprio suporte. \n\nSe você conseguir realizar isso, eu providenciei um pagamento bônus de <EM4>~mission(ScripAmount) Scrip da MG</EM4> para o contratado principal.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma empresa de segurança licenciada para operar em todo o UEE. Estamos sempre à procura de novos operadores para fazer parte da nossa família. Se você ou alguém que conhece tiver interesse, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sunstone" Energy Assault Rifle\n- [S1-A] Antium Arms Jet\n- [S1-A] Antium Core Jet\n- [S1-A] Antium Legs Jet\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 5/7 | Risk 7/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x11, Targets x4\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipAmbush_VH_title_001=CONTRATO DE NÍVEL VERMELHO: EMBOSCAR ESQUADRÃO DE ATAQUE <EM4>[BP]</EM4> <EM4>[250 Rep]</EM4>
Foxwell_ShipWaveAttack_ClearHostiles_Desc_E_001=Certo, isso pode ser um pouco difícil de fazer sozinho, então se você tiver algum favor para cobrar, seria bom usar essas fichas agora. Há um grupo de desesperados atacando naves de entrega por todo este setor e fomos encarregados de limpá-los.\n\nAssim que sua tripulação estiver pronta, vá até ~mission(Location|Address) e elimine os hostis lá. Agora, esses desgraçados são um pouco espertos, então tendem a se dividir em bandos menores. Certifique-se de esperar por perto para eliminar até o último deles.\n \nBoa sorte,\n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança com garantia licenciada para operar em toda a UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x12\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipWaveAttack_ClearHostiles_Desc_H_001=Parece que algumas gangues pequenas e diferentes decidiram unir seus recursos e começar a fazer ataques coordenados. Sozinhas elas não eram muita coisa, mas todas juntas estão provando ser uma ameaça séria que precisa ser enfrentada.\n\nRecrute algum apoio em quem você possa confiar e voe para ~mission(Location|Address). Assim que você atacar os membros iniciais da gangue que encontrar lá, os outros grupos chegarão para apoiá-los. Certifique-se de esperar para eliminar todos eles.\n \nBoa sorte,\n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança com garantia licenciada para operar em toda a UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x22\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipWaveAttack_ClearHostiles_Desc_M_001=Um grupo dissidente de fora da lei se separou de uma das principais gangues do sistema e tem tentado agir por conta própria. Com a quantidade de problemas que estão causando, está claro que buscam estabelecer um nome para si o mais rápido possível. Caberá a você e sua equipe de apoio dar um fim neles.\n\nAssim que sua equipe estiver pronta, vá para ~mission(Location|Address) e enfrente a gangue. Nem todos estarão apenas esperando no local. Espere que reforços cheguem assim que você iniciar o seu assalto. Apenas certifique-se de ficar até que cada um deles tenha sido eliminado.\n \nBoa sorte,\n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança com garantia licenciada para operar em toda a UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x13\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipWaveAttack_ClearHostiles_Desc_VE_001=Há um pequeno grupo de criminosos que tem marcado seu território, atacando quaisquer cargueiros que cheguem perto o suficiente. Eles ficaram um pouco gananciosos demais, no entanto, porque agora alguém está nos pagando para lidar com eles.\n\nAssim que você e quem quer que você esteja trazendo estiverem prontos, vá para ~mission(Location|Address) e enfrente esses criminosos. Como eles gostam de voar em bandos separados, certifique-se de esperar por perto para eliminar até o último deles.\n \nBoa sorte,\n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança com garantia licenciada para operar em toda a UEE. Estamos sempre em busca de novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
