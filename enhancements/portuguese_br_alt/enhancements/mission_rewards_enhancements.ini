Covalex_HaulCargo_SingleToMulti_desc_ToCFP_Danger=Olá, \n\nVários postos avançados da Citizens for Prosperity em Pyro precisam de suprimentos. Parece que fazemos rotas como esta regularmente para eles, mas esta parece ser um pouco mais arriscada. Um representante da CFP me informou que a atividade de foras da lei em torno desses locais aumentou recentemente, mas eles precisam desesperadamente que esses postos avançados sejam reabastecidos, então estamos prosseguindo com a entrega. <EM4>Apenas um aviso de que você pode ter problemas, então venha preparado</EM4>.\n\nTodas as cargas estão esperando em <EM4>~mission(Location|Address)</EM4> e aqui é para onde elas estão indo:\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM) \n\n~mission(SingleToMultiToken) \n\nDe acordo com o manifesto, o maior contêiner de carga que você precisará manusear é <EM4>~mission(MissionMaxSCUSize)</EM4>. Fora isso, lembre-se de trazer um <EM4>raio trator portátil</EM4> (handheld tractor beam).\n\n~mission(Contractor|SignOff) \n  \nElla Tieno \nCoordenadora de Logística Jr.\nCovalex Shipping   \n'Tudo o que você precisar, onde você precisar.'\n\n\n\n\n\n\n\nCovalex Shipping é uma sociedade anônima de responsabilidade limitada. Para incentivar entregas dentro do prazo e prevenir fraudes em transportes de carga, a Covalex Shipping estabelecerá um limite de tempo de entrega e, após o vencimento, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será rateado de acordo com o percentual de carga entregue com sucesso.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-A] Palisade\n- [IND-S2-A] Rampart\n- [IND-S3-A] Parapet\n- [MIL-S1-A] VK-00\n- [MIL-S1-B] Siren\n- [MIL-S2-A] XL-1\n- [MIL-S2-B] Yeager\n- [MIL-S3-A] TS-2\n- [MIL-S3-B] Balandin\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x24\n<EM4>Blueprint Reward:</EM4> Guaranteed
Covalex_HaulCargo_SingleToMulti_desc_Valakkar_Timed=Olá, \n\nNosso cliente abateu um Valakkar e o processou em orgânicos. Eles têm compradores alinhados e esperando pelo material em alguns locais diferentes, então preciso de alguém para ir a <EM4>~mission(Location|Address)</EM4>, pegar tudo e depois entregar nos seguintes pontos: \n\nLOCAIS DE ENTREGA (QUALQUER ORDEM) \n\n~mission(SingleToMultiToken) \n\nDe acordo com o manifesto, o maior contêiner de carga que você precisará manusear é <EM4>~mission(MissionMaxSCUSize)</EM4>. Não se esqueça de trazer seu <EM4>raio trator portátil</EM4> (handheld tractor beam). Não sei como você moveria este material sem ele.\n\n~mission(Contractor|SignOff) \n\nElla Tieno \nCoordenadora de Logística Jr.\nCovalex Shipping   \n'Tudo o que você precisar, onde você precisar.'\n\n\n\n\n\n\n\nCovalex Shipping é uma sociedade anônima de responsabilidade limitada. Para incentivar entregas dentro do prazo e prevenir fraudes em transportes de carga, a Covalex Shipping estabelecerá um limite de tempo de entrega e, após o vencimento, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será rateado de acordo com o percentual de carga entregue com sucesso.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-A] Palisade\n- [IND-S2-A] Rampart\n- [IND-S3-A] Parapet\n- [MIL-S1-A] VK-00\n- [MIL-S1-B] Siren\n- [MIL-S2-A] XL-1\n- [MIL-S2-B] Yeager\n- [MIL-S3-A] TS-2\n- [MIL-S3-B] Balandin\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x24\n<EM4>Blueprint Reward:</EM4> Guaranteed
Covalex_HaulCargo_SingleToMulti_title=CLASSIFICAÇÃO ~mission(ReputationRank) - Transporte de Carga ~mission(CargoGradeToken) <EM4>[BP?]</EM4> <EM4>[50–8,000 Rep]</EM4>
Covalex_LocalDelivery_desc_01=Olá!\n\nAcabamos de receber uma entrega local que precisamos que seja realizada, se você estiver disponível. \n\nPACOTE PARA COLETA\n     · Pacote <EM4>#~mission(item1|serialnumber)</EM4> de <EM4>~mission(Pickup1|Address)</EM4>\n\nLOCAL DE ENTREGA\n     · Pacote <EM4>#~mission(item1|serialnumber)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>\n\nAlém disso, recomendamos fortemente que os contratados tragam um <EM4>raio trator portátil</EM4>.\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nCoordenador Jr. de Logística\nCovalex Shipping  \n'Tudo o que você precisa, onde você precisar.'\n\n*Covalex Shipping é uma sociedade de responsabilidade limitada. Ao aceitar este contrato, você concorda com todos os termos e condições conforme descrito em nosso guia suplementar 'Independent Workers Supplemental Information Guide v.2948.01.29.' A Covalex Shipping não se responsabiliza por quaisquer danos ocorridos durante a operação como contratado independente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Covalex_LocalDelivery_desc_02=Olá!\n\nOutra entrega entrou na minha fila e pensei em enviar para você. Deve ser uma corrida rápida com algumas paradas.\n\nPACOTES PARA COLETA (EM QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> do <EM4>~mission(Pickup1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> do <EM4>~mission(Pickup2|Address)</EM4>\n\nLOCAIS DE ENTREGA (EM QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para o <EM4>~mission(Dropoff1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para o <EM4>~mission(Dropoff2|Address)</EM4>\n\nAlém disso, recomendamos fortemente que os contratados tragam um <EM4>raio trator portátil</EM4>.\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nCoordenador Jr. de Logística\nCovalex Shipping  \n'Tudo o que você precisa, onde você precisar.'\n\n*Covalex Shipping é uma sociedade de responsabilidade limitada. Ao aceitar este contrato, você concorda com todos os termos e condições conforme descrito em nosso guia suplementar 'Independent Workers Supplemental Information Guide v.2948.01.29.' A Covalex Shipping não se responsabiliza por quaisquer danos ocorridos durante a operação como contratado independente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Covalex_LocalDelivery_desc_03=Ei,\n\nEspero mesmo que esteja disponível, porque estamos completamente sobrecarregados no momento. Aqui está uma entrega local que eu estava esperando que você pudesse assumir. \n\nPACOTES PARA COLETA (EM QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> do <EM4>~mission(Pickup1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> do <EM4>~mission(Pickup2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> do <EM4>~mission(Pickup3|Address)</EM4>\n\nLOCAIS DE ENTREGA (EM QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para o <EM4>~mission(Dropoff1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para o <EM4>~mission(Dropoff2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para o <EM4>~mission(Dropoff3|Address)</EM4>\n\nAlém disso, recomendamos fortemente que os contratados tragam um <EM4>raio trator portátil</EM4>.\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nCoordenador Jr. de Logística\nCovalex Shipping  \n'Tudo o que você precisa, onde você precisar.'\n\n*Covalex Shipping é uma sociedade de responsabilidade limitada. Ao aceitar este contrato, você concorda com todos os termos e condições conforme descrito em nosso guia suplementar 'Independent Workers Supplemental Information Guide v.2948.01.29.' A Covalex Shipping não se responsabiliza por quaisquer danos ocorridos durante a operação como contratado independente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Covalex_LocalDelivery_desc_04=Olá,\n\nTemos uma entrega com seu nome nela, se estiver disponível. É um pouco carregada, então certifique-se de ter espaço suficiente.\n\nPACOTES PARA COLETA (EM QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> do <EM4>~mission(Pickup1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> do <EM4>~mission(Pickup2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> do <EM4>~mission(Pickup3|Address)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> do <EM4>~mission(Pickup4|Address)</EM4>\n\nLOCAIS DE ENTREGA (EM QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para o <EM4>~mission(Dropoff1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para o <EM4>~mission(Dropoff2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para o <EM4>~mission(Dropoff3|Address)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> para o <EM4>~mission(Dropoff4|Address)</EM4>\n\nAlém disso, recomendamos fortemente que os contratados tragam um <EM4>raio trator portátil</EM4>.\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nCoordenador Jr. de Logística\nCovalex Shipping  \n'Tudo o que você precisa, onde você precisar.'\n\n*Covalex Shipping é uma sociedade de responsabilidade limitada. Ao aceitar este contrato, você concorda com todos os termos e condições conforme descrito em nosso guia suplementar 'Independent Workers Supplemental Information Guide v.2948.01.29.' A Covalex Shipping não se responsabiliza por quaisquer danos ocorridos durante a operação como contratado independente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Covalex_LocalDelivery_desc_05=Olá!\n\nPreciso que alguns pacotes sejam transportados se você tiver tempo e espaço. Aqui está a lista.\n\nPACOTES PARA COLETA (EM QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> do <EM4>~mission(Pickup1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> do <EM4>~mission(Pickup2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> do <EM4>~mission(Pickup3|Address)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> do <EM4>~mission(Pickup4|Address)</EM4>\n     · Pacote <EM4>#~mission(Item5|SerialNumber)</EM4> do <EM4>~mission(Pickup5|Address)</EM4>\n\nLOCAIS DE ENTREGA (EM QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para o <EM4>~mission(Dropoff1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para o <EM4>~mission(Dropoff2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para o <EM4>~mission(Dropoff3|Address)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> para o <EM4>~mission(Dropoff4|Address)</EM4>\n     · Pacote <EM4>#~mission(Item5|SerialNumber)</EM4> para o <EM4>~mission(Dropoff5|Address)</EM4>\n\nAlém disso, recomendamos fortemente que os contratados tragam um <EM4>raio trator portátil</EM4>.\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nCoordenador Jr. de Logística\nCovalex Shipping  \n'Tudo o que você precisa, onde você precisar.'\n\n*Covalex Shipping é uma sociedade de responsabilidade limitada. Ao aceitar este contrato, você concorda com todos os termos e condições conforme descrito em nosso guia suplementar 'Independent Workers Supplemental Information Guide v.2948.01.29.' A Covalex Shipping não se responsabiliza por quaisquer danos ocorridos durante a operação como contratado independente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Covalex_LocalDelivery_desc_intro=Olá!\n\nA Covalex está atualmente em busca de novos contratados para entregas. Para avaliar se você tem perfil para trabalhar conosco, organizamos a rota de entrega abaixo como teste de suas habilidades.\n\nPACOTE PARA COLETA\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> do <EM4>~mission(Pickup1|Address)</EM4>\n\nLOCAL DE ENTREGA\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para o <EM4>~mission(Dropoff1|Address)</EM4>\n\nCompletar esta rota com sucesso irá certificá-lo como um contratado oficial da Covalex.\n\nAlém disso, recomendamos fortemente que os contratados tragam um <EM4>raio trator portátil</EM4>.\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nCoordenador Jr. de Logística\nCovalex Shipping  \n'Tudo o que você precisa, onde você precisar.'\n\n*Covalex Shipping é uma sociedade de responsabilidade limitada. Ao aceitar este contrato, você concorda com todos os termos e condições conforme descrito em nosso guia suplementar 'Independent Workers Supplemental Information Guide v.2948.01.29.' A Covalex Shipping não se responsabiliza por quaisquer danos ocorridos durante a operação como contratado independente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500
Covalex_LocalDelivery_desc_rehire=Olá,\n\nComo a Covalex tem sofrido com um excesso de entregas e falta de contratados, consegui convencer a administração a reconsiderar seu status. Tudo o que você precisa fazer é completar com sucesso a seguinte entrega e você estará de volta à rotação.\n\nPACOTES PARA COLETA (EM QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> do <EM4>~mission(Pickup1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> do <EM4>~mission(Pickup2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> do <EM4>~mission(Pickup3|Address)</EM4>\n\nLOCAIS DE ENTREGA (EM QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para o <EM4>~mission(Dropoff1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para o <EM4>~mission(Dropoff2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para o <EM4>~mission(Dropoff3|Address)</EM4>\n\nAlém disso, recomendamos fortemente que os contratados tragam um <EM4>raio trator portátil</EM4>.\n\nBoa sorte. Seria ótimo tê-lo novamente em nosso quadro de contratados.\n\nChase Hewitt\nCoordenador Jr. de Logística\nCovalex Shipping  \n'Tudo o que você precisa, onde você precisar.'\n\n*Covalex Shipping é uma sociedade de responsabilidade limitada. Ao aceitar este contrato, você concorda com todos os termos e condições conforme descrito em nosso guia suplementar 'Independent Workers Supplemental Information Guide v.2948.01.29.' A Covalex Shipping não se responsabiliza por quaisquer danos ocorridos durante a operação como contratado independente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
