InterSec_SecurityPatrol_VH_desc_001=ESPECIFICAÇÕES DA MISSÃO\n\nÁrea de Operação: Sistema Nyx\nForças Hostis: Foras da Lei\nEspecificações de Equipamento: Naves com Classificação de Combate\nBriefing: A InterSec tem rastreado o aumento da atividade de foras da lei em certos setores do sistema. Essa atividade, juntamente com outras informações de inteligência, nos leva a crer que os foras da lei estão planejando um ataque a elementos que viajam da UEE. Nosso objetivo é patrulhar esses setores e interromper quaisquer planos antes que possam ser colocados em ação.\n\nAtualmente, precisamos de alguém que possa ajudar a patrulhar um setor altamente perigoso. Assim que aceitar a missão, você pode prosseguir para o <EM4>marcador de localização</EM4> em seu HUD. A partir daí, enviaremos você ao longo de uma rota específica com pontos de passagem adicionais para escanear. Complete a patrulha e enviaremos ao contratado principal um bônus de <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\nDevido à alta probabilidade de ataque e ao nível de ameaça geral dos foras da lei locais, recomendamos <EM4>recrutar *wingmen* (companheiros de ala) confiáveis</EM4> para fornecer suporte de combate.\n\nRespeitosamente,\n\nDeacon Tobin\nGerente de Operações\nInterSec Defense Solutions\n\nEsta comunicação consiste em uma oferta não vinculativa que, após aceitação, pode ser imediatamente rescindida por qualquer uma das partes sem aviso prévio. Todas as operações são conduzidas por conta e risco pessoal do contratado e devem aderir à lei do sistema, quando aplicável.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Quartz "Deadfall" Energy SMG\n- Quartz "Lumen" Energy SMG\n- [S1-A] Quartz Energy SMG Battery (45 cap)\n- [S1-A] Testudo Arms Nightveil\n- [S1-A] Testudo Arms Turfwar\n- [S1-A] Testudo Core Nightveil\n- [S1-A] Testudo Core Turfwar\n- [S1-A] Testudo Helmet Nightveil\n- [S1-A] Testudo Helmet Turfwar\n- [S1-A] Testudo Legs Nightveil\n- [S1-A] Testudo Legs Turfwar\n- [S2-A] Testudo Backpack Nightveil\