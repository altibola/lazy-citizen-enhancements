RedWind_Delivery_Illegal_Desc_01=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nTenho mais um trabalho especial que poderia usar sua ajuda. Deve ser uma corrida rápida.\n\nPACOTE PARA COLETA\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> de <EM4>~mission(Pickup1|Address)</EM4>\n\n     LOCAL DE ENTREGA\n          · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>\n\n          E, por favor, lembre-se de não incomodar os clientes ou seus convidados. Profissionalismo é a chave aqui.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Desc_02=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nTenho outro trabalho especial que preciso de um piloto em quem eu possa confiar para lidar.\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> de <EM4>~mission(Pickup1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> de <EM4>~mission(Pickup2|Address)</EM4>\n\nLOCAL DE ENTREGA (QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para <EM4>~mission(Dropoff2|Address)</EM4>\n\nEste é um cliente muito importante para nós, então, por favor, trate-os e seus pacotes com respeito extra.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Desc_03=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nRecebi outro trabalho especial de um dos nossos clientes mais privados.\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> de <EM4>~mission(Pickup1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> de <EM4>~mission(Pickup2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> de <EM4>~mission(Pickup3|Address)</EM4>\n\nLOCAL DE ENTREGA (QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para <EM4>~mission(Dropoff2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para <EM4>~mission(Dropoff3|Address)</EM4>\n\nLembre-se de tentar manter a descrição. A última coisa que esse cliente quer é chamar atenção para o seu negócio, e a última coisa que eu quero é um cliente insatisfeito. Especialmente neste caso.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Desc_04=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nTenho mais uma corrida especial. Achei que você seria o piloto certo para lidar com isso.\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> de <EM4>~mission(Pickup1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> de <EM4>~mission(Pickup2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> de <EM4>~mission(Pickup3|Address)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> de <EM4>~mission(Pickup4|Address)</EM4>\n\nLOCAL DE ENTREGA (QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para <EM4>~mission(Dropoff2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para <EM4>~mission(Dropoff3|Address)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> para <EM4>~mission(Dropoff4|Address)</EM4>\n\nMais uma vez, seja esperto e mantenha a boca fechada sobre qualquer coisa que possa ver ou ouvir enquanto estiver lá. Lembre-se, você está lá só pelos pacotes.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Desc_05=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nTenho mais um trabalho especial em que poderia usar sua ajuda. Este é um pouco mais complicado, já que há mais pacotes para controlar. Aqui está a lista:\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> de <EM4>~mission(Pickup1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> de <EM4>~mission(Pickup2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> de <EM4>~mission(Pickup3|Address)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> de <EM4>~mission(Pickup4|Address)</EM4>\n     · Pacote <EM4>#~mission(Item5|SerialNumber)</EM4> de <EM4>~mission(Pickup5|Address)</EM4>\n\nLOCAL DE ENTREGA (QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para <EM4>~mission(Dropoff2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para <EM4>~mission(Dropoff3|Address)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> para <EM4>~mission(Dropoff4|Address)</EM4>\n     · Pacote <EM4>#~mission(Item5|SerialNumber)</EM4> para <EM4>~mission(Dropoff5|Address)</EM4>\n\nCertifique-se de que os pacotes certos cheguem ao destino certo. Você realmente não vai querer ter que explicar um erro desses para esses clientes em particular.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Desc_Intro=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nEu sei que você já fez um bom trabalho para nós no passado, então achei que valia a pena ver se você estaria interessado em lidar com uma corrida especial para nós, um pouco mais longe no sistema do que o que você tem feito até agora.\n\nResumindo, precisamos de um piloto disposto a manter a cabeça baixa, focar em entregar os pacotes e, mais importante, não fazer muitas perguntas.\n\nVeja bem, para uma empresa menor como a nossa, manter-se à frente da concorrência significa que precisamos oferecer aos nossos clientes algo que eles não conseguem em outro lugar - discrição. Na Red Wind, enquanto você tenha os créditos, nós levamos qualquer coisa para qualquer lugar. Entendido?\n\nSe isso soa bem para você, vamos ver como você se sai nessa corrida -\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> de <EM4>~mission(Pickup1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> de <EM4>~mission(Pickup2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> de <EM4>~mission(Pickup3|Address)</EM4>\n\nLOCAL DE ENTREGA (QUALQUER ORDEM)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para <EM4>~mission(Dropoff2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para <EM4>~mission(Dropoff3|Address)</EM4>\n\nUma última dica, seria bom evitar quaisquer atrasos desnecessários assim que você tiver os pacotes a bordo, como por exemplo ser revistado pela fiscalização local.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Title_01=Entrega Discreta de Correio Red Wind <EM4>[500 Rep]</EM4>
RedWind_Delivery_Illegal_Title_Intro=Red Wind precisa de mensageiros discretos <EM4>[500 Rep]</EM4>
RedWind_HaulCargo_AToB_ASD_Desc=RED WIND LINEHAUL \n'SEUS PRODUTOS EM BOAS MÃOS' \n----------------------------    \n\nA ASD entrou em contato conosco, pois parece que um dos seus antigos laboratórios, <EM4>~mission(Location|Address)</EM4>, ainda tem carga armazenada que eles querem recuperar.\n\nVocê deve ir até lá em uma nave capaz de transportar contêineres de até <EM4>~mission(MissionMaxSCUSize)</EM4>, pousar no hangar, carregar pelo elevador de carga e transportar tudo de volta para <EM4>~mission(Destination|Address)</EM4>.\n\nFique atento enquanto estiver na instalação e tente não deixar a curiosidade atrapalhar. Locais abandonados como este podem esconder todo tipo de perigo. E não esqueça de levar um <EM4>raio trator portátil</EM4> com você.\n\nSEJA O MELHOR – Orgulhe-se do seu trabalho e ele será motivo de orgulho.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rookie:</EM4> +50 Rep
RedWind_HaulCargo_AToB_ASD_title=TRANSFERÊNCIA DE CARGA DE INSTALAÇÃO ABANDONADA <EM4>[50 Rep]</EM4>
RedWind_HaulCargo_AToB_desc_01=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------  \n\nPrecisamos de um piloto para um transporte simples do elevador de carga em <EM4>~mission(Location|Address)</EM4> até <EM4>~mission(Destination|Address)</EM4>. Deve ser tranquilo, desde que você tenha uma nave capaz de carregar contêineres de até <EM4>~mission(MissionMaxSCUSize)</EM4>.\n\nCréditos fáceis assim não aparecem todo dia. Mas tenha cuidado, pois a rota não é das mais seguras. E não esqueça de levar um <EM4>raio trator portátil</EM4> com você.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Rookie:</EM4> +50 Rep\n<EM4>Trainee:</EM4> +50 Rep\n<EM4>Rookie:</EM4> +100 Rep\n<EM4>Junior:</EM4> +250 Rep\n<EM4>Experienced:</EM4> +1,000 Rep
RedWind_HaulCargo_AToB_desc_FromPyro_Danger=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nAcho que algumas empresas veem perigo quando lhes é oferecida uma corrida em Pyro. Nós vemos lucros. Temos uma aqui que começa no sistema em <EM4>~mission(Location|Address)</EM4> e depois vai para <EM4>~mission(Destination|Address)</EM4>. \n\nO cliente nos avisou que foras da lei em Pyro atacam regularmente esta rota, o que assustou outras transportadoras. Certifique-se de que sua nave esteja totalmente equipada e possa transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>. E não se esqueça de trazer um <EM4>raio trator portátil</EM4>. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x6\n<EM4>Rookie:</EM4> +200 Rep
RedWind_HaulCargo_AToB_desc_LuxuryGoods_Danger_Timed=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nTemos um contrato de um grande cliente que precisa de um piloto habilidoso para mover uma grande carga de itens de luxo de <EM4>~mission(Location|Address)</EM4> para <EM4>~mission(Destination|Address)</EM4>. \n\nVocê precisará de espaço para pelo menos <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> em seu porão. Você também precisará de um <EM4>raio trator portátil</EM4> para carregar e descarregar tudo. \n\nE como um aviso justo, as coisas que você estará carregando são caras o suficiente para que você possa atrair alguma atenção indesejada. <EM4>Esteja pronto para se defender</EM4> se não puder evadir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x1\n<EM4>Rookie:</EM4> +200 Rep
RedWind_HaulCargo_AToB_desc_ToPyro_Danger=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nTemos uma corrida aqui que pode se tornar um negócio regular e lucrativo se conseguirmos realizá-la. Esta o levará para Pyro, então você terá que estar pronto para se envolver com alguns dos locais. \n\nVocê precisará pegar o material em <EM4>~mission(Location|Address)</EM4>, fazer o salto para Pyro e depois chegar a <EM4>~mission(Destination|Address)</EM4>. \n\nTudo o que você precisa fazer é trazer uma nave com espaço para <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>, um <EM4>raio trator portátil</EM4> e estar pronto para causar algum dano se alguém começar uma briga com você.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x3\n<EM4>Rookie:</EM4> +200 Rep
RedWind_HaulCargo_AToB_title_01=TRANSPORTADOR DE NÍVEL ~mission(ReputationRank) NECESSÁRIO PARA ENVIO ~mission(CargoGradeToken) DIRETO <EM4>[50–1,000 Rep]</EM4>
RedWind_HaulCargo_AToB_waste_desc_01=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------  \n\nPrecisamos de um piloto para transportar material residual do elevador de carga em <EM4>~mission(Location|Address)</EM4> até <EM4>~mission(Destination|Address)</EM4>. Deve ser tranquilo, desde que tenha uma nave capaz de transportar contêineres de até <EM4>~mission(MissionMaxSCUSize)</EM4>. Não traga sua nave mais limpa.\n\nPor outro lado, provavelmente fora da lei vão te ignorar quando virem o que está carregando. E não esqueça de levar um <EM4>raio trator portátil</EM4> com você.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 7/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Trainee:</EM4> +50 Rep\n<EM4>Junior:</EM4> +250 Rep\n<EM4>Experienced:</EM4> +1,000 Rep
RedWind_HaulCargo_MultiToSingle_desc_01=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nAcabamos de receber uma comunicação de um cliente. Ele tem carga (<EM4>~mission(MissionMaxSCUSize)</EM4> ou menor) em alguns locais diferentes que precisa levar até o elevador de carga em <EM4>~mission(Destination|Address)</EM4>.\n\nLOCAIS DE RETIRADA (ORDEM INDIFERENTE)  \n~mission(MultiToSingleToken)  \n\nRecomendo que planeje sua rota antes de partir. Pode economizar combustível. E não esqueça de levar um <EM4>raio trator portátil</EM4> com você.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 7/7 | Risk 6/7 | Knowledge 3/7\n<EM4>Junior:</EM4> +250 Rep\n<EM4>Member:</EM4> +500 Rep\n<EM4>Experienced:</EM4> +1,000 Rep\n<EM4>Senior:</EM4> +2,000 Rep\n<EM4>Master:</EM4> +4,000 Rep
RedWind_HaulCargo_MultiToSingle_desc_RantaDung=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nTemos um pedido de um fazendeiro em Pyro para suprimentos agrícolas especializados - especificamente, estrume de ranta (*ranta dung*). Aparentemente, fertilizantes normais não estão dando conta. Eles fizeram pedidos de vários distribuidores e precisam de alguém para levar tudo de volta para <EM4>~mission(Destination|Address)</EM4>.\n\nAqui estão todos os lugares onde você pode coletar o estrume:\n\nLOCAIS DE COLETA (QUALQUER ORDEM)\n\n ~mission(MultiToSingleToken)\n\nO cliente diz que sua nave precisa ser capaz de transportar pelo menos <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>. Não se esqueça de trazer seu próprio <EM4>raio trator portátil</EM4> para carregar e descarregar.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x23\n<EM4>Rookie:</EM4> +200 Rep
RedWind_HaulCargo_MultiToSingle_title_01=TRANSPORTADOR DE NÍVEL ~mission(ReputationRank) NECESSÁRIO PARA ENVIO ~mission(CargoGradeToken) <EM4>[200–4,000 Rep]</EM4>
RedWind_HaulCargo_MultiToSingle_waste_desc_01=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nRecebemos várias comunicações esta manhã. Parece que a nave de um coletor de lixo local quebrou e vamos precisar cobrir o serviço.\n\nTemos um monte de lixo (<EM4>~mission(MissionMaxSCUSize)</EM4> ou menor) em alguns locais diferentes pronto para ser levado até um elevador de carga em <EM4>~mission(Destination|Address)</EM4>.\n\nLOCAIS DE RETIRADA (ORDEM INDIFERENTE)  \n~mission(MultiToSingleToken)\n\nE não esqueça de levar um <EM4>raio trator portátil</EM4> com você.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 7/7 | Risk 6/7 | Knowledge 3/7\n<EM4>Junior:</EM4> +250 Rep\n<EM4>Member:</EM4> +500 Rep\n<EM4>Senior:</EM4> +2,000 Rep\n<EM4>Master:</EM4> +4,000 Rep
RedWind_HaulCargo_SingleToMulti_desc_01=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------   \n\nAlguém de <EM4>~mission(Location|Address)</EM4> me contatou sobre uma carga, <EM4>~mission(MissionMaxSCUSize)</EM4> ou menor, que precisa ser levada para alguns destinos diferentes.\n\nLOCAIS DE ENTREGA (ORDEM INDIFERENTE)  \n~mission(SingleToMultiToken)\n\nConfio em você para definir sua própria rota, então não estrague. Tente evitar áreas muito perigosas. E não esqueça de levar um <EM4>raio trator portátil</EM4> com você.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Rookie:</EM4> +100 Rep\n<EM4>Junior:</EM4> +250 Rep\n<EM4>Member:</EM4> +500 Rep
RedWind_HaulCargo_SingleToMulti_desc_RevenantTreePollen=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nA Red Wind precisa de um piloto experiente para transportar um grande carregamento de pólen de árvore *revenant* (revenant tree pollen) não processado de <EM4>~mission(Location|Address)</EM4> para estes locais:\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n\n~mission(SingleToMultiToken)\n\nIsto pode parecer óbvio, mas o representante da CFP nos pediu para garantir que a lei da UEE permite o transporte de pólen de árvore *revenant*, desde que não tenha sido processado. \n\nCertifique-se de que sua nave possa transportar até <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> antes de aceitar o contrato. E compre um <EM4>raio trator portátil</EM4> se ainda não tiver um para tornar o carregamento e descarregamento o mais indolor possível.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x23\n<EM4>Rookie:</EM4> +200 Rep
RedWind_HaulCargo_SingleToMulti_desc_ToCFP_Danger_Timed=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nA CFP tem um pedido urgente de um piloto com experiência em combate. Alguns de seus assentamentos estão sob ameaça imediata e podem ser atacados em breve, então eles precisam de suprimentos o mais rápido possível (ASAP).\n\nSe você está confiante de que pode navegar em uma potencial zona de combate, por favor, vá para <EM4>~mission(Location|Address)</EM4>, pegue a carga e leve-a para estes locais:\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n\n~mission(SingleToMultiToken)\n\nVocê precisará de espaço suficiente para <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e seu próprio <EM4>raio trator portátil</EM4> para carregar e descarregar tudo.\n\nLembre-se de que é sempre melhor fugir se alguém tentar uma emboscada. Mas se você for encurralado, não hesite em se defender.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x12\n<EM4>Rookie:</EM4> +200 Rep
RedWind_HaulCargo_SingleToMulti_title_01=TRANSPORTADOR DE NÍVEL ~mission(ReputationRank) NECESSÁRIO PARA ENVIO ~mission(CargoGradeToken) <EM4>[100–4,000 Rep]</EM4>
RedWind_HaulCargo_SingleToMulti_waste_desc_01=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------   \n\nEstão limpando o local em <EM4>~mission(Location|Address)</EM4> e há diversos contêineres de lixo (<EM4>~mission(MissionMaxSCUSize)</EM4> ou menores) que precisam ser levados para alguns destinos diferentes. (Não me pergunte por quê. Só sei que estão pagando para isso.)\n\nLOCAIS DE ENTREGA (ORDEM INDIFERENTE)  \n~mission(SingleToMultiToken)\n\nE não esqueça de levar um <EM4>raio trator portátil</EM4> com você.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 5/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Member:</EM4> +500 Rep\n<EM4>Experienced:</EM4> +1,000 Rep\n<EM4>Senior:</EM4> +2,000 Rep\n<EM4>Master:</EM4> +4,000 Rep
RedWind_LocalDelivery_desc_01=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nPrecisamos de um piloto independente disponível para uma entrega local rápida.\n\nPACOTE PARA RETIRADA\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> do <EM4>~mission(Pickup1|Address)</EM4>\n\nLOCAL DE ENTREGA\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>\n\nProcure manter discrição ao realizar essa entrega. Se tiver pacotes da Red Wind a bordo, é esperado certo nível de profissionalismo. E não esqueça de levar um <EM4>raio trator portátil</EM4> com você.\n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250
RedWind_LocalDelivery_desc_02=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nProcuramos um piloto para entregar alguns pacotes -\n\nPACOTES PARA RETIRADA (ORDEM INDIFERENTE)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> do <EM4>~mission(Pickup1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> do <EM4>~mission(Pickup2|Address)</EM4>\n\nLOCAIS DE ENTREGA (ORDEM INDIFERENTE)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para <EM4>~mission(Dropoff2|Address)</EM4>\n\nPreciso que seja feito rápido e sem erros. E não esqueça de levar um <EM4>raio trator portátil</EM4> com você.\n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_LocalDelivery_desc_03=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nTemos um contrato disponível para qualquer piloto com nave pronta -\n\nPACOTES PARA RETIRADA (ORDEM INDIFERENTE)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> do <EM4>~mission(Pickup1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> do <EM4>~mission(Pickup2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> do <EM4>~mission(Pickup3|Address)</EM4>\n\nLOCAIS DE ENTREGA (ORDEM INDIFERENTE)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para <EM4>~mission(Dropoff2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para <EM4>~mission(Dropoff3|Address)</EM4>\n\nE não esqueça de levar um <EM4>raio trator portátil</EM4> com você.\n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_LocalDelivery_desc_04=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nTemos um transporte que precisa de um piloto disponível.\n\nPACOTES PARA RETIRADA (ORDEM INDIFERENTE)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> do <EM4>~mission(Pickup1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> do <EM4>~mission(Pickup2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> do <EM4>~mission(Pickup3|Address)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> do <EM4>~mission(Pickup4|Address)</EM4>\n\nLOCAIS DE ENTREGA (ORDEM INDIFERENTE)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para <EM4>~mission(Dropoff2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para <EM4>~mission(Dropoff3|Address)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> para <EM4>~mission(Dropoff4|Address)</EM4>\n\nE fique atento: você precisa fornecer sua própria nave de carga. Garanta que tenha espaço suficiente. E não esqueça de levar um <EM4>raio trator portátil</EM4> com você.\n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_LocalDelivery_desc_05=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nTemos um transporte com várias paradas que precisa de um piloto.\n\nPACOTES PARA RETIRADA (ORDEM INDIFERENTE)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> do <EM4>~mission(Pickup1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> do <EM4>~mission(Pickup2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> do <EM4>~mission(Pickup3|Address)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> do <EM4>~mission(Pickup4|Address)</EM4>\n     · Pacote <EM4>#~mission(Item5|SerialNumber)</EM4> do <EM4>~mission(Pickup5|Address)</EM4>\n\nLOCAIS DE ENTREGA (ORDEM INDIFERENTE)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para <EM4>~mission(Dropoff2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para <EM4>~mission(Dropoff3|Address)</EM4>\n     · Pacote <EM4>#~mission(Item4|SerialNumber)</EM4> para <EM4>~mission(Dropoff4|Address)</EM4>\n     · Pacote <EM4>#~mission(Item5|SerialNumber)</EM4> para <EM4>~mission(Dropoff5|Address)</EM4> \n\nCertifique-se de que sua nave tenha espaço para todas essas cargas. E não esqueça de levar um <EM4>raio trator portátil</EM4> com você.\n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_LocalDelivery_desc_intro=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nEstamos procurando contratar um piloto independente interessado em executar uma rota local para nós.\n\nPACOTES PARA RETIRADA (ORDEM INDIFERENTE)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> do <EM4>~mission(Pickup1|Address)</EM4>\n\nLOCAIS DE ENTREGA (ORDEM INDIFERENTE)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>\n\nSe concluir essa missão, podemos considerar outros contratos no futuro. E não esqueça de levar um <EM4>raio trator portátil</EM4> com você.\n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +100
RedWind_LocalDelivery_desc_rehire=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nMesmo não tendo contratado você há um tempo, precisamos de ajuda extra agora.\n\nPACOTES PARA RETIRADA (ORDEM INDIFERENTE)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> do <EM4>~mission(Pickup1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> do <EM4>~mission(Pickup2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> do <EM4>~mission(Pickup3|Address)</EM4>\n\nLOCAIS DE ENTREGA (ORDEM INDIFERENTE)\n     · Pacote <EM4>#~mission(Item1|SerialNumber)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>\n     · Pacote <EM4>#~mission(Item2|SerialNumber)</EM4> para <EM4>~mission(Dropoff2|Address)</EM4>\n     · Pacote <EM4>#~mission(Item3|SerialNumber)</EM4> para <EM4>~mission(Dropoff3|Address)</EM4>\n\nSe concluir essa entrega, podemos considerar tornar isso mais regular novamente. E não esqueça de levar um <EM4>raio trator portátil</EM4> com você.\n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
