Intersec_ShipWaveAttack_DrawOutBoss_VH_Desc_001=ESPECIFICAÇÕES DA MISSÃO\n\nÁrea de Operação: ~mission(Location|Address)\nForças Hostis: Fora da Lei\nEspecificações de Equipamento: Nave de Combate Pesada (Heavy Gun-Ship)\nBriefing: Uma frota de fora da lei liderada por <EM4>~mission(TargetName)</EM4> tem planejado um ataque de grande escala contra infraestruturas vitais da UEE. A InterSec foi encarregada de lidar com essa ameaça antes que o ataque deles possa ser lançado.\n\nReúna uma quantidade adequada de naves de apoio e vá para o local do combate. Lá, você terá que enfrentar vários esquadrões antes que o líder deles considere a situação grave o suficiente para liderar suas forças diretamente. É crítico que ele seja neutralizado para garantir que o ataque seja interrompido.\n\nRespeitosamente,\n\nDeacon Tobin\nGerente de Operações\nInterSec Defense Solutions\n\nEsta comunicação consiste em uma oferta não vinculativa que, mediante aceitação, pode ser imediatamente rescindida por qualquer uma das partes sem aviso prévio. Todas as operações são conduzidas por conta e risco do contratado e devem aderir às leis do sistema, onde aplicável.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x24\n<EM4>Veteran Contractor:</EM4> +250 Rep
