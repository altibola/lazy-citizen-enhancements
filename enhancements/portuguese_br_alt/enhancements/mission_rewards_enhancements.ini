Adagio_Industrial_Salvage_Universal_Intro_Desc_001=Adagio Holdings\nUma Orgulhosa Empregadora com Igualdade de Oportunidades\n\n> Sobre nós <\nComo a principal compradora e distribuidora de direitos de sucateamento, a Adagio Holdings está agora buscando expandir para a aquisição e distribuição de materiais recuperáveis para empresas de pequena e grande escala.\n\n> Sobre o trabalho <\nComo parte desta iniciativa, precisamos de contratados perspicazes, capazes de identificar materiais recuperáveis, desmontá-los com eficiência e nos entregar o Composto de Material Reciclado (RMC) e os componentes recuperados.\n\nEste contrato introdutório exigirá que você vá até <EM4>~mission(Location|Address)</EM4> e desmonte uma nave abandonada aprovada para sucateamento.\n\nDepois de coletar o RMC, você o entregará no elevador de carga localizado em <EM4>~mission(Destination|Address)</EM4>.\n\n> Requisitos <\n     - Qualquer classe/tamanho de nave de sucateamento\n\nPara conselhos sobre sucateamento, consulte o <EM4>Guia do Sucateiro para Coleta de Material</EM4> em seu diário do mobiGlas.\n\n> Aviso Legal <\nOs contratados são responsáveis por garantir que estão coletando materiais de veículos considerados sucata legítima sob as leis vigentes da UEE. A Adagio Holdings não é de forma alguma responsável por quaisquer crimes ou contravenções cometidos por contratados e não oferecerá compensação ou reparação a quaisquer pessoas afetadas por essas ações.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Abrade Scraper Module\n- [S1-A] Cinch Scraper Module\n- [S1-A] Trawler Scraper Module\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Friendlies:</EM4> Salvageable Ships x1\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
