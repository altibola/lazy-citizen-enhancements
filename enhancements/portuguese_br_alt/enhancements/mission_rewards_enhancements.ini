cfp_ChainElimAll_1C_ElimSpec_GenAttack_E_desc_001=Precisamos que toda a equipe de segurança disponível se apresente em ~mission(Location|Address). Um grupo de indivíduos armados atacou um de nossos grupos de postos avançados e estamos precisando desesperadamente de ajuda. Embora o grupo pareça não estar afiliado a nenhuma das gangues conhecidas, recebemos a informação de que seu líder é ~mission(TargetName), um fora da lei local com uma reputação cruel.\n\nPor favor, vá para lá assim que puder e proteja a área eliminando os criminosos e ~mission(TargetName|Last).\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Brimstone" Rifle\n- [S1-A] Artimex Arms Lodestone\n- [S1-A] Artimex Core Lodestone\n- [S1-A] Artimex Helmet Lodestone\n- [S1-A] Artimex Legs Lodestone\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x7, Juggernauts x1, Soldiers x5, Technicians x5\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_1C_ElimSpec_GenAttack_E_title_001=Alerta: ~mission(Location) sob ataque <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_1C_ElimSpec_HHAttack_M_desc_001=No momento, estamos procurando por agentes de segurança qualificados e disponíveis para ir até ~mission(Location|Address) e recuperar uma instalação da CFP que foi tomada por Headhunters. \n\nO grupo que está ocupando o posto avançado no momento está sendo liderado por ~mission(TargetName), um Headhunter de certa forma notável que tem um histórico de agressão contra moradores locais e voluntários da CFP.\n\nPrecisamos que todos os Headhunters sejam presos e que ~mission(TargetName|Last) seja eliminado.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Brimstone" Rifle\n- [S1-A] Artimex Arms Lodestone\n- [S1-A] Artimex Core Lodestone\n- [S1-A] Artimex Helmet Lodestone\n- [S1-A] Artimex Legs Lodestone\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x6, Juggernauts x1, Soldiers x7, Technicians x6\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_1C_ElimSpec_HHAttack_M_title_001=Retomando da Headhunters <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_1C_HHAttack_M_desc_001=Acabamos de receber uma comunicação frenética de ~mission(Location|Address) e estamos procurando por especialistas em combate disponíveis para ajudar a repelir um ataque da Headhunter. Ainda há hostis no local e há relatos de várias baixas, portanto, precisamos que isso seja resolvido rapidamente.\n\nFornecerei todos os dados relevantes após a aceitação. Obrigado por sua ajuda.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Fate" Rifle\n- [S1-A] Artimex Arms (Modified)\n- [S1-A] Artimex Core (Modified)\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x6, Soldiers x7, Technicians x7\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_1C_HHAttack_M_title_001=Ajude a defender ~mission(Location) dos Headhunters <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_2C_ElimSpec_GenAttack_M_desc_001=Vários agrupamentos de PCP perto de ~mission(Location|Address) acabaram de ser atingidos por um grupo de bandidos liderados por ~mission(TargetName). Estamos procurando especialistas em combate disponíveis para ajudar a retomar os postos avançados.\n\nPosso fornecer os locais mediante aceitação, mas precisamos limpar o posto avançado principal e as instalações satélite de todas as forças hostis e eliminar ~mission(TargetName|Last), pois é improvável que eles não cessem as hostilidades se escaparem.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Brimstone" Rifle\n- [S1-A] Artimex Arms Lodestone\n- [S1-A] Artimex Core Lodestone\n- [S1-A] Artimex Helmet Lodestone\n- [S1-A] Artimex Legs Lodestone\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x8, Juggernauts x1, Soldiers x7, Technicians x6\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_2C_ElimSpec_GenAttack_M_title_001=Ataque criminoso em ~mission(Location) <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_2C_ElimSpec_HHAttack_H_desc_001=A Citizens for Prosperity está procurando agentes de segurança disponíveis para retomar várias instalações antigas da CFP perto de ~mission(Location|Address) do controle do Headhunter. Esses agrupamentos foram violentamente tomados de nós por ~mission(TargetName) e resultaram na morte de muitos voluntários.\n\nTrazer esses postos avançados de volta ao nosso controle ajudará a proporcionar mais estabilidade ao sistema. Os relatórios indicam que a ~mission(TargetName|Last) tende a se esconder atrás de suas fileiras, portanto, ele provavelmente aparecerá quando você tiver eliminado a maioria dos hostis.\n\nOs XenoThreat são treinados e motivados, portanto, não desistirão facilmente.\n\nLima Endicott\nDespachante líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Brimstone" Rifle\n- [S1-A] Artimex Arms Lodestone\n- [S1-A] Artimex Core Lodestone\n- [S1-A] Artimex Helmet Lodestone\n- [S1-A] Artimex Legs Lodestone\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x7, Juggernauts x1, Soldiers x7, Technicians x8\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_2C_ElimSpec_HHAttack_H_title_001=RETOMANDO POSTOS AVANÇADOS DA HEADHUNTERS <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_2C_ElimSpec_XTAttack_H_desc_001=Procurando por qualquer equipe de segurança disponível para recuperar vários agrumapementos anteriormente perdidos para os agressores da XenoThreat. Localizados perto de ~mission(Location|Address), eles foram tomados em ataques brutais liderados por ~mission(TargetName), um notório tenente da XenoThreat.\n\nEstamos tentando recuperar esses agrupamentos para que possamos restabelecer as operações e continuar nosso bom trabalho. Você precisará eliminar todos os hostis que ainda estão no local, bem como ~mission(TargetName|Last).\n\nApenas um lembrete de que a XenoThreat é altamente treinada e rápida para lutar, portanto, prepare-se de acordo.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Brimstone" Rifle\n- [S1-A] Artimex Arms Lodestone\n- [S1-A] Artimex Core Lodestone\n- [S1-A] Artimex Helmet Lodestone\n- [S1-A] Artimex Legs Lodestone\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x10, Juggernauts x1, Soldiers x8, Technicians x9\n<EM4>Head Contractor:</EM4> +400 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_2C_ElimSpec_XTAttack_H_title_001=RETOMANDO POSTOS AVANÇADOS DA XENOTHREAT <EM4>[BP]</EM4> <EM4>[400 Rep]</EM4>
cfp_ChainElimAll_3C_ElimSpec_GenAttack_M_desc_001=A presença de foras da lei aqui se tornou muito mais ousada ultimamente e muitas pessoas estão se machucando. Recentemente, perdemos vários grupos em torno de ~mission(Location|Address). Embora não gostemos de recorrer à violência, o conselho reconheceu que esses locais são cruciais para estabelecer a estabilidade no sistema e autorizou o uso de uma equipe de segurança para retomá-los.\n\nTambém estamos cientes de que os hostis incorporados estão sendo liderados por ~mission(TargetName), que tem um histórico de ataques aos interesses da CFP. O conselho gostaria que ~mission(TargetName|Last) fosse eliminado para evitar ataques futuros.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Fate" Rifle\n- [S1-A] Artimex Arms (Modified)\n- [S1-A] Artimex Core (Modified)\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x7, Juggernauts x1, Soldiers x8, Technicians x7\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_3C_ElimSpec_GenAttack_M_title_001=PRECISAMOS QUE MÚLTIPLOS POSTOS AVANÇADOS DA CPF SEJAM REMOTADOS <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_3C_ElimSpec_HHAttack_VH_desc_001=A diretoria da Citizens for Prosperity acaba de autorizar fundos para contratar pessoal de segurança para retomar vários clusters próximos a ~mission(Location|Address) que, desde então, caíram nas mãos dos Headhunters. Embora tenhamos tentado simplesmente aceitar a perda, ficou claro que eles são cruciais para nossas operações contínuas no sistema.\n\nVocê precisará limpar cada um dos locais que serão fornecidos, mas o mais importante é que você também precisará eliminar ~mission(TargetName), que está encarregado dos hostis no local.\n\nEsses Headhunters estão fortemente inseridos e têm um histórico de violência, portanto, você deve se preparar adequadamente. \n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Fate" Rifle\n- [S1-A] Artimex Arms (Modified)\n- [S1-A] Artimex Core (Modified)\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x9, Juggernauts x1, Soldiers x8, Technicians x8\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_3C_ElimSpec_HHAttack_VH_title_001=Retomando Agrupamentos da Headhunters <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_3C_ElimSpec_XTAttack_VH_desc_001=Embora a Citizens for Prosperity esteja comprometida com a mudança por meios não violentos, ficou claro que talvez seja necessário abrir exceções. As zonas seguras da CFP próximas à ~mission(Location|Address) foram recentemente e violentamente tomadas pelas forças da XenoThreat sob o comando de ~mission(TargetName).\n\nEstamos procurando todos os agentes de combate disponíveis para ajudar a recuperar esses postos avançados. Sem dúvida, será uma tarefa difícil, pois a XenoThreat é altamente treinada e está ansiosa para lutar, portanto, você deve se preparar adequadamente.\n\nAlém de limpar cada grupo das forças da XenoThreat, você precisará eliminar ~mission(TargetName|Last), cuja perda certamente tornará o sistema mais seguro.\n\nBoa sorte,\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Fate" Rifle\n- [S1-A] Artimex Arms (Modified)\n- [S1-A] Artimex Core (Modified)\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 5/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> CQC x16, Juggernauts x1, Soldiers x13, Technicians x11\n<EM4>Head Contractor:</EM4> +400 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_3C_ElimSpec_XTAttack_VH_title_001=CAMPANHA PARA RETOMAR POSTOS AVANÇADOS DA XENOTHREAT <EM4>[BP]</EM4> <EM4>[400 Rep]</EM4>
cfp_EliminateAllFF_Desc_001=CFP Pyro EliminateAll FrontierFighters\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x2, Kopions x2, Sentries x1, Soldiers x4, Technicians x2\n<EM4>Neutral:</EM4> +25 Rep
cfp_EliminateAllFF_Title_001=cfp EliminateAllFF Title 001 <EM4>[25 Rep]</EM4>
cfp_EliminateSpecific_Generic_E_desc_001=Relatórios indicam que ~mission(Location|Address) foi atacada por um grupo de indivíduos armados liderados por um notório fora da lei chamado ~mission(TargetName). Houve vários relatos de mortes e ferimentos, de modo que a Citizens for Prosperity está procurando agentes de combate qualificados para fornecer algum apoio. \n\nEmbora não defendamos a resolução de conflitos por meio da violência, acreditamos que o grupo se dispersará se ~mission(TargetName|Last) não estiver lá para liderá-los.\n\nVá até lá assim que puder. Há vidas em risco.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x3, Snipers x2, Soldiers x4, Technicians x3\n<EM4>Neutral:</EM4> +75 Rep
cfp_EliminateSpecific_Generic_E_title_001=PROTEÇÃO CONTRA ~mission(TargetName|Last) <EM4>[75 Rep]</EM4>
cfp_HaulCargo_RegionLink_desc_001=Olá, precisamos transportar alguma carga pelo sistema e gostaríamos de saber se você poderia ajudar. Sei que isso foge do seu escopo habitual, mas estou com poucas opções. Esta também seria uma ótima forma de demonstrar seu comprometimento com a missão maior dos Citizens for Prosperity aqui.\n\nSe você for até <EM4>~mission(Location|Address)</EM4>, haverá alguma carga acessível via elevador de carga que precisaremos que você leve até outro elevador de carga em <EM4>~mission(Destination|Address)</EM4>.\n\nO único ponto a destacar é que sua nave deve ser capaz de transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>. Para facilitar sua vida, certifique-se de trazer um <EM4>raio trator portátil</EM4>. Fora isso, deverá ser uma missão simples. \n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +200 Rep
cfp_HaulCargo_RegionLink_title_001=Preciso de um Transportador <EM4>[200 Rep]</EM4>
cfp_RetrieveConsignment_desc_001=Você está disponível para um trabalho? Um de nossos locais seguros foi atacado por bandidos e alguns materiais altamente confidenciais foram roubados. Como você pode imaginar, a Citizens for Prosperity está ansiosa para recuperá-los o mais rápido possível.\n\nGraças a um contato local, conseguimos rastrear os bandidos até ~mission(Location|Address), onde eles estão armazenando os materiais confidenciais em um cofre automatizado seguro. Para acessá-lo, você precisará primeiro encontrar o código de recuperação relevante e inseri-lo na esteira de pacotes do cofre. Nosso melhor palpite é que um dos líderes fora da lei estará carregando o código consigo, portanto, há uma grande chance de você ter de se envolver diretamente com ele para obtê-lo.\n\nDepois de obter o material confidencial, queremos que você o entregue em ~mission(Dropoff1|Address).\n\nVocê estará fazendo uma grande diferença para muitas pessoas se conseguir fazer isso.\n\nAgradecemos antecipadamente,\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Hostiles x54
cfp_RetrieveConsignment_title_001=Material Confidencial Roubado <EM4>[1,000–4,000 Rep]</EM4>
cfp_bombingrun_E_desc_001=Estamos tendo problemas crescentes com os fora da lei de ~mission(Location|Address) e não podemos mais ficar parados observando suas ações agressivas prejudicarem nossa comunidade. \n\nEstamos cautelosos quanto ao lançamento de um ataque em escala total, mas acreditamos que, se os depósitos de combustível forem destruídos, isso os dissuadirá de outras ações hostis. \n\nSe for possível, gostaria que você cuidasse da destruição do combustível pessoalmente. Uma nave capaz de lançar mísseis provavelmente faria mais sentido, mas deixo isso a seu critério.\n\nObrigado,\n \nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- A03 Sniper Rifle\n- P6-LR Sniper Rifle\n- [S1-A] A03 Sniper Rifle Magazine (15 cap)\n- [S1-A] Argus Helmet\n- [S1-A] CBH-3 Helmet Base\n- [S1-A] P6-LR Magazine (8 cap)\n- [S1-A] PAB-1 Arms\n- [S1-A] PAB-1 Core\n- [S1-A] PAB-1 Legs\n- [S1-A] TrueDef-Pro Arms\n- [S1-A] TrueDef-Pro Core Base\n- [S1-A] TrueDef-Pro Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_bombingrun_E_title_001=ELIMINAR OS DEPÓSITOS DE COMBUSTÍVEL <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
cfp_bombingrun_sabotage_generators_desc_001=Há um grupo de foras-da-lei em ~mission(Location|Address) que tem se tornado cada vez mais ousado em seus ataques aos ativos da Citizens for Prosperity no sistema. \n\nPara minimizar a perda de vidas, queremos primeiro tentar convencê-los a ir para outro lugar, desativando seus geradores e destruindo suas reservas de combustível. \n\nEsperamos que isso seja suficiente para convencê-los a se mudarem para pastos mais verdes.\n\nObrigado,\n \nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- A03 Sniper Rifle\n- P6-LR Sniper Rifle\n- [S1-A] A03 Sniper Rifle Magazine (15 cap)\n- [S1-A] Argus Helmet\n- [S1-A] CBH-3 Helmet Base\n- [S1-A] P6-LR Magazine (8 cap)\n- [S1-A] PAB-1 Arms\n- [S1-A] PAB-1 Core\n- [S1-A] PAB-1 Legs\n- [S1-A] TrueDef-Pro Arms\n- [S1-A] TrueDef-Pro Core Base\n- [S1-A] TrueDef-Pro Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_bombingrun_sabotage_generators_title_001=REDUZIR A PRONTIDÃO OPERACIONAL DOS CRIMINOSOS <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_bounty_desc_HeadHunters_001=Este é um aviso geral. Soubemos que os Headhunters estão transportando uma grande quantidade de armas para o sistema com a intenção de lançar ataques contra os assentamentos de propriedade da CFP.\n\nEmbora acreditemos que a mudança só pode ocorrer nesse sistema por meio da não violência. A presença dessas armas, sem dúvida, causará muito mais derramamento de sangue e devastação, portanto, queremos removê-las da equação.\n\nQualquer um de nossos apoiadores com treinamento de combate adequado é solicitado a realizar essa perigosa tarefa perto de ~mission(Location|Address). Nós os compensaremos pelo enorme risco que estão correndo.\n\nObrigado e fiquem seguros lá fora.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Reinforcements x2, Targets x1\n<EM4>Neutral:</EM4> +200 Rep
cfp_bounty_title_HeadHunters_001=Perigo: Chegada de Armas Contrabandeadas <EM4>[200 Rep]</EM4>
cfp_defend-criminals_desc_001=Soubemos que ~mission(Location|Address) está sob ameaça de ataque de bandidos e pediu ajuda. Precisamos de alguém para protegê-los e afastar os bandidos.\n\nCertifique-se de ficar por perto após o ataque inicial. Com muita frequência, os fora da lei vencem as lutas simplesmente enviando mais gente do que qualquer um pode razoavelmente se defender, portanto, certifique-se de lutar contra qualquer reforço antes de deixar a área.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro]</EM4>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM4>[Pyro RegionB]</EM4>\n- Karna "Fate" Rifle\n- [S1-A] Artimex Arms (Modified)\n- [S1-A] Artimex Core (Modified)\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x6, Juggernauts x2, Soldiers x10, Technicians x4\n<EM4>Neutral:</EM4> +75 Rep\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend-criminals_title_001=Defender ~mission(Location) de Foras da Lei <EM4>[BP]</EM4> <EM4>[75–200 Rep]</EM4>
cfp_defend-xenothreat_desc_001=Soubemos que a XenoThreat está prestes a lançar um ataque a ~mission(Location|Address). Se eles forem bem-sucedidos, espera-se que o número de vítimas seja alto. Espero que, com sua ajuda para defendê-los, possamos garantir que isso não aconteça.\n\nSabemos de encontros anteriores que a XenoThreat envia vários grupos de invasão para realizar seus ataques, portanto, certifique-se de não deixar o posto avançado até que tenha combatido todos os reforços. \n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Fate" Rifle\n- [S1-A] Artimex Arms (Modified)\n- [S1-A] Artimex Core (Modified)\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x9, Soldiers x7, Technicians x9\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend-xenothreat_desc_002=Urgente!\n\nA XenoThreat está atacando ~mission(Location|Address) para enviar uma mensagem a outros colonos sobre o que acontecerá se eles aceitarem nosso apoio. \n\nSe você conseguir se defender dos atacantes, tenho certeza de que eles enviarão mais forças, portanto, você precisará se preparar para vários ataques. Como a XenoThreat tem muitos recursos à disposição, você deve pensar em recrutar outras pessoas para ajudá-lo a manter todos seguros.\n\nEstamos todos contando com você.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x2, Juggernauts x1, Snipers x2, Soldiers x4, Technicians x4\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend-xenothreat_desc_003=Urgente!\n\nA XenoThreat está se mobilizando para uma incursão maciça para varrer ~mission(Location|Address) do mapa. Você é a única esperança deles de resistir a esse ataque e protegê-los da crueldade da XenoThreat.\n\nSei que estou pedindo para você se colocar na linha de fogo, mas esse sistema não mudará a menos que pessoas como você sejam corajosas o suficiente para enfrentar esses perigos. Nenhuma quantidade de créditos poderia ser comparada ao bem que você estaria fazendo ao intervir.\n\nSe você estiver disposto e for capaz de assumir essa missão, certifique-se de levar alguns aliados com você. A XenoThreat certamente enviará reforços mais fortes quando perceber que está sofrendo perdas.\n\nAcreditamos em você.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> CQC x4, Juggernauts x2, Snipers x3, Soldiers x8, Technicians x4\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend-xenothreat_title_001=Proteger ~mission(Location) do Ataque da XenoThreat <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_defend-xenothreat_title_002=PROTEGER ~mission(Location) DE INVASÃO DA XENOTHREAT <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
cfp_defend-xenothreat_title_003=PROTEGER ~mission(Location) DE INCURSÃO DA XENOTHREAT <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_defend_boss_Generic_desc_001=Acabamos de receber relatos de um ataque maciço contra ~mission(Location) por um grande grupo de indivíduos armados liderados por ~mission(TargetName), um notório criminoso que vem ameaçando a equipe da Citizens for Prosperity há meses. Os detalhes ainda não foram confirmados, mas sabemos que houve várias baixas.\n\nA Citizens for Prosperity está procurando por qualquer equipe de segurança qualificada para retomar os postos avançados desses elementos hostis. Entendemos que ~mission(TargetName|Last) tende a se esconder atrás de seus soldados, mas emergirá se você eliminar um número suficiente deles.\n\nEmbora não gostemos de recorrer à violência, a gerência não vê outra maneira de resolver essa situação e continuar nosso bom trabalho no sistema.\n\nBoa sorte,\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms Canuto\n- [S1-A] Artimex Core Canuto\n- [S1-A] Artimex Helmet Canuto\n- [S1-A] Artimex Legs Canuto\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> CQC x90, Juggernauts x4\n<EM4>Veteran Contractor:</EM4> +800 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend_boss_Generic_title_001=~mission(Location|Address) precisa de ajuda <EM4>[BP]</EM4> <EM4>[800 Rep]</EM4>
cfp_defend_cave_Generic_desc_001=Recebemos um pedido de socorro de ~mission(Location|Address) dizendo que eles estão sendo roubados por um pequeno grupo de bandidos. ~mission(Location|CaveSize) Embora remoto, esse posto avançado é uma peça crucial da infraestrutura da CFP na área, portanto, precisamos recuperá-lo.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x2, Soldiers x6\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend_cave_Generic_title_001=ASSISTÊNCIA NECESSÁRIA EM ~mission(Location) <EM4>[BP]</EM4> <EM4>[25 Rep]</EM4>
cfp_defend_headhunters_H_desc_001=Um pedido de socorro acabou de chegar da ~mission(Location|Address), alegando que uma grande força da Headhunter acabou de atacar nosso posto avançado lá. Houve várias mortes e ferimentos entre os que conseguiram fugir do local. Estamos procurando por qualquer equipe de segurança disponível para ir até lá e retomar o posto avançado.\n\nAs testemunhas identificaram os atacantes como agentes de elite dos Headhunters, portanto, tome cuidado e leve ajuda se puder. \n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x2, Snipers x2, Soldiers x6, Technicians x3\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend_headhunters_H_title_001=Ataque da Headhunter a ~mission(Location) <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
cfp_defend_headhunters_M_desc_001=Os Headhunters lançaram um ataque não provocado contra ~mission(Location|Address). Embora não apoiemos o uso da violência, a Citizens for Prosperity não permitirá que pessoas inocentes morram. Precisamos de pessoal de segurança qualificado para retomar o posto avançado.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x1, Juggernauts x1, Snipers x1, Soldiers x3, Technicians x3\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend_headhunters_M_title_001=~mission(Location) PRECISA DE ASSISTÊNCIA <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
cfp_defend_regionshift_desc_001=Recebemos um pedido de socorro de ~mission(Location|Address). Um grupo de assaltantes desconhecidos lançou um ataque. Houve várias mortes relatadas e precisamos recuperar o posto avançado.\n\nEu sei que isso está longe de sua posição atual, mas estamos desesperados para proteger a área e fazer com que o posto avançado volte a funcionar novamente.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM4>[Pyro RegionC]</EM4>\n- Karna Rifle\n- [S1-A] Artimex Arms Canuto\n- [S1-A] Artimex Core Canuto\n- [S1-A] Artimex Helmet Canuto\n- [S1-A] Artimex Legs Canuto\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM4>[Pyro RegionD]</EM4>\n- Karna "Brimstone" Rifle\n- [S1-A] Artimex Arms Lodestone\n- [S1-A] Artimex Core Lodestone\n- [S1-A] Artimex Helmet Lodestone\n- [S1-A] Artimex Legs Lodestone\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x2, Juggernauts x1, Soldiers x6\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend_regionshift_title_001=Pedido de Ajuda: ~mission(Location) <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
cfp_defendship_Intro_Desc_001=Citizens for Prosperity está precisando de pilotos com experiência em combate aéreo. Se você quer colocar suas habilidades à prova, tenho uma missão aqui para você tentar. \n\nUma nave civil solicitou apoio de combate próximo a <EM4>~mission(Location|Address)</EM4>. Vá até lá e mostre que você tem as habilidades para se destacar nesse tipo de missão, e nós faremos bom uso de você.  \n\nAtenção: esta missão não é um exercício de treinamento. É um confronto real, portanto, faça o seu melhor para salvar a nave em perigo. \n\nBoa sorte,\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x2\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +50 Rep
cfp_defendship_Intro_title_001=Procuram-se Pilotos de Combate Experientes <EM4>[50 Rep]</EM4>
cfp_defendship_LRT_SB_Desc_001=Precisamos de um piloto que saiba se virar em um combate aéreo. Uma nave de reconhecimento da Citizens for Prosperity teve problemas com o grupo Shattered Blade perto de <EM4>~mission(Location|Address)</EM4>. Deve ser uma área de interesse especial para eles. Eles lançaram um ataque quando nossa nave se aproximou e não parecem satisfeitos em apenas afastá-los. Parece que estão sedentos por sangue.  \n\nHá alguma chance de você dar uma mão antes que percamos essa nave?\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_LRT_SB_title_001=Fornecer Apoio de Combate <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
cfp_defendship_LRT_desc_001=Um de nossos pilotos tinha acabado de pegar um carregamento de suprimentos perto de ~mission(Location|Address) quando foi atacado por alguns ladrões de naves cruéis. \n\nAcabamos de receber o pedido de socorro deles e espero que você possa fornecer apoio de combate a eles.\n\nQualquer ajuda que você puder dar fará toda a diferença.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Jr. Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> 100% chance (Easy only)\n\n<EM4>? = only the Easy variant awards blueprints</EM4>
cfp_defendship_LRT_title_001=Piloto Solicitando Apoio de Combate <EM4>[BP?]</EM4> <EM4>[100–150 Rep]</EM4>
cfp_defendship_MRT_SB_title_001=Impedir Ataque à Nave\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_MRT_bombingrun_desc_001=Um de nossos funcionários está sendo atacado no momento em ~mission(Location|Address). Ele tentou despistar os atacantes para chegar em segurança, mas os bandidos se mostraram muito habilidosos para que ele conseguisse escapar. \n\nPrecisamos que você voe até lá, enfrente os atacantes e destrua as reservas de combustível próximas. A esperança é que essa demonstração de destruição os dissuadirá de continuar a perseguição.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Friendlies:</EM4> Ships to Defend x2\n<EM4>Veteran Contractor:</EM4> +200 Rep
cfp_defendship_MRT_bombingrun_title_001=Auxiliar Nave em Retirada <EM4>[200 Rep]</EM4>
cfp_defendship_MRT_desc_001=Uma nave afiliada à Citizens for Prosperity estava tentando entregar alguns suprimentos em ~mission(Location|Address) quando foi atacado pelos destinatários que não queriam pagar pela compra e optaram pela violência.\n\nEu instruirei nossos comerciantes a serem mais cuidadosos com quem lidam no futuro, mas, por enquanto, eu realmente apreciaria que você os ajudasse a combater esses atacantes. \n\nAgradecemos sua ajuda,\n\nLima Endicott, despachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> 100% chance (Medium only)\n\n<EM4>? = only the Medium variant awards blueprints</EM4>
cfp_defendship_MRT_title_001=NAVE PRECISA DE ASSISTÊNCIA DE EMERGÊNCIA <EM4>[BP?]</EM4> <EM4>[150–200 Rep]</EM4>
cfp_defendship_VLRT_SB_desc_001=Recebemos uma comunicação de emergência de uma nave informando que o grupo Shattered Blade está a assediando. Acreditamos que o piloto chamou a atenção deles por chegar um pouco perto demais de seu território. O piloto admitiu que não tem muita experiência em combate, então não sabemos por quanto tempo conseguirá resistir.\n\nVocê poderia ir até <EM4>~mission(Location|Address)</EM4> agora para ajudá-lo a sobreviver ao ataque?\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x2\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_VLRT_SB_title_001=Apoiar Nave Sob Ataque <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
cfp_defendship_VLRT_desc_001=Parece que uma das rotas que considerávamos relativamente segura provou o contrário. Os bandidos atacaram um de nossos pilotos em ~mission(Location|Address) e ele não conseguirá sobreviver por muito tempo sem apoio. \n\nEu agradeceria se você pudesse voar para lá o mais rápido possível e ajudá-los a lidar com esses invasores.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> 100% chance (VeryEasy only)\n\n<EM4>? = only the VeryEasy variant awards blueprints</EM4>
cfp_defendship_VLRT_title_001=Piloto em Apuros <EM4>[BP?]</EM4> <EM4>[100 Rep]</EM4>
cfp_defendship_multi_HRT_SB_desc_001=Um de nossos comboios está precisando de apoio de combate. Parece que eles encontraram um esconderijo do grupo Shattered Blade enquanto tentavam fazer uma entrega. Agora, apesar de todos os esforços, o comboio não consegue escapar. Estamos procurando um piloto de combate disposto a ir até <EM4>~mission(Location|Address)</EM4> para ajudá-los a repelir o ataque antes que seja tarde demais. \n  \nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_multi_HRT_SB_title_001=Ajudar Comboio Emboscado <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
cfp_defendship_multi_HRT_desc_001=Acabamos de receber a notícia de que um comboio de naves afiliadas à Citizen for Prosperity foi alvo de bandidos e que nosso povo está precisando urgentemente de assistência. \n\nSe você estiver disponível, precisamos de pilotos prontos para o combate em ~mission(Location|Address) para defender nosso pessoal. Observe que, neste momento terrível, não podemos nos dar ao luxo de perder nem uma única nave e esperamos que, com sua ajuda, todo o nosso povo saia vivo.\n\nBoa sorte,\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_multi_HRT_title_001=Comboio Pego em Ataque Brutal <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
cfp_defendship_multi_SRT_SB_desc_001=Um de nossos comboios foi pego em uma situação complicada e está precisando desesperadamente de ajuda. O grupo Shattered Blade lançou um ataque brutal contra nossas naves em uma área que acreditávamos ser segura. Esse comboio está transportando principalmente suprimentos e novos recrutas. Pelas comunicações que estou recebendo, eles estão lutando bravamente, mas talvez não aguentem por muito tempo. \n\nSe estiver disponível, precisamos de você em <EM4>~mission(Location|Address)</EM4>, pronto para enfrentar forças realmente perigosas.    \n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_multi_SRT_SB_title_001=Impedir o Ataque Selvagem do Shattered Blade <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_defendship_multi_SRT_desc_001=Estou recebendo relatórios de que um comboio da Citizens for Prosperity, transportando suprimentos vitais, está atualmente sob ataque em <EM4>~mission(Location|Address)</EM4>. Seria um grande golpe para nossas operações se perdêssemos essa carga. \n\nSe você tiver as habilidades de combate necessárias para enfrentar inimigos altamente agressivos, estamos mais do que dispostos a pagar por sua ajuda. \n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_multi_SRT_title_001=Ajudar Comboio em Perigo <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_defendship_multi_VHRT_SB_desc_001=Perdemos contato com um comboio de suprimentos e estamos preocupados que ele possa estar sob ataque. A última comunicação que recebemos relatava que naves do grupo Shattered Blade estavam se aproximando, mas desde então não tivemos mais notícias. Você pode se apressar até <EM4>~mission(Location|Address)</EM4> para apoiar nossas forças? \n\nAprendemos que o grupo Shattered Blade é muito protetor em relação às suas áreas de caça. Nossos últimos confrontos com eles foram bastante intensos, então eu recomendaria levar um poder de fogo pesado.   \n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_multi_VHRT_SB_title_001=Comboio Sob Ataque <EM4>[BP]</EM4> <EM4>[250 Rep]</EM4>
cfp_defendship_multi_VHRT_desc_001=Um comboio da Citizens for Prosperity em uma corrida de reabastecimento lançou um sinal de socorro perto de <EM4>~mission(Location|Address)</EM4>. Eles não estão atendendo a nenhuma comunicação, então presumo que a situação seja séria. Aquele comboio tem alguns pilotos habilidosos, então se eles não estão respondendo, eles definitivamente precisam de ajuda.\n\nNós o compensaremos para apoiar aquele comboio. \n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_multi_VHRT_title_001=Responder ao Sinal de Socorro <EM4>[BP]</EM4> <EM4>[250 Rep]</EM4>
cfp_delivery_desc_001=Olá,\n\nRecebemos informação de que algumas pessoas estão aguardando um carregamento importante que não chegou. Acontece que ele foi levado acidentalmente para o lugar errado. Enquanto investigamos o que aconteceu, precisamos que alguém vá até <EM4>~mission(Pickup1|Address)</EM4> para pegar o pacote <EM4>#~mission(item1|serialnumber)</EM4> e entregá-lo no local correto em <EM4>~mission(Dropoff1|Address)</EM4>.\n\nPara facilitar seu trabalho, certifique-se de trazer um <EM4>raio trator portátil</EM4>.\n\nVocê está disponível para a missão?\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_delivery_desc_002=Olá,\n\nPrecisamos entregar dois pacotes. O pacote <EM4>#~mission(item1|serialnumber)</EM4> deve ser retirado em <EM4>~mission(Pickup1|Address)</EM4> e levado até <EM4>~mission(Dropoff1|Address)</EM4>, e o pacote <EM4>#~mission(item2|serialnumber)</EM4> vai de <EM4>~mission(Pickup2|Address)</EM4> para <EM4>~mission(Dropoff2|Address)</EM4>. Deve ser uma maneira simples de ganhar algumas créditos.\n\nPara facilitar seu trabalho, certifique-se de trazer um <EM4>raio trator portátil</EM4>.\n\nVoe seguro,\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_delivery_desc_003=Olá,\n\nDe vez em quando, os Citizens for Prosperity gostam de surpreender membros em nossos postos com um pequeno presente para manter o moral alto. Temos a próxima remessa pronta, mas precisamos de alguém para fazer as entregas. Quer ajudar a espalhar uma boa ação?\n\nAqui está a lista de entregas. Fique à vontade para fazer na ordem que quiser.\n\n- Pacote <EM4>#~mission(item1|serialnumber)</EM4> vai de <EM4>~mission(Pickup1|Address)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>.\n- Pacote <EM4>#~mission(item2|serialnumber)</EM4> vai de <EM4>~mission(Pickup2|Address)</EM4> para <EM4>~mission(Dropoff2|Address)</EM4>.\n- Pacote <EM4>#~mission(item3|serialnumber)</EM4> vai de <EM4>~mission(Pickup3|Address)</EM4> para <EM4>~mission(Dropoff3|Address)</EM4>.\n\nPara facilitar seu trabalho, certifique-se de trazer um <EM4>raio trator portátil</EM4>.\n\nObrigado,\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_delivery_desc_004=Olá,\n\nSe quisermos que pessoas comuns se mudem para Pyro, precisamos mostrar que serviços básicos são confiáveis. Tornar as entregas algo dependente para que as pessoas não pensem duas vezes é exatamente o que os Citizens for Prosperity querem fazer. Quer nos ajudar?\n\nTemos várias entregas prontas. Faça na ordem que quiser. O importante é que cheguem ao destino.\n\n- Pacote <EM4>#~mission(item1|serialnumber)</EM4> vai de <EM4>~mission(Pickup1|Address)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>.\n- Pacote <EM4>#~mission(item2|serialnumber)</EM4> vai de <EM4>~mission(Pickup2|Address)</EM4> para <EM4>~mission(Dropoff2|Address)</EM4>.\n- Pacote <EM4>#~mission(item3|serialnumber)</EM4> vai de <EM4>~mission(Pickup3|Address)</EM4> para <EM4>~mission(Dropoff3|Address)</EM4>.\n- Pacote <EM4>#~mission(item4|serialnumber)</EM4> vai de <EM4>~mission(Pickup4|Address)</EM4> para <EM4>~mission(Dropoff4|Address)</EM4>.\n\nPara facilitar seu trabalho, certifique-se de trazer um <EM4>raio trator portátil</EM4>.\n\nVoe seguro,\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_delivery_desc_005=Olá,\n\nParece que houve um problema técnico em nosso sistema que marcou certos pacotes como entregues quando não foram. Ainda estamos resolvendo o problema, mas alguns já estão prontos para ir.\n\n- Pacote <EM4>#~mission(item1|serialnumber)</EM4> vai de <EM4>~mission(Pickup1|Address)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>.\n- Pacote <EM4>#~mission(item2|serialnumber)</EM4> vai de <EM4>~mission(Pickup2|Address)</EM4> para <EM4>~mission(Dropoff2|Address)</EM4>.\n- Pacote <EM4>#~mission(item3|serialnumber)</EM4> vai de <EM4>~mission(Pickup3|Address)</EM4> para <EM4>~mission(Dropoff3|Address)</EM4>.\n- Pacote <EM4>#~mission(item4|serialnumber)</EM4> vai de <EM4>~mission(Pickup4|Address)</EM4> para <EM4>~mission(Dropoff4|Address)</EM4>.\n- Pacote <EM4>#~mission(item5|serialnumber)</EM4> vai de <EM4>~mission(Pickup5|Address)</EM4> para <EM4>~mission(Dropoff5|Address)</EM4>.\n\nSeria ótimo resolver isso o quanto antes, se estiver disponível.\n\nPara facilitar seu trabalho, certifique-se de trazer um <EM4>raio trator portátil</EM4>.\n\nAtenciosamente,\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_delivery_nodanger_cave_desc_001=pu delivery local legal cave pyro cfp 2\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
cfp_delivery_nodanger_cave_title_001=cfp delivery nodanger cave title 001 <EM4>[500 Rep]</EM4>
cfp_delivery_title_001=Entrega para ~mission(Destination) Pronto <EM4>[50 Rep]</EM4>
cfp_delivery_title_002=Várias entregas prontas <EM4>[50 Rep]</EM4>
cfp_destroy_idris_desc_001=Olá, \n\nOs rumores são verdadeiros. A XenoThreat enviou um Idris para perseguir e atacar as operações da Citizens for Prosperity em uma escalada dramática de sua hostilidade contra nós. Acabamos de receber a notícia de que a nave, sob o comando de ~mission(TargetName), está avançando em direção a ~mission(location|address). Não conseguimos levar nossas próprias forças até lá com rapidez suficiente para combatê-los e precisamos desesperadamente de ajuda. \n\nEstamos procurando contratar alguém corajoso o suficiente para enfrentar esses bastardos. Não basta afugentá-los, precisamos garantir que eles não possam vir atrás de nós novamente. \n\nNão tenho certeza se você já enfrentou um Idris antes, mas é uma tarefa difícil para alguém enfrentar sozinho. Eu recomendo fortemente recrutar outras pessoas para a causa.   \n\nCumprimentos, \n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x15, Targets x1
cfp_eliminateall_XT_E_desc_001=Apesar de nossos esforços para promover a não-violência, os grupos fora da lei locais continuam a atacar nossa organização. A XenoThreat recentemente atacou a ~mission(Location|Address) e expulsou nossos voluntários que estavam trabalhando lá.\n\nEstamos procurando alistar pessoal de combate para retomar o posto avançado. Idealmente, poderíamos trabalhar em algo para incentivá-los a seguir em frente, mas a XenoThreat recorre rapidamente à violência para resolver todos os seus problemas, portanto, sem dúvida, haverá uma briga.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms Canuto\n- [S1-A] Artimex Core Canuto\n- [S1-A] Artimex Helmet Canuto\n- [S1-A] Artimex Legs Canuto\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x4, Technicians x2\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_eliminateall_XT_E_title_001=RETOMAR POSTO AVANÇADO DA XENOTHREAT <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
cfp_eliminateall_fromCFP_Gen_E_desc_001=A Citizens for Prosperity está procurando por operadores de combate disponíveis para ~mission(Location|Address). Um grupo de foras-da-lei lançou um ataque não provocado e nossa equipe de segurança precisa desesperadamente de apoio.\n\nPor favor, vá para ~mission(Location) com toda a urgência e boa sorte.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms Canuto\n- [S1-A] Artimex Core Canuto\n- [S1-A] Artimex Helmet Canuto\n- [S1-A] Artimex Legs Canuto\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_eliminateall_fromCFP_Gen_E_title_001=ATAQUE A POSTO AVANÇADO DA CFP <EM4>[BP]</EM4> <EM4>[25 Rep]</EM4>
cfp_eliminateall_fromCFP_XT_M_desc_001=As forças da XenoThreat lançaram um ataque não provocado perto de ~mission(Location|Address). Estamos procurando todos os operadores de combate disponíveis para dar apoio. \n\nSe você nunca lidou com eles antes, é importante saber que os XenoThreat são lutadores treinados, portanto, essa não será uma luta fácil, mas é necessária.\n\nBoa sorte,\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms Canuto\n- [S1-A] Artimex Core Canuto\n- [S1-A] Artimex Helmet Canuto\n- [S1-A] Artimex Legs Canuto\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Sr. Contractor:</EM4> +400 Rep\n<EM4>Blueprint Reward:</EM4> 100% chance (XTEliminateAll only)\n\n<EM4>? = only the XTEliminateAll variant awards blueprints</EM4>
cfp_eliminateall_fromCFP_XT_M_title_001=PROTEGER POSTO AVANÇADO CONTRA A XENOTHREAT <EM4>[BP?]</EM4> <EM4>[200–400 Rep]</EM4>
cfp_eliminateall_fromCFP_hh_M_desc_001=Recebemos uma comunicação de emergência da ~mission(Location|Address) informando que eles estão sendo atacados por um grupo de Headhunters. Sabemos que nossa presença no sistema incomodou os Headhunters, mas isso não justifica esse ataque não provocado.\n\nSe estiver disponível, reúna seu equipamento e saia. Entenda que os Headhunters são lutadores experientes e não recuarão facilmente.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionC]</EM4>\n- Karna Rifle\n- [S1-A] Artimex Arms Canuto\n- [S1-A] Artimex Core Canuto\n- [S1-A] Artimex Helmet Canuto\n- [S1-A] Artimex Legs Canuto\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM4>[Pyro RegionD]</EM4>\n- Karna "Rager" Rifle\n- [S1-A] Artimex Arms Wildwood\n- [S1-A] Artimex Core Wildwood\n- [S1-A] Artimex Helmet Wildwood\n- [S1-A] Artimex Legs Wildwood\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_eliminateall_fromCFP_hh_M_title_001=DEFENSORES NECESSÁRIOS CONTRA HEADHUNTERS <EM4>[BP]</EM4> <EM4>[100–200 Rep]</EM4>
cfp_eliminateall_hh_E_desc_001=A Citizens for Prosperity está procurando pessoal de segurança para tomar um antigo posto avançado da CFP que atualmente está servindo de esconderijo para os Headhunters lançarem ataques em todo o sistema. \n\nLocalizado próximo a ~mission(Location|Address), a recuperação desse posto avançado permitirá que a CFP ofereça maior apoio aos esforços locais para criar estabilidade.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x4, Technicians x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_eliminateall_hh_E_title_001=RETOMAR POSTO AVANÇADO DA HEADHUNTER <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
cfp_hauling_intro_desc_001=Bem-vindo ao sistema. Não tenho certeza se você conhece nossa organização, mas a Citizens for Prosperity é uma organização sem fins lucrativos dedicada a levar segurança e civilização a sistemas não reclamados.\n\nSe estiver procurando trabalho no sistema e quiser ajudar a atingir nossa meta, precisamos que um pacote seja retirado de <EM4>~mission(Location|Address)</EM4> e levado para <EM4>~mission(Destination|Address)</EM4>.\n\nUma vez concluído, podemos lhe oferecer uma variedade de novas oportunidades de trabalho neste sistema e além dele.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Neutral:</EM4> +25 Rep
cfp_hauling_intro_title_001=Primeiro Transporte no Sistema <EM4>[25 Rep]</EM4>
cfp_maintenance_E_desc_001=Oi,\n\nUm de nossos postos avançados em <EM4>~mission(Location|Address)</EM4> precisa de alguns reparos leves. O pessoal no local estimou que você vai precisar de <EM4>três fusíveis</EM4>, uma <EM4>ferramenta de sucateamento</EM4>, e <EM4>recipientes de CMR suficientes para consertar cerca de três ou mais tubulações</EM4>.\n\nSe precisar de mais informações sobre o trabalho de manutenção, consulte a entrada <EM4>"Guia de Manutenção da Cornerstone Developments"</EM4> no Jornal do seu mobiGlas.\n\nObrigado novamente pela sua ajuda,\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 4/7\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Jr. Contractor:</EM4> +50 Rep
cfp_maintenance_E_title_001=REPAROS MENORES NECESSÁRIOS: ~mission(Location) <EM4>[25–50 Rep]</EM4>
cfp_maintenance_H_desc_001=Precisamos de ajuda. A instalação CFP em <EM4>~mission(Location|Address)</EM4> sofreu danos severos durante uma recente tempestade elétrica e estamos procurando por quem possa ajudar com os reparos.\n\nAo fazer a inspeção no local, será necessário levar <EM4>seis fusíveis</EM4>, uma <EM4>ferramenta de sucateamento</EM4>, e <EM4>recipientes de CMR suficientes para consertar cerca de oito tubulações</EM4>. Isso deve ser o suficiente para reparar os danos e colocar o posto em operação novamente.\n\nSe precisar de mais informações sobre o trabalho de manutenção, consulte a entrada <EM4>"Guia de Manutenção da Cornerstone Developments"</EM4> no Jornal do seu mobiGlas.\n\nVocê acha que pode ajudar?\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Head Contractor:</EM4> +100 Rep\n<EM4>Head Contractor:</EM4> +400 Rep
cfp_maintenance_H_title_001=REPAROS EXTENSOS NECESSÁRIOS: ~mission(Location) <EM4>[100–400 Rep]</EM4>
cfp_maintenance_M_desc_001=Olá,\n\nRecebemos a informação de que uma tempestade devastadora atingiu <EM4>~mission(Location|Address)</EM4>, o que causou alguns danos nas estruturas. Nosso técnico no local ainda está tentando descobrir o que pode ser consertado, mas não pode fazer tudo. Se você trouxer <EM4>seis fusíveis</EM4>, uma <EM4>ferramenta de sucateamento</EM4>, e <EM4>recipientes de CMR suficientes para consertar cerca de cinco tubulações</EM4>, podemos lidar com os reparos restantes.\n\nSe precisar de mais informações sobre o trabalho de manutenção, consulte a entrada <EM4>"Guia de Manutenção da Cornerstone Developments"</EM4> no Jornal do seu mobiGlas.\n\nObrigado,\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Sr. Contractor:</EM4> +100 Rep
cfp_maintenance_M_title_001=REPAROS MODERADOS NECESSÁRIOS: ~mission(Location) <EM4>[100 Rep]</EM4>
cfp_maintenance_local_E_desc_001=Um posto avançado nosso perto de <EM4>~mission(Location|Address)</EM4> está sofrendo de algumas falhas mecânicas e precisa de reparos. Nosso técnico usual está em outro trabalho, então estamos procurando contratar um contratado externo.\n\nVamos precisar de <EM4>três fusíveis substituídos</EM4> e, se você puder trazer uma <EM4>ferramenta de sucateamento</EM4> com <EM4>recipientes de CMR suficientes para consertar cerca de três tubulações</EM4>, isso deve resolver o resto.\n\nSe precisar de mais informações sobre o trabalho de manutenção, consulte a entrada <EM4>"Guia de Manutenção da Cornerstone Developments"</EM4> no Jornal do seu mobiGlas.\n\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7
cfp_maintenance_local_E_title_001=REPAROS MENORES NECESSÁRIOS: ~mission(Location)
cfp_maintenance_local_M_desc_001=Se você estiver por perto, por favor leia isso.\n\nA Citizens for Prosperity está procurando um mecânico qualificado para se dirigir a <EM4>~mission(Location|Address)</EM4> com os suprimentos necessários e realizar alguns reparos.\n\nNeste momento, você precisará de <EM4>seis fusíveis</EM4>, uma <EM4>ferramenta de sucateamento</EM4>, e <EM4>recipientes de CMR suficientes para consertar cerca de cinco tubulações</EM4>. Isso deve ajudar a colocar o posto funcional novamente. Vamos compensá-lo pelo seu tempo e pelos materiais.\n\nSe precisar de mais informações sobre o trabalho de manutenção, consulte a entrada <EM4>"Guia de Manutenção da Cornerstone Developments"</EM4> no Jornal do seu mobiGlas.\n\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7
cfp_maintenance_local_M_title_001=REPAROS MODERADOS NECESSÁRIOS: ~mission(Location)
cfp_recovery_desc_001=Olá,\n\nPrecisamos da sua ajuda.\n\nUma pessoa local com quem trabalhamos estava realizando uma entrega para nós, mas infelizmente encontrou alguns fora-da-lei e teve que entregar seu ~mission(Item). O lado positivo é que eles não perceberam os rastreadores que colocamos na carga e agora sabemos que levaram o carregamento para ~mission(Location|Address).\n\nGostaríamos que você recuperasse os pacotes para nós e os entregasse em ~mission(Destination|Address). Não imagino que os fora-da-lei vão entregar voluntariamente, mas não pediria que você se colocasse em perigo se esses suprimentos não fossem de importância crítica.\n\nPara facilitar seu trabalho, sugiro que tenha um <EM4>raio trator portátil</EM4> com você.\n\nEntão, o que me diz?\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_recovery_tile_001=Suprimentos Roubados <EM4>[50 Rep]</EM4>
cfp_sabotage_VH_desc_001=A Citizens for Prosperity têm monitorado um grupo fora da lei muito perigoso em ~mission(Location|Address) e acreditamos que eles estão planejando um grande ataque que pode colocar todo o sistema em convulsão.\n\nPara proteger todo o progresso que fizemos aqui, gostaríamos que você invadisse o complexo deles e destruísse todos os servidores que abrigam seus planos. \n\nIsso deve, pelo menos, nos dar um alívio suficiente para que eles reconsiderem sua ofensiva.\n\nObrigado,\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_VH_title_001=Destruir Servidores de Dados de Criminosos <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
cfp_sabotage_generators_M_desc_001=Recebemos a notícia de que os bandidos da ~mission(Location|Address) começaram a recrutar com a esperança de lançar um ataque contra a Citizens for Prosperity. \n\nPara diminuir a escala da situação antes que ela saia do controle, gostaríamos que você desabilitasse os geradores de energia deles e interrompesse sua expansão. \n\nFaça isso e poderá salvar muitas vidas.\n \nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_generators_M_title_001=Deixe os Criminosos Off-line em at ~mission(Location) <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
cfp_sabotage_generators_VE_desc_001=Após uma série de invasões contra assentamentos alinhados à Citizens for Prosperity, acreditamos ter rastreado os responsáveis até ~mission(Location|Address).\n\nAtacá-los diretamente representará um risco muito grande e provavelmente incentivará represálias agressivas. Em vez disso, acreditamos que, se seus geradores de energia forem desativados, isso poderá forçá-los a se estabelecer em outro lugar.\n\nVocê acha que poderia cuidar disso para nós?\n \nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- A03 Sniper Rifle\n- P6-LR Sniper Rifle\n- [S1-A] A03 Sniper Rifle Magazine (15 cap)\n- [S1-A] Argus Helmet\n- [S1-A] CBH-3 Helmet Base\n- [S1-A] P6-LR Magazine (8 cap)\n- [S1-A] PAB-1 Arms\n- [S1-A] PAB-1 Core\n- [S1-A] PAB-1 Legs\n- [S1-A] TrueDef-Pro Arms\n- [S1-A] TrueDef-Pro Core Base\n- [S1-A] TrueDef-Pro Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Jr. Contractor:</EM4> +25 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_generators_VE_title_001=Desativar Fortaleza de Criminosos em ~mission(Location) <EM4>[BP]</EM4> <EM4>[25 Rep]</EM4>
cfp_sabotage_server_elimiatespecific_HH_desc_001=Estamos apenas montando o panorama completo agora, mas até o momento descobrimos que um Headhunter chamado ~mission(TargetName) roubou recentemente alguns dados confidenciais que, se expostos, serão prejudiciais à causa da Citizens for Prosperity. \n\nPrecisamos garantir que todos os rastros dos dados roubados sejam erradicados. Isso significa eliminar todos os servidores da Headhunter em ~mission(Location|Address) e rastrear ~mission(TargetName|Last) para impedi-los de disseminar ainda mais as informações.\n\nSua ajuda é muito apreciada,\n \nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- A03 Sniper Rifle\n- P6-LR Sniper Rifle\n- [S1-A] A03 Sniper Rifle Magazine (15 cap)\n- [S1-A] Argus Helmet\n- [S1-A] CBH-3 Helmet Base\n- [S1-A] P6-LR Magazine (8 cap)\n- [S1-A] PAB-1 Arms\n- [S1-A] PAB-1 Core\n- [S1-A] PAB-1 Legs\n- [S1-A] TrueDef-Pro Arms\n- [S1-A] TrueDef-Pro Core Base\n- [S1-A] TrueDef-Pro Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Head Contractor:</EM4> +1,500 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_server_elimiatespecific_HH_title_001=ERRADICAR OS VESTÍGIOS DE DADOS DA HEADHUNTER <EM4>[BP]</EM4> <EM4>[1,500 Rep]</EM4>
cfp_sabotage_servers_H_XT_desc_001=Temos um pequeno problema que espero que você possa resolver para mim. Um de nossos informantes revelou que a XenoThreat vem acumulando dados sobre as operações da Citizens for Prosperity em todo o sistema. \n\nEssas informações, se usadas corretamente, podem colocar nosso pessoal em sério risco. A melhor solução é destruir completamente os servidores onde os dados estão sendo armazenados em ~mission(Location|Address).\n\nCom o tesouro de informações eliminado, isso deve dar ao nosso pessoal uma chance de lutar.\n \nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionB]</EM4>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM4>[Pyro RegionD]</EM4>\n- A03 Sniper Rifle\n- P6-LR Sniper Rifle\n- [S1-A] A03 Sniper Rifle Magazine (15 cap)\n- [S1-A] Argus Helmet\n- [S1-A] CBH-3 Helmet Base\n- [S1-A] P6-LR Magazine (8 cap)\n- [S1-A] PAB-1 Arms\n- [S1-A] PAB-1 Core\n- [S1-A] PAB-1 Legs\n- [S1-A] TrueDef-Pro Arms\n- [S1-A] TrueDef-Pro Core Base\n- [S1-A] TrueDef-Pro Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Veteran Contractor:</EM4> +75 Rep\n<EM4>Contractor:</EM4> +75 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_servers_H_XT_title_001=DESTRUA DAOOS LOGÍSTICOS DA XENOTHREAT <EM4>[BP]</EM4> <EM4>[75 Rep]</EM4>
cfp_sabotage_servers_M_HH_desc_001=Os Headhunters atacaram recentemente um de nossos transportes e, infelizmente, conseguiram colocar as mãos em alguns dados seguros. Embora a criptografia seja forte, é apenas uma questão de tempo até que eles consigam acessá-los.\n\nAntes que isso aconteça, precisamos que você vá até ~mission(Location|Address) e destrua todos os vestígios das informações dos servidores deles.\n\nVocê realmente estará ajudando a Citizens for Prosperity se conseguir fazer isso.\n \nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- A03 Sniper Rifle\n- P6-LR Sniper Rifle\n- [S1-A] A03 Sniper Rifle Magazine (15 cap)\n- [S1-A] Argus Helmet\n- [S1-A] CBH-3 Helmet Base\n- [S1-A] P6-LR Magazine (8 cap)\n- [S1-A] PAB-1 Arms\n- [S1-A] PAB-1 Core\n- [S1-A] PAB-1 Legs\n- [S1-A] TrueDef-Pro Arms\n- [S1-A] TrueDef-Pro Core Base\n- [S1-A] TrueDef-Pro Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Neutral:</EM4> +75 Rep\n<EM4>Jr. Contractor:</EM4> +75 Rep\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_servers_M_HH_title_001=Destrua Dados Roubados da Headhunter <EM4>[BP]</EM4> <EM4>[75–150 Rep]</EM4>
cfp_sabotage_servers_VH_XT_desc_001=Um dos membros da Citizens for Prosperity que tem servido como informante da XenoThreat nos informou que os servidores de dados localizados em ~mission(Location|Address) abrigam um tesouro de informações vitais para a operação da gangue. \n\nSe você conseguisse destruir esses servidores em nosso nome, seria uma grande vitória para a segurança de todo o sistema.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_servers_VH_XT_title_001=Destruir Servidores de Dados da XenoThreat <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_searchbody_danger_cave_desc_001=Temos tentado entrar em contato com o membro da comunidade ~mission(TargetName), mas não temos notícias dele há alguns dias. Pelo que a Citizens for Prosperity conseguiu descobrir, ele estava se escondendo perto de ~mission(Location|Address), que é um conhecido ponto de encontro de foras da lei.\n\nPrecisamos de alguém para ir até lá e tentar localizá-los ou, na pior das hipóteses, seus restos mortais. \n\nSe você conseguir encontrá-lo, há uma recompensa em oferta.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_searchbody_danger_cave_title_001=Desaparecido: ~mission(TargetName) <EM4>[50 Rep]</EM4>
cfp_searchbody_danger_outpost_desc_001=Infelizmente, um de nossos parceiros comunitários, ~mission(TargetName), está desaparecido há alguns dias. Sua família entrou em contato com a Citizens for Prosperity para pedir ajuda e eu disse a eles que faríamos o possível. Dito isso, com tanto tempo passado, não estou muito esperançoso.\n\nQualquer que seja o estado atual deles, estamos procurando alguém para ser nossos olhos no local para esse caso. Há uma grande chance de que eles estivessem indo para ~mission(Location|Address), uma área conhecida por ser muito perigosa.\n\nSe você puder localizá-los e confirmar o status deles, de uma forma ou de outra, farei com que você seja devidamente compensado.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_searchbody_danger_outpost_title_001=Desaparecido: ~mission(TargetName) <EM4>[50 Rep]</EM4>
cfp_searchbody_danger_station_desc_001=Olá,\n\nEstou ficando bastante preocupado com um de nossos empreiteiros locais, ~mission(TargetName). Ele terminou uma negociação em ~mission(Location|Address) e não foi mais visto desde então. Estamos ouvindo relatos de que bandidos têm se esgueirado por lá e, se isso for verdade, suspeito que o pior pode ter acontecido.\n\nDe qualquer forma, ~mission(TargetName|First) fez um bom trabalho para nós no passado e eu odiaria que ele acabasse como mais um dos desaparecidos de Pyro. Se você estiver disposto a encontrá-lo para mim, farei com que você receba uma recompensa. \n\nSó tome cuidado. Odiaria que você também desaparecesse.\n\nObrigado,\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
cfp_searchbody_nodanger_cave_desc_001=~mission(TargetName) é um cidadão local que só fez alguns trabalhos para a Citizen for Prosperity, mas era promissor. Isto é, até que ele desapareceu enquanto explorava ~mission(Location|Address) na semana passada. Infelizmente, só ficamos sabendo do fato hoje. As chances de sobrevivência neste momento são muito pequenas, mas ainda achamos que vale a pena confirmar o que aconteceu com eles.\n \nSe alguém estiver interessado, a CFP pode ajudar com isso. E, além de ser uma boa ação, o pagamento deve fazer valer a pena o esforço. \n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_searchbody_nodanger_cave_title_001=Desaparecido: ~mission(TargetName) <EM4>[50 Rep]</EM4>
cfp_searchbody_nodanger_outpost_desc_001=Um de nossos funcionários, ~mission(TargetName), deveria estar fazendo um trabalho preliminar de reconhecimento em ~mission(Location|Address), mas não se apresentou. Esperamos que ele tenha tido apenas um pouco de azar, mas com muita frequência aqui fora até mesmo o menor passo em falso pode ser fatal.\n\nEu gostaria que alguém fosse até lá para ver se eles podem ser localizados. Seria ótimo se você o encontrasse vivo, mas, se não, um encerramento é o mínimo que podemos fazer pela família dele.\n\nLima Endicott\nDespachante Lídera\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_searchbody_nodanger_outpost_title_001=Desaparecido: ~mission(TargetName) <EM4>[50 Rep]</EM4>
cfp_searchbody_nodanger_station_desc_001=Dois moradores locais com os quais trabalhamos estavam fazendo salvamento na ~mission(Location|Address) quando tiveram alguns problemas com equipamentos defeituosos. Um deles conseguiu escapar, mas seu parceiro, ~mission(TargetName), infelizmente foi deixado para trás.\n\nCom o estado em que foi relatado pela última vez, acho que ele não conseguiu, mas gostaria de ter certeza. Se estiver disposto, eu poderia usar sua ajuda para encontrar os restos mortais deles.\n\nSe conseguir encontrá-lo, farei com que seja devidamente compensado pelo esforço.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
claimsweep_desc=~mission(Contractor|ClaimSweepDescription)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Turrets:</EM4> 3 (hostile)
claimsweep_title=~mission(Contractor|ClaimSweepTitle) <EM4>[50 Rep]</EM4>
combatassist_desc=ATENÇÃO: Um relé ECN em seu setor recebeu uma transmissão de sinal de emergência enviado de uma nave em perigo. Solicita-se a todas as naves disponíveis na área que possam prestar assistência que o façam imediatamente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
commarray_hack_desc==~mission(Contractor|CommArrayHackDescription)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
commarray_repair_desc=~mission(Contractor|CommArrayRepairDescription)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
commarray_repair_title=~mission(Contractor|CommArrayRepairTitle) <EM4>[1,000 Rep]</EM4>
covalex_UGF_collect_desc_001=Olá, \n\nTenho uma entrega que preciso que seja feita. O pedido está aguardando em <EM4>~mission(Location|Address)</EM4> para ser levado para <EM4>~mission(Destination|Address)</EM4>. \n\nTenho certeza de que você ficará bem, mas, para fins de divulgação completa, estou vendo vários avisos de segurança aparecerem para essa área. Parece que houve vários ataques nessa área nos últimos dias. Não estou dizendo que você vai se deparar com alguma coisa, mas provavelmente seria melhor se você trouxesse um pouco de proteção.\n\nBoa sorte,\n\nChase Hewitt\nJr. Coordenador de Logística\nCovalex Shipping \n'Tudo o que você precisar, em qualquer lugar que precisar.'\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Unknown:</EM4> 4
covalex_UGF_collect_title_001=Projeto Piloto de Entrega Covalex <EM4>[500 Rep]</EM4>
covalex_delivery_desc_0006=Oi,\n\n~mission(Contractor|Reaction)\n\nEncontrei o contrato perfeito para você. Tem uma remessa esperando em <EM4>~mission(Location|Address)</EM4> para ser levada para <EM4>~mission(Destination|Address)</EM4>. Parece bom, não é? ~mission(Contractor|Timed)~mission(Contractor|Danger)\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nCoordenador Logística Júnior\nCovalex Shipping  \n'Tudo o que você precisar, em qualquer lugar que precisar.'\n\n\n\n\n\n\n\nCovalex Shipping é uma corporação de responsabilidade limitada. Ao aceitar este contrato, você concorda com todos os termos e condições conforme descrito em nosso 'Guia Suplementar de Trabalhadores Independentes v.2948.01.29.' A Covalex Shipping não se responsabiliza por danos que ocorram enquanto você operar como contratado independente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexrand_desc=~mission(Description)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0001=Olá,\n\nEntendo perfeitamente se você não quiser me ajudar, mas se puder, seria fantástico.\n\nVeja, meu amigo morreu durante a tragédia de Covalex Gundo. Eles disseram que eu recuperaria todos os pertences de Scott assim que a investigação fosse concluída, mas até onde eu sei já faz um tempo e eles ainda não deram nenhuma indicação de quando poderei recuperar seus bens. Já é difícil lidar com tudo isso, e saber que um pacote vai aparecer em um ou dois meses e abrir todas essas feridas é demais. Eu preferiria fazer isso agora e acabar logo com isso. Se você pudesse encontrar uma maneira de recolher os pertences pessoais dele (Funcionário ID# 104) e deixá-los em ~mission(Destination), eu ficaria muito grato.\n\nObrigado pela sua ajuda,\nAnya\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0002=Meu irmão foi uma das pessoas que morreu quando a estação Covalex explodiu perto de Crusader. O pior é que ele tinha pegado algo emprestado de mim quando isso aconteceu. Agora algum idiota burocrático quer me dizer que tenho que esperar até receber minhas coisas de volta. Okay, certo. Primeiro você mata meu irmão e agora devo ser paciente? Que atrevimento desses engomadinhos. Esqueça isso. Em vez disso, pensei em contratar alguém para pegar minhas coisas em Gundo e trazê-las para ~mission(Destination) por mim. Quero dizer, o que diabos eles podem fazer sobre isso? De qualquer forma, meu irmão teria querido que fosse assim. Será a caixa marcada 156.\n\n- Ed\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0003=Estou um pouco desconfortável falando sobre isso, mas acontece que Kyomi Santos, uma das pessoas que morreram no desastre da Estação Covalex, deixou algo para mim em seu testamento. Fiquei surpreso ao ouvir isso, mas aparentemente sou agora o orgulhoso proprietário de tudo o que está guardado na Caixa 173. O pessoal da Covalex diz que posso conseguir quando a estação reabrir, mas... essa é a parte desagradável... eu realmente preciso muito dele agora. Normalmente eu apenas esperaria, mas estou tentando começar meu próprio negócio (fazendo bolos no formato de planetas natais) e os créditos que receber por vendê-los serão de grande ajuda. Agora tenho um pouco reservado que posso usar para pagar alguém para entregá-los para mim de Gundo para ~mission(Destination). Eu sei que a coisa toda é um pouco irregular, mas se houvesse outra opção eu não perguntaria.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0004=Meu filho Nico infelizmente estava entre as vítimas do trágico acidente na Estação Covelex Gundo e ainda não me devolveram todos os seus pertences pessoais. Entendo que tenham que seguir as regras, mas acho imperdoável que não acomodem os familiares enlutados. Para isso procuro alguém que possa me dirigir até a estação de trem. Para ser claro, Gundo é atualmente considerada uma área restrita, o que significa que não seria aceitável, mas penso que a minha situação merece uma consideração especial. Minha irmã diz que o preço que estou oferecendo é a quantia certa para pegar a caixa com as coisas do Nico (#964) e trazê-la para a ~mission(Destination), então espero encontrar uma pessoa competente que possa resolver esse assunto rapidamente .\n\nAtenciosamente,\nGlória Theolone\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0005=Você disse que eu poderia encontrar alguém aqui para ir até Gundo por mim e pegar uma caixa que pertencia à minha esposa. Se o nome não lhe parece familiar, esta é a estação onde ocorreu o grande acidente. Minha esposa trabalhava para a Covalex e sei que isso não torna a perda dela mais fácil, mas na verdade só quero as coisas da Cláudia de volta. Quando penso na coleção de fotos dela ou no colar que dei para ela, sentada naquela estação de trem fria e morta, em uma caixa marcada com 249, não está certo. Ela merece coisa melhor. Então, como está? Você está pronto para ir até Gundo e arrastar a caixa dela de volta para ~mission(Destination)?\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0006=Olá,\n\nEstou procurando alguém para ir até a Covalex Station Gundo, perto da Crusader, e pegar alguns itens. Sei que isso pode soar como roubo, mas são coisas do meu pai. Ele estava na estação Gundo quando houve o acidente. Minha mãe diz que precisamos esperar até que a Covalex diga, mas não acho justo, pois sinto muita falta dele. Gostaria de ter algo para me lembrar dele e não quero esperar mais, pois posso começar a me esquecer das coisas. Eu lhe pagarei para pegar a caixa 510 para mim e levar para a ~mission(Destination) para que eu possa tê-la.\n\nMuito obrigado,\nBaylor Ward\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
crus_markerhunt_from=Sociedade Histórica de Crusader\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
crusader_RetrieveConsignment_desc_001=De acordo com relatos, nossa equipe de segurança em ~mission(location|address) foi exterminada por um grupo de Nine Tails que tentava roubar materiais confidenciais recentemente entregues nas instalações. A Crusader Security precisa de um contratado experiente para expulsar os inimigos e proteger os materiais confidenciais. \n\nCom base nos relatórios iniciais, recomendamos fortemente que você venha bem equipado e traga reforços. Por questões de segurança, os materiais confidenciais foram transportados para lá como parte de uma remessa com outras caixas e trancados em um cofre automatizado. Os códigos de recuperação para acessar os materiais confidenciais são armazenados em datapads mantidos por funcionários de segurança de alto escalão, mas não sabemos quem os possui agora. As probabilidades são de que a Nine Tails também estará procurando por eles. \n\nQuando você tiver todos os materiais confidenciais, entregue-os em ~mission(dropoff1|address) para receber o pagamento. \n\nCONTRATO AUTORIZADO POR: \nOficial de Ligação Bautista \nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Guards x4, Hostiles x54
crusader_RetrieveConsignment_title_001=APOIE AS FORÇAS DE SEGURANÇA E PROTEJA AS REMESSAS <EM4>[500–4,000 Rep]</EM4>
crusader_UGF_defend_E_desc_001=A Crusader Security descobriu que ~mission(Location|Address) está atualmente sob ameaça de uma gangue local e estamos procurando um empreiteiro para montar uma equipe de segurança para lidar com possíveis ataques. \n\nEssa turma está ficando um pouco velha, mas no geral eles ainda são bastante inexperientes. Espero que seja relativamente fácil para você e sua equipe lidar com isso.\n\nCONTATO APROVADO POR:\nOficial de Ligação Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x1, Hostiles x10, Private Security x4, Sentries x6\n<EM4>Unknown:</EM4> 11
crusader_UGF_defend_E_title_001=Defenda o Local Contra Inimigos <EM4>[500 Rep]</EM4>
crusader_UGF_defend_VH_desc_001=A Crusader Security descobriu que ~mission(Location|Address) está atualmente sob ameaça de uma gangue conhecida que opera na área e estamos procurando uma equipe de segurança experiente para lidar com quaisquer possíveis ataques. \nTente garantir que todos que você traz consigo sejam devidamente qualificados. Você precisará de toda a ajuda possível para lidar com este grupo.\n\nCONTATO AUTORIZADO POR:\nOficial de Ligação Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x3, Hostiles x8, Private Security x4, Sentries x4\n<EM4>Unknown:</EM4> 21
crusader_UGF_defend_VH_title_001=Defenda o Local Contra Inimigos Perigosos <EM4>[500 Rep]</EM4>
crusader_UGF_defend_desc_001=A Crusader Security descobriu que ~mission(Location|Address) está atualmente sob ameaça de um grupo de criminosos e estamos procurando um contratado para montar uma equipe de segurança para impedir quaisquer ataques. \nSei que você pode ficar tentado a cuidar disso sozinho, mas precisa formar uma equipe para fazer isso. Acredite, não vale a pena tentar os créditos sozinho.\n\nCONTATO APROVADO POR:\nOficial de Ligação Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x8, Private Security x4, Sentries x8\n<EM4>Unknown:</EM4> 10
crusader_UGF_defend_title_001=Defenda o Local Contra Inimigos Perigosos <EM4>[500 Rep]</EM4>
crusader_UGF_destroy_E_desc_001=Descobrimos que um grupo está tentando iniciar seu próprio negócio de drogas em ~mission(Location|Address). O produto que eles fabricam é tóxico e responsável pela morte de vários civis, por isso não podemos nos dar ao luxo de vendê-lo.\n\nEstamos trabalhando em uma operação maior que irá eliminá-los para sempre, mas enquanto isso, devemos interromper o fluxo de suas drogas. É por isso que Crusader quer que você visite a área e destrua o esconderijo que eles têm lá. Eles sem dúvida terão guardas protegendo o esconderijo, mas não espero que representem uma grande ameaça.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Civilians x4
crusader_UGF_destroy_E_title_001=Destruir Drogas Ilegais <EM4>[500 Rep]</EM4>
crusader_UGF_destroy_H_desc_001=Um jovem sindicato se estabeleceu em ~mission(Location|Address) e está tentando entrar no mercado de drogas. Infelizmente, seu produto tem sido associado a várias mortes dentro e ao redor de Crusader. A substância é tão poderosa que representa uma séria ameaça ao público. \n\nCrusader está trabalhando para derrubar toda a operação, mas enquanto seu produto estiver por perto, os corpos continuarão se acumulando. \n\nQueremos que você vá até o local e destrua o estoque antes de vendê-lo. No entanto, você deve presumir que seu estoque estará extremamente bem guardado.\n\nCONTATO APROVADO POR:\nOficial de Ligação Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
crusader_UGF_destroy_H_title_001=Destruir Narcoticos Toxicos <EM4>[500 Rep]</EM4>
crusader_UGF_destroy_desc_001=Estamos investigando um recente surto de overdoses e parece que todas foram causadas por um lote ruim de medicamentos fabricados em ~mission(Location|Address). Estou trabalhando com outros empreiteiros para encontrar os responsáveis, mas enquanto o produto ainda estiver em circulação, pessoas morrerão. \n\nQuero que você vá até o local e destrua o esconderijo que eles têm lá. Isso deve nos dar algum tempo antes de eliminá-los para sempre. Eles terão guardas protegendo seus suprimentos, então esteja preparado para enfrentar os inimigos.\n\nCONTRATO AUTORIZADO POR:\nOficial de Ligação Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
crusader_UGF_destroy_title_001=Destrua Drogas Venenosas <EM4>[500 Rep]</EM4>
crusader_UGF_eliminateall_allies_desc_001=A Crusader Security descobriu que ~mission(Location|Address) está atualmente sob ameaça de um grupo de criminosos.\n\nEmbora tenhamos pessoal de segurança no local, planejamos contratar prestadores de serviços adicionais para ajudá-los a se defender de quaisquer ataques. \n\nBem, como contratado, não sei se você está acostumado a trabalhar em equipe, mas não quero ouvir falar de "fogo amigo" ou haverá problemas.\n\nCONTATO APROVADO POR: \nOficial de ligação Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
crusader_UGF_eliminateall_allies_desc_intro=Em um esforço para aumentar a segurança de Crusader e seus arredores, a Crusader Security está procurando indivíduos qualificados para ajudar no trabalho de segurança neste setor. \nDeterminamos que você possui as habilidades necessárias para oferecer um contrato experimental inicial. Você ajudará a Crusader Security no combate a um pequeno grupo inimigo que fez ameaças contra ~mission(Location|Address). \n\nObserve que já temos equipe de segurança no local, então você precisa ter cuidado com o fogo amigo.\n\nApós a conclusão bem-sucedida deste contrato, você estará qualificado para se candidatar a funções de segurança futuras assim que estiverem disponíveis.\n\nCONTRATO AUTORIZADO POR:\nOficial de ligação Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
crusader_UGF_eliminateall_allies_desc_rehire=Parabéns! A Crusader Security decidiu dar a você outra chance de se tornar um contratado de segurança. Esperamos que com um pouco de trabalho e esforço você consiga superar quaisquer problemas de desempenho anteriores. \n\nMas primeiro, gostaríamos de pedir que você ajude a Crusader Security a combater um grupo fora da lei que vem fazendo ameaças contra a ~mission(Location|Address).\n\nAgora que você teve problemas de desempenho no passado, quero você lembra que fogo amigo não será tolerado.\n\nApós a conclusão bem-sucedida deste processo, sua elegibilidade será restabelecida e você poderá se inscrever novamente para trabalho de segurança com a Crusader.\n\nCONTATO APROVADO POR:\nOficial de ligação Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
crusader_UGF_eliminateall_allies_title_001=Fornecer Apoio <EM4>[500 Rep]</EM4>
crusader_UGF_eliminateall_allies_title_intro=Avaliacao do Trabalho de seguranca <EM4>[500 Rep]</EM4>
crusader_UGF_eliminateall_allies_title_rehire=Reavaliar o Trabalho de seguranca <EM4>[500 Rep]</EM4>
crusader_UGF_eliminateall_desc_001=A Crusader Security descobriu que a ~mission(Location|Address) está atualmente sendo usada como base de operações para inúmeras atividades ilegais.\n\nPara acabar com esse "ninho de criminosos", estamos procurando um empreiteiro vá até o local e todos os ocupantes sejam removidos. Se necessário, à força.\n\nCONTATO APROVADO POR:\nOficial de Ligação Bautista\nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Nine Tails x4
crusader_UGF_eliminateall_nocivs_desc_001=A Crusader Security descobriu que ~mission(Location|Address) está sendo usado atualmente como base de operações para inúmeras atividades ilegais.\n\nPara acabar com esse "ninho criminoso", estamos procurando um empreiteiro ir ao local e todos os elementos hostis eliminados. E, só para você saber, essas gangues às vezes enganam os civis para que trabalhem para elas, muitas vezes sob coação. Isto deveria ser desnecessário dizer, mas quando você vê civis, eles precisam ser protegidos. A Crusader Security não pode permitir que um de seus contratados atire em pessoas indiscriminadamente.\n\nCONTATO APROVADO POR:\nOficial de Ligação Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13\n<EM4>Friendlies:</EM4> Civilians x4
crusader_UGF_eliminateall_title_001=Elimine o Grupo de Criminosos <EM4>[500 Rep]</EM4>
crusader_bounty_desc_first=Em um esforço para aumentar a segurança de Crusader e seus arredores, a Crusader Security está procurando indivíduos qualificados para ajudar na coleta de recompensas na área. \n\nDeterminamos que você possui as habilidades necessárias e gostaríamos de lhe oferecer um contrato inicial de recompensa experimental para ~mission(TargetName), visto pela última vez em ~mission(Location|Address). \n\nApós a conclusão bem-sucedida deste contrato, você será colocado na lista de freelancers verificados da Crusader e será elegível para futuras coleções de recompensas assim que estiverem disponíveis.\n\n\nCONTATO APROVADO POR:\nOficial de Ligação Bautista\nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
crusader_bounty_desc_rehire=Boas notícias! A Crusader Security decidiu dar a você outra chance de se tornar um empreendedor de recompensas. Esperamos que durante esse período você tenha resolvido todos os problemas de desempenho passados e possa ser útil novamente.\n\nPrimeiro, porém, precisamos reavaliá-lo e gostaríamos que você concluísse este contrato de recompensa para ~mission(TargetName). \n\nApós a conclusão bem-sucedida deste exame, você será adicionado novamente à lista de freelancers verificados da Crusader e estará qualificado para recompensas futuras assim que estiverem disponíveis.\n\n\nCONTATO APROVADO POR:\nOficial de ligação Bautista\nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
crusader_bounty_fps_UGF_desc_001=Graças a uma prisão recente, descobrimos a localização de uma recompensa ativa com o nome de ~mission(TargetName). Acredita-se que eles estejam escondidos em ~mission(Location|Address). Você foi autorizado a entrar no local, encontrá-los e coletar a recompensa.\n\nTemos todos os motivos para acreditar que haverá outros elementos criminosos no local, mas, no momento, apenas ~mission(TargetName|Last) é sua preocupação. \n\nCONTRATO AUTORIZADO POR:\nOficial de Ligação Gibbs\nID# 91G66BW0\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
crusader_bounty_fps_UGF_nocivs_desc_001=Tivemos sorte e algumas varreduras recentes de ~mission(Location|Address) revelaram que há uma recompensa aberta escondida lá chamada ~mission(TargetName). Eles foram autorizados a entrar no local, encontrá-los e desmontar a recompensa.\n\nNo entanto, é provável que haja civis no local, além da recompensa e cúmplices criminosos. Embora estejamos ansiosos para ver ~mission(TargetName|Last) concluída, não podemos usar vítimas civis. Tenha cuidado ao enfrentar os inimigos. \nCONTRATO AUTORIZADO POR:\nOficial de Ligação Gibbs\nID# 91G66BW0\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
crusader_bounty_fps_title_001=EXTRACAO DE RECOMPENSA: ~mission(TargetName) (?RT) <EM4>[500–1,000 Rep]</EM4>
crusader_bounty_title_E=Recompensa Emitida Para ~mission(TargetName) (LRT) <EM4>[500 Rep]</EM4>
