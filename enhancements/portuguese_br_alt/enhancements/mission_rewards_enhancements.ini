Shubin_Industrial_ShipMining_Nyx_E_Local_Desc_001=ANÚNCIO: Ordem de Compra\nLOCALIZAÇÃO: <EM4>~mission(System) </EM4>\n\nTERMOS*: \nDevido a mudanças em nossa cadeia de suprimentos, a Shubin Interstellar está atualmente procurando comprar uma variedade de materiais refinados de mineradores independentes que operam na área. Embora vender em um centro comercial possa lhe render um preço mais competitivo do que cumprir nossa ordem, muitos mineradores consideram que fortalecer seus laços com a Shubin é um investimento sábio a longo prazo para suas carreiras.\n\n~mission(Hint_Location) Para uma lista abrangente de onde encontrar estes minerais, consulte <EM4>Mining Fundamentals #2: Where to Mine</EM4> em seu Journal no mobiGlas. Enquanto estiver lá, sinta-se à vontade para ler a primeira parte <EM4>Mining Fundamentals #1: Basic Overview</EM4> se quiser uma atualização sobre como obter os materiais.\n\nComo esta é uma ordem de compra e não um contrato de mineração, espera-se que você forneça seu próprio equipamento, como um <EM4>~mission(Hint_Tool)</EM4>.\n\nPor favor, note que, em um esforço para agilizar o uso futuro desses materiais, <EM4>eles devem ser refinados antes da entrega</EM4>. Isso pode ser feito em qualquer refinaria, cujas localizações podem ser encontradas em seu Starmap.\n\nQuando estiver pronto para nos vender os materiais refinados solicitados, deposite-os no elevador de carga localizado em <EM4>~mission(Destination|Address)</EM4>.\n\n*Ao aceitar este contrato, você assume todos e quaisquer riscos associados ao trabalho aqui descrito e de forma alguma a Shubin Interstellar pode ser responsabilizada por quaisquer danos acumulados durante a duração do contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Nyx]</EM4>\n- Arclight "Stormfall" Pistol\n- Arclight Pistol\n- [S1-A] Arclight Pistol Battery (30 cap)\n- [S1-A] Horizon Helmet\n- [S1-A] Venture Arms\n- [S1-A] Venture Core\n- [S1-A] Venture Legs\n\n<EM4>[Nyx, Rank 0–1]</EM4>\n- [IND-S0-C] Surveyor-Go\n- 