BHG_Certification_EscapedConvict_Desc=--------------------------------------------------------\n----------------- CONTRATO DE RECOMPENSA -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName) \nSISTEMA: ~mission(System)\nAVALIAÇÃO DE RISCO: Alto\nÚLTIMA LOCALIZAÇÃO CONHECIDA: Centro de Reabilitação Klescher\nAFILIAÇÕES CONHECIDAS: <None>\nNOTAS: Devido ao aumento de fugitivos na área, a Bounty Hunters Guild gostaria de oferecer a você a chance de obter sua Certificação de Recuperação de Fugitivos.\n\nIsto significaria que você está qualificado para rastrear e prender condenados em fuga. Esses indivíduos desesperados muitas vezes podem ser bastante difíceis de recapturar, exigindo habilidades especiais e intuição aguçada.\n\nPara concluir com sucesso este processo de certificação, você deve prender o fugitivo <EM4>~mission(TargetName)</EM4>.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca da Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Mercenary Guild e autorizado a operar tanto na UEE quanto além, de acordo com os Atos da Xenotrade Authority.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50
