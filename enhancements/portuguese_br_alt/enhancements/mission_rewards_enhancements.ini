EckhartSecurity_DestroyServers_FacilityDelving_Desc_001=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Destruir Servidor\nCÓDIGO DE APROVAÇÃO = VS-14\n\nPARA PROCESSAMENTO IMEDIATO\n\nNosso cliente solicitou a destruição imediata de um grupo de servidores localizados em um local de pesquisa da ASD há muito tempo fechado. Os servidores em questão contêm informações que nosso cliente considera extremamente prejudiciais e ele está ansioso para ver os dados completamente eliminados.\n\nVigilância inicial indica que os servidores estão dentro do <EM4>Laboratório de Energia (Energy Lab), localizado na ala de Pesquisa (Research wing)</EM4>. Também detectamos diversas forças hostis, portanto, fique em alerta.\n\nO pagamento será emitido após a conclusão bem-sucedida do contrato.\n\nEste contrato é não negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. A informação destina-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Applicant:</EM4> +50 Rep
EckhartSecurity_DestroyServers_FacilityDelving_Desc_002=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Destruir Servidor\nCÓDIGO DE APROVAÇÃO = VS-14\n\nPARA PROCESSAMENTO IMEDIATO\n\nUm cliente nos pediu para infiltrar um antigo local de pesquisa da ASD e apagar o conteúdo de alguns servidores específicos lá.\n\nAcreditamos que os servidores estejam localizados em algum lugar dentro do <EM4>Laboratório de Xenotecnologia (Xenotech Lab), na ala de Pesquisa (Research wing)</EM4>. O cliente também nos informou que, apesar de as instalações terem sido declaradas publicamente como fechadas, é provável que você ainda encontre forças hostis lá.\n\nO pagamento será emitido após a conclusão bem-sucedida do contrato.\n\nEste contrato é não negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. A informação destina-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Applicant:</EM4> +50 Rep
EckhartSecurity_DestroyServers_FacilityDelving_Desc_003=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Destruir Servidor\nCÓDIGO DE APROVAÇÃO = VS-14\n\nPARA PROCESSAMENTO IMEDIATO\n\nEste é um contrato simples de busca e destruição. O cliente solicitou que vários servidores localizados em um local de pesquisa da ASD sejam destruídos o mais rápido possível. Sob nenhuma circunstância esses servidores devem ser acessados, nem cópias dos dados devem ser feitas.\n\nO cliente acredita que os servidores estão em algum lugar na <EM4>ala de Engenharia (Engineering wing)</EM4>, provavelmente na área de <EM4>Gerenciamento (Management)</EM4>. Além disso, há uma grande chance de você não ser a única presença no local, então tome cuidado com possíveis hostis.\n\nO pagamento será emitido após a conclusão bem-sucedida do contrato.\n\nEste contrato é não negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. A informação destina-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Applicant:</EM4> +50 Rep
EckhartSecurity_DestroyServers_FacilityDelving_Desc_004=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Destruir Servidor\nCÓDIGO DE APROVAÇÃO = VS-14\n\nPARA PROCESSAMENTO IMEDIATO\n\nO cliente solicitou um contratado discreto para infiltrar um local de pesquisa da ASD, localizar um grupo de servidores e destruir as informações armazenadas neles permanentemente.\n\nO cliente pôde compartilhar a localização dos servidores dentro da instalação: o <EM4>Centro de Controle (Control Center) na ala de Engenharia (Engineering wing)</EM4>. O local foi oficialmente fechado, mas ainda pode haver forças hostis lá. Esteja em guarda.\n\nO pagamento será emitido após a conclusão bem-sucedida do contrato.\n\nEste contrato é não negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. A informação destina-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Applicant:</EM4> +50 Rep
