blacjac_recoverspace_desc_intro=ATENÇÃO: Mercenários / Caçadores de Recompensas com Experiência em Manuseio de Carga\n\nAcabamos de receber a notícia de que um ladrão chamado ~mission(TargetName) está voando por aí com seu golpe mais recente a bordo de sua nave.\n\nNormalmente, mandaríamos alguém prender o desgraçado e acabar com isso, mas no momento o mais importante é que os bens roubados sejam recuperados. \n\nSe isso parece ser o seu tipo de coisa, você será autorizado a rastrear ~mission(TargetName|Last), proteger o ~mission(Item) roubado como puder e entregá-lo a ~mission(Destination|Address). ~mission(Contractor|RecoverSpaceTimed)~mission(Danger)\n\nObrigada,\nGloria Mesa\nSupervisora de Contrato Privado\nBlacJac Security, "Proteção Fornecida"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
