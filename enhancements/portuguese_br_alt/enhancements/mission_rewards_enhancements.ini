Foxwell_DefendLocation_S_Desc_001=Estamos procurando um profissional experiente para lidar com uma missão de alto risco. Temos clientes VIP em <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> enfrentando criminosos extremamente agressivos e determinados, que estão atacando naves na região. Detalhes exatos do ataque ainda estão chegando, mas parece se tratar de uma operação ampla e com múltiplas frentes.\n\nSe estiver disponível, recomendo fortemente levar naves de suporte adicionais, muitos suprimentos e estar pronto para o pior. Faça tudo certo, e recompensaremos o contratado principal com um pagamento bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n‘Segurança, do Seu Jeito’\n\nA Foxwell Enforcement é uma especialista em segurança credenciada e licenciada para operar por todo o UEE. Estamos sempre em busca de novos operadores para se juntar à nossa equipe. Se você ou alguém que conhece estiver interessado, entre em contato com um de nossos representantes de contratos.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- [S1-A] Antium Arms Storm\n- [S1-A] Antium Core Storm\n- [S1-A] Antium Helmet Storm\n- [S1-A] Antium Legs Storm\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x10, Hostiles x3, Interdiction Ships x6, Reinforcements x20\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Head Contractor:</EM4> +16,000 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_DefendLocation_S_Title_001=CONTRATO NÍVEL VERMELHO: APOIE CLIENTES VIP <EM4>[BP]</EM4> <EM4>[300–16,000 Rep]</EM4>
Foxwell_DefendLocation_VE_Desc_001=Naves de fora-da-lei estão assediando qualquer um que tente pousar ou deixar as operações do nosso cliente em <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4>. Precisamos de alguém que voe até lá para defender o local e proteger as naves do cliente antes que a situação fuja do controle. Vá até lá, enfrente os agressores e eu manterei você informado sobre os acontecimentos. \n\nAjude a resolver isso e repassaremos um pagamento bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4> ao contratado principal.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n‘Segurança, do Seu Jeito’\n\nA Foxwell Enforcement é uma especialista em segurança credenciada e licenciada para operar por todo o UEE. Estamos sempre em busca de novos operadores para se juntar à nossa equipe. Se você ou alguém que conhece estiver interessado, entre em contato com um de nossos representantes de contratos.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- [S1-A] Antium Arms Storm\n- [S1-A] Antium Core Storm\n- [S1-A] Antium Helmet Storm\n- [S1-A] Antium Legs Storm\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2, Hostiles x1, Reinforcements x6\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_DefendLocation_VE_Title_001=CONTRATO NÍVEL AMARELO: ENFRENTE OS AGRESSORES <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_DefendLocation_VH_Desc_001=Suporte aéreo é necessário imediatamente em <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4>. Os interesses do nosso cliente na área estão sob ataque feroz de forças criminosas. Procuramos alguém que possa pegar seu equipamento, algumas naves de apoio confiáveis, e se mobilizar antes que seja tarde demais. Assim que chegar, enviarei atualizações da situação.\n\nNão estrague isso. Esses clientes estão pagando e esperando proteção de altíssimo nível. Se algo der errado, podemos perder o contrato. Por isso daremos ao contratado principal um pagamento bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4> se tudo ocorrer sem problemas.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n‘Segurança, do Seu Jeito’\n\nA Foxwell Enforcement é uma especialista em segurança credenciada e licenciada para operar por todo o UEE. Estamos sempre em busca de novos operadores para se juntar à nossa equipe. Se você ou alguém que conhece estiver interessado, entre em contato com um de nossos representantes de contratos.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- [S1-A] Antium Arms Storm\n- [S1-A] Antium Core Storm\n- [S1-A] Antium Helmet Storm\n- [S1-A] Antium Legs Storm\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x7, Hostiles x3, Interdiction Ships x4, Reinforcements x16\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_DefendLocation_VH_Title_001=CONTRATO NÍVEL VERMELHO: SALVE AS NAVES EM ~mission(DefendLocationWrapperLocation) <EM4>[BP]</EM4> <EM4>[250 Rep]</EM4>
Foxwell_DestroyNarcotics_E_desc_001=Algumas pessoas fazem qualquer coisa por alguns créditos. Há um grupo de bandidos novatos em <EM4>~mission(Location|Address)</EM4> que decidiu começar a fabricar drogas. Acontece que eles não são muito bons nisso, ou talvez sejam um pouco bons demais. O lixo que eles estão produzindo é mais forte do que o normal e representa um perigo real para qualquer pessoa que o use. \n\nFomos contratados para acabar com a operação deles e destruir os estoques de drogas no local. Guardas armados estão protegendo o local, mas eles não parecem muito habilidosos. Nossas equipes de vigilância observaram que um deles quase deu um tiro no próprio pé. Não posso dizer com certeza, mas é provável que eles não causem muitos problemas a um profissional como você.  \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma empresa especializada em segurança licenciada para operar em todo o UEE. Estamos sempre procurando novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes contratuais.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Civilians x4\n<EM4>Jr. Security Contractor:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_DestroyNarcotics_E_title_001=DERRUBAR NOVA OPERAÇÃO DE DROGAS <EM4>[BP]</EM4> <EM4>[500 Rep]</EM4>
Foxwell_DestroyNarcotics_H_desc_001=Relatos de um aumento no número de overdoses de drogas em Stanton preocupam os serviços de segurança. Parece que uma equipe de dois bandidos está aumentando seus lucros cortando suas coisas com produtos químicos tóxicos. Acabar com essa equipe e interromper a distribuição de suas drogas se tornou prioridade máxima.\n\nUm informante da Foxwell revelou que parte dessa equipe está atualmente instalada na <EM4>~mission(Location|Address)</EM4>. Estou contratando uma empresa terceirizada para ir até lá e destruir as drogas que eles têm escondidas antes que sejam espalhadas pelo sistema. Mas é melhor ter cuidado, pois dizem que essa equipe está armada até os dentes e determinada a lucrar com esse veneno, não importa o que aconteça.\n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança, do Seu Jeito'\n\nA Foxwell Enforcement é uma empresa especializada em segurança licenciada para operar em todo o UEE. Estamos sempre procurando novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes contratuais.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4\n<EM4>Sr. Security Contractor:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
