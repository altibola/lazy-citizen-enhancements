murderspree_desc=~mission(DistractionKillDescription|Description)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
northrock_boarders_890J_desc_001=Um cliente sênior acaba de nos informar que sua 890 Jump foi interceptada em ~mission(Location) e abordada por bandidos. Devido aos dados sensíveis armazenados a bordo, prefeririam que o assunto fosse mantido confidencial. \nSua principal prioridade é eliminar todos os bandidos o mais rápido possível para que uma equipe de sucateamento possa ser enviada para devolver a nave ao proprietário. Quanto mais tempo os bandidos mantiverem o controle da nave, maior será a chance de ele ser perdido. Recomendo que você contrate uma equipe para esta viagem para agilizar o assunto. \nGraças a um pequeno contingente de pessoal de segurança que permaneceu a bordo, todos os tripulantes sobreviventes conseguiram escapar num bote salva-vidas. O status atual das forças de segurança restantes é desconhecido, mas como precaução, fique atento aos amigos ao enfrentar os inimigos.\n\nEm segundo lugar, se possível, o cliente está *muito* interessado em evitar o roubo dos dados acima. . Se você conseguir evitar o roubo de seus armazenamentos de dados confidenciais antes que eles sejam transferidos, você receberá um bônus generoso.\n\nNem é preciso dizer que gostaria de manter este cliente satisfeito. \n\nBraden Corchado\nRepresentante de Logística - Filial Stanton\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
northrock_boarders_890J_title_001=URGENTE: Abordagem em andamento <EM4>[8,000 Rep]</EM4>
northrock_bounty_PVP_desc_first=Olá,\n\nEspero que não se importe, mas fui informado sobre seu status na Bounty Hunters Guild e queria entrar em contato para ver se você estaria interessado em contratar com o Northrock Service Group, uma das principais empresas de segurança privada do sistema.\n\nSe você estiver, o primeiro passo seria completar uma apreensão de suspeito pro tempore. Não é tanto uma avaliação, mas mais uma oportunidade para garantir que podemos ter um bom relacionamento de trabalho.\n\nO suspeito que você estará caçando é conhecido como <EM4>~mission(TargetName)</EM4>. Ele é conhecido por ser particularmente evasivo, então você pode ter um trabalho difícil pela frente.\n\nEspero ouvir de você em breve,\n\nBraden Corchado\nOficial de Logística - Filial Stanton\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500
northrock_bounty_PVP_desc_rehire=Oi de novo,\n\nFaz um tempo, espero que tudo esteja bem. Sei que as coisas não terminaram da melhor forma, mas depois de discutir com a gestão, gostaria de oferecer a oportunidade de se redimir. Você tinha potencial e eu odiaria pensar que você não teve uma chance adequada de mostrar do que é capaz.\n\nCapture <EM4>~mission(TargetName)</EM4> e podemos ver sobre a reintegração do seu status de emprego.\n\nBraden Corchado\nOficial de Logística - Filial Stanton\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
northrock_bounty_PVP_title_001=Capturar Suspeito: ~mission(TargetName) <EM4>[500 Rep]</EM4>
northrock_bounty_PVP_title_first=PRISÃO TEMPORÁRIA DE SUSPEITO <EM4>[500 Rep]</EM4>
northrock_bounty_PVP_title_rehire=PRISÃO TEMPORÁRIA DE SUSPEITO (REAVALIAÇÃO) <EM4>[500 Rep]</EM4>
northrock_bounty_desc_first=Oi,\n\nEspero que tudo esteja indo bem. Pode ser que já tenha entrado em contato comigo, mas só para garantir, queria te mandar outra mensagem. Sou oficial de logística da filial de Stanton do Northrock Service Group, uma das empresas de segurança privada mais bem avaliadas do sistema, e estamos procurando expandir nosso portfólio de contratados qualificados.\n\nAgora, mesmo que você seja certificado pela Bounty Hunters Guild, o Northrock precisará que você complete um contrato pro tempore para garantir que somos compatíveis. Estou pensando em começar com você capturando a recompensa de <EM4>~mission(TargetName)</EM4>. Eles foram vistos pela última vez em <EM4>~mission(Location|Address)</EM4>.\n\nComplete isso e veremos sobre conseguir mais trabalho para você.\n\nEspero ouvir de você em breve,\n\nBraden Corchado\nOficial de Logística - Filial Stanton\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
northrock_bounty_fps_UGF_boss_desc_001=Ei, \n\nTenho uma caça interessante para você. Um criminoso de alto nível chamado ~mission(TargetName) foi localizado em ~mission(Location|Address). \n\nCom base em nossas informações, é altamente improvável que o alvo esteja sentado do lado de fora, esperando. Você provavelmente terá que se infiltrar nas instalações e atraí-los. \n\nAlgo como um grande tiroteio deve ser suficiente para conseguir isso. \n\nBoa sorte,\n\nBraden Corchado\nDiretor de Logística - Filial Stanton\nNorthrock Service Group\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- F55 LMG\n- LH86 Pistol\n- [S1-A] Defiance Arms Tactical\n- [S1-A] Defiance Core Tactical\n- [S1-A] Defiance Helmet Tactical\n- [S1-A] Defiance Legs Tactical\n- [S1-A] F55 LMG Magazine (150 cap)\n- [S1-A] Lynx Arms\n- [S1-A] Lynx Core\n- [S1-A] Lynx Legs\n- [S1-A] Oracle Helmet\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Backup x4, Boss x1, Hostiles x2, Soldiers x4, Technicians x4\n<EM4>Applicant:</EM4> +4,000 Rep\n<EM4>Failure Penalty:</EM4> -2,000 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
northrock_bounty_fps_UGF_boss_nocivs_desc_001=Ei, tenho um trabalho para você que requer um pouco mais de tática do que o normal. Um criminoso de alto escalão chamado ~mission(TargetName) está escondido em ~mission(Location|Address) com um grande contingente de bandidos. \nDe acordo com nossas informações, as tropas de ~mission(TargetName|Last) provavelmente atuarão como uma linha defensiva para proteger seu chefe. Presumo que você terá que lidar com eles antes de obter acesso a ~mission(TargetName|Last).\n\nFora isso, não quero que você atire indiscriminadamente. Às vezes, esses bandidos estão próximos de civis e devem ser tratados como não-combatentes.\n\nBoa sorte,\n\nBraden Corchado\nOficial de Logística - Filial Stanton\nGrupo de Serviço Northrock\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- F55 LMG\n- LH86 Pistol\n- [S1-A] Defiance Arms Tactical\n- [S1-A] Defiance Core Tactical\n- [S1-A] Defiance Helmet Tactical\n- [S1-A] Defiance Legs Tactical\n- [S1-A] F55 LMG Magazine (150 cap)\n- [S1-A] Lynx Arms\n- [S1-A] Lynx Core\n- [S1-A] Lynx Legs\n- [S1-A] Oracle Helmet\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Backup x4, Boss x1, Hostiles x2, Soldiers x8, Technicians x4\n<EM4>Friendlies:</EM4> Civilians x4\n<EM4>Applicant:</EM4> +8,000 Rep\n<EM4>Failure Penalty:</EM4> -4,000 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
northrock_bounty_fps_title_001=MISSÃO DE RECOMPENSA: ~mission(TargetName) (?RT) <EM4>[BP]</EM4> <EM4>[4,000–8,000 Rep]</EM4>
northrock_bounty_prisoner_desc_001=O criminoso condenado ~mission(TargetName) escapou de uma clínica de reabilitação local e Northrock foi encarregado de levar o prisioneiro de volta sob custódia. Na minha experiência, os prisioneiros fugitivos não estão inclinados a render-se pacificamente, por isso use todos os métodos para encontrar e subjugar o fugitivo. \nPode valer a pena identificar locais onde eles poderiam tentar limpar seus registros. Não seria a primeira vez que um prisioneiro tenta redimir sua pena após escapar.\n\nBoa caçada,\n\nBraden Corchado\nOficial de Logística - Filial Stanton\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
northrock_bounty_prisoner_desc_intro=Olá, meu nome é Braden Corchado e sou o representante de logística da Northrock Service Group, a empresa de segurança independente líder no sistema Stanton. Posso já ter contactado, mas tentamos abordar qualquer pessoa que cumpra os nossos elevados padrões e incentivá-la a assinar um contrato temporário. \nVocê não pode fazer melhor do que se tornar um empreiteiro da Northrock. Temos uma boa reputação por oferecer trabalhos desafiadores e interessantes com salários mais elevados do que muitos dos nossos concorrentes no sistema. \n\nPara ser admitido, você deve prender uma ~mission(TargetName). Eles escaparam recentemente do centro de detenção e seu trabalho será localizá-los antes que desapareçam completamente. \nUma pequena observação: é provável que o alvo tente excluir seu registro. Recomendo triangular a busca entre o centro de detenção de onde eles escaparam e os locais onde eles podem invadir o sistema de gravação.\n\nFaça isso e veremos se você consegue mais trabalho.\n\nEsperamos receber notícias suas em breve, \n\nBraden Corchado\nDiretor de Logística - Filial Stanton\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500
northrock_bounty_prisoner_desc_rehire=Ei, \n\nEu sei que já faz um tempo, mas se você ainda estiver interessado em trabalhar para a Northrock, convenci a administração a fazer uma reavaliação. Se você conseguir colocar uma recompensa por nossa cabeça, poderemos providenciar para que seu status de emprego seja restaurado.\n\nEssa missão temporária é rastrear uma criminosa fugitiva ~mission(TargetName). Faça o possível para encontrá-los antes que eles possam excluir seus dados do banco de dados, caso contrário o trabalho será muito mais difícil.\n\nEspero que possamos confiar em você nisso.\n\nBraden Corchado\nDiretor de Logística - Filial Stanton \nNorthrock Grupo de serviço\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
northrock_bounty_prisoner_title_001=MISSÃO DE RECOMPENSA DE FUGITIVO: ~mission(TargetName) <EM4>[500 Rep]</EM4>
northrock_bounty_prisoner_title_intro=CONTRATO TEMPORÁRIO DE CAÇA A FUGITIVOS <EM4>[500 Rep]</EM4>
northrock_bounty_prisoner_title_rehire=CONTRATO TEMPORÁRIO DE CAÇA A FUGITIVOS (REAVALIAÇÃO) <EM4>[500 Rep]</EM4>
northrock_bounty_title_H=MISSÃO DE RECOMPENSA: ~mission(TargetName) (HRT) <EM4>[500 Rep]</EM4>
northrock_bounty_title_M=MISSÃO DE RECOMPENSA: ~mission(TargetName) (MRT) <EM4>[500 Rep]</EM4>
northrock_bounty_title_first=CONTRATO PROFISSIONAL DE CAÇA TEMPORÁRIO <EM4>[500 Rep]</EM4>
northrock_groupbounty_desc_intro=Olá, espero que tudo esteja indo bem. Talvez eu já tenha entrado em contato, mas queria ter certeza e me apresentar. Sou oficial de logística da Northrock Service Group, a principal empresa de segurança de propriedade independente que opera no sistema Stanton atualmente, fornecendo uma variedade de serviços para todos os principais órgãos governamentais, bem como para várias empresas privadas. Estou entrando em contato com você porque acreditamos que alguém com suas habilidades poderia ser uma vantagem para nossos clientes. \n\nNão apenas isso, mas acho que seríamos uma boa opção para você. Tradicionalmente, nossos prestadores de serviços recebem uma remuneração mais alta do que a de muitos de nossos concorrentes no sistema, e muitos deles me dizem que realmente gostam de ser encarregados do trabalho desafiador e interessante que oferecemos. \n\nAgora, a Northrock se mantém em padrões tão altos que, antes de oficializarmos qualquer coisa, você precisará obter o status de contratado aprovado ao concluir um contrato temporário. \n\nEu esperava que você pudesse capturar vários membros procurados de uma gangue fora da lei: ~mission(Target1), ~mission(Target2), and ~mission(Target3).\n\nFaça isso e veremos se conseguimos mais trabalho para você.\n\nEspero ter notícias suas em breve, \n\nBraden Corchado\nOficial de Logística - Filial de Stanton\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x15, Targets x6
northrock_groupbounty_desc_rehire=Ei, \n\npensei em tudo que aconteceu e resolvi falar com a gerência. Eles concordaram em lhe dar outra chance, mas somente se você completar com sucesso uma missão para nós.\n\nPodemos considerar contratá-lo de volta se você conseguir capturar este trio criminoso:\n~mission(Target1)\n~mission(Target2)\n~mission(Target3)\n\nEles escaparam do último funcionário que estava atrás deles, então pegá-los com certeza lhe renderia alguns pontos.\n\nEspero que você tenha se recomposto desde seu último trabalho.\n\nBraden Corchado\nRepresentante de Logística - Filial Stanton\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x15, Targets x3
