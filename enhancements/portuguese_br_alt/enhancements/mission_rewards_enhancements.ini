mgClovus_opensalvage_desc_001=A sorte brilhou sobre nós mais uma vez. Acabei de saber de uma batalha perto de ~mission(Location) que aconteceu longe dos olhares indiscretos de qualquer Matriz de Comunicação intrometida, e reforços de qualquer uma das forças envolvidas ainda não foram despachados. Isso significa que há uma janela de oportunidade para uma alma empreendedora limpar o cemitério.\n \nGostaria de estender esta oportunidade a todos os meus contatos de confiança. Todo e qualquer interessado pode ter a localização… pelo preço certo. As coordenadas serão fornecidas assim que você aceitar o contrato e permanecerão disponíveis até que você decida rescindi-lo.\n\nÉ claro que a velocidade será essencial, pois você não apenas enfrentará a concorrência potencial de outros sucateadores, mas também a possibilidade iminente de reforços chegando para inspecionar o campo de batalha. \n\nSe você ainda está hesitante, lembre-se: a sorte favorece os ousados.\n\n-cd\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Friendlies:</EM4> Salvageable Ships x8
