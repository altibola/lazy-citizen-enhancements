items_commodities_goldenmedmon_desc=CDN: 39\nIEH: 19\nEfeitos: Energizante, Hidratante\n\nCultivados em climas temperados na Árvore de Ébano Maru, os Medmons Dourados caem da árvore quando maduros e colhidos. O fruto nessa fase é extremamente firme e adstringente. Eles só se tornam comestíveis depois de 'estraagare' ou serem amolecidos através do amadurecimento com etileno.\n\n<EM3>BLUEPRINT DATA</EM3>\n- Electron Ammo\n- Fresnel Energy LMG\n- Pulse Laser Pistol, Pulse Pistol\n- Parallax Energy Assault Rifle\n- Prism Laser Shotgun\n- Quartz Energy SMG\n- Zenith Laser Sniper Rifle\n- vehiclegear/radar: 11 items\n- vehiclegear/shield: 11 items\n- NDB-26 Repeater, NDB-28 Repeater, NDB-30 Repeater\n- Cannons (4 types)\n- Scatters (4 types)
