items_commodities_carinite=CARINITA <EM4>[CF|Collection]</EM4>
items_commodities_carinite_desc=Um mineral raro porque a pressão extrema necessária para a sua formação é muito incomum, ele é muito procurado graças ao seu uso em processadores de computador avançados e outros componentes eletrônicos de ponta.\n\n<EM3>BLUEPRINT DATA</EM3>\n- Parallax Energy Assault Rifle\n- Quartz Energy SMG
