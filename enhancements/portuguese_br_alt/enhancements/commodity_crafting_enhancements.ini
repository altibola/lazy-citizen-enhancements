items_commodities_glacosite=GLACOSITA <EM4>[CF|Collection]</EM4>
items_commodities_glacosite_desc=À medida que as geleiras se formam, os conteúdos minerais mais pesados afundam com o tempo e são esmagados pelo peso acima à medida que o gelo se deforma e flui. Quando a geleira recua, os depósitos de glacosita são deixados para trás. De cor branca e azul, os cristais se formam em longos fios brilhantes com aparência quase de algodão. O glacosita encontrou uso comercial especializado por ser um isolante extremamente leve e durável.\n\n<EM3>BLUEPRINT DATA</EM3>\n- vehiclegear/shield: 24 items
