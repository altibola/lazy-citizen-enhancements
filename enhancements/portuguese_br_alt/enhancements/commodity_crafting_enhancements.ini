items_commodities_carinite_pure_desc=Fontes típicas de carinita apresentam várias impurezas. No entanto, sob certas condições extremamente raras, podem se formar veias de carinita com mais de 90% de pureza. Hardware de computação que exige precisão rigorosa geralmente busca carinita pura.\n\n<EM3>BLUEPRINT DATA</EM3>\n- Parallax Energy Assault Rifle\n- Quartz Energy SMG
