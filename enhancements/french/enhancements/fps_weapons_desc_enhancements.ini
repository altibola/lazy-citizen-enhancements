item_Descnone_shotgun_ballistic_01=Fabricant : Inconnu\nType d'Arme : Fusil à Pompe\nCatégorie : Balistique\n\nCapacité du chargeur : 8\nCadence de Tir : 120 rpm\nPortée pratique : 0-10 m\n\nAttaches : S/O\n\nLe Deadrig est un fusil à pompe à double canon très puissant, de conception simple, fabriqué à partir de pièces détachées de la casse. Privilégiant la puissance avant tout, le Deadrig n'a pas le raffinement des armes produites en série et souffre d'un fort recul.\n\n--- STATS ---\nWeight: 4.2 kg\nFire Rate: 50 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 72.0 x8 (Phys)  |  DPS: 60.0\nAmmo: 8\nVelocity: 300 m/s  |  Absolute Range: 600 m\nFull Dmg to: 7 m  |  Drop: -0.05/m  |  Min Dmg: 6.0
