item_Descksar_shotgun_energy_01=Fabricant : Kastak Arms\nType d'Arme : Fusil à pompe\nCatégorie : Énergie (Plasma)\n\nPuissance des Batteries : 12\nCadence de Tir : 60 rpm\nPortée Pratique : 20 m\n\nAttaches : Optiques (S1), Canon (S3), Accessoire canon (S2)\n\nLe Devastator de Kastak Arms est un fusil à pompe à plasma capable de fournir des explosions de plasma soutenues à moyenne portée et à fort impact pour le combat rapproché, le nettoyage de pièces ou d'autres opérations de combat. Si la situation exige une présence puissante, ne cherchez pas plus loin que le Devastator.\n\n--- STATS ---\nWeight: 5.0 kg\nFire Rate: 60 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 120.0 x12 (Energy)  |  DPS: 120.0\nAmmo: 12\nVelocity: 300 m/s  |  Absolute Range: 600 m\nFull Dmg to: 14 m  |  Drop: -0.10/m  |  Min Dmg: 5.5
item_Descksar_shotgun_energy_01_black_purple01=Fabricant : Kastak Arms\nType d'Arme : Fusil à pompe\nCatégorie : Énergie (Plasma)\n\nPuissance des Batteries : 12\nCadence de Tir : 60 cpm\nPortée Pratique : 20 m\n\nCe fusil à pompe électrique semi-automatique de Kastak Arms produit des explosions de plasma à fort impact, idéales pour le combat rapproché. L'édition Voyager améliore le look avec une finition métallique à carreaux et des reflets bleus. Une combinaison extravagante de noir, de cyan et de violet fait de l'édition "Rager" un moment particulièrement agréable.\n\n--- STATS ---\nWeight: 5.0 kg\nFire Rate: 60 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 120.0 x12 (Energy)  |  DPS: 120.0\nAmmo: 12\nVelocity: 300 m/s  |  Absolute Range: 600 m\nFull Dmg to: 14 m  |  Drop: -0.10/m  |  Min Dmg: 5.5
