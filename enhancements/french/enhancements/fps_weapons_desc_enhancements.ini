item_Descnone_smg_energy_01=Fabricant : Inconnu\nType d'Arme : SMG\nCatégorie : Énergie (Laser)\n\nPuissance des Batteries : 60\nCadence De Tir : 800 cpm\nPortée Pratique : 30 m\n\nAssemblée à partir de pièces détachées , la SMG Ripper peut probablement infliger assez de dégâts pour vous sortir d'une situation délicate. Mais préparez-vous à ce que les choses deviennent un peu chaotiques. L'édition Sunblock présente une finition jaune.\n\n--- STATS ---\nWeight: 2.4 kg\nAlpha Dmg: 21.0 (Energy)\nAmmo: 60\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
