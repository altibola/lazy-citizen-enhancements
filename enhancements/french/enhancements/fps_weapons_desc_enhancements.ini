item_Descgmni_shotgun_ballistic_01_pink_red01=Fabricant : Gemini\nType d'Arme : Fusil à pompe\nCatégorie : Balistique\n\nCapacité du chargeur : 18 \nCadence de Tir : 120 cpm / 60 cpm\nPortée Pratique : 15 m / 35 m\n\nAttaches : Optique (S1), Canon (S/O), Sous Canon (S2)\n\n Le R97 combine un design élégant et une puissance d'arrêt pour former une arme de combat rapproché élégante et efficace. Ce fusil à pompe balistique de Gemini propose deux modes de tir distincts — un mode à dispersion large semi-automatique idéal pour infliger rapidement des dégâts, et un mode concentré offrant une portée accrue au détriment de la puissance. Cette flexibilité tactique a fait du R97 une arme de défense personnelle populaire à travers l'Empire. Protégez-vous, ainsi que vos proches, avec l'édition spéciale Kismet du R97, qui arbore une couleur rose et noire rappelant le vaisseau que Yuri Ilyin a piloté pour retrouver son amour perdu, Corazon Tan, dans la célèbre vidéo Coramor.\n\n--- STATS ---\nWeight: 2.4 kg\nFire Rate: 455 RPM\nFire Modes: Shotgun / Semi-Auto\nAlpha Dmg: 32.0 x8 (Phys)  |  DPS: 242.7\nAmmo: 18\nVelocity: 225 m/s  |  Absolute Range: 450 m\nFull Dmg to: 12 m  |  Drop: -0.05/m  |  Min Dmg: 1.2
