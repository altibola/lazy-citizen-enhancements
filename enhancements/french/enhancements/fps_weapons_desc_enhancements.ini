item_descklwe_sniper_energy_01=Fabricant : Klaus & Werner\nType d'Arme : Fusil Sniper\nCatégorie : Énergie (Laser)\n\nPuissance des Batteries : 20\nCadence de Tir : 50 rpm\nPortée Pratique : 100 m\n\nAttaches : Optiques (S3), Canon (S2), Sous Canon (S2)\n\nLe fusil à énergie longue portée Arrowhead Modèle VI de Klaus & Werner possède un corps en composite de fibre de verre capable de résister à de nombreux environnements rigoureux autant dans l'atmosphère qu'en dehors. Construit avec une crosse de précision, une lunette réglable et un bipied intégré, l'Arrowhead offre une arme stable et dévastatrice pour les opérateurs qui souhaitent garder leurs distances, tout en restant dans le combat.\n\n--- STATS ---\nWeight: 6.8 kg\nFire Rate: 70 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 50.0 (Energy)  |  DPS: 58.3\nAmmo: 16\nVelocity: 1,000 m/s  |  Absolute Range: 4.0 km
