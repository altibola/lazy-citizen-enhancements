item_Descvolt_lmg_energy_01=Fabricant : Verified Offworld Laser Technologies\nType d'Arme : LMG\nCatégorie : Énergie (Électron)\n\nPuissance des Batteries : 165\nCadence de Tir : 550 cpm - 220 cpm\nPortée Pratique : 50m\n\nAttaches : Optique (S3), Sous Canon (S3)\n\nLes ingénieurs de VOLT ont conçu le LMG Fresnel afin d'apporter une arme énergétique puissante sur les lignes de front, capable d'engager le combat avec une rafale rapide de tirs mortels. À mesure que l'arme chauffe, les tirs deviennent plus lents et plus puissants, mais attention à la surchauffe. Une arme de cette ampleur nécessite une base solide; il est recommandé aux utilisateurs de tirer en position accroupie afin de mieux gérer le recul.\n\n--- STATS ---\nWeight: 6.0 kg\nFire Rate: 550 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 9.0 (Energy)  |  DPS: 82.5\nAmmo: 165\nVelocity: 1,100 m/s  |  Absolute Range: 4.4 km
