item_DescGMNI_rifle_ballistic_01=Fabricant : Gemini\nType d’Arme : Fusil d'Assaut\nCatégorie : Balistique\n\nCapacité du chargeur : 30\nCadence de Tir : 300 cpm / 900 cpm\nPortée Pratique : 50 m\n\nAttaches : Optique (S2), Canon (S2), Sous Canon (S2)\n\nAvec le S71, Gemini a conçu un fusil d'assaut ergonomique idéal pour les engagements à moyenne portée. Chambré avec une munition de calibre plus petit que d'autres armes de sa catégorie, le S71 est devenu populaire parmi les professionnels de la sécurité privée pour son esthétique élégante et sa précision.\n\n--- STATS ---\nWeight: 2.5 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 21.5 (Phys)  |  DPS: 179.2\nAmmo: 30\nVelocity: 1,200 m/s  |  Absolute Range: 2.4 km\nFull Dmg to: 100 m  |  Drop: -0.10/m  |  Min Dmg: 17.5
item_DescGMNI_rifle_ballistic_01_collector01=Fabricant : Gemini\nType d’Arme : Fusil d'Assaut\nCatégorie : Balistique\n\nCapacité du chargeur : 30\nCadence de Tir : 300 cpm / 900 cpm\nPortée Pratique : 50 m\n\nAttaches : Optique (S2), Canon (S2), Sous Canon (S2)\n\nAvec le S71, Gemini a conçu un fusil d'assaut ergonomique idéal pour les engagements à moyenne portée. Chambré avec une munition de calibre plus petit que d'autres armes de sa catégorie, le S71 est devenu populaire parmi les professionnels de la sécurité privée pour son esthétique élégante et sa précision. \n\nL'édition Hemlock présente un motif vert camo.\n\n--- STATS ---\nWeight: 2.5 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 21.5 (Phys)  |  DPS: 179.2\nAmmo: 30\nVelocity: 1,200 m/s  |  Absolute Range: 2.4 km\nFull Dmg to: 100 m  |  Drop: -0.10/m  |  Min Dmg: 17.5
item_DescGMNI_rifle_ballistic_01_grey_red01=Fabricant : Gemini\nType d’Arme : Fusil d'Assaut\nCatégorie : Balistique\n\nCapacité du chargeur : 30\nCadence de Tir : 300 cpm / 900 cpm\nPortée Pratique : 50 m\n\nAttaches : Optique (S2), Canon (S2), Sous Canon (S2)\n\nAvec le S71, Gemini a conçu un fusil d'assaut ergonomique idéal pour les engagements à moyenne portée. Chambré avec une munition de calibre plus petit que d'autres armes de sa catégorie, le S71 est devenu populaire parmi les professionnels de la sécurité privée pour son esthétique élégante et sa précision. L'édition "Justified" se caractérise par un gris froid et des reflets rouge vif.\n\n--- STATS ---\nWeight: 2.5 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 21.5 (Phys)  |  DPS: 179.2\nAmmo: 30\nVelocity: 1,200 m/s  |  Absolute Range: 2.4 km\nFull Dmg to: 100 m  |  Drop: -0.10/m  |  Min Dmg: 17.5
item_DescGMNI_rifle_ballistic_01_yellow_blue01=Fabricant : Gemini\nType d’Arme : Fusil d'Assaut\nCatégorie : Balistique\n\nCapacité du chargeur : 30\nCadence de Tir : 300 cpm / 900 cpm\nPortée Pratique : 50 m\n\nAttaches : Optique (S2), Canon (S2), Sous Canon (S2)\n\nAvec le S71, Gemini a conçu un fusil d'assaut ergonomique idéal pour les engagements à moyenne portée. Chambré avec une munition de calibre plus petit que d'autres armes de sa catégorie, le S71 est devenu populaire parmi les professionnels de la sécurité privée pour son esthétique élégante et sa précision. L'édition Scorched présente une patine de flamme unique. Le jaune néon audacieux et le bleu vif se combinent pour faire ressortir le fusil officiel de la Murray Cup Racing.\n\n--- STATS ---\nWeight: 2.5 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 21.5 (Phys)  |  DPS: 179.2\nAmmo: 30\nVelocity: 1,200 m/s  |  Absolute Range: 2.4 km\nFull Dmg to: 100 m  |  Drop: -0.10/m  |  Min Dmg: 17.5
item_DescGMNI_smg_ballistic_01=Fabricant : Gemini\nType d'Arme : SMG\nCatégorie : Balistique\n\nCapacité du chargeur : 50\nCadence de Tir : 1 100 cpm\nPortée Pratique : 35 m\n\nAttaches : Canon (S1), Optique (S1), Sous Canon (S1)\n\nFacile à manipuler et d'une grande beauté avec son style aux accents violets., le C54 est un SMG élégant et parfaitement équilibré de chez Gemini. Son cadre en polymère léger et sa conception ergonomique le rendent idéal pour les combats rapprochés. Le C54 est capable de tirer des balles de 10 mm en automatique pour fournir un soutien maximum et une saturation de la cible afin de garantir que tout engagement se termine rapidement.\n\n--- STATS ---\nWeight: 2.0 kg\nFire Rate: 925 RPM\nFire Modes: Auto\nAlpha Dmg: 11.5 (Phys)  |  DPS: 177.3\nAmmo: 50\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 15 m  |  Drop: -0.20/m  |  Min Dmg: 7.5
item_DescGMNI_smg_ballistic_01_grey_red01=Fabricant : Gemini\nType d'Arme : SMG\nCatégorie : Balistique\n\nCapacité du chargeur : 50\nCadence de Tir : 1 100 cpm\nPortée Pratique : 35 m\n\nAttaches : Canon (S1), Optique (S1), Sous Canon (S1)\n\nFacile à manipuler et d'une grande beauté avec son style aux accents violets., le C54 est un SMG élégant et parfaitement équilibré de chez Gemini. Son cadre en polymère léger et sa conception ergonomique le rendent idéal pour les engagements en espace clos. Le C54 est capable de tirer des balles de 10 mm en automatique pour fournir un soutien maximum et une saturation de la cible afin de garantir que tout combat se termine rapidement. L'édition "Justified" se caractérise par un gris froid et des reflets rouge vif.\n\n--- STATS ---\nWeight: 2.0 kg\nFire Rate: 925 RPM\nFire Modes: Auto\nAlpha Dmg: 11.5 (Phys)  |  DPS: 177.3\nAmmo: 50\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 15 m  |  Drop: -0.20/m  |  Min Dmg: 7.5
item_DescKSAR_pistol_ballistic_01=Fabricant : Kastak Arms\nType d’Arme : Pistolet\nCatégorie : Balistique\n\nCapacité du chargeur : 6\nCadence de Tir : 180 rpm\nPortée Pratique : 100 m\n\nAttaches : Optique (S1), Canon (S1), Sous Canon (S1)\n\nSouvent appelé le "canon à main" de Kastak Arms, le Coda peut mettre fin à un engagement avec une seule balle de calibre 50, bien que sa puissance substantielle puisse rendre le recul du Coda difficile à gérer. Compte tenu de la taille limitée de son chargeur et de sa puissance de frappe, il est déconseillé d'effectuer des tirs soutenus, au profit de tirs uniques plus précis.\n\n--- STATS ---\nWeight: 1.3 kg\nFire Rate: 180 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 60.0 (Phys)  |  DPS: 180.0\nAmmo: 6\nVelocity: 550 m/s  |  Absolute Range: 1.1 km\nFull Dmg to: 55 m  |  Drop: -0.20/m  |  Min Dmg: 35.0
item_DescKsar_rifle_energy_01_blue_gold_01=Fabricant : Kastak Arms\nType d’Arme : Fusil d'Assaut\nCatégorie : Énergie (Plasma)\n\nPuissance des Batteries : 35\nCadence de Tir : 500 cpm\nPortée Pratique : 50 m\n\nAttaches : Optique (S2), Canon (S2), Sous Canon (S2)\n\nLe Karna est un fusil d'assaut à plasma classique de Kastak Arms. Ce fusil d'assaut de milieu de gamme est doté d'un mode de tir chargé et d'un mode de tir automatique, ce qui lui permet de s'adapter rapidement et facilement à la situation. Outre sa puissance de feu réputée, l'apparence robuste et la fiabilité du Karna en ont fait l'une des armes les plus populaires de Kastak Arms. Les couleurs bleu et or de l'édition Valor lui confèrent une allure vaillante et digne.\n\n--- STATS ---\nWeight: 3.5 kg\nFire Rate: 600 RPM\nFire Modes: Auto / Charge / Semi-Auto\nAlpha Dmg: 17.5 (Energy)  |  DPS: 175.0\nAmmo: 35\nVelocity: 600 m/s  |  Absolute Range: 1.2 km\nFull Dmg to: 20 m  |  Drop: -0.11/m  |  Min Dmg: 14.5
item_Descapar_special_ballistic_01=Fabricant : Apocalypse Arms\nType d’Arme : Canon à Rails\nCatégorie : Balistique\n\nCapacité du chargeur : 5\nCadence de Tir : 60 rpm\nPortée Pratique : 200 m\n\nAttaches : Optique (S/O), Canon (S/O), Sous Canon (S4)\n\nAussi dévastateur pour les gros vaisseaux que les véhicules hostiles, ce canon à rail à épaule d'Apocalypse Arms utilise des électro-aimants afin de propulser sa charge avec précision sur les longues distances, ce qui fait du Scourge une arme utilisable sur terre, dans les airs ou dans l'espace.\n\n--- STATS ---\nWeight: 12.1 kg\nFire Rate: 70 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 10.0 (Phys)  |  DPS: 11.7\nAmmo: 5\nVelocity: 50 m/s  |  Absolute Range: 200 m
item_Descapar_special_ballistic_01_mat01=Fabricant : Apocalypse Arms\nType d’Arme : Canon à Rails\nCatégorie : Balistique\n\nCapacité du chargeur : 5\nCadence de Tir : 60 rpm\nPortée Pratique : 200 m\n\nAttaches : Optique (S/O), Canon (S/O), Sous Canon (S4)\n\nAussi dévastateur pour les gros vaisseaux que les véhicules hostiles, ce canon à rail à épaule d'Apocalypse Arms utilise des électro-aimants afin de propulser sa charge avec précision sur les longues distances, ce qui fait du Scourge une arme utilisable sur terre, dans les airs ou dans l'espace. L'un des nombreux objets que Wikelo a acquis au cours de ses voyages, l'édition 'Très Utile' est un must pour tout collectionneur sérieux.\n\n--- STATS ---\nWeight: 12.1 kg\nFire Rate: 70 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 10.0 (Phys)  |  DPS: 11.7\nAmmo: 5\nVelocity: 50 m/s  |  Absolute Range: 200 m
item_Descapar_special_ballistic_02=Fabricant : Apocalypse Arms\nType d'Arme : Lance-missiles\nCatégorie : Balistique\n\nCapacité du chargeur : 3\nCadence de Tir : 300 rpm (3 coups en rafale)\nPortée Pratique : 2 km\n\nAttaches : Optique (S/O), Canon (S/O), Sous Canon (S/O)\n\nSoulevez l'Animus sur votre épaule et mettez vos adversaires au même niveau sur le champ de bataille. Ce lance-missiles d'Apocalypse Arms est doté d'un canon rotatif qui tire rapidement trois missiles, ce qui en fait l'arme idéale pour anéantir les forces terrestres ou endommager les véhicules et les petits vaisseaux. Lorsque vous devez semer la destruction pour vous sauver, vous pouvez faire confiance à Apocalypse Arms.\n\n--- STATS ---\nWeight: 16.8 kg\nFire Rate: 300 RPM\nFire Modes: Semi-Auto
item_Descapar_special_ballistic_02_mat01=Fabricant : Apocalypse Arms\nType d'Arme : Lance-missiles\nCatégorie : Balistique\n\nCapacité du chargeur : 3\nCadence de Tir : 300 rpm (3 coups en rafale)\nPortée Pratique : 2 km\n\nAttaches : Optique (S/O), Canon (S/O), Sous Canon (S/O)\n\nSoulevez l'Animus sur votre épaule et mettez vos adversaires au même niveau sur le champ de bataille. Ce lance-missiles d'Apocalypse Arms est doté d'un canon rotatif qui tire rapidement trois missiles, ce qui en fait l'arme idéale pour anéantir les forces terrestres ou endommager les véhicules et les petits vaisseaux. Lorsque vous devez semer la destruction pour vous sauver, vous pouvez faire confiance à Apocalypse Arms. L'un des nombreux objets que Wikelo a acquis au cours de ses voyages, l'édition 'Très Utile' est un must pour tout collectionneur sérieux.\n\n--- STATS ---\nWeight: 16.8 kg\nFire Rate: 300 RPM\nFire Modes: Semi-Auto
item_Descbehr_binoculars_01=Le télémètre monoculaire XDL de Behring, d'une grande précision, convient aussi bien aux expéditions qu'aux champs de bataille. De conception robuste, il est doté de lentilles haute qualité, d'un écran facile à lire et d'un mode d'amplification de la lumière. Offrant un grossissement x10, le XDL fournit en toute fiabilité des mesures laser précises de la distance des cibles éloignées.\n\n--- STATS ---\nWeight: 1.5 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto
item_Descbehr_binoculars_01_collector01=Le télémètre monoculaire XDL de Behring, d'une grande précision, convient aussi bien aux expéditions qu'aux champs de bataille. De conception robuste, il est doté de lentilles haute qualité, d'un écran facile à lire et d'un mode d'amplification de la lumière. Offrant un grossissement x10, le XDL fournit en toute fiabilité des mesures laser précises de la distance des cibles éloignées.\n\nL'édition Mark I présente une finition grise et bleu acier.\n\n--- STATS ---\nWeight: 1.5 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto
