item_Descnone_special_ballistic_01=Fabricant : Inconnu\nType d'Objet : Lanceur\nCatégorie : Roquette\n \nCapacité du chargeur : 1\nCadence de Tir : 20 rpm\nPortée Pratique : 100 m\n\nQui a le temps de viser ? Une fois que vous avez suffisamment d'espace pour dégager la distance d'armement, pointez simplement le lanceur Boomtube vers ce qui vous dérange, appuyez sur la gâchette et regardez la roquette à triple grenade faire le reste. Parfois, la simplicité est la meilleure solution.\n\n--- STATS ---\nWeight: 11.6 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 41,000.0 (Phys: 20000.0 / Energy: 21000.0)  |  DPS: 341,666.7\nAmmo: 1\nVelocity: 135 m/s  |  Absolute Range: 2.2 km\nFull Dmg to: 2000 m  |  Min Dmg: 15.0
