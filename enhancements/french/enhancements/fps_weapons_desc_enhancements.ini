item_Descsasu_pistol_toy_01_shared=Fabricant : Sakura Sun\nType d'Arme : Pistolet Jouet\nCatégorie : Fléchette en Mousse\n\nCapacité du chargeur : 10\nCadence de Tir : 450 cpm\nPortée Pratique : 35m\n\nRendez le tir amis amusant avec le WowBlast Desperado de Sakura Sun. Tirez des fléchettes en mousse sur vos amis ou sur des ennemis fictifs avec ces pistolets en plastique ultra-colorés. Qu'il s'agisse de tuer le temps sur une zone d'atterrissage ou au cours d'un long voyage à travers les étoiles, la gamme de jouets WowBlast offre un divertissement léger et amusant pour toute la famille. Le pistolet Desperado est disponible en plusieurs couleurs vives, chacune étant accompagnée d'un effet sonore unique !\n\n--- STATS ---\nWeight: 0.1 kg\nFire Rate: 63 RPM\nFire Modes: Semi-Auto\nAmmo: 10\nVelocity: 20 m/s  |  Absolute Range: 300 m
item_Descutfl_crossbow_ballistic_01=Fabricant : UltiFlex\nType d'objet : Arbalète\n \nCapacité du chargeur : 5\nCadence de tir : 60 cpm\nPortée pratique : 50 m\n \nAttaches : Optique (S3), Sous Canon (S3)\n \nLes artisans d'UltiFlex ont testé des centaines de prototypes avant de trouver le matériau léger idéal, alliant résistance et flexibilité, pour leur arbalète Novian, un compagnon idéal aussi bien pour les expéditions frontalières que pour les infiltrations tactiques. D'une simple pression sur la détente, la Novian propulse presque sans bruit un carreau lourd qui se brise à l'impact, infligeant des dégâts dévastateurs aux cibles à courte portée.\n\n--- STATS ---\nWeight: 3.5 kg\nFire Rate: 42 RPM\nFire Modes: Auto\nAlpha Dmg: 133.0 (Energy: 123.0 / Stun: 10.0)  |  DPS: 93.1\nAmmo: 5\nVelocity: 185 m/s  |  Absolute Range: 1.9 km
