item_Descgmni_rifle_ballistic_01_mr01=Fabricant : Gemini\nType d’Arme : Fusil d'Assaut\nCatégorie : Balistique\n\nCapacité du chargeur : 30\nCadence de Tir : 300 cpm / 900 cpm\nPortée Pratique : 50 m\n\nAttaches : Optique (S2), Canon (S2), Sous Canon (S2)\n\nAvec le S71, Gemini a conçu un fusil d'assaut ergonomique idéal pour les engagements à moyenne portée. Chambré avec une munition de calibre plus petit que d'autres armes de sa catégorie, le S71 est devenu populaire parmi les professionnels de la sécurité privée pour son esthétique élégante et sa précision. \n\nL'édition Purgatory Camo arbore un profil monochrome élégant.\n\n--- STATS ---\nWeight: 2.5 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 21.5 (Phys)  |  DPS: 179.2\nAmmo: 30\nVelocity: 1,200 m/s  |  Absolute Range: 2.4 km\nFull Dmg to: 100 m  |  Drop: -0.10/m  |  Min Dmg: 17.5
item_Descgmni_shotgun_ballistic_01=Fabricant : Gemini\nType d'objet : Fusil à pompe\nCatégorie : Balistique\n\nCapacité du chargeur : 10\nCadence de tir : 120 rpm\nPortée efficace : 15 m / 35 m\n\nAccessoires : Optique (S1), Canon (S/O), Sous-canon (S2)\n\nLe R97 combine un design élégant et une puissance d'arrêt pour une arme élégante et efficace pour les combats rapprochés. Ce fusil à pompe balistique de Gemini dispose de deux modes de tir distincts : un mode semi-automatique à large diffusion, idéal pour infliger des dégâts rapides, et un mode ciblé qui offre une portée accrue au détriment de la puissance. Cette souplesse de combat a fait du R97 une arme de défense personnelle populaire dans tout l'Empire.\n\n--- STATS ---\nWeight: 2.4 kg\nFire Rate: 455 RPM\nFire Modes: Shotgun / Semi-Auto\nAlpha Dmg: 32.0 x8 (Phys)  |  DPS: 242.7\nAmmo: 18\nVelocity: 225 m/s  |  Absolute Range: 450 m\nFull Dmg to: 12 m  |  Drop: -0.05/m  |  Min Dmg: 1.2
