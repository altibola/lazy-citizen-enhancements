item_Descbehr_pistol_ballistic_01=Fabricant : Behring\nType d’Arme : Pistolet\nCatégorie : Balistique\n\nCapacité du chargeur : 20\nCadence de Tir : 450 cpm\nPortée Pratique : 25 m\n\nAttaches : Canon (S1), Optique (S1), Sous Canon (S1)\n\nGrâce à son design épuré et à sa carcasse en polymère léger qui minimise le recul, il est facile de comprendre pourquoi le S-38 de Behring, polyvalent et fiable, est devenu une arme de poing de confiance dans tout l'Empire, tant pour les citoyens que pour les forces de l'ordre.\n\n--- STATS ---\nWeight: 0.9 kg\nFire Rate: 450 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 22.5 (Phys)  |  DPS: 168.8\nAmmo: 20\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 20 m  |  Drop: -0.25/m  |  Min Dmg: 16.0
