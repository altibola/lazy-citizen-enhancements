item_Descgmni_sniper_ballistic_01=Fabricant : Gemini\nType d’Arme : Fusil de sniper\nCatégorie : Balistique\n\nCapacité du chargeur : 15\nCadence de Tir : 120 rpm\nPortée Pratique : 80 m\n\nAttaches : Optique (S3), Canon (S2), Sous Canon (S2)\n\nDévastez à distance avec le fusil de sniper A03. Conçue de main de maître par Clem, cofondateur de Gemini Tevarin, l'arme allie un design élégant et ergonomique à une puissante frappe balistique. L'A03 offre une cadence de tir impressionnante pour un fusil de sniper qui sacrifie la précision à l'urgence lorsque des tirs successifs sont nécessaires. Compte tenu de son design renommé et de ses caractéristiques uniques, il est facile de comprendre pourquoi l'A03 est devenu l'arme préférée des professionnels de la sécurité dans tout l'empire.\n\n--- STATS ---\nWeight: 4.7 kg\nFire Rate: 225 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 42.5 (Phys)  |  DPS: 159.4\nAmmo: 15\nVelocity: 800 m/s  |  Absolute Range: 1.6 km\nFull Dmg to: 150 m  |  Drop: -0.02/m  |  Min Dmg: 35.0
