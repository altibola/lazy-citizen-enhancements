item_Descklwe_smg_energy_01=Fabricant : Klaus & Werner\nType d'Arme : SMG\nCatégorie : Laser\n\nPuissance des Batteries : 45\nCadence de Tir : 562.5 rpm\nPortée Pratique : 25 m\n\nAttache : Optique (S1), Canon (S1), Sous Canon (S1)\n\nL'expertise de Klaus & Werner est une fois de plus mise à l'honneur pour rendre le fusil à énergie laser compact Lumin V encore plus mortel et fiable. Un nouveau mode "tir automatique par intervalles" permet de tirer des barrages de cinq balles lorsque la gâchette est maintenue enfoncée, en utilisant la saturation de la cible qui accompagne le tir automatique tout en prévoyant des pauses pour compenser la visée. Même en cas d'attaque constante, l'excellente conception de l'arme assure un faible recul et un faible écart de tir.\n\n--- STATS ---\nWeight: 2.6 kg\nFire Rate: 700 RPM\nFire Modes: Burst\nAlpha Dmg: 21.0 (Energy)  |  DPS: 245.0\nAmmo: 45\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
item_Descklwe_smg_energy_blue_gold_01=Fabricant : Klaus & Werner\nType d'Arme : SMG\nCatégorie : Laser\n\nPuissance des Batteries : 45\nCadence de Tir : 562.5 rpm\nPortée Pratique : 25 m\n\nAttache : Optique (S1), Canon (S1), Sous Canon (S1)\n\nL'expertise de Klaus & Werner est une fois de plus mise à l'honneur pour rendre le fusil à énergie laser compact Lumin V encore plus mortel et fiable. Un nouveau mode "tir automatique par intervalles" permet de tirer des barrages de cinq balles lorsque la gâchette est maintenue enfoncée, en utilisant la saturation de la cible qui accompagne le tir automatique tout en prévoyant des pauses pour compenser la visée. Même en cas d'attaque constante, l'excellente conception de l'arme assure un faible recul et un faible écart de tir. L'audacieuse palette de couleurs bleu et or confère à l'édition Valor une allure vaillante et digne.\n\n--- STATS ---\nWeight: 2.6 kg\nFire Rate: 700 RPM\nFire Modes: Burst\nAlpha Dmg: 21.0 (Energy)  |  DPS: 245.0\nAmmo: 45\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
item_Descklwe_sniper_energy_01_Luminalia_red01=Fabricant : Klaus & Werner\nType d'Arme : Fusil Sniper\nCatégorie : Énergie (Laser)\n\nPuissance des Batteries : 20\nCadence de Tir : 50 rpm\nPortée Pratique : 100 m\n\nAttaches : Optiques (S3), Canon (S2), Sous Canon (S2)\n\nLe fusil à énergie longue portée Arrowhead Modèle VI de Klaus & Werner possède un corps en composite de fibre de verre capable de résister à de nombreux environnements rigoureux autant dans l'atmosphère qu'en dehors. Construit avec une crosse de précision, une lunette réglable et un bipied intégré, l'Arrowhead offre une arme stable et dévastatrice pour les opérateurs qui souhaitent garder leurs distances, tout en restant dans le combat. Lancée pour la première fois lors de Luminalia, l'édition Lamplighter s'inspire de la couleur rouge traditionnelle des fêtes de fin d'année.\n\n--- STATS ---\nWeight: 6.8 kg\nFire Rate: 70 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 50.0 (Energy)  |  DPS: 58.3\nAmmo: 16\nVelocity: 1,000 m/s  |  Absolute Range: 4.0 km
item_Descksar_pistol_ballistic_01_IAE2023=Fabricant : Kastak Arms\nType d'Arme : Pistolet\nCatégorie : Balistique\n\nCapacité du chargeur : 6\nCadence de Tir : 180 cpm\nPortée Pratique : 100 m\n\nAttaches : Optique (S1), Canon (S1), Sous-canon (S1)\n\nSouvent appelé le "canon à main" de Kastak Arms, le Coda peut mettre fin à un engagement avec une seule balle de calibre 50, bien que sa puissance substantielle puisse rendre le recul du Coda difficile à gérer. Compte tenu de la taille limitée de son chargeur et de sa puissance de frappe, il est déconseillé d'effectuer des tirs soutenus, au profit de tirs uniques plus précis. Conçue en l'honneur de l'IAE 2953, l'édition Ascension présente des accents d'acier et de cuivre inspirés du Syulen du fabricant Gatac.\n\n--- STATS ---\nWeight: 1.3 kg\nFire Rate: 180 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 60.0 (Phys)  |  DPS: 180.0\nAmmo: 6\nVelocity: 550 m/s  |  Absolute Range: 1.1 km\nFull Dmg to: 55 m  |  Drop: -0.20/m  |  Min Dmg: 35.0
