item_Descbehr_glauncher_ballistic_01=Fabricant : Behring\nType d’Arme : Lance-Grenade\nCatégorie : Balistique\n\nCapacité du chargeur : 6\nCadence de Tir : 40 rpm\nPortée Pratique : Variable (80m)\nAttaches : Optique (S1), Canon (S/O), Sous canon (S1)\n\nLe lanceur GP-33 MOD de qualité militaire tire des grenades de 40 mm pour nettoyer les pièces et débusquer les ennemis à couvert grâce à la conception de précision de Behring qui amorce chaque grenade pour qu'elle explose à l'impact.\n\n--- STATS ---\nWeight: 5.3 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 12.5 (Phys)  |  DPS: 12.5\nAmmo: 6\nVelocity: 50 m/s  |  Absolute Range: 200 m
item_Descbehr_glauncher_ballistic_01_black01=Fabricant : Behring\nType d’Arme : Lance-Grenade\nCatégorie : Balistique\n\nCapacité du chargeur : 6\nCadence de Tir : 40 rpm\nPortée Pratique : Variable (80m)\nAttaches : Optique (S1), Canon (S/O), Sous canon (S1)\n\nLe lanceur GP-33 MOD de qualité militaire tire des grenades de 40 mm pour nettoyer les pièces et débusquer les ennemis à couvert grâce à la conception de précision de Behring qui amorce chaque grenade pour qu'elle explose à l'impact. La combinaison des couleurs noire et grise confère à l'édition Thunderclap un look subtil qui convient à tous les professionnels de la sécurité.\n\n--- STATS ---\nWeight: 5.3 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 12.5 (Phys)  |  DPS: 12.5\nAmmo: 6\nVelocity: 50 m/s  |  Absolute Range: 200 m
item_Descbehr_glauncher_ballistic_01_cen01=Fabricant : Behring\nType d’Arme : Lance-Grenade\nCatégorie : Balistique\n\nCapacité du chargeur : 6\nCadence de Tir : 40 rpm\nPortée Pratique : Variable (80m)\nAttaches : Optique (S1), Sous Canon (S1)\n\nLe lanceur GP-33 MOD de qualité militaire tire des grenades de 40 mm pour nettoyer les pièces et débusquer les ennemis à couvert grâce à la conception de précision de Behring qui amorce chaque grenade pour qu'elle explose à l'impact. L'édition Ashfall mélange le bleu foncé, le gris et le noir pour un look subtil mais élégant.\n\n--- STATS ---\nWeight: 5.3 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 12.5 (Phys)  |  DPS: 12.5\nAmmo: 6\nVelocity: 50 m/s  |  Absolute Range: 200 m
item_Descbehr_glauncher_ballistic_01_imp01=Fabricant : Behring\nType d'Objet : Lance-Grenade\nCatégorie : Balistique\n\nCapacité du chargeur : 6\nCadence de tir : 40 rpm\nPortée pratique : Variable (80m)\nAttaches : Optique (S1), Sous Canon (S1)\n\nLe lanceur GP-33 MOD de qualité militaire tire des grenades de 40 mm pour nettoyer les pièces et débusquer les ennemis à couvert grâce à la conception de précision de Behring qui amorce chaque grenade pour qu'elle explose à l'impact. Une légère finition métallique appliquée au canon et à la crosse attire le regard et permet à l'édition Copperhead de se distinguer des autres versions.\n\n--- STATS ---\nWeight: 5.3 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 12.5 (Phys)  |  DPS: 12.5\nAmmo: 6\nVelocity: 50 m/s  |  Absolute Range: 200 m
item_Descbehr_glauncher_ballistic_01_mat01=Fabricant : Behring\nType d’Arme : Lance-Grenade\nCatégorie : Balistique\n\nCapacité du chargeur : 6\nCadence de Tir : 40 rpm\nPortée Pratique : Variable (80m)\nAttaches : Optique (S1), Canon (S/O), Sous canon (S1)\n\nLe lanceur GP-33 MOD de qualité militaire tire des grenades de 40 mm pour nettoyer les pièces et débusquer les ennemis à couvert grâce à la conception de précision de Behring qui amorce chaque grenade pour qu'elle explose à l'impact. La combinaison des couleurs noire et grise confère à l'édition Thunderclap un look subtil qui convient à tous les professionnels de la sécurité. L'un des nombreux objets que Wikelo a acquis au cours de ses voyages, l'édition 'Très Utile' est un must pour tout collectionneur sérieux.\n\n--- STATS ---\nWeight: 5.3 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 12.5 (Phys)  |  DPS: 12.5\nAmmo: 6\nVelocity: 50 m/s  |  Absolute Range: 200 m
item_Descbehr_glauncher_ballistic_01_shin=Fabricant : Behring\nType d’Arme : Lance-Grenade\nCatégorie : Balistique\n\nCapacité du chargeur : 6\nCadence de Tir : 40 rpm\nPortée Pratique : Variable (80m)\nAttaches : Optique (S1), Sous Canon (S1)\n\nLe lanceur GP-33 MOD de qualité militaire tire des grenades de 40 mm pour nettoyer les pièces et débusquer les ennemis à couvert grâce à la conception de précision de Behring qui amorce chaque grenade pour qu'elle explose à l'impact. L'édition Umber est finie en rouille et orange.\n\n--- STATS ---\nWeight: 5.3 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 12.5 (Phys)  |  DPS: 12.5\nAmmo: 6\nVelocity: 50 m/s  |  Absolute Range: 200 m
item_Descbehr_lmg_ballistic_01=Fabricant : Behring\nType d'Arme : LMG\nCatégorie : Balistique\n\nCapacité du chargeur : 120\nCadence de Tir : 800 rpm\nPortée Pratique : 40 m\n\nAttaches : Optique (S2), Canon (S2), Sous Canon (S3)\n\nBehring a conçu le FS-9 pour qu'il soit une force écrasante sur le champ de bataille. Cette mitrailleuse légère est dotée d'un mode automatique qui la rend idéale pour effectuer des tirs de couverture ou pour repousser les ennemis qui avancent. Le FS-9 est également réputé pour sa capacité à maintenir la précision tout en déclenchant des tirs soutenus.\n\n--- STATS ---\nWeight: 6.8 kg\nFire Rate: 650 RPM\nFire Modes: Auto\nAlpha Dmg: 14.5 (Phys)  |  DPS: 157.1\nAmmo: 75\nVelocity: 600 m/s  |  Absolute Range: 1.2 km\nFull Dmg to: 50 m  |  Drop: -0.01/m  |  Min Dmg: 10.0
item_Descbehr_lmg_ballistic_01_luminalia_green01=Fabricant : Behring\nType d'Arme : LMG\nCatégorie : Balistique\n\nCapacité du chargeur : 75\nCadence de Tir : 800 rpm\nPortée Pratique : 40 m\n\nAttaches : Optique (S2), Canon (S2), Sous Canon (S3)\n\nBehring a conçu le FS-9 pour qu'il soit une force écrasante sur le champ de bataille. Cette mitrailleuse légère est dotée d'un mode automatique qui la rend idéale pour effectuer des tirs de couverture ou pour repousser les ennemis qui avancent. Le FS-9 est également réputé pour sa capacité à maintenir la précision tout en déclenchant des tirs soutenus. L'édition Evergreen reprend l'esprit Luminalia en utilisant une couleur traditionnelle des fêtes de fin d'année avec sa teinte verte vibrante.\n\n--- STATS ---\nWeight: 6.8 kg\nFire Rate: 650 RPM\nFire Modes: Auto\nAlpha Dmg: 14.5 (Phys)  |  DPS: 157.1\nAmmo: 75\nVelocity: 600 m/s  |  Absolute Range: 1.2 km\nFull Dmg to: 50 m  |  Drop: -0.01/m  |  Min Dmg: 10.0
item_Descbehr_lmg_ballistic_01_tint01=Fabricant : Behring\nType d'Arme : LMG\nCatégorie : Balistique\n\nCapacité du chargeur : 75\nCadence de Tir : 800 rpm\nPortée Pratique : 40 m\n\nAttaches : Optique (S2), Canon (S2), Sous Canon (S3)\n\nBehring a conçu le FS-9 pour qu'il soit une force écrasante sur le champ de bataille. Cette mitrailleuse légère est dotée d'un mode automatique qui la rend idéale pour effectuer des tirs de couverture ou pour repousser les ennemis qui avancent. Le FS-9 est également réputé pour sa capacité à maintenir la précision tout en déclenchant des tirs soutenus. L'édition Blacklist se caractérise par une finition noir foncé.\n\n--- STATS ---\nWeight: 6.8 kg\nFire Rate: 650 RPM\nFire Modes: Auto\nAlpha Dmg: 14.5 (Phys)  |  DPS: 157.1\nAmmo: 75\nVelocity: 600 m/s  |  Absolute Range: 1.2 km\nFull Dmg to: 50 m  |  Drop: -0.01/m  |  Min Dmg: 10.0
