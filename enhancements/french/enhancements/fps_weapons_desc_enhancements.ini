item_Deschdgw_pistol_ballistic_01=Fabricant : Hedeby Gunworks\nType d'Arme : Pistolet à Fragmentation\nCatégorie : Balistique\n\nCapacité du chargeur : 8\nCadence de tir : 140 rpm\nPortée pratique : 80 m / 10 m (Chargé)\n\nAttaches : Optique (S1), Canon (S1), Sous canon (S1)\n\nSi le Salvo peut être utilisé comme un pistolet normal, Hedeby ne s'est pas arrêté là. En appuyant plus longuement sur la gâchette, une amorce gelée est injectée dans la chambre et, lorsqu'elle est relâchée, le lourd percuteur frappe avec suffisamment de force pour pulvériser la douille surfondue. Développée accidentellement pour tenter d'atténuer la surchauffe, cette option de tir chargé projette une gerbe mortelle de fragments à haute vitesse, suivie d'une explosion qui fait trembler les oreilles.\n\n--- STATS ---\nWeight: 0.8 kg\nFire Rate: 170 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 45.0 (Phys)  |  DPS: 127.5\nAmmo: 8\nVelocity: 550 m/s  |  Absolute Range: 1.1 km\nFull Dmg to: 30 m  |  Drop: -0.08/m  |  Min Dmg: 25.0
item_Deschdgw_pistol_ballistic_01_engraved01=Fabricant : Hedeby Gunworks\nType d'Arme : Pistolet à Fragmentation\nCatégorie : Balistique\n\nCapacité du chargeur : 8\nCadence de tir : 140 rpm\nPortée pratique : 80 m / 10 m (Chargé)\n\nAttaches : Optique (S1), Canon (S1), Sous canon (S1)\n\nSi le Salvo peut être utilisé comme un pistolet normal, Hedeby ne s'est pas arrêté là. En appuyant plus longuement sur la gâchette, une amorce gelée est injectée dans la chambre et, lorsqu'elle est relâchée, le lourd percuteur frappe avec suffisamment de force pour pulvériser la douille surfondue. Développée accidentellement pour tenter d'atténuer la surchauffe, cette option de tir chargé projette une gerbe mortelle de fragments à haute vitesse, suivie d'une explosion qui fait trembler les oreilles. Ce pistolet d'édition spéciale est doté d'un magnifique travail de sculpture détaillé, conçu personnellement par le maître armurier de Hedeby, Keisha Saeed.\n\n--- STATS ---\nWeight: 0.8 kg\nFire Rate: 170 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 45.0 (Phys)  |  DPS: 127.5\nAmmo: 8\nVelocity: 550 m/s  |  Absolute Range: 1.1 km\nFull Dmg to: 30 m  |  Drop: -0.08/m  |  Min Dmg: 25.0
