item_Descgrin_multitool_01=ACCESSOIRES VENDUS SÉPARÉMENT !\n\nFabricant : Greycat Industrial\nType d'Objet : Utilitaire\nCatégorie : Gadget\n\nDurée de Vie : Batterie Intégrée\nCadence de Tir : N / A (Rayon)\nPortée Pratique: 0.5 m\n\nLe Pyro de Greycat Industrial est un outil électrique de la taille d'un pistolet destiné à l'ingénieur de l'espace moderne. Il est capable de charger, de couper et de réparer; lui permettant d'avoir une multitude d'utilisations grâce à son large assortiment d'accessoires. Il est parfait pour rendre un travail difficile un peu plus facile.\n\n--- STATS ---\n<EM4>Repair:</EM4>  HP Rate: 95/s  |  Damage-Map Rate: 10/s  |  HP/Ammo: 0.08  |  Ramp: 0.5s↑ 0.1s↓\n<EM4>Salvage:</EM4>  HP Rate: 310/s  |  Damage-Map Rate: 10/s  |  Material Efficiency: 0.80  |  HP/Ammo: 2.00  |  Ramp: 4.0s↑ 0.2s↓
