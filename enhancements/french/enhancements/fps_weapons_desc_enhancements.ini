item_Descksar_smg_energy_01=Fabricant : Kastak Arms\nType d'Arme : SMG\nCatégorie : Énergie (Laser)\n\nPuissance des Batteries : 60\nCadence de Tir : 800 cpm\nPortée Pratique : 30 m\n\nAttaches : Optiques (S1), Canon (S1), Sous Canon (S1)\n\nLe SMG Custodian de Kastak Arms se concentre sur une cadence de tir élevée plutôt que sur les dégâts et la précision, ce qui en fait un choix idéal pour balayer des environnements restreints et des combats rapprochés.\n\n--- STATS ---\nWeight: 3.4 kg\nFire Rate: 900 RPM\nFire Modes: Auto / Charge / Burst\nAlpha Dmg: 13.0 (Energy)  |  DPS: 195.0\nAmmo: 60\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
