item_Descgmni_smg_ballistic_01_Luminalia=Fabricant : Gemini\nType d'Arme : SMG\nCatégorie : Balistique\n\nCapacité du chargeur : 50\nCadence de Tir : 1 100 cpm\nPortée Pratique : 35 m\n\nAttaches : Canon (S1), Optique (S1), Sous Canon (S1)\n\nFacile à manipuler et agréable à regarder, le C54 est un SMG élégant et parfaitement équilibré de chez Gemini. Son cadre en polymère léger et sa conception ergonomique le rendent idéal pour les engagements en espace clos. Le C54 est capable de tirer des balles de 10 mm en automatique pour fournir un soutien maximum et une saturation de la cible afin de garantir que tout combat se termine rapidement. L'édition Luminalia arbore un design festif rouge et vert.\n\n--- STATS ---\nWeight: 2.0 kg\nFire Rate: 925 RPM\nFire Modes: Auto\nAlpha Dmg: 11.5 (Phys)  |  DPS: 177.3\nAmmo: 50\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 15 m  |  Drop: -0.20/m  |  Min Dmg: 7.5
item_Descgmni_smg_ballistic_01_blue_white01=Fabricant : Gemini\nType d'Arme : SMG\nCatégorie : Balistique\n\nCapacité du chargeur : 50\nCadence de Tir : 1 100 cpm\nPortée Pratique : 35 m\n\nAttaches : Canon (S1), Optique (S1), Sous Canon (S1)\n\nFacile à manipuler et agréable à regarder, le C54 est un SMG élégant et parfaitement équilibré de chez Gemini. Son cadre en polymère léger et sa conception ergonomique le rendent idéal pour les engagements en espace clos. Le C54 est capable de tirer des balles de 10 mm en mode automatique afin de saturer au maximum la cible et d'assurer une fin rapide à tout combat. Créé en l'honneur de l'équipe Origin Racing, ce SMG est principalement blanc avec des touches de noir et de bleu.\n\n--- STATS ---\nWeight: 2.0 kg\nFire Rate: 925 RPM\nFire Modes: Auto\nAlpha Dmg: 11.5 (Phys)  |  DPS: 177.3\nAmmo: 50\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 15 m  |  Drop: -0.20/m  |  Min Dmg: 7.5
