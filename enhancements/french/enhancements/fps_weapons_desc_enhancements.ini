item_Descvolt_pistol_energy_01=Fabricant : Verified Offworld Laser Technologies\nType d’objet : Pistolet\nClasse : Énergie (Laser)\n\nCapacité de la batterie : 60\nCadence de tir : 500 rpm (1000 rpm rapide)\nPortée effective : 15 m\n\nAccessoires : Optique (S1), Sous-canon (S1)\n\nLe pistolet laser à impulsion est un pistolet entièrement automatique conçu pour le combat rapproché. VOLT a conçu l’arme avec un condensateur unique qui concentre l’énergie laser du pistolet, augmentant sa cadence de tir au prix d’une précision moindre et d’un risque plus élevé de surchauffe.\n\n--- STATS ---\nWeight: 1.1 kg\nFire Rate: 500 RPM\nFire Modes: Auto\nAlpha Dmg: 11.8 (Energy)  |  DPS: 97.9\nAmmo: 60\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
