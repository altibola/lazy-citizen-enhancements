item_Desckegr_fire_extinguisher_01=Fabricant : KE Group\nType : Extincteur\nCatégorie : Gadget\n\nCapacité du chargeur : Cartouche de Gaz\nCadence de Tir : Constante\nPortée Pratique : 3-4 m\n\nL'extincteur APX du Groupe KE a été classé parmi les meilleurs équipements de sécurité grand public depuis plus de dix ans, ce qui en fait la norme de l'industrie en matière de prévention des incendies. Rempli d'un composé de refroidissement gazeux breveté, l'extincteur peut rapidement étouffer tout feu en vue. L'écran numérique de l'appareil vous permet de surveiller la température locale pour vous aider à contenir et à éliminer les risques d'incendie.\n\n--- STATS ---\nWeight: 3.2 kg\nFire Rate: 600 RPM\nFire Modes: Auto\nAlpha Dmg: 18.0 (Thermal)  |  DPS: 180.0\nAmmo: 3,000\nRegen: 0/s  |  Cooldown: 3.0s  |  Cost/Shot: 1\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
item_Descklwe_lmg_energy_01=Fabricant : Klaus & Werner\nType d'Arme : LMG\nCatégorie : Énergie (Laser)\n\nPuissance des Batteries : 100\nCadence de Tir : 400 rpm\nPortée Pratique : 40 m\n\nAttaches : Optique (S2), Canon (S2), Sous Canon (S3)\n\nKlaus & Werner a créé une arme emblématique avec le LMG laser Demeco, qui a fait ses preuves. Largement utilisé dans les engagements militaires, ce favori de l'infanterie à courte et moyenne portée a été construit avec la stabilité et la précision au premier plan.\n\n--- STATS ---\nWeight: 9.8 kg\nFire Rate: 800 RPM\nFire Modes: Auto\nAlpha Dmg: 11.5 (Energy)  |  DPS: 153.3\nAmmo: 100\nVelocity: 600 m/s  |  Absolute Range: 2.4 km
