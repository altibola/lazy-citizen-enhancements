item_Descgrin_salvage_01=Fabricant : Greycat Industrial\nType d'Objet : Utilitaire\nCatégorie : Gadget\n\nTaille de la Cartouche :Large\nBatterie Intégrée\nCadence de Tir : N / A (Rayon)\nPortée Pratique: 5 m\n\nDépouillez des pièces de récupération et effectuez des réparations avec le Cambio, un outil de récupération et de réparation à double usage (SRT) conçu pour collecter et convertir les alliages et les polymères trouvés dans la ferraille en composite de matériaux recyclés, qui peut être soit vendu, soit utilisé pour effectuer des réparations rapides. Le Cambio SRT se caractérise par des vitesses de dépouillement rapides et une autonomie de batterie impressionnante, ce qui en fait un gadget essentiel pour les mécaniciens et les explorateurs de l'espace.\n\n--- STATS ---\n<EM4>Repair:</EM4>  HP Rate: 160/s  |  Damage-Map Rate: 10/s  |  HP/Ammo: 0.10  |  Ramp: 0.5s↑ 0.1s↓\n<EM4>Salvage:</EM4>  HP Rate: 670/s  |  Damage-Map Rate: 10/s  |  Material Efficiency: 0.70  |  HP/Ammo: 5.80  |  Ramp: 4.0s↑ 2.0s↓
item_Descgrin_salvage_01_store01=Fabricant : Greycat Industrial\nType d'Objet : Utilitaire\nCatégorie : Gadget\n\nTaille de la Cartouche :Large\nBatterie Intégrée\nCadence de Tir : N / A (Rayon)\nPortée Pratique: 5 m\n\nDépouillez des pièces de récupération et effectuez des réparations avec le Cambio, un outil de récupération et de réparation à double usage (SRT) conçu pour collecter et convertir les alliages et les polymères trouvés dans la ferraille en composite de matériaux recyclés, qui peut être soit vendu, soit utilisé pour effectuer des réparations rapides. Le Cambio SRT se caractérise par des vitesses de dépouillement rapides et une autonomie de batterie impressionnante, ce qui en fait un gadget essentiel pour les mécaniciens et les explorateurs de l'espace.\n\nL'édition "Heartthrob" est d'un violet chatoyant et ravissant, parfait pour faire fondre les cœurs de vos amis comme de vos ennemis.\n\n--- STATS ---\n<EM4>Repair:</EM4>  HP Rate: 160/s  |  Damage-Map Rate: 10/s  |  HP/Ammo: 0.10  |  Ramp: 0.5s↑ 0.1s↓\n<EM4>Salvage:</EM4>  HP Rate: 670/s  |  Damage-Map Rate: 10/s  |  Material Efficiency: 0.70  |  HP/Ammo: 5.80  |  Ramp: 4.0s↑ 2.0s↓
item_Descgrin_tractor_01=Fabricant : Greycat Industrial\nType d'Objet : Rayon tracteur\nCatégorie : Gadget\n\nDurée de Vie : Batterie Intégrée\nCadence de Tir : N / A (Rayon)\nPortée Pratique : 10-20 m\n\nLe puissant rayon tracteur de Greycat offre des performances industrielles à un prix abordable pour le consommateur. Grâce à sa batterie longue durée et à son émetteur de faisceau plus large, le MaxLift peut facilement manipuler des objets plus lourds et plus volumineux, ce qui en fait l'outil idéal pour les longues journées de transport de marchandises.\n\n--- STATS ---\nWeight: 3.8 kg\nFire Modes: Tracteur\nAlpha Dmg: 21.0 (Energy)\nAmmo: 60\nVelocity: 1,200 m/s  |  Absolute Range: 4.8 km
