item_Descklwe_rifle_energy_01=Fabricant : Klaus & Werner\nType d'Arme : Fusil d'Assaut\nCatégorie : Énergie (Laser)\n\nPuissance des Batteries : 45\nCadence de Tir : 450 rpm\nPortée Pratique : 50 m\n\nAttaches : Optiques (S2), Canon (S2), Sous Canon (S2)\n\nLes armes d'assaut fiables ne sont jamais démodées. Klaus & Werner perpétue cette tradition en dévoilant le Gallant. Ce fusil d'assaut à énergie est capable de fournir un tir fourni et constant sur des cibles jusqu'à moyenne distance, pendant que son système de d'alimentation à haute capacité permet aux opérateurs de tirer considérablement plus de projectiles par batterie.\n\n--- STATS ---\nWeight: 3.8 kg\nFire Rate: 900 RPM\nFire Modes: Burst\nAlpha Dmg: 21.0 (Energy)  |  DPS: 315.0\nAmmo: 45\nVelocity: 1,200 m/s  |  Absolute Range: 4.8 km
