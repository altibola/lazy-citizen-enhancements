item_Desclbco_sniper_energy_01=Fabricant : Lightning Bolt Company\nType d'Arme : Fusil de sniper\nCatégorie : Électron\n\nCapacité du chargeur : 5\nCadence de tir : 30 rpm\nPortée efficace : 150m+\n\nAccessoires : Optique (S3), Sous-canon (S2)\n\nL'Atzkav est un fusil de précision unique de Lightning Bolt Co. Une fois la poignée de chargement enclenchée, il tire avec précision un électron chargé pour infliger d'importants dégâts énergétiques qui se propagent aux cibles conductrices voisines. Cet effet d'impulsion spécial laisse également une charge résiduelle dans la zone de frappe qui augmente les dégâts infligés par les tirs d'électrons suivants. Outre les capacités de tir spéciales du fusil, l'Atzkav est surtout connu pour son canon distinct qui crépite d'énergie lors du tir suivant.\n\n--- STATS ---\nWeight: 9.1 kg\nFire Rate: 30 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 165.0 (Energy: 120.0 / Distort: 35.0 / Stun: 10.0)  |  DPS: 82.5\nAmmo: 8\nVelocity: 500 m/s  |  Absolute Range: 1.0 km\nFull Dmg to: 350 m  |  Drop: -0.01/m  |  Min Dmg: 30.0
