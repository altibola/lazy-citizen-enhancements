item_Descksar_smg_energy_01_red01=Fabricant : Kastak Arms\nType : SMG\nClasse : Énergie (Laser)\nPuissance des Batteries : 60\nCadence de Tir : 800 cpm\nPortée Pratique : 30 m\n\nLa SMG Custodian de Kastak Arms privilégie une cadence de tir élevée au détriment des dégâts et de la précision, ce qui en fait un choix idéal pour évoluer dans des environnements étroits et lors de combats rapprochés. L'édition spéciale "Brimstone" présente une bande supérieure rouge vif et une finition gris foncé sur la partie inférieure de l'arme.\n\n--- STATS ---\nWeight: 3.4 kg\nFire Rate: 900 RPM\nFire Modes: Auto / Charge / Burst\nAlpha Dmg: 13.0 (Energy)  |  DPS: 195.0\nAmmo: 60\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
item_Descksar_sniper_ballistic_01=Fabricant : Kastak Arms\nType d'Arme : Fusil Sniper\nCatégorie : Balistique\n\nCapacité du chargeur : 8\nCadence de tir :30 rpm\nPortée pratique : 120 m\n\nAttaches : Optique (S3), Canon (S/O), Sous canon (S2)\n\nLe Scalpel est un fusil de sniper unique et polyvalent de Kastak Arms. Conçu avec deux canons empilés l'un sur l'autre, il possède deux modes de tir pour vous permettre d'adapter votre tir à la situation. Il peut effectuer un tir unique et puissant à longue distance, ou tirer avec les deux canons en succession rapide pour créer une double rafale.\n\n--- STATS ---\nWeight: 5.1 kg\nFire Rate: 600 RPM\nFire Modes: Burst / Semi-Auto\nAlpha Dmg: 45.0 (Phys)  |  DPS: 450.0\nAmmo: 12\nVelocity: 875 m/s  |  Absolute Range: 1.8 km\nFull Dmg to: 335 m  |  Min Dmg: 45.0
item_Descksar_sniper_ballistic_01_blue_white01=Fabricant : Kastak Arms\nType d'Arme : Fusil Sniper\nCatégorie : Balistique\n\nCapacité du chargeur : 8\nCadence de tir :30 rpm\nPortée pratique : 120 m\n\nAttaches : Optique (S3), Canon (S/O), Sous canon (S2)\n\nLe Scalpel est un fusil de sniper unique et polyvalent de Kastak Arms. Conçu avec une configuration verticale à deux canons, il dispose de deux modes de tir pour vous permettre d'adapter votre tir à la situation afin de délivrer un tir unique et puissant à longue distance, ou de tirer les deux canons en succession rapide pour créer une rafale à double tir. Cette édition spéciale Permafrost présente des couleurs bleues et grises rappelant un glacier sous un ciel d'hiver aveuglant.\n\n--- STATS ---\nWeight: 5.1 kg\nFire Rate: 600 RPM\nFire Modes: Burst / Semi-Auto\nAlpha Dmg: 45.0 (Phys)  |  DPS: 450.0\nAmmo: 12\nVelocity: 875 m/s  |  Absolute Range: 1.8 km\nFull Dmg to: 335 m  |  Min Dmg: 45.0
item_Desclbco_pistol_energy_01=Fabricant : Lightning Bolt Co. \nType d'Arme : Pistolet\nCatégorie : Electron\n\nPuissance des Batteries : 10\nCadence de Tir : 350 rpm\nPortée Pratique : 35m\n\nAttaches : Optique (S1), Sous Canon (S1)\n\nL'excellence de l'ingénierie ne fait qu'effleurer la surface du pistolet Yubarev. Irina Arkadova, ancienne mercenaire reconvertie dans la fabrication d'armes, a supervisé chaque aspect de l'arme, lui conférant puissance, praticité et panache. Doté d'une poignée en bois classique et d'un canon à la pointe de la technologie, le Yubarev tire des électrons chargés qui impactent non seulement votre cible, en amplifiant la charge à chaque coup, mais qui peuvent aussi se propager à d'autres cibles conductrices à portée.\n\n--- STATS ---\nWeight: 1.6 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 41.0 (Energy: 32.5 / Distort: 7.5 / Stun: 1.0)  |  DPS: 239.2\nAmmo: 10\nVelocity: 500 m/s  |  Absolute Range: 1.0 km\nFull Dmg to: 20 m  |  Drop: -0.10/m  |  Min Dmg: 1.5
