item_Descgmni_rifle_ballistic_01_IAE2023=Fabricant : Gemini\nType d'Arme : Fusil d'assaut\nCatégorie : Balistique\n\nCapacité du chargeur : 30\nCadence de tir : 300 cpm / 900 cpm\nPortée pratique : 50 m\n\nAttaches : Optique (S2), Canon (S2), Sous canon (S2)\n\nAvec le S71, Gemini a conçu un fusil d'assaut ergonomique idéal pour les engagements à moyenne portée. Chambré avec une munition de calibre plus petit que d'autres armes de sa catégorie, le S71 est devenu populaire parmi les professionnels de la sécurité privée pour son esthétique élégante et sa précision. Conçue en l'honneur de l'IAE 2953, l'édition Ascension a été décorée d'élégantes touches d'acier et de cuivre inspirées du Syulen du fabricant Gatac.\n\n--- STATS ---\nWeight: 2.5 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 21.5 (Phys)  |  DPS: 179.2\nAmmo: 30\nVelocity: 1,200 m/s  |  Absolute Range: 2.4 km\nFull Dmg to: 100 m  |  Drop: -0.10/m  |  Min Dmg: 17.5
