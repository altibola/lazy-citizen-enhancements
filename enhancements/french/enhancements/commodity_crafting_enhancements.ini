items_commodities_goldenmedmon_desc=IDN : 39\nIEH : 19\nEffets : Énergisant, Hydratant\n\nCultivés dans des climats tempérés sur les Ébéniers Maru, les Medmons Dorés tombent de l'arbre lorsqu'ils sont mûrs et récoltés. Le fruit à ce stade est extrêmement ferme et âpres. Ils ne deviennent comestibles qu'après avoir été « blanchis » ou ramollis par maturation.\n\n<EM3>BLUEPRINT DATA</EM3>\n- Electron Ammo\n- Fresnel Energy LMG\n- Pulse Laser Pistol, Pulse Pistol\n- Parallax Energy Assault Rifle\n- Prism Laser Shotgun\n- Quartz Energy SMG\n- Zenith Laser Sniper Rifle\n- vehiclegear/radar: 11 items\n- vehiclegear/shield: 11 items\n- NDB-26 Repeater, NDB-28 Repeater, NDB-30 Repeater\n- Cannons (4 types)\n- Scatters (4 types)
