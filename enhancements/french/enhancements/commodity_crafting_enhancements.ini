items_commodities_carinite_desc=Un minerai rare du fait que la pression extrême nécessaire à sa formation soit très peu courante, il est très demandé de par son utilisation dans les processeurs informatiques avancés et autres produits électroniques de pointe.\n\n<EM3>BLUEPRINT DATA</EM3>\n- Parallax Energy Assault Rifle\n- Quartz Energy SMG
