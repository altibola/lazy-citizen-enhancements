items_commodities_glacosite=Glacosite <EM4>[CF|Collection]</EM4>
items_commodities_glacosite_desc=Lors de la formation des glaciers, les minéraux les plus lourds s'enfoncent avec le temps et sont ensuite écrasés par le poids au-dessus quand la glace se déforme et s'écoule. Lorsque le glacier se retire, il laisse derrière lui des dépôts de Glacosite. De couleur blanche et bleue, les cristaux se présentent sous la forme de longs fils brillants qui ressemblent presque à du coton. La Glacosite a trouvé une utilisation commerciale spécialisée, car c'est un isolant extrêmement léger et durable.\n\n<EM3>BLUEPRINT DATA</EM3>\n- vehiclegear/shield: 24 items
