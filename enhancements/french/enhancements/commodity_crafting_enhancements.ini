items_commodities_carinite_pure_desc=Les sources typiques de carinite présentent diverses impuretés. Toutefois, dans certaines conditions extrêmement rares, des filons de carinite avec une pureté supérieure à 90 % peuvent se former. Le matériel informatique exigeant une précision absolue recherche généralement de la carinite pure.\n\n<EM3>BLUEPRINT DATA</EM3>\n- Parallax Energy Assault Rifle\n- Quartz Energy SMG
