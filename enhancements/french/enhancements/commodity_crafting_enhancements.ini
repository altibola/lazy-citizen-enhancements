items_commodities_feynmaline=Feynmaline <EM4>[CF|Collection]</EM4>
items_commodities_feynmaline_desc=La structure cristalline paramorphe de ce minéral est extrêmement volatile. Lorsqu'une énergie supplémentaire est introduite, comme c'est typiquement le cas dans les mines modernes, le minerai se dégrade souvent de manière explosive en Janalite, dont la structure est plus stable. Cette instabilité rend la Feynamline très dangereuse à acquérir, mais aussi extrêmement précieuse en tant que précurseur industriel d'antimatière si elle peut être récoltée correctement.\n\n<EM3>BLUEPRINT DATA</EM3>\n- vehiclegear/shield: 9 items
