items_commodities_beradom=Béradom <EM4>[CF|Collection]</EM4>
items_commodities_beradom_desc=Formée par la cristallisation de la sève du sapin de Beraber lors d'incendies de forêt, cette « pierre précieuse » transparente d'un bleu profond est souvent polie et utilisée en bijouterie. Bien qu'il soit possible de la fabriquer en faisant pousser des arbres puis en procédant à une combustion contrôlée, le temps nécessaire pour que les arbres arrivent à maturité en fait une denrée rare.\n\n<EM3>BLUEPRINT DATA</EM3>\n- Karna Rifle\n- vehiclegear/shield: 27 items
