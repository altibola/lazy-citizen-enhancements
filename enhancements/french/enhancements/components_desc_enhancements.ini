item_descQDRV_RSI_S02_Khaos_SCItem=Type d'objet : Moteur Quantum\nFabricant : RSI\nTaille : 2\nGrade : C \nClasse : Civil\n\nLe Khaos de RSI a été mis au point pour offrir des performances fiables avec une construction fiable. Une fois que vous l'aurez attaché, vous apprécierez l'ordre que ce moteur quantum apporte au chaos des voyages.\n\n--- STATS ---\nQT Speed: 201 Mm/s  |  Spool: 6s\nCooldown: 16.9s\nFuel/Gm: 0.0101\nQT Fuel Use: 16 μ/s\nAccel:  S1: 3,000,000  |  S2: 13,200,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 3 PU/s\nComponent HP: 410\nSignatures:  EM: 27,000  |  IR: 0\nOverheat Temp: 383K\nMax Distortion: 3,500
item_descQDRV_RSI_S03_Metis_SCItem=Type d'Objet : Moteur Quantum\nFabricant : RSI\nTaille : 3\nGrade : C\nClasse : Civil\n\nIl n'y a pas de place à l'erreur quand il s'agit de plier l'espace et le temps pour voyager sur de grandes distances. Faites confiance à RSI, une entreprise qui livre des composants de qualité depuis les débuts du vol spatial.\n\n--- STATS ---\nQT Speed: 246 Mm/s  |  Spool: 7s\nCooldown: 9.4s\nFuel/Gm: 0.0599\nQT Fuel Use: 26 μ/s\nAccel:  S1: 1,800,000  |  S2: 11,600,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 4 PU/s\nComponent HP: 1,100\nSignatures:  EM: 36,000  |  IR: 0\nOverheat Temp: 383K\nMax Distortion: 5,500
item_descQDRV_RSI_S03_Tyche_SCItem=Type d'Objet : Moteur Quantum\nFabricant : RSI\nTaille : 3\nGrade : B\nClasse : Civil\n\nLe moteur quantum Tyche équilibre harmonieusement les performances, la durabilité et la Furtivité pour créer un composant bien équilibré capable de gérer habilement une variété de situations.\n\n--- STATS ---\nQT Speed: 295 Mm/s  |  Spool: 7s\nCooldown: 9.1s\nFuel/Gm: 0.0541\nQT Fuel Use: 21 μ/s\nAccel:  S1: 2,160,000  |  S2: 13,900,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 4 PU/s\nComponent HP: 1,300\nSignatures:  EM: 36,000  |  IR: 0\nOverheat Temp: 394K\nMax Distortion: 6,000
item_descQDRV_TARS_S01_Wayfare_SCItem=Type d'Objet : Moteur Quantum\nFabricant : Tarsus \nTaille : 1\nGrade: D \nClasse : Civil\n\nAccélérer dans l'espace sans se ruiner. The Warfare est un petit moteur quantum de Tarsus qui a été spécialement conçu pour aider à rendre le voyage spatial abordable pour les masses.\n\n--- STATS ---\nQT Speed: 138 Mm/s  |  Spool: 4s\nCooldown: 10.0s\nFuel/Gm: 0.0101\nQT Fuel Use: 8 μ/s\nAccel:  S1: 4,170,000  |  S2: 12,500,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 2 PU/s\nComponent HP: 130\nSignatures:  EM: 15,000  |  IR: 0\nOverheat Temp: 372K\nMax Distortion: 1,950
item_descQDRV_TARS_S02_Quest_SCItem=Type d'Objet : Moteur Quantum\nFabricant : Tarsus \nTaille : 2\nGrade: D \nClasse : Civil\n\nPourquoi jouer avec la perfection ? Tarsus fabrique le moteur Quest depuis des siècles afin de fournir à chacun un composant de taille moyenne abordable pour l'accompagner dans ses aventures.\n\n--- STATS ---\nQT Speed: 168 Mm/s  |  Spool: 6s\nCooldown: 18.0s\nFuel/Gm: 0.0112\nQT Fuel Use: 19 μ/s\nAccel:  S1: 2,500,000  |  S2: 11,000,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 3 PU/s\nComponent HP: 360\nSignatures:  EM: 22,500  |  IR: 0\nOverheat Temp: 372K\nMax Distortion: 3,050
item_descQDRV_TARS_S03_Drifter_SCItem=Type d'Objet: Moteur Quantum\nFabricant : Tarsus\nTaille : 3\nGrade: D\nClasse : Civil\n\nÉquilibrant le savoir-faire et le coût, le Drifter offre les performances renommées de Tarsus à un prix abordable.\n\n--- STATS ---\nQT Speed: 205 Mm/s  |  Spool: 7s\nCooldown: 10.0s\nFuel/Gm: 0.0663\nQT Fuel Use: 31 μ/s\nAccel:  S1: 1,500,000  |  S2: 9,680,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 4 PU/s\nComponent HP: 990\nSignatures:  EM: 30,000  |  IR: 0\nOverheat Temp: 372K\nMax Distortion: 4,700
item_descQDRV_TARS_S03_Wanderer_SCItem=Type d'Objet : Moteur Quantum\nFabricant : Tarsus\nTaille : 3\nGrade: C\nClasse : Civil\n\nTarsus a soigneusement conçu et mis au point le Wanderer pour en faire un moteur quantum polyvalent, ce qui en fait l'un des composants les plus populaires de sa célèbre gamme.\n\n--- STATS ---\nQT Speed: 246 Mm/s  |  Spool: 7s\nCooldown: 10.0s\nFuel/Gm: 0.0644\nQT Fuel Use: 26 μ/s\nAccel:  S1: 1,800,000  |  S2: 11,600,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 4 PU/s\nComponent HP: 1,100\nSignatures:  EM: 30,000  |  IR: 0\nOverheat Temp: 383K\nMax Distortion: 5,500
item_descQDRV_WETK_S02_XL1_SCItem=Type d'Objet : Moteur Quantum\nFabricant : Wei-Tek\nTaille : 2\nGrade: A \nClasse: Militaire\n\nTarsus a soigneusement conçu et mis au point le Wanderer pour en faire un moteur quantum polyvalent, ce qui en fait l'un des composants les plus populaires de sa célèbre gamme. Le XL-1 est leur premier moteur quantum moyen qui allie de manière experte performance et durabilité.\n\n--- STATS ---\nQT Speed: 324 Mm/s  |  Spool: 6s\nCooldown: 22.9s\nFuel/Gm: 0.0240\nQT Fuel Use: 11 μ/s\nAccel:  S1: 4,830,000  |  S2: 21,300,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 4 PU/s\nComponent HP: 840\nSignatures:  EM: 26,300  |  IR: 0\nOverheat Temp: 453K\nMax Distortion: 7,000
item_descQDRV_WETK_S03_Balandin_SCItem=Type d'Objet : Moteur Quantum\nFabricant : Wei-Tek\nTaille : 3\nGrade: B\nClasse : Civil\n\nWei-Tek a construit le Balandin en pensant au personnel militaire et de sécurité. Après une série de tests effectués par des vétérans, les ingénieurs ont accéléré les temps d'amorçage et de calibrage tout en améliorant la précision et la stabilité du composant.\n\n--- STATS ---\nQT Speed: 339 Mm/s  |  Spool: 7s\nCooldown: 12.3s\nFuel/Gm: 0.1352\nQT Fuel Use: 21 μ/s\nAccel:  S1: 2,480,000  |  S2: 16,000,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 5 PU/s\nComponent HP: 2,100\nSignatures:  EM: 33,800  |  IR: 0\nOverheat Temp: 438K\nMax Distortion: 10,000
