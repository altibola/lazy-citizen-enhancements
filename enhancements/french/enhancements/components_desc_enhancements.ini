item_DescSHLD_BANU_S01_Suldrath=Type d'Objet : Générateur de Bouclier\nFabricant : Banu\nTaille : 1\nGrade : C\nClasse : Militaire\n\nLe générateur de bouclier Suldrath associe la technologie Tevarin classique à un design moderne. Les Banu mélangent admirablement les meilleurs éléments de la technologie historique des boucliers tevarin avec les améliorations et les commodités contemporaines attendues de cette génération de composants. Le résultat est un bouclier efficace et unique, conçu par des xénos, prêt à envelopper votre vaisseau et à vous protéger de tous les dangers qui se présenteront à vous.\n\n--- STATS ---\nMax HP: 2,304  |  Regen: 438 HP/s\nDowned Delay: 11.5s  |  Damaged Delay: 5.8s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,360  |  IR: 0\nPower Draw: 3 PU/s\nComponent HP: 180
item_DescSHLD_BANU_S02_Sukoran=Type d'Objet : Générateur de Bouclier\nFabricant : Banu\nTaille : 2\nGrade : C\nClasse : Militaire\n\nLe bon design survit toujours chez les Banu. Le générateur de bouclier Sukoran modernise la technologie Tevarin de plusieurs façons intéressantes. Sa conception efficace consomme moins d'énergie, tout en produisant un bouclier robuste capable d'absorber la plupart des attaques balistiques et énergétiques jusqu'à ce qu'il soit complètement épuisé. Cependant, cette efficacité accrue a un prix : le taux de régénération plus lent du Sukoran peut temporairement mettre le bouclier hors service.\n\n--- STATS ---\nMax HP: 7,680  |  Regen: 1,459 HP/s\nDowned Delay: 12.7s  |  Damaged Delay: 6.3s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,820  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 500
