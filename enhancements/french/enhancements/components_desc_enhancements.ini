item_Desc_COOL_ACOM_S01_ZeroRush=Type d'Objet : Refroidisseur\nFabricant : ACOM\nTaille : 1\nGrade : B\nClasse : Compétition\n\nPeu de choses peuvent pousser votre vaisseau à ses limites comme la course. Aller plus vite et plus fort génère beaucoup de chaleur excessive qui peut faire des ravages sur votre système si elle n'est pas correctement gérée. Le refroidisseur ZeroRush d'ACOM a ce qu'il faut pour vous faire franchir la ligne d'arrivée.\n\n--- STATS ---\nCooling Rate: 34 CR/s\nPower Draw: 2 PU/s\nComponent HP: 78\nSignatures:  EM: 818  |  IR: 5,890\nOverheat Temp: 743K
item_Desc_COOL_AEGS_S01_Glacier=Type d'Objet : Refroidisseur\nFabricant : Aegis Dynamics \nTaille : 1\nGrade : A\nClasse : Militaire\n\nVos armes, vos boucliers, vos propulseurs. Tous vitaux durant les combats, tous génèrent de la chaleur. Entre ainsi le refroidisseur Glacier de chez Aegis Dynamics. Le meilleur système de refroidissement de sa catégorie, conçu pour vous maintenir au frais lorsque la température monte.\n\n--- STATS ---\nCooling Rate: 38 CR/s\nPower Draw: 3 PU/s\nComponent HP: 230\nSignatures:  EM: 1,490  |  IR: 7,920\nOverheat Temp: 900K
