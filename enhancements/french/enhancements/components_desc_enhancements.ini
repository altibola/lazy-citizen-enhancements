item_Desc_SHLD_BASL_S02_Armada=Type d'Objet : Générateur de Bouclier\nFabricant : Basilisk \nTaille : 2\nGrade : D\nClasse : Industriel\n\nBasilisk a commencé par fabriquer des blindages de pointe, réputés pour leur durabilité et leur fiabilité. Aujourd'hui, ils perpétuent ce fier héritage avec des générateurs de bouclier industriels comme l'Armada.\n\n--- STATS ---\nMax HP: 7,200  |  Regen: 1,296 HP/s\nDowned Delay: 12.1s  |  Damaged Delay: 6.0s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,980  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 430
item_Desc_SHLD_BASL_S02_Citadel=Type d'Objet : Générateur de Bouclier\nFabricant : Basilisk \nTaille : 2\nGrade : B\nClasse : Industriel\n\nRenforcez votre vaisseau avec le générateur de bouclier Citadel de Basilisk. Conçu pour les vaisseaux industriels, ce composant émet un bouclier robuste et fiable.\n\n--- STATS ---\nMax HP: 7,200  |  Regen: 1,440 HP/s\nDowned Delay: 10.0s  |  Damaged Delay: 5.0s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,980  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 570
item_Desc_SHLD_BASL_S02_Rampart=Type d'Objet : Générateur de Bouclier\nFabricant : Basilisk \nTaille : 2\nGrade : A\nClasse : Industriel\n\nBasilisk comprend que la fuite n'est pas toujours possible. C'est pourquoi ils ont construit le générateur de bouclier industriel Rampart pour encaisser une quantité incroyable de dégâts avant de s'épuiser.\n\n--- STATS ---\nMax HP: 7,200  |  Regen: 1,584 HP/s\nDowned Delay: 9.2s  |  Damaged Delay: 4.6s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,980  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 640
item_Desc_SHLD_BASL_S03_Barbican=Type d'Objet : Générateur de Bouclier\nFabricant : Basilisk \nTaille : 3\nGrade : B\nClasse : Industriel\n\nBarricadez votre vaisseau contre les forces extérieures avec le Basilisk Barbican. Fabriqué à l'origine pour les grands navires industriels, ce générateur de bouclier est devenu très populaire grâce à sa grande capacité d'absorption des dégâts.\n\n--- STATS ---\nMax HP: 72,000  |  Regen: 14,400 HP/s\nDowned Delay: 11.0s  |  Damaged Delay: 5.5s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 2,480  |  IR: 0\nPower Draw: 5 PU/s\nComponent HP: 1,600
item_Desc_SHLD_BASL_S03_Parapet=Type d'Objet : Générateur de Bouclier\nFabricant : Basilisk\nTaille : 3\nGrade: A\nClasse : Industriel\n\nEtant le point culminant des grands générateurs de boucliers industriels du Basilisk, il est facile de comprendre pourquoi le Parapet est si apprécié. Avec l'un des meilleurs ratios de génération de bouclier par rapport aux dégâts, il est difficile de détériorer le bouclier et d'exposer la coque.\n\n--- STATS ---\nMax HP: 72,000  |  Regen: 15,840 HP/s\nDowned Delay: 10.1s  |  Damaged Delay: 5.0s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 2,480  |  IR: 0\nPower Draw: 5 PU/s\nComponent HP: 1,800
item_Desc_SHLD_BASL_S03_Ward=Type d'Objet : Générateur de Bouclier\nFabricant : Basilisk\nTaille : 3\nGrade : D\nCatégorie : Industriel\n\nLe Ward est le générateur de bouclier industriel de base de Basilisk pour les grands vaisseaux. Il offre des performances et une durabilité décentes tout en conservant une signature respectable.\n\n--- STATS ---\nMax HP: 72,000  |  Regen: 12,960 HP/s\nDowned Delay: 13.3s  |  Damaged Delay: 6.7s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 2,480  |  IR: 0\nPower Draw: 5 PU/s\nComponent HP: 1,200
item_Desc_SHLD_BEHR_S01_6SA=Type d'Objet : Générateur de Bouclier\nFabricant : Behring\nTaille : 1\nGrade : B\nCatégorie : Civil\n\nOffrant une santé de bouclier et une absorption des dégâts supérieures à la moyenne, l''Arbiter' 6SA a été composant de confiance pendant des siècles. Découvrez l'avantage Behring en installant ce petit générateur de bouclier dès aujourd'hui.\n\n--- STATS ---\nMax HP: 3,000  |  Regen: 600 HP/s\nDowned Delay: 9.1s  |  Damaged Delay: 4.5s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 900  |  IR: 0\nPower Draw: 2 PU/s\nComponent HP: 170
item_Desc_SHLD_BEHR_S01_7SA=Type d'Objet : Générateur de Bouclier\nFabricant : Behring\nTaille : 1\nGrade : A\nCatégorie : Civil\n\nUn générateur de bouclier haut de gamme qui fonctionne bruyamment et fièrement. Ce qu'il sacrifie en discrétion, il le compense largement par une durabilité suprême et d'excellentes performances. Ainsi, même si vos ennemis vous voient arriver, ils auront du mal à désactiver le 7SA 'Concord' de chez Behring.\n\n--- STATS ---\nMax HP: 3,000  |  Regen: 660 HP/s\nDowned Delay: 8.3s  |  Damaged Delay: 4.2s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 900  |  IR: 0\nPower Draw: 2 PU/s\nComponent HP: 200
item_Desc_SHLD_BEHR_S02_6MA=Type d'Objet : Générateur de Bouclier\nFabricant : Behring\nTaille : 2\nGrade : B\nCatégorie : Civil\n\nLa réputation inébranlable de Behring est presque aussi impénétrable que le bouclier produit par le 6MA 'Kozane'. Si c'est assez bon pour Behring, c'est assez bon pour vous.\n\n--- STATS ---\nMax HP: 10,000  |  Regen: 2,000 HP/s\nDowned Delay: 10.0s  |  Damaged Delay: 5.0s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,350  |  IR: 0\nPower Draw: 3 PU/s\nComponent HP: 470
item_Desc_SHLD_BEHR_S02_7MA=Type d'Objet : Générateur de Bouclier\nFabricant : Behring\nTaille : 2\nGrade : A\nCatégorie : Civil\n\nFaites confiance à un composant qui équipe les vaisseaux depuis des siècles — : le 7MA 'Lorica'. Faites l'expérience du générateur de bouclier haut de gamme de Behring sur votre vaisseau dès aujourd'hui.\n\n--- STATS ---\nMax HP: 10,000  |  Regen: 2,200 HP/s\nDowned Delay: 9.2s  |  Damaged Delay: 4.6s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,350  |  IR: 0\nPower Draw: 3 PU/s\nComponent HP: 540
item_Desc_SHLD_BEHR_S03_6CA=Type d'Objet : Générateur de Bouclier\nFabricant : Behring\nTaille : 3\nGrade : B\nCatégorie : Civil\n\n"Construit par Behring" est une phrase synonyme de qualité. C'est pourquoi tant de personnes dans l'Empire font confiance à leur générateur de bouclier 6CA 'Bila' pour leur fournir des performances solides, une durabilité impressionnante et un degré acceptable de furtivité.\n\n--- STATS ---\nMax HP: 100,000  |  Regen: 20,000 HP/s\nDowned Delay: 11.0s  |  Damaged Delay: 5.5s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,800  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 1,300
item_Desc_SHLD_BEHR_S03_7CA=Type d'Objet : Générateur de Bouclier\nFabricant : Behring\nTaille : 3\nGrade : A\nCatégorie : Civil\n\nLes générateurs de bouclier de qualité commerciale n'ont rien à envier au 7CA 'Nargun'. Ce composant utilise la technologie brevetée 'Freeze Flow' de Behring pour contrôler sa signature thermique tout en augmentant ses performances globales et sa durabilité.\n\n--- STATS ---\nMax HP: 100,000  |  Regen: 22,000 HP/s\nDowned Delay: 10.1s  |  Damaged Delay: 5.0s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,800  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 1,500
item_Desc_SHLD_GODI_S01_FR66=Type d'Objet : Générateur de Bouclier\nFabricant : Gorgon Defender Industries\nTaille : 1\nGrade : A\nCatégorie : Militaire\n\nLe FR-66 est l'un des petits générateurs de bouclier les plus polyvalents actuellement sur le marché. Obtenez une protection et des performances militaires de Gorgon Defender Industries pour vous assurer que votre vaisseau puisse survivre à n'importe quel attaque.\n\n--- STATS ---\nMax HP: 3,168  |  Regen: 697 HP/s\nDowned Delay: 9.6s  |  Damaged Delay: 4.8s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,240  |  IR: 0\nPower Draw: 3 PU/s\nComponent HP: 270
item_Desc_SHLD_GODI_S02_CoverAll=Type d'Objet : Générateur de Bouclier\nFabricant : Gorgon Defender Industries\nTaille : 2\nGrade : B\nCatégorie : Militaire\n\nNe sacrifiez pas la performance à la durabilité. Obtenez les deux avec le générateur de bouclier CoverAll de Gorgon Defender Industries.\n\n--- STATS ---\nMax HP: 10,560  |  Regen: 2,112 HP/s\nDowned Delay: 11.5s  |  Damaged Delay: 5.8s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,650  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 660
item_Desc_SHLD_GODI_S02_FR76=Type d'Objet : Générateur de Bouclier\nFabricant : Gorgon Defender Industries\nTaille : 2\nGrade : A\nCatégorie : Militaire\n\nAffiné par des années de tests approfondis en conditions réelles par les militaires, le Gorgon Defender Industries FR-76 est le générateur de bouclier ultime. Il est parfait pour tous, des défenseurs de la ligne de front à ceux qui explorent la frontière.\n\n--- STATS ---\nMax HP: 10,560  |  Regen: 2,323 HP/s\nDowned Delay: 10.5s  |  Damaged Delay: 5.3s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,650  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 750
item_Desc_SHLD_GODI_S02_SecureShield=Type d'Objet : Générateur de Bouclier\nFabricant : Gorgon Defender Industries\nTaille : 2\nGrade : D\nCatégorie : Militaire\n\nObtenez une protection de niveau militaire pour votre vaisseau avec le SecureShield de Gorgon Defender Industries. Leur technologie de pointe d'émetteurs permet une absorption supérieure du bouclier pour tous les types de dommages.\n\n--- STATS ---\nMax HP: 10,560  |  Regen: 1,901 HP/s\nDowned Delay: 13.9s  |  Damaged Delay: 7.0s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,650  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 500
item_Desc_SHLD_GODI_S03_FR86=Type d'Objet : Générateur de Bouclier\nFabricant : Gorgon Defender Industries\nTaille : 3\nGrade : A\nCatégorie : Militaire\n\nLe FR-86 de Gorgon est éprouvé, testé et fiable. Aucun autre générateur de bouclier de grande taille n'offre des performances et une durabilité aussi exceptionnelles.\n\n--- STATS ---\nMax HP: 105,600  |  Regen: 23,232 HP/s\nDowned Delay: 11.6s  |  Damaged Delay: 5.8s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 2,060  |  IR: 0\nPower Draw: 5 PU/s\nComponent HP: 2,100
item_Desc_SHLD_GODI_S03_FullBlock=Type d'Objet : Générateur de Bouclier\nFabricant : Gorgon Defender Industries\nTaille : 3\nGrade : B\nCatégorie : Militaire\n\nFabriqué par d'anciens résidents de Caliban, le grand générateur de bouclier FullBlock de Gorgon a été mis à l'épreuve à plusieurs reprises par des membres de l'armée et du public. Cela signifie que vous pouvez compter sur lui, quelle que soit la situation à laquelle vous êtes confronté.\n\n--- STATS ---\nMax HP: 105,600  |  Regen: 21,120 HP/s\nDowned Delay: 12.7s  |  Damaged Delay: 6.3s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 2,060  |  IR: 0\nPower Draw: 5 PU/s\nComponent HP: 1,800
item_Desc_SHLD_GODI_S03_SecureScreen=Type d'Objet : Générateur de Bouclier\nFabricant : Gorgon Defender Industries\nTaille : 3\nGrade : D\nCatégorie : Militaire\n\nGorgon Defender Industries apporte la puissance militaire à son générateur de bouclier d'entrée de gamme de grande taille. Doté de la meilleure durabilité de sa catégorie, le SecureScreen a été conçu pour encaisser les coups et survivre.\n\n--- STATS ---\nMax HP: 105,600  |  Regen: 19,008 HP/s\nDowned Delay: 15.3s  |  Damaged Delay: 7.7s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 2,060  |  IR: 0\nPower Draw: 5 PU/s\nComponent HP: 1,400
item_Desc_SHLD_SECO_S01_HEX=Type d'Objet : Générateur de Bouclier\nFabricant : Seal Corporation\nTaille : 1\nGrade : B\nCatégorie : Civil\n\nPréparez votre vaisseau pour toutes les circonstances en installant un HEX de chez Seal Corporation. L'équilibre entre performance et durabilité en fait un choix idéal et polyvalent pour ceux qui ne savent pas où leur prochaine aventure les mènera.\n\n--- STATS ---\nMax HP: 2,160  |  Regen: 432 HP/s\nDowned Delay: 9.1s  |  Damaged Delay: 4.5s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 750  |  IR: 0\nPower Draw: 2 PU/s\nComponent HP: 170
item_Desc_SHLD_SECO_S02_BLOC=Type d'Objet : Générateur de Bouclier\nFabricant : Seal Corporation\nTaille : 2\nGrade : B\nCatégorie : Civil\n\nLe générateur de bouclier BLOC de Seal Corporation a été le premier à utiliser le semi-conducteur révolutionnaire à cœur quantum de la société pour réduire la consommation d'énergie du composant sans compromettre les performances.\n\n--- STATS ---\nMax HP: 7,200  |  Regen: 1,440 HP/s\nDowned Delay: 10.0s  |  Damaged Delay: 5.0s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,130  |  IR: 0\nPower Draw: 3 PU/s\nComponent HP: 470
item_Desc_SHLD_SECO_S02_RPEL=Type d'Objet : Générateur de Bouclier\nFabricant : Seal Corporation\nTaille : 2\nGrade : D\nCatégorie : Civil\n\nDécouvrez pourquoi plus de gens que n'importe quelle autre entreprise font confiance à Seal Corporation pour protéger leur vaisseau. Avec le générateur de bouclier RPEL, vous pouvez être sûr d'être à l'abri du danger.\n\n--- STATS ---\nMax HP: 7,200  |  Regen: 1,296 HP/s\nDowned Delay: 12.1s  |  Damaged Delay: 6.0s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,130  |  IR: 0\nPower Draw: 3 PU/s\nComponent HP: 360
item_Desc_SHLD_SECO_S03_ARMOR=Type d'Objet : Générateur de Bouclier\nFabricant : Seal Corporation\nTaille : 3\nGrade : B\nCatégorie : Civil\n\nARMOR est le générateur de bouclier haut de gamme de Seal Corps. Il a été largement utilisé par les militaires avant que sa technologie de bouclier ne soit déclassifiée pour un usage civil.\n\n--- STATS ---\nMax HP: 72,000  |  Regen: 14,400 HP/s\nDowned Delay: 11.0s  |  Damaged Delay: 5.5s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,500  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 1,300
item_Desc_SHLD_SECO_S03_GUARD=Type d'Objet : Générateur de Bouclier\nFabricant : Seal Corporation\nTaille : 3\nGrade : C\nCatégorie : Civil\n\nN'ayez pas peur d'affronter l'inconnu avec le GUARD de Seal Corp. Ce générateur de bouclier allie performance, durabilité et discrétion pour permettre à l'utilisateur d'utiliser le bouclier de la manière qui lui convient le mieux.\n\n--- STATS ---\nMax HP: 72,000  |  Regen: 13,680 HP/s\nDowned Delay: 12.1s  |  Damaged Delay: 6.0s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,500  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 1,100
item_Desc_SHLD_SECO_S03_HAVEN=Type d'Objet : Générateur de Bouclier\nFabricant : Seal Corporation\nTaille : 3\nGrade : D\nCatégorie : Civil\n\nLe HAVEN est un générateur de bouclier admiré des grands vaisseaux. La conception simple et épurée de Seal Corp fait de la réparation de ce composant une tâche facile et abordable, ce qui n'a fait qu'accroître sa popularité au fil des ans.\n\n--- STATS ---\nMax HP: 72,000  |  Regen: 12,960 HP/s\nDowned Delay: 13.3s  |  Damaged Delay: 6.7s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,500  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 990
item_Desc_SHLD_YORM_S01_Jaghte=Type d'Objet : Générateur de Bouclier\nFabricant : Yorm\nTaille : 1\nGrade : B\nCatégorie : Compétition\n\nConçu dans un souci de performance, le générateur de bouclier de compétition Jaghte de Yorm privilégie la santé et le taux de génération de bouclier à la force et à la discrétion.\n\n--- STATS ---\nMax HP: 1,920  |  Regen: 384 HP/s\nDowned Delay: 7.7s  |  Damaged Delay: 3.9s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 818  |  IR: 0\nPower Draw: 2 PU/s\nComponent HP: 91
item_Desc_SHLD_YORM_S02_Bamoty=Type d'Objet : Générateur de Bouclier\nFabricant : Yorm\nTaille : 2\nGrade : D\nCatégorie : Compétition\n\nLe Bamoty est la version de Yorm d'un générateur de bouclier de type commercial. Ce composant de taille moyenne a permis à l'entreprise d'élargir sa clientèle grâce à son équilibre parfait entre performance, durabilité et discrétion.\n\n--- STATS ---\nMax HP: 6,400  |  Regen: 1,152 HP/s\nDowned Delay: 10.3s  |  Damaged Delay: 5.1s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,230  |  IR: 0\nPower Draw: 3 PU/s\nComponent HP: 200
item_Desc_SHLD_YORM_S02_Haltur=Type d'Objet : Générateur de Bouclier\nFabricant : Yorm\nTaille : 2\nGrade : B\nCatégorie : Compétition\n\nUn bouclier très résistant et un taux de génération exceptionnel confèrent à l'Haltur le meilleur classement des boucliers de sa catégorie en termes de performances. Apprécié des coureurs et de ceux qui préfèrent s'éloigner du danger plutôt que de l'absorber.\n\n--- STATS ---\nMax HP: 6,400  |  Regen: 1,280 HP/s\nDowned Delay: 8.5s  |  Damaged Delay: 4.2s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,230  |  IR: 0\nPower Draw: 3 PU/s\nComponent HP: 250
item_Desc_SHLD_YORM_S02_Trenta=Type d'Objet : Générateur de Bouclier\nFabricant : Yorm\nTaille : 2\nGrade : C\nCatégorie : Compétition\n\nUn choix idéal pour les coureurs à la recherche d'un générateur de bouclier offrant des performances et une durabilité supérieures à la moyenne. En prime, le boîtier du Trenta est fabriqué à partir d'un alliage de magnésium infusé, ce qui rend le composant à la fois robuste et léger.\n\n--- STATS ---\nMax HP: 6,400  |  Regen: 1,216 HP/s\nDowned Delay: 9.3s  |  Damaged Delay: 4.7s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,230  |  IR: 0\nPower Draw: 3 PU/s\nComponent HP: 220
