item_DescBEHR_BombRack_S3=Type : Porte-bombes\nFabricant : Behring\nTaille : 3\n\nConçu pour s'adapter à une grande variété de vaisseaux, le porte-bombes CST-313 "Castillo" peut transporter une seule bombe de taille 3 et constitue une bonne alternative sur les vaisseaux pouvant accueillir un porte-missiles de taille 3.\n\n--- STATS ---\nSize: S3\nGrade: 1\nBomb Slots: 10\nComponent HP: 200
item_DescCOOL_ACOM_S01_IcePlunge=Type d'Objet : Refroidisseur\nFabricant : ACOM\nTaille : 1\nGrade : C\nClasse : Compétition\n\nLorsque vous poussez votre vaisseau jusqu'à ses limites durant votre dernier tour frénétique, vous serez bien heureux d'avoir le IcePlunge de chez ACOM pour tout maintenir au frais.\n\n--- STATS ---\nCooling Rate: 34 CR/s\nPower Draw: 2 PU/s\nComponent HP: 69\nSignatures:  EM: 818  |  IR: 5,890\nOverheat Temp: 675K
item_DescCOOL_ACOM_S01_QuickCool=Type d'Objet : Refroidisseur\nFabricant : ACOM\nTaille 1\nGrade : D\nClasse : Compétition\n\nLe QuikCool fournit des performances supérieures aux autres refroidisseurs de sa classe. Ce composant de classe compétitive de chez ACOM sacrifie la furtivité et de la durabilité afin de devenir les plus puissant des refroidisseurs d'entrée de gamme qui soit.\n\n--- STATS ---\nCooling Rate: 32 CR/s\nPower Draw: 2 PU/s\nComponent HP: 62\nSignatures:  EM: 818  |  IR: 5,400\nOverheat Temp: 614K
item_DescCOOL_ACOM_S02_AbsoluteZero_SCItem=Type d'Objet : Refroidisseur\nFabricant : ACOM\nTaille : 2\nGrade : B\nClasse : Compétition\n\nConçu initialement pour les pilotes de course, le refroidisseur AbsoluteZero pousse les performances à leurs maximum. Ce composant de haute qualité de chez ACOM comprend un nouveau système de transfert du liquide de refroidissement afin de maintenir les systèmes de votre vaisseau au frais en priorité.\n\n--- STATS ---\nCooling Rate: 46 CR/s\nPower Draw: 3 PU/s\nComponent HP: 210\nSignatures:  EM: 1,230  |  IR: 7,850\nOverheat Temp: 743K
item_DescCOOL_ACOM_S02_IceDive_SCItem=Type d'Objet : Refroidisseur\nFabricant : ACOM\nTaille : 2\nGrade : C\nClasse : Compétition\n\nLe IceDive délivre des performances de pointe en comparaison des autres refroidisseurs moyens de sa classe, cependant cela est possible au détriment d'une haute émission de signatures infrarouges et électromagnétiques.\n\n--- STATS ---\nCooling Rate: 46 CR/s\nPower Draw: 3 PU/s\nComponent HP: 190\nSignatures:  EM: 1,230  |  IR: 7,850\nOverheat Temp: 675K
item_DescCOOL_ACOM_S02_RapidCool_SCItem=Type d'Objet : Refroidisseur\nFabricant : ACOM\nTaille : 2\nGrade : D\nClasse : Compétition\n\nACOM amène sa philosophie de la performance avant tout avec ce refroidisseur moyen. Le RapidCool échange puissance d'émission et durabilité pour de meilleures performances.\n\n--- STATS ---\nCooling Rate: 43 CR/s\nPower Draw: 3 PU/s\nComponent HP: 170\nSignatures:  EM: 1,230  |  IR: 7,200\nOverheat Temp: 614K
item_DescCOOL_AEGS_S01_Bracer=Type d'Objet : Refroidisseur\nFabricant : Aegis Dynamics \nTaille : 1\nGrade : C\nClasse : Militaire\n\nPour ceux qui recherchent un refroidissement de milieu de gamme solide et fiable, vous ne pouvez pas faire mieux que le Bracer d'Aegis. Ce système de refroidissement de petite taille offre de solides performances et une durabilité permettant à votre vaisseaux de tourner à plein régime.\n\n--- STATS ---\nCooling Rate: 34 CR/s\nPower Draw: 3 PU/s\nComponent HP: 180\nSignatures:  EM: 1,490  |  IR: 7,260\nOverheat Temp: 750K
item_DescCOOL_AEGS_S01_Polar=Type d'Objet : Refroidisseur\nFabricant : Aegis Dynamics \nTaille : 1\nGrade : B\nClasse : Militaire\n\nConstruit afin de répondre aux demandes exigeantes des tâches journalières militaires, le refroidisseur Polar d'Aegis comprend un un cadre renforcé pour une plus grande durabilité. Soyez assuré que lorsque vous vous lancez dans le feu de l'action, le Polar maintiendra votre vaisseau au frais.\n\n--- STATS ---\nCooling Rate: 34 CR/s\nPower Draw: 3 PU/s\nComponent HP: 210\nSignatures:  EM: 1,490  |  IR: 7,260\nOverheat Temp: 825K
item_DescCOOL_AEGS_S01_Tundra=Type d'Objet : Refroidisseur\nFabricant : Aegis Dynamics \nTaille : 1\nGrade : D\nClasse : Militaire\n\nConstruit par Aegis avec des performances militaires à l'esprit, la performance fiable du Tundra a fait de ce dernier le refroidisseur de choix de l'UEE Navy.\n\n--- STATS ---\nCooling Rate: 32 CR/s\nPower Draw: 3 PU/s\nComponent HP: 160\nSignatures:  EM: 1,490  |  IR: 6,600\nOverheat Temp: 682K
item_DescCOOL_AEGS_S02_Arctic=Type d'Objet : Refroidisseur\nFabricant : Aegis Dynamics \nTaille : 2\nGrade : C\nClasse : Militaire\n\nFournissant le genre de durabilité faisant des produits Aegis des références dans l'armée, L'Arctic est un refroidisseur économique de classe militaire capable de résister aux rigueurs du combat sans sacrifier les performances.\n\n--- STATS ---\nCooling Rate: 46 CR/s\nPower Draw: 4 PU/s\nComponent HP: 490\nSignatures:  EM: 1,980  |  IR: 9,440\nOverheat Temp: 750K
item_DescCOOL_AEGS_S02_Boreal=Type d'Objet : Refroidisseur\nFabricant : Aegis Dynamics \nTaille : 2\nGrade : D\nClasse : Militaire\n\nConçu afin de disperser la chaleur du combat, le refroidisseur Boreal d'Aegis Dynamics est le standard militaire avec sa capacité à survivre aux situations stressantes.\n\n--- STATS ---\nCooling Rate: 41 CR/s\nPower Draw: 4 PU/s\nComponent HP: 430\nSignatures:  EM: 1,980  |  IR: 8,580\nOverheat Temp: 682K
item_DescCOOL_AEGS_S03_Blizzard_SCItem=Type d'Objet : Refroidisseur\nFabricant : Aegis Dynamics \nTaille : 3\nGrade : A\nClasse : Militaire\n\nLes mécaniciens de la Navy ont travaillé avec les ingénieurs d'Aegis pour s'assurer que le Blizzard répondait à leurs besoins spécifiques. Lorsqu'il est arrivé sur le marché, ce refroidisseur haut de gamme de qualité militaire est devenu l'un des composants les plus vendus d'Aegis.\n\n--- STATS ---\nCooling Rate: 60 CR/s\nPower Draw: 5 PU/s\nComponent HP: 1,800\nSignatures:  EM: 2,480  |  IR: 12,700\nOverheat Temp: 900K
item_DescCOOL_AEGS_S03_Galinstan_SCItem=Type d'Objet : Refroidisseur\nFabricant : Aegis Dynamics \nTaille : 3\nGrade : D\nClasse : Militaire\n\nLe Galinstan est un ancien modèle de refroidisseur développé à l'origine pour l'UEE Navy. Ses spécifications ne vous impressionnerons pas, mais il reste un refroidisseur d'entrée de gamme solide et de grande taille.\n\n--- STATS ---\nCooling Rate: 50 CR/s\nPower Draw: 5 PU/s\nComponent HP: 1,200\nSignatures:  EM: 2,480  |  IR: 10,600\nOverheat Temp: 682K
item_DescCOOL_AEGS_S03_Mercury=Type d'Objet : Refroidisseur\nFabricant : Aegis Dynamics \nTaille : 3\nGrade : C\nClasse : Militaire\n\nEn situation de combat, même le plus petit des avantages peut mener aux plus grandes réussites. Avec le système de refroidissement Mercury d'Aegis à bord, vous serez capable de pousser votre vaisseau au maximum plus longtemps lorsque vous en aurez le plus besoin.\n\n--- STATS ---\nCooling Rate: 56 CR/s\nPower Draw: 5 PU/s\nComponent HP: 1,300\nSignatures:  EM: 2,480  |  IR: 11,600\nOverheat Temp: 750K
item_DescCOOL_AEGS_S04_Idris=Type d'objet : Refroidisseur\nFabricant : Aegis Dynamics\nTaille : 4\n\nRefroidisseur de classe capitale spécialement conçu pour la frégate Idris.\n\n--- STATS ---\nCooling Rate: 102 CR/s\nPower Draw: 6 PU/s\nComponent HP: 36,000\nSignatures:  EM: 2,970  |  IR: 15,000\nOverheat Temp: 900K
item_DescCOOL_AEGS_S04_Reclaimer=Type d'Objet : Refroidisseur\nFabricant : Aegis Dynamics\nTaille : 4\nGrade : Sur mesure\nClasse : Industriel\n\nLe Reclaimer est un vaisseau réputé pour sa capacité à travailler longtemps et intensément. Pour soutenir même les projets de récupération les plus difficiles, Aegis a développé le refroidisseur sur mesure Algid.\n\n--- STATS ---\nCooling Rate: 69 CR/s\nPower Draw: 6 PU/s\nComponent HP: 4,100\nSignatures:  EM: 2,970  |  IR: 14,300\nOverheat Temp: 810K
item_DescCOOL_JSPN_S00_FrostStarSL=Type d'Objet : Refroidisseur\nFabricant : J-Span\nTaille : 0\nGrade : C\nClasse : Civil\n\nQue vous naviguiez sur terre ou dans l'espace, il existe un refroidisseur J-Span idéal pour vous. La Frost-Star SL est un refroidisseur de catégorie intermédiaire conçu pour apporter la fiabilité de la gamme aux véhicules terrestres et à canopée ouverte.\n\n--- STATS ---\nCooling Rate: 16 CR/s\nPower Draw: 1 PU/s\nComponent HP: 46\nSignatures:  EM: 375  |  IR: 2,500\nOverheat Temp: 600K
item_DescCOOL_JSPN_S00_WinterStarSL_SCItem=Type d'Objet : Refroidisseur\nFabricant : J-Span\nTaille : 0\nGrade : D\nClasse : Civil\n\nNouveau venu de la gamme de refroidisseurs Winter-Star de chez J-Span, le nouveau système SL Kivo offre une méthode de dissipation unique, permettant à votre véhicule de gérer la chaleur mieux que jamais auparavant.\n\n--- STATS ---\nCooling Rate: 14 CR/s\nPower Draw: 1 PU/s\nComponent HP: 40\nSignatures:  EM: 375  |  IR: 2,270\nOverheat Temp: 545K
item_DescCOOL_JSPN_S01_CryoStar=Type d'Objet : Refroidisseur\nFabricant : J-Span\nTaille : 1\nGrade : B\nClasse : Civil\n\nLe refroidisseur destinée au grand public, Cryo-Star de J-Span, est devenu une observation récurrente au sein de l'Empire grâce à son absorption fiable de la chaleur, qui ne mettra pas à rude épreuve le générateur de votre vaisseau.\n\n--- STATS ---\nCooling Rate: 26 CR/s\nPower Draw: 2 PU/s\nComponent HP: 150\nSignatures:  EM: 750  |  IR: 4,000\nOverheat Temp: 660K
item_DescCOOL_JSPN_S01_FrostStar=Type d'Objet : Refroidisseur\nFabricant : J-Span\nTaille : 1\nGrade : C\nClasse : Civil\n\nRemarqué pour ses performances constantes, le refroidisseur Frost-Star de chez J-Span a de nombreux adeptes grâce à son équilibre entre puissance et émission de chaleur.\n\n--- STATS ---\nCooling Rate: 26 CR/s\nPower Draw: 2 PU/s\nComponent HP: 130\nSignatures:  EM: 750  |  IR: 4,000\nOverheat Temp: 600K
item_DescCOOL_JSPN_S01_WinterStar=Type d'Objet : Refroidisseur\nFabricant : J-Span\nTaille : 1\nGrade : D\nClasse : Civil\n\nRejoignez la famille J-Span en achetant un refroidisseur Winter-Star pour votre vaisseau. Ce modèle d'entrée de gamme manque de classe, mais ses excellentes performances et son prix en font un choix populaire pour les pilotes de l'UEE.\n\n--- STATS ---\nCooling Rate: 23 CR/s\nPower Draw: 2 PU/s\nComponent HP: 110\nSignatures:  EM: 750  |  IR: 3,630\nOverheat Temp: 545K
item_DescCOOL_JSPN_S02_CryoStarEX=Type d'Objet : Refroidisseur\nFabricant : J-Span\nTaille : 2\nGrade : B\nClasse : Civil\n\nAvec son Ex-Line, J-Span a apporté la même absorption de chaleur fiable de son populaire refroidisseur Cryo-Star aux pilotes souhaitant équiper de plus gros vaisseaux.\n\n--- STATS ---\nCooling Rate: 34 CR/s\nPower Draw: 3 PU/s\nComponent HP: 400\nSignatures:  EM: 1,130  |  IR: 5,500\nOverheat Temp: 660K
item_DescCOOL_JSPN_S02_FrostStarEX=Type d'Objet : Refroidisseur\nFabricant : J-Span\nTaille : 2\nGrade : C\nClasse : Civil\n\nLe refroidisseur Frost-Star EX vient à vous de chez J-Span, un fabricant avec une réputation bien méritée auprès des possesseurs de vaisseaux pour construire des refroidisseurs capable de gérer avec fiabilité l'échange de chaleur peu importe où vous volerez.\n\n--- STATS ---\nCooling Rate: 34 CR/s\nPower Draw: 3 PU/s\nComponent HP: 350\nSignatures:  EM: 1,130  |  IR: 5,500\nOverheat Temp: 600K
item_DescCOOL_JSPN_S02_WinterStarEX_SCItem=Type d'Objet : Refroidisseur\nFabricant : J-Span\nTaille : 2\nGrade : D\nClasse : Civil\n\nLe Winter-Star EX est un refroidisseur de base auquel vous pouvez faire confiance. Construit par les experts de chez J-Span, il est prêt à affronter chaque soucis que vous rencontrerez.\n\n--- STATS ---\nCooling Rate: 32 CR/s\nPower Draw: 3 PU/s\nComponent HP: 300\nSignatures:  EM: 1,130  |  IR: 5,000\nOverheat Temp: 545K
item_DescCOOL_JSPN_S03_FrostStarXL_SCItem=Type d'Objet : Refroidisseur\nFabricant : J-Span\nTaille : 3\nGrade : C\nClasse : Civil\n\nLorsque que votre vaisseau vole, les composants génèrent de la chaleur qui peuvent abimer et même entraîner des défaillances du système à moins d'être correctement gérée par un refroidisseur fiable et correctement conçu comme le Frost-Star XL de J-Span.\n\n--- STATS ---\nCooling Rate: 45 CR/s\nPower Draw: 4 PU/s\nComponent HP: 960\nSignatures:  EM: 1,500  |  IR: 7,000\nOverheat Temp: 600K
item_DescCOOL_JSPN_S03_WinterStarXL_SCItem=Type d'Objet : Refroidisseur\nFabricant : J-Span\nTaille : 3\nGrade : D\nClasse : Civil\n\nDepuis deux siècles, J-Span se consacre à la fabrication de refroidisseurs. Le Winter-Star XL est leur refroidisseur grand format d'entrée de gamme. Ce qu'il perd en fonctionnalités, il le compense largement par un savoir-faire solide.\n\n--- STATS ---\nCooling Rate: 41 CR/s\nPower Draw: 4 PU/s\nComponent HP: 840\nSignatures:  EM: 1,500  |  IR: 6,380\nOverheat Temp: 545K
item_DescCOOL_JUST_S01_EcoFlow=Type d'Objet : Refroidisseur\nFabricant : Juno Starwerk\nTaille : 1\nGrade : B\nClasse : Industriel\n\nUne norme depuis des siècles, le refroidisseur industriel Eco-Flow de Juno Starwerk est le favori des transporteurs car il est facile à entretenir même lorsqu'il transporte les charges les plus lourdes.\n\n--- STATS ---\nCooling Rate: 32 CR/s\nPower Draw: 3 PU/s\nComponent HP: 180\nSignatures:  EM: 1,490  |  IR: 6,530\nOverheat Temp: 743K
item_DescCOOL_JUST_S01_Hydrocel=Type d'Objet : Refroidisseur\nFabricant : Juno Starwerk\nTaille : 1\nGrade : D\nClasse : Industriel\n\nMaintenez votre vaisseau en activité plus longtemps avec le Hydrocel, un refroidisseur industriel d'entrée de gamme du fabricant respecté Juno Starwerk.\n\n--- STATS ---\nCooling Rate: 29 CR/s\nPower Draw: 3 PU/s\nComponent HP: 130\nSignatures:  EM: 1,490  |  IR: 5,940\nOverheat Temp: 614K
item_DescCOOL_JUST_S01_Thermax=Type d'Objet : Refroidisseur\nFabricant : Juno Starwerk\nTaille : 1\nGrade : C\nClasse : Industriel\n\nJuno Starwerk l'a encore fait. Avec la gamme de refroidisseurs Thermax, Juno a élevé la barre en matière de refroidisseurs industriels économiques adaptés à tous les budgets. Ces petits refroidisseurs offrent des performances et une durabilité supérieures sans pour autant vider votre porte-monnaie.\n\n--- STATS ---\nCooling Rate: 32 CR/s\nPower Draw: 3 PU/s\nComponent HP: 150\nSignatures:  EM: 1,490  |  IR: 6,530\nOverheat Temp: 675K
item_DescCOOL_JUST_S02_CoolCore=Type d'Objet : Refroidisseur\nFabricant : Juno Starwerk\nTaille : 2\nGrade : C\nClasse : Industriel\n\nLe nom CoolCore en dit long. Conçu par Juno Starwerk pour être aussi travailleur que vous, ce refroidisseur contribue à garantir que l'ensemble de votre vaisseau fonctionne bien dans les paramètres de température souhaités.\n\n--- STATS ---\nCooling Rate: 41 CR/s\nPower Draw: 4 PU/s\nComponent HP: 420\nSignatures:  EM: 1,980  |  IR: 8,710\nOverheat Temp: 675K
item_DescCOOL_JUST_S02_Hydrojet=Type d'Objet : Refroidisseur\nFabricant : Juno Starwerk\nTaille : 2\nGrade : D\nClasse : Industriel\n\nLorsque votre vaisseau surchauffe, cela rend presque n'importe quelle tâche non seulement plus difficile, mais potentiellement dangereuse pour vous et votre équipage. Avec l'HydroJet d'entrée de gamme de Juno Starwerk, vous pouvez être sûr que vos niveaux de chaleur sont contrôlés par un refroidisseur conçu par l'une des marques les plus fiables de l'industrie.\n\n--- STATS ---\nCooling Rate: 38 CR/s\nPower Draw: 4 PU/s\nComponent HP: 370\nSignatures:  EM: 1,980  |  IR: 7,920\nOverheat Temp: 614K
item_DescCOOL_JUST_S02_Snowpack_SCItem=Type d'Objet : Refroidisseur\nFabricant : Juno Starwerk\nTaille : 2\nGrade : A\nClasse : Industriel\n\nLes refroidisseurs industriels de taille moyenne ne sont pas meilleurs que le Snowpack de Juno Starwerk. Ses performances exceptionnelles et sa durabilité en ont fait le favori des transporteurs depuis des siècles.\n\n--- STATS ---\nCooling Rate: 46 CR/s\nPower Draw: 4 PU/s\nComponent HP: 550\nSignatures:  EM: 1,980  |  IR: 9,500\nOverheat Temp: 810K
item_DescCOOL_JUST_S03_ChillMax_SCItem=Type d'Objet : Refroidisseur\nFabricant : Juno Starwerk\nTaille : 3\nGrade : A\nClasse : Industriel\n\nLe nom Chill-Max est aussi simple que le design de ce refroidisseur Juno Starwerk. Ce refroidisseur industriel très bien noté est le favori des transporteurs depuis des siècles.\n\n--- STATS ---\nCooling Rate: 58 CR/s\nPower Draw: 5 PU/s\nComponent HP: 1,500\nSignatures:  EM: 2,480  |  IR: 11,900\nOverheat Temp: 810K
item_DescCOOL_JUST_S03_Hydropulse_SCItem=Type d'Objet : Refroidisseur\nFabricant : Juno Starwerk\nTaille : 3\nGrade : D\nClasse : Industriel\n\nUne option d'entrée de gamme pour la marque de refroidisseurs de Juno Starwerk, l'Hydropulse sacrifie une certaine durabilité et utilise quelques astuces de conception pour faire de ce grand refroidisseur industriel une option pour ceux qui ne peuvent pas se permettre l'un de leurs modèles haut de gamme.\n\n--- STATS ---\nCooling Rate: 48 CR/s\nPower Draw: 5 PU/s\nComponent HP: 1,000\nSignatures:  EM: 2,480  |  IR: 9,900\nOverheat Temp: 614K
item_DescCOOL_JUST_S03_ThermalCore=Type d'Objet : Refroidisseur\nFabricant : Juno Starwerk\nTaille : 3\nGrade : C\nClasse : Industriel\n\nLorsque vous êtes en plein milieu d'un travail important, vous ne voulez pas perdre de temps à vous demander si votre refroidisseur joue son rôle. Maintenant, vous n'avez plus à le faire. Avec le refroidisseur de niveau intermédiaire ThermalCore de Juno Starwerk à bord, vous n'avez plus à vous soucier de la gestion de la chaleur.\n\n--- STATS ---\nCooling Rate: 52 CR/s\nPower Draw: 5 PU/s\nComponent HP: 1,200\nSignatures:  EM: 2,480  |  IR: 10,900\nOverheat Temp: 675K
item_DescCOOL_LPLT_S01_ArcticStorm=Type d'Objet : Refroidisseur\nFabricant : Lightning Power Ltd.\nTaille : 1\nGrade : C\nClasse : Civile\n\nSi vous recherchez un refroidisseur qui allie performances, durabilité et discrétion, alors tournez-vous vers l'ArcticStorm. Ce refroidisseur de qualité intermédiaire de Lightning Power Ltd utilise leur technologie séculaire pour fournir des performances fiables.\n\n--- STATS ---\nCooling Rate: 26 CR/s\nPower Draw: 2 PU/s\nComponent HP: 130\nSignatures:  EM: 750  |  IR: 4,000\nOverheat Temp: 600K
item_DescCOOL_LPLT_S01_BlastChill=Type d'Objet : Refroidisseur\nFabricant : Lightning Power Ltd.\nTaille : 1\nGrade : D\nClasse : Civile\n\nLe BlastChill est un refroidisseur grand public de Lightning Power Ltd. Il permet à votre vaisseau de fonctionner sans surcharger sa signature énergétique, mais est surtout connu pour une campagne publicitaire moquée en 2945 qui promettait qu'il était "Conçu pour apporter la fraîcheur".\n\n--- STATS ---\nCooling Rate: 23 CR/s\nPower Draw: 2 PU/s\nComponent HP: 110\nSignatures:  EM: 750  |  IR: 3,630\nOverheat Temp: 545K
