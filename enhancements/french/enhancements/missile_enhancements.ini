item_DescMISL_S03_CS_FSKI_Arrester=Fabricant : Firestorm Kinetics\nSignal de Ciblage : Surface Équivalente Radar\nTaille : 3\n\nLe missile de proximité Firestorm Arrester utilise l'écholocalisation pour chasser sa proie et se débarrasser rapidement des ennemis qui se trouvent dans son champ de vision.\n\n--- STATS ---\nLifetime: 35.00s\nLock Range: 1.9 km – 25.0 km\nArm Time: 1.5s  |  Arm Dist: 1.3 km  |  Min Detonate: 5 m\nDamage: 3,200.0 (Phys)\nBlast Radius: 5 m\nComponent HP: 25
item_DescMISL_S03_EM_FSKI_Thunderbolt=Fabricant : Firestorm Kinetics\nSignal de Ciblage : Electromagnétique \nTaille : 3\n\nGrâce à la structure agile du Firestorm Thunderbolt et à son système de ciblage EM, ce missile de proximité constitue un choix solide pour une grande variété de scénarios de combat.\n\n--- STATS ---\nLifetime: 35.00s\nLock Range: 1.9 km – 25.0 km\nArm Time: 1.5s  |  Arm Dist: 1.3 km  |  Min Detonate: 5 m\nDamage: 2,900.0 (Phys)\nBlast Radius: 5 m\nComponent HP: 25
item_DescMISL_S03_IR_NOVP_Viper=Fabricant : Nova Pyrotechnica\nSignal de Ciblage : Infrarouge\nTaille : 3\n\nNova a travaillé dur pour s'assurer que son missile de frappe Viper à poursuite infrarouge porte bien son nom en menant des attaques agiles et meurtrières contre des cibles hostiles.\n\n--- STATS ---\nLifetime: 35.00s\nLock Range: 1.9 km – 25.0 km\nArm Time: 1.5s  |  Arm Dist: 1.3 km  |  Min Detonate: 5 m\nDamage: 2,650.0 (Phys)\nBlast Radius: 6 m\nComponent HP: 25
item_DescMISL_S03_IR_VNCL_Chaos=Fabricant : Vanduul\nSignal de Ciblage : Infrarouge\nTaille : 3\n\nLes instructeurs de vol Navals inclus souvent le missile thermoguidé Chaos dans les simulations d'attaques Vanduul, indiquant que sa vitesse et sa puissance impose le respect des cadets face à l'ennemi qu'ils affronteront.\n\n--- STATS ---\nLifetime: 35.00s\nLock Range: 1.9 km – 25.0 km\nArm Time: 1.5s  |  Arm Dist: 1.3 km  |  Min Detonate: 5 m\nDamage: 2,500.0 (Phys)\nBlast Radius: 6 m\nComponent HP: 25
item_DescMISL_S04_CS_TALN_Assailant=Fabricant : Talon\nSignal de Ciblage : Surface Équivalente Radar\nTaille : 4\n\nLe missile Assailant de Talon est une solution d'armement parfaite pour des frappes de précision contre des adversaires motivés.\n\n--- STATS ---\nLifetime: 45.00s\nLock Range: 2.0 km – 25.0 km\nArm Time: 1.5s  |  Arm Dist: 1.0 km  |  Min Detonate: 5 m\nDamage: 6,500.0 (Phys)\nBlast Radius: 9 m\nComponent HP: 25
item_DescMISL_S04_EM_TALN_Raptor=Fabricant : Talon\nSignal de Ciblage : Electromagnétique\nTaille : 4\n\nGrâce à un suivi électromagnétique avancé et à un vol de précision équilibré, le missile d'attaque Talon Raptor constitue un ajout redoutable à l'arsenal de n'importe quel vaisseau.\n\n--- STATS ---\nLifetime: 45.00s\nLock Range: 2.0 km – 25.0 km\nArm Time: 1.5s  |  Arm Dist: 1.0 km  |  Min Detonate: 5 m\nDamage: 5,750.0 (Phys)\nBlast Radius: 9 m\nComponent HP: 25
item_DescMISL_S04_IR_BEHR_Pathfinder=Fabricant : Behring\nSignal de Ciblage : Infrarouge\nTaille : 4\n\nLe missile de proximité Pathfinder est un membre constant de l'arsenal déjà robuste de Behring grâce à son système de propulsion éprouvé et à son dispositif de guidage à recherche de chaleur.\n\n--- STATS ---\nLifetime: 45.00s\nLock Range: 2.0 km – 25.0 km\nArm Time: 1.5s  |  Arm Dist: 1.0 km  |  Min Detonate: 5 m\nDamage: 5,300.0 (Phys)\nBlast Radius: 7 m\nComponent HP: 25
item_DescMISL_S04_IR_VNCL_Dragon=Fabricant : Vanduul\nSignal de Ciblage : Infrarouge\nTaille : 4\n\nSurnommé le Dragon, ce missile à guidage infrarouge Vanduul a une réputation effrayante gagnée suite au nombre de vaisseaux Navals abattus par sa puissance destructrice.\n\n--- STATS ---\nLifetime: 45.00s\nLock Range: 2.0 km – 25.0 km\nArm Time: 1.5s  |  Arm Dist: 1.0 km  |  Min Detonate: 5 m\nDamage: 5,000.0 (Phys)\nBlast Radius: 8 m\nComponent HP: 25
