item_DescMISL_S02_IR_NOVP_Rattler=Fabricant : Nova Polytechnica\nGuidage : Infrarouge\nSize: 2\n\nLe Rattler est un missile à sous-munitions économique qui plaira sans aucun doute à une large variété de pilotes. Lorsqu'il est tiré, le Rattler suit la signature infrarouge de sa cible puis lance ces sous-munitions pour affaiblir le blindage ou les boucliers, laissant la cible vulnérable à la charge utile complète qui suit.\n\n--- STATS ---\nLifetime: 10.00s\nLock Range: 1.8 km – 5.0 km\nArm Time: 1.2s  |  Arm Dist: 1.3 km  |  Min Detonate: 5 m\nDamage: 1,370.0 (Phys)\nBlast Radius: 4 m\nComponent HP: 25
