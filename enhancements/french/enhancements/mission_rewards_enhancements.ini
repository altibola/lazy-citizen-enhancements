FTL_Courier_Stanton_Medium_Desc_001=CONTRAT FTL DISPONIBLE\nPOUR AFFECTATION IMMÉDIATE\n\n**DÉTAILS DU CONTRAT**\nNous recherchons un coursier junior pour effectuer des livraisons dans le Système Stanton.\nLe transport doit être assuré par le coursier.\nVous devrez <EM4>soulever des charges pouvant atteindre 0,25 SCU</EM4>.\nLes coursiers sont responsables de la manutention correcte et de l'intégrité de tous les colis qui leur sont confiés.\n\n~mission(Contractor|SignOff)\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S0-B] Defiant\n- [IND-S1-B] Colossus\n- [IND-S2-B] Huracan\n- [IND-S2-B] Sedulity\n- [IND-S3-B] Agni\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
