shubin_claimsweep_desc_easy=AFFECTATION : Sécurité / Mercenaire \nLIEU : ~mission(LagrangeLocation)\nEXPÉRIENCE DEMANDÉE : Pilote de Combat (l'Expérience Militaire est Un Plus)\nCONDITIONS* : \nNous venons d'apprendre qu'un prestataire de Shubin a été chassé d'une de nos concessions par des hors-la-loi qui opèrent là illégalement. Pour compliquer encore les choses, ils ont installé quelques sentinelles orbitales pour se protéger pendant leurs opérations minières. \n\nNotre espoir est de conclure un contrat avec un mercenaire qui pourra rechercher et détruire les sentinelles à ~mission(location). Si vous rencontrez un mineur illégal sur le site, sachez qu'il est courant que ces types contactent des renforts pour obtenir de l'aide. Il serait peut-être préférable de les neutraliser le plus rapidement possible avant qu'ils ne puissent le faire. \n\n\n\n\n*Shubin Interstellar est un entrepreneur garantissant l'égalité des chances. En acceptant ce contrat, vous assumez tous les risques associés aux travaux décrits dans le présent document et Shubin Interstellar ne peut en aucun cas être tenu responsable des dommages survenus pendant la durée du contrat.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x3, Prospectors x1\n<EM4>Turrets:</EM4> 1 (hostile)
shubin_claimsweep_desc_hard=AFFECTATION : Sécurité / Mercenaire \nLIEU : ~mission(LagrangeLocation)\nEXPÉRIENCE DEMANDÉE : Pilote de Combat (l'Expérience Militaire est Un Plus)\nCONDITIONS* : \nUne équipe minière indépendante locale de Stanton travaillait à ~mission(Location) en tant que prestataires de Shubin Interstellar lorsqu'une force hostile a attaqué et pris le contrôle du site. Nous pensons que les auteurs sont toujours sur place et utilisent l'équipement laissé derrière eux pour récolter eux-mêmes le précieux minerai.\n\nParmi les équipements perdus se trouvaient une poignée de sentinelles orbitales qui n'étaient malheureusement pas encore entièrement déployées au moment de l'attaque. Des analyses à longue portée de la revendication nous ont amenés à conclure que les hors-la-loi ont activé les sentinelles orbitales et les utilisent pour protéger leurs opérations illégales.\n\nPour récupérer le site, nous recherchons des prestataires pour se rendre à ~mission(Location), détruisez les sentinelles orbitales et débarrassez le site des mineurs hostiles. L’efficacité est fortement recommandée car il existe un risque élevé qu’ils appellent des renforts une fois qu’ils découvrent qu’ils sont expulsés. \n\n\n\n\n*Shubin Interstellar est un entrepreneur garantissant l'égalité des chances. En acceptant ce contrat, vous assumez tous les risques associés aux travaux décrits dans le présent document et Shubin Interstellar ne peut en aucun cas être tenu responsable des dommages survenus pendant la durée du contrat.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x5, Prospectors x4\n<EM4>Turrets:</EM4> 4 (hostile)
shubin_claimsweep_desc_intro=AFFECTATION : Sécurité / Mercenaire \nLIEU : ~mission(LagrangeLocation)\nEXPÉRIENCE DEMANDÉE : Pilote de Combat (l'Expérience Militaire est un Plus)\nCONDITIONS* : \nIl a récemment été découvert qu'une concession minière de Shubin a été illégalement exploitée par un mineur indépendant. Bien que le mineur ne semble plus voler de minerai sur le site, il a laissé derrière lui une sentinelle orbitale qui nous empêche de le récupérer en raison de ses capacités offensives.\n\nNous recherchons un mercenaire prêt à se rendre à ~mission(location) à traquer la sentinelle et à la détruire en préparation à la reprise du site par Shubin.\n\n\n\n\n*Shubin Interstellar est un employeur qui promeut l'égalité des chances. En acceptant ce contrat, vous acceptez de prendre tous les risques associés aux tâches décrites ici, et Shubin Interstellar ne peut en aucun cas être tenu responsable des éventuels dommages survenant pendant la durée du contrat.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Turrets:</EM4> 1 (hostile)
shubin_claimsweep_desc_med=AFFECTATION : Sécurité / Mercenaire \nLIEU : ~mission(LagrangeLocation)\nEXPÉRIENCE DEMANDÉE : Pilote de combat (l'Expérience militaire est un plus)\nCONDITIONS* : \nUne concession minière récemment acquise par Shubin Interstellar en attente de traitement a été découverte comme ayant été usurpée par une équipe minière clandestine qui vole activement le minerai du site. Bien que les autorités locales aient été informées, il y a des inquiétudes que des actifs précieux puissent être récoltés avant qu'une enquête officielle puisse être lancée.\n\nAinsi, en tant que propriétaires de la concession, nous cherchons à engager une équipe de mercenaires pour se rendre à ~mission(Location) et détruire les nombreuses sentinelles orbitales qui protègent cette opération illégale. Nous recommandons la prudence, car il peut encore y avoir quelques mineurs illégaux sur place, ainsi que toutes les renforts qu'ils pourraient rassembler.\n\n\n\n\n*Shubin Interstellar est un employeur qui promeut l'égalité des chances. En acceptant ce contrat, vous acceptez de prendre tous les risques associés aux tâches décrites ici, et Shubin Interstellar ne peut en aucun cas être tenu responsable des éventuels dommages survenant pendant la durée du contrat.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x4, Prospectors x2\n<EM4>Turrets:</EM4> 3 (hostile)
shubin_claimsweep_desc_rand=AFFECTATION : Sécurité / Mercenaire \nLIEU : ~mission(LagrangeLocation)\nEXPÉRIENCE DEMANDÉE : Pilote de Combat (l'Expérience Militaire est Un Plus)\nCONDITIONS* : \nLors d'une enquête sur les concessions de Shubin dans le secteur, nous avons été découragés d'apprendre qu'une petite équipe des hors-la-loi se sont installés à ~mission(Location) et ont récolté illégalement des ressources. Pire encore, ils ont établi un périmètre défensif avec plusieurs sentinelles orbitales disséminées autour du site rendant difficile leur expulsion. \n\nAfin de pouvoir reprendre possession du site de concession, nous recherchons des prestataires mercenaires pour trouver et détruire quelques sentinelles orbitales. Ce qui rend la tâche encore plus difficile est que nous ne savons pas exactement quelle est la force de combat exacte de ces mineurs hors-la-loi. S’ils ont la possibilité d’invoquer des renforts, il faut s’attendre à n’importe quoi, depuis une petite contingence jusqu’à une escouade complète de combattants entraînés. \n\n\n\n\n*Shubin Interstellar est un entrepreneur garantissant l'égalité des chances. En acceptant ce contrat, vous assumez tous les risques associés aux travaux décrits dans le présent document et Shubin Interstellar ne peut en aucun cas être tenu responsable des dommages survenus pendant la durée du contrat.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x32, Prospectors x5\n<EM4>Turrets:</EM4> 4 (hostile)
shubin_rockcracker_pvp_desc_01=CONTRAT : Transfert de droits miniers\nLIEU : Nyx\n\nDÉTAILS :\nLes prospecteurs de Shubin Interstellar ont récemment découvert l'emplacement d'une station Breaker abandonnée de QV Planet Service près de la ceinture de Keeger. Exploitées à l'origine par cette société aujourd'hui disparue pour extraire des ressources précieuses de l'intérieur des astéroïdes, l'emplacement exact de ces stations s'était perdu au fil des ans. \n\n Bien que cette station soit actuellement hors service, nos éclaireurs estime qu'elle pourrait être remise en état de marche grâce à quelques réparations. De plus, si elle était réactivée, un astéroïde riche en ressources se trouve déjà à proximité, prêt à être fracturé par le laser minier de la station. \n\nMalheureusement, compte tenu des nombreux défis liés à l'exploitation dans Nyx, Shubin ne dispose pas actuellement des ressources nécessaires pour effectuer lesdites réparations par ses propres moyens. Cela crée toutefois une opportunité pour une opération minière indépendante telle que la vôtre.\n\n<EM4>CONDITIONS* :</EM4>\nNous mettons à disposition les <EM4>droits miniers partagés</EM4> de cette station QV Breaker. Une fois l'achat effectué, nous vous fournirons, à vous et à votre équipage, les coordonnées de la station. (N'oubliez pas que toute autre partie intéressée ayant acheté les droits miniers aura également accès à la station.) Votre équipe sera alors libre de s'y rendre avec un <EM4>vaisseau de minage</EM4>, de remettre le <EM4>laser minier de la station</EM4> en état de marche, de fracturer l'astéroïde et de <EM4>récolter les ressources</EM4> qu'il contient.\n\nVeuillez noter que, s'agissant d'un contrat partagé, nous sommes en mesure de proposer ces droits miniers à prix réduit, mais les ressources de l'astéroïde seront disponibles selon le principe du <EM4>premier arrivé, premier servi</EM4> avec toutes les autres équipes minières présentes sur le site. De plus, il est possible que d'autres parties intéressées, telles que des hors-la-loi, découvrent par elles-mêmes l'emplacement de la station. Soyez prudent. \n\n*En acceptant ce contrat, vous assumez tous les risques associés aux travaux décrits dans le présent document et Shubin Interstellar ne peut en aucun cas être tenu responsable des dommages survenus pendant la durée du contrat.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 "Kismet" Shotgun\n- R97 "Righteous" Shotgun\n- [S1-A] Monde Arms Delta Camo\n- [S1-A] Monde Arms Hemlock Camo\n- [S1-A] Monde Core Delta Camo\n- [S1-A] Monde Core Hemlock Camo\n- [S1-A] Monde Helmet Delta Camo\n- [S1-A] Monde Helmet Hemlock Camo\n- [S1-A] Monde Legs Delta Camo\n- [S1-A] Monde Legs Hemlock Camo\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Blueprint Reward:</EM4> Guaranteed
