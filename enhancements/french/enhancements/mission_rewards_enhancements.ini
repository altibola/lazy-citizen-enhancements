DeadSaints_HaulCargo_AToB_desc_Cryopods_Danger=J'ai quelque chose d'intéressant. Certaines personnes qui ont été piégées dans des contrats de vie/travail avec Hurston Dynamics veulent s'éloigner autant que possible de Lorville. Elles ont conclu un accord avec un passeur et se sont fait congeler. Elles ont maintenant besoin de quelqu'un pour venir les chercher et les emmener. \n\nSi vous êtes partant pour faire un peu de contrebande de glaces, vous trouverez ~mission(total) cryopods à <EM4>~mission(Location|Address)</EM4> qui doivent être transportés à <EM4>~mission(Destination|Address)</EM4>. Assurez-vous d'avoir suffisamment d'espace dans votre soute pour des conteneurs de taille <EM4>~mission(MissionMaxSCUSize)</EM4>. Si vous utilisez un <EM4>rayon tracteur portable</EM4>, vous devriez pouvoir tout charger avant que la sécurité de Hurston ne s'en aperçoive. \n\nHD n'apprécie pas beaucoup que l'on se dérobe à ses contrats, alors faites attention. Ils tirent pour tuer. \n\nSi vous réussissez, vous toucherez un joli pactole.\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x6\n<EM4>Rookie:</EM4> +100 Rep
DeadSaints_HaulCargo_AToB_desc_ToGrimHEX_Danger=Si vous cherchez à gagner des crédits, les Saints ont besoin de quelqu'un ayant de l'expérience dans le transport pour effectuer une livraison de ravitaillement de <EM4>~mission(Location|Address)</EM4> à <EM4>~mission(Destination|Address)</EM4>. \n\nVous aurez besoin d'un vaisseau pouvant transporter des <EM4>conteneurs de taille ~mission(MissionMaxSCUSize)</EM4> et d'un <EM4>rayon tracteur portable</EM4> pour déplacer les caisses. \n\nN'ouvrez pas les caisses, sachez que la plupart de ces marchandises sont légales, mais pas toutes. Évitez de croiser quelqu'un qui pourrait vous causer des problèmes. Compris ?\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x1\n<EM4>Rookie:</EM4> +100 Rep
DeadSaints_HaulCargo_AToB_intro_desc=Appelez-moi Twitch. Je dirige les Dead Saints. \n\nJe doute que ce soit la première fois que vous entendez parler de nous, mais si c'est le cas, sachez que nous faisons beaucoup de choses, dont le transport de marchandises qui nécessitent une certaine discrétion. \n\nJ'ai obtenu vos coordonnées par l'un de mes contacts. Il m'a dit que vous aviez ce qu'il nous fallait dans votre cargo, ce qui m'arrange bien, car nous en cherchons un. \n\nVoici ma proposition : nous offrons des crédits au pilote qui pourra transporter une cargaison spéciale pour nous. La soute de votre vaisseau devra pouvoir accueillir des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>, et vous aurez besoin d'un <EM4>rayon tracteur portable</EM4> pour le chargement et le déchargement. Tout ce que vous avez à faire, c'est d'acheminer tout le contenu de <EM4>~mission(Location|Address)</EM4> à <EM4>~mission(Destination|Address)</EM4> sans alerter la sécurité. \n \nSi vous réussissez cette mission, les Saints vous proposeront d'autres contrats à l'avenir. \n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x38\n<EM4>Trainee:</EM4> +50 Rep\n<EM4>Trainee:</EM4> +100 Rep
DeadSaints_HaulCargo_AToB_intro_title=DEAD SAINTS - Essai de Transport de Fret <EM4>[50–100 Rep]</EM4>
DeadSaints_HaulCargo_AToB_title=DEAD SAINTS - ~mission(ReputationRank), Transport de Fret à Grande Échelle ~mission(CargoGradeToken) <EM4>[100 Rep]</EM4>
DeadSaints_HaulCargo_MultiToSingle_desc_Drugs_Danger=L'un de nos meilleurs distributeurs s'est fait arrêter à Stanton, nous avons donc besoin d'un remplaçant. Ce type était un vendeur incroyable, mais un contrebandier minable. Nous avons besoin de quelqu'un qui ne se fera pas prendre par une patrouille de sécurité ou une bande de pirates pour récupérer de la marchandise à ces endroits :\n\nLIEUX D'ENLÈVEMENT (DANS N'IMPORTE QUEL ORDRE) \n\n~mission(MultiToSingleToken)\n\nEt apportez le tout à <EM4>~mission(Destination|Address)</EM4> avant que la sécurité ne se rende compte de la situation. Vous aurez besoin d'assez d'espace sur votre vaisseau pour des conteneurs de taille <EM4>~mission(MissionMaxSCUSize)</EM4>, et un <EM4>rayon tracteur portatif</EM4> devrait faciliter le chargement et le déchargement. \n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x6\n<EM4>Rookie:</EM4> +100 Rep
DeadSaints_HaulCargo_MultiToSingle_title=DEAD SAINTS - ~mission(ReputationRank) - Transport de fret ~mission(CargoGradeToken) <EM4>[100 Rep]</EM4>
DeadSaints_HaulCargo_SingleToMulti_desc_Altruciatoxin_Danger_Timed=Nous recherchons une personne discrète pour livrer un nouveau lot d'altruciatoxine à plusieurs acheteurs. Oui, c'est illégal, mais seulement si vous vous faites prendre.\n\nLa cargaison se trouve à <EM4>~mission(Location|Address)</EM4>. Vous devrez la livrer aux points de dépôt suivants :\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n\n~mission(SingleToMultiToken)\n\nAssurez-vous que votre vaisseau peut transporter des conteneurs de taille <EM4>~mission(MissionMaxSCUSize)</EM4>, et n'oubliez pas de prendre un <EM4>rayon tracteur portatif</EM4>. Sinon, je ne vois pas comment vous comptez transporter les caisses.\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x12\n<EM4>Rookie:</EM4> +100 Rep
DeadSaints_HaulCargo_SingleToMulti_desc_Drugs_Danger_Timed=Nous avons une cargaison de contrebande qui doit être transportée à plusieurs endroits différents. Si vous aimez les crédits, rendez-vous à <EM4>~mission(Location|Address)</EM4>, chargez tout et apportez-le à ces points de livraison :  \n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n\n~mission(SingleToMultiToken)\n\nVous aurez besoin d'un <EM4>rayon tracteur portatif</EM4> pour déplacer les caisses et d'un espace suffisant dans votre soute pour des conteneurs de taille <EM4>~mission(MissionMaxSCUSize)</EM4>. \n\nÉvitez les autres vaisseaux si possible. La sécurité vous arrêtera si elle découvre ce que vous transportez, et les pillards s'en empareront. \n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x6\n<EM4>Rookie:</EM4> +100 Rep
DeadSaints_HaulCargo_SingleToMulti_desc_Stormwal_Danger_Timed=Si vous disposez d'un vaisseau rapide, que vous pouvez transporter discrètement des conteneurs de taille <EM4>~mission(MissionMaxSCUSize)</EM4> et que vous aimez l'argent, rendez-vous immédiatement à <EM4>~mission(Location|Address)</EM4> et apportez ce que vous y trouverez à ces points de livraison :\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE) \n\n~mission(SingleToMultiToken)  \n\nLes acheteurs paient un supplément pour mettre la main sur de la viande fraîche de cétacéleste. Restez vigilant. Si la sécurité vous surprend avec ça, vous risquez gros. Si vous êtes malin, vous utiliserez un <EM4>rayon tracteur portatif</EM4> pour tout charger rapidement. \n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x6\n<EM4>Rookie:</EM4> +100 Rep
DeadSaints_HaulCargo_SingleToMulti_title=DEAD SAINTS - ~mission(ReputationRank) - Transport de Fret ~mission(CargoGradeToken) <EM4>[100 Rep]</EM4>
DeadSaints_RecoverCargo_Easy_Description=Vous savez, quand vous posez une question à quelqu'un et que vous avez l'impression qu'il ment, mais que vous choisissez de lui accorder le bénéfice du doute ? Oui. C'est exactement ce qui m'arrive en ce moment. \n\nDeux transporteurs “experts“ que j'avais engagés pour transporter du matériel ont eu des problèmes et ont fini par abandonner mes marchandises à <EM4>~mission(Location|Address)</EM4>. Inutile de dire que j'ai ordonné leur assassinat, mais j'ai besoin que vous alliez récupérer cette cargaison. Le traceur indique que la cargaison est toujours à bord du vaisseau, vous aurez donc juste besoin d'un <EM4>puissant rayon tracteur</EM4> et de votre propre vaisseau pour la récupérer. n\nVous risquez de croiser quelques pillards qui rôdent dans les parages, mais je doute que vous ayez des problèmes avec eux.\n\nUne fois que vous aurez terminé, apportez le matériel à <EM4>~mission(Destination|Address)</EM4> et je vous donnerai votre récompense.\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Unknown:</EM4> 1\n<EM4>Jr. Contractor:</EM4> +100 Rep
DeadSaints_RecoverCargo_Easy_Title=Ramassage des Pots Cassés de Quelqu'un d'Autre <EM4>[100 Rep]</EM4>
DeadSaints_RecoverCargo_Hard_Description=Des nouveaux venus ont attaqué mon équipe de transport alors qu'elle effectuait une livraison. Notre traceur nous indique que notre vaisseau se trouve toujours à <EM4>~mission(Location|Address)</EM4>, je vous demande donc de vous y rendre pour récupérer la cargaison. Vous aurez besoin d'un <EM4>puissant rayon tracteur</EM4> pour transporter les marchandises depuis le vaisseau.\n\nJe parierais que ceux qui nous ont attaqués sont toujours là, à attendre. Armez-vous, emmenez votre équipe et, si vous le pouvez, donnez-leur une leçon de ma part.\n\nUne fois que vous aurez récupéré nos marchandises, déposez-les au Monte-charge situé à <EM4>~mission(Destination|Address)</EM4>. -Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Unknown:</EM4> 1\n<EM4>Sr. Contractor:</EM4> +200 Rep
DeadSaints_RecoverCargo_Hard_Title=Récupération de Notre Marchandise <EM4>[200 Rep]</EM4>
DeadSaints_RecoverCargo_Medium_Description=Vous avez un vaisseau et <EM4>un puissant rayon tracteur</EM4> ? Parfait. J'ai du travail pour vous. \n\nJe ne sais pas comment ils ont su que nous arrivions, mais l'un de mes transporteurs a été attaqué à <EM4>~mission(Location|Address)</EM4>. Le pilote ne répond plus, je suppose donc qu'il a été éliminé, mais le traceur de cargaison reste immobile pour l'instant. n\nAttendez-vous à ce que les salauds qui ont éliminé mon pilote soient toujours dans les parages, alors venez avec des renforts. Récupérez la cargaison et partez, pas besoin de risquer d'autres bons transporteurs dans ce bordel. \n\nApportez les marchandises au Monte-charge à <EM4>~mission(Destination|Address)</EM4> et je vous enverrai votre paiement. \n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Unknown:</EM4> 1\n<EM4>Contractor:</EM4> +150 Rep
DeadSaints_RecoverCargo_Medium_Title=Operation de Recuperation <EM4>[150 Rep]</EM4>
DeadSaints_RecoverCargo_Super_Description=Une équipe rivale a réussi à mettre la main sur nos itinéraires de livraison et maintenant, l'un de mes cargos est bloqué à <EM4>~mission(Location|Address)</EM4>. \n\nLe vaisseau est désormais surveillé par toute une équipe de ces salauds. Ils doivent attendre que quelqu'un arrive avec un vaisseau de transport, mais vous allez les devancer.\n\nRendez-vous sur place avec votre propre équipage et un <EM4>puissant rayon tracteur</EM4> pour récupérer la marchandise. Assurez-vous d'envoyer vos meilleurs éléments. Ce serait une erreur de sous-estimer ces salauds.\n\nFaites-les disparaître et ramenez ma cargaison au Monte-charge à <EM4>~mission(Destination|Address)</EM4> et je m'assurerai que vous soyez sérieusement récompensé pour cela.\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Unknown:</EM4> 1\n<EM4>Head Contractor:</EM4> +300 Rep
DeadSaints_RecoverCargo_Super_Title=Perdu Mais Pas Disparu <EM4>[300 Rep]</EM4>
DeadSaints_RecoverCargo_VeryEasy_Description=L'un de mes transporteurs a rencontré des problèmes à <EM4>~mission(Location|Address)</EM4> et a été contraint d'abandonner son vaisseau. J'ai besoin que quelqu'un se rende sur place avec <EM4>un puissant rayon tracteur</EM4> pour récupérer la cargaison et terminer le travail. \n\nIls transportaient une quantité importante de matériel pour moi, et la dernière chose dont j'ai besoin, c'est qu'un bienfaiteur tombe dessus et remonte jusqu'à nous. \n\nSi vous croisez quelqu'un, pas besoin d'être aimable. Tirez simplement sur le connard et récupérez mon matériel. Compris ?\n\nApportez-le au Monte-charge situé à <EM4>~mission(Destination|Address)</EM4> et je m'assurerai que vous touchiez une part des bénéfices.\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2\n<EM4>Unknown:</EM4> 1\n<EM4>Neutral:</EM4> +50 Rep
DeadSaints_RecoverCargo_VeryEasy_Title=Achèvement Du Travail <EM4>[50–200 Rep]</EM4>
DeadSaints_RecoverCargo_VeryHard_Description=Nous avons un problème. Un gang inconnu tente de se faire un nom en s'attaquant à nos vaisseaux de transport. Ils pensent pouvoir montrer leur force en pillant nos transporteurs et en se comportant comme des caïds. Des amateurs.\n\nNotre pilote s'en est sorti de justesse, mais leur vaisseau est toujours là, rempli de provisions, à <EM4>~mission(Location|Address)</EM4>. Prenez une équipe en qui vous avez confiance, votre <EM4>puissant rayon tracteur</EM4> et allez-y.\n\nEnsuite, déposez le matériel au Monte-charge à <EM4>~mission(Destination|Address)</EM4>. Si vous faites ça pour moi, je vous donnerai une bonne part des bénéfices. \n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Unknown:</EM4> 1\n<EM4>Veteran Contractor:</EM4> +200 Rep
DynamicEvent_FleetWeek2022_Description=*TRANSMISSION PRIORITAIRE À DESTINATION DU SYSTÈME ENTIER*\n\nAttention, les forces Nine Tails ont pris le contrôle de plusieurs plateformes commerciales à proximité d'Orison. En utilisant un Inverseur d'Identification Allié/Ennemi (IFFI) ,Ils sont parvenus a prendre possession de l'espace aérien restreint autour des plateformes et seul les vaisseaux Nine Tails peuvent accéder à la zone. Cela a particulièrement perturber les premières tentatives de reprise de contrôle des plateformes par la Sécurité de Crusader. En conséquence, Crusader a demandé l'assistance de la FDC afin de désactiver l'inverseur et d’éliminer toute présence hostile. Tout les volontaires de la FDC sont encouragés a fournir leur aide.\n\nInformation supplémentaire :\n*Bien que l'inverseur soit actif et que l'espace aérien reste inaccessible, la FDC a réussi a reprendre le contrôle du réseau de navette local et à le diriger vers la plateforme Solanki, sans que les Nine Tails s'en rendent compte. Les volontaires devront se rendre au Showroom de Crusader Industries sur la Plateformes Commerciale, aller sur le toit et prendre la navette qui les mènera aux plateformes capturées.\n*L'IFFI est censé se trouver dans un conteneur de stockage verrouillé sur une barge de fret amarrée au Centre Administratif Principal. *Les codes d’accès du conteneur de l'IFFI sont en possession du Chef des forces Nine Tails, Mendo Ren.\n*De précédentes rencontres avec Mendo Ren indiquent qu'il a peu de chance d’être en première ligne ou de prendre le risque d’être capturer. Cependant, si tout ses lieutenants sont neutralisés, nous pensons qu'il n'aura d'autre choix que de prendre le commandement direct de ses forces, nous laissant l'opportunité de récupérer les codes sur lui.\n* En plus du réseau de navette, la Sécurité de Crusader nous a informé que plusieurs véhicules sont disponible à l'utilisation par la FDC. Ces véhicules seront le seul moyen d'atteindre le Centre Administratif Principal. NOTE - Si tout les véhicules de la zone sont détruit avant que l'inverseur soit désactivé, alors il n'y aura aucun moyen de rejoindre la barge de fret et la FDC sera forcé de se replier\n.* Les plateformes sont protégées par des DCA contrôlées par les Nine Tails.\n\nSoyez conscient que la SAIC Rowena Dulli de l'Advocacy est l'attaché officiel de la FDC et sera en charge de toute l'opération.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Unknown:</EM4> 54
EckhartSecurity_Defend_E_Desc_001=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Défense du Site\nCODE D'APPROBATION = ~mission(ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\nUn client a intercepté des communications entre les membres d'un gang et découvert qu'ils préparaient une attaque contre <EM4>~mission(Location|Address)</EM4>. Ils ont maintenant besoin de notre aide pour s'assurer que l'attaque ne réussisse pas.   \n\nNous recherchons un prestataire capable de défendre le site contre cette offensive. Je n'ai pas de détails sur ces hors-la-loi, mais je doute qu'ils soient si compétents que ça si notre client a pu pirater leurs communications aussi facilement. \n\nLe paiement sera effectué à l'achèvement du contrat.\n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Boss x1, Hostiles x10, Private Security x4, Sentries x6\n<EM4>Unknown:</EM4> 11\n<EM4>Security Trainee:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -1,000 Rep
EckhartSecurity_Defend_E_Title_001=Sécuriser un Site <EM4>[500 Rep]</EM4>
EckhartSecurity_Defend_H_Desc_001=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Défense de Site\nCODE D'APPROBATION = ~mission(ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\nUn problème sérieux se profile pour l'un de nos clients à <EM4>~mission(Location|Address)</EM4>. Il a été prévenu qu'une équipe de hors-la-loi hautement qualifiée avait l'intention d'envahir et d'occuper ce site. Nous avons été engagés pour veiller à ce que cela ne se produise pas. \n\nIl nous faut un prestataire pour se déployer sur place immédiatement. D'après les informations fournies par le client, ce ne sera pas une promenade de santé. Nous vous conseillons fortement d'amener des alliés et de nombreuses fournitures pour aider à contrer l'attaque imminente.   \n\nLe paiement sera effectué à l'achèvement du contrat.\n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 3/7 | Risk 6/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Boss x3, Hostiles x8, Private Security x4, Sentries x4\n<EM4>Unknown:</EM4> 21\n<EM4>Lead Security Contractor:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -4,000 Rep
EckhartSecurity_Defend_H_Title_001=Repousser les Pirates <EM4>[500 Rep]</EM4>
EckhartSecurity_Defend_M_Desc_001=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Défense de Site\nCODE D'APPROBATION = ~mission(ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\nNous avons appris que des hors-la-loi avaient l'intention d'attaquer <EM4>~mission(Location|Address)</EM4>. Notre client craint que l'attaque soit imminente et a demandé que la sécurité soit déployée sur le site immédiatement. Si vous êtes intéressé et disponible, rassemblez toutes les fournitures et le soutien dont vous pourriez avoir besoin et rendez-vous sur place illico presto.  \n\nLe paiement sera effectué à l'achèvement du contrat.\n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x12, Private Security x4, Sentries x8\n<EM4>Unknown:</EM4> 10\n<EM4>Security Contractor:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -2,000 Rep
