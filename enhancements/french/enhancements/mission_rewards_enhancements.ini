mtps_UGF_destroy_desc_001=À PROPOS DE LA MISSION\nLes services de protection de microTech sont à la recherche d'un mercenaire ou d'un professionnel de la sécurité méticuleux pour se rendre à ~mission(Location|Address) et détruire les stupéfiants qui y sont stockés.\n\nRESPONSABILITÉS\n• Assurer son propre transport jusqu'à ~mission(Location|Address).\n• Débarrasser le site des stupéfiants en utilisant la force si nécessaire.\n\nQUALIFICATIONS MINIMALES\n• 2 ans d'expérience combinée en tant que mercenaire et/ou dans la sécurité.\n• Accès à un équipement de combat et à un moyen de transport.\n• Disponible pour un déploiement immédiat.\n\nQUALIFICATIONS PRÉFÉRÉES\n• Aucun problème d'addiction en cours.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
