Eckhart_EscortShips_H_desc=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Escorte de Vaisseau\nCode d'approbation : = ~mission(ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\nNous recherchons un prestataire disponible immédiatement. Un client se trouve actuellement en difficulté à <EM4>~mission(Location|Address)</EM4> et a besoin d'une escorte pour s'éloigner d'une base d'astéroïdes. Il a signalé la présence de plusieurs vaisseaux hostiles bien armés, ce qui signifie que vous aurez besoin de votre propre équipage pour les affronter. D'après le récit du client, ces assaillants semblent très motivés et ne reculeront probablement pas facilement.\n\nCe contrat est non négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [B-S1-A] Havoc Scattergun\n- [B-S2-A] Hellion Scattergun\n- [B-S3-A] Predator Scattergun\n- [E-S3-A] Quarreler Cannon\n- [STH-S1-A] Mirage\n- [STH-S2-A] Umbra\n- [D-S1-A] Suckerpunch Cannon\n- [D-S2-A] Suckerpunch-L Cannon\n- [D-S3-A] Suckerpunch-XL Cannon\n- [STH-S1-B] Veil\n- [STH-S2-B] Sheut\n- [E-S1-A] M3A Cannon\n- [E-S2-A] M4A Cannon\n- [E-S3-A] M5A Cannon\n- [STH-S1-C] Shimmer\n- [STH-S2-C] Obscura\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x5, Hostiles x3, Interdiction Ships x2, Reinforcements x16\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
