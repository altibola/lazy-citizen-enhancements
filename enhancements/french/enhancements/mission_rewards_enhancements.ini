FTL_Courier_Stanton_Easy_Desc_001=CONTRAT FTL DISPONIBLE\nPOUR AFFECTATION IMMÉDIATE\n\n**DÉTAILS DU CONTRAT**\nNous recherchons un coursier débutant, fiable et travailleur pour effectuer une livraison dans Stanton.\nVous devrez disposer de votre propre moyen de transport.\nLes prestataires intéressés doivent être <EM4>capables de soulever des caisses pesant jusqu'à 0,25 SCU</EM4>.\nLes prestataires sont engagés à titre indépendant et ne sont donc pas couverts par l'assurance de l'entreprise FTL.\n\n~mission(Contractor|SignOff)\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S0-B] Defiant\n- [IND-S1-B] Colossus\n- [IND-S2-B] Huracan\n- [IND-S2-B] Sedulity\n- [IND-S3-B] Agni\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Neutral:</EM4> +500 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
