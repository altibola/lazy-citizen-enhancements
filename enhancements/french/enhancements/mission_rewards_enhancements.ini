shubin_rockcracker_solo_desc_01=CONTRAT : Transfert de droits miniers\nLIEU : Nyx\n\nDÉTAILS :\nLes prospecteurs de Shubin Interstellar ont récemment découvert l'emplacement d'une station Breaker abandonnée de QV Planet Service près de la ceinture de Keeger. Exploitées à l'origine par cette société aujourd'hui disparue pour extraire des ressources précieuses de l'intérieur des astéroïdes, l'emplacement exact de ces stations s'était perdu au fil des ans. \n\n Bien que cette station soit actuellement hors service, nos éclaireurs estime qu'elle pourrait être remise en état de marche grâce à quelques réparations. De plus, si elle était réactivée, un astéroïde riche en ressources se trouve déjà à proximité, prêt à être fracturé par le laser minier de la station. \n\nMalheureusement, compte tenu des nombreux défis liés à l'exploitation dans Nyx, Shubin ne dispose pas actuellement des ressources nécessaires pour effectuer lesdites réparations par ses propres moyens. Cela crée toutefois une opportunité pour une opération minière indépendante telle que la vôtre.\n\n<EM4>CONDITIONS* :</EM4>\nNous mettons à votre disposition les <EM4>droits miniers exclusifs</EM4> de cette station QV Breaker. Une fois l'achat effectué, nous ne communiquerons les coordonnées de la station qu'à vous et à votre équipage. Votre équipe sera alors libre de s'y rendre avec un <EM4>vaisseau de minage</EM4>, de remettre le <EM4>laser minier de la station</EM4> en état de marche, de fracturer l'astéroïde et d'<EM4>extraire les ressources</EM4> qu'il contient. \n\nVeuillez noter que, bien que nous garantissions que ces coordonnées ne seront connues que de vous, nous ne pouvons pas vous assurer que d'autres parties intéressées, telles que des hors-la-loi, ne découvriront pas l'emplacement de la station par leurs propres moyens. Soyez prudent. \n\n*En acceptant ce contrat, vous assumez tous les risques associés aux travaux décrits dans le présent document et Shubin Interstellar ne peut en aucun cas être tenu responsable des dommages survenus pendant la durée du contrat.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 "Kismet" Shotgun\n- R97 "Righteous" Shotgun\n- [S1-A] Monde Arms Delta Camo\n- [S1-A] Monde Arms Hemlock Camo\n- [S1-A] Monde Core Delta Camo\n- [S1-A] Monde Core Hemlock Camo\n- [S1-A] Monde Helmet Delta Camo\n- [S1-A] Monde Helmet Hemlock Camo\n- [S1-A] Monde Legs Delta Camo\n- [S1-A] Monde Legs Hemlock Camo\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Blueprint Reward:</EM4> Guaranteed
