headhunters_ChainElimAll_1C_AttackCFP_E_desc_001=On m'a dit que la sécurité des CFP était devenue un peu plus agressive et avait commencé à expulser les gens des maisons qu'ils avaient construites avec de la ferraille et qu'ils voulaient se venger, alors ils sont venus nous voir. \n\n Allez à ~mission(Location|Address) et éliminez les CFP qui s'y trouvent.  Ça devrait être assez facile, avec un joli paiement à la clé.\n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x2, Soldiers x5, Technicians x5\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_1C_AttackCFP_E_title_001=Une petite vengeance <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
headhunters_ChainElimAll_1C_AttackXT_M_desc_001=Je viens d'obtenir l'autorisation de mon juge pour commencer à riposter contre XenoThreat. J'ai repéré quelques endroits sous leur contrôle près de ~mission(Location|Address).\n\n Je vous donnerai les cibles à atteindre, vous tuerez tous ceux que vous trouverez. Bon sang, j'adorerais y aller moi-même, ça a l'air amusant.\n\n-Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x2, Soldiers x5, Technicians x5\n<EM4>Sr. Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_1C_AttackXT_M_title_001=Eliminer les ordures XenoThreat <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
headhunters_ChainElimAll_1C_ElimSpec_AttackCFP_M_desc_001=Nous avons essayé de jouer franc jeu avec ces Citizens for Prosperity, mais ils nous ont clairement fait comprendre que nous n'avions pas notre place dans leur 'système de sécurité. Leur utilisation de mercenaires pour la sécurité a provoqué toutes sortes de violences déraisonnables, comme lorsque ce trou du cul de ~mission(TargetName) a ouvert le feu sur un groupe de colons pour les éloigner d'un avant-poste qu'ils convoitaient. Alors maintenant, la guerre est déclarée.\n\nJ'ai besoin de quelques travailleurs acharnés pour aller frapper ~mission(Location|Address) et éliminer ~mission(TargetName|Last). Il y a de fortes chances qu'ils restent cachés jusqu'à ce que vous prouviez que vous représentez une menace suffisante, alors assurez-vous de faire des dégâts.\n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x4, Juggernauts x1, Soldiers x5, Technicians x5\n<EM4>Veteran Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_1C_ElimSpec_AttackCFP_M_title_001=Chasser les CFP <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
headhunters_ChainElimAll_2C_ElimSpec_AttackCFP_H_desc_001=Mon Juge m'a dit que nous devions reprendre certains des avant-postes dont les CFP se sont emparés. Ils sont un peu énervés que les CFP prenne autant pied dans le système qu'eux et pensent que cela fait passer les Headhunters pour des faibles.\n\nJ'ai trouvé quelques candidats près de ~mission(Location|Address) qui auraient besoin d'une bonne leçon. Cerise sur le gâteau, le chef de la sécurité est ~mission(TargetName). Je ne sais pas si vous avez entendu parler d'eux, mais ils ont abattu une poignée de Clips le mois dernier, donc c'est gagnant-gagnant. On récupère un peu de territoire et on frappe quelqu'un qui en a bien besoin.\n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x5, Juggernauts x1, Soldiers x6, Technicians x6\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_2C_ElimSpec_AttackCFP_H_title_001=Nettoyer quelques repaires des CFP <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
headhunters_ChainElimAll_2C_ElimSpec_AttackXT_H_desc_001=Besoin de quelques bons soldats avec un goût prononcé pour la violence pour frapper quelques cachettes XenoThreat situées autour de ~mission(Location|Address). Je vous donnerai les détails si vous êtes d'accord, mais vous devrez détruire deux groupes distincts de cachettes. \n\nNous avons également appris que ~mission(TargetName) rôde dans les environs. Si vous éliminez suffisamment de sacs à merde XenoThreat, ils sortiront la tête de l'eau. \n\nQuand ils le feront, mettez une balle dedans.\n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x4, Juggernauts x1, Soldiers x5, Technicians x6\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_2C_ElimSpec_AttackXT_H_title_001=Prendre le Territoire XenoThreat <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
headhunters_ChainElimAll_3C_ElimSpec_AttackCFP_VH_desc_001=J'en ai un gros ici. Nous avons besoin d'une équipe pour aller à ~mission(Location|Address). La rumeur dit que des CFP sont retranchés dans trois zones différentes dans la région. Notre Juge veut qu'ils soient tous éliminés. Il semblerait qu'un de leurs mercenaires, une vraie crapule nommée ~mission(TargetName), soit retranché dans l'une d'entre elles. Nous voulons que vous alliez là-bas, que vous les nettoyiez tous et que vous éliminiez ~mission(TargetName|Last).\n\nVous gagnerez un bon petit pécule au passage.\n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x6, Juggernauts x1, Soldiers x8, Technicians x8\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_3C_ElimSpec_AttackCFP_VH_title_001=Frapper un Complexe des CFP <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
headhunters_ChainElimAll_3C_ElimSpec_AttackXT_VH_desc_001=J'ai une mission juteuse pour tous les gros bras qui veulent se faire un gros salaire. Sur ~mission(Location|Address), nous avons une zone XenoThreat gérée par un vrai salaud nommé ~mission(TargetName). Si vous êtes dans le système depuis assez longtemps, vous avez probablement entendu parler de ~mission(TargetName|Last) ou au moins vu leur travail. Le Skag a tendance à laisser des corps partout où il va.\n\nQuoi qu'il en soit, le Juge veut que cette zone soit nettoyée, ce qui signifie que vous devez visiter les trois groupes et tuer toutes les saletés de XenoThreat que vous trouverez. Tuez-en assez et ~mission(TargetName|Last) ne pourra plus se cacher. \n\nEliminez-les tous et mettez-nous à l'abri.\n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 6/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x6, Juggernauts x1, Soldiers x10, Technicians x8\n<EM4>Head Contractor:</EM4> +400 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_3C_ElimSpec_AttackXT_VH_title_001=Démanteler un Repaire XenoThreat <EM4>[BP]</EM4> <EM4>[400 Rep]</EM4>
headhunters_ChainElimAll_AttackCFP_E_desc_001=Nous sommes à la recherche d'une personne ayant la gâchette facile. Nous souhaitons attaquer des CFP à ~mission(Location|Address) et à nous approprier le lieu. Il faut la jouer finement par contre. Il y a un tas d'avant-postes satellites autour de la base principale et ils sont tous sécurisés, vous devriez donc vous occuper de chacun d'entre eux avant de prendre la base principale.\n\nMais bon, si vous préférez vous jeter dans la gueule du loup et combattre tous les renforts, c'est à vous de voir. Du moment que c'est fait.\n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 6/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x6, Snipers x4, Soldiers x6, Technicians x4\n<EM4>Head Contractor:</EM4> +400 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_AttackCFP_E_title_001=Il est temps d'agir contre les CFP <EM4>[BP]</EM4> <EM4>[400 Rep]</EM4>
headhunters_ChainElimAll_AttackGen_E_desc_001=Nous recherchons des tueurs à gages pour aller faire régner la violence sur des abrutis du coin qui ont fait travailler des Headhunters dans le système. Nous avons essayé de leur expliquer leur erreur, mais ils ont tué notre messager, alors nous avons choisi l'option B.\n\nVous les trouverez près de ~mission(Location|Address). Allez-y et repeignez les murs avec leur sang. \n\nAmusez-vous bien. \n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 6/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x6, Snipers x4, Soldiers x9, Technicians x4\n<EM4>Elite Contractor:</EM4> +400 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_AttackGen_E_title_001=Sur le sentier de la guerre <EM4>[BP]</EM4> <EM4>[400 Rep]</EM4>
headhunters_ChainElimAll_Boss_XenoThreat_VH_desc_001=Ces connards de XenoThreat sont comme des aloprats. Chaque fois que vous pensez les avoir éliminés, ils réapparaissent. On dirait qu'ils sont revenus à leurs habitudes et qu'ils essaient d'organiser quelque chose de grand. Aucune idée de ce que c'est, mais nous avons été autorisés à l'arrêter avant qu'il ne commence.\n\nUn groupe de gros bonnets XenoThreat est censé se réunir à ~mission(Location|Address) pour planifier ou simplement se déchaîner ou quoi que ce soit qu'ils fassent, mais nous allons tout faire capoter. Ou bien c'est vous qui le faites.\n\nAllez-y et éliminez tous ceux que vous trouverez. Bien sûr, je suis sûr que les gros bonnets vont se jeter dans la bataille. C'est ce qu'ils font toujours.\n\nÇa va être difficile. Même si je déteste XenoThreat, ils sont sacrément bons dans un combat, alors faites attention à vous et apportez de l'aide si vous le pouvez.\n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 6/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x90, Juggernauts x4\n<EM4>Elite Contractor:</EM4> +400 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_Boss_XenoThreat_VH_title_001=Frapper le commandement XenoThreat <EM4>[BP]</EM4> <EM4>[400 Rep]</EM4>
headhunters_EliminateAll_XenoThreat_H_desc_001=L'un de nos hommes est tombé sur un groupe XenoThreat qui se cache près de ~mission(Location|Address). On ne sait pas s'ils sont retranchés ou s'ils ne font que passer, mais on veut les toucher avant qu'ils ne bougent. \n\nPeut-être que vous pouvez amener des gens si vous en avez, parce que XenoThreat n'ont pas l'habitude de se laisser abattre facilement. Allez-y et rappelez-leur qui est le pouvoir dans ce système. \n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x2, Juggernauts x1, Snipers x1, Soldiers x2, Technicians x1\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateAll_XenoThreat_H_title_001=Frapper XenoThreat à ~mission(Location) <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
headhunters_EliminateSpecific_Asteroid_Generic_M_desc_001=Il faut s'occuper de quelqu'un. Il est retranché près de ~mission(Location|Address). Je ne sais pas si vous vous souciez de leur identité, mais leur nom est ~mission(TargetName). Pas grand-chose à dire, un voyou local qui a tué quelqu'un qui avait des relations. Ils ont été en fuite, donc ils vont être nerveux. Je l'approcherais avec prudence.\n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Ravager-212 Twin Shotgun\n- Ripper "Sunblock" SMG\n- [S1-A] Deadrig Shotgun Magazine (8 cap)\n- [S1-A] Dust Devil Armor Arms\n- [S1-A] Dust Devil Armor Core\n- [S1-A] Dust Devil Armor Legs\n- [S1-A] Manticore Helmet\n- [S1-A] Ravager-212 Twin Shotgun Magazine (16 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x30, Juggernauts x4\n<EM4>Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_Asteroid_Generic_M_title_001=Besoin d'un mort à ~mission(Location) <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
headhunters_EliminateSpecific_Asteroid_Generic_VE_desc_001=On a eu vent d'une équipe qui a décroché des contrats et s'est fait une réputation. Comme ils ont dit qu'ils ne voulaient rien avoir à faire avec les Headhunters, nous cherchons à les séparer avant qu'ils ne deviennent un problème. Leur chef est un voyou nommé ~mission(TargetName) et nous pensons que s'ils rencontrent au mauvaise balle, le reste d'entre eux s'effondrera. \n\nOn nous a dit que vous pouvez trouver ~mission(TargetName|Last) autour de ~mission(Location|Address). Allez-y et occupez-vous-en. \n\nIls ne devraient pas poser beaucoup de problèmes à un pro comme vous. \n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- Coda "Big Boss" Pistol\n- Coda "Nighthawk" Pistol\n- Coda Pistol\n- Scalpel Sniper Rifle\n- [S1-A] Coda Pistol Magazine (6 cap)\n- [S1-A] Morozov-SH Arms\n- [S1-A] Morozov-SH Core\n- [S1-A] Morozov-SH Helmet\n- [S1-A] Morozov-SH Legs\n- [S1-A] Scalpel Sniper Rifle Magazine (12 cap)\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- Devastator "Midnight" Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator Shotgun\n- [S1-A] Devastator Shotgun Battery (12 cap)\n- [S1-A] Morozov-SH Arms Thule\n- [S1-A] Morozov-SH Core Thule\n- [S1-A] Morozov-SH Helmet Thule\n- [S1-A] Morozov-SH Legs Thule\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x24, Soldiers x3\n<EM4>Neutral:</EM4> +50 Rep\n<EM4>Jr. Contractor:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_Asteroid_Generic_VE_title_001=Frappe dans l'espace lointain <EM4>[BP]</EM4> <EM4>[50 Rep]</EM4>
headhunters_EliminateSpecific_CFP_E_desc_001=Mon chef recherche une personne disponible. Les Headhunters cherchent à reprendre ~mission(Location|Address). Des mercenaires des CFP s'y sont retranchés pour un long combat. Écoutez, nous ne voulons pas tuer qui que ce soit sans y être obligés, alors nous envisageons d'autres options.\n\nLa sécurité est assurée par ~mission(TargetName) et mon Juge pense que s'il est éliminé, les autres se disperseront. Faire couler un peu de sang vaut mieux que beaucoup, n'est-ce pas ?\n\n-Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Coda "Big Boss" Pistol\n- Coda "Nighthawk" Pistol\n- Coda Pistol\n- Scalpel Sniper Rifle\n- [S1-A] Coda Pistol Magazine (6 cap)\n- [S1-A] Morozov-SH Arms\n- [S1-A] Morozov-SH Core\n- [S1-A] Morozov-SH Helmet\n- [S1-A] Morozov-SH Legs\n- [S1-A] Scalpel Sniper Rifle Magazine (12 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x1, Juggernauts x1, Snipers x1, Soldiers x2, Technicians x2\n<EM4>Jr. Contractor:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_CFP_E_title_001=Tir dans le chaos <EM4>[BP]</EM4> <EM4>[50 Rep]</EM4>
headhunters_EliminateSpecific_CFP_H_desc_001=Les Headhunters lancent une attaque près de ~mission(Location|Address). Ce connard d'ex-Marine nommé ~mission(TargetName) a envoyé ses mercenaires nettoyer les campements voisins s'ils ne rendaient pas leurs armes.\n\nAlors que tous les services de sécurité ont reçu le feu vert, ~mission(TargetName|Last) a été pointé du doigt. Lors de leur dernier raid, ils ont battu à mort un squatter parce qu'il avait parlé. Il s'avère que ce squatter était le cousin de l'un de nos Gard, alors ils paient un supplément pour s'assurer que justice soit faite.\n\nAttention cependant, ~mission(TargetName|Last) est peut-être une ordure qui l'a bien cherché, mais il est toujours un ancien militaire, alors il ne sera pas facile à abattre.\n\n-Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Devastator "Midnight" Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator Shotgun\n- [S1-A] Devastator Shotgun Battery (12 cap)\n- [S1-A] Morozov-SH Arms Thule\n- [S1-A] Morozov-SH Core Thule\n- [S1-A] Morozov-SH Helmet Thule\n- [S1-A] Morozov-SH Legs Thule\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> CQC x6, Juggernauts x2, Snipers x4, Soldiers x6, Technicians x4\n<EM4>Head Contractor:</EM4> +1,200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_CFP_H_title_001=Cible Payée parmi les CFP <EM4>[BP]</EM4> <EM4>[1,200 Rep]</EM4>
headhunters_EliminateSpecific_CFP_M_desc_001=Besoin d'une gâchette disponible pour abattre une cible dans un avant-poste des CPP. Il s'agit d'une véritable bête de somme nommée ~mission(TargetName). Un mercenaire de la vieille école rempli de cruauté. \n\nJ'ai entendu dire qu'il étaient posté à ~mission(Location|Address). Allez-y et éliminez-le. Essayez de ne pas faire trop de dégâts. C'est lui la cible, pas les autres. \n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- Coda "Big Boss" Pistol\n- Coda "Nighthawk" Pistol\n- Coda Pistol\n- Scalpel Sniper Rifle\n- [S1-A] Coda Pistol Magazine (6 cap)\n- [S1-A] Morozov-SH Arms\n- [S1-A] Morozov-SH Core\n- [S1-A] Morozov-SH Helmet\n- [S1-A] Morozov-SH Legs\n- [S1-A] Scalpel Sniper Rifle Magazine (12 cap)\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- Devastator "Midnight" Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator Shotgun\n- [S1-A] Devastator Shotgun Battery (12 cap)\n- [S1-A] Morozov-SH Arms Thule\n- [S1-A] Morozov-SH Core Thule\n- [S1-A] Morozov-SH Helmet Thule\n- [S1-A] Morozov-SH Legs Thule\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x1, Snipers x2, Soldiers x3, Technicians x4\n<EM4>Jr. Contractor:</EM4> +75 Rep\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_CFP_M_title_001=Besoin d'éliminer un CFP <EM4>[BP]</EM4> <EM4>[75–100 Rep]</EM4>
headhunters_EliminateSpecific_Defector_desc_001=Cette affaire m'attriste. Je ne sais pas si vous avez déjà croisé la route de ~mission(TargetName) quand vous traitiez avec nous. C'était un bon gars, du moins je le croyais. Il était avec les Headhunters depuis des années, mais quelque chose a dû se passer car qu'il s'est réfugié chez les CFP pour obtenir une protection. Il a vendu certains de nos frères et soeurs au passage.\n\nTous les Juges sont furieux et veulent voir le sang couler. C'est là que vous intervenez. Allez à ~mission(Location|Address), trouvez ~mission(TargetName|Last), et tuez-le.\n\nPas besoin de faire quoi que ce soit d'extravagant. Je veux juste que ça soit fait.\n\nQuelle honte. \n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Devastator "Midnight" Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator Shotgun\n- [S1-A] Devastator Shotgun Battery (12 cap)\n- [S1-A] Morozov-SH Arms Thule\n- [S1-A] Morozov-SH Core Thule\n- [S1-A] Morozov-SH Helmet Thule\n- [S1-A] Morozov-SH Legs Thule\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x1, Juggernauts x1, Snipers x2, Soldiers x3\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_Defector_title_001=Capter un traître <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
headhunters_EliminateSpecific_Generic_E_desc_001=Nous recherchons des tueurs disponibles pour une mission rapide. A ~mission(Location|Address), ils se font attaquer par des génies menés par ~mission(TargetName). Nous avons déjà eu affaire à ~mission(TargetName|Last) par le passé, il n'est donc pas surprenant qu'ils n'aient pas encore pris conscience de la situation. \n\nNous voulons que vous alliez là-bas et que vous les éliminiez. Tuez qui vous voulez, mais ~mission(TargetName|Last) doit être votre objectif. \n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Devastator "Midnight" Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator Shotgun\n- [S1-A] Devastator Shotgun Battery (12 cap)\n- [S1-A] Morozov-SH Arms Thule\n- [S1-A] Morozov-SH Core Thule\n- [S1-A] Morozov-SH Helmet Thule\n- [S1-A] Morozov-SH Legs Thule\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x1, Snipers x2, Soldiers x3, Technicians x4\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_Generic_E_title_001=Tuer le roi <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
headhunters_EliminateSpecific_Generic_M_desc_001=J'ai un équipage qui s'attaque aux vaisseaux Headhunters ces derniers temps. Leur chef est une véritable ordure nommée ~mission(TargetName). Nous les avons localisés à ~mission(Location|Address), et nous cherchons donc quelqu'un pour les éliminer pour de bon.\n\nCe groupe aime se battre, mais cela ne devrait pas être un problème pour quelqu'un comme vous. \n\nAllez-y et faites-le. \n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Coda "Big Boss" Pistol\n- Coda "Nighthawk" Pistol\n- Coda Pistol\n- Scalpel Sniper Rifle\n- [S1-A] Coda Pistol Magazine (6 cap)\n- [S1-A] Morozov-SH Arms\n- [S1-A] Morozov-SH Core\n- [S1-A] Morozov-SH Helmet\n- [S1-A] Morozov-SH Legs\n- [S1-A] Scalpel Sniper Rifle Magazine (12 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x1, Snipers x1, Soldiers x2, Technicians x2\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Neutral:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_Generic_M_title_001=Besoin de faire disparaître quelqu'un <EM4>[BP]</EM4> <EM4>[25–50 Rep]</EM4>
headhunters_EliminateSpecific_Generic_VH_desc_001=Mes supérieurs m'ont fait savoir que nous réglions de vieilles dettes. J'ai une ligne ouverte sur un ancien tueur nommé ~mission(TargetName) qui a accumulé une liste de meurtres bien remplie. Nous avons eu vent qu'il se cachait avec des gens de ~mission(Location|Address) qui ne sont pas nos plus grands fans, donc ils ne vont probablement pas vous apprécier. ~mission(TargetName|Last) est la cible ici, mais vous devrez peut-être vous frotter à eux. \n\nEncore une fois, chaque fois que nous avons essayé d'éliminer ~mission(TargetName|Last), ils ont tué leur tueur. Je pense que vous vous en sortirez mieux, mais j'amènerais des renforts si vous en avez besoin.\n\n-Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Coda "Big Boss" Pistol\n- Coda "Nighthawk" Pistol\n- Coda Pistol\n- Scalpel Sniper Rifle\n- [S1-A] Coda Pistol Magazine (6 cap)\n- [S1-A] Morozov-SH Arms\n- [S1-A] Morozov-SH Core\n- [S1-A] Morozov-SH Helmet\n- [S1-A] Morozov-SH Legs\n- [S1-A] Scalpel Sniper Rifle Magazine (12 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> CQC x5, Juggernauts x1, Snipers x3, Soldiers x5, Technicians x4\n<EM4>Head Contractor:</EM4> +1,200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_Generic_VH_title_001=Feu vert pour ~mission(TargetName|Last) <EM4>[BP]</EM4> <EM4>[1,200 Rep]</EM4>
headhunters_EliminateSpecific_XenoThreat_H_desc_001=Les Headhunters viennent de rassembler une équipe pour aller frapper ~mission(Location|Address) et anéantir XenoThreat qui s'y trouve, mais j'aimerais ajouter une assurance supplémentaire. \n\nIl y a un gros bonnet nommé ~mission(TargetName) qui fait partie de la structure de commandement XenoThreat et nous voulons qu'il soit éliminé. Tous les autres que vous tuerez sont des cadeaux, mais ils sont votre cible principale.\n\n-Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Coda "Big Boss" Pistol\n- Coda "Nighthawk" Pistol\n- Coda Pistol\n- Scalpel Sniper Rifle\n- [S1-A] Coda Pistol Magazine (6 cap)\n- [S1-A] Morozov-SH Arms\n- [S1-A] Morozov-SH Core\n- [S1-A] Morozov-SH Helmet\n- [S1-A] Morozov-SH Legs\n- [S1-A] Scalpel Sniper Rifle Magazine (12 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Juggernauts x1, Snipers x1, Soldiers x2, Technicians x2\n<EM4>Sr. Contractor:</EM4> +75 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_XenoThreat_H_title_001=Le Lieutenant XenoThreat a besoin d'être tué <EM4>[BP]</EM4> <EM4>[75 Rep]</EM4>
headhunters_EliminateSpecific_XenoThreat_VH_desc_001=Voici ce qui se passe : nous venons d'apprendre qu'un joueur XenoThreat nommé ~mission(TargetName) vient de sortir de sa cachette et a été repéré à ~mission(Location|Address). \n\nCela fait des mois que les nHeadhunters veulent mettre ce connard à terre, alors nous avons lancé un assaut contre l'avant-poste, mais le Juge veut s'assurer que ~mission(TargetName|Last) ne s'échappe pas, alors ils veulent vous utiliser comme assurance.\n\nCe sera un meurtre difficile au milieu d'une zone de guerre, mais nous vous paierons si vous y arrivez.\n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Coda "Big Boss" Pistol\n- Coda "Nighthawk" Pistol\n- Coda Pistol\n- Scalpel Sniper Rifle\n- [S1-A] Coda Pistol Magazine (6 cap)\n- [S1-A] Morozov-SH Arms\n- [S1-A] Morozov-SH Core\n- [S1-A] Morozov-SH Helmet\n- [S1-A] Morozov-SH Legs\n- [S1-A] Scalpel Sniper Rifle Magazine (12 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x3, Snipers x2, Soldiers x4, Technicians x3\n<EM4>Veteran Contractor:</EM4> +600 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_XenoThreat_VH_title_001=Recherché : ~mission(TargetName) <EM4>[BP]</EM4> <EM4>[600 Rep]</EM4>
headhunters_EliminateSpecific_XenoThreat_desc_001=J'ai des nouvelles d'une XenoThreat qui m'a donné du fil à retordre. Je ne sais pas si vous connaissez son nom, mais ~mission(TargetName) est une ordure, même selon les critères XenoThreat. Vicieux, sadique, et un connard en plus. Nous voulons que quelqu'un s'en occupe. Vous êtes partant ? Aux dernières nouvelles, ils seraient quelque part dans les environs de ~mission(Location|Address). On y va et on les élimine. C'est assez simple. \n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Devastator "Midnight" Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator Shotgun\n- [S1-A] Devastator Shotgun Battery (12 cap)\n- [S1-A] Morozov-SH Arms Thule\n- [S1-A] Morozov-SH Core Thule\n- [S1-A] Morozov-SH Helmet Thule\n- [S1-A] Morozov-SH Legs Thule\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x1, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Veteran Contractor:</EM4> +400 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_XenoThreat_title_001=Supprimer un XenoThreat <EM4>[BP]</EM4> <EM4>[400 Rep]</EM4>
headhunters_HaulCargo_RegionLink_desc_001=Vous avez fait du bon travail pour nous, alors j'ai une faveur à vous demander. Je vous paierai quand même, mais c'est une faveur. J'ai une cargaison qui doit être transférée de <EM4>~mission(Location|Address)</EM4> à <EM4>~mission(Destination|Address)</EM4> et le gars qui était censé le faire s'est retrouvé du mauvais côté d'un sas, mais bon, il faut quand même que ça se fasse.\n\nLa seule chose, c'est que vous aurez besoin d'un vaisseau qui peut transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>.  Un <EM4>rayon tracteur portable</EM4> pourrait également vous être utile. \n\nSi vous pouviez m'aider, ce serait génial.\n\n- Stows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +200 Rep
headhunters_HaulCargo_RegionLink_title_001=Demande de transport. <EM4>[200 Rep]</EM4>
headhunters_bombingrun_E_CFP_desc_001=J'ai l'impression qu'il ne se passe pas une journée sans que je me réveille avec l'un de mes collaborateurs qui râle et se plaint que les Citizens for Prosperity lui rendent la vie dure. \n\nNous finirons par éliminer ces bonnes âmes du système, mais pour l'instant, je me contenterai d'un peu de paix et de tranquillité. \n\nAllez à ~mission(Location|Address) et détruisez les réserves de carburant que les CFP y ont installées. Cela devrait au moins les tenir à l'écart de nos affaires pendant un certain temps.\n\n-Stows terminé\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Contractor:</EM4> +200 Rep
headhunters_bombingrun_E_CFP_title_001=Détruire l'Approvisionnement en Carburant des CFP <EM4>[100–200 Rep]</EM4>
headhunters_bombingrun_E_desc_001=Certains concurrents ont pris racine à ~mission(Location|Address) et ils ont vraiment gâché le travail de nos opérations dans la région.\n\nMaintenant, une partie de moi voit un certain potentiel dans les nouveaux venus et j'espère donc les intégrer, mais en même temps, je ne peux pas vraiment me permettre de les voir voler autour de moi en causant des problèmes.\n\nA la place, je veux que vous alliez faire exploser leurs réservoirs de carburant. Cela devrait les maintenir au sol assez longtemps pour que je puisse faire entrer un peu de bon sens dans leurs têtes épaisses.\n\n-Stows terminé\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Jr. Contractor:</EM4> +100 Rep
headhunters_bombingrun_E_title_001=Zone d'Exclusion Aérienne <EM4>[100 Rep]</EM4>
headhunters_bombingrun_H_XT_desc_001=Il semble que XenoThreat ait reçu les mêmes informations que nous et cherche à faire la même chose que nous. \n\nJe veux que vous mettiez la concurrence hors-jeu. Allez à ~mission(Location|Address) et éliminez les réservoirs de carburant qu'ils ont là-bas.\n\nEnsuite, mes hommes pourront terminer sans s'inquiéter de voir XenoThreat s'incruster dans la fête.\n\n-Stows terminé\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Contractor:</EM4> +100 Rep
headhunters_bombingrun_H_XT_title_001=Explosion des Réserves de Carburant XenoThreat <EM4>[100 Rep]</EM4>
headhunters_bombingrun_H_desc_001=Vous savez, les Headhunters ne perdent pas leur temps avec des vengeances mesquines, mais je ne vais pas non plus laisser passer ces conneries.\n\nUn connard a descendu une bonne partie de mon équipage et s'en vante partout. J'ai aussi entendu dire que ce crétin stocke du carburant quantum à <EM4>~mission(Location|Address)</EM4>. J'aimerais bien voir sa réaction quand vous vous rendrez là-bas et que vous réduirez en cendres tout ce qu'il a bâti. Oh, et vu la puissance de feu qu'il a rassemblée là-bas, ce ne serait pas très malin de voler en solo, alors emmenez un équipage avec vous.\n\n-Stows terminé\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Sr. Contractor:</EM4> +200 Rep
headhunters_bombingrun_H_title_001=Gaspiller les réserves <EM4>[200 Rep]</EM4>
headhunters_bombingrun_M_CFP_desc_001=Je commence à en avoir assez des Citizens for Prosperity qui mettent leur nez là où il ne faut pas. \n\nJ'ai commencé à penser qu'il serait bien de clouer leur flotte au sol pendant un petit moment. On fait exploser leurs réservoirs à ~mission(Location|Address) et ces petits cons n'iront plus nulle part rapidement.\n\nC'est votre genre de truc ?\n\n-Stows terminé\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Sr. Contractor:</EM4> +200 Rep
headhunters_bombingrun_M_CFP_title_001=Faire Sauter les Réserves de Carburant des CFP <EM4>[100–200 Rep]</EM4>
headhunters_bombingrun_M_title_001=Mettre un terme à la concurrence <EM4>[150 Rep]</EM4>
headhunters_bombingrun_S_desc_001=Nous avons appris qu'un nouveau gang préparait une attaque contre un site situé à <EM4>~mission(Location|Address)</EM4>. Ils pensent que s'ils parviennent à détruire les réserves de carburant qui s'y trouvent, le site leur appartiendra.\n\nMais ils ne se doutent pas que nous allons vous envoyer en premier pour faire sauter les réservoirs de carburant, ce qui nous permettra de nous emparer des lieux avant eux. Si tout se passe comme prévu, nous pourrons nettoyer les lieux et en profiter pour porter un coup dur à ce gang. D'une pierre deux coups.\n\nProblème, cet endroit est armé jusqu'aux dents. Amenez votre équipe et mettez ces réservoirs hors service. On s'occupe du reste.\n\n-Stows terminé\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Head Contractor:</EM4> +300 Rep
headhunters_bombingrun_S_title_001=Être plus rusé que nos ennemis <EM4>[300 Rep]</EM4>
headhunters_bombingrun_VE_desc_001=Les Headhunters ne sont pas devenus ce qu'ils sont aujourd'hui en jouant les gentils. Nous avons repéré la cachette d'une bande de nouveaux débraillés qui ont commencé à empiéter sur notre territoire. Il faut leur envoyer un message.\n\nDirigez-vous vers <EM4>~mission(Location|Address)</EM4> et faites sauter leurs réservoirs de carburant. Ils y réfléchiront à deux fois avant de se mêler de nos affaires quand leurs vaisseaux seront cloués au sol.\n\n-Stows terminé\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Neutral:</EM4> +100 Rep
headhunters_bombingrun_VE_title_001=Punir des nouveaux venus <EM4>[100 Rep]</EM4>
headhunters_bombingrun_VH_XT_desc_001=Je n'entrerai pas dans les détails politiques longs et compliqués de la raison pour laquelle je vous demande de faire cela, mais il suffit que vous sachiez que je veux que cela soit fait. \n\nAllez à ~mission(Location|Address) et faites exploser les réserves de carburant XenoThreat. Ça m'aidera vraiment à me sortir d'une situation délicate.\n\n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Elite Contractor:</EM4> +3,200 Rep
headhunters_bombingrun_VH_XT_title_001=Destruction des Réserves de Carburant XenoThreat <EM4>[3,200 Rep]</EM4>
headhunters_bombingrun_VH_desc_001=J'ai un plan pour m'occuper d'un type qui me cause des ennuis et j'ai besoin d'un coup de main.\n\nUn client a contracté des dettes et a décidé de ne pas les rembourser. J'ai eu un tuyau selon lequel il se cache à <EM4>~mission(Location|Address)</EM4>. Si vous pouvez détruire ses réservoirs de carburant, il n'aura d'autre choix que de revenir sur sa décision de merde.\n\nMais ne sous-estimez pas cette crapule. Il est peut-être bête, mais il n'est pas stupide, si vous voyez ce que je veux dire. Il paraît que cet endroit fourmille de vaisseaux et de tourelles, il faudrait être complètement débile pour ne pas venir avec des renforts.\n\n-Stows terminé\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Veteran Contractor:</EM4> +250 Rep
headhunters_bombingrun_VH_title_001=Piéger une ordure <EM4>[250 Rep]</EM4>
headhunters_bombingrun_killship_M_desc_001=Tout le monde parle d'un nouveau joueur nommé ~mission(TargetName) qui opère depuis ~mission(Location|Address). Il est devenu une véritable préoccupation pour les Headhunters. \n\nIl est temps de les arrêter. \n\nDirigez-vous vers ~mission(TargetName|Last), puis videz les réserves de carburant qu'ils ont là-bas pour convaincre tous ceux qui restent de partir. \n\nJe pense qu'après avoir fait ça, personne ne se souviendra de leur nom.\n\n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Defenders x2, Targets x1\n<EM4>Sr. Contractor:</EM4> +200 Rep
headhunters_bombingrun_killship_M_title_001=Convaincre les Nouveaux Venus d’Abandonner le Secteur <EM4>[200 Rep]</EM4>
headhunters_bombingrun_multi_E_CFP_desc_001=Chaque jour, on a l'impression que les Citizens for Prosperity essaie de rallier de nouvelles personnes à leur petite cause merdique et de rendre la vie plus difficile aux gens qui travaillent dur comme nous. \n\nJe me dis qu'ils auraient bien besoin qu'on leur rappelle qui est vraiment en charge ici. Dirigez-vous vers ~mission(Location|Address) et mettez-leur le bazar. \n\nRien de tel qu'un peu de dégâts matériels pour faire passer un message. \n\n-Stows terminé\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Jr. Contractor:</EM4> +100 Rep
headhunters_bombingrun_multi_E_CFP_title_001=Donner une leçon aux Citizens for Prosperity <EM4>[100 Rep]</EM4>
headhunters_bombingrun_sabotage_servers_VH_desc_001=Quand les gens apprendront-ils qu'ils ne peuvent pas faire ce qu'ils veulent sur le terrain des Headhunters ? Ces idiots préparent un gros coup et pensent que je vais les laisser faire ? Pas question.\n\nJe veux que vous vous rendiez à ~mission(Location|Address) et que vous détruisiez leurs réservoirs de carburant et leurs serveurs de données. Montrez-leur ce que les Headhunters pensent vraiment d'eux. Voyons s'ils essaient de faire quoi que ce soit après ça. \n\n-Stows terminé\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Elite Contractor:</EM4> +3,200 Rep
headhunters_bombingrun_sabotage_servers_VH_title_001=Empêcher les Rivaux de Lancer un Hold-up <EM4>[3,200 Rep]</EM4>
headhunters_bounty_Pyro1_desc=pu bounty pve pyro headhunters generic pyro1\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
