ForceDepletion_Desc=Eliminer les membres de l'Organisation Nine Tails. \n\nPour chaque membre neutralisé,  vous serez rémunéré de 500 UEC, avec un bonus de 1000 UEC une fois terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +4,000
ForceDepletion_Title=Eliminer les membres de l'Organisation Nine Tails <EM4>[4,000 Rep]</EM4>
Foxwell_DefendDestructibleEntites_E_Desc_001=Des pilotes disponibles dans la région ? Nous avons besoin d'une protection aux alentours de <EM4>~mission(Location|Address)</EM4> pour un client. Une bande de hors-la-loi s'en prend à ses <EM4>~mission(Objects)</EM4>, et si rien n'est fait, ils causeront de sérieux dégâts. Il nous faut quelqu'un pour protéger au mieux sa propriété et s'occuper de ces voyous.\n\nD'après les renseignements que nous avons pu recueillir, ces malfrats ne sont pas très dangereux, mais ils peuvent causer des ennuis si vous ne faites pas attention. Si vous parvenez à mener cette mission à bien selon les normes de Foxwell, nous offrons <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires</EM4> au prestataire principal.\n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x10\n<EM4>Rep:</EM4> +100\n<EM4>Blueprint Reward:</EM4> 100% chance (Easy only)\n\n<EM4>? = only the Easy variant awards blueprints</EM4>
Foxwell_DefendDestructibleEntites_E_Title_001=Niveau Jaune: Protéger ~mission(Objects) <EM4>[BP?]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_DefendDestructibleEntites_H_Desc_001=L'un de nos clients prioritaires est la cible d'un gang criminel qui s'en prend à ses <EM4>~mission(Objects)</EM4> situés à <EM4>~mission(Location|Address)</EM4>. Ses biens ont une grande valeur, nous devons donc les protéger à tout prix, mais je ne vais pas vous mentir : ce sera un sacré défi face à ces crapules déterminées à causer de sérieux dégâts. \n\nSi j'étais à vous, je n'hésiterais pas à demander des renforts pour m'occuper d'eux. Ce ne sont pas des rigolos, c'est pourquoi nous offrons <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires</EM4> bien mérités au prestataire principal qui parviendra à venir à bout de ces types. \n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x17\n<EM4>Rep:</EM4> +200\n<EM4>Blueprint Reward:</EM4> 100% chance (Hard only)\n\n<EM4>? = only the Hard variant awards blueprints</EM4>
Foxwell_DefendDestructibleEntites_H_Title_001=Niveau Orange: Protéger ~mission(Objects) <EM4>[BP?]</EM4> <EM4>[200 Rep]</EM4>
Foxwell_DefendDestructibleEntites_M_Desc_001=J'espère que vous serez en mesure de fournir un service de protection à <EM4>~mission(Location|Address)</EM4>. L'un de nos clients importants rencontre de réelles difficultés avec une bande de hors-la-loi qui s'en prend à ses ~mission(Objects). Il est essentiel de préserver ses biens autant que possible. Le client s'attend à bénéficier du service pour lequel il paie; ne ratez donc pas cette mission, sinon nous risquons de perdre un client fidèle.\n\nPour l’instant, nous ne savons pas grand-chose de ces hors-la-loi, mais si vous parvenez à mener cette mission à bien selon les normes de Foxwell, nous offrons <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires</EM4> au prestataire principal. \n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x15\n<EM4>Rep:</EM4> +150\n<EM4>Blueprint Reward:</EM4> 100% chance (Medium only)\n\n<EM4>? = only the Medium variant awards blueprints</EM4>
Foxwell_DefendDestructibleEntites_M_Title_001=Niveau Orange: Défendre ~mission(Objects) <EM4>[BP?]</EM4> <EM4>[150 Rep]</EM4>
Foxwell_DefendDestructibleEntites_S_Desc_001=Nous venons de recevoir une mission urgente concernant un gang de malfrats violents qui sème le chaos dans les installations de l’un de nos clients VIP. Si vous êtes disponible, rendez-vous immédiatement à <EM4>~mission(Location|Address)</EM4> et défendez à tout prix les <EM4>~mission(Objects)</EM4> extrêmement précieux du client. \n\nFoxwell connaît très bien ce groupe, alors croyez-moi quand je vous dis qu’il ne faut pas prendre ces pilotes à la légère. Je vous recommande vivement de <EM>recruter des renforts hautement compétents</EM> pour vous accompagner sur place.\n\nSi vous parvenez à survivre à cette confrontation tout en laissant intacte la propriété du client, nous offrirons  <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires</EM4> au principal prestataire qui aura eu le courage d’accepter cette mission. \n\nSoyez prudent et bonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 7/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x22\n<EM4>Rep:</EM4> +300\n<EM4>Blueprint Reward:</EM4> 100% chance (Super only)\n\n<EM4>? = only the Super variant awards blueprints</EM4>
Foxwell_DefendDestructibleEntites_S_Title_001=Niveau Rouge : Protéger ~mission(Objects) <EM4>[BP?]</EM4> <EM4>[300 Rep]</EM4>
Foxwell_DefendDestructibleEntites_VE_Desc_001=Appel à tous les pilotes : l’un de nos clients recherche une protection pour ses <EM4>~mission(Objects)</EM4> situés à <EM4>~mission(Location|Address)</EM4>. Selon nos informations, les assaillants sont un groupe de voyous en herbe qui ne se rendent probablement pas compte de la valeur des biens qu’ils tentent de détruire, se contentant de semer le chaos pour le simple plaisir. Néanmoins, ces biens sont importants pour le client et doivent donc être préservés autant que possible.\n\nSi vous vous occupez d’eux selon les normes de Foxwell, nous offrons <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires</EM4> au prestataire principal. \n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Rep:</EM4> +100\n<EM4>Blueprint Reward:</EM4> 100% chance (VeryEasy only)\n\n<EM4>? = only the VeryEasy variant awards blueprints</EM4>
Foxwell_DefendDestructibleEntites_VE_Title_001=Niveau Jaune : Défendre ~mission(Objects) <EM4>[BP?]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_DefendDestructibleEntites_VH_Desc_001=Besoin urgent de renforts à <EM4>~mission(Location|Address)</EM4>. Une organisation criminelle notoire pour sa violence teste le terrain depuis des mois en s'en prenant aux biens de l'un de nos clients, et elle a désormais déclenché un véritable chaos en ciblant les <EM4>~mission(Objects)</EM4> de ce dernier. Ce matériel a une grande valeur, il faut donc le protéger à tout prix – même si nous savons que ce ne sera pas une mince affaire.\n\nJe ne saurais trop insister sur la dangerosité de ces individus, n'hésitez donc pas à <EM>faire appel à des renforts</EM> pour les neutraliser. Si vous et les biens parvenez à vous en sortir indemnes, nous offrirons au prestataire principal <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires</EM4> bien mérités. \n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x17\n<EM4>Rep:</EM4> +250\n<EM4>Blueprint Reward:</EM4> 100% chance (VeryHard only)\n\n<EM4>? = only the VeryHard variant awards blueprints</EM4>
Foxwell_DefendDestructibleEntites_VH_Title_001=Niveau Rouge: Défendre ~mission(Objects) <EM4>[BP?]</EM4> <EM4>[250 Rep]</EM4>
Foxwell_DefendEntitesAndEscort_E_Desc=Nous recherchons un prestataire pour assurer un service d'escorte et de protection à <EM4>~mission(Location|Address)</EM4>. L'un de nos prestigieux clients est la cible d'une bande de hors-la-loi s'attaquant à <EM4>ses ~mission(Objects) et ses vaisseaux</EM4>. Vous devrez assurer la sécurité de l'équipage tout au long de son trajet dans la zone, ainsi que veiller à ce que les biens restent intacts. Ces voyous semblent capables de causer de sérieux dégâts, alors veillez à les affronter avec prudence, sinon le client pourrait ne pas être le seul à subir de lourdes pertes.\n\nSi vous parvenez à mener cette mission à bien selon les normes de Foxwell, nous offrons <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires</EM4> en guise de rémunération au prestataire principal. \n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Nyx]</EM4>\n- [CIV-S0-A] Tepilo\n- [CIV-S0-C] Fridan\n- [CIV-S0-C] Frost-Star SL\n- [CIV-S1-A] Gelid\n- [CIV-S1-C] ArcticStorm\n- [CIV-S1-C] Berian\n- [CIV-S1-C] Frost-Star\n- [CIV-S2-A] Aufeis\n- [CIV-S2-C] ColdSnap\n- [CIV-S2-C] Frost-Star EX\n- [CIV-S2-C] Graupel\n- [CIV-S3-A] Kragen\n- [CIV-S3-B] Elsen\n- [CIV-S3-C] Draug\n- [CIV-S3-C] Frost-Star XL\n- [CIV-S3-C] FrostBurn\n\n<EM4>[Pyro]</EM4>\n- [CIV-S0-B] IonWave\n- [CIV-S0-C] Radix\n- [CIV-S1-B] IonBurst\n- [CIV-S1-B] MagnaBloom\n- [CIV-S1-C] LightBlossom\n- [CIV-S1-C] PowerBolt\n- [CIV-S2-B] IonSurge\n- [CIV-S2-B] Radiance\n- [CIV-S2-C] FullForce\n- [CIV-S3-B] Celestial\n- [CIV-S3-B] IonSurge Pro\n- [CIV-S3-C] FullForce Pro\n- [CIV-S3-C] NewDawn\n\n<EM4>[Stanton]</EM4>\n- [CIV-S1-A] 7SA 'Concord'\n- [CIV-S1-D] INK\n- [CIV-S2-A] 7MA 'Lorica'\n- [CIV-S2-D] RPEL\n- [CIV-S3-A] 7CA 'Nargun'\n- [CIV-S3-D] HAVEN\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x14, Reinforcements x8\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Rep:</EM4> +100\n<EM4>Blueprint Reward:</EM4> Guaranteed
