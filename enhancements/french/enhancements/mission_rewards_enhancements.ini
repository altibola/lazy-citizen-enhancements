mtps_UGF_eliminateall_allies_desc_001=À PROPOS DU JOB\nLes Services de Protection de MicroTech recherchent un mercenaire professionnel soucieux du détail capable de porter rapidement et efficacement assistance à une équipe de sécurité stationnée à ~mission(Location|Address) en les protégeant de menaces hostiles. \n\nNotez que le moindre tir allié, accidentel ou non, ne sera pas toléré. \n\nRESPONSABILITÉS\n• Prévoyez votre propre transport vers ~mission(Location|Address).\n• Aidez l'équipe de sécurité sur place à protéger le site; utilisez la force si nécessaire.\n• Évitez tout tir fratricide.\n\nQUALIFICATIONS MINIMALES\n• 2 ans d'expérience en mercenariat ou en sécurité.\n• Un accès à de l'équipement de combat et un moyen de transport.\n• Disponible pour un déploiement immédiat.\n\nQUALIFICATIONS IMPORTANTES\n• Une expérience dans les techniques rapides de pacification hostile.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
mtps_UGF_eliminateall_allies_desc_intro=À PROPOS DU POSTE\nLe service de protection de MicroTech est à la recherche d'un  nouveau mercenaire professionnel soucieux du détail. Pour évaluer vos compétence, nous vous demandons de protéger ~mission(Location|Address) contre les menaces hostiles. \n\nVOTRE JOB\n• Utiliser votre propre moyen de transport jusqu'à la ~mission(Location|Address).\n• Protéger le site contre les menaces hostiles ; utiliser la force si nécessaire.\n• Éviter le tir allié\n\nQUALIFICATIONS MINIMALES\n• 2 ans d'expérience combinée en tant que mercenaire et/ou en sécurité.\n• Accès à un équipement de combat et à un moyen de transport.\n• Etre disponible immédiatement.\n\nQUALIFICATION ADDITIONELLE\n•  Avoir de l'expérience dans la médiation.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
mtps_UGF_eliminateall_allies_desc_rehire=A PROPOS DU POSTE\nBien que vos performances passées n'aient pas été à la hauteur de nos exigences, le service de protection de MicroTech a décidé de vous offrir une chance de vous racheter. \n\nDans l'objectif de réévaluer vos compétences, ke service de protection de MicroTech voudrait que que vous participiez à la protection de ~mission(Location|Address) contre les menaces hostiles. .\n• Fournir son propre moyen de transport pour se rendre à ~mission(Location|Address).\n• Aider à protéger le site; utiliser la force si nécessaire. \n• Éviter les tirs amis.\n\nQUALIFICATIONS REQUISES\n•  2 ans d'expérience dans le mercenariat et/ou la sécurité.\nAccès à un équipement de combat et à un moyen de transport.\n• Disponible immédiatement.\n\n Compétences souhaitées\n• Expérience dans la capacité à faire baisser les tensions.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
mtps_UGF_eliminateall_allies_title_001=Défendre les Occupants <EM4>[500 Rep]</EM4>
mtps_UGF_eliminateall_allies_title_intro=Evaluation de l'Agent Prestataire en Securite <EM4>[500 Rep]</EM4>
mtps_UGF_eliminateall_allies_title_rehire=RÉÉvaluation Prestataire en SécuritÉ <EM4>[500 Rep]</EM4>
mtps_UGF_eliminateall_desc_001=À PROPOS DU JOB\nLe Service de protection de Microtech est à la recherche d'un professionnel de la sécurité soucieux du détail, capable de l'aider à déloger des occupants illégaux à ~mission(Location|Address).\n\nRESPONSABILITÉS\n• Assurer son propre transport jusqu'à ~mission(Location|Address).\n• Gérer tout hostile présent sur le site, en recourant à la force si nécessaire.\n\nQUALIFICATIONS MINIMUM\n• 2 années d'expérience dans le domaine du mercenariat et/ou de la sécurité.\n• Accès à de l'équipement de combat et à des moyens de transport.\n• Disponible pour un déploiement immédiat.\n\nSI POSSIBLE\n• Connaissance des Méthodes rapides de traitements des hostiles.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
mtps_UGF_eliminateall_nocivs_desc_001=À PROPOS DU JOB\nLe Service de protection de Microtech est à la recherche d'un professionnel de la sécurité soucieux du détail, capable de l'aider à déloger des occupants illégaux à ~mission(Location|Address). Attention ! Des civils travaillent sur le site. Leur relation avec le gang n'est pas clair, ils sont considérés comme non-hostiles. \n\nRESPONSABILITÉS\n• Assurer son propre transport jusqu'à ~mission(Location|Address).\n• Gérer tout hostile présent sur le site, en recourant à la force si nécessaire.\n• Assurer la sécurité des civils \n\nQUALIFICATIONS MINIMUM\n• 2 années d'expérience dans le domaine du mercenariat et/ou de la sécurité.\n• Accès à de l'équipement de combat et à des moyens de transport.\n• Disponible pour un déploiement immédiat.\n\nSI POSSIBLE\n• Connaissance des Méthodes rapides de traitements des hostiles.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13\n<EM4>Friendlies:</EM4> Civilians x4
mtps_UGF_eliminateall_title_001=Élimination des Occupants Illégaux <EM4>[500 Rep]</EM4>
mtps_bounty_desc_ERT=DÉTAILS DE LA MISSION\nLe service de protection de MicroTech recherche un chasseur de primes qualifié pour appréhender la cible à risque extrême ~mission(TargetName) depuis ~mission(Location|Address). \n\nUne cible à risque extrême pilote généralement un vaisseau de classe sous-capitale, dispose de plusieurs alliés lourdement armés et devrait être très difficile à appréhender. Il peut être utile d'emmener du personnel de soutien pour aider à engager cette cible.\n\nMISSIONS\n• Assurer son déplacement jusqu'à ~mission(Location|Address).\n• Neutraliser ~mission(TargetName); en utilisant la force si nécessaire.\n\nQUALIFICATIONS MINIMALES\n• Adhésion à la Guilde des Chasseurs de Primes et certification appropriée.\n• Accès à un véhicule spécialement équipé pour le combat.\n• Être disponible pour un déploiement immédiat.\n\nQUALIFICATION RECOMMANDÉE\n• Gérer des situations sous haute pression.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
mtps_bounty_desc_HRT=DÉTAILS DE LA MISSION\nLe service de protection de MicroTech recherche un chasseur de primes qualifié pour appréhender la cible à risque élevé ~mission(TargetName) depuis ~mission(Location|Address). \n\nUne cible à risque élevé pilote généralement un grand vaisseau multi-équipage, a plusieurs alliés connus et devrait être difficile à appréhender. Il peut être utile d'emmener du personnel de soutien pour aider à engager cette cible.\n\nMISSIONS\n• Assurer son déplacement jusqu'à ~mission(Location|Address).\n• Neutraliser ~mission(TargetName); en utilisant la force si nécessaire.\n\nQUALIFICATIONS MINIMALES\n• Adhésion à la Guilde des Chasseurs de Primes et certification appropriée.\n• Accès à un véhicule spécialement équipé pour le combat.\n• Être disponible pour un déploiement immédiat.\n\nQUALIFICATION RECOMMANDÉE\n• Gérer des situations sous haute pression.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
mtps_bounty_desc_LRT=DÉTAILS DE LA MISSION\nLe service de protection de MicroTech recherche un chasseur de primes qualifié pour appréhender la cible à risque faible ~mission(TargetName) depuis ~mission(Location|Address). \n\nUne cible à risque faible pilote généralement un vaisseau monoplace, est accompagnée de plusieurs alliés connus et devrait être facile à appréhender.\n\nMISSIONS\n• Assurer son déplacement jusqu'à ~mission(Location|Address).\n• Neutraliser ~mission(TargetName); en utilisant la force si nécessaire.\n\nQUALIFICATIONS MINIMALES\n• Adhésion à la Guilde des Chasseurs de Primes et certification appropriée.\n• Accès à un véhicule équipé pour le combat.\n• Disponibilité immédiate pour le déploiement.\n\nQUALIFICATIONS RECOMMANDÉE\n• Capacité à gérer des situations sous haute pression.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
mtps_bounty_desc_MRT=DÉTAILS DE LA MISSION\nLe service de protection de MicroTech recherche un chasseur de primes qualifié pour appréhender la cible à risque modéré ~mission(TargetName) depuis ~mission(Location|Address). \n\nLa cible à risque modéré est généralement aux commandes d'un petit vaisseau multi-équipage, entourée de plusieurs alliés connus, et peut s'avérer légèrement difficile à capturer.\n\nMISSIONS\n• Assurer son déplacement jusqu'à ~mission(Location|Address).\n• Neutraliser ~mission(TargetName); en utilisant la force si nécessaire.\n\nQUALIFICATIONS MINIMALES\n• Être membre de la Guilde des Chasseurs de Primes et être titulaire de la certification appropriée.\n• Accès à un véhicule spécialement équipé pour le combat.\n• Être disponible pour un déploiement immédiat.\n\nQUALIFICATION RECOMMANDÉE\n• Gérer des situations sous haute pression.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
mtps_bounty_desc_VLRT=DÉTAILS DE LA MISSION\nLe service de protection de MicroTech recherche un chasseur de primes qualifié pour appréhender la cible à risque très faible ~mission(TargetName) depuis ~mission(Location|Address). \n\nUne cible à risque très faible pilote généralement un vaisseau monoplace, a quelques alliés connus et devrait être relativement facile à appréhender.\n\nMISSIONS\n• Assurer son déplacement jusqu'à ~mission(Location|Address).\n• Neutraliser ~mission(TargetName); en utilisant la force si nécessaire.\n\nQUALIFICATIONS MINIMALES\n• Adhésion à la Guilde des Chasseurs de Primes et certification appropriée.\n• Accès à un véhicule équipé pour le combat.\n• Disponibilité immédiate pour le déploiement.\n\nQUALIFICATIONS RECOMMANDÉES\n• Capacité à gérer des situations sous haute pression.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x1, Targets x1
mtps_bounty_desc_intro=DÉTAILS DE LA MISSION\nLe service de protection de MicroTech est à la recherche de nouveaux chasseurs de primes qualifiés pour étoffer son équipe. Pour évaluer vos compétences, nous aimerions que vous nous aidiez à appréhender ~mission(TargetName) depuis ~mission(Location|Address).\n\n\nMISSIONS\n• Assurer son déplacement jusqu'à ~mission(Location|Address).\n• Neutraliser ~mission(TargetName); en utilisant la force si nécessaire.\n\nQUALIFICATIONS MINIMALES\n• Adhésion à la Guilde des Chasseurs de Primes et certification appropriée.\n• Accès à un véhicule équipé pour le combat.\n• Disponibilité immédiate pour le déploiement.\n\nQUALIFICATION RECOMMANDÉE\n• Capacité à gérer des situations sous haute pression.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
mtps_bounty_desc_rehire=DÉTAILS DE LA MISSION\nBien que vos performances passées n'aient pas été à la hauteur de nos exigences, le service de protection de MicroTech a décidé de vous offrir une chance de vous racheter. \n\nPour réévaluer vos compétences, nous vous demandons d'appréhender ~mission(TargetName) depuis ~mission(Location|Address).\n\nMISSIONS\n• Assurer son déplacement jusqu'à ~mission(Location|Address).\n• Neutraliser ~mission(TargetName); en utilisant la force si nécessaire.\n\nQUALIFICATIONS MINIMALES\n• Adhésion à la Guilde des Chasseurs de Primes et certification appropriée.\n• Accès à un véhicule spécialement équipé pour le combat.\n• Être disponible pour un déploiement immédiat.\n\nQUALIFICATION RECOMMANDÉE\n• Gérer des situations sous haute pression.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
mtps_bounty_fps_UGF_desc_001=DÉTAILS DE LA MISSION\nLe service de protection de MicroTech est à la recherche d'un chasseur de primes qualifié pour appréhender ~mission(TargetName) depuis ~mission(Location|Address). \n\nBien qu'il y ait d'autres criminels sur le site, vous devez vous concentrer sur l'obtention de la prime.\n\nMISSIONS\n• Assurer son déplacement jusqu'à ~mission(Location|Address).\n• Neutraliser ~mission(TargetName); en utilisant la force si nécessaire.\n\nQUALIFICATIONS MINIMALES\n• Adhésion à la Guilde des Chasseurs de Primes et certification appropriée.\n• Accès à l'équipement de combat et au mode de transport.\n• Être disponible pour un déploiement immédiat.\n\nQUALIFICATION RECOMMANDÉE\n• Gérer des situations sous haute pression.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
mtps_bounty_fps_UGF_nocivs_desc_001=DÉTAILS DE LA MISSION\nLe service de protection de MicroTech est à la recherche d'un chasseur de primes qualifié pour aider à l'arrestation de ~mission(TargetName) depuis ~mission(Location|Address). Nous sommes conscients qu'il peut y avoir des civils sur le site, nous vous demandons donc d'être attentifs à d'éventuels tirs croisés.\n\nMISSIONS\n• Assurer son déplacement jusqu'à ~mission(Location|Address).\n• Neutraliser ~mission(TargetName); en utilisant la force si nécessaire.\n\nQUALIFICATIONS MINIMALES\n• Adhésion à la Guilde des Chasseurs de Primes et certification appropriée.\n• Accès à l'équipement de combat et au mode de transport.\n• Disponible pour un déploiement immédiat.\n\nQUALIFICATION RECOMMANDÉE• Capacité à gérer des situations sous haute pression.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
mtps_bounty_fps_desc_001=DÉTAILS DE LA MISSION\nLe service de protection de MicroTech est à la recherche d'un chasseur de primes qualifié pour appréhender ~mission(TargetName) depuis ~mission(Location|Address). \n\nBien qu'il y ait d'autres criminels sur le site, vous devez vous concentrer sur l'obtention de la prime.\n\nMISSIONS\n• Assurer son déplacement jusqu'à ~mission(Location|Address).\n• Neutraliser ~mission(TargetName); en utilisant la force si nécessaire.\n\nQUALIFICATIONS MINIMALES\n• Adhésion à la Guilde des Chasseurs de Primes et certification appropriée.\n• Accès à l'équipement de combat et au mode de transport.\n• Être disponible pour un déploiement immédiat.\n\nQUALIFICATIONS RECOMMANDÉE\n• Capacité à gérer des situations sous haute pression.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
mtps_bounty_fps_desc_first_001=DÉTAILS DE LA MISSION\nLe service de protection de MicroTech est à la recherche de nouveaux chasseurs de primes qualifiés pour étoffer son équipe. Pour évaluer vos compétences, nous aimerions que vous nous aidiez à appréhender ~mission(TargetName) depuis ~mission(Location|Address).\n\nBien qu'il y ait d'autres criminels sur le site, vous devez vous concentrer sur l'obtention de la prime.\n\nMISSIONS\n• Assurer son déplacement jusqu'à ~mission(Location|Address).\n• Neutraliser ~mission(TargetName); en utilisant la force si nécessaire.\n\nQUALIFICATIONS MINIMALES\n• Adhésion à la Guilde des Chasseurs de Primes et certification appropriée.\n• Accès à l'équipement de combat et au mode de transport.\n• Disponibilité immédiate pour le déploiement.\n\nQUALIFICATIONS RECOMMANDÉE\n• Capacité à gérer des situations sous haute pression.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x4, Reinforcements x9, Targets x1
