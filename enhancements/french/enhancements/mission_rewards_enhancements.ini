UDM_courier_fromdc_med_desc_001=Salutations Partenaire d'Expédition Qualifié !\n\nAujourd'hui est le jour idéal pour acquérir une expérience supplémentaire en matière de livraison.\n\nSi vous disposez d'un vaisseau avec un espace de stockage adéquat, il y a un bon nombre de colis dans ~mission(Pickup1) à ~mission(Pickup1|Address) prêts à être livrés. \n\nIl s'agit là d'une formidable opportunité d'évolution de carrière.\n\nENLÈVEMENT DE COLIS \n     · Tous les colis se trouvent dans <EM4>~mission(Pickup1)</EM4> à <EM4>~mission(Pickup1|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> à <EM4>~mission(Dropoff4|Address)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> à <EM4>~mission(Dropoff5|Address)</EM4> \n     · Colis <EM4>#~mission(Item6|SerialNumber)</EM4> à <EM4>~mission(Dropoff5|Address)</EM4>\n     · Colis <EM4>#~mission(Item7|SerialNumber)</EM4> à <EM4>~mission(Dropoff6|Address)</EM4>\n     · Colis <EM4>#~mission(Item8|SerialNumber)</EM4> à <EM4>~mission(Dropoff6|Address)</EM4>\n     · Colis <EM4>#~mission(Item9|SerialNumber)</EM4> à <EM4>~mission(Dropoff7|Address)</EM4>\n     · Colis <EM4>#~mission(Item10|SerialNumber)</EM4> à <EM4>~mission(Dropoff7|Address)</EM4>\n\nAu plaisir de travailler avec vous,\n\nUnified Distribution Management\n-Livrez les Colis Intacts-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
UDM_courier_fromdc_small_desc_001=Salutations Partenaire d'Expédition Qualifié !\n\nSi vous êtes à la recherche d'un moyen simple de gagner des crédits, ne cherchez plus ! Il y a quelques colis qui attendent d'être livrés dans ~mission(Pickup1|Address) à ~mission(Pickup1).\n\nENLÈVEMENT DE COLIS \n     · Tous les colis se trouvent dans <EM4>~mission(Pickup1)</EM4> à <EM4>~mission(Pickup1|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> à <EM4>~mission(Dropoff4|Address)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> à <EM4>~mission(Dropoff5|Address)</EM4> \n\nAu plaisir de travailler avec vous,\n\nUnified Distribution Management\n-Livrez les Colis Intacts-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_courier_todc_med_desc_001=Salutations Partenaire d'Expédition Qualifié !\n\nVous êtes prêt à vous essayer à la livraison d'un lot de colis assez important ? Alors pourquoi ne pas nous aider à apporter ce lot à ~mission(Dropoff1) à ~mission(Dropoff1|Address). Libérez d'abord suffisamment d'espace sur votre vaisseau et vous devriez être prêt !\n\nENLÈVEMENT DE COLIS ( DANS N'IMPORTE QUEL ORDRE) \n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Pickup2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Pickup3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> à <EM4>~mission(Pickup4|Address)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> à <EM4>~mission(Pickup5|Address)</EM4>\n     · Colis <EM4>#~mission(Item6|SerialNumber)</EM4> à <EM4>~mission(Pickup5|Address)</EM4>\n     · Colis <EM4>#~mission(Item7|SerialNumber)</EM4> à <EM4>~mission(Pickup6|Address)</EM4>\n     · Colis <EM4>#~mission(Item8|SerialNumber)</EM4> à <EM4>~mission(Pickup6|Address)</EM4>\n     · Colis <EM4>#~mission(Item9|SerialNumber)</EM4> à <EM4>~mission(Pickup7|Address)</EM4>\n     · Colis <EM4>#~mission(Item10|SerialNumber)</EM4> à <EM4>~mission(Pickup7|Address)</EM4>\n\nLIEUX DE DÉPÔT\n     · Tous les colis doivent être livrés au <EM4>~mission(Dropoff1)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n\nAu plaisir de travailler avec vous,\n\nUnified Distribution Management\n-Livrez les Colis Intacts-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
UDM_courier_todc_small_desc_001=Salutations, Partenaire d'Expédition Qualifié !\n\nIntéressé par un itinéraire d'expédition simple et sans difficultés ? \nAlors, apportez quelques colis à ~mission(Dropoff1) de ~mission(Dropoff1|Address) devrait être le travail parfait pour vous ! \nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE) \n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Pickup2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Pickup3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> à <EM4>~mission(Pickup4|Address)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> à <EM4>~mission(Pickup5|Address)</EM4>\n\nLIEUX DE DÉPÔT\n     · Tous les colis doivent être livrés au <EM4>~mission(Dropoff1)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n\nAu plaisir de travailler avec vous,\n\nUnified Distribution Management\n-Livrez les Colis Intacts-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_internaldelivery_dc_desc_001=Salutations, Partenaire d'Expédition Qualifié !\n\nVous avez envie de vous plonger dans le monde complexe de la gestion de l'entreposage et du réaménagement des installations ? Alors ne manquez pas cette occasion de participer à l'organisation des colis suivants à <EM4>~mission(Location|Address)</EM4>.\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Pickup1)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Pickup2)</EM4>\n\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2)</EM4>\n\nSi cette offre vous intéresse, veuillez l'accepter sans tarder !\n\nAu plaisir de travailler avec vous,\n\nUnified Distribution Management\n-Livrez les Colis Intacts-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_internaldelivery_dc_desc_003=Salutations, Partenaire d'Expédition Qualifié !\n\nVous êtes prêt(e) à relever un défi et à exercer une activité gratifiante au sein d'une entreprise de transport de marchandises ? Alors nous avons une opportunité parfaite pour vous à <EM4>~mission(Location|Address)</EM4>. \n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Pickup1)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Pickup2)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Pickup3)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> à <EM4>~mission(Pickup4)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> à <EM4>~mission(Dropoff4)</EM4>\n\nPrenez donc ce contrat et mettez-vous au travail.\n\nAu plaisir de travailler avec vous,\n\nUnified Distribution Management\n-Livrez les Colis Intacts-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
UDM_internaldelivery_dc_desc_005=Salutations, Partenaire d'Expédition Qualifié !\n\nMême s'ils ne vont pas trop loin, les colis suivants à <EM4>~mission(Location|Address)</EM4> doivent être manipulés avec soin. Êtes-vous l'expert que nous recherchons ?\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Pickup1)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Pickup2)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Pickup3)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> à <EM4>~mission(Pickup4)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> à <EM4>~mission(Pickup5)</EM4>\n     · Colis <EM4>#~mission(Item6|SerialNumber)</EM4> à <EM4>~mission(Pickup6)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> à <EM4>~mission(Dropoff4)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> à <EM4>~mission(Dropoff5)</EM4> \n     · Colis <EM4>#~mission(Item6|SerialNumber)</EM4> à <EM4>~mission(Dropoff6)</EM4>\n\nTout ce que vous avez à faire est d'accepter le contrat et vous pourrez prendre la route.\n\nAu plaisir de travailler avec vous,\n\nUnified Distribution Management\n -Livrez les Colis Intacts-\n\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000
UDM_internaldelivery_dc_title_001=Manutentionnaire UDM <EM4>[500–2,000 Rep]</EM4>
UWC_Refueling_easy_desc_001=Hey là-bas,\n\nSi vous êtes équipé pour le ravitaillement, celle-ci pourrait vous plaire. \n\nUne balise vient d'être activée à <EM4>~mission(Location|Address)</EM4>, de la part d'un client dont le <EM4>~mission(Ship)</EM4> est à sec, alors assurez-vous que vos réservoirs de carburant sont bien pleins.\n\nLe vaisseau du client vous paiera au tarif de <EM4>~mission(FuelRate) aUEC par SCU d'hydrogène</EM4> et <EM4>~mission(QTFuelRate) aUEC par SCU de Quantum </EM4>, et en tant que prestataire du United Wayfarers Club, vous serez également éligible aux frais de service de l'UWC indiqués ci-dessus une fois terminé.\n\nÇa ressemble à une affaire sans histoire, mais ça ne coûte rien de garder vos scanners actifs.\nDites-moi si vous êtes intéressé et remettons ces braves gens en route.\n\nDans l'attente de votre réponse,\n\nDina Deloit\nCentre opérationnel\nUnited Wayfarers Club\n"On assure vos arrières"\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Bendix\n- Ezra\n- Harkin\n- Lindstrom\n- Marlin\n- Norfield\n- RN-7s\n- Torrez\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Targets x1\n<EM4>Friendlies:</EM4> Recipient x1\n<EM4>Unknown:</EM4> 2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Neutral:</EM4> +200 Rep\n<EM4>Jr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
UWC_Refueling_easy_title_001=DEMANDE DE RAVITAILLEMENT : ~mission(Ship) <EM4>[BP]</EM4> <EM4>[100–200 Rep]</EM4>
UWC_Refueling_high_desc_001=Salut,\n\nNouveau jour, nouvelle balise. Il y a un <EM4>~mission(Ship)</EM4> avec un réservoir vide à <EM4>~mission(Location|Address)</EM4>. Le vaisseau client vous paiera au tarif de <EM4>~mission(FuelRate) aUEC le SCU d'hydrogène</EM4> et <EM4>~mission(QTFuelRate) aUEC le SCU de Quantum</EM4>, et en tant que prestataire du United Wayfarers Club, vous serez également éligible aux frais de service de l'UWC indiqués ci-dessus une fois terminé.\n\nJe ne vais pas vous mentir : c'est un endroit horrible pour tomber en panne et pire encore pour se faire surprendre. Nous y avons perdu des gens bien - même ceux qui ont eu de la chance sont rentrés avec des morceaux en moins.\n\nSi vous décidez de prendre ce boulot, faites-moi une faveur et gardez l'œil bien ouvert. Si vous avez un ami qui a du temps libre, contactez-le peut-être pour un peu de renfort.\n\nJe suis peut-être paranoïaque, mais ça ne veut pas dire qu'ils ne sont pas là pour vous avoir, comme disait Maman Deloit. \nEn fait, elle n'a jamais dit ça - mais je suis presque sûre qu'elle l'aurait dit si elle avait fait ça pour gagner sa vie.\n\nFaites juste le travail et rentrez sain et sauf, d'accord ?\n\nDina Deloit\nCentre opérationnel\nUnited Wayfarers Club\n"On assure vos arrières"\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Bendix\n- Ezra\n- Harkin\n- Lindstrom\n- Marlin\n- Norfield\n- RN-7s\n- Torrez\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 3/7 | Risk 4/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Targets x4\n<EM4>Friendlies:</EM4> Recipient x1\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
UWC_Refueling_high_title_001=DEMANDE DE RAVITAILLEMENT CRITIQUE : ~mission(Ship) <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
UWC_Refueling_intro_desc_001=Hé !\n\nIci DD du United Wayfarers Club.\n\nL'UWC propose des services de réparation, de réarmement et de ravitaillement à travers l'UEE. Il se trouve justement que nous recherchons de nouveaux affiliés dont les vaisseaux sont équipés pour le ravitaillement. Si vous avez les réservoirs adéquats et que vous aimez que les gens soient ravis de vous voir, l'UWC est peut-être le club qu'il vous faut.\n\nEt si c'est le cas, j'ai une balise active qui pourrait vous intéresser.\n\nSi vous décidez d'y aller, un conseil d'ami : <EM4>assurez-vous que vos réservoirs sont pleins avant de partir</EM4>.\n\nUn membre du Club est tombé en panne de carburant à <EM4>~mission(Location|Address)</EM4>. Je n'ai pas tous les détails, comme la raison pour laquelle il s'est retrouvé là-bas sans "jus", mais l'UWC n'aime pas laisser ses membres en plan.\n\nLe vaisseau client vous paiera au tarif de <EM4>~mission(FuelRate) aUEC le SCU d'hydrogène</EM4> et  <EM4>~mission(QTFuelRate) aUEC le SCU de Quantum </EM4>. En tant que prestataire du United Wayfarers Club, vous serez également éligible aux frais de service de l'UWC indiqués ci-dessus une fois terminé.\n\nC'est une mission simple. Parfait si vous voulez vous familiariser avec ce genre de boulot. Allez-y, remplissez les réservoirs de son <EM4>~mission(Ship)</EM4> et remettez-le en route. À force de faire des missions comme celle-ci, ça deviendra un automatisme. D'ici là, il y a une <EM4>entrée de journal</EM4> sur votre mobiGlas appelée ""Protocoles de Ravitaillement"" qui couvre les bases.\n\nAucune activité de hors-la-loi n’a été signalée dans ce secteur, mais restez vigilant. Je vous recommande toujours d’essayer de terminer rapidement. Plus vite vous aurez fini, plus vite je pourrai vous confier un autre contrat. L'UWC cherche toujours de nouveaux affiliés.\n\nAu plaisir de travailler avec vous.\n\nDina Deloit\nCentre opérationnel\nUnited Wayfarers Club\n"On assure vos arrières"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Friendlies:</EM4> Recipient x1\n<EM4>Neutral:</EM4> +200 Rep
UWC_Refueling_intro_title_001=L'UWC RECRUTE DES RAVITAILLEURS <EM4>[200 Rep]</EM4>
UWC_Refueling_moderate_desc_001=Hé, vous !\n\nJ'ai une balise à <EM4>~mission(Location|Address)</EM4>. Il dit que ses réservoirs sont vides et demande un ravitaillement complet. Si ça vous intéresse, j'ai l'impression qu'il sera vraiment ravi de vous voir.\n\nLe vaisseau client vous paiera au tarif de <EM4>~mission(FuelRate) aUEC par SCU d'hydrogène</EM4> et <EM4>~mission(QTFuelRate) aUEC par SCU de Quantum </EM4>, et en tant que prestataire du United Wayfarers Club, vous serez également éligible aux frais de service de l'UWC indiqués ci-dessus une fois terminé.\n\nIl est coincé dans une zone qui a mauvaise réputation, même si les choses ont été un peu plus calmes récemment. Il vaudrait mieux rester vigilant, au cas où des ennuis rôderaient encore par là.\n\nQuoi qu'il en soit, plus vite tout le monde pourra reprendre les airs — vous y compris — mieux ce sera.\n\nBonne route,\n\nDina Deloit\nCentre opérationnel\nUnited Wayfarers Club\n"On assure vos arrières"\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Bendix\n- Ezra\n- Harkin\n- Lindstrom\n- Marlin\n- Norfield\n- RN-7s\n- Torrez\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 3/7 | Risk 4/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Targets x3\n<EM4>Friendlies:</EM4> Recipient x1\n<EM4>Jr. Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
UWC_Refueling_moderate_title_001=DEMANDE DE RAVITAILLEMENT URGENTE : ~mission(Ship) <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
UWC_Refueling_multiple_med_desc_001=Re-salut,\n\nJ'ai une balise à <EM4>~mission(Location|Address)</EM4> et celle-ci est de taille. Toute une petite flotte de vaisseaux s'est retrouvée à sec en même temps. C'est à la fois une coordination impressionnante et un manque de planification total.\n\nLe vaisseau client vous paiera au tarif de <EM4>~mission(FuelRate) aUEC le SCU d'hydrogène</EM4> et  <EM4>~mission(QTFuelRate) aUEC le SCU de Quantum </EM4>, et en tant que prestataire du United Wayfarers Club, vous serez également éligible aux frais de service de l'UWC indiqués ci-dessus une fois terminé.\n\nHeureusement, comme la zone où ils se trouvent est plutôt sûre, il ne devrait pas y avoir trop de problèmes à l'horizon, mais de nos jours, on ne sait jamais. Ça ne ferait pas de mal de les remettre en vol aussi vite que possible.\n\nBonne route,\n\nDina Deloit\nCentre opérationnel\nUnited Wayfarers Club\n"On assure vos arrières"\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Bendix\n- Ezra\n- Harkin\n- Lindstrom\n- Marlin\n- Norfield\n- RN-7s\n- Torrez\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Targets x3\n<EM4>Friendlies:</EM4> Recipient x3\n<EM4>Sr. Contractor:</EM4> +50 Rep\n<EM4>Head Contractor:</EM4> +50 Rep\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
UWC_Refueling_multiple_med_title_001=RAVITAILLEMENT URGENTE DE FLOTTE <EM4>[BP]</EM4> <EM4>[50–150 Rep]</EM4>
Vaughn_EliminateSpecific_FPS_Rockcracker_Maintenance_desc_001=J'ai eu beaucoup de mal à retrouver cette cible. Elle fait partie d'un gang connu sous le nom des « Claw Salamanders », qui a tendance à être assez nomade. Cependant, le groupe semble essayer de remettre en service une ancienne station QV Breaker, et c'est peut-être l'occasion rêvée d'éliminer ~mission(TargetName) une bonne fois pour toutes. \n\nCommencez vos recherches à ~mission(Location|Address).  Ces stations peuvent être très vastes, il vous faudra donc peut-être un peu de temps pour localiser la cible une fois sur place.\n\nMais j'ai toute confiance en vos capacités,\nVaughn\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Juggernauts x1\n<EM4>Jr. Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Vaughn_EliminateSpecific_FPS_Rockcracker_Power_desc_001=Une demande m'est parvenue concernant la mort prématurée d'un certain ~mission(TargetName), un membre des Claw Salamander qui rôde actuellement dans une ancienne station QV Breaker. \n\nIl y a de fortes chances que vous le trouviez à ~mission(Location|Address).  Sachez toutefois qu'avec une station aussi vaste, cela pourrait vous prendre un certain temps pour le localiser. \n\nJ'espère que vous apprécierez votre séjour dans Nyx,\nVaughn\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Juggernauts x1\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Vaughn_EliminateSpecific_FPS_Rockcracker_Warehouse_desc_001=~mission(TargetName), un membre du gang des Claw Salamanders dans le système Nyx, s'est retrouvé sur ma liste noire. Il était en fuite depuis un bon moment, mais il a refait surface récemment dans une vieille station minière de la ceinture de Keeger. C'est notre jour de chance, et ce sera aussi son dernier.  \n\nLe bruit court qu'on peut le trouver à  ~mission(Location|Address).  Hélas, il y a de fortes chances que vous deviez effectuer quelques réparations sur la station elle-même avant de pouvoir accéder à cette zone en particulier.\n\nMais je suis persuadé que ce défi ne vous fera pas peur.\n\nCordialement,\nVaughn\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Juggernauts x1\n<EM4>Neutral:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Vaughn_EliminateSpecific_FPS_Rockcracker_title_001=Un Repos Bien Mérité <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
WSTR_TimeTrial_repeat_desc_01=Prêt à établir un nouveau record personnel avec la Ligue Amateur Wildstar Racing ?\n\n~mission(RaceDetails)\n\DECHARGE DE RESPONSABILITE\nWildstar Wildstar Racing exige que le pilote contracté soit le véritable propriétaire du vaisseau, aucune substitution ni remplaçant n'est autorisée. Veuillez noter que Wildstar Racing utilise des pistes accessibles au public et que d'autres individus peuvent être présents. Wildstar Racing n'est pas responsable des dommages que votre vaisseau pourrait subir pendant la course.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
