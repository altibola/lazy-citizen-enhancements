LingFamily_RecoverCargo_Easy_Description=Bonjour,\n\nVous cherchez un petit boulot ? Nous avons un client qui attend une livraison, mais notre transporteur a eu des problèmes moteur. On n'arrive pas à le remettre en marche, alors nous avons besoin de quelqu'un pour prendre le relais.\n\nVolez jusqu'à <EM4>~mission(Location|Address)</EM4> et vous trouverez son vaisseau. Vous ne pouvez pas le manquer : c'est celui qui est immobile au milieu de l'espace. Assurez-vous de vous munir d'un <EM4>rayon tracteur puissant</EM4> ainsi que d'un vaisseau capable de transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>.\n\nUne fois les marchandises récupérées, emmenez-les jusqu'au monte-charge de <EM4>~mission(Destination|Address)</EM4>.\n\nMerci,  \nReyes Ling \nCoordinatrice Logistique de Cargaison\nLing Family Hauling \n\n\n\n\n\n\n\nLing Family Hauling sait que l'univers est dangereux et imprévisible et a mis en place plusieurs protocoles pour vous protéger, vous et les marchandises de nos clients. Afin que vous ne soyez pas pénalisé pour des circonstances indépendantes de votre volonté, le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès. Un délai de livraison sera fixé pour chaque transport. Toute cargaison non livrée à l'expiration de ce délai sera signalée comme volée et traitée comme telle. Tous les enlèvements et livraisons doivent être effectués par chargement automatique ou à l'aide d'un monte-charge.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Rookie:</EM4> +100 Rep
LingFamily_RecoverCargo_Easy_Title=Récupération d'une Cargaison Ling <EM4>[100 Rep]</EM4>
LingFamily_RecoverCargo_Hard_Description=Bonjour,\n\nMauvaise nouvelle. Malheureusement, notre transporteur a rencontré des difficultés et a dû abandonner la cargaison qu'il devait livrer. Nous n'avons reçu aucune nouvelle de sa part, nous craignons donc le pire.\n\nNous sommes en train de contacter sa famille et sommes conscients que c'est un moment très délicat, mais nous ne pouvons pas non plus nous permettre de laisser une livraison inachevée. Nos traceurs indiquent que la cargaison est toujours intacte à <EM4>~mission(Location|Address)</EM4>.\n\nSi vous pouviez terminer la livraison, nous vous en serions très reconnaissants. Nous ne détectons aucun autre vaisseau à proximité, vous devriez donc pouvoir récupérer la cargaison en toute sécurité. Apportez un <EM4>rayon tracteur puissant</EM4> et un vaisseau capable de transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>.\n\nLivrez la cargaison au monte-charge de <EM4>~mission(Destination|Address)</EM4> et nous nous occuperons du reste.\n\nMerci,  \nReyes Ling \nCoordinatrice Logistique de Cargaison\nLing Family Hauling \n\n\n\n\n\n\n\nLing Family Hauling sait que l'univers est dangereux et imprévisible et a mis en place plusieurs protocoles pour vous protéger, vous et les marchandises de nos clients. Afin que vous ne soyez pas pénalisé pour des circonstances indépendantes de votre volonté, le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès. Un délai de livraison sera fixé pour chaque transport. Toute cargaison non livrée à l'expiration de ce délai sera signalée comme volée et traitée comme telle. Tous les enlèvements et livraisons doivent être effectués par chargement automatique ou à l'aide d'un monte-charge.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Member:</EM4> +200 Rep
LingFamily_RecoverCargo_Hard_Title=Livraison Ling Bloquée <EM4>[200 Rep]</EM4>
LingFamily_RecoverCargo_Medium_Description=Bonjour,\n\nJ'ai une mission relativement simple à vous proposer, si ça vous intéresse.\n\nL'un de nos pilotes a ignoré un avertissement d'entretien et, comme on pouvait s'y attendre, son vaisseau est tombé en panne quelques heures plus tard près de <EM4>~mission(Location|Address)</EM4>. Le pilote est actuellement en route vers le bureau, mais nous aurions besoin d’un transporteur fiable disposant d’un vaisseau suffisamment grand pour transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4> afin de mener à bien cette livraison pour nous.\n\nPensez-vous pouvoir nous aider ? Il vous suffit de récupérer la cargaison bloquée et de la livrer au monte-charge de <EM4>~mission(Destination|Address)</EM4>.  Je n'ai probablement pas besoin de le préciser, mais un <EM4>rayon tracteur puissant</EM4> serait sans doute utile.\n\nMerci,\nReyes Ling \nCoordinatrice Logistique de Cargaison\nLing Family Hauling \n\n\n\n\n\n\n\nLing Family Hauling sait que l'univers est dangereux et imprévisible et a mis en place plusieurs protocoles pour vous protéger, vous et les marchandises de nos clients. Afin que vous ne soyez pas pénalisé pour des circonstances indépendantes de votre volonté, le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès. Un délai de livraison sera fixé pour chaque transport. Toute cargaison non livrée à l'expiration de ce délai sera signalée comme volée et traitée comme telle. Tous les enlèvements et livraisons doivent être effectués par chargement automatique ou à l'aide d'un monte-charge.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Junior:</EM4> +150 Rep
LingFamily_RecoverCargo_Medium_Title=Sauver une Livraison Ling Inachevée <EM4>[150 Rep]</EM4>
LingFamily_RecoverCargo_Super_Description=Bonjour, \n\nC'est bien notre chance, on décroche l'un des plus gros contrats de notre vie et voilà que les moteurs de notre transporteur tombent en panne. Ils ont fait de leur mieux pour le réparer, mais rien n'y fait.\n\nPourriez-vous vous rendre à <EM4>~mission(Location|Address)</EM4> et récupérer la cargaison pour nous ? Il est vraiment important qu'on montre à notre client qu'on est tout aussi fiables que les autres grands acteurs du secteur.\n\nSachez qu'il s'agit d'une cargaison volumineuse. Vous aurez besoin d'un vaisseau capable de transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4> et d'un <EM4>puissant rayon tracteur</EM4> pour tout déplacer. Une fois la cargaison transférée sur votre vaisseau, livrez-la au monte-charge de <EM4>~mission(Destination|Address)</EM4> et nous enverrons une confirmation au client.\n\nCompte tenu des circonstances, nous offrons un montant supérieur aux tarifs du marché à quiconque parviendra à mener cette mission à bien.\n\nMerci,\nReyes Ling \nCoordinatrice Logistique de Cargaison\nLing Family Hauling \n\n\n\n\n\n\n\nLing Family Hauling sait que l'univers est dangereux et imprévisible et a mis en place plusieurs protocoles pour vous protéger, vous et les marchandises de nos clients. Afin que vous ne soyez pas pénalisé pour des circonstances indépendantes de votre volonté, le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès. Un délai de livraison sera fixé pour chaque transport. Toute cargaison non livrée à l'expiration de ce délai sera signalée comme volée et traitée comme telle. Tous les enlèvements et livraisons doivent être effectués par chargement automatique ou à l'aide d'un monte-charge.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Unknown:</EM4> 1\n<EM4>Senior:</EM4> +300 Rep
LingFamily_RecoverCargo_Super_Title=Expédition Ling Bloquée en Attente de Livraison <EM4>[300 Rep]</EM4>
LingFamily_RecoverCargo_VeryEasy_Description=Bonjour,\n\nVoilà la situation : l'un de nos transporteurs a rencontré des problèmes à <EM4>~mission(Location|Address)</EM4> et a dû abandonner son vaisseau. Pouvez-vous vous rendre sur place pour terminer la livraison ?\n\nCe n'est pas une tâche très difficile, mais vous aurez tout de même besoin d'un <EM4>rayon tracteur puissant</EM4> et d'un vaisseau disposant de suffisamment d'espace pour stocker des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>.\n\nDéposez le cargaison au monte-charge de <EM4>~mission(Destination|Address)</EM4> et nous vous enverrons les crédits.\n\nMerci,\nReyes Ling \nCoordinatrice Logistique de Cargaison\nLing Family Hauling \n\n\n\n\n\n\n\nLing Family Hauling sait que l'univers est dangereux et imprévisible et a mis en place plusieurs protocoles pour vous protéger, vous et les marchandises de nos clients. Afin que vous ne soyez pas pénalisé pour des circonstances indépendantes de votre volonté, le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès. Un délai de livraison sera fixé pour chaque transport. Toute cargaison non livrée à l'expiration de ce délai sera signalée comme volée et traitée comme telle. Tous les enlèvements et livraisons doivent être effectués par chargement automatique ou à l'aide d'un monte-charge.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Trainee:</EM4> +50 Rep
LingFamily_RecoverCargo_VeryEasy_Title=Achever une Livraison Interrompue de Ling <EM4>[50 Rep]</EM4>
LingFamily_RecoverCargo_VeryHard_Description=Bonjour,\n\nNous recherchons un prestataire fiable pour nous aider à régler un petit problème.\n\nL'un de nos transporteurs nous a lâchés en plein milieu d'un contrat et la cargaison de notre client est désormais bloquée en transit. Je pense qu'il essayait de négocier un meilleur tarif avec nous, mais ce n'est pas ainsi que Ling fonctionne. Quoi qu'il en soit, il a jeté l'éponge et nous avons désespérément besoin que cette livraison soit soit menée à bien.\n\nPetra et moi travaillons avec ce client depuis des années maintenant et nous avons établi une bonne relation. Ce serait dommage de tout gâcher à cause d'un transporteur irresponsable. Pouvez-vous vous rendre à <EM4>~mission(Location|Address)</EM4> et récupérer la cargaison ? Vous aurez besoin d'un <EM4>rayon tracteur puissant</EM4> et d'un vaisseau capable de transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>. Transportez la cargaison jusqu'au monte-charge situé à <EM4>~mission(Destination|Address)</EM4> et nous vous paierons dès que possible. Nous apprécierions vraiment votre aide dans cette affaire et je suis sûr que notre client aussi.\n\nMerci,  \nReyes Ling \nCoordinatrice Logistique de Cargaison \nLing Family Hauling \n\n\n\n\n\n\n\nLing Family Hauling sait que l'univers est dangereux et imprévisible et a mis en place plusieurs protocoles pour vous protéger, vous et les marchandises de nos clients. Afin que vous ne soyez pas pénalisé pour des circonstances indépendantes de votre volonté, le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès. Un délai de livraison sera fixé pour chaque transport. Toute cargaison non livrée à l'expiration de ce délai sera signalée comme volée et traitée comme telle. Tous les enlèvements et livraisons doivent être effectués par chargement automatique ou à l'aide d'un monte-charge.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Experienced:</EM4> +200 Rep
LingFamily_RecoverCargo_VeryHard_Title=Livraison d'une Cargaison Ling Abandonnée <EM4>[200 Rep]</EM4>
LingFamily_UGF_collect_desc_001=Hé,\n\nNous avons besoin de vous pour récupérer des colis à <EM4>~mission(Location|Address)</EM4> et que vous les apportiez à <EM4>~mission(Destination|Address)</EM4>.\n\nJ'allais envoyer mon frère Ricki s'en occuper, mais il a dit que la zone était trop dangereuse. Je suppose qu'il y a eu un tas d'avertissements de sécurité dans le coin, mais tant que vous êtes prudents et que vous apportez des armes ou autre, je suis sûr que vous vous en sortirez. Vous ne rencontrerez probablement personne. \n\nMerci, \nConni Ling\nCoordinatrice d'Expéditions\nLing Family Hauling\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Unknown:</EM4> 4
