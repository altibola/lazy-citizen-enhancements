Foxwell_EliminateAll_desc_001=Recherche quelqu'un prêt à évacuer les ordures à <EM4>~mission(Location|Address)</EM4>. On dirait qu'un gang s'est installé sans la permission des propriétaires. Ces derniers nous ont donc engagés pour les faire partir par tous les moyens possibles. \n\nJ'apporterais beaucoup de munitions, si j'étais vous. J'en doute qu'ils veuillent partir de leur plein gré. \n\n\nMarcus Clenn\nFoxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Juggernauts x1, Snipers x5, Soldiers x12\n<EM4>Jr. Security Contractor:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -500 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_EliminateAll_title_001=Coup de Balai et Nettoyage de Site <EM4>[BP]</EM4> <EM4>[500 Rep]</EM4>
Foxwell_EliminateSpecific_NonHostiles_desc_001=Nous avons reçu un tuyau sur une prime nommée <EM4>~mission(TargetName)</EM4>. Quelqu'un l'a repéré avec des complices criminels connus à <EM4>~mission(Location|Address)</EM4>. Nous avons besoin de vous pour vous y rendre avant que le groupe ne prenne la poudre d'escampette. \n\n<EM4>~mission(TargetName|Last)</EM4> a la réputation de ne se montrer que dans des endroits avec des civils. J'ai vraiment besoin que vous vous occupiez de cette prime sans qu'il y ait de dommages collatéraux. Foxwell ne peut pas se permettre d'être pris dans un scandale qui éclaterait à cause de la perte de vies innocentes. \n\n\nMarcus Clenn\nFoxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4\n<EM4>Security Trainee:</EM4> +1,000 Rep\n<EM4>Failure Penalty:</EM4> -500 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
