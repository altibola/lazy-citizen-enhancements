LingFamily_HaulCargo_MultiToSingle_desc_CFPAmenities=Salut, \n \nSeriez-vous disposé à faire un transport vers Pyro ? Je sais que ça peut devenir dangereux là-bas, mais c’est pour une bonne cause. Un groupe de nouveaux membres des CFP a emménagé à <EM4>~mission(Destination|Address)</EM4> et a du mal à s’adapter à la vie dans le système. Ils ont laissé des affaires derrière eux dans Stanton, faute de place chez leur transporteur, et nous avons été engagés pour tout récupérer et le leur amener. \n\nVoici les points de collecte : \n\nLIEUX D'ENLÈVEMENT (N'IMPORTE QUEL ORDRE) \n\n~mission(MultiToSingleToken) \n\nLes dirigeants des CFP espèrent que le fait de leur apporter ces affaires leur permettra de se sentir davantage chez eux dans le système. Assurons-nous que tout se passe bien. N’oubliez pas d’équiper votre <EM4>rayon tracteur portable</EM4> et de prendre un vaisseau pouvant embarquer des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>. \n \n\nBon transport, \nReyes Ling \nCoordinatrice Logistique de Cargaison \nLing Family Hauling\n\n\n\n\n\n\n\nLing Family Hauling sait que l'univers est dangereux et imprévisible et a mis en place plusieurs protocoles pour vous protéger, vous et les marchandises de nos clients. Afin que vous ne soyez pas pénalisé pour des circonstances indépendantes de votre volonté, le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès. Un délai de livraison sera fixé pour chaque transport. Toute cargaison non livrée à l'expiration de ce délai sera signalée comme volée et traitée comme telle. Tous les enlèvements et livraisons doivent être effectués par chargement automatique ou à l'aide d'un monte-charge.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-B] Guardian\n- [IND-S2-B] Citadel\n- [IND-S3-B] Barbican\n- [STH-S1-A] Spectre\n- [STH-S1-B] Zephyr\n- [STH-S2-A] Spicule\n- [STH-S2-B] Bolt\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Rookie:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
