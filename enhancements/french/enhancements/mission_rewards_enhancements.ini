BHG_Certification_Medium_Desc=--------------------------------------------------------\n----------------- CONTRAT DE CHASSE À LA PRIME -----------------\n--------------------------------------------------------\n\nGUILDE DES CHASSEURS DE PRIME\nTRAITEMENT & DISTRIBUTION\n\nLa Guilde des Chasseurs de Primes a autorisé une prime officielle.\n\nNOM : ~mission(TargetName) \nSYSTÈME : ~mission(System)\nRISQUES ENCOURUS : Modérés\nDERNIER EMPLACEMENT CONNU : ~mission(Location)\nAFFILIATIONS CONNUES : <Aucune>\nNOTES : Grâce aux progrès que vous avez réalisés dans le développement de vos compétences, la Guilde des Chasseurs de Primes aimerait vous offrir la chance d'obtenir votre licence de chasseur .\n\n Cette licence signifierait que vous êtes qualifié pour suivre et appréhender des Cibles à Risque Modéré (CRM). Ces criminels pilotent traditionnellement des vaisseaux de taille moyenne avec plusieurs escortes. Cette classe de hors-la-loi constitue la majeure partie des contrats que les chasseurs de primes typiques rencontreront.\n\n Pour réussir ce processus de certification, vous devez appréhender un criminel classé CRM du nom de <EM4>~mission(TargetName)</EM4> vu pour la dernière fois à <EM4>~mission(Location|Address)</EM4>.\n\n\nGUILDE DES CHASSEURS DE PRIMES\nÀ la poursuite de la justice\n\nLa Guilde des chasseurs de primes est un service de sécurité agréé par la Guilde des mercenaires et autorisé à agir dans l'UEE et au-delà, conformément aux lois de l'Autorité du Commerce Extraterrestre.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 2
