Foxwell_DefendLocation_M_Desc_001=Des clients nous signalent des attaques de hors-la-loi sur des vaisseaux aux alentours de <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4>. Ils ont été verrouillés et toute personne entrant ou sortant de la zone est une cible. Toutes les tentatives pour résoudre le problème ont échoué et les hors-la-loi ont appelé des renforts.\n\nLe client cherche désespérément une solution, c'est pourquoi nous engageons un prestataire pour rétablir la paix dans la région. Si d'autres problèmes surviennent une fois que vous serez sur place, je vous communiquerai les instructions à suivre.  \n\nJ'ai vraiment besoin de quelqu'un rapidement. Ainsi, pour rendre la mission plus intéressante, l'entrepreneur principal recevra également un bonus de <EM4>~mission(ScripAmount) jetons de la Guilde des Mercenaires</EM4>.\n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- [S1-A] Antium Arms Storm\n- [S1-A] Antium Core Storm\n- [S1-A] Antium Helmet Storm\n- [S1-A] Antium Legs Storm\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4, Hostiles x2, Interdiction Ships x1, Reinforcements x14\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_DefendLocation_M_Title_001=Niveau Orange : Besoin de Protéger un Vaisseau <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
Foxwell_DefendLocation_S_Desc_001=Nous recherchons un professionnel chevronné pour mener à bien une mission à faut risque. Nous avons des clients VIP à <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> qui font face à des hors-la-loi extrêmement agressifs et motivés qui ciblent les vaisseaux à proximité. Les détails exacts de l'attaque sont encore flous, mais il semble s'agir d'une opération de grande envergure menée sur plusieurs fronts. \n\nSi vous êtes disponible, je vous recommande vivement d'apporter des vaisseaux de soutien supplémentaires au combat , beaucoup de provisions et de sortir le grand jeu. Si vous réussissez, nous récompenserons le prestataire principal avec un bonus de <EM4>~mission(ScripAmount) Jetons de la Guilde des mercenaires.</EM4>.\n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- [S1-A] Antium Arms Storm\n- [S1-A] Antium Core Storm\n- [S1-A] Antium Helmet Storm\n- [S1-A] Antium Legs Storm\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x10, Hostiles x3, Interdiction Ships x6, Reinforcements x20\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Head Contractor:</EM4> +16,000 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_DefendLocation_S_Title_001=Niveau Rouge : Soutenir des clients VIP <EM4>[BP]</EM4> <EM4>[300–16,000 Rep]</EM4>
Foxwell_DefendLocation_VE_Desc_001=Des vaisseaux hors-la-loi harcèlent toute personne tentant d'atterrir ou de quitter les installations de notre client à <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4>. Besoin de quelqu'un pour s'y rendre afin de défendre le site et protéger les vaisseaux de notre client avant que la situation ne devienne incontrôlable. Allez-y, poursuivez ces agresseurs, et je vous tiendrai au courant de l'évolution de la situation. \n\nAidez-nous à régler ce problème et nous verserons une prime de <EM4>~mission(ScripAmount) jetons de la Guilde des mercenaires</EM4> au prestataire principal.\n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- [S1-A] Antium Arms Storm\n- [S1-A] Antium Core Storm\n- [S1-A] Antium Helmet Storm\n- [S1-A] Antium Legs Storm\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2, Hostiles x1, Reinforcements x6\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_DefendLocation_VE_Title_001=Niveau Jaune : Faire face aux agresseurs <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_DefendLocation_VH_Desc_001=Besoin d'une assistance immédiate à <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4>. Les intérêts de notre client dans la région font l'objet d'une attaque féroce de la part de hors-la-loi. Nous cherchons quelqu'un capable de récupérer son équipement, quelques vaisseaux de soutien en qui il peut avoir confiance, et de se déployer avant qu'il ne soit trop tard. Une fois sur place, je vous tiendrai au courant de la situation.  \n\nNe ratez pas cette mission. Ces clients paient pour une protection de premier ordre. Si quelque chose tourne mal, nous pourrions perdre ce contrat. C'est pourquoi nous donnerons au prestataire principal un bonus de <EM4>~mission(ScripAmount) jetons de la Guilde des mercenaires</EM4> si tout se passe bien.\n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- [S1-A] Antium Arms Storm\n- [S1-A] Antium Core Storm\n- [S1-A] Antium Helmet Storm\n- [S1-A] Antium Legs Storm\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x7, Hostiles x3, Interdiction Ships x4, Reinforcements x16\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
