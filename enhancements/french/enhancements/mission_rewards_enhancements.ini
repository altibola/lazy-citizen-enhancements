BHG_Certification_Criminal_Desc=--------------------------------------------------------\n----------------- CONTRAT DE CHASSE À LA PRIME -----------------\n--------------------------------------------------------\n\nGUILDE DES CHASSEURS DE PRIME\nTRAITEMENT & DISTRIBUTION\n\nLa Guilde des Chasseurs de Primes a autorisé une prime officielle.\n\nNOM : ~mission(TargetName) \nSYSTÈME : Inconnu\nRISQUES ENCOURUS : Élevés\nDERNIER EMPLACEMENT CONNU : Inconnu\nAFFILIATIONS CONNUES : <Aucune>\nNOTES : Sur recommandation de l'un de nos membres, la Guilde des Chasseurs de Primes aimerait vous offrir la possibilité d'obtenir votre Certificat d'Appréhension de Suspect.\n\nCela signifie que vous êtes qualifié pour traquer et appréhender les suspects recherchés qui se sont révélés plus insaisissables que les primes habituelles. Ils ont souvent des compétences de pilotage avancées, un comportement difficile à prévoir et plus de ressources que les cibles classiques, ce qui fait d'eux un véritable défi.\n\nPour réussir ce processus de certification, vous devez appréhender le suspect recherché <EM4>~mission(TargetName)</EM4>.\n\n\nGUILDE DES CHASSEURS DE PRIMES\nÀ la poursuite de la justice\n\nLa Guilde des chasseurs de primes est un service de sécurité agréé par la Guilde des mercenaires et autorisé à agir dans l'UEE et au-delà, conformément aux lois de l'Autorité du Commerce Extraterrestre.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50
BHG_Certification_Criminal_Title=Certificat d'Appréhension de Suspect <EM4>[50 Rep]</EM4>
BHG_Certification_Easy_Desc=--------------------------------------------------------\n----------------- CONTRAT DE CHASSE À LA PRIME -----------------\n--------------------------------------------------------\n\nGUILDE DES CHASSEURS DE PRIME\nTRAITEMENT & DISTRIBUTION\n\nLa Guilde des Chasseurs de Primes a autorisé une prime officielle.\n\nNOM : ~mission(TargetName) \nSYSTÈME : ~mission(System)\nRISQUES ENCOURUS : Faibles\nDERNIER EMPLACEMENT CONNU : ~mission(Location)\nAFFILIATIONS CONNUES : <Aucune>\nNOTES : Après une évaluation de vos capacités, la Guilde des Chasseurs de Primes aimerait vous offrir la chance d'obtenir votre Permis de Traqueur Débutant.\n\nCe permis signifie que vous êtes qualifié pour traquer et appréhender les Cibles à Risque Faible (CRF). Ces criminels volent habituellement sur des vaisseaux légers, mais peuvent avoir des escortes, ce qui les rend plus difficile à appréhender.\n\nPour réussir ce processus de certification, vous devez appréhender un criminel classé CRF sous le nom de <EM4>~mission(TargetName)</EM4>, vu pour la dernière fois à <EM4>~mission(Location|Address)</EM4>.\n\n\nGUILDE DES CHASSEURS DE PRIMES\nÀ la poursuite de la justice\n\nLa Guilde des Chasseurs de Primes est un service de sécurité agréé par la Guilde des mercenaires et autorisé à agir dans l'UEE et au-delà, conformément aux lois de l'Autorité du Commerce Extraterrestre.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 3
