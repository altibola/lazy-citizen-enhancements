cfp_ChainElimAll_1C_ElimSpec_GenAttack_E_desc_001=Nous avons besoin de tout le personnel de sécurité disponible pour se présenter à ~mission(Location|Address). Un groupe d'individus armés a attaqué l'un de nos avant-postes et nous avons désespérément besoin d'aide. Bien que le groupe ne semble pas être affilié à l'un des gangs connus, nous avons appris que leur chef est ~mission(TargetName), un hors-la-loi local à la réputation vicieuse.\n\nVeuillez partir dès que possible et sécuriser la zone en éliminant les hors-la-loi et ~mission(TargetName|Last).\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Brimstone" Rifle\n- [S1-A] Artimex Arms Lodestone\n- [S1-A] Artimex Core Lodestone\n- [S1-A] Artimex Helmet Lodestone\n- [S1-A] Artimex Legs Lodestone\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x7, Juggernauts x1, Soldiers x5, Technicians x5\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_1C_ElimSpec_GenAttack_E_title_001=Alerte : ~mission(Location) attaqué <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_1C_ElimSpec_HHAttack_M_desc_001=Nous recherchons actuellement des agents de sécurité qualifiés et disponibles pour se rendre à ~mission(Location|Address) et récupérer une installation des CFP qui a été prise par les Headhunters. \n\nLe groupe qui occupe actuellement l'avant-poste est dirigé par ~mission(TargetName), un Headhunter d'une certaine importance qui a déjà agressé des habitants et des volontaires des CFP. Nous avons besoin que tous les Headhunters soient neutralisés et que ~mission(TargetName|Last) soit éliminée.\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Brimstone" Rifle\n- [S1-A] Artimex Arms Lodestone\n- [S1-A] Artimex Core Lodestone\n- [S1-A] Artimex Helmet Lodestone\n- [S1-A] Artimex Legs Lodestone\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x6, Juggernauts x1, Soldiers x7, Technicians x6\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_1C_ElimSpec_HHAttack_M_title_001=Récupération des Headhunters <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_1C_HHAttack_M_desc_001=Nous venons de recevoir une communication frénétique de ~mission(Location|Address) et nous recherchons tous les spécialistes du combat disponibles pour nous aider à repousser une attaque Headhunter. Il y a encore des ennemis sur place et des rapports font état de plusieurs victimes, nous devons donc régler cette situation rapidement.\n\nJe fournirai toutes les données pertinentes dès acceptation. Merci pour votre aide.\n\nLima Endicott\nRépartiteur principal\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Fate" Rifle\n- [S1-A] Artimex Arms (Modified)\n- [S1-A] Artimex Core (Modified)\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x6, Soldiers x7, Technicians x7\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_1C_HHAttack_M_title_001=Aidez à défendre ~mission(Location) contre les Headhunters <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_2C_ElimSpec_GenAttack_M_desc_001=Plusieurs groupes des CFP près de ~mission(Location|Address) viennent d'être touchés par un groupe de hors-la-loi dirigé par ~mission(TargetName). Nous recherchons tous les spécialistes du combat disponibles pour nous aider à reprendre les avant-postes. \n\nJe peux vous fournir les emplacements sur acceptation, mais nous devons nettoyer l'avant-poste principal et les installations satellites de toutes les forces hostiles et éliminer ~mission(TargetName|Last), car il est peu probable qu'ils cessent leurs hostilités s'ils s'enfuient.\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Brimstone" Rifle\n- [S1-A] Artimex Arms Lodestone\n- [S1-A] Artimex Core Lodestone\n- [S1-A] Artimex Helmet Lodestone\n- [S1-A] Artimex Legs Lodestone\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x8, Juggernauts x1, Soldiers x7, Technicians x6\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_2C_ElimSpec_GenAttack_M_title_001=Attaque de hors-la-loi à ~mission(Location) <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_2C_ElimSpec_HHAttack_H_desc_001=Citizens for Prosperity recherche des agents de sécurité disponibles pour reprendre plusieurs anciennes installations des CFP sous le contrôle des Headhunters près de ~mission(Location|Address). Ces installations nous ont été violemment arrachées par ~mission(TargetName) et ont entraîné la mort de nombreux volontaires.\n\nLe retour de ces avant-postes sous notre contrôle permettra d'apporter plus de stabilité au système. Les rapports indiquent que ~mission(TargetName|Last) a tendance à se cacher derrière ses troupes, ils apparaîtront donc probablement une fois que vous aurez éliminé la plupart des hostiles.\n\nLes XenoThreat sont entraînés et motivés, ils n'abandonneront donc pas facilement.\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Brimstone" Rifle\n- [S1-A] Artimex Arms Lodestone\n- [S1-A] Artimex Core Lodestone\n- [S1-A] Artimex Helmet Lodestone\n- [S1-A] Artimex Legs Lodestone\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x7, Juggernauts x1, Soldiers x7, Technicians x8\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_2C_ElimSpec_HHAttack_H_title_001=Reprendre les Avant-postes des Headhunters <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_2C_ElimSpec_XTAttack_H_desc_001=Nous recherchons du personnel de sécurité disponible pour récupérer plusieurs clusters précédemment perdues aux mains des agresseurs XenoThreat. Situés près de ~mission(Location|Address), ils ont été saisis lors d'attaques brutales menées par ~mission(TargetName), un lieutenant notoire XenoThreat.\n\nNous cherchons à reprendre ces clusters afin de pouvoir rétablir les opérations et continuer notre bon travail. Vous devrez éliminer tous les ennemis encore présents sur le site ainsi que ~mission(TargetName|Last).\n\nJe vous rappelle que XenoThreat sont très entraînés et rapides au combat, alors préparez-vous en conséquence.\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Brimstone" Rifle\n- [S1-A] Artimex Arms Lodestone\n- [S1-A] Artimex Core Lodestone\n- [S1-A] Artimex Helmet Lodestone\n- [S1-A] Artimex Legs Lodestone\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x10, Juggernauts x1, Soldiers x8, Technicians x9\n<EM4>Head Contractor:</EM4> +400 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_2C_ElimSpec_XTAttack_H_title_001=Reprendre les Avant-postes des XenoThreat <EM4>[BP]</EM4> <EM4>[400 Rep]</EM4>
cfp_ChainElimAll_3C_ElimSpec_GenAttack_M_desc_001=La présence des hors-la-loi ici est devenue beaucoup plus forte ces derniers temps et beaucoup de gens souffrent. Nous avons récemment perdu plusieurs installations autour de ~mission(Location|Address). Bien que nous n'aimions pas avoir recours à la violence, le conseil a reconnu que ces lieux sont cruciaux pour établir la stabilité dans le système et a autorisé l'utilisation d'un détachement de sécurité pour les reprendre.\n\nNous savons également que les ennemis sont dirigés par ~mission(TargetName), qui a déjà attaqué des centres d'intérêt des CFP. Le conseil souhaite que ~mission(TargetName|Last) soit éliminé afin d'éviter de nouvelles attaques.\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Fate" Rifle\n- [S1-A] Artimex Arms (Modified)\n- [S1-A] Artimex Core (Modified)\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x7, Juggernauts x1, Soldiers x8, Technicians x7\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_3C_ElimSpec_GenAttack_M_title_001=Reprendre plusieurs avant-postes des CFP <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_3C_ElimSpec_HHAttack_VH_desc_001=Le conseil d'administration des Citizens for Prosperity vient d'autoriser l'embauche de personnel de sécurité pour reprendre plusieurs zones près de ~mission(Location|Address) qui sont tombés entre les mains des Headhunters. Bien que nous ayons essayé d'accepter cette perte, il est devenu évident qu'ils sont essentiels à la poursuite de nos opérations dans le système.\n\nVous devrez nettoyer chacun des emplacements qui vous seront transmis, mais plus important encore, vous devrez également éliminer ~mission(TargetName), qui est en charge des ennemis sur le site.\n\nCes Headhunters sont fortement intégrés et ont des antécédents de violence, vous devez donc vous préparer en conséquence. \n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Fate" Rifle\n- [S1-A] Artimex Arms (Modified)\n- [S1-A] Artimex Core (Modified)\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x9, Juggernauts x1, Soldiers x8, Technicians x8\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_3C_ElimSpec_HHAttack_VH_title_001=Récupération de Clusters des Headhunters <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_3C_ElimSpec_XTAttack_VH_desc_001=Bien que les Citizens for Prosperity s'engagent à changer les choses par des moyens non violents, il est devenu évident que des exceptions pourraient devoir être faites. Les zones de sécurité des CFP près de ~mission(Location|Address) ont été récemment et violemment prises par les forces XenoThreat sous le commandement de ~mission(TargetName).\n\nNous recherchons tous les agents de combat disponibles pour aider à reprendre ces avant-postes. Ce sera sans aucun doute une entreprise difficile car les XenoThreat sont très bien entraînés et désireux de se battre, vous devez donc vous préparer en conséquence.\n\nEn plus de nettoyer chaque groupe des forces XenoThreat, vous devrez éliminer ~mission(TargetName|Last), dont la perte rendra certainement le système plus sûr. \n\nBonne chance,\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Fate" Rifle\n- [S1-A] Artimex Arms (Modified)\n- [S1-A] Artimex Core (Modified)\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 5/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> CQC x16, Juggernauts x1, Soldiers x13, Technicians x11\n<EM4>Head Contractor:</EM4> +400 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_3C_ElimSpec_XTAttack_VH_title_001=Campagne de reconquête des avant-postes XenoThreat <EM4>[BP]</EM4> <EM4>[400 Rep]</EM4>
cfp_EliminateAllFF_Desc_001=CFP Pyro EliminateAll FrontierFighters\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x2, Kopions x2, Sentries x1, Soldiers x4, Technicians x2\n<EM4>Neutral:</EM4> +25 Rep
cfp_EliminateAllFF_Title_001=cfp EliminateAllFF Title 001 <EM4>[25 Rep]</EM4>
cfp_EliminateSpecific_Generic_E_desc_001=Des rapports indiquent que ~mission(Location|Address) a été attaquée par un groupe d'individus armés dirigé par un hors-la-loi notoire nommé ~mission(TargetName). De nombreux morts et blessés ayant été signalés, Citizens for Prosperity recherche des agents de combat qualifiés pour apporter un soutien. \n\nBien que nous ne préconisions pas la résolution des conflits par la violence, nous pensons que le groupe se dispersera si ~mission(TargetName|Last) n'est plus là pour le diriger.\n\nAllez-y dès que possible. Des vies sont en jeu.\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x3, Snipers x2, Soldiers x4, Technicians x3\n<EM4>Neutral:</EM4> +75 Rep
cfp_EliminateSpecific_Generic_E_title_001=Protection contre ~mission(TargetName|Last) <EM4>[75 Rep]</EM4>
cfp_HaulCargo_RegionLink_desc_001=Bonjour, nous avons besoin de transporter du fret à travers le système et nous nous demandions si vous pouviez nous aider. Je sais que ce n'est pas dans vos attributions habituelles, mais je n'ai pas beaucoup d'options. Ce serait également un bon moyen de montrer votre engagement envers la mission des Citizens for Prosperity.\n\nSi vous vous rendez à <EM4>~mission(Location|Address)</EM4>, il devrait y avoir du fret accessible via un monte-charge que vous devrez amener à un autre monte-charge à <EM4>~mission(Destination|Address)</EM4>.\n\nLa seule chose à signaler est que votre vaisseau doit être capable de prendre en charge des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>. Pour vous faciliter la tâche, assurez-vous d'avoir un <EM4>rayon tracteur portable</EM4> avec vous. À part ça, la course devrait être simple. \n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +200 Rep
cfp_HaulCargo_RegionLink_title_001=Besoin d'un Transporteur <EM4>[200 Rep]</EM4>
cfp_RetrieveConsignment_desc_001=Vous êtes disponible pour un travail ? L'un de nos sites sécurisés a été attaqué par des hors-la-loi, et du matériel hautement confidentiel a été volé. Comme vous pouvez l'imaginer, Citizens for Prosperity souhaite le récupérer au plus vite.\n\nGrâce à un contact local, nous avons pu remonter la trace des hors-la-loi jusqu'à ~mission(Location|Address), où ils stockent les documents confidentiels dans un coffre automatisé sécurisé. Pour y accéder, vous devrez d'abord trouver le code de récupération correspondant et l'entrer sur le convoyeur du coffre. Notre meilleure hypothèse est qu'un des chefs des hors-la-loi portera le code sur lui, ce qui signifie qu'il y a de très fortes chances que vous deviez l'affronter directement pour l'obtenir.\n\nUne fois en possession du matériel confidentiel, nous souhaitons que vous le livriez à ~mission(Dropoff1|Address).\n\nVous ferez une grande différence pour beaucoup de gens si vous réussissez cette mission.\n\nMerci d'avance,\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Hostiles x54
cfp_RetrieveConsignment_title_001=Matériel Confidentiel Volé <EM4>[1,000–4,000 Rep]</EM4>
cfp_bombingrun_E_desc_001=Nous avons des problèmes croissants avec les hors-la-loi à ~mission(Location|Address) et nous ne pouvons plus rester les bras croisés alors que leurs actions agressives nuisent à notre communauté.\n\nNous hésitons à lancer une attaque à grande échelle, mais nous pensons que si leurs réserves de carburant sont détruites, cela les dissuadera de mener d'autres actions hostiles.\n\nSi vous êtes disponible, j'apprécierais que vous vous chargiez personnellement de la destruction du carburant. Un vaisseau capable de lancer des missiles serait probablement le plus adapté, mais je vous laisse en décider.\n\nMerci,\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- A03 Sniper Rifle\n- P6-LR Sniper Rifle\n- [S1-A] A03 Sniper Rifle Magazine (15 cap)\n- [S1-A] Argus Helmet\n- [S1-A] CBH-3 Helmet Base\n- [S1-A] P6-LR Magazine (8 cap)\n- [S1-A] PAB-1 Arms\n- [S1-A] PAB-1 Core\n- [S1-A] PAB-1 Legs\n- [S1-A] TrueDef-Pro Arms\n- [S1-A] TrueDef-Pro Core Base\n- [S1-A] TrueDef-Pro Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_bombingrun_E_title_001=Bombardement de Stocks de Carburant <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
cfp_bombingrun_sabotage_generators_desc_001=Il y a un groupe hors-la-loi à ~mission(Location|Address) qui est devenu de plus en plus effronté dans ses attaques contre les ressources desCitizens for Prosperity dans le système. \n\nAfin de minimiser les pertes humaines, nous allons d'abord essayer de les convaincre d'aller ailleurs en désactivant leurs générateurs et en détruisant leurs réserves de carburant. \n\nAvec un peu de chance, cela devrait suffire à les convaincre d'aller vers un horizons meilleurs. \n\nMerci,\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- A03 Sniper Rifle\n- P6-LR Sniper Rifle\n- [S1-A] A03 Sniper Rifle Magazine (15 cap)\n- [S1-A] Argus Helmet\n- [S1-A] CBH-3 Helmet Base\n- [S1-A] P6-LR Magazine (8 cap)\n- [S1-A] PAB-1 Arms\n- [S1-A] PAB-1 Core\n- [S1-A] PAB-1 Legs\n- [S1-A] TrueDef-Pro Arms\n- [S1-A] TrueDef-Pro Core Base\n- [S1-A] TrueDef-Pro Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_bombingrun_sabotage_generators_title_001=Réduction de Capacité Opérationnelle Hors-la-loi <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_bounty_desc_HeadHunters_001=Ceci est un avertissement général. Nous avons appris que les Headhunters transportent une grande quantité d'armes dans le système avec l'intention de lancer des attaques contre les colonies appartenant aux CFP.\n\nBien que nous croyions que le changement dans ce système ne peut venir que par la non-violence, la présence de ces armes entraînera inévitablement davantage de bains de sang et de dévastation. Nous voulons donc les retirer de l'équation.\n\nNous invitons tous nos partisans ayant une formation adéquate au combat à entreprendre cette mission dangereuse près de ~mission(Location|Address). Nous vous dédommagerons pour le risque énorme que vous prenez.\n\nMerci et soyez prudents,\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Reinforcements x2, Targets x1\n<EM4>Neutral:</EM4> +200 Rep
cfp_bounty_title_HeadHunters_001=Danger : Entrée d'Armes de Contrebande <EM4>[200 Rep]</EM4>
cfp_defend-criminals_desc_001=Nous avons appris que ~mission(Location|Address) est menacé par une attaque de hors-la-loi et a demandé de l’aide. Nous avons besoin de quelqu’un pour les protéger et repousser les hors-la-loi.\n\nAssurez-vous de rester à proximité après leur attaque initiale. Trop souvent, les hors-la-loi gagnent des combats simplement en envoyant plus de renforts qu’il n’est possible de défendre raisonnablement. Veillez donc à repousser tous les renforts avant de quitter la zone.\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro]</EM4>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM4>[Pyro RegionB]</EM4>\n- Karna "Fate" Rifle\n- [S1-A] Artimex Arms (Modified)\n- [S1-A] Artimex Core (Modified)\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x6, Juggernauts x2, Soldiers x10, Technicians x4\n<EM4>Neutral:</EM4> +75 Rep\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend-criminals_title_001=Défense de ~mission(Location) des Hors-la-loi <EM4>[BP]</EM4> <EM4>[75–200 Rep]</EM4>
cfp_defend-xenothreat_desc_001=Nous avons appris que XenoThreat s'apprête à lancer une attaque sur ~mission(Location|Address). Si l'attaque réussit, le nombre de victimes devrait être élevé. J'espère qu'avec votre aide pour les défendre, nous pourrons faire en sorte que cela ne se produise pas.\n\nNous savons, d'après les affrontements passés, que XenoThreat envoie plusieurs groupes de raiders pour mener leurs attaques. Assurez-vous de ne pas quitter l'avant-poste tant que vous n'avez pas repoussé tous les renforts.\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Fate" Rifle\n- [S1-A] Artimex Arms (Modified)\n- [S1-A] Artimex Core (Modified)\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x9, Soldiers x7, Technicians x9\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend-xenothreat_desc_002=Urgent!\n\nXenoThreat cible ~mission(Location|Address) pour envoyer un message aux autres colons sur ce qui se passe s'ils acceptent notre soutien.\n\nSi vous parvenez à repousser les attaquants, ils enverront probablement des renforts. Vous devrez donc vous préparer à plusieurs vagues d'assauts. Étant donné que XenoThreat dispose de nombreuses ressources, vous devriez envisager de recruter d'autres personnes pour vous aider à garder tout le monde en sécurité.\n\nNous comptons tous sur vous.\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x2, Juggernauts x1, Snipers x2, Soldiers x4, Technicians x4\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend-xenothreat_desc_003=Urgent!\n\nXenoThreat se mobilise pour une incursion massive afin d'effacer ~mission(Location|Address) de la carte. Vous êtes leur seul espoir de survivre à cette attaque et de les protéger de la cruauté des XenoThreat.\n\nJe sais que je vous demande de vous mettre en première ligne, mais ce système ne changera pas à moins que des personnes comme vous aient le courage d'affronter ces dangers. Aucun montant en crédits ne pourrait égaler le bien que vous feriez en intervenant.\n\nSi vous êtes prêt et capable d’accepter cette mission, assurez-vous de prendre des alliés avec vous. la XenoThreat enverra certainement des renforts plus puissants lorsqu’ils se rendront compte qu'ils subissent des pertes.\n\nNous croyons en vous.\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> CQC x4, Juggernauts x2, Snipers x3, Soldiers x8, Technicians x4\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend-xenothreat_title_001=Protection de ~mission(Location) de l'attaque XenoThreat <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_defend-xenothreat_title_002=Protection de ~mission(Location) du raid XenoThreat <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
cfp_defend-xenothreat_title_003=Protection de ~mission(Location) de l'incursion XenoThreat <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_defend_boss_Generic_desc_001=Nous venons de recevoir des rapports concernant une attaque massive contre ~mission(Location) par un grand groupe d'individus armés dirigés par ~mission(TargetName), un hors-la-loi notoire qui menace le personnel des Citizens for Prosperity depuis des mois. Les détails doivent encore être confirmés, mais nous savons qu'il y a eu plusieurs victimes.\n\nCitizens for Prosperity recherche tout personnel de sécurité qualifié pour aller reprendre les avant-postes de ces éléments hostiles. Notre compréhension est que ~mission(TargetName|Last) a tendance à se cacher derrière ses soldats, mais apparaîtra si vous éliminez suffisamment de leurs troupes de base.\n\nBien que nous n'aimions pas avoir recours à la violence, la direction ne voit aucune autre solution pour résoudre cette situation et poursuivre notre bon travail dans le système.\n\nBonne chance,\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms Canuto\n- [S1-A] Artimex Core Canuto\n- [S1-A] Artimex Helmet Canuto\n- [S1-A] Artimex Legs Canuto\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> CQC x90, Juggernauts x4\n<EM4>Veteran Contractor:</EM4> +800 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend_boss_Generic_title_001=~mission(Location|Address) a besoin d'aide <EM4>[BP]</EM4> <EM4>[800 Rep]</EM4>
cfp_defend_cave_Generic_desc_001=Nous avons reçu un appel de détresse de ~mission(Location|Address) nous informant qu'ils sont en train d'être attaqués par un petit groupe de hors-la-loi. ~mission(Location|CaveSize) Bien que cet avant-poste soit isolé, il représente un élément crucial de l'infrastructure des CFP dans la région, il nous faut donc le reprendre.\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x2, Soldiers x6\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend_cave_Generic_title_001=Besoin d'assistance à ~mission(Location) <EM4>[BP]</EM4> <EM4>[25 Rep]</EM4>
cfp_defend_headhunters_H_desc_001=Un appel de détresse vient de parvenir de ~mission(Location|Address) signalant qu'une importante force des Headhunters vient d'attaquer notre avant-poste là-bas. Il y a eu plusieurs morts et blessés parmi ceux qui ont réussi à fuir les lieux. Nous recherchons du personnel de sécurité disponible pour se rendre sur place et reprendre l'avant-poste.\n\nDes témoins ont identifiés les assaillants comme des exécuteurs d'élite Headhunters, alors soyez prudent et amenez du renfort si possible.\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x2, Snipers x2, Soldiers x6, Technicians x3\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend_headhunters_H_title_001=Attaque Headhunter à ~mission(Location) <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
cfp_defend_headhunters_M_desc_001=Les Headhunters ont lancé une attaque non justifiée contre ~mission(Location|Address). Bien que nous ne soyons pas favorables à l'usage de la violence, Citizens for Prosperity ne laissera pas mourir des innocents. Nous avons besoin de personnel de sécurité qualifié pour reprendre l'avant-poste.\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x1, Juggernauts x1, Snipers x1, Soldiers x3, Technicians x3\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend_headhunters_M_title_001=~mission(Location) a besoin d'assistance <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
cfp_defend_regionshift_desc_001=Nous avons reçu un signal de détresse en provenance de ~mission(Location|Address). Un groupe d'assaillants inconnus a mené une attaque. Plusieurs morts ont été rapportés, et nous devons reprendre le contrôle de l'avant-poste.\n\nJe sais que c'est loin de votre position actuelle, mais nous avons un besoin urgent de sécuriser la zone et de remettre l'avant-poste en activité.\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM4>[Pyro RegionC]</EM4>\n- Karna Rifle\n- [S1-A] Artimex Arms Canuto\n- [S1-A] Artimex Core Canuto\n- [S1-A] Artimex Helmet Canuto\n- [S1-A] Artimex Legs Canuto\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM4>[Pyro RegionD]</EM4>\n- Karna "Brimstone" Rifle\n- [S1-A] Artimex Arms Lodestone\n- [S1-A] Artimex Core Lodestone\n- [S1-A] Artimex Helmet Lodestone\n- [S1-A] Artimex Legs Lodestone\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x2, Juggernauts x1, Soldiers x6\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend_regionshift_title_001=Appel à l'Aide : ~mission(Location) <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
cfp_defendship_Intro_Desc_001=Citizens for Prosperity recherche des pilotes disposant d’une expérience au combat. Si vous souhaitez mettre vos capacités à l’épreuve, j’ai une mission à vous proposer. \n\nUn vaisseau civil a demandé une assistance au combat près de <EM4>~mission(Location|Address)</EM4>. Rendez-vous sur place et montrez-nous que vous avez les compétences nécessaires pour exceller dans ce type de missions, et nous vous mettrons à contribution. \n\nAttention : cette mission n’est pas un exercice. Il s’agit d’une intervention réelle, alors faites de votre mieux pour sauver le vaisseau en détresse. \n\nBonne chance,\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x2\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +50 Rep
cfp_defendship_Intro_title_001=Recherche Pilotes de Combat Expérimentés <EM4>[50 Rep]</EM4>
cfp_defendship_LRT_SB_Desc_001=Nous avons besoin d’un pilote capable de tenir tête dans un combat de vaisseaux. Un vaisseau de reconnaissance des Citizens for Prosperity a eu un accrochage avec les Shattered Blade près de <EM4>~mission(Location|Address)</EM4>. Ça doit être une zone sensible pour eux. Ils ont attaqué dès que notre vaisseau s’est approché, et ils ne semblent pas vouloir simplement le repousser. On dirait qu’ils veulent vraiment du sang. \n\nPourriez-vous intervenir avant que nous ne perdions ce vaisseau ?\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_LRT_SB_title_001=Fournir un Soutien au Combat <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
cfp_defendship_LRT_desc_001=L'un de nos pilotes venait de récupérer une cargaison de fournitures près de ~mission(Location|Address) lorsqu'il a été attaqué par des pirates agressifs.\n\nNous venons de recevoir leur balise de détresse, et j'espère que vous pourrez leur apporter un soutien en combat.\n\nToute l'aide que vous pourriez fournir pourrait faire la différence.\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Jr. Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> 100% chance (Easy only)\n\n<EM4>? = only the Easy variant awards blueprints</EM4>
cfp_defendship_LRT_title_001=Pilote Recherche Soutien au Combat <EM4>[BP?]</EM4> <EM4>[100–150 Rep]</EM4>
cfp_defendship_MRT_SB_title_001=Interruption de l'Attaque sur un Vaisseau\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_MRT_bombingrun_desc_001=L'un des nôtres est actuellement attaqué à ~mission(Location|Address). Ils ont tenté d'échapper à leurs assaillants pour se rendre en toute sécurité, mais les hors-la-loi se sont révélés trop habiles pour qu'ils puissent s'échapper. \n\nNous avons besoin que vous vous y rendiez, que vous vous engagiez avec les attaquants, puis que vous détruisiez les réserves de carburant à proximité. Nous espérons que cette démonstration de destruction les dissuadera de continuer à le poursuivre.\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Friendlies:</EM4> Ships to Defend x2\n<EM4>Veteran Contractor:</EM4> +200 Rep
cfp_defendship_MRT_bombingrun_title_001=Assister le Repli du Vaisseau <EM4>[200 Rep]</EM4>
cfp_defendship_MRT_desc_001=Un vaisseau affilié aux Citizens for Prosperity tentait de livrer des fournitures à ~mission(Location|Address) lorsqu'il a été attaqué par les destinataires qui ont refusé de payer leur achat et ont choisi la violence en guise de monnaie.\n\nJe vais demander à nos commerçants d'être plus prudents quant à leurs partenaires à l'avenir, mais pour l'instant, j'apprécierais vraiment que vous leur donniez un coup de main pour repousser ces attaquants.\n\nAvec ma gratitude,\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> 100% chance (Medium only)\n\n<EM4>? = only the Medium variant awards blueprints</EM4>
cfp_defendship_MRT_title_001=Vaisseau a Besoin d'une Aide d'Urgence <EM4>[BP?]</EM4> <EM4>[150–200 Rep]</EM4>
cfp_defendship_VLRT_SB_desc_001=Nous avons reçu un appel d’urgence d’un vaisseau affirmant être harcelé par les Shattered Blade. On pense que le pilote s’est trop approché de leur territoire et a attiré leur attention. Il a admis ne pas avoir beaucoup d’expérience au combat, alors je doute qu’il puisse tenir très longtemps. \n\nPouvez-vous vous rendre immédiatement à <EM4>~mission(Location|Address)</EM4> pour l’aider à survivre à l’attaque ?\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x2\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_VLRT_SB_title_001=Soutien au Vaisseau Attaqué <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
cfp_defendship_VLRT_desc_001=Il semble qu'une des routes que nous pensions relativement sûres se soit avérée dangereuse. Des hors-la-loi ont attaqué l'un de nos pilotes à ~mission(Location|Address), et il ne tiendra pas longtemps sans soutien.\n\nJe vous serais reconnaissant si vous pouviez vous y rendre rapidement pour l'aider à repousser ces attaquants.\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> 100% chance (VeryEasy only)\n\n<EM4>? = only the VeryEasy variant awards blueprints</EM4>
cfp_defendship_VLRT_title_001=Pilote en Difficulté <EM4>[BP?]</EM4> <EM4>[100 Rep]</EM4>
cfp_defendship_multi_HRT_SB_desc_001=L’un de nos convois a besoin d’aide au combat. On dirait qu’ils sont tombés sur une planque des Shattered Blade en voulant livrer des marchandises. Malgré tous leurs efforts, le convoi n’arrive pas à s’extraire de la zone. Nous cherchons un pilote de chasse prêt à se rendre à <EM4>~mission(Location|Address)</EM4> pour les aider à repousser l’attaque avant qu’il ne soit trop tard. \n \nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_multi_HRT_SB_title_001=Assistance au Convoi pris en Embuscade <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
cfp_defendship_multi_HRT_desc_001=Nous venons d'apprendre qu'un convoi de vaisseaux affiliés aux Citizens for Prosperity a été pris pour cible par des hors-la-loi et que nos équipes ont un besoin urgent d'assistance.\n\nSi vous êtes disponible, nous avons besoin de pilotes prêts au combat à ~mission(Location|Address) pour défendre nos équipes. Sachez qu'en ces temps critiques, nous ne pouvons pas nous permettre de perdre un seul vaisseau et comptons sur votre aide pour que tous nos membres s'en sortent vivants.\n\nBonne chance,\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_multi_HRT_title_001=Convoi Sous Attaque Brutale <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
cfp_defendship_multi_SRT_SB_desc_001=Un de nos convois s’est retrouvé dans une situation critique et a désespérément besoin d’aide. Les Shattered Blade ont lancé une attaque brutale dans une zone que nous pensions sûre. Ce convoi transporte principalement des fournitures et des nouvelles recrues. D’après les communications que je reçois, ils livrent un combat acharné mais risquent de ne pas tenir longtemps. \n\nSi vous êtes disponible, nous avons besoin de vous à <EM4>~mission(Location|Address)</EM4> prêt à affronter des adversaires sérieux. \n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_multi_SRT_SB_title_001=Interruption d'une Attaque Sauvage Shattered Blade <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_defendship_multi_SRT_desc_001=Je reçois des informations indiquant qu'un convoi des Citizens for Prosperity transportant des fournitures vitales est actuellement attaqué à <EM4>~mission(Location|Address)</EM4>. La perte de cette cargaison porterait un coup dur à nos opérations. \n\nSi vous avez les compétences nécessaires pour affronter des ennemis très agressifs, nous sommes tout à fait disposés à vous rémunérer pour votre aide. \n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_multi_SRT_title_001=Porter Assistance à un Convoi <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_defendship_multi_VHRT_SB_desc_001=Nous avons perdu le contact avec un convoi de ravitaillement et craignons qu’il ne soit attaqué. Leur dernière communication signalait l’arrivée imminente de vaisseaux Shattered Blade, puis plus rien. Pouvez-vous vous rendre d’urgence à <EM4>~mission(Location|Address)</EM4> pour soutenir nos forces ? \n\nNous avons appris que les Shattered Blade protègent férocement leurs terrains de chasse. Nos dernières rencontres avec eux étaient particulièrement intenses, alors je recommande d’apporter une puissance de feu conséquente. \n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_multi_VHRT_SB_title_001=Convoi Attaqué <EM4>[BP]</EM4> <EM4>[250 Rep]</EM4>
cfp_defendship_multi_VHRT_desc_001=Un convoi des Citizens for Prosperity en mission de ravitaillement a émis une balise de détresse près de <EM4>~mission(Location|Address)</EM4>. Ils ne répondent à aucune communication, ce qui laisse penser que la situation est grave. Ce convoi compte pourtant des pilotes expérimentés, et s’ils ne répondent pas, c’est qu’ils ont réellement besoin d’aide.\n\nNous vous rémunérerons pour soutenir ce convoi. \n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_multi_VHRT_title_001=Répondre à Une Balise de Détresse <EM4>[BP]</EM4> <EM4>[250 Rep]</EM4>
cfp_delivery_desc_001=Bonjour, \n\nj'ai appris que les gens attendent une importante livraison de matériel qui n'est pas arrivée. Il s'avère qu'elle a été transportée accidentellement au mauvais endroit. Pendant que nous cherchons à comprendre comment l'erreur s'est produite, nous avons besoin de quelqu'un qui se rende à <EM4>~mission(Pickup1|Address)</EM4> pour récupérer le colis <EM4>#~mission(item1|serialnumber)</EM4> et le livrer au bon endroit à <EM4>~mission(Dropoff1|Address)</EM4>. \n\nAussi, pour vous faciliter la tâche, je vous conseille de vous munir d'un <EM4>rayon tracteur portable</EM4>. \n\nVous êtes disponible pour cette mission ?\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_delivery_desc_002=Hey, j'ai besoin de faire livrer deux colis. Le colis <EM4>#~mission(item1|serialnumber)</EM4> doit être récupéré à <EM4>~mission(Pickup1|Address)</EM4> et amené à <EM4>~mission(Dropoff1|Address)</EM4>, et le colis <EM4>#~mission(item2|serialnumber)</EM4> va de <EM4>~mission(Pickup2|Address)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>. Ça devrait être un moyen facile de se faire un peu d'argent. \n\nAussi, pour vous faciliter la tâche, je vous conseille de vous munir d'un <EM4>rayon tracteur portable</EM4>. \n\nVolez en toute sécurité,\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_delivery_desc_003=Hé, \n\nDe temps en temps, les Citizens for Prosperity aime surprendre les membres stationnés dans nos avant-postes avec un petit cadeau pour garder le moral. Nous avons préparé le prochain lot, mais nous avons besoin de quelqu'un pour faire les livraisons pour nous. Cela vous intéresse de répandre la bonne humeur ?\n\nVoici la liste des livraisons. N'hésitez pas à les faire dans n'importe quel ordre. \n\n- Le colis <EM4>#~mission(item1|serialnumber)</EM4> va de <EM4>~mission(Pickup1|Address)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>.\n- Le colis <EM4>#~mission(item2|serialnumber)</EM4> va de <EM4>~mission(Pickup2|Address)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>.\n- Le colis <EM4>#~mission(item3|serialnumber)</EM4> va de <EM4>~mission(Pickup3|Address)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>.  \n\nAussi, pour vous faciliter la tâche, je vous conseille de vous munir d'un <EM4>rayon tracteur portable</EM4>. \n\nMerci,\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_delivery_desc_004=Bonjour,\n\nSi nous voulons que les gens ordinaires s'installent à Pyro, nous devons leur montrer que les services de base sont fiables. Faire en sorte que des choses comme les livraisons soient fiables pour que les gens n'y pensent pas à deux fois, c'est exactement ce que les Citizens for Prosperity font. Vous voulez nous aider ? \n\nNous avons plusieurs livraisons prêtes à partir. Faites-les dans l'ordre que vous voulez. Tout ce qui compte, c'est qu'elles arrivent à bon port. \n\n- Le colis <EM4>#~mission(item1|serialnumber)</EM4> va de <EM4>~mission(Pickup1|Address)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>.\n- Le colis <EM4>#~mission(item2|serialnumber)</EM4> va de <EM4>~mission(Pickup2|Address)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>.\n- Le colis <EM4>#~mission(item3|serialnumber)</EM4> va de <EM4>~mission(Pickup3|Address)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>.\n- Le colis <EM4>#~mission(item4|serialnumber)</EM4> va de <EM4>~mission(Pickup4|Address)</EM4> à <EM4>~mission(Dropoff4|Address)</EM4>.\n\nAussi, pour vous faciliter la tâche, je vous conseille de vous munir d'un <EM4>rayon tracteur portable</EM4>. \n\nSoyez prudent,\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_delivery_desc_005=Hé,\n\nApparemment, il y a eu un problème technique avec notre système qui a marqué certains colis comme étant livrés alors qu'ils ne l'ont jamais été. Nous sommes toujours en train de résoudre ce problème, mais certains ont été réglés et sont prêts à partir. \n\n- Le colis <EM4>#~mission(item1|serialnumber)</EM4> va de <EM4>~mission(Pickup1|Address)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>.\n- Le colis <EM4>#~mission(item2|serialnumber)</EM4> va de <EM4>~mission(Pickup2|Address)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>.\n- Le colis <EM4>#~mission(item3|serialnumber)</EM4> va de <EM4>~mission(Pickup3|Address)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>.\n- Le colis <EM4>#~mission(item4|serialnumber)</EM4> va de <EM4>~mission(Pickup4|Address)</EM4> à <EM4>~mission(Dropoff4|Address)</EM4>.\n- Le colis <EM4>#~mission(item5|serialnumber)</EM4> va de <EM4>~mission(Pickup5|Address)</EM4> à <EM4>~mission(Dropoff5|Address)</EM4>.\n \nIl serait bon de les rectifier immédiatement si vous êtes disponible.\n\nAussi, pour vous faciliter la tâche, je vous conseille de vous munir d'un <EM4>rayon tracteur portable</EM4>. \n\nCordialement,\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_delivery_nodanger_cave_desc_001=pu delivery local legal cave pyro cfp 2\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
cfp_delivery_nodanger_cave_title_001=cfp delivery nodanger cave title 001 <EM4>[500 Rep]</EM4>
cfp_delivery_title_001=Livraison pour ~mission(Destination) Prête <EM4>[50 Rep]</EM4>
cfp_delivery_title_002=Plusieurs Livraisons Prêtes <EM4>[50 Rep]</EM4>
cfp_destroy_idris_desc_001=Hé, \n\nLes rumeurs sont vraies. La XenoThreat a déployé un Idris pour traquer et attaquer les opérations des Citizens for Prosperity dans une escalade dramatique de leur hostilité envers nous. Nous venons d'apprendre que le vaisseau, sous le commandement de ~mission(TargetName), avance vers ~mission(location|address). Nous ne pouvons pas envoyer nos propres forces assez rapidement pour les combattre, et nous avons désespérément besoin d'aide. \n\nNous cherchons à recruter quelqu'un d'assez courageux pour affronter ces salauds. Il ne suffit pas de les effrayer, nous devons garantir qu'ils ne pourront pas nous poursuivre à nouveau. \n\nJe ne sais pas si vous avez déjà affronté un Idris, mais c'est une tâche difficile pour quelqu'un seul. Je vous recommande vivement de recruter d'autres personnes pour la cause.   \n\nCordialement,\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x15, Targets x1
cfp_eliminateall_XT_E_desc_001=Malgré nos efforts pour promouvoir la non-violence, les groupes locaux de hors-la-loi continuent d'attaquer notre organisation. La XenoThreat a récemment attaqué ~mission(Location|Address) et chassé les volontaires qui y travaillaient.\n\nNous cherchons à engager du personnel de combat pour reprendre l'avant-poste. Dans l'idéal, nous pourrions trouver un arrangement pour les encourager à partir, mais XenoThreat a rapidement recours à la violence pour résoudre tous ses problèmes, il y aura donc sans aucun doute un combat.\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms Canuto\n- [S1-A] Artimex Core Canuto\n- [S1-A] Artimex Helmet Canuto\n- [S1-A] Artimex Legs Canuto\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x4, Technicians x2\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_eliminateall_XT_E_title_001=Récupération de l'Avant-poste XenoThreat <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
cfp_eliminateall_fromCFP_Gen_E_desc_001=Citizens for Prosperity recherche des opérateurs de combat disponibles pour ~mission(Location|Address). Un groupe de hors-la-loi a lancé une attaque non provoquée et notre personnel de sécurité a désespérément besoin de soutien.\n\nVeuillez vous rendre à ~mission(Location) de toute urgence et bonne chance.\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms Canuto\n- [S1-A] Artimex Core Canuto\n- [S1-A] Artimex Helmet Canuto\n- [S1-A] Artimex Legs Canuto\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_eliminateall_fromCFP_Gen_E_title_001=Attaque sur un avant-poste des CFP <EM4>[BP]</EM4> <EM4>[25 Rep]</EM4>
cfp_eliminateall_fromCFP_XT_M_desc_001=Les forces XenoThreat ont lancé une attaque non provoquée près de ~mission(Location|Address). Nous recherchons tous les opérateurs de combat disponibles pour aller apporter leur soutien. \n\nSi vous n'avez jamais eu affaire à eux auparavant, il est important de savoir que XenoThreat sont des combattants entraînés. Ce ne sera donc pas un combat facile, mais il est nécessaire. \n\nBonne chance,\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms Canuto\n- [S1-A] Artimex Core Canuto\n- [S1-A] Artimex Helmet Canuto\n- [S1-A] Artimex Legs Canuto\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Sr. Contractor:</EM4> +400 Rep\n<EM4>Blueprint Reward:</EM4> 100% chance (XTEliminateAll only)\n\n<EM4>? = only the XTEliminateAll variant awards blueprints</EM4>
cfp_eliminateall_fromCFP_XT_M_title_001=Protection d'un avant-poste contre les XenoThreat <EM4>[BP?]</EM4> <EM4>[200–400 Rep]</EM4>
cfp_eliminateall_fromCFP_hh_M_desc_001=Nous avons reçu une communication d'urgence de ~mission(Location|Address) signalant qu'ils sont actuellement attaqués par un groupe Headhunters. Nous savons que notre présence dans le système a contrarié les Headhunters, mais cela n'excuse en rien cette attaque non provoquée.\n\nSi vous êtes disponibles, veuillez rassembler votre équipement et partir. Sachez que les Headhunters sont des combattants expérimentés et qu'ils ne reculeront pas facilement.\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionC]</EM4>\n- Karna Rifle\n- [S1-A] Artimex Arms Canuto\n- [S1-A] Artimex Core Canuto\n- [S1-A] Artimex Helmet Canuto\n- [S1-A] Artimex Legs Canuto\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM4>[Pyro RegionD]</EM4>\n- Karna "Rager" Rifle\n- [S1-A] Artimex Arms Wildwood\n- [S1-A] Artimex Core Wildwood\n- [S1-A] Artimex Helmet Wildwood\n- [S1-A] Artimex Legs Wildwood\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_eliminateall_fromCFP_hh_M_title_001=Besoin de défenseur contre les Headhunters <EM4>[BP]</EM4> <EM4>[100–200 Rep]</EM4>
cfp_eliminateall_hh_E_desc_001=Citoyens pour la Prospérité recherche du personnel de sécurité pour prendre un ancien avant-poste des CFP qui sert actuellement de cachette aux Headhunters pour lancer des attaques dans tout le système. \n\nSitué près de ~mission(Location|Address), la reprise de cet avant-poste permettra aux CFP d'apporter un plus grand soutien aux efforts locaux pour renforcer la stabilité.\n\nLima Endicott\nResponsable Logistique\nCitoyens pour la Prospérité\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x4, Technicians x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_eliminateall_hh_E_title_001=Récupération d'un avant-poste Headhunter <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
cfp_hauling_intro_desc_001=Bienvenue dans le système, je ne sais pas si vous connaissez notre organisation mais Citizens for Prosperity est une organisation à but non lucratif qui se consacre à apporter la sécurité et la civilisation aux systèmes non réclamés. \n\nSi vous cherchez du travail dans le système et que vous souhaitez nous aider à atteindre notre objectif, nous avons besoin d'un colis ramassé à <EM4>~mission(Location|Address)</EM4> et emmené à <EM4>~mission(Destination|Address)</EM4>.\n\nUne fois terminé, nous pouvons vous offrir une variété de nouvelles opportunités de travail dans ce système et au-delà.\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Neutral:</EM4> +25 Rep
cfp_hauling_intro_title_001=Premier Transport dans le Système <EM4>[25 Rep]</EM4>
cfp_maintenance_E_desc_001=Bonjour,\n\nL'un de nos avant-postes à <EM4>~mission(Location|Address)</EM4> nécessite quelques réparations mineures. Les personnes sur place ont estimé que vous aurez besoin de <EM4>trois fusibles</EM4>, d'un <EM4>outil de recyclage</EM4> et d'un <EM4>nombre suffisant de cartouches de C.M.R. pour réparer environ trois tuyaux</EM4>.\n\nSi vous avez besoin de plus d'informations sur les travaux d'entretien, veuillez consulter l'entrée <EM4>“Guide de Maintenance par Cornerstone Developments”</EM4> dans le journal de votre mobiGlas.\n\nEncore merci pour votre aide,\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 4/7\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Jr. Contractor:</EM4> +50 Rep
cfp_maintenance_E_title_001=Réparations Mineures à Effectuer : ~mission(Location) <EM4>[25–50 Rep]</EM4>
cfp_maintenance_H_desc_001=On a besoin d'aide. Les installations des CFP à <EM4>~mission(Location|Address)</EM4> ont été gravement endommagées lors d'une récente tempête électrique et nous recherchons toute personne pouvant nous aider à effectuer les réparations.\n\nAprès avoir inspecté le site, on estime que vous devrez apporter <EM4>six fusibles</EM4>, un <EM4>outil de recyclage</EM4> et <EM4>suffisamment de cartouches de C.M.R. pour réparer environ huit tuyaux</EM4>. Ça devrait suffire pour réparer les dégâts et remettre l'avant-poste en état de fonctionnement.\n\nSi vous avez besoin de plus d'informations sur les travaux d'entretien, veuillez consulter l'entrée <EM4>“Guide de Maintenance par Cornerstone Developments”</EM4> dans le journal de votre mobiGlas.\n\nPourriez-vous nous aider ?\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Head Contractor:</EM4> +100 Rep\n<EM4>Head Contractor:</EM4> +400 Rep
cfp_maintenance_H_title_001=Réparations Importantes à Faire : ~mission(Location) <EM4>[100–400 Rep]</EM4>
cfp_maintenance_M_desc_001=Bonjour,\n\nNous avons appris qu'une violente tempête s'était abattue sur <EM4>~mission(Location|Address)</EM4>, causant des dégâts aux structures. Notre technicien sur place tente toujours de déterminer ce qui peut être réparé, mais il ne peut pas tout faire. Si vous apportez <EM4>six fusibles</EM4>, un <EM4>outil de recyclage</EM4> et <EM4>suffisamment de cartouches de C.M.R. pour réparer environ cinq tuyaux</EM4>, nous devrions pouvoir effectuer les réparations restantes.\n\nSi vous avez besoin de plus d'informations sur les travaux d'entretien, veuillez consulter l'entrée <EM4>“Guide de Maintenance par Cornerstone Developments”</EM4> dans le journal de votre mobiGlas.\n\nMerci,\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Sr. Contractor:</EM4> +100 Rep
cfp_maintenance_M_title_001=Réparations Modérées Requises : ~mission(Location) <EM4>[100 Rep]</EM4>
cfp_maintenance_local_E_desc_001=Un de nos avant-postes à  <EM4>~mission(Location|Address)</EM4> souffre de quelques pannes mécaniques et aurait besoin d'être réparé. Notre technicien habituel étant en déplacement, nous cherchons à faire appel à un prestataire extérieur.\n\nNous aurons besoin de <EM4>remplacer trois fusibles</EM4>, et si vous pouviez apporter un <EM4>outil de recyclage</EM4> avec <EM4>suffisamment de cartouches de C.M.R. pour réparer environ trois tuyaux</EM4>, ça devrait suffire pour le reste.\n\nSi vous avez besoin de plus d'informations sur les travaux d'entretien, veuillez consulter l'entrée <EM4>“Guide de Maintenance par Cornerstone Developments”</EM4> dans le journal de votre mobiGlas.\n\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7
cfp_maintenance_local_E_title_001=Réparations Mineures Nécessaires : ~mission(Location)
cfp_maintenance_local_M_desc_001=Si vous êtes dans la région, veuillez lire ceci.\n\nCitizens for Prosperity recherche un mécanicien qualifié pour se rendre à <EM4>~mission(Location|Address)</EM4> avec le matériel nécessaire et effectuer quelques réparations.\n\nEn l'état, vous aurez besoin de <EM4>six fusibles</EM4>, d'un <EM4>outil de recyclage</EM4> et de <EM4>suffisamment de cartouches de C.M.R. pour réparer environ cinq tuyaux</EM4>. Cela devrait nous aider à remettre l'avant-poste en état de marche. Nous vous dédommagerons pour votre temps et vos matériaux.\n\nSi vous avez besoin de plus d'informations sur les travaux d'entretien, veuillez consulter l'entrée <EM4>“Guide de Maintenance par Cornerstone Developments”</EM4> dans le journal de votre mobiGlas.\n\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7
cfp_maintenance_local_M_title_001=Réparations Modérées Nécessaires : ~mission(Location)
cfp_recovery_desc_001=Hé, nous avons besoin de votre aide. \n\nUne personne avec qui nous travaillons était en train d'effectuer une livraison pour nous, mais malheureusement, elle est tombée sur des hors-la-loi et a dû rendre sa ~mission(Item). Le point positif est que les hors-la-loi n'ont pas remarqué les traceurs que nous avons placés dans la cargaison et nous savons maintenant qu'ils ont emmené leur butin à ~mission(Location|Address). \n\nNous aimerions que vous récupériez les colis pour nous et que vous finissiez de les livrer à ~mission(Destination|Address). Je ne pense pas que les hors-la-loi les abandonneront de leur plein gré, mais je ne vous demanderais pas de vous mettre en danger si ces fournitures n'étaient pas d'une importance capitale. \n\nAussi, pour vous faciliter la tâche, je vous suggère d'emporter un <EM4>rayon tracteur portable</EM4>. \n\nAlors, qu'en dites-vous ? \n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_recovery_tile_001=Ravitaillements Volés <EM4>[50 Rep]</EM4>
cfp_sabotage_VH_desc_001=Citizens for Prosperity a surveillé un groupe de hors-la-loi très dangereux à ~mission(Location|Address) et nous pensons qu'ils sont en train de préparer une attaque majeure qui pourrait mettre tout le système en péril.\n\nAfin de protéger tous les progrès que nous avons réalisés ici, nous aimerions que vous fassiez un raid sur leur complexe et que vous détruisiez tous les serveurs qui hébergent leurs plans. \n\nCela devrait au moins nous donner un répit suffisant pour qu'ils reconsidèrent leur offensive. \n\nMerci, \n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_VH_title_001=Détruire les Serveurs de Données Hors-la-loi <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
cfp_sabotage_generators_M_desc_001=Nous avons appris que les hors-la-loi de ~mission(Location|Address) ont commencé à recruter dans l'espoir de lancer un raid contre les Citizens for Prosperity. \n\nAfin de désamorcer la situation avant qu'elle ne devienne incontrôlable, nous aimerions que vous désactiviez leurs générateurs d'énergie et que vous arrêtiez leur expansion. \n\nMettez cela en place et vous pourriez sauver beaucoup de vies. \n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_generators_M_title_001=Mettre les Hors-la-loi à ~mission(Location) Hors d’État de Nuire <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
cfp_sabotage_generators_VE_desc_001=Suite à une série de raids contre des colonies alliées aux Citizens for Prosperity, nous pensons avoir remonté la piste des responsables jusqu'à ~mission(Location|Address).\n\nLes attaquer directement représenterait un trop grand risque et encouragerait probablement des représailles agressives. Nous pensons plutôt que si leurs générateurs électriques étaient désactivés, cela pourrait les forcer à s'installer ailleurs.\n\nPourriez-vous vous en charger pour nous ?\n \nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- A03 Sniper Rifle\n- P6-LR Sniper Rifle\n- [S1-A] A03 Sniper Rifle Magazine (15 cap)\n- [S1-A] Argus Helmet\n- [S1-A] CBH-3 Helmet Base\n- [S1-A] P6-LR Magazine (8 cap)\n- [S1-A] PAB-1 Arms\n- [S1-A] PAB-1 Core\n- [S1-A] PAB-1 Legs\n- [S1-A] TrueDef-Pro Arms\n- [S1-A] TrueDef-Pro Core Base\n- [S1-A] TrueDef-Pro Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Jr. Contractor:</EM4> +25 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_generators_VE_title_001=Désactivation de la Forteresse Hors-la-loi à ~mission(Location) <EM4>[BP]</EM4> <EM4>[25 Rep]</EM4>
cfp_sabotage_server_elimiatespecific_HH_desc_001=Nous n'en sommes qu'au stade de l'élaboration d'une vue d'ensemble, mais jusqu'à présent, nous avons appris qu'un Headhunter  du nom de ~mission(TargetName) a récemment volé des données sensibles qui, si elles sont révélées, nuiront à la cause des Citizens for Prosperity. \n\nNous devons nous assurer que toutes les traces des données volées sont éradiquées. Cela signifie qu'il faut détruire tous les serveurs Headhunter de ~mission(Location|Address) et traquer ~mission(TargetName|Last) pour les empêcher de continuer à diffuser les informations.\n\nVotre aide est très appréciée,\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- A03 Sniper Rifle\n- P6-LR Sniper Rifle\n- [S1-A] A03 Sniper Rifle Magazine (15 cap)\n- [S1-A] Argus Helmet\n- [S1-A] CBH-3 Helmet Base\n- [S1-A] P6-LR Magazine (8 cap)\n- [S1-A] PAB-1 Arms\n- [S1-A] PAB-1 Core\n- [S1-A] PAB-1 Legs\n- [S1-A] TrueDef-Pro Arms\n- [S1-A] TrueDef-Pro Core Base\n- [S1-A] TrueDef-Pro Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Head Contractor:</EM4> +1,500 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_server_elimiatespecific_HH_title_001=Élimination de Toute Trace de Données Headhunter <EM4>[BP]</EM4> <EM4>[1,500 Rep]</EM4>
cfp_sabotage_servers_H_XT_desc_001=Nous avons un petit problème que j'espère que vous pourrez résoudre pour moi. L'un de nos informateurs a révélé que la XenoThreat a amassé des données sur les opérations des Citizens for Prosperity dans tout le système. \n\nCes informations, si elles sont utilisées correctement, pourraient mettre notre peuple en danger. La meilleure solution est que vous détruisiez complètement les serveurs sur lesquels ces données sont stockées à ~mission(Location|Address).\n\nAvec l'anéantissement de leur base d'informations, cela devrait donner une chance à notre peuple de se battre.\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionB]</EM4>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM4>[Pyro RegionD]</EM4>\n- A03 Sniper Rifle\n- P6-LR Sniper Rifle\n- [S1-A] A03 Sniper Rifle Magazine (15 cap)\n- [S1-A] Argus Helmet\n- [S1-A] CBH-3 Helmet Base\n- [S1-A] P6-LR Magazine (8 cap)\n- [S1-A] PAB-1 Arms\n- [S1-A] PAB-1 Core\n- [S1-A] PAB-1 Legs\n- [S1-A] TrueDef-Pro Arms\n- [S1-A] TrueDef-Pro Core Base\n- [S1-A] TrueDef-Pro Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Veteran Contractor:</EM4> +75 Rep\n<EM4>Contractor:</EM4> +75 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_servers_H_XT_title_001=Destruction de Données Logistiques XenoThreat <EM4>[BP]</EM4> <EM4>[75 Rep]</EM4>
cfp_sabotage_servers_M_HH_desc_001=Les Headhunters ont récemment attaqué l'un de nos transports et ont malheureusement réussi à mettre la main sur des données sécurisées. Bien que le cryptage soit solide, ce n'est qu'une question de temps avant qu'ils ne puissent y accéder. \n\nAvant que cela n'arrive, nous avons besoin que vous vous rendiez à ~mission(Location|Address) et que vous détruisiez toutes les traces d'informations sur leurs serveurs. \n\nVous aiderez vraiment les Citizens for Prosperity si vous arrivez à faire cela.\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- A03 Sniper Rifle\n- P6-LR Sniper Rifle\n- [S1-A] A03 Sniper Rifle Magazine (15 cap)\n- [S1-A] Argus Helmet\n- [S1-A] CBH-3 Helmet Base\n- [S1-A] P6-LR Magazine (8 cap)\n- [S1-A] PAB-1 Arms\n- [S1-A] PAB-1 Core\n- [S1-A] PAB-1 Legs\n- [S1-A] TrueDef-Pro Arms\n- [S1-A] TrueDef-Pro Core Base\n- [S1-A] TrueDef-Pro Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Neutral:</EM4> +75 Rep\n<EM4>Jr. Contractor:</EM4> +75 Rep\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_servers_M_HH_title_001=Destruction de Données Volées HeadHunter <EM4>[BP]</EM4> <EM4>[75–150 Rep]</EM4>
cfp_sabotage_servers_VH_XT_desc_001=L'un des membres des Citizens for Prosperity qui a servi d'informateur à la XenoThreat nous a fait savoir que les serveurs de données situés à ~mission(Location|Address) abritent un trésor d'informations vitales pour les opérations du gang. \n\nSi vous pouviez détruire ces serveurs en notre nom, ce serait une grande victoire pour la sécurité de l'ensemble du système. \n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_servers_VH_XT_title_001=Destruction de Serveur de Données XenoThreat <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_searchbody_danger_cave_desc_001=Nous avons essayé d'entrer en contact avec le membre de la communauté ~mission(TargetName), mais nous n'avons pas eu de nouvelles depuis quelques jours. D'après ce que Citizens for Prosperity a pu découvrir, il était en repérage près de ~mission(Location|Address) qui est un point névralgique connu des hors-la-loi.\n\nNous avons besoin de quelqu'un pour aller là-bas pour nous et essayer de le localiser, ou dans le pire des cas, de retrouver sa dépouille. \n\nSi vous parvenez à les retrouver, une récompense vous sera offerte. \n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_searchbody_danger_cave_title_001=Disparu : ~mission(TargetName) <EM4>[50 Rep]</EM4>
cfp_searchbody_danger_outpost_desc_001=Malheureusement, l'un de nos partenaires communautaires, ~mission(TargetName), est porté disparu depuis quelques jours. Sa famille a contacté les Citizens for Prosperity pour demander de l'aide et je leur ai dit que nous ferions notre possible. Cela dit, vu le temps écoulé, je n'ai pas trop d'espoir. \n\nQuel que soit son état actuel, nous cherchons quelqu'un pour être nos yeux sur le terrain pour cette mission. Il y a de fortes chances qu'il se soit rendu à ~mission(Location|Address), une zone connue pour être très dangereuse. \n\nSi vous parvenez à le retrouver et à nous transmettre son état de santé, je veillerai à ce que vous soyez correctement dédommagé. \n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_searchbody_danger_outpost_title_001=Disparu : ~mission(TargetName) <EM4>[50 Rep]</EM4>
cfp_searchbody_danger_station_desc_001=Hé,\n\nJe commence à m'inquiéter pour l'un de nos prestataires locaux, ~mission(TargetName). Il a terminé une transaction à ~mission(Location|Address) et n'a pas été vu depuis. Nous avons entendu dire que des hors-la-loi se faufilaient à bord, et si c'est vrai, je pense que le pire est peut-être arrivé. \n\nQuoi qu'il en soit, ~mission(TargetName|First) a fait du bon travail pour nous dans le passé et je ne voudrais pas qu'il finisse par être juste un autre disparu de Pyro. Si vous êtes prêt à le retrouver pour moi, je veillerai à ce que vous soyez récompensé. \n\nSoyez juste prudent. Je ne voudrais pas que vous disparaissiez vous aussi. \n\nMerci, \n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
cfp_searchbody_nodanger_cave_desc_001=~mission(TargetName) est un local qui n'a effectué que quelques travaux pour les Citizens for Prosperity, mais il était prometteur. Jusqu'à ce qu'il disparaisse lors de l'exploration de ~mission(Location|Address) la semaine dernière. Malheureusement, nous n'en avons entendu parler qu'aujourd'hui. Les chances de survie à ce stade sont plutôt minces, mais nous pensons qu'il vaut la peine de confirmer ce qui lui est arrivé.\n\nLes CFP pourraient avoir besoin d'aide sur ce point si quelqu'un est intéressé. Et en plus d'être une bonne action, le paiement devrait en valoir la peine. \n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_searchbody_nodanger_cave_title_001=Disparu : ~mission(TargetName) <EM4>[50 Rep]</EM4>
cfp_searchbody_nodanger_outpost_desc_001=L'un des nôtres, ~mission(TargetName), était censé faire des repérages préliminaires à ~mission(Location|Address), mais il ne s'est jamais présenté. Nous espérons qu'il n'a pas eu de chance; mais trop souvent ici, même le plus petit faux pas peut s'avérer fatal. J'apprécierais que quelqu'un se rende dans cette zone pour voir s'il peut être localisé. \n\nCe serait formidable si vous le trouviez vivant, mais si ce n'est pas le cas, le moins que l'on puisse faire pour leur famille est de le retrouver. \n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_searchbody_nodanger_outpost_title_001=Disparu : ~mission(TargetName) <EM4>[50 Rep]</EM4>
cfp_searchbody_nodanger_station_desc_001=Deux habitants avec lesquels nous travaillons étaient en train de faire du recyclage à ~mission(Location|Address) lorsqu'ils ont eu des problèmes avec un équipement défectueux. L'un d'eux a réussi à s'échapper, mais son partenaire, ~mission(TargetName), est malheureusement resté sur place.\n\nAu vu de l'état dans lequel ils ont été signalés pour la dernière fois, je suppose qu'ils n'ont pas survécu, mais j'aimerais en avoir le cœur net. Si vous le voulez bien, j'aurais besoin de votre aide pour retrouver leurs dépouille. \n\nSi vous parvenez à les retrouver, je veillerai à ce que vous soyez correctement dédommagé pour cet effort. \n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
claimsweep_desc=~mission(Contractor|ClaimSweepDescription)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Turrets:</EM4> 3 (hostile)
claimsweep_title=~mission(Contractor|ClaimSweepTitle) <EM4>[50 Rep]</EM4>
combatassist_desc=ALERTE : Un relais ECN de votre secteur a capté le signal de détresse d'un astronef. Tous les vaisseaux disponibles et capables de porter assistance, dans la zone, sont priés de le faire immédiatement.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
commarray_hack_desc=~mission(Contractor|CommArrayHackDescription)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
commarray_repair_desc=~mission(Contractor|CommArrayRepairDescription)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
commarray_repair_title=~mission(Contractor|CommArrayRepairTitle) <EM4>[1,000 Rep]</EM4>
covalex_UGF_collect_desc_001=Bonjour,\n\nJ'ai une livraison dont il faut s'occuper. La commande est en attente à <EM4>~mission(Location|Address)</EM4> pour être amenée à <EM4>~mission(Destination|Address)</EM4>. \n\nJe suis sûr que tout ira bien, mais pour être franc, je vois un certain nombre d'avertissements de sécurité apparaître pour cette zone. Il semble qu'il y ait eu quelques attaques dans cette zone ces derniers temps. Maintenant, je ne dis pas que vous rencontrerez quoi que ce soit, mais il serait probablement préférable que vous emmeniez une petite escorte.\n\nBonne chance,\n\nChase Hewitt\nJr. Coordinateur logistique\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Unknown:</EM4> 4
covalex_UGF_collect_title_001=Pilote de Livraison pour Covalex <EM4>[500 Rep]</EM4>
covalex_delivery_desc_0006=Bonjour,\n\n~mission(Contractor|Reaction)\n\nJ'ai trouvé le contrat d'expédition parfait à aborder. Un envoi attend à <EM4>~mission(Location|Address)</EM4> pour être amené à <EM4>~mission(Destination|Address)</EM4>. Ça a l’air bien, non ? ~mission(Contractor|Timed)~mission(Contractor|Danger)\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nCoordinateur logistique Junior\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. En acceptant ce contrat, vous acceptez tous les termes et conditions décrits dans notre « Guide d'informations supplémentaires sur les travailleurs indépendants v.2948.01.29 ». Covalex Shipping n'est pas responsable des dommages survenus dans le cadre de l'activité de ses prestataires indépendants.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexrand_desc=~mission(Description)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0001=Bonjour,\n\nJe comprendrai tout à fait si vous ne voulez pas m'aider, mais si vous le pouvez, ce serait formidable.\n\nMon petit ami est décédé lors de la tragédie de Covalex Gundo. On m'a dit que je récupérerais toutes les affaires de Scott une fois l'enquête terminée. Elle est terminée depuis un moment déjà et ils n'ont toujours pas donné d'indication sur quand je pourrai récupérer ses affaires. C'est déjà assez difficile de gérer tout ça, savoir qu'un colis va arriver dans un mois ou deux et rouvrir toutes ces blessures, c'est trop. Je préférerais m'en occuper maintenant et en finir. Si vous pouvez trouver un moyen de récupérer ses effets personnels (Employee ID# 104) et de les déposer à ~mission(Destination), je vous en serais très reconnaissante.\n\nMerci pour votre aide,\nAnya\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0002=Mon frère faisait partie de ces personnes qui sont mortes dans l'explosion de la station Covalex près de Crusader. Pire encore, il m'avait emprunté quelque chose quand c'est arrivé. Maintenant, un connard de bureaucrate essaie de me dire que je dois attendre pour récupérer mes affaires. Mais oui bien sûr. D'abord tu tues mon frère et maintenant tu veux que je sois patient ? Le culot de ces gars d'entreprise. Oubliez ça. Au lieu de ça, j'ai pensé que j'allais engager quelqu'un pour aller à Gundo récupérer mes affaires et les apporter à ~mission(Destination) pour moi. Je veux dire, que vont-ils faire à ce sujet ? Quoi qu'il en soit, c'est ce que mon frère aurait voulu. Ce sera la boîte marquée 156.\n\n- Ed\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0003=Hé,\n\nC'est donc un peu gênant pour moi d'en parler, mais il s'avère que l'une des personnes décédées lors de la catastrophe de la station Covalex, Kyomi Santos, m'a en fait légué quelque chose dans son testament. J'ai été surpris de l'apprendre, mais apparemment, je suis maintenant l'heureux propriétaire de tout ce qui est stocké dans la boîte n°173. Les gens de Covalex disent que je pourrai l'obtenir lorsque la station rouvrira mais... c'est la partie délicate... J'en ai vraiment besoin maintenant. Normalement, j'attendrais simplement, mais j'essaie de démarrer ma propre affaire (je fabrique des gâteaux en forme de mondes natals des gens) et les crédits que j'obtiendrai en la vendant seront vraiment d'une grande aide. J'ai un peu de stock maintenant que je peux utiliser pour payer quelqu'un pour faire la livraison de Gundo à ~mission(Destination) pour moi. Je sais que tout cela est un peu anormal, mais s'il y avait un autre moyen, je ne le demanderais pas.\n\nMerci pour votre aide,\nThrace\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0004=Mon fils Nico faisait malheureusement partie des victimes du tragique accident survenu à la station Gundo de Covalex et ils ne m'ont toujours pas restitué tous ses effets personnels. Je comprends qu'ils doivent faire les choses conformément aux règlements, mais il semble inadmissible qu'ils ne fassent pas d'indemnisations aux membres de la famille en deuil. Pour cela, je recherche quelqu'un qui pourra se déplacer à ma place à la station. Pour être clair, Gundo est actuellement considérée comme interdite, ce qui signifie que cela ne serait pas honnête, mais je pense que ma situation mérite une attention particulière. Ma sœur dit que le tarif que je propose est le montant correct pour récupérer la caisse contenant les affaires de Nico (n°964) et les amener à ~mission(Destination), donc j'espère pouvoir trouver une personne compétente pour régler cette affaire rapidement.\n\nCordialement,\nGloria Theolone\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0005=Ils ont dit que je pourrais trouver quelqu'un ici pour aller à Gundo pour moi et récupérer une caisse qui appartenait à ma femme. Si le nom ne vous dit rien, c'est bien la station où ils ont eu ce gros accident. Ma femme travaillait pour Covalex et je sais que cela ne facilitera pas vraiment sa perte, mais je veux vraiment récupérer les affaires de Claudia. Je pense à sa collection de photos ou au collier que je lui ai offert restant dans cette station froide et morte, dans une boîte marquée 249 et ce n'est pas bien. Elle mérite mieux. Et alors ? Êtes-vous prêt à aller à Gundo et à ramener sa caisse à ~mission(Destination) ?\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0006=Bonjour,\n\nJe cherche quelqu'un pour se rendre à la station Covalex Gundo près de Crusader et récupérer quelques objets. Je sais que ça peut ressembler à du vol, mais ce sont les affaires de mon père. Vous voyez, il était à la station Gundo lorsqu'il a eu son accident. Ma mère dit qu'il faut attendre que Covalex le permette, mais je ne pense pas que ce soit juste parce qu'il me manque tellement. J'aimerais avoir quelque chose en souvenir de lui et je ne veux plus attendre car je pourrais commencer à oublier des choses. Je vous paierai pour me procurer la boîte 510 et l'emmener à ~mission(Destination) afin que je puisse l'avoir.\n\nMerci beaucoup,\nBaylor Ward\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
crus_markerhunt_from=Société Historique de Crusader\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
crusader_RetrieveConsignment_desc_001=Les rapports indiquent que notre personnel de sécurité à ~mission(location|address) a été anéanti par un groupe des Nine Tails, qui tentent de voler du matériel confidentiel récemment livrés à l'établissement. La Sécurité de Crusader a besoin d'un prestataire expérimenté pour expulser les hostiles et sécuriser ce matériel confidentiel. \n\nSur la base des premiers rapports, nous vous recommandons fortement de venir bien équipé et d'envisager d'emmener du renfort. Pour des raisons de sécurité, le matériel confidentiel a été transporté dans le cadre d'une cargaison avec d'autres boîtes et enfermés dans un coffre-fort automatisé. Les codes de récupération permettant d'accéder au matériel confidentiel sont stockés sur des datapads détenus par des agents de sécurité de haut rang. Une fois trouvés, utilisez les codes appropriés sur le convoyeur de colis pour récupérer les boîtes. \n\nLorsque vous avez toutes les boîtes, livrez-les à ~mission(dropoff1|address) pour recevoir le paiement.\n\nCONTRAT AUTORISÉ PAR : \nAgent de Liaison Bautista \nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Guards x4, Hostiles x54
crusader_RetrieveConsignment_title_001=Soutien des Forces de Sécurité et Sécurisation de l'Envoi <EM4>[500–4,000 Rep]</EM4>
crusader_UGF_defend_E_desc_001=La Sécurité de Crusader a appris que ~mission(Location|Address) est actuellement menacée par un gang local et nous cherchons à embaucher un prestataire pour constituer une équipe de sécurité chargée de faire face à toute attaque. \n\nCe gang a un certain palmarès, mais il reste globalement plutôt jeune. Je pense que ce sera relativement simple à gérer pour vous et votre équipe.\n\nCONTRAT AUTORISÉ PAR :\nAgent de Liaison Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x1, Hostiles x10, Private Security x4, Sentries x6\n<EM4>Unknown:</EM4> 11
crusader_UGF_defend_E_title_001=Protection du Site Contre les Ennemis <EM4>[500 Rep]</EM4>
crusader_UGF_defend_VH_desc_001=La Sécurité de Crusader a appris que ~mission(Location|Address) est actuellement menacée par un gang bien connu opérant dans la région et nous cherchons à embaucher une équipe de sécurité expérimentée pour faire face à toute attaque. \n\nEssayez de vous assurer que toute personne venant avec vous soit dûment qualifiée. Vous allez avoir besoin de toute l'aide possible pour faire face à ce groupe.\n\nCONTRAT AUTORISÉ PAR :\nAgent de Liaison Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x3, Hostiles x8, Private Security x4, Sentries x4\n<EM4>Unknown:</EM4> 21
crusader_UGF_defend_VH_title_001=Protection du Site Contre des Ennemis Dangereux <EM4>[500 Rep]</EM4>
crusader_UGF_defend_desc_001=La Sécurité de Crusader a appris que ~mission(Location|Address) est actuellement menacée par un groupe de criminels et nous cherchons à embaucher un prestataire pour constituer une équipe de sécurité afin de repousser toute attaque. \n\nJe sais que vous pourriez être tenté d'essayer de gérer cela par vous-même, mais vous devez constituer une équipe pour ça. Croyez-moi, les crédits ne valent pas la peine de tenter en solo.\n\nCONTRAT AUTORISE PAR :\nAgent de Liaison Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x8, Private Security x4, Sentries x8\n<EM4>Unknown:</EM4> 10
crusader_UGF_defend_title_001=Défense de la Zone Contre des Ennemies Sérieux <EM4>[500 Rep]</EM4>
crusader_UGF_destroy_E_desc_001=Nous avons découvert qu'un groupe tente de démarrer sa propre affaire de drogue à ~mission(Location|Address). Bien qu'ils semblent être des voyous de bas niveau, le produit qu'ils fabriquent est toxique et responsable de la mort de plusieurs civils, nous ne pouvons donc pas permettre d'en laisser se vendre davantage.\n\nNous travaillons sur une opération plus vaste qui les éteindra définitivement, mais en attendant, nous devons arrêter le flux de leurs drogues. C'est pourquoi Crusader veut que vous alliez sur le site et détruisiez la réserve qu'ils y ont.\n\nIls auront sans aucun doute des gardes pour protéger la planque, mais je ne m'attends pas à ce qu'ils constituent une trop grande menace.\n\nCONTRAT AUTORISE PAR :\nAgent de Liaison Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Civilians x4
crusader_UGF_destroy_E_title_001=Destruction de Drogues Illégales <EM4>[500 Rep]</EM4>
crusader_UGF_destroy_H_desc_001=Un nouveau syndicat s'est installé à ~mission(Location|Address) et a tenté de pénétrer le marché de la drogue. Malheureusement, leur produit a été associé à plusieurs décès dans et autour de Crusader. Compte tenu de la puissance de ce produit, il constitue une menace sérieuse pour le public. \n\nCrusader s'efforce de mettre fin à l'ensemble de l'opération, mais depuis que leur produit circule, les corps commencent à s'accumuler. \n\nNous voulons que vous alliez sur le site et détruisiez la réserve qu'ils y ont avant qu'ils n'aient la chance de la vendre. Cependant, vous devez vous attendre à ce que leur planque soit extrêmement bien gardée.\n\nCONTRAT AUTORISÉ PAR :\nAgent de Liaison Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
crusader_UGF_destroy_H_title_001=Destruction de Contrebande Mortelle <EM4>[500 Rep]</EM4>
crusader_UGF_destroy_desc_001=Nous avons enquêté sur de récentes overdoses et elles semblent toutes provenir d'un mauvais lot de drogues préparées à ~mission(Location|Address). \n\nJe travaille avec d’autres prestataires pour découvrir les responsables, mais des gens meurent tant que le produit est toujours disponible. \n\nJe veux que vous alliez sur le site et que vous détruisiez la réserve qu'ils y ont. Cela devrait nous faire gagner du temps avant de les stopper définitivement.\n\nIls auront des gardes pour protéger leur approvisionnement, alors soyez prêt à affronter des hostiles.\n\nCONTRAT AUTORISÉ PAR :\nAgent de Liaison Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
crusader_UGF_destroy_title_001=Destruction de Stupéfiants Toxiques <EM4>[500 Rep]</EM4>
crusader_UGF_eliminateall_allies_desc_001=La Sécurité de Crusader a appris que ~mission(Location|Address) est actuellement menacée par un groupe de criminels.\n\nBien que nous ayons du personnel de sécurité sur place, nous cherchons à embaucher des prestataires supplémentaires pour les aider à repousser toute attaque. \n\nMaintenant, en tant que prestataire, je ne sais pas à quel point vous êtes habitué à travailler avec une équipe, mais je ne veux rien entendre à propos de "tirs amis", sinon il y aura des problèmes.\n\nCONTRAT AUTORISÉ PAR :\nAgent de liaison Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
crusader_UGF_eliminateall_allies_desc_intro=Dans le but d'accroître la sécurité de Crusader et de ses environs, la Sécurité de Crusader recherche des personnes qualifiées pour aider aux travaux de sécurité dans le secteur. \n\nNous avons déterminé que vous possédez les compétences nécessaires pour vous proposer un premier contrat d’essai. Vous aiderez la Sécurité de Crusader à faire face à un petit groupe hostile qui a proféré des menaces contre ~mission(Location|Address). \n\nVeuillez noter que nous avons déjà du personnel de sécurité sur place, vous devrez donc faire attention aux tirs amis.\n\nUne fois ce contrat terminé avec succès, vous deviendrez éligible pour postuler à tout travail futur de sécurité, dès qu'il sera disponible.\n\nCONTRAT AUTORISÉ PAR :\nAgent de Liaison Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
crusader_UGF_eliminateall_allies_desc_rehire=Bravo ! La Sécurité de Crusader a décidé de vous offrir une autre chance de devenir prestataire de sécurité. Avec un peu de travail acharné et d’efforts, nous espérons que vous pourrez surmonter tous les problèmes de vos performances antérieures. \n\nTout d'abord, pour réévaluer votre viabilité, nous aimerions que vous aidiez la Sécurité de Crusader à faire face à un groupe de hors-la-loi qui a proféré des menaces contre ~mission(Location|Address).\n\nMaintenant, puisque vous avez rencontré des problèmes lors de vos performances passées, je vais vous rappeler que les tirs amis ne seront pas tolérés.\n\nUne fois cet essai terminé avec succès, votre éligibilité sera rétablie et vous pourrez à nouveau postuler pour un travail dans la sécurité avec Crusader.\n\nCONTRAT AUTORISÉ PAR :\nAgent de Liaison Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
crusader_UGF_eliminateall_allies_title_001=Fournir du Soutien <EM4>[500 Rep]</EM4>
crusader_UGF_eliminateall_allies_title_intro=Évaluation pour Mission relative à la Sécurité <EM4>[500 Rep]</EM4>
crusader_UGF_eliminateall_allies_title_rehire=Évaluation pour Mission relative à la Sécurité <EM4>[500 Rep]</EM4>
crusader_UGF_eliminateall_desc_001=La Sécurité de Crusader a appris que ~mission(Location|Address) est actuellement utilisée comme base d'opérations pour de nombreuses activités illégales.\n\nAfin de mettre un terme à ce "nid de criminels", nous recherchons un prestataire pour aller sur le site et dégager tous les occupants. Par la force si nécessaire.\n\nCONTRAT AUTORISÉ PAR :\nAgent de Liaison Bautista\nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Nine Tails x4
crusader_UGF_eliminateall_nocivs_desc_001=La Sécurité de Crusader a appris que ~mission(Location|Address) est actuellement utilisée comme base d'opérations pour de nombreuses activités illégales.\n\nAfin de mettre un terme à ce "nid de criminels", nous recherchons un prestataire pour aller sur le site et éliminer tous les éléments hostiles. Par la force si nécessaire.\n\nEt juste pour que vous le sachiez, parfois des gangs comme celui-ci font appel à des civils pour travailler pour eux, souvent sous la contrainte. Cela va sans dire, mais si vous voyez des civils, ils doivent être protégés. La Sécurité de Crusader ne peut pas laisser l'un de ses prestataires tirer sans discernement sur les gens.\n\nCONTRAT AUTORISÉ PAR :\nAgent de Liaison Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13\n<EM4>Friendlies:</EM4> Civilians x4
crusader_UGF_eliminateall_title_001=Nettoyage du Repaire Criminel <EM4>[500 Rep]</EM4>
crusader_bounty_desc_first=Afin d'augmenter la sureté de Crusader et ses environs, Crusader Security recherche des personnes qualifiées pour aider à l'arrestation d'individus recherchés dans la région.\n\n Nous estimons que vous possédez les compétences nécessaires et voudrions vous proposer un premier contrat de chasseur de primes pour appréhender ~mission(TargetName) dont la dernière localisation est : ~mission(Location|Address). \n\n En cas de succès, vous serez inscrit sur la liste des Freelancers certifiés de Crusader et pourrez accepter n'importe quel contrat de chasseur de primes disponible. \n\n\n CONTRAT AUTORISÉ PAR :\nAgent de Liaison Bautista\nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
crusader_bounty_desc_rehire=Bonne nouvelle ! La Sécurité de Crusader a décidé de vous offrir une nouvelle chance d'être prestataire de primes. Nous espérons que vous avez su depuis vous améliorer pour devenir un agent compétent.\n\nMais d'abord, nous devons vous réévaluer et vous proposons un contrat de chasseur de primes afin d'appréhender ~mission(TargetName). \n\nEn cas de réussite de ce contrat d'essai, vous serez rétabli dans la liste des Freelancers certifiés de Crusader et pourrez à nouveau candidater sur n'importe quel contrat de chasseur de primes disponible.\n\n\nCONTRAT AUTORISÉ PAR :\nAgent de Liaison Bautista\nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
crusader_bounty_fps_UGF_desc_001=Grâce à une arrestation récente, nous avons appris l'emplacement d'une prime active du nom de ~mission(TargetName). On pense actuellement qu'ils sont enfermés à ~mission(Location|Address). Vous avez été autorisé à entrer sur le site, à les trouver et à terminer la prime.\n\nNous avons toutes les raisons de croire qu'il y aura d'autres éléments criminels sur le site, mais pour le moment, seulement ~mission(TargetName|Last) est votre préoccupation. \n\nCONTRAT AUTORISÉ PAR :\nAgent de Liaison Gibbs\nID# 91G66BW0\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
crusader_bounty_fps_UGF_nocivs_desc_001=Nous avons eu de la chance et certaines analyses récentes de ~mission(Location|Address) ont montré qu'une prime ouverte du nom de ~mission(TargetName) se cache là-bas. Vous avez été autorisé à entrer sur le site, à les trouver et à terminer la prime.\n\nCependant, en plus de la prime et de leurs complices criminels, le site est susceptible d'avoir également des civils présents. Même si nous sommes impatients de voir le cas de ~mission(TargetName|Last) traité, nous ne pouvons pas avoir de victimes civiles. Soyez prudent lorsque vous engagez le combat avec des ennemis. \n\nCONTRAT AUTORISÉ PAR :\nAgent de Liaison Gibbs\nID# 91G66BW0\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
