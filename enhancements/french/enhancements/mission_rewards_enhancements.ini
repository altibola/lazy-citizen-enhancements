EckhartSecurity_DestroyServers_FacilityDelving_Desc_001=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Destruction de serveurs\nCODE D'APPROBATION = VS-14\n\nPOUR PRISE EN CHARGE IMMÉDIATE\n\nNotre client a demandé la destruction immédiate d'un groupe de serveurs situés dans un site de recherche ASD fermé depuis longtemps. Les serveurs en question contiennent des informations que notre client considère comme extrêmement compromettantes et souhaite voir complètement détruites.\n\nUne première observation indique que les serveurs se trouvent dans le <EM4>Labo d'énergie, situé dans la section Recheche</EM4>. Nous avons également détecté la présence de forces hostiles, soyez donc vigilants.\n\nLe paiement sera effectué à l'achèvement du contrat.\n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Applicant:</EM4> +50 Rep
EckhartSecurity_DestroyServers_FacilityDelving_Desc_002=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Destruction de serveurs\nCODE D'APPROBATION = VS-14\n\nPOUR PRISE EN CHARGE IMMÉDIATE\n\nUn client nous a demandé d'infiltrer un ancien site de recherche d'ASD et d'effacer le contenu de certains de ses serveurs.\n\nNous pensons que les serveurs se trouvent quelque part dans le <EM4>labo Xénotech, dans la section Recherche</EM4>. Le client nous a également informés que, bien que les installations aient été officiellement déclarées fermées, vous risquez toujours d'y trouver des forces hostiles.\n\nLe paiement sera effectué à l'achèvement du contrat.\n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Applicant:</EM4> +50 Rep
EckhartSecurity_DestroyServers_FacilityDelving_Desc_003=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Destruction de serveurs\nCODE D'APPROBATION = VS-14\n\nPOUR PRISE EN CHARGE IMMÉDIATE\n\nIl s'agit d'un simple contrat de recherche et destruction. Le client a demandé que plusieurs serveurs dans un site de recherche d'ASD soient détruits dans les plus brefs délais. Vous ne devez en aucun cas consulter ces serveurs ni faire de copies des données.\n\nLe client pense que les serveurs se trouvent quelque part dans la <EM4>section Ingénierie</EM4> très probablement dans la zone <EM4>Administration</EM4>. De plus, il y a de fortes chances que vous ne soyez pas seul sur les lieux, alors méfiez-vous des ennemis potentiels.\n\nLe paiement sera effectué à l'achèvement du contrat.\n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Applicant:</EM4> +50 Rep
EckhartSecurity_DestroyServers_FacilityDelving_Desc_004=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Destruction de serveurs\nCODE D'APPROBATION = VS-14\n\nPOUR PRISE EN CHARGE IMMÉDIATE\n\nLe client a demandé à un prestataire discret d'infiltrer un site de recherche d'ASD, de localiser un groupe de serveurs et de détruire les informations qui y sont stockées de manière définitive.\n\nLe client a pu communiquer l'emplacement des serveurs au sein du complexe : le <EM4>Centre de contrôle dans la section Ingénierie</EM4>. Le site a été officiellement fermé, mais des forces hostiles pourraient encore s'y trouver. Soyez sur vos gardes.\n\nLe paiement sera effectué à l'achèvement du contrat.\n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Applicant:</EM4> +50 Rep
