mgClovus_opensalvage_desc_001=La chance nous a encore souri. Je viens d'apprendre qu'une bataille près de ~mission(Location) vient de se dérouler loin des regards indiscrets du relais de communication, et les renforts des forces impliquées n'ont pas encore été envoyés. Cela signifie qu'il y a une opportunité pour une âme entreprenante de piller la zone de combat.\n\nJe souhaite étendre cette opportunité à tous mes contacts de confiance. Toutes les parties intéressées peuvent avoir l'emplacement... pour le bon prix. Les coordonnées seront fournies une fois que vous aurez accepté le contrat et resteront disponibles jusqu'à ce que vous choisissiez de le résilier.\n\nBien sûr, la rapidité sera essentielle, car vous devrez non seulement faire face à la concurrence éventuelle d'autres recycleurs, mais aussi à la possibilité imminente de l'arrivée de renforts pour inspecter le champ de bataille.\n\nSi vous hésitez encore, rappelez vous simplement que la fortune sourit aux audacieux.\n\n-cd\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Friendlies:</EM4> Salvageable Ships x8
