redwind_UGF_collect_desc_001=RED WIND LINEHAUL\n'VOS BIENS ENTRE DE BONNES MAINS'\n----------------------------\n\nJ'ai un envoi qui attend d'être transporté de <EM4>~mission(Location|Address)</EM4> à <EM4>~mission(Destination|Address)</EM4>.\n\nJe vais être franc avec vous, cet endroit n'a pas la meilleure réputation. Cela dit, ils ont toujours besoin de livraisons et ils ont des crédits, donc tout est carré. Mais si vous y allez, il y a de fortes chances que vous rencontriez des problèmes.\n\nNe prenez pas le boulot si vous ne pouvez pas gérer ça.\n\n\n\nÀ TOUS LES ANCIENS VETERANTS - Red Wind apprécie votre service envers notre Empire ! Vos luttes signifient notre liberté !\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Unknown:</EM4> 4
redwind_UGF_collect_title_001=BESOIN D'UN PILOTE LIVRAISON RED WIND <EM4>[500 Rep]</EM4>
redwind_courier_dc_small_title_001=Itinéraire d'Envoi Local Red Wind <EM4>[500–1,000 Rep]</EM4>
redwind_courier_fromdc_med_desc_001=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------\n\nJ'ai reçu une demande de ~mission(Pickup1|Address) indiquant qu'ils ont un bon nombre de colis en attente dans ~mission(Pickup1) et qu'ils ont besoin d'être livrés. \n\nAvant d'accepter le contrat, assurez-vous d'avoir un vaisseau avec assez d'espace. Un rayon tracteur ne ferait pas de mal non plus.\n\nENLÈVEMENT DE COLIS \n     · Tous les colis se trouvent dans <EM4>~mission(Pickup1)</EM4> à <EM4>~mission(Pickup1|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> à <EM4>~mission(Dropoff4|Address)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> à <EM4>~mission(Dropoff5|Address)</EM4>\n     · Colis <EM4>#~mission(Item6|SerialNumber)</EM4> à <EM4>~mission(Dropoff5|Address)</EM4>\n     · Colis <EM4>#~mission(Item7|SerialNumber)</EM4> à <EM4>~mission(Dropoff6|Address)</EM4>\n     · Colis <EM4>#~mission(Item8|SerialNumber)</EM4> à <EM4>~mission(Dropoff6|Address)</EM4>\n     · Colis <EM4>#~mission(Item9|SerialNumber)</EM4> à <EM4>~mission(Dropoff7|Address)</EM4>\n     · Colis <EM4>#~mission(Item10|SerialNumber)</EM4> à <EM4>~mission(Dropoff7|Address)</EM4>\n\n\nNOUS SOMMES L'ÉGALITÉ DES CHANCES - Red Wind Linehaul est et a toujours été un entrepreneur de l'égalité des chances. Si vous pensez pouvoir faire du bon travail pour nous, n'hésitez pas à vous engager. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
redwind_courier_fromdc_small_desc_001=RED WIND LINEHAUL\n'VOS BIENS ENTRE DE BONNES MAINS'\n----------------------------\n\nLes gens de ~mission(Pickup1|Address) ont quelques colis dans ~mission(Pickup1) qu'ils veulent faire livrer. Des crédits faciles à obtenir pour un chargement et un dépôt de base.\n\nENLÈVEMENT DE COLIS \n     · Tous les colis se trouvent dans <EM4>~mission(Pickup1)</EM4> à <EM4>~mission(Pickup1|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> à <EM4>~mission(Dropoff4|Address)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> à <EM4>~mission(Dropoff5|Address)</EM4>\n\n\nA TOUS LES VÉTÉRANTS - Red Wind apprécie les services que vous avez rendus a notre empire ! Vos combats sont synonymes de liberté ! \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
redwind_courier_todc_med_desc_001=RED WIND LINEHAUL\n'VOS BIENS ENTRE DE BONNES MAINS'\n----------------------------\n\nIl y a un nombre important de colis qui doivent être apportés de ~mission(Dropoff1) à ~mission(Dropoff1|Address). Tant que votre vaisseau a assez de place, cela devrait être une course relativement simple.n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE) \n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis le <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> depuis le <EM4>~mission(Pickup2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> depuis le <EM4>~mission(Pickup3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> depuis le <EM4>~mission(Pickup4|Address)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> depuis le <EM4>~mission(Pickup5|Address)</EM4>\n     · Colis <EM4>#~mission(Item6|SerialNumber)</EM4> depuis le <EM4>~mission(Pickup5|Address)</EM4>\n     · Colis <EM4>#~mission(Item7|SerialNumber)</EM4> depuis le <EM4>~mission(Pickup6|Address)</EM4>\n     · Colis <EM4>#~mission(Item8|SerialNumber)</EM4> depuis le <EM4>~mission(Pickup6|Address)</EM4>\n     · Colis <EM4>#~mission(Item9|SerialNumber)</EM4> depuis le <EM4>~mission(Pickup7|Address)</EM4>\n     · Colis <EM4>#~mission(Item10|SerialNumber)</EM4> depuis le <EM4>~mission(Pickup7|Address)</EM4>\n\nLIEUX DE DÉPÔT\n     · Tous les colis livrés au <EM4>~mission(Dropoff1)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n\n\n\nNE PRENEZ PAS CE CONTRAT - à moins que vous ne soyez fiable. Red Wind jouit d'une réputation à laquelle nos clients font confiance, et ce pour de bonnes raisons. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
redwind_courier_todc_small_desc_001=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------\n\nJ'ai un petit paquet de colis à récupérer et à apporter de ~mission(Dropoff1) à ~mission(Dropoff1|Address). Il n'y a pas d'autre solution que d'aller à la rencontre de la population.\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE) \n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis le <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> depuis le <EM4>~mission(Pickup2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> depuis le <EM4>~mission(Pickup3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> depuis le <EM4>~mission(Pickup4|Address)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> depuis le <EM4>~mission(Pickup5|Address)</EM4>\n\nLIEUX DE DÉPÔT\n     · Tous les colis doivent être livrés au <EM4>~mission(Dropoff1)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n\n\n\nLA CONFIANCE VA DANS LES DEUX SENS - En acceptant ce contrat, vous vous engagez à ne pas nous tromper, et Red Wind Linehaul s'engage à vous traiter de la même façon. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
roughready_bounty_cargoship_desc_001=Les Rough & Ready ont récemment permis de faire le plein d'un transporteur nommé ~mission(TargetName), qui a accepté de nous livrer son prochain chargement de ravitaillement en récompense. Et bien, nous avons découvert que cet enfoiré de menteur a vendu à la place son dernier chargement à un gang rival. \n\nOn recherche quelqu'un pour trouver et éliminer ~mission(TargetName|Last) pour cette trahison. \n\nUn vieil ami à moi a justement repéré cet enfoiré à ~mission(Location|Address). On dirait qu'il est encore chargé de marchandises qui n'arriveront pas, et qu'il voyage avec une escorte. On te paye uniquement pour descendre le vaisseau, alors tu peut garder tout ce qui se trouve à bord.\n\n- Smokey\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
roughready_bounty_cargoship_desc_002=Mes associés et moi-même avons scellé un contrat avec un transporteur du nom de ~mission(TargetName) pour nous délivrer du ravitaillement. La blague c'est qu'il ne s'est jamais pointé. Ils racontent qu'ils ont été attaqués par des pirates qui ont pris notre part, mais il se trouve que cette histoire est à 100% du ranta dung.\n\nMentir pour revenir sur notre marché ne peut pas rester impuni et vous allez leur délivrer un message très clair. ~mission(TargetName|Last) a récemment été vu avec une escorte vers ~mission(Location|Address). À partir du moment où tu élimine ~mission(TargetName|Last), on se fiche de ce qui arrive à son cargo. \n\n- Smokey\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1
roughready_bounty_cargoship_desc_003=Certains imbéciles se faisant appeler ~mission(TargetName) ont monté un stratagème où leur vaisseau cargo demande des services de ravitaillement en carburant seulement pour tendre une embuscade à nos vaisseaux une fois sur place. Ils l'ont même chargé avec de la vraie cargaison pour s'assurer qu'il passe les scans. Nous avons répandu la nouvelle pour qu'aucun des Rough & Ready ne tombe à nouveau dans le piège, mais je veux que ce vaurien soit puni. \n\nJe pense que ~mission(TargetName|Last) connaît beaucoup de nos gens de vue, alors je pense qu'il vaudra mieux te payer pour t'occuper de cela. J'ai entendu dire qu'ils ont été repérés aux alentours de ~mission(Location|Address). Rends toi là-bas maintenant et occupe toi de ce vaisseau cargo et de quiconque le protège une fois pour toutes. \n\n- Smokey\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
roughready_bounty_desc_001=Tu cherche une petite chasse ? \n\n~mission(TargetName) a saboté l'une de nos cargaisons de carburant et nous a coûté une tonne de crédits, donc je cherche quelqu'un pour le faire payer. Je viens d'apprendre que ~mission(TargetName|Last) a été repéré vers ~mission(Location|Address). Si tu va là-bas, il y a de bonnes chances pour que tu puisse le traquer et l'éliminer pour de bon. \n\n~mission(TargetName|Last) ne travaille pas seul, donc ne sois pas surpris si tu le trouve gardé.\n\n Smokey\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
roughready_bounty_desc_003=J'ai une situation délicate à régler. Après des années de fidélité à Rough & Ready, ~mission(TargetName) a fait défection au gang et est dehors en train d'acheter des secrets à nos rivaux. Nous avons besoin que ~mission(TargetName|Last) soit ghosté immédiatement. \n\nPour ce genre de choses, j'ai constaté qu'il est toujours préférable de payer quelqu'un qui n'est pas associé à nous pour faire le travail. Les scanners ont repéré ~mission(TargetName|Last) près de ~mission(Location|Address) il n'y a pas longtemps. Nous te paierons bien pour que tu aille là-bas et que tu t'occupe d'eux pour nous. \n\n~mission(TargetName|Last) n'est pas idiot et sait que nous viendrons le chercher. Prépare toi à un combat d'enfer et ne t'attends pas à ce qu'ils soient seuls. \n\n- Smokey \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
roughready_claimsweep_desc_easy=Les Rough & Ready recherchent quelqu'un pour gérer une situation délicate. Nous avons découvert un vaisseau et des tourelles orbitales à ~mission(location|address) qui nous espionnent. On est un peu dans le pétrin car nous ne voulons pas déclencher un conflit plus large avec qui que ce soit qui soit derrière ça. C'est pourquoi nous recherchons à employer de l'aide pouvant rapidement et discrètement s'occuper d'elles pour nous. Intéressé ?\n\nDernière chose, une fois sur place, assure-toi de garder un œil sur ce vaisseau. Je parie qu'à l'instant même où vous allez commencer à exploser ces tourelles il va ramener des renforts pour t'arrêter.\n \n- Smokey\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x3, Prospectors x1\n<EM4>Turrets:</EM4> 2 (hostile)
roughready_claimsweep_desc_hard=Les Rough & Ready recherchent un mercenaire indépendant intéresse dans quelque chose de gros. Nous avons gardé un œil sur le développement de la situation à ~mission(location|address) où des vaisseaux gardent plusieurs sentinelles orbitales espionnant nos opérations. \n\nEt, je suis peut-être né un jour de pluie, mais ce n'était pas celui de la dernière pluie. En considérant à quel point leur installation est évidente, qui que ce soit qui soit responsable devait savoir qu'on les découvrirait tôt ou tard. Presque comme s'ils voulaient que les R&R les attaque, et je ne veux pas qu'on se fasse avoir. \n\nÀ la place, tu va le faire pour nous et tu sera payé une sacré somme en crédits pour tes efforts. Les vaisseaux stationnés là seront moins suspicieux si un vaisseau non affilié s'en approche et il sera alors plus difficile de faire le lien avec nous. \n\nAssure toi de te préparer en conséquence avant de partir. Ramène peut-être tes propres renforts au cas où l'un de leurs vaisseaux s'échappe et appel les leurs. \n\n- Smokey\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x5, Prospectors x4\n<EM4>Turrets:</EM4> 4 (hostile)
roughready_claimsweep_desc_intro=Mes associés et moi nous sommes retrouvés dans une situation délicate et avons besoin d'aide. Il y a une sentinelle orbitale à ~mission(location|address) qui nous espionne. Nous ne savons pas qui l'a mise là, mais elle ne peut pas y rester. \n\nNous sommes avant tout des hommes d'affaires et nous craignons que si nous la faisons exploser nous-mêmes, cela ne déclenche des problèmes. C'est pourquoi il vaut mieux que ce soit quelqu'un comme toi qui s'en charge. Ce devrait être un travail rapide et facile pour quelqu'un qui souhaite gagner de l'expérience.   \n\nSmokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Turrets:</EM4> 1 (hostile)
roughready_claimsweep_desc_medium=J'ai récemment fait une découverte intéressante à propos de quelqu'un qui a placé une poignée de sentinelles orbitales à ~mission(location|address). J'imagine qu'ils essaient de glaner quelques infos au sujet de nos opérations ici. Ils ont même quelques vaisseaux pour les garder afin de s'assurer que rien ne leur arrive. \n\nBien sûr, on veut que ces enfoirés disparaissent, mais je m'inquiète du faite que s'en débarrasser nous-même pourrait être mauvais pour les affaires. C'est pourquoi nous recherchons une petite ’neutralisation plausible’. Quelqu'un hors des R&R pour éliminer le problème, afin que qui que ce soit se trouvant derrière ne puisse pas directement faire le lien entre l'attaque et nous. Je sais que ça ne va pas être du gâteau, surtout avec ces gardes en embuscade. Qui sait le nombre de renforts qu'ils ont à disposition ? Mais si tu réussi à t'en en sortir, nous sommes prêts à te payer correctement. \n\nTu pense en être capable ? \n\n- Smokey\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x4, Prospectors x2\n<EM4>Turrets:</EM4> 3 (hostile)
roughready_delivery_station_desc_001=Y a-t-il une chance que vous soyez à ~mission(Destination) ?\n\nJ'ai besoin qu'une caisse soit transporté de <EM4>~mission(Location|Address)</EM4> à <EM4>~mission(Destination|Address)</EM4>. Faites-le à temps et sans interruption, et ce sera le plus facile des crédits que vous gagnerez jamais.   \n\n-Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 1/7 | Complexity 1/7 | Risk 1/7 | Knowledge 1/7
roughready_delivery_station_title_001=Balade à ~mission(Destination)
roughready_eliminateall_hangar_desc_01=Des hors-la-loi sont restés trop longtemps sur l'une de nos stations. Ils ont essayé de nous rouler dans la farine, mais ils sont maintenant piégés dans ~mission(location|address). Nous avons besoin de toi pour les sortir de là. \n\nRough & Ready ne veut pas qu'un seul d'entre eux reste en vie quand tu aura fini. Peu importe le désordre tant que c'est fait, compris ? \n\nSmokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x24, Soldiers x2
roughready_eliminateall_maintenance_desc_01=Les Rough & Ready ont un problème de taupe. L'un de nos membres a tenté de déclencher une petite mutinerie, et maintenant ils se sont emparés de ~mission(location|address).\n\nPuisque je ne peux pas être sûr à 100% qu'ils n'ont pas des sympathisants à bord de la station, je veux que tu t'occupe d'abattre ces traitres pour moi.\n\nSi tu parviens à nous débarrasser de ces nuisibles, tu sera payé gracieusement. Ne laisse aucun d'entre eux en vie. Je souhaite que personne d'autre ne se fasse des idées.\n\n- Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x21
roughready_salvage_E_desc_001=Had a few wrecked ships towed to ~mission(Location|Address). They’re fully out of commission and in dire need of scrapping. If you’re interested in salvaging what’s left, it can be all yours, for a fair price, too.\n\nPlus, you don’t have to worry much about any distractions while you’re workin’ since you’ll be near one of our stations and we make sure folks behave themselves.\n\n- Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Friendlies:</EM4> Salvageable Ships x1
roughready_salvage_E_title_001=Épaves de Vaisseaux à Vendre
roughready_salvage_M_desc_001=On m'a dit qu'il y avait quelques vaisseaux près de ~mission(Location|Address) qui flottaient tout seuls. C'est unbon recyclage, mais aucun de nos équipages n'a le temps en ce moment. Nous avons décidé de vous donner la primeur. \n\nSi vous voulez les coordonnées, nous vous les vendrons pour un certain prix. Ensuite, vous serez libre de ramasser l'épave aussi proprement que vous le souhaitez et de la vendre pour en tirer un bon profit. Maintenant, vous pourriez rencontrer quelques problèmes avec des pillards rivaux, mais je suis sûr qu'il n'y aura rien que vous ne puissiez gérer.\n\n- Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Friendlies:</EM4> Salvageable Ships x1
roughready_salvage_M_title_001=Récupération de Vaisseaux à la Dérive
roughready_searchbody_danger_station_desc_001=Après avoir entendu des rumeurs selon lesquelles nous aurions eu un mauvais cas de squatters à ~mission(Location|Address), j'ai envoyé l'une de mes personnes de confiance pour enquêter. \n\nLa mauvaise nouvelle est que je n'ai pas entendu parler d'eux depuis. \n\nJ'aimerais que vous alliez voir si vous pouvez trouver où se trouve actuellement ~mission(TargetName).  Je vous laisse décider de la manière dont vous allez traiter les criminels que vous rencontrerez. \n\nConfirmez où se trouve ~mission(TargetName|Last), et il y aura une récompense pour vous.\n\n- Smokey \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
roughready_searchbody_nodanger_station_desc_001=J'ai des gens à droite et à gauche qui me demandent si je sais ce qui est arrivé à ~mission(TargetName). Personnellement, je serais plus qu'heureux de les voir partir pour de bon, mais pour une raison ou une autre, ils ont des amis haut placés qui exigent des réponses.\n\nJe ne peux pas me passer de l'un de mes employés pour partir sur une mauvaise piste, alors je cherche le candidat parfait pour aller à ~mission(Location|Address) et découvrir ce qui est arrivé à ~mission(TargetName|Last). Vous serez payé si vous trouvez où ils sont.\n\n10 crédits qu'ils se sont trop défoncés et qu'ils se sont évanouis dans un coin sombre quelque part.\n\n-Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
