Adagio_Industrial_Component_Salvage_Pyro_E_Desc_001=Adagio Holdings\nUne entreprise fière de promouvoir l'égalité des chances\n\n> À propos du contrat <\nAfin de répondre à une commande spéciale récente, nous recherchons des prestataires pour nous aider à trouver du Composite de matériaux recyclés (C.M.R.) et des composants en démantelant des vaisseaux abandonnés et en retirant manuellement les pièces demandées avec un <EM4>rayon tracteur</EM4>.\n\nNous vous recommandons de rechercher des épaves aux points de Lagrange ou d'acheter une concession de recyclage auprès de nous dans votre gestionnaire de contrats. Cette commande ne sera probablement pas aussi facile à satisfaire que nos contrats habituels, d'une part en raison du nombre important de hors-la-loi présents dans Pyro, et d'autre part parce qu'il ne s'agit pas d'un composant ordinaire. Mais heureusement pour vous, ces efforts supplémentaires seront récompensés.\n\nUne fois les matériaux récupérés, livrez-les au monte-charge situé à <EM4>~mission(Destination|Address)</EM4>.\n\nPour obtenir des conseils sur le recyclage, consultez le <EM4>Guide du recycleur pour la collecte de matériaux</EM4> dans le journal de votre mobiGlas.\n\n> Pré-requis <\n     - Vaisseau de recyclage de n'importe quelle classe/taille\n     - Rayon tracteur portable\n\n> Clause de non-responsabilité <\nLes prestataires sont tenus de s'assurer qu'ils récupèrent des matériaux provenant de véhicules considérés comme des épaves légitimes au regard des lois en vigueur de l'UEE. Adagio Holdings n'est en aucun cas responsable des crimes ou délits commis par les prestataires et n'offrira aucune compensation ou réparation aux personnes affectées par ces actions.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 2/7 | Risk 5/7 | Knowledge 2/7\n<EM4>Neutral:</EM4> +100 Rep
