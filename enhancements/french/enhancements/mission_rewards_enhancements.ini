Foxwell_DefendEntitesAndEscort_S_Desc=Un appel de détresse vient d'être lancé par une équipe de maintenance employée par l'un des clients VIP de Foxwell. Si vous êtes disponible, nous vous invitons instamment à vous rendre à <EM4>~mission(Location|Address)</EM4> dès que possible. Tout en affrontant les assaillants, vous devrez protéger les <EM4>~mission(Objects) du client ainsi que ses vaisseaux qui pourraient avoir besoin d'aide</EM4>. \n\nCe n’est pas la première fois que nous sommes confrontés à ces hors-la-loi, alors croyez-moi quand je vous dis qu’il ne faut pas prendre ces pilotes à la légère. Je vous recommande vivement de faire appel à des <EM>renforts hautement compétents</EM> pour vous accompagner sur place.\n\nSi vous parvenez à défendre avec succès les intérêts du client, nous offrons <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires</EM4> en guise de récompense au prestataire principal assez courageux pour accepter cette mission. \n\nSoyez prudents et bonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Nyx]</EM4>\n- [CIV-S0-A] Tepilo\n- [CIV-S0-C] Fridan\n- [CIV-S0-C] Frost-Star SL\n- [CIV-S1-A] Gelid\n- [CIV-S1-C] ArcticStorm\n- [CIV-S1-C] Berian\n- [CIV-S1-C] Frost-Star\n- [CIV-S2-A] Aufeis\n- [CIV-S2-C] ColdSnap\n- [CIV-S2-C] Frost-Star EX\n- [CIV-S2-C] Graupel\n- [CIV-S3-A] Kragen\n- [CIV-S3-B] Elsen\n- [CIV-S3-C] Draug\n- [CIV-S3-C] Frost-Star XL\n- [CIV-S3-C] FrostBurn\n- [E-S1-A] CF-117 Bulldog Repeater\n- [E-S2-A] CF-227 Badger Repeater\n- [E-S3-A] CF-337 Panther Repeater\n- [E-S4-A] CF-447 Rhino Repeater\n- [E-S5-A] CF-557 Galdereen Repeater\n- [E-S6-A] CF-667 Mammoth Repeater\n- [MIL-S0-A] V60-26\n\n<EM4>[Pyro]</EM4>\n- [CIV-S0-B] IonWave\n- [CIV-S0-C] Radix\n- [CIV-S1-B] IonBurst\n- [CIV-S1-B] MagnaBloom\n- [CIV-S1-C] LightBlossom\n- [CIV-S1-C] PowerBolt\n- [CIV-S2-B] IonSurge\n- [CIV-S2-B] Radiance\n- [CIV-S2-C] FullForce\n- [CIV-S3-B] Celestial\n- [CIV-S3-B] IonSurge Pro\n- [CIV-S3-C] FullForce Pro\n- [CIV-S3-C] NewDawn\n- [D-S1-A] DR Model-XJ1 Repeater\n- [D-S2-A] DR Model-XJ2 Repeater\n- [D-S3-A] DR Model-XJ3 Repeater\n- [MIL-S1-A] Glacier\n- [MIL-S2-A] Avalanche\n- [MIL-S3-A] Blizzard\n\n<EM4>[Stanton]</EM4>\n- [CIV-S1-A] 7SA 'Concord'\n- [CIV-S1-D] INK\n- [CIV-S2-A] 7MA 'Lorica'\n- [CIV-S2-D] RPEL\n- [CIV-S3-A] 7CA 'Nargun'\n- [CIV-S3-D] HAVEN\n- [E-S4-A] Attrition-4 Repeater\n- [E-S5-A] Attrition-5 Repeater\n- [E-S6-A] Attrition-6 Repeater\n- [MIL-S0-B] Sens\n- [MIL-S1-B] Tige\n- [MIL-S3-A] FR-86\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x32, Interdiction Ships x6, Reinforcements x20\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Rep:</EM4> +300\n<EM4>Blueprint Reward:</EM4> Guaranteed
