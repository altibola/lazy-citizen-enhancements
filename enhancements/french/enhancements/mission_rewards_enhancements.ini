foxwell_DefendShip_H_desc_001=Un contrat d'urgence vient d'arriver à propos d'une bagarre près de ~mission(Location|Address). Apparemment, un groupe de vaisseaux a été pris en embuscade par des hors-la-loi menés par ~mission(TargetName), qui est recherché sur plusieurs planètes pour meurtre et vol de vaisseau. Foxwell recherche des pilotes de combat de haut niveau pour protéger les clients contre eux. \n\nCe contrat a été signalé comme étant de niveau rouge, il est donc très dangereux. Si vous avez des gens que vous pouvez amener, vous devriez probablement le faire. Si c'est le cas, vous devriez aussi les informer de la politique d'embauche de Foxwell. \n\nMarcus Clenn\nFoxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostiles x9\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Blueprint Reward:</EM4> Guaranteed
