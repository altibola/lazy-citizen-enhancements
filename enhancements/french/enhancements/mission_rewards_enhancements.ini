northrock_groupbounty_desc_intro=Hé,\n\nJ'espère que tout va bien. Je vous ai peut-être déjà contacté, mais je voulais en être sûr et me présenter également. Je suis agent de la logistique pour le Groupe Northrock Service, la principale société de sécurité indépendante opérant aujourd'hui dans le système de Stanton, fournissant une variété de services à tous les organismes gouvernementaux majeurs ainsi qu'à diverses entreprises privées. La raison pour laquelle je vous contacte est que nous pensons qu'une personne possédant vos compétences pourrait être une aubaine pour nos clients. \n\nNon seulement cela, mais je pense que nous serions parfaits pour vous. Nos prestataires bénéficient traditionnellement d'un taux de rémunération plus élevé que beaucoup de nos concurrents du système, et beaucoup d'entre eux me disent à quel point ils aiment vraiment se voir confier le travail stimulant et intéressant que nous proposons. \n\nMaintenant, Northrock s'impose des normes si élevées qu'avant de pouvoir officialiser quoi que ce soit, vous devrez obtenir le statut de prestataire approuvé en concluant un contrat temporaire. \n\nJ'espérais que vous pourriez capturer plusieurs membres recherchés d'un gang de hors-la-loi : ~mission(Target1), ~mission(Target2) et ~mission(Target3).\n\nFaites cela et nous verrons comment vous fournir plus de travail.\n\nJ'espère avoir de vos nouvelles bientôt, \n\nBraden Corchado\nAgent Logistique - Succursale de Stanton\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x15, Targets x6
northrock_groupbounty_desc_rehire=Hé,\n\nJ'ai réfléchi à tout ce qui s'est passé et j'ai décidé d'en parler à la direction. Ils ont accepté de vous donner une autre chance, mais seulement si vous réussissez à remplir un contrat pour nous.\n\nNous pouvons envisager de rétablir votre statut d'emploi si vous pouvez ramener ce trio criminel :\n~mission(Target1)\n~mission(Target2)\n~mission(Target3)\n\nIls ont échappé au dernier Associé qui les a poursuivis, donc les faire tous venir vous rapporterait certainement des points.\n\nJ'espère que vous avez repris vos esprits depuis votre dernier emploi.\n\nBraden Corchado\nAgent Logistique - Succursale de Stanton\nGroupe Northrock Service\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x15, Targets x3
