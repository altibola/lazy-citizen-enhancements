Adagio_Industrial_Salvage_Universal_Intro_Desc_001=Adagio Holdings\nUne entreprise fière de promouvoir l'égalité des chances\n\n> À propos de nous <\nEn tant que principal fournisseur et distributeur de concessions de recyclage, Adagio Holdings cherche désormais à se développer dans l'acquisition et la distribution de matériaux recyclables auprès des petites et grandes entreprises.\n\n> À propos du contrat <\nDans le cadre de cette initiative, nous recherchons des prestataires l'œil avisé, capables d'identifier les matériaux recyclables, de les extraire efficacement et de nous livrer le Composite de matériaux recyclés (C.M.R.) et les composants récupérés.\n\nCe contrat d'introduction vous demandera de vous rendre à <EM4>~mission(Location|Address)</EM4> et de démanteler un vaisseau abandonné dont le recyclage a été approuvé.\n\nUne fois que vous aurez collecté le C.M.R., vous le livrerez au monte-charge situé à <EM4>~mission(Destination|Address)</EM4>.\n\n> Prérequis <\n     - Vaisseau de recyclage de n'importe quelle classe/taille\n\nPour obtenir des conseils sur le recyclage, consultez le <EM4>Guide du recycleur pour la collecte de matériaux</EM4> dans le journal de votre mobiGlas.\n\n> Clause de non-responsabilité <\nLes prestataires sont tenus de s'assurer qu'ils récupèrent des matériaux provenant de véhicules considérés comme des épaves légitimes au regard des lois en vigueur de l'UEE. Adagio Holdings n'est en aucun cas responsable des crimes ou délits commis par les prestataires et n'offrira aucune compensation ou réparation aux personnes affectées par ces actions.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Abrade Scraper Module\n- [S1-A] Cinch Scraper Module\n- [S1-A] Trawler Scraper Module\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Friendlies:</EM4> Salvageable Ships x1\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
