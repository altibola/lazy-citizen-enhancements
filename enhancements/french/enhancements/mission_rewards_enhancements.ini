bitzeros_shipheist_E_desc_001=Écoutez ça, nous avons passé au crible quelques communications et nous avons entendu parler d'un gros coup. C'était facile de savoir où ils cachaient un vaisseau chargé de marchandises et on s'est dit : pourquoi garder ce précieux savoir pour nous ? \n\nEnvoyez-nous quelques crédits en honoraires de recherche et nous vous enverrons les coordonnées de la base d'astéroïde où le vaisseau est caché. Il est enfermé dans un hangar, vous devrez donc emprunter les ascenseurs de la station pour y accéder. Mais une fois à l'intérieur, vous pourrez annuler le verrouillage à partir d'une console. Faites cela et vous devriez pouvoir vous en emparer facilement.\n\n57 65 65 76 69 6c\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x30, Heist Target x1, Juggernauts x4, Snipers x1
bitzeros_shipheist_E_title_001=Argent Facile
bitzeros_shipheist_H_XT_desc_001=Vous savez qui mérite probablement de se faire rabattre le caquet ? XenoThreat. \n\nNous avons obtenu des informations sur un serveur qui contenait les détails de toutes leurs opérations à venir, et pour un bon prix, nous pourrions vous envoyer les coordonnées exactes de l'endroit où un vaisseau XT entièrement chargé de marchandises de premier choix vous attend. \n\nVoici un petit aperçu des informations dont nous disposons, pour que vous compreniez bien qu'on ne se fout pas de vous. XenoThreat a caché le vaisseau dans un hangar verrouillé d'une base d'astéroïde auquel on ne peut accéder que par les ascenseurs de la station. Nous ne pouvons pas ouvrir les portes du hangar pour vous, mais nous avons ajusté les protocoles de sécurité pour que vous puissiez utiliser une console dans le hangar afin de contourner le verrouillage.  \n\nÇa vous intéresse ?\n\n57 65 65 76 69 6c\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x54, Heist Target x1, Juggernauts x4, Snipers x1
bitzeros_shipheist_H_XT_title_001=XenoThreat = Butin de Qualité
bitzeros_shipheist_M_desc_001=On pourrait penser que si des gens préparaient un gros hold-up, ils ne laisseraient pas tous les détails traîner sur spectrum, là où n'importe qui pourrait les pirater ? \n\nMais bon, leur malheur, votre bonheur. Un vaisseau cargo lourd est actuellement enfermé dans le hangar d'une base d'astéroïde. Le seul moyen d'y accéder est d'emprunter les ascenseurs de la station. Une fois à l'intérieur, vous pourrez utiliser une console pour passer outre le verrouillage et sortir tout ce qui s'y trouve. Nous serons heureux de vous vendre les coordonnées, mais la suite ne dépend que de vous. \n\nJe suppose que leur malheur fera aussi notre bonheur.\n\n57 65 65 76 69 6c\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x42, Heist Target x1, Juggernauts x4, Snipers x2
bitzeros_shipheist_M_title_001=Marchandises à Saisir
blacjac_RetrieveConsignment_desc_001=ATTENTION : Mercenaires expérimentés en manutention de cargaisons\n\nLes Nine Tails sont actuellement en train d'attaquer l'une de nos installations à ~mission(Location|address). Comme ils viennent de recevoir une livraison de matériel confidentiel, nous ne pensons pas qu'il s'agisse d'une coïncidence. BlacJac a besoin de quelqu'un pour se rendre rapidement sur place et sécuriser ces caisses importantes avant que les Nine Tails ne le fassent. Vous êtes autorisé à utiliser la force létale contre quiconque tente de vous arrêter.\n\nDans le cadre de notre protocole de sécurité, le matériel confidentiel a été intégré dans une autre cargaison et sécurisé dans la chambre forte. Vous devrez trouver les codes de récupération correspondant à la cargaison et les saisir dans le terminal de convoyeur de colis pour récupérer les boîtes. Les codes de récupération sont stockés localement sur des datapads et ne sont donnés qu'au personnel de haut rang. Espérons qu'ils soient en vie pour vous aider, mais compte tenu de la coupure totale des communications, nous craignons que ce ne soit plus le cas. Il est possible que les NineTails aient déjà mis la main sur les datapads.\n\nUne fois que vous avez rassemblé tous le matériel confidentiel, il devra être livré à ~mission(dropoff1|address). Le paiement est conditionné à sa livraison.\n\nMerci,\nGloria Mesa\n\nSuperviseur de Contrat Privé\nSécurité BlacJac, "Protection Assurée"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Guards x4, Hostiles x54
blacjac_RetrieveConsignment_title_001=Protection de Site et Récupération de Matériel Confidentiel <EM4>[500–4,000 Rep]</EM4>
blacjac_UGF_defend_E_desc_001=ATTENTION : Opérateurs  Mercenaires Vérifiés\n\nL'un des sites sous la responsabilité de BlacJac est entré en conflit avec quelques hors-la-loi locaux. Nous aimerions que vous vous rendiez à ~mission(Location|Address) et sécurisiez le site contre ces menaces hostiles.\n\nD'après les premiers rapports, je m'attends à ce que cela soit une affaire assez simple, mais si ça vous rassure, n'hésitez pas à recruter une équipe pour vous fournir un soutien supplémentaire.\n\nMerci,\nGloria Mesa\n\nSuperviseur de Contrat Privé\nSécurité BlacJac, "Protection Assurée"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x1, Hostiles x10, Private Security x4, Sentries x6\n<EM4>Unknown:</EM4> 11
blacjac_UGF_defend_E_title_001=Défense de Site Contre une Menace Mineure <EM4>[500 Rep]</EM4>
blacjac_UGF_defend_VH_desc_001=ATTENTION : Opérateurs Mercenaires Vérifiés\n\nJ'ai reçu un rapport selon lequel certains opérateurs prévoient de passer à l'action contre ~mission(Location|Address). BlacJac souhaite que vous formiez une équipe et défendiez le site contre cette menace.\n\nIl est fortement recommandé de ne pas tenter d'exécuter ce contrat en solo. Engager une équipe de mercenaires qualifiés pour vous soutenir serait la meilleure solution.\n\nMerci,\nGloria Mesa\n\nSuperviseur de Contrat Privé\nSécurité BlacJac, "Protection Assurée"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x3, Hostiles x8, Private Security x4, Sentries x4\n<EM4>Unknown:</EM4> 21
blacjac_UGF_defend_VH_title_001=Défense de Site Contre une Menace Dangereuse <EM4>[500 Rep]</EM4>
blacjac_UGF_defend_desc_001=ATTENTION : Opérateurs Mercenaires Vérifiés\n\nNous avons reçu des informations indiquant que certaines forces locales menacent ~mission(Location|Address). BlacJac souhaite que vous formiez une équipe et protégiez le site de ces menaces.\n\nEt même si nous aimons tous l'argent, je ne recommande pas d'essayer de faire cela en seul. Engager une équipe serait bénéfique pour votre business.\n\nMerci,\nGloria Mesa\n\nSuperviseur de Contrat Privé\nSécurité BlacJac, "Protection Assurée"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x8, Private Security x4, Sentries x8\n<EM4>Unknown:</EM4> 10
blacjac_UGF_defend_title_001=Défense de Site Contre une Menace <EM4>[500 Rep]</EM4>
blacjac_UGF_destroy_E_desc_001=ATTENTION: Opérateurs Mercenaires Vérifiés\n\nIl semble qu'un nouvel opérateur tente de se lancer dans la fabrication de drogues à ~mission(Location|Address), mais le produit qu'il fabrique est extrêmement toxique.\n\nNous sommes en train de réfléchir à la manière de procéder aux arrestations, mais le plus important est d'empêcher la distribution de leurs produits. J'ai besoin que vous vous rendiez sur place et détruisiez les drogues qu'ils stockent.\n\nIl y a de fortes chances que l'installation ne soit pas abandonnée, alors vous pourriez vous confronter à ces criminels quand vous irez sur place, alors soyez prêt pour un combat. Mais si leurs compétences en armes sont aussi mauvaises que leur chimie, ce ne sera probablement pas grand-chose.\n\nMerci,\nGloria Mesa\n\nSuperviseur de Contrat Privé\nSécurité BlacJac, "Protection Assurée"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Civilians x4
blacjac_UGF_destroy_E_title_001=Destruction de la Réserve de Drogue <EM4>[500 Rep]</EM4>
blacjac_UGF_destroy_H_desc_001=ATTENTION: Opérateurs Mercenaires Vérifiés\n\nCertains chimistes ont concocté un nouveau produit deux fois plus puissant et deux fois plus mortel que le produit initial. Nous avons pu remonter jusqu'à la source de certains échantillons à ~mission(Location|Address).\n\nBlacJac veut que vous vous y rendiez dès que possible pour détruire tout le lot avant qu'il ne fasse plus de mal à la population. Nous nous occuperons des arrestations plus tard.\n\nD'après ce que nous savons de cette équipe, vous devriez vous attendre à rencontrer une forte résistance lorsque vous tenterez nettoyer la planque.\n\n\nMerci,\nGloria Mesa\n\nSuperviseur de Contrat Privé\nSécurité BlacJac, "Protection Assurée"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
blacjac_UGF_destroy_H_title_001=Destruction des Drogues Dangereuses <EM4>[500 Rep]</EM4>
blacjac_UGF_destroy_desc_001=ATTENTION: Opérateurs Mercenaires Vérifiés\n\nNous avons appris qu'un Syndicat aurait contaminé un paquet de drogue d'un rival, provoquant le chaos dans les rues. L'analyse forensique a permis d'identifier la source, une installation de production à ~mission(Location|Address). On dit que les fabricants de drogue ne savent même pas qu'ils ont une récolte empoisonnée entre les mains.\n\nNous sommes en train de réfléchir à la manière de procéder aux arrestations, mais l'important est de retirer cette saleté des rues maintenant. J'ai besoin que vous vous rendiez sur place et que vous détruisiez les drogues qu'ils stockent sur place.\n\nIls ne seront pas contents, alors vous aurez probablement un combat à mener, mais l'essentiel est d'éliminer le produit.\n\nMerci,\nGloria Mesa\n\nSuperviseur de Contrat Privé\nSécurité BlacJac, "Protection Assurée"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
blacjac_UGF_destroy_title_001=Élimination de Drogue <EM4>[500 Rep]</EM4>
blacjac_UGF_eliminateall_allies_desc_001=ATTENTION: Operateurs Mercenaires Vérifiés\n\nNous avons été informés par l'équipe de sécurité de ~mission(Location|Address) selon lesquelles certains voyous ont lancé des attaques. BlacJac souhaite que vous vous rendiez sur site et que vous aidiez à le protéger contre les menaces hostiles.\n\nAssurez-vous de vérifier vos armes là-bas. Je ne veux rien entendre parler d'incidents entre novices .\n\nMerci,\nGloria Mesa\n\nSuperviseur de Contrat Privé\nSécurité BlacJac, "Protection Assurée"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
blacjac_UGF_eliminateall_allies_desc_intro=ATTENTION: Opérateurs Mercenaires Vérifiés\n\nBlacJac cherche à élargir sa liste de professionnels de la sécurité. Afin d'évaluer si vous êtes un bon candidat, nous aimerions que vous apportiez votre soutien à ~mission(Location|Address) car ils rencontrent des problèmes avec des ennemis dans la région.\n\nSi vous parvenez à protéger le site et à éliminer la menace, nous pourrons vous proposer davantage de missions de sécurité.\n\nNotez que les incidents de tir allié ne seront pas tolérés.\n\nBonne chance,\nGloria Mesa\n\nSuperviseur de Contrat Privé\nSécurité BlacJac, "Protection Assurée"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
blacjac_UGF_eliminateall_allies_desc_rehire=ATTENTION : Ancien Agent Mercenaire\n\nJe suis conscient que BlacJac avait arrêté de vous proposer du travail de sécurité, mais en raison de changements de personnel, il a été décidé de vous offrir une autre chance.\n\nNous avons reçu des informations indiquant que ~mission(Location|Address) a besoin d'aide pour faire face à un gang de hors-la-loi locaux. BlacJac souhaite que vous vous rendiez sur le site et que vous aidiez à éliminer cette menace.\n\nEt comme vous êtes déjà sur la corde raide, je ne veux pas entendre dire que vous avez été impliqué dans des incidents de tir ami.\n\nSi vous parvenez à mener à bien cette opération, nous pourrons envisager de vous réintégrer.\n\nMerci,\nGloria Mesa\n\nSuperviseur de Contrat Privé\nSécurité BlacJac, "Protection Assurée"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
blacjac_UGF_eliminateall_allies_title_001=Protection de Site <EM4>[500 Rep]</EM4>
blacjac_UGF_eliminateall_allies_title_intro=Contrat d'evaluation, Protection de Site <EM4>[500 Rep]</EM4>
blacjac_UGF_eliminateall_allies_title_rehire=Contrat d'evaluation, Protection de Site <EM4>[500 Rep]</EM4>
blacjac_UGF_eliminateall_desc_001=ATTENTION : Opérateurs Mercenaires vérifiés\n\nNous avons appris que ~mission(Location|Address) est utilisé par des criminels comme base d'opérations. BlacJac a besoin que le site soit nettoyé et que tous les habitants en soient évacués.\n\nVous êtes autorisés à utiliser la force létale si nécessaire.\n\nMerci,\nGloria Mesa\n\nSuperviseur de Contrat Privé\nSécurité BlacJac, "Protection Assurée"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x15
blacjac_UGF_eliminateall_nocivs_desc_001=ATTENTION : Agents Mercenaires Vérifiés\n\nNous avons reçu des informations indiquant que ~mission(Location|Address) est utilisé par des criminels locaux comme base d'opérations. BlacJac souhaite que vous fouilliez le site et que vous éliminiez tout ennemi.\n\nNos premiers rapports indiquent qu'il y a de fortes chances que le gang ait des civils travaillant pour lui sur place. Nous ne cherchons pas à faire la une des journaux ici, alors essayez de vous rappeler que vous n'êtes autorisés à engager que des hostiles confirmés.\n\nMerci,\nGloria Mesa\n\nSuperviseur de Contrat Privé\nSécurité BlacJac, "Protection Assurée"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13\n<EM4>Friendlies:</EM4> Civilians x4
blacjac_UGF_eliminateall_title_001=Nettoyage de Site <EM4>[500 Rep]</EM4>
blacjac_bounty_desc_ERT=ATTN : Chasseurs de Prime\n\nVous avez peut-être déjà entendu parler de ~mission(TargetName) auparavant. Il s'agit d'une cible extrêmement dangereuse qui a récemment fait la une des journaux. Nous espérons que vous serez en mesure de constituer une équipe d'intervention et d'aider BlacJac à les arrêter pour de bon. D'après nos dernières informations, leur vaisseau sous-capital et leurs escortes lourdement armées se trouvent du côté de ~mission(Location|Address).\n \nJe vous recommande de disposez d'une Empreinte à jour dans une clinique avant de partir. Au cas où. \n\nBonne chance,\nGloria Mesa\n\nSuperviseur de Contrats Privés\nSécurité BlacJac, "Protection Assurée"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
blacjac_bounty_desc_HRT=ATTENTION : Chasseurs de Primes\n\nVotre prochaine prime, ~mission(TargetName), est certainement considérée comme une cible à risque élevé, et ce n'est pas pour rien. On sait qu'ils voyagent avec une puissance de feu sérieuse et sont escortés par une protection suffisante pour faire réfléchir quiconque à l'idée de se battre.\n\nLes sources indiquent que ~mission(TargetName|Last) se cache à ~mission(Location|Address). Lorsque vous partirez à sa recherche, assurez-vous d'être préparés. Vous pourriez même envisager d'emmener quelques renforts avec vous.\n\nMerci,\n\nGloria Mesa\n\nSuperviseur de Contrat Privé\nSécurité BlacJac, "Protection Assurée"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
blacjac_bounty_desc_LRT=ATTENTION : Chasseurs de Primes\n\nUne prime a été émise pour une cible à risque faible du nom de ~mission(TargetName). La cible elle-même n'est pas vraiment préoccupante, mais il semble qu'elle vole généralement en groupe, donc il y a de fortes chances qu'elle ait quelques amis avec elle lorsque vous la traquerez.\n\nEn parlant de cela, je commencerais la chasse à ~mission(Location|Address), car nous avons des rapports indiquant qu'elle a été repérée dans la région.\nBonne chasse.\n\nMerci,\nGloria Mesa\n\nSuperviseur de Contrat Privé\nSécurité BlacJac, "Protection Assurée"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
blacjac_bounty_desc_MRT=ATTENTION : Chasseurs de Primes\n\nNous avons besoin de vous pour régler le cas de ~mission(TargetName), une prime à risque modéré, que l'on a aperçu pour la dernière fois à ~mission(Location|Address) à bord d'un vaisseau de petite taille conçu pour accueillir plusieurs membres d'équipage. \n\nNous n'avons pas réussi à obtenir de détails précis sur leur vaisseau, mais il semble qu'ils aient d'autres vaisseaux en leur possession. Attendez-vous à une résistance farouche lorsque vous les approcherez.\n\nMerci,\nGloria Mesa\n\nSuperviseur de Contrat Privé\nSécurité BlacJac, "Protection Assurée"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
blacjac_bounty_desc_VHRT=ATTENTION : Chasseurs de Primes\n\nBlacJac vient d'apprendre qu'il s'agit d'une cible risque très élevé, ~mission(TargetName), a été repérée en train de traverser les couloirs aériens à ~mission(Location|Address), pilotant un vaisseau redoutable avec une escorte lourde.\n\nNous voulons que cette prime soit clôturée avant qu'ils ne commettent d'autres crimes. Rassemblez les ressources ou le soutien dont vous avez besoin, et partez dès que possible.\n\nMerci,\nGloria Mesa\n\nSuperviseur de Contrat Privé\nSécurité BlacJac, "Protection Assurée"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
blacjac_bounty_desc_VLRT=ATTENTION : Chasseurs de Primes\n\nJ'ai une cible à risque très faible que j'aimerais que vous gériez : ~mission(TargetName).\n\nLeur dernière localisation connue était ~mission(Location|Address).\n\nIl s'agit d'une prime à faible menace, donc je m'attends à ce que vous puissiez la régler assez rapidement. Ils volent généralement à bord de petits vaisseaux et n'ont pas beaucoup de connaissances. Ça ne peut pas être plus simple que ça.\n\nMerci,\nGloria Mesa\n\nSuperviseur de Contrat Privé\nSécurité BlacJac, "Protection Assurée"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x1, Targets x1
blacjac_bounty_desc_intro=ATTENTION : Chasseurs de Primes\n\nJe ne sais pas si cela vous intéresse, mais BlacJac cherche à élargir sa liste de chasseurs de primes. Nous avons plus de missions que nos prestataires actuels ne peuvent gérer, alors j'espère que vous pourrez nous aider à combler ce déficit.\n\nVos qualifications sont bonnes sur le papier, mais avant de tout officialiser, BlacJac doit voir comment vous vous débrouillez sur le terrain. Nous avons même déjà un cas de test tout prêt - nous voulons que vous vous occupiez de ~mission(TargetName). On les a vus pour la dernière fois à ~mission(Location|Address). Ce devrait être une prime assez simple sans trop de résistance. Parfait pour affûter vos compétences.\n\nBonne chance,\nGloria Mesa\n\nSuperviseur de Contrat Privé\nSécurité BlacJac, "Protection Assurée"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
blacjac_bounty_desc_rehire=ATTENTION : Ancien Chasseur de Primes de BlacJac\n\nJe sais que votre dernière mission de chasseur de primes pour BlacJac n'a pas bien tourné, mais une charge de travail croissante signifie que vous avez la chance d'obtenir une autre chance.\n\nSi vous parvenez à accomplir la prime sur ~mission(TargetName) à ~mission(Location|Address), nous pourrons envisager de vous réintégrer.\n\nMerci,\nGloria Mesa\n\nSuperviseur de Contrat Privé\nSécurité BlacJac, "Protection Assurée"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
blacjac_bounty_fps_UGF_desc_001=ATTENTION : Chasseurs de Primes\n\nNous avons une prime à collecter sur ~mission(TargetName). Le salaud se cache à ~mission(Location|Address) avec un tas d'autres crapules, alors soyez prudents en y allant.\n\nMerci,\nGloria Mesa\n\nSuperviseur de Contrat Privé\nSécurité BlacJac, "Protection Assurée"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13, Targets x1
blacjac_bounty_fps_UGF_nocivs_desc_001=ATTENTION : Chasseurs de Primes\n\nJ'ai besoin que vous capturiez une prime du nom de ~mission(TargetName) à ~mission(Location|Address). Bien qu'il puisse y avoir d'autres complices criminels sur les lieux, je veux que vous soyez attentifs à d'éventuels civils ou travailleurs qui pourraient s'y trouver.\n\nJ'ai déjà suffisamment à gérer, donc je n'ai pas besoin d'expliquer pourquoi un prestataire a tiré sur un groupe de civils.\n\n\nMerci,\nGloria Mesa\n\nSuperviseur de Contrat Privé\nSécurité BlacJac, "Protection Assurée"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
blacjac_bounty_fps_desc_001=ATTENTION : Chasseurs de Primes\n\nBlacJac a une prime à collecter. Le coupable se fait appeler : ~mission(TargetName).\n\nNous avons pu les localiser à ~mission(Location|Address), mais nous n'avons pas une évaluation complète des conditions sur place, alors soyez prudents en pénétrant sur le site.\n\nMerci,\nGloria Mesa\n\nSuperviseur de Contrat Privé\nSécurité BlacJac, "Protection Assurée"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
blacjac_bounty_fps_desc_first=ATTENTION : Chasseurs de Primes\n\nJ'ai plus de primes que de chasseurs de primes pour le moment, alors je cherche à élargir notre liste.\n\nSi vous faites du bon travail sur cette première mission, il y aura d'autres contrats à suivre.\n\nVoyons comment vous vous débrouillez en essayant de traiter la prime sur ~mission(TargetName). On pense qu'il se cache à ~mission(Location|Address). \n\nMerci,\nGloria Mesa\n\nSuperviseur de Contrat Privé\nSécurité BlacJac, "Protection Assurée"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13, Targets x1
blacjac_bounty_fps_desc_rehire=ATTENTION : Ancien Chasseur de Primes de BlacJac\n\nJe sais que BlacJac a cessé de vous confier des contrats de prime, mais les temps changent et nous vous offrons une nouvelle chance.\n\nSi vous parvenez à accomplir la prime sur ~mission(TargetName) à ~mission(Location|Address), nous pourrons envisager de vous réintégrer.\n\nMerci,\nGloria Mesa\n\nSuperviseur de Contrat Privé\nSécurité BlacJac, "Protection Assurée"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13, Targets x1
blacjac_bounty_fps_title_001=Recherché par ArcCorp : ~mission(TargetName) (CR?) <EM4>[500–1,000 Rep]</EM4>
