headhunters_killship_gen_vlrt_desc_001=Il y a du menu fretin qui pense pouvoir frapper les Headhunters et s'en tirer à bon compte. ~mission(TargetName) a donc essayé de renverser l'une de nos planques et pense pouvoir s'en sortir. \n\nAux dernières nouvelles, ils ont été repérés dans les environs de ~mission(Location|Address). Nous avons besoin de quelqu'un pour y aller et envoyer un message très clair sur qui est la puissance régnante dans le système.\n\nFaites-le rapidement et proprement. \n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1\n<EM4>Jr. Contractor:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_killship_gen_vlrt_rank0_desc_001=Vous nous connaissez. Vous savez ce que nous faisons. Le système devient un peu surpeuplé, alors nous cherchons quelques bons soldats pour nous aider à garder notre place ici.\n\nSi vous êtes prêt pour ça et que ça ne vous dérange pas de vous salir les mains, nous avons quelque chose pour prouver que vous avez ce que nous recherchons.\n\n~mission(TargetName) était un ancien membre qui nous a vendu à XenoThreat et qui a fait tuer certains de ses frères et soeurs. Maintenant, ils pensent qu'ils peuvent vivre leur vie sans conséquences.\n\nVous les éliminez. Vous êtes mis en avant. Ça semble être un échange équitable.\n\nIls ont été repérés dans les environs de ~mission(Location|Address), alors allez-y et occupez-vous-en. \n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1\n<EM4>Neutral:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_killship_gen_vlrt_rank0_title_001=Voulez-vous être un Headhunter ? <EM4>[BP]</EM4> <EM4>[50 Rep]</EM4>
headhunters_killship_gen_vlrt_title_001=~mission(TargetName) a besoin d'être écrasé <EM4>[BP]</EM4> <EM4>[50 Rep]</EM4>
headhunters_killship_xenothreat_ert_desc_001=J'ai besoin que vous fassiez vite sur ce coup-là. Un lieutenant XenoThreat nommé ~mission(TargetName) a pris l'air. Le Juge pense que c'est l'occasion de semer la zizanie dans le commandement XenoThreat en l'éliminant. J'ai entendu dire que ~mission(TargetName|Last) avait été repéré en train de voler autour de ~mission(Location|Address), alors allez-y vite avant qu'ils ne disparaissent à nouveau.\n\nJ'apporterais un peu de soutien, je doute qu'ils se laissent faire sans se battre. \n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 7/7 | Risk 7/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1\n<EM4>Elite Contractor:</EM4> +3,200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_killship_xenothreat_ert_title_001=Fumer quelque XenoTrash <EM4>[BP]</EM4> <EM4>[3,200 Rep]</EM4>
headhunters_maintenance_H_desc_001=Les tempêtes à <EM4>~mission(Location|Address)</EM4> commencent à devenir vraiment pénibles. L'un de nos avant-postes s'est fait complètement saccager hier et a besoin de réparations importantes, on a donc besoin d'aide.\n\nIl vous faudra <EM4>environ six fusibles</EM4>, un <EM4>outil de recyclage</EM4> et <EM4>suffisamment de cartouches de C.M.R. pour réparer huit tuyaux pétés au maximum</EM4>. On pense que ça devrait suffire, mais vous aurez les chiffres exacts sur place.\n\nJ'espère que vous savez ce que vous faites, mais au cas où, jetez un œil au <EM4>“Guide de Maintenance”</EM4> dans le journal de votre mobiGlas.\n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Head Contractor:</EM4> +400 Rep
headhunters_maintenance_H_title_001=~mission(Location) a besoin de réparations importantes <EM4>[400 Rep]</EM4>
headhunters_maintenance_M_desc_001=On a besoin d'une personne habile de ses mains pour se rendre à <EM4>~mission(Location|Address)</EM4> et aider à effectuer quelques réparations. Notre dernier réparateur a effectué la plupart d'entre elles, mais il reste encore quelques petites choses à régler.\n\nJe pense que si vous avez <EM4>six fusibles</EM4>, un <EM4>outil de recyclage</EM4> et <EM4>suffisamment de cartouches de C.M.R. pour réparer environ cinq tuyaux</EM4>, vous devriez vous en sortir.\n\nJ'espère que vous savez ce que vous faites, mais au cas où, jetez un œil au <EM4>“Guide de Maintenance”</EM4> dans le journal de votre mobiGlas.\n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Sr. Contractor:</EM4> +100 Rep
headhunters_maintenance_M_title_001=Beaucoup de réparations à faire à ~mission(Location) <EM4>[100 Rep]</EM4>
headhunters_maintenance_local_E_desc_001=Bonjour, si vous lisez ceci, nous avons besoin d'aide. L'un de nos avant-postes à <EM4>~mission(Location|Address)</EM4> a été frappé par une violente tempête et a subi quelques dégâts. Aucun de nos techniciens habituels n'est disponible (ou en vie) pour se rendre sur place, nous souhaitons donc engager quelqu'un pour réparer quelques fusibles (je ne sais pas combien, mais <EM4>pas plus de trois</EM4> je pense). Si vous pouvez apporter un <EM4>outil de recyclage</EM4> et <EM4>suffisamment de cartouches de C.M.R. pour réparer environ trois tuyaux</EM4>, ça devrait être bon.\n\nJ'espère que vous savez ce que vous faites, mais au cas où, jetez un œil au <EM4>“Guide de Maintenance”</EM4> dans le journal de votre mobiGlas.\n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 4/7\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Jr. Contractor:</EM4> +50 Rep
headhunters_maintenance_local_E_title_001=~mission(Location) a besoin de quelques réparations <EM4>[25–50 Rep]</EM4>
headhunters_maintenance_local_H_desc_001=À <EM4>~mission(Location|Address)</EM4>, l'endroit a été complètement dévasté par une tempête et a besoin de réparations importantes.\n\nSi quelqu'un dispose d'un <EM4>lot de fusibles</EM4> (<EM4>six</EM4> devraient suffire, de ce que j'ai entendu), d'un <EM4>outil de recyclage</EM4> et de <EM4>suffisamment de cartouches de C.M.R. pour réparer environ huit tuyaux endommagés</EM4>, nous vous récompenserons pour votre aide.\n\nJ'espère que vous savez ce que vous faites, mais au cas où, jetez un œil au <EM4>“Guide de Maintenance”</EM4> dans le journal de votre mobiGlas.\n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 1/7 | Complexity 1/7 | Risk 1/7 | Knowledge 2/7
headhunters_maintenance_local_H_title_001=~mission(Location) nécessite des réparations importantes
headhunters_maintenance_local_M_desc_001=Appel à tous ceux qui se trouvent à proximité. Nous avons des travaux importants à effectuer dans l'un de nos avant-postes à <EM4>~mission(Location|Address)</EM4>. On dirait que <EM4>six fusibles</EM4> doivent être réparés. Vous aurez également besoin d'un <EM4>outil de recyclage</EM4> avec <EM4>suffisamment de C.M.R. pour réparer environ cinq tuyaux</EM4> afin d'empêcher les lieux de s'effondrer.\n\nSi vous ramenez tout ce matos nécessaire pour les réparer, nous vous paierons.\n\nJ'espère que vous savez ce que vous faites, mais au cas où, jetez un œil au <EM4>“Guide de Maintenance”</EM4> dans le journal de votre mobiGlas.\n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 1/7 | Complexity 1/7 | Risk 1/7 | Knowledge 2/7
headhunters_maintenance_local_M_title_001=~mission(Location) nécessite de nombreuses réparations
headhunters_multikillship_base_Generic_M_desc_001=Au fil des ans, de nombreux aspirants gangs se sont adressés aux Headhunters en pensant pouvoir entrer de force dans le système. Nous sommes toujours là. Ils ne le sont pas. Mais il semble que les survivants de ces groupes aient décidé de se regrouper et d'essayer à nouveau. Je suppose que certaines personnes n'apprennent jamais.\n\nLe dernier groupe a attaqué deux de nos convois lors de ravitaillements. Il n'est pas surprenant que le juge veuille les éliminer rapidement. Nous avons appris qu'ils sont près de ~mission(Location|Address) et qu'ils sont probablement en train de se réarmer en vue d'une nouvelle attaque. \n\nNous voulons que vous alliez là-bas et que vous leur fassiez regretter d'être morts avec leur ancien gang.\n\nStows terminé\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Defenders x6, Targets x2\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_multikillship_base_Generic_M_title_001=Abatage de quelques vaiseaux <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
headhunters_sabotage_generators_E_CFP_desc_001=Nous avons de grands projets, mais malheureusement, les Citizens for Prosperity ont des gens à proximité, à ~mission(Location|Address).\n\nComme je ne peux pas me permettre d'avoir ces salauds qui nous font tourner en bourrique, je veux que vous alliez là-bas et que vous détruisiez leurs générateurs d'énergie. Ça devrait les tenir à l'écart jusqu'à ce que nous ayons terminé notre travail. \n\n-Stows terminé\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Jr. Contractor:</EM4> +75 Rep
headhunters_sabotage_generators_E_CFP_title_001=Couper le Courant des Citizens for Prosperity <EM4>[75 Rep]</EM4>
headhunters_sabotage_generators_VE_desc_001=Il s'agit d'un travail assez simple. On a des connards à ~mission(Location|Address) qui se croient meilleurs qu'ils ne le sont. Allez leur couper le courant pour leur rappeler que ce sont les Headhunters qui commandent.\n\n-Stows terminé\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Jr. Contractor:</EM4> +25 Rep
headhunters_sabotage_generators_VE_title_001=Couper le Courant à ~mission(Location) <EM4>[25 Rep]</EM4>
headhunters_sabotage_generators_multi_M_desc_001=Nous avons quelques pilleurs qui se sont enracinés dans ~mission(Location|Address). Nous avons nos propres projets là-bas et nous avons besoin que l'endroit soit nettoyé. \n\nC'est pourquoi je veux que vous alliez couper l'électricité. Voyons si ces rats n'abandonnent pas l'endroit pour de bon !\n\n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Sr. Contractor:</EM4> +200 Rep
headhunters_sabotage_generators_multi_M_title_001=Coupure de Courant <EM4>[200 Rep]</EM4>
headhunters_sabotage_servers_E_CFP_desc_001=Pour faire court, un Headhunter a fait une grosse bêtise et Citizens for Prosperity a mis la main sur des données qui pourraient vraiment nous nuire. \n\nLe bâtard va avoir besoin de temps pour guérir, ce qui vous laisse le soin de nettoyer le désordre. Pouvez-vous aller à ~mission(Location|Address) et détruire les serveurs qu'ils ont stockés là-bas ? Je veux m'assurer qu'il n'y a aucune chance que cette information soit diffusée.\n\n-Stows terminé\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Jr. Contractor:</EM4> +75 Rep
headhunters_sabotage_servers_E_CFP_title_001=Effacer les Serveurs des Citizens for Prosperity <EM4>[75 Rep]</EM4>
headhunters_sabotage_servers_H_XT_Title_001=Destruction de Serveurs XenoThreat <EM4>[75–1,500 Rep]</EM4>
headhunters_sabotage_servers_H_XT_desc_001=Quelque chose vient de me tomber sous la main et c'est bien trop beau pour être laissé de côté. La collecte de renseignements XenoThreat est une sorte de légende dans le milieu que je fréquente et il s'avère qu'ils stockent tout un tas de leurs meilleurs renseignements à ~mission(Location|Address).\n\nCe serait dommage que quelqu'un, disons comme vous, y aille et fasse tout exploser, hein ? \n\n-Stows terminé\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Contractor:</EM4> +75 Rep\n<EM4>Veteran Contractor:</EM4> +1,500 Rep
headhunters_sabotage_servers_M_CFP_desc_001=Il s'avère que ces salauds de Citizens for Prosperity ont recueilli des informations sur nous. Ils vont essayer de nous couper de plusieurs sources de revenus et de nous saigner à blanc. On ne peut pas laisser faire ça. \n\nDirigez-vous vers ~mission(Location|Address) et détruisez leur stockage de données. \n\nCela devrait leur apprendre à ne pas mettre leur nez là où il ne faut pas.\n\n-Stows terminé\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Jr. Contractor:</EM4> +75 Rep\n<EM4>Jr. Contractor:</EM4> +200 Rep
headhunters_sabotage_servers_M_CFP_title_001=Effacement de Données d'Exploitation des Citizens for Prosperity <EM4>[75–200 Rep]</EM4>
headhunters_sabotage_servers_VH_XT_desc_001=Je suis tellement en colère que j'ai du mal à voir clair. Un Headhunter en qui je pensais avoir confiance est passé chez XenoThreat. Ouais, des aliens ont tué ta famille. Ça craint, mais on ne tourne pas le dos à son peuple. \n\nPour ajouter l'insulte à la blessure, ce bâtard a donné à XenoThreat une partie de nos informations. J'ai d'autres personnes qui traquent le traître, mais j'ai besoin que vous vous occupiez d'effacer les données volées pour moi. Elles sont conservées sur les serveurs de ~mission(Location|Address).\n\n-Stows terminé\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Elite Contractor:</EM4> +3,200 Rep
headhunters_sabotage_servers_VH_XT_title_001=Purge de serveurs XenoThreat <EM4>[3,200 Rep]</EM4>
hurston_RetrieveConsignment_desc_001=HURSTON DYNAMICS\nSERVICE DE SOUS-TRAITANCE\n\nCONTRAT : Coup de balai à l'installation et Récupération de Colis\nAFFILIATION DU PRESTATAIRE : Indépendant\nGESTIONNAIRE DE SOUS-TRAITANCE : G. Livingston\nÉVALUATION DES RISQUES : Élevé\nCONTRAT URGENT : Oui\n\nHurston a appris que les Nine Tails attaquent ~mission(Location|address). Nos forces sur place ont subi de lourdes pertes et ont cessé de répondre aux communications. Les premiers rapports indiquaient que le gang tentait d'obtenir du matériel confidentiel récemment livrés à l'installation. Heureusement, nous avons mis en place des mesures de sécurité qui devraient nous donner le temps de réagir. Nous avons besoin d'un agent pour se rendre immédiatement sur les lieux, récupérer ces colis et les livrer dans un endroit sécurisé.\n\nVous et les renforts que vous choisissez d'emmener êtes autorisés à prendre toutes les mesures nécessaires lorsque vous affrontez les intrus. Les suspects sont considérés comme armés et dangereux. Hurston ne fournira pas de soutien matériel et/ou de mises à jour concernant le statut des forces de sécurité de l'installation. \n\nLe matériel confidentiel a été discrètement livré avec d'autres colis dans une cargaison et enfermés dans notre coffre-fort automatisé. Les codes de récupération nécessaires pour y accéder sont conservés sur des datapads détenus par les responsables senior de la sécurité. Recherchez ces datapads, puis entrez les codes de la consigne sur le convoyeur de colis pour récupérer les colis. Le paiement sera envoyé une fois que tous le matériel confidentiel aura été livré à ~mission(dropoff1|address). \n\n\n** Les informations transmises peuvent contenir des éléments confidentiels et/ou privilégiés. Toute analyse, retransmission, diffusion ou autre utilisation de ces informations par des personnes ou entités autres que le destinataire prévu est interdite. **\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Guards x4, Hostiles x22
hurston_RetrieveConsignment_title_001=Defense de Site et Recuperation de Materiel Confidentiel <EM4>[500–4,000 Rep]</EM4>
hurston_UGF_defend_E_desc_001=HURSTON DYNAMICS\nSERVICE DE SOUS-TRAITANCE\n\nCONTRAT : Protection Installation\nAFFILIATION DU PRESTATAIRE : Indépendant\nGESTIONNAIRE DE SOUS-TRAITANCE : T. Spooner\nÉVALUATION DES RISQUES : Élevé\nCONTRAT URGENT : Non\n\nUn petit gang local a proféré des menaces contre ~mission(Location|Address) et la Sécurité de Hurston recherche un prestataire pour constituer une équipe de sécurité chargée de protéger l'installation contre toute incursion.\n\nLe paiement sera envoyé une fois que la sécurité de l'installation aura été confirmée. \n\n\n\n** Les informations transmises peuvent contenir des éléments confidentiels et/ou privilégiés. Toute analyse, retransmission, diffusion ou autre utilisation de ces informations par des personnes ou entités autres que le destinataire prévu est interdite. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x1, Hostiles x10, Private Security x4, Sentries x6\n<EM4>Unknown:</EM4> 11
hurston_UGF_defend_E_title_001=Défense de l'Installation Contre des Menaces <EM4>[500 Rep]</EM4>
hurston_UGF_defend_VH_desc_001=HURSTON DYNAMICS\nSERVICE DE SOUS-TRAITANCE\n\nCONTRAT : Protection Installation\nAFFILIATION DU PRESTATAIRE : Indépendant\nGESTIONNAIRE DE SOUS-TRAITANCE : T. Spooner\nÉVALUATION DES RISQUES : Très élevé\nCONTRAT URGENT : Non\n\nUne faction hors-la-loi croissante a proféré des menaces contre ~mission(Location|Address) et la Sécurité de Hurston exige qu'un prestataire constitue une équipe de sécurité et protège l'installation contre toute incursion.\n\nLe paiement sera envoyé une fois que la sécurité de l'installation aura été confirmée. \n\n\n\n** Les informations transmises peuvent contenir des éléments confidentiels et/ou privilégiés. Toute analyse, retransmission, diffusion ou autre utilisation de ces informations par des personnes ou entités autres que le destinataire prévu est interdite. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x3, Hostiles x8, Private Security x4, Sentries x4\n<EM4>Unknown:</EM4> 21
hurston_UGF_defend_VH_title_001=Défense de l'Installation contre les Ennemis Dangereux <EM4>[500 Rep]</EM4>
hurston_UGF_defend_desc_001=HURSTON DYNAMICS\nSERVICE DE SOUS-TRAITANCE\n\nCONTRAT : Protection Installation\nAFFILIATION DU PRESTATAIRE : Indépendant\nGESTIONNAIRE DE SOUS-TRAITANCE : T. Spooner\nÉVALUATION DES RISQUES : Élevé\nCONTRAT URGENT : Non\n\nDes criminels locaux ont proféré des menaces contre ~mission(Location|Address) et la Sécurité de Hurston recherche un prestataire pour constituer une équipe de sécurité chargée de protéger l'installation contre toute intrusion.\n\nLe paiement sera envoyé une fois que la sécurité de l'installation aura été confirmée. \n\n\n\n** Les informations transmises peuvent contenir des éléments confidentiels et/ou privilégiés. Toute analyse, retransmission, diffusion ou autre utilisation de ces informations par des personnes ou entités autres que le destinataire prévu est interdite. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x8, Private Security x4, Sentries x8\n<EM4>Unknown:</EM4> 10
hurston_UGF_defend_title_001=Défense del'Installation Contre les Ennemis <EM4>[500 Rep]</EM4>
hurston_UGF_destroy_E_desc_001=HURSTON DYNAMICS\nSERVICE DE SOUS-TRAITANCE\n\nCONTRAT : Élimination Contrebande\nAFFILIATION DU PRESTATAIRE : Indépendant\nGESTIONNAIRE DE SOUS-TRAITANCE : R. Russel\nÉVALUATION DES RISQUES : Moyen\nCONTRAT URGENT : Non\n\nDes voyous locaux ont utilisé ~mission(Location|Address) pour fabriquer de grandes quantités de contrebande. La Sécurité de Hurston demande à un prestataire de se rendre sur place et de détruire toute la contrebande qui y est stockée.\n\nLe paiement sera envoyé une fois toute la contrebande détruite. \n\n\n\n** Les informations transmises peuvent contenir des éléments confidentiels et/ou privilégiés. Toute analyse, retransmission, diffusion ou autre utilisation de ces informations par des personnes ou entités autres que le destinataire prévu est interdite. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Civilians x4
hurston_UGF_destroy_E_title_001=Élimination de réserves de Contrebande <EM4>[500 Rep]</EM4>
hurston_UGF_destroy_H_desc_001=HURSTON DYNAMICS\nSERVICE DE SOUS-TRAITANCE\n\nCONTRAT : Destruction Contrebande\nAFFILIATION DU PRESTATAIRE : Indépendant\nGESTIONNAIRE DE SOUS-TRAITANCE : R. Russel\nÉVALUATION DES RISQUES : Très Élevé\nCONTRAT URGENT : Non\n\nUn petit syndicat a utilisé ~mission(Location|Address) pour fabriquer de grandes quantités de très dangereux stupéfiants. La Sécurité de Hurston recherche un prestataire pour se rendre sur place et éliminer toute la contrebande qui y est stockée.\n\nLe paiement sera envoyé une fois toute la contrebande détruite. \n\n\n\n** Les informations transmises peuvent contenir des éléments confidentiels et/ou privilégiés. Toute analyse, retransmission, diffusion ou autre utilisation de ces informations par des personnes ou entités autres que le destinataire prévu est interdite. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
hurston_UGF_destroy_H_title_001=Élimination de réserves de Stupéfiant <EM4>[500 Rep]</EM4>
hurston_UGF_destroy_desc_001=HURSTON DYNAMICS\nSERVICE DE SOUS-TRAITANCE\n\nCONTRAT : Destruction Contrebande\nAFFILIATION DU PRESTATAIRE : Indépendant\nGESTIONNAIRE DE SOUS-TRAITANCE : R. Russel\nÉVALUATION DES RISQUES : Élevé\nCONTRAT URGENT : Non\n\nDes criminels locaux ont été identifiés utilisant ~mission(Location|Address) pour fabriquer de grandes quantités de produits illégaux. La Sécurité de Hurston demande à un prestataire de se rendre sur place et de détruire toute la contrebande qui y est stockée.\n\nLe paiement sera envoyé une fois toute la contrebande détruite. \n\n\n\n** Les informations transmises peuvent contenir des éléments confidentiels et/ou privilégiés. Toute analyse, retransmission, diffusion ou autre utilisation de ces informations par des personnes ou entités autres que le destinataire prévu est interdite. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
hurston_UGF_destroy_title_001=Élimination de réserves de Drogue <EM4>[500 Rep]</EM4>
hurston_UGF_eliminateall_allies_desc_001=HURSTON DYNAMICS\nSERVICE DE SOUS-TRAITANCE\n\nCONTRAT : Protection Installation\nAFFILIATION DU PRESTATAIRE : Indépendant\nGESTIONNAIRE DE SOUS-TRAITANCE : T. Spooner\nÉVALUATION DES RISQUES : Élevé\nCONTRAT URGENT : Non\n\nLe personnel de sécurité de ~mission(Location|Address) est menacé par un criminel local et la Sécurité de Hurston recherche des prestataires pour renforcer ses défenses et éliminer tout hostiles qui tentent de pénétrer dans le site.\n\nNotez que vous êtes uniquement autorisé à engager le combat contre des hostiles confirmés. Agresser tout personnel de sécurité sur le site entraînera une rupture de contrat.\n\nLe paiement sera envoyé une fois que la sécurité de l'installation sera confirmée. \n\n\n\n** Les informations transmises peuvent contenir des éléments confidentiels et/ou privilégiés. Toute analyse, retransmission, diffusion ou autre utilisation de ces informations par des personnes ou entités autres que le destinataire prévu est interdite. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
hurston_UGF_eliminateall_allies_desc_intro=HURSTON DYNAMICS\nSERVICE DE SOUS-TRAITANCE\n\nCONTRAT : Protection Installation\nAFFILIATION DU PRESTATAIRE : Indépendant\nGESTIONNAIRE DE SOUS-TRAITANCE : T. Spooner\nÉVALUATION DES RISQUES : Élevé\nCONTRAT URGENT : Non\n\nUn groupe criminel local a menacé ~mission(Location|Address) et la Sécurité de Hurston recherche des prestataires pour renforcer leurs défenses et éliminer tout hostile qui tente de pénétrer dans le site.\n\nNotez que vous êtes uniquement autorisé à engager le combat contre des hostiles confirmés. Agresser tout personnel de sécurité sur le site entraînera une rupture de contrat.\n\nLe paiement sera envoyé une fois que la sécurité de l'installation sera confirmée. La réussite de cette évaluation vous permettra d'être pris en considération pour du travail futur en tant que prestataire de sécurité.\n\n\n\n** Les informations transmises peuvent contenir des éléments confidentiels et/ou privilégiés. Toute analyse, retransmission, diffusion ou autre utilisation de ces informations par des personnes ou entités autres que le destinataire prévu est interdite. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
hurston_UGF_eliminateall_allies_desc_rehire=HURSTON DYNAMICS\nSERVICE DE SOUS-TRAITANCE\n\nCONTRAT : Protection Installation\nAFFILIATION DU PRESTATAIRE : Indépendant\nGESTIONNAIRE DE SOUS-TRAITANCE : T. Spooner\nÉVALUATION DES RISQUES : Élevé\nCONTRAT URGENT : Non\n\nNotre département effectue des réévaluations périodiques des anciens prestataires de sécurité et a déterminé que vous pourriez être un candidat approprié pour une éventuelle réintégration.\n\nPour récupérer votre statut, la Sécurité de Hurston recherche des prestataires pour les aider à éliminer un criminel local menaçant ~mission(Location|Address).\n\nNotez que vous êtes uniquement autorisé à engager le combat contre des hostiles confirmés. Agresser tout personnel de sécurité sur le site entraînera une rupture de contrat.\n\nLe paiement sera envoyé une fois que la sécurité de l'installation sera confirmée. La réussite de cette réévaluation vous permettra d'être pris en considération pour du travail futur en tant que prestataire en sécurité.\n\n\n\n** Les informations transmises peuvent contenir des éléments confidentiels et/ou privilégiés. Toute analyse, retransmission, diffusion ou autre utilisation de ces informations par des personnes ou entités autres que le destinataire prévu est interdite. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
hurston_UGF_eliminateall_allies_title_001=Aide à la défense d'un Site <EM4>[500 Rep]</EM4>
hurston_UGF_eliminateall_allies_title_intro=Evaluation Prestataire en Securite <EM4>[500 Rep]</EM4>
