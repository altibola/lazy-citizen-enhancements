Covalex_HaulCargo_SingleToMulti_desc_ProcessedFood_Stanton2=Bonjour, \n\nIl y a quelques installations de Crusader qui ont besoin d'être réapprovisionnées en aliments transformés et en glace pressurisée. Je ne sais pas pourquoi, mais je suis toujours surpris quand je vois la quantité de ces produits dont ils ont besoin.\n\nQuoi qu'il en soit, il y a une cargaison de ces produits pas plus grand que <EM4>~mission(MissionMaxSCUSize)</EM4> qui attend à <EM4>~mission(Location|address)</EM4>. Une fois que vous avez récupéré les marchandises d'un monte-charge, voici les installations où elles doivent être acheminées :\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n\n~mission(SingleToMultiToken) \n\nPar ailleurs, nous encourageons vivement les sous-traitants à se munir d'un <EM4>rayon tracteur portable</EM4>.\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordinateur Logistique\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +1,000
Covalex_HaulCargo_SingleToMulti_desc_RefinedOre_Mixed=Hé,\n\nLa raffinerie de <EM4>~mission(Location|Address)</EM4> n'a pas chômé. Ils ont traité un mélange de minerais raffinés et cherchent à expédier les conteneurs (<EM4>~mission(MissionMaxSCUSize)</EM4> maximum) à partir d'un monte-charge. Je me suis renseigné auprès des LEO pour savoir où l'on avait besoin de ce genre de choses et j'ai pu mettre au point ce parcours. \n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n\n~mission(SingleToMultiToken)\n\nCe devrait être une mission facile pour vous, si vous êtes libre.\n\nPar ailleurs, nous encourageons vivement les sous-traitants à se munir d'un <EM4>rayon tracteur portable</EM4>.\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordinateur Logistique\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 3/7\n<EM4>Rep:</EM4> +8,000
Covalex_HaulCargo_SingleToMulti_desc_RefinedOre_Stanton4=Bonjour,\n\nIl y a du minerai raffiné dans des conteneurs de <EM4>~mission(MissionMaxSCUSize)</EM4> maximum qui doit être déplacé d'un monte-charge à <EM4>~mission(Location|Address)</EM4> vers des sites de production sur MicroTech. Vous pouvez planifier les livraisons comme vous le souhaitez. Peu importe l'ordre dans lequel ils sont effectués, tant qu'ils arrivent à destination. \n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n\n~mission(SingleToMultiToken)  \n\nPar ailleurs, nous encourageons vivement les sous-traitants à se munir d'un <EM4>rayon tracteur portable</EM4>.\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordinateur Logistique\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +1,000
Covalex_HaulCargo_SingleToMulti_desc_ToCFP_Danger=Bonjour, \n\nPlusieurs avant-postes de Citizens for Prosperity à Pyro ont besoin de ravitaillement. On a l'habitude de faire ce genre de missions pour eux, mais celle-ci semble un peu plus risquée. Un représentant de CFP m'a dit que les activités illégales autour de ces sites avaient augmenté récemment, mais ils ont vraiment besoin que ces avant-postes soient réapprovisionnés, donc on va faire la livraison. <EM4>Sachez simplement que vous pourriez rencontrer des difficultés, alors soyez prêt à toute éventualité</EM4>.       \n\nLa cargaison vous attend à <EM4>~mission(Location|Address)</EM4> et voici où elle doit être livrée :  \n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE) \n\n~mission(SingleToMultiToken)  \n\nD'après le manifeste, le plus grand conteneur que vous aurez à manipuler est de <EM4>~mission(MissionMaxSCUSize)</EM4>. À part ça, n'oubliez pas d'emporter un <EM4>rayon tracteur portable</EM4>.    \n\n~mission(Contractor|SignOff) \n  \nElla Tieno\nCoordinatrice Logistique Jr.\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-A] Palisade\n- [IND-S2-A] Rampart\n- [IND-S3-A] Parapet\n- [MIL-S1-A] VK-00\n- [MIL-S1-B] Siren\n- [MIL-S2-A] XL-1\n- [MIL-S2-B] Yeager\n- [MIL-S3-A] TS-2\n- [MIL-S3-B] Balandin\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x24\n<EM4>Blueprint Reward:</EM4> Guaranteed
Covalex_HaulCargo_SingleToMulti_desc_Valakkar_Timed=Bonjour,\n\nNotre client a abattu un valakkar et l'a transformé en matières organiques. Des acheteurs sont déjà prêts à réceptionner la marchandise à plusieurs endroits différents, j'ai donc besoin de quelqu'un pour se rendre à<EM4> ~mission(Location|Address)</EM4>, récupérer le tout, puis le livrer aux endroits suivants :    \n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE) \n\n~mission(SingleToMultiToken)  \n\nD'après le manifeste, le plus grand conteneur que vous aurez à manipuler est de <EM4>~mission(MissionMaxSCUSize)</EM4>. N'oubliez pas d'emporter votre <EM4>rayon tracteur portable</EM4>. Je ne vois pas comment vous pourriez déplacer tout ça sans lui.\n\n~mission(Contractor|SignOff)   \n\nElla Tieno\nCoordinatrice Logistique Jr.\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-A] Palisade\n- [IND-S2-A] Rampart\n- [IND-S3-A] Parapet\n- [MIL-S1-A] VK-00\n- [MIL-S1-B] Siren\n- [MIL-S2-A] XL-1\n- [MIL-S2-B] Yeager\n- [MIL-S3-A] TS-2\n- [MIL-S3-B] Balandin\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x24\n<EM4>Blueprint Reward:</EM4> Guaranteed
