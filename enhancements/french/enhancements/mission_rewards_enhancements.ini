Covalex_HaulCargo_SingleToMulti_Processed_Mixed_QTFuelHydroFuelShipAmmo=Hé,\n\nLes gens de <EM4>~mission(Location|Address)</EM4> ont ce que j'aime appeler un “spécial pilote“ qui attend d'être distribué - une cargaison de carburant quantum, carburant hydrogène et de munitions de vaisseau. Chargez-le depuis un monte-charge et livrez-le aux endroits suivants, dans l'ordre qui vous convient le mieux. Les conteneurs devraient être de <EM4>~mission(MissionMaxSCUSize)</EM4> maximum.    \n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n\n~mission(SingleToMultiToken) \n\nPar ailleurs, nous encourageons vivement les sous-traitants à se munir d'un <EM4>rayon tracteur portable</EM4>.\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordinateur Logistique\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +8,000
Covalex_HaulCargo_SingleToMulti_Processed_Stims=Bonjour,\n\nIl y a un chargement de stimulants à <EM4>~mission(Location|Address)</EM4> prêt à être récupéré dans un monte-charge et livré à quelques endroits. Ils seront placés dans des conteneurs de <EM4>~mission(MissionMaxSCUSize)</EM4> maximum. Y a-t-il une chance que vous puissiez faire ça pour moi ? \n\nPeu importe l'ordre dans lequel vous les déposez.    \n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n\n~mission(SingleToMultiToken)\n\nJe suis content de ne pas avoir pris cette habitude moi-même car je jure que je reçois plus de demandes de mise à jour de livraison pour "où sont mes stimulants ?!?" que pour n'importe quel autre type d'envoi.\n\nPar ailleurs, nous encourageons vivement les sous-traitants à se munir d'un <EM4>rayon tracteur portable</EM4>.\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordinateur Logistique\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 3/7\n<EM4>Rep:</EM4> +2,000
