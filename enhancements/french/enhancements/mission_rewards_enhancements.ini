Shubin_Industrial_HandMining_Nyx_M_PlanetarySystem_Desc_001=CONTRAT : Commande Minière\nLIEU : Nyx\n\nDÉTAILS :\nL'une de nos équipes de prospection a récemment confirmé que les astéroïdes abritant des stations QV Breaker dans la ceinture de Keeger contiennent un minerai rare, le Sadaryx.\n\nCependant, compte tenu de l'accès difficile à ces stations et des risques inhérents à cette opération, nous recherchons des équipes de mineurs externes pour se charger de l'extraction.\n\nNous ne connaissons pas l'emplacement exact des gisements de Sadaryx au sein de la station, mais nous vous recommandons de commencer par les sections caverneuses où les minéraux se forment naturellement. Avec un peu de chance, vous pourriez même trouver dans les entrepôts des cristaux extraits par les anciennes équipes de QV.\n\n<EM4>CONDITIONS* :</EM4>\nVotre équipe devra accéder à une <EM4>station QV Breaker</EM4>, collecter le <EM4>minerai de Sadaryx</EM4> demandé et le livrer au monte-charge de <EM4>~mission(Destination|Address)</EM4>.\n\nVous aurez besoin d'un <EM4>Outil multifonctions avec un Module de Minage</EM4> et de connaître les bases de l'extraction manuelle.\n\nNos équipes de prospection ont signalé que ces stations pourraient être infiltrées par des hors-la-loi. Soyez prudent.\n\n*En acceptant ce contrat, vous assumez tous les risques associés aux travaux décrits dans le présent document et Shubin Interstellar ne peut en aucun cas être tenu responsable des dommages survenus pendant la durée du contrat.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +100 Rep
Shubin_Industrial_HandMining_Nyx_M_PlanetarySystem_Title_001=Petite Commande Minière : Sadaryx <EM4>[100 Rep]</EM4>
