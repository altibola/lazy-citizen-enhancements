RAIN_CollectResources_storm_desc_001=À tous les prestataires disponibles,\n\nChez Rayari, nous consacrons toute notre énergie à mettre fin à la crise liée à la technologie de régénération, mais pour que nos scientifiques puissent poursuivre leurs efforts, ils ont besoin de ressources que nos fournisseurs ne sont pas en mesure de fournir. \n\nUne population importante de kopions a été exposée à des radiations près du <EM4>~mission(Location)</EM4>. Rayari recherche un prestataire pour collecter des <EM4>cornes de kopions irradiés</EM4> et les livrer à <EM4>~mission(Destination|Address)</EM4>. En raison de la rareté de cette ressource, nous sommes prêts à payer des frais de service élevés.\n\nEnsemble, nous pouvons rendre l’univers meilleur pour tous.\n\nNarina Lerrem\nDirectrice principale\nSous-traitance en Recherche Clinique\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Contractor:</EM4> +150 Rep
RAIN_CollectResources_storm_desc_002=À tous les prestataires disponibles,\n\nChez Rayari, nous mettons tout en œuvre pour mettre fin à la crise de la régénération, mais pour poursuivre leurs efforts, nos scientifiques ont besoin d'une ressource rare que nos fournisseurs ne peuvent pas obtenir. \n\nRayari recherche un entrepreneur expérimenté pour collecter des <EM4>perles de valakkars irradiés</EM4>, qui peuvent être extraites de valakkars adultes ayant été largement exposés à des radiations. Nos scans en ont détecté une population à l'intérieur de la tempête près du <EM4>~mission(Location)</EM4>. Ces animaux étant extrêmement dangereux, Rayari est prêt à récompenser généreusement toute personne pouvant aider à collecter ces perles. \n\nUne fois ces perles obtenues, veuillez les apporter à <EM4>~mission(Destination|Address)</EM4>.\n\nEnsemble, nous pouvons rendre l’univers meilleur pour tous.\n\nNarina Lerrem\nDirectrice principale\nSous-traitance en Recherche Clinique\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Contractor:</EM4> +150 Rep
RAIN_CollectResources_storm_desc_003=À tous les prestataires disponibles,\n\nChez Rayari, nous consacrons toute notre énergie à mettre fin à la crise liée à la technologie de régénération, mais pour poursuivre leurs efforts, nos scientifiques ont besoin de matériaux que les fournisseurs ne peuvent pas obtenir. \n\nRayari recherche un prestataire expérimenté pour collecter des <EM4>crocs de valakkars irradiés</EM4>, qui peuvent être extraits de valakkars adultes ayant été largement exposés à des radiations. Nos scans ont révélé l'existence d'une population éligible à l'intérieur de la tempête près du <EM4>~mission(Location)</EM4>. \n\nCes animaux étant extrêmement dangereux, Rayari offre une rémunération élevée à toute personne pouvant aider à collecter ces crocs.  \n\nUne fois ces précieux ressources obtenues, veuillez les apporter à <EM4>~mission(Destination|Address)</EM4>.\n\nEnsemble, nous pouvons rendre l’univers meilleur pour tous.\n\nNarina Lerrem\nDirectrice principale\nSous-traitance en Recherche Clinique\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Contractor:</EM4> +150 Rep
RAIN_CollectResources_storm_desc_004=À tous les prestataires disponibles,\n\nChez Rayari, nous travaillons jour et nuit pour résoudre la crise actuelle liée à la régénération, mais pour poursuivre leurs efforts, nos scientifiques ont besoin de ressources rares que nos fournisseurs ne peuvent pas fournir. \n\nNous recherchons donc un entrepreneur capable de se procurer un <EM4>œuf de valakkar irradié</EM4>. Nos scans ont confirmé la présence de plusieurs tempêtes radioactives avec présence avérée de valakkars sur Pyro I. Vous trouverez une navette près de <EM4>~mission(Location)</EM4> qui vous emmènera à l'intérieur de la tempête. Une dernière chose : selon nos analyses, ces œufs se décomposent avec le temps. Leur état ne devrait pas affecter nos recherches, mais le plus tôt sera le mieux.\n\nEn raison des risques pour la santé liés à l'exposition aux radiations nécessaire pour obtenir un échantillon viable, Rayari est prêt à payer généreusement toute personne capable de récupérer et de livrer cet œuf en toute sécurité.\n\nUne fois cette précieuse ressource obtenue, veuillez l'apporter à <EM4>~mission(Destination|Address)</EM4>.\n\nEnsemble, nous pouvons rendre l’univers meilleur pour tous.\n\nNarina Lerrem\nDirectrice principale\nSous-traitance en Recherche Clinique\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Contractor:</EM4> +150 Rep
