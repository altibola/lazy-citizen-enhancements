Foxwell_DestroyNarcotics_E_desc_001=Certains sont prêts à tout pour gagner de l'argent. Un groupe de hors-la-loi à <EM4>~mission(Location|Address)</EM4> a décidé de se lancer dans la fabrication de drogues.  Il s'avère qu'ils ne sont pas très doués, ou alors un peu trop. La came qu'ils produisent est plus forte que la normale et représente un réel danger pour quiconque la consomme. \n\nNous avons été engagés pour mettre fin à leurs activités et détruire les réserves de drogue qui se trouvent sur le site. Nous avons été engagés pour mettre fin à leurs activités et détruire les réserves de drogue qui se trouvent sur le site. Des gardes armés protègent les lieux, mais ils ne semblent pas très qualifiés. Nos équipes de surveillance ont vu l'un d'entre eux se tirer presque une balle dans le pied. Je ne peux pas en être sûr, mais il y a fort à parier qu'ils ne poseront pas trop de problèmes à un pro comme vous.  \n\n\nMarcus Clenn\nFoxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Civilians x4\n<EM4>Jr. Security Contractor:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_DestroyNarcotics_E_title_001=Nouvelle Opération de Lutte Anti-drogue <EM4>[BP]</EM4> <EM4>[500 Rep]</EM4>
Foxwell_DestroyNarcotics_H_desc_001=Les services de sécurité s'inquiètent d'une recrudescence des overdoses dans le système Stanton. On dirait bien qu'une bande d'escrocs augmente ses profits en coupant sa came avec des produits chimiques toxiques. Le démantèlement de cette bande et l'arrêt de la distribution de leur drogue sont devenus une priorité absolue.\n\nUn indic de Foxwell a révélé qu'une partie de cette équipe s'est installée à <EM4>~mission(Location|Address)</EM4>. Nous avons engagé un prestataire pour se rendre sur place et détruire les drogues qu'ils cachent avant qu'elles ne soient disséminées dans le système. Mieux vaut être prudent, on dit que cette équipe est armée jusqu'aux dents et déterminée à tirer profit de ce poison quoi qu'il arrive.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4\n<EM4>Sr. Security Contractor:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_DestroyNarcotics_H_title_001=Destruction de Drogues Dangereuses <EM4>[BP]</EM4> <EM4>[500 Rep]</EM4>
Foxwell_DestroyNarcotics_M_desc_001=Nous avons été chargés de régler un problème à <EM4>~mission(Location|Address)</EM4>. Il y a eu récemment un regain d'activité dans la zone, lié au trafic de drogue. Il semble que l'opération soit bien gérée et l'on craint de plus en plus qu'elle ne s'étende si elle n'est pas stoppée. Y a-t-il une chance que vous soyez disponible pour veiller à ce que cela ne se produise pas ?   \n\nLe boulot est assez simple. Rendez-vous sur le site et détruisez leur stock de drogue. De cette façon, ils n'auront plus les moyens d'étendre leurs opérations. Je ne m'attends toutefois pas à ce qu'ils vous facilitent la tâche. Des gardes armés circulent régulièrement autour de l'établissement, alors assurez-vous d'avoir assez d'équipement pour les affronter. \n\n\nMarcus Clenn\nFoxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4\n<EM4>Security Contractor:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_DestroyNarcotics_M_title_001=Destruction de Drogues Illégales <EM4>[BP]</EM4> <EM4>[500 Rep]</EM4>
Foxwell_EliminateAll_Allies_desc_001=Nous avons appris que des hors-la-loi tentent d'envahir <EM4>~mission(Location|Address)</EM4>. Il y a des forces de sécurité sur place, mais elles ont du mal à arrêter cette attaque.\n\nNous avons besoin d'un prestataire pour se rendre sur place et aider à s'occuper des agresseurs. Prévoyez du matériel en quantité suffisante et soyez prudent lorsque vous engagez les cibles. Nous ne voulons pas entendre parler de membres de l'équipe de sécurité être touchés par vos balles.    \n\n\nMarcus Clenn\nFoxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5\n<EM4>Security Trainee:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_EliminateAll_Allies_title_001=Aider à Protéger un Site <EM4>[BP]</EM4> <EM4>[500 Rep]</EM4>
Foxwell_EliminateAll_NonHostiles_desc_001=Nous avons été chargés de nous occuper d'une situation délicate. Un gang s'est installé à <EM4>~mission(Location|Address)</EM4>, que nous devons nettoyer. Le problème, c'est qu'il y a encore des civils sur place. \n\nNous recherchons quelqu'un ayant les compétences et le sens de la gâchette pour se débarrasser de ces hors-la-loi sans blesser d'innocents. Si vous êtes de ceux-là, prenez votre équipement et allez-y. \n\n\nMarcus Clenn\nFoxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostiles x13\n<EM4>Friendlies:</EM4> Civilians x4\n<EM4>Security Contractor:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -1,000 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_EliminateAll_NonHostiles_title_001=Nettoyer Soigneusement le Site <EM4>[BP]</EM4> <EM4>[500 Rep]</EM4>
Foxwell_EliminateAll_OLP_M_desc_001=Nous suivons un groupe de hors-la-loi pour le compte d'un client, et il semble qu'ils aient fait une halte permanente sur une ancienne plateforme orbitale. \n\nNous recherchons un prestataire qui peut se rendre à <EM4>~mission(Location|Address)</EM4> et neutraliser les cibles. La plateforme grouille de voyous armés et dangereux, nous avons donc classé ce contrat au niveau jaune.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Attackers x30, Boss x4, CQC x2, Defenders x12, Hostiles x91, Juggernauts x1, Kopions x2, Sentries x1, Snipers x5, Soldiers x16, Targets x1, Technicians x2\n<EM4>Friendlies:</EM4> Civilians x20\n<EM4>Applicant:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -500 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
