InterSec_SecurityPatrol_VH_desc_001=DÉTAILS DE LA MISSION\n\nZone d'Opération : Système Nyx\nForces Hostiles : Hors-la-loi\nÉquipement Requis : Vaisseaux de Combat\nBriefing : InterSec a détecté une augmentation des activités hors-la-loi dans certains secteurs du système. Conjuguée à d’autres renseignements, cette activité nous laisse penser qu’un assaut est en préparation contre des éléments en provenance de l’UEE. Notre objectif est de patrouiller ces secteurs et de déjouer leurs plans avant qu’ils ne se concrétisent.\n\nNous recherchons actuellement un prestataire pour patrouiller un secteur particulièrement dangereux. Une fois la mission acceptée, rendez-vous au <EM4>marqueur</EM4> affiché sur votre ATH. À partir de là, nous vous enverrons sur un itinéraire précis avec des points de passage supplémentaires à scanner. Achevez la patrouille et une prime de <EM4>~mission(ScripAmount) Jetons GDM</EM4> sera versée au prestataire principal.\n\nÉtant donné la forte probabilité d’attaque et le niveau de menace élevé des hors-la-loi locaux, nous recommandons de <EM4>recruter des coéquipiers de confiance</EM4> pour un soutien au combat.\n\nCordialement, \n\nDeacon Tobin\nResponsable des Opérations\nInterSec Defense Solutions\n\nCette communication consiste en une offre non-contractuelle, qui, une fois acceptée, pourra être résiliée à tout moment sans préavis par l'une ou l'autre des parties. Toutes les opérations s'effectuent aux risques et périls du prestataire et doivent respecter la législation de l'UEE et du système, le cas échéant.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Quartz "Deadfall" Energy SMG\n- Quartz "Lumen" Energy SMG\n- [S1-A] Quartz Energy SMG Battery (45 cap)\n- [S1-A] Testudo Arms Nightveil\n- [S1-A] Testudo Arms Turfwar\n- [S1-A] Testudo Core Nightveil\n- [S1-A] Testudo Core Turfwar\n- [S1-A] Testudo Helmet Nightveil\n- [S1-A] Testudo Helmet Turfwar\n- [S1-A] Testudo Legs Nightveil\n- [S1-A] Testudo Legs Turfwar\n- [S2-A] Testudo Backpack Nightveil\n- [S2-A] Testudo Backpack Turfwar\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Targets x63\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Intersec_DefendShip_Desc_Easy_001=DÉTAILS DE LA MISSION\n\nZone d'Opération : Système Nyx \nForces Hostiles : Hors-la-loi\nÉquipement Requis : Vaisseaux de Combat \nBriefing : Besoin d'aide urgente pour un agent InterSec actuellement attaqué à <EM4>~mission(Location|Address)</EM4>.\n\nUn groupe de hors-la-loi avait précédemment capturé notre agent dans le but de lui soutirer des informations sensibles, mais celui-ci a miraculeusement réussi à s'échapper. Malheureusement, les hors-la-loi qui le poursuivaient l'ont maintenant coincé.\n\nCompte tenu du nombre de vaisseaux à l’assaillir, une compensation supplémentaire est offerte pour refléter le risque accru. <EM4>Recruter des vaisseaux supplémentaires</EM4> pour vous épauler est fortement conseillé.\n\nCordialement,   \n\nDeacon Tobin \nResponsable des Opérations \nInterSec Defense Solutions  \n\nCette communication contient des informations confidentielles destinées exclusivement au destinataire. Si vous l’avez reçue par erreur, veuillez l’ignorer et en avertir l’expéditeur. Toutes les opérations s’effectuent aux risques et périls du prestataire et doivent respecter la législation de l’UEE et du système, le cas échéant.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Pulse "Rouge" Pistol\n- [S1-A] Pulse Laser Pistol Battery (60 Cap)\n- [S1-A] Testudo Arms Combustion\n- [S1-A] Testudo Core Combustion\n- [S1-A] Testudo Helmet Combustion\n- [S1-A] Testudo Legs Combustion\n- [S2-A] Testudo Backpack Combustion\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Intersec_DefendShip_Desc_Hard_001=DÉTAILS DE LA MISSION\n\nZone d'Opération : Système Nyx \nForces Hostiles : Hors-la-loi\nÉquipement Requis : Vaisseaux de Combat\nBriefing : L’un de nos pilotes est attaqué à <EM4>~mission(Location|Address)</EM4> et a besoin d'aide.\n\nCet agent transporte des informations cruciales concernant une attaque coordonnée contre des infrastructures clés de l'UEE et il est vital qu'il puisse nous les livrer. Vous et tous les <EM4>pilotes fiables que vous pourrez recruter</EM4> êtes chargés de le protéger suffisamment longtemps des hors-la-loi à sa poursuite pour qu'il puisse s'échapper.\n\nCordialement,   \n\nDeacon Tobin \nResponsable des Opérations \nInterSec Defense Solutions  \n\nCette communication contient des informations confidentielles destinées exclusivement au destinataire. Si vous l’avez reçue par erreur, veuillez l’ignorer et en avertir l’expéditeur. Toutes les opérations s’effectuent aux risques et périls du prestataire et doivent respecter la législation de l’UEE et du système, le cas échéant.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Pulse "Rouge" Pistol\n- [S1-A] Pulse Laser Pistol Battery (60 Cap)\n- [S1-A] Testudo Arms Combustion\n- [S1-A] Testudo Core Combustion\n- [S1-A] Testudo Helmet Combustion\n- [S1-A] Testudo Legs Combustion\n- [S2-A] Testudo Backpack Combustion\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x10\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
