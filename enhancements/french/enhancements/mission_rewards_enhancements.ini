Foxwell_DefendLocation_E_Desc_001=Les navires qui vont et viennent à <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> sont pris pour cible par des forces hostiles. Les habitants de la région nous ont engagés de régler ce problème immédiatement.\n\nNous avons besoin de quelqu'un pour se rendre sur place rapidement et commencer à repousser ces vaisseaux. La situation semble évoluer constamment, je vous tiendrai donc informé de l'endroit où vous serez le plus utile. \n\nPour vos efforts, nous verserons également un bonus de <EM4>~mission(ScripAmount) jetons de la Guilde des Mercenaires</EM4> au prestataire principal.\n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- [S1-A] Antium Arms Storm\n- [S1-A] Antium Core Storm\n- [S1-A] Antium Helmet Storm\n- [S1-A] Antium Legs Storm\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4, Hostiles x2, Reinforcements x8\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
