hurston_bounty_desc_intro=HURSTON DYNAMICS\nSERVICE DE SOUS-TRAITANCE\n\nCONTRAT : Collecte Prime\nAFFILIATION DU PRESTATAIRE : Indépendant\nGESTIONNAIRE DE SOUS-TRAITANCE : ~mission(Contractor|Auth)\nÉVALUATION DES RISQUES : ~mission(Danger)\nCONTRAT URGENT : ~mission(Contractor|BountyTimed)\n \nAprès des délits répétés et continus, une prime a été émise pour l'individu suivant : ~mission(TargetName).\n \nPour évaluer votre potentiel à aider à la capture de criminels plus insaisissables, Hurston Dynamics évaluera votre capacité à localiser et appréhender ~mission(TargetName|Last) par tous les moyens à votre disposition. Les derniers renseignements sur la localisation actuelle de ~mission(TargetName|Last) les ont vu pour la dernière fois à ~mission(Location|Address).\n\nLe paiement ne sera versé qu'une fois la prime traitée. \n \n\n** Les informations transmises peuvent contenir des éléments confidentiels et/ou privilégiés. Tout examen, retransmission, diffusion ou autre utilisation ou prise de mesures fondées sur ces informations par des personnes ou entités autres que le destinataire prévu est interdit. **\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
hurston_bounty_desc_rehire=HURSTON DYNAMICS\nSERVICE DE SOUS-TRAITANCE\n\nCONTRAT : Collecte Prime\nAFFILIATION DU PRESTATAIRE : Indépendant\nGESTIONNAIRE DE SOUS-TRAITANCE : ~mission(Contractor|Auth)\nÉVALUATION DES RISQUES : ~mission(Danger)\nCONTRAT URGENT : ~mission(Contractor|BountyTimed)\n\nNotre service effectue des réévaluations périodiques sur d'anciens chasseurs de primes et a déterminé que vous pourriez être un candidat approprié pour une éventuelle réintégration.\n\nPour démontrer votre aptitude, appréhendez avec succès la personne recherchée suivante : \n~mission(TargetName).\n \nLes derniers renseignements sur la localisation actuelle de ~mission(TargetName|Last) indiquent qu'ils ont été repérés pour la dernière fois à ~mission(Location|Address).\n\nLa réintégration en tant que chasseur de primes de Hurston Dynamics et le paiement suivront la réussite de ce contrat.\n \n\n** Les informations transmises peuvent contenir des éléments confidentiels et/ou privilégiés. Tout examen, retransmission, diffusion ou autre utilisation ou prise de mesures fondées sur ces informations par des personnes ou entités autres que le destinataire prévu est interdit. **\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
hurston_bounty_fps_UGF_desc_001=HURSTON DYNAMICS\nSERVICE DE SOUS-TRAITANCE\n\nCONTRAT : Collecte Prime\nAFFILIATION DU PRESTATAIRE : Indépendant\nGESTIONNAIRE DE SOUS-TRAITANCE : L. Paleski\nÉVALUATION DES RISQUES : Cible à Risque Modéré (Assistance armée probable)\nCONTRAT URGENT : Non\n\nHurston Dynamics recherche un prestataire pour remplir une prime pour ~mission(TargetName). \n\nLes rapports de renseignement ont permis de localiser la cible à ~mission(Location|Address). Ce site est connu pour être fréquenté par des criminels qui sont très probablement armés et hostiles. Engagez le dialogue avec eux comme vous l'entendez, mais votre priorité absolue est la neutralisation de ~mission(TargetName|Last).\n\nLe paiement ne sera effectué qu'une fois que la prime aura été considérée comme complète..\n \n\n** Les informations transmises peuvent contenir des éléments confidentiels et/ou privilégiés. Toute analyse, retransmission, diffusion ou autre utilisation de ces informations par des personnes ou entités autres que le destinataire prévu est interdite. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13, Targets x1
hurston_bounty_fps_UGF_nocivs_desc_001=HURSTON DYNAMICS\nSERVICE DE SOUS-TRAITANCE\n\nCONTRAT : Collecte Prime\nAFFILIATION DU PRESTATAIRE : Indépendant\nGESTIONNAIRE DE SOUS-TRAITANCE : L. Paleski\nÉVALUATION DES RISQUES : Cible à Risque Modéré (Assistance armée probable)\nCONTRAT URGENT : Non\n\nHurston Dynamics recherche un prestataire pour remplir une prime pour ~mission(TargetName). \n\nLes rapports de renseignement ont localisé la cible à ~mission(Location|Address).  Vous êtes libres d'engager le combat avec les criminels présents sur le site comme bon vous semble, mais les civils qui s'y trouvent doivent être protégés.\n\nLe paiement ne sera effectué qu'une fois que la prime aura été considérée comme complète.\n \n\n** Les informations transmises peuvent contenir des éléments confidentiels et/ou privilégiés. Toute analyse, retransmission, diffusion ou autre utilisation de ces informations par des personnes ou entités autres que le destinataire prévu est interdite. **\n\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
hurston_bounty_fps_desc_001=HURSTON DYNAMICS\nSERVICE DE SOUS-TRAITANCE\n\nCONTRAT : Collecte Prime\nAFFILIATION DU PRESTATAIRE : Indépendant\nGESTIONNAIRE DE SOUS-TRAITANCE: ~mission(Contractor|Auth)\nÉVALUATION DES RISQUES : Cible à Risque Modéré (Soutien Armé Possible)\nCONTRAT URGENT : ~mission(Contractor|BountyTimed)\n\nSous l'autorité d'Hurston Dynamics, tel qu'accordé par l'UEE, une prime a été émise pour ~mission(TargetName) concernant des crimes contre la corporation. \n\nOn pense que le suspect a été récemment localisé sur le site de ~mission(Location|Address), potentiellement avec plusieurs alliés. La force peut être nécessaire pour accéder au site et neutraliser ~~mission(TargetName|Last). ~mission(Location|CaveSize)\n\nLe paiement ne sera effectué qu'une fois la prime jugée terminée.\n \n\n** Les informations transmises peuvent contenir des éléments confidentiels et/ou privilégiés. Tout examen, retransmission, diffusion ou autre utilisation par des personnes ou entités autres que le destinataire prévu est interdit. **\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
