bhg_bounty_desc_ShatteredBlade_001=--------------------------------------------------------\n-------------- CONTRAT DE CHASSE À LA PRIME ---------------\n--------------------------------------------------------\n\nGUILDE DES CHASSEURS DE PRIME\nTRAITEMENT & DIFFUSION\n\nLa Guilde des Chasseurs de Primes a autorisé une prime officielle.\n\nNOM : ~mission(TargetName) \nSYSTÈME : Nyx\nRISQUES ENCOURUS : Élevés\nDERNIER EMPLACEMENT CONNU :  ~mission(Location|Address)\nAFFILIATIONS CONNUES : Shattered Blade\nNOTES : Les Shattered Blade sont connus pour cibler les Vanduuls afin d'acquérir et de vendre leurs technologies au marché noir, mais ils auraient également recours à la violence contre les autorités qui s'immiscent dans leurs affaires.\n\n\nGUILDE DES CHASSEURS DE PRIMES\nÀ la poursuite de la justice\n\nLa Guilde des chasseurs de primes est un service de sécurité agréé par la Guilde des mercenaires et autorisé à agir dans l'UEE et au-delà, conformément aux lois de l'Autorité du Commerce Extraterrestre.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Defenders x18, Targets x2\n<EM4>Probationary Guild Member:</EM4> +500 Rep (Failure: -250)\n<EM4>Probationary Guild Member:</EM4> +1,000 Rep (Failure: -500)\n<EM4>Probationary Guild Member:</EM4> +2,000 Rep (Failure: -1,000)\n<EM4>Probationary Guild Member:</EM4> +8,000 Rep (Failure: -4,000)\n<EM4>Probationary Guild Member:</EM4> +16,000 Rep (Failure: -8,000)\n<EM4>Blueprint Reward:</EM4> Guaranteed
bhg_bounty_desc_XT_001=--------------------------------------------------------\n----------------- CONTRAT DE CHASSE À LA PRIME -----------------\n--------------------------------------------------------\n\nGUILDE DES CHASSEURS DE PRIME\nTRAITEMENT & DIFFUSION\n\nLa Guilde des Chasseurs de Primes a autorisé une prime officielle.\n\nNOM : ~mission(TargetName) \nSYSTÈME : ~mission(System)\nRISQUES ENCOURUS : ~mission(Danger)\nDERNIER EMPLACEMENT CONNU :  ~mission(Location|Address)\nAFFILIATIONS CONNUES : XenoThreat\nNOTES : Xenothreat a toujours fait preuve d'une agressivité non provoquée à l'égard des forces de l'ordre ou du personnel de sécurité. Il y a de fortes chances qu'ils soient accompagnés d'autres membres de gangs lorsqu'ils sont confrontés, alors soyez prudents lorsque vous vous engagez.\n\nGUILDE DES CHASSEURS DE PRIMES\nÀ la poursuite de la justice\n\nLa Guilde des chasseurs de primes est un service de sécurité agréé par la Guilde des mercenaires et autorisé à agir dans l'UEE et au-delà, conformément aux lois de l'Autorité du Commerce Extraterrestre.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 7/7\n<EM4>Hostiles:</EM4> Defenders x17, Targets x1\n<EM4>Probationary Guild Member:</EM4> +16,000 Rep\n<EM4>Failure Penalty:</EM4> -8,000 Rep
bhg_bounty_desc_gen_001=--------------------------------------------------------\n--------------- CONTRAT DE CHASSE À LA PRIME -----------------\n--------------------------------------------------------\n\nGUILDE DES CHASSEURS DE PRIME\nTRAITEMENT & DIFFUSION\n\nLa Guilde des Chasseurs de Primes a autorisé une prime officielle.\n\nNOM : ~mission(TargetName) \nSYSTÈME : ~mission(System)\nRISQUES ENCOURUS : ~mission(Danger)\nDERNIER EMPLACEMENT CONNU :  ~mission(Location|Address)\nAFFILIATIONS CONNUES : <Aucune>\nNOTES : Il a plusieurs associés connus avec un casier judiciaire, il n'est donc peut-être pas seul, alors armez-vous et soyez prudents lorsque vous engagez le combat.\n\n\nGUILDE DES CHASSEURS DE PRIMES\nÀ la poursuite de la justice\n\nLa Guilde des chasseurs de primes est un service de sécurité agréé par la Guilde des mercenaires et autorisé à agir dans l'UEE et au-delà, conformément aux lois de l'Autorité du Commerce Extraterrestre.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Defenders x17, Targets x2\n<EM4>Probationary Guild Member:</EM4> +500 Rep (Failure: -100)\n<EM4>Probationary Guild Member:</EM4> +500 Rep (Failure: -250)\n<EM4>Probationary Guild Member:</EM4> +1,000 Rep (Failure: -500)\n<EM4>Probationary Guild Member:</EM4> +2,000 Rep (Failure: -1,000)\n<EM4>Probationary Guild Member:</EM4> +8,000 Rep (Failure: -4,000)\n<EM4>Probationary Guild Member:</EM4> +16,000 Rep (Failure: -8,000)
