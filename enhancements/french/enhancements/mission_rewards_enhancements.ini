InterSec_SecurityPatrol_H_Desc_001=DÉTAILS DE LA MISSION\n\nZone d'Opération : Système Nyx\nForces Hostiles : Hors-la-loi\nÉquipement Requis : Vaisseaux de Combat\nBriefing : InterSec a reçu des informations selon lesquelles des hors-la-loi prévoient de lancer une attaque contre une cible au sein de l'UEE. Afin d'empêcher cela, nous avons besoin d'un prestataire pour patrouiller dans un secteur que nous pensons être utilisé par ces hors-la-loi pour préparer leur attaque.\n\nL'activité des hors-la-loi dans ce secteur est plus importante que d'habitude, InterSec vous recommande donc d'apporter des renforts. Lorsque vous êtes prêt, rendez-vous à <EM4>l'emplacement indiqué</EM4> sur votre ATH et scannez les points de passage le long du trajet. Une fois que vous aurez confirmé que l'ensemble du secteur est sécurisé, le prestataire principal recevra un bonus de <EM4>~mission(ScripAmount) Jeton GDM.</EM4>\n\nCordialement, \n\nDeacon Tobin\nResponsable des Opérations\nInterSec Defense Solutions\n\nCette communication consiste en une offre non-contractuelle, qui, une fois acceptée, pourra être résiliée à tout moment sans préavis par l'une ou l'autre des parties. Toutes les opérations s'effectuent aux risques et périls du prestataire et doivent respecter la législation de l'UEE et du système, le cas échéant.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Quartz "Deadfall" Energy SMG\n- Quartz "Lumen" Energy SMG\n- [S1-A] Quartz Energy SMG Battery (45 cap)\n- [S1-A] Testudo Arms Nightveil\n- [S1-A] Testudo Arms Turfwar\n- [S1-A] Testudo Core Nightveil\n- [S1-A] Testudo Core Turfwar\n- [S1-A] Testudo Helmet Nightveil\n- [S1-A] Testudo Helmet Turfwar\n- [S1-A] Testudo Legs Nightveil\n- [S1-A] Testudo Legs Turfwar\n- [S2-A] Testudo Backpack Nightveil\n- [S2-A] Testudo Backpack Turfwar\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Targets x54\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
