crusader_platform_EliminateAll_description_001=Suite à leur dernière tentative de siège, les forces des Nine Tails ont commencé à mener des raids ciblés dans le but de continuer à perturber les opérations de Crusader. L’attaque actuelle a ciblé ~mission(MissionCluster|Address) et il est essentiel que nous y mettions un terme. \n\nLa Sécurité de Crusader recherche un prestataire prêt à éliminer tous les opérateurs Nine Tails de la région. Les prestataires doivent s'attendre à recourir à la force et sont fortement encouragés à envisager de faire appel à des renforts. \n\nCONTRAT AUTORISÉ PAR :\nAgent de Liaison Bautista\nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x20
crusader_platform_EliminateAll_title_001=Repoussement du Raid sur Orison <EM4>[500 Rep]</EM4>
crusader_platform_EliminateSpecific_desc=La Sécurité de Crusader a reçu des renseignements selon lesquels un raid des Nine Tails en cours à ~mission(MissionCluster|Address) inclut un éminent responsable du gang. Mettre fin à ce raid et traduire les responsables en justice est une priorité absolue pour la Sécurité de Crusader. C'est pourquoi nous recherchons un prestataire prêt à se rendre à ~mission(MissionCluster|Name) pour arrêter la menace et appréhender l'homme de main qui la dirige.\n\nUne fois sur place, vous devrez épuiser les forces des Nine Tails jusqu'à ce que vous soyez capable de retirer ~mission(TargetName).\n\nCompte tenu de la brutalité déployée par les Nine Tails lors de leur récent siège, nous recommandons aux prestataires d'être prêts à recourir à la force et les encourageons fortement à envisager de faire appel à des renforts.\n\nCONTRAT AUTORISÉ PAR :\nAgent de Liaison Gibbs\nID# 91G66BW0\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Backup x6, Boss x1, Hostiles x19
crusader_platform_EliminateSpecific_title=Prime Responsable Nine Tails (CRE) <EM4>[1,000 Rep]</EM4>
crusader_platform_MultiEliminateAll_description_001=Suite à leur dernière tentative de siège, les forces des Nine Tails ont commencé à mener des raids ciblés dans le but de continuer à perturber les opérations de Crusader. L’attaque actuelle a ciblé plusieurs bâtiments sur ~mission(MissionCluster|Address) et il est essentiel que nous y mettions un terme. \n\nLa Sécurité de Crusader recherche un prestataire prêt à éliminer tous les opérateurs Nine Tails de la région. Les prestataires doivent s'attendre à recourir à la force et sont fortement encouragés à envisager de faire appel à des renforts. \n\nCONTRAT AUTORISÉ PAR :\nAgent de Liaison Bautista\nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x60
crusader_platform_MultiEliminateAll_title_001=Repoussement de Plusieurs Raids sur Orison <EM4>[500–2,000 Rep]</EM4>
crusader_platform_MultiEliminateSpecific_desc=La Sécurité de Crusader a reçu des renseignements selon lesquels un raid des Nine Tails en cours à ~mission(MissionCluster|Address) inclut un éminent responsable du gang. Mettre fin à ce raid et traduire les responsables en justice est une priorité absolue pour la Sécurité de Crusader. C'est pourquoi nous recherchons un prestataire prêt à s'y rendre pour appréhender l'homme de main qui la dirige.\n\nUne fois sur place, vous devrez épuiser les forces des Nine Tails jusqu'à ce que vous soyez capable de le dégager.\n\nCompte tenu de la brutalité déployée par les Nine Tails lors de leur récent siège, nous recommandons aux prestataires d'être prêts à recourir à la force et les encourageons fortement à envisager de faire appel à des renforts.\n\nCONTRAT AUTORISÉ PAR :\nAgent de Liaison Gibbs\nID# 91G66BW0\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Backup x16, Boss x4, Hostiles x45
crusader_platform_MultiEliminateSpecific_title=Primes Responsable Nine Tails (CRTE) <EM4>[1,000–4,000 Rep]</EM4>
crusader_retakelocation_kareah_desc_001=Le Poste de sécurité de Kareah est attaqué par un nombre inconnus d'assaillants. \n\nCrusader recherche des prestataires pouvant se rendre rapidement à la station afin d'éliminer tous les intrus dans la zone avant que les forces de sécurité ne soient dépassées. \n\nNous ignorons si les attaquants ciblent de la contrebande dans les casiers de pièces à conviction ou notre base de données CrimeStat, mais quoiqu'ils recherchent, ils doivent être éliminés. Vous recevrez une prime de combat pour chaque ennemi abattu. \n\nEn acceptant ce contrat, vous acceptez de respecter tous les protocoles de la Sécurité de Crusader : Si vous blessez un garde ou tout autre prestataires agréés au sein de la station, votre contrat prendra fin et vous serez désigné comme une cible. \n\nLe temps presse, mais assurez-vous d'être bien équipé pour vous occuper des ennemis avant de répondre. \n\n CONTRAT AUTORISÉ PAR : Agent de Liaison Bautista \nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
