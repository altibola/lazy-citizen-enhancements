Shubin_Industrial_HandMining_Intro_Local_Desc_001=AFFECTATION : Bon de commande\nLIEU : <EM4>~mission(System) </EM4>\n\nTEST TECH PREVIEW :\nTerminez cette mission pour obtenir des plans d'armes Volt. Pour ce test, ces plans comportent des emplacements pouvant accueillir différents matériaux afin de modifier les statistiques.\n\n~mission(Hint_Location) Pour une liste complète des endroits où trouver ces minéraux, consultez les <EM4>Fondamentaux de l'exploitation minière n°2 : Où extraire ?</EM4> dans le journal de votre mobiGlas. Si vous souhaitez vous rafraîchir la mémoire sur la façon d'obtenir ces matériaux, profitez-en pour lire également la première partie, les <EM4>Fondamentaux de l'exploitation minière n°1 : Aperçu général</EM4>.\n\nComme il s'agit d'un bon de commande et non d'un contrat d'exploitation minière, vous êtes tenu d'apporter votre propre équipement, tel qu'un <EM4>~mission(Hint_Tool)</EM4>.\n\nUne fois prêt à nous vendre les matériaux demandés, déposez-les dans le monte-charge situé à <EM4>~mission(Destination|Address)</EM4>.\n\n*En acceptant ce contrat, vous assumez tous les risques associés aux travaux décrits dans le présent document et Shubin Interstellar ne peut en aucun cas être tenu responsable des dommages survenus pendant la durée du contrat.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro]</EM4>\n- Arclight "Desert Shadow" Pistol\n- Arclight "Herrero" Pistol\n- [S1-A] Arclight Pistol Battery (30 cap)\n- [S1-A] Novikov Exploration Suit\n- [S1-A] Novikov Helmet\n- [S1-A] Pembroke Exploration Suit\n- [S1-A] Pembroke Helmet\n\n<EM4>[Stanton]</EM4>\n- Arclight "Midnight" Pistol\n- [S1-A] Arclight Pistol Battery (30 cap)\n- [S1-A] Strata Arms\n- [S1-A] Strata Core\n- [S1-A] Strata Helmet Shooting Star\n- [S1-A] Strata Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
