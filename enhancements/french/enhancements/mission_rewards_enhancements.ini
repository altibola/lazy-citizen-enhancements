mg_miles_groupbounty_desc_001=TYPE DE CONTRAT  : Mandat de Groupe\nSTATUT DU PRESTATAIRE : Indépendant\nCode d'approbation : = ~mission(Contractor|ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\nEn relation avec un crime commis conjointement, un mandat de groupe a été émis pour : \n     ~mission(Target1)\n     ~mission(Target2)\n     ~mission(Target3)\n\nIl est actuellement estimé qu'ils ne voyagent plus ensemble afin d'échapper à la capture, et qu'ils pourraient bientôt fuir le système.  Vous devriez envisager de recruter de l'aide supplémentaire afin d'exécuter tous les mandats dans le temps imparti. \n\nVous êtes autorisé à utiliser toute la force nécessaire pour neutraliser les cibles \n\nLe paiement sera effectué à la fin du contrat, lorsque toutes les cibles auront été neutralisées dans le temps imparti.\n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x6, Targets x3
