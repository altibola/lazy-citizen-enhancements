Shubin_Industrial_ShipMining_VH_Org_Desc_001=AFFECTATION : Bon de commande\nLIEU : <EM4>~mission(System) </EM4>\n\nCONDITIONS* : \nShubin Interstellar cherche à honorer un nouveau bon de commande pour divers matériaux raffinés. Cette commande est plus complexe que d'habitude, requérant plusieurs méthodes d'extraction, mais compte tenu de vos compétences démontrées jusqu'à présent, nous pensons que vous et votre équipe êtes prêts à relever le défi.\n\nNous vous rappelons que <EM4>les matériaux doivent être raffinés avant leur livraison</EM4>, et comme il s'agit d'un bon de commande et non d'un contrat d'exploitation minière, vous êtes tenu d'apporter votre propre équipement, tel qu'un <EM4>~mission(Hint_Tool)</EM4>.\n\nUne fois prêt à nous vendre les matériaux demandés, déposez-les dans le monte-charge situé à <EM4>~mission(Destination|Address)</EM4>.\n\n*En acceptant ce contrat, vous assumez tous les risques associés aux travaux décrits dans le présent document et Shubin Interstellar ne peut en aucun cas être tenu responsable des dommages survenus pendant la durée du contrat.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Shubin_RG_ShipMining_Rank4_Org]</EM4>\n- Arclight "Nightstalker" Pistol\n- Arclight "Warhawk" Pistol\n- [S1-A] Arclight Pistol Battery (30 cap)\n- [S1-A] Aril Arms\n- [S1-A] Aril Core\n- [S1-A] Aril Helmet\n- [S1-A] Aril Legs\n- Arclight "Stormfall" Pistol\n- Arclight Pistol\n- [S1-A] Horizon Helmet\n- [S1-A] Venture Arms\n- [S1-A] Venture Core\n- [S1-A] Venture Legs\n\n<EM4>[Shubin_RG_ShipMining_Rank4_Org, Rank 0–1]</EM4>\n- [IND-S0-C] Surveyor-Go\n- [IND-S1-C] Surveyor-Lite\n- [IND-S2-C] Surveyor\n- [IND-S3-C] Surveyor-Max\n- [MIN-S0-A] Arbor MHV Mining Laser\n- [MIN-S0-B] Helix\n- [MIN-S0-B] Hofstede\n- [MIN-S0-C] Lawson Mining Laser\n\n<EM4>[Shubin_RG_ShipMining_Rank4_Org, Rank 2–3]</EM4>\n- [IND-S0-B] BroadSpec-Go\n- [IND-S2-B] BroadSpec\n- [IND-S4-B] BroadSpec-Max\n- [MIN-S1-A] Arbor MH1 Mining Laser\n- [MIN-S1-A] Helix I Mining Laser\n- [MIN-S1-A] Hofstede-S1 Mining Laser\n- [MIN-S1-A] Impact I Mining Laser\n- [MIN-S1-A] Klein-S1 Mining Laser\n- [MIN-S1-A] Lancet MH1 Mining Laser\n- [MIN-S1-A] Pitman Mining Laser\n\n<EM4>[Shubin_RG_ShipMining_Rank4_Org, Rank 4]</EM4>\n- [IND-S0-A] FullSpec-Go\n- [IND-S2-A] FullSpec\n- [IND-S3-A] FullSpec-Max\n- [MIN-S2-A] Arbor MH2 Mining Laser\n- [MIN-S2-A] Helix II Mining Laser\n- [MIN-S2-A] Hofstede-S2 Mining Laser\n- [MIN-S2-A] Impact II Mining Laser\n- [MIN-S2-A] Klein-S2 Mining Laser\n- [MIN-S2-A] Lancet MH2 Mining Laser\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Veteran Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
