Foxwell_HaulCargo_AToB_OLP_desc_01=Nous recherchons un prestataire avec les compétences et le vaisseau approprié pour une mission importante. Des hors-la-loi ont tendu une embuscade à un Hull C transportant une cargaison de <EM4>~mission(CargoGradeToken)</EM4> et l'ont emmené à <EM4>~mission(Location|Address)</EM4>. Nous avons été engagé pour tout récupérer.  \n\nLa cargaison est stockée quelque part dans une vieille installation d'Hathor. L'endroit est vaste et grouille de hors-la-loi. Nous avons besoin de quelqu'un pour récupérer les marchandises dans le monte-charge et les ramener toutes au <EM4>monte-charge de ~mission(Destination|Address)</EM4>. Je ne pense pas que ce sera une promenade de santé. Apportez beaucoup de munitions et un vaisseau capable de transporter des conteneurs de <EM4>~mission(MissionMaxSCUSize)</EM4>. \n\nIl serait également judicieux de prendre un <EM4>rayon tracteur portatif</EM4> avec vous.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_HaulCargo_AToB_OLP_title_01=Niveau Rouge : Récupérer une Cargaison <EM4>[BP]</EM4>
Foxwell_HaulCargo_AToB_PAF_desc_01=Une équipe a récemment attaqué un centre de distribution et s'est emparée d'une cargaison de <EM4>~mission(CargoGradeToken)</EM4>. Foxwell a été engagé pour récupérer toutes ces marchandises. On nous signale que ces hors-la-loi utilisent d'anciennes installations d'Hathor comme cachettes et nous pensons que les articles volés se trouvent actuellement à <EM4>~mission(Location|Address)</EM4>.\n\nSi vous êtes intéressé, vous aurez besoin d'un vaisseau capable de transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>. Je doute que vous puissiez entrer et sortir de cette SAP sans vous faire remarquer, alors préparez-vous à vous battre. Une fois le lieu sécurisé, prenez les marchandises dans le monte-charge et livrez-les au <EM4>monte-charge de ~mission(Destination|Address)</EM4>. \n\nIl serait également judicieux de prendre un <EM4>rayon tracteur portatif</EM4> avec vous.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_HaulCargo_AToB_PAF_title_01=Niveau Rouge : Récupérer une Cargaison Volée <EM4>[BP]</EM4>
Foxwell_HaulCargo_MultiToSingle_desc_01=Il se passe quelque chose d'étrange dans les anciennes installations minières d'Hathor. Les stations d'alignement de plateformes et les plateformes laser orbitales sont abandonnées et prennent la poussière pendant des décennies, mais des hors-la-loi ont commencé à les utiliser comme base d'opérations.\n\nNous avons été engagés par une personne préoccupée qui a récemment perdu un grand nombre de marchandises importantes à cause d'un de ces gangs. Actuellement, ces marchandises sont cachées dans <EM4>~mission(Location1|Address)</EM4> et <EM4>~mission(Location2|Address)</EM4>, mais on craint de plus en plus que le gang ne se débarrase bientôt de ces marchandises. C'est pourquoi nous avons été engagés pour frapper ces deux installations d'Hathor, récupérer la cargaison dans les monte-charges et l'amener au monte-charge de <EM4>~mission(Destination|Address)</EM4>. \n\nVoici les spécificités de ce qu'il faut récupérer à chaque endroit. Peu importe l'ordre dans lequel vous faites tout ça, tant que tout est collecté et livré. Assurez-vous simplement d'apporter un vaisseau capable de transporter des conteneurs de <EM4>~mission(MissionMaxSCUSize)</EM4>.  Il serait également judicieux de prendre un <EM4>rayon tracteur portatif</EM4> avec vous.\n\n~mission(MultiToSingleToken)\n\nFoxwell n'a pas pu repérer ces lieux, mais si j'étais vous, je m'attendrais à faire face à une sérieuse résistance armée. Mieux vaut apporter beaucoup d'équipement et quelques amis.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_HaulCargo_MultiToSingle_title_01=Niveau Rouge : Nettoyage des SAP, Récupération de Cargaison et Livraison à la PLO <EM4>[BP]</EM4>
Foxwell_Mercenary_Rehire_desc_001=En raison d’une restructuration de l’entreprise, Foxwell a plusieurs nouveaux postes à pourvoir immédiatement. Foxwell sait que vous avez déjà manifesté de l’intérêt pour ce type de travail, et nous nous demandons si vous souhaiteriez tenter à nouveau un contrat.\n\nL’un de nos clients a besoin d'aide à <EM4>~mission(Location|Address)</EM4>, où ses forces de sécurité peinent à gérer une incursion hors-la-loi. Rendez-vous sur place et aidez les forces locales à éliminer le problème avant qu’il ne soit trop tard. \n\nRéussissez ce contrat, et Foxwell se fera un plaisir de vous proposer davantage de missions.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5\n<EM4>Applicant:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_Mercenary_Rehire_title_001=Toujours à la Recherche d'un Emploi ? <EM4>[BP]</EM4> <EM4>[500 Rep]</EM4>
Foxwell_SecurityPatrol_E_Desc_001=On a besoin de quelqu'un pour effectuer une patrouille de sécurité. Vous devrez vous rendre à <EM4>l'emplacement indiqué sur votre ATH</EM4>, puis scanner plusieurs points de passage désignés pour vous assurer qu'ils sont sûrs et sécurisés.\n\nLes satellites de cette zone ont fait des siennes ces derniers temps. Nous ne savons pas exactement ce qui se passe là-bas, mais mieux vaut être prêt en cas de problème.\n\nTerminez ce contrat et le prestataire principal recevra un bonus de <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires.</EM4>\n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sanguine" Energy Assault Rifle\n- [S1-A] Antium Arms Sand\n- [S1-A] Antium Core Sand\n- [S1-A] Antium Helmet Sand\n- [S1-A] Antium Legs Sand\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Targets x15\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_SecurityPatrol_E_Title_001=Niveau Jaune : Patrouille de sécurité <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_SecurityPatrol_H_Desc_001=Plusieurs vaisseaux inconnus ont été repérés dans des secteurs fréquentés par des transporteurs livrant des marchandises pour notre client. Celui-ci craint que ces vaisseaux ne surveillent ses transporteurs en vue d'une embuscade. Il nous a donc demandé de patrouiller la zone. \n\nCommencez par vous rendre à <EM4>l'emplacement indiqué</EM4> sur votre ATH et scannez-le pour vous assurer qu'il est sans danger. Ensuite, nous vous enverrons dans d'autres zones pour détecter d'éventuelles menaces. Nous vous recommandons d'emmener un <EM4>coéquipier</EM4> et suffisamment de provisions pour faire face à toute éventualité.     \n\nSachez également que si vous réussissez ce contrat, le contractant principal recevra en prime <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires.</EM4>\n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sanguine" Energy Assault Rifle\n- [S1-A] Antium Arms Sand\n- [S1-A] Antium Core Sand\n- [S1-A] Antium Helmet Sand\n- [S1-A] Antium Legs Sand\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Targets x54\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_SecurityPatrol_H_Title_001=Niveau Orange : Menace potentielle de sécurité <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
Foxwell_SecurityPatrol_M_Desc_001=Un client s'inquiète à propos d'activités suspectes près de certains de ses intérêts. Nous avons été engagés pour patrouiller dans la zone et d'effectuer des scans à plusieurs endroits. Ça vous intéresse ? Si oui, rendez-vous au <EM4>marqueur d'emplacement</EM4> sur votre ATH pour commencer la patrouille.</EM4>\n\nLe client n'a pas précisé la nature des menaces, mais il pense que quelque chose ne tourne pas rond dans les environs. Espérons que nous pourrons lui apporter un peu de tranquillité d'esprit.\n\nDe plus, le client s'est arrangé pour que nous offrions un bonus de <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires</EM4> au prestataire principal.\n\n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sanguine" Energy Assault Rifle\n- [S1-A] Antium Arms Sand\n- [S1-A] Antium Core Sand\n- [S1-A] Antium Helmet Sand\n- [S1-A] Antium Legs Sand\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Targets x23\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_SecurityPatrol_M_Title_001=Niveau Orange : Patrouille de sécurité <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
Foxwell_SecurityPatrol_S_Desc_001=Nous recherchons un pilote aguerri pour une patrouille importante. Un client de marque en a assez que des hors-la-loi s'en prennent à ses vaisseaux et à ses satellites. Nous avons été engagés pour scanner les zones concernées et neutraliser toute force hostile. La patrouille commence à <EM4>l'emplacement indiqué sur votre ATH</EM4>, puis vous devrez vous rendre à plusieurs autres endroits que nous vous indiquerons.\n\nNous ne savons pas exactement ce que vous allez rencontrer, mais d'après les informations fournies par le client, des groupes de cinq à sept chasseurs ont été fréquemment aperçus dans le secteur. Dans certains cas, ce sont même des vaisseaux plus imposants qui mènent la charge. Vous feriez donc mieux vous préparer à un combat acharné. Si possible, essayez de recruter au moins <EM4>trois amis</EM4> pour vous aider. Même un pilote chevronné aura besoin de toute l'aide possible pour venir à bout de ces groupes.   \n\nComme cette mission s'annonce difficile, le prestataire principal recevra en bonus <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires</EM4> à la fin de la patrouille.\n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sanguine" Energy Assault Rifle\n- [S1-A] Antium Arms Sand\n- [S1-A] Antium Core Sand\n- [S1-A] Antium Helmet Sand\n- [S1-A] Antium Legs Sand\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 7/7\n<EM4>Hostiles:</EM4> Targets x84\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
