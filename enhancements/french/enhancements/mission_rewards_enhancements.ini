Eckhart_EscortShips_M_desc=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Escorte de Vaisseau\nCode d'approbation : = ~mission(ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\nUn de mes clients a besoin d'une escorte immédiate pour traverser une zone dangereuse. Rendez-vous à <EM4>~mission(Location|Address)</EM4> et ils vous rejoindront après le lancement. Les rapports indiquent une recrudescence des activités criminelles dans la région, alors ne baissez pas votre garde.\n\nCe contrat est non négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [D-S1-A] Suckerpunch Cannon\n- [D-S2-A] Suckerpunch-L Cannon\n- [D-S3-A] Suckerpunch-XL Cannon\n- [STH-S1-B] Veil\n- [STH-S2-B] Sheut\n- [E-S1-A] M3A Cannon\n- [E-S2-A] M4A Cannon\n- [E-S3-A] M5A Cannon\n- [STH-S1-C] Shimmer\n- [STH-S2-C] Obscura\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4, Hostiles x2, Interdiction Ships x1, Reinforcements x14\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
