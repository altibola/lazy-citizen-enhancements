Eckhart_EscortShips_VE_desc=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Escorte de Vaisseau\nCode d'approbation : = ~mission(ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\nUn client a demandé qu'un prestataire disponible immédiatement apporte une aide supplémentaire à plusieurs vaisseaux quittant une base d'astéroïdes située à <EM4>~mission(Location|Address)</EM4>. Une fois que vous aurez accepté, rendez-vous sur place et attendez les instructions supplémentaires. Dans ce cas précis, votre mission consiste à assurer la sécurité de leur passage. Des ennemis pourraient être présents, mais ils ne devraient pas poser trop de difficultés.\n\nCe contrat est non négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] M3A Cannon\n- [E-S2-A] M4A Cannon\n- [E-S3-A] M5A Cannon\n- [STH-S1-C] Shimmer\n- [STH-S2-C] Obscura\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2, Hostiles x1, Reinforcements x6\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
