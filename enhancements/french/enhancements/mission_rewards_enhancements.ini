Foxwell_DefendLocation_H_Desc_001=Les habitants de <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> sont attaqués et ont besoin de notre aide. Leurs vaisseaux dans la région sont pris pour cible et craint que ce ne soit que le prélude à quelque chose de plus grave.  \n\nLa situation évolue, mais je suis tenu informé en permanence de ce qui se passe et je vous tiendrai au courant au fur et à mesure de l'avancement du contrat. \n\nÊtes-vous disponible pour leur venir en aide ? Il serait judicieux de recruter quelques amis pour nous aider. Il s'agit de clients importants et nous ne pouvons pas nous permettre de les décevoir. Le prestataire principal recevra un bonus de <EM4>~mission(ScripAmount) jetons de la Guilde des Mercenaire</EM4> si vous accomplissez le travail.\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- [S1-A] Antium Arms Storm\n- [S1-A] Antium Core Storm\n- [S1-A] Antium Helmet Storm\n- [S1-A] Antium Legs Storm\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x5, Hostiles x3, Interdiction Ships x2, Reinforcements x16\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
