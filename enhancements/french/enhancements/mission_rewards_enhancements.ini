Eckhart_ShipAmbush_E_desc=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Embuscade de Vaisseau\nCODE D'APPROBATION = ~mission(ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\nUn de nos clients a reçu des menaces anonymes visant à le faire chanter. Après quelques recherches de notre part, nous avons réussi à remonter jusqu'à un individu qui pilote un certain <EM4>~mission(AmbushTarget)</EM4>. Le client souhaite que nous nous occupions de ce maître chanteur avant qu'il n'ait l'occasion de passer à l'action. \n\nD'après notre évaluation, la cible ne devrait pas être trop difficile à neutraliser. Elle vole régulièrement près de <EM4>~mission(Location|Address)</EM4>, où se trouve un <EM4>nuage d'émission</EM4> qui constitue un endroit idéal pour mettre votre vaisseau à l'arrêt et attendre. Parfois, la cible est seule, mais elle voyage souvent avec d'autres vaisseaux monoplaces pour se protéger. Il vaut mieux être stratégique lorsque vous lancez votre embuscade, sinon la <EM4>~mission(AmbushTarget)</EM4> pourrait avoir une chance de s'échapper. Nous ne voulons pas perdre celle-ci. Nous alerterons les autres prestataires présents dans la zone de l'embuscade afin qu'ils puissent venir nous aider une fois qu'elle aura commencé.     \n\nLe paiement sera effectué une fois le contrat mené à bien. Le client a également ajouté un bonus de <EM4>~mission(ScripAmount) Jeton GDM</EM4> pour le prestataire principal.\n\nCe contrat est non négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] Lightstrike I Cannon\n- [E-S2-A] Lightstrike II Cannon\n- [E-S3-A] Lightstrike III Cannon\n- [STH-S1-C] SonicLite\n- [STH-S2-C] Cirrus\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Allies x2, Hostile Wave x7, Targets x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Eckhart_ShipAmbush_E_title=C'est l'Heure de la Leçon <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Eckhart_ShipAmbush_H_desc=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Embuscade de Vaisseau\nCODE D'APPROBATION = ~mission(ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\nNous recherchons un prestataire compétent capable de recruter un coéquipier pour aider à mener à bien une embuscade. La cible est une <EM4>~mission(AmbushTarget)</EM4> qui a été impliquée dans plusieurs opérations contre l'un de nos clients les plus importants. En la neutralisant une fois pour toutes, nous faciliterons considérablement la vie de notre client. Bien que la ~mission(AmbushTarget) soit notre priorité, elle ne se déplace généralement pas sans une escorte importante, y compris de gros appareils. \n\nNous avons appris que ce groupe passera bientôt par <EM4>~mission(Location|Address)</EM4>. Pourriez-vous vous dépêcher et les devancer ? Cet endroit est recouvert d'un <EM4>nuage d'émission</EM4> dans lequel vous pouvez cacher votre vaisseau. Une fois qu'ils seront passés, vous devriez avoir l'avantage. \n\nLe paiement sera effectué une fois le contrat rempli avec succès. Le client sait que cette mission sera difficile, il a donc ajouté une prime de <EM4>~mission(ScripAmount) Jeton GDM</EM4> qui sera versée au prestataire principal.\n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] Lightstrike I Cannon\n- [E-S2-A] Lightstrike II Cannon\n- [E-S3-A] Lightstrike III Cannon\n- [STH-S1-C] SonicLite\n- [STH-S2-C] Cirrus\n- [E-S1-A] FL-11 Cannon\n- [E-S2-A] FL-22 Cannon\n- [E-S3-A] FL-33 Cannon\n- [STH-S1-B] DeltaMax\n- [STH-S2-B] GammaMax\n- [E-S4-A] Lightstrike IV Cannon\n- [E-S5-A] Lightstrike V Cannon\n- [E-S6-A] Lightstrike VI Cannon\n- [STH-S1-A] Slipstream\n- [STH-S2-A] Eclipse\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Allies x1, Hostile Wave x13, Targets x5\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
