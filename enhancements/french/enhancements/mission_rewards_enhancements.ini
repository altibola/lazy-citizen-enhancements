missionManager_Charlie_Description=Nous avons un besoin urgent d'un détective privé expérimenté et discret près de Crusader pour traiter une question d'assurance.\n\nTarif fixe. Aucun frais. La mission commencera dès que possible. Il est impératif de fournir des preuves adéquates pour conclure le contrat.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
mtps_RetrieveConsignment_desc_001=A PROPOS DU POSTE\nLe service de protection de MicroTech a besoin d'un professionnel de la sécurité pour une opération de récupération à ~mission(Location). La zone est actuellement attaquée et les forces de sécurité sur place sont présumées mortes. Nous pensons que du matériel confidentiel récemment livré à l'installation pour une conservation temporaire ont été la cible d'un raid. Votre objectif principal sera de récupérer ces boites de matériel et les livrer dans un endroit sécurisé.\n\n Pour des raisons de sécurité, le matériel confidentiel a été livré caché dans un envoi plus conséquent et ont été sécurisés dans la chambre forte automatisée. Le matériel a des codes de récupération uniques qui doivent être saisis sur le clavier du convoyeur de colis. Seuls les agents de sécurité habilités sont en possession d'un datapad contenant un code, vous devrez donc les localiser avant de récupérer les boîtes. Une fois sécurisés, livrez tous le matériel à ~mission(dropoff1) pour être payé.\n\nCONSIGNES\n•Avoir son propre moyen de transport pour se rendre à ~mission(Location|address).\n• Utiliser la force si nécessaire pour récupérer le matériel confidentiel.\n• Livrer le matériel à ~mission(dropoff1|address).\n\n- QUALIFICATIONS MINIMALES\n• 2 ans d'expérience en tant que mercenaire et/ou dans la sécurité.\n• Avoir un équipement de combat.\n• Avoir un vaisseau de transport de marchandises.\n• Disponible pour un déploiement immédiat.\n\nQUALIFICATIONS SOUHAITEES\n• Expérience des techniques d'intervention rapide en milieu hostile.\n• Expérience du transport de marchandises importantes.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Guards x4, Hostiles x54
mtps_RetrieveConsignment_title_001=Défense de la Zone et Livraison du Matériel Confidentiel <EM4>[500–4,000 Rep]</EM4>
mtps_UGF_defend_E_desc_001=À PROPOS DU POSTE\nLe service de protection de MicroTech est à la recherche d'un mercenaire professionnel soucieux du détail, capable de constituer une équipe afin de protéger ~mission(Location|Address) contre toute menace mineure. \n\nVOTRE JOB\n• Utiliser son propre moyen de transport jusqu'à la ~mission(Location|Address).\n• Fournir sa propre équipe de sécurité pour vous aider.\n• Protéger le site contre les menaces hostiles ; utiliser la force si nécessaire.\n\nQUALIFICATIONS MINIMALES\n• 2 ans d'expérience combinée en tant que mercenaire et/ou en sécurité.\n• Accès à un équipement de combat et à un moyen de transport.\n• Etre disponible immédiatement.\n\nQUALIFICATION ADDITIONELLE\n•  Avoir une expérience dans la gestion d'une équipe.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x1, Hostiles x10, Private Security x4, Sentries x6\n<EM4>Unknown:</EM4> 11
mtps_UGF_defend_E_title_001=Défense du Site Contre les Menaces Mineures <EM4>[500 Rep]</EM4>
mtps_UGF_defend_VH_desc_001=À PROPOS DU POSTE\nLe service de protection de MicroTech est à la recherche d'un mercenaire professionnel soucieux du détail, capable de constituer une équipe afin de protéger ~mission(Location|Address) contre de graves menaces hostiles. \n\nVOTRE JOB\n• Utiliser son propre moyen de transport jusqu'à la ~mission(Location|Address).\n• Fournir sa propre équipe de sécurité pour vous aider.\n• Protéger le site contre les menaces hostiles ; utiliser la force si nécessaire.\n\nQUALIFICATIONS MINIMALES\n• 2 ans d'expérience combinée en tant que mercenaire et/ou en sécurité.\n• Accès à un équipement de combat et à un moyen de transport.\n• Etre disponible immédiatement.\n\nQUALIFICATION ADDITIONELLE\n•  Avoir une expérience dans la gestion d'une équipe.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x3, Hostiles x8, Private Security x4, Sentries x4\n<EM4>Unknown:</EM4> 21
