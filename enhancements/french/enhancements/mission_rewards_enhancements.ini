RAIN_collectresources_multiple_GEN_desc_01=À tous les prestataires disponibles,\n\nLes scientifiques de Rayari travaillent d'arrache-pied pour résoudre les problèmes liés à la défaillance de la technologie de régénération. Actuellement, leurs efforts sont entravés par un manque de matériaux qu'ils estiment essentiels à leurs expériences. \n\nEn particulier, nos scientifiques à <EM4>~mission(Destination|Address)</EM4> ont dû suspendre leurs travaux après avoir épuisé ces ressources. Comme notre fournisseur habituel ne pourra pas nous réapprovisionner avant plusieurs mois en raison d'une pénurie, nous sommes prêts à payer une prime à toute personne capable d’aider à reconstituer ces stocks.\n\nPour plus d’informations sur les créatures concernées, consultez le "Guide de l’explorateur des ressources récoltables" dans votre Journal.\n\nEnsemble, nous pouvons rendre l’univers meilleur pour tous.\n\nNarina Lerrem\nDirectrice principale\nSous-traitance en Recherche Clinique\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- P8-AR Rifle\n- [S1-A] P8-AR Rifle Magazine (15 Cap)\n- [S1-A] Palatino Arms\n- [S1-A] Palatino Arms Moonfall\n- [S1-A] Palatino Core\n- [S1-A] Palatino Core Moonfall\n- [S1-A] Palatino Helmet\n- [S1-A] Palatino Helmet Moonfall\n- [S1-A] Palatino Legs\n- [S1-A] Palatino Legs Moonfall\n- Prism "Bonedust" Laser Shotgun\n- Prism "Deep Sea" Laser Shotgun\n- Prism "Firesteel" Laser Shotgun\n- Prism Laser Shotgun\n- [S1-A] Prism Laser Shotgun Battery (20 cap)\n- [S1-A] Siebe Helmet\n- [S1-A] Stirling Exploration Suit\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> 25% chance (YormandiEyes, IrradiatedPearls only)\n\n<EM4>? = only the YormandiEyes, IrradiatedPearls variants award blueprints</EM4>
RAIN_collectresources_multiple_GEN_name_01=Ressources Supplémentaires Pour la Recherche <EM4>[BP?]</EM4> <EM4>[100–200 Rep]</EM4>
RAIN_collectresources_multiple_OLP_desc_01=À tous les prestataires disponibles,\n\nLes scientifiques de Rayari travaillent sans relâche afin de résoudre les dysfonctionnements récurrents de la technologie de régénération. Actuellement, leurs recherches sont bloquées par l’épuisement de trois ressources essentielles à leurs expériences : <EM4>saldynium, jaclium et carinite</EM4>.  \n\nEn particulier, nos équipes scientifiques basées à <EM4>~mission(Destination|Address)</EM4> ont dû suspendre leurs activités faute de ces ressources critiques. Notre fournisseur habituel ne pouvant nous réapprovisionner avant plusieurs mois à cause d’une pénurie généralisée, nous paierons généreusement tout prestataire capable de nous aider à rétablir notre stock.\n\nBien que nous n’ayons pu effectuer que des scans préliminaires, nos équipes estiment fortement que les Plateformes Lasers Orbitales désaffectées d’Hathor (OLP) ont été construites au-dessus de zones présentant une concentration élevée de ces ressources. Réactiver ces OLP pourrait être votre meilleure option pour obtenir ce dont nous avons besoin.\n\nEnsemble, nous pouvons rendre l’univers meilleur pour tous.\n\nNarina Lerrem\nResponsable Senior\nSous-traitance en Recherche Clinique\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Pulse "Blacklist" Pistol\n- Pulse "Rouge" Pistol\n- Pulse Laser Pistol\n- Quartz "Black Op" Energy SMG\n- Quartz "Deadfall" Energy SMG\n- Quartz "Lumen" Energy SMG\n- Quartz Energy SMG\n- [S1-A] Pulse Laser Pistol Battery (60 Cap)\n- [S1-A] Quartz Energy SMG Battery (45 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 7/7\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> 25% chance
RAIN_collectresources_multiple_OLP_name_01=Besoin de Ressources Essentielles pour la Recherche <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
RAIN_collectresources_single_OLP_desc_01=À tous les prestataires disponibles,\n\nNotre équipe de chercheurs à <EM4>~mission(Destination|Address)</EM4> travaille sans relâche pour résoudre l’actuelle "Crise de Régénération" et traiter le problème des empreintes instables. Leurs travaux ont donné des résultats prometteurs, mais un manque d’une ressource clé les empêche de mener d’autres expériences.\n\nNous avons appris de notre fournisseur qu’une forte demande de cette resource, combinée à une baisse des rendements miniers, signifie que nous ne recevrons pas notre livraison prévue avant plusieurs mois. Notre équipe de recherche ne peut pas attendre aussi longtemps, et nous espérons que vous pourrez nous aider.\n\nCette ressource est difficile à trouver, mais nous avons de bonnes raisons de croire que les anciennes installations minières de Hathor ont été construites dans des zones à forte concentration de ce minerai. Puisque Hathor a cessé ses activités peu de temps après avoir établi ses opérations dans le système, il y a de fortes chances qu’en réactivant l’un de ces lasers de minage, vous puissiez obtenir ce dont nous avons besoin.\n\nEnsemble, nous pouvons rendre l’univers meilleur pour tous.\n\nNarina Lerrem\nDirectrice Principale\nSous-traitance en Recherche Clinique\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Pulse "Blacklist" Pistol\n- Pulse "Rouge" Pistol\n- Pulse Laser Pistol\n- Quartz "Black Op" Energy SMG\n- Quartz "Deadfall" Energy SMG\n- Quartz "Lumen" Energy SMG\n- Quartz Energy SMG\n- [S1-A] Pulse Laser Pistol Battery (60 Cap)\n- [S1-A] Quartz Energy SMG Battery (45 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 7/7\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> 25% chance
RAIN_collectresources_single_OLP_name_01=Besoin d'une Ressource pour la Recherche\n <EM4>[BP]</EM4> <EM4>[100–150 Rep]</EM4>
RAIN_intro_desc_01=À tous les prestataires disponibles,\n\nRayari Incorporated recherche des prestataires indépendants pour apporter un soutien supplémentaire à nos efforts visant à repousser les limites de la science, de l'agriculture et de la médecine dans l'Empire et au-delà.\n\nUne initiative de recherche à <EM4>~mission(Destination|Address)</EM4> a désespérément besoin de ressources. Nous cherchons donc un entrepreneur fiable pour obtenir et livrer ces composants essentiels.\n\nPour plus d’informations sur les animaux en question, consultez "Le Guide de la faune de Stanton" dans votre Journal.\n\nRayari offre des salaires compétitifs, ainsi que la satisfaction de contribuer à un univers meilleur.\n\nGrandissons ensemble,\n\nNarina Lerrem\nDirectrice Principale\nSous-traitance en Recherche Clinique\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Neutral:</EM4> +100 Rep
RAIN_intro_name_01=Intéressé pour Bâtir un Meilleur Avenir ? <EM4>[100 Rep]</EM4>
