InterSec_SecurityPatrol_S_Desc_001=DÉTAILS DE LA MISSION\n\nZone d'Opération : Système Nyx\nForces Hostiles : Vanduuls\nÉquipement Requis : Vaisseaux de Combat\nBriefing : Les groupes de chasse vanduuls poussent de plus en plus loin dans Nyx. La première ligne de défense contre cette progression est l’intensification des patrouilles. InterSec a identifié un secteur où l’activité vanduul est en hausse et recherche un prestataire pour patrouiller la zone et en fournir un compte rendu.\n\nVous commencerez la patrouille au <EM4>marqueur</EM4> envoyé sur votre ATH, puis scannerez une série de points de passage le long d’un itinéraire désigné. Les vaisseaux vanduuls dans ce secteur sont très habiles et agressifs, InterSec recommande donc fortement de <EM4>faire appel à plusieurs vaisseaux prêts au combat en renfort</EM4>.\n\nInterSec comprenant l’immense danger auquel vous serez exposé pendant cette patrouille, une prime spéciale de <EM4>~mission(ScripAmount) Jetons GDM</EM4> sera versée au prestataire principal une fois le secteur sécurisé. \n\nCordialement, \n\nDeacon Tobin\nResponsable des Opérations\nInterSec Defense Solutions\n\nCette communication consiste en une offre non-contractuelle, qui, une fois acceptée, pourra être résiliée à tout moment sans préavis par l'une ou l'autre des parties. Toutes les opérations s'effectuent aux risques et périls du prestataire et doivent respecter la législation de l'UEE et du système, le cas échéant.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Quartz "Deadfall" Energy SMG\n- Quartz "Lumen" Energy SMG\n- [S1-A] Quartz Energy SMG Battery (45 cap)\n- [S1-A] Testudo Arms Nightveil\n- [S1-A] Testudo Arms Turfwar\n- [S1-A] Testudo Core Nightveil\n- [S1-A] Testudo Core Turfwar\n- [S1-A] Testudo Helmet Nightveil\n- [S1-A] Testudo Helmet Turfwar\n- [S1-A] Testudo Legs Nightveil\n- [S1-A] Testudo Legs Turfwar\n- [S2-A] Testudo Backpack Nightveil\n- [S2-A] Testudo Backpack Turfwar\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 7/7\n<EM4>Hostiles:</EM4> Targets x51\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
