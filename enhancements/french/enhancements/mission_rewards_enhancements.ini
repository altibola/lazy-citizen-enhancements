PU_GhostHollow_Information_Desc=Tu rêves de faire apparaitre des crédits par magie ? Un lot de vieux terminaux bancaires de la CCB est en ligne et simule des transactions pour assécher des comptes au profit de celui qui contrôle ces terminaux. Si tu es partant, je te donne les coordonnées pour quelques crédits. Ne traine pas, j'ignore pour combien de temps encore ils seront en ligne.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
