Shubin_Industrial_HandMining_Pyro_Nyx_VH_Interstellar_Desc_001=AFFECTATION : Bon de commande\nLIEU : <EM4>~mission(System) </EM4>\n\nCONDITIONS* : \nShubin Interstellar cherche à honorer un nouveau bon de commande pour des matériaux rares. Votre aide dans cette affaire serait très appréciée.\n\nIl n'existe que quelques endroits connus où ces matériaux peuvent être trouvés, principalement sur les sites désormais désaffectés du groupe Hathor sur <EM4>Daymar et Aberdeen</EM4>. Nous vous suggérons de vous rendre aux Stations d'alignement de plateformes (SAP) et d'essayer de réactiver leur Plateforme laser orbital (PLO) afin d'accéder aux matériaux situés sous la surface de la planète.\n\nNous vous rappelons qu'il s'agit d'un bon de commande et non d'un contrat d'exploitation minière. Vous êtes donc tenu d'apporter votre propre équipement, tel qu'un <EM4>~mission(Hint_Tool)</EM4>.\n\nUne fois prêt à nous vendre les matériaux demandés, déposez-les dans le monte-charge situé à <EM4>~mission(Destination|Address)</EM4>.\n\n*En acceptant ce contrat, vous assumez tous les risques associés aux travaux décrits dans le présent document et Shubin Interstellar ne peut en aucun cas être tenu responsable des dommages survenus pendant la durée du contrat.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Arclight "Desert Shadow" Pistol\n- Arclight "Herrero" Pistol\n- [S1-A] Arclight Pistol Battery (30 cap)\n- [S1-A] Novikov Exploration Suit\n- [S1-A] Novikov Helmet\n- [S1-A] Pembroke Exploration Suit\n- [S1-A] Pembroke Helmet\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 4/7 | Knowledge 5/7\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
