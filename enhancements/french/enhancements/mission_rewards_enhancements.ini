BHG_Certification_Hard_Desc=--------------------------------------------------------\n----------------- CONTRAT DE CHASSE À LA PRIME -----------------\n--------------------------------------------------------\n\nGUILDE DES CHASSEURS DE PRIME\nTRAITEMENT & DISTRIBUTION\n\nLa Guilde des Chasseurs de Primes a autorisé une prime officielle.\n\nNOM : ~mission(TargetName) \nSYSTÈME : ~mission(System) \nRISQUES ENCOURUS : Élevés\nDERNIER EMPLACEMENT CONNU : ~mission(Location)\nAFFILIATIONS CONNUES : <Aucune>\nNOTES : Alors que votre position dans la communauté continue de croître, la Guilde des Chasseurs de Primes aimerait vous offrir la chance d'obtenir une Licence de Traqueur Compagnon.\n\nCette licence signifierait que vous êtes qualifié pour traquer et appréhender les Cibles à Risque Élevé (CRE). Ces criminels peuvent voyager à bord de grands vaisseaux multi-équipage et plusieurs escortes. Leurs capacités offensives et défensives supplémentaires en font des cibles difficiles pour tous, sauf pour les membres les plus qualifiés.\n\nPour obtenir cette certification, vous devez appréhender un criminel classé CRE du nom de <EM4>~mission(TargetName)</EM4> vu dernièrement à <EM4>~mission(Location|Address)</EM4>.\n\n\nGUILDE DES CHASSEURS DE PRIMES\nÀ la poursuite de la justice\n\nLa Guilde des Chasseurs de Primes est un service de sécurité agréé par la Guilde des mercenaires et autorisé à agir dans l'UEE et au-delà, conformément aux lois de l'Autorité du Commerce Extraterrestre.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 3
