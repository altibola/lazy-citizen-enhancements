Intersec_TSG_Assist_Solo_Desc_001=DÉTAILS DE LA MISSION\n\nZone d'Opération : Système Nyx\nForces Hostiles : Vanduuls\nÉquipement Requis : Prêt au combat\nBriefing : \nUn vaisseau de sécurité de l'Alliance du Peuple de classe Idris, baptisé Tranquility, est actuellement engagé dans un combat contre un <EM4>vaisseau capital Vanduul</EM4> près d'une ancienne <EM4>station QV Extraction</EM4>, et Intersec recherche des pilotes de combat pour leur prêter main forte.\n\nRendez-vous immédiatement dans le secteur et <EM4>engagez le combat contre les chasseurs Vanduuls afin que le Tranquility puisse se concentrer sur le vaisseau capital</EM4>. \n\nBonne chance,\n\nDeacon Tobin \nResponsable des Opérations \nInterSec Defense Solutions  \n\nCette communication contient des informations confidentielles destinées uniquement au destinataire. Si vous recevez ce message par erreur, merci de ne pas en tenir compte et de contacter l'expéditeur. Toutes les opérations s'effectuent aux risques et périls du prestataire et doivent respecter la législation de l'UEE et du système, le cas échéant.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [B-S1-A] Deadbolt I Cannon\n- [B-S2-A] Deadbolt II Cannon\n- [B-S3-A] Deadbolt III Cannon\n- [MIL-S1-B] ForceWall\n- [MIL-S2-B] CoverAll\n- [MIL-S3-B] FullBlock\n- [S1-A] Tailwind Flight Helmet Blackbolt\n- [S1-A] Tailwind Flight Helmet Green Streak\n- [S1-A] Tailwind Flight Suit\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x5, Hostiles x1\n<EM4>Friendlies:</EM4> Friendlies x1\n<EM4>Rep:</EM4> +200\n<EM4>Blueprint Reward:</EM4> Guaranteed
Intersec_TSG_Assist_Solo_Title_001=Venir en aide au vaisseau Tranquility de l'Alliance du peuple <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
Intersec_TSG_BombRun_Solo_Desc_001=DÉTAILS DE LA MISSION\n\nZone d'Opération : Système Nyx\nForces Hostiles : Shattered Blade\nÉquipement Requis : Vaisseaux de Combat\nBriefing : \nDes sources locales ont indiqué que des Shattered Blade tentent de reconstruire l'une de leurs stations, et Intersec recherche un pilote pour les en empêcher.\n\nIls ont réussi à remettre en service les tourelles de défense de base, mais seuls <EM4>deux relais d'alimentation sont actuellement activés</EM4>. Ces derniers seront vos cibles, car <EM4>ils ne peuvent pas être détruits par des armes à énergie, vous devrez utiliser des armes balistiques ou des missiles/torpilles pour être efficace</EM4>. \n\nLa réactivation de cette station permettrait aux Shattered Blade de reprendre pied dans ce système, et nous ne pouvons pas les laisser faire.\n\nBonne chance,\n\nDeacon Tobin \nResponsable des Opérations \nInterSec Defense Solutions  \n\nCette communication contient des informations confidentielles destinées uniquement au destinataire. Si vous recevez ce message par erreur, merci de ne pas en tenir compte et de contacter l'expéditeur. Toutes les opérations s'effectuent aux risques et périls du prestataire et doivent respecter la législation de l'UEE et du système, le cas échéant.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [B-S4-A] Deadbolt IV Cannon\n- [B-S5-A] Deadbolt V Cannon\n- [B-S6-A] Deadbolt VI Cannon\n- [MIL-S1-B] Polar\n- [MIL-S2-B] Permafrost\n- [MIL-S3-B] Tempest\n- [S1-A] Tailwind Flight Helmet Adrenaline\n- [S1-A] Tailwind Flight Helmet Big Bite\n- [S1-A] Tailwind Flight Suit\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Rep:</EM4> +200\n<EM4>Blueprint Reward:</EM4> Guaranteed
Intersec_TSG_BombRun_Solo_Title_001=Bombardement Stratégique <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
Intersec_TSG_Group_Desc_001=DÉTAILS DE LA MISSION\n\nZone d'Opération : Système Nyx\nForces Hostiles : Shattered Blade\nÉquipement Requis : Groupe de frappe\nBriefing : \nNous avons appris que le Tranquility, un vaisseau de sécurité de l'Alliance du peuple, est tombé sur des Shattered Blade cachés dans une ancienne station QV Extraction. Les détails sont encore vagues, mais nous vous mettrons en contact avec des agents locaux une fois sur place. \n\nIntersec recherche une équipe pour intervenir et protéger le Tranquility ainsi que son équipage. D’après les discussions avec son capitaine, vous <EM4>aurez besoin d’armes balistiques et de missiles/torpilles pour neutraliser les défenses de la station</EM4> et, à terme, <EM4>envoyer des forces au sol pour sauver leur pilote</EM4>.\n\nLe <EM4>recrutement de vaisseaux supplémentaires</EM4> pour vous soutenir dans cette mission est absolument crucial. Vous aurez besoin de <EM4>différents types de vaisseaux</EM4> pour couvrir plusieurs zones de combat dans l’espace et au sol.\n\nCordialement,   \n\nDeacon Tobin \nResponsable des Opérations \nInterSec Defense Solutions  \n\nCette communication contient des informations confidentielles destinées uniquement au destinataire. Si vous recevez ce message par erreur, merci de ne pas en tenir compte et de contacter l'expéditeur. Toutes les opérations s'effectuent aux risques et périls du prestataire et doivent respecter la législation de l'UEE et du système, le cas échéant.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Novian "Ghostmaker" Crossbow\n- Novian "Nighthunter" Crossbow\n- Novian "Wildshot" Crossbow\n- Novian Crossbow\n- [S1-A] BlackFire Racing Flight Suit\n- [S1-A] BlackFire Racing Helmet\n- [S1-A] BlueFlame Racing Flight Suit\n- [S1-A] BlueFlame Racing Helmet\n- [S1-A] Tailwind Flight Helmet Airwolf\n- [S1-A] Tailwind Flight Helmet Blue Skies\n- [S1-A] Tailwind Flight Helmet Frostshock\n- [S1-A] Tailwind Flight Helmet Thunderstruck\n- [S1-A] WhiteHot Racing Flight Suit\n- [S1-A] WhiteHot Racing Helmet\n- [E-S1-A] Omnisky III Cannon\n- [E-S2-A] Omnisky VI Cannon\n- [E-S3-A] Omnisky IX Cannon\n- [E-S4-A] Omnisky XII Cannon\n- [E-S5-A] Omnisky XV Cannon\n- [E-S6-A] Omnisky XVIII Cannon\n- [MIL-S1-A] JS-300\n- [MIL-S2-A] JS-400\n- [MIL-S3-A] QuadraCell MX\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 6/7 | Risk 7/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x53, Maulers x1, Reinforcements x2\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Unknown:</EM4> 20\n<EM4>Rep:</EM4> +300\n<EM4>Blueprint Reward:</EM4> Guaranteed
Intersec_TSG_Group_Title_001=Besoin d'un groupe de frappe tactique <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
ItemGathering_ASD_Desc=Agence Hockrow \nDossier #JD10285\nEnquêteur Principal : Arken Mallor\n\nMise à Jour du Dossier : \nEn parcourant les dossiers, j'ai vu plusieurs allusions à un échantillon de laboratoire qui pourrait être utile à nos équipes pour analyse. Je ne sais pas exactement où il se trouve, mais si vous fouillez dans les locaux du Complexe Onyx, vous devriez pouvoir trouver cet échantillon et me l'apporter.\n\nActions de l'Enquêteur Contractuel :\nExplorer la <EM4>Section de Recherche du Complexe Onyx</EM4>, <EM4>trouver l'Échantillon de Laboratoire</EM4> et le remettre à <EM4>~mission(Destination|Address)</EM4>.\n\nNotes Supplémentaires :\nMéfiez-vous des forces hostiles qui pourraient se trouver sur place. \n\nAllez à Onyx avec un véhicule pouvant être garé dans un grand hangar.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7
ItemGathering_ASD_Title=Dossier Jorrit : Échantillon de Laboratoire
Jumptown2_Criminal_MBroker_desc=J'ai de bonnes nouvelles pour vous. À l'heure où nous parlons, il y a une installation automatisée qui produit colis après colis d'un produit de haute qualité, prêt à être livré.\n\nTout ce que vous avez à faire, c'est d'aller là bas, de négocier avec quelques voyous, de prendre tout ce que vous pouvez, et de le vendre pour un énorme profit. Ça ne devrait pas être un problème. Et il y a plein de gens prêts à payer cher pour récupérer un produit comme celui-là.\n\nEn parlant d'argent, je ne vais pas juste donner les coordonnées de cette installation par charité. Je pense qu'il est juste de demander une commission pour une information de cette qualité.\n\nJe ne perdrais pas de temps à ta place. Je ne sais pas combien de temps le site restera opérationnel.\n\n-Ruto\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Jumptown2_Lawful_MBroker_desc_BlacJac=ATTENTION : Opérateurs Mercenaires Vérifiés\n\nNous avons pu remonter une récente augmentation de la contrebande jusqu'à une installation de production automatisée à l'adresse ~mission(Location|Address). Nous ne pouvons pas être sûrs de la durée pendant laquelle le site sera opérationnel, c'est pourquoi BlacJac a besoin que quelqu'un soit sur place pour passer en revue, sécuriser la contrebande, et nous l'apporter à ~mission(Destination|Address).Une fois sur place, vous pourrez utiliser le terminal administratif pour nous transférer la marchandise de contrebande et recevoir votre récompense.\n\nNous n'avons pas été en mesure de déterminer quel genre de force hostile sera présente, mais quoi que vous rencontriez, vous êtes autorisé à utiliser la force létale si nécessaire.\n\nPlus de contrebande vous parviendrez à nous apporter, plus de crédits vous gagnerez.\n\nMerci,\nLt. Aaron Riegert\n\nSuperviseur de Contrat Privé\nSécurité BlacJac, "Protection Assurée"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Jumptown2_Lawful_MBroker_desc_CruSec=La Sécurité de Crusader a appris qu'une installation de production illégale à ~mission(Location|Address) est actuellement utilisée pour fabriquer des marchandises de contrebande.\n\nNous recherchons un prestataire pour sécuriser le site, confisquer toute contrebande et la livrer à notre zone de stockage des preuves à ~mission(Destination|Address).Une fois sur place, vous pourrez utiliser le terminal administratif pour nous transférer la marchandise de contrebande et recevoir votre récompense.\n\nMaintenant, cette installation est automatisée, donc nous ne savons pas pendant combien de temps ils vont produire, ou même combien de personnes sont sur place. Pour être prudent, je vous conseille de vous attendre à une forte résistance.\n\nVotre rémunération totale sera basée sur la manière dont les colis seront livrés en toute sécurité comme preuve.\n\nCONTRAT AUTORISÉ PAR :\nOfficier de liaison Vanzant\nID# 712L921P\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Jumptown2_Lawful_MBroker_desc_Hurston=HURSTON DYNAMICS\nSERVICE DE SOUS-TRAITANCE\n\nCONTRAT : Confisquer la Contrebande\nAFFILIATION DU PRESTATAIRE : Indépendant\nGESTIONNAIRE DE SOUS-TRAITANCE : T. Odington\nÉVALUATION DES RISQUES : Élevé\nCONTRAT URGENT : Non\n\nLa Sécurité d'Hurston a appris l'existence d'une installation active de production automatisée illégale à ~mission(Location|Address) et recherche un prestataire pour sécuriser le site et confisquer autant de colis de contrebande que possible pour les livrer à un établissement de la Sécurité d'Hurston ~mission(Destination|Address) pour destruction immédiate. Le transfert de la contrebande et l'attribution de votre récompense doivent être effectués par le biais du terminal administratif sur place.\n\nVous êtes autorisé à utilisez toute la force nécessaire pour atteindre votre objectif. Le paiement sera basé sur le montant de la contrebande sécurisée. \n\n\n\n\n** Les informations transmises peuvent contenir des éléments confidentiels et/ou privilégiés. Toute analyse, retransmission, diffusion ou autre utilisation de ces informations par des personnes ou entités autres que le destinataire prévu est interdite. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Jumptown2_Lawful_MBroker_desc_MicroTech=À PROPOS DU JOB\nLe Service de protection de Microtech est à la recherche d'un professionnel de la sécurité soucieux du détail, capable de l'aider à sécuriser des produits de contrebande provenant d'un site de production illégal à ~mission(Location|Address). Les colis devront ensuite être livrés à ~mission(Destination|Address) pour destruction via le terminal administratif.\n\nRESPONSABILITÉS\n• Assurer son propre transport jusqu'à ~mission(Location|Address).\n• Gérer tout hostile présent sur le site, en recourant à la force si nécessaire.\n• Sécuriser les produits de contrebande et les remettre aux terminaux de marchandises à ~mission(Destination|Address)\n\nQUALIFICATIONS MINIMUM\n• 2 années d'expérience dans le domaine du mercenariat et/ou de la sécurité.\n• Accès à de l'équipement de combat et à des moyens de transport.\n• Disponible pour un déploiement immédiat.\n\nSI POSSIBLE\n• Connaissance des Méthodes rapides de traitements des hostiles.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Kaboos_Intro_Description=DÉTAILS DE LA MISSION\n\nZone d'Opération : Système Nyx\nForces Hostiles : Inconnues\nÉquipement Requis : Vaisseaux de Combat, Armes Personnelles\nBriefing : InterSec a été mandaté par l'UEE pour recueillir des renseignements sur un groupe de <EM4>trafiquants du marché noir spécialisés dans les pièces Vanduul</EM4> en lien avec les expériences Vanduul illégales conduites dans les complexes Onyx d'ASD. L'UEE souhaite vivement comprendre et mettre un terme à leurs opérations.\n\nSur la base des preuves rassemblées dans les complexes d'ASD, nous avons potentiellement réussi à traquer la localisation d'un de leurs entrepôts.\n\nSi vous l'acceptez, rendez-vous à l'ancienne <EM4>station QV Planet Services Logistics</EM4> où nous reprendrons contact.\n\n\nRespectueusement, \n\nDeacon Tobin\nResponsable des Opérations\nInterSec Defense Solutions\n\nCette communication contient des informations confidentielles destinées uniquement au destinataire. Si vous recevez ce message par erreur, merci de ne pas en tenir compte et de contacter l'expéditeur. Toutes les opérations s'effectuent aux risques et périls du contractant et doivent respecter la législation de l'UEE et du système, le cas échéant.\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Boss x2, CQC x30, Juggernauts x2, Snipers x4, Soldiers x19, Technicians x5\n<EM4>Unknown:</EM4> 57\n<EM4>Jr. Contractor:</EM4> +100 Rep
Kaboos_Intro_Title=Contrebandiers de technologie Vanduul <EM4>[100 Rep]</EM4>
Kaboos_Mission_Description=DÉTAILS DE LA MISSION\n\nZone d'Opération : Système Nyx\nForces Hostiles : Hors-la-loi présents et armés\nÉquipement Requis : Vaisseau de Combat, Armement Personnel\nBriefing : InterSec requiert à nouveau vos services.\n\nLes renseignements que vous avez recueillis précédemment ont été précieux pour identifier plusieurs acheteurs majeurs de pièces vanduuls obtenues illégalement. Cependant, depuis, les Shattered Blade ont poursuivi leurs opérations et l’UEE nous demande de <EM4>mettre à jour nos renseignements.</EM4>\n\nNous pensons que des informations supplémentaires peuvent être récupérées dans les entrepôts dans l’ancienne <EM4>station QV Logistics.</EM4>\n\nLes paramètres de l’opération n’ont pas changé depuis votre dernière mission : trouvez les <EM4>données chiffrées</EM4> et utilisez la <EM4>clé de déchiffrement</EM4> pour les décoder et nous transmettre la liste. Les Shattered Blade auront renforcé la zone depuis la dernière fois, attendez-vous donc à de la résistance.\n\nBonne chance. Nous resterons en contact.\n\n\nCordialement,\n\nDeacon Tobin\nResponsable des Opérations\nInterSec Defense Solutions\n\nCette communication contient des informations confidentielles destinées exclusivement au destinataire. Si vous l’avez reçue par erreur, veuillez l’ignorer et en avertir l’expéditeur. Toutes les opérations s’effectuent aux risques et périls du prestataire et doivent respecter la législation de l’UEE et du système, le cas échéant.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Pulse "Blacklist" Pistol\n- Quartz "Black Op" Energy SMG\n- Quartz Energy SMG\n- [S1-A] Pulse Laser Pistol Battery (60 Cap)\n- [S1-A] Quartz Energy SMG Battery (45 cap)\n- [S1-A] Testudo Arms\n- [S1-A] Testudo Arms Clanguard\n- [S1-A] Testudo Core\n- [S1-A] Testudo Core Clanguard\n- [S1-A] Testudo Helmet\n- [S1-A] Testudo Helmet Clanguard\n- [S1-A] Testudo Legs\n- [S1-A] Testudo Legs Clanguard\n- [S2-A] Testudo Backpack\n- [E-S1-A] Attrition-1 Repeater\n- [E-S2-A] Attrition-2 Repeater\n- [E-S3-A] Attrition-3 Repeater\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Boss x1\n<EM4>Unknown:</EM4> 16\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Kaboos_Mission_Title=Récupération de Renseignements Supplémentaires sur les Contrebandiers <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Kill_Civ_Desc_001=Tuer le trafiquant de drogue qui a pris plus que sa part des bénéfices\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostiles x1, Targets x1
LingFamily_HaulCargo_AToB_Intro_desc=Bonjour,  \n \nJe m'appelle Petra Ling et je suis fière de vous proposer une nouvelle opportunité passionnante de partenariat avec Ling Family Hauling. Lorsque mes parents ont créé cette entreprise, leur objectif était d'offrir un service de livraison rapide et fiable dans la région de Crusader. Le succès a été rapide, et notre réputation grandissant, nos activités se sont développées.  \n \nAujourd'hui, sous ma direction, Ling Family Hauling franchit une nouvelle étape importante : le transport de fret. La demande pour ce nouveau service croît plus vite que je ne l'avais prévu, ce qui est une excellente nouvelle pour nous deux.   \n \nSi vous avez toujours rêvé de devenir transporteur, je peux vous aider à réaliser votre rêve. La meilleure façon d'apprendre quelque chose, c'est de le faire, et j'ai une cargaison de <EM4>~mission(Item)</EM4> qui doit être transportée de <EM4>~mission(Location|Address)</EM4> à <EM4>~mission(Destination|Address)</EM4>.  \n\nAucune expérience préalable n'est nécessaire, mais voici quelques points à garder à l'esprit. Tous les enlèvements et livraisons doivent être effectués à l'aide d'un monte-charge ou d'un système de chargement automatique. Vous aurez besoin d'un vaisseau pouvant transporter <EM4>~mission(MissionMaxSCUSize) conteneurs de fret</EM4> et d'un <EM4>rayon tracteur portatif</EM4> pour les déplacer. \n \nUne fois cette livraison effectuée, vous serez promu au statut de ‘prestataire de confiance‘ et davantage de transports vous seront proposés.     \n\n \nCordialement,  \nPetra Ling  \nDirectrice générale des opérations de cargaison \nLing Family Hauling \n\n \n\n \n\n \n\nLing Family Hauling sait que l'univers est dangereux et imprévisible et a mis en place plusieurs protocoles pour vous protéger, vous et les marchandises de nos clients. Afin que vous ne soyez pas pénalisé pour des circonstances indépendantes de votre volonté, le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès. Un délai de livraison sera fixé pour chaque transport. Toute cargaison non livrée à l'expiration de ce délai sera signalée comme volée et traitée comme telle. Tous les enlèvements et livraisons doivent être effectués par chargement automatique ou à l'aide d'un monte-charge.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-B] Guardian\n- [IND-S2-B] Citadel\n- [IND-S3-B] Barbican\n- [STH-S1-A] Spectre\n- [STH-S1-B] Zephyr\n- [STH-S2-A] Spicule\n- [STH-S2-B] Bolt\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Trainee:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
LingFamily_HaulCargo_AToB_Intro_title=Opportunité de Transport de Fret chez Ling Hauling <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
LingFamily_HaulCargo_AToB_desc_Fruit_Timed=Bonjour, \n \nNormalement, c’est Reyes qui planifie nos transports, mais elle est partie pour la journée et je viens de recevoir un comm au sujet d’un trajet simple et direct de <EM4>~mission(Location|Address)</EM4> à <EM4>~mission(Destination|Address)</EM4>. La cargaison est composée de fruits qui perdront toute leur valeur s’ils se gâtent. Nous ne voulons pas fâcher ce client, donc nous apprécierions que vous effectuiez ce transport dans les meilleurs délais. \n\nVoici quelques autres détails à connaître : le plus grand conteneur utilisé est de <EM4>~mission(MissionMaxSCUSize)</EM4>, alors n’oubliez pas votre <EM4>rayon tracteur portable</EM4>. \n\n \nCordialement, \nPetra Ling \nDirectrice générale des opérations de cargaison \nLing Family Hauling\n\n\n\n\n\n\n\nLing Family Hauling sait que l'univers est dangereux et imprévisible et a mis en place plusieurs protocoles pour vous protéger, vous et les marchandises de nos clients. Afin que vous ne soyez pas pénalisé pour des circonstances indépendantes de votre volonté, le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès. Un délai de livraison sera fixé pour chaque transport. Toute cargaison non livrée à l'expiration de ce délai sera signalée comme volée et traitée comme telle. Tous les enlèvements et livraisons doivent être effectués par chargement automatique ou à l'aide d'un monte-charge.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-B] Guardian\n- [IND-S2-B] Citadel\n- [IND-S3-B] Barbican\n- [STH-S1-A] Spectre\n- [STH-S1-B] Zephyr\n- [STH-S2-A] Spicule\n- [STH-S2-B] Bolt\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Rookie:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
LingFamily_HaulCargo_AToB_desc_Party_Timed=Bonjour, \n\nOn dirait que les gens à <EM4>~mission(Destination|Address)</EM4> préparent une fête et ont besoin d’aide pour réunir tout ce qu’il faut dans les temps. Vous devrez faire plusieurs enlèvements pour ce contrat, dont un à Nyx pour récupérer du gin Jynx. Je ne sais pas si vous avez déjà goûté, mais c’est une spécialité de Nyx. Certaines personnes ne supportent pas sa couleur rose fluo, mais moi, je l'adore. Il a un caractère vraiment unique.\n\nVoici les points de collecte : \n\nLIEUX D'ENLÈVEMENT (N'IMPORTE QUEL ORDRE) \n\n~mission(MultiToSingleToken) \n\nPensez à prendre un <EM4>rayon tracteur portable</EM4>, car vous devrez des conteneurs pouvant atteindre <EM4>~mission(MissionMaxSCUSize)</EM4>. \n\n \nBon transport, \nReyes Ling \nCoordinatrice Logistique de Cargaison \nLing Family Hauling\n\n\n\n\n\n\n\nLing Family Hauling sait que l'univers est dangereux et imprévisible et a mis en place plusieurs protocoles pour vous protéger, vous et les marchandises de nos clients. Afin que vous ne soyez pas pénalisé pour des circonstances indépendantes de votre volonté, le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès. Un délai de livraison sera fixé pour chaque transport. Toute cargaison non livrée à l'expiration de ce délai sera signalée comme volée et traitée comme telle. Tous les enlèvements et livraisons doivent être effectués par chargement automatique ou à l'aide d'un monte-charge.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-B] Guardian\n- [IND-S2-B] Citadel\n- [IND-S3-B] Barbican\n- [STH-S1-A] Spectre\n- [STH-S1-B] Zephyr\n- [STH-S2-A] Spicule\n- [STH-S2-B] Bolt\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rookie:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
