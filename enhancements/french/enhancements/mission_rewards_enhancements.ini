Eckhart_ShipAmbush_Intro_desc=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Embuscade de Vaisseau\nCODE D'APPROBATION = ~mission(ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\nNous recherchons des prestataires ayant une expérience du combat et prêts à mettre les mains dans le cambouis, pour ainsi dire. Un de nos clients a été trahi par une <EM4>~mission(AmbushTarget)</EM4> et nous attendions l'occasion de régler ce problème. Après plusieurs semaines de traque, nous avons identifié <EM4>~mission(Location|Address)</EM4> comme l'endroit idéal pour les intercepter. Il s'agit d'un <EM4>nuage d'émission</EM4> où vous pouvez vous cacher et mettre votre vaisseau à l'arrêt en attendant la <EM4>~mission(AmbushTarget)</EM4>.\n\nLes informations suggère qu'ils pourraient voyager avec une escorte. Si c'est le cas, vous devrez également vous occuper d'eux. Comme il s'agit de votre premier contrat, d'autres prestataires seront présents dans la zone pour vous prêter main-forte une fois que vous aurez lancé l'attaque.\n\nLe paiement sera effectué une fois le contrat mené à bien. Le prestataire principal recevra également une prime de <EM4>~mission(ScripAmount) Jeton GDM</EM4>.\n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] Lightstrike I Cannon\n- [E-S2-A] Lightstrike II Cannon\n- [E-S3-A] Lightstrike III Cannon\n- [STH-S1-C] SonicLite\n- [STH-S2-C] Cirrus\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Allies x1, Hostile Wave x6, Targets x2\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
