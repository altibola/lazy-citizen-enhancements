Eckhart_ShipAmbush_S_desc=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Embuscade de Vaisseau\nCODE D'APPROBATION = ~mission(ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\nRécemment, nous avons envoyé un sous-traitant à la poursuite d'un <EM4>~mission(AmbushTarget)</EM4>, qui dirigeait une équipe ciblant les opérations d'un client extrêmement important. Malheureusement, il s'agissait d'un piège et nous avons perdu plusieurs de nos meilleurs éléments. Nous ne pouvons pas laisser la cible nous échapper à nouveau, nous avons donc décidé que la meilleure solution était de lui rendre la monnaie de sa pièce.  \n\nTendre une embuscade à cette cible semble être la solution la plus sûre, et nous avons identifié un bon endroit pour mener une telle attaque. Il y a un <EM4>nuage d'émission</EM4> près de <EM4>~mission(Location|Address)</EM4> que la cible et son équipe survolent fréquemment. Vous pouvez couper les moteurs de votre vaisseau et vous y cacher jusqu'à ce que vous soyez prêt à frapper. Cette équipe est impitoyable et extrêmement compétente. Ne commettez pas la même erreur que le précédent prestataire et n'agissez pas seul. Il serait préférable que vous emmeniez quelques amis de confiance pour vous aider à vous occuper de cet équipage.    \n\nLe paiement sera effectué une fois le contrat mené à bien. De plus, nous offrirons une prime de <EM4>~mission(ScripAmount) Jeton GDM</EM4> au prestataire principal qui s'occupera de cette affaire.\n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] Lightstrike I Cannon\n- [E-S2-A] Lightstrike II Cannon\n- [E-S3-A] Lightstrike III Cannon\n- [STH-S1-C] SonicLite\n- [STH-S2-C] Cirrus\n- [E-S1-A] FL-11 Cannon\n- [E-S2-A] FL-22 Cannon\n- [E-S3-A] FL-33 Cannon\n- [STH-S1-B] DeltaMax\n- [STH-S2-B] GammaMax\n- [E-S4-A] Lightstrike IV Cannon\n- [E-S5-A] Lightstrike V Cannon\n- [E-S6-A] Lightstrike VI Cannon\n- [STH-S1-A] Slipstream\n- [STH-S2-A] Eclipse\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Allies x1, Hostile Wave x10, Targets x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Eckhart_ShipAmbush_S_title=Embuscade Périlleuse <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
Eckhart_ShipAmbush_VE_desc=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Embuscade de Vaisseau\nCODE D'APPROBATION = ~mission(ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\nL'un de nos clients se fait constamment harceler, il est donc temps d'envoyer un message clair intimant le responsable de cesser ses agissements en éliminant son précieux <EM4>~mission(AmbushTarget)</EM4>.  Le voyou en question suit une routine assez prévisible, ce qui le rend vulnérable à une embuscade. Nous avons identifié <EM4>~mission(Location|Address)</EM4> comme l'endroit idéal. Il comporte un <EM4>nuage d'émission</EM4> où vous pouvez vous cacher et mettre votre vaisseau à l'arrêt pendant que vous attendez. \n\nÀ propos, le <EM4>~mission(AmbushTarget)</EM4> vole souvent seul, mais il est parfois accompagné d'un ami dans un vaisseau monoplace. Aucun des deux ne devrait vous poser trop de problèmes, mais nous avons d'autres prestataires dans la région qui peuvent vous prêter main-forte une fois que vous aurez frappé. \n\nLe paiement sera effectué une fois le contrat mené à bien. Un bonus de <EM4>~mission(ScripAmount) Jeton GDM</EM4> est également prévu pour le prestataire principal.\n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] Lightstrike I Cannon\n- [E-S2-A] Lightstrike II Cannon\n- [E-S3-A] Lightstrike III Cannon\n- [STH-S1-C] SonicLite\n- [STH-S2-C] Cirrus\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Allies x1, Hostile Wave x6, Targets x2\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Eckhart_ShipAmbush_VE_title=Règlement de Compte <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Eckhart_ShipAmbush_VH_desc=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Défense de Site\nCODE D'APPROBATION = ~mission(ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\nUn client prestigieux a récemment perdu une importante cargaison lorsqu'un pilote l'a trahi et s'est enfui avec ses marchandises. Après plusieurs semaines de recherche, nous avons découvert qu'il était lié à un groupe de hors-la-loi. Le client fait donc appel à nous pour éviter que de tels incidents ne se reproduisent à l'avenir. La cible ultime est le pilote d'une <EM4>~mission(AmbushTarget)</EM4>, qui dirige l'équipage responsable. Cela ne sera pas facile. Ils ne se déplacent jamais sans escorte de chasseurs et de vaisseaux sous-capitaux. C'est pourquoi nous vous recommandons vivement de trouver un ou deux amis de confiance qui pourront vous aider dans cette tâche.  \n  \nLes informations recueillies par nos analystes indiquent qu'ils survolent fréquemment un <EM4>nuage d'émission</EM4> près de <EM4>~mission(Location|Address)</EM4>, ce qui constituerait un excellent endroit pour lancer une attaque surprise. n\nLe paiement sera effectué une fois le contrat mené à bien. Nous ajoutons également un bonus de <EM4>~mission(ScripAmount) Jeton GDM</EM4> qui sera versé au prestataire principal.\n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] Lightstrike I Cannon\n- [E-S2-A] Lightstrike II Cannon\n- [E-S3-A] Lightstrike III Cannon\n- [STH-S1-C] SonicLite\n- [STH-S2-C] Cirrus\n- [E-S1-A] FL-11 Cannon\n- [E-S2-A] FL-22 Cannon\n- [E-S3-A] FL-33 Cannon\n- [STH-S1-B] DeltaMax\n- [STH-S2-B] GammaMax\n- [E-S4-A] Lightstrike IV Cannon\n- [E-S5-A] Lightstrike V Cannon\n- [E-S6-A] Lightstrike VI Cannon\n- [STH-S1-A] Slipstream\n- [STH-S2-A] Eclipse\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 5/7 | Risk 7/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Allies x1, Hostile Wave x12, Targets x4\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
