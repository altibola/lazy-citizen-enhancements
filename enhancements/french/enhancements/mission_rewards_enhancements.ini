EckhartSecurity_EliminateAll_storm_data_H_desc_001=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Nettoyage de Site\nCODE D'APPROBATION = ~mission(ApprovalCode)\n\nPOUR PRISE EN CHARGE IMMÉDIATE\n\nUne demande urgente a été reçue de la part d'Associated Science & Development afin d'apporter un soutien au combat au ~mission(Location). Apparemment, ils ont été attaqués par des hors-la-loi et leurs forces de sécurité ne parviennent pas à maîtriser la situation. \n\nVous avez reçu l'autorisation de vous rendre sur place et d'aider les forces de sécurité locales à neutraliser les hors-la-loi, mais ASD se réserve le droit de vous interdire l'accès à certaines zones.\n\nIl s'agit d'une opération pour mercenaire confirmé, alors préparez-vous en conséquence.\n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x4, Soldiers x9, Technicians x4\n<EM4>Applicant:</EM4> +2,000 Rep
EckhartSecurity_EliminateAll_storm_data_H_title_001=Soutien au Combat : ~mission(Location) <EM4>[2,000 Rep]</EM4>
EckhartSecurity_EliminateAll_storm_shut_H_desc_001=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Nettoyage de Site\nCODE D'APPROBATION = ~mission(ApprovalCode)\n\nPOUR PRISE EN CHARGE IMMÉDIATE\n\nNous avons reçu une demande urgente de la part d'Associated Science & Development demandant à tous les prestataires disponibles de se rendre au ~mission(Location) afin de neutraliser des éléments hostiles qui ont pris le contrôle d'une de leurs installations. \n\nUne fois sur place, vous devrez engager le combat et éliminer tous les éléments hostiles. ASD a indiqué que cette installation assure des services de navette vers l'un de leurs centres de recherche intégrés, mais a clairement précisé que vous n'êtes pas autorisé à vous y rendre. Les intrus seront abattus et vous ne ferez pas exception, alors restez dans la zone d'opération prescrite.\n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x4, Soldiers x9, Technicians x4\n<EM4>Applicant:</EM4> +2,000 Rep
EckhartSecurity_EliminateAll_storm_shut_H_title_001=Demande d'Assistance <EM4>[2,000 Rep]</EM4>
EckhartSecurity_EliminateBoss_DC_Desc_001=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Chasse à la Prime\nCODE D'APPROBATION = ~mission(ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\nNous avons reçu des informations concrètes sur une prime dangereuse, extrêmement insaisissable. <EM4>~mission(TargetName)</EM4> a été repéré avec un contingent dévoué d'associés à <EM4>~mission(Location|Address)</EM4>. Nous recherchons un prestataire prêt et disposé à honorer cette prime avant qu'il ne disparaisse à nouveau.\n\nAu vu des précédentes tentatives d'arrestation de ce criminel, il y a de fortes chances pour que <EM4>~mission(TargetName|Last)</EM4> tente d'éviter une confrontation directe, et envoie plutôt ses alliés vous affronter. Nous pensons que la neutralisation de ces forces de protection, et la destruction du filet de sécurité qu'elles fournissent, est le meilleur moyen de contraindre <EM4>~mission(TargetName|Last)</EM4> à vous affronter directement. Le paiement sera effectué à l'achèvement du contrat.\n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [B-S2-A] Tigerstrike T-19P\n- [B-S4-A] C-788 Cannon\n- [B-S4-A] Revenant Gatling\n- [B-S6-A] Draugar Gatling\n- [MIL-S1-B] Fierell Cascade\n- [MIL-S2-B] UltraFlux\n- [MIL-S3-B] MegaFlux\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x32, Juggernauts x1, Snipers x2, Soldiers x13, Technicians x3\n<EM4>Security Trainee:</EM4> +500 Rep\n<EM4>Jr. Security Contractor:</EM4> +500 Rep\n<EM4>Blueprint Reward:</EM4> 100% chance (EliminateBoss only)\n\n<EM4>? = only the EliminateBoss variant awards blueprints</EM4>
EckhartSecurity_EliminateBoss_DC_Title_001=Prime à Haut Risque : ~mission(TargetName) <EM4>[BP?]</EM4> <EM4>[500 Rep]</EM4>
EckhartSecurity_Mercenary_Rehire_Desc_001=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Essai - Défense de Site\nCODE D'APPROBATION = ~mission(ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\nEckhart Security continue d'évaluer de nouveaux prestataires potentiels. D'après nos dossiers, vous avez déjà participé à un contrat d'essai. Nous comprenons à quel point ce travail peut être exigeant et imprévisible, et nous souhaitons vous donner une nouvelle chance de remplir un contrat de qualification. \n\nSi vous êtes intéressé, présentez-vous à <EM4>~mission(Location|Address)</EM4> pour le défendre contre un assaut imminent de hors-la-loi. Si vous réussissez ce contrat, vous recevrez un paiement et d'autres opportunités de la part d'Eckhart Security.\n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Boss x1, Hostiles x10, Private Security x4, Sentries x6\n<EM4>Unknown:</EM4> 11\n<EM4>Applicant:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -1,000 Rep
EckhartSecurity_Mercenary_Rehire_Title_001=RÉÉvaluation Prestataire en SécuritÉ <EM4>[500 Rep]</EM4>
EckhartSecurity_RecoverCargo_Easy_Description=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Récupération de cargaison\nCode d'approbation : = ~mission(ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\nLa cargaison d'un client était en cours d'acheminement lorsqu'un incident est survenu à bord du vaisseau, et un groupe de hors-la-loi opportunistes cherche désormais à tirer profit de la situation.\n\nSi vous acceptez, dirigez-vous vers <EM4>~mission(Location|Address)</EM4> et occupez-vous des hors-la-loi qui gardent la cargaison. Récupérez-la à l'aide d'un <EM4>rayon tracteur puissant</EM4>, chargez-la dans un vaisseau capable de transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>, puis déposez-la dans le monte-charge de <EM4>~mission(Destination|Address)</EM4>.\n\nCe contrat est non négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Unknown:</EM4> 1\n<EM4>Jr. Contractor:</EM4> +100 Rep
EckhartSecurity_RecoverCargo_Easy_Title=La Cargaison d'un Client Doit Être Récupérée <EM4>[100 Rep]</EM4>
EckhartSecurity_RecoverCargo_Hard_Description=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Récupération de cargaison\nCode d'approbation : = ~mission(ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\nUn transport a besoin de renforts à <EM4>~mission(Location|Address)</EM4>. Le signal était intermittent, mais d'après leurs communications, une bande de hors-la-loi aurait eu vent de ce qu'il transportait et aurait tenté de le leur dérober.\n\nCompte tenu de la situation avant la perte de contact, je considère qu'il s'agit d'une mission de récupération. On s'attend à la présence de nombreux ennemis sur place, il est donc crucial de disposer d'un équipage expérimenté pour la réussite de cette opération. Le volume de cargaison à transporter sera important, il faudra donc un vaisseau pouvant accueillir des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4> et un <EM4>rayon tracteur puissant</EM4>. \n\nUne fois la cargaison récupérée, livrez-la au monte-charge de <EM4>~mission(Destination|Address)</EM4>.\n\nCe contrat est non négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Unknown:</EM4> 1\n<EM4>Sr. Contractor:</EM4> +200 Rep
EckhartSecurity_RecoverCargo_Hard_Title=Récupération de Cargaison à Haut Risque <EM4>[200 Rep]</EM4>
EckhartSecurity_RecoverCargo_Medium_Description=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Récupération de cargaison\nCode d'approbation : = ~mission(ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\nNous recherchons un prestataire compétent pour résoudre une situation délicate. Le pilote de confiance d'un client s'est apparemment révélé peu fiable et s'est enfui avec une cargaison. Heureusement, nos traceurs signalent que cette cargaison est actuellement immobile, en attente d'être récupérée. Si nous agissons correctement, il est encore temps de régler cette affaire.\n\nLe vaisseau abandonné se trouve à <EM4>~mission(Location|Address)</EM4> et nécessitera un <EM4>puissant rayon tracteur</EM4> pour transporter les marchandises. Un vaisseau capable de transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4> est indispensable, et attendez-vous à devoir faire face aux hors-la-loi auxquels ce pilote traître espérait vendre sa cargaison.\n\nUne fois la cargaison récupérée, livrez-la au monte-charge de <EM4>~mission(Destination|Address)</EM4>.\n\nCe contrat est non négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Unknown:</EM4> 1\n<EM4>Contractor:</EM4> +150 Rep
EckhartSecurity_RecoverCargo_Medium_Title=Opé. Standard de Récupération de Cargaison <EM4>[150 Rep]</EM4>
EckhartSecurity_RecoverCargo_Super_Description=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Récupération de cargaison\nCode d'approbation : = ~mission(ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\nAppel d'urgence à tout prestataire hautement qualifié pour récupérer la cargaison d'un client située à <EM4>~mission(Location|Address)</EM4>.\n\nCe client a engagé un transporteur expert pour acheminer une cargaison en toute discrétion, mais certaines informations concernant l'envoi semblent avoir fait l'objet d'un piratage ou d'une fuite. Le pilote a été attaqué et la cargaison est désormais bloquée. Nous avons besoin de vous et de tout vaisseau de soutien que vous pourriez amener pour atteindre le site avant que la cargaison ne soit définitivement perdue. \n\nVous aurez besoin d'un <EM4>rayon tracteur puissant</EM4> et d'un vaisseau capable de stocker des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>.\n\nAprès avoir évalué la situation et l'importance que le client accorde à sa récupération, nous avons décidé d'offrir une rémunération élevée pour amener cette cargaison à bon port au monte-charge de <EM4>~mission(Destination|Address)</EM4>.\n\nCe contrat est non négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Unknown:</EM4> 1\n<EM4>Head Contractor:</EM4> +300 Rep
EckhartSecurity_RecoverCargo_Super_Title=Récupération de Cargaison à Très Haut Risque <EM4>[300 Rep]</EM4>
EckhartSecurity_RecoverCargo_VeryEasy_Description=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Récupération de cargaison\nCode d'approbation : = ~mission(ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\nL'un de mes clients était en train de transporter une cargaison lorsqu'il a essuyé des tirs d'un groupe de hors-la-loi. Nous n'avons pas réussi à contacter l'équipage à bord, mais les traceurs indiquent que la cargaison est intacte.\n\nNous avons besoin d'un prestataire pour se rendre à <EM4>~mission(Location|Address)</EM4>, récupérer la cargaison et la livrer au monte-charge de <EM4>~mission(Destination|Address)</EM4>. Un vaisseau capable de stocker des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4> et un <EM4>puissant rayon tracteur</EM4> sont indispensables pour cette mission. Nous ne détectons actuellement aucun ennemi, mais la situation pourrait avoir changé d'ici votre arrivée.\n\nCe contrat est non négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2\n<EM4>Unknown:</EM4> 1\n<EM4>Neutral:</EM4> +50 Rep
EckhartSecurity_RecoverCargo_VeryEasy_Title=Récupération de Cargaison à Faible Risque <EM4>[50 Rep]</EM4>
EckhartSecurity_RecoverCargo_VeryHard_Description=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Récupération de cargaison\nCode d'approbation : = ~mission(ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\nNous recherchons un prestataire qualifié pour récupérer une cargaison à <EM4>~mission(Location|Address)</EM4>. Le transporteur du client acheminait une cargaison de grande valeur quand il a décidé de répondre à un signal de détresse et s'est fait prendre en embuscade par des hors-la-loi. Le client pense que son pilote a disparu, mais que sa cargaison pourrait encore être récupérée.\n\nD'après les informations dont nous disposons à ce jour, vous aurez besoin d'un vaisseau capable de transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>, d'un <EM4>rayon tracteur puissant</EM4> pour déplacer les marchandises, ainsi que de vos vaisseaux de soutien pour venir à bout des hors-la-loi sur place.\n\nLe client attend que la livraison soit effectuée au monte-charge de <EM4>~mission(Destination|Address)</EM4>.\n\nCe contrat est non négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Unknown:</EM4> 1\n<EM4>Veteran Contractor:</EM4> +200 Rep
EckhartSecurity_RecoverCargo_VeryHard_Title=Récupération de Cargaison Critique <EM4>[200 Rep]</EM4>
Eckhart_Assassin_Sync_E_Desc_001=Une prime a été mise sur la tête de ~mission(TargetName) et  ~mission(TargetName2).\n\nBien que le fait de devoir atteindre deux cibles ne soit pas si étrange, le client souhaite envoyer un message très spécifique. Ainsi, les deux cibles doivent être touchées exactement au même moment. Les crédits supplémentaires devraient compenser les tracas.\n\nMalheureusement, étant donné que le duo ne voyage pas ensemble, il va sans dire que pour réussir, vous aurez besoin d'aide. Assurez-vous d'amener des personnes en qui vous avez confiance et qui peuvent gérer plus d'un vaisseau, car on sait que les cibles voyagent avec des renforts."\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x2
Eckhart_Assassin_Sync_E_Title_001=Incision Double <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_H_Desc_001=Le contrat concerne deux cibles qui doivent être éliminées en même temps. \n\nJe suppose que le client craint que s'ils ne sont pas éliminés ensemble, l'un d'eux risque de disparaitre et de tenter de se venger.\n\nIls s'appellent ~mission(TargetName) et ~mission(TargetName2).\n \nTrouvez vous une équipe, divisez vous et détruisez les .\n\nEt qui que vous trouviez assurez-vous qu'ils soit doués car ces deux-là ont la réputation de se défendre dans un combat et ils ne seront certainement pas seuls. Soyez prêt à ce qu'ils vous causent des ennuis.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x2
Eckhart_Assassin_Sync_H_Title_001=Deux Dans La Tête <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_Intro_Desc_001=Une mission intéressante m’a été confiée. J'ai besoin d'éliminer deux cibles distinctes : ~mission(TargetName) et ~mission(TargetName2) \n\nLe problème est que si l'une ou l'autre apprend que l'autre est touchée, elle risque de disparaitre. Je ne peux pas risquer de perdre l’une ou l’autre. \n\nCela demandera une coordination considérable, mais je veux que vous les frappiez toutes les deux en même temps.\n\nEt comme vous ne pouvez pas être à deux endroits à la fois, vous devrez trouver quelqu'un en qui vous pouvez avoir confiance pour vous aidez.\n\nHeureusement, mes informations disent que les deux cibles devraient voyager seules. Cela devrait vous facilitez un peu la tâche.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x1, Targets x2
Eckhart_Assassin_Sync_Intro_Title_001=Mise au Tapis Coordonné <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_M_Desc_001=J'ai un contrat pour éliminer deux nouveaux venus qui ont causé des problèmes. Ça doit être propre, les deux en même temps, sinon ils pourraient causer encore plus de problèmes. En résumé, vous aurez besoin d'aide pour celui-ci.\n\n ~mission(TargetName) et ~mission(TargetName2) savent se défendre, et les personnes avec qui ils volent ne plaisantent pas non plus. Attendez-vous à ce que chacun d'eux soit protégé par plusieurs vaisseaux.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x2
Eckhart_Assassin_Sync_M_Title_001=Double élimination <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_S_Desc_001=Normalement, le duo ~mission(TargetName) et ~mission(TargetName2) serait trop difficile à affronter ensemble. Ils sont tous les deux parmi les meilleurs en matière de combat aérien, et l'équipage avec lequel ils volent est presque aussi compétent.\n\nMais récemment, ils se sont séparés - je ne suis pas sûr pourquoi - et volent séparément pour le moment. Quelqu'un pense que c'est peut-être la meilleure chance de les éliminer.\n\nRassemblez du personnel en qui vous avez confiance et planifiez une attaque simultanée contre les deux cibles. C'est trop dangereux de risquer que l'un d'eux survive après une telle attaque directe.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x2
Eckhart_Assassin_Sync_S_Title_001=Diviser et Conquérir <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_VE_Desc_001=Nous avons un nouveau duo à éliminer :\n~mission(TargetName) et ~mission(TargetName2)\n\nIls ont été introuvables pendant quelques jours, mais ils viennent de réapparaître. Si nous ne les attrapons pas maintenant, je ne suis pas sûr que nous aurons une autre chance. Vous devez recruter un partenaire pour vous assurer que les deux cibles soient touchées en même temps.\n\nEn ce qui concerne la résistance,~mission(TargetName) est connu pour surveiller ses arrières, et je soupçonne que ~mission(TargetName2) fera de même.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x2, Targets x2
Eckhart_Assassin_Sync_VE_Title_001=Un-Deux Combiné <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_VH_Desc_001=~mission(TargetName) et ~mission(TargetName2).\n\nDeux opérateurs sérieux qui ont récemment décidé de s'en prendre à leur patron. Chacun du duo voyage avec une petite armada hautement entraînée et s'enfonce profondément dans un territoire qui ne leur appartient pas.\n\nVous, et quiconque vous recrutez pour vous aider, allez les éliminer, et cela doit se faire en même temps pour qu'ils ne puissent pas se regrouper.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x2
Eckhart_Assassin_Sync_VH_Title_001=Association Mortelle <EM4>[500 Rep]</EM4>
Eckhart_EscortShips_E_desc=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Escorte de Vaisseau\nCode d'approbation : = ~mission(ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\nUn groupe de vaiseaux situé à <EM4>~mission(Location|Address)</EM4> demande une escorte. Si vous acceptez, rendez-vous immédiatement sur place et attendez les instructions. Le client affirme que cette escorte est purement préventive, mais cela ne signifie pas que vous devez baisser votre garde. Attendez-vous à rencontrer des forces hostiles et traitez-les de manière appropriée.\n\nCe contrat est non négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] M3A Cannon\n- [E-S2-A] M4A Cannon\n- [E-S3-A] M5A Cannon\n- [STH-S1-C] Shimmer\n- [STH-S2-C] Obscura\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4, Hostiles x2, Reinforcements x8\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
