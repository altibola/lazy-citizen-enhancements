TheCollector_Ships_ARGO_Raft_Desc=RAFT être très utile. Wikelo le reprendre et le rendre très très utile. Travaillez et soyez heureux. Vous voulez ? Apportez objets à Wikelo pour les échanger.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_ARGO_Raft_Title=Prêt pour RAFT? <EM4>[30 Rep]</EM4>
TheCollector_Ships_Anvil_Asgard_Desc=Wikelo modifier Asgard pour se battre davantage. Si vous être en combat, ce mod est fait pour vous. En plus, bonne affaire. Apportez simplement objets ici et moi vous donner vaisseau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +250
TheCollector_Ships_Anvil_Asgard_Title=Asgard Modifié Combat <EM4>[250 Rep]</EM4>
TheCollector_Ships_Constellation_Taurus_Desc=Wikelo être tombé sur plans pour contruire Constellation Taurus. Beau vaisseau, mais Wikelo pouvoir faire un peu mieux. Plus joli aussi. Si vous vouloir, apportez choses.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +250
TheCollector_Ships_Constellation_Taurus_TItle=Vouloir vaisseau Taurus <EM4>[250 Rep]</EM4>
TheCollector_Ships_Crusader_A2_Desc=Apporter objets à Wikelo et moi fabriquer A2 Starlifter qui se bat mieux. Être si bon à la guerre et vous l'appeler A1 ! Au revoir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +500
TheCollector_Ships_Crusader_A2_Title=Starlifter A2 Modifié pour Guerre <EM4>[500 Rep]</EM4>
TheCollector_Ships_Drake_Golem_Dec=Univers besoin ressources, alors Wikelo toujours respecter gens creuser. Bon métier. Si vous commencer et vouloir coup de pouce pour vaisseau Golem. Moi pouvoir faire. \n\nVous ramener. \n\nMoi faire.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_Drake_Golem_Title=Golem Caillasse <EM4>[30 Rep]</EM4>
TheCollector_Ships_F7_MK2_Desc=Moi savoir à quel point humains aimer Navy, alors Wikelo en avoir un maintenant. Si vous vouloir version Wikelo de F7 mk2, apporter moi choses et ça être à vous. Très amusant. Au revoir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_F7_MK2_TItle=F7 de Navy Wikelo <EM4>[100 Rep]</EM4>
TheCollector_Ships_F8C_Mil_Desc=Pouvoir créer F8 personnalisé, bon vaisseau de combat et en faire meilleur vaisseau de combat. Vous apporter choses et moi faire. Au revoir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +250
TheCollector_Ships_F8C_Milt_TItle=F8 Modifié pour Guerre <EM4>[250 Rep]</EM4>
TheCollector_Ships_F8C_Stealth_Desc=Avoir éléments pour construire vaisseau utile pour gens aimer furtivité et combat. Prendre F8C et rendre vaisseau encore meilleur. Avoir listé choses Wikelo avoir besoin pour fabriquer pour vous. À vous décider. Au revoir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +250
TheCollector_Ships_F8C_Stealth_TItle=Aggresseur Furtif <EM4>[250 Rep]</EM4>
TheCollector_Ships_Firebird_Desc=Moi être penché sur vaisseau Aegis Sabre. Firebird très explosif. Bien conçu mais pouvoir faire changements amusants dessus. Si vous vouloir, moi pouvoir faire. Vous jeter œil et dire moi. Au revoir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_Firebird_TItle=Firebird Modifié <EM4>[100 Rep]</EM4>
TheCollector_Ships_Fortune_Indus_Desc=Bonjour, en train de m'entraîner faire mieux voler vaisseaux. Xi'an aider humains fabriquer vaisseaux. Vole bien. Recycle bien. Mais Wikelo pouvoir améliorer si vous souhaiter. Apporter choses et moi faire. Au revoir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_Fortune_Indus_TItle=Vaisseau Fortune pour vous <EM4>[30 Rep]</EM4>
TheCollector_Ships_GuardianMX_Desc=Vous Humains aimer combinaisons lettres bizarres. Très drôle. Vaisseau Guardian très utile, mais si vous vouloir encore plus utile, vous apporter moi choses. Moi vous donner meilleur vaisseau. Vous avoir meilleure allure. Vous agir mieux.\n\nMerci. Au revoir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_GuardianMX_Title=Guardian WiK-X <EM4>[100 Rep]</EM4>
TheCollector_Ships_GuardianQI_Desc=Vaisseau insecte encore. Celui-ci aider éliminer autres vaisseaux, mais si vouloir plus efficace, moi pouvoir faire. Vous regarder liste et dire à Wikelo. Au revoir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_GuardianQI_TItle=Guardian détruire vaisseaux <EM4>[100 Rep]</EM4>
TheCollector_Ships_Guardian_Desc=Vaisseau ressembler insecte dans Protectorat. Look sympa. Piqûre douloureuse. Wikelo pouvoir créer version custom pour vous si vous vouloir. Piquer ennemi. Au revoir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_Guardian_TItle=Guardian Modifié pour Combat <EM4>[100 Rep]</EM4>
TheCollector_Ships_Idris_Desc=Comme Wikelo faire bonnes affaires avec vous, moi vous proposer transaction très spéciale. Idris être vaisseau puissant, parfait pour personne importante comme vous. Wikelo avoir même modifié pour le rendre encore plus dangereux ! Apportez-moi objets et vaisseau être à vous.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Ships_Idris_Title=Idris Spécial Pour Tuer
TheCollector_Ships_Intrepid_Desc=Si vous rechercher vaisseau Intrepid encore plus intrépide, Wikelo pouvoir aider. Apporter choses et Wikelo donnera touches spéciales et nouvelle couche peinture à vaisseau. Au revoir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_Intrepid_TItle=Améliorer Intrepid <EM4>[30 Rep]</EM4>
TheCollector_Ships_Kruger_Wolf_Desc=Si vous vouloir rester discret et surprendre gens, ça être le Wolf qu'il vous faut. Wikelo avoir modifié pour rendre encore plus furtif. Moi vous l'échanger contre objets que je veux.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_Kruger_Wolf_Title=Où est Wolf ? Ici Wolf <EM4>[30 Rep]</EM4>
TheCollector_Ships_MISC_Prospector_Desc=Wikelo adorer pierres. Vouloir aider à trouver meilleures pierres. Avoir amélioré ce Prospector pour être plus performant dans ce travail difficile. Échangez objets et vous pouvoir l'obtenir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_MISC_Prospector_Title=Bonnes Prospectives <EM4>[30 Rep]</EM4>
TheCollector_Ships_Meteor_Desc=Meteor grand. Lourd. Beaucoup armes. Mais Wikelo avoir trouvé moyen de le rendre encore meilleur. Vous avoir choses moi prendre pour faire.\n\nC'est tout.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_Meteor_Title=RSI Meteor Modifié <EM4>[30 Rep]</EM4>
TheCollector_Ships_Nox_Desc=Wikelo connaître beaucoup Xi'ans. Eux parler lentement mais très intéressant si vous patient. Ça être petite chose très rapide pour traverser planète. Wikelo avoir fait modifications pour rendre plus rapide. Si vous vouloir, Wikelo fabriquer pour vous. Au revoir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Ships_Nox_TItle=Noxy Modifié <EM4>[20 Rep]</EM4>
TheCollector_Ships_Peregrine_Desc=Wikelo pas vouloir faire course, mais pouvoir rendre vaisseau rapide encore plus rapide. Si vous vouloir, apportez-moi choses, et aller plus vite.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_Peregrine_TItle=Peregrine Modifié Wikelo <EM4>[30 Rep]</EM4>
TheCollector_Ships_Prowler_Util_Desc=Wikelo travailler dur. Vous travailler dur. Prowler Utility travailler dur. Mais si vous apporter bons objets, moi le faire travaille encore plus dur, et vous travailler moins dur. Au revoir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +250
TheCollector_Ships_Prowler_Util_Title=Prowler Plus Utility <EM4>[250 Rep]</EM4>
TheCollector_Ships_Pulse_Desc=Wikelo aimer beaucoup ce petit vaisseau humain. Pulse très rapide. Pouvoir être configuré nombreuses façons pour aller encore plus vite. Si vous vouloir, moi pouvoir vous donner configuration Pulse moi aimer. Voici liste choses moi vouloir pour travail. Au revoir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Ships_Pulse_TItle=Pulse Plus <EM4>[20 Rep]</EM4>
TheCollector_Ships_Scorpius_Desc=Pas savoir ce nom signifier, mais vaisseau être très rapide, très bon combat. Avec ajustements, encore meilleur. Vous voir liste choses Wikelo avoir besoin, aller les chercher et moi faire. Au revoir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_Scorpius_TItle=Fabriquer Scorpius Modifié <EM4>[100 Rep]</EM4>
TheCollector_Ships_Spirit_C1_Desc=Wikelo aimer vaisseau cargo utile. Spirit très utile. Si vous vouloir un, pouvoir fabriquer pour vous. Juste apporter moi choses et moi faire. Au revoir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_Spirit_C1_TItle=Cargo Spirit Modifié <EM4>[30 Rep]</EM4>
TheCollector_Ships_Starfighter_Inferno_Desc=Starfighter Inferno bon vaisseau, mais vous le vouloir meilleur au combat ? Wikelo savoir exactement quoi faire. Vous apporter moi objets nécessaires et moi le modifier pour vous. Au revoir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_Starfighter_Inferno_Title=Starfighter Inferno Spécial <EM4>[100 Rep]</EM4>
TheCollector_Ships_Starfighter_Ion_Desc=Starfighter Ion bon vaisseau, mais pourrait être plus discret, n'est-ce pas ? Surprendre ennemis lorsque vous leur tirer dessus. Moi pouvoir vous aider. Moi avoir besoin bons objets, puis pouvoir vous aider. Vous apporter moi. Au revoir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_Starfighter_Ion_Title=Starfighter Ion Furtif <EM4>[100 Rep]</EM4>
TheCollector_Ships_Starlancer_ATC_Desc=Si vous aimer grand espace pour bouger choses, Wikelo pouvoir faire choses utiles et merveilleuses au vaisseau MISC pour vous. Apporter-moi pièces et moi donner version encore meilleure que ce que Xi’an pouvoir faire.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +250
TheCollector_Ships_Starlancer_ATC_Title=Nouveau vaisseau Starlancer Bouger Grand <EM4>[250 Rep]</EM4>
TheCollector_Ships_Starlift_Max_Desc=Si vous vouloir déplacer beaucoup choses, vaisseau Hercule, très bien pour ça. Wikelo même connaître souli utiliser ça dans Protectorat. Très gros. Wikelo pouvoir fournir modèle similaire si vous fournir Wikelo avoir besoin. Consultez liste et dites-moi.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +250
TheCollector_Ships_Starlift_Max_TItle=Plus qu'un Max <EM4>[250 Rep]</EM4>
TheCollector_Ships_Terrapin_Medic_Desc=Wikelo pas connaître ce mot humain mais vaisseau très utile quand choses devenir dangereuses. Si vous vouloir, pouvoir donner nouvelle version. Peut-être plus utile ?\n\nVous piloter et dire. Au revoir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_Terrapin_Medic_Title=Quoi être Terrapin ? <EM4>[100 Rep]</EM4>
TheCollector_Ships_Ursa_Desc=Wikelo se lancer aussi dans construction vaisseaux. Avoir jeté œil à Ursa et amélioré. Vous apporter pièces pour moi et moi faire pour vous. Explore mieux planète. Allez-y.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Ships_Ursa_TItle=Faire Ursa Modifié <EM4>[20 Rep]</EM4>
TheCollector_Ships_Wolf_Unique_Desc=Vous avoir été excellent partenaire commercial pour Wikelo. Moi vous offrir ce Wolf modifié très spécial. Rendre transaction encore mieux : apportez-moi moi vouloir et moi vous donner Wolf spécial ET armure Antium ET un VOLT LMG. Très bonne affaire pour mon très bon client.\n\n<EM3>ITEM REWARDS</EM3>\n- Antium Helmet Midnight Sun\n- Antium Core Midnight Sun\n- Antium Arms Midnight Sun\n- Antium Legs Midnight Sun\n- Fresnel "Deepwater" Energy LMG\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Ships_Wolf_Unique_Title=Wolf Plus Spécial
TheCollector_Ships_ZeusCL_Desc=Wikelo pouvoir faire nouvelle version vaisseau cargo Zeus. Si vous vouloir, apporter choses nécessaires, et vous recevoir vaisseau. Équitable. Au revoir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_ZeusCL_TItle=Zeus Cargo Spécial <EM4>[100 Rep]</EM4>
TheCollector_Ships_ZeusES_Desc=Wikelo pouvoir faire nouvelle version vaisseau Zeus. Savoir être vaisseau importer pour Humains. Pas trop savoir pourquoi, mais oui, vaisseau très utile. Dans tous cas, moi pouvoir améliorer et rendre un peu plus joli. Voici liste choses moi avoir besoin, si vous vouloir, apporter. Au revoir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
