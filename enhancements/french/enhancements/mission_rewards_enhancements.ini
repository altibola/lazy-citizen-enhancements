Shubin_Industrial_ShipMining_Stanton_VE_Local_Desc_001=AFFECTATION : Bon de commande\nLIEU : <EM4>~mission(System) </EM4>\n\nTEST TECH PREVIEW :\nTerminez cette mission pour obtenir les plans d'une armure lourde Antium. Pour ce test, ces plans comportent des emplacements pouvant accueillir différents matériaux afin de modifier les statistiques.\n\n~mission(Hint_Location) Pour une liste complète des endroits où trouver ces minéraux, consultez les <EM4>Fondamentaux de l'exploitation minière n°2 : Où extraire ?</EM4> dans le journal de votre mobiGlas. Profitez-en pour lire également la première partie, les <EM4>Fondamentaux de l'exploitation minière n°1 : Aperçu général</EM4>, si vous souhaitez vous rafraîchir la mémoire sur la façon d'obtenir ces matériaux.\n\nComme il s'agit d'un bon de commande et non d'un contrat d'exploitation minière, vous êtes tenu d'apporter votre propre équipement, tel qu'un <EM4>~mission(Hint_Tool)</EM4>.\n\nVeuillez noter que dans le but de faciliter leur utilisation future, <EM4>ces matériaux doivent être raffinés avant leur livraison</EM4>. Cela peut être fait dans n'importe quelle raffinerie, dont vous trouverez les emplacements sur votre Starmap.\n\nUne fois prêt à nous vendre les matériaux raffinés demandés, déposez-les dans le monte-charge situé à <EM4>~mission(Destination|Address)</EM4>.\n\n*En acceptant ce contrat, vous assumez tous les risques associés aux travaux décrits dans le présent document et Shubin Interstellar ne peut en aucun cas être tenu responsable des dommages survenus pendant la durée du contrat.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Shubin_RG_ShipMining_Rank0]</EM4>\n- Arclight "Nightstalker" Pistol\n- Arclight "Warhawk" Pistol\n- [S1-A] Arclight Pistol Battery (30 cap)\n- [S1-A] Aril Arms\n- [S1-A] Aril Core\n- [S1-A] Aril Helmet\n- [S1-A] Aril Legs\n\n<EM4>[Shubin_RG_ShipMining_Rank0, Rank 0–1]</EM4>\n- [IND-S0-C] Surveyor-Go\n- [IND-S1-C] Surveyor-Lite\n- [IND-S2-C] Surveyor\n- [IND-S3-C] Surveyor-Max\n- [MIN-