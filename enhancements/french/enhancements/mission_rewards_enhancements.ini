Intersec_ShipWaveAttack_DrawOutBoss_VH_Desc_001=DÉTAILS DE LA MISSION\n\nZone d'Opération : ~mission(Location|Address)\nForces Hostiles : Hors-la-loi\nÉquipement Requis : Vaisseau de Combat Lourd\nBriefing : Une flotte de hors-la-loi dirigée par <EM4>~mission(TargetName)</EM4> prépare une attaque de grande envergure contre des infrastructures vitales de l'UEE. InterSec a été chargée de neutraliser cette menace avant que l'attaque ne soit lancée.\n\nRassemblez un nombre suffisant de vaisseaux de soutien et dirigez-vous vers le champ de bataille. Vous devrez y affronter divers escadrons avant que leur chef ne juge la situation suffisamment grave pour diriger lui-même ses forces. Il est essentiel de les neutraliser afin d'empêcher l'attaque.\n\nCordialement, \n\nDeacon Tobin\nResponsable des Opérations\nInterSec Defense Solutions  \n\nCette communication constitue une offre non contraignante qui, une fois acceptée, peut être immédiatement résiliée par l'une ou l'autre des parties sans préavis. Toutes les opérations sont menées aux risques et périls du prestataire et doivent respecter la législation en vigueur.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x24\n<EM4>Veteran Contractor:</EM4> +250 Rep
