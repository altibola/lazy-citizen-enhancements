Shubin_Rockcracker_CollectLenses_Desc_001=CONTRAT : Commande de Fabrication\nLIEU : Nyx\n\nDÉTAILS :\nSi vous vous rendez dans l'une des stations QV Breaker de la ceinture de Keeger par le biais d'une autre mission, Shubin Interstellar serait ravi de vous embaucher pour obtenir un stock de lentilles de mise au point pour lasers miniers, difficiles à trouver.\n\n<EM4>CONDITIONS* :</EM4>\nBien qu'il soit possible de récupérer certaines lentilles de mise au point dans les entrepôts de la station QV Breaker, vous devrez probablement les fabriquer à l'aide de <EM4>cristaux de sadaryx</EM4> et du contructeur de lentilles sur place. Bien que le minerai soit rare, ces stations possèdent généralement des filons de sadaryx qui peuvent être exploités directement à l'aide d'un <EM4>Outil multifonctions avec un Module de Minage</EM4>.\n\nLivrez les lentilles au monte-charge de <EM4>~mission(Destination|Address)</EM4> pour traitement.\n\nDes prestataires ont signalé que ces stations pourraient être infiltrées par des hors-la-loi, soyez prudent.\n\n*En acceptant ce contrat, vous assumez tous les risques associés aux travaux décrits dans le présent document et Shubin Interstellar ne peut en aucun cas être tenu responsable des dommages survenus pendant la durée du contrat.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +100 Rep
Shubin_Rockcracker_CollectLenses_Title_001=Commande d'Approvisionnement : Lentilles de mise au point <EM4>[100 Rep]</EM4>
