eckhart_defendship_multi_HRT_desc_001=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Défense de Vaisseau\nCODE D'APPROBATION = ~mission(ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\nNous avons récemment recommandé à un client d’emprunter une route spécifique pour traverser Nyx en sécurité. Il s’avère qu’elle n’était pas aussi sûre que prévu, puisqu’un groupe a tendu une embuscade à son vaisseau. Nous devons régler ça au plus vite. Êtes-vous disponible pour aider ? \n\nLes informations remontées par le client indiquent une attaque bien organisée, vous feriez donc mieux d’être préparé à affronter des ennemis expérimentés. Dépêchez-vous de vous rendre à <EM4>~mission(Location|Address)</EM4>, aidez-le à survivre à cette situation, et nous vous rémunérerons généreusement pour vos efforts.\n\nLe paiement sera effectué à l'achèvement du contrat.\n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
