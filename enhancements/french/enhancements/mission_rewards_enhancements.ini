HeadHunters_DefendEntitesAndEscort_VH_Desc=Je pensais qu’on avait réussi à faire profil bas, mais on dirait que les liens entre <EM4>~mission(Location|Address)</EM4> et les Headhunters ont fuité. Maintenant, des gros bonnets y sèment le chaos et s’attaquent aux <EM4>~mission(Objects)</EM4>, ce qui me cause un sacré casse-tête.\n\nVu la puissance de feu dont disposent ces intrus, il va falloir que vous emmeniez votre propre équipe pour réussir cette mission. D'autant plus que j'ai besoin que vous protégiez tous les <EM4>vaisseaux amis</EM4> qui auraient besoin d'aide.\n\nCette opération doit se dérouler sans accroc, c'est pourquoi j'offre au prestataire principal <EM4>~mission(ScripAmount) jetons du Conseil</EM4> si le travail est bien fait. \n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Nyx]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [CIV-S0-B] Kelvid\n- [CIV-S0-D] Winter-Star SL\n- [CIV-S1-B] Cryo-Star\n- [CIV-S1-B] Endo\n- [CIV-S1-B] FlashFreeze\n- [CIV-S1-D] BlastChill\n- [CIV-S1-D] Winter-Star\n- [CIV-S2-B] Cryo-Star EX\n- [CIV-S2-B] FullFrost\n- [CIV-S2-B] Taiga\n- [CIV-S2-D] WhiteOut\n- [CIV-S2-D] Winter-Star EX\n- [CIV-S3-B] Cryo-Star XL\n- [CIV-S3-B] FrostBite\n- [CIV-S3-D] ColdSurge\n- [CIV-S3-D] Winter-Star XL\n- [B-S1-A] Tarantula GT-870 Mark 1 Cannon\n- [B-S1-A] YellowJacket GT-210 Gatling\n- [B-S2-A] Scorpion GT-215 Gatling\n- [B-S2-A] Tarantula GT-870 Mark 2 Cannon\n- [B-S3-A] Mantis GT-220 Gatling\n- [B-S3-A] Tarantula GT-870 Mark 3 Cannon\n- [MIL-S3-A] V880\n\n<EM4>[Pyro]</EM4>\n- [CIV-S0-D] DuraJet\n- [CIV-S1-D] ZapJet\n- [CIV-S2-A] Lotus\n- [CIV-S2-D] SparkJet\n- [CIV-S3-A] TigerLilly\n- [CIV-S3-D] SparkJet Pro\n- [IND-S0-B] Defiant\n- [B-S4-A] AD4B Ballistic Gatling\n- [B-S5-A] AD5B Ballistic Gatling\n- [B-S6-A] AD6B Ballistic Gatling\n- [MIL-S1-A] V801-11\n- [MIL-S2-A] V801-12\n\n<EM4>[Stanton]</EM4>\n- [CIV-S0-C] PIN\n- [CIV-S1-B] 6SA 'Arbiter'\n- [CIV-S1-B] HEX\n- [CIV-S1-C] 5SA 'Rhada'\n- [CIV-S1-C] WEB\n- [CIV-S2-B] 6MA 'Kozane'\n- [CIV-S2-B] BLOC\n- [CIV-S2-C] 5MA 'Chimalli'\n- [CIV-S2-C] STOP\n- [CIV-S3-B] 6CA 'Bila'\n- [CIV-S3-C] 5CA 'Akura'\n- [CIV-S3-C] GUARD\n- [B-S1-A] SW16BR1 “Buzzsaw” Repeater\n- [B-S2-A] SW16BR2 “Sawbuck” Repeater\n- [B-S3-A] SW16BR3 “Shredder” Repeater\n- [MIL-S1-B] Tige\n- [MIL-S2-B] Vigilance\n- [MIL-S3-B] Devoue\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x24, Interdiction Ships x4, Reinforcements x16\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Rep:</EM4> +250\n<EM4>Blueprint Reward:</EM4> Guaranteed
HeadHunters_DefendEntitesAndEscort_VH_Title=Défendre ~mission(Location) contre des mercenaires <EM4>[BP]</EM4> <EM4>[250 Rep]</EM4>
HeadHunters_RecoverCargo_Easy_Description=On a intercepté un vaisseau transportant des marchandises près de <EM4>~mission(Location|Address)</EM4>, mais il y a eu un contretemps : nos gars n’avaient pas assez de place à bord pour tout stocker. Vous voulez vous faire quelques crédits rapidement ? Allez là-bas et récupérez la marchandise. Il pourrait déjà y avoir quelques pillards sur place, alors restez sur vos gardes.\n\nN’oubliez pas d’emporter un <EM4>puissant rayon tracteur</EM4>, ce matos pèse son poids.\n\nUne fois terminé, déposez le tout au monte-charge à <EM4>~mission(Destination|Address)</EM4> et on s’occupe du reste.\n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Unknown:</EM4> 1\n<EM4>Jr. Contractor:</EM4> +100 Rep
HeadHunters_RecoverCargo_Easy_Title=Prendre ce qui nous appartient <EM4>[100 Rep]</EM4>
HeadHunters_RecoverCargo_Hard_Description=Recherche transporteur pour récupérer une cargaison. Mais il y a un hic.\n\nLa marchandise se trouve dans la soute d’un vaisseau abandonné à <EM4>~mission(Location|Address)</EM4>. Comme vous pouvez vous en douter, ce n’est pas notre cargaison, mais elle ne mérite certainement pas de finir entre d’autres mains. Pas question que ces enfoirés de CFP mettent la main dessus avant nous.\n\nAvec un peu de chance, on est les premiers à être au courant. Mais je parierais qu’il y aura plus de vaisseaux dans le coin qu’il n’y a de mouches sur une carcasse de kopion. Si vous avez des alliés fiables, emmenez-les et faites disparaître ces connards. Et bien sûr, n’oubliez pas votre <EM4>puissant rayon tracteur</EM4>.\n\nRécupérez la cargaison, livrez-la au monte-charge de <EM4>~mission(Destination|Address)</EM4>, et je vous accorderai une belle part de la vente.\n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Unknown:</EM4> 1\n<EM4>Sr. Contractor:</EM4> +200 Rep
HeadHunters_RecoverCargo_Hard_Title=Jackpot <EM4>[200 Rep]</EM4>
HeadHunters_RecoverCargo_Medium_Description=L’un de nos pilotes devait nous rapporter une cargaison, mais il semble qu’il ait eu des ennuis à <EM4>~mission(Location|Address)</EM4>. Soit il a fini la cervelle éclatée dans la cockpit, soit il s’est dégonflé et a largué son vaisseau. Pour lui, j’espère que c’est la première option, comme ça je n'aurai pas à traquer ce connard. Ce qui compte, c’est que notre cargaison traîne encore là-bas.\n\nSi vous avez un <EM4>puissant rayon tracteur</EM4> et un vaisseau correct, allez la récupérer. Les types qui ont attaqué mon pilote doivent encore rôder dans le coin, et je parie qu'ils sont plutôt coriaces.\n\nSi vous revenez entier, livrez la cargaison au monte-charge de ~mission(Destination|Address) et vous serez payé.\n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Unknown:</EM4> 1\n<EM4>Contractor:</EM4> +150 Rep
HeadHunters_RecoverCargo_Medium_Title=Finir le job <EM4>[150 Rep]</EM4>
HeadHunters_RecoverCargo_Super_Description=Celle-là devrait vous plaire. On vient d’apprendre qu’un vaisseau de transport est en panne à <EM4>~mission(Location|Address)</EM4>. Problème, toute les racailles et même leur mère semblent déjà au courant. L’endroit grouille de hors-la-loi cherchant à mettre la main sur la cargaison. C’est là que vous intervenez.\n\nRassemblez vos meilleurs pilotes, prenez un <EM4>rayon tracteur puissant</EM4>, éliminez la concurrence et emparez-vous de la cargaison. Ce ne sera pas une promenade de santé. Un de mes éclaireurs dit que les connards qui gardent ce vaisseau sont bien équipés.\n\nJ’ai déjà un acheteur qui attend, amenez simplement la cargaison au monte-charge de <EM4>~mission(Destination|Address)</EM4> et je vous enverrai les crédits.\n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Unknown:</EM4> 1\n<EM4>Head Contractor:</EM4> +300 Rep
HeadHunters_RecoverCargo_Super_Title=Ça vaut le coup <EM4>[300 Rep]</EM4>
HeadHunters_RecoverCargo_VeryEasy_Description=J’ai eu vent d’un vaisseau abandonné bourré de cargaison, facile à ramasser. Si ça vous intéresse, mettez le cap sur <EM4>~mission(Location|Address)</EM4>. L’information a peut-être circulé, alors attendez-vous à croiser quelques pillards, éliminez-les et récupérez le pactole.\n\nApportez la cargaison au monte-charge à ~mission(Destination|Address) et vous recevrez vos crédits.\n\nN’oubliez pas d’avoir un <EM4>puissant rayon tracteur</EM4> sur vous, on ne sait jamais la taille du chargement.\n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2\n<EM4>Unknown:</EM4> 1\n<EM4>Neutral:</EM4> +50 Rep
HeadHunters_RecoverCargo_VeryEasy_Title=À emporter <EM4>[50 Rep]</EM4>
HeadHunters_RecoverCargo_VeryHard_Description=Voilà la situation : j’ai un problème à régler du côté de <EM4>~mission(Location|Address)</EM4> et il me faut quelqu’un avec un cerveau pour s’en occuper. Un de mes anciens pilotes pensait pouvoir conclure un marché avec un autre gang et sans surprise, ça s’est mal fini. Maintenant, ma cargaison attend, gardée par une bande d’abrutis qui attendent qu’un de leurs transporteurs viendra la récupérer.\n\nAllez-y avec un <EM4>puissant rayon tracteur</EM4> et une bonne équipe pour récupérer mon bien avant qu’il ne disparaisse pour de bon.\n\nRamenez tout ça au monte-charge de <EM4>~mission(Destination|Address)</EM4> et je vous accorderai une part généreuse des bénéfices.\n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Unknown:</EM4> 1\n<EM4>Veteran Contractor:</EM4> +200 Rep
HeadHunters_RecoverCargo_VeryHard_Title=Obtenir ce que nous méritons <EM4>[200 Rep]</EM4>
HeadHunters_ShipAmbush_E_desc_001=Ça vous intéresse de vous occuper d'un <EM4>~mission(AmbushTarget)</EM4> pour nous ? \n\nÇa ne devrait pas être trop compliqué. Nous avons déjà fait le gros du travail et découvert qu'il devrait passer près de <EM4>~mission(Location|Address)</EM4> prochainement. Il vous suffira de vous cacher dans le nuage d'émissions à proximité pour le surprendre.  \n\nIls pourrait arriver seuls ou avec des amis. Ce sont tous des monoplaces, mais ils savent se défendre. Nous enverrons des renforts dans la zone pour vous aider une fois les hostilités engagées.\n\nSi vous réussissez, je remettrai <EM4>~mission(ScripAmount) Jetons du Conseil</EM4> au prestataire principal pour le travail accompli.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x2, Hostile Wave x7, Targets x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +1,000 Rep
HeadHunters_ShipAmbush_E_title_001=Attaque silencieuse <EM4>[100–1,000 Rep]</EM4>
HeadHunters_ShipAmbush_H_desc_001=Une escouade de vaisseaux a récemment attaqué l'un de nos convois, et je parie dix crédits qu'ils vont recommencer. Nous recherchons quelqu'un pour lancer une attaque de représailles avant que cela ne se reproduise.  \n\nNous avons identifié les idiots : ils disposent de plusieurs gros vaisseaux et d'une escorte importante. Nous pensons que le chef pilote un <EM4>~mission(AmbushTarget)</EM4>, notre cible principale. Comme il s'agit d'une unité importante et agressive, une attaque surprise semble être la meilleure option. Ils passent souvent près de <EM4>~mission(Location|Address)</EM4>, qui dispose d'un nuage d'émissions où l'on peut se cacher. Soyez prudent et patient, puis frappez au moment opportun. \n\nÀ moins que vous ne vous considériez comme un véritable as, il serait préférable d'amener des renforts. Vous pourriez peut-être motiver vos compagnons en leur promettant qu'ils pourront fouiller l'épave à la recherche d'objets de valeur une fois la mission accomplie.\n\nEn plus de ça, j'accorderai au prestataire principal un bonus de <EM4>~mission(ScripAmount) Jetons du Conseil</EM4> pour rendre l'offre plus alléchante.\n\nStows terminé.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x13, Targets x5\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
HeadHunters_ShipAmbush_H_title_001=Attaque de représaille <EM4>[200–2,000 Rep]</EM4>
HeadHunters_ShipAmbush_Intro_desc_001=J’ai une occasion pour quelqu’un désireux de montrer ses talents de pilote. Les Headhunters ont un compte à régler avec un abruti qui pilote un <EM4>~mission(AmbushTarget)</EM4>, et on compte bien y mettre fin une bonne fois pour toutes.\n\nVous allez nous aider à lui tendre un piège. Il y a un <EM4>nuage d’émission</EM4> près de <EM4>~mission(Location|Address)</EM4> où il passe souvent.\n\nRendez-vous là-bas, cachez-vous dans le nuage en coupant les moteurs de votre vaisseau, et attaquez-le dès qu’il apparaît, lui et les autres monoplaces assez stupides pour voler avec lui. Vous serez seul pour le premier coup, mais on positionnera des vaisseaux de soutien à proximité pour finir le travail.\n\nEt puisque c’est votre première embuscade pour nous, une prime de <EM4>~mission(ScripAmount) Jetons du Conseil</EM4> sera versée au prestataire principal à la fin de l’opération.\n\nStows terminé.\n\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x6, Targets x2\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +500 Rep
HeadHunters_ShipAmbush_Intro_title_001=Tendre un piège <EM4>[100–500 Rep]</EM4>
HeadHunters_ShipAmbush_M_desc_001=Un de nos Clips a lancé un contrat sur un <EM4>~mission(AmbushTarget)</EM4>. Envie de lui faire plaisir en l'éliminant ?\n\nVoilà ce que vous devez savoir. La cible et son escorte doivent passer près de <EM4>~mission(Location|Address)</EM4>. Il semble qu'un nuage d'émissions à proximité puisse masquer la signature de votre vaisseau. Attendez là-bas jusqu'à ce que vous soyez prêt à frapper. \n\nLe Clip ne se soucie que de l'élimination de la cible. Tout objet de valeur que vous trouverez dans l'épave sera à vous. \n\nEt en plus de ça, j'accorderai au prestataire principal un bonus de <EM4>~mission(ScripAmount) Jetons du Conseil</EM4> pour rendre l'offre encore plus alléchante. \n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x6, Targets x3\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
HeadHunters_ShipAmbush_M_title_001=OP. Embuscade <EM4>[150–2,000 Rep]</EM4>
HeadHunters_ShipAmbush_S_desc_001=Les Headhunters recherchent quelqu'un ayant les compétences et l'équipage nécessaires pour mener à bien une opération d'élite. Une frégate militaire et des vaisseaux d'escorte harcèlent l'un de nos Clips dans le système. Nous ne connaissons pas leurs intentions, mais elles ne sont certainement pas bonnes. Pendant qu'ils ont les yeux rivés sur leur proie, nous avons besoin de quelqu'un pour rassembler un équipage afin de les attaquer.  \n\nJ'ai déjà repéré un bon spot pour l'embuscade. Allez à <EM4>~mission(Location|Address)</EM4>, vous y trouverez un nuage d'émissions qui correspond exactement à ce dont nous avons besoin. Rendez-vous là-bas avec vos amis, mettez vos vaisseaux en veille et attendez que le <EM4>~mission(AmbushTarget)</EM4> et ses escortes passent. \n\nAvec un bonus de <EM4>~mission(ScripAmount) Jetons du Conseil</EM4> pour le prestataire principal, le paiement devrait suffire à vous motiver, mais vous pourrez également garder tout ce que vous trouverez dans l'épave.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x10, Targets x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Tier 2:</EM4> +16,000 Rep
HeadHunters_ShipAmbush_S_title_001=OP d'élite <EM4>[300–16,000 Rep]</EM4>
HeadHunters_ShipAmbush_VE_desc_001=Un imbécile aux commandes d'un <EM4>~mission(AmbushTarget)</EM4> a été surpris en train d'espionner nos opérations. Nous l'avons chassé avec un avertissement, mais il a récidivé ailleurs. Vu qu'il n'a pas compris le message, on va devoir lui envoyer un message plus fort.    \n\nIl y a un nuage d'émissions près de <EM4>~mission(Location|Address)</EM4> où il passe souvent. C'est l'endroit idéal pour se mettre en veille, se cacher et lancer une attaque surprise. Parfois il vole seul, parfois il est accompagné d'autres appareils monoplaces. Vous serez seul pour le premier coup, mais nous placerons des vaisseaux en renfort à proximité pour vous aider à terminer le travail. \n\nEt si vous avez besoin d'une motivation supplémentaire, le contractant principal recevra en bonus <EM4>~mission(ScripAmount) Jetons du Conseil</EM4> à la fin de la mission. \n\nStows terminé.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x6, Targets x2\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +500 Rep
HeadHunters_ShipAmbush_VE_title_001=Fiesta surprise <EM4>[100–500 Rep]</EM4>
HeadHunters_ShipAmbush_VH_desc_001=On dirait que certains ne nous aiment pas beaucoup. J'ai appris que plusieurs vaisseaux sous-capitaux et un certain nombre d'escortes ont pris nos opérations pour cible. Je pense que le meilleur moyen de les empêcher de nous nuire est de les attaquer avant qu'ils ne nous attaquent. \n\nNous avons repéré un <EM4>~mission(AmbushTarget)</EM4> qui fait partie de cette flotte, et on dirait qu'ils passent régulièrement près de <EM4>~mission(Location|Address)</EM4>, un endroit idéal pour une attaque surprise. Un nuage d'émissions à proximité peut vous dissimuler, vous et vos renforts.\n\nJe ne vais pas vous mentir, ça ne va pas être facile. Mais la récompense en vaut la peine. Finissez le travail et le prestataire principal recevra un bonus de <EM4>~mission(ScripAmount) Jetons du Conseil</EM4>. \n\nDe plus, qui sait ce que vous trouverez dans tous ces débris.\n\nStows terminé.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 5/7 | Risk 7/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x12, Targets x4\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Tier 2:</EM4> +8,000 Rep
HeadHunters_ShipAmbush_VH_title_001=Frappe Tactique <EM4>[250–8,000 Rep]</EM4>
Headhunters_DefendDestructibleEntites_E_Desc_001=Des crétins qui se prennent bien trop au sérieux ont pris la décision complètement stupide d'attaquer les <EM>~mission(Objects)</EM4> de <EM4>~mission(Location|Address)</EM4>. On a quelques projets en cours là-bas, donc on ne va pas les laisser s'en tirer comme ça.\n\nSi ça vous dit de nous donner un coup de main, allez-y et occupez-vous de ces voyous avant qu'ils ne causent trop de dégâts. Ça ne devrait pas être trop difficile de les neutraliser.\n\nEt pour vous remercier, j'offrirai <EM4>~mission(ScripAmount) jetons du Conseil</EM4> au prestataire principal, histoire de vous montrer ma gratitude. \n\nStows terminé.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x10\n<EM4>Rep:</EM4> +100
Headhunters_DefendDestructibleEntites_E_Title_001=Protéger des ~mission(Objects) contre des idiots <EM4>[100 Rep]</EM4>
Headhunters_DefendDestructibleEntites_H_Desc_001=Nos alliés de <EM4>~mission(Location|Address)</EM4> nous ont signalé qu'ils subissaient une attaque. Un gang avec lequel nous avons déjà maille à partir tente de prendre le contrôle des lieux en détruisant d'abord les <EM4>~mission(Objects)</EM4>.\n\nCes types sont des voyous de la pire espèce, ils sont déterminés et savent se défendre au combat. Vous devrez mettre les bouchées doubles pour les empêcher de tout faire sauter. Vous devriez peut-être même envisager de <EM>faire appel à des renforts</EM>.\n\nMenez cette mission à bien et je donnerai au prestataire principal <EM4>~mission(ScripAmount) jetons du Conseil</EM4>.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x17\n<EM4>Rep:</EM4> +200
Headhunters_DefendDestructibleEntites_H_Title_001=Empêcher un gang de détruire des ~mission(Objects) <EM4>[200 Rep]</EM4>
Headhunters_DefendDestructibleEntites_M_Desc_001=Nos amis de <EM4>~mission(Location|Address)</EM4> sont en danger. Un nouveau gang de la région les menace en s'en prenant à leurs <EM4>~mission(Objects)</EM4>.  \n\nS'ils sont détruits, ça va sérieusement nuire aux affaires, alors je veux que vous vous rendiez là-bas sans tarder pour assurer la protection.  \n \nSi vous avez besoin d'une motivation supplémentaire, j'offre <EM4>~mission(ScripAmount) jetons du Conseil</EM4> au prestataire principal.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x15\n<EM4>Tier 1:</EM4> +150 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
Headhunters_DefendDestructibleEntites_M_Title_001=Protéger des ~mission(Objects) contre des rivaux <EM4>[150–2,000 Rep]</EM4>
Headhunters_DefendDestructibleEntites_S_Desc_001=Nos partenaires de <EM4>~mission(Location|Address)</EM4> ont besoin d'aide. Un gang rival envahit la zone et s'attaque aux <EM4>~mission(Objects)</EM4> qui s'y trouvent. La situation serait déjà grave en soi, mais ce site est absolument crucial pour nos futurs projets dans la région et il est sacrément important qu'il reste opérationnel.\n\nCompte tenu de l'ampleur de cette attaque et des compétences de ces pilotes, il ne fait aucun doute que des <EM>renforts de confiance</EM> vous seraient très utiles. Rassemblez votre équipage, rendez-vous sur place et arrêtez ces crapules avant qu'elles ne causent des dégâts irréversibles. \n\nPour prouver que nous prenons cette mission très au sérieux, le prestataire principal recevra <EM4>~mission(ScripAmount) Jetons du Conseil</EM4> si tout se passe comme prévu.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 7/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x22\n<EM4>Rep:</EM4> +300
Headhunters_DefendDestructibleEntites_S_Title_001=Protéger des ~mission(Objects) à tout prix <EM4>[300 Rep]</EM4>
Headhunters_DefendDestructibleEntites_VE_Desc_001=Je n'irai pas dans les détails, mais les Headhunters s'intéressent à ce qui se passe à <EM4>~mission(Location|Address)</EM4> et je viens d'apprendre qu'ils se font harcelés par des nouveaux venus agressifs. \n\nCes crétins essaient de saboter l'endroit en détruisant les <EM4>~mission(Objects)</EM4>. Je ne vais pas laisser faire ça.   \n\nRendez-vous sur place et assurez la protection avant que tout ne soit détruit. Ces crétins sont des poids plume, vous ne devriez donc pas avoir trop de mal à vous en occuper. \nÉliminez-les tous. Je donnerai <EM4>~mission(ScripAmount) jetons du Conseil</EM4> à celui qui aura accepté cette mission, en guise de bonus.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Rep:</EM4> +100
Headhunters_DefendDestructibleEntites_VE_Title_001=Protéger des ~mission(Objects) contre des morveux <EM4>[100 Rep]</EM4>
Headhunters_DefendDestructibleEntites_VH_Desc_001=Une bande de mercenaires a été envoyée pour nuire à nos affaires à <EM4>~mission(Location|Address)</EM4>. On dirait que quelqu'un a eu vent qu'en détruisant les <EM4>~mission(Objects)</EM4> qui s'y trouvent, cela perturberait fortement les opérations des Headhunters dans la région. Je veux que ce problème soit réglé.\n\nJe ne vais pas vous mentir, ces mercenaires ne sont pas des amateurs. Il serait stupide d'y aller seul. C'est pourquoi vous devrez être parfaitement équipé et trouver des <EM>amis de confiance</EM> pour vous épauler.\n\nCette opération doit se dérouler sans accroc, c'est pourquoi j'offre au prestataire principal <EM4>~mission(ScripAmount) Jetons du Conseil</EM4> si le travail est bien fait. \n\nStows terminé.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x17\n<EM4>Rep:</EM4> +250
Headhunters_DefendDestructibleEntites_VH_Title_001=Défendre des ~mission(Objects) contre des mercenaires <EM4>[250 Rep]</EM4>
Headhunters_DefendLocation_E_Desc_001=Des crétins avec des envies suicidaires attaquent nos vaisseaux autour de <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4>. On ne peut pas les laisser faire sans qu'ils en paient le prix. On s'en charge ?\n\nSi oui, partez à leur poursuite. Mon équipage suit leurs mouvements et je vous tiendrai au courant de l'évolution de la situation. \n\nDe plus, pour vous remercier, j'offrirai en bonus <EM4>~mission(ScripAmount) jetons du Conseil</EM4> au prestataire principal. \n\nStows terminé.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4, Hostiles x2, Reinforcements x8\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +1,000 Rep
Headhunters_DefendLocation_E_Title_001=Protéger notre site <EM4>[100–1,000 Rep]</EM4>
Headhunters_DefendLocation_H_Desc_001=J'ai appris que des vaisseaux Headhunters en route vers <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> se font attaquer. Les scans ont révélé la présence de forces ennemies dans la région, qui ont l'intention de cibler nos opérations. \n\nIls sont assez nombreux pour qu'il faille plus d'une personne pour se débarrasser de toute cette racaille. Si vous pouvez prendre votre équipement et quelques amis, vous me seriez d'une grande aide.  \n\nLes lieux et les cibles de l'attaque évoluent. Ne vous souciez pas des détails pour l'instant. Contentez-vous de vous rendre sur place, je vous dirai où vous devez aller.  \n\nSi vous vous en sortez bien, je donnerai en prime <EM4>~mission(ScripAmount) jetons du Conseil</EM4> au prestataire principal.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x5, Hostiles x3, Interdiction Ships x2, Reinforcements x16\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
Headhunters_DefendLocation_H_Title_001=Aide Headhunters à ~mission(DefendLocationWrapperLocation) <EM4>[200–2,000 Rep]</EM4>
Headhunters_DefendLocation_M_Desc_001=Notre espace aérien autour de <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> a été violé. Des vaisseaux ennemis menacent la base ainsi que tous nos vaisseaux dans la zone. Il faut y mettre un terme immédiatement, alors rassemblez vos affaires et rendez-vous sur place. Allez-y, je vous tiendrai au courant de la situation et vous dirai où vous rendre. \n \nSi vous avez besoin d'une motivation supplémentaire, j'ajoute en bonus <EM4>~mission(ScripAmount) jetons du Conseil</EM4> pour le prestataire principal.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4, Hostiles x2, Interdiction Ships x1, Reinforcements x14\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
Headhunters_DefendLocation_M_Title_001=Sécuriser notre l'Espace Aérien <EM4>[150–2,000 Rep]</EM4>
Headhunters_DefendLocation_S_Desc_001=Une équipe à <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> a besoin d'aide. Des vaisseaux ennemis pullulent dans la zone et attaquent tout ce qui bouge. La situation est déjà suffisamment grave comme ça, mais ce site abrite en plus du matériel et du personnel absolument essentiels dont nous ne pouvons nous passer. \n\nCompte tenu de l'ampleur de l'attaque, vous aurez besoin d'un vaisseau bien équipé et d'alliés fiables. Rassemblez votre équipage, rendez-vous sur place et je vous enverrai les détails sur l'endroit où vous serez le plus utile.\n\nPour prouver que nous prenons cette mission très au sérieux, le prestataire principal recevra un bonus de <EM4>~mission(ScripAmount) Jetons du Conseil</EM4> si tout se passe comme prévu.\n\n- Stow\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x10, Hostiles x3, Interdiction Ships x6, Reinforcements x20\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Tier 2:</EM4> +16,000 Rep
Headhunters_DefendLocation_S_Title_001=Rétablir l'ordre à ~mission(DefendLocationWrapperLocation) <EM4>[300–16,000 Rep]</EM4>
Headhunters_DefendLocation_VE_Desc_001=Les Headhunters autour de <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> se font harceler par une bande de morveux agressifs. Il faut s'occuper d'eux avant qu'ils ne deviennent vraiment pénibles.   \n\nUne fois sur place, je vous tiendrai au courant de ce que font ces vermines afin que vous puissiez les traquer. \n\nÉliminez-les tous et je donnerai en bonus <EM4>~mission(ScripAmount) jetons du Conseil</EM4> à la personne qui aura accepté cette mission.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2, Hostiles x1, Reinforcements x6\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +500 Rep
Headhunters_DefendLocation_VE_Title_001=Éliminer la nuisance <EM4>[100–500 Rep]</EM4>
Headhunters_DefendLocation_VH_Desc_001=On echerche quelqu’un qui sait non seulement se battre en dogfight mais aussi recruter d’autres pilotes pour la cause des Headhunters. Notre centre d’opérations à <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4>, ainsi que tous les vaisseaux qui y circulent, sont la cible de forces hostiles. Nous avons besoin de renforts rapidement. Pour être honnête, il y a beaucoup de tension dans le secteur. C’est pourquoi tu devras être pleinement équipé et trouver des alliés fiables pour voler à tes côtés. Une fois ton équipe rassemblée, rends-toi sur place, je te tiendrai au courant si des incidents nécessitent ton intervention. Cette opération doit se dérouler sans accroc, donc j’offre au contractant principal un bonus de <EM4>~mission(ScripAmount) Scrip du Conseil</EM4> pour un travail bien fait. Stows out.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x7, Hostiles x3, Interdiction Ships x4, Reinforcements x16\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Tier 2:</EM4> +8,000 Rep
Headhunters_DefendLocation_VH_Title_001=Stopper l'attaque à ~mission(DefendLocationWrapperLocation) <EM4>[250–8,000 Rep]</EM4>
Headhunters_Delivery_Outpost_Multi_desc_001=J'ai un tas de caisses qui se trouvent à <EM4>~mission(Location|Address)</EM4> et qui doivent être déplacés à <EM4>~mission(Destination|Address)</EM4>. Ça a l'air assez facile, non ? Eh bien, j'imagine que ce n'est pas le cas. \n\nL'idiot qui était censé déplacer ces choses s'est cassé le dos en essayant de les porter toutes en même temps. Alors, vous savez, peut-être que vous devriez apporter un <EM4>rayon tracteur portable</EM4> et essayer de les prendre un par un comme une personne normale. Mais ne me laissez pas vous dire comment faire votre travail. Faites-le, c'est tout. \n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +200 Rep\n<EM4>Contractor:</EM4> +400 Rep\n<EM4>Sr. Contractor:</EM4> +800 Rep
Headhunters_Delivery_Outpost_Multi_title_001=Un peu de Travail Physique à ~mission(Destination) <EM4>[200–800 Rep]</EM4>
Headhunters_Delivery_Outpost_desc_001=J'ai une caisse à <EM4>~mission(Location|Address)</EM4> qui doit être acheminée vers <EM4>~mission(Destination|Address)</EM4>. Avez-vous une chance de résoudre ce problème très rapidement ?\n\nC'est peut-être le poste le plus simple que j'ai jamais assigné. La seule menace réelle serait de trébucher sur vos propres pieds. Un <EM4>rayon tracteur portable</EM4> pourrait également vous être utile.\n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Neutral:</EM4> +50 Rep
Headhunters_Delivery_Outpost_title_001=Mission à ~mission(Destination) <EM4>[50 Rep]</EM4>
Headhunters_EliminateAll_OLP_H_desc_001=Surprise, surprise. On dirait que tout le monde n'est pas content que les Headhunters fassent des incursions dans Stanton. Un groupe en particulier nous a attaqué avant de retourner à <EM4>~mission(Location|Address)</EM4>. \n\nJe veux que tu ailles là-bas et que tu leur fasses goûter à leur propre médecine. Nous débarrasser de ces lèche-bottes devrait envoyer un message assez clair sur ce qui se passe quand on nous cherche des noises. \n\n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x10, Juggernauts x4
Headhunters_EliminateAll_OLP_H_title_001=Faire passer un Message
Headhunters_EliminateAll_PAF_H_desc_001=La nouvelle s'est répandue que nous nous étendions dans Stanton, et un groupe local a attaqué quelques-unes de nos planques. On a réussi à retrouver ces salauds dans un ancien site minier d'Hathor. \n\nPrêt à leur montrer comment les Headhunters réglent leurs problèmes ? Si oui, rends-toi à <EM4>~mission(Location|Address)</EM4> et montre-leur qu'on ne rigole pas. \n\n \n- Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x10, Juggernauts x4
Headhunters_EliminateAll_PAF_H_title_001=Montrez-leur qui est le Patron
Headhunters_EliminateSpecific_PAF_desc_001=Je n'arrive pas à croire qu'il y ait autant de criminels dans ce foutu système. On dirait qu'on va devoir faire le ménage nous-mêmes. \n\nJ'ai une liste de chefs haut placés ici. Rien n'apporte plus de chaos et de désordre aux gangs existants que décapitation de leurs têtes. Notre prochaine cible est <EM4>~mission(TargetName)</EM4>, que nous avons localisée à <EM4>~mission(Location|Address)</EM4>. Ça te dit de t'en charger ? \n\nCes vieilles plateformes d'Hathor sont vastes et dispersées. Je doute qu'il y ait un moyen de faire ça sans attirer l'attention de ses sous-fifres. Ça ne va pas être facile, mais je pense que tu vas t'amuser.\n\n- Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x10, Juggernauts x4
Headhunters_EliminateSpecific_PAF_title_001=Effacer ~mission(TargetName)
Headhunters_HaulCargo_AToB_OLP_Illegal_desc_01=On a besoin de quelqu’un pour récupérer une cargaison pour nous. On utilisait un vieux SAP d'Hathor comme dépôt secret, mais un gang local s’est installé et on ne peut plus récupérer notre merdier.\n\nSi t’as envie de casser des gueules, récupères la cargaison du monte-charge à <EM4>~mission(Location|Address)</EM4> et livre-la au monte-charge à <EM4>~mission(Destination|Address)</EM4>.\n\nD’après ce que j’ai entendu, cet endroit est rempli de tout et n’importe quoi. Récupérer notre matos ne sera pas facile, mais c’est pour ça qu’on te paie.\n\nAssures-toi juste d’avoir un vaisseau capable de transporter une charge de <EM4>~mission(MissionMaxSCUSize)</EM4> et essaies de ne pas te faire descendre en route. Un <EM4>rayon tracteur portable</EM4> pourrait également t'être utile.\n\nStows, terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Neutral:</EM4> +1,000 Rep
Headhunters_HaulCargo_AToB_OLP_title_01=Récupération de la Cargaison <EM4>[1,000 Rep]</EM4>
Headhunters_HaulCargo_AToB_PAF_Illegal_desc_01=Je ne vais pas t'ennuyer avec les détails, tout ce que tu as besoin de savoir, c'est qu'un de nos transporteurs s'est fait attaquer et que nos marchandises sont maintenant coincées dans un monte-charge à <EM4>~mission(Location|Address)</EM4>. \n\nÀ toi de voir comment tu récupères les marchandises, mais si tu fais disparaître quelques-uns de nos rivaux au passage, je ne vais pas m'en plaindre. Une fois que tu as le butin, emmène-le au monte-charge à <EM4>~mission(Destination|Address)</EM4>, puis on pourra régler ton paiement.\n\nUn <EM4>rayon tracteur portable</EM4> pourrait également t'être utile.\n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Neutral:</EM4> +1,000 Rep
Headhunters_HaulCargo_AToB_PAF_title_01=Inventaire en cours <EM4>[1,000 Rep]</EM4>
Headhunters_HaulCargo_MultiToSingle_desc_01=Nous avons utilisé <EM4>~mission(Location1|Address)</EM4> et <EM4>~mission(Location2|Address)</EM4> d'Hathor comme planques, mais il se trouve que quelques crétins trop zélés les ont repérées et essaient de nous piquer notre matos pour leur propre compte.\n\nHeureusement, les marchandises sont encore là – pour l’instant. On a besoin que quelqu’un se rende à ce PAF et PLO, récupère notre matos dans les monte-charges et l’emmène jusqu’au monte-charge à <EM4>~mission(Destination|Address)</EM4>, où on devrait pouvoir le garder au frais.\n\nVoici la liste de ce qu’il faut récupérer. Peu importe l’ordre dans lequel tu t’en occupes. Assure-toi juste d’avoir un vaisseau pouvant stocker au moins <EM4>~mission(MissionMaxSCUSize)</EM4>.\n\n~mission(MultiToSingleToken)\n\nPrépare-toi à gérer tous les connards que tu croiseras. Un <EM4>rayon tracteur portable</EM4> pourrait également t'être utile.\n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Neutral:</EM4> +1,000 Rep
Headhunters_HaulCargo_MultiToSingle_title_01=Récupération de nos Biens <EM4>[1,000 Rep]</EM4>
Headhunters_SabotageRelays_CFP_001_Desc=Les CFP pensent qu'ils sont en sécurité à <EM4>~mission(Location|Address)</EM4> mais nous avons de grands projets pour eux. Vous allez nous ouvrir la voie en vous rendant sur place et en coupant leurs tours de communication.\n\nIl devrait y avoir un <EM4>terminal de contrôle au sommet</EM4> que vous pourrez utiliser pour détruire leurs tours. Vous vous occupez de ça et ils ne pourront plus appeler de renfort. Nous pourrons montrer à ces racailles à qui appartient ce système.\n\nLa majorité des avant-postes utilisent le même principe, cela vous sera utile la prochaine fois que vous voudrez vous assurer que les renforts ne viennent pas vous embêter.\n\n\n Stows, terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +75
Headhunters_SabotageRelays_CFP_001_Title=Désactivation de Tours de Communication CFP <EM4>[75 Rep]</EM4>
Headhunters_SabotageRelays_XT_001_Desc=Nous préparons une opération pour frapper ces salauds de XenoThreat là où ça fait mal, mais nous devons agir intelligemment. C'est pourquoi nous vous envoyons en premier pour détruire leurs tours de communication afin qu'ils ne puissent pas appeler des renforts. Faites cela et nous pourrons entrer et sortir avant qu'ils ne s'en rendent compte.\n\nRendez-vous à <EM4>~mission(Location|Address)</EM4> et grimpez sur les tours de communication qui s'y trouvent. Il devrait y avoir un <EM4>panneau de contrôle situé au sommet</EM4> que vous pouvez utiliser pour les désactiver.\n\nEn fait, il en va de même pour la plupart des autres avant-postes. Plutôt que d'avoir à faire face à des renforts, vous pouvez simplement désactiver les tours de communication. Mais bon, si vous voulez sonner la cloche pour éliminer quelques Xenothreat supplémentaires, je ne m'en plaindrai pas.\n\n\nStows, terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +100
Headhunters_SabotageRelays_XT_001_Title=Faire Taire les Xenothreat <EM4>[100 Rep]</EM4>
Headhunters_SecurityPatrol_E_Desc_001=Les Headhunters sont en expansion, mais ils ont encore besoin d'aide pour se familiariser avec notre nouveau territoire. J'ai une liste d'endroits à vérifier et scanner pour vous. \n\nCommencez à <EM4>l'endroit indiqué sur votre ATH</EM4>, puis examinez quelques autres sites. Je vous tiendrai informé au fur et à mesure. Je ne m'attends pas à ce que vous rencontriez de problèmes, mais rien n'est moins sûr. Les ennuis nous collent à la peau.\n\nUne fois ce travail terminé, je remettrai <EM4>~mission(ScripAmount) Jetons du Conseil</EM4> au prestataire principal en guise de remerciement.\n\nStows terminé.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Targets x15\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +1,000 Rep
Headhunters_SecurityPatrol_E_Title_001=Repérage et Scan <EM4>[100–1,000 Rep]</EM4>
Headhunters_SecurityPatrol_H_Desc_001=J'ai remarqué une recrudescence d'attaques contre les vaisseaux des Headhunters, et ça me rend nerveux. Nous avons une cargaison d'approvisionnement importante que nous ne pouvons pas nous permettre de perdre, et nous avons besoin d'aide pour déterminer l'itinéraire à emprunter. J'ai repéré quelques endroits potentiels où je me posterais si je devais attaquer. Pourriez-vous vous y rendre et éliminer les individus louches qui pourraient s'y cacher ? \n\nL'itinéraire commence à <EM4>l'endroit indiqué sur votre ATH</EM4>. Une fois que vous l'aurez scanné et nettoyé, je vous enverrai vers d'autres zones. J'ai entendu dire que ces endroits étaient fréquentés, mieux vaut donc <EM4>prendre un ami avec vous</EM4> pour assurer vos arrières.\n\nSi vous arrivez au bout, je donnerai au prestataire principal un bonus de <EM4>~mission(ScripAmount) Jetons du Conseil</EM4> en guise de remerciement. \n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Targets x54\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
Headhunters_SecurityPatrol_H_Title_001=À la recherche d'ennuis <EM4>[200–2,000 Rep]</EM4>
Headhunters_SecurityPatrol_M_Desc_001=Le Clip local a besoin d'informations fraîches sur plusieurs de nos secteurs. Je ne sais pas exactement ce qu'il cherche, mais je ne vais pas poser de questions. Mon travail consiste à trouver quelqu'un qui accepte se rendre à ces endroits et les scanner. Dispo ? \n\nTout ce que vous avez à faire, c'est de vous rendre à <EM4>l'endroit indiqué sur votre ATH</EM4>, de scanner les lieux et, s'ils sont dégagés, de passer au suivant. Si vous rencontrez des problèmes, occupez-vous-en. \n\nÇa n'a pas l'air trop dur, non ? En plus, je donnerai <EM4>~mission(ScripAmount) Jetons du Conseil</EM4> en prime au prestataire principal en guise de remerciement. \n\n\nStows terminé.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Targets x23\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
Headhunters_SecurityPatrol_M_Title_001=Patrouille spatiale <EM4>[150–2,000 Rep]</EM4>
Headhunters_SecurityPatrol_S_Desc_001=Des connards essaient de nous expulser du système. Prêt à les repousser ?\n\nVous voyez, certaines personnes ne veulent vraiment pas de nous ici, et ont commencé à envoyer des groupes de cinq à sept vaisseaux, souvent accompagnés d'un plus gros vaisseau de combat, vers les endroits où nous renforçons notre présence. C'est le moment de leur montrer que nous sommes là pour rester.  \n\nJ'ai répertorié quelques endroits, à commencer par <EM4>celui indiqué sur votre ATH</EM4>, où l'on rencontre le plus d'hostilité. Vous devez vous rendre à chacun d'entre eux et les scanner pour voir si nous pouvons les attirer dans un combat.\n\nSachez que ça va être difficile, alors ne soyez pas trop arrogants et n'essayez pas d'y aller seuls. Si j'étais vous, j'amènerais au moins <EM4>trois amis</EM4> en renfort pour vous aider. Pour que ça vaille le coup, je promets un bonus de <EM4>~mission(ScripAmount) Jetons du Conseil</EM4> au prestataire principal qui réussira cette mission. \n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 7/7\n<EM4>Hostiles:</EM4> Targets x87\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Tier 2:</EM4> +16,000 Rep
Headhunters_SecurityPatrol_S_Title_001=Chasser des Têtes <EM4>[300–16,000 Rep]</EM4>
Headhunters_SecurityPatrol_VE_Desc_001=Les Headhunters veulent des informations sur ce qui se passe dans la région. Nous avons déjà mis en place des satellites de surveillance, mais rien ne vaut une bonne vieille patrouille. Ça vous dit ?\n\nSi oui, rendez-vous à <EM4>l'emplacement indiqué sur votre ATH</EM4>. Commencez par scanner la région, puis nous vous guiderons vers d'autres endroits dont nous souhaitons obtenir des informations. \n\nEt si vous avez besoin d'une motivation supplémentaire, un bonus de <EM4>~mission(ScripAmount) Jetons du Conseil</EM4> sera offert au prestataire principal à la fin de la mission. \n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Targets x4\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +500 Rep
Headhunters_SecurityPatrol_VE_Title_001=Voyons voir ce qu'il y a <EM4>[100–500 Rep]</EM4>
Headhunters_SecurityPatrol_VH_Desc_001=Nous rencontrons une certaine résistance de la part de personnes qui ne semblent pas apprécier notre présence. Ils ont commencé à s'intéresser à nos repaires et à envoyer des escouades pour attaquer nos vaisseaux. Ça vous dirait de vous rendre à quelques-uns de ces endroits pour leur montrer que nous ne nous laisserons pas intimider ? \n\nSi oui, commencez par inspecter les environs de <EM4>l'endroit indiqué sur votre ATH</EM4>. De là, je vous guiderai vers d'autres points chauds que nous devons vérifier. Équipez-vous correctement et préparez-vous à en découdre avant de partir. Je vous recommande de faire le plein de munitions et de convaincre <EM4>deux amis</EM4> de se joindre à vous.\n\nAccomplissez ce contrat pour les Headhunters et je veillerai à ce que le prestataire principal reçoive un bonus de <EM4>~mission(ScripAmount) Jetons du Conseil</EM4>. \n\nStows terminé.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Targets x66\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Tier 2:</EM4> +8,000 Rep
Headhunters_SecurityPatrol_VH_Title_001=Tenir Bon <EM4>[250–8,000 Rep]</EM4>
Headhunters_bounty_desc_001=Les Headhunters ont récemment prêté de l'argent a ~mission(TargetName) sous certaines conditions. Spécifiquement, remboursez-nous ou nous vous tuerons. Il est fou de penser que ce n’était pas assez clair, mais force est de constater que nous avons passé la date convenue pour le paiement. Maintenant , même si j'apprécie ~mission(TargetName|First), J'ai besoin que tu tiennes notre promesse.\n\n~mission(TargetName|Last)a été aperçu la dernière fois à ~mission(Location|Address). Pistez le furtivement, et soyez payé. C'est aussi simple que ça.\n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
Headhunters_bounty_desc_002=Le temps imparti est terminé pour ~mission(TargetName). Les skav ont depuis longtemps passé la date de remboursement des Headhunters, donc j'ai besoin de vous pour les cogner. \n\nÉliminez-les, pas frappez-les, si c'est pas assez clair.\n\n Quelqu’un a récemment vu ~mission(TargetName|Last) dans le coin de ~mission(Location|Address), donc allez là-bas et pas de quartier.  \n\nInfo importante, nous avons eu des comptes rendus comme quoi ils utilisaient nos crédits pour louer une protection supplémentaire. Préparez-vous en conséquence. \n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
Headhunters_bounty_desc_003=~mission(TargetName) a emprunté un tas de crédits aux Headhunters et a pensé intelligent de se cacher au lieu de nous rembourser, donc je cherche quelqu’un pour faire un exemple de ~mission(TargetName|Last).\n\nIls ont été repérés à ~mission(Location|Address), donc je recommande d'aller à cet endroit avant que la piste ne refroidisse. ~mission(TargetName|Last) est paranoïaque, donc ne soyez pas surpris s'il n'est pas tout seul. Gérez la situation comme vous voulez mais ~mission(TargetName|Last) doit mordre la poussière quand ça sera terminé. \n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
Headhunters_bounty_title_001=Sans Coeur <EM4>[50 Rep]</EM4>
Headhunters_bounty_title_002=Impayé <EM4>[100 Rep]</EM4>
Headhunters_bounty_title_003=Avis de Recouvrement <EM4>[250 Rep]</EM4>
Headhunters_bounty_xenothreat_desc_001=Les Headhunters ont appris qu'une opération XenoThreat visant l'un de nos équipages était en cours. Nous n'avons pas de détails précis sur le plan, mais nous savons que ~mission(TargetName) l'organise. Au lieu de rester les bras croisés et d'attendre que quelque chose se passe, nous avons décidé d'être proactifs. \n\n ~mission(TargetName|Last) vient d'être repérée avec d'autres personnes autour de la ~mission(Location|Address). Nous ne pouvons mobiliser personne assez rapidement pour nous y rendre. Je veux que vous vous y précipitiez et que vous fassiez une attaque préventive.  \n\n C'est parti.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Headhunters_bounty_xenothreat_desc_002=XenoThreat a récemment frappé un bastion des Headhunters. Je vous épargne les détails, mais ils ont fait subir des trucs odieux à notre équipage. Nous avons identifié le chef de l'opération comme étant ~mission(TargetName) et nous cherchons une petite vengeance. Nous nous moquons de ce que vous ferez pour accomplir la mission. Tout ce qui compte, c'est que ~mission(TargetName|Last) meurt. \n\nUne source vient juste de nous dire que vous pouvez commencer à traquer cette pourriture de XenoThreat à ~mission(Location|Address). Ce fou est un pro et ne voyage jamais seul, donc ne vous attendez pas à les voir se balader dans un parc. \n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Headhunters_bounty_xenothreat_desc_003=~mission(TargetName) a été démasqué comme taupe pour XenoThreat. Tout fait sens maintenant, que ce merdeux était un gros trou du cul. Malheureusement, il s'est barré avant que nous puissions nous en occuper nous-même. \n\nD’après tout ce qu'il a appris sur nos opérations, nous devons l'éliminer pronto. S'il nous voit, il va se cacher de nouveau, mais je pense que quelqu’un comme vous aura plus de chance de vous rapprocher suffisamment pour un coup mortel. \n\nNous venons juste d'entendre un bruit de couloir comme quoi ~mission(TargetName|Last) serait dans le coin de ~mission(Location|Address). Il parait qu'il y a d'autres vaisseaux autour qui le protègent aussi. Je pense que tu as les compétences nécessaires pour rayer du verse un traitre et ses traitres d'amis ?  \n\nStows terminé.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Headhunters_claimsweep_desc_easy=Un abruti essaie de dénicher des informations sur les Headhunters. Des sentinelles orbitales ont été larguées à ~mission(location|address) pour nous espionner. Nous avons également repéré un vaisseau qui les surveille. Bouleau simple pour vous. Allez éliminer les sentinelles là-bas et nous vous paierons pour cela. Ça a l'air de vous intéresser ? Quant au vaisseau, vous pouvez en faire ce que vous voulez, mais s'il vous repère, ne soyez pas surpris s'il essaie d'aller chercher des renforts. C'est comme ça que ça se passe.\n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Hostiles:</EM4> Hostile Wave x3, Prospectors x1\n<EM4>Turrets:</EM4> 2 (hostile)
Headhunters_claimsweep_desc_hard=Des idiots pensent qu'ils peuvent ouvertement espionner les Headhunters et partir comme ça avec les infos. Ils ont installés de nombreuses Sentinelles Orbitales à ~mission(location|address) et ont quelques vaisseaux qui patrouillent dans la zone. Nous ne savons pas qui est derrière tout ça, mais honnêtement peu importe. On veut juste qu'ils déguerpissent.\n\nFaites-nous savoir si vous avez dû remettre en place ces bâtards hargneux . Nous vous paierons bien, dès que le travail est fait. \n\nGardez en tête que ce ne sont que les sentinelles qui nous importent. Les vaisseaux patrouillant ne vous concernent seulement s'ils vous gênent ou s'ils appellent des renforts pour vous arrêter. \n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250\n<EM4>Hostiles:</EM4> Hostile Wave x5, Prospectors x4\n<EM4>Turrets:</EM4> 4 (hostile)
Headhunters_claimsweep_desc_intro=On a un petit soucis que les Headhunters doivent gérer. Une sentinelle orbitale à ~mission(location|address) que des emmerdeurs ont posé là pour espionner nos opérations. Vous voulez vous faire de l'argent facilement en explosant ça pour nous ?\n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Turrets:</EM4> 1 (hostile)
Headhunters_claimsweep_desc_medium=Les Headhunters recherchent un mercenaire pour faire un petit nettoyage. Nous avons trouvé quelqu'un essayant d'espionner nos opérations à ~mission(location|address). On ne peut pas laisser faire ça. Nous avons donc besoin d'un mercenaire compétant pour prendre en charge les sentinelles orbitales postées dans la zone, et si besoin, gérer les éventuels vaisseaux qui interviendraient. Il semble qu'ils soient bien équipés, donc les descendre sera peut être ardu mais, pour sûr, ce sera amusant. \n\nFaites-nous savoir si vous êtes le bon pour ce boulot. Les crédits serons transférés quand nos scans valideront votre nettoyage. \n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostile Wave x4, Prospectors x2\n<EM4>Turrets:</EM4> 3 (hostile)
Headhunters_claimsweep_desc_rand=Les Headhunters ont récemment découvert que des sentinelles orbitales sont concentrées sur nos opérations et nous n'aimons pas vraiment ça. Je cherche quelqu'un à payer pour aller à ~mission(location|address) et leur faire comprendre de se mêler de leurs affaires. Je doute qu'ils soient réceptifs à une telle discussion, donc je suis préparé à un affrontement d'une une extrême virulence. \n\nD'après nos relevés de scans, ce ne sera pas de tout repos. Embarquer des munitions en nombre ne sera pas du luxe. Le paiement sera envoyé dès le contrat rempli. \n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostile Wave x32, Prospectors x5\n<EM4>Turrets:</EM4> 4 (hostile)
Headhunters_claimsweep_title_easy=Élimination d'Eavesdroppers <EM4>[50 Rep]</EM4>
Headhunters_claimsweep_title_hard=Extermination d'Eavesdroppers <EM4>[250 Rep]</EM4>
Headhunters_claimsweep_title_intro=Suppression d'Eavesdropper <EM4>[50 Rep]</EM4>
Headhunters_claimsweep_title_medium=Éradication d'Eavesdroppers <EM4>[100 Rep]</EM4>
Headhunters_claimsweep_title_rand=Exécuter Eavesdroppers <EM4>[100 Rep]</EM4>
Headhunters_defend_XT_VH_desc_001=XenoThreat est actuellement en pleine offensive. Ils ont lancé des attaques simultanées sur plusieurs sites Headhunters et ont épuisé nos pilotes. J'ai eu vent qu'ils prévoient de prendre d'assaut ~mission(Location|Address) ensuite, et nous ne pouvons pas envoyer de renforts pour le défendre. \n\nJe cherche quelqu'un pour rassembler une équipe, collecter des fournitures et organiser une défense solide pour nous. Je vais être honnête avec vous, cela s'annonce comme un sacré combat. Les Xenos envoient certaines de leurs forces les plus expérimentées là-bas. Pas grand-chose d'autre à dire, si ce n'est qu'ils vont probablement faire arriver leurs troupes par vagues. Éliminez-les toutes et vous serez payé généreusement.\n\nVous pensez pouvoir relever le défi ?  \n\n-Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x2, Snipers x2, Soldiers x9, Technicians x2\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Headhunters_defend_XT_VH_title_001=Bloquer l'Expansion XenoThreat <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
Headhunters_eliminateall_caves_desc_01=Hé,\n\nQuelques voyous à deux balles sont retranchés dans ~mission(Location|Address). Nous n'y prêterions pas attention, sauf que ces crapules arrogantes ont essayé d'attaquer un avant-poste sous notre protection.\n\nNous les avons chassés sans trop de problèmes, mais nous ne pouvons pas laisser ce genre de manque de respect impuni. Nos Clips sont occupés avec de plus gros poissons, alors on aimerait que vous vous occupiez de ça pour nous. \n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x2, Soldiers x6\n<EM4>Neutral:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Headhunters_eliminateall_caves_title_01=Une Riposte Rapide <EM4>[BP]</EM4> <EM4>[50 Rep]</EM4>
Headhunters_theft_outpost_xenothreat_desc_001=pu theft outpost pyro hh vs xt pyro6\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
HexPenetrator_Bounty_desc=Nos analystes ont examiné les informations saisies auprès des équipes de reconnaissance XenoThreat, mais les données semblent être enfermées dans un système de chiffrage sophistiqué et nécessitent une Crypto-clé spéciale pour y accéder.\n\nNous avons réussi à localiser plusieurs lieutenants XenoThreat opérant dans le système, vous devez trouver et engager les suspects et voir s'ils sont en possession d'une Crypto-clé qui nous permettra d'accéder à l'information.\n\nPour rappel, l'armée a généreusement fait don de quelques vieux F7A Hornet pour les membres de la FDC qui mèneront cette initiative à son terme.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
HexPenetrator_Comm_Description=Un des suspects capturés lors des récentes attaques a révélé que XenoThreat cherchait à accéder à distance à un certain nombre de relais de communication dans le système.\n\nIl serait extrêmement dangereux pour les habitants de la région que XenoThreat écoute les communications. La FDC a donc été chargée de réinitialiser le relais de communication, puis de le défendre contre les Vanguards XenoThreat qui essaieraient de se reconnecter aux serveurs. \n\nUne fois ces Vanguard vaincus, éliminez tous les vaisseaux hostiles restants dans la zone.\n\nPour rappel, l'armée a généreusement fait don de quelques vieux F7A Hornet pour les membres de la FDC qui mèneront cette initiative à son terme.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Hostiles:</EM4> Hostile Wave x17
HexPenetrator_DataHeist_description=Nous avons reçu des informations selon lesquelles XenoThreat a l'intention de lancer une nouvelle attaque sur le système Stanton. La FDC a demandé à l'Advocacy de créer une nouvelle initiative appelée Opération Overdrive afin d'arrêter cette attaque avant qu'elle ne se produise.\n\nLa FDC envoie des volontaires pour infiltrer et obtenir tout renseignement qui pourrait donner une idée de ce qui se passe. Inutile de dire qu'il faut s'attendre à une forte résistance de la part de tout XenoThreat sur place. Attention, XenoThreat s'est toujours opposé violemment à l'UEE et à tous ceux qui agissent en son nom.\n\nÀ titre d'incitation supplémentaire, l'armée a généreusement fait don de quelques vieux F7A Hornet pour les membres de la FDC qui mèneront cette initiative à son terme.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Hostiles:</EM4> Hostiles x54, Technicians x2\n<EM4>Unknown:</EM4> 12
HexPenetrator_Incursion_Desc=Des vagues de vaisseaux XenoThreat ont pénétré dans le système Stanton et attaqué des civils au hasard. Nous ne savons pas s'il s'agit d'une attaque isolée ou d'une réaction à nos récentes initiatives, mais nous devons les arrêter.\n\nPour rappel, l'armée a généreusement fait don de quelques vieux F7A Hornet pour les membres de la FDC qui mèneront cette initiative à son terme.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
HexPenetrator_Kareah_Desc=Attention à tous les volontaires de la FDC, nous avons reçu un appel de détresse du poste de sécurité Kareah. Il s'avère que XenoThreat a utilisé les relais de communication pour distraire les forces de l'ordre et lancer une attaque sur la station.\n\nNous avons appris qu'ils tentent d'accéder à leurs systèmes, donc tous les volontaires doivent immédiatement se dérouter pour reprendre Kareah et se débarrasser de toutes les forces XenoThreat.\n\nPour rappel, l'armée a généreusement fait don de quelques vieux F7A Hornet pour les membres de la FDC qui mèneront cette initiative à son terme.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Hostiles:</EM4> Hostile Wave x3
HexPenetrator_RecoverDeliver_description=Avis aux volontaires de la FDC, XenoThreat a disparu des radars. Nous pensons qu'ils ont décidé de se retirer afin de préparer la phase finale de leur plan. \n\nL'histoire a prouvé que XenoThreat aime se battre, il va de soi que cela pourrait être une attaque. Nous demandons donc aux volontaires de livrer des fournitures à la station Jericho, près du point de saut Stanton-Pyro, afin de se préparer à un assaut potentiel.\n\nPour rappel, l'armée a généreusement fait don de quelques vieux F7A Hornet pour les membres de la FDC qui mèneront cette initiative à son terme.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
HexPenetrator_RewardRecord_Desc=Merci pour votre implication dans cette initiative Overdrive. \n\nComme promis, nous avons approuvé votre mise à niveau d'un F7C mk ii civil vers un F7A mk ii militaire si vous en avez un.\n\nEn outre, vous avez reçu une location temporaire d'un F7A mk ii militaire auquel vous pouvez accéder dans votre ASOP.\n\n\n_________________\n\nPour mettre à niveau, visitez le site Web RSI pour appliquer le jeton, puis redémarrez le jeu et accédez au vaisseau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
Highpoint_KillAnimal_OneType_desc=Nous avons surveillé une situation à <EM4>~mission(Location)</EM4> concernant une augmentation de la population de <EM4>~mission(Creature)</EM4> au cours des derniers mois. Nos modèles indiquent que si cette tendance se poursuit, de nombreuses plantes et animaux indigènes seront gravement affectés. Il est impératif de réduire la population de <EM4>~mission(Creature)</EM4> avant que cela ne se produise.  \n\nSi vous pouvez aider, veuillez consulter <EM4>"Le Guide de la Faune de Stanton"</EM4> dans votre Journal pour plus de détails sur la créature ciblée.\n\nCordialement,\n\nWanda Werkheiser\nGestionnaire de Contrats\nHighpoint Wilderness Specialists\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7
Highpoint_KillAnimals_MultiType_H_desc=Les plantes et animaux indigènes près de <EM4>~mission(Location)</EM4> sont près d'un effondrement écologique en raison des pics démographiques dramatiques de plusieurs espèces envahissantes. Nous avons été engagés pour réduire de manière significative la population actuelle de ces espèces afin d'éviter un effondrement écologique. Nous avons besoin d'un exterminateur dédié et hautement qualifié pour exécuter ce contrat. \n\nVous pouvez mieux vous familiariser avec les créatures en question en consultant <EM4>"Le Guide de la Faune de Stanton"</EM4> dans votre Journal. \n\nCordialement,\n\nWanda Werkheiser\nResponsable des Contrats\nHighpoint Wilderness Specialists\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7
Highpoint_KillAnimals_MultiType_H_title=Effort d'Éradication Intensif
Highpoint_KillAnimals_MultiType_M_desc=Highpoint Wilderness Specialists a pour mission de protéger l'équilibre fragile des écosystèmes de l'empire. Un client nous a récemment engagé pour évaluer l'impact environnemental de plusieurs espèces envahissantes près de <EM4>~mission(Location)</EM4>. Nous avons déterminé que, pour préserver le biodiversité de la région, une régulation de ces espèces est nécessaire. \n\nNous recherchons donc quelqu'un pour nous aider dans cette tâche. Veuillez vous référer au <EM4>"Guide de la Faune de Stanton »</EM4> dans votre journal pour plus d'informations sur les espèces envahissantes. \n\nCordialement,\n\nWanda Werkheiser\nGestionnaire de Contrats\nHighpoint Wilderness Specialists\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7
Highpoint_KillAnimals_MultiType_M_title=Élimination de Créatures Envahissantes
Highpoint_KillAnimals_OneType_title=Réduire la Surpopulation
Highpoint_KillAnimals_rockcracker_desc_E_001=Si vous devez vous rendre dans l'une de ces anciennes Stations QV Breaker dans la Ceinture de Keeger, dans le cadre de votre travail, nous aurions besoin de votre aide pour une autre mission pendant que vous y êtes.\n\nNous avons récemment été contactés par l'Alliance du Peuple pour les aider à préparer ces stations abandonnées en vue de leur remise en état. Malheureusement, une infestation de Valakkar pose de sérieux problèmes non seulement pour les infrastructures des stations, mais également pour leurs chances d'être un jour remises en service. Les Valakkar étant considérés comme une espèce invasive, nous avons décidé que leur élimination était la seule option viable.\n \nRéduisez le nombre de Valakkar dans n'importe laquelle des anciennes stations QV Breaker et nous vous paierons.\n \nCordialement,\n\nWanda Werkheiser\nResponsable des Contrats\nHighpoint Wilderness Specialists\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Highpoint_KillAnimals_rockcracker_title_E_001=Réduire la Population de Valakkars dans les Stations Breaker <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Highpoint_KillAnimals_storm_H_desc_001=En raison de la tempête radioactive qui sévit actuellement sur Pyro I, certains kopions invasifs ont été irradiés. Cela représente une menace pour la santé de la faune indigène et pour les personnes qui vivent et travaillent au <EM4>~mission(Location)</EM4>. \n\nNous recherchons un prestataire qualifié capable d'éliminer tous les kopions irradiés au <EM4>~mission(Location|Address)</EM4>. N'acceptez pas ce contrat si vous ne disposez pas d'armes et d'équipements adaptés pouvant fonctionner de manière fiable dans un environnement radioactif. \n\nVotre rémunération sera ajustée en fonction des risques associés à ce contrat.\n\nCordialement,\n\nWanda Werkheiser\nGestionnaire de Contrats\nHighpoint Wilderness Specialists\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7
Highpoint_KillAnimals_storm_H_title_001=Élimination de Kopions Irradiés
Hockcrow_SearchBody_Easy_Description_001=Agence Hockrow \nDossier #MP51132\nEnquêteur Principal : Arken Mallor\n\nRésumé de l’Affaire : \nNous recherchons un agent pour nous aider à localiser un employé de notre client. Il était en mission dans le ~mission(System) mais n'a plus donné de nouvelles. Notre client commence à craindre le pire.\n\nActions de l’Enquêteur Contractuel : \nLocaliser <EM4>~mission(MissingPersonList)</EM4> à <EM4>~mission(Location|Address)</EM4> et vérifier son état.  \n\nSi la personne est décédée, examinez son corps de près afin que nous puissions confirmer sa mort via votre mobiGlas.\n\nNotes Supplémentaires :\nCe contrat a été signalé comme <EM4>susceptible de donner lieu à des combats</EM4>, alors préparez-vous en conséquence.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +100 Rep
Hockcrow_SearchBody_Easy_Title_001=Localiser un Employé Disparu <EM4>[100 Rep]</EM4>
Hockcrow_SearchBody_Hard_Description_001=Agence Hockrow \nDossier #MP45648\nEnquêteur Principal : Arken Mallor\n\nRésumé de l’Affaire : \nUn client nous a chargés de retrouver l'un de ses proches porté disparu. Après s'être comporté de manière erratique, cette personne a coupé tout contact et est partie pour le ~mission(System). Nous avons pu localiser sa position approximative, mais nous avons besoin d'un enquêteur sur place pour évaluer la situation.\n\nActions de l’Enquêteur Contractuel : \nLocaliser <EM4>~mission(MissingPersonList)</EM4> à <EM4>~mission(Location|Address)</EM4> et vérifier son état. \n\nSi cette personne est décédée, examinez son corps de près afin que nous puissions confirmer sa mort via votre mobiGlas.\n\nNotes Supplémentaires :\nIl y a de fortes chances que vous rencontriez des ennemis pendant vos recherches. Nous vous conseillons d'emmener des renforts à vos côtés.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Sr. Contractor:</EM4> +200 Rep
Hockcrow_SearchBody_Hard_Title_001=Localiser un Proche Disparu <EM4>[200 Rep]</EM4>
Hockcrow_SearchBody_Medium_Description_001=Agence Hockrow \nDossier #MP74384\nEnquêteur Principal : Arken Mallor\n\nRésumé de l’Affaire : \nNous avions envoyé une équipe de deux personnes dans le ~mission(System) pour enquêter sur une affaire, mais nous n'avons reçu aucune nouvelle d'eux depuis plusieurs jours. À ce stade, nous sommes amenés à supposer qu'ils ont rencontré un obstacle imprévu et qu'ils ont peut-être besoin d'être secourus, ou pire, qu'ils ont été tués.\n\n\nActions de l’Enquêteur Contractuel :\nLocaliser <EM4>~mission(MissingPersonList)</EM4> à <EM4>~mission(Location|Address)</EM4> et vérifier leur état.  \n\nS'ils sont décédés, examinez leur corps de près afin que nous puissions confirmer leur mort via votre mobiGlas.\n\nNotes Supplémentaires :\nCompte tenu de la nature dangereuse de leur enquête, il y a de très fortes chances que des ennemis se trouvent sur place.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Contractor:</EM4> +150 Rep
Hockcrow_SearchBody_Medium_Title_001=Localiser une équipe disparue <EM4>[150 Rep]</EM4>
Hockcrow_SearchBody_Super_Description_001=Agence Hockrow \nDossier #MP65648\nEnquêteur Principal : Arken Mallor\n\nRésumé de l’Affaire : \nTout un équipage a disparu alors qu'il effectuait une mission dans le ~mission(System) pour un client dont je ne suis malheureusement pas autorisé à vous révéler tous les détails. Disons simplement que ce n'était pas une mission des plus sûres et que le fait que l'équipage ne réponde pas aux communications n'est pas surprenant, mais inquiétant. Il est vital que nous déterminions ce qui leur est arrivé. \n\nActions de l’Enquêteur Contractuel :\nLocaliser <EM4>~mission(MissingPersonList)</EM4> à <EM4>~mission(Location|Address)</EM4> et vérifier leur état. \n\nS'ils sont décédés, examinez leur corps de près afin que nous puissions confirmer leur mort via votre mobiGlas.\n\nNotes Supplémentaires :\nCette enquête risque fort de vous exposer à des ennemis agressifs et dangereux sur place. Équipez-vous en conséquence et envisagez de vous faire accompagner par d'autres associés compétents.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Head Contractor:</EM4> +300 Rep
Hockcrow_SearchBody_Super_Title_001=Localiser un équipage disparu <EM4>[300 Rep]</EM4>
Hockcrow_SearchBody_VeryEasy_Description_001=Agence Hockrow \nDossier #MP51643\nEnquêteur Principal : Arken Mallor\n\nRésumé de l’Affaire : \nNous recherchons un agent pour enquêter sur le sort d'un client. Ce dernier et son partenaire ne se sont pas présentés à un rendez-vous prévu et aucune tentative pour les contacter n'a abouti. Aux dernières nouvelles, ils étaient en mission dans le ~mission(System) et nous craignons qu'ils aient été victimes d'une tragédie.\n\nActions de l’Enquêteur Contractuel :\nLocaliser <EM4>~mission(MissingPersonList)</EM4> à <EM4>~mission(Location|Address)</EM4> et vérifier leur état. \n\nS'ils sont décédés, examinez leur corps de près afin que nous puissions confirmer leur mort via votre mobiGlas.\n\nNotes Supplémentaires :\nSoyez prudent pendant vos recherches. Si le client a été victime d'un malheur, il serait regrettable que vous subissiez le même sort.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Neutral:</EM4> +100 Rep
Hockcrow_SearchBody_VeryEasy_Title_001=Localiser des clients disparus <EM4>[100 Rep]</EM4>
Hockcrow_SearchBody_VeryHard_Description_001=Agence Hockrow \nDossier #MP12854\nEnquêteur Principal : Arken Mallor\n\nRésumé de l’Affaire :\nOn nous a demandé de retrouver deux prestataires travaillant pour l'un de nos clients, qui a perdu tout contact avec eux. On sait qu'ils voyageaient ensemble pour la dernière fois dans le ~mission(System). Tant que leur situation exacte n’a pas pu être établie, notre client reste dans l’attente. \n\nActions de l’Enquêteur Contractuel :\nLocaliser <EM4>~mission(MissingPersonList)</EM4> à <EM4>~mission(Location|Address)</EM4> et vérifier leur état.\n\nS'ils sont décédés, examinez leur corps de près afin que nous puissions confirmer leur mort via votre mobiGlas.\n\nNotes Supplémentaires :\nVous vous rendrez dans un endroit considéré comme particulièrement dangereux. Il est fortement recommandé d'avoir des renforts pour cette mission.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Veteran Contractor:</EM4> +200 Rep
Hockcrow_SearchBody_VeryHard_Title_001=Localiser des prestataires disparus <EM4>[200 Rep]</EM4>
Hockrow_FacilityDelve_P1M1_desc=Agence Hockrow \nDossier #JD10285\nEnquêteur Principal : Arken Mallor\n\nRésumé de l'Affaire : \nUn client a demandé à Hockrow de constituer un dossier complet sur le tristement célèbre scientifique <EM4>Dr. Logan Jorrit</EM4>. Considéré comme responsable des incidents survenus sur le site Lazarus de Associated Science & Development, le client souhaite obtenir des informations plus détaillées sur le Dr Logan et ses recherches.\n\nActions de l'Enquêteur Contractuel : \nAccéder au <EM4>Complexe Onyx</EM4> ASD, où le Dr Jorrit était autrefois le scientifique en chef.  Une fois sur place, localiser et <EM4>accéder aux dossiers du personnel du laboratoire de recherche</EM4> afin que nous ayons une vue d'ensemble de ce qui s'y passait.\n\nNotes Supplémentaires :\nLa balise QT du site a été désactivée lorsque le site a été fermé, vous devrez donc effectuer manuellement la dernière partie du trajet.\n\nBien qu'ASD ait officiellement fermé le site, la prudence est de mise. Non seulement les laboratoires eux-mêmes peuvent être dangereux, mais les environs semblent avoir été récemment visités. Des charognards ou des squatteurs pourraient se trouver sur place.\n\nJ'ai également réussi à obtenir un identifiant d'employé pour vous. Tant que vous serez en mission, vous pourrez accéder aux ordinateurs sur place.\n\nDe plus, le site Onyx ne dispose que de grands hangars, alors planifiez votre voyage en conséquence.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 3/7
Hockrow_FacilityDelve_P1M1_title=Dossier Jorrit : Fichiers du Personnel Onyx
Hockrow_FacilityDelve_P1M2_desc=Agence Hockrow \nDossier #JD10285\nEnquêteur Principal : Arken Mallor\n\nMise à Jour du Dossier : \nD'après les dossiers du personnel récupérés dans le complexe Onyx, nous avons appris que le Dr. Jorrit s'était récemment rendu sur place et avait consulté des fichiers. La prochaine étape consistera à suivre cette piste et à essayer de découvrir exactement ce qu'il faisait dans son ancien laboratoire.\n\nActions de l'Enquêteur Contractuel :\nExplorer la section <EM4>Ingénierie</EM4> et <EM4>accéder aux fichiers récents du Dr. Jorrit</EM4>.\n\nNotes Supplémentaires :\nJ'ai trouvé une solution au problème de Voyage Quantum, vous pourrez donc désormais vous rendre directement sur le site.\n\nMéfiez-vous des forces hostiles qui pourraient se trouver sur place. \n\nAllez à Onyx avec un véhicule pouvant être garé dans un grand hangar.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 3/7
Hockrow_FacilityDelve_P1M2_title=Dossier Jorrit : Accéder aux Fichiers d'Ingénierie
Hockrow_FacilityDelve_P1M3_desc=Agence Hockrow \nDossier #JD10285\nEnquêteur Principal : Arken Mallor\n\nMise à Jour du Dossier : \nLes fichiers que vous avez trouvés dans l'Ingénierie confirment que le Dr Jorrit mène activement des recherches sur le site, mais ses intentions restent encore floues. J'espère que les données auxquelles il a accédé dans la section Recherche nous permettront d'y voir plus clair.\n\n\nActions de l'Enquêteur Contractuel :\nExplorer la section <EM4>Recherche</EM4> pour localiser et <EM4>accéder aux fichiers récents du Dr Jorrit</EM4>.\n\nNotes Supplémentaires :\nMéfiez-vous des forces hostiles qui pourraient se trouver sur place. \n\nAllez à Onyx avec un véhicule pouvant être garé dans un grand hangar.\n\nUne fois que vous aurez accédé à ces fichiers, je vous enverrai <EM4>5 Disques Durs Sécurisés</EM4> contenant des copie de toutes les données que nous avons recueillies jusqu'à présent. Vous pourrez les récupérer à votre lieu de résidence.\n\n<EM3>ITEM REWARDS</EM3>\n- ASD Secure Drive\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 3/7
Hockrow_FacilityDelve_P1M3_title=Dossier Jorrit : Accéder aux Fichiers de Recherche
Hockrow_FacilityDelve_P2M1_Repeat_desc=Agence Hockrow \nDossier #JD10285\nEnquêteur Principal : Arken Mallor\n\nMise à Jour du Dossier : \nNous aimerions disposer des dernières données sur les anomalies énergétiques afin de les comparer à celles que vous nous avez fournies la dernière fois. Toute différence entre les deux ensembles de données pourrait s'avérer utile.\n\nActions de l'Enquêteur Contractuel :\nExplorer la section <EM4>Ingénierie</EM4> et <EM4>récupérer les données sur les anomalies énergétiques</EM4>, puis les remettre à <EM4>~mission(Destination|Address)</EM4>.\n\nNotes Supplémentaires :\nMéfiez-vous des forces hostiles qui pourraient se trouver sur place. \n\nAllez à Onyx avec un véhicule pouvant être garé dans un grand hangar.\n\nUne fois que vous aurez remis ces données, je vous enverrai un <EM4>Disque Dur Sécurisé ASD</EM4> que vous pourrez récupérer à votre lieu de résidence.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Fresnel Energy LMG\n- Zenith Laser Sniper Rifle\n- [S1-A] Corbel Arms Mire\n- [S1-A] Corbel Core Mire\n- [S1-A] Corbel Helmet Mire\n- [S1-A] Corbel Legs Mire\n- [S1-A] Fresnel Energy LMG Battery (165 Cap)\n- [S1-A] Geist Armor Arms Forest\n- [S1-A] Geist Armor Core Forest\n- [S1-A] Geist Armor Helmet Forest\n- [S1-A] Geist Armor Legs Forest\n- [S3-A] Novikov Backpack Mire\n\n<EM3>ITEM REWARDS</EM3>\n- ASD Secure Drive\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
Hockrow_FacilityDelve_P2M1_Repeat_title=Dossier Jorrit : Données Actualisées sur l’Anomalie Énergétique <EM4>[BP]</EM4>
Hockrow_FacilityDelve_P2M1_desc=Agence Hockrow \nDossier #JD10285\nEnquêteur Principal : Arken Mallor\n\nMise à Jour du Dossier : \nL'examen des derniers dossiers du Dr. Jorrit que vous m'avez transmis nous a laissé plus de questions que de réponses. Nous savons avec certitude qu'il s'est rendu à Onyx, mais nous ignorons encore ce qu'il y faisait exactement. Le client veut absolument en savoir plus sur les agissements de Jorrit, je crains donc que vous ne deviez retourner sur place.\n\nJ'ai quelques idées sur la manière dont nous pourrions utiliser les systèmes du complexe pour cerner ses activités, mais vous devrez cette fois-ci me rapporter physiquement les données afin que nous puissions les analyser correctement. Commencez par les capteurs d'énergie dans le département Ingénierie. Ils sont toujours actifs et suffisamment sensibles pour détecter toute anomalie.\n\nActions de l'Enquêteur Contractuel :\nExplorer la section <EM4>Ingénierie</EM4>, <EM4>récupérer les données sur les anomalies énergétiques</EM4> et les amener à <EM4>~mission(Destination|Address)</EM4>.\n\nNotes Supplémentaires :\nMéfiez-vous des forces hostiles qui pourraient se trouver sur place. \n\nAllez à Onyx avec un véhicule pouvant être garé dans un grand hangar.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7
Hockrow_FacilityDelve_P2M1_title=Dossier Jorrit : Récupérer des Données d'Anomalie Énergétique
Hockrow_FacilityDelve_P2M2_Repeat_desc=Agence Hockrow \nDossier #JD10285\nEnquêteur Principal : Arken Mallor\n\nMise à Jour du Dossier : \nPar mesure de précaution, il serait bon de vérifier si les systèmes de sécurité ont détecté quelque chose de nouveau depuis la dernière série de données que vous avez transmises. Nous pourrons ainsi être certains d'être au courant de tout ce qui se passe sur place.\n\nActions de l'Enquêteur Contractuel :\nExplorer l'aile <EM4>Recherche</EM4>, <EM4>récupérer les données de sécurité</EM4> et les transmettre à <EM4>~mission(Destination|Address)</EM4>.\n\nNotes Supplémentaires :\nMéfiez-vous des forces hostiles qui pourraient se trouver sur place. \n\nAllez à Onyx avec un véhicule pouvant être garé dans un grand hangar.\n\nUne fois que vous aurez remis ces données, je vous enverrai un <EM4>Disque Dur Sécurisé ASD</EM4> que vous pourrez récupérer à votre lieu de résidence.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Fresnel "Rockfall" Energy LMG\n- Zenith "Landslide" Laser Sniper Rifle\n- [S1-A] Corbel Arms Patina\n- [S1-A] Corbel Core Patina\n- [S1-A] Corbel Helmet Patina\n- [S1-A] Corbel Legs Patina\n- [S1-A] Fresnel Energy LMG Battery (165 Cap)\n- [S1-A] Geist Armor Arms\n- [S1-A] Geist Armor Core\n- [S1-A] Geist Armor Helmet\n- [S1-A] Geist Armor Legs\n- [S3-A] Novikov Backpack Patina\n\n<EM3>ITEM REWARDS</EM3>\n- ASD Secure Drive\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
Hockrow_FacilityDelve_P2M2_Repeat_title=Dossier Jorrit : Données de Sécurité Mises à Jour <EM4>[BP]</EM4>
Hockrow_FacilityDelve_P2M2_desc=Agence Hockrow \nDossier #JD10285\nEnquêteur Principal : Arken Mallor\n\nMise à Jour du Dossier : \nNous avons pu extraire des données très intéressantes à partir de ce que vous nous avez fourni, mais nous n'avons toujours pas une idée suffisamment claire de la situation. Ce que nous avons toutefois appris concrètement, c'est que le système de surveillance de sécurité d'Onyx est toujours opérationnel. Les données qui s'y trouvent seront votre prochaine cible.\n\nActions de l'Enquêteur Contractuel :\nExplorer la section <EM4>Recherche</EM4>, <EM4>récupérer les données de sécurité</EM4> et les remettre à <EM4>~mission(Destination|Address)</EM4>.\n\nNotes Supplémentaires :\nMéfiez-vous des forces hostiles qui pourraient se trouver sur place. \n\nAllez à Onyx avec un véhicule pouvant être garé dans un grand hangar.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7
Hockrow_FacilityDelve_P2M2_title=Dossier Jorrit : Récupérer des Données de Sécurité
Hockrow_FacilityDelve_P2M3_Repeat_desc=Agence Hockrow \nDossier #JD10285\nEnquêteur Principal : Arken Mallor\n\nMise à Jour du Dossier : \nL'un des principaux problèmes dans le cadre d'enquêtes en cours est que les informations deviennent obsolètes. Pour remédier à cela, je vais vous demander de retourner à Onyx et de récupérer les dernières données des capteurs sismiques. Il serait utile de voir ce que les dernières mesures indiquent.\n\nExplorer la section <EM4>Recherche</EM4>, <EM4>récupérer les données sismiques</EM4> et les remettre à <EM4>~mission(Destination|Address)</EM4>.\n\nNotes Supplémentaires :\nMéfiez-vous des forces hostiles qui pourraient se trouver sur place.\n \nAllez à Onyx avec un véhicule pouvant être garé dans un grand hangar.\n\nUne fois que vous aurez remis ces données, je vous enverrai un <EM4>Disque Dur Sécurisé ASD</EM4> que vous pourrez récupérer à votre lieu de résidence.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Zenith "Thunderstrike" Laser Sniper Rifle\n- [S1-A] Corbel Arms Halcyon\n- [S1-A] Corbel Core Halcyon\n- [S1-A] Corbel Helmet Halcyon\n- [S1-A] Corbel Legs Halcyon\n- [S1-A] Geist Armor Arms Desert\n- [S1-A] Geist Armor Arms Whiteout\n- [S1-A] Geist Armor Core Desert\n- [S1-A] Geist Armor Core Whiteout\n- [S1-A] Geist Armor Helmet Desert\n- [S1-A] Geist Armor Helmet Whiteout\n- [S1-A] Geist Armor Legs Desert\n- [S1-A] Geist Armor Legs Whiteout\n- [S1-A] Zenith Laser Sniper Rifle Battery (22 Cap)\n- [S3-A] Novikov Backpack Halcyon\n\n<EM3>ITEM REWARDS</EM3>\n- ASD Secure Drive\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
Hockrow_FacilityDelve_P2M3_Repeat_title=Dossier Jorrit : Données Sismiques Mises à jour <EM4>[BP]</EM4>
Hockrow_FacilityDelve_P2M3_desc=Agence Hockrow \nDossier #JD10285\nEnquêteur Principal : Arken Mallor\n\nMise à Jour du Dossier : \nGrâce aux dernières données que vous nous avez transmises, nous commençons à comprendre ce que fait le Dr Jorrit là-bas. Nous avons une chronologie approximative de ses activités. Il semble que davantage de matériel entre dans Onyx qu'il n'en sort, ce qui est intéressant. Nous avons toutefois besoin de plus d'informations. Une ancienne expérience est en cours là-bas, qui surveille les changements sismiques infimes. Si vous pouvez me transmettre ces données, cela nous aidera à localiser certains mouvements autour du complexe.\n\nActions de l'Enquêteur Contractuel :\nExplorer la section <EM4>Recherche</EM4>, <EM4>récupérer les données sismiques</EM4> et les remettre à <EM4>~mission(Destination|Address)</EM4>\n\nNotes Supplémentaires :\nMéfiez-vous des forces hostiles qui pourraient se trouver sur place.\n \nAllez à Onyx avec un véhicule pouvant être garé dans un grand hangar.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7
Hockrow_FacilityDelve_P2M3_title=Dossier Jorrit : Récupérer des Données Sismiques
Hockrow_FacilityDelve_P2M4_Repeat_title=Dossier Jorrit : Données Actualisées sur la Consommation d'Énergie <EM4>[BP]</EM4>
Hockrow_FacilityDelve_P2M4_desc=Agence Hockrow \nDossier #JD10285\nEnquêteur Principal : Arken Mallor\n\nMise à Jour du Dossier : \nLes données sismiques que vous avez extraites ont révélé des informations intéressantes. Mon experte pense que Jorrit a peut-être effectué des excavations à cet endroit. Je préfère ne pas imaginer ce qu'il fait, mais c'est notre travail de le découvrir. Je pense que nous sommes sur le point de résoudre cette affaire, alors retournez à Onyx et récupérez les données sur la Consommation d'Énergie. Si nous parvenons à retracer le flux d'énergie des deux derniers mois, un scénario devrait se dégager. \n\nActions de l'Enquêteur Contractuel :\nExplorer la section <EM4>Ingénierie</EM4> et <EM4>télécharger les données sur la Consommation d'Énergie</EM4>.\n\nNotes Supplémentaires :\nMéfiez-vous des forces hostiles qui pourraient se trouver sur place. \n\nAllez à Onyx avec un véhicule pouvant être garé dans un grand hangar.\n\nUne fois que vous m'aurez transmis ces données, je vous enverrai <EM4>10 Disques Durs Sécurisés</EM4> contenant des copies des informations que nous avons recueillies jusqu'à présent. Vous pourrez les récupérer à votre  lieu de résidence.\n\n<EM3>ITEM REWARDS</EM3>\n- ASD Secure Drive\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7
Hockrow_FacilityDelve_P2M4_title=Dossier Jorrit : Données de Consommation d'Énergie
Hockrow_FacilityDelve_P3M1_desc=Agence Hockrow \nDossier #JD10285\nEnquêteur Principal : Arken Mallor\n\nMise à Jour du Dossier : \nToutes vos recherches sur Onyx ont porté leurs fruits. J'ai pu confirmer que Jorrit dirigeait un laboratoire secret dans le Site-B du complexe pour mener une expérience appelé "Projet Hyperion". Je vous enverrai ses <EM4>notes sur votre journal mobiGlas</EM4> une fois que vous serez en route, mais en résumé, ce salaud essaie de faire évoluer les humains ou un truc du genre.\n\nLe client veut les données expérimentales, donc retournez à Onyx et faites tout ce qu'il faut pour que le Projet Hyperion soit opérationnel. \n\nActions de l'Enquêteur Contractuel :\nPréparer l'expérience en récupérant un <EM4>code Réactif dans la section Ingénierie</EM4> et un <EM4>code Catalyseur dans la section Recherche</EM4>.\n\nUne fois ces codes en votre possession, rendez-vous au <EM4>laboratoire du Site-B</EM4> et <EM4>lancez l'expérience</EM4> afin de pouvoir <EM4>télécharger les résultats</EM4>.\n\nNotes Supplémentaires :\nComme il s'agit d'un laboratoire en activité, il se peut que des agents de sécurité d'ASD soient présents sur place.\n \nAllez à Onyx avec un véhicule pouvant être garé dans un grand hangar.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Fresnel "Molten" Energy LMG\n- Zenith "Darkwave" Laser Sniper Rifle\n- [S1-A] Geist Armor Arms ASD Edition\n- [S1-A] Geist Armor Core ASD Edition\n- [S1-A] Geist Armor Helmet ASD Edition\n- [S1-A] Geist Armor Legs ASD Edition\n- [S1-A] Zenith Laser Sniper Rifle Battery (22 Cap)\n- [MIL-S1-B] DynaFlux\n- [MIL-S2-B] Bolide\n- [MIL-S3-B] Fulgur\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Blueprint Reward:</EM4> 100% chance (Repeat only)\n\n<EM4>? = only the Repeat variant awards blueprints</EM4>
Hockrow_FacilityDelve_P3M1_title=Dossier Jorrit : Projet Hyperion <EM4>[BP?]</EM4>
Hurston_bounty_boss_dc_desc_001=SOUS-TRAITANCE HURSTON DYNAMICS\nCONTRAT : Collecte Prime\nGESTIONNAIRE DE SOUS-TRAITANCE : I. Takao\nÉVALUATION DES RISQUES : Cibles à Risque Élevé (soutien armé)\n\nHurston Dynamics est à la recherche d'un prestataire pour mener à bien une prime pour ~mission(TargetName). Cette prime s'est révélée extrêmement insaisissable jusqu'à présent, mais les rapports des services de renseignements ont permis de localiser la cible et une cohorte de ses associés connus jusqu'à ~mission(Location|Address).\n\nCependant, il y a de fortes chances que ~mission(TargetName|Last) ne prenne pas le risque d'une confrontation à moins d'y être absolument obligée. Nous vous recommandons de neutraliser d'abord une grande partie des alliés du criminel afin de les faire sortir. Le rapport indique qu'une grande partie de ces hostiles se trouve actuellement à proximité de ~mission(Location).\n\nLe paiement ne sera effectué qu'une fois que la prime aura été considérée comme complète.\n\n\n\n\n** Les informations transmises peuvent contenir des éléments confidentiels et/ou privilégiés. Tout examen, retransmission, diffusion, autre utilisation ou prise de mesures fondées sur ces informations par des personnes ou entités autres que le destinataire prévu est interdit. **\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Juggernauts x1, Snipers x2, Soldiers x13, Technicians x3
Hurston_bounty_boss_dc_title_001=Prime Insaisissable : ~mission(TargetName) (CRE) <EM4>[500 Rep]</EM4>
Hurston_bounty_multiboss_dc_desc_001=SOUS-TRAITANCE HURSTON DYNAMICS\nCONTRAT : Collecte Prime\nGESTIONNAIRE DE SOUS-TRAITANCE : I. Takao\nÉVALUATION DES RISQUES : Cibles à Risque Très Élevé (soutien armé)\n\nHurston Dynamics est à la recherche d'un prestataire pour mener à bien une prime pour ~mission(TargetName). Cette cible et l'importante force hostile avec laquelle elle voyage viennent d'être signalées comme ayant attaqué ~mission(Location|Address). \n\nCependant, si leur mode opératoire est vrai, ~mission(TargetName|Last) est généralement restée cachée pendant les attaques, préférant diriger ses forces à distance. Nous vous recommandons de vous concentrer d'abord sur l'élimination de leurs alliés, et une fois que leur nombre aura été significativement affaibli, ~mission(TargetName|Last) n'aura d'autre choix que de vous affronter directement.\n\nLe paiement ne sera effectué qu'une fois que la prime aura été considérée comme complète.\n\n\n\n\n** Les informations transmises peuvent contenir des éléments confidentiels et/ou privilégiés. Tout examen, retransmission, diffusion, autre utilisation ou prise de mesures fondées sur ces informations par des personnes ou entités autres que le destinataire prévu est interdit. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Backup x5, Juggernauts x1, Soldiers x18, Technicians x32
Hurston_bounty_multiboss_dc_title_001=Prime Insaisissable : ~mission(TargetName) (CRTE) <EM4>[1,000 Rep]</EM4>
Hurston_eliminateall_dc_desc_001=SOUS-TRAITANCE HURSTON DYNAMICS\nCONTRAT : Neutraliser Forces Hostiles\nGESTIONNAIRE DE SOUS-TRAITANCE : T. Dalik\nÉVALUATION DES RISQUES : Élevé\n\nNos forces de sécurité ont été informées d'une incursion de hors-la-loi en cours à ~mission(Location|Address), et nous avons besoin d'un prestataire indépendant capable d'éliminer les éléments hostiles. \n\nSelon le personnel sur place, les hors-la-loi sont actuellement retranchés près de ~mission(Location). Approchez-vous avec prudence et préparez-vous à utiliser une force létale si les hors-la-loi refusent de se laisser faire.\n\nLe paiement ne sera accordé qu'une fois le lieu effectivement nettoyé.\n\n\n\n\n** Les informations transmises peuvent contenir des éléments confidentiels et/ou privilégiés. Toute analyse, retransmission, diffusion ou autre utilisation de ces informations par des personnes ou entités autres que le destinataire prévu est interdite. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> CQC x20, Soldiers x4
Hurston_eliminateall_dc_title_001=Neutralisation d'Incursion Hors-la-loi <EM4>[500 Rep]</EM4>
Hurston_eliminatespecifc_dc_desc_001=SOUS-TRAITANCE HURSTON DYNAMICS\nCONTRAT : Collecte Prime\nGESTIONNAIRE DE SOUS-TRAITANCE : T. Davik\nÉVALUATION DES RISQUES : Cible à Risque Modéré\n\nHurston Dynamics est à la recherche d'un prestataire pour mener à bien une prime pour ~mission(TargetName). Les rapports des services de renseignements ont permis de localiser la cible à ~mission(Location|Address) où elle a été vue pour la dernière fois près de ~mission(Location). \n\nPréparez-vous à ce qu'elle résiste à l'appréhension et utilisez la force létale si nécessaire\n\nLe paiement ne sera effectué qu'une fois que la prime aura été considérée comme complète.\n \n\n\n\n** Les informations transmises peuvent contenir des éléments confidentiels et/ou privilégiés. Toute analyse, retransmission, diffusion ou autre utilisation de ces informations par des personnes ou entités autres que le destinataire prévu est interdite. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> CQC x18, Juggernauts x1, Snipers x2, Soldiers x6
Hurston_eliminatespecifc_dc_title_001=Prime Localisée : ~mission(TargetName) (CRM) <EM4>[500 Rep]</EM4>
Hurston_searchbody_dc_desc_001=SOUS-TRAITANCE HURSTON DYNAMICS\nCONTRAT : Localiser Personne Disparue\nGESTIONNAIRE DE SOUS-TRAITANCE : T. Davik\nÉVALUATION DES RISQUES : Faible\n\nLe personnel de ~mission(Location|Address) a récemment signalé la disparition de ~mission(TargetName). Cette personne est portée disparue depuis plusieurs jours et a été vue pour la dernière fois se dirigeant vers ~mission(Location).\n\nVous êtes chargé de rechercher sur place ~mission(TargetName|Last) et de voir si vous pouvez localiser cette personne. \n\nLe paiement est conditionné par la transmission de son emplacement actuel, vivant ou mort.\n\n\n\n\n** Les informations transmises peuvent contenir des éléments confidentiels et/ou privilégiés. Toute analyse, retransmission, diffusion ou autre utilisation de ces informations par des personnes ou entités autres que le destinataire prévu est interdite. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
InterSec_KillShip_Vanduul_Desc_Super_001=DÉTAILS DE LA MISSION\n\nZone d'Opération : Système Nyx\nForces Hostiles : Vanduuls\nÉquipement Requis : Vaisseau de Combat\nBriefing :InterSec a besoin des services d'un pilote expérimenté prêt à aider à neutraliser une cible Vanduul dangereuse impliquée dans de nombreuses attaques. \n\nLes incursions Vanduul se sont multipliées récemment, menaçant non seulement le système Nyx, mais aussi l'UEE dans son ensemble. Il est impératif de réagir rapidement et efficacement à ces observations. \n\nNous vous demandons de vous rendre au dernier point d'observation connu du vaisseau vanduul à <EM4>~mission(Location|Address)</EM4> et de l'éliminer immédiatement.  \n\nLes pilotes vanduuls sont très compétents et extrêmement dangereux. Engagez immédiatement le combat et n'hésitez pas, car ils ne feront preuve d'aucune pitié. \n\nUne compensation proportionnelle au risque du contrat vous sera versée.\n\n\nCordialement, \nDeacon Tobin\nResponsable des Opérations\nInterSec Defense Solutions\n\nCette communication consiste en une offre non-contractuelle, qui, une fois acceptée, pourra être résiliée à tout moment sans préavis par l'une ou l'autre des parties. Toutes les opérations s'effectuent aux risques et périls du prestataire et doivent respecter la législation de l'UEE et du système, le cas échéant.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
InterSec_KillShip_Vanduul_Title_Super_001=Éliminer le vaisseau Vanduul <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
InterSec_ResourceGathering_Cryopods_Desc=DÉTAILS DE LA MISSION\n\nZone d'Opération : Système Nyx\nForces Hostiles : Hors-la-loi présents et armés\nÉquipement Requis : <EM4>Vaisseau capable de transporter des marchandises</EM4>,  Armes personnelles, <EM4>rayon tracteur puissant</EM4>\nBriefing : \nNos dernières informations indiquent que les Shattered Blade ont reconstitué leur stock de cadavres vanduuls et qu'ils s'apprêtent à les transférer depuis l'ancienne <EM4>station QV Logistics</EM4> d'où ils opèrent vers un acheteur intéressé. L'UEE ne peut se permettre un autre incident comme celui qui s'est produit avec ASD, il tient donc à ce que nous <EM4>récupérions les cryopods</EM4> et les livrions au <EM4>monte-charge situé à ~mission(Destination|Address)</EM4>.\n\nBien que les Shattered Blade présents sur place puissent opposer une résistance, ils ne constituent pas l'objectif principal de votre mission. Ne vous occupez d'eux que si nécessaire et récupérez les cryopods.\n\nCordialement, \n\nDeacon Tobin\nResponsable des Opérations\nInterSec Defense Solutions\n\nCette communication contient des informations confidentielles destinées uniquement au destinataire. Si vous recevez ce message par erreur, merci de ne pas en tenir compte et de contacter l'expéditeur. Toutes les opérations s'effectuent aux risques et périls du prestataire et doivent respecter la législation de l'UEE et du système, le cas échéant.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Pulse Laser Pistol\n- [S1-A] Pulse Laser Pistol Battery (60 Cap)\n- [S1-A] Testudo Arms Earthshake\n- [S1-A] Testudo Core Earthshake\n- [S1-A] Testudo Helmet Earthshake\n- [S1-A] Testudo Legs Earthshake\n- [S2-A] Testudo Backpack Earthshake\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 6/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
InterSec_ResourceGathering_Cryopods_Title=Récupération de Cadavres Vanduul <EM4>[BP]</EM4>
InterSec_ResourceGathering_Tech_Desc=DÉTAILS DE LA MISSION\n\nZone d'Opération : Système Nyx\nForces Hostiles :  Hors-la-loi présents et armés\nÉquipement Requis : Vaisseau de combat,  Armes Personnelles\nBriefing : \nAfin d'empêcher les Shattered Blade d'inonder le marché noir de marchandises de contrebande extraterrestres, l'UEE a chargé InterSec de <EM4>récupérer une cache de blindage et de métal vanduuls</EM4> dans l'ancienne <EM4>station QV Logistics</EM4> occupée par le gang. Une fois que vous aurez récupéré les matériaux, livrez-les au monte-charge situé à <EM4>~mission(Destination|Address)</EM4>.\n\nCompte tenu de votre expérience passée, il ne serait pas surprenant que les Shattered Blade opposent une résistance, mais concentrez-vous avant tout sur la récupération des matériaux.\n\nCordialement, \n\nDeacon Tobin\nResponsable des Opérations\nInterSec Defense Solutions\n\nCette communication contient des informations confidentielles destinées uniquement au destinataire. Si vous recevez ce message par erreur, merci de ne pas en tenir compte et de contacter l'expéditeur. Toutes les opérations s'effectuent aux risques et périls du prestataire et doivent respecter la législation de l'UEE et du système, le cas échéant.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Pulse Laser Pistol\n- [S1-A] Pulse Laser Pistol Battery (60 Cap)\n- [S1-A] Testudo Arms Earthshake\n- [S1-A] Testudo Core Earthshake\n- [S1-A] Testudo Helmet Earthshake\n- [S1-A] Testudo Legs Earthshake\n- [S2-A] Testudo Backpack Earthshake\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 6/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
