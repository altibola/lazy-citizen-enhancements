headhunters_defend_xt_desc_001=Ces punks XenoThreat ont lancé une attaque contre ~mission(Location|Address) et nous cherchons des gens pour aller les repousser. \n\nAllez-y et éliminez tous les XenoThreat que vous voyez. \n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_defend_xt_title_001=Besoin de renfort à l'avant-poste <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
headhunters_defendship_LRT_PA_desc_001=Vous êtes occupé ? Un candidat prometteur faisait une course spéciale pour moi et s’est frotté à l'Alliance du Peuple vers <EM4>~mission(Location|Address)</EM4>. C’est ma faute. Je savais qu’il n’était pas le meilleur au combat, mais je pensais qu’il pourrait s'en sortir sans croiser d’autres vaisseaux. \n\nJe lui ai dit de tenir bon et de faire tout ce qu’il peut pour rester en vie jusqu’à ce que l’aide arrive. Avec vos compétences, ça ne devrait pas être bien sorcier. \n\n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +100 Rep
headhunters_defendship_LRT_PA_title_001=Un Headhunter a Besoin d'Aide <EM4>[100 Rep]</EM4>
headhunters_defendship_LRT_desc_001=Je viens d'apprendre qu'un Headhunters près de ~mission(Location|Address) a été mêlé à une bagarre et qu'il n'arrive pas à aller jusqu'au bout. Cet idiot veut que je lui sauve la mise.\n\nJ'imagine que je suis un tendre, parce que je vais vous payer pour que vous le fassiez à ma place. Qu'en dites-vous ? Vous voulez sauver la vie d'un crétin ?\n\n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +150 Rep
headhunters_defendship_LRT_title_001=Pilote Headhunter en Difficulté <EM4>[150 Rep]</EM4>
headhunters_defendship_MRT_PA_desc_001=Quelques membres de la People's Alliance avec un sérieux instinct suicidaire ont décidé de cibler l’un de nos vaisseaux. On a besoin de quelqu’un pour filer à toute vitesse vers <EM4>~mission(Location|Address)</EM4> et leur montrer ce qui arrive quand on s’en prend aux Headhunters.\n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +150 Rep
headhunters_defendship_MRT_PA_title_001=Besoin de Renforts Maintenant <EM4>[150 Rep]</EM4>
headhunters_defendship_MRT_desc_001=Un de mes pilotes n'avait pas les idées claires et s'est retrouvé mêlé à un tas d'ennuis sur ~mission(Location|Address). \n\nLe vrai problème, c'est que l'imbécile a une soute pleine. Je ne peux pas vraiment me permettre de perdre ce qu'ils transportent, alors j'apprécierais que vous alliez les tirer d'affaire pour moi. \n\n- Stows terminé\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +200 Rep
headhunters_defendship_MRT_title_001=Vaisseau Headhunter à Besoin d'Aide <EM4>[200 Rep]</EM4>
headhunters_defendship_VLRT_PA_desc_001=On dirait que certains ne sont tout simplement pas faits pour le combat. J’ai envoyé un jeune espoir en patrouille, et maintenant je suis bombardé de messages disant qu’il tient à peine le coup. Il m’a donné les détails sur son adversaire et j’ai failli tomber de ma chaise en rigolant. \n\nSi ce gamin ne peut même pas gérer un vaisseau de l'Alliance du Peuple, il n’est clairement pas prêt pour une vraie affectation. J’apprécierais quand même que vous lui sauviez la peau. \n\nSi vous êtes disponible, pourriez-vous vous rendre à <EM4>~mission(Location|Address)</EM4> et lui montrer comment on fait ça correctement ?\n\n-Stows\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x2\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep
headhunters_defendship_VLRT_PA_title_001=Au Secours d'un Nouveau Venu Headhunters <EM4>[100 Rep]</EM4>
headhunters_defendship_VLRT_desc_001=Il semblerait que des petits nouveaux aient essayé de s'immiscer dans nos opérations en frappant un vaisseau Headhunters près de ~mission(Location|Address). Je ne sais pas trop comment ils comptaient s'en sortir.\n\nIls doivent apprendre à leurs dépens que ce n'est pas comme ça que ça marche à Pyro. Vous êtes prêts à aller là-bas et à donner une leçon à ces bâtards ?\n\n- Stows terminé\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep
headhunters_defendship_VLRT_title_001=Pilote Headhunter à Besoin Coup de Main <EM4>[100 Rep]</EM4>
headhunters_defendship_multi_HRT_PA_desc_001=J’ai envoyé des vaisseaux pour vérifier une balise de détresse, mais ils sont tombés dans une embuscade de l'Alliance du Peuple. Ils se battent comme des chiens pour essayer de s’en sortir mais n’arrivent pas à décrocher. \n\nIl leur faut un coup de main, immédiatement. Vous pouvez vous rendre à <EM4>~mission(Location|Address)</EM4> pour leur apporter votre aide ?\n\n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Sr. Contractor:</EM4> +200 Rep
headhunters_defendship_multi_HRT_PA_title_001=Trancher Dans Le Vif <EM4>[200 Rep]</EM4>
headhunters_defendship_multi_SRT_PA_desc_001=On est dans un vrai bourbier. Un vaisseau Headhunter en mission importante s’est fait attaquer près de <EM4>~mission(Location|Address)</EM4>. Je ne peux pas entrer dans les détails, mais il est absolument vital qu’il survive. Et l'Alliance du Peuple est bien au courant, car elle met tout en œuvre pour l'éliminer. \n\nJe ne vais pas mâcher mes mots, c’est une situation très grave, du genre que beaucoup ne survivraient pas. Si vous y arrivez, je chanterai vos louanges et je vous paierai comme il faut. \n\n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Head Contractor:</EM4> +300 Rep
headhunters_defendship_multi_SRT_PA_title_001=En Quête d'un Putain de Héros <EM4>[300 Rep]</EM4>
headhunters_defendship_multi_VHRT_PA_desc_001=Un de nos Clips est dans un sale pétrin. Je viens de recevoir un message disant que son convoi est submergé par l'Alliance du Peuple et qu’ils ont besoin d’aide immédiatement. Bon, disons qu’il l’a formulé de façon beaucoup plus imagée. Et je n’ai aucune envie d’entendre ce qu’il me dira s’il ne survit pas et doit se faire régénérer. \n\nSi ce Clip panique, c’est que la situation est vraiment sérieuse. On a vraiment besoin que vous alliez à <EM4>~mission(Location|Address)</EM4> tout de suite et que vous vous assuriez qu’il s’en sorte vivant.\n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Veteran Contractor:</EM4> +250 Rep
headhunters_defendship_multi_VHRT_PA_title_001=Renforts pour le Convoi d'un de nos Clips <EM4>[250 Rep]</EM4>
headhunters_eliminateall_XT_derelicts_desc_01=L'un de nos Juges a eu vent de la tentative XenoThreat de s'installer sur notre territoire. Il semblerait qu'ils essaient de prendre le contrôle de ~mission(Location|Address). Nous ne voulons pas laisser ces psychopathes prendre pied dans le système plus qu'ils ne l'ont déjà fait, alors nous mettons en jeu notre crédibilité pour les faire reculer.\n\nNous voulons que vous leur tombiez dessus sans ménagement. Ne les lâchez pas jusqu'à ce que tout l'endroit soit un cimetière. Nous vous enverrons votre paiement une fois que les corps seront prêts à être enterrés.\n\n- Stows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x2, Snipers x2, Soldiers x4, Technicians x3\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_XT_derelicts_title_01=Guerre de Territoire <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
headhunters_eliminateall_base_Generic_E_desc_001=Alors voilà, il y a des petites ordures qui se prennent pour des caïds et qui sortent d'une base près de ~mission(Location|Address). Je ne sais pas quelle merde toxique ils boivent, mais ils ont pensé que ce serait une bonne idée de marcher sur des Gars Headhunters. J'en ai tué un, blessé trois autres. Je cherche donc à envoyer quelqu'un là-bas pour faire exploser leur ambition à même leur crâne. Vous obtiendrez un bon nombre de crédits pour cela.\n\n- Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x27\n<EM4>Jr. Contractor:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_base_Generic_E_title_001=Besoin d'un tueur <EM4>[BP]</EM4> <EM4>[50 Rep]</EM4>
headhunters_eliminateall_cfp_E_desc_001=Besoin de quelqu'un pour nettoyer ~mission(Location|Address). Les forces de sécurité des CFP ont pris l'avant-poste à un groupe d'habitants qui s'y trouvaient depuis des années. Il paraît qu'ils ont été battus à plate couture, alors ils sont venus demander vengeance aux Headhunters. \n\nJ'ai besoin que ce soit fait rapidement et proprement. \n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x1, Juggernauts x2, Snipers x1, Soldiers x2, Technicians x2\n<EM4>Jr. Contractor:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_cfp_E_title_001=Attaquer un site des CFP <EM4>[BP]</EM4> <EM4>[50 Rep]</EM4>
headhunters_eliminateall_cfp_M_desc_001=Le Juge a fait savoir que nous devions nous rendre à ~mission(Location|Address). C'est une propriété des CFP et les forces de sécurité se sont montrées peu hospitalières avec certains habitants, alors ils doivent s'en aller.\n\nIls ont beau dire qu'ils apportent la sécurité, ils ont des armes et sont plus qu'heureux de s'en servir.\n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x2, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Jr. Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_cfp_M_title_001=~mission(Location) a été mis en service <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
headhunters_eliminateall_cfp_desc_001=Voilà ce qu'il en est. Certains de ces mercenaires que les CFP ont engagés comme agents de sécurité sont allés descendre des Headhunters qui se déplaçaient dans le système. Ils ne faisaient rien, à part voler.\n\nQuoi qu'il en soit, nous les avons retrouvés à ~mission(Location|Address) et nous voulons leur rendre la monnaie de leur pièce. Prenez votre équipement et devenez notre bras armé, nous ferons en sorte que cela en vaille la peine.\n\n- Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_cfp_title_001=Recherche d'une petite revanche <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
headhunters_eliminateall_outpost_desc_01=Certains connards refusent de nous payer ce qui nous est dû. Le problème, c'est que ces idiots s'en vantent. S'ils avaient gardé le silence, nous aurions pu nous en occuper de manière plus chirurgicale, mais maintenant nous devons envoyer un message.\n\nCes imbéciles opèrent depuis ~mission(Location|Address). Nous avons besoin qu'ils partent tous. Faites-le aussi fort que possible. Nous vous enverrons votre paiement une fois que tout le monde sera parti.\n\n- Stows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_outpost_title_01=Gestion de la Réputation <EM4>[BP]</EM4> <EM4>[25–300 Rep]</EM4>
headhunters_eliminateall_retrievestolen_base_Generic_M_desc_001=Une équipe locale a décidé d'attaquer un de nos convois et de voler notre matériel. Ils se sont enfuis, mais nous n'allons pas les laisser se réjouir longtemps. Je veux que vous vous rendiez à ~mission(Location|Address) où ils ont une base, que vous les réduisiez en cendres et que vous récupériez nos affaires. \n\nUne fois la cargaison récupérée, emmenez-la à ~mission(Destination|Address) et nous pourrons tous oublier l'existence de ces connards.\n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x27\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_retrievestolen_base_Generic_M_title_001=Mort et cargo <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
headhunters_eliminateall_xt_desc_001=C'est triste à dire, mais nous avons perdu l'un de nos avant-postes à cause de XenoThreat. C'est effroyable si vous voulez mon avis, mais c'est pourquoi nous cherchons quelqu'un qui a le temps et les munitions pour le reprendre.\n\nSi c'est vous, rendez-vous à ~mission(Location|Address) et reprenez le flambeau.\n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x4, Technicians x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_xt_title_001=Feu vert pour ~mission(Location) <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
headhunters_eliminatespecific_desc_001=Une information intéressante vient de me tomber dessus. Le fameux chef XenoThreat ~mission(TargetName) est terré à ~mission(location|address) où il travaille sur une grosse opération pour eux. L'occasion rêvée de tuer cette merde une bonne fois pour toutes.\n\nLe fait est que les Xénos ont les yeux rivés sur les opérations des Headhunter en ce moment. Il n'y a aucun moyen de mobiliser et de déployer un équipage sans que ~mission(TargetName|Last) soit informé. Je vous offre donc la chance de faire de Pyro un endroit meilleur et de gagner de l'argent en même temps.\n\nSi vous êtes intéressé, je vous suggère de vous équiper et de trouver des renforts avant de partir. Vous ne serez payé que si vous éliminez ~mission(TargetName|Last), mais n'hésitez pas à liquider tous les autres "petits Xeno-voyoux" qui pourraient se cacher parmi eux. \n\nStows terminé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x1
headhunters_eliminatespecific_title_001=Mûr pour la Récolte <EM4>[1,000 Rep]</EM4>
headhunters_killship_asteroid_rank0_desc_001=Alors voilà, les Headhunters cherchent à élargir leur vivier de talents et ont quelques postes à pourvoir pour tous ceux qui en ont les moyens.\n\nIl y a une véritable bête de somme nommée ~mission(TargetName) qui pense avoir été très intelligente en ponctionnant les cargaisons des transporteurs qui circulent dans le système. Nous leur avons demandé une part de leurs bénéfices en tant que taxe de licence pour continuer à opérer. Lorsque ~mission(TargetName|Last) a répondu, ils ont été très irrespectueux.\n\nNous avons suivi leur vaisseau jusqu'à ~mission(Location|Address) et nous devons les éliminer. Vous devriez savoir qu'ils sont intelligents et qu'ils se rapprochent de certains alliés pour ne pas être seuls.\n\nFaites cela et nous vous considérerons pour un futur travail de Headhunters.\n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1\n<EM4>Neutral:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_killship_asteroid_rank0_title_001=Procédure Accéléré d'Élimination de Cible <EM4>[BP]</EM4> <EM4>[50 Rep]</EM4>
headhunters_killship_asteroid_rank1_desc_001=Il y a un nid à détruire autour de ~mission(Location|Address) qui a été occupé par des squatters. Nous ne nous soucions pas de la plupart d'entre eux, mais on nous a dit qu'ils abritaient ~mission(TargetName) qui a une longue histoire de vol de butin de Headhunters. Il est temps de les éliminer.\n\n~mission(TargetName|Last) est à bord d'un vaisseau, mais peut compter sur les défenses de la base pour le protéger, alors soyez prudents. Vous les tuez, vous êtes payés. \n\nVous savez, comme d'habitude. Vous vous retirez.\n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1\n<EM4>Jr. Contractor:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_killship_asteroid_rank1_title_001=Cible à ~mission(Location) <EM4>[BP]</EM4> <EM4>[50 Rep]</EM4>
headhunters_killship_cfp_hrt_desc_001=J'ai besoin qu'on abatte un autre vaisseau des CFP. Il appartient à ~mission(TargetName), qui a chassé des habitants de leurs maisons parce qu'ils n'acceptaient pas l'aide des Citizens for Prosperity. C'est une véritable plaie et nous avons reçu le feu vert pour l'éliminer. \n\nSon vaisseau a été repéré aux alentours de ~mission(Location|Address), alors allez-y et faites le nécessaire.\n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1\n<EM4>Veteran Contractor:</EM4> +600 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_killship_cfp_hrt_title_001=Ordre d'Exécution <EM4>[BP]</EM4> <EM4>[600 Rep]</EM4>
headhunters_killship_cfp_mrt_desc_001=Les forces de sécurité des CFP ont attaqué des locaux et nous cherchons à rétablir l'équilibre. Nous avons eu vent d'une personne en particulier, ~mission(TargetName|Last), qui a causé des dégâts et que nous devons éliminer.\n\nVous pouvez le trouver en train de voler autour de ~mission(Location|Address). Faites le nécessaire.\n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_killship_cfp_mrt_title_001=Attaquer un vaisseau CFP <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
headhunters_killship_cfp_vhrt_desc_001=J'ai une cible prioritaire qui doit être éliminée. ~mission(TargetName) est un gros bonnet qui fait partie des responsables de la sécurité des Citizens for Prosperity. Bien que ~mission(TargetName|Last) l'ait peut-être oublié, les Headhunters se souviennent de leur travail avec une société de mercenaires il y a quelques années, qui a conduit à la mort de cinq frères et sœurs. Nous voulons du sang pour du sang.\n\nIls ont été repérés dans les environs de ~mission(Location|Address), vous devriez donc toujours pouvoir les y trouver.\n\nIls sont méchants, alors amenez quelques amis mais assurez-vous qu'ils finissent morts.\n\nStows out.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1\n<EM4>Head Contractor:</EM4> +1,200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
