blacjac_recoverspace_desc_intro=ATTENTION : Mercenaires / Chasseurs de primes avec de l'expérience en manutention de cargaisons\n\nNous venons de recevoir l'information qu'un voleur répondant au nom de ~mission(TargetName) circule avec sa dernière prise à bord de son vaisseau.\n\nNormalement, nous aurions fait arrêter le salaud et nous en aurions fini, mais pour l'instant, la chose la plus importante est de récupérer les marchandises volées.\n\nSi cela vous semble correspondre à votre profil, vous serez autorisé à traquer ~mission(TargetName|Last), sécuriser les biens volés ~mission(Item) de toutes les manières possibles, et les livrer à ~mission(Destination|Address). ~mission(Contractor|RecoverSpaceTimed)~mission(Danger)\n\n\nMerci,\nGloria Mesa\nSuperviseur de Contrat Privé\nSécurité BlacJac, "Protection Assurée"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
