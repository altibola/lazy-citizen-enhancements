mg_pacheco_desc=~mission(Description)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
mg_pacheco_prisonerbreak_desc_002=Écoute-moi bien, voilà comment ça va se passer : un groupe de mes vieux briscards se sont fait choper en train de bosser pour moi, et je veux que tu les fasses sortir.\n\nUn mécano sympa a arrangé les choses pour que leur transport pénitentiaire ait quelques pépins en cours de route. La porte avant sera dépressurisée, et le vaisseau sera immobilisé. Toi, tu vas t'y rendre, tuer toute la sécurité qui escorte le transport, trouver le manifeste des prisonniers à bord et t'en servir pour localiser les capsules de cryo de mon équipage.\n\nLes surgelés que je veux sont ~mission(NameSave2), ~mission(NameKill1), ~mission(NameSave3) et ~mission(NameSave1). Ils ont tous été fidèles et méritent mieux que de pourrir en prison.\n\nEnfin, je pense qu'ils ont été fidèles... Je me demande encore comment ils se sont fait prendre en premier lieu. J'ai le sentiment qu'un d'entre eux a peut-être doublé. Tu sais quoi ? Si tu trouves la moindre preuve qu'un de mes gars a bossé avec l'Advocacy, liquide sa capsule de cryo, et je te filerai un bonus.\n\nUne fois que tu auras activé les bonnes capsules et que mes gars commenceront à décongeler, tire-toi de là et laisse l'équipe de récupération s'occuper du reste. Cette dernière étape est cruciale. Tu vois, une fois qu'ils sont décongelés, ils partiront à la retraite. Inutile qu'ils en sachent plus sur mon business qu'ils n'en savent déjà, c'est-à-dire : je ne veux pas que ces balourds voient ton visage ou même sachent que tu existes.\n\nUne fois que tu reprendras ta route, je t'enverrai une belle pile de crédits bien mérités.\n\nMaintenant, au cas où tu commencerais à avoir des idées du genre "Pourquoi je ne libère pas tout le monde ?" ou "Ne serait-ce pas plus simple de les faire taire une bonne fois pour toutes ?" Oublie ça. Les politiques de tout ce bordel sont plus compliquées que ce que tu as besoin de savoir. Fais-moi confiance quand je te dis que si des prisonniers supplémentaires sont libérés ou meurent sans que je ne l'aie ordonné, c'est toi qui paieras. Tu veux toucher tout ton fric ? Fais ce qu'on te dit, point final.\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +100
mg_pacheco_prisonerbreak_desc_003=Voici comment ça va se passer : une poignée de mes vieux chevronnés se sont fait choper en train de bosser pour moi, et je veux que tu les fasses sortir.\n\nUn mécano sympa a arrangé les choses pour que leur transport pénitentiaire ait quelques pépins en cours de route, dépressurisant la porte avant et stoppant le vaisseau. Toi, tu vas t'y rendre, buter toute la sécurité qui escorte le transport, trouver le manifeste des prisonniers à bord et t'en servir pour localiser les capsules de cryo de mon équipage.\n\nLes glaçons que je veux sont ~mission(NameKill1), ~mission(NameSave2), ~mission(NameSave1) et ~mission(NameSave3). Ils ont tous été fidèles et méritent mieux que de pourrir en prison.\n\nEnfin, je pense qu'ils ont été fidèles... Je me demande encore comment ils se sont fait prendre en premier lieu. J'ai le sentiment qu'un d'entre eux a peut-être doublé. Tu sais quoi ? Si tu trouves la moindre preuve qu'un de mes gars a bossé avec l'Advocacy, liquide sa capsule de cryo, et je te filerai un bonus.\n\nUne fois que tu auras activé les bonnes capsules et que mes gars commenceront à décongeler, tire-toi de là et laisse l'équipe de récupération s'occuper du reste. Cette dernière étape est cruciale. Tu vois, une fois qu'ils sont décongelés, ils partiront à la retraite. Inutile qu'ils en sachent plus sur mon business qu'ils n'en savent déjà, c'est-à-dire : je ne veux pas que ces couillons voient ton visage ou même sachent que tu existes.\n\nUne fois que tu reprendras ta route, je t'enverrai une belle pile de crédits bien mérités.\n\nMaintenant, au cas où tu commencerais à avoir des idées du genre "Pourquoi je ne libère pas tout le monde ?" ou "Ne serait-ce pas plus simple de les faire taire une bonne fois pour toutes ?" Oublie ça. Les politiques de tout ce bordel sont plus compliquées que ce que tu as besoin de savoir. Fais-moi confiance quand je te dis que si des prisonniers supplémentaires sont libérés ou meurent sans que je ne l'aie ordonné, c'est toi qui paieras. Tu veux toucher tout ton fric ? Fais ce qu'on te dit, point final.\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100
mg_pacheco_title=~mission(Title) <EM4>[100–1,000 Rep]</EM4>
mg_ruto_RetrieveConsignment_desc_001=Salut, récemment j'ai entendu parler d'une information intéressante concernant ~mission(location|address). Apparemment, ils ont reçu du matériel confidentiel qui suscitent beaucoup d'intérêt chez un de mes associés. L'intérêt est tel que cette personne est prête à payer quelqu'un pour infiltrer l'installation, récupérer les marchandises et les livrer à ~mission(DropOff1|address). Je présume qu'il y aura beaucoup de sécurité, alors il vaudrait mieux que tu emportes une arme ou deux.\n\nOn dit que le matériel confidentiel a été livré avec d'autres articles et qu'ils sont actuellement stockés dans le coffre automatisé de l'installation. Les officiers de sécurité supérieurs sur place portent des datapads contenant des codes d'accès au coffre. Il faudra que tu mettes la main sur un de ces datapads avant d'utiliser le convoyeur pour récupérer les caisses.\n\nSi tu as besoin d'une incitation supplémentaire, j'ai vu la liste de colis dans l'inventaire et je peux confirmer que les autres caisses stockées dans l'installation sont plutôt intéressantes. Mon client se moque bien de ce qui leur arrive, alors elles sont à toi pour en faire ce que tu veux. Si tu réussis bien cette mission, ces caisses supplémentaires pourraient être un joli bonus en plus de la rémunération pour la livraison pour toi.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Guards x4, Hostiles x54
mg_ruto_RetrieveConsignment_title_001=récupérer la marchandise <EM4>[500–4,000 Rep]</EM4>
mg_ruto_UGF_destroy_E_desc_001=Il semble qu'il y ait un nouveau venu dans le secteur qui n'a pas payé les bonnes redevances aux bonnes personnes. Pour leur donner une petite leçon, mon client veut que tu te rendes à ~mission(Location|Address) et que tu détruises toutes les drogues sur place.\n\nLes sous-fifres qu'ils ont sur place vont probablement faire du bruit et essayer de t'arrêter. Gère-les comme tu le souhaites, mais te débarrasser du produit est la chose la plus importante.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Civilians x4
mg_ruto_UGF_destroy_E_title_001=Offre Limitée <EM4>[100 Rep]</EM4>
mg_ruto_UGF_destroy_H_desc_001=Un client à moi essaie de négocier un marché, mais n'a pas beaucoup de chance. L'autre partie a l'impression d'avoir tout le pouvoir parce qu'elle est confortablement assise sur une pile d'inventaire. Pour aider à faire avancer les négociations, j'aurais besoin que tu ailles à ~mission(Location|Address) et que tu détruises toutes les drogues sur place.\n\nMaintenant, je devrais probablement te dire que le site est protégé par des personnes très sérieuses, donc atteindre la planque sera un peu délicat, mais je sais que tu trouveras un moyen.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
mg_ruto_UGF_destroy_H_title_001=Inventaire nettoyer <EM4>[100 Rep]</EM4>
mg_ruto_UGF_destroy_desc_001=Un de mes clients n'était pas content d'apprendre que quelqu'un s'était immiscé dans son territoire. Au lieu d'opter pour la voie traditionnelle de tuer des gens et de déclencher une guerre, ils ont décidé d'envoyer un message différent.\n\nTu vas te rendre à ~mission(Location|Address) et détruire toutes les drogues sur place.\n\nBien sûr, si quelqu'un veut se battre avec toi, n'hésite pas à te défendre, mais l'objectif principal est de se débarrasser de la marchandise.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
mg_ruto_UGF_destroy_title_001=Stock Épuisé <EM4>[100 Rep]</EM4>
mg_ruto_UGF_eliminateall_Lawnocivs_desc_001=Tout le monde garde des rancunes, non ? Je veux dire, quand tu te fais prendre en train de commettre un crime, je comprends que tu sois un peu sur les nerfs, mais c'est plus ou moins le jeu, non ?\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostiles x15\n<EM4>Friendlies:</EM4> Civilians x4
mg_ruto_UGF_eliminateall_Lawnocivs_title_001=vivre et laisser un prestataire indépendant se venger <EM4>[100 Rep]</EM4>
mg_ruto_UGF_eliminateall_civsonly_desc_001=Un de mes clients est en train de se faire dépasser par un nouveau concurrent et cherche à semer la pagaille dans leurs opérations. Tu vas te rendre à ~mission(Location|Address) et éliminer tous les civils qui y travaillent.\n\nFais ce que tu veux des gardes armés qui protègent les travailleurs, mais n'oublie pas qu'ils ne sont pas la priorité.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostiles x10\n<EM4>Friendlies:</EM4> Civilians x4
mg_ruto_UGF_eliminateall_civsonly_title_001=trop de cuistos <EM4>[100 Rep]</EM4>
mg_ruto_UGF_eliminateall_desc_001=C'est un peu agressif à mon goût, mais les crédits sont les crédits, non ?\n\nJ'ai un client qui recherche une personne très motivée pour se rendre à ~mission(Location|Address) et éliminer tout le monde présent là-bas.\n\nEn gros, commencez à tirer et ne vous arrêtez pas. Vous serez payé une fois que le site sera dégagé.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostiles x15
mg_ruto_UGF_eliminateall_nocivs_desc_001=J'ai entendu dire que quelqu'un essaie de lancer une nouvelle affaire, mais ils ont du mal à embaucher les travailleurs qualifiés dont ils ont besoin.\n\nLe problème, c'est qu'ils ont trouvé l'équipe parfaite à l'adresse ~mission(Location|Address), mais les personnes pour qui elles travaillent ne les laissent pas partir. Elles ont même engagé des gardes armés supplémentaires pour s'en assurer.\n\nCe que je veux que tu fasses, c'est d'y aller et de tuer tous les gardes tout en veillant à ce que tous les travailleurs restent indemnes.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostiles x15\n<EM4>Friendlies:</EM4> Civilians x4
mg_ruto_UGF_eliminateall_nocivs_title_001=trouver de l'aide fiable, c'est pas évident <EM4>[100 Rep]</EM4>
mg_ruto_UGF_eliminateall_title_001=mettre le bazar <EM4>[100 Rep]</EM4>
mg_ruto_UGF_steal_desc_001=Celui-ci devrait être une aubaine pour quelqu'un comme toi. Il y a un colis retenu à ~mission(Location|Address) et j'ai besoin que tu le livres à ~mission(Destination|Address).\n\nIl y a juste un petit détail que tu devrais savoir. Il y aura beaucoup de sécurité là-bas. Mais je suis sûr que ça devrait aller.\n\n:)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100
mg_ruto_UGF_steal_title_001=attrape et pars <EM4>[100 Rep]</EM4>
mg_ruto_clearcrimestat_norep_desc_01=Salut. On n'a pas encore eu l'occasion de travailler ensemble, mais je suis dans une situation délicate en ce moment et j'aurais besoin d'un coup de main. Évidemment, ce n'est pas pour rien, bien sûr. Je suis tout à fait en faveur d'un bon quiproquo.\n\nL'un de mes associés, qui était en train de purger sa peine à Klescher, était censé me rapporter une puce de données, mais il est soudainement devenu silencieux. Maintenant, je suppose qu'il est mort, mais voici l'affaire : si vous terminez son travail, j'efface votre crimestat. Pas mal, non ?\n\nVotre prédécesseur prévoyait apparemment d'utiliser d'anciens tunnels pour s'échapper. Il a laissé entendre que ce n'était pas exactement la chose la plus facile à faire, mais je suis sûr que vous pouvez le comprendre. Je suppose que vous trouverez son corps quelque part là-dedans et avec un peu de chance, il aura toujours la puce sur lui.\n\nUne fois que vous l'aurez, trouvez un moyen de sortir comme vous le pouvez. Ensuite, apportez les données jusqu'à moi. Il y a un endroit à proximité où vous pouvez télécharger le contenu de la puce. Vous feriez peut-être mieux de faire attention à la sécurité de Hurston, cependant. Ils ont été gênants ces derniers temps, donc je ne serais pas surpris si vous les croisiez.\n\nAprès que j'aurai reçu les données et les aurai validées, j'effacerai votre crimestat. Ensuite, vous pourrez profiter de votre liberté retrouvée. Si vous faites cela correctement, peut-être que j'aurai d'autres missions plus lucratives pour vous à l'avenir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 5
mg_ruto_clearcrimestat_norep_title_01=Besoin d'une issue ? <EM4>[50 Rep]</EM4>
mg_ruto_clearcrimestat_rep_desc_01=Salut, J'ai entendu dire que tu t'étais retrouvé à Klescher, ce qui est vraiment embêtant. Mais cela pourrait en fait être un jour de chance pour nous deux.\n\nEn résumé, j'avais quelqu'un qui tentait de faire sortir une puce de données de la prison, mais il n'est jamais revenu vers moi. Je sais avec certitude qu'il n'est pas sorti de l'installation, donc quelque chose a dû lui arriver. Bien que tragique, les affaires doivent continuer. Si tu peux récupérer la puce et terminer le travail, je peux effacer ton crimestat pour toi. Qu'est-ce que tu en dis ?\n\nBien sûr, je ne sais pas exactement jusqu'où il est allé, mais je peux te dire que la prison a tout un réseau de tunnels cachés que mon gars prévoyait d'utiliser pour s'évader. Je suppose que son cadavre pourrit quelque part là-dedans.\n\nUne fois que tu trouveras le corps, j'espère que la puce sera toujours sur lui. Quand tu l'auras, termine ton évasion et transfère les données vers moi. Il y a un endroit à proximité où tu peux télécharger le contenu de la puce.\n\nCependant, je te préviens, tu ferais bien de te méfier de la sécurité de Hurston. Ils ont été plutôt gênants ces derniers temps, donc je ne serais pas surpris que tu aies affaire à eux.\n\nUne fois que j'aurai les données, je vais effacer ton crimestat, et voilà, tu seras libre et tranquille. Ce que tu feras après cela dépend entièrement de toi.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 5
mg_ruto_clearcrimestat_rep_title_01=Aidons-nous mutuellement <EM4>[50 Rep]</EM4>
mg_ruto_collect_reclaimer_desc=Hé.\n\nLes Nine Tails ont un petit problème. Il se trouve qu'ils ont un petit commerce secondaire dans le trafic d'organes clandestin. C'est un domaine que j'évite généralement comme la peste, mais un boulot reste un boulot, n'est-ce pas ? Il semble qu'une de leurs boucheries mobiles à bord du 'October Rising' se soit fait attraper par la sécurité privée alors qu'ils étaient en pleine découpe. Les Nine Tails sont prêts à couper les ponts avec le vaisseau et son équipage (qui est probablement déjà mort de toute façon), mais ils ont besoin d'une caisse particulière extraite. J'imagine que c'était une commande spéciale ou quelque chose comme ça.\n\nQuoi qu'il en soit, montez à bord de l'October Rising, récupérez le paquet et sortez de là. La sécurité traîne toujours dans le coin, alors faite attention et peut-être que vous devriez amener quelques amis, mais n'oubliez pas que votre priorité, c'est le paquet. Si vous voulez éviter quelques tracas supplémentaires, vous pourriez aussi plonger la zone dans l'obscurité en désactivant le relais de communication le plus proche si vous voulez éviter le crimestat pour, vous savez, avoir tué un groupe de sécurité. Mais bon, c'est vous qui voyez.\n\nUne fois que vous serez sorti, déposez le paquet à la clinique de Grim HEX, et je m'occuperai du paiement.\n\nFacile, non ?\n\nRuto\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Pirates x3, Private Security x11\n<EM4>Unknown:</EM4> 1
