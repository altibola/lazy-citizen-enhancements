vaughn_assassination_FPS_UGF_illegal_boss_desc_001=J'ignore si vous connaissez ~mission(Location|Address), mais un certain ~mission(TargetName) demande à rencontrer vos talents là-bas. Je veux le voir éliminé.\n\nPlus facile à dire qu'à faire je le crains. Il est réputé pour s'épargner la sale besogne qu'il refourgue plutôt à ses subordonnés. Ceci dit, éliminez-en suffisamment et il n'aura d'autre choix que de sortir pour traiter avec vous personnellement. \n\nSincèrement,\nVaughn\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Pulverizer LMG\n- Tripledown Pistol\n- [S1-A] Carnifex Armor Core\n- [S1-A] Carnifex Armor Legs\n- [S1-A] Citadel Arms Base\n- [S1-A] Citadel Core Base\n- [S1-A] Citadel Legs Base\n- [S1-A] Fortifier Helmet Base\n- [S1-A] Pulverizer LMG Magazine (120 Cap)\n- [S1-A] Tripledown Pistol Magazine (12 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Backup x4, Boss x1, Hostiles x10\n<EM4>Elite Assassin:</EM4> +8,000 Rep\n<EM4>Failure Penalty:</EM4> -4,000 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
vaughn_assassination_FPS_UGF_illegal_desc_001=On dit qu'il n'y a pas d'honneur entre voleurs. Aujourd'hui, votre cible semble être l'un des vôtres. \n\nDirigez-vous vers ~mission(Location|Address) et tuez ~mission(TargetName). Faites ce que vous voulez des autres, ça ne me regarde pas.\n\nSincèrement,\nVaughn\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Deadrig Shotgun\n- Killshot Rifle\n- [S1-A] Badami Helmet\n- [S1-A] Deadrig Shotgun Magazine (8 cap)\n- [S1-A] Killshot Rifle Magazine (45 Cap)\n- [S1-A] Overlord Arms Supernova\n- [S1-A] Overlord Core Supernova\n- [S1-A] Overlord Helmet Supernova\n- [S1-A] Overlord Legs Supernova\n- [S1-A] Piecemeal Armor Arms\n- [S1-A] Piecemeal Armor Core\n- [S1-A] Piecemeal Armor Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 10\n<EM4>Low Level Assassin:</EM4> +1,000 Rep\n<EM4>Failure Penalty:</EM4> -500 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
vaughn_assassination_FPS_UGF_illegal_title_001=Toutes Choses Ont Une Fin <EM4>[BP]</EM4> <EM4>[1,000–8,000 Rep]</EM4>
vaughn_assassination_FPS_UGF_legal_boss_desc_001=Un vétéran des forces de sécurité dénommé ~mission(TargetName) s’apprête à mettre soudainement et violemment fin à sa longue carrière. Il est actuellement à ~mission(Location|Address), ça ne sera pas simple d'y entrer. Je crains que vous ne deviez l'attirer à l’extérieur.  \n\nJe vous conseil d'éliminer suffisamment de subordonnés pour le forcer à sortir vous rencontrer. Évidement, une fois qu'il aura exposé son visage, ça deviendra beaucoup plus limpide pour vous. \n\nSincèrement,\nVaughn\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Pulverizer LMG\n- Tripledown Pistol\n- [S1-A] Carnifex Armor Core\n- [S1-A] Carnifex Armor Legs\n- [S1-A] Citadel Arms Base\n- [S1-A] Citadel Core Base\n- [S1-A] Citadel Legs Base\n- [S1-A] Fortifier Helmet Base\n- [S1-A] Pulverizer LMG Magazine (120 Cap)\n- [S1-A] Tripledown Pistol Magazine (12 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Backup x4, Boss x1, Hostiles x10\n<EM4>High Value Assassin:</EM4> +4,000 Rep\n<EM4>Failure Penalty:</EM4> -2,000 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
vaughn_assassination_FPS_UGF_legal_desc_001=Un officier de sécurité dénommé ~mission(TargetName) ne demande qu'à partir prématurément en retraite. Il est actuellement posté à ~mission(Location|Address) ,entouré d'une équipe d'enthousiastes en uniforme. \n\nInutile d'économiser vos munitions avec eux, mais seul la mort de ~mission(TargetName) vous remplira les poches de mes crédits et de mes remerciements.\n\nSincèrement,\nVaughn\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13, Targets x1
vaughn_assassination_FPS_UGF_legal_title_001=Ils Vont Nous Manquer <EM4>[BP?]</EM4> <EM4>[500–4,000 Rep]</EM4>
vaughn_assassination_PA_E_desc=Je ne pense pas que ça vous posera beaucoup de problèmes, même si cette mission est légèrement plus difficile que votre précédent contrat. Rendez-vous à <EM4>~mission(Location|Address)</EM4> et occupez-vous du membre de l'Alliance du Peuple nommé <EM4>~mission(TargetName)</EM4>. Mes informateurs m'ont dit qu'il pourrait être accompagné d'une ou deux escortes. Rien que vous ne puissiez gérer, bien sûr. \n\nCordialement,\nVaughn\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1\n<EM4>Jr. Contractor:</EM4> +100 Rep
vaughn_assassination_PA_E_title=Faire voler en éclats l'Alliance <EM4>[100 Rep]</EM4>
vaughn_assassination_PA_H_desc=<EM4>~mission(TargetName)</EM4> de l'Alliance du Peuple semble s’être forgé une certaine réputation, à en juger par l’importance que notre client accorde à ce que ce contrat soit traité avec rigueur et sans perdre de temps.\n\nMais nous vous épargnerons les détails. Tout ce que vous avez à faire est de vous rendre à <EM4>~mission(Location|Address)</EM4> et de mettre un terme à son existence. Attendez-vous à un vaisseau bien armé et à des renforts particulièrement compétents. Il semble se prendre très au sérieux.\n\nCordialement,\nVaughn\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Reinforcements x6, Targets x1\n<EM4>Sr. Contractor:</EM4> +200 Rep
vaughn_assassination_PA_H_title=Fissurer l'Alliance <EM4>[200 Rep]</EM4>
vaughn_assassination_PA_M_desc=Il semblerait que l'Alliance du Peuple ait récemment froissé quelques sensibilités. Un de nos clients serait ravi que vous empêchiez ~mission(TargetName) de se mêler à nouveau de ses affaires.\n\nVous le trouverez dans les environs de <EM4>~mission(Location|Address)</EM4>, et d'après ce que notre client nous a dit, il est peu probable qu’il soit seul. Il ne s’agit pas de pilotes de seconde zone, ils pourraient même représenter une menace non négligeable pour votre sécurité.\n\nFaites de votre mieux pour que tout se passe bien.\n\nCordialement,\nVaughn\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1\n<EM4>Contractor:</EM4> +150 Rep
vaughn_assassination_PA_M_title=Fracturer l'Alliance <EM4>[150 Rep]</EM4>
vaughn_assassination_PA_S_desc=J’ai le plaisir de vous informer que nous avons une mission particulièrement ambitieuse à vous proposer.\n\n<EM4>~mission(TargetName)</EM4> a été désigné pour être éliminé. Vous le connaissez peut-être déjà : un membre très en vue de l'Alliance du Peuple, réputé pour avoir déjoué de nombreuses tentatives d’assassinat. Nous avions d’abord jugé cette mission trop délicate, jusqu’à ce que notre client propose une somme encore plus indécente pour la mener à bien.\n\nLa dernière position connue de la cible se situe à <EM4>~mission(Location|Address)</EM4>. Attendez-vous à un vaisseau de première catégorie et à une escorte chevronnée.\n\nNous nous réjouissons d’avance de la nouvelle de sa disparition prématurée.\n\nCordialement,\nVaughn\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 7/7\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1\n<EM4>Head Contractor:</EM4> +300 Rep
vaughn_assassination_PA_S_title=Annihiler l'Alliance <EM4>[300 Rep]</EM4>
vaughn_assassination_PA_VH_desc=J’espère que vous appréciez les défis, car celui-ci est tout sauf une simple promenade de santé.\n\nPour des raisons que notre client n'a pas souhaité divulguer, un membre particulièrement important de l'Alliance du Peuple doit être éliminé. La cible, <EM4>~mission(TargetName)</EM4>, a été vue pour la dernière fois à <EM4>~mission(Location|Address)</EM4>, aux commandes d’un vaisseau de luxe, escorté par plusieurs alliés expérimentés.\n\nProfitez pleinement de cette opportunité.\n\nCordialement,\nVaughn\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Reinforcements x6, Targets x1\n<EM4>Neutral:</EM4> +50 Rep\n<EM4>Veteran Contractor:</EM4> +200 Rep
vaughn_assassination_PA_VH_title=Détruire l'Alliance <EM4>[50–200 Rep]</EM4>
vaughn_assassination_VE_desc_intro=D'abord, laissez moi me présenter. Pour faire court, je ne fais pas dans l'humanitaire. \n\nDes gens me contactent quand ils ont besoin de faire disparaitre des personnes et je m’engage à trouver le bon prestataire pour faire disparaitre ce qui doit l'être. Cela permet aux différents parties de rester totalement anonymes. Le plan parfais tant que ça fonctionne comme ça.\n\nJ'ai ouï-dire que vous possédiez des compétences que je pourrait mettre à mon service, j'ai donc jugé intéressant de vérifier ces rumeurs. \n \nSi forger une relation professionnelle durable vous intéresse, j'ai besoin que vous me prouviez vos talents. \n\nTrouvez et éliminer discrètement ~mission(TargetName) au-dessus de ~mission(Location|Address).\n\nRéussissez et vous serez récompensé. Et surtout, vous aurez gagné mon attention et ma considération.\n\nCordialement,\nVaughn\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +250\n<EM4>Hostiles:</EM4> Targets x1
vaughn_assassination_VE_desc_rehire=On a rarement l'occasion dans une vie de faire une seconde bonne première impression, mais je vous l'offre quand même.\n\nDire que j'ai été déçu sur le déroulement de votre dernière tentative d'assassinat serait un euphémisme. Cependant, je vous offre une chance de vous rattraper. \n\nTuez ~mission(TargetName) au-dessus de ~mission(Location|Address) et je considèrerais votre ardoise comme remise à zéro. \n\nCordialement,\nVaughn\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250\n<EM4>Hostiles:</EM4> Targets x1
vaughn_assassination_VE_title_intro=Pour faire vos preuves <EM4>[100–500 Rep]</EM4>
vaughn_assassination_VE_title_rehire=Encore des Choses à Prouver <EM4>[50–500 Rep]</EM4>
