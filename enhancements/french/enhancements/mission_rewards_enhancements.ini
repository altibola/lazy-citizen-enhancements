northrock_boarders_890J_desc_001=Un chargé de clientèle vient de nous informer que leur 890 Jump avait été intercepté à ~mission(Location) et abordé par des hors-la-loi. Ils préféreraient que cela soit traité en privé en raison de la nature sensible des données exclusives stockées à bord. \n\nVotre première priorité sera d'éliminer tous les hors-la-loi le plus rapidement possible afin qu'une équipe de récupération puisse être envoyée pour rendre le vaisseau à son propriétaire. Plus les hors-la-loi contrôlent le vaisseau longtemps, plus les chances de le perdre sont grandes. Je vous recommande de constituer une équipe pour cette sortie afin d'accélérer les choses. \n\nNotez que grâce à un petit contingent de Personnel de Sécurité resté à bord, tous les membres survivants de l'équipage ont pu s'enfuir à bord d'un vaisseau de secours. L'état actuel de la sécurité restante est inconnu, mais juste au cas où, gardez un œil sur les alliés lorsque vous engagez les ennemis.\n\nDeuxièmement, si cela est possible, le client a *très* envie d'empêcher le vol des données susmentionnées. Si vous parvenez à arrêter le vol de leurs bases de données confidentielles avant qu'elles ne soient transmises, un généreux bonus sera émis.\n\nInutile de dire que c'est un client que j'aimerais vraiment garder heureux. \n\nBraden Corchado\nAgent Logistique - Succursale de Stanton\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
northrock_boarders_890J_title_001=URGENT : Abordage En Cours <EM4>[8,000 Rep]</EM4>
northrock_bounty_PVP_desc_first=Bonjour,\n\nJ'espère que cela ne vous dérange pas, mais j'ai été informé de votre statut auprès de la Guilde des Chasseurs de Prime et je voulais vous contacter et voir si vous seriez intéressé par un contrat avec le Groupe Northrock Service, l'une des sociétés de sécurité privées les mieux notées du système.\n\nSi vous l'êtes, la première étape serait d'effectuer une Appréhension Temporaire de Suspect. Il s'agit moins d'une évaluation que d'une occasion de s'assurer que nous pouvons avoir de bonnes relations de travail. \n\nLe suspect recherché est connu sous le nom de <EM4>~mission(TargetName)</EM4>. Il est connu pour être particulièrement insaisissable, vous aurez donc peut-être du pain sur la planche.\n\nJ'espère avoir bientôt de vos nouvelles, \n\nBraden Corchado\nAgent Logistique - Succursale de Stanton\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500
northrock_bounty_PVP_desc_rehire=Hé, encore,\n\nCela fait un petit moment, j'espère que tout va bien. Je sais que les choses ne se sont pas terminées dans les meilleures conditions, mais après en avoir discuté avec la direction, j'aimerais vous offrir une occasion de vous racheter. Vous aviez du potentiel et je déteste penser que vous n'avez pas eu une véritable chance de montrer de quoi vous êtes capable.\n\nAppréhendez <EM4>~mission(TargetName)</EM4> et nous pourrons voir comment rétablir votre statut d'emploi.\n\nBraden Corchado\nAgent Logistique - Succursale de Stanton\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
northrock_bounty_PVP_title_001=Appréhender le Suspect : ~mission(TargetName) <EM4>[500 Rep]</EM4>
northrock_bounty_PVP_title_first=Appréhension Temporaire de Suspect <EM4>[500 Rep]</EM4>
northrock_bounty_PVP_title_rehire=Appréhension Temporaire de Suspect (Réévaluation) <EM4>[500 Rep]</EM4>
northrock_bounty_desc_first=Hé,\n\nJ'espère que tout va bien. Je vous ai peut-être déjà contacté, mais juste au cas où, je voulais vous envoyer à nouveau un message. Je suis un agent de la logistique pour la succursale Stanton du Groupe Northrock Service, l'une des sociétés de sécurité privées les mieux notées du système, et nous cherchons à élargir notre portefeuille de prestataires qualifiés.\n\nMaintenant, même si vous êtes certifié par la Guilde des Chasseurs de Primes, Northrock aura besoin que vous remplissiez un contrat temporaire pour s'assurer que vous répondez bien au profil recherché. Dans un premier temps, je pense que je vais vous demander de collecter la prime sur <EM4>~mission(TargetName)</EM4>. Il a été vu pour la dernière fois à <EM4>~mission(Location|Address)</EM4>. \n\nUne fois cela fait, nous verrons si nous avons d'autres missions à vous confier.\n\nJ'espère avoir de vos nouvelles bientôt, \n\nBraden Corchado\nAgent Logistique - Succursale de Stanton\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
northrock_bounty_fps_UGF_boss_desc_001=Hé, \n\nJ'ai une prime intéressante pour vous. Un criminel de haut niveau du nom de ~mission(TargetName) a été localisé à ~mission(Location|Address). \n\nD'après nos informations, il est très peu probable que la cible soit assise à vous attendre à découvert. Vous devrez probablement infiltrer l'installation et les faire sortir. \n\nQuelque chose comme un grand échange de tirs devrait suffire à faire l'affaire. \n\nBonne chance,\n\nBraden Corchado\nAgent Logistique - Succursale de Stanton\nNorthrock Service Group\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- F55 LMG\n- LH86 Pistol\n- [S1-A] Defiance Arms Tactical\n- [S1-A] Defiance Core Tactical\n- [S1-A] Defiance Helmet Tactical\n- [S1-A] Defiance Legs Tactical\n- [S1-A] F55 LMG Magazine (150 cap)\n- [S1-A] Lynx Arms\n- [S1-A] Lynx Core\n- [S1-A] Lynx Legs\n- [S1-A] Oracle Helmet\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Backup x4, Boss x1, Hostiles x2, Soldiers x4, Technicians x4\n<EM4>Applicant:</EM4> +4,000 Rep\n<EM4>Failure Penalty:</EM4> -2,000 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
northrock_bounty_fps_UGF_boss_nocivs_desc_001=Hé, \n\nJ'ai un contrat pour vous qui nécessite un peu plus de tactique que d'habitude. Un criminel de haut niveau du nom de ~mission(TargetName) se cache avec un important contingent de hors-la-loi à ~mission(Location|Address). \n\nNos informations suggèrent que les forces de ~mission(TargetName|Last) agiront très probablement comme une ligne défensive afin de protéger leur patron. Ma meilleure hypothèse est que vous devrez vous en occuper avant d'avoir accès à ~mission(TargetName|Last).\n\nCela dit, je ne veux pas que vous tiriez sans discernement. Parfois, ces hors-la-loi gardent des civils dans les parages et ils doivent être traités comme des non-combattants.\n\nBonne chance,\n\nBraden Corchado\nAgent Logistique - succursale de Stanton\nNorthrock Service Group\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- F55 LMG\n- LH86 Pistol\n- [S1-A] Defiance Arms Tactical\n- [S1-A] Defiance Core Tactical\n- [S1-A] Defiance Helmet Tactical\n- [S1-A] Defiance Legs Tactical\n- [S1-A] F55 LMG Magazine (150 cap)\n- [S1-A] Lynx Arms\n- [S1-A] Lynx Core\n- [S1-A] Lynx Legs\n- [S1-A] Oracle Helmet\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Backup x4, Boss x1, Hostiles x2, Soldiers x8, Technicians x4\n<EM4>Friendlies:</EM4> Civilians x4\n<EM4>Applicant:</EM4> +8,000 Rep\n<EM4>Failure Penalty:</EM4> -4,000 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
northrock_bounty_fps_title_001=Affectation de Prime : ~mission(TargetName) (CRE) <EM4>[BP]</EM4> <EM4>[4,000–8,000 Rep]</EM4>
northrock_bounty_prisoner_desc_001=Le criminel condamné ~mission(TargetName) s'est évadé d'un centre de réadaptation local et Northrock a été engagé pour remettre le détenu en détention. D'après mon expérience, les prisonniers évadés ont tendance à ne pas abandonner pacifiquement, alors utilisez toutes les méthodes possibles pour retrouver et maîtriser l'évadé. \n\nCela pourrait valoir la peine de repérer les endroits où ils pourraient tenter de pirater leur dossier. Ce ne serait pas la première fois qu'un prisonnier tente d'effacer sa peine après s'être évadé.\n\nBonne chasse,\n\nBraden Corchado\nAgent Logistique - succursale de Stanton\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
northrock_bounty_prisoner_desc_intro=Hé,\n\nJe m'appelle Braden Corchado et je suis agent logistique pour Northrock Service Group, la principale société de sécurité indépendante opérant dans le système Stanton. Je vous ai peut-être déjà contacté, mais nous essayons de nous faire un devoir d'approcher toute personne qui répond à nos normes élevées et de l'encourager à conclure un contrat temporaire. \n\nVous ne pouvez pas faire mieux que de devenir un prestataire Northrock. Nous avons une solide réputation pour offrir un travail stimulant et intéressant à un taux de rémunération plus élevé que celui de bon nombre de nos concurrents dans le système. \n\nMaintenant, pour être approuvé, vous devrez appréhender ~mission(TargetName). Il s'est récemment évadé du centre de détention et votre travail consistera à les retrouver avant qu'ils ne disparaissent complètement de la surface. \n\nUn petit indice est qu'il est prudent de supposer que la cible va essayer d'effacer son casier. Je vous recommande de trianguler votre recherche entre le centre de détention d'où il s'est évadé et les endroits où il peut pirater le système d'enregistrement.\n\nFaites cela et nous verrons comment vous donner plus de travail.\n\nJ'espère avoir de vos nouvelles bientôt, \n\nBraden Corchado\nAgent Logistique - Succursale de Stanton\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500
northrock_bounty_prisoner_desc_rehire=Hé,\n\nJe sais que cela fait un petit moment, mais si vous êtes toujours intéressé à travailler sous contrat pour Northrock, j'ai convaincu la direction de vous réévaluer. Si vous parvenez à ramener une prime pour nous, nous pouvons voir comment rétablir votre statut d'emploi.\n\nCe contrat temporaire vise à retrouver le criminel en fuite ~mission(TargetName). Faites de votre mieux pour les atteindre avant qu'ils ne puissent effacer leur enregistrement au point d'accès à la base de données, sinon le travail deviendra beaucoup plus difficile.\n\nJ'espère que nous pourrons vous faire confiance à ce sujet.\n \nBraden Corchado\nAgent Logistique - Succursale de Stanton\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
