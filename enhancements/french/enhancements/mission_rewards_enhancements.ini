foxwell_DefendShip_E_desc_001=Foxwell recherche un pilote de combat disponible pour fournir une assistance immédiate à un ~mission(Ship) attaquée à ~mission(Location|Address). Nous n'avons pas identifié les auteurs de l'attaque, mais on nous a assuré qu'il s'agissait d'une petite force. \n\nS'il vous plaît, dépêchez-vous et éliminez tous les hostiles. Nous avons besoin que le client s'en sorte car il ne nous a pas encore payés.\n\nBonne chance,\n\nMarcus Clenn\nFoxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x3\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Blueprint Reward:</EM4> Guaranteed
