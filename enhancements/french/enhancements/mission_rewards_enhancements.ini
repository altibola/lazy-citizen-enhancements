HeadHunters_DefendEntitesAndEscort_M_Desc=Un nouveau gang qui donne déjà bien du fil à retordre aux Headhunters vient de faire monter les enchères en attaquant les <EM4>~mission(Objects)</EM4> de <EM4>~mission(Location|Address)</EM4>. Ce n’est jamais bon signe, vu que nous nous soucions du bien-être des gens sur place, mais c’est d’autant plus grave si leurs dégâts compromettent sérieusement une opération à venir.\n\nRendez-vous sur place dès que possible et mettez fin à l'attaque avant qu'ils ne causent des dégâts irréversibles. Et si des <EM4>vaisseaux amis</EM4> ont besoin d'un coup de main, je veux que vous veilliez sur eux aussi. Ne vous attendez pas à affronter un gang de mauviettes, mais vous devriez quand même pouvoir vous en sortir si vous gardez la tête froide.\n \nSi vous avez besoin d’un peu plus de motivation, j'offrirai <EM4>~mission(ScripAmount) Scrip du Conseil</EM4> au prestataire principal.\n\n- Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Nyx]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [CIV-S0-B] Kelvid\n- [CIV-S0-D] Winter-Star SL\n- [CIV-S1-B] Cryo-Star\n- [CIV-S1-B] Endo\n- [CIV-S1-B] FlashFreeze\n- [CIV-S1-D] BlastChill\n- [CIV-S1-D] Winter-Star\n- [CIV-S2-B] Cryo-Star EX\n- [CIV-S2-B] FullFrost\n- [CIV-S2-B] Taiga\n- [CIV-S2-D] WhiteOut\n- [CIV-S2-D] Winter-Star EX\n- [CIV-S3-B] Cryo-Star XL\n- [CIV-S3-B] FrostBite\n- [CIV-S3-D] ColdSurge\n- [CIV-S3-D] Winter-Star XL\n\n<EM4>[Pyro]</EM4>\n- [CIV-S0-D] DuraJet\n- [CIV-S1-D] ZapJet\n- [CIV-S2-A] Lotus\n- [CIV-S2-D] SparkJet\n- [CIV-S3-A] TigerLilly\n- [CIV-S3-D] SparkJet Pro\n- [IND-S0-B] Defiant\n\n<EM4>[Stanton]</EM4>\n- [CIV-S0-C] PIN\n- [CIV-S1-B] 6SA 'Arbiter'\n- [CIV-S1-B] HEX\n- [CIV-S1-C] 5SA 'Rhada'\n- [CIV-S1-C] WEB\n- [CIV-S2-B] 6MA 'Kozane'\n- [CIV-S2-B] BLOC\n- [CIV-S2-C] 5MA 'Chimalli'\n- [CIV-S2-C] STOP\n- [CIV-S3-B] 6CA 'Bila'\n- [CIV-S3-C] 5CA 'Akura'\n- [CIV-S3-C] GUARD\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x19, Interdiction Ships x1, Reinforcements x14\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Tier 1:</EM4> +150 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
