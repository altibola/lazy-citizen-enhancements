EckhartSecurity_EliminateAll_DC_Desc_001=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Nettoyage de Site\nCODE D'APPROBATION = ~mission(ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\nUn client envoie des comms frénétiques pour signaler qu'un de ses sites est attaqué. Nous avons besoin d'un prestataire capable de se rendre à <EM4>~mission(Location|Address)</EM4> et de nettoyer l'endroit de tout élément hostile. \n\nSelon le personnel sur place, des hors-la-loi sont actuellement retranchés près du <EM4>~mission(Location)</EM4>. Approchez-vous avec prudence et préparez-vous à utiliser la force létale si les hors-la-loi résistent à l'expulsion.\n\nLe paiement sera effectué à l'achèvement du contrat.\n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x20, Juggernauts x2, Snipers x4, Soldiers x12, Technicians x2\n<EM4>Security Trainee:</EM4> +500 Rep (Failure: -50)\n<EM4>Security Trainee:</EM4> +500 Rep
