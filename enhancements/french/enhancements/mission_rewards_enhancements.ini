bhg_bounty_desc_ASD_Engineering_001=--------------------------------------------------------\n----------------- CONTRAT DE CHASSE À LA PRIME -----------------\n--------------------------------------------------------\n\nGUILDE DES CHASSEURS DE PRIME\nTRAITEMENT & DIFFUSION\n\nLa Guilde des Chasseurs de Primes a autorisé une prime officielle.\n\nNOM : ~mission(TargetName) \nSYSTÈME : Stanton\nRISQUES ENCOURUS : Modérés\nDERNIER EMPLACEMENT CONNU :  ~mission(Location|Address)\nAFFILIATIONS CONNUES : <Aucune>\nNOTES : Nous avons localisé la cible dans la <EM4>section Ingénierie</EM4> d'un centre de recherche abandonné appartenant à Associated Science and Development. Bien que fermé, cet endroit est connu pour être fréquenté par des charognards et autres individus peu recommandables.\n\nLe centre lui-même pourrait également présenter un danger, car la nature des recherches qui y ont été menées reste inconnue. Soyez vigilant quant aux risques environnementaux potentiels pendant que vous poursuivez la cible.\n\n\nGUILDE DES CHASSEURS DE PRIMES\nÀ la poursuite de la justice\n\nLa Guilde des chasseurs de primes est un service de sécurité agréé par la Guilde des mercenaires et autorisé à agir dans l'UEE et au-delà, conformément aux lois de l'Autorité du Commerce Extraterrestre.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Palatino Arms Sunstone\n- [S1-A] Palatino Core Sunstone\n- [S1-A] Palatino Helmet Sunstone\n- [S1-A] Palatino Legs Sunstone\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Captain x1\n<EM4>Rep:</EM4> +50\n<EM4>Blueprint Reward:</EM4> Guaranteed
bhg_bounty_desc_ASD_Research_001=--------------------------------------------------------\n----------------- CONTRAT DE CHASSE À LA PRIME -----------------\n--------------------------------------------------------\n\nGUILDE DES CHASSEURS DE PRIME\nTRAITEMENT & DIFFUSION\n\nLa Guilde des Chasseurs de Primes a autorisé une prime officielle.\n\nNOM : ~mission(TargetName) \nSYSTÈME : Stanton\nÉVALUATION DES RISQUES : Moyen\nDERNIER EMPLACEMENT CONNU :  ~mission(Location|Address)\nAFFILIATIONS CONNUES : <Aucune>\nNOTES : Nous avons localisé la cible dans la <EM4>section Recherche</EM4> d'un complexe abandonné appartenant à Associated Science and Development. Bien que fermé, cet endroit est connu pour être fréquenté par des charognards et autres individus peu recommandables.\n\nLe complexe lui-même pourrait également présenter un danger, car la nature des recherches qui y ont été menées reste inconnue. Soyez vigilant quant aux risques environnementaux potentiels pendant que vous poursuivez la cible.\n\n\nGUILDE DES CHASSEURS DE PRIMES\nÀ la poursuite de la justice\n\nLa Guilde des chasseurs de primes est un service de sécurité agréé par la Guilde des mercenaires et autorisé à agir dans l'UEE et au-delà, conformément aux lois de l'Autorité du commerce extraterrestre.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Palatino Arms Daystar\n- [S1-A] Palatino Arms Metropolis\n- [S1-A] Palatino Core Daystar\n- [S1-A] Palatino Core Metropolis\n- [S1-A] Palatino Helmet Daystar\n- [S1-A] Palatino Helmet Metropolis\n- [S1-A] Palatino Legs Daystar\n- [S1-A] Palatino Legs Metropolis\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Captain x5\n<EM4>Rep:</EM4> +50\n<EM4>Blueprint Reward:</EM4> Guaranteed
bhg_bounty_desc_FPS_intro=--------------------------------------------------------\n-----------------  CONTRAT DE CHASSE À LA PRIME -----------------\n--------------------------------------------------------\n\nGUILDE DES CHASSEURS DE PRIME\nTRAITEMENT & DIFFUSION\n\nLa Guilde des Chasseurs de Primes a autorisé une prime officielle.\n\nNOM : ~mission(TargetName) \nSYSTÈME : Stanton\nRISQUES ENCOURUS : Moyen\nDERNIER EMPLACEMENT CONNU :  ~mission(Location|Address)\nAFFILIATIONS CONNUES : <Aucune>\nREMARQUES : Cette prime initiale vous est offerte à titre d'évaluation formelle de vos compétences. Si vous menez à bien ce contrat, d'autres missions vous seront proposées. \n\nNous pensons que la cible sera à pied et bien armée, alors préparez-vous à un échange de tirs. De plus, d'autres forces hostiles pourraient se trouver sur place. Même si elles ne doivent pas être votre priorité, vous devrez peut-être les affronter pendant que vous poursuivez la cible.\n\n\nGUILDE DES CHASSEURS DE PRIMES\nÀ la poursuite de la justice\n\nLa Guilde des chasseurs de primes est un service de sécurité agréé par la Guilde des mercenaires et autorisé à agir dans l'UEE et au-delà, conformément aux lois de l'Autorité du Commerce Extraterrestre.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Unknown:</EM4> 1\n<EM4>Rep:</EM4> +50
bhg_bounty_desc_HeadHunters_001=--------------------------------------------------------\n----------------- CONTRAT DE CHASSE À LA PRIME -----------------\n--------------------------------------------------------\n\nGUILDE DES CHASSEURS DE PRIME\nTRAITEMENT & DIFFUSION\n\nLa Guilde des Chasseurs de Primes a autorisé une prime officielle.\n\nNOM : ~mission(TargetName) \nSYSTÈME : ~mission(System)\nRISQUES ENCOURUS : ~mission(Danger)\nDERNIER EMPLACEMENT CONNU :  ~mission(Location|Address)\nAFFILIATIONS CONNUES : HeadHunters\nNOTES : Les Headhunters sont une organisation criminelle réputée qui a un long passé d'affrontements avec les forces de l'ordre. Il y a de fortes chances qu'ils soient accompagnés d'autres membres de gangs lorsqu'ils sont confrontés, alors soyez prudents lorsque vous vous engagez.\n\n\nGUILDE DES CHASSEURS DE PRIMES\nÀ la poursuite de la justice\n\nLa Guilde des chasseurs de primes est un service de sécurité agréé par la Guilde des mercenaires et autorisé à agir dans l'UEE et au-delà, conformément aux lois de l'Autorité du Commerce Extraterrestre.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Defenders x12, Targets x2\n<EM4>Probationary Guild Member:</EM4> +2,000 Rep (Failure: -1,000)\n<EM4>Probationary Guild Member:</EM4> +8,000 Rep (Failure: -4,000)
bhg_bounty_desc_Rockcracker_Power_001=--------------------------------------------------------\n--------------- CONTRAT DE CHASSE À LA PRIME -----------------\n--------------------------------------------------------\n\nGUILDE DES CHASSEURS DE PRIME\nTRAITEMENT & DIFFUSION\n\nLa Guilde des Chasseurs de Primes a autorisé une prime officielle.\n\nNOM : ~mission(TargetName) \nSYSTÈME : Nyx\nRISQUES ENCOURUS : Moyennes\nDERNIER EMPLACEMENT CONNU :  ~mission(Location|Address)\nAFFILIATIONS CONNUES : Claw Salamanders\nNOTES : Il convient d'approcher ces anciennes stations QV Breaker abandonnées avec prudence. Non seulement elles sont en très mauvais état, mais elles sont souvent habitées par une faune dangereuse et des hors-la-loi, comme les membres du gang auquel appartient la cible.\n\n\nGUILDE DES CHASSEURS DE PRIMES\nÀ la poursuite de la justice\n\nLa Guilde des chasseurs de primes est un service de sécurité agréé par la Guilde des mercenaires et autorisé à agir dans l'UEE et au-delà, conformément aux lois de l'Autorité du Commerce Extraterrestre.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Juggernauts x1\n<EM4>Probationary Guild Member:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
