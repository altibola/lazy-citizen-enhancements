Tutorial01_MissionDesc=Félicitations pour vos premiers pas dans l'univers !\n\nTout au long de ce tutoriel, vous découvrirez comment naviguer aussi bien à pied que dans l'espace. \n\nAu départ, vous vous habituerez aux contrôles des mouvements de base et à l'utilisation de votre mobiGlas tout en restant dans votre “Hab” (ou habitation). Progressez dans cette mission en suivant les objectifs et les conseils affichés sur votre ATH (Affichage Tête Haute).\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Starter, Unique
Tutorial02_MissionDesc=Félicitations !\n\nAvec cette partie désormais derrière vous, vous devriez avoir les bases avec le contrôle de vos mouvements, la gestion de votre faim et de votre soif ainsi que les fonctionnalités de base du mobiGlas. – respectivement le Gestionnaire de Contrats et le Journal.\n\nDans cette prochaine section, nous vous aiderons à vous familiariser avec ~mission(Location|Name) et vous emmènerons visiter ~mission(StoreName), l'armurerie ici à ~mission(Location|Name).\n\nVous pouvez y faire des achats, et dans d'autres magasins similaires, en utilisant vos United Earth Credits (UEC). Pendant la phase Alpha du développement de Star Citizen, vous utiliserez une monnaie appelée aUEC (Alpha United Earth Credits). C'est une monnaie temporaire créée afin de tester l'économie et l'équilibrage.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Starter, Unique
Tutorial03_MissionDesc=Vous avez presque terminé le tutoriel. Il ne vous reste plus qu'à prendre votre envol !\n\nVotre mission à ~mission(Location|Name) étant terminée, il est temps de quitter la ville – et éventuellement la planète. Allez jusqu'au navettes de transport ~mission(TransitNameShort). Ces navettes peuvent vous emmener partout dans ~mission(Location|Name), mais votre destination est le spatioport, où un Anvil C8 Pisces vous a été temporairement fourni.\n\nCe vaisseau de reconnaissance est un excellent choix pour débuter, parfait pour les nouveaux pilotes cherchant à prendre leur envol.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Starter, Unique
UDM_LocalDelivery_desc_01=Salutations Partenaire d'Expédition Qualifié !\n\nVous cherchez une excuse pour décoller avec votre vaisseau prêt à transporter du fret ? Gagnez des crédits et explorez la région avec l'itinéraire suivant, soigneusement sélectionné -\n\nENLÈVEMENT DE COLIS\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Pickup1|Address)</EM4>\n\nLIEUX DE DÉPÔT\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n\nSi être votre propre patron et être payé pour piloter votre propre vaisseau vous semble être le travail idéal, alors ce contrat est exactement ce que vous recherchiez. Assurez-vous simplement d'apporter votre propre <EM4>rayon tracteur portable</EM4> pour une efficacité maximale.\n\nAu plaisir de travailler avec vous,\n\nUnified Distribution Management\n -Livrez le Colis Intact-\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_LocalDelivery_desc_02=Salutations Partenaire Livreur Agréé !\n\nPrêt à contribuer à notre réseau de livraison en pleine croissance et expansion ? Vous avez à votre disposition un vaisseau capable de transporter plusieurs colis et de voler à travers le système ? Nous avons justement l'occasion idéale pour vous avec cet itinéraire soigneusement sélectionné -\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Pickup2|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n\nSi ça vous intéresse, veuillez accepter cette offre immédiatement ! Assurez-vous simplement d'apporter votre propre <EM4>rayon tracteur portable</EM4> pour une efficacité maximale.\n\n\nAu plaisir de travailler avec vous,\n\nUnified Distribution Management\n -Livrez les Colis Intacts-\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_LocalDelivery_desc_03=Salutations, Partenaire d'Expédition Qualifié !\n\nVous souhaitez gagner des crédits dans le confort de votre propre vaisseau prêt à embarquer ? Alors l'itinéraire suivant, soigneusement sélectionné, pourrait bien être l'opportunité que vous recherchiez :\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Pickup2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Pickup3|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>\n\nAcceptez ce contrat et vous pourrez prendre la route. Assurez-vous simplement d'apporter votre propre <EM4>rayon tracteur portable</EM4> pour une efficacité maximale.\n\n\nAu plaisir de travailler avec vous,\n\nUnified Distribution Management\n -Livrez les Colis Intacts-\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_LocalDelivery_desc_04=Salutations, Partenaire d'Expédition Qualifié ! Vous êtes à la recherche d’opportunités passionnantes dans le secteur de la livraison ? Si vous avez une attitude positive et une soute importante, nous avons une opportunité parfaite pour vous.\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Pickup2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Pickup3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> à <EM4>~mission(Pickup4|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> à <EM4>~mission(Dropoff4|Address)</EM4>\n\nAlors prenez ce contrat et mettons-nous au travail. Assurez-vous simplement d'apporter votre propre <EM4>rayon tracteur portable</EM4> pour une efficacité maximale.\n\n\nAu plaisir de travailler avec vous,\n\nUnified Distribution Management\n -Livrez les Colis Intacts-\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_LocalDelivery_desc_05=Salutations, Partenaire d'Expédition Qualifié !\n\nVous êtes à la recherche d'une nouvelle carrière passionnante dans le confort de votre propre vaisseau prêt à embarquer ? Alors l'itinéraire suivant pourrait bien être l'opportunité que vous recherchiez -\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Pickup2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Pickup3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> à <EM4>~mission(Pickup4|Address)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> à <EM4>~mission(Pickup5|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> à <EM4>~mission(Dropoff4|Address)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> à <EM4>~mission(Dropoff5|Address)</EM4> \n\nTout ce que vous avez à faire est d'accepter le contrat et vous pourrez prendre la route. Assurez-vous simplement d'apporter votre propre <EM4>rayon tracteur portable</EM4> pour une efficacité maximale.\n\n\nAu plaisir de travailler avec vous,\n\nUnified Distribution Management\n -Livrez les Colis Intacts-\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_LocalDelivery_desc_intro=Salutations Partenaire d'Expédition Qualifié Potentiel !\n\nPrêt à contribuer à notre réseau de livraison en pleine croissance et en expansion ? Vous avez à votre disposition un vaisseau capable de transporter plusieurs colis et de voler entre les corps planétaires locaux et les satellites ? Unified Distribution Management est à la recherche d'un pilote comme vous ! \n\nNous serions ravis d’évaluer votre potentielle embauche avec cet itinéraire soigneusement sélectionné -\n\nENLÈVEMENT DE COLIS\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Pickup1|Address)</EM4>\n\nLIEU DE DÉPÔT\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n\nSi cela vous intéresse, acceptez cette offre immédiatement ! Assurez-vous simplement d'apporter votre propre <EM4>rayon tracteur portable</EM4> pour une efficacité maximale.\n\nAu plaisir de travailler avec vous,\n\nUnified Distribution Management\n -Livrez les Colis Intacts-\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +250
UDM_LocalDelivery_desc_rehire=Salutations, Ancien Partenaire d'Expédition Qualifié !\n\nPrêt à avoir une autre chance d'utiliser votre vaisseau prêt à embarquer pour gagner des crédits ? Unified Distribution Management a choisi l'itinéraire suivant soigneusement sélectionné comme le moyen idéal pour réévaluer vos compétences -\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Pickup2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Pickup3|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>\n \nAssurez-vous simplement d'apporter votre propre <EM4>rayon tracteur portable</EM4> pour une efficacité maximale.\n\nAu plaisir de retravailler avec vous,\n\nUnified Distribution Management\n -Livrez les Colis Intacts-\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
