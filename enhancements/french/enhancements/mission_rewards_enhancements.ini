headhunters_killship_gen_hrt_desc_001=Nous avons reçu le feu vert pour enfin supprimer ~mission(TargetName). Ils nous ont donné du fil à retordre depuis qu'ils sont arrivés dans le système il y a quelques années et il est enfin temps de les éliminer une fois pour toutes. \n\nNous avons appris que ~mission(TargetName|Last) a été repérée en vol près de ~mission(Location|Address) et le Juge veut qu'on s'en occupe tout de suite.\n\nEliminez-les.\n\n- Stows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1\n<EM4>Veteran Contractor:</EM4> +600 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
