mg_klim_localdelivery_drugprod_desc_intro=Normalement, j'aime tout cuisiner moi-même à partir de rien. Fierté du produit et tout le reste. Mais de temps en temps, quand les camés ont trop faim, je dois faire appel à d'autres labo.\n\nJ'ai trop de travail ici, j'aurais besoin de quelqu'un pour m'aider à superviser toute la chaîne de production. Je n'ai trouvé personne de plus qualifié et de plus disponible que toi. \n\n~mission(Itinerary)\n\nNe te laisse pas distraire. Cela arrive plus souvent qu'on ne le pense. Ramene moi la liste complète, et je veillerai à ce que tu reçoive une bonne part des bénéfices.\n\n-Wallace\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +1,000
