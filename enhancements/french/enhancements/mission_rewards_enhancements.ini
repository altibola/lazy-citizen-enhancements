RedWind_Delivery_Illegal_Desc_01=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------\n\nJ'ai une autre mission spéciale pour laquelle j'aurais besoin de vos services. Ça devrait être une livraison rapide.\n\nENLÈVEMENT DE COLIS\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis <EM4>~mission(Pickup1|Address)</EM4>)\n\nLIEUX DE DÉPÔT\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n\nEt n'oubliez pas de ne pas déranger les clients ou leurs invités. Le professionnalisme est de rigueur.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Desc_02=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------\n\nJ'ai une autre mission spéciale pour laquelle j'aurais besoin d'un pilote de confiance.\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> depuis <EM4>~mission(Pickup2|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n\nCe sont des clients très importants pour nous, nous vous demandons donc de les traiter, ainsi que leurs colis, avec le plus grand respect.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Desc_03=RED WIND LINEHAUL\n"VOS MARCHANDISES ENTRE DE BONNES MAINS"\n----------------------------\n\nUne autre mission spéciale est arrivée de l'un de nos clients plus privés.\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> depuis <EM4>~mission(Pickup2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> depuis <EM4>~mission(Pickup3|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>\n\nN'oubliez pas de faire profil bas. Ce client ne veut pas attirer l'attention sur son entreprise, et je ne veux pas qu'un client soit mécontent. Surtout dans ce cas.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Desc_04=RED WIND LINEHAUL\n"VOS MARCHANDISES ENTRE DE BONNES MAINS"\n----------------------------\n\nJ'ai une autre mission spéciale. J'ai pensé que vous seriez le bon pilote pour la gérer pour moi.\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> depuis <EM4>~mission(Pickup2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> depuis <EM4>~mission(Pickup3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> depuis <EM4>~mission(Pickup4|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> à <EM4>~mission(Dropoff4|Address)</EM4>\n\nEncore une fois, soyez intelligent et ne dites rien de ce que vous pourriez voir ou entendre pendant que vous êtes là-bas. N'oubliez pas, vous êtes là juste pour les colis.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Desc_05=RED WIND LINEHAUL\n"VOS MARCHANDISES ENTRE DE BONNES MAINS"\n----------------------------\n\nJ'ai une autre mission spéciale pour laquelle j'aurais besoin de vos services. Celle-ci est un peu plus compliquée car il y a quelques colis supplémentaires à suivre. Voici la liste :\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> depuis <EM4>~mission(Pickup2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> depuis <EM4>~mission(Pickup3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> depuis <EM4>~mission(Pickup4|Address)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> depuis <EM4>~mission(Pickup5|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> à <EM4>~mission(Dropoff4|Address)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> à <EM4>~mission(Dropoff5|Address)</EM4> \n\nAssurez-vous que les bons colis arrivent à destination. Vous ne voulez vraiment pas avoir à expliquer un mélange à ces clients particuliers.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Desc_Intro=RED WIND LINEHAUL\n"VOS MARCHANDISES ENTRE DE BONNES MAINS"\n----------------------------\n\nJe sais que vous avez fait du bon travail pour nous par le passé, alors j'ai pensé voir si ça vous intéresserait de vous occuper d'une mission spéciale pour nous, un peu plus loin dans le système que ce que vous avez fait jusqu'à présent.\n\nEn gros, nous avons besoin d'un pilote prêt à rester discret, se concentrer sur la livraison des colis, et surtout, ne pas poser beaucoup de questions.\n\nPour une petite entreprise comme la nôtre, rester en avance sur la concurrence signifie que nous devons offrir à nos clients quelque chose qu'ils ne peuvent pas trouver ailleurs - la discrétion. Chez Red Wind, tant que vous avez les crédits, nous livrerons n'importe quoi n'importe où. Compris ?\n\nSi cela vous convient, voyons comment vous vous débrouillez sur cette mission -\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> depuis <EM4>~mission(Pickup2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> depuis <EM4>~mission(Pickup3|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>\n\nUn dernier conseil, il serait probablement bon d'éviter tout retard inutile une fois que vous avez les colis à bord, par exemple, être fouillé par les forces de l'ordre locales.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Title_01=Course de Messagerie Discrète RED WIND <EM4>[500 Rep]</EM4>
RedWind_Delivery_Illegal_Title_Intro=RED WIND A Besoin de Coursiers Discrets <EM4>[500 Rep]</EM4>
RedWind_HaulCargo_AToB_ASD_Desc=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS' \n----------------------------    \n\nASD nous a contactés pour nous dire que l'un de leurs anciens laboratoires, <EM4>~mission(Location|Address)</EM4>, contient encore des marchandises qu'ils souhaitent récupérer.\n\nVous devez vous rendre sur place avec un vaisseau capable de transporter des conteneurs d'une taille maximale de <EM4>~mission(MissionMaxSCUSize)</EM4>, atterrir dans le hangar, charger les conteneurs à partir du monte-charge, puis les transporter jusqu'à <EM4>~mission(Destination|Address)</EM4>. \n\nVeillez simplement à rester vigilant pendant que vous êtes dans le complexe et essayez de ne pas vous laisser gagner par la curiosité. Les sites abandonnés comme celui-ci abritent souvent tout un tas de mauvaises choses. Et n'oubliez pas d'emporter un <EM4>rayon tracteur portatif</EM4>. \n\nDONNEZ LE MEILLEUR DE VOUS-MÊME – Soyez fier du travail que vous accomplissez et vous accomplirez un travail dont vous pourrez être fier.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rookie:</EM4> +50 Rep
RedWind_HaulCargo_AToB_ASD_title=Transfert de Marchandises depuis un Site Désaffecté <EM4>[50 Rep]</EM4>
RedWind_HaulCargo_AToB_desc_01=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------  \n\nBesoin d'un pilote pour un transport simple allant du monte-charge de <EM4>~mission(Location|Address)</EM4> à <EM4>~mission(Destination|Address)</EM4>. Ça devrait être assez facile tant que vous avez un vaisseau capable de transporter des conteneurs d'une taille maximale de <EM4>~mission(MissionMaxSCUSize)</EM4>. \n\nLes crédits ne sont pas plus faciles à obtenir que ça. Soyez juste prudent car l'itinéraire n'est pas exactement dans les secteurs les plus sûrs. Et n'oubliez pas d'emporter un <EM4>rayon tracteur portatif</EM4>.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Rookie:</EM4> +50 Rep\n<EM4>Trainee:</EM4> +50 Rep\n<EM4>Rookie:</EM4> +100 Rep\n<EM4>Junior:</EM4> +250 Rep\n<EM4>Experienced:</EM4> +1,000 Rep
RedWind_HaulCargo_AToB_desc_FromPyro_Danger=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------\n\nCertaines entreprises voient peut-être un danger dans les missions à Pyro. Nous, nous y voyons des profits. Nous en avons une ici qui commence dans le système à <EM4>~mission(Location|Address)</EM4> et se termine à <EM4>~mission(Destination|Address)</EM4>.  \n\nLe client nous a avertis que les hors-la-loi de Pyro s'en prennent régulièrement à cette mission, ce qui a effrayé d'autres entreprises de transport. Assurez-vous que votre vaisseau est bien équipé et peut transporter <EM4>~mission(MissionMaxSCUSize) conteneurs</EM4>. Et n'oubliez pas d'emporter un <EM4>rayon tracteur portatif</EM4>.  \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x6\n<EM4>Rookie:</EM4> +200 Rep
RedWind_HaulCargo_AToB_desc_LuxuryGoods_Danger_Timed=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------  \n\nNous avons obtenu un contrat auprès d'un client important qui a besoin d'un pilote expérimenté pour transporter une importante cargaison d'articles de luxe de <EM4>~mission(Location|Address)</EM4> à <EM4>~mission(Destination|Address)</EM4>. \n\nVous aurez besoin d'au moins <EM4>~mission(MissionMaxSCUSize) conteneurs</EM4> dans votre soute. Vous aurez également besoin d'un <EM4>rayon tracteur portatif</EM4> pour charger et décharger tout le contenu. \n\nEt, pour être honnête, les articles que vous transporterez sont suffisamment coûteux pour attirer une attention indésirable. <EM4>Soyez prêt à vous défendre</EM4> si vous ne pouvez pas échapper à vos poursuivants.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x1\n<EM4>Rookie:</EM4> +200 Rep
RedWind_HaulCargo_AToB_desc_ToPyro_Danger=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------\n\nNous avons ici un trajet qui pourrait devenir une source de revenus régulière si nous le menons à bien. Il vous emmènera dans Pyro, il faudra donc être prêt à croiser le fer avec certains locaux. \n\nVous devrez récupérer la cargaison à <EM4>~mission(Location|Address)</EM4>, faire le saut vers Pyro, puis rejoindre <EM4>~mission(Destination|Address)</EM4>. \n\nTout ce qu’il vous faut, c’est un vaisseau avec suffisamment de place pour des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>, un <EM4>rayon tracteur portatif</EM4>, et être prêt à faire des dégâts si quelqu’un vient chercher la bagarre.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x3\n<EM4>Rookie:</EM4> +200 Rep
RedWind_HaulCargo_AToB_title_01=Recherche transporteur ~mission(ReputationRank) pour ~mission(CargoGradeToken) transport de fret direct <EM4>[50–1,000 Rep]</EM4>
RedWind_HaulCargo_AToB_waste_desc_01=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------  \n\nBesoin d'un pilote pour un transfert de déchets depuis le monte-charge de <EM4>~mission(Location|Address)</EM4> vers <EM4>~mission(Destination|Address)</EM4>. Ça devrait être assez facile tant que vous avez un vaisseau qui peut prendre en charge des conteneurs jusqu'à <EM4>~mission(MissionMaxSCUSize)</EM4>. N'apportez pas non plus votre vaisseau le plus propre.\n\nLe bon côté des choses, c'est que les hors-la-loi vous laisseront probablement tranquille quand ils verront ce que vous transportez. Et n'oubliez pas d'emporter un <EM4>rayon tracteur portatif</EM4>.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 7/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Trainee:</EM4> +50 Rep\n<EM4>Junior:</EM4> +250 Rep\n<EM4>Experienced:</EM4> +1,000 Rep
RedWind_HaulCargo_MultiToSingle_desc_01=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------\n\nJe viens d'avoir une communication avec un client. Ils ont des cargaisons (conteneurs de <EM4>~mission(MissionMaxSCUSize)</EM4> maximum) à différents endroits, prêtes à être acheminées vers un monte-charge à <EM4>~mission(Destination|Address)</EM4>.\n\nLIEUX D'ENLÈVEMENT (DANS N'IMPORTE QUEL ORDRE)  \n~mission(MultiToSingleToken)  \n\nJe vous recommande de prendre quelques minutes pour planifier votre itinéraire avant de décoller. Vous économiserez peut-être un peu de carburant. Et n'oubliez pas d'emporter un <EM4>rayon tracteur portatif</EM4>.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 7/7 | Risk 6/7 | Knowledge 3/7\n<EM4>Junior:</EM4> +250 Rep\n<EM4>Member:</EM4> +500 Rep\n<EM4>Experienced:</EM4> +1,000 Rep\n<EM4>Senior:</EM4> +2,000 Rep\n<EM4>Master:</EM4> +4,000 Rep
RedWind_HaulCargo_MultiToSingle_desc_RantaDung=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------\n\nUn fermier de Pyro nous a demandé des fournitures agricoles spécialisées — plus précisément de la bouse de ranta. Apparemment, les engrais classiques ne suffisent plus. Il a passé commande auprès de plusieurs distributeurs et a besoin de quelqu’un pour tout ramener à <EM4>~mission(Destination|Address)</EM4>.\n\nVoici tous les endroits où vous pouvez récupérer le fumier :\n\nLIEUX D'ENLÈVEMENT (N'IMPORTE QUEL ORDRE)\n\n ~mission(MultiToSingleToken)\n\nLe client précise que votre vaisseau doit pouvoir transporter au moins des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>. N’oubliez pas d’apporter votre propre <EM4>rayon tracteur portatif</EM4> pour le chargement et le déchargement.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x23\n<EM4>Rookie:</EM4> +200 Rep
RedWind_HaulCargo_MultiToSingle_title_01=Recherche transporteur ~mission(ReputationRank) pour ~mission(CargoGradeToken) transport de fret <EM4>[200–4,000 Rep]</EM4>
RedWind_HaulCargo_MultiToSingle_waste_desc_01=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------\n\nJ'ai reçu un tas de communications ce matin. Il semblerait que le vaisseau d'un des collecteurs de déchets locaux soit cassé et que nous devions prendre le relais.\n\nJ'ai un tas de déchets (conteneurs de <EM4>~mission(MissionMaxSCUSize)</EM4> maximum) à différents endroits, prêts à être transportés vers un monte-charge à <EM4>~mission(Destination|Address)</EM4>.\n\nLIEUX D'ENLÈVEMENT (DANS N'IMPORTE QUEL ORDRE)  \n~mission(MultiToSingleToken)\n\nEt n'oubliez pas d'emporter un <EM4>rayon tracteur portatif</EM4>.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 7/7 | Risk 6/7 | Knowledge 3/7\n<EM4>Junior:</EM4> +250 Rep\n<EM4>Member:</EM4> +500 Rep\n<EM4>Senior:</EM4> +2,000 Rep\n<EM4>Master:</EM4> +4,000 Rep
RedWind_HaulCargo_SingleToMulti_desc_01=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------\n\nL'un des habitants de <EM4>~mission(Location|Address)</EM4> m'a contacté pour me faire part d'une pile de conteneurs, d'une taille maximale de <EM4>~mission(MissionMaxSCUSize)</EM4>, qui doit être transportée vers plusieurs endroits différents.   \n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n~mission(SingleToMultiToken)  \n\nJe vous fais confiance pour définir votre propre itinéraire, alors ne vous trompez pas. Et essayez de rester à l'écart des endroits trop dangereux. Et n'oubliez pas d'emporter un <EM4>rayon tracteur portatif</EM4>.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Rookie:</EM4> +100 Rep\n<EM4>Junior:</EM4> +250 Rep\n<EM4>Member:</EM4> +500 Rep
RedWind_HaulCargo_SingleToMulti_desc_RevenantTreePollen=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------\n\nRed Wind a besoin d’un pilote expérimenté pour transporter un important envoi de pollen brut d’arbre revenant depuis <EM4>~mission(Location|Address)</EM4> vers les destinations suivantes :\n\nLIEUX DE DÉPÔT (N'IMPORTE QUEL ORDRE)\n\n~mission(SingleToMultiToken)\n\nCela peut paraître évident, mais le représentant des CFP nous a demandé de vous assurer que le transport de pollen d’arbre revenant non traité est autorisé par la loi de l’UEE. \n\nAvant d’accepter le contrat, assurez-vous que votre vaisseau peut embarquer jusqu’à des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>. Et si vous n’en avez pas déjà un, achetez un <EM4>rayon tracteur portatif</EM4> pour rendre le chargement et le déchargement aussi simples que possible.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x23\n<EM4>Rookie:</EM4> +200 Rep
RedWind_HaulCargo_SingleToMulti_desc_ToCFP_Danger_Timed=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------\n\nLe CFP a une demande urgente pour un pilote ayant de l’expérience au combat. Plusieurs de leurs colonies sont sous menace immédiate et pourraient être attaquées sous peu, elles ont donc besoin de ravitaillement au plus vite. \n\nSi vous pensez pouvoir naviguer dans une zone potentiellement hostile, rendez-vous à <EM4>~mission(Location|Address)</EM4>, récupérez la cargaison et livrez-la aux endroits suivants :\n\nLIEUX DE DÉPÔT (N'IMPORTE QUEL ORDRE)\n\n~mission(SingleToMultiToken)\n\nVous aurez besoin de suffisamment de place pour des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>, ainsi que de votre propre <EM4>rayon tracteur portatif</EM4> pour charger et décharger l’ensemble.\n\nGardez à l’esprit que la meilleure option reste toujours de fuir si quelqu’un tente de vous tendre une embuscade. Mais si vous êtes acculé, n’hésitez pas à vous défendre.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x12\n<EM4>Rookie:</EM4> +200 Rep
RedWind_HaulCargo_SingleToMulti_title_01=Recherche transporteur ~mission(ReputationRank) pour ~mission(CargoGradeToken) transport de fret <EM4>[100–4,000 Rep]</EM4>
RedWind_HaulCargo_SingleToMulti_waste_desc_01=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------   \n\nLes habitants de <EM4>~mission(Location|Address)</EM4> font le ménage et ont un tas de déchets (dans des conteneurs d'une taille maximale de <EM4>~mission(MissionMaxSCUSize)</EM4>) qui doivent être transportés à différents endroits. (Ne me demandez pas pourquoi. Ils nous paient, c'est tout ce que je sais.)\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)  \n~mission(SingleToMultiToken)\n\nEt n'oubliez pas d'emporter un <EM4>rayon tracteur portatif</EM4>.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 5/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Member:</EM4> +500 Rep\n<EM4>Experienced:</EM4> +1,000 Rep\n<EM4>Senior:</EM4> +2,000 Rep\n<EM4>Master:</EM4> +4,000 Rep
RedWind_LocalDelivery_desc_01=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------\n\nJ'ai besoin d'un pilote indépendant disponible pour une livraison locale rapide.\n\nENLÈVEMENT DE COLIS\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis <EM4>~mission(Pickup1|Address)</EM4>\n\nLIEUX DE DÉPÔT\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n\nEssayez de rester discret lorsque vous serez là-bas. Si vous avez des colis Red Wind à bord, un certain niveau de professionnalisme est apprécié. Et n'oubliez pas d'emporter un <EM4>rayon tracteur portatif</EM4>.\n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250
RedWind_LocalDelivery_desc_02=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------\n\nJe recherche un pilote pour transporter quelques colis -\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> depuis <EM4>~mission(Pickup2|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n\nJ'ai besoin que ce soit fait rapidement et sans accrocs. Et n'oubliez pas d'emporter un <EM4>rayon tracteur portatif</EM4>.\n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_LocalDelivery_desc_03=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------\n\nBonjour tout le monde, j'ai un contrat disponible pour tous les pilotes avec un vaisseau prêt -\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> depuis <EM4>~mission(Pickup2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> depuis <EM4>~mission(Pickup3|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>\n\nEt n'oubliez pas d'emporter un <EM4>rayon tracteur portatif</EM4>.\n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_LocalDelivery_desc_04=RED WIND LINEHAUL\n"VOS MARCHANDISES ENTRE DE BONNES MAINS"\n----------------------------\n\nUne mission est arrivée qui nécessite un pilote disponible.\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> depuis <EM4>~mission(Pickup2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> depuis <EM4>~mission(Pickup3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> depuis <EM4>~mission(Pickup4|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> à <EM4>~mission(Dropoff4|Address)</EM4>\n\nEt pour être clair, vous devez fournir votre propre vaisseau cargo. Assurez-vous d'avoir l'espace nécessaire. Et n'oubliez pas d'emporter un <EM4>rayon tracteur portatif</EM4>.\n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_LocalDelivery_desc_05=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------\n\nJ'ai organisé une mission avec de multiples arrêts qui a besoin d'un pilote.\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> depuis <EM4>~mission(Pickup2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> depuis <EM4>~mission(Pickup3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> depuis <EM4>~mission(Pickup4|Address)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> depuis <EM4>~mission(Pickup5|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> à <EM4>~mission(Dropoff4|Address)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> à <EM4>~mission(Dropoff5|Address)</EM4> \n\nAssurez-vous que votre vaisseau dispose de l'espace nécessaire pour toutes ces collectes. Et n'oubliez pas d'emporter un <EM4>rayon tracteur portatif</EM4>.\n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_LocalDelivery_desc_intro=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------\n\nNous cherchons à embaucher un pilote indépendant qui serait intéressé par un itinéraire local.\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis <EM4>~mission(Pickup1|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n\nSi vous réussissez, nous pourrons envisager d'autres contrats à l'avenir. Et n'oubliez pas d'emporter un <EM4>rayon tracteur portatif</EM4>.\n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +100
RedWind_LocalDelivery_desc_rehire=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------\n\nMême si nous ne vous avons pas embauché depuis un certain temps, nous avons besoin d'une aide supplémentaire en ce moment.\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> depuis <EM4>~mission(Pickup2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> depuis <EM4>~mission(Pickup3|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE))\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>\n\nSi vous réussissez cette livraison, nous pourrons envisager d'en faire une activité plus régulière. Et n'oubliez pas d'emporter un <EM4>rayon tracteur portatif</EM4>.\n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_LocalDelivery_title_01=Itinéraire de Livraison Locale Red Wind <EM4>[250–500 Rep]</EM4>
RedWind_LocalDelivery_title_intro=Red Wind Recherche de Nouveaux Pilotes <EM4>[100 Rep]</EM4>
RedWind_LocalDelivery_title_rehire=Nouvelle Tentative de Livraison Red Wind <EM4>[500 Rep]</EM4>
RedWind_RecoverCargo_Easy_Description=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------\n\nUn de nos transporteurs a eu un problème moteur pendant qu’il acheminait une cargaison pour nous et a été forcé d’abandonner son vaisseau. Nous recherchons un prestataire capable de récupérer la cargaison et de terminer la livraison. Vous devrez apporter votre propre <EM4>rayon tracteur puissant</EM4> pour transférer la cargaison dans votre vaisseau. Détails ci-dessous.\n\nLIEU DE RÉCUPÉRATION\n · <EM4>~mission(Location|Address)</EM4>\n\nLIEU DE DÉPÔT\n · Monte-charge à <EM4>~mission(Destination|Address)</EM4>\n\nAttention, le lieu de récupération n’a pas été confirmé comme sûr. Vous pourriez tomber sur un hors-la-loi opportuniste cherchant à s’approprier la cargaison, restez donc vigilant.\n\nSOYEZ FIER DE VOTRE TRAVAIL – Même en tant que prestataire, vous représentez Red Wind Linehaul. Ne faites rien qui puisse nuire à la réputation de l'entreprise.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Unknown:</EM4> 1\n<EM4>Trainee:</EM4> +100 Rep
RedWind_RecoverCargo_Easy_Title=Red Wind - Récupération facile de cargaison <EM4>[100 Rep]</EM4>
RedWind_RecoverCargo_Hard_Description=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------\n\nNous avons des difficultés à finaliser une mission de transport et avons besoin d’un prestataire fiable, expérimenté dans les environnements dangereux, pour terminer le travail. À titre d'information, la cargaison se trouve dans un vaisseau abandonné, entouré de plusieurs hors-la-loi extrêmement dangereux. Nous vous recommandons fortement d’amener des renforts avec vous et un <EM4>rayon tracteur puissant</EM4> pour récupérer les marchandises du client. Détails ci-dessous :\n\nLIEU DE RÉCUPÉRATION\n · <EM4>~mission(Location|Address)</EM4>\n\nLIEU DE DÉPÔT\n · Monte-charge de fret à <EM4>~mission(Destination|Address)</EM4>\n\nÉtant donné la prise de risque, nous proposons une rémunération proportionnelle. À vous de décider comment la répartir avec votre équipage.\n\nSOYEZ FIER DE VOTRE TRAVAIL – Même en tant que prestataire, vous représentez Red Wind Linehaul. Ne faites rien qui puisse nuire à la réputation de l'entreprise.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Unknown:</EM4> 1\n<EM4>Junior:</EM4> +200 Rep
RedWind_RecoverCargo_Hard_Title=Red Wind - Récupération difficile de cargaison <EM4>[200 Rep]</EM4>
RedWind_RecoverCargo_Medium_Description=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------\n\nUn transporteur Red Wind a été pris en embuscade par des hors-la-loi et la cargaison de nos clients est désormais à l’arrêt pendant qu’ils se préparent à la voler. Nous avons besoin d’un pilote équipé d’un <EM4>puissant rayon tracteur</EM4> et d’un vaisseau prêt au combat pour se rendre au point ci-dessous et récupérer la cargaison avant qu’elle ne disparaisse pour de bon.\n\nLIEU DE RÉCUPÉRATION\n · <EM4>~mission(Location|Address)</EM4>\n\nLIEU DE DÉPÔT\n · Monte-charge à <EM4>~mission(Destination|Address)</EM4>\n\nLe pilote a signalé la présence de multiples hostiles, prenez donc cette mission très au sérieux. \n\nCHAQUE OPPORTUNITÉ COMPTE – Tirez le meilleur parti de ce qui vous est confié, montrez-nous que vous pouvez traiter davantage de travail.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Unknown:</EM4> 1\n<EM4>Rookie:</EM4> +150 Rep
RedWind_RecoverCargo_Medium_Title=Red Wind – Récupération directe de cargaison <EM4>[150 Rep]</EM4>
RedWind_RecoverCargo_Super_Description=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------\n\nNous avons une mission spéciale réservée aux prestataires les plus compétents. L’un de nos transporteurs, aujourd’hui décédé, n’a pas pu terminer sa dernière mission. La cargaison qu’il devait livrer est toujours à bord de son ancien vaisseau, à l'emplacement indiqué ci-dessous.\n\nLIEU DE RÉCUPÉRATION\n · <EM4>~mission(Location|Address)</EM4>\n\nLIEU DE DÉPÔT\n · Monte-charge à <EM4>~mission(Destination|Address)</EM4>\n\nJe ne vais pas tourner autour du pot, il s’agit d’une mission extrêmement difficile. Il vous faudra une équipe de pilotes chevronnés pour faire face aux hors-la-loi qui ont tué le précédent prestataire, ainsi qu’un <EM4>rayon tracteur puissant</EM4> pour récupérer la cargaison du client. Cela dit, si vous acceptez ce contrat, nous ferons en sorte que le jeu en vaille la chandelle.\n\nCOMMENT NOUS SOMMES-NOUS DÉBROUILLÉS – Remplissez notre court questionnaire de satisfaction sur notre page Spectrum pour avoir une chance de participer à notre tirage au sort mensuel.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Unknown:</EM4> 1\n<EM4>Experienced:</EM4> +300 Rep
RedWind_RecoverCargo_Super_Title=Red Wind – Récupération spéciale de cargaison <EM4>[300 Rep]</EM4>
RedWind_RecoverCargo_VeryHard_Description=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------\n\nNous recherchons un pilote hautement qualifié capable de récupérer la cargaison de notre client. Merci de n’accepter ce contrat que si vous avez l’habitude de gérer des situations extrêmement hostiles impliquant plusieurs combattants. Des membres d’équipage supplémentaires et un <EM4>puissant rayon tracteur</EM4> sont fortement recommandés.\n\nLIEU DE RÉCUPÉRATION\n · <EM4>~mission(Location|Address)</EM4>\n\nLIEU DE DÉPÔT\n · Monte-charge à <EM4>~mission(Destination|Address)</EM4>\n\nLa cargaison devrait se trouver dans la soute du vaisseau abandonné. Le client a déjà fait part de sa frustration quant au retard pris, merci donc de travailler rapidement et efficacement.\n\nFAITES PREUVE DE RÉSILIENCE – La vie est dure, et il faut parfois encaisser les coups. Continuez d’avancer et ne vous laisser pas abattre.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Unknown:</EM4> 1\n<EM4>Member:</EM4> +200 Rep
RedWind_RecoverCargo_VeryHard_Title=Red Wind – Récupération dangereuse de cargaison <EM4>[200 Rep]</EM4>
Redwind_internaldelivery_dc_desc_001=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------\n\nLes gens de <EM4>~mission(Location|Address)</EM4> font un peu de nettoyage et veulent que quelques colis soient déplacés dans l'installation.\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis le <EM4>~mission(Pickup1)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> depuis le <EM4>~mission(Pickup2)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> au <EM4>~mission(Dropoff1)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> au <EM4>~mission(Dropoff2)</EM4>\n\nIls ont besoin que cela soit fait de manière efficace et sans trop d'ennuis.\n\n\nNE PRENEZ PAS CE CONTRAT - à moins que vous ne soyez fiable. Red Wind jouit d'une réputation à laquelle nos clients font confiance, et ce pour de bonnes raisons. \n\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Redwind_internaldelivery_dc_desc_003=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------\n\nNous avons quelques boites qui ont besoin de réorganisation à <EM4>~mission(Location|Address)</EM4>.\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis le <EM4>~mission(Pickup1)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> depuis le <EM4>~mission(Pickup2)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> depuis le <EM4>~mission(Pickup3)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> depuis le <EM4>~mission(Pickup4)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> au <EM4>~mission(Dropoff1)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> au <EM4>~mission(Dropoff2)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> au <EM4>~mission(Dropoff3)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> au <EM4>~mission(Dropoff4)</EM4>\n\n\nA TOUS LES VÉTÉRANTS - Red Wind apprécie les services que vous avez rendus a notre empire ! Vos combats sont synonymes de liberté ! \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
Redwind_internaldelivery_dc_desc_005=RED WIND LINEHAUL\n'VOS MARCHANDISES ENTRE DE BONNES MAINS'\n----------------------------\n\nIl semble qu'il y ait eu un petit accroc logistique à <EM4>~mission(Location|Address)</EM4> et qu'ils aient besoin de quelqu'un pour s'assurer que les colis égarés finissent là où ils sont censés aller à l'intérieur de l'installation.\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis le <EM4>~mission(Pickup1)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> depuis le <EM4>~mission(Pickup2)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> depuis le <EM4>~mission(Pickup3)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> depuis le <EM4>~mission(Pickup4)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> depuis le <EM4>~mission(Pickup5)</EM4>\n     · Colis <EM4>#~mission(Item6|SerialNumber)</EM4> depuis le <EM4>~mission(Pickup6)</EM4>\n\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> au <EM4>~mission(Dropoff1)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> au <EM4>~mission(Dropoff2)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> au <EM4>~mission(Dropoff3)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> au <EM4>~mission(Dropoff4)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> au <EM4>~mission(Dropoff5)</EM4>\n     · Colis <EM4>#~mission(Item6|SerialNumber)</EM4> au <EM4>~mission(Dropoff6)</EM4>\n\n\n\nLA CONFIANCE VA DANS LES DEUX SENS - En acceptant ce contrat, vous vous engagez à ne pas nous tromper, et Red Wind Linehaul s'engage à vous traiter de la même façon. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000
Redwind_internaldelivery_dc_title_001=Manutentionnaire Red Wind <EM4>[500–2,000 Rep]</EM4>
RepairOxygenKiosk_DescriptionLong=Bonjour Détenus,\n\nNous avons récemment été alertés qu'un de nos distributeurs d'oxygène a subi une erreur technique. Comme vous le savez, ces bornes sont essentiels pour garantir que vous disposez de suffisamment d'oxygène à portée de main lorsque vous participez à notre Programme de Réinsertion.\n\nNous recherchons tout détenus disponible pour réinitialiser la borne. Cela devrait le reconnecter au réseau et résoudre le problème. Le premier détenus capable d'accomplir cette tâche sera non seulement récompensé en mérites, mais aussi par la satisfaction de rendre le lieu de travail plus sûr pour les autres détenus.\n\nMerci.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100
RepairOxygenKiosk_Title=Opportunité de Manutention pour Prisonnier <EM4>[100 Rep]</EM4>
ResourceRush_Lawful_desc_001=pu resourcerush prototype\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
RetakeLocation_MissionDescription=~mission(Contractor|RetakeLocationDescription)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
RetrieveDatapad_desc=Je suis tombé sur un sacré coup de malchance et j'espère que tu peux m'aider à résoudre ce problème.\n\nIl y a quelques jours, j'ai engagé l'équipage du 'Pride of Arliss' pour obtenir des données importantes. Ils ont réussi le boulot sans problème, mais ce salopard de capitaine m'a contacté en exigeant plus de crédits. Apparemment, ce n'est pas la première fois qu'il essaye de faire ce coup, car au milieu de nos "négociations", son vaisseau a été attaqué par des individus très mécontents cherchant à lui donner une leçon.\n\nNotre communication a été coupée quand les tirs ont commencé, et c'est la dernière fois que j'ai eu de ses nouvelles. Je suppose qu'il a disparu, mais je veux que tu te rendes sur le Pride of Arliss et que tu essaies de récupérer mes données sur le datapad personnel du capitaine.\n\nUne fois que tu l'auras, j'ai mis en place un canal de transmission sécurisé à la station de repos ARC-L1. Rends toi là bas et lorsque tu seras à portée, soumets moi les données via ce contrat pour être payé.\n\nNe cherche pas à me rouler non plus. La karma peut être une vraie garce.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Unknown:</EM4> 1
Roughready_bounty_desc_002=Rough & Ready fait affaire avec ~mission(TargetName) depuis des années, mais cette relation  s'est détériorée. Pendant un moment, nous leur fournissions du carburant à crédit, mais lorsque le moment est venu de recouvrer les sommes dues, ce lâche s'est caché. Si ~mission(TargetName|Last) ne peut pas payer avec des crédits, je suppose qu'il va payer de sa vie.\n\nUn associé vient d'arrêter ~mission(TargetName|Last) à ~mission(Location|Address).J'aimerais que tu te rend sur place maintenant pour faire payer ce radin.\n\nAu fait, il semble que ~mission(TargetName|Last) ne voyage pas seul, alors assure-toi d'être bien équipé avant de les affronter.\n\n- Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
Roughready_destroyitems_fuel_desc_01=Si tu cherches à gagner quelques crédits facilement, j'ai une offre pour toi.\n\nVois-tu, la rumeur dit que ~mission(location|address) fonctionne comme un dépôt de carburant. Ils n'ont pas dû comprendre que le commerce du carburant à Pyro appartient à Rough & Ready.\n\nC'est pourquoi tu vas te rendre sur place et détruire leurs réserves de carburant. Tu devrais les repérer facilement. Ce sont des grands réservoirs jaunes répartis autour de l'avant-poste. Attention, des tourelles défendent la zone, alors sois prêt à esquiver leurs tirs ou exploser les canons.\n\nJe te laisse décider de la manière dont tu gères. Les bombes seraient mon premier choix, mais ça m'est égal tant que le boulot est fait.\n\n- Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Turrets:</EM4> present (hostile)
Roughready_destroyitems_fuel_title_01=Huile sur le Feu <EM4>[50 Rep]</EM4>
Ruto_Assassin_Sync_E_Desc=Voici le deal. ~mission(TargetName) et ~mission(TargetName2) doivent mourir en même temps. Malheureusement, ils ne seront pas au même endroit.\n\nUn double meurtre simultané peut sembler compliqué, mais si vous engagez des frères d'armes supplémentaires, cela ne devrait pas être si difficile de faire ces deux coups simultanément.\n\nAssurez-vous de bien trouvez des coéquipiers qui ont les compétences requises, car je sais de source sûre que chacune des cibles auras une escortes pour "se protéger".\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x2
Ruto_Assassin_Sync_E_Title=ensemble pour toujours <EM4>[500 Rep]</EM4>
Ruto_Assassin_Sync_H_Desc=Nous avons une autre paire qui nécessite une mort simultanée. Cela semble devenir de plus en plus populaire comme option de meurtre. \n\nCette fois, il s'agit de ~mission(TargetName) et ~mission(TargetName2). Les deux sont censés être des pilotes assez qualifiés et ils ne voleront pas seuls. \n\nFaites en sorte que celui qui vous aidera dans ce cas-là soit capable de gérer un combat.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x2
Ruto_Assassin_Sync_H_Title=deux fois plus de problème <EM4>[500 Rep]</EM4>
Ruto_Assassin_Sync_Intro_Desc=Devinez ce que ~mission(TargetName) et ~mission(TargetName2) ont en commun ? \n\nVous allez les tuer tous les deux !\n\nLa partie difficile est que j'ai besoin que vous les tuiez en même temps, pour qu'aucun d'entre eux n'ait une chance de s'échapper, ou pire, de tuer la personne qui essaie de les tuer. \n\nAlors formez une équipe pour descendre une cible pendant que vous vous occupez de l'autre. Diviser pour mieux régner !\n\nEt malgré le fait qu'ils aient causé un désastre suffisamment important pour mériter d'être tuer, je crois comprendre qu'ils ne sont de grandes menaces. Ne vous attendez pas à rencontrer trop de résistance.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x1, Targets x2
Ruto_Assassin_Sync_Intro_Title=déclenchement simultané <EM4>[500 Rep]</EM4>
Ruto_Assassin_Sync_M_Desc=J'espère vraiment que vous n'êtes pas amis avec ~mission(TargetName) ou ~mission(TargetName2) parce que j'ai besoin que vous les éliminiez tous les deux... en même temps...\n\nBien sûr, ils ne nous facilitent pas la tâche en voyageant à bord du même vaisseau ou quelque chose du genre. Non, vous allez devoir constituer un équipage pour abattre les deux cibles simultanément. \n\nDès que l'un d'eux est mort, soyez prompt à abattre l'autre aussi. Je ne peux pas prendre le risque qu'un des eux s'enfuie.\n\nEt je pense que je devrais mentionner que non seulement ils sont tous les deux de très bons pilotes, mais qu'ils sont également escorté de renforts. Rien que vous ne puissiez gérer, j'en suis sûr.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x2
Ruto_Assassin_Sync_M_Title=amis jusqu'à la fin <EM4>[500 Rep]</EM4>
Ruto_Assassin_Sync_S_Desc=Si vous me l'aviez demandé, j'aurais préféré que ~mission(TargetName) et ~mission(TargetName2) finissent par s'entre-tuer. Mais au final, vous aurez l'honneur de les tuer tous les deux en même temps.\n\nVous allez devoir travailler pour cela, cependant.\n\nChacun est un problème. De sérieuses références, hautement entraînés et trop intelligents pour voler sans renfort.\n\nRassemblez le meilleur équipage possible pour cette mission. Vous en aurez besoin. Et ne soyez pas avare. Vous ne pourrez pas dépenser de crédits si vous êtes mort.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x2
Ruto_Assassin_Sync_S_Title=deux fois plus d'emmerdes <EM4>[500 Rep]</EM4>
Ruto_Assassin_Sync_VE_Desc=C'est assez touchant de rencontrer un duo prêt à mourir l'un pour l'autre. Stupide, mais touchant.\n\n~mission(TargetName) et ~mission(TargetName2) ont choisi de se lié dans le crime et maintenant, il a été décidé de les éliminer.\n\nTrouvez un partenaire et traquez chacun de ces deux-là. . Assurez-vous de les tuer simultanément. Appelez ça une justice poétique.\n\nIls ne devraient pas être une grande menace. Peut-être qu'ils auront un vaisseau ou deux avec eux, mais je ne pense pas qu'il y aura de quoi s'inquiéter.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x2, Targets x2
Ruto_Assassin_Sync_VE_Title=jusqu'à ce que la mort nous sépare <EM4>[500 Rep]</EM4>
Ruto_Assassin_Sync_VH_Desc=~mission(TargetName) et ~mission(TargetName2). Possible qu'ils soient liés ? Ou sorte ensemble ? Aucune importance, quelqu'un veut qu'ils meurent. \n\nJ'ai fait en sorte que vous puissiez les attaquer lorsqu'ils ne volent pas ensemble. C'est plus sûr pour vous de cette façon. Ce sont tous deux des menaces sérieuses et ils volent avec des renforts tout aussi préoccupant.\n\nAssurez-vous que vous et votre équipage synchronisiez vos attaques. Je ne veux pas qu'un d'entre eux en réchappe, sinon ça deviendra un véritable casse-tête.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x2
Ruto_Assassin_Sync_VH_Title=deux pour le prix de deux <EM4>[500 Rep]</EM4>
