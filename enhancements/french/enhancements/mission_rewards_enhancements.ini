ServiceBeacon_CombatAssist_Mission_Spoofed_Desc=~mission(InitiatorName) demande une assistance au combat dans l'espace lointain. En cas d'acceptation, vous recevrez ~mission(PaymentAmount) aUEC dès l'élimination de la menace.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
ServiceBeacon_CombatAssist_Mission_Spoofed_Difficulty_Easy_Desc=[LOW THREAT]\n\n ~serviceBeacon(InitiatorName) is requesting combat assistance in deep space. If accepted, you will be paid ~serviceBeacon(PaymentAmount) aUEC upon elimination of the threat.\n\nDistance to ~serviceBeacon(InitiatorName) : ~serviceBeacon(DistToInitiator)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
ServiceBeacon_CombatAssist_Mission_Spoofed_Difficulty_Hard_Desc=[MENACE ÉLEVÉE]\n\n ~serviceBeacon(InitiatorName) demande une assistance au combat dans l'espace lointain. Si cette demande est acceptée, vous recevrez ~serviceBeacon(PaymentAmount) aUEC dès l'élimination de la menace.\n\nDistance jusqu'à ~serviceBeacon(InitiatorName) : ~serviceBeacon(DistToInitiator)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
ServiceBeacon_CombatAssist_Mission_Spoofed_Difficulty_Medium_Desc=[MENACE MODÉRÉE]\n\n ~serviceBeacon(InitiatorName) demande une assistance au combat dans l'espace lointain. Si cette demande est acceptée, vous recevrez ~serviceBeacon(PaymentAmount) aUEC dès l'élimination de la menace.\n\nDistance jusqu'à ~serviceBeacon(InitiatorName) : ~serviceBeacon(DistToInitiator)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
ServiceBeacon_CombatAssist_Mission_Spoofed_Difficulty_VeryHard_Desc=[MENACE CRITIQUE]\n\n ~serviceBeacon(InitiatorName) demande une assistance au combat dans l'espace lointain. Si cette demande est acceptée, vous recevrez ~serviceBeacon(PaymentAmount) aUEC dès l'élimination de la menace.\n\nDistance jusqu'à ~serviceBeacon(InitiatorName) : ~serviceBeacon(DistToInitiator)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
ServiceBeacon_Escort_Mission_Desc=~mission(InitiatorName) demande une escorte à l'endroit : ~mission(InitiatorLocation). En cas d'acceptation, vous serez payé ~mission(PaymentAmount) aUEC/Minute jusqu'à ANNULATION par l'Initiateur ou ABANDON par le Prestataire de Services. \n\nNOTE : Le contrat et le paiement commenceront lorsque vous aurez rendez-vous avec le client. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
ServiceBeacon_Heal_Mission_Desc=~mission(InitiatorName) requière une assistance médicale à ~mission(InitiatorLocation). Le paiement sera de ~mission(PaymentAmount) aUEC. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
ServiceBeacon_PersonalTransport_Mission_Desc=~mission(InitiatorName) demande un transport depuis ~mission(InitiatorLocation) vers ~mission(SelectedDestination). Une fois le service effectué, vous serez payé à hauteur de ~mission(PaymentAmount) aUEC.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
ServiceBeacon_Revive_Mission_Desc=~mission(InitiatorName) requière un traitement médical d'urgence à ~mission(InitiatorLocation). Le paiement sera de ~mission(PaymentAmount) aUEC. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Shubin_Industrial_GroundVehicle_Nyx_VH_Interstellar_Desc_001=AFFECTATION : Bon de commande\nLIEU : <EM4>~mission(System) </EM4>\n\nCONDITIONS* : \nShubin Interstellar cherche à honorer un nouveau bon de commande pour des matériaux rares. Votre aide dans cette affaire serait très appréciée.\n\nIl n'existe que quelques endroits connus où ces matériaux peuvent être trouvés, principalement sur les sites désormais désaffectés du groupe Hathor sur <EM4>Daymar et Aberdeen</EM4>. Nous vous suggérons de vous rendre aux Stations d'alignement de plateformes (SAP) et d'essayer de réactiver leur Plateforme laser orbital (PLO) afin d'accéder aux matériaux situés sous la surface de la planète.\n\nNous vous rappelons qu'il s'agit d'un bon de commande et non d'un contrat d'exploitation minière. Vous êtes donc tenu d'apporter votre propre équipement, tel qu'un <EM4>~mission(Hint_Tool)</EM4>.\n\nUne fois prêt à nous vendre les matériaux demandés, déposez-les dans le monte-charge situé à <EM4>~mission(Destination|Address)</EM4>.\n\n*En acceptant ce contrat, vous assumez tous les risques associés aux travaux décrits dans le présent document et Shubin Interstellar ne peut en aucun cas être tenu responsable des dommages survenus pendant la durée du contrat.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 4/7 | Knowledge 6/7\n<EM4>Veteran Contractor:</EM4> +200 Rep
Shubin_Industrial_GroundVehicle_Nyx_VH_Interstellar_Title_001=Commande XL : Minerai extrait en véhicule <EM4>[200 Rep]</EM4>
Shubin_Industrial_GroundVehicle_Pyro_E_DiscoverPlanetary_Desc_001=AFFECTATION : Bon de commande\nLIEU : <EM4>~mission(System) </EM4>\n\nCONDITIONS* : \nEn raison de changements dans notre chaîne d'approvisionnement, Shubin Interstellar cherche à acheter divers matériaux auprès de mineurs indépendants opérant dans la région. Bien que vendre sur une place de marché puisse vous rapporter un prix plus compétitif que l’exécution de notre commande, de nombreux mineurs estiment que renforcer leurs liens avec Shubin constitue un investissement judicieux sur le long terme pour leur carrière.\n\n~mission(Hint_Location) Pour une liste complète des endroits où trouver ces minéraux, consultez les <EM4>Fondamentaux de l'exploitation minière n°2 : Où extraire ?</EM4> dans le journal de votre mobiGlas. Profitez-en pour lire également la première partie, les <EM4>Fondamentaux de l'exploitation minière n°1 : Aperçu général</EM4>, si vous souhaitez vous rafraîchir la mémoire sur la façon d'obtenir ces matériaux.\n\nComme il s'agit d'un bon de commande et non d'un contrat d'exploitation minière, vous êtes tenu d'apporter votre propre équipement, tel qu'un <EM4>~mission(Hint_Tool)</EM4>.\n\nUne fois prêt à nous vendre les matériaux demandés, déposez-les dans le monte-charge situé à <EM4>~mission(Destination|Address)</EM4>.\n\n*En acceptant ce contrat, vous assumez tous les risques associés aux travaux décrits dans le présent document et Shubin Interstellar ne peut en aucun cas être tenu responsable des dommages survenus pendant la durée du contrat.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +100 Rep
Shubin_Industrial_GroundVehicle_Pyro_E_DiscoverPlanetary_Title_001=Petite commande : Minerai extrait en véhicule <EM4>[100 Rep]</EM4>
Shubin_Industrial_GroundVehicle_Pyro_H_Solar_Desc_001=AFFECTATION : Bon de commande\nLIEU : <EM4>~mission(System) </EM4>\n\nCONDITIONS* : \nShubin Interstellar cherche à honorer un nouveau bon de commande pour divers matériaux. Votre aide dans cette affaire serait très appréciée.\n\n~mission(Hint_Location) \n\nNous vous rappelons qu'il s'agit d'un bon de commande et non d'un contrat d'exploitation minière. Vous êtes donc tenu d'apporter votre propre équipement, tel qu'un <EM4>~mission(Hint_Tool)</EM4>.\n\nUne fois prêt à nous vendre les matériaux demandés, déposez-les dans le monte-charge situé à <EM4>~mission(Destination|Address)</EM4>.\n\n*En acceptant ce contrat, vous assumez tous les risques associés aux travaux décrits dans le présent document et Shubin Interstellar ne peut en aucun cas être tenu responsable des dommages survenus pendant la durée du contrat.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Sr. Contractor:</EM4> +200 Rep
