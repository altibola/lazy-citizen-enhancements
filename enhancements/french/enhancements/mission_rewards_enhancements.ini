hurston_UGF_eliminateall_desc_001=HURSTON DYNAMICS\nSERVICE DE SOUS-TRAITANCE\n\nCONTRAT : Vérification d'installations\nAFFILIATION DU PRESTATAIRE : Indépendant\nGESTIONNAIRE DE SOUS-TRAITANCE : G. Livingston\nÉVALUATION DES RISQUES : Élevé\nCONTRAT URGENT : Non\n\nHurston recherche un prestataire prêt à éliminer les occupants criminels de ~mission(Location|Address).\n\nLe site a été utilisé pour héberger de nombreuses activités illégales, il est donc impératif qu'il soit sécurisé. \n\nVous êtes autorisé à prendre toutes les mesures nécessaires. Le paiement sera envoyé une fois que l'installation aura été confirmée comme étant pacifié. \n\n\n\n** Les informations transmises peuvent contenir des éléments confidentiels et/ou privilégiés. Toute analyse, retransmission, diffusion ou autre utilisation de ces informations par des personnes ou entités autres que le destinataire prévu est interdite. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x20, Sentries x10, Snipers x2
hurston_UGF_eliminateall_nocivs_desc_001=HURSTON DYNAMICS\nSERVICE DE SOUS-TRAITANCE\n\nCONTRAT : Vérification d'installations\nAFFILIATION DU PRESTATAIRE : Indépendant\nGESTIONNAIRE DE SOUS-TRAITANCE : K. Restle\nÉVALUATION DES RISQUES : Élevé\nCONTRAT URGENT : Non\n\nHurston recherche un prestataire prêt à éliminer les occupants criminels de ~mission(Location|Address).\n\nLe site a été utilisé pour héberger de nombreuses activités illégales, il est donc impératif qu'il soit sécurisé. \n\nNotez que vous n'êtes autorisé à engager qu'avec des ennemis confirmés. Agresser des civils sur le site sera considéré comme une violation de votre contrat. \n\nLe paiement sera envoyé une fois que l'installation aura été confirmée comme étant pacifié. \n\n\n\n** Les informations transmises peuvent contenir des éléments confidentiels et/ou privilégiés. Toute analyse, retransmission, diffusion ou autre utilisation de ces informations par des personnes ou entités autres que le destinataire prévu est interdite. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13\n<EM4>Friendlies:</EM4> Civilians x4
