Covalex_LocalDelivery_desc_01=Bonjour !\n\nOn vient de recevoir une livraison locale dont on doit s’occuper, si vous êtes disponible. \n\nENLÈVEMENT DE COLIS\n     · Colis <EM4>#~mission(item1|serialnumber)</EM4> de <EM4>~mission(Pickup1|Address)</EM4>\n\nLIEUX DE DÉPÔT\n     · <EM4>Colis #~mission(item1|serialnumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n\nPar ailleurs, nous encourageons vivement les sous-traitants à se munir d'un <EM4>rayon tracteur portable</EM4>.\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nCoordinateur Logistique Jr.\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilités limitées. En acceptant ce contrat, vous acceptez tous les termes et conditions de notre 'Guide Complémentaire d'Informations aux Travailleurs Indépendants v.2948.01.29.' Covalex Shipping ne peut être tenu responsable des dommages survenus dans le cadre de votre activité de prestataire indépendant.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Covalex_LocalDelivery_desc_02=Bonjour !\n\nUne autre tâche est arrivée dans ma liste d'attente et j’ai pensé à vous l’envoyer. Ça devrait être une petite course rapide avec quelques arrêts.\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Pickup2|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · <EM4>Colis #~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · <EM4>Colis #~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n\nPar ailleurs, nous encourageons vivement les sous-traitants à se munir d'un <EM4>rayon tracteur portable</EM4>.\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nCoordinateur Logistique Jr.\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une corporation à responsabilités limitées. En acceptant ce contrat, vous êtes d’accord avec les termes et conditions comme soulignés dans notre extension 'Guide Complémentaire d'Informations aux Travailleurs Indépendants v.2948.01.29.' Covalex Shipping ne peut être tenu responsable des dommages survenus dans le cadre de votre activité de prestataire indépendant.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Covalex_LocalDelivery_desc_03=Bonjour,\n\nJ'espère vraiment que vous êtes disponible car nous sommes littéralement débordés en ce moment. Voici une mission locale que j'espérais que vous pourriez prendre en charge.\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> de <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> de <EM4>~mission(Pickup2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> de <EM4>~mission(Pickup3|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>\n\nPar ailleurs, nous encourageons vivement les sous-traitants à se munir d'un <EM4>rayon tracteur portable</EM4>.\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordinateur Logistique\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. En acceptant ce contrat, vous acceptez tous les termes et conditions de notre 'Guide Complémentaire d'Informations aux Travailleurs Indépendants v.2948.01.29.' Covalex Shipping ne peut être tenu responsable des dommages survenus dans le cadre de votre activité de prestataire indépendant.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Covalex_LocalDelivery_desc_04=Bonjour,\n\nJ'ai une livraison avec votre nom dessus si vous êtes disponible. C'est compliqué alors écoutez bien ! .\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> de <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> de <EM4>~mission(Pickup2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> de <EM4>~mission(Pickup3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> de <EM4>~mission(Pickup4|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> à <EM4>~mission(Dropoff4|Address)</EM4>\n\nPar ailleurs, nous encourageons vivement les sous-traitants à se munir d'un <EM4>rayon tracteur portable</EM4>.\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordinateur Logistique\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. En acceptant ce contrat, vous acceptez tous les termes et conditions de notre 'Guide Complémentaire d'Informations aux Travailleurs Indépendants v.2948.01.29.' Covalex Shipping ne peut être tenu responsable des dommages survenus dans le cadre de votre activité de prestataire indépendant.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Covalex_LocalDelivery_desc_05=Bonjour !\n\nJ'ai besoin de déplacer un tas de colis si vous avez du temps et de la place. Voici la liste.\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> de <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> de <EM4>~mission(Pickup2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> de <EM4>~mission(Pickup3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> de <EM4>~mission(Pickup4|Address)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> de <EM4>~mission(Pickup5|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> à <EM4>~mission(Dropoff4|Address)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> à <EM4>~mission(Dropoff5|Address)</EM4>\n\nPar ailleurs, nous encourageons vivement les sous-traitants à se munir d'un <EM4>rayon tracteur portable</EM4>.\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordinateur Logistique\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. En acceptant ce contrat, vous acceptez tous les termes et conditions de notre 'Guide Complémentaire d'Informations aux Travailleurs Indépendants v.2948.01.29.' Covalex Shipping n’est responsable d’aucun des dommages survenant lors des activités en tant que prestaire indépendant.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Covalex_LocalDelivery_desc_intro=Bonjour !\n\nCovalex est actuellement à la recherche de nouveaux prestataires de livraison. Pour voir si vous êtes un bon candidat ou non, nous avons organisé l'itinéraire de livraison suivant pour évaluer vos compétences.\n\nENLÈVEMENT DE COLIS\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> de <EM4>~mission(Pickup1|Address)</EM4>\n\nLIEUX DE DÉPÔT\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n\nLa réussite de cette course vous certifiera en tant que prestataire officiel de Covalex.\n\nPar ailleurs, nous encourageons vivement les sous-traitants à se munir d'un <EM4>rayon tracteur portable</EM4>.\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordinateur Logistique\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. En acceptant ce contrat, vous acceptez tous les termes et conditions de notre 'Guide Complémentaire d'Informations aux Travailleurs Indépendants v.2948.01.29.' Covalex Shipping ne peut être tenu responsable des dommages survenus dans le cadre de votre activité de prestataire indépendant.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500
Covalex_LocalDelivery_desc_rehire=Bonjour,\n\nComme Covalex souffre d'une abondance de livraisons et d'un manque de prestataire, j'ai pu convaincre l'administration de reconsidérer votre statut. Il ne vous reste plus qu'à réussir la livraison suivante et vous voilà de retour dans le circuit.\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> de <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> de <EM4>~mission(Pickup2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> de <EM4>~mission(Pickup3|Address)</EM4>\n\nLIEUX DE DÉPÔT ( DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>\n\nPar ailleurs, nous encourageons vivement les sous-traitants à se munir d'un <EM4>rayon tracteur portable</EM4>.\n\nBonne chance. Ce serait formidable de vous avoir à nouveau sur la liste.\n\nChase Hewitt\nCoordinateur Logistique Junior\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. En acceptant ce contrat, vous acceptez tous les termes et conditions de notre 'Guide Complémentaire d'Informations aux Travailleurs Indépendants v.2948.01.29.' Covalex Shipping n’est responsable d’aucun des dommages survenant lors des activités en tant que prestaire indépendant.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
