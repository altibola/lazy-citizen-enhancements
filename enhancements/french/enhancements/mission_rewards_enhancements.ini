FTL_Courier_Nyx_Easy_Desc_001=CONTRAT FTL DISPONIBLE\nPOUR AFFECTATION IMMÉDIATE\n\n**DÉTAILS DU CONTRAT**\nFTL recherche un coursier débutant pour effectuer des livraisons dans Nyx.\nLe coursier doit disposer de son propre moyen de transport.\nUne formation préalable à la manutention manuelle est préférable, avec la <EM4>capacité de déplacer des caisses pesant jusqu'à 0,25 SCU</EM4>.\nEn acceptant ce contrat, vous acceptez d'assumer l'entière responsabilité de l'intégrité des colis qui vous sont confiés.\n\n~mission(Contractor|SignOff)\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S0-B] Defiant\n- [IND-S1-B] Colossus\n- [IND-S2-B] Huracan\n- [IND-S2-B] Sedulity\n- [IND-S3-B] Agni\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
