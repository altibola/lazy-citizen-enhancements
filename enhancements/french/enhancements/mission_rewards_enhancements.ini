xenothreat_destroy_server_HH_desc_01=L'un de nos coursier de données est devenu MIA alors qu'il transportait des informations opérationnelles vitales. Il y a quelques heures, nous avons déterminé qu'il avait été touché par un groupe de Headhunters et que le contenu des banques de données du vaisseau avait été transféré vers leurs serveurs à ~mission(location|address). \n\nBien que nous ayons toutes les raisons de croire que notre cryptage tiendra, nous ne pouvons pas prendre le risque que le contenu de ces fichiers soit exposé. Vous avez reçu l'ordre de vous y rendre et de garantir que nos données restent privées en détruisant les serveurs des Headhunters.\n\nJ'encourage fortement la minutie. Rasez tout et tous ceux que vous pouvez au sol.\n\nSpéc. Comm. Engler\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
xenothreat_destroy_server_HH_title_01=Effacement Total du Serveur <EM4>[50 Rep]</EM4>
xenothreat_eliminateall_CFP_outpost_desc_01=Le groupe d'instigateurs qui se fait appeler "Citizens for Prosperity" ne peut plus continuer à répandre ses mensonges et sa propagande sans conséquences.\n\nAfin de rappeler clairement qui contrôle vraiment Pyro, nous avons émis un ordre d'exécution pour éradiquer toute présence de "Citizens" à ~mission(location|address). Une résistance est probable, mais nous nous attendons à ce que vous la gériez sans trop de difficultés. Faites ce qu'on vous demande et vous serez bien rémunérés pour votre travail.\n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
xenothreat_eliminateall_CFP_outpost_title_01=Ordre de Tuer : "Citoyens" à ~mission(location) <EM4>[1,000 Rep]</EM4>
xenothreat_eliminatespecific_desc_001=Les efforts de XenoThreat pour empêcher que des influences extérieures n'infectent ce système sont mis à l'épreuve par un groupe qui ose se faire appeler "Citizens for Prosperity". Un membre éminent du groupe, ~mission(TargetName), a établi des opérations à ~mission(Location|Address) et s'emploie déjà activement à répandre mensonges et propagande à quiconque voudra bien écouter. Si nous voulons que Pyro reste indépendant de l'UEE et de l'influence extraterrestre, quelque chose doit être fait dès maintenant.   \n\nC'est pourquoi XenoThreat émet un ordre d'élimination pour ~mission(TargetName|Last). Et sachant à quel point il est important pour les opérations des Citizens for Prosperity, je ne serais pas surpris si vous deviez vous battre contre certains de ses partisans les plus fanatiques avant même d'avoir une chance de l'atteindre. Mais n'oubliez pas, ~mission(TargetName|Last) est votre cible, et le paiement dépend uniquement de votre capacité à l'éliminer. \n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Unknown:</EM4> 1
xenothreat_eliminatespecific_desc_002=Les Headhunters ont constitué une équipe spéciale dont le seul but est d'attaquer, de perturber et de saper nos opérations. Même si je répugne à l'admettre, ils ont eu quelques petits succès et deviennent rapidement une source d'inquiétude. \n\nXenoThreat sait que la meilleure façon de tuer un serpent est de lui couper la tête, nous émettons donc un ordre de tuer le commandant de l'équipe d'intervention ~mission(TargetName), , qui, selon nos sources de renseignements, se cache à ~mission(Location|Address) depuis quelques jours maintenant. \n\nJe m'attends à une forte résistance de la part des Headhunters. D'après ce que nous avons entendu, ~mission(TargetName|Last) a obtenu ce commandement en partie grâce à la loyauté féroce qu'elle inspire aux autres. Rassembler votre propre équipe pour s'attaquer à ce problème serait une stratégie opérationnelle solide. \n\nBonne Chasse aux Têtes,\n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Unknown:</EM4> 1
xenothreat_eliminatespecific_title_001=Se Battre pour un Pyro Libre <EM4>[1,000 Rep]</EM4>
xenothreat_eliminatespecific_title_002=Chasse aux Têtes <EM4>[1,000 Rep]</EM4>
