ForceDepletionUnlawful_Desc=Réduisez la sécurité dans ce système. 750 UEC par personne, avec un bonus de 1500 UEC à la fin.\n\nTous les membres des organisations suivantes seront pris en compte pour cette mission :\n\nnSécurité BlackJac\nSécurité de Crusader\nSécurité d'Hurston\nAdvocacy\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +4,000
