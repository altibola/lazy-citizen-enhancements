Eckhart_ShipAmbush_M_desc=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Embuscade de Vaisseau\nCODE D'APPROBATION = ~mission(ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\nNous avons besoin de quelqu'un pour éliminer une <EM4>~mission(AmbushTarget)</EM4> et s'occuper des vaiseaux d'escorte qui la protègent. Ils ont déjà interféré avec plusieurs de nos opérations en cours et sont devenus un véritable problème dans plusieurs affaires traitées par Eckhart Security. Nous ne savons pas exactement quel est leur objectif final, mais cela n'aura plus d'importance une fois que vous vous serez occupé d'eux. n\nNous avons laissé entendre que nous allions travailler sur une mission à <EM4>~mission(Location|Address)</EM4>, ce qui devrait servir d'appât pour les attirer. L'endroit est idéal pour une embuscade en raison du <EM4>nuage d'émissions</EM4>, qui est parfait pour se mettre à l'abri et se cacher jusqu'à ce que vous soyez prêt à frapper. Si vous êtes disponible, la <EM4>~mission(AmbushTarget)</EM4> et ses escortes devraient passer bientôt.   \n\nLe paiement sera effectué une fois le contrat rempli avec succès. Le prestataire principal recevra également une prime de <EM4>~mission(ScripAmount) Jeton GDM</EM4>.\n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] Lightstrike I Cannon\n- [E-S2-A] Lightstrike II Cannon\n- [E-S3-A] Lightstrike III Cannon\n- [STH-S1-C] SonicLite\n- [STH-S2-C] Cirrus\n- [E-S1-A] FL-11 Cannon\n- [E-S2-A] FL-22 Cannon\n- [E-S3-A] FL-33 Cannon\n- [STH-S1-B] DeltaMax\n- [STH-S2-B] GammaMax\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Allies x1, Hostile Wave x6, Targets x3\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
