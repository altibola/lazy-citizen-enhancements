StealEvidence_title=~mission(Contractor|StealEvidenceTitle) <EM4>[1,000 Rep]</EM4>
TarPits_ShipStrip_desc_001=Nous avons un travail de recyclage un peu particulier pour lequel nous pourrions avoir besoin de renfort. \n\nNous avons besoin de toi pour trouver un ~mission(ship) qui qui s'est fait exploser autour de ~mission(location). La sécurité est déjà à sa recherche et s'ils le trouvent, ils l'identifieront à coup sûr et nous aurons de gros problèmes.\n\nNous voulons donc que tu fasses en sorte que cela ne se produise pas. Il faut soit remorquer le vaisseau hors de la zone de recherche, soit arracher toute la coque pour que personne ne puisse le reconnaître. Quelle que soit ta décision, garde ça pour toi.\n\nNous te créditerons et tout ce que tu pourras récupérer t'appartiendra. Mais si la sécurité trouve le vaisseau avant que tu n'aies terminé, nous serons tous foutus et tu ne seras pas payé, alors ne nous déçois pas.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Friendlies:</EM4> Salvageable Ships x1
Tarpits_assassinate_dc_desc_001=Je n'ai pas de temps à perdre, alors je vais aller droit au but : ~mission(TargetName) doit être tuée et je veux que vous le fassiez. Vous les trouverez près de ~mission(Location) à ~mission(Location|address). Ils ne seront pas seuls, mais ne vous laissez pas distraire par ces autres amas inutiles. Vous ne serez payé que si vous éliminez ~mission(TargetName|Last).\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x18, Juggernauts x1, Snipers x2, Soldiers x9, Technicians x3
Tarpits_destroyitem_dc_desc_001=Je cherche à envoyer un message fort à la bande à ~mission(Location|Address) et je connais le moyen parfait pour le faire : les dégâts matériels.\n\nIl vous suffit de vous rendre sur place, de détruire quelques objets ici et là, et de faire passer une leçon importante sur le respect de ses supérieurs.\n\nFaites cela pour moi et je me sentirai très heureux. Et généreux.\n\nIntéressé ?\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Tarpits_eliminateboss_dc_desc_001=Cela fait un moment que nous voulons éliminer ~mission(TargetName), mais nous n'avons jamais réussi à trouver le bon moment. Assez attendu. Vous allez créer le bon moment pour nous.\n\nDirigez-vous vers ~mission(Location|Address) et éliminez une bande de minables qui courent autour de ~mission(Location). Tuez suffisamment de ces losers, et ~mission(TargetName|Last) n'aura d'autre choix que de vous affronter elle-même. C'est à ce moment-là que vous les éliminez et que vous gagnez un bon gros salaire. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x20, Juggernauts x1, Snipers x2, Soldiers x7
Tarpits_theft_mines_dc_desc_001=J'espérais que vous seriez intéressé par un petit boulot pour nous. J'ai quelques marchandises à ~mission(Location|Address) qui sont tout à fait prêtes à être prises. Le seul problème - et il est de taille - c'est que les salauds qui dirigent l'endroit ont truffé toute la zone de mines de proximité. \n\nVous devrez trouver un moyen de passer, ou si vous ne pouvez pas vous en occuper, un moyen de les déclencher. Dans tous les cas, essayez de ne pas vous faire exploser. Ensuite, il vous suffira de prendre le matériel et de l'apporter à ~mission(Destination|Address).\n\nCe ne sera pas facile à faire, mais si vous le faites, je vous promets que ça en vaudra la peine.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Test_Description=Description de Mission (WIP)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
Test_Title_Revenge_01=Revanche 01 (WIP) <EM4>[500 Rep]</EM4>
TheCollector_Conversion_Favors_Desc=Peut-être Wikelo pas avoir quelque chose que vous voulez être fabriqué (bizarre, mais ok). Vieux souli distribuait <EM4>faveurs</EM4>, très bon moyen pour prouver vous travaillez pour moi. Rassemblez assez d'objets et échangez quand moi avoir quelque chose que vous voulez.\n\nApportez choses à <EM4>~mission(destination|ListAll)</EM4> et moi échanger pour faveurs.\n\nAu revoir.\n\n<EM3>ITEM REWARDS</EM3>\n- Wikelo Favor\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Conversion_Favors_Desc_1=Wikelo connaître autre moyen d'obtenir <EM4>faveurs</EM4> si vous être intéressé. \n\nVotre souli Mercenaire avoir <EM4>jetons</EM4> métalliques, utilisés comme faveurs, mais contient métal très intéressant Wikelo avoir besoin pour nouveau projet.\n\nSi vous amenez jetons à <EM4>~mission(destination|ListAll)</EM4>, moi échanger contre faveurs.\n\nAu revoir.\n\n<EM3>ITEM REWARDS</EM3>\n- Wikelo Favor\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Conversion_Favors_Desc_2=Si vous vouloir autre façon pour obtenir <EM4>faveurs</EM4> de Wikelo, moi avoir quelque chose pour vous. Wikelo avoir besoin de <EM4>jetons</EM4> donnés par Conseil. Wikelo pas faire partie de souli voleurs, mais travailler avec eux de temps en temps.\n\nSi vous amener jetons à <EM4>~mission(destination|ListAll)</EM4>, moi échanger contre faveur.\n\nAu revoir.\n\n<EM3>ITEM REWARDS</EM3>\n- Wikelo Favor\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Conversion_Favors_Desc_3=Nouvelle façon obtenir <EM4>faveurs</EM4> de Wikelo. Entendre beaucoup parler de vers dans tempêtes radioactives. Composés de nombreuses parties intéressantes Wikelo trouver utile. \n\nSi vous apporter morceaux à <EM4>~mission(destination|ListAll)</EM4>, échanger contre faveur.\n\nAu revoir.\n\n<EM3>ITEM REWARDS</EM3>\n- Wikelo Favor\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Conversion_Favors_Title=Transformer Choses en Faveur
TheCollector_Conversion_Favors_Title_1=Échange Jetons Mercenaires pour Faveurs ?
TheCollector_Conversion_Favors_Title_2=Échange Jetons Conseil pour Faveurs ?
TheCollector_Conversion_Favors_Title_3=Échange Morceaux de Vers contre Faveurs ?
TheCollector_Conversion_SpecialFavors_Desc=Wikelo avoir besoin grande quantité <EM4>quantainium</EM4> et être prêt donner joli Polaris en échange, mais savoir aussi beaucoup humains pas avoir beaucoup espace, alors échange au fur et à mesure. Wikelo donner <EM4>pièces Polaris</EM4> à échanger contre quantainium. Marche comme faveurs. Aider Wikelo se souvenir combien vous donner. \n\nVous apporter quantainium à <EM4>~mission(destination|ListAll)</EM4> et moi donner morceaux en échange.\n\nAu revoir.\n\n<EM3>ITEM REWARDS</EM3>\n- Polaris Bit\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Conversion_SpecialFavors_Title=Vouloir Polaris ? Besoin quelque chose spécial.
TheCollector_Intro_Desc=Bonjour, moi Wikelo. Moi avoir récemment rejoint votre système et très heureux être ici. Passé beaucoup de temps ici dans UEE, et heureux de passer davantage de temps.\n\nMoi avoir endroit où moi fabriquer choses à partir d'autres choses.\n\nBesoin quelqu'un m'apporter choses utiles pour terminer projet moi travailler dessus. Vous avoir liste. Trouvez objets, s'il vous plaît. Moi être à <EM4>~mission(destination|ListAll)</EM4>.\n\nMoi donner objet en échange de votre aide.\n\nDe plus, quand vous terminer, moi avoir plein de choses à fabriquer dans mon humble boutique. Venez voir jolies affiches et décidez ce que vous vouloir moi fabriquer.\n\nAu revoir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Rep:</EM4> +10
TheCollector_Intro_Title=Wikelo Arrivé dans Système <EM4>[10 Rep]</EM4>
TheCollector_Lunch_Desc=Vous humains occuper beaucoup Wikelo. Moi travailler plus que dans ancien souli. Mais Wikelo très faim et arrive pas à trouver nourriture.\n\nAidez-moi, s'il vous plaît. Apportez nourriture et boissons à <EM4>~mission(destination|ListAll)</EM4> de Emporium Wikelo.\n\nMoi apprécier beaucoup aide. Moi donner quelque chose en retour.\n\nAu revoir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Lunch_Title=Très Faim
TheCollector_Menu_Desc_PolarisShip=Wikelo récemment obtenu nombreux plans après échange avec humains pas très intelligents. Moi pouvoir maintenant fabriquer très grand vaisseau. \n\nPas facile et besoin beaucoup de pièces, mais peut être fabriqué. Si vous vouloir, faites vite, ça coûté beaucoup à Wikelo donc moi pas être en mesure de le faire longtemps, mais moi aimer nouveau système humain, donc moi vouloir remercier vous pour accueil.\n\nSi vous vouloir, apporter choses à <EM4>~mission(destination|ListAll)</EM4>.\n\nAu revoir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +1,000
TheCollector_Menu_Title_PolarisShip=Maintenant fabriquer Polaris. Offre Courte Durée. <EM4>[1,000 Rep]</EM4>
TheCollector_Mod_ATLS_Geo_Grad1_Desc=Wikelo se rendre sur planète humaine et la trouver très froide, mais très jolie. Cela me rappeler ça.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Mod_ATLS_Geo_Grad1_Name=ATLS Couleur Neige <EM4>[20 Rep]</EM4>
TheCollector_Mod_ATLS_Geo_Grad2_Desc=Beaucoup lieux de travail humains être couleur orange. Ça devoir signifier "travail" pour vous. Ce robot faire travail. Ça être logique.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Mod_ATLS_Geo_Grad2_Name=ATLS Ligne Orange <EM4>[20 Rep]</EM4>
TheCollector_Mod_ATLS_Geo_Grad3_Desc=Wikelo utiliser couleurs rouge foncé et vers pour donner impression jambes ATLS se refroidir. Très joli.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Mod_ATLS_Geo_Grad3_Name=ATLS Couleur Métal Froid <EM4>[20 Rep]</EM4>
TheCollector_Recipes_Desc_ApolloSkin=Apollo très bon vaisseau. Serait encore mieux si vaisseau être rouge. Wikelo rendre tout possible. Vous apporter choses moi vouloir et affaire conclue.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Recipes_Desc_AtlsJump=Trouver pièces très amusantes ajouter à gros squelette humain qui saute très haut. Maintenant vous tirer et sauter. Passionnant.\n\nSi vous vouloir, vous apporter ces choses à <EM4>~mission(destination|ListAll)</EM4>.\n\nWikelo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Recipes_Desc_AtlsPew=Bonjour. Moi savoir vous humains aimer étranges squelettes métalliques. Que diriez-vous squelette métallique avec ikti ? Désolé, ikti être mot banu, vous appeler ça "arme". \n\nSi vous vouloir, apportez-moi choses dont moi parler et moi fabriquer pour vous. Arme tirer. Causer beaucoup dégâts.\n\nAu revoir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Recipes_Desc_Battle=Vous apporter armure et autre choses et moi vous donner armure spéciale test. Première version. Très spéciale. Apportez et moi donner. Au revoir.\n\n<EM3>ITEM REWARDS</EM3>\n- Palatino Helmet Mark I\n- Palatino Arms Mark I\n- Palatino Legs Mark I\n- Palatino Core Mark I\n- Palatino Backpack Mark I\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +25
TheCollector_Recipes_Desc_BigBooma=Wikelo trouver arme très étrange mais fonctionnelle dans vos systèmes. Très simple mais très efficace. Si vous apporter moi objets, moi montrer ce que moi en faire.\n\nTrès amusant.\n\n<EM3>ITEM REWARDS</EM3>\n- Boomtube "Clanguard" Rocket Launcher\n- Boomtube Rocket\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_GMNI_Shotgun=Tirer être salissant. Sang rouge humain partout. Aucun problème avec ce fusil à pompe. Éclaboussures se fonder parfaitement dans le décor ! Moi vous le donner si vous me donner toutes les choses de ma liste. Bon échange.\n\n<EM3>ITEM REWARDS</EM3>\n- R97 "Crimson Camo" Shotgun\n- R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_HeavyUtil=Vous avoir besoin armure utilitaire. Idéale pour travail. Si vous souhaiter, Wikelo pouvoir la rendre plus brillante. Vraiment très belle. Voyez ce que Wikelo avoir besoin et apportez.\n\n<EM3>ITEM REWARDS</EM3>\n- Corbel Helmet Crush\n- Corbel Core Crush\n- Corbel Arms Crush\n- Corbel Legs Crush\n- Novikov Backpack Crush\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Recipes_Desc_Hush=Vous vouloir être caché. Wikelo comprendre. Pas poser questions pourquoi. Mais quoi faire quand vous dans neige ? Wikelo avoir combinaison pour ça.\n\nBienvenue.\n\n<EM3>ITEM REWARDS</EM3>\n- Geist Armor Arms Snow Camo\n- Geist Armor Core Snow Camo\n- Geist Armor Helmet Snow Camo\n- Geist Armor Legs Snow Camo\n- Geist Backpack Snow Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +25
TheCollector_Recipes_Desc_IrrArm=Wikelo avoir idée géniale pendant pause travail. Penser petits vers luisants dans Pyro et imaginer armure être modifié pour leur ressembler.\n\nSi vous me trouver pièces, les apporter à <EM4>~mission(destination|ListAll)</EM4> et moi fabriquer armure pour vous briller vous aussi.\n\nAu revoir.\n\n<EM3>ITEM REWARDS</EM3>\n- Bokto Core\n- Bokto Arms\n- Bokto Legs\n- Bokto Helmet\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +25
TheCollector_Recipes_Desc_KopSkull=Salut. Moi pouvoir faire changements marrants sur arme si vous souhaitez. Utiliser peau de kopion pour motif et petit crâne pour pendentif. Très efficace. Tire beaucoup mieux.\n\nTout ce vous avoir besoin, c'est apporter pièces à <EM4>~mission(destination|ListAll)</EM4> et moi fabriquer. \n\nAu revoir.\n\n<EM3>ITEM REWARDS</EM3>\n- Parallax "Fun Kopion Skull" Energy Assault Rifle\n- Parallax Rifle Battery (80 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_L22Wolf=Wikelo très excité. Idée pour nouveau matériau. Mais fabrication très délicate. Très compliquée. Besoin d'aide pour fabriquer échantillon test. Moi donner schéma, toi fabriquer, toi m'apporter, et moi échanger. Donner L-22 Wolf extra spécial. Très puissant, très loup.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Metamaterial Test #146\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Blueprint Reward:</EM4> Guaranteed
TheCollector_Recipes_Desc_MiltSkull=Salut. Moi pouvoir faire version d'arme si vous être soldat kopion. Fabriquer matériau comme camouflage soldat mais avec crâne mort devant. Armer mieux tirer aussi.\n\nSi vous vouloir, apporter pièces à <EM4>~mission(destination|ListAll)</EM4> et moi fabriquer.\n\n<EM3>ITEM REWARDS</EM3>\n- Parallax "Fun Military Skull" Energy Assault Rifle\n- Parallax Rifle Battery (80 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_Molten=Si vous avoir armure, Wikelo pouvoir la rendre plus chaude. Plus belle et plus utile. Apportez-moi choses et moi faire.\n\n<EM3>ITEM REWARDS</EM3>\n- Strata Core Heatwave\n- Strata Arms Heatwave\n- Strata Legs Heatwave\n- Strata Helmet Heatwave\n- Strata Backpack Heatwave\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +25
TheCollector_Recipes_Desc_NoneAR=Fusil très bon pour tirer, mais pourrait avoir plus joli design. Wikelo arranger ça. Très joli maintenant. Donner à toi pour échange. Toi apporter choses, moi donner fusil. Donner même plan si toi avoir besoin.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Killshot "Dominion Camo" Rifle\n\n<EM3>ITEM REWARDS</EM3>\n- Killshot "Dominion Camo" Rifle\n- Killshot Rifle Magazine (45 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10\n<EM4>Blueprint Reward:</EM4> Guaranteed
TheCollector_Recipes_Desc_NonePistol=Vous avoir besoin bonne arme, oui ? Moi avoir une pour vous. Petite mais puissante. Comme piment balalu extra fort. Wikelo donner aussi à ce pistolet aspect extra fort. Vous apporter moi choses avoir besoin et moi vous le donner en échange.\n\nAu revoir.\n\n<EM3>ITEM REWARDS</EM3>\n- Tripledown "Heatwave" Pistol\n- Tripledown Pistol Magazine (12 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_RedHunterArmor=Wikelo entendre dire Humains penser que rouge être couleur de la passion et de la colère. Cette armure convenir aux deux. Donnez-moi objets sur liste et cette armure rouge être à vous.\n\n<EM3>ITEM REWARDS</EM3>\n- Monde Helmet Crimson Camo\n- Monde Core Crimson Camo\n- Monde Arms Crimson Camo\n- Monde Legs Crimson Camo\n- Warden Backpack Crimson Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_SandArmour=Salut, moi savoir beaucoup d'humains vouloir saldynium pour problème régène. Crédits être bons, oui, mais peut utiliser ça, corne kopion, et autres choses pour fabriquer armure spéciale. \n\nUne fois fait, vous très résistant. Très effrayant.\n\nVous voir objets nécessaires. Apporter à <EM4>~mission(destination|ListAll)</EM4> et moi fabriquer pour vous.\n\nAu revoir.\n\n<EM3>ITEM REWARDS</EM3>\n- Ana Arms Endro\n- Ana Legs Endro\n- Ana Core Endro\n- Ana Helmet Endro\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +25
TheCollector_Recipes_Desc_SlimyLMG=Cette arme avoir image créature incroyable sur le côté. Vous l'utiliser et lui vous rendre grand et fort comme Yormandi. Cracher foudre. Vous apporter objets et vous l'avoir. Au revoir.\n\n<EM3>ITEM REWARDS</EM3>\n- Fresnel "Yormandi" Energy LMG\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_SpikeyArmor=Vanduuls avoir manières étranges. Moi jamais parler à eux, vieux souli le faisait, mais pas Wikelo. Bref, même si pas très amicaux, eux fabriquer choses intéressantes. Si vous vouloir, Wikelo pouvoir vous rendre encore plus beau.\n\nApportez choses. Moi faire.\n\nAu revoir.\n\n<EM3>ITEM REWARDS</EM3>\n- Testudo Helmet Clanguard\n- Testudo Arms Clanguard\n- Testudo Core Clanguard\n- Testudo Legs Clanguard\n- Testudo Backpack Clanguard\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +25
TheCollector_Recipes_Desc_VGLflightsuit=Vaisseaux avoir grandes vitres. Tout le monde pouvoir te voir voler. Toi devoir être le plus beau. Wikelo avoir très bonne combinaison pilote pour toi. Fais échange, apporte ce dont moi avoir besoin et Wikelo donner combinaison. Donner plan aussi si toi ne pas avoir.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Tailwind Flight Helmet Dominion Camo\n- [S1-A] Tailwind Flight Suit Dominion Camo\n\n<EM3>ITEM REWARDS</EM3>\n- Tailwind Flight Suit Dominion Camo\n- Tailwind Flight Helmet Dominion Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10\n<EM4>Blueprint Reward:</EM4> Guaranteed
TheCollector_Recipes_Desc_VoltThwack=Vous trouver arme pas assez agressive ? Fusil pompe VOLT très puissant, très dangeureux, mais pas effrayant ? Vous apporter le moi. Moi pouvoir le rendre très effrayant et agressif.\n\nAutres gens respecter vous alors. Apporter à <EM4>~mission(destination|ListAll)</EM4> et moi fabriquer.\n\nAu revoir.\n\n<EM3>ITEM REWARDS</EM3>\n- Prism "Irradiated" Laser Shotgun\n- Prism Laser Shotgun Battery (20 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_ZipZap=Vouloir tirer loin et rester caché. Mais neige ? Wikelo avoir arme pour vous.\n\nApporter choses. Moi donner.\n\nAu revoir.\n\n<EM3>ITEM REWARDS</EM3>\n- Zenith "Snow Camo" Laser Sniper Rifle\n- Zenith Laser Sniper Rifle Battery (22 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
