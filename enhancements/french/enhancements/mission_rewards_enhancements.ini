BHG_Certification_VeryEasy_Desc=--------------------------------------------------------\n----------------- CONTRAT DE CHASSE À LA PRIME -----------------\n--------------------------------------------------------\n\nGUILDE DES CHASSEURS DE PRIME\nTRAITEMENT & DISTRIBUTION\n\nLa Guilde des Chasseurs de Primes a autorisé une prime officielle.\n\nNOM : ~mission(TargetName) \nSYSTÈME : ~mission(System)\nRISQUES ENCOURUS : Très faibles\nDERNIER EMPLACEMENT CONNU : ~mission(Location)\nAFFILIATIONS CONNUES : <Aucune>\nNOTES : Sur la base d'une évaluation de vos capacités, la Guilde des Chasseurs de Primes souhaite vous offrir la chance d'obtenir votre Permis de Traqueur Apprenti.\n\nCe permis signifie que vous êtes qualifié pour appréhender des Cibles à Risque Très Faible (CRTF). Ces criminels utilisent traditionnellement des vaisseaux plus petits et sont rarement escortés par plus d'une escorte. Idéal pour les chasseurs de primes qui débutent.\n\nPour réussir cette certification, vous devez appréhender un criminel classé CRTF du nom de <EM4>~mission(TargetName)</EM4> vu pour la dernière fois à <EM4>~mission(Location|Address)</EM4>.\n\n\nGUILDE DES CHASSEURS DE PRIMES\nÀ la poursuite de la justice\n\nLa Guilde des Chasseurs de Primes est un service de sécurité agréé par la Guilde des mercenaires et autorisé à agir dans l'UEE et au-delà, conformément aux lois de l'Autorité du Commerce Extraterrestre.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 2
BHG_Certification_VeryEasy_Title=Permis de Traqueur Apprenti <EM4>[50 Rep]</EM4>
BHG_Certification_VeryHard_Desc=--------------------------------------------------------\n----------------- CONTRAT DE CHASSE À LA PRIME -----------------\n--------------------------------------------------------\n\nGUILDE DES CHASSEURS DE PRIME\nTRAITEMENT & DISTRIBUTION\n\nLa Guilde des Chasseurs de Primes a autorisé une prime officielle.\n\nNOM : ~mission(TargetName) \nSYSTÈME : ~mission(System)\nRISQUES ENCOURUS : Très élevés\nDERNIER EMPLACEMENT CONNU : ~mission(Location)\nAFFILIATIONS CONNUES : <Aucune>\nNOTES : Vu vos antécédents, la Guilde des Chasseurs de Primes souhaite vous offrir la chance d'obtenir une Licence de Traqueur Expert.\n\nCette licence signifierait que vous êtes qualifié pour appréhender des Cibles à Risque Très Élevé (CRTE). Ces criminels peuvent voyager à bord de plus grands vaisseaux multi-équipage et lourdement escortés. Avec plusieurs ennemis à gérer, les rencontres avec ces cibles peuvent être mortelles.\n\nPour obtenir cette certification, vous devez appréhender un criminel classé CRTE du nom de <EM4>~mission(TargetName)</EM4> vu pour la dernière fois à <EM4>~mission(Location|Address)</EM4>.\n\n\nGUILDE DES CHASSEURS DE PRIMES\nÀ la poursuite de la justice\n\nLa Guilde des chasseurs de primes est un service de sécurité agréé par la Guilde des mercenaires et autorisé à agir dans l'UEE et au-delà, conformément aux lois de l'Autorité du Commerce Extraterrestre.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 4
BHG_Certification_VeryHard_Title=Licence de Traqueur Expert <EM4>[50 Rep]</EM4>
BHG_ShipWaveAttack_DrawOutBoss_H_Desc_001=--------------------------------------------------------\n-------------- CONTRAT DE CHASSE À LA PRIME ---------------\n--------------------------------------------------------\n\nGUILDE DES CHASSEURS DE PRIME\nTRAITEMENT & DIFFUSION\n\nLa Guilde des Chasseurs de Primes a autorisé une prime officielle.\n\nNOM : ~mission(TargetName)\nRISQUES ENCOURUS : Élevés\nDERNIER EMPLACEMENT CONNU :  ~mission(Location|Address)\nAFFILIATIONS CONNUES : Inconnues\nNOTES : Cette cible est particulièrement difficile à capturer. Elle a tendance à rester cachée, sauf si une menace suffisamment importante retient son attention. C'est pourquoi vous et votre équipe de soutien devrez éliminer suffisamment de ses sbires pour attiser sa colère. Restez sur place, éliminez tous les ennemis qui se présentent, et la cible finira par se montrer.\n\n\nGUILDE DES CHASSEURS DE PRIMES\nÀ la poursuite de la justice\n\nLa Guilde des chasseurs de primes est un service de sécurité agréé par la Guilde des mercenaires et autorisé à agir dans l'UEE et au-delà, conformément aux lois de l'Autorité du Commerce Extraterrestre.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x24\n<EM4>Probationary Guild Member:</EM4> +200 Rep
BHG_ShipWaveAttack_DrawOutBoss_H_Title_001=Prime Recluse : ~mission(TargetName) | Risque Élevé <EM4>[200 Rep]</EM4>
BHG_ShipWaveAttack_DrawOutBoss_S_Desc_001=--------------------------------------------------------\n-------------- CONTRAT DE CHASSE À LA PRIME ---------------\n--------------------------------------------------------\n\nGUILDE DES CHASSEURS DE PRIME\nTRAITEMENT & DIFFUSION\n\nLa Guilde des Chasseurs de Primes a autorisé une prime officielle.\n\nNOM : ~mission(TargetName) \nRISQUES ENCOURUS : Extrêmes\nDERNIER EMPLACEMENT CONNU :  ~mission(Location|Address)\nAFFILIATIONS CONNUES : Inconnues\nNOTES : Cette cible est particulièrement difficile à capturer. Elle a tendance à rester cachée, sauf si une menace suffisamment importante retient son attention. C'est pourquoi vous et votre flotte d'appui la plus fiable devrez éliminer suffisamment de ses sbires pour la forcer à vous affronter. Restez sur place, éliminez tous les ennemis qui se présentent, et la cible finira par arriver à bord de son vaisseau capital.\n\n\nGUILDE DES CHASSEURS DE PRIMES\nÀ la poursuite de la justice\n\nLa Guilde des chasseurs de primes est un service de sécurité agréé par la Guilde des mercenaires et autorisé à agir dans l'UEE et au-delà, conformément aux lois de l'Autorité du Commerce Extraterrestre.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 7/7 | Risk 7/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x33\n<EM4>Probationary Guild Member:</EM4> +300 Rep
BHG_ShipWaveAttack_DrawOutBoss_S_Title_001=Prime Recluse : ~mission(TargetName) | Risque Extrême <EM4>[300 Rep]</EM4>
BHG_ShipWaveAttack_DrawOutBoss_VH_Desc_001=--------------------------------------------------------\n-------------- CONTRAT DE CHASSE À LA PRIME ---------------\n--------------------------------------------------------\n\nGUILDE DES CHASSEURS DE PRIME\nTRAITEMENT & DIFFUSION\n\nLa Guilde des Chasseurs de Primes a autorisé une prime officielle.\n\nNOM : ~mission(TargetName) \nRISQUES ENCOURUS : Très élevés\nDERNIER EMPLACEMENT CONNU :  ~mission(Location|Address)\nAFFILIATIONS CONNUES : Inconnues\nNOTES : Cette cible est particulièrement difficile à capturer. Elle ne se montre que rarement, sauf lorsqu'elle doit faire face personnellement à une menace suffisamment importante. C'est pourquoi vous et votre équipe de soutien devrez éliminer suffisamment de ses sous-fifres pour l'obliger à vous affronter. Restez sur place, éliminez tous les ennemis qui se présentent, et la cible finira par se montrer.\n\n\nGUILDE DES CHASSEURS DE PRIMES\nÀ la poursuite de la justice\n\nLa Guilde des chasseurs de primes est un service de sécurité agréé par la Guilde des mercenaires et autorisé à agir dans l'UEE et au-delà, conformément aux lois de l'Autorité du Commerce Extraterrestre.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x27\n<EM4>Probationary Guild Member:</EM4> +250 Rep
BHG_ShipWaveAttack_DrawOutBoss_VH_Title_001=Prime Recluse : ~mission(TargetName) | Risque Très Élevée <EM4>[250 Rep]</EM4>
Bitzeroes_bombingrun_dc_desc_001=Nous avons essayé d'accéder à des données sensibles sur ~mission(Location|Address) mais il semble qu'il n'y ait qu'une seule porte dérobée que nous puissions utiliser. Le problème, c'est que nous avons besoin de quelqu'un sur place pour la déclencher. Et je veux vraiment dire la déclencher.\n\nSi vous pouvez aller là-bas et détruire une partie de leur infrastructure, les systèmes d'urgence se mettront en marche et nous devrions être en mesure d'accéder à tout ce que nous voulons. \n\nJ'aurais tellement aimé voir le regard surpris sur les visages de ces minables qui gèrent cet endroit quand ça arrivera.\n\n-Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Turrets:</EM4> present (hostile)
Bitzeroes_bombingrun_dc_title_001=En Fumée <EM4>[500–2,000 Rep]</EM4>
Bitzeroes_destroygen_locked_dc_desc_001=J'ai besoin de votre aide pour une mission, mais je ne peux pas entrer dans les détails. Si cela ne vous convient pas, laissez tomber.\n\nVous allez vous rendre à ~mission(Location|Address) et faire exploser un générateur d'énergie pour nous. Ils le gardent sous clé, donc vous devrez d'abord trouver les codes d'accès. Heureusement, ils conservent généralement des copies du code sur des datapads. (Ils pensent que ça les protège contre le piratage.)\n\nVous détruisez ce générateur, et c'est votre compte en banque qui explosera ensuite.\n\n- Bit Zeros.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Bitzeroes_destroygen_locked_dc_title_001=Black-out Obligatoire <EM4>[500 Rep]</EM4>
Bitzeroes_destroyitem_dc_desc_001=Je ne vais pas m'étendre sur le pourquoi, mais il y a quelques parties de ~mission(Location|Address) qui doivent être détruites. Le plus important, c'est que je veux vous payer un gros paquet de fric pour le faire. J'ai presque l'impression que c'est vous qui devriez nous payer, tellement ça va être amusant.\n\nJe ne me soucie même pas de la façon dont vous vous y prendrez. Grenades, lance-roquettes, Torpedo Burrito de la veille, c'est du pareil au même pour nous.\n\n-Bit Zeros \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Bitzeroes_destroyitem_dc_title_001=Dysfonctionnement Majeur <EM4>[500 Rep]</EM4>
Bitzeroes_destroyservers_locked_dc_desc_001=Hé,\n\nNous avons un problème pour lequel nous aurions besoin de votre aide. Une de nos ex nouvelles recrues a fait de la merde sur un hack et a fini par laisser une empreinte numérique si bordélique que ça pourrait tout aussi bien être une confession totale. \n\nUne suppression à distance ne suffira pas, alors je veux que vous alliez à ~mission(Location|Address) et que vous vous assuriez que leurs serveurs de données soit rayés de la carte.\n\nComme si ce n'était pas déjà un gros bordel, les codes d'accès à la porte verrouillée de la salle des serveurs ne sont stockés que physiquement sur place. Ça signifie que vous allez devoir libérer un datapad avec le code dessus avant de pouvoir vous en approcher.\n\nNe vous inquiétez pas, je m'assurerai que les crédits en valent la peine.  \n\n- Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
Bitzeroes_destroyservers_locked_dc_title_001=Serveur Introuvable <EM4>[1,000 Rep]</EM4>
Bitzeroes_destroystash_dc_desc_001=Les crétins de ~mission(Location|Address) ont décidé que ce serait une bonne idée de s'immiscer dans nos affaires, et nous devons maintenant leur faire savoir sans équivoque qu'ils se sont trompés. \n\nEn fouillant un peu dans leurs données, nous avons pu découvrir où ces idiots gardent leur cachette. Maintenant, tout ce que nous avons besoin que vous fassiez, c'est d'aller là-bas et de détruire la moindre parcelle.\n\nJe pense que cela devrait faire passer le message.\n\n- Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Bitzeroes_destroystash_dc_title_001=Frappez-les là où ça fait mal <EM4>[500 Rep]</EM4>
Bitzeroes_eliminateall_dc_desc_001=Ces petits crétins de ~mission(Location|Address) nous ont vendu des données de merde tout en essayant de faire double jeu. On ne peut pas laisser passer ça.\n\nNous voulons que vous alliez leur donner une dernière leçon et que vous éliminiez tous les lâches que vous pourrez trouver. Aux dernières nouvelles, ils étaient retranchés près de ~mission(Location). \n\n- Versez leur sang, et nous remplirons votre portefeuille. \n\n- Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Juggernauts x2, Soldiers x12, Technicians x2
Bitzeroes_eliminateall_dc_title_001=Suppression Définitive <EM4>[1,000 Rep]</EM4>
Bitzeroes_heist_buyin_dc_desc_001=J'examine en ce moment même un dossier de transfert d'inventaire qui déborde de marchandises de grande valeur et qui ne demande qu'à être volé. Bien sûr, il y a probablement quelques personnes qui gardent les marchandises, mais plus le combat est difficile, plus le butin est intéressant, n'est-ce pas ?\n\nEn temps normal, nous nous occuperions d'une affaire comme celle-ci, mais nous avons une autre cible en vue en ce moment et je ne voudrais pas qu'une information aussi bonne pourrisse.  \n\nQu'en dites-vous ? Vous voulez tenter votre chance ? Envoyez-moi quelques crédits et les coordonnées sont à vous.\n\n-Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Unknown:</EM4> 10
Bitzeroes_theft_dc_desc_001=Bon,\n\nÀ ~mission(Location|Address), il y a quelques objets en leur possession qui doivent être récupérés. Bien sûr, il peut y avoir quelques gardes ou individus concernés avec qui vous devrez traiter, mais pour l'essentiel, il s'agit d'une transaction relativement simple - prenez le matériel de ~mission(Location) et amenez-le nous à ~mission(Destination|Address). \n\n- Parfois, la simplicité est la meilleure des choses.\n\n-Bit Zeros \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
Bitzeroes_theft_dc_title_001=Réaffectation de Propriété <EM4>[500–1,000 Rep]</EM4>
Bitzeroes_theft_mines_dc_desc_001=J'espère vraiment que vous accepterez de prendre en charge cette mission car il ne semble pas y avoir beaucoup de personnes désireuses de s'occuper de tout un tas de mines de proximité. Voyez-vous, nous avons localisé un butin à ~mission(Location|Address) mais la sécurité physique s'avère plus ardue que prévu. \n\nSi vous pouvez trouver un moyen de naviguer à travers les mines ou de les déclencher à distance, il devrait être relativement aisé de s'emparer des marchandises et de sortir de là. Déposez-les à ~mission(Destination|Address) et vous recevrez plus que votre juste part des crédits pour avoir pris le risque.\n\n-Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
BlockadeRunner_Counter_Desc=Il semblerait que beaucoup de Zeta-Prolanide ait été volé à ~mission(Location|address).\n\nSi vous en trouvez, ramenez-le à ~mission(DropOffLocation|address) et nous ferons en sorte que vous en tiriez un bon prix.\n\nSinon, vous pouvez renoncer à cette offre, sans rancune.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
BlockadeRunner_Desc=*TRANSMISSION PRIORITAIRE À DESTINATION DU SYSTÈME ENTIER*\n\nUne flotte hostile de vaisseaux équipés de brouilleurs quantum a créé un blocus autour de   ~mission(Location|address), désactivé les tourelles défensives de la station et volé une grande quantité de Zeta-Prolanide. En réponse, le FDC a reçu l'autorisation d'activer sa force de volontaires. \n\nBien que la situation générale soit désastreuse, le vol du Zeta-Prolanide est notre priorité. Sans action directe, la perte des stocks de Zeta-Prolanide du secteur pourrait avoir des effets dévastateurs sur l'économie générale de l'ensemble du système. \n\nAlors que les forces de sécurité locales enquêtent sur l'incursion, elles ont localisé le stock volé à plusieurs endroits. Les volontaires du FDC sont chargés de se rendre à ces endroits, de récupérer le Zeta-Prolanide volé et de le transférer à la station avant qu'il ne se dégrade complètement et ne soit plus viable. Soyez prudents, car les informations suggèrent que les grands groupes de Zeta-Prolanide ont une plus grande présence de hors-la-loi.\n\n Le temps étant un facteur essentiel, il est fortement conseillé d'avoir un rayon tracteur pour aider à déplacer la cargaison.\n\nEn guise de motivation supplémentaire, les volontaires recevront des primes régulières pour leurs efforts combinés.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
BlockadeRunner_Title=ALERTE FDC : ~mission(Location) Besoin de Briseurs de Blocus <EM4>[1,000 Rep]</EM4>
BrightSky_Desc=La FDC s'associe à Anvil Aerospace pour trouver les agents les plus compétents du système. \n\nSi vous trouvez l'une de ces certifications Platine, vous pouvez échanger le ticket dans une boutique de vaisseaux chez New Deal, Astro Armada ou Crusader Showroom contre un F8C gratuit. \n\nAttention cependant, votre identité et votre emplacement seront partagés avec les autres participants à travers le système. Pour tous les autres, si vous pouvez arrêter le détenteur du ticket avant qu'il n'atteigne la boutique, vous pouvez récupérer le ticket.\n\nCelui qui le fera recevra non seulement ce chasseur lourd nouvelle génération, mais prouvera également qu'il a les qualités requises pour les missions FDC les plus délicates.\n\nBonne chance.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
CFP_Delivery_Outpost_Multi_desc_001=Bonjour,\n\nLes Citizens for Prosperity ont besoin d’aide pour transporter des fournitures dans l'un de nos avant-poste. Les caisses doivent être récupérées à <EM4>~mission(Location|Address)</EM4> et livrées à <EM4>~mission(Destination|Address)</EM4>. \n\nÇa ne semble pas trop compliqué, n’est-ce pas ? Assurez vous juste de porter une paire de chaussures confortables. Aussi, pour vous faciliter la tâche, je vous conseille de vous munir d'un <EM4>rayon tracteur portable</EM4>. \n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +200 Rep\n<EM4>Contractor:</EM4> +400 Rep\n<EM4>Sr. Contractor:</EM4> +800 Rep
CFP_Delivery_Outpost_Multi_title_001=Livraison Inter-Poste à ~mission(Destination) - Boîtes Multiples <EM4>[200–800 Rep]</EM4>
CFP_Delivery_Outpost_desc_001=Hé, \n\nNous avons une opportunité pour tous les transporteurs intéressés à donner un coup de main aux Citizens for Prosperity. Il y a une boîte qui doit être déplacée de <EM4>~mission(Location|Address)</EM4> à <EM4>~mission(Destination|Address)</EM4>. Cela ne devrait pas prendre longtemps, si vous êtes dans les environs de l'avant-poste et disponible. \n\nAussi, pour vous faciliter la tâche, je vous conseille de vous munir d'un <EM4>rayon tracteur portable</EM4>. \n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Neutral:</EM4> +50 Rep
CFP_Delivery_Outpost_title_001=Livraison Inter-Poste à ~mission(Destination) <EM4>[50 Rep]</EM4>
CFP_RecoverCargo_Easy_Description=La vie est rude à la Frontière, et chaque livraison destinée à nos colons est cruciale. Nous ne pouvons vraiment pas nous permettre d'en perdre d'autres cette année.\n\nL'un de nos principaux fournisseurs a été attaqué par une bande de hors-la-loi près de <EM4>~mission(Location|Address)</EM4> et nous n'avons plus de nouvelles de lui. Je crains le pire, mais si nous parvenons à récupérer les fournitures qu'il transportait, cela pourrait changer la donne.\n\nIl y a de fortes chances que les hors-la-loi qui les ont attaqués rôdent encore dans les parages, alors soyez sur vos gardes. Une fois que vous vous serez occupé d'eux, récupérez la cargaison et transportez-la jusqu'au monte-charge de <EM4>~mission(Destination|Address)</EM4>. Assurez-vous d'avoir un vaisseau capable de transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4> et munissez-vous également d'un <EM4>rayon tracteur puissant</EM4>.\n\nBonne chance,\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- C54 SMG\n- P8-SC SMG\n- S71 Rifle\n- [S1-A] C54 SMG Magazine (50 cap)\n- [S1-A] G-2 Helmet Woodland\n- [S1-A] ORC-mkV Arms\n- [S1-A] ORC-mkV Core\n- [S1-A] ORC-mkV Legs\n- [S1-A] ORC-mkX Arms Woodland\n- [S1-A] ORC-mkX Core Woodland\n- [S1-A] ORC-mkX Helmet Woodland\n- [S1-A] ORC-mkX Legs Woodland\n- [S1-A] P8-SC SMG Magazine (45 cap)\n- [S1-A] S71 Rifle Magazine (30 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Unknown:</EM4> 1\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
CFP_RecoverCargo_Easy_Title=Convoi de ravitaillement intercepté <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
CFP_RecoverCargo_Hard_Description=Nous étions en train de livrer un chargement urgent aux habitants de <EM4>~mission(Destination|Address)</EM4> lorsque notre pilote est tombé sur un groupe de hors-la-loi. Il a tenté de s'enfuir, mais c'était déjà trop tard.\n\nIl y a toutefois une lueur d'espoir. Les traceurs indiquent que la cargaison est toujours intacte à <EM4>~mission(Location|Address)</EM4>. Il y a de fortes chances que les hors-la-loi la gardent en attendant de trouver un vaisseau assez grand pour tout transporter. Bien que je ne veuille pas risquer de perdre un autre pilote, nous avons désespérément besoin de cette cargaison, au point que cela justifie la décision d'envoyer quelqu'un la récupérer.\n\nCe ne sera pas facile, ces hors-la-loi n'ont montré aucune pitié envers notre pilote. Vous devrez d'abord les éliminer avant de récupérer la cargaison. Apportez un vaisseau capable de stocker des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4> et un <EM4>rayon tracteur puissant</EM4> pour le transport. Livrez-la au monte-charge de <EM4>~mission(Destination)</EM4>  et rectifions la situation.\n\nSoyez prudent,\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- C54 SMG\n- P8-SC SMG\n- S71 Rifle\n- [S1-A] C54 SMG Magazine (50 cap)\n- [S1-A] G-2 Helmet Woodland\n- [S1-A] ORC-mkV Arms\n- [S1-A] ORC-mkV Core\n- [S1-A] ORC-mkV Legs\n- [S1-A] ORC-mkX Arms Woodland\n- [S1-A] ORC-mkX Core Woodland\n- [S1-A] ORC-mkX Helmet Woodland\n- [S1-A] ORC-mkX Legs Woodland\n- [S1-A] P8-SC SMG Magazine (45 cap)\n- [S1-A] S71 Rifle Magazine (30 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Unknown:</EM4> 1\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
CFP_RecoverCargo_Hard_Title=Marchandises essentielles à récupérer <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
CFP_RecoverCargo_Medium_Description=Un vaisseau des Citizens for Prosperity a été pris en embuscade par un groupe de hors-la-loi près de <EM4>~mission(Location|Address)</EM4>, et on a besoin d'un pilote expérimenté pour lui venir en aide.\n\nOn a perdu le contact avec le vaisseau en plein milieu de la communication, mais on aurait qu'il subissait des tirs nourris. Il est peut-être trop tard pour lui, mais les provisions vitales qu'il transportait pourraient encore servir. Rendez-vous sur place, éliminez tous les ennemis et récupérez la cargaison. Vous aurez besoin d'un vaisseau capable de transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4> et d'un <EM4>rayon tracteur puissant</EM4> pour transférer la cargaison sur votre vaisseau.\n\nAmenez-la au monte-charge situé à <EM4>~mission(Destination|Address)</EM4>, je vous promets que nous en ferons bon usage.\n\nSoyez prudent,\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- C54 SMG\n- P8-SC SMG\n- S71 Rifle\n- [S1-A] C54 SMG Magazine (50 cap)\n- [S1-A] G-2 Helmet Woodland\n- [S1-A] ORC-mkV Arms\n- [S1-A] ORC-mkV Core\n- [S1-A] ORC-mkV Legs\n- [S1-A] ORC-mkX Arms Woodland\n- [S1-A] ORC-mkX Core Woodland\n- [S1-A] ORC-mkX Helmet Woodland\n- [S1-A] ORC-mkX Legs Woodland\n- [S1-A] P8-SC SMG Magazine (45 cap)\n- [S1-A] S71 Rifle Magazine (30 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Unknown:</EM4> 1\n<EM4>Jr. Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
CFP_RecoverCargo_Medium_Title=Récupération de marchandises précieuses <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
CFP_RecoverCargo_Super_Description=En temps normal, je ne demanderais à personne de prendre un tel risque, mais la situation est exceptionnelle.\n\nNotre pilote transportait une cargaison vitale lorsqu'il a été pris pour cible par un groupe de hors-la-loi. Nous ne pouvons en aucun cas les laisser mettre la main sur cette cargaison.\n\nCompte tenu de l'importance des forces hostiles à l'origine de l'attaque, vous ne pourrez pas y arriver seul. Vous devrez vous faire accompagner d'un équipage expérimenté jusqu'à  <EM4>~mission(Location|Address)</EM4> afin  d'éliminer ces hors-la-loi et de récupérer la cargaison. Assurez-vous qu'au moins l'un d'entre vous dispose d'un vaisseau capable de transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4> et d'un <EM4>rayon tracteur puissant</EM4>.\n\nSi, par miracle, vous parvenez à récupérer cette cargaison, apportez-la au monte-charge de <EM4>~mission(Destination|Address)</EM4>.\n\nC'est beaucoup vous demander, mais si vous réussissez, vous aurez toute ma gratitude et celle de l'organisation tout entière.\n\nBonne chance,\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- C54 SMG\n- P8-SC SMG\n- S71 Rifle\n- [S1-A] C54 SMG Magazine (50 cap)\n- [S1-A] G-2 Helmet Woodland\n- [S1-A] ORC-mkV Arms\n- [S1-A] ORC-mkV Core\n- [S1-A] ORC-mkV Legs\n- [S1-A] ORC-mkX Arms Woodland\n- [S1-A] ORC-mkX Core Woodland\n- [S1-A] ORC-mkX Helmet Woodland\n- [S1-A] ORC-mkX Legs Woodland\n- [S1-A] P8-SC SMG Magazine (45 cap)\n- [S1-A] S71 Rifle Magazine (30 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Unknown:</EM4> 1\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
CFP_RecoverCargo_Super_Title=Opération spéciale de récupération <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
CFP_RecoverCargo_VeryHard_Description=De plus en plus de vaisseaux des CFP sont pris pour cible ces derniers temps, et malgré tous nos efforts pour assurer la sécurité de nos routes commerciales, nous continuons de perdre des transporteurs, victimes d'attaques de hors-la-loi.\n\nNotre pilote situé à <EM4>~mission(Location|Address)</EM4> est la dernière victime en date. Ça me fait mal de penser à tout ce que nous avons perdu, mais tant qu'il y aura des gens ayant besoin de notre aide, nous devons continuer à nous battre.\n\nSi vous disposez d'un vaisseau capable de transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4> et d'un <EM4>rayon tracteur puissant</EM4>, rendez-vous à l'emplacement indiqué ci-dessus pour récupérer cette cargaison.\n\nCe ne sera pas facile, ce pilote était l'un de nos meilleurs et n'aurait pas abandonné sans se battre. Ne sous-estimons pas ces hors-la-loi, emmenez un équipage de confiance et veillez les uns sur les autres.\n\nUne fois la cargaison récupérée, livrez-la au monte-charge de <EM4>~mission(Destination|Address)</EM4> et je m'occuperai de la suite.\n\nBonne chance et prenez soin de vous,\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- C54 SMG\n- P8-SC SMG\n- S71 Rifle\n- [S1-A] C54 SMG Magazine (50 cap)\n- [S1-A] G-2 Helmet Woodland\n- [S1-A] ORC-mkV Arms\n- [S1-A] ORC-mkV Core\n- [S1-A] ORC-mkV Legs\n- [S1-A] ORC-mkX Arms Woodland\n- [S1-A] ORC-mkX Core Woodland\n- [S1-A] ORC-mkX Helmet Woodland\n- [S1-A] ORC-mkX Legs Woodland\n- [S1-A] P8-SC SMG Magazine (45 cap)\n- [S1-A] S71 Rifle Magazine (30 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Unknown:</EM4> 1\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
CFP_RecoverCargo_VeryHard_Title=Une livraison de marchandises à achever <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
CFP_SabotageRelays_HH_001_Desc=La violence n'est jamais notre premier choix, mais parfois elle doit être utilisée de manière préventive.\n\nNous prévoyons une frappe sur un avant-poste contrôlé par les Headhunter et nous avons besoin de votre aide. \n\n Nous avons besoin de nous assurer que si quelque chose tourne mal, ils ne puissent pas appelé des renforts et aggraver la situation. C'est ici que vous intervenez. Nous avons besoin que vous vous rendiez à <EM4>~mission(Location|Address)</EM4> et désactiviez les tours de communication. Il devrait y avoir un <EM4> panneau de contrôle situé au sommet</EM4> de chaque tour que vous pouvez utiliser pour les désactiver. Si vous réussissez, les Citizens for Prosperity pourront gagner du terrain vital sur Pyro.\n\nIl est également utile de garder à l'esprit pour de futurs contrats que vous pouvez choisir de désactiver les tours de communication plutôt que de risquer un combat avec des vaisseaux de renforts.\n\nRestez vigilant et soyez prudent.\n\n Merci,\n\nLima Endicott \nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +75
CFP_SabotageRelays_HH_001_Title=Désactivation de Tours de Communication Headhunter <EM4>[75 Rep]</EM4>
CFP_SabotageRelays_XT_001_Desc=Les Citizens for Prosperity sont impatient d'aider le peuple de Pyro, et cela commence avec leur libération de l'emprise des XenoThreat.\n\nNous préparons une équipe pour infiltrer l'un de leur avant-postes, mais dans un premier temps nous avons besoin de quelqu'un qui parte devant pour détruire leur tours de communications. Une fois ces tours désactivées, ils ne pourront pas appeler de renfort et nous pourrons mettre notre plan à exécution. \n\nRendez-vous à <EM4>~mission(Location|Address)</EM4> et trouvez les tours. Au <EM4>sommet se trouve un panneau de contrôle</EM4> qui pourra être utilisé pour les désactiver.\n\nAussi, il est important de rappeler que la majorité des avant-postes utilisent un système similaire, vous serez donc capable de désactiver les tours de communications plutôt que de risquer de combattre des vaisseaux de renforts lorsque vous ferez d'autres missions.\n\n Bonne chance,\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +100
CFP_SabotageRelays_XT_001_Title=Désactivation de Tours de Communication XenoThreat <EM4>[100 Rep]</EM4>
CFP_SecurityPatrol_E_Desc_001=Nous avons constaté une augmentation du trafic sur l'une des voies de circulation que nous surveillons. Il y a fort à parier que nous ne serons pas les seuls à y prêter attention. Je voudrais que vous vous rendiez sur place à bord d'un vaisseau prêt au combat et que vous vous assuriez qu'aucun hors-la-loi ne tente de profiter de ce sentiment de sécurité.\n\nUne fois que vous aurez accepté ce contrat, rendez-vous à <EM4>l'emplacement indiqué</EM4> sur votre ATH et scannez les points de passage le long de la route. Une fois tous les points sécurisés, le prestataire principal recevra un bonus de <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Targets x15\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +100 Rep
CFP_SecurityPatrol_E_Title_001=Patrouilles sur les Voie de Circulation à Risque <EM4>[100 Rep]</EM4>
CFP_SecurityPatrol_H_Desc_001=Nous avons identifié un secteur qui a récemment été victime d'attaques illégales et, avec votre aide, nous espérons pouvoir changer cela. Nous vous suggérons <EM4>d'apporter des renforts</EM4> sous forme de vaisseaux prêts au combat afin de faire face à toute force hostile que vous pourriez rencontrer.\n\nUne fois que vous aurez accepté ce contrat, rendez-vous à <EM4>l'emplacement indiqué</EM4> sur votre ATH et scannez les points de passage le long du trajet. Une fois tous les points sécurisés, le prestataire principal recevra un bonus de <EM4>~mission(ScripAmount) Jeton GDM.</EM4>\n\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Targets x54\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Sr. Contractor:</EM4> +200 Rep
CFP_SecurityPatrol_H_Title_001=Patrouilles Des Repaire Hors-la-loi <EM4>[200 Rep]</EM4>
CFP_SecurityPatrol_M_Desc_001=Les hors-la-loi multiplient leurs activités le long d'une des routes les plus fréquentées du système et nous espérons pouvoir les dissuader avant que le problème ne devienne incontrôlable. À cette fin, nous vous demandons de vous rendre sur place à bord d'un vaisseau prêt au combat et de vous occuper de tous les ennemis que vous pourriez rencontrer.\n\nUne fois que vous aurez accepté ce contrat, rendez-vous à <EM4>l'emplacement indiqué</EM4> sur votre ATH et scannez les points de passage le long de la route. Une fois tous les points sécurisés, le prestataire principal recevra un bonus de <EM4>~mission(ScripAmount) Jeton GDM.</EM4>\n\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Targets x23\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +150 Rep
CFP_SecurityPatrol_M_Title_001=Patrouilles Des Voies de Circulation Dangereuses <EM4>[150 Rep]</EM4>
CFP_SecurityPatrol_S_Desc_001=Après avoir constaté une augmentation du taux de criminalité pendant plusieurs semaines, nous avons pu identifier un secteur qui, selon nous, serait à l'origine des activités illégales qui se propagent dans les zones environnantes. Même s'il serait trop ambitieux d'espérer éliminer toutes les menaces, nous pensons qu'en envoyant des patrouilles de combat dans la région, nous pourrions commencer à inverser cette tendance inquiétante. Nos analystes de combat internes recommandent d'emmener environ <EM4>trois coéquipiers</EM4> dans des vaisseaux prêts au combat afin d'affronter toute force hostile que vous pourriez rencontrer.\n\nUne fois que vous aurez accepté ce contrat, rendez-vous à <EM4>l'emplacement indiqué</EM4> sur votre ATH et scannez les points de passage le long du trajet. Une fois tous les points sécurisés, le prestataire principal recevra un bonus de <EM4>~mission(ScripAmount) Jeton GDM.</EM4>\n\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 7/7\n<EM4>Hostiles:</EM4> Targets x88\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Head Contractor:</EM4> +300 Rep
CFP_SecurityPatrol_S_Title_001=Patrouilles d'un Secteur Extrêmement Dangereux <EM4>[300 Rep]</EM4>
CFP_SecurityPatrol_VE_Desc_001=Nous avons besoin d'une personne ayant une expérience du combat pour patrouiller une voie de circulation pour nous. Au fil des ans, nous avons constaté qu'il était bon de se montrer et de se rendre visible. Parfois, le simple fait qu'un pilote comme vous traverse une zone suffit à dissuader les hors-la-loi potentiels. Mais au cas où vous en rencontreriez qui se montreraient un peu plus ambitieux, il est recommandé d'avoir un vaisseau prêt au combat.\n\nUne fois que vous aurez accepté ce contrat, rendez-vous à <EM4>l'emplacement indiqué</EM4> sur votre ATH. Après avoir scanné tous les points de passage et vérifié que l'itinéraire est sûr, le prestataire principal recevra un bonus de <EM4>~mission(ScripAmount) Jeton GDM.</EM4>\n\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Targets x4\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep
CFP_SecurityPatrol_VE_Title_001=Patrouilles des Voies de Circulation <EM4>[100 Rep]</EM4>
CFP_SecurityPatrol_VH_Desc_001=Nous avons identifié un secteur qui est de plus en plus en proie à des attaques illégales et nous pensons que si nous commençons à patrouiller activement dans cette zone, nous pourrons renverser la situation. Nous vous recommandons de rassembler au moins <EM4>deux coéquipiers</EM4> pour vous rendre sur place à bord de vaisseaux prêts au combat et affronter toutes les forces hostiles que vous pourriez rencontrer.n\nUne fois que vous aurez accepté ce contrat, rendez-vous à <EM4>l'emplacement indiqué</EM4> sur votre ATH et scannez les points de passage le long du trajet. Une fois tous les points sécurisés, le prestataire principal recevra un bonus de <EM4>~mission(ScripAmount) Jeton GDM.</EM4>\n\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Targets x66\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Veteran Contractor:</EM4> +250 Rep
CFP_SecurityPatrol_VH_Title_001=Patrouilles du Secteur Dangereux Hors-la-loi <EM4>[250 Rep]</EM4>
CFP_ShipWaveAttack_ClearHostiles_Desc_E_001=Afin de protéger nos pilotes, Citizens for Prosperity recommande souvent d'emprunter des itinéraires moins conventionnels à travers le système. Il semble toutefois qu'un gang hors-la-loi en ait eu vent et ait commencé à multiplier les embuscades le long d'une de ces routes. Plutôt que de simplement contourner le problème et de risquer qu'il persiste sur le nouvel itinéraire, nous estimons qu'il est plus prudent d'affronter directement ces hors-la-loi.\n\nVous et les vaisseaux de soutien que vous recruterez vous rendrez à ~mission(Location|Address) pour neutraliser tous les ennemis qui s'y cacheraient. On sait qu'ils opèrent en petits groupes, il est donc important d'attendre que vous ayez éliminé tous les ennemis.\n\nVotre aide nous est très précieuse,\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x12\n<EM4>Jr. Contractor:</EM4> +100 Rep
CFP_ShipWaveAttack_ClearHostiles_Desc_H_001=Une flotte criminelle s'est installée dans un secteur que Citizens For Prosperity tente de développer, et toute avancée a été stoppée en raison de ses actions violentes. Il est impératif, pour la réalisation de nos objectifs à long terme, que nous trouvions un moyen d'éliminer cette flotte avant qu'elle ne cause davantage de dégâts.\n\nVous et vos vaisseaux de soutien les plus fiables vous rendrez à ~mission(Location|Address) pour neutraliser tous les ennemis qui s'y cacheraient. On sait qu'ils opèrent en petits groupes, il est donc important d'attendre que vous ayez éliminé tous les ennemis.\n\nVotre aide nous est très précieuse,\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x22\n<EM4>Sr. Contractor:</EM4> +200 Rep
CFP_ShipWaveAttack_ClearHostiles_Desc_M_001=On dirait que chaque fois que nous commençons à faire de réels progrès dans le système, les hors-la-loi sont là pour nous faire reculer. Nous venions tout juste de nettoyer ~mission(Location|Address) quand nous avons appris qu’un nouveau gang hors-la-loi s’y était installé, s’en servant comme base pour diverses activités criminelles. \n\nComme nous ne pouvons pas laisser cette situation s'aggraver, vous et quelques vaisseaux de soutien êtes chargés de vous rendre sur place pour éliminer tous les groupes de ce gang. Une fois que vous aurez neutralisé l'un d'entre eux, attentez que tous les groupes hostiles aient été éliminés.\n\nSachez que votre aide fait vraiment la différence,\nLima Endicott\nResponsable logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x13\n<EM4>Contractor:</EM4> +150 Rep
CFP_ShipWaveAttack_ClearHostiles_Desc_VE_001=Nous avons récemment été informés que plusieurs sous-traitants de Citizens for Prosperity ont été victimes d'attaques de la part d'un groupe de hors-la-loi opérant depuis ~mission(Location|Address). \n\nAfin de rétablir la sécurité dans cette zone, vous serez envoyé sur place pour affronter ces hors-la-loi. Ce groupe est connu pour se déplacer en petits groupes; il est donc important que vous et vos renforts attendiez dans la zone pour les neutraliser tous, sans quoi la menace pourrait persister. \n\nMerci de votre aide,\nLima Endicott\nResponsable logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Neutral:</EM4> +100 Rep
CFP_ShipWaveAttack_ClearHostiles_Title_E_001=Nettoyer un itinéraire des CFP <EM4>[100 Rep]</EM4>
CFP_ShipWaveAttack_ClearHostiles_Title_H_001=Neutralisation d'une dangereuse flotte criminelle <EM4>[200 Rep]</EM4>
CFP_ShipWaveAttack_ClearHostiles_Title_M_001=Chasser un nouveau gang d'une zone <EM4>[150 Rep]</EM4>
CFP_ShipWaveAttack_ClearHostiles_Title_VE_001=Éliminer un groupe de chasseurs hors-la-loi <EM4>[100 Rep]</EM4>
CleanAir_Collect-Milestone1_desc=\nJe tiens tout d'abord à vous dire que vos efforts continus pour aider l'Alliance Aid ont fait une différence considérable, non seulement pour nous à Rayari, mais aussi pour les autres organisations coopérant avec la Division Collections. C'est pourquoi j'ai souhaité vous contacter directement.\n\nBien que nous ayons fait de grands progrès dans la lutte contre cette crise sanitaire, nos chercheurs s'inquiètent que la moisissure Molina puisse muter en une nouvelle souche fongique. \nAfin de garantir que notre enquête en cours sur la moisissure soit aussi précise que possible, nous aimerions que vous vous rendiez à la source de la prolifération à Levski et que vous y <EM4>préleviez directement de nouveaux échantillons de la moisissure Molina</EM4>. \n\nUne fois les échantillons prélevés, vous devrez les livrer à <EM4>~mission(Destination|Address)</EM4>. \n\nMerci pour votre aide à ce moment crucial. \n\nNarina Lerrem\nDirectrice principale\nSous-traitance en Recherche Clinique\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Unique, Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Unknown:</EM4> 1\n<EM4>Rep:</EM4> +424
CleanAir_Collect-Milestone1_title=Alliance Aid: Échantillons de moisissure Molina <EM4>[424 Rep]</EM4>
CleanAir_Courier_Combat_desc=MESSAGE A TOUS LES COURSIERS FTL\nPOUR AFFECTATION IMMÉDIATE\n\n**DETAILS DU CONTRAT** \n\nLIEU DE RÉCUPÉRATION – Un vaisseau FTL transportant une livraison pour Alliance Aid a été abattu à <EM4>~mission(Location|Address)</EM4>. Un coursier est nécessaire pour récupérer le colis et poursuivre la livraison.\n\nLIEU DE LIVRAISON – Le colis doit être acheminé vers <EM4>~mission(Destination|Target|Address)</EM4>. \n\nNIVEAU DE MENACE – Il y a de fortes chances que le coursier ait été attaqué par des hors-la-loi désireux de s'emparer des fournitures indispensables pour enrayer l'épidémie de moisissure Molina à Levski. <EM4>Des affrontements de niveau moyen</EM4> sont à prévoir.\n\nVOYAGE –  Tous les besoins en matière de transport doivent être organisés par le coursier. \n\nFTL Courier Services vous remercie pour votre aide dans le cadre de notre contribution à Alliance Aid.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Unknown:</EM4> 3\n<EM4>Rep:</EM4> +225
CleanAir_Courier_Derelict_desc=MESSAGE A TOUS LES COURSIERS FTL\nPOUR AFFECTATION IMMÉDIATE\n\n**DETAILS DU CONTRAT** \n\nLIEU DE RÉCUPÉRATION – Un vaisseau FTL transportant une livraison pour Alliance Aid n'a pas terminé son contrat. Sa dernière position connue le localise toujours à <EM4>~mission(Location|Address)</EM4>. Un coursier est nécessaire pour récupérer le colis et poursuivre la livraison.\n\nLIEU DE LIVRAISON – Le colis doit être acheminé vers <EM4>~mission(Destination|Target|Address)</EM4>. \n\nNIVEAU DE MENACE – On ignore ce qui est arrivé au navire, mais on soupçonne un incident technique. La prudence est toutefois de mise. <EM4>Des affrontements de faible intensité</EM4> sont à prévoir.\n\nVOYAGE –  Tous les besoins en matière de transport doivent être organisés par le coursier. \n\nFTL Courier Services est fier de contribuer aux efforts de l'Alliance Aid pour lutter contre l'épidémie à Levski.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 6\n<EM4>Rep:</EM4> +150
CleanAir_Courier_Derelict_title=Alliance Aid : Récupération d'un colis vital <EM4>[150 Rep]</EM4>
CleanAir_Courier_title=Alliance Aid : Besoin d'un coursier <EM4>[225 Rep]</EM4>
CleanAir_DefendShip_Easy_desc=Nous avons perdu le contact avec un convoi de l'Alliance Aid et craignons qu'il ne soit attaqué par des hors-la-loi. Nous avons besoin que vous vous rendiez rapidement à <EM4>~mission(Location|Address)</EM4> pour leur venir en aide. Tout retard dans l'acheminement de l'aide humanitaire pourrait coûter des vies à Levski.\n\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Rep:</EM4> +150
CleanAir_DefendShip_Easy_title=Alliance Aid : Vaisseau en difficulté <EM4>[150 Rep]</EM4>
CleanAir_DefendShip_Hard_desc=Tout le monde s'est joint à Alliance Aid pour aider à résoudre la crise actuelle à Levski, mais force est de constater qu'il est impossible de semer le bien dans cet univers sans attirer le mal. L'un des convois d'aide humanitaire vient d'être attaqué par une puissante flotte hors-la-loi. Nous avons besoin que vous <EM4>mettiez sur pied votre propre flotte</EM4> et que vous vous rendiez à <EM4>~mission(Location|Address)</EM4> dès que possible. Avec un peu de chance, vous pourrez peut-être réparer cette injustice avant qu'il ne soit trop tard.\n\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Rep:</EM4> +300
CleanAir_DefendShip_Hard_title=Alliance Aid: Vaisseau attaqué <EM4>[300 Rep]</EM4>
CleanAir_DefendShip_Medium_desc=On pourrait penser que ces hors-la-loi auraient la décence de ne pas entraver les opérations de secours, mais malheureusement, nous avons appris qu'un convoi de l'Alliance Aid était attaqué. Ces criminels semblent constituer une menace sérieuse, il est donc recommandé d'<EM4>apporter du renfort</EM4>. \n\nUne fois prêt, rendez-vous à <EM4>~mission(Location|Address)</EM4> et affrontez ces criminels.\n\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Rep:</EM4> +225
CleanAir_DefendShip_Medium_title=Alliance Aid : Vaisseau en détresse <EM4>[225 Rep]</EM4>
CleanAir_Defense-Milestone1_desc=Vu tout le travail que vous avez accompli auprès de la division Défense, je voulais vous proposer directement ce contrat. Il s'agit d'une mission quelque peu délicate. Deux personnalités importantes sont tombées malades et nous craignions que, si leur transfert venait à être divulgué, elles ne deviennent des cibles privilégiées.\n\nMalheureusement, c'est exactement ce qui s'est passé. Nos tentatives pour les faire passer clandestinement de Nyx à Stanton afin de leur prodiguer des soins médicaux ont échoué, et le vaisseau qui les transporte est désormais attaqué. \n\nVous devez vous rendre rapidement à <EM4>~mission(Location|Address)</EM4>, neutraliser les assaillants et vous assurer que les cryopods arrivent à bon port jusqu'au monte-charge à <EM4>~mission(Destination|Address)</EM4>. \n\nD'ailleurs, assurez-vous d'avoir un vaisseau capable de transporter les cryopods au cas où leur moyen de transport initial serait trop endommagé pour continuer.\n\nJ'espère sincèrement que vous réussirez cette mission de sauvetage. \n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Unique, Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Unknown:</EM4> 1\n<EM4>Rep:</EM4> +675
CleanAir_Defense-Milestone1_title=Alliance Aid : Mission de sauvetage urgente <EM4>[675 Rep]</EM4>
CleanAir_EscortShip_Easy_desc=Citizens for Prosperity a besoin d'un pilote expérimenté au combat pour apporter un soutien supplémentaire à un pilote d'Alliance Aid qui effectue un vol crucial depuis <EM4>~mission(Location|Address)</EM4>dans le cadre des efforts humanitaires en cours. \n\nLes hors-la-loi multiplient leurs attaques en raison de l'activité accrue provoquée par l'épidémie de moisissure Molina. Votre mission consistera donc à assurer ses arrières pendant qu'il accomplit sa tâche. Cette route est relativement sûre, je ne m'attends donc pas à trop de problèmes, mais mieux vaut ne pas prendre de risques.\n\nSi vous êtes intéressé, rendez-vous sur place et attendez de recevoir d'autres instructions.\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2, Reinforcements x4\n<EM4>Friendlies:</EM4> Escort Wings x1\n<EM4>Rep:</EM4> +120
CleanAir_EscortShip_Easy_title=Alliance Aid : Besoin d'une escorte <EM4>[120 Rep]</EM4>
CleanAir_EscortShip_Hard_desc=Alliance Aid dispose d'un vaisseau essentiel aux opérations de secours qui partira de <EM4>~mission(Location|Address)</EM4>. L'organisation a reçu des menaces crédibles d'attaque et cherche à renforcer sa sécurité.\n\nLorsque vous serez prêt, rejoignez le point de rendez-vous seul ou accompagné de <EM4>tout vaisseau de combat supplémentaire que vous aurez pu recruter</EM4>  et attendez les instructions.\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x2, Reinforcements x4\n<EM4>Friendlies:</EM4> Escort Wings x1\n<EM4>Rep:</EM4> +150
CleanAir_EscortShip_Hard_title=Alliance Aid : Besoin d'une protection <EM4>[150 Rep]</EM4>
CleanAir_EscortShip_Medium_desc=Je viens d'être contacté par un représentant d'Alliance Aid qui est très inquiet pour l'un de leurs prestataires partant de  <EM4>~mission(Location|Address)</EM4>. Les vaisseaux participant aux opérations de secours ont attiré l'attention de nombreux hors-la-loi et ils craignent de ne pas pouvoir mener à bien leur mission vitale sans protection supplémentaire.  \n\nCompte tenu du danger accru et de la valeur du vaisseau, il serait peut-être judicieux d'<EM4>apporter votre propre soutien au combat</EM4>.\n\nSi vous êtes intéressé, rejoignez le lieu de rendez-vous et attendez les instructions.\n\nLima Endicott\nResponsable Logistique\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x2, Reinforcements x4\n<EM4>Friendlies:</EM4> Escort Wings x1\n<EM4>Rep:</EM4> +135
CleanAir_EscortShip_Medium_title=Alliance Aid : Besoin de sécurité <EM4>[135 Rep]</EM4>
CleanAir_Hauling_Bulk_MedicalSupplies_desc=Bonjour,\n\nL'épidémie de Maladie du peuple causée par la moisissure Molina a mis à rude épreuve les stocks de fournitures médicales. Nous avons une mission prioritaire à grande échelle pour réapprovisionner <EM4>~mission(Destination|Address)</EM4> en médicaments et équipements nécessaires. Seriez-vous disponible ?\n\nLe chargement se trouve à <EM4>~mission(Location|Address)</EM4>. Vous aurez affaire à des conteneurs d'une taille maximale de <EM4>~mission(MissionMaxSCUSize)</EM4>. Veillez à vous munir d'un d'un vaisseau pouvant accueillir ce type de conteneurs et d'un <EM4>rayon tracteur portable</EM4>. \n\nElla Tieno\nCoordinatrice Logistique Jr.\nCovalex Shipping  \n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +540
CleanAir_Hauling_Bulk_MedicalSupplies_desc_02=Bonjour,\n\nFace à la crise sanitaire qui sévit actuellement à Levski, Alliance Aid a besoin de toute l'aide possible pour transporter suffisamment de fournitures médicales afin de sauver un maximum de vies. Une cargaison importante est prête à être acheminée depuis <EM4>~mission(Location|Address)</EM4> vers <EM4>~mission(Destination|Address)</EM4>.\n\nCette mission nécessite un vaisseau pouvant contenir des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>. Vous aurez également besoin d'un <EM4>rayon tracteur portable</EM4> pour manipuler les caisses.    \n\nFaites-moi savoir si vous pouvez vous en charger.   \n\nBonne route,  \nReyes Ling \nCoordinatrice Logistique de Cargaison \nLing Family Hauling\n\nLing Family Hauling sait que l'univers est dangereux et imprévisible et a mis en place plusieurs protocoles pour vous protéger, vous et le fret de nos clients. Afin de vous éviter d'être pénalisé pour des circonstances indépendantes de votre volonté, le paiement total sera calculé au prorata du pourcentage de cargaison livrée avec succès. Un délai de livraison sera fixé pour chaque transport. Toute cargaison non livrée à l'expiration de ce délai sera signalée comme volée et traitée comme telle. Tous les enlèvements et livraisons doivent être effectués par chargement automatique ou à l'aide d'un monte-charge.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Rep:</EM4> +285
CleanAir_Hauling_Bulk_MedicalSupplies_title=Alliance Aid : Transport interstellaire de fret volumineux (Médical) <EM4>[540 Rep]</EM4>
CleanAir_Hauling_Bulk_MedicalSupplies_title_02=Alliance Aid : Transport de fournitures médicales - Grande taille <EM4>[285 Rep]</EM4>
CleanAir_Hauling_Bulk_MoldSample_desc=Bonjour,\n\nUne équipe spéciale de confinement à <EM4>~mission(Location|Address)</EM4> a collecté et emballé de manière sécurisée suffisamment d'échantillons de moisissure Molina pour un transport à grande échelle. Les chercheurs de <EM4>~mission(Destination|Address)</EM4> attendent avec impatience leur arrivée afin de pouvoir poursuivre leurs tests. Seriez-vous disponible pour effectuer ce transport pour nous ?\n\nJ'ai vérifié auprès de l'équipe de confinement qu'ils ont utilisé des conteneurs adaptés aux risques biologiques, vous ne courrez donc aucun risque d'attraper la maladie. Il vous suffit d'apporter un vaisseau capable de transporter des conteneurs de <EM4>~mission(MissionMaxSCUSize)</EM4> et un <EM4>rayon tracteur portable</EM4>.\n\nJ'espère que ce transport se déroulera en toute sécurité et sans encombre pour vous.\n\nElla Tieno\nCoordinatrice Logistique Jr.\nCovalex Shipping  \n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +600
CleanAir_Hauling_Bulk_MoldSample_title=Alliance Aid : Transport interstellaire de fret volumineux (Recherche) <EM4>[600 Rep]</EM4>
CleanAir_Hauling_Bulk_MoldTreatment_desc=Bonjour,\n\nTout le monde pousse un soupir de soulagement depuis qu'un traitement contre la Maladie du peuple a été découvert, mais on n'est pas encore tirés d'affaire. Beaucoup de gens souffrent encore . Nous espérons que vous pourrez nous aider en transportant une grande quantité de ce produit.  \n\nSi vous êtes disponible, nous avons besoin de vous pour aller chercher des marchandises à <EM4>~mission(Location|Address)</EM4> et les transporter à <EM4>~mission(Destination|Address)</EM4>. N'oubliez pas d'apporter un <EM4>rayon tracteur portable</EM4> et un vaisseau pouvant transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>. \n \n\nBonne route,  \nReyes Ling \nCoordinatrice Logistique de Cargaison \nLing Family Hauling\n\nLing Family Hauling sait que l'univers est dangereux et imprévisible et a mis en place plusieurs protocoles pour vous protéger, vous et le fret de nos clients. Afin de vous éviter d'être pénalisé pour des circonstances indépendantes de votre volonté, le paiement total sera calculé au prorata du pourcentage de cargaison livrée avec succès. Un délai de livraison sera fixé pour chaque transport. Toute cargaison non livrée à l'expiration de ce délai sera signalée comme volée et traitée comme telle. Tous les enlèvements et livraisons doivent être effectués par chargement automatique ou à l'aide d'un monte-charge.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +570 Rep\n<EM4>Tier 2:</EM4> +600 Rep
CleanAir_Hauling_Bulk_MoldTreatment_title=Alliance Aid : Transport de marchandises médicales - Grande taille <EM4>[570–600 Rep]</EM4>
CleanAir_Hauling_Bulk_Ventfilters_desc=Bonjour,\n\nAidez-nous à mettre fin à la Maladie du peuple en transportant de nouveaux filtres d'aération vers les endroits qui en ont besoin. \n\n En voici un lot, à transporter de <EM4>~mission(Location|Address)</EM4> à <EM4>~mission(Destination|Address)</EM4>. Il s'agit d'un chargement volumineux, veuillez donc apporter un vaisseau suffisamment grand pour tout transporter. Le manifeste précise également que le plus grand conteneur que vous aurez à transporter fait <EM4>~mission(MissionMaxSCUSize)</EM4>. Nous vous recommandons vivement de vous munir d'un <EM4>rayon tracteur portable</EM4> pour les manipuler. \n\nMerci de vous joindre à nous et Alliance Aid pour aider à mettre fin à cette crise !\n\nElla Tieno\nCoordinatrice Logistique Jr.\nCovalex Shipping  \n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +600
CleanAir_Hauling_Bulk_Ventfilters_title=Alliance Aid : Transport interstellaire de fret volumineux (Filtres) <EM4>[600 Rep]</EM4>
CleanAir_Hauling_Small_Cryopods_desc=Bonjour,\n\nJ'ai ici une livraison extrêmement importante et sensible dont j'aimerais que vous vous occupiez. Afin de réduire le nombre de décès liés à l'épidémie de moisissure Molina, les personnes atteintes de la Maladie du peuple sont placées dans des cryopods afin d'empêcher la progression des symptômes avant qu'elles ne reçoivent le traitement nécessaire.   \n\nPouvez-vous vous rendre à <EM4>~mission(Location|Address)</EM4> pour récupérer un petit chargement de cryopods et les apporter à <EM4>~mission(Destination|Address)</EM4> afin qu'ils puissent recevoir l'aide dont ils ont besoin ?   \n\nSi vous n'avez jamais eu affaire à des cryopods auparavant, vous aurez besoin d'un vaisseau dont la soute peut contenir un conteneur d'une taille maximale de <EM4>~mission(MissionMaxSCUSize)</EM4>. Un <EM4>rayon tracteur portable</EM4> sera également nécessaire pour les déplacer.  \n\nMerci de vous joindre à nous et Alliance Aid pour aider à mettre fin à cette crise !\n\nElla Tieno\nCoordinatrice Logistique Jr.\nCovalex Shipping  \n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +390
CleanAir_Hauling_Small_Cryopods_title=Alliance Aid : Transport interstellaire d'une petite cargaison (Cryopods) <EM4>[390 Rep]</EM4>
CleanAir_Hauling_Small_MedicalSupplies_desc=Hé,\n\nLa demande en fournitures médicales a augmenté depuis le début de l'épidémie de moisissure Molina. C'est pourquoi l'équipe médicale de <EM4>~mission(Destination|Address)</EM4> est à court de certains produits essentiels et ne peut pas attendre le réapprovisionnement habituel. Seriez-vous disponible pour effectuer une livraison prioritaire dès maintenant ?\n\nLes marchandises sont prêtes et vous attendent à <EM4>~mission(Location|Address)</EM4>. Il s'agit d'un petit chargement, mais vous aurez tout de même besoin d'un <EM4>rayon tracteur portable</EM4>. Les conteneurs devraient avoir une taille maximale de <EM4>~mission(MissionMaxSCUSize)</EM4>.\n\nJ'espère que ce transport se déroulera en toute sécurité et sans encombre pour vous.\n\nElla Tieno\nCoordinatrice Logistique Jr.\nCovalex Shipping  \n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +360
CleanAir_Hauling_Small_MedicalSupplies_desc_02=Bonjour,\n\nOn dirait bien que les gens ont épuisé leurs ressources médicales en essayant de trouver un remède à la Maladie du peuple. Alliance Aid est actuellement submergé de demandes d'approvisionnement en fournitures médicales. Pouvez-vous m'aider à en traiter une ?\n\nVoici une petite commande prête à être expédiée. Les fournitures se trouvent à <EM4>~mission(Location|Address)</EM4> et doivent être livrées à <EM4>~mission(Destination|Address)</EM4>. Tout ce dont vous avez besoin, c'est d'un <EM4>rayon tracteur portable</EM4> pour déplacer la cargaison et d'un vaisseau pouvant accueillir des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>.   \n\n\nBonne route,  \nReyes Ling \nCoordinatrice Logistique de Cargaison \nLing Family Hauling\n\nLing Family Hauling sait que l'univers est dangereux et imprévisible et a mis en place plusieurs protocoles pour vous protéger, vous et le fret de nos clients. Afin de vous éviter d'être pénalisé pour des circonstances indépendantes de votre volonté, le paiement total sera calculé au prorata du pourcentage de cargaison livrée avec succès. Un délai de livraison sera fixé pour chaque transport. Toute cargaison non livrée à l'expiration de ce délai sera signalée comme volée et traitée comme telle. Tous les enlèvements et livraisons doivent être effectués par chargement automatique ou à l'aide d'un monte-charge.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Rep:</EM4> +225
CleanAir_Hauling_Small_MedicalSupplies_title=Alliance Aid : Transport interstellaire d'une petite cargaison (Médicale) <EM4>[360 Rep]</EM4>
CleanAir_Hauling_Small_MedicalSupplies_title_02=Alliance Aid : Transport de fournitures médicales - Petite taille <EM4>[225 Rep]</EM4>
CleanAir_Hauling_Small_MoldSample_desc=Bonjour,\n\nLes scientifiques de <EM4>~mission(Destination|Address)</EM4> ont désespérément besoin d'échantillons de moisissure Molina afin de pouvoir les soumettre à une série de tests. Je viens d'apprendre qu'une petite quantité d'échantillons les attend à <EM4>~mission(Location|Address)</EM4>. Êtes-vous disponible pour effectuer cette mission ? \n\nVous aurez besoin d'un vaisseau pouvant transporter des conteneurs d'une taille maximale de <EM4>~mission(MissionMaxSCUSize)</EM4>, ainsi que d'un <EM4>rayon tracteur portable</EM4> pour les manipuler. Pour votre tranquillité d'esprit, sachez que les échantillons de moisissure ont été emballés de manière sûre et sécurisée dans les caisses, il n'y a donc aucun risque que vous tombiez malade. \n\n\nElla Tieno\nCoordinatrice Logistique Jr.\nCovalex Shipping  \n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +405
CleanAir_Hauling_Small_MoldSample_title=Alliance Aid : Transport interstellaire d'une petite cargaison (Recherche) <EM4>[405 Rep]</EM4>
CleanAir_Hauling_Small_MoldTreatment_desc=Bonjour,\n\nNous nous sommes mobilisés pour aider les personnes touchées par l'épidémie de moisissure Molina. Une petite cargaison de produits de traitement d'urgence attend d'être récupérée à <EM4>~mission(Location|Address)</EM4> et livrée à <EM4>~mission(Destination|Address)</EM4>. Seriez-vous disponible ?  \n   \nTout ce dont vous aurez besoin, c'est d'un vaisseau pouvant transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4> et d'un <EM4>rayon tracteur portable</EM4> pour faciliter le déplacement des marchandises. \n \n\nBonne route,  \nReyes Ling \nCoordinatrice Logistique de Cargaison \nLing Family Hauling\n\nLing Family Hauling sait que l'univers est dangereux et imprévisible et a mis en place plusieurs protocoles pour vous protéger, vous et le fret de nos clients. Afin de vous éviter d'être pénalisé pour des circonstances indépendantes de votre volonté, le paiement total sera calculé au prorata du pourcentage de cargaison livrée avec succès. Un délai de livraison sera fixé pour chaque transport. Toute cargaison non livrée à l'expiration de ce délai sera signalée comme volée et traitée comme telle. Tous les enlèvements et livraisons doivent être effectués par chargement automatique ou à l'aide d'un monte-charge.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +225 Rep\n<EM4>Tier 2:</EM4> +405 Rep
CleanAir_Hauling_Small_MoldTreatment_title=Alliance Aid : Transport de marchandises médicales - Petite taille <EM4>[225–405 Rep]</EM4>
CleanAir_Hauling_Small_Ventfilters_desc=Bonjour,\n\nCette épidémie de moisissure Molina met vraiment les gens sur les nerfs. Les commandes de nouveaux filtres de ventilation ont explosé, même dans les endroits qui n'utilisaient pas les filtres Gyson bon marché. \n\nQuoi qu'il en soit, j'ai ici une livraison dont j'aimerais que vous vous occupiez. Il s'agit d'un petit chargement de filtres qui attend à <EM4>~mission(Location|Address)</EM4> et qui doit être acheminé à <EM4>~mission(Destination|Address)</EM4>. Vous pouvez vous en occuper ? \n\nD'après nos informations, les conteneurs auront une taille maximale de <EM4>~mission(MissionMaxSCUSize)</EM4>. N'oublie pas d'emporter un <EM4>rayon tracteur portable</EM4> pour vous aider à tout déplacer. \n\nNous vous serions reconnaissants de bien vouloir vous charger de cette importante mission pour nous !\n\nElla Tieno\nCoordinatrice Logistique Jr.\nCovalex Shipping  \n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +405
CleanAir_Hauling_Small_Ventfilters_title=Alliance Aid : Transport interstellaire d'une petite cargaison (Filtres) <EM4>[405 Rep]</EM4>
CleanAir_Hauling_Supply_Cryopods_desc=Bonjour,\n\nLes installations médicales, complètement débordées par l'épidémie de moisissure Molina, ont décidé de placer les personnes infectées dans des cryopods afin d'empêcher leur état de s'aggraver. Heureusement, l'hôpital de <EM4>~mission(Destination|Address)</EM4> a pu libérer de l'espace afin de traiter quelques-unes de ces personnes. Il ne leur manque plus que les patients.\n\nNous recherchons quelqu'un qui serait prêt à aller chercher des cryopods à <EM4>~mission(Location|Address)</EM4> avec un vaisseau pouvant transporter des conteneurs d'une taille de <EM4>~mission(MissionMaxSCUSize)</EM4>. Vous aurez également besoin d'un <EM4>rayon tracteur portable</EM4>. Je ne sais pas si vous avez déjà transporté un cryopod, mais ce n'est pas vraiment quelque chose que l'on peut déplacer à la main.   \n\n\nElla Tieno\nCoordinatrice Logistique Jr.\nCovalex Shipping  \n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +465
CleanAir_Hauling_Supply_Cryopods_title=Alliance Aid : Transport interstellaire d'une cargaison moyenne (Cryopods) <EM4>[465 Rep]</EM4>
CleanAir_Hauling_Supply_MedicalSupplies_desc=J'espère que vous allez bien.\n\nLa situation est un peu plus tendue que d'habitude ici, plusieurs de nos pilotes étant tombés malades lors de leurs missions à Levski. Heureusement, Covalex apporte son aide à l'Alliance Aid, ce qui nous permettra, je l'espère, de mettre rapidement cette mauvaise passe derrière nous.\n\nActuellement, j'ai une cargaison de fournitures médicales de taille moyenne qui attend à <EM4>~mission(Location|Address)</EM4>. J'ai vraiment besoin de quelqu'un pour la transporter à <EM4>~mission(Destination|Address)</EM4>, afin que l'équipe sur place puisse fonctionner à pleine capacité. \n\nLe plus grand conteneur de cette livraison aura une taille de <EM4>~mission(MissionMaxSCUSize)</EM4>, donc prévoyez un vaisseau capable d'en transporter. Oh, et n'oubliez pas votre <EM4>rayon tracteur portable</EM4>.  \n\nMerci de vous joindre à nous et Alliance Aid pour aider à mettre fin à cette crise !\n\nElla Tieno\nCoordinatrice Logistique Jr.\nCovalex Shipping  \n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +465
CleanAir_Hauling_Supply_MedicalSupplies_desc_02=Bonjour,\n\nOn a besoin de votre aide ! Les fournitures médicales sont très demandées depuis que l'épidémie de moisissure Molina a épuisé les stocks. Heureusement, une cargaison de taille moyenne est prête à être acheminée depuis <EM4>~mission(Location|Address)</EM4> vers <EM4>~mission(Destination|Address)</EM4>.\n\nCette mission nécessite un vaisseau pouvant contenir des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>. Vous aurez également besoin d'un <EM4>rayon tracteur portable</EM4> pour manipuler les caisses.    \n\nFaites-moi savoir si vous pouvez vous en charger.   \n\nBonne route,  \nReyes Ling \nCoordinatrice Logistique de Cargaison \nLing Family Hauling\n\nLing Family Hauling sait que l'univers est dangereux et imprévisible et a mis en place plusieurs protocoles pour vous protéger, vous et le fret de nos clients. Afin de vous éviter d'être pénalisé pour des circonstances indépendantes de votre volonté, le paiement total sera calculé au prorata du pourcentage de cargaison livrée avec succès. Un délai de livraison sera fixé pour chaque transport. Toute cargaison non livrée à l'expiration de ce délai sera signalée comme volée et traitée comme telle. Tous les enlèvements et livraisons doivent être effectués par chargement automatique ou à l'aide d'un monte-charge.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Rep:</EM4> +390
CleanAir_Hauling_Supply_MedicalSupplies_title=Alliance Aid : Transport interstellaire d'une cargaison moyenne (Médicale) <EM4>[465 Rep]</EM4>
CleanAir_Hauling_Supply_MedicalSupplies_title_02=Alliance Aid : Transport de fournitures médicales - Taille moyenne <EM4>[390 Rep]</EM4>
CleanAir_Hauling_Supply_MoldSample_desc=Hé,\n\nJ'ai une mission importante à vous confier. J'ai un chargement de taille moyenne contenant des échantillons de moisissure Molina, emballés de manière sécurisée, qui attend d'être ramassé à <EM4>~mission(Location|Address)</EM4>. J'ai besoin de quelqu'un pour récupérer les conteneurs et les apporter à <EM4>~mission(Destination|Address)</EM4> afin d'aider leurs recherches. \n \nMême si la moisissure est extrêmement toxique, ces conteneurs vous en protégeront. Tout ce dont vous devez vous soucier, c'est d'avoir un vaisseau suffisamment grand pour transporter des conteneurs d'une taille maximale de <EM4>~mission(MissionMaxSCUSize)</EM4>. De plus, vous aurez besoin d'un <EM4>rayon tracteur portable</EM4> afin de pouvoir tout déplacer rapidement et efficacement.  \n\nNous vous serions reconnaissants de bien vouloir vous charger de cette importante mission pour nous !\n\nElla Tieno\nCoordinatrice Logistique Jr.\nCovalex Shipping  \n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +465
CleanAir_Hauling_Supply_MoldSample_title=Alliance Aid : Transport interstellaire d'une cargaison moyenne (Recherche) <EM4>[465 Rep]</EM4>
CleanAir_Hauling_Supply_MoldTreatment_desc=Salut,\n\nCe qui arrive aux habitants de Levski avec cette épidémie de moisissure Molina est vraiment terrible, n'est-ce pas ? Notre famille a décidé de faire tout son possible pour aider Alliance Aid. Nous avons une cargaison moyenne d'antifongiques qui attend d'être récupérée à <EM4>~mission(Location|Address)</EM4> et transportée à <EM4>~mission(Destination|Address)</EM4>. Pensez-vous pouvoir vous en occuper pour nous ?\n\nAvant de partir, veillez à vous munir d'un vaisseau pouvant transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>. Vous aurez également besoin d'un <EM4>rayon tracteur portable</EM4> pour manipuler les conteneurs. \n \n\nBonne route,  \nReyes Ling \nCoordinatrice Logistique de Cargaison\nLing Family Hauling\n\nLing Family Hauling sait que l'univers est dangereux et imprévisible et a mis en place plusieurs protocoles pour vous protéger, vous et le fret de nos clients. Afin de vous éviter d'être pénalisé pour des circonstances indépendantes de votre volonté, le paiement total sera calculé au prorata du pourcentage de cargaison livrée avec succès. Un délai de livraison sera fixé pour chaque transport. Toute cargaison non livrée à l'expiration de ce délai sera signalée comme volée et traitée comme telle. Tous les enlèvements et livraisons doivent être effectués par chargement automatique ou à l'aide d'un monte-charge.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +375 Rep\n<EM4>Tier 2:</EM4> +465 Rep
CleanAir_Hauling_Supply_MoldTreatment_title=Alliance Aid : Transport de marchandises médicales - Taille moyenne <EM4>[375–465 Rep]</EM4>
CleanAir_Hauling_Supply_Ventfilters_desc=Hé,\n\nJ'ai une cargaison moyenne de nouveaux filtres de ventilation à <EM4>~mission(Location|Address)</EM4> qui attend d'être acheminée à <EM4>~mission(Destination|Address)</EM4>. Seriez-vous disponible pour vous en occuper ? \n\nL'équipe de <EM4>~mission(Destination)</EM4> est manifestement très impatiente de recevoir ces nouveaux filtres et ne cessera de me harceler à propos de cette cargaison tant que je ne leur aurai pas donné une estimation du délai de livraison. Pas étonnant, avec toute l'inquiétude que suscite l'épidémie de moisissure Molina. La mission devrait être assez facile. Il suffit d'un vaisseau pouvant transporter des conteneurs de <EM4>~mission(MissionMaxSCUSize)</EM4> ou moins et d'un <EM4>rayon tracteur portatif</EM4>. \n\nElla Tieno\nCoordinatrice Logistique Jr.\nCovalex Shipping  \n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +465
CleanAir_Hauling_Supply_Ventfilters_title=Alliance Aid : Transport interstellaire d'une cargaison moyenne (Filtres) <EM4>[465 Rep]</EM4>
CleanAir_Killship_Easy_desc=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Vaisseau à neutraliser \nCODE D'APPROBATION = RT-04\n\nPOUR PRISE EN CHARGE IMMÉDIATE\n\nAvec cette histoire d'Alliance Aid, des cargaisons de grande valeur sont transportées vers Levski, ce qui fait le bonheur des hors-la-loi qui s'en prennent aux transporteurs chargés à bloc. Une enflure en particulier, <EM4>~mission(TargetName)</EM4>, a déjà attaqué une demi-douzaine de vaisseaux et tout le monde est impatient qu'il cesse ses agissements.\n\nIl a été aperçu pour la dernière fois en train de harceler des vaisseaux à <EM4>~mission(Location|Address)</EM4>. Dirigez-vous là-bas et détruisez son vaisseau. Le paiement sera effectué une fois qu'il aura été neutralisé. \n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 2\n<EM4>Rep:</EM4> +75
CleanAir_Killship_Easy_title=Alliance Aid : Voleur de marchandises <EM4>[75 Rep]</EM4>
CleanAir_Killship_Hard_desc=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Vaisseau à neutraliser \nCODE D'APPROBATION = RT-06\n\nPOUR PRISE EN CHARGE IMMÉDIATE\n\nL'un des gangs de Nyx, les Moraine, profite de l'état d'urgence actuel à Levski et a chargé l'un de ses meilleurs pilotes, <EM4>~mission(TargetName)</EM4>, de mener des attaques contre tous les transporteurs d'Alliance Aid qu'il peut trouver. Au rythme où il volent les fournitures, à moins qu'on ne l'arrête rapidement, ça va empêcher tout un tas de personnes malades à Levski de recevoir l'aide dont elles ont besoin.\n\nNous avons réussi à localiser le groupe à <EM4>~mission(Location|Address)</EM4>, mais avant de partir, vous devrez recruter vous-même des renforts. À moins d'<EM4>emmener quelques coéquipiers avec vous</EM4>, je ne suis pas sûr que vous parveniez à neutraliser cette bande de hors-la-loi. \n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Unknown:</EM4> 4\n<EM4>Rep:</EM4> +225
CleanAir_Killship_Hard_title=Alliance Aid : Transporteurs pourchassés <EM4>[225 Rep]</EM4>
CleanAir_Killship_Medium_desc=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Vaisseau à neutraliser \nCODE D'APPROBATION = RT-05\n\nPOUR PRISE EN CHARGE IMMÉDIATE\n\nOn dirait que les gars de l'Alliance du peuple ne sont pas les seuls à vouloir mettre la main sur les ressources nécessaire pour lutter contre l'épidémie de moisissure Molina. Le gang des Moraine s'en prend aux couloirs de navigation pour essayer de s'emparer d'autant de transporteurs que possible. Un membre en particulier, <EM4>~mission(TargetName)</EM4>, et son équipage ont été particulièrement efficaces, détruisant plus d'une douzaine de vaisseaux. Les responsables d'Alliance Aid sont très impatients de voir ce problème grandissant résolu.\n\nSelon des rapports récents, leur terrain de chasse se trouve près de <EM4>~mission(Location|Address)</EM4>. Dirigez-vous vers cet endroit avec tous les vaisseaux de soutien que vous souhaitez emmener et neutralisez-les avant que d'autres fournitures vitales ne soient perdues. \n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Unknown:</EM4> 3\n<EM4>Rep:</EM4> +150
CleanAir_Killship_Medium_title=Alliance Aid : Pilleurs de ressources <EM4>[150 Rep]</EM4>
CleanAir_RecoverCargo_Easy_desc=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Récupération de Cargaison \nCODE D'APPROBATION = JJ-11\n\nPOUR PRISE EN CHARGE IMMÉDIATE\n\nAvec tous ces vaisseaux d'Alliance Aid transportant des cargaisons de grande valeur, les hors-la-loi de la région s'en donnent à cœur joie. Nous venons de recevoir des infos sur l'une de leurs dernières cibles via une balise de détresse et avons besoin de vous pour vous rendre au <EM4>~mission(Location|Address)</EM4>, évaluer la situation, <EM4>neutraliser tout ennemi restant</EM4> dans la zone et, si nécessaire, sécuriser la cargaison pour qu'elle soit livrée à <EM4>~mission(Destination|Address)</EM4>.\n\nN'oubliez pas de vous munir d'un <EM4>rayon tracteur portable</EM4> pour manipuler la cargaison. \n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2\n<EM4>Unknown:</EM4> 2\n<EM4>Rep:</EM4> +300
CleanAir_RecoverCargo_Easy_title=Alliance Aid : Tentative de vol de cargaison <EM4>[300 Rep]</EM4>
CleanAir_RecoverCargo_Hard_desc=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Récupération de Cargaison \nCODE D'APPROBATION = JJ-13\n\nPOUR PRISE EN CHARGE IMMÉDIATE\n\nAlliance Aid vient de me contacter, paniqué. Une cargaison vitale sur laquelle ils comptaient n'est pas arrivée. Tout porte à croire qu'elle a été détourné par des voleurs en cours de route, ils comptent donc sur nous pour nous assurer qu'elle soit livrée.  \n\nVous allez vous rendre au <EM4>~mission(Location|Address)</EM4>, évaluer la situation, <EM4>neutraliser tout ennemi restant</EM4> dans la zone et sécuriser la cargaison pour la livrer à <EM4>~mission(Destination|Address)</EM4>. Assurez-vous d'avoir <EM4>quelques renforts</EM4> avec vous au cas où les choses tourneraient mal. \n\nN'oubliez pas de vous munir d'un <EM4>rayon tracteur portable</EM4> pour manipuler la cargaison. \n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Unknown:</EM4> 2\n<EM4>Rep:</EM4> +600
CleanAir_RecoverCargo_Hard_title=Alliance Aid : Déjouer un détournement de cargaison <EM4>[600 Rep]</EM4>
CleanAir_RecoverCargo_Medium_desc=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Récupération de Cargaison \nCODE D'APPROBATION = JJ-12\n\nPOUR PRISE EN CHARGE IMMÉDIATE\n\nRien de tel qu'une situation d'urgence pour faire ressortir ce qu'il y a de pire chez l'être humain. Cette moisissure Molina tue des gens à droite et à gauche, et que décident de faire les ordures de ce système ? Eh oui, ils essaient de détourner les cargaisons vitales. Alliance Aid veut s'assurer qu'ils ne s'en tirent pas comme ça. \n\nDirigez-vous vers le <EM4>~mission(Location|Address)</EM4>, évaluez la situation, <EM4>neutralisez tous les ennemis restants</EM4> dans la zone et sécurisez la cargaison pour la livrer à <EM4>~mission(Destination|Address)</EM4>. Je m'attends à ce que ces pirates livrent une bataille acharnée, alors n'hésitez pas à venir avec des renforts si vous le souhaitez.\n\nN'oubliez pas de vous munir d'un <EM4>rayon tracteur portable</EM4> pour manipuler la cargaison.  \n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Unknown:</EM4> 2\n<EM4>Rep:</EM4> +450
CleanAir_RecoverCargo_Medium_title=Alliance Aid : Arrêter un vol de cargaison <EM4>[450 Rep]</EM4>
CleanAir_ResourceGathering_Bulk_Filters_desc=AFFECTATION : Collecte de ressources \nLIEU : Système Pyro, Système Stanton\nEXPÉRIENCE DEMANDÉE : Exploitation minière, Commerce de produits\nCONDITIONS* :\nShubin Interstellar se mobilise pour mettre fin à la propagation de la Maladie du peuple. Nos installations contribuent à la production de filtres de ventilation indispensables pour remplacer les modèles défectueux responsables de la propagation de la dangereuse moisissure Molina, mais nous avons besoin de votre aide pour atteindre cet objectif ambitieux. \n\nNos stocks actuels d'une ressource importante étant insuffisants, nous avons besoin de prestataires capables d'en livrer une grande quantité à <EM4>~mission(Destination|Address)</EM4>.\n\nLes ressources liées à un autre contrat ne seront pas acceptées.   \n\n*Shubin Interstellar est un entrepreneur garantissant l'égalité des chances. En acceptant ce contrat, vous assumez tous les risques associés aux travaux décrits dans le présent document et Shubin Interstellar ne peut en aucun cas être tenu responsable des dommages survenus pendant la durée du contrat.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 6/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +589 Rep\n<EM4>Tier 2:</EM4> +603 Rep
CleanAir_ResourceGathering_Bulk_Filters_title=Alliance Aid: Collecte de ressources de fabrication - Grande quantité <EM4>[589–603 Rep]</EM4>
CleanAir_ResourceGathering_Bulk_MoldResearch_desc=À tous les prestataires disponibles,\n\nLes scientifiques de Rayari travaillent sans relâche pour lutter contre l'épidémie fongique qui sévit actuellement à Levski. En raison de problèmes logistiques, notre équipe à <EM4>~mission(Destination|Address)</EM4> manque d'une ressource essentielle à ses recherches. Une perte de production à cet endroit entraverait les efforts d'Alliance Aid pour soigner rapidement les personnes souffrant de cette terrible affection.\n\nC'est pourquoi nous sollicitons l'aide de toute personne susceptible de trouver et de livrer cette ressource vitale à <EM4>~mission(Destination)</EM4>.\n\nN'oubliez pas que les marchandises sous contrat sont tracées par leurs propriétaires légaux et ne peuvent être acceptées.\n\nEnsemble, nous pouvons rendre l’univers meilleur pour tous.\n\nNarina Lerrem\nDirectrice principale\nSous-traitance en Recherche Clinique\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 6/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +589 Rep\n<EM4>Tier 2:</EM4> +609 Rep
CleanAir_ResourceGathering_Bulk_MoldResearch_title=Alliance Aid : Grande quantité de ressources pour la recherche <EM4>[589–609 Rep]</EM4>
CleanAir_ResourceGathering_Small_Filters_desc=AFFECTATION : Collecte de ressources \nLIEU : Système Pyro, Système Stanton\nEXPÉRIENCE DEMANDÉE : Exploitation minière, Commerce de produits\nCONDITIONS* : \nEn tant que membre d'Alliance Aid, Shubin Interstellar s'engage à soutenir la production d'un maximum de filtres de ventilation de haute qualité. Ces filtres sont essentiels pour enrayer la propagation de la moisissure Molina et empêcher que davantage de personnes ne contractent la Maladie du peuple.\n\nNous venons d'apprendre de notre site <EM4>~mission(Destination|Address)</EM4> que leurs stocks d'une ressource essentielle sont en train de s'épuiser. Notre fournisseur habituel ne sera pas en mesure de nous réapprovisionner avant un certain temps, c'est pourquoi nous comptons sur vous pour effectuer une petite livraison afin de combler ce manque. \n \nSi vous êtes disponible, procurez-vous simplement ce produit de la manière qui vous semble la plus appropriée et apportez-le à notre installation. Nous vous rémunérerons généreusement.\n\nLes ressources liées à un autre contrat ne seront pas acceptées.   \n\n*Shubin Interstellar est un entrepreneur garantissant l'égalité des chances. En acceptant ce contrat, vous assumez tous les risques associés aux travaux décrits dans le présent document et Shubin Interstellar ne peut en aucun cas être tenu responsable des dommages survenus pendant la durée du contrat.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +327 Rep\n<EM4>Tier 2:</EM4> +365 Rep
CleanAir_ResourceGathering_Small_Filters_title=Alliance Aid: Collecte de ressources de fabrication - Petite quantité <EM4>[327–365 Rep]</EM4>
CleanAir_ResourceGathering_Small_MoldResearch_desc=À tous les prestataires disponibles,\n\nRayari a besoin de votre aide. Dans le cadre de l'effort d'aide de l'Alliance, nos scientifiques concentrent désormais tous leurs efforts à aider Levski à lutter contre la moisissure Molina. Malheureusement, les progrès de l'équipe sont au point mort faute d'une ressource essentielle.\n\nL'obtenir auprès de nos distributeurs habituels pourrait prendre des semaines. Étant donné le nombre de personnes ayant désespérément besoin d'aide, interrompre la recherche pendant aussi longtemps aurait un impact considérable sur nos efforts. Nous espérons trouver des personnes motivées, prêtes à se procurer et à livrer une petite quantité de cette ressource à <EM4>~mission(Destination|Address)</EM4>. \n\nN'oubliez pas que les marchandises sous contrat sont tracées par leurs propriétaires légaux et ne peuvent être acceptées.\n\nEnsemble, nous pouvons rendre l’univers meilleur pour tous.\n\nNarina Lerrem\nDirectrice principale\nSous-traitance en Recherche Clinique\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +303 Rep\n<EM4>Tier 2:</EM4> +309 Rep
CleanAir_ResourceGathering_Small_MoldResearch_desc_harvestable=À tous les prestataires disponibles,\n\nRayari a besoin de votre aide. Dans le cadre de l'effort d'aide de l'Alliance, nos scientifiques concentrent désormais tous leurs efforts à aider Levski à lutter contre la moisissure Molina. Malheureusement, les progrès de l'équipe sont au point mort faute d'une ressource essentielle.\n\nL'obtenir auprès de nos distributeurs habituels pourrait prendre des semaines. Étant donné le nombre de personnes ayant désespérément besoin d'aide, interrompre la recherche pendant aussi longtemps aurait un impact considérable sur nos efforts. Nous espérons trouver des personnes motivées, prêtes à se procurer et à livrer une petite quantité de cette ressource à <EM4>~mission(Destination|Address)</EM4>. \n\nSi vous avez besoin d'aide pour localiser cette ressource, je vous suggère de consulter <EM4>"Le Guide du Cueilleur"</EM4> dans le journal de votre mobiGlas.\n\nN'oubliez pas que les marchandises sous contrat sont tracées par leurs propriétaires légaux et ne peuvent être acceptées.\n\nEnsemble, nous pouvons rendre l’univers meilleur pour tous.\n\nNarina Lerrem\nDirectrice principale\nSous-traitance en Recherche Clinique\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +255
CleanAir_ResourceGathering_Small_MoldResearch_title=Alliance Aid : Petite quantité de ressources pour la recherche <EM4>[255–309 Rep]</EM4>
CleanAir_ResourceGathering_Supply_Filters_desc=AFFECTATION : Collecte de ressources \nLIEU : Système Pyro, Système Stanton\nEXPÉRIENCE DEMANDÉE : Exploitation minière, Commerce de produits\nCONDITIONS* : \nShubin Interstellar consacre désormais une grande partie de son activité à soutenir la production de filtres de ventilation afin d'endiguer la propagation de la moisissure Molina. Même si nous avons la capacité et la volonté d'aider, notre accès à une ressource particulière entrave nos efforts.\n\nNous recherchons des personnes motivées, disposées à se procurer et à livrer une quantité moyenne de cette ressource à notre installation située à <EM4>~mission(Destination|Address)</EM4> afin que l'aide humanitaire puisse se poursuivre sans interruption.\n\nLes ressources liées à un autre contrat ne seront pas acceptées.\n\n*Shubin Interstellar est un entrepreneur garantissant l'égalité des chances. En acceptant ce contrat, vous assumez tous les risques associés aux travaux décrits dans le présent document et Shubin Interstellar ne peut en aucun cas être tenu responsable des dommages survenus pendant la durée du contrat.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 5/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +449 Rep\n<EM4>Tier 2:</EM4> +463 Rep
CleanAir_ResourceGathering_Supply_Filters_title=Alliance Aid: Collecte de ressources de fabrication - Quantité moyenne <EM4>[449–463 Rep]</EM4>
CleanAir_ResourceGathering_Supply_MoldResearch_desc=À tous les prestataires disponibles,\n\nBonne nouvelle ! Rayari travaille d'arrache-pied pour venir à bout de la Maladie du peuple. Malheureusement, nous avons beaucoup de mal à nous procurer une ressource essentielle par nos voies habituelles. Pour nous aider à élargir notre accès à cette ressource, nous offrirons une généreuse récompense à quiconque nous la trouvera et la livrera à nos scientifiques de <EM4>~mission(Destination|Address)</EM4>.\n\nN'oubliez pas que les marchandises sous contrat sont tracées par leurs propriétaires légaux et ne peuvent être acceptées.\n\nEnsemble, nous pouvons rendre l’univers meilleur pour tous.\n\nNarina Lerrem\nDirectrice principale\nSous-traitance en Recherche Clinique\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +446 Rep\n<EM4>Tier 2:</EM4> +463 Rep
CleanAir_ResourceGathering_Supply_MoldResearch_title=Alliance Aid : Quantité moy. de ressources pour la recherche <EM4>[446–463 Rep]</EM4>
CleanAir_Transport-Milestone1_desc=Bon, cette fois-ci, c'est un peu différent. Voyez-vous, avec tout ce qui se passe au sein d'Alliance Aid, nous avons commis une erreur dans nos contrats et une livraison importante a été oubliée. Comme des vies sont en jeu et que vous avez déjà beaucoup aidé la division Transport, je me disais que vous pourriez peut-être nous rendre service et faire une double livraison ?\n\nIl y a une cargaison de taille moyenne de <EM4>traitement anti-moisissure Molina</EM4> sur microtech et un chargement de <EM4>filtres de ventilation sur Hurston</EM4> qui attendent d'être récupérés. Vous devrez faire les deux arrêts, tout charger et tout apporter à <EM4>~mission(Destination|Address)</EM4>. Pour transporter cette cargaison, votre vaisseau doit être suffisamment grand pour accueillir des conteneurs de <EM4>~mission(MissionMaxSCUSize)</EM4>. \n\nVérifiez bien que vous avez votre <EM4>rayon tracteur portable</EM4> avant de partir. Ce serait vraiment embêtant si vous aviez oublié de l'emporter !  \n\nMerci beaucoup pour votre aide,\n\nElla Tieno\nCoordinatrice Logistique Jr. \nCovalex Shipping  \n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Unique, Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Unknown:</EM4> 1\n<EM4>Rep:</EM4> +1,166
CleanAir_Transport-Milestone1_title=Alliance Aid : Double transport interstellaire d'une cargaison moy. (Médicale / Filtres) <EM4>[1,166 Rep]</EM4>
Covalex_Delivery_Nyx_Medium_Desc_001=Bonjour,\n\nUne mission assez simple : nous avons tout un tas de choses à acheminer à travers Nyx et nous recherchons un prestataire compétent disposant d'un <EM4>rayon tracteur portable</EM4> et d'un vaisseau capable de transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>.\n\nVous trouverez les détails en pièce jointe. Bonne chance !\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nCoordinatrice Logistique Jr.\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Neutral:</EM4> +100 Rep
Covalex_Delivery_Nyx_Medium_Title_001=Livraison Covalex Moy. Distance - Nyx <EM4>[100 Rep]</EM4>
Covalex_Delivery_Stanton_Hard_Desc_001=Bonjour,\n\nNous recherchons un prestataire fiable pour récupérer quelques colis et les livrer à leur destination.\n\nLe trajet est assez long, alors assurez-vous d'avoir suffisamment de carburant et n'oubliez pas votre <EM4>rayon tracteur portable</EM4>.\n\nJe ne sais pas quel appareil vous prévoyez d'utiliser, mais vous aurez besoin d'un vaisseau capable de transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>\n\n~mission(Contractor|SignOff) \n\nElla Tieno\nCoordinatrice Logistique Jr.\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +100 Rep
Covalex_Delivery_Stanton_Hard_Title_001=Livraison Longue Distance Covalex - Stanton <EM4>[100 Rep]</EM4>
Covalex_Delivery_Stanton_Medium_Desc_001=Bonjour,\n\nNous recherchons un prestataire disposant vaisseau capable de transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4> pour effectuer une livraison à travers Stanton.\n\nLe trajet n'est pas particulièrement long, mais vous devrez vous déplacer entre plusieurs endroits différents. Pour que tout se passe bien, prévoyez suffisamment de carburant et un <EM4>rayon tracteur portable</EM4> pour accélérer le déplacement des conteneurs.\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nCoordinatrice Logistique Jr.\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Neutral:</EM4> +100 Rep
Covalex_Delivery_Stanton_Medium_Title_001=Livraison Covalex Moy. Distance - Stanton <EM4>[100 Rep]</EM4>
Covalex_Delivery_Stanton_Super_Desc_001=Mission spéciale : beaucoup de colis à livrer à travers tout le système. C'est un peu plus que d'habitude, donc je ne fais appel qu'à mes meilleurs prestataires pour celle-ci.\n\nÉvidemment, une partie de la rémunération servira à couvrir vos frais de carburant, car vous devrez parcourir de très longues distances pour cette mission. Vous aurez également besoin de tout l'équipement habituel, comme un <EM4>rayon tracteur portable</EM4> et un vaisseau disposant d'une soute capable de stocker des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>.\n\nBonne chance. Je compte sur vous.\n\n~mission(Contractor|SignOff) \n\nElla Tieno\nCoordinatrice Logistique Jr.\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Sr. Contractor:</EM4> +200 Rep
Covalex_Delivery_Stanton_Super_Title_001=Livraison spéciale Covalex - Système Stanton <EM4>[200 Rep]</EM4>
Covalex_Delivery_Stanton_VeryHard_Desc_001=Salut,\n\nCovalex a besoin d'une personne de confiance pour récupérer quelques colis et les livrer à destination.\n\nIl s'agit d'une livraison longue distance, alors faites le plein de carburant et de provisions. Et n'oubliez surtout pas d'emporter un <EM4>rayon tracteur portable</EM4>.\n\nQuant au vaisseau à utiliser, il vous faudra un engin capable de transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>.\n\n~mission(Contractor|SignOff) \n\nElla Tieno\nCoordinatrice Logistique Jr.\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Contractor:</EM4> +150 Rep
Covalex_Delivery_Stanton_VeryHard_Title_001=Livraison Très Longue Distance Covalex - Stanton <EM4>[150 Rep]</EM4>
Covalex_HaulCargo_AToB_Intro_desc=Récompensée de distinctions telles que 'Les 10 Meilleures Compagnies d'Expédition d'Imperial Finances' et 'Le Transport le Plus Fiable du Delivery Digest 2945', Covalex est plus occupé que jamais. Et cela signifie que davantage de marchandises seront acheminées vers davantage d’endroits. C'est là que vous intervenez.  \n\nCovalex est à la recherche de pilotes fiables et assidus pour rejoindre notre famille en pleine expansion. Avez-vous accès à un vaisseau pouvant contenir des <EM4>conteneurs de fret de ~mission(MissionMaxSCUSize)</EM4> ? Pouvez-vous passer une vérification des antécédents de l'Advocacy si nécessaire ? Alors un univers d'opportunités vous attend. \n\nIl vous suffit d'effectuer un 'Test d'évaluation’ en récupérant une cargaison de <EM4>~mission(Item)</EM4> dans un monte-charge à <EM4>~mission(Location|Address)</EM4> et en la livrant avec succès à un monte-charge à <EM4>~mission(Destination|Address)</EM4>.\n\nUne fois la livraison terminée de manière satisfaisante, vous serez éligible pour faire partie du vaste réseau de spécialistes indépendants du transport de Covalex Shipping*\n\nPar ailleurs, nous encourageons vivement les sous-traitants à se munir d'un <EM4>rayon tracteur portable</EM4>.\n\n\n*Covalex Shipping  \n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\n*Covalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle.Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +50
Covalex_HaulCargo_AToB_Intro_title=Opportunite pour Transporteur de Fret Independant <EM4>[100 Rep]</EM4>
Covalex_HaulCargo_AToB_Rehire_desc=Hé,\n\nJ'ai une bonne nouvelle pour vous. Covalex a récemment terminé l'évaluation de son pool de prestataire et a décidé de reconsidérer votre statut de transporteur de fret. Pour vous requalifier, il vous suffit de réussir la livraison suivante.\n\nRécupérez <EM4>~mission(Item)</EM4> dans un monte-charge à <EM4>~mission(Location|address)</EM4> et livrez-le à un monte-charge à <EM4>~mission(Destination|address)</EM4>. Afin de terminer ce transport de manière rapide et efficace, vous aurez besoin d'un vaisseau capable de transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>.\n\nJ'espère que tout se passera bien pour que nous puissions vous accueillir à nouveau dans l'équipe.\n\nPar ailleurs, nous encourageons vivement les sous-traitants à se munir d'un <EM4>rayon tracteur portable</EM4>.\n\nCovalex Shipping \n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +50
Covalex_HaulCargo_AToB_Rehire_title=Réévaluation du Transport de Fret par Covalex <EM4>[50 Rep]</EM4>
Covalex_HaulCargo_AToB_Scrap=Bonjour,\n\nIl y a de tas de déchets qui attend dans un monte-charge à <EM4>~mission(Location|Address)</EM4> et qui doit aller dans un monte-charge à <EM4>~mission(Destination|Address)</EM4> pour être traitée. Je me suis assuré que les conteneurs ne seront pas plus grands que <EM4>~mission(MissionMaxSCUSize)</EM4>. \n\nMa mère aurait adoré cette course. Elle est de celles qui pensent que chaque casse est remplie de trésors cachés. Je ne peux même pas vous dire combien d'heures j'ai passé à m'ennuyer à la suivre dans l'une d'entre elles. Si c'est votre truc, voici une chance de gagner de l'argent en vous rendant dans l'une d'entre elles.\n\nPar ailleurs, nous encourageons vivement les sous-traitants à se munir d'un <EM4>rayon tracteur portable</EM4>.\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordinateur Logistique\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 3/7\n<EM4>Rep:</EM4> +500
Covalex_HaulCargo_AToB_Stanton_Interstellar=Hé,\n\nça vous intéresse de faire partie d'une course interstellaire de Stanton ? \n\nIl y a un chargement de <EM4>~mission(Item)</EM4> qui attend dans des conteneurs de <EM4>~mission(MissionMaxSCUSize)</EM4> ou moins d'être pris dans un monte-charge à <EM4>~mission(Location|Address)</EM4> et livré à un monte-charge à <EM4>~mission(Destination|address)</EM4>. Inutile d'aller plus loin. J'ai quelqu'un d'autre de prévu pour l'acheminer jusqu'à sa destination finale. \n\nPar ailleurs, nous encourageons vivement les sous-traitants à se munir d'un <EM4>rayon tracteur portable</EM4>.\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordinateur Logistique\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +2,000
Covalex_HaulCargo_AToB_title=~mission(ReputationRank) - ~mission(CargoGradeToken) Transport de Fret Direct <EM4>[BP?]</EM4> <EM4>[50–4,000 Rep]</EM4>
Covalex_HaulCargo_AtoB_desc_DeliverAll=Hello, \n\nVoici le problème : j'ai besoin de quelqu'un de compétent pour une mission spéciale. Nous avons un client important qui menace de nous quitter, car ses livraisons sont régulièrement incomplètes. Il exige que 100 % de la cargaison soit livrée lors de cette mission, sinon il ne paiera pas. Comme cela s'est produit avant mon arrivée et que mon supérieur souhaite montrer que cela ne se reproduira plus, ils ont accepté cette condition. Quoi qu'il en soit, je pense que vous seriez la personne idéale pour cette mission. \n\nSi vous êtes prêt à prendre ce risque, voici tous les détails pertinents. La cargaison peut être récupérée à <EM4>~mission(Location|Address)</EM4> et livrée à <EM4>~mission(Destination|Address)</EM4>. Il semble que le plus grand conteneur que vous aurez à manipuler soit de <EM4>~mission(MissionMaxSCUSize)</EM4>, alors assurez-vous d'apporter un vaisseau suffisamment grand et un <EM4>rayon tracteur portable</EM4> pour vous aider à déplacer ces conteneurs. \n\n~mission(Contractor|SignOff)\n\nElla Tieno\nCoordinatrice Logistique Jr.\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-A] Palisade\n- [IND-S2-A] Rampart\n- [IND-S3-A] Parapet\n- [MIL-S1-A] VK-00\n- [MIL-S1-B] Siren\n- [MIL-S2-A] XL-1\n- [MIL-S2-B] Yeager\n- [MIL-S3-A] TS-2\n- [MIL-S3-B] Balandin\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x24\n<EM4>Blueprint Reward:</EM4> Guaranteed
Covalex_HaulCargo_AtoB_desc_FromLevski=Bonjour, \n\nl'Alliance du Peuple nous a engagés pour transporter une cargaison de Levski à <EM4>~mission(Destination|Address)</EM4>. Honnêtement, je suis surpris qu'ils exportent certaines de ces marchandises, mais j'imagine qu'ils doivent vendre quelque chose pour pouvoir se permettre d'importer tout ce qu'ils importent. \n\nPour le transport, vous aurez besoin d'un vaisseau pouvant contenir <EM4>~mission(MissionMaxSCUSize) conteneurs</EM4> et d'un <EM4>rayon tracteur portable</EM4> pour manipuler les conteneurs. Ça devrait suffire. \n\n~mission(Contractor|SignOff)\n\nElla Tieno\nCoordinatrice Logistique Jr.\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-A] Palisade\n- [IND-S2-A] Rampart\n- [IND-S3-A] Parapet\n- [MIL-S1-A] VK-00\n- [MIL-S1-B] Siren\n- [MIL-S2-A] XL-1\n- [MIL-S2-B] Yeager\n- [MIL-S3-A] TS-2\n- [MIL-S3-B] Balandin\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x24\n<EM4>Blueprint Reward:</EM4> Guaranteed
Covalex_HaulCargo_AtoB_desc_FromRuinStation=Hé, c'est El. \n\nJ'ai un client à <EM4>~mission(Location|Address)</EM4> qui a besoin que sa cargaison soit récupérée à Ruin Station. Il attend depuis un certain temps et commence à s'impatienter. Pourriez-vous vous en occuper pour nous ? \n\nVous aurez besoin d'un vaisseau pouvant transporter <EM4>conteneurs de fret de ~mission(MissionMaxSCUSize) </EM4> et d'un <EM4>rayon tracteur portable</EM4> pour les déplacer.\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nCoordinatrice Logistique Jr.\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-A] Palisade\n- [IND-S2-A] Rampart\n- [IND-S3-A] Parapet\n- [MIL-S1-A] VK-00\n- [MIL-S1-B] Siren\n- [MIL-S2-A] XL-1\n- [MIL-S2-B] Yeager\n- [MIL-S3-A] TS-2\n- [MIL-S3-B] Balandin\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x24\n<EM4>Blueprint Reward:</EM4> Guaranteed
Covalex_HaulCargo_AtoB_desc_ProcessedFood_Stanton2=Bonjour, \n\nIl semblerait qu'Orison ait besoin d'un nouveau réapprovisionnement en aliments transformés et en glace pressurisée. Ces produits sont livrés selon un délais de livraison standard, mais ils viennent de demander une livraison dès que possible.  \n\nÊtes-vous disponible pour faire la course ? La marchandise (<EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4> maximum) attend d'être récupérée dans un monte-charge à <EM4>~mission(Location|Address)</EM4>. Vous devriez pouvoir vous rendre rapidement et facilement à un monte-charge situé à <EM4>~mission(Destination|Address)</EM4>. \n\nPar ailleurs, nous encourageons vivement les sous-traitants à se munir d'un <EM4>rayon tracteur portable</EM4>.\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordinateur Logistique\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +2,000
Covalex_HaulCargo_AtoB_desc_RawOre_Stanton1=Hé,\n\nUn responsable logistique d'Hurston vient de demander un ramassage prioritaire à leur installation. On dirait qu'ils ont découvert un nouveau filon de minerai et qu'ils ont besoin de faire de la place pour ce qu'ils extraient.\n\nLe minerai brut doit être déplacé d'un monte-charge à <EM4>~mission(Location|Address)</EM4> à un monte-charge à <EM4>~mission(Destination|Address)</EM4>. Il s'agira de conteneurs de <EM4>~mission(MissionMaxSCUSize)</EM4> maximum. Vous avez l'air de pouvoir vous en occuper ? \n\nPar ailleurs, nous encourageons vivement les sous-traitants à se munir d'un <EM4>rayon tracteur portable</EM4>.\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordinateur Logistique\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 3/7\n<EM4>Rep:</EM4> +500
Covalex_HaulCargo_AtoB_desc_RefinedOre_Stanton4=Bonjour, \n\n<EM4>~mission(Destination|Address)</EM4> a besoin d'une livraison de minerai raffiné pour faire tourner ses lignes de production. La cargaison (<EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4> maximum) est prête et attend d'être récupérée dans un monte-charge à <EM4>~mission(Location|address)</EM4>. Y a-t-il une chance que vous soyez disponible pour aller la chercher et la livrer à un monte-charge à ~mission(Destination)\n\nPar ailleurs, nous encourageons vivement les sous-traitants à se munir d'un <EM4>rayon tracteur portable</EM4>.\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordinateur Logistique\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +50
Covalex_HaulCargo_AtoB_desc_ScrapWaste_Stanton3=Hé, \n\nIl y a un tas de ferraille et de déchets qui attendent dans un monte-charge à <EM4>~mission(Location|Address)</EM4> et qui doivent aller dans un monte-charge à <EM4>~mission(Destination|Address)</EM4> pour être triés. Je sais qu'ArcCorp a lancé une initiative visant à réduire les déchets et à recycler plus de ferraille sur la planète, mais je n'ai pas encore constaté de diminution de ce type de transport de leur part.\n\nÊtes-vous disponible pour transporter ce lot de déchets variée (<EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4> maximum) hors de la planète pour eux ?\n\nPar ailleurs, nous encourageons vivement les sous-traitants à se munir d'un <EM4>rayon tracteur portable</EM4>.\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordinateur Logistique\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée.Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +50
Covalex_HaulCargo_AtoB_desc_ToLevski=Bonjour, \n\nIl y a un chargement à <EM4>~mission(Location|Address)</EM4> qui doit être transporté à Levski. L'Alliance du Peuple a une commande régulière pour ces marchandises, car elle en a désespérément besoin, mais elles ne sont pas faciles à trouver dans Nyx. C'est drôle qu'ils ne veuillent pas faire partie de l'UEE, mais qu'ils comptent quand même sur nous pour leur survie.  \n\nQuoi qu'il en soit, vous aurez besoin d'un <EM4>rayon tracteur portable</EM4> et d'un vaisseau pouvant transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4> pour mener à bien cette mission. \n\n~mission(Contractor|SignOff) \n\nElla Tieno\nCoordinatrice Logistique Jr.\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-A] Palisade\n- [IND-S2-A] Rampart\n- [IND-S3-A] Parapet\n- [MIL-S1-A] VK-00\n- [MIL-S1-B] Siren\n- [MIL-S2-A] XL-1\n- [MIL-S2-B] Yeager\n- [MIL-S3-A] TS-2\n- [MIL-S3-B] Balandin\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x24\n<EM4>Blueprint Reward:</EM4> Guaranteed
Covalex_HaulCargo_AtoB_desc_ToRuinStation=Hello, \n\nJe cherche un transporteur prêt à faire un trajet jusqu'à Ruin Station. Je sais que les transports vers Pyro peuvent en faire hésiter certains, mais c'est un trajet que nous effectuons régulièrement pour approvisionner la station. J'ai également vérifié que tout ce qui figure sur le manifeste de cargaison est en règle. \n\nSi ça vous intéresse, la cargaison est prête à être récupérée à <EM4>~mission(Location|Address)</EM4>.  Assurez-vous d'avoir un <EM4>rayon tracteur portable</EM4> et un vaisseau capable de transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>, sinon ça risque d'être un peu difficile.\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nCoordinatrice Logistique Jr.\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-A] Palisade\n- [IND-S2-A] Rampart\n- [IND-S3-A] Parapet\n- [MIL-S1-A] VK-00\n- [MIL-S1-B] Siren\n- [MIL-S2-A] XL-1\n- [MIL-S2-B] Yeager\n- [MIL-S3-A] TS-2\n- [MIL-S3-B] Balandin\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x24\n<EM4>Blueprint Reward:</EM4> Guaranteed
Covalex_HaulCargo_MultiToSingle_Waste_Waste_Stanton1=Bonjour,\n\nJ'ai besoin que les déchets soient collectés à quelques endroits d'Hurston et ensuite emmenés à un monte-charge à <EM4>~mission(Destination|Address)</EM4>. Ne vous inquiétez pas, aucun des conteneurs n'est plus grand que <EM4>~mission(MissionMaxSCUSize)</EM4>.\n\nLIEUX D'ENLÈVEMENT (DANS N'IMPORTE QUEL ORDRE)\n\n~mission(MultiToSingleToken)\n\nFaits amusants pour vous. Hurston est la seule planète de Stanton qui ne trie pas ses déchets et sa ferraille. Un de leurs employés m'a dit que l'entreprise avait fait une analyse coût-bénéfice il y a plusieurs dizaines d'années et qu'elle avait conclu que cela ne valait pas la peine de mettre en place un système à l'échelle de la planète pour faciliter ce tri. N'est-ce pas là la chose la plus étonnante que Hurston ait jamais faite ?   \n\nPar ailleurs, nous encourageons vivement les sous-traitants à se munir d'un <EM4>rayon tracteur portable</EM4>.\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordinateur Logistique\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 3/7\n<EM4>Rep:</EM4> +2,000
Covalex_HaulCargo_MultiToSingle_desc_RawOre_Stanton1=Bonjour,\n\nHurston demande à ce que nous donnions la priorité aux ramassages dans les installations minières locales afin de libérer de l'espace pour ce qu'ils sont en train d'extraire. Voici les endroits où vous devez aller :  \n\nLIEUX D'ENLÈVEMENT (DANS N'IMPORTE QUEL ORDRE)\n\n~mission(MultiToSingleToken)\n\nUne fois collecté, tout doit être acheminé vers un monte-charge à <EM4>~mission(Destination|Address)</EM4>. Ils ont indiqué que tous les conteneurs ne dépasseront pas la taille de <EM4>~mission(MissionMaxSCUSize)</EM4>. Cela semble être quelque chose que vous pouvez gérer ? \n\nPar ailleurs, nous encourageons vivement les sous-traitants à se munir d'un <EM4>rayon tracteur portable</EM4>.\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordinateur Logistique\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 3/7\n<EM4>Rep:</EM4> +1,000
Covalex_HaulCargo_MultiToSingle_desc_ScrapWaste_Stanton3=Bonjour,\n\nIl y a quelques sites sur ArcCorp qui ont besoin que leurs déchets et leur ferraille soient collectés (toutes des boîtes de <EM4>~mission(MissionMaxSCUSize)</EM4> maximum) et amenés à un monte-charge à <EM4>~mission(Destination|Address)</EM4>. Peu importe l'ordre dans lequel vous effectuez la course, tant que vous récupérez tout.\n\nLIEUX D'ENLÈVEMENT (DANS N'IMPORTE QUEL ORDRE)\n\n~mission(MultiToSingleToken)\n\nVous savez, ma mère était une transporteuse spécialisée dans ce genre de missions. Ce n'est peut-être pas ce qu'il y a de plus prestigieux, mais elle prétendait que ces trajets avaient le meilleur rapport risque-prix. Les pirates ne lui ont jamais posé de problème quand ils ont découvert ce qu'il y avait à bord.  \n\nPar ailleurs, nous encourageons vivement les sous-traitants à se munir d'un <EM4>rayon tracteur portable</EM4>.\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordinateur Logistique\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 3/7\n<EM4>Rep:</EM4> +2,000
