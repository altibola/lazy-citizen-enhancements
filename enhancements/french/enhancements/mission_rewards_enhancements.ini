MTPS_eliminateall_dc_desc_001=À PROPOS DU JOB\nLe Service de protection de microtech est à la recherche d'un mercenaire professionnel soucieux du détail, capable de nous aider rapidement et en toute sécurité à éliminer le groupe de hors-la-loi qui a temporairement pris le contrôle de ~mission(Location) à ~mission(Location|Address).\n\nRESPONSABILITÉS\n• Assurer son propre transport jusqu'à ~mission(Location|Address).\n• Gérer tout occupants illégaux trouvés sur le site, en recourant à la force si nécessaire.\n\nQUALIFICATIONS MINIMUM\n• 2 années d'expérience dans le domaine du mercenariat et/ou de la sécurité.\n• Accès à de l'équipement de combat et à des moyens de transport.\n• Disponible pour un déploiement immédiat.\n\nSI POSSIBLE\n• Connaissance des Méthodes rapides de traitements des hostiles.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Juggernauts x2, Soldiers x12, Technicians x2
MTPS_eliminateall_dc_title_001=Élimination de Forces Hostiles <EM4>[500 Rep]</EM4>
MTPS_eliminateboss_dc_desc_001=À PROPOS DU JOB\nLe Service de protection de microtech recherche un chasseur de primes qualifié pour appréhender ~mission(TargetName) qui a jusqu'à présent réussi à échapper à la capture. Ils coordonnent un raid actif à ~mission(Location|Address), et nous pensons qu'ils peuvent finalement être attirés hors de leur cachette si leurs forces attaquant le ~mission(Location) sont confrontées à une résistance suffisamment forte.\n\nRESPONSABILITÉS\n• Assurer son propre transport jusqu'à ~mission(Location|Address).\n• Neutraliser les associés criminels de ~mission(TargetName) près de ~mission(Location) pour faire sortir la cible au grand jour.\n• Neutraliser ~mission(TargetName); utiliser la force si nécessaire.\n• Accès à de l'équipement de combat et à des moyens de transport.\n• Être disponible pour un déploiement immédiat.\n\nSI POSSIBLE\n• Gérer des situations sous haute pression.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x1, Soldiers x7, Technicians x5
MTPS_eliminateboss_dc_title_001=Appréhender la Prime : ~mission(TargetName) (CRE) <EM4>[500 Rep]</EM4>
MTPS_eliminateboss_multi_dc_desc_001=À PROPOS DU JOB\nLes services de protection de microTech recherche un chasseur de primes qualifié pour appréhender ~mission(TargetName) qui a jusqu'à présent réussi à échapper à la capture. Ils coordonnent un raid actif qui s'est étendu à l'ensemble de ~mission(Location|Address).  \n\nNous espérons que vous pourrez enfin les faire sortir de leur cachette si vous affrontez leurs forces à plusieurs points d'attaque différents. Leur nombre étant suffisamment affaibli, ~mission(TargetName|Last) risquera probablement d'être démasquée et vous pourrez l'affronter directement.\n\nRESPONSABILITÉS\n• Assurer son propre transport jusqu'à ~mission(Location|Address).\n•Confronter les associés criminels de ~mission(TargetName) afin d'amener la cible à se dévoiler.\n• Neutraliser ~mission(TargetName); utiliser la force si nécessaire.\n\nQUALIFICATIONS MINIMUM\n• Accès à de l'équipement de combat et à des moyens de transport.\n• Être disponible pour un déploiement immédiat.\n\QUALIFICATIONS RECOMMANDÉES\n• Capacité à gérer des situations sous haute pression.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Backup x5, Juggernauts x1, Soldiers x18, Technicians x32
MTPS_eliminateboss_multi_dc_title_001=Sécuriser la Prime: ~mission(TargetName) (CRTE) <EM4>[1,000 Rep]</EM4>
MTPS_eliminatespecific_dc_desc_001=DÉTAILS DE LA MISSION\nLe service de protection de MicroTech est à la recherche d'un chasseur de primes qualifié pour appréhender ~mission(TargetName) depuis ~mission(Location|Address). Ils ont été récemment repérés près de ~mission(Location) et on pense qu'ils sont toujours dans cette zone. \n\nBien que d'autres criminels puissent être actifs sur le site, vous devez vous concentrer sur l'obtention de la prime.\n\nMISSIONS\n• Assurer son déplacement jusqu'à ~mission(Location|Address).\n• Neutraliser ~mission(TargetName); en utilisant la force si nécessaire.\n\nQUALIFICATIONS MINIMALES\n• Accès à l'équipement de combat et au mode de transport.\n• Être disponible pour un déploiement immédiat.\n\nQUALIFICATION RECOMMANDÉE\n• Gérer des situations sous haute pression.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Juggernauts x1, Snipers x5, Soldiers x14
MTPS_eliminatespecific_dc_title_001=Prime Active : ~mission(TargetName) (CRM) <EM4>[500 Rep]</EM4>
MTPS_searchbody_danger_dc_desc_001=À PROPOS DU JOB\nLe Service de protection de Microtech est à la recherche d'un prestataire qualifié pour l'assister dans la recherche de ~mission(TargetName) qui a été vu pour la dernière fois près de ~mission(Location) à ~mission(Location|Address) mais dont on ne sait pas où il se trouve actuellement. \n\nNotre enquête préliminaire nous amène à penser qu'un acte criminel pourrait être à l'origine de leur disparition. Il convient donc de faire preuve d'une grande prudence, car des personnes hostiles  pourraient être impliqués.\n\nRESPONSABILITÉS\n• Assurer son propre transport jusqu'à ~mission(Location|Address).\n• Confirmer le lieu de ~mission(TargetName) et s'ils sont toujours en vie.\n\nQUALIFICATIONS MINIMUM\n• 2 ans d'expérience dans le domaine de la sécurité.\n• Être disponible pour un déploiement immédiat.\n\nSI POSSIBLE\n• Expérience de la conduite d'enquêtes sur les personnes disparues\n• Gérer des situations sous haute pression.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
MTPS_searchbody_dc_desc_001=À PROPOS DU JOB\nAprès avoir reçu un rapport signalant que ~mission(TargetName) est porté disparu, les Services de Protection de microTech recherchent un prestataire qualifié pour commencer une recherche à ~mission(Location|Address) afin de découvrir son emplacement actuel. La personne disparue a été vue pour la dernière fois en entrant dans ~mission(Location), il est donc recommandé de commencer la recherche par là.\n\nRESPONSABILITÉS\n• Assurer son propre transport vers ~mission(Location|address).\n• Confirmer la localisation de ~mission(TargetName) et s'il est toujours en vie.\n\nQUALIFICATIONS MINIMALES\n• 2 ans d'expérience en sécurité.\n• Disponible pour un déploiement immédiat.\n\nSI POSSIBLE\n• Expérience en matière d'enquêtes sur les personnes disparues.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
NTLockdown_FleetDestroy_Antagonist_MBroker_desc=Maintenant que Crusader a trouvé sa flotte, il semble que les Nine Tails réalisent enfin à quel point un peu d'aide est utile.\n\nPour la faire courte, ils cherchent des gros bras pour garder la flotte de Crusader à distance. Vous et tout les volontaires aller recevoir une prime pour chaque vaisseau de la sécurité que vous enverrez à la casse. \n\nEt en plus de ça, si vous parvenez à garder Crusader occupé assez longtemps pour que les Nine Tails finissent leurs magouilles avec ce blocus quantum, vous aurez un bonus bien juteux.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
NTLockdown_FleetDestroy_MBroker_desc=La Sécurité de Crusader a confirmé le lieu de la flotte pirate Nine Tails en cause et se mobilise pour mettre fin au blocus quantum de ~mission(Location).\n\nNous cherchons encore des professionnels formés à la sécurité pour se joindre a nos efforts de contre-attaque et aider à la neutralisation de cette menace extrême.\n\nAvant d'accepter, soyez conscient que les Nine Tails seront là en force et que tant que le blocus n'aura pas pris fin, aucun voyage quantum ne sera possible dans le secteur.\n\nCONTRAT AUTORISÉ PAR :\nDirecteur Sasha Rust\nID#122L964G\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +4,000
NTLockdown_FleetDestroy_MBroker_name=Blocus Illégal - Neutralisation de la Flotte Nine Tails <EM4>[4,000 Rep]</EM4>
NTLockdown_FleetFind_Antagonist_MBroker_desc=J'ai dit aux Nine Tails que bloquer le voyage quantum pour prendre en otage toute une zone allait attirer le mauvais type d'attention, mais est-ce qu'ils m'écoutent ? Non. Maintenant, Crusader a des dizaines de vaisseaux de Reconnaissance qui mettent leur nez dans des choses que je préférerais voir cachées. \n\nC'est pourquoi j'essaie d'embaucher autant de personnes que possible pour m'aider. Je veux vous payer pour chaque vaisseau de reconnaissance Crusader que vous éliminerez. \n\nEn fait, j'augmenterai même votre tarif par vaisseau si vous réussissez tous un certain nombre de victimes. Appelez cela une incitation à la performance.\n\nEt si vous vous sentez vraiment comme un sur-performeur, éliminez tous les imbéciles assez courageux pour essayer d'acheminer des marchandises jusqu'à la station bloquée. J'ai des fournisseurs qui apprécieront la demande supplémentaire.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
NTLockdown_FleetFind_MBroker_desc=La Sécurité de Crusader vient d'apprendre qu'une organisation criminelle connu sous le nom de Nine Tails a déployé un blocus illégal autour de ~mission(Location) et bloque tout transit quantum en provenance et vers le secteur concerné.\n\nLa flotte pirate doit être localisé et le blocus dispersé.\n\nNous demandons urgemment l'assistance de tout professionnel formé à la sécurité dans le système pour se joindre aux forces de la Sécurité de Crusader et protéger nos vaisseaux de reconnaissance pendant qu'ils tentent de trouver la position de la flotte des Nine Tails responsable du blocus .\n\nNous vous prions de garder à l'esprit que les sauts quantum sont désactivés et que les forces hostiles en présence seront en grand nombre. Ceci est une opération à haut risque. Un équipement approprié ainsi que des réserves conséquentes de carburant sont fortement recommandées pour tout pilote se joignant a l'effort. \n\nCONTRAT AUTORISÉ PAR :\nDirecteur Sasha Rust\n ID# 122L964G\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +4,000
NTLockdown_FleetFind_MBroker_name=Blocus Illégal - Recherche de Responsable de la Flotte Nine Tails <EM4>[4,000 Rep]</EM4>
NTLockdown_StationSupply_MBroker_desc=Le blocus quantum illégal de ~mission(Location) a interrompu les routes commerciales et des ressources indispensables sont presque épuisées.\n\nLa Sécurité de Crusader cherche des marchands et transporteurs pour subvenir à la forte demande de fournitures médicales provenant de la station. \n\nL'administration de la station a ajusté les prix de revente au vue de la situation avec les Nine Tails, de plus, Crusader s'engage a fournir une prime de risque pour chaque transfert de fournitures médicales fructueux dû aux risque accrus.\n\nMerci d'avance pour votre support en ces temps difficiles.\n\nCONTRAT AUTORISÉ PAR :\nDirecteur Sasha Rust ID# 122L964G\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
NorthRock_Delivery_Local_DerelictOutpost_Desc_01=Voici le deal : l'un de nos clients (qui aurait dû dépenser des crédits supplémentaires pour une escorte Northrock) a eu l'un de ses vaisseaux attaqués, et maintenant ils ont besoin de nous pour mener une opération de récupération d'un colis important qui a été volé.\n\nHeureusement, nous avons eu de la chance et avons pu localiser les responsables jusqu'à <EM4>~mission(Pickup1|Address)</EM4>. Nous avons besoin que vous vous y rendiez et récupériez le colis. Vous pourrez l'identifier par son numéro de série : <EM4>#~mission(Item1|SerialNumber)</EM4>.\n\nJe m'attends à ce que les hors-la-loi résistent, mais rappelez-vous qu'ils ne sont pas la priorité.\n\nUne fois que vous aurez le colis, ramenez-le au client à <EM4>~mission(Dropoff1|Address)</EM4>. \n\nUne dernière chose, assurez-vous d'apporter un vaisseau qui a assez de place pour une cargaison. Nous ne voulons pas que vous fassiez tout ce chemin avec un Gladius ou je ne sais quoi pour faire demi-tour une fois sur place.\n\nFaites-nous honneur,\n\nBraden Corchado\nAgent Logistique - Succursale de Stanton\nNorthrock Service Group\n\n*RÉSUMÉ DE L'OPÉRATION DE RÉCUPÉRATION*\n* Récupérer le Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Pickup1|Address)</EM4>\n* Livrer à <EM4>~mission(Dropoff1|Address)</EM4>\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
NorthRock_Delivery_Local_DerelictOutpost_Desc_02=Voici le deal : l'un de nos clients (qui aurait dû dépenser des crédits supplémentaires pour une escorte Northrock) a eu l'un de ses vaisseaux attaqués, et maintenant ils ont besoin que nous prenions la tête d'une opération de récupération pour des colis importants qui ont été volés.\n\nHeureusement, nous avons eu de la chance et avons pu localiser les responsables jusqu'à  <EM4>~mission(Pickup1|Address)</EM4>. Nous avons besoin que vous vous y rendiez et récupériez les colis. Vous pourrez les identifier grâce à leurs numéros de série : <EM4>#~mission(Item1|SerialNumber)</EM4>,\n<EM4>#~mission(Item2|SerialNumber)</EM4> et\n<EM4>#~mission(Item3|SerialNumber)</EM4>.\n\nJe m'attends à ce que les hors-la-loi résistent, mais rappelez-vous qu'ils ne sont pas la priorité.\n\nUne fois que vous aurez les colis, livrez-les à leurs destinations respectives : <EM4>~mission(Dropoff1|Address)</EM4>, <EM4>~mission(Dropoff2|Address)</EM4> et <EM4>~mission(Dropoff3|Address)</EM4>. \n\nUne dernière chose, assurez-vous d'avoir un vaisseau qui a assez de place pour la cargaison. Nous ne voulons pas que vous fassiez tout ce chemin avec un Gladius ou je ne sais quoi pour faire demi-tour une fois sur place.\n\nFaites-nous honneur,\n\nBraden Corchado\nAgent Logistique - Succursale de Stanton\nNorthrock Service Group\n\n*RÉSUMÉ DE L'OPÉRATION DE RÉCUPÉRATION*\n* Récupérer les Colis <EM4>#~mission(Item1|SerialNumber)</EM4>, <EM4>#~mission(Item2|SerialNumber)</EM4> et <EM4>#~mission(Item3|SerialNumber)</EM4> depuis <EM4>~mission(Pickup1|Address)</EM4>\n* Livrer à <EM4>~mission(Dropoff1|Address)</EM4>, <EM4>~mission(Dropoff2|Address)</EM4> et<EM4>~mission(Dropoff3|Address)</EM4>\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
NorthRock_Delivery_Local_DerelictOutpost_Desc_03=Voici le deal : un de nos clients (qui aurait dû dépenser des crédits supplémentaires pour une escorte Northrock) a été victime d'une attaque sur un de ses vaisseaux. Maintenant, il a besoin de notre aide pour récupérer des colis importants qu'on lui a volés.\n\nHeureusement, nous avons eu de la chance et avons pu retrouver les responsables dans différents avant-postes abandonnés. Nous avons besoin que vous vous y rendiez pour récupérer les colis. Vous pourrez les identifier grâce à leurs numéros de série : <EM4>#~mission(Item1|SerialNumber)</EM4>, <EM4>#~mission(Item2|SerialNumber)</EM4> et <EM4>#~mission(Item3|SerialNumber)</EM4>.\n\nJe m'attends à ce que les hors-la-loi résistent, mais n'oubliez pas qu'ils ne sont pas la priorité.\n\nAprès avoir récupéré les colis, assurez-vous de les ramener au client à <EM4>~mission(Dropoff1|Address)</EM4>. \n\nUne dernière chose, assurez-vous d'avoir un vaisseau qui a assez de place pour la cargaison. Nous ne voulons pas que vous fassiez tout ce chemin avec un Gladius ou je ne sais quoi pour faire demi-tour une fois sur place.\n\nFaites-nous honneur,\n\nBraden Corchado\nAgent Logistique - Succursale Stanton\nNorthrock Service Group\n\n*RÉSUMÉ DE L'OPÉRATION DE RÉCUPÉRATION*\n* Récupérer les Colis <EM4>#~mission(Item1|SerialNumber)</EM4>, <EM4>#~mission(Item2|SerialNumber)</EM4> et <EM4>#~mission(Item3|SerialNumber)</EM4> depuis <EM4>~mission(Pickup1|Address)</EM4>\n* Livrer à <EM4>~mission(Dropoff1|Address)</EM4>\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
