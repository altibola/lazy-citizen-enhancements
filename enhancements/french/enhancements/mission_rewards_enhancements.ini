mg_miles_capturegang_complete_desc=\nTous les membres importants du gang d'Arlington sont maintenant derrière les barreaux et leur gang criminel est hors d'état de nuire. \n\nC'était un coup de filet assez impressionnant. Bon travail.\n\n-Miles\n\nMiles Eckhart\nFondateur & PDG\nEckhart Security, LLC.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
mg_miles_capturegang_desc_001=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT  : Mandat de Groupe\nSTATUT DU PRESTATAIRE : Indépendant\nCode d'approbation : = ~mission(Contractor|ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\n*********\n__Informations Générales__\nUn mandat de groupe a été émis à l'encontre du célèbre gang de voleurs de vaisseaux d'Arlington après leur récente tentative effrontée de vol d'un Idris dans un chantier de réparation. Le vol a été stoppé, mais les membres du groupe se sont dispersés dans le vide spatial. Eckhart Security a reçu la prime pour la capture immédiate de tous les membres de haut niveau du gang : Maltrox Arlington, Kass Dent, Nicks Cantwell, Sam 'Weepy' Arlington, Oslo Arlington et Les Arlington.\n*********\n\nUne communication anonyme nous a appris que Les Arlington, l'enfant du chef de gang Maltrox Arlington, avait été aperçu en train de prendre une livraison dans un centre de transfert de Covalex. Nous vous fournirons les coordonnées de l'endroit où nous pensons qu'ils se trouvent actuellement.\n\nCe pilote 'Les' est un expérimenté qui vole depuis presque aussi longtemps qu'il marche et qui sert généralement de pilote de fuite au gang. Il peut être utile d'apporter des vaisseaux de soutien supplémentaires afin de couper court à toute tentative d'évasion.\n\nVous êtes autorisé à utiliser toute la force nécessaire pour neutraliser la cible.\n\nLe paiement sera effectué à l'achèvement du contrat.\n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
mg_miles_capturegang_desc_002=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT  : Mandat de Groupe\nSTATUT DU PRESTATAIRE : Indépendant\nCode d'approbation : = ~mission(Contractor|ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\n*********\n__Informations Générales__\nUn mandat de groupe a été émis à l'encontre du célèbre gang de voleurs de vaisseaux d'Arlington après leur récente tentative effrontée de vol d'un Idris dans un chantier de réparation. Le vol a été stoppé, mais les membres du groupe se sont dispersés dans le vide spatial. Eckhart Security a reçu la prime pour la capture immédiate de tous les membres de haut niveau du gang : Maltrox Arlington, Kass Dent, Nicks Cantwell, Sam 'Weepy' Arlington, Oslo Arlington et Les Arlington.\n*********\n\nNous avons appris que Nicks Cantwell, connaissance de longue date et confident de Maltrox Arlington, a été repéré alors qu'il tentait d'acheter un laser de minage à haute densité, du type de ceux fréquemment utilisés dans les tentatives passées de ship-jacking pour ouvrir des brèches stratégiques dans les coques. Nous avons fourni les coordonnées de la dernière position connue de Nicks.Nicks est un expert en munitions très apprécié dans les milieux criminels et laisse souvent un chemin de destruction dans son sillage. Il est conseillé d'augmenter la puissance de feu lors de cette rencontre.\n\nVous êtes autorisé à utiliser toute la force nécessaire pour neutraliser la cible.\n\nLe paiement sera effectué à l'achèvement du contrat.\n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1
mg_miles_capturegang_desc_003=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT  : Mandat de Groupe\nSTATUT DU PRESTATAIRE : Indépendant\nCode d'approbation : = ~mission(Contractor|ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\n*********\n__Informations Générales__\nUn mandat de groupe a été émis à l'encontre du célèbre gang de voleurs de vaisseaux d'Arlington après leur récente tentative effrontée de vol d'un Idris dans un chantier de réparation. Le vol a été stoppé, mais les membres du groupe se sont dispersés dans le vide spatial. Eckhart Security a reçu la prime pour la capture immédiate de tous les membres de haut niveau du gang : Maltrox Arlington, Kass Dent, Nicks Cantwell, Sam 'Weepy' Arlington, Oslo Arlington et Les Arlington.\n*********\n\nSam 'Weepy' Arlington a été repéré par les systèmes de sécurité automatisés d'une station de restauration et de repos (R&R) après avoir été impliqué dans une bagarre d'ivrognes. Weepy a pu quitter la station avant l'arrivée des équipes d'intervention, mais nous avons réussi à le localiser jusqu'à l'endroit où nous pensons qu'il se cache actuellement.\n\nWeepy est l'oncle du chef de gang Maltrox Arlington et son principal homme de main. Ses problèmes de colère, combinés à un long passé de toxicomanie, font de lui un véritable joker. Attendez-vous à ce qu'il oppose une forte résistance lorsqu'il sera acculé par vous et vos forces rassemblées.\n\nVous êtes autorisé à utiliser toute la force nécessaire pour neutraliser la cible.\n\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x2, Targets x1
mg_miles_capturegang_desc_004=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Mandat de groupe\nSTATUT DU PRESTATAIRE : Independent\nCode d'approbation : = ~mission(Contractor|ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\n*********\n__Informations sur les antécédents__\nUn mandat d'arrêt collectif a été émis à l'encontre du célèbre gang de voleurs de vaisseaux d'Arlington après leur récente tentative de vol effrontée d'un Idris dans un chantier de réparation. Bien que le vol ait été arrêté, les membres du groupe se sont dispersés dans le vide de l'espace. Eckhart Security a reçu une prime pour la capture immédiate de tous les membres du gang de haut niveau : Maltrox Arlington, Kass Dent, Nicks Cantwell, Sam ‘Weepy’ Arlington, Oslo Arlington, et Les Arlington.\n*********\n\nRécemment, un terminal de sécurité a été piraté à l'aide d'une Crypto-Clé unique et personnalisée qui avait été utilisée lors d'un hold-up l'année dernière par Oslo Arlington, le plus jeune frère du chef de gang Maltrox Arlington. Bien que nous ne soyons pas en mesure de confirmer avec certitude si le terminal a été piraté par Oslo ou non, nous pensons que cela vaut la peine d'enquêter.\n\nExtrêmement intelligent, doué pour la technologie et stratège de renom, Oslo s'est révélé difficile à capturer par le passé. Si cette piste permet de trouver Oslo, une équipe d'intervention tactique bien coordonnée serait un atout pour la réussite de l'opération.\n\nVous êtes autorisé à utiliser tout type forces nécessaires pour neutraliser la cible.\n\nLe paiement sera effectué à l'achèvement du contrat.\n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
mg_miles_capturegang_desc_005=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT  : Mandat de Groupe\nSTATUT DU PRESTATAIRE : Indépendant\nCode d'approbation : = ~mission(Contractor|ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\n*********\n__Informations Générales__\nUn mandat de groupe a été émis à l'encontre du célèbre gang de voleurs de vaisseaux d'Arlington après leur récente tentative effrontée de vol d'un Idris dans un chantier de réparation. Le vol a été stoppé, mais les membres du groupe se sont dispersés dans le vide spatial. Eckhart Security a reçu la prime pour la capture immédiate de tous les membres de haut niveau du gang : Maltrox Arlington, Kass Dent, Nicks Cantwell, Sam 'Weepy' Arlington, Oslo Arlington et Les Arlington.\n*********\n\nDeux gardiens de banque ont été portés disparus la semaine dernière. Il y a quelques heures, leurs corps ont été retrouvés dans un tas d'ordures à Magnus, avec leurs données biométriques volées. Heureusement, une caméra de sécurité d'un chariot élévateur situé à proximité a filmé l'abandon des corps. La reconnaissance faciale a permis d'identifier Kass Dent, partenaire romantique de Maltrox Arlington et parent des Arlington. En utilisant la vidéo pour construire une chronologie, nous avons fourni les coordonnées de l'endroit où l'on pense que Kass se cache actuellement.\n\nKass est soupçonné d'une longue liste de meurtres, les deux derniers étant les plus récents. Nous vous recommandons de n'emmener que des ailiers hautement qualifiés afin de limiter le nombre de victimes.  \n\nVous êtes autorisé à utiliser toute la force nécessaire pour neutraliser la cible.\n\nLe paiement sera effectué à l'achèvement du contrat.\n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1
mg_miles_capturegang_desc_006=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT  : Mandat de Groupe\nSTATUT DU PRESTATAIRE : Indépendant\nCode d'approbation : = ~mission(Contractor|ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\n*********\n__Informations Générales__\nUn mandat de groupe a été émis à l'encontre du célèbre gang de voleurs de vaisseaux d'Arlington après leur récente tentative effrontée de vol d'un Idris dans un chantier de réparation. Le vol a été stoppé, mais les membres du groupe se sont dispersés dans le vide spatial. Eckhart Security a reçu la prime pour la capture immédiate de tous les membres de haut niveau du gang : Maltrox Arlington, Kass Dent, Nicks Cantwell, Sam 'Weepy' Arlington, Oslo Arlington et Les Arlington.\n*********\n\nMaltrox Arlington s'est fait discret ces derniers temps, mais nous pensons qu'il est sorti de sa cachette. Une patrouille était en train de se ravitailler dans une station quand un de ses vaisseaux a été attaqué. Maltrox est le suspect le plus probable. Bien que la balise ait été temporairement désactivée, nous avons pu tracer la signature quantum du vaisseau et nous vous avons fourni ces coordonnées. Criminel de troisième génération, le gang d'Arlington est sous la direction de Maltrox depuis six ans. Attention, il s'agit d'une cible intelligente, agressive et très dangereuse. Plus vous mettrez de ressources à contribution, plus nous aurons de chances d'arrêter Maltrox une fois pour toutes.\n\nVous êtes autorisé à utiliser toute la force nécessaire pour neutraliser la cible.\n\nLe paiement sera effectué à l'achèvement du contrat.\n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1
mg_miles_capturegang_desc_idris=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT  : Mandat de Groupe\nSTATUT DU PRESTATAIRE : Indépendant\nCode d'approbation : = ~mission(Contractor|ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\nIl semble que la deuxième fois soit la bonne pour le gang Arlington. Après une première tentative infructueuse, la famille criminelle récemment évadée a réussi à récupérer un Idris dans un chantier de réparation. Nous savons maintenant à quoi servaient le laser de minage et les données biométriques qu'ils ont volés.\n\nComme nous avons réussi à les capturer la première fois, Eckhart Security a reçu un mandat d'arrêt contre le gang. Il faudra une puissance de feu considérable pour abattre un vaisseau capital de cette capacité.\n\nVous êtes autorisés à utiliser toute la force nécessaire pour retrouver les Idris et neutraliser le gang.\n\nLe paiement sera effectué à l'achèvement du contrat.\n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 5/7\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1
