Foxwell_X2_AttackIdris_Desc=Nous avons localisé un Idris de XenoThreat, accompagné de chasseurs, à <EM4>~mission(Location|Address)</EM4>. Leurs communications sont chaotiques. D'après les échanges radio, le commandant est à bord de l'Idris. Je ne me souviens pas de la dernière fois où nous l'avons localisé aussi précisément. Ça pourrait être l'occasion de démanteler toute l'opération. \n\nÇa vous dit ?\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 7/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Defenders x10, Targets x1\n<EM4>Neutral:</EM4> +120,000 Rep
Foxwell_X2_AttackIdris_Title=Cible : Groupe d'assaut XenoThreat <EM4>[120,000 Rep]</EM4>
Foxwell_X2_DrawOutBoss_Desc=Nous avons intercepté une balise de localisation indiquant que <EM4>~mission(TargetName)</EM4> et son escadre d'attaque personnelle se trouvent à <EM4>~mission(Location|Address)</EM4>. Il compte parmi les hommes de main les plus brutaux de XenoThreat depuis la création de l'organisation.\n\n<EM4>~mission(TargetName|Last)</EM4> n'est pas du genre à reculer devant un combat, alors frappez ses vaisseaux avec suffisamment de force et de dégâts : il ne pourra pas s'empêcher de se joindre à l'action. Une fois à découvert, ce sera votre cible principale.\n\nPrêt ?\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x32\n<EM4>Neutral:</EM4> +8,400 Rep
Foxwell_X2_DrawOutBoss_Title=Éliminer un homme de main de XenoThreat <EM4>[8,400 Rep]</EM4>
Foxwell_X2_ShipAmbush_Desc=Nous avons reçu des renseignements fiables concernant la trajectoire de vol d'une unité d'attaque de XenoThreat. Nous recherchons des prestataires capables de se mettre en route immédiatement et de se positionner à <EM4>~mission(Location|Address)</EM4> avant son arrivée. Les conditions locales masqueront vos signatures radar, de sorte que vous pourrez leur réserver la surprise de leur vie. Faisons de ces chasseurs des proies.\n\nIntéressé ?\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Wave x7, Targets x1\n<EM4>Neutral:</EM4> +4,000 Rep
Foxwell_X2_ShipAmbush_Title=Embuscade contre une unité de XenoThreat <EM4>[4,000 Rep]</EM4>
Foxwell_X2_ShipDefend_Desc=Une balise de détresse a été émis depuis <EM4>~mission(Location|Address)</EM4>, signalant qu'un vaisseau est attaqué par XenoThreat. Le pilote indique que ses boucliers sont en train de céder et qu'il ne parvient pas à semer ses assaillants.\n\nLe vaisseau est un <EM4>~mission(Ship)</EM4>, mais le pilote est humain, ce qui, selon la logique tordue de XenoThreat, fait de lui un traître à l'humanité et une cible à abattre.\n\nNous recherchons des pilotes pour se rendre sur place et venir en aide à cette personne.\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +4,000 Rep
Foxwell_X2_ShipDefend_Title=Urgent - Vaisseau attaqué par XenoThreat <EM4>[4,000 Rep]</EM4>
Foxwell_X2_ShipWaves_Desc=De nombreux rapports font état d’un rassemblement de vaisseaux XenoThreat à <EM4>~mission(Location|Address)</EM4>\nNous recherchons des prestataires prêts à leur livrer bataille. \n\nIls veulent nous faire croire qu’ils ont le droit d’agir ainsi. Ils veulent nous faire croire qu’ils disposent d’une force écrasante. C’est l’occasion de leur montrer que nous ne sommes pas dupes.\n\nJe ne vais pas vous mentir, c’est bien plus qu’un simple contrat de sécurité pour moi. Je hais vraiment ces connards intolérants et tout ce qu'ils représentent.\n\nVous êtes partants ?,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x16\n<EM4>Neutral:</EM4> +3,800 Rep
Foxwell_X2_ShipWaves_Title=Détruire une unité XenoThreat <EM4>[3,800 Rep]</EM4>
Foxwell_bombingrun_E_desc_001=Nous venons de recevoir l'emplacement d'un avant-poste de hors-la-loi où se rassemblent des criminels montant en puissance. Notre client estime toutefois qu'il n'y a aucune raison d'affronter ces individus directement. Vous devrez plutôt vous attaquer à leurs lignes d'approvisionnement.\n\nDirigez-vous vers <EM4>~mission(Location|Address)</EM4> et détruisez leurs réserves de carburant tout en neutralisant la faible résistance qu'ils pourraient opposer. C'est à vous de décider de l'intensité de votre engagement face aux forces hostiles, mais n'oubliez pas que votre objectif principal est de rendre ces réservoirs de carburant inutilisables.\n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_bombingrun_E_title_001=Niveau Jaune : Perturber les Opérations <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_bombingrun_H_desc_001=Une occasion s'est présentée pour un client de prendre des mesures contre un groupe de criminels qui nuisent à ses affaires.\n\nD'après les informations disponibles, ce groupe de hors-la-loi se cache actuellement à <EM4>~mission(Location|Address)</EM4>. Le client estime que c'est le moment idéal pour les prendre au dépourvu et les traduire en justice. La mission consiste à détruire leurs réservoirs de carburant et à mettre un terme à leurs opérations de contrebande une bonne fois pour toutes.\n\nNe sous-estimez pas ces types. Vous feriez mieux de venir avec des renforts et de voler à basse altitude pour éviter les tourelles. Les réservoirs de carburant sont la priorité.\n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_bombingrun_H_title_001=Niveau Orange : Détruire une Infrastructure Hors-la-loi <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
Foxwell_bombingrun_M_desc_001=Nous recherchons un prestataire efficace pour une opération éclair. Un client nous a signalé que des voyous du coin se rassemblaient en nombre inquiétant et nous avons été chargés de perturber leur base.\n\nDirigez-vous vers <EM4>~mission(Location|Address)</EM4> et détruisez leurs réservoirs de carburant. Si vous réussissez, nous pourrons retarder leurs plans pendant un certain temps et, surtout, sans avoir à les affronter directement.\n\nLes rapports indiquent qu'il y a quelques vaisseaux et des tourelles de défense dans les parages. Concentrez-vous simplement sur les réservoirs de carburant et ça devrait aller.\n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_bombingrun_M_title_001=Niveau Orange : Neutraliser des Réserves de Carburant <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
Foxwell_bombingrun_S_desc_001=Nous recherchons une équipe de mercenaires hautement compétente pour effectuer une mission de démolition complexe pour le compte d'un client VIP.\n\nLes hors-la-loi opérant à <EM4>~mission(Location|Address)</EM4> ont été identifiés comme une menace de plus en plus préoccupante dans la région, et afin de remédier à cette situation, votre équipe est chargée de détruire les réservoirs de carburant sur place. \n\nCependant, ce ne sera pas aussi simple que de se faufiler et de repartir : attendez-vous à affronter de nombreux ennemis et des tourelles qui vous attendront. Plus votre équipe sera solide, meilleures seront vos chances de mener cette opération à bien.\n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_bombingrun_S_title_001=Niveau Rouge : Détruire une Infrastructure Hors-la-loi <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
Foxwell_bombingrun_VE_desc_001=Une bande de hors-la-loi harcèle notre client depuis un certain temps, et la situation a récemment pris une tournure dramatique. Ils se sont emparés de sa propriété et nous avons épuisé toutes les autres options.\n\nNous avons besoin d'un pilote compétent pour se rendre à <EM4>~mission(Location|Address)</EM4> et détruire leurs réservoirs de carburant. Si vous parvenez à couper leur approvisionnement, vous ouvrirez la voie au client pour qu'il reprenne possession de sa propriété.\n\nCette mission ne devrait pas être trop difficile. Vous pourriez croiser un ou deux vaisseaux et peut-être quelques tourelles, mais vous êtes autorisé à recourir à la force létale. Tout ce que nous vous demandons, c'est d'aller là-bas, de détruire les réservoirs de carburant et de repartir.\n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_bombingrun_VE_title_001=Niveau Jaune : Limiter une Menace Potentielle <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_bombingrun_VH_desc_001=Foxwell a été engagé par un client pour participer à une opération en plusieurs phases visant une base hors-la-loi connue située à <EM4>~mission(Location|Address)</EM4> et a besoin d'un pilote chevronné pour y prendre part.\n\nVous, ainsi que les renforts que vous aurez mobilisés, serez chargés de détruire les réservoirs de carburant qui s'y trouvent afin de préparer le terrain pour la suite de l'opération. \n\nMalheureusement, cet endroit grouille de vaisseaux et de tourelles antiaériennes. Assurez-vous donc que vous et votre équipe soyez prêts, et n'oubliez pas que les réservoirs de carburant sont votre priorité. Inutile de jouer les héros.\n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_bombingrun_VH_title_001=Niveau Rouge : Destruction de Réservoirs de Carburant <EM4>[BP]</EM4> <EM4>[250 Rep]</EM4>
GFS_ShipWaveAttack_Mission01_Desc=Vous souhaitez acquérir une expérience concrète et précieuse au combat contre divers adversaires et différentes situations ? Alors mon Épreuve de Combat pourrait bien être la solution idéale pour vous.\n\nCe cours s'adresse aux pilotes qui maîtrisent déjà les bases et qui sont prêts à passer au niveau supérieur. Si vous débutez et souhaitez apprendre les rudiments du pilotage, je vous recommande de passer quelques heures dans un simpod Arena Commander. Mais si vous êtes prêt à relever un vrai défi, je crois fermement que c'est en mettant la main à la pâte que l'on apprend le mieux. \n\nC'est pourquoi j'ai conçu ces huit scénarios de manière à ce qu'ils soient aussi réalistes que possible. Je vous promets que c'est ce qui se rapproche le plus de la formation au combat des pilotes de la Navy sans avoir à vous enrôler, alors ne vous attendez pas à être pris par la main. <EM4>Il convient de prendre très au sérieux les risques de blessures pour vous-même ou votre vaisseau.</EM4>\n\nSCÉNARIOS DE L'ÉPREUVE :\n1. Cibles uniques\n2. Cibles multiples\n3. Priorité des cibles\n4. Cibles furtives\n5. Missiles et contre-mesures\n6. Cibles multi-équipage\n7. Corvette avec escorte\n8. Rencontre avec un vaisseau capital\n\nSi vous êtes prêt à relever le défi et à prouver que vous avez l'étoffe d'un grand pilote, le premier scénario vous mettra aux prises avec une cible unique. Dirigez-vous vers <EM4>~mission(Location|Address)</EM4> pour commencer.\n\nEn bonus, si vous terminez le scénario avec succès, le détenteur initial du contrat recevra <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires</EM4> en récompense.\n\nASTUCES :\n- Conscience situationnelle – Ne vous concentrez pas trop sur une cible au point d'en oublier votre trajectoire. Il ne sert à rien d'éliminer l'ennemi si vous vous écrasez sur un astéroïde.\n\nBonne chance ! \nInstructeur Gilly    \n\n\nÀ PROPOS DE L'ÉCOLE DE PILOTAGE DE GILLY\nL'instructeur Lucas “Gilly” Baramsco a servi dans six escadrons et possède plus de dix ans d'expérience dans l'enseignement. Que vous soyez un élève sans aucune expérience de vol ou un professionnel souhaitant perfectionner ses compétences, l'École de Pilotage de Gilly propose une variété de cours pour “lancer votre carrière de pilote”. \n\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3
GFS_ShipWaveAttack_Mission01_Title=Épreuve de Combat - ScÉnario N°1
GFS_ShipWaveAttack_Mission02_Desc=Félicitations pour avoir terminé la première partie sur huit de ce cours.\n\nLe deuxième scénario se concentrera sur la manière de gérer plusieurs cibles en même temps. L'objectif ici est d'améliorer votre maîtrise de l'équilibre entre attaque et défense.   \n\nLorsque vous êtes prêt, prenez un vaisseau de combat et dirigez-vous vers <EM4>~mission(Location|Address)</EM4> pour commencer.\n\nEn bonus, si vous terminez le scénario avec succès, le détenteur initial du contrat recevra <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires</EM4> en récompense.\n\nASTUCES :\n- Choisissez votre adversaire - Lorsque vous êtes confronté à plusieurs cibles représentant une menace équivalente, la meilleure stratégie consiste à vous concentrer sur la neutralisation d'une cible à la fois afin de réduire progressivement le nombre de tirs ennemis.\n\nBonne chance ! \nInstructeur Gilly    \n\n\nÀ PROPOS DE L'ÉCOLE DE PILOTAGE DE GILLY  \nL'instructeur Lucas “Gilly” Baramsco a servi dans six escadrons et possède plus de dix ans d'expérience dans l'enseignement. Que vous soyez un élève sans aucune expérience de vol ou un professionnel souhaitant perfectionner ses compétences, l'École de Pilotage de Gilly propose une variété de cours pour “lancer votre carrière de pilote”.\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3
GFS_ShipWaveAttack_Mission02_Title=Épreuve de Combat - ScÉnario N°2
GFS_ShipWaveAttack_Mission03_Desc=Félicitations, vous avez terminé la deuxième partie sur huit de ce cours.   \n\nLe troisième scénario ajoute des considérations tactiques à l'équation. Cette fois-ci, les vaisseaux attaquants appartiennent à des classes distinctes avec chacune leurs propres capacités sur le champ de bataille. Il est essentiel de savoir quelles cibles privilégier pour survivre à des combats contre plusieurs vaisseaux.      \n\nLorsque vous êtes prêt, dirigez-vous vers <EM4>~mission(Location|Address)</EM4> pour commencer.\n\nEn bonus, si vous terminez le scénario avec succès, le détenteur initial du contrat recevra <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires</EM4> en récompense.\n\nASTUCES :\n- Plus c'est gros... – Essayez d'évaluer quelle menace est la plus dangereuse et éliminez-la en premier.\n - Boucliers – Si vous subissez d'importants dégâts, n'hésitez pas à vous éloigner pour laisser vos boucliers se régénérer.\n\nBonne chance ! \nInstructeur Gilly    \n\n\nÀ PROPOS DE L'ÉCOLE DE PILOTAGE DE GILLY  \nL'instructeur Lucas “Gilly” Baramsco a servi dans six escadrons et possède plus de dix ans d'expérience dans l'enseignement. Que vous soyez un élève sans aucune expérience de vol ou un professionnel souhaitant perfectionner ses compétences, l'École de Pilotage de Gilly propose une variété de cours pour “lancer votre carrière de pilote”.\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4
GFS_ShipWaveAttack_Mission03_Title=Épreuve de Combat - ScÉnario N°3
GFS_ShipWaveAttack_Mission04_Desc=Félicitations, vous avez terminé la troisième partie sur huit de ce cours.\n\nLes bons pilotes savent que toutes les menaces ne sont pas visibles. Ce sont souvent celles auxquelles on ne s'attend pas qui peuvent être les plus dévastatrices. Le quatrième scénario est axé sur la manière d'identifier et de faire face aux cibles furtives. Vous comprendrez ainsi à quel point votre radar est important pour déterminer à qui vous avez vraiment affaire. Attendez-vous à être pris en chasse par des vaisseaux normaux comme furtifs.    \n\nRendez-vous à <EM4>~mission(Location|Address)</EM4> lorsque vous êtes prêt, et n'oubliez pas de garder un œil sur votre radar.\n\nEn bonus, si vous terminez le scénario avec succès, le détenteur initial du contrat recevra <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires</EM4> en récompense.\n\nASTUCES :\n- Attaques surprises - En effectuant un ping autour de vous, il est parfois possible de révéler des vaisseaux cachés. Soyez prêt à faire face à des contacts inattendus.\n\nBonne chance ! \nInstructeur Gilly    \n\n\nÀ PROPOS DE L'ÉCOLE DE PILOTAGE DE GILLY  \nL'instructeur Lucas “Gilly” Baramsco a servi dans six escadrons et possède plus de dix ans d'expérience dans l'enseignement. Que vous soyez un élève sans aucune expérience de vol ou un professionnel souhaitant perfectionner ses compétences, l'École de Pilotage de Gilly propose une variété de cours pour “lancer votre carrière de pilote”.\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4
GFS_ShipWaveAttack_Mission04_Title=Épreuve de Combat - Scénario N°4
GFS_ShipWaveAttack_Mission05_Desc=Félicitations pour avoir terminé la quatrième partie sur huit de ce cours.   \n\nLe cinquième scénario se concentre sur les tactiques défensives. Il est essentiel pour votre survie de savoir quand adopter des manœuvres d'évasion et déployer des leurres ou des paillettes. C'est pourquoi les agresseurs de cet exercice seront équipés de missiles.   \n\nAssurez-vous que vos contre-mesures sont bien approvisionnées, puis rendez-vous à <EM4>~mission(Location|Address)</EM4> pour commencer.\n\nEn bonus, si vous terminez le scénario avec succès, le détenteur initial du contrat recevra <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires</EM4> en récompense.\n\nASTUCES :\n- Prêt au lancement - Un accès facile à vos leurres et paillettes peut être essentiel pour réussir à contrer les missiles ennemis. \n- Tenir bon et combattre - Résistez à la tentation d'utiliser la postcombustion pour vous échapper, car cela augmenterait votre signature et rendrait la tâche plus facile aux missiles. La plupart sont de toute façon beaucoup plus rapides que vous.\n- Rapprochez-vous – Même si cela semble contre-intuitif, se rapprocher d'un vaisseau ennemi peut être un avantage. Les missiles ont une portée minimale et si vous vous trouvez à l'intérieur de celle-ci, ils ne pourront pas vous verrouiller.\n\nBonne chance ! \nInstructeur Gilly    \n\n\nÀ PROPOS DE L'ÉCOLE DE PILOTAGE DE GILLY  \nL'instructeur Lucas “Gilly” Baramsco a servi dans six escadrons et possède plus de dix ans d'expérience dans l'enseignement. Que vous soyez un élève sans aucune expérience de vol ou un professionnel souhaitant perfectionner ses compétences, l'École de Pilotage de Gilly propose une variété de cours pour “lancer votre carrière de pilote”.\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4
GFS_ShipWaveAttack_Mission05_Title=Épreuve de Combat - ScÉnario N°5
GFS_ShipWaveAttack_Mission06_Desc=Félicitations, vous avez terminé la cinquième partie sur huit de ce cours.\n\nJe sors l'artillerie lourde pour le scénario six. Il est temps pour vous d'affronter des vaisseaux plus grands, multi-équipage, qui vous poseront de nouveaux défis. Non seulement vous devrez faire face à leur puissance de feu accrue, mais leurs boucliers aux multiples faces vous obligeront à viser continuellement une seule de ces faces pour infliger réellement des dégâts. Plus facile à dire qu'à faire lorsque vous vous déplacez tous à une telle vitesse.\n\nRejoignez <EM4>~mission(Location|Address)</EM4> lorsque vous serez prêt.\n\nEn bonus, si vous terminez le scénario avec succès, le détenteur initial du contrat recevra <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires</EM4> en récompense.\n\nASTUCES :\n- Avantage de taille – Lorsque vous affrontez un vaisseau plus grand, essayez de rester à l'écart de son avant, car c'est généralement là que se trouve la majorité de ses tirs offensifs.\n\nBonne chance ! \nInstructeur Gilly    \n\n\nÀ PROPOS DE L'ÉCOLE DE PILOTAGE DE GILLY  \nL'instructeur Lucas “Gilly” Baramsco a servi dans six escadrons et possède plus de dix ans d'expérience dans l'enseignement. Que vous soyez un élève sans aucune expérience de vol ou un professionnel souhaitant perfectionner ses compétences, l'École de Pilotage de Gilly propose une variété de cours pour “lancer votre carrière de pilote”.\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x3
GFS_ShipWaveAttack_Mission06_Title=Épreuve de Combat - ScÉnario N°6
GFS_ShipWaveAttack_Mission07_Desc=Félicitations, vous avez terminé la sixième partie de ce cours.\n\nVous avez accumulé beaucoup d'expérience au cours des six scénarios précédents, et il est maintenant temps de la mettre en pratique. Le septième scénario vous oppose à un vaisseau de classe corvette et à son escorte. Cette rencontre prolongée repoussera vos limites et mettra à l'épreuve tout ce que vous avez appris.   \n\nIl ne vous reste plus qu'à découvrir les limites de vos compétences. En d'autres termes, vous ne pouvez pas tout faire seul. Développer et entretenir des relations avec d'autres pilotes sur lesquels vous pouvez compter pour vous aider est vraiment la dernière pièce du puzzle. Je ne dis pas que vous ne pouvez pas surmonter des situations de ce genre par vous-même, mais même la Navy n'envoie pas ses pilotes d'élite en patrouille seuls.    \n\nUne fois que vous avez décidé de faire cavalier seul ou d'appeler des renforts, rendez-vous à <EM4>~mission(Location|Address)</EM4> pour donner le coup d'envoi de la rencontre.\n\nEn bonus, si vous terminez le scénario avec succès, le détenteur initial du contrat recevra <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires</EM4> en récompense.\n\nASTUCES :\n- L'union fait la force – Réfléchissez aux rôles que vos alliés vont jouer et choisissez soigneusement ceux que vous allez emmener avec vous afin d'équilibrer les forces et les faiblesses. Vous aurez besoin de vaisseaux capables d'affronter la corvette pendant que les autres s'occupent de l'escorte.\n\nBonne chance ! \nInstructeur Gilly    \n\n\nÀ PROPOS DE L'ÉCOLE DE PILOTAGE DE GILLY  \nL'instructeur Lucas “Gilly” Baramsco a servi dans six escadrons et possède plus de dix ans d'expérience dans l'enseignement. Que vous soyez un élève sans aucune expérience de vol ou un professionnel souhaitant perfectionner ses compétences, l'École de Pilotage de Gilly propose une variété de cours pour “lancer votre carrière de pilote”.\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x4
GFS_ShipWaveAttack_Mission07_Title=Épreuve de Combat - ScÉnario N°7
GFS_ShipWaveAttack_Mission08_Desc=Bienvenue dans le dernier scénario de l'Épreuve de Combat.\n\nTout au long de ce cours, vous avez pu découvrir les tactiques de combat et de défense avancées nécessaires pour survivre à diverses rencontres. Il est temps de mettre en pratique toutes ces nouvelles compétences et connaissances, et de voir comment elles résistent face à un grand vaisseau capital et plusieurs vaisseaux d'escorte.\n\nVous connaissez désormais la procédure. Une fois que vous et tous vos alliés êtes prêts, rendez-vous à <EM4>~mission(Location|Address)</EM4>. Vous verrez alors de quoi vous êtes capable lorsque vous êtes vraiment poussé à vos limites.\n\nEn bonus, si vous terminez le scénario avec succès, le détenteur initial du contrat recevra <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires</EM4> en récompense.\n\nASTUCES :\n- La patience est une vertu – Si vous avez bien équilibré votre escadron, vous devriez pouvoir vous en sortir, mais ne vous attendez pas à un combat rapide. Les vaisseaux de cette taille ne se laissent pas abattre facilement.\n\nBonne chance ! \nInstructeur Gilly    \n\n\nÀ PROPOS DE L'ÉCOLE DE PILOTAGE DE GILLY  \nL'instructeur Lucas “Gilly” Baramsco a servi dans six escadrons et possède plus de dix ans d'expérience dans l'enseignement. Que vous soyez un élève sans aucune expérience de vol ou un professionnel souhaitant perfectionner ses compétences, l'École de Pilotage de Gilly propose une variété de cours pour “lancer votre carrière de pilote”.\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 7/7 | Risk 7/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x5
GFS_ShipWaveAttack_Mission08_Title=Épreuve de combat - Scénario n°8
GMCapture_Desc=Pour tester la préparation de nos équipes d'intervention, nous aimerions que des volontaires simulent un assaut contre un Idris de la FDC en neutralisant et en prenant le contrôle du vaisseau.\n\n Soyons clair, le but de l'exercice n'est pas de détruire l'Idris, mais plutôt d'essayer de l'aborder puis d'en maintenir le contrôle le plus longtemps possible. Les volontaires doivent s'attendre à une forte résistance de la part de l'équipage très entrainé de l'Idris et sont encouragés à mettre à jour leur empreinte avant tout.\n\nLes coordonnées seront transmises dès que vous aurez confirmé votre participation.\n\nMerci et bonne chance.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
