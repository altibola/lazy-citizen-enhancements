UDM_UGF_collect_desc_001=Salutations, Partenaire d'Expédition Qualifié !\n\nSi vous recherchez du travail en tant que pilote de livraison, nous avons l'opportunité parfaite pour vous ! \n\nUn ramassage attend à <EM4>~mission(Location|Address)</EM4> pour être livré à <EM4>~mission(Destination|Address)</EM4>. Ça a l'air sympa, n'est-ce pas ?\n\nAttention, plusieurs alertes de sécurité ont été signalées dans la région. Assurez-vous d'avoir de quoi vous défendre pour rester en sécurité.\n\nSi cela vous intéresse, acceptez cette offre tout de suite ! \n\nAu plaisir de travailler avec vous,\n\nUnified Distribution Management\n-Livrez les Colis Intacts-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Unknown:</EM4> 4
