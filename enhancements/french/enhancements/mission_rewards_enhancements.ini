eckhart_defendship_multi_VHRT_desc_001=ECKHART SECURITY, LLC.\nCONTRATS ET RÉPARTITION\n\nTYPE DE CONTRAT : Défense de Vaisseau\nCODE D'APPROBATION = ~mission(ApprovalCode)\n\nPOUR UNE PRISE EN CHARGE IMMÉDIATE\n\nMalgré nos avertissements, un client a décidé de se rendre à <EM4>~mission(Location|Address)</EM4>. Sans surprise, il vient de déclencher une balise de détresse dans la zone, et nous recherchons donc un prestataire pour se rendre sur place, évaluer la situation et, si possible, secourir le client.\n\nNous l’avions prévenu que des hors-la-loi extrêmement dangereux et bien équipés attaquent souvent les vaisseaux dans ce secteur. C’est très probablement ce qui s’est produit ici, alors préparez-vous en conséquence. \n\nLe paiement sera effectué à l'achèvement du contrat.\n\nCe contrat n'est pas négociable.\n\nCe message peut contenir des informations confidentielles, exclusives, privilégiées et/ou privées. Ces informations sont destinées à l'usage de la personne ou de l'entité désignée ci-dessus.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
