XenoThreat_claimsweep_desc_easy=Notre mouvement de résistance grandit de jours en jours, mais cela vient avec une attention non désirée.  Récemment des scans ont révélés des sentinelles orbitales a ~mission(location|address) et un vaisseau en patrouille. Nous pensons que c'est une campagne visant XenoThreat, principalement financée par l'UEE. \n\nNous recherchons un mercenaire expérimenté qui pourrait détruire ces sentinelles le plus vite possible. Depuis qu'ils ont des yeux et des oreilles sur nous, envoyer quelqu’un extérieur à l'organisation attirera moins l'attention. Si vous prenez la mission, vous serez payé sur-le-champ quand les sentinelles serons détruites.\n \nMaintenant, bien que le vaisseau patrouilleur ne soit pas la cible principale, nous suspectons que s'il s’échappe, des renforts en réserve puissent arriver. Il serait intelligent de le gérer au plus vite. \n\nSi vous décidez de nous aider, XenoThreat retiendra que vous voulez vous battre pour ce qui est juste.\n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Hostiles:</EM4> Hostile Wave x3, Prospectors x1\n<EM4>Turrets:</EM4> 2 (hostile)
XenoThreat_claimsweep_desc_hard=Les récentes analyses ont permis découvrir plusieurs sentinelles orbitales et vaisseaux à ~mission(location|address). Nous pensons qu'ils font partie d'une campagne d'espionnage visant la XenoThreat, en réponse à récentes actions dans le système Stanton. Il semble que la XenoThreat soit dans le bon chemin, s'ils sont là à nous espionner.\n\nNous recherchons un mercenaire expérimenté et très compétent prêt à gérer cette opération. Si vous ne voulez pas que Pyro devienne un système de surveillance, c'est le moment ou jamais. Les sentinelles ne poseront probablement pas de problème, mais faites attention aux vaisseaux de patrouille. S'ils parviennent à s'échapper, vous aurez beaucoup plus de problèmes.\n\nVous aurez notre gratitude et un important paiement une fois le travail terminé.\n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250\n<EM4>Hostiles:</EM4> Hostile Wave x5, Prospectors x4\n<EM4>Turrets:</EM4> 4 (hostile)
XenoThreat_claimsweep_desc_intro=Il semblerait que notre lutte pour libérer l'humanité a rendu les sbires là-bas sur Terre nerveux. Récemment des scans ont découverts une sentinelle orbitale à ~mission(location|address) et nous pensons que cela fait parti de la campagne espionnage de l'UEE. De bon atouts disent qu'ils transfèrent directement les données vers ces fureteurs eux-mêmes. \n\nUne seule sentinelle a pour l’instant été détectée, mais qui sait comment l’opération grandira s'il n'est pas mis hors ligne. Cela ne devrait pas être un gros problème pour un mercenaire qualifié. Cela semble vous correspondre, le paiement sera envoyé dès que la sentinelle sera détruite. Et surtout, XenoThreat retiendra que vous voulez vous battre pour ce qui est juste.\n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Turrets:</EM4> 1 (hostile)
XenoThreat_claimsweep_desc_medium=Accordez vous de l'importance à la liberté de l'humanité ? Si oui, je vous offre la chance de le prouver. Récemment des scans ont découvert des sentinelles orbitales et des vaisseaux patrouillant à ~mission(location|address). Nous pensons qu'ils font parti de la campagne d'espionnage de l'UEE ciblant XenoThreat. C'est important que nous stoppions leur récupération d'informations avant que nous lancions notre prochaine mission.\n\nNous cherchons un mercenaire expérimenté voulant bien éliminer ces forces immédiatement. Les sentinelles sont la priorité, mais les vaisseaux seront peut-être un plus gros problème s'ils s'enfuient. Vous devrez évaluer la situation de plus près quand vous arriverez sur site. \n\nNous pourrions le faire nous même, mais nous envoyons un prestataire pour que les pourritures ne sachent pas qui les frappent. Le paiement sera envoyé aussitôt le contrat mené à terme. En plus, d'avoir la satisfaction de savoir que vous aidez la bonne cause.\n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostile Wave x4, Prospectors x2\n<EM4>Turrets:</EM4> 3 (hostile)
XenoThreat_claimsweep_desc_rand=Il semblerait que l'UEE augmente d'un cran ses efforts pour stopper notre mouvement. Un de nos pilotes a découvert quelques sentinelles orbitales et vaisseaux à ~mission(location|address). Nous pensons qu'ils font partie d'une campagne d'espionnage visant XenoThreat et il est vital d'y mettre fin avant qu’ils ne récupèrent quelque chose qui pourrait mettre un terme à nos prochains efforts.\n\nNous cherchons un mercenaire doué voulant éliminer cette menace et stopper cette intrusion privée avant que ça se répande encore plus. Qui sait comment l’opération grandira si elle n'est pas mise hors course immédiatement ? Le paiement sera plus que généreux et envoyé juste après que tout soit réduit en pièces. \n\nConsidérez ça comme être du bon coté de l'histoire.\n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostile Wave x32, Prospectors x5\n<EM4>Turrets:</EM4> 4 (hostile)
XenoThreat_claimsweep_title_easy=Réduire au Silence les Tourelles <EM4>[50 Rep]</EM4>
XenoThreat_claimsweep_title_hard=Anéantissement de Tourelles <EM4>[250 Rep]</EM4>
XenoThreat_claimsweep_title_intro=Arrêt de la Surveillance <EM4>[50 Rep]</EM4>
XenoThreat_claimsweep_title_medium=Éradication de Tourelles <EM4>[100 Rep]</EM4>
XenoThreat_claimsweep_title_rand=Élimination de Tourelles <EM4>[100 Rep]</EM4>
Xenothreat_bounty_headhunter_desc_001=Le groupe XenoThreat a placé un ordre de tuer sur ~mission(TargetName). En tant que membre de niveau Clips du gang des Headhunters, ~mission(TargetName|Last) a mené des opérations qui ont ciblé les agents, les missions et l'infrastructure du groupe XenoThreat. Pour ces transgressions, le groupe XenoThreat paiera quiconque réussira à traquer et assassiner ~mission(TargetName|Last). \n\nMISE À JOUR DE LIEU : ~mission(TargetName|Last) a été vu près de ~mission(Location|Address) il n'y a pas très longtemps. Si vous décidez d'accepter ce contrat, vous devriez vous rendre à ces coordonnées immédiatement. ~mission(TargetName|Last) savent qu'on en a après eux et ont récemment voyagé avec une escorte. Ne soyez pas surpris si ils ne sont pas seuls.\n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Xenothreat_bounty_headhunter_desc_002=XenoThreat a placé un contrat sur la tête de ~mission(TargetName). Membre reconnu du gang des Headhunters, ~mission(TargetName|Last) a trahis l'Humanité, se revendiquant l'allié d'aliens, s'associant autant avec eux sur le plan personnel que financier. La XenoThreat veut que ces actes de trahison cessent immédiatement pour éviter que l'influence alien s'étende dans le système Pyro. Nous sommes prêts à payer n'importe quelle personne qui traquera avec succès et assassinera ~mission(TargetName|Last) pour ses crimes contre l'Humanité.   \n\nMISE À JOUR DE LIEU : ~mission(TargetName|Last) a été récemment aperçu au côté d'une escorte à ~mission(Location|Address). \n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Xenothreat_bounty_headhunter_desc_003=XenoThreat a placé un contrat sur la tête de ~mission(TargetName). Membre reconnu du gang des Headhunters, ~mission(TargetName|Last) s'est introduit dans les systèmes de la XenoThreat pour voler des informations sur nos opérations ainsi que notre personnel. Le mal fait ne peut t'être vengé qu'en s'assurant une bonne fois pour toutes que ~mission(TargetName|Last) ne puisse jamais plus mener à bien ce type d'attaque. C'est pourquoi la XenoThreat est à récompenser toute personne qui traquera et assassinera ~mission(TargetName|Last).      \n\nMISE À JOUR DE LIEU : Des scans récents ont identifié ~mission(TargetName|Last) voyageant au côté d'autre vaisseaux proche de ~mission(Location|Address). \n\nComm. Spec. Engler.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Xenothreat_destroyitems_CFP_vehicle_desc_01=Ces soi-disant "activistes" des Citizens for Prosperity continuent d'essayer de répandre leur influence à travers le système. Avec votre aide, il y a une chance pour stopper leurs opérations à la racine.\n\nLe groupe utilise ~mission(location|address) pour distribuer des provisions à des opérateurs indépendants éparpillés tout autour de la planète. Si nous détruisons le ~mission(ship) situé ici, leur réseau s'écroulera.\n\nUn bombardement enverrais un message clair, mais je vous laisse le soin de décider du moyen de destruction à employer.\n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Xenothreat_theft_outpost_cfp_desc_001=Laissez l'UEE mentir et dire qu'elle n'est pas impliquée dans les opérations des Citizens for Prosperityé simplement parce qu'elle “donne” des fournitures à une organisation d'aide tertiaire qui les livre ensuite immédiatement à ses membres. \n\nNous venons d'apprendre qu'une de ces cargaisons d'aide gouvernementale a été déposée dans un avant-poste affilié aux Citizens for Prosperity. C'est pourquoi nous vous paierons pour effectuer un raid sur ~mission(Pickup1|Address) et réclamer le ~mission(item) pour la cause. Une fois que vous aurez tout livré à ~mission(Dropoff1|Address), nous pourrons redistribuer la cargaison pour nous aider dans notre combat. Rien de mieux que d'utiliser les ressources de l'ennemi contre lui. \n\nMais ne pensez pas qu'ils vous remettront tout simplement le matériel. Même si les Citizens for Prosperity sont censés apporter la paix, vous feriez mieux de vous préparer à vous battre avec eux. \n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Xenothreat_theft_outpost_headhunters_desc_001=XenoThreat s'est efforcé de faire de Pyro un havre de paix pour les humains, mais tout le monde n'est pas en accord avec nos objectifs. Parmi eux, les Headhunters se sont rabaissés en engageant un transporteur extraterrestre pour leur livrer du matériel. Nous avons laissé passer l'occasion d'atteindre cette cargaison, mais nous voulons tout de même faire passer le message que travailler avec des extraterrestres, quelle que soit leur capacité, ne sera pas toléré dans ce système. \n\nCette cargaison a été livrée à ~mission(Pickup1|Address). Nous voulons que quelqu'un se rende à l'avant-poste, récupère le ~mission(item) et l'apporte à ~mission(Dropoff1|Address) pour que nous puissions nous en débarrasser correctement. \n\nVous êtes prêt à garder Pyro libre de toute influence extraterrestre ?\n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Xenothreat_theft_station_cfp_desc_001=Les Citizens for Prosperity se sont retranchés à ~mission(Pickup1|Address). Pour éviter qu'ils ne s'installent trop confortablement dans cette station, nous voulons leur montrer ce qu'est vraiment la vie dans notre système. Nous vous paierons pour que vous vous rendiez à la station, que vous vous empariez du ~mission(item) et que vous tuiez tous ceux qui se mettront en travers de votre chemin. \n\nLe paiement dépend de votre capacité à livrer ces fournitures à ~mission(Dropoff1|Address). Tous ceux que vous tuerez ne seront que du bonus.     \n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Xenothreat_theft_station_roughready_desc_001=Pas sûr que tu ai déjà eu le plaisir d'avoir à faire aux Rough & Ready, mais ce gang est focalisé sur l'idée de contrôler le marché du carburant dans le système Pyro. C'est très malin, mais on ne peut pas se permettre de les laisser faire sans exiger quelques concessions. Puisqu'ils ne sont pour le moment pas enclin à la négociation, nous sommes forcés de leur montrer ce qu'il en coûte de s'opposer à nous. \n\nNous avons identifié ~mission(Pickup1|Address) comme cible prioritaire pour ce genre d'attaque. Nous avons aussi appris qu'ils auraient récemment reçu des marchandises qui devraient couvrir le prix de leur obstination. Une fois à l'intérieur de la station, fais tout ce qui sera en ton pouvoir pour leur confisquer leur ~mission(item). Nous te ferons parvenir ton paiement une fois que tu auras délivré la marchandise à ~mission(Dropoff1|Address). \n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
