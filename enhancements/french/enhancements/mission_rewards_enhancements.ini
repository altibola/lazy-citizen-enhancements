headhunters_killship_gen_lrt_desc_001=Encore une ordure qui a besoin d'être punie. ~mission(TargetName) est juste un voyou de bas étage qui ne semble pas vouloir apprendre. Nous les avons avertis de se joindre à nous ou de changer de système, mais ils ne semblent pas écouter et nous sommes à bout de patience. Dirigez-vous vers ~mission(Location|Address) et vous devriez trouver ~mission(TargetName|Last) en train de voler dans les parages. \n\nStows terminé.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1\n<EM4>Jr. Contractor:</EM4> +75 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
