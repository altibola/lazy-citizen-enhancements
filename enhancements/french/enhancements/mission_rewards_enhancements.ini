Shubin_Industrial_ShipMining_Stanton_VH_Secondary_Interstellar_Desc_001=AFFECTATION : Bon de commande\nLIEU : <EM4>~mission(System) </EM4>\n\nCONDITIONS* : \nShubin Interstellar cherche à honorer un nouveau bon de commande pour divers matériaux raffinés. Votre aide dans cette affaire serait très appréciée.\n\n~mission(Hint_Location) La plupart de ces minerais sont extrêmement rares et difficiles à trouver, et ne peuvent être détectés qu'une fois la roche fracturée.\n\nNous vous rappelons que <EM4>tous les matériaux doivent être raffinés avant leur livraison</EM4>, et comme il s'agit d'un bon de commande et non d'un contrat d'exploitation minière, vous êtes tenu d'apporter votre propre équipement, tel qu'un <EM4>~mission(Hint_Tool)</EM4>.\n\nUne fois prêt à nous vendre les matériaux raffinés demandés, déposez-les dans le monte-charge situé à <EM4>~mission(Destination|Address)</EM4>.\n\n*En acceptant ce contrat, vous assumez tous les risques associés aux travaux décrits dans le présent document et Shubin Interstellar ne peut en aucun cas être tenu responsable des dommages survenus pendant la durée du contrat.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Nyx]</EM4>\n- Arclight "Stormfall" Pistol\n- Arclight Pistol\n- [S1-A] Arclight Pistol Battery (30 cap)\n- [S1-A] Horizon Helmet\n- [S1-A] Venture Arms\n- [S1-A] Venture Core\n- [S1-A] Venture Legs\n\n<EM4>[Nyx, Stanton, Rank 0–1]</EM4>\n- [IND-S0-C] Surveyor-Go\n- [IND-S1-C] Surveyor-Lite\n- [IND-S2-C] Surveyor\n- [IND-S3-C] Surveyor-Max\n- [MIN-S0-A] Arbor MHV Mining Laser\n- [MIN-S0-B] Helix\n- [MIN-S0-B] Hofstede\n- [MIN-S0-C] Lawson Mining Laser\n\n<EM4>[Nyx, Stanton, Rank 2–3]</EM4>\n- [IND-S0-B] BroadSpec-Go\n- [IND-S2-B] BroadSpec\n- [IND-S4-B] BroadSpec-Max\n- [MIN-S1-A] Arbor MH1 Mining Laser\n- [MIN-S1-A] Helix I Mining Laser\n- [MIN-S1-A] Hofstede-S1 Mining Laser\n- [MIN-S1-A] Impact I Mining Laser\n- [MIN-S1-A] Klein-S1 Mining Laser\n- [MIN-S1-A] Lancet MH1 Mining Laser\n- [MIN-S1-A] Pitman Mining Laser\n\n<E