p_protectandresupply_PreXeno_desc=Attention, volontaires de la FDC, XenoThreat a finalement lancé son attaque contre la station Jericho, du côté de Pyro Gateway dans le système Stanton.\n\nLa Navy a demandé aux forces de la FDC d'aider à combattre les forces XenoThreat dans la zone et/ou de récupérer des fournitures dans l'épave et de les livrer en toute sécurité à la station Jericho.\n\nLa Navy a organisé une allocation communautaire pour s'occuper de la distribution de l'argent. Elle sera distribuée à tous les volontaires de la FDC à des intervalles déterminés. Un indicateur apparaîtra sur votre ATH pour mesurer ces paiements.\n\nVeuillez noter que les fournitures sont très volatiles si elles ne sont pas manipulées correctement. Soyez prudent lorsque vous transportez ces matériaux :\n* Le Zeta-Prolanide se dégrade avec le temps jusqu'à se décomposer complètement.\n* Le Composite AcryliPlex Composite devient explosivement instable s'il est endommagé.\n* Le Diluthermex libère une impulsion d'énergie destructrice s'il est exposé au voyage quantum.\n\nSAIC Rowena Dulli de l'Advocacy est l'attachée officielle de la FDC et elle dirigera l'opération.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Difficulty (1-7):</EM4> 5/7\n<EM4>Rep:</EM4> +4,000
p_protectandresupply_PreXeno_title=Initative Overdrive : Embuscade Xenothreat - Besoin de Soutien <EM4>[4,000 Rep]</EM4>
p_protectandresupply_desc_v2=*TRANSMISSION PRIORITAIRE À DESTINATION DU SYSTÈME ENTIER*\n\nAttention, les forces XenoThreat ont commencé à tendre des embuscades aux convois Naval transportant des fournitures vitales en route vers la station Jericho, du côté de Pyro Gateway dans le système Stanton. La Navy a demandé à la FDC de l'aider à récupérer ces fournitures dans les épave et de les livrer en toute sécurité à la station Jericho. \n\nLa Navy a mis en place une allocation communautaire pour gérer la distribution du paiement. Elle sera distribuée à tous les volontaires de la FDC à des intervalles déterminés. Un indicateur apparaîtra sur votre ATH pour mesurer ces paiements.\n\nVeuillez noter que certaines de ces fournitures sont très volatiles si elles ne sont pas manipulées correctement. Soyez prudent lorsque vous transportez ces matériaux : \n* Le Zeta-Prolanide se dégrade avec le temps jusqu'à se décomposer complètement.\n* Le Composite AcryliPlex devient explosivement instable s'il est endommagé.\n* Le Diluthermex libère une impulsion d'énergie destructrice s'il est exposé au voyage quantum.\n\nDe plus, bien que moins volatiles, les fournitures de DynaFlex perdues lors de l'attaque sont toujours nécessaires à la Navy pour terminer les réparations du Javelin et devraient être récupérées en priorité.    \n\Par ailleurs, des XenoThreat pourraient encore se trouver dans la région, il convient donc d'être prudent. Les volontaires de la FDC ayant une expérience du combat sont également invités à contribuer à la sécurisation de ces zones contre les forces XenoThreat qui s'y trouvent encore.\n\nSAIC Rowena Dulli de l'Advocacy est l'attaché officiel de la FDC et sera en charge de toute l'opération.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 5/7\n<EM4>Rep:</EM4> +4,000
p_protectandresupply_title=ALERTE FDC : Embuscade Xenothreat - Besoin de Soutien <EM4>[4,000 Rep]</EM4>
p_showdown_PreXeno_desc=Attention, les forces Navales se sont regroupées pour l'assaut final que XenoThreat a planifié. La Navy a officiellement demandé à tous les volontaires du FDC de l'aider à fournir un soutien au combat dans cette dernière tentative de sécurisation de notre système. Cela inclura des volontaires en dehors de ceux qui ont participé à l'Initiative Overdrive.\n\nSAIC Rowena Dulli de l'Advocacy est l'attaché officiel de la FDC et sera en charge de toute l'opération.\n\nEn cas de succès, cette série de l'Initiative Overdrive s'achèvera et vous recevrez un accès temporaire aux Hornets F7A ou une mise à niveau gratuite si vous possédez déjà un F7C.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Difficulty (1-7):</EM4> 5/7\n<EM4>Rep:</EM4> +4,000
p_showdown_PreXeno_title=Initative Overdrive : Attaque sur XenoThreat <EM4>[4,000 Rep]</EM4>
p_showdown_desc=*À COMMUNIQUER IMMEDIATEMENT À L'ENSEMBLE DU SYSTEME*\n\nAttention, les forces Navales se sont regroupées pour un assaut final contre la faction de hors-la-loi XenoThreat qui infeste le système Stanton. La Navy a officiellement requis l'aide des volontaires de la FDC pour procurer un support au combat dans cette dernière offensive pour sécuriser notre système.\n\nSAIC Rowena Dulli de l'Advocacy sera l'attachée officielle à la FDC et aux commandes de l'opération.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 5/7\n<EM4>Rep:</EM4> +4,000
p_showdown_title=ALERTE FDC : Attaque de XenoThreat <EM4>[4,000 Rep]</EM4>
