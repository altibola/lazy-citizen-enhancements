Covalex_RecoverCargo_Easy_Description=Salut,\n\nJ'ai un client qui n'a pas arrêté de m'envoyer des messages toute la matinée à propos d'une livraison qu'il était censé recevoir, et quand j'ai vérifié où en était l'expédition, il s'avère qu'elle est complètement immobilisée au milieu de l'espace.\n\nC'est évidemment grave pour plusieurs raisons, et pas seulement pour les 20 minutes que j'ai passées à me faire hurler dessus. Pouvez-vous vous rendre à  <EM4>~mission(Location|Address)</EM4> pour voir ce qui s'est passé ? Le contrat initial prévoyait un vaisseau capable de transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>, alors assurez-vous d'emporter une soute de cette capacité et un <EM4>rayon tracteur puissant</EM4>.\n\nUne fois la cargaison récupérée, pouvez-vous la livrer au monte-charge de <EM4>~mission(Destination|Address)</EM4> ? Merci beaucoup.\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nCoordinatrice Logistique Jr.\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Rookie:</EM4> +100 Rep
Covalex_RecoverCargo_Easy_Title=Petite Cargaison Covalex à Récupérer <EM4>[100 Rep]</EM4>
Covalex_RecoverCargo_Hard_Description=Salut, c'est El.\n\nJ'ai besoin d'un transporteur pour une mission de toute urgence. L'un de nos prestataires a eu une "urgence personnelle" et a dû abandonner son vaisseau; on dirait bien qu'il ne reviendra pas. Vraiment pas top.\n\nLa bonne nouvelle est que la cargaison est toujours intacte, du moins d'après le traceur. Ce serait une excellente nouvelle pour moi si vous pouviez terminer le travail en récupérant la cargaison à <EM4>~mission(Location|Address)</EM4> et en l'amenant jusqu'au monte-charge de <EM4>~mission(Destination|Address)</EM4>.\n\nLa cargaison semble assez volumineuse; vous aurez besoin d'un vaisseau capable de transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4> et d'un <EM4>rayon tracteur puissant</EM4> pour tout déplacer. Je vous remercie sincèrement de votre aide.\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nCoordinatrice Logistique Jr.\nCovalex Shipping   \n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Member:</EM4> +200 Rep
Covalex_RecoverCargo_Hard_Title=Grande Cargaison Covalex à Récupérer <EM4>[200 Rep]</EM4>
Covalex_RecoverCargo_Medium_Description=Salut, c'est El.\n\nJ'ai remarqué quelque chose d'étrange. En vérifiant les statistiques de livraison de la semaine dernière, j'ai remarqué des anomalies. On dirait que certaines livraisons sont marquées comme effectuées, mais les traceurs de cargaison indiquent toujours qu'elles sont toujours en cours.\n\nL'une d'entre elles se trouve à <EM4>~mission(Location|Address)</EM4>, j'espérais donc que vous pourriez vous y rendre pour voir ce qu'il en est. La commande indique que le transporteur utilisait un vaisseau pouvant contenir des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4> alors assurez-vous qu'il en de même pour le vôtre. Un <EM4>rayon tracteur puissant</EM4> est également indispensable pour cette mission.\n\nCette cargaison aurait dû être livrée hier, donc dès que vous l'aurez récupérée, emmenez-la à un monte-charge de <EM4>~mission(Destination|Address)</EM4> et je m'occuperai de votre paiement.\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nCoordinatrice Logistique Jr. \nCovalex Shipping   \n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Junior:</EM4> +150 Rep
Covalex_RecoverCargo_Medium_Title=Cargaison Moy. Covalex à Récupérer <EM4>[150 Rep]</EM4>
Covalex_RecoverCargo_Super_Description=Bonjour,\n\nPour cette mission, nous recherchons uniquement les meilleurs prestataires. L'un de nos clients les plus importants attend une livraison d'une importance capitale qui a déjà pris beaucoup de retard.\n\nChez Covalex, nous mettons un point d'honneur à traiter tous nos clients de la même manière, en offrant un service d'exception, quel que soit le type de livraison. Cela dit, si nous perdons ce contrat, quelqu'un va passer un sale quart d'heure et je n'ai vraiment pas envie que ce soit moi.\n\nLe traceur indique que le vaisseau du dernier prestataire se trouve à <EM4>~mission(Location|Address)</EM4>. Ne prenez aucun risque avec cette mission : vous aurez besoin d'un vaisseau capable de transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4> et d'un <EM4>rayon tracteur puissant</EM4> pour tout récupérer.\n\nLivrez la cargaison au monte-charge de <EM4>~mission(Destination|Address)</EM4> et nous pourrons mettre toute cette histoire derrière nous. Et vous engrangerez une grosse somme au passage, pas mal non ?\n\n~mission(Contractor|SignOff)\n\nElla Tieno \nCoordinatrice Logistique Jr.\nCovalex Shipping   \n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Senior:</EM4> +300 Rep
Covalex_RecoverCargo_Super_Title=Récupération d'une Cargaison VIP Covalex <EM4>[300 Rep]</EM4>
Covalex_RecoverCargo_VeryEasy_Description=Bonjour,\n\nUn prestataire devait livrer des marchandises pour nous, mais il a complètement disparu. J'ai localisé son vaisseau, mais je n'ai aucune idée de ce qui s'est passé; il flotte quelque part près de <EM4>~mission(Location|Address)</EM4>. Si vous pouviez vous rendre là-bas pour récupérer la cargaison et l'amener au monte-charge de <EM4>~mission(Destination|Address)</EM4>, vous me rendriez un immense service.\n\nN'oubliez pas d'apporter un <EM4>rayon tracteur puissant</EM4> pour déplacer toute la cargaison. Oh, et aussi un vaisseau capable de transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4>.\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nCoordinatrice Logistique Jr. \nCovalex Shipping   \n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Rookie:</EM4> +50 Rep\n<EM4>Trainee:</EM4> +50 Rep
Covalex_RecoverCargo_VeryEasy_Title=Très Petite Cargaison Covalex à Récupérer <EM4>[50 Rep]</EM4>
Covalex_RecoverCargo_VeryHard_Description=Bonjour,\n\nVoilà la situation. Après avoir passé une heure à discuter via les comms avec le transporteur pour l'aider à diagnostiquer le problème de son vaisseau, il a été décidé que nous devions maintenant envoyer quelqu'un à <EM4>~mission(Location|Address)</EM4> pour terminer la livraison.\n\nC'est une mission assez importante. Vous aurez besoin d'un vaisseau capable de transporter des <EM4>conteneurs de ~mission(MissionMaxSCUSize)</EM4> et, à moins d'être surhumain, d'un <EM4>puissant rayon tracteur</EM4> pour tout déplacer.\n\nJ'apprécierais vraiment que nous puissions régler cette affaire. Amenez la cargaison jusqu'au monte-charge de <EM4>~mission(Destination|Address)</EM4> et nous pourrons enfin tourner la page.\n\n~mission(Contractor|SignOff)\n\nElla Tieno \nCoordinatrice Logistique Jr.\nCovalex Shipping   \n'Tout ce dont vous avez besoin, partout où vous en avez besoin.' \n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. Afin d'encourager les livraisons dans les délais et prévenir la fraude sur les transports de marchandises, Covalex Shipping fixera un délai de livraison et, à l'expiration de celui-ci, toute cargaison non livrée sera considérée comme volée et traitée comme telle. Le paiement total sera calculé au prorata du pourcentage de marchandises livrées avec succès.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Experienced:</EM4> +200 Rep
Covalex_RecoverCargo_VeryHard_Title=Très Grande Cargaison Covalex à Récupérer <EM4>[200 Rep]</EM4>
Covalex_courier_dc_small_title_001=Itinéraire d'Envoi Local Covalex <EM4>[500–2,000 Rep]</EM4>
Covalex_courier_fromdc_large_desc_001=Bonjour,\n\nNous avons une cargaison assez importante qui attend dans ~mission(Pickup1) à ~mission(Pickup1|Address) et qui doit être livrée.\n\nAvec ce nombre de boîtes à transporter, il serait probablement bon d'avoir une personne supplémentaire pour vous aider à tout transférer dans et hors de votre vaisseau.\n\nENLÈVEMENT DE COLIS \n     · Tous les colis se trouvent dans  <EM4>~mission(Pickup1)</EM4> à <EM4>~mission(Pickup1|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> à <EM4>~mission(Dropoff4|Address)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> à <EM4>~mission(Dropoff5|Address)</EM4>\n     · Colis <EM4>#~mission(Item6|SerialNumber)</EM4> à <EM4>~mission(Dropoff5|Address)</EM4>\n     · Colis <EM4>#~mission(Item7|SerialNumber)</EM4> à <EM4>~mission(Dropoff6|Address)</EM4>\n     · Colis <EM4>#~mission(Item8|SerialNumber)</EM4> à <EM4>~mission(Dropoff6|Address)</EM4>\n     · Colis <EM4>#~mission(Item9|SerialNumber)</EM4> à <EM4>~mission(Dropoff7|Address)</EM4>\n     · Colis <EM4>#~mission(Item10|SerialNumber)</EM4> à <EM4>~mission(Dropoff7|Address)</EM4>\n     · Colis <EM4>#~mission(Item11|SerialNumber)</EM4> à <EM4>~mission(Dropoff8|Address)</EM4>\n     · Colis <EM4>#~mission(Item12|SerialNumber)</EM4> à <EM4>~mission(Dropoff8|Address)</EM4>\n     · Colis <EM4>#~mission(Item13|SerialNumber)</EM4> à <EM4>~mission(Dropoff9|Address)</EM4>\n     · Colis <EM4>#~mission(Item14|SerialNumber)</EM4> à <EM4>~mission(Dropoff9|Address)</EM4>\n     · Colis <EM4>#~mission(Item15|SerialNumber)</EM4> à <EM4>~mission(Dropoff9|Address)</EM4>\n\nBonne chance !\n\nChase Hewitt\nCoordinateur Logistique Jr.\nCovalex Shipping  \n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. En acceptant ce contrat, vous acceptez tous les termes et conditions de notre 'Guide Complémentaire d'Informations aux Travailleurs Indépendants v.2948.01.29.' Covalex Shipping ne peut être tenu responsable des dommages survenus dans le cadre de votre activité de prestataire indépendant.\n\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000
Covalex_courier_fromdc_med_desc_001=Bonjour,\n\nJ'ai une commande de taille respectable prête à être récupérée à ~mission(Pickup1) à ~mission(Pickup1|Address). Assurez-vous d'avoir un vaisseau assez grand pour tout charger ! \n\nENLÈVEMENT DE COLIS \n     · Tous les colis se trouvent dans <EM4>~mission(Pickup1)</EM4> à <EM4>~mission(Pickup1|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> à <EM4>~mission(Dropoff4|Address)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> à <EM4>~mission(Dropoff5|Address)</EM4>\n     · Colis <EM4>#~mission(Item6|SerialNumber)</EM4> à <EM4>~mission(Dropoff5|Address)</EM4>\n     · Colis <EM4>#~mission(Item7|SerialNumber)</EM4> à <EM4>~mission(Dropoff6|Address)</EM4>\n     · Colis <EM4>#~mission(Item8|SerialNumber)</EM4> à <EM4>~mission(Dropoff6|Address)</EM4>\n     · Colis <EM4>#~mission(Item9|SerialNumber)</EM4> à <EM4>~mission(Dropoff7|Address)</EM4>\n     · Colis <EM4>#~mission(Item10|SerialNumber)</EM4> à <EM4>~mission(Dropoff7|Address)</EM4>\n\nBonne journée,\n\nChase Hewitt\nCoordinateur Logistique Jr.\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. En acceptant ce contrat, vous acceptez tous les termes et conditions de notre 'Guide Complémentaire d'Informations aux Travailleurs Indépendants v.2948.01.29.' Covalex Shipping ne peut être tenu responsable des dommages survenus dans le cadre de votre activité de prestataire indépendant.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
Covalex_courier_fromdc_small_desc_001=Bonjour !\n\nJ'ai reçu une requête pour transférer quelques paquets depuis ~mission(Pickup1) à ~mission(Pickup1|Address). \n\nJ'ai pensé que vous aimeriez cette demande car que c'est bien d'avoir une mission simple à faire de temps en temps.\n\nENLÈVEMENT DE COLIS \n     · Tous les colis se trouvent dans <EM4>~mission(Pickup1)</EM4> à <EM4>~mission(Pickup1|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> à <EM4>~mission(Dropoff4|Address)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> à <EM4>~mission(Dropoff5|Address)</EM4>\n\nÀ très bientôt,\n\nChase Hewitt\nCoordinateur Logistique Jr.\nCovalex Shipping  \n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. En acceptant ce contrat, vous acceptez tous les termes et conditions de notre 'Guide Complémentaire d'Informations aux Travailleurs Indépendants v.2948.01.29.' Covalex Shipping ne peut être tenu responsable des dommages survenus dans le cadre de votre activité de prestataire indépendant.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Covalex_courier_todc_large_desc_001=Bonjour,\n\nIl y a une importante livraison de colis qui est prête à être acheminée vers ~mission(Dropoff1) à ~mission(Dropoff1|Address). Vu le nombre de caisses que vous aurez à déplacer, il serait peut-être judicieux d'emmener un ami pour vous donner un coup de main.\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE) \n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> depuis <EM4>~mission(Pickup2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> depuis <EM4>~mission(Pickup3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> depuis <EM4>~mission(Pickup4|Address)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> depuis <EM4>~mission(Pickup5|Address)</EM4>\n     · Colis <EM4>#~mission(Item6|SerialNumber)</EM4> depuis <EM4>~mission(Pickup5|Address)</EM4>\n     · Colis <EM4>#~mission(Item7|SerialNumber)</EM4> depuis <EM4>~mission(Pickup6|Address)</EM4>\n     · Colis <EM4>#~mission(Item8|SerialNumber)</EM4> depuis <EM4>~mission(Pickup6|Address)</EM4>\n     · Colis <EM4>#~mission(Item9|SerialNumber)</EM4> depuis <EM4>~mission(Pickup7|Address)</EM4>\n     · Colis <EM4>#~mission(Item10|SerialNumber)</EM4> depuis <EM4>~mission(Pickup7|Address)</EM4>\n     · Colis <EM4>#~mission(Item11|SerialNumber)</EM4> depuis <EM4>~mission(Pickup8|Address)</EM4>\n     · Colis <EM4>#~mission(Item12|SerialNumber)</EM4> depuis <EM4>~mission(Pickup8|Address)</EM4>\n     · Colis <EM4>#~mission(Item13|SerialNumber)</EM4> depuis <EM4>~mission(Pickup9|Address)</EM4>\n     · Colis <EM4>#~mission(Item14|SerialNumber)</EM4> depuis <EM4>~mission(Pickup9|Address)</EM4>\n     · Colis <EM4>#~mission(Item15|SerialNumber)</EM4> depuis <EM4>~mission(Pickup9|Address)</EM4>\n\nLIEU DE DÉPÔT\n     · Tous les colis doivent être livrés à <EM4>~mission(Pickup1)</EM4> à <EM4>~mission(Pickup1|Address)</EM4>\n\nJ'espère que tout se passera bien,\n\nChase Hewitt\nCoordinateur Logistique Jr.\nCovalex Shipping  \n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilités limitées. En acceptant ce contrat, vous acceptez tous les termes et conditions de notre 'Guide Complémentaire d'Informations aux Travailleurs Indépendants v.2948.01.29.' Covalex Shipping ne peut être tenu responsable des dommages survenus dans le cadre de votre activité de prestataire indépendant.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000
Covalex_courier_todc_med_desc_001=Bonjour,\n\nJ'ai une commande de taille respectable qui doit être livrée à ~mission(Dropoff1) à ~mission(Dropoff1|Address). Je vous suggère d'apporter un rayon tracteur, mais faites comme bon vous semble !\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE) \n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> depuis <EM4>~mission(Pickup2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> depuis <EM4>~mission(Pickup3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> depuis <EM4>~mission(Pickup4|Address)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> depuis <EM4>~mission(Pickup5|Address)</EM4>\n     · Colis <EM4>#~mission(Item6|SerialNumber)</EM4> depuis <EM4>~mission(Pickup5|Address)</EM4>\n     · Colis <EM4>#~mission(Item7|SerialNumber)</EM4> depuis <EM4>~mission(Pickup6|Address)</EM4>\n     · Colis <EM4>#~mission(Item8|SerialNumber)</EM4> depuis <EM4>~mission(Pickup6|Address)</EM4>\n     · Colis <EM4>#~mission(Item9|SerialNumber)</EM4> depuis <EM4>~mission(Pickup7|Address)</EM4>\n     · Colis <EM4>#~mission(Item10|SerialNumber)</EM4> depuis <EM4>~mission(Pickup7|Address)</EM4>\n\nLIEUX DE DÉPÔT\n     · Tous les colis doivent être livrés à <EM4>~mission(Dropoff1)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n\nMerci beaucoup,\n\nChase Hewitt\nCoordinateur Logistique Jr.\nCovalex Shipping  \n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilités limitées. En acceptant ce contrat, vous acceptez tous les termes et conditions de notre 'Guide Complémentaire d'Informations aux Travailleurs Indépendants v.2948.01.29.' Covalex Shipping ne peut être tenu responsable des dommages survenus dans le cadre de votre activité de prestataire indépendant.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
Covalex_courier_todc_small_desc_001=Bonjour !\n\nJ'ai reçu une demande de transfert de plusieurs colis vers ~mission(Dropoff1) à ~mission(Dropoff1|Address). Ce n'est pas très compliqué.\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE) \n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> depuis <EM4>~mission(Pickup2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> depuis <EM4>~mission(Pickup3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> depuis <EM4>~mission(Pickup4|Address)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> depuis <EM4>~mission(Pickup5|Address)</EM4>\n\nLIEUX DE DÉPÔT\n     Tous les colis doivent être livrés à <EM4>~mission(Dropoff1)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n\nJe vous suis reconnaissant d'avoir pris le temps de vous occuper de ce travail pour moi, \n\n\n\nChase Hewitt\nCoordinateur Logistique Jr.\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilité limitée. En acceptant ce contrat, vous acceptez tous les termes et conditions de notre 'Guide Complémentaire d'Informations aux Travailleurs Indépendants v.2948.01.29.' Covalex Shipping ne peut être tenu responsable des dommages survenus dans le cadre de votre activité de prestataire indépendant.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Covalex_internaldelivery_dc_desc_001=Bonjour ! J'ai besoin d'une main d'œuvre supplémentaire à <EM4>~mission(Location|Address)</EM4> pour aider à déplacer quelques objets entre les différents sites de stockage de l'installation. Quand les lieux deviennent aussi grands, ils ont besoin de toute l'aide logistique possible !  \n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis <EM4>~mission(Pickup1)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> depuis <EM4>~mission(Pickup2)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2)</EM4>\n\nBonne chance !\n\nChase Hewitt\nCoordinateur Logistique Jr.\nCovalex Shipping  \n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilités limitées. En acceptant ce contrat, vous acceptez tous les termes et conditions de notre 'Guide Complémentaire d'Informations aux Travailleurs Indépendants v.2948.01.29.' Covalex Shipping n’est responsable d’aucun des dommages survenant lors des activités en tant que prestataire indépendant.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Covalex_internaldelivery_dc_desc_003=Bonjour, j'ai reçu une demande de la part de <EM4>~mission(Location|Address)</EM4> pour aider à déplacer en interne quelques colis de l'endroit où ils sont actuellement stockés. J'ai pensé que vous seriez prêt à vous y atteler.\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis <EM4>~mission(Pickup1)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> depuis <EM4>~mission(Pickup2)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> depuis <EM4>~mission(Pickup3)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> depuis <EM4>~mission(Pickup4)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> à <EM4>~mission(Dropoff4)</EM4>\n\nBonne journée !\n\nChase Hewitt\nCoordinateur Logistique Jr.\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une corporation à responsabilités limitées. En acceptant ce contrat, vous êtes d’accord avec les termes et conditions comme soulignés dans notre extension 'Guide Complémentaire d'Informations aux Travailleurs Indépendants v.2948.01.29.' Covalex Shipping n’est responsable d’aucun des dégâts pouvant arriver en opérant en tant que prestataire indépendant.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
Covalex_internaldelivery_dc_desc_005=Bonjour,\n\nIl y a tout un tas de paquets à <EM4>~mission(Location|Address)</EM4> qui ont besoin d'être transportés dans l'installation jusqu'à leur lieu de stockage approprié. Ce serait très appréciable si vous pouviez vous occuper personnellement de tout cela.\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis <EM4>~mission(Pickup1)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> depuis <EM4>~mission(Pickup2)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> depuis <EM4>~mission(Pickup3)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> depuis <EM4>~mission(Pickup4)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> depuis <EM4>~mission(Pickup5)</EM4>\n     · Colis <EM4>#~mission(Item6|SerialNumber)</EM4> depuis <EM4>~mission(Pickup6)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> à <EM4>~mission(Dropoff4)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> à <EM4>~mission(Dropoff5)</EM4>\n     · Colis <EM4>#~mission(Item6|SerialNumber)</EM4> à <EM4>~mission(Dropoff6)</EM4>\n\n\nJ'apprécie vraiment tout ce que vous faites,\n\nChase Hewitt\nCoordinateur Logistique Jr.\nCovalex Shipping\n'Tout ce dont vous avez besoin, partout où vous en avez besoin.'\n\n\n\n\n\n\n\nCovalex Shipping est une société à responsabilités limitées. En acceptant ce contrat, vous acceptez tous les termes et conditions de notre 'Guide Complémentaire d'Informations aux Travailleurs Indépendants v.2948.01.29.' Covalex Shipping n’est responsable d’aucun des dommages survenant lors des activités en tant que prestataire indépendant.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000
Covalex_internaldelivery_dc_title_001=Manutentionnaire Covalex <EM4>[500–2,000 Rep]</EM4>
Criminal_RetrieveData_Reclaimer_desc=J'ai traqué une zone de données particulière et juste au moment où j'ai fait une pause, le vaisseau a été attaqué par un Reclaimer récupéré par les Nine Tails nommé le Black Kite. J'ai essayé de pirater leurs serveurs pour voir s'ils copiaient les données, mais je n'ai pas trouvé de moyen de contourner leurs protocoles de chiffrement à distance sans une clé physique.\n\nC'est là que vous entrez en jeu. J'ai besoin de quelqu'un pour pénétrer dans leur vaisseau, mettre la main sur leur clé de déchiffrement et déchiffrer le serveur afin de pouvoir récupérer les données dont j'ai besoin.\n\nVous êtes assez intelligent pour savoir à qui nous avons affaire ici, alors planifiez bien votre coup. Puisque cela risque d'en énerver plus d'un, ne laissons rien au hasard. Détruisez le Black Kite quand vous aurez fini pour couvrir nos traces.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Unknown:</EM4> 8
DataDownload_Mobi_Description=WIP J'ai entendu dire que vous étiez la bonne personne pour ce boulot, donc je vais faire court. On a localisé une station de contrefaçon d'UEC dans une vieille épave. Si vous faites vite, les UEC sont pour vous. Quelques gardes protègent le site, mais je suis sûre que vous trouverez une solution. Oh, et une dernière chose, je ne suis pas la seule à avoir cette info donc soyez prêt à vous battre.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
