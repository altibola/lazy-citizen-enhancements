Foxwell_DefendEntitesAndEscort_VH_Desc=Une intervention urgente est requise à <EM4>~mission(Location|Address)</EM4>. Une bande de criminels violents qui cherche depuis peu à se faire un nom a frappé de plein fouet l'un de nos clients les plus importants, <EM4>attaquant ses vaisseaux et ses ~mission(Objects)</EM4>. Il vous incombera d'assurer la sécurité de tout le monde et de tout ce qui s'y trouve – même si ce ne sera pas une mince affaire.\n\nJe ne saurais trop insister sur la dangerosité de ces assaillants; veillez donc à <EM>faire appel à des renforts</EM> pour les neutraliser. Si vous, l'équipage et les infrastructures s'en sortez indemnes, nous offrirons au prestataire principal <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires</EM4>. \n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Nyx]</EM4>\n- [CIV-S0-A] Tepilo\n- [CIV-S0-C] Fridan\n- [CIV-S0-C] Frost-Star SL\n- [CIV-S1-A] Gelid\n- [CIV-S1-C] ArcticStorm\n- [CIV-S1-C] Berian\n- [CIV-S1-C] Frost-Star\n- [CIV-S2-A] Aufeis\n- [CIV-S2-C] ColdSnap\n- [CIV-S2-C] Frost-Star EX\n- [CIV-S2-C] Graupel\n- [CIV-S3-A] Kragen\n- [CIV-S3-B] Elsen\n- [CIV-S3-C] Draug\n- [CIV-S3-C] Frost-Star XL\n- [CIV-S3-C] FrostBurn\n- [E-S1-A] CF-117 Bulldog Repeater\n- [E-S2-A] CF-227 Badger Repeater\n- [E-S3-A] CF-337 Panther Repeater\n- [E-S4-A] CF-447 Rhino Repeater\n- [E-S5-A] CF-557 Galdereen Repeater\n- [E-S6-A] CF-667 Mammoth Repeater\n- [MIL-S0-A] V60-26\n\n<EM4>[Pyro]</EM4>\n- [CIV-S0-B] IonWave\n- [CIV-S0-C] Radix\n- [CIV-S1-B] IonBurst\n- [CIV-S1-B] MagnaBloom\n- [CIV-S1-C] LightBlossom\n- [CIV-S1-C] PowerBolt\n- 