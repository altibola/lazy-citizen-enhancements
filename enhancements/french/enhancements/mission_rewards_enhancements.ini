LingFamily_LocalDelivery_desc_01=Bonjour,\n\nJ'espère que vous êtes disponible pour effectuer une livraison. ~mission(Contractor|Family)\n\nENLÈVEMENT DE COLIS\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> from <EM4>~mission(Pickup1|Address)</EM4>\n\nLIEU DE DÉPÔT\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> to <EM4>~mission(Dropoff1|Address)</EM4>\n\nFaites-moi savoir si vous pouvez le faire.\n\nDernière chose, ce serait une bonne idée d'apporter un <EM4>rayon tracteur portable</EM4>.\n\nMerci,\nConni Ling\nCoordinateur d'expédition\nLing Family Hauling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250
LingFamily_LocalDelivery_desc_02=Salut,\n\nNous avons besoin de quelqu'un pour effectuer une série de livraisons.~mission(Contractor|Family)\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> depuis <EM4>~mission(Pickup2|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n\nJ'espère que vous êtes disponible.\n\nDernière chose, ce serait une bonne idée d'apporter un <EM4>rayon tracteur portable</EM4>.\n\nMerci,\nConni Ling\nCoordinateur d'Expédition\nLing Family Hauling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
LingFamily_LocalDelivery_desc_03=Hey,\n\nNous avons besoin que vous gériez des livraisons pour nous. ~mission(Contractor|Family). Voici les détails :\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> depuis <EM4>~mission(Pickup2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> depuis <EM4>~mission(Pickup3|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>\n\nDernière chose, ce serait une bonne idée d'apporter un <EM4>rayon tracteur portable</EM4>.\n\nMerci, \nConni Ling\nCoordinateur d'Expédition\nLing Family Hauling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
LingFamily_LocalDelivery_desc_04=J'ai une demande de livraison pour laquelle vous pourriez être utile.\n~mission(Contractor|Family)\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> depuis <EM4>~mission(Pickup2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> depuis <EM4>~mission(Pickup3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> depuis <EM4>~mission(Pickup4|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> à <EM4>~mission(Dropoff4|Address)</EM4>\n\nDernière chose, ce serait une bonne idée d'apporter un <EM4>rayon tracteur portable</EM4>.\n\nMerci,\nConni Ling\nCoordinateur d'Expédition\nLing Family Hauling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
LingFamily_LocalDelivery_desc_05=Bonjour,\n\nJe sais que c'est Conni qui gère ce genre de choses d'habitude, mais elle est absente cet après-midi. Bref, j'ai du boulot pour vous. Si je lis correctement la facture, voici les détails de la livraison.\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> depuis <EM4>~mission(Pickup2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> depuis <EM4>~mission(Pickup3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> depuis <EM4>~mission(Pickup4|Address)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> depuis <EM4>~mission(Pickup5|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>\n     · Colis <EM4>#~mission(Item4|SerialNumber)</EM4> à <EM4>~mission(Dropoff4|Address)</EM4>\n     · Colis <EM4>#~mission(Item5|SerialNumber)</EM4> à <EM4>~mission(Dropoff5|Address)</EM4> \n\nBon courage.\n\n-Davi Ling\nPropriétaire \nLing Family Hauling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
LingFamily_LocalDelivery_desc_intro=Bonjour,\n\nNous sommes une petite entreprise familiale de livraison qui recherche actuellement de nouveaux prestataires dans la région de Crusader. \n\nSi vous souhaitez travailler avec nous, la livraison suivante serait un excellent moyen de vérifier si vous correspondez aux besoins de l'entreprise.\n\nENLÈVEMENT DE COLIS\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> from <EM4>~mission(Pickup1|Address)</EM4>\n\nLIEUX DE DÉPÔT\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> to <EM4>~mission(Dropoff1|Address)</EM4>Si tout se passe bien, vous deviendrez alors un nouveau membre de Ling Family Hauling.\n\nDernière chose, ce serait une bonne idée d'apporter un <EM4>rayon tracteur portable</EM4>.\n\nMerci, \nConni Ling\nCoordinatrice d'Expédition\nLing Family Hauling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +100
LingFamily_LocalDelivery_desc_rehire=Bonjour,\n\nJe ne suis pas très heureux de devoir faire ça, mais nous manquons de prestataires et nous avons toujours plus de livraisons à effectuer. Je suis prêt à vous donner une autre chance, mais vous devez effectuer la livraison suivante.\n\nENLÈVEMENT DE COLIS (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> depuis <EM4>~mission(Pickup1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> depuis <EM4>~mission(Pickup2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> depuis <EM4>~mission(Pickup3|Address)</EM4>\n\nLIEUX DE DÉPÔT (DANS N'IMPORTE QUEL ORDRE)\n     · Colis <EM4>#~mission(Item1|SerialNumber)</EM4> à <EM4>~mission(Dropoff1|Address)</EM4>\n     · Colis <EM4>#~mission(Item2|SerialNumber)</EM4> à <EM4>~mission(Dropoff2|Address)</EM4>\n     · Colis <EM4>#~mission(Item3|SerialNumber)</EM4> à <EM4>~mission(Dropoff3|Address)</EM4>\n\nDernière chose, ce serait une bonne idée d'apporter un <EM4>rayon tracteur portable</EM4>.\n\nMerci, \nConni Ling\nCoordinateur d'Expéditions\nLing Family Hauling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
LingFamily_LocalDelivery_title_01=ItinÉraire de Livraison Local Ling Family <EM4>[250–500 Rep]</EM4>
