Foxwell_SecurityPatrol_VE_Desc_001=Il est temps d'effectuer une patrouille de routine pour l'un de nos clients de longue date. L'itinéraire est une série de points de passage qui doivent être visités et scannés pour confirmer que tout est en ordre. Ça devrait être assez simple.  \n\nSi cela vous intéresse, veuillez accepter le contrat et vous rendre au <EM4>marqueur d'emplacement</EM4> sur votre ATH pour commencer. Si vous réussissez, le prestataire principal recevra en bonus <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires.</EM4>\n\n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sanguine" Energy Assault Rifle\n- [S1-A] Antium Arms Sand\n- [S1-A] Antium Core Sand\n- [S1-A] Antium Helmet Sand\n- [S1-A] Antium Legs Sand\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Targets x4\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_SecurityPatrol_VE_Title_001=Niveau Jaune : Patrouille de routine <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_SecurityPatrol_VH_Desc_001=Un client a besoin de notre aide. Des hors-la-loi écument certains secteurs où il fait affaire et attaquent tous ceux qu'ils croisent. Notre client a déjà perdu plusieurs vaisseaux et ne peut se permettre d'en perdre d'autres. \n\nOn a besoin de quelqu'un pour patrouiller ces zones et repérer les forces hostiles. Pour commencer, vous devez vous rendre à <EM4>l'emplacement indiqué</EM4> sur votre ATH et effectuer un scan. On vous communiquera ensuite d'autres points de patrouille à scanner. \n\nD'après nos infos, ces groupes de vaisseaux sont composés de pilotes compétents et agressifs. Préparez-vous à en découdre si vous tombez sur l'un d'entre eux. Nous vous recommandons d'avoir au moins <EM4>deux pilotes de confiance</EM4> à vos côtés pour cette mission.\n\nUne fois la patrouille terminée et réussie, le prestataire principal recevra en bonus <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires.</EM4>\n\nRestez vigilant,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sanguine" Energy Assault Rifle\n- [S1-A] Antium Arms Sand\n- [S1-A] Antium Core Sand\n- [S1-A] Antium Helmet Sand\n- [S1-A] Antium Legs Sand\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Targets x63\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_SecurityPatrol_VH_Title_001=Niveau Rouge : Patrouille de sécurité à haut risque <EM4>[BP]</EM4> <EM4>[250 Rep]</EM4>
Foxwell_ShipAmbush_E_desc_001=Un hors-la-loi en fuite est enfin revenu dans le système. Apparemment, il pensait qu'en se faisant discret pendant quelque temps, nous allions l'oublier. Il ne prend même pas la peine de dissimuler son identité ou de changer ses habitudes, ce qui signifie que nous savons exactement où il se trouve.\n\nD'après nos dernières infos, il pilote un <EM4>~mission(AmbushTarget)</EM4> et passera bientôt dans les environs de <EM4>~mission(Location|Address)</EM4>. J'ai déjà repéré un nuage d'émissions qui constituera un endroit idéal pour vous mettre à couvert, couper les moteurs de votre vaisseau et attendre. La seule inconnue est de savoir s'il sera seul ou non. Nous avons entendu dire qu'il volait parfois avec des amis qui pilotaient tous des monoplaces. Il sera important d'être le premier à frapper, car cette équipe a l'expérience du combat, mais nous aurons des renforts prêts à vous soutenir si nécessaire.\n\nSi vous réussissez, nous donnerons en bonus <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires</EM4> au prestataire principal.\n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sunstone" Energy Assault Rifle\n- [S1-A] Antium Arms Jet\n- [S1-A] Antium Core Jet\n- [S1-A] Antium Legs Jet\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x2, Hostile Wave x7, Targets x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipAmbush_E_title_001=Niveau Jaune : Frappe surprise <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_ShipAmbush_H_desc_001=Récemment, un <EM4>~mission(AmbushTarget)</EM4> a attiré une unité de Foxwell à l'aide d'une fausse balise de détresse. Lorsque nos forces ont compris ce qui se passait, plusieurs vaisseaux ont lancé une attaque dévastatrice et seul un prestataire Foxwell a survécu. Ses journaux d'analyse ont permis d'identifier le vaisseau appât, et nous avons depuis envoyé des éclaireurs pour le surveiller.\n\nNotre surveillance a révélé que l'escouade suit un schéma de vol régulier que nous pensons pouvoir exploiter. Il y a un nuage d'émissions important à <EM4>~mission(Location|Address)</EM4>, ce qui en fait un endroit idéal pour prendre position. Pensez-vous avoir les compétences nécessaires pour vous en charger ? \n\nVous serez seul face au <EM4>~mission(AmbushTarget)</EM4>, à d'autres gros vaisseaux et à une escorte importante. J'aimerais pouvoir vous en dire plus, mais cette équipe change régulièrement de vaisseaux au sein de l'escouade. Il serait judicieux d'apporter du renfort afin de ne pas être submergé par le nombre.   \n\nTerminez la mission et nous remettrons en bonus <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires</EM4> au prestataire principal.\n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sunstone" Energy Assault Rifle\n- [S1-A] Antium Arms Jet\n- [S1-A] Antium Core Jet\n- [S1-A] Antium Legs Jet\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x12, Targets x5\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipAmbush_H_title_001=Niveau Orange : Renvoyer l'Ascenseur <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
Foxwell_ShipAmbush_M_desc_001=Foxwell a suivi un <EM4>~mission(AmbushTarget)</EM4> utilisé par des hors-la-loi et a découvert un schéma dans ses déplacements. Le vaisseau devrait bientôt passer près de <EM4>~mission(Location|Address)</EM4>.\n\nNous recherchons un prestataire prêt à se rendre sur place, à se dissimuler dans le nuage d'émissions, puis à tendre un piège au moment opportun. Le <EM4>~mission(AmbushTarget)</EM4> est généralement escorté par d'autres vaisseaux. Attention à ne pas agir trop vite et à ne pas compromettre votre couverture. D'après ce que j'ai lu, l'effet de surprise est crucial.\n\nSi vous réussissez cette mission, nous enverrons au prestataire principal un bonus de <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires</EM4>.\n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sunstone" Energy Assault Rifle\n- [S1-A] Antium Arms Jet\n- [S1-A] Antium Core Jet\n- [S1-A] Antium Legs Jet\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x5, Targets x3\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Contractor:</EM4> +2,000 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipAmbush_M_title_001=Contrat de niveau Orange: Tendre une embuscade <EM4>[BP]</EM4> <EM4>[150–2,000 Rep]</EM4>
Foxwell_ShipAmbush_S_desc_001=Nous avons reçu plusieurs communications concernant des attaques récentes menées par un <EM4>~mission(AmbushTarget)</EM4> et ses vaisseaux d'escorte. Après avoir ouvert un dossier, nous avons commencé à suivre les mouvements du vaisseau et avons remarqué qu'il passait fréquemment près d'un nuage d'émission près de <EM4>~mission(Location|Address)</EM4>. Nous souhaitons utiliser cela à notre avantage pour lancer une attaque surprise. \n\nUne fois sur place, vous devrez vous cacher dans le nuage d'émissions afin de dissimuler suffisamment votre signature pour pouvoir porter le premier coup. Malheureusement, Foxwell ne peut pas fournir de renforts supplémentaires pour cette opération, vous serez donc chargé d'apporter toute aide nécessaire. Vous pourriez en avoir besoin, l'équipage du ~mission(AmbushTarget) est agressif et aguerri.        \n\nSi vous menez cette mission à bien, le prestataire principal recevra en bonus <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires</EM4>.\n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sunstone" Energy Assault Rifle\n- [S1-A] Antium Arms Jet\n- [S1-A] Antium Core Jet\n- [S1-A] Antium Legs Jet\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x6, Targets x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipAmbush_S_title_001=Niveau Rouge : Attaque surprise <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
Foxwell_ShipAmbush_VE_desc_001=Ça vous dit de nous aider à effacer un méchant ? \n\nNous avons été engagés pour traquer un hors-la-loi pilotant un <EM4>~mission(AmbushTarget)</EM4>. Ça ne devrait pas être trop difficile, car il emprunte le même itinéraire tous les jours. C'est donc une cible idéale pour une embuscade. J'ai analysé son itinéraire et déterminé que <EM4>~mission(Location|Address)</EM4> est l'endroit idéal pour frapper. Il y a un nuage d'émissions qui sera parfait pour masquer la signature de votre vaisseau pendant que vous attendrez.   \n\nLa mission est simple si ça vous intéresse. Rendez-vous à l'endroit indiqué, restez caché, coupez les moteurs et attendez son passage. Il vole parfois seul, mais il est souvent accompagné d'autres vaisseaux monoplaces. Ça ne devrait pas être trop difficile pour un pro. De plus, nous aurons des renforts à proximité, prêts à intervenir si nécessaire.\n\nSi vous réussissez, nous verserons au contractant principal un bonus de <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires</EM4>.\n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sunstone" Energy Assault Rifle\n- [S1-A] Antium Arms Jet\n- [S1-A] Antium Core Jet\n- [S1-A] Antium Legs Jet\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x6, Targets x2\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Neutral:</EM4> +500 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipAmbush_VE_title_001=Niveau Jaune : Piéger un amateur <EM4>[BP]</EM4> <EM4>[100–500 Rep]</EM4>
Foxwell_ShipAmbush_VH_desc_001=Foxwell a été informé par un client important que des hors-la-loi ont formé une escouade qui harcèle le système avec des vaisseaux sous-capitaux et des chasseurs d'escorte. Notre client craint que, si rien n'est fait, les hors-la-loi créent d'autres unités d'attaque et déstabilisent la sécurité du système. Nous avons été engagés pour éliminer ce groupe avant que cela ne se produise. \n\nNous avons besoin d'un prestataire confiant et compétent pour cette mission. La bonne nouvelle, c'est que nous avons un plan. L'un des vaisseaux utilisés par cette escouade, un <EM4>~mission(AmbushTarget)</EM4>, a été volé à notre client, qui est toujours en mesure de suivre ses mouvements. Il nous a communiqué les données de localisation et on a découvert que cette escouade se déplace souvent près de <EM4>~mission(Location|Address)</EM4>. Nous avons exploré les lieux et découvert qu'un important nuage d'émissions constituait un endroit idéal pour une embuscade.  \n\nJe ne vais pas vous mentir, ça ne va pas être facile. Nous n'avons pas de renforts à disposition, nous vous conseillons donc d'amener les vôtres. \n\nSi vous réussissez, j'ai prévu en bonus <EM4>~mission(ScripAmount) Jetons de la Guilde des Mercenaires</EM4> pour le prestataire principal.\n\nBonne chance,\n\nKevin Walton\nRépartiteur, Foxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sunstone" Energy Assault Rifle\n- [S1-A] Antium Arms Jet\n- [S1-A] Antium Core Jet\n- [S1-A] Antium Legs Jet\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 5/7 | Risk 7/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x11, Targets x4\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipAmbush_VH_title_001=Niveau Rouge : Embuscade en équipe <EM4>[BP]</EM4> <EM4>[250 Rep]</EM4>
Foxwell_ShipWaveAttack_ClearHostiles_Desc_E_001=Bon, cette mission pourrait s'avérer un peu difficile à mener tout seul, alors si vous avez des faveurs à demander, ce serait peut-être le moment de faire jouer vos relations. \n\nUne fois votre équipage prêt, rendez-vous à  ~mission(Location|Address) et éliminez les ennemis sur place. Ces salauds sont assez malins, ils ont tendance à se scinder en petits groupes. Assurez-vous de rester sur place pour ne laisser aucun survivant.\n \nBonne chance,\n\nMarcus Clenn\nFoxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x12\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipWaveAttack_ClearHostiles_Desc_H_001=On dirait que plusieurs petits gangs ont décidé de mettre leurs ressources en commun et de mener des attaques coordonnées. Seuls, ils ne représentent pas grand-chose, mais ensemble, ils constituent une menace sérieuse à laquelle il faut faire face.\n\nRecrutez des renforts sur lesquels vous pouvez compter et rendez-vous à ~mission(Location|Address). Une fois que vous aurez attaqué les membres du gang que vous y trouverez, les autres groupes arriveront à leur secours. Assurez-vous de rester sur place pour les éliminer tous.\n \nBonne chance,\n\nMarcus Clenn\nFoxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x22\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipWaveAttack_ClearHostiles_Desc_M_001=Une faction dissidente de hors-la-loi s'est séparée de l'un des principaux gangs du système et tente de voler de ses propres ailes. Au vu des ennuis qu'ils provoquent, il est clair qu'ils cherchent à se faire un nom le plus rapidement possible. C'est à vous et à vos coéquipiers de les arrêter.\n\nUne fois votre équipe prête, rendez-vous à ~mission(Location|Address) et engagez le combat contre le gang. Ils ne seront pas tous présents sur place. Attendez-vous à l'arrivée de renforts dès que vous lancerez votre attaque. Veillez donc à rester sur place jusqu'à ce que le dernier d'entre eux ait été neutralisé.\n \nBonne chance,\n\nMarcus Clenn\nFoxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x13\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipWaveAttack_ClearHostiles_Desc_VE_001=Un petit groupe de criminels s'est mis à marquer son territoire, attaquant tous les cargos qui passent à proximité. Ils se sont toutefois montrés un peu trop gourmands, car quelqu'un nous paie désormais pour nous occuper d'eux.\n\nDès que vous et vos compagnons serez prêts, rendez-vous à ~mission(Location|Address) et engagez le combat contre ces criminels. Comme ils ont l'habitude de voler en groupes séparés, veillez à rester sur place pour les éliminer jusqu'au dernier.\n \nBonne chance,\n\nMarcus Clenn\nFoxwell Enforcement\n'La sécurité, à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous caution, autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux professionnels pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
