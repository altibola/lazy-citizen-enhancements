foxwell_DefendShip_M_desc_001=J'ai un contrat de niveau orange pour tout pilote de combat disponible. Un ~mission(Ship) est attaquée autour de la ~mission(Location|Address) et a désespérément besoin d'aide. Nous ne sommes pas sûrs du nombre de malfaiteurs, mais ils semblent motivés et dangereux, alors soyez prudents. \n\nUne fois sur place, engagez et détruisez tous les hostiles que vous rencontrerez et protégez le client. Une fois qu'ils auront transféré les crédits, nous vous ferons parvenir votre paiement.\n\nMarcus Clenn\nFoxwell Enforcement\n'La sécurité à votre façon'\n\nFoxwell Enforcement est un spécialiste de la sécurité sous douane autorisé à opérer dans toute l'UEE. Nous sommes toujours à la recherche de nouveaux opérateurs pour rejoindre notre famille. Si vous ou quelqu'un que vous connaissez est intéressé, veuillez contacter l'un de nos représentants contractuels.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Blueprint Reward:</EM4> Guaranteed
