item_DescESPR_LaserCannon_S1=Fabricant : Esperia\nType d'Arme : Canon Laser\nTaille : 1\n\nLe Lightstrike I porte l'attaque à des cibles lointaines en délivrant des salves concentrées de dégâts élevés qui feront réfléchir tout agresseur avant de s'approcher trop près. Capable de fournir des options de surveillance puissantes lors du déploiement de troupes ou d'engager des cibles dans l'espace, il est facile de comprendre pourquoi le Lightstrike I était craint par les forces de l'UPE pendant la Première guerre Tevarin.\n\n--- STATS ---\nWeight: 96.0 kg\nFire Rate: 250 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 49.2 (Energy)  |  DPS: 205.2\nAmmo: 25\nRegen: 1,267/s  |  Cooldown: 1.2s  |  Cost/Shot: 52\nVelocity: 1,200 m/s  |  Range: 2.0 km\nPower Draw: 1 PU/s\nComponent HP: 550\nSignatures:  EM: 371  |  IR: 0\nOverheat Temp: 450K
