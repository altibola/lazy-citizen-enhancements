item_DescHRST_Storm_LaserRepeater_S3=Fabricant : Hurston Dynamics\nType d'Arme: Répéteur Laser\nTaille : 3\n\nHurston Dynamics s'est associé à Tumbril Land Systems pour fabriquer le puissant répéteur laser Reign-3 spécialement pour la tourelle du véhicule d'assaut Storm. Utilisant la technologie en cascade exclusive de Hurston Dynamics, le Reign-3 offre des performances accrues et un rendement énergétique supérieur lorsque le rythme frénétique des combats commence à s'intensifier.\n\n--- STATS ---\nWeight: 150.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 350.0 (Energy)  |  DPS: 2,041.7\nAmmo: 75\nRegen: 4,853/s  |  Cooldown: 0.8s  |  Cost/Shot: 84\nVelocity: 1,480 m/s  |  Range: 1.9 km\nPower Draw: 1 PU/s\nComponent HP: 1,024\nSignatures:  EM: 320  |  IR: 0\nOverheat Temp: 450K
item_DescJOKR_DistortionCannon_S1=Fabricant : Joker Engineering\nType d'Objet : Canon à Distorsion\nTaille : 1\n\nLes génies de Joker l'ont encore fait. L'auto-canon Suckerpunch Distortion est une arme à longue portée qui draine l'alimentation électrique de votre cible plutôt que d'endommager le corps physique du vaisseau, ce qui le rend idéal pour les forces de l'ordre ou d'autres applications.\n\n--- STATS ---\nWeight: 96.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 81.0 (Distort)  |  DPS: 135.0\nAmmo: 25\nRegen: 750/s  |  Cooldown: 1.6s  |  Cost/Shot: 90\nVelocity: 1,080 m/s  |  Range: 1.5 km\nPower Draw: 1 PU/s\nComponent HP: 550\nSignatures:  EM: 408  |  IR: 0\nOverheat Temp: 450K
item_DescJOKR_DistortionCannon_S2=Fabricant : Joker Engineering\nType d'Objet : Canon à Distorsion\nTaille : 2\n\nFrappez silencieusement à distance avec le Suckerpunch. Le canon à distorsion longue portée de taille deux de chez Joker draine le système d'alimentation d'une cible, la laissant impuissante à se défendre contre ce que vous avez prévu ensuite. Un choix idéal pour les forces de l'ordre, les chasseurs de primes et autres opérations non létales.\n\n--- STATS ---\nWeight: 240.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 121.5 (Energy: 0.0 / Distort: 121.5)  |  DPS: 202.5\nAmmo: 25\nRegen: 1,125/s  |  Cooldown: 1.7s  |  Cost/Shot: 135\nVelocity: 1,076 m/s  |  Range: 1.6 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 545  |  IR: 0\nOverheat Temp: 450K
item_DescJOKR_DistortionCannon_S3=Fabricant : Joker Engineering\nType d'Objet : Canon à Distorsion\nTaille : 3\n\nLorsque vous souhaitez attraper votre proie sans causer de dégâts, utilisez le Suckerpunch. Ce canon à distorsion de taille trois de chez Joker épuise le système d'alimentation de la cible, ce qui en fait un ajout non mortel excellent et efficace à votre arsenal.\n\n--- STATS ---\nWeight: 600.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 182.5 (Distort)  |  DPS: 304.2\nAmmo: 25\nRegen: 1,690/s  |  Cooldown: 1.8s  |  Cost/Shot: 203\nVelocity: 1,066 m/s  |  Range: 1.8 km\nPower Draw: 2 PU/s\nComponent HP: 1,024\nSignatures:  EM: 681  |  IR: 0\nOverheat Temp: 450K
item_DescKBAR_BallisticCannon_S1=Fabricant : KnightBridge Arms\nType d'Objet : Canon Balistique\nTaille : 1\n\nAuto-canon d'entrée de gamme de la gamme KnightBridge Arms Sword-line , le Longsword Serie 9 tire une cartouche balistique conçue pour être utilisée contre une variété d'ennemis blindés tout en permettant aux pilotes de garder une bonne distance par rapport aux cibles.\n\n--- STATS ---\nWeight: 76.8 kg\nFire Rate: 250 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 48.6 (Phys)  |  DPS: 202.5\nAmmo: 495\nVelocity: 1,200 m/s  |  Range: 2.5 km\nPower Draw: 0 PU/s\nComponent HP: 850\nSignatures:  EM: 38  |  IR: 0\nOverheat Temp: 450K
item_DescKBAR_BallisticCannon_S2=Fabricant : KnightBridge Arms\nType d'Objet : Canon Balistique\nTaille : 2\n\nKnightBridge Arms sait que lorsqu'il s'agit de bataille, avoir la bonne arme peut faire toute la différence. Avec ses puissantes cartouches balistiques, le polyvalent Greatsword Serie 10 de taille deux vous accompagnera jusqu'à la fin du conflit grâce à sa longue portée et son potentiel de dégâts élevé.\n\n--- STATS ---\nWeight: 192.0 kg\nFire Rate: 250 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 73.0 (Phys)  |  DPS: 304.1\nAmmo: 492\nVelocity: 1,196 m/s  |  Range: 2.7 km\nPower Draw: 0 PU/s\nComponent HP: 850\nSignatures:  EM: 38  |  IR: 0\nOverheat Temp: 450K
item_DescKBAR_BallisticCannon_S3=Fabricant : KnightBridge Arms\nType d'Objet : Canon Balistique\nTaille : 3\n\nLe Broadsword Serie 11 de KnightBridge Arms est l'auto-canon balistique de taille trois vers lequel se tournent les pilotes quand ils veulent trois choses : distance, fiabilité et dégâts.\n\n--- STATS ---\nWeight: 480.0 kg\nFire Rate: 250 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 109.3 (Phys)  |  DPS: 455.2\nAmmo: 489\nVelocity: 1,184 m/s  |  Range: 3.0 km\nPower Draw: 0 PU/s\nComponent HP: 2,850\nSignatures:  EM: 38  |  IR: 0\nOverheat Temp: 450K
item_DescKLWE_LaserRepeater_S1=Fabricant : Klaus & Werner\nType d'Arme : Répéteur Laser\nTaille : 1\n\nDoté d'un système de tir séquentiel à trois canons, le répéteur laser Klaus & Werner CF-117 Bulldog est capable de délivrer des tirs énergétiques à haute vitesse tout en conservant une efficacité thermique, ce qui en fait le favori des nouveaux pilotes qui équipent leur premier vaisseau.\n\n--- STATS ---\nWeight: 24.0 kg\nFire Rate: 750 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 11.3 (Energy)  |  DPS: 141.2\nAmmo: 70\nRegen: 1,355/s  |  Cooldown: 0.7s  |  Cost/Shot: 22\nVelocity: 1,500 m/s  |  Range: 1.6 km\nPower Draw: 0 PU/s\nComponent HP: 525\nSignatures:  EM: 152  |  IR: 0\nOverheat Temp: 450K
item_DescKLWE_LaserRepeater_S2=Fabricant : Klaus & Werner\nType d'Arme : Répéteur Laser\nTaille : 2\n\nLe CF-227 Badger est le répéteur laser de taille deux fiable de chez Klaus & Werner. Son rendement accru et son taux de tir élevé en font un concurrent solide dans n'importe quel combat.\n\n--- STATS ---\nWeight: 60.0 kg\nFire Rate: 750 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 26.2 (Energy)  |  DPS: 328.1\nAmmo: 75\nRegen: 2,025/s  |  Cooldown: 0.8s  |  Cost/Shot: 32\nVelocity: 1,495 m/s  |  Range: 1.7 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 203  |  IR: 0\nOverheat Temp: 450K
item_DescKLWE_LaserRepeater_S3=Fabricant : Klaus & Werner\nType d'Arme : Répéteur Laser\nTaille : 3\n\nLe CF-337 Panther est le modèle de taille trois de la gamme de répéteurs laser de Klaus & Werner. Le Panther est une véritable arme à tirer et à oublier avec une différence consommation d’énergie et dégâts respectable. Les pilotes qui équipent leurs vaisseaux de Panthers regrettent rarement cette décision.\n\n--- STATS ---\nWeight: 200.0 kg\nFire Rate: 750 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 43.6 (Energy)  |  DPS: 545.6\nAmmo: 75\nRegen: 3,031/s  |  Cooldown: 0.7s  |  Cost/Shot: 48\nVelocity: 1,480 m/s  |  Range: 1.9 km\nPower Draw: 1 PU/s\nComponent HP: 1,500\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescKLWE_LaserRepeater_S4=Fabricant : Klaus & Werner\nType d'Arme : Répéteur Laser\nTaille : 4\n\nLorsqu’un vaisseau vous fonce dessus avec un CF-447 Rhino attaché, c’est une expérience que peu de pilotes n'oublieront jamais. Ce formidable répéteur laser taille quatre de chez Klaus & Werner est bien adapté aux engagements à moyenne portée, mais il est très performant de près.\n\n--- STATS ---\nWeight: 375.0 kg\nFire Rate: 750 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 65.4 (Energy)  |  DPS: 817.9\nAmmo: 75\nRegen: 4,544/s  |  Cooldown: 0.8s  |  Cost/Shot: 73\nVelocity: 1,440 m/s  |  Range: 2.2 km\nPower Draw: 1 PU/s\nComponent HP: 1,650\nSignatures:  EM: 304  |  IR: 0\nOverheat Temp: 450K
item_DescKLWE_LaserRepeater_S5=Fabricant : Klaus & Werner\nType d'Arme : Répéteur Laser\nTaille : 5\n\n Avec une morsure aussi redoutable que son homonyme à crocs, le répéteur laser Klaus & Werner CF-557 Galdereen est un choix solide pour une large gamme de véhicules grâce à sa cadence de tir élevée et à son efficacité constante.\n\n--- STATS ---\nWeight: 938.0 kg\nFire Rate: 750 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 98.2 (Energy)  |  DPS: 1,227.4\nAmmo: 75\nRegen: 6,819/s  |  Cooldown: 0.9s  |  Cost/Shot: 109\nVelocity: 1,390 m/s  |  Range: 3.2 km\nPower Draw: 1 PU/s\nSignatures:  EM: 354  |  IR: 0\nOverheat Temp: 450K
item_DescKLWE_LaserRepeater_S6=Fabricant : Klaus & Werner\nType d'Arme : Répéteur Laser\nTaille : 6\n\n Ce terrifiant répéteur laser de Klaus & Werner est dotée de trois barils massifs qui avertissent quiconque aperçoit un vaisseau transportant le CF-667 qu’ils devraient y réfléchir à deux fois avant de d'attaquer.\n\n--- STATS ---\nWeight: 2340.0 kg\nFire Rate: 750 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 147.3 (Energy)  |  DPS: 1,841.6\nAmmo: 75\nRegen: 10,231/s  |  Cooldown: 0.9s  |  Cost/Shot: 164\nVelocity: 1,350 m/s  |  Range: 4.8 km\nPower Draw: 1 PU/s\nComponent HP: 4,224\nSignatures:  EM: 405  |  IR: 0\nOverheat Temp: 450K
item_DescKLWE_MassDriver_S1=Fabricant : Klaus & Werner\nType d'Arme: Canon Magnétique\nTaille : 1\n\nAbattez des cibles éloignées avec le Canon magnétique Sledge I. Klaus & Werner ont utilisé la technologie du canon à rail pour tirer avec précision des projectiles balistiques à haut rendement sur de longues distances. Veillez cependant à ce que chaque tir compte, car l'arme sacrifie la cadence de tir au profit de dégâts bruts et dévastateurs.\n\n--- STATS ---\nWeight: 192.0 kg\nFire Rate: 30 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 225.0 (Phys)  |  DPS: 112.5\nAmmo: 105\nVelocity: 1,155 m/s  |  Range: 3.0 km\nPower Draw: 1 PU/s\nComponent HP: 1,050\nSignatures:  EM: 540  |  IR: 0\nOverheat Temp: 450K
item_DescKLWE_MassDriver_S10=Fabricant : Klaus & Werner\nType d'Arme : Canon Magnétique\nTaille : 10\n\nConçu pour l'Aegis Idris et utilisant la technologie des canons à rails pour tirer avec précision des projectiles balistiques très puissants sur de longues distances, le canon magnétique Destroyer de Klaus & Werner s'est imposé à maintes reprises sur le champ de bataille avec des effets dévastateurs.\n\n--- STATS ---\nWeight: 700.0 kg\nFire Rate: 6 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 144,160.0 (Phys)  |  DPS: 14,416.0\nAmmo: 1,500\nVelocity: 939 m/s  |  Range: 12.0 km\nPower Draw: 5 PU/s\nComponent HP: 727,680\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescKLWE_MassDriver_S2=Fabricant : Klaus & Werner\nType d'Arme : Canon Magnétique\nTaille : 2\n\nLe Canon magnétique Klaus & Werner Sledge II est une arme balistique puissante capable de tirer plusieurs types de munitions. Les capacités accrues de pénétration des boucliers de cette arme ont toutefois un coût. L'espace du chargeur étant limité, les munitions doivent être réapprovisionnées régulièrement. Comme il n'utilise pas de projectiles à base d'énergie, le canon magnétique K&W a un coût énergétique réduit et donc une signature électromagnétique réduite.\n\n--- STATS ---\nWeight: 480.0 kg\nFire Rate: 30 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 525.0 (Phys)  |  DPS: 262.5\nAmmo: 105\nVelocity: 1,151 m/s  |  Range: 3.2 km\nPower Draw: 2 PU/s\nComponent HP: 2,050\nSignatures:  EM: 720  |  IR: 0\nOverheat Temp: 450K
item_DescKLWE_MassDriver_S3=Fabricant : Klaus & Werner\nType d'Arme : Canon Magnétique\nTaille : 3\n\nLe Sledge III est la variante de taille trois de la populaire série de canons magnétiques de Klaus & Werner. Bien que lente à tirer, l'arme allie avec succès la philosophie de l'entreprise en matière de conception simple à la technologie de pointe des canons à rail pour tirer des projectiles balistiques avec une précision chirurgicale à distance.\n\n--- STATS ---\nWeight: 1200.0 kg\nFire Rate: 30 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 1,125.0 (Phys)  |  DPS: 562.5\nAmmo: 102\nVelocity: 1,140 m/s  |  Range: 3.6 km\nPower Draw: 2 PU/s\nComponent HP: 3,050\nSignatures:  EM: 900  |  IR: 0\nOverheat Temp: 450K
item_DescKRIG_BallisticGatling_S2=Fabricant : Kruger Intergalactic\nType d'Arme: : Gatling Balistique\nTaille : 2\n\nVariante personnalisée de la gamme de canons rotatifs Tigerstrike de Kruger Intergalactic, ce puissant canon a été conçu en collaboration avec l'équipe travaillant sur le P-52 Merlin afin de s'assurer qu'il s'intègre parfaitement aux lignes gracieuses de la coque du chasseur léger tout en délivrant rapidement des tirs avec la fiabilité que l'on attend d'une arme Kruger.\n\n--- STATS ---\nWeight: 26.7 kg\nFire Rate: 1,200 RPM\nFire Modes: Auto\nAlpha Dmg: 22.5 (Phys)  |  DPS: 450.0\nAmmo: 4,626\nVelocity: 1,346 m/s  |  Range: 2.2 km\nPower Draw: 0 PU/s\nComponent HP: 850\nSignatures:  EM: 27  |  IR: 0\nOverheat Temp: 450K
item_DescKRIG_LaserCannon_S3=Fabricant : Kruger Intergalactic\nType d'Arme : Canon Laser\nTaille : 3\n\nFabriqué avec des pièces de précision forgées selon des tolérances extrêmement strictes, conçu pour une gestion thermique de premier ordre et assemblé pour dépasser toutes les normes de l'industrie, l'auto-canon laser Quarreler a été créé par Kruger Intergalactic pour une véritable fiabilité défensive.\n\n--- STATS ---\nWeight: 400.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 218.7 (Energy)  |  DPS: 546.8\nAmmo: 25\nRegen: 3,375/s  |  Cooldown: 1.8s  |  Cost/Shot: 202\nVelocity: 1,184 m/s  |  Range: 2.4 km\nPower Draw: 2 PU/s\nComponent HP: 2,850\nSignatures:  EM: 649  |  IR: 0\nOverheat Temp: 450K
item_DescKRIG_Wolf_BallisticGatling_S4=Fabricant : Kruger Intergalactic\nType d'objet : Gatling balistique\nTaille : 4\n\nLes ennemis regretteront d'être entrés dans le champ de tir du L-21 Wolf et de sa gatling sur mesure Relentless L-21. Grâce à l'ingénierie experte de Kruger, ce canon rotatif peut tirer des salves à une vitesse vertigineuse sans risque de raté.\n\n--- STATS ---\nWeight: 380.0 kg\nFire Rate: 950 RPM\nFire Modes: Auto\nAlpha Dmg: 63.0 (Phys)  |  DPS: 997.5\nAmmo: 4,200\nVelocity: 1,296 m/s  |  Range: 2.8 km\nPower Draw: 0 PU/s\nComponent HP: 2,000\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescKRIG_Wolf_LaserRepeater_S4=Fabricant : Kruger Intergalactic\nType d'Objet : Répéteur Laser\nTaille : 4\n\nSa conception minutieuse fait de l'Axiom L-22 l'armement idéal pour le L-22 Alpha Wolf. Des pièces haut de gamme et des techniques de fabrication de pointe ont permis de créer un répéteur laser conçu pour exceller dans le feu de l'action.\n\n--- STATS ---\nWeight: 280.0 kg\nFire Rate: 750 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 85.0 (Energy)  |  DPS: 1,062.5\nAmmo: 75\nRegen: 4,544/s  |  Cooldown: 0.2s  |  Cost/Shot: 73\nVelocity: 1,440 m/s  |  Range: 2.2 km\nPower Draw: 1 PU/s\nComponent HP: 1,650\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
