item_DescKRON_LaserCannon_S3=Fabricant : Kroneg\nType d'Arme : Canon Laser\nTaille : 3\n\n Infligez des dégâts massifs à distance avec la gamme de canons laser FL de Kroneg. Incarnant la philosophie de conception pratique de Kroneg, le FL-33 reste l’un des canons laser de taille trois les plus fiables et les plus destructeurs actuellement disponibles.\n\n--- STATS ---\nWeight: 750.0 kg\nFire Rate: 250 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 110.8 (Energy)  |  DPS: 461.7\nAmmo: 25\nRegen: 2,850/s  |  Cooldown: 1.8s  |  Cost/Shot: 118\nVelocity: 1,184 m/s  |  Range: 2.4 km\nPower Draw: 2 PU/s\nComponent HP: 1,024\nSignatures:  EM: 681  |  IR: 0\nOverheat Temp: 450K
item_DescMISL_S01_CS_FSKI_Spark=Fabricant : Firestorm Kinetics \nSignal de Ciblage : Surface Équivalente Radar\nTaille : 1\n\nCeux qui pensent que la taille n'a pas d'importance feraient bien de rester à l'écart du Firestorm Kinetics Spark. Utilisant l'écholocalisation, ce missile de proximité léger a une force de frappe considérable.\n\n--- STATS ---\nWeight: 63.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S01_EM_BEHR_Pioneer=Fabricant : Behring\nSignal de Ciblage : Electromagnétique\nTaille : 1\n\nBehring est fier de sa fiabilité et le Pioneer ne fait pas exception. Le système de poursuite Oracle EM mis à jour a fait ses preuves à maintes reprises dans de nombreux rapports de tests consommateurs contre des missiles de proximité de classe similaire.\n\n--- STATS ---\nWeight: 51.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S01_EM_THCN_TaskForce=Fabricant : Thermyte Concern\nSignal de Ciblage : Electromagnétique\nTaille : 1\n\nS'aventurant sur le marché des armes, Thermyte Concern a mis en commun ses connaissances approfondies en matière d'explosifs de démolition pour créer le TaskForce. Un missile de frappe léger à poursuite électromagnétique doté d'un système de propulsion haut de gamme offre un mélange efficace de vitesse et de puissance de feu qui permet de dominer le champ de bataille.\n\n--- STATS ---\nWeight: 25.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S01_IR_BEHR_Marksman=Fabricant : Behring\nSignal de Ciblage : Infrarouge\nTaille : 1\n\nLa série de missiles de proximité Marksman de Behring a acquis une réputation aussi bien pour sa capacité à suivre une large gamme de signatures thermiques que pour ses dégâts de proximité à effet de zone.\n\n--- STATS ---\nWeight: 56.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S01_IR_VNCL_Arrow=Fabricant : Vanduul\nSignal de Ciblage : Infrarouge\nTaille : 1\n\nPlus connu par son appellation militaire, le Arrow est un petit missile infrarouge devenu une arme récurrente de l'arsenal Vanduul.\n\n--- STATS ---\nWeight: 70.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S02_CS_FSKI_Tempest=Fabricant : Firestorm Kinetics\nSignal de Ciblage : Surface Équivalente Radar \nTaille : 2\n\nLe Tempest a été conçu avec rien d'autre que l'anéantissement à l'esprit. Grâce à la technologie de ciblage de FireStorm Kinetics, ce missile de proximité se verrouille sur la surface équivalente radar d'une cible pour mettre fin rapidement aux conflits.\n\n--- STATS ---\nWeight: 121.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S02_CS_THCN_StrikeForce=Fabricant : Thermyte Concern\nSignal de Ciblage : Surface Équivalente Radar\nTaille : 2\n\nLe StrikeForce est le dernier aboutissement de l'expansion de Thermyte Concern dans l'industrie des missiles. Il présente des améliorations notables en matière de conception et de ciblage de surface équivalente radar.\n\n--- STATS ---\nWeight: 72.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S02_EM_TALN_Dominator=Fabricant : Talon\nSignal de Ciblage : Électromagnétique\nTaille : 2\n\nConçu pour suivre la signature électromagnétique de l'adversaire, le missile de frappe Dominator est un ensemble d'artillerie de précision destiné à établir une domination tactique sur le champ de bataille.\n\n--- STATS ---\nWeight: 136.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S02_IR_FSKI_Ignite=Fabricant : Firestorm Kinetics\nSignal de Ciblage : Infrarouge\nTaille : 2\n\nL'Ignite est la première marque de Firestorm, un missile de frappe à recherche de chaleur qui est la définition du "Fire and Forget". Il suffit de le laisser voler et de profiter du spectacle.\n\n--- STATS ---\nWeight: 113.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S02_IR_NOVP_Rattler=Fabricant : Nova Polytechnica\nGuidage : Infrarouge\nSize: 2\n\nLe Rattler est un missile à sous-munitions économique qui plaira sans aucun doute à une large variété de pilotes. Lorsqu'il est tiré, le Rattler suit la signature infrarouge de sa cible puis lance ces sous-munitions pour affaiblir le blindage ou les boucliers, laissant la cible vulnérable à la charge utile complète qui suit.\n\n--- STATS ---\nWeight: 133.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S02_IR_VNCL_Bullet=Fabricant : Vanduul\nSignal de Ciblage : Infrarouge\nTaille : 2\n\nLes pilotes de la Navy ont développé un respect sain pour ce missile à guidage infrarouge Vanduul, désigné initialement Bullet.\n\n--- STATS ---\nWeight: 113.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S03_CS_FSKI_Arrester=Fabricant : Firestorm Kinetics\nSignal de Ciblage : Surface Équivalente Radar\nTaille : 3\n\nLe missile de proximité Firestorm Arrester utilise l'écholocalisation pour chasser sa proie et se débarrasser rapidement des ennemis qui se trouvent dans son champ de vision.\n\n--- STATS ---\nWeight: 119.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S03_EM_FSKI_Thunderbolt=Fabricant : Firestorm Kinetics\nSignal de Ciblage : Electromagnétique \nTaille : 3\n\nGrâce à la structure agile du Firestorm Thunderbolt et à son système de ciblage EM, ce missile de proximité constitue un choix solide pour une grande variété de scénarios de combat.\n\n--- STATS ---\nWeight: 119.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S03_IR_NOVP_Viper=Fabricant : Nova Pyrotechnica\nSignal de Ciblage : Infrarouge\nTaille : 3\n\nNova a travaillé dur pour s'assurer que son missile de frappe Viper à poursuite infrarouge porte bien son nom en menant des attaques agiles et meurtrières contre des cibles hostiles.\n\n--- STATS ---\nWeight: 189.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S03_IR_VNCL_Chaos=Fabricant : Vanduul\nSignal de Ciblage : Infrarouge\nTaille : 3\n\nLes instructeurs de vol Navals inclus souvent le missile thermoguidé Chaos dans les simulations d'attaques Vanduul, indiquant que sa vitesse et sa puissance impose le respect des cadets face à l'ennemi qu'ils affronteront.\n\n--- STATS ---\nWeight: 171.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S04_CS_TALN_Assailant=Fabricant : Talon\nSignal de Ciblage : Surface Équivalente Radar\nTaille : 4\n\nLe missile Assailant de Talon est une solution d'armement parfaite pour des frappes de précision contre des adversaires motivés.\n\n--- STATS ---\nWeight: 224.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S04_EM_TALN_Raptor=Fabricant : Talon\nSignal de Ciblage : Electromagnétique\nTaille : 4\n\nGrâce à un suivi électromagnétique avancé et à un vol de précision équilibré, le missile d'attaque Talon Raptor constitue un ajout redoutable à l'arsenal de n'importe quel vaisseau.\n\n--- STATS ---\nWeight: 221.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S04_IR_BEHR_Pathfinder=Fabricant : Behring\nSignal de Ciblage : Infrarouge\nTaille : 4\n\nLe missile de proximité Pathfinder est un membre constant de l'arsenal déjà robuste de Behring grâce à son système de propulsion éprouvé et à son dispositif de guidage à recherche de chaleur.\n\n--- STATS ---\nWeight: 203.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S04_IR_VNCL_Dragon=Fabricant : Vanduul\nSignal de Ciblage : Infrarouge\nTaille : 4\n\nSurnommé le Dragon, ce missile à guidage infrarouge Vanduul a une réputation effrayante gagnée suite au nombre de vaisseaux Navals abattus par sa puissance destructrice.\n\n--- STATS ---\nWeight: 212.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescMISL_S05_CS_TALN_Stalker=Fabricant : Talon\nSignal de Ciblage : Surface Équivalente Radar\nTaille : 5\n\nGrâce à son système d'écholocalisation, le Talon Stalker est devenu au fil des ans une torpille de frappe de précision dotée d'une puissance d'arrêt maximale.\n\n--- STATS ---\nWeight: 303.0 kg\nComponent HP: 50\nOverheat Temp: 450K
item_DescMISL_S05_EM_TALN_Reaper=Fabricant : Talon\nSignal de Ciblage : Electromagnétique\nTaille : 5\n\nLa torpille d'attaque Reaper se caractérise par un rapport coût/rendement destructif favorable et une suite de suivi EM Talon qui a fait ses preuves.\n\n--- STATS ---\nWeight: 326.0 kg\nComponent HP: 50\nOverheat Temp: 450K
item_DescMISL_S05_EM_TALN_Scimitar=Fabricant : Talon\nSignal de Ciblage : Electromagnétique\nTaille : 5\n\nTLe missile Scimitar repère les cibles grâce à leur signature électromagnétique pour délivrer une charge utile dévastatrice de taille cinq.\n\n--- STATS ---\nWeight: 314.0 kg\nComponent HP: 50\nOverheat Temp: 450K
item_DescMISL_S05_IR_TALN_Valkyrie=Fabricant : Talon\nSignal de Ciblage : Infrarouge\nTaille : 5\n\nL'équipe de conception des torpilles de Talon a mis tout en œuvre pour sa dernière torpille d'assaut Valkyrie en créant une solution de poussée à plusieurs niveaux avec des capacités de suivi infrarouge de pointe.\n\n--- STATS ---\nWeight: 314.0 kg\nComponent HP: 50\nOverheat Temp: 450K
item_DescMISL_S07_IR_TALN_Hellion=Fabricant : Talon\nSignal de Ciblage : Infrarouge\nTaille : 7\n\nDoté d'une charge utile importante et d'un ensemble de capteurs à tête chercheuse, le missile Hellion de Talon peut être efficace contre des agresseurs de toutes tailles.\n\n--- STATS ---\nWeight: 452.0 kg\nComponent HP: 200\nOverheat Temp: 450K
