Item_DescBEHR_LaserCannon_S4=Fabricant : Behring\nType d’Arme : Canon Laser\nTaille : 4\n\nLe Behring M6A est un auto-canon versatile à énergie haute vitesse, désigné pour garder vos ennemies à portée sans perte d'énergie.\n\n--- STATS ---\nWeight: 2250.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 615.3 (Energy)  |  DPS: 1,025.5\nAmmo: 25\nRegen: 6,330/s  |  Cooldown: 1.4s  |  Cost/Shot: 379\nVelocity: 1,152 m/s  |  Range: 2.8 km\nPower Draw: 2 PU/s\nComponent HP: 2,000\nSignatures:  EM: 792  |  IR: 0\nOverheat Temp: 450K
item_DescAEGS_EMP_Device=Fabricant : Behring\nType d'objet : Générateur IEM\n\nLe REP-8 est un générateur à impulsion IEM très apprécié. Equilibré entre recharge raisonnable et forte puissance de distorsion, il peut mettre hors d'usage les composants électroniques dans son périmètre proche. Une conception solide et éprouvée fait de cette arme de dissuasion non létal un standard dans tout l'Empire.\n\n--- STATS ---\nWeight: 4000.0 kg\nPower Draw: 1 PU/s\nComponent HP: 150\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescAEGS_EMP_Sentinel_S4=Fabricant : Behring\nType d'Objet : Générateur à impulsions\n: Taille : 4\nType de Dégâts : EMPn\nInfligez des dégâts de distorsion avec le générateur à impulsions REP-VS conçu spécialement pour le vaisseau sentinelle Aegis Vanguard. Behring a modifié la technologie du réputé REP-8 pour concevoir une arme non létale efficace qui s'intègre parfaitement à la Sentinelle.\n\n--- STATS ---\nWeight: 4000.0 kg\nPower Draw: 1 PU/s\nComponent HP: 150\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescAMRS_LaserCannon_S1=Fabricant : Amon & Reese Co.\nType d'Arme : Canon Laser\nTaille : 1\n\nL'Omnisky III est le modèle de base de la gamme des Auto-canon laser de A&R pour petits vaisseaux et a une cadence de tir comparable, une quantité de dégâts et une portée similaire aux autres armes de sa catégorie. Il utilise des composants de milieu de gamme pour sa confection, offrant une nette augmentation de son efficacité énergétique sur ses homologues moins coûteux.\n\n--- STATS ---\nWeight: 144.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 97.2 (Energy)  |  DPS: 243.0\nAmmo: 25\nRegen: 1,500/s  |  Cooldown: 0.5s  |  Cost/Shot: 90\nVelocity: 1,200 m/s  |  Range: 2.0 km\nPower Draw: 1 PU/s\nComponent HP: 550\nSignatures:  EM: 446  |  IR: 0\nOverheat Temp: 450K
item_DescAMRS_LaserCannon_S2=Fabricant : Amon & Reese Co.\nType d'Arme : Canon Laser\nTaille : 2\n\nL'OmniSky VI est un auto-canon laser de taille moyenne du fabricant A&R. Il se targue de dégâts améliorés, d'une portée et d'une consommation d'énergie accrue sur son petit frère, l'Omnisky 3, et utilise beaucoup de composants identiques ce qui le rend exactement dans le milieu de classement en termes d’efficacité.\n\n--- STATS ---\nWeight: 360.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 145.8 (Energy)  |  DPS: 364.5\nAmmo: 25\nRegen: 2,250/s  |  Cooldown: 0.5s  |  Cost/Shot: 135\nVelocity: 1,196 m/s  |  Range: 2.2 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 594  |  IR: 0\nOverheat Temp: 450K
item_DescAMRS_LaserCannon_S3=Fabricant : Amon & Reese Co.\nType d'Arme : Canon Laser\nTaille : 3\n\nL'Omnisky IX est la variante taille 3 du très populaire auto-canon laser de chez Amon & Reese. La basse fréquence de tir est compensée par sa longue portée, ce qui permet d'effectuer un déluge de feu de très loin.\n\n--- STATS ---\nWeight: 900.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 218.7 (Energy)  |  DPS: 546.8\nAmmo: 25\nRegen: 3,375/s  |  Cooldown: 0.5s  |  Cost/Shot: 202\nVelocity: 1,184 m/s  |  Range: 2.4 km\nPower Draw: 2 PU/s\nComponent HP: 1,024\nSignatures:  EM: 743  |  IR: 0\nOverheat Temp: 450K
item_DescAMRS_LaserCannon_S4=Fabricant : Amon & Reese Co.\nType d'Arme : Canon Laser\nTaille : 4\n\nLa série d'auto-canon laser de chez Amon & Reese perdure avec cet Omnisky XII. Une cadence de tir lente sur ce laser de taille 4 compensée par une puissance de feu sans commune mesure et à très bonne distance.\n\n--- STATS ---\nWeight: 280.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 327.9 (Energy)  |  DPS: 819.7\nAmmo: 25\nRegen: 5,060/s  |  Cooldown: 0.5s  |  Cost/Shot: 303\nVelocity: 1,152 m/s  |  Range: 2.8 km\nPower Draw: 1 PU/s\nComponent HP: 1,650\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescAMRS_LaserCannon_S5=Fabricant : Amon & Reese Co.\nType d'Arme : Canon Laser\nTaille : 5\n\nLa réputation d'Amon & Reese dans la fabrication d'armes puissantes et fiables provient de la série d'auto-canon laser Omnisky. Le Omnisky XV est la version taille 5 de l'arme qui servit a défendre l'Empire durant des siècles.\n\n--- STATS ---\nWeight: 5630.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 492.2 (Energy)  |  DPS: 1,230.4\nAmmo: 25\nRegen: 7,595/s  |  Cooldown: 0.5s  |  Cost/Shot: 455\nVelocity: 1,112 m/s  |  Range: 4.0 km\nPower Draw: 2 PU/s\nComponent HP: 2,500\nSignatures:  EM: 1,040  |  IR: 0\nOverheat Temp: 450K
item_DescAMRS_LaserCannon_S6=Fabricant : Amon & Reese Co.\nType d'Arme : Canon Laser\nTaille : 6\n\nSurnommé 'Augustus' par les ingénieurs de Amon & Reese d'après l'Empereur Romain qui a fonda la 'Dix huitième Légion', cet énorme auto-canon laser taille six frappe fort et sur de grandes distances, faisant de l'Omnisky XVIII une manière efficace de garder ses ennemis à distance.\n\n--- STATS ---\nWeight: 14100.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 738.4 (Energy)  |  DPS: 1,846.0\nAmmo: 25\nRegen: 11,395/s  |  Cooldown: 0.5s  |  Cost/Shot: 683\nVelocity: 1,080 m/s  |  Range: 6.0 km\nPower Draw: 2 PU/s\nComponent HP: 4,224\nSignatures:  EM: 1,190  |  IR: 0\nOverheat Temp: 450K
item_DescAMRS_ScatterGun_S3=Fabricant : Amon & Reese Co.\nIArticle : Fusil à dispersion plasma\nTaille : 3\n\nVotre vaisseau fera des ravages avec le fusil à pompe à plasma PyroBurst d'A&R. Efficace en combat rapproché, le PyroBurst pulvérise des projectiles à plasma auto-détonants, sacrifiant une précision extrême pour la saturation de la zone.\n\n--- STATS ---\nWeight: 450.0 kg\nFire Rate: 70 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 396.0 x8 (Energy)  |  DPS: 462.0\nAmmo: 75\nRegen: 2,567/s  |  Cooldown: 0.4s  |  Cost/Shot: 440\nVelocity: 844 m/s  |  Range: 1.3 km\nPower Draw: 1 PU/s\nComponent HP: 1,550\nSignatures:  EM: 450  |  IR: 0\nOverheat Temp: 450K
item_DescAPAR_BallisticGatling_S4=Fabricant : Apocalypse Arms\nType d'Arme : Gatling Balistique\nTaille : 4\n\nSi ce n'est pas cassé, ne le réparez pas. Si vous voulez le détruire, pointez un Revenant dessus. Construit de façon solide avec une base technologique centenaire, Apocalypse Arms ajoute une modification innovante sur des designs ayant effectués leurs épreuves du feu, créant une Gatling balistique qui peut délivrer la mort n'importe où. Bien qu'il soit lent à démarrer et à refroidir, la fiabilité du Revenant en faut une arme favorite pour ceux qui s'attendent à avoir des problèmes.\n\n--- STATS ---\nWeight: 2340.0 kg\nFire Rate: 900 RPM\nFire Modes: Auto\nAlpha Dmg: 189.9 (Phys)  |  DPS: 2,848.5\nAmmo: 3,801\nVelocity: 1,215 m/s  |  Range: 6.0 km\nPower Draw: 0 PU/s\nComponent HP: 16,500\nSignatures:  EM: 36  |  IR: 0\nOverheat Temp: 450K
item_DescAPAR_BallisticGatling_S6=Fabricant : Apocalypse Arms\nType d'Arme : Gatling Balistique\nTaille : 6\n\nSouvenir d'un age révolu du combat spatial, cette terrible Gatling balistique de taille six de chez Apocalypse Arms est une arme très efficace. Prenez un moment pendant que la rotation du canon Draugar se met en marche afin savourer la destruction et la ruine que vous vous apprêtez à déchaîner.\n\n--- STATS ---\nWeight: 1950.0 kg\nFire Rate: 1,200 RPM\nFire Modes: Auto\nAlpha Dmg: 142.4 (Phys)  |  DPS: 2,848.0\nAmmo: 3,309\nVelocity: 1,215 m/s  |  Range: 6.0 km\nPower Draw: 0 PU/s\nComponent HP: 4,224\nSignatures:  EM: 33  |  IR: 0\nOverheat Temp: 450K
item_DescAPAR_BallisticScatterGun_S1=Fabricant : Apocalypse Arms\nType d'Arme : Canon Balistique à Dispersion\nTaille : 1\n\nSemez la mort sur le champ de bataille avec ce Havoc de Apocalypse Arms. Ce canon à dispersion de taille un cause de gros dégâts à courte portée, en faisant une arme idéale pour achever vos ennemis.\n\n--- STATS ---\nWeight: 60.0 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 374.4 x8 (Phys)  |  DPS: 374.4\nAmmo: 2,040\nVelocity: 900 m/s  |  Range: 1.3 km\nPower Draw: 0 PU/s\nComponent HP: 1,550\nSignatures:  EM: 41  |  IR: 0\nOverheat Temp: 450K
item_DescAPAR_BallisticScatterGun_S2=Fabricant : Apocalypse Arms\nType d'Arme : Canon Balistique à Dispersion\nTaille : 2\n\nApocalypse Arms' Le Hellion est un canon balistique à dispersion de taille deux qui sature sa cible avec ses munitions balistiques à courte distance. Le fonctionnement ingénieux de son armement lui permet d'intervertir entre munitions normales et spéciales.\n\n--- STATS ---\nWeight: 150.0 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 560.0 x8 (Phys)  |  DPS: 560.0\nAmmo: 2,019\nVelocity: 897 m/s  |  Range: 1.4 km\nPower Draw: 0 PU/s\nComponent HP: 1,550\nSignatures:  EM: 41  |  IR: 0\nOverheat Temp: 450K
item_DescAPAR_BallisticScatterGun_S3=Fabricant : Apocalypse Arms\nType d'Arme : Canon Balistique à Dispersion\nTaille : 3\n\n Le canon Predator pourchasse les ennemis qui vous encerclent et les éliminent avec un barrage de munitions balistiques surpuissant. Ce redouté canon balistique taille trois de chez Apocalypse Arms échange une longue portée pour un champ de tir plus vaste.\n\n--- STATS ---\nWeight: 375.0 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 840.0 x8 (Phys)  |  DPS: 840.0\nAmmo: 1,980\nVelocity: 888 m/s  |  Range: 1.5 km\nPower Draw: 0 PU/s\nComponent HP: 1,550\nSignatures:  EM: 41  |  IR: 0\nOverheat Temp: 450K
item_DescAPAR_MassDriver_S2=Fabricant : Apocalypse Arms\nType d'Arme : Canon Magnétique\nTaille : 2\n\nC'est toujours bon d'être préparé à tout, et si un imprévu arrive, vous serez content d'avoir un Canon Magnétique d'Apocalypse Arms à disposition. Ses accélérateurs électromagnétiques puisent beaucoup de puissance, mais il le rend bien avec la vélocité dont il fait part pour tirer ses projectiles haute vitesse. Le regarder transpercer vos cibles suffit à rendre vos jours meilleurs. En revanche, soyez prudent à la surchauffe.\n\n--- STATS ---\nWeight: 600.0 kg\nFire Rate: 30 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 525.0 (Phys)  |  DPS: 262.5\nAmmo: 84\nVelocity: 1,151 m/s  |  Range: 3.2 km\nPower Draw: 2 PU/s\nComponent HP: 1,050\nSignatures:  EM: 792  |  IR: 0\nOverheat Temp: 450K
item_DescARGO_TractorBeam_S1_Cargo=Fabricant : Argo Astronautics\nType d'Objet : Rayon Tracteur\nAngle Maximal : 60°\nPortée Maximale : 150 m\nDistance à Pleine Puissance : 75 m\n\nConçu spécifiquement pour l'exosquelette ATLS, le rayon tracteur Durus d'Argo Astronautics a été soigneusement réglé pour le chargement et le déchargement de cargaisons.\n\n--- STATS ---\nWeight: 70.0 kg\nFire Modes: Rayon Tracteur\nAmmo: 0\nVelocity: 0 m/s  |  Range: 0 m\nPower Draw: 1 PU/s\nComponent HP: 1,050\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescASAD_DistortionRepeater_S1=Fabricant : Associated Science & Development\nType d'Arme : Répéteur à Distortion\nTaille : 1\n\nL'énergie est la source vitale de chaque vaisseau, et le modèle DR-Model-XJ1 de chez ASD est le choix idéal pour la drainer de vos ennemis. Ce répéteur à distorsion vous permet de perturber l'énergie dans les vaisseaux ennemis, les rendant alors inoffensifs.\n\n--- STATS ---\nWeight: 24.0 kg\nFire Rate: 400 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 25.7 (Distort)  |  DPS: 171.3\nAmmo: 75\nRegen: 750/s  |  Cooldown: 0.8s  |  Cost/Shot: 26\nVelocity: 1,350 m/s  |  Range: 1.2 km\nPower Draw: 0 PU/s\nComponent HP: 525\nSignatures:  EM: 167  |  IR: 0\nOverheat Temp: 450K
item_DescASAD_DistortionRepeater_S2=Fabricant : Associated Science & Development\nType d'Objet : Répéteur à Distorsion\nTaille : 2\n\nFaisant progresser le milieu des armes à distorsion, le répéteur DR Model-XJ2 de chez ASD fournit une perturbation tactique de l'énergie qui limitera sévèrement la capacité opérationnelle des vaisseaux ciblés.\n\n--- STATS ---\nWeight: 60.0 kg\nFire Rate: 400 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 38.5 (Distort)  |  DPS: 256.7\nAmmo: 75\nRegen: 1,123/s  |  Cooldown: 0.8s  |  Cost/Shot: 38\nVelocity: 1,346 m/s  |  Range: 1.3 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 223  |  IR: 0\nOverheat Temp: 450K
item_DescASAD_DistortionRepeater_S3=Fabricant : Associated Science & Development\nType d'Objet : Répéteur à Distorsion\nTaille : 3\n\nMettez un terme aux actions hostiles et visez les générateurs d'énergie avec le DR Model-XJ3, un répéteur à distorsion à la portée plus que correcte développé par les laboratoires de recherches avancées en armement de ASD.\n\n--- STATS ---\nWeight: 150.0 kg\nFire Rate: 400 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 57.9 (Energy: 0.0 / Distort: 57.9)  |  DPS: 386.0\nAmmo: 75\nRegen: 1,689/s  |  Cooldown: 0.8s  |  Cost/Shot: 58\nVelocity: 1,332 m/s  |  Range: 1.4 km\nPower Draw: 1 PU/s\nComponent HP: 1,024\nSignatures:  EM: 278  |  IR: 0\nOverheat Temp: 450K
item_DescBANU_TachyonCannon_S1=Fabricant : Banu\nType d'Arme : Canon à Tachyon\nTaille : 1\n\nRendu célèbre par un souli Banu, le canon à tachyon Singe consiste à fournir une puissance de feu énergétique constante et dévastatrice sur de longues distances. Bien que lents à tirer, la vitesse éclair du projectile à tachyon atteint sa cible quasi instantanément, faisant du Singe l'arme de prédilection des vaisseaux de sécurité Banu. Bien que les Banu aient oubliés les origines de la technologie de cette arme, plusieurs choix de prototypes ont menés les savants à suspecter que les Banu auraient assimilé la technologie dans leur culture, plutôt que de l'avoir inventé eux-mêmes.\n\n--- STATS ---\nWeight: 192.0 kg\nFire Rate: 90 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 202.5 (Energy)  |  DPS: 303.8\nAmmo: 25\nRegen: 1,500/s  |  Cooldown: 1.6s  |  Cost/Shot: 300\nVelocity: 1,050 m/s  |  Range: 3.0 km\nPower Draw: 1 PU/s\nComponent HP: 550\nSignatures:  EM: 594  |  IR: 0\nOverheat Temp: 450K
