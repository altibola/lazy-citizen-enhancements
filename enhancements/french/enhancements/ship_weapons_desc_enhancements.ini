item_DescRSI_LaserRepeater_S5=Fabricant : Robert Space Industries\nType d'Arme : Répéteur laser\nTaille : 5\n\nConçu pour submerger les boucliers sous un barrage de tirs laser, ce répéteur laser Echion fabriqué sur mesure par RSI neutralisera les défenses ennemies, les rendant ainsi vulnérables à des attaques plus dévastatrices.\n\n--- STATS ---\nWeight: 280.0 kg\nFire Rate: 800 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 95.0 (Energy)  |  DPS: 1,266.7\nAmmo: 225\nRegen: 4,544/s  |  Cooldown: 0.2s  |  Cost/Shot: 73\nVelocity: 1,390 m/s  |  Range: 3.2 km\nPower Draw: 1 PU/s\nComponent HP: 1,550\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
