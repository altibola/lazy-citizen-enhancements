item_Desc_HRST_Tiburon_S10_laserbeam=Constructeur : Hurston Dynamics\nType : Rayon Laser\nTaille : 10\n\nDéveloppé de concert avec les spécialistes en armement d'Aegis pour faire partie de l'équipement dédié à la lutte anti-vaisseaux capitaux du Tiburon, le Supremacy-10T combine une précision chirurgicale avec une puissance de feu dévastatrice.\n\n--- STATS ---\nWeight: 170000.0 kg\nAmmo: 60\nRegen: 1,700/s  |  Cooldown: 5.0s  |  Cost/Shot: 43\nVelocity: 1,220 m/s  |  Range: 8.0 km\nPower Draw: 2 PU/s\nComponent HP: 750,000\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_Mining_MiningLaser_Drake_Default_S0_Desc=Fabricant :Drake Interplanetary\nType d'Objet : Laser de Minage \nTaille : 1\n\nPortée Optimale : 40m\nPortée Maximale : 45m\nPuissance Laser de Minage :3150\n\nEmplacements Modules : 2\n \nRésistance : +25 %\nInstabilité du Laser : +35 %\nNiveau Matériaux Inertes :-30%\nTaille de la Fenêtre de Charge Optimale : -40%\n\nAdapté au Drake Golem, ce laser de minage a été conçu pour ceux qui débutent une carrière dans le minage. Il a été soigneusement calibré pour faciliter la tâche de l'opérateur et réduire la probabilité d'accidents catastrophiques.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,150  |  Range: 40m→45m\n<EM4>Extraction:</EM4>  DPS: 1,295  |  Range: 40m→45m\n<EM4>Modifiers:</EM4>  Instability: +35%  |  Optimal Charge Window: +40%  |  Resistance: +25%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Greycat_1_S1_Desc=Fabricant : Greycat Industrial\nType d'Objet : Laser de Minage \nTaille : 1\n\nPortée Optimale : 30m\nPortée Maximale : 90m\n\nPuissance Laser de Minage : 504 - 2520\nPuissance Laser d'Extraction : 1850\n\nEmplacements Modules : 1\n\nInstabilité du Laser : -10%\nTaux de Fenêtre de Charge Optimal : : +40%\nNiveau Matériaux Inertes : -30%\n\nTaille de la Fenêtre de Charge Optimale : -60%\n\nGreycat classe le Lancet MH1 dans la catégorie des lasers de soutien, à utiliser de préférence dans le cadre du minage à plusieurs. Alors que la petite taille de sa fenêtre de charge optimale signifie que la précision est essentielle, le Lancet MH1 excelle dans la réduction de la quantité de matériaux inertes collectés par le laser d'extraction. Pour les équipes de mineurs, c'est un laser de soutien idéal à utiliser avec d'autres lasers.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 2,520  |  Range: 30m→90m\n<EM4>Extraction:</EM4>  DPS: 1,850  |  Range: 30m→90m\n<EM4>Modifiers:</EM4>  Instability: -10%  |  Optimal Charge Window: -60%  |  Inert Filter: +30%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Greycat_1_S2_Desc=Fabricant : Greycat Industrial\nType d'Objet : Laser de Minage \nTaille : 2\n\nPortée Optimale : 45m\nPortée Maximale : 135m\n\nPuissance Laser Minier : 900 - 3600\nPuissance Laser d'Extraction : 2590\n\nEmplacements Modules : 2\n\nInstabilité du Laser : -10%\nTaux de Fenêtre de Charge Optimal : +40%\nNiveau de Matériaux Inertes : -40%\n\nTaille de la Fenêtre de Charge Optimale : -60%\n\nGreycat classe le Lancet MH2 dans la catégorie des lasers de soutien, à utiliser de préférence dans le cadre du minage à plusieurs. Alors que la petite taille de la fenêtre de charge optimale du laser minier signifie que la précision est essentielle, le Lancet MH2 excelle dans la réduction de la quantité de matériaux inertes collectés par le laser d'extraction. Pour les équipes de mineurs, c'est un laser de soutien idéal à utiliser avec d'autres lasers.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,600  |  Range: 45m→135m\n<EM4>Extraction:</EM4>  DPS: 2,590  |  Range: 45m→135m\n<EM4>Modifiers:</EM4>  Instability: -10%  |  Optimal Charge Window: -60%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Greycat_Default_S0_Desc=Fabricant : Greycat Industrial\nType d'Objet : Laser de Minage \nTaille : 0\n\nPortée Optimale : 15 m\nPortée Maximale : 20 m\nDébit de Collecte : 0,01 SCU/s\nRayon du Point de Collecte : 1 m\n\nL'Arbor est annoncé comme le plus grand laser minier de l'univers grâce aux normes rigoureuses et aux prouesses commerciales de Greycat Industrial. Le MHV reprend ce même design classique et le réinvente pour en faire un laser minier plus compacte tout en offrant des performances solides et fiables sur lesquelles les mineurs comptent désormais.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 1  |  Range: 5m→15m\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Greycat_Default_S1_Desc=Fabricant : Greycat Industrial\nType d'Objet : Laser de Minage \nTaille : 1\n\nPortée Optimale : 60m\nPortée Maximale : 180m\n\nPuissance Laser Minier : 189 - 1890\nPuissance Laser d'Extraction : 1850\n\nEmplacements Modules : 1\n\nInstabilité du Laser : -35%\nTaille de la Fenêtre de Charge Optimale : +40%\nNiveau de Matériaux Inertes : -30%\n\nRésistance : +25%\n\nL'Arbor MH1 est devenu le laser minier le plus connu de l'univers grâce aux normes rigoureuses et aux prouesses commerciales de Greycat Industrial. Ce laser a été plébiscité par les exploitations industrielles et individuelles pour son équilibre entre vitesse et sécurité, ainsi que pour son système de filtration spécial qui réduit la quantité de matériaux inertes recueillis. Greycat a capitalisé sur cette réputation en obtenant des contrats exclusifs qui ont fait de l'Arbor MH1 la tête laser standard sur la plupart des vaisseaux miniers.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 1,890  |  Range: 60m→180m\n<EM4>Extraction:</EM4>  DPS: 1,850  |  Range: 60m→180m\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Greycat_Default_S2_Desc=Fabricant : Greycat Industrial\nType d'Objet : Laser de Minage \nTaille : 2\n\nPortée Optimale : 90m\nPortée Maximale : 270m\n\nPuissance Laser Minier : 480 - 2400\nPuissance Laser d'Extraction : 2590\n\nEmplacements Modules : 2\n\nInstabilité du Laser : -35%\nTaille de la Fenêtre de Charge Optimale : +40%\nNiveau de Matériaux Inertes : -40%\n\nRésistance : +25%\n\nL'Arbor MH2 est la version taille 2 de la série de lasers miniers Arbor de Greycat. À l'instar de son petit frère, la conception solide et fiable de l'Arbor MH2 a été plébiscitée par les exploitations industrielles et individuelles pour son équilibre entre vitesse et sécurité, tout en étant dotée d'un système de filtration spécial qui réduit la quantité de matériaux inertes collectés.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 2,400  |  Range: 90m→270m\n<EM4>Extraction:</EM4>  DPS: 2,590  |  Range: 90m→270m\n<EM4>Modifiers:</EM4>  Instability: -35%  |  Optimal Charge Window: +40%  |  Resistance: +25%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Shubin_1_S1_Desc=Fabricant : Shubin Interstellar\nType d'Objet : Laser de Minage \nTaille : 1\n\nPortée Optimale : 45m\nPortée Maximale : 135m\n\nPuissance Laser Minier : 105 - 2100\nPuissance Laser d'Extraction : 1295\n\nEmplacements Modules : 1\n\nRésistance : -30%\nTaux de Fenêtre de Charge Optimal : +20%\nNiveau de Matériaux Inertes : -30%\n\nInstabilité du Laser : +10%\n\nLe Hofstede-S1 a été conçu avec une structure en maille cristalline brevetée qui atténue la résistance naturelle d'un gisement lors de l'extraction et recueille moins de matériaux inertes lors de l'extraction. Plus efficace à courte et moyenne distance mais avec une instabilité accrue, le laser doit être manipulé avec précaution.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 2,100  |  Range: 45m→135m\n<EM4>Extraction:</EM4>  DPS: 1,295  |  Range: 45m→135m\n<EM4>Modifiers:</EM4>  Instability: +10%  |  Optimal Charge Window: +60%  |  Resistance: -30%  |  Inert Filter: +30%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Shubin_1_S2_Desc=Fabricant : Shubin Interstellar\nType d'Objet : Laser de Minage \nTaille : 2\n\nPortée Optimale : 60m\nPortée Maximale : 180m\n\nPuissance Laser Minier : 336 - 3360\nPuissance Laser d'Extraction : 1295\n\nEmplacements Modules : 2\n\nRésistance : -30%\nTaux de Fenêtre de Charge Optimal : +20%\nNiveau de Matériaux Inertes : -40%\n\nInstabilité du Laser : +10%\n\nLe Hofstede-S2 a été conçu avec une structure en maille cristalline brevetée qui atténue la résistance naturelle d'un gisement lors de l'extraction et recueille moins de matériaux inertes lors de l'extraction. Plus efficace à courte et moyenne distance mais avec une instabilité accrue, le laser doit être manipulé avec précaution.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,360  |  Range: 60m→180m\n<EM4>Extraction:</EM4>  DPS: 1,295  |  Range: 60m→180m\n<EM4>Modifiers:</EM4>  Instability: +10%  |  Optimal Charge Window: +60%  |  Resistance: -30%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Shubin_2_S1_Desc=Fabricant : Shubin Interstellar\nType d'Objet : Laser de Minage \nTaille : 1\n\nPortée Optimale : 45m\nPortée Maximale : 135m\n\nPuissance Laser Minier : 378 - 2220\nPuissance Laser d'Extraction : 2220\n\nEmplacements Modules : 0\n\nRésistance : -45%\nTaille de la Fenêtre de Charge Optimale : +20%\nNiveau de Matériaux iInertes : -30%\n\nInstabilité du Laser : +35%\n\nShubin a conçu le Klein-S1 pour générer un laser puissant qui accélère le minage. Cette puissance comporte des risques supplémentaires en augmentant son instabilité, mais utilisé correctement, le Klein-S1 peut rapidement récompenser le mineur prudent.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 2,520  |  Range: 45m→135m\n<EM4>Extraction:</EM4>  DPS: 2,220  |  Range: 45m→135m\n<EM4>Modifiers:</EM4>  Instability: +35%  |  Optimal Charge Window: +20%  |  Resistance: -45%  |  Inert Filter: +30%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Shubin_2_S2_Desc=Fabricant : Shubin Interstellar\nType d'Objet : Laser de Minage \nTaille : 2\n\nPortée Optimale : 60m\nPortée Maximale : 180m\n\nPuissance Laser Minier : 720 - 3600\nPuissance Laser d'Extraction : 2775\n\nEmplacements Modules : 1\n\nRésistance : -45%\nTaille de la Fenêtre de Charge Optimale : +20%\nNiveau de Matériaux Inertes : -40%\n\nInstabilité du Laser : +35%\n\nShubin a conçu le Klein-S2 pour générer un laser puissant qui accélère le minage. Cette puissance comporte des risques supplémentaires en augmentant son instabilité, mais utilisé correctement, le Klein-S2 peut rapidement récompenser le mineur prudent.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,600  |  Range: 60m→180m\n<EM4>Extraction:</EM4>  DPS: 2,775  |  Range: 60m→180m\n<EM4>Modifiers:</EM4>  Instability: +35%  |  Optimal Charge Window: +20%  |  Resistance: -45%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Thermyte_1_S1_Desc=Fabricant : Thermyte Concern\nType d'Objet : Laser de Minage \nTaille : 1\n\nPortée Optimale : 45m\nPortée Maximale : 135m\n\nPuissance Laser Minier : 420 - 2100\nPuissance Laser d'Extraction : 2775\n\nEmplacements Modules : 2\n\nInstabilité du Laser : -10%\nTaille de la Fenêtre de Charge Optimale : +20%\nNiveau de Matériaux Inertes : -30%\n\nRésistance : +10%\nTaux de Fenêtre de Charge Optimal : -40%\n\n\nL'Impact I excelle dans une grande variété de situations. Des lentilles de focalisation spéciales facilitent l'exploitation des gisements en stabilisant le laser et en augmentant la fenêtre de charge optimale. Il y a des inconvénients, notamment une résistance accrue des gisements et une fenêtre de charge optimale qui se remplit plus lentement, mais Thermyte Concern a également prévu deux emplacements pour modules pour permettre aux mineurs de mieux adapter le laser à la tâche qu'ils ont à accomplir.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 2,100  |  Range: 45m→135m\n<EM4>Extraction:</EM4>  DPS: 2,775  |  Range: 45m→135m\n<EM4>Modifiers:</EM4>  Instability: -10%  |  Optimal Charge Window: +20%  |  Resistance: +10%  |  Inert Filter: +30%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Thermyte_1_S2_Desc=Fabricant : Thermyte Concern\nType d'Objet : Laser de Minage \nTaille : 2\n\nPortée Optimale : 60m\nPortée Maximale : 180m\n\nPuissance Laser Minier : 840 - 3360\nPuissance Laser d'Extraction : 3145\n\nEmplacements Modules : 3\n\nInstabilité du Laser : -10%\nTaille de la Fenêtre de Charge Optimale : +20%\nNiveau de Matériaux Inertes : -40%\n\nRésistance : +10%\nTaux de Fenêtre de Charge Optimal : -40%\n\nL'Impact II excelle dans une grande variété de situations. Des lentilles de focalisation spéciales facilitent l'exploitation des gisements en stabilisant le laser et en augmentant la fenêtre de charge optimale. Il y a des inconvénients, notamment une résistance accrue des gisements et une fenêtre de charge optimale qui se remplit plus lentement, mais Thermyte Concern a également prévu deux emplacements pour modules pour permettre aux mineurs de mieux adapter le laser à la tâche qu'ils ont à accomplir.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,360  |  Range: 60m→180m\n<EM4>Extraction:</EM4>  DPS: 3,145  |  Range: 60m→180m\n<EM4>Modifiers:</EM4>  Instability: -10%  |  Optimal Charge Window: +20%  |  Resistance: +10%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Thermyte_2_S1_Desc=Fabricant : Thermyte Concern\nType d'Objet : Laser de Minage \nTaille : 1\n\nPortée Optimale : 15m\nPortée Maximale : 45m\n\nPuissance Laser Minier : 630 - 3150\nPuissance Laser d'Extraction : 1850\n\nEmplacements Modules : 2\n\nRésistance : -30%\nNiveau de Matériaux Inertes : -30%\n\nTaille de la Fenêtre de Charge Optimale : -40%\n\nPour certains, une utilisation correcte de l'Helix I est devenue la marque d'un véritable professionnel de l'exploitation minière. Thermyte Concern a donné au laser une puissance impressionnante qui peut vaincre la résistance d'un gisement, mais qui nécessite également une manipulation précise pour atteindre la fenêtre de charge optimale. Déployé de préférence à courte distance, l'Helix I dispose de deux emplacements pour modules afin que les mineurs puissent adapter le laser à leurs besoins.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,150  |  Range: 15m→45m\n<EM4>Extraction:</EM4>  DPS: 1,850  |  Range: 15m→45m\n<EM4>Modifiers:</EM4>  Optimal Charge Window: -40%  |  Resistance: -30%  |  Inert Filter: +30%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Thermyte_2_S2_Desc=Fabricant : Thermyte Concern\nType d'Objet : Laser de Minage \nTaille : 2\n\nPortée Optimale : 30m\nPortée Maximale : 90m\n\nPuissance Laser Minier : 1020 - 4080\nPuissance Laser d'Extraction : 2590\n\nEmplacements Modules : 3\n\nRésistance : -30%\nNiveau de Matériaux Inertes : -40%\n\nTaille de la Fenêtre de Charge Optimale : -40%\n\nPour certains, une utilisation correcte de l'Helix II est devenue la marque d'un véritable professionnel de l'exploitation minière. Thermyte Concern a donné au laser une puissance impressionnante qui peut vaincre la résistance d'un gisement, mais qui nécessite également une manipulation précise pour atteindre la fenêtre de charge optimale. Déployé de préférence à courte distance, l'Helix II dispose de trois emplacements pour modules afin que les mineurs puissent adapter le laser à leurs besoins.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 4,080  |  Range: 30m→90m\n<EM4>Extraction:</EM4>  DPS: 2,590  |  Range: 30m→90m\n<EM4>Modifiers:</EM4>  Optimal Charge Window: -40%  |  Resistance: -30%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
