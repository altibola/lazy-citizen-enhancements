item_DescTOAG_LaserGatling_S2=Fabricant : Torral Aggregate\nType : Gatling Laser\nTaille : 2\n\nDécouvrez la technologie de pointe xi'an avec la gatling laser Thlilye, conçue par Torral Aggregate. Fabriqué exclusivement pour le Mirai Pulse, cette gatling laser entièrement automatique de taille 2 offre une cadence de tir ultra-rapide, ce qui la rend idéale pour les combats à courte portée.\n\n--- STATS ---\nWeight: 40.0 kg\nFire Rate: 1,100 RPM\nFire Modes: Auto\nAlpha Dmg: 17.1 (Energy)  |  DPS: 313.5\nAmmo: 75\nRegen: 1,742/s  |  Cooldown: 1.0s  |  Cost/Shot: 19\nVelocity: 1,346 m/s  |  Range: 1.7 km\nPower Draw: 0 PU/s\nComponent HP: 850\nSignatures:  EM: 111  |  IR: 0\nOverheat Temp: 450K
