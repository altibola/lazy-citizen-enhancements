item_DescPRAR_DistortionScatterGun_S4=Fabricant : Preacher Armaments\nType d'Arme : Canon à Distorsion à Dispersion\nTaille : 4\n\nDésactivez un vaisseau ennemi sans l'endommager avec le canon à dispersion Salvation de Preacher Armaments. Avec sa large portée et sa faible cadence de tir, ce canon à dispersion de taille quatre est particulièrement efficace à courte distance.\n\n--- STATS ---\nWeight: 750.0 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 480.0 x8 (Distort)  |  DPS: 480.0\nAmmo: 75\nRegen: 4,800/s  |  Cooldown: 0.4s  |  Cost/Shot: 120\nVelocity: 778 m/s  |  Range: 1.0 km\nPower Draw: 1 PU/s\nComponent HP: 1,650\nSignatures:  EM: 495  |  IR: 0\nOverheat Temp: 450K
item_DescPRAR_DistortionScatterGun_S5=Fabricant : Preacher Armaments\nType d'Arme : Canon à Distorsion à Dispersion\nTaille : 5\n\nFaites de gros dégâts de distorsion au corps à corps avec le fusil à dispersion Absolution de Preacher Armaments. Cette arme de taille cinq est une option de chargement idéale pour ceux qui souhaitent capturer ou aborder leur cible.\n\n--- STATS ---\nWeight: 1880.0 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 720.0 x8 (Distort)  |  DPS: 720.0\nAmmo: 75\nRegen: 7,200/s  |  Cooldown: 0.4s  |  Cost/Shot: 180\nVelocity: 751 m/s  |  Range: 1.5 km\nPower Draw: 1 PU/s\nComponent HP: 2,640\nSignatures:  EM: 578  |  IR: 0\nOverheat Temp: 450K
item_DescPRAR_DistortionScatterGun_S6=Fabricant : Preacher Armaments\nType d'Arme : Canon à Distorsion à Dispersion\nTaille : 6\n\nLe Condamnation est un canon à dispersion massif de taille six de Preacher Armaments. Ses dégâts élevés par distorsion neutralisent l'électronique, mais sa grande portée le rend moins efficace au fur et à mesure que la cible s'éloigne.\n\n--- STATS ---\nWeight: 4690.0 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 1,040.0 x8 (Distort)  |  DPS: 1,040.0\nAmmo: 75\nRegen: 10,600/s  |  Cooldown: 0.4s  |  Cost/Shot: 265\nVelocity: 729 m/s  |  Range: 2.3 km\nPower Draw: 2 PU/s\nComponent HP: 4,224\nSignatures:  EM: 660  |  IR: 0\nOverheat Temp: 450K
item_DescRSI_BallisticCannon_Meteor_Bespoke=Fabricant : RSI\nType : Canon Balistique\nTaille : 5\n\nConçu spécialement pour le Meteor, le canon balistique Leonids offre une puissance de feu redoutable destinée à submerger les assaillants qui oseraient se mettre à sa portée. RSI a habilement intégré le canon de part et d'autre du vaisseau afin qu'il s'intègre parfaitement avec les autres composants et offre une couverture totale à l'avant.\n\n--- STATS ---\nWeight: 510.0 kg\nFire Rate: 225 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 1,600.0 (Phys)  |  DPS: 6,000.0\nAmmo: 720\nVelocity: 1,112 m/s  |  Range: 5.0 km\nPower Draw: 0 PU/s\nComponent HP: 2,500\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescRSI_BallisticCannon_S8=Fabricant : RSI\nType d'objet : Canon Balistique\nTaille : 8\n\nS'appuyant sur des siècles de technologie d'armement développée par RSI, le Perseus utilise des canons Medusa de taille 8 qui délivrent des salves balistiques dévastatrices, capables de déclencher des combats aussi facilement qu'ils peuvent y mettre fin. Ces canons RSI fabriqués sur mesure excellent dans la destruction de cibles de grande taille à longue distance, ce qui en fait une arme redoutable sur le champ de bataille.\n\n--- STATS ---\nWeight: 1400.0 kg\nFire Rate: 50 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 5,400.0 (Phys)  |  DPS: 4,500.0\nAmmo: 900\nVelocity: 1,016 m/s  |  Range: 9.7 km\nPower Draw: 0 PU/s\nComponent HP: 30,000\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
