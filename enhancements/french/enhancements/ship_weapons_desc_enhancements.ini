item_DescMXOX_EMP_Device=Fabricant : MaxOx\nType d'Objet : Générateur à Impulsions\n Taille : 1\nType de Dégâts : EMPn\nLe TroMag de MaxOx est un générateur à impulsions bien conçu et fiable axé sur l'IEM. Sa popularité a augmenté au fil des ans, les pilotes cherchant des alternatives au REP-8 de Behring. Le TroMag se targue d'avoir un temps de charge plus rapide que son principal concurrent, mais son rayon d'action est plus petit, ce qui laisse les pilotes décider s'ils préfèrent la vitesse ou la taille.\n\n--- STATS ---\nWeight: 10.0 kg\nPower Draw: 1 PU/s\nComponent HP: 150\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescMXOX_NeutronCannon_S1=Fabricant : MaxOx\nType d'Arme : Canon à Neutrons\nTaille : 1\n\nLe canon à neutrons NN-13 de MaxOx offre une puissance de feu considérable au détriment de la vitesse et du rendement énergétique. On pourrait certes privilégier la vitesse, la cadence de tir et la portée au détriment des dégâts, mais cet argument n'a plus lieu d'être si un seul tir suffit pour neutraliser l'ennemi.\n\n--- STATS ---\nWeight: 32.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 101.2 (Energy)  |  DPS: 253.0\nAmmo: 25\nRegen: 1,500/s  |  Cooldown: 0.5s  |  Cost/Shot: 90\nVelocity: 765 m/s  |  Range: 1.2 km\nPower Draw: 1 PU/s\nComponent HP: 550\nSignatures:  EM: 205  |  IR: 0\nOverheat Temp: 450K
item_DescMXOX_NeutronCannon_S2=Fabricant : MaxOx\nType d'Arme : Canon à Neutrons\nTaille : 2\n\nS'appuyant sur la technologie du NN-13, le NN-15 de MaxOx offre une augmentation significative de la puissance de l'auto-canon à neutrons, conférant à chaque tir un impact dévastateur. Cette augmentation des dégâts s'accompagne toutefois d'une sollicitation accrue de votre système d'alimentation.\n\n--- STATS ---\nWeight: 80.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 152.8 (Energy)  |  DPS: 382.0\nAmmo: 25\nRegen: 2,250/s  |  Cooldown: 0.4s  |  Cost/Shot: 135\nVelocity: 762 m/s  |  Range: 1.3 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 273  |  IR: 0\nOverheat Temp: 450K
