item_DescGATS_BallisticGatling_S1=Fabricant : Gallenson Tactical Systems\nType d'Arme : Gatling Balistique\nTaille : 1\n\nBien que le GT-210 YellowJacket soit petit, il est très efficace. Cette arme balistique à grande vitesse est parfaite pour viser des cibles plus petites et plus mobiles, et son système d'approvisionnement en munitions DTX-8 élimine presque complètement les blocages d'arme dus à des munitions défectueuses.\n\n--- STATS ---\nWeight: 24.0 kg\nFire Rate: 1,600 RPM\nFire Modes: Auto\nAlpha Dmg: 7.6 (Phys)  |  DPS: 201.6\nAmmo: 4,440\nVelocity: 1,350 m/s  |  Range: 2.0 km\nPower Draw: 0 PU/s\nComponent HP: 550\nSignatures:  EM: 36  |  IR: 0\nOverheat Temp: 450K
item_DescGATS_BallisticGatling_S2=Fabricant : Gallenson Tactical Systems\nType d'Arme : Gatling Balistique\nTaille : 2\n\nLe Scorpion GT-215 est un canon rotatif de type Gatling à commande hydraulique, conçu pour tirer des projectiles plus petits à une très haute cadence de tir. Le Scorpion est conçu pour déchiqueter le blindage des cibles très rapides, sacrifiant la puissance pour une saturation absolue de la zone cible.\n\n--- STATS ---\nWeight: 60.0 kg\nFire Rate: 1,600 RPM\nFire Modes: Auto\nAlpha Dmg: 12.7 (Phys)  |  DPS: 338.7\nAmmo: 4,410\nVelocity: 1,346 m/s  |  Range: 2.2 km\nPower Draw: 0 PU/s\nComponent HP: 850\nSignatures:  EM: 36  |  IR: 0\nOverheat Temp: 450K
