item_descMining_Head_S00_Helix_SCItem=Fabricant : Thermyte Concern\nType : Laser de Minage\nTaille :S0\nGrade : B\n \nPortée Optimale : 30 m\nPortée Maximale : 30 m\nRayon de Collecte : 1 m\nDébit d'Extraction : 5 cSCU/s\n \nPuissance Transfert : 50\n \nInstabilité : 0 %\nRésistance : 0 %\nTaille de la Fenêtre de Charge Optimale : -40 %\nTaux de Fenêtre de Charge Optimal : +20 %\n Puissance min : 15%\n\nLaser minier le plus puissant, laser le plus performant\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 1  |  Range: 8m→18m\n<EM4>Modifiers:</EM4>  Optimal Charge Window: -40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_descMining_Head_S00_Hofstede_SCItem=Fabricant : Shubin Interstellar\nType : Laser de minage\nTaille : S0\nGrade : B\n\nPortée Optimale : 30 m\nPortée Maximale : 30 m\nRayon de Collecte : 1 m\nDébit d’extraction : 4 cSCU/s\n\nPuissance de Transfert : 35\n\nInstabilité : +30 %\nRésistance : -40 %\nTaille de la Fenêtre de Charge Optimale : +40 %\nVitesse de la fenêtre de charge optimale : +20 %\nPuissance Min. : 20 %\n\nIl s’agit de la tête de minage par défaut pour le ROC DS, légèrement plus puissante que l’Arbor\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 1  |  Range: 8m→18m\n<EM4>Modifiers:</EM4>  Instability: +30%  |  Optimal Charge Window: +40%  |  Resistance: -40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_descMining_Head_S00_Klein_SCItem=Fabricant : Argo Astronautics\nType d'Objet : Laser de Minage\nTaille : S0\nGrade : C\nPorté Optimale : 25 m\nPortée Maximale : 25 m\nRayon de Collecte : 1 m\nDébit d'Extraction : 4 cSCU/s\nPuissance Transfert : 35\n \nInstabilité : +30 %\nRésistance : -40 %\nTaille de la Fenêtre de Charge Optimale :+40 %\nTaux de Fenêtre de Charge Optimal :0 %\nPuissance min : 20%\n\nLe laser de minage Lawson a été développé par Argo Astronautics et réglé spécifiquement pour l'ATLS GEO afin de rendre l'extraction de ressources à partir du scaphandre aussi intuitive que possible.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 1  |  Range: 5m→15m\n<EM4>Modifiers:</EM4>  Instability: +30%  |  Optimal Charge Window: +40%  |  Resistance: -40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
