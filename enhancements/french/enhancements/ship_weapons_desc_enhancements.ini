item_DescBEHR_BallisticGatling_SF7B_S7=Fabricant : Behring\nType d'Arme : Gatling Balistique\nTaille : 7\n\nConfrontez-vous aux grands vaisseaux et découpez rapidement les plus petits avec cette Gatling balistique SF7B. Construite spécifiquement pour l'Ares Inferno Star Fighter, l'arme intègre parfaitement le corps du vaisseau. L'impressionnante puissance de tir de l'arme déchaîne des balles de haute intensité qui percent le blindage et les boucliers, en faisant un choix parfait pour les situations où saturer l'adversaire est la clé.\n\n--- STATS ---\nWeight: 5860.0 kg\nFire Rate: 900 RPM\nFire Modes: Auto\nAlpha Dmg: 292.0 (Phys)  |  DPS: 4,380.0\nAmmo: 2,994\nVelocity: 1,179 m/s  |  Range: 7.3 km\nPower Draw: 0 PU/s\nComponent HP: 6,750\nSignatures:  EM: 36  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_BallisticRepeater_S1=Fabricant : Behring\nType d'Arme : Répéteur Balistique\nTaille : 1\n\nTirant de deux canons, le SW16BR1 "Buzzsaw" peut submerger la cible à moyenne ou courte portée. L'expertise en construction de Behring permet à l'arme d'engager des combats soutenus avant de nécessiter un refroidissement, ce qui en fait un excellent répéteur balistique d'entrée de gamme.\n\n--- STATS ---\nWeight: 36.0 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 36.0 (Phys)  |  DPS: 300.0\nAmmo: 2,664\nVelocity: 1,500 m/s  |  Range: 2.0 km\nPower Draw: 0 PU/s\nComponent HP: 525\nSignatures:  EM: 40  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_BallisticRepeater_S2=Fabricant : Behring\nType d'Arme : Répéteur Balistique\nTaille : 2\n\nLe SW16BR2 Sawbuck est la contribution de Behring au marché des Répéteur Balistique. Sa configuration à double canon en tir séquentiel offre un juste milieu efficace aux pilotes recherchant une plus haute cadence de tir qu'avec un canon, mais sans la peur d'avoir la surchauffe d'une gatling.\n\n--- STATS ---\nWeight: 90.0 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 54.0 (Phys)  |  DPS: 450.0\nAmmo: 2,637\nVelocity: 1,495 m/s  |  Range: 2.2 km\nPower Draw: 0 PU/s\nComponent HP: 850\nSignatures:  EM: 40  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_BallisticRepeater_S3=Fabricant : Behring\nType d'Arme : Répéteur Balistique\nTaille : 3\n\nCanardez vous un chemin hors des problèmes avec ce répéteur balistique Behring de taille trois. Le SW16BR3 "Shredder" distribue la chaleur entre les deux canons afin qu'ils puissent tirer lorsque c'est nécessaire. Le groupement des tirs et la diminution des dégâts de l'arme la rend plus mortelle à moyenne ou courte distance.\n\n--- STATS ---\nWeight: 225.0 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 81.0 (Phys)  |  DPS: 675.0\nAmmo: 2,589\nVelocity: 1,480 m/s  |  Range: 2.4 km\nPower Draw: 0 PU/s\nComponent HP: 1,024\nSignatures:  EM: 40  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_BallisticRepeater_VNG_S2=Fabricant : Behring\nType d'Arme : Répéteur Balistique\nTaille : 2\n\nSeuls les possesseurs de Vanguard peuvent équiper cette version unique de la gamme des répéteurs balistiques de chez Behring sur le nez de leur vaisseau. Le BRVS est précautionneusement calibré afin que son barrage balistique puisse tirer assez vite pour fournir une  saturation maximale sur la cible pendant que son aération améliorée réduise la fréquence de surchauffe.\n\n--- STATS ---\nWeight: 90.0 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 54.0 (Phys)  |  DPS: 450.0\nAmmo: 2,637\nVelocity: 1,495 m/s  |  Range: 2.2 km\nPower Draw: 0 PU/s\nComponent HP: 850\nSignatures:  EM: 40  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_DistortionCannon_VNG_S2=Fabricant : Behring\nType d'Arme : Canon à Distorsion\nTaille : 2\n\nMettez hors de nuire les vaisseaux sans blesser leur équipage ou leur cargo avec l'EVSD de chez Behring. Ce canon à distorsion utilise la même technologie dominant le marché utilisée dans les autres armes Behring, mais est spécifiquement créé afin d'être installé sur le nez d'un Aegis Vanguard.\n\n--- STATS ---\nWeight: 360.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 81.0 (Distort)  |  DPS: 202.5\nAmmo: 25\nRegen: 1,125/s  |  Cooldown: 1.4s  |  Cost/Shot: 90\nVelocity: 1,076 m/s  |  Range: 1.6 km\nPower Draw: 1 PU/s\nComponent HP: 550\nSignatures:  EM: 594  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_DistortionRepeater_VNG_S2=Fabricant : Behring\nType d'Arme : Répéteur à Distorsion\nTaille : 2\n\nEmbrouillez le système électrique d'un ennemi avec l'ATVS de chez Behring. Ce répéteur à distorsion neutralisant et non létale est uniquement compatible avec le support de nez d'un Aegis Vanguard.\n\n--- STATS ---\nWeight: 90.0 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 27.0 (Distort)  |  DPS: 225.0\nAmmo: 75\nRegen: 1,125/s  |  Cooldown: 0.5s  |  Cost/Shot: 27\nVelocity: 1,346 m/s  |  Range: 1.3 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 243  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_LaserCannon_S1=Fabricant : Behring\nType d'Arme : Canon Laser\nTaille : 1\n\nLe M3A de Behring est l'entrée de gamme des auto-canon laser. La configuration de cet auto-canon offre des dégâts modestes par projectile et une cadence de tir assez faible. Étant l'offre la plus basique de leur arsenal, il comprend une faible consommation d'énergie mais pâtit d'une piètre efficacité énergétique. Il compense ses défauts en étant bon marché, un avantage que de nombreux pilotes recherchent afin d'équiper leurs vaisseaux modestement.\n\n--- STATS ---\nWeight: 144.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 182.2 (Energy)  |  DPS: 303.8\nAmmo: 25\nRegen: 1,867/s  |  Cooldown: 0.8s  |  Cost/Shot: 112\nVelocity: 1,200 m/s  |  Range: 2.0 km\nPower Draw: 1 PU/s\nComponent HP: 550\nSignatures:  EM: 348  |  IR: 0\nOverheat Temp: 450K
