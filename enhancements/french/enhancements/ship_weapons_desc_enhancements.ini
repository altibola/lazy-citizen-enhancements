item_DescBEHR_BallisticCannon_S4=Fabricant : Behring\nType d'Arme : Canon Balistique\nTaille : 4\n\nProjetant des projectiles de gros calibre à une vitesse dévastatrice, l'auto-canon balistique C-788 a été conçu pour percer le blindage des vaisseaux. Extrêmement durable et doté d'une résistance thermique exceptionnelle, le "Combine" supporte une utilisation intensive qui, malgré une cadence de tir plus lente, est un choix idéal pour attaquer des cibles plus grandes et peu maniables.\n\n--- STATS ---\nWeight: 2250.0 kg\nFire Rate: 50 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 325.0 (Phys)  |  DPS: 270.8\nAmmo: 270\nVelocity: 1,152 m/s  |  Range: 3.5 km\nPower Draw: 0 PU/s\nComponent HP: 1,650\nSignatures:  EM: 50  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_BallisticCannon_S7_Tiburon=Fabricant : Behring\nType d'objet : Canon balistique\nTaille : 7\n\nArme dédiée à la lutte anti-vaisseaux capitaux et adaptée aux besoins opérationnels du Tiburon, le canon balistique C-07T délivre une puissance de feu écrasante, prouvant que Behring continue d'innover dans tous les domaines de la technologie militaire.\n\n--- STATS ---\nWeight: 115.0 kg\nFire Rate: 35 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 4,600.0 (Phys)  |  DPS: 2,683.3\nAmmo: 800\nVelocity: 1,048 m/s  |  Range: 9.1 km\nPower Draw: 0 PU/s\nComponent HP: 6,750\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_BallisticCannon_VNG_S2=Fabricant : Behring\nType d'Arme : Canon Balistique\nTaille : 2\n\nBehring a développé le CVSA afin d'être le seul choix de canon balistique pour leur Vanguard. Cette arme a une faible cadence de tir mais envoie des projectiles à haute vélocité, ce qui est idéal pour causer des dégâts importants sur des cibles à moyenne ou longue portées.\n\n--- STATS ---\nWeight: 360.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 162.0 (Phys)  |  DPS: 405.0\nAmmo: 327\nVelocity: 1,196 m/s  |  Range: 2.7 km\nPower Draw: 0 PU/s\nComponent HP: 550\nSignatures:  EM: 50  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_BallisticGatling_Hornet_Bespoke=Fabricant : Behring\nType d'Objet : Gatling Balistique (x2)\nTaille : 5\n\nConçues en collaboration avec Anvil Aerospace pour être utilisées sur le F7C Hornet Mk II, ces deux gatlings balistiques sont destinées à être montées sur une tourelle altazimutale pour permettre un ciblage adaptatif.\n\n--- STATS ---\nWeight: 200.0 kg\nFire Rate: 1,050 RPM\nFire Modes: Auto\nAlpha Dmg: 52.7 (Phys)  |  DPS: 922.2\nAmmo: 5,250\nVelocity: 1,346 m/s  |  Range: 2.2 km\nPower Draw: 0 PU/s\nComponent HP: 1,500\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_BallisticGatling_NOVA_S5=Type : Gatling Balistique\nFabricant : Behring\nTaille : 5\n\nBrisez les rangs avec la Gatling Balistique NV57, conçu pour remplacer le canon standard du char Tumbril Nova. Soyez prêt à affronter des forces terrestres supérieures en nombre grâce à cette arme puissante, dotée d'une force de frappe supérieure et d'une cadence de tir dévastatrice.\n\n--- STATS ---\nWeight: 380.0 kg\nFire Rate: 1,200 RPM\nFire Modes: Auto\nAlpha Dmg: 162.5 (Phys)  |  DPS: 3,250.0\nAmmo: 9,600\nVelocity: 1,251 m/s  |  Range: 4.0 km\nPower Draw: 0 PU/s\nComponent HP: 4,224\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_BallisticGatling_PDC_S1=Type d'Objet : Tourelle de Gatling Balistique\nFabricant : Behring\n\nLe MRX "Torrent", technologie de défense rapprochée dernier cri, utilise un logiciel de recherche, de détection et de suivi avancé pour déclencher un barrage rapide de tirs balistiques, protégeant les vaisseaux contre les missiles, torpilles et autres menaces à grande vitesse.\n\n--- STATS ---\nWeight: 115.0 kg\nFire Rate: 1,200 RPM\nFire Modes: Auto\nAlpha Dmg: 18.0 (Phys)  |  DPS: 360.0\nAmmo: 15,000\nVelocity: 1,350 m/s  |  Range: 2.0 km\nPower Draw: 0 PU/s\nComponent HP: 850\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_BallisticGatling_S4=Fabricant : Behring\nType d'Arme : Gatling Balistique\nTaille : 4\n\nLe AD4B, la déclinaison Behring pour une gatling balistique classique, inclut un mécanisme de mise à feu en cycle de cristal au sein du système rotatif a haute vitesse afin de maximiser l'efficacité lors d'engagements soutenus avec un minimum d'erreur de tirs. La prochaine fois qu'un agresseur aggrave une situation délicate, faites leur regretter cette décision en mettant en marche cette arme efficace et écrasante.\n\n--- STATS ---\nWeight: 375.0 kg\nFire Rate: 900 RPM\nFire Modes: Auto\nAlpha Dmg: 84.4 (Phys)  |  DPS: 1,266.0\nAmmo: 5,220\nVelocity: 1,296 m/s  |  Range: 2.8 km\nPower Draw: 0 PU/s\nComponent HP: 1,650\nSignatures:  EM: 36  |  IR: 0\nOverheat Temp: 450K
