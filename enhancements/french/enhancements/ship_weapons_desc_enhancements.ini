item_DescBEHR_LaserCannon_S3=Fabricant : Behring\nType d'Arme : Canon Laser\nTaille : 3\n\nLorsque les auto-canon laser sont inventés, le M5A de chez Behring est le modèle standard à partir duquel ils sont testés, en raison de sa longue portée d'engagement et de ses faibles retombées en termes de dommages.\n\n--- STATS ---\nWeight: 900.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 410.2 (Energy)  |  DPS: 683.6\nAmmo: 25\nRegen: 4,220/s  |  Cooldown: 1.3s  |  Cost/Shot: 253\nVelocity: 1,184 m/s  |  Range: 2.4 km\nPower Draw: 1 PU/s\nComponent HP: 1,024\nSignatures:  EM: 644  |  IR: 0\nOverheat Temp: 450K
