item_DescBEHR_LaserCannon_S2=Fabricant : Behring\nType d'Arme : Canon Laser\nTaille : 2\n\nLe M4A est le deuxième auto-canon laser de chez Behring. Sa taille plus grosse signifie une consommation d'énergie accrue en échange d'une puissance augmentée. La cadence de tir et son efficacité énergétique sont comparables à ceux du modèle M3A.\n\n--- STATS ---\nWeight: 360.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 273.4 (Energy)  |  DPS: 455.6\nAmmo: 25\nRegen: 2,815/s  |  Cooldown: 0.8s  |  Cost/Shot: 168\nVelocity: 1,196 m/s  |  Range: 2.2 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 495  |  IR: 0\nOverheat Temp: 450K
