item_DescGLSN_BallisticGatling_S4=Fabricant : Inconnu\nType d'Arme : Gatling Balistique\nTaille : 4\n\nBien que ses origines exactes et son concepteur soient inconnus, le Breakneck est construit à partir d'une mitrailleuse balistique existante, puis modifié pour causer plus de dégâts. Lorsque le Breakneck commence à tirer, le fun commence.\n\n--- STATS ---\nWeight: 350.0 kg\nFire Rate: 1,100 RPM\nFire Modes: Auto\nAlpha Dmg: 52.0 (Phys)  |  DPS: 953.3\nAmmo: 10,500\nVelocity: 1,296 m/s  |  Range: 2.8 km\nPower Draw: 0 PU/s\nComponent HP: 1,800\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescGLSN_LaserRepeater_S3=Fabricant : Inconnu\nType d'Arme : Répéteur Laser\nTaille : 3\n\nBrûlez ceux qui osent se mettre en travers de votre chemin avec le Tormenter. Reconstruit à partir d'un répéteur laser existant, le Tormenter peut déclencher une véritable tempête de feu sans faire fondre le canon de l'arme.\n\n--- STATS ---\nWeight: 200.0 kg\nFire Rate: 850 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 39.5 (Energy)  |  DPS: 559.6\nAmmo: 75\nRegen: 3,031/s  |  Cooldown: 0.2s  |  Cost/Shot: 48\nVelocity: 1,480 m/s  |  Range: 1.9 km\nPower Draw: 1 PU/s\nComponent HP: 1,200\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescGMISL_S01_CS_FSKI_Spark=Fabricant : Firestorm Kinetics \nSignal de Ciblage : Surface Équivalente Radar \nTaille : 1  \n\nCeux qui pensent que la taille n'a pas d'importance feraient bien de rester à l'écart du Firestorm Kinetics Spark. Utilisant l'écholocalisation, ce missile de proximité léger a une force de frappe considérable. Note : ce missile ne peut être lancé que par des véhicules terrestres.\n\n--- STATS ---\nWeight: 63.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S01_EM_BEHR_Pioneer=Fabricant : Behring \nSignal de Ciblage : Electromagnétique \nTaille : 1  \n\nBehring est fier de sa fiabilité et le Pioneer ne fait pas exception. Le système de poursuite Oracle EM mis à jour a fait ses preuves à maintes reprises dans de nombreux rapports de tests consommateurs contre des missiles de proximité de classe similaire. Note : ce missile ne peut être lancé que par des véhicules terrestres.\n\n--- STATS ---\nWeight: 51.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S01_EM_THCN_TaskForce=Fabricant : Thermyte Concern \nSignal de Ciblage : Electromagnétique \nTaille : 1  \n\nS'aventurant sur le marché des armes, Thermyte Concern a mis en commun ses connaissances approfondies en matière d'explosifs de démolition pour créer le TaskForce. Un missile de frappe léger à poursuite électromagnétique doté d'un système de propulsion haut de gamme offre un mélange efficace de vitesse et de puissance de feu qui permet de dominer le champ de bataille. Note : ce missile ne peut être lancé que par des véhicules terrestres.\n\n--- STATS ---\nWeight: 25.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S01_IR_BEHR_Marksman=Fabricant : Behring \nSignal de Ciblage : Infrarouge\nTaille : 1  \n\nLa série de missiles de proximité Marksman de Behring a acquis une réputation aussi bien pour sa capacité à suivre une large gamme de signatures thermiques que pour ses dégâts de proximité à effet de zone. Note : ce missile ne peut être lancé que par des véhicules terrestres.\n\n--- STATS ---\nWeight: 56.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S02_CS_FSKI_Tempest=Fabricant : Firestorm Kinetics \nSignal de Ciblage : Surface Équivalente Radar \nTaille : 2  \n\nLe Tempest a été conçu avec rien d'autre que l'anéantissement à l'esprit. Grâce à la technologie de ciblage de FireStorm Kinetics, ce missile de proximité se verrouille sur la surface équivalente radar d'une cible pour mettre fin rapidement aux conflits. Note : ce missile ne peut être lancé que par des véhicules terrestres.\n\n--- STATS ---\nWeight: 121.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S02_CS_THCN_StrikeForce=Fabricant : Thermyte Concern \nSignal de Ciblage : Surface Équivalente Radar \nTaille : 2  \n\nLe StrikeForce est le dernier aboutissement de l'expansion de Thermyte Concern dans l'industrie des missiles. Il présente des améliorations notables en matière de conception et de ciblage de surface équivalente radar. Note : ce missile ne peut être lancé que par des véhicules terrestres.\n\n--- STATS ---\nWeight: 72.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S02_EM_TALN_Dominator=Fabricant : Talon \nSignal de Ciblage : Électromagnétique \nTaille : 2  \n\nConçu pour suivre la signature électromagnétique de l'adversaire, le missile de frappe Dominator est un ensemble d'artillerie de précision destiné à établir une domination tactique sur le champ de bataille. Note : ce missile ne peut être lancé que par des véhicules terrestres.\n\n--- STATS ---\nWeight: 136.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S02_IR_FSKI_Ignite=Fabricant : Firestorm Kinetics \nSignal de Ciblage : Infrarouge \nTaille : 2  \n\nL'Ignite est la première marque de Firestorm, un missile de frappe à recherche de chaleur qui est la définition du "Fire and Forget". Il suffit de le laisser voler et de profiter du spectacle. Note : ce missile ne peut être lancé que par des véhicules terrestres.\n\n--- STATS ---\nWeight: 113.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S03_EM_FSKI_Thunderbolt=Fabricant : Firestorm Kinetics \nSignal de Ciblage : Electromagnétique \nTaille : 3  \n\nGrâce à la structure agile du Firestorm Thunderbolt et à son système de ciblage EM, ce missile de proximité constitue un choix solide pour une grande variété de scénarios de combat. Note : ce missile ne peut être lancé que par des véhicules terrestres.\n\n--- STATS ---\nWeight: 449.0 kg\nComponent HP: 1,000\nOverheat Temp: 450K
item_DescGMISL_S03_IR_NOVP_Viper=Fabricant : Nova Pyrotechnica \nSignal de Ciblage : Infrarouge\nTaille : 3  \n\nNova a travaillé dur pour s'assurer que son missile de frappe Viper à poursuite infrarouge porte bien son nom en menant des attaques agiles et meurtrières contre des cibles hostiles. Note : ce missile ne peut être lancé que par des véhicules terrestres.\n\n--- STATS ---\nWeight: 133.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S04_CS_TALN_Assailant=Fabricant : Talon \nSignal de Ciblage : Surface Équivalente Radar\nTaille : 4  \n\nLe missile Assailant de Talon est une solution d'armement parfaite pour des frappes de précision contre des adversaires motivés. Note : ce missile ne peut être lancé que par des véhicules terrestres.\n\n--- STATS ---\nWeight: 224.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S04_IR_BEHR_Pathfinder=Fabricant : Behring \nSignal de Ciblage : Infrarouge \nTaille : 4  \n\nLe missile de proximité Pathfinder est un membre constant de l'arsenal déjà robuste de Behring grâce à son système de propulsion éprouvé et à son dispositif de guidage à recherche de chaleur. Note : ce missile ne peut être lancé que par des véhicules terrestres.\n\n--- STATS ---\nWeight: 203.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S05_CS_TALN_Stalker=Fabricant : Talon \nSignal de Ciblage : Surface Équivalente Radar \nTaille : 5  \n\nGrâce à son système d'écholocalisation, le Talon Stalker est devenu au fil des ans une torpille de frappe de précision dotée d'une puissance d'arrêt maximale. Note : ce missile ne peut être lancé que par des véhicules terrestres.\n\n--- STATS ---\nWeight: 303.0 kg\nComponent HP: 50\nOverheat Temp: 450K
item_DescGMISL_S05_EM_TALN_Reaper=Fabricant : Talon \nSignal de Ciblage : Electromagnétique \nTaille : 5  \n\nLa torpille d'attaque Reaper se caractérise par un rapport coût/rendement destructif favorable et une suite de suivi EM Talon qui a fait ses preuves. Note : ce missile ne peut être lancé que par des véhicules terrestres.\n\n--- STATS ---\nWeight: 326.0 kg\nComponent HP: 50\nOverheat Temp: 450K
item_DescGMISL_S05_EM_TALN_Scimitar=Fabricant : Talon \nSignal de Ciblage : Electromagnétique \nTaille : 5  \n\nTLe missile Scimitar repère les cibles grâce à leur signature électromagnétique pour délivrer une charge utile dévastatrice de taille cinq. Note : ce missile ne peut être lancé que par des véhicules terrestres.\n\n--- STATS ---\nWeight: 314.0 kg\nComponent HP: 50\nOverheat Temp: 450K
item_DescGMISL_S05_IR_TALN_Valkyrie=Fabricant : Talon \nSignal de Ciblage : Infrarouge \nTaille : 5  \n\nL'équipe de conception des torpilles de Talon a mis tout en œuvre pour sa dernière torpille d'assaut Valkyrie en créant une solution de poussée à plusieurs niveaux avec des capacités de suivi infrarouge de pointe. Note : ce missile ne peut être lancé que par des véhicules terrestres.\n\n--- STATS ---\nWeight: 314.0 kg\nComponent HP: 50\nOverheat Temp: 450K
item_DescGMISL_S07_IR_TALN_Hellion=Fabricant : Talon \nSignal de Ciblage : Infrarouge \nTaille : 7  \n\nDoté d'une charge utile importante et d'un ensemble de capteurs à tête chercheuse, le missile Hellion de Talon peut être efficace contre des agresseurs de toutes tailles. Note : ce missile ne peut être lancé que par des véhicules terrestres.\n\n--- STATS ---\nWeight: 452.0 kg\nComponent HP: 200\nOverheat Temp: 450K
item_DescGMISL_S09_CS_TALN_Argos=Fabricant : Talon \nSignal de Ciblage : Surface Équivalente Radar \nTaille : 9  \n\nLa torpille de frappe Talon Argos présente une conception classique et directe qui s'appuie sur des normes de fabrication rigoureuses et un système de ciblage à surface à équivalente radar classique. Note : ce missile ne peut être lancé que par des véhicules terrestres.\n\n--- STATS ---\nWeight: 449.0 kg\nComponent HP: 667\nOverheat Temp: 450K
item_DescGMISL_S09_EM_TALN_Seeker=Fabricant : Talon \nSignal de Ciblage : Electromagnétique \nTaille : 9  \n\nLa torpille Seeker de Talon est une torpille de précision à ciblage EM capable de délivrer une charge utile massive rapidement et avec précision. Note : ce missile ne peut être lancé que par des véhicules terrestres.\n\n--- STATS ---\nWeight: 447.0 kg\nComponent HP: 667\nOverheat Temp: 450K
item_DescGMISL_S09_IR_TALN_Typhoon=Fabricant : Talon \nSignal de Ciblage : Infrarouge \nTaille : 9  \n\nConçue par Talon, la torpille de frappe à recherche de chaleur Typhoon délivre une lourde charge utile qui dissuadera toute nouvelle action hostile. Note : ce missile ne peut être lancé que par des véhicules terrestres.\n\n--- STATS ---\nWeight: 452.0 kg\nComponent HP: 667\nOverheat Temp: 450K
item_DescGRIN_TractorBeam_002_shared=Fabricant : Greycat Industrial\nType d'Objet : Rayon tracteur\nAngle Maximal : 60°\nPortée Maximale : 150 m\nDistance à Pleine Puissance : 75 m\n\nGarantie par la certification Soft-Touch®, le rayon tracteur Greycat's SureGrip est la référence de la gamme grâce à sa fiabilité et son maniement.\n\n--- STATS ---\nWeight: 100.0 kg\nFire Modes: Rayon Tracteur\nAmmo: 0\nVelocity: 0 m/s  |  Range: 0 m\nPower Draw: 3 PU/s\nComponent HP: 1,050\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescGRIN_TractorBeam_002_shared_UT1=Fabricant : Greycat Industrial\nType d'Objet : Rayon tracteur\nAngle Maximal : 60°\nPortée Maximale : 130m\nDistance à pleine puissance : 55m\n\n Cette version renforcée du Rayon tracteur SureGrip de Greycat sacrifie la portée en échange d'un boost de puissance afin de déplacer des objets plus volumineux et plus lourds, ce qui en fait un outil essentiel dans diverses applications industrielles.\n\n--- STATS ---\nWeight: 100.0 kg\nFire Modes: Rayon Tracteur\nAmmo: 0\nVelocity: 0 m/s  |  Range: 0 m\nPower Draw: 3 PU/s\nComponent HP: 1,050\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescGRIN_TractorBeam_002_shared_UT2=Fabricant : Greycat Industrial\nAngle Maximal : 80°\nPortée Maximale :130m\nDistance à Pleine Puissance : 55m\n\n Cette variante de précision du Rayon tracteur Greycat's SureGrip sacrifie la puissance du modèle d'origine en échange d'un angle de manipulation élargi d'une meilleur poignée, permettant la manipulation minutieuse d'objets délicats.\n\n--- STATS ---\nWeight: 100.0 kg\nFire Modes: Rayon Tracteur\nAmmo: 0\nVelocity: 0 m/s  |  Range: 0 m\nPower Draw: 3 PU/s\nComponent HP: 1,050\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescGRIN_TractorBeam_003_shared=Fabricant : Greycat Industrial\nType d'Objet : Rayon tracteur\nAngle Maximal : 80°\nPortée Maximale : 135m\nDistance à Pleine Puissance : 50m\n\n Le Rayon Tracteur Viselock est une évolution de la technologie standard de Greycat, avec des améliorations supplémentaires à destination des services de sécurité voulant retenir leurs cibles. Avec ce design, Greycat sacrifie la portée à longue distance pour offrir une résistance dont il est difficile de s'extirper.\n\n--- STATS ---\nWeight: 100.0 kg\nFire Modes: Rayon Tracteur\nAmmo: 0\nVelocity: 0 m/s  |  Range: 0 m\nPower Draw: 3 PU/s\nComponent HP: 1,050\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescGRIN_TractorBeam_004_S3=Fabricant : Greycat Industrial\nType : Rayon Remorqueur\nAngle Maximal :160°\nPortée Maximale : 250m\nDistance à Pleine Puissance :  200 m\n\nLe choix sûr et sécurisé des équipes de sauvetage dans tout l'empire, le rayon remorqueur SafeTown de Greycat Industrial offre assez d'énergie, de puissance et de contrôle pour remorquer n'importe quelle grosse cargaison ou vaisseau à travers le 'Verse.\n\n--- STATS ---\nWeight: 100.0 kg\nFire Modes: Rayon Tracteur\nAmmo: 0\nVelocity: 0 m/s  |  Range: 0 m\nPower Draw: 3 PU/s\nComponent HP: 1,050\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescGRIN_TractorBeam_S1=Fabricant : Greycat Industrial\nType d'Objet : Rayon Tracteur\n\nLe dernier né de la gamme de rayon tracteur de Greycat, qui a fait ses preuves sur le terrain, est un ajout fiable à son catalogue. Hormis un rapport de traction plus efficace, le dernier modèle n'apporte que peu d'améliorations par rapport aux modèles précédents. Le SureGrip est paramétré pour cibler et extraire tous les éléments, des fragments d'astéroïdes aux membres d'équipage à la dérive, et bénéficie de la garantie certifiée Soft-Touch® de Greycat.\n\n--- STATS ---\nWeight: 200.0 kg\nFire Modes: Rayon Tracteur\nAmmo: 0\nVelocity: 0 m/s  |  Range: 0 m\nPower Draw: 4 PU/s\nComponent HP: 1,050\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_BallisticCannon_S7=Type d'objet : Canon Balistique\nFabricant : Hurston Dynamics\nTaille : 7\n\nPartez à la conquête des cieux avec le canon balistique Conqueror-7 de Hurston Dynamics. Conçus sur mesure pour la tourelle dorsale de l'Aegis Idris, ces canons sont capables d'engager à distance des vaisseaux plus imposants et de mettre fin aux combats avant même qu'ils ne commencent.\n\n--- STATS ---\nWeight: 115.0 kg\nFire Rate: 50 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 4,000.0 (Phys)  |  DPS: 3,333.3\nAmmo: 800\nVelocity: 1,048 m/s  |  Range: 9.1 km\nPower Draw: 0 PU/s\nComponent HP: 6,750\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserBeam_S10_Bespoke=Fabricant : Hurston Dynamics\nType : Rayon Laser\nTaille : 10\n \nConçue en collaboration avec les ingénieurs d'Aegis, cette arme laser sur mesure de Hurston Dynamics est extrêmement précise, dotant l'Idris-K d'une arme dévastatrice.\n\n--- STATS ---\nAmmo: 60\nRegen: 1,700/s  |  Cooldown: 5.0s  |  Cost/Shot: 43\nVelocity: 1,200 m/s  |  Range: 8.0 km\nPower Draw: 1 PU/s\nComponent HP: 750,000\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserRepeater_S1=Fabricant : Hurston Dynamics\nType d'Arme : Répéteur Laser\nTaille : 1\n\nLe répéteur laser Attrition-1 de Hurston Dynamics est doté de la technologie cascade unique qui offre des performances accrues tout en maintenant un tir laser soutenu. Le résultat est une arme de taille 1 qui récompense un opérateur habile.\n\n--- STATS ---\nWeight: 24.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 34.0 (Energy)  |  DPS: 198.3\nAmmo: 75\nRegen: 2,155/s  |  Cooldown: 0.7s  |  Cost/Shot: 37\nVelocity: 1,500 m/s  |  Range: 1.6 km\nPower Draw: 0 PU/s\nComponent HP: 524\nSignatures:  EM: 167  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserRepeater_S2=Fabricant : Hurston Dynamics\nType d'Arme : Répéteur Laser\nTaille : 2\n\nLorsque la bataille s'intensifie, c'est là que la technologie laser cascade de Hurston Dynamics brille vraiment. Avec le répéteur Attrition-2 de taille deux, un opérateur peut utiliser des rafales soutenues de tir laser afin de traduire l'excès de chaleur en des performances d'arme supérieures.\n\n--- STATS ---\nWeight: 60.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 55.0 (Energy)  |  DPS: 320.8\nAmmo: 75\nRegen: 3,232/s  |  Cooldown: 0.7s  |  Cost/Shot: 55\nVelocity: 1,495 m/s  |  Range: 1.7 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 223  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserRepeater_S3=Fabricant : Hurston Dynamics\nType d'Arme : Répéteur Laser\nTaille : 3\n\nPlutôt que de limiter les performances de leur arme pour augmenter la stabilité, la technologie cascade d'Hurston Dynamics permet à l'opérateur de décider. Bien que la surchauffe soit un risque, des périodes plus longues de tir soutenu avec le répéteur laser Attrition-3 augmenteront les performances à mesure que l'excès de chaleur se traduit par une plus grande production d'énergie.\n\n--- STATS ---\nWeight: 150.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 86.0 (Energy)  |  DPS: 501.7\nAmmo: 75\nRegen: 4,853/s  |  Cooldown: 0.7s  |  Cost/Shot: 84\nVelocity: 1,480 m/s  |  Range: 1.9 km\nPower Draw: 1 PU/s\nComponent HP: 1,024\nSignatures:  EM: 278  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserRepeater_S4=Fabricant : Hurston Dynamics\nType d'Arme : Répéteur Laser\nTaille : 4\n\nHurston Dynamics a pleinement intégré sa technologie de laser cascade dans sa gamme de répéteurs Attrition. La taille quatre Attrition-4 ne fait pas exception, fonctionnant à des performances optimales lorsqu'elle est proche de sa capacité thermique maximale.\n\n--- STATS ---\nWeight: 375.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 150.0 (Energy)  |  DPS: 875.0\nAmmo: 75\nRegen: 3,000/s  |  Cooldown: 0.8s  |  Cost/Shot: 125\nVelocity: 1,440 m/s  |  Range: 2.2 km\nPower Draw: 1 PU/s\nComponent HP: 1,650\nSignatures:  EM: 334  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserRepeater_S5=Fabricant : Hurston Dynamics\nType d'Arme : Répéteur Laser\nTaille : 5\n\nPlus qu'un simple répéteur laser de taille cinq, l'Attrition-5 de Hurston Dynamics intègre une technologie cascade avancée permettant au canon d'obtenir des améliorations de performances significatives plus il maintient sa production d'énergie.\n\n--- STATS ---\nWeight: 938.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 150.0 (Energy)  |  DPS: 875.0\nAmmo: 75\nRegen: 10,914/s  |  Cooldown: 0.8s  |  Cost/Shot: 187\nVelocity: 1,390 m/s  |  Range: 3.2 km\nPower Draw: 1 PU/s\nComponent HP: 2,640\nSignatures:  EM: 390  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserRepeater_S6=Fabricant : Hurston Dynamics\nType d'Arme : Répéteur Laser\nTaille : 6\n\nAvec la technologie cascade de Hurston Dynamics, le répéteur laser Attrition-6 maximise son potentiel de combat. Il est courant que les armes chauffent lorsqu'elles sont fortement utilisées en combat, mais ce qui distingue ce répéteur de taille six, c'est que l'énergie thermique se traduit directement par une force offensive accrue.\n\n--- STATS ---\nWeight: 2340.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 505.4 (Energy)  |  DPS: 2,947.9\nAmmo: 75\nRegen: 16,377/s  |  Cooldown: 0.8s  |  Cost/Shot: 281\nVelocity: 1,350 m/s  |  Range: 4.8 km\nPower Draw: 1 PU/s\nComponent HP: 4,224\nSignatures:  EM: 446  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserScattergun_S1=Fabricant : Hurston Dynamics\nType d'Arme : Canon Laser à Dispersion\nTaille : 1\n\nGrâce à l'intégration de la technologie laser cascade de Hurston Dynamics, le canon à dispersion Dominance-1 est capable d'infliger des dégâts d'autant plus importants que la taille de l'arme se rapproche de sa capacité thermique maximale de sécurité.\n\n--- STATS ---\nWeight: 48.0 kg\nFire Rate: 50 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 504.0 x8 (Energy)  |  DPS: 420.0\nAmmo: 75\nRegen: 1,867/s  |  Cooldown: 0.3s  |  Cost/Shot: 70\nVelocity: 900 m/s  |  Range: 999 m\nPower Draw: 1 PU/s\nComponent HP: 1,550\nSignatures:  EM: 248  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserScattergun_S2=Fabricant : Hurston Dynamics\nType d'Arme : Canon Laser à Dispersion\nTaille : 2\n\nPlus le combat est difficile, plus le fusil à dispersion Dominance-2 est efficace. À mesure que ses niveaux thermiques augmentent, l'arme de taille deux de Hurston Dynamics est capable d'utiliser la technologie en cascade pour transformer ce potentiel thermique en une attaque rapprochée encore plus meurtrière.\n\n--- STATS ---\nWeight: 120.0 kg\nFire Rate: 50 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 792.0 x8 (Energy)  |  DPS: 660.0\nAmmo: 75\nRegen: 2,933/s  |  Cooldown: 0.3s  |  Cost/Shot: 110\nVelocity: 897 m/s  |  Range: 1.1 km\nPower Draw: 1 PU/s\nComponent HP: 1,550\nSignatures:  EM: 330  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserScattergun_S3=Fabricant : Hurston Dynamics\nType d'Arme : Canon Laser à Dispersion\nTaille : 3\n\nLe canon à dispersion Dominance-3 de Hurston Dynamics présente la technologie en cascade du fabricant d'armes. Plus l'opérateur continue à tirer avec l'arme de taille trois, plus celle-ci est capable de convertir la chaleur générée en attaques de plus en plus dévastatrices.\n\n--- STATS ---\nWeight: 300.0 kg\nFire Rate: 50 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 1,116.0 x8 (Energy)  |  DPS: 930.0\nAmmo: 75\nRegen: 4,133/s  |  Cooldown: 0.4s  |  Cost/Shot: 155\nVelocity: 888 m/s  |  Range: 1.2 km\nPower Draw: 1 PU/s\nComponent HP: 1,550\nSignatures:  EM: 413  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_Nova_BallisticCannon_S5=Fabricant : Hurston Dynamics\nType d'arme: Canon Ballistique\nTaille : 5\n\nConçu spécifiquement pour le char Nova, Le canon balistique Slayer de Hurston Dynamics a acquis son illustre réputation grâce à d'innombrables engagements sur le champ de bataille au cours de la Deuxième Guerre tevarine. Ce monstre du champ de bataille excelle contre les cibles blindées et les emplacements fortifiés en tirant des obus d'artillerie de gros calibre avec une précision et une vitesse stupéfiantes. Hurston a travaillé en étroite collaboration avec Tumbril lorsque le fabricant de chars a décidé de relancer le Nova. Tout en respectant scrupuleusement le design original du Slayer, Hurston l'a également modernisé pour le 30e siècle en améliorant la vitesse du pivot, la résistance à la chaleur et les logiciels associés afin de fournir une interface utilisateur de pointe pour les artilleurs.\n\n--- STATS ---\nWeight: 7500.0 kg\nFire Rate: 12 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 13,500.0 (Phys)  |  DPS: 2,700.0\nAmmo: 363\nVelocity: 973 m/s  |  Range: 6.0 km\nPower Draw: 0 PU/s\nComponent HP: 20,000\nSignatures:  EM: 50  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_Pyro_LaserRepeater_S1=Fabricant : Hurston Dynamics\nType d'Arme : Répéteur Laser\nTaille : 1\n\nCe répéteur laser Ardor-1 a été recyclé dans le système Pyro. Fabriquée pour la première fois en 2724, la série Ardor est devenue populaire grâce à la conception de son canon en deux parties qui permettait d'atténuer la chaleur lors des tirs. Hurston a fini par arrêter la fabrication de cette arme au profit de la gamme de répéteurs laser Attrition. Malgré les effets du temps et de l'utilisation constante, l'arme est toujours recherchée en raison des performances constantes fournies par la conception experte et la construction solide d'Hurston Dynamic.\n\n--- STATS ---\nWeight: 24.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 36.0 (Energy)  |  DPS: 210.0\nAmmo: 75\nRegen: 1,875/s  |  Cooldown: 0.7s  |  Cost/Shot: 64\nVelocity: 1,500 m/s  |  Range: 1.6 km\nPower Draw: 0 PU/s\nComponent HP: 524\nSignatures:  EM: 167  |  IR: 0\nOverheat Temp: 450K
