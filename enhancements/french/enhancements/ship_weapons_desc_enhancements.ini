item_DescBEHR_LaserCannon_S5=Fabricant : Behring\nType d'Arme : Canon Laser\nTaille : 5\n\nCet auto-canon à énergie polyvalent et longue distance est le dernier de la gamme M de chez Behring. Le M7A est conçu pour agir comme un puissant moyen de dissuasion, de moyenne à longue distance. Le nouveau système de lentille AC8 réduit la perte de puissance sur les longue distance, rendant ainsi chaque tir pareillement efficace sur les longues distances.\n\n--- STATS ---\nWeight: 5630.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 921.8 (Energy)  |  DPS: 1,536.3\nAmmo: 25\nRegen: 9,483/s  |  Cooldown: 1.5s  |  Cost/Shot: 569\nVelocity: 1,112 m/s  |  Range: 4.0 km\nPower Draw: 2 PU/s\nComponent HP: 2,500\nSignatures:  EM: 941  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_LaserCannon_S6=Fabricant : Behring\nType d'Arme : Canon Laser\nTaille : 6\n\nL'auto-canon laser M8A illustre la longue expérience en matière de conception et de construction d'armement de vaisseaux de Behring. Le résultat est une arme énergétique fiable et efficace capable de supporter de grandes escarmouches ou des manœuvres défensives précises.\n\n--- STATS ---\nWeight: 14100.0 kg\nFire Rate: 120 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 900.0 (Energy)  |  DPS: 1,800.0\nAmmo: 25\nRegen: 14,292/s  |  Cooldown: 1.5s  |  Cost/Shot: 854\nVelocity: 1,080 m/s  |  Range: 6.0 km\nPower Draw: 2 PU/s\nComponent HP: 4,224\nSignatures:  EM: 1,090  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_LaserCannon_S7=Fabricant : Behring\nType d'Arme : Canon Laser\nTaille : 7\n\nTirez en plein coeur de vos ennemis avec l'impact dévastateur de l'auto-canon énergétique M9A de chez Behring. À pleine charge, le puissant pouvoir d'arrêt de cette arme laser a le potentiel d'arrêter même les vaisseaux capitaux dans leur course.\n\n--- STATS ---\nWeight: 6870000.0 kg\nFire Rate: 10 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 200,000.0 (Phys)  |  DPS: 33,333.3\nAmmo: 21\nVelocity: 924 m/s  |  Range: 12.0 km\nPower Draw: 6 PU/s\nComponent HP: 708,660\nSignatures:  EM: 3,020  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_LaserCannon_SF7E_S7=Fabricant : Behring\nType d'Arme : Canon Laser\nTaille : 7\n\nLes ingénieurs de Behring et de Crusader ont collaborés afin de faire du canon laser SF7E l'arme idéale pour l'Ares Ion Star Fighter. Une coque spéciale permet à l'arme imposante de s'intégrer parfaitement au corps du vaisseau. Idéal pour les engagements longue distance incluant les vaisseaux larges ou classés capitaux, l'impressionnante précision du SF7E ainsi que ses forts dégâts par ogive en font une arme dévastatrice entre les mains d'un tireur expérimenté.\n\n--- STATS ---\nWeight: 35200.0 kg\nFire Rate: 55 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 5,150.0 (Energy)  |  DPS: 4,720.8\nAmmo: 25\nRegen: 21,355/s  |  Cooldown: 1.9s  |  Cost/Shot: 1,200\nVelocity: 1,048 m/s  |  Range: 7.3 km\nPower Draw: 3 PU/s\nComponent HP: 6,750\nSignatures:  EM: 1,450  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_LaserCannon_VNG_S2=Fabricant : Behring\nType d'Arme : Canon Laser\nTaille : 4\n\nLe classique m4A a été spécialement remanié par Behring afin de créer le VS (Vanguard Special), une arme laser destinée à remplir les nécessitées propres à Aegis. L'arme montée de base sur le nez du Vanguard Warden, le MVSA ne peut être installée que sur d'autres variantes de Vanguard.\n\n--- STATS ---\nWeight: 360.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 273.0 (Energy)  |  DPS: 455.0\nAmmo: 25\nRegen: 2,808/s  |  Cooldown: 1.5s  |  Cost/Shot: 168\nVelocity: 1,196 m/s  |  Range: 2.2 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 708  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_LaserRepeater_PDC_S1=Type d'objet : Tourelle Laser\nFabricant : Behring\n\nLe M2C "Swarm", technologie de défense rapprochée dernier cri, utilise un logiciel de recherche, de détection et de suivi avancé pour déclencher un barrage rapide de tirs laser, protégeant les vaisseaux contre les missiles, torpilles et autres menaces à grande vitesse.\n\n--- STATS ---\nWeight: 36.0 kg\nFire Rate: 1,000 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 10.0 (Energy)  |  DPS: 166.7\nAmmo: 75\nRegen: 2,025/s  |  Cooldown: 0.6s  |  Cost/Shot: 32\nVelocity: 1,500 m/s  |  Range: 1.6 km\nPower Draw: 0 PU/s\nComponent HP: 800\nSignatures:  EM: 143  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_LaserRepeater_VNG_S2=Fabricant : Behring\nType d'Arme : Répéteur Laser\nTaille : 2\n\nAegis a missionné Behring afin de concevoir un répéteur laser spécifiquement pour leur gamme Vanguard. Le résultat fût le GVSR, qui répond parfaitement aux standards d'Aegis en fournissant une cadence de tir persistante sans surcharger le générateur du vaisseau.\n\n--- STATS ---\nWeight: 90.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 99.7 (Energy)  |  DPS: 581.7\nAmmo: 75\nRegen: 3,232/s  |  Cooldown: 0.8s  |  Cost/Shot: 55\nVelocity: 1,495 m/s  |  Range: 1.7 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 289  |  IR: 0\nOverheat Temp: 450K
item_DescBOMB_S03_FSKI_Thunderball=Fabricant : FireStorm Kinetics\nType d'Arme : Bombe Explosive\nTaille : 3\n\nCiblez les forces terrestres depuis une position haute sécuritaire avec le Thunderball. Malgré leurs petites tailles, ces bombes S3 embarquent une puissante force de frappe, permettant aux utilisateurs soit d'en déployer plusieurs afin de saturer une cible stationnaire, soit de les larguer à la chaîne afin de toucher des cibles mouvantes. La Thunderball utilise les ailettes Atmo-Xact brevetées par FireStorm Kinetics, qui se déploient une fois larguée afin de fournir un guidage additionnel lors de sa trajectoire sur la cible.\n\n--- STATS ---\nWeight: 252.0 kg\nComponent HP: 1,000\nOverheat Temp: 450K
item_DescBOMB_S05_FSKI_Stormburst=Fabricant : FireStorm Kinetics\nType d'Arme : Bombe Explosive\nTaille : 5\n\nFaites des ravages sur les forces terrestres depuis le ciel, avec le Stormburst. Conçues par FireStorm Kinetics pour maximiser l'impact destructeur à une taille plus modérée, ces bombes S5 comportent une munition composite mixte pour décimer les cibles blindées. Le Stormburst utilise également les ailerons Atmo-Xact brevetés de FireStorm Kinetics pour garantir que la charge utile atteint sa cible.\n\n--- STATS ---\nWeight: 252.0 kg\nComponent HP: 1,000\nOverheat Temp: 450K
item_DescBOMB_S10_FSKI_Colossus=Fabricant : FireStorm Kinetics\nType d'Arme : Bombe Explosive\nTaille : 10\n\nLes ennemis au sol n'auront aucun échappatoire contre une Colossus. FireStorm Kinetics a conçu cette enorme bombe S10 afin d'anéantir des cibles au sol, qu'il s'agissent de véhicules ou de bâtiments. Devant être larguée depuis une haute altitude, la Colossus utilise les ailettes Atmo-Xact brevetées par FireStorm Kinetics, qui se déploient une fois larguée afin de fournir un guidage additionnel lors de sa trajectoire sur la cible.\n\n--- STATS ---\nWeight: 951.0 kg\nComponent HP: 1,000\nOverheat Temp: 450K
item_DescESPR_BallisticCannon_S1=Fabricant : Esperia\nType d'Arme : Canon balistique\nTaille : 1\n\nRépandez la crainte avec le canon balistique Deadbolt I. Craint pour sa puissance de feu à courte portée, cette arme Tevarin tristement célèbre a acquis sa réputation pendant la première guerre en tant qu'élément redoutable de l'arsenal dévastateur de la flotte Tevarin. Esperia a recréé avec soin le Deadbolt I par respect pour l'arme originale et les guerriers qui l'ont utilisée de manière si efficace.\n\n--- STATS ---\nWeight: 96.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 202.5 (Phys)  |  DPS: 337.5\nAmmo: 396\nVelocity: 1,200 m/s  |  Range: 2.5 km\nPower Draw: 0 PU/s\nComponent HP: 550\nSignatures:  EM: 41  |  IR: 0\nOverheat Temp: 450K
