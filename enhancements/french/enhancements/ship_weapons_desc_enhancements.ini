item_DescMXOX_NeutronRepeater_S1=Fabricant : MaxOx\nType d'Arme : Répéteur à Neutrons\nTaille : 1\n\nLe NDB-26 utilise un système à deux canons pour tirer des projectiles à neutrons à une cadence rapide. Dévastateur à courte portée, ce répéteur à neutrons est suffisamment puissant à moyenne portée pour persuader tout attaquant de reconsidérer son assaut.\n\n--- STATS ---\nWeight: 16.0 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 38.0 (Energy)  |  DPS: 316.5\nAmmo: 75\nRegen: 1,758/s  |  Cooldown: 0.7s  |  Cost/Shot: 32\nVelocity: 1,275 m/s  |  Range: 2.0 km\nPower Draw: 0 PU/s\nComponent HP: 525\nSignatures:  EM: 138  |  IR: 0\nOverheat Temp: 450K
