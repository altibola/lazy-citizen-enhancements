item_DescGATS_BallisticCannon_S1=Fabricant : Gallenson Tactical Systems\nType d'Arme : Canon Balistique\nTaille : 1\n\nAlimenté par le système breveté de munitions à tambour SpinGlide de Gallenson Tactical, le Tarantula GT-870 Mk1 peut délivrer en douceur et avec précision un flux constant de projectiles balistiques. Bien qu'il ait seulement un taux de tir modéré, sa durabilité fiable en fait un ajout fiable à tout combat.\n\n--- STATS ---\nWeight: 144.0 kg\nFire Rate: 200 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 60.8 (Phys)  |  DPS: 202.5\nAmmo: 330\nVelocity: 1,200 m/s  |  Range: 2.5 km\nPower Draw: 0 PU/s\nComponent HP: 550\nSignatures:  EM: 50  |  IR: 0\nOverheat Temp: 450K
