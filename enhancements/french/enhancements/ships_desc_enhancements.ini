vehicle_DescRSI_Zeus_CL=Constructeur : Roberts Space Industries\nRôle : Fret moyen\n\nPrêt à transporter une toute nouvelle génération de voyageurs à travers l'univers, Roberts Space Industries est fier de présenter un vaisseau spatial fort de huit siècles de conception - le tout nouveau Zeus Mk II. Rendant hommage au design classique qui a lancé l'humanité vers les étoiles en 2140, le Zeus Mk II a été mis à jour pour dépasser les normes modernes tout en conservant le cœur de cette icône spatiale bien-aimée.  Axée sur le commerce, l'édition Zeus Mk II CL dispose d'un espace de chargement supplémentaire et d'un rayon tracteur idéal pour manipuler de grandes quantités de marchandises.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,000 m/s\nBoost: +400 m/s  /  -210 m/s\nCrew: 3  |  Length: 46.0m  |  Class: Transporteur  |  Role: Fret Moyen\nShields: 3× S2\nInsurance: 10.67 min base  |  2.67 min express
vehicle_DescRSI_Zeus_ES=Constructeur : Roberts Space Industries\nRôle : Expédition\n\nPrêt à transporter une toute nouvelle génération de voyageurs à travers l'univers, Roberts Space Industries est fier de présenter un vaisseau spatial fort de huit siècles de conception - le tout nouveau Zeus Mk II. Rendant hommage au design classique qui a lancé l'humanité vers les étoiles en 2140, le Zeus Mk II a été mis à jour pour dépasser les normes modernes tout en conservant le cœur de cette icône spatiale bien-aimée.  Axée sur l'exploration, l'édition Zeus Mk II ES est dotée d'un radar robuste qui permet de faire de nouvelles découvertes, ainsi que d'un armement et d'un bouclier améliorés qui permettent de les ramener à la maison.\n\n\n--- STATS ---\nSCM: 205 m/s  |  Max: 1,100 m/s\nBoost: +405 m/s  /  -210 m/s\nCrew: 3  |  Length: 46.0m  |  Class: Exploration  |  Role: Expedition\nShields: 4× S2\nInsurance: 8.67 min base  |  2.17 min express
