vehicle_DescANVL_Terrapin=Constructeur : Anvil Aerospace\nRôle : Exploration / Éclaireur\n\nPrésentation du vaisseau de reconnaissance / d'exploration de classe Terrapin U4A-3 de chez Anvil Aerospace. Le Terrapin fut développé vers la fin du 28ème siècle afin de servir de premier vaisseau de défense de l'Empire restructurant sa Navy. Le mot d'ordre du Terrapin est la protection, avec des systèmes de bouclier et des couches de blindage larges, conçus pour offrir une défense maximale au pilote et à l'équipage. Bien qu'il lui manque la manœuvrabilité d'un chasseur, il possède un arsenal avancé d'armes puissantes prévues pour garder les pillards Vanduul les plus terrifiants à distance.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,150 m/s\nBoost: +320 m/s  /  -240 m/s\nCrew: 1  |  Length: 20.0m  |  Class: Assistance  |  Role: Éclaireur\nInsurance: 7.88 min base  |  2.62 min express
vehicle_DescANVL_Terrapin_Medic=Fabricant : Anvil Aerospace\nRôle : Médical\n\nTout en conservant la robustesse du Terrapin original, les designers d'Anvil ont créé un véhicule optimal pour les opérations de sauvetage avec le Terrapin Medic. Doté d'un lit médical de niveau 2, le Terrapin Medic peut évacuer les blessés même dans les situations les plus dangereuses grâce à son armure et à son bouclier puissants.\n\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,150 m/s\nBoost: +320 m/s  /  -240 m/s\nCrew: 1  |  Length: 20.0m  |  Class: Assistance  |  Role: Medical\nInsurance: 9.50 min base  |  2.38 min express
