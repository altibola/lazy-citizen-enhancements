vehicle_DescKRIG_P52_Merlin=Constructeur : Kruger Intergalactic\nRôle : Chasseur Parasite\n\nConçus en collaboration avec RSI, ce vaisseau parasite à courte portée est le premier vaisseau produit au nom de Kruger Intergalactic. Utilisant des siècles d'expertises en matière de fabrication, la coque compacte et précise de Kruger se marie parfaitement avec les propulseurs de RSI pour conférer au Merlin une vitesse et une manœuvrabilité exceptionnelles tout en s'assurant qu'il est capable de remplir une variété de rôles allant du combat au scan en passant par l'exploration.\n\n--- STATS ---\nSCM: 275 m/s  |  Max: 1,450 m/s\nBoost: +605 m/s  /  -290 m/s\nCrew: 1  |  Length: 12.0m  |  Class: Combat  |  Role: Chasseur Parasite\nGuns: 1\nShields: S1  |  Coolers: 2× S1  |  Power: S1\nArmor HP: 360\nDmg Mult: P 0.85x  |  E 0.70x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 2.65 min base  |  0.88 min express
