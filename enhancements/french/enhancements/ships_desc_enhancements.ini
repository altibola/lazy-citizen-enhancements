vehicle_DescKRIG_P72_Archimedes_Emerald=Constructeur : Kruger Intergalactic\nRôle : Course\n\nQue ce soit pour l'ajout de sécurité, explorer un système ou tout simplement pour le plaisir de voler, le vaisseau parasite P-72 Archimedes de Krueger Intergalactic fut créé pour offrir une maniabilité exceptionnelle et une accélération agile dans un ensemble élégant et stylé.  L'édition limitée Emerald comprend un schéma de peinture spéciale "chanceux".\n\n--- STATS ---\nCrew: 1  |  Length: 12.0m  |  Class: CompÉtition  |  Role: Course\nShields: S1  |  Coolers: 2× S1  |  Power: S1\nArmor HP: 360\nDmg Mult: P 0.85x  |  E 0.70x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 2.65 min base  |  0.88 min express
vehicle_DescMISC_Fortune=Fabricant : MISC\nRôle : Recyclage Léger\n\nPour ceux qui sont prêts à élever leur profession au niveau supérieur, les ingénieurs de MISC ont soigneusement conçu le Fortune comme le meilleur des petits vaisseaux de recyclage. Équipé d'un bras de récupération polyvalent et d'un monte-charge, le MISC Fortune est construit de A à Z pour transformer les déchets en trésors.\n\n\n--- STATS ---\nSCM: 143 m/s  |  Max: 975 m/s\nBoost: +350 m/s  /  -150 m/s\nCrew: 1  |  Length: 26.5m  |  Class: Industriel  |  Role: Recycleur Leger\nCoolers: S2  |  Power: S2  |  QD: S1\nArmor HP: 4,114\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 5.18 min base  |  1.30 min express
vehicle_DescMISC_Fortune_Teach=Fabricant : MISC\nRôle : Recyclage Léger\n\nPour ceux qui sont prêts à élever leur profession au niveau supérieur, les ingénieurs de MISC ont soigneusement conçu le Fortune comme le meilleur des petits vaisseaux de recyclage. Équipé d'un bras de récupération polyvalent et d'un monte-charge, le MISC Fortune est construit de A à Z pour transformer les déchets en trésors.\n\nBonjour, moi Wikelo. Vous aimer trouver objets pour fabriquer autres objets ? Moi aussi. Vaisseau parfait pour ça. Wikelo l'améliorer encore un peu plus.\n\nPour répondre aux conditions de travail difficiles de Nyx, Teach's Ship Shop a doté cette édition spéciale d'un équipement personnalisé comprenant des composants robustes afin que vous puissiez mieux vous acquitter de votre tâche.\n\n--- STATS ---\nCrew: 1  |  Length: 26.5m  |  Class: Industriel  |  Role: Recycleur Leger\nCoolers: S2  |  Power: S2  |  QD: S1\nArmor HP: 4,114\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 5.18 min base  |  1.30 min express
vehicle_DescMISC_Freelancer=Constructeur : MISC\nRôle : Fret Léger\n\nLes Freelancers sont utilisé comme vaisseau de transport long-courrier par les grandes entreprises du secteur, mais sont tout autant réaffecté comme vaisseaux d'exploration spécialisés par des capitaines indépendants voulant opérer aux confins de la galaxie.\n\n--- STATS ---\nSCM: 197 m/s  |  Max: 1,050 m/s\nBoost: +400 m/s  /  -205 m/s\nCrew: 1  |  Length: 38.0m  |  Class: Transporteur  |  Role: Fret Leger\nTurrets: 1  |  MRacks: 2× S3  2× S4\nShields: 3× S2  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 10,560\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 41  |  E 43  |  D 0  |  T 0\nInsurance: 12.99 min base  |  4.33 min express
vehicle_DescMISC_Freelancer_DUR=Constructeur : MISC\nRôle : Expédition\n\nLe Freelancer DUR est spécialisé dans l'exploration. Sacrifier 25% de capacité cargo par rapport au Freelancer d'origine pour un moteur de saut amélioré, un scanner plus avancé et un réservoir de carburant augmenté peut sembler être un mauvais choix pour certains, mais ceux qui privilégient la découverte au profit en feront leur vaisseau de prédilection.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,100 m/s\nBoost: +403 m/s  /  -205 m/s\nCrew: 1  |  Length: 38.0m  |  Class: Exploration  |  Role: Expedition\nTurrets: 1  |  MRacks: 2× S3  2× S4\nShields: 3× S2  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 10,560\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 41  |  E 43  |  D 0  |  T 0\nInsurance: 12.99 min base  |  4.33 min express
vehicle_DescMISC_Freelancer_MAX=Constructeur : MISC\nRôle : Fret Moyen\n\nUne variante du Freelancer avec une capacité de fret étendue au prix de l'armement. La variant Freelancer MAX sacrifie les armes pour davantage de marchandises le rendant idéal pour le transport d'équipements ou de matériaux.\n\n--- STATS ---\nSCM: 195 m/s  |  Max: 1,025 m/s\nBoost: +395 m/s  /  -205 m/s\nCrew: 1  |  Length: 38.0m  |  Class: Transporteur  |  Role: Fret Moyen\nTurrets: 1  |  MRacks: 2× S3  2× S4\nShields: 3× S2  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 10,560\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 41  |  E 43  |  D 0  |  T 0\nInsurance: 16.46 min base  |  5.49 min express
vehicle_DescMISC_Freelancer_MIS=Constructeur : MISC\nRôle : Cannonière\n\nLe Freelancer MIS est une variante militaire en série limitée du vaisseau marchand de référence développé par l'UEE. Ils furent produits en très petite quantité en raison d'incidents précoces liés à la charge utile. Cette version sacrifie la majeure partie de sa capacité de chargement pour libérer de l'espace aux missiles.\n\n--- STATS ---\nSCM: 204 m/s  |  Max: 1,000 m/s\nBoost: +410 m/s  /  -205 m/s\nCrew: 1  |  Length: 38.0m  |  Class: Combat  |  Role: Cannoniere\nTurrets: 1  |  MRacks: 4× S4  S5\nShields: 3× S2  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 15,840\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 41  |  E 43  |  D 0  |  T 0\nInsurance: 15.59 min base  |  5.20 min express
vehicle_DescMISC_Hull_A=Constructeur : MISC\nRôle : Fret Léger\n\nLe plus petit et le plus abordable de la série Hull. Le Hull A est parfait pour ceux parcourant seuls la galaxie. Le Hull A est similaire à l'Aurora et au Mustang, mais sans leur nature de ‘bon à tout faire’. Là où les autres sacrifient la capacité de fret pour davantage de vitesse ou une plus grande puissance de feu, le Hull A se focalise à 100% sur le transport.\n\n--- STATS ---\nSCM: 185 m/s  |  Max: 1,050 m/s\nBoost: +385 m/s  /  -195 m/s\nCrew: 1  |  Length: 30.0m  |  Class: Transporteur  |  Role: Fret Leger\nShields: S2  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 4,840\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 18  |  E 19  |  D 0  |  T 0\nInsurance: 5.95 min base  |  1.98 min express
vehicle_DescMISC_Hull_C=Constructeur : MISC\nRôle : Fret Lourd\n\nSouvent appelé le vaisseau le plus classique de la galaxie, le Hull C est le vaisseau le plus construit de la gamme et est considéré par beaucoup comme le plus versatile. Destiné à atteindre le "point idéal" entre le petit transport monoplace et les gigantesques vaisseaux de fret que compte le reste de la gamme, le Hull C la modularité étendue des plus grands vaisseaux tout en maintenant un minimum de manœuvrabilité provenant du côté plus modeste de la gamme.\n\n--- STATS ---\nSCM: 110 m/s  |  Max: 890 m/s\nBoost: +290 m/s  /  -100 m/s\nCrew: 1  |  Length: 91.2m  |  Class: Transporteur  |  Role: Fret Lourd\nShields: 3× S3  |  Power: S3\nArmor HP: 12,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 315  |  E 360  |  D 0  |  T 0\nInsurance: 45.00 min base  |  15.00 min express
vehicle_DescMISC_Prospector=Constructeur : MISC\nRôle : Minage Léger\n\nPendant des années, le Prospector fut le vaisseau de minage favori des opérateurs solo dans l'univers. Caractérisé par la sensibilité de design élancé de MISC et une abondance d'outils de minage high-tech, l'édition 2947 du Prospector offre un parfait équilibre entre forme et fonctionnalité.\n\n--- STATS ---\nSCM: 156 m/s  |  Max: 994 m/s\nBoost: +371 m/s  /  -160 m/s\nCrew: 1  |  Length: 26.5m  |  Class: Industriel  |  Role: Minage Leger\nShields: 3× S1  |  Coolers: S2  |  Power: S2  |  QD: S1\nArmor HP: 8,228\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 18  |  E 19  |  D 0  |  T 0\nInsurance: 9.00 min base  |  3.00 min express
vehicle_DescMISC_Prospector_Collector_Indust=Constructeur : MISC\nRôle : Minage Léger\n\nPendant des années, le Prospector fut le vaisseau de minage favori des opérateurs solo dans l'univers. Caractérisé par la sensibilité de design élancé de MISC et une abondance d'outils de minage high-tech, l'édition 2947 du Prospector offre un parfait équilibre entre forme et fonctionnalité.\n\nSalut, ici Wikelo. Apporté modifications utiles pour rendre vaisseau encore plus performant. Vous aller apprécier.\n\n--- STATS ---\nCrew: 1  |  Length: 26.5m  |  Class: Industriel  |  Role: Minage Leger\nShields: 3× S1  |  Coolers: S2  |  Power: S2  |  QD: S1\nArmor HP: 8,228\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 18  |  E 19  |  D 0  |  T 0\nInsurance: 9.00 min base  |  3.00 min express
vehicle_DescMISC_Razor=Constructeur : Mirai \nRôle : Course\n\nCet appareil de course avancé présente une structure composite améliorée qui place la vitesse au-dessus de tout... c'est le vaisseau pour les pilotes qui veulent laisser la compétition derrière eux.\n\n--- STATS ---\nSCM: 265 m/s  |  Max: 1,450 m/s\nBoost: +595 m/s  /  -290 m/s\nCrew: 1  |  Length: 12.5m  |  Class: CompÉtition  |  Role: Course\nInsurance: 6.08 min base  |  2.02 min express
vehicle_DescMISC_Razor_EX=Constructeur : MISC\nRôle : Furtif\n\nRevêtu de matériaux à réduction de signature, le Razor EX a été spécifiquement construit pour l'Advocacy de l'UEE à des usages de surveillance et d'opérations d'extractions. Bien que l'EX ait finalement été rejeté pour une utilisation généralisée, une variante du modèle a été publiée pour les membres du public souhaitant rester discrets.\n\n--- STATS ---\nSCM: 265 m/s  |  Max: 1,450 m/s\nBoost: +595 m/s  /  -290 m/s\nCrew: 1  |  Length: 12.5m  |  Class: Combat  |  Role: Chasseur Furtif\nShields: S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nInsurance: 5.91 min base  |  1.97 min express
vehicle_DescMISC_Razor_LX=Constructeur : Mirai\nRôle : Course\n\nLe Razor a été boosté. Le LX présente un moteur débridé afin d'atteindre des vitesses fulgurantes. Toute cette puissance vient au prix d'une manoeuvrabilité et d'un armement réduit le rendant idéal pour la course en ligne droite. Mais qui à besoin d'armes lorsque vous laissez la compétition derrière vous.\n\n--- STATS ---\nSCM: 275 m/s  |  Max: 1,525 m/s\nBoost: +490 m/s  /  -290 m/s\nCrew: 1  |  Length: 12.5m  |  Class: CompÉtition  |  Role: Course\nInsurance: 6.08 min base  |  2.02 min express
vehicle_DescMISC_Reliant=Constructeur : MISC\nRôle : Démarrage / Fret Léger\n\nAvec le Reliant Kore, MISC ajoute à son attirail déjà bien large de vaisseaux un vaisseau spatial plus petit de classe introduction. Utilisant les modèles avancés Xi'an, le Reliant comprend de larges ailes élégantes, des propulseurs multi-directionnels et un cockpit deux places complètement articulé en mode de vol vertical et horizontal. Tout ceci combiné à une plus grande capacité de charge que bon nombre de vaisseaux de sa classe, faisant du Kore un choix naturel pour le fret de courte distance, ou, avec l'ajout de quelques composants, ce vaisseau sera très capable de faire tout ce dont vous rêvez.\n\n--- STATS ---\nCrew: 1  |  Length: 14.8m  |  Class: Transporteur  |  Role: Demarrage / Fret Leger\nGuns: 2  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,200\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 0.68 min base  |  0.00 min express
vehicle_DescMISC_Reliant_Mako=Constructeur : MISC\nRôle : Journalisme\n\nL'Empire dépend d'une information quasi instantanée, c'est pourquoi les reporters ont besoin d'être capable d'aller là où l'action se passe : n'importe où, n'importe quand. Voici le Mako, offrant toute la flexibilité et la fiabilité d'un MISC Reliant, associé à un ensemble de caméras Cernan de pointe afin de capturer chaque moment comme il se déroule avec une clarté et une précision capable de faire la une.\n\n--- STATS ---\nSCM: 220 m/s  |  Max: 1,150 m/s\nBoost: +480 m/s  /  -250 m/s\nCrew: 1  |  Length: 14.8m  |  Class: Assistance  |  Role: Journalisme\nGuns: 2  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,200\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 5.36 min base  |  1.79 min express
vehicle_DescMISC_Reliant_Sen=Constructeur : MISC\nRôle : Science Léger\n\nMagellan, Pierce, Croshaw, autant de noms qui résonnent dans l'histoire grâce à leurs esprits aventureux, une curiosité naturelle, et un vaisseau fiable. Le Reliant Sen est une plateforme scientifique mobile versatile; équipé de capacités à longue portée pour vous emmener plus loin, plus longtemps, et de la gamme de capteurs avancés Samos. Parfait pour l'explorateur en herbe qui souhaite murmurer son nom dans les couloirs de l'histoire.\n\n--- STATS ---\nSCM: 220 m/s  |  Max: 1,150 m/s\nBoost: +480 m/s  /  -250 m/s\nCrew: 1  |  Length: 14.8m  |  Class: Industriel  |  Role: Science Leger\nGuns: 2  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,200\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 4.82 min base  |  1.61 min express
vehicle_DescMISC_Reliant_Tana=Constructeur : MISC\nRôle : Chasseur Léger\n\nAvec l'Humanité qui s'étend en permanence dans l'univers, le besoin d'un chasseur léger versatile a augmenté exponentiellement. Facile à entretenir avec une construction solide, le Reliant Tana est un choix idéal pour la défense de frontière ou d'avant-poste grâce à son puissant générateur, ses boucliers plus puissants et l'ajout d'armes montées.\n\n--- STATS ---\nSCM: 222 m/s  |  Max: 1,150 m/s\nBoost: +480 m/s  /  -250 m/s\nCrew: 1  |  Length: 14.8m  |  Class: Combat  |  Role: Chasseur Leger\nGuns: 2  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 3,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 4.82 min base  |  1.61 min express
vehicle_DescMISC_Starfarer=Constructeur : MISC\nRôle : Ravitaillement Lourd\n\nLe Starfarer diffère des cargos en vrac traditionnels sur un point clé : il s'agit d'une plate-forme dédiée au carburant. Le Starfarer est conçu non seulement pour charger, stocker et protéger les unités de stase de carburant, mais il est également conçu pour absorber les gaz spatiaux et les raffiner pour une utilisation sans avoir à atterir. Et bien qu’il excelle dans ce domaine, le Starfarer peut également être utilisé pour transporter des conteneurs de fret en vrac traditionnels.\n\n--- STATS ---\nSCM: 106 m/s  |  Max: 845 m/s\nBoost: +295 m/s  /  -106 m/s\nCrew: 1  |  Length: 102.0m  |  Class: Assistance  |  Role: Ravitaillement Lourd\nTurrets: 1\nShields: 3× S3  |  Coolers: 2× S3  |  Power: S3  |  QD: S3\nArmor HP: 12,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 315  |  E 360  |  D 0  |  T 0\nInsurance: 18.00 min base  |  6.00 min express
vehicle_DescMISC_Starfarer_Gemini=Constructeur : MISC\nRôle : Ravitaillement Lourd\n\nL'armée de l'Empire Uni de la Terre utilise une variante adaptée 'brut de décoffrage' du Starfarer pour ses opérations de première ligne. Le G2M Gemini, plus communément appelé Starfarer Gemini ou 'Star G' échange de la capacité de cargo et de la manœuvrabilité pour une armure renforcée, de meilleurs boucliers, plus de moteurs puissant et une version plus forte des trois tourelles habitées.\n\n--- STATS ---\nSCM: 106 m/s  |  Max: 845 m/s\nBoost: +295 m/s  /  -106 m/s\nCrew: 2  |  Length: 102.0m  |  Class: Assistance  |  Role: Ravitaillement Lourd\nTurrets: 1\nShields: 3× S3  |  Coolers: 2× S3  |  Power: S3  |  QD: S3\nArmor HP: 18,150\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 331  |  E 378  |  D 0  |  T 0\nInsurance: 35.34 min base  |  11.78 min express
vehicle_DescMISC_Starfarer_Teach=Constructeur : MISC\nRôle : Ravitaillement Lourd\n\nLe Starfarer diffère des cargos en vrac traditionnels sur un point clé : il s'agit d'une plate-forme dédiée au carburant. Le Starfarer est conçu non seulement pour charger, stocker et protéger les unités de stase de carburant, mais il est également conçu pour absorber les gaz spatiaux et les raffiner pour une utilisation sans avoir à atterir. Et bien qu’il excelle dans ce domaine, le Starfarer peut également être utilisé pour transporter des conteneurs de fret en vrac traditionnels.\n\nPour répondre aux conditions de travail difficiles de Nyx, Teach's Ship Shop a doté cette édition spéciale d'un équipement personnalisé comprenant des composants robustes afin que vous puissiez mieux vous acquitter de votre tâche.\n\n--- STATS ---\nCrew: 1  |  Length: 102.0m  |  Class: Assistance  |  Role: Ravitaillement Lourd\nTurrets: 1\nShields: 3× S3  |  Coolers: 2× S3  |  Power: S3  |  QD: S3\nArmor HP: 12,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 315  |  E 360  |  D 0  |  T 0\nInsurance: 18.00 min base  |  6.00 min express
vehicle_DescMISC_Starlancer_MAX_Collector_Indust=Fabricant : MISC\nRôle : Fret Moyen\n \nPour ceux qui souhaitent développer leurs activités de transport, les ingénieurs de MISC ont amélioré le Starlancer MAX en y ajoutant une soute particulièrement spacieuse, prête à accueillir du fret et des véhicules. Avec des aménagements confortables pour les longs trajets et un ensemble défensif complet pour les sorties hors des sentiers battus, il est facile de voir pourquoi le Starlancer MAX est le transporteur préféré des pilotes industrieux à travers le 'verse.\n\n--- STATS ---\nCrew: 1  |  Length: 90.0m  |  Class: Transporteur  |  Role: Fret Moyen\nTurrets: 2\nArmor HP: 12,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 315  |  E 360  |  D 0  |  T 0\nInsurance: 12.33 min base  |  3.08 min express
vehicle_DescMISC_Starlancer_TAC_Collector_Military=Fabricant : MISC\nRôle : Vaisseau de Combat\n \nPour ceux en quête d'un vaisseau polyvalent capable de tenir bon dans un combat, les ingénieurs ont doté le Starlancer TAC d'un arsenal offensif agressif prêt à affronter les adversaires les plus féroces. Lorsque vous entreprenez une mission à haut risque et à forte récompense, le Starlancer TAC est là pour s'assurer que vous et votre équipage êtes en mesure de la mener à bien jusqu'au bout.\n\nIci Wikelo. Apporté modifications utiles pour rendre vaisseau encore plus semblable à chasseur. Très impressionnant.\n\n--- STATS ---\nCrew: 1  |  Length: 90.0m  |  Class: Combat  |  Role: Cannoniere\nTurrets: 9\nShields: 2× S3  |  Coolers: S3  |  Power: S3  |  QD: S2\nArmor HP: 18,150\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 347  |  E 396  |  D 0  |  T 0\nInsurance: 13.33 min base  |  3.33 min express
vehicle_DescMISC_Starlite=Constructeur : MISC\nRôle : Ravitaillement Léger\n\nS'il y a bien une constante dans l'univers, c'est que les vaisseaux finissent toujours par tomber en panne de carburant. C'est là que le Starlite intervient. Doté de deux cuves à carburant standard et d'un design épuré et élégant, le Starlite a été méticuleusement conçu par les ingénieurs de MISC pour offrir des services de ravitaillement aux vaisseaux dans le besoin, où qu'ils se trouvent.\n\n--- STATS ---\nSCM: 150 m/s  |  Max: 970 m/s\nBoost: +340 m/s  /  -160 m/s\nCrew: 1  |  Length: 32.0m  |  Class: Assistance  |  Role: Ravitaillement Léger\nInsurance: 5.82 min base  |  1.45 min express
vehicle_DescMRAI_Guardian=Constructeur : Mirai\nRôle : Chasseur Lourd\n\nPartant de l'adage selon lequel la meilleure défense est l'attaque, les ingénieurs de Mirai ont apporté leur expertise en matière de performances et de manœuvrabilité au chasseur à longue portée Guardian.  Volez autour de vos adversaires avec le Mirai Guardian tout en affirmant votre supériorité spatiale. \n\n\n--- STATS ---\nSCM: 213 m/s  |  Max: 1,125 m/s\nBoost: +465 m/s  /  -225 m/s\nCrew: 1  |  Length: 24.3m  |  Class: Combat  |  Role: Chasseur Lourd\nInsurance: 11.33 min base  |  2.83 min express
