vehicle_DescDRAK_Golem=Constructeur : Drake Interplanetary\nRôle : Démarrage / Minage Léger\n\nAvec le Golem, Drake a conçu le vaisseau idéal pour ceux qui souhaitent se lancer dans une carrière de minage. Le vaisseau est équipé d'un laser de minage sur mesure et peut transporter 32 SCU de ressources précieuses. Fidèle à la tradition de Drake, le Golem est un vaisseau construit sur mesure qui privilégie la fonction aux fioritures.\n\n--- STATS ---\nSCM: 203 m/s  |  Max: 1,010 m/s\nBoost: +280 m/s  /  -210 m/s\nCrew: 1  |  Length: 7.0m  |  Class: Industriel  |  Role: Démarrage / Minage Léger\nInsurance: 3.00 min base  |  0.75 min express
vehicle_DescDRAK_Golem_Collector_Indust=Constructeur : Drake Interplanetary\nRôle : Démarrage / Minage Léger\n\nAvec le Golem, Drake a conçu le vaisseau idéal pour ceux qui souhaitent se lancer dans une carrière de minage. Le vaisseau est équipé d'un laser de minage sur mesure et peut transporter 32 SCU de ressources précieuses. Fidèle à la tradition de Drake, le Golem est un vaisseau construit sur mesure qui privilégie la fonction aux fioritures.\n\nSalut, ici Wikelo. Apporté modifications utiles pour rendre vaisseau encore plus performant. Vous aller apprécier.\n\n--- STATS ---\nCrew: 1  |  Length: 7.0m  |  Class: Industriel  |  Role: Démarrage / Minage Léger\nInsurance: 3.00 min base  |  0.75 min express
vehicle_DescDRAK_Golem_OX=Fabricant : Drake Interplanetary\nRôle : Chasseur Léger\n \nAvec le Golem OX, Drake a transformé ce robuste vaisseau en un cargo idéal pour le transport de fournitures et d'équipements. Conçu pour les pilotes privilégiant la fonctionnalité à l'esthétique, l'OX double la capacité du modèle original avec un espace pouvant accueillir 64 SCU et dispose d'un rayon tracteur pour faciliter le transfert de marchandises.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,000 m/s\nBoost: +280 m/s  /  -210 m/s\nCrew: 1  |  Length: 7.0m  |  Class: Industriel  |  Role: Fret Leger\nInsurance: 3.00 min base  |  0.75 min express
vehicle_DescDRAK_Golem_Teach=Constructeur : Drake Interplanetary\nRôle : Démarrage / Minage Léger\n\nAvec le Golem, Drake a conçu le vaisseau idéal pour ceux qui souhaitent se lancer dans une carrière de minage. Le vaisseau est équipé d'un laser de minage sur mesure et peut transporter 32 SCU de ressources précieuses. Fidèle à la tradition de Drake, le Golem est un vaisseau construit sur mesure qui privilégie la fonction aux fioritures.\n\nPour répondre aux conditions de travail difficiles de Nyx, Teach's Ship Shop a doté cette édition spéciale d'un équipement personnalisé comprenant des composants robustes afin que vous puissiez mieux vous acquitter de votre tâche.\n\n--- STATS ---\nCrew: 1  |  Length: 7.0m  |  Class: Industriel  |  Role: Démarrage / Minage Léger\nInsurance: 3.00 min base  |  0.75 min express
vehicle_DescDRAK_Herald=Constructeur : Drake Interplanetary\nRÔle : Données Moyen\n\nLe Herald de Drake est un petit vaisseau blindÉ conÇu pour transporter en toute sÉcuritÉ des informations d'un point A À un point B. DotÉ d'un puissant moteur central (pour le transit À grande vitesse et la production d'Énergie nÉcessaire au chiffrage et sÉcurisation efficaces des donnÉes), d'un logiciel de chiffrage avancÉ et d'un noyau informatique blindÉ, le Herald est unique parmi les vaisseaux spatiaux personnels en ce sens qu'il est conÇu pour être facilement "nettoyÉ" en cas de risque de capture.\n\n--- STATS ---\nSCM: 245 m/s  |  Max: 1,450 m/s\nBoost: +670 m/s  /  -260 m/s\nCrew: 1  |  Length: 24.8m  |  Class: Transporteur  |  Role: DonnÉes Moyen\nInsurance: 2.02 min base  |  0.68 min express
vehicle_DescDRAK_Ironclad=Fabricant : Drake Interplanetary\nRôle : Fret lourd\n \nL'univers devient de plus en plus dangereux, et le simple acte d'essayer de gagner sa vie peut s'avérer mortel. C'est pourquoi Drake a construit le plus robuste des cargos à sillonner les couloirs de navigation, armé d'un ensemble intimidant de tourelles, d'une généreuse soute et d'un rayon tracteur très pratique.\n\n--- STATS ---\nSCM: 110 m/s  |  Max: 900 m/s\nBoost: +290 m/s  /  -130 m/s\nCrew: 7  |  Length: 13.4m  |  Class: Transporteur  |  Role: Fret Lourd\nInsurance: 18.00 min base  |  6.00 min express
vehicle_DescDRAK_Ironclad_Assault=Fabricant : Drake Interplanetary\nRôle : Vaisseau de débarquement\n \nLorsque la livraison spéciale que vous devez effectuer est une incursion à part entière, vous avez besoin du Drake Ironclad Assault. Non seulement il peut accueillir plusieurs véhicules terrestres dans sa soute, mais il est également équipé de tourelles pour dégager la voie pour l'atterrissage, et même d'une baie de fabrication pour les réparations d'urgence.\n\n--- STATS ---\nSCM: 130 m/s  |  Max: 940 m/s\nBoost: +320 m/s  /  -150 m/s\nCrew: 7  |  Length: 13.4m  |  Class: Combat  |  Role: Transport de Troupes Lourd\nInsurance: 18.00 min base  |  6.00 min express
vehicle_DescDRAK_Pitbull=Constructeur : Drake Interplanetary\nRôle : Chasseur parasite\n\nUne machine de guerre agile et féroce. Le Pitbull combine des manœuvres à haute vitesse avec une puissance de feu brute pour vous offrir un véritable rouleau compresseur, le tout dans un format compact pour un seul pilote.\n\n--- STATS ---\nSCM: 232 m/s  |  Max: 1,275 m/s\nBoost: +555 m/s  /  -270 m/s\nCrew: 1  |  Length: 6.0m  |  Class: Chasseur Parasite  |  Role: Chasseur Parasite\nInsurance: 2.00 min base  |  0.60 min express
vehicle_DescDRAK_Vulture=Constructeur : Drake Interplanetary\nRÔle : Recycleur LÉger\n\nNe donnez de compte À personne, oubliez l'intermÉdiaire et balancez la prudence par la fenÊtre. Recyclez les carcasses comme un pro et forgez vous votre propre place dans l'espace infini aux manettes de cette robuste machine de recyclage de chez Drake Interplanetary.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,100 m/s\nBoost: +350 m/s  /  -240 m/s\nCrew: 1  |  Length: 34.0m  |  Class: Industriel  |  Role: Recycleur Leger\nShields: 3× S1  |  Coolers: 2× S1  |  Power: 2× S1  |  QD: S1\nArmor HP: 6,732\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 18  |  E 16  |  D 0  |  T 0\nInsurance: 9.00 min base  |  3.00 min express
