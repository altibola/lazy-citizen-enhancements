vehicle_DescGLSN_Shiv=Constructeur : Inconnu\nRôle : Chasseur lourd\n\nGrossièrement construit à partir d'un assemblage disparate de divers vaisseaux, ce chasseur brut de décoffrage est conçu pour survivre aux rudes réalités de l'espace non revendiqué, prouvant ainsi que ce n'est pas la marque de votre vaisseau qui importe, mais ce que vous en faites.\n\n--- STATS ---\nSCM: 219 m/s  |  Max: 1,175 m/s\nBoost: +479 m/s  /  -230 m/s\nCrew: 2  |  Length: 37.5m  |  Class: Combat  |  Role: Chasseur Lourd\nInsurance: 18.00 min base  |  4.50 min express
vehicle_DescKRIG_L21_Wolf=Constructeur : Kruger Intergalactic\nRôle : Chasseur Léger\n\nDécouvrez un vaisseau qui a mis près de 400 ans à voir le jour, mais qui valait largement l'attente. Kruger Intergalactic est fier de présenter son premier vaisseau fabriqué en toute indépendance, le Wolf. Alliant vitesse, style et une conception d'une précision irréprochable, le L-21 Wolf n'est pas seulement une vitrine pour Kruger, mais également un vaisseau de combat prêt à partir à la chasse, seul ou en meute, grâce à un arsenal puissant comprenant notamment deux gatlings balistiques de taille 4 conçues sur mesure.\n\n--- STATS ---\nSCM: 230 m/s  |  Max: 1,225 m/s\nBoost: +510 m/s  /  -250 m/s\nCrew: 1  |  Length: 12.0m  |  Class: Combat  |  Role: Chasseur Leger\nInsurance: 7.00 min base  |  1.75 min express
