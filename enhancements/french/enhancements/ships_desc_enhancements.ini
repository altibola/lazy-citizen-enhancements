vehicle_DescANVL_Hornet_F7C_Wildfire=Constructeur : Aegis Dynamics\nFocus : Chasseur Moyen\n\nCréé dans le cadre de la série ‘Masters of Flight’ en collaboration avec la simulation spatiale Arena Commander, le Wildfire rend hommage au célèbre pilote Aria Reilly pour son travail remarquable au sein de la légendaire Escadrille 42. Ce F7C Hornet Mk I est équipé avec l'armement qu'elle préférait et d'une livrée édition spéciale pour honorer ce vaisseau iconique.\n\n--- STATS ---\nCrew: 1  |  Length: 28.2m  |  Class: Combat  |  Role: Chasseur Moyen\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 6,600\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 24  |  E 13  |  D 0  |  T 0\nInsurance: 6.75 min base  |  2.25 min express
