vehicle_DescORIG_300i=Constructeur : Origin Jumpworks\nRôle : Tourisme de Luxe\n\nSi vous comptez voyager à travers les étoiles... Pourquoi ne pas le faire avec style ? Le 300i est le premier vaisseau de luxe de chez Origin Jumpworks. C'est un tueur élégant et argenté qui envoie un message autant par sa silhouette qu'avec ses canons à particules.\n\n--- STATS ---\nSCM: 258 m/s  |  Max: 1,440 m/s\nBoost: +550 m/s  /  -270 m/s\nCrew: 1  |  Length: 27.0m  |  Class: Exploration  |  Role: Tourisme de Luxe\nMRacks: 2× S2\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 1,920\nDmg Mult: P 0.80x  |  E 0.65x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 7  |  D 0  |  T 0\nInsurance: 7.76 min base  |  2.59 min express
vehicle_DescORIG_315p=Constructeur : Origin Jumpworks\nRôle : Éclaireur\n\nL'exploration est la vocation la plus importante de l'homme. Préparez-vous à tracer des horizons lointains avec la monture technologique la plus sophistiquée de l'homme, l'Origin 315p. Il est doté d'un générateur plus robuste et d'un système de reconnaissance personnalisé, conçu exclusivement par Chimera Communications.\n\n--- STATS ---\nSCM: 258 m/s  |  Max: 1,460 m/s\nBoost: +550 m/s  /  -270 m/s\nCrew: 1  |  Length: 27.0m  |  Class: Exploration  |  Role: Éclaireur\nMRacks: 2× S2\nShields: 2× S1  |  Coolers: 2× S1  |  QD: S1\nArmor HP: 1,920\nDmg Mult: P 0.80x  |  E 0.65x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 7  |  D 0  |  T 0\nInsurance: 5.18 min base  |  1.73 min express
vehicle_DescORIG_325a=Constructeur : Origin Jumpworks\nRôle : Intercepteur\n\nCe n'est pas parce que la galaxie est dangereuse qu'il faut sacrifier votre confort : le 325a peut sortir vainqueur de n'importe quel combat aérien. Le 325a comprend un arsenal d'armes avancé ainsi qu'un système de ciblage personnalisé conçu spécifiquement pour le 325a par WillsOp.\n\n--- STATS ---\nSCM: 260 m/s  |  Max: 1,430 m/s\nBoost: +600 m/s  /  -270 m/s\nCrew: 1  |  Length: 27.5m  |  Class: Combat  |  Role: Intercepteur\nMRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 1,920\nDmg Mult: P 0.80x  |  E 0.65x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 7  |  D 0  |  T 0\nInsurance: 6.21 min base  |  2.07 min express
