vehicle_DescCRUS_Starfighter_Ion_Collector_Stealth=Constructeur : Crusader Industries\nRôle : Fret Moyen / Canonnière\n\nLa canonnière A2 a été utilisé de manière dévastatrice lors d'assauts aériens, d'opérations de recherche et de sauvetage et d'initiatives d'atterrissage. Avec plus du double de la puissance de feu d'un M2 et une baie à bombes capable de fournir une charge impressionnante, le A2 s'adresse à quiconque transporte des quantités massives de marchandises dans des cieux potentiellement hostiles.\n\nIci Wikelo. Avoir apporté modifications utiles pour rendre vaisseau beaucoup plus comme chasseur. Sournois.\n\n--- STATS ---\nCrew: 1  |  Length: 27.0m  |  Class: Combat  |  Role: Chasseur Lourd\nShields: 2× S2  |  Coolers: 3× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 14,400\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 50  |  E 36  |  D 0  |  T 0\nInsurance: 10.30 min base  |  3.43 min express
