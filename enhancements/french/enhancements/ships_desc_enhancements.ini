vehicle_DescAEGS_Sabre_Raven=Constructeur : Aegis Dynamics \nRôle : Interdiction\n\nAegis Dynamics a une fois de plus relevé le niveau avec leur variante Raven, conservant toute la vitesse et la manoeuvrabilité du son prédécesseur, le Sabre, mais avec une signature radar moindre, faisant de lui un appareil d'infiltration rapide et discret.\n\n--- STATS ---\nSCM: 240 m/s  |  Max: 1,400 m/s\nBoost: +600 m/s  /  -260 m/s\nCrew: 1  |  Length: 24.5m  |  Class: Combat  |  Role: Interdiction\nMRacks: 2\nShields: 2× S1  |  Coolers: 2× S1  |  Power: 2× S1  |  QD: S1\nArmor HP: 2,218\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 20  |  E 16  |  D 0  |  T 0\nInsurance: 7.56 min base  |  2.52 min express
vehicle_DescAEGS_Tiburon=Constructeur : Aegis Dynamics\nRôle : Canonnière lourde\n\nÉvolution d'une conception éprouvée d'Aegis, la configuration anti-vaisseau capital du Tiburon comprend une arme à faisceau frontale montée sur le dos, complétée par des tourelles latérales.\n\n--- STATS ---\nSCM: 150 m/s  |  Max: 975 m/s\nBoost: +330 m/s  /  -160 m/s\nCrew: 7  |  Length: 121.0m  |  Class: Combat  |  Role: Vaisseau de Combat Lourd\nTurrets: 1\nCoolers: 2× S3  |  Power: 2× S3\nInsurance: 48.60 min base  |  16.20 min express
vehicle_DescAEGS_Vanguard=Constructeur : Aegis Dynamics\nRôle : Chasseur Lourd\n\nUn chasseur avec la puissance d'attaque d'un bulldog doté d'un vaste arsenal d'armes montées à l'avant conçu pour transpercer les boucliers et les armures d'autres vaisseaux. Appelés ainsi car leur portée de saut multiple leur permet de former l'avant-garde de toute expédition militaire, les Vanguards ont servit dans de nombreuses missions contre les Vanduul.\n\n--- STATS ---\nSCM: 210 m/s  |  Max: 1,075 m/s\nBoost: +458 m/s  /  -220 m/s\nCrew: 1  |  Length: 48.0m  |  Class: Combat  |  Role: Chasseur Lourd\nGuns: 5  |  Turrets: 1  |  MRacks: 4× S4\nShields: 2× S2  |  Coolers: 2× S2  |  Power: S2  |  QD: S2\nArmor HP: 9,900\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 50  |  E 40  |  D 0  |  T 0\nInsurance: 18.22 min base  |  6.07 min express
vehicle_DescAEGS_Vanguard_Harbinger=Constructeur : Aegis Dynamics\nRôle : Chasseur Lourd / Bombardier\n\nLe Vanguard Harbinger est le chasseur/bombardier standard de la Terre, convertissant la capsule de sauvetage standard du Warden en une puissante soute à bombes. La portée étendue du Vanguard et son profil relativement petit signifient qu'il peut aller là où les porte-vaisseaux, ou les bombardiers stratégiques, plus grands ne peuvent frapper fort, puis revenir à la base.\n\n--- STATS ---\nSCM: 212 m/s  |  Max: 1,085 m/s\nBoost: +462 m/s  /  -224 m/s\nCrew: 1  |  Length: 48.0m  |  Class: Combat  |  Role: Chasseur Lourd / Bombardier\nGuns: 5  |  Turrets: 1  |  MRacks: 4× S4  S5\nShields: 2× S2  |  Coolers: 2× S2  |  Power: S2  |  QD: S2\nArmor HP: 9,900\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 50  |  E 40  |  D 0  |  T 0\nInsurance: 16.39 min base  |  5.46 min express
vehicle_DescAEGS_Vanguard_Hoplite=Constructeur : Aegis Dynamics\nRôle : Transport de Troupes \n\nLe Vanguard Hoplite est un mélange entre le vaisseau de combat longue distance Vanguard et un vaisseau d'abordage. Adapté d'après plusieurs modèles de vaisseaux d'assaut, le Hoplite est l'outil parfait pour faire débarquer une équipe de choc blindée avec assez de puissance de feu pour les rapatrier à nouveau.\n\n--- STATS ---\nSCM: 209 m/s  |  Max: 1,115 m/s\nBoost: +435 m/s  /  -246 m/s\nCrew: 1  |  Length: 48.0m  |  Class: Combat  |  Role: Transport de Troupes\nGuns: 5  |  Turrets: 1  |  MRacks: 2× S4\nShields: 2× S2  |  Coolers: 2× S2  |  Power: S2  |  QD: S2\nArmor HP: 14,850\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 50  |  E 40  |  D 0  |  T 0\nInsurance: 13.25 min base  |  4.42 min express
vehicle_DescAEGS_Vanguard_Sentinel=Constructeur : Aegis Dynamics\nRôle : Chasseur Lourd \n\nLe Vanguard Sentinel est un vaisseau conçu pour combattre intelligemment au lieu d'affronter les ennemis de front. La conversion comprend un cockpit AR, un module e-War externe, des missiles leurres et un ensemble de charges IEM. Les Vanguard Sentinels fournissent souvent le soutien au combat nécessaire aux opérations combinées. Un Sentinel solitaire est fréquemment associé à des bombardiers Harbinger et à des escortes Warden pour de grandes missions d'attaque.\n\n--- STATS ---\nSCM: 217 m/s  |  Max: 1,075 m/s\nBoost: +462 m/s  /  -224 m/s\nCrew: 1  |  Length: 48.0m  |  Class: Combat  |  Role: Chasseur Lourd / Bombardier\nGuns: 5  |  Turrets: 1  |  MRacks: 4× S4\nShields: 2× S2  |  Coolers: 2× S2  |  Power: S2  |  QD: S2\nArmor HP: 9,900\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 50  |  E 40  |  D 0  |  T 0\nInsurance: 18.22 min base  |  6.07 min express
vehicle_DescANVL_Arrow=Constructeur : Anvil Aerospace\nRôle : Chasseur Léger\n\nUn aspect inimitable, une vitesse foudroyante et une manœuvrabilité ultra réactive font de l'Arrow le vaisseau le plus rapide de sa catégorie. Avec un arsenal d'armes très robuste fournissant une puissance de feu foisonnante, il s'agit vraiment du chasseur léger par excellence, ajusté pour la prochaine génération de combat.\n\n--- STATS ---\nSCM: 229 m/s  |  Max: 1,215 m/s\nBoost: +515 m/s  /  -265 m/s\nCrew: 1  |  Length: 17.2m  |  Class: Combat  |  Role: Chasseur Leger\nShields: S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 3,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 12  |  E 6  |  D 0  |  T 0\nInsurance: 5.27 min base  |  1.76 min express
vehicle_DescANVL_Asgard=Fabricant : Anvil Aerospace\nRôle : Transport de Véhicules\n \nAlors que les combats d'aujourd'hui ne cessent de gagner en intensité et en complexité, Anvil Aerospace comprend l'impact qu'un seul véhicule peut avoir sur l'issue d'une bataille. Découvrez l'Asgard. Transporteur de véhicules terrestres de nouvelle génération, l'Anvil Asgard est équipé d'une rampe de chargement rapide, d'une vaste soute permettant de transporter en toute sécurité le véhicule d'assaut de votre choix et d'un arsenal impressionnant qui vous garantit l'accès aux zones de déploiement les plus hostiles.\n\n--- STATS ---\nSCM: 203 m/s  |  Max: 1,075 m/s\nBoost: +425 m/s  /  -240 m/s\nCrew: 1  |  Length: 48.0m  |  Class: Combat  |  Role: Transport de Troupes\nTurrets: 1\nShields: 4× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 23,760\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 139  |  E 88  |  D 0  |  T 0\nInsurance: 17.00 min base  |  4.25 min express
