vehicle_DescANVL_Hornet_F7CM=Constructeur : Anvil Aerospace\nRôle : Chasseur Moyen\n\nLe F7C-M Super Hornet Mk I est le plus proche de l'équipement militaire qu'il soit légalement possible d'avoir pour un modèle civil. Il reprend la tourelle Altazimutale et offre des pièces presque conformes aux normes militaires sous le capot. Prouvant que deux têtes valent mieux qu'une, un second siège a été ajouté pour répartir les tâches logistiques et de combat, faisant du Super Hornet un appareil vraiment terrifiant à engager.\n\n--- STATS ---\nSCM: 219 m/s  |  Max: 1,142 m/s\nBoost: +477 m/s  /  -249 m/s\nCrew: 1  |  Length: 28.2m  |  Class: Combat  |  Role: Chasseur Moyen\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 6,600\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 24  |  E 13  |  D 0  |  T 0\nInsurance: 9.72 min base  |  3.24 min express
vehicle_DescANVL_Hornet_F7CM_Heartseeker=Constructeur : Anvil Aerospace\nRôle : Chasseur Moyen\n\nConçu pour les pilotes dont le véritable amour est le frisson d'un combat acharné, le F7C-M Heartseeker Mk I en édition limitée est "l'unique" pour les vrais inconditionnels du combat. Doté de composants haut de gamme et équipé de quatre imposants canons laser Behring, ce féroce éradicateur affine les compétences de combat légendaires du Super Hornet pour vous donner l'avantage ultime dans les combats spatiaux.\n\n--- STATS ---\nCrew: 1  |  Length: 28.2m  |  Class: Combat  |  Role: Chasseur Moyen\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 6,600\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 24  |  E 13  |  D 0  |  T 0\nInsurance: 9.72 min base  |  3.24 min express
vehicle_DescANVL_Hornet_F7CM_Heartseeker_Mk2=Fabricant : Anvil Aerospace\nRôle : Chasseur Moyen\n \nLors de la mise à jour du F7C-M Super Hornet vers le Mk II, il ne faisait aucun doute pour Anvil Aerospace que l'édition très spéciale Heartseeker bénéficierait du même traitement. Avec son armement robuste conçu pour les pilotes dont le véritable amour est le frisson d'un combat acharné, le F7C-M Heartseeker Mk II (édition limitée) est en passe de devenir le vaisseau préféré d'une toute nouvelle génération d'inconditionnels au combat.\n\n--- STATS ---\nCrew: 2  |  Length: 24.0m  |  Class: Combat  |  Role: Chasseur Moyen\nShields: 3× S1  |  Coolers: 2× S1  |  Power: S2  |  QD: S1\nInsurance: 11.17 min base  |  2.80 min express
vehicle_DescANVL_Hornet_F7CM_Mk2=Fabricant : Anvil Aerospace\nRôle : Chasseur Moyen\n \nAnvil Aerospace a perfectionné son célèbre chasseur militaire de supériorité spatiale à l'aide des technologies les plus récentes et a conçu le F7C-M Super Hornet Mk II,  en conservant le second siège et la tourelle altazimutale qui ont fait de l'original un appareil vraiment terrifiant.\n\n--- STATS ---\nSCM: 215 m/s  |  Max: 1,125 m/s\nBoost: +465 m/s  /  -240 m/s\nCrew: 2  |  Length: 24.0m  |  Class: Combat  |  Role: Chasseur Moyen\nShields: 3× S1  |  Coolers: 2× S1  |  Power: S2  |  QD: S1\nInsurance: 10.17 min base  |  2.55 min express
vehicle_DescANVL_Hornet_F7CR=Constructeur : Anvil Aerospace\nRôle : Éclaireur\n\n Alors que le Ghost est fait pour se cacher, le Tracker est fait pour trouver. Le F7C-R Hornet Tracker Mk I dispose d'un équipement radar avancé, idéal pour les explorateurs, qui dans leur voyage vers l'inconnue, ont besoin de scanners de haute précision. Certaines milice et marchand détourne l'usage le Tracker pour en faire un centre de commande pour leurs escadrons.\n\n--- STATS ---\nSCM: 219 m/s  |  Max: 1,142 m/s\nBoost: +477 m/s  /  -249 m/s\nCrew: 1  |  Length: 28.2m  |  Class: Exploration  |  Role: Éclaireur\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 6,600\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 24  |  E 13  |  D 0  |  T 0\nInsurance: 8.10 min base  |  2.70 min express
vehicle_DescANVL_Hornet_F7CR_Mk2=Fabricant : Anvil Aerospace\nRôle : Éclaireur\n \nLorsque vous êtes à la recherche de la nouvelle grande frontière, à qui mieux se fier qu'un éclaireur de nouvelle génération ? Le F7C-R Hornet Tracker Mk II est doté d'une suite radar révisée, idéale pour les explorateurs de l'espace lointain qui ont besoin de profondeur et de précision dans leurs scans.\n\n--- STATS ---\nSCM: 220 m/s  |  Max: 1,150 m/s\nBoost: +480 m/s  /  -250 m/s\nCrew: 1  |  Length: 22.5m  |  Class: Combat  |  Role: Éclaireur\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nInsurance: 9.33 min base  |  2.33 min express
vehicle_DescANVL_Hornet_F7CS=Constructeur : Anvil Aerospace\nRôle : Chasseur furtif\n\nGrace à ses moteurs et armes à faibles émissions et sa technologie de Blindage Vide capable d’absorber les ondes, le F7C-S Hornet Ghost Mk I est conçu pour les pilotes qui veulent rester discrets. Le Ghost peut passer sous le nez du plus affuté des observateurs pour accomplir n'importe lequel de ses objectifs. Soyez rassuré, on ne vous dénoncera pas.\n\n--- STATS ---\nSCM: 219 m/s  |  Max: 1,142 m/s\nBoost: +477 m/s  /  -249 m/s\nCrew: 1  |  Length: 28.2m  |  Class: Combat  |  Role: Chasseur Furtif\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 6,600\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 24  |  E 13  |  D 0  |  T 0\nInsurance: 9.72 min base  |  3.24 min express
vehicle_DescANVL_Hornet_F7CS_Mk2=Fabricant : Anvil Aerospace\nRôle : Chasseur furtif\n \nEn concevant la refonte Mk II du F7C-S Hornet Ghost, les ingénieurs d'Anvil Aerospace ont voulu préserver ce que les pilotes aimaient dans les moteurs à faibles émissions, les armes à faible consommation et la technologie de Blindage Void de l'original, tout en les affinant pour atteindre un niveau de performance encore plus élevé et entrer dans une nouvelle ère de missions furtives.\n\n--- STATS ---\nSCM: 220 m/s  |  Max: 1,150 m/s\nBoost: +480 m/s  /  -250 m/s\nCrew: 1  |  Length: 22.5m  |  Class: Combat  |  Role: Chasseur Furtif\nShields: 2× S1  |  Coolers: 2× S1  |  QD: S1\nInsurance: 9.50 min base  |  2.38 min express
