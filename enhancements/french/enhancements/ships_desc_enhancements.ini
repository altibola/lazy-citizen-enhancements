vehicle_DescVNCL_Mauler=Constructeur : Clans Vanduuls\nRôle : Destroyer\n\nLe Mauler est un énorme vaisseau d'escorte indispensable à la flotte Vanduul. Véritable mastodonte, il offre à ses pilotes un sentiment de puissance grâce à sa structure angulaire à plusieurs niveaux, son arsenal impressionnant et ses pointes acérées sur les flancs, qui servent à la fois à l'aérodynamisme et à intimider l'adversaire.\n\n--- STATS ---\nSCM: 140 m/s  |  Max: 850 m/s\nBoost: +270 m/s  /  -150 m/s\nCrew: 19  |  Length: 425.0m  |  Class: Combat  |  Role: Destroyer\nTurrets: 62  10× S6\nShields: 3× S4  |  Coolers: 2× S4  |  Power: S4  |  QD: S4\nArmor HP: 72,930\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 528  |  E 378  |  D 0  |  T 0\nInsurance: 33.33 min base  |  3.33 min express
vehicle_DescVNCL_Scythe=Constructeur : Esperia\nRôle : Chasseur Moyen\n\nDevenu rapidement le symbole de la race Vanduul, le Scythe est vaisseau classique dans chaque raid et est la cible de tous les pilotes de chasse humains. Doté d'un arsenal important, le Scythe a pour véritable atout sa manœuvrabilité, trouvée grâce à ses deux propulseurs principaux et à ses douze propulseurs de manœuvre.\n\n--- STATS ---\nSCM: 222 m/s  |  Max: 1,150 m/s\nBoost: +480 m/s  /  -230 m/s\nCrew: 1  |  Length: 33.0m  |  Class: Combat  |  Role: Chasseur Moyen\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 6,600\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 22  |  E 14  |  D 0  |  T 0\nInsurance: 5.91 min base  |  1.97 min express
vehicle_DescXIAN_Nox=Constructeur : Aopoa\nRôle : Course\n\nDérapez avec le Nox 2947. Ce bolide rapide et maniable de chez Aopoa est capable de se faufiler à la surface des planètes ou dans l'espace lointain. Disponible pour la première fois dans l'espace Humain, le Nox a été spécialement repensé pour les pilotes humains et est prêt pour la course.\n\n--- STATS ---\nSCM: 225 m/s  |  Max: 619 m/s\nBoost: +305 m/s  /  -145 m/s\nCrew: 1  |  Length: 1.4m  |  Class: CompÉtition  |  Role: Course\nCoolers: S0  |  Power: S0\nArmor HP: 1,560\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.10 min base  |  0.00 min express
vehicle_DescXIAN_Nox_Kue=Constructeur : Aopoa\nRôle : Course\n\nTirant son nom du mot Xi'an signifiant "poussée", la Nox Kue offre cela et bien plus encore. Cette version limitée de la moto de course à verrière ouverte présente une superbe finition argent brossé et a été spécialement créée pour célébrer la vente inaugurale de la première Nox pour les pilotes humains.\n\n--- STATS ---\nCrew: 1  |  Length: 1.4m  |  Class: CompÉtition  |  Role: Course\nCoolers: S0  |  Power: S0\nArmor HP: 1,560\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.10 min base  |  0.00 min express
vehicle_DescXIAN_Scout=Constructeur : Aopoa\nRôle : Chasseur Léger\n\nLa corporation Xi'an Aopoa fabrique un modèle d'exportation du Qhire Khartu, le Khartu-al, destiné à être vendu aux civils humains en tant qu'éclaireur / explorateur spécialisé. Le modèle d'exportation dispose de la même plate-forme de manœuvre Xi'an, mais les surfaces de contrôle ont été modifiées pour une utilisation Humaine et l'armement est également réduit.\n\n--- STATS ---\nSCM: 224 m/s  |  Max: 1,183 m/s\nBoost: +504 m/s  /  -254 m/s\nCrew: 1  |  Length: 32.0m  |  Class: Combat  |  Role: Chasseur Leger\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,400\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 10  |  E 9  |  D 0  |  T 0\nInsurance: 5.06 min base  |  1.69 min express
vehicle_DescXNAA_SantokYai=Constructeur : Aopoa\nRôle : Chasseur Moyen\n\nExploitant la puissance des systèmes de vol Xi'an de nouvelle génération, des propulseurs à double vecteur améliorés et d'un arsenal impressionnant, Aopoa a conçu un chasseur qui conserve la dextérité agile et la vive maniabilité qui font la réputation de la marque.\n\n--- STATS ---\nSCM: 227 m/s  |  Max: 1,161 m/s\nBoost: +493 m/s  /  -225 m/s\nCrew: 1  |  Length: 24.0m  |  Class: Combat  |  Role: Chasseur Moyen\nInsurance: 7.50 min base  |  2.50 min express
vehicle_Descprobe_comms_1_a=Constructeur : Chimera Communications \nRôle : Recon\n\nL'Auris, du fabricant Chimera Communications, vous permet de collecter et de stocker facilement les transmissions, ce qui le rend idéal pour la surveillance des activités à courte portée. Conçu pour être pratiquement invisible pendant le fonctionnement, cette Sonde de Collecte de Données Passive (CDP) de faible puissance est parfait pour fournir une sécurité supplémentaire à n'importe quelle station ou installation avec un enregistrement détaillé des transmissions de données et des enregistrements du trafic maritime local. De plus, l'émetteur de rafale de secours inclus permet de transférer les banques de données en cas d'urgence, offrant ainsi une tranquillité d'esprit supplémentaire.\n\n--- STATS ---\nCrew: 1  |  Length: 18.0m  |  Class: Transporteur  |  Role: Fret Leger\nShields: S1  |  Coolers: S1  |  Power: S3\nInsurance: 33.33 min base  |  3.33 min express
vehicle_descANVL_Paladin=Fabricant : Anvil Aerospace\nRôle : Cannonière\n \nConçu par Anvil Aerospace, le Paladin est un combattant de première ligne intimidant qui fait sensation dès qu'il arrive sur le champ de bataille. Qu'il s'agisse d'exécuter une opération dangereuse ou de mener la charge contre des adversaires redoutables, le Paladin est prêt à partir à la rescousse grâce à sa puissante panoplie d'armes et de tourelles.\n\n--- STATS ---\nSCM: 175 m/s  |  Max: 950 m/s\nBoost: +340 m/s  /  -200 m/s\nCrew: 4  |  Length: 0.0m  |  Class: Cannonière  |  Role: Cannonière\nInsurance: 24.00 min base  |  6.00 min express
vehicle_descMISC_Starlancer_MAX=Fabricant : MISC\nRôle : Fret Moyen\n \nPour ceux qui souhaitent développer leurs activités de transport, les ingénieurs de MISC ont amélioré le Starlancer MAX en y ajoutant une soute particulièrement spacieuse, prête à accueillir du fret et des véhicules. Avec des aménagements confortables pour les longs trajets et un ensemble défensif complet pour les sorties hors des sentiers battus, il est facile de voir pourquoi le Starlancer MAX est le transporteur préféré des pilotes industrieux à travers le 'verse.\n\n--- STATS ---\nCrew: 1  |  Length: 90.0m  |  Class: Transporteur  |  Role: Fret Moyen\nTurrets: 2\nShields: S3  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 12,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 315  |  E 360  |  D 0  |  T 0\nInsurance: 12.33 min base  |  3.08 min express
vehicle_descMISC_Starlancer_TAC=Fabricant : MISC\nRôle : Vaisseau de Combat\n \nPour ceux en quête d'un vaisseau polyvalent capable de tenir bon dans un combat, les ingénieurs ont doté le Starlancer TAC d'un arsenal offensif agressif prêt à affronter les adversaires les plus féroces. Lorsque vous entreprenez une mission à haut risque et à forte récompense, le Starlancer TAC est là pour s'assurer que vous et votre équipage êtes en mesure de la mener à bien jusqu'au bout.\n\n--- STATS ---\nSCM: 150 m/s  |  Max: 960 m/s\nBoost: +315 m/s  /  -155 m/s\nCrew: 1  |  Length: 90.0m  |  Class: Combat  |  Role: Cannoniere\nTurrets: 9\nShields: 2× S3  |  Coolers: S3  |  Power: S3  |  QD: S2\nArmor HP: 18,150\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 347  |  E 396  |  D 0  |  T 0\nInsurance: 13.33 min base  |  3.33 min express
vehicles_DescOrbital_Sentry=L'Overseer, du fabricant Broad & Raibee, permet de surveiller l'activité défensive dans une zone donnée. Lorsqu'une menace est détectée, l'Overseer est capable de cibler et d'engager des ennemis qui commettent une infraction avec une efficacité brutale, ce qui le rend parfait pour fournir une sécurité supplémentaire à n'importe quelle station, installation ou secteur contrôlé.\n\n--- STATS ---\nCrew: 1  |  Length: 18.0m  |  Class: Combat  |  Role: Tourelle\nTurrets: 1\nShields: S2  |  Coolers: S3  |  Power: S3\nInsurance: 33.33 min base  |  3.33 min express
