vehicle_DescARGO_SRV=Constructeur : Argo Astronautics\nRôle : Récupération\n\n Lorsqu'il est nécessaire de faire le boulot, Argo ne plaisante pas. Du simple remorquage de fret et de marchandises aux opérations de recherche et de sauvetage les plus éprouvantes, le SRV peut gérer tout ce que vous lui demandez de faire. Le système de remorquage sur-mesure utilise une combinaison de bras et de plateau innovante, permettant une utilisation individuelle sans effort ainsi qu'un remorquage de précision en équipe pour les travaux plus importants. Votre équipage et vos passagers sont également en sécurité grâce à des boucliers durables et à un blindage robuste qui protègent le cockpit et les composants lorsque la situation devient délicate.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,100 m/s\nBoost: +460 m/s  /  -235 m/s\nCrew: 1  |  Length: 31.5m  |  Class: Assistance  |  Role: Récupération\nShields: S2  |  Coolers: S2  |  Power: S2  |  QD: S2\nArmor HP: 3,740\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 10  |  E 9  |  D 0  |  T 0\nInsurance: 13.22 min base  |  4.75 min express
vehicle_DescBanu_Defender=Constructeur : Banu \nRôle : Chasseur Léger\n\nDécouvrez le Banu Defender, un chasseur multi-équipage dont l'aspect en patchwork met en lumière la technologie provenant d'une variété d'espèces. Doté d'un logement modeste pour son équipage et d'un accès facile aux composants, le Defender tire son nom du rôle qu'il joue : la première ligne de défense contre les attaques ennemies. C'est pourquoi le Defender est le compagnon idéal pour le Merchantman : l'un pour faire le transport massif et l'autre pour s'occuper des combats aériens mortels.\n\n--- STATS ---\nSCM: 222 m/s  |  Max: 1,175 m/s\nBoost: +480 m/s  /  -255 m/s\nCrew: 1  |  Length: 24.5m  |  Class: Combat  |  Role: Chasseur Leger\nMRacks: 2× S3\nShields: S2  |  Coolers: 2× S1  |  Power: 2× S1  |  QD: S1\nArmor HP: 5,400\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 20  |  E 16  |  D 0  |  T 0\nInsurance: 13.61 min base  |  4.54 min express
