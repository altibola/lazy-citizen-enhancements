vehicle_DescDRAK_Clipper=Fabricant : Drake Interplanetary\nRôle : Multi-usage\n \nS'il y a une chose que tout capitaine doit garder à l'esprit lorsqu'il se prépare à voyager à travers les étoiles, c'est "s'attendre à l'inattendu". Avec sa soute, ses installations médicales et ses capacités de fabrication, ainsi que le sens pratique de Drake en matière de design, le Clipper est le vaisseau polyvalent idéal pour toute nouvelle aventure spatiale.\n\n--- STATS ---\nSCM: 205 m/s  |  Max: 1,000 m/s\nBoost: +405 m/s  /  -230 m/s\nCrew: 1  |  Length: 26.5m  |  Class: Exploration  |  Role: Multi-usage\nInsurance: 8.17 min base  |  2.05 min express
vehicle_DescDRAK_Command_Module=Fabricant : Drake Interplanetary\nRôle : Logistique\n\nMême les capitaines les plus expérimentés savent qu'il vaut parfois mieux limiter les dégâts plutôt que de risquer le tout pour le tout. Grâce à ce module de commande amovible, Drake a veillé à ce que les pilotes avisés puissent se détacher du corps principal du vaisseau et s'échapper rapidement sans difficulté, si le besoin s'en fait sentir.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,100 m/s\nBoost: +350 m/s  /  -220 m/s\nCrew: 2  |  Length: 20.0m  |  Class: Transport  |  Role: Transport\nInsurance: 3.00 min base  |  0.00 min express
vehicle_DescDRAK_Corsair=Constructeur : Drake Interplanetary\nRôle : Expédition\n\nRépondez à l'appel de l'espace inexploré et exploitez votre esprit d'exploration avec le Drake Corsair. Grâce à sa coque asymétrique unique, cet explorateur polyvalent peut aller là où les vents de l'aventure vous mènent.\n\n--- STATS ---\nSCM: 190 m/s  |  Max: 1,025 m/s\nBoost: +390 m/s  /  -205 m/s\nCrew: 4  |  Length: 53.0m  |  Class: Exploration  |  Role: Expedition\nInsurance: 17.01 min base  |  5.67 min express
vehicle_DescDRAK_Corsair_PYAM_Exec=Constructeur : Drake Interplanetary\nRôle : Expédition\n\nRÉpondez à l'appel de l'espace inexploré et exploitez votre esprit d'exploration avec le Drake Corsair. Grâce à sa coque asymétrique unique, cet explorateur polyvalent peut aller là où les vents de l'aventure vous mènent. Cette variante est dotée d'une livrée et un armement exclusifs.\n\n--- STATS ---\nCrew: 4  |  Length: 53.0m  |  Class: Exploration  |  Role: Expedition\nInsurance: 17.01 min base  |  5.67 min express
vehicle_DescDRAK_Cutlass_Black=Constructeur : Drake Interplanetary\nRôle : Fret Léger / Chasseur Moyen\n\nDrake Interplanetary affirme que le Cutlass Black est une solution peu coûteuse et facile à entretenir pour les unités de milice intra-système locales. La soute plus grande que la moyenne, le siège de l'officier d'interception radar (OIR) et l'emplacement dédié au rayon tracteur sont, selon la documentation de l'entreprise, destinés à faciliter les opérations de recherche et de sauvetage.\n\n--- STATS ---\nSCM: 217 m/s  |  Max: 1,150 m/s\nBoost: +465 m/s  /  -230 m/s\nCrew: 3  |  Length: 37.5m  |  Class: Multi-RÔle  |  Role: Fret Léger / Chasseur Moyen\nInsurance: 9.99 min base  |  3.33 min express
vehicle_DescDRAK_Cutlass_Black_PYAM_Exec=Constructeur : Drake Interplanetary\nRôle : Fret Léger / Chasseur Moyen\n\nDrake Interplanetary affirme que le Cutlass Black est une solution peu coûteuse et facile à entretenir pour les unités de milice intra-système locales. La soute plus grande que la moyenne, le siège de l'officier d'interception radar (OIR) et l'emplacement dédié au rayon tracteur sont, selon la documentation de l'entreprise, destinés à faciliter les opérations de recherche et de sauvetage. Cette variante est dotée d'une livrée et d'un armement exclusifs.\n\n--- STATS ---\nCrew: 3  |  Length: 37.5m  |  Class: Multi-RÔle  |  Role: Fret Léger / Chasseur Moyen\nInsurance: 9.99 min base  |  3.33 min express
vehicle_DescDRAK_Cutlass_Black_ShipShowdown=Constructeur : Drake Interplanetary\nRôle : Fret Léger / Chasseur Moyen\n\nDrake Interplanetary affirme que le Cutlass Black est une solution peu coûteuse et facile À entretenir pour les unités de milice intra-système locales. La soute inhabituellement spacieuse, le siège RIO et l'emplacement dédié au rayon tracteur sont, comme le soutient la brochure de l'entreprise, pour faciliter les opérations de recherche et de sauvetage.\n\n--- STATS ---\nCrew: 3  |  Length: 37.5m  |  Class: Multi-RÔle  |  Role: Fret Léger / Chasseur Moyen\nInsurance: 9.99 min base  |  3.33 min express
vehicle_DescDRAK_Cutlass_Blue=Constructeur : Drake Interplanetary\nRÔle : Interdiction\n\nÉlÉgant, méchant et royal. Le Cutlass Blue ajoute des missiles, un moteur plus agressif, et des cellules de dÉtention Durasteel dans la soute du modèle standard. Le Cutlass Blue est le vaisseau standard de la milice du monde extÉrieur pour les patrouilles.\n\n--- STATS ---\nSCM: 220 m/s  |  Max: 1,165 m/s\nBoost: +467 m/s  /  -230 m/s\nCrew: 3  |  Length: 37.5m  |  Class: Combat  |  Role: Interdiction\nInsurance: 9.99 min base  |  3.33 min express
vehicle_DescDRAK_Cutlass_Red=Constructeur : Drake Interplanetary\nRÔle : Médical\n\nLe Cutlass Red convertit la soute standard en un centre mÉdical bien équipÉ comprenant un Autodoc. Cette ambulance stellaire est ÉquipÉe d'un transpondeur Nav-E7, d'un scanner longue portÉe et d'un collier d'amarrage Secure Plus, ce qui la rend idÉale pour les opÉrations de recherche et de sauvetage. Ce modÈle est Également dotÉ d'un habillage unique en forme de croix rouge.\n\n--- STATS ---\nSCM: 212 m/s  |  Max: 1,125 m/s\nBoost: +460 m/s  /  -230 m/s\nCrew: 2  |  Length: 37.5m  |  Class: Assistance  |  Role: Medical\nInsurance: 14.99 min base  |  5.00 min express
vehicle_DescDRAK_Cutlass_Steel=Constructeur : Drake Interplanetary\nRôle : Transport de Troupes\n\nAvec le Cutlass Steel, Drake Interplanetary a de nouveau réinventé son design classique afin de créer la nouvelle génération de vaisseau de transport de combat au travers de l'ajout de strapontins et d'un arsenal amélioré. C'est un dangereux univers là-haut, et le Cutlass Steel est prêt à se frayer un chemin à travers tout ce qui se tiendrait sur votre route et celle de votre équipage.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,100 m/s\nBoost: +420 m/s  /  -240 m/s\nCrew: 3  |  Length: 37.5m  |  Class: Combat  |  Role: Transport de Troupes\nInsurance: 11.99 min base  |  4.00 min express
vehicle_DescDRAK_Cutter=Constructeur : Drake Interplanetary\nRôle : Démarrage / Éclaireur\n\nConçu pour les travailleurs acharnés de tous horizons, le Cutter renferme 4 SCU d'espace cargo et de nombreux atouts dans une structure brute, versatile, et compacte. Il s'agit d'un vaisseau qui incarne l'esprit de Drake : qu'importe qui vous êtes ou ce que vous faites, vous pouvez atteindre les étoiles.\n\n--- STATS ---\nSCM: 180 m/s  |  Max: 1,010 m/s\nBoost: +380 m/s  /  -160 m/s\nCrew: 1  |  Length: 20.0m  |  Class: Exploration  |  Role: Demarrage / Eclaireur\nShields: S1  |  Coolers: S1  |  Power: S1  |  QD: S1\nArmor HP: 1,980\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 8  |  D 0  |  T 0\nInsurance: 3.37 min base  |  1.12 min express
vehicle_DescDRAK_Cutter_Rambler=Fabricant : Drake Interplanetary\nRÔle : Expédition\n\nLes responsables chez Drake ont entendu ce que vous aviez À dire, et leur rÉponse a ÉtÉ le Cutter Rambler. S'appuyant sur l'original, le Rambler prÉserve un espace de chargement complet de 2 SCU tout en ajoutant le confort demandÉ et suffisamment d'espace de stockage personnel pour que mÊme le voyage le plus long se dÉroule en un Éclair.\n\n--- STATS ---\nCrew: 1  |  Length: 20.0m  |  Class: Exploration  |  Role: Expedition\nCoolers: S1  |  Power: S1  |  QD: S1\nArmor HP: 1,980\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 8  |  D 0  |  T 0\nInsurance: 1.25 min base  |  0.00 min express
vehicle_DescDRAK_Cutter_Scout=Constructeur : Drake Interplanetary\nRôle : Éclaireur\n\nEn réduisant la structure compacte du Cutter à l'essentiel, Drake a transformé un vaisseau déjà impressionnant en un vaisseau d'exploration idéal. Doté de capacités de radar et de balayage améliorées, ainsi que d'une puissance et d'un refroidissement accrus, le Cutter Scout est prêt à prendre la tête du peloton.\n\n--- STATS ---\nSCM: 180 m/s  |  Max: 1,010 m/s\nBoost: +380 m/s  /  -160 m/s\nCrew: 1  |  Length: 20.0m  |  Class: Exploration  |  Role: Éclaireur\nCoolers: S2  |  Power: S2\nArmor HP: 1,980\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 8  |  D 0  |  T 0\nInsurance: 3.87 min base  |  1.28 min express
