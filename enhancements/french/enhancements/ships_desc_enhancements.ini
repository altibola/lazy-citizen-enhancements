vehicle_DescORIG_100i=Constructeur : Origin Jumpworks\nRôle : Démarrage / Éclaireur\n\nExplorez l'univers avec le couple parfait de la luxure et de la performance. Le 100i comprend le système de fuel AIR breveté par Origin Jumpworks, ce qui en fait le vaisseau le plus efficace et le plus écologique du marché. Capable d'effectuer des vols longue distance pour lesquels la plupart des vaisseaux de sa taille ne sont pas équipés, le 100i est parfait pour les pilotes solitaires qui cherchent à faire tourner les têtes sans sacrifier fonctionnalité ou fiabilité.\n\n--- STATS ---\nSCM: 223 m/s  |  Max: 1,230 m/s\nBoost: +610 m/s  /  -290 m/s\nCrew: 1  |  Length: 19.0m  |  Class: Exploration  |  Role: Demarrage / Eclaireur\nGuns: 2\nShields: S1  |  Coolers: 2× ?  2× S1  |  Power: S1  |  QD: S1\nArmor HP: 1,920\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 7  |  D 0  |  T 0\nInsurance: 3.36 min base  |  1.12 min express
vehicle_DescORIG_125a=Constructeur : Origin Jumpworks\nRôle : Chasseur Léger\n\nLes risques valent le coup d'être pris, mais pourquoi risquer de se retrouver à court de carburant en plein combat ? Avec le système de carburant AIR, un armement revu à la hausse, et tout le luxe auquel vous pouvez vous attendre en provenance de Origin Jumpworks, le 125a a été conçu pour les anticonformistes éclairés.\n\n--- STATS ---\nSCM: 230 m/s  |  Max: 1,260 m/s\nBoost: +610 m/s  /  -300 m/s\nCrew: 1  |  Length: 19.0m  |  Class: Combat  |  Role: Chasseur Leger\nGuns: 2\nShields: S1  |  Coolers: 2× ?  2× S1  |  Power: S1  |  QD: S1\nArmor HP: 1,920\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 7  |  D 0  |  T 0\nInsurance: 4.54 min base  |  1.51 min express
