vehicle_DescANVL_C8R_Pisces_Rescue=Constructeur : Anvil Aerospace\nRÔle : MÉdical\n\nAvec l'ajout d'un Lit Médical Tier 3 À bord, le C8R Pisces peut traiter les blessures lÉgÈres et garder un patient stable lors de son transport vers un vaisseau plus grand, une station ou un centre mÉdical À proximitÉ, en faisant un atout incontournable pour les missions de recherche et sauvetage À courte distance.\n\n--- STATS ---\nCrew: 1  |  Length: 16.0m  |  Class: Assistance  |  Role: Medical\nGuns: 2\nShields: S1  |  Coolers: S1  |  Power: S1\nInsurance: 4.59 min base  |  1.53 min express
vehicle_DescANVL_C8X_Pisces_Expedition=Constructeur : Anvil Aerospace\nRôle : Éclaireur\n\nEmportant plus d'armes et une livrée en édition limitée, le C8X Pisces Expedition transforme le robuste parasite en un vaisseau d'exploration autonome parfaitement viable. Avec son châssis compacte, sa manœuvrabilité aisée et ses trois sièges, le Pisces Expedition est prêt à partir pour ses propres aventures.\n\n--- STATS ---\nCrew: 1  |  Length: 16.0m  |  Class: Exploration  |  Role: Éclaireur\nGuns: 4\nShields: S1  |  Coolers: S1  |  Power: S1  |  QD: S1\nInsurance: 3.36 min base  |  1.12 min express
