vehicle_DescARGO_RAFT=Constructeur : Argo Astronautics\nRôle : Fret Moyen\n\nL'Argo RAFT est équipé d'une imposante soute à marchandises de 192 SCU et peut transporter des conteneurs de marchandises standardisés de 32 SCU. Parfait aussi bien pour les transporteurs débutants que les vétérans, le RAFT est une solution idéale et fiable pour le transport local de marchandises.\n\n--- STATS ---\nSCM: 140 m/s  |  Max: 990 m/s\nBoost: +340 m/s  /  -150 m/s\nCrew: 2  |  Length: 39.5m  |  Class: Transporteur  |  Role: Fret Moyen\nInsurance: 14.00 min base  |  2.00 min express
