vehicle_DescESPR_Blade=Fabricant : Clans Vanduuls\nRôle : Chasseur Léger\n\nCes chasseurs légers, baptisés "Blade", sont souvent utilisés par les Vanduuls comme éclaireurs et vaisseaux d'assaut de première vague. Ils ont également fait leurs preuves en tant qu'unités d'escarmoucheurs grâce à leur vitesse qui leur permet de poursuivre tout vaisseau tentant de fuir la zone. Depuis plusieurs décennies, des escadrons d'agresseurs de l'Empire Uni de la Terre utilisent des répliques de chasseurs Blade produites sous contrat exclusif par Esperia, Inc.\n\n--- STATS ---\nSCM: 227 m/s  |  Max: 1,191 m/s\nBoost: +500 m/s  /  -260 m/s\nCrew: 1  |  Length: 20.5m  |  Class: Combat  |  Role: Chasseur Leger\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 3,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 7  |  D 0  |  T 0\nInsurance: 10.33 min base  |  3.44 min express
vehicle_DescESPR_Glaive=Fabricant : Esperia\nRôle : Chasseur Moyen\n\nLe Glaive est une version symétrique du Scythe. Généralement piloté par des Vanduuls plus expérimentés au combat, il est mieux armé et dispose de deux énormes lames/ailes, contrairement au Scythe standard qui n'en possède qu'une seule.\n\n--- STATS ---\nSCM: 218 m/s  |  Max: 1,150 m/s\nBoost: +480 m/s  /  -230 m/s\nCrew: 1  |  Length: 33.0m  |  Class: Combat  |  Role: Chasseur Moyen\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 6,600\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 22  |  E 14  |  D 0  |  T 0\nInsurance: 7.59 min base  |  2.53 min express
vehicle_DescESPR_Prowler=Constructeur : Esperia\nRôle : Transport de troupes\n\nNommé d'après l'appellation militaire de l'UPE, le Prowler est une version modernisée du fameux vaisseau d'abordage Tevarin de la Première Guerre Tevarin. L'efficacité du Prowler en tant que véhicule de déploiement rapide de personnel résidait principalement dans son silence. Avec le Prowler, vous retrouverez la fusion parfaite entre deux cultures : l'élégance et l'efficacité de la machine de guerre Tevarin avec la fiabilité de la technologie moderne de l'UEE.\n\n--- STATS ---\nSCM: 212 m/s  |  Max: 1,200 m/s\nBoost: +450 m/s  /  -240 m/s\nCrew: 1  |  Length: 34.0m  |  Class: Combat  |  Role: Transport de Troupes\nShields: 2× S2  |  Coolers: 2× S2  |  Power: S2  |  QD: S2\nArmor HP: 12,150\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 32  |  E 39  |  D 0  |  T 0\nInsurance: 23.22 min base  |  7.74 min express
vehicle_DescESPR_Prowler_Utility=Fabricant : Esperia\nRôle : Fret Léger\n\nBien qu'il n'existe aucun exemplaire connu fabriqué par les Tevarins de ce vaisseau historique, les historiens d'Esperia ont étudié les rapports militaires de l'UPE pour reconstituer ce Prowler modifié. Utilisé par l'armée tevarine pour livrer des fournitures urgentes au front, le Prowler Utility associe un rayon tracteur à une soute facilement accessible, ce qui permet de transférer des cargaisons avec précision sur le champ de bataille.\n\n--- STATS ---\nSCM: 208 m/s  |  Max: 1,110 m/s\nBoost: +437 m/s  /  -240 m/s\nCrew: 1  |  Length: 34.0m  |  Class: Transporteur  |  Role: Fret Leger\nShields: 2× S2  |  Coolers: 2× S2  |  Power: S2  |  QD: S2\nArmor HP: 12,150\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 32  |  E 39  |  D 0  |  T 0\nInsurance: 21.00 min base  |  5.25 min express
vehicle_DescESPR_Prowler_Utility_Collector_Indust=Fabricant : Esperia\nRôle : Fret Léger\n\nBien qu'il n'existe aucun exemplaire connu fabriqué par les Tevarins de ce vaisseau historique, les historiens d'Esperia ont étudié les rapports militaires de l'UPE pour reconstituer ce Prowler modifié. Utilisé par l'armée tevarine pour livrer des fournitures urgentes au front, le Prowler Utility associe un rayon tracteur à une soute facilement accessible, ce qui permet de transférer des cargaisons avec précision sur le champ de bataille. \n\nIci Wikelo. Avoir apporté modifications utiles pour rendre vaisseau encore plus performant. Vous aller adorer.\n\n--- STATS ---\nCrew: 1  |  Length: 34.0m  |  Class: Transporteur  |  Role: Fret Leger\nShields: 2× S2  |  Coolers: 2× S2  |  Power: S2  |  QD: S2\nArmor HP: 12,150\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 32  |  E 39  |  D 0  |  T 0\nInsurance: 21.00 min base  |  5.25 min express
vehicle_DescESPR_Stinger=Fabricant : Esperia\nRôle : Chasseur Lourd\n \nSemant la terreur le long des systèmes frontaliers de l'humanité, ce chasseur lourd vanduul, baptisé "Stinger" par la Navy de l'UEE, s'est forgé une réputation sanglante de menace majeure pour tout pilote et vaisseau capital. Initialement destinée à l'entraînement des escadrons d'agresseurs, Esperia propose désormais sa réplique détaillée au grand public. \n\n\n--- STATS ---\nSCM: 207 m/s  |  Max: 1,050 m/s\nBoost: +440 m/s  /  -230 m/s\nCrew: 1  |  Length: 36.0m  |  Class: Combat  |  Role: Chasseur Lourd\nInsurance: 25.30 min base  |  6.30 min express
vehicle_DescESPR_Talon=Constructeur : Esperia\nRôle : Chasseur Léger\n\nLe Talon représente les efforts continus d'Esperia pour tenter de préserver les styles historiques impactant de vaisseaux Tevarin. Un vaisseau de combat individuel manœuvrable avec une armure légère mais puissante, des boucliers directionnels "Phalanx", le Talon est conçu pour frapper le premier et frapper fort avant d'utiliser sa couverture de boucliers pour s'échapper.\n\n--- STATS ---\nSCM: 225 m/s  |  Max: 1,190 m/s\nBoost: +500 m/s  /  -260 m/s\nCrew: 1  |  Length: 24.0m  |  Class: Combat  |  Role: Chasseur Leger\nCoolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 3,000\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 8  |  E 10  |  D 0  |  T 0\nInsurance: 11.34 min base  |  3.78 min express
vehicle_DescESPR_Talon_Shrike=Constructeur : Esperia\nRôle : Chasseur Léger\n\nLe Talon représente les efforts continus d'Esperia pour tenter de préserver les styles historiques impactant de vaisseaux Tevarin. Un vaisseau de combat individuel manœuvrable avec une armure légère mais puissante, des boucliers directionnels "Phalanx", le Talon est conçu pour frapper le premier et frapper fort avant d'utiliser sa couverture de boucliers pour s'échapper. La fameuse variante Shrike est armée de portes-missile internes supplémentaires.\n\n--- STATS ---\nSCM: 225 m/s  |  Max: 1,190 m/s\nBoost: +500 m/s  /  -260 m/s\nCrew: 1  |  Length: 24.0m  |  Class: Combat  |  Role: Chasseur Leger\nCoolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 3,000\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 8  |  E 10  |  D 0  |  T 0\nInsurance: 11.34 min base  |  3.78 min express
vehicle_DescGAMA_Syulen=Constructeur : Gatac Manufacture\nRôle : Démarrage / Éclaireur\n\nLe vaisseau cargo Syulen a été conçu avec art par la célèbre maison Gatac pour convenir aussi bien aux pilotes humains qu'aux pilotes Xi’an. Avec son châssis raffiné et agile, le Syulen se prête au transport d'importantes livraisons à travers l'univers, ou constitue le vaisseau idéal pour ceux qui font leurs débuts dans la carrière de transporteur.\n\n--- STATS ---\nSCM: 225 m/s  |  Max: 1,175 m/s\nBoost: +450 m/s  /  -230 m/s\nCrew: 1  |  Length: 0.0m  |  Class: Multi-RÔle  |  Role: Demarrage / Eclaireur\nShields: 2× S1  |  Coolers: S1  |  Power: S1  |  QD: S1\nArmor HP: 4,352\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 2.95 min base  |  1.10 min express
