vehicle_DescMRAI_Pulse=Fabricant: Mirai\nRôle : Combat\n \nLes ingénieurs de Mirai se sont attelés à la conception d'une moto capable de performances accrues. Une connexion plus intime entre le pilote et la performance grâce à une silhouette qui épouse la forme du corps. Une façon plus intuitive de dompter des paysages redoutables grâce à un système grav-lev réactif. Une expérience de combat plus intelligente avec une arme personnalisée entièrement intégrée à l'esprit du véhicule. Résultat ? La Mirai Pulse.\n\n\n--- STATS ---\nSCM: 204 m/s  |  Max: 561 m/s\nBoost: +284 m/s  /  -124 m/s\nCrew: 1  |  Length: 3.5m  |  Class: Combat  |  Role: Éclaireur\nCoolers: S0  |  Power: S0\nArmor HP: 1,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 6  |  E 4  |  D 0  |  T 0\nInsurance: 0.15 min base  |  0.05 min express
