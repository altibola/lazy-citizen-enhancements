vehicel_DescANVL_Valkyrie=Constructeur : Anvil Aerospace \nRôle : Transport de Troupes\n\nLe Valkyrie rehausse le niveau en terme de transport de troupes. Conçu pour transporter jusqu'à vingt soldats ainsi que des véhicules dans les endroits les plus hostiles, ce vaisseau militaire paré au combat est une force incommensurable, autant offensivement que défensivement. Conçu en gardant à l'esprit les militaires et les prestataires privées de défense, le Valkyrie est l'un des transports de personnel les plus efficaces et les plus performants de sa catégorie.\n\n--- STATS ---\nSCM: 207 m/s  |  Max: 1,110 m/s\nBoost: +431 m/s  /  -245 m/s\nCrew: 1  |  Length: 48.0m  |  Class: Combat  |  Role: Transport de Troupes\nTurrets: 6\nShields: 2× S2  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 23,760\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 139  |  E 88  |  D 0  |  T 0\nInsurance: 19.82 min base  |  4.98 min express
vehicl_DescMISC_Hull_B=Constructeur : MISC\nRôle : Fret Moyen\n\nLe MISC Hull B est une option robuste pour les pilotes qui recherchent un vaisseau dédié au transport de cargaison. Bien qu'il ne soit pas aussi large que les autres modèles de la série Hull, le profil plus petit du Hull B offre une plus grande flexibilité et davantage d'options d'accès.\n\n--- STATS ---\nSCM: 145 m/s  |  Max: 960 m/s\nBoost: +340 m/s  /  -180 m/s\nCrew: 2  |  Length: 71.0m  |  Class: Transporteur  |  Role: Fret Moyen\nInsurance: 11.66 min base  |  2.85 min express
vehicle_DescAEGS_Avenger_Stalker=Constructeur : Aegis Dynamics \nRôle : Intercepteur\n\nInitialement conçu par Aegis comme vaisseau de transport militaire destiné au front, l'Avenger Stalker a pris un chemin différent, menant finalement une longue et riche carrière en tant que patrouilleur standard de l'Advocacy de l'UEE. Se servant de sa large soute pour le transport de prisonniers, l'Avenger présente une coque fiables et robuste, ainsi qu'un emplacement pour un moteur étonnamment imposant.\n\n--- STATS ---\nSCM: 262 m/s  |  Max: 1,425 m/s\nBoost: +610 m/s  /  -280 m/s\nCrew: 1  |  Length: 20.0m  |  Class: Combat  |  Role: Intercepteur\nGuns: 2× S1 (empty)  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 1,232\nDmg Mult: P 0.80x  |  E 0.65x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 4.86 min base  |  1.62 min express
vehicle_DescAEGS_Avenger_Titan=Constructeur : Aegis Dynamics\nRôle : Fret Léger \n\nSe passant des cellules de prisonnier du Stalker ou du générateur d'IEM du Warlock, la soute du Titan est libre de transporter des marchandises. Toute cette place disponible associée aux capacités de combat éprouvées de l'Avenger font de lui un transporteur de fret léger plus que capable de se défendre dans un combat.\n\n--- STATS ---\nSCM: 262 m/s  |  Max: 1,425 m/s\nBoost: +610 m/s  /  -280 m/s\nCrew: 1  |  Length: 20.0m  |  Class: Transporteur  |  Role: Fret Leger\nGuns: 2× S1 (empty)  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,640\nDmg Mult: P 0.80x  |  E 0.65x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 4.05 min base  |  1.35 min express
vehicle_DescAEGS_Avenger_Titan_Renegade=Constructeur : Aegis Dynamics\nRôle : Fret Léger\n\nCréé dans le cadre de la série ‘Masters of Flight’ en collaboration avec la simulation spatiale Arena Commander, le Renegade rend hommage au célèbre pilote Danny Solomon pour son travail remarquable au sein de l'Advocacy afin d'apporter la justice dans Bremen. Cet Avenger Titan est équipé avec du matériel spécialisé dans le dogfight et d'une livrée édition spéciale pour honorer ce vaisseau iconique.\n\n--- STATS ---\nCrew: 1  |  Length: 20.0m  |  Class: Transporteur  |  Role: Fret Leger\nGuns: 2× S1 (empty)  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,640\nDmg Mult: P 0.80x  |  E 0.65x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 4.05 min base  |  1.35 min express
vehicle_DescAEGS_Avenger_Warlock=Constructeur : Aegis Dynamics\nRôle : Interdiction\n\nL'Avenger Warlock fut construit avec une seule philosophie de conception en tête : arrêter les vaisseaux, et ne pas les détruire. Probablement le plus proche d'un chasseur non-létal, le Warlock est équipé avec un générateur IEM Behring REP-8, capable d'émettre de puissantes ondes électromagnétiques pour désactiver toute électronique suffisamment malchanceuse pour se retrouver dans son rayon d'action.\n\n--- STATS ---\nSCM: 262 m/s  |  Max: 1,425 m/s\nBoost: +610 m/s  /  -280 m/s\nCrew: 1  |  Length: 20.0m  |  Class: Combat  |  Role: Interdiction\nGuns: 2× S1 (empty)  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,640\nDmg Mult: P 0.80x  |  E 0.65x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 4.86 min base  |  1.62 min express
vehicle_DescAEGS_Eclipse=Constructeur : Aegis Dynamics\nRôle : Bombardier Furtif\n\nL'Aegis Eclipse est un bombardier conçu pour s'infiltrer et frapper avant même qu'il ne soit repéré. Après un service intensif au sein de l'UEE, cet équipement militaire de haute technologie fut mis sur le marché civil en 2947.\n\n--- STATS ---\nSCM: 210 m/s  |  Max: 1,100 m/s\nBoost: +510 m/s  /  -215 m/s\nCrew: 1  |  Length: 24.5m  |  Class: Combat  |  Role: Bombardier Furtif\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,464\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 16.54 min base  |  5.51 min express
vehicle_DescAEGS_Firebird_Collector_Milt=Fabricant : Aegis Dynamics\nRôle : Chasseur Furtif\n \nLorsque les escarmouches sur le front nécessitent une offensive rapide et décisive, le Sabre Firebird est le chasseur moyen idéal pour tout arsenal. S'inspirant du Sabre Raven, qui a déjà fait ses preuves au combat, Aegis a conçu la variante Firebird avec un lance-missiles amélioré capable de s'attaquer à un large éventail de menaces.\n\n--- STATS ---\nCrew: 1  |  Length: 24.5m  |  Class: Combat  |  Role: Chasseur Furtif\nMRacks: S3\nArmor HP: 4,752\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 20  |  E 16  |  D 0  |  T 0\nInsurance: 7.56 min base  |  2.52 min express
vehicle_DescAEGS_Gladius=Constructeur : Aegis Dynamics\nRôle : Chasseur Léger\n\nLe Gladius est un ancien design qui fut mis à jour avec le temps afin de suivre les technologies modernes. Dans le monde militaire, le Gladius est apprécié pour ses performances et sa simplicité. Chasseur rapide et léger, le Gladius est un vaisseau d'interception ou d'escorte idéal pour les combats aériens.\n\n--- STATS ---\nSCM: 226 m/s  |  Max: 1,193 m/s\nBoost: +520 m/s  /  -268 m/s\nCrew: 1  |  Length: 21.0m  |  Class: Combat  |  Role: Chasseur Leger\nMRacks: 4× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 3,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 5.83 min base  |  1.94 min express
vehicle_DescAEGS_Gladius_Dunlevy=Fabricant : Aegis Dynamics\nRôle : Chasseur Léger \n\nHonorez la mémoire de la célèbre capitaine qui a façonné l'histoire de l'escadron de chasseurs d'élite de l'UEE Navy avec la variante Dunlevy de l'Aegis Gladius. Ce vaisseau spécial rend hommage à la capitaine Alexandra Dunlevy et au 42 escadron avec ses accents rouges sur une peinture grise et ses composants de classe militaire.\n\n--- STATS ---\nCrew: 1  |  Length: 21.0m  |  Class: Combat  |  Role: Chasseur Leger\nMRacks: 4× S3\nQD: S1\nArmor HP: 3,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 5.83 min base  |  1.94 min express
vehicle_DescAEGS_Gladius_PIR=Aegis Gladius Pirate\n\n--- STATS ---\nCrew: 1  |  Length: 21.0m  |  Class: Combat  |  Role: Chasseur Leger\nMRacks: 4× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 3,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 10.12 min base  |  1.94 min express
vehicle_DescAEGS_Gladius_Valiant=Constructeur : Aegis Dynamics\nRôle : Chasseur Léger \n\nCréé dans le cadre de la série ‘Masters of Flight’ en collaboration avec la simulation spatiale Arena Commander, le Valiant rend hommage à la célèbre pilote Condi Hillard pour avoir été le premier Humain connu à vaincre un Vanduul en combat. Ce Gladius est équipé avec du matériel spécialisé dans le combat aérien et d'une livrée édition spéciale pour honorer son vaisseau iconique.\n\n--- STATS ---\nCrew: 1  |  Length: 21.0m  |  Class: Combat  |  Role: Chasseur Leger\nMRacks: 4× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 3,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 5.83 min base  |  1.94 min express
vehicle_DescAEGS_Hammerhead=Constructeur : Aegis Dynamics \nRôle : Cannonière Lourd\n\nUn vaisseau de patrouille rapide doté de plusieurs tourelles destinées à neutraliser les chasseurs, le Hammerhead est tout aussi à l'aise en support de vaisseaux capitaux au sein d'une flotte que pour agir comme vaisseau amiral pour un groupe de chasseurs.\n\n--- STATS ---\nSCM: 160 m/s  |  Max: 1,000 m/s\nBoost: +340 m/s  /  -170 m/s\nCrew: 2  |  Length: 120.0m  |  Class: Combat  |  Role: Vaisseau de Combat Lourd\nTurrets: 6\nShields: 2× S3  |  Coolers: 2× S3  |  Power: 2× S3  |  QD: S3\nArmor HP: 25,740\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 531  |  E 380  |  D 0  |  T 0\nInsurance: 48.60 min base  |  16.20 min express
vehicle_DescAEGS_Idris_M=Fabricant : Aegis Dynamics\nRôle : Frégate\n\nPlus grandes qu'un bombardier mais plus petites qu'un bâtiment de ligne, les frégates occupent une place intéressante dans le panthéon des vaisseaux de guerre. Bien qu'elles ne disposent pas du blindage lourd et de l'armement puissant d'un croiseur, la Navy de l'UEE apprécie ses frégates pour leur maniabilité et leur capacité à s'adapter à un large éventail de scénarios de combat.\n\n--- STATS ---\nCrew: 1  |  Length: 243.0m  |  Class: Combat  |  Role: Fregate\nTurrets: 1\nInsurance: 253.00 min base  |  63.25 min express
vehicle_DescAEGS_Idris_P=Fabricant : Aegis Dynamics\nRôle : Frégate\n\nVariante "pacificateur" de deuxième génération conçue pour les forces de patrouille de l'UEE, l'Idris-P est dépourvu du grand canon frontal et du support dorsal standards au profit d'une capacité de chargement accrue et d'une vitesse supérieure.\n\n--- STATS ---\nCrew: 1  |  Length: 243.0m  |  Class: Combat  |  Role: Fregate\nArmor HP: 72,930\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 528  |  E 462  |  D 0  |  T 0\nInsurance: 199.00 min base  |  49.75 min express
vehicle_DescAEGS_Idris_P_Collector_Military=Fabricant : Aegis Dynamics\nRôle : Frégate\n\nVariante "pacificateur" de deuxième génération conçue pour les forces de patrouille de l'UEE, l'Idris-P est dépourvu du grand canon frontal et du support dorsal standards au profit d'une capacité de chargement accrue et d'une vitesse supérieure.\n\nIci Wikelo. Modifications utiles apportées pour rendre vaisseau plus dur au combat. Très impressionnant.\n\n--- STATS ---\nCrew: 1  |  Length: 243.0m  |  Class: Combat  |  Role: Fregate\nArmor HP: 72,930\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 528  |  E 462  |  D 0  |  T 0\nInsurance: 199.00 min base  |  49.75 min express
vehicle_DescAEGS_Javelin=Constructeur : Aegis Dynamics\nRôle : Destroyer\n\nConçu pour une utilisation par l'armée de l'UEE, le Javelin est un énorme vaisseau capital modulaire pouvant servir à des fins entrepreneuriales. Avec un intérieur complet, un large choix de pièces modulaires, et la place nécessaire pour un important équipage, le Javelin est un vaisseau qui s'est fait une place dans de nombreux rôles.\n\n--- STATS ---\nSCM: 50 m/s  |  Max: 900 m/s\nBoost: +290 m/s  /  -230 m/s\nCrew: 1  |  Length: 0.0m  |  Class: Destroyer  |  Role: Destroyer\nTurrets: 28\nShields: 4× S4  |  Coolers: 4× S4  |  Power: 4× S4  |  QD: S4\nArmor HP: 117,810\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 539  |  E 473  |  D 0  |  T 0\nInsurance: 168.75 min base  |  56.25 min express
vehicle_DescAEGS_Reclaimer=Constructeur : Aegis Dynamics\nRôle : Recycleur Lourd\n\nL'Aegis Reclaimer est un vaisseau de recyclage industriel. Equipé d'une soute renforcée, d'un moteur de saut à longue portée et de nacelles de lancement pour des drones sans pilote, le Reclaimer est un vaisseau idéal pour profiter des épaves de l'espace lointain. Des rayons tracteurs, des projecteurs, des options de scanner et des ports d'amarrage complètent les outils de ce vaisseau spatial performant et utilitaire.\n\n--- STATS ---\nSCM: 110 m/s  |  Max: 870 m/s\nBoost: +290 m/s  /  -115 m/s\nCrew: 1  |  Length: 160.0m  |  Class: Industriel  |  Role: Recycleur Lourd\nTurrets: 3\nShields: S4  |  Coolers: S4  |  Power: S4  |  QD: S3\nArmor HP: 32,912\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 495  |  E 418  |  D 0  |  T 0\nInsurance: 30.69 min base  |  10.23 min express
vehicle_DescAEGS_Reclaimer_Teach=Constructeur : Aegis Dynamics\nRôle : Recycleur Lourd\n\nL'Aegis Reclaimer est un vaisseau de recyclage industriel. Equipé d'une soute renforcée, d'un moteur de saut à longue portée et de nacelles de lancement pour des drones sans pilote, le Reclaimer est un vaisseau idéal pour profiter des épaves de l'espace lointain. Des rayons tracteurs, des projecteurs, des options de scanner et des ports d'amarrage complètent les outils de ce vaisseau spatial performant et utilitaire.\n\nPour répondre aux conditions de travail difficiles de Nyx, Teach's Ship Shop a doté cette édition spéciale d'un équipement personnalisé comprenant des composants robustes afin que vous puissiez mieux vous acquitter de votre tâche.\n\n--- STATS ---\nCrew: 1  |  Length: 160.0m  |  Class: Industriel  |  Role: Recycleur Lourd\nTurrets: 3\nShields: S4  |  Coolers: S4  |  Power: S4  |  QD: S3\nArmor HP: 32,912\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 495  |  E 418  |  D 0  |  T 0\nInsurance: 30.69 min base  |  10.23 min express
vehicle_DescAEGS_Redeemer=Constructeur : Aegis Dynamics\nRôle : Cannonière \n\nConçu par Aegis Dynamics, le Redeemer est un puissant vaisseau de combat capable de tenir tête lors d'engagements grâce au puissant armement embarqué. Doté de tourelles et de missiles, le Redeemer sert également d'appareil de débarquement blindé capable d'apporter des soldats jusqu'à la ligne de front.\n\n--- STATS ---\nSCM: 203 m/s  |  Max: 1,050 m/s\nBoost: +400 m/s  /  -215 m/s\nCrew: 4  |  Length: 51.0m  |  Class: Combat  |  Role: Cannoniere\nGuns: 2  |  Turrets: 7  |  MRacks: 2× S4\nShields: 6× S2  |  Coolers: S3  |  Power: 2× S3  |  QD: S2\nArmor HP: 21,120\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 116  |  E 110  |  D 0  |  T 0\nInsurance: 28.35 min base  |  9.45 min express
vehicle_DescAEGS_Retaliator=Fabricant : Aegis Dynamics\nRôle : Modulaire\n\nCette refonte civile du Retaliator met à jour le châssis du vaisseau militaire avec des espace vides pouvant être équipés de divers modules pour répondre à vos besoins.\n\n--- STATS ---\nSCM: 205 m/s  |  Max: 1,100 m/s\nBoost: +400 m/s  /  -206 m/s\nCrew: 1  |  Length: 70.5m  |  Class: Combat  |  Role: Modulaire\nTurrets: 12\nCoolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 18,480\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 116  |  E 110  |  D 0  |  T 0\nInsurance: 25.74 min base  |  8.58 min express
vehicle_DescAEGS_Sabre=Constructeur : Aegis Dynamics\nRôle : Chasseur Furtif\n\nFaisant partie de la Phase Deux des nouveaux modèles de vaisseaux d'Aegis Dynamics, le Sabre fut conçu en tant que chasseur de supériorité spatiale pour les situations nécessitant de ne laisser qu'une légère signature derrière vous. Conçu pour réagir rapidement, le Sabre est tout à fait capable d'établir une domination sur le champ de bataille dans n'importe quel scénario de combat.\n\n--- STATS ---\nSCM: 223 m/s  |  Max: 1,235 m/s\nBoost: +480 m/s  /  -230 m/s\nCrew: 1  |  Length: 24.5m  |  Class: Combat  |  Role: Chasseur Furtif\nMRacks: 2× S4\nShields: 2× S1  |  Coolers: 2× S1  |  Power: 2× S1  |  QD: S1\nArmor HP: 2,772\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 20  |  E 16  |  D 0  |  T 0\nInsurance: 9.45 min base  |  3.15 min express
vehicle_DescAEGS_Sabre_Comet=Constructeur : Aegis Dynamics\nRôle : Chasseur Furtif\n\nCréé dans le cadre de la série ‘Masters of Flight’ en collaboration avec la simulation spatiale Arena Commander, le Comet rend hommage au célèbre pilote Kamur Dalion pour son travail remarquable avec Aegis pour voir naitre une nouvelle ère dans la conception des vaisseaux de combat. Ce Sabre est équipé avec du matériel spécialisé dans le combat aérien et d'une livrée édition spéciale pour honorer ce vaisseau iconique.\n\n--- STATS ---\nCrew: 1  |  Length: 24.5m  |  Class: Combat  |  Role: Chasseur Furtif\nMRacks: 2× S4\nShields: 2× S1  |  Coolers: 2× S1  |  Power: 2× S1  |  QD: S1\nArmor HP: 2,772\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 20  |  E 16  |  D 0  |  T 0\nInsurance: 9.45 min base  |  3.15 min express
vehicle_DescAEGS_Sabre_Firebird=Fabricant : Aegis Dynamics\nRôle : Chasseur Furtif\n \nLorsque les escarmouches sur le front nécessitent une offensive rapide et décisive, le Sabre Firebird est le chasseur moyen idéal pour tout arsenal. S'inspirant du Sabre Raven, qui a déjà fait ses preuves au combat, Aegis a conçu la variante Firebird avec un lance-missiles amélioré capable de s'attaquer à un large éventail de menaces.\n\n--- STATS ---\nSCM: 240 m/s  |  Max: 1,400 m/s\nBoost: +600 m/s  /  -260 m/s\nCrew: 1  |  Length: 24.5m  |  Class: Combat  |  Role: Chasseur Furtif\nMRacks: S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: 2× S1  |  QD: S1\nArmor HP: 4,752\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 20  |  E 16  |  D 0  |  T 0\nInsurance: 7.56 min base  |  2.52 min express
vehicle_DescAEGS_Sabre_Peregrine=Constructeur : Aegis Dynamics\nRôle : Course\n \nAprès avoir vu ce que les fans du Sabre Raven étaient capables d'accomplir avec le chasseur sur la piste de course, l'équipe de conception d'Aegis Dynamics a été inspirée pour créer une variante de course officielle pour le vaisseau agile. C'est ainsi qu'est né le Sabre Peregrine. Raffiné et doté de propulseurs supplémentaires, cet oiseau agile est prêt à franchir la ligne d'arrivée.\n\n--- STATS ---\nSCM: 267 m/s  |  Max: 1,447 m/s\nBoost: +655 m/s  /  -277 m/s\nCrew: 1  |  Length: 24.5m  |  Class: CompÉtition  |  Role: Course\nMRacks: 1\nShields: 2× S1  |  Coolers: 2× S1  |  Power: 2× S1  |  QD: S1\nArmor HP: 1,584\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 20  |  E 16  |  D 0  |  T 0\nInsurance: 7.56 min base  |  2.52 min express
