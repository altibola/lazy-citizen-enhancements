vehicle_DescCRUS_Star_Runner=Constructeur : Crusader Industries\nRôle : Fret moyen\n\nSi vous avez besoin d'arriver rapidement et indemne, le Mercury répond à toutes les attentes d'un vaisseau de transport fiable, et même plus. Construit selon les mêmes principes d'ingénierie et de conception qui ont fait de Crusader Industries le fabricant de référence pour le transport galactique à toute échelle, le Mercury Star Runner vous permettra de garder une longueur d'avance sur votre planning, les problèmes et la concurrence.\n\n--- STATS ---\nSCM: 217 m/s  |  Max: 1,300 m/s\nBoost: +510 m/s  /  -218 m/s\nCrew: 1  |  Length: 51.0m  |  Class: Transporteur  |  Role: Fret Moyen\nInsurance: 21.00 min base  |  7.00 min express
