vehicle_DescCRUS_Starlifter_C2=Constructeur : Crusader Industries\nRôle : Fret Lourd\n\n Utilisant une architecture militaire brevetée, le Hercules a une capacité de chargement accrue tout en sacrifiant légèrement la puissance de feu, le C2 a pris d'assaut le secteur privé. Il est devenu la norme industrielle pour les équipes de course, les concessionnaires et fabricants de vaisseaux, les organismes de construction, les sociétés minières et les grandes troupes de spectacle.\n\n--- STATS ---\nCrew: 2  |  Length: 70.0m  |  Class: Transporteur  |  Role: Fret Moyen\nTurrets: 2\nCoolers: 2× S3  |  QD: S3\nArmor HP: 13,000\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 385  |  E 300  |  D 0  |  T 0\nInsurance: 32.70 min base  |  10.90 min express
vehicle_DescCRUS_Starlifter_M2=Fabricant : Crusader Industries\nFocus : Fret Lourd/Combat\n\nLe M2 Hercules est le premier vaisseau spatial tactique de l'UEE. La puissante combinaison de capacité, de maniabilité, de durabilité et d'armement robuste du transport à grande échelle garantit que votre cargaison et votre équipage arrivent à destination en un seul morceau.\n\n--- STATS ---\nSCM: 160 m/s  |  Max: 950 m/s\nBoost: +320 m/s  /  -170 m/s\nCrew: 3  |  Length: 70.0m  |  Class: Transporteur  |  Role: Fret Moyen\nTurrets: 3\nCoolers: 2× S3  |  QD: S3\nArmor HP: 23,400\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 385  |  E 300  |  D 0  |  T 0\nInsurance: 25.00 min base  |  8.00 min express
vehicle_DescDRAK_Buccaneer=Constructeur : Drake Interplanetary : \nRôle : Chasseur Léger\n\nLe Buccaneer a été conçu dès le départ pour voler et se battre comme vous vivez. Pas d'intérieurs en cuir ou d'hyper-oreillers ici : le Bucc est un combattant conçu pour manœuvrer et se battre au-dessus de sa catégorie. Ce chasseur frontalier brutal peut être entretenu dans les pires conditions afin de maintenir en vie des équipages spatiaux réels et actifs.\n\n--- STATS ---\nSCM: 240 m/s  |  Max: 1,400 m/s\nBoost: +600 m/s  /  -260 m/s\nCrew: 1  |  Length: 15.2m  |  Class: Combat  |  Role: Chasseur Leger\nShields: S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,160\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 8  |  D 0  |  T 0\nInsurance: 5.40 min base  |  1.80 min express
vehicle_DescDRAK_Caterpillar=Constructeur : Drake Interplanetary\nRôle : Fret Moyen\n\nLe Caterpillar de Drake Interplanetary, présenté pour la première fois en 2871, s'est avéré être un vaisseau multirôle fiable et rentable, capable d'être équipé pour toutes sortes d'opérations, des opérations commerciales au soutien pour le combat. Longtemps considéré comme une alternative à l'omniprésente série Hull, le Caterpillar est un transporteur qui ne lésine pas sur l'armement ou la personnalisation.\n\n--- STATS ---\nSCM: 130 m/s  |  Max: 900 m/s\nBoost: +300 m/s  /  -120 m/s\nCrew: 1  |  Length: 13.4m  |  Class: Transporteur  |  Role: Fret Moyen\nTurrets: 2\nShields: 3× S3  |  Coolers: 2× S3  |  Power: S3  |  QD: S3\nArmor HP: 16,830\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 315  |  E 300  |  D 0  |  T 0\nInsurance: 18.63 min base  |  6.21 min express
