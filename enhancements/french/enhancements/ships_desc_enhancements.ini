TheCollector_ShipMod_F7_Hornet_VehicleDesc=Fabricant : Anvil Aerospace\nRôle : Chasseur Moyen\n \nAnvil Aerospace a perfectionné son célèbre chasseur militaire de supériorité spatiale à l'aide des technologies les plus récentes et a conçu le F7C-M Super Hornet Mk II, en conservant le second siège et la tourelle altazimutale qui ont fait de l'original un appareil vraiment terrifiant.\n\nBonjour, moi Wikelo. Avoir apporté modifications au vaisseau. Déjà impressionnant avant, mais encore plus maintenant.\n\n--- STATS ---\nCrew: 2  |  Length: 24.0m  |  Class: Combat  |  Role: Chasseur Moyen\nShields: S1\nInsurance: 10.17 min base  |  2.55 min express
TheCollector_ShipMod_MISC_Fortune_VehicleDesc=Fabricant : MISC\nRôle : Recyclage\n\nPour ceux qui sont prêts à élever leur profession au niveau supérieur, les ingénieurs de MISC ont soigneusement conçu le Fortune comme le meilleur des petits vaisseaux de recyclage. Équipé d'un bras de récupération polyvalent et d'un monte-charge, le MISC Fortune est construit de A à Z pour transformer les déchets en trésors.\n\nBonjour, moi Wikelo. Vous aimer trouver objets pour fabriquer autres objets ? Moi aussi. Vaisseau parfait pour ça. Wikelo l'améliorer encore un peu plus.\n\n--- STATS ---\nCrew: 1  |  Length: 26.5m  |  Class: Industriel  |  Role: Recycleur Leger\nArmor HP: 4,114\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 5.18 min base  |  1.30 min express
TheCollector_ShipMod_MRAI_GuardianQI_VehicleDesc=Constructeur : Mirai\nRôle : Interdiction\n\nRien d'étonnant à ce que les ennemis s'enfuient lorsqu'ils sont confrontés à un puissant adversaire, mais grâce à ses capacités de brouillage quantum, le Mirai Guardian QI garantit que vos ennemis ne pourront plus se battre un jour de plus. Reprenant les meilleures caractéristiques du Guardian de base, les ingénieurs de Mirai ont fait de la variante QI le complément idéal de toute force de protection.\n\nWikelo beaucoup aimer ce vaisseau. Moi l'avoir essayé. Ajouté pièces pour rendre vaisseau encore plus utile. Vous bien en profiter.\n\n--- STATS ---\nCrew: 1  |  Length: 24.3m  |  Class: Combat  |  Role: Interdiction\nInsurance: 12.00 min base  |  3.00 min express
TheCollector_ShipMod_MRAI_Pulse_VehicleDesc=Fabricant: Mirai\nRôle : Combat\n \nLes ingénieurs de Mirai se sont attelés à la conception d'une moto capable de performances accrues. Une connexion plus intime entre le pilote et la performance grâce à une silhouette qui épouse la forme du corps. Une façon plus intuitive de dompter des paysages redoutables grâce à un système grav-lev réactif. Une expérience de combat plus intelligente avec une arme personnalisée entièrement intégrée à l'esprit du véhicule. Résultat ? La Mirai Pulse.\n\nWikelo avoir passé beaucoup de temps sur planète pour aller vite. Apporté quelques modifications pour aller vite vous aussi. Vous aller aimer.\n\n--- STATS ---\nCrew: 1  |  Length: 3.5m  |  Class: Combat  |  Role: Éclaireur\nArmor HP: 1,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 6  |  E 4  |  D 0  |  T 0\nInsurance: 0.15 min base  |  0.05 min express
