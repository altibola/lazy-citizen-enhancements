vehicle_DescORIG_85X=Constructeur : Origin Jumpworks\nRôle : Tourisme\n\nD'un style élégant et construit méticuleusement, le 85X est un vaisseau polyvalent offrant un contrôle précis tant dans l'atmosphère qu'en dehors. Utilisant pratiquement la même technologie de propulseur que la série 300, il a la puissance d'un vaisseau de course associé la fiabilité d'un vaisseau de tourisme. Que ce soit descendre pour rejoindre la surface d'une planète ou admirer les vues de votre système, ce petit vaisseau perpétue la fière tradition d'Origin à faire tourner les têtes.\n\n--- STATS ---\nSCM: 235 m/s  |  Max: 1,250 m/s\nBoost: +560 m/s  /  -270 m/s\nCrew: 1  |  Length: 13.5m  |  Class: Exploration  |  Role: Tourisme\nShields: S1  |  Coolers: 2× S1  |  QD: S1\nArmor HP: 2,400\nDmg Mult: P 0.85x  |  E 0.70x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 7  |  D 0  |  T 0\nInsurance: 1.01 min base  |  0.00 min express
vehicle_DescORIG_890Jump=Constructeur : Origin Jumpworks\nRôle : Tourisme de Luxe\n\nAvec un extérieur élégant et élancé qui enveloppe son intérieur spacieux, le 890 Jump est une véritable merveille d'ingénierie; construit pour impressionner de tous les côtés en combinant un design unique et innovant avec les matériaux les plus élaborés et la technologie la plus avancée. Le résultat est un vaisseau d'une classe à part, un chef-d'œuvre digne du nom d'Origin.\n\n--- STATS ---\nCrew: 1  |  Length: 210.0m  |  Class: Exploration  |  Role: Tourisme de Luxe\nTurrets: 6  |  MRacks: 2× S5\nShields: 2× S4  |  Coolers: 2× S4  |  Power: S4  |  QD: S4\nArmor HP: 32,640\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 405  |  E 342  |  D 0  |  T 0\nInsurance: 67.50 min base  |  22.50 min express
vehicle_DescORIG_M80=Constructeur : Origin Jumpworks\nRôle : Chasseur lourd\n\nAdoptez l'élégance sans renoncer à la défense avec le M80. Arborant le célèbre design épuré et sophistiqué d'Origin, la coque du vaisseau dissimule habilement un système d'armement agressif, prêt à être déployé et à s'abattre sur les assaillants à tout moment.\n\n--- STATS ---\nSCM: 225 m/s  |  Max: 1,400 m/s\nBoost: +560 m/s  /  -250 m/s\nCrew: 1  |  Length: 11.5m  |  Class: Combat  |  Role: Chasseur Lourd\nInsurance: 11.66 min base  |  2.92 min express
vehicle_DescORIG_X1=Constructeur : Origin Jumpworks\nRôle : Passager\n\nBienvenue au niveau suivant avec le X1, le véhicule à ciel ouvert haute performance d'Origin Jumpworks. Construit en polymères très légers, le X1 fait passer la vitesse et l'agilité à un niveau supérieur grâce à une technologie de moteur intégrée de manière transparente et à l'emplacement des propulseurs à vecteur commun. Une conception innovante et une ingénierie de haute qualité s'allient pour créer une expérience de vol sans pareil.\n\n--- STATS ---\nSCM: 207 m/s  |  Max: 569 m/s\nBoost: +287 m/s  /  -127 m/s\nCrew: 1  |  Length: 1.6m  |  Class: Exploration  |  Role: Passager\nShields: ?  |  Coolers: S0  |  Power: S0\nArmor HP: 1,560\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.15 min base  |  0.05 min express
vehicle_DescORIG_X1_Force=Constructeur : Origin Jumpworks\nRôle : Passager\n\nConstruit pour endurer les environnements rudes tout en ayant du style, le X1 Force est une version modifiée du modèle X1 comprenant des éléments défensifs additionnels afin de renforcer cette moto agile et rapide en plein extérieur, ce qui lui permet de jouer divers rôles, de l'exploration de mondes à d'éventuelles opérations d'infiltration de la sécurité.\n\n--- STATS ---\nCrew: 1  |  Length: 1.6m  |  Class: Combat  |  Role: Passager\nShields: S0  |  Coolers: S0  |  Power: S0\nArmor HP: 1,560\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.15 min base  |  0.05 min express
vehicle_DescORIG_X1_Velocity=Constructeur : Origin Jumpworks\nRôle : Course\n\nComment faire en sorte qu'aller vite aille plus vite ? Le X1 Velocity d'Origin Jumpworks ose repousser les limites de la vitesse en réduisant le X1 de base à ses éléments essentiels, éliminant le support d'arme et en incorporant de nouveaux composites Syntek pour créer un châssis plus léger pour une perte de poids globale.\n\n--- STATS ---\nSCM: 222 m/s  |  Max: 611 m/s\nBoost: +302 m/s  /  -142 m/s\nCrew: 1  |  Length: 1.6m  |  Class: CompÉtition  |  Role: Course\nShields: ?  |  Coolers: S0  |  Power: S0\nArmor HP: 1,560\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.15 min base  |  0.05 min express
vehicle_DescORIG_m50=Fabricant : Origin Jumpworks\n Rôle : Courses \n\nSi vous souhaitez vous rendre d'un point A à un point B le plus rapidement possible et avec autant de style que possible, le M50 d'Origin est fait pour vous! Doté de moteurs suralimentés qui contrecarrent un petit chargement d'armes, le M50 est un vaisseau pour aller VITE.\n\n--- STATS ---\nSCM: 280 m/s  |  Max: 1,575 m/s\nBoost: +490 m/s  /  -290 m/s\nCrew: 1  |  Length: 11.5m  |  Class: CompÉtition  |  Role: Course\nGuns: 2× S1 (empty)  |  MRacks: 2× S1\nShields: S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 960\nDmg Mult: P 0.85x  |  E 0.70x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 7  |  D 0  |  T 0\nInsurance: 6.08 min base  |  2.02 min express
vehicle_DescRSI_Apollo_Medivac=Constructeur : RSI\nRôle : Médical\n\nEn plus d'un blindage supérieur et de deux porte-missile, l'Apollo Medivac modèle 2948 rend hommage au film classique de 2910, Astromedics : Back from Brink, avec une livrée qui recrée fidèlement le Kithara en tête d'affiche.\n\n--- STATS ---\nSCM: 175 m/s  |  Max: 1,000 m/s\nBoost: +340 m/s  /  -180 m/s\nCrew: 2  |  Length: 54.0m  |  Class: Assistance  |  Role: Medical\nInsurance: 18.17 min base  |  4.55 min express
vehicle_DescRSI_Apollo_Triage=Constructeur : RSI \nRôle : Médical \n\nLe légendaire Apollo Triage de Roberts Space Industries est la référence en matière de véhicules d'évacuation médicale et d'intervention d'urgence. Mis à jour pour prendre en charge la technologie de régénération, l'Apollo a une longue histoire dans la fourniture d'aide critique à l'Empire et au-delà depuis plus de deux siècles.\n\n--- STATS ---\nSCM: 170 m/s  |  Max: 1,025 m/s\nBoost: +345 m/s  /  -180 m/s\nCrew: 2  |  Length: 54.0m  |  Class: Assistance  |  Role: Medical\nInsurance: 17.50 min base  |  4.38 min express
vehicle_DescRSI_Apollo_Triage_Collector_Stealth=Constructeur : RSI \nRôle : Médical \n\nLe légendaire Apollo Triage de Roberts Space Industries est la référence en matière de véhicules d'évacuation médicale et d'intervention d'urgence. Mis à jour pour prendre en charge la technologie de régénération, l'Apollo a une longue histoire dans la fourniture d'aide critique à l'Empire et au-delà depuis plus de deux siècles.\n\nIci Wikelo. Avoir fait modifications pour rendre vaisseau beaucoup plus dur à voir. Sournois.\n\n--- STATS ---\nCrew: 2  |  Length: 54.0m  |  Class: Assistance  |  Role: Medical\nInsurance: 17.50 min base  |  4.38 min express
vehicle_DescRSI_Aurora_CL=Constructeur : RSI\nRôle : Fret Léger\n\nConçu pour les excursions et échanges commerciaux, l'Aurora Clipper est le vaisseau idéal autant pour entrepreneurs en herbe que pour les commerçants chevronnés. Échangeant de plus petits générateur et armure pour une capacité de chargement plus importante, le Clipper fait monter les enchères pour les navires marchands personnels.\n\n--- STATS ---\nCrew: 1  |  Length: 19.0m  |  Class: Transporteur  |  Role: Fret Leger\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nInsurance: 2.43 min base  |  0.81 min express
vehicle_DescRSI_Aurora_ES=Constructeur : RSI\nRôle : Démarrage / Éclaireur\n\nLe Aurora est le descendant moderne du vaisseau spatial X-7 de Roberts Space Industries ayant testé les tout premiers moteurs de saut. Utilitaire à souhait, le Aurora est le vaisseau idéal pour les débutants : ce qui lui manque en termes de style, il le compense par l'espace qu'il offre pour les modules d'amélioration.\n\n--- STATS ---\nCrew: 1  |  Length: 19.0m  |  Class: Multi-RÔle  |  Role: Demarrage / Eclaireur\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nInsurance: 2.16 min base  |  0.72 min express
vehicle_DescRSI_Aurora_LN=Constructeur : RSI\n Rôle : Chasseur Léger\n\nGrâce à un générateur de bouclier plus solide et deux armes fixes additionnelles, le Legionnaire est un chasseur dédié au combat, construit pour faire face à tous les obstacles que l'univers peut vous lancer.\n\n--- STATS ---\nCrew: 1  |  Length: 19.0m  |  Class: Combat  |  Role: Chasseur Leger\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nInsurance: 2.92 min base  |  0.97 min express
vehicle_DescRSI_Aurora_LX=Constructeur : RSI\n Rôle : Éclaireur\n\nSoyez fier de vos racines avec le tout nouveau Aurora Deluxe, construit pour les pilotes perspicaces qui n'oublient jamais d'où il ou elle vient. Le LX est doté d'un intérieur en cuir verni qui garantit le confort lors des longs trajets dans l'espace lointain.\n\n--- STATS ---\nCrew: 1  |  Length: 19.0m  |  Class: Exploration  |  Role: Éclaireur\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nInsurance: 2.70 min base  |  0.90 min express
vehicle_DescRSI_Aurora_MR=Constructeur : RSI\nRôle : Démarrage / Chasseur léger\n\nVous recherchez un véhicule offrant une capacité de transport et apte au combat ? L'Aurora Marque est équipé d'une paire de lasers Behring et d'un système de refroidissement des armes de haute qualité.\n\n--- STATS ---\nCrew: 1  |  Length: 19.0m  |  Class: Combat  |  Role: Chasseur Leger\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nInsurance: 2.92 min base  |  0.97 min express
vehicle_DescRSI_Aurora_Mk2=Constructeur : Roberts Space Industries\nRôle : Démarrage / Fret Léger\n \nNouvelle interprétation d'un classique, Roberts Space Industries repense de fond en comble l'Aurora, un vaisseau qui a fait ses preuves. Voici l'Aurora Mk II. Des performances à l'ergonomie, en passant par le design, tout a été revu pour répondre aux attentes d'une nouvelle génération de pilotes. Cette version introduit également une nouveauté pour la gamme Aurora : des modules interchangeables. Plutôt que de cantonner les pilotes à une seule carrière, ces modules permettent une spécialisation opérationnelle simple, directement depuis votre hangar. Que vous soyez propriétaire d'un premier vaisseau ou pilote expérimenté prêt à moderniser son vaisseau de tous les jours, l'Aurora Mk II n'attend que vous.\n\n--- STATS ---\nSCM: 225 m/s  |  Max: 1,230 m/s\nBoost: +460 m/s  /  -240 m/s\nCrew: 1  |  Length: 27.4m  |  Class: Multi-RÔle  |  Role: Démarrage / Chasseur Léger\nInsurance: 5.82 min base  |  1.45 min express
vehicle_DescRSI_Aurora_SE=Constructeur : RSI\nRôle : Polyvalent\n\nRéunissant le meilleur de ce qui a fait le succès de la série Aurora Mk I auprès de générations de pilotes, cette édition spéciale offre un équilibre remarquable permettant d'aborder un large éventail de missions. Avec l'Aurora Mk I SE dans votre hangar, ce vaisseau polyvalent deviendra à coup sûr votre appareil du quotidien, grâce à sa capacité à faire face à toutes les situations. \n\n\n--- STATS ---\nCrew: 1  |  Length: 19.0m  |  Class: Combat  |  Role: Chasseur Leger\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nInsurance: 2.92 min base  |  0.97 min express
vehicle_DescRSI_Constellation_Andromeda=Constructeur : RSI\nRôle : Fret Moyen / Cannonière\n\nLe Constellation Andromeda est un cargo fiable multi-équipage qui séduit les marchands de tout l'empire grâce à sa polyvalence. Un des vaisseaux les plus populaires produits par RSI, l'iconique Andromeda dispose d'une soute bien aménagée, d'un port d'amarrage pour chasseur parasite et d'une passerelle panoramique emblématique.\n\n--- STATS ---\nSCM: 190 m/s  |  Max: 1,000 m/s\nBoost: +390 m/s  /  -191 m/s\nCrew: 1  |  Length: 63.5m  |  Class: Multi-RÔle  |  Role: Fret Moyen / CannoniÈre\nTurrets: 2  |  MRacks: 4× S4  4× S5\nShields: S3  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 20,160\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 116  |  E 110  |  D 0  |  T 0\nInsurance: 13.50 min base  |  4.50 min express
vehicle_DescRSI_Constellation_Aquila=Constructeur : RSI\nRôle: Expédition\n\nConçu par RSI pour parcourir des contrées lointaines, le Constellation Aquila dispose d'un cockpit redessiné pour une visibilité maximale, de capteurs avancés, d'un vaisseau parasite P-52 et d'un rover Ursa pour explorer les planètes. Découvrez par vous-même pourquoi les explorateurs du ‘verse choisissent de commander l'Aquila.\n\n--- STATS ---\nSCM: 180 m/s  |  Max: 1,075 m/s\nBoost: +380 m/s  /  -191 m/s\nCrew: 1  |  Length: 63.5m  |  Class: Exploration  |  Role: Expedition\nTurrets: 2  |  MRacks: 4× S5\nShields: S3  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 20,160\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 116  |  E 110  |  D 0  |  T 0\nInsurance: 16.20 min base  |  5.40 min express
vehicle_DescRSI_Constellation_Phoenix=Constructeur : RSI\n Rôle : Tourisme de Luxe\n\nUn vaisseau spatial de luxe destiné aux capitaines étoilés exigeants. Le Constellation Phoenix peut être utilisé comme base de commandement et comprend un intérieur redécoré luxurieux. Il comprend une zone cachée aux signaux de scanners, pour votre cargaison la plus précieuse. Le Phoenix est livré avec un rover Lynx et un chasseur Archimedes Kruger P-72.\n\n--- STATS ---\nSCM: 185 m/s  |  Max: 995 m/s\nBoost: +385 m/s  /  -191 m/s\nCrew: 1  |  Length: 63.5m  |  Class: Exploration  |  Role: Tourisme de Luxe\nTurrets: 1  |  MRacks: 4× S4\nShields: S3  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 13,440\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 116  |  E 110  |  D 0  |  T 0\nInsurance: 24.30 min base  |  8.10 min express
vehicle_DescRSI_Constellation_Phoenix_Emerald=Constructeur : RSI\n Rôle : Tourisme de Luxe\n\nQue vous soyez un mondain exigeant ou un fêtard totalement déjanté, le Constellation Phoenix Emerald est votre passeport personnel pour le divertissement. Avec un habitacle luxueux conçu pour les réjouissances, et un schéma de peinture "chanceux" en édition limitée, le Emerald est l'endroit parfait pour boire un verre de Radegast Gold ou vous envoyer un Sleeping Tiger Malt vert tout en vous élançant luxueusement à travers les étoiles. N'oubliez pas d’amener d'un pilote désigné.\n\n--- STATS ---\nCrew: 1  |  Length: 63.5m  |  Class: Exploration  |  Role: Tourisme de Luxe\nTurrets: 1  |  MRacks: 4× S4\nShields: S3  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 13,440\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 116  |  E 110  |  D 0  |  T 0\nInsurance: 24.30 min base  |  8.10 min express
vehicle_DescRSI_Constellation_Taurus=Constructeur : RSI\nRôle : Fret moyen\n\nConçu pour se concentrer exclusivement sur le transport de fret, le Taurus offre le plus grand espace de chargement de tous les vaisseaux de la gamme Constellation de RSI. Ce qu'il perd en polyvalence, il le compense largement en profits potentiels grâce à ses rayons tracteurs, un système de largage de cargaison pour un déchargement rapide, et une soute sécurisée renforcée par un blindage technologique.\n\n--- STATS ---\nSCM: 180 m/s  |  Max: 950 m/s\nBoost: +380 m/s  /  -191 m/s\nCrew: 1  |  Length: 70.0m  |  Class: Transporteur  |  Role: Fret Moyen\nTurrets: 2  |  MRacks: 4× S5\nShields: S3  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 13,440\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 116  |  E 110  |  D 0  |  T 0\nInsurance: 17.10 min base  |  5.70 min express
vehicle_DescRSI_Constellation_Taurus_Collector_Military=Constructeur : RSI\nRôle : Fret moyen\n\nConçu pour se concentrer exclusivement sur le transport de fret, le Taurus offre le plus grand espace de chargement de tous les vaisseaux de la gamme Constellation de RSI. Ce qu'il perd en polyvalence, il le compense largement en profits potentiels grâce à ses rayons tracteurs, un système de largage de cargaison pour un déchargement rapide, et une soute sécurisée renforcée par un blindage technologique.\n\nIci Wikelo. Moi avoir fait modifications utiles pour que vaisseau ressembler davantage à chasseur. Très impressionnant.\n\n--- STATS ---\nCrew: 1  |  Length: 70.0m  |  Class: Transporteur  |  Role: Fret Moyen\nTurrets: 2  |  MRacks: 4× S5\nArmor HP: 13,440\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 116  |  E 110  |  D 0  |  T 0\nInsurance: 17.10 min base  |  5.70 min express
vehicle_DescRSI_Hermes=Constructeur : Roberts Space Industries\nRôle : Fret Moyen\n\nContrairement à son homonyme mythique, le RSI Hermes n'est pas un imposteur : il est vraiment aussi rapide qu'on le dit. Doté d'un ensemble de propulseurs innovants sur mesure, d'un impressionnant arsenal défensif et d'une soute spacieuse, le Hermes est prêt à acheminer rapidement vos cargaisons jusqu'à leur destination finale. Même vers des lieux dangereux où aucun autre transporteur n'oserait s'aventurer.\n\n--- STATS ---\nSCM: 180 m/s  |  Max: 1,200 m/s\nBoost: +370 m/s  /  -170 m/s\nCrew: 2  |  Length: 58.0m  |  Class: Transporteur  |  Role: Fret Moyen\nInsurance: 11.18 min base  |  2.80 min express
vehicle_DescRSI_Mantis=Constructeur : RSI\n Rôle : Interdiction\n\nArrêtez les vaisseaux en pleine course avec le premier vaisseau RSI de Perturbation Quantum. Le Mantis est équipé d'un Système de Perturbation Quantum conçu sur mesure par Wei-Tek, capable d'extirper les vaisseaux de Voyages Quantum grâce à son Piège Quantum et d'empêcher les évasions précipitées grâce à son Brouilleur Quantum.\n\n--- STATS ---\nSCM: 236 m/s  |  Max: 1,400 m/s\nBoost: +605 m/s  /  -257 m/s\nCrew: 1  |  Length: 30.0m  |  Class: Combat  |  Role: Interdiction\nInsurance: 6.48 min base  |  2.16 min express
vehicle_DescRSI_Meteor=Fabricant : RSI\nRôle : Chasseur Moyen\n\nAvec sa puissance de feu redoutable, le Meteor est une silhouette que vos ennemis ne voudront pas croiser. Inspiré de l'emblématique Mantis, ce chasseur lourd renonce à l'interdiction quantique au profit de deux canons balistiques sur mesure de taille 5 et de quatre portes-missiles de taille 4, faisant du Meteor une force capable d'illuminer le ciel telle une étoile filante.\n\n--- STATS ---\nSCM: 229 m/s  |  Max: 1,405 m/s\nBoost: +570 m/s  /  -235 m/s\nCrew: 1  |  Length: 30.0m  |  Class: Combat  |  Role: Chasseur Moyen\nInsurance: 13.50 min base  |  4.50 min express
vehicle_DescRSI_Meteor_Collector_Military=Fabricant : RSI\nRôle : Chasseur Moyen\n\nAvec sa puissance de feu redoutable, le Meteor est une silhouette que vos ennemis ne voudront pas croiser. Inspiré de l'emblématique Mantis, ce chasseur lourd renonce à l'interdiction quantique au profit de deux canons balistiques sur mesure de taille 5 et de quatre portes-missiles de taille 4, faisant du Meteor une force capable d'illuminer le ciel telle une étoile filante.\n\nCette variante comprend une livrée et un équipement exclusifs pour le vaisseau.\n\n--- STATS ---\nCrew: 1  |  Length: 30.0m  |  Class: Combat  |  Role: Chasseur Moyen\nInsurance: 13.50 min base  |  4.50 min express
vehicle_DescRSI_Meteor_Collector_Stealth=Fabricant : RSI\nRôle : Chasseur Moyen\n\nAvec sa puissance de feu redoutable, le Meteor est une silhouette que vos ennemis ne voudront pas croiser. Inspiré de l'emblématique Mantis, ce chasseur lourd renonce à l'interdiction quantique au profit de deux canons balistiques sur mesure de taille 5 et de quatre portes-missiles de taille 4, faisant du Meteor une force capable d'illuminer le ciel telle une étoile filante.\n\nIci Wikelo. Moi avoir fait modifications pour rendre vaisseau beaucoup plus dur à voir. Sournois.\n\n--- STATS ---\nCrew: 1  |  Length: 30.0m  |  Class: Combat  |  Role: Chasseur Moyen\nInsurance: 13.50 min base  |  4.50 min express
vehicle_DescRSI_Perseus=Constructeur : RSI\n Rôle : Vaisseau de Combat Lourd\n\nLorsque RSI a entrepris de faire une déclaration moderne et définitive en matière de prévention persuasive, elle s'est tournée vers son propre passé, vers le vaisseau de guerre historique appelé Perseus. Capable de détruire des goliaths de classe sous-capitale, la simple présence d'un Perseus dans un blocus ou dans une patrouille suffit à faire réfléchir vos ennemis les plus agressifs avant de s'engager, tout comme son homonyme d'époque.\n\n--- STATS ---\nSCM: 150 m/s  |  Max: 1,050 m/s\nBoost: +350 m/s  /  -160 m/s\nCrew: 6  |  Length: 100.0m  |  Class: Combat  |  Role: Vaisseau de Combat Lourd\nInsurance: 38.00 min base  |  9.50 min express
vehicle_DescRSI_Polaris=Constructeur : RSI\n Rôle : Corvette\n\nLe Polaris est un vaisseau capital de classe corvette, très agile et doté d'un armement complet de tourelles et de torpilles. Destiné à être utilisé à la fois comme vaisseau de patrouille Naval et comme vaisseau amiral des opérations de la milice, le Polaris a la capacité d'effectuer des opérations de recherche et de sauvetage, des missions d'attaque éclair et des patrouilles de sécurité générale. Le Polaris dispose des installations nécessaires pour réparer, réarmer et ravitailler un chasseur, un bombardier léger ou un navire de soutien.\n\n--- STATS ---\nSCM: 145 m/s  |  Max: 940 m/s\nBoost: +250 m/s  /  -155 m/s\nCrew: 12  |  Length: 181.0m  |  Class: Combat  |  Role: Corvette\nTurrets: 22\nShields: S4  |  Coolers: S4  |  Power: S4  |  QD: S3\nArmor HP: 48,960\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 495  |  E 418  |  D 0  |  T 0\nInsurance: 75.83 min base  |  18.96 min express
vehicle_DescRSI_Salvation=Fabricant : Roberts Space Industries\nRôle : Recycleur\n \nDepuis des siècles, Roberts Space Industries est fier de fabriquer des véhicules qui non seulement répondent aux besoins des pilotes, mais dépassent également leurs attentes. Si le RSI Salvation peut sembler à première vue un simple vaisseau de recyclage, chaque détail, du bras de recyclage au système de traitement embarqué en passant par le stockage externe, a été raffiné et optimisé pour que même un amateur se sente comme un expert.\n\n--- STATS ---\nSCM: 205 m/s  |  Max: 1,150 m/s\nBoost: +290 m/s  /  -230 m/s\nCrew: 1  |  Length: 8.5m  |  Class: Industriel  |  Role: Démarrage / Recycleur Léger\nInsurance: 6.00 min base  |  1.50 min express
vehicle_DescRSI_Scorpius=Constructeur : RSI\nRôle : Chasseur Lourd\n\nGrâce à sa configuration à double ailes adaptables et à sa tourelle télé-opérée révolutionnaire montée sur rail, le Scorpius offre une puissance de feu sans précédent, permettant un usage lors d'opérations défensives et offensives.\n\n--- STATS ---\nSCM: 230 m/s  |  Max: 1,385 m/s\nBoost: +590 m/s  /  -235 m/s\nCrew: 2  |  Length: 32.0m  |  Class: Combat  |  Role: Chasseur Lourd\nGuns: 4  |  MRacks: 4× S4\nShields: S2  |  Coolers: 2× S1  |  Power: 2× ?  2× S1  |  QD: S1\nArmor HP: 8,640\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 50  |  E 40  |  D 0  |  T 0\nInsurance: 7.59 min base  |  2.53 min express
