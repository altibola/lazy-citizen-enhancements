vehicle_DescANVL_Valkyrie_CitizenCon=Constructeur : Anvil Aerospace \nRôle : Transport de Troupes\n\nPendant plus d'un siècle, les vaisseaux Anvil se sont distingués dans de nombreuses opérations militaires et civiles. Honorez cette tradition de sécurité honorable avec l'édition limitée Liberator Edition Valkyrie, incluant une gravure unique commémorant les débuts du vaisseau à la CitizenCon 2948.\n\n--- STATS ---\nCrew: 1  |  Length: 48.0m  |  Class: Combat  |  Role: Transport de Troupes\nTurrets: 7\nShields: 2× S2  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 23,760\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 139  |  E 88  |  D 0  |  T 0\nInsurance: 19.82 min base  |  4.98 min express
vehicle_DescARGO_MOTH=Fabricant : Argo Astronautics\nRôle : Recyclage Moyen\n\nDécouvrez l'expertise industrielle séculaire d'Argo avec le MOTH. Reposant sur un châssis éprouvé, le MOTH est équipé de trois tourelles dédiées au recyclage et d'un chargeur automatique externe, permettant à un équipage de quatre personnes de démanteler et de désosser des vaisseaux aussi vite qu'ils peuvent les atteindre.\n\n--- STATS ---\nSCM: 140 m/s  |  Max: 960 m/s\nBoost: +340 m/s  /  -150 m/s\nCrew: 3  |  Length: 0.0m  |  Class: Industriel  |  Role: Recycleur Moyen\nInsurance: 12.50 min base  |  3.13 min express
vehicle_DescARGO_MPUV=Constructeur : Argo Astronautics\nFocus : Fret léger\n\nL'Argo Astronautics MPUV Cargo est dédié au transport de marchandise. Un docker intergalactique bien connu, un grand nombre de MPUV Cargos sont responsables du chargement et du déchargement des marchandises sur des vaisseau qui ne pourraient autrement pas atterrir sur des planètes ou certaines plateformes, comme le Hull D et l'Orion. Certains capitaines de transporteurs choisissent de posséder et d'exploiter leur propre Argo, tandis que d'autres préfèrent passer des contrats avec les propriétaires locaux d'Argo que l'on trouve dans la plupart des ports les plus fréquentés.\n\n--- STATS ---\nSCM: 170 m/s  |  Max: 890 m/s\nBoost: +360 m/s  /  -140 m/s\nCrew: 1  |  Length: 10.5m  |  Class: Transporteur  |  Role: Fret Leger\nShields: S1  |  Coolers: 2× S0  |  Power: S0\nArmor HP: 1,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.17 min base  |  0.00 min express
vehicle_DescARGO_MPUV_Tractor=Fabricant : Argo Astronautics\nRôle : Fret Léger\n\nLe MPUV-1T d'Argo Astronautics est équipé d'un rayon tracteur qui lui permet de déplacer facilement des conteneurs sur des vaisseaux de transport plus importants.  Sa taille réduite et sa maniabilité en font un véhicule de soutien idéal pour les zones d'atterrissage et les stations spatiales.\n\n--- STATS ---\nSCM: 175 m/s  |  Max: 895 m/s\nBoost: +365 m/s  /  -145 m/s\nCrew: 1  |  Length: 10.5m  |  Class: Transporteur  |  Role: Fret Leger\nTurrets: 1\nShields: S1  |  Coolers: S0  |  Power: S0\nArmor HP: 1,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.17 min base  |  0.00 min express
vehicle_DescARGO_MPUV_Transport=Constructeur : Argo Astronautics \nRôle : Passager\n\nLe MPUV-1P (communément 'Argo Personnel') de chez Argo Astronautics. Cette version de l'Argo est équipé pour un but simple mais à la responsabilité incroyablement indispensable : déplacer des groupes de personnes d'un endroit à un autre. L'UEE Navy utilise énormément les MPUV-1P, et toute nouvelle recrue peut se souvenir de ces moments terrifiants où un tel vaisseau l'a transporté vers sa première mission spatiale. Dans les mains de civils, les vaisseaux Argo Personnel sont adaptés pour tout, de services de taxi à l'utilisation de vaisseaux de déploiements en combat. L'Argo MPUV-1P peut transporter jusqu'à huit personnes et leur équipement.\n\n--- STATS ---\nSCM: 170 m/s  |  Max: 890 m/s\nBoost: +360 m/s  /  -140 m/s\nCrew: 1  |  Length: 10.5m  |  Class: Transporteur  |  Role: Passager\nShields: S1  |  Coolers: 2× S0  |  Power: S0\nArmor HP: 1,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.68 min base  |  0.23 min express
