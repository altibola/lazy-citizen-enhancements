Journal_General_Mining_Compendium_Content=Afin de promouvoir l'esprit d'entreprise du mineur moderne, l'Union des Travailleurs de Ressources a élaboré un guide pratique répertoriant les emplacements les plus courants où trouver des minéraux, des minerais et des pierres précieuses à travers le 'verse.\n\n** Exceptionnels **\n· Quantainium - Présent dans tous les gisements de Stanton (rare)\n· Savrilium - Anneau de Glaciem, ceinture de Keeger, stations QV Breaker (Nyx)\n· Stileron - Amas Akiro, amas d'astéroïdes de Pyro, toutes les planètes de Pyro\n\n** Très rares **\n· Lindinium - anneau de Glaciem, ceinture de Keeger\n· Ouratite - Aberdeen, anneau de Yela, Arial, Hurston\n· Riccite - Adir, amas Akiro, amas d'astéroïdes de Pyro, Bloom, Ignis, Terminus, Vatra\n\n** Rares **\n· Beryl - Amas d'astéroïdes de Pyro, ARC-L3, CRU-L5, halo d'Aaron, MIC-L4, Wala\n· Bexalite - Amas d'astéroïdes de Pyro, anneau de Glaciem, ceinture de Keeger, CRU-L1, CRU-L2, Fairo, Fuego, HUR-L3, Vuur\n· Borase - Amas d'astéroïdes de Pyro, Adir, Bloom, Fuego, HUR-L1, HUR-L4, HUR-L5, Pyro IV\n· Or - Amas d'astéroïdes de Pyro, ARC-L5, CRU-L4, Fairo, Ignis, MIC-L3, Terminus, Vatra\n· Taranite - Amas d'astéroïdes de Pyro, ARC-L1, ARC-L2, ARC-L4, Cellin, Clio, Euterpe, HUR-L2, Yela\n\n** Peu communs **\n· Agricium - Amas d'astéroïdes de Pyro, ARC-L3, Cellin, CRU-L5, Daymar, MIC-L4, Terminus, Vuur, Yela\n· Aslarite - Amas d'astéroïdes de Pyro, ARC-L5, CRU-L4, Fuego, halo d'Aaron, Ita, Magda, MIC-L4, Vuur\n· Laranite - HUR-L1, HUR-L4, HUR-L5, Lyria, Pyro IV, Wala\n· Titane - Aberdeen, amas d'astéroïdes de Pyro, anneau de Yela, CRU-L1, CRU-L2, halo d'Aaron, HUR-L3, Magda, Terminus\n· Torite - Amas Akiro, amas d'astéroïdes de Pyro, anneau de Glaciem, ceinture de Keeger, CRU-L3, MIC-L1, MIC-L2, MIC-L5, stations QV Breaker (Nyx)\n· Tungstène - Adir, amas d'astéroïdes de Pyro, ARC-L1, ARC-L2, ARC-L4, Fairo, HUR-L2\n\n** Communs **\n· Aluminium - Aberdeen, amas d'astéroïdes de Pyro, anneau de Glaciem, ARC-L1, ARC-L2, Arial, ceinture de Keeger, CRU-L3, halo d'Aaron, HUR-L1, HUR-L2, HUR-L4, HUR-L5, Ita, Magda, MIC-L1, MIC-L2, MIC-L5\n· Corindon - Aberdeen, ARC-L1, ARC-L2, ARC-L4, amas d'astéroïdes de Pyro, Arial, CRU-L3, Hurston, HUR-L1, HUR-L2, HUR-L4, HUR-L5, MIC-L1, MIC-L2, MIC-L5\n· Cuivre - Amas Akiro, amas d'astéroïdes de Pyro, anneau de Yela, ARC-L3, ARC-L5, Clio, CRU-L1, CRU-L2, CRU-L4, CRU-L5, Euterpe, halo d'Aaron, Lyria, MIC-L3, MIC-L4, Pyro I, Pyro IV, Terminus, Wala\n· Étain - Amas d'astéroïdes de Pyro, Arial, Hurston, Ignis, Ita, Monox, Pyro I\n· Fer - Adir, amas Akiro, amas d'astéroïdes de Pyro, anneau de Glaciem, anneau de Yela, ARC-L3, ARC-L5, Bloom, Calliope, ceinture de Keeger, CRU-L1, CRU-L2, CRU-L4, CRU-L5, Fairo, Fuego, halo d'Aaron, HUR-L3, Lyria, Magda, microTech, MIC-L3, MIC-L4, Monox, Pyro I, Pyro IV, Vatra, Vuur, Wala\n· Glace - Amas Akiro, amas d'astéroïdes de Pyro, anneau de Glaciem, anneau de Yela, ARC-L3, ARC-L5, Calliope, ceinture de Keeger, Clio, Euterpe, halo d'Aaron, HUR-L3, microTech, MIC-L3, MIC-L4\n· Hephaestanite - Amas d'astéroïdes de Pyro, Arial, ARC-L1, ARC-L2, ARC-L4, Calliope, CRU-L3, Fuego, HUR-L1, HUR-L2, HUR-L4, HUR-L5, MIC-L1, microTech, MIC-L2, MIC-L5, Monox, Vuur\n· Quartz - Amas d'astéroïdes de Pyro, Bloom, Cellin, Daymar, Yela\n· Silicium - Amas Akiro, amas d'astéroïdes de Pyro, Cellin, Daymar, Fairo, halo d'Aaron, Ignis, Vatra, Yela\n\n** À la main / véhicule terrestre **\n· Aphorite - Toutes les lunes/planètes/grottes\n· Béradom - Bloom, Pyro I\n· Carinite - Aberdeen, Daymar\n· Dolivine - Toutes les lunes/planètes/grottes\n· Feynmaline - Pyro IV\n· Glacosite - Monox\n· Hadanite - Toutes les lunes/planètes/grottes\n· Janalite - Daymar, grottes de sable de Magda, Hurston, Ita, Wala\n· Sadaryx - Stations QV Breaker (Nyx)
