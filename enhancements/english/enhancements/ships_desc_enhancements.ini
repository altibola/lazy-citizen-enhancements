vehicle_DescMISC_Starlancer_MAX_Collector_Indust=Manufacturer: MISC\nFocus: Medium Freight\n \nFor those looking to expand their hauling operations, the engineers at MISC have upgraded the Starlancer MAX with an extra spacious hold ready to transport cargo and vehicles. Paired with comfortable accommodations for longer trips and a full defensive package for when you go off the beaten path, it’s easy to see why the Starlancer MAX is the hauler of choice for industrious pilots across the ‘verse.\n\n--- STATS ---\nCrew: 1  |  Length: 90.0m  |  Class: Transporter  |  Role: Medium Freight\nTurrets: 2\nArmor HP: 12,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 315  |  E 360  |  D 0  |  T 0\nInsurance: 12.33 min base  |  3.08 min express
vehicle_DescMISC_Starlancer_TAC_Collector_Military=Manufacturer: MISC\nFocus: Gunship\n \nFor those looking to for a versatile ship that can stand on its own in a fight, the engineers have upgraded the Starlancer TAC with an aggressive offensive package ready to face down the fiercest of foes. When you take on a high risk, high reward job, the Starlancer TAC is there to make sure you and your crew are able to see it through to the very end.\n\nWikelo here. Made useful modifications to make ship even more fighter like. Very impressive.\n\n--- STATS ---\nCrew: 1  |  Length: 90.0m  |  Class: Combat  |  Role: Gunship\nTurrets: 9\nShields: 2× S3  |  Coolers: S3  |  Power: S3  |  QD: S2\nArmor HP: 18,150\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 347  |  E 396  |  D 0  |  T 0\nInsurance: 13.33 min base  |  3.33 min express
vehicle_DescMISC_Starlite=Manufacturer: MISC\nFocus: Light Refueling\n\nIf there’s one constant in the universe, it’s that ships will eventually run out of fuel. That’s where the Starlite come in. Featuring two standard fuel pods and a scaled back, elegant design, the Starlite was meticulously crafted by the engineers at MISC to offer refueling services to ships in need wherever they may be stranded.\n\n--- STATS ---\nSCM: 150 m/s  |  Max: 970 m/s\nBoost: +340 m/s  /  -160 m/s\nCrew: 1  |  Length: 32.0m  |  Class: Support  |  Role: Light Refueling\nInsurance: 5.82 min base  |  1.45 min express
