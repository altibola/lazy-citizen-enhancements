vehicle_DescDRAK_Herald=Manufacturer: Drake Interplanetary\nFocus: Medium Data\n\nThe Drake Herald is a small, armored ship designed to safely get information from Point A to Point B. Featuring a powerful central engine (for high speed transit and generating the power needed for effective data encryption/containment), advanced encryption software and an armored computer core, the Herald is unique among personal spacecraft in that it is designed to be easily ‘cleaned’ when in danger of capture.\n\n--- STATS ---\nSCM: 245 m/s  |  Max: 1,450 m/s\nBoost: +670 m/s  /  -260 m/s\nCrew: 1  |  Length: 24.8m  |  Class: Transporter  |  Role: Medium Data\nInsurance: 2.02 min base  |  0.68 min express
vehicle_DescDRAK_Ironclad=Manufacturer: Drake Interplanetary\nFocus: Heavy Freight\n \nThe universe has steadily grown more dangerous, and simply trying to earn a living has become a potentially lethal affair. That’s why Drake built the hardiest freighter to fly the shipping lanes armed with an intimidating array of turrets, a generous cargo hold, and a convenient tractor beam.\n\n--- STATS ---\nSCM: 110 m/s  |  Max: 900 m/s\nBoost: +290 m/s  /  -130 m/s\nCrew: 7  |  Length: 13.4m  |  Class: Transporter  |  Role: Heavy Freight\nInsurance: 18.00 min base  |  6.00 min express
vehicle_DescDRAK_Ironclad_Assault=Manufacturer: Drake Interplanetary\nFocus: Drop Ship\n \nWhen the special delivery you have to make is a full-blown incursion, you need the Drake Ironclad Assault. Not only can it fit multiple ground vehicles into its hold, it has turrets along its underside to clear the way for landing, and even a fabrication bay for emergency repairs.\n\n--- STATS ---\nSCM: 130 m/s  |  Max: 940 m/s\nBoost: +320 m/s  /  -150 m/s\nCrew: 7  |  Length: 13.4m  |  Class: Combat  |  Role: Heavy Dropship\nInsurance: 18.00 min base  |  6.00 min express
