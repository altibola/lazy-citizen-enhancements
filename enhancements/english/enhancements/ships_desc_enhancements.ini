vehicle_DescESPR_Blade=Manufacturer: Vanduul Clans\nFocus: Light Fighter\n\nThese light fighters, designation 'Blade', are often used by Vanduul as scouts and first wave assault crafts. They have also served well as skirmisher units due to their speed allowing them to chase down any ships attempting to flee the area. For some decades, United Empire of Earth aggressor squadrons have operated replica Blade fighters produced under exclusive contract by Esperia, Inc.\n\n--- STATS ---\nSCM: 227 m/s  |  Max: 1,191 m/s\nBoost: +500 m/s  /  -260 m/s\nCrew: 1  |  Length: 20.5m  |  Class: Combat  |  Role: Light Fighter\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 3,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 7  |  D 0  |  T 0\nInsurance: 10.33 min base  |  3.44 min express
