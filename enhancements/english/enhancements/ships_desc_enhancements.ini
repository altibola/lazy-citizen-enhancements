TheCollector_ShipMod_F7_Hornet_VehicleDesc=Manufacturer: Anvil Aerospace\nFocus: Medium Fighter\n \nRefining their renowned military-class superiority fighter with the most up-to-date technology, Anvil Aerospace has crafted the F7C-M Super Hornet Mk II, retaining the second seat and ball turret that made the original a truly terrifying mark to engage.\n\nHello, I Wikelo. Made change to ship. Already impressive, yes, but made more so.\n\n--- STATS ---\nCrew: 2  |  Length: 24.0m  |  Class: Combat  |  Role: Medium Fighter\nShields: S1\nInsurance: 10.17 min base  |  2.55 min express
TheCollector_ShipMod_MISC_Fortune_VehicleDesc=Manufacturer: MISC\nFocus: Salvage\n\nFor those ready to elevate their profession to the next level, the engineers at MISC have carefully crafted the Fortune as a best-in-class small reclamation vessel. Equipped with a versatile salvage arm and a cargo lift, the MISC Fortune is built from the struts up to turn trash into treasure.\n\nHello, I Wikelo. You like to find things to make other things. Me too. This ship very good for that. Wikelo make a little bit better.\n\n--- STATS ---\nCrew: 1  |  Length: 26.5m  |  Class: Industrial  |  Role: Light Salvage\nArmor HP: 4,114\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 5.18 min base  |  1.30 min express
TheCollector_ShipMod_MRAI_GuardianQI_VehicleDesc=Manufacturer: Mirai\nFocus: Interdiction\n\nIt’s not too surprising that hostiles may run when confronted with a powerful opponent, but thanks to its quantum dampening capabilities, the Mirai Guardian QI ensures that your enemies won’t be able to fight another day. Taking the best features of the base Guardian, the engineers at Mirai have made the QI variant the ideal complement to any protective forces.\n\nWikelo like ship very much. Had to get in and play around with it. Add parts to make even more useful. Enjoy.\n\n--- STATS ---\nCrew: 1  |  Length: 24.3m  |  Class: Combat  |  Role: Interdiction\nInsurance: 12.00 min base  |  3.00 min express
TheCollector_ShipMod_MRAI_Pulse_VehicleDesc=Manufacturer: Mirai\nFocus: Combat\n \nThe engineers at Mirai set out to craft an open-canopy bike capable of more. A more intimate connection between pilot and performance with a form-fitting silhouette. A more intuitive way to tame formidable landscapes with a responsive grav-lev system. A more intelligent combat experience with a custom weapon fully integrated into the spirit of the vehicle. The end result? The Mirai Pulse.\n\nWikelo spent many beats on planet go fast. Make some changes so you go fast too. You will like.\n\n--- STATS ---\nCrew: 1  |  Length: 3.5m  |  Class: Combat  |  Role: Pathfinder\nArmor HP: 1,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 6  |  E 4  |  D 0  |  T 0\nInsurance: 0.15 min base  |  0.05 min express
