vehicel_DescANVL_Valkyrie=Manufacturer: Anvil Aerospace \nFocus: Drop Ship\n\nThe Valkyrie ups the ante on troop transport. Designed to carry up to twenty soldiers, as well as vehicles, to the most hostile locations, this conflict-ready mil-spec craft is a formidable force, both offensively and defensively. Built with military and private defense contractors in mind, the Valkyrie is one of the most efficient and effective personnel transports in its class.\n\n--- STATS ---\nSCM: 207 m/s  |  Max: 1,110 m/s\nBoost: +431 m/s  /  -245 m/s\nCrew: 1  |  Length: 48.0m  |  Class: Combat  |  Role: Dropship\nTurrets: 6\nShields: 2× S2  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 23,760\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 139  |  E 88  |  D 0  |  T 0\nInsurance: 19.82 min base  |  4.98 min express
vehicl_DescMISC_Hull_B=Manufacturer: MISC\nFocus: Medium Freight\n\nThe MISC Hull B is a rugged option for pilots seeking a dedicated cargo transport. While not as large as some of the other Hull-series models, the Hull B's smaller profile provides greater flexibility and more access options.\n\n--- STATS ---\nSCM: 145 m/s  |  Max: 960 m/s\nBoost: +340 m/s  /  -180 m/s\nCrew: 2  |  Length: 71.0m  |  Class: Transporter  |  Role: Medium Freight\nInsurance: 11.66 min base  |  2.85 min express
vehicle_DescAEGS_Avenger_Stalker=Manufacturer: Aegis Dynamics\nFocus: Interceptor\n\nInitially designed as Aegis’ frontline carrier ship for the military, the Avenger Stalker took a different path, ultimately having a long and storied career as the standard patrol craft of the UEE Advocacy. Utilizing its cargo hold for prisoner transport, the Avenger features a sturdy, reliable hull and the capacity for larger-than-expected engine mounts.\n\n--- STATS ---\nSCM: 262 m/s  |  Max: 1,425 m/s\nBoost: +610 m/s  /  -280 m/s\nCrew: 1  |  Length: 20.0m  |  Class: Combat  |  Role: Interceptor\nGuns: 2× S1 (empty)  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 1,232\nDmg Mult: P 0.80x  |  E 0.65x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 4.86 min base  |  1.62 min express
vehicle_DescAEGS_Avenger_Titan=Manufacturer: Aegis Dynamics\nFocus: Light Freight \n\nLacking the Prisoner Cells of the Stalker or the EMP Generator of the Warlock, the Titan’s hold is free to carry cargo. Couple that available space with the Avenger’s tried and true combat abilities and you’ve got a light cargo hauler that’s more than capable of handling itself in a fight.\n\n--- STATS ---\nSCM: 262 m/s  |  Max: 1,425 m/s\nBoost: +610 m/s  /  -280 m/s\nCrew: 1  |  Length: 20.0m  |  Class: Transporter  |  Role: Light Freight\nGuns: 2× S1 (empty)  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,640\nDmg Mult: P 0.80x  |  E 0.65x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 4.05 min base  |  1.35 min express
vehicle_DescAEGS_Avenger_Titan_Renegade=Manufacturer: Aegis Dynamics\nFocus: Light Freight\n\nCreated as part of the ‘Masters of Flight’ series in conjunction with the flight-sim Arena Commander, the Renegade pays tribute to famed pilot Danny Solomon for his notable work with the Advocacy to bring justice to Bremen. This Avenger Titan comes equipped with a specialized dogfighting focused loadout and a custom special edition livery honoring this iconic ship.\n\n--- STATS ---\nCrew: 1  |  Length: 20.0m  |  Class: Transporter  |  Role: Light Freight\nGuns: 2× S1 (empty)  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,640\nDmg Mult: P 0.80x  |  E 0.65x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 4.05 min base  |  1.35 min express
vehicle_DescAEGS_Avenger_Warlock=Manufacturer: Aegis Dynamics\nFocus: Interdiction\n\nThe Avenger Warlock was built towards a single design philosophy: stop ships, don’t destroy them. Probably the closest to a non-lethal fighter, the Warlock is outfitted with a Behring REP-8 EMP Generator, capable of emitting a powerful electromagnetic wave to disable any electronics unfortunate enough to be within the blast radius.\n\n--- STATS ---\nSCM: 262 m/s  |  Max: 1,425 m/s\nBoost: +610 m/s  /  -280 m/s\nCrew: 1  |  Length: 20.0m  |  Class: Combat  |  Role: Interdiction\nGuns: 2× S1 (empty)  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,640\nDmg Mult: P 0.80x  |  E 0.65x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 4.86 min base  |  1.62 min express
