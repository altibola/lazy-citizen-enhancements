vehicle_DescMISC_Hull_A=Manufacturer: MISC\nFocus: Light Freight\n\nThe smallest, most affordable Hull. The Hull A is great for those just striking out in the galaxy on their own. The Hull A is most similar to the Aurora and Mustang, but lacks the ‘jack of all trades’ nature. Where the others trade cargo capacity for firepower or speed, the Hull A is 100% on-mission transport.\n\n--- STATS ---\nSCM: 185 m/s  |  Max: 1,050 m/s\nBoost: +385 m/s  /  -195 m/s\nCrew: 1  |  Length: 30.0m  |  Class: Transporter  |  Role: Light Freight\nShields: S2  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 4,840\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 18  |  E 19  |  D 0  |  T 0\nInsurance: 5.95 min base  |  1.98 min express
vehicle_DescMISC_Hull_C=Manufacturer: MISC\nFocus: Heavy Freight\n\nOften called the most common ship in the galaxy, the Hull C is the most-produced of the range and is considered by many to be the most versatile. Intended to hit the ‘sweet spot’ between the smaller single-person transports and the massive superfreighters that make up the rest of the range, the Hull C offers the expansive modularity of the larger ships while still retaining a modicum of the maneuverability allowed the low end of the range.\n\n--- STATS ---\nSCM: 110 m/s  |  Max: 890 m/s\nBoost: +290 m/s  /  -100 m/s\nCrew: 1  |  Length: 91.2m  |  Class: Transporter  |  Role: Heavy Freight\nShields: 3× S3  |  Power: S3\nArmor HP: 12,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 315  |  E 360  |  D 0  |  T 0\nInsurance: 45.00 min base  |  15.00 min express
