vehicle_DescMISC_Freelancer=Manufacturer: MISC\nFocus: Light Freight\n\nFreelancers are used as long haul merchant ships by major corporations, but they are just as frequently repurposed as dedicated exploration vessels by independent captains who want to operate on the fringes of the galaxy.\n\n--- STATS ---\nSCM: 197 m/s  |  Max: 1,050 m/s\nBoost: +400 m/s  /  -205 m/s\nCrew: 1  |  Length: 38.0m  |  Class: Transporter  |  Role: Light Freight\nTurrets: 1  |  MRacks: 2× S3  2× S4\nShields: 3× S2  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 10,560\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 41  |  E 43  |  D 0  |  T 0\nInsurance: 12.99 min base  |  4.33 min express
vehicle_DescMISC_Freelancer_DUR=Manufacturer: MISC\nFocus: Expedition \n\nThe Freelancer DUR variant specializes in exploration. Sacrificing 25% cargo capacity of the standard Freelancer for an enhanced jump drive, a more advanced scanner, and an expanded fuel tank may seem like a bad call to some, but those who value discovery over profit will find it to be their ship of choice.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,100 m/s\nBoost: +403 m/s  /  -205 m/s\nCrew: 1  |  Length: 38.0m  |  Class: Exploration  |  Role: Expedition\nTurrets: 1  |  MRacks: 2× S3  2× S4\nShields: 3× S2  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 10,560\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 41  |  E 43  |  D 0  |  T 0\nInsurance: 12.99 min base  |  4.33 min express
