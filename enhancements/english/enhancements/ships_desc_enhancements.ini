vehicle_DescMISC_Razor=Manufacturer: Mirai \nFocus: Racing\n\nThis advanced racer features an advanced composite spaceframe that puts pure speed ahead of everything else... it's the ship for pilots who want to leave the competition in the dust.\n\n--- STATS ---\nSCM: 265 m/s  |  Max: 1,450 m/s\nBoost: +595 m/s  /  -290 m/s\nCrew: 1  |  Length: 12.5m  |  Class: Competition  |  Role: Racing\nInsurance: 6.08 min base  |  2.02 min express
vehicle_DescMISC_Razor_EX=Manufacturer: Mirai\nFocus: Stealth\n\nOutfitted with signature-reducing materials, the Razor EX was a specialty build for the UEE Advocacy for use in surveillance and extraction operations. Although the EX was ultimately rejected for widespread use, a variation of the model was released for members of the public looking to keep a lower profile.\n\n--- STATS ---\nSCM: 265 m/s  |  Max: 1,450 m/s\nBoost: +595 m/s  /  -290 m/s\nCrew: 1  |  Length: 12.5m  |  Class: Combat  |  Role: Stealth Fighter\nShields: S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nInsurance: 5.91 min base  |  1.97 min express
vehicle_DescMISC_Razor_LX=Manufacturer: Mirai\nFocus: Racing\n\nThe Razor gets supercharged. The LX features an overclocked engine to unleash blazing top speeds. This power comes at a cost with reduced maneuverability and armaments making it ideal for straight-shot racing. But who needs weapons when you’re leaving your competition in the dust.\n\n--- STATS ---\nSCM: 275 m/s  |  Max: 1,525 m/s\nBoost: +490 m/s  /  -290 m/s\nCrew: 1  |  Length: 12.5m  |  Class: Competition  |  Role: Racing\nInsurance: 6.08 min base  |  2.02 min express
vehicle_DescMISC_Reliant=Manufacturer: MISC\nFocus: Starter / Light Freight\n\nWith the Reliant Kore, MISC adds to its already impressive lineup of ships, a smaller introductory-class spacecraft. Utilizing advanced Xi’An designs, the Reliant features broad, sleek wings, omni-directional thrusters and a fully-articulated two-seat cockpit that supports horizontal and vertical flight modes. All of this combines with a larger carrying capacity than many ships in its class to make the Kore a natural choice for short-range hauling, or with the simple addition of a few optional components, this can-do ship can do anything you dream of.\n\n--- STATS ---\nCrew: 1  |  Length: 14.8m  |  Class: Transporter  |  Role: Starter / Light Freight\nGuns: 2  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,200\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 0.68 min base  |  0.00 min express
vehicle_DescMISC_Reliant_Mako=Manufacturer: MISC\nFocus: Reporting\n\nThe Empire depends on up-to-the-second information, which is why reporters need to be able to go where the news is happening: wherever, whenever. Enter the Mako, all the flexibility and dependability of a MISC Reliant combined with a state-of-the-art Cernan camera package to capture every moment as it happens with the clarity and accuracy that makes headlines.\n\n--- STATS ---\nSCM: 220 m/s  |  Max: 1,150 m/s\nBoost: +480 m/s  /  -250 m/s\nCrew: 1  |  Length: 14.8m  |  Class: Support  |  Role: Reporting\nGuns: 2  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,200\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 5.36 min base  |  1.79 min express
vehicle_DescMISC_Reliant_Sen=Manufacturer: MISC\nFocus: Light Science\n\nMagellan, Pierce, Croshaw, names that echo through history thanks to their adventurous spirit, a curious nature, and a reliable ship. The Reliant Sen is a versatile mobile science platform; outfitted with long range capabilities to take you further, longer, and the advanced Samos sensor suite. Perfect for the aspiring explorer who wants to whisper their name into the halls of history.\n\n--- STATS ---\nSCM: 220 m/s  |  Max: 1,150 m/s\nBoost: +480 m/s  /  -250 m/s\nCrew: 1  |  Length: 14.8m  |  Class: Industrial  |  Role: Light Science\nGuns: 2  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,200\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 4.82 min base  |  1.61 min express
vehicle_DescMISC_Reliant_Tana=Manufacturer: MISC\nFocus: Light Fighter\n\nWith Humanity ever-expanding through the universe, the need for a versatile lightweight fighter has expanded with it. Easy to maintain with a rugged construction, the Reliant Tana makes for an ideal choice for frontier and outpost defense thanks to its custom high-yield power plant, stronger shields, and additional weapon mounts.\n\n--- STATS ---\nSCM: 222 m/s  |  Max: 1,150 m/s\nBoost: +480 m/s  /  -250 m/s\nCrew: 1  |  Length: 14.8m  |  Class: Combat  |  Role: Light Fighter\nGuns: 2  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 3,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 4.82 min base  |  1.61 min express
vehicle_DescMISC_Starfarer=Manufacturer: MISC\nFocus: Heavy Refueling\n\nThe Starfarer differs from traditional bulk freighters in one key way: it is a dedicated fuel platform. The Starfarer is designed not only to load, store and protect fuel stasis units, it is designed to take in spaceborne gases and refine them for use without landing. And while it excels at this, the Starfarer can also be used to ferry traditional bulk cargo pods.\n\n--- STATS ---\nSCM: 106 m/s  |  Max: 845 m/s\nBoost: +295 m/s  /  -106 m/s\nCrew: 1  |  Length: 102.0m  |  Class: Support  |  Role: Heavy Refueling\nTurrets: 1\nShields: 3× S3  |  Coolers: 2× S3  |  Power: S3  |  QD: S3\nArmor HP: 12,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 315  |  E 360  |  D 0  |  T 0\nInsurance: 18.00 min base  |  6.00 min express
vehicle_DescMISC_Starfarer_Gemini=Manufacturer: MISC\nFocus: Heavy Refueling\n\nThe United Empire of Earth military uses an adapted ‘rough and tumble’ variant of the Starfarer for their front line operations. The G2M Gemini, more commonly the Starfarer Gemini or ‘Star G,’ trades some cargo capacity and maneuverability in exchange for reinforced armor, increased shielding, more powerful engines and stronger versions of the three manned turrets.\n\n--- STATS ---\nSCM: 106 m/s  |  Max: 845 m/s\nBoost: +295 m/s  /  -106 m/s\nCrew: 2  |  Length: 102.0m  |  Class: Support  |  Role: Heavy Refueling\nTurrets: 1\nShields: 3× S3  |  Coolers: 2× S3  |  Power: S3  |  QD: S3\nArmor HP: 18,150\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 331  |  E 378  |  D 0  |  T 0\nInsurance: 35.34 min base  |  11.78 min express
