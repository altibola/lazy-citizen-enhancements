vehicle_DescARGO_MOTH=Manufacturer: Argo Astronautics\nFocus: Medium Salvage\n\nExperience Argo's centuries of industrial expertise with the MOTH. Using a tried and tested chassis as its foundation, the MOTH features three dedicated salvage turrets and an external salvage autoloader, so a four person crew can strip, rip, and store salvage as fast as they can get to it.\n\n--- STATS ---\nSCM: 140 m/s  |  Max: 960 m/s\nBoost: +340 m/s  /  -150 m/s\nCrew: 3  |  Length: 0.0m  |  Class: Industrial  |  Role: Medium Salvage\nInsurance: 12.50 min base  |  3.13 min express
vehicle_DescARGO_MPUV=Manufacturer: Argo Astronautics\nFocus: Light Freight\n\nThe Argo Astronautics MPUV Cargo is a dedicated merchant transfer ship. A ubiquitous intergalactic stevedore, vast numbers of MPUV Cargos are responsible for loading and unloading goods onto ships that can't otherwise land on planets or drydocks, such as the Hull D and the Orion. Some hauler captains choose to own and operate their own Argo, while others prefer to contract with the local Argo owners found at many of the busier ports.\n\n--- STATS ---\nSCM: 170 m/s  |  Max: 890 m/s\nBoost: +360 m/s  /  -140 m/s\nCrew: 1  |  Length: 10.5m  |  Class: Transporter  |  Role: Light Freight\nShields: S1  |  Coolers: 2× S0  |  Power: S0\nArmor HP: 1,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.17 min base  |  0.00 min express
