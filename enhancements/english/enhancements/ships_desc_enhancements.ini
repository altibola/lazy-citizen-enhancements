vehicle_descANVL_Paladin=Manufacturer: Anvil Aerospace\nFocus: Gunship\n \nDesigned by Anvil Aerospace, the Paladin is an intimidating frontline fight that makes a bold impact whenever it arrives in battle. Whether it’s executing a dangerous operation or leading the charge against overwhelming odds, with its powerful array of turreted weapons and ordnance the Paladin is ready to ride to the rescue.\n\n--- STATS ---\nSCM: 175 m/s  |  Max: 950 m/s\nBoost: +340 m/s  /  -200 m/s\nCrew: 4  |  Length: 0.0m  |  Class: Gunship  |  Role: Gunship\nInsurance: 24.00 min base  |  6.00 min express
vehicle_descMISC_Starlancer_MAX=Manufacturer: MISC\nFocus: Medium Freight\n \nFor those looking to expand their hauling operations, the engineers at MISC have upgraded the Starlancer MAX with an extra spacious hold ready to transport cargo and vehicles. Paired with comfortable accommodations for longer trips and a full defensive package for when you go off the beaten path, it’s easy to see why the Starlancer MAX is the hauler of choice for industrious pilots across the ‘verse.\n\n--- STATS ---\nCrew: 1  |  Length: 90.0m  |  Class: Transporter  |  Role: Medium Freight\nTurrets: 2\nShields: S3  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 12,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 315  |  E 360  |  D 0  |  T 0\nInsurance: 12.33 min base  |  3.08 min express
vehicle_descMISC_Starlancer_TAC=Manufacturer: MISC\nFocus: Gunship\n \nFor those looking to for a versatile ship that can stand on its own in a fight, the engineers have upgraded the Starlancer TAC with an aggressive offensive package ready to face down the fiercest of foes. When you take on a high risk, high reward job, the Starlancer TAC is there to make sure you and your crew are able to see it through to the very end.\n\n--- STATS ---\nSCM: 150 m/s  |  Max: 960 m/s\nBoost: +315 m/s  /  -155 m/s\nCrew: 1  |  Length: 90.0m  |  Class: Combat  |  Role: Gunship\nTurrets: 9\nShields: 2× S3  |  Coolers: S3  |  Power: S3  |  QD: S2\nArmor HP: 18,150\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 347  |  E 396  |  D 0  |  T 0\nInsurance: 13.33 min base  |  3.33 min express
vehicles_DescOrbital_Sentry=The Overseer, from manufacturer Broad & Raibee, allows for defensive activity monitoring in a given area. When a threat is detected, the Overseer is capable of targeting and engaging trespassing hostiles with brutal efficiency making it perfect for providing extra security to any station, facility, or controlled sector.\n\n--- STATS ---\nCrew: 1  |  Length: 18.0m  |  Class: Combat  |  Role: Turret\nTurrets: 1\nShields: S2  |  Coolers: S3  |  Power: S3\nInsurance: 33.33 min base  |  3.33 min express
vehicles_DescOrbital_Sentry_Prototype_1=The details of this prototype defensive monitor are the intellectual property of Hurston Dynamics and are confidential. Hurston Dynamics is not responsible for any damages caused to individuals who trespass onto DM-7R1 testing sites.\n\n--- STATS ---\nCrew: 1  |  Length: 18.0m  |  Class: Combat  |  Role: Turret\nTurrets: 1\nShields: S3  |  Coolers: S3  |  Power: S3\nInsurance: 33.33 min base  |  3.33 min express
