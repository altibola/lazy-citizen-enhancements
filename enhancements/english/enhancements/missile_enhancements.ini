item_DescBOMB_S03_FSKI_Thunderball=Manufacturer: FireStorm Kinetics\nItem Type: Explosive Bomb\nSize: 3\n\nTarget ground forces from a safe distance above with the Thunderball. Despite the small size, these S3 bombs pack a powerful payload, allowing users to either deploy multiple bombs to overwhelm a stationary target or drop them at intervals to hit moving targets. The Thunderball uses FireStorm Kinetics' patented Atmo-Xact fins that deploy once dropped to provide additional guidance en route to target.\n\n--- STATS ---\nDamage: 27,000.0 (Phys: 12500.0 / Energy: 14500.0)\nBlast Radius: 40 m\nComponent HP: 1,000
