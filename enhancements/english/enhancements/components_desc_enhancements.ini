item_Desc_SHLD_GODI_S02_CoverAll=Item Type: Shield Generator\nManufacturer: Gorgon Defender Industries\nSize: 2\nGrade: B\nClass: Military\n\nDon’t sacrifice performance for durability. Get both with Gorgon Defender Industries’ CoverAll shield generator.\n\n--- STATS ---\nMax HP: 10,560  |  Regen: 2,112 HP/s\nDowned Delay: 11.5s  |  Damaged Delay: 5.8s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,650  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 660
item_Desc_SHLD_GODI_S02_FR76=Item Type: Shield Generator\nManufacturer: Gorgon Defender Industries\nSize: 2\nGrade: A\nClass: Military\n\nRefined by years of extensive, real world testing by the military, Gorgon Defender Industries FR-76 is the ultimate shield generator. Perfect for everyone from folks defending the frontline to those exploring the frontier.\n\n--- STATS ---\nMax HP: 10,560  |  Regen: 2,323 HP/s\nDowned Delay: 10.5s  |  Damaged Delay: 5.3s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,650  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 750
item_Desc_SHLD_GODI_S02_SecureShield=Item Type: Shield Generator\nManufacturer: Gorgon Defender Industries\nSize: 2\nGrade: D\nClass: Military\n\nGet military-grade protection for your ship with the SecureShield from Gorgon Defender Industries. Their cutting edge emitter tech allows for superior shield absorption across the spectrum of damage types.\n\n--- STATS ---\nMax HP: 10,560  |  Regen: 1,901 HP/s\nDowned Delay: 13.9s  |  Damaged Delay: 7.0s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,650  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 500
item_Desc_SHLD_GODI_S03_FR86=Item Type: Shield Generator\nManufacturer: Gorgon Defender Industries\nSize: 3\nGrade: A\nClass: Military\n\nGorgon’s FR-86 is tried, tested, and trusted. No other large shield generator delivers both exceptional performance and durability to this degree.\n\n--- STATS ---\nMax HP: 105,600  |  Regen: 23,232 HP/s\nDowned Delay: 11.6s  |  Damaged Delay: 5.8s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 2,060  |  IR: 0\nPower Draw: 5 PU/s\nComponent HP: 2,100
item_Desc_SHLD_GODI_S03_FullBlock=Item Type: Shield Generator\nManufacturer: Gorgon Defender Industries\nSize: 3\nGrade: B\nClass: Military\n\nCrafted by former residents of Caliban, Gorgon’s FullBlock large shield generator has been repeatedly put to the test by members of the military and public. That means you can count on it regardless of what you come up against.\n\n--- STATS ---\nMax HP: 105,600  |  Regen: 21,120 HP/s\nDowned Delay: 12.7s  |  Damaged Delay: 6.3s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 2,060  |  IR: 0\nPower Draw: 5 PU/s\nComponent HP: 1,800
item_Desc_SHLD_GODI_S03_SecureScreen=Item Type: Shield Generator\nManufacturer: Gorgon Defender Industries\nSize: 3\nGrade: D\nClass: Military\n\nGorgon Defender Industries brings military might to their entry-level, large shield generator. Featuring best-in-class durability, the SecureScreen was built to take a beating and survive.\n\n--- STATS ---\nMax HP: 105,600  |  Regen: 19,008 HP/s\nDowned Delay: 15.3s  |  Damaged Delay: 7.7s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 2,060  |  IR: 0\nPower Draw: 5 PU/s\nComponent HP: 1,400
item_Desc_SHLD_SECO_S01_HEX=Item Type: Shield Generator\nManufacturer: Seal Corporation\nSize: 1\nGrade: B\nClass: Civilian\n\nPrepare your ship for any circumstance by installing a HEX from Seal Corporation. Balanced performance and durability make this an ideal, versatile choice for those who don’t know where their next adventure may take them.\n\n--- STATS ---\nMax HP: 2,160  |  Regen: 432 HP/s\nDowned Delay: 9.1s  |  Damaged Delay: 4.5s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 750  |  IR: 0\nPower Draw: 2 PU/s\nComponent HP: 170
item_Desc_SHLD_SECO_S02_BLOC=Item Type: Shield Generator\nManufacturer: Seal Corporation\nSize: 2\nGrade: B\nClass: Civilian\n\nSeal Corporation’s BLOC shield generator was the first to use the company’s revolutionary quantum core semiconductor to reduce the component’s power draw without compromising performance.\n\n--- STATS ---\nMax HP: 7,200  |  Regen: 1,440 HP/s\nDowned Delay: 10.0s  |  Damaged Delay: 5.0s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,130  |  IR: 0\nPower Draw: 3 PU/s\nComponent HP: 470
item_Desc_SHLD_SECO_S02_RPEL=Item Type: Shield Generator\nManufacturer: Seal Corporation\nSize: 2\nGrade: D\nClass: Civilian\n\nSee why more people trust Seal Corporation to protect their ship than any other company. With the RPEL shield generator you can be certain you’ll be sealed off from danger.\n\n--- STATS ---\nMax HP: 7,200  |  Regen: 1,296 HP/s\nDowned Delay: 12.1s  |  Damaged Delay: 6.0s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,130  |  IR: 0\nPower Draw: 3 PU/s\nComponent HP: 360
item_Desc_SHLD_SECO_S03_ARMOR=Item Type: Shield Generator\nManufacturer: Seal Corporation\nSize: 3\nGrade: B\nClass: Civilian\n\nARMOR is Seal Corps’ top-of-the-line shield generator. It was used extensively by the military prior to its shield tech being declassified for civilian use.\n\n--- STATS ---\nMax HP: 72,000  |  Regen: 14,400 HP/s\nDowned Delay: 11.0s  |  Damaged Delay: 5.5s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,500  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 1,300
item_Desc_SHLD_SECO_S03_GUARD=Item Type: Shield Generator\nManufacturer: Seal Corporation\nSize: 3\nGrade: C\nClass: Civilian\n\nDon’t be afraid to go up against the unknown with Seal Corp’s GUARD. This shield generator balances performance, durability, and stealth to allow the user to utilize the shield in whatever way suits them best.\n\n--- STATS ---\nMax HP: 72,000  |  Regen: 13,680 HP/s\nDowned Delay: 12.1s  |  Damaged Delay: 6.0s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,500  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 1,100
item_Desc_SHLD_SECO_S03_HAVEN=Item Type: Shield Generator\nManufacturer: Seal Corporation\nSize: 3\nGrade: D\nClass: Civilian\n\nThe HAVEN is an admired shield generator for large ships. Seal Corp’s simple, clean design makes repairing the component an easy and affordable task, and has only increased its popularity over the years.\n\n--- STATS ---\nMax HP: 72,000  |  Regen: 12,960 HP/s\nDowned Delay: 13.3s  |  Damaged Delay: 6.7s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,500  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 990
item_Desc_SHLD_YORM_S01_Jaghte=Item Type: Shield Generator\nManufacturer: Yorm\nSize: 1\nGrade: B\nClass: Competition\n\nBuilt with performance in mind, Yorm’s Jaghte competition shield generator prioritizes shield health and generation rate over strength and stealth.\n\n--- STATS ---\nMax HP: 1,920  |  Regen: 384 HP/s\nDowned Delay: 7.7s  |  Damaged Delay: 3.9s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 818  |  IR: 0\nPower Draw: 2 PU/s\nComponent HP: 91
item_Desc_SHLD_YORM_S02_Bamoty=Item Type: Shield Generator\nManufacturer: Yorm\nSize: 2\nGrade: D\nClass: Competition\n\nThe Bamoty is Yorm’s take on a commercial style shield generator. This medium-sized component has won the company a wider fanbase because it expertly balances performance, durability, and stealth.\n\n--- STATS ---\nMax HP: 6,400  |  Regen: 1,152 HP/s\nDowned Delay: 10.3s  |  Damaged Delay: 5.1s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,230  |  IR: 0\nPower Draw: 3 PU/s\nComponent HP: 200
item_Desc_SHLD_YORM_S02_Haltur=Item Type: Shield Generator\nManufacturer: Yorm\nSize: 2\nGrade: B\nClass: Competition\n\nStrong shield health and an exceptional generation rate gives the Haltur the best performance ranking of any shield in its class. Beloved by racers and those who prefer to navigate away from danger instead of soaking it up.\n\n--- STATS ---\nMax HP: 6,400  |  Regen: 1,280 HP/s\nDowned Delay: 8.5s  |  Damaged Delay: 4.2s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,230  |  IR: 0\nPower Draw: 3 PU/s\nComponent HP: 250
item_Desc_SHLD_YORM_S02_Trenta=Item Type: Shield Generator\nManufacturer: Yorm\nSize: 2\nGrade: C\nClass: Competition\n\nAn ideal choice for racers looking for a shield generator that provides above average shield performance and durability. As a bonus, the Trenta’s casing is constructed out of a magnesium infused alloy which makes the component both sturdy yet lightweight.\n\n--- STATS ---\nMax HP: 6,400  |  Regen: 1,216 HP/s\nDowned Delay: 9.3s  |  Damaged Delay: 4.7s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,230  |  IR: 0\nPower Draw: 3 PU/s\nComponent HP: 220
