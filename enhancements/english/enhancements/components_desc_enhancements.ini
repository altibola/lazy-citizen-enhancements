item_descQDRV_RSI_S02_Khaos_SCItem=Item Type: Quantum Drive\nManufacturer: RSI\nSize: 2\nGrade: C \nClass: Civilian\n\nRSI's Khaos has been tuned to provide dependable performance with reliable construction. Once you've got this strapped in, you'll appreciate the order this quantum drive brings to the chaos of travel.\n\n--- STATS ---\nQT Speed: 201 Mm/s  |  Spool: 6s\nCooldown: 16.9s\nFuel/Gm: 0.0101\nQT Fuel Use: 16 μ/s\nAccel:  S1: 3,000,000  |  S2: 13,200,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 3 PU/s\nComponent HP: 410\nSignatures:  EM: 27,000  |  IR: 0\nOverheat Temp: 383K\nMax Distortion: 3,500
item_descQDRV_RSI_S03_Metis_SCItem=Item Type: Quantum Drive\nManufacturer: RSI\nSize: 3\nGrade: C\nClass: Civilian\n\nThere's no room for error when bending space and time to travel incredible distances. So put your trust in RSI, a company that's delivered quality components to the public since the dawn of space flight.\n\n--- STATS ---\nQT Speed: 246 Mm/s  |  Spool: 7s\nCooldown: 9.4s\nFuel/Gm: 0.0599\nQT Fuel Use: 26 μ/s\nAccel:  S1: 1,800,000  |  S2: 11,600,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 4 PU/s\nComponent HP: 1,100\nSignatures:  EM: 36,000  |  IR: 0\nOverheat Temp: 383K\nMax Distortion: 5,500
item_descQDRV_RSI_S03_Tyche_SCItem=Item Type: Quantum Drive\nManufacturer: RSI\nSize: 3\nGrade: B\nClass: Civilian\n\nThe Tyche quantum drive harmoniously balances performance, durability, and stealth to create a well-rounded component capable of adeptly handling a variety of situations.\n\n--- STATS ---\nQT Speed: 295 Mm/s  |  Spool: 7s\nCooldown: 9.1s\nFuel/Gm: 0.0541\nQT Fuel Use: 21 μ/s\nAccel:  S1: 2,160,000  |  S2: 13,900,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 4 PU/s\nComponent HP: 1,300\nSignatures:  EM: 36,000  |  IR: 0\nOverheat Temp: 394K\nMax Distortion: 6,000
item_descQDRV_TARS_S01_Wayfare_SCItem=Item Type: Quantum Drive\nManufacturer: Tarsus \nSize: 1\nGrade: D \nClass: Civilian\n\nSpeed through space without breaking the bank. The Warfare is a small quantum drive from Tarsus that was specifically designed to help make space travel affordable for the masses.\n\n--- STATS ---\nQT Speed: 138 Mm/s  |  Spool: 4s\nCooldown: 10.0s\nFuel/Gm: 0.0101\nQT Fuel Use: 8 μ/s\nAccel:  S1: 4,170,000  |  S2: 12,500,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 2 PU/s\nComponent HP: 130\nSignatures:  EM: 15,000  |  IR: 0\nOverheat Temp: 372K\nMax Distortion: 1,950
item_descQDRV_TARS_S02_Quest_SCItem=Item Type: Quantum Drive\nManufacturer: Tarsus \nSize: 2\nGrade: D \nClass: Civilian\n\nWhy mess with perfection? Tarsus has been manufacturing the Quest drive for centuries to provide everyone an affordable medium-sized component to carry them on their adventures.\n\n--- STATS ---\nQT Speed: 168 Mm/s  |  Spool: 6s\nCooldown: 18.0s\nFuel/Gm: 0.0112\nQT Fuel Use: 19 μ/s\nAccel:  S1: 2,500,000  |  S2: 11,000,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 3 PU/s\nComponent HP: 360\nSignatures:  EM: 22,500  |  IR: 0\nOverheat Temp: 372K\nMax Distortion: 3,050
item_descQDRV_TARS_S03_Drifter_SCItem=Item Type: Quantum Drive\nManufacturer: Tarsus\nSize: 3\nGrade: D\nClass: Civilian\n\nBalancing craftsmanship and cost, the Drifter provides renowned Tarsus performance at an affordable price.\n\n--- STATS ---\nQT Speed: 205 Mm/s  |  Spool: 7s\nCooldown: 10.0s\nFuel/Gm: 0.0663\nQT Fuel Use: 31 μ/s\nAccel:  S1: 1,500,000  |  S2: 9,680,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 4 PU/s\nComponent HP: 990\nSignatures:  EM: 30,000  |  IR: 0\nOverheat Temp: 372K\nMax Distortion: 4,700
item_descQDRV_TARS_S03_Wanderer_SCItem=Item Type: Quantum Drive\nManufacturer: Tarsus\nSize: 3\nGrade: C\nClass: Civilian\n\nTarsus carefully designed and tuned the Wanderer into an all-around solid quantum drive, making it one of the more popular components in their revered line-up.\n\n--- STATS ---\nQT Speed: 246 Mm/s  |  Spool: 7s\nCooldown: 10.0s\nFuel/Gm: 0.0644\nQT Fuel Use: 26 μ/s\nAccel:  S1: 1,800,000  |  S2: 11,600,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 4 PU/s\nComponent HP: 1,100\nSignatures:  EM: 30,000  |  IR: 0\nOverheat Temp: 383K\nMax Distortion: 5,500
item_descQDRV_WETK_S02_XL1_SCItem=Item Type: Quantum Drive\nManufacturer: Wei-Tek\nSize: 2\nGrade: A \nClass: Military\n\nWei-Tek might be a new company, but their line of military-grade components is already gaining notoriety. The XL-1 is their premier medium quantum drive that expertly blends performance and durability.\n\n--- STATS ---\nQT Speed: 324 Mm/s  |  Spool: 6s\nCooldown: 22.9s\nFuel/Gm: 0.0240\nQT Fuel Use: 11 μ/s\nAccel:  S1: 4,830,000  |  S2: 21,300,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 4 PU/s\nComponent HP: 840\nSignatures:  EM: 26,300  |  IR: 0\nOverheat Temp: 453K\nMax Distortion: 7,000
item_descQDRV_WETK_S03_Balandin_SCItem=Item Type: Quantum Drive\nManufacturer: Wei-Tek\nSize: 3\nGrade: B\nClass: Military\n\nWei-Tek built the Balandin with military and security personnel in mind. Following a series of test runs by veterans, engineers accelerated the spool and calibration times while also improving the component's precision and stability.\n\n--- STATS ---\nQT Speed: 339 Mm/s  |  Spool: 7s\nCooldown: 12.3s\nFuel/Gm: 0.1352\nQT Fuel Use: 21 μ/s\nAccel:  S1: 2,480,000  |  S2: 16,000,000\nCal Rate: 1,000  |  Required: 5,000–10,000\nPower Draw: 5 PU/s\nComponent HP: 2,100\nSignatures:  EM: 33,800  |  IR: 0\nOverheat Temp: 438K\nMax Distortion: 10,000
