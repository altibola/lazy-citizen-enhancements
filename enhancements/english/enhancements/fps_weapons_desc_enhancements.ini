item_Deschdgw_pistol_ballistic_01=Manufacturer: Hedeby Gunworks\nItem Type: Frag Pistol\nClass: Ballistic\n\nMagazine Size: 8\nRate Of Fire: 140 rpm\nEffective Range: 80 m / 10 m (Charged)\n\nAttachments: Optics (S1), Barrel (S1), Underbarrel (S1)\n\nWhile the Salvo can be used as a normal pistol, Hedeby didn’t stop there. With a longer trigger pull, a freezing primer is injected into the chamber and when released, the heavy firing pin hits with enough force to pulverize the supercooled casing. Accidentally developed as an attempt to mitigate overheating, this charged fire option discharges a deadly spray of high-velocity fragments followed by an ear-shattering boom.\n\n--- STATS ---\nWeight: 0.8 kg\nFire Rate: 170 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 45.0 (Phys)  |  DPS: 127.5\nAmmo: 8\nVelocity: 550 m/s  |  Absolute Range: 1.1 km\nFull Dmg to: 30 m  |  Drop: -0.08/m  |  Min Dmg: 25.0
item_Deschdgw_pistol_ballistic_01_engraved01=Manufacturer: Hedeby Gunworks\nItem Type: Frag Pistol\nClass: Ballistic\n\nMagazine Size: 8\nRate Of Fire: 140 rpm\nEffective Range: 80 m / 10 m (Charged)\n\nAttachments: Optics (S1), Barrel (S1), Underbarrel (S1)\n\nWhile the Salvo can be used as a normal pistol, Hedeby didn't stop there. With a longer trigger pull, a freezing primer is injected into the chamber and when released, the heavy firing pin hits with enough force to pulverize the supercooled casing. Accidentally developed as an attempt to mitigate overheating, this charged fire option discharges a deadly spray of high-velocity fragments followed by an ear-shattering boom. This special edition pistol features beautifully detailed scrollwork personally design by Hedeby master gunsmith Keisha Saeed.\n\n--- STATS ---\nWeight: 0.8 kg\nFire Rate: 170 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 45.0 (Phys)  |  DPS: 127.5\nAmmo: 8\nVelocity: 550 m/s  |  Absolute Range: 1.1 km\nFull Dmg to: 30 m  |  Drop: -0.08/m  |  Min Dmg: 25.0
item_Deschdgw_pistol_ballistic_01_engraved02=Manufacturer: Hedeby Gunworks\nItem Type: Frag Pistol\nClass: Ballistic\n\nMagazine Size: 8\nRate Of Fire: 140 rpm\nEffective Range: 80 m / 10 m (Charged)\n\nAttachments: Optics (S1), Barrel (S1), Underbarrel (S1)\n\nWhile the Salvo can be used as a normal pistol, Hedeby didn't stop there. With a longer trigger pull, a freezing primer is injected into the chamber and when released, the heavy firing pin hits with enough force to pulverize the supercooled casing. Accidentally developed as an attempt to mitigate overheating, this charged fire option discharges a deadly spray of high-velocity fragments followed by an ear-shattering boom. This special edition pistol features beautifully detailed scrollwork personally design by Hedeby master gunsmith Rey Esteban.\n\n--- STATS ---\nWeight: 0.8 kg\nFire Rate: 170 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 45.0 (Phys)  |  DPS: 127.5\nAmmo: 8\nVelocity: 550 m/s  |  Absolute Range: 1.1 km\nFull Dmg to: 30 m  |  Drop: -0.08/m  |  Min Dmg: 25.0
item_Desckegr_fire_extinguisher_01=Manufacturer: KE Group\nItem Type: Fire Extinguisher\nClass: Gadget\n\nMagazine Size: Gas Canister\nRate of Fire: Constant\nEffective Range: 3-4 m\n\nThe KE Group's APX Fire Extinguisher has been rated a best-in-class consumer grade safety equipment for well-over a decade making it the industry standard in fire prevention. Filled with a patented gaseous cooling compound, the extinguisher can rapidly smother any fire in sight. The digital screen on the device allows you to monitor the local temperature to help you contain and eliminate fire hazards.\n\n--- STATS ---\nWeight: 3.2 kg\nFire Rate: 600 RPM\nFire Modes: Auto\nAlpha Dmg: 18.0 (Thermal)  |  DPS: 180.0\nAmmo: 3,000\nRegen: 0/s  |  Cooldown: 3.0s  |  Cost/Shot: 1\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
