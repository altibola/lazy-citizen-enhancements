item_Descklwe_pistol_energy_01=Manufacturer: Klaus & Werner\nItem Type: Pistol\nClass: Energy (Laser)\n\nBattery Size: 30\nRate Of Fire: 300 rpm\nEffective Range: 30 m\n\nAttachments: Optics (S1), Barrel (S1), Underbarrel (S1)\n\nA handheld laser made famous as Kyle Fenris’ sidearm on the hit vid show The Frontier, the Klaus & Werner Model II Arclight has become extremely popular on the civilian market. Despite its media appeal, the Model II offers a higher rate of fire than any of its ballistic counterparts. While that may diminish the weapon's stopping power, its power cell offers more than enough shots to finish the job.\n\n--- STATS ---\nWeight: 1.4 kg\nFire Rate: 700 RPM\nFire Modes: Burst / Semi-Auto\nAlpha Dmg: 18.0 (Energy)  |  DPS: 210.0\nAmmo: 30\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
item_Descklwe_pistol_energy_01_chromic01=Manufacturer: Klaus & Werner\nItem Type: Pistol\nClass: Energy (Laser)\n\nBattery Size: 30\nRate Of Fire: 300 rpm\nEffective Range: 30 m\n\nA handheld laser made famous as Kyle Fenris’ sidearm on the hit vid show The Frontier, the Klaus & Werner Model II Arclight has become extremely popular on the civilian market. Despite its media appeal, the Model II offers a higher rate of fire than any of its ballistic counterparts. While that may diminish the weapon's stopping power, its power cell offers more than enough shots to finish the job. This exclusive Glimmer edition features a distinct iridescent coating that makes the weapon shimmer with different colors based on lighting conditions and the angle from which it's viewed.\n\n--- STATS ---\nWeight: 1.4 kg\nFire Rate: 700 RPM\nFire Modes: Burst / Semi-Auto\nAlpha Dmg: 18.0 (Energy)  |  DPS: 210.0\nAmmo: 30\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
