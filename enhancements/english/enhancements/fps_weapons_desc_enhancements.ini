item_DescKSAR_pistol_ballistic_01=Manufacturer: Kastak Arms\nItem Type: Pistol\nClass: Ballistic\n\nMagazine Size: 6\nRate Of Fire: 180 rpm \nEffective Range: 100 m\n\nAttachments: Optics (S1), Barrel (S1), Underbarrel (S1)\n\nOften called the Kastak Arms "hand cannon," the Coda can end an engagement with a single .50 caliber round, although the substantial power can make the Coda's recoil hard to handle. Considering its limited magazine size and substantial kick, sustained fire is discouraged in favor of more accurate single shots.\n\n--- STATS ---\nWeight: 1.3 kg\nFire Rate: 180 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 60.0 (Phys)  |  DPS: 180.0\nAmmo: 6\nVelocity: 550 m/s  |  Absolute Range: 1.1 km\nFull Dmg to: 55 m  |  Drop: -0.20/m  |  Min Dmg: 35.0
item_DescKsar_rifle_energy_01_blue_gold_01=Manufacturer: Kastak Arms\nItem Type: Assault Rifle\nClass: Energy (Plasma)\n\nBattery Size: 35\nRate Of Fire: 500 rpm\nEffective Range: 50 m\n\nAttachments: Optics (S2), Barrel (S2), Underbarrel (S2)\n\nThe Karna is a classic Kastak Arms plasma assault rifle. This mid-range mauler features charged and full-auto fire modes to allow for quick and easy situational adjustments. Besides its renowned firepower, the Karna's rugged looks and reliability have made it one of Kastak Arms' most popular weapons. The bold blue and gold color scheme gives the Valor edition a valiant and dignified appeal.\n\n--- STATS ---\nWeight: 3.5 kg\nFire Rate: 600 RPM\nFire Modes: Auto / Charge / Semi-Auto\nAlpha Dmg: 17.5 (Energy)  |  DPS: 175.0\nAmmo: 35\nVelocity: 600 m/s  |  Absolute Range: 1.2 km\nFull Dmg to: 20 m  |  Drop: -0.11/m  |  Min Dmg: 14.5
