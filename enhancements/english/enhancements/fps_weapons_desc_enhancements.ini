item_Descklwe_smg_energy_01=Manufacturer: Klaus & Werner\nItem Type: SMG\nClass: Laser\n\nBattery Size: 45\nRate Of Fire: 562.5 rpm\nEffective Range: 25m\n\nAttachments: Optics (S1), Barrel (S1), Underbarrel (S1)\n\nKlaus & Werner's expert craftsmanship is once again on full display to make the Lumin V laser compact energy rifle even more deadly and dependable. A new "interval autofire" mode blasts five-round barrages when the trigger is held down, utilizing the target saturation that comes with autofire while providing breaks to recompensate aim. Even when constantly on the attack, the gun's excellent design provides low recoil and a tight spread.\n\n--- STATS ---\nWeight: 2.6 kg\nFire Rate: 700 RPM\nFire Modes: Burst\nAlpha Dmg: 21.0 (Energy)  |  DPS: 245.0\nAmmo: 45\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
