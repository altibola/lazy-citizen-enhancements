item_Descgrin_salvage_01=Manufacturer: Greycat Industrial\nItem Type: Utility\nClass: Gadget\n\nCanister Size: Large\nRate of Fire: N / A (Beam)\nEffective Range: 5 m\n\nStrip salvage and make repairs with the Cambio, a dual purpose salvage and repair tool (SRT) designed to collect and convert alloys and polymers found in scrap into recycled material composite that can either be sold or used to make quick repairs. The Cambio SRT features rapid stripping speeds and an impressive battery life, making it an essential gadget for mechanics and spacefarers.\n\n--- STATS ---\n<EM4>Repair:</EM4>  HP Rate: 160/s  |  Damage-Map Rate: 10/s  |  HP/Ammo: 0.10  |  Ramp: 0.5s↑ 0.1s↓\n<EM4>Salvage:</EM4>  HP Rate: 670/s  |  Damage-Map Rate: 10/s  |  Material Efficiency: 0.70  |  HP/Ammo: 5.80  |  Ramp: 4.0s↑ 2.0s↓
