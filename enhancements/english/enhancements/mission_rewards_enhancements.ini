EckhartSecurity_EliminateAll_storm_shut_H_desc_001=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Clear Location\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nGot an emergency request from Associated Science & Development for any available operators to report to ~mission(Location) and deal with some hostiles who have overtaken one of their facilities. \n\nOnce on site, you will need to engage and eliminate any hostile elements. ASD has indicated that this facility provides shuttle services to one of their embedded research centers but were very clear that you are not authorized to travel there. Trespassers will be shot and you will be no exception, so stick to the prescribed AO.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x4, Soldiers x9, Technicians x4\n<EM4>Applicant:</EM4> +2,000 Rep
EckhartSecurity_EliminateAll_storm_shut_H_title_001=Requesting Help <EM4>[2,000 Rep]</EM4>
EckhartSecurity_EliminateBoss_DC_Desc_001=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Bounty\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nWe’ve received actionable intelligence on a dangerous bounty, who’s turned out to be extremely elusive. <EM4>~mission(TargetName)</EM4> was spotted with a dedicated contingent of known associates at <EM4>~mission(Location|Address)</EM4>. We’re looking for a contractor ready and willing to execute this bounty before they disappear again.\n\nBased on previous attempts to apprehend this criminal, there’s a good chance that <EM4>~mission(TargetName|Last)</EM4> will try to avoid a direct confrontation, and instead send their allies to confront you. We believe that neutralizing these protective forces, and shredding the safety net they provide, is the best way to draw out <EM4>~mission(TargetName|Last)</EM4> to face you directly. \n\nExpect to confront a significant and skilled force. We advise that you plan accordingly. Payment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [B-S2-A] Tigerstrike T-19P\n- [B-S4-A] C-788 Cannon\n- [B-S4-A] Revenant Gatling\n- [B-S6-A] Draugar Gatling\n- [MIL-S1-B] Fierell Cascade\n- [MIL-S2-B] UltraFlux\n- [MIL-S3-B] MegaFlux\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x32, Juggernauts x1, Snipers x2, Soldiers x13, Technicians x3\n<EM4>Security Trainee:</EM4> +500 Rep\n<EM4>Jr. Security Contractor:</EM4> +500 Rep\n<EM4>Blueprint Reward:</EM4> 100% chance (EliminateBoss only)\n\n<EM4>? = only the EliminateBoss variant awards blueprints</EM4>
EckhartSecurity_EliminateBoss_DC_Title_001=High-Risk Bounty: ~mission(TargetName) <EM4>[BP?]</EM4> <EM4>[500 Rep]</EM4>
EckhartSecurity_Mercenary_Rehire_Desc_001=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Trial - Defend Location\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nEckhart Security is continuing to evaluate potential new contractors. According to our records, you’ve previously attempted a trial contract. We understand how demanding and unpredictable this line of work can be, and would like to give you another chance at completing a qualifying contract. \n\nIf interested, report to <EM4>~mission(Location|Address)</EM4> ready to defend it from an incoming assault by outlaws. Successfully complete this contract to receive payment and more work opportunities from Eckhart Security.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Boss x1, Hostiles x10, Private Security x4, Sentries x6\n<EM4>Unknown:</EM4> 11\n<EM4>Applicant:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -1,000 Rep
EckhartSecurity_Mercenary_Rehire_Title_001=Security Contractor Reevaluation <EM4>[500 Rep]</EM4>
EckhartSecurity_RecoverCargo_Easy_Description=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Recover Cargo\nApproval code: = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nClient's cargo was mid-transport when they ran into some ship trouble, and now a group of opportunistic outlaws are looking to cash in on this.\n\nIf you accept, head to <EM4>~mission(Location|Address)</EM4> and deal with the outlaws guarding the cargo. Extract it using a <EM4>heavy-duty tractor beam</EM4>, recover the cargo, load it in to a ship that can transport <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>, and deposit it on the freight elevator at <EM4>~mission(Destination|Address)</EM4>.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Unknown:</EM4> 1\n<EM4>Jr. Contractor:</EM4> +100 Rep
EckhartSecurity_RecoverCargo_Easy_Title=Client's Cargo Needs Recovering <EM4>[100 Rep]</EM4>
EckhartSecurity_RecoverCargo_Hard_Description=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Recover Cargo\nApproval code: = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nGot a transport in need of backup over at <EM4>~mission(Location|Address)</EM4>. Signal was patchy, but their comms made it sound like a group of outlaws had gotten wind of what they were hauling and attempted to take it from them.\n\nConsidering the state of things before we lost contact, I'm considering this a recovery mission. Multiple hostiles are expected at the site, so a skilled crew is crucial for the success of this operation. There will be a high volume of cargo to deal with, so a ship that can carry <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>heavy-duty tractor beam</EM4> will be needed. \n\nUpon successful extraction of cargo, deliver to the freight elevator at <EM4>~mission(Destination|Address)</EM4>.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Unknown:</EM4> 1\n<EM4>Sr. Contractor:</EM4> +200 Rep
EckhartSecurity_RecoverCargo_Hard_Title=High Risk Shipment Recovery <EM4>[200 Rep]</EM4>
EckhartSecurity_RecoverCargo_Medium_Description=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Recover Cargo\nApproval code: = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nLooking for a competent contractor who can salvage a messy situation. A client's trusted pilot apparently wasn't so trustworthy and made off with a shipment. But thankfully our trackers are reporting the shipment's static for the moment, waiting to be picked up. If we play our cards right, there's still time to resolve this.\n\nThe abandoned ship is located at <EM4>~mission(Location|Address)</EM4> and will need a <EM4>heavy-duty tractor beam</EM4> to transport the goods. A ship that can handle <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> is a necessity, and expect contact from whatever outlaws this double-crossing pilot was hoping to sell to. \n\nOnce recovered, deliver the cargo to the freight elevator at <EM4>~mission(Destination|Address)</EM4>.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Unknown:</EM4> 1\n<EM4>Contractor:</EM4> +150 Rep
EckhartSecurity_RecoverCargo_Medium_Title=Standard Cargo Recovery Op. <EM4>[150 Rep]</EM4>
EckhartSecurity_RecoverCargo_Super_Description=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Recover Cargo\nApproval code: = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nPutting out an immediate call for a highly skilled contractor to reclaim a client's cargo located at <EM4>~mission(Location|Address)</EM4>.\n\nClient hired an expert hauler to transport something discreetly, but it seems some information regarding the shipment was either hacked or leaked. The pilot was attacked and now the shipment is stranded. We need you and any support ships you bring to make it to the site before the cargo is lost for good. \n\nYou will need a <EM4>heavy-duty tractor beam</EM4> and a ship capable of storing <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>.\n\nAfter assessing the situation and the importance the client has placed on the recovery of the cargo, we have decided to reward a high payout for the successful delivery of the shipment to the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Unknown:</EM4> 1\n<EM4>Head Contractor:</EM4> +300 Rep
EckhartSecurity_RecoverCargo_Super_Title=Extreme Risk Cargo Retrieval <EM4>[300 Rep]</EM4>
EckhartSecurity_RecoverCargo_VeryEasy_Description=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Recover Cargo\nApproval code: = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nOne of my clients was in the process of transporting some cargo when they came under fire from a group of outlaws. We haven't been able to contact the crew onboard, but trackers indicate the cargo remains intact.\n\nWe need a contractor to head to <EM4>~mission(Location|Address)</EM4>, recover the cargo, and deliver it to the freight elevator located at <EM4>~mission(Destination|Address)</EM4>. A ship that can store <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>heavy-duty tractor beam</EM4> are essential for this. Presently, we're not detecting any hostiles, but that could change by the time you've arrived.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2\n<EM4>Unknown:</EM4> 1\n<EM4>Neutral:</EM4> +50 Rep
EckhartSecurity_RecoverCargo_VeryEasy_Title=Low Risk Cargo Retrieval <EM4>[50 Rep]</EM4>
EckhartSecurity_RecoverCargo_VeryHard_Description=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Recover Cargo\nApproval code: = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nCalling for a skilled contractor to recover a displaced shipment located at <EM4>~mission(Location|Address)</EM4>. Client's hauler was transporting some high value cargo when they decided to respond to a distress beacon and got ambushed by a group of outlaws. The client believes their pilot is gone but their cargo could still be recovered.\n\nThe information we have so far is that you'll need a ship that can carry <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>, a <EM4>heavy-duty tractor beam</EM4> for shifting the goods, as well as your support ships to help deal with the outlaws at the location. \n\nClient will be expecting the completed delivery to be made to the freight elevator at <EM4>~mission(Destination|Address)</EM4>.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Unknown:</EM4> 1\n<EM4>Veteran Contractor:</EM4> +200 Rep
EckhartSecurity_RecoverCargo_VeryHard_Title=Critical Cargo Extraction <EM4>[200 Rep]</EM4>
Eckhart_Assassin_Sync_E_Desc_001=A price has been set on the heads of ~mission(TargetName) and ~mission(TargetName2). \n\nWhile having to hit two targets isn't that weird, the client wants to send a very specific message, so they need to targets hit at the exact same moment. The extra credits should make up for the hassle.\n\nAnd unfortunately since the pair aren't traveling together, it goes without saying that to pull it off you're gonna need some help. Make sure you bring people you trust can handle more than one ships since the targets are known to travel with backup. \n\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x2
Eckhart_Assassin_Sync_E_Title_001=Double Tap <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_H_Desc_001=Contract's for two targets that need to be taken out at the same time. \n\nGuess the client is worried that if they aren't eliminated together, one of them will go dark and try to get some revenge.\n\nThey go by ~mission(TargetName) and ~mission(TargetName2).\n\nFind yourself a team, divide and conquer.\n\nAnd make sure whoever it is has got skills, because these two have a reputation for holding their own in a fight and they for sure won't be alone. Be ready for them to give you some trouble.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x2
Eckhart_Assassin_Sync_H_Title_001=Two In The Head <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_Intro_Desc_001=Interesting assignment came my way. I need two separate targets taken out: ~mission(TargetName) and ~mission(TargetName2) \n\nProblem is, either one gets word about the other being hit, they’ll go to ground. Can’t risk losing either of them. \n\nIt’ll take considerable coordination, but I want you to hit them both at the same exact time.  \n\nAnd since you can’t be in two places at once, you’ll need to find someone you can trust to help on this.\n\nThankfully, my intel says that both the targets should be traveling alone. That should help make things a bit easier on you.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x1, Targets x2
Eckhart_Assassin_Sync_Intro_Title_001=Coordinated Takedown <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_M_Desc_001=Got a contract to take out two up and comers who've been stirring up trouble. It has to be clean, both done at the same time, or else they might cause even more trouble.  Long story short, you'll need some help on this one.\n\nBoth ~mission(TargetName) and ~mission(TargetName2) know how to handle themselves, and the people they fly with aren't no joke either. You can expect each of them to be guarded by a few ships.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x2
Eckhart_Assassin_Sync_M_Title_001=Double Elimination <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_S_Desc_001=Normally, the pair of ~mission(TargetName) and ~mission(TargetName2) would be too much to take on together. They both are about as good as it gets when it comes to dogfighting and the crew they fly with are almost as good.\n\nBut recently they split - not sure why - and are flying separate for the moment.  Someone thinks this may be the best chance to take them out. \n\nGather some personnel you can trust and plan a simultaneous raid against both targets. It's too dangerous to risk one of them living after such a direct move against them.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x2
Eckhart_Assassin_Sync_S_Title_001=Divide and Conquer <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_VE_Desc_001=Have another pair that need to be eliminated:\n~mission(TargetName) and ~mission(TargetName2)\n\nThey've been in the wind for a few days now, but just popped up. If we don't get them now, I'm not sure we will get another chance.  You need to enlist a partner to make sure both targets are hit at the same time.\n\nAs far as them putting up resistance, ~mission(TargetName) is known to bring along a friend to watch their back, and I suspect ~mission(TargetName2) will do likewise.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x2, Targets x2
Eckhart_Assassin_Sync_VE_Title_001=One-Two Combo <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_VH_Desc_001=~mission(TargetName) and ~mission(TargetName2).\n\nTwo serious operators who've recently decided to make a move against their boss. Each of the pair are traveling with a small, highly trained armada and cutting deep into territory that doesn't belong to them.\n\nYou, and whoever you recruit to help, are going to take them out and it has to be both at the same time so they can't regroup.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x2
Eckhart_Assassin_Sync_VH_Title_001=Deadly Combination <EM4>[500 Rep]</EM4>
Eckhart_EscortShips_E_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Escort Ship\nApproval code: = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nA group of ships located at <EM4>~mission(Location|Address)</EM4> are requesting an escort. If you accept, head to the location immediately and await instructions. The client claims that this escort is purely a precautionary measure, but that doesn’t mean you should drop your guard. Expect some hostile forces and deal with them appropriately.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] M3A Cannon\n- [E-S2-A] M4A Cannon\n- [E-S3-A] M5A Cannon\n- [STH-S1-C] Shimmer\n- [STH-S2-C] Obscura\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4, Hostiles x2, Reinforcements x8\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Eckhart_EscortShips_E_title=Executive Protection Detail <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Eckhart_EscortShips_H_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Escort Ship\nApproval code: = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nIn need of a contractor who can report in now. A client has found themselves in hot water over at <EM4>~mission(Location|Address)</EM4> and a protection detail to get away from an asteroid base. They’ve reported multiple, well-armed hostile ships meaning you’ll need a crew of your own to deal with them. Based on the client’s account, these attackers seem highly motivated so they will likely not back down easily.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [B-S1-A] Havoc Scattergun\n- [B-S2-A] Hellion Scattergun\n- [B-S3-A] Predator Scattergun\n- [E-S3-A] Quarreler Cannon\n- [STH-S1-A] Mirage\n- [STH-S2-A] Umbra\n- [D-S1-A] Suckerpunch Cannon\n- [D-S2-A] Suckerpunch-L Cannon\n- [D-S3-A] Suckerpunch-XL Cannon\n- [STH-S1-B] Veil\n- [STH-S2-B] Sheut\n- [E-S1-A] M3A Cannon\n- [E-S2-A] M4A Cannon\n- [E-S3-A] M5A Cannon\n- [STH-S1-C] Shimmer\n- [STH-S2-C] Obscura\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x5, Hostiles x3, Interdiction Ships x2, Reinforcements x16\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Eckhart_EscortShips_H_title=VIP Client Needs Protection <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
Eckhart_EscortShips_M_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Escort Ship\nApproval code: = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nOne of my clients needs an immediate escort through dangerous space. Rendezvous at <EM4>~mission(Location|Address)</EM4> and they’ll meet you after they launch. Reports indicate increased outlaw activity in the area, so don’t let your guard down.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [D-S1-A] Suckerpunch Cannon\n- [D-S2-A] Suckerpunch-L Cannon\n- [D-S3-A] Suckerpunch-XL Cannon\n- [STH-S1-B] Veil\n- [STH-S2-B] Sheut\n- [E-S1-A] M3A Cannon\n- [E-S2-A] M4A Cannon\n- [E-S3-A] M5A Cannon\n- [STH-S1-C] Shimmer\n- [STH-S2-C] Obscura\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4, Hostiles x2, Interdiction Ships x1, Reinforcements x14\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
