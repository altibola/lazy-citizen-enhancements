Xenothreat_bounty_headhunter_desc_001=XenoThreat has placed a kill order on ~mission(TargetName). As a Clips level member of the Headhunters gang, ~mission(TargetName|Last) has led operations that have targeted XenoThreat operatives, missions, and infrastructure. For these transgressions, XenoThreat will pay anyone who successfully tracks down and assassinates ~mission(TargetName|Last).  \n\nLOCATION UPDATE: ~mission(TargetName|Last) was seen near ~mission(Location|Address) not too long ago.  If you decide to accept this contract, you should head to the coordinates immediately. ~mission(TargetName|Last) knows we’re looking for ‘em and has been traveling with an escort recently. Don’t be surprised if they’re not alone.\n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Xenothreat_bounty_headhunter_desc_002=XenoThreat has placed a kill order on ~mission(TargetName). A known member of the Headhunters gang, ~mission(TargetName|Last) has betrayed Humankind by being a known alien ally who associates with them in both a personal and business capacity. XenoThreat wants these traitorous associations stopped immediately before they bring more alien influence to Pyro. We’ll pay anyone who successfully tracks down and assassinates ~mission(TargetName|Last) for these crimes against Humanity.  \n\nLOCATION UPDATE: ~mission(TargetName|Last) was recently spotted with an escort at ~mission(Location|Address). \n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Xenothreat_bounty_headhunter_desc_003=XenoThreat has placed a kill order on the head of ~mission(TargetName). As a member of the Headhunters gang, ~mission(TargetName|Last) hacked into XenoThreat systems to steal information on our operations and personnel. The harm done can only be rectified by ensuring ~mission(TargetName|Last) can never do something like this again. That’s why XenoThreat will pay anyone who can track down and assassinate ~mission(TargetName|Last).     \n\nLOCATION UPDATE: Recent scans identified ~mission(TargetName|Last) traveling with other ships near ~mission(Location|Address). \n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Xenothreat_destroyitems_CFP_vehicle_desc_01=The armchair “activists” of Citizens for Prosperity continue to try to spread their influence throughout the system. With your assistance, there is an opportunity to sever their operations at the roots.\n\nThe group is using ~mission(location|address) to distribute supplies to independents scattered around the planet. If we destroy the ~mission(ship) located there, their network will fall.\n\nBombardment would send a clear message, but I’ll leave it to you to decide the means of destruction.\n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Xenothreat_theft_outpost_cfp_desc_001=Leave it to the lying UEE to say they’re not involved with the operations of Citizens for Prosperity simply because they “donate” supplies to a tertiary aid organization who then immediately delivers it right to them. \n\nWe just got word that one of these government aid shipments was dropped off at a Citizens for Prosperity aligned outpost. That’s why we’ll pay you to raid ~mission(Pickup1|Address) and claim the ~mission(item) for the cause. Once you deliver everything to ~mission(Dropoff1|Address) we can redistribute the shipment to help in our fight. Nothing better than using the enemies resources against them. \n\nBut don’t think they’ll just hand the stuff over to you. Even though Citizens for Prosperity are supposedly here to bring peace, you best be prepared to go toe to toe with ‘em. \n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Xenothreat_theft_outpost_headhunters_desc_001=As much as XenoThreat has strived to make Pyro a pure haven for Humans, not everyone is aligned with our goals. Chief among them is the Headhunters, who have debased themselves by hiring an alien hauler to deliver supplies to them. We missed the chance to hit that shipment, but still want to send the message that working with aliens in any capacity will not be tolerated in this system. \n\nThat shipment was delivered to ~mission(Pickup1|Address). We want someone to hit the outpost, claim the ~mission(item), and take it to ~mission(Dropoff1|Address) so we can properly dispose of it. \n\nYou up for keeping Pyro free from alien influence?\n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Xenothreat_theft_station_cfp_desc_001=Citizens for Prosperity have entrenched themselves at ~mission(Pickup1|Address). To keep them from getting too comfy at that station, we want to show them what life is really like in our system. We’ll pay you to hit the station, grab the ~mission(item), and kill anyone that gets in your way. \n\nPayment hinges on you delivering those supplies to ~mission(Dropoff1|Address). Anyone you kill will just be a perk.     \n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Xenothreat_theft_station_roughready_desc_001=Not sure if you’d had the pleasure of dealing with the Rough & Ready, but the gang is laser focused on cornering the fuel market in Pyro. Smart play, but one we can’t let happen without them providing us some concessions. Since they’re currently not interested in negotiating, we’re forced to show them what happens to those who oppose us.\n\nWe’ve identified ~mission(Pickup1|Address) as a prime target for such an attack. We also know they recently received some supplies that should be a fitting price for their obstinance. Once inside the station, do whatever you need to do to confiscate the ~mission(item). We’ll send payment once you’ve delivered them to ~mission(Dropoff1|Address).      \n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
