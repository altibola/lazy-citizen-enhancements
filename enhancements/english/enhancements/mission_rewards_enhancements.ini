mtps_UGF_eliminateall_allies_desc_001=ABOUT THE JOB\nmicroTech Protection Services is looking for a detail-oriented mercenary professional who can quickly and safely assist the security team stationed at ~mission(Location|Address) in protecting the site against hostile threats. \n\nBe aware that any friendly fire, accidental or otherwise, will not be tolerated. \n\nRESPONSIBILITIES\n• Provide own transportation to ~mission(Location|Address).\n• Help the local security team protect the site; using force as necessary.\n• Avoid any friendly fire incidents.\n\nMINIMUM QUALIFICATIONS\n• 2 years of combined mercenary and/or security experience.\n• Access to combat equipment and mode of transport.\n• Available for immediate deployment.\n\nPREFERRED QUALIFICATIONS\n• Experience with rapid hostility de-escalation techniques.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
mtps_UGF_eliminateall_allies_desc_intro=ABOUT THE JOB\nmicroTech Protection Services is in need of new,  qualified, and detail-oriented security professionals to expand our existing roster. To evaluate your skills, we would like you to assist in protecting ~mission(Location|Address) against hostile threats. \n\nRESPONSIBILITIES\n• Provide own transportation to ~mission(Location|Address).\n• Help protect the site; using force as necessary.\n• Avoid any friendly fire incidents.\n\nMINIMUM QUALIFICATIONS\n• 2 years of combined mercenary and/or security experience.\n• Access to combat equipment and mode of transport.\n• Available for immediate deployment.\n\nPREFERRED QUALIFICATIONS\n• Experience with rapid hostility de-escalation techniques.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
mtps_UGF_eliminateall_allies_desc_rehire=ABOUT THE JOB\nWhile your past performance has not been to our standards, microTech Protection Services has decided to offer you a chance to redeem yourself. \n\nIn an effort to reevaluate your skills, microTech Protection Services would like you to assist in protecting ~mission(Location|Address) against hostile threats. \n\nRESPONSIBILITIES\n• Provide own transportation to ~mission(Location|Address).\n• Help protect the site; using force as necessary.\n• Avoid any friendly fire incidents.\n\nMINIMUM QUALIFICATIONS\n• 2 years of combined mercenary and/or security experience.\n• Access to combat equipment and mode of transport.\n• Available for immediate deployment.\n\nPREFERRED QUALIFICATIONS\n• Experience with rapid hostility de-escalation techniques.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
