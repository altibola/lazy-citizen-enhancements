Adagio_Industrial_Component_Salvage_Levski_E_Desc_001=Adagio Holdings\nA Proud Equal Opportunity Employer\n\n> About the job <\nTo help satisfy a recent special order, we are seeking contractors to help source Recycled Material Composite (RMC) and components by stripping abandoned ships and removing the requested parts by hand with a <EM4>tractor beam</EM4>. \n\nWe recommend searching for wreckage at Lagrange points, maybe in one of Nyx's asteroid belts, or you could purchase a salvage claim from us in your Contract Manager. We advise extra caution since there have been Vanduul sightings in the system, especially with how long it might take for you to track down this specific order.  \n\nOnce acquired, deliver the materials to the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\nFor advice on salvaging, consult <EM4>A Salvager's Guide to Material Collection</EM4> in your mobiGlas journal.\n\n> Requirements <\n     - Any class/size of salvage ship\n     - A handheld tractor beam\n\n> Disclaimer <\nContractors are responsible for ensuring that they are collecting materials from vehicles that are considered fair salvage under the pursuant UEE laws. Adagio Holdings is in no way liable for any crimes or misdemeanors committed by contractors and will offer no compensation or reparation for any persons affected by these actions.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 2/7 | Risk 4/7 | Knowledge 2/7\n<EM4>Neutral:</EM4> +100 Rep
