cfp_defendship_multi_SRT_SB_desc_001=One of our convoys got caught in a bad situation and is in desperate need of help. The Shattered Blade launched a brutal attack on our ships in an area that we thought was safe. That convoy is mainly carrying supplies and new recruits. From the comms I’m receiving, they’re putting up a hell of a fight but might not last much longer. \n\nIf available, we need you at <EM4>~mission(Location|Address)</EM4> ready to go toe-to-toe with some serious forces.    \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_multi_SRT_SB_title_001=Stop Savage Shattered Blade Attack <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_defendship_multi_SRT_desc_001=I’m getting reports that a Citizens for Prosperity convoy carrying vital supplies is currently under attack at <EM4>~mission(Location|Address)</EM4>. It’d be a big blow to our operations if we lost that cargo. \n\nIf you’ve got the combat skills to go up against highly aggressive hostiles, we’re more than willing to pay for your help. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_multi_SRT_title_001=Come to Aid of Convoy <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_defendship_multi_VHRT_SB_desc_001=We’ve lost contact with a supply convoy and are concerned it might be under attack. Last comm we received from them reported Shattered Blade ships were incoming, but haven’t heard anything since. Are you free to hurry to <EM4>~mission(Location|Address)</EM4> and support our forces? \n\nWe’ve come to learn that the Shattered Blade are very protective of their hunting grounds. Our last few encounters with them were quite intense, so I’d recommend bringing some heavy firepower.   \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_multi_VHRT_SB_title_001=Convoy Under Attack <EM4>[BP]</EM4> <EM4>[250 Rep]</EM4>
cfp_defendship_multi_VHRT_desc_001=A Citizens for Prosperity convoy on a resupply run dropped a distress beacon near <EM4>~mission(Location|Address)</EM4>. They’re not answering any comms, so I assume the situation is serious. That convoy has some skilled pilots, so if they’re not responding then they definitely need the help.\n\nWe’ll compensate you to support that convoy.  \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_multi_VHRT_title_001=Respond to Distress Beacon <EM4>[BP]</EM4> <EM4>[250 Rep]</EM4>
cfp_delivery_desc_001=Hi, \n\nGot word folks are waiting for an important supply shipment that’s not arrived. Turns out it accidently got taken to the wrong place. While we look into how the mistake happened, we need someone to head over to <EM4>~mission(Pickup1|Address)</EM4> to pick up package <EM4>#~mission(item1|serialnumber)</EM4> and deliver it to the correct location at <EM4>~mission(Dropoff1|Address)</EM4>. \n\nAlso, to make your life easier, I'd make sure you have a <EM4>handheld tractor beam</EM4> with you. \n\nYou available for the run?\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_delivery_desc_002=Hey, \n\nNeed two packages delivered. Package <EM4>#~mission(item1|serialnumber)</EM4> needs to be grabbed from <EM4>~mission(Pickup1|Address)</EM4> and taken to <EM4>~mission(Dropoff1|Address)</EM4>, and package <EM4>#~mission(item2|serialnumber)</EM4> is going from <EM4>~mission(Pickup2|Address)</EM4> to <EM4>~mission(Dropoff2|Address)</EM4>. Should be an easy way to make a few creds. \n\nAlso, to make your life easier, I'd make sure you have a <EM4>handheld tractor beam</EM4> with you. \n\nFly safe, \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_delivery_desc_003=Hey, \n\nEvery once and awhile, Citizens for Prosperity likes to surprise members stationed at our outposts with a little gift to keep morale high. We’ve got the next batch ready to go, but need someone to make the deliveries for us. Any interest in spreading some good cheer?\n\nHere’s the delivery list. Feel free to knock them out in any order. \n\n- Package <EM4>#~mission(item1|serialnumber)</EM4> goes from <EM4>~mission(Pickup1|Address)</EM4> to <EM4>~mission(Dropoff1|Address)</EM4>.\n- Package <EM4>#~mission(item2|serialnumber)</EM4> goes from <EM4>~mission(Pickup2|Address)</EM4> to <EM4>~mission(Dropoff2|Address)</EM4>.\n- Package <EM4>#~mission(item3|serialnumber)</EM4> goes from <EM4>~mission(Pickup3|Address)</EM4> to <EM4>~mission(Dropoff3|Address)</EM4>.  \n\nAlso, to make your life easier, I'd make sure you have a <EM4>handheld tractor beam</EM4> with you. \n\nThanks,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_delivery_desc_004=Hi,\n\nIf we want regular people to move to Pyro, we need to show them that basic services are reliable. Making things like delivery runs dependable so people don’t think twice about them is exactly what the Citizens of Prosperity are here to do. Care to help us with this? \n\nWe’ve got several deliveries ready to go. Do them in whatever order you want. All that matters is that they get there. \n\n- Package <EM4>#~mission(item1|serialnumber)</EM4> goes from <EM4>~mission(Pickup1|Address)</EM4> to <EM4>~mission(Dropoff1|Address)</EM4>.\n- Package <EM4>#~mission(item2|serialnumber)</EM4> goes from <EM4>~mission(Pickup2|Address)</EM4> to <EM4>~mission(Dropoff2|Address)</EM4>.\n- Package <EM4>#~mission(item3|serialnumber)</EM4> goes from <EM4>~mission(Pickup3|Address)</EM4> to <EM4>~mission(Dropoff3|Address)</EM4>.\n- Package <EM4>#~mission(item4|serialnumber)</EM4> goes from <EM4>~mission(Pickup4|Address)</EM4> to <EM4>~mission(Dropoff4|Address)</EM4>.\n\nAlso, to make your life easier, I'd make sure you have a <EM4>handheld tractor beam</EM4> with you. \n\nFly Safe,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_delivery_desc_005=Hey,\n\nGuess there was a technical glitch with our system that marked certain packages as delivered when they never were. Still untangling the mess, but have a few sorted out and good to go. \n\n- Package <EM4>#~mission(item1|serialnumber)</EM4> goes from <EM4>~mission(Pickup1|Address)</EM4> to <EM4>~mission(Dropoff1|Address)</EM4>.\n- Package <EM4>#~mission(item2|serialnumber)</EM4> goes from <EM4>~mission(Pickup2|Address)</EM4> to <EM4>~mission(Dropoff2|Address)</EM4>.\n- Package <EM4>#~mission(item3|serialnumber)</EM4> goes from <EM4>~mission(Pickup3|Address)</EM4> to <EM4>~mission(Dropoff3|Address)</EM4>.\n- Package <EM4>#~mission(item4|serialnumber)</EM4> goes from <EM4>~mission(Pickup4|Address)</EM4> to <EM4>~mission(Dropoff4|Address)</EM4>.\n- Package <EM4>#~mission(item5|serialnumber)</EM4> goes from <EM4>~mission(Pickup5|Address)</EM4> to <EM4>~mission(Dropoff5|Address)</EM4>.\n \nWould be good to get these rectified immediately if you’re available. \n\nAlso, to make your life easier, I'd make sure you have a <EM4>handheld tractor beam</EM4> with you. \n\nBest,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_delivery_nodanger_cave_desc_001=pu delivery local legal cave pyro cfp 2\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
cfp_delivery_nodanger_cave_title_001=cfp delivery nodanger cave title 001 <EM4>[500 Rep]</EM4>
cfp_delivery_title_001=Delivery for ~mission(Destination) Ready <EM4>[50 Rep]</EM4>
cfp_delivery_title_002=Multiple Deliveries Ready <EM4>[50 Rep]</EM4>
cfp_destroy_idris_desc_001=Hey, \n\nThe rumors are true. XenoThreat has deployed an Idris to stalk and attack Citizens for Prosperity operations in a dramatic escalation of their hostility towards us. We just received word the ship, under the command of ~mission(TargetName), is advancing toward ~mission(location|address). We can’t get our own forces there fast enough to fight them, and are in desperate need of help. \n\nWe’re looking to hire someone brave enough to take it to these bastards. It’s not enough to scare them away, we need to guarantee that it can’t come after us again. \n\nNot sure if you’ve faced down an Idris before, but it’s a tall task for someone to take on alone. I’d highly recommend recruiting others to the cause.   \n\nBest,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x15, Targets x1
cfp_eliminateall_XT_E_desc_001=Despite our efforts to promote non-violence, local outlaw groups continue to attack our organization. XenoThreat recently assaulted ~mission(Location|Address) and chased out our volunteers that had been working there.\n\nWe're looking to enlist combat personnel to retake the outpost. Ideally we could work something out to encourage them to move on, but XenoThreat quickly resorts to violence to solve all their issues so there will undoubtedly be a fight.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms Canuto\n- [S1-A] Artimex Core Canuto\n- [S1-A] Artimex Helmet Canuto\n- [S1-A] Artimex Legs Canuto\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x4, Technicians x2\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_eliminateall_XT_E_title_001=Reclaim XenoThreat Outpost <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
cfp_eliminateall_fromCFP_Gen_E_desc_001=Citizens for Prosperity is looking for any available combat operators to ~mission(Location|Address). A group of outlaws have launched an unprovoked attack and our security personnel are desperately in need of support.\n\nPlease dispatch to ~mission(Location) with all urgency and good luck.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms Canuto\n- [S1-A] Artimex Core Canuto\n- [S1-A] Artimex Helmet Canuto\n- [S1-A] Artimex Legs Canuto\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_eliminateall_fromCFP_Gen_E_title_001=Attack on CFP outpost <EM4>[BP]</EM4> <EM4>[25 Rep]</EM4>
cfp_eliminateall_fromCFP_XT_M_desc_001=XenoThreat forces launched an unprovoked attack near ~mission(Location|Address). We're looking for any available combat operators to go and provide support. \n\nIf you haven't dealt with them before, it's important to know that XenoThreat are trained fighters so this will not be an easy fight, but it's a necessary one.\n\nGood luck,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms Canuto\n- [S1-A] Artimex Core Canuto\n- [S1-A] Artimex Helmet Canuto\n- [S1-A] Artimex Legs Canuto\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Sr. Contractor:</EM4> +400 Rep\n<EM4>Blueprint Reward:</EM4> 100% chance (XTEliminateAll only)\n\n<EM4>? = only the XTEliminateAll variant awards blueprints</EM4>
cfp_eliminateall_fromCFP_XT_M_title_001=Protecting outpost from XenoThreat <EM4>[BP?]</EM4> <EM4>[200–400 Rep]</EM4>
cfp_eliminateall_fromCFP_hh_M_desc_001=We received an emergency comm from ~mission(Location|Address) reporting that they are currently under attack by a group of Headhunters. We know our presence in the system has upset the Headhunters, but it hardly excuses this unprovoked attack.\n\nIf available, please gather your gear and head out. Just understand that Headhunters are experienced fighters and will not back down easily.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionC]</EM4>\n- Karna Rifle\n- [S1-A] Artimex Arms Canuto\n- [S1-A] Artimex Core Canuto\n- [S1-A] Artimex Helmet Canuto\n- [S1-A] Artimex Legs Canuto\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM4>[Pyro RegionD]</EM4>\n- Karna "Rager" Rifle\n- [S1-A] Artimex Arms Wildwood\n- [S1-A] Artimex Core Wildwood\n- [S1-A] Artimex Helmet Wildwood\n- [S1-A] Artimex Legs Wildwood\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_eliminateall_fromCFP_hh_M_title_001=Defenders needed against Headhunters <EM4>[BP]</EM4> <EM4>[100–200 Rep]</EM4>
cfp_eliminateall_hh_E_desc_001=Citizens for Prosperity is looking for security personnel to take a former CFP outpost that's currently serving as a hideout for Headhunters to launch attacks throughout the system. \n\nLocated near ~mission(Location|Address), reclaiming this outpost will allow CFP to provide greater support to local efforts to build stability.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x4, Technicians x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_eliminateall_hh_E_title_001=Reclaim Headhunter Outpost <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
cfp_hauling_intro_desc_001=Welcome to the system, not sure if you're familiar with our organization but Citizens for Prosperity are a non-profit organization dedicated to bringing security and civilization to unclaimed systems.\n\nIf you're looking for work in the system and would like to help achieve our goal, we need a package picked up from <EM4>~mission(Location|Address)</EM4> and taken to <EM4>~mission(Destination|Address)</EM4>.\n\nOnce complete, we can offer you a variety of new job opportunities in this system and beyond.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Neutral:</EM4> +25 Rep
cfp_hauling_intro_title_001=First Haul in System <EM4>[25 Rep]</EM4>
cfp_maintenance_E_desc_001=Hi,\n\nOne of our outposts at <EM4>~mission(Location|Address)</EM4> is in need of some light repairs. The folks onsite have estimated that you’ll need <EM4>three fuses</EM4>, a <EM4>salvaging tool</EM4>, and <EM4>enough RMC canisters to fix up to three or so pipes.</EM4>\n\nIf you need more information on maintenance work, see <EM4>“Cornerstone Developments' Guide to Maintenance”</EM4> entry in your mobiGlas Journal.\n\nThanks again for your help,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 4/7\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Jr. Contractor:</EM4> +50 Rep
cfp_maintenance_E_title_001=Minor Repairs Needed: ~mission(Location) <EM4>[25–50 Rep]</EM4>
cfp_maintenance_H_desc_001=We need some help. The CFP facility at <EM4>~mission(Location|Address)</EM4> suffered severe damage during a recent electrical storm and we're looking for anyone who can help with repairs.\n\nSurveying the site, you'll have to bring <EM4>six fuses</EM4>, a <EM4>salvaging tool</EM4>, and <EM4>enough RMC canisters to take care of eight or so pipes</EM4>. That should be enough to repair the damage and get the outpost back in operation.\n\nIf you need more information on maintenance work, see <EM4>“Cornerstone Developments' Guide to Maintenance”</EM4> entry in your mobiGlas Journal.\n\nDo you think you can help?\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Head Contractor:</EM4> +100 Rep\n<EM4>Head Contractor:</EM4> +400 Rep
cfp_maintenance_H_title_001=Extensive Repairs Needed: ~mission(Location) <EM4>[100–400 Rep]</EM4>
cfp_maintenance_M_desc_001=Hello,\n\nWe've received word that a devastating storm hit <EM4>~mission(Location|Address)</EM4> which caused some damage to the structures. Our technician on site is still trying to figure out what they can fix but they can’t get everything. If you bring <EM4>six fuses</EM4>, a <EM4>salvaging tool</EM4>, and <EM4>enough RMC canisters to repair around five pipes</EM4>, we should be able to handle any remaining repairs.\n\nIf you need more information on maintenance work, see <EM4>“Cornerstone Developments' Guide to Maintenance”</EM4> entry in your mobiGlas Journal.\n\nThanks,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Sr. Contractor:</EM4> +100 Rep
cfp_maintenance_M_title_001=Moderate Repairs Needed: ~mission(Location) <EM4>[100 Rep]</EM4>
cfp_maintenance_local_E_desc_001=A nearby outpost of ours at <EM4>~mission(Location|Address)</EM4> is suffering from some mechanical failures and could use repairing. Our usual technician is off on another job so we're looking to hire an outside contractor.\n\nWe will need <EM4>three fuses replaced</EM4> and if you could bring a <EM4>salvaging tool</EM4> with <EM4>enough canisters of RMC to fix around three pipes</EM4> that should take care of the rest.\n\nIf you need more information on maintenance work, see <EM4>“Cornerstone Developments' Guide to Maintenance”</EM4> entry in your mobiGlas Journal.\n\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7
cfp_maintenance_local_E_title_001=Minor Repairs Needed: ~mission(Location)
cfp_maintenance_local_M_desc_001=If you happen to be in the area, please read this.\n\nCitizens for Prosperity is looking for a qualified mechanic to head to <EM4>~mission(Location|Address)</EM4> with the required supplies and perform some repairs.\n\nAs it stands, you’ll need <EM4>six fuses</EM4>, a <EM4>salvaging tool</EM4>, and <EM4>enough RMC canisters to repair five pipes or so.</EM4> That should help us get the outpost functional again. We'll compensate you for your time and materials.\n\nIf you need more information on maintenance work, see <EM4>“Cornerstone Developments' Guide to Maintenance”</EM4> entry in your mobiGlas Journal.\n\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7
cfp_maintenance_local_M_title_001=Moderate Repairs Needed: ~mission(Location)
cfp_recovery_desc_001=Hey,\n\nWe could use your help.\n\nA local we work with was completing a delivery for us, but unfortunately, she ran into some outlaws and had to surrender her ~mission(Item). Silver lining is the outlaws didn’t notice the trackers we placed in the cargo and now we know they’ve taken their haul to ~mission(Location|Address). \n\nWe’d like you to recover the packages for us and finish delivering them to ~mission(Destination|Address). I don’t imagine the outlaws will give them up willingly, but I wouldn’t ask you to put yourself in harm’s way if these supplies weren’t of critical importance.\n\nAlso, to make your life easier, I'd suggest you have a <EM4>handheld tractor beam</EM4> with you. \n\nSo, what do you say?\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_recovery_tile_001=Stolen Supplies <EM4>[50 Rep]</EM4>
cfp_sabotage_VH_desc_001=Citizens for Prosperity have been monitoring a very dangerous outlaw group at ~mission(Location|Address) and we believe that they are in midst of planning a major attack which could throw the whole system into upheaval.\n\nIn order to protect all the progress we've made here, we would like you to raid their compound and destroy all the servers housing their plans. \n\nThis should at least provide us with enough of a reprieve for them to reconsider their offensive.\n\nThank you,\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_VH_title_001=Destroy Outlaw Data Servers <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
cfp_sabotage_generators_M_desc_001=We have gotten word that the outlaws at ~mission(Location|Address) have begun recruiting with the hopes of launching a raid against Citizens for Prosperity. \n\nIn order to deescalate the situation before it gets out of hand, we would like you to disable their power generators and halt their expansion. \n\nPull this off and it could save a lot of lives.\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_generators_M_title_001=Take Outlaws at ~mission(Location) Offline <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
cfp_sabotage_generators_VE_desc_001=Following a series of raids against Citizens for Prosperity aligned settlements, we believe we have traced those responsible back to ~mission(Location|Address).\n\nAttacking them directly will pose too great of a risk and most likely encourage aggressive reprisals. Instead, we believe that if their power generators were to be disable it could force them to settle somewhere else.\n\nDo you think you could handle it for us?\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- A03 Sniper Rifle\n- P6-LR Sniper Rifle\n- [S1-A] A03 Sniper Rifle Magazine (15 cap)\n- [S1-A] Argus Helmet\n- [S1-A] CBH-3 Helmet Base\n- [S1-A] P6-LR Magazine (8 cap)\n- [S1-A] PAB-1 Arms\n- [S1-A] PAB-1 Core\n- [S1-A] PAB-1 Legs\n- [S1-A] TrueDef-Pro Arms\n- [S1-A] TrueDef-Pro Core Base\n- [S1-A] TrueDef-Pro Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Jr. Contractor:</EM4> +25 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_generators_VE_title_001=Disable Outlaw Stronghold at ~mission(Location) <EM4>[BP]</EM4> <EM4>[25 Rep]</EM4>
cfp_sabotage_server_elimiatespecific_HH_desc_001=We're just putting the full picture together now, but so far we've learned that a Headhunter by the name of ~mission(TargetName) recently stole some sensitive data that if exposed will be detrimental to Citizens for Prosperity's cause. \n\nWe need to ensure that all traces of the stolen data are eradicated. This means taking out all the Headhunter servers at ~mission(Location|Address) as well as tracking down ~mission(TargetName|Last) to stop them from further disseminating the information.\n\nYour help is much appreciated,\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- A03 Sniper Rifle\n- P6-LR Sniper Rifle\n- [S1-A] A03 Sniper Rifle Magazine (15 cap)\n- [S1-A] Argus Helmet\n- [S1-A] CBH-3 Helmet Base\n- [S1-A] P6-LR Magazine (8 cap)\n- [S1-A] PAB-1 Arms\n- [S1-A] PAB-1 Core\n- [S1-A] PAB-1 Legs\n- [S1-A] TrueDef-Pro Arms\n- [S1-A] TrueDef-Pro Core Base\n- [S1-A] TrueDef-Pro Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Head Contractor:</EM4> +1,500 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_server_elimiatespecific_HH_title_001=Eradicate All Traces of Headhunter Data <EM4>[BP]</EM4> <EM4>[1,500 Rep]</EM4>
cfp_sabotage_servers_H_XT_desc_001=We got a bit of a problem that I'm hoping you can solve for me. One of our informers has revealed that XenoThreat has been amassing data on Citizens for Prosperity operations throughout the system. \n\nThis information, if used correctly, could put our people at serious risk. The best solution is for you to completely destroy the servers where the data is being stored at ~mission(Location|Address).\n\nWith their trove of information wiped out, it should give our people a fighting chance.\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionB]</EM4>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM4>[Pyro RegionD]</EM4>\n- A03 Sniper Rifle\n- P6-LR Sniper Rifle\n- [S1-A] A03 Sniper Rifle Magazine (15 cap)\n- [S1-A] Argus Helmet\n- [S1-A] CBH-3 Helmet Base\n- [S1-A] P6-LR Magazine (8 cap)\n- [S1-A] PAB-1 Arms\n- [S1-A] PAB-1 Core\n- [S1-A] PAB-1 Legs\n- [S1-A] TrueDef-Pro Arms\n- [S1-A] TrueDef-Pro Core Base\n- [S1-A] TrueDef-Pro Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Veteran Contractor:</EM4> +75 Rep\n<EM4>Contractor:</EM4> +75 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_servers_H_XT_title_001=Destroy XenoThreat Logistic Data <EM4>[BP]</EM4> <EM4>[75 Rep]</EM4>
cfp_sabotage_servers_M_HH_desc_001=The Headhunters recently attacked one of our transports and were sadly able to get their hands on some secure data. Although the encryption on it is strong, its only a matter of time before they'll be able to access it.\n\nBefore that happens, we need you to go to ~mission(Location|Address) and destroy all traces of the information from their servers.\n\nYou'd really be helping Citizens for Prosperity out if you can pull this off.\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- A03 Sniper Rifle\n- P6-LR Sniper Rifle\n- [S1-A] A03 Sniper Rifle Magazine (15 cap)\n- [S1-A] Argus Helmet\n- [S1-A] CBH-3 Helmet Base\n- [S1-A] P6-LR Magazine (8 cap)\n- [S1-A] PAB-1 Arms\n- [S1-A] PAB-1 Core\n- [S1-A] PAB-1 Legs\n- [S1-A] TrueDef-Pro Arms\n- [S1-A] TrueDef-Pro Core Base\n- [S1-A] TrueDef-Pro Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Neutral:</EM4> +75 Rep\n<EM4>Jr. Contractor:</EM4> +75 Rep\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_servers_M_HH_title_001=Destroy Headhunter Stolen Data <EM4>[BP]</EM4> <EM4>[75–150 Rep]</EM4>
cfp_sabotage_servers_VH_XT_desc_001=One of the Citizens for Prosperity members who have been serving as a XenoThreat informer has let us know that the data servers located at ~mission(Location|Address) our housing a trove of information vital to the gang's operation. \n\nIf you were able to destroy these servers on our behalf it would be a huge win for the security of the entire system.\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_servers_VH_XT_title_001=Destroy XenoThreat Data Servers <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_searchbody_danger_cave_desc_001=We’ve been trying to get in contact with community member ~mission(TargetName), but haven’t heard from them in a few days. From what Citizens for Prosperity has been able to find out, they were scouting out near ~mission(Location|Address) which is a known outlaw hotspot.\n\nWe need someone to go there for us and try to locate them, or worst case scenario, their remains. \n\nIf you are able to find them, there’s a reward on offer.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_searchbody_danger_cave_title_001=Missing: ~mission(TargetName) <EM4>[50 Rep]</EM4>
cfp_searchbody_danger_outpost_desc_001=Unfortunately, one of our community partners, ~mission(TargetName), has been missing for a few days. Their family contacted Citizens for Prosperity for help and I told them we would do what we could. That said, with so much time passed, I’m not too hopeful.\n\nWhatever their current state is, we're looking for someone to be our eyes on the ground for this one. There’s a strong chance that they were headed to ~mission(Location|Address), an area known to be very dangerous.\n\nIf you can track them down and confirm their status, one way or another, I’ll see that you’re properly compensated.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_searchbody_danger_outpost_title_001=Missing: ~mission(TargetName) <EM4>[50 Rep]</EM4>
cfp_searchbody_danger_station_desc_001=Hey,\n\nI’m getting pretty worried about one of our local contractors, ~mission(TargetName). They finished up a trade at ~mission(Location|Address) and haven’t been seen since. We’re hearing reports that outlaws have been sneaking aboard there, and if that’s true, I suspect that the worst might have happened.\n\nEither way, ~mission(TargetName|First) has done good work for us in the past and I’d hate for them to wind up as just another one of Pyro’s missing. If you’re willing to find them for me, I’ll see that you get a reward. \n\nJust be careful. Hate for you to go missing too.\n\nThanks,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
cfp_searchbody_nodanger_cave_desc_001=~mission(TargetName) is a local who only has done a few jobs for Citizen for Prosperity, but they had promise. That is, until they went missing while exploring ~mission(Location|Address) last week. Unfortunately, we didn’t hear about it until today. Chances of survival at this point are pretty slim, but we still think its worth confirming what happened to them.\n \nCFP could use help on this if anyone is interested. And besides being a good deed, the payment should make it worth the effort. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_searchbody_nodanger_cave_title_001=Missing: ~mission(TargetName) <EM4>[50 Rep]</EM4>
cfp_searchbody_nodanger_outpost_desc_001=One of our people, ~mission(TargetName), was supposed to be doing some preliminary scouting work over at ~mission(Location|Address), but they never reported in. We’re hoping that they just ran into some bad luck, but too often out here even the smallest misstep can prove fatal.\n\nI’d appreciate someone heading that way and seeing if they can be located. It’d be great if you find them alive, but if not, some closure is the least we can do for their family.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_searchbody_nodanger_outpost_title_001=Missing: ~mission(TargetName) <EM4>[50 Rep]</EM4>
cfp_searchbody_nodanger_station_desc_001=Two locals we work with were out salvaging at ~mission(Location|Address) when they had some issues with faulty equipment. One managed to escape, but their partner, ~mission(TargetName) was unfortunately left behind.\n\nWith the state they were last reported to be in, I’m guessing they didn’t make it, but I’d like to know for sure. If you’re willing, I could use your help in finding their remains.\n\nIf you can track them down, I’ll see that you’re properly compensated for the effort.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
claimsweep_desc=~mission(Contractor|ClaimSweepDescription)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Turrets:</EM4> 3 (hostile)
claimsweep_title=~mission(Contractor|ClaimSweepTitle) <EM4>[50 Rep]</EM4>
combatassist_desc=ATTENTION: An ECN relay in your sector has received an emergency signal broadcast from a ship in distress. Any available ships in the area capable of rendering assistance are requested to do so immediately.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
commarray_hack_desc=~mission(Contractor|CommArrayHackDescription)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
commarray_repair_desc=~mission(Contractor|CommArrayRepairDescription)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
commarray_repair_title=~mission(Contractor|CommArrayRepairTitle) <EM4>[1,000 Rep]</EM4>
covalex_UGF_collect_desc_001=Hello there,\n\nI have a delivery I need taken care of. The order is waiting at <EM4>~mission(Location|Address)</EM4> to be taken to <EM4>~mission(Destination|Address)</EM4>. \n\nI’m sure you’ll be fine, but for full disclosure, I’m seeing a bunch of security warnings pop up for this area. Seems there have been a handful of attacks in that area in the last few days. Now, I’m not saying you’ll run into anything, but it would probably be best if you brought along a bit of protection.\n\nGood luck,\n\nChase Hewitt\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Unknown:</EM4> 4
covalex_UGF_collect_title_001=Delivery Pilot for Covalex <EM4>[500 Rep]</EM4>
covalex_delivery_desc_0006=Hey there,\n\n~mission(Contractor|Reaction)\n\nFound the perfect shipment contract for you to tackle. There's a shipment waiting at <EM4>~mission(Location|Address)</EM4> to be taken to <EM4>~mission(Destination|Address)</EM4>. Sounds good, right? ~mission(Contractor|Timed)~mission(Contractor|Danger)\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. By accepting this contract, you are agreeing to all terms and conditions as outlined in our extended 'Independent Workers Supplemental Information Guide v.2948.01.29.' Covalex Shipping is not responsible for any damages that occur while operating as an independent contractor.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexrand_desc=~mission(Description)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0001=Hi,\n\nI'll totally understand if you don't want to help with this, but if you can it would be amazing.\n\nSee, my boyfriend passed away during the Covalex Gundo tragedy. They said I would get all of Scott's stuff back once the investigation was complete, but as far as I know, it's been done for a while now and they still haven't given any indication of when I can get his property. It's been hard enough dealing with all this, and knowing that a package is going to show up in a month or two and rip open all these wounds, it's just too much. I would prefer to deal with it now and get it over with. If you could find a way to get his personal effects (Employee ID# 104) and drop them off at ~mission(Destination), I'd be very grateful.\n\nThanks for your help,\nAnya\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0002=My brother was one of those people who died when that Covalex station near Crusader blew. Even worse, he was borrowing something of mine when it happened. Now some red tape asshole is trying to tell me that I have to wait to get my stuff back. Yeah right. First you kill my brother and now you want me to be patient? The nerve of these corporate jillos. Forget that. Instead, I figured I'd hire someone to go to Gundo to get my stuff and take it to ~mission(Destination) for me. I mean, what the hell are they gonna do about it? Anyway, it's what my brother would have wanted. It's gonna be the box marked 156.\n\n- Ed\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0003=Hey,\n\nSo this is a little awkward for me to talk about, but it turns out that one of the people who passed away on that Covalex station disaster, Kyomi Santos, actually bequeathed me something in her will. I was surprised to hear it, but apparantly I'm now the proud owner of everything stored in box #173. The people at Covalex say I'll be able to get it when the station opens back up but ... this is the awkward part ... I kind of really need it right now. Normally I'd just wait, but I'm trying to start my own business (I make cakes in the shape of people's homeworlds) and the credits I get from selling it will really be a huge help. I've got a little bit stashed away now that I can use to pay for someone to deliver it from Gundo to ~mission(Destination) for me. I know the whole things a little bit irregular, but if there was any other way I wouldn't be asking.\n\nThanks for the help,\nThrace\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0004=My son Nico was sadly among the victims of the tragic accident at Covelex's Gundo station and they still haven't returned all of his personal possessions to me. I understand that they have to do things according to regulations, but it seems unconscionable that they wouldn't make some allowances for the grieving family members. To that end, I'm seeking someone who will be able to go to the station for me. To be clear, Gundo is currently considered off limits, meaning that this would not be above board, but I feel my situation warrants special consideration. My sister says that the rate I am offering is the correct amount for retrieving the crate with Nico's belongings (#964) and bringing them to ~mission(Destination), so hopefully I can find a competent individual to settle this matter quickly.\n\nSincerely,\nGloria Theolone\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0005=They said that I could find someone here to go to Gundo for me and grab a crate that belonged to my wife. If the name didn't ring a bell, that's the station where they had that big accident. My wife worked for Covalex and I know it's not really going to make losing her any easier, but I really just want Claudia's stuff back. I think about her photo collection or the necklace I gave her just sitting there in that cold dead station in some box marked 249 and it's not right. She deserves better. So how about it? You willing to go to Gundo and haul her crate back to ~mission(Destination)?\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0006=Hi,\n\nI'm looking for someone to head to the Covalex Gundo station near Crusader and grab some items. I know this may sound like stealing, but it's my dad's stuff. You see, he was on Gundo station when it had its accident. My mom says that we need to wait until Covalex says so, but I don't think that's fair because I miss him so much. I would like something to remember him by and I don't want to wait any longer because I might start forgetting things. I'll pay you to get box 510 for me and take to ~mission(Destination) so I can have it.\n\nThank you very much,\nBaylor Ward\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
crus_markerhunt_from=Crusader Historical Society\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
crusader_RetrieveConsignment_desc_001=Reports indicate that our security staff at ~mission(location|address) have been wiped out by a group of Nine Tails, who are attempting to steal confidential materials that were recently delivered to the facility. Crusader Security needs an experienced contractor to expel the hostiles and secure these boxes. \n\nBased on the initial reports, we strongly recommend that you come well-equipped and consider bringing back-up. For security purposes, the confidential materials were transported there as part of a consignment with other boxes and locked in an automated vault. The retrieval codes to access the confidential materials are stored on datapads held by high-ranking security staff, but we don’t know who has them now. Odds are that the Nine Tails will be looking for them too.  \n\nWhen you have all the confidential materials, deliver them to ~mission(dropoff1|address) to receive payment. \n\nCONTRACT AUTHORIZED BY: \nLiaison Officer Bautista \nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Guards x4, Hostiles x54
crusader_RetrieveConsignment_title_001=Support Security Forces and Secure Confidential Materials <EM4>[500–4,000 Rep]</EM4>
crusader_UGF_defend_E_desc_001=Crusader Security has learned that ~mission(Location|Address) is currently being threatened by a local gang and we’re looking to hire a contractor to put together a security team to deal with any attacks. \n\nThis gang has a bit of a record, but they’re still pretty green overall. I expect it will be relatively straightforward for you and your team to handle.\n\nCONTRACT AUTHORIZED BY:\nLiaison Officer Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x1, Hostiles x10, Private Security x4, Sentries x6\n<EM4>Unknown:</EM4> 11
crusader_UGF_defend_E_title_001=Guard Site Against Hostiles <EM4>[500 Rep]</EM4>
crusader_UGF_defend_VH_desc_001=Crusader Security has learned that ~mission(Location|Address) is currently being threatened by a well-known gang operating in the area and we’re looking to hire an experienced security team to deal with any attacks. \n\nTry to make sure that whoever you bring along is properly qualified. You’re going to need all the help you can get to deal with this group.\n\nCONTRACT AUTHORIZED BY:\nLiaison Officer Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x3, Hostiles x8, Private Security x4, Sentries x4\n<EM4>Unknown:</EM4> 21
crusader_UGF_defend_VH_title_001=Guard Site Against Dangerous Hostiles <EM4>[500 Rep]</EM4>
crusader_UGF_defend_desc_001=Crusader Security has learned that ~mission(Location|Address) is currently being threatened by a group of criminals and we’re looking to hire a contractor to put together a security team to repel any attacks. \n\nI know you may be tempted to try to handle this on your own, but you need to put a team together for this. Trust me, the credits aren’t worth it to try it solo.\n\nCONTRACT AUTHORIZED BY:\nLiaison Officer Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x8, Private Security x4, Sentries x8\n<EM4>Unknown:</EM4> 10
crusader_UGF_defend_title_001=Guard Site Against Serious Hostiles <EM4>[500 Rep]</EM4>
crusader_UGF_destroy_E_desc_001=We’ve discovered that a group is trying to start up their own drug business over at ~mission(Location|Address). While they seem to be your average low-level thugs, the product they’re producing is toxic and responsible for the deaths of multiple civilians, so we can’t afford to allow any more to be sold.\n\nWe’re are working on a larger operation that will shut them down for good, but in the meanwhile we need to stop the flow of their drugs. That’s why Crusader wants you to go the site and destroy the stash they have there.\n\nThey will undoubtedly have guards protecting the stash, but I don’t expect them to be too much of a threat.\n\nCONTRACT AUTHORIZED BY:\nLiaison Officer Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Civilians x4
crusader_UGF_destroy_E_title_001=Destroy Illegal Drugs <EM4>[500 Rep]</EM4>
crusader_UGF_destroy_H_desc_001=A fledgling syndicate have set up shop over at ~mission(Location|Address) and have been trying their hand at cracking into the drug market. Unfortunately, their product has been linked to several deaths in and around Crusader. With how potent this stuff is, it’s posing a serious threat to the public. \n\nCrusader is working to take down the whole operation, but as long as their product is circulating, the bodies are starting to pile up. \n\nWe want you to go the site and destroy the stash they have there before they get a chance to sell it. However, you should expect their stash to be extremely well guarded.\n\nCONTRACT AUTHORIZED BY:\nLiaison Officer Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
crusader_UGF_destroy_H_title_001=Destroy Deadly Contraband <EM4>[500 Rep]</EM4>
crusader_UGF_destroy_desc_001=We’ve been investigating a recent bout of OD’s and they all seem to have originated with a bad batch of drugs made over at ~mission(Location|Address). \n\nI’m working with other contractors to ferret out those responsible, but people are dying as long is the product is still out there. \n\nI want you to go the site and destroy the stash they have there. Should buy us some time before we shut them down for good.\n\nThey will have guards protecting their supply, so be prepared to engage with hostiles.\n\nCONTRACT AUTHORIZED BY:\nLiaison Officer Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
crusader_UGF_destroy_title_001=Destroy Toxic Narcotics <EM4>[500 Rep]</EM4>
crusader_UGF_eliminateall_allies_desc_001=Crusader Security has learned that ~mission(Location|Address) is currently being threatened by a group of criminals.\n\nWhile we have security personnel on site, we are looking to hire additional contractors to help them repel any attacks. \n\nNow, as a contractor, I’m not sure how used to working with a team you are, but I don’t want to hear anything about "friendly fire" or there’s going to be problems.\n\nCONTRACT AUTHORIZED BY:\nLiaison Officer Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
crusader_UGF_eliminateall_allies_desc_intro=In an effort to increase the safety of Crusader and its environs, Crusader Security is seeking qualified individuals to assist with security work in the sector. \n\nWe have determined that you possess the skill set needed to offer you an initial trial contract. You will be assisting Crusader Security in dealing with a small hostile group that has been making threats against ~mission(Location|Address). \n\nPlease note that we already have security personnel on site, so you will have to be careful with regards to friendly fire.\n\nUpon the successful completion of this contract, you'll become eligible to apply for any future security work as it becomes available.\n\nCONTRACT AUTHORIZED BY:\nLiaison Officer Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
crusader_UGF_eliminateall_allies_desc_rehire=Congrats! Crusader Security has decided to offer you another chance at being a security contractor. With a little bit of hard work and effort, the hope is that you can rise above any previous performance issues. \n\nFirst though, to reassess your viability, we would like you to assist Crusader Security in dealing with an outlaw group that have been making threats against ~mission(Location|Address).\n\nNow, since you’ve had performance issues in the past, I’m going to remind you that friendly fire will not be tolerated.\n\nUpon the successful completion of this trial, you're eligibility will be restored and you'll once again be able to apply for security work with Crusader.\n\nCONTRACT AUTHORIZED BY:\nLiaison Officer Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
crusader_UGF_eliminateall_allies_title_001=Provide Backup <EM4>[500 Rep]</EM4>
crusader_UGF_eliminateall_allies_title_intro=Security Work Assessment <EM4>[500 Rep]</EM4>
crusader_UGF_eliminateall_allies_title_rehire=Security Work Reassessment <EM4>[500 Rep]</EM4>
crusader_UGF_eliminateall_desc_001=Crusader Security has learned that ~mission(Location|Address) is currently being used as a base of operations for numerous illegal activities.\n\nIn order to put a stop to this "nest of criminals," we are seeking a contractor to go to the site and clear all the occupants. By force if necessary.\n\nCONTRACT AUTHORIZED BY:\nLiaison Officer Bautista\nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Nine Tails x4
crusader_UGF_eliminateall_nocivs_desc_001=Crusader Security has learned that ~mission(Location|Address) is currently being used as a base of operations for numerous illegal activities.\n\nIn order to put a stop to this "nest of criminals," we are seeking a contractor to go to the site and clear all the hostile elements. By force if necessary.\n\nAnd just so you know, sometimes gangs like this will bring in civilians to do work for them, often through coercion. This should go without saying, but if you see any civilians they are to be protected. Crusader Security cannot have one of their contractors going around indiscriminately shooting people.\n\nCONTRACT AUTHORIZED BY:\nLiaison Officer Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13\n<EM4>Friendlies:</EM4> Civilians x4
crusader_UGF_eliminateall_title_001=Clear Criminal Nest <EM4>[500 Rep]</EM4>
crusader_bounty_desc_first=In an effort to increase the safety of Crusader and its environs, Crusader Security is seeking qualified individuals to assist with the collection of bounties in the area. \n\nWe have evaluated that you possess the skill set needed and as such, we would like to offer you an initial trial bounty contract for ~mission(TargetName) last seen at ~mission(Location|Address). \n\nUpon the successful completion of this contract, you will be placed on Crusader's Verified Freelancer list and be eligible for any future bounty collection work as it becomes available.\n\n\nCONTRACT AUTHORIZED BY:\nLiaison Officer Bautista\nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
crusader_bounty_desc_rehire=Good news! Crusader Security has decided to offer you another chance at being a bounty contractor. We are hoping that during this time you have corrected any past performance issues and can once again be a useful asset.\n\nFirst though, we are required to reevaluate you, and as such, would like you to complete this bounty contract for ~mission(TargetName). \n\nUpon the successful completion of this trial, you'll be restored to Crusader's Verified Freelancer list and be eligible for any future bounty collection work as it becomes available.\n\n\nCONTRACT AUTHORIZED BY:\nLiaison Officer Bautista\nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
crusader_bounty_fps_UGF_desc_001=Thanks to a recent arrest, we have learned the location of an active bounty by the name of ~mission(TargetName). They are currently believed to be holed up at ~mission(Location|Address). You have been authorized to enter the site, find them, and resolve the bounty.\n\nWe have every reason to believe that there will be other criminal elements at the site, but for the moment, only ~mission(TargetName|Last) is your concern. \n\nCONTRACT AUTHORIZED BY:\nLiaison Officer Gibbs\nID# 91G66BW0\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
crusader_bounty_fps_UGF_nocivs_desc_001=We got lucky and some recent scans of ~mission(Location|Address) have shown that an open bounty by the name of ~mission(TargetName) is hiding out there. You have been authorized to enter the site, find them, and resolve the bounty.\n\nHowever, in addition to the bounty and their criminal accomplices, the site is likely to have civilians present as well. While we're eager to see ~mission(TargetName|Last) dealt with, we can't have any civilian casualties. Use care when engaging with the hostiles. \n\nCONTRACT AUTHORIZED BY:\nLiaison Officer Gibbs\nID# 91G66BW0\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
crusader_bounty_fps_title_001=Bounty Extraction: ~mission(TargetName) (MRT) <EM4>[500–1,000 Rep]</EM4>
