TheCollector_Ships_Guardian_Desc=This ship look like insect in the Protectorate. Fun look. Painful sting. Wikelo can make custom version for you if you want. Make enemies sting. Bye.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_Guardian_TItle=Guardian Fight Mod <EM4>[100 Rep]</EM4>
TheCollector_Ships_Idris_Desc=Since Wikelo has done good business with you, make you this very special trade. Idris is a powerful ship perfect for big important person like you. Wikelo has even done mod to make it more dangerous! Bring me a few items and the ship is yours.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Ships_Idris_Title=Special Idris For Killing
TheCollector_Ships_Intrepid_Desc=If you are looking for Intrepid ship that more intrepid. Wikelo can help. Bring things and you will get special touches on ship by Wikelo and pretty new coat to it. Bye.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_Intrepid_TItle=Upgrade Intrepid <EM4>[30 Rep]</EM4>
TheCollector_Ships_Kruger_Wolf_Desc=If you want to be quiet and surprise people, this is the Wolf you want. Wikelo mod it to be extra stealth. Trade you for it when you bring me the items I want.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_Kruger_Wolf_Title=Where Wolf? Here Wolf <EM4>[30 Rep]</EM4>
TheCollector_Ships_MISC_Prospector_Desc=Wikelo loves rocks. Wants to help you get more better rocks. Made this Prospector more better for that tough job. Trade items and you can have.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_MISC_Prospector_Title=Prospects Look Good <EM4>[30 Rep]</EM4>
TheCollector_Ships_Meteor_Desc=Meteor big. It heavy. Have many guns. But Wikelo figure out way to make even better. You have things I will take to do.\n\nThat is all.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_Meteor_Title=RSI Meteor Mod <EM4>[30 Rep]</EM4>
TheCollector_Ships_Nox_Desc=Wikelo know many Xi'an. Talk slow but very interesting if you have patience. This is very fast little thing to get you across planet. Wikelo made a few tweaks to make it zippier. If you want, Wikelo will make for you. Bye.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
