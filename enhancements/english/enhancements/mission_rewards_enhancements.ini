mtps_UGF_destroy_H_desc_001=ABOUT THE JOB\nmicroTech Protection Services is looking for a detail-oriented mercenary or security professional to report to ~mission(Location|Address) and destroy the narcotics being stored there. \n\nRESPONSIBILITIES\n• Provide own transportation to ~mission(Location|Address).\n• Clear the site of narcotics; using force as necessary.\n\nMINIMUM QUALIFICATIONS\n• 2 years of combined mercenary and/or security experience.\n• Access to combat equipment and mode of transport.\n• Available for immediate deployment.\n\nPREFERRED QUALIFICATIONS\n• No ongoing addiction issues.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
