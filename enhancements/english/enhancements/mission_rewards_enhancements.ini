hurston_bounty_desc_intro=HURSTON DYNAMICS\nOUTSOURCING DEPARTMENT\n\nCONTRACT: Bounty Collection\nCONTRACTOR AFFILIATION: Independent\nOUTSOURCE MANAGER: ~mission(Contractor|Auth)\nRISK ASSESSMENT: ~mission(Danger)\nRUSH CONTRACT: ~mission(Contractor|BountyTimed)\n\nAfter repeated and continual misdemeanor offenses, a bounty has been issued for the following individual - ~mission(TargetName).\n \nTo evaluate your potential in assisting in the capture of more elusive criminals, Hurston Dynamics will be evaluating your ability to locate and apprehend ~mission(TargetName|Last) by any means at your disposal. The latest intel on ~mission(TargetName|Last)'s current whereabouts has them last seen at ~mission(Location|Address).\n\nPayment will be released only after the bounty is dealt with. \n \n\n** The information transmitted may contain confidential and/or privileged material. Any review, retransmission, dissemination or other use of or taking action in reliance upon this information by persons or entities other than the intended recipient is prohibited. **\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
hurston_bounty_desc_rehire=HURSTON DYNAMICS\nOUTSOURCING DEPARTMENT\n\nCONTRACT: Bounty Collection\nCONTRACTOR AFFILIATION: Independent\nOUTSOURCE MANAGER: ~mission(Contractor|Auth)\nRISK ASSESSMENT: ~mission(Danger)\nRUSH CONTRACT: ~mission(Contractor|BountyTimed)\n\nOur department preforms periodic reevaluations of past bounty hunters and have determined that you may be a suitable candidate for possible reinstatement.\n\nAs a demonstration of your suitability, successfully apprehend the following wanted individual: \n~mission(TargetName).\n \nThe latest intel on ~mission(TargetName|Last)'s current whereabouts is that they were last spotted at ~mission(Location|Address).\n\nReinstatement as a Hurston Dynamics bounty hunter and payment will follow the successful completion of this contract.\n \n\n** The information transmitted may contain confidential and/or privileged material. Any review, retransmission, dissemination or other use of or taking action in reliance upon this information by persons or entities other than the intended recipient is prohibited. **\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
hurston_bounty_fps_UGF_desc_001=HURSTON DYNAMICS\nOUTSOURCING DEPARTMENT\n\nCONTRACT: Bounty Collection\nCONTRACTOR AFFILIATION: Independent\nOUTSOURCE MANAGER: I. Takao\nRISK ASSESSMENT: Moderate Risk Target (Likely Armed Support)\nRUSH CONTRACT: No\n\nHurston Dynamics is seeking a contractor to complete a bounty for ~mission(TargetName). \n\nIntel reports have tracked the  target to ~mission(Location|Address).  This site is known to be frequented by criminals who are most likely armed and hostile. Engage with them as you see fit, but your top priority is the neutralization of ~mission(TargetName|Last).\n\nPayment will be released only after the bounty has been deemed complete.\n \n\n** The information transmitted may contain confidential and/or privileged material. Any review, retransmission, dissemination or other use of or taking action in reliance upon this information by persons or entities other than the intended recipient is prohibited. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13, Targets x1
hurston_bounty_fps_UGF_nocivs_desc_001=HURSTON DYNAMICS\nOUTSOURCING DEPARTMENT\n\nCONTRACT: Bounty Collection\nCONTRACTOR AFFILIATION: Independent\nOUTSOURCE MANAGER: L. Paleski\nRISK ASSESSMENT: Moderate Risk Target (Likely Armed Support)\nRUSH CONTRACT: No\n\nHurston Dynamics is seeking a contractor to complete a bounty for ~mission(TargetName). \n\nIntel reports have located the current whereabouts of the target to ~mission(Location|Address).  While you are clear to engage with any criminals at the site as you see fit, any civilians at the location are to be protected.\n\nPayment will be released only after the bounty has been deemed complete.\n \n\n** The information transmitted may contain confidential and/or privileged material. Any review, retransmission, dissemination or other use of or taking action in reliance upon this information by persons or entities other than the intended recipient is prohibited. **\n\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
hurston_bounty_fps_desc_001=HURSTON DYNAMICS\nOUTSOURCING DEPARTMENT\n\nCONTRACT: Bounty Collection\nCONTRACTOR AFFILIATION: Independent\nOUTSOURCE MANAGER: ~mission(Contractor|Auth)\nRISK ASSESSMENT: Moderate Risk Target (Possible Armed Support)\nRUSH CONTRACT: ~mission(Contractor|BountyTimed)\n\nUnder the authority of Hurston Dynamics as granted by the UEE, a bounty has been issued for ~mission(TargetName) relating to crimes against the corporation. \n\nThe subject is believed to be recently located at ~mission(Location|Address), potentially with several allies. Force may be required to gain access to the site and neutralize ~mission(TargetName|Last). ~mission(Location|CaveSize)\n\nPayment will be released only after the bounty has been deemed complete.\n \n\n** The information transmitted may contain confidential and/or privileged material. Any review, retransmission, dissemination or other use of or taking action in reliance upon this information by persons or entities other than the intended recipient is prohibited. **\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
