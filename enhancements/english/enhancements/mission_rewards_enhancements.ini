cfp_defend_headhunters_H_desc_001=A distress call just came in from ~mission(Location|Address) claiming that a large Headhunter force has just attacked our outpost there. There have been multiple deaths and injuries from those who managed to flee the scene. We're looking for any available security personnel to head there and retake the outpost.\n\nWitness accounts identified the attackers as elite Headhunter enforcers, so watch yourself out there and bring help if you can. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x2, Snipers x2, Soldiers x6, Technicians x3\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
