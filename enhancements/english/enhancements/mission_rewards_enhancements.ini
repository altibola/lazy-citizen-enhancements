UDM_UGF_collect_desc_001=Greetings Qualified Shipping Partner!\n\nIf you’re looking for work as a delivery pilot, we have the perfect opportunity for you! \n\nA pick up is waiting at <EM4>~mission(Location|Address)</EM4> to be delivered to <EM4>~mission(Destination|Address)</EM4>. Sounds fun, right?\n\nWarning, there have been multiple security alerts flagged in the area. Be sure to bring along some defensive measures so you can stay safe.\n\nIf this sounds like something you're interested in, accept this offer right away! \n\nLooking forward to working with you,\n\nUnified Distribution Management\n -Delivering the Total Package-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Unknown:</EM4> 4
