blacjac_recoverspace_desc_intro=ATTN: Mercs / Bounty Hunters with Cargo Handling Experience\n\nWe just got word that a thief by the name of ~mission(TargetName) is flying around with their most recent score aboard their ship.\n\nNormally, we'd have someone arrest the bastard and be done with it, but right now the most important thing is that the stolen goods are recovered. \n\nIf this sounds like your kind of thing, you will be authorized to track down ~mission(TargetName|Last), secure the stolen ~mission(Item) however you can, and deliver it to ~mission(Destination|Address). ~mission(Contractor|RecoverSpaceTimed)~mission(Danger)\n\n\nThanks,\nGloria Mesa\n\nPrivate Contract Supervisor\nBlacJac Security, "Protection Provided"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
