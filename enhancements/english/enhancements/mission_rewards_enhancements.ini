mg_miles_groupbounty_desc_001=CONTRACT TYPE: Group Warrant\nCONTRACTOR STATUS: Independent\nApproval code: = ~mission(Contractor|ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nIn relation to a jointly committed crime, a group warrant has been issued for:\n     ~mission(Target1)\n     ~mission(Target2)\n     ~mission(Target3)\n\nIt is currently believed that they are no longer traveling together in order to evade capture, and may soon flee the system.  You should strongly consider recruiting additional help in order to execute all the warrants in the limited time frame. \n\nYou are authorized to use whatever force is necessary to neutralize the targets. \n\nPayment will be issued upon successful completion of contract when all targets have been dealt with in the allotted time.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x6, Targets x3
