bhg_bounty_desc_ASD_Engineering_001=--------------------------------------------------------\n----------------- BOUNTY CONTRACT -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nSYSTEM: Stanton\nRISK ASSESSMENT: Medium\nLAST KNOWN LOCATION:  ~mission(Location|Address)\nKNOWN AFFILIATIONS: <None>\nNOTES: We have tracked this bounty target to the <EM4>Engineering wing</EM4> of an abandoned Associated Science and Development research facility. While shuttered, various scavengers and other unsavory types are known to frequent the area.\n\nThe facility itself might also pose a risk as the nature of the research being conducted there is unknown. Be on the lookout for potential environmental hazards while in pursuit of the target.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Palatino Arms Sunstone\n- [S1-A] Palatino Core Sunstone\n- [S1-A] Palatino Helmet Sunstone\n- [S1-A] Palatino Legs Sunstone\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Captain x1\n<EM4>Rep:</EM4> +50\n<EM4>Blueprint Reward:</EM4> Guaranteed
bhg_bounty_desc_ASD_Research_001=--------------------------------------------------------\n----------------- BOUNTY CONTRACT -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nSYSTEM: Stanton\nRISK ASSESSMENT: Medium\nLAST KNOWN LOCATION:  ~mission(Location|Address)\nKNOWN AFFILIATIONS: <None>\nNOTES: We have tracked this bounty target to the <EM4>Research wing</EM4> of an abandoned Associated Science and Development facility. While shuttered, various scavengers and other unsavory types are known to frequent the area.\n\nThe facility itself might also pose a risk as the nature of the research being conducted there is unknown. Be on the lookout for potential environmental hazards while in pursuit of the target.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Palatino Arms Daystar\n- [S1-A] Palatino Arms Metropolis\n- [S1-A] Palatino Core Daystar\n- [S1-A] Palatino Core Metropolis\n- [S1-A] Palatino Helmet Daystar\n- [S1-A] Palatino Helmet Metropolis\n- [S1-A] Palatino Legs Daystar\n- [S1-A] Palatino Legs Metropolis\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Captain x5\n<EM4>Rep:</EM4> +50\n<EM4>Blueprint Reward:</EM4> Guaranteed
bhg_bounty_desc_FPS_intro=--------------------------------------------------------\n----------------- BOUNTY CONTRACT -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nSYSTEM: Stanton\nRISK ASSESSMENT: Medium\nLAST KNOWN LOCATION:  ~mission(Location|Address)\nKNOWN AFFILIATIONS: <None>\nNOTES: This preliminary bounty is being offered to you as a formal evaluation of your skills. Successful completion of this contract will lead to additional bounty work being made available. \n\nIt is believed that the target will be on foot and well armed, so be prepared to engage in a firefight. Additionally, there may be other hostiles forces at the site, while they should not be your primary focus, you may have to engage with them while in pursuit of the target.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Unknown:</EM4> 1\n<EM4>Rep:</EM4> +50
bhg_bounty_desc_HeadHunters_001=--------------------------------------------------------\n----------------- BOUNTY CONTRACT -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nSYSTEM: ~mission(System)\nRISK ASSESSMENT: ~mission(Danger)\nLAST KNOWN LOCATION:  ~mission(Location|Address)\nKNOWN AFFILIATIONS: HeadHunters\nNOTES: Headhunters are a reputed criminal organization who have a long history of clashes with law enforcement. There is a good chance that they might have other gang members when confronted so exercise caution when engaging.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Defenders x12, Targets x2\n<EM4>Probationary Guild Member:</EM4> +2,000 Rep (Failure: -1,000)\n<EM4>Probationary Guild Member:</EM4> +8,000 Rep (Failure: -4,000)
bhg_bounty_desc_Rockcracker_Power_001=--------------------------------------------------------\n----------------- BOUNTY CONTRACT -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nSYSTEM: Nyx\nRISK ASSESSMENT: Medium\nLAST KNOWN LOCATION:  ~mission(Location|Address)\nKNOWN AFFILIATIONS: Claw Salamanders\nNOTES: These old, abandoned QV Breaker Stations should be approached with caution. Not only are they are in a state of significant disrepair, but they are frequently inhabited by dangerous fauna and outlaws, like the target's associate gang members.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Juggernauts x1\n<EM4>Probationary Guild Member:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
