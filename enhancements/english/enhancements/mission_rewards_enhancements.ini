Foxwell_SecurityPatrol_S_Desc_001=Need a battle-hardened pilot for an important patrol. A prominent client is fed up with outlaws targeting their ships and satellites. We’ve been hired to scan the areas in question and deal with any hostile forces. The patrol begins at the <EM4>location marker</EM4> on your HUD before moving to a number of other locations we’ll expect you to clear.\n\nNot sure what you’ll run into out there, but based on intel shared by the client, they’re frequently seeing fighter groups of five to seven ships roaming the region. Some even have larger ships leading the charge. That means you better be ready for a serious fight. If you can, try to recruit at least <EM4>three friends</EM4> to the cause. Even a seasoned pilot will need all the help they can get against this crew.   \n\nSince this is going to be a tough one, the main contractor will get a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> at the end of the patrol.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sanguine" Energy Assault Rifle\n- [S1-A] Antium Arms Sand\n- [S1-A] Antium Core Sand\n- [S1-A] Antium Helmet Sand\n- [S1-A] Antium Legs Sand\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 7/7\n<EM4>Hostiles:</EM4> Targets x84\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
