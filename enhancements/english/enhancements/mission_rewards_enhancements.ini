crusader_platform_EliminateAll_description_001=Following their latest attempted siege, Nine Tails forces have begun to conduct targeted raids in an effort to continue to disrupt Crusader operations. The current attack has targeted ~mission(MissionCluster|Address) and it’s vital that we put a stop to the aggression there. \n\nCrusader Security is seeking a contractor willing to clear all Nine Tails operators in the area. Contractors should expect to use force and are strongly encouraged to consider bringing back-up. \n\nCONTRACT AUTHORIZED BY:\nLiaison Officer Bautista\nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x20
crusader_platform_EliminateAll_title_001=Repel Raid on Orison <EM4>[500 Rep]</EM4>
crusader_platform_EliminateSpecific_desc=Crusader Security has received intelligence that a Nine Tails raid currently occurring at ~mission(MissionCluster|Address) includes a prominent gang enforcer. Ending this raid and bringing those responsible to justice is a top priority for Crusader Security. That's why we're looking for a contractor willing to go to ~mission(MissionCluster|Name) to stop the threat and apprehend the enforcer leading it.\n\nOnce on site, you will need to deplete the Nine Tails forces until you are able to draw out ~mission(TargetName).\n\nConsidering the brutality deployed by Nine Tails during their recent siege, we recommend that contractors be prepared to use force and strongly encourage them to consider bringing back-up.\n\nCONTRACT AUTHORIZED BY:\nLiaison Officer Gibbs\nID# 91G66BW0\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Backup x6, Boss x1, Hostiles x19
crusader_platform_EliminateSpecific_title=Nine Tails Enforcer Bounty (HRT) <EM4>[1,000 Rep]</EM4>
crusader_platform_MultiEliminateAll_description_001=Following their latest attempted siege, Nine Tails forces have begun to conduct targeted raids in an effort to continue to disrupt Crusader operations. The current attack has targeted multiple buildings on ~mission(MissionCluster|Address) and it’s vital that we put a stop to the aggression there.\n\nCrusader Security is seeking a contractor willing to clear all Nine Tails operators in the area. Contractors should expect to use force and are strongly encouraged to consider bringing back-up. \n\nCONTRACT AUTHORIZED BY:\nLiaison Officer Bautista\nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x60
crusader_platform_MultiEliminateAll_title_001=Repel Multiple Raids on Orison <EM4>[500–2,000 Rep]</EM4>
crusader_platform_MultiEliminateSpecific_desc=Crusader Security has received intelligence that a Nine Tails raid currently occurring at ~mission(MissionCluster|Address) includes several prominent gang enforcers. Ending this raid and bringing those responsible to justice is a top priority for Crusader Security. That's why we're looking for a contractor willing to go and apprehend those leading it.\n\nAt each attack site, you will need to deplete the Nine Tails forces there until you are able to draw out the enforcer in charge.\n\nConsidering the brutality deployed by Nine Tails during their recent siege, we recommend that contractors be prepared to use force and strongly encourage them to consider bringing back-up.\n\nCONTRACT AUTHORIZED BY:\nLiaison Officer Gibbs\nID# 91G66BW0\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Backup x16, Boss x4, Hostiles x45
crusader_platform_MultiEliminateSpecific_title=Nine Tails Enforcer Bounties (VHRT) <EM4>[1,000–4,000 Rep]</EM4>
crusader_retakelocation_kareah_desc_001=Security Post Kareah is under attack by an unknown number of assailants. \n\nCrusader is seeking contractors to quickly travel to the station and eliminate all trespassers in the vicinity before our security forces are overwhelmed.  \n\nWe’re not sure whether the attackers are targeting the contraband in our evidence lockup or our CrimeStat database, but whatever they’re after, they need to be dealt with. You will receive a combat bonus for each target neutralized.  \n\nBy accepting this contract, you agree to abide by all Crusader Security protocols: If you harm any guards or other authorized contractors while on the station, your contract will be terminated and you will be marked as a target. \n\nTime is of the essence, but make sure you’re well equipped to handle the hostiles before responding. \n\nCONTRACT AUTHORIZED BY: \nLiaison Officer Bautista \nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
