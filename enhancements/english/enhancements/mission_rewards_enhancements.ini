mgClovus_opensalvage_desc_001=Fortune has shined upon us once again. I’ve just learned of a battle near ~mission(Location) that’s just transpired far from the prying eyes of any meddlesome comm arrays, and reinforcements from either of the forces involved have yet to be dispatched. This means that there is a window of opportunity for an enterprising soul to pick the graveyard clean.\n \nI’d like to extend this opportunity to all my trusted contacts. Any and all interested parties can have the location… for the right price. Coordinates will be provided once you accept the contract and will remain available until you choose to terminate it.\n\nOf course, speed will be of the essence as you will not only face potential competition from other salvagers, but also the looming possibility of reinforcements arriving to survey the battlefield. \n\nIf you’re still hesitating, just remember, fortune favors the bold.\n\n-cd\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Friendlies:</EM4> Salvageable Ships x8
