Adagio_Industrial_Salvage_Universal_Intro_Desc_001=Adagio Holdings\nA Proud Equal Opportunity Employer\n\n> About us <\nAs the leading procurer and distributor of salvage rights, Adagio Holdings are now looking to expand into the acquisition and distribution of salvageable materials to both small and large-scale businesses.\n\n> About the job <\nAs a part of this initiative, we need keen-eyed contractors capable of identifying salvageable materials, efficiently stripping them, and delivering the Recycle Material Composite (RMC) and salvaged components to us.\n\nThis introductory contract will require you to head to <EM4>~mission(Location|Address)</EM4> and strip an abandoned ship approved for salvage.\n\nOnce you've gathered the RMC, you'll deliver it to the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\n> Requirements <\n     - Any class/size of salvage ship\n\nFor advice on salvaging, consult <EM4>A Salvager's Guide to Material Collection</EM4> in your mobiGlas journal.\n\n> Disclaimer <\nContractors are responsible for ensuring that they are collecting materials from vehicles that are considered fair salvage under the pursuant UEE laws. Adagio Holdings is in no way liable for any crimes or misdemeanors committed by contractors and will offer no compensation or reparation for any persons affected by these actions.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Abrade Scraper Module\n- [S1-A] Cinch Scraper Module\n- [S1-A] Trawler Scraper Module\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Friendlies:</EM4> Salvageable Ships x1\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Adagio_Industrial_Salvage_Universal_Intro_Title_001=Adagio Holdings in Need of Salvagers <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Adagio_Industrial_Salvage_Universal_M_Desc_001=Adagio Holdings\nA Proud Equal Opportunity Employer\n\n> About the job <\nTo help satisfy a recent average-sized order, we are seeking contractors to help source Recycled Material Composite (RMC) by stripping abandoned ships. We recommend searching for wreckage at Lagrange points or you could purchase a salvage claim from us in your Contract Manager.\n\nOnce acquired, deliver the materials to the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\nFor advice on salvaging, consult <EM4>A Salvager's Guide to Material Collection</EM4> in your mobiGlas journal.\n\n> Requirements <\n     - Any class/size of salvage ship\n\n> Disclaimer <\nContractors are responsible for ensuring that they are collecting materials from vehicles that are considered fair salvage under the pursuant UEE laws. Adagio Holdings is in no way liable for any crimes or misdemeanors committed by contractors and will offer no compensation or reparation for any persons affected by these actions.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Abrade Scraper Module\n- [S1-A] Cinch Scraper Module\n- [S1-A] Trawler Scraper Module\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 2/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Adagio_Industrial_Salvage_Universal_M_Title_001=Salvager Needed (Med. Supply of RMC) <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
BHG_Certification_Criminal_Desc=--------------------------------------------------------\n----------------- BOUNTY CONTRACT -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nSYSTEM: Unknown\nRISK ASSESSMENT: High\nLAST KNOWN LOCATION: Unknown\nKNOWN AFFILIATIONS: <None>\nNOTES: Upon the recommendation of one our members, the Bounty Hunters Guild would like to offer you the chance to earn your Suspect Apprehension Certification.\n\nThis would signify that you are qualified to track and apprehend wanted suspects who have proven to be more elusive than typical bounties. They often have advanced piloting skills, difficult to predict behavior, and more resources than your average target, making them a real challenge.\n\nTo successfully complete this certification process, you must apprehend wanted suspect <EM4>~mission(TargetName)</EM4>.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50
BHG_Certification_Criminal_Title=Suspect Apprehension Certification <EM4>[50 Rep]</EM4>
BHG_Certification_Easy_Desc=--------------------------------------------------------\n----------------- BOUNTY CONTRACT -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nSYSTEM: ~mission(System)\nRISK ASSESSMENT: Low\nLAST KNOWN LOCATION: ~mission(Location)\nKNOWN AFFILIATIONS: <None>\nNOTES: Based on an assessment of your developing abilities, the Bounty Hunters Guild would like to offer you the chance to earn your Tracker Beginner's Permit.\n\nThis permit would signify that you are qualified to track and apprehend Low-Risk Targets (LRT). These criminals traditionally fly smaller ships but typically have a few escorts which makes them more challenging.\n\nTo successfully complete this certification process, you must apprehend a LRT ranked criminal by the name of <EM4>~mission(TargetName)</EM4> last seen at <EM4>~mission(Location|Address)</EM4>.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 3
BHG_Certification_Easy_Title=Tracker Beginner's Permit Certification <EM4>[50 Rep]</EM4>
BHG_Certification_EscapedConvict_Desc=--------------------------------------------------------\n----------------- BOUNTY CONTRACT -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nSYSTEM: ~mission(System)\nRISK ASSESSMENT: High\nLAST KNOWN LOCATION: Klescher Rehabilitation Facility\nKNOWN AFFILIATIONS: <None>\nNOTES: Due to an increase in escapees in the area, the Bounty Hunters Guild would like to offer you the chance to earn your Fugitive Recovery Certification.\n\nThis would signify that you are qualified to track and apprehend escaped convicts. These desperate individuals can often prove quite difficult to recapture, requiring special skills and heightened intuition.\n\nTo successfully complete this certification process, you must apprehend the fugitive <EM4>~mission(TargetName)</EM4>.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50
