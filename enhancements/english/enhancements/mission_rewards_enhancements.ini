EckhartSecurity_EliminateAll_storm_data_H_desc_001=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Clear Location\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nUrgent request came in from Associated Science & Development to provide combat support at ~mission(Location). Apparently they have been attacked by outlaws and their security forces have been unable to handle it on their own. \n\nYou've been cleared to go on site and aide local security elements in taking out the outlaws, but ASD reserves the right to restrict you from certain areas.\n\nThis is a confirmed combat op, so prepare accordingly.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x4, Soldiers x9, Technicians x4\n<EM4>Applicant:</EM4> +2,000 Rep
