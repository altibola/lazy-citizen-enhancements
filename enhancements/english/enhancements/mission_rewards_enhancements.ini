mg_klim_localdelivery_drugprod_desc_intro=Normally, I like to cook everything from scratch myself. Pride in product and all. But every once in a while, whether it's too much demand or too much heat or whatever, I need to rely on other labs for an order. \n\nMy hands are tied up here though, so I could use someone to help oversee the whole production line for me. Couldn't think of anyone better and more available than you.\n\n~mission(Itinerary)\n\nJust don't get distracted in the middle and wander off. It happens more often than you'd think. Manage to finish the full list, and I'll see to it you get nice cut of the profits.\n\n-Wallace\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +1,000
