Eckhart_ShipAmbush_Intro_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Ship Ambush\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nWe’re looking for contractors with combat experience who are willing to get their hands dirty so to speak. A client of ours was double-crossed by a <EM4>~mission(AmbushTarget)</EM4> and we’ve been waiting for an opportunity to deal with the issue. After tracking them for several weeks, we’ve identified <EM4>~mission(Location|Address)</EM4> as the ideal spot to intercept them. It features an <EM4>emission cloud</EM4> where you can hide and power down your ship while waiting for the <EM4>~mission(AmbushTarget)</EM4>.\n\nIntel suggests that they may travel with an escort. If they do, you’ll have to deal with them too. Since this is your first contract, we will have other contractors in the area who can lend a hand once you strike.\n\nPayment will be issued upon successful completion of contract. There’s a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> in this for the main contractor too.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] Lightstrike I Cannon\n- [E-S2-A] Lightstrike II Cannon\n- [E-S3-A] Lightstrike III Cannon\n- [STH-S1-C] SonicLite\n- [STH-S2-C] Cirrus\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Allies x1, Hostile Wave x6, Targets x2\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
