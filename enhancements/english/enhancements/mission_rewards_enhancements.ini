Shubin_Rockcracker_CollectLenses_Desc_001=CONTRACT: Manufacturing Order\nLOCATION: Nyx\n\nDETAILS:\nIf you happen to have any other work bringing you to one of the QV Breaker Stations in the Keeger Belt, Shubin Interstellar would be highly interested in contracting you to obtaining a supply of hard-to-source mining laser focus lenses.\n\n<EM4>TERMS*:</EM4>\nWhile there may be some focus lenses that can be recovered from the QV Breaker Station's storage, you must likely will need to manufacture them using <EM4>Sadaryx crystals</EM4> and the on-site lens fabricator. While the ore is rare, these Breaker Stations typically have sadaryx veins that can be mined directly with a <EM4>Multi-Tool with a Mining Attachment</EM4>.\n\nDeliver the procured lenses to the freight elevator located at <EM4>~mission(Destination|Address)</EM4> for processing.\n\nContractors have reported that these stations may have been infiltrated by outlaws, so caution is advised.\n\n*By accepting this contract you are assuming any and all risks associated with the work outlined herein and in no way can Shubin Interstellar be held accountable for any damages accrued during the duration of the contract.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +100 Rep
