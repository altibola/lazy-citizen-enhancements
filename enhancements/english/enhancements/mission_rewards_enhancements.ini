Foxwell_SecurityPatrol_VE_Desc_001=Time to knock out a routine patrol for one of our long-term clients. The route is a series of waypoints that need to be visited and scanned to confirm everything’s as expected. Should be simple enough.  \n\nIf interested, please accept and head to the <EM4>location marker</EM4> on your HUD to start. Pull this off and the main contractor will get a bonus payment of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sanguine" Energy Assault Rifle\n- [S1-A] Antium Arms Sand\n- [S1-A] Antium Core Sand\n- [S1-A] Antium Helmet Sand\n- [S1-A] Antium Legs Sand\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Targets x4\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
