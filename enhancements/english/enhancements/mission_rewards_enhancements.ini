mg_pacheco_desc=~mission(Description)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
mg_pacheco_prisonerbreak_desc_002=Here’s the deal - A couple of long timers got snagged pulling a job for me and I want you to spring them. \n\nA friendly mechanic has arranged for their prison transport to run into some trouble en route, venting the front door and bringing the ship to a halt. You’re gonna go, dispatch any security escorting the transport, find the prisoner manifest aboard, and use it to locate my crew’s cryopods.\n\nThe popsicles I’m after are ~mission(NameSave2), ~mission(NameKill1), ~mission(NameSave3), and ~mission(NameSave1). All have been loyal and deserve better than rotting in jail.\n\nAt least I think they've been loyal... I'm still wondering how they got pinched in the first place. I can't shake the feeling that one of them may have been doubling dealing. Tell you what, if you find any proof that one of my crew has been working with the Advocacy, liquidate their cryopod and I’ll see you get a bonus. \n\nOnce you've activated the right pods and my people are starting to thaw, get the hell out of there and let the retrieval team handle the rest. This last bit is important. See, once they’re defrosted, they're gonna be sent off to retirement. No sense in them knowing any more about my business than they already do, i.e. I don’t want these lunks seeing your face or even knowing you exist. \n\nOnce you’re back on your way, I’ll send you a hefty pile of well deserved creds.\n\nNow just in case you’re getting any ideas along the lines of “Why don’t I just free everyone?” or “Wouldn’t it be easier to shut them all up permanently?” Forget it. The politics of this whole thing is more complicated than you need to know. Just trust me when I say that if any extra prisoners get freed or die without me ordering it, you’ll be the one who pays. Want all your money? Do what you’re told and that’s it. \n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +100
mg_pacheco_prisonerbreak_desc_003=Here’s the deal - A couple of long timers got snagged pulling a job for me and I want you to spring them. \n\nA friendly mechanic has arranged for their prison transport to run into some trouble en route, venting the front door and bringing the ship to a halt. You’re gonna go, dispatch any security escorting the transport, find the prisoner manifest aboard, and use it to locate my crew’s cryopods.\n\nThe popsicles I’m after are ~mission(NameKill1), ~mission(NameSave2), ~mission(NameSave1), and ~mission(NameSave3). All have been loyal and deserve better than rotting in jail.\n\nAt least I think they've been loyal... I'm still wondering how they got pinched in the first place. I can't shake the feeling that one of them may have been doubling dealing. Tell you what, if you find any proof that one of my crew has been working with the Advocacy, liquidate their cryopod and I’ll see you get a bonus. \n\nOnce you've activated the right pods and my people are starting to thaw, get the hell out of there and let the retrieval team handle the rest. This last bit is important. See, once they’re defrosted, they're gonna be sent off to retirement. No sense in them knowing any more about my business than they already do, i.e. I don’t want these lunks seeing your face or even knowing you exist. \n\nOnce you’re back on your way, I’ll send you a hefty pile of well deserved creds.\n\nNow just in case you’re getting any ideas along the lines of “Why don’t I just free everyone?” or “Wouldn’t it be easier to shut them all up permanently?” Forget it. The politics of this whole thing is more complicated than you need to know. Just trust me when I say that if any extra prisoners get freed or die without me ordering it, you’ll be the one who pays. Want all your money? Do what you’re told and that’s it. \n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100
mg_pacheco_title=~mission(Title) <EM4>[100–1,000 Rep]</EM4>
mg_ruto_RetrieveConsignment_desc_001=Oh hello, I recently overheard a little bit of intel that ~mission(location|address) received some confidential materials that are of great interest to an acquaintance of mine. So interesting that they’re willing to pay for someone to storm the facility, grab the goods, and deliver them to ~mission(DropOff1|address). Now I expect there to be plenty of security, who will most likely put up a fight, so I’d bring a gun or two. \n\nWord is the confidential materials were delivered in a consignment alongside other stuff and are now being stored in the facility’s automated vault. Senior security officers on-site carry datapads containing retrieval codes used to access the vault. You’ll have to get your hands on a datapad before using the package conveyor to retrieve the boxes. \n\nIf you need a little sweetener, I’ve seen the manifest and can confirm that the other crates being stored at the facility are pretty choice. My client could care less about what happens to them, so they’re yours to do as you please. Run this right and those extra crates could be a nice bonus on top of the delivery fee for you.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Guards x4, Hostiles x54
mg_ruto_RetrieveConsignment_title_001=get the goods <EM4>[500–4,000 Rep]</EM4>
mg_ruto_UGF_destroy_E_desc_001=Seems there’s a new upstart in the sector who hasn’t been paying the right dues to the right people. To teach them a little lesson, my client wants you to go down to ~mission(Location|Address) and destroy all the drugs on site.\n\nThe low-level lugs they got on site will probably make a stink about it and try to stop you. Handle them however you want but getting rid of the product is the most important thing.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Civilians x4
mg_ruto_UGF_destroy_E_title_001=limited supply <EM4>[100 Rep]</EM4>
mg_ruto_UGF_destroy_H_desc_001=A client of mine‘s trying to negotiate a deal, but isn’t having much luck. The other party feels like they got all the leverage because they’re sitting comfortably on a pile of inventory. To help move the negotiations along, I’m gonna need you to head down to ~mission(Location|Address) and destroy all the drugs on site. \n\nNow, I should probably tell you that the site’s being protected by some very serious people, so getting to the stash is going to be a bit tricky, but I trust you’ll find a way. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
mg_ruto_UGF_destroy_H_title_001=inventory clear out <EM4>[100 Rep]</EM4>
mg_ruto_UGF_destroy_desc_001=One of my clients has been unhappy to learn that someone's been muscling in on their territory. Now rather than going down the more traditional route of killing some people and starting a whole thing, they’ve opted to send a different kind of message instead.\n\nYou’re gonna go down to ~mission(Location|Address) and destroy all the drugs on site. \n\nOf course, if someone does wanna pick a fight with you, feel free to defend yourself, but getting rid of the product is the most important thing.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
mg_ruto_UGF_destroy_title_001=out of stock <EM4>[100 Rep]</EM4>
mg_ruto_UGF_eliminateall_Lawnocivs_desc_001=Everybody holds grudges, right? I mean, when you get popped pulling a crime, I get that you’re a little sour, but that’s pretty much the game, right?\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostiles x15\n<EM4>Friendlies:</EM4> Civilians x4
mg_ruto_UGF_eliminateall_Lawnocivs_title_001=live and let an independent contractor deal out revenge <EM4>[100 Rep]</EM4>
mg_ruto_UGF_eliminateall_civsonly_desc_001=A client is getting out produced by a new competitor and is looking to throw a wrench into the works.\n\nYou’re going to head to ~mission(Location|Address) and kill all the civies who work there. \n\nDo what you want with the gun-toting goons guarding the workers, but remember that they aren’t the priority.  \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostiles x10\n<EM4>Friendlies:</EM4> Civilians x4
mg_ruto_UGF_eliminateall_civsonly_title_001=too many cooks <EM4>[100 Rep]</EM4>
mg_ruto_UGF_eliminateall_desc_001=This is a bit aggressive for my taste, but credits are credits, right?\n\nGot a client who's looking for a highly motivated individual to head over to ~mission(Location|Address) and kill everyone who’s there. \n\nBasically, start shooting and don’t stop. You'll get paid once the site's clear.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostiles x15
mg_ruto_UGF_eliminateall_nocivs_desc_001=I know someone who’s looking to start up a new business, but they’re having a hard time hiring the skilled workers they need.\n\nNow the thing is, they found the perfect crew over at ~mission(Location|Address), but the people they work for won’t let them go. Even hired extra armed guards to make sure of it.\n\nWhat I want you to do, is go there and kill all the guards while making sure all the workers remain unharmed. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostiles x15\n<EM4>Friendlies:</EM4> Civilians x4
mg_ruto_UGF_eliminateall_nocivs_title_001=good help’s hard to find <EM4>[100 Rep]</EM4>
mg_ruto_UGF_eliminateall_title_001=makin’ a mess <EM4>[100 Rep]</EM4>
mg_ruto_UGF_steal_desc_001=This one should be a ringer for somebody like you. There’s a package being held at ~mission(Location|Address) and I need you to bring it to ~mission(Destination|Address). \n\nThere's one super tiny issue that you should know about. There’s gonna be a crap ton of security down there. But I'm sure it should be fine.\n\n:)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100
mg_ruto_UGF_steal_title_001=grab and go <EM4>[100 Rep]</EM4>
mg_ruto_clearcrimestat_norep_desc_01=Hi there. We haven’t had a chance to work together yet but I’m in a bit of a bind here and I could use another body. Not for nothing, of course. I’m all for a good quid pro quo.\n\nOne of my associates who was serving some time in Klescher was supposed to bring me a datachip, but then they went quiet. Now I’m assuming they’re dead, but here’s the deal: if you finish his job, I wipe your crimestat. Not bad, right?\n\nYour predecessor was apparently planning on using some old tunnels to make his escape. He made it sound like they weren't exactly the easiest thing to access, but I trust you can figure it out. I'm guessing you'll find his body somewhere in there and if we’re lucky, he'll still have the chip on him.\n\nOnce you get it, finish getting out however you can. Then get the data to me. There’s a spot nearby you can upload the chip’s contents. You might want to watch out for Hurston Security, though. They've been a hassle lately, so I wouldn't be surprised if you ran into them. After I get the data and validate it, I’ll wipe your crimestat. \n\nThen you can go and enjoy your newfound freedom. If you do this right, maybe I’ll have more lucrative work for you down the line.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 5
mg_ruto_clearcrimestat_norep_title_01=need an out? <EM4>[50 Rep]</EM4>
mg_ruto_clearcrimestat_rep_desc_01=Hey there. I heard you ended up in Klescher which is a real drag. But it might actually be a lucky day for both of us.\n\nLong story short, I had somebody sneaking a datachip out of the prison, but they never got back to me. I know for a fact they haven’t left the facility, so I think something might have happened to them. While tragic, business must carry on. If you can get the chip and finish the job, I can clear your crimestat for you. What do you say?\n\nOf course, I don't know exactly how far they got, but I can tell you that the prison's got a whole network of hidden tunnels my guy was planning on using to make his escape. My guess is his corpse is rotting away somewhere there.\n\nOnce you find the body, I’m hoping the chip will still be on him. When you’ve got it, finish escaping and get the data to me. There’s a spot nearby you can upload the chip’s contents. \n\nOne warning though, you might want to watch out for Hurston Security. They've been a hassle lately, so I wouldn't be surprised if you ran into them.\n\nWhen I've got the data I’ll wipe your crimestat and then, voila, you’ll be free and clear. What you do after that is entirely up to you.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 5
mg_ruto_clearcrimestat_rep_title_01=let's help each other <EM4>[50 Rep]</EM4>
mg_ruto_collect_reclaimer_desc=Hey there. \n\nNine Tails got themselves a little problem. As it turns out, they got a little side biz in the underground organ trade. Now that an area I generally like to steer well clear of, but a gig’s a gig, right? It seems that one of their mobile butcher shops aboard the 'October Rising' got pinched by private security while out chopping. Now the Nine Tails are willing to cut ties with the ship and its crew (who are probably all dead anyway), but they need a particular crate extracted. Guess it was a special order or something.\n\nAnyway, get aboard the October Rising, get the package, and get out.\n\nSecurity’s still hanging around so watch yourself and maybe bring some friends, but remember, your priority is the package. If you're looking to save yourself some extra hassle, you could also black out the area by shutting down the nearest comm array if you want to avoid the crimestats for, you know, killing a bunch of a security. But hey, you do you.\n\nOnce you’re out, drop the package off at the clinic on Grim HEX and I’ll sort your payment.\n\nEasy peasy,\n\nRuto\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Pirates x3, Private Security x11\n<EM4>Unknown:</EM4> 1
