Covalex_courier_todc_small_desc_001=Hey there!\n\nGot a request in to transfer a few packages over to the ~mission(Dropoff1) at ~mission(Dropoff1|Address). Pretty straightforward as these things go.\n\nPACKAGES FOR PICK UP (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> from the <EM4>~mission(Pickup3|Address)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> from the <EM4>~mission(Pickup4|Address)</EM4>\n     · Package <EM4>#~mission(Item5|SerialNumber)</EM4> from the <EM4>~mission(Pickup5|Address)</EM4>\n\nDROP OFF LOCATION\n     · All Packages delivered to the <EM4>~mission(Dropoff1)</EM4> at <EM4>~mission(Dropoff1|Address)</EM4>\n\nAppreciate you making the time to tackle this one for me, \n\nChase Hewitt\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. By accepting this contract, you are agreeing to all terms and conditions as outlined in our extended 'Independent Workers Supplemental Information Guide v.2948.01.29.' Covalex Shipping is not responsible for any damages that occur while operating as an independent contractor.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Covalex_internaldelivery_dc_desc_001=Hi!\n\nI’m in need an extra set of hands at <EM4>~mission(Location|Address)</EM4> to help out moving a few items between some of the storage sites within the facility. When places get this big they need all the logistics help they can get!  \n\nPACKAGES FOR PICK UP (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber) from the <EM4>~mission(Pickup1)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber) from the <EM4>~mission(Pickup2)</EM4>\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2)</EM4>\n\nBest of luck!\n\nChase Hewitt\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. By accepting this contract, you are agreeing to all terms and conditions as outlined in our extended 'Independent Workers Supplemental Information Guide v.2948.01.29.' Covalex Shipping is not responsible for any damages that occur while operating as an independent contractor.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Covalex_internaldelivery_dc_desc_003=Hi there,\n\nGot a request from <EM4>~mission(Location|Address)</EM4> to help internally relocate a few packages from where they’re currently being stored. Thought you might be willing to tackle it.\n\nPACKAGES FOR PICK UP (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> from the <EM4>~mission(Pickup3)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> from the <EM4>~mission(Pickup4)</EM4>\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> to the <EM4>~mission(Dropoff3)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> to the <EM4>~mission(Dropoff4)</EM4>\n\nHave a good one!\n\nChase Hewitt\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. By accepting this contract, you are agreeing to all terms and conditions as outlined in our extended 'Independent Workers Supplemental Information Guide v.2948.01.29.' Covalex Shipping is not responsible for any damages that occur while operating as an independent contractor.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
Covalex_internaldelivery_dc_desc_005=Hi,\n\nThere’s a whole heap of packages over at <EM4>~mission(Location|Address)</EM4> that need to be carted around the facility to their proper storage place. Would mean a lot if you could personally see to it all getting sorted.\n\nPACKAGES FOR PICK UP (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> from the <EM4>~mission(Pickup3)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> from the <EM4>~mission(Pickup4)</EM4>\n     · Package <EM4>#~mission(Item5|SerialNumber)</EM4> from the <EM4>~mission(Pickup5)</EM4>\n     · Package <EM4>#~mission(Item6|SerialNumber)</EM4> from the <EM4>~mission(Pickup6)</EM4>\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> to the <EM4>~mission(Dropoff3)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> to the <EM4>~mission(Dropoff4)</EM4>\n     · Package <EM4>#~mission(Item5|SerialNumber)</EM4> to the <EM4>~mission(Dropoff5)</EM4>\n     · Package <EM4>#~mission(Item6|SerialNumber)</EM4> to the <EM4>~mission(Dropoff6)</EM4>\n\n\nReally appreciate all you do,\n\nChase Hewitt\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. By accepting this contract, you are agreeing to all terms and conditions as outlined in our extended 'Independent Workers Supplemental Information Guide v.2948.01.29.' Covalex Shipping is not responsible for any damages that occur while operating as an independent contractor.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000
