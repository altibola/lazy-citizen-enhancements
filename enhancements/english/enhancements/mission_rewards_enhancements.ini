EckhartSecurity_Defend_M_Desc_001=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Defend Location\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nWe’ve gotten word that outlaws have their sights set on attacking <EM4>~mission(Location|Address)</EM4>. Our client is concerned the attack is imminent and requested that security be deployed to the site immediately. If you’re interested and available, gather all the supplies and support you may need and head to the location pronto.  \n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x12, Private Security x4, Sentries x8\n<EM4>Unknown:</EM4> 10\n<EM4>Security Contractor:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -2,000 Rep
