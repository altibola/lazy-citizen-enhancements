TheCollector_Ships_Peregrine_Desc=Wikelo not want to race but can still make fast ship faster. If you want, bring me things, and go faster.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_Peregrine_TItle=Peregrine Wikelo Mod <EM4>[30 Rep]</EM4>
TheCollector_Ships_Prowler_Util_Desc=Wikelo work hard. You work hard. Prowler Utility work hard. But you bring me right items, I make it work more hard, then you work less hard. Bye.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +250
TheCollector_Ships_Prowler_Util_Title=Prowler More Utility <EM4>[250 Rep]</EM4>
TheCollector_Ships_Pulse_Desc=Wikelo really like this little Human ship. Pulse feel very fast. Can have many configuration to make Pulse go faster. If you want, can give you configurated Pulse that I like. Have list of what I want for job. Bye.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Ships_Pulse_TItle=Pulse Plus <EM4>[20 Rep]</EM4>
TheCollector_Ships_Scorpius_Desc=Don't know what the name mean, but ship is very fast, very good in fight. With tweak, can better. You see list of what Wikelo need, go get and I make. Bye.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_Scorpius_TItle=Build a Mod Scorpius <EM4>[100 Rep]</EM4>
TheCollector_Ships_Spirit_C1_Desc=Wikelo love useful cargo ship. Spirit is very useful. If you want one, can make for you. Just bring me things and I will do. Bye.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_Spirit_C1_TItle=Spirit Cargo mod <EM4>[30 Rep]</EM4>
TheCollector_Ships_Starfighter_Inferno_Desc=Starfighter Inferno good ship, but what if you want it to be better ship at fighting? Wikelo knows just what to do. You bring me the items and I make it for you. Bye.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_Starfighter_Inferno_Title=Starfighter Inferno Special <EM4>[100 Rep]</EM4>
TheCollector_Ships_Starfighter_Ion_Desc=Starfighter Ion good ship, but it could be more sneak, yes? Surprise your not friends when you shoot them. I help with this for you. I need the right items and then I can give to you. Bring to me. Bye.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_Starfighter_Ion_Title=Sneaky Starfighter Ion <EM4>[100 Rep]</EM4>
TheCollector_Ships_Starlancer_ATC_Desc=If you like big space to move things, Wikelo can do useful and wonder things to MISC ship for you. Bring me pieces and I will give you version even better than what Xi'an can do.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +250
TheCollector_Ships_Starlancer_ATC_Title=New Move Big Starlancer Ship <EM4>[250 Rep]</EM4>
TheCollector_Ships_Starlift_Max_Desc=If you want to move many things. Hercules ship, very good for that. Wikelo even know souli back in Protectorate that started to use. Very big. Wikelo can give you similar version if you get what Wikelo need. Look at list and tell me.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +250
TheCollector_Ships_Starlift_Max_TItle=More than a Max <EM4>[250 Rep]</EM4>
TheCollector_Ships_Terrapin_Medic_Desc=Wikelo not know this Human word but ship is very useful when things go danger. If you want, can give new version of it. Maybe more useful?\n\nYou fly and tell. Bye.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_Terrapin_Medic_Title=What is Terrapin? <EM4>[100 Rep]</EM4>
TheCollector_Ships_Ursa_Desc=Wikelo branching into ships too. Took a look at Ursa and improved. Bring parts for me and I will make for you. Explore planet better. Go do.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Ships_Ursa_TItle=Make a Ursa Mod <EM4>[20 Rep]</EM4>
TheCollector_Ships_Wolf_Unique_Desc=You have been good trade partner for Wikelo. Offer you this very special Wolf mod. Make trade even better - Bring me what I want and I give you the special Wolf AND Antium Armor AND a VOLT LMG. Very good deal for my very good customer.\n\n<EM3>ITEM REWARDS</EM3>\n- Antium Helmet Midnight Sun\n- Antium Core Midnight Sun\n- Antium Arms Midnight Sun\n- Antium Legs Midnight Sun\n- Fresnel "Deepwater" Energy LMG\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Ships_Wolf_Unique_Title=Most Special Wolf
TheCollector_Ships_ZeusCL_Desc=Wikelo can make new version of cargo Zeus ship. If you want, bring what needed, then you can have ship. Fair. Bye.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_ZeusCL_TItle=Zeus Cargo Special <EM4>[100 Rep]</EM4>
TheCollector_Ships_ZeusES_Desc=Wikelo can make new version of Zeus ship. I know it important ship to Human. Not sure why, but yes, very useful ship. Anyway, can upgrade and make a little prettier. What I need listed, if you want, bring. Bye.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_ZeusES_TItle=Zeus Special <EM4>[30 Rep]</EM4>
