redwind_UGF_collect_desc_001=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nGot a shipment waiting to be hauled from <EM4>~mission(Location|Address)</EM4> to <EM4>~mission(Destination|Address)</EM4>. \n\nI’ll be up front with you though, this spot doesn’t have the cleanest of reputations. That being said, they still need packages delivered and they got credits, so that’s all square. But if you go in there, there’s a good chance you might run into some trouble.\n\nDon’t take the job if you can’t handle that.\n\n\n\nTO ALL VETS - Red Wind appreciates your service to our Empire! Your struggles mean our freedom!  \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Unknown:</EM4> 4
redwind_UGF_collect_title_001=RED WIND DELIVERY PILOT NEEDED <EM4>[500 Rep]</EM4>
redwind_courier_dc_small_title_001=Red Wind Local Shipment Route <EM4>[500–1,000 Rep]</EM4>
redwind_courier_fromdc_med_desc_001=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nGot a request in from ~mission(Pickup1|Address) that they have a fair number of packages waiting in the ~mission(Pickup1) that they need delivered. \n\nBefore you take the contract, just make sure you got a ship with enough room. Tractor beam wouldn’t hurt either.\n\nPACKAGES FOR PICK UP \n     · All Packages in the <EM4>~mission(Pickup1)</EM4> at <EM4>~mission(Pickup1|Address)</EM4>\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> to the <EM4>~mission(Dropoff3|Address)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> to the <EM4>~mission(Dropoff4|Address)</EM4>\n     · Package <EM4>#~mission(Item5|SerialNumber)</EM4> to the <EM4>~mission(Dropoff5|Address)</EM4>\n     · Package <EM4>#~mission(Item6|SerialNumber)</EM4> to the <EM4>~mission(Dropoff5|Address)</EM4>\n     · Package <EM4>#~mission(Item7|SerialNumber)</EM4> to the <EM4>~mission(Dropoff6|Address)</EM4>\n     · Package <EM4>#~mission(Item8|SerialNumber)</EM4> to the <EM4>~mission(Dropoff6|Address)</EM4>\n     · Package <EM4>#~mission(Item9|SerialNumber)</EM4> to the <EM4>~mission(Dropoff7|Address)</EM4>\n     · Package <EM4>#~mission(Item10|SerialNumber)</EM4> to the <EM4>~mission(Dropoff7|Address)</EM4>\n\n\nWE ARE EQUAL OPPORTUNITY - Red Wind Linehaul is and always has been an equal opportunity contractor. If you think you can do a good job for us, then by all means sign up. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
redwind_courier_fromdc_small_desc_001=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\nThe folks over at ~mission(Pickup1|Address) have few packages in the ~mission(Pickup1) they want delivered. Easy credits for doing a basic load and drop.\n\nPACKAGES FOR PICK UP \n     · All Packages in the <EM4>~mission(Pickup1)</EM4> at <EM4>~mission(Pickup1|Address)</EM4>\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> to the <EM4>~mission(Dropoff3|Address)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> to the <EM4>~mission(Dropoff4|Address)</EM4>\n     · Package <EM4>#~mission(Item5|SerialNumber)</EM4> to the <EM4>~mission(Dropoff5|Address)</EM4>\n\n\nTO ALL VETS - Red Wind appreciates your service to our Empire! Your struggles mean our freedom! \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
redwind_courier_todc_med_desc_001=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nThere’s a sizeable allotment of packages that need to be taken to the ~mission(Dropoff1) at ~mission(Dropoff1|Address). As long as your ship has enough room, this should be a relatively simple run.\n\nPACKAGES FOR PICK UP (ANY ORDER) \n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> from the <EM4>~mission(Pickup3|Address)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> from the <EM4>~mission(Pickup4|Address)</EM4>\n     · Package <EM4>#~mission(Item5|SerialNumber)</EM4> from the <EM4>~mission(Pickup5|Address)</EM4>\n     · Package <EM4>#~mission(Item6|SerialNumber)</EM4> from the <EM4>~mission(Pickup5|Address)</EM4>\n     · Package <EM4>#~mission(Item7|SerialNumber)</EM4> from the <EM4>~mission(Pickup6|Address)</EM4>\n     · Package <EM4>#~mission(Item8|SerialNumber)</EM4> from the <EM4>~mission(Pickup6|Address)</EM4>\n     · Package <EM4>#~mission(Item9|SerialNumber)</EM4> from the <EM4>~mission(Pickup7|Address)</EM4>\n     · Package <EM4>#~mission(Item10|SerialNumber)</EM4> from the <EM4>~mission(Pickup7|Address)</EM4>\n\nDROP OFF LOCATION\n     · All Packages delivered to the <EM4>~mission(Dropoff1)</EM4> at <EM4>~mission(Dropoff1|Address)</EM4>\n\n\n\nDO NOT TAKE THIS CONTRACT - unless you are reliable. Red Wind has a reputation that our clients trust and for good reason. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
redwind_courier_todc_small_desc_001=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nGot a small bunch of packages that need to be grabbed and taken to the ~mission(Dropoff1) at ~mission(Dropoff1|Address). Should be fairly simple all things considered.\n\nPACKAGES FOR PICK UP (ANY ORDER) \n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> from the <EM4>~mission(Pickup3|Address)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> from the <EM4>~mission(Pickup4|Address)</EM4>\n     · Package <EM4>#~mission(Item5|SerialNumber)</EM4> from the <EM4>~mission(Pickup5|Address)</EM4>\n\nDROP OFF LOCATION\n     · All Packages delivered to the <EM4>~mission(Dropoff1)</EM4> at <EM4>~mission(Dropoff1|Address)</EM4>\n\n\n\nTRUST GOES TWO WAYS - By taking this contract you are pledging not to screw us over, and Red Wind Linehaul pledges to treat you the same. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
roughready_bounty_cargoship_desc_001=Rough & Ready recently provided fueling services for a hauler named ~mission(TargetName), who agreed to deliver their next load of supplies to us as compensation. Well, we just found out that the lying skag sold their latest shipment to a rival gang instead. \n\nWe’re looking for someone to track down and eliminate ~mission(TargetName|Last) for the double cross. \n\nAn old friend of mine just spotted the skag at ~mission(Location|Address). Looks like they're loaded with more cargo that’s not coming our way, and traveling with an escort. We’re only paying you to take out the ship, so anything you find aboard is yours to keep.\n\n- Smokey\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
roughready_bounty_cargoship_desc_002=My associates and I brokered a deal with a hauler named ~mission(TargetName) to deliver supplies to us. Funny thing is the shipment never showed up. They claimed pirates raided their ship and took our supplies, but it turns out that story’s 100% ranta dung.\n\nLying to back out of our deal can’t go unanswered and you’re going to make that message abundantly clear. ~mission(TargetName|Last) was recently seen with an escort at ~mission(Location|Address). As long as you kill ~mission(TargetName|Last), we don’t care what happens to the cargo they’re hauling. \n\n- Smokey\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1
roughready_bounty_cargoship_desc_003=Some asshole going by the name ~mission(TargetName) has been running a scheme where their cargo ship requests refueling services only to ambush our ships when they get there. Even loaded the damn thing up with real cargo to make sure it passes scans. We’ve spread the word so nobody in Rough & Ready will fall for the trap again, but I want this skag punished. \n\nI think ~mission(TargetName|Last) knows a lot of our people on sight, so I’m guessing it’ll be better to pay you to take care of it. Heard that they were spotted around ~mission(Location|Address). Head there now and take care of that cargo ship and anyone protecting it once and for all. \n\n- Smokey\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
roughready_bounty_desc_001=Interested in doing a little hunting? \n\n~mission(TargetName) sabotaged one of our fuel shipments and cost us a ton of creds, so I’m looking for someone to make ‘em pay for what they did. Just got word ~mission(TargetName|Last) was spotted at ~mission(Location|Address). If you head there now, there’s a good chance you can pick up their trail and take ‘em out for good. \n\n~mission(TargetName|Last) didn’t work alone, so don’t be surprised if they’re traveling with extra protection.\n\n- Smokey\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
roughready_bounty_desc_003=I have a delicate situation that needs handling. After years of being a loyal member of Rough & Ready, ~mission(TargetName) defected from the gang and is out there shopping secrets to our rivals. We need ~mission(TargetName|Last) ghosted immediately. \n\nWith stuff like this, I’ve found it’s always better to pay someone unassociated with us to do the deed. Scans picked up ~mission(TargetName|Last) near ~mission(Location|Address) not too long ago. We’ll pay you well to head there now and take care ‘em for us. \n\n~mission(TargetName|Last) isn’t an idiot and knows we’ll be coming after ‘em. Be prepared for a helluva fight and don’t expect ‘em to be alone.\n\n- Smokey  \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
roughready_claimsweep_desc_easy=The Rough & Ready crew is looking for someone to handle a delicate situation. We’ve discovered a ship and orbital sentries at ~mission(location|address) spyin’ on us. We’re in a bit of a bind because we don’t want to start a larger fight with whoever’s behind this. That’s why we’re looking for some hired help who can quickly and discreetly take care of it for us. Interested?\n\nLast thing, once you’re out there, make sure to keep an eye on that ship. Bet as soon as you start blowin’ up their sentries they’re gonna try to bring in some help to stop you.\n \n- Smokey\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x3, Prospectors x1\n<EM4>Turrets:</EM4> 2 (hostile)
roughready_claimsweep_desc_hard=The Rough & Ready crew is looking for an independent merc interested in something heavy. We’ve been keeping an eye on a developing situation at ~mission(location|address) where ships are guarding several orbital sentries spying on our operations.      \n\nNow, I might’ve been born at night, but it wasn’t last night. Considering the blatant way they’re set up, whoever’s responsible had to know we’d eventually discover it. Almost feels like they’re baiting R&R into attacking it, and I don’t want us falling for it. \n\nInstead, you’re gonna do it for us and get paid a damn good amount of creds for your effort. The ships stationed there will be less suspicious of an unaffiliated ship approaching and make it harder to pin the attack on us. \n\nJust be sure to plan accordingly before heading in. Maybe bring your own reinforcements in case any of their ships escape and call in some of their own.     \n\n- Smokey\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x5, Prospectors x4\n<EM4>Turrets:</EM4> 4 (hostile)
roughready_claimsweep_desc_intro=My associates and I have found ourselves in a little predicament and could use some help. There’s an orbital sentry at ~mission(location|address) that’s spying on us. We don’t know who put it there, but it sure as hell can’t stay. \n\nThing is we’re business minded folks first and foremost and worry that if we blow it up ourselves it’ll start shit. That’s why it’s better if someone like you does it. Should be a quick and easy gig for someone interested in earning some creds.   \n\n- Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Turrets:</EM4> 1 (hostile)
roughready_claimsweep_desc_medium=Recently made an interesting discovery that someone set up a handful of orbital sentries at ~mission(location|address). Guess they’re trying to grab some info about our operations there. They even have a few ships guarding to make sure nothing happens to them. \n\nOf course, we want these bastards gone, but I’m worried that getting rid of it ourselves would be bad for business. That’s why we’re looking for a little ‘plausible deniability’. Someone from outside of R&R to eliminate the problem, so whoever is behind it can’t directly tie the attack back to us. I know this won’t be a walk in the park, especially with those guards lurking. Who knows how many reinforcements they have at the ready? But if you manage to get it done, we’re prepared to see you paid right. \n\nThink you’ve got the skills to pull this off? \n\n- Smokey\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x4, Prospectors x2\n<EM4>Turrets:</EM4> 3 (hostile)
roughready_delivery_station_desc_001=Any chance you’re at ~mission(Destination)?\n\nNeed a box hustled from <EM4>~mission(Location|Address)</EM4> to <EM4>~mission(Destination|Address)</EM4>. Get it there on time and unbroken and it’ll be the easiest creds you’ll ever earn.   \n\n-Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 1/7 | Complexity 1/7 | Risk 1/7 | Knowledge 1/7
roughready_delivery_station_title_001=~mission(Destination) Stroll
roughready_eliminateall_hangar_desc_01=We got some outlaws overstaying their welcome on one of our stations. They tried to pull a fast one on us but now they’re trapped in ~mission(location|address). We need you to clear ‘em out. \n\nRough & Ready doesn’t want a single one of them left alive when you’re through. Don’t care how messy it gets as long as it gets done, got it?\n\n- Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x24, Soldiers x2
roughready_eliminateall_maintenance_desc_01=Rough & Ready has a rat problem. One of our crews tried to pull a little mutiny and now they’ve taken over ~mission(location|address).\n\nSince I can’t be 100% sure they don’t have sympathizers onboard the station, I want you to handle putting down these traitors for me.\n\nIf you can clear out our little pest issue you’ll be paid handsomely. Just don’t leave a single one of them alive. Don’t want anyone else getting funny ideas.\n\n- Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x21
roughready_salvage_E_desc_001=Had a few wrecked ships towed to ~mission(Location|Address). They’re fully out of commission and in dire need of scrapping. If you’re interested in salvaging what’s left, it can be all yours, for a fair price, too.\n\nPlus, you don’t have to worry much about any distractions while you’re workin’ since you’ll be near one of our stations and we make sure folks behave themselves.\n\n- Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Friendlies:</EM4> Salvageable Ships x1
roughready_salvage_E_title_001=Wrecked Ships for Sale
roughready_salvage_M_desc_001=Got word there’s a few ships near ~mission(Location|Address) just floating all by their lonesome. It’s good salvage, but none of our crews have the time right now. We figured to give you first snap at it.\n\nIf you want the coords, we’ll sell them to you for a price. Then you’re free to pick the wreck as clean as you like and sell it all for a tidy profit. Now, you might run into some trouble out there from rival scavs, but I’m sure it won’t be anything you can’t handle.\n\n- Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Friendlies:</EM4> Salvageable Ships x1
roughready_salvage_M_title_001=Salvage Wrecked Ships on the Drift
roughready_searchbody_danger_station_desc_001=After hearing rumors that we might’ve gotten a bad case of squatters over at ~mission(Location|Address), I had sent one of my more trusted people to investigate. \n\nBad news is that I haven’t heard from them since. \n\nI’d like for you to head over and see if you can find ~mission(TargetName)’s current whereabouts.  I’ll leave it up to you how you want to deal with any scum you come across. \n\nConfirm where ~mission(TargetName|Last) is, and there’ll be a reward in it for you.\n\n- Smokey \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
roughready_searchbody_nodanger_station_desc_001=I’ve got people left and right askin’ me if I know what happened to ~mission(TargetName). Now personally, I’d be more than happy to see ‘em gone for good, but for whatever reason they got friends in high places demanding answers.\n\nI can’t spare any of my people to go on a wild goose chase, so I'm looking for the perfect candidate to go over to ~mission(Location|Address) and find out what happened to ~mission(TargetName|Last). You’ll get paid if you find where they are.\n\n10 credits says they got way too high and passed out in a dark corner somewhere.\n\n-Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
