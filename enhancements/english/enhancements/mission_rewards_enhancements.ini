Eckhart_ShipAmbush_H_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Ship Ambush\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nLooking for a competent contractor who can recruit a wingman to help execute an ambush. The target is a <EM4>~mission(AmbushTarget)</EM4> which has been involved in several operations against one of our most important clients. By neutralizing it once and for all, it’ll make our client’s life a hell of a lot easier. While the ~mission(AmbushTarget) is our focus, they usually don’t fly anywhere without a sizable escort, including large craft. \n\nWe’ve gotten word that this group will be passing by <EM4>~mission(Location|Address)</EM4> soon. Any chance you could hurry and beat them there? That spot has an <EM4>emission cloud</EM4> that you can power down your ship and hide in. Then when they pass, you should have the upper hand.  \n\nPayment will be issued upon successful completion of contract. The client knows this one will be tough, so they threw in a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> that’ll go to the main contractor.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] Lightstrike I Cannon\n- [E-S2-A] Lightstrike II Cannon\n- [E-S3-A] Lightstrike III Cannon\n- [STH-S1-C] SonicLite\n- [STH-S2-C] Cirrus\n- [E-S1-A] FL-11 Cannon\n- [E-S2-A] FL-22 Cannon\n- [E-S3-A] FL-33 Cannon\n- [STH-S1-B] DeltaMax\n- [STH-S2-B] GammaMax\n- [E-S4-A] Lightstrike IV Cannon\n- [E-S5-A] Lightstrike V Cannon\n- [E-S6-A] Lightstrike VI Cannon\n- [STH-S1-A] Slipstream\n- [STH-S2-A] Eclipse\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Ho