Criminal_RetrieveData_Reclaimer_desc=Been hunting down a particular parcel of data and right when I get a break the ship gets attacked by this converted Nine Tails Reclaimer called the Black Kite. I tried to hack into the servers on the Black Kite to see if they copied the data, but couldn't find a way to remotely get past their encryption protocols without the physical key.\n\nThat's where you come in. I need someone to breach their ship, get a hold of their decryption key, and decrypt the server so I can remotely pull down what I need.\n\nYou're smart enough to know who we're dealing with here, so plan accordingly. Since it's gonna ruffle some powerful feathers, let's not leave anything to chance. Destroy the Black Kite when you're done to cover both our asses.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Unknown:</EM4> 8
DataDownload_Mobi_Description=WIP I have heard you are the right person for this job, so I will cut to the chase. We have located a UEC counterfeiting station at an old wreck site. If you get to the counterfeiting station quickly, you will be able to download the UEC for yourself. They have got some guards defending the wreck site, but I'm sure you'll be able to handle it. Oh and a final heads up. I am not the only person with this information, so expect a fight.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
