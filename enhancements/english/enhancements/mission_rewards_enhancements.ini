Shubin_Industrial_ShipMining_VH_Org_Desc_001=POSTING: Purchase Order\nLOCATION: <EM4>~mission(System) </EM4>\n\nTERMS*: \nShubin Interstellar is currently looking to fulfil another purchase order for a variety of refined materials. This purchase order is more complex than typical, requiring multiple mining methods, but since you've proven your skill thus far, we think you and your team are up for the challenge.\n\nReminder, <EM4>materials must be refined before delivery</EM4>, and since this is a purchase order and not a mining contract, you are expected to provide your own equipment, such as a <EM4>~mission(Hint_Tool)</EM4>.\n\nOnce you’re ready to sell us the required materials, deposit them in the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\n*By accepting this contract you are assuming any and all risks associated with the work outlined herein and in no way can Shubin Interstellar be held accountable for any damages accrued during the duration of the contract.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Shubin_RG_ShipMining_Rank4_Org]</EM4>\n- Arclight "Nightstalker" Pistol\n- Arclight "Warhawk" Pistol\n- [S1-A] Arclight Pistol Battery (30 cap)\n- [S1-A] Aril Arms\n- [S1-A] Aril Core\n- [S1-A] Aril Helmet\n- [S1-A] Aril Legs\n- Arclight "Stormfall" Pistol\n- Arclight Pistol\n- [S1-A] Horizon Helmet\n- [S1-A] Venture Arms\n- [S1-A] Venture Core\n- [S1-A] Venture Legs\n\n<EM4>[Shubin_RG_ShipMining_Rank4_Org, Rank 0–1]</EM4>\n- [IND-S0-C] Surveyor-Go\n- [IND-S1-C] Surveyor-Lite\n- [IND-S2-C] Surveyor\n- [IND-S3-C] Surveyor-Max\n- [MIN-S0-A] Arbor MHV Mining Laser\n- [MIN-S0-B] Helix\n- [MIN-S0-B] Hofstede\n- [MIN-S0-C] Lawson Mining Laser\n\n<EM4>[Shubin_RG_ShipMining_Rank4_Org, Rank 2–3]</EM4>\n- [IND-S0-B] BroadSpec-Go\n- [IND-S2-B] BroadSpec\n- [IND-S4-B] BroadSpec-Max\n- [MIN-S1-A] Arbor MH1 Mining Laser\n- [MIN-S1-A] Helix I Mining Laser\n- [MIN-S1-A] Hofstede-S1 Mining Laser\n- [MIN-S1-A] Impact I Mining Laser\n- [MIN-S1-A] Klein-S1 M