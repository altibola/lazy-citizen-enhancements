missionManager_Charlie_Description=Immediate need for an experienced and discreet Private Investigator near Crusader to look into an insurance matter.\n\nFlat rate. No expenses. Start date will be as soon as possible. Sufficient evidence must be submitted in order to complete the contract.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
mtps_RetrieveConsignment_desc_001=ABOUT THE JOB\nmicroTech Protection Services need a security professional for a retrieval op at ~mission(Location). The location is currently under attack and security forces on-site are unresponsive and presumed dead. We believe confidential materials recently delivered to the facility for temporary holding were the target of the raid. Your main focus will be collecting those boxes and delivering them to a secure location.  \n\nFor security reasons, the confidential materials were delivered as part of a larger shipment and secured in the automated vault. The materials have unique retrieval codes that must be entered on the keypad at the package conveyor. Protocols require that only senior security officers can carry a datapad containing a code, but considering the volatile situation, we can't guarantee that the Nine Tails haven’t taken possession of them. Once secured, deliver all of the confidential materials to ~mission(dropoff1) for payment.\n\nRESPONSIBILITIES\n• Provide own transportation to ~mission(Location|address).\n• Use force as necessary to collect the confidential materials.\n• Deliver the confidential materials to ~mission(dropoff1|address).\n\nMINIMUM QUALIFICATIONS\n• 2 years of combined mercenary and/or security experience.\n• Access to combat equipment. \n• Access to a spaceship that can transport cargo.\n• Available for immediate deployment.\n\nPREFERRED QUALIFICATIONS\n• Experience with rapid hostility de-escalation techniques.\n• Experience hauling important cargo.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Guards x4, Hostiles x54
mtps_RetrieveConsignment_title_001=Defend Location and Deliver Confidential Materials <EM4>[500–4,000 Rep]</EM4>
mtps_UGF_defend_E_desc_001=ABOUT THE JOB\nmicroTech Protection Services is looking for a detail-oriented mercenary professional who can assemble a security team in order to protect ~mission(Location|Address) against any minor threats. \n\nRESPONSIBILITIES\n• Provide own transportation to ~mission(Location|Address).\n• Provide own security team to assist.\n• Protect the site against hostile threats; using force as necessary.\n\nMINIMUM QUALIFICATIONS\n• 2 years of combined mercenary and/or security experience.\n• Access to combat equipment and mode of transport.\n• Available for immediate deployment.\n\nPREFERRED QUALIFICATIONS\n• Experience with managing a team.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x1, Hostiles x10, Private Security x4, Sentries x6\n<EM4>Unknown:</EM4> 11
