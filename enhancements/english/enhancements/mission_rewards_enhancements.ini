xenothreat_destroy_server_HH_desc_01=One of our datarunners went MIA while transporting vital operational information. A few hours ago, we determined that they were hit by a Headhunter raiding party and the contents of the ship’s datastores were transferred to their servers at ~mission(location|address). \n\nWhile we have every reason to believe that our encryption will hold, we cannot take the risk that the contents of those files will be exposed. You are being ordered to head there and ensure our data remains private by destroying the Headhunter servers.\n\nI strongly encourage thoroughness. Raze everything and everyone you can to the ground.\n\nComm. Spec. Engler\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
xenothreat_destroy_server_HH_title_01=Total Server Wipe <EM4>[50 Rep]</EM4>
xenothreat_eliminateall_CFP_outpost_desc_01=The group of instigators that calls itself “Citizens for Prosperity” can no longer be allowed to continue spreading their lies and propaganda without repercussion.\n\nAs a sharp reminder of who really controls Pyro we have issued a kill order to eradicate all “Citizen” presence at ~mission(location|address). Resistance is likely, but we expect you to handle it with little difficulty. Do as directed and you’ll be paid well for your work.\n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
xenothreat_eliminateall_CFP_outpost_title_01=Kill Order: "Citizens" at ~mission(location) <EM4>[1,000 Rep]</EM4>
xenothreat_eliminatespecific_desc_001=XenoThreat’s efforts to keep outside influences from infecting this system is being tested by a group that dares to call itself Citizens for Prosperity. A prominent group member, ~mission(TargetName), has established operations at ~mission(Location|Address) and is already hard at work spreading their lies and propaganda to anyone that will listen. If we want Pyro to remain independent of UEE and alien influence, then something must be done about this now.  \n\nThat’s why XenoThreat is issuing a kill order for ~mission(TargetName|Last). And knowing how important they are to Citizens for Prosperity’s operations, I wouldn’t be surprised if you had to fight your way through a bunch of their most fanatical followers first before you even get a shot at them. But remember ~mission(TargetName|Last) is your target, and payment hinges solely on you making sure they’re eliminated. \n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Unknown:</EM4> 1
xenothreat_eliminatespecific_desc_002=The Headhunters have assembled a special strike team whose sole purpose is to attack, disrupt, and undermine our operations. As much as I’m loath to admit it, they’ve had a few small successes and are quickly becoming a concern. \n\nXenoThreat knows the best way to kill a snake is by cutting off its head, so we’re issuing a kill order for the strike team’s commander ~mission(TargetName), who according to our intelligence sources, has been hiding at ~mission(Location|Address) for a few days now. \n\nI’d expect strong resistance from the Headhunter forces there. From what we’ve heard, ~mission(TargetName|Last) got this command partially because of the fierce loyalty they inspire in others. Putting your own crew together to tackle this would be a solid operational strategy. \n\nHappy Head Hunting,\n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Unknown:</EM4> 1
xenothreat_eliminatespecific_title_001=Fight for a Free Pyro <EM4>[1,000 Rep]</EM4>
xenothreat_eliminatespecific_title_002=Head Hunting <EM4>[1,000 Rep]</EM4>
