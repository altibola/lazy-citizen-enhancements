MTPS_eliminateall_dc_desc_001=ABOUT THE JOB\nmicroTech Protection Services is looking for a detail-oriented mercenary professional who can quickly and safely assist us in the complete removal of the outlaw group who have temporarily gained control of the ~mission(Location) at ~mission(Location|Address).\n\nRESPONSIBILITIES\n• Provide own transportation to ~mission(Location|Address).\n• Remove all members of the hostile outlaw force; using force as necessary. \n\nMINIMUM QUALIFICATIONS\n• 2 years of combined mercenary and security experience.\n• Access to combat equipment and mode of transport.\n• Available for immediate deployment.\n\nPREFERRED QUALIFICATIONS\n• Experience with rapid hostility de-escalation techniques.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Juggernauts x2, Soldiers x12, Technicians x2
MTPS_eliminateall_dc_title_001=Remove Hostile Force <EM4>[500 Rep]</EM4>
MTPS_eliminateboss_dc_desc_001=ABOUT THE JOB\nmicroTech Protection Services is looking for a qualified bounty hunter to apprehend ~mission(TargetName) who has so far been able to evade capture. They are coordinating an active raid at ~mission(Location|Address), and we believe that they may finally be lured out of hiding if their forces there attacking the ~mission(Location) are faced with strong enough resistance. \n\nRESPONSIBILITIES\n• Provide own transportation to ~mission(Location|Address).\n• Neutralize ~mission(TargetName)’s criminal associates near the ~mission(Location) to draw the target into the open.\n• Neutralize ~mission(TargetName); using force if necessary.\n\nMINIMUM QUALIFICATIONS\n• Access to combat equipment and mode of transport.\n• Available for immediate deployment.\n\nPREFERRED QUALIFICATIONS\n• Ability to handle high pressure situations.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x1, Soldiers x7, Technicians x5
MTPS_eliminateboss_dc_title_001=Apprehend Bounty: ~mission(TargetName) (HRT) <EM4>[500 Rep]</EM4>
MTPS_eliminateboss_multi_dc_desc_001=ABOUT THE JOB\nmicroTech Protection Services is looking for a qualified bounty hunter to apprehend ~mission(TargetName) who has so far been able to evade capture. They are coordinating an active raid that has spread throughout ~mission(Location|Address).  \n\nOur hope is that you may be able to finally draw them out of hiding if you confront their forces at several different attack points. With their numbers sufficiently weakened, ~mission(TargetName|Last) will most likely risk exposure and you will be able to confront them directly.\n\nRESPONSIBILITIES\n• Provide own transportation to ~mission(Location|Address).\n•Confront ~mission(TargetName)’s criminal associates to draw the target into the open.\n• Neutralize ~mission(TargetName); using force if necessary.\n\nMINIMUM QUALIFICATIONS\n• Access to combat equipment and mode of transport.\n• Available for immediate deployment.\n\nPREFERRED QUALIFICATIONS\n• Ability to handle high pressure situations.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Backup x5, Juggernauts x1, Soldiers x18, Technicians x32
MTPS_eliminateboss_multi_dc_title_001=Secure Bounty: ~mission(TargetName) (VHRT) <EM4>[1,000 Rep]</EM4>
MTPS_eliminatespecific_dc_desc_001=ABOUT THE JOB\nmicroTech Protection Services is looking for a qualified bounty hunter to apprehend ~mission(TargetName) from ~mission(Location|Address). They were recently spotted near the ~mission(Location) and are believed to still be in that area.\n\nWhile there may be other criminals active at the site, your main focus should be on completing the bounty.\n\nRESPONSIBILITIES\n• Provide own transportation to ~mission(Location|Address).\n• Neutralize ~mission(TargetName); using force as necessary.\n\nMINIMUM QUALIFICATIONS\n• Access to combat equipment and mode of transport.\n• Available for immediate deployment.\n\nPREFERRED QUALIFICATIONS\n• Ability to handle high pressure situations.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Juggernauts x1, Snipers x5, Soldiers x14
MTPS_eliminatespecific_dc_title_001=Active Bounty: ~mission(TargetName) (MRT) <EM4>[500 Rep]</EM4>
MTPS_searchbody_danger_dc_desc_001=ABOUT THE JOB\nmicroTech Protection Services is seeking a qualified contractor to assist in the search for ~mission(TargetName) who was last seen near the ~mission(Location) at ~mission(Location|Address) but who's current whereabouts are unknown. \n\nOur preliminary investigation has led us to suspect foul play may be behind their disappearance. As such, heightened caution is advised as there may be hostile actors involved.\n\nRESPONSIBILITIES\n• Provide own transportation to ~mission(Location|address).\n• Confirm the location of ~mission(TargetName) and if they are still alive.\n\nMINIMUM QUALIFICATIONS\n• 2 years security experience.\n• Available for immediate deployment.\n\nPREFERRED QUALIFICATIONS\n• Experience with conducting missing person investigations.\n• Ability to handle high pressure situations.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
MTPS_searchbody_dc_desc_001=ABOUT THE JOB\nAfter receiving a report that ~mission(TargetName) has been missing, microTech Protection Services is seeking a qualified contractor to begin an onsite search of ~mission(Location|Address) to learn their current whereabouts. The missing individual was last seen entering the ~mission(Location) so it's recommended to begin the search there.\n\nRESPONSIBILITIES\n• Provide own transportation to ~mission(Location|address).\n• Confirm the location of ~mission(TargetName) and if they are still alive.\n\nMINIMUM QUALIFICATIONS\n• 2 years security experience.\n• Available for immediate deployment.\n\nPREFERRED QUALIFICATIONS\n• Experience with conducting missing person investigations.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
NTLockdown_FleetDestroy_Antagonist_MBroker_desc=Now that Crusader’s found their fleet, it seems the Nine Tails finally realized just how useful a bit of extra help can be.\n\nLong story short, they’re looking for some hired muscle to keep Crusader at bay. You’ll and everyone else who volunteers get a payout for every security ship you take down. \n\nAnd on top of that, if all of you keep Crusader occupied long enough for the Nine Tails to finish up whatever the hell it is that they’re up to with this quantum blockade, you’ll get a big fat bonus.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
NTLockdown_FleetDestroy_MBroker_desc=Crusader Security has confirmed the location of the outlaw Nine Tails fleet responsible and is mobilizing now to end the quantum blockade of ~mission(Location).\n\nWe are again seeking trained security professionals to join with our emergency response efforts and assist in neutralizing this dangerous threat.\n\nBefore accepting, please be aware that the Nine Tails are fully expected to offer considerable resistance and that until the blockade is ended, quantum travel will not be possible in the sector.\n\nCONTRACT AUTHORIZED BY:\nDirector Sasha Rust\nID# 122L964G\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +4,000
NTLockdown_FleetDestroy_MBroker_name=Illegal Blockade - Neutralizing Nine Tails Fleet <EM4>[4,000 Rep]</EM4>
NTLockdown_FleetFind_Antagonist_MBroker_desc=I told the Nine Tails that blocking quantum travel to hold a whole area hostage was gonna attract the wrong kind of attention, but do they listen to me? No. Now Crusader’s got dozens of scanning ships out there poking their noses into things I’d rather stay hidden. \n\nThat’s why I'm trying to hire as many people as I can to help me out. I wanna pay you for each Crusader scanning ship you take out. \n\nIn fact, I’ll even up your rate per-ship if all of you hit a certain number of kills. Call it a performance incentive.\n\nAnd if you're really feeling like an overachiever, take out any fools brave enough to try running cargo to the blockaded station. I've got some suppliers who'll be appreciative of the extra demand.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
NTLockdown_FleetFind_MBroker_desc=Crusader Security has learned that the criminal organization known as the Nine Tails have set an illegal blockade around ~mission(Location) and stopped all incoming and outgoing quantum traffic in the sector.\n\nThe outlaw fleet must be located, and the blockade terminated.\n\nWe are urgently requesting any trained security professionals in the system to join Crusader Security forces and protect our scanning ships as they seek out the location of the Nine Tails fleet causing this blockade.\n\nPlease bear in mind that with quantum travel disabled and numerous hostiles in the area, this should be considered a high-risk operation. Proper equipment and a full tank of fuel is strongly recommended for all pilots joining this emergency response effort. \n\nCONTRACT AUTHORIZED BY:\nDirector Sasha Rust\nID# 122L964G\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +4,000
NTLockdown_FleetFind_MBroker_name=Illegal Blockade - Seeking Nine Tails Fleet Responsible <EM4>[4,000 Rep]</EM4>
NTLockdown_StationSupply_MBroker_desc=The illegal quantum blockade of ~mission(Location) has interrupted normal trade routes and essentials are in short supply. \n\nCrusader Security is looking for traders and haulers to provide much needed medical supplies to the station. \n\nPrices offered by the station administration will be adjusted to reflect the situation with the Nine Tails, and in addition, Crusader will provide a hazard bonus upon successful transfer of the medical supplies because of the increased risk. \n\nThank you in advance for your support during these difficult times.\n\nCONTRACT AUTHORIZED BY:\nDirector Sasha Rust\nID# 122L964G\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
NorthRock_Delivery_Local_DerelictOutpost_Desc_01=Here's the deal – a client of ours (who should have spent the extra credits for a Northrock escort) had one of their ships attacked and now they need us to run point on a retrieval op for an important package that was stolen.\n\nThankfully, we caught a break and were able to track down the people responsible to <EM4>~mission(Pickup1|Address)</EM4>. We need you to head there and recover the package. You'll be able to ID it by its serial number: <EM4>#~mission(Item1|SerialNumber)</EM4>.\n\nI expect that the outlaws are going to put up a fight, but just remember that they aren't the priority.\n\nOnce you got the package, fly it back to the client at <EM4>~mission(Dropoff1|Address)</EM4>. \n\nOne last thing, make sure you bring a ship that has enough room for some cargo. Don't want you getting all the way there in your Gladius or whatever only to have to turn back.\n\nDo us proud,\n\nBraden Corchado\nLogistics Officer - Stanton Branch\nNorthrock Service Group\n\n*RETRIEVAL OPERATION SUMMARY*\n* Recover Package <EM4>#~mission(Item1|SerialNumber)</EM4> from <EM4>~mission(Pickup1|Address)</EM4>\n* Deliver to <EM4>~mission(Dropoff1|Address)</EM4>\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
NorthRock_Delivery_Local_DerelictOutpost_Desc_02=Here's the deal – a client of ours (who should have spent the extra credits for a Northrock escort) had one of their ships attacked and now they need us to run point on a retrieval op for some important packages that were stolen.\n\nThankfully, we caught a break and were able to track down the people responsible to <EM4>~mission(Pickup1|Address)</EM4>. We need you to head there and recover the packages. You'll be able to ID them by their serial numbers: <EM4>#~mission(Item1|SerialNumber)</EM4>,\n<EM4>#~mission(Item2|SerialNumber)</EM4> and\n<EM4>#~mission(Item3|SerialNumber)</EM4>.\n\nI expect that the outlaws are going to put up a fight, but just remember that they aren't the priority.\n\nOnce you got the packages, deliver them to their respective destinations: <EM4>~mission(Dropoff1|Address)</EM4>, <EM4>~mission(Dropoff2|Address)</EM4> and <EM4>~mission(Dropoff3|Address)</EM4>. \n\nOne last thing, make sure you bring a ship that has enough room for the cargo. Don't want you getting all the way there in your Gladius or whatever only to have to turn back.\n\nDo us proud,\n\nBraden Corchado\nLogistics Officer - Stanton Branch\nNorthrock Service Group\n\n*RETRIEVAL OPERATION SUMMARY*\n* Recover Packages <EM4>#~mission(Item1|SerialNumber)</EM4>, <EM4>#~mission(Item2|SerialNumber)</EM4> and <EM4>#~mission(Item3|SerialNumber)</EM4> from <EM4>~mission(Pickup1|Address)</EM4>\n* Deliver to <EM4>~mission(Dropoff1|Address)</EM4>, <EM4>~mission(Dropoff2|Address)</EM4> and <EM4>~mission(Dropoff3|Address)</EM4>\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
NorthRock_Delivery_Local_DerelictOutpost_Desc_03=Here's the deal – a client of ours (who should have spent the extra credits for a Northrock escort) had one of their ships attacked and now they need us to run point on a retrieval op for some important packages that were stolen.\n\nThankfully, we caught a break and were able to track down the people responsible to different derelict outposts. We need you to head there and recover the packages. You'll be able to ID them by their serial numbers: <EM4>#~mission(Item1|SerialNumber)</EM4>, <EM4>#~mission(Item2|SerialNumber)</EM4> and <EM4>#~mission(Item3|SerialNumber)</EM4>.\n\nI expect that the outlaws are going to put up a fight, but just remember that they aren't the priority.\n\nOnce you got the packages, fly them back to the client at <EM4>~mission(Dropoff1|Address)</EM4>. \n\nOne last thing, make sure you bring a ship that has enough room for the  cargo. Don't want you getting all the way there in your Gladius or whatever only to have to turn back.\n\nDo us proud,\n\nBraden Corchado\nLogistics Officer - Stanton Branch\nNorthrock Service Group\n\n*RETRIEVAL OPERATION SUMMARY*\n* Recover Packages <EM4>#~mission(Item1|SerialNumber)</EM4>, <EM4>#~mission(Item2|SerialNumber)</EM4> and <EM4>#~mission(Item3|SerialNumber)</EM4> from <EM4>~mission(Pickup1|Address)</EM4>\n* Deliver to <EM4>~mission(Dropoff1|Address)</EM4>\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
NorthRock_Delivery_Local_DerelictOutpost_Title_01=Retrieval Op <EM4>[500–600 Rep]</EM4>
