northrock_groupbounty_desc_intro=Hey,\n\nHope everything is going all right. I may have reached out already, but I wanted to be sure and introduce myself. I'm a logistics officer for Northrock Service Group, the leading independently-owned security firm operating in the Stanton system today, providing a variety of services to all major governmental bodies as well as various private concerns. The reason I am contacting you is because we believe someone with your skills could be a boon to our clients. \n\nNot only that, but I think we'd be good fit for you. Our contractors traditionally get a higher rate of pay than a lot of our competitors in system, and a lot of them tell me how they really enjoy being tasked with the challenging and interesting work we offer. \n\nNow, Northrock holds itself to such high-standards so before we can make anything official, you'll need to achieve approved contractor status by completing a pro tem contract. \n\nI was hoping you could capture several wanted members of an outlaw gang: ~mission(Target1), ~mission(Target2), and ~mission(Target3).\n\nGet that done and we'll see about getting you more work.\n\nHope to hear from you soon, \n\nBraden Corchado\nLogistics Officer - Stanton Branch\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x15, Targets x6
northrock_groupbounty_desc_rehire=Hey,\n\nI've been thinking over everything that went down and decided to speak to management. They've agreed to give you another chance but only if you successfully complete a contract for us.\n\nWe can look at reinstating your employment status if you can bring in this criminal trio:\n~mission(Target1)\n~mission(Target2)\n~mission(Target3)\n\nThey evaded the last Associate who went after them, so you bringing them all in would definitely earn you some points.\n\nHopefully you've gotten your act together since your last job.\n\nBraden Corchado\nLogistics Officer - Stanton Branch\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x15, Targets x3
