Foxwell_X2_AttackIdris_Desc=We have a fix on a XenoThreat Idris with fighter support at <EM4>~mission(Location|Address)</EM4>. Their comms discipline's lousy. According to the radio chatter, the Commander's on board the Idris. Can't remember the last time we had such a strong fix on him. This could be a chance to decapitate the whole operation. \n\nWant in?\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 7/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Defenders x10, Targets x1\n<EM4>Neutral:</EM4> +120,000 Rep
Foxwell_X2_AttackIdris_Title=Target: XenoThreat Attack Group <EM4>[120,000 Rep]</EM4>
Foxwell_X2_DrawOutBoss_Desc=We have intercepted a location beacon that puts <EM>~mission(TargetName)</EM4> and their personal attack wing at <EM4>~mission(Location|Address)</EM4>. They have been one of XenoThreat's most brutal enforcers since their founding. \n\n<EM>~mission(TargetName|Last)</EM4>'s not one to back down from a fight so hit their ships hard enough, do enough damage and they won't be able to resist joining in the action. Once they're out in the open, they'll be your main target.\n\nReady to go?\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x32\n<EM4>Neutral:</EM4> +8,400 Rep
Foxwell_X2_DrawOutBoss_Title=Eliminate XenoThreat Enforcer <EM4>[8,400 Rep]</EM4>
Foxwell_X2_ShipAmbush_Desc=Been handed some strong intel on a XenoThreat strike wing's flightpath. Looking for contractors who can dust off now and be set up at <EM4>~mission(Location|Address)</EM4> ahead of them. Local conditions will mask your scanner signatures so you can give them the surprise of their lives. Let's turn the hunters into the hunted.\n\nInterested?\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Wave x7, Targets x1\n<EM4>Neutral:</EM4> +4,000 Rep
Foxwell_X2_ShipAmbush_Title=Ambush XenoThreat Strike Wing <EM4>[4,000 Rep]</EM4>
Foxwell_X2_ShipDefend_Desc=A distress beacon came in from <EM4>~mission(Location|Address)</EM4> about a ship under attack from XenoThreat. The pilot reports that their shields are failing and they can't outrun the attackers.\n\nThe ship's a <EM4>~mission(Ship)</EM4>, but the pilot's Human, which  according to XenoThreat's twisted way of thinking, makes them a traitor to Humanity and a target for their hate.\n\nWe're looking for operators to head out there and do some good.\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +4,000 Rep
Foxwell_X2_ShipDefend_Title=Urgent - Ship Under XenoThreat Attack <EM4>[4,000 Rep]</EM4>
Foxwell_X2_ShipWaves_Desc=Multiple reports are coming in of XenoThreat ships massing at <EM4>~mission(Location|Address)</EM4>\nWe're looking for contractors ready to take the fight to them. \n\nThey want us to believe that they have right on their side. They want us to believe that they have overwhelming force. This is a chance to show them we know better.\n\nI won't lie, this is more than just a simple security contract to me. I really hate those intolerant assholes and everything they stand for.\n\nYou with me?\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x16\n<EM4>Neutral:</EM4> +3,800 Rep
Foxwell_X2_ShipWaves_Title=Interdict XenoThreat Attack Force <EM4>[3,800 Rep]</EM4>
Foxwell_bombingrun_E_desc_001=We've just received the location of an outlaw outpost where some up-and-coming criminals have been hanging out. Now, our client says there's no reason to engage these folks directly. Instead you will be targeting their supply lines.\n\nFly on over to <EM4>~mission(Location|Address)</EM4> and take out their fuel stores while dealing with any minimal resistance they may put up. It will be your call on how much you engage with the hostile forces, just don't forget that your main objective is ensuring those fuel tanks are out of action.\n\nThis is a yellow level contract so pay will be proportionate.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_bombingrun_E_title_001=Yellow Level Contract: Disrupt Operations <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_bombingrun_H_desc_001=An opportunity has presented itself for a client to take action against a group of criminals who have been harassing their business.\n\nAccording to reports, this group of outlaws are currently laying low at <EM4>~mission(Location|Address)</EM4>. The client thinks this is a good time to catch them off guard and bring them to justice. The job is to take out their fuel tanks and putting an end to their smuggling operations once and for all.\n\nThese folks are not to be underestimated. You better bring some backup and fly low to avoid the turrets. Priority as always is the fuel tanks.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_bombingrun_H_title_001=Orange Level Contract: Destroy Outlaw Infrastructure <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
Foxwell_bombingrun_M_desc_001=We're in need of a sharp contractor for a hit and run operation. Client says some local thugs have been congregating in concerning numbers and we have been tasked with disrupting their base of operations.\n\nGet on over to <EM4>~mission(Location|Address)</EM4> and take out their fuel tanks. If you're successful we can set these folks plans back a while, and most importantly, without having to deal with them directly.\n\nReports are showing there's a couple of ships buzzing around the area and some defense turrets. Just focus on the fuel tanks and you should be alright.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_bombingrun_M_title_001=Orange Level Contract: Take Out Fuel Supplies <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
Foxwell_bombingrun_S_desc_001=We are looking for a highly competent mercenary team to assist with a challenging demolition for a VIP client.\n\nThe outlaws operating at <EM4>~mission(Location|Address)</EM4> has been identified as a threat of growing concern in the area and to help deal with this situation your team is being tasked with taking out the fuel tanks at the location. \n\nHowever, it won't be as easy as just slipping in and out - expect to deal with multiple hostiles and turrets that will be expecting you. The stronger your crew the better your chances at completing this operation successfully.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_bombingrun_S_title_001=Red Level Contract: Destroy Outlaw Infrastructure <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
Foxwell_bombingrun_VE_desc_001=A bunch of outlaws have been harassing our client and recently things have taken a turn for the worse. They've taken over their property and we've exhausted all other options.\n\nWe need a decent pilot to head to <EM4>~mission(Location|Address)</EM4> and take out their fuel tanks. If you can cut off their supplies, you can pave the way for the client to take back their property.\n\nThis shouldn't be a tough one. You might run into a ship or two and maybe a few turrets, but you've been authorized to use lethal force. All we need for you to do is get in there, get the fuel tanks, and get out.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_bombingrun_VE_title_001=Yellow Level Contract: Limiting Potential Threat <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_bombingrun_VH_desc_001=Foxwell have been hired by a client to take part in a multi-stage operation on a known outlaw base at <EM4>~mission(Location|Address)</EM4> and need a strong pilot to play their part in this.\n\nYou, and whatever additional support ships you arrange, will be tasked with taking out the fuel tanks located there to set the stage for the rest of the operation to follow. \n\nUnfortunately, this place is swarming with ships and anti-air turrets. So make sure you and your people are ready, and remember, the fuel tanks are your priority. No need to be a hero.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_bombingrun_VH_title_001=Red Level Contract: Fuel Container Demolition <EM4>[BP]</EM4> <EM4>[250 Rep]</EM4>
GFS_ShipWaveAttack_Mission01_Desc=Looking to gain critical hands-on experience battling a variety of targets and situations? Then my Combat Gauntlet might be the perfect fit for you.\n\nPlease understand that this course is intended for pilots who have already mastered flying basics and are ready to take their abilities to the next level. If you’re starting off and want to learn the ropes, I’d recommend logging some hours in an Arena Commander simpod. But for those ready to face a real challenge, I firmly believe that students learn best by doing. \n\nThat’s why I’ve designed these eight scenarios to be as realistic as possible. I promise you this is the closest thing to Navy combat pilot training you can get without enlisting, so don’t expect a lot of hand holding. <EM4>The risk of injury to yourself or your ship should be taken very seriously.</EM4>\n\nGAUNTLET SCENARIOS:\n1. Single Targets\n2. Multiple Targets\n3. Target Priority\n4. Target Stealth\n5. Missiles and Countermeasures\n6. Multi-Crew Targets\n7. Corvette with Escorts\n8. Capital Ship Encounter\n\nSo, if you’re ready to challenge yourself and prove you got what it takes to be a great pilot, the first scenario will focus on handling a single target. Head to <EM4>~mission(Location|Address)</EM4> to begin.\n\nAs a bonus, successful completion of the scenario will net the original contractor holder an award of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nTRICKS OF THE TRADE:\n- Situational Awareness – Don’t get so focused on taking a target that you aren’t watching your flight path. No good taking out the enemy if you fly headfirst into an asteroid.\n\nGood luck out there, \nInstructor Gilly    \n\n\nABOUT GILLY’S FLIGHT SCHOOL \nInstructor Lucas “Gilly” Baramsco has served in six squadrons and has over ten years of teaching experience. Whether a student with zero flight experience or a professional looking to polish their skills, Gilly Flight School offers a variety of courses to “Launch Your Piloting Career.” \n\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3
GFS_ShipWaveAttack_Mission01_Title=Combat Gauntlet - Scenario #1
GFS_ShipWaveAttack_Mission02_Desc=Congrats on completing part one of this eight-part course.\n\nScenario two will focus on how to deal with multiple targets at the same time. Goal here is give you a better handle on how to balance offense and defense.   \n\nWhenever you’re set, grab a combat ship, and head to <EM4>~mission(Location|Address)</EM4> to begin.\n\nAs a bonus, successful completion of the scenario will net the original contractor holder an award of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nTRICKS OF THE TRADE:\n- Pick Your Fight - For situations where you’re coming up against multiple targets of equal threat, your best strategy is to focus on neutralizing one target at a time to gradually reduce the amount of incoming fire.\n\nGood luck out there, \nInstructor Gilly     \n\n\nABOUT GILLY’S FLIGHT SCHOOL  \nInstructor Lucas “Gilly” Baramsco has served in six squadrons and has over ten years of teaching experience. Whether a student with zero flight experience or a professional looking to polish their skills, Gilly Flight School offers a variety of courses to “Launch Your Piloting Career.”\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3
GFS_ShipWaveAttack_Mission02_Title=Combat Gauntlet - Scenario #2
GFS_ShipWaveAttack_Mission03_Desc=Congrats on completing part two of this eight-part course.   \n\nThe third scenario throws tactical considerations into the mix. This time around the attacking ships are from distinct classes with distinct battlefield applications. Knowing what targets to prioritize is vital to surviving engagements against multiple ships.      \n\nWhenever you’re ready, head to <EM4>~mission(Location|Address)</EM4> to get started.\n\nAs a bonus, successful completion of the scenario will net the original contractor holder an award of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nTRICKS OF THE TRADE:\n- Bigger They Are – Try to evaluate which threat is the most dangerous and take them out first.\n- Shields – If you’re taking a lot of damage, don’t be afraid to boost away and let your shields regenerate.\n\nGood luck out there, \nInstructor Gilly     \n\n\nABOUT GILLY’S FLIGHT SCHOOL  \nInstructor Lucas “Gilly” Baramsco has served in six squadrons and has over ten years of teaching experience. Whether a student with zero flight experience or a professional looking to polish their skills, Gilly Flight School offers a variety of courses to “Launch Your Piloting Career.”\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4
GFS_ShipWaveAttack_Mission03_Title=Combat Gauntlet - Scenario #3
GFS_ShipWaveAttack_Mission04_Desc=Congrats on completing part three of this eight-part course.\n\nGood combat pilots know not all threats are apparent. It’s the threats you don’t expect that can be the most devastating. Scenario four is focused on how to identify and deal with stealth targets. Hopefully by the end, you’ll understand just how important your radar is in determining who you’re really up against. Expect to have regular and stealth ships hunting you down.    \n\nMake your way to <EM4>~mission(Location|Address)</EM4> whenever you’re ready, and remember to keep your eyes on your radar.\n\nAs a bonus, successful completion of the scenario will net the original contractor holder an award of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nTRICKS OF THE TRADE:\n- Surprise Attacks - Pinging your surroundings can sometimes reveal hidden ships. Be ready for contacts to show up unexpectedly.\n\nGood luck out there, \nInstructor Gilly     \n\n\nABOUT GILLY’S FLIGHT SCHOOL  \nInstructor Lucas “Gilly” Baramsco has served in six squadrons and has over ten years of teaching experience. Whether a student with zero flight experience or a professional looking to polish their skills, Gilly Flight School offers a variety of courses to “Launch Your Piloting Career.”\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4
GFS_ShipWaveAttack_Mission04_Title=Combat Gauntlet - Scenario #4
GFS_ShipWaveAttack_Mission05_Desc=Congrats on completing part four of this eight-part course.   \n\nThe fifth scenario focuses on defensive tactics. Knowing when to take evasive measures and deploy either decoys or noise countermeasures is essential to your survival. That’s why the aggressors in this exercise will be armed with missiles.   \n\nEnsure your countermeasures are fully stocked and then go to <EM4>~mission(Location|Address)</EM4> to start.\n\nAs a bonus, successful completion of the scenario will net the original contractor holder an award of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nTRICKS OF THE TRADE:\n- Ready to Launch - Easy access to your decoys and countermeasures can be critical in your success in dealing with incoming missile fire. \n- Stand and Fight - Resist the temptation to hit the afterburner to escape as you’ll increase your signature and make it easier for the missile to hit you. They’re almost certainly much faster than you anyway.\n- Close the Gap – While it may seem counterintuitive, getting closer to an enemy ship can be an advantage. Missiles have a minimum range and if you’re inside of it they won’t be able to get a lock on you.\n\nGood luck out there, \nInstructor Gilly     \n\n\nABOUT GILLY’S FLIGHT SCHOOL  \nInstructor Lucas “Gilly” Baramsco has served in six squadrons and has over ten years of teaching experience. Whether a student with zero flight experience or a professional looking to polish their skills, Gilly Flight School offers a variety of courses to “Launch Your Piloting Career.”\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4
GFS_ShipWaveAttack_Mission05_Title=Combat Gauntlet - Scenario #5
GFS_ShipWaveAttack_Mission06_Desc=Congrats on completing part five of this eight-part course.\n\nI’m bringing out the big guns for scenario six. Time for you to go up against larger, multi-crewed ships, which provide a few new challenges. Not only will you have to contend with their enhanced firepower but their multifaceted shields means you’ll have to target one shield face continually to do real damage. Easier said than done when both of y’all are moving at such fast speeds.      \n\nFind your way to <EM4>~mission(Location|Address)</EM4> whenever you're ready.\n\nAs a bonus, successful completion of the scenario will net the original contractor holder an award of <EM4>~mission(ScripAmount) MG Scrip</EM4>. \n\nTRICKS OF THE TRADE:\n- Size Advantage – When going up against a larger ship, try to stay away from their front as typically this is where the majority of their offensive fire is located. \n\nGood luck out there, \nInstructor Gilly     \n\n\nABOUT GILLY’S FLIGHT SCHOOL   \nInstructor Lucas “Gilly” Baramsco has served in six squadrons and has over ten years of teaching experience. Whether a student with zero flight experience or a professional looking to polish their skills, Gilly Flight School offers a variety of courses to “Launch Your Piloting Career.”\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x3
GFS_ShipWaveAttack_Mission06_Title=Combat Gauntlet - Scenario #6
GFS_ShipWaveAttack_Mission07_Desc=Congrats on completing part six of this eight-part course.\n\nYou’ve gained a lot of experience across the past six scenarios, and now it’s time to put it all to practice. Scenario seven puts you up against a corvette-class ship and its escorts. This extended encounter will push you to the limit and test everything you got.   \n\nThe only thing left is to understand the limit of your skillset. To put it simply, you can’t do everything yourself. Developing and maintaining relationships with fellow pilots that you can call upon for support is really the last piece of the puzzle. Not saying you can't overcome encounters like this by yourself, but even the Navy doesn’t send their ace pilots on a patrol alone.    \n\nOnce you decided whether to do this alone or call in some support, head over to <EM4>~mission(Location|Address)</EM4> to kick off the encounter.\n\nAs a bonus, successful completion of the scenario will net the original contractor holder an award of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nTRICKS OF THE TRADE\n- Strength in Diversity – Think about the roles your allies will be filling and choose who to bring carefully to help balance strengths and weaknesses. You’ll want ships capable of taking on the Corvette while others deal with the escort.\n\nGood luck out there, \nInstructor Gilly     \n\n\nABOUT GILLY’S FLIGHT SCHOOL   \nInstructor Lucas “Gilly” Baramsco has served in six squadrons and has over ten years of teaching experience. Whether a student with zero flight experience or a professional looking to polish their skills, Gilly Flight School offers a variety of courses to “Launch Your Piloting Career.”\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x4
GFS_ShipWaveAttack_Mission07_Title=Combat Gauntlet - Scenario #7
GFS_ShipWaveAttack_Mission08_Desc=Welcome to the final scenario of the Combat Gauntlet.\n\nThroughout this course, you’ve gotten to experience the advanced combat and defensive tactics needed to survive a variety of encounters. Time to take all those new skills and knowledge and see how they hold up against a large capital vessel and some escort ships.\n\nYou know the drill by now. Once you and all your allies are set, find your way to <EM4>~mission(Location|Address)</EM4> to see how you do when truly pushed to the limits.\n\nAs a bonus, successful completion of the scenario will net the original contractor holder an award of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nTRICKS OF THE TRADE\n- Patience is a Virtue – If you’ve balanced your squadron properly, you should be able to come out on top, just don’t expect it to be a quick fight. Ships this big don’t go down quickly.\n\nGood luck out there, \nInstructor Gilly     \n\n\nABOUT GILLY’S FLIGHT SCHOOL   \nInstructor Lucas “Gilly” Baramsco has served in six squadrons and has over ten years of teaching experience. Whether a student with zero flight experience or a professional looking to polish their skills, Gilly Flight School offers a variety of courses to “Launch Your Piloting Career.”\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 7/7 | Risk 7/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x5
GFS_ShipWaveAttack_Mission08_Title=Combat Gauntlet - Scenario #8
GMCapture_Desc=To test the preparedness of our response teams, we would like volunteers to simulate an assault against a CDF Idris by neutralizing and taking control of the vessel.\n\nTo be clear, the goal of the exercise is not to destroy the Idris, but for you to attempt to board the craft and maintain control of it as long as possible. Volunteers should expect to meet full resistance from the Idris' highly trained crew and are encouraged to get an updated imprint beforehand.\n\nCoordinates will be provided upon confirming your participation.\n\nThanks and good luck.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
