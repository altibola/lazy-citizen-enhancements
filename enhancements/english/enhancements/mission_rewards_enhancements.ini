HeadHunters_DefendEntitesAndEscort_M_Desc=A new gang who is proving to be a real pain in the ass for the Headhunters just upped the stakes by attacking the <EM4>~mission(Objects)</EM4> at <EM4>~mission(Location|Address)</EM4>. Never a good thing since we got interest in the welfare of the folks there, but doubly so because if they do too much damage it might royally screw an upcoming operation.\n\nHead over there as soon as you're able and stop the attack before they can do any lasting damage. And if any <EM4>friendly ships</EM4> need a hand, I want you to look out for them too. Don't expect this gang to be pushovers but you should still be able to deal with them if you keep your head on.\n \nIf you need any extra motivation, I’m adding <EM4>~mission(ScripAmount) Council Scrip</EM4> for the main contractor.\n\n- Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Nyx]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [CIV-S0-B] Kelvid\n- [CIV-S0-D] Winter-Star SL\n- [CIV-S1-B] Cryo-Star\n- [CIV-S1-B] Endo\n- [CIV-S1-B] FlashFreeze\n- [CIV-S1-D] BlastChill\n- [CIV-S1-D] Winter-Star\n- [CIV-S2-B] Cryo-Star EX\n- [CIV-S2-B] FullFrost\n- [CIV-S2-B] Taiga\n- [CIV-S2-D] WhiteOut\n- [CIV-S2-D] Winter-Star EX\n- [CIV-S3-B] Cryo-Star XL\n- [CIV-S3-B] FrostBite\n- [CIV-S3-D] ColdSurge\n- [CIV-S3-D] Winter-Star XL\n\n<EM4>[Pyro]</EM4>\n- [CIV-S0-D] DuraJet\n- [CIV-S1-D] ZapJet\n- [CIV-S2-A] Lotus\n- [CIV-S2-D] SparkJet\n- [CIV-S3-A] TigerLilly\n- [CIV-S3-D] SparkJet Pro\n- [IND-S0-B] Defiant\n\n<EM4>[Stanton]</EM4>\n- [CIV-S0-C] PIN\n- [CIV-S1-B] 6SA 'Arbiter'\n- [CIV-S1-B] HEX\n- [CIV-S1-C] 5SA 'Rhada'\n- [CIV-S1-C] WEB\n- [CIV-S2-B] 6MA 'Kozane'\n- [CIV-S2-B] BLOC\n- [CIV-S2-C] 5MA 'Chimalli'\n- [CIV-S2-C] STOP\n- [CIV-S3-B] 6CA 'Bila'\n- [CIV-S3-C] 5CA 'Akura'\n- [CIV-S3-C] GUARD\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4>