Foxwell_EliminateSpecific_NonHostiles_desc_001=Got a line on a bounty named <EM4>~mission(TargetName)</EM4>. Someone spotted them along with known criminal accomplices at <EM4>~mission(Location|Address)</EM4>. Need you to get there before they get going. \n\n<EM4>~mission(TargetName|Last)</EM4> has a reputation for only showing their face in places with civs. Really need you to take down this bounty without there being any civilian collateral damage. Foxwell can’t afford to be caught in the shitstorm that would erupt over the loss of innocent life. \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4\n<EM4>Security Trainee:</EM4> +1,000 Rep\n<EM4>Failure Penalty:</EM4> -500 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
