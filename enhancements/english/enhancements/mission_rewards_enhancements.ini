mtps_UGF_eliminateall_desc_001=ABOUT THE JOB\nmicroTech Protection Services is looking for a detail-oriented security professional who can quickly and safely assist us in the complete removal of illegal occupants who have temporarily gained control of ~mission(Location|Address).\n\nRESPONSIBILITIES\n• Provide own transportation to ~mission(Location|Address).\n• Remove all illegal occupants found within the site; using force as necessary.\n\nMINIMUM QUALIFICATIONS\n• 2 years of combined mercenary and/or security experience.\n• Access to combat equipment and mode of transport.\n• Available for immediate deployment.\n\nPREFERRED QUALIFICATIONS\n• Experience with rapid hostility de-escalation techniques.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
mtps_UGF_eliminateall_nocivs_desc_001=ABOUT THE JOB\nmicroTech Protection Services is looking for a detail-oriented mercenary professional who can quickly and safely assist us in the complete removal of illegal occupants who have temporarily gained control of ~mission(Location|Address).\n\nBe aware that our intel shows there are civilian workers onsite. Since their connection with the gang is unclear, they should be considered non-combatants. Any hostile action towards them will not be tolerated. \n\nRESPONSIBILITIES\n• Provide own transportation to ~mission(Location|Address).\n• Remove all hostile occupants found within the site; using force if necessary.\n• Ensure the safety of any civilians who may be onsite. \n\nMINIMUM QUALIFICATIONS\n• 2 years of combined mercenary and/or security experience.\n• Access to combat equipment and mode of transport.\n• Available for immediate deployment.\n\nPREFERRED QUALIFICATIONS\n• Experience with rapid hostility de-escalation techniques.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13\n<EM4>Friendlies:</EM4> Civilians x4
mtps_UGF_eliminateall_title_001=Remove Illegal Occupants <EM4>[500 Rep]</EM4>
mtps_bounty_desc_ERT=ABOUT THE JOB\nmicroTech Protection Services is looking for a qualified bounty hunter to apprehend the extreme-risk target ~mission(TargetName) from ~mission(Location|Address). \n\nAn extreme-risk target typically pilots a sub-capital class vessel, has several heavily-armed allies, and is expected to be very difficult to apprehend. It may be useful to bring along support staff to assist with engaging this target.\n\nRESPONSIBILITIES\n• Provide own transportation to ~mission(Location|Address).\n• Neutralize ~mission(TargetName); using force as necessary.\n\nMINIMUM QUALIFICATIONS\n• Bounty Hunters Guild membership and appropriate certification.\n• Access to vehicle suitably outfitted for combat.\n• Available for immediate deployment.\n\nPREFERRED QUALIFICATIONS\n• Ability to handle high pressure situations.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
mtps_bounty_desc_HRT=ABOUT THE JOB\nmicroTech Protection Services is looking for a qualified bounty hunter to apprehend the high-risk target ~mission(TargetName) from ~mission(Location|Address). \n\nA high-risk target typically pilots a large multicrew vessel, has several known allies, and is expected to be difficult to apprehend. It may be useful to bring along support staff to assist with engaging this target.\n\nRESPONSIBILITIES\n• Provide own transportation to ~mission(Location|Address).\n• Neutralize ~mission(TargetName); using force as necessary.\n\nMINIMUM QUALIFICATIONS\n• Bounty Hunters Guild membership and appropriate certification.\n• Access to vehicle suitably outfitted for combat.\n• Available for immediate deployment.\n\nPREFERRED QUALIFICATIONS\n• Ability to handle high pressure situations.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
mtps_bounty_desc_LRT=ABOUT THE JOB\nmicroTech Protection Services is looking for a qualified bounty hunter to apprehend the low-risk target ~mission(TargetName) from ~mission(Location|Address). \n\nA low-risk target typically pilots a single seater craft, has several known allies, and should be straightforward to apprehend.\n\nRESPONSIBILITIES\n• Provide own transportation to ~mission(Location|Address).\n• Neutralize ~mission(TargetName); using force as necessary.\n\nMINIMUM QUALIFICATIONS\n• Bounty Hunters Guild membership and appropriate certification.\n• Access to vehicle suitably outfitted for combat.\n• Available for immediate deployment.\n\nPREFERRED QUALIFICATIONS\n• Ability to handle high pressure situations.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
mtps_bounty_desc_MRT=ABOUT THE JOB\nmicroTech Protection Services is looking for a qualified bounty hunter to apprehend the moderate-risk target ~mission(TargetName) from ~mission(Location|Address). \n\nA moderate-risk target typically pilots a small multicrew vessel, has several known allies, and may be slightly difficult to apprehend.\n\nRESPONSIBILITIES\n• Provide own transportation to ~mission(Location|Address).\n• Neutralize ~mission(TargetName); using force as necessary.\n\nMINIMUM QUALIFICATIONS\n• Bounty Hunters Guild membership and appropriate certification.\n• Access to vehicle suitably outfitted for combat.\n• Available for immediate deployment.\n\nPREFERRED QUALIFICATIONS\n• Ability to handle high pressure situations.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
mtps_bounty_desc_VLRT=ABOUT THE JOB\nmicroTech Protection Services is looking for a qualified bounty hunter to apprehend the very low-risk target ~mission(TargetName) from ~mission(Location|Address). \n\nA very low-risk target typically pilots a single seater craft, has few known allies, and should be relatively easy to apprehend.\n\nRESPONSIBILITIES\n• Provide own transportation to ~mission(Location|Address).\n• Neutralize ~mission(TargetName); using force as necessary.\n\nMINIMUM QUALIFICATIONS\n• Bounty Hunters Guild membership and appropriate certification.\n• Access to vehicle suitably outfitted for combat.\n• Available for immediate deployment.\n\nPREFERRED QUALIFICATIONS\n• Ability to handle high pressure situations.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x1, Targets x1
