bhg_bounty_desc_ShatteredBlade_001=--------------------------------------------------------\n-------------- BOUNTY CONTRACT ---------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nSYSTEM: Nyx\nRISK ASSESSMENT: High\nLAST KNOWN LOCATION:  ~mission(Location|Address)\nKNOWN AFFILIATIONS: Shattered Blade\nNOTES: The Shattered Blade are known for targeting Vanduul in order to acquire and sell black market tech, however they also have been reported to use violence against authority figures who interfere in their affairs.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Defenders x18, Targets x2\n<EM4>Probationary Guild Member:</EM4> +500 Rep (Failure: -250)\n<EM4>Probationary Guild Member:</EM4> +1,000 Rep (Failure: -500)\n<EM4>Probationary Guild Member:</EM4> +2,000 Rep (Failure: -1,000)\n<EM4>Probationary Guild Member:</EM4> +8,000 Rep (Failure: -4,000)\n<EM4>Probationary Guild Member:</EM4> +16,000 Rep (Failure: -8,000)\n<EM4>Blueprint Reward:</EM4> Guaranteed
