Hockrow_FacilityDelve_P2M3_Repeat_desc=Hockrow Agency \nCase File #JD10285\nLead Investigator: Arken Mallor\n\nCase Update: \nOne of the biggest issue when it comes to ongoing investigations is intel growing stale. To help alleviate that, I’m going to have you head back into Onyx and grab the latest seismic sensor data. Would be good to see what the latest readings say.\n\nContract Investigator Actions:\nExplore the <EM4>Research</EM4> wing and <EM4>retrieve the Seismic data</EM4> and deliver it to <EM4>~mission(Destination|Address)</EM4>.\n\nAdditional Notes:\nBe wary of possible hostile forces on site.\n \nTravel to Onyx in a vehicle that can be stored in a large hangar.\n\nOnce you hand off this data, I'll send you a <EM4>ASD Secure Drive</EM4> that you can collect at your home location.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Zenith "Thunderstrike" Laser Sniper Rifle\n- [S1-A] Corbel Arms Halcyon\n- [S1-A] Corbel Core Halcyon\n- [S1-A] Corbel Helmet Halcyon\n- [S1-A] Corbel Legs Halcyon\n- [S1-A] Geist Armor Arms Desert\n- [S1-A] Geist Armor Arms Whiteout\n- [S1-A] Geist Armor Core Desert\n- [S1-A] Geist Armor Core Whiteout\n- [S1-A] Geist Armor Helmet Desert\n- [S1-A] Geist Armor Helmet Whiteout\n- [S1-A] Geist Armor Legs Desert\n- [S1-A] Geist Armor Legs Whiteout\n- [S1-A] Zenith Laser Sniper Rifle Battery (22 Cap)\n- [S3-A] Novikov Backpack Halcyon\n\n<EM3>ITEM REWARDS</EM3>\n- ASD Secure Drive\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
