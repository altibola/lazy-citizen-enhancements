cfp_defendship_VLRT_SB_desc_001=Received an emergency comm from a ship saying that the Shattered Blade are harassing them. Believe the pilot got their attention by getting a little too close to their territory. The pilot admitted that they don’t have a lot of combat experience, so I’m not sure how much longer they can hold out.\n\nCould you head to <EM4>~mission(Location|Address)</EM4> now to help them survive the attack?\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x2\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
