UDM_courier_fromdc_med_desc_001=Greetings Qualified Shipping Partner!\n\nToday’s the perfect day to gain some additional firsthand shipping experience.\n\nIf you have a ship with adequate storage, there are a fair number of packages in the ~mission(Pickup1) at ~mission(Pickup1|Address) ready to be delivered. \n\nTalk about a great opportunity for career growth.\n\nPACKAGES FOR PICK UP \n     · All Packages in the <EM4>~mission(Pickup1)</EM4> at <EM4>~mission(Pickup1|Address)</EM4>\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> to the <EM4>~mission(Dropoff3|Address)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> to the <EM4>~mission(Dropoff4|Address)</EM4>\n     · Package <EM4>#~mission(Item5|SerialNumber)</EM4> to the <EM4>~mission(Dropoff5|Address)</EM4> \n     · Package <EM4>#~mission(Item6|SerialNumber)</EM4> to the <EM4>~mission(Dropoff5|Address)</EM4>\n     · Package <EM4>#~mission(Item7|SerialNumber)</EM4> to the <EM4>~mission(Dropoff6|Address)</EM4>\n     · Package <EM4>#~mission(Item8|SerialNumber)</EM4> to the <EM4>~mission(Dropoff6|Address)</EM4>\n     · Package <EM4>#~mission(Item9|SerialNumber)</EM4> to the <EM4>~mission(Dropoff7|Address)</EM4>\n     · Package <EM4>#~mission(Item10|SerialNumber)</EM4> to the <EM4>~mission(Dropoff7|Address)</EM4>\n\nLooking forward to working with you,\n\nUnified Distribution Management\n -Delivering the Total Package-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
UDM_courier_fromdc_small_desc_001=Greetings Qualified Shipping Partner!\n\nIf you’re on the hunt for a straightforward way to earn credits, then look no further! There are a few packages waiting to be delivered in the ~mission(Pickup1|Address) at ~mission(Pickup1).\n\nPACKAGES FOR PICK UP \n     · All Packages in the <EM4>~mission(Pickup1)</EM4> at <EM4>~mission(Pickup1|Address)</EM4>\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> to the <EM4>~mission(Dropoff3|Address)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> to the <EM4>~mission(Dropoff4|Address)</EM4>\n     · Package <EM4>#~mission(Item5|SerialNumber)</EM4> to the <EM4>~mission(Dropoff5|Address)</EM4> \n\nLooking forward to working with you,\n\nUnified Distribution Management\n -Delivering the Total Package-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_courier_todc_med_desc_001=Greetings Qualified Shipping Partner!\n\nReady to try your hand delivering a fairly sizeable shipment of packages? Then how about you assist with taking this allotment to the ~mission(Dropoff1) at ~mission(Dropoff1|Address). Just clear enough space on your ship first and you should be all set!\n\nPACKAGES FOR PICK UP (ANY ORDER) \n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> from the <EM4>~mission(Pickup3|Address)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> from the <EM4>~mission(Pickup4|Address)</EM4>\n     · Package <EM4>#~mission(Item5|SerialNumber)</EM4> from the <EM4>~mission(Pickup5|Address)</EM4>\n     · Package <EM4>#~mission(Item6|SerialNumber)</EM4> from the <EM4>~mission(Pickup5|Address)</EM4>\n     · Package <EM4>#~mission(Item7|SerialNumber)</EM4> from the <EM4>~mission(Pickup6|Address)</EM4>\n     · Package <EM4>#~mission(Item8|SerialNumber)</EM4> from the <EM4>~mission(Pickup6|Address)</EM4>\n     · Package <EM4>#~mission(Item9|SerialNumber)</EM4> from the <EM4>~mission(Pickup7|Address)</EM4>\n     · Package <EM4>#~mission(Item10|SerialNumber)</EM4> from the <EM4>~mission(Pickup7|Address)</EM4>\n\nDROP OFF LOCATION\n     · All Packages delivered to the <EM4>~mission(Dropoff1)</EM4> at <EM4>~mission(Dropoff1|Address)</EM4>\n\nLooking forward to working with you,\n\nUnified Distribution Management\n -Delivering the Total Package-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
UDM_courier_todc_small_desc_001=Greetings Qualified Shipping Partner!\n\nInterested in a simple shipping route without a lot of complications? Then taking a few packages to the ~mission(Dropoff1) at ~mission(Dropoff1|Address) should be the perfect job for you!\n\nPACKAGES FOR PICK UP (ANY ORDER) \n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> from the <EM4>~mission(Pickup3|Address)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> from the <EM4>~mission(Pickup4|Address)</EM4>\n     · Package <EM4>#~mission(Item5|SerialNumber)</EM4> from the <EM4>~mission(Pickup5|Address)</EM4>\n\nDROP OFF LOCATION\n     · All Packages delivered to the <EM4>~mission(Dropoff1)</EM4> at <EM4>~mission(Dropoff1|Address)</EM4>\n\nLooking forward to working with you,\n\nUnified Distribution Management\n -Delivering the Total Package-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_internaldelivery_dc_desc_001=Greetings Qualified Package Handler!\n\nExcited to delve into the complex world of storage management and facility realignment? Then don’t miss this chance to assist with organizing the following packages at <EM4>~mission(Location|Address)</EM4>.\n\nPACKAGES FOR PICK UP (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2)</EM4>\n\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2)</EM4>\n\nIf this sounds like something you're interested in, please accept this offer right away! \n\nLooking forward to working with you,\n\nUnified Distribution Management\n -Delivering the Total Package-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_internaldelivery_dc_desc_003=Greetings Qualified Package Handler!\n\nReady to tackle a challenging yet rewarding job in a shipping adjacent compacity? Then we have a perfect opportunity for you at <EM4>~mission(Location|Address)</EM4>. \n\nPACKAGES FOR PICK UP (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> from the <EM4>~mission(Pickup3)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> from the <EM4>~mission(Pickup4)</EM4>\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> to the <EM4>~mission(Dropoff3)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> to the <EM4>~mission(Dropoff4)</EM4>\n\nSo pick up that contract and let's get to work.\n\nLooking forward to working with you,\n\nUnified Distribution Management\n -Delivering the Total Package-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
UDM_internaldelivery_dc_desc_005=Greetings Qualified Package Handler!\n\nWhile they might not be going too far, the following packages at <EM4>~mission(Location|Address)</EM4> still need to be handled with expert care. Are you the expert we’re looking for?\n\nPACKAGES FOR PICK UP (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> from the <EM4>~mission(Pickup3)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> from the <EM4>~mission(Pickup4)</EM4>\n     · Package <EM4>#~mission(Item5|SerialNumber)</EM4> from the <EM4>~mission(Pickup5)</EM4>\n     · Package <EM4>#~mission(Item6|SerialNumber)</EM4> from the <EM4>~mission(Pickup6)</EM4>\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> to the <EM4>~mission(Dropoff3)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> to the <EM4>~mission(Dropoff4)</EM4>\n     · Package <EM4>#~mission(Item5|SerialNumber)</EM4> to the <EM4>~mission(Dropoff5)</EM4> \n     · Package <EM4>#~mission(Item6|SerialNumber)</EM4> to the <EM4>~mission(Dropoff6)</EM4>\n\nAll you need to do is accept the contract and you'll be on your way.\n\nLooking forward to working with you,\n\nUnified Distribution Management\n -Delivering the Total Package-\n\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000
