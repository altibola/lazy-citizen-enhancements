HeadHunters_RecoverCargo_Easy_Description=Managed to intercept a ship carrying some goods over at <EM4>~mission(Location|Address)</EM4> but we hit a snag - our guys didn’t have enough space in their ships to store it. You wanna make some quick creds? Head over there and grab the stuff. Could be a few scavs there by now so be on your guard.\n\nJust don’t forget to bring a <EM4>heavy-duty tractor beam</EM4> as that shit’s heavy.\n\nWhen you’re done, drop it off at the freight elevator at <EM4>~mission(Destination|Address)</EM4> and we’ll take care of the rest.\n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Unknown:</EM4> 1\n<EM4>Jr. Contractor:</EM4> +100 Rep
HeadHunters_RecoverCargo_Easy_Title=Taking what’s ours <EM4>[100 Rep]</EM4>
HeadHunters_RecoverCargo_Hard_Description=Looking for a hauler to pick up some cargo for me. Thing is, there’s a catch.\n\nThe cargo’s in the back of an abandoned ship located at <EM4>~mission(Location|Address)</EM4>. As you may have figured, this ain’t our cargo, but it sure as hell doesn’t deserve to go to anyone else. I’ll be damned if those CFP assholes get their hands on it before we do.\n\nBe lucky as hell if we were the first to know about this, but I’d wager there’s gonna be more ships swarming around there than flies on a kopion carcass. If you got some pals you can trust, bring them along and ghost those assholes. And don’t forget your <EM4>heavy-duty tractor beam</EM4> of course.\n\nYou manage to get that cargo and bring it to the freight elevator at <EM4>~mission(Destination|Address)</EM4>, I can get you a nice cut of the sale.\n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Unknown:</EM4> 1\n<EM4>Sr. Contractor:</EM4> +200 Rep
HeadHunters_RecoverCargo_Hard_Title=Jackpot <EM4>[200 Rep]</EM4>
HeadHunters_RecoverCargo_Medium_Description=One of our pilots was supposed to bring a shipment back to us, but seems like he got into some trouble over at <EM4>~mission(Location|Address)</EM4>. Either he got his brains blasted all over the cockpit, or freaked out and ditched his ship. For his sake, I hope it’s the first one so I don’t have the hunt this asshole down. What’s important right now is that our cargo’s just sitting out there.\n\nIf you’ve got a <EM4>heavy-duty tractor beam</EM4> and a decent ship, can you head over there and get our stuff? Chances are the assholes who attacked my pilot are still there, and I’m betting they’re pretty tough.\n\nIf you get out alive, take the cargo to the freight elevator at ~mission(Destination|Address) and I’ll get you paid.\n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Unknown:</EM4> 1\n<EM4>Contractor:</EM4> +150 Rep
HeadHunters_RecoverCargo_Medium_Title=Finish the job <EM4>[150 Rep]</EM4>
HeadHunters_RecoverCargo_Super_Description=This’ll be a fun one for you. We just got word that a transport ship has broken down at <EM4>~mission(Location|Address)</EM4>. Only problem is, every skag and their mother seems to know about it. Place is crawling with all kinds of outlaws trying to get their hands on the cargo onboard. That’s where you come in.\n\nIf you can get your best pilots together and <EM4>a heavy-duty tractor beam</EM4> you can take out the competition and snag the cargo. It ain’t gonna be easy though. One of my scouts said the assholes guarding this ship have got some serious tech on them.  \n\nI’ve already got a buyer waiting, you just need to take the cargo to the freight elevator at <EM4>~mission(Destination|Address)</EM4> and I’ll send you the creds.\n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Unknown:</EM4> 1\n<EM4>Head Contractor:</EM4> +300 Rep
HeadHunters_RecoverCargo_Super_Title=Worth the trouble <EM4>[300 Rep]</EM4>
HeadHunters_RecoverCargo_VeryEasy_Description=Just got word of an abandoned ship with a fat stack of cargo ripe for the pluckin’. If you’re interested, you’ll need to head to <EM4>~mission(Location|Address)</EM4>. Word might have gotten around, so there’s probably some skags hanging around, but just ghost them and get the stash.\n\nBring the cargo to the freight elevator at ~mission(Destination|Address) and I’ll get you your creds.\n\nMake sure you got a <EM4>heavy-duty tractor beam</EM4> on you too, no idea how big or small that cargo is.\n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2\n<EM4>Unknown:</EM4> 1\n<EM4>Neutral:</EM4> +50 Rep
HeadHunters_RecoverCargo_VeryEasy_Title=Grab ‘n’ go <EM4>[50 Rep]</EM4>
HeadHunters_RecoverCargo_VeryHard_Description=Here’s the thing, I got a situation over at <EM4>~mission(Location|Address)</EM4> and need someone with a brain between their ears to sort it out for me. Former pilot of mine thought he could cut a deal with another gang and unsurprisingly it didn’t work out for him. Now my cargo is sitting idle and being guarded by a whole bunch of nullbrains waiting for their hauler to come pick it up.\n\nNeed you to head there with a <EM4>heavy-duty tractor beam</EM4> and a strong crew to get my shit back before its gone for good.\n\nTake it all to the freight elevator at <EM4>~mission(Destination|Address)</EM4> and I’ll give you a generous cut of the takings.\n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Unknown:</EM4> 1\n<EM4>Veteran Contractor:</EM4> +200 Rep
HeadHunters_RecoverCargo_VeryHard_Title=Getting what we deserve <EM4>[200 Rep]</EM4>
HeadHunters_ShipAmbush_E_desc_001=Any interest in taking out a <EM4>~mission(AmbushTarget)</EM4> for us? \n\nShouldn’t be too much trouble. We’ve already done the legwork and figured out that they're scheduled to pass by <EM4>~mission(Location|Address)</EM4> soon. Just go dark in the nearby emission cloud and you’ll get a good jump on ‘em.  \n\nThey might roll through solo or with some friends. All would be single-seaters but they can hold their own in a dogfight. We’ll drop some forces in the region who can provide support once the fun starts.\n\nYou pull this off and I'll toss <EM4>~mission(ScripAmount) Council Scrip</EM4> to the main contractor for a job well done.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x2, Hostile Wave x7, Targets x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +1,000 Rep
HeadHunters_ShipAmbush_E_title_001=Silent Strike <EM4>[100–1,000 Rep]</EM4>
HeadHunters_ShipAmbush_H_desc_001=A squad of ships recently shanked one of our convoys, and ten credits says they’re gonna try and do it again. Looking for someone to launch a reprisal attack before that can happen.  \n\nWe’ve ID’d the idiots as consisting of several large craft and a sizable escort. We believe the leader is flying a <EM4>~mission(AmbushTarget)</EM4> and set that ship as the primary target. Since it’s a sizable and aggressive squad, a surprise attack seems like a smart play. They often pass by <EM4>~mission(Location|Address)</EM4>, which has an emission cloud to hide in. Be smart and patient then strike when the time is right. \n\nUnless you fancy yourself a real ace, it’s probably best to bring some friends. Maybe you can entice folks by letting them know they can pick through the wreckage for valuables once the deed is done.\n\nAnd on top of that, I'll give the main contractor a bonus <EM4>~mission(ScripAmount) Council Scrip</EM4> to sweeten the pot.\n\nStows out.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x13, Targets x5\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
HeadHunters_ShipAmbush_H_title_001=Reprisal Attack <EM4>[200–2,000 Rep]</EM4>
HeadHunters_ShipAmbush_Intro_desc_001=Got an opportunity for someone eager to show off their flying skills. Headhunters have been running afoul of this numbrain flying a<EM4>~mission(AmbushTarget)</EM4> and we’re gonna put a stop to it once and for all.\n\nYou’re gonna help us set a trap for them. See, there’s an <EM4>emission cloud</EM4> near <EM4>~mission(Location|Address)</EM4> that they fly by frequently. \n\nHead there, hide inside the cloud by powering down your ship, and attack the asshole as soon as you see ‘em and other single-seaters dumb enough to fly with them. It’ll be all you for that first hit, but we’ll put some support ships nearby to help finish the job. \n\nAnd in honor of this being your first surprise attack for us, there's a bonus of <EM4>~mission(ScripAmount) Council Scrip</EM4> for the main contractor at the end of the job. \n\nStows out.\n\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x6, Targets x2\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +500 Rep
HeadHunters_ShipAmbush_Intro_title_001=Setting a Trap <EM4>[100–500 Rep]</EM4>
HeadHunters_ShipAmbush_M_desc_001=One of our Clips put out a kill order on a <EM4>~mission(AmbushTarget)</EM4>. Feel like making ‘em happy by taking it out?\n\nHere’s what you need to know. The target and their escort are scheduled to pass by <EM4>~mission(Location|Address)</EM4>. Looks like there’s an emission cloud nearby that can hide your ship’s sig. Wait there until you’re ready to strike. \n\nThe Clip only cares about wiping out the target. Anything of value you find floating in the wreckage is all yours. \n\nAnd on top of that, I'll give the main contractor a bonus <EM4>~mission(ScripAmount)</EM4> Council Scrip to sweeten the pot. \n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x6, Targets x3\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
HeadHunters_ShipAmbush_M_title_001=Ambush Op <EM4>[150–2,000 Rep]</EM4>
HeadHunters_ShipAmbush_S_desc_001=Headhunters are looking for someone with the skills and crew to execute an elite op. A military frigate and escort ships are stalking one of our Clips around the system. Don’t know their intentions but it can’t be good. Figure while they’ve got their eyes focused on their prize, we get someone to gather a crew to hit ‘em.  \n\nAlready got a spot picked out. If you get to <EM4>~mission(Location|Address)</EM4> there’s an emission cloud that’s exactly what we need. Head there with friends, power down your ships, and wait for the <EM4>~mission(AmbushTarget)</EM4> and its escorts to pass by. \n\nWith a bonus of <EM4>~mission(ScripAmount) Council Scrip</EM4> for the main contractor, payment alone should make this worth your while, but you can also keep anything you scrounge from the wreckage.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x10, Targets x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Tier 2:</EM4> +16,000 Rep
HeadHunters_ShipAmbush_S_title_001=Elite Op <EM4>[300–16,000 Rep]</EM4>
HeadHunters_ShipAmbush_VE_desc_001=Some numskull flying a <EM4>~mission(AmbushTarget)</EM4> was caught spying on our ops. We ran ‘em off with a warning only to spot ‘em doing the same shit someplace else. Since they didn’t get the message, seems we gotta send a stronger one.    \n\nThere’s an emission cloud near <EM4>~mission(Location|Address)</EM4> that they fly by frequently. Primo place to power down, hide, and launch a surprise attack. Sometimes they fly solo, sometimes there’s other single-seaters with them. It’ll be all you for that first hit, but we’ll put some support ships nearby to help finish the job. \n\nAnd if you needed some extra motivation, there's a bonus of <EM4>~mission(ScripAmount) Council Scrip</EM4> for the main contractor at the end of the job. \n\nStows out.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x6, Targets x2\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +500 Rep
HeadHunters_ShipAmbush_VE_title_001=Surprise Party <EM4>[100–500 Rep]</EM4>
HeadHunters_ShipAmbush_VH_desc_001=Some folks don’t seem happy with us. Got word that several sub-capital ships and a number of escorts are targeting our ops. Figured the best way to keep ‘em from causing us trouble is to hit them before they hit us. \n\nWe got eyes on a <EM4>~mission(AmbushTarget)</EM4> that’s part of this squad, and it looks like they regularly pass by <EM4>~mission(Location|Address)</EM4>, a spot tailor made for a surprise attack. A nearby emission cloud can hide you and anyone you bring along for muscle.\n\nNo sugarcoating it. This ain’t gonna be easy. But the payoff should make it worth your while. Finish the job and the main contractor gets a bonus <EM4>~mission(ScripAmount) Council Scrip</EM4>. \n\nPlus, who knows what kinda good stuff you’ll find floating in all that wreckage.\n\nStows out.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 5/7 | Risk 7/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x12, Targets x4\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Tier 2:</EM4> +8,000 Rep
HeadHunters_ShipAmbush_VH_title_001=Tactical Strike <EM4>[250–8,000 Rep]</EM4>
Headhunters_DefendDestructibleEntites_E_Desc_001=Some morons with some seriously inflated notion of their place in 'verse made the damn foolish choice of attacking the <EM>~mission(Objects)</EM4> at <EM4>~mission(Location|Address)</EM4>. We've got some things in play over there so we can’t let ‘em get away with it.\n\nIf you're interesting in helpin' out, get there and deal with these luggers before they can do too much damage. Don't figure you'll break too much of a sweat dealin' with them.\n\nAlso, I’ll sweeten the pot by giving the main contractor <EM4>~mission(ScripAmount) Council Scrip</EM4> just to show my appreciation. \n\nStows out.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x10\n<EM4>Rep:</EM4> +100
Headhunters_DefendDestructibleEntites_E_Title_001=Protect ~mission(Objects) From Luggers <EM4>[100 Rep]</EM4>
Headhunters_DefendDestructibleEntites_H_Desc_001=Got word from some allies of ours over at <EM4>~mission(Location|Address)</EM4> that they're coming under attack. A gang we've had run-ins with before are trying to take them over by first destroying their <EM4>~mission(Objects)</EM4>.\n\nThis crew are mungers through and through, but they mean business and can handle themselves in a fight. It will take a bit of doing to make sure they don't blow up everything. You might even think about <EM>bringing some help</EM> along.\n\nHandle this right and I’ll give the main contractor <EM4>~mission(ScripAmount) Council Scrip</EM4>.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x17\n<EM4>Rep:</EM4> +200
Headhunters_DefendDestructibleEntites_H_Title_001=Stop Gang From Destroying ~mission(Objects) <EM4>[200 Rep]</EM4>
Headhunters_DefendDestructibleEntites_M_Desc_001=Our friends at <EM4>~mission(Location|Address)</EM4> have been compromised. A new gang in the area  are threatening them by targeting their <EM4>~mission(Objects)</EM4>.  \n\nIf those get destroyed its going to be seriously bad for business, so I want you over there pronto on protection duty.  \n \nIf you need any extra motivation, I’m adding <EM4>~mission(ScripAmount) Council Scrip</EM4> for the main contractor.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x15\n<EM4>Tier 1:</EM4> +150 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
Headhunters_DefendDestructibleEntites_M_Title_001=Secure ~mission(Objects) From Rivals <EM4>[150–2,000 Rep]</EM4>
Headhunters_DefendDestructibleEntites_S_Desc_001=Our partners at <EM4>~mission(Location|Address)</EM4> need help. A rival outlaw crew are swarming the area and attacking the <EM4>~mission(Objects)</EM4> there. That’d be bad enough as is, but this site is absolutely critical to our future plans in the area and its damn important that it remains in working order.\n\nWith the scale of this attack and the skill of these pilots, there's no doubt that some <EM>reliable backup</EM> would serve you well. Gather your crew, fly out to the site, and stop these bootlicks before they can do any lasting damage. \n\nTo prove just how serious we are about getting this done right, the main contractor will earn <EM4>~mission(ScripAmount) Council Scrip</EM4> for making sure absolutely nothing goes wrong.\n\n- Stow\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 7/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x22\n<EM4>Rep:</EM4> +300
Headhunters_DefendDestructibleEntites_S_Title_001=Guard ~mission(Objects) At All Costs <EM4>[300 Rep]</EM4>
Headhunters_DefendDestructibleEntites_VE_Desc_001=You don't need all the details, but Headhunters have an interest in what happens over at <EM4>~mission(Location|Address)</EM4> and I just got word they're being harassed by some aggressive upstarts. \n\nThe dumb sods are trying to cripple the place by taking out their <EM>~mission(Objects)</EM4>. I'm not having it.   \n\nGet there and provide some protection before everything gets destroyed. These chumps are lightweights so shouldn't be too much of a problem for you to handle. \n\nClear ‘em all out I’ll throw <EM4>~mission(ScripAmount) Council Scrip</EM4> to whoever accepted this gig as a bonus.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Rep:</EM4> +100
Headhunters_DefendDestructibleEntites_VE_Title_001=Keep ~mission(Objects) Safe From Upstarts <EM4>[100 Rep]</EM4>
Headhunters_DefendDestructibleEntites_VH_Desc_001=A band of hired guns has been sent to mess with our interests over at <EM4>~mission(Location|Address)</EM4>. Seems someone has been tipped off that if the <EM>~mission(Objects)</EM4> there are destroyed that it will severely interrupt Headhunter operations in the area. That's a problem I want you to fix.\n\nNot gonna lie, theses mercs are no joke. It'd be foolish to go it alone. That’s why you’ll need to be fully supplied and find <EM>some trustworthy friends</EM> to fly at your wing.\n\nThis op needs to go off without a hitch, so I’m offering the main contractor <EM4>~mission(ScripAmount) Council Scrip</EM4> for a job well done. \n\nStows out.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x17\n<EM4>Rep:</EM4> +250
Headhunters_DefendDestructibleEntites_VH_Title_001=Defend ~mission(Objects) From Mercs <EM4>[250 Rep]</EM4>
Headhunters_DefendLocation_E_Desc_001=Some idiots with a deathwish are attacking our ships around <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4>. Can’t let ‘em do that without paying the price. Want to do the honors?\n\nIf so, head out and get after ‘em. The crew there is tracking the attacker’s movements and I’ll pass along situational updates as they come in. \n\nAlso, I’ll sweeten the pot by giving the main contractor a bonus of <EM4>~mission(ScripAmount) Council Scrip</EM4> just to show my appreciation. \n\nStows out.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4, Hostiles x2, Reinforcements x8\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +1,000 Rep
Headhunters_DefendLocation_E_Title_001=Protect Our Site <EM4>[100–1,000 Rep]</EM4>
Headhunters_DefendLocation_H_Desc_001=Got word that Headhunters ships heading to <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> are coming under attack. Scans have revealed enemy forces in the wider region intent on targeting our ops. \n\nThere’s enough of them that it’s gonna take more than one person to clear away all that trash. If you can grab your gear and a few friends, I could really use you out there.  \n\nThe specific attack areas and targets are evolving. Don’t worry about the details now. Just get there and I’ll let you know where you’re needed.  \n\nHandle this right and I’ll give the main contractor a bonus <EM4>~mission(ScripAmount) Council Scrip</EM4>.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x5, Hostiles x3, Interdiction Ships x2, Reinforcements x16\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
Headhunters_DefendLocation_H_Title_001=Help Headhunters at ~mission(DefendLocationWrapperLocation) <EM4>[200–2,000 Rep]</EM4>
Headhunters_DefendLocation_M_Desc_001=Our airspace around <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> has been compromised. Enemy ships are threatening the base and any of our ships in the area. Gotta put a stop to this immediately, so get your shit in order and get over there. Just get going and I’ll update you with any relevant info on where you’re needed. \n \nIf you need any extra motivation, I’m adding a bonus <EM4>~mission(ScripAmount) Council Scrip</EM4> for the main contractor.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4, Hostiles x2, Interdiction Ships x1, Reinforcements x14\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
Headhunters_DefendLocation_M_Title_001=Secure Our Airspace <EM4>[150–2,000 Rep]</EM4>
Headhunters_DefendLocation_S_Desc_001=Our crew at <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> needs help. Enemy ships are swarming the area and attacking anything and everything they can find. That’d be bad enough as is, but this site has some absolutely crucial gear and personnel that we can’t have destroyed or compromised. \n\nConsidering the size and scale of the attack, you’re gonna need a fully supplied ship and some reliable wingmen. Gather your crew, fly out to the site, and I’ll send you specifics on where you’re needed most.\n\nTo prove just how serious we are about getting this done right, the main contractor will earn a bonus <EM4>~mission(ScripAmount) Council Scrip</EM4> for making sure absolutely nothing goes wrong.\n\n- Stow\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x10, Hostiles x3, Interdiction Ships x6, Reinforcements x20\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Tier 2:</EM4> +16,000 Rep
Headhunters_DefendLocation_S_Title_001=Restore Order at ~mission(DefendLocationWrapperLocation) <EM4>[300–16,000 Rep]</EM4>
Headhunters_DefendLocation_VE_Desc_001=Headhunters flying in and out of <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> are being harassed by some aggressive upstarts. Need them dealt with before they become a real pain in the ass.   \n\nGet there and I’ll update you on what these pests are doing so you can hunt ‘em down. \n\nClear ‘em all out I’ll throw <EM4>~mission(ScripAmount) Council Scrip</EM4> to whoever accepted this gig as a bonus.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2, Hostiles x1, Reinforcements x6\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +500 Rep
Headhunters_DefendLocation_VE_Title_001=Eliminate Annoyance <EM4>[100–500 Rep]</EM4>
Headhunters_DefendLocation_VH_Desc_001=Looking for someone who can not only dogfight but recruit others to the Headhunters cause. Our operations center at <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4>, along with any ships going to and from it, are being targeted by hostile forces. We need support there pronto. \n\nNot gonna lie, but there’s lots of heat around there. That’s why you’ll need to be fully supplied and find some trustworthy friends to fly at your wing. When you get your crew together, head out there and I’ll update you if there’s any flare ups in the area that need your attention.\n\nThis op needs to go off without a hitch, so I’m offering the main contractor a bonus <EM4>~mission(ScripAmount) Council Scrip</EM4> for a job well done. \n\nStows out.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x7, Hostiles x3, Interdiction Ships x4, Reinforcements x16\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Tier 2:</EM4> +8,000 Rep
Headhunters_DefendLocation_VH_Title_001=Stop Attack at ~mission(DefendLocationWrapperLocation) <EM4>[250–8,000 Rep]</EM4>
Headhunters_Delivery_Outpost_Multi_desc_001=Got a bunch of boxes sitting at <EM4>~mission(Location|Address)</EM4> that have to be moved to <EM4>~mission(Destination|Address)</EM4>. Seems easy enough, right? Well, guess it ain’t. \n\nThe idiot who was supposed to move these things threw out his back trying to carry all of ‘em at once. So, you know, maybe bring a <EM4> handheld tractor beam</EM4> and try taking ‘em one at a time like a normal person. But, hey, don’t let me tell you how to do your job. Just get it done. \n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +200 Rep\n<EM4>Contractor:</EM4> +400 Rep\n<EM4>Sr. Contractor:</EM4> +800 Rep
Headhunters_Delivery_Outpost_Multi_title_001=Little Heavy Lifting at ~mission(Destination) <EM4>[200–800 Rep]</EM4>
Headhunters_Delivery_Outpost_desc_001=Got a box sitting at <EM4>~mission(Location|Address)</EM4> that needs to make its way over to <EM4>~mission(Destination|Address)</EM4>. Any chance you can knock this out real quick?\n\nMight be the easiest gig I’ve ever assigned out. Only real threat would be tripping over your own feet. A <EM4>handheld tractor beam</EM4> would also be smart to bring along. \n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Neutral:</EM4> +50 Rep
Headhunters_Delivery_Outpost_title_001=~mission(Destination) Errand <EM4>[50 Rep]</EM4>
Headhunters_EliminateAll_OLP_H_desc_001=Surprise, surprise. Seems like not everyone’s happy that the Headhunters are making inroads in Stanton. One crew in particular has been hitting our people and then scurrying back to <EM4>~mission(Location|Address)</EM4>. \n\nWant you to go there and give ‘em a taste of their own medicine. Removing these lickboots should send a pretty clear message about what happens if you screw with us. \n\n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x10, Juggernauts x4
Headhunters_EliminateAll_OLP_H_title_001=Deliver a Message
Headhunters_EliminateAll_PAF_H_desc_001=Word’s gotten out that we’re expanding into Stanton and a local crew has hit a few of our safe houses. We managed to track the bastards back to some old Hathor mining site. \n\nYou up for showing them how the Headhunters handle things? If so, head over to <EM4>~mission(Location|Address)</EM4> and show them that we mean business. \n\n \n- Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x10, Juggernauts x4
Headhunters_EliminateAll_PAF_H_title_001=Show Them Who's Boss
Headhunters_EliminateSpecific_PAF_desc_001=Can’t believe how many criminals are crawling around this damn system. Guess we’ll have to make some room for ourselves. \n\nGot a list of high-level leaders here. Nothing brings chaos and disorder to the existing gangs like a good decapitation attack. The next target is <EM4>~mission(TargetName)</EM4>, who we’ve tracked to <EM4>~mission(Location|Address)</EM4>. Feel like ghosting ‘em?   \n\nThese old Hathor platform facilities are big and spread out. Doubt there’s a way to do this and not attract the attention of their foot soldiers. Ain’t gonna be easy but sure sounds like fun.\n\n- Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x10, Juggernauts x4
Headhunters_EliminateSpecific_PAF_title_001=Ghost ~mission(TargetName)
Headhunters_HaulCargo_AToB_OLP_Illegal_desc_01=Need someone to snag some cargo for us. We were using an old Hathor PAF for dead drops, but a local gang has dug in and we can’t get our shit.\n\nIf you feel like kicking some ass, grab the cargo from the freight elevator at <EM4>~mission(Location|Address)</EM4> and deliver it to the freight elevator at <EM4>~mission(Destination|Address)</EM4>. \n\nFrom what I’ve heard this place is full of all sorts. Won’t be easy getting out stuff back, but that’s what we’re paying you for.\n\nJust make sure you got a ship that can handle a <EM4>~mission(MissionMaxSCUSize)</EM4> load, and try not to get shot in the process. A <EM4>handheld tractor beam</EM4> would also be smart to bring along. \n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Neutral:</EM4> +1,000 Rep
Headhunters_HaulCargo_AToB_OLP_title_01=Cargo Retrieval <EM4>[1,000 Rep]</EM4>
Headhunters_HaulCargo_AToB_PAF_Illegal_desc_01=I won’t bore you with the details, all you need to know is: one of our haulers got attacked and now our goods are sitting in a freight elevator at <EM4>~mission(Location|Address)</EM4>. \n\nUp to you how you get the goods out, but if you happen to ghost a few of our rivals in the process, I ain’t complaining. Once you’ve got the stuff take it to the freight elevator at <EM4>~mission(Destination|Address)</EM4>, then we can sort your payment. \n\nA <EM4>handheld tractor beam</EM4> would also be smart to bring along. \n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Neutral:</EM4> +1,000 Rep
Headhunters_HaulCargo_AToB_PAF_title_01=Stock Taking <EM4>[1,000 Rep]</EM4>
Headhunters_HaulCargo_MultiToSingle_desc_01=We’ve been using the old Hathor <EM4>~mission(Location1|Address)</EM4> and <EM4>~mission(Location2|Address)</EM4> as stashes, but it turns out some over-eager nullbrains sniffed them out and are trying to boost our shit for their own.\n\nLuckily, the goods are still there - for now. We need someone to visit that PAF and OLP, grab our stuff from the freight elevators, and take it to the freight elevator at <EM4>~mission(Destination|Address)</EM4> where we should be able to keep it on ice. \n\nHere’s the list of what to grab. Don’t care what order you do ‘em in. Be sure to bring a ship that can store <EM4>~mission(MissionMaxSCUSize)</EM4> at the very least. \n\n~mission(MultiToSingleToken)\n\nMake sure you’re ready to deal with whatever assholes you run across. A <EM4>handheld tractor beam</EM4> would also be smart to bring along. \n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Neutral:</EM4> +1,000 Rep
Headhunters_HaulCargo_MultiToSingle_title_01=Getting Our Goods Back <EM4>[1,000 Rep]</EM4>
Headhunters_SabotageRelays_CFP_001_Desc=CFP think they’re safe over at <EM4>~mission(Location|Address)</EM4> but we got big plans for them. You’re gonna pave the way for us by heading there and shutting down their comm towers.\n\nThere should be a <EM4>control terminal at the top</EM4> that you can use to shut the tower down. You get that sorted and they won’t be able to call for backup. Then we can show those skags who this system belongs to.\n\nMost outposts use the same system, so this’ll come in handy next time you want to make sure reinforcements don’t mess with you.\n\n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +75
Headhunters_SabotageRelays_CFP_001_Title=Shutdown CFP’s Comms <EM4>[75 Rep]</EM4>
Headhunters_SabotageRelays_XT_001_Desc=We’re making a play to hit some XenoThreat assholes where it hurts but need to be smart about it. That’s why we’re sending you in first to take out their comm towers so they can’t call for backup. You do that and we can be in and out before they know it.\n\nHead to <EM4>~mission(Location|Address)</EM4> and climb the comm towers there. Should be a <EM4>control panel at the top</EM4> you can use to switch them off.\n\nIn fact, same goes for most other outposts. Rather than having to deal with reinforcements, you can just turn off the comm towers. But hey, if you wanna ring the bell to ghost a few more Xenothreat I ain’t complaining.\n\n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +100
Headhunters_SabotageRelays_XT_001_Title=Silence the Xenothreat <EM4>[100 Rep]</EM4>
Headhunters_SecurityPatrol_E_Desc_001=Headhunters have been expanding, but still need help getting a lay of our new territory. I’ve got a run to check spots we want scanned ready to go. \n\nThis one kicks off at the <EM4>location marker</EM4> on your HUD and will look at a few more locations after that, but I’ll update you as we clear them out. Not expecting you to run into any trouble but no guarantees. Trouble seems to follow us.\n\nGet this done and I'll toss the main contractor <EM4>~mission(ScripAmount) Council Scrip</EM4> as a thanks.\n\nStows out.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Targets x15\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +1,000 Rep
Headhunters_SecurityPatrol_E_Title_001=Scout and Scan <EM4>[100–1,000 Rep]</EM4>
Headhunters_SecurityPatrol_H_Desc_001=I’ve noticed an uptick in attacks on Headhunter ships and it's got me feelin' jumpy. Got an important resupply shipment that we can’t afford to lose, and need help determining what route to send it. I’ve strung together a few potential spots that I’d set up in if I was gonna hit ‘em. Any chance you could visit and clear out any lowlifes that may be hiding there? \n\nThe route starts at the <EM4>location marker</EM4> on your HUD. After you scan it and clear whatever’s there, I’ll send you to a few other areas that could work. I’ve been hearing people have been rolling through these spots, so would be smart to <EM4>bring a friend</EM4> to watch your back.\n\nYou make it to the end and I'll give the main contractor a bonus <EM4>~mission(ScripAmount) Council Scrip</EM4> as thanks. \n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Targets x54\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
Headhunters_SecurityPatrol_H_Title_001=Looking For Trouble <EM4>[200–2,000 Rep]</EM4>
Headhunters_SecurityPatrol_M_Desc_001=The local Clip wants current intel on several of our sectors. Not sure what they’re looking for but I’m not about to ask. My job is to find someone willing to swing through and scan these locations. You available? \n\nAll you need to do is head to the <EM4>location marker</EM4> on your HUD, run a scan, and if it’s clear, move to the next spot. If you run into any issues, take care of it. \n\nAin’t sound too tough now does it? Plus, I'll give the main contractor a bonus <EM4>~mission(ScripAmount) Council Scrip</EM4> as thanks. \n\n\nStows out.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Targets x23\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
Headhunters_SecurityPatrol_M_Title_001=Space Patrol <EM4>[150–2,000 Rep]</EM4>
Headhunters_SecurityPatrol_S_Desc_001=Got some asshole’s trying to push us out of the system. You up for pushing back?\n\nSee, there are some folks who really don’t want us here, and have started sending out hunting parties of five to seven ships, often with a bigger gun ship, to places where we’re building up our presence. Time for us to show that we’re here to stay.  \n\nI’ve strung together a few spots starting at the <EM4>location marker</EM4> on your HUD where we’re seeing the most hostile encounters. Need you to visit each one and scan to see if we can bait them into a fight.\n\nKnow this is going to be a hard one, so don't be cocky and try to go it alone. If I were you, I'd bring at least <EM4>three friends</EM4> onboard for support. To make it worth your while, I'm promising a bonus of <EM4>~mission(ScripAmount) Council Scrip</EM4> to the main contractor that pulls it off. \n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 7/7\n<EM4>Hostiles:</EM4> Targets x87\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Tier 2:</EM4> +16,000 Rep
Headhunters_SecurityPatrol_S_Title_001=Hunt Some Heads <EM4>[300–16,000 Rep]</EM4>
Headhunters_SecurityPatrol_VE_Desc_001=Headhunters want some intel on what’s happening around territory. We’ve already set up some monitoring satellites, but nothing beats a good ol’ patrol. You up for it?\n\nIf so, get on over to the <EM4>location marker</EM4> on your HUD. Start by scanning that region and then we’ll guide you to a few more spots that we want info on. \n\nAnd if you needed some extra motivation, there's a bonus of <EM4>~mission(ScripAmount) Council Scrip</EM4> for the main contractor at the end of the job. \n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Targets x4\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +500 Rep
Headhunters_SecurityPatrol_VE_Title_001=See What’s Out There <EM4>[100–500 Rep]</EM4>
Headhunters_SecurityPatrol_VH_Desc_001=We’re getting pushback from folks who don’t seem happy that we’re here. Folks have gotten keen to our haunts and started sending out squads to hit our ships. You down to visit a few of those spots to show that we won’t be scared off? \n\nIf so, start by seeing what’s around the <EM4>location marker</EM4> on your HUD. From there I’ll guide you to a few other hotspots that we need checked. Better get your shit in order before heading out. I'd recommend loading up on ammo and convincing <EM4>two friends</EM4> to join the patrol.\n\nYou do this for the Headhunters and I'll see to it that the main contractor gets a bonus of <EM4>~mission(ScripAmount) Council Scrip</EM4>. \n\nStows out.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Targets x66\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Tier 2:</EM4> +8,000 Rep
Headhunters_SecurityPatrol_VH_Title_001=Stand Our Ground <EM4>[250–8,000 Rep]</EM4>
Headhunters_bounty_desc_001=The Headhunters recently loaned credits to ~mission(TargetName) under some clear conditions. Specifically, pay us back or we’ll kill you. Wild to think that wasn’t enough of an incentive, but here we are past the payment deadline. Now as much as we like ~mission(TargetName|First), I need you to make good on our promise.\n\n~mission(TargetName|Last) was last seen at ~mission(Location|Address). Track ‘em down, ghost ‘em, and get paid. It’s as simple as that. \n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
Headhunters_bounty_desc_002=Time is up for ~mission(TargetName). The skav is way past due on paying back the Headhunters, so I need you to punch them out. \n\nKill ‘em, not hit ‘em, just in case that’s unclear. \n\nSomeone recently spotted ~mission(TargetName|Last) around ~mission(Location|Address), so head there and take ‘em out.  \n\nFull disclosure, we’ve gotten reports they used some of our creds to hire extra protection. Prepare accordingly. \n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
Headhunters_bounty_desc_003=~mission(TargetName) borrowed a bunch of creds from the Headhunters and thought the smart move was to try and hide instead of paying us back, so I need someone to make an example of ~mission(TargetName|Last).\n\nThey were just spotted at ~mission(Location|Address), so I’d recommend heading there now before the trail goes cold. ~mission(TargetName|Last) is a paranoid sort, so don’t be surprised if they’re not alone. Handle it however you want as long as ~mission(TargetName|Last) is dust when you’re done.   \n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
Headhunters_bounty_title_001=Deadbeat <EM4>[50 Rep]</EM4>
Headhunters_bounty_title_002=Past Due <EM4>[100 Rep]</EM4>
Headhunters_bounty_title_003=Collection Notice <EM4>[250 Rep]</EM4>
Headhunters_bounty_xenothreat_desc_001=Headhunters got word there’s a XenoThreat op in the works that's targeting one of our crews. We don’t have precise details about the plan but we know that ~mission(TargetName) is organizing it. Instead of sitting back and waiting for something to happen, we’ve decided to be proactive. \n\n~mission(TargetName|Last) was just spotted with others around ~mission(Location|Address). We can’t mobilize anyone fast enough to get there. I want you to rush there and deliver a preemptive strike.   \n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Headhunters_bounty_xenothreat_desc_002=XenoThreat recently hit a Headhunters' stronghold. I’ll spare you the details, but they did some truly heinous shit to our crew. We’ve identified the leader of the op as ~mission(TargetName) and are looking for a little payback. We don’t care what you do to get the job done. Only that ~mission(TargetName|Last) is dead. \n\nA source just told us that you can track down this XenoThreat scum over at ~mission(Location|Address). This sicko’s a pro and never travels alone, so don’t expect taking them out to be a walk in the park.  \n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Headhunters_bounty_xenothreat_desc_003=~mission(TargetName) was recently revealed to be a mole for XenoThreat. It all makes sense now because the skav was a major asshole. Unfortunately, they split before we could handle it ourselves. \n\nBased on all they learned about our ops, we need ‘em taken out pronto. They see one of us coming and they’ll just run again, but I figured someone like you has a better chance of getting close enough for a killshot. \n\nWe just got word ~mission(TargetName|Last) was hanging around ~mission(Location|Address). Looks like there’s other ships around protecting ‘em too. Think you got the skill to rid the ‘verse of a traitorous bastard and their bastard friends?  \n\nStows out.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Headhunters_claimsweep_desc_easy=Some numbskull is trying to dig up dirt on the Headhunters. Some orbital sentries were dropped at ~mission(location|address) to spy on us. We’ve also spotted a ship checking on them. Simple proposition for you. Go wipe out the sentries there and we’ll pay you for it. That sound like something you’d be into?\n\nAs for the ship, you can do whatever you want with it, but if it spots you, don’t be surprised if it tries to go get some back up. That’s just how these things go.\n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Hostiles:</EM4> Hostile Wave x3, Prospectors x1\n<EM4>Turrets:</EM4> 2 (hostile)
Headhunters_claimsweep_desc_hard=Some idiots think they can blatantly spy on the Headhunters and get away with it. They’ve set up several orbital sentries at ~mission(location|address) and have a few ships patrolling the area. We don’t know who’s behind it but we honestly don’t care. We just need it gone. \n\nLet us know if you feel like putting some real brash bastards in their place. We’ll pay you well and deliver the creds the second the job is done. \n\nKeep in mind that it’s really only the sentries we care about. The ships they got patrolling are only a concern if they get in your way or if they try to call in some friends to stop you. \n \nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250\n<EM4>Hostiles:</EM4> Hostile Wave x5, Prospectors x4\n<EM4>Turrets:</EM4> 4 (hostile)
Headhunters_claimsweep_desc_intro=Got a minor annoyance the Headhunters need dealt with. There's an orbital sentry at ~mission(location|address) that some pesky little troublemaker set up to spy on our ops. Want to make some easy creds and go blow it up for us?\n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Turrets:</EM4> 1 (hostile)
Headhunters_claimsweep_desc_medium=Headhunters are looking for a merc to do a little clean up for us. Found out that someone’s trying to spy on us over at ~mission(location|address). Can’t let that stand. We need a skilled operator to take care of the orbital sentries they dropped there, and if needed, deal with any of their ships that get in your way. Seems like a decently run op, so hitting it might not be easy but it sure should be fun. \n\nLet us know if you’re the right one for the gig. Creds will be transferred once our scans show it’s gone. \n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostile Wave x4, Prospectors x2\n<EM4>Turrets:</EM4> 3 (hostile)
Headhunters_claimsweep_desc_rand=Headhunters recently discovered some orbital sentries focused on our operations and we don’t like it one bit. I’m looking to pay someone to go to ~mission(location|address) and make it abundantly clear they should stay the hell out of our business. Doubt they’ll be receptive to a discussion about it, so I’d be prepared to evict them with extreme force. \n\nBased on our scans, this won’t be a walk in the park. Wouldn’t be a bad idea to come prepared with plenty of ammo. Payment will be sent promptly once the job is done. \n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostile Wave x32, Prospectors x5\n<EM4>Turrets:</EM4> 4 (hostile)
Headhunters_claimsweep_title_easy=Eliminate Eavesdroppers <EM4>[50 Rep]</EM4>
Headhunters_claimsweep_title_hard=Exterminate Eavesdroppers <EM4>[250 Rep]</EM4>
Headhunters_claimsweep_title_intro=Erase Eavesdropper <EM4>[50 Rep]</EM4>
Headhunters_claimsweep_title_medium=Eradicate Eavesdroppers <EM4>[100 Rep]</EM4>
Headhunters_claimsweep_title_rand=Execute Eavesdroppers <EM4>[100 Rep]</EM4>
Headhunters_defend_XT_VH_desc_001=XenoThreat are on the warpath right now. They’ve launched simultaneous attacks on several Headhunters sites and stretched our fighters thin. Got word they’re planning to storm ~mission(Location|Address) next, and we can’t get anyone there to defend it. \n\nI’m looking to pay someone to pull together a crew, gather supplies, and mount a strong defense for us. Gonna be honest with you, this is shaping up to be a hell of a fight. Xenos are sending some of their most experienced forces there. Not much else I can say except that they’ll probably stagger the arrival of their forces, wipe them all out and you’ll be paid handsomely. \n\nThink you can rise to the occasion?  \n\n-Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x2, Snipers x2, Soldiers x9, Technicians x2\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Headhunters_defend_XT_VH_title_001=Block XenoThreat Expansion <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
Headhunters_eliminateall_caves_desc_01=Hey,\n\nSome two-bit thugs are holed up in ~mission(Location|Address). Wouldn’t pay them any mind, except the arrogant skags tried to hit an outpost under our protection.\n\nWe chased 'em off with little trouble, but we can't let that kind of disrespect go unpunished. Our Clips are busy with some bigger fish, so we'd like you to take care of this for us. \n\nStows out.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x2, Soldiers x6\n<EM4>Neutral:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Headhunters_eliminateall_caves_title_01=A Swift Reprisal <EM4>[BP]</EM4> <EM4>[50 Rep]</EM4>
Headhunters_theft_outpost_xenothreat_desc_001=pu theft outpost pyro hh vs xt pyro6\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
HexPenetrator_Bounty_desc=Our analysts have examined the intel seized from those XenoThreat recon teams but the data appears to be locked behind a sophisticated encryption system and requires a custom cryptokey to access.\n\nWe've managed to locate several XenoThreat lieutenants operating in the system, you are to find and engage the suspects and see if they are in possession of a cryptokey that will allows us to access the intel.\n\nAs a reminder, the military has generously donated some old F7A Hornets for CDF members who see this initiative through to the end.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
HexPenetrator_Comm_Description=One of the suspects captured during the recent attacks revealed that XenoThreat is looking to remotely access a number of comm arrays around the system.\n\nHaving XenoThreat listening into comms is extremely dangerous for the people living here, so the CDF has been enlisted to reset the comm array, then defend it from any XenoThreat Vanguards that will attempt to reconnect to the servers. \n\nOnce those Vanguards have been defeated, clear out any remaining hostile ships in the area.\n\nAs a reminder, the military has generously donated some old F7A Hornets for CDF members who see this initiative through to the end.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Hostiles:</EM4> Hostile Wave x17
HexPenetrator_DataHeist_description=We've received tips that XenoThreat's intending to launch another attack on Stanton system. The CDF has petitioned the Advocacy to create a new initiative called Operation Overdrive to stop this attack before it happens. \n\nThe CDF is dispatching volunteers to infiltrate and obtain any intel that could give insight into what they're planning. Needless to say, expect heavy resistance from any XenoThreat on site.\n\nAs an added incentive, the military has generously donated some old F7A Hornets for CDF members who see this initiative through to the end.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Hostiles:</EM4> Hostiles x54, Technicians x2\n<EM4>Unknown:</EM4> 12
HexPenetrator_Incursion_Desc=Waves of XenoThreat ships have been pushing into Stanton system and attacking random civilians. We can't tell if this is an isolated attack or a reaction to our recent initiatives, but we need them stopped.\n\nAs a reminder, the military has generously donated some old F7A Hornets for CDF members who see this initiative through to the end.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
HexPenetrator_Kareah_Desc=Attention all CDF volunteers, we received a distress call from Security Post Kareah. It turns out XenoThreat used the comm arrays as a distraction to lure law enforcement away so they could launch an attack on the station.\n\nWe've learned that they're attempting to access their systems, so all volunteers must immediately divert to retake Kareah and clear out all XenoThreat forces.\n\nAs a reminder, the military has generously donated some old F7A Hornets for CDF members who see this initiative through to the end.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Hostiles:</EM4> Hostile Wave x3
HexPenetrator_RecoverDeliver_description=Attention CDF volunteers, XenoThreat's gone off the grid. We suspect that they have gone dark in order to prep for the final phase of their plan. \n\nHistory has proven that XenoThreat like to fight so it stands to reason that this might be an attack of some kind so we're calling on volunteers to deliver supplies to the Gateway station near the Stanton-Pyro jump point to shore up for a potential assault.\n\nAs a reminder, the military has generously donated some old F7A Hornets for CDF members who see this initiative through to the end.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
HexPenetrator_RewardRecord_Desc=Thank you for your diligence on this Overdrive Initiative. \n\nAs promised, we've approved you for an upgrade from a civilian F7C mk ii to a military grade F7A mk ii if you have one.\n\nIn addition, you've been given a temporary rental of a military F7A mk ii that you can access in your ASOP.\n\n\n_________________\n\nTo upgrade, visit the RSI website to apply the token, then restart the game and access the ship.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
Highpoint_KillAnimal_OneType_desc=We’ve been monitoring a situation at <EM4>~mission(Location)</EM4> regarding an uptick in the <EM4>~mission(Creature)</EM4> population over the past few months. Our models indicate that if this continues many of the native plants and animals will be adversely affected. It’s imperative that the <EM4>~mission(Creature)</EM4> population is reduced before that happens.     \n\nIf you can help, please refer to <EM4>"The Guide to Stanton Wildlife"</EM4> in your Journal for more specifics on the targeted creature.\n\nBest,\n\nWanda Werkheiser\nContract Manager\nHighpoint Wilderness Specialists\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7
Highpoint_KillAnimals_MultiType_H_desc=Native plants and animals near <EM4>~mission(Location)</EM4> are on the verge of environmental collapse due to the dramatic population spikes of several invasive species. We’ve been contracted to dramatically reduce the current population of these species to help avoid an environmental collapse. We need a dedicated and highly skilled exterminator to carry out this contract.     \n\nYou can better acquaint yourself with the creatures in question by referencing <EM4>"The Guide to Stanton Wildlife"</EM4> in your Journal.     \n\nBest,\n\nWanda Werkheiser\nContract Manager\nHighpoint Wilderness Specialists\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7
Highpoint_KillAnimals_MultiType_H_title=Intensive Eradication Effort
Highpoint_KillAnimals_MultiType_M_desc=Highpoint Wilderness Specialists are dedicated to keeping the delicate ecosystems of the empire in balance. A client recently hired us to evaluate the environmental impact of a number of invasive creatures near <EM4>~mission(Location)</EM4>. We’ve determined that to preserve the natural order of the region a conscientious culling of these species is necessary.  \n\nLooking for someone able and willing to help in this effort. Please refer to <EM4>"The Guide to Stanton Wildlife"</EM4> in your Journal for further information on the creatures being targeted.     \n\nBest,\n\nWanda Werkheiser\nContract Manager\nHighpoint Wilderness Specialists\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7
Highpoint_KillAnimals_MultiType_M_title=Cull Invasive Creatures
Highpoint_KillAnimals_OneType_title=Reduce Overpopulation
Highpoint_KillAnimals_rockcracker_desc_E_001=If you have any work that's going to be bringing you to one of those old QV Breaker Stations in the Keeger Belt, we have something else that we could use your help on while you're there.\n \nWe've recently been contacted by the People's Alliance to assist with an initiative to help prepare these abandoned stations for repairs. Unfortunately, a Valakkar infestation is creating serious problems for not only the stations' infrastructure, but also for the chances of them being brought back online one day. Due to Valakkar's status as an invasive species, we have decided that culling them is the only viable option.\n \nReduce the Valakkar numbers at any of the old QV Breaker Stations and we will offer you payment.\n \nBest,\n \nWanda Werkheiser\n\nContract Manager\n\nHighpoint Wilderness Specialists\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Highpoint_KillAnimals_rockcracker_title_E_001=Reduce Valakkar Breaker Station Population <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Highpoint_KillAnimals_storm_H_desc_001=As a consequence of the ongoing radiation storm on Pyro I, some of the invasive kopions have become irradiated. This poses a threat to the health of the indigenous wildlife and to those who live and work in <EM4>~mission(Location)</EM4>. \n\nWe are seeking out a skilled contractor who can cull any irradiated kopions in and around <EM4>~mission(Location|Address)</EM4>. Do not accept this contract unless you have the proper weapons and equipment that can reliably function in a radioactive environment. \n\nYour compensation will be adjusted to match the risks associated with this contract.\n\nBest,\n\nWanda Werkheiser\nContract Manager\nHighpoint Wilderness Specialists\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7
Highpoint_KillAnimals_storm_H_title_001=Cull Irradiated Kopions
Hockcrow_SearchBody_Easy_Description_001=Hockrow Agency \nCase File #MP51132\nLead Investigator: Arken Mallor\n\nCase Summary: \nNeed an operative to help us locate the current whereabouts of a client's employee. They were on assignment in ~mission(System) but has failed to report in. Our client is beginning to fear the worst.\n\nContract Investigator Actions:\nLocate <EM4>~mission(MissingPersonList)</EM4> at <EM4>~mission(Location|Address)</EM4> and confirm their status. \n\nIf they are deceased, examine the body closely so we can verify their death via your mobiGlas.\n\nAdditional Notes:\nThis contract has been flagged as <EM4>combat-likely</EM4> so prepare accordingly.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +100 Rep
Hockcrow_SearchBody_Easy_Title_001=Locate Missing Employee <EM4>[100 Rep]</EM4>
Hockcrow_SearchBody_Hard_Description_001=Hockrow Agency \nCase File #MP45648\nLead Investigator: Arken Mallor\n\nCase Summary: \nA client has tasked us with tracking down with one of their family members who has gone missing. After exhibiting erratic behavior, they cut off all communications and left for ~mission(System). We were able to track down their general whereabouts but need an investigator to head there in person to assess the situation.\n\nContract Investigator Actions:\nLocate <EM4>~mission(MissingPersonList)</EM4> at <EM4>~mission(Location|Address)</EM4> and confirm their status. \n\nIf they are deceased, examine the body closely so we can verify their death via your mobiGlas.\n\nAdditional Notes:\nThere is a high chance that you will encounter hostiles while conducting your search. We recommend considering bringing along backup to support you.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Sr. Contractor:</EM4> +200 Rep
Hockcrow_SearchBody_Hard_Title_001=Locate Missing Family Member <EM4>[200 Rep]</EM4>
Hockcrow_SearchBody_Medium_Description_001=Hockrow Agency \nCase File #MP74384\nLead Investigator: Arken Mallor\n\nCase Summary: \nWe had sent in a two-person team to ~mission(System) to investigate a case, but have received no reports from them for several days. At this juncture we are forced to assume that they had run into an unforeseen obstacle and may be in need of rescue, or worse, have been killed.\n\n\nContract Investigator Actions:\nLocate <EM4>~mission(MissingPersonList)</EM4> at <EM4>~mission(Location|Address)</EM4> and confirm their status. \n\nIf they are deceased, examine the body closely so we can verify their death via your mobiGlas.\n\nAdditional Notes:\nConsider the dangerous nature of their investigation, there is a very strong chance there will be hostiles on site.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Contractor:</EM4> +150 Rep
Hockcrow_SearchBody_Medium_Title_001=Locate Missing Team <EM4>[150 Rep]</EM4>
Hockcrow_SearchBody_Super_Description_001=Hockrow Agency \nCase File #MP65648\nLead Investigator: Arken Mallor\n\nCase Summary: \nA whole crew has gone missing while undertaking a contract in ~mission(System) for a client that I'm unfortunately not allowed to disclose the full details of to you. Lets just say that it wasn't the safest job and the fact the crew is not responding comms is not surprising but it is concerning. It's vital that we ascertain what happened to them. \n\nContract Investigator Actions:\nLocate <EM4>~mission(MissingPersonList)</EM4> at <EM4>~mission(Location|Address)</EM4> and confirm their status. \n\nIf they are deceased, examine the body closely so we can verify their death via your mobiGlas.\n\nAdditional Notes:\nThis investigation has high potential for there to be aggressive and dangerous hostiles on site. Arm yourself accordingly and consider bringing other skilled associates with you.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Head Contractor:</EM4> +300 Rep
Hockcrow_SearchBody_Super_Title_001=Locate Missing Crew <EM4>[300 Rep]</EM4>
Hockcrow_SearchBody_VeryEasy_Description_001=Hockrow Agency \nCase File #MP51643\nLead Investigator: Arken Mallor\n\nCase Summary: \nLooking for an operative to confirm the status of a client. They and their partner missed a scheduled meeting and all attempts to contact them have proven in vain. Last we heard they were undertaking some business in ~mission(System) and fear that they may be the victim of some unfortunate tragedy.\n\nContract Investigator Actions:\nLocate <EM4>~mission(MissingPersonList)</EM4> at <EM4>~mission(Location|Address)</EM4> and confirm their status. \n\nIf they are deceased, examine the body closely so we can verify their death via your mobiGlas.\n\nAdditional Notes:\nBe cautious while conducting your search. If the client did meet harm, it would be unfortunate for you to meet the same fate.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Neutral:</EM4> +100 Rep
Hockcrow_SearchBody_VeryEasy_Title_001=Locate Missing Clients <EM4>[100 Rep]</EM4>
Hockcrow_SearchBody_VeryHard_Description_001=Hockrow Agency \nCase File #MP12854\nLead Investigator: Arken Mallor\n\nCase Summary:\nWe have been asked to track down two contractors who work for a client of ours after they lost contact with them. They were last known to be traveling together in ~mission(System). Until their exact situation can be assessed, our client is stuck in a waiting pattern. \n\nContract Investigator Actions:\nLocate <EM4>~mission(MissingPersonList)</EM4> at <EM4>~mission(Location|Address)</EM4> and confirm their status. \n\nIf they are deceased, examine the body closely so we can verify their death via your mobiGlas.\n\nAdditional Notes:\nYou'll be heading into what is regarded as a particularly dangerous spot. Backup is highly recommended for this encounter.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Veteran Contractor:</EM4> +200 Rep
Hockcrow_SearchBody_VeryHard_Title_001=Locate Missing Contractors <EM4>[200 Rep]</EM4>
Hockrow_FacilityDelve_P1M1_desc=Hockrow Agency \nCase File #JD10285\nLead Investigator: Arken Mallor\n\nCase Summary: \nA client has requested that Hockrow compile a complete dossier on infamous scientist <EM4>Dr. Logan Jorrit</EM4>. Believed responsible for the incidents at Associated Science & Development’s Lazarus site, the client is eager to get a broader view of Dr. Logan and his research.\n\nContract Investigator Actions: \nGain access to ASD’s shuttered <EM4>Onyx Facility</EM4> where Dr. Jorrit was formerly the Lead Scientist.  Once there, locate and <EM4>access the research lab’s personnel files</EM4> so that we can get an overview of what was going on there.\n\nAdditional Notes:\nThe QT beacon to the site was deactivated when the facility went dark so you'll have to fly the last leg manually.\n\nWhile ASD has formally closed the facility, caution is still advised. Not only may the labs themselves be hazardous, but the surrounding area shows signs of recent visitors. Scavengers or squatters may be on site.\n\nI've also managed to wrangle an employee ID code for you so as long as you're on the job, you'll be able to access the computers there. \n\nAdditionally, Onyx Facility only has large hangars available, so plan your travel appropriately.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 3/7
Hockrow_FacilityDelve_P1M1_title=Jorrit Dossier: Onyx Personnel Files
Hockrow_FacilityDelve_P1M2_desc=Hockrow Agency \nCase File #JD10285\nLead Investigator: Arken Mallor\n\nCase Update: \nFrom the personnel files recovered at the Onyx Facility, we have now learned that Dr. Jorrit has recently visited the site and accessed files while there. The next step will be to follow this lead and try to learn exactly what Dr. Jorrit was doing in his old lab.\n\nContract Investigator Actions:\nExplore the <EM4>Engineering</EM4> wing and <EM4>access Dr. Jorrit’s recent files</EM4>.\n\nAdditional Notes:\nI've found a work around for the QT issue so you'll be able to travel directly to the site from now on.\n\nBe wary of possible hostile forces on site. \n\nTravel to Onyx in a vehicle that can be stored in a large hangar.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 3/7
Hockrow_FacilityDelve_P1M2_title=Jorrit Dossier: Access Engineering Files
Hockrow_FacilityDelve_P1M3_desc=Hockrow Agency \nCase File #JD10285\nLead Investigator: Arken Mallor\n\nCase Update:\nThe files you found in Engineering confirm that Dr. Jorrit is actively pursuing something at the site, but it is still unclear what the doctor is up to. I’m hoping that if you can find the data he was accessing in Research it will provide further clarity.\n\n\nContract Investigator Actions:\nExplore the <EM4>Research</EM4> wing to locate and <EM4>access Dr. Jorrit’s recent files</EM4> .\n\nAdditional Notes:\nBe wary of possible hostile forces on site. \n\nTravel to Onyx in a vehicle that can be stored in a large hangar.\n\nOnce you accessed these files, I'll be sending you <EM4>5 Secure Drives</EM4> with copies of whatever data we've gathered so far. You can collect them at your home location.\n\n<EM3>ITEM REWARDS</EM3>\n- ASD Secure Drive\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 3/7
Hockrow_FacilityDelve_P1M3_title=Jorrit Dossier: Access Research Files
Hockrow_FacilityDelve_P2M1_Repeat_desc=Hockrow Agency \nCase File #JD10285\nLead Investigator: Arken Mallor\n\nCase Update: \nIt would be helpful to have the most recent energy anomaly data so that we can compare it to what you delivered last time. Any difference between the two data sets could prove useful.\n\nContract Investigator Actions:\nExplore the <EM4>Engineering</EM4> wing and <EM4>retrieve the Energy Anomaly data</EM4> and deliver it to <EM4>~mission(Destination|Address)</EM4>.\n\nAdditional Notes:\nBe wary of possible hostile forces on site. \n\nTravel to Onyx in a vehicle that can be stored in a large hangar.\n\nOnce you hand off this data, I'll send you a <EM4>ASD Secure Drive</EM4> that you can collect at your home location.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Fresnel Energy LMG\n- Zenith Laser Sniper Rifle\n- [S1-A] Corbel Arms Mire\n- [S1-A] Corbel Core Mire\n- [S1-A] Corbel Helmet Mire\n- [S1-A] Corbel Legs Mire\n- [S1-A] Fresnel Energy LMG Battery (165 Cap)\n- [S1-A] Geist Armor Arms Forest\n- [S1-A] Geist Armor Core Forest\n- [S1-A] Geist Armor Helmet Forest\n- [S1-A] Geist Armor Legs Forest\n- [S3-A] Novikov Backpack Mire\n\n<EM3>ITEM REWARDS</EM3>\n- ASD Secure Drive\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
Hockrow_FacilityDelve_P2M1_Repeat_title=Jorrit Dossier: Updated Energy Anomaly Data <EM4>[BP]</EM4>
Hockrow_FacilityDelve_P2M1_desc=Hockrow Agency \nCase File #JD10285\nLead Investigator: Arken Mallor\n\nCase Update: \nReviewing Dr. Jorrit’s recent files that you uploaded to me left us with more questions than answers. While we know for a fact that the doctor had been inside Onyx, we don’t yet know the specifics of what he was doing. The client is eager for us to learn more about what exactly Jorrit’s up to, so I’m afraid you’re going to have to go back in.\n\nI have a few ideas on how we might be able to use the facility’s systems to pinpoint Dr. Jorrit’s activities, though you’ll have to physically bring me the data this time so we can properly analyze it. First up, are the energy sensors in Engineering. They’re still active and sensitive enough to pick up any anomalous readings.\n\nContract Investigator Actions:\nExplore the <EM4>Engineering</EM4> wing and <EM4>retrieve the Energy Anomaly data</EM4> and deliver it to <EM4>~mission(Destination|Address)</EM4>.\n\nAdditional Notes:\nBe wary of possible hostile forces on site. \n\nTravel to Onyx in a vehicle that can be stored in a large hangar.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7
Hockrow_FacilityDelve_P2M1_title=Jorrit Dossier: Retrieve Energy Anomaly Data
Hockrow_FacilityDelve_P2M2_Repeat_desc=Hockrow Agency \nCase File #JD10285\nLead Investigator: Arken Mallor\n\nCase Update: \nOut of an over-abundance of caution, it would be good to see if the security systems have picked up anything new since the last batch of data you delivered. That way we can make sure we’re up-to-date on what’s been happening down there.\n\nContract Investigator Actions:\nExplore the <EM4>Research</EM4> wing and <EM4>retrieve the Security data</EM4> and deliver it to <EM4>~mission(Destination|Address)</EM4>.\n\nAdditional Notes:\nBe wary of possible hostile forces on site. \n\nTravel to Onyx in a vehicle that can be stored in a large hangar.\n\nOnce you hand off this data, I'll send you a <EM4>ASD Secure Drive</EM4> that you can collect at your home location.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Fresnel "Rockfall" Energy LMG\n- Zenith "Landslide" Laser Sniper Rifle\n- [S1-A] Corbel Arms Patina\n- [S1-A] Corbel Core Patina\n- [S1-A] Corbel Helmet Patina\n- [S1-A] Corbel Legs Patina\n- [S1-A] Fresnel Energy LMG Battery (165 Cap)\n- [S1-A] Geist Armor Arms\n- [S1-A] Geist Armor Core\n- [S1-A] Geist Armor Helmet\n- [S1-A] Geist Armor Legs\n- [S3-A] Novikov Backpack Patina\n\n<EM3>ITEM REWARDS</EM3>\n- ASD Secure Drive\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
