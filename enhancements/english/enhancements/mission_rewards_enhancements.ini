Hockrow_FacilityDelve_P2M4_desc=Hockrow Agency \nCase File #JD10285\nLead Investigator: Arken Mallor\n\nCase Update: \nThe seismic data you extracted had some interesting revelations. My expert says she thinks that Jorrit might have been excavating down there. Hate to think what he’s doing, but it's our job to find out. I think we’re close to cracking this, so I want you to go back to Onyx and gather the Power Usage data. If we can track energy flow from the last couple months, a pattern should reveal itself. \n\nContract Investigator Actions:\nExplore the <EM4>Engineering</EM4> wing and <EM4>upload the Power Usage data</EM4>.\n\nAdditional Notes:\nBe wary of possible hostile forces on site. \n\nTravel to Onyx in a vehicle that can be stored in a large hangar.\n\nOnce you hand off this data, I'll be sending you <EM4>10 Secure Drives</EM4> with copies of the information we've gathered so far. You can collect them at your home location.\n\n<EM3>ITEM REWARDS</EM3>\n- ASD Secure Drive\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7
Hockrow_FacilityDelve_P2M4_title=Jorrit Dossier: Power Usage Data
Hockrow_FacilityDelve_P3M1_desc=Hockrow Agency \nCase File #JD10285\nLead Investigator: Arken Mallor\n\nCase Update: \nAll your digging around Onyx has paid off. I’ve been able to confirm that Jorrit has been operating an off-the-record lab in the facility’s Site-B in order to conduct an experiment he calls “Project Hyperion.” I’ll send his <EM4>lab notes to your mobiGlas journal</EM4> once you’re underway, but the long and short of it is the bastard is trying to make Humans evolve or some nonsense like that.\n\nThe client wants the experimental data, so you’re going back to Onyx and do everything needed to get Project Hyperion up and running. \n\nContract Investigator Actions:\nPrep the experiment by collecting a <EM4>Reagent code from the Engineering wing</EM4> and a <EM4>Catalyst code from the Research wing</EM4>.\n\nOnce you have those, head down to the <EM4>Lab in Site-B</EM4> and <EM4>run the experiment</EM4> so you can <EM4>upload the results</EM4>.\n\nAdditional Notes:\nSince this is an active lab, there might be ASD security on-site.\n \nTravel to Onyx in a vehicle that can be stored in a large hangar.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Fresnel "Molten" Energy LMG\n- Zenith "Darkwave" Laser Sniper Rifle\n- [S1-A] Geist Armor Arms ASD Edition\n- [S1-A] Geist Armor Core ASD Edition\n- [S1-A] Geist Armor Helmet ASD Edition\n- [S1-A] Geist Armor Legs ASD Edition\n- [S1-A] Zenith Laser Sniper Rifle Battery (22 Cap)\n- [MIL-S1-B] DynaFlux\n- [MIL-S2-B] Bolide\n- [MIL-S3-B] Fulgur\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Blueprint Reward:</EM4> 100% chance (Repeat only)\n\n<EM4>? = only the Repeat variant awards blueprints</EM4>
Hockrow_FacilityDelve_P3M1_title=Jorrit Dossier: Project Hyperion <EM4>[BP?]</EM4>
Hurston_bounty_boss_dc_desc_001=HURSTON DYNAMICS OUTSOURCING\nCONTRACT: Bounty Collection\nOUTSOURCE MANAGER: I. Takao\nRISK ASSESSMENT: High Risk Target (Armed Support)\n\nHurston Dynamics is seeking a contractor to complete a bounty for ~mission(TargetName). This bounty has proven extremely elusive so far, but intel reports have tracked the target and a cohort of their known associates to ~mission(Location|Address). \n\nHowever, there is a strong chance that ~mission(TargetName|Last) will not risk a confrontation unless absolutely forced to. It is our recommendation that you neutralize a significant portion of the criminal’s allies first in order to draw them out. The report indicates that a large party of these hostiles are currently near the ~mission(Location).\n\nPayment will be released only after the bounty has been deemed complete.\n\n\n\n\n** The information transmitted may contain confidential and/or privileged material. Any review, retransmission, dissemination or other use of or taking action in reliance upon this information by persons or entities other than the intended recipient is prohibited. **\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Juggernauts x1, Snipers x2, Soldiers x13, Technicians x3
Hurston_bounty_boss_dc_title_001=Elusive Bounty: ~mission(TargetName) (HRT) <EM4>[500 Rep]</EM4>
Hurston_bounty_multiboss_dc_desc_001=HURSTON DYNAMICS OUTSOURCING\nCONTRACT: Bounty Collection\nOUTSOURCE MANAGER: I. Takao\nRISK ASSESSMENT: Very High Risk Target (Armed Support)\n\nHurston Dynamics is seeking a contractor to complete a bounty for ~mission(TargetName). This target and the large hostile force they are traveling with have just been reported raiding ~mission(Location|Address). \n\nHowever, if their MO holds true, ~mission(TargetName|Last) has typically remained hidden during attacks, preferring to direct their forces from afar. It is our recommendation that you focus on thinning out their allies first, and once their numbers have been significantly weakened, ~mission(TargetName|Last) will have no choice but to confront you directly. \n\nPayment will be released only after the bounty has been deemed complete.\n\n\n\n\n** The information transmitted may contain confidential and/or privileged material. Any review, retransmission, dissemination or other use of or taking action in reliance upon this information by persons or entities other than the intended recipient is prohibited. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Backup x5, Juggernauts x1, Soldiers x18, Technicians x32
Hurston_bounty_multiboss_dc_title_001=Evasive Bounty: ~mission(TargetName) (VHRT) <EM4>[1,000 Rep]</EM4>
Hurston_eliminateall_dc_desc_001=HURSTON DYNAMICS OUTSOURCING\nCONTRACT: Neutralize Hostile Force\nOUTSOURCE MANAGER: T. Dalik\nRISK ASSESSMENT: High\n\nOur security forces have been notified of an ongoing outlaw incursion at ~mission(Location|Address), and we are in need of an independent operator capable of clearing out the hostile actors. \n\nAccording to onsite personnel, the outlaws are currently holed up near the ~mission(Location). Approach with caution and be prepared to use lethal force if the outlaws resist being removed.\n\nPayment will only be authorized once the location has been effectively cleared.\n\n\n\n\n** The information transmitted may contain confidential and/or privileged material. Any review, retransmission, dissemination, or other use of or taking action in reliance upon this information by persons or entities other than the intended recipient is prohibited. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> CQC x20, Soldiers x4
Hurston_eliminateall_dc_title_001=Neutralize Outlaw Incursion <EM4>[500 Rep]</EM4>
Hurston_eliminatespecifc_dc_desc_001=HURSTON DYNAMICS OUTSOURCING\nCONTRACT: Bounty Collection\nOUTSOURCE MANAGER: T. Davik\nRISK ASSESSMENT: Moderate Risk Target\n\nHurston Dynamics is seeking a contractor to complete a bounty for ~mission(TargetName). Intel reports have tracked the target to ~mission(Location|Address) where they were last seen near the ~mission(Location). \n\nBe prepared for them to resist apprehension and for the use of lethal force if required.\n\nPayment will be released only after the bounty has been deemed complete.\n \n\n\n\n** The information transmitted may contain confidential and/or privileged material. Any review, retransmission, dissemination or other use of or taking action in reliance upon this information by persons or entities other than the intended recipient is prohibited. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> CQC x18, Juggernauts x1, Snipers x2, Soldiers x6
