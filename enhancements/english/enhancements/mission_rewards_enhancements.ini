hurston_UGF_eliminateall_desc_001=HURSTON DYNAMICS\nOUTSOURCING DEPARTMENT\n\nCONTRACT: Facility Sweep\nCONTRACTOR AFFILIATION: Independent\nOUTSOURCE MANAGER: G. Livingston\nRISK ASSESSMENT: High\nRUSH CONTRACT: No\n\nHurston is seeking a contractor willing to clear out the criminal occupants from ~mission(Location|Address).\n\nThe site has been used to host numerous illegal activities, so it is imperative that it is secured. \n\nYou are authorized to take any actions necessary. Payment will be sent once the facility is confirmed to be clear. \n\n\n\n** The information transmitted may contain confidential and/or privileged material. Any review, retransmission, dissemination, or other use of or taking action in reliance upon this information by persons or entities other than the intended recipient is prohibited. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x20, Sentries x10, Snipers x2
hurston_UGF_eliminateall_nocivs_desc_001=HURSTON DYNAMICS\nOUTSOURCING DEPARTMENT\n\nCONTRACT: Facility Sweep\nCONTRACTOR AFFILIATION: Independent\nOUTSOURCE MANAGER: K. Restle\nRISK ASSESSMENT: High\nRUSH CONTRACT: No\n\nHurston is seeking a contractor willing to clear out criminal occupants from ~mission(Location|Address).\n\nThe site has been used to host numerous illegal activities, so it is imperative that it is secured. \n\nNote that you are only cleared to engage with confirmed hostiles. Assaulting any civilians at the site will be considered a violation of your contract. \n\nPayment will be sent once the facility is confirmed to be clear. \n\n\n\n** The information transmitted may contain confidential and/or privileged material. Any review, retransmission, dissemination, or other use of or taking action in reliance upon this information by persons or entities other than the intended recipient is prohibited. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13\n<EM4>Friendlies:</EM4> Civilians x4
