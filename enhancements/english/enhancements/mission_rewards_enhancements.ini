Foxwell_DefendDestructibleEntites_VH_Desc_001=Urgent ship support needed at <EM4>~mission(Location|Address)</EM4>. A known destructive criminal organization has been testing the waters with one of our clients’ property for months, and has now raised hell by targeting the client’s <EM4>~mission(Objects)</EM4>. These assets are highly valuable, so need to keep those safe at all costs – though we know it’ll be no easy feat.\n\nI cannot stress enough how dangerous these guys are, so I wouldn’t hesitate to <EM>bring backup</EM> to deal with them. If you and the assets make it out intact, we’re offering a well-earned <EM4>~mission(ScripAmount) MG Scrip</EM4>  to the main contractor. \n\nBest of luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x17\n<EM4>Rep:</EM4> +250\n<EM4>Blueprint Reward:</EM4> 100% chance (VeryHard only)\n\n<EM4>? = only the VeryHard variant awards blueprints</EM4>
