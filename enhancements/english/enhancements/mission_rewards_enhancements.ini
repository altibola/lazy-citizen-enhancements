cfp_defendship_Intro_Desc_001=Citizens for Prosperity is in need of pilots with dogfighting experience. If you’re looking to put your skills to the test, I have a mission here for you to try. \n\nA civilian ship has requested combat support near <EM4>~mission(Location|Address)</EM4>. Head there and show us that you have the skills to excel in these types of missions and we’ll put you to good use.  \n\nPlease be aware. This mission is not a training exercise. This is a real encounter, so please do your best to save the ship in distress. \n\nGood Luck,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x2\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +50 Rep
cfp_defendship_Intro_title_001=Seeking Experienced Combat Pilots <EM4>[50 Rep]</EM4>
cfp_defendship_LRT_SB_Desc_001=Need a pilot who can hold their own in a dogfight. A Citizens for Prosperity scout ship ran into a problem with the Shattered Blade near <EM4>~mission(Location|Address)</EM4>. Must be an area of special interest for them. They launched an attack when our ship got close and don’t seem content simply driving them off. Looks like they’re out for blood.  \n\nAny chance you could lend a hand before we lose that ship?\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_LRT_SB_title_001=Provide Combat Support <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
cfp_defendship_LRT_desc_001=One of our pilots had just picked up a shipment of supplies near ~mission(Location|Address) when they were attacked by some vicious shipjackers. \n\nWe just received their distress beacon and I'm hoping you can go provide them combat support.\n\nAny assistance you could give would make all the difference.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Jr. Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> 100% chance (Easy only)\n\n<EM4>? = only the Easy variant awards blueprints</EM4>
