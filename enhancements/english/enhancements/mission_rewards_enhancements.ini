headhunters_killship_gen_vlrt_desc_001=Got a small fry who thinks they can hit the Headhunters and get away with it. So ~mission(TargetName) tried to knock over one of our stashes and think they can get away with it. \n\nLast we heard they were spotted around ~mission(Location|Address). We need someone to head over and send a very clear message who is the reigning power in the system.\n\nDo it quick and clean.\n\nStows out.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1\n<EM4>Jr. Contractor:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_killship_gen_vlrt_rank0_desc_001=You know us. You know what we do. System’s getting a little crowded, so we’re looking for some good soldiers to help keep our place here.\n\nIf you’re up for it and don’t mind getting your hands dirty, we’ve got something to prove you’ve got the stuff we’re looking for.\n\n~mission(TargetName) was a former member who sold us out to XenoThreat and got some of their brothers and sisters killed. Now they think they can just live their life without consequence.\n\nYou take them out. You get boosted in. Sounds like a fair trade.\n\nThey’ve been spotted around ~mission(Location|Address), so get there and take care of it.\n\nStows out.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1\n<EM4>Neutral:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
