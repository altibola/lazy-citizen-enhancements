hurston_UGF_eliminateall_allies_desc_001=HURSTON DYNAMICS\nOUTSOURCING DEPARTMENT\n\nCONTRACT: Facility Protection\nCONTRACTOR AFFILIATION: Independent\nOUTSOURCE MANAGER: T. Spooner\nRISK ASSESSMENT: High\nRUSH CONTRACT: No\n\nThe security personnel at ~mission(Location|Address) is being threatened by a local criminal element and Hurston Security is seeking contractors to bolster their defenses and eliminate any hostiles who attempt to breach the site.\n\nNote that you are only cleared to engage with confirmed hostiles. Assaulting any security personnel at the site will result in a breach of contract.\n\nPayment will be sent once the facility is confirmed to be safe. \n\n\n\n** The information transmitted may contain confidential and/or privileged material. Any review, retransmission, dissemination, or other use of or taking action in reliance upon this information by persons or entities other than the intended recipient is prohibited. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
hurston_UGF_eliminateall_allies_desc_intro=HURSTON DYNAMICS\nOUTSOURCING DEPARTMENT\n\nCONTRACT: Facility Protection\nCONTRACTOR AFFILIATION: Independent\nOUTSOURCE MANAGER: T. Spooner\nRISK ASSESSMENT: High\nRUSH CONTRACT: No\n\nA local criminal group has been threatening ~mission(Location|Address) and Hurston Security is seeking contractors to bolster their defenses and eliminate any hostiles who attempt to breach the site.\n\nNote that you are only cleared to engage with confirmed hostiles. Assaulting any security personnel at the site will result in a breach of contract.\n\nPayment will be sent once the facility is confirmed to be safe. Successful completion of this evaluation will allow you to be considered for future work as a security contractor.\n\n\n\n** The information transmitted may contain confidential and/or privileged material. Any review, retransmission, dissemination, or other use of or taking action in reliance upon this information by persons or entities other than the intended recipient is prohibited. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
hurston_UGF_eliminateall_allies_desc_rehire=HURSTON DYNAMICS\nOUTSOURCING DEPARTMENT\n\nCONTRACT: Facility Protection\nCONTRACTOR AFFILIATION: Independent\nOUTSOURCE MANAGER: T. Spooner\nRISK ASSESSMENT: High\nRUSH CONTRACT: No\n\nOur department performs periodic reevaluations of past security contractors and have determined that you may be a suitable candidate for possible reinstatement.\n\nTo reclaim your status, Hurston Security is seeking contractors to assist with eliminating a local criminal element threatening ~mission(Location|Address).\n\nNote that you are only cleared to engage with confirmed hostiles. Assaulting any security personnel at the site will result in a breach of contract.\n\nPayment will be sent once the facility is confirmed to be safe. Successful completion of this reevaluation will allow you to be considered for future work as a security contractor.\n\n\n\n** The information transmitted may contain confidential and/or privileged material. Any review, retransmission, dissemination, or other use of or taking action in reliance upon this information by persons or entities other than the intended recipient is prohibited. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
