headhunters_defend_xt_desc_001=Those XenoThreat punks launched an attack against ~mission(Location|Address) so we're looking for people to go fend them off. \n\nGet out there and waste every XenoThreat you see.\n\nStows out.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_defend_xt_title_001=Back up needed at outpost <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
headhunters_defendship_LRT_PA_desc_001=You busy? A promising prospect was doing a special run for me but ran into trouble with the People’s Alliance around <EM4>~mission(Location|Address)</EM4>. This one’s on me. Knew they weren’t the best dogfighter but thought they could do this without running into any other ships. \n\nTold ‘em to hold tight and do everything they can to stay alive until support gets there. Shouldn’t be too much trouble for someone with your skillset.  \n\n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +100 Rep
headhunters_defendship_LRT_PA_title_001=Headhunter Needs Help <EM4>[100 Rep]</EM4>
headhunters_defendship_LRT_desc_001=Just got word that a Headhunter over near ~mission(Location|Address) got roped into a fight and now they can't see it through. The idiot wants me to save their sorry ass.\n\nGuess I'm a soft touch, because I'm actually going to pay you to do it for me. What do you say? Wanna save a moron's life?\n\n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +150 Rep
headhunters_defendship_LRT_title_001=Headhunter Pilot in Trouble <EM4>[150 Rep]</EM4>
headhunters_defendship_MRT_PA_desc_001=Some People’s Alliance members with a death wish decided to target one of our ships. Need someone to hustle over to <EM4>~mission(Location|Address)</EM4> and show ‘em what happens when you mess with the Headhunters.\n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +150 Rep
headhunters_defendship_MRT_PA_title_001=Backup Needed Now <EM4>[150 Rep]</EM4>
headhunters_defendship_MRT_desc_001=One of my pilots wasn't thinking straight and got themselves mixed up in a heap of trouble over at ~mission(Location|Address). \n\nThe real kicker is the fool has a full hold. Can't really afford to lose the stuff they're carrying, so I'd appreciate it if you could go bail them out for me. \n\n- Stows out\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +200 Rep
headhunters_defendship_MRT_title_001=Headhunter Ship Needs Backup <EM4>[200 Rep]</EM4>
headhunters_defendship_VLRT_PA_desc_001=Guess some folks just can’t dogfight. Sent a young prospect out on patrol, and am now being barraged with comms about how they’re barely hanging on. Had them update me with the details about who they’re up against and I damn near fell outta my chair laughing.    \n\nIf this kid can’t handle a People’s Alliance ship, they sure ain’t ready for flight assignments. Appreciate it if you could save their hide anyway.\n\nIf you’re free, could you head over to <EM4>~mission(Location|Address)</EM4> and show ‘em how it’s done?\n\n-Stows\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x2\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep
headhunters_defendship_VLRT_PA_title_001=Help Headhunters Prospect <EM4>[100 Rep]</EM4>
headhunters_defendship_VLRT_desc_001=Seems we got some upstarts trying to muscle in our operations by hitting a Headhunter ship near ~mission(Location|Address). Not sure how they expected to get away with it.\n\nThey need to learn the hard way that's not how things work in Pyro. You up for heading over there and teaching these bastards a lesson?\n\n- Stows out\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep
headhunters_defendship_VLRT_title_001=Headhunter Pilot Needs a Hand <EM4>[100 Rep]</EM4>
headhunters_defendship_multi_HRT_PA_desc_001=Sent ships to investigate a distress beacon only for it to turn into an ambush by the People’s Alliance. They’ve been fighting like hell to get away but can’t seem to extract themselves.\n\nLet’s get ‘em some help on the double. Think you can go on over to <EM4>~mission(Location|Address)</EM4> to give ‘em some support?\n\n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Sr. Contractor:</EM4> +200 Rep
headhunters_defendship_multi_HRT_PA_title_001=Bring Down the Hammer <EM4>[200 Rep]</EM4>
headhunters_defendship_multi_SRT_PA_desc_001=Got ourselves in a real mess here. A Headhunters ship on an important mission got attacked near <EM4>~mission(Location|Address)</EM4>. Can’t get too into the specifics but it’s absolutely vital that they survive. The People’s Alliance know this too because they’re throwing everything they can at ‘em.\n\nNot gonna pull any punches. This is a serious-ass situation that many wouldn’t survive. If you do, I’ll sing your praises and make sure you’re paid well.   \n\n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Head Contractor:</EM4> +300 Rep
headhunters_defendship_multi_SRT_PA_title_001=Looking for a Damn Hero <EM4>[300 Rep]</EM4>
headhunters_defendship_multi_VHRT_PA_desc_001=One of our Clips is in a tight spot. Just got a comm from ‘em saying their convoy is being swarmed by the People’s Alliance and they need help on the double. Well, they said it in a more colorful way than that. All I’ll say is that I don’t want to hear what they’ll say to me if they don’t survive and are forced to regen. \n\nSituation must be serious if this Clip is freaking out. Really need you to get to <EM4>~mission(Location|Address)</EM4> immediately, and ensure that they make it out alive.\n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Veteran Contractor:</EM4> +250 Rep
headhunters_defendship_multi_VHRT_PA_title_001=Rally to Help Clips Convoy <EM4>[250 Rep]</EM4>
headhunters_eliminateall_XT_derelicts_desc_01=One of our Judges caught wind of XenoThreat trying to move in on our territory. Seems like they’re trying to take over ~mission(Location|Address). We don’t want to let those psychos get any more of a foothold in system than they already have, so we’re putting some creds on the line to get ‘em to back off.\n\nWe want you to come down on them hard. Don’t let up till the whole place is a graveyard. We’ll send your payment once the bodies are ready to bury.\n\n- Stows out.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x2, Snipers x2, Soldiers x4, Technicians x3\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_XT_derelicts_title_01=Turf War <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
headhunters_eliminateall_base_Generic_E_desc_001=So here's the deal, we got some small time dirtbags who think they're hotshots running out of a base near ~mission(Location|Address). I don't know what toxic shit they're drinking but they thought it'd be a good idea to step to some Headhunter Clips. Killed one, injured three more. So I'm looking to send someone there to blast their ambition right out of their skulls.\n\nHead over and get it done. You'll get a nice bump of creds for it.\n\n- Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x27\n<EM4>Jr. Contractor:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_base_Generic_E_title_001=Need a hitter <EM4>[BP]</EM4> <EM4>[50 Rep]</EM4>
headhunters_eliminateall_cfp_E_desc_001=Need someone to sweep ~mission(Location|Address). CFP security forces seized the outpost from a group of locals that'd been there for years. Beat the hell out of 'em from what I heard, so they came to Headhunters asking for revenge. \n\nNeed it done fast and clean. \n\nStows out.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x1, Juggernauts x2, Snipers x1, Soldiers x2, Technicians x2\n<EM4>Jr. Contractor:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_cfp_E_title_001=Hitting a CFP site <EM4>[BP]</EM4> <EM4>[50 Rep]</EM4>
headhunters_eliminateall_cfp_M_desc_001=Word came down from the Judge that we're to hit ~mission(Location|Address). It's owned by CFP and security there have been less than hospitable to some of the locals, so they gotta go.\n\nThey may talk a big game about bringing security, but they got guns and are more than happy to use 'em.\n\nStows out.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x2, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Jr. Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_cfp_M_title_001=~mission(Location) has been greenlit <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
headhunters_eliminateall_cfp_desc_001=Here's the deal. Some of those mercs that CFP hired as security went and shot up some Headhunters that were just moving through the system. They weren't even doing anything, just flying.\n\nAnyway, we tracked them back to ~mission(Location|Address) and want to dish out some payback. Grab your gear and be our weapon, we'll make it worth your while.\n\n- Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_cfp_title_001=Looking for a little revenge <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
headhunters_eliminateall_outpost_desc_01=Some assholes are refusing to pay us what we’re owed. Problem is, these idiots are bragging about it. Had they kept it quiet, we could’ve taken care of this more surgically, but now we need to send a message.\n\nThe fools are operating from ~mission(Location|Address). We need them all gone. Make it as loud as you can. We’ll send your payment once everyone’s taken care of.\n\n- Stows out.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_outpost_title_01=Reputation Management <EM4>[BP]</EM4> <EM4>[25–300 Rep]</EM4>
headhunters_eliminateall_retrievestolen_base_Generic_M_desc_001=Local crew decided to hit one of our convoys and steal our shit. They got away, but we aren't gonna let them celebrate for long. I want you to head out to ~mission(Location|Address) where they got a base, blast them into ash, and get our stuff back. \n\nOnce you got the cargo, take it over to ~mission(Destination|Address) and we can all forget these assholes ever existed.\n\nStows out.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x27\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_retrievestolen_base_Generic_M_title_001=Death and cargo <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
headhunters_eliminateall_xt_desc_001=It's sad to say but we lost one of our outposts to XenoThreat. Appalling if you ask me, but that's why we're looking for someone who's got the time and ammunition to take it back.\n\nIf that's you, head over to ~mission(Location|Address) and take it back.\n\nStows out.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x4, Technicians x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_xt_title_001=Green light on ~mission(Location) <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
headhunters_eliminatespecific_desc_001=Some interesting information just fell into my lap. Guess the notorious XenoThreat leader ~mission(TargetName) is holed up at ~mission(location|address) working on some big op for them. Perfect opportunity to kill the piece of shit once and for all.\n\nThing is, the Xenos have their eyes all over Headhunter operations at the moment. There’s no way we can mobilize and deploy a crew without ~mission(TargetName|Last) getting tipped off. So I’m offering you the chance to make Pyro a better place and earn some creds at the same time.\n\nIf interested, I suggest gearing up and finding some backup before heading out. You'll only get paid if you take out ~mission(TargetName|Last), but don’t hesitate to kill any other little XenoThugs that might be hiding there with ‘em.  \n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x1
headhunters_eliminatespecific_title_001=Ripe for Retribution <EM4>[1,000 Rep]</EM4>
headhunters_killship_asteroid_rank0_desc_001=So here's the deal, Headhunters are looking to expand their talent pool and have a few openings for anyone who's got the stones.\n\nThere's a real piece of work named ~mission(TargetName) who thinks they've been really clever pinching cargo off of haulers moving through the system. We asked for a cut of their profits as a licensing tax to continue operating. When ~mission(TargetName|Last) responded, they were very disrespectful.\n\nWe've tracked their ship to ~mission(Location|Address) and need them taken out. You should know, they're being smart and sticking close to some allies so they won't be alone.\n\nDo this and we'll consider you for future Headhunter work.\n\nStows out.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1\n<EM4>Neutral:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
