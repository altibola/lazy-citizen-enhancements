Hockrow_FacilityDelve_P2M3_desc=Hockrow Agency \nCase File #JD10285\nLead Investigator: Arken Mallor\n\nCase Update: \nThanks to that last batch of data you delivered, we’re starting to fill in the gaps on what Dr. Jorrit’s doing down there. Got a rough timeline of his activities. Seems he’s had more stuff coming into Onyx than going out which is interesting. We’re going to need more intel though. There’s an old experiment running down there that monitors minute seismic changes. If you can deliver that data to me, it’ll help us pinpoint some of the movement around the facility.\n\nContract Investigator Actions:\nExplore the <EM4>Research</EM4> wing and <EM4>retrieve the Seismic data</EM4> and deliver it to <EM4>~mission(Destination|Address).</EM4>\n\nAdditional Notes:\nBe wary of possible hostile forces on site.\n \nTravel to Onyx in a vehicle that can be stored in a large hangar.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7
