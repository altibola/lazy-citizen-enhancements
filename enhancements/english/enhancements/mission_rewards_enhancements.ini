Hockrow_FacilityDelve_P2M2_desc=Hockrow Agency \nCase File #JD10285\nLead Investigator: Arken Mallor\n\nCase Update: \nWe were able to pull some very interesting data from what you delivered, but we still don’t have a clear enough picture. What we did concretely learn though is that the Onyx security monitoring system is still operational. The data from there is going to be your next target.\n\nContract Investigator Actions:\nExplore the <EM4>Research</EM4> wing and <EM4>retrieve the Security data</EM4> and deliver it to <EM4>~mission(Destination|Address)</EM4>.\n\nAdditional Notes:\nBe wary of possible hostile forces on site. \n\nTravel to Onyx in a vehicle that can be stored in a large hangar.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7
