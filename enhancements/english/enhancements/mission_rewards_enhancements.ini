Foxwell_DefendLocation_VH_Desc_001=Ship support is needed at <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> immediately. Our client’s interests in the area are under fierce attack by outlaw forces. Looking for someone who can grab their gear, a few support ships they can trust, and deploy before it’s too late. Once you arrive, I’ll send any sitrep updates your way.  \n\nDon’t mess this up. These clients are paying for and expecting top tier protection. If anything goes wrong, we could lose this contract. That’s why we’ll give the main contractor a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> if all goes down without a hitch.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- [S1-A] Antium Arms Storm\n- [S1-A] Antium Core Storm\n- [S1-A] Antium Helmet Storm\n- [S1-A] Antium Legs Storm\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x7, Hostiles x3, Interdiction Ships x4, Reinforcements x16\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_DefendLocation_VH_Title_001=Red Level Contract: Save Ships at ~mission(DefendLocationWrapperLocation) <EM4>[BP]</EM4> <EM4>[250 Rep]</EM4>
Foxwell_DestroyNarcotics_E_desc_001=Some folks will do anything for a few creds. There’s a group of upstart outlaws over at <EM4>~mission(Location|Address)</EM4> that have decided to start manufacturing drugs. Turns out they’re not too good at it, or maybe a little too good. The junk they’re pumping out is stronger than the normal stuff and a real danger to anyone who uses it. \n\nWe’ve been hired to knock out their operation and destroy whatever drugs stashes are on site. Armed guards are protecting the place, but they don’t seem too skilled. Our surveillance teams observed one of them almost shoot himself in the foot. Can’t say for certain, but odds are they won’t give a pro like you too many problems.  \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Civilians x4\n<EM4>Jr. Security Contractor:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_DestroyNarcotics_E_title_001=Knock Out New Drug Op <EM4>[BP]</EM4> <EM4>[500 Rep]</EM4>
Foxwell_DestroyNarcotics_H_desc_001=Reports of a spike in drug overdoses around Stanton has security services worried. Seems like some two-bit crew is juicing their profits by cutting their stuff with toxic chemicals. Shutting down this crew and stopping the distribution of their drugs has become a top priority.\n\nA Foxwell informant has revealed that part of this crew has currently set up shop at <EM4>~mission(Location|Address)</EM4>. Hiring a contractor to hustle over there and destroy whatever drugs they’ve got stashed before they’re spread across the system. Better be careful though, word is this crew is armed to the teeth and determined to profit off that poison no matter what.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4\n<EM4>Sr. Security Contractor:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_DestroyNarcotics_H_title_001=Destroy Dangerous Drugs <EM4>[BP]</EM4> <EM4>[500 Rep]</EM4>
Foxwell_DestroyNarcotics_M_desc_001=We’ve been contracted to take care of a problem at <EM4>~mission(Location|Address)</EM4>. There’s been a recent surge of activity in the area tied to the drug trade. It appears to be a well-run operation and there’s a growing concern that it’ll expand wider if not stopped. Any chance you’re available to make sure that doesn’t happen?   \n\nJob is pretty straightforward. Head to the site and destroy their stash of drugs. That way they won’t have the creds to expand their operations any further. I wouldn’t expect them to make this easy on you though. Armed guards are regularly seen around the facility, so be sure you’ve got enough gear to deal with them too. \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4\n<EM4>Security Contractor:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_DestroyNarcotics_M_title_001=Destroy Illegal Drugs <EM4>[BP]</EM4> <EM4>[500 Rep]</EM4>
Foxwell_EliminateAll_Allies_desc_001=Got word that outlaws are attempting to overrun <EM4>~mission(Location|Address)</EM4>. There’s local security forces there, but they’re struggling to stop that attack.\n\nNeed a contractor to hustle there and help take care of the aggressors. Bring plenty of gear, and be careful when engaging targets. Don’t want to hear about any security team members getting caught in your crossfire.    \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5\n<EM4>Security Trainee:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
