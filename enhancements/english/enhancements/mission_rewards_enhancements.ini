Foxwell_DefendEntitesAndEscort_VE_Desc=For any pilots in the area – a group of bandits is targeting one of our clients at <EM4>~mission(Location|Address)</EM4>, specifically their <EM4>~mission(Objects)</EM4> and the maintenance ships that manage them. From our intel, it's only a few outlaws trying to make some quick credits, but they're also the type to cause some real damage if you get in their way.\n\nIf you take care of them and relocate the client's ship and crew safely, we’re offering <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor. \n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Nyx]</EM4>\n- [CIV-S0-A] Tepilo\n- [CIV-S0-C] Fridan\n- [CIV-S0-C] Frost-Star SL\n- [CIV-S1-A] Gelid\n- [CIV-S1-C] ArcticStorm\n- [CIV-S1-C] Berian\n- [CIV-S1-C] Frost-Star\n- [CIV-S2-A] Aufeis\n- [CIV-S2-C] ColdSnap\n- [CIV-S2-C] Frost-Star EX\n- [CIV-S2-C] Graupel\n- [CIV-S3-A] Kragen\n- [CIV-S3-B] Elsen\n- [CIV-S3-C] Draug\n- [CIV-S3-C] Frost-Star XL\n- [CIV-S3-C] FrostBurn\n\n<EM4>[Pyro]</EM4>\n- [CIV-S0-B] IonWave\n- [CIV-S0-C] Radix\n- [CIV-S1-B] IonBurst\n- [CIV-S1-B] MagnaBloom\n- [CIV-S1-C] LightBlossom\n- [CIV-S1-C] PowerBolt\n- [CIV-S2-B] IonSurge\n- [CIV-S2-B] Radiance\n- [CIV-S2-C] FullForce\n- [CIV-S3-B] Celestial\n- [CIV-S3-B] IonSurge Pro\n- [CIV-S3-C] FullForce Pro\n- [CIV-S3-C] NewDawn\n\n<EM4>[Stanton]</EM4>\n- [CIV-S1-A] 7SA 'Concord'\n- [CIV-S1-D] INK\n- [CIV-S2-A] 7MA 'Lorica'\n- [CIV-S2-D] RPEL\n- [CIV-S3-A] 7CA 'Nargun'\n- [CIV-S3-D] HAVEN\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge