northrock_boarders_890J_desc_001=An executive client just informed us that their 890 Jump had been intercepted at ~mission(Location) and boarded by outlaws. They would prefer to have this handled privately owing to the sensitive nature of proprietary data that's being stored aboard. \n\nYour first priority will be to clear all outlaws as quickly as possible so that a recovery team can be dispatched to return the ship to the owner. The longer the outlaws have control of the vessel, the higher the chance it will be lost. I recommend you acquire a team for this outing to expedite matters. \n\nNote that thanks to a small contingent of Security Personnel who stayed aboard, all surviving members of the crew were able to flee in an escape craft. The current status of the remaining security is unknown, but just in case, keep an eye out for friendlies when you engage the hostiles.\n\nSecondly, if at all possible, the client is *very* interested in preventing the theft of the aforementioned data. If you are able to stop the theft of their confidential data stores before they are transmitted, a generous bonus will be issued.\n\nNeedless to say, this is a client I would very much like to keep happy. \n\nBraden Corchado\nLogistics Officer - Stanton Branch\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
northrock_boarders_890J_title_001=URGENT: Boarding Action In Progress <EM4>[8,000 Rep]</EM4>
northrock_bounty_PVP_desc_first=Hi,\n\nHope you don't mind, but I was made aware of your Bounty Hunters Guild status and wanted to reach out and see if you'd be interested in contracting with Northrock Service Group, one of the top rated private security firms in the system.\n\nIf you are, the first step would be to complete a pro tem suspect apprehension. It's less of an evaluation and more of a chance to make sure that we can have a good working relationship. \n\nThe suspect you would be after is known as <EM4>~mission(TargetName)</EM4>. They are known to be particularly elusive so you may have your work cut out for you.\n\nHope to hear from you soon, \n\nBraden Corchado\nLogistics Officer - Stanton Branch\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500
northrock_bounty_PVP_desc_rehire=Hey again,\n\nIt's been a little while, hope everything's okay. I know things didn't end on the best terms, but after discussing it with management, I would like to offer you an opportunity to redeem yourself. You had potential and I hate to think that you didn't have a proper chance to show what you're capable of.\n\nApprehend <EM4>~mission(TargetName)</EM4> and we can see about getting your employment status reinstated.\n\nBraden Corchado\nLogistics Officer - Stanton Branch\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
northrock_bounty_PVP_title_001=Apprehend Suspect: ~mission(TargetName) <EM4>[500 Rep]</EM4>
northrock_bounty_PVP_title_first=Pro Tem Suspect Apprehension <EM4>[500 Rep]</EM4>
northrock_bounty_PVP_title_rehire=Pro Tem Suspect Apprehension (Reevaluation) <EM4>[500 Rep]</EM4>
northrock_bounty_desc_first=Hey,\n\nHope everything is going all right. I may have reached out to you already, but just in case, I wanted to message you again. I'm a logistics officer for the Stanton branch of Northrock Service Group, one of the top rated private security firms in the system, and we are looking to expand our portfolio of qualified contractors.\n\nNow, even though you are certified by the Bounty Hunters Guild, Northrock will need you to complete a pro tem contract to make sure you're a good match. I'm thinking I'll start you off collecting the bounty on <EM4>~mission(TargetName)</EM4>. They were last seen at <EM4>~mission(Location|Address)</EM4>. \n\nGet that done and we'll see about getting you more work.\n\nHope to hear from you soon, \n\nBraden Corchado\nLogistics Officer - Stanton Branch\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
northrock_bounty_fps_UGF_boss_desc_001=Hey, \n\nHave an interesting bounty for you. A high level criminal by the name ~mission(TargetName) has been located at ~mission(Location|Address). \n\nBased on our intel, its highly unlikely that the target’s going to be sitting and waiting out in the open. You most likely will have to infiltrate the facility and draw them out. \n\nSomething like a large firefight should be enough to do the trick. \n\nBest of luck,\n\nBraden Corchado\nLogistics Officer - Stanton Branch\nNorthrock Service Group\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- F55 LMG\n- LH86 Pistol\n- [S1-A] Defiance Arms Tactical\n- [S1-A] Defiance Core Tactical\n- [S1-A] Defiance Helmet Tactical\n- [S1-A] Defiance Legs Tactical\n- [S1-A] F55 LMG Magazine (150 cap)\n- [S1-A] Lynx Arms\n- [S1-A] Lynx Core\n- [S1-A] Lynx Legs\n- [S1-A] Oracle Helmet\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Backup x4, Boss x1, Hostiles x2, Soldiers x4, Technicians x4\n<EM4>Applicant:</EM4> +4,000 Rep\n<EM4>Failure Penalty:</EM4> -2,000 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
northrock_bounty_fps_UGF_boss_nocivs_desc_001=Hey, \n\nGot a contract for you that requires a bit more tactics than usual. A high-level criminal by the name ~mission(TargetName) is hiding with a large contingent of outlaws at ~mission(Location|Address). \n\nOur intel suggests that ~mission(TargetName|Last)’s forces most likely will act as defensive line in order to protect their boss. My best guess is that you will have to deal with them before you gain access to ~mission(TargetName|Last).\n\nThat said, I don’t want you shooting indiscriminately. Sometimes these outlaws keep civilians around and they should be treated like non-combatants.\n\nBest of luck,\n\nBraden Corchado\nLogistics Officer - Stanton Branch\nNorthrock Service Group\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- F55 LMG\n- LH86 Pistol\n- [S1-A] Defiance Arms Tactical\n- [S1-A] Defiance Core Tactical\n- [S1-A] Defiance Helmet Tactical\n- [S1-A] Defiance Legs Tactical\n- [S1-A] F55 LMG Magazine (150 cap)\n- [S1-A] Lynx Arms\n- [S1-A] Lynx Core\n- [S1-A] Lynx Legs\n- [S1-A] Oracle Helmet\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Backup x4, Boss x1, Hostiles x2, Soldiers x8, Technicians x4\n<EM4>Friendlies:</EM4> Civilians x4\n<EM4>Applicant:</EM4> +8,000 Rep\n<EM4>Failure Penalty:</EM4> -4,000 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
northrock_bounty_fps_title_001=Bounty Assignment: ~mission(TargetName) (HRT) <EM4>[BP]</EM4> <EM4>[4,000–8,000 Rep]</EM4>
northrock_bounty_prisoner_desc_001=Convicted criminal ~mission(TargetName) has escaped from a local rehab facility and Northrock's been contracted to return the inmate to custody. In my experience, escaped prisoners tend not to give up peacefully, so use any method you can to find and subdue the escapee. \n\nMight be worth staking out spots where they could attempt to hack their record clean. Wouldn't be the first time a prisoner has tried to wipe their sentence after escaping.\n\nGood hunting,\n\nBraden Corchado\nLogistics Officer - Stanton Branch\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
northrock_bounty_prisoner_desc_intro=Hey There,\n\nMy name is Braden Corchado and I'm a logistics officer for Northrock Service Group, the leading independently-owned security firm operating in the Stanton system. I may have reached out already, but we try to make it a point of approaching anyone who meets our high standards and encouraging them to complete a pro tem contract. \n\nYou can't do much better than become a Northrock contractor. We have a solid reputation for offering challenging and interesting work at a higher rate of pay then many of our competitors in system. \n\nNow, to get approved, you will need to apprehend one ~mission(TargetName). They have recently escaped from the detention center and your job will be to track them down before they can disappear completely off the grid. \n\nA little hint is that it's safe to assume that the target is going to go try to clear their record. I recommend triangulating your search between the detention center they escaped from and locations where they can hack into the record system.\n\nGet this done and we'll see about getting you more work.\n\nHope to hear from you soon, \n\nBraden Corchado\nLogistics Officer - Stanton Branch\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500
northrock_bounty_prisoner_desc_rehire=Hey,\n\nI know it's been a little while, but if you are still interested in doing contract work for Northrock, I convinced the management to give you a reevaluation. If you can successfully complete a bounty for us, we can see about getting your employment status reinstated.\n\nThis pro tem contract is to track down escaped criminal ~mission(TargetName). Try your best to get to them before they can wipe their record at database access point or the job's going to be significantly more difficult.\n\nHoping we can trust you on this.\n \nBraden Corchado\nLogistics Officer - Stanton Branch\nNorthrock Service Group\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
