BHG_Certification_VeryEasy_Desc=--------------------------------------------------------\n----------------- BOUNTY CONTRACT -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nSYSTEM: ~mission(System)\nRISK ASSESSMENT: Very Low\nLAST KNOWN LOCATION: ~mission(Location)\nKNOWN AFFILIATIONS: <None>\nNOTES: Based on an assessment of your abilities, the Bounty Hunters Guild would like to offer you the chance to earn your Tracker Training Permit.\n\nThis permit would signify that you are qualified to track and apprehend Very Low-Risk Targets (VLRT). These criminals traditionally fly smaller ships and rarely have more than one escort. Ideal for Bounty Hunters who are just starting out.\n\nTo successfully complete this certification process, you must apprehend a VLRT ranked criminal by the name of <EM4>~mission(TargetName)</EM4> last seen at <EM4>~mission(Location|Address)</EM4>.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 2
