hurston_UGF_destroy_E_desc_001=HURSTON DYNAMICS\nOUTSOURCING DEPARTMENT\n\nCONTRACT: Contraband Elimination\nCONTRACTOR AFFILIATION: Independent\nOUTSOURCE MANAGER: R. Russel\nRISK ASSESSMENT: Medium\nRUSH CONTRACT: No\n\nLocal thugs have been using ~mission(Location|Address) to manufacture large quantities of contraband. Hurston Security requires a contractor to go to the facility and destroy all contraband being stored there.\n\nPayment will be sent once all the contraband is eliminated. \n\n\n\n** The information transmitted may contain confidential and/or privileged material. Any review, retransmission, dissemination, or other use of or taking action in reliance upon this information by persons or entities other than the intended recipient is prohibited. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Civilians x4
