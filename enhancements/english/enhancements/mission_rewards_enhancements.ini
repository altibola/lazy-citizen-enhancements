EckhartSecurity_EliminateAll_DC_Desc_001=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Clear Location\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nA client is sending frantic comms that one of their locations is under attack. We need a contractor who can hustle to <EM4>~mission(Location|Address)</EM4> and clear the location of hostile actors. \n\nAccording to onsite personnel, the outlaws are currently holed up near the <EM4>~mission(Location)</EM4>. Approach with caution and be prepared to use lethal force if the outlaws resist being removed.\n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x20, Juggernauts x2, Snipers x4, Soldiers x12, Technicians x2\n<EM4>Security Trainee:</EM4> +500 Rep (Failure: -50)\n<EM4>Security Trainee:</EM4> +500 Rep
