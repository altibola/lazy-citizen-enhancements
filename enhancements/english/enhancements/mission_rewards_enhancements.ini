bitzeros_shipheist_E_desc_001=Get this, we were sifting through some comms and picked up some excitement about a big score. It was easy work to figure out where they're hiding a ship loaded with cargo and we figured, hey, why keep this profitable knowledge to ourselves? \n\nSend us a few creds in finder fees and we'll send you the coordinates of the asteroid base where the ship is stashed. It’s locked inside a hangar, so you’ll need to get to it via the station’s elevators. But once inside, you’ll be able to override the lockdown at a console. Do that and it should be easy pickings.\n\n57 65 65 76 69 6c\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x30, Heist Target x1, Juggernauts x4, Snipers x1
bitzeros_shipheist_E_title_001=Easy Pickings
bitzeros_shipheist_H_XT_desc_001=You know who probably deserves taking down a peg or two? XenoThreat. \n\nWe pulled some intel off a server that had details of all their upcoming operations, and for the right price, we could send you the exact coordinates of where an XT ship fully loaded with primo cargo is waiting. \n\nHere’s a little taste of what info we have so you know we’re not messing around. XenoThreat stashed the ship in a locked asteroid base hangar that can only be accessed via the station’s elevators. We can’t get the hangar doors open for you but have adjusted the security protocols so you’ll be able to use a console in the hangar to override the lockdown.  \n\nInterested?\n\n57 65 65 76 69 6c\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x54, Heist Target x1, Juggernauts x4, Snipers x1
bitzeros_shipheist_H_XT_title_001=XenoThreat = GoodLoot
bitzeros_shipheist_M_desc_001=You'd figure that if people were planning a big heist they wouldn't leave all the details laying around spectrum where just about anybody could hack them? \n\nBut hey, their loss is your gain. Currently, a cargo-heavy ship is locked down in the hangar of an asteroid base. Only way to access it is via the station’s elevators. Once inside, you’ll be able to use a console to override the lockdown to get everything out of there. We’ll happily sell you the coordinates, but the rest is up to you. \n\nGuess their loss will be our gain too.\n\n57 65 65 76 69 6c\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x42, Heist Target x1, Juggernauts x4, Snipers x2
bitzeros_shipheist_M_title_001=Goods for the Getting
blacjac_RetrieveConsignment_desc_001=ATTN: Mercenaries with Cargo Handling Experience\n\nNine Tails are currently assaulting one of our facilities at ~mission(Location|address). As they just received a delivery of confidential materials, we don’t believe this is a coincidence. BlacJac needs someone to hurry to the location and secure these important boxes before the Nine Tails do. You are authorized to use lethal force against any who attempt to stop you. \n\nAs part of our standard security protocol, the confidential materials were integrated into another consignment and secured in the automated vault. You’ll need to find the relevant retrieval codes for the confidential materials and enter it at the package conveyor to retrieve the boxes. Retrieval codes are stored locally on datapads and only given to high-ranking staff. Hopefully they’re alive to help you, but considering the complete comms blackout, we fear that’s not the case. There's a chance Nine Tails have already gotten their hands on the datapads.  \n\nOnce you’ve gathered all the confidential materials, they will need to be delivered to ~mission(dropoff1|address). Payment is contingent upon their delivery.\n\n\nThanks,\nGloria Mesa\n\nPrivate Contract Supervisor\nBlacJac Security, "Protection Provided"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Guards x4, Hostiles x54
blacjac_RetrieveConsignment_title_001=Protect Site and Procure Confidential Materials <EM4>[500–4,000 Rep]</EM4>
blacjac_UGF_defend_E_desc_001=ATTN: Verified Mercenary Operators\n\nOne of the sites under BlacJac’s purview has been clashing with a few local outlaws. We would like you to head down to ~mission(Location|Address) and secure the site from these hostile threats.\n\nFrom the early reports, I expect this will be a fairly straightforward matter, but if it makes you feel better, feel free to recruit a team to provide you with extra support.\n\nThanks,\nGloria Mesa\n\nPrivate Contract Supervisor\nBlacJac Security, "Protection Provided"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x1, Hostiles x10, Private Security x4, Sentries x6\n<EM4>Unknown:</EM4> 11
blacjac_UGF_defend_E_title_001=Defend Site From Minor Threat <EM4>[500 Rep]</EM4>
blacjac_UGF_defend_VH_desc_001=ATTN: Verified Mercenary Operators\n\nI’ve received a report that some operators are planning on making a move against ~mission(Location|Address). BlacJac wants you to put a team together and defend the site from this dangerous threat.\n\nIt is strongly recommended that you do not attempt to do this contract solo. Hiring a team of skilled mercenaries to provide support would be the smartest route.\n\nThanks,\nGloria Mesa\n\nPrivate Contract Supervisor\nBlacJac Security, "Protection Provided"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x3, Hostiles x8, Private Security x4, Sentries x4\n<EM4>Unknown:</EM4> 21
blacjac_UGF_defend_VH_title_001=Defend Site From Dangerous Threat <EM4>[500 Rep]</EM4>
blacjac_UGF_defend_desc_001=ATTN: Verified Mercenary Operators\n\nWe’ve gotten word that some local muscle have been making threats against ~mission(Location|Address). BlacJac is looking to have you put a team together and protect the site from these hostile threats.\n\nAnd as much as we all love credits, I don’t recommend trying to do this one solo. Hiring a team to come along would be beneficial to your livelihood.\n\nThanks,\nGloria Mesa\n\nPrivate Contract Supervisor\nBlacJac Security, "Protection Provided"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x8, Private Security x4, Sentries x8\n<EM4>Unknown:</EM4> 10
blacjac_UGF_defend_title_001=Defend Site From Threat <EM4>[500 Rep]</EM4>
blacjac_UGF_destroy_E_desc_001=ATTN: Verified Mercenary Operators\n\nIt seems there’s a new operator trying their hand at manufacturing drugs over at ~mission(Location|Address), but the product they’re putting out is extremely toxic. \n\nWe’re sorting through how to handle the arrests, but the important thing is to prevent any more of their supply getting distributed. I need you to get down there and destroy the drugs they’re storing on site.\n\nThere's a good chance the facility isn't abandoned, so you might run into these thugs when you head down there, so be ready for a fight. But if their gun skills are anything like their chemistry, it probably won’t be much of one. \n\nThanks,\nGloria Mesa\n\nPrivate Contract Supervisor\nBlacJac Security, "Protection Provided"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Civilians x4
blacjac_UGF_destroy_E_title_001=Wipe Out Drug Stash <EM4>[500 Rep]</EM4>
blacjac_UGF_destroy_H_desc_001=ATTN: Verified Mercenary Operators\n\nSome enterprising chemists have cooked up a new product that is twice as potent and twice as deadly as the normal stuff. We were able to trace some samples back to the source over at ~mission(Location|Address). \n\nBlacJac wants you to head down ASAP to destroy the entire batch before it can hurt any more of the population. We can worry about making arrests later.\n\nFrom everything we know about this crew, you should expect to meet heavy resistance while attempting to clear out the stash.\n\n\nThanks,\nGloria Mesa\n\nPrivate Contract Supervisor\nBlacJac Security, "Protection Provided"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
blacjac_UGF_destroy_H_title_001=Destroy Dangerous Drugs <EM4>[500 Rep]</EM4>
blacjac_UGF_destroy_desc_001=ATTN: Verified Mercenary Operators\n\nWe got word that a syndicate spiked a rival’s drug package and its causing chaos on the streets. Forensics have identified the source, a production facility over at ~mission(Location|Address). Word is the drug manufacturers don’t even know they have a poisoned crop on their hands.\n\nWe’re sorting through how to handle the arrests, but the important thing is to get this crap off the streets now. I need you to get down there and destroy the drugs they’re storing on site.\n\nThey won’t be happy about it, so you’ll probably have a fight on your hands, but the important thing is clearing out the product.\n\nThanks,\nGloria Mesa\n\nPrivate Contract Supervisor\nBlacJac Security, "Protection Provided"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
blacjac_UGF_destroy_title_001=Clear Out Drugs <EM4>[500 Rep]</EM4>
blacjac_UGF_eliminateall_allies_desc_001=ATTN: Verified Mercenary Operators\n\nWe’ve gotten word from the security team at ~mission(Location|Address) that some of the local scum have been launching attacks. BlacJac is looking to have you go to the site and assist in protecting it from hostile threats.\n\nMake sure you check your fire down there. I don't want to hear about any blue-on-blue incidents.\n\nThanks,\nGloria Mesa\n\nPrivate Contract Supervisor\nBlacJac Security, "Protection Provided"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
blacjac_UGF_eliminateall_allies_desc_intro=ATTN: Verified Mercenary Operators\n\nBlacJac is seeking to expand our roster of security professionals. To evaluate if you’re a good match, we would like you to provide support at ~mission(Location|Address) as they've been having issues with some hostiles in the area.\n\nIf you are able to assist in protecting the site and eliminating the threat, we will be able to offer you more security work.\n\nNote that Friendly fire incidents will not be tolerated.\n\nGood luck,\nGloria Mesa\n\nPrivate Contract Supervisor\nBlacJac Security, "Protection Provided"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
blacjac_UGF_eliminateall_allies_desc_rehire=ATTN: Former Mercenary Operator\n\nI’m aware that BlacJac stopped offering security work, but due to staffing changes it was decided to offer you another chance.\n\nWe’ve gotten word that ~mission(Location|Address) needs some assistance dealing with a local outlaw gang. BlacJac is looking to have you go to the site and assist in eliminating this threat.\n\nAnd since you’re already on thin ice as is, I don’t want to hear that you were involved in any friendly fire incidents.\n\nIf you’re able to pull this operation off, we can see about getting you reinstated.\n\nThanks,\nGloria Mesa\n\nPrivate Contract Supervisor\nBlacJac Security, "Protection Provided"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
blacjac_UGF_eliminateall_allies_title_001=Protect Site <EM4>[500 Rep]</EM4>
blacjac_UGF_eliminateall_allies_title_intro=Protect Site Trial Contract <EM4>[500 Rep]</EM4>
blacjac_UGF_eliminateall_allies_title_rehire=Protect Site Trial Contract <EM4>[500 Rep]</EM4>
blacjac_UGF_eliminateall_desc_001=ATTN: Verified Mercenary Operators\n\nWe’ve gotten word that ~mission(Location|Address) is being used by some local criminals as a base of operations. BlacJac needs the site swept and any inhabitants cleared out of there. \n\nYou are authorized to use lethal force if necessary.\n\nThanks,\nGloria Mesa\n\nPrivate Contract Supervisor\nBlacJac Security, "Protection Provided"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x15
blacjac_UGF_eliminateall_nocivs_desc_001=ATTN: Verified Mercenary Operators\n\nWe’ve gotten word that ~mission(Location|Address) is being used by some local criminals as base of operations. BlacJac is looking to have you sweep the site and clear out any hostiles. \n\nOur early reports show that there’s a good chance that the gang will have some civilians working for them on-site. We're not looking to be making headlines here, so try to remember that you are only cleared to engage with confirmed hostiles. \n\nThanks,\nGloria Mesa\n\nPrivate Contract Supervisor\nBlacJac Security, "Protection Provided"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13\n<EM4>Friendlies:</EM4> Civilians x4
blacjac_UGF_eliminateall_title_001=Clear Out Site <EM4>[500 Rep]</EM4>
blacjac_bounty_desc_ERT=ATTN: Bounty Hunters\n\nYou might have heard of ~mission(TargetName) before. They’re an extreme-risk target and they’ve been making headlines recently. The hope is you’ll be able to put together a response team and help BlacJac shut them down for good. Our most recent intel has their sub-capital ship and heavily armed escorts flying over at ~mission(Location|Address).\n \nI’d recommend making sure you’ve got an up-to-date imprint before heading out. Just in case. \n\nGood luck,\nGloria Mesa\n\nPrivate Contract Supervisor\nBlacJac Security, "Protection Provided"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
blacjac_bounty_desc_HRT=ATTN: Bounty Hunters\n\nYour next bounty, ~mission(TargetName), is definitely considered a high-risk target for good reason. They’re known to travel with some serious firepower and are escorted by enough protection to make anyone think twice about picking a fight.\n\nSources indicate that ~mission(TargetName|Last) is hiding out over at ~mission(Location|Address). When you head out to track them down, just make sure you’re prepared. Might even think about bringing along some backup yourself.  \n\nThanks,\nGloria Mesa\n\nPrivate Contract Supervisor\nBlacJac Security, "Protection Provided"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
blacjac_bounty_desc_LRT=ATTN: Bounty Hunters\n\nBounty came in for a low-risk target by the name of ~mission(TargetName). The target themselves isn’t all that much to worry about, but it seems that they typically fly in a pack, so there’s a high chance they’ll have a few friends along when you track them down.\n\nSpeaking of, I’d start the hunt over at ~mission(Location|Address) since we have reports of them being spotted in the area.\n\nThanks,\nGloria Mesa\n\nPrivate Contract Supervisor\nBlacJac Security, "Protection Provided"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
blacjac_bounty_desc_MRT=ATTN: Bounty Hunters\n\nNeed you to sort out ~mission(TargetName), a moderate-risk bounty last seen at ~mission(Location|Address) flying a small, multicrew ship. \n\nWe weren’t able to get details on exactly what they were piloting, but it seems they did have a few other ships with them. Be ready for a fair bit of resistance when you come calling.\n\nThanks,\nGloria Mesa\n\nPrivate Contract Supervisor\nBlacJac Security, "Protection Provided"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
blacjac_bounty_desc_VHRT=ATTN: Bounty Hunters\n\nBlacJac just got word that a very high-risk target, ~mission(TargetName), was spotted moving through the flight lanes over at ~mission(Location|Address) piloting a formidable ship with a heavy escort.  \n\nWe want this bounty closed out before they commit any more crimes. Gather whatever resources or support you need, and head out as soon as you can.\n\nThanks,\nGloria Mesa\n\nPrivate Contract Supervisor\nBlacJac Security, "Protection Provided"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
blacjac_bounty_desc_VLRT=ATTN: Bounty Hunters\n\nGot a very low-risk target I need you to take care of: ~mission(TargetName).\n\nTheir last known location was ~mission(Location|Address).\n\nThis is a low threat bounty, so I expect you to be able to clear it pretty fast. They typically fly a small ship and don’t have very many known acquaintances. It doesn't get much more straightforward than that.\n\nThanks,\nGloria Mesa\n\nPrivate Contract Supervisor\nBlacJac Security, "Protection Provided"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x1, Targets x1
blacjac_bounty_desc_intro=ATTN: Bounty Hunters\n\nNot sure if you’re interested, but BlacJac is looking to expand our roster of bounty hunters. We got more jobs than our current contractors can handle, so I’m hoping that you might be able to help pick up some of the slack.  \n\nYour qualifications look good on paper, but before we make anything official, BlacJac needs to see how you perform in the field firsthand. Even got a test case all lined up – we want you to sort out ~mission(TargetName). They were last seen at ~mission(Location|Address). Should be a fairly straightforward bounty without too much resistance. Perfect thing to sharpen your teeth on.\n\nGood luck,\nGloria Mesa\n\nPrivate Contract Supervisor\nBlacJac Security, "Protection Provided"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
blacjac_bounty_desc_rehire=ATTN: Former BlacJac Bounty Hunter\n\nI know your last sting bounty hunting for BlacJac didn’t go well, but a soaring caseload means that you are lucky enough to get another chance.\n\nIf you're able to complete the bounty on ~mission(TargetName) over at ~mission(Location|Address) then we can see about getting you reinstated.\n\nThanks,\nGloria Mesa\n\nPrivate Contract Supervisor\nBlacJac Security, "Protection Provided"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
blacjac_bounty_fps_UGF_desc_001=ATTN: Bounty Hunters\n\nGot a bounty that needs to be collected on ~mission(TargetName). The bastard is hiding over at ~mission(Location|Address) with a bunch of other scum, so be careful going in.\n\nThanks,\nGloria Mesa\n\nPrivate Contract Supervisor\nBlacJac Security, "Protection Provided"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13, Targets x1
blacjac_bounty_fps_UGF_nocivs_desc_001=ATTN: Bounty Hunters\n\nNeed you to grab a bounty by the name of ~mission(TargetName) at ~mission(Location|Address). While there may be other criminal accomplices at the scene, I want you to be mindful of any civilians or workers who might be there.\n\nI got enough to deal with, so I don’t need to be explaining why a contractor shot a bunch of civilians.\n\n\nThanks,\nGloria Mesa\n\nPrivate Contract Supervisor\nBlacJac Security, "Protection Provided"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
blacjac_bounty_fps_desc_001=ATTN: Bounty Hunters\n\nBlacJac has a bounty that needs to be collected. Perp goes by: ~mission(TargetName). \n\nBeen able to track them down to ~mission(Location|Address) but we don't have a full assessment of what the conditions are like on the ground, so use caution entering the site.\n\nThanks,\nGloria Mesa\n\nPrivate Contract Supervisor\nBlacJac Security, "Protection Provided"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
blacjac_bounty_fps_desc_first=ATTN: Bounty Hunters\n\nI have more bounties than I have bounty hunters at the moment, so I'm looking to expand our roster. \n\nIf you do a good job on this first one, there'll be more contracts to follow. \n\nLet's see how you do trying to deal with the bounty on ~mission(TargetName). They're believed to be hiding over at ~mission(Location|Address). \n\nThanks,\nGloria Mesa\n\nPrivate Contract Supervisor\nBlacJac Security, "Protection Provided"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13, Targets x1
blacjac_bounty_fps_desc_rehire=ATTN: Former BlacJac Bounty Hunter\n\nI know BlacJac stopped giving you bounty contracts, but times change and here we are giving you another chance.\n\nIf you're able to complete the bounty on ~mission(TargetName) over at ~mission(Location|Address) then we can see about getting you reinstated.\n\nThanks,\nGloria Mesa\n\nPrivate Contract Supervisor\nBlacJac Security, "Protection Provided"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13, Targets x1
