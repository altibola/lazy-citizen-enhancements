vaughn_assassination_FPS_UGF_illegal_boss_desc_001=I am not sure if you’re acquainted with ~mission(Location|Address), but ~mission(TargetName) is the one who calls the shots there. I need them eliminated.\n\nThat is easier said then done, I'm afraid. They are notoriously reluctant to see to matters personally, preferring their underlings to handle the dirty work. That said, eliminate enough of the underlings and they will have no choice but to deal with you themselves.\n\nEarnestly,\nVaughn\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Pulverizer LMG\n- Tripledown Pistol\n- [S1-A] Carnifex Armor Core\n- [S1-A] Carnifex Armor Legs\n- [S1-A] Citadel Arms Base\n- [S1-A] Citadel Core Base\n- [S1-A] Citadel Legs Base\n- [S1-A] Fortifier Helmet Base\n- [S1-A] Pulverizer LMG Magazine (120 Cap)\n- [S1-A] Tripledown Pistol Magazine (12 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Backup x4, Boss x1, Hostiles x10\n<EM4>Elite Assassin:</EM4> +8,000 Rep\n<EM4>Failure Penalty:</EM4> -4,000 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
vaughn_assassination_FPS_UGF_illegal_desc_001=They say there is no honor among thieves. Today, it seems, you're targeting one of your own. \n\nPlease head to ~mission(Location|Address) and kill ~mission(TargetName). What you do with the others there is entirely up to you.\n\nEarnestly,\nVaughn\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Deadrig Shotgun\n- Killshot Rifle\n- [S1-A] Badami Helmet\n- [S1-A] Deadrig Shotgun Magazine (8 cap)\n- [S1-A] Killshot Rifle Magazine (45 Cap)\n- [S1-A] Overlord Arms Supernova\n- [S1-A] Overlord Core Supernova\n- [S1-A] Overlord Helmet Supernova\n- [S1-A] Overlord Legs Supernova\n- [S1-A] Piecemeal Armor Arms\n- [S1-A] Piecemeal Armor Core\n- [S1-A] Piecemeal Armor Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 10\n<EM4>Low Level Assassin:</EM4> +1,000 Rep\n<EM4>Failure Penalty:</EM4> -500 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
vaughn_assassination_FPS_UGF_illegal_title_001=All Things Come To An End <EM4>[BP]</EM4> <EM4>[1,000–8,000 Rep]</EM4>
vaughn_assassination_FPS_UGF_legal_boss_desc_001=A senior security official by the name of ~mission(TargetName) is about to have their long career come to a very violent and sudden end. While they are currently at ~mission(Location|Address), they will not be easy to get to. I fear that a bit of work will be required to draw them out.  \n\nI recommend killing enough of their underlings that they will be forced to face you personally. Of course, once they do decide to finally show their face, it should be a rather straightforward matter. \n\nEarnestly,\nVaughn\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Pulverizer LMG\n- Tripledown Pistol\n- [S1-A] Carnifex Armor Core\n- [S1-A] Carnifex Armor Legs\n- [S1-A] Citadel Arms Base\n- [S1-A] Citadel Core Base\n- [S1-A] Citadel Legs Base\n- [S1-A] Fortifier Helmet Base\n- [S1-A] Pulverizer LMG Magazine (120 Cap)\n- [S1-A] Tripledown Pistol Magazine (12 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Backup x4, Boss x1, Hostiles x10\n<EM4>High Value Assassin:</EM4> +4,000 Rep\n<EM4>Failure Penalty:</EM4> -2,000 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
vaughn_assassination_FPS_UGF_legal_desc_001=A security officer by the name of ~mission(TargetName) is in desperate need of an early retirement. They are currently stationed at ~mission(Location|Address) along with a host of other eager types in uniforms. \n\nFeel free to indulge your violent whims, but it is only the death of ~mission(TargetName) which will earn you my credit and thanks.\n\nEarnestly,\nVaughn\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13, Targets x1
vaughn_assassination_FPS_UGF_legal_title_001=They Will Be Missed <EM4>[BP?]</EM4> <EM4>[500–4,000 Rep]</EM4>
vaughn_assassination_PA_E_desc=I can’t imagine you’ll have much trouble with this, even if it is marginally more challenging than your previous contract. Head to <EM4>~mission(Location|Address)</EM4> and take care of People’s Alliance member by the name <EM4>~mission(TargetName)</EM4>. My informants tell me they may have an escort or two with them. Nothing you can’t handle, of course.\n\nSincerely,\nVaughn\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1\n<EM4>Jr. Contractor:</EM4> +100 Rep
vaughn_assassination_PA_E_title=Splintering the Alliance <EM4>[100 Rep]</EM4>
vaughn_assassination_PA_H_desc=<EM4>~mission(TargetName)</EM4> of the People’s Alliance, certainly seems to have a reputation about them, based on the importance our client has placed on this being handled in a timely and exacting manner.\n\nBut we’ll spare you the details. All you need to do is travel to <EM4>~mission(Location|Address)</EM4> and put an end to their life. Expect a well-armed ship and highly competent backup to boot. They seem to take themselves quite seriously.\n\nSincerely,\nVaughn\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Reinforcements x6, Targets x1\n<EM4>Sr. Contractor:</EM4> +200 Rep
vaughn_assassination_PA_H_title=Cracking the Alliance <EM4>[200 Rep]</EM4>
vaughn_assassination_PA_M_desc=It seems the People’s Alliance have been ruffling some feathers recently. A client of ours would be most thrilled if you can prevent ~mission(TargetName) from meddling in their affairs ever again.\n\nYou’ll find them around <EM4>~mission(Location|Address)</EM4>, and from what our client has told us, it’s unlikely that they’re alone. These aren’t your run-of-the-mill pilots, they might even pose a slight threat to your safety.\n\nDo try your best to keep it as clean as possible.\n\nSincerely,\nVaughn\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1\n<EM4>Contractor:</EM4> +150 Rep
vaughn_assassination_PA_M_title=Fracturing the Alliance <EM4>[150 Rep]</EM4>
vaughn_assassination_PA_S_desc=I am thrilled to inform you that we have a particularly ambitious assignment for you.\n\n<EM4>~mission(TargetName)</EM4> has been marked for termination. You may know them already: a particularly high-profile member of the People’s Alliance who is notorious for having thwarted numerous attempts against their life. We initially considered it too troublesome until our client offered an even more outrageous amount of credits to see this to completion.\n\nThe target’s last known location was at <EM4>~mission(Location|Address)</EM4>. Expect a top-of-the-line ship and a skilled escort.\n\nWe look forward to hearing about their untimely demise.\n\nSincerely,\nVaughn\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 7/7\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1\n<EM4>Head Contractor:</EM4> +300 Rep
vaughn_assassination_PA_S_title=Annihilating the Alliance <EM4>[300 Rep]</EM4>
vaughn_assassination_PA_VH_desc=We hope you enjoy a challenge, because this one is looking to be far from a walk in the park.\n\nFor reasons our client was unwilling to disclose, a rather prominent member of the People’s Alliance needs disposing of. The target, <EM4>~mission(TargetName)</EM4>, was last seen at <EM4>~mission(Location|Address)</EM4> piloting a high-class ship accompanied by several skilled allies.\n\nDo make the most of this opportunity.\n\nSincerely,\nVaughn\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Reinforcements x6, Targets x1\n<EM4>Neutral:</EM4> +50 Rep\n<EM4>Veteran Contractor:</EM4> +200 Rep
vaughn_assassination_PA_VH_title=Destroying the Alliance <EM4>[50–200 Rep]</EM4>
vaughn_assassination_VE_desc_intro=Firstly, allow me to introduce myself. To put it rather dramatically, I deal in lives. \n\nPeople hire me when some soul needs to be extinguished, and I in return employ the perfect person to serve as the extinguishant. This provides security to all parties involved as none know the identity of the other. An ideal situation as far as these things go.\n\nI was recently made aware that you may possess skills that would make you of service to me and decided that it would be worthwhile to pursue the validity of this claim. \n \nIf you have any interest in forging a working relationship, I will need a demonstration of said skills. \n\nSeek out and discreetly kill ~mission(TargetName) over at ~mission(Location|Address).\n\nDo so successfully and you will be rewarded. Not only that, but you will have proven yourself worthy of further consideration.\n\nSincerely,\nVaughn\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +250\n<EM4>Hostiles:</EM4> Targets x1
vaughn_assassination_VE_desc_rehire=It is not often in life that we get another chance to make a first impression, but I am going to provide to you with just that.\n\nTo say I was disappointed in how things last transpired on your last assassination attempt would be a severe understatement. However, here is your chance to prove yourself capable of more. \n\nKill ~mission(TargetName) over at ~mission(Location|Address) and I will consider the slate wiped clean. \n\nSincerely,\nVaughn\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250\n<EM4>Hostiles:</EM4> Targets x1
vaughn_assassination_VE_title_intro=A Chance to Impress <EM4>[100–500 Rep]</EM4>
vaughn_assassination_VE_title_rehire=Another Chance to Impress <EM4>[50–500 Rep]</EM4>
