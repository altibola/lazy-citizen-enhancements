FTL_Courier_Stanton_Easy_Desc_001=AVAILABLE FTL CONTRACT\nFOR IMMEDIATE ASSIGNMENT\n\n**CONTRACT DETAILS** \nA reliable and hardworking entry-level courier is needed to ferry a delivery in Stanton.\nYou will be responsible for providing your own transportation.\nInterested contractors need the <EM4>ability to lift up to .25 SCU boxes</EM4>.\nContractors are employed on an independent basis and therefore not covered by FTL's company insurance.\n\n~mission(Contractor|SignOff)\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S0-B] Defiant\n- [IND-S1-B] Colossus\n- [IND-S2-B] Huracan\n- [IND-S2-B] Sedulity\n- [IND-S3-B] Agni\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Neutral:</EM4> +500 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
FTL_Courier_Stanton_Easy_Title_001=ENTRY LVL. COURIER NEEDED IN STANTON <EM4>[BP]</EM4> <EM4>[100–500 Rep]</EM4>
FTL_Courier_Stanton_Medium_Desc_001=AVAILABLE FTL CONTRACT\nFOR IMMEDIATE ASSIGNMENT\n\n**CONTRACT DETAILS**\nJunior-level courier needed for deliveries across the Stanton System.\nTransportation must be provided by courier.\nYou will be <EM4>required to lift up to .25 SCU</EM4> in weight.\nCouriers are responsible for the correct handling and safety of all packages charged to their care.\n\n~mission(Contractor|SignOff)\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S0-B] Defiant\n- [IND-S1-B] Colossus\n- [IND-S2-B] Huracan\n- [IND-S2-B] Sedulity\n- [IND-S3-B] Agni\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
FTL_Courier_Stanton_Medium_Title_001=JR. LVL. COURIER NEEDED IN STANTON <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
ForceDepletionUnlawful_Desc=Thin out the security in this system. 750 UEC per head, with a 1500 UEC bonus upon completion.\n\nAny members of the following Organizations will count towards this mission:\n\nBlackJac Security\nCrusader Security\nHurston Security\nAdvocacy\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +4,000
ForceDepletionUnlawful_Title=Eliminate Security Forces <EM4>[4,000 Rep]</EM4>
ForceDepletion_Desc=Eliminate members of the Nine Tails Organization. \n\nFor each member neutralized,  you'll be paid 500 UEC, with a 1000 UEC bonus upon completion.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +4,000
ForceDepletion_Title=Eliminate members of the Nine Tails Organization <EM4>[4,000 Rep]</EM4>
Foxwell_DefendDestructibleEntites_E_Desc_001=Any willing pilots in the area? Need some protection around <EM4>~mission(Location|Address)</EM4> for a client. A band of outlaws has been targeting their <EM4>~mission(Objects)</EM4>, and if nothing's done about it they'll do some real damage. Need someone to protect the client’s property as much as possible and deal with the thugs.\n\nFrom the intel we’ve managed to gather, these thugs are small-time but can cause some pain if you’re not careful. So, if you manage to nail this to the Foxwell standards, we’re offering <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor. \n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x10\n<EM4>Rep:</EM4> +100\n<EM4>Blueprint Reward:</EM4> 100% chance (Easy only)\n\n<EM4>? = only the Easy variant awards blueprints</EM4>
Foxwell_DefendDestructibleEntites_E_Title_001=Yellow Lvl. Contract: Protect ~mission(Objects) <EM4>[BP?]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_DefendDestructibleEntites_H_Desc_001=One of our high priority clients is under attack from a criminal gang targeting their <EM4>~mission(Objects)</EM4> in <EM4>~mission(Location|Address)</EM4>. The client’s assets are valuable, so we need to keep those safe at all costs, but I won’t kid – it’ll be a challenge and a half with these thugs determined to do some real damage. \n\nIf it were me, I wouldn’t hesitate to <EM>bring backup</EM4> to deal with them. They’re no joke, so we’re offering a well-earned <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor who deals with these guys successfully. \n\nBest of luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x17\n<EM4>Rep:</EM4> +200\n<EM4>Blueprint Reward:</EM4> 100% chance (Hard only)\n\n<EM4>? = only the Hard variant awards blueprints</EM4>
Foxwell_DefendDestructibleEntites_H_Title_001=Orange Lvl. Contract: Protect ~mission(Objects) <EM4>[BP?]</EM4> <EM4>[200 Rep]</EM4>
Foxwell_DefendDestructibleEntites_M_Desc_001=I'm hoping that you'll be able to provide protection services at <EM4>~mission(Location|Address)</EM4>. One of our high priority clients is having some real trouble with a band of outlaws targeting their ~mission(Objects). Need to be able to keep the assets as safe and intact as possible. Client’s expecting the service they pay for, so don’t mess this up or we might lose a loyal customer.\n\nFor now, we’re still a little in the dark when it comes to these outlaws, but if you manage to nail this to the Foxwell standards, we’re offering  <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor. \n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x15\n<EM4>Rep:</EM4> +150\n<EM4>Blueprint Reward:</EM4> 100% chance (Medium only)\n\n<EM4>? = only the Medium variant awards blueprints</EM4>
Foxwell_DefendDestructibleEntites_M_Title_001=Orange Lvl. Contract: Defend ~mission(Objects) <EM4>[BP?]</EM4> <EM4>[150 Rep]</EM4>
Foxwell_DefendDestructibleEntites_S_Desc_001=An emergency contract just came through about a gang of violent thugs wreaking havoc on one of our VIP clients’ infrastructures. If available, we need you to rush to <EM4>~mission(Location|Address)</EM4> and defend the client’s extremely valuable <EM4>~mission(Objects)</EM4> at all costs. \n\nFoxwell is extremely aware of this group, so believe me when I say these pilots are not to be taken lightly. I strongly recommend that you arrange a <EM> highly competent backup force</EM> to fly with you to the site.\n\nIf you manage to survive the encounter with the client’s property intact, we’re adding  <EM4>~mission(ScripAmount) MG Scrip</EM4> any main contractor brave enough to take this job on. \n\nStay safe, and good luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 7/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x22\n<EM4>Rep:</EM4> +300\n<EM4>Blueprint Reward:</EM4> 100% chance (Super only)\n\n<EM4>? = only the Super variant awards blueprints</EM4>
Foxwell_DefendDestructibleEntites_S_Title_001=Red Lvl. Contract: Protect ~mission(Objects) <EM4>[BP?]</EM4> <EM4>[300 Rep]</EM4>
Foxwell_DefendDestructibleEntites_VE_Desc_001=Calling all pilots – one of our clients is looking for some protection for their <EM4>~mission(Objects)</EM4>, based in <EM4>~mission(Location|Address)</EM4>. From what we’ve gathered, the attackers are a group of wannabe outlaw pests who probably haven’t realized the value of the assets they’re trying to destroy, just wreaking havoc for the sake of it. Still, the client’s property is important, so should be kept as intact as possible.\n\nIf you take care of them to the Foxwell standards, we’re offering <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor. \n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Rep:</EM4> +100\n<EM4>Blueprint Reward:</EM4> 100% chance (VeryEasy only)\n\n<EM4>? = only the VeryEasy variant awards blueprints</EM4>
