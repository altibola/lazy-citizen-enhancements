cfp_ChainElimAll_1C_ElimSpec_GenAttack_E_desc_001=We need any available security personnel to report to ~mission(Location|Address). A group of armed individuals have attacked one of our outpost clusters and we're in desperate need of help. Although the group seems to be unaffiliated with any of the known gangs, we've received word that their leader is ~mission(TargetName), a local outlaw with a vicious reputation.\n\nPlease head out as soon as you can and secure the area by taking out the outlaws and ~mission(TargetName|Last).\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Brimstone" Rifle\n- [S1-A] Artimex Arms Lodestone\n- [S1-A] Artimex Core Lodestone\n- [S1-A] Artimex Helmet Lodestone\n- [S1-A] Artimex Legs Lodestone\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x7, Juggernauts x1, Soldiers x5, Technicians x5\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_1C_ElimSpec_GenAttack_E_title_001=Alert: ~mission(Location) under attack <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_1C_ElimSpec_HHAttack_M_desc_001=We are currently looking for any qualified and available security operatives to head out to ~mission(Location|Address) and reclaim a CFP installation that had been taken by Headhunters. \n\nThe group that's currently occupying the outpost is being led by ~mission(TargetName), a Headhunter of some note who's had a history of aggression against locals and CFP volunteers.\n\nWe need all Headhunters secured and ~mission(TargetName|Last) taken out.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Brimstone" Rifle\n- [S1-A] Artimex Arms Lodestone\n- [S1-A] Artimex Core Lodestone\n- [S1-A] Artimex Helmet Lodestone\n- [S1-A] Artimex Legs Lodestone\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x6, Juggernauts x1, Soldiers x7, Technicians x6\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_1C_ElimSpec_HHAttack_M_title_001=Taking back from the Headhunters <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_1C_HHAttack_M_desc_001=We just received a frantic comm from ~mission(Location|Address) and are looking for any available combat specialists to help repel a Headhunter attack. There are still hostiles on site and there are reports of several casualties so we need this handled quickly.\n\nI will provide all relevant data upon acceptance. Thank you for your assistance.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Fate" Rifle\n- [S1-A] Artimex Arms (Modified)\n- [S1-A] Artimex Core (Modified)\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x6, Soldiers x7, Technicians x7\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_1C_HHAttack_M_title_001=Help defend ~mission(Location) from Headhunters <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_2C_ElimSpec_GenAttack_M_desc_001=Several CFP clusters near ~mission(Location|Address) just got hit by a group of outlaws led by ~mission(TargetName). We're looking for any available combat specialists to help retake the outposts.\n\nI can provide the locations upon acceptance but we need to clear out the main outpost and satellite installations from all hostile forces and take out ~mission(TargetName|Last) as it's unlikely that they will not cease their hostilities if they escape.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Brimstone" Rifle\n- [S1-A] Artimex Arms Lodestone\n- [S1-A] Artimex Core Lodestone\n- [S1-A] Artimex Helmet Lodestone\n- [S1-A] Artimex Legs Lodestone\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x8, Juggernauts x1, Soldiers x7, Technicians x6\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_2C_ElimSpec_GenAttack_M_title_001=Outlaw attack at ~mission(Location) <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_2C_ElimSpec_HHAttack_H_desc_001=Citizens for Prosperity is looking for any available security operatives to retake several former CFP installations near ~mission(Location|Address) from Headhunter control. These clusters were violently taken from us by ~mission(TargetName) and resulted in the deaths of many volunteers.\n\nBringing these outposts back under our control will help provide more stability to the system. Reports indicate that ~mission(TargetName|Last) tends to hide behind their rank and file, so they will likely appear once you've cleared out most of the hostiles.\n\nXenoThreat are trained and motivated so they will not give up easily.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Brimstone" Rifle\n- [S1-A] Artimex Arms Lodestone\n- [S1-A] Artimex Core Lodestone\n- [S1-A] Artimex Helmet Lodestone\n- [S1-A] Artimex Legs Lodestone\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x7, Juggernauts x1, Soldiers x7, Technicians x8\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_2C_ElimSpec_HHAttack_H_title_001=Retaking Outposts from Headhunters <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_2C_ElimSpec_XTAttack_H_desc_001=Looking for any available security personnel to reclaim several clusters previously lost to XenoThreat aggressors. Located near ~mission(Location|Address), they had been seized in brutal attacks led by ~mission(TargetName), a notorious XenoThreat lieutenant.\n\nWe're looking to take these clusters back so we can reestablish operations and continue our good work. You'll need to clear all the hostiles still on-site as well as ~mission(TargetName|Last).\n\nJust a reminder, that XenoThreat are highly trained and quick to fight, so prepare accordingly.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Brimstone" Rifle\n- [S1-A] Artimex Arms Lodestone\n- [S1-A] Artimex Core Lodestone\n- [S1-A] Artimex Helmet Lodestone\n- [S1-A] Artimex Legs Lodestone\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x10, Juggernauts x1, Soldiers x8, Technicians x9\n<EM4>Head Contractor:</EM4> +400 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_2C_ElimSpec_XTAttack_H_title_001=Reclaiming Outposts from XenoThreat <EM4>[BP]</EM4> <EM4>[400 Rep]</EM4>
cfp_ChainElimAll_3C_ElimSpec_GenAttack_M_desc_001=The outlaw presence here has become much bolder of late and a lot of people are getting hurt. We've recently lost several clusters around ~mission(Location|Address). While we don't like to have to resort to violence, the board has acknowledged that these locations are crucial to establishing stability in the system and authorized the use of a security detail to retake them.\n\nWe're also aware that the embedded hostiles are being led by ~mission(TargetName) who's had a history of attacking CFP interests. The board would like ~mission(TargetName|Last) dealt with to prevent future attacks.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Fate" Rifle\n- [S1-A] Artimex Arms (Modified)\n- [S1-A] Artimex Core (Modified)\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x7, Juggernauts x1, Soldiers x8, Technicians x7\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_3C_ElimSpec_GenAttack_M_title_001=Need multiple CFP outposts retaken <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_3C_ElimSpec_HHAttack_VH_desc_001=Citizens for Prosperity's board just authorized funds to hire security personnel to retake several clusters near ~mission(Location|Address) that have since fallen into the hands of the Headhunters. While we tried to just accept the loss, it's become apparent that they are crucial to our ongoing operations in the system.\n\nYou'll need to clear out each of the locations that will be provided but more importantly, you'll also need to take out ~mission(TargetName), who's in charge of the hostiles on site.\n\nThese Headhunters are heavily embedded and have a history of violence, so you should prepare accordingly. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Fate" Rifle\n- [S1-A] Artimex Arms (Modified)\n- [S1-A] Artimex Core (Modified)\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x9, Juggernauts x1, Soldiers x8, Technicians x8\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_3C_ElimSpec_HHAttack_VH_title_001=Reclaiming Clusters from Headhunters <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_3C_ElimSpec_XTAttack_VH_desc_001=Although Citizens for Prosperity is committed to change through non-violent means, it's become apparent that exceptions might have to be made. CFP safe zones near ~mission(Location|Address) were recently and violently taken by XenoThreat forces under the command of ~mission(TargetName).\n\nWe're looking for any available combat operatives to help take these outposts back. This will undoubtedly be a difficult endeavor as XenoThreat are highly trained and eager to fight, so you should prepare accordingly.\n\nAside from clearing each cluster of XenoThreat forces, you will need to take out ~mission(TargetName|Last), who's loss will certainly make the system safer.\n\nGood luck,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Fate" Rifle\n- [S1-A] Artimex Arms (Modified)\n- [S1-A] Artimex Core (Modified)\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 5/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> CQC x16, Juggernauts x1, Soldiers x13, Technicians x11\n<EM4>Head Contractor:</EM4> +400 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_3C_ElimSpec_XTAttack_VH_title_001=Campaign to reclaim XenoThreat outposts <EM4>[BP]</EM4> <EM4>[400 Rep]</EM4>
cfp_EliminateAllFF_Desc_001=CFP Pyro EliminateAll FrontierFighters\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x2, Kopions x2, Sentries x1, Soldiers x4, Technicians x2\n<EM4>Neutral:</EM4> +25 Rep
cfp_EliminateAllFF_Title_001=cfp EliminateAllFF Title 001 <EM4>[25 Rep]</EM4>
cfp_EliminateSpecific_Generic_E_desc_001=Reports indicate that ~mission(Location|Address) has come under attack from a group of armed individuals led by a notorious outlaw named ~mission(TargetName). There have been multiple reported deaths and injuries, so Citizens for Prosperity has been looking for qualified combat operatives to provide some support. \n\nThough we don't advocate conflict resolution through violence, we believe that the group will disperse if ~mission(TargetName|Last) is not there to lead them.\n\nHead over as soon as you can. Lives are on the line.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x3, Snipers x2, Soldiers x4, Technicians x3\n<EM4>Neutral:</EM4> +75 Rep
cfp_EliminateSpecific_Generic_E_title_001=Protection against ~mission(TargetName|Last) <EM4>[75 Rep]</EM4>
cfp_HaulCargo_RegionLink_desc_001=Hi, we need to move some cargo across the system and were wondering if you could help. I know this is outside your usual purview, but I'm low on options. This would also be a great way to show your committed to Citizens for Prosperity's greater mission here.\n\nIf you head to <EM4>~mission(Location|Address)</EM4>, there should be some cargo accessible via a freight elevator that we'll need you to take to another freight elevator at <EM4>~mission(Destination|Address)</EM4>.\n\nOnly thing to call out is that your ship must be able to handle <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>. To make your life easier, be sure you have a <EM4>handheld tractor beam</EM4> with you. Otherwise, it should be a simple run. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +200 Rep
cfp_HaulCargo_RegionLink_title_001=Need a Hauler <EM4>[200 Rep]</EM4>
cfp_RetrieveConsignment_desc_001=You available for a job? One of our secure locations got hit by outlaws and some highly confidential material was stolen. As you can imagine, Citizens for Prosperity is eager to recover them as soon as possible.\n\nThanks to a local contact, we were able to trace the outlaws back to ~mission(Location|Address) where they're storing the confidential materials inside a secure automated vault. To access it, you’ll need to first find the relevant retrieval code and enter it at the vault’s package conveyor. Our best guess is that one of outlaw leaders will be carrying the code on their person so there is a very strong chance you’ll have to engage with them directly to get it.\n  \nOnce you’ve gotten possession of the confidential material, we want you to deliver it to ~mission(Dropoff1|Address).\n\nYou’ll be making a big difference to a lot of people if you manage to pull this off.\n\nThanks in advance,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Hostiles x54
cfp_RetrieveConsignment_title_001=Confidential Material Stolen <EM4>[1,000–4,000 Rep]</EM4>
cfp_bombingrun_E_desc_001=We've been having escalating issues with the outlaws at ~mission(Location|Address) and can no longer stand by and watch as their aggressive actions hurt our community. \n\nWe are wary of launching a full scale assault, but believe that if their fuel stores are wiped out, it would deter them from further hostile actions. \n\nIf you're able, I'd appreciate you handling the destruction of the fuel personally. A ship capable of launching missiles would probably make the most sense, but I leave that up to you.\n\nThanks,\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- A03 Sniper Rifle\n- P6-LR Sniper Rifle\n- [S1-A] A03 Sniper Rifle Magazine (15 cap)\n- [S1-A] Argus Helmet\n- [S1-A] CBH-3 Helmet Base\n- [S1-A] P6-LR Magazine (8 cap)\n- [S1-A] PAB-1 Arms\n- [S1-A] PAB-1 Core\n- [S1-A] PAB-1 Legs\n- [S1-A] TrueDef-Pro Arms\n- [S1-A] TrueDef-Pro Core Base\n- [S1-A] TrueDef-Pro Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_bombingrun_E_title_001=Eliminate Fuel Stores <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
cfp_bombingrun_sabotage_generators_desc_001=There is a group of outlaws at ~mission(Location|Address) that have become increasingly brazen in their attacks on Citizens for Prosperity assets in the system. \n\nTo minimize loss of life, we want to first try convincing them to move on to somewhere else by disabling their generators and destroying their fuel reserves. \n\nHopefully, that should be enough to convince them to move on to greener pastures.\n\nThanks,\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- A03 Sniper Rifle\n- P6-LR Sniper Rifle\n- [S1-A] A03 Sniper Rifle Magazine (15 cap)\n- [S1-A] Argus Helmet\n- [S1-A] CBH-3 Helmet Base\n- [S1-A] P6-LR Magazine (8 cap)\n- [S1-A] PAB-1 Arms\n- [S1-A] PAB-1 Core\n- [S1-A] PAB-1 Legs\n- [S1-A] TrueDef-Pro Arms\n- [S1-A] TrueDef-Pro Core Base\n- [S1-A] TrueDef-Pro Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_bombingrun_sabotage_generators_title_001=Reduce Outlaw's Operational Readiness <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_bounty_desc_HeadHunters_001=This is a general warning. We have learned that the Headhunters are transporting a large amount of weapons into the system with the intent of launching attacks against CFP-owned settlements.\n\nWhile we believe that change can only come to this system through nonviolence. The presence of these weapons will undoubtedly cause considerably more bloodshed and devastation so we want to remove them from the equation.\n\nAny of our supporters with appropriate combat training are asked to undertake this dangerous assignment out near ~mission(Location|Address). We will compensate you for the tremendous risk you are taking.\n\nThank you and be safe out there,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Reinforcements x2, Targets x1\n<EM4>Neutral:</EM4> +200 Rep
cfp_bounty_title_HeadHunters_001=Danger: Contraband Weapons Inbound <EM4>[200 Rep]</EM4>
cfp_defend-criminals_desc_001=We learned that ~mission(Location|Address) is under threat of attack by outlaws and has asked for assistance. We need someone to protect them and drive away the outlaws. \n\nMake sure you stay close after their initial attack. Too often, outlaws win fights just by sending more bodies than anyone can reasonably defend against, so make sure you fight off any reinforcements before leaving the area. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro]</EM4>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM4>[Pyro RegionB]</EM4>\n- Karna "Fate" Rifle\n- [S1-A] Artimex Arms (Modified)\n- [S1-A] Artimex Core (Modified)\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x6, Juggernauts x2, Soldiers x10, Technicians x4\n<EM4>Neutral:</EM4> +75 Rep\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend-criminals_title_001=Defend ~mission(Location) from Outlaws <EM4>[BP]</EM4> <EM4>[75–200 Rep]</EM4>
cfp_defend-xenothreat_desc_001=We’ve learned that XenoThreat is about to launch an attack on ~mission(Location|Address). If they are successful, the number of casualties is expected to be high. I’m hoping that with your aid in defending them, we can make sure that doesn’t happen.\n \nWe know from past encounters that XenoThreat sends several raiding parties to carry out their attacks, so make sure you don’t leave the outpost until you’ve fought off all the reinforcements. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Fate" Rifle\n- [S1-A] Artimex Arms (Modified)\n- [S1-A] Artimex Core (Modified)\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x9, Soldiers x7, Technicians x9\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend-xenothreat_desc_002=Urgent!\n\nXenoThreat is targeting ~mission(Location|Address) to send a message to other settlers about what happens if they accept our support. \n\nIf you’re able to fend off the attackers, I’m sure they’ll send additional forces, so you’ll need to dig in for multiple assaults. Since XenoThreat has a lot of resources at their disposal, you should think about recruiting others to help you keep everyone safe.\n\nWe’re all counting on you.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x2, Juggernauts x1, Snipers x2, Soldiers x4, Technicians x4\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend-xenothreat_desc_003=Urgent!\n\nXenoThreat is mobilizing for a massive incursion to wipe ~mission(Location|Address) off the map. You’re their only hope of enduring this assault and protecting them from XenoThreat’s cruelty.\n\nI know I’m asking you to put yourself in the line of fire, but this system won’t change unless people like you are brave enough to take on these dangers. No amount of credits could measure up to how much good you’d be doing by stepping in.\n\nIf you’re willing and able to take on this mission, make sure to take some allies with you. XenoThreat will certainly send in stronger reinforcements once they realize they’re taking losses.\n\nWe believe in you.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> CQC x4, Juggernauts x2, Snipers x3, Soldiers x8, Technicians x4\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
