XenoThreat_claimsweep_desc_easy=Our resistance movement is growing by the day, but that comes with some unwanted attention.  Recent scans discovered orbital sentries at ~mission(location|address) and a ship running a patrol pattern. We believe this is part of an espionage campaign targeting XenoThreat, most likely funded by the UEE. \n\nWe’re looking for an experienced merc willing to destroy the sentries ASAP.  Since they already have eyes and ears on us, sending in someone from outside the org would draw less attention. If you take the gig, you’ll be paid promptly once the sentries are destroyed.\n \nNow, while the patrol ship isn’t the main target, we suspect that if it escapes it might have reinforcements in reserve. Might be smart to deal with it promptly. \n\nIf you decide to help us, XenoThreat will remember you’re someone willing to fight for what’s right.\n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Hostiles:</EM4> Hostile Wave x3, Prospectors x1\n<EM4>Turrets:</EM4> 2 (hostile)
XenoThreat_claimsweep_desc_hard=Recent scans discovered several orbital sentries and ships at ~mission(location|address). We believe they’re part of an espionage campaign targeting XenoThreat, in response to our recent actions in the Stanton system. Seems XenoThreat must be doing something right, if they’re out here spying like this.\n\nWe’re looking for an experienced and highly-skilled merc willing to eliminate this operation. If you don’t want Pyro to become a surveillance system, then this is your chance to stop it. The sentries probably won’t be too big of an issue, but pay mind to the patrol ships. If they manage to break away, you’ll have a whole lot more trouble breathing down your neck. \n\nYou’ll have our gratitude and a sizable payment once the job is done. \n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250\n<EM4>Hostiles:</EM4> Hostile Wave x5, Prospectors x4\n<EM4>Turrets:</EM4> 4 (hostile)
XenoThreat_claimsweep_desc_intro=It seems our struggle to free Humanity has got the government lapdogs back on Earth feeling nervous. Recent scans discovered an orbital sentry at ~mission(location|address) that we believe is part of an UEE espionage campaign. Good credits says they’re handing the data direct to the slinks themselves. \n\nOnly one sentry has been detected so far, but who knows how big the operation will grow if it’s not taken off-line. Shouldn’t be too much trouble for a skilled merc. If that sounds like you, payment will be sent promptly once the sentry is destroyed. Plus, XenoThreat will remember that you’re someone willing to fight for what’s right.\n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Turrets:</EM4> 1 (hostile)
XenoThreat_claimsweep_desc_medium=Do you value Humanity’s freedom? If so, I’m offering you a chance to prove it. Recent scans discovered orbital sentries and patrolling ships at ~mission(location|address). We believe they’re part of a UEE espionage campaign targeting XenoThreat. It’s important that we stop their intelligence gathering before we launch our next mission.\n\nWe’re looking for an experienced merc willing to eliminate these forces immediately. The sentries are the priority, but the ships might prove a bigger issue if they’re allowed to escape. You’ll have to evaluate the situation more closely once you’re on site. \n\nWe could take care of it ourselves, but want to send in a contractor so the scum behind it don’t know who hit them. Payment will be sent promptly upon completion. Plus, the satisfaction of knowing you’re helping a good cause.\n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostile Wave x4, Prospectors x2\n<EM4>Turrets:</EM4> 3 (hostile)
XenoThreat_claimsweep_desc_rand=It appears the UEE are stepping up their efforts to stop our movement. One of our pilots discovered a few orbital sentries and ships at ~mission(location|address). We believe they’re part of a UEE espionage campaign targeting XenoThreat and it's vital that it be stopped before they gather anything that could harm our ongoing efforts.\n\nWe’re looking for a skilled merc willing to eliminate this threat and stop this invasion of privacy before it spreads even further. Who knows how much bigger this operation will get if it’s not taken off-line immediately? Payment will make it worth your while and be sent promptly once everything is blown to bits. \n\nSee it done, and help be a part of the right side of history.\n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostile Wave x32, Prospectors x5\n<EM4>Turrets:</EM4> 4 (hostile)
