Foxwell_EliminateSpecific_desc_001=Looking to execute a bounty on <EM4>~mission(TargetName)</EM4>. We’ve learned that they’re currently hiding out with some confederates at <EM4>~mission(Location|Address)</EM4>. \n\nI’d be prepared to deal with the lowlifes hanging around <EM4>~mission(TargetName|Last)</EM4>, but our only real concern is that you land the target. \n    \n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostiles x13, Targets x1\n<EM4>Security Trainee:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_EliminateSpecific_title_001=Track Down ~mission(TargetName) <EM4>[BP]</EM4> <EM4>[500 Rep]</EM4>
Foxwell_HaulCargo_AToB_OLP_desc_01=Looking for a contractor with the right skills and ship for an important mission. Outlaws ambushed a Hull C carrying a <EM4>~mission(CargoGradeToken)</EM4> load of cargo and took it to <EM4>~mission(Location|Address)</EM4>. We’ve been hired to get it all back.  \n\nThe cargo is being stored somewhere at a defunct Hathor facility. The place is big and crawling with outlaws. Need someone to retrieve the goods from the freight elevator there and deliver it all back to the <EM4>freight elevator at ~mission(Destination|Address)</EM4>. Don’t think this will be a walk in the park. Bring lots of ammo and a ship that can handle <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>. \n\nIt also wouldn't hurt to bring a <EM4>handheld tractor beam</EM4> with you.   \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_HaulCargo_AToB_OLP_title_01=Red Level Contract: Retrieve Cargo Haul <EM4>[BP]</EM4>
Foxwell_HaulCargo_AToB_PAF_desc_01=A crew recently raided a distribution center and made off with <EM4>~mission(CargoGradeToken) load of cargo</EM4>. Foxwell has been hired to get all those goods back. We’re getting reports of these outlaws using old Hathor facilities as stash houses and we believe the stolen items are currently at <EM4>~mission(Location|Address)</EM4>.\n\nIf interested, you’ll need a ship that can handle <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>. Doubt you’ll be able to slip in and out of that PAF without being noticed either, so best be prepared to clear the location. Once safe, grab the goods from the freight elevator and deliver them to the <EM4>freight elevator at ~mission(Destination|Address)</EM4>. \n\nIt also wouldn't hurt to bring a <EM4>handheld tractor beam</EM4> with you.   \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_HaulCargo_AToB_PAF_title_01=Red Level Contract: Recoup Stolen Cargo Haul <EM4>[BP]</EM4>
Foxwell_HaulCargo_MultiToSingle_desc_01=Something weird is going on at the old Hathor mining facilities. Both the platform alignment facilities and orbital laser platforms have been abandoned and gathering dust for decades, but outlaws have started using them as a base of operations.\n\nWe’ve been hired by a concerned party who’s recently lost a lot of important cargo to one such gang. Currently, their stuff is stashed at <EM4>~mission(Location1|Address)</EM4> and <EM4>~mission(Location2|Address)</EM4>, but there’s a growing fear that the gang may be offloading their goods soon. That’s why we’ve been hired to hit both of those Hathor facilities, retrieve the cargo from the freight elevators, and bring it to the freight elevator at <EM4>~mission(Destination|Address)</EM4>. \n\nHere’s the specifics on what to grab from each location. Doesn’t matter in what order you do this, as long as it all gets collected and delivered. Just be sure to bring a ship that can handle <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>.  It also wouldn't hurt to bring a <EM4>handheld tractor beam</EM4> with you.   \n\n~mission(MultiToSingleToken)\n\nFoxwell hasn’t been able to scout these locations, but if I were you, I’d expect to face some serious armed resistance. Best bring a bunch of gear and some friends.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_HaulCargo_MultiToSingle_title_01=Red Level Contract: Clear PAFs, Recover Cargo, and Deliver to OLP <EM4>[BP]</EM4>
Foxwell_Mercenary_Rehire_desc_001=Due to a corporate restructuring, Foxwell has some new vacancies that need to be filled immediately. Foxwell knows you’ve previously expressed interest in this line of work, and we’re wondering if you would want to take another crack at a contract.\n\nOne of our clients needs support at <EM4>~mission(Location|Address)</EM4> where their security forces are struggling to handle an outlaw incursion. Head there and help the local forces get rid of the problem before it’s too late. \n\nSuccessfully complete this contract, and Foxwell would be happy to send more work your way.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5\n<EM4>Applicant:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_Mercenary_Rehire_title_001=Still Looking for Work? <EM4>[BP]</EM4> <EM4>[500 Rep]</EM4>
Foxwell_SecurityPatrol_E_Desc_001=Need someone to knock out a security patrol. You’ll need to go to the <EM4>location marker</EM4> on your HUD and then scan several designated waypoints ensuring that they’re safe and secure. \n\nSatellites in that region have been acting up recently. Not exactly sure what’s going on out there, but best be prepared in case there’s any trouble.\n\nComplete this contract and the main contractor will get a bonus payment of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sanguine" Energy Assault Rifle\n- [S1-A] Antium Arms Sand\n- [S1-A] Antium Core Sand\n- [S1-A] Antium Helmet Sand\n- [S1-A] Antium Legs Sand\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Targets x15\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_SecurityPatrol_E_Title_001=Yellow Level Contract: Security Sweep <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_SecurityPatrol_H_Desc_001=Several unknown ships have been spotted in areas frequented by haulers delivering goods for our client. They’re worried these ships are monitoring their haulers in preparation for an ambush, so they’ve hired us to patrol the area. \n\nStart by going to the <EM4>location marker</EM4> on your HUD and scan it to ensure it’s clear. After that, we’ll send you to some other areas to scan for potential threats. We recommend that you bring a <EM4>wingman</EM4> and plenty of supplies to be ready to handle whatever might come your way.     \n\nAlso know that successfully completing this contract will earn the main contractor a bonus payment of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sanguine" Energy Assault Rifle\n- [S1-A] Antium Arms Sand\n- [S1-A] Antium Core Sand\n- [S1-A] Antium Helmet Sand\n- [S1-A] Antium Legs Sand\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Targets x54\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_SecurityPatrol_H_Title_001=Orange Level Contract: Potential Security Threat <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
Foxwell_SecurityPatrol_M_Desc_001=A client is concerned about activity near some of their interests. We’ve been contracted to patrol the area and run scans at several locations. Interested? If so, head to the <EM4>location marker</EM4> on your HUD to start the patrol.\n\nThe client wasn’t specific about the threats, but they don’t think everything’s on the level out there. Hopefully we’ll be able to bring them some peace of mind.\n\nAdditionally, the client arranged for us to offer a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor.\n\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sanguine" Energy Assault Rifle\n- [S1-A] Antium Arms Sand\n- [S1-A] Antium Core Sand\n- [S1-A] Antium Helmet Sand\n- [S1-A] Antium Legs Sand\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Targets x23\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
