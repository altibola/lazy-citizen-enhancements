RedWind_Delivery_Illegal_Desc_01=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nGot another special job that I could use you on. Should be a quick run.\n\nPACKAGE FOR PICK UP\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1|Address)</EM4>)\n\nDROP OFF LOCATION\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1|Address)</EM4>\n\nAnd please remember not to bother the clients or any of their guests. Professionalism is the key here. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Desc_02=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nGot another special job that I need a pilot I can trust to handle.\n\nPACKAGES FOR PICK UP (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2|Address)</EM4>\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2|Address)</EM4>\n\nThis is a very important client for us so please treat them and their packages with extra respect.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Desc_03=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nHad another special job come in from one of our more private clients.\n\nPACKAGES FOR PICK UP (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> from the <EM4>~mission(Pickup3|Address)</EM4>\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> to the <EM4>~mission(Dropoff3|Address)</EM4>\n\nRemember to try and keep a low profile. The last thing this client wants is to draw attention to their business, and the last thing I want is an unhappy client. Especially in this case.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Desc_04=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nGot another special run. Figured you'd be the right pilot to handle it for me.\n\nPACKAGES FOR PICK UP (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> from the <EM4>~mission(Pickup3|Address)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> from the <EM4>~mission(Pickup4|Address)</EM4>\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> to the <EM4>~mission(Dropoff3|Address)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> to the <EM4>~mission(Dropoff4|Address)</EM4>\n\nOnce again, be smart and keep quiet about anything you might see or hear while you're out there. Remember, you're just there for the packages.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Desc_05=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nGot another special job that I could use you on. This one's a bit more complicated since there's a few more packages to keep track of. Here's the list:\n\nPACKAGES FOR PICK UP (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> from the <EM4>~mission(Pickup3|Address)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> from the <EM4>~mission(Pickup4|Address)</EM4>\n     · Package <EM4>#~mission(Item5|SerialNumber)</EM4> from the <EM4>~mission(Pickup5|Address)</EM4>\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> to the <EM4>~mission(Dropoff3|Address)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> to the <EM4>~mission(Dropoff4|Address)</EM4>\n     · Package <EM4>#~mission(Item5|SerialNumber)</EM4> to the <EM4>~mission(Dropoff5|Address)</EM4> \n\nMake sure the right packages get to where they're going. You really don't want to have to explain a mix up to these particular clients.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Desc_Intro=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nI know you've done some solid work for us in the past, so I figured I'd see if you were interested in handling a bit of a special run for us that's a bit farther out in the system than what you've been doing so far.\n\nIn a nutshell, we need a pilot who's willing to keep their head down, focus on getting the packages delivered, and most importantly, not ask a lot of questions.\n\nSee, for a smaller company like us, staying ahead of competition means that we need to offer our clients something they can't get elsewhere - discretion. At Red Wind, as long as you got the credits we'll take whatever to wherever. Understand?\n\nIf that sounds good to you, let's see how you do on this run -\n\nPACKAGES FOR PICK UP (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> from the <EM4>~mission(Pickup3|Address)</EM4>\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> to the <EM4>~mission(Dropoff3|Address)</EM4>\n\nOne last bit of advice, it would probably be good to avoid any unnecessary delays once you got the packages onboard, for example being searched by local law enforcement. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Title_01=Red Wind Discreet Courier Run <EM4>[500 Rep]</EM4>
RedWind_Delivery_Illegal_Title_Intro=Red Wind In Need of Discreet Couriers <EM4>[500 Rep]</EM4>
RedWind_HaulCargo_AToB_ASD_Desc=RED WIND LINEHAUL \n'YOUR GOODS IN GOOD HANDS' \n----------------------------    \n\nASD reached out to us as it seems one of their old labs, <EM4>~mission(Location|Address)</EM4>, still has some cargo being stored there they want to get their hands on.\n\nYou would fly there in a ship that can handle containers up to <EM4>~mission(MissionMaxSCUSize)</EM4> in size, land in the hangar, load up from the freight elevator, and then transport it all back to <EM4>~mission(Destination|Address)</EM4>. \n\nJust be sure to keep your head on swivel while you’re at the facility and try not to let your curiosity get the better of you Abandoned sites like this can be home to all sort of nastiness.  And don't forget to pack a <EM4>handheld tractor beam</EM4> to bring along. \n\nBE YOUR BEST – Take pride in the work you do and you’ll do work to be proud of.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rookie:</EM4> +50 Rep
RedWind_HaulCargo_AToB_ASD_title=Cargo Transfer from Shuttered Facility <EM4>[50 Rep]</EM4>
RedWind_HaulCargo_AToB_desc_01=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------  \n\nNeed a pilot for a straightforward haul going from the freight elevator at <EM4>~mission(Location|Address)</EM4> to <EM4>~mission(Destination|Address)</EM4>. Should be easy enough as long as you got a ship that can handle containers up to <EM4>~mission(MissionMaxSCUSize)</EM4> in size. \n\nCredits don't come much easier than this. Just be careful as the route's not exactly in the safest of sectors. And don't forget to pack a <EM4>handheld tractor beam</EM4> to bring along.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Rookie:</EM4> +50 Rep\n<EM4>Trainee:</EM4> +50 Rep\n<EM4>Rookie:</EM4> +100 Rep\n<EM4>Junior:</EM4> +250 Rep\n<EM4>Experienced:</EM4> +1,000 Rep
RedWind_HaulCargo_AToB_desc_FromPyro_Danger=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nGuess some companies see danger when offered a run in Pyro. We see profits. Got one here that starts in the system at <EM4>~mission(Location|Address)</EM4> and then goes to <EM4>~mission(Destination|Address)</EM4>.  \n\nThe client warned us that outlaws in Pyro regularly target this run, which has scared other hauling concerns. Be sure your ship is all geared up and can hold <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>. And don't forget to bring a <EM4>handheld tractor beam</EM4>.  \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x6\n<EM4>Rookie:</EM4> +200 Rep
RedWind_HaulCargo_AToB_desc_LuxuryGoods_Danger_Timed=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nGot a contract from a major client who needs a skilled pilot to move a large load of luxury items from <EM4>~mission(Location|Address)</EM4> to <EM4>~mission(Destination|Address)</EM4>. \n\nYou'll need room for at least <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> in your hold. You'll also need a <EM4>handheld tractor beam</EM4> to get everything loaded and unloaded. \n\nAnd as a fair warning, the things you'll be carrying are pricey enough that you might attract some unwanted attention. <EM4>Be ready to defend yourself</EM4> if you can't evade.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x1\n<EM4>Rookie:</EM4> +200 Rep
RedWind_HaulCargo_AToB_desc_ToPyro_Danger=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nHave a run here that could become a lucrative regular thing if we can pull it off.  This’ll take you into Pyro, so you’ll have to be ready to tangle with some of the locals. \n\nYou’ll need to grab the stuff from <EM4>~mission(Location|Address)</EM4>, make the jump to Pyro, and then get to <EM4>~mission(Destination|Address)</EM4>. \n\nAll you need to do is bring a ship with space for <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>, a <EM4>handheld tractor beam</EM4>, and be ready to do some damage if someone picks a fight with you.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x3\n<EM4>Rookie:</EM4> +200 Rep
RedWind_HaulCargo_AToB_title_01=~mission(ReputationRank) Hauler Needed for Direct ~mission(CargoGradeToken) Shipment <EM4>[50–1,000 Rep]</EM4>
RedWind_HaulCargo_AToB_waste_desc_01=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------  \n\nNeed a pilot for a waste material transfer going from the freight elevator at <EM4>~mission(Location|Address)</EM4> to <EM4>~mission(Destination|Address)</EM4>. Should be easy enough as long as you got a ship that can handle containers up to <EM4>~mission(MissionMaxSCUSize)</EM4> in size. Wouldn't bring your cleanest ship either.\n\nOn the bright side though, most likely outlaws will leave you alone when they see what you're carrying. And don't forget to pack a <EM4>handheld tractor beam</EM4> to bring along.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 7/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Trainee:</EM4> +50 Rep\n<EM4>Junior:</EM4> +250 Rep\n<EM4>Experienced:</EM4> +1,000 Rep
RedWind_HaulCargo_MultiToSingle_desc_01=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nJust got off a comm with a client. They got cargo (<EM4>~mission(MissionMaxSCUSize)</EM4> or smaller) at a few different locations ready to be taken over to a freight elevator at <EM4>~mission(Destination|Address)</EM4>.\n\nPICK UP LOCATIONS (ANY ORDER)  \n~mission(MultiToSingleToken)  \n\nI'd recommend taking a few minutes to plan your route before taking off. Might save you a bit of fuel. And don't forget to pack a <EM4>handheld tractor beam</EM4> to bring along.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 7/7 | Risk 6/7 | Knowledge 3/7\n<EM4>Junior:</EM4> +250 Rep\n<EM4>Member:</EM4> +500 Rep\n<EM4>Experienced:</EM4> +1,000 Rep\n<EM4>Senior:</EM4> +2,000 Rep\n<EM4>Master:</EM4> +4,000 Rep
RedWind_HaulCargo_MultiToSingle_desc_RantaDung=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nGot a request from a farmer in Pyro for specialized agricultural supplies - namely, ranta dung. Apparently, normal fertilizers aren't cutting it. They've put in orders from multiple distributors and need someone to bring everything back to <EM4>~mission(Destination|Address)</EM4>.\n\nHere are all the places you can collect the dung:\n\nPICK UP LOCATIONS (ANY ORDER)\n\n ~mission(MultiToSingleToken)\n\nThe client says your ship needs to be able to carry at least <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>. Don't forget to bring your own <EM4>handheld tractor beam</EM4> for loading and unloading.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x23\n<EM4>Rookie:</EM4> +200 Rep
RedWind_HaulCargo_MultiToSingle_title_01=~mission(ReputationRank) Hauler Needed for ~mission(CargoGradeToken) Shipment <EM4>[200–4,000 Rep]</EM4>
RedWind_HaulCargo_MultiToSingle_waste_desc_01=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nGot a bunch of comms this morning. Seems one of the local trash collectors' ship is busted and we're gonna be picking up the slack.\n\nI got a bunch of trash (<EM4>~mission(MissionMaxSCUSize)</EM4> or smaller) at a few different locations ready to be taken over to a freight elevator at <EM4>~mission(Destination|Address)</EM4>.\n\nPICK UP LOCATIONS (ANY ORDER)  \n~mission(MultiToSingleToken)\n\nAnd don't forget to pack a <EM4>handheld tractor beam</EM4> to bring along.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 7/7 | Risk 6/7 | Knowledge 3/7\n<EM4>Junior:</EM4> +250 Rep\n<EM4>Member:</EM4> +500 Rep\n<EM4>Senior:</EM4> +2,000 Rep\n<EM4>Master:</EM4> +4,000 Rep
RedWind_HaulCargo_SingleToMulti_desc_01=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------   \n\nOne of the folks over at <EM4>~mission(Location|Address)</EM4> just hit me up about a pile of cargo, <EM4>~mission(MissionMaxSCUSize)</EM4> or smaller, that needs to be hauled out to a few different spots.   \n\nDROP OFF LOCATIONS (ANY ORDER)  \n~mission(SingleToMultiToken)  \n\nI'm trusting you to set your own route here, so don't mess it up. And try to stay away from anywhere too dangerous. And don't forget to pack a <EM4>handheld tractor beam</EM4> to bring along.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Rookie:</EM4> +100 Rep\n<EM4>Junior:</EM4> +250 Rep\n<EM4>Member:</EM4> +500 Rep
RedWind_HaulCargo_SingleToMulti_desc_RevenantTreePollen=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nRed Wind needs an experienced pilot to transport a large shipment of raw revenant tree pollen from <EM4>~mission(Location|Address)</EM4> to these locations:\n\nDROP OFF LOCATIONS (ANY ORDER)\n\n~mission(SingleToMultiToken)\n\nThis might seems self-evident, but the rep from CFP asked us to assure you that it's okay under UEE law to transport revenant tree pollen as long as it hasn't been processed. \n\nBe sure that your ship can carry up to <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> before you accept the contract. And buy a <EM4>handheld tractor beam</EM4> if you don't have one already to make loading and unloading as painless as possible.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x23\n<EM4>Rookie:</EM4> +200 Rep
RedWind_HaulCargo_SingleToMulti_desc_ToCFP_Danger_Timed=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nCFP has an urgent request for a pilot with combat experience. A few of their settlements are under immediate threat and may soon be under attack, so they need supplies ASAP. \n\nIf you're confident that you can navigate a potential combat zone, please head to <EM4>~mission(Location|Address)</EM4>, grab the cargo, and bring it to these locations:\n\nDROP OFF LOCATIONS (ANY ORDER)\n\n~mission(SingleToMultiToken)\n\nYou'll need enough room for <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>, and your own <EM4>handheld tractor beam</EM4> to get everything loaded and unloaded.\n\nKeep in mind that it's always best to run if someone tries to ambush you. But if you get cornered, don't hesitate to defend yourself.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x12\n<EM4>Rookie:</EM4> +200 Rep
RedWind_HaulCargo_SingleToMulti_title_01=~mission(ReputationRank) Hauler Needed for ~mission(CargoGradeToken) Shipment <EM4>[100–4,000 Rep]</EM4>
RedWind_HaulCargo_SingleToMulti_waste_desc_01=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------   \n\nThey're doing a clean out at <EM4>~mission(Location|Address)</EM4> and have a bunch of <EM4>~mission(MissionMaxSCUSize)</EM4> or smaller waste containers that needs to be hauled out to a few different spots. (Don't ask me why. They're paying us is all I know.)\n\nDROP OFF LOCATIONS (ANY ORDER)  \n~mission(SingleToMultiToken)\n\nAnd don't forget to pack a <EM4>handheld tractor beam</EM4> to bring along.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 5/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Member:</EM4> +500 Rep\n<EM4>Experienced:</EM4> +1,000 Rep\n<EM4>Senior:</EM4> +2,000 Rep\n<EM4>Master:</EM4> +4,000 Rep
RedWind_LocalDelivery_desc_01=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nNeed an available independent pilot for a quick local delivery.\n\nPACKAGE FOR PICK UP\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1|Address)</EM4>\n\nDROP OFF LOCATION\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1|Address)</EM4>\n\nTry to keep your nose clean when you're out there. If you got Red Wind packages onboard, a certain level of professionalism is appreciated. And don't forget to pack a <EM4>handheld tractor beam</EM4> to bring along. \n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250
RedWind_LocalDelivery_desc_02=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nLooking for a pilot to run a couple packages -\n\nPACKAGES FOR PICK UP (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2|Address)</EM4>\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2|Address)</EM4>\n\nNeed it done quick and without screwups. And don't forget to pack a <EM4>handheld tractor beam</EM4> to bring along. \n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_LocalDelivery_desc_03=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nHey all, got a contract up for grabs for any pilots with a ship at the ready -\n\nPACKAGES FOR PICK UP (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> from the <EM4>~mission(Pickup3|Address)</EM4>\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> to the <EM4>~mission(Dropoff3|Address)</EM4>\n\nAnd don't forget to pack a <EM4>handheld tractor beam</EM4> to bring along. \n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_LocalDelivery_desc_04=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nA run came through that needs an available pilot.\n\nPACKAGES FOR PICK UP (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> from the <EM4>~mission(Pickup3|Address)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> from the <EM4>~mission(Pickup4|Address)</EM4>\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> to the <EM4>~mission(Dropoff3|Address)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> to the <EM4>~mission(Dropoff4|Address)</EM4>\n\nAnd just to be clear, you have to provide your own cargo ship. Make sure you got the space. And don't forget to pack a <EM4>handheld tractor beam</EM4> to bring along. \n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_LocalDelivery_desc_05=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nPut together a multi-stop run that needs a pilot.\n\nPACKAGES FOR PICK UP (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> from the <EM4>~mission(Pickup3|Address)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> from the <EM4>~mission(Pickup4|Address)</EM4>\n     · Package <EM4>#~mission(Item5|SerialNumber)</EM4> from the <EM4>~mission(Pickup5|Address)</EM4>\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> to the <EM4>~mission(Dropoff3|Address)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> to the <EM4>~mission(Dropoff4|Address)</EM4>\n     · Package <EM4>#~mission(Item5|SerialNumber)</EM4> to the <EM4>~mission(Dropoff5|Address)</EM4> \n\nMake sure your ship's got the space for all these pickups. And don't forget to pack a <EM4>handheld tractor beam</EM4> to bring along. \n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_LocalDelivery_desc_intro=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nWe're looking to hire an independent pilot that's interested in running a local route for us.\n\nPACKAGES FOR PICK UP (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1|Address)</EM4>\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1|Address)</EM4>\n\nIf you pull this off, we can see about other contracts in the future. And don't forget to pack a <EM4>handheld tractor beam</EM4> to bring along. \n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +100
RedWind_LocalDelivery_desc_rehire=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nEven though we haven't hired you in a while, we could use the extra help right now.\n\nPACKAGES FOR PICK UP (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> from the <EM4>~mission(Pickup3|Address)</EM4>\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> to the <EM4>~mission(Dropoff3|Address)</EM4>\n\nIf you pull this delivery off, we can see about making it a more regular thing again. And don't forget to pack a <EM4>handheld tractor beam</EM4> to bring along. \n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_LocalDelivery_title_01=Red Wind Local Delivery Route <EM4>[250–500 Rep]</EM4>
RedWind_LocalDelivery_title_intro=Red Wind Seeking New Pilots <EM4>[100 Rep]</EM4>
RedWind_LocalDelivery_title_rehire=Another Attempt at Red Wind Delivery <EM4>[500 Rep]</EM4>
RedWind_RecoverCargo_Easy_Description=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nOne of our haulers ran into some engine trouble whilst transporting some cargo for us and was forced to abandon their ship. Looking for a contractor who can recover the cargo and complete the delivery. You’ll need to bring your own <EM4>heavy-duty tractor beam</EM4> to transport the cargo to your ship. Details below.\n\nRECOVERY LOCATION\n     · <EM4>~mission(Location|Address)</EM4>\n\nDROP OFF LOCATION\n     · Freight elevator at <EM4>~mission(Destination|Address)</EM4>\n\nBe advised, the recovery location hasn’t been verified as safe. You might find an opportunistic outlaw trying to take the cargo for themselves, so be on alert.\n\nTAKE PRIDE IN YOUR WORK – Even as a contractor you are representing Red Wind Linehaul. Do not intentionally do anything to harm the company’s reputation.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Unknown:</EM4> 1\n<EM4>Trainee:</EM4> +100 Rep
RedWind_RecoverCargo_Easy_Title=Red Wind Easy Cargo Recovery <EM4>[100 Rep]</EM4>
RedWind_RecoverCargo_Hard_Description=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nWe’re having trouble completing a hauling mission and need a reliable contractor who has experience working in dangerous environments to complete the job. Just as a heads up, the cargo is in an abandoned ship surrounded by multiple, highly dangerous outlaws. We strongly advise you bring some backup with you and <EM4>heavy-duty tractor beam</EM4> to retrieve the client’s goods. Details follow:\n\nRECOVERY LOCATION\n     · <EM4>~mission(Location|Address)</EM4>\n\nDROP OFF LOCATION\n     · Freight elevator at <EM4>~mission(Destination|Address)</EM4>\n\nSince this is a bit risky, we’re offering proportionate pay. I’ll leave it up to you to decide how to distribute it to your crew.\n\nTAKE PRIDE IN YOUR WORK – Even as a contractor you are representing Red Wind Linehaul. Do not intentionally do anything to harm the company’s reputation.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Unknown:</EM4> 1\n<EM4>Junior:</EM4> +200 Rep
RedWind_RecoverCargo_Hard_Title=Red Wind Challenging Cargo Recovery <EM4>[200 Rep]</EM4>
RedWind_RecoverCargo_Medium_Description=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nA Red Wind hauler has been ambushed by some outlaws and now our clients’ cargo is sitting still whilst they prepare to steal it. We need a pilot with a <EM4>heavy-duty tractor beam</EM4> and a combat ready ship to head to the location below and recover the cargo before it’s gone for good.\n\nRECOVERY LOCATION\n     · <EM4>~mission(Location|Address)</EM4>\n\nDROP OFF LOCATION\n     · Freight elevator at <EM4>~mission(Destination|Address)</EM4>\n\nThe pilot reported multiple hostiles so make sure you take this seriously. \n\nEVERY OPPORTUNITY COUNTS – Make the most of what’s given to you, show us that you can handle more work.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Unknown:</EM4> 1\n<EM4>Rookie:</EM4> +150 Rep
RedWind_RecoverCargo_Medium_Title=Red Wind Straightforward Cargo Recovery <EM4>[150 Rep]</EM4>
RedWind_RecoverCargo_Super_Description=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nWe have a special assignment for only the most competent contractors. One of our haulers who is sadly no longer with us failed to complete their last job. The cargo they were supposed to deliver is sitting stationary in their former ship in the location listed below.\n\nRECOVERY LOCATION\n     · <EM4>~mission(Location|Address)</EM4>\n\nDROP OFF LOCATION\n     · Freight elevator at <EM4>~mission(Destination|Address)</EM4>\n\nI’m not going dance around the issue, this is an extremely challenging job. You’ll need to bring a strong team of skilled pilots with you to deal with the outlaws that killed the previous contractor and a <EM4>heavy-duty tractor beam</EM4> to retrieve the client’s cargo. That said, if you take on this contract, we will make it worth your time.\n\nHOW DID WE DO – Complete our short feedback survey on our Spectrum page for a chance to enter our monthly prize draw.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Unknown:</EM4> 1\n<EM4>Experienced:</EM4> +300 Rep
RedWind_RecoverCargo_Super_Title=Red Wind Special Cargo Recovery <EM4>[300 Rep]</EM4>
RedWind_RecoverCargo_VeryHard_Description=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nPutting out a call for a highly skilled pilot who can recover our client’s cargo. Please only accept this contract if you have experience dealing with extremely hostile situations involving multiple combatants. Additional crew members and a <EM4>heavy-duty tractor beam</EM4> are highly recommended.\n\nRECOVERY LOCATION\n     · <EM4>~mission(Location|Address)</EM4>\n\nDROP OFF LOCATION\n     · Freight elevator at <EM4>~mission(Destination|Address)</EM4>\n\nThe cargo should be in the bay of the abandoned ship. The client has already expressed frustration regarding the cargo’s delay so please work quickly and efficiently.\n\nBE RESILIENT – Life is hard and sometimes you have to roll with the punches. Keep going and don’t let it bring you down.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Unknown:</EM4> 1\n<EM4>Member:</EM4> +200 Rep
RedWind_RecoverCargo_VeryHard_Title=Red Wind Dangerous Cargo Recovery <EM4>[200 Rep]</EM4>
Redwind_internaldelivery_dc_desc_001=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nThe folks over at <EM4>~mission(Location|Address)</EM4> are doing some clean up and want some packages moved around the facility.\n\nPACKAGES FOR PICK UP (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2)</EM4>\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2)</EM4>\n\nThey need it done efficiently and without a lot of bother.\n\n\nDO NOT TAKE THIS CONTRACT - unless you are reliable. Red Wind has a reputation that our clients trust and for good reason. \n\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Redwind_internaldelivery_dc_desc_003=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nGot some boxes that need reorganizing over at <EM4>~mission(Location|Address)</EM4>.\n\nPACKAGES FOR PICK UP (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> from the <EM4>~mission(Pickup3)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> from the <EM4>~mission(Pickup4)</EM4>\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> to the <EM4>~mission(Dropoff3)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> to the <EM4>~mission(Dropoff4)</EM4>\n\n\nTO ALL VETS - Red Wind appreciates your service to our Empire! Your struggles mean our freedom! \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
Redwind_internaldelivery_dc_desc_005=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nSeems like there was a bit of a logistical snafu at <EM4>~mission(Location|Address)</EM4> and they need someone to make sure the misplaced packages end up where they’re supposed to go inside the facility.\n\nPACKAGES FOR PICK UP (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> from the <EM4>~mission(Pickup3)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> from the <EM4>~mission(Pickup4)</EM4>\n     · Package <EM4>#~mission(Item5|SerialNumber)</EM4> from the <EM4>~mission(Pickup5)</EM4>\n     · Package <EM4>#~mission(Item6|SerialNumber)</EM4> from the <EM4>~mission(Pickup6)</EM4>\n\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> to the <EM4>~mission(Dropoff3)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> to the <EM4>~mission(Dropoff4)</EM4>\n     · Package <EM4>#~mission(Item5|SerialNumber)</EM4> to the <EM4>~mission(Dropoff5)</EM4>\n     · Package <EM4>#~mission(Item6|SerialNumber)</EM4> to the <EM4>~mission(Dropoff6)</EM4>\n\n\n\nTRUST GOES TWO WAYS - By taking this contract you are pledging not to screw us over, and Red Wind Linehaul pledges to treat you the same. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000
Redwind_internaldelivery_dc_title_001=Red Wind Package Handler <EM4>[500–2,000 Rep]</EM4>
RepairOxygenKiosk_DescriptionLong=Hello Guests,\n\nWe have recently been alerted that one of our Oxygen Dispensers has suffered a technical error. As you know these kiosks are vital to ensure that you have plenty of oxygen handy while participating in our Work Release Program.\n\nWe are looking for any available guest to reset the kiosk. That should reconnect the kiosk to the network and resolve the issue. The first guest who's able to complete this task will not only be compensated with merits, but also with the satisfaction that they're making the workplace safer for other guests.\n\nThank you.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100
RepairOxygenKiosk_Title=Inmate Maintenance Opportunity <EM4>[100 Rep]</EM4>
