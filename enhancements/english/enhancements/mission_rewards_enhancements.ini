RetrieveDatapad_desc=Ran into a bit of crap luck that I'm hoping you can help me right.\n\nA few days ago, I hired the crew of the 'Pride of Arliss' to obtain some important data for me. They pulled off the job no problem, but the bastard of a captain comm'd me demanding more credits. Turns out it wasn't the first time he's tried to pull this trick either because in middle of "negotiating" with me, his ship was attacked by some very pissed off individuals looking to teach him a lesson.\n\nOur comm got cut off when the shooting started and that was the last I heard from him. I'm guessing he's as good as ghosted, but I want you to head to the Pride of Arliss and try to get my data off the captain's personal datapad.\n\nOnce you have it, I set up a secure transmission channel at the ARC-L1 rest stop. Travel there and when you're in range, submit the data to me through this contract to get paid.\n  \nDon’t try to screw me over either. Karma can be a real asshole.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Unknown:</EM4> 1
Roughready_bounty_desc_002=Rough & Ready have been in business with ~mission(TargetName) for years but that relationship has taken a turn for the worse. For a while, we were supplying them with fuel on credit but when it came time to collect the coward went into hiding. If ~mission(TargetName|Last) can’t pay with creds, guess they’re gonna pay with their life.\n\nAn associate just clocked ~mission(TargetName|Last) at ~mission(Location|Address). I’d love for you to head there now to make the stingy bastard pay.\n\nBy the way, it looks like ~mission(TargetName|Last) isn’t traveling alone, so I’d make sure you’re fully stocked before going after ‘em. \n\n- Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
Roughready_destroyitems_fuel_desc_01=If you’re in the market for some easy credits, I’ve got an offer for you.\n\nSee, word on the vine is that ~mission(location|address) is operating as a fuel depot. They must not have gotten the memo that the fuel trade in Pyro belongs to Rough & Ready.\n\nThat’s why you’re going to make your way there and destroy their fuel reserves. They should be easy for you to spot. They’re the large yellow storage tanks dotted around the outpost. Watch out though, there are turret emplacements defending the area, so make sure you’re ready to dodge their shots or blow the guns sky high. \n\nI’ll leave it up to you how you handle the demo. Bombs would be my first choice, but I don’t care much as long as the gig gets done.\n\n- Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Turrets:</EM4> present (hostile)
Roughready_destroyitems_fuel_title_01=Fuel to the Fire <EM4>[50 Rep]</EM4>
Ruto_Assassin_Sync_E_Desc=Here's the deal. ~mission(TargetName) and ~mission(TargetName2) need to die at the same time. Unfortunately, they aren't gonna be in the same place.\n\nA double hit can sound complicated, but if you hire some additional guns it shouldn't be all that hard to do two hits simultaneously.\n\nMake sure you find folks who have skills as I have it on good authority that each'll be flying with some escorts for "protection."\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x2
Ruto_Assassin_Sync_E_Title=together forever <EM4>[500 Rep]</EM4>
Ruto_Assassin_Sync_H_Desc=Have another pair that needs simultaneous deathing. Seems to be getting more and more popular as a murder option. \n\nThis time it's ~mission(TargetName) and ~mission(TargetName2). Both are supposed to be pretty skilled operators and they won't be flying alone. \n\nI'd make sure whoever you get to help you on this one can handle a fight.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x2
Ruto_Assassin_Sync_H_Title=twice the headache <EM4>[500 Rep]</EM4>
Ruto_Assassin_Sync_Intro_Desc=Guess what ~mission(TargetName) and ~mission(TargetName2) have in common? \n\nYou're gonna kill 'em both!\n\nDifficult part is that I need you to kill them at the same time so that one doesn't have a chance to escape, or worse, kill the person trying to kill them. \n\nSo put together a team to track one target while you handle the other. Divide and conquer!\n\nAnd despite the fact they made a mess big enough to get themselves killed, my understanding is that they are relative lightweights. Don't expect you to meet too much resistance.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x1, Targets x2
Ruto_Assassin_Sync_Intro_Title=simultaneous release <EM4>[500 Rep]</EM4>
Ruto_Assassin_Sync_M_Desc=I really hope that you're not buddies with ~mission(TargetName) or ~mission(TargetName2) because I need you to ghost the pair of them... at the same time...\n\nOf course they wouldn't make this easy on us and travel in the same ship or something obvious like that. No. You're going to have to put together a crew so that you can down both targets simultaneously. \n\nAs soon as one of them is dead, be ready to drop the other one too. Can't risk either of them getting away.\n\nAnd I figure I should mention that not only are both pretty good pilots, but that they'll be traveling with backup too. Nothing you can't handle I'm sure.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x2
Ruto_Assassin_Sync_M_Title=friends to the end <EM4>[500 Rep]</EM4>
Ruto_Assassin_Sync_S_Desc=If you had asked me, I would've said ~mission(TargetName) and ~mission(TargetName2) would have wound up eventually killing each other. But instead you're going to get the honor of killing them both at the same time.\n\nYou're going to have to work for it, though.\n\nEach one is trouble. Serious records, highly trained, and too smart to fly without backup.\n\nGather the best crew you can on this one. You'll need it. And don't be stingy. You can't spend credits if you're dead.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x2
Ruto_Assassin_Sync_S_Title=double trouble <EM4>[500 Rep]</EM4>
Ruto_Assassin_Sync_VE_Desc=It's pretty touching when you run across a pair that's willing to die for one another. Stupid but touching.\n\n~mission(TargetName) and ~mission(TargetName2) chose to stand by each other and now its gone and got them dead.\n\nFind a friend of your own and hunt each of these two down. Make sure you kill them at the same time. Call it poetic justice.\n\nThey should die pretty easy. Maybe they'll have a ship or two with them but I don't think it'll be anything to worry about.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x2, Targets x2
Ruto_Assassin_Sync_VE_Title=death do us part <EM4>[500 Rep]</EM4>
Ruto_Assassin_Sync_VH_Desc=~mission(TargetName) and ~mission(TargetName2). I think they may be related? Or dating? Doesn't really matter, someone wants them killed. \n\nI've arranged it so that you can hit them when they're not flying together. Safer for you this way. They are both serious business and fly with equally serious backup.\n\nMake sure you and your crew time your attacks. I don't want one of them left alive or it's going to be a real headache.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x2
Ruto_Assassin_Sync_VH_Title=two for the price of two <EM4>[500 Rep]</EM4>
