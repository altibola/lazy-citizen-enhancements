Foxwell_SecurityPatrol_VH_Desc_001=A client needs our help. Outlaws are roaming certain sectors where they do business and attacking anyone they come across. Our client has already lost several ships and can’t afford to lose anymore. \n\nWe need someone to patrol those areas and draw out any hostile forces. The job begins with you heading to the <EM4>location marker</EM4> on your HUD and scanning. Then we’ll share a handful of other patrol points for you to scan. \n\nFrom the sound of it, these packs of ships feature skilled and aggressive pilots. Best be ready to rumble if you run into any of them. Would be good to have at least <EM4>two trusted pilots</EM4> by your side for this one.\n\nAt the end of a successful patrol, the main contractor will get a bonus payment of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\nStay chilly,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sanguine" Energy Assault Rifle\n- [S1-A] Antium Arms Sand\n- [S1-A] Antium Core Sand\n- [S1-A] Antium Helmet Sand\n- [S1-A] Antium Legs Sand\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Targets x63\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_SecurityPatrol_VH_Title_001=Red Level Contract: High-Risk Security Patrol <EM4>[BP]</EM4> <EM4>[250 Rep]</EM4>
Foxwell_ShipAmbush_E_desc_001=An outlaw who’s been on the run finally returned to the system. Seems like they hoped that disappearing for a bit would make us forget about them. They’re not even trying to hide their identity or vary their routine which means we know exactly where they’re going to be.\n\nLatest intel indicates that they’re flying a <EM4>~mission(AmbushTarget)</EM4> and will be passing by <EM4>~mission(Location|Address)</EM4> soon. I’ve already scoped out an emission cloud that’s a perfect place for you to find cover, power down your ship, and wait. Only real variable is if they’ll be alone or not. We’ve heard they sometimes roll with friends that all fly single-seaters. Landing that first surprise strike will be important as this crew is battle-tested, but we’ll have reinforcements at the ready to provide support if you need them.\n\nGet this done and we'll give the main contractor a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sunstone" Energy Assault Rifle\n- [S1-A] Antium Arms Jet\n- [S1-A] Antium Core Jet\n- [S1-A] Antium Legs Jet\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x2, Hostile Wave x7, Targets x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipAmbush_E_title_001=Yellow Level Contract: Surprise Strike <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_ShipAmbush_H_desc_001=Recently, a <EM4>~mission(AmbushTarget)</EM4> baited Foxwell forces with a bogus rescue beacon. By the time our forces realized what was happening, a squad of ships unleashed a devastating attack and only one Foxwell contractor survived. Their scan logs identified the bait ship, and we’ve had scouts monitoring them ever since.\n\nOur surveillance has revealed the squad has a regular flight pattern that we think we can exploit. There’s a sizable emission cloud at <EM4>~mission(Location|Address)</EM4> that makes it an ideal spot to post up. Think you have what it takes to handle this for us? \n\nIt’ll be you against the <EM4>~mission(AmbushTarget)</EM4>, other large craft, and a sizable escort. Wish I could be more specific than that but this crew regularly rotates ships in and out of the squad. Would be smart to bring some support, so you don’t get overwhelmed by their numbers.   \n\nComplete the job and we'll give the main contractor a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sunstone" Energy Assault Rifle\n- [S1-A] Antium Arms Jet\n- [S1-A] Antium Core Jet\n- [S1-A] Antium Legs Jet\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x12, Targets x5\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipAmbush_H_title_001=Orange Level Contract: Return the Favor <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
Foxwell_ShipAmbush_M_desc_001=Foxwell has been tracking a <EM4>~mission(AmbushTarget)</EM4> used by outlaws and discovered a pattern to its movements. The ship should be passing by <EM4>~mission(Location|Address)</EM4> soon.\n\nLooking for a contractor willing to hustle there, hide in the emission cloud, and then spring the trap when the time is right. There’s usually escort ships with the <EM4>~mission(AmbushTarget)</EM4>. Careful not to jump the gun and blow your cover. The element of surprise is crucial from what I’ve read.\n\nPull this off and we'll give the main contractor a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sunstone" Energy Assault Rifle\n- [S1-A] Antium Arms Jet\n- [S1-A] Antium Core Jet\n- [S1-A] Antium Legs Jet\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x5, Targets x3\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Contractor:</EM4> +2,000 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipAmbush_M_title_001=Orange Level Contract: Spring a Trap <EM4>[BP]</EM4> <EM4>[150–2,000 Rep]</EM4>
Foxwell_ShipAmbush_S_desc_001=We’ve received a handful of comms about recent attacks undertaken by an <EM4>~mission(AmbushTarget)</EM4> and its escort ships. After opening a file, we started tracking the ship’s movements and noticed that it frequently passes an emission cloud near <EM4>~mission(Location|Address)</EM4>. We want to use that to our advantage to launch a surprise attack. \n\nOnce on site, you should hide in the emission cloud to cloak your signature enough to allow you to make the first strike. Unfortunately, Foxwell can’t provide additional reinforcements for this operation, so you’ll be responsible for bringing any support forces. You might need the help too. The crew of the ~mission(AmbushTarget) is aggressive and battle hardened.        \n\nYou get this taken care of for us and there's a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> in it for the main contractor.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sunstone" Energy Assault Rifle\n- [S1-A] Antium Arms Jet\n- [S1-A] Antium Core Jet\n- [S1-A] Antium Legs Jet\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x6, Targets x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipAmbush_S_title_001=Red Level Contract: Surprise Attack <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
Foxwell_ShipAmbush_VE_desc_001=Care to help us ghost a bad guy? \n\nWe’ve been hired to hunt down an outlaw flying a <EM4>~mission(AmbushTarget)</EM4>. Shouldn’t be too hard since they take the same flightpath each day. That makes them a prime target for an ambush if I ever saw one. I’ve analyzed the route and determined that <EM4>~mission(Location|Address)</EM4> is the ideal spot to strike. There’s an emission cloud there that’ll be perfect to hide your ship’s signature while you wait.   \n\nJob is simple if you’re interested. Head to the location, hide out, power down, and then wait for them to fly by. Sometimes they roll alone but they often have other single-seat ships with them. Shouldn’t be too hard to handle for a pro. Plus, we’ll still have reinforcements nearby and ready to deploy once it pops off.\n\nPull this off and we'll give the main contractor a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nGood luck,\n\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sunstone" Energy Assault Rifle\n- [S1-A] Antium Arms Jet\n- [S1-A] Antium Core Jet\n- [S1-A] Antium Legs Jet\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x6, Targets x2\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Neutral:</EM4> +500 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipAmbush_VE_title_001=Yellow Level Contract: Ambush An Amateur <EM4>[BP]</EM4> <EM4>[100–500 Rep]</EM4>
Foxwell_ShipAmbush_VH_desc_001=Foxwell got word from an important client that outlaws have put together a squad that’s been stalking the system with sub-capital ships and escort fighters. Our client is concerned that if left unchecked, outlaws will create more of these attack squads and destabilize system security. We’ve been hired to wipe out this group before that happens. \n\nWe need a confident and skilled contractor for this task. Good news is that we have a plan in place. One of the ships used by this squad, a <EM4>~mission(AmbushTarget)</EM4>, was stolen from our client, who’s still able to track its movements. They’ve shared the location data with us and we’ve discovered that this squad often goes by <EM4>~mission(Location|Address)</EM4>. We’ve scouted the location and discovered a large emission cloud makes an ideal spot for an ambush.  \n\nNot going to lie, this isn’t going to be easy. We don’t have any additional forces available to deploy, so it would be good to bring your own support. \n\nYou manage to pull this off, I've arranged for a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> for the main contractor.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sunstone" Energy Assault Rifle\n- [S1-A] Antium Arms Jet\n- [S1-A] Antium Core Jet\n- [S1-A] Antium Legs Jet\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 5/7 | Risk 7/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x11, Targets x4\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipAmbush_VH_title_001=Red Level Contract: Ambush Attack Squad <EM4>[BP]</EM4> <EM4>[250 Rep]</EM4>
Foxwell_ShipWaveAttack_ClearHostiles_Desc_E_001=Okay, this might be a bit of stretch to do on your own, so if you got any favors to call in, it could be good to cash those chits now. There's a group of desperados striking delivery ships up and down this sector and we've been tasked with cleaning them up. \n\nOnce your crew is ready, head over to ~mission(Location|Address) and take the hostiles there down. Now, these bastards are a bit clever so they tend to split up into smaller packs. Make sure you wait around to clear every last one of them out.\n \nGood luck,\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives."\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x12\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipWaveAttack_ClearHostiles_Desc_H_001=It seems that a couple of different small-time gangs have decided to pool their resources and start doing coordinated attacks. Alone, they weren't much, but all together they're proving to be a serious threat that has to be dealt with.\n\nRecruit some backup you can rely on and the fly over to ~mission(Location|Address). Once you attack the initial gang members you find there, the other groups will arrive to support them. Make sure you wait around to take out all of them.\n \nGood luck,\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x22\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipWaveAttack_ClearHostiles_Desc_M_001=A splinter group of outlaws have broken off from one of the main gangs in the system and have been trying to strike out on their own. With the amount of trouble they've been causing its clear they're looking to establish a name for themselves as quickly as they can. It's going to be up to you and your support crew to put a stop to them.\n\nOnce your crew is ready, head over to ~mission(Location|Address) and engage with the gang. Not all of them will just be waiting there on site. Expect reinforcements to arrive once you begin your assault. Just be sure to stay until every last one of them has been take care of.\n \nGood luck,\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives."\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x13\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipWaveAttack_ClearHostiles_Desc_VE_001=There's a small group of criminals that have been marking their territory, striking out any freighters that get close enough. They got a little too greedy though, because now someone's paying us to go deal with them.\n\nOnce you and whoever you're bringing are ready, go to ~mission(Location|Address) and engage with these criminals. Since they like to fly in separate packs, be sure you wait around to clear every last one of them out.\n \nGood luck,\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
