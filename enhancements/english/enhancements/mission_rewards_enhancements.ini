shubin_claimsweep_desc_easy=POSTING: Security / Mercenary \nLOCATION: ~mission(LagrangeLocation)\nWORK EXPERIENCE: Combat Pilot (Military Experience a Plus)\nTERMS*: \nWe just received word that a Shubin contractor was chased off one of our claims by outlaws who are operating there illegally. Further complicating matters, they have set up a few orbital sentries to protect themselves while they mine. \n\nOur hope is to contract with a mercenary who can search for and destroy the sentries at ~mission(location). If you do encounter an illegal miner at the site, be mindful that it is common practice for these types to contact reinforcements for assistance. It might be better to neutralize them as quickly as possible before they can do so. \n\n\n\n\n*Shubin Interstellar is an equal opportunity contractor. By accepting this contract you are assuming any and all risks associated with the work outlined herein and in no way can Shubin Interstellar be held accountable for any damages accrued during the duration of the contract.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x3, Prospectors x1\n<EM4>Turrets:</EM4> 1 (hostile)
shubin_claimsweep_desc_hard=POSTING: Security / Mercenary \nLOCATION: ~mission(LagrangeLocation)\nWORK EXPERIENCE: Combat Pilot (Military Experience a Plus)\nTERMS*: \nA local Stanton independent mining team was working ~mission(Location) as Shubin Interstellar contractors when a hostile force attacked and took over the site. We believe that the perpetrators are still at the claim using the equipment left behind to harvest the valuable ore there for themselves.\n\nAmong the equipment lost were a handful of orbital sentries that had unfortunately not yet been fully deployed at the time of the attack. Long range scans of the claim have led us to conclude that the outlaws have activated the orbital sentries and are using them to protect their illegal operations.\n\nTo reclaim the site, we are seeking contractors to go to ~mission(Location), destroy the orbital sentries, and clear the site of hostile miners. Efficiency is strongly recommended as there is a high risk they will call for reinforcements once they discover they’re being evicted. \n\n\n\n\n*Shubin Interstellar is an equal opportunity contractor. By accepting this contract you are assuming any and all risks associated with the work outlined herein and in no way can Shubin Interstellar be held accountable for any damages accrued during the duration of the contract.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x5, Prospectors x4\n<EM4>Turrets:</EM4> 4 (hostile)
shubin_claimsweep_desc_intro=POSTING: Security / Mercenary \nLOCATION: ~mission(LagrangeLocation)\nWORK EXPERIENCE: Combat Pilot (Military Experience a Plus)\nTERMS*: \nIt was recently discovered that a Shubin mining claim has been illegally poached by a rogue miner. While the miner themselves seems to no longer be stealing ore from the site, they did leave behind an orbital sentry which is preventing us from reclaiming it thanks to its offensive capabilities.\n\nWe are looking for a mercenary willing to travel to ~mission(location) hunt down the sentry and destroy it in preparation for Shubin repossession of the site.\n\n\n\n\n*Shubin Interstellar is an equal opportunity contractor. By accepting this contract you are assuming any and all risks associated with the work outlined herein and in no way can Shubin Interstellar be held accountable for any damages accrued during the duration of the contract.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Turrets:</EM4> 1 (hostile)
shubin_claimsweep_desc_med=POSTING: Security / Mercenary \nLOCATION: ~mission(LagrangeLocation)\nWORK EXPERIENCE: Combat Pilot (Military Experience a Plus)\nTERMS*: \nA recently acquired Shubin Interstellar mining claim awaiting processing was discovered to have been jumped by a rogue mining outfit who are actively stealing ore from the site.  While local authorities have been notified, there is concern that valuable assets may be harvested before an official investigation can be launched.\n\nTherefore, as is our right as claim holders, we wish to secure a mercenary force to go to ~mission(Location) and destroy the several orbital sentries that are protecting this illegal operation. Caution is advised as there may still be a few illegal miners at the location along with any reinforcements they muster. \n\n\n\n\n*Shubin Interstellar is an equal opportunity contractor. By accepting this contract you are assuming any and all risks associated with the work outlined herein and in no way can Shubin Interstellar be held accountable for any damages accrued during the duration of the contract.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x4, Prospectors x2\n<EM4>Turrets:</EM4> 3 (hostile)
shubin_claimsweep_desc_rand=POSTING: Security / Mercenary \nLOCATION: ~mission(LagrangeLocation)\nWORK EXPERIENCE: Combat Pilot (Military Experience a Plus)\nTERMS*: \nWhile conducting a survey of Shubin claims in the sector, we were disheartened to learn that a small team of outlaws have set up shop at ~mission(Location) and have been illegal harvesting resources. Worse, they have established a defensive perimeter with several orbital sentries dotted around the site making it difficult for us to evict them. \n\nIn order that we may repossess the claim site, we are seeking mercenary contractors to find and destroy the handful of orbital sentries. Adding additional difficulty to the task is that we are unclear as to the exact fighting strength of these outlaw miners. If they are given the chance to summon reinforcements expect anything from a small contingency to a full squad of trained fighters. \n\n\n\n\n*Shubin Interstellar is an equal opportunity contractor. By accepting this contract you are assuming any and all risks associated with the work outlined herein and in no way can Shubin Interstellar be held accountable for any damages accrued during the duration of the contract.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x32, Prospectors x5\n<EM4>Turrets:</EM4> 4 (hostile)
shubin_rockcracker_pvp_desc_01=CONTRACT: Mining Rights Transfer\nLOCATION: Nyx\n\nDETAILS: \nShubin Interstellar prospectors have recently discovered the location of an abandoned QV Planetary Service Breaker Station near the Keeger belt. These stations were originally used by the defunct company to harvest valuable resources from inside asteroids but knowledge of their exact locations has been lost over the years. \n\nWhile this particular station is offline, our scout team believes that it could be made functional again with the necessary repairs. Additionally, if it was brought back online, there's already a resource-heavy asteroid in place ready to be cracked by the station's mining laser. \n\nUnfortunately, with all the various challenges that come with operating in Nyx, Shubin doesn't currently have the available bandwidth to handle the aforementioned repairs ourselves. This however has created an opportunity for an interested independent mining operation such as yourself. \n\n<EM4>TERMS*:</EM4>\nWe are making available the <EM4>shared mining rights</EM4> to this QV Breaker Station. Upon purchase, we will provide the coordinates of the station to you and your crew. (Remember, any other interested parties who purchase the mining rights will get access to the station as well.) Your crew will then be free to head there with a <EM4>mining vessel</EM4>, restore the <EM4>station's mining laser</EM4> to an operational status, crack the asteroid, and <EM4>harvest the resources</EM4> inside. \n\nPlease note that since this is a shared contract we are able to offer these mining rights at a reduced prices, but the resources in the asteroid will be available on a <EM4>first come, first serve</EM4> basis with any other mining crews at the site. Also, there is also a chance that other interested parties, such as outlaws, may discover the station's location on their own. Caution is advised. \n\n*By accepting this contract you are assuming any and all risks associated with the work outlined herein and in no way can Shubin Interstellar be held accountable for any damages accrued during the duration of the contract.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 "Kismet" Shotgun\n- R97 "Righteous" Shotgun\n- [S1-A] Monde Arms Delta Camo\n- [S1-A] Monde Arms Hemlock Camo\n- [S1-A] Monde Core Delta Camo\n- [S1-A] Monde Core Hemlock Camo\n- [S1-A] Monde Helmet Delta Camo\n- [S1-A] Monde Helmet Hemlock Camo\n- [S1-A] Monde Legs Delta Camo\n- [S1-A] Monde Legs Hemlock Camo\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Blueprint Reward:</EM4> Guaranteed
