EckhartSecurity_DestroyServers_FacilityDelving_Desc_001=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Destroy Server\nAPPROVAL CODE = VS-14\n\nFOR IMMEDIATE PROCESSING\n\nOur client has requested the immediate destruction of a group of servers located at a long-shuttered ASD research site. The servers in question contain information that our client considers extremely damaging and is eager to see the data completely eliminated.\n\nInitial surveillance indicates the servers are within the facility’s <EM4>Energy Lab, located in the Research wing</EM4>. We’ve also picked up on a number of hostile forces, so be on alert.\n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Applicant:</EM4> +50 Rep
EckhartSecurity_DestroyServers_FacilityDelving_Desc_002=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Destroy Server\nAPPROVAL CODE = VS-14\n\nFOR IMMEDIATE PROCESSING\n\nA client has asked us to infiltrate an old ASD research site and wipe the contents of a few specific servers there.\n\nWe believe the servers are located somewhere within the <EM4>Xenotech Lab, in the Research wing</EM4>. The client has also informed us that despite the facilities being publicly declared as closed, you're still likely to find hostile forces there.\n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Applicant:</EM4> +50 Rep
EckhartSecurity_DestroyServers_FacilityDelving_Desc_003=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Destroy Server\nAPPROVAL CODE = VS-14\n\nFOR IMMEDIATE PROCESSING\n\nThis a simple seek and destroy contract. The client has requested that several servers located at an ASD research site be destroyed as soon as possible. Under no circumstances should these servers be accessed, or copies of the data made.\n\nThe client believes that the servers are somewhere in the <EM4>Engineering wing</EM4>, most likely in the <EM4>Management</EM4> area. In addition to this, there is a strong chance you won’t be the only presence on-site so be wary of potential hostiles.\n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Applicant:</EM4> +50 Rep
EckhartSecurity_DestroyServers_FacilityDelving_Desc_004=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Destroy Server\nAPPROVAL CODE = VS-14\n\nFOR IMMEDIATE PROCESSING\n\nClient has requested a discreet contractor to infiltrate an ASD research site, locate a group of servers, and destroy the information stored on them permanently.\n\nThe client was able to share the location of the servers within the facility: the <EM4>Control Center in the Engineering wing</EM4>. The site has officially been shuttered, but there still may be hostile forces there. Be on your guard.\n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Applicant:</EM4> +50 Rep
