Shubin_Industrial_ShipMining_Stanton_M_Solar_Desc_001=POSTING: Purchase Order\nLOCATION: <EM4>~mission(System) </EM4>\n\nTERMS*: \nShubin Interstellar is currently looking to fulfil another purchase order for a variety of refined materials. We appreciate your help in this matter.\n\n~mission(Hint_Location) For a comprehensive list of where to find these minerals, consult <EM4>Mining Fundamentals #2: Where to Mine</EM4> in your mobiGlas Journal.\n\nSince this is a purchase order and not a mining contract, you are expected to provide your own equipment, such as a <EM4>~mission(Hint_Tool)</EM4>.\n\nPlease note that in an effort to expedite future use of these materials, <EM4>they must be refined before delivery</EM4>. This can be done at any refinery, the locations of which can be found in your Starmap.\n\nOnce you’re ready to sell us the required refined materials, deposit them in the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\n*By accepting this contract you are assuming any and all risks associated with the work outlined herein and in no way can Shubin Interstellar be held accountable for any damages accrued during the duration of the contract.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Stanton]</EM4>\n- Arclight "Nightstalker" Pistol\n- Arclight "Warhawk" Pistol\n- [S1-A] Arclight Pistol Battery (30 cap)\n- [S1-A] Aril Arms\n- [S1-A] Aril Core\n- [S1-A] Aril Helmet\n- [S1-A] Aril Legs\n\n<EM4>[Stanton, Rank 2–3]</EM4>\n- [IND-S0-B] BroadSpec-Go\n- [IND-S2-B] BroadSpec\n- [IND-S4-B] BroadSpec-Max\n- [MIN-S1-A] Arbor MH1 Mining Laser\n- [MIN-S1-A] Helix I Mining Laser\n- [MIN-S1-A] Hofstede-S1 Mining Laser\n- [MIN-S1-A] Impact I Mining Laser\n- [MIN-S1-A] Klein-S1 Mining Laser\n- [MIN-S1-A] Lancet MH1 Mining Laser\n- [MIN-S1-A] Pitman Mining Laser\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Bluepr