Intersec_TSG_Assist_Solo_Desc_001=MISSION SPECS\n\nArea of Operation: Nyx System \nHostile Forces: Vanduul\nEquipment Specs: Combat Ready\nBriefing: \nAn Idris-class People's Alliance security vessel named Tranquility is currently engaged with a <EM>Vanduul capital ship</EM4> near an old <EM4>QV Extraction station</EM4> and Intersec is looking for combat pilots to lend some support.\n\nScramble to the AO and <EM4>engage Vanduul fighters so the Tranquility can focus on the capital ship</EM4>. \n\nGood luck,   \n\nDeacon Tobin \nOperations Manager \nInterSec Defense Solutions  \n\nThis communication consists of confidential information solely intended for the recipient. Please disregard if received in error and notify the sender. All operations are conducted at the contractor’s own personal risk and must adhere to UEE and system law where applicable.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [B-S1-A] Deadbolt I Cannon\n- [B-S2-A] Deadbolt II Cannon\n- [B-S3-A] Deadbolt III Cannon\n- [MIL-S1-B] ForceWall\n- [MIL-S2-B] CoverAll\n- [MIL-S3-B] FullBlock\n- [S1-A] Tailwind Flight Helmet Blackbolt\n- [S1-A] Tailwind Flight Helmet Green Streak\n- [S1-A] Tailwind Flight Suit\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x5, Hostiles x1\n<EM4>Friendlies:</EM4> Friendlies x1\n<EM4>Rep:</EM4> +200\n<EM4>Blueprint Reward:</EM4> Guaranteed
Intersec_TSG_Assist_Solo_Title_001=Assist People's Alliance Vessel Tranquility <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
Intersec_TSG_BombRun_Solo_Desc_001=MISSION SPECS\n\nArea of Operation: Nyx System \nHostile Forces: Shattered Blade\nEquipment Specs: Combat Ships w/Ordnance\nBriefing: \nLocal assets have indicated that Shattered Blade elements are attempting to rebuild one of their stations and Intersec is looking for a pilot to make sure that doesn't happen.\n\nThey've managed to get basic turret defenses back online but currently only have <EM4>two power relays activated</EM4>. These will be your targets as they <EM4>cannot be destroyed by energy weapons, you will need to bring ballistic or ordnance to be effective</EM4>. \n\nReactivation of this station will allow the Shattered Blade to try and reclaim a foothold in this system and we can't let that happen.\n\nGood luck,   \n\nDeacon Tobin \nOperations Manager \nInterSec Defense Solutions  \n\nThis communication consists of confidential information solely intended for the recipient. Please disregard if received in error and notify the sender. All operations are conducted at the contractor’s own personal risk and must adhere to UEE and system law where applicable.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [B-S4-A] Deadbolt IV Cannon\n- [B-S5-A] Deadbolt V Cannon\n- [B-S6-A] Deadbolt VI Cannon\n- [MIL-S1-B] Polar\n- [MIL-S2-B] Permafrost\n- [MIL-S3-B] Tempest\n- [S1-A] Tailwind Flight Helmet Adrenaline\n- [S1-A] Tailwind Flight Helmet Big Bite\n- [S1-A] Tailwind Flight Suit\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Rep:</EM4> +200\n<EM4>Blueprint Reward:</EM4> Guaranteed
Intersec_TSG_BombRun_Solo_Title_001=Strategic Bombing <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
Intersec_TSG_Group_Desc_001=MISSION SPECS\n\nArea of Operation: Nyx System \nHostile Forces: Shattered Blade\nEquipment Specs: Strike Group\nBriefing: \nWe've received word that a People's Alliance security ship called Tranquility stumbled across  Shattered Blade hiding out in an old QV Extraction station. Details are sketchy but will connect you with local assets once on site. \n\nIntersec is looking for a team to intervene and protect the Tranquility and their personnel. Based on discussions with the Tranquility's captain, you will <EM4>need  ballistic and ordnance to break down the defenses of the station</EM4> and ultimately <EM4>get boots on the ground to save their pilot</EM4>.\n\n<EM4>Recruiting additional ships</EM4> to support you in this mission is absolutely critical. You will <EM4>need a variety of ship types</EM4> to balance multiple combat zones in space and on the ground.\n\nRespectfully,   \n\nDeacon Tobin \nOperations Manager \nInterSec Defense Solutions  \n\nThis communication consists of confidential information solely intended for the recipient. Please disregard if received in error and notify the sender. All operations are conducted at the contractor’s own personal risk and must adhere to UEE and system law where applicable.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Novian "Ghostmaker" Crossbow\n- Novian "Nighthunter" Crossbow\n- Novian "Wildshot" Crossbow\n- Novian Crossbow\n- [S1-A] BlackFire Racing Flight Suit\n- [S1-A] BlackFire Racing Helmet\n- [S1-A] BlueFlame Racing Flight Suit\n- [S1-A] BlueFlame Racing Helmet\n- [S1-A] Tailwind Flight Helmet Airwolf\n- [S1-A] Tailwind Flight Helmet Blue Skies\n- [S1-A] Tailwind Flight Helmet Frostshock\n- [S1-A] Tailwind Flight Helmet Thunderstruck\n- [S1-A] WhiteHot Racing Flight Suit\n- [S1-A] WhiteHot Racing Helmet\n- [E-S1-A] Omnisky III Cannon\n- [E-S2-A] Omnisky VI Cannon\n- [E-S3-A] Omnisky IX Cannon\n- [E-S4-A] Omnisky XII Cannon\n- [E-S5-A] Omnisky XV Cannon\n- [E-S6-A] Omnisky XVIII Cannon\n- [MIL-S1-A] JS-300\n- [MIL-S2-A] JS-400\n- [MIL-S3-A] QuadraCell MX\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 6/7 | Risk 7/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x53, Maulers x1, Reinforcements x2\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Unknown:</EM4> 20\n<EM4>Rep:</EM4> +300\n<EM4>Blueprint Reward:</EM4> Guaranteed
Intersec_TSG_Group_Title_001=Tactical Strike Group Needed <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
ItemGathering_ASD_Desc=Hockrow Agency \nCase File #JD10285\nLead Investigator: Arken Mallor\n\nCase Update: \nIn going through the files, I’ve seen a couple of allusions to a specific lab sample that would potentially be useful to have our people analyze. Not sure where it is exactly, but if you hunt around Onyx Facility you should be able to find the sample and bring it to me.\n\nContract Investigator Actions:\nExplore the <EM4>Onyx Facility Research Wing</EM4> and <EM4>track down the Lab Sample</EM4> and deliver it to <EM4>~mission(Destination|Address)</EM4>.\n\nAdditional Notes:\nBe wary of possible hostile forces on site. \n\nTravel to Onyx in a vehicle that can be stored in a large hangar.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7
ItemGathering_ASD_Title=Jorrit Dossier: Lab Sample
Jumptown2_Criminal_MBroker_desc=Got some good news for you. As we speak, there’s an automated facility that is churning out package after package of primo product that’s pretty much ripe for the taking.\n\nAll you have to do is swoop down there, deal with a thug or two, grab whatever you can, and sell it for a huge profit. Shouldn’t be a problem at all. And there are plenty of people around who would pay good creds to take product like that off your hands.\n\nSpeaking of credits, I’m not gonna just give out the coordinates of this facility out of the kindness of my heart. I think it’s only fair to ask a finder’s fee for info this good.\n\nI wouldn’t wait too long. Not sure how long the site will be left running.\n\n-Ruto\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Jumptown2_Lawful_MBroker_desc_BlacJac=ATTN: Verified Mercenary Operators\n\nWe’ve been able to trace a recent surge of contraband to an automated production facility at ~mission(Location|Address). We can’t be sure how much longer the site will be up and running, so BlacJac needs someone on site to sweep through, secure the contraband, and transport it to us at ~mission(Destination|Address). Once there, you can use the administrative commodity terminal to transfer the contraband to us and collect your reward.\n\nWe haven’t been able to determine what kind of hostile force will be present, but whatever you encounter, you’re authorized to use lethal force as necessary. \n\nThe more contraband you manage to bring to us, the more credits you’ll earn.\n\nThanks,\nLt. Aaron Riegert\n\nPrivate Contract Supervisor\nBlacJac Security, "Protection Provided"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Jumptown2_Lawful_MBroker_desc_CruSec=Crusader Security has learned that an illegal production facility at ~mission(Location|Address) is currently being used to manufacture contraband. \n\nWe are seeking a contractor to secure the site, confiscate any contraband, and deliver it to us at ~mission(Destination|Address). The administrative commodity terminal will allow you to submit the contraband into our evidence hold and collect your payment.\n\nNow, this is an automated facility so it’s not clear how long they’ll be manufacturing for, or even how many people may be on site. To be safe, I would go in expecting to meet heavy resistance.\n\nYour total compensation will be based on how packages are safely delivered into evidence.\n\nCONTRACT AUTHORIZED BY:\nLiaison Officer Vanzant\nID# 712L921P\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Jumptown2_Lawful_MBroker_desc_Hurston=HURSTON DYNAMICS\nOUTSOURCING DEPARTMENT\n\nCONTRACT: Confiscate Contraband\nCONTRACTOR AFFILIATION: Independent\nOUTSOURCE MANAGER: T. Odington\nRISK ASSESSMENT: High\nRUSH CONTRACT: No\n\nHurston Security has learned of an active, illegal automated production facility at ~mission(Location|Address) and is seeking a contractor to secure the site and confiscate as many packages of contraband as possible for delivery to a Hurston Security facility ~mission(Destination|Address) for immediate disposal. Transfer of the contraband and attribution of your reward payment should be done through the administrative commodity terminal there.\n\nYou are authorized to use any force necessary to complete your objective. Payment will be based on the amount of contraband secured. \n\n\n\n\n** The information transmitted may contain confidential and/or privileged material. Any review, retransmission, dissemination, or other use of or taking action in reliance upon this information by persons or entities other than the intended recipient is prohibited. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Jumptown2_Lawful_MBroker_desc_MicroTech=ABOUT THE JOB\nmicroTech Protection Services is looking for a detail-oriented security professional who can assist us in securing contraband from an illegal automated production site at ~mission(Location|Address). The packages will then need to be taken to ~mission(Destination|Address) and transferred into our possession for destruction via the administrative commodity terminal. \n\nRESPONSIBILITIES\n• Provide own transportation to ~mission(Location|Address).\n• Manage any hostiles found within the site; using force as necessary.\n• Secure contraband and deliver it the commodity terminals at ~mission(Destination|Address)\n\nMINIMUM QUALIFICATIONS\n• 2 years of combined mercenary and/or security experience.\n• Access to combat equipment and mode of transport.\n• Available for immediate deployment.\n\nPREFERRED QUALIFICATIONS\n• Experience with rapid hostility de-escalation techniques.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Kaboos_Intro_Description=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Unknown\nEquipment Specs: Combat-rated Ship, Personal Arms\nBriefing: InterSec has been enlisted by the UEE to gather intel on a group of <EM4>black marketeers dealing in Vanduul parts</EM4>, that have been linked to the illegal Vanduul experiments happening at ASD’s Onyx Facility. The UEE is eager to understand and put an end to their operations.\n\nBased on evidence extracted from the ASD facilities, we’ve potentially managed to track down the location of one of their storage sites.\n\nOnce accepted, head over to the old <EM4>QV Planet Services Logistics station</EM4> and we’ll be in touch.\n\n\nRespectfully, \n\nDeacon Tobin\nOperations Manager\nInterSec Defense Solutions\n\nThis communication consists of confidential information solely intended for the recipient. Please disregard if received in error and notify sender. All operations are conducted at the contractor’s own personal risk and must adhere to UEE and system law where applicable.\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Boss x2, CQC x30, Juggernauts x2, Snipers x4, Soldiers x19, Technicians x5\n<EM4>Unknown:</EM4> 57\n<EM4>Jr. Contractor:</EM4> +100 Rep
Kaboos_Intro_Title=Vanduul-Tech Smugglers <EM4>[100 Rep]</EM4>
Kaboos_Mission_Description=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Outlaws present and armed\nEquipment Specs: Combat-rated Ship, Personal Arms\nBriefing: InterSec needs your services once again.\n\nThe intel you previously gathered has been invaluable in identifying several prominent buyers of the illegally-obtained Vanduul parts. However, since then the Shattered Blade have continued their operations and the UEE is requesting that we <EM4>update our intel.</EM4>\n\nWe believe more information can be retrieved from the storage facilities located at the old <EM4>QV Logistics station.</EM4>\n\nThe operation parameters haven’t changed since your last mission: find the <EM4>encrypted data</EM4> and use the <EM4>decryption key</EM4> to decipher and upload the list to us. The Shattered Blade will have reinforced the area since the last time, so expect resistance.\n\nGood luck. We’ll be in touch.\n\n\nRespectfully,\n\nDeacon Tobin\nOperations Manager\nInterSec Defense Solutions\n\nThis communication consists of confidential information solely intended for the recipient. Please disregard if received in error and notify sender. All operations are conducted at the contractor’s own personal risk and must adhere to UEE and system law where applicable.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Pulse "Blacklist" Pistol\n- Quartz "Black Op" Energy SMG\n- Quartz Energy SMG\n- [S1-A] Pulse Laser Pistol Battery (60 Cap)\n- [S1-A] Quartz Energy SMG Battery (45 cap)\n- [S1-A] Testudo Arms\n- [S1-A] Testudo Arms Clanguard\n- [S1-A] Testudo Core\n- [S1-A] Testudo Core Clanguard\n- [S1-A] Testudo Helmet\n- [S1-A] Testudo Helmet Clanguard\n- [S1-A] Testudo Legs\n- [S1-A] Testudo Legs Clanguard\n- [S2-A] Testudo Backpack\n- [E-S1-A] Attrition-1 Repeater\n- [E-S2-A] Attrition-2 Repeater\n- [E-S3-A] Attrition-3 Repeater\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Boss x1\n<EM4>Unknown:</EM4> 16\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Kaboos_Mission_Title=Retrieve Additional Smuggler Intel <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Kill_Civ_Desc_001=Kill the drug dealer who has been taking more than his cut on the profits\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostiles x1, Targets x1
LingFamily_HaulCargo_AToB_Intro_desc=Hi,  \n \nThis is Petra Ling, and I’m proud to offer you a new and exciting opportunity to partner with Ling Family Hauling. When my parents started this company, their goal was to provide fast and reliable courier deliveries around the greater Crusader area. It quickly became a success, and as our reputation grew, so did our operations.  \n \nNow, under my stewardship, Ling Family Hauling is taking the next big step – cargo hauling. Demand for this new service is growing faster than I expected, and that’s great news for both of us.   \n \nIf you’ve ever wanted to be a hauler, then I can make your dreams come true. Best way to learn something is by doing it, and I’ve got a haul of <EM4>~mission(Item)</EM4> that needs to go from <EM4>~mission(Location|Address)</EM4> to <EM4>~mission(Destination|Address)</EM4>.  \n\nNo prior experience is necessary, but here’s a few things to keep in mind. All pick-ups and deliveries must be done at a freight elevator or autoloaded. You will need a ship that can hold <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>, and a <EM4>handheld tractor beam</EM4> to move them around. \n \nUpon successful completion of this delivery, you will be promoted to a ‘trusted contractor’ status and more hauls will become available to you.     \n\n \nSincerely,  \nPetra Ling  \nManaging Director of Cargo Operations \nLing Family Hauling \n\n \n\n \n\n \n\nLing Family Hauling knows it’s a dangerous and unpredictable universe and has established several protocols to protect both you and our client’s cargo. To ensure you aren’t punished for circumstances outside of your control, total payment will be prorated to the percentage of cargo successfully delivered. A delivery timer will be set for each haul. Any cargo that remains undelivered upon its expiration will be flagged as stolen and treated as such. All pick-ups and deliveries must be autoloaded or done at a freight elevator.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-B] Guardian\n- [IND-S2-B] Citadel\n- [IND-S3-B] Barbican\n- [STH-S1-A] Spectre\n- [STH-S1-B] Zephyr\n- [STH-S2-A] Spicule\n- [STH-S2-B] Bolt\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Trainee:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
LingFamily_HaulCargo_AToB_Intro_title=Cargo Hauling Opportunity with Ling Hauling <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
LingFamily_HaulCargo_AToB_desc_Fruit_Timed=Hi, \n \nNormally Reyes schedules our hauls, but she’s gone for the day, and I just got a comm inquiring about a simple, direct run from <EM4>~mission(Location|Address)</EM4> to <EM4>~mission(Destination|Address)</EM4>. The cargo is a load of fruit that will lose its value if it spoils. We don't want to anger this client, so would appreciate it if you knocked this out in a timely manner.  \n\nHere’s some other details you should know. The largest container used is <EM4>~mission(MissionMaxSCUSize)</EM4>, so don’t forget your <EM4>handheld tractor beam</EM4>. \n\n \nSincerely,  \nPetra Ling  \nManaging Director of Cargo Operations \nLing Family Hauling\n\n\n\n\n\n\n\nLing Family Hauling knows it’s a dangerous and unpredictable universe and has established several protocols to protect both you and our client’s cargo. To ensure you aren’t punished for circumstances outside of your control, total payment will be prorated to the percentage of cargo successfully delivered. A delivery timer will be set for each haul. Any cargo that remains undelivered upon its expiration will be flagged as stolen and treated as such. All pick-ups and deliveries must be autoloaded or done at a freight elevator.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-B] Guardian\n- [IND-S2-B] Citadel\n- [IND-S3-B] Barbican\n- [STH-S1-A] Spectre\n- [STH-S1-B] Zephyr\n- [STH-S2-A] Spicule\n- [STH-S2-B] Bolt\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Rookie:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
LingFamily_HaulCargo_AToB_desc_Party_Timed=Hi, \n\nGuess the folks at <EM4>~mission(Destination|Address)</EM4> are planning a party and need help acquiring everything in a timely manner. You’ll need to make multiple pick-ups for this one, including one in Nyx to grab some Jynx gin. Not sure if you’ve ever had the stuff, but it’s a Nyx specialty. Some folks can’t get past that it glows pink, but I love it. Got a truly unique kick to it.\n\nHere are the pick ups:  \n\nPICK UP LOCATIONS (ANY ORDER) \n\n~mission(MultiToSingleToken)     \n\nPlease remember to bring a <EM4>handheld tractor beam</EM4>, as you’ll be handling cargo containers up to <EM4>~mission(MissionMaxSCUSize)</EM4>.  \n\n  \nHappy Hauling,  \nReyes Ling \nCargo Logistics Coordinator \nLing Family Hauling\n\n\n\n\n\n\n\nLing Family Hauling knows it’s a dangerous and unpredictable universe and has established several protocols to protect both you and our client’s cargo. To ensure you aren’t punished for circumstances outside of your control, total payment will be prorated to the percentage of cargo successfully delivered. A delivery timer will be set for each haul. Any cargo that remains undelivered upon its expiration will be flagged as stolen and treated as such. All pick-ups and deliveries must be autoloaded or done at a freight elevator.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-B] Guardian\n- [IND-S2-B] Citadel\n- [IND-S3-B] Barbican\n- [STH-S1-A] Spectre\n- [STH-S1-B] Zephyr\n- [STH-S2-A] Spicule\n- [STH-S2-B] Bolt\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rookie:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
LingFamily_HaulCargo_AToB_title=Ling Family ~mission(ReputationRank) Cargo Haul - ~mission(CargoGradeToken) Scale <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
LingFamily_HaulCargo_MultiToSingle_desc_CFPAmenities=Hey, \n \nAny chance you’d be willing to do a haul into Pyro? I know it can get dangerous there but this is for a good cause. A group of new CFP members have moved to <EM4>~mission(Destination|Address)</EM4> and had a tough time adjusting to life in the system. They all left stuff behind in Stanton, because their transporter didn’t have room, so we’ve been hired to pick it all up and bring it to them.      \n\nHere are the pick ups:   \n\nPICK UP LOCATIONS (ANY ORDER)   \n\n~mission(MultiToSingleToken) \n\nCFP leaders hope that bringing them this stuff will make the system feel more like home. Let’s make sure this one goes down smoothly. Remember to equip your <EM4>handheld tractor beam</EM4>, and a ship that can fit <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>. \n \n\nHappy Hauling,  \nReyes Ling \nCargo Logistics Coordinator \nLing Family Hauling\n\n\n\n\n\n\n\nLing Family Hauling knows it’s a dangerous and unpredictable universe and has established several protocols to protect both you and our client’s cargo. To ensure you aren’t punished for circumstances outside of your control, total payment will be prorated to the percentage of cargo successfully delivered. A delivery timer will be set for each haul. Any cargo that remains undelivered upon its expiration will be flagged as stolen and treated as such. All pick-ups and deliveries must be autoloaded or done at a freight elevator.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-B] Guardian\n- [IND-S2-B] Citadel\n- [IND-S3-B] Barbican\n- [STH-S1-A] Spectre\n- [STH-S1-B] Zephyr\n- [STH-S2-A] Spicule\n- [STH-S2-B] Bolt\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Rookie:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
LingFamily_HaulCargo_MultiToSingle_desc_Party=Hi, \n\nGuess the folks at <EM4>~mission(Destination|Address)</EM4> are planning a party and need help acquiring everything in a timely manner. You’ll need to make multiple pick-ups for this one, including one in Nyx to grab some Jynx gin. Not sure if you’ve ever had the stuff, but it’s a Nyx specialty. Some folks can’t get past that it glows pink, but I love it. Got a truly unique kick to it.\n\nHere are the pick ups:  \n\nPICK UP LOCATIONS (ANY ORDER) \n\n~mission(MultiToSingleToken)     \n\nPlease remember to bring a <EM4>handheld tractor beam</EM4>, as you’ll be handling cargo containers up to <EM4>~mission(MissionMaxSCUSize)</EM4>.  \n\n  \nHappy Hauling,  \nReyes Ling \nCargo Logistics Coordinator \nLing Family Hauling\n\n\n\n\n\n\n\nLing Family Hauling knows it’s a dangerous and unpredictable universe and has established several protocols to protect both you and our client’s cargo. To ensure you aren’t punished for circumstances outside of your control, total payment will be prorated to the percentage of cargo successfully delivered. A delivery timer will be set for each haul. Any cargo that remains undelivered upon its expiration will be flagged as stolen and treated as such. All pick-ups and deliveries must be autoloaded or done at a freight elevator.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-B] Guardian\n- [IND-S2-B] Citadel\n- [IND-S3-B] Barbican\n- [STH-S1-A] Spectre\n- [STH-S1-B] Zephyr\n- [STH-S2-A] Spicule\n- [STH-S2-B] Bolt\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Trainee:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
LingFamily_HaulCargo_MultiToSingle_title=Ling Family ~mission(ReputationRank) Cargo Haul - ~mission(CargoGradeToken) Scale <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
LingFamily_LocalDelivery_desc_01=Hi,\n\nI hope you're available to do a delivery. ~mission(Contractor|Family)\n\nPACKAGE FOR PICK UP\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from <EM4>~mission(Pickup1|Address)</EM4>\n\nDROP OFF LOCATION\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to <EM4>~mission(Dropoff1|Address)</EM4>\n\nLet me know if you can do it. \n\nLast thing, it'd probably be a good idea to bring a <EM4>handheld tractor beam</EM4> with. \n\nThanks, \nConni Ling\nShipment Coordinator\nLing Family Hauling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250
LingFamily_LocalDelivery_desc_02=Hi,\n\nWe need someone to do a delivery run. ~mission(Contractor|Family)\n\nPACKAGES FOR PICK UP (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2|Address)</EM4>\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2|Address)</EM4>\n\nHope you're available.\n\nLast thing, it'd probably be a good idea to bring a <EM4>handheld tractor beam</EM4> with. \n\nThanks, \nConni Ling\nShipment Coordinator\nLing Family Hauling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
LingFamily_LocalDelivery_desc_03=Hey,\n\nWe need you to run a shipment for us. ~mission(Contractor|Family). Here's a breakdown:\n\nPACKAGES FOR PICK UP (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> from the <EM4>~mission(Pickup3|Address)</EM4>\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> to the <EM4>~mission(Dropoff3|Address)</EM4>\n\nLast thing, it'd probably be a good idea to bring a <EM4>handheld tractor beam</EM4> with. \n\nThanks, \nConni Ling\nShipment Coordinator\nLing Family Hauling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
LingFamily_LocalDelivery_desc_04=Got a delivery request that could use you.\n~mission(Contractor|Family)\n\nPACKAGES FOR PICK UP (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> from the <EM4>~mission(Pickup3|Address)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> from the <EM4>~mission(Pickup4|Address)</EM4>\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> to the <EM4>~mission(Dropoff3|Address)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> to the <EM4>~mission(Dropoff4|Address)</EM4>\n\nLast thing, it'd probably be a good idea to bring a <EM4>handheld tractor beam</EM4> with. \n\nThanks,\nConni Ling\nShipment Coordinator\nLing Family Hauling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
LingFamily_LocalDelivery_desc_05=Hello,\n\nI know Conni usually handles this stuff, but she's away for the afternoon. Anyway, got a descent sized run for you.\n\nAnyway, if I'm reading the invoice correctly, the shipment is - \n\nPACKAGES FOR PICK UP (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> from the <EM4>~mission(Pickup3|Address)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> from the <EM4>~mission(Pickup4|Address)</EM4>\n     · Package <EM4>#~mission(Item5|SerialNumber)</EM4> from the <EM4>~mission(Pickup5|Address)</EM4>\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> to the <EM4>~mission(Dropoff3|Address)</EM4>\n     · Package <EM4>#~mission(Item4|SerialNumber)</EM4> to the <EM4>~mission(Dropoff4|Address)</EM4>\n     · Package <EM4>#~mission(Item5|SerialNumber)</EM4> to the <EM4>~mission(Dropoff5|Address)</EM4> \n\nGood luck out there.\n\n-Davi Ling\nProprietor \nLing Family Hauling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
LingFamily_LocalDelivery_desc_intro=Hi,\n\nWe're a small family owned and operated delivery company that's currently seeking new contractors in the Crusader area. \n\nIf you're interested in working with us, the following delivery would be a great trial to see if you're a good match for the company.\n\nPACKAGE FOR PICK UP\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from <EM4>~mission(Pickup1|Address)</EM4>\n\nDROP OFF LOCATION\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to <EM4>~mission(Dropoff1|Address)</EM4>\n\nIf all goes well, you'll become the newest member of Ling Family Hauling.\n\nLast thing, it'd probably be a good idea to bring a <EM4>handheld tractor beam</EM4> with. \n\nThanks, \nConni Ling\nShipment Coordinator\nLing Family Hauling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +100
LingFamily_LocalDelivery_desc_rehire=Hello,\n\nI'm not thrilled to have to do this, but we have a shortage of contractors and more deliveries than ever. I'm willing to give you another shot, but you need to complete the following delivery.  \n\nPACKAGES FOR PICK UP (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> from the <EM4>~mission(Pickup1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> from the <EM4>~mission(Pickup2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> from the <EM4>~mission(Pickup3|Address)</EM4>\n\nDROP OFF LOCATIONS (ANY ORDER)\n     · Package <EM4>#~mission(Item1|SerialNumber)</EM4> to the <EM4>~mission(Dropoff1|Address)</EM4>\n     · Package <EM4>#~mission(Item2|SerialNumber)</EM4> to the <EM4>~mission(Dropoff2|Address)</EM4>\n     · Package <EM4>#~mission(Item3|SerialNumber)</EM4> to the <EM4>~mission(Dropoff3|Address)</EM4>\n\nLast thing, it'd probably be a good idea to bring a <EM4>handheld tractor beam</EM4> with. \n\nThanks, \nConni Ling\nShipment Coordinator\nLing Family Hauling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
