p_protectandresupply_PreXeno_desc=Attention CDF volunteers, XenoThreat finally launched their attack against Jericho Station at the Pyro Gateway in Stanton.\n\nThe Navy has requested CDF forces to help combat XenoThreat forces in the area and/or recover supplies from the wreckage and safely deliver them to Jericho station. \n\nThe Navy has organized a community stipend to handle the distribution of payment. This will be distributed among all CDF volunteers at assigned intervals. An indicator will appear on your HUD to measure these payouts.\n\nPlease note that the supplies are highly volatile if not handled correctly. Use caution while transporting these materials:\n* Zeta-Prolanide degrades over time until breaking down completely.\n* AcryliPlex Composite becomes explosively unstable if damaged.\n* Diluthermex releases a destructive energy pulse if exposed to quantum travel.\n\nSAIC Rowena Dulli from the Advocacy is the official attaché to the CDF and will be running the operation.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Difficulty (1-7):</EM4> 5/7\n<EM4>Rep:</EM4> +4,000
p_protectandresupply_PreXeno_title=Overdrive Initative: Xenothreat Ambush - Support Needed <EM4>[4,000 Rep]</EM4>
p_protectandresupply_desc_v2=*FOR IMMEDIATE SYSTEM-WIDE RELEASE*\n\nAttention, XenoThreat forces started to ambush Naval convoy ships transporting vital supplies while en route to Jericho station at the Pyro Gateway in the Stanton System. The Navy has requested CDF forces to help recover these supplies from the wreckage and safely deliver them to Jericho. \n\nThe Navy has organized a community stipend to handle the distribution of payment. This will be distributed among all CDF volunteers at assigned intervals. An indicator will appear on your HUD to measure these payouts.\n\nPlease note that some of these supplies are highly volatile if not handled correctly. Use caution while transporting these materials:\n* Zeta-Prolanide degrades over time until breaking down completely.\n* AcryliPlex Composite becomes explosively unstable if damaged.\n* Diluthermex releases a destructive energy pulse if exposed to quantum travel.\n \nAdditionally, while not as volatile, the supplies of DynaFlex lost during the attack are still urgently needed by the Navy to complete their repairs of the Javelin and should be a priority for recovery.    \n\nAlso, XenoThreat hostiles might still be in the area so be careful. CDF volunteers with combat experience are also urged to contribute by securing these areas from lingering XenoThreat forces.\n\nSAIC Rowena Dulli from the Advocacy is the official attaché to the CDF and will be running the operation.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 5/7\n<EM4>Rep:</EM4> +4,000
p_protectandresupply_title=CDF ALERT: Xenothreat Ambush - Support Needed <EM4>[4,000 Rep]</EM4>
p_showdown_PreXeno_desc=Attention, Naval forces have regrouped for the final assault that XenoThreat have been planning. The Navy has officially requested any CDF volunteers to help provide combat support in this final push to secure our system. This will include volunteers outside of those who have participated in the Overdrive Initiative.\n\nSAIC Rowena Dulli from the Advocacy is the official attaché to the CDF and will be running the operation.\n\nIf successful, this will complete this Overdrive Initiative series and you will receive temporary access to the F7A Hornets or a free upgrade if you currently own an F7C.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Difficulty (1-7):</EM4> 5/7\n<EM4>Rep:</EM4> +4,000
p_showdown_PreXeno_title=Overdrive Initative: Attack on XenoThreat <EM4>[4,000 Rep]</EM4>
p_showdown_desc=*FOR IMMEDIATE SYSTEM-WIDE RELEASE*\n\nAttention, Naval forces have regrouped for a final assault on the XenoThreat outlaw pack that have been plaguing Stanton System. The Navy has officially requested for any CDF volunteers to help provide combat support in this final push to secure our system.\n\nSAIC Rowena Dulli from the Advocacy is the official attaché to the CDF and will be running the operation.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 5/7\n<EM4>Rep:</EM4> +4,000
p_showdown_title=CDF ALERT: Attack on XenoThreat <EM4>[4,000 Rep]</EM4>
