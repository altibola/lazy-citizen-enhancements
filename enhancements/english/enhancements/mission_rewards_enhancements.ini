PU_GhostHollow_Information_Desc=Ever want to make creds just magically appear? A bunch of old CCB credit terminals are currently active and faking bank transactions to siphon off funds to whoever controls the terminals. If you want in on the action, I'll sell you the coordinates for a small fee. Better hurry if you want to make a play for it. Don’t know how long it'll stay up and running.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
PirateRaids_Desc=pu pirateraids hurston\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
