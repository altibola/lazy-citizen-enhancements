headhunters_maintenance_H_desc_001=The storms over at <EM4>~mission(Location|Address)</EM4> are getting to be a real pain in the ass. One of our outposts got absolutely reamed yesterday and needs some serious repairs so we're looking for help.\n\nFigure you'd need to bring <EM4>about six fuses</EM4>, a <EM4>salvaging tool</EM4>, and <EM4>enough RMC canisters to deal with at most eight busted pipes</EM4>. We think that’ll cover, but you'll get exact numbers on site.\n\nHell with this place.\n\nHopefully you know what you're doing, but just in case, that <EM4>“Guide to Maintenance”</EM4> in your mobiGlas Journal might be worth a look.\n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Head Contractor:</EM4> +400 Rep
headhunters_maintenance_H_title_001=~mission(Location) needs massive repairs <EM4>[400 Rep]</EM4>
headhunters_maintenance_M_desc_001=Need somebody handy with tools to pop over to <EM4>~mission(Location|Address)</EM4> and help out with some repairs. Our last repair guy knocked out most of the fixes but there's still some stuff that could use looking at.\n\nI think if you've got <EM4>six fuses</EM4>, a <EM4>salvaging tool</EM4>, and <EM4>enough RMC canisters to patch up around five pipes</EM4>, you should be covered.\n\nHopefully you know what you're doing, but just in case, the <EM4>“Guide to Maintenance”</EM4> in your mobiGlas Journal might be worth a look.\n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Sr. Contractor:</EM4> +100 Rep
headhunters_maintenance_M_title_001=~mission(Location) needs a bunch of repairs <EM4>[100 Rep]</EM4>
headhunters_maintenance_local_E_desc_001=Hey if you’re reading this, we need a hand. An outpost of ours down at <EM4>~mission(Location|Address)</EM4> got hit by a nasty storm and suffered some damage. None of our usual techs are available (or alive) to swing by so we wanna hire someone to go fix some fuses (no idea how many but <EM4>no more than three</EM4> I think). If you can bring a <EM4>salvaging tool</EM4> with <EM4>enough RMC canisters to sort out around three pipes</EM4>, we should be good.\n\nHopefully you know what you're doing, but just in case, the <EM4>“Guide to Maintenance”</EM4> in your mobiGlas Journal might be worth a look.\n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 4/7\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Jr. Contractor:</EM4> +50 Rep
headhunters_maintenance_local_E_title_001=~mission(Location) needs some repairs <EM4>[25–50 Rep]</EM4>
headhunters_maintenance_local_H_desc_001=Down at <EM4>~mission(Location|Address)</EM4>, the place got utterly smashed in a storm and needs some serious patchwork.\n\nIf anyone out there has a <EM4>bunch of fuses</EM4> (I hear <EM4>six</EM4> should be plenty), a <EM4>salvaging tool</EM4>, and <EM4>enough RMC cans to deal with eight or so messed up pipes</EM4>, we'll hook you up with some creds to do the fix.\n\nHopefully you know what you're doing, but just in case, the <EM4>“Guide to Maintenance”</EM4> in your mobiGlas Journal might be worth a look.\n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 1/7 | Complexity 1/7 | Risk 1/7 | Knowledge 2/7
headhunters_maintenance_local_H_title_001=~mission(Location) needs massive repairs
headhunters_maintenance_local_M_desc_001=Sending a call out to anyone nearby. Got a pretty heavy work order for one of our outposts at <EM4>~mission(Location|Address)</EM4>. Sounds like we need <EM4>six fuses</EM4> fixed. You'll also need a <EM4>salvaging tool</EM4> with <EM4>enough RMC to patch up about five pipes</EM4> to stop the place from falling apart.\n\nIf you bring all the shit needed to patch them up, we'll pay you out.\n\nHopefully you know what you're doing, but just in case, the <EM4>“Guide to Maintenance”</EM4> in your mobiGlas Journal might be worth a look.\n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 1/7 | Complexity 1/7 | Risk 1/7 | Knowledge 2/7
headhunters_maintenance_local_M_title_001=~mission(Location) needs a bunch of repairs
headhunters_multikillship_base_Generic_M_desc_001=A lotta wannabe gangs have stepped to the Headhunters over the years thinking that they could force their way into the system. We're still here. They aren't. But it seems the survivors of these groups have decided to band together and try again. Guess some people never learn.\n\nLatest group hit a couple of our convoys while on supply runs. Shouldn't be a surprise that the Judge wants to stomp them out quick. We've learned they're out near ~mission(Location|Address) and likely rearming for another attack. \n\nWe want you to go there and make them wish they died with their old gang.\n\nStows out\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Defenders x6, Targets x2\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_multikillship_base_Generic_M_title_001=Crash some ships <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
headhunters_sabotage_generators_E_CFP_desc_001=We got big plans about to go down but unfortunately Citizens for Prosperity have people nearby at  ~mission(Location|Address).\n\nSince I can't afford to have those bastards cockin' things up for us, I want you to go there and take out their power generators.\n\nShould keep them sidelined until we're done with our business. \n\n-Stows out\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Jr. Contractor:</EM4> +75 Rep
headhunters_sabotage_generators_E_CFP_title_001=Cut Citizens For Prosperity Power <EM4>[75 Rep]</EM4>
headhunters_sabotage_generators_VE_desc_001=This is a fairly straightforward job. We got some assholes at ~mission(Location|Address) who have been thinking they're better than they are. Go and shut off their power to remind them that Headhunters are in charge.\n\n-Stows out\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Jr. Contractor:</EM4> +25 Rep
headhunters_sabotage_generators_VE_title_001=Shut Off Power at ~mission(Location) <EM4>[25 Rep]</EM4>
headhunters_sabotage_generators_multi_M_desc_001=Got a few scavs that have rooted themselves into ~mission(Location|Address). We have our own plans there and need the place cleared out. \n\nThat's why I want you to ho and turn off their power. Let's see if that doesn't cause these rats to abandon the place for good.\n\n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Sr. Contractor:</EM4> +200 Rep
headhunters_sabotage_generators_multi_M_title_001=Knock Power Out <EM4>[200 Rep]</EM4>
headhunters_sabotage_servers_E_CFP_desc_001=Long story, short - a Headhunter messed up real bad and now Citizens for Prosperity has gotten their hands on some data that could really do some damage to us. \n\nThe bastard is going to need some time to heal so that leaves it to you to clean up the mess. Can you go to ~mission(Location|Address) and destroy the servers they got stored there? I wanna make sure there's no chance of this info getting out there.\n\n-Stows out\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Jr. Contractor:</EM4> +75 Rep
headhunters_sabotage_servers_E_CFP_title_001=Clear Citizens for Prosperity Servers <EM4>[75 Rep]</EM4>
headhunters_sabotage_servers_H_XT_Title_001=Wipe Out XenoThreat Servers <EM4>[75–1,500 Rep]</EM4>
headhunters_sabotage_servers_H_XT_desc_001=Something just fell into my lap that is way too good to pass up. XenoThreat's intelligence gathering is a bit of legend in the circles I run in and it turns out that they're storing a whole heap of their best intel at ~mission(Location|Address).\n\nWould be a shame if someone, say like you, were to go there and blow it all up, huh? \n\n-Stows out\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Contractor:</EM4> +75 Rep\n<EM4>Veteran Contractor:</EM4> +1,500 Rep
headhunters_sabotage_servers_M_CFP_desc_001=Turns out those Citizens for Prosperity bastards have been gathering intel on us. They're going to try to cut us off from several revenue streams and bleed us dry. Can't let that happen. \n\nHead to ~mission(Location|Address) and destroy their data storage. \n\nThat should teach them not to stick their noses where they don't belong.\n\n-Stows out\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Jr. Contractor:</EM4> +75 Rep\n<EM4>Jr. Contractor:</EM4> +200 Rep
headhunters_sabotage_servers_M_CFP_title_001=Wipe Citizens for Prosperity Data Farm <EM4>[75–200 Rep]</EM4>
headhunters_sabotage_servers_VH_XT_desc_001=I'm so mad right now I can barely see straight. A Headhunter who I thought I could trust just went over to the XenoThreat. Yeah, aliens killed your family. Shit sucks, but you don't turn your back on your people. \n\nTo add insult to injury, the bastard gave XenoThreat a bunch of our intel. I have some other folks tracking the traitor down, but I need you to take care of wiping out the stolen data for me. It's being kept on servers at ~mission(Location|Address).\n\n-Stows out\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Elite Contractor:</EM4> +3,200 Rep
headhunters_sabotage_servers_VH_XT_title_001=Purge XenoThreat Servers <EM4>[3,200 Rep]</EM4>
hurston_RetrieveConsignment_desc_001=HURSTON DYNAMICS\nOUTSOURCING DEPARTMENT\n\nCONTRACT: Facility Sweep & Package Retrieval\nCONTRACTOR AFFILIATION: Independent\nOUTSOURCE MANAGER: G. Livingston\nRISK ASSESSMENT: High\nRUSH CONTRACT: Yes\n\nHurston has learned that the Nine Tails are attacking ~mission(Location|address). Our on-site forces have suffered heavy casualties and stopped responding to comms. Initial reports indicated that the gang was attempting to obtain confidential material recently delivered to the facility. Thankfully, we have security measures in place that should give us time to respond. We need an operative to head to the facility immediately, retrieve those boxes, and deliver them to a secure location.\n\nYou and whatever backup you choose to bring are authorized to take any actions necessary when confronting the trespassers. Suspects are considered armed and dangerous. Hurston will not provide material support and/or updates regarding the status of the facility's security forces. \n\nThe confidential materials were discreetly delivered alongside other boxes in a consignment and locked in our automated vault with access codes kept on datapads held by senior security staff. However, there’s a strong chance Nine Tails may already have gotten their hands on them. You’ll need to find those datapads and then enter the codes at the package conveyor to retrieve the confidential materials. Payment will be sent once they have been delivered to ~mission(dropoff1|address). \n\n\n** The information transmitted may contain confidential and/or privileged material. Any review, retransmission, dissemination, or other use of or taking action in reliance upon this information by persons or entities other than the intended recipient is prohibited. **\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Guards x4, Hostiles x22
hurston_RetrieveConsignment_title_001=Defend Site and Retrieve Confidential Materials <EM4>[500–4,000 Rep]</EM4>
hurston_UGF_defend_E_desc_001=HURSTON DYNAMICS\nOUTSOURCING DEPARTMENT\n\nCONTRACT: Facility Protection\nCONTRACTOR AFFILIATION: Independent\nOUTSOURCE MANAGER: T. Spooner\nRISK ASSESSMENT: High\nRUSH CONTRACT: No\n\nA small local gang has been making threats against ~mission(Location|Address) and Hurston Security is seeking a contractor to put together a security team to protect the facility against any incursions.\n\nPayment will be sent once the facility is confirmed to be safe. \n\n\n\n** The information transmitted may contain confidential and/or privileged material. Any review, retransmission, dissemination, or other use of or taking action in reliance upon this information by persons or entities other than the intended recipient is prohibited. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x1, Hostiles x10, Private Security x4, Sentries x6\n<EM4>Unknown:</EM4> 11
hurston_UGF_defend_E_title_001=Guard Facility Against Threat <EM4>[500 Rep]</EM4>
hurston_UGF_defend_VH_desc_001=HURSTON DYNAMICS\nOUTSOURCING DEPARTMENT\n\nCONTRACT: Facility Protection\nCONTRACTOR AFFILIATION: Independent\nOUTSOURCE MANAGER: T. Spooner\nRISK ASSESSMENT: Very High\nRUSH CONTRACT: No\n\nA growing outlaw faction have been making threats against ~mission(Location|Address) and Hurston Security requires a contractor to put together a security team and guard the facility against any incursions.\n\nPayment will be sent once the facility is confirmed to be safe. \n\n\n\n** The information transmitted may contain confidential and/or privileged material. Any review, retransmission, dissemination, or other use of or taking action in reliance upon this information by persons or entities other than the intended recipient is prohibited. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x3, Hostiles x8, Private Security x4, Sentries x4\n<EM4>Unknown:</EM4> 21
hurston_UGF_defend_VH_title_001=Guard Facility Against Dangerous Hostiles <EM4>[500 Rep]</EM4>
hurston_UGF_defend_desc_001=HURSTON DYNAMICS\nOUTSOURCING DEPARTMENT\n\nCONTRACT: Facility Protection\nCONTRACTOR AFFILIATION: Independent\nOUTSOURCE MANAGER: T. Spooner\nRISK ASSESSMENT: High\nRUSH CONTRACT: No\n\nLocal criminals have been making threats against ~mission(Location|Address) and Hurston Security is seeking a contractor to put together a security team to guard the facility against any incursions.\n\nPayment will be sent once the facility is confirmed to be safe. \n\n\n\n** The information transmitted may contain confidential and/or privileged material. Any review, retransmission, dissemination, or other use of or taking action in reliance upon this information by persons or entities other than the intended recipient is prohibited. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x8, Private Security x4, Sentries x8\n<EM4>Unknown:</EM4> 10
