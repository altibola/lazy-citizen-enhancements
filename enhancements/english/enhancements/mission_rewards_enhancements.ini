TarPits_ShipStrip_desc_001=Got a particular salvage job that we could use some extra hands on. \n\nWe need you to find a ~mission(ship) that got punched out around ~mission(location). Security’s already searching for it and if they find it, they’ll ID it for sure and we’ll be in loads of trouble.\n\nSo, we want you to make sure that can’t happen. Either tow the ship out of the search area or rip the entire hull off so nobody can tell who it belonged to. Whatever you decide, keep your mouth shut about this. \n\nWe’ll cred you up and anything you scrap is yours to keep. But if security finds the ship before you’re done, we’ll all be screwed and you won’t get paid so don’t disappoint.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Friendlies:</EM4> Salvageable Ships x1
Tarpits_assassinate_dc_desc_001=I ain’t got time to waste so I’ll get straight to the point - ~mission(TargetName) needs to be dead and I want you to do it. You can find them over near the ~mission(Location) at ~mission(Location|address). They won’t be alone, but don’t get distracted by those other useless piles. You only get paid for taking out ~mission(TargetName|Last).\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x18, Juggernauts x1, Snipers x2, Soldiers x9, Technicians x3
Tarpits_destroyitem_dc_desc_001=I’m looking to send a strong message to the crew over at ~mission(Location|Address) and know the perfect way to do it - property damage.\n\nAll you need to do is head on over, destroy a few things here and there, and really drive home an important lesson about respecting your betters. \n\nDo that for me and I’ll be feeling very happy. And generous.\n\nInterested?\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Tarpits_eliminateboss_dc_desc_001=We’ve had our sights set on taking out ~mission(TargetName) for a while now, but we’ve never been able to find the right moment. Enough waiting. You’re going to create the right moment for us.\n\nHead to ~mission(Location|Address) and take out a bunch of lowlifes running around the ~mission(Location). Kill enough of those losers, and ~mission(TargetName|Last) will have no choice but to come face you themselves. That’s when you take ‘em out and earn yourself a nice fat payday. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x20, Juggernauts x1, Snipers x2, Soldiers x7
Tarpits_theft_mines_dc_desc_001=I was hopin’ you’d be interested in pulling a little job for us. Got some goods over at ~mission(Location|Address) that are just right for the taking. Only problem is – and it’s a big one – the bastards running the place have the whole area rigged with proximity mines. \n\nYou’ll need to find someway through, or if you can’t be bothered, someway to trigger the lot. Either way, just try not to blow yourself up. Then you just need to grab the stuff and take it over to ~mission(Destination|Address).\n\nIt won’t be easy to pull off, but if you do, I promise I’ll make it worth your while.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Test_Description=Mission description (WIP)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
Test_Title_Revenge_01=Revenge 01 (WIP) <EM4>[500 Rep]</EM4>
TheCollector_Conversion_Favors_Desc=Maybe Wikelo not have something you want made (that strange, but okay). Old souli would give out <EM4>favors</EM4>, very good way to prove that you do work for me. Collect enough and trade when I have something you want.\n\nBring things to <EM4>~mission(destination|ListAll)</EM4> and will trade for favor.\n\nBye.\n\n<EM3>ITEM REWARDS</EM3>\n- Wikelo Favor\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Conversion_Favors_Desc_1=Wikelo has another way to get <EM4>favors</EM4> if you interested. \n\nYour Mercenary souli has <EM4>scrip</EM4> metal, used like favors, but made of very interesting metal that Wikelo need for new project.\n\nIf you bring scrips to <EM4>~mission(destination|ListAll)</EM4>, will trade for favor.\n\nBye.\n\n<EM3>ITEM REWARDS</EM3>\n- Wikelo Favor\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Conversion_Favors_Desc_2=If you want other way to get <EM4>favors</EM4> from Wikelo, have thing for you. Wikelo have need for <EM4>scrip</EM4> given out by Council group. Wikelo not part of thief souli, but has business from time to time.\n\nIf you bring scrips to <EM4>~mission(destination|ListAll)</EM4>, will trade for favor.\n\nBye.\n\n<EM3>ITEM REWARDS</EM3>\n- Wikelo Favor\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Conversion_Favors_Desc_3=Have new way to get <EM4>favors</EM4> from Wikelo. Hear much about worm things in radiation storms. Made up of many interesting parts that Wikelo find use for. \n\nIf you bring parts to <EM4>~mission(destination|ListAll)</EM4>, will trade for favor.\n\nBye.\n\n<EM3>ITEM REWARDS</EM3>\n- Wikelo Favor\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Conversion_Favors_Title=Turn Things to Favor
TheCollector_Conversion_Favors_Title_1=Trade Merc Scrip for Favors?
TheCollector_Conversion_Favors_Title_2=Trade Council Scrip for Favors?
TheCollector_Conversion_Favors_Title_3=Trade Worm Parts for Favors?
TheCollector_Conversion_SpecialFavors_Desc=Wikelo need large amounts of <EM4>quantainium</EM4> and is willing to give you nice Polaris in exchange but also know many humans not have much space, so you trade as you go. Wikelo will you <EM4>Polaris bits</EM4> if you want trade quantainium. Work like favors. Help Wikelo remember how much you give. \n\nBring quantainium to <EM4>~mission(destination|ListAll)</EM4> and will trade for bits.\n\nBye.\n\n<EM3>ITEM REWARDS</EM3>\n- Polaris Bit\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Conversion_SpecialFavors_Title=Want Polaris? Need something special.
TheCollector_Intro_Desc=Hello, I am Wikelo. Recent addition to your system and very excited to be here. Spent many time here in UEE and happy to spent more.\n\nHave place where I make things from other things.\n\nNeed person to bring me useful things to finish project I work on. You have list. Get, please. I am at <EM4>~mission(destination|ListAll)</EM4>.\n\nWill give you item for your help.\n\nAlso, when done, if you want to do more. Have many things can make in my humble shop. Come, look at pretty poster and then decide what you want me to make.\n\nBye.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Rep:</EM4> +10
TheCollector_Intro_Title=Wikelo Arrive to System <EM4>[10 Rep]</EM4>
TheCollector_Lunch_Desc=You humans keep Wikelo very busy. Work more than when I at old souli. But Wikelo very hungry now and can't get food.\n\nPlease help. Bring food and drink to Wikelo Emporium at <EM4>~mission(destination|ListAll)</EM4>.\n\nVery appreciate your help. Will give thing in return.\n\nBye.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Lunch_Title=Very Hungry
TheCollector_Menu_Desc_PolarisShip=Wikelo recently get many blueprints in trade with human who not very smart. Now can make very big ship. \n\nNot cheap and need many pieces but will make. If you want, go quick, this cost much to Wikelo so won't be able to do for long but I like new Human system so I want to thank you all for welcome.\n\nBring to <EM4>~mission(destination|ListAll)</EM4> if want.\n\nBye.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +1,000
TheCollector_Menu_Title_PolarisShip=Now make Polaris. Short Time Deal. <EM4>[1,000 Rep]</EM4>
TheCollector_Mod_ATLS_Geo_Grad1_Desc=Wikelo travel to one Human planet and find very cold, but very pretty. This remind of that.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Mod_ATLS_Geo_Grad1_Name=ATLS Snowland Color <EM4>[20 Rep]</EM4>
TheCollector_Mod_ATLS_Geo_Grad2_Desc=Many Human work place have orange color there. Must mean work to you. This suit does work. Make sense.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Mod_ATLS_Geo_Grad2_Name=ATLS Orange Line <EM4>[20 Rep]</EM4>
TheCollector_Mod_ATLS_Geo_Grad3_Desc=Wikelo give deep red and green colors to make ATLS legs look like they cooling from heat. Very pretty.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Mod_ATLS_Geo_Grad3_Name=ATLS Cool Metal Color <EM4>[20 Rep]</EM4>
TheCollector_Recipes_Desc_ApolloSkin=Apollo very good ship. Would be much better if ship was red. Wikelo make all things possible. You trade for what I want and we have a deal.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Recipes_Desc_AtlsJump=Find very fun piece to add to big human suit that let you jump very high. Now you shoot and jump. Exciting.\n\nIf you want, bring me these to <EM4>~mission(destination|ListAll)</EM4>. Will make.\n\nWikelo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Recipes_Desc_AtlsPew=Hello. Know you human like strange metal suit. How about metal suit with ikti? Sorry, ikti is Banu word, you call it 'gun.' \n\nIf want, bring things I say and I will make for you. Gun will shoot. Cause many damage.\n\nBye.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Recipes_Desc_Battle=Bring me armor and other things and I give you special test armor. First version. Very special. Bring and I give. Bye.\n\n<EM3>ITEM REWARDS</EM3>\n- Palatino Helmet Mark I\n- Palatino Arms Mark I\n- Palatino Legs Mark I\n- Palatino Core Mark I\n- Palatino Backpack Mark I\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +25
TheCollector_Recipes_Desc_BigBooma=Wikelo find very strange but functional weapon while wandering through your systems. It very simple but very effective. If you bring me things, I show you what I do to it.\n\nVery fun.\n\n<EM3>ITEM REWARDS</EM3>\n- Boomtube "Clanguard" Rocket Launcher\n- Boomtube Rocket\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_GMNI_Shotgun=Shooting can be messy. Red Human Blood everywhere. Not a problem with this shotgun. Splashes blends right in! I give it to you if you give me everything I want on list. Good trade.\n\n<EM3>ITEM REWARDS</EM3>\n- R97 "Crimson Camo" Shotgun\n- R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_HeavyUtil=You need utility suit. Good for work. If you like, Wikelo can make shinier. Look real good. See what Wikelo need and bring.\n\n<EM3>ITEM REWARDS</EM3>\n- Corbel Helmet Crush\n- Corbel Core Crush\n- Corbel Arms Crush\n- Corbel Legs Crush\n- Novikov Backpack Crush\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Recipes_Desc_Hush=You want be hidden. Wikelo understand. Not ask questions why. But what do when you in snow? Wikelo have suit for that.\n\nWelcome.\n\n<EM3>ITEM REWARDS</EM3>\n- Geist Armor Arms Snow Camo\n- Geist Armor Core Snow Camo\n- Geist Armor Helmet Snow Camo\n- Geist Armor Legs Snow Camo\n- Geist Backpack Snow Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +25
TheCollector_Recipes_Desc_IrrArm=Wikelo had exciting idea during brief work rest. Was thinking about the little glow worms in Pyro and saw armor get changed to look like.\n\nIf you get me parts, bring to <EM4>~mission(destination|ListAll)</EM4> and will make for you then you can glow too.\n\nBye.\n\n<EM3>ITEM REWARDS</EM3>\n- Bokto Core\n- Bokto Arms\n- Bokto Legs\n- Bokto Helmet\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +25
TheCollector_Recipes_Desc_KopSkull=Hello. Can make fun change to gun if you want. Use kopion skin for pattern and little skull dangle. Very effective. Shoot much better.\n\nAll you need is bring me parts to <EM4>~mission(destination|ListAll)</EM4> and will make. \n\nBye.\n\n<EM3>ITEM REWARDS</EM3>\n- Parallax "Fun Kopion Skull" Energy Assault Rifle\n- Parallax Rifle Battery (80 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_L22Wolf=Wikelo very excited. Have idea for new material. But making it is most tricky. Very complicated. Need help fabricating a test sample. I give you blueprint, you make, bring to me, and I will trade. Give you extra special L-22 Wolf. Very powerful, very wolf.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Metamaterial Test #146\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Blueprint Reward:</EM4> Guaranteed
TheCollector_Recipes_Desc_MiltSkull=Hello. Can do version of gun if you kopion soldier. Make material like soldier camouflage but with dead skull on front. Gun shoot better too.\n\nIf want, bring part to <EM4>~mission(destination|ListAll)</EM4> and will make.\n\n<EM3>ITEM REWARDS</EM3>\n- Parallax "Fun Military Skull" Energy Assault Rifle\n- Parallax Rifle Battery (80 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_Molten=If you have armor, Wikelo can make it look warm. Good look for useful armor. Bring me things and will do.\n\n<EM3>ITEM REWARDS</EM3>\n- Strata Core Heatwave\n- Strata Arms Heatwave\n- Strata Legs Heatwave\n- Strata Helmet Heatwave\n- Strata Backpack Heatwave\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +25
TheCollector_Recipes_Desc_NoneAR=This rifle is very good at shooting, but could have nicer design. Wikelo fix. Looks very nice now. Give to you for trade. Bring me things, I give you rifle. Even give you blueprint if you need.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Killshot "Dominion Camo" Rifle\n\n<EM3>ITEM REWARDS</EM3>\n- Killshot "Dominion Camo" Rifle\n- Killshot Rifle Magazine (45 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10\n<EM4>Blueprint Reward:</EM4> Guaranteed
TheCollector_Recipes_Desc_NonePistol=You need a good weapon, yes? Have one for you. Small but powerful. Like an extra spicy balalu pepper. Wikelo make this pistol look extra spicy too. You bring things I need and I do a trade.\n\nBye.\n\n<EM3>ITEM REWARDS</EM3>\n- Tripledown "Heatwave" Pistol\n- Tripledown Pistol Magazine (12 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_RedHunterArmor=Wikelo hear that Humans think red is the color of passion and anger. This armor good for both. You give me items on list and this red armor is yours.\n\n<EM3>ITEM REWARDS</EM3>\n- Monde Helmet Crimson Camo\n- Monde Core Crimson Camo\n- Monde Arms Crimson Camo\n- Monde Legs Crimson Camo\n- Warden Backpack Crimson Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_SandArmour=Hello, know many humans want saldynium for regen problem. Credits good, yes, but Wikelo can use that, kopion horn, and other things to make special armor. \n\nOnce done, you be very tough. Very scary.\n\nYou see items needed. Bring to <EM4>~mission(destination|ListAll)</EM4> and I make for you.\n\nBye.\n\n<EM3>ITEM REWARDS</EM3>\n- Ana Arms Endro\n- Ana Legs Endro\n- Ana Core Endro\n- Ana Helmet Endro\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +25
TheCollector_Recipes_Desc_SlimyLMG=This gun has picture of amazing creature on side. Use it and it make you big and strong like Yormandi. Spit lightning. Bring my items and then you get it. Bye.\n\n<EM3>ITEM REWARDS</EM3>\n- Fresnel "Yormandi" Energy LMG\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_SpikeyArmor=Vanduul have strange ways. I never talk to them, old souli used to, but not Wikelo. Anyway, though not friendly, they make interesting thing. If you like, Wikelo can make you look more like.\n\nBring things. Will do.\n\nBye.\n\n<EM3>ITEM REWARDS</EM3>\n- Testudo Helmet Clanguard\n- Testudo Arms Clanguard\n- Testudo Core Clanguard\n- Testudo Legs Clanguard\n- Testudo Backpack Clanguard\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +25
TheCollector_Recipes_Desc_VGLflightsuit=Ships have big windows. Everyone can see you flying. You should look the best. Wikelo has very good flight suit for you. Do trade, bring me what I need and Wikelo give suit. Give blueprint as well if you do not have.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Tailwind Flight Helmet Dominion Camo\n- [S1-A] Tailwind Flight Suit Dominion Camo\n\n<EM3>ITEM REWARDS</EM3>\n- Tailwind Flight Suit Dominion Camo\n- Tailwind Flight Helmet Dominion Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10\n<EM4>Blueprint Reward:</EM4> Guaranteed
TheCollector_Recipes_Desc_VoltThwack=You feel like gun not angry enough? VOLT shotgun very powerful, very dangerous, but not scary? Bring to me. Can make very scary and angry.\n\nThey respect you then. Bring to <EM4>~mission(destination|ListAll)</EM4> and we make.\n\nBye.\n\n<EM3>ITEM REWARDS</EM3>\n- Prism "Irradiated" Laser Shotgun\n- Prism Laser Shotgun Battery (20 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_ZipZap=Want to shoot long away and stay hiding. But it snowing? Wikelo have gun for you.\n\nBring things. I give.\n\nBye.\n\n<EM3>ITEM REWARDS</EM3>\n- Zenith "Snow Camo" Laser Sniper Rifle\n- Zenith Laser Sniper Rifle Battery (22 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
