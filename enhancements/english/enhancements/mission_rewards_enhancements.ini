BHG_ShipWaveAttack_DrawOutBoss_H_Desc_001=--------------------------------------------------------\n-------------- BOUNTY CONTRACT ---------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nRISK ASSESSMENT: High\nLAST KNOWN LOCATION:  ~mission(Location|Address)\nKNOWN AFFILIATIONS: Unknown\nNOTES: This particular target has proven very difficult to capture. They tend to remain hidden unless there is a big enough threat to demand their attention. That's why you and your support crew will need to take out enough of their underlings to catch their ire. Just stay put, take out any hostiles that show up, and the target should eventually show themselves.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x24\n<EM4>Probationary Guild Member:</EM4> +200 Rep
BHG_ShipWaveAttack_DrawOutBoss_H_Title_001=Reclusive Bounty: ~mission(TargetName) | High Risk <EM4>[200 Rep]</EM4>
BHG_ShipWaveAttack_DrawOutBoss_S_Desc_001=--------------------------------------------------------\n-------------- BOUNTY CONTRACT ---------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nRISK ASSESSMENT: Extreme\nLAST KNOWN LOCATION:  ~mission(Location|Address)\nKNOWN AFFILIATIONS: Unknown\nNOTES: This particular target has proven very difficult to capture. They tend to remain hidden unless there is a big enough threat to demand their attention. That's why you and your most trusted support fleet will need to take out enough of their underlings to force them to confront you. Just stay put, take out any hostiles that show up, and the target will eventually arrive in their capital ship.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 7/7 | Risk 7/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x33\n<EM4>Probationary Guild Member:</EM4> +300 Rep
BHG_ShipWaveAttack_DrawOutBoss_S_Title_001=Reclusive Bounty: ~mission(TargetName) | Extreme Risk <EM4>[300 Rep]</EM4>
BHG_ShipWaveAttack_DrawOutBoss_VH_Desc_001=--------------------------------------------------------\n-------------- BOUNTY CONTRACT ---------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nRISK ASSESSMENT: Very High\nLAST KNOWN LOCATION:  ~mission(Location|Address)\nKNOWN AFFILIATIONS: Unknown\nNOTES: This particular target has proven very difficult to capture. They are seldom seen unless they are required to deal with a large enough threat personally. That's why you and your support crew will need to take out enough of their underlings to ensure they come to engage you. Just stay put, take out any hostiles that show up, and the target should eventually show themselves.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x27\n<EM4>Probationary Guild Member:</EM4> +250 Rep
BHG_ShipWaveAttack_DrawOutBoss_VH_Title_001=Reclusive Bounty: ~mission(TargetName) | Very-High Risk <EM4>[250 Rep]</EM4>
Bitzeroes_bombingrun_dc_desc_001=We’ve been trying to access some sensitive data over at ~mission(Location|Address) but there seems to only be one backdoor we can use. The issue is we need someone onsite to trigger it. And I really do mean trigger it.\n\nIf you can head over there and destroy part of their infrastructure, the emergency back up systems will kick online and we should be able to access everything we want. \n\nWish I could see the surprise look on the faces of the lowlifes running the place when it happens.\n\n-Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Turrets:</EM4> present (hostile)
Bitzeroes_bombingrun_dc_title_001=Up in Smoke <EM4>[500–2,000 Rep]</EM4>
Bitzeroes_destroygen_locked_dc_desc_001=I need your help on a job, but I can’t get too detailed about the specifics. If that doesn’t work for you, than don’t worry about it.\n\nYou’re going to head to ~mission(Location|Address) and blow up a power generator for us. Now, they keep the gen locked up, so you’ll have to hunt down the access codes first. Thankfully, they typically keep copies of the code on datapads. (Thinks it’ll keep ‘em safe from being hacked.)\n\nYou get that generator destroyed, and it’ll be your bank account blowin’ up next.\n\n- Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Bitzeroes_destroygen_locked_dc_title_001=Mandatory Black Out <EM4>[500 Rep]</EM4>
Bitzeroes_destroyitem_dc_desc_001=I won’t go into the whole long boring story of why, but there are a few bits of ~mission(Location|Address) that we need destroyed. The important part is that I want to pay you a hefty chunk of credits to do it. I almost feel like you should be paying us for this because of how fun it’s going to be.\n\nDon’t even care how you get it done. Grenades, rocket launcher, day old Torpedo Burrito, it’s all the same to us.\n\n-Bit Zeros \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Bitzeroes_destroyitem_dc_title_001=Major Malfunction <EM4>[500 Rep]</EM4>
Bitzeroes_destroyservers_locked_dc_desc_001=Hey,\n\nGot a problem we could use your help on. One of our former new-recruits did a complete crap job on a hack and wound up leaving a digital footprint so messy that it might as well be a full confession. \n\nA remote deletion’s not going to be good enough so I want you to go to ~mission(Location|Address) and make sure their data servers are wiped from existence.\n\nAs if this wasn’t a big enough of a mess already, the access codes to the locked server room door are only stored physically on site. That means you’re going to have to liberate a datapad with the code on it first before you can even get close to them.\n\nDon’t worry though. I’ll make sure the creds are worth all the hassle.  \n\n- Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
Bitzeroes_destroyservers_locked_dc_title_001=Server Not Found <EM4>[1,000 Rep]</EM4>
Bitzeroes_destroystash_dc_desc_001=The muckers over at ~mission(Location|Address) decided that it would be a good idea to interfere with our business, and now we need to let them know unequivocally that they were mistaken. \n\nA little bit of sniffin’ through their data and we were able to sus out where the idiots keep their stash. Now all we need you to do is head over there and destroy every last bit of it. \n\nFigure that should drive the point home.\n\n- Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Bitzeroes_destroystash_dc_title_001=Hit 'Em Where it Hurts <EM4>[500 Rep]</EM4>
Bitzeroes_eliminateall_dc_desc_001=The slimy little cretins over at ~mission(Location|Address) have been selling us trash data all while trying to double deal. Can’t let it stand.\n\nWe want you to go teach them one final lesson and wipe out all the cowards you can find. Last I heard is they were holed up over near the ~mission(Location). \n\nSpill their blood, and we’ll fill your wallet. \n\n-Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Juggernauts x2, Soldiers x12, Technicians x2
Bitzeroes_eliminateall_dc_title_001=Permanently Delete <EM4>[1,000 Rep]</EM4>
Bitzeroes_heist_buyin_dc_desc_001=I’m looking at an inventory transfer record right now that is bursting at the seams with a whole lot of very valuable cargo that is practically begging to be stolen. Sure there’s probably a few people there guarding the goods, but the harder the fight the sweeter the loot, right?\n\nNormally, we’d be all over a job like this, but we got another target in our sights right now and I’d hate for info this good to rot.  \n\nWhat do you say? You wanna crack at it? Send me a few creds and the location is all yours.\n\n-Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Unknown:</EM4> 10
Bitzeroes_theft_dc_desc_001=All right,\n\nOver at ~mission(Location|Address) there a few certain things they have in their possession that need to be liberated. Sure there may be a few guards or concerned individuals you’ll have to deal with, but for the most part it’s a relatively straight forward transaction – grab the stuff from the ~mission(Location) and take it to us at ~mission(Destination|Address). \n\nSometimes simple is best.\n\n-Bit Zeros \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
Bitzeroes_theft_dc_title_001=Ownership Reassignment <EM4>[500–1,000 Rep]</EM4>
Bitzeroes_theft_mines_dc_desc_001=I’m really hoping you’re going to agree to do this since there doesn’t seem to be too many folks eager to take on a whole bunch of proximity mines. See, there’s a score that we’ve sourced at ~mission(Location|Address) but the physical security is proving more difficult than expected. \n\nIf you can find a way to navigate through the mines or possibly a way to trigger them remotely, it should be relatively easy to grab the goods and make your way out of there. Drop them off at ~mission(Destination|Address) and you’ll get more than your fair cut of the credits for taking on the risk.\n\n-Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
BlockadeRunner_Counter_Desc=Word is that a lot of Zeta-Prolanide has been stolen from ~mission(Location|address).\n\nIf you happen to come across any, bring it over to ~mission(DropOffLocation|address) and we'll make sure you get a good price.\n\nAnd if not, you can abandon this offer, no hard feelings.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
BlockadeRunner_Desc=*FOR IMMEDIATE SYSTEM-WIDE RELEASE*\n\nA hostile fleet of ships equipped with quantum jammers have created a blockade around  ~mission(Location|address), disabled the station's defensive turrets, and stolen a large supply of Zeta-Prolanide. In response, the CDF has received authorization to activate its volunteer force. \n\nThough the overall situation is dire, the theft of the Zeta-Prolanide is our priority. Without direct action, the loss of the sector's Zeta-Prolanide stores could have a devastating effects to the wider economy of the whole system. \n\nWhile local security forces are investigating the incursion, they've tracked the stolen inventory to several locations. CDF volunteers are tasked with heading to these locations, recovering the stolen Zeta-Prolanide, and transferring it back to the station before the material completely degrades and is no longer viable. Just be careful, intel suggests that larger clusters of Zeta-Prolanide have a higher outlaw presence.\n\nSince time is of the essence, having a tractor beam to assist in moving the cargo is highly advised.\n\nAs an added incentive, volunteers will receive regular bonus payments for their combined efforts.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
BlockadeRunner_Title=CDF ALERT: ~mission(Location) Blockade Runners Needed <EM4>[1,000 Rep]</EM4>
BrightSky_Desc=The CDF has partnered with Anvil Aerospace to find the most capable operatives in the system. \n\nIf you find one of these Platinum certifications, you can redeem the ticket at a ship kiosk at New Deal, Astro Armada or Crusader Showroom for a free F8C. \n\nThe catch is that your identity and location has been shared with participants throughout the system. For everyone else, if you can stop the ticketholder before they get to the kiosk, you can claim the ticket for your own.\n\nWhoever makes it will not only receive this next generation superiority fighter, but also prove that they have what it takes for the toughest CDF assignments.\n\nGood luck.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
CFP_Delivery_Outpost_Multi_desc_001=Hi,\n\nCitizens for Prosperity needs help moving supplies around one of our outposts. The boxes need to be picked up from <EM4>~mission(Location|Address)</EM4> and taken to <EM4>~mission(Destination|Address)</EM4>. \n\nDoesn’t sound too difficult, does it? Just make sure you’re wearing a comfy pair of shoes. Also, to make your life easier, I'd bring a <EM4>handheld tractor beam</EM4> with you. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +200 Rep\n<EM4>Contractor:</EM4> +400 Rep\n<EM4>Sr. Contractor:</EM4> +800 Rep
CFP_Delivery_Outpost_Multi_title_001=Inter-Outpost Delivery at ~mission(Destination) - Multiple Boxes <EM4>[200–800 Rep]</EM4>
CFP_Delivery_Outpost_desc_001=Hey,\n\nWe’ve got an opportunity for any haulers interested in lending a hand or two to Citizens for Prosperity.\n\nThere’s a box that needs to be moved from <EM4>~mission(Location|Address)</EM4> to <EM4>~mission(Destination|Address)</EM4>. Shouldn’t take long, if you’re around the outpost and available. \n\nAlso, to make your life easier, I'd make sure you have a <EM4>handheld tractor beam</EM4> with you. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Neutral:</EM4> +50 Rep
CFP_Delivery_Outpost_title_001=Inter-Outpost Delivery at ~mission(Destination) <EM4>[50 Rep]</EM4>
CFP_RecoverCargo_Easy_Description=Life is tough on the frontier, and every delivery to our settlers is important. We really can't afford to lose any more this year.\n\nOne of our key suppliers has been hit by a group of outlaws over at <EM4>~mission(Location|Address)</EM4> and gone silent on us. I fear the worst, but if we can still recover the supplies they were transporting, it could make a huge difference.\n\nChances are the outlaws who attacked them are still lurking around there so be on your guard. Once you've dealt with them, grab the cargo and take it to the freight elevator at <EM4>~mission(Destination|Address)</EM4>. Make sure you're flying a ship that can carry <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and bring a <EM4>heavy-duty tractor beam</EM4> too.\n\nFly safe out there,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- C54 SMG\n- P8-SC SMG\n- S71 Rifle\n- [S1-A] C54 SMG Magazine (50 cap)\n- [S1-A] G-2 Helmet Woodland\n- [S1-A] ORC-mkV Arms\n- [S1-A] ORC-mkV Core\n- [S1-A] ORC-mkV Legs\n- [S1-A] ORC-mkX Arms Woodland\n- [S1-A] ORC-mkX Core Woodland\n- [S1-A] ORC-mkX Helmet Woodland\n- [S1-A] ORC-mkX Legs Woodland\n- [S1-A] P8-SC SMG Magazine (45 cap)\n- [S1-A] S71 Rifle Magazine (30 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Unknown:</EM4> 1\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
CFP_RecoverCargo_Easy_Title=Intercepted Supply Run <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
CFP_RecoverCargo_Hard_Description=We were in the process of delivering an urgent shipment to the folks over at <EM4>~mission(Destination|Address)</EM4> when our pilot ran into a group of outlaws. They tried to run, but it was already too late.\n\nThere is silver lining though. The trackers are showing the cargo is still intact, located at <EM4>~mission(Location|Address)</EM4>. There's a good chance the outlaws are guarding it while they locate a ship big enough to transport everything. While I don't want to risk losing another pilot, the need of the cargo aboard is desperate enough that it justifies the decision to send someone to recover it.\n\nThis won't be easy, these outlaws showed our pilot no mercy. You'll need to take them out first before getting the cargo back. Bring a ship that can store <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>heavy-duty tractor beam</EM4> for the moving. Deliver it to the freight elevator at <EM4>~mission(Destination)</EM4>  and let's make this right.\n\nFly safe,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- C54 SMG\n- P8-SC SMG\n- S71 Rifle\n- [S1-A] C54 SMG Magazine (50 cap)\n- [S1-A] G-2 Helmet Woodland\n- [S1-A] ORC-mkV Arms\n- [S1-A] ORC-mkV Core\n- [S1-A] ORC-mkV Legs\n- [S1-A] ORC-mkX Arms Woodland\n- [S1-A] ORC-mkX Core Woodland\n- [S1-A] ORC-mkX Helmet Woodland\n- [S1-A] ORC-mkX Legs Woodland\n- [S1-A] P8-SC SMG Magazine (45 cap)\n- [S1-A] S71 Rifle Magazine (30 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Unknown:</EM4> 1\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
CFP_RecoverCargo_Hard_Title=Crucial Supplies Need Retrieving <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
CFP_RecoverCargo_Medium_Description=A Citizens for Prosperity ship has been ambushed by a group of outlaws over at <EM4>~mission(Location|Address)</EM4> and we need a skilled pilot to help them out.\n\nWe lost contact with them mid comms, but it sounded like they were taking heavy fire. It may be too late for them, but the vital supplies they were carrying could still be put to good use. Fly over there, take out any hostiles, and recover the shipment. You'll need a ship that can support <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>heavy-duty tractor beam</EM4> to transport the supplies onto your ship.\n\nTake them to the freight elevator at <EM4>~mission(Destination|Address)</EM4> and I'll guarantee they'll be put to good use.\n\nBe safe out there,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- C54 SMG\n- P8-SC SMG\n- S71 Rifle\n- [S1-A] C54 SMG Magazine (50 cap)\n- [S1-A] G-2 Helmet Woodland\n- [S1-A] ORC-mkV Arms\n- [S1-A] ORC-mkV Core\n- [S1-A] ORC-mkV Legs\n- [S1-A] ORC-mkX Arms Woodland\n- [S1-A] ORC-mkX Core Woodland\n- [S1-A] ORC-mkX Helmet Woodland\n- [S1-A] ORC-mkX Legs Woodland\n- [S1-A] P8-SC SMG Magazine (45 cap)\n- [S1-A] S71 Rifle Magazine (30 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Unknown:</EM4> 1\n<EM4>Jr. Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
CFP_RecoverCargo_Medium_Title=Recovering Valuable Supplies <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
CFP_RecoverCargo_Super_Description=I wouldn't normally ask someone to do something so risky, but these are exceptional circumstances.\n\nOur pilot was transporting some vital cargo when they were targeted by a group of outlaws. Under no circumstances can we allow them to get their hands on the cargo.\n\nWith the size of the hostile force who attacked, you won't be able to do this on your own, you'll need to bring a skilled crew with you to  <EM4>~mission(Location|Address)</EM4> in order to  take out these outlaws and get the cargo back. Make sure at least one of you has a ship that can store <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>heavy-duty tractor beam</EM4>.\n\nIf by some miracle you can get that cargo back, take it to the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\nIt's a lot to ask, but if you can pull this off you'll have my and the whole organizations appreciation.\n\nBest of luck,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- C54 SMG\n- P8-SC SMG\n- S71 Rifle\n- [S1-A] C54 SMG Magazine (50 cap)\n- [S1-A] G-2 Helmet Woodland\n- [S1-A] ORC-mkV Arms\n- [S1-A] ORC-mkV Core\n- [S1-A] ORC-mkV Legs\n- [S1-A] ORC-mkX Arms Woodland\n- [S1-A] ORC-mkX Core Woodland\n- [S1-A] ORC-mkX Helmet Woodland\n- [S1-A] ORC-mkX Legs Woodland\n- [S1-A] P8-SC SMG Magazine (45 cap)\n- [S1-A] S71 Rifle Magazine (30 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Unknown:</EM4> 1\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
CFP_RecoverCargo_Super_Title=Special Recovery Operation <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
CFP_RecoverCargo_VeryHard_Description=More and more CFP ships are being targeted lately, and despite our best efforts to keep our trading routes quiet, we're still losing haulers to outlaw attacks.\n\nOur pilot over at <EM4>~mission(Location|Address)</EM4> is the latest casualty. It pains me to think about how much we've lost, but as long as there are people who need our help, we have to keep on fighting.\n\nIf you have a ship that can carry <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>heavy-duty tractor beam</EM4>, we need you to head to the above location and recover that cargo.\n\nThis won't be easy, the pilot was one of our best and wouldn't go down without a fight. Let's not underestimate these outlaws, bring a trustworthy crew and watch each other's backs.\n\nOnce you've got the cargo, deliver it to the freight elevator at <EM4>~mission(Destination|Address)</EM4> and I'll get it processed.\n\nGood luck and take care,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- C54 SMG\n- P8-SC SMG\n- S71 Rifle\n- [S1-A] C54 SMG Magazine (50 cap)\n- [S1-A] G-2 Helmet Woodland\n- [S1-A] ORC-mkV Arms\n- [S1-A] ORC-mkV Core\n- [S1-A] ORC-mkV Legs\n- [S1-A] ORC-mkX Arms Woodland\n- [S1-A] ORC-mkX Core Woodland\n- [S1-A] ORC-mkX Helmet Woodland\n- [S1-A] ORC-mkX Legs Woodland\n- [S1-A] P8-SC SMG Magazine (45 cap)\n- [S1-A] S71 Rifle Magazine (30 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Unknown:</EM4> 1\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
CFP_RecoverCargo_VeryHard_Title=Cargo Shipment Must Be Completed <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
CFP_SabotageRelays_HH_001_Desc=Violence is never our first choice, but sometimes it must be used as a preventative measure.\n\nWe’re planning a strike on a Headhunter controlled outpost and need your help.\n\nWe need to make sure that if something goes wrong they won’t be able to call for backup and escalate the situation. That’s where you come in. We need you to head over to <EM4>~mission(Location|Address)</EM4> and disable the communication towers. There should be a <EM4>control panel located at the top</EM4> of each tower that you can use to deactivate them.\n\nIf you’re able to do this, Citizens for Prosperity will be able to gain some vital ground in Pyro.\n\nIt’s also worth keeping in mind for future contracts that you can choose to take out the comms towers instead of risking a fight with reinforcement dropships.\n\nStay alert and stay safe.\n\nThank you,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +75
CFP_SabotageRelays_HH_001_Title=Disable Headhunter Comm Towers <EM4>[75 Rep]</EM4>
CFP_SabotageRelays_XT_001_Desc=Citizens for Prosperity are eager to help the people of Pyro, and it starts with freeing them from the grasp of XenoThreat.\n\nWe’re preparing a team to infiltrate one of their outposts, but we need someone to go in ahead to take out their communication towers first. Once those towers are offline, they won’t be able to call for reinforcements and we can proceed with our plan.\n\nHead to <EM4>~mission(Location|Address)</EM4> and find the towers. At the <EM4>top is a control panel</EM4> that can be used to disable them.\n\nAlso, it’s worth noting that most outposts use a similar system, so you’ll know how to disable the comms towers rather than risk fighting reinforcement dropships when you’re doing other jobs.\n\nGood luck,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +100
CFP_SabotageRelays_XT_001_Title=Shutdown Xenothreat Comm Towers <EM4>[100 Rep]</EM4>
CFP_SecurityPatrol_E_Desc_001=We’ve noted an increase in traffic along one of the travel lanes we monitor. Chances are that we won’t be the only ones paying attention. I’d like you to head out there in a combat-ready ship and make sure there are no outlaws attempting to take advantage of this sense of security.\n\nOnce you’ve accepted this contract, make your way to the <EM4>location marker</EM4> on your HUD and scan the waypoints along the route. After all of them have been secured, the main contractor will get a bonus of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Targets x15\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +100 Rep
CFP_SecurityPatrol_E_Title_001=Patrol Risky Travel Lanes <EM4>[100 Rep]</EM4>
CFP_SecurityPatrol_H_Desc_001=We’ve identified a sector that’s been plagued by outlaw attacks recently and hopefully, with your help, we can change that. We’d suggest <EM4>bringing some backup</EM4> in combat-ready ships to confront any hostile forces you might encounter.\n\nOnce you’ve accepted this contract, make your way to the <EM4>location marker</EM4> on your HUD and scan the waypoints along the route. After all of them have been secured, the main contractor will get a bonus of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Targets x54\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Sr. Contractor:</EM4> +200 Rep
CFP_SecurityPatrol_H_Title_001=Patrol Outlaw Hunting Grounds <EM4>[200 Rep]</EM4>
CFP_SecurityPatrol_M_Desc_001=Outlaws have been increasing their activity along one of the more popular routes in the system and we’re hoping to provide a deterrent before the problem gets out of hand. As such, we’d like you to head out there in a combat-ready ship and deal with any hostiles you might encounter.\n\nOnce you’ve accepted this contract, make your way to the <EM4>location marker</EM4> on your HUD and scan the waypoints along the route. After all of them have been secured, the main contractor will get a bonus of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Targets x23\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +150 Rep
CFP_SecurityPatrol_M_Title_001=Patrol Dangerous Travel Lanes <EM4>[150 Rep]</EM4>
CFP_SecurityPatrol_S_Desc_001=After weeks of seeing crime rates increase, we’ve been able to identify a sector that we believe to be the source of the outlaw activity that has been leeching into the surrounding areas. While it would be too much to expect to eradicate all threats, we believe that by sending combat patrols into the area we might be able to start reversing this worrisome trend. Our in-house combat analysts recommend bringing around <EM4>three wingmen</EM4> in combat-ready ships to confront any hostile forces you might encounter.\n\nOnce you’ve accepted this contract, make your way to the <EM4>location marker</EM4> on your HUD and scan the waypoints along the route. After all of them have been secured, the main contractor will get a bonus of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 7/7\n<EM4>Hostiles:</EM4> Targets x88\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Head Contractor:</EM4> +300 Rep
CFP_SecurityPatrol_S_Title_001=Patrol Extremely Dangerous Sector <EM4>[300 Rep]</EM4>
CFP_SecurityPatrol_VE_Desc_001=We need someone with combat experience to patrol a travel lane for us. Over the years, we’ve found that it's good to get out there and make ourselves visible. Sometimes a pilot like yourself traveling through an area is enough to deter any potential outlaws. But in case you run into any that are feeling a bit more ambitious, a ship ready for combat is recommended.\n\nOnce you’ve accepted this contract, make your way to the <EM4>location marker</EM4> on your HUD. After you’ve scanned all the waypoints and ensured that the route is secure, the main contractor will get a bonus of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Targets x4\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep
CFP_SecurityPatrol_VE_Title_001=Patrol Travel Lanes <EM4>[100 Rep]</EM4>
CFP_SecurityPatrol_VH_Desc_001=We’ve identified a sector that’s been increasingly riddled with outlaw attacks and we think that if we begin to actively patrol the area we can turn things around. We’d recommend gathering at least <EM4>two wingmen</EM4> to head out there in combat-ready ships and confront any hostile forces you might encounter.\n\nOnce you’ve accepted this contract, make your way to the <EM4>location marker</EM4> on your HUD and scan the waypoints along the route. After all of them have been secured, the main contractor will get a bonus of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Targets x66\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Veteran Contractor:</EM4> +250 Rep
CFP_SecurityPatrol_VH_Title_001=Patrol Dangerous Outlaw Sector <EM4>[250 Rep]</EM4>
CFP_ShipWaveAttack_ClearHostiles_Desc_E_001=To help protect our pilots, Citizens for Prosperity will often recommend the use of less traditional routes through the system. However, it seems that a gang of outlaws has gotten word and has begun to stage repeated ambushes along one such flightpath. Rather than just go around the problem and risk it persisting along the new route, we feel it we be prudent to meet these outlaws head on.\n\nYou and whatever support ships you enlist will head to ~mission(Location|Address) and neutralize any hostiles you find laying in wait there. They have been known to operate in smaller packs, so it's vital that you wait until all of the hostiles have been dealt with.\n\nYour assistance is much appreciated,\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x12\n<EM4>Jr. Contractor:</EM4> +100 Rep
CFP_ShipWaveAttack_ClearHostiles_Desc_H_001=A criminal fleet has taken up root in a sector that Citizens For Prosperity is trying to develop and all forward progress has stopped thanks to their violent actions. It is imperative to a long term goals that we find a way to neutralize this fleet before that cause any further damage.\n\nYou and your most trusted support ships will head to ~mission(Location|Address) and neutralize any hostiles you find laying in wait there. They have been known to operate in smaller packs, so it's vital that you wait until all of the hostiles have been dealt with.\n\nYour assistance is much appreciated,\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x22\n<EM4>Sr. Contractor:</EM4> +200 Rep
CFP_ShipWaveAttack_ClearHostiles_Desc_M_001=It feels that whenever we start to make real progress in the system, the outlaws are there to push one step back. We had recently cleared out ~mission(Location|Address) only to learn that a new outlaw gang has taken root there, using it as a launching point for various criminal enterprises. \n\nSince we can't afford to let this rot spread, you and a few support ships are being charged with heading there to clear out all the gang's packs. After you deal with one pack, be sure to wait until all of the hostile packs have been dealt with.\n\nKnow that you are helping to make a real difference,\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x13\n<EM4>Contractor:</EM4> +150 Rep
CFP_ShipWaveAttack_ClearHostiles_Desc_VE_001=Recently we've had incident reports of numerous Citizens for Prosperity contractors in the system having run-ins with an outlaw hunting party operating out of ~mission(Location|Address). \n\nTo help re-establish safer routes through that sector, you will be dispatched to head there and engage with these outlaws. The group is known to travel in smaller packs, so its important that you and whatever backup you bring wait in the area to deal with all of them or else there's a chance the threat will remain. \n\nThank you for helping us,\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Neutral:</EM4> +100 Rep
CFP_ShipWaveAttack_ClearHostiles_Title_E_001=Clear CFP Route of Hostiles <EM4>[100 Rep]</EM4>
CFP_ShipWaveAttack_ClearHostiles_Title_H_001=Neutralize Dangerous Criminal Fleet <EM4>[200 Rep]</EM4>
CFP_ShipWaveAttack_ClearHostiles_Title_M_001=Remove Upstart Gang From Sector <EM4>[150 Rep]</EM4>
CFP_ShipWaveAttack_ClearHostiles_Title_VE_001=Help Deal with Outlaw Hunting Party <EM4>[100 Rep]</EM4>
CleanAir_Collect-Milestone1_desc=\nLet me start by saying that your continuing work helping the Alliance Aid efforts so far have made a considerable difference not only to us at Rayari, but to the rest of the organizations coordinating with the Collections Division. It's why I wanted to reach out to you directly. \n\nWhile we have been making great strides in combating this ongoing health crisis, there is concern amongst our researchers that Molina Mold has the potential to mutate into a new fungal strain. \nIn order in ensure that our ongoing investigation into the mold is as accurate as possible, we would like you to head to the source of the growth in Levski and <EM4> harvest new samples of the Molina Mold </EM4> there directly. \n\nOnce you have the samples collected, you will then need to deliver them to <EM4>~mission(Destination|Address)</EM4>. \n\nThank you for your assistance at this vital juncture. \n\nNarina Lerrem\nSenior Manager\nClinical Research Outsourcing\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Unique, Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Unknown:</EM4> 1\n<EM4>Rep:</EM4> +424
CleanAir_Collect-Milestone1_title=Alliance Aid: Molina Mold Samples <EM4>[424 Rep]</EM4>
CleanAir_Courier_Combat_desc=ATTENTION ALL FTL COURIERS\nFOR IMMEDIATE ASSIGNMENT\n\n**CONTRACT DETAILS** \n\nPICKUP LOCATION – An FTL ship carrying a delivery for Alliance Aid went down at <EM4>~mission(Location|Address)</EM4>. Courier needed to retrieve package and continue delivery.\n\nDROPOFF LOCATION – Package must be taken to <EM4>~mission(Destination|Target|Address)</EM4>. \n\nTHREAT LEVEL – There is a strong chance that the courier was attacked by outlaws eager to acquire the vital supplies needed to stop the Molina mold out break in Levski. <EM4>Medium level engagements</EM4> expected.\n\nTRAVEL –  All transportation needs should be arranged by courier. \n\nFTL Courier Services thanks you for helping us do our part for Alliance Aid.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Unknown:</EM4> 3\n<EM4>Rep:</EM4> +225
CleanAir_Courier_Derelict_desc=ATTENTION ALL FTL COURIERS\nFOR IMMEDIATE ASSIGNMENT\n\n**CONTRACT DETAILS** \n\nPICKUP LOCATION – An FTL ship carrying a delivery for Alliance Aid has not completed it's contract. The last known location has it still over at <EM4>~mission(Location|Address)</EM4>. A courier needed to retrieve package and continue delivery.\n\nDROPOFF LOCATION – Package must be taken to <EM4>~mission(Destination|Target|Address)</EM4>. \n\nTHREAT LEVEL – It is unclear what happened to the ship, but we expect a malfunction. Still, caution is advised. <EM4>Low level engagements</EM4> expected.\n\nTRAVEL –  All transportation needs should be arranged by courier. \n\nFTL Courier Services is proud to be assisting in Alliance Aid efforts to help fight the Levski outbreak.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 6\n<EM4>Rep:</EM4> +150
CleanAir_Courier_Derelict_title=Alliance Aid: Vital Package Retrieval <EM4>[150 Rep]</EM4>
CleanAir_Courier_title=Alliance Aid: Courier Needed <EM4>[225 Rep]</EM4>
CleanAir_DefendShip_Easy_desc=We’ve lost contact with an Alliance Aid supply convoy and are concerned it might be under attack from outlaws. We need you to hurry to <EM4>~mission(Location|Address)</EM4> and support them. Any delays to the ongoing relief efforts could cost lives in Levski.\n\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Rep:</EM4> +150
CleanAir_DefendShip_Easy_title=Alliance Aid: Ship in Trouble <EM4>[150 Rep]</EM4>
CleanAir_DefendShip_Hard_desc=Everyone has been joining with Alliance Aid to help with the ongoing crisis in Levski, but it seems you can't do good in this 'verse without attracting the bad. One of the critical relief convoys was just attacked by a powerful outlaw fleet. We need you to <EM4>put together a fleet of your own</EM4> and deploy to <EM4>~mission(Location|Address)</EM4> as soon as possible. With any luck, you may be able to right this wrong before it's too late.\n\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Rep:</EM4> +300
CleanAir_DefendShip_Hard_title=Alliance Aid: Ship Under Attack <EM4>[300 Rep]</EM4>
CleanAir_DefendShip_Medium_desc=You figure these outlaws would have the decency not to interfere with relief efforts but unfortunately we've gotten word that an Alliance Aid convoy is under attack. These criminals seem to be a serious threat so it would be recommended to <EM4>bring some support along</EM4> with you. \n\nOnce you're ready, head to <EM4>~mission(Location|Address)</EM4> and face these criminals head on.\n\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Rep:</EM4> +225
CleanAir_DefendShip_Medium_title=Alliance Aid: Ship in Distress <EM4>[225 Rep]</EM4>
CleanAir_Defense-Milestone1_desc=Since you've been doing so much work helping out the Defense Division I wanted to come to you with this contract direct. It's a bit of a delicate one. Two VIPs fell ill and the worry was that if word got out they were being transported they would become major targets.\n\nUnfortunately, it seems that's exactly what happened. Our attempts to smuggle them from Nyx to Stanton for medical treatment have failed, and now the ship carrying them is under attack. \n\nWe need you to hurry to <EM4>~mission(Location|Address)</EM4>, neutralize the attackers and ensure that the cryopods make it safely to the freight elevator at <EM4>~mission(Destination|Address)</EM4>. \n\nIn fact, I want you to make sure you have a ship that can carry the cryopods just in case their original transport is too damaged to go on.\n\nI sincerely hope you manage to pull this rescue mission off. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Unique, Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Unknown:</EM4> 1\n<EM4>Rep:</EM4> +675
CleanAir_Defense-Milestone1_title=Alliance Aid: Urgent Rescue Mission <EM4>[675 Rep]</EM4>
CleanAir_EscortShip_Easy_desc=Citizens for Prosperity need a combat-experienced pilot to provide extra support to an Alliance Aid pilot who is making a vital trip from <EM4>~mission(Location|Address)</EM4> for the ongoing relief effort. \n\nOutlaws have been launching more attacks thanks to the increased activity brought on by the Molina Mold outbreak, so it’ll be your job to make sure that they stay safe while they’re completing their work. This route is relatively safe, so I'm not expecting too much trouble, but its better not to take the risk.\n\nIf you’re interested, you’ll rendezvous there and await further instructions.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2, Reinforcements x4\n<EM4>Friendlies:</EM4> Escort Wings x1\n<EM4>Rep:</EM4> +120
CleanAir_EscortShip_Easy_title=Alliance Aid: Escort Needed <EM4>[120 Rep]</EM4>
CleanAir_EscortShip_Hard_desc=Alliance Aid has a ship vital to the relief effort leaving from <EM4>~mission(Location|Address)</EM4>. They have received credible threats that they may be attacked and are looking to bring on additional security.\n\nWhen you're ready, head to the rendezvous with yourself and <EM4>any additional combat ships you can recruit</EM4>  and await further instructions.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x2, Reinforcements x4\n<EM4>Friendlies:</EM4> Escort Wings x1\n<EM4>Rep:</EM4> +150
CleanAir_EscortShip_Hard_title=Alliance Aid: Protection Detail Needed <EM4>[150 Rep]</EM4>
CleanAir_EscortShip_Medium_desc=I was just contacted by an Alliance Aid rep who is deeply concerned for one of their contractors heading out from  <EM4>~mission(Location|Address)</EM4>. The ships helping the relief effort have been drawing a lot of outlaw attention and they're worried that without extra protection they won't be able to finish their vital work.  \n\nOwing with the increased risk level and the value of the ship, it might behoove you to <EM4>bring some combat support</EM4> of your own along.\n\nIf you’re interested, head to the rendezvous and await further instructions.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x2, Reinforcements x4\n<EM4>Friendlies:</EM4> Escort Wings x1\n<EM4>Rep:</EM4> +135
CleanAir_EscortShip_Medium_title=Alliance Aid: Security Needed <EM4>[135 Rep]</EM4>
CleanAir_Hauling_Bulk_MedicalSupplies_desc=Hi,\n\nThe outbreak of the People’s Ailment from Molina Mold has put a strain on the availability of medical supplies. Got a priority, large scale run here to get <EM4>~mission(Destination|Address)</EM4> restocked with necessary pharmaceuticals and equipment. Any chance you’re available?\n\nPick up for this haul is at <EM4>~mission(Location|Address)</EM4>. You’ll be dealing with containers that are up to <EM4>~mission(MissionMaxSCUSize)</EM4> in size. Be sure to bring a <EM4>handheld tractor beam</EM4>, and a ship that can fit containers that size. \n\nElla Tieno\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +540
CleanAir_Hauling_Bulk_MedicalSupplies_desc_02=Hello,\n\nWith the ongoing emergency in Levski, Alliance Aid needs all hands on deck to help transport enough medical supplies to save as many lives as possible. There's a large scale haul over at <EM4>~mission(Location|Address)</EM4> ready to be brought to <EM4>~mission(Destination|Address)</EM4>.\n\nThis run needs a hauler with a ship that can hold <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>. You'll also need a <EM4>handheld tractor beam</EM4> to deal with the crates.    \n\nPlease let me know if you can handle this for us.   \n\nSafe Hauling,  \nReyes Ling \nCargo Logistics Coordinator\nLing Family Hauling\n\nLing Family Hauling knows it’s a dangerous and unpredictable universe and has established several protocols to protect both you and our client’s cargo. To ensure you aren’t punished for circumstances outside of your control, total payment will be prorated to the percentage of cargo successfully delivered. A delivery timer will be set for each haul. Any cargo that remains undelivered upon its expiration will be flagged as stolen and treated as such. All pick-ups and deliveries must be autoloaded or done at a freight elevator.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Rep:</EM4> +285
CleanAir_Hauling_Bulk_MedicalSupplies_title=Alliance Aid: Interstellar Large Cargo Haul (Medical) <EM4>[540 Rep]</EM4>
CleanAir_Hauling_Bulk_MedicalSupplies_title_02=Alliance Aid: Medical Cargo Haul - Large Scale <EM4>[285 Rep]</EM4>
CleanAir_Hauling_Bulk_MoldSample_desc=Hey,\n\nA special containment team at <EM4>~mission(Location|Address)</EM4> has collected and securely packaged enough Molina mold samples for a large scale haul. Researchers at <EM4>~mission(Destination|Address)</EM4> are eagerly awaiting its arrival so they can continue their tests. Any chance you can do this run for us?\n\nI've confirmed with the containment team that they used biohazard-grade containers, so there's no risk of you catching the People's Aliment. Just bring a ship that can haul <EM4>~mission(MissionMaxSCUSize)</EM4> cargo containers and a <EM4>handheld tractor beam</EM4>.\n\nHope its a safe and smooth haul for you,\n\nElla Tieno\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +600
CleanAir_Hauling_Bulk_MoldSample_title=Alliance Aid: Interstellar Large Cargo Haul (Research) <EM4>[600 Rep]</EM4>
CleanAir_Hauling_Bulk_MoldTreatment_desc=Hi,\n\nPeople are breathing a sigh of relief that a treatment for the People's Aliment has been found, but we're not out of the woods just yet. There's still plenty of folks suffering . We're hoping you can help the cause by handling a large scale haul of the stuff.  \n\nIf you're available, we need you to pick up from <EM4>~mission(Location|Address)</EM4> and then fly it over to <EM4>~mission(Destination|Address)</EM4>. Remember to bring a <EM4>handheld tractor beam</EM4> and a ship that can hold <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>. \n \n\nSafe Hauling,  \nReyes Ling \nCargo Logistics Coordinator\nLing Family Hauling\n\nLing Family Hauling knows it’s a dangerous and unpredictable universe and has established several protocols to protect both you and our client’s cargo. To ensure you aren’t punished for circumstances outside of your control, total payment will be prorated to the percentage of cargo successfully delivered. A delivery timer will be set for each haul. Any cargo that remains undelivered upon its expiration will be flagged as stolen and treated as such. All pick-ups and deliveries must be autoloaded or done at a freight elevator.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +570 Rep\n<EM4>Tier 2:</EM4> +600 Rep
CleanAir_Hauling_Bulk_MoldTreatment_title=Alliance Aid: Treatment Cargo Haul - Large Scale <EM4>[570–600 Rep]</EM4>
CleanAir_Hauling_Bulk_Ventfilters_desc=Hey,\n\nHelp us put an end to the People's Affliction by hauling new vent filters to places that need replacements. \n\nHere's a run of them from <EM4>~mission(Location|Address)</EM4> to <EM4>~mission(Destination|Address)</EM4>. This is a large scale haul, so bring a ship that can fit everything. The manifest also specifies that that largest container you'll be dealing with is <EM4>~mission(MissionMaxSCUSize)</EM4>. Would strongly recommending bringing a <EM4>handheld tractor beam</EM4> to deal with those. \n\nThanks for joining us and Alliance Aid to help bring this crisis to an end!\n\nElla Tieno\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +600
CleanAir_Hauling_Bulk_Ventfilters_title=Alliance Aid: Interstellar Large Cargo Haul (Filters) <EM4>[600 Rep]</EM4>
CleanAir_Hauling_Small_Cryopods_desc=Hello,\n\nI’ve got an extremely important and sensitive hauling order here that I’m hoping you can handle. To reduce fatalities from the Molina mold outbreak, those suffering from the People’s Ailment are being put into cryopods to keep the disease from progressing before they receive the necessary treatment.   \n\nCan you head to <EM4>~mission(Location|Address)</EM4> to pick up a small scale haul of cryopods and bring them to <EM4>~mission(Destination|Address)</EM4> so they can get the help they need?   \n\nIf you haven’t dealt with a cryopod before, you’ll need a ship with a hold that can fit a container up to <EM4>~mission(MissionMaxSCUSize)</EM4> in size. A <EM4>handheld tractor beam</EM4> will also be needed to move them around.  \n\nThanks for joining us and Alliance Aid to help bring this crisis to an end!\n\nElla Tieno\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +390
CleanAir_Hauling_Small_Cryopods_title=Alliance Aid: Interstellar Small Cargo Haul (Cryopods) <EM4>[390 Rep]</EM4>
CleanAir_Hauling_Small_MedicalSupplies_desc=Hey,\n\nThere's been an uptick in demand for medical supplies since the Molina mold outbreak started. That's why the medical team at <EM4>~mission(Destination|Address)</EM4> is running low on a few essentials and can't wait for their regular restock. Any chance you're available to do a priority run there now?\n\nGoods are ready and waiting at <EM4>~mission(Location|Address)</EM4>. It's a small scale haul, but you'll still need a <EM4>handheld tractor beam</EM4>. Looks like the containers will be as big as <EM4>~mission(MissionMaxSCUSize)</EM4> in size.\n\nHope its a safe and smooth haul for you, \n\nElla Tieno\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +360
CleanAir_Hauling_Small_MedicalSupplies_desc_02=Hi,\n\nSeems like folks burned through their medical resources trying to figure out how to treat the People's Aliment. Alliance Aid is overwhelmed with requests for medical supply hauls right now. Can you help me clear one of them out?\n\nHere's a small scale ready to go. The supplies are sitting at <EM4>~mission(Location|Address)</EM4> with delivery going to <EM4>~mission(Destination|Address)</EM4>. All that's required is a a <EM4>handheld tractor beam</EM4> to move the cargo and a ship that can fit <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>.   \n\n\nSafe Hauling,  \nReyes Ling \nCargo Logistics Coordinator\nLing Family Hauling\n\nLing Family Hauling knows it’s a dangerous and unpredictable universe and has established several protocols to protect both you and our client’s cargo. To ensure you aren’t punished for circumstances outside of your control, total payment will be prorated to the percentage of cargo successfully delivered. A delivery timer will be set for each haul. Any cargo that remains undelivered upon its expiration will be flagged as stolen and treated as such. All pick-ups and deliveries must be autoloaded or done at a freight elevator.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Rep:</EM4> +225
CleanAir_Hauling_Small_MedicalSupplies_title=Alliance Aid: Interstellar Small Cargo Haul (Medical) <EM4>[360 Rep]</EM4>
CleanAir_Hauling_Small_MedicalSupplies_title_02=Alliance Aid: Medical Cargo Haul - Small Scale <EM4>[225 Rep]</EM4>
CleanAir_Hauling_Small_MoldSample_desc=Hello,\n\nScientists at <EM4>~mission(Destination|Address)</EM4> are desperate to get their hands on Molina mold samples so they can put it through a battery of tests. Just got word that there’s a small haul of samples waiting at <EM4>~mission(Location|Address)</EM4> for them to use. Are you available to make this run? \n\nYou’ll need a ship that can hold cargo containers up to <EM4>~mission(MissionMaxSCUSize)</EM4> in size, and a <EM4>handheld tractor beam</EM4> to deal with them. Finally, for your peace of mind, the mold samples have been safely and securely packaged inside the crates so there’s no risk of it getting you sick. \n\n\nElla Tieno \nJr. Logistics Coordinator \nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +405
CleanAir_Hauling_Small_MoldSample_title=Alliance Aid: Interstellar Small Cargo Haul (Research) <EM4>[405 Rep]</EM4>
CleanAir_Hauling_Small_MoldTreatment_desc=Hi,\n\nWe’ve joined the effort to help those affected by the Molina mold outbreak. There’s a small scale haul of urgently needed treatment waiting to be picked up from <EM4>~mission(Location|Address)</EM4> and delivered to <EM4>~mission(Destination|Address)</EM4>. Any chance you’re available?  \n   \nAll you’ll need is a ship that can fit <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>handheld tractor beam</EM4> to make moving the stuff easier on you. \n \n\nSafe Hauling,  \nReyes Ling \nCargo Logistics Coordinator\nLing Family Hauling\n\nLing Family Hauling knows it’s a dangerous and unpredictable universe and has established several protocols to protect both you and our client’s cargo. To ensure you aren’t punished for circumstances outside of your control, total payment will be prorated to the percentage of cargo successfully delivered. A delivery timer will be set for each haul. Any cargo that remains undelivered upon its expiration will be flagged as stolen and treated as such. All pick-ups and deliveries must be autoloaded or done at a freight elevator.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +225 Rep\n<EM4>Tier 2:</EM4> +405 Rep
CleanAir_Hauling_Small_MoldTreatment_title=Alliance Aid: Treatment Cargo Haul - Small Scale <EM4>[225–405 Rep]</EM4>
CleanAir_Hauling_Small_Ventfilters_desc=Hi,\n\nThis outbreak of Molina Mold really has folks on edge. Hauling requests for new vent filters is through the roof, even from places that weren’t using those cheap Gyson ones. \n\nAnyways, I have one such haul here I was hoping you could knock out. It’s a small scale haul of filters waiting at <EM4>~mission(Location|Address)</EM4> that needs to go to <EM4>~mission(Destination|Address)</EM4>. You free to take care of it? \n\nAccording to the haul specifics, the containers will be <EM4>~mission(MissionMaxSCUSize)</EM4> in size or smaller. Don’t forget to bring a <EM4>handheld tractor beam</EM4> along to help you move everything. \n\nAppreciate you taking of this important run for us!\n\nElla Tieno\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +405
CleanAir_Hauling_Small_Ventfilters_title=Alliance Aid: Interstellar Small Cargo Haul (Filters) <EM4>[405 Rep]</EM4>
CleanAir_Hauling_Supply_Cryopods_desc=Hi,\n\nWith medical facilities completely overwhelmed by the Molina mold outbreak, they've resorted to putting people in cyropods to keep them from getting sicker. Thankfully, the folks at <EM4>~mission(Destination|Address)</EM4> have freed up hospital space to treat a handful of the affected people. All they need now are the patients.\n\nLooking for someone willing to pick up some cryopods from <EM4>~mission(Location|Address)</EM4> with a ship that can hold containers up to <EM4>~mission(MissionMaxSCUSize)</EM4> in size. You'll also need a <EM4>handheld tractor beam</EM4>. Not sure if you've moved a cryopod before, but it's not exactly something you can haul around by hand.   \n\n\nElla Tieno\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +465
CleanAir_Hauling_Supply_Cryopods_title=Alliance Aid: Interstellar Medium Cargo Haul (Cryopods) <EM4>[465 Rep]</EM4>
CleanAir_Hauling_Supply_MedicalSupplies_desc=I hope this message finds you well,\n\nThings are a bit crazy than normal around here because of how many of our pilots ended up getting sick while doing runs to Levski. Thankfully, Covalex is contributing to 'Alliance Aid' so hopefully we can put this whole affair behind us soon. \n\nCurrently, I've got a medium scale haul of medical supplies waiting at <EM4>~mission(Location|Address)</EM4>. Really need someone to take it to <EM4>~mission(Destination|Address)</EM4>, so the team there can operate at full capacity. \n\nThe biggest container on this run will be <EM4>~mission(MissionMaxSCUSize)</EM4> in size, so have a ship that can handle those. Oh, and don't forget your <EM4>handheld tractor beam</EM4>.  \n\nThanks for joining us and Alliance Aid to help bring this crisis to an end!\n\nElla Tieno\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +465
CleanAir_Hauling_Supply_MedicalSupplies_desc_02=Hello,\n\nWe need your help! Medical supplies are in high demand after the Molina mold outbreak exhausted stockpiles. Thankfully, there's a medium scale haul of the stuff at <EM4>~mission(Location|Address)</EM4> ready to be brought to <EM4>~mission(Destination|Address)</EM4>.\n\nThis run needs a hauler with a ship that can hold <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>. You'll also need a <EM4>handheld tractor beam</EM4> to deal with the crates.    \n\nPlease let me know if you can handle this for us.   \n\nSafe Hauling,  \nReyes Ling \nCargo Logistics Coordinator\nLing Family Hauling\n\nLing Family Hauling knows it’s a dangerous and unpredictable universe and has established several protocols to protect both you and our client’s cargo. To ensure you aren’t punished for circumstances outside of your control, total payment will be prorated to the percentage of cargo successfully delivered. A delivery timer will be set for each haul. Any cargo that remains undelivered upon its expiration will be flagged as stolen and treated as such. All pick-ups and deliveries must be autoloaded or done at a freight elevator.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Rep:</EM4> +390
CleanAir_Hauling_Supply_MedicalSupplies_title=Alliance Aid: Interstellar Medium Cargo Haul (Medical) <EM4>[465 Rep]</EM4>
CleanAir_Hauling_Supply_MedicalSupplies_title_02=Alliance Aid: Medical Cargo Haul - Medium Scale <EM4>[390 Rep]</EM4>
CleanAir_Hauling_Supply_MoldSample_desc=Hey,\n\nHave an important run here that we need handled. There's a medium scale haul of Molina mold samples securely packaged and waiting at <EM4>~mission(Location|Address)</EM4>. Need someone to retrieve the containers and then bring them to <EM4>~mission(Destination|Address)</EM4> to aid their research. \n \nEven though the mold is extremely toxic, these containers will keep you safe from it. All you have to worry about is having a ship big enough to carry cargo containers up to <EM4>~mission(MissionMaxSCUSize)</EM4> in size. Plus, you'll need a <EM4>handheld tractor beam</EM4> so you can move it all quickly and efficiently.  \n\nAppreciate you taking of this important run for us!\n\nElla Tieno \nJr. Logistics Coordinator \nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +465
CleanAir_Hauling_Supply_MoldSample_title=Alliance Aid: Interstellar Medium Cargo Haul (Research) <EM4>[465 Rep]</EM4>
CleanAir_Hauling_Supply_MoldTreatment_desc=Hey,\n\nPretty heartbreaking hearing what's happening to the people out in Levski with this Molina mold outbreak? Our family has decided to do all we can to help out with Alliance Aid.  Got a medium scale haul of antifungal waiting to be picked up at <EM4>~mission(Location|Address)</EM4> and taken to <EM4>~mission(Destination|Address)</EM4>. Think you can handle this for us?\n\nBefore you go, please make sure you bring a ship that can hold <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>. You'll also need a <EM4>handheld tractor beam</EM4> to deal with the containers. \n \n\nSafe Hauling,  \nReyes Ling \nCargo Logistics Coordinator\nLing Family Hauling\n\nLing Family Hauling knows it’s a dangerous and unpredictable universe and has established several protocols to protect both you and our client’s cargo. To ensure you aren’t punished for circumstances outside of your control, total payment will be prorated to the percentage of cargo successfully delivered. A delivery timer will be set for each haul. Any cargo that remains undelivered upon its expiration will be flagged as stolen and treated as such. All pick-ups and deliveries must be autoloaded or done at a freight elevator.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +375 Rep\n<EM4>Tier 2:</EM4> +465 Rep
CleanAir_Hauling_Supply_MoldTreatment_title=Alliance Aid: Treatment Cargo Haul - Medium Scale <EM4>[375–465 Rep]</EM4>
CleanAir_Hauling_Supply_Ventfilters_desc=Hey,\n\nThere's a medium scale haul of new vent filters at <EM4>~mission(Location|Address)</EM4> waiting to go to <EM4>~mission(Destination|Address)</EM4>. You available to handle it? \n\nThe team at <EM4>~mission(Destination)</EM4> is obviously very anxious to get these new filters, and won't stop bugging me about this haul until I give them a delivery ETA. No wonder with how worried everyone is about this Molina mold outbreak. Should be an easy run. All that's needed is a ship that can hold containers <EM4>~mission(MissionMaxSCUSize)</EM4> in size or smaller, and a <EM4>handheld tractor beam</EM4>. \n\nElla Tieno\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +465
CleanAir_Hauling_Supply_Ventfilters_title=Alliance Aid: Interstellar Medium Cargo Haul (Filters) <EM4>[465 Rep]</EM4>
CleanAir_Killship_Easy_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Neutralize Ship \nAPPROVAL CODE = RT-04\n\nFOR IMMEDIATE PROCESSING\n\nWith valuable shipments being transported to Levski thanks to this whole Alliance Aid thing, outlaws have been happy as clams targeting the loaded-up haulers. One particular scumbag, <EM4>~mission(TargetName)</EM4>, has hit a half-dozen ships so far and everyone's pretty eager to stop their spree in its tracks.\n\nThey were last spotted harrassing ships over at <EM4>~mission(Location|Address)</EM4>. Head there and take out their ship. Payment will be issued once they're neutralized. \n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 2\n<EM4>Rep:</EM4> +75
CleanAir_Killship_Easy_title=Alliance Aid: Supply Thief <EM4>[75 Rep]</EM4>
CleanAir_Killship_Hard_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Neutralize Ship \nAPPROVAL CODE = RT-06\n\nFOR IMMEDIATE PROCESSING\n\nOne of Nyx's local gangs, the Moraine, have been taking advantage of the current emergency happening in Levski and have one of their best pilots, <EM4>~mission(TargetName)</EM4>, leading attacks against any Alliance Aid haulers they can get their hands on. At the rate they've been stealing supplies from the effort, unless they're stopped soon, its going to lead to whole bunch of sick people on Levski not getting the help they need.\n\nWe've been able to track the group to <EM4>~mission(Location|Address)</EM4>, but before you head out, you're going to need to some recruiting of your own. Unless you <EM4>take a few wingmen with you</EM4>, not sure you'll be able to neutralize this particular outlaw pack. \n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Unknown:</EM4> 4\n<EM4>Rep:</EM4> +225
CleanAir_Killship_Hard_title=Alliance Aid: Hauler Hunters <EM4>[225 Rep]</EM4>
CleanAir_Killship_Medium_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Neutralize Ship \nAPPROVAL CODE = RT-05\n\nFOR IMMEDIATE PROCESSING\n\nIt seems that the People's Alliance aren't the only ones eager to get their hands on the resources needed to fight their Molina Mold outbreak. The Moraine gang has been hitting the shipping lanes hard trying to get their hands on as many haulers as they can. One particular member, <EM4>~mission(TargetName)</EM4>, and their crew have been especially successful, knocking over over a dozen ships. The folks organizing Alliance Aid are pretty eager to see this growing problem dealt with.\n\nRecent reports have their hunting grounds over near <EM4>~mission(Location|Address)</EM4>. Head there with any support ships you want to take and neutralize them before any more vital supplies are lost. \n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Unknown:</EM4> 3\n<EM4>Rep:</EM4> +150
CleanAir_Killship_Medium_title=Alliance Aid: Resource Raiders <EM4>[150 Rep]</EM4>
CleanAir_RecoverCargo_Easy_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Cargo Retrieval \nAPPROVAL CODE = JJ-11\n\nFOR IMMEDIATE PROCESSING\n\nWith all these Alliance Aid ships hauling valuable cargo around, outlaws in the area have gone into a feeding frenzy. We just got word of one of their latest targets via emergency beacon and need you to go over to the <EM4>~mission(Location|Address)</EM4>, assess the situation, <EM4>neutralize any remaining hostiles</EM4> in the area, and if needed, secure the shipment for delivery to <EM4>~mission(Destination|Address)</EM4>.\n\nBe sure to bring a <EM4>handheld tractor beam</EM4> to handle the cargo. \n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2\n<EM4>Unknown:</EM4> 2\n<EM4>Rep:</EM4> +300
CleanAir_RecoverCargo_Easy_title=Alliance Aid: Attempted Cargo Theft <EM4>[300 Rep]</EM4>
CleanAir_RecoverCargo_Hard_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Cargo Retrieval \nAPPROVAL CODE = JJ-13\n\nFOR IMMEDIATE PROCESSING\n\nAlliance Aid just comm'd in a panic. A vital shipment that they were counting on hasn't shown up. All signs point to it getting jacked by thieves along the way so they're counting on us to make sure it gets delivered.  \n\nYou're going to head to the <EM4>~mission(Location|Address)</EM4>, assess the situation, <EM4>neutralize any remaining hostiles</EM4> in the area, and secure the shipment for drop off at <EM4>~mission(Destination|Address)</EM4>. Be sure to have a <EM4>few support ships</EM4> with you just in case things get extra rough. \n\nBe sure to bring a <EM4>handheld tractor beam</EM4> to handle the cargo.  \n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Unknown:</EM4> 2\n<EM4>Rep:</EM4> +600
CleanAir_RecoverCargo_Hard_title=Alliance Aid: Thwart Cargo-jacking <EM4>[600 Rep]</EM4>
CleanAir_RecoverCargo_Medium_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Cargo Retrieval \nAPPROVAL CODE = JJ-12\n\nFOR IMMEDIATE PROCESSING\n\nNothing like an emergency to bring out the worst in people. This Molina mold is killing people left and right, and what do the scum of this system decide to do? That's right, they're out there trying to highjack vital shipments. Alliance Aid wants us to make sure they don't get away with it. \n\nYou're going to head to the <EM4>~mission(Location|Address)</EM4>, assess the situation, <EM4>neutralize any remaining hostiles</EM4> in the area, and secure the shipment for delivery to <EM4>~mission(Destination|Address)</EM4>. I expect these jackers to put up a good fight, so feel free to take along some backup if you want.\n\nBe sure to bring a <EM4>handheld tractor beam</EM4> to handle the cargo.  \n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Unknown:</EM4> 2\n<EM4>Rep:</EM4> +450
CleanAir_RecoverCargo_Medium_title=Alliance Aid: Stop Cargo Heist <EM4>[450 Rep]</EM4>
CleanAir_ResourceGathering_Bulk_Filters_desc=POSTING: Resource Gathering \nLOCATION: Pyro System, Stanton System\nWORK EXPERIENCE: Mining, Commodity Trading\nTERMS*: \nShubin Interstellar is stepping up to help stop the spread of the People’s Ailment. Our facilities are helping in the efforts to produce much needed ventilation filters to replace the faulty ones responsible for the spread of the dangerous Molina Mold, but we need your help to hit that ambitious goal. \n\nOur current stockpiles of an important resource are not sufficient enough, so we need contractors who can deliver a large-scale haul of it to <EM4>~mission(Destination|Address)</EM4>.\n\nResources tied to another contract will not be accepted.   \n\n*Shubin Interstellar is an equal opportunity contractor. By accepting this contract you are assuming any and all risks associated with the work outlined herein and in no way can Shubin Interstellar be held accountable for any damages accrued during the duration of the contract.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 6/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +589 Rep\n<EM4>Tier 2:</EM4> +603 Rep
CleanAir_ResourceGathering_Bulk_Filters_title=Alliance Aid: Collect Manufacturing Resource - Large Scale <EM4>[589–603 Rep]</EM4>
CleanAir_ResourceGathering_Bulk_MoldResearch_desc=To all available contractors,\n\nRayari scientists are working around-the-clock to assist with the treatment for the current fungal outbreak in Levski. Due to logistic issues, our team at <EM4>~mission(Destination|Address)</EM4> is running low on a key resource in their research. Losing production at that location would hamper the Alliance Aid’s effort to cure people suffering from this terrible affliction in a timely manner.\n\nThat’s why we're eager for the help of anyone who can find and deliver this vital supply to <EM4>~mission(Destination)</EM4>.\n\nPlease remember that contracted goods are tracked by their legal owners and can't be accepted.\n\nTogether we can make the universe better for all.\n\nNarina Lerrem\nSenior Manager\nClinical Research Outsourcing\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 6/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +589 Rep\n<EM4>Tier 2:</EM4> +609 Rep
CleanAir_ResourceGathering_Bulk_MoldResearch_title=Alliance Aid: Large Supply of Research Resource <EM4>[589–609 Rep]</EM4>
CleanAir_ResourceGathering_Small_Filters_desc=POSTING: Resource Gathering \nLOCATION: Pyro System, Stanton System\nWORK EXPERIENCE: Mining, Commodity Trading\nTERMS*: \nAs a member of Alliance Aid, Shubin Interstellar is dedicated to assisting in the production of as many high quality ventilation filters as possible. These filters are key to stopping the spread of Molina Mold and keeping more people from being stricken with the People’s Ailment. \n\nWe’ve just received word from our facility at <EM4>~mission(Destination|Address)</EM4> that their stockpile of a vital resource is getting low. Our normal supplier won’t be able to do a resupply run for a while, so we’re hoping you might be able to do a small scale run of it now to bridge the gap. \n \nIf you’re available, simply acquire it as you see best and bring it to our facility, and we’ll compensate you well.\n\nResources tied to another contract will not be accepted.\n\n*Shubin Interstellar is an equal opportunity contractor. By accepting this contract you are assuming any and all risks associated with the work outlined herein and in no way can Shubin Interstellar be held accountable for any damages accrued during the duration of the contract.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +327 Rep\n<EM4>Tier 2:</EM4> +365 Rep
CleanAir_ResourceGathering_Small_Filters_title=Alliance Aid: Collect Manufacturing Resource - Small Scale <EM4>[327–365 Rep]</EM4>
CleanAir_ResourceGathering_Small_MoldResearch_desc=To all available contractors,\n\nRayari needs your assistance. As part of the Alliance Aid effort, our scientists have shifted their entire focus to assisting Levski deal with Molina mold. Unfortunately, the team’s progress has stalled due to a lack of a key resource.\n\nObtaining it from our regular distributors could take weeks. Considering how many people desperately need help, stopping research for that long would seriously impact our effort. We’re hoping to find motivated individuals willing to procure and deliver a small scale haul of it for delivery to <EM4>~mission(Destination|Address)</EM4>. \n\nPlease remember that contracted goods are tracked by their legal owners and can't be accepted. \n\nTogether we can make the universe better for all.\n\nNarina Lerrem\nSenior Manager\nClinical Research Outsourcing\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +303 Rep\n<EM4>Tier 2:</EM4> +309 Rep
CleanAir_ResourceGathering_Small_MoldResearch_desc_harvestable=To all available contractors,\n\nRayari needs your assistance. As part of the Alliance Aid effort, our scientists have shifted their entire focus to assisting Levski deal with Molina mold. Unfortunately, the team’s progress has stalled due to a lack of a key resource.\n\nObtaining it from our regular distributors could take weeks. Considering how many people desperately need help, stopping research for that long would seriously impact our effort. We’re hoping to find motivated individuals willing to procure and deliver a small scale haul of it for delivery to <EM4>~mission(Destination|Address)</EM4>. \n\nIf you need help locating this resource, I suggest checking the <EM4>'Forager's Guide'</EM4> in your mobiGlas Journal for more information.\n\nPlease remember that contracted goods are tracked by their legal owners and can't be accepted. \n\nTogether we can make the universe better for all.\n\nNarina Lerrem\nSenior Manager\nClinical Research Outsourcing\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +255
CleanAir_ResourceGathering_Small_MoldResearch_title=Alliance Aid: Small Supply of Research Resource <EM4>[255–309 Rep]</EM4>
CleanAir_ResourceGathering_Supply_Filters_desc=POSTING: Resource Gathering \nLOCATION: Pyro System, Stanton System\nWORK EXPERIENCE: Mining, Commodity Trading\nTERMS*: \nShubin Interstellar is switching a sizable portion of our focus to assist in the production of ventilation filters to help stop the spread of Molina Mold. Even though we have the capacity and desire to help, our access to one resource is hampering our efforts.\n\nWe’re looking for motivated individuals willing to procure and deliver a medium scale supply of it to our facility at <EM4>~mission(Destination|Address)</EM4> so relief efforts can continue humming along.\n\nResources tied to another contract will not be accepted.\n\n*Shubin Interstellar is an equal opportunity contractor. By accepting this contract you are assuming any and all risks associated with the work outlined herein and in no way can Shubin Interstellar be held accountable for any damages accrued during the duration of the contract.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 5/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +449 Rep\n<EM4>Tier 2:</EM4> +463 Rep
CleanAir_ResourceGathering_Supply_Filters_title=Alliance Aid: Collect Manufacturing Resource - Medium Scale <EM4>[449–463 Rep]</EM4>
CleanAir_ResourceGathering_Supply_MoldResearch_desc=To all available contractors,\n\nGood news! Rayari is working hard to help cure the People’s Ailment. Unfortunately, it has been extremely difficult to procure one key resource through our normal sources. To help us expand our access to it, we will be offering an excellent rate for those who help find and deliver it to our scientists at <EM4>~mission(Destination|Address)</EM4>.\n\nPlease remember that contracted goods are tracked by their legal owners and can't be accepted. \n\nTogether we can make the universe better for all.\n\nNarina Lerrem\nSenior Manager\nClinical Research Outsourcing\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +446 Rep\n<EM4>Tier 2:</EM4> +463 Rep
CleanAir_ResourceGathering_Supply_MoldResearch_title=Alliance Aid: Med. Supply of Research Resource <EM4>[446–463 Rep]</EM4>
CleanAir_Transport-Milestone1_desc=All right, this one is going to be a bit different. See, with everything going on with Alliance Aid, we had a screw up with our contracts and an important shipment got overlooked. Since lives are at stake, and you've already done so much to help the Transport Division, I was kinda hoping that you'd be able to step up and do a double run for us?\n\nThere's a medium scale haul of <EM4>Molina Mold treatment on microtech</EM4> and shipment of <EM4>ventilation filters on Hurston</EM4> waiting for pick-up. You'll need to make both stops, load up everything, and bring it all to <EM4>~mission(Destination|Address)</EM4>. \n \nTo handle the cargo, your ship should be big enough to carry cargo containers up to <EM4>~mission(MissionMaxSCUSize)</EM4> in size. \n\nAnd I would double check to make sure you have your <EM4>handheld tractor beam</EM4> with you before heading out. Would be a huge headache if you forgot to bring one!  \n\nIt's really amazing of you to be helping out like this,\n\nElla Tieno \nJr. Logistics Coordinator \nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Unique, Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Unknown:</EM4> 1\n<EM4>Rep:</EM4> +1,166
CleanAir_Transport-Milestone1_title=Alliance Aid: Double Interstellar Med. Haul (Medical / Filters) <EM4>[1,166 Rep]</EM4>
Covalex_Delivery_Nyx_Medium_Desc_001=Hi,\n\nPretty straightforward this one - We've got a bunch of stuff that needs moving through Nyx and need a competent contractor with a <EM4>handheld tractor beam</EM4> and a ship that can carry <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>.\n\nDetails are attached. Good luck out there!\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nJr. Logistics Coordinator\nCovalex Shipping\n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Neutral:</EM4> +100 Rep
Covalex_Delivery_Nyx_Medium_Title_001=Med. Distance Covalex Delivery Nyx <EM4>[100 Rep]</EM4>
Covalex_Delivery_Stanton_Hard_Desc_001=Hi,\n\nNeed a reliable contractor to pick up some packages for us and deliver them to their destination.\n\nThis route is a longer one so make sure you have enough fuel and don't forget a <EM4>handheld tractor beam</EM4>.\n\nAnd not sure what you were planning on flying, but you'll need a ship that can transport <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nJr. Logistics Coordinator\nCovalex Shipping\n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +100 Rep
Covalex_Delivery_Stanton_Hard_Title_001=Long Distance Covalex Delivery Stanton <EM4>[100 Rep]</EM4>
Covalex_Delivery_Stanton_Medium_Desc_001=Hi,\n\nLooking for a contractor with a ship that can carry <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> to run a delivery for us across Stanton.\n\nThis isn't a particularly long delivery route, but you will be moving between couple of different locations. To make sure things go smoothly, bring enough fuel and a <EM4>handheld tractor beam</EM4> to speed up moving the boxes.\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nJr. Logistics Coordinator\nCovalex Shipping\n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Neutral:</EM4> +100 Rep
Covalex_Delivery_Stanton_Medium_Title_001=Med. Distance Covalex Delivery Stanton <EM4>[100 Rep]</EM4>
Covalex_Delivery_Stanton_Super_Desc_001=Got a special assignment - Loads of packages ready to delivered across the system. Its a bit more than the usual so I'm only reaching out to my best contractors for this one.\n\nObviously, a part of that payment will be to cover your fuel because you'll be going super far with this one. You'll need all the usual as well like a <EM4>handheld tractor beam</EM4> and a ship with space to store <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>.\n\nGood luck. I'm counting on you.\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nJr. Logistics Coordinator\nCovalex Shipping\n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Sr. Contractor:</EM4> +200 Rep
Covalex_Delivery_Stanton_Super_Title_001=Special Covalex Delivery Stanton System <EM4>[200 Rep]</EM4>
Covalex_Delivery_Stanton_VeryHard_Desc_001=Hiya,\n\nCovalex requires a safe pair of hands to pick up some packages and get them where they need to go.\n\nDesignating this a long distance delivery so stock up on fuel and supplies. And definitely make sure you bring a <EM4>handheld tractor beam</EM4>.\n\nAs for what ship to bring, you'll also need something that can move <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>.\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nJr. Logistics Coordinator\nCovalex Shipping\n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Contractor:</EM4> +150 Rep
Covalex_Delivery_Stanton_VeryHard_Title_001=Very Long Distance Covalex Delivery Stanton <EM4>[150 Rep]</EM4>
Covalex_HaulCargo_AToB_Intro_desc=Earning such accolades as 'Imperial Finances' Top 10 Shipping Companies' and 'Delivery Digest's 2945's Most Trusted Transport,' Covalex is busier than ever. And that means more cargo going to more places. That's where you come in.  \n\nCovalex is looking for dependable and industrious pilots to join our expanding family. Do you have access to a ship that can hold <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>? Can you pass an Advocacy background check if required? Then a universe of opportunity is waiting for you. \n\nSimply complete an 'Evaluation Trial’ by picking up a shipment of <EM4>~mission(Item)</EM4> from a freight elevator at <EM4>~mission(Location|Address)</EM4> and successfully delivering it to a freight elevator at <EM4>~mission(Destination|Address)</EM4>.\n\nUpon satisfactory completion, you'll be eligible to become part of Covalex Shipping's vast network of independent transport specialists*.\n\nBy the way, we strongly encourage contractors to bring a <EM4>handheld tractor beam</EM4> along.   \n\n\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\n*Covalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +50
Covalex_HaulCargo_AToB_Intro_title=Opportunity for Independent Cargo Hauler <EM4>[100 Rep]</EM4>
Covalex_HaulCargo_AToB_Rehire_desc=Hey,\n\nHave a bit of good news for you. Covalex recently finished an evaluation of our contractor pool, and decided to reconsider your status as a cargo hauler. To requalify, all you need is to successfully complete the following delivery.\n\nPick up <EM4>~mission(Item)</EM4> from a freight elevator at <EM4>~mission(Location|Address)</EM4> and deliver it to a freight elevator at <EM4>~mission(Destination|Address)</EM4>. In order to complete this haul in a fast and efficient manner, you'll need a ship that can haul <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>.\n\nHopefully everything goes smoothly so we can welcome you back to the team.\n\nBy the way, we strongly encourage contractors to bring a <EM4>handheld tractor beam</EM4> along.   \n\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +50
Covalex_HaulCargo_AToB_Rehire_title=Covalex Cargo Hauling Re-evaluation <EM4>[50 Rep]</EM4>
Covalex_HaulCargo_AToB_Scrap=Hello,\n\nThere’s some junk waiting at a freight elevator in <EM4>~mission(Location|Address)</EM4> that needs to go to a freight elevator at <EM4>~mission(Destination|Address)</EM4> for processing. I've confirmed that the containers won't be bigger than <EM4>~mission(MissionMaxSCUSize)</EM4>. \n\nMy mom would’ve loved this run. She’s one of those who thinks every scrapyard is filled with hidden treasures. Can’t even tell you how many hours I spent bored out of my mind following her around one. If that’s your thing, here’s a chance to actually make credits going to one.\n\nBy the way, we strongly encourage contractors to bring a <EM4>handheld tractor beam</EM4> along.   \n \n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 3/7\n<EM4>Rep:</EM4> +500
Covalex_HaulCargo_AToB_Stanton_Interstellar=Hey,\n\nAny interest in doing the Stanton leg of an interstellar run? \n\nThere’s a haul of <EM4>~mission(Item)</EM4> waiting in containers <EM4>~mission(MissionMaxSCUSize)</EM4> or smaller to be picked up from a freight elevator at <EM4>~mission(Location|Address)</EM4> and delivered to a freight elevator at <EM4>~mission(Destination|Address)</EM4>. No need to take it any further than that. I’ve got someone else lined up to run it through the jump to its final destination. \n\nBy the way, we strongly encourage contractors to bring a <EM4>handheld tractor beam</EM4> along.   \n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +2,000
Covalex_HaulCargo_AToB_title=~mission(ReputationRank) Rank - Direct ~mission(CargoGradeToken) Cargo Haul <EM4>[BP?]</EM4> <EM4>[50–4,000 Rep]</EM4>
Covalex_HaulCargo_AtoB_desc_DeliverAll=Hiya, \n\nHere’s the deal, I need someone good for a special run. We’ve got an important client that’s threatening to take their business elsewhere, because their deliveries are consistently missing cargo. They’re demanding that 100% of the cargo be delivered on this run, or they won’t pay. Since this was before my time and my supervisor wants to show that it won’t happen again, they agreed with this. Anyway, I think you might be a good fit. \n\nIf you’re willing to take that risk too, here are all the pertinent details. The cargo can be collected from <EM4>~mission(Location|Address)</EM4> and delivered to <EM4>~mission(Destination|Address)</EM4>. Looks like the largest cargo container you’ll need to handle is <EM4>~mission(MissionMaxSCUSize)</EM4>, so be sure to bring a ship big enough and a <EM4>handheld tractor beam</EM4> to help you move those containers around.  \n \n~mission(Contractor|SignOff) \n\nElla Tieno \nJr. Logistics Coordinator \nCovalex Shipping   \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-A] Palisade\n- [IND-S2-A] Rampart\n- [IND-S3-A] Parapet\n- [MIL-S1-A] VK-00\n- [MIL-S1-B] Siren\n- [MIL-S2-A] XL-1\n- [MIL-S2-B] Yeager\n- [MIL-S3-A] TS-2\n- [MIL-S3-B] Balandin\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x24\n<EM4>Blueprint Reward:</EM4> Guaranteed
Covalex_HaulCargo_AtoB_desc_FromLevski=Hey there, \n\nSo the People’s Alliance hired us to move a load of cargo from Levski to <EM4>~mission(Destination|Address)</EM4>. Honestly, I’m surprised that they export some of this stuff, but I guess they must sell something to be able to afford everything they import. \n\nFor the run itself, you’ll need a ship that can hold <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>handheld tractor beam</EM4> to handle the containers. That should be it.  \n\n~mission(Contractor|SignOff)\n  \nElla Tieno \nJr. Logistics Coordinator \nCovalex Shipping   \n'Anything you need, anywhere you need it.' \n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-A] Palisade\n- [IND-S2-A] Rampart\n- [IND-S3-A] Parapet\n- [MIL-S1-A] VK-00\n- [MIL-S1-B] Siren\n- [MIL-S2-A] XL-1\n- [MIL-S2-B] Yeager\n- [MIL-S3-A] TS-2\n- [MIL-S3-B] Balandin\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x24\n<EM4>Blueprint Reward:</EM4> Guaranteed
Covalex_HaulCargo_AtoB_desc_FromRuinStation=Hey, it’s El. \n\nGot a client at <EM4>~mission(Location|Address)</EM4>, who needs their cargo picked up from Ruin Station. They’ve been waiting there a while and are starting to get a bit impatient. Any chance you could handle this for us? \n\nYou’ll need a ship that can fit <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>handheld tractor beam</EM4> to be able to move them. \n\n~mission(Contractor|SignOff)\n\nElla Tieno \nJr. Logistics Coordinator \nCovalex Shipping   \n'Anything you need, anywhere you need it.' \n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-A] Palisade\n- [IND-S2-A] Rampart\n- [IND-S3-A] Parapet\n- [MIL-S1-A] VK-00\n- [MIL-S1-B] Siren\n- [MIL-S2-A] XL-1\n- [MIL-S2-B] Yeager\n- [MIL-S3-A] TS-2\n- [MIL-S3-B] Balandin\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x24\n<EM4>Blueprint Reward:</EM4> Guaranteed
Covalex_HaulCargo_AtoB_desc_ProcessedFood_Stanton2=Hi, \n\nLooks like Orison needs another resupply of processed food and pressurized ice. They have this stuff on a standard delivery schedule but they just requested a shipment as soon as possible.  \n\nAre you available to make the run? The stuff (<EM4>~mission(MissionMaxSCUSize) containers</EM4> or smaller) is waiting to be picked up from a freight elevator at <EM4>~mission(Location|Address)</EM4>. Should be a quick and easy run for you to a freight elevator at <EM4>~mission(Destination|Address)</EM4>. \n\nBy the way, we strongly encourage contractors to bring a <EM4>handheld tractor beam</EM4> along.   \n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +2,000
Covalex_HaulCargo_AtoB_desc_RawOre_Stanton1=Hey,\n\nA Hurston logistics manager just requested priority pick up from their facility. Sounds like they struck a new vein of ore and need to make room for what they're extracting.\n\nThe raw ore needs to be moved from a freight elevator at <EM4>~mission(Location|Address)</EM4> to a freight elevator at <EM4>~mission(Destination|Address)</EM4>. Will be containers <EM4>~mission(MissionMaxSCUSize)</EM4> or smaller. Sound like something you could handle? \n\nBy the way, we strongly encourage contractors to bring a <EM4>handheld tractor beam</EM4> along.   \n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 3/7\n<EM4>Rep:</EM4> +500
Covalex_HaulCargo_AtoB_desc_RefinedOre_Stanton4=Hi, \n\n<EM4>~mission(Destination|Address)</EM4> needs a delivery of refined ore to keep their production lines humming. The cargo (<EM4>~mission(MissionMaxSCUSize) containers</EM4> or smaller) is ready and waiting for pick up from a freight elevator at <EM4>~mission(Location|address)</EM4>. Any chance you’re available to collect and deliver it to a freight elevator at ~mission(Destination)?\n\nBy the way, we strongly encourage contractors to bring a <EM4>handheld tractor beam</EM4> along.   \n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +50
Covalex_HaulCargo_AtoB_desc_ScrapWaste_Stanton3=Hey, \n\nThere's a bunch of scrap and waste waiting at a freight elevator at <EM4>~mission(Location|Address)</EM4> that needs to go to a freight elevator at <EM4>~mission(Destination|Address)</EM4> for sorting. I know ArcCorp started an initiative to reduce waste and recycle more scrap on planet, but I haven’t seen any decrease in these types of hauls from them yet.\n\nAre you available to move this batch of assorted junk (<EM4>~mission(MissionMaxSCUSize) containers</EM4> or smaller) off-world for them? \n\nBy the way, we strongly encourage contractors to bring a <EM4>handheld tractor beam</EM4> along.   \n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +50
Covalex_HaulCargo_AtoB_desc_ToLevski=Hi, \n\nThere’s a bunch of cargo at <EM4>~mission(Location|Address)</EM4> that needs to be moved to Levski. The People’s Alliance has a standing order for this stuff because they desperately need it, but it’s not easy to get in Nyx. Funny how they don’t want to be part of the UEE but still rely on us for their survival.  \n\nAnyway, you’ll need a <EM4>handheld tractor beam</EM4> and a ship that can hold <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> to knock this one out. \n\n~mission(Contractor|SignOff) \n \nElla Tieno \nJr. Logistics Coordinator \nCovalex Shipping   \n'Anything you need, anywhere you need it.' \n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-A] Palisade\n- [IND-S2-A] Rampart\n- [IND-S3-A] Parapet\n- [MIL-S1-A] VK-00\n- [MIL-S1-B] Siren\n- [MIL-S2-A] XL-1\n- [MIL-S2-B] Yeager\n- [MIL-S3-A] TS-2\n- [MIL-S3-B] Balandin\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x24\n<EM4>Blueprint Reward:</EM4> Guaranteed
Covalex_HaulCargo_AtoB_desc_ToRuinStation=Hiya, \n\nLooking for a hauler willing to make a run to Ruin Station. Know hauls to Pyro can give some people pause, but this is one we do regularly to help supply the station. I’ve also confirmed that everything on the cargo manifest is above board. \n\nIf you’re interested, the cargo is ready for pick up at <EM4>~mission(Location|Address)</EM4>.  Make sure you bring a <EM4>handheld tractor beam</EM4> and a ship that can hold <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> otherwise it might be a little rough.\n\n~mission(Contractor|SignOff)\n\nElla Tieno \nJr. Logistics Coordinator \nCovalex Shipping   \n'Anything you need, anywhere you need it.' \n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-A] Palisade\n- [IND-S2-A] Rampart\n- [IND-S3-A] Parapet\n- [MIL-S1-A] VK-00\n- [MIL-S1-B] Siren\n- [MIL-S2-A] XL-1\n- [MIL-S2-B] Yeager\n- [MIL-S3-A] TS-2\n- [MIL-S3-B] Balandin\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x24\n<EM4>Blueprint Reward:</EM4> Guaranteed
Covalex_HaulCargo_MultiToSingle_Waste_Waste_Stanton1=Hi,\n\nNeed the trash collected from a few Hurston locations and then taken to a freight elevator at <EM4>~mission(Destination|Address)</EM4>. Don't worry, none of the containers are bigger than <EM4>~mission(MissionMaxSCUSize)</EM4>.\n\nPICK UP LOCATIONS (ANY ORDER)\n\n~mission(MultiToSingleToken)\n\nFun fact for you. Hurston is the only planet in Stanton that doesn’t separate their trash and scrap. One of their workers told me that the company did a cost-benefit analysis on it decades ago that determined it wasn’t worth putting a planet-wide system in place to facilitate it. Isn’t that the most Hurston thing ever?   \n\nBy the way, we strongly encourage contractors to bring a <EM4>handheld tractor beam</EM4> along.   \n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 3/7\n<EM4>Rep:</EM4> +2,000
Covalex_HaulCargo_MultiToSingle_desc_RawOre_Stanton1=Hi,\n\nHurston is requesting that we prioritize pick ups from the local mining facilities to free up space for what they’re extracting. Here’s everywhere you need to go:  \n\nPICK UP LOCATIONS (ANY ORDER)\n\n~mission(MultiToSingleToken)\n\nOnce collected, everything needs to get to a freight elevator at <EM4>~mission(Destination|Address)</EM4>. They've said that all the containers will be at most <EM4>~mission(MissionMaxSCUSize)</EM4> in size. Sound like something you could handle? \n\nBy the way, we strongly encourage contractors to bring a <EM4>handheld tractor beam</EM4> along.   \n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 3/7\n<EM4>Rep:</EM4> +1,000
Covalex_HaulCargo_MultiToSingle_desc_ScrapWaste_Stanton3=Hi there,\n\nThere’s a few sites on ArcCorp that need their waste and scrap collected (all boxes <EM4>~mission(MissionMaxSCUSize)</EM4> or smaller) and taken to a freight elevator at <EM4>~mission(Destination|Address)</EM4>. Doesn’t matter what order you do the run, as long as you grab it all.    \n\nPICK UP LOCATIONS (ANY ORDER)\n\n~mission(MultiToSingleToken)\n\nYou know, my mom was a hauler who specialized in runs like this. It might not be the most glamorous stuff, but she claimed these runs had the best pay-to-risk ratio. Pirates never gave her any trouble when they found out what was on board.  \n\nBy the way, we strongly encourage contractors to bring a <EM4>handheld tractor beam</EM4> along.   \n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 3/7\n<EM4>Rep:</EM4> +2,000
Covalex_HaulCargo_MultiToSingle_title=~mission(ReputationRank) Rank - ~mission(CargoGradeToken) Cargo Haul <EM4>[50–4,000 Rep]</EM4>
Covalex_HaulCargo_SingleToMulti_Processed_Mixed_QTFuelHydroFuelShipAmmo=Hey,\n\nThe folks at <EM4>~mission(Location|Address)</EM4> have what I like to call a “pilot’s special” waiting to be distributed - a haul of quantum fuel, hydrogen fuel, and ship ammo. Load it up from a freight elevator and deliver it to the following spots in whatever order works best for you. Expect the containers to all be <EM4>~mission(MissionMaxSCUSize)</EM4> or smaller.   \n\nDROP OFF LOCATIONS (ANY ORDER)\n\n~mission(SingleToMultiToken) \n\nBy the way, we strongly encourage contractors to bring a <EM4>handheld tractor beam</EM4> along.   \n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +8,000
Covalex_HaulCargo_SingleToMulti_Processed_Stims=Hi,\n\nThere’s a load of stims at <EM4>~mission(Location|Address)</EM4> ready to be picked up from a freight elevator and delivered to a few spots. They will be packaged up in containers <EM4>~mission(MissionMaxSCUSize)</EM4> or smaller. Any chance you can knock this one out for me? \n\nDoesn’t matter what order you drop them off.    \n\nDROP OFF LOCATIONS (ANY ORDER)\n\n~mission(SingleToMultiToken)\n\nGlad I never picked up the habit myself because I swear I get more delivery update requests for “where are my stims?!?” than any other kind of shipment. \n\nBy the way, we strongly encourage contractors to bring a <EM4>handheld tractor beam</EM4> along.   \n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 3/7\n<EM4>Rep:</EM4> +2,000
Covalex_HaulCargo_SingleToMulti_RefinedOre=Hi there,\n\nThe refinery at <EM4>~mission(Location|Address)</EM4> has been busy. They’ve processed a bunch of <EM4>~mission(Item)</EM4> into containers <EM4>~mission(MissionMaxSCUSize)</EM4> or smaller, and are looking to get it shipped out from a freight elevator. I just checked with the LEOs to see which ones needed this stuff and was able to put together this run.  \n\nDROP OFF LOCATIONS (ANY ORDER)\n\n~mission(SingleToMultiToken)\n\nShould be an easy run for you, if you’re free. \n\nBy the way, we strongly encourage contractors to bring a <EM4>handheld tractor beam</EM4> along.   \n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 3/7\n<EM4>Rep:</EM4> +4,000
Covalex_HaulCargo_SingleToMulti_desc_ProcessedFood_Stanton2=Hi, \n\nThere’s a few Crusader facilities that need to be restocked with processed food and pressurized ice. Don’t know why but I’m always surprised when I see how much of this stuff they need delivered.\n\nAnyways, there’s a haul of containers no bigger than <EM4>~mission(MissionMaxSCUSize)</EM4> waiting at <EM4>~mission(Location|Address)</EM4>. Once you grab the goods from a freight elevator, these are the facilities where it needs to go:\n\nDROP OFF LOCATIONS (ANY ORDER)\n\n~mission(SingleToMultiToken) \n\nBy the way, we strongly encourage contractors to bring a <EM4>handheld tractor beam</EM4> along.   \n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +1,000
Covalex_HaulCargo_SingleToMulti_desc_RefinedOre_Mixed=Hey,\n\nThe refinery at <EM4>~mission(Location|Address)</EM4> has been busy. They’ve processed a mix of refined ores and are looking to get the containers (<EM4>~mission(MissionMaxSCUSize)</EM4> or smaller) shipped out from a freight elevator. I just checked with the LEOs to see where this stuff is needed and was able to put together this run.  \n\nDROP OFF LOCATIONS (ANY ORDER)\n\n~mission(SingleToMultiToken)\n\nShould be an easy run for you, if you’re free. \n\nBy the way, we strongly encourage contractors to bring a <EM4>handheld tractor beam</EM4> along.   \n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 3/7\n<EM4>Rep:</EM4> +8,000
Covalex_HaulCargo_SingleToMulti_desc_RefinedOre_Stanton4=Hey there,\n\nThere’s some refined ore in containers <EM4>~mission(MissionMaxSCUSize)</EM4> or smaller that needs to be moved from a freight elevator at <EM4>~mission(Location|Address)</EM4> to production facilities on microTech. You can plan the drop offs anyway you want. Doesn’t matter what order they get done as long as they get there.  \n\nDROP OFF LOCATIONS (ANY ORDER)\n\n~mission(SingleToMultiToken) \n\nBy the way, we strongly encourage contractors to bring a <EM4>handheld tractor beam</EM4> along.   \n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Logistics Coordinator\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +1,000
Covalex_HaulCargo_SingleToMulti_desc_ToCFP_Danger=Hi, \n\nSeveral Citizens for Prosperity outposts in Pyro need supplies. It seems like we regularly do runs like this for them, but this one looks like it might be a bit riskier. A CFP rep let me know that outlaw activity around these sites has spiked recently, but they desperately need these outposts restocked, so we’re going ahead with the delivery. <EM4>Just a head’s up that you could run into trouble, so come prepared</EM4>.       \n\nAll the cargo’s waiting at <EM4>~mission(Location|Address)</EM4> and here’s where it’s heading:  \n\nDROP OFF LOCATIONS (ANY ORDER) \n\n~mission(SingleToMultiToken)  \n\nAccording to the manifest, the largest cargo container you’ll need to deal with is <EM4>~mission(MissionMaxSCUSize)</EM4>. Aside from that, remember to bring a <EM4>handheld tractor beam</EM4> along.    \n\n~mission(Contractor|SignOff) \n  \nElla Tieno \nJr. Logistics Coordinator \nCovalex Shipping   \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-A] Palisade\n- [IND-S2-A] Rampart\n- [IND-S3-A] Parapet\n- [MIL-S1-A] VK-00\n- [MIL-S1-B] Siren\n- [MIL-S2-A] XL-1\n- [MIL-S2-B] Yeager\n- [MIL-S3-A] TS-2\n- [MIL-S3-B] Balandin\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x24\n<EM4>Blueprint Reward:</EM4> Guaranteed
Covalex_HaulCargo_SingleToMulti_desc_Valakkar_Timed=Hi, \n\nOur client took down a Valakkar and processed it into organics. They've got buyers lined up and waiting for the stuff at a few different locations, so I need someone to go to <EM4>~mission(Location|Address)</EM4>, grab it all, and then deliver it to the following spots:    \n\nDROP OFF LOCATIONS (ANY ORDER) \n\n~mission(SingleToMultiToken)  \n\nAccording to the manifest, the largest cargo container you’ll need to deal with is <EM4>~mission(MissionMaxSCUSize)</EM4>. Don’t forget to bring your <EM4>handheld tractor beam</EM4>. Not sure how you’d move this stuff without it.    \n\n~mission(Contractor|SignOff)   \n\nElla Tieno \nJr. Logistics Coordinator \nCovalex Shipping   \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-A] Palisade\n- [IND-S2-A] Rampart\n- [IND-S3-A] Parapet\n- [MIL-S1-A] VK-00\n- [MIL-S1-B] Siren\n- [MIL-S2-A] XL-1\n- [MIL-S2-B] Yeager\n- [MIL-S3-A] TS-2\n- [MIL-S3-B] Balandin\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x24\n<EM4>Blueprint Reward:</EM4> Guaranteed
