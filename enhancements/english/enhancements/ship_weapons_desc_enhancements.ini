item_DescBOMB_S03_FSKI_Thunderball=Manufacturer: FireStorm Kinetics\nItem Type: Explosive Bomb\nSize: 3\n\nTarget ground forces from a safe distance above with the Thunderball. Despite the small size, these S3 bombs pack a powerful payload, allowing users to either deploy multiple bombs to overwhelm a stationary target or drop them at intervals to hit moving targets. The Thunderball uses FireStorm Kinetics' patented Atmo-Xact fins that deploy once dropped to provide additional guidance en route to target.\n\n--- STATS ---\nWeight: 252.0 kg\nComponent HP: 1,000\nOverheat Temp: 450K
item_DescBOMB_S05_FSKI_Stormburst=Manufacturer: FireStorm Kinetics\nItem Type: Explosive Bomb\nSize: 5\n\nWreak havoc on ground forces from the skies above, with the Stormburst. Designed by FireStorm Kinetics to maximize destructive impact at a more moderate size, these S5 bombs feature a mixed composite ordnance to decimate armored targets. The Stormburst also utilizes FireStorm Kinetics' patented Atmo-Xact fins to ensure the payload reaches its target.\n\n--- STATS ---\nWeight: 252.0 kg\nComponent HP: 1,000\nOverheat Temp: 450K
item_DescBOMB_S10_FSKI_Colossus=Manufacturer: FireStorm Kinetics\nItem Type: Explosive Bomb\nSize: 10\n\nFoes below won't stand a chance against a Colossus. FireStorm Kinetics designed this massive S10 bomb to devastate ground targets, whether they're vehicles or structures alike. Meant to be dropped from high altitude, the Colossus features patented Atmo-Xact fins that deploy to provide additional guidance en route to target.\n\n--- STATS ---\nWeight: 951.0 kg\nComponent HP: 1,000\nOverheat Temp: 450K
