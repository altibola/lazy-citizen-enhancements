item_DescBEHR_LaserCannon_S1=Manufacturer: Behring\nItem Type: Laser Cannon\nSize: 1\n\nThe M3A is Behring's entry level laser autocannon. The autocannon configuration offers modest damage per projectile and a fairly low rate of fire. As the most basic offering in Behring's weapons lineup, it features low power consumption, but poor power efficiency. It makes up ground for its shortcomings by being cheap, a feature many pilots are looking for when outfitting their ships on a budget.\n\n--- STATS ---\nWeight: 144.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 182.2 (Energy)  |  DPS: 303.8\nAmmo: 25\nRegen: 1,867/s  |  Cooldown: 0.8s  |  Cost/Shot: 112\nVelocity: 1,200 m/s  |  Range: 2.0 km\nPower Draw: 1 PU/s\nComponent HP: 550\nSignatures:  EM: 348  |  IR: 0\nOverheat Temp: 450K
