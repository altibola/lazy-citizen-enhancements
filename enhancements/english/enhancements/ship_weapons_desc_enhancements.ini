item_DescBEHR_LaserCannon_S5=Manufacturer: Behring\nItem Type: Laser Cannon\nSize: 5\n\nThis versatile long distance energy autocannon is the latest in Behring’s M-Series. The M7A is designed to act as a high impact deterrent effective at medium to long range. The new AC8 Lens system minimizes stopping power loss over distance, making each shot equally effective at longer ranges.\n\n--- STATS ---\nWeight: 5630.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 921.8 (Energy)  |  DPS: 1,536.3\nAmmo: 25\nRegen: 9,483/s  |  Cooldown: 1.5s  |  Cost/Shot: 569\nVelocity: 1,112 m/s  |  Range: 4.0 km\nPower Draw: 2 PU/s\nComponent HP: 2,500\nSignatures:  EM: 941  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_LaserCannon_S6=Manufacturer: Behring\nItem Type: Laser Cannon\nSize: 6\n\nThe M8A laser autocannon exemplifies Behring's extensive history designing and constructing ship armaments. The result is a dependable and effective energy weapon capable of handling large skirmishes or precise defensive maneuvers.\n\n--- STATS ---\nWeight: 14100.0 kg\nFire Rate: 120 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 900.0 (Energy)  |  DPS: 1,800.0\nAmmo: 25\nRegen: 14,292/s  |  Cooldown: 1.5s  |  Cost/Shot: 854\nVelocity: 1,080 m/s  |  Range: 6.0 km\nPower Draw: 2 PU/s\nComponent HP: 4,224\nSignatures:  EM: 1,090  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_LaserCannon_S7=Manufacturer: Behring\nItem Type: Laser Cannon\nSize: 7\n\nStrike at the very heart of your enemies with the devastating impact of Behring's M9A energy autocannon. When fully charged, the massive stopping power of this laser weapon has the potential to halt even capital ships in their tracks.\n\n--- STATS ---\nWeight: 6870000.0 kg\nFire Rate: 10 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 200,000.0 (Phys)  |  DPS: 33,333.3\nAmmo: 21\nVelocity: 924 m/s  |  Range: 12.0 km\nPower Draw: 6 PU/s\nComponent HP: 708,660\nSignatures:  EM: 3,020  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_LaserCannon_SF7E_S7=Manufacturer: Behring\nItem Type: Laser Cannon\nSize: 7\n\nEngineers from Behring and Crusader collaborated to make the SF7E laser cannon the ideal weapon for the Ares Ion Star Fighter. A custom shell allows the massive weapon to seamlessly integrate into the body of the ship. Ideal for long-range engagements involving large and capital-class spacecraft, the SF7E's impressive accuracy and high damage-per-round make it a devastating weapon in the hands of a skilled shooter.\n\n--- STATS ---\nWeight: 35200.0 kg\nFire Rate: 55 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 5,150.0 (Energy)  |  DPS: 4,720.8\nAmmo: 25\nRegen: 21,355/s  |  Cooldown: 1.9s  |  Cost/Shot: 1,200\nVelocity: 1,048 m/s  |  Range: 7.3 km\nPower Draw: 3 PU/s\nComponent HP: 6,750\nSignatures:  EM: 1,450  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_LaserCannon_VNG_S2=Manufacturer: Behring\nItem Type: Laser Cannon\nSize: 2\n\nThe classic M4A has been specially retooled by Behring to create the VS (Vanguard Special), a laser weapon designed to meet the Aegis' unique requirements. The default nose-mounted weapon on the Vanguard Warden, the MVSA can only be loaded onto other Vanguard variants.\n\n--- STATS ---\nWeight: 360.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 273.0 (Energy)  |  DPS: 455.0\nAmmo: 25\nRegen: 2,808/s  |  Cooldown: 1.5s  |  Cost/Shot: 168\nVelocity: 1,196 m/s  |  Range: 2.2 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 708  |  IR: 0\nOverheat Temp: 450K
