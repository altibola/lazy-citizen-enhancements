item_Desc_HRST_Tiburon_S10_laserbeam=Manufacturer: Hurston Dynamics\nType: Laser Beam\nSize: 10\n\nDeveloped in concert with the weapons specialists of Aegis to form part of the dedicated anti-capital ship loadout of the Tiburon, the Supremacy-10T combines surgical precision with devastating destructive power.\n\n--- STATS ---\nWeight: 170000.0 kg\nAmmo: 60\nRegen: 1,700/s  |  Cooldown: 5.0s  |  Cost/Shot: 43\nVelocity: 1,220 m/s  |  Range: 8.0 km\nPower Draw: 2 PU/s\nComponent HP: 750,000\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_Mining_MiningLaser_Drake_Default_S0_Desc=Manufacturer: Drake Interplanetary\nItem Type: Mining Laser \nSize: 1\n\nOptimal Range: 40m\nMaximum Range: 45m\nMining Laser Power: 3150\n\nModule Slots: 2\n \nResistance: +25 %\nLaser Instability: +35 %\nInert Material Level: -30%\nOptimal Charge Window Rate: -40%\n\nBespoke to the Drake Golem, this mining laser was designed for those beginning a career in mining. It's been carefully calibrated to ensure an easy operator experience and reduce the likelihood of catastrophic accidents.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,150  |  Range: 40m→45m\n<EM4>Extraction:</EM4>  DPS: 1,295  |  Range: 40m→45m\n<EM4>Modifiers:</EM4>  Instability: +35%  |  Optimal Charge Window: +40%  |  Resistance: +25%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Greycat_1_S1_Desc=Manufacturer: Greycat Industrial\nItem Type: Mining Laser \nSize: 1\n\nOptimal Range: 30m\nMaximum Range: 90m\n\nMining Laser Power: 504 - 2520\nExtraction Laser Power: 1850\n\nModule Slots: 1\n\nLaser Instability: -10%\nOptimal Charge Window Rate: +40%\nInert Material Level: -30%\n\nOptimal Charge Window Size: -60%\n\nGreycat classifies the Lancet MH1 as a support laser best utilized when mining with others. While the mining laser's small optimal charge window size means precision is key, the Lancet MH1 excels at reducing the amount of inert materials collected by the extraction laser. For mining crews, it's an ideal support laser to use alongside other lasers.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 2,520  |  Range: 30m→90m\n<EM4>Extraction:</EM4>  DPS: 1,850  |  Range: 30m→90m\n<EM4>Modifiers:</EM4>  Instability: -10%  |  Optimal Charge Window: -60%  |  Inert Filter: +30%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Greycat_1_S2_Desc=Manufacturer: Greycat Industrial\nItem Type: Mining Laser \nSize: 2\n\nOptimal Range: 45m\nMaximum Range: 135m\n\nMining Laser Power: 900 - 3600\nExtraction Laser Power: 2590\n\nModule Slots: 2\n\nLaser Instability: -10%\nOptimal Charge Window Rate: +40%\nInert Material Level: -40%\n\nOptimal Charge Window Size: -60%\n\nGreycat classifies the Lancet MH2 as a support laser best utilized when mining with others. While the mining laser's small optimal charge window size means precision is key, the Lancet MH2 excels at filling it once found and reducing the amount of inert materials collected by the extraction laser. For mining crews, it's an ideal support laser to use alongside other lasers.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,600  |  Range: 45m→135m\n<EM4>Extraction:</EM4>  DPS: 2,590  |  Range: 45m→135m\n<EM4>Modifiers:</EM4>  Instability: -10%  |  Optimal Charge Window: -60%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Greycat_Default_S0_Desc=Manufacturer: Greycat Industrial\nItem Type: Mining Laser \nSize: 0\n\nOptimal Range: 15m\nMaximum Range: 20m\nCollection Throughput: 0.01 SCU/s\nCollection Point Radius: 1m\n\nThe Arbor has became the universe's most heralded mining laser thanks to Greycat Industrial's exacting standards and business prowess. The MHV takes that same classic design and reimagines it for a more compact mining-rig while still delivering the solid and reliable performance that miners have come to rely on.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 1  |  Range: 5m→15m\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Greycat_Default_S1_Desc=Manufacturer: Greycat Industrial\nItem Type: Mining Laser \nSize: 1\n\nOptimal Range: 60m\nMaximum Range: 180m\n\nMining Laser Power: 189 - 1890\nExtraction Laser Power: 1850\n\nModule Slots: 1\n\nLaser Instability: -35%\nOptimal Charge Window Size: +40%\nInert Material Level: -30%\n\nResistance: +25%\n\nThe Arbor MH1 became the universe's most heralded mining laser thanks to Greycat Industrial's exacting standards and business prowess. The laser found favor among industrial and solo operations for balancing speed and safety while also featuring a special filtration system that reduces the amount of inert material collected. Greycat capitalized on this reputation by securing exclusive contracts that made the Arbor MH1 the standard laser head on most mining ships.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 1,890  |  Range: 60m→180m\n<EM4>Extraction:</EM4>  DPS: 1,850  |  Range: 60m→180m\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Greycat_Default_S2_Desc=Manufacturer: Greycat Industrial\nItem Type: Mining Laser \nSize: 2\n\nOptimal Range: 90m\nMaximum Range: 270m\n\nMining Laser Power: 480 - 2400\nExtraction Laser Power: 2590\n\nModule Slots: 2\n\nLaser Instability: -35%\nOptimal Charge Window Size: +40%\nInert Material Level: -40%\n\nResistance: +25%\n\nThe Arbor MH2 is the size two version of Greycat's heralded Arbor mining laser series. Like the smaller variant, the Arbor MH2's solid, reliable design found favor among industrial and solo operations for balancing speed and safety while also featuring a special filtration system that reduces the amount of inert material collected.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 2,400  |  Range: 90m→270m\n<EM4>Extraction:</EM4>  DPS: 2,590  |  Range: 90m→270m\n<EM4>Modifiers:</EM4>  Instability: -35%  |  Optimal Charge Window: +40%  |  Resistance: +25%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Shubin_1_S1_Desc=Manufacturer: Shubin Interstellar\nItem Type: Mining Laser \nSize: 1\n\nOptimal Range: 45m\nMaximum Range: 135m\n\nMining Laser Power: 105 - 2100\nExtraction Laser Power: 1295\n\nModule Slots: 1\n\nResistance: -30%\nOptimal Charge Window Rate: +20%\nInert Material Level: -30%\n\nLaser Instability: +10%\n\nThe Hofstede-S1 was designed with a patented crystal lattice structure that dampens a deposit's natural resistance while mining and gathers less inert materials when extracting. Most effective at short and medium range, an accompanying increase in instability means the laser should be managed carefully.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 2,100  |  Range: 45m→135m\n<EM4>Extraction:</EM4>  DPS: 1,295  |  Range: 45m→135m\n<EM4>Modifiers:</EM4>  Instability: +10%  |  Optimal Charge Window: +60%  |  Resistance: -30%  |  Inert Filter: +30%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Shubin_1_S2_Desc=Manufacturer: Shubin Interstellar\nItem Type: Mining Laser \nSize: 2\n\nOptimal Range: 60m\nMaximum Range: 180m\n\nMining Laser Power: 336 - 3360\nExtraction Laser Power: 1295\n\nModule Slots: 2\n\nResistance: -30%\nOptimal Charge Window Rate: +20%\nInert Material Level: -40%\n\nLaser Instability: +10%\n\nThe Hofstede-S2 was designed with a patented crystal lattice structure that dampens a deposit's natural resistance while mining and gathers less inert materials when extracting. Most effective at short and medium range, an accompanying increase in instability means the laser should be managed carefully.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,360  |  Range: 60m→180m\n<EM4>Extraction:</EM4>  DPS: 1,295  |  Range: 60m→180m\n<EM4>Modifiers:</EM4>  Instability: +10%  |  Optimal Charge Window: +60%  |  Resistance: -30%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Shubin_2_S1_Desc=Manufacturer: Shubin Interstellar\nItem Type: Mining Laser \nSize: 1\n\nOptimal Range: 45m\nMaximum Range: 135m\n\nMining Laser Power: 378 - 2220\nExtraction Laser Power: 2220\n\nModule Slots: 0\n\nResistance: -45%\nOptimal Charge Window Size: +20%\nInert Material Level: -30%\n\nLaser Instability: +35%\n\nShubin designed the Klein-S1 to generate a powerful laser that makes mining faster. This power incurs additional risk by boosting a laser's instability, but if used correctly, the Klein-S1 can quickly reap rewards for the careful miner.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 2,520  |  Range: 45m→135m\n<EM4>Extraction:</EM4>  DPS: 2,220  |  Range: 45m→135m\n<EM4>Modifiers:</EM4>  Instability: +35%  |  Optimal Charge Window: +20%  |  Resistance: -45%  |  Inert Filter: +30%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Shubin_2_S2_Desc=Manufacturer: Shubin Interstellar\nItem Type: Mining Laser \nSize: 2\n\nOptimal Range: 60m\nMaximum Range: 180m\n\nMining Laser Power: 720 - 3600\nExtraction Laser Power: 2775\n\nModule Slots: 1\n\nResistance: -45%\nOptimal Charge Window Size: +20%\nInert Material Level: -40%\n\nLaser Instability: +35%\n\nShubin designed the Klein-S2 to generate a powerful laser that makes mining faster. This power incurs additional risk by boosting a laser's instability, but if used correctly, the Klein-S2 can quickly reap rewards for the careful miner.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,600  |  Range: 60m→180m\n<EM4>Extraction:</EM4>  DPS: 2,775  |  Range: 60m→180m\n<EM4>Modifiers:</EM4>  Instability: +35%  |  Optimal Charge Window: +20%  |  Resistance: -45%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Thermyte_1_S1_Desc=Manufacturer: Thermyte Concern\nItem Type: Mining Laser \nSize: 1\n\nOptimal Range: 45m\nMaximum Range: 135m\n\nMining Laser Power: 420 - 2100\nExtraction Laser Power: 2775\n\nModule Slots: 2\n\nLaser Instability: -10%\nOptimal Charge Window Size: +20%\nInert Material Level: -30%\n\nResistance: +10%\nOptimal Charge Window Rate: -40%\n\n\nThe Impact I excels in a variety of mining situations. Special focus lenses make it easier to work a deposit by stabilizing the laser and increasing the optimal charge window. There are drawbacks, including increased deposit resistance and a slower filling optimal charge window, but Thermyte Concern also provided two module slots to allow miners to better customize the laser to the task at hand.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 2,100  |  Range: 45m→135m\n<EM4>Extraction:</EM4>  DPS: 2,775  |  Range: 45m→135m\n<EM4>Modifiers:</EM4>  Instability: -10%  |  Optimal Charge Window: +20%  |  Resistance: +10%  |  Inert Filter: +30%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Thermyte_1_S2_Desc=Manufacturer: Thermyte Concern\nItem Type: Mining Laser \nSize: 2\n\nOptimal Range: 60m\nMaximum Range: 180m\n\nMining Laser Power: 840 - 3360\nExtraction Laser Power: 3145\n\nModule Slots: 3\n\nLaser Instability: -10%\nOptimal Charge Window Size: +20%\nInert Material Level: -40%\n\nResistance: +10%\nOptimal Charge Window Rate: -40%\n\nThe Impact II excels in a variety of mining situations. Special focus lenses make it easier to work a deposit by stabilizing the laser and increasing the optimal charge window. There are drawbacks, including increased deposit resistance and a slower filling optimal charge window, but Thermyte Concern also provided three module slots to allow miners to better customize the laser to the task at hand.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,360  |  Range: 60m→180m\n<EM4>Extraction:</EM4>  DPS: 3,145  |  Range: 60m→180m\n<EM4>Modifiers:</EM4>  Instability: -10%  |  Optimal Charge Window: +20%  |  Resistance: +10%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Thermyte_2_S1_Desc=Manufacturer: Thermyte Concern\nItem Type: Mining Laser \nSize: 1\n\nOptimal Range: 15m\nMaximum Range: 45m\n\nMining Laser Power: 630 - 3150\nExtraction Laser Power: 1850\n\nModule Slots: 2\n\nResistance: -30%\nInert Material Level: -30%\n\nOptimal Charge Window Size: -40%\n\nTo some, the effective use of the Helix I has become a sign of a true mining professional. Thermyte Concern gave the laser impressive power that can bypass a deposit's resistance but also requires precision handling to hit the optimal charge window. Best deployed at close range, Helix I features two module slots so miners can tailor the laser to their liking.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,150  |  Range: 15m→45m\n<EM4>Extraction:</EM4>  DPS: 1,850  |  Range: 15m→45m\n<EM4>Modifiers:</EM4>  Optimal Charge Window: -40%  |  Resistance: -30%  |  Inert Filter: +30%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Thermyte_2_S2_Desc=Manufacturer: Thermyte Concern\nItem Type: Mining Laser \nSize: 2\n\nOptimal Range: 30m\nMaximum Range: 90m\n\nMining Laser Power: 1020 - 4080\nExtraction Laser Power: 2590\n\nModule Slots: 3\n\nResistance: -30%\nInert Material Level: -40%\n\nOptimal Charge Window Size: -40%\n\nTo some, the effective use of the Helix II has become a sign of a true mining professional. Thermyte Concern gave the laser impressive power that can bypass a deposit's resistance but also requires precision handling to hit the optimal charge window. Best deployed at close range, Helix II features three module slots so miners can tailor the laser to their liking.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 4,080  |  Range: 30m→90m\n<EM4>Extraction:</EM4>  DPS: 2,590  |  Range: 30m→90m\n<EM4>Modifiers:</EM4>  Optimal Charge Window: -40%  |  Resistance: -30%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
