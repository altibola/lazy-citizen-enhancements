item_DescBEHR_BallisticRepeater_S3=Manufacturer: Behring\nItem Type: Ballistic Repeater\nSize: 3\n\nBlast your way out of trouble with this Behring size three ballistic repeater. The SW16BR3 "Shredder" distributes heat across both barrels to keep it firing when needed most. The weapon's shot grouping and damage falloff make it most deadly at medium or close range.\n\n--- STATS ---\nWeight: 225.0 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 81.0 (Phys)  |  DPS: 675.0\nAmmo: 2,589\nVelocity: 1,480 m/s  |  Range: 2.4 km\nPower Draw: 0 PU/s\nComponent HP: 1,024\nSignatures:  EM: 40  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_BallisticRepeater_VNG_S2=Manufacturer: Behring\nItem Type: Ballistic Repeater\nSize: 2\n\nOnly Vanguard owners can equip this unique version of Behring's line of ballistic repeaters to the nose of their ship. The BRVS is carefully calibrated so its ballistic barrage would fire fast enough to provide maximum target saturation while its improved venting reduces frequent overheating.\n\n--- STATS ---\nWeight: 90.0 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 54.0 (Phys)  |  DPS: 450.0\nAmmo: 2,637\nVelocity: 1,495 m/s  |  Range: 2.2 km\nPower Draw: 0 PU/s\nComponent HP: 850\nSignatures:  EM: 40  |  IR: 0\nOverheat Temp: 450K
