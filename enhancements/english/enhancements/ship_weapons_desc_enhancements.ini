item_descMining_Head_S00_Klein_SCItem=Manufacturer: Argo Astronautics\nItem Type: Mining Laser\nSize: S0\nGrade: C\n \nOptimal Range: 25 m\nMaximum Range: 25 m\nGather Radius: 1 m\nExtraction Throughput: 4 cSCU/s\n \nPower Transfer: 35\n \nInstability: +30 %\nResistance: -40 %\nOptimal Charge Window Size: +40 %\nOptimal Charge Window Rate: 0%\nThrottle min: 20%\n\nThe Lawson mining laser was developed by Argo Astronautics and specifically tuned for the ATLS GEO to make mining resources from the power suit as intuitive as possible.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 1  |  Range: 5m→15m\n<EM4>Modifiers:</EM4>  Instability: +30%  |  Optimal Charge Window: +40%  |  Resistance: -40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
