items_commodities_glacosite_desc=As glaciers form, heavier mineral contents sink over time and are then crushed by the weight above as the ice deforms and flows. When the glacier recedes, Glacosite deposits are left behind. White and blue in color, the crystals form in long shiny strands that almost are cotton-like in appearance. Glacosite has found specialized commercial use since it is an extremely light and durable insulator.\n\n<EM3>BLUEPRINT DATA</EM3>\n- vehiclegear/shield: 24 items
