item_DescAPAR_BallisticScatterGun_S2=Fabricante: Apocalypse Arms\nTipo de Item: Espingarda Balística\nTamanho: 2\n\nA Hellion de Apocalypse Arms é uma espingarda tamanho dois que satura alvos próximos com munição balística. A funcionalidade de munição inteligente da arma permite alternar entre munição padrão e especial.\n\n--- STATS ---\nWeight: 150.0 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 560.0 x8 (Phys)  |  DPS: 560.0\nAmmo: 2,019\nVelocity: 897 m/s  |  Range: 1.4 km\nPower Draw: 0 PU/s\nComponent HP: 1,550\nSignatures:  EM: 41  |  IR: 0\nOverheat Temp: 450K
