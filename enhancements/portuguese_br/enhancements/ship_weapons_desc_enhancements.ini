item_DescMXOX_EMP_Device=Fabricante: MaxOx\nTipo de item: Gerador de explosão\nTamanho: 1\nTipo de dano: EMP\n\nO TroMag da MaxOx é um gerador de explosão de EMP bem projetado e confiável com foco em EMP. Sua popularidade aumentou ao longo dos anos à medida que os pilotos procuravam alternativas ao REP-8 da Behring. O TroMag apresenta um tempo de recarga mais rápido que seu principal concorrente, mas tem um raio de efeito menor, então os pilotos devem decidir se preferem velocidade ou tamanho.\n\n--- STATS ---\nWeight: 10.0 kg\nPower Draw: 1 PU/s\nComponent HP: 150\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescMXOX_NeutronCannon_S1=Fabricante: MaxOx\nTipo de Item: Canhão de Nêutrons\nTamanho: 1\n\nO Canhão de Nêutrons NN-13 da MaxOx oferece uma enorme carga de energia em detrimento da velocidade e da eficiência energética. Alguém poderia argumentar os méritos da velocidade, Cadência e distância em relação ao dano, mas o argumento se torna irrelevante se você precisar acertá-los apenas uma vez.\n\n--- STATS ---\nWeight: 32.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 101.2 (Energy)  |  DPS: 253.0\nAmmo: 25\nRegen: 1,500/s  |  Cooldown: 0.5s  |  Cost/Shot: 90\nVelocity: 765 m/s  |  Range: 1.2 km\nPower Draw: 1 PU/s\nComponent HP: 550\nSignatures:  EM: 205  |  IR: 0\nOverheat Temp: 450K
item_DescMXOX_NeutronCannon_S2=Fabricante: MaxOx\nTipo de item: Canhão de nêutrons\nTamanho: 2\n\nCom base na tecnologia do NN-13, o NN-14 da MaxOx oferece um aumento significativo de potência ao canhão automático de nêutrons para adicionar um efeito devastador a cada tiro . Porém, com o aumento dos danos vem um maior consumo de energia.\n\n--- STATS ---\nWeight: 80.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 152.8 (Energy)  |  DPS: 382.0\nAmmo: 25\nRegen: 2,250/s  |  Cooldown: 0.4s  |  Cost/Shot: 135\nVelocity: 762 m/s  |  Range: 1.3 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 273  |  IR: 0\nOverheat Temp: 450K
item_DescMXOX_NeutronCannon_S3=Fabricante: MaxOx \nTipo de Item: Canhão de Nêutrons \nTamanho: 3  \n\nBaseando-se na tecnologia da bem-sucedida série NN, o NN-15 da MaxOx oferece um aumento significativo de potência para o autocanhão de nêutrons, garantindo que cada disparo tenha um impacto devastador. No entanto, esse aumento de dano também exige mais energia do seu gerador.\n\n--- STATS ---\nWeight: 200.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 220.7 (Energy)  |  DPS: 551.8\nAmmo: 25\nRegen: 3,375/s  |  Cooldown: 0.4s  |  Cost/Shot: 202\nVelocity: 755 m/s  |  Range: 1.5 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 341  |  IR: 0\nOverheat Temp: 450K
item_DescMXOX_NeutronRepeater_S1=Fabricante: MaxOx\nTipo de item: Repetidor de nêutrons\nTamanho: 1\n\nO NDB-26 usa um sistema de cano duplo para disparar projéteis de nêutrons em altas velocidades. Este repetidor de nêutrons é devastador a curta distância, mas tem força suficiente, mesmo a médio alcance, para convencer qualquer atacante a reconsiderar seu ataque.\n\n--- STATS ---\nWeight: 16.0 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 38.0 (Energy)  |  DPS: 316.5\nAmmo: 75\nRegen: 1,758/s  |  Cooldown: 0.7s  |  Cost/Shot: 32\nVelocity: 1,275 m/s  |  Range: 2.0 km\nPower Draw: 0 PU/s\nComponent HP: 525\nSignatures:  EM: 138  |  IR: 0\nOverheat Temp: 450K
item_DescMXOX_NeutronRepeater_S2=Fabricante: MaxOx\nTipo de item: Repetidor de nêutrons\nTamanho: 2\n\nO MaxOx NDB-28, com seu design elegante e científico, é o próximo passo em direção a um grande poder de parada. Cilindros duplos sobrepõem as explosões para um fogo sustentado de nêutrons que permanece eficaz em distâncias curtas e médias.\n\n--- STATS ---\nWeight: 40.0 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 57.0 (Energy)  |  DPS: 474.8\nAmmo: 75\nRegen: 2,638/s  |  Cooldown: 0.8s  |  Cost/Shot: 48\nVelocity: 1,271 m/s  |  Range: 2.2 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 184  |  IR: 0\nOverheat Temp: 450K
