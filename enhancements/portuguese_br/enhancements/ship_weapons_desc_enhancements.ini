item_DescKLWE_LaserRepeater_S1=Fabricante: Klaus & Werner\nTipo de item: Repetidor de laser\nTamanho: 1\n\nO repetidor de laser Klaus & Werner CF-117 Bulldog apresenta um design de tiro sequencial de três canos e é capaz de disparar tiros de energia de alta velocidade, enquanto mantendo a eficiência térmica, tornando-o um favorito entre os novos pilotos que equipam seu primeiro Nave.\n\n--- STATS ---\nWeight: 24.0 kg\nFire Rate: 750 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 11.3 (Energy)  |  DPS: 141.2\nAmmo: 70\nRegen: 1,355/s  |  Cooldown: 0.7s  |  Cost/Shot: 22\nVelocity: 1,500 m/s  |  Range: 1.6 km\nPower Draw: 0 PU/s\nComponent HP: 525\nSignatures:  EM: 152  |  IR: 0\nOverheat Temp: 450K
