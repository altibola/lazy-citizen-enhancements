item_DescAPAR_MassDriver_S2=Fabricante: Apocalypse Arms\nTipo de item: Canhão Mass Driver\nTamanho: 2\n\nSempre vale a pena estar preparado, e se o infortúnio acontecer, você ficará feliz por ter um Apocalypse Arms Strife Mass Driver na ponta dos dedos . Seus aceleradores eletromagnéticos consomem um pouco de energia, mas ele compensa isso com a velocidade com que dispara seus projéteis de alta velocidade. Vê-lo atingir seu objetivo pode tornar qualquer dia ruim um pouco mais brilhante. Apenas certifique-se de que não superaqueça.\n\n--- STATS ---\nWeight: 600.0 kg\nFire Rate: 30 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 525.0 (Phys)  |  DPS: 262.5\nAmmo: 84\nVelocity: 1,151 m/s  |  Range: 3.2 km\nPower Draw: 2 PU/s\nComponent HP: 1,050\nSignatures:  EM: 792  |  IR: 0\nOverheat Temp: 450K
