item_Mining_MiningLaser_Drake_Default_S0_Desc=Fabricante: Drake Interplanetary\nTipo de item: Laser de mineração\nTamanho: 1\n\nAlcance ideal: 40m\nAlcance máximo: 45m\nPotência do laser de mineração: 3150\n\nRanhuras de módulo: 2\n\nResistência: +25%\nInstabilidade do laser: +35%\nNível de material inerte: -30%\nTaxa de janela de carga ideal: -40%\n\nPersonalizado para o Drake Golem, esse laser de mineração foi projetado para aqueles que estão começando uma carreira na mineração. Ele foi cuidadosamente calibrado para garantir uma experiência fácil para o operador e reduzir a probabilidade de acidentes catastróficos.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,150  |  Range: 40m→45m\n<EM4>Extraction:</EM4>  DPS: 1,295  |  Range: 40m→45m\n<EM4>Modifiers:</EM4>  Instability: +35%  |  Optimal Charge Window: +40%  |  Resistance: +25%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Greycat_1_S1_Desc=Fabricante: Greycat Industrial\nTipo de item: Laser de mineração \nTamanho: 1\n\nAlcance ideal: 30m\nAlcance máximo: 90m\n\nPotência do laser de mineração: 504 - 2520\nPotência do laser de extração: 1850\n\nSlots de módulo: 1\n\nInstabilidade do laser: -10%\nTaxa ideal da janela de carga: +40%\nNível de material inerte: -30%\n\nTamanho ideal da janela de carga: -60%\n\nA Greycat classifica o Lancet MH1 como um laser de suporte melhor utilizado ao minerar com outros. Embora o pequeno tamanho ideal da janela de carga do laser de mineração signifique que a precisão é fundamental, o Lancet MH1 é excelente na redução da quantidade de materiais inertes coletados pelo laser de extração. Para equipes de mineração, é um laser de suporte ideal para usar junto com outros lasers.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 2,520  |  Range: 30m→90m\n<EM4>Extraction:</EM4>  DPS: 1,850  |  Range: 30m→90m\n<EM4>Modifiers:</EM4>  Instability: -10%  |  Optimal Charge Window: -60%  |  Inert Filter: +30%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Greycat_1_S2_Desc=Fabricante: Greycat Industrial\nTipo de item: Laser de mineração \nTamanho: 2\n\nAlcance ideal: 45m\nAlcance máximo: 135m\n\nPotência do laser de mineração: 900 - 3600\nPotência do laser de extração: 2590\n\nSlots de módulo: 2\n\nInstabilidade do laser: -10%\nTaxa ideal da janela de carga: +40%\nNível de material inerte: -40%\n\nTamanho ideal da janela de carga: -60%\n\nGreycat classifica o Lancet MH2 como um laser de suporte melhor utilizado ao minerar com outros. Embora o pequeno tamanho ideal da janela de carga do laser de mineração signifique que a precisão é fundamental, o Lancet MH2 é excelente em preenchê-la uma vez encontrada e em reduzir a quantidade de materiais inertes coletados pelo laser de extração. Para equipes de mineração, é um laser de suporte ideal para usar junto com outros lasers.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,600  |  Range: 45m→135m\n<EM4>Extraction:</EM4>  DPS: 2,590  |  Range: 45m→135m\n<EM4>Modifiers:</EM4>  Instability: -10%  |  Optimal Charge Window: -60%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Greycat_Default_S0_Desc=Fabricante: Greycat Industrial\nTipo de item: Laser de mineração \nTamanho: 0\n\nAlcance ideal: 15m\nAlcance máximo: 20m\nTaxa de transferência de coleta: 0,01 SCU/s\nRaio do ponto de coleta: 1m\n\nO Arbor se tornou o maior do universo laser de mineração anunciado graças aos padrões exigentes e às proezas comerciais da Greycat Industrial. O MHV pega o mesmo design clássico e o reinventa para uma plataforma de mineração mais compacta, ao mesmo tempo em que oferece o desempenho sólido e confiável no qual os mineradores passaram a confiar.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 1  |  Range: 5m→15m\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Greycat_Default_S1_Desc=Fabricante: Greycat Industrial\nTipo de item: Laser de mineração \nTamanho: 1\n\nAlcance ideal: 60m\nAlcance máximo: 180m\n\nPotência do laser de mineração: 189 - 1890\nPotência do laser de extração: 1850\n\nSlots de módulo: 1\n\nInstabilidade do laser: -35%\nTamanho ideal da janela de carga: +40%\nNível de material inerte: -30%\n\nResistência: +25%\n\nO Arbor MH1 se tornou o laser de mineração mais aclamado do universo graças ao Greycat Industrial padrões exigentes e capacidade empresarial. O laser foi apreciado entre as operações industriais e individuais por equilibrar velocidade e segurança, ao mesmo tempo que apresenta um sistema de filtragem especial que reduz a quantidade de material inerte coletado. A Greycat capitalizou essa reputação ao garantir contratos exclusivos que tornaram o Arbor MH1 o cabeçote laser padrão na maioria das naves de mineração.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 1,890  |  Range: 60m→180m\n<EM4>Extraction:</EM4>  DPS: 1,850  |  Range: 60m→180m\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Greycat_Default_S2_Desc=Fabricante: Greycat Industrial\nTipo de item: Laser de mineração \nTamanho: 2\n\nAlcance ideal: 90m\nAlcance máximo: 270m\n\nPotência do laser de mineração: 480 - 2400\nPotência do laser de extração: 2590\n\nSlots de módulo: 2\n\nInstabilidade do laser: -35%\nTamanho ideal da janela de carga: +40%\nNível de material inerte: -40%\n\nResistência: +25%\n\nO Arbor MH2 é a versão tamanho dois do aclamado laser de mineração Arbor da Greycat Series. Tal como a variante mais pequena, o design sólido e fiável do Arbor MH2 encontrou popularidade entre as operações industriais e individuais para equilibrar velocidade e segurança, ao mesmo tempo que apresenta um sistema de filtragem especial que reduz a quantidade de material inerte recolhido.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 2,400  |  Range: 90m→270m\n<EM4>Extraction:</EM4>  DPS: 2,590  |  Range: 90m→270m\n<EM4>Modifiers:</EM4>  Instability: -35%  |  Optimal Charge Window: +40%  |  Resistance: +25%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Shubin_1_S1_Desc=Fabricante: Shubin Interestelar\nTipo de item: Laser de mineração \nTamanho: 1\n\nAlcance ideal: 45m\nAlcance máximo: 135m\n\nPotência do laser de mineração: 105 - 2100\nPotência do laser de extração: 1295\n\nSlots de módulo: 1\n\nResistência: -30%\nTaxa ideal da janela de carga: +20%\nNível de material inerte: -30%\n\nInstabilidade do laser: +10%\n\nO Hofstede-S1 foi projetado com uma estrutura de rede de cristal patenteada que amortece aumenta a resistência natural de um depósito durante a mineração e reúne menos materiais inertes durante a extração. Mais eficaz em curto e médio alcance, um aumento concomitante na instabilidade significa que o laser deve ser manejado com cuidado.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 2,100  |  Range: 45m→135m\n<EM4>Extraction:</EM4>  DPS: 1,295  |  Range: 45m→135m\n<EM4>Modifiers:</EM4>  Instability: +10%  |  Optimal Charge Window: +60%  |  Resistance: -30%  |  Inert Filter: +30%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Shubin_1_S2_Desc=Fabricante: Shubin Interestelar\nTipo de item: Laser de mineração \nTamanho: 2\n\nAlcance ideal: 60m\nAlcance máximo: 180m\n\nPotência do laser de mineração: 336 - 3360\nPotência do laser de extração: 1295\n\nSlots de módulo: 2\n\nResistência: -30%\nTaxa ideal da janela de carga: +20%\nNível de material inerte: -40%\n\nInstabilidade do laser: +10%\n\nO Hofstede-S2 foi projetado com uma estrutura de rede de cristal patenteada que amortece aumenta a resistência natural de um depósito durante a mineração e reúne menos materiais inertes durante a extração. Mais eficaz em curto e médio alcance, um aumento concomitante na instabilidade significa que o laser deve ser manejado com cuidado.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,360  |  Range: 60m→180m\n<EM4>Extraction:</EM4>  DPS: 1,295  |  Range: 60m→180m\n<EM4>Modifiers:</EM4>  Instability: +10%  |  Optimal Charge Window: +60%  |  Resistance: -30%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Shubin_2_S1_Desc=Fabricante: Shubin Interestelar\nTipo de item: Laser de mineração \nTamanho: 1\n\nAlcance ideal: 45m\nAlcance máximo: 135m\n\nPotência do laser de mineração: 378 - 2220\nPotência do laser de extração: 2220\n\nSlots de módulo: 0\n\nResistência: -45%\nTamanho ideal da janela de carga: +20%\nNível de material inerte: -30%\n\nInstabilidade do laser: +35%\n\nShubin projetou o Klein-S1 para gerar um laser poderoso que facilita a mineração mais rápido. Este poder acarreta riscos adicionais ao aumentar a instabilidade do laser, mas se usado corretamente, o Klein-S1 pode rapidamente colher recompensas para o mineiro cuidadoso.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 2,520  |  Range: 45m→135m\n<EM4>Extraction:</EM4>  DPS: 2,220  |  Range: 45m→135m\n<EM4>Modifiers:</EM4>  Instability: +35%  |  Optimal Charge Window: +20%  |  Resistance: -45%  |  Inert Filter: +30%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Shubin_2_S2_Desc=Fabricante: Shubin Interestelar\nTipo de item: Laser de mineração \nTamanho: 2\n\nAlcance ideal: 60m\nAlcance máximo: 180m\n\nPotência do laser de mineração: 720 - 3600\nPotência do laser de extração: 2775\n\nSlots de módulo: 1\n\nResistência: -45%\nTamanho ideal da janela de carga: +20%\nNível de material inerte: -40%\n\nInstabilidade do laser: +35%\n\nShubin projetou o Klein-S2 para gerar um poderoso laser que facilita a mineração mais rápido. Este poder acarreta riscos adicionais ao aumentar a instabilidade do laser, mas se usado corretamente, o Klein-S2 pode rapidamente colher recompensas para o mineiro cuidadoso.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,600  |  Range: 60m→180m\n<EM4>Extraction:</EM4>  DPS: 2,775  |  Range: 60m→180m\n<EM4>Modifiers:</EM4>  Instability: +35%  |  Optimal Charge Window: +20%  |  Resistance: -45%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Thermyte_1_S1_Desc=Fabricante: Thermyte Concern\nTipo de item: Laser de mineração \nTamanho: 1\n\nAlcance ideal: 45m\nAlcance máximo: 135m\n\nPotência do laser de mineração: 420 - 2100\nPotência do laser de extração: 2775\n\nSlots de módulo: 2\n\nInstabilidade do laser: -10%\nTamanho ideal da janela de carga: +20%\nNível de material inerte: -30%\n\nResistência: +10%\nTaxa ideal da janela de carga: -40%\n\n\nO impacto I se destaca em uma variedade de situações de mineração. Lentes de foco especiais facilitam o trabalho de um depósito, estabilizando o laser e aumentando a janela de carga ideal. Existem desvantagens, incluindo maior resistência ao depósito e uma janela de carga ideal de preenchimento mais lento, mas a Thermyte Concern também forneceu dois slots de módulo para permitir que os mineiros personalizem melhor o laser para a tarefa em questão.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 2,100  |  Range: 45m→135m\n<EM4>Extraction:</EM4>  DPS: 2,775  |  Range: 45m→135m\n<EM4>Modifiers:</EM4>  Instability: -10%  |  Optimal Charge Window: +20%  |  Resistance: +10%  |  Inert Filter: +30%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Thermyte_1_S2_Desc=Fabricante: Thermyte Concern\nTipo de item: Laser de mineração \nTamanho: 2\n\nAlcance ideal: 60m\nAlcance máximo: 180m\n\nPotência do laser de mineração: 840 - 3360\nPotência do laser de extração: 3145\n\nSlots de módulo: 3\n\nInstabilidade do laser: -10%\nTamanho ideal da janela de carga: +20%\nNível de material inerte: -40%\n\nResistência: +10%\nTaxa ideal da janela de carga: -40%\n\nO Impact II é excelente em uma variedade de situações de mineração. Lentes de foco especiais facilitam o trabalho de um depósito, estabilizando o laser e aumentando a janela de carga ideal. Existem desvantagens, incluindo maior resistência ao depósito e uma janela de carga ideal de preenchimento mais lento, mas a Thermyte Concern também forneceu três slots de módulo para permitir que os mineiros personalizem melhor o laser para a tarefa em questão.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,360  |  Range: 60m→180m\n<EM4>Extraction:</EM4>  DPS: 3,145  |  Range: 60m→180m\n<EM4>Modifiers:</EM4>  Instability: -10%  |  Optimal Charge Window: +20%  |  Resistance: +10%  |  Inert Filter: +40%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
item_Mining_MiningLaser_Thermyte_2_S1_Desc=Fabricante: Thermyte Concern\nTipo de item: Laser de mineração \nTamanho: 1\n\nAlcance ideal: 15m\nAlcance máximo: 45m\n\nPotência do laser de mineração: 630 - 3150\nPotência do laser de extração: 1850\n\nSlots de módulo: 2\n\nResistência: -30%\nNível de material inerte: -30%\n\nTamanho ideal da janela de carga: -40%\n\nPara alguns, o uso eficaz da Helix I se tornou um sinal de um verdadeiro profissional de mineração. A Thermyte Concern deu ao laser uma potência impressionante que pode contornar a resistência de um depósito, mas também requer um manuseio preciso para atingir a janela de carga ideal. Melhor implantado de perto, o Helix I possui dois slots de módulo para que os mineradores possam personalizar o laser de acordo com sua preferência.\n\n--- STATS ---\n<EM4>Fracture:</EM4>  DPS: 3,150  |  Range: 15m→45m\n<EM4>Extraction:</EM4>  DPS: 1,850  |  Range: 15m→45m\n<EM4>Modifiers:</EM4>  Optimal Charge Window: -40%  |  Resistance: -30%  |  Inert Filter: +30%\n<EM4>Component HP:</EM4> 8,000\n<EM4>Max Distortion:</EM4> 500,000
