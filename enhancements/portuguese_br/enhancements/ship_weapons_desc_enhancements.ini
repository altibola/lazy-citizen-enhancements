item_DescBEHR_LaserCannon_S5=Fabricante: Behring\nTipo de Item: Canhão Laser\nTamanho: 5\n\nEste versátil canhão automático de energia de longo alcance é o modelo mais recente da Série M da Behring. O M7A foi projetado para ser um dissuasor altamente eficaz de médio e longo alcance. O novo sistema de lentes AC8 minimiza a perda de poder de retenção ao longo da distância, para que cada foto seja igualmente eficaz, mesmo em distâncias maiores.\n\n--- STATS ---\nWeight: 5630.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 921.8 (Energy)  |  DPS: 1,536.3\nAmmo: 25\nRegen: 9,483/s  |  Cooldown: 1.5s  |  Cost/Shot: 569\nVelocity: 1,112 m/s  |  Range: 4.0 km\nPower Draw: 2 PU/s\nComponent HP: 2,500\nSignatures:  EM: 941  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_LaserCannon_S6=Fabricante: Behring\nTipo de Item: Canhão Laser\nTamanho: 6\n\nO canhão automático laser M8A é um exemplo dos muitos anos de experiência da Behring no desenvolvimento e construção de armamento naval. O resultado é uma arma de energia confiável e eficaz, adequada tanto para escaramuças em grande escala quanto para manobras defensivas precisas.\n\n--- STATS ---\nWeight: 14100.0 kg\nFire Rate: 120 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 900.0 (Energy)  |  DPS: 1,800.0\nAmmo: 25\nRegen: 14,292/s  |  Cooldown: 1.5s  |  Cost/Shot: 854\nVelocity: 1,080 m/s  |  Range: 6.0 km\nPower Draw: 2 PU/s\nComponent HP: 4,224\nSignatures:  EM: 1,090  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_LaserCannon_S7=Fabricante: Behring\nTipo de Item: Canhão Laser\nTamanho: 7\n\nAtaque os corações de seus inimigos com o efeito devastador do canhão automático de energia M9A de Behring. Quando totalmente carregada, o enorme poder de parada desta arma laser tem o potencial de paralisar até mesmo Naves capitais.\n\n--- STATS ---\nWeight: 6870000.0 kg\nFire Rate: 10 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 200,000.0 (Phys)  |  DPS: 33,333.3\nAmmo: 21\nVelocity: 924 m/s  |  Range: 12.0 km\nPower Draw: 6 PU/s\nComponent HP: 708,660\nSignatures:  EM: 3,020  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_LaserCannon_SF7E_S7=Fabricante: Behring\nTipo de Item: Canhão Laser\nTamanho: 7\n\nEngenheiros de Behring e Crusader trabalharam juntos para fazer do Canhão Laser SF7E a arma ideal para o Ares Ion Star Fighter. Graças a um casco feito sob medida, a enorme arma se encaixa perfeitamente no casco da Nave. O SF7E é ideal para batalhas de longo alcance com Naves espaciais grandes e importantes. Sua impressionante precisão e alto dano por tiro fazem deles uma arma devastadora nas mãos de um atirador habilidoso.\n\n--- STATS ---\nWeight: 35200.0 kg\nFire Rate: 55 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 5,150.0 (Energy)  |  DPS: 4,720.8\nAmmo: 25\nRegen: 21,355/s  |  Cooldown: 1.9s  |  Cost/Shot: 1,200\nVelocity: 1,048 m/s  |  Range: 7.3 km\nPower Draw: 3 PU/s\nComponent HP: 6,750\nSignatures:  EM: 1,450  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_LaserCannon_VNG_S2=Fabricante: Behring\nTipo de Item: Canhão Laser\nTamanho: 2\n\nO clássico M4A foi especialmente convertido por Behring para criar o VS (Vanguard Special), uma arma laser projetada para atender aos requisitos exclusivos do Aegis. A arma padrão montada no nariz do Vanguard Warden só pode ser carregada em outras variantes do Vanguard.\n\n--- STATS ---\nWeight: 360.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 273.0 (Energy)  |  DPS: 455.0\nAmmo: 25\nRegen: 2,808/s  |  Cooldown: 1.5s  |  Cost/Shot: 168\nVelocity: 1,196 m/s  |  Range: 2.2 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 708  |  IR: 0\nOverheat Temp: 450K
