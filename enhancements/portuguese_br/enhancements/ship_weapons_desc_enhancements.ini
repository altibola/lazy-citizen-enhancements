item_DescAEGS_EMP_Device=Fabricante: Behring\nTipo de item: Gerador de EMP\n\nO REP-8 é um gerador de explosão de EMP altamente conceituado da Behring. Ele combina um tempo de carga gerenciável com uma poderosa explosão de danos por distorção que desativa os componentes eletrônicos dentro de seu raio. A engenharia sólida e séculos de uso tornaram-no um meio de dissuasão não letal padrão em todo o Império.\n\n--- STATS ---\nWeight: 4000.0 kg\nPower Draw: 1 PU/s\nComponent HP: 150\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescAEGS_EMP_Sentinel_S4=Fabricante: Behring\nTipo de Item: Gerador de Explosão\nTamanho: 4\nTipo de Dano: EMP\n\nVocê pode causar danos de distorção com o Gerador de Explosão REP-VS, projetado especificamente para o Aegis Vanguard Sentinel. Behring modificou a tecnologia do renomado REP-8 para criar uma arma não letal eficaz que se integra perfeitamente ao Sentinel.\n\n--- STATS ---\nWeight: 4000.0 kg\nPower Draw: 1 PU/s\nComponent HP: 150\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescAMRS_LaserCannon_S1=Fabricante: Amon & Reese Co.\nTipo de Item: Canhão Laser\nTamanho: 1\n\nO Omnisky III é o modelo básico na linha de canhões automáticos laser para Naves pequenas da A&R e tem uma Cadência de disparo, produção de dano e alcance comparáveis a outras armas em sua classe de tamanho. A sua construção utiliza componentes de gama média, oferecendo uma eficiência energética significativamente superior à de alguns dos seus concorrentes mais baratos.\n\n--- STATS ---\nWeight: 144.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 97.2 (Energy)  |  DPS: 243.0\nAmmo: 25\nRegen: 1,500/s  |  Cooldown: 0.5s  |  Cost/Shot: 90\nVelocity: 1,200 m/s  |  Range: 2.0 km\nPower Draw: 1 PU/s\nComponent HP: 550\nSignatures:  EM: 446  |  IR: 0\nOverheat Temp: 450K
item_DescAMRS_LaserCannon_S2=Fabricante: Amon & Reese Co.\nTipo de Item: Canhão Laser\nTamanho: 2\n\nO Omnisky VI é o canhão automático laser de tamanho médio do fabricante A&R. Oferece maior dano, maior alcance e maior consumo de energia em comparação com seu irmão menor, o Omnisky III, e usa muitos dos mesmos componentes, resultando em eficiência energética média.\n\n--- STATS ---\nWeight: 360.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 145.8 (Energy)  |  DPS: 364.5\nAmmo: 25\nRegen: 2,250/s  |  Cooldown: 0.5s  |  Cost/Shot: 135\nVelocity: 1,196 m/s  |  Range: 2.2 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 594  |  IR: 0\nOverheat Temp: 450K
