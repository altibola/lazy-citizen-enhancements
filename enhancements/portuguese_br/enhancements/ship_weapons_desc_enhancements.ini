item_DescGMISL_S01_CS_FSKI_Spark=Fabricante: Firestorm Kinetics \nSinal de Rastreamento: Seção Transversal \nTamanho: 1 \n\nAqueles que acreditam que tamanho não importa, fariam bem em ficar longe do Firestorm Kinetics Spark. Usando rastreamento por seção transversal, este míssil de proximidade leve causa um impacto considerável. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 63.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S01_EM_BEHR_Pioneer=Fabricante: Behring \nSinal de Rastreamento: Eletromagnético \nTamanho: 1 \n\nA Behring orgulha-se de sua confiabilidade e o Pioneer não é exceção. O sistema de rastreamento Oracle EM atualizado tem se mostrado eficaz repetidamente em vários testes de consumidores contra mísseis de proximidade de classe semelhante. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 51.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S01_EM_THCN_TaskForce=Fabricante: Thermyte Concern \nSinal de Rastreamento: Eletromagnético \nTamanho: 1 \n\nAdentrando o mercado de armas, a Thermyte Concern reuniu seu extenso conhecimento em explosivos de demolição para criar o TaskForce. Um míssil de rastreamento EM leve com um sistema de propulsão de ponta oferece uma mistura eficiente de velocidade e poder de fogo para estabelecer a dominância no campo de batalha. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 25.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S01_IR_BEHR_Marksman=Fabricante: Behring \nSinal de Rastreamento: Infravermelho \nTamanho: 1 \n\nA série Marksman da Behring de mísseis de proximidade ganhou tanto uma reputação pela sua capacidade de rastrear uma ampla gama de assinaturas térmicas quanto pelos danos de proximidade em área. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 56.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S02_CS_FSKI_Tempest=Fabricante: Firestorm Kinetics \nSinal de Rastreamento: Seção Transversal \nTamanho: 2 \n\nO Tempest foi projetado com nada além de aniquilação em mente. Utilizando a tecnologia de rastreamento da FireStorm Kinetics, este míssil de proximidade trava-se na seção transversal de um alvo para levar os conflitos a uma conclusão rápida. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 121.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S02_CS_THCN_StrikeForce=Fabricante: Thermyte Concern \nSinal de Rastreamento: Seção Transversal \nTamanho: 2 \n\nO StrikeForce é a mais recente culminação da expansão da Thermyte Concern na indústria de mísseis, exibindo melhorias notáveis no design e no rastreamento por seção transversal. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 72.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S02_EM_TALN_Dominator=Fabricante: Talon \nSinal de Rastreamento: Eletromagnético \nTamanho: 2 \n\nProjetado para rastrear a assinatura eletromagnética de um oponente, o míssil de ataque Dominator é um pacote de munição de precisão projetado para estabelecer a dominância tática no campo de batalha. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 136.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S02_IR_FSKI_Ignite=Fabricante: Firestorm Kinetics \nSinal de Rastreamento: Infravermelho \nTamanho: 2 \n\nO Ignite é o principal míssil de ataque de busca de calor da Firestorm, que é a definição de "lance e esqueça". Basta deixá-lo voar e curtir o espetáculo. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 113.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S03_EM_FSKI_Thunderbolt=Fabricante: Firestorm Kinetics \nSinal de Rastreamento: Eletromagnético \nTamanho: 3 \n\nGraças ao quadro ágil do Thunderbolt da Firestorm e ao seu sistema de rastreamento EM, este míssil de proximidade é uma escolha sólida para uma ampla variedade de cenários de combate. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 449.0 kg\nComponent HP: 1,000\nOverheat Temp: 450K
item_DescGMISL_S03_IR_NOVP_Viper=Fabricante: Nova Pyrotechnica \nSinal de Rastreamento: Infravermelho \nTamanho: 3 \n\nA Nova trabalhou arduamente para garantir que seu míssil de ataque Viper de rastreamento infravermelho corresponda ao seu nome, oferecendo ataques ágeis e letais contra alvos hostis. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 133.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S04_CS_TALN_Assailant=Fabricante: Talon \nSinal de Rastreamento: Seção Transversal \nTamanho: 4 \n\nO míssil Assailant da Talon é uma solução perfeita de arma para ataques de precisão contra oponentes motivados. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 224.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S04_IR_BEHR_Pathfinder=Fabricante: Behring \nSinal de Rastreamento: Infravermelho \nTamanho: 4 \n\nO míssil de proximidade Pathfinder tem sido um membro constante do robusto arsenal da Behring graças ao seu sistema de propulsão testado e comprovado e ao array de orientação de busca de calor. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 203.0 kg\nComponent HP: 25\nOverheat Temp: 450K
item_DescGMISL_S05_CS_TALN_Stalker=Fabricante: Talon \nSinal de Rastreamento: Seção Transversal \nTamanho: 5 \n\nCom rastreamento dedicado por seção transversal, o Talon Stalker resistiu ao passar dos anos como um torpedo de ataque de precisão com máxima potência de parada. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 303.0 kg\nComponent HP: 50\nOverheat Temp: 450K
item_DescGMISL_S05_EM_TALN_Reaper=Fabricante: Talon \nSinal de Rastreamento: Eletromagnético \nTamanho: 5 \n\nO torpedo de ataque Reaper apresenta uma favorável relação entre rendimento destrutivo e custo, com um comprovado sistema de rastreamento EM da Talon. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 326.0 kg\nComponent HP: 50\nOverheat Temp: 450K
item_DescGMISL_S05_EM_TALN_Scimitar=Fabricante: Talon \nSinal de Rastreamento: Eletromagnético \nTamanho: 5 \n\nO míssil Scimitar rastreia os alvos via sua assinatura EM para entregar uma carga devastadora de tamanho cinco. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 314.0 kg\nComponent HP: 50\nOverheat Temp: 450K
item_DescGMISL_S05_IR_TALN_Valkyrie=Fabricante: Talon \nSinal de Rastreamento: Infravermelho \nTamanho: 5 \n\nA equipe de design de torpedos da Talon fez de tudo para criar seu mais recente torpedo de ataque Valkyrie, criando uma solução de propulsão de múltiplos estágios com capacidades de rastreamento infravermelho de última geração. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 314.0 kg\nComponent HP: 50\nOverheat Temp: 450K
item_DescGMISL_S07_IR_TALN_Hellion=Fabricante: Talon \nSinal de Rastreamento: Infravermelho \nTamanho: 7 \n\nCarregando uma carga considerável e um avançado sistema de sensores de busca de calor, o míssil Hellion da Talon pode ser eficaz contra agressores de todos os tamanhos. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 452.0 kg\nComponent HP: 200\nOverheat Temp: 450K
item_DescGMISL_S09_CS_TALN_Argos=Fabricante: Talon \nSinal de Rastreamento: Seção Transversal \nTamanho: 9 \n\nO torpedo de ataque Talon Argos apresenta um design clássico e direto que se baseia em padrões de fabricação precisos e um clássico sistema de rastreamento por seção transversal. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 449.0 kg\nComponent HP: 667\nOverheat Temp: 450K
item_DescGMISL_S09_EM_TALN_Seeker=Fabricante: Talon \nSinal de Rastreamento: Eletromagnético \nTamanho: 9 \n\nO torpedo Seeker da Talon é um torpedo de precisão com rastreamento EM, capaz de entregar uma carga maciça de forma rápida e precisa. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 447.0 kg\nComponent HP: 667\nOverheat Temp: 450K
item_DescGMISL_S09_IR_TALN_Typhoon=Fabricante: Talon \nSinal de Rastreamento: Infravermelho \nTamanho: 9 \n\nProjetado pela Talon, o torpedo de ataque Typhoon com busca de calor entrega uma carga pesada que certamente servirá como um dissuasor para qualquer ação hostil futura. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nWeight: 452.0 kg\nComponent HP: 667\nOverheat Temp: 450K
item_DescGRIN_TractorBeam_002_shared=Fabricante: Greycat Industrial\nTipo de item: Viga tratora\nÂngulo máximo: 60°\nAlcance máximo: 150 m\nDistância de força total: 75 m\n\nCom o apoio da garantia certificada Soft-Touch®, a viga tratora SureGrip da Greycat é um pilar de seu catálogo de produtos graças ao seu alcance e controle confiáveis.\n\n--- STATS ---\nWeight: 100.0 kg\nFire Modes: Raio Trator\nAmmo: 0\nVelocity: 0 m/s  |  Range: 0 m\nPower Draw: 3 PU/s\nComponent HP: 1,050\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
