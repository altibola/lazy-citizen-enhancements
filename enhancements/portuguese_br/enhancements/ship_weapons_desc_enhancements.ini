item_DescJOKR_DistortionCannon_S1=Fabricante: Joker Engineering\nTipo de Item: Canhão de Distorção\nTamanho: 1\n\nOs gênios do Joker conseguiram novamente. O Canhão Automático de Distorção Suckerpunch é uma arma de longo alcance que prejudica o fornecimento de energia do alvo em vez de danificar o corpo físico da Nave, tornando-o ideal para aplicação da lei ou outras aplicações.\n\n--- STATS ---\nWeight: 96.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 81.0 (Distort)  |  DPS: 135.0\nAmmo: 25\nRegen: 750/s  |  Cooldown: 1.6s  |  Cost/Shot: 90\nVelocity: 1,080 m/s  |  Range: 1.5 km\nPower Draw: 1 PU/s\nComponent HP: 550\nSignatures:  EM: 408  |  IR: 0\nOverheat Temp: 450K
