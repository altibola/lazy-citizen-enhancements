item_DescGRIN_TractorBeam_002_shared_UT2=Fabricante: Greycat Industrial\nÂngulo máx.: 80°\nAlcance máx.: 130 m\nDistância de força total: 55 m\n\nEsta variante de precisão do Tractor Beam SureGrip da Greycat sacrifica parte da potência e do alcance do modelo básico em troca de um ângulo de manipulação mais amplo e maior aderência da corda, permitindo o manuseio cuidadoso de produtos mais delicados.\n\n--- STATS ---\nWeight: 100.0 kg\nFire Modes: Raio Trator\nAmmo: 0\nVelocity: 0 m/s  |  Range: 0 m\nPower Draw: 3 PU/s\nComponent HP: 1,050\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescGRIN_TractorBeam_003_shared=Fabricante: Greycat Industrial\nTipo de item: Viga tratora\nÂngulo máximo: 80°\nAlcance máximo: 135 m\nDistância de força total: 50 m\n\nA viga tratora ViseLock é uma evolução da tecnologia padrão da indústria da Greycat, com melhorias adicionais especificamente destinadas a ajudar as forças de segurança a conter seus alvos. Em seu design, a Greycat sacrificou um pouco da força de retenção em distâncias maiores para obter uma amarração mais poderosa e mais difícil de escapar.\n\n--- STATS ---\nWeight: 100.0 kg\nFire Modes: Raio Trator\nAmmo: 0\nVelocity: 0 m/s  |  Range: 0 m\nPower Draw: 3 PU/s\nComponent HP: 1,050\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescGRIN_TractorBeam_004_S3=Fabricante: Greycat Industrial\nTipo de item: Viga de reboque\nÂngulo máximo: 160°\nAlcance máximo: 250 m\nDistância de força total: 200 m\n\nA escolha segura das equipes de recuperação em todo o império, a viga de reboque SafeTow da Greycat Industrial ostenta força, potência e controle suficientes para transportar cargas pesadas e veículos em todo o universo.\n\n--- STATS ---\nWeight: 100.0 kg\nFire Modes: Raio Trator\nAmmo: 0\nVelocity: 0 m/s  |  Range: 0 m\nPower Draw: 3 PU/s\nComponent HP: 1,050\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescGRIN_TractorBeam_S1=Fabricante: Greycat Industrial\nTipo de item: Trator Beam\n\nA mais nova adição da Greycat à sua linha de tratores comprovada em campo é uma adição confiável ao seu catálogo. Além de uma relação pull/pull mais eficiente, o modelo mais recente difere pouco dos modelos anteriores. O SureGrip é ajustado para mirar e extrair tudo, desde fragmentos de asteroides até membros da tripulação à deriva, apoiado pela garantia certificada Soft-Touch® da Greycat.\n\n--- STATS ---\nWeight: 200.0 kg\nFire Modes: Raio Trator\nAmmo: 0\nVelocity: 0 m/s  |  Range: 0 m\nPower Draw: 4 PU/s\nComponent HP: 1,050\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_BallisticCannon_S7=Tipo de item: Torre de canhão balístico\nFabricante: Hurston Dynamics\nTamanho: 7\n\nLeve sua conquista para os céus usando o canhão balístico Conqueror-7 da Hurston Dynamics. Construídos sob medida para a torre dorsal do Aegis Idris, esses canhões são capazes de atacar naves maiores à distância, finalizando as lutas antes mesmo de começarem.\n\n--- STATS ---\nWeight: 115.0 kg\nFire Rate: 50 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 4,000.0 (Phys)  |  DPS: 3,333.3\nAmmo: 800\nVelocity: 1,048 m/s  |  Range: 9.1 km\nPower Draw: 0 PU/s\nComponent HP: 6,750\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserBeam_S10_Bespoke=Fabricante: Hurston Dynamics\nTipo: Feixe de laser\nTamanho: 10\n\nConstruída em conjunto com os engenheiros da Aegis, essa arma de feixe de laser sob medida da Hurston Dynamics é altamente precisa, dando ao Idris-K uma arma devastadora em seu arsenal.\n\n--- STATS ---\nAmmo: 60\nRegen: 1,700/s  |  Cooldown: 5.0s  |  Cost/Shot: 43\nVelocity: 1,200 m/s  |  Range: 8.0 km\nPower Draw: 1 PU/s\nComponent HP: 750,000\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserRepeater_S1=Fabricante: Hurston Dynamics\nTipo de item: Repetidor de Laser\nTamanho: 1\n\nO Repetidor de Laser Attrition-1 apresenta a tecnologia em cascata exclusiva da Hurston Dynamics, que fornece maior desempenho enquanto mantém o disparo do laser consistente. O resultado é uma arma tamanho 1 que recompensa um operador habilidoso.\n\n--- STATS ---\nWeight: 24.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 34.0 (Energy)  |  DPS: 198.3\nAmmo: 75\nRegen: 2,155/s  |  Cooldown: 0.7s  |  Cost/Shot: 37\nVelocity: 1,500 m/s  |  Range: 1.6 km\nPower Draw: 0 PU/s\nComponent HP: 524\nSignatures:  EM: 167  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserRepeater_S2=Fabricante: Hurston Dynamics\nTipo de Item: Repetidor de Laser\nTamanho: 2\n\nQuando a batalha esquenta, a tecnologia de laser em cascata da Hurston Dynamics realmente se destaca. O repetidor Attrition-2 de tamanho dois permite que um operador use rajadas sustentadas de tiro de laser para converter o excesso de calor em maior poder de arma.\n\n--- STATS ---\nWeight: 60.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 55.0 (Energy)  |  DPS: 320.8\nAmmo: 75\nRegen: 3,232/s  |  Cooldown: 0.7s  |  Cost/Shot: 55\nVelocity: 1,495 m/s  |  Range: 1.7 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 223  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserRepeater_S3=Fabricante: Hurston Dynamics\nTipo de Item: Repetidor de Laser\nTamanho: 3\n\nEm vez de limitar o poder da arma para aumentar a estabilidade, a tecnologia em cascata da Hurston Dynamics dá ao operador a escolha. Embora o superaquecimento seja um risco, o fogo contínuo prolongado com o Repetidor Laser Attrition-3 aumenta o desempenho à medida que o excesso de calor é convertido em maior produção de energia.\n\n--- STATS ---\nWeight: 150.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 86.0 (Energy)  |  DPS: 501.7\nAmmo: 75\nRegen: 4,853/s  |  Cooldown: 0.7s  |  Cost/Shot: 84\nVelocity: 1,480 m/s  |  Range: 1.9 km\nPower Draw: 1 PU/s\nComponent HP: 1,024\nSignatures:  EM: 278  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserRepeater_S4=Fabricante: Hurston Dynamics\nTipo de Item: Amplificador Laser\nTamanho: 4\n\nA Hurston Dynamics integrou totalmente sua tecnologia de laser em cascata em sua linha de amplificadores Attrition. O Tamanho 4 Attrition-4 não é exceção, operando com desempenho máximo à medida que se aproxima de sua capacidade térmica máxima.\n\n--- STATS ---\nWeight: 375.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 150.0 (Energy)  |  DPS: 875.0\nAmmo: 75\nRegen: 3,000/s  |  Cooldown: 0.8s  |  Cost/Shot: 125\nVelocity: 1,440 m/s  |  Range: 2.2 km\nPower Draw: 1 PU/s\nComponent HP: 1,650\nSignatures:  EM: 334  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserRepeater_S5=Fabricante: Hurston Dynamics\nTipo de item: Repetidor de laser\nTamanho: 5\n\nO Attrition-5 da Hurston Dynamics é mais do que um simples repetidor de laser tamanho 5. Possui tecnologia avançada em cascata que permite que a arma melhore seu desempenho significativamente quanto mais tempo ela mantiver sua produção de energia.\n\n--- STATS ---\nWeight: 938.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 150.0 (Energy)  |  DPS: 875.0\nAmmo: 75\nRegen: 10,914/s  |  Cooldown: 0.8s  |  Cost/Shot: 187\nVelocity: 1,390 m/s  |  Range: 3.2 km\nPower Draw: 1 PU/s\nComponent HP: 2,640\nSignatures:  EM: 390  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserRepeater_S6=Fabricante: Hurston Dynamics\nTipo de Item: Repetidor de Laser\nTamanho: 6\n\nCom a tecnologia em cascata da Hurston Dynamics, o repetidor de laser Attrition-6 maximiza seu potencial de combate. É comum que as armas aqueçam sob uso pesado em combate, mas o que diferencia este 6-Repeater dos outros é que a energia térmica é traduzida diretamente em maior poder ofensivo.\n\n--- STATS ---\nWeight: 2340.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 505.4 (Energy)  |  DPS: 2,947.9\nAmmo: 75\nRegen: 16,377/s  |  Cooldown: 0.8s  |  Cost/Shot: 281\nVelocity: 1,350 m/s  |  Range: 4.8 km\nPower Draw: 1 PU/s\nComponent HP: 4,224\nSignatures:  EM: 446  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserScattergun_S1=Fabricante: Hurston Dynamics\nTipo de Item: Espingarda Laser\nTamanho: 1\n\nGraças à integração da tecnologia de cascata de laser da Hurston Dynamics, a Espingarda Dominance-1 é capaz de causar mais danos quanto mais próximo o tamanho da arma estiver. sua capacidade máxima de calor segura.\n\n--- STATS ---\nWeight: 48.0 kg\nFire Rate: 50 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 504.0 x8 (Energy)  |  DPS: 420.0\nAmmo: 75\nRegen: 1,867/s  |  Cooldown: 0.3s  |  Cost/Shot: 70\nVelocity: 900 m/s  |  Range: 999 m\nPower Draw: 1 PU/s\nComponent HP: 1,550\nSignatures:  EM: 248  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserScattergun_S2=Fabricante: Hurston Dynamics\nTipo de Item: Espingarda Laser\nTamanho: 2\n\nQuanto mais difícil a luta, mais difícil a Espingarda Dominance-2 funciona. À medida que as térmicas aumentam, a arma Tamanho 2 da Hurston Dynamics é capaz de utilizar a tecnologia em cascata para transformar o potencial térmico em um ataque de curto alcance ainda mais mortal.\n\n--- STATS ---\nWeight: 120.0 kg\nFire Rate: 50 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 792.0 x8 (Energy)  |  DPS: 660.0\nAmmo: 75\nRegen: 2,933/s  |  Cooldown: 0.3s  |  Cost/Shot: 110\nVelocity: 897 m/s  |  Range: 1.1 km\nPower Draw: 1 PU/s\nComponent HP: 1,550\nSignatures:  EM: 330  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_LaserScattergun_S3=Fabricante: Hurston Dynamics\nTipo de Item: Espingarda Laser\nTamanho: 3\n\nA Espingarda Dominance-3 da Hurston Dynamics é um exemplo da tecnologia em cascata do fabricante de armas. Quanto mais o operador disparar a arma tamanho 3, melhor poderá converter o calor gerado em ataques cada vez mais devastadores.\n\n--- STATS ---\nWeight: 300.0 kg\nFire Rate: 50 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 1,116.0 x8 (Energy)  |  DPS: 930.0\nAmmo: 75\nRegen: 4,133/s  |  Cooldown: 0.4s  |  Cost/Shot: 155\nVelocity: 888 m/s  |  Range: 1.2 km\nPower Draw: 1 PU/s\nComponent HP: 1,550\nSignatures:  EM: 413  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_Nova_BallisticCannon_S5=Fabricante: Hurston Dynamics\nTipo de Item: Canhão Balístico\nTamanho: 5\n\nO canhão balístico Slayer da Hurston Dynamics foi desenvolvido especificamente para o tanque Nova e ganhou uma excelente reputação em inúmeras batalhas durante a Segunda Guerra Tevarin. Esta fera do campo de batalha se destaca contra alvos blindados e posições fortificadas, disparando projéteis de artilharia de grande calibre com incrível precisão e velocidade. Hurston trabalhou em estreita colaboração com Tumbril quando o fabricante do tanque decidiu reviver o Nova. Embora tenham mantido cuidadosamente o design original do Slayer, Hurston o atualizou para o século 30, melhorando a velocidade de movimento panorâmico, a resistência ao calor e o software associado para criar uma interface de usuário de ponta para o atirador.\n\n--- STATS ---\nWeight: 7500.0 kg\nFire Rate: 12 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 13,500.0 (Phys)  |  DPS: 2,700.0\nAmmo: 363\nVelocity: 973 m/s  |  Range: 6.0 km\nPower Draw: 0 PU/s\nComponent HP: 20,000\nSignatures:  EM: 50  |  IR: 0\nOverheat Temp: 450K
item_DescHRST_Pyro_LaserRepeater_S1=Fabricante: Hurston Dynamics\nTipo de item: Repetidor de laser\nTamanho: 1\n\nEste repetidor de laser Ardor-1 foi recuperado no sistema Pyro. Fabricado pela primeira vez em 2724, a série Ardor se tornou popular por seu design de cano dividido que ajudou a mitigar o calor ao sustentar o fogo. A Hurston eventualmente parou de fabricar a arma em favor da linha Attrition de laser repeaters. Apesar dos efeitos do tempo e do uso constante, a arma ainda é procurada por causa do desempenho consistente fornecido pelo design especializado e construção sólida da Hurston Dynamic.\n\n--- STATS ---\nWeight: 24.0 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 36.0 (Energy)  |  DPS: 210.0\nAmmo: 75\nRegen: 1,875/s  |  Cooldown: 0.7s  |  Cost/Shot: 64\nVelocity: 1,500 m/s  |  Range: 1.6 km\nPower Draw: 0 PU/s\nComponent HP: 524\nSignatures:  EM: 167  |  IR: 0\nOverheat Temp: 450K
