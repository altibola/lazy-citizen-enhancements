item_DescASAD_DistortionRepeater_S1=Fabricante: Associated Science & Development\nTipo de item: Repetidor de Distorção\nTamanho: 1\n\nA energia é a força vital de qualquer Nave, e o DR Model-XJ1 da ASD é a escolha ideal para sangrar inimigos até secar. Este repetidor de distorção de última geração permite interromper a energia dos alvos e eliminar ameaças com eficiência.\n\n--- STATS ---\nWeight: 24.0 kg\nFire Rate: 400 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 25.7 (Distort)  |  DPS: 171.3\nAmmo: 75\nRegen: 750/s  |  Cooldown: 0.8s  |  Cost/Shot: 26\nVelocity: 1,350 m/s  |  Range: 1.2 km\nPower Draw: 0 PU/s\nComponent HP: 525\nSignatures:  EM: 167  |  IR: 0\nOverheat Temp: 450K
