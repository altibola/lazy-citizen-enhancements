item_DescKLWE_LaserRepeater_S3=Fabricante: Klaus & Werner\nTipo de Item: Repetidor Laser\nTamanho: 3\n\nO CF-337 Panther é o modelo tamanho três da linha de repetidores laser Klaus & Werner. A Pantera é uma verdadeira arma do tipo "dispare e esqueça", com uma relação respeitável entre consumo de energia e dano. Os pilotos que equipam suas Naves com Panthers raramente se arrependem desta decisão.\n\n--- STATS ---\nWeight: 200.0 kg\nFire Rate: 750 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 43.6 (Energy)  |  DPS: 545.6\nAmmo: 75\nRegen: 3,031/s  |  Cooldown: 0.7s  |  Cost/Shot: 48\nVelocity: 1,480 m/s  |  Range: 1.9 km\nPower Draw: 1 PU/s\nComponent HP: 1,500\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescKLWE_LaserRepeater_S4=Fabricante: Klaus & Werner\nTipo de Item: Repetidor de Laser\nTamanho: 4\n\nQuando uma Nave com um CF-447 Rhino avança em sua direção, é uma experiência que poucos pilotos esquecerão. Este enorme repetidor de laser de tamanho 4 da Klaus & Werner é adequado para combates de médio alcance, mas também é impressionante de perto.\n\n--- STATS ---\nWeight: 375.0 kg\nFire Rate: 750 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 65.4 (Energy)  |  DPS: 817.9\nAmmo: 75\nRegen: 4,544/s  |  Cooldown: 0.8s  |  Cost/Shot: 73\nVelocity: 1,440 m/s  |  Range: 2.2 km\nPower Draw: 1 PU/s\nComponent HP: 1,650\nSignatures:  EM: 304  |  IR: 0\nOverheat Temp: 450K
item_DescKLWE_LaserRepeater_S5=Fabricante: Klaus & Werner\nTipo de Item: Repetidor de Laser\nTamanho: 5\n\nO Repetidor de Laser Klaus & Werner CF-557 Galdereen tem uma mordida tão assustadora quanto seu homônimo com presas e é graças à sua alta Cadência e eficácia consistente, uma escolha sólida para uma ampla gama de veículos.\n\n--- STATS ---\nWeight: 938.0 kg\nFire Rate: 750 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 98.2 (Energy)  |  DPS: 1,227.4\nAmmo: 75\nRegen: 6,819/s  |  Cooldown: 0.9s  |  Cost/Shot: 109\nVelocity: 1,390 m/s  |  Range: 3.2 km\nPower Draw: 1 PU/s\nSignatures:  EM: 354  |  IR: 0\nOverheat Temp: 450K
item_DescKLWE_LaserRepeater_S6=Fabricante: Klaus & Werner\nTipo de Item: Repetidor de Laser\nTamanho: 6\n\nEste gigante repetidor de laser de Klaus & Werner possui três barris enormes que impressionarão qualquer um que vir uma Nave com o CF-667. Avise que ele deveria pensar duas vezes antes de atacar.\n\n--- STATS ---\nWeight: 2340.0 kg\nFire Rate: 750 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 147.3 (Energy)  |  DPS: 1,841.6\nAmmo: 75\nRegen: 10,231/s  |  Cooldown: 0.9s  |  Cost/Shot: 164\nVelocity: 1,350 m/s  |  Range: 4.8 km\nPower Draw: 1 PU/s\nComponent HP: 4,224\nSignatures:  EM: 405  |  IR: 0\nOverheat Temp: 450K
item_DescKLWE_MassDriver_S1=Fabricante: Klaus & Werner\nTipo de Item: Canhão Mass Driver\nTamanho: 1\n\nCom o Canhão Mass Driver Sledge I você pode eliminar alvos que estão distantes. Klaus & Werner aproveitou a tecnologia de canhão elétrico para disparar projéteis balísticos de alto dano a longas distâncias. No entanto, certifique-se de que cada tiro seja preciso, pois a arma sacrifica a Cadência por danos brutos e devastadores.\n\n--- STATS ---\nWeight: 192.0 kg\nFire Rate: 30 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 225.0 (Phys)  |  DPS: 112.5\nAmmo: 105\nVelocity: 1,155 m/s  |  Range: 3.0 km\nPower Draw: 1 PU/s\nComponent HP: 1,050\nSignatures:  EM: 540  |  IR: 0\nOverheat Temp: 450K
