item_DescBANU_TachyonCannon_S1=Fabricante: Banu\nTipo de Item: Canhão Tachyon\nTamanho: 1\n\nPopularizado por um Banu-Souli, o canhão tachyon Singe causa danos de energia devastadores em longas distâncias. O projétil Tachyon ultrarrápido é lento para disparar, mas atinge o alvo quase instantaneamente, tornando o Singe uma escolha popular para Naves de segurança Banu. Embora os Banu tenham esquecido há muito tempo as origens desta arma de alta tecnologia, algumas características únicas de design levaram os estudiosos a especular que os Banu podem ter adotado a tecnologia em sua cultura, em vez de inventá-la eles próprios.\n\n--- STATS ---\nWeight: 192.0 kg\nFire Rate: 90 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 202.5 (Energy)  |  DPS: 303.8\nAmmo: 25\nRegen: 1,500/s  |  Cooldown: 1.6s  |  Cost/Shot: 300\nVelocity: 1,050 m/s  |  Range: 3.0 km\nPower Draw: 1 PU/s\nComponent HP: 550\nSignatures:  EM: 594  |  IR: 0\nOverheat Temp: 450K
