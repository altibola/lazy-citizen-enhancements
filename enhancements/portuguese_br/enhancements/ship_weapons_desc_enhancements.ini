item_DescBEHR_BallisticGatling_SF7B_S7=Fabricante: Behring\nTipo de item: Gatling balístico\nTamanho: 7\n\nCom o Gatling balístico SF7B você pode enfrentar grandes Naves espaciais e destruir rapidamente Naves menores. A arma foi projetada especificamente para o Ares Inferno Star Fighter e se encaixa perfeitamente no casco da Nave. A impressionante Cadência da arma libera projéteis de alta densidade que penetram armaduras e escudos, tornando-a a escolha perfeita para situações em que a saturação do alvo é crítica.\n\n--- STATS ---\nWeight: 5860.0 kg\nFire Rate: 900 RPM\nFire Modes: Auto\nAlpha Dmg: 292.0 (Phys)  |  DPS: 4,380.0\nAmmo: 2,994\nVelocity: 1,179 m/s  |  Range: 7.3 km\nPower Draw: 0 PU/s\nComponent HP: 6,750\nSignatures:  EM: 36  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_BallisticRepeater_S1=Fabricante: Behring\nTipo de Item: Repetidor Balístico\nTamanho: 1\n\nO SW16BR1 "Buzzsaw" dispara de dois barris e pode dominar atacantes em distâncias médias a curtas. Graças ao artesanato especializado de Behring, a arma pode ser usada em tiroteios sustentados antes de exigir um período de resfriamento, tornando-a um excelente rifle balístico de repetição de nível básico.\n\n--- STATS ---\nWeight: 36.0 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 36.0 (Phys)  |  DPS: 300.0\nAmmo: 2,664\nVelocity: 1,500 m/s  |  Range: 2.0 km\nPower Draw: 0 PU/s\nComponent HP: 525\nSignatures:  EM: 40  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_BallisticRepeater_S2=Fabricante: Behring\nTipo de Item: Repetidor Balístico\nTamanho: 2\n\nO SW16BR2 Sawbuck é a contribuição da Behring para o crescente mercado de repetidores balísticos. Sua configuração de cano duplo com disparo sequencial fornece um meio-termo eficaz para operadores que desejam uma Cadência mais alta do que um canhão, mas não precisam se preocupar com superaquecimento como um Gatling.\n\n--- STATS ---\nWeight: 90.0 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 54.0 (Phys)  |  DPS: 450.0\nAmmo: 2,637\nVelocity: 1,495 m/s  |  Range: 2.2 km\nPower Draw: 0 PU/s\nComponent HP: 850\nSignatures:  EM: 40  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_BallisticRepeater_S3=Fabricante: Behring\nTipo de Item: Repetidor Balístico\nTamanho: 3\n\nVocê pode escapar de problemas com este repetidor balístico da Behring em tamanho três. O SW16BR3 "Shredder" distribui o calor pelos dois canos para manter a arma disparando no momento crucial. O agrupamento de tiros da arma e a redução do dano a tornam particularmente mortal a médio ou curto alcance.\n\n--- STATS ---\nWeight: 225.0 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 81.0 (Phys)  |  DPS: 675.0\nAmmo: 2,589\nVelocity: 1,480 m/s  |  Range: 2.4 km\nPower Draw: 0 PU/s\nComponent HP: 1,024\nSignatures:  EM: 40  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_BallisticRepeater_VNG_S2=Fabricante: Behring\nTipo de Item: Repetidor Balístico\nTamanho: 2\n\nSomente proprietários do Vanguard podem anexar esta versão exclusiva da linha de amplificadores balísticos da Behring ao nariz de sua Nave. O BRVS foi cuidadosamente calibrado para permitir que sua barragem balística dispare com rapidez suficiente para atingir a saturação máxima do alvo, enquanto sua ventilação aprimorada reduz o superaquecimento comum.\n\n--- STATS ---\nWeight: 90.0 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 54.0 (Phys)  |  DPS: 450.0\nAmmo: 2,637\nVelocity: 1,495 m/s  |  Range: 2.2 km\nPower Draw: 0 PU/s\nComponent HP: 850\nSignatures:  EM: 40  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_DistortionCannon_VNG_S2=Fabricante: Behring\nTipo de Item: Canhão de Distorção\nTamanho: 2\n\nO EVSD da Behring pode ser usado para desativar Naves sem danificar sua tripulação ou carga. Este canhão de distorção apresenta grande parte da mesma tecnologia líder da indústria encontrada em outras armas Behring, mas foi projetado especificamente para ser montado no nariz de um Aegis Vanguard.\n\n--- STATS ---\nWeight: 360.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 81.0 (Distort)  |  DPS: 202.5\nAmmo: 25\nRegen: 1,125/s  |  Cooldown: 1.4s  |  Cost/Shot: 90\nVelocity: 1,076 m/s  |  Range: 1.6 km\nPower Draw: 1 PU/s\nComponent HP: 550\nSignatures:  EM: 594  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_DistortionRepeater_VNG_S2=Fabricante: Behring\nTipo de Item: Repetidor de Distorção\nTamanho: 2\n\nCom o ATVS da Behring você pode interromper o sistema elétrico de um invasor. Este repetidor de distorção perturbador e não letal só é compatível com o suporte de nariz Aegis Vanguard.\n\n--- STATS ---\nWeight: 90.0 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 27.0 (Distort)  |  DPS: 225.0\nAmmo: 75\nRegen: 1,125/s  |  Cooldown: 0.5s  |  Cost/Shot: 27\nVelocity: 1,346 m/s  |  Range: 1.3 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 243  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_LaserCannon_S1=Fabricante: Behring\nTipo de Item: Canhão Laser\nTamanho: 1\n\nO M3A é o canhão automático laser básico da Behring. A configuração do canhão automático oferece danos modestos por projétil e uma Cadência relativamente baixa. A oferta mais simples na gama de armas da Behring, apresenta baixo consumo de energia, mas baixa eficiência energética. Ele compensa suas deficiências sendo barato – uma qualidade que muitos pilotos procuram quando equipam suas Naves dentro do orçamento.\n\n--- STATS ---\nWeight: 144.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 182.2 (Energy)  |  DPS: 303.8\nAmmo: 25\nRegen: 1,867/s  |  Cooldown: 0.8s  |  Cost/Shot: 112\nVelocity: 1,200 m/s  |  Range: 2.0 km\nPower Draw: 1 PU/s\nComponent HP: 550\nSignatures:  EM: 348  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_LaserCannon_S1_CleanAir=Fabricante: Behring\nTipo de Item: Canhão Laser\nTamanho: 1\n\nO M3A é o canhão laser de entrada da Behring. A configuração de autocanhão oferece um dano moderado por projétil e uma taxa de disparo relativamente baixa. Sendo a opção mais básica na linha de armas da Behring, apresenta baixo consumo de energia, mas uma eficiência energética pobre. Ele compensa suas falhas sendo barato, uma característica procurada por muitos pilotos que equipam suas naves com orçamento limitado.\n\nA edição da Divisão de Defesa apresenta um padrão de camuflagem urbana cinza e foi dada àqueles que ajudaram a Divisão de Defesa da Alliance Aid durante o período de necessidade de Levski.\n\n--- STATS ---\nWeight: 144.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 182.2 (Energy)  |  DPS: 303.8\nAmmo: 25\nRegen: 1,867/s  |  Cooldown: 0.8s  |  Cost/Shot: 112\nVelocity: 1,200 m/s  |  Range: 2.0 km\nPower Draw: 1 PU/s\nComponent HP: 550\nSignatures:  EM: 348  |  IR: 0\nOverheat Temp: 450K
item_DescBEHR_LaserCannon_S2=Fabricante: Behring\nTipo de Item: Canhão Laser\nTamanho: 2\n\nO M4A é o segundo estágio do canhão automático laser de Behring. Seu tamanho maior significa maior consumo de energia, mas também maior poder de penetração. A taxa de incêndio e a eficiência energética são comparáveis ao modelo M3A.\n\n--- STATS ---\nWeight: 360.0 kg\nFire Rate: 100 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 273.4 (Energy)  |  DPS: 455.6\nAmmo: 25\nRegen: 2,815/s  |  Cooldown: 0.8s  |  Cost/Shot: 168\nVelocity: 1,196 m/s  |  Range: 2.2 km\nPower Draw: 1 PU/s\nComponent HP: 850\nSignatures:  EM: 495  |  IR: 0\nOverheat Temp: 450K
