item_DescAMRS_LaserCannon_S4=Fabricante: Amon & Reese Co.\nTipo de Item: Canhão Laser\nTamanho: 4\n\nA confiável linha de canhões automáticos laser da Amon & Reese continua com o Omnisky XII. Este laser de tamanho 4 dispara lentamente, mas é capaz de emitir raios laser devastadores a uma distância considerável.\n\n--- STATS ---\nWeight: 280.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 327.9 (Energy)  |  DPS: 819.7\nAmmo: 25\nRegen: 5,060/s  |  Cooldown: 0.5s  |  Cost/Shot: 303\nVelocity: 1,152 m/s  |  Range: 2.8 km\nPower Draw: 1 PU/s\nComponent HP: 1,650\nSignatures:  EM: 0  |  IR: 0\nOverheat Temp: 450K
item_DescAMRS_LaserCannon_S5=Fabricante: Amon & Reese Co.\nTipo de Item: Canhão Laser\nTamanho: 5\n\nA reputação da Amon & Reese em produzir armas poderosas e confiáveis é incorporada por sua linha Omnisky de canhões automáticos laser. O Omnisky XV é a versão tamanho 5 da arma que ajudou a defender o Império durante séculos.\n\n--- STATS ---\nWeight: 5630.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 492.2 (Energy)  |  DPS: 1,230.4\nAmmo: 25\nRegen: 7,595/s  |  Cooldown: 0.5s  |  Cost/Shot: 455\nVelocity: 1,112 m/s  |  Range: 4.0 km\nPower Draw: 2 PU/s\nComponent HP: 2,500\nSignatures:  EM: 1,040  |  IR: 0\nOverheat Temp: 450K
item_DescAMRS_LaserCannon_S6=Fabricante: Amon & Reese Co.\nTipo de Item: Canhão Laser\nTamanho: 6\n\nNomeado pelos engenheiros da Amon & Reese em homenagem ao Imperador Romano que fundou a famosa "Décima Oitava Legião", o "Augustus" é um enorme tamanho único 6 que atinge com força em longas distâncias, tornando o Omnisky XVIII uma forma eficaz de manter os inimigos afastados.\n\n--- STATS ---\nWeight: 14100.0 kg\nFire Rate: 150 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 738.4 (Energy)  |  DPS: 1,846.0\nAmmo: 25\nRegen: 11,395/s  |  Cooldown: 0.5s  |  Cost/Shot: 683\nVelocity: 1,080 m/s  |  Range: 6.0 km\nPower Draw: 2 PU/s\nComponent HP: 4,224\nSignatures:  EM: 1,190  |  IR: 0\nOverheat Temp: 450K
item_DescAMRS_ScatterGun_S3=Fabricante: Amon & Reese Co.\nTipo de Item: Espingarda de Plasma\nTamanho: 3\n\nCause o caos em sua Nave com a espingarda de plasma PyroBurst da A&R. O PyroBurst pulveriza projéteis de plasma autodetonantes que são eficazes em espaços confinados, sacrificando a precisão por um efeito generalizado.\n\n--- STATS ---\nWeight: 450.0 kg\nFire Rate: 70 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 396.0 x8 (Energy)  |  DPS: 462.0\nAmmo: 75\nRegen: 2,567/s  |  Cooldown: 0.4s  |  Cost/Shot: 440\nVelocity: 844 m/s  |  Range: 1.3 km\nPower Draw: 1 PU/s\nComponent HP: 1,550\nSignatures:  EM: 450  |  IR: 0\nOverheat Temp: 450K
item_DescAPAR_BallisticGatling_S4=Fabricante: Apocalypse Arms\nTipo de Item: Gatling Balístico\nTamanho: 4\n\nSe não está quebrado, não conserte. E se você quiser quebrá-lo, mire um Revenant nele. Baseando-se em tecnologia centenária e design inovador e testado em batalha, Apocalypse Arms cria um robusto Gatling balístico que lança a morte através do vazio. Embora o Revenant seja lento para inicializar e esfriar, sua confiabilidade o torna um favorito para aqueles que estão preparados para problemas.\n\n--- STATS ---\nWeight: 2340.0 kg\nFire Rate: 900 RPM\nFire Modes: Auto\nAlpha Dmg: 189.9 (Phys)  |  DPS: 2,848.5\nAmmo: 3,801\nVelocity: 1,215 m/s  |  Range: 6.0 km\nPower Draw: 0 PU/s\nComponent HP: 16,500\nSignatures:  EM: 36  |  IR: 0\nOverheat Temp: 450K
