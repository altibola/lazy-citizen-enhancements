item_DescBOMB_S03_FSKI_Thunderball=Fabricante: FireStorm Kinetics\nTipo de Item: Bomba Explosiva\nTamanho: 3\n\nA Thunderball permite que você ataque tropas terrestres de cima a uma distância segura. Apesar de seu pequeno tamanho, essas bombas S3 têm uma carga útil poderosa, permitindo ao usuário implantar múltiplas bombas para dominar um alvo estacionário ou soltá-las em intervalos para atingir alvos em movimento. O Thunderball está equipado com barbatanas Atmo-Xact patenteadas pela FireStorm Kinetics, que são implantadas após o lançamento e fornecem orientação adicional no caminho para o alvo.\n\n--- STATS ---\nDamage: 27,000.0 (Phys: 12500.0 / Energy: 14500.0)\nBlast Radius: 40 m\nComponent HP: 1,000
item_DescBOMB_S05_FSKI_Stormburst=Fabricante: FireStorm Kinetics\nTipo de Item: Bomba Explosiva\nTamanho: 5\n\nUse o Stormburst para destruir tropas terrestres pelo ar. Projetadas pela FireStorm Kinetics para maximizar o impacto destrutivo em tamanho moderado, essas bombas S5 apresentam uma munição composta mista que dizima alvos blindados. O Stormburst também utiliza aletas Atmo-Xact patenteadas da FireStorm Kinetics para garantir que a carga útil atinja seu alvo.\n\n--- STATS ---\nDamage: 46,702.0 (Phys: 22346.0 / Energy: 24356.0)\nBlast Radius: 100 m\nComponent HP: 1,000
item_DescBOMB_S10_FSKI_Colossus=Fabricante: FireStorm Kinetics\nTipo de Item: Bomba Explosiva\nTamanho: 10\n\nPés subterrâneos não têm chance contra um Colosso. A FireStorm Kinetics projetou esta enorme bomba S10 para destruir alvos terrestres, sejam eles veículos ou estruturas. Destinado a lançamentos em grandes altitudes, o Colossus possui barbatanas patenteadas Atmo-Xact que são implantadas no caminho até o alvo para fornecer orientação adicional.\n\n--- STATS ---\nDamage: 568,297.0 (Phys: 45676.6 / Energy: 522620.4)\nBlast Radius: 250 m\nComponent HP: 1,000
item_DescFSKI_S1_RPOD_3x_S3=Tipo de item: Foguete Pod\nFabricante: Firestorm Kinetics\nTamanho: 1\nFoguetes: 3xS3\n\nO foguete Yebira I é o sistema perfeito para o uso eficiente de munição S3. Fabricada pela Firestorm Kinetics, esta base de foguete comporta três foguetes e é fixada em pontos rígidos de qualquer tamanho.\n\n--- STATS ---\nComponent HP: 500
item_DescFSKI_S2_RPOD_6x_S3=Tipo de item: Rocket Pod\nFabricante: Firestorm Kinetics\nTamanho: 2\nFoguetes: 6xS3\n\nO módulo de foguete Yebira II é o sistema perfeito para o uso eficiente de munição S3. Fabricada pela Firestorm Kinetics, esta base de foguete suporta seis foguetes e se conecta a dois hardpoints de qualquer tamanho.\n\n--- STATS ---\nComponent HP: 750
item_DescGMISL_S01_CS_FSKI_Spark=Fabricante: Firestorm Kinetics \nSinal de Rastreamento: Seção Transversal \nTamanho: 1 \n\nAqueles que acreditam que tamanho não importa, fariam bem em ficar longe do Firestorm Kinetics Spark. Usando rastreamento por seção transversal, este míssil de proximidade leve causa um impacto considerável. Nota: Este míssil só pode ser lançado por veículos terrestres.\n\n--- STATS ---\nLifetime: 15.00s\nLock Range: 50 m – 10.0 km\nArm Time: 0.8s  |  Arm Dist: 1.1 km  |  Min Detonate: 5 m\nDamage: 1,150.0 (Phys)\nBlast Radius: 2 m\nComponent HP: 25
