item_DescMISL_S03_EM_FSKI_Thunderbolt=Fabricante: Firestorm Kinetics\nFarol de rastreamento: Eletromagnético\nTamanho: 3\n\nA estrutura manobrável do Firestorm Thunderbolt e o sistema de mira EM tornam este míssil de proximidade uma escolha sólida para uma variedade de cenários de combate.\n\n--- STATS ---\nLifetime: 35.00s\nLock Range: 1.9 km – 25.0 km\nArm Time: 1.5s  |  Arm Dist: 1.3 km  |  Min Detonate: 5 m\nDamage: 2,900.0 (Phys)\nBlast Radius: 5 m\nComponent HP: 25
item_DescMISL_S03_IR_NOVP_Viper=Fabricante: Nova Pyrotechnica\nFarol de rastreamento: Infravermelho\nTamanho: 3\n\nA Nova trabalhou duro para garantir que seu míssil de rastreamento infravermelho Viper faça jus ao seu nome, realizando ataques ágeis e mortais contra alvos inimigos.\n\n--- STATS ---\nLifetime: 35.00s\nLock Range: 1.9 km – 25.0 km\nArm Time: 1.5s  |  Arm Dist: 1.3 km  |  Min Detonate: 5 m\nDamage: 2,650.0 (Phys)\nBlast Radius: 6 m\nComponent HP: 25
item_DescMISL_S03_IR_VNCL_Chaos=Fabricante: Vanduul\nSinal de rastreamento: Infravermelho\nTamanho: 3\n\nOs instrutores de vôo da Marinha geralmente incluem o míssil Chaos Strike, que busca calor, em simulações de ataque Vanduul, pois sua velocidade e força dão aos novos recrutas o respeito necessário pelo inimigo que eles irão face.\n\n--- STATS ---\nLifetime: 35.00s\nLock Range: 1.9 km – 25.0 km\nArm Time: 1.5s  |  Arm Dist: 1.3 km  |  Min Detonate: 5 m\nDamage: 2,500.0 (Phys)\nBlast Radius: 6 m\nComponent HP: 25
item_DescMISL_S04_CS_TALN_Assailant=Fabricante: Talon\nSinal de rastreamento: Cross Section\nTamanho: 4\n\nO míssil Assailant do Talon é uma solução de arma perfeita para ataques de precisão contra oponentes motivados.\n\n--- STATS ---\nLifetime: 45.00s\nLock Range: 2.0 km – 25.0 km\nArm Time: 1.5s  |  Arm Dist: 1.0 km  |  Min Detonate: 5 m\nDamage: 6,500.0 (Phys)\nBlast Radius: 9 m\nComponent HP: 25
