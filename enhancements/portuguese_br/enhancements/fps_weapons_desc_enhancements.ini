item_Descksar_shotgun_energy_01=Fabricante: Kastak Arms\nTipo de item: Espingarda\nClasse: Energia (Plasma)\n\nTamanho da bateria: 12\nCadência de disparo: 60 rpm\nAlcance efetivo: 20 m\n\nAcessórios: Mira (S1), Cano (S3), Underflow (S2)\n\nA Devastator da Kastak Arms é uma espingarda de plasma capaz de disparar rajadas de plasma sustentadas, de médio alcance e alta penetração para combate corpo a corpo, limpeza e outras operações de combate. Quando a situação exige alto poder de impacto, o Devastator é a escolha certa.\n\n--- STATS ---\nWeight: 5.0 kg\nFire Rate: 60 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 120.0 x12 (Energy)  |  DPS: 120.0\nAmmo: 12\nVelocity: 300 m/s  |  Absolute Range: 600 m\nFull Dmg to: 14 m  |  Drop: -0.10/m  |  Min Dmg: 5.5
item_Descksar_shotgun_energy_01_black_purple01=Fabricante: Kastak Arms\nTipo de item: espingarda\nClasse: Energia (Plasma)\n\nTamanho da bateria: 12\nCadência: 60 rpm\nAlcance efetivo: 20 m\n\nEsta espingarda elétrica semiautomática da Kastak Arms oferece rajadas de plasma de alto impacto, ideais para combate corpo a corpo. A edição Voyager atualiza o visual com um acabamento metálico xadrez com destaques em azul. Uma combinação escandalosa de preto, ciano e roxo torna a edição "Rager" um momento extra bom.\n\n--- STATS ---\nWeight: 5.0 kg\nFire Rate: 60 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 120.0 x12 (Energy)  |  DPS: 120.0\nAmmo: 12\nVelocity: 300 m/s  |  Absolute Range: 600 m\nFull Dmg to: 14 m  |  Drop: -0.10/m  |  Min Dmg: 5.5
