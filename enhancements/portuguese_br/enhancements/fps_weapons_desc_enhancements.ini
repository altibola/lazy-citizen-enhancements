item_Descgrin_salvage_01=Fabricante: Greycat Industrial\nTipo de item: Utilitário\nClasse: Gadget\n\nTamanho do recipiente: Grande\nCadência de disparo: N / A (Feixe)\nAlcance efetivo: 5 m\n\nO Cambio é uma ferramenta de sucateamento e reparo (SRT) de dupla utilização projetado para coletar e converter ligas e polímeros de sucata em materiais compósitos reciclados que podem ser vendidos ou usados para reparos rápidos. O Cambio SRT apresenta velocidades de decapagem rápidas e bateria de longa duração, tornando-o um dispositivo essencial para mecânicos e viajantes espaciais.\n\n--- STATS ---\n<EM4>Repair:</EM4>  HP Rate: 160/s  |  Damage-Map Rate: 10/s  |  HP/Ammo: 0.10  |  Ramp: 0.5s↑ 0.1s↓\n<EM4>Salvage:</EM4>  HP Rate: 670/s  |  Damage-Map Rate: 10/s  |  Material Efficiency: 0.70  |  HP/Ammo: 5.80  |  Ramp: 4.0s↑ 2.0s↓
item_Descgrin_salvage_01_store01=Fabricante: Greycat Industrial\nTipo de Item: Utilitário\nClasse: Gadget\n\nTamanho do Cesto: Grande\nTaxa de Disparo: N / A (Feixe)\nAlcance Efetivo: 5 m\n\nDesmonte sucata e faça reparos com o Cambio, uma ferramenta de recuperação e reparo de dupla função (SRT) projetada para coletar e converter ligas e polímeros encontrados em sucata em material composto reciclado que pode ser vendido ou usado para fazer reparos rápidos. O Cambio SRT possui velocidades de desmonte rápidas e uma impressionante vida útil da bateria, tornando-o um gadget essencial para mecânicos e viajantes espaciais.\n\nA edição "Heartthrob" é um violeta cintilante e sonhador; perfeita para deixar amigos e inimigos fracos nas pernas.\n\n--- STATS ---\n<EM4>Repair:</EM4>  HP Rate: 160/s  |  Damage-Map Rate: 10/s  |  HP/Ammo: 0.10  |  Ramp: 0.5s↑ 0.1s↓\n<EM4>Salvage:</EM4>  HP Rate: 670/s  |  Damage-Map Rate: 10/s  |  Material Efficiency: 0.70  |  HP/Ammo: 5.80  |  Ramp: 4.0s↑ 2.0s↓
item_Descgrin_tractor_01=Fabricante: Greycat Industrial\nTipo de item: Raio Trator\nClasse: Gadget\n\nCapacidade do Carregador: Bateria integrada\nTaxa de disparo: N / A (Feixe)\nAlcance efetivo: 10-20 m\n\nO poderoso raio trator do Greycat fornece desempenho industrial a um preço favorável ao consumidor. Com sua bateria de maior duração e feixe mais largo, o MaxLift pode manusear itens mais pesados e volumosos com facilidade, tornando-o a ferramenta perfeita para longos dias de transporte de mercadorias.\n\n--- STATS ---\nWeight: 3.8 kg\nFire Modes: TRACTOR\nAlpha Dmg: 21.0 (Energy)\nAmmo: 60\nVelocity: 1,200 m/s  |  Absolute Range: 4.8 km
item_Descgrin_tractor_01_msn_rwd01=Fabricante: Greycat Industrial\nTipo de Item: Feixe de Trator\nClasse: Gadget\n\nCapacidade do Carregador: Bateria Integrada\nTaxa de Disparo: N / A (Feixe)\nAlcance Efetivo: 10-20 m\n\nO feixe de trator de alta resistência da Greycat possui desempenho industrial a um preço acessível. Com sua bateria de longa duração e emissor de feixe mais amplo, o MaxLift pode facilmente manipular itens mais pesados e volumosos, tornando-o a ferramenta ideal para longas jornadas de transporte de carga.\n\nA edição AA Transport apresenta uma cor verde metálica e foi destinada àqueles que ajudaram a Divisão de Transporte da Alliance Aid durante a crise de Levski.\n\n--- STATS ---\nWeight: 3.8 kg\nFire Modes: TRACTOR\nAlpha Dmg: 21.0 (Energy)\nAmmo: 60\nVelocity: 1,200 m/s  |  Absolute Range: 4.8 km
item_Descgrin_tractor_01_msn_rwd02=Fabricante: Greycat Industrial\nTipo de Item: Feixe Trator\nClasse: Gadget\n\nTamanho do Carregador: Bateria Integrada\nCadência de Uso: N / A (Feixe)\nAlcance Efetivo: 10-20 m\n\nO feixe trator de alta resistência da Greycat oferece desempenho industrial por um preço acessível ao consumidor. Com bateria de maior duração e emissor de feixe mais amplo, o MaxLift pode manipular facilmente itens mais pesados e volumosos, tornando-o a ferramenta perfeita para longos dias de movimentação de carga.\n\nA edição AA Support apresenta coloração vermelha intensa e é destinada àqueles que ajudaram Levski em seu momento de necessidade.\n\n--- STATS ---\nWeight: 3.8 kg\nFire Modes: TRACTOR\nAlpha Dmg: 21.0 (Energy)\nAmmo: 60\nVelocity: 1,200 m/s  |  Absolute Range: 4.8 km
item_Descgrin_tractor_01_store01=Fabricante: Greycat Industrial\nTipo de Item: Feixe Trator\nClasse: Gadget\n\nTamanho do Carregador: Bateria Integrada\nCadência de Uso: N / A (Feixe)\nAlcance Efetivo: 10-20 m\n\nO feixe trator de alta resistência da Greycat oferece desempenho industrial por um preço acessível ao consumidor. Com bateria de maior duração e emissor de feixe mais amplo, o MaxLift pode manipular facilmente itens mais pesados e volumosos, tornando-o a ferramenta perfeita para longos dias de movimentação de carga.\n\nA edição Keystone apresenta acabamento branco, cinza e azul com logotipos URW.\n\n--- STATS ---\nWeight: 3.8 kg\nFire Modes: TRACTOR\nAlpha Dmg: 21.0 (Energy)\nAmmo: 60\nVelocity: 1,200 m/s  |  Absolute Range: 4.8 km
item_Deschdgw_pistol_ballistic_01=Fabricante: Hedeby Gunworks\nTipo de item: Pistola Frag\nClasse: Balística\n\nTamanho do carregador: 8\nCadência de disparo: 140 rpm\nAlcance efetivo: 80 m / 10 m (carregado)\n\nAcessórios: Mira (S1), Barrel (S1), Cano Inferior (S1)\n\nEmbora a Salvo possa ser usada como uma Pistola normal, Hedeby não se limitou a isso. Com um acionamento prolongado do gatilho, um primer de congelamento é injetado na câmara e, quando liberado, o pesado pino de disparo atinge com força suficiente para pulverizar a caixa super-resfriada. Desenvolvido inadvertidamente na tentativa de reduzir o superaquecimento, esta opção de fogo carregado libera uma pulverização mortal de fragmentos em alta velocidade, seguida por um estrondo ensurdecedor.\n\n--- STATS ---\nWeight: 0.8 kg\nFire Rate: 170 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 45.0 (Phys)  |  DPS: 127.5\nAmmo: 8\nVelocity: 550 m/s  |  Absolute Range: 1.1 km\nFull Dmg to: 30 m  |  Drop: -0.08/m  |  Min Dmg: 25.0
item_Deschdgw_pistol_ballistic_01_engraved01=Fabricante: Hedeby Gunworks\nTipo de item: Pistola Frag\nClasse: Balística\n\nTamanho do carregador: 8\nCadência de disparo: 140 rpm\nAlcance efetivo: 80 m / 10 m (carregado)\n\nAcessórios: Mira (S1), Barrel (S1), Cano Inferior (S1)\n\nEmbora a Salvo possa ser usada como uma Pistola normal, Hedeby não se limitou a isso. Com um acionamento prolongado do gatilho, um primer de congelamento é injetado na câmara e, quando liberado, o pesado pino de disparo atinge com força suficiente para pulverizar a caixa super-resfriada. Desenvolvido acidentalmente para evitar o superaquecimento, esta opção de fogo carregado produz um spray mortal de estilhaços de alta velocidade seguido por um estrondo ensurdecedor. Esta Pistola de edição especial apresenta esculturas lindas e detalhadas projetadas pessoalmente pelo mestre armeiro Hedeby, Keisha Saeed.\n\n--- STATS ---\nWeight: 0.8 kg\nFire Rate: 170 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 45.0 (Phys)  |  DPS: 127.5\nAmmo: 8\nVelocity: 550 m/s  |  Absolute Range: 1.1 km\nFull Dmg to: 30 m  |  Drop: -0.08/m  |  Min Dmg: 25.0
