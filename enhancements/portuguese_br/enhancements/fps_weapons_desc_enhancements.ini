item_Descvolt_lmg_energy_01_collector02=Fabricante: Verified Offworld Laser Technologies\nTipo de Item: LMG\nClasse: Energia (Elétron)\n\nCapacidade da Bateria: 165\nCadência de Disparo: 550 rpm - 220 rpm\nAlcance Efetivo: 50 m\n\nAcessórios: Óptica (S3), Suporte sob o Cano (S3)\n\nOs engenheiros da VOLT desenvolveram a LMG Fresnel para levar uma arma de energia poderosa às linhas de frente, capaz de iniciar um combate com uma rajada rápida de disparos letais. À medida que a arma aquece, os tiros ficam mais lentos e mais potentes — cuidado com o superaquecimento. Uma arma desse porte exige base sólida; recomenda-se que os operadores atirem em posição agachada para um melhor controle do recuo.\n\nA edição Yormandi apresenta padrão esverdeado com a ilustração do réptil feroz na lateral.\n\n--- STATS ---\nWeight: 6.0 kg\nFire Rate: 550 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 9.0 (Energy)  |  DPS: 82.5\nAmmo: 165\nVelocity: 1,100 m/s  |  Absolute Range: 4.4 km
