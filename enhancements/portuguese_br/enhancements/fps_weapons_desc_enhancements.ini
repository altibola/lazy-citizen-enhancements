item_Descvolt_lmg_energy_01=Fabricante: Verified Offworld Laser Technologies\nTipo de Item: LMG\nClasse: Energia (Eletrônica)\n\nCapacidade da Bateria: 165\nTaxa de Fogo: 550 rpm - 220 rpm\nAlcance Eficaz: 50m\n\nAnexos: Óptica (S3), Sobrecano (S3)\n\nOs engenheiros da VOLT criaram a Fresnel LMG para trazer uma poderosa arma de energia para a linha de frente, capaz de iniciar um combate com uma rajada rápida de disparos mortais. À medida que a arma esquenta, os disparos se tornam mais lentos e mais potentes, mas cuidado com o superaquecimento. Uma arma dessa magnitude exige uma base forte; os operadores são aconselhados a atirar na posição agachada para melhor controle do recuo.\n\n--- STATS ---\nWeight: 6.0 kg\nFire Rate: 550 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 9.0 (Energy)  |  DPS: 82.5\nAmmo: 165\nVelocity: 1,100 m/s  |  Absolute Range: 4.4 km
