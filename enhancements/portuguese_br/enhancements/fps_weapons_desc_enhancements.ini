item_DescGMNI_rifle_ballistic_01=Fabricante: Gemini\nTipo de Item: Rifle de Assalto\nClasse: Balístico\n\nTamanho do carregador: 30\nCadência de disparo: 300 rpm / 900 rpm\nAlcance efetivo: 50 m\n\nAcessórios: Mira (S2), Cano (S2), Cano Inferior (S2)\n\nCom o S71, a Gemini desenvolveu um rifle de assalto ergonômico que é ideal para operações de médio alcance. Apresentando um calibre menor do que outras armas de sua classe, o S71 é popular entre militares privados por sua estética elegante e precisão precisa.\n\n--- STATS ---\nWeight: 2.5 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 21.5 (Phys)  |  DPS: 179.2\nAmmo: 30\nVelocity: 1,200 m/s  |  Absolute Range: 2.4 km\nFull Dmg to: 100 m  |  Drop: -0.10/m  |  Min Dmg: 17.5
item_DescGMNI_rifle_ballistic_01_collector01=Fabricante: Gemini\nTipo de Item: Rifle de Assalto\nClasse: Balístico\n\nCapacidade do Carregador: 30\nCadência de Tiro: 300 rpm / 900 rpm\nAlcance Efetivo: 50 m\n\nAcessórios: Óptica (S2), Cano (S2), Inferior (S2)\n\nCom o S71, a Gemini projetou um rifle de assalto ergonômico ideal para combates de média distância. Utilizando munição de calibre menor que outras armas de sua classe, o S71 tornou-se popular entre profissionais militares privados por sua estética elegante e precisão notável.\n\nA edição Hemlock apresenta um padrão de camuflagem verde.\n\n--- STATS ---\nWeight: 2.5 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 21.5 (Phys)  |  DPS: 179.2\nAmmo: 30\nVelocity: 1,200 m/s  |  Absolute Range: 2.4 km\nFull Dmg to: 100 m  |  Drop: -0.10/m  |  Min Dmg: 17.5
item_DescGMNI_rifle_ballistic_01_grey_red01=Fabricante: Gemini\nTipo de item: Rifle de assalto\nClasse: Balístico\n\nTamanho do carregador: 30\nCadência: 300 rpm / 900 rpm\nAlcance efetivo: 50 m\n\nAcessórios: Óptica (S2), Cano (S2), Sob o cano (S2)\n\nCom o S71, a Gemini projetou um rifle de assalto ergonômico ideal para combates de médio alcance. Equipado com um calibre menor do que outras armas de sua classe, o S71 se tornou popular entre os profissionais militares privados por sua estética elegante e precisão precisa. A edição "Justified" apresenta um cinza frio e destaques em vermelho brilhante.\n\n--- STATS ---\nWeight: 2.5 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 21.5 (Phys)  |  DPS: 179.2\nAmmo: 30\nVelocity: 1,200 m/s  |  Absolute Range: 2.4 km\nFull Dmg to: 100 m  |  Drop: -0.10/m  |  Min Dmg: 17.5
item_DescGMNI_rifle_ballistic_01_yellow_blue01=Fabricante: Gemini\nTipo de item: Rifle de assalto\nClasse: Balístico\n\nTamanho do carregador: 30\nCadência: 300 rpm / 900 rpm\nAlcance efetivo: 50 m\n\nAnexos: Ótica (S2), cano (S2), cano inferior (S2)\n\nCom o S71, a Gemini projetou um fuzil de assalto ergonômico ideal para combates de médio alcance. Com uma munição de calibre menor do que outras armas de sua classe, o S71 tornou-se popular entre os profissionais militares privados por sua estética elegante e precisão. O amarelo neon arrojado e o azul vívido se combinam para fazer com que o fuzil oficial da Murray Cup Racing se destaque da multidão.\n\n--- STATS ---\nWeight: 2.5 kg\nFire Rate: 500 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 21.5 (Phys)  |  DPS: 179.2\nAmmo: 30\nVelocity: 1,200 m/s  |  Absolute Range: 2.4 km\nFull Dmg to: 100 m  |  Drop: -0.10/m  |  Min Dmg: 17.5
item_DescGMNI_smg_ballistic_01=Fabricante: Gemini\nTipo de item: SMG\nClasse: Balístico\n\nTamanho do carregador: 50\nTaxa de disparo: 1.100 rpm\nAlcance efetivo: 35 m\n\nAcessórios: Cano (S1), Mira (S1), Cano Inferior (S1)\n\nFácil de manusear e uma beleza de se ver com seu estilo acentuado em roxo, a C54 é uma SMG elegante e precisamente equilibrada da Gemini. Sua estrutura de polímero leve e seu design ergonômico a tornam ideal para combates a curta distância. A C54 é capaz de disparar cartuchos de 10 mm em modo totalmente automático para proporcionar o máximo de apoio e saturação do alvo, garantindo que qualquer combate termine rapidamente.\n\n--- STATS ---\nWeight: 2.0 kg\nFire Rate: 925 RPM\nFire Modes: Auto\nAlpha Dmg: 11.5 (Phys)  |  DPS: 177.3\nAmmo: 50\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 15 m  |  Drop: -0.20/m  |  Min Dmg: 7.5
item_DescGMNI_smg_ballistic_01_grey_red01=Fabricante: Gemini\nTipo de item: SMG\nClasse: Balística\n\nTamanho do carregador: 50\nCadência: 1.100 rpm\nAlcance efetivo: 35 m\n\nAcessórios: Cano (S1), Óptica (S1), Sob o cano (S1)\n\nFácil de manusear e uma beleza de se ver com seu estilo com detalhes em roxo, a C54 é uma SMG elegante e precisamente balanceada da Gemini. Sua estrutura de polímero leve e design ergonômico a tornam ideal para combates de curta distância. A C54 é capaz de disparar tiros de 10 mm em modo totalmente automático para fornecer suporte máximo e saturação do alvo para garantir que qualquer combate termine rápido. A edição "Justified" apresenta um cinza frio e destaques em vermelho brilhante.\n\n--- STATS ---\nWeight: 2.0 kg\nFire Rate: 925 RPM\nFire Modes: Auto\nAlpha Dmg: 11.5 (Phys)  |  DPS: 177.3\nAmmo: 50\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 15 m  |  Drop: -0.20/m  |  Min Dmg: 7.5
item_DescKSAR_pistol_ballistic_01=Fabricante: Kastak Arms\nTipo de item: Pistola\nClasse: Balística\n\nTamanho do carregador: 6\nCadência de disparo: 180 rpm \nAlcance efetivo: 100 m\n\nAcessórios: Mira (S1), Cano (S1), Cano Inferior (S1)\n\nMuitas vezes chamado de "canhão de mão" da Kastak Arms, o Coda é capaz de encerrar uma batalha com um único cartucho calibre .50, embora o recuo do Coda seja difícil de controlar devido ao seu poder considerável. Dado o tamanho limitado do carregador e o recuo significativo, o fogo sustentado é desencorajado em favor de tiros únicos mais precisos.\n\n--- STATS ---\nWeight: 1.3 kg\nFire Rate: 180 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 60.0 (Phys)  |  DPS: 180.0\nAmmo: 6\nVelocity: 550 m/s  |  Absolute Range: 1.1 km\nFull Dmg to: 55 m  |  Drop: -0.20/m  |  Min Dmg: 35.0
item_DescKsar_rifle_energy_01_blue_gold_01=Fabricante: Kastak Arms\nTipo de item: Rifle de assalto\nClasse: Energia (Plasma)\n\nTamanho da bateria: 35\nCadência: 500 rpm\nAlcance efetivo: 50 m\n\nAcessórios: Óptica (S2), Cano (S2), Sob o cano (S2)\n\nO Karna é um rifle de assalto de plasma clássico da Kastak Arms. Este mauler de médio alcance apresenta modos de disparo carregado e totalmente automático para permitir ajustes situacionais rápidos e fáceis. Além de seu renomado poder de fogo, a aparência robusta e a confiabilidade do Karna o tornaram uma das armas mais populares da Kastak Arms. O esquema de cores azul e dourado ousado dá à edição Valor um apelo valente e digno.\n\n--- STATS ---\nWeight: 3.5 kg\nFire Rate: 600 RPM\nFire Modes: Auto / Charge / Semi-Auto\nAlpha Dmg: 17.5 (Energy)  |  DPS: 175.0\nAmmo: 35\nVelocity: 600 m/s  |  Absolute Range: 1.2 km\nFull Dmg to: 20 m  |  Drop: -0.11/m  |  Min Dmg: 14.5
item_Descapar_special_ballistic_01=Fabricante: Apocalypse Arms\nTipo de item: Canhão elétrico\nClasse: Balístico\n\nTamanho do carregador: 5\nCadência de disparo: 60 rpm\nAlcance efetivo: 200 m\n\nAcessórios: Mira (N/A), Cano (N / A), Alcance inferior (S4)\n\nUsando eletroímãs para entregar sua carga com precisão por longas distâncias, este canhão elétrico montado no ombro da Apocalypse Arms é o flagelo da terra, do ar e do espaço.\n\n--- STATS ---\nWeight: 12.1 kg\nFire Rate: 70 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 10.0 (Phys)  |  DPS: 11.7\nAmmo: 5\nVelocity: 50 m/s  |  Absolute Range: 200 m
item_Descapar_special_ballistic_01_mat01=Fabricante: Apocalypse Arms\nTipo de item: Pistola de trilho\nClasse: Balística\n\nTamanho do carregador: 5\nTaxa de disparo: 60 rpm\nAlcance efetivo: 200 m\n\nAnexos: Ótica (N/A), cano (N/A), cano inferior (S4)\n\nIgualmente devastador para ameaças maiores e veículos hostis, esse canhão ferroviário montado no ombro da Apocalypse Arms usa eletroímãs para entregar sua carga útil com precisão em grandes distâncias, tornando-o o Flagelo da terra, do ar e do espaço. Um dos muitos itens que Wikelo adquiriu em suas viagens, a edição “Quite Useful” é um item obrigatório para qualquer colecionador sério.\n\n--- STATS ---\nWeight: 12.1 kg\nFire Rate: 70 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 10.0 (Phys)  |  DPS: 11.7\nAmmo: 5\nVelocity: 50 m/s  |  Absolute Range: 200 m
item_Descapar_special_ballistic_02=Fabricante: Apocalypse Arms\nTipo de item: Lançador de mísseis\nClasse: Balístico\n\nTamanho do carregador: 3\nCadência de disparo: 300 rpm (salva de 3 tiros)\nAlcance efetivo: 2 km\n\nAcessórios: Mira (k.A), Barrel (n/a), Cano Inferior (n/a)\n\nLevante o Animus até o ombro e esmague o inimigo no campo de batalha. Este lançador de foguetes da Apocalypse Arms possui um cano giratório que dispara três foguetes rapidamente, tornando-o a arma perfeita para destruir tropas terrestres ou danificar veículos e pequenas naves. Quando precisar causar destruição para se salvar, você pode contar com Apocalypse Arms.\n\n--- STATS ---\nWeight: 16.8 kg\nFire Rate: 300 RPM\nFire Modes: Semi-Auto
item_Descapar_special_ballistic_02_mat01=Fabricante: Apocalypse Arms\nTipo de item: Lançador de mísseis\nClasse: Balístico\n\nTamanho do carregador: 3\nTaxa de disparo: 300 rpm (rajada de 3 tiros)\nAlcance efetivo: 2 km\n\nAnexos: Ótica (N/A), cano (N/A), cano inferior (N/A)\n\nLevante o Animus em seu ombro e nivele a oposição no campo de batalha. Esse lançador de mísseis da Apocalypse Arms apresenta um cano giratório que dispara rapidamente três mísseis, tornando-o a arma perfeita para obliterar forças terrestres ou danificar veículos e pequenas embarcações. Quando você precisar semear a destruição para se salvar, pode confiar na Apocalypse Arms. Um dos muitos itens que Wikelo adquiriu em suas viagens, a edição “Quite Useful” é um item obrigatório para qualquer colecionador sério.\n\n--- STATS ---\nWeight: 16.8 kg\nFire Rate: 300 RPM\nFire Modes: Semi-Auto
item_Descbehr_binoculars_01=O altamente preciso Telêmetro Monocular XDL da Behring é tão útil em uma expedição quanto no campo de batalha. Construído de forma robusta com lentes de alta qualidade, display fácil de ler e modo de amplificação de luz, o XDL oferece ampliação de 10x para fornecer medições a laser de distância exata em alvos distantes com confiança.\n\n--- STATS ---\nWeight: 1.5 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto
item_Descbehr_binoculars_01_collector01=O Monocular de Alcance XDL da Behring oferece precisão extrema, sendo tão útil em expedições quanto em campo de batalha. Construído de forma robusta, com lentes de alta qualidade, visor de fácil leitura e modo de amplificação de luz, o XDL fornece ampliação de 10x para medições a laser precisas de alvos distantes.\n\nA edição Mark I apresenta acabamento em cinza e azul-aço.\n\n--- STATS ---\nWeight: 1.5 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto
item_Descbehr_binoculars_01_tint01=O preciso Monocular Rangefinder XDL da Behring é tão adequado para uma expedição quanto para o campo de batalha. Construído de forma robusta com lentes de alta qualidade, display de fácil leitura e modo de amplificação de luz, o XDL fornece magnificação de 10x para medições laser de distância com precisão em alvos distantes.\n\nA edição Snowfall apresenta um acabamento branco imaculado.\n\n--- STATS ---\nWeight: 1.5 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto
item_Descbehr_binoculars_01_tint02=O preciso Monocular Rangefinder XDL da Behring é tão adequado para uma expedição quanto para o campo de batalha. Construído de forma robusta com lentes de alta qualidade, display de fácil leitura e modo de amplificação de luz, o XDL fornece magnificação de 10x para medições laser de distância com precisão em alvos distantes.\n\nA edição Tactical apresenta acabamento preto.\n\n--- STATS ---\nWeight: 1.5 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto
item_Descbehr_binoculars_01_tint03=O preciso Monocular Rangefinder XDL da Behring é tão adequado para uma expedição quanto para o campo de batalha. Construído de forma robusta com lentes de alta qualidade, display de fácil leitura e modo de amplificação de luz, o XDL fornece magnificação de 10x para medições laser de distância com precisão em alvos distantes.\n\nA edição Forest apresenta um acabamento bicolor, com verde claro e escuro.\n\n--- STATS ---\nWeight: 1.5 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto
item_Descbehr_glauncher_ballistic_01=Fabricante: Behring\nTipo de item: Lançador de granadas\nClasse: Balístico\n\nTamanho do carregador: 6\nCadência de disparo: 40 rpm\nAlcance efetivo: Variável (80m)\n\nAcessórios: Mira (S1), Cano (N/A), Lower Barrel (S1)\n\nO lançador GP-33 MOD de nível militar dispara granadas de 40 mm para limpar espaços e expulsar inimigos atrás de cobertura, graças ao design de precisão de Behring que prepara cada granada para ser lançada no momento da explosão de impacto.\n\n--- STATS ---\nWeight: 5.3 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 12.5 (Phys)  |  DPS: 12.5\nAmmo: 6\nVelocity: 50 m/s  |  Absolute Range: 200 m
item_Descbehr_glauncher_ballistic_01_black01=Fabricante: Behring\nTipo de item: Lançador de granadas\nClasse: Balístico\n\nTamanho do carregador: 6\nCadência de disparo: 40 rpm\nAlcance efetivo: Variável (80m)\n\nAcessórios: Mira (S1), Cano (N/A), Lower Barrel (S1)\n\nO lançador GP-33 MOD de nível militar dispara granadas de 40 mm para limpar espaços e expulsar inimigos atrás de cobertura, graças ao design de precisão de Behring que prepara cada granada para ser lançada no momento da explosão de impacto. A combinação das cores preto e cinza confere à edição Thunderclap uma aparência sutil adequada para qualquer profissional de segurança.\n\n--- STATS ---\nWeight: 5.3 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 12.5 (Phys)  |  DPS: 12.5\nAmmo: 6\nVelocity: 50 m/s  |  Absolute Range: 200 m
item_Descbehr_glauncher_ballistic_01_cen01=Fabricante: Behring\nTipo de item: Lançador de granadas\nClasse: Balístico\n\nTamanho do carregador: 6\nCadência de disparo: 40 rpm\nAlcance efetivo: Variável (80m)\n\nAcessórios: Mira (S1), Cano Inferior (S1)\n\nO lançador GP-33 MOD de nível militar dispara granadas de 40 mm para limpar espaços e forçar os inimigos a saírem da cobertura, graças ao design de precisão de Behring que prepara cada granada para explodir com o impacto. A edição Ashfall combina azul escuro, cinza e preto para um visual sutil, mas elegante.\n\n--- STATS ---\nWeight: 5.3 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 12.5 (Phys)  |  DPS: 12.5\nAmmo: 6\nVelocity: 50 m/s  |  Absolute Range: 200 m
item_Descbehr_glauncher_ballistic_01_imp01=Fabricante: Behring\nTipo de item: Lançador de granadas\nClasse: Balístico\n\nTamanho do carregador: 6\nCadência de disparo: 40 rpm\nAlcance efetivo: Variável (80m)\n\nAcessórios: Mira (S1), Cano Inferior (S1)\n\nO lançador militar GP-33 MOD dispara granadas de 40 mm para limpar espaços e expulsar inimigos atrás de cobertura, graças ao design de precisão de Behring que prepara cada granada para explodir com o impacto. Um acabamento leve e metálico no cano e na coronha diferencia a Copperhead Edition de outras versões e chama a atenção.\n\n--- STATS ---\nWeight: 5.3 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 12.5 (Phys)  |  DPS: 12.5\nAmmo: 6\nVelocity: 50 m/s  |  Absolute Range: 200 m
item_Descbehr_glauncher_ballistic_01_mat01=Fabricante: Behring\nTipo de item: Lançador de granadas\nClasse: Balístico\n\nTamanho do cartucho: 6\nTaxa de disparo: 40 rpm\nAlcance efetivo: Variável (80 m)\n\nAnexos: Ótica (S1), cano (N/A), cano inferior (S1)\n\nO lançador GP-33 MOD de nível militar dispara granadas de 40 mm para limpar salas e expulsar inimigos atrás de cobertura, graças ao design de precisão da Behring que prepara cada granada para explodir com o impacto. Um dos muitos itens que Wikelo adquiriu em suas viagens, a edição “Quite Useful” é um item obrigatório para qualquer colecionador sério.\n\n--- STATS ---\nWeight: 5.3 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 12.5 (Phys)  |  DPS: 12.5\nAmmo: 6\nVelocity: 50 m/s  |  Absolute Range: 200 m
item_Descbehr_glauncher_ballistic_01_shin=Fabricante: Behring\nTipo de item: Lançador de granadas\nClasse: Balístico\n\nTamanho do carregador: 6\nCadência de disparo: 40 rpm\nAlcance efetivo: Variável (80m)\n\nAcessórios: Mira (S1), Cano Inferior (S1)\n\nO lançador GP-33 MOD de nível militar dispara granadas de 40 mm para limpar espaços e forçar os inimigos a saírem da cobertura, graças ao design de precisão de Behring que prepara cada granada para explodir com o impacto. A Edição Umber é decorada em ferrugem e laranja.\n\n--- STATS ---\nWeight: 5.3 kg\nFire Rate: 60 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 12.5 (Phys)  |  DPS: 12.5\nAmmo: 6\nVelocity: 50 m/s  |  Absolute Range: 200 m
item_Descbehr_lmg_ballistic_01=Fabricante: Behring\nTipo de item: LMG\nClasse: Balístico\n\nTamanho do carregador: 75\nTaxa de disparo: 800 rpm\nAlcance efetivo: 40 m\n\nAcessórios: Mira (S2), Cano (S2), Cano Inferior (S3)\n\nBehring projetou a FS-9 para ser uma força avassaladora no campo de batalha. Essa metralhadora leve apresenta um modo totalmente automático, o que a torna ideal para lançar fogo de cobertura ou conter o avanço dos inimigos. A FS-9 também é aclamada por sua capacidade de manter a precisão enquanto dispara fogo contínuo.\n\n--- STATS ---\nWeight: 6.8 kg\nFire Rate: 650 RPM\nFire Modes: Auto\nAlpha Dmg: 14.5 (Phys)  |  DPS: 157.1\nAmmo: 75\nVelocity: 600 m/s  |  Absolute Range: 1.2 km\nFull Dmg to: 50 m  |  Drop: -0.01/m  |  Min Dmg: 10.0
item_Descbehr_lmg_ballistic_01_luminalia_green01=Fabricante: Behring\nTipo de item: LMG\nClasse: Balístico\n\nTamanho do carregador: 75\nTaxa de disparo: 800 rpm\nAlcance efetivo: 40 m\n\nAcessórios: Mira (S2), Cano (S2), Cano Inferior (S3)\n\nBehring projetou a FS-9 para ser uma força avassaladora no campo de batalha. Essa metralhadora leve apresenta um modo totalmente automático, o que a torna ideal para lançar fogo de cobertura ou conter o avanço dos inimigos. A FS-9 também é aclamada por sua capacidade de manter a precisão enquanto dispara fogo contínuo. A edição Evergreen abraça o espírito da Luminalia usando uma cor tradicional de férias com seu tom verde vibrante.\n\n--- STATS ---\nWeight: 6.8 kg\nFire Rate: 650 RPM\nFire Modes: Auto\nAlpha Dmg: 14.5 (Phys)  |  DPS: 157.1\nAmmo: 75\nVelocity: 600 m/s  |  Absolute Range: 1.2 km\nFull Dmg to: 50 m  |  Drop: -0.01/m  |  Min Dmg: 10.0
item_Descbehr_lmg_ballistic_01_tint01=Fabricante: Behring\nTipo de Item: LMG\nClasse: Balística\n\nCapacidade do Carregador: 75\nTaxa de Disparo: 800 rpm\nAlcance Efetivo: 40 m\n\nAcessórios: Ópticas (S2), Cano (S2), Sob cano (S3)\n\nA Behring projetou a FS-9 para ser uma força avassaladora no campo de batalha. Esta metralhadora leve possui um modo totalmente automático, tornando-a ideal para fornecer fogo de cobertura ou conter inimigos que avançam. A FS-9 também é aclamada pela sua capacidade de manter precisão enquanto dispara continuamente. A edição Blacklist apresenta um acabamento preto escuro.\n\n--- STATS ---\nWeight: 6.8 kg\nFire Rate: 650 RPM\nFire Modes: Auto\nAlpha Dmg: 14.5 (Phys)  |  DPS: 157.1\nAmmo: 75\nVelocity: 600 m/s  |  Absolute Range: 1.2 km\nFull Dmg to: 50 m  |  Drop: -0.01/m  |  Min Dmg: 10.0
item_Descbehr_lmg_ballistic_01_xenothreat01=Fabricante: Behring\nTipo de item: LMG\nClasse: Balístico\n\nTamanho do carregador: 75\nTaxa de disparo: 800 rpm\nAlcance efetivo: 40 m\n\nAcessórios: Mira (S2), Cano (S2), Cano Inferior (S3)\n\nBehring projetou a FS-9 para ser uma força avassaladora no campo de batalha. Essa metralhadora leve apresenta um modo totalmente automático, o que a torna ideal para lançar fogo de cobertura ou conter o avanço dos inimigos. A FS-9 também é aclamada por sua capacidade de manter a precisão ao mesmo tempo em que libera fogo contínuo. Para esse lançamento da linha Legendary Bounty Hunters, o famoso rastreador Farook "Stoneface" Norris desenhou um visual para sua amada FS-9 LMG, com marcantes toques de vermelho em um tom de base cinza.\n\n--- STATS ---\nWeight: 6.8 kg\nFire Rate: 650 RPM\nFire Modes: Auto\nAlpha Dmg: 14.5 (Phys)  |  DPS: 157.1\nAmmo: 75\nVelocity: 600 m/s  |  Absolute Range: 1.2 km\nFull Dmg to: 50 m  |  Drop: -0.01/m  |  Min Dmg: 10.0
item_Descbehr_lmg_ballistic_01_yellow_grey01=Fabricante: Behring\nTipo de item: LMG\nClasse: Balístico\n\nTamanho do carregador: 75\nTaxa de disparo: 800 rpm\nAlcance efetivo: 40 m\n\nAcessórios: Mira (S2), Cano (S2), Cano Inferior (S3)\n\nBehring projetou a FS-9 para ser uma força avassaladora no campo de batalha. Essa metralhadora leve possui um modo totalmente automático, o que a torna ideal para lançar fogo de cobertura ou conter o avanço dos inimigos. A FS-9 também é aclamada por sua capacidade de manter a precisão ao mesmo tempo em que libera fogo contínuo. Atualizada com novas cores amarela e cinza, essa edição especial da Finish Line é uma homenagem às corridas de naves estelares.\n\n--- STATS ---\nWeight: 6.8 kg\nFire Rate: 650 RPM\nFire Modes: Auto\nAlpha Dmg: 14.5 (Phys)  |  DPS: 157.1\nAmmo: 75\nVelocity: 600 m/s  |  Absolute Range: 1.2 km\nFull Dmg to: 50 m  |  Drop: -0.01/m  |  Min Dmg: 10.0
item_Descbehr_pistol_ballistic_01=Fabricante: Behring\nTipo de item: Pistola\nClasse: Balística\n\nTamanho do carregador: 20\nCadência de disparo: 450 rpm\nAlcance efetivo: 25 m\n\nAcessórios: Mira (S1), Cano (S1), Cano Inferior (S1)\n\nGraças a um design simplificado e uma estrutura de polímero leve que minimiza o recuo, é fácil ver por que o versátil e confiável S-38 da Behring se tornou uma arma confiável para cidadãos e policiais em todo o império.\n\n--- STATS ---\nWeight: 0.9 kg\nFire Rate: 450 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 22.5 (Phys)  |  DPS: 168.8\nAmmo: 20\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 20 m  |  Drop: -0.25/m  |  Min Dmg: 16.0
item_Descbehr_pistol_ballistic_01_300=Fabricante: Behring\nTipo de item: Pistola\nClasse: Balística\n\nTamanho do carregador: 20\nCadência de disparo: 450 rpm\nAlcance efetivo: 25 m\n\nAcessórios: Mira (S1), Cano (S1), Cano Inferior (S1)\n\nGraças ao design simplificado e à estrutura de polímero leve que minimiza o recuo, é fácil ver por que a versátil e confiável S-38 da Behring se tornou uma arma confiável em todo o Reich. Esta edição especial apresenta um trenó Imperial Blue para comemorar os esforços contínuos de "One Empire", uma iniciativa governamental de base comunitária.\n\n--- STATS ---\nWeight: 0.9 kg\nFire Rate: 450 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 22.5 (Phys)  |  DPS: 168.8\nAmmo: 20\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 20 m  |  Drop: -0.25/m  |  Min Dmg: 16.0
item_Descbehr_pistol_ballistic_01_firerats01=Fabricante: Behring\nTipo de item: Pistola\nClasse: Balística\n\nTamanho do carregador: 20\nTaxa de disparo: 450 rpm\nAlcance efetivo: 25 m\n\nAcessórios: Ótica (S1), cano (S1), cano inferior (S1)\n\nGraças a um design aerodinâmico e a uma armação de polímero leve que ajuda a minimizar o recuo, é fácil ver por que a versátil e confiável S-38 da Behring se tornou uma arma secundária confiável em todo o Império, tanto para cidadãos quanto para policiais. A edição Scorched apresenta uma pátina de chama exclusiva.\n\n--- STATS ---\nWeight: 0.9 kg\nFire Rate: 450 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 22.5 (Phys)  |  DPS: 168.8\nAmmo: 20\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 20 m  |  Drop: -0.25/m  |  Min Dmg: 16.0
item_Descbehr_rifle_ballistic_01=Fabricante: Behring\nTipo de Item: Rifle de Assalto\nClasse: Balístico\n\nTamanho do carregador: 40\nCadência de disparo: 550 rpm\nAlcance efetivo: 50 m\n\nAcessórios: Mira (S2), Cano (S2), Cano Inferior (S2)\n\nO clássico rifle P4 AR da Behring apresenta uma coronha dobrável e um cano encurtado, tornando-o a escolha ideal para tiroteios de curta distância. Devido à sua precisão e fácil manuseio, é altamente valorizado pelas forças de segurança, militares e usuários civis.\n\n--- STATS ---\nWeight: 2.6 kg\nFire Rate: 810 RPM\nFire Modes: Auto / Semi-Auto\nAlpha Dmg: 12.0 (Phys)  |  DPS: 162.0\nAmmo: 40\nVelocity: 550 m/s  |  Absolute Range: 1.1 km\nFull Dmg to: 40 m  |  Drop: -0.05/m  |  Min Dmg: 10.0
item_Descbehr_rifle_ballistic_01_store01=Fabricante: Behring\nTipo de Item: Rifle de Assalto\nClasse: Balística\n\nCapacidade do Carregador: 40\nTaxa de Disparo: 550 rpm\nAlcance Efetivo: 50 m\n\nAcessórios: Ópticas (S2), Cano (S2), Sob cano (S2)\n\nO rifle clássico P4-AR da Behring possui uma coronha retrátil e um cano encurtado, tornando-o uma escolha ideal para combates a curta distância. Sua precisão e facilidade de uso geral fazem dele uma escolha universal entre usuários de segurança, militares e civis.\n\nA edição "Fortuna" é verde com um trevo de quatro folhas estampado na lateral.\n\n--- STATS ---\nWeight: 2.6 kg\nFire Rate: 810 RPM\nFire Modes: Auto / Semi-Auto\nAlpha Dmg: 12.0 (Phys)  |  DPS: 162.0\nAmmo: 40\nVelocity: 550 m/s  |  Absolute Range: 1.1 km\nFull Dmg to: 40 m  |  Drop: -0.05/m  |  Min Dmg: 10.0
item_Descbehr_rifle_ballistic_01_tint01=Fabricante: Behring\nTipo de Item: Rifle de Assalto\nClasse: Balístico\n\nTamanho do Carregador: 40\nCadência de Tiro: 550 rpm\nAlcance Efetivo: 50 m\n\nO clássico rifle P4-AR da Behring possui coronha retrátil e cano encurtado, tornando-o uma escolha ideal para combates em espaços confinados. Sua precisão e facilidade geral de uso fazem dele um equipamento valorizado por usuários de segurança, militares e civis.\n\nA edição Blacklist apresenta acabamento em preto.\n\n--- STATS ---\nWeight: 2.6 kg\nFire Rate: 810 RPM\nFire Modes: Auto / Semi-Auto\nAlpha Dmg: 12.0 (Phys)  |  DPS: 162.0\nAmmo: 40\nVelocity: 550 m/s  |  Absolute Range: 1.1 km\nFull Dmg to: 40 m  |  Drop: -0.05/m  |  Min Dmg: 10.0
item_Descbehr_rifle_ballistic_02_black01=Fabricante: Behring \nTipo de item: Rifle de assalto\nClasse: Balístico\n\nTamanho do carregador: 15\nCadência: 475 rpm\nAlcance efetivo: 100 m\n\nAcessórios: Óptica (S2), Cano (S2), Sob o cano (S2)\n\nDescendente direto da arma padrão da UEE Marines, a Behring criou o P8-AR semiautomático para fornecer aos civis em todo o império uma arma simples e confiável para se defenderem contra hostis agressivos. Equipado com uma tinta preta fosca, o rifle de edição especial "Blackguard" é perfeito para operações noturnas.\n\n--- STATS ---\nWeight: 2.4 kg\nFire Rate: 235 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 45.0 (Phys)  |  DPS: 176.2\nAmmo: 15\nVelocity: 1,150 m/s  |  Absolute Range: 2.3 km\nFull Dmg to: 50 m  |  Drop: -0.10/m  |  Min Dmg: 40.0
