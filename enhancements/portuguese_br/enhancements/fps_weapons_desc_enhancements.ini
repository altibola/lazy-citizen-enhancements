item_Desckegr_fire_extinguisher_01=Fabricante: KE Group\nTipo de item: Extintor de incêndio\nClasse: Gadget\n\nTamanho da revista: Botijão de gás\nTaxa de incêndio: Constante\nAlcance efetivo: 3-4 m\n\nO extintor de incêndio APX do KE Group foi classificado como o melhor equipamento de segurança de nível de consumidor da categoria por mais de uma década, o que o torna o padrão do setor em prevenção de incêndios. Preenchido com um composto de resfriamento gasoso patenteado, o extintor pode abafar rapidamente qualquer incêndio à vista. A tela digital do dispositivo permite monitorar a temperatura local para ajudá-lo a conter e eliminar os riscos de incêndio.\n\n--- STATS ---\nWeight: 3.2 kg\nFire Rate: 600 RPM\nFire Modes: Auto\nAlpha Dmg: 18.0 (Thermal)  |  DPS: 180.0\nAmmo: 3,000\nRegen: 0/s  |  Cooldown: 3.0s  |  Cost/Shot: 1\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
item_Descklwe_lmg_energy_01=Fabricante: Klaus & Werner\nTipo de item: LMG\nClasse: Energia (Laser)\n\nTamanho da bateria: 100\nTaxa de disparo: 400 rpm\nAlcance efetivo: 40 m\n\nAcessórios: Mira (S2), barril (S2), alcances inferiores (S3)\n\nKlaus & Werner criaram uma arma icônica com o comprovado Demeco Laser LMG. Este favorito da infantaria de curto e médio alcance é frequentemente usado em operações militares e é projetado tendo estabilidade e precisão como prioridade.\n\n--- STATS ---\nWeight: 9.8 kg\nFire Rate: 800 RPM\nFire Modes: Auto\nAlpha Dmg: 11.5 (Energy)  |  DPS: 153.3\nAmmo: 100\nVelocity: 600 m/s  |  Absolute Range: 2.4 km
item_Descklwe_lmg_energy_01_IAE2022=Fabricante: Klaus & Werner\nTipo de item: LMG\nClasse: Energia (Laser)\n\nTamanho da bateria: 100\nTaxa de disparo: 400 rpm\nAlcance efetivo: 40 m\n\nAcessórios: Mira (S2), barril (S2), alcances inferiores (S3)\n\nKlaus & Werner criaram uma arma icônica com o comprovado Demeco Laser LMG. Este favorito da infantaria de curto e médio alcance é frequentemente usado em operações militares e é projetado com estabilidade e precisão na vanguarda. A edição "Red Alert" mistura cinza e vermelho brilhante para um design arrojado e dinâmico.\n\n--- STATS ---\nWeight: 9.8 kg\nFire Rate: 800 RPM\nFire Modes: Auto\nAlpha Dmg: 11.5 (Energy)  |  DPS: 153.3\nAmmo: 100\nVelocity: 600 m/s  |  Absolute Range: 2.4 km
item_Descklwe_lmg_energy_01_mr01=Fabricante: Klaus & Werner\nTipo de Item: MTP\nClasse: Energia (Laser)\n\nCapacidade da Bateria: 100\nCadência de Tiro: 400 rpm\nAlcance Efetivo: 40 m\n\nAcessórios: Mira (S2), Cano (S2), Sob Cano (S3)\n\nA Klaus & Werner criou uma arma icônica com a confiável MTP laser Demeco. Amplamente utilizada em confrontos militares, esta favorita da infantaria para curtas e médias distâncias foi construída priorizando estabilidade e precisão.\n\nA edição Purgatory Camo mistura tons de cinza em um design elegante e sem frescura.\n\n--- STATS ---\nWeight: 9.8 kg\nFire Rate: 800 RPM\nFire Modes: Auto\nAlpha Dmg: 11.5 (Energy)  |  DPS: 153.3\nAmmo: 100\nVelocity: 600 m/s  |  Absolute Range: 2.4 km
item_Descklwe_lmg_energy_01_purple_blue01=Fabricante: KLAUS & WERNER \nITEM TIPO: LMG \nCLASS: Energia (laser) \n \nTamanho da Bateria: 100 \nrate of Fire: 400 rpm \neffective alcance: 40 M \n \nAcessórios: Optics (S2), barril (S2), UnderBarrel (S3) \n \nklaus & Werner criou uma arma icônica com a True e True DeMeCo Laser LMG.Utilizado extensivamente em compromissos militares, esse favorito de infantaria de curto a médio alcance foi construído com estabilidade e precisão na vanguarda.A edição ultravioleta apresenta coloração violeta e orquídea atraentes.\n\n--- STATS ---\nWeight: 9.8 kg\nFire Rate: 800 RPM\nFire Modes: Auto\nAlpha Dmg: 11.5 (Energy)  |  DPS: 153.3\nAmmo: 100\nVelocity: 600 m/s  |  Absolute Range: 2.4 km
item_Descklwe_pistol_energy_01=Fabricante: Klaus & Werner\nTipo de item: Pistola\nClasse: Energia (Laser)\n\nTamanho da bateria: 30\nCadência de disparo: 300 rpm\nAlcance efetivo: 30 m\n\nAcessórios: Mira (S1), Cano (S1), Lower Barrel (S1)\n\nUm laser portátil que ficou famoso como a arma de Kyle Fenris na série de sucesso The Frontier, o Klaus & Werner Model II Arclight é extremamente popular no mercado civil. Apesar do seu apelo mediático, o Modelo II oferece uma Cadência mais elevada do que qualquer um dos seus homólogos balísticos. Embora isso possa reduzir o poder de penetração da arma, sua célula de energia fornece tiros mais que suficientes para realizar o trabalho.\n\n--- STATS ---\nWeight: 1.4 kg\nFire Rate: 700 RPM\nFire Modes: Burst / Semi-Auto\nAlpha Dmg: 18.0 (Energy)  |  DPS: 210.0\nAmmo: 30\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
item_Descklwe_pistol_energy_01_chromic01=Fabricante: Klaus & Werner\nTipo de item: Pistola\nClasse: Energia (Laser)\n\nTamanho da bateria: 30\nCadência de disparo: 300 rpm\nAlcance efetivo: 30 m\n\nO Klaus & Werner Model II Arclight é um Laser de mão, que ficou conhecido como a arma de Kyle Fenris na série de sucesso The Frontier e é muito popular no mercado civil. Apesar do seu apelo mediático, o Modelo II oferece uma Cadência mais elevada do que qualquer um dos seus homólogos balísticos. Embora isso possa reduzir o poder de penetração da arma, sua célula de energia fornece tiros mais que suficientes para realizar o trabalho. Esta edição exclusiva de mica apresenta um revestimento iridescente distinto que faz com que a arma brilhe em cores diferentes dependendo das condições de iluminação e do ângulo de visão.\n\n--- STATS ---\nWeight: 1.4 kg\nFire Rate: 700 RPM\nFire Modes: Burst / Semi-Auto\nAlpha Dmg: 18.0 (Energy)  |  DPS: 210.0\nAmmo: 30\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
item_Descklwe_pistol_energy_01_engraved01=Fabricante: Klaus & Werner\nTipo de item: Pistola\nClasse: Energia (Laser)\n\nTamanho da bateria: 30\nCadência de disparo: 300 rpm\nAlcance efetivo: 30 m\n\nAcessórios: Mira (S1), Cano (S1), Lower Barrel (S1)\n\nUm laser portátil que ficou famoso como a arma de Kyle Fenris na série de sucesso The Frontier, o Klaus & Werner Model II Arclight é extremamente popular no mercado civil. Apesar do seu apelo mediático, o Modelo II oferece uma Cadência mais elevada do que qualquer um dos seus homólogos balísticos. Embora isso possa reduzir o poder de penetração da arma, sua célula de energia fornece tiros mais que suficientes para realizar o trabalho. A edição Herrero apresenta gravuras geométricas na armação e no punho, bem como um guarda-mato texturizado.\n\n--- STATS ---\nWeight: 1.4 kg\nFire Rate: 700 RPM\nFire Modes: Burst / Semi-Auto\nAlpha Dmg: 18.0 (Energy)  |  DPS: 210.0\nAmmo: 30\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
item_Descklwe_rifle_energy_01=Fabricante: Klaus & Werner\nTipo de item: Rifle de assalto\nClasse: Energia (Laser)\n\nTamanho da bateria: 45\nCadência de disparo: 450 rpm\nAlcance efetivo: 50 m\n\nAcessórios: Mira (S2), Barrel (S2), Cano Inferior (S2)\n\nFuzis de assalto confiáveis nunca saem de moda. Klaus & Werner continua esta tradição com a introdução do Gallant. Este rifle de assalto baseado em energia é capaz de disparar de forma precisa e sustentada em alvos de médio alcance, enquanto seu sistema de energia de alto desempenho permite ao operador disparar significativamente mais tiros por bateria.\n\n--- STATS ---\nWeight: 3.8 kg\nFire Rate: 900 RPM\nFire Modes: Burst\nAlpha Dmg: 21.0 (Energy)  |  DPS: 315.0\nAmmo: 45\nVelocity: 1,200 m/s  |  Absolute Range: 4.8 km
item_Descklwe_rifle_energy_01_IAE2022=Fabricante: Klaus & Werner\nTipo de item: Rifle de assalto\nClasse: Energia (Laser)\n\nTamanho da bateria: 45\nCadência de disparo: 450 rpm\nAlcance efetivo: 50 m\n\nAcessórios: Mira (S2), Barrel (S2), Cano Inferior (S2)\n\nFuzis de assalto confiáveis nunca saem de moda. Klaus & Werner continua esta tradição com a introdução do Gallant. Este rifle de assalto baseado em energia é capaz de disparar tiros precisos e sustentados em alvos de médio alcance, enquanto seu sistema de energia de alto desempenho permite ao operador disparar significativamente mais tiros por bateria. A edição "Red Alert" mistura cinza e vermelho brilhante para criar um design arrojado e dinâmico.\n\n--- STATS ---\nWeight: 3.8 kg\nFire Rate: 900 RPM\nFire Modes: Burst\nAlpha Dmg: 21.0 (Energy)  |  DPS: 315.0\nAmmo: 45\nVelocity: 1,200 m/s  |  Absolute Range: 4.8 km
item_Descklwe_rifle_energy_01_sf01=Fabricante: Klaus & Werner\nTipo de Item: Rifle de Assalto\nClasse: Energia (Laser)\n\nCapacidade da Bateria: 45\nCadência de Tiro: 450 rpm\nAlcance Efetivo: 50 m\n\nAcessórios: Mira (S2), Cano (S2), Sob Cano (S2)\n\nArmas de assalto confiáveis nunca saem de moda. A Klaus & Werner mantém essa tradição ao revelar a Gallant. Este rifle de assalto baseado em energia é capaz de fornecer fogo preciso e sustentado contra alvos de médio alcance, enquanto seu sistema de energia de alta capacidade permite que operadores realizem significativamente mais disparos por bateria.\n\nA edição Conviction Camo utiliza uma seleção difusa de tons de cinza para ajudar na camuflagem em ambientes urbanos.\n\n--- STATS ---\nWeight: 3.8 kg\nFire Rate: 900 RPM\nFire Modes: Burst\nAlpha Dmg: 21.0 (Energy)  |  DPS: 315.0\nAmmo: 45\nVelocity: 1,200 m/s  |  Absolute Range: 4.8 km
item_Descklwe_rifle_energy_01_store01=Fabricante: Klaus & Werner\nTipo de Item: Rifle de Assalto\nClasse: Energia (Laser)\n\nTamanho da Bateria: 45\nCadência de Tiro: 450 rpm\nAlcance Efetivo: 50 m\n\nAcessórios: Óptica (S2), Cano (S2), Inferior (S2)\n\nArmas de assalto confiáveis nunca saem de moda. A Klaus & Werner mantém essa tradição ao apresentar o Gallant. Este rifle de assalto baseado em energia é capaz de fornecer fogo preciso e sustentado contra alvos a média distância, enquanto seu sistema de energia de alta capacidade permite disparar significativamente mais tiros por bateria.\n\nA edição Redline apresenta pintura base vermelha intensa com destaques em preto e dourado.\n\n--- STATS ---\nWeight: 3.8 kg\nFire Rate: 900 RPM\nFire Modes: Burst\nAlpha Dmg: 21.0 (Energy)  |  DPS: 315.0\nAmmo: 45\nVelocity: 1,200 m/s  |  Absolute Range: 4.8 km
item_Descklwe_smg_energy_01=Fabricante: Klaus & Werner\nTipo de item: SMG\nClasse: Laser\n\nTamanho da bateria: 45\nTaxa de disparo: 562,5 rpm\nAlcance efetivo: 25m\n\nAcessórios: Mira (S1), barril (S1), inferior Barrel (S1)\n\nA perícia artesanal de Klaus & Werner está de volta com força total para tornar o Rifle de Energia Compacto Laser Lumin V ainda mais mortal e confiável. O novo modo “Interval Autofire” dispara cinco tiros enquanto mantém pressionado o gatilho para aproveitar a saturação do alvo que vem com o disparo automático, ao mesmo tempo que fornece pausas para reequilibrar o alvo. Mesmo em uso constante, a arma oferece baixo recuo e baixa dispersão graças ao seu excelente design.\n\n--- STATS ---\nWeight: 2.6 kg\nFire Rate: 700 RPM\nFire Modes: Burst\nAlpha Dmg: 21.0 (Energy)  |  DPS: 245.0\nAmmo: 45\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
item_Descklwe_smg_energy_blue_gold_01=Fabricante: Klaus & Werner\nTipo de item: SMG\nClasse: Laser\n\nTamanho da bateria: 45\nCadência: 562,5 rpm\nAlcance efetivo: 25m\n\nAcessórios: Óptica (S1), Barril (S1), Underbarrel ( S1)\n\nA habilidade especializada de Klaus & Werner está mais uma vez em plena exibição para tornar o rifle de energia compacto a laser Lumin V ainda mais mortal e confiável. Um novo modo de “intervalo de disparo automático” dispara barragens de cinco tiros quando o gatilho é pressionado, utilizando a saturação do alvo que vem com o disparo automático e, ao mesmo tempo, proporcionando pausas para recompensar a mira. Mesmo quando está constantemente no ataque, o excelente design da arma proporciona baixo recuo e uma propagação estreita. O ousado esquema de cores azul e dourado confere à edição Valor um apelo valente e digno.\n\n--- STATS ---\nWeight: 2.6 kg\nFire Rate: 700 RPM\nFire Modes: Burst\nAlpha Dmg: 21.0 (Energy)  |  DPS: 245.0\nAmmo: 45\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
item_Descklwe_sniper_energy_01_Luminalia_red01=Fabricante: Klaus & Werner\nTipo de item: Rifle de precisão\nClasse: Energia (Laser)\n\nTamanho da bateria: 20\nCadência de disparo: 50 rpm\nAlcance efetivo: 100 m\n\nAcessórios: Mira (S3), Cano (S2), Cano Inferior (S2)\n\nO rifle de energia de longo alcance Arrowhead Modelo VI da Klaus & Werner apresenta um corpo composto de fibra de vidro que pode suportar qualquer tipo de ambiente hostil, tanto atmosférico quanto externo. Equipada com uma coronha de precisão, uma mira composta e um bipé embutido, a Arrowhead é uma arma estável e destrutiva para usuários que desejam ir longe, mas permanecer na luta. Lançada pela primeira vez durante a Luminalia, a Lamplighter Edition é inspirada na tradicional cor vermelha do feriado.\n\n--- STATS ---\nWeight: 6.8 kg\nFire Rate: 70 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 50.0 (Energy)  |  DPS: 58.3\nAmmo: 16\nVelocity: 1,000 m/s  |  Absolute Range: 4.0 km
item_Descksar_pistol_ballistic_01_IAE2023=Fabricante: Kastak Arms \nitem Tipo: pistola \nclass: balística \n \nTamanho do carregador: 6 \nrate of Fire: 180 rpm \neffective intervalo: 100 m \n \nAcessórios: óptica (s1), barril (s1)S1) \n \noften chamou o Kastak Arms de "canhão da mão", o coda pode encerrar um engajamento com uma única rodada de calibre .50, embora a potência substancial possa dificultar o manuseio do recuo da Coda.Considerando o tamanho limitado da revista e o chute substancial, o fogo sustentado é desencorajado em favor de fotos únicas mais precisas.Projetado em homenagem à IAE 2953, a Edição de Ascensão possui detalhes em aço e cobre inspirados no Syulen da GATAC Manufacture.\n\n--- STATS ---\nWeight: 1.3 kg\nFire Rate: 180 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 60.0 (Phys)  |  DPS: 180.0\nAmmo: 6\nVelocity: 550 m/s  |  Absolute Range: 1.1 km\nFull Dmg to: 55 m  |  Drop: -0.20/m  |  Min Dmg: 35.0
item_Descksar_pistol_ballistic_01_headhunters01=Fabricante: Kastak Arms\nTipo de item: Pistola\nClasse: Balística\n\nTamanho do carregador: 6\nCadência de disparo: 180 rpm \nAlcance efetivo: 100 m\n\nAcessórios: Mira (S1), Cano (S1), Cano Inferior (S1)\n\nMuitas vezes chamado de "canhão de mão" da Kastak Arms, o Coda é capaz de encerrar uma batalha com um único cartucho calibre .50, embora o recuo do Coda seja difícil de controlar devido ao seu poder considerável. Dado o tamanho limitado do carregador e o recuo significativo, o fogo sustentado é desencorajado em favor de tiros únicos mais precisos. O sempre ousado Isidro “Nighthawk” Renard canalizou essa energia neste design roxo e preto para a linha Caçador de Recompensa Lendário.\n\n--- STATS ---\nWeight: 1.3 kg\nFire Rate: 180 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 60.0 (Phys)  |  DPS: 180.0\nAmmo: 6\nVelocity: 550 m/s  |  Absolute Range: 1.1 km\nFull Dmg to: 55 m  |  Drop: -0.20/m  |  Min Dmg: 35.0
item_Descksar_pistol_ballistic_01_purple_pink01=Fabricante: Kastak Arms\nTipo de item: Pistola\nClasse: Balística\n\nTamanho do carregador: 6\nTaxa de disparo: 180 rpm\nAlcance efetivo: 100 m\n\nAnexos: Ótica (S1), cano (S1), cano inferior (S1)\n\nMuitas vezes chamado de “canhão de mão” da Kastak Arms, o Coda pode encerrar um combate com um único projétil de calibre .50, embora a potência substancial possa tornar o recuo do Coda difícil de lidar. Considerando o tamanho limitado do carregador e o coice substancial, o disparo contínuo é desencorajado em favor de tiros únicos mais precisos. A edição Ultraviolet apresenta uma coloração violeta e orquídea atraente.\n\n--- STATS ---\nWeight: 1.3 kg\nFire Rate: 180 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 60.0 (Phys)  |  DPS: 180.0\nAmmo: 6\nVelocity: 550 m/s  |  Absolute Range: 1.1 km\nFull Dmg to: 55 m  |  Drop: -0.20/m  |  Min Dmg: 35.0
item_Descksar_pistol_ballistic_01_yellow_black01=Fabricante: Kastak Arms\nTipo de item: Pistola\nClasse: Balística\n\nTamanho do carregador: 6\nCadência: 180 rpm \nAlcance efetivo: 100 m\n\nAcessórios: Óptica (S1), Cano (S1), Sob o cano (S1)\n\nFrequentemente chamado de "canhão de mão" da Kastak Arms, o Coda pode encerrar um combate com uma única bala de calibre .50, embora a potência substancial possa tornar o recuo do Coda difícil de controlar. Considerando seu tamanho limitado de carregador e recuo substancial, o fogo sustentado é desencorajado em favor de tiros únicos mais precisos. Uma paleta de cores preta e verde chocante elegante dá à edição "Big Boss" seu visual característico.\n\n--- STATS ---\nWeight: 1.3 kg\nFire Rate: 180 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 60.0 (Phys)  |  DPS: 180.0\nAmmo: 6\nVelocity: 550 m/s  |  Absolute Range: 1.1 km\nFull Dmg to: 55 m  |  Drop: -0.20/m  |  Min Dmg: 35.0
