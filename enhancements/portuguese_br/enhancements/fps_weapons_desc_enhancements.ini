item_Descksar_smg_energy_01=Fabricante: Kastak Arms\nTipo de item: SMG\nClasse: Energia (Laser)\n\nTamanho da bateria: 60\nCadência de disparo: 800 rpm\nAlcance efetivo: 30 m\n\nAcessórios: Mira (S1), Barril (S1), Alcances inferiores (S1)\n\nO SMG Custodian da Kastak Arms se concentra em uma alta Cadência em vez de dano e precisão, tornando-o a escolha ideal para buscas em ambientes apertados e combate corpo a corpo.\n\n--- STATS ---\nWeight: 3.4 kg\nFire Rate: 900 RPM\nFire Modes: Auto / Charge / Burst\nAlpha Dmg: 13.0 (Energy)  |  DPS: 195.0\nAmmo: 60\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
item_Descksar_smg_energy_01_black_green01=Fabricante: Kastak Arms\nTipo de item: SMG\nClasse: Energia (Laser)\n\nTamanho da bateria: 60\nCadência: 800 rpm\nAlcance efetivo: 30 m\n\nA SMG Custodian da Kastak Arms foca em uma alta Cadência em vez de dano e precisão, tornando-a uma escolha ideal para varrer ambientes apertados e combates corpo a corpo. Esta paleta de cores preta elegante e verde chocante dá à edição "Big Boss" seu visual exclusivo.\n\n--- STATS ---\nWeight: 3.4 kg\nFire Rate: 900 RPM\nFire Modes: Auto / Charge / Burst\nAlpha Dmg: 13.0 (Energy)  |  DPS: 195.0\nAmmo: 60\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
item_Descksar_smg_energy_01_firerats01=Fabricante: Kastak Arms\nTipo de item: SMG\nClasse: Energia (Laser)\n\nTamanho da bateria: 60\nTaxa de disparo: 800 rpm\nAlcance efetivo: 30 m\n\nAcessórios: Ótica (S1), cano (S1), cano inferior (S1)\n\nA Custodian SMG da Kastak Arms se concentra em uma alta Cadência em detrimento do dano e da precisão, o que a torna a escolha ideal para varrer ambientes apertados e combates de curta distância. A edição Scorched apresenta uma pátina de chama exclusiva.\n\n--- STATS ---\nWeight: 3.4 kg\nFire Rate: 900 RPM\nFire Modes: Auto / Charge / Burst\nAlpha Dmg: 13.0 (Energy)  |  DPS: 195.0\nAmmo: 60\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
item_Descksar_smg_energy_01_red01=Fabricante: Kastak Arms\nTipo de item: SMG\nClasse: Energia (Laser)\n\nTamanho da bateria: 60\nCadência: 800 rpm\nAlcance efetivo: 30 m\n\nA Custodian SMG da Kastak Arms foca em uma alta Cadência em vez de dano e precisão, tornando-a uma escolha ideal para varrer ambientes apertados e combate corpo a corpo. A edição especial "Brimstone" apresenta um acabamento superior vermelho ousado e um acabamento cinza escuro na metade inferior da arma.\n\n--- STATS ---\nWeight: 3.4 kg\nFire Rate: 900 RPM\nFire Modes: Auto / Charge / Burst\nAlpha Dmg: 13.0 (Energy)  |  DPS: 195.0\nAmmo: 60\nVelocity: 600 m/s  |  Absolute Range: 1.2 km
item_Descksar_sniper_ballistic_01=Fabricante: Kastak Arms\nTipo de item: Rifle de precisão\nClasse: Balístico\n\nTamanho do carregador: 8\nCadência de disparo: 30 rpm\nAlcance efetivo: 120 m\n\nAcessórios: Mira (S3), Cano (N/A), Cano Inferior (S2)\n\nO Bisturi é um rifle de precisão exclusivo e versátil da Kastak Arms. Está equipado com dois canos empilhados e possui dois modos de tiro para que você possa adaptar seu tiro à situação em questão. Ele pode disparar um tiro único e poderoso de longo alcance ou disparar ambos os canos em rápida sucessão para produzir um tiro duplo.\n\n--- STATS ---\nWeight: 5.1 kg\nFire Rate: 600 RPM\nFire Modes: Burst / Semi-Auto\nAlpha Dmg: 45.0 (Phys)  |  DPS: 450.0\nAmmo: 12\nVelocity: 875 m/s  |  Absolute Range: 1.8 km\nFull Dmg to: 335 m  |  Min Dmg: 45.0
item_Descksar_sniper_ballistic_01_blue_white01=Fabricante: Kastak Arms \nitem Tipo: Rifle Sniper \nClass: Ballistic \n \nTamanho do carregador: 8 \nrate of Fire: 30 rpm \neffective intervalo: 120 M \n \nAcessórios: Optics (S3), barril (N/A), Under -Barrel (S2) \n \n O bisturi é um rifle de atirador único e versátil de Kastak Arms.Projetado com uma configuração vertical de dois barris, ele possui dois modos de incêndio para que você possa adaptar seu tiro à situação para entregar um tiro único e poderoso a uma longa distância ou disparar ambos os barris em rápida sucessão para criar uma explosão dupla.Esta edição especial da Permafrost apresenta coloração azul e cinza que lembra uma geleira sob um céu de inverno ofuscante.\n\n--- STATS ---\nWeight: 5.1 kg\nFire Rate: 600 RPM\nFire Modes: Burst / Semi-Auto\nAlpha Dmg: 45.0 (Phys)  |  DPS: 450.0\nAmmo: 12\nVelocity: 875 m/s  |  Absolute Range: 1.8 km\nFull Dmg to: 335 m  |  Min Dmg: 45.0
item_Desclbco_pistol_energy_01=Fabricante: Lightning Bolt Co. \nTipo de item: Pistola\nClasse: Eletrônica\n\nTamanho da bateria: 10\nCadência de disparo: 350 rpm\nAlcance efetivo: 35m\n\nAcessórios: Mira (S1), Cano Inferior (S1) \n\nA excelência em engenharia apenas arranha a superfície da Pistola Yubarev exclusiva. A ex-mercenária que se tornou produtora de armas, Irina Arkadova, supervisionou todos os aspectos da arma, infundindo-lhe poder, funcionalidade e elegância. Com seu clássico cabo de madeira e design inovador de cano, o Yubarev dispara um tiro de elétrons carregado que não apenas atinge seu alvo e amplifica a carga a cada golpe, mas também pode se espalhar para alvos condutores adicionais dentro do alcance.\n\n--- STATS ---\nWeight: 1.6 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 41.0 (Energy: 32.5 / Distort: 7.5 / Stun: 1.0)  |  DPS: 239.2\nAmmo: 10\nVelocity: 500 m/s  |  Absolute Range: 1.0 km\nFull Dmg to: 20 m  |  Drop: -0.10/m  |  Min Dmg: 1.5
