item_Desclbco_pistol_energy_cen01=Fabricante: Lightning Bolt Co. \nTipo de item: Pistola\nClasse: Eletrônica\n\nTamanho da bateria: 10\nCadência de disparo: 350 rpm\nAlcance efetivo: 35m\n\nAcessórios: Mira (S1), Cano Inferior (S1) \n\nA excelência em engenharia apenas arranha a superfície da Pistola Yubarev exclusiva. A ex-mercenária que virou fabricante de armas, Irina Arkadova, supervisionou todos os aspectos da arma, dando-lhe poder, praticidade e elegância. Com seu design inovador de cano, o Yubarev dispara um tiro de elétrons carregado que não apenas atinge o alvo e amplifica a carga a cada golpe, mas também pode se espalhar para alvos condutores adicionais dentro do alcance. A edição exclusiva Deadeye é preta com detalhes dourados.\n\n--- STATS ---\nWeight: 1.6 kg\nFire Rate: 350 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 41.0 (Energy: 32.5 / Distort: 7.5 / Stun: 1.0)  |  DPS: 239.2\nAmmo: 10\nVelocity: 500 m/s  |  Absolute Range: 1.0 km\nFull Dmg to: 20 m  |  Drop: -0.10/m  |  Min Dmg: 1.5
item_Desclbco_sniper_energy_01=Fabricante: Lightning Bolt Co. \nTipo de item: Rifle de precisão\nClasse: Eletrônico\n\nCapacidade do Carregador: 5\nCadência de disparo: 30 rpm\nAlcance efetivo: 150m+\n\nAcessórios: Mira (S3), Cano Inferior (S2) \n\nO Atzkav é um rifle de precisão exclusivo da Lightning Bolt Co. Depois que a alça de carregamento é ativada, ele dispara com precisão um elétron carregado, causando dano de energia significativo que se propaga para alvos condutores próximos. Este efeito especial de pulso também deixa uma carga residual na área atingida, aumentando o dano dos disparos de elétrons subsequentes. Além das características especiais de tiro do rifle, o Atzkav é mais conhecido por seu cano distinto, que estala com energia no próximo tiro.\n\n--- STATS ---\nWeight: 9.1 kg\nFire Rate: 30 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 165.0 (Energy: 120.0 / Distort: 35.0 / Stun: 10.0)  |  DPS: 82.5\nAmmo: 8\nVelocity: 500 m/s  |  Absolute Range: 1.0 km\nFull Dmg to: 350 m  |  Drop: -0.01/m  |  Min Dmg: 30.0
