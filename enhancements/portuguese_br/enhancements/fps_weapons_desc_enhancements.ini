item_Descgmni_shotgun_ballistic_01_pink_red01=Fabricante: Gemini\nTipo de item: Espingarda\nClasse: Balística\n\nTamanho do carregador: 18\nCadência: 120 rpm / 60 rpm\nAlcance efetivo: 15 m / 35 m\n\nAcessórios: Mira (S1), Cano (N/A), Cano Inferior (S2)\n\nA R97 combina design elegante e poder de parada para uma arma elegante e eficaz para uso em ambientes fechados. Essa espingarda balística da Gemini apresenta dois modos de disparo distintos: um modo semiautomático de amplo alcance, ideal para causar danos rápidos, e um modo focado que oferece maior alcance às custas de alguma potência. Essa flexibilidade de combate tornou a R97 uma arma de defesa pessoal popular em todo o Império. Proteja-se e proteja quem você ama com a edição especial Kismet da R97, que apresenta cores rosa e preta que lembram a nave que Yuri Ilyin pilotou para encontrar sua amada perdida, Corazon Tan, no clássico vídeo Coramor.\n\n--- STATS ---\nWeight: 2.4 kg\nFire Rate: 455 RPM\nFire Modes: Shotgun / Semi-Auto\nAlpha Dmg: 32.0 x8 (Phys)  |  DPS: 242.7\nAmmo: 18\nVelocity: 225 m/s  |  Absolute Range: 450 m\nFull Dmg to: 12 m  |  Drop: -0.05/m  |  Min Dmg: 1.2
item_Descgmni_shotgun_ballistic_01_red_black01=Fabricante: Gemini\nTipo de item: espingarda\nClasse: balística\n\nTamanho do carregador: 18\nCadência: 120 rpm / 60 rpm\nAlcance efetivo: 15 m / 35 m\n\nAcessórios: Óptica (S1), cano (N/A), sob o cano (S2)\n\nA R97 combina design elegante e poder de parada para uma arma de combate corpo a corpo elegante e eficaz. Esta espingarda balística da Gemini apresenta dois modos de disparo distintos — um modo semiautomático de ampla dispersão ideal para causar danos rápidos e um modo focado que oferece maior alcance às custas de alguma potência. Essa flexibilidade de combate tornou a R97 uma arma de defesa pessoal popular em todo o Império. A edição "Righteous" apresenta uma tinta vermelha ousada, perfeita para mostrar sua dedicação à luta.\n\n--- STATS ---\nWeight: 2.4 kg\nFire Rate: 455 RPM\nFire Modes: Shotgun / Semi-Auto\nAlpha Dmg: 32.0 x8 (Phys)  |  DPS: 242.7\nAmmo: 18\nVelocity: 225 m/s  |  Absolute Range: 450 m\nFull Dmg to: 12 m  |  Drop: -0.05/m  |  Min Dmg: 1.2
item_Descgmni_shotgun_ballistic_01_reward01=Fabricante: Gemini\nTipo de Item: Escopeta\nClasse: Balístico\n\nTamanho do Carregador: 18\nCadência de Tiro: 120 rpm / 60 rpm\nAlcance Efetivo: 15 m / 35 m\n\nAcessórios: Óptica (S1), Cano (N/A), Inferior (S2)\n\nA R97 combina design elegante e grande poder de parada para criar uma arma de curto alcance eficaz e sofisticada. Esta escopeta balística da Gemini possui dois modos de disparo distintos — um modo semiautomático de dispersão ampla ideal para causar dano rápido e um modo focado que oferece maior alcance ao custo de parte do poder. Essa flexibilidade em combate tornou a R97 uma popular arma de defesa pessoal em todo o Império.\n\nEsta edição apresenta um ousado padrão de camuflagem digital vermelho.\n\n--- STATS ---\nWeight: 2.4 kg\nFire Rate: 455 RPM\nFire Modes: Shotgun / Semi-Auto\nAlpha Dmg: 32.0 x8 (Phys)  |  DPS: 242.7\nAmmo: 18\nVelocity: 225 m/s  |  Absolute Range: 450 m\nFull Dmg to: 12 m  |  Drop: -0.05/m  |  Min Dmg: 1.2
item_Descgmni_smg_ballistic_01_Luminalia=Fabricante: Gemini\nTipo de item: SMG\nClasse: Balístico\n\nTamanho do carregador: 50\nCadência de disparo: 1.100 rpm\nAlcance efetivo: 35m\n\nAcessórios: Cano (S1), Mira (S1), Cano Inferior (S1)\n\nO C54 é um SMG elegante e precisamente balanceado da Gemini, fácil de manusear e bonito de se ver. A estrutura leve de polímero e o design ergonômico o tornam ideal para uso em combate corpo a corpo. O C54 é capaz de disparar cartuchos de 10 mm em modo totalmente automático para fornecer suporte máximo e saturação do alvo, garantindo que cada combate termine rapidamente. A edição Luminalia apresenta um design festivo em vermelho e verde.\n\n--- STATS ---\nWeight: 2.0 kg\nFire Rate: 925 RPM\nFire Modes: Auto\nAlpha Dmg: 11.5 (Phys)  |  DPS: 177.3\nAmmo: 50\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 15 m  |  Drop: -0.20/m  |  Min Dmg: 7.5
item_Descgmni_smg_ballistic_01_blue_white01=Fabricante: Gemini\nTipo de item: SMG\nClasse: Balístico\n\nTamanho do carregador: 50\nTaxa de disparo: 1.100 rpm\nAlcance efetivo: 35 m\n\nAnexos: Cano (S1), ótica (S1), cano inferior (S1)\n\nFácil de manusear e bonita de se ver, a C54 é uma SMG elegante e precisamente equilibrada da Gemini. Sua estrutura de polímero leve e seu design ergonômico a tornam ideal para combates a curta distância. A C54 é capaz de disparar cartuchos de 10 mm em modo totalmente automático para proporcionar a máxima saturação do alvo e garantir que qualquer combate termine rapidamente. Criada para homenagear a equipe Origin Racing, essa SMG é basicamente branca com detalhes em preto e azul.\n\n--- STATS ---\nWeight: 2.0 kg\nFire Rate: 925 RPM\nFire Modes: Auto\nAlpha Dmg: 11.5 (Phys)  |  DPS: 177.3\nAmmo: 50\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 15 m  |  Drop: -0.20/m  |  Min Dmg: 7.5
item_Descgmni_smg_ballistic_01_firerats01=Fabricante: Gemini\nTipo de item: SMG\nClasse: Balístico\n\nTamanho do carregador: 50\nTaxa de disparo: 1.100 rpm\nAlcance efetivo: 35 m\n\nAcessórios: Cano (S1), ótica (S1), cano inferior (S1)\n\nFácil de manusear e uma beleza de se ver com seu estilo acentuado em roxo, a C54 é uma SMG elegante e precisamente equilibrada da Gemini. Sua estrutura de polímero leve e seu design ergonômico a tornam ideal para combates a curta distância. A C54 é capaz de disparar cartuchos de 10 mm em modo totalmente automático para oferecer o máximo de apoio e saturação do alvo, garantindo que qualquer combate termine rapidamente. A edição Scorched apresenta uma pátina de chama exclusiva.\n\n--- STATS ---\nWeight: 2.0 kg\nFire Rate: 925 RPM\nFire Modes: Auto\nAlpha Dmg: 11.5 (Phys)  |  DPS: 177.3\nAmmo: 50\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 15 m  |  Drop: -0.20/m  |  Min Dmg: 7.5
item_Descgmni_smg_ballistic_01_green_grey01=Fabricante: Gemini\nTipo de item: SMG\nClasse: Balístico\n\nTamanho do carregador: 50\nCadência: 1.100 rpm\nAlcance efetivo: 35m\n\nAcessórios: Barril (S1), Óptica (S1), Underbarrel (S1) \n\nFácil de manusear e bonito de se ver com seu estilo com detalhes em roxo, o C54 é um SMG elegante e precisamente equilibrado da Gemini. Sua estrutura leve de polímero e design ergonômico o tornam ideal para combates próximos. O C54 é capaz de disparar tiros de 10 mm em modo totalmente automático para fornecer suporte máximo e saturação do alvo para garantir que qualquer combate termine rapidamente. Esta edição especial Luckbringer verde e cinza lançada para Stella Fortuna 2954 é uma ótima maneira de ter a sorte ao seu lado.\n\n--- STATS ---\nWeight: 2.0 kg\nFire Rate: 925 RPM\nFire Modes: Auto\nAlpha Dmg: 11.5 (Phys)  |  DPS: 177.3\nAmmo: 50\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 15 m  |  Drop: -0.20/m  |  Min Dmg: 7.5
