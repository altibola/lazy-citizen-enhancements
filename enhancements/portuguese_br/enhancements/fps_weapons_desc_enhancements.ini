item_Descvolt_sniper_energy_01=Fabricante: Verified Offworld Laser Technologies\nTipo de Item: Rifle de Precisão\nClasse: Energia (Laser)\n\nTamanho da Bateria: 22\nTaxa de Disparo: 60-300 rpm\nAlcance Eficaz: 80 m\n\nAnexos: Óptica (S3), Sob o Cano (S2)\n\nO Zenith Laser Sniper Rifle da VOLT oferece flexibilidade operacional no campo de batalha, podendo disparar tiros de baixa energia rapidamente ou ser deixado para carregar automaticamente e disparar um feixe de energia muito mais poderoso, o que também gera consideravelmente mais ruído e calor.\n\n--- STATS ---\nWeight: 3.8 kg\nFire Rate: 325 RPM\nFire Modes: Charge / Semi-Auto\nAlpha Dmg: 42.5 (Energy)  |  DPS: 230.2\nAmmo: 22\nVelocity: 700 m/s  |  Absolute Range: 1.4 km\nFull Dmg to: 500 m
