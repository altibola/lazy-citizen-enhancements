item_Descgmni_shotgun_ballistic_01=Fabricante: Gemini\nTipo de item: Espingarda\nClasse: Balística\n\nTamanho do carregador: 18\nCadência: 120 rpm / 60 rpm\nAlcance efetivo: 15 m / 35 m\n\nAcessórios: Mira (S1), Cano (N/A), Cano Inferior (S2)\n\nA R97 combina design elegante e poder de parada para uma arma elegante e eficaz para uso em ambientes fechados. Essa espingarda balística da Gemini apresenta dois modos de disparo distintos: um modo semiautomático de amplo alcance, ideal para causar danos rápidos, e um modo focado que oferece maior alcance à custa de alguma potência. Essa flexibilidade de combate tornou a R97 uma arma de defesa pessoal popular em todo o Império.\n\n--- STATS ---\nWeight: 2.4 kg\nFire Rate: 455 RPM\nFire Modes: Shotgun / Semi-Auto\nAlpha Dmg: 32.0 x8 (Phys)  |  DPS: 242.7\nAmmo: 18\nVelocity: 225 m/s  |  Absolute Range: 450 m\nFull Dmg to: 12 m  |  Drop: -0.05/m  |  Min Dmg: 1.2
