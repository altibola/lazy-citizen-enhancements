item_Descbehr_smg_ballistic_01_iae2501=Fabricante: Behring\nTipo de Item: SMG\nClasse: Balística\n\nCapacidade do Carregador: 45\nTaxa de Disparo: 800 rpm\nAlcance Eficaz: 30 m\n\nAcessórios: Óptica (S1), Cano (S1), Subcano (S1)\n\nQuando a principal força de combate do universo escolhe uma arma como seu padrão, vale a pena ficar atento. O P8-SC, fabricado pela Behring, tem sido a submetralhadora balística escolhida pelos Fuzileiros da UEE desde que saiu da linha de produção, mas desde então muitos passaram a confiar nesta arma para sua própria segurança e proteção. A edição Epoque apresenta cores azul-marinho e preta com detalhes dourados barrocos e asas estilizadas em ambos os lados da empunhadura.\n\n--- STATS ---\nWeight: 1.9 kg\nFire Rate: 850 RPM\nFire Modes: Auto / Burst\nAlpha Dmg: 13.8 (Phys)  |  DPS: 194.8\nAmmo: 45\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 15 m  |  Drop: -0.06/m  |  Min Dmg: 10.0
item_Descbehr_sniper_ballistic_01=Fabricante: Behring\nTipo de Item: Rifle de Precisão\nClasse: Balístico\n\nCapacidade do Carregador: 8\nTaxa de Fogo: 20 rpm\nAlcance Eficaz: 120 m\n\nAnexos: Óptica (S3), Cano (S2), Sobrecano (S2)\n\nO rifle de precisão balístico Behring P6-LR compensa sua baixa taxa de fogo com um projétil de alta potência eficaz em longas distâncias. Com um visor com modos de zoom variável e um cano composto por uma liga de alta resistência, o P6-LR foi projetado para oferecer o melhor desempenho quando mais for necessário.\n\n--- STATS ---\nWeight: 6.9 kg\nFire Rate: 55 RPM\nFire Modes: Semi-Auto\nAlpha Dmg: 100.0 (Phys)  |  DPS: 91.7\nAmmo: 8\nVelocity: 725 m/s  |  Absolute Range: 1.4 km\nFull Dmg to: 550 m  |  Drop: -10.00/m  |  Min Dmg: 90.0
