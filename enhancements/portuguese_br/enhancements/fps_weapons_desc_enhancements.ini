item_Descbehr_smg_ballistic_01=Fabricante: Behring\nTipo de item: SMG\nClasse: Balístico\n\nTamanho do carregador: 45\nCadência de disparo: 800 rpm\nAlcance efetivo: 30 m\n\nAcessórios: Mira (S1), Cano (S1), Cano Inferior (S1)\n\nQuando a melhor força de combate do universo escolhe uma arma como arma padrão, vale a pena se levantar e prestar atenção. A P8-SC fabricada pela Behring tem sido a submetralhadora balística preferida dos fuzileiros navais da UEE desde que saiu da linha de montagem, mas desde então muitos confiaram nesta arma para sua própria segurança e proteção pessoal.\n\n--- STATS ---\nWeight: 1.9 kg\nFire Rate: 850 RPM\nFire Modes: Auto / Burst\nAlpha Dmg: 13.8 (Phys)  |  DPS: 194.8\nAmmo: 45\nVelocity: 500 m/s  |  Absolute Range: 950 m\nFull Dmg to: 15 m  |  Drop: -0.06/m  |  Min Dmg: 10.0
