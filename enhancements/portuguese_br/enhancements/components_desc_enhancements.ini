item_DescCOOL_JSPN_S01_CryoStar=Tipo de item: Cooler\nFabricante: J-Span\nTamanho: 1\nTipo: B\nClasse: Civil\n\nO refrigerador J-Spans Cryo-Star é para o usuário final graças à absorção de calor confiável que a PowerPlant do Sua Nave não pode ser contaminado, espalhado por todo o império.\n\n--- STATS ---\nCooling Rate: 26 CR/s\nPower Draw: 2 PU/s\nComponent HP: 150\nSignatures:  EM: 750  |  IR: 4,000\nOverheat Temp: 660K
item_DescCOOL_JSPN_S01_FrostStar=Tipo de item: Cooler\nFabricante: J-Span \nTamanho: 1\nTipo: C\nClasse: Civil\n\nO cooler Frost Star da J-Span é conhecido por seu desempenho consistente e tem muitos admiradores por sua relação potência/calor equilibrada .\n\n--- STATS ---\nCooling Rate: 26 CR/s\nPower Draw: 2 PU/s\nComponent HP: 130\nSignatures:  EM: 750  |  IR: 4,000\nOverheat Temp: 600K
item_DescCOOL_JSPN_S01_WinterStar=Tipo de item: Cooler\nFabricante: J-Span \nTamanho: 1\nTipo: D\nClasse: Civil\n\nJunte-se à família J-Span e obtenha o cooler Winter Star para Sua Nave. Este modelo básico não possui flash, mas seu forte desempenho e preço o tornam uma escolha popular para pilotos em toda a UEE.\n\n--- STATS ---\nCooling Rate: 23 CR/s\nPower Draw: 2 PU/s\nComponent HP: 110\nSignatures:  EM: 750  |  IR: 3,630\nOverheat Temp: 545K
