item_Desc_SHLD_BEHR_S01_6SA=Tipo de Item: Gerador de Escudo\nFabricante: Behring\nTamanho: 1\nTipo: B\nClasse: Civil\n\nO 'Árbitro' 6SA tem sido um componente comprovado há séculos, fornecendo saúde de escudo acima da média e absorção de danos. Experimente a vantagem da Behring instalando este pequeno gerador de escudo hoje mesmo.\n\n--- STATS ---\nMax HP: 3,000  |  Regen: 600 HP/s\nDowned Delay: 9.1s  |  Damaged Delay: 4.5s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 900  |  IR: 0\nPower Draw: 2 PU/s\nComponent HP: 170
item_Desc_SHLD_BEHR_S01_7SA=Tipo de Item: Gerador de Escudo\nFabricante: Behring\nTamanho: 1\nTipo: A\nClasse: Civil\n\nUm gerador de escudo topo de linha que funciona alto e orgulhoso. O que perde em imperceptibilidade, mais do que compensa em máxima durabilidade e excelente desempenho. Mesmo que os inimigos vejam você chegando, eles terão dificuldade em derrubar o 7SA 'Concord' de Behring.\n\n--- STATS ---\nMax HP: 3,000  |  Regen: 660 HP/s\nDowned Delay: 8.3s  |  Damaged Delay: 4.2s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 900  |  IR: 0\nPower Draw: 2 PU/s\nComponent HP: 200
item_Desc_SHLD_BEHR_S02_6MA=Tipo de Item: Gerador de Escudo\nFabricante: Behring\nTamanho: 2\nTipo: B\nClasse: Civil\n\nA reputação de ferro de Behring é quase tão impenetrável quanto o escudo gerado pelo 6MA 'Kozane'. Se é bom o suficiente para Behring, é bom o suficiente para você.\n\n--- STATS ---\nMax HP: 10,000  |  Regen: 2,000 HP/s\nDowned Delay: 10.0s  |  Damaged Delay: 5.0s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,350  |  IR: 0\nPower Draw: 3 PU/s\nComponent HP: 470
item_Desc_SHLD_BEHR_S02_7MA=Tipo de Item: Gerador de Escudo\nFabricante: Behring\nTamanho: 2\nTipo: A\nClasse: Civil\n\nConfie em um componente que tem sido usado em Naves há séculos - o 7MA 'Lorica'. Experimente hoje mesmo o gerador de escudo de classe mundial da Behring em sua Nave.\n\n--- STATS ---\nMax HP: 10,000  |  Regen: 2,200 HP/s\nDowned Delay: 9.2s  |  Damaged Delay: 4.6s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,350  |  IR: 0\nPower Draw: 3 PU/s\nComponent HP: 540
item_Desc_SHLD_BEHR_S03_6CA=Tipo de item: Gerador de escudo\nFabricante: Behring\nTamanho: 3\nTipo: B\nClasse: Civil\n\n"Construído por Behring" é um termo que significa qualidade. É por isso que tantas pessoas em todo o Império confiam em seu gerador de escudo grande 6CA 'Bila' para fornecer desempenho sólido, durabilidade impressionante e um nível razoável de capacidade furtiva.\n\n--- STATS ---\nMax HP: 100,000  |  Regen: 20,000 HP/s\nDowned Delay: 11.0s  |  Damaged Delay: 5.5s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,800  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 1,300
item_Desc_SHLD_BEHR_S03_7CA=Tipo de Item: Gerador de Escudo\nFabricante: Behring\nTamanho: 3\nTipo: A\nClasse: Civil\n\nGeradores de escudos comerciais não são melhores que o 7CA 'Nargun'. O dispositivo utiliza a tecnologia patenteada "Freeze Flow" da Behring para manter sua assinatura de calor sob controle enquanto aumenta seu desempenho geral e durabilidade.\n\n--- STATS ---\nMax HP: 100,000  |  Regen: 22,000 HP/s\nDowned Delay: 10.1s  |  Damaged Delay: 5.0s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,800  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 1,500
item_Desc_SHLD_GODI_S01_FR66=Tipo de Item: Gerador de Escudo\nFabricante: Gorgon Defender Industries\nTamanho: 1\nTipo: A\nClasse: Militar\n\nO FR-66 é um dos pequenos geradores de escudo mais versáteis atualmente no mercado. Obtenha a proteção e o desempenho de nível militar das Indústrias Gorgon Defender para garantir que sua Nave possa sobreviver a qualquer ataque.\n\n--- STATS ---\nMax HP: 3,168  |  Regen: 697 HP/s\nDowned Delay: 9.6s  |  Damaged Delay: 4.8s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,240  |  IR: 0\nPower Draw: 3 PU/s\nComponent HP: 270
item_Desc_SHLD_GODI_S02_CoverAll=Tipo de Item: Gerador de Escudo\nFabricante: Gorgon Defender Industries\nTamanho: 2\nTipo: B\nClasse: Militar\n\nNão sacrifique o desempenho pela durabilidade. Com o gerador de escudo CoverAll da Gorgon Defender Industries você obtém os dois.\n\n--- STATS ---\nMax HP: 10,560  |  Regen: 2,112 HP/s\nDowned Delay: 11.5s  |  Damaged Delay: 5.8s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,650  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 660
item_Desc_SHLD_GODI_S02_FR76=Tipo de item: Gerador de escudo\nFabricante: Gorgon Defender Industries\nTamanho: 2\nTipo: A\nClasse: Militar\n\nO FR-76 da Gorgon Defender Industries é o gerador de escudo definitivo, refinado através de anos de extensos testes de campo militar . Perfeito para todos, desde pessoas que defendem as linhas de frente até aqueles que exploram a fronteira.\n\n--- STATS ---\nMax HP: 10,560  |  Regen: 2,323 HP/s\nDowned Delay: 10.5s  |  Damaged Delay: 5.3s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,650  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 750
item_Desc_SHLD_GODI_S02_SecureShield=Tipo de Item: Gerador de Escudo\nFabricante: Gorgon Defender Industries\nTamanho: 2\nTipo: D\nClasse: Militar\n\nCom o SecureShield da Gorgon Defender Industries, sua Nave recebe proteção de nível militar. Sua tecnologia de emissor de última geração permite uma absorção superior do escudo em todo o espectro de tipos de danos.\n\n--- STATS ---\nMax HP: 10,560  |  Regen: 1,901 HP/s\nDowned Delay: 13.9s  |  Damaged Delay: 7.0s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,650  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 500
item_Desc_SHLD_GODI_S03_FR86=Tipo de Item: Gerador de Escudo\nFabricante: Gorgon Defender Industries\nTamanho: 3\nTipo: A\nClasse: Militar\n\nGorgons FR-86 é experimentado, testado e confiável. Nenhum outro gerador de escudo importante oferece desempenho e durabilidade excepcionais nesta escala.\n\n--- STATS ---\nMax HP: 105,600  |  Regen: 23,232 HP/s\nDowned Delay: 11.6s  |  Damaged Delay: 5.8s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 2,060  |  IR: 0\nPower Draw: 5 PU/s\nComponent HP: 2,100
item_Desc_SHLD_GODI_S03_FullBlock=Tipo de Item: Gerador de Escudo\nFabricante: Gorgon Defender Industries\nTamanho: 3\nTipo: B\nClasse: Militar\n\nFabricado por ex-residentes de Caliban, o Gerador de Grande Escudo Gorgon FullBlock foi repetidamente posto à prova pelos membros dos militares e do público colocado. Isso significa que você pode confiar nele, não importa o que aconteça em seu caminho.\n\n--- STATS ---\nMax HP: 105,600  |  Regen: 21,120 HP/s\nDowned Delay: 12.7s  |  Damaged Delay: 6.3s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 2,060  |  IR: 0\nPower Draw: 5 PU/s\nComponent HP: 1,800
item_Desc_SHLD_GODI_S03_SecureScreen=Tipo de item: Gerador de Escudo\nFabricante: Gorgon Defender Industries\nTamanho: 3\nTipo: D\nClasse: Militar\n\nGorgon Defender Industries traz poder militar para seu grande gerador de escudo básico. Com a melhor durabilidade da categoria, o SecureScreen foi desenvolvido para resistir e sobreviver.\n\n--- STATS ---\nMax HP: 105,600  |  Regen: 19,008 HP/s\nDowned Delay: 15.3s  |  Damaged Delay: 7.7s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 2,060  |  IR: 0\nPower Draw: 5 PU/s\nComponent HP: 1,400
item_Desc_SHLD_SECO_S01_HEX=Tipo de Item: Gerador de Escudo\nFabricante: Seal Corporation\nTamanho: 1\nTipo: B\nClasse: Civil\n\nEquipe sua Nave para todas as circunstâncias com um HEX da Seal Corporation. Desempenho equilibrado e durabilidade fazem dele uma escolha ideal e versátil para quem não sabe aonde sua próxima aventura o levará.\n\n--- STATS ---\nMax HP: 2,160  |  Regen: 432 HP/s\nDowned Delay: 9.1s  |  Damaged Delay: 4.5s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 750  |  IR: 0\nPower Draw: 2 PU/s\nComponent HP: 170
item_Desc_SHLD_SECO_S02_BLOC=Tipo de item: Gerador de escudo\nFabricante: Seal Corporation\nTamanho: 2\nTipo: B\nClasse: Civil\n\nO gerador de escudo BLOC da Seal Corporation foi o primeiro a usar o revolucionário semicondutor de núcleo quântico da empresa Reduz o consumo de energia do componente sem sacrificando o desempenho.\n\n--- STATS ---\nMax HP: 7,200  |  Regen: 1,440 HP/s\nDowned Delay: 10.0s  |  Damaged Delay: 5.0s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,130  |  IR: 0\nPower Draw: 3 PU/s\nComponent HP: 470
item_Desc_SHLD_SECO_S02_RPEL=Tipo de Item: Gerador de Escudo\nFabricante: Seal Corporation\nTamanho: 2\nTipo: D\nClasse: Civil\n\nVeja por que mais pessoas confiam na Seal Corporation para proteger suas Naves do que em qualquer outra empresa. Com o gerador de escudo RPEL você pode ter certeza de que está protegido contra perigos.\n\n--- STATS ---\nMax HP: 7,200  |  Regen: 1,296 HP/s\nDowned Delay: 12.1s  |  Damaged Delay: 6.0s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,130  |  IR: 0\nPower Draw: 3 PU/s\nComponent HP: 360
item_Desc_SHLD_SECO_S03_ARMOR=Tipo de Item: Gerador de Escudo\nFabricante: Seal Corporation\nTamanho: 3\nTipo: B\nClasse: Civil\n\nARMOR é o gerador de escudo topo de linha da Seal Corporation. Foi amplamente utilizado pelos militares antes de sua tecnologia de escudo ser lançada para uso civil.\n\n--- STATS ---\nMax HP: 72,000  |  Regen: 14,400 HP/s\nDowned Delay: 11.0s  |  Damaged Delay: 5.5s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,500  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 1,300
item_Desc_SHLD_SECO_S03_GUARD=Tipo de Item: Gerador de Escudo\nFabricante: Seal Corporation\nTamanho: 3\nTipo: C\nClasse: Civil\n\nCom o GUARD da Seal Corp, você não tem medo de enfrentar o desconhecido. Este gerador de escudo oferece um equilíbrio entre desempenho, durabilidade e furtividade para permitir ao usuário usar o escudo da maneira que melhor lhe convier.\n\n--- STATS ---\nMax HP: 72,000  |  Regen: 13,680 HP/s\nDowned Delay: 12.1s  |  Damaged Delay: 6.0s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,500  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 1,100
item_Desc_SHLD_SECO_S03_HAVEN=Tipo de Item: Gerador de Escudo\nFabricante: Seal Corporation\nTamanho: 3\nTipo: D\nClasse: Civil\n\nO HAVEN é um gerador de escudo popular para Naves grandes. O design simples e limpo da Seal Corp torna o reparo do componente uma tarefa simples e acessível e só aumentou sua popularidade ao longo dos anos.\n\n--- STATS ---\nMax HP: 72,000  |  Regen: 12,960 HP/s\nDowned Delay: 13.3s  |  Damaged Delay: 6.7s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,500  |  IR: 0\nPower Draw: 4 PU/s\nComponent HP: 990
item_Desc_SHLD_YORM_S01_Jaghte=Tipo de item: Gerador de escudo\nFabricante: Yorm\nTamanho: 1\nTipo: B\nClasse: Competição\n\nO gerador de escudo competitivo Jaghte de Yorm foi projetado para desempenho, priorizando a saúde do escudo e a taxa de geração em vez de força e furtividade.\n\n--- STATS ---\nMax HP: 1,920  |  Regen: 384 HP/s\nDowned Delay: 7.7s  |  Damaged Delay: 3.9s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 818  |  IR: 0\nPower Draw: 2 PU/s\nComponent HP: 91
item_Desc_SHLD_YORM_S02_Bamoty=Tipo de Item: Gerador de Escudo\nFabricante: Yorm\nTamanho: 2\nTipo: D\nClasse: Competição\n\nO Bamoty é a versão de Yorm de um gerador de escudo de estilo comercial. Este componente de tamanho médio rendeu à empresa um maior número de seguidores porque equilibra habilmente desempenho, durabilidade e furtividade.\n\n--- STATS ---\nMax HP: 6,400  |  Regen: 1,152 HP/s\nDowned Delay: 10.3s  |  Damaged Delay: 5.1s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,230  |  IR: 0\nPower Draw: 3 PU/s\nComponent HP: 200
item_Desc_SHLD_YORM_S02_Haltur=Tipo de item: Gerador de Escudo\nFabricante: Yorm\nTamanho: 2\nTipo: B\nClasse: Competição\n\nA forte saúde do escudo e a taxa de geração excepcional do Haltur dão a ele a melhor classificação de desempenho de qualquer escudo em sua classe. Popular entre os pilotos e aqueles que preferem fugir do perigo em vez de absorvê-lo.\n\n--- STATS ---\nMax HP: 6,400  |  Regen: 1,280 HP/s\nDowned Delay: 8.5s  |  Damaged Delay: 4.2s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,230  |  IR: 0\nPower Draw: 3 PU/s\nComponent HP: 250
item_Desc_SHLD_YORM_S02_Trenta=Tipo de Item: Gerador de Escudo\nFabricante: Yorm\nTamanho: 2\nTipo: C\nClasse: Competição\n\nUma escolha ideal para pilotos que procuram um gerador de escudo que ofereça desempenho e durabilidade de escudo acima da média. Como bônus, a carcaça do Trenta é feita de liga de magnésio, tornando o componente robusto e leve.\n\n--- STATS ---\nMax HP: 6,400  |  Regen: 1,216 HP/s\nDowned Delay: 9.3s  |  Damaged Delay: 4.7s\nResist:  Phys: +0% – +25%\nSignatures:  EM: 1,230  |  IR: 0\nPower Draw: 3 PU/s\nComponent HP: 220
