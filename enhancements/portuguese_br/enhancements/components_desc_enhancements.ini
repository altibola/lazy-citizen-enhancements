item_DescCOOL_LPLT_S01_BlastChill=Tipo de item: Cooler\nFabricante: Lightning Power Ltd. \nTamanho: 1\nTipo: D\nClasse: Civil \n\nO BlastChill é uma caixa térmica de consumo da Lightning Power Ltd. Ele mantém Sua Nave funcionando sem sobrecarregar sua assinatura, mas é mais conhecido por uma campanha publicitária muito ridicularizada de 2945 que prometia que ele foi “construído para trazer o frio”.\n\n--- STATS ---\nCooling Rate: 23 CR/s\nPower Draw: 2 PU/s\nComponent HP: 110\nSignatures:  EM: 750  |  IR: 3,630\nOverheat Temp: 545K
