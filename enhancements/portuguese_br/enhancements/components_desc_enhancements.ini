item_DescCOOL_JUST_S01_Hydrocel=Tipo de item: Cooler\nFabricante: Juno Starwerk \nTamanho: 1\nTipo: D\nClasse: Industrial\n\nCom o robusto Hydrocel, um cooler industrial básico do renomado fabricante Juno Starwerk, Sua Nave permanecerá eficiente por mais tempo.\n\n--- STATS ---\nCooling Rate: 29 CR/s\nPower Draw: 3 PU/s\nComponent HP: 130\nSignatures:  EM: 1,490  |  IR: 5,940\nOverheat Temp: 614K
item_DescCOOL_JUST_S01_Thermax=Tipo de item: Cooler\nFabricante: Juno Starwerk \nTamanho: 1\nTipo: C\nClasse: Industrial\n\nJuno Starwerk fez isso de novo. Com os coolers Thermax, a Juno elevou o padrão em coolers industriais econômicos para todos os orçamentos. Esses pequenos coolers oferecem desempenho e durabilidade acima da média sem gastar muito.\n\n--- STATS ---\nCooling Rate: 32 CR/s\nPower Draw: 3 PU/s\nComponent HP: 150\nSignatures:  EM: 1,490  |  IR: 6,530\nOverheat Temp: 675K
item_DescCOOL_JUST_S02_CoolCore=Tipo de item: Cooler\nFabricante: Juno Starwerk \nTamanho: 2\nTipo: C\nClasse: Industrial\n\nO nome CoolCore já diz tudo. Este cooler foi projetado por Juno Starwerk para trabalhar tão duro quanto você. Ele garante que todo o Sua Nave opere dentro dos parâmetros de temperatura desejados.\n\n--- STATS ---\nCooling Rate: 41 CR/s\nPower Draw: 4 PU/s\nComponent HP: 420\nSignatures:  EM: 1,980  |  IR: 8,710\nOverheat Temp: 675K
item_DescCOOL_JUST_S02_Hydrojet=Tipo de item: Cooler\nFabricante: Juno Starwerk \nTamanho: 2\nTipo: D\nClasse: Industrial\n\nSe sua Nave superaquecer, quase todas as tarefas se tornarão não apenas mais difíceis, mas também potencialmente perigosas para você e sua tripulação. Com o HydroJet básico da Juno Starwerk, você pode ter certeza de que o calor é controlado por um refrigerador projetado por um dos nomes mais confiáveis do setor.\n\n--- STATS ---\nCooling Rate: 38 CR/s\nPower Draw: 4 PU/s\nComponent HP: 370\nSignatures:  EM: 1,980  |  IR: 7,920\nOverheat Temp: 614K
item_DescCOOL_JUST_S02_Snowpack_SCItem=Tipo de item: Cooler\nFabricante: Juno Starwerk\nTamanho: 2\nTipo: A \nClasse: Industrial\n\nRefrigeradores industriais de tamanho médio não podem ser melhores que o Snowpack da Juno Starwerk. Excelente desempenho e durabilidade os tornaram os favoritos dos transportadores durante séculos.\n\n--- STATS ---\nCooling Rate: 46 CR/s\nPower Draw: 4 PU/s\nComponent HP: 550\nSignatures:  EM: 1,980  |  IR: 9,500\nOverheat Temp: 810K
item_DescCOOL_JUST_S03_ChillMax_SCItem=Tipo de item: Cooler\nFabricante: Juno Starwerk\nTamanho: 3\nTipo: A \nClasse: Industrial\n\nO nome Chill-Max é tão simples quanto o design desta caixa térmica Juno Starwerk. Este refrigerador industrial altamente cotado tem sido um favorito entre os operadores de transporte durante séculos.\n\n--- STATS ---\nCooling Rate: 58 CR/s\nPower Draw: 5 PU/s\nComponent HP: 1,500\nSignatures:  EM: 2,480  |  IR: 11,900\nOverheat Temp: 810K
item_DescCOOL_JUST_S03_Hydropulse_SCItem=Tipo de item: Cooler\nFabricante: Juno Starwerk\nTamanho: 3\nTipo: D \nClasse: Industrial\n\nO Hydropulse é uma variante básica das caixas térmicas de Juno Starwerk, que, através de alguns truques de design e compromissos em durabilidade, tornou-se uma opção para quem não pode comprar um dos modelos top.\n\n--- STATS ---\nCooling Rate: 48 CR/s\nPower Draw: 5 PU/s\nComponent HP: 1,000\nSignatures:  EM: 2,480  |  IR: 9,900\nOverheat Temp: 614K
item_DescCOOL_JUST_S03_ThermalCore=Tipo de Item: Cooler\nFabricante: Juno Starwerk \nTamanho: 3\nTipo: C\nClasse: Industrial\n\nQuando você está no meio de uma tarefa importante, você não quer perder tempo pensando se o seu cooler está à altura. Propósito cumprido. Agora você não precisa mais fazer isso. Com o confiável resfriamento de médio porte ThermalCore da Juno Starwerk integrado, você pode eliminar as suposições do gerenciamento térmico.\n\n--- STATS ---\nCooling Rate: 52 CR/s\nPower Draw: 5 PU/s\nComponent HP: 1,200\nSignatures:  EM: 2,480  |  IR: 10,900\nOverheat Temp: 675K
