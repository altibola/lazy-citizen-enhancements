item_DescCOOL_ACOM_S01_IcePlunge=Tipo de item: Cooler\nFabricante: ACOM\nTamanho: 1\nTipo: C\nClasse: Competição\n\nSe você levar Sua Nave ao extremo na rodada final, ficará feliz por ter o IcePlunge da ACOM que mantém tudo legal.\n\n--- STATS ---\nCooling Rate: 34 CR/s\nPower Draw: 2 PU/s\nComponent HP: 69\nSignatures:  EM: 818  |  IR: 5,890\nOverheat Temp: 675K
item_DescCOOL_ACOM_S01_QuickCool=Tipo de Item: Cooler\nFabricante: ACOM\nTamanho: 1\nTipo: D\nClasse: Competição\n\nO QuikCool oferece melhor desempenho que outros coolers de sua classe. Este componente competitivo da ACOM é um dos coolers básicos mais poderosos disponíveis, embora sacrifique alguma durabilidade.\n\n--- STATS ---\nCooling Rate: 32 CR/s\nPower Draw: 2 PU/s\nComponent HP: 62\nSignatures:  EM: 818  |  IR: 5,400\nOverheat Temp: 614K
item_DescCOOL_ACOM_S02_AbsoluteZero_SCItem=Tipo de item: Cooler\nFabricante: ACOM\nTamanho: 2\nTipo: B \nClasse: Competição\n\nO cooler AbsoluteZero, originalmente desenvolvido para pilotos de corrida, leva o desempenho ao limite. Este componente de alta qualidade da ACOM apresenta um novo sistema de circulação de refrigerante que mantém os sistemas da sua Nave resfriados acima de tudo.\n\n--- STATS ---\nCooling Rate: 46 CR/s\nPower Draw: 3 PU/s\nComponent HP: 210\nSignatures:  EM: 1,230  |  IR: 7,850\nOverheat Temp: 743K
item_DescCOOL_ACOM_S02_IceDive_SCItem=Tipo de item: Cooler\nFabricante: ACOM\nTamanho: 2\nTipo: ºC \nClasse: Competição\n\nO IceDive oferece desempenho superior a outros coolers de tamanho médio em sua classe, mas ao preço de altas assinaturas IR e EM gerado.\n\n--- STATS ---\nCooling Rate: 46 CR/s\nPower Draw: 3 PU/s\nComponent HP: 190\nSignatures:  EM: 1,230  |  IR: 7,850\nOverheat Temp: 675K
item_DescCOOL_ACOM_S02_RapidCool_SCItem=Tipo de item: Cooler\nFabricante: ACOM\nTamanho: 2\nTipo: D \nClasse: Competição\n\nACOM traz sua filosofia de desempenho em primeiro lugar para este cooler de tamanho médio. O RapidCool troca sua resistência e durabilidade exclusivas por melhor desempenho.\n\n--- STATS ---\nCooling Rate: 43 CR/s\nPower Draw: 3 PU/s\nComponent HP: 170\nSignatures:  EM: 1,230  |  IR: 7,200\nOverheat Temp: 614K
item_DescCOOL_AEGS_S01_Bracer=Tipo de item: Cooler\nFabricante: Aegis Dynamics \nTamanho: 1\nTipo: C\nClasse: Militar\n\nPara quem procura um cooler intermediário sólido e confiável, não existe nada melhor que o Bracer de Aegis. Este sistema de resfriamento de estrutura pequena oferece desempenho sólido e durabilidade para manter sua Nave funcionando em todos os cilindros.\n\n--- STATS ---\nCooling Rate: 34 CR/s\nPower Draw: 3 PU/s\nComponent HP: 180\nSignatures:  EM: 1,490  |  IR: 7,260\nOverheat Temp: 750K
item_DescCOOL_AEGS_S01_Polar=Tipo de item: Cooler\nFabricante: Aegis Dynamics \nTamanho: 1\nTipo: B\nClasse: Militar\n\nO Aegis Polar Cooler foi construído para atender às demandas exigentes do serviço militar diário e possui uma estrutura reforçada para maior durabilidade. Você pode confiar no Polar para manter Sua Nave fresco quando você entrar no meio da batalha.\n\n--- STATS ---\nCooling Rate: 34 CR/s\nPower Draw: 3 PU/s\nComponent HP: 210\nSignatures:  EM: 1,490  |  IR: 7,260\nOverheat Temp: 825K
item_DescCOOL_AEGS_S01_Tundra=Tipo de item: Cooler\nFabricante: Aegis Dynamics\nTamanho: 1\nTipo: D\nClasse: Militar\n\nProjetado pela Aegis com desempenho militar em mente, o Tundra se tornou um cooler padrão da Marinha UEE graças ao seu desempenho confiável. .\n\n--- STATS ---\nCooling Rate: 32 CR/s\nPower Draw: 3 PU/s\nComponent HP: 160\nSignatures:  EM: 1,490  |  IR: 6,600\nOverheat Temp: 682K
item_DescCOOL_AEGS_S02_Arctic=Tipo de item: Cooler\nFabricante: Aegis Dynamics \nTamanho: 2\nTipo: C\nClasse: Militar\n\nO Ártico oferece o tipo de durabilidade que tornou os produtos Aegis um produto básico nas forças armadas. É um cooler Mil-Spec econômico, projetado para suportar os rigores do combate sem sacrificar o desempenho.\n\n--- STATS ---\nCooling Rate: 46 CR/s\nPower Draw: 4 PU/s\nComponent HP: 490\nSignatures:  EM: 1,980  |  IR: 9,440\nOverheat Temp: 750K
item_DescCOOL_AEGS_S02_Boreal=Tipo de item: Cooler\nFabricante: Aegis Dynamics\nTamanho: 2\nTipo: D\nClasse: Militar\n\nProjetado para dissipar o calor da batalha, o Aegis Dynamics Boreal Cooler é um padrão militar com a capacidade de sobreviver a situações estressantes .\n\n--- STATS ---\nCooling Rate: 41 CR/s\nPower Draw: 4 PU/s\nComponent HP: 430\nSignatures:  EM: 1,980  |  IR: 8,580\nOverheat Temp: 682K
item_DescCOOL_AEGS_S03_Blizzard_SCItem=Tipo de item: Cooler\nFabricante: Aegis Dynamics\nTamanho: 3\nTipo: A \nClasse: Militar\n\nOs mecânicos da Marinha trabalharam com os engenheiros da Aegis para garantir que a Blizzard atendesse aos seus requisitos específicos. Quando chegou ao mercado comercial, este cooler premium de nível militar tornou-se um dos componentes mais vendidos da Aegis.\n\n--- STATS ---\nCooling Rate: 60 CR/s\nPower Draw: 5 PU/s\nComponent HP: 1,800\nSignatures:  EM: 2,480  |  IR: 12,700\nOverheat Temp: 900K
item_DescCOOL_AEGS_S03_Galinstan_SCItem=Tipo de item: Cooler\nFabricante: Aegis Dynamics\nTamanho: 3\nTipo: D \nClasse: Militar\n\nO Galinstan é um modelo de cooler mais antigo que foi originalmente desenvolvido para a Marinha da UEE. Suas especificações não vão surpreendê-lo, mas continua sendo um cooler básico grande e sólido.\n\n--- STATS ---\nCooling Rate: 50 CR/s\nPower Draw: 5 PU/s\nComponent HP: 1,200\nSignatures:  EM: 2,480  |  IR: 10,600\nOverheat Temp: 682K
item_DescCOOL_AEGS_S03_Mercury=Tipo de item: Cooler\nFabricante: Aegis Dynamics \nTamanho: 3\nTipo: C\nClasse: Militar\n\nEm situações de combate, mesmo a menor vantagem pode levar a grandes ganhos. Com o sistema de resfriamento Mercury da Aegis, você poderá manter sua Nave funcionando mais quente por mais tempo, quando mais precisar.\n\n--- STATS ---\nCooling Rate: 56 CR/s\nPower Draw: 5 PU/s\nComponent HP: 1,300\nSignatures:  EM: 2,480  |  IR: 11,600\nOverheat Temp: 750K
