item_DescCOOL_JSPN_S02_WinterStarEX_SCItem=Tipo de item: Cooler\nFabricante: J-Span \nTamanho: 2\nTipo: D\nClasse: Civil\n\nO Winter-Star EX é um cooler básico em que você pode confiar. Construído pelos especialistas da J-Span, está pronto para qualquer condição que você encontrar.\n\n--- STATS ---\nCooling Rate: 32 CR/s\nPower Draw: 3 PU/s\nComponent HP: 300\nSignatures:  EM: 1,130  |  IR: 5,000\nOverheat Temp: 545K
item_DescCOOL_JSPN_S03_FrostStarXL_SCItem=Tipo de item: Cooler\nFabricante: J-Span \nTamanho: 3\nTipo: C\nClasse: Civil\n\nQuando sua Nave voa, os componentes geram calor que pode ser prejudicial e até mesmo causar falha no sistema se deixados sem vigilância, um dispositivo confiável e cooler adequadamente projetado como o Frost-Star XL da J-Span.\n\n--- STATS ---\nCooling Rate: 45 CR/s\nPower Draw: 4 PU/s\nComponent HP: 960\nSignatures:  EM: 1,500  |  IR: 7,000\nOverheat Temp: 600K
item_DescCOOL_JSPN_S03_WinterStarXL_SCItem=Tipo de item: Cooler\nFabricante: J-Span \nTamanho: 3\nTipo: D\nClasse: Civil\n\nA J-Span se dedica à produção de caixas térmicas há dois séculos. O Winter-Star XL é o seu modelo básico entre as grandes caixas térmicas. O que falta em recursos é mais do que compensado em um acabamento sólido.\n\n--- STATS ---\nCooling Rate: 41 CR/s\nPower Draw: 4 PU/s\nComponent HP: 840\nSignatures:  EM: 1,500  |  IR: 6,380\nOverheat Temp: 545K
