item_DescCOOL_AEGS_S04_Reclaimer=Tipo de item: Cooler\nFabricante: Aegis Dynamics\nTamanho: 4\nTipo: Sob medida\nClasse: Industrial\n\nO Reclaimer é uma nave conhecida por sua capacidade de trabalhar muito e arduamente. Para ajudar a dar suporte até mesmo aos projetos de recuperação mais árduos, a Aegis desenvolveu o cooler Algid sob medida.\n\n--- STATS ---\nCooling Rate: 69 CR/s\nPower Draw: 6 PU/s\nComponent HP: 4,100\nSignatures:  EM: 2,970  |  IR: 14,300\nOverheat Temp: 810K
