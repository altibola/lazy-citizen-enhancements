redwind_UGF_collect_desc_001=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOs\n----------------------------\n\nTenho uma carga esperando para ser transportada de <EM4>~mission(Location|Address)</EM4> para <EM4>~mission(Destination|Address)</EM4>. \n\nSerei franco com você, porém, esse local não tem a reputação mais limpa. Dito isso, eles ainda precisam que os pacotes sejam entregues e receberam créditos, então está tudo certo. Mas se você for até lá, há uma boa chance de ter problemas.\n\nNão aceite o trabalho se não puder lidar com isso.\n\n\nA TODOS OS VETERNIZADOS - O Red Wind agradece seu serviço ao nosso Império! Suas lutas significam nossa liberdade!  \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Unknown:</EM4> 4
redwind_UGF_collect_title_001=É NECESSÁRIO ENTREGADOR RED WIND <EM4>[500 Rep]</EM4>
redwind_courier_dc_small_title_001=ROTA LOCAL DA RED WIND <EM4>[500–1,000 Rep]</EM4>
redwind_courier_fromdc_med_desc_001=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nRecebi uma solicitação da ~mission(Pickup1|Address) de que há um número razoável de pacotes aguardando na ~mission(Pickup1) que precisam ser entregues. \n\nAntes de aceitar o contrato, certifique-se de que você tem uma nave com espaço suficiente. Um raio trator também não faria mal. \n\nPACKAGES FOR PICK UP \n - Todos os pacotes na ~mission(Pickup1) na ~mission(Pickup1|Address)\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n · Pacote #~mission(item1|serialnumber) para a ~mission(Dropoff1|Address)\n · Pacote #~mission(item2|serialnumber) para a ~mission(Dropoff2|Address)\n · Pacote #~mission(item3|serialnumber) para a ~mission(Dropoff3|Address)\n · Pacote #~mission(item4|serialnumber) para a ~mission(Dropoff4|Address)\n · Pacote #~mission(item5|serialnumber) para a ~mission(Dropoff5|Address)\n · Pacote #~mission(item6|serialnumber) para a ~mission(Dropoff5|Address)\n · Pacote #~mission(item7|serialnumber) para a ~mission(Dropoff6|Address)\n · Pacote Pacote #~mission(item8|serialnumber) para a ~mission(Dropoff6|Address)\n · Pacote #~mission(item9|serialnumber) para a ~mission(Dropoff7|Address)\n · Pacote #~mission(item10|serialnumber) para a ~mission(Dropoff7|Address)\n\n\nNÓS SOMOS OPORTUNIDADE IGUAL - A Red Wind Linehaul é e sempre foi uma empresa contratada que oferece oportunidades iguais. Se você acha que pode fazer um bom trabalho para nós, inscreva-se. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
redwind_courier_fromdc_small_desc_001=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\nO pessoal da ~mission(Pickup1|Address) tem alguns pacotes na ~mission(Pickup1) que eles querem que sejam entregues. Créditos fáceis para fazer uma carga e entrega básica. \n\nPACKAGES FOR PICK UP \n - Todos os pacotes na ~mission(Pickup1) na ~mission(Pickup1|Address)\n\nLOCAL DE ENTREGAS (QUALQUER ORDEM)\n · Pacote #~mission(item1|serialnumber) para a ~mission(Dropoff1|Address)\n · Pacote #~mission(item2|serialnumber) para a ~mission(Dropoff2|Address)\n · Pacote #~mission(item3|serialnumber) para a ~mission(Dropoff3|Address)\n · Pacote #~mission(item4|serialnumber) para a ~mission(Dropoff4|Address)\n · Pacote #~mission(item5|serialnumber) para a ~mission(Dropoff5|Address)\n\n\nPARA TODOS OS VETORES - O Vento Vermelho agradece seu serviço ao nosso Império! Suas lutas significam nossa liberdade! \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
redwind_courier_todc_med_desc_001=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nHá uma quantidade considerável de pacotes que precisam ser levados para a ~mission(Dropoff1) em ~mission(Dropoff1|Address). Contanto que sua nave tenha espaço suficiente, essa deve ser uma corrida relativamente simples. \n\nPACOTES PARA COLETA (QUALQUER ORDEM) \n · Pacote #~mission(item1|serialnumber) da ~mission(Pickup1|Address)\n · Pacote #~mission(item2|serialnumber) da ~mission(Pickup2|Address)\n · Pacote #~mission(item3|serialnumber) da ~mission(Pickup3|Address)\n · Pacote #~mission(item4|serialnumber) da ~mission(Pickup4|Address)\n · Pacote #~mission(item5|serialnumber) da ~mission(Pickup5|Address)\n · Pacote #~mission(item6|serialnumber) da ~mission(Pickup5|Address)\n · Pacote #~mission(item7|serialnumber) da ~mission(Pickup6|Address)\n · Pacote #~mission(item8|serialnumber) da ~mission(Pickup6|Address)\n · Pacote #~mission(item9|serialnumber) da ~mission(Pickup7|Address)\n · Pacote #~mission(item10|serialnumber) da ~mission(Pickup7|Address)\n\nLOCAL DE ENTREGA\n - Todos os pacotes entregues à ~mission(Dropoff1) na ~mission(Dropoff1|Address)\n\n\nNÃO LEVE ESTE CONTRATO - a menos que você seja confiável. A Red Wind tem uma reputação em que nossos clientes confiam e por um bom motivo. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
redwind_courier_todc_small_desc_001=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nTenho um pequeno grupo de pacotes que precisam ser pegos e levados para a ~mission(Dropoff1) em ~mission(Dropoff1|Address). Deve ser bastante simples, considerando todas as coisas.\n\nPACOTES PARA COLETA (QUALQUER ORDEM) \n · Pacote #~mission(item1|serialnumber) da ~mission(Pickup1|Address)\n · Pacote #~mission(item2|serialnumber) da ~mission(Pickup2|Address)\n · Pacote #~mission(item3|serialnumber) da ~mission(Pickup3|Address)\n · Pacote #~mission(item4|serialnumber) da ~mission(Pickup4|Address)\n · Pacote #~mission(item5|serialnumber) da ~mission(Pickup5|Address)\n\nLOCAIS DE ENTREGA\n - Todos os pacotes entregues à ~mission(Dropoff1) na ~mission(Dropoff1|Address)\n\n\nA CONFIANÇA VAI EM DOIS SENTIDOS - Ao aceitar este contrato, você está se comprometendo a não nos enganar, e a Red Wind Linehaul se compromete a tratar você da mesma forma. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
roughready_bounty_cargoship_desc_001=Rough & Ready recentemente prestou serviços de abastecimento para um transportador chamado ~mission(TargetName), que concordou em entregar sua próxima carga de suprimentos para nós como compensação.Bem, acabamos de descobrir que a mentira Skag vendeu sua última remessa para uma gangue rival.\n\nNós estamos procurando alguém para rastrear e eliminar ~mission(TargetName|Last) para a cruz dupla.\n\nan O velho amigo meu acabou de ver o skag em ~mission(location|Address).Parece que eles estão carregados com mais carga que não está chegando e viajando com uma escolta.Estamos pagando apenas para tirar a nave, então qualquer coisa que você achar a bordo é sua para manter. \n\n- Smokey \n n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
roughready_bounty_cargoship_desc_002=Meus associados e eu intermediamos um acordo com um Hauler chamado ~mission(TargetName) para fornecer suprimentos para nós.O engraçado é que a remessa nunca apareceu.Eles alegaram que os piratas invadiram a nave e pegaram nossos suprimentos, mas acontece que o esterco de Ranta 100% da história.~mission(TargetName|Last) foi visto recentemente com uma escolta em ~mission(location|Address).Desde que você mate ~mission(TargetName|Last), não nos importamos com o que acontece com a carga que eles estão transportando.\n\n- Smokey \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1
roughready_bounty_cargoship_desc_003=Algum idiota com o nome ~mission(TargetName) está executando um esquema em que a nave de carga solicita serviços de reabastecimento apenas para emboscar nossos naves quando chegarem lá.Até carregou a maldita coisa com carga real para garantir que ela passe as varreduras.Nós espalhamos a notícia para que ninguém em Rough & Ready caia na armadilha novamente, mas eu quero que esse skag punido.\n\ni Think ~mission(TargetName|Last) conhece muito do nosso povo à vista, então acho que será melhor pagar você para cuidar disso.Ouvi dizer que eles foram vistos em torno da ~mission(location|Address).Vá para lá agora e cuide daquele Nave de carga e qualquer pessoa que o proteja de uma vez por todas.\n\n- Smokey \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
roughready_bounty_desc_001=Interessado em fazer um pouco de caça?\n\n ~mission(TargetName) sabotou um de nossos remessas de combustível e nos custou uma tonelada de creds, por isso estou procurando alguém para fazer com que eles paguem pelo que fizeram.Acabei de receber o Word ~mission(TargetName|Last) foi visto em ~mission(location|Address).Se você for para lá agora, há uma boa chance de você pegar a trilha deles e levá -los para sempre.\n\n ~mission(TargetName|Last) não funcionou sozinho, então não se surpreenda se eles estiverem viajando com proteção extra. \n\n- Smokey \n n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
roughready_bounty_desc_003=Eu tenho uma situação delicada que precisa de lidar.Depois de anos sendo um membro leal da Rough & Ready, ~mission(TargetName) desertou da gangue e está lá fora, segredos de compras para nossos rivais.Precisamos de ~mission(TargetName|Last) Ghosted imediatamente.\n\nCom coisas assim, achei sempre melhor pagar a alguém não associado conosco para fazer a ação.As varreduras pegadas ~mission(TargetName|Last) perto de ~mission(location|Address) não muito tempo atrás.Vamos pagar bem para ir para lá agora e cuidar de nós para nós.\n\n ~mission(TargetName|Last) não é um idiota e sabe que iremos depois deles.Esteja preparado para uma luta infernal e não espere que eles estejam sozinhos. \n\n- Smokey \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
roughready_claimsweep_desc_easy=A equipe áspera e pronta está procurando alguém para lidar com uma situação delicada.Descobrimos uma nave e sentinelas orbitais em ~mission(location|Address) Spyin 'em nós.Estamos um pouco vinculados porque não queremos iniciar uma briga maior com quem está por trás disso.É por isso que procuramos uma ajuda contratada que possa cuidar rapidamente e discretamente cuidar disso para nós.Interessado?Aposto assim que você começar a explodir suas sentinelas, eles tentarão trazer alguma ajuda para impedi-lo. \n\n- Smokey \n n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x3, Prospectors x1\n<EM4>Turrets:</EM4> 2 (hostile)
roughready_claimsweep_desc_hard=A equipe áspera e pronta está procurando um Merc independente interessado em algo pesado.Estamos de olho em uma situação em desenvolvimento na ~mission(location|Address), onde os naves estão guardando várias sentinelas orbitais espionando nossas operações.\n\nAgora, eu poderia ter nascido à noite, mas não foi ontem à noite.Considerando a maneira flagrante da maneira que eles estão configurados, quem quer que tenha que saber que acabaríamos descobrindo. Quase parece que eles estão isolando o R&R a atacá -lo, e eu não quero que cantamos por isso.\n\ninstead, você fará isso por nós e receberá uma boa quantidade de creds pelo seu esforço. As naves estacionados haverão menos suspeitos de uma nave não afiliado se aproximando e dificultam o ataque a nós.\n\nCertifique -se de planejar de acordo antes de entrar. Talvez traga seus próprios reforços, caso qualquer um de suas Naves escape e chame por alguns deles.\n\n- Smokey \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x5, Prospectors x4\n<EM4>Turrets:</EM4> 4 (hostile)
roughready_claimsweep_desc_intro=Meus associados e eu nos encontramos em uma pequena situação e poderíamos usar alguma ajuda.Há uma sentinela orbital em ~mission(location|Address) que está nos espionando.Não sabemos quem colocou lá, mas com certeza não pode ficar.\n\nA coisa é que somos pessoas que pensam nos negócios, em primeiro lugar, e preocupam que, se explodirmos, começará a merda.É por isso que é melhor se alguém como você faz isso.Deve ser um show rápido e fácil para alguém interessado em ganhar alguns Creds.\n\n- Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Turrets:</EM4> 1 (hostile)
roughready_claimsweep_desc_medium=Recentemente, fez uma descoberta interessante de que alguém estabeleceu um punhado de sentinelas orbitais em ~mission(location|Address).Acho que eles estão tentando obter algumas informações sobre nossas operações lá.Eles até têm alguns naves guardando para garantir que nada aconteça com eles.Não é claro, queremos que esses bastardos desaparecessem, mas estou preocupado que se livrar dele seria ruim para os negócios.É por isso que estamos procurando uma "negação plausível".Alguém de fora da P&R para eliminar o problema, então quem está por trás dele não pode amarrar diretamente o ataque de volta para nós.Eu sei que isso não será uma caminhada no parque, especialmente com esses guardas à espreita.Quem sabe quantos reforços eles têm pronto?Mas se você conseguir fazê -lo, estamos preparados para vê -lo pago corretamente.\n\nAcha que você tem as habilidades para conseguir isso?\n\n- Smokey \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x4, Prospectors x2\n<EM4>Turrets:</EM4> 3 (hostile)
roughready_delivery_station_desc_001=Por acaso você está em ~mission(Destination)?\n\nPrecisa de uma caixa levada de <EM4>~mission(Location|Address)</EM4> para <EM4>~mission(Destination|Address)</EM4>. Entregue-a lá no horário e sem quebrar e serão os créditos mais fáceis que você ganhará. \n\n-Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 1/7 | Complexity 1/7 | Risk 1/7 | Knowledge 1/7
roughready_delivery_station_title_001=PASSEIO EM ~mission(Destination)
roughready_eliminateall_hangar_desc_01=Recebemos alguns bandidos em excesso de boas -vindas em uma de nossas estações.Eles tentaram puxar um rápido para nós, mas agora estão presos em ~mission(location|Address).Precisamos que você limpe -os.\n\nRough & Ready não quer que um deles sai vivos quando você terminar.Não se importe com o quão bagunçado fica o tempo que for feito, entendeu? \n\n- Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x24, Soldiers x2
roughready_eliminateall_maintenance_desc_01=Rough & Ready tem um problema de rato.Uma de nossas equipes tentou puxar um pouco de motim e agora eles assumiram ~mission(location|Address).Para lidar com a redução desses traidores para mim.Apenas não deixe um único deles vivo.Não quero mais ninguém recebendo idéias engraçadas. \n\n- Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x21
roughready_salvage_E_desc_001=Tive alguns naves naufragados rebocados para ~mission(Location|Address). Eles estão totalmente fora de serviço e precisam urgentemente de desmanche. Se você estiver interessado em salvar o que sobrou, pode ser todo seu, por um preço justo também.\n\nAlém disso, você não precisa se preocupar muito com distrações enquanto estiver trabalhando, já que estará perto de uma de nossas estações e garantimos que as pessoas se comportem.\n\n- Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Friendlies:</EM4> Salvageable Ships x1
roughready_salvage_E_title_001=NAVES NAUFRAGADAS PARA VENDA
roughready_salvage_M_desc_001=Ouvi dizer que há algumas naves perto de ~mission(Location|Address) flutuando sozinhas. É um bom sucateamento, mas nenhuma de nossas equipes tem tempo agora. Nós pensamos em dar a você a primeira chance.\n\nSe você quiser as coordenadas, nós as venderemos a você por um preço. Então você está livre para escolher o naufrágio tão limpo quanto quiser e vender tudo por um lucro limpo. Agora, você pode ter alguns problemas por aí com scavs rivais, mas tenho certeza de que não será nada que você não possa lidar.\n\n- Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Friendlies:</EM4> Salvageable Ships x1
roughready_salvage_M_title_001=SUCATEAMENTO DE NAVES NAUFRAGADAS À DERIVA
roughready_searchbody_danger_station_desc_001=Depois de ouvir rumores de que poderíamos ter um caso grave de invasores em ~mission(Location|Address), enviei uma das minhas pessoas mais confiáveis ​​para investigar. \n\nA má notícia é que não tive notícias deles desde então. \n\nGostaria que você fosse lá e visse se consegue encontrar o paradeiro atual de ~mission(TargetName). Deixo a seu critério como quer lidar com qualquer escória que encontrar. \n\nConfirme onde ~mission(TargetName|Last) está, e haverá uma recompensa para você.\n\n- Smokey \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
roughready_searchbody_nodanger_station_desc_001=Tenho pessoas à esquerda e à direita me perguntando se eu sei o que aconteceu com ~mission(TargetName). Agora, pessoalmente, eu ficaria mais do que feliz em vê-los partir para sempre, mas por alguma razão eles têm amigos em altos escalões exigindo respostas.\n\nNão posso dispensar nenhum dos meus para uma caça inútil, então estou procurando o candidato perfeito para ir até ~mission(Location|Address) e descobrir o que aconteceu com ~mission(TargetName|Last). Você será pago se descobrir onde eles estão.\n\n10 créditos dizem que eles ficaram chapados demais e desmaiaram em um canto escuro em algum lugar.\n\n-Smokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
