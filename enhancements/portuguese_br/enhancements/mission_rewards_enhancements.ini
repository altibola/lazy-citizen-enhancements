InterSec_SecurityPatrol_S_Desc_001=ESPECIFICAÇÕES DA MISSÃO\n\nÁrea de Operação: Sistema Nyx\nForças Inimigas: Vanduul\nEspecificações de Equipamento: Naves de combate\nBriefing: Há uma crescente preocupação de que caçadas Vanduul estão avançando mais para o sistema Nyx. A primeira linha de defesa contra essa invasão é o aumento das patrulhas. A InterSec identificou um setor com aumento da atividade Vanduul e está procurando alguém para patrulhar a região e fornecer uma atualização.\n\nVocê começará sua patrulha no <EM4>marcador de localização</EM4> enviado para o seu HUD e, em seguida, escaneará uma série de pontos ao longo de uma rota designada. As naves Vanduul nesse setor são altamente habilidosas e agressivas, por isso a InterSec recomenda fortemente que você <EM4>traga várias naves de combate como reforço</EM4>.\n\nA InterSec entende o imenso perigo que você enfrentará nesta patrulha, por isso enviaremos um bônus especial de <EM4>~mission(ScripAmount) MG Scrip</EM4> para o contratante principal assim que o setor estiver limpo.\n\nAtenciosamente,\nDeacon Tobin\nGerente de Operações\nInterSec Defense Solutions\n\nEsta comunicação consiste em uma oferta não vinculativa que, após aceitação, pode ser imediatamente encerrada por qualquer uma das partes sem aviso prévio. Todas as operações são realizadas por conta e risco do contratante, devendo aderir à legislação do sistema quando aplicável.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Quartz "Deadfall" Energy SMG\n- Quartz "Lumen" Energy SMG\n- [S1-A] Quartz Energy SMG Battery (45 cap)\n- [S1-A] Testudo Arms Nightveil\n- [S1-A] Testudo Arms Turfwar\n- [S1-A] Testudo Core Nightveil\n- [S1-A] Testudo Core Turfwar\n- [S1-A] Testudo Helmet Nightveil\n- [S1-A] Testudo Helmet Turfwar\n- [S1-A] Testudo Legs Nightveil\n- [S1-A] Testudo Legs Turfwar\n- [S2-A] Testudo Backpack Nightveil\n- [S2-A] Testudo Backpack Turfwar\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 7/7\n<EM4>Hostiles:</EM4> Targets x51\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
