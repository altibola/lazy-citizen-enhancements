Foxwell_DefendLocation_H_Desc_001=O pessoal em <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> está sob ataque e precisa do nosso apoio. As naves deles na região estão sendo alvo, e há uma preocupação crescente de que isso seja só o começo de algo maior.\n\nA situação está em constante mudança, mas estou recebendo atualizações direto e vou te manter informado conforme o contrato avança.\n\nPode ajudar? Seria inteligente recrutar alguns aliados. Esses são clientes importantes e não podemos falhar com eles. O contratado principal vai receber um bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4> se concluir a missão.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n‘Segurança do seu jeito’\n\nA Foxwell Enforcement é uma empresa de segurança licenciada para operar em todo o espaço da UEE. Estamos sempre em busca de novos operadores para integrar nosso time. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- [S1-A] Antium Arms Storm\n- [S1-A] Antium Core Storm\n- [S1-A] Antium Helmet Storm\n- [S1-A] Antium Legs Storm\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x5, Hostiles x3, Interdiction Ships x2, Reinforcements x16\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
