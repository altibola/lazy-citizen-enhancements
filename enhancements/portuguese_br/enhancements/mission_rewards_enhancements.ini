InterSec_SecurityPatrol_VH_desc_001=ESPECIFICAÇÕES DA MISSÃO\n\nÁrea de Operação: Sistema Nyx\nForças Inimigas: Fora-da-lei\nEspecificações de Equipamento: Naves de combate\nBriefing: A InterSec tem monitorado o aumento da atividade de foras da lei em certos setores do sistema. Essa atividade, junto com outras informações de inteligência, nos leva a acreditar que foras da lei estão planejando um ataque contra elementos que viajam pela UEE. O objetivo é patrulhar esses setores e interromper qualquer plano antes que ele seja colocado em ação.\n\nAtualmente, precisamos de alguém que ajude a patrulhar um setor altamente perigoso. Uma vez que você aceite a missão, dirija-se ao <EM4>marcador de localização</EM4> no seu HUD. De lá, enviaremos você por uma rota específica com pontos adicionais a serem escaneados. Complete a patrulha e enviaremos um bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4> para o contratante principal.\n\nDevido à alta probabilidade de ataque e ao nível geral de ameaça dos foras da lei locais, recomendamos <EM4>recrutar pilotos confiáveis</EM4> para fornecer suporte de combate.\n\nAtenciosamente,\nDeacon Tobin\nGerente de Operações\nInterSec Defense Solutions\n\nEsta comunicação consiste em uma oferta não vinculativa que, após aceitação, pode ser imediatamente encerrada por qualquer uma das partes sem aviso prévio. Todas as operações são realizadas por conta e risco do contratante, devendo aderir à legislação do sistema quando aplicável.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Quartz "Deadfall" Energy SMG\n- Quartz "Lumen" Energy SMG\n- [S1-A] Quartz Energy SMG Battery (45 cap)\n- [S1-A] Testudo Arms Nightveil\n- [S1-A] Testudo Arms Turfwar\n- [S1-A] Testudo Core Nightveil\n- [S1-A] Testudo Core Turfwar\n- [S1-A] Testudo Helmet Nightveil\n- [S1-A] Testudo Helmet Turfwar\n- [S1-A] Testudo Legs Nightveil\n- [S1-A] Testudo Legs Turfwar\n- [S2-A] Testudo Backpack Nightveil\n- [S2-A] Testudo Backpack Turfwar\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Targets x63\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Intersec_DefendShip_Desc_Easy_001=ESPECIFICAÇÕES DA MISSÃO\n\nÁrea de Operação: Sistema Nyx \nForças Hostis: Fora da Lei\nEspecificações de Equipamento: Naves de combate \nBriefing: Requeremos assistência urgente para um agente da InterSec que está sob fogo no local <EM4>~mission(Location|Address)</EM4>.\n\nUm grupo de fora da lei havia capturado nosso agente com a intenção de extrair informações sensíveis, mas milagrosamente ele conseguiu escapar. Infelizmente, os fora da lei que o perseguiam agora o têm encurralado.\n\nDevido ao número de naves atacando, estamos oferecendo uma compensação adicional devido ao aumento do perigo. <EM4>Recrutar naves adicionais</EM4> para apoiar você nesta missão é altamente recomendado.\n\nAtenciosamente, \n\nDeacon Tobin \nGerente de Operações \nInterSec Defense Solutions  \n\nEsta comunicação contém informações confidenciais destinadas exclusivamente ao destinatário. Por favor, desconsidere se recebida por engano e notifique o remetente. Todas as operações são realizadas por conta e risco do contratante, devendo obedecer à legislação da UEE e do sistema, quando aplicável.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Pulse "Rouge" Pistol\n- [S1-A] Pulse Laser Pistol Battery (60 Cap)\n- [S1-A] Testudo Arms Combustion\n- [S1-A] Testudo Core Combustion\n- [S1-A] Testudo Helmet Combustion\n- [S1-A] Testudo Legs Combustion\n- [S2-A] Testudo Backpack Combustion\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
