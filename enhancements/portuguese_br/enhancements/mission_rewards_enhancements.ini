BHG_Certification_Super_Desc=--------------------------------------------------------\n----------------- CONTRATO DE CAÇA -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName) \nSISTEMA: ~mission(System) \nAVALIAÇÃO DE RISCO: Extremo\nÚLTIMA LOCALIZAÇÃO CONHECIDA: ~mission(Location)\nAFILIAÇÕES CONHECIDAS: <Nenhuma>\nNOTAS: Como reconhecimento da sua experiência no ofício, a Bounty Hunters Guild gostaria de oferecer a você a chance de obter uma Licença de Mestre Rastreador.\n\nEssa licença indica que você está qualificado para rastrear e capturar Alvos de Risco Extremo (ERT). Esses criminosos viajam em naves sub-capitais com escoltas pesadas. Esse tipo de recompensa só é atribuído aos rastreadores mais experientes.\n\nPara concluir com sucesso este processo de certificação, você deve capturar um criminoso classificado como ERT chamado <EM4>~mission(TargetName)</EM4>, visto pela última vez em <EM4>~mission(Location|Address)</EM4>.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca da Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Mercenary Guild e autorizado a operar tanto dentro da UEE quanto além, de acordo com os Atos da Autoridade Xenotrade.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 4
