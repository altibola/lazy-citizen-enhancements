BHG_Certification_Hard_Desc=--------------------------------------------------------\n----------------- CONTRATO DE CAÇA -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName) \nSISTEMA: ~mission(System) \nAVALIAÇÃO DE RISCO: Alto\nÚLTIMA LOCALIZAÇÃO CONHECIDA: ~mission(Location)\nAFILIAÇÕES CONHECIDAS: <Nenhuma>\nNOTAS: À medida que sua reputação na comunidade continua a crescer, a Bounty Hunters Guild gostaria de oferecer a você a chance de obter uma Licença de Rastreador Profissional.\n\nEssa licença indica que você está qualificado para rastrear e capturar Alvos de Alto Risco (HRT). Esses criminosos podem viajar em naves maiores com múltiplos tripulantes e várias escoltas. As capacidades ofensivas e defensivas adicionais tornam esses alvos difíceis para qualquer um que não seja um dos membros mais habilidosos da guilda.\n\nPara concluir com sucesso este processo de certificação, você deve capturar um criminoso classificado como HRT chamado <EM4>~mission(TargetName)</EM4>, visto pela última vez em <EM4>~mission(Location|Address)</EM4>.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca da Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Mercenary Guild e autorizado a operar tanto dentro da UEE quanto além, de acordo com os Atos da Autoridade Xenotrade.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 3
