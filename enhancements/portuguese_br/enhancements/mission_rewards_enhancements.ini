eckhart_defendship_multi_SRT_desc_001=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Defender Nave\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nTemos um cliente sob ataque em <EM4>~mission(Location|Address)</EM4>. Temos um longo histórico com esse cliente e sabemos que ele é um bom piloto de dogfight. Se ele está tendo dificuldades para sobreviver, a situação deve ser bem grave.\n\nEstamos procurando um dos melhores para voar até lá e fornecer suporte. Se você estiver disponível, esse cliente realmente precisará da sua ajuda.\n\nO pagamento será feito após a conclusão bem-sucedida do contrato.\n\nEste contrato é inegociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. A informação é destinada ao uso do indivíduo ou entidade designada acima.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
