InterSec_ResourceGathering_Tech_Desc=ESPECIFICAÇÕES DA MISSÃO\n\nÁrea de Operação: Sistema Nyx\nForças Inimigas: Fora da Lei armados e presentes\nEspecificações de Equipamento: Nave de Combate, Armas Pessoais\nBriefing: \nPara impedir que o Shattered Blade inunde o mercado negro com xeno-contrabando, a UEE encarregou a InterSec de <EM4>recuperar um estoque de Placas e Metais Vanduul</EM4> da antiga <EM4>estação QV Logistics</EM4> que o bando tem ocupado. Uma vez que você tenha os materiais em sua posse, entregue-os no elevador de carga em <EM4>~mission(Destination|Address)</EM4>.\n\nSeguindo a sua experiência anterior, não será surpresa se o Shattered Blade oferecer resistência, mas garanta que seu foco esteja em recuperar os materiais.\n\nRespeitosamente,\n\nDeacon Tobin\nGerente de Operações\nInterSec Defense Solutions\n\nEsta comunicação contém informações confidenciais, destinadas exclusivamente ao destinatário. Por favor, ignore se recebida por engano e notifique o remetente. Todas as operações são realizadas por conta e risco do contratante, devendo seguir as leis da UEE e do sistema aplicável.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Pulse Laser Pistol\n- [S1-A] Pulse Laser Pistol Battery (60 Cap)\n- [S1-A] Testudo Arms Earthshake\n- [S1-A] Testudo Core Earthshake\n- [S1-A] Testudo Helmet Earthshake\n- [S1-A] Testudo Legs Earthshake\n- [S2-A] Testudo Backpack Earthshake\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 6/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
