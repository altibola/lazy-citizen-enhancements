Hockrow_FacilityDelve_P2M2_desc=Agência Hockrow \nArquivo do Caso #JD10285\nInvestigador Responsável: Arken Mallor\n\nAtualização do Caso: \nConseguimos extrair dados muito interessantes do que você entregou, mas ainda não temos um quadro claro o suficiente. O que conseguimos descobrir concretamente é que o sistema de monitoramento de segurança de Onyx ainda está operacional. Os dados de lá serão seu próximo alvo.\n\nAções do Investigador Contratado:\nExplore a ala de <EM4>Pesquisa</EM4> e <EM4>recupere os dados de Segurança</EM4> e entregue-os em <EM4>~mission(Destination|Address)</EM4>.\n\nNotas Adicionais:\nCuidado com possíveis forças hostis no local.\n\nViaje para Onyx em um veículo que possa ser armazenado em um hangar grande.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7
