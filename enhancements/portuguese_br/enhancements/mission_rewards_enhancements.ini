bhg_bounty_desc_ASD_Engineering_001=--------------------------------------------------------\n----------------- CONTRATO DE CAÇA -----------------\n--------------------------------------------------------\n\nGUILDA DOS CAÇADORES DE RECOMPENSAS\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Guilda dos Caçadores de Recompensas autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName)\nSISTEMA: Stanton\nAVALIAÇÃO DE RISCO: Médio\nÚLTIMA LOCALIZAÇÃO CONHECIDA: ~mission(Location|Address)\nAFILIAÇÕES CONHECIDAS: <Nenhuma>\nNOTAS: Rastreamos esse alvo até a ala de <EM4>Engenharia</EM4> de uma instalação abandonada da Associated Science and Development. Embora esteja desativada, vários caçadores de sucata e outros tipos duvidosos costumam frequentar a área.\n\nA instalação em si pode representar um risco, pois a natureza das pesquisas realizadas ali é desconhecida. Fique atento a possíveis perigos ambientais enquanto persegue o alvo.\n\nGUILDA DOS CAÇADORES DE RECOMPENSAS\nEm Busca da Justiça\n\nA Guilda dos Caçadores de Recompensas é um serviço de segurança autorizado pela Guilda dos Mercenários e autorizado a operar tanto na UEE quanto além, conforme os Atos da Autoridade Xenotrade.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Palatino Arms Sunstone\n- [S1-A] Palatino Core Sunstone\n- [S1-A] Palatino Helmet Sunstone\n- [S1-A] Palatino Legs Sunstone\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Captain x1\n<EM4>Rep:</EM4> +50\n<EM4>Blueprint Reward:</EM4> Guaranteed
bhg_bounty_desc_ASD_Research_001=--------------------------------------------------------\n----------------- CONTRATO DE CAÇA -----------------\n--------------------------------------------------------\n\nGUILDA DOS CAÇADORES DE RECOMPENSAS\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Guilda dos Caçadores de Recompensas autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName)\nSISTEMA: Stanton\nAVALIAÇÃO DE RISCO: Médio\nÚLTIMA LOCALIZAÇÃO CONHECIDA: ~mission(Location|Address)\nAFILIAÇÕES CONHECIDAS: <Nenhuma>\nNOTAS: Rastreamos esse alvo até a ala de <EM4>Pesquisa</EM4> de uma instalação abandonada da Associated Science and Development. Embora esteja desativada, vários caçadores de sucata e outros tipos duvidosos costumam frequentar a área.\n\nA instalação em si pode representar um risco, pois a natureza das pesquisas realizadas ali é desconhecida. Fique atento a possíveis perigos ambientais enquanto persegue o alvo.\n\nGUILDA DOS CAÇADORES DE RECOMPENSAS\nEm Busca da Justiça\n\nA Guilda dos Caçadores de Recompensas é um serviço de segurança autorizado pela Guilda dos Mercenários e autorizado a operar tanto na UEE quanto além, conforme os Atos da Autoridade Xenotrade.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Palatino Arms Daystar\n- [S1-A] Palatino Arms Metropolis\n- [S1-A] Palatino Core Daystar\n- [S1-A] Palatino Core Metropolis\n- [S1-A] Palatino Helmet Daystar\n- [S1-A] Palatino Helmet Metropolis\n- [S1-A] Palatino Legs Daystar\n- [S1-A] Palatino Legs Metropolis\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Captain x5\n<EM4>Rep:</EM4> +50\n<EM4>Blueprint Reward:</EM4> Guaranteed
bhg_bounty_desc_FPS_intro=--------------------------------------------------------\n----------------- CONTRATO DE CAÇA -----------------\n--------------------------------------------------------\n\nGUILDA DOS CAÇADORES DE RECOMPENSAS\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Guilda dos Caçadores de Recompensas autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName)\nSISTEMA: Stanton\nAVALIAÇÃO DE RISCO: Médio\nÚLTIMA LOCALIZAÇÃO CONHECIDA: ~mission(Location|Address)\nAFILIAÇÕES CONHECIDAS: <Nenhuma>\nNOTAS: Esta recompensa preliminar está sendo oferecida como uma avaliação formal das suas habilidades. A conclusão bem-sucedida deste contrato levará à liberação de mais trabalhos de recompensa.\n\nAcredita-se que o alvo estará a pé e bem armado, então esteja preparado para um tiroteio. Além disso, pode haver outras forças hostis no local; embora não sejam seu foco principal, você pode ter que enfrentá-las enquanto persegue o alvo.\n\nGUILDA DOS CAÇADORES DE RECOMPENSAS\nEm Busca da Justiça\n\nA Guilda dos Caçadores de Recompensas é um serviço de segurança autorizado pela Guilda dos Mercenários e autorizado a operar tanto na UEE quanto além, conforme os Atos da Autoridade Xenotrade.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Unknown:</EM4> 1\n<EM4>Rep:</EM4> +50
bhg_bounty_desc_HeadHunters_001=--------------------------------------------------------\n----------------- CONTRATO DE CAÇA -----------------\n--------------------------------------------------------\n\nGUILDA DOS CAÇADORES DE RECOMPENSAS\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Guilda dos Caçadores de Recompensas autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName)\nSISTEMA: ~mission(System)\nAVALIAÇÃO DE RISCO: ~mission(Danger)\nÚLTIMA LOCALIZAÇÃO CONHECIDA: ~mission(Location|Address)\nAFILIAÇÕES CONHECIDAS: Headhunters\nNOTAS: Os Headhunters são uma organização criminosa de renome, com um longo histórico de confrontos com a lei. Existe uma boa chance de que eles estejam acompanhados por outros membros do grupo, então tenha cautela ao confrontá-los.\n\nGUILDA DOS CAÇADORES DE RECOMPENSAS\nEm Busca da Justiça\n\nA Guilda dos Caçadores de Recompensas é um serviço de segurança autorizado pela Guilda dos Mercenários e autorizado a operar tanto na UEE quanto além, conforme os Atos da Autoridade Xenotrade.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Defenders x12, Targets x2\n<EM4>Probationary Guild Member:</EM4> +2,000 Rep (Failure: -1,000)\n<EM4>Probationary Guild Member:</EM4> +8,000 Rep (Failure: -4,000)
bhg_bounty_desc_Rockcracker_Power_001=--------------------------------------------------------\n----------------- CONTRATO DE CAÇA -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName) \nSISTEMA: Nyx\nAVALIAÇÃO DE RISCO: Média\nÚLTIMA LOCALIZAÇÃO CONHECIDA:  ~mission(Location|Address)\nAFILIAÇÕES CONHECIDAS: Claw Salamanders\nNOTAS: Estas antigas QV Breaker Stations abandonadas devem ser abordadas com cautela. Não apenas estão em estado de grande deterioração, como também são frequentemente habitadas por fauna perigosa e fora-da-lei, como membros da gangue associada ao alvo.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca da Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Mercenary Guild e autorizado a operar tanto no território da UEE quanto além, de acordo com os Xenotrade Authority Acts.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Juggernauts x1\n<EM4>Probationary Guild Member:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
