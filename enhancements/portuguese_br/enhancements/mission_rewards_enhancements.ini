eckhart_defendship_multi_HRT_desc_001=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Defender Nave\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nRecentemente, recomendamos que um cliente usasse uma rota específica para atravessar Nyx com segurança. Acontece que não era tão seguro quanto imaginávamos, porque um grupo emboscou a nave do nosso cliente. Precisamos resolver isso o quanto antes. Você está disponível para ajudar?\n\nIntel do cliente indica um ataque bem organizado, então é melhor estar preparado para lidar com hostis experientes nesta missão. Corra para <EM4>~mission(Location|Address)</EM4>, ajude-o a sobreviver e o pagamento será generoso pela sua ajuda.\n\nO pagamento será feito após a conclusão bem-sucedida do contrato.\n\nEste contrato é inegociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. A informação é destinada ao uso do indivíduo ou entidade designada acima.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
