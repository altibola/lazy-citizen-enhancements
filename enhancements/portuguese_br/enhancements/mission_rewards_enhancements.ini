Tutorial01_MissionDesc=Parabéns pelos seus primeiros passos no universo!\n\nDurante este tutorial você aprenderá como se mover tanto a pé quanto no espaço. \n\nPrimeiro, vamos familiarizá-lo com alguns controles básicos de movimento e como usar seu mobiGlas enquanto você ainda estiver em seu "hab" (ou residência). Siga os objetivos e as pistas no seu HUD (heads-up display) para completar esta missão.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Starter, Unique
Tutorial02_MissionDesc=Muito bem! \n\nCom a primeira parte concluída, agora você deve ter alguma familiaridade básica com os controles de movimento, o gerenciamento de sua fome e sede e algumas das principais funcionalidades do seu mobiGlas, ou seja, o Contract Manager e seu Journal. \n\nEsta próxima seção o ajudará a se familiarizar com ~mission(Location|Name) e o levará a visitar ~mission(StoreName), uma loja de armas aqui em ~mission(Location|Name).\n\nVocê pode fazer compras lá e em outras lojas como essa usando United Earth Credits (UEC). Durante a fase Alfa do desenvolvimento do Star Citizen, usaremos uma moeda chamada aUEC (Alpha United Earth Credits). Essa é uma moeda temporária projetada especificamente para testar a economia e o equilíbrio no jogo.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Starter, Unique
Tutorial03_MissionDesc=Você está quase terminando o tutorial. Tudo o que resta é voar!\n\nCom seus negócios na ~mission(Location|Name) concluídos, é hora de deixar a cidade - e, eventualmente, o planeta. Dirija-se aos ônibus de transporte da ~mission(TransitNameShort). Esses ônibus podem levá-lo por toda a ~mission(Location|Name), mas seu destino é o espaçoporto, onde uma Anvil C8 Pisces foi temporariamente disponibilizada para você.\n\nEssa nave de reconhecimento é uma ótima nave inicial, perfeita para novos pilotos que querem ganhar asas.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Starter, Unique
UDM_LocalDelivery_desc_01=Saudações, parceiro de remessa qualificado!\n\nProcurando uma desculpa para subir aos céus com Sua Nave com capacidade de carga? Ganhe créditos e explore a área com a seguinte rota cuidadosamente selecionada -\n\nPACOTE PARA COLETA\n· Pacote ~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n\nLOCAL DE ENTREGA\n· Pacote # ~mission(item1|serialnumber) to ~mission(Dropoff1|Address)\n\nSe ser seu próprio supervisor e ser pago para pilotar seu próprio Nave parece o trabalho perfeito, então este contrato é o que você estava procurando.  Certifique-se de trazer seu próprio <EM4>Tractor Beam portátil</EM4> para obter a máxima eficiência.\n\nEsperamos trabalhar com você,\n\nGerenciamento de distribuição unificada\n-Entregando o pacote total-\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_LocalDelivery_desc_02=Saudações, parceiros de remessa qualificados!\n\nVocê está pronto para contribuir com nossa rede de entrega crescente e em expansão? Você tem uma Nave disponível que pode transportar vários pacotes e voar entre planetas e satélites locais? Então temos exatamente a oportunidade certa para você com esta rota cuidadosamente selecionada -\n\nPACOTES PARA COLETA (CADA PEDIDO)\n· Pacote ~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n· Pacote # ~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n\nLOCAL DE ENTREGA (QUALQUER APARÊNCIA)\n· Pacote ~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n· Pacote # ~mission(item2|serialnumber) to ~mission(Dropoff2|Address)\n\nSe isso lhe parece algo de interesse, aceite esta oferta imediatamente!  Certifique-se de trazer seu próprio <EM4>Tractor Beam portátil</EM4> para obter a máxima eficiência.\n\nEsperamos trabalhar com você,\n\nGerenciamento de distribuição unificada\n-Entregando o pacote total-\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_LocalDelivery_desc_03=Saudações, parceiro de transporte qualificado!\n\nVocê está interessado em ganhar créditos no conforto de sua própria Nave com capacidade de carga? Então a seguinte rota cuidadosamente selecionada pode ser exatamente a oportunidade que você está procurando -\n\nPACOTES PARA COLETA (CADA PEDIDO)\n· Pacote ~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n· Pacote ~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n· Pacote ~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n\nLOCAIS DE ENTREGA (QUALQUER SÉRIE)\n· Pacote ~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n· Pacote ~mission(item2|serialnumber) para ~mission(Dropoff2|Address)\n· Pacote ~mission(item3|serialnumber) para ~mission(Dropoff3|Address)\n\nAceite este contrato e você estará a caminho. Certifique-se de trazer seu próprio <EM4>Tractor Beam portátil</EM4> para obter a máxima eficiência.\n\nEsperamos trabalhar com você,\n\nGerenciamento de distribuição unificada\n-Entregando o pacote total-\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_LocalDelivery_desc_04=Saudações, parceiro de entrega qualificado!\n\nVocê está procurando oportunidades interessantes no setor de entrega? Se você tem uma boa atitude e um grande espaço de carga, temos uma oportunidade perfeita para você.\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n· Pacote ~mission(item1|serialnumber) de ~mission(Pickup1|Address) \n· Pacote ~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n· Pacote ~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n· Pacote ~mission(item4|serialnumber) de ~mission(Pickup4|Address)\n\nLOCAIS DE ENTREGA (QUALQUER LINHA)\n· Pacote ~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n· Pacote ~mission(item2|serialnumber) para ~mission(Dropoff2|Address)\n· Pacote Pacote ~mission(item3|serialnumber) para ~mission(Dropoff3|Address)\n· Pacote ~mission(item4|serialnumber) para ~mission(Dropoff4|Address) \n\nEntão cancele o contrato e vamos trabalhar. Certifique-se de trazer seu próprio <EM4>Tractor Beam portátil</EM4> para obter a máxima eficiência.\n\nEstamos ansiosos para trabalhar com você,\n\nGerenciamento de distribuição unificada\n-Entregando o pacote total-\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_LocalDelivery_desc_05=Saudações, Parceiro de Remessa Qualificado!\n\nVocê está procurando uma nova carreira emocionante que possa seguir no conforto de sua própria Nave pronta para carga? Então o itinerário a seguir pode ser a oportunidade que você está procurando -\n\nPACOTES PARA COLETA (QUALQUER SÉRIE)\n· Pacote ~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n· Pacote ~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n· Pacote ~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n· Pacote ~mission(item4|serialnumber) de ~mission(Pickup4|Address)\n· Pacote ~mission(item5|serialnumber) de ~mission(Pickup5|Address)\nLOCAL DE ENTREGA (QUALQUER ORDEM)\n· Pacote ~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n· Pacote ~mission(item2|serialnumber) para ~mission(Dropoff2|Address)\n· Pacote ~mission(item3|serialnumber) para ~mission(Dropoff3|Address)\n· Pacote ~mission(item4|serialnumber) para ~mission(Dropoff4|Address)\n· Pacote ~mission(item5|serialnumber) para ~mission(Dropoff5|Address)\n\nTudo o que você precisa fazer é aceitar o contrato e você estará a caminho . Certifique-se de trazer seu próprio <EM4>Tractor Beam portátil</EM4> para obter a máxima eficiência.\n\nEsperamos trabalhar com você,\n\nGerenciamento de distribuição unificada\n-Entregando o pacote total-\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_LocalDelivery_desc_intro=Saudações, potencial parceiro de entrega qualificado!\n\nVocê está pronto para contribuir com nossa rede de entrega crescente e em expansão? Você tem uma Nave disponível que pode transportar vários pacotes e voar entre planetas e satélites locais? O Unified Distribution Management está procurando um piloto como você! \n\nGostaríamos de avaliar seu potencial de contratação com este itinerário cuidadosamente selecionado -\n\nPACOTE PARA COLETA\n· Pacote ~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n\nLOCAL DE ENTREGA\n· Pacote ~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n\nSe isso soa como algo de seu interesse, aceite esta oferta imediatamente!  Certifique-se de trazer seu próprio <EM4>Tractor Beam portátil</EM4> para obter a máxima eficiência.\n\nEsperamos trabalhar com você,\n\nGerenciamento de distribuição unificada\n-Entregando o pacote total-\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +250
UDM_LocalDelivery_desc_rehire=Saudações, ex-parceiro de remessa qualificado!\n\nVocê está pronto para outra chance de usar Sua Nave com capacidade de carga para ganhar créditos? O Unified Distribution Management selecionou a seguinte rota cuidadosamente selecionada como a maneira perfeita de reavaliar suas capacidades -\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n· Pacote ~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n· Pacote ~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n· Pacote ~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n\nLOCAIS DE ENTREGA (QUALQUER OCORRÊNCIA)\n· Pacote ~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n· Pacote ~mission(item2|serialnumber) para ~mission(Dropoff2|Address)\n· Pacote ~mission(item3|serialnumber) para ~mission(Dropoff3|Address) \nCertifique-se de trazer seu próprio <EM4>Tractor Beam portátil</EM4> para obter a máxima eficiência.\n\nEsperamos continuar trabalhando com você,\n\nGerenciamento de distribuição unificada\n-Entregando o pacote total-\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
