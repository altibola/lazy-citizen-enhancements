Intersec_TSG_Group_Desc_001=ESPECIFICAÇÕES DA MISSÃO\n\nÁrea de Operação: Sistema Nyx \nForças Hostis: Shattered Blade\nEquipamento Necessário: Grupo de Ataque\nBriefing: \nRecebemos informações de que a nave Tranquility da People's Alliance encontrou membros da Shattered Blade escondidos em uma antiga QV extraction station. Os detalhes ainda são limitados, mas você será conectado com ativos locais ao chegar.\n\nA Intersec está procurando uma equipe para intervir e proteger a Tranquility e seu pessoal. Com base nas comunicações com o capitão, você <EM4>precisará de armas balísticas e armamento pesado para destruir as defesas da estação</EM4> e eventualmente <EM4>desembarcar para resgatar o piloto</EM4>.\n\n<EM4>Recrutar naves adicionais</EM4> é absolutamente essencial. Você <EM4>precisará de diferentes tipos de nave</EM4> para lidar com múltiplas zonas de combate no espaço e em solo.\n\nAtenciosamente,   \n\nDeacon Tobin \nGerente de Operações \nInterSec Defense Solutions  \n\nEsta comunicação contém informações confidenciais destinadas exclusivamente ao destinatário. Desconsidere caso tenha recebido por engano e notifique o remetente. Todas as operações são realizadas por conta e risco do contratante e devem seguir as leis da UEE e do sistema quando aplicável.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Novian "Ghostmaker" Crossbow\n- Novian "Nighthunter" Crossbow\n- Novian "Wildshot" Crossbow\n- Novian Crossbow\n- [S1-A] BlackFire Racing Flight Suit\n- [S1-A] BlackFire Racing Helmet\n- [S1-A] BlueFlame Racing Flight Suit\n- [S1-A] BlueFlame Racing Helmet\n- [S1-A] Tailwind Flight Helmet Airwolf\n- [S1-A] Tailwind Flight Helmet Blue Skies\n- [S1-A] Tailwind Flight Helmet Frostshock\n- [S1-A] Tailwind Flight Helmet Thunderstruck\n- [S1-A] WhiteHot Racing Flight Suit\n- [S1-A] WhiteHot Racing Helmet\n- [E-S1-A] Omnisky III Cannon\n- [E-S2-A] Omnisky VI Cannon\n- [E-S3-A] Omnisky IX Cannon\n- [E-S4-A] Omnisky XII Cannon\n- [E-S5-A] Omnisky XV Cannon\n- [E-S6-A] Omnisky XVIII Cannon\n- [MIL-S1-A] JS-300\n- [MIL-S2-A] JS-400\n- [MIL-S3-A] QuadraCell MX\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 6/7 | Risk 7/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x53, Maulers x1, Reinforcements x2\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Unknown:</EM4> 20\n<EM4>Rep:</EM4> +300\n<EM4>Blueprint Reward:</EM4> Guaranteed
Intersec_TSG_Group_Title_001=GRUPO DE ATAQUE TÁTICO NECESSÁRIO <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
ItemGathering_ASD_Desc=Agência Hockrow \nArquivo de Caso #JD10285\nInvestigador Líder: Arken Mallor\n\nAtualização do Caso: \nAo revisar os arquivos, encontrei algumas menções a uma amostra de laboratório específica que poderia ser útil para nossa análise. Não sei exatamente onde está, mas se você procurar pela Instalação Onyx, deve conseguir encontrar a amostra e me entregar.\n\nAções do Investigador Contratado:\nExplore a <EM4>Ala de Pesquisa da Instalação Onyx</EM4> e <EM4>encontre a Amostra de Laboratório</EM4> e entregue em <EM4>~mission(Destination|Address)</EM4>.\n\nNotas Adicionais:\nFique atento a possíveis forças hostis no local. \n\nViaje até Onyx em um veículo que possa ser armazenado em um hangar grande.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7
ItemGathering_ASD_Title=DOSSIÊ JORRIT: AMOSTRA DE LABORATÓRIO
Jumptown2_Criminal_MBroker_desc=Tenho boas notícias para você. Neste momento há uma planta automatizada bombeando pacote após pacote de produtos premium que estão quase prontos para serem levados. Tudo o que você precisa fazer é aparecer, negociar com um ou dois bandidos, pegar o que puder e vender com um grande lucro. Isso não deveria ser um problema. E há muitas pessoas que pagariam um bom crédito para comprar esse produto de você. Falando em créditos, não vou divulgar as coordenadas desta instalação pelo bem do meu coração. Acho que é justo cobrar uma taxa de descoberta por informações tão boas.\n\nEu não esperaria muito. Não tenho certeza de quanto tempo o local estará ativo e funcionando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Jumptown2_Lawful_MBroker_desc_BlacJac=ATTN: Operadores Mercenários Verificados\n\nFomos capazes de rastrear um recente surto de contrabando até uma instalação de produção automatizada em ~mission(Location|Address). Não podemos ter certeza de quanto tempo mais o local estará funcionando, então BlacJac precisa de alguém no local para fazer uma varredura, proteger o contrabando e transportá-lo para nós em ~mission(Destination|Address). Uma vez lá, você pode usar o terminal administrativo de mercadorias para transferir o contrabando para nós e receber sua recompensa.\n\nNão conseguimos determinar que tipo de força hostil estará presente, mas, independentemente do que encontrar, você está autorizado a usar força letal conforme necessário. \n\nQuanto mais contrabando você conseguir trazer para nós, mais créditos ganhará.\n\nObrigado,\nTenente Aaron Riegert\nSupervisor de contrato privado\nSegurança BlacJac, "Proteção fornecida"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Jumptown2_Lawful_MBroker_desc_CruSec=A Segurança da Cruzada descobriu que uma instalação de produção ilegal em ~mission(Location|Address) está sendo usada atualmente para fabricar contrabando.\nEstamos procurando um contratado para proteger o local, confiscar qualquer contrabando e entregá-lo a nós em ~mission(Destination|Address).O terminal administrativo de mercadorias permitirá que você envie o contrabando para nosso depósito de evidências e receba seu pagamento.\n\nAgora, essa é uma instalação automatizada, portanto, não está claro por quanto tempo eles estarão fabricando, ou mesmo quantas pessoas podem estar no local.Por segurança, eu entraria esperando encontrar uma resistência pesada.\n\nSua compensação total será baseada em como os pacotes são entregues com segurança nas evidências.\n\nCONTRATO AUTORIZADO POR:\nOficial de ligação Vanzant\nID# 712L921P\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Jumptown2_Lawful_MBroker_desc_Hurston=HURSTON DYNAMICS\nOUTSOURCING DEPARTMENT\n\nCONTRATO: Confiscar contrabando\nCONTRACTOR AFFILIATION: Independente\nOUTSOURCE MANAGER: T. Odington\nAVALIAÇÃO DE RISCO: Alto\nCONTRATO DE ARRECADAÇÃO: Não\n\nA Hurston Security tomou conhecimento de uma instalação de produção automatizada ilegal ativa em ~mission(Location|Address) e está procurando um contratado para proteger o local e confiscar o maior número possível de pacotes de contrabando para entrega em uma instalação da Hurston Security ~mission(Destination|Address) para descarte imediato.A transferência do contrabando e a atribuição do pagamento de sua recompensa devem ser feitas por meio do terminal administrativo de commodities existente.\n\nVocê está autorizado a usar qualquer força necessária para concluir seu objetivo.O pagamento será baseado na quantidade de contrabando assegurada. \n\nAs informações transmitidas podem conter material confidencial e/ou privilegiado.É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Jumptown2_Lawful_MBroker_desc_MicroTech=SOBRE O TRABALHO\nOs Serviços de Proteção da MicroTech estão procurando um profissional de segurança detalhista que possa nos ajudar a proteger o contrabando de um local de produção automatizado ilegal em ~mission(Location|Address). Os pacotes precisarão então ser levados para ~mission(Destination|Address) e transferidos para nossa posse para destruição por meio do terminal administrativo de mercadorias. \n\nRESPONSABILIDADES\n- Fornecer transporte próprio para a ~mission(Location|Address).\n- Gerenciar quaisquer hostis encontrados no local; usar a força conforme necessário.\n- Proteger o contrabando e entregá-lo nos terminais de mercadorias na ~mission(Destination|Address)\n\nQUALIFICAÇÕES MÍNIMAS\n- 2 anos de experiência combinada em mercenários e/ou segurança. \n- Acesso a equipamento de combate e meio de transporte.\n- Disponível para mobilização imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n- Experiência com técnicas de redução rápida de hostilidade.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Kaboos_Intro_Description=ESPECIFICAÇÕES DA MISSÃO\n\nÁrea de Operações: Sistema Nyx\nForças Inimigas: Desconhecidas\nEspecificações de Equipamento: Nave de combate, Armas pessoais\nBreve: A InterSec foi contratada pela UEE para reunir informações sobre um grupo de <EM4>mercadores do mercado negro lidando com peças de Vanduul</EM4>, envolvidos nos experimentos ilegais de Vanduul no Complexo Onyx da ASD. A UEE está ansiosa para entender e acabar com suas operações.\n\nCom base nas evidências extraídas das instalações da ASD, conseguimos rastrear a localização de um dos seus depósitos.\n\nApós aceitar a missão, vá até a antiga <EM4>Estação QV Planet Services Logistics</EM4> e entraremos em contato.\n\nRespeitosamente,\n\nDeacon Tobin\nGerente de Operações\nInterSec Defense Solutions\n\nEsta comunicação contém informações confidenciais destinadas exclusivamente ao destinatário. Por favor, desconsidere se recebê-la por engano e notifique o remetente. Todas as operações são realizadas por conta e risco do contratante e devem seguir as leis da UEE e do sistema onde aplicáveis.\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Boss x2, CQC x30, Juggernauts x2, Snipers x4, Soldiers x19, Technicians x5\n<EM4>Unknown:</EM4> 57\n<EM4>Jr. Contractor:</EM4> +100 Rep
Kaboos_Intro_Title=CONTRABANDISTAS DE TECNOLOGIA VANDUUL <EM4>[100 Rep]</EM4>
Kaboos_Mission_Description=ESPECIFICAÇÕES DA MISSÃO\n\nÁrea de Operações: Sistema Nyx\nForças Inimigas: Fora-da-lei armados\nEspecificações de Equipamento: Nave de combate, Armas pessoais\nBreve: A InterSec precisa de seus serviços novamente.\n\nAs informações coletadas anteriormente foram valiosas para identificar vários compradores de peças de Vanduul obtidas ilegalmente. No entanto, desde então, o Shattered Blade continuou com suas operações e a UEE solicita que atualizemos nossas informações.\n\nAcreditamos que mais dados podem ser recuperados dos depósitos localizados na antiga <EM4>Estação QV Logistics</EM4>.\n\nOs parâmetros da operação não mudaram desde sua última missão: encontre os <EM4>dados codificados</EM4> e use a <EM4>chave de descriptografia</EM4> para decifrar e fazer o upload da lista para nós. O Shattered Blade reforçou a área desde a última vez, então espere resistência.\n\nBoa sorte. Entraremos em contato.\n\nRespeitosamente,\n\nDeacon Tobin\nGerente de Operações\nInterSec Defense Solutions\n\nEsta comunicação contém informações confidenciais destinadas exclusivamente ao destinatário. Por favor, desconsidere se recebê-la por engano e notifique o remetente. Todas as operações são realizadas por conta e risco do contratante e devem seguir as leis da UEE e do sistema onde aplicáveis.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Pulse "Blacklist" Pistol\n- Quartz "Black Op" Energy SMG\n- Quartz Energy SMG\n- [S1-A] Pulse Laser Pistol Battery (60 Cap)\n- [S1-A] Quartz Energy SMG Battery (45 cap)\n- [S1-A] Testudo Arms\n- [S1-A] Testudo Arms Clanguard\n- [S1-A] Testudo Core\n- [S1-A] Testudo Core Clanguard\n- [S1-A] Testudo Helmet\n- [S1-A] Testudo Helmet Clanguard\n- [S1-A] Testudo Legs\n- [S1-A] Testudo Legs Clanguard\n- [S2-A] Testudo Backpack\n- [E-S1-A] Attrition-1 Repeater\n- [E-S2-A] Attrition-2 Repeater\n- [E-S3-A] Attrition-3 Repeater\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Boss x1\n<EM4>Unknown:</EM4> 16\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Kaboos_Mission_Title=RECUPERE INFORMAÇÕES ADICIONAIS SOBRE CONTRABANDO <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Kill_Civ_Desc_001=Mate o traficante que ficou com mais do que sua parte nos lucros\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostiles x1, Targets x1
LingFamily_HaulCargo_AToB_Intro_desc=Oi, \n\nAqui é a Petra Ling, e estou orgulhosa de oferecer a você uma nova e empolgante oportunidade de se juntar à Ling Family Hauling. Quando meus pais começaram essa empresa, o objetivo era fornecer entregas rápidas e confiáveis ao redor da área maior de Crusader. Isso rapidamente se tornou um sucesso, e conforme nossa reputação crescia, nossas operações também aumentavam. \n\nAgora, sob a minha direção, a Ling Family Hauling está dando o próximo grande passo – o transporte de carga. A demanda por esse novo serviço está crescendo mais rápido do que eu esperava, e isso é uma ótima notícia para ambos. \n\nSe você sempre quis ser um transportador, eu posso realizar seu sonho. A melhor maneira de aprender algo é fazendo, e eu tenho uma carga de <EM4>~mission(Item)</EM4> que precisa ser levada de <EM4>~mission(Location|Address)</EM4> para <EM4>~mission(Destination|Address)</EM4>. \n\nNenhuma experiência anterior é necessária, mas aqui estão algumas coisas para ter em mente. Todas as coletas e entregas devem ser feitas em um elevador de carga ou com autoload. Você vai precisar de uma nave que consiga carregar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>, e um <EM4>Tractor Beam portátil</EM4> para movê-los. \n\nApós a conclusão bem-sucedida dessa entrega, você será promovido a "contratado confiável" e mais transportes estarão disponíveis para você. \n\n \nAtenciosamente, \nPetra Ling \nDiretora de Operações de Carga \nLing Family Hauling \n\n \n\n \n\n \n\nLing Family Hauling sabe que o universo é perigoso e imprevisível, e estabeleceu vários protocolos para proteger tanto você quanto a carga do cliente. Para garantir que você não seja penalizado por circunstâncias fora do seu controle, o pagamento total será proporcional à porcentagem de carga entregue com sucesso. Um temporizador de entrega será configurado para cada transporte. Qualquer carga que permanecer não entregue após a expiração será marcada como roubada e tratada dessa forma. Todas as coletas e entregas devem ser feitas com autoload ou em um elevador de carga.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-B] Guardian\n- [IND-S2-B] Citadel\n- [IND-S3-B] Barbican\n- [STH-S1-A] Spectre\n- [STH-S1-B] Zephyr\n- [STH-S2-A] Spicule\n- [STH-S2-B] Bolt\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Trainee:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
LingFamily_HaulCargo_AToB_Intro_title=OPORTUNIDADE DE TRANSPORTE DE CARGA COM LING HAULING <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
LingFamily_HaulCargo_AToB_desc_Fruit_Timed=Oi, \n\nNormalmente, a Reyes agenda nossos transportes, mas ela foi embora por hoje, e acabei de receber um comunicado sobre uma corrida simples e direta de <EM4>~mission(Location|Address)</EM4> até <EM4>~mission(Destination|Address)</EM4>. A carga é um carregamento de frutas que perderá seu valor se estragar. Não queremos irritar esse cliente, então seria ótimo se você conseguisse fazer isso o mais rápido possível. \n\nAqui estão mais alguns detalhes que você precisa saber. O maior contêiner usado é <EM4>~mission(MissionMaxSCUSize)</EM4>, então não se esqueça do seu <EM4>Tractor Beam portátil</EM4>. \n\n \nAtenciosamente, \nPetra Ling \nDiretora de Operações de Carga \nLing Family Hauling\n\n\n\n\n\n\n\nLing Family Hauling sabe que o universo é perigoso e imprevisível, e estabeleceu vários protocolos para proteger tanto você quanto a carga do cliente. Para garantir que você não seja penalizado por circunstâncias fora do seu controle, o pagamento total será proporcional à porcentagem de carga entregue com sucesso. Um temporizador de entrega será configurado para cada transporte. Qualquer carga que permanecer não entregue após a expiração será marcada como roubada e tratada dessa forma. Todas as coletas e entregas devem ser feitas com autoload ou em um elevador de carga.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-B] Guardian\n- [IND-S2-B] Citadel\n- [IND-S3-B] Barbican\n- [STH-S1-A] Spectre\n- [STH-S1-B] Zephyr\n- [STH-S2-A] Spicule\n- [STH-S2-B] Bolt\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Rookie:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
LingFamily_HaulCargo_AToB_desc_Party_Timed=Oi, \n\nParece que o pessoal em <EM4>~mission(Destination|Address)</EM4> está planejando uma festa e precisa de ajuda para adquirir tudo a tempo. Você vai precisar fazer várias coletas para essa, incluindo uma em Nyx para pegar um pouco de gin Jynx. Não sei se você já provou, mas é uma especialidade de Nyx. Algumas pessoas não conseguem passar que ele brilha rosa, mas eu adoro. Tem um toque único. \n\nAqui estão os locais de coleta: \n\nLOCATIONS DE COLETA (QUALQUER ORDEM) \n\n~mission(MultiToSingleToken) \n\nPor favor, não se esqueça de trazer um <EM4>Tractor Beam portátil</EM4>, já que você vai manusear contêineres de carga de até <EM4>~mission(MissionMaxSCUSize)</EM4>. \n\n \nBoa sorte no transporte, \nReyes Ling \nCoordenador de Logística de Carga \nLing Family Hauling\n\n\n\n\n\n\n\nLing Family Hauling sabe que o universo é perigoso e imprevisível, e estabeleceu vários protocolos para proteger tanto você quanto a carga do cliente. Para garantir que você não seja penalizado por circunstâncias fora do seu controle, o pagamento total será proporcional à porcentagem de carga entregue com sucesso. Um temporizador de entrega será configurado para cada transporte. Qualquer carga que permanecer não entregue após a expiração será marcada como roubada e tratada dessa forma. Todas as coletas e entregas devem ser feitas com autoload ou em um elevador de carga.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-B] Guardian\n- [IND-S2-B] Citadel\n- [IND-S3-B] Barbican\n- [STH-S1-A] Spectre\n- [STH-S1-B] Zephyr\n- [STH-S2-A] Spicule\n- [STH-S2-B] Bolt\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rookie:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
LingFamily_HaulCargo_AToB_title=LING FAMILY ~mission(ReputationRank) TRANSPORTE DE CARGA - ~mission(CargoGradeToken) ESCALA <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
LingFamily_HaulCargo_MultiToSingle_desc_CFPAmenities=Oi, \n\nAlguma chance de você topar fazer um transporte para Pyro? Sei que pode ser perigoso lá, mas é por uma boa causa. Um grupo de novos membros da CFP se mudou para <EM4>~mission(Destination|Address)</EM4> e teve dificuldades para se adaptar à vida no sistema. Eles deixaram várias coisas para trás em Stanton, porque o transporte deles não tinha espaço, então fomos contratados para pegar tudo e levar para eles. \n\nAqui estão as retiradas: \n\nLOCALIZAÇÕES DE RETIRADA (QUALQUER ORDEM) \n\n~mission(MultiToSingleToken) \n\nOs líderes da CFP esperam que levar essas coisas para eles ajude a fazer o sistema se sentir mais como casa. Vamos garantir que tudo corra bem. Lembre-se de equipar seu <EM4>feixe tractor portátil</EM4>, e uma nave que possa carregar <EM4>~mission(MissionMaxSCUSize) containers de carga</EM4>. \n\n\nBoa Sorte no Transporte, \nReyes Ling \nCoordenador de Logística de Carga \nLing Family Hauling\n\n\n\n\n\n\n\nA Ling Family Hauling sabe que o universo é perigoso e imprevisível, e estabeleceu vários protocolos para proteger tanto você quanto a carga de nossos clientes. Para garantir que você não seja punido por circunstâncias fora de seu controle, o pagamento total será calculado proporcionalmente à porcentagem de carga entregue com sucesso. Um temporizador de entrega será ajustado para cada transporte. Qualquer carga que permanecer não entregue após a expiração será marcada como roubada e tratada dessa forma. Todas as retiradas e entregas devem ser feitas de forma automática ou através de um elevador de carga.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-B] Guardian\n- [IND-S2-B] Citadel\n- [IND-S3-B] Barbican\n- [STH-S1-A] Spectre\n- [STH-S1-B] Zephyr\n- [STH-S2-A] Spicule\n- [STH-S2-B] Bolt\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Rookie:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
LingFamily_HaulCargo_MultiToSingle_desc_Party=Oi, \n\nParece que o pessoal em <EM4>~mission(Destination|Address)</EM4> está planejando uma festa e precisa de ajuda para adquirir tudo a tempo. Você vai precisar fazer várias retiradas para isso, incluindo uma em Nyx para pegar um pouco de gin Jynx. Não sei se já experimentou, mas é uma especialidade de Nyx. Alguns não conseguem lidar com o fato de que ele brilha rosa, mas eu adoro. Tem um gosto bem único. \n\nAqui estão as retiradas: \n\nLOCALIZAÇÕES DE RETIRADA (QUALQUER ORDEM) \n\n~mission(MultiToSingleToken) \n\nLembre-se de trazer um <EM4>feixe tractor portátil</EM4>, pois você vai manusear containers de carga de até <EM4>~mission(MissionMaxSCUSize)</EM4>. \n\n\nBoa Sorte no Transporte, \nReyes Ling \nCoordenador de Logística de Carga \nLing Family Hauling\n\n\n\n\n\n\n\nA Ling Family Hauling sabe que o universo é perigoso e imprevisível, e estabeleceu vários protocolos para proteger tanto você quanto a carga de nossos clientes. Para garantir que você não seja punido por circunstâncias fora de seu controle, o pagamento total será calculado proporcionalmente à porcentagem de carga entregue com sucesso. Um temporizador de entrega será ajustado para cada transporte. Qualquer carga que permanecer não entregue após a expiração será marcada como roubada e tratada dessa forma. Todas as retiradas e entregas devem ser feitas de forma automática ou através de um elevador de carga.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-B] Guardian\n- [IND-S2-B] Citadel\n- [IND-S3-B] Barbican\n- [STH-S1-A] Spectre\n- [STH-S1-B] Zephyr\n- [STH-S2-A] Spicule\n- [STH-S2-B] Bolt\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Trainee:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
LingFamily_HaulCargo_MultiToSingle_title=LING FAMILY ~mission(ReputationRank) TRANSPORTE DE CARGA - ~mission(CargoGradeToken) ESCALA <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
LingFamily_LocalDelivery_desc_01=Olá,\n\nEspero que você esteja disponível para fazer uma entrega. ~mission(Contractor|Family)\n\nPACOTE PARA COLETA\n· Pacote ~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n\nLOCAL DE ENTREGA\n· Pacote ~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n\nDeixe-me saber se você pode fazer isso.\n\nPor último, provavelmente seria uma boa ideia levar um <EM4>Tractor Beam portátil</EM4>. \n\nObrigado, \nConni Ling\nCoordenadora de Remessa\nTransportes Família Ling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250
LingFamily_LocalDelivery_desc_02=Olá,\n\nPrecisamos de alguém para fazer uma entrega. ~mission(Contractor|Family)\n\nPACOTES PARA COLETA (CADA PEDIDO)\n· Pacote ~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n· Pacote ~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n· Pacote ~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n· Pacote ~mission(item2|serialnumber) para ~mission(Dropoff2|Address)\n\nEspero que você esteja disponível.\n\nPor último, provavelmente seria uma boa ideia levar um <EM4>Tractor Beam portátil</EM4>. \n\nObrigado, \nConni Ling\nCoordenador de Remessa\nTransportes Família Ling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
LingFamily_LocalDelivery_desc_03=Ei, precisamos que você faça uma entrega para nós. ~mission(Contractor|Family). Aqui está um detalhamento:\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n· Pacote ~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n· Pacote ~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n· Pacote ~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n· Pacote ~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n· Pacote ~mission(item2|serialnumber) para ~mission(Dropoff2|Address)\n· Pacote ~mission(item3|serialnumber) para ~mission(Dropoff3|Address)\n\nPor último, provavelmente seria uma boa ideia levar um <EM4>Tractor Beam portátil</EM4>. \n\nObrigado, \nConni Ling\nCoordenador de Remessa\nTransportes Família Ling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
LingFamily_LocalDelivery_desc_04=Tenho um pedido de entrega que pode precisar de você.\n~mission(Contractor|Family)\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n· Pacote ~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n· Pacote ~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n· Pacote ~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n· Pacote ~mission(item4|serialnumber) de ~mission(Pickup4|Address)\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n· Pacote ~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n· Pacote ~mission(item2|serialnumber) para ~mission(Dropoff2|Address)\n     ·Pacote ~mission(item3|serialnumber) para ~mission(Dropoff3|Address)\n· Pacote ~mission(item4|serialnumber) para ~mission(Dropoff4|Address)\n\nPor último, provavelmente seria uma boa ideia levar um <EM4>Tractor Beam portátil</EM4>. \nObrigado,\nConni Ling\nEntrega coordenador \nTransportes Família Ling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
LingFamily_LocalDelivery_desc_05=Olá,\n\nEu sei que Conni geralmente cuida dessas coisas, mas ela não está aqui esta tarde. De qualquer forma, tenho uma entrega em tamanho descendente para você.\n\nEntão, se eu li a fatura corretamente, a entrega é - \n\nPACOTES PARA COLETA (CADA PEDIDO)\n· Pacote ~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n· Pacote ~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n· Pacote ~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n· Pacote ~mission(item4|serialnumber) de ~mission(Pickup4|Address)\n· Pacote ~mission(item5|serialnumber) de ~mission(Pickup5|Address)\n\nDROP DROP LOCATIONS (QUALQUER LINHA)\n· Pacote ~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n· Pacote ~mission(item2|serialnumber) para ~mission(Dropoff2|Address)\n· Pacote ~mission(item3|serialnumber) para ~mission(Dropoff3|Address)\n· Pacote ~mission(item4|serialnumber) para ~mission(Dropoff4|Address)\n· Pacote ~mission(item5|serialnumber) para ~mission(Dropoff5|Address)\n\nBoa sorte.\n\n-Davi Ling\nProprietário \nTransportes Família Ling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
LingFamily_LocalDelivery_desc_intro=Olá,\n\nSomos uma pequena empresa de entrega familiar que atualmente procura novos prestadores de serviços na área de Crusader. \n\nSe você estiver interessado em trabalhar conosco, a entrega a seguir seria um ótimo teste para ver se você se encaixa em nossa empresa.\n\nPACOTE PARA COLETA\n· Pacote ~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n\nLOCAIS DE ENTREGA\n· Pacote ~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n\nSe tudo correr bem, você se tornará o mais novo membro do Transportes Família Ling.\n\nPor último, provavelmente seria uma boa ideia levar um <EM4>Tractor Beam portátil</EM4>. \n\nObrigado, \nConni Ling\nCoordenador de Remessa\nTransportes Família Ling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +100
LingFamily_LocalDelivery_desc_rehire=Olá,\n\nNão estou feliz por ter que fazer isso, mas temos falta de fornecedores e mais entregas do que nunca. Estou disposto a lhe dar outra chance, mas você deve concluir a entrega a seguir. \n\nPACOTES PARA COLETA (CADA PEDIDO)\n· Pacote ~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n· Pacote ~mission(item2|serialnumber) de ~mission(Pickup2|Address) \n· Pacote ~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n· Pacote ~mission(item1|serialnumber) para ~mission(Dropoff1|Address) \n· Pacote ~mission(item2|serialnumber) para ~mission(Dropoff2|Address)\n· Pacote ~mission(item3|serialnumber) para ~mission(Dropoff3|Address)\n\nPor último, provavelmente seria uma boa ideia levar um <EM4>Tractor Beam portátil</EM4>. \n\nObrigado, \nConni Ling\nEnvio coordenador \nTransportes Família Ling\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
LingFamily_LocalDelivery_title_01=ROTA LOCAL DA FAMÍLIA LING <EM4>[250–500 Rep]</EM4>
LingFamily_LocalDelivery_title_intro=A FAMÍLIA LING PROCURA POR NOVOS CONTRATADOS <EM4>[100 Rep]</EM4>
LingFamily_LocalDelivery_title_rehire=REAVALIAÇÃO DO CONTRATANTE LING <EM4>[500 Rep]</EM4>
LingFamily_RecoverCargo_Easy_Description=Olá,\n\nProcurando um trabalho rápido? Temos um cliente esperando uma remessa, mas nosso transportador teve problemas no motor. Não estamos conseguindo fazer a nave funcionar novamente, então precisamos de alguém para assumir.\n\nVoe até <EM4>~mission(Location|Address)</EM4> e você verá a nave deles. Não tem erro — é a que está parada no meio do espaço. Certifique-se de levar um <EM4>tractor beam pesado</EM4> junto com uma nave decente capaz de transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>.\n\nDepois de recolher a mercadoria, leve tudo até o elevador de carga em <EM4>~mission(Destination|Address)</EM4>.\n\nObrigado,\nReyes Ling\nCoordenador de Logística de Carga\nLing Family Hauling\n\n\n\n\n\n\n\nA Ling Family Hauling sabe que o universo é perigoso e imprevisível e estabeleceu vários protocolos para proteger tanto você quanto a carga do nosso cliente. Para garantir que você não seja penalizado por circunstâncias fora do seu controle, o pagamento total será proporcional à porcentagem da carga entregue com sucesso. Um temporizador de entrega será definido para cada transporte. Qualquer carga que permanecer sem entrega após o tempo expirar será marcada como roubada e tratada como tal. Todas as coletas e entregas devem ser autocarregadas ou realizadas em um elevador de carga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Rookie:</EM4> +100 Rep
LingFamily_RecoverCargo_Easy_Title=RECUPERAÇÃO DE REMESSA LING <EM4>[100 Rep]</EM4>
LingFamily_RecoverCargo_Hard_Description=Olá,\n\nTemos más notícias. Infelizmente nosso transportador teve problemas e precisou abandonar a carga que deveria entregar. Não recebemos mais nenhuma resposta dele, então estamos assumindo o pior.\n\nEstamos no processo de entrar em contato com a família dele e sabemos que este é um momento muito delicado, mas também não podemos deixar um trabalho inacabado. Nossos rastreadores mostram que a carga ainda está intacta em <EM4>~mission(Location|Address)</EM4>.\n\nSe você puder concluir a entrega ficaríamos muito gratos. Não estamos detectando naves próximas, então deve ser seguro coletar a carga. Traga um <EM4>tractor beam pesado</EM4> e uma nave capaz de transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>.\n\nEntregue a carga no elevador de carga em <EM4>~mission(Destination|Address)</EM4> e nós cuidaremos do restante.\n\nObrigado,\nReyes Ling\nCoordenador de Logística de Carga\nLing Family Hauling\n\n\n\n\n\n\n\nA Ling Family Hauling sabe que o universo é perigoso e imprevisível e estabeleceu vários protocolos para proteger tanto você quanto a carga do nosso cliente. Para garantir que você não seja penalizado por circunstâncias fora do seu controle, o pagamento total será proporcional à porcentagem da carga entregue com sucesso. Um temporizador de entrega será definido para cada transporte. Qualquer carga que permanecer sem entrega após o tempo expirar será marcada como roubada e tratada como tal. Todas as coletas e entregas devem ser autocarregadas ou realizadas em um elevador de carga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Member:</EM4> +200 Rep
LingFamily_RecoverCargo_Hard_Title=CONCLUIR REMESSA LING ABANDONADA <EM4>[200 Rep]</EM4>
LingFamily_RecoverCargo_Medium_Description=Oi,\n\nTemos um trabalho relativamente simples para você, se tiver interesse.\n\nUm dos nossos pilotos ignorou um aviso de manutenção e, como era de se esperar, algumas horas depois a nave dele quebrou em <EM4>~mission(Location|Address)</EM4>. Ele já está voltando para o escritório, mas precisamos de um transportador confiável com uma nave grande o suficiente para transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e finalizar o transporte para nós.\n\nAcha que consegue nos ajudar? Você só precisa recolher a remessa abandonada e entregá-la no elevador de carga em <EM4>~mission(Destination|Address)</EM4>. E provavelmente nem preciso dizer, mas um <EM4>tractor beam pesado</EM4> vai ser bem útil.\n\nObrigado,\nReyes Ling\nCoordenador de Logística de Carga\nLing Family Hauling\n\n\n\n\n\n\n\nA Ling Family Hauling sabe que o universo é perigoso e imprevisível e estabeleceu vários protocolos para proteger tanto você quanto a carga do nosso cliente. Para garantir que você não seja penalizado por circunstâncias fora do seu controle, o pagamento total será proporcional à porcentagem da carga entregue com sucesso. Um temporizador de entrega será definido para cada transporte. Qualquer carga que permanecer sem entrega após o tempo expirar será marcada como roubada e tratada como tal. Todas as coletas e entregas devem ser autocarregadas ou realizadas em um elevador de carga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Junior:</EM4> +150 Rep
LingFamily_RecoverCargo_Medium_Title=RESGATAR ENTREGA LING INCOMPLETA <EM4>[150 Rep]</EM4>
LingFamily_RecoverCargo_Super_Description=Ei,\n\nLogo agora que conseguimos um dos maiores contratos da nossa vida, o motor do nosso transportador trava. Eles tentaram consertar, mas parece que simplesmente não vai acontecer.\n\nVocê pode voar até <EM4>~mission(Location|Address)</EM4> e pegar a carga para nós? É muito importante mostrarmos ao cliente que somos tão confiáveis quanto os grandes nomes do setor.\n\nSó para avisar, essa é uma remessa grande. Você vai precisar de uma nave capaz de transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e de um <EM4>tractor beam pesado</EM4> para mover tudo. Depois de transferir para sua nave, entregue a carga no elevador de carga em <EM4>~mission(Destination|Address)</EM4> e enviaremos a confirmação ao cliente.\n\nConsiderando as circunstâncias, estamos pagando acima da média do mercado para quem concluir isso.\n\nObrigado,\nReyes Ling\nCoordenador de Logística de Carga\nLing Family Hauling\n\n\n\n\n\n\n\nA Ling Family Hauling sabe que o universo é perigoso e imprevisível e estabeleceu vários protocolos para proteger tanto você quanto a carga do nosso cliente. Para garantir que você não seja penalizado por circunstâncias fora do seu controle, o pagamento total será proporcional à porcentagem da carga entregue com sucesso. Um temporizador de entrega será definido para cada transporte. Qualquer carga que permanecer sem entrega após o tempo expirar será marcada como roubada e tratada como tal. Todas as coletas e entregas devem ser autocarregadas ou realizadas em um elevador de carga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Unknown:</EM4> 1\n<EM4>Senior:</EM4> +300 Rep
LingFamily_RecoverCargo_Super_Title=REMESSA LING PRESA AGUARDANDO ENTREGA <EM4>[300 Rep]</EM4>
LingFamily_RecoverCargo_VeryEasy_Description=Ei,\n\nSeguinte: um dos nossos transportadores teve problemas em <EM4>~mission(Location|Address)</EM4> e precisou abandonar a nave. Você poderia ir até lá e nos ajudar a finalizar a entrega?\n\nNão é um trabalho grande, mas você ainda vai precisar de um <EM4>tractor beam pesado</EM4> e de uma nave com espaço suficiente para armazenar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>.\n\nDeixe a carga no elevador de carga em <EM4>~mission(Destination|Address)</EM4> e enviaremos seus créditos.\n\nObrigado,\nReyes Ling\nCoordenador de Logística de Carga\nLing Family Hauling\n\n\n\n\n\n\n\nA Ling Family Hauling sabe que o universo é perigoso e imprevisível e estabeleceu vários protocolos para proteger tanto você quanto a carga do nosso cliente. Para garantir que você não seja penalizado por circunstâncias fora do seu controle, o pagamento total será proporcional à porcentagem da carga entregue com sucesso. Um temporizador de entrega será definido para cada transporte. Qualquer carga que permanecer sem entrega após o tempo expirar será marcada como roubada e tratada como tal. Todas as coletas e entregas devem ser autocarregadas ou realizadas em um elevador de carga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Trainee:</EM4> +50 Rep
LingFamily_RecoverCargo_VeryEasy_Title=FINALIZAR ENTREGA LING INTERROMPIDA <EM4>[50 Rep]</EM4>
LingFamily_RecoverCargo_VeryHard_Description=Ei,\n\nPrecisamos de um contratado confiável para nos ajudar com uma situação.\n\nUm dos nossos transportadores abandonou o contrato no meio do serviço e agora a carga do cliente está presa em trânsito. Achamos que ele estava tentando negociar uma taxa melhor conosco, mas não é assim que a Ling faz negócios. De qualquer forma, ele já era e precisamos desesperadamente concluir essa remessa.\n\nPetra e eu trabalhamos com esse cliente há anos e construímos uma boa relação. Seria uma pena perder tudo por causa de um transportador pouco confiável. Você pode ir até <EM4>~mission(Location|Address)</EM4> e coletar a carga? Vai precisar de um <EM4>tractor beam pesado</EM4> e de uma nave capaz de transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>.\n\nLeve a remessa até o elevador de carga em <EM4>~mission(Destination|Address)</EM4> e faremos seu pagamento imediatamente. Agradeceríamos muito sua ajuda com isso, e tenho certeza de que nosso cliente também.\n\nObrigado,\nReyes Ling\nCoordenador de Logística de Carga\nLing Family Hauling\n\n\n\n\n\n\n\nA Ling Family Hauling sabe que o universo é perigoso e imprevisível e estabeleceu vários protocolos para proteger tanto você quanto a carga do nosso cliente. Para garantir que você não seja penalizado por circunstâncias fora do seu controle, o pagamento total será proporcional à porcentagem da carga entregue com sucesso. Um temporizador de entrega será definido para cada transporte. Qualquer carga que permanecer sem entrega após o tempo expirar será marcada como roubada e tratada como tal. Todas as coletas e entregas devem ser autocarregadas ou realizadas em um elevador de carga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Experienced:</EM4> +200 Rep
LingFamily_RecoverCargo_VeryHard_Title=ENTREGA DE CARGA LING ABANDONADA <EM4>[200 Rep]</EM4>
LingFamily_UGF_collect_desc_001=Ei,\n\nPrecisamos que você faça uma entrega para nós em <EM4>~mission(Location|Address)</EM4> e depois a leve para <EM4>~mission(Destination|Address)</EM4>.\n\nEu ia mandar meu irmão Ricki para cuidar disso, mas ele disse que a área é muito perigosa. Acho que houve vários avisos de segurança por lá, mas, desde que você seja cuidadoso e traga algumas armas ou algo assim, tenho certeza de que ficará bem. Provavelmente você nem vai se deparar com nada. \n\nObrigado, \nConni Ling\nCoordenador de embarque\nTransportes Família Ling\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Unknown:</EM4> 4
LingFamily_UGF_collect_title_001=PACOTE PARA LING <EM4>[500 Rep]</EM4>
