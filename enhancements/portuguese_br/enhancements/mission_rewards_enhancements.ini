Covalex_RecoverCargo_Easy_Description=Oi,\n\nTenho um cliente que passou a manhã inteira me mandando mensagens sobre uma remessa que deveria ter recebido e, quando fui verificar a carga, descobri que ela está completamente parada no meio do espaço.\n\nIsso obviamente é um problema por vários motivos, e não só porque passei 20 minutos levando bronca por causa disso. Você pode ir até <EM4>~mission(Location|Address)</EM4> e ver o que aconteceu? O contrato original exigia uma nave capaz de transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>, então certifique-se de ter uma assim, além de um <EM4>Tractor Beam pesado</EM4>.\n\nDepois que pegar a carga, pode garantir que ela seja entregue no elevador de carga em <EM4>~mission(Destination|Address)</EM4>? Valeu mesmo.\n\n~mission(Contractor|SignOff)\n\nElla Tieno \nCoordenadora de Logística Jr. \nCovalex Shipping   \n'Tudo o que você precisa, onde você precisar.' \n\n\n\n\n\n\n\nCovalex Shipping é uma corporação de responsabilidade limitada. Para incentivar entregas dentro do prazo e evitar fraudes em transportes de carga, a Covalex Shipping estabelecerá um limite de tempo para entrega e, após o vencimento desse prazo, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será proporcional à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Rookie:</EM4> +100 Rep
Covalex_RecoverCargo_Easy_Title=PEQUENA REMESSA COVALEX PRECISA SER RECUPERADA <EM4>[100 Rep]</EM4>
Covalex_RecoverCargo_Hard_Description=Oi, é a El.\n\nPreciso de um cargueiro para um trabalho o quanto antes. Um dos nossos contratados teve uma "emergência pessoal" e teve que abandonar a nave - e parece que não vai voltar. Situação nada ideal.\n\nA boa notícia é que a carga ainda está intacta, pelo menos segundo o rastreador. Seria uma grande ajuda se você pudesse terminar o trabalho pegando a carga em <EM4>~mission(Location|Address)</EM4> e levando até o elevador de carga em <EM4>~mission(Destination|Address)</EM4>.\n\nParece que é uma remessa grande, então você vai precisar de uma nave capaz de transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e um <EM4>Tractor Beam pesado</EM4> para mover tudo. Agradeço muito a ajuda.\n\n~mission(Contractor|SignOff)\n\nElla Tieno \nCoordenadora de Logística Jr. \nCovalex Shipping   \n'Tudo o que você precisa, onde você precisar.' \n\n\n\n\n\n\n\nCovalex Shipping é uma corporação de responsabilidade limitada. Para incentivar entregas dentro do prazo e evitar fraudes em transportes de carga, a Covalex Shipping estabelecerá um limite de tempo para entrega e, após o vencimento desse prazo, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será proporcional à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Member:</EM4> +200 Rep
Covalex_RecoverCargo_Hard_Title=GRANDE REMESSA COVALEX PRECISA SER RECUPERADA <EM4>[200 Rep]</EM4>
Covalex_RecoverCargo_Medium_Description=Ei, El falando,\n\nTenho um caso estranho para você. Estava verificando as estatísticas de entrega da última semana e notei algumas inconsistências. Parece que temos algumas entregas marcadas como concluídas, mas os rastreadores de carga ainda aparecem como ativos.\n\nUma delas está localizada em <EM4>~mission(Location|Address)</EM4>, então queria saber se você pode voar até lá e descobrir o que aconteceu. O pedido indica que o cargueiro usava uma nave capaz de transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>, então certifique-se de ter algo equivalente. Um <EM4>Tractor Beam pesado</EM4> também é obrigatório.\n\nEssa carga precisava ter sido entregue ontem, então assim que pegá-la leve até um elevador de carga em <EM4>~mission(Destination|Address)</EM4> e eu organizo seu pagamento.\n\n~mission(Contractor|SignOff)\n\nElla Tieno \nCoordenadora de Logística Jr. \nCovalex Shipping   \n'Tudo o que você precisa, onde você precisar.' \n\n\n\n\n\n\n\nCovalex Shipping é uma corporação de responsabilidade limitada. Para incentivar entregas dentro do prazo e evitar fraudes em transportes de carga, a Covalex Shipping estabelecerá um limite de tempo para entrega e, após o vencimento desse prazo, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será proporcional à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Junior:</EM4> +150 Rep
Covalex_RecoverCargo_Medium_Title=REMESSA COVALEX MÉDIA PRECISA SER RECUPERADA <EM4>[150 Rep]</EM4>
Covalex_RecoverCargo_Super_Description=Ei,\n\nPara essa missão estou procurando apenas os melhores dos melhores contratados. Um dos nossos clientes mais importantes está esperando uma remessa extremamente importante que agora está seriamente atrasada.\n\nAqui na Covalex nos orgulhamos de tratar todos os clientes igualmente, oferecendo um nível de serviço excepcional independentemente do que estamos entregando. Dito isso, se perdermos esse contrato alguém vai se meter em sérios problemas - e eu realmente não posso deixar que essa pessoa seja eu.\n\nO rastreador indica que a nave do último contratado está em <EM4>~mission(Location|Address)</EM4>. Não arrisque nessa missão: você vai precisar de uma nave capaz de transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e um <EM4>Tractor Beam pesado</EM4> para coletar tudo.\n\nEntregue a remessa no elevador de carga em <EM4>~mission(Destination|Address)</EM4> e poderemos deixar toda essa confusão para trás. E você ainda vai ganhar uma boa quantidade de créditos no processo. Nada mal, né?\n\n~mission(Contractor|SignOff)\n\nElla Tieno \nCoordenadora de Logística Jr. \nCovalex Shipping   \n'Tudo o que você precisa, onde você precisar.' \n\n\n\n\n\n\n\nCovalex Shipping é uma corporação de responsabilidade limitada. Para incentivar entregas dentro do prazo e evitar fraudes em transportes de carga, a Covalex Shipping estabelecerá um limite de tempo para entrega e, após o vencimento desse prazo, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será proporcional à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Senior:</EM4> +300 Rep
Covalex_RecoverCargo_Super_Title=RECUPERAR REMESSA VIP COVALEX <EM4>[300 Rep]</EM4>
Covalex_RecoverCargo_VeryEasy_Description=Oi,\n\nEntão, tive um contratado que deveria entregar algumas coisas para nós, mas ele simplesmente sumiu do radar. Eu enviei um ping para a nave dele e não faço ideia do que aconteceu, mas ela está à deriva em algum lugar perto de <EM4>~mission(Location|Address)</EM4>. Se você puder ir até lá, recuperar a carga e levá-la ao elevador de carga em <EM4>~mission(Destination|Address)</EM4>, vai me fazer um grande favor.\n\nNão esqueça de levar um <EM4>Tractor Beam pesado</EM4> para mover toda a carga. Ah, e uma nave que consiga transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>.\n\n~mission(Contractor|SignOff)\n\nElla Tieno \nCoordenadora de Logística Jr. \nCovalex Shipping   \n'Tudo o que você precisa, onde você precisar.' \n\n\n\n\n\n\n\nCovalex Shipping é uma corporação de responsabilidade limitada. Para incentivar entregas dentro do prazo e evitar fraudes em transportes de carga, a Covalex Shipping estabelecerá um limite de tempo para entrega e, após o vencimento desse prazo, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será proporcional à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Rookie:</EM4> +50 Rep\n<EM4>Trainee:</EM4> +50 Rep
Covalex_RecoverCargo_VeryEasy_Title=REMESSA EXTRA PEQUENA DA COVALEX PRECISA SER RECUPERADA <EM4>[50 Rep]</EM4>
Covalex_RecoverCargo_VeryHard_Description=Oi,\n\nSeguinte: depois de passar uma hora no comunicador com o cargueiro tentando ajudar a diagnosticar o que estava errado com a nave dele, decidimos que agora precisamos mandar alguém até <EM4>~mission(Location|Address)</EM4> para concluir a entrega.\n\nEssa é grande. Você vai precisar de uma nave capaz de armazenar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e, a menos que você seja super forte, também de um <EM4>Tractor Beam pesado</EM4> para mover tudo.\n\nEu realmente agradeceria se pudéssemos simplesmente finalizar esse trabalho. Leve a carga até o elevador de carga em <EM4>~mission(Destination|Address)</EM4> e deixamos toda essa situação para trás.\n\n~mission(Contractor|SignOff)\n\nElla Tieno \nCoordenadora de Logística Jr. \nCovalex Shipping   \n'Tudo o que você precisa, onde você precisar.' \n\n\n\n\n\n\n\nCovalex Shipping é uma corporação de responsabilidade limitada. Para incentivar entregas dentro do prazo e evitar fraudes em transportes de carga, a Covalex Shipping estabelecerá um limite de tempo para entrega e, após o vencimento desse prazo, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será proporcional à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 1\n<EM4>Experienced:</EM4> +200 Rep
