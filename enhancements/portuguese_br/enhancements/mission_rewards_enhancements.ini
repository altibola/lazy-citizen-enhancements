Foxwell_DefendLocation_E_Desc_001=Naves indo e vindo de <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> estão sendo atacadas por forças hostis. O pessoal de lá nos contratou pra resolver isso imediatamente.\n\nPreciso de alguém que chegue lá o quanto antes e comece a derrubar essas naves. A situação está mudando rápido, então vou te manter atualizado sobre onde você é mais necessário.\n\nPelo esforço e agilidade, vamos pagar um bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4> ao contratado principal por lidar com isso.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n‘Segurança do seu jeito’\n\nA Foxwell Enforcement é uma empresa de segurança licenciada para operar em todo o espaço da UEE. Estamos sempre em busca de novos operadores para integrar nosso time. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- [S1-A] Antium Arms Storm\n- [S1-A] Antium Core Storm\n- [S1-A] Antium Helmet Storm\n- [S1-A] Antium Legs Storm\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4, Hostiles x2, Reinforcements x8\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
