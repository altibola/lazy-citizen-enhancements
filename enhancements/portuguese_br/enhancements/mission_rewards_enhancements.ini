Shubin_Industrial_ShipMining_Stanton_VE_Local_Desc_001=PUBLICAÇÃO: Ordem de Compra\nLOCALIZAÇÃO: <EM4>~mission(System) </EM4>\n\nTESTE DE PRÉVIA TECNOLÓGICA:\nComplete esta missão para obter projetos de um conjunto de armadura pesada Antium. Para este teste, esses projetos possuem alguns slots que aceitam diferentes materiais para ajustes variados de atributos.\n\n\n~mission(Hint_Location) Para uma lista completa de onde encontrar esses minerais, consulte <EM4>Fundamentos da Mineração #2: Onde Minerar</EM4> no seu Journal do mobiGlas. Já que estará lá, sinta-se à vontade para ler também a primeira parte <EM4>Fundamentos da Mineração #1: Visão Geral Básica</EM4> se quiser relembrar como obter os materiais.\n\nComo esta é uma ordem de compra e não um contrato de mineração, espera-se que você forneça seu próprio equipamento, como um <EM4>~mission(Hint_Tool)</EM4>.\n\nObserve que, para agilizar o uso futuro desses materiais, <EM4>eles devem ser refinados antes da entrega</EM4>. Isso pode ser feito em qualquer refinaria, cujas localizações podem ser encontradas no seu Starmap.\n\nQuando estiver pronto para nos vender os materiais refinados necessários, deposite-os no elevador de carga localizado em <EM4>~mission(Destination|Address)</EM4>.\n\n*Ao aceitar este contrato, você assume todos e quaisquer riscos associados ao trabalho descrito aqui e, de forma alguma, a Shubin Interstellar poderá ser responsabilizada por quaisquer danos ocorridos durante a vigência do contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Shubin_RG_ShipMining_Rank0]</EM4>\n- Arclight "Nightstalker" Pistol\n- Arclight "Warhawk" Pistol\n- [S1-A] Arclight Pistol Battery (30 cap)\n- [S1-A] Aril Arms\n- [S1-A] Aril Core\n- [S1-A] Aril Helmet\n- [S1-A] Aril Legs\n\n<EM4>[Shubin_RG_ShipMining_Rank0, Rank 0–1]</EM4>\n- [IND-S0-C] Surveyor-Go\n- [IND-S1-C] Surveyor-Lite\n- [IND-S2-C] Surveyor\n- [IND-S3-C] Surveyor-Max\n- [MIN-S0-A] Arbor MHV Mining Laser\n- [MIN-S0-B] Helix\n- [MIN-S0-B] Hofstede\n- [MIN-S0-C] Lawson Mining Laser\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
