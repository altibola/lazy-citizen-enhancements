DeadSaints_HaulCargo_MultiToSingle_desc_Drugs_Danger=Um dos nossos melhores distribuidores foi pego em Stanton, então precisamos de um substituto. O cara era um vendedor incrível, mas um contrabandista de merda. Precisamos de alguém que não vá bater de frente com uma patrulha de segurança ou com um bando de piratas para pegar umas mercadorias nestes locais:\n\nLOCAIS DE COLETA (QUALQUER ORDEM)\n\n~mission(MultiToSingleToken)\n\nE leve tudo para <EM4>~mission(Destination|Address)</EM4> antes que a segurança saque o que está rolando. Você vai precisar de espaço suficiente na sua nave para containers de tamanho <EM4>~mission(MissionMaxSCUSize)</EM4>, e um <EM4>Tractor Beam portátil</EM4> deve facilitar o carregamento e descarregamento. \n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x6\n<EM4>Rookie:</EM4> +100 Rep
DeadSaints_HaulCargo_MultiToSingle_title=DEAD SAINTS - RANQUE ~mission(ReputationRank) - TRANSPORTE DE CARGA ~mission(CargoGradeToken) <EM4>[100 Rep]</EM4>
DeadSaints_HaulCargo_SingleToMulti_desc_Altruciatoxin_Danger_Timed=Estamos procurando alguém discreto para transportar um novo lote de altruciatoxina para vários compradores. É, é ilegal, mas só se te pegarem. \n\nA carga está em <EM4>~mission(Location|Address)</EM4>. Você vai precisar levá-la para estes pontos de entrega:\n\nPONTOS DE ENTREGA (QUALQUER ORDEM)\n\n~mission(SingleToMultiToken)\n\nGaranta que sua nave consiga levar containers de tamanho <EM4>~mission(MissionMaxSCUSize)</EM4>, e não esqueça de levar um <EM4>Tractor Beam portátil</EM4>. Não sei como você pretende mover as caixas sem isso.\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x12\n<EM4>Rookie:</EM4> +100 Rep
DeadSaints_HaulCargo_SingleToMulti_desc_Drugs_Danger_Timed=Temos uma carga de contrabando que precisa ser levada para alguns lugares diferentes. Se gosta de ganhar uns créditos, vá até <EM4>~mission(Location|Address)</EM4>, carregue tudo e leve para estes pontos de entrega:\n\nPONTOS DE ENTREGA (QUALQUER ORDEM)\n\n~mission(SingleToMultiToken)\n\nVocê vai precisar de um <EM4>Tractor Beam portátil</EM4> para mover as caixas e espaço suficiente no compartimento de carga para containers de tamanho <EM4>~mission(MissionMaxSCUSize)</EM4>. \n\nEvite outras naves se puder. A segurança vai te prender se descobrir o que está transportando, e os saqueadores vão simplesmente levar tudo pra eles. \n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x6\n<EM4>Rookie:</EM4> +100 Rep
DeadSaints_HaulCargo_SingleToMulti_desc_Stormwal_Danger_Timed=Se você tem uma nave rápida, consegue transportar discretamente containers de tamanho <EM4>~mission(MissionMaxSCUSize)</EM4> e curte receber um pagamento alto, precisamos que vá para <EM4>~mission(Location|Address)</EM4> imediatamente e leve o que encontrar lá para estes pontos de entrega:\n\nPONTOS DE ENTREGA (QUALQUER ORDEM)\n\n~mission(SingleToMultiToken)\n\nOs compradores estão pagando caro para colocar as mãos em carne fresca de stormwal. Fique esperto. Se a segurança te pegar com isso, é sua cabeça que vai rodar. Se for esperto, use um <EM4>Tractor Beam portátil</EM4> pra carregar tudo rapidinho.\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x6\n<EM4>Rookie:</EM4> +100 Rep
DeadSaints_HaulCargo_SingleToMulti_title=DEAD SAINTS - RANQUE ~mission(ReputationRank) - TRANSPORTE DE CARGA ~mission(CargoGradeToken) <EM4>[100 Rep]</EM4>
DeadSaints_RecoverCargo_Easy_Description=Sabe quando você pergunta algo pra alguém e sente que a pessoa tá mentindo, mas mesmo assim dá um voto de confiança? É isso que tô lidando agora.\n\nDois “especialistas” em transporte que eu contratei pra levar umas mercadorias se meteram em confusão e largaram minha carga em <EM4>~mission(Location|Address)</EM4>. Já mandei caçar os dois, mas o que preciso de você é que recupere a carga. O rastreador mostra que ela ainda tá na nave, então só vai precisar de um <EM4>Tractor Beam pesado</EM4> e da sua própria nave pra fazer a recuperação.\n\nPode ter uns catadores por lá, mas duvido que te deem trabalho.\n\nDepois que pegar tudo, leva pra <EM4>~mission(Destination|Address)</EM4> que eu te pago direitinho.\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Unknown:</EM4> 1\n<EM4>Jr. Contractor:</EM4> +100 Rep
DeadSaints_RecoverCargo_Easy_Title=LIMPANDO A BAGUNÇA DOS OUTROS <EM4>[100 Rep]</EM4>
DeadSaints_RecoverCargo_Hard_Description=Um grupo de novatos atacou minha equipe de transporte durante uma entrega. O rastreador indica que a nave ainda tá em <EM4>~mission(Location|Address)</EM4>, então preciso que vá até lá e recupere a carga. Vai precisar de um <EM4>Tractor Beam pesado</EM4> pra puxar as mercadorias da nave.\n\nAposto que quem atacou ainda tá lá esperando. Vá armado, leve sua equipe e, se der, manda um recado da minha parte.\n\nDepois de recuperar tudo, deixa a carga no elevador de carga em <EM4>~mission(Destination|Address)</EM4>.\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Unknown:</EM4> 1\n<EM4>Sr. Contractor:</EM4> +200 Rep
DeadSaints_RecoverCargo_Hard_Title=RECUPERANDO O QUE É NOSSO <EM4>[200 Rep]</EM4>
DeadSaints_RecoverCargo_Medium_Description=Você tem uma nave e um <EM4>Tractor Beam pesado</EM4>? Ótimo. Tenho um serviço pra você.\n\nNão faço ideia de como souberam que estávamos chegando, mas um dos meus cargueiros foi emboscado em <EM4>~mission(Location|Address)</EM4>. O piloto parou de responder, então presumo que já tenha virado fantasma, mas o rastreador da carga ainda está parado por enquanto.\n\nEspere que os desgraçados que derrubaram meu piloto ainda estejam por lá, então traga reforço. Pegue a carga e saia daí — não vale a pena arriscar mais cargueiros bons nessa confusão.\n\nLeve a mercadoria até o elevador de carga em <EM4>~mission(Destination|Address)</EM4> e eu envio seu pagamento.\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Unknown:</EM4> 1\n<EM4>Contractor:</EM4> +150 Rep
DeadSaints_RecoverCargo_Medium_Title=OPERAÇÃO DE RECUPERAÇÃO <EM4>[150 Rep]</EM4>
DeadSaints_RecoverCargo_Super_Description=Uma equipe rival conseguiu acesso às nossas rotas de entrega e agora prenderam uma das minhas naves em <EM4>~mission(Location|Address)</EM4>.\n\nA nave tá lá, guardada por um bando completo desses otários. Devem estar esperando alguém aparecer com uma nave de transporte — mas você vai chegar primeiro.\n\nVai até lá com sua equipe e um <EM4>Tractor Beam pesado</EM4> pra pegar as mercadorias. Leve os melhores com você. Seria burrice subestimar esses caras.\n\nApaga todos eles, leva a carga pro elevador de carga em <EM4>~mission(Destination|Address)</EM4> e eu te pago muito bem por isso.\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Unknown:</EM4> 1\n<EM4>Head Contractor:</EM4> +300 Rep
DeadSaints_RecoverCargo_Super_Title=PERDIDO, MAS NÃO ESQUECIDO <EM4>[300 Rep]</EM4>
DeadSaints_RecoverCargo_VeryEasy_Description=Um dos meus transportadores teve problema em <EM4>~mission(Location|Address)</EM4> e teve que abandonar a nave. Preciso que vá lá com um <EM4>Tractor Beam pesado</EM4> pra recuperar a carga e concluir o trabalho.\n\nEles estavam levando um bom lote de equipamentos pra mim, e a última coisa que quero é algum “herói” achar e rastrear de volta até a gente.\n\nSe encontrar alguém, sem conversa — atira e pega a carga. Entendido?\n\nLeva pro elevador de carga em <EM4>~mission(Destination|Address)</EM4> e eu te dou sua parte na venda.\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2\n<EM4>Unknown:</EM4> 1\n<EM4>Neutral:</EM4> +50 Rep
DeadSaints_RecoverCargo_VeryEasy_Title=TERMINANDO O SERVIÇO <EM4>[50–200 Rep]</EM4>
DeadSaints_RecoverCargo_VeryHard_Description=Temos um problema. Uma gangue desconhecida tá tentando se mostrar atacando nossos transportes. Acham que podem posar de durões saqueando nossos pilotos. Amadores.\n\nO problema é que deram sorte no último ataque. Nosso piloto quase morreu, mas a nave ainda tá cheia de carga em <EM4>~mission(Location|Address)</EM4>.\n\nMonta uma equipe de confiança, pega seu <EM4>Tractor Beam pesado</EM4> e vai pra lá.\n\nDepois leva tudo pro elevador de carga em <EM4>~mission(Destination|Address)</EM4>. Faz isso pra mim e te dou uma bela parte da venda.\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Unknown:</EM4> 1\n<EM4>Veteran Contractor:</EM4> +200 Rep
DynamicEvent_FleetWeek2022_Description=*PARA DIVULGAÇÃO IMEDIATA EM TODO O SISTEMA*\n\nAtenção, as forças do Nine Tails assumiram o controle de várias plataformas comerciais perto de Orison. Usando um IFFI (Identity Friend or Foe Inverter, inversor de identidade de amigo ou inimigo), eles assumiram o controle do espaço aéreo restrito em torno das plataformas e somente as naves afiliadas à Nine Tails podem ter acesso à área. Isso prejudicou muito as tentativas iniciais da Crusader Security de retomar as plataformas. Por isso, a Crusader solicitou que as forças da CDF ajudassem a desligar o inversor e a eliminar toda a presença hostil. Todos os voluntários da CDF disponíveis são incentivados a prestar apoio.\n\nInformações adicionais:\n* Enquanto o inversor está ativo e o espaço aéreo inacessível, a CDF conseguiu obter o controle de um sistema de transporte local e direcioná-lo para acessar a Plataforma Solanki sem o conhecimento da Nine Tails. Os voluntários precisarão ir até o Showroom das Indústrias Crusader na Plataforma Comercial e chegar ao telhado para encontrar a nave que viajará para as plataformas ocupadas.\n* Acredita-se que o IFFI esteja localizado em um contêiner de armazenamento trancado em uma barcaça de carga atracada no Centro Administrativo central.\n* Os códigos de acesso ao contêiner do IFFI estão em posse do líder das forças do Nine Tails, Mendo Ren. \n\nA experiência passada com Mendo Ren indica que é improvável que ele mostre seu rosto e corra o risco de ser capturado. No entanto, se todos os seus tenentes forem neutralizados, acreditamos que ele não terá outra escolha a não ser assumir o comando das forças pessoalmente e nos dar a oportunidade de recuperar os códigos dele.\n* Além do sistema de transporte, a Crusader Security nos informou que há vários veículos nas plataformas disponíveis para serem comandados pela CDF. Esses veículos serão a única maneira de chegar ao Centro de administração. OBSERVAÇÃO - Se todos os veículos dentro do espaço aéreo restrito forem destruídos antes que o inversor possa ser desligado, não haverá como chegar à barcaça de carga e a CDF será forçada a recuar.\n* As plataformas são protegidas por armas antiaéreas controladas pelo Nine Tails.\n\nPor favor, esteja ciente de que a SAIC Rowena Dulli, da Advocacia, é a adida oficial da CDF e estará comandando a operação.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Unknown:</EM4> 54
EckhartSecurity_Defend_E_Desc_001=ECKHART SECURITY, LLC.\nCONTRATOS E DESPACHO\n\nTipo de contrato: Defender local\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nUm cliente interceptou comunicações entre membros de gangues e descobriu que eles estão planejando um ataque a <EM4>~mission(Location|Address)</EM4>. Agora eles precisam de nossa ajuda para garantir que o ataque não seja bem-sucedido.   \n\nProcuramos um contratado que possa defender o local dessa ofensiva. Não tenho informações específicas sobre os fora da lei, mas duvido que sejam tão habilidosos se nosso cliente quebrou suas comunicações tão facilmente. \n\nO pagamento será emitido após a conclusão bem-sucedida do contrato.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou da entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Boss x1, Hostiles x10, Private Security x4, Sentries x6\n<EM4>Unknown:</EM4> 11\n<EM4>Security Trainee:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -1,000 Rep
EckhartSecurity_Defend_E_Title_001=PROTEJA A ÁREA <EM4>[500 Rep]</EM4>
EckhartSecurity_Defend_H_Desc_001=ECKHART SECURITY, LLC.\nCONTRATOS E DESPACHOS\n\nTipo de contrato: Defender o local\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nHá um problema sério se formando para um de nossos clientes em <EM4>~mission(Location|Address)</EM4>. Eles foram avisados de que uma equipe de fora da lei altamente qualificada está determinada a invadir e ocupar esse local. Fomos contratados para garantir que isso não aconteça. \n\nPreciso de um contratado para ir ao local imediatamente. Com base nas informações fornecidas pelo cliente, isso não será fácil. Recomendamos enfaticamente que você traga aliados e muitos suprimentos para ajudar a evitar o ataque iminente.   \n\nO pagamento será emitido após a conclusão bem-sucedida do contrato.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou da entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 3/7 | Risk 6/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Boss x3, Hostiles x8, Private Security x4, Sentries x4\n<EM4>Unknown:</EM4> 21\n<EM4>Lead Security Contractor:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -4,000 Rep
EckhartSecurity_Defend_H_Title_001=REPELIR INVASORES <EM4>[500 Rep]</EM4>
EckhartSecurity_Defend_M_Desc_001=ECKHART SECURITY, LLC.\nCONTRATOS E DESPACHOS\n\nTipo de contrato: Defender local\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nRecebemos a notícia de que bandidos estão de olho em atacar <EM4>~mission(Location|Address)</EM4>. Nosso cliente está preocupado com o fato de o ataque ser iminente e solicitou que a segurança fosse enviada para o local imediatamente. Se você estiver interessado e disponível, reúna todos os suprimentos e o apoio de que precisar e vá para o local imediatamente.  \n\nO pagamento será emitido após a conclusão bem-sucedida do contrato.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou da entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x12, Private Security x4, Sentries x8\n<EM4>Unknown:</EM4> 10\n<EM4>Security Contractor:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -2,000 Rep
