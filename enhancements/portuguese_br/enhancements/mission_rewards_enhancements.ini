XenoThreat_claimsweep_desc_easy=Nosso movimento de resistência está crescendo a cada dia, mas isso vem com alguma atenção indesejada.As varreduras recentes descobriram sentinelas orbitais em ~mission(location|Address) e uma nave que administra um padrão de patrulha.Acreditamos que isso faz parte de uma campanha de espionagem direcionada ao Xenothreat, provavelmente financiada pela UEE.\n\nNós estamos procurando um Merc experiente disposto a destruir as sentinelas o mais rápido possível.Como eles já têm olhos e ouvidos, enviar alguém de fora da organização chamaria menos atenção.Se você fizer o show, será pago prontamente assim que as sentinelas forem destruídas.Pode ser inteligente lidar com isso prontamente.\n Se você decidir nos ajudar, Xenothreat lembrará que você está alguém disposto a lutar pelo que é certo. \n\ncomm.Espec.Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Hostiles:</EM4> Hostile Wave x3, Prospectors x1\n<EM4>Turrets:</EM4> 2 (hostile)
XenoThreat_claimsweep_desc_hard=As varreduras recentes descobriram várias sentinelas e naves orbitais em ~mission(location|Address).Acreditamos que eles fazem parte de uma campanha de espionagem direcionada ao Xenothreat, em resposta a nossas ações recentes no sistema Stanton.Parece que o Xenothreat deve estar fazendo algo certo, se eles estão aqui espionando assim.Se você não deseja que o Pyro se torne um sistema de vigilância, esta é sua chance de impedi -lo.As Sentries provavelmente não serão muito importantes, mas dão mente as naves de patrulha.Se eles conseguirem se separar, você terá muito mais problemas para respirar seu pescoço.\n\nVocê terá nossa gratidão e um pagamento considerável assim que o trabalho for feito.\n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250\n<EM4>Hostiles:</EM4> Hostile Wave x5, Prospectors x4\n<EM4>Turrets:</EM4> 4 (hostile)
XenoThreat_claimsweep_desc_intro=Parece que nossa luta para libertar a humanidade levou os cachorros do governo de volta à terra se sentindo nervosos.As varreduras recentes descobriram uma sentinela orbital em ~mission(location|Address) que acreditamos fazer parte de uma campanha de espionagem UEE.Bons créditos dizem que estão entregando os dados diretamente aos próprios slinks.\n\nSomente uma sentry foi detectada até agora, mas quem sabe o tamanho da operação crescerá se não for retirado.Não deve ser muito problema para um merche qualificado.Se isso soar como você, o pagamento será enviado prontamente assim que a sentinela for destruída.Além disso, o Xenothreat lembrará que você é alguém disposto a lutar pelo que é certo. \n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Turrets:</EM4> 1 (hostile)
XenoThreat_claimsweep_desc_medium=Você valoriza a liberdade da humanidade?Nesse caso, estou oferecendo a você a chance de provar isso.Digitalizações recentes descobriram sentinelas orbitais e naves patrulhando em ~mission(location|Address).Acreditamos que eles fazem parte de uma campanha de espionagem UEE visando o Xenothreat.É importante impedir que a reunião de inteligência deles antes de lançarmos nossa próxima missão. \n\nNós procurando um mercador experiente disposto a eliminar essas forças imediatamente.As sentinelas são a prioridade, mas os naves podem ser um problema maior se tiverem permissão para escapar.Você precisará avaliar a situação mais de perto quando estiver no local.\n\nNós poderiamos cuidar dele nós mesmos, mas querer enviar um contratado para que a escória por trás disso não saiba quem os atingiu.O pagamento será enviado imediatamente após a conclusão.Além disso, a satisfação de saber que você está ajudando uma boa causa. \n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostile Wave x4, Prospectors x2\n<EM4>Turrets:</EM4> 3 (hostile)
XenoThreat_claimsweep_desc_rand=Parece que a UEE está intensificando seus esforços para interromper nosso movimento.Um de nossos pilotos descobriu algumas sentinelas e naves orbitais em ~mission(location|Address).Acreditamos que eles fazem parte de uma campanha de espionagem de UEE visando o Xenothreat e é vital que seja interrompido antes que eles coloquem qualquer coisa que possa prejudicar nossos esforços contínuos.Invasão de privacidade antes de se espalhar ainda mais.Quem sabe quanto maior essa operação ficará se não for retirada imediatamente?O pagamento fará valer a pena e será enviado prontamente quando tudo for soprado para bits.\n\nVeja como foi feito, e ajude a fazer parte do lado direito da história. \n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostile Wave x32, Prospectors x5\n<EM4>Turrets:</EM4> 4 (hostile)
XenoThreat_claimsweep_title_easy=TORRETAS SILENCIONAS <EM4>[50 Rep]</EM4>
XenoThreat_claimsweep_title_hard=ELIMINE AS TORRETAS <EM4>[250 Rep]</EM4>
XenoThreat_claimsweep_title_intro=ACABANDO COM A VIGILÂNCIA <EM4>[50 Rep]</EM4>
XenoThreat_claimsweep_title_medium=ERRADIQUE AS TORRETAS <EM4>[100 Rep]</EM4>
XenoThreat_claimsweep_title_rand=ELIMINE AS TORRETAS <EM4>[100 Rep]</EM4>
Xenothreat_bounty_headhunter_desc_001=Xenothreat fez uma ordem de morte em ~mission(TargetName).Como membro do nível de clipes da gangue Headhunters, ~mission(TargetName|Last) liderou operações que visam agentes, missões e infraestrutura do Xenothreat.Para essas transgressões, o Xenothreat pagará a qualquer pessoa que rastreie e assassine com sucesso ~mission(TargetName|Last).\n\nlocation Atualização: ~mission(TargetName|Last) foi visto perto de ~mission(location|Address) há pouco tempo.Se você decidir aceitar este contrato, vá para as coordenadas imediatamente.~mission(TargetName|Last) sabe que estamos procurando por eles e estamos viajando com uma escolta recentemente.Não se surpreenda se eles não estiverem sozinhos. \n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Xenothreat_bounty_headhunter_desc_002=Xenothreat fez uma ordem de morte em ~mission(TargetName).Um membro conhecido da gangue Headhunters, ~mission(TargetName|Last) traiu a humanidade por ser um aliado alienígena conhecido que se associa a eles em uma capacidade pessoal e comercial.O Xenothreat quer que essas associações traidores parem imediatamente antes de trazer mais influência alienígena ao Pyro.Pagaremos a qualquer pessoa que rastreie com sucesso e assassinato ~mission(TargetName|Last) por esses crimes contra a humanidade.\n\nlocation Atualização: ~mission(TargetName|Last) foi recentemente visto com uma escolta em ~mission(location|Address).\n\nComm. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Xenothreat_bounty_headhunter_desc_003=A XenoThreat colocou uma ordem de morte na cabeça de ~mission(TargetName). Como membro da gangue Headhunters, ~mission(TargetName|Last) invadiu os sistemas da XenoThreat para roubar informações sobre nossas operações e pessoal. O dano causado só pode ser corrigido garantindo que ~mission(TargetName|Last) nunca mais possa fazer algo assim. É por isso que a XenoThreat pagará a qualquer um que possa rastrear e assassinar ~mission(TargetName|Last).     \n\nATUALIZAÇÃO DA LOCALIZAÇÃO: Varreduras recentes identificaram ~mission(TargetName|Last) viajando com outras naves perto de ~mission(Location|Address). \n\nCom. Espec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Xenothreat_destroyitems_CFP_vehicle_desc_01=Os "ativistas" de poltrona do Citizens for Prosperity continuam tentando espalhar sua influência por todo o sistema. Com sua ajuda, há uma oportunidade de cortar suas operações pela raiz.\n\nO grupo está usando a ~mission(location|Address) para distribuir suprimentos aos independentes espalhados pelo planeta. Se destruirmos a ~mission(ship) localizada lá, a rede deles cairá.\n\nO bombardeio enviaria uma mensagem clara, mas deixarei que você decida os meios de destruição.\n\nCom. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Xenothreat_theft_outpost_cfp_desc_001=A mentirosa UEE diz que não está envolvida com as operações da Citizens for Prosperity simplesmente porque “doa” suprimentos para uma organização de ajuda terciária que, em seguida, os entrega imediatamente a eles. \n\nAcabamos de saber que uma dessas remessas de ajuda governamental foi deixada em um posto avançado alinhado à Citizens for Prosperity. É por isso que pagaremos para você invadir a ~mission(Pickup1|Address) e reivindicar a ~mission(item) para a causa. Depois que você entregar tudo na ~mission(Dropoff1|Address), poderemos redistribuir a remessa para ajudar em nossa luta. Nada melhor do que usar os recursos do inimigo contra ele. \n\nMas não pense que eles simplesmente entregarão o material a você. Embora a Citizens for Prosperity estejam supostamente aqui para trazer a paz, é melhor você estar preparado para enfrentá-los. \n\nCom. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Xenothreat_theft_outpost_headhunters_desc_001=Por mais que Xenothreat tenha se esforçado para fazer do Pyro um refúgio puro para os seres humanos, nem todos estão alinhados com nossos objetivos.O principal deles é os Headhunters, que se degradaram contratando um transportador alienígena para fornecer suprimentos a eles.Perdemos a chance de atingir essa remessa, mas ainda queremos enviar a mensagem de que trabalhar com alienígenas em qualquer capacidade não será tolerado neste sistema.\n\n\ \ \ \ \ \ \ne That O envio foi entregue a ~mission(Pickup1|Address).Queremos que alguém atinja o posto avançado, reivindique a ~mission(Item) e leve -o para ~mission(Dropoff1|Address) para que possamos descartá -lo adequadamente.\n\nyou para manter o Pyro livre de influência alienígena? \n\ncomm.Espec.Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Xenothreat_theft_station_cfp_desc_001=A Citizens for Prosperity se entrincheiraram em ~mission(Pickup1|Address). Para evitar que eles fiquem muito confortáveis nessa estação, queremos mostrar a eles como é a vida em nosso sistema. Pagaremos para que você chegue à estação, pegue o ~mission(item) e mate todos que estiverem em seu caminho. \n\nO pagamento depende de você entregar esses suprimentos à ~mission(Dropoff1|Address). Qualquer pessoa que você matar será apenas uma vantagem.     \n\nCom. Espec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Xenothreat_theft_station_roughready_desc_001=Não sei se você já teve o prazer de lidar com a Rough & Ready, mas a gangue está concentrada em dominar o mercado de combustível no Pyro. Uma jogada inteligente, mas que não podemos deixar acontecer sem que eles nos façam algumas concessões. Como eles não estão interessados em negociar, somos forçados a mostrar a eles o que acontece com aqueles que se opõem a nós.\n\nIdentificamos a ~mission(Pickup1|Address) como um alvo principal para esse ataque. Também sabemos que eles receberam recentemente alguns suprimentos que devem ser um preço adequado para sua obstinação. Uma vez dentro da estação, faça o que for necessário para confiscar o ~mission(item). Enviaremos o pagamento assim que você os entregar na ~mission(Dropoff1|Address).      \n\nComando. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
