Hockrow_FacilityDelve_P2M3_desc=Agência Hockrow \nArquivo do Caso #JD10285\nInvestigador Responsável: Arken Mallor\n\nAtualização do Caso: \nGraças àquele último lote de dados que você entregou, estamos começando a preencher as lacunas sobre o que o Dr. Jorrit está fazendo por lá. Temos uma linha do tempo aproximada das suas atividades. Parece que ele tem trazido mais coisas para Onyx do que enviado para fora, o que é interessante. Precisamos de mais informações. Existe um experimento antigo rodando por lá que monitora mudanças sísmicas minúsculas. Se você puder entregar esses dados, isso nos ajudará a identificar alguns dos movimentos ao redor da instalação.\n\nAções do Investigador Contratado:\nExplore a ala de <EM4>Pesquisa</EM4> e <EM4>recupere os dados sísmicos</EM4> e entregue-os em <EM4>~mission(Destination|Address)</EM4>.\n\nNotas Adicionais:\nCuidado com possíveis forças hostis no local.\n\nViaje para Onyx em um veículo que possa ser armazenado em um hangar grande.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7
