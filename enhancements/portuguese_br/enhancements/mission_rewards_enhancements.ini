RedWind_Delivery_Illegal_Desc_01=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS\n----------------------------\n\nEu tenho um outra missão especial onde posso precisar de você. Deve ser rápido.\n\nPACOTE PARA COLETA\n· Pacote #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n\nLOCAL DE ENTREGA\n· Pacote #~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n\nE lembre-se de não incomodar os clientes ou seus convidados. Profissionalismo é a chave aqui. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Desc_02=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS\n----------------------------\n\nEu tenho um outra missão especial para a qual preciso de um piloto em quem possa confiar.\n\nPACOTES PARA COLETA (CADA PEDIDO)\n· Pacote #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n· Pacote # ~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n\nLOCAIS DE ENTREGA (CADA PEDIDO)\n· Pacote #~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n· Pacote # ~mission(item2|serialnumber) para ~mission(Dropoff2|Address)\n\nEste é um cliente muito importante para nós, portanto, trate ele e seus pacotes com respeito especial.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Desc_03=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS\n----------------------------\n\nTemos um recebeu outro pedido especial de um de nossos clientes particulares.\n\nPACOTES PARA COLETA (CADA PEDIDO)\n· Pacote #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n· Pacote #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n· Pacote #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n\nLOCAIS DE ENTREGA (ORDEM ARIOUS)\n· Pacote #~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n· Pacote #~mission(item2|serialnumber) para ~mission(Dropoff2|Address)\n· Pacote #~mission(item3|serialnumber) para ~mission(Dropoff3|Address)\n\nLembre-se de manter a discrição. A última coisa que esse cliente deseja é chamar a atenção para seu negócio, e a última coisa que desejo é um cliente insatisfeito. Especialmente neste caso.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Desc_04=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS\n----------------------------\n\nEu tenho um outra viagem especial. Achei que você era o piloto certo para fazer isso por mim.\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n· Pacote #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n· Pacote #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n· Pacote #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n· Pacote #~mission(item4|serialnumber) de ~mission(Pickup4|Address)\nLOCAIS DE ENTREGA DE ENTREGA (QUALQUER LINHA)\n· Pacote #~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n· Pacote #~mission(item2|serialnumber) para ~mission(Dropoff2|Address)\n· Pacote #~mission(item3|serialnumber) para ~mission(Dropoff3|Address)\n· Pacote #~mission(item4|serialnumber) para ~mission(Dropoff4|Address)\n\nNovamente, seja inteligente e não diga nada que possa ver ou ouvir enquanto estiver lá fora. Lembre-se: você está lá apenas pelos pacotes.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Desc_05=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nTenho outro trabalho especial para o qual você poderia ser útil. Esse é um pouco mais complicado, pois há mais alguns pacotes para controlar. Aqui está a lista: \n\nPACTOS PARA RECOLHA (QUALQUER ORDEM)\n - Pacote #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n - Pacote #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n - Pacote #~mission(item3|serialnumber) da ~mission(Pickup3|Address)\n - Pacote #~mission(item4|serialnumber) da ~mission(Pickup4|Address)\n - Pacote #~mission(item5|serialnumber) da ~mission(Pickup5|Address)\n\nLocalizações de entrega (QUALQUER ORDEM)\n - Pacote #~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n - Pacote #~mission(item2|serialnumber) para ~mission(Dropoff2|Address)\n - Pacote #~mission(item3|serialnumber) para ~mission(Dropoff3|Address)\n     - Pacote #~mission(item4|serialnumber) para ~mission(Dropoff4|Address)\n - Pacote #~mission(item5|serialnumber) para ~mission(Dropoff5|Address)\n\nCertifique-se de que os pacotes corretos cheguem ao destino. Você realmente não quer ter que explicar uma confusão para esses clientes específicos.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Desc_Intro=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS\n----------------------------\n\nEu conheço você fizemos um trabalho sólido para nós no passado, então pensei em ver se você estaria interessado em fazer uma pequena viagem especial para nós, um pouco mais distante no sistema do que você fez antes \n\n\nResumindo, precisamos de um piloto que esteja disposto a manter a cabeça baixa, focar na entrega dos pacotes e, o mais importante, não fazer muitas perguntas.\n\nOlha, para uma empresa menor como a nossa, permanecer à frente da concorrência significa que temos de oferecer aos nossos clientes algo que eles não conseguem obter em outro lugar: discrição. Na Red Wind, desde que você tenha o empréstimo, colocaremos tudo no lugar certo. Entendeu?\nSe isso parece bom para você, vamos ver como você se sai nesta jornada -\n\nPACOTES PARA COLETA (em qualquer ordem)\n· Pacote #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n· Pacote #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n· Pacote #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n\nLOCALIZAÇÕES DE ENTREGA (QUALQUER ORDEM)\n· Pacote #~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n· Pacote #~mission(item2|serialnumber) para ~mission(Dropoff2|Address)\n· Pacote #~mission(item3|serialnumber) para ~mission(Dropoff3|Address)\n\nUma observação final: provavelmente seria bom evitar atrasos desnecessários quando você tiver os pacotes a bordo, por exemplo. B. uma busca pelas autoridades locais. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500
RedWind_Delivery_Illegal_Title_01=ENTREGA DISCRETA DA RED WIND <EM4>[500 Rep]</EM4>
RedWind_Delivery_Illegal_Title_Intro=RED WIND PRECISA DE ENTREGADORES DISCRETOS <EM4>[500 Rep]</EM4>
RedWind_HaulCargo_AToB_ASD_Desc=RED WIND LINEHAUL \n'SUA CARGA EM BOAS MÃOS' \n----------------------------    \n\nA ASD nos contatou, pois parece que um dos seus antigos laboratórios, <EM4>~mission(Location|Address)</EM4>, ainda possui alguns containers de carga que eles gostariam de recuperar.\n\nVocê voará até lá em uma nave que pode transportar containers de até <EM4>~mission(MissionMaxSCUSize)</EM4> de tamanho, pousará no hangar, carregará a carga do elevador de carga e depois transportará tudo de volta para <EM4>~mission(Destination|Address)</EM4>. \n\nSó tome cuidado e fique atento enquanto estiver na instalação, e não deixe sua curiosidade atrapalhar. Sites abandonados como este podem ser o lar de toda sorte de problemas. E não se esqueça de levar um <EM4>Tractor Beam portátil</EM4>. \n\nSEJA O MELHOR – Tenha orgulho do trabalho que você faz e fará um trabalho do qual se orgulhará.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rookie:</EM4> +50 Rep
RedWind_HaulCargo_AToB_ASD_title=TRANSFERÊNCIA DE CARGA DE INSTALAÇÃO ABANDONADA <EM4>[50 Rep]</EM4>
RedWind_HaulCargo_AToB_desc_01=RED WIND LINEHAUL\n'SUAS MERCADORIAS EM BOAS MÃOS'\n----------------------------  \n\nPrecisa-se de um piloto para um transporte simples indo do elevador de carga em <EM4>~mission(Location|Address)</EM4> até <EM4>~mission(Destination|Address)</EM4>. Vai ser tranquilo, desde que você tenha uma nave que consiga transportar containers de até <EM4>~mission(MissionMaxSCUSize)</EM4>. \n\nCréditos fáceis. Só tome cuidado, o trajeto não é dos mais seguros. E não se esqueça de levar um <EM4>Tractor Beam portátil</EM4>.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Rookie:</EM4> +50 Rep\n<EM4>Trainee:</EM4> +50 Rep\n<EM4>Rookie:</EM4> +100 Rep\n<EM4>Junior:</EM4> +250 Rep\n<EM4>Experienced:</EM4> +1,000 Rep
RedWind_HaulCargo_AToB_desc_FromPyro_Danger=RED WIND LINEHAUL\n'SUA CARGA EM BOAS MÃOS'\n----------------------------\n\nAparentemente, algumas empresas veem perigo quando oferecem uma corrida em Pyro. Nós vemos lucros. Temos uma aqui que começa no sistema em <EM4>~mission(Location|Address)</EM4> e depois vai para <EM4>~mission(Destination|Address)</EM4>.  \n\nO cliente nos alertou que bandidos em Pyro costumam atacar essa rota, o que assustou outras empresas de transporte. Certifique-se de que sua nave esteja bem equipada e consiga carregar <EM4>~mission(MissionMaxSCUSize) containers de carga</EM4>. E não se esqueça de trazer um <EM4>Tractor Beam portátil</EM4>.  \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x6\n<EM4>Rookie:</EM4> +200 Rep
RedWind_HaulCargo_AToB_desc_LuxuryGoods_Danger_Timed=RED WIND LINEHAUL\n'SUA CARGA EM BOAS MÃOS'\n----------------------------\n\nRecebemos um contrato de um grande cliente que precisa de um piloto experiente para transportar uma grande carga de itens de luxo de <EM4>~mission(Location|Address)</EM4> para <EM4>~mission(Destination|Address)</EM4>. \n\nVocê precisará de espaço para pelo menos <EM4>~mission(MissionMaxSCUSize) containers de carga</EM4> em seu porão. Também precisará de um <EM4>Tractor Beam portátil</EM4> para carregar e descarregar tudo. \n\nE, como um aviso, os itens que você vai transportar são caros o suficiente para atrair alguma atenção indesejada. <EM4>Esteja preparado para se defender</EM4> caso não consiga fugir.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x1\n<EM4>Rookie:</EM4> +200 Rep
RedWind_HaulCargo_AToB_desc_ToPyro_Danger=RED WIND LINEHAUL\n'SUA CARGA EM BOAS MÃOS'\n----------------------------\n\nTemos uma corrida aqui que pode se tornar uma regular e lucrativa se conseguirmos completar. Isso vai te levar para Pyro, então você precisará estar pronto para enfrentar alguns dos locais. \n\nVocê precisará pegar a carga em <EM4>~mission(Location|Address)</EM4>, fazer o salto para Pyro e depois ir até <EM4>~mission(Destination|Address)</EM4>. \n\nTudo o que você precisa fazer é trazer uma nave com espaço para <EM4>~mission(MissionMaxSCUSize) containers de carga</EM4>, um <EM4>Tractor Beam portátil</EM4> e estar pronto para causar dano se alguém quiser arranjar briga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x3\n<EM4>Rookie:</EM4> +200 Rep
RedWind_HaulCargo_AToB_title_01=TRANSPORTADOR ~mission(ReputationRank) NECESSÁRIO PARA ENTREGA ~mission(CargoGradeToken) <EM4>[50–1,000 Rep]</EM4>
RedWind_HaulCargo_AToB_waste_desc_01=RED WIND LINEHAUL\n'SUAS MERCADORIAS EM BOAS MÃOS'\n----------------------------  \n\nPrecisa-se de um piloto para o transporte de material de resíduos indo do elevador de carga em <EM4>~mission(Location|Address)</EM4> até <EM4>~mission(Destination|Address)</EM4>. Vai ser tranquilo, desde que você tenha uma nave que consiga transportar containers de até <EM4>~mission(MissionMaxSCUSize)</EM4>. Não é um trabalho sujo, mas não traga sua nave mais limpa.\n\nPor outro lado, os fora-da-lei provavelmente vão te deixar em paz quando virem o que você está transportando. E não se esqueça de levar um <EM4>Tractor Beam portátil</EM4>.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 7/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Trainee:</EM4> +50 Rep\n<EM4>Junior:</EM4> +250 Rep\n<EM4>Experienced:</EM4> +1,000 Rep
RedWind_HaulCargo_MultiToSingle_desc_01=RED WIND LINEHAUL\n'SUAS MERCADORIAS EM BOAS MÃOS'\n----------------------------\n\nAcabei de receber uma comunicação de um cliente. Eles têm carga (<EM4>~mission(MissionMaxSCUSize)</EM4> ou menor) em vários locais, pronto para ser levado até o elevador de carga em <EM4>~mission(Destination|Address)</EM4>.\n\nLOCALIZAÇÕES DE COLETA (QUALQUER ORDEM)  \n~mission(MultiToSingleToken)  \n\nRecomendo que tire um tempo para planejar sua rota antes de decolar. Pode economizar combustível. E não se esqueça de levar um <EM4>Tractor Beam portátil</EM4>.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 7/7 | Risk 6/7 | Knowledge 3/7\n<EM4>Junior:</EM4> +250 Rep\n<EM4>Member:</EM4> +500 Rep\n<EM4>Experienced:</EM4> +1,000 Rep\n<EM4>Senior:</EM4> +2,000 Rep\n<EM4>Master:</EM4> +4,000 Rep
RedWind_HaulCargo_MultiToSingle_desc_RantaDung=RED WIND LINEHAUL\n'SUA CARGA EM BOAS MÃOS'\n----------------------------\n\nRecebemos uma solicitação de um fazendeiro em Pyro para suprimentos agrícolas especializados - nomeadamente, esterco de ranta. Aparentemente, fertilizantes normais não estão funcionando. Eles fizeram pedidos de múltiplos distribuidores e precisam de alguém para trazer tudo de volta para <EM4>~mission(Destination|Address)</EM4>.\n\nAqui estão todos os locais onde você pode pegar o esterco:\n\nLOCAIS DE COLETA (QUALQUER ORDEM)\n\n ~mission(MultiToSingleToken)\n\nO cliente diz que sua nave precisa ser capaz de carregar pelo menos <EM4>~mission(MissionMaxSCUSize) containers de carga</EM4>. Não se esqueça de trazer seu próprio <EM4>Tractor Beam portátil</EM4> para carregar e descarregar.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x23\n<EM4>Rookie:</EM4> +200 Rep
RedWind_HaulCargo_MultiToSingle_title_01=TRANSPORTADOR ~mission(ReputationRank) NECESSÁRIO PARA ENTREGA ~mission(CargoGradeToken) <EM4>[200–4,000 Rep]</EM4>
RedWind_HaulCargo_MultiToSingle_waste_desc_01=RED WIND LINEHAUL\n'SUAS MERCADORIAS EM BOAS MÃOS'\n----------------------------\n\nRecebi várias comunicações esta manhã. Parece que a nave de um dos coletores de lixo local está quebrada e vamos ter que cobrir a função.\n\nTenho um monte de lixo (<EM4>~mission(MissionMaxSCUSize)</EM4> ou menor) em vários locais, pronto para ser levado até o elevador de carga em <EM4>~mission(Destination|Address)</EM4>.\n\nLOCALIZAÇÕES DE COLETA (QUALQUER ORDEM)  \n~mission(MultiToSingleToken) \n\nE não se esqueça de levar um <EM4>Tractor Beam portátil</EM4>.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 7/7 | Risk 6/7 | Knowledge 3/7\n<EM4>Junior:</EM4> +250 Rep\n<EM4>Member:</EM4> +500 Rep\n<EM4>Senior:</EM4> +2,000 Rep\n<EM4>Master:</EM4> +4,000 Rep
RedWind_HaulCargo_SingleToMulti_desc_01=RED WIND LINEHAUL\n'SUAS MERCADORIAS EM BOAS MÃOS'\n----------------------------   \n\nUm dos caras lá de <EM4>~mission(Location|Address)</EM4> me contatou sobre um monte de carga, <EM4>~mission(MissionMaxSCUSize)</EM4> ou menor, que precisa ser transportada para alguns pontos diferentes.   \n\nLOCALIZAÇÕES DE ENTREGA (QUALQUER ORDEM)  \n~mission(SingleToMultiToken)  \n\nConfio em você para planejar sua rota, então não vacile. E tente evitar locais muito perigosos. E não se esqueça de levar um <EM4>Tractor Beam portátil</EM4>.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Rookie:</EM4> +100 Rep\n<EM4>Junior:</EM4> +250 Rep\n<EM4>Member:</EM4> +500 Rep
RedWind_HaulCargo_SingleToMulti_desc_RevenantTreePollen=RED WIND LINEHAUL\n'SUA CARGA EM BOAS MÃOS'\n----------------------------\n\nA Red Wind precisa de um piloto experiente para transportar uma grande remessa de pólen bruto de árvore revenant de <EM4>~mission(Location|Address)</EM4> para esses locais:\n\nLOCAIS DE DESCARGA (QUALQUER ORDEM)\n\n~mission(SingleToMultiToken)\n\nIsso pode parecer óbvio, mas o representante da CFP pediu para garantirmos que está tudo certo sob a lei da UEE para transportar pólen de árvore revenant desde que não tenha sido processado. \n\nCertifique-se de que sua nave possa carregar até <EM4>~mission(MissionMaxSCUSize) containers de carga</EM4> antes de aceitar o contrato. E compre um <EM4>Tractor Beam portátil</EM4> se você não tiver um, para tornar o carregamento e descarregamento o mais simples possível.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x23\n<EM4>Rookie:</EM4> +200 Rep
RedWind_HaulCargo_SingleToMulti_desc_ToCFP_Danger_Timed=RED WIND LINEHAUL\n'SUA CARGA EM BOAS MÃOS'\n----------------------------\n\nA CFP tem um pedido urgente para um piloto com experiência em combate. Alguns de seus assentamentos estão sob ameaça imediata e podem ser atacados em breve, então eles precisam de suprimentos o mais rápido possível. \n\nSe você tem confiança de que pode navegar por uma zona de combate, por favor, vá até <EM4>~mission(Location|Address)</EM4>, pegue a carga e leve para esses locais:\n\nLOCAIS DE DESCARGA (QUALQUER ORDEM)\n\n~mission(SingleToMultiToken)\n\nVocê precisará de espaço para <EM4>~mission(MissionMaxSCUSize) containers de carga</EM4>, e seu próprio <EM4>Tractor Beam portátil</EM4> para carregar e descarregar tudo.\n\nLembre-se de que sempre é melhor fugir caso alguém tente uma emboscada. Mas, se você se encontrar encurralado, não hesite em se defender.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x12\n<EM4>Rookie:</EM4> +200 Rep
RedWind_HaulCargo_SingleToMulti_title_01=TRANSPORTADOR ~mission(ReputationRank) NECESSÁRIO PARA ENTREGA ~mission(CargoGradeToken) <EM4>[100–4,000 Rep]</EM4>
RedWind_HaulCargo_SingleToMulti_waste_desc_01=RED WIND LINEHAUL\n'SUAS MERCADORIAS EM BOAS MÃOS'\n----------------------------   \n\nEstão fazendo uma limpeza em <EM4>~mission(Location|Address)</EM4> e tem vários containers de lixo <EM4>~mission(MissionMaxSCUSize)</EM4> ou menores que precisam ser levados a alguns locais diferentes. (Não me pergunte por quê. Só sei que estão pagando.)\n\nLOCALIZAÇÕES DE ENTREGA (QUALQUER ORDEM)  \n~mission(SingleToMultiToken) \n\nE não se esqueça de levar um <EM4>Tractor Beam portátil</EM4>.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 5/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Member:</EM4> +500 Rep\n<EM4>Experienced:</EM4> +1,000 Rep\n<EM4>Senior:</EM4> +2,000 Rep\n<EM4>Master:</EM4> +4,000 Rep
RedWind_LocalDelivery_desc_01=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS\n----------------------------\n\nPreciso de um disponível pilotos independentes para Entrega Local rápida.\n\nPACOTE PARA COLETA\n· Pacote #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n\nLOCAL DE ENTREGA\n· Pacote #~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n\nTente manter o nariz limpo quando estiver por aí. Ao integrar pacotes da Red Wind, um certo nível de profissionalismo é apreciado. E não se esqueça de levar um <EM4>Tractor Beam portátil</EM4>. \n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250
RedWind_LocalDelivery_desc_02=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS\n----------------------------\n\nVocê está procurando para um piloto dirigindo alguns pacotes -\n\nPACOTES PARA COLETA (QUALQUER APARÊNCIA)\n· Pacote #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n· Pacote #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n\nPontos de entrega (QUALQUER SÉRIE)\n· Pacote #~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n· Pacote #~mission(item2|serialnumber) para ~mission(Dropoff2|Address)\n\nPreciso disso rapidamente e sem bagunça. E não se esqueça de levar um <EM4>Tractor Beam portátil</EM4>. \n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_LocalDelivery_desc_03=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS\n----------------------------\n\nOlá a todos, Tenho um pedido para pilotos que têm uma navia disponível -\n\nPACOTES PARA COLETA (CADA PEDIDO)\n· Pacote #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n· Pacote #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n· Pacote #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n· Pacote #~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n· Pacote #~mission(item2|serialnumber) para ~mission(Dropoff2|Address)\n· Pacote #~mission(item3|serialnumber) para ~mission(Dropoff3|Address) \n\nE não se esqueça de levar um <EM4>Tractor Beam portátil</EM4>. \n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_LocalDelivery_desc_04=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS\n----------------------------\n\nChegou um pedido por quem requer um piloto disponível.\n\nPACOTES PARA COLETA (QUALQUER SÉRIE)\n· Pacote #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n· Pacote #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n· Pacote #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n· Pacote #~mission(item4|serialnumber) de ~mission(Pickup4|Address)\nDROP DELIVERY LOCAIS (QUALQUER SÉRIE)\n· Pacote #~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n· Pacote #~mission(item2|serialnumber) para ~mission(Dropoff2|Address)\n· Pacote # ~mission(item3|serialnumber) para ~mission(Dropoff3|Address)\n· Pacote #~mission(item4|serialnumber) para ~mission(Dropoff4|Address)\n\nE só para ficar claro, você deve fornecer sua própria Nave de carga. Certifique-se de ter espaço. E não se esqueça de levar um <EM4>Tractor Beam portátil</EM4>. \n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_LocalDelivery_desc_05=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS\n----------------------------\n\nDefinir um Multi -parar viagem juntos que requer um piloto.\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n· Pacote #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n· Pacote #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n· Pacote #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n· Pacote #~mission(item4|serialnumber) de ~mission(Pickup4|Address)\n· Pacote #~mission(item5|serialnumber) de ~mission(Pickup5|Address)\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n· Pacote #~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n· Pacote #~mission(item2|serialnumber) para ~mission(Dropoff2|Address)\n· Pacote #~mission(item3|serialnumber) para ~mission(Dropoff3|Address)\n· Pacote #~mission(item4|serialnumber) para ~mission(Dropoff4|Address)\n· Pacote #~mission(item5|serialnumber) para ~mission(Dropoff5|Address)\n\nCertifique-se de que Sua Nave tenha espaço para todas essas coletas. E não se esqueça de levar um <EM4>Tractor Beam portátil</EM4>. \n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_LocalDelivery_desc_intro=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS\n----------------------------\n\nEstamos procurando para um piloto independente interessado em dirigir uma rota local para nós.\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n· Pacote #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n\nLOCALIZAÇÕES DE ENTREGA (QUALQUER ORDEM)\n· Pacote #~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n\nSe você puder fazer isso, podemos conversar sobre mais pedidos no futuro. E não se esqueça de levar um <EM4>Tractor Beam portátil</EM4>. \n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +100
RedWind_LocalDelivery_desc_rehire=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS\n----------------------------\n\nMesmo se nós Faz muito tempo que não contratamos você, precisamos de uma ajuda extra agora.\n\nPACOTES PARA COLETA (CADA PEDIDO)\n· Pacote #~mission(item1|serialnumber) de ~mission(Pickup1|Address) \n· Pacote #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n· Pacote #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM) \n· Pacote #~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n· Pacote #~mission(item2|serialnumber) para ~mission(Dropoff2|Address)\n· Pacote #~mission(item3|serialnumber) para ~mission(Dropoff3|Address)\n\nSe você prosseguir com esta entrega, podemos ver se podemos torná-la normal novamente. E não se esqueça de levar um <EM4>Tractor Beam portátil</EM4>. \n\n~mission(Contractor|SignOff)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
RedWind_LocalDelivery_title_01=ROTA LOCAL DA RED WIND <EM4>[250–500 Rep]</EM4>
RedWind_LocalDelivery_title_intro=RED WIND ESTÁ PROCURANDO POR NOVOS PILOTOS <EM4>[100 Rep]</EM4>
RedWind_LocalDelivery_title_rehire=OUTRA TENTATIVA DE ENTREGA DA RED WIND <EM4>[500 Rep]</EM4>
RedWind_RecoverCargo_Easy_Description=RED WIND LINEHAUL\n'SUA CARGA EM BOAS MÃOS'\n----------------------------\n\nUm dos nossos cargueiros teve problemas no motor enquanto transportava uma carga e foi forçado a abandonar a nave. Estamos procurando um contratado que possa recuperar a carga e completar a entrega. Você vai precisar trazer seu próprio <EM4>feixe trator pesado</EM4> para transportar a carga até sua nave. Detalhes abaixo.\n\nLOCAL DE RECUPERAÇÃO\n     · <EM4>~mission(Location|Address)</EM4>\n\nLOCAL DE ENTREGA\n     · Elevador de carga em <EM4>~mission(Destination|Address)</EM4>\n\nAviso: o local de recuperação não foi verificado como seguro. Você pode encontrar algum fora-da-lei oportunista tentando pegar a carga para si, então fique atento.\n\nTENHA ORGULHO DO SEU TRABALHO – Mesmo como contratado, você está representando a Red Wind Linehaul. Não faça nada intencionalmente que possa prejudicar a reputação da empresa.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Unknown:</EM4> 1\n<EM4>Trainee:</EM4> +100 Rep
RedWind_RecoverCargo_Easy_Title=RED WIND RECUPERAÇÃO FÁCIL DE CARGA <EM4>[100 Rep]</EM4>
RedWind_RecoverCargo_Hard_Description=RED WIND LINEHAUL\n'SUA CARGA EM BOAS MÃOS'\n----------------------------\n\nEstamos com dificuldades para completar uma missão de transporte e precisamos de um contratante confiável com experiência em ambientes perigosos para concluir o trabalho. Só para avisar, a carga está em uma nave abandonada cercada por múltiplos e altamente perigosos bandidos. Recomendamos fortemente que você traga alguns reforços e um <EM4>Tractor Beam pesado</EM4> para recuperar a carga do cliente. Detalhes abaixo:\n\nLOCAL DE RECUPERAÇÃO\n     · <EM4>~mission(Location|Address)</EM4>\n\nLOCAL DE DESCARGA\n     · Elevador de carga em <EM4>~mission(Destination|Address)</EM4>\n\nComo isso é um pouco arriscado, estamos oferecendo um pagamento proporcional. Fica a seu critério decidir como distribuir para sua equipe.\n\nORGULHE-SE DO SEU TRABALHO – Mesmo como contratante, você está representando a Red Wind Linehaul. Não faça nada intencionalmente para prejudicar a reputação da empresa.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Unknown:</EM4> 1\n<EM4>Junior:</EM4> +200 Rep
RedWind_RecoverCargo_Hard_Title=RED WIND RECUPERAÇÃO DIFÍCIL DE CARGA <EM4>[200 Rep]</EM4>
RedWind_RecoverCargo_Medium_Description=RED WIND LINEHAUL\n'SUA CARGA EM BOAS MÃOS'\n----------------------------\n\nUm transportador da Red Wind foi emboscado por bandidos e agora a carga dos nossos clientes está parada enquanto eles se preparam para roubá-la. Precisamos de um piloto com um <EM4>Tractor Beam pesado</EM4> e uma nave pronta para combate para ir até o local abaixo e recuperar a carga antes que seja perdida para sempre.\n\nLOCAL DE RECUPERAÇÃO\n     · <EM4>~mission(Location|Address)</EM4>\n\nLOCAL DE DESCARGA\n     · Elevador de carga em <EM4>~mission(Destination|Address)</EM4>\n\nO piloto relatou múltiplos inimigos, então leve isso a sério. \n\nCADA OPORTUNIDADE CONTA – Aproveite ao máximo o que é dado a você, mostre que pode lidar com mais trabalho.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Unknown:</EM4> 1\n<EM4>Rookie:</EM4> +150 Rep
RedWind_RecoverCargo_Medium_Title=RED WIND RECUPERAÇÃO DIRETA DE CARGA <EM4>[150 Rep]</EM4>
RedWind_RecoverCargo_Super_Description=RED WIND LINEHAUL\n'SUAS MERCADORIAS EM BOAS MÃOS'\n----------------------------\n\nTemos uma tarefa especial apenas para os contratados mais competentes. Um dos nossos cargueiros, que infelizmente não está mais entre nós, não conseguiu concluir seu último trabalho. A carga que ele deveria entregar está parada dentro da antiga nave dele na localização listada abaixo.\n\nLOCAL DE RECUPERAÇÃO\n     · <EM4>~mission(Location|Address)</EM4>\n\nLOCAL DE ENTREGA\n     · Elevador de carga em <EM4>~mission(Destination|Address)</EM4>\n\nNão vou ficar enrolando: este é um trabalho extremamente desafiador. Você vai precisar trazer uma equipe forte de pilotos habilidosos para lidar com os fora-da-lei que mataram o contratante anterior e de um <EM4>Tractor Beam de alta potência</EM4> para recuperar a carga do cliente. Dito isso, se aceitar este contrato, vamos garantir que valha muito a pena.\n\nCOMO NOS SAÍMOS – Complete nossa breve pesquisa de feedback na nossa página do Spectrum para ter a chance de participar do sorteio mensal de prêmios.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Unknown:</EM4> 1\n<EM4>Experienced:</EM4> +300 Rep
RedWind_RecoverCargo_Super_Title=RED WIND RECUPERAÇÃO ESPECIAL DE CARGA <EM4>[300 Rep]</EM4>
RedWind_RecoverCargo_VeryHard_Description=RED WIND LINEHAUL\n'SUA CARGA EM BOAS MÃOS'\n----------------------------\n\nEstamos convocando um piloto altamente qualificado para recuperar a carga de nosso cliente. Aceite este contrato somente se você tem experiência lidando com situações extremamente hostis envolvendo múltiplos combatentes. Membros adicionais da tripulação e um <EM4>Tractor Beam pesado</EM4> são altamente recomendados.\n\nLOCAL DE RECUPERAÇÃO\n     · <EM4>~mission(Location|Address)</EM4>\n\nLOCAL DE DESCARGA\n     · Elevador de carga em <EM4>~mission(Destination|Address)</EM4>\n\nA carga deve estar no compartimento da nave abandonada. O cliente já expressou frustração com o atraso da carga, então trabalhe rápido e de forma eficiente.\n\nSEJA RESILIENTE – A vida é difícil e às vezes você tem que se adaptar. Continue em frente e não deixe que isso te derrube.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Unknown:</EM4> 1\n<EM4>Member:</EM4> +200 Rep
RedWind_RecoverCargo_VeryHard_Title=RED WIND RECUPERAÇÃO PERIGOSA DE CARGA <EM4>[200 Rep]</EM4>
Redwind_internaldelivery_dc_desc_001=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nO pessoal de ~mission(Location|Address) estão fazendo uma limpeza e querem que alguns pacotes sejam movidos pelas instalações.\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n · Pacote #~mission(item1|serialnumber) da ~mission(Pickup1) \n · Pacote #~mission(item2|serialnumber) da ~mission(Pickup2)\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n · Pacote #~mission(item1|serialnumber) para ~mission(Dropoff1)\n · Pacote #~mission(item2|serialnumber) para a ~mission(Dropoff2)\n\nEles precisam que seja feito de forma eficiente e sem muitos problemas.\n\n\nNÃO ACEITE ESTE CONTRATO - a menos que você seja confiável. A Red Wind tem uma reputação na qual nossos clientes confiam e por boas razões. \n\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Redwind_internaldelivery_dc_desc_003=RED WIND LINEHAUL\n'SEUS PRODUTOS EM BOAS MÃOS'\n----------------------------\n\nTenho algumas caixas que precisam reorganizando em ~mission(location|Address).\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n · Pacote #~mission(item1|serialnumber) da ~mission(Pickup1)\n · Pacote #~mission(item2|serialnumber) da ~mission(Pickup2)\n · Pacote #~mission(item3|serialnumber) da ~mission(Pickup3)\n · Pacote #~mission(item4|serialnumber) da ~mission(Pickup4)\n \nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n · Pacote #~mission(item1|serialnumber) para ~mission(Dropoff1)\n · Pacote #~mission(item2|serialnumber) para ~mission(Dropoff2)\n · Pacote #~mission(item3|serialnumber) para ~mission(Dropoff3)\n · Pacote #~mission(item4|serialnumber) para ~mission(Dropoff4)\n\n\nPARA TODOS OS VETERINÁRIOS - Red Wind agradece seu serviço ao nosso Império! Suas lutas significam nossa liberdade! \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
Redwind_internaldelivery_dc_desc_005=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nParece que houve um pequeno contratempo logístico na ~mission(Location|Address) e eles precisam de alguém para garantir que os pacotes extraviados acabem onde deveriam estar dentro das instalações. \n\nPACTOS PARA RECOLHA (QUALQUER ORDEM)\n - Pacote #~mission(item1|serialnumber) da ~mission(Pickup1)\n - Pacote #~mission(item2|serialnumber) da ~mission(Pickup2)\n - Pacote #~mission(item3|serialnumber) da ~mission(Pickup3)\n - Pacote #~mission(item4|serialnumber) da ~mission(Pickup4)\n - Pacote #~mission(item5|serialnumber) da ~mission(Pickup5)\n - Pacote #~mission(item6|serialnumber) da ~mission(Pickup6)\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n - Pacote #~mission(item1|serialnumber) para a ~mission(Dropoff1)\n - Pacote #~mission(item2|serialnumber) para a ~mission(Dropoff2)\n - Pacote #~mission(item3|serialnumber) para a ~mission(Dropoff3)\n     - Pacote #~mission(item4|serialnumber) para a ~mission(Dropoff4)\n - Pacote #~mission(item5|serialnumber) para a ~mission(Dropoff5)\n - Pacote #~mission(item6|serialnumber) para a ~mission(Dropoff6)\n\n\nA CONFIANÇA TEM DUAS VEIAS - Ao aceitar este contrato, você está se comprometendo a não nos enganar, e a Red Wind Linehaul se compromete a tratar você da mesma forma. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000
Redwind_internaldelivery_dc_title_001=GERENCIADOR DE PACOTE RED WIND <EM4>[500–2,000 Rep]</EM4>
RepairOxygenKiosk_DescriptionLong=Olá convidados,\n\nRecentemente fomos informados de que um de nossos dispensadores de oxigênio apresentou um erro técnico. Como você sabe, esses quiosques são importantes para garantir que você tenha disponibilidade adequada de oxigênio enquanto participa do nosso Programa de Liberação de Trabalho.\n\nEstamos buscando qualquer hóspede disponível para reiniciar o quiosque. Isso deve reconectar o quiosque à rede e resolver o problema. O primeiro convidado a completar esta tarefa será recompensado não só com mérito, mas também com a satisfação de tornar o local de trabalho mais seguro para outros convidados.\n\nObrigado.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100
RepairOxygenKiosk_Title=OPORTUNIDADE DE MANUTENÇÃO PARA PRISIONEIROS <EM4>[100 Rep]</EM4>
ResourceRush_Lawful_desc_001=pu resourcerush prototype\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
RetakeLocation_MissionDescription=~mission(Contractor|RetakeLocationDescription)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
RetrieveDatapad_desc=Há alguns dias contratei a tripulação do 'Pride of Arliss para recuperar alguns dados importantes para mim. Eles completaram o trabalho sem problemas, mas o bastardo do capitão me ligou e exigiu mais créditos. Acontece que também não foi a primeira vez que ele tentou esse truque, porque no meio de suas “negociações” comigo, Sua Nave foi atacado por alguns indivíduos muito furiosos que queriam lhe ensinar uma lição. n\nNossas comunicações foram perdidas quando o tiroteio começou e essa foi a última vez que tive notícias dele. Acho que ele está praticamente morto, mas quero que você voe até o Pride of Arliss e tente obter meus dados no datapad pessoal do capitão.\n\nAssim que tiver, configurarei um canal de transmissão seguro no ARC -L1 área de descanso. Viaje até lá e, quando estiver dentro do alcance, envie-me os detalhes por meio deste contrato para receber o pagamento.\n\nNão tente me ferrar também. Karma pode ser um verdadeiro idiota.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Unknown:</EM4> 1
Roughready_bounty_desc_002=A Rough & Ready tem feito negócios com a ~mission(TargetName) há anos, mas esse relacionamento piorou. Por um tempo, fornecemos combustível a crédito, mas quando chegou a hora de cobrar, o covarde se escondeu. Se a ~mission(TargetName|Last) não pode pagar com créditos, acho que vai pagar com a vida.\n\nUm associado acabou de bater o ponto da ~mission(TargetName|Last) na ~mission(Location|Address). Eu adoraria que você fosse até lá agora para fazer o mesquinho pagar.\n\nA propósito, parece que ~mission(TargetName|Last) não está viajando sozinho, então eu me certificaria de que você está totalmente abastecido antes de ir atrás deles. \n\nSmokey\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
Roughready_destroyitems_fuel_desc_01=Se você está procurando alguns créditos fáceis, tenho uma oferta para você.\n\nVeja, o que se diz por aí é que a ~mission(location|Address) está operando como um depósito de combustível. Eles não devem ter recebido o memorando de que o comércio de combustível em Pyro pertence à Rough & Ready.\n\nÉ por isso que você vai até lá e destruirá as reservas de combustível deles. Elas devem ser fáceis de localizar. São os grandes tanques de armazenamento amarelos espalhados pelo posto avançado. Mas cuidado, pois há torres de defesa na área, portanto, esteja pronto para desviar dos tiros ou explodir as armas. \n\nDeixarei a seu critério como você lidará com a demonstração. As bombas seriam minha primeira opção, mas não me importo muito, desde que o trabalho seja feito.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Turrets:</EM4> present (hostile)
Roughready_destroyitems_fuel_title_01=COMBUSTÍVEL PARA O FOGO <EM4>[50 Rep]</EM4>
Ruto_Assassin_Sync_E_Desc=O acordo é o seguinte. ~mission(TargetName) e ~mission(TargetName2) devem morrer ao mesmo tempo. Infelizmente, eles não estarão no mesmo lugar.\n\nUm golpe duplo parece complicado, mas se você contratar algumas armas extras, não será muito difícil acertar dois golpes ao mesmo tempo.\n\nFaça certeza de que você encontrará pessoas com as habilidades, pois sei de uma fonte confiável que cada uma delas voará com alguns companheiros para "proteção".\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x2
Ruto_Assassin_Sync_E_Title=JUNTOS PARA SEMPRE <EM4>[500 Rep]</EM4>
Ruto_Assassin_Sync_H_Desc=Tenho outro par que precisa ser morto ao mesmo tempo. Parece estar se tornando cada vez mais popular como opção de assassinato. \n\nDesta vez é ~mission(TargetName) e ~mission(TargetName2). Ambos são operadores bastante experientes e não voarão sozinhos. \n\nEu garantiria que quem ajudar você nesta missão possa lidar com uma luta.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x2
Ruto_Assassin_Sync_H_Title=DUAS VEZES MAIS DOR DE CABEÇA <EM4>[500 Rep]</EM4>
Ruto_Assassin_Sync_Intro_Desc=Adivinha o que ~mission(TargetName) e ~mission(TargetName2) têm em comum? \n\nVocê matará os dois!\n\nO difícil é que você tem que matá-los ao mesmo tempo para que um deles não tenha chance de escapar ou, pior, matar a pessoa que está tentando matá-lo. \n\nPortanto, você deve montar uma equipe que persiga um objetivo enquanto você cuida do outro. Dividir e conquistar!\n\nE apesar de terem causado tanto caos que foram mortos, até onde eu sei, eles são relativamente fracos. Não espere encontrar muita resistência.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x1, Targets x2
Ruto_Assassin_Sync_Intro_Title=LANÇAMENTO SIMULTÂNEO <EM4>[500 Rep]</EM4>
Ruto_Assassin_Sync_M_Desc=Eu realmente espero que você não seja amigo de ~mission(TargetName) ou ~mission(TargetName2) porque preciso que você derrube os dois... ao mesmo tempo... Claro que eles não facilitariam para nós viajando na mesma Nave ou algo óbvio assim. Não. Você precisará montar uma tripulação para poder atirar nos dois alvos ao mesmo tempo. \nQuando um deles estiver morto, você terá que eliminar o outro também. Não podemos arriscar que um deles escape. E provavelmente devo mencionar que ambos não são apenas bons pilotos, mas também viajarão com reforços. Nada que você não possa resolver, tenho certeza.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x2
Ruto_Assassin_Sync_M_Title=AMIGOS ATÉ O FIM <EM4>[500 Rep]</EM4>
Ruto_Assassin_Sync_S_Desc=Se você me perguntasse, eu teria dito que ~mission(TargetName) e ~mission(TargetName2) acabariam se matando. Mas em vez disso, você terá a honra de matar os dois ao mesmo tempo.\n\nNo entanto, você terá que trabalhar para isso.\n\nCada um deles significa problemas. Registros sérios, bem treinados e inteligentes demais para voar sem reforços.\n\nLeve a melhor tripulação que puder. Você vai precisar deles. E não seja mesquinho. Você não pode gastar créditos se estiver morto.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x2
Ruto_Assassin_Sync_S_Title=PROBLEMAS EM DOBRO <EM4>[500 Rep]</EM4>
Ruto_Assassin_Sync_VE_Desc=É muito comovente quando você conhece um casal que está pronto para morrer um pelo outro. Estúpido, mas comovente.\n\n~mission(TargetName) e ~mission(TargetName2) decidiram ficar um ao lado do outro e agora acabou e eles estão mortos.\n\nEncontre um amigo e traga os dois para a pista. Certifique-se de matá-los ao mesmo tempo. Chame isso de justiça restaurativa.\n\nVocê morrerá com bastante facilidade. Talvez eles tenham um ou dois Naves com eles, mas não acho que isso seja motivo de preocupação.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x2, Targets x2
Ruto_Assassin_Sync_VE_Title=A MORTE NOS SEPARA <EM4>[500 Rep]</EM4>
Ruto_Assassin_Sync_VH_Desc=~mission(TargetName) e ~mission(TargetName2). Eu acho que eles podem estar relacionados? Ou juntos? Realmente não importa, alguém quer matá-los. \nEu configurei para que você possa acertá-los quando eles não estiverem voando juntos. Dessa forma é mais seguro para você. Ambos são empresários sérios e voam com apoio igualmente sério. Não quero nenhum deles vivo ou haverá uma verdadeira dor de cabeça.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x2
Ruto_Assassin_Sync_VH_Title=DOIS PELO PREÇO DE DOIS <EM4>[500 Rep]</EM4>
SalvageContractor_Description=~mission(Contractor|SalvageContractorDesc)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Friendlies:</EM4> Salvageable Ships x1\n<EM4>Unknown:</EM4> 1
