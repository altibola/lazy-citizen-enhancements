missionManager_Charlie_Description=Necessidade imediata de um investigador particular experiente e discreto próximo ao Crusader para investigar uma questão de seguro.\n\nTaxa fixa. Sem despesas. A data de início será o mais breve possível. Evidências suficientes devem ser apresentadas para concluir o pedido.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
mtps_RetrieveConsignment_desc_001=Sobre o trabalho: A MicroTech Protection Services precisa de um profissional de segurança para uma operação de recuperação em ~mission(Location). O local está atualmente sob ataque e os seguranças no local não respondem e são considerados mortos. Acreditamos que materiais confidenciais recentemente entregues às instalações para armazenamento temporário foram o alvo do ataque. Seu foco principal será coletar essas caixas e movê-las para um local seguro. \nPor razões de segurança, os materiais confidenciais foram entregues como parte de uma remessa maior e guardados no cofre automatizado. Os materiais são fornecidos com códigos de recuperação exclusivos que devem ser inseridos no teclado da esteira de embalagens. Os protocolos determinam que apenas os oficiais de segurança seniores podem carregar um datapad com um código, portanto você deve localizá-los antes de pegar as caixas. Assim que as caixas estiverem seguras, entregue todo o material confidencial para ~mission(dropoff1) para pagamento.\n\nRESPONSABILIDADES\n- Providencie seu próprio transporte para ~mission(Location|Address).\n- Entre em contato, se necessário, Force para coletar o material confidencial .\n- Entregue o material confidencial para ~mission(dropoff1|Address).\n\nQUALIFICAÇÕES MÍNIMAS\n- 2 anos de experiência combinada em mercenários e/ou segurança.\n- Acesso a equipamentos de combate. \n- Acesso a uma Nave espacial capaz de transportar carga.\n- Pronto para implantação imediata.\n\nQUALIFICAÇÕES DESEJADAS\n- Experiência com técnicas para redução rápida de hostilidades.\n- Experiência no transporte de carga crítica.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Guards x4, Hostiles x54
mtps_RetrieveConsignment_title_001=DEFENDA O LOCAL E ENTREGUE A REMESSA <EM4>[500–4,000 Rep]</EM4>
mtps_UGF_defend_E_desc_001=SOBRE O TRABALHO\nMicroTech Protection Services está procurando um mercenário detalhista que possa montar uma equipe de segurança para proteger a ~mission(Location|Address) de ameaças menores. \n\nRESPONSABILIDADES\n- Fornecer transporte próprio para ~mission(Location|Address).\n- Fornecer equipe de segurança própria para suporte.\n- Proteger o local de ameaças hostis; se necessário, usando a força.\n\nQUALIFICAÇÕES MÍNIMAS\n- 2 anos de experiência combinada como mercenário e/ou força de segurança.\n- Acesso a equipamento de combate e transporte.\n- Pronto para implantação imediata.\n\nQUALIFICAÇÕES DESEJADAS \n- Experiência em liderança de equipe.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x1, Hostiles x10, Private Security x4, Sentries x6\n<EM4>Unknown:</EM4> 11
mtps_UGF_defend_E_title_001=DEFENDA O LOCAL CONTRA AMEAÇAS MENORES <EM4>[500 Rep]</EM4>
mtps_UGF_defend_VH_desc_001=SOBRE O TRABALHO\nMicroTech Protection Services está procurando um mercenário detalhista que possa montar uma equipe de segurança para proteger ~mission(Location|Address) de sérias ameaças inimigas. \n\nRESPONSABILIDADES\n- Fornecer transporte próprio para ~mission(Location|Address).\n- Fornecer equipe de segurança própria para suporte.\n- Proteger o local de ameaças hostis; se necessário, usando a força.\n\nQUALIFICAÇÕES MÍNIMAS\n- 2 anos de experiência combinada como mercenário e/ou força de segurança.\n- Acesso a equipamento de combate e transporte.\n- Pronto para implantação imediata.\n\nQUALIFICAÇÕES DESEJADAS \n- Experiência em liderança de equipe.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x3, Hostiles x8, Private Security x4, Sentries x4\n<EM4>Unknown:</EM4> 21
mtps_UGF_defend_VH_title_001=DEFENDA O LOCAL CONTRA AMEAÇAS GRAVES <EM4>[500 Rep]</EM4>
mtps_UGF_defend_desc_001=SOBRE O TRABALHO\nMicroTech Protection Services está procurando um mercenário detalhista que possa montar uma equipe de segurança para proteger ~mission(Location|Address) de ameaças hostis. \n\nRESPONSABILIDADES\n- Fornecer transporte próprio para ~mission(Location|Address).\n- Fornecer equipe de segurança própria para suporte.\n- Proteger o local de ameaças hostis; se necessário, usando a força.\n\nQUALIFICAÇÕES MÍNIMAS\n- 2 anos de experiência combinada como mercenário e/ou força de segurança.\n- Acesso a equipamento de combate e transporte.\n- Pronto para implantação imediata.\n\nQUALIFICAÇÕES DESEJADAS \n- Experiência em liderança de equipe.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x8, Private Security x4, Sentries x8\n<EM4>Unknown:</EM4> 10
mtps_UGF_defend_title_001=DEFENDA O LOCAL CONTRA AMEAÇAS MODERADAS <EM4>[500 Rep]</EM4>
mtps_UGF_destroy_E_desc_001=Sobre o trabalho: A MicroTech Protection Services está procurando um mercenário ou especialista em segurança detalhista para se reportar a ~mission(Location|Address) e destruir o contrabando armazenado lá. \n\nRESPONSABILIDADES\n- Transporte próprio para ~mission(Location|Address).\n- Descartar o contrabando no local, usando a força se necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n- 2 anos de experiência combinada como mercenário e/ou ou força de segurança.\n- Acesso a equipamento de combate e transporte.\n- Pronto para responder imediatamente.\n\nQUALIFICAÇÕES PREFERENCIAIS\n- Sem problemas contínuos de dependência.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Civilians x4
mtps_UGF_destroy_E_title_001=DESTRUA O LOCAL DE CONTRABANDOS <EM4>[500 Rep]</EM4>
mtps_UGF_destroy_H_desc_001=SOBRE O TRABALHO: A MicroTech Protection Services está procurando um mercenário detalhista ou especialista em segurança para se reportar a ~mission(Location|Address) e destruir os narcóticos armazenados lá. \n\nRESPONSABILIDADES\n- Transporte próprio para ~mission(Location|Address).\n- Descarte de drogas no local, usando força se necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n- 2 anos de experiência combinada como mercenário e/ou força de segurança.\n- Acesso a equipamento de combate e transporte.\n- Disponível para implantação imediata.\n\nQUALIFICAÇÕES ESPECIAIS\n- Sem problemas contínuos de dependência.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
mtps_UGF_destroy_H_title_001=DESTRUA O LOCAL DE NARCÓTICOS <EM4>[500 Rep]</EM4>
mtps_UGF_destroy_desc_001=SOBRE O TRABALHO: A MicroTech Protection Services está procurando um mercenário detalhista ou especialista em segurança para se reportar a ~mission(Location|Address) e destruir as drogas armazenadas lá. \n\nRESPONSABILIDADES\n- Transporte próprio até a ~mission(Location|Address).\n- Limpeza do local de medicamentos; usando a força, se necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n- 2 anos de experiência combinada em mercenários e/ou segurança.\n- Acesso a equipamento de combate e transporte.\n- Disponível para implantação imediata.\n\nQUALIFICAÇÕES ESPECIAIS\n- Nenhum problema contínuo de dependência.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
mtps_UGF_destroy_title_001=DESTRUA O LOCAL DE DROGAS <EM4>[500 Rep]</EM4>
mtps_UGF_eliminateall_allies_desc_001=SOBRE O TRABALHO\nMicroTech Protection Services está procurando um Mercenário detalhista que possa ajudar de forma rápida e segura a equipe de segurança estacionada em ~mission(Location|Address) na proteção do local contra ameaças hostis. \n\nEsteja ciente de que qualquer fogo amigo, acidental ou não, não será tolerado. \n\nRESPONSABILIDADES\n- Fornecer transporte próprio até a ~mission(Location|Address).\n- Ajudar a equipe de segurança local a proteger o local; use a força, se necessário.\n- Evite incidentes de fogo amigo.\n\nQUALIFICAÇÕES MÍNIMAS\n- 2 anos de experiência combinada como mercenário e/ou guarda de segurança.\n- Acesso a equipamento de combate e transporte.\n- Pronto para mobilizar imediatamente. \n\nQUALIFICAÇÕES PREFERENCIAIS\n- Experiência com técnicas rápidas de redução da escalada durante hostilidades.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
mtps_UGF_eliminateall_allies_desc_intro=SOBRE O TRABALHO\nMicroTech Protection Services precisa de profissionais de segurança novos, qualificados e orientados a detalhes para expandir nossa lista existente. Para avaliar suas capacidades, gostaríamos que você nos ajudasse a proteger ~mission(Location|Address) de ameaças hostis. \n\nRESPONSABILIDADES\n- Transporte próprio para ~mission(Location|Address).\n- Auxiliar na proteção do local, usando força se necessário.\n- Prevenir incidentes de fogo amigo.\n\nQUALIFICAÇÕES MÍNIMAS\n- 2 anos experiência combinada como mercenário e/ou força de segurança.\n- Acesso a equipamento de combate e transporte.\n- Prontidão operacional imediata.\n\nQUALIFICAÇÕES DESEJADAS\n- Experiência com técnicas para rápida redução das hostilidades.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
mtps_UGF_eliminateall_allies_desc_rehire=SOBRE O TRABALHO\nMesmo que seu desempenho passado não tenha atendido aos nossos padrões, a MicroTech Protection Services decidiu dar a você uma chance de se redimir. \n\nEm um esforço para reavaliar suas capacidades, a MicroTech Protection Services deseja que você ajude a proteger a ~mission(Location|Address) contra ameaças hostis. \n\nRESPONSABILIDADES\n- Transporte próprio até ~mission(Location|Address).\n- Auxiliar na proteção do local; usando a força, se necessário.\n- Evitar incidentes de fogo amigo.\n\nQUALIFICAÇÕES MÍNIMAS\n- 2 anos de experiência como mercenário e/ou força de segurança.\n- Acesso a equipamento de combate e transporte.\n- Operacional imediato prontidão. \n\nQUALIFICAÇÕES DESEJADAS\n- Experiência com técnicas para redução rápida das hostilidades.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
mtps_UGF_eliminateall_allies_title_001=DEFENDA OS OCUPANTES <EM4>[500 Rep]</EM4>
mtps_UGF_eliminateall_allies_title_intro=AVALIAÇÃO PARA SEGURANÇA <EM4>[500 Rep]</EM4>
mtps_UGF_eliminateall_allies_title_rehire=REVISÃO PARA SEGURANÇA <EM4>[500 Rep]</EM4>
mtps_UGF_eliminateall_desc_001=SOBRE O TRABALHO\nAm MicroTech Protection Services está procurando um profissional de segurança detalhado para nos ajudar a remover de forma rápida e segura os ocupantes ilegais que obtiveram temporariamente o controle da ~mission(Location|Address).\n\nResponsabilidades\n- Fornecer seu próprio transporte para ~mission(Location|Address).\n- Remova quaisquer invasores ilegais que residam no local; usar a força, se necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n- 2 anos de experiência combinada em mercenários e/ou segurança.\n- Acesso a equipamento de combate e transporte.\n- Prontidão operacional imediata.\n\nQUALIFICAÇÕES PREFERÁVEIS\n- Experiência com técnicas para diminuir rapidamente a hostilidade.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
mtps_UGF_eliminateall_nocivs_desc_001=SOBRE O TRABALHO\nMicroTech Protection Services está procurando um mercenário detalhista que possa nos ajudar de forma rápida e segura na eliminação completa de ocupantes ilegais que ganharam temporariamente o controle de ~mission(Location|Address). Dado que a sua ligação ao gangue não é clara, devem ser considerados não-combatentes. Qualquer ação hostil contra eles não será tolerada. \n\nRESPONSABILIDADES\n- Fornecer transporte próprio para a ~mission(Location|Address).\n- Remover qualquer pessoal inimigo presente no local; use a força, se necessário.\n- Garantir a segurança de quaisquer civis que possam estar no local. \n\nQUALIFICAÇÕES MÍNIMAS\n- 2 anos de experiência combinada como mercenário e/ou força de segurança.\n- Acesso a equipamento de combate e transporte.\n- Pronto para mobilização imediata.\n\nQUALIFICAÇÕES DESEJADAS\n- Experiência com técnicas para uma rápida redução das hostilidades. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13\n<EM4>Friendlies:</EM4> Civilians x4
mtps_UGF_eliminateall_title_001=EXPULSE OS RESIDENTES ILEGAIS <EM4>[500 Rep]</EM4>
mtps_bounty_desc_ERT=SOBRE O TRABALHO\nMicroTech Protection Services está procurando um caçador de recompensas qualificado para capturar o alvo extremamente vulnerável ~mission(TargetName) de ~mission(Location|Address). \n\nUm alvo de risco extremo normalmente pilota um Nave da classe subcapital, tem vários aliados fortemente armados e provavelmente será muito evasivo. Pode ser útil trazer pessoal de apoio para ajudar no combate a este alvo.\n\nRESPONSABILIDADES\n- Fornecer transporte próprio para ~mission(Location|Address).\n- Neutralize ~mission(TargetName); use a força, se necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n- Associação à Guilda dos Caçadores de Recompensas e certificação apropriada.\n- Acesso a um veículo pronto para combate.\n- Prontidão operacional imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n- Capacidade de lidar com situações de pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
mtps_bounty_desc_HRT=SOBRE O TRABALHO\nMicroTech Protection Services está procurando um caçador de recompensas qualificado para capturar o alvo de alto risco ~mission(TargetName) de ~mission(Location|Address). \n\nUm alvo de alto risco normalmente controla um Nave grande com vários tripulantes, tem vários aliados conhecidos e provavelmente será evasivo. Pode ser útil trazer pessoal de apoio para ajudar no combate a este alvo.\n\nRESPONSABILIDADES\n- Fornecer transporte próprio para ~mission(Location|Address).\n- Neutralize ~mission(TargetName); use a força, se necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n- Associação à Guilda dos Caçadores de Recompensas e certificação apropriada.\n- Acesso a um veículo pronto para combate.\n- Prontidão operacional imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n- Capacidade de lidar com situações de pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
mtps_bounty_desc_LRT=SOBRE O TRABALHO\nMicroTech Protection Services está procurando um caçador de recompensas qualificado para apreender o alvo de baixo risco ~mission(TargetName) de ~mission(Location|Address). \n\nUm alvo de baixo risco normalmente dirige um veículo de assento único, tem vários aliados conhecidos e deve ser fácil de capturar.\n\nRESPONSABILIDADES\n- Fornecer transporte próprio para ~mission(Location|Address).\n- Neutralize ~mission(TargetName), usando força se necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n- Associação a Guilda dos Caçadores de Recompensa e certificação apropriada.\n- Acesso a um veículo pronto para combate.\n- Prontidão operacional imediata.\n\nPREFERIDO QUALIFICAÇÕES \n- Capacidade de lidar com situações de pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
mtps_bounty_desc_MRT=SOBRE O TRABALHO\nMicroTech Protection Services está procurando um caçador de recompensas qualificado para apreender o alvo de risco médio ~mission(TargetName) de ~mission(Location|Address). \n\nUm alvo de risco médio normalmente pilota um Nave pequeno com vários tripulantes, tem vários aliados conhecidos e pode ser um tanto difícil de capturar.\n\nRESPONSABILIDADES\n- Organize seu próprio transporte para ~mission(Location|Address). \n- Neutralize ~mission(TargetName), usando força se necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n- Associação a Guilda dos Caçadores de Recompensa e certificação apropriada.\n- Acesso a um veículo pronto para combate.\n- Prontidão operacional imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n- Capacidade de lidar com situações de pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
mtps_bounty_desc_VLRT=SOBRE O TRABALHO\nMicroTech Protection Services está procurando um caçador de recompensas qualificado para capturar o alvo de risco muito baixo ~mission(TargetName) de ~mission(Location|Address). \n\nUm alvo de risco muito baixo normalmente dirige um veículo de assento único, tem poucos aliados conhecidos e deve ser relativamente fácil de capturar.\n\nRESPONSABILIDADES\n-Forneça seu próprio transporte para ~mission(Location|Address) . \n- Neutralize ~mission(TargetName), usando força se necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n- Associação a Guilda dos Caçadores de Recompensa e certificação apropriada.\n- Acesso a um veículo pronto para combate.\n- Prontidão operacional imediata.\n\nQUALIFICAÇÕES ESPECIAIS\n- Capacidade de lidar com situações de alta pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x1, Targets x1
mtps_bounty_desc_intro=SOBRE O TRABALHO\nMicroTech Protection Services está procurando novos caçadores de recompensas qualificados para expandir nossa lista existente. Para avaliar suas capacidades, gostaríamos de pedir que você nos ajude a apreender ~mission(TargetName) de ~mission(Location|Address).\n\n\nResponsabilidades\n- Organize seu próprio transporte para ~mission(Location|Address).\n- Neutralize ~mission(TargetName), usando força se necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n- Associação a Guilda dos Caçadores de Recompensa e certificação apropriada.\n- Acesso a um veículo pronto para combate.\n- Prontidão operacional imediata .\n\nQUALIFICAÇÕES PREFERENCIAIS\n- Capacidade de lidar com situações de pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
mtps_bounty_desc_rehire=SOBRE O TRABALHO\nMesmo que seu desempenho passado não tenha atendido aos nossos padrões, a MicroTech Protection Services decidiu dar a você uma chance de se redimir. \n\nPara reavaliar suas capacidades, gostaríamos que você prendesse ~mission(TargetName) de ~mission(Location|Address).\n\nResponsabilidades\n- Organize seu próprio transporte para ~mission(Location|Address). \n- Neutralize ~mission(TargetName); use a força, se necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n- Associação à Guilda dos Caçadores de Recompensas e certificação apropriada.\n- Acesso a um veículo pronto para combate.\n- Pronto para ação imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n- Capacidade de lidar com situações de pressão. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
mtps_bounty_fps_UGF_desc_001=SOBRE O TRABALHO\nMicroTech Protection Services está procurando um caçador de recompensas qualificado para capturar ~mission(TargetName) de ~mission(Location|Address). \n\nHaverá outros criminosos no local, mas seu foco principal deve ser completar a recompensa.\n\nRESPONSABILIDADES\n- Organize seu próprio transporte para ~mission(Location|Address).\n- Neutralize você ~mission(TargetName); use a força, se necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n- Filiação à Guilda dos Caçadores de Recompensa e certificação apropriada.\n- Acesso a equipamento de combate e transporte.\n- Prontidão operacional imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n- Capacidade de lidar com situações de alto nível Lide com a pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
mtps_bounty_fps_UGF_nocivs_desc_001=SOBRE O TRABALHO\nMicroTech Protection Services está procurando um caçador de recompensas qualificado para ajudar na captura de ~mission(TargetName) de ~mission(Location|Address). Estamos cientes de que pode haver civis no local, portanto, esteja ciente de possíveis fogos crusader.\n\nRESPONSABILIDADES\n- Organize seu próprio transporte para ~mission(Location|Address).\n- Neutralize ~mission(TargetName); use a força, se necessário.\n- Certifique-se de que nenhum civil seja ferido.\n\nQUALIFICAÇÕES MÍNIMAS\n- Membro da Guilda dos Caçadores de Recompensa e certificação apropriada.\n- Acesso a equipamento de combate e transporte.\n- Prontidão operacional imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n- Capacidade de lidar com situações de pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
mtps_bounty_fps_desc_001=SOBRE O TRABALHO\nMicroTech Protection Services está procurando um caçador de recompensas qualificado para capturar ~mission(TargetName) de ~mission(Location|Address). \n\nHaverá outros criminosos no local, mas seu foco principal deve ser completar a recompensa.\n\nRESPONSABILIDADES\n- Organize seu próprio transporte para ~mission(Location|Address).\n- Neutralize você ~mission(TargetName); use a força, se necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n- Filiação à Guilda dos Caçadores de Recompensa e certificação apropriada.\n- Acesso a equipamento de combate e transporte.\n- Prontidão operacional imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n- Capacidade de lidar com situações de alto nível Lide com a pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
mtps_bounty_fps_desc_first_001=SOBRE O TRABALHO\nMicroTech Protection Services precisa de novos caçadores de recompensas qualificados para expandir nossa lista existente. Para avaliar suas capacidades, gostaríamos que você nos ajudasse a apreender ~mission(TargetName) de ~mission(Location|Address).\n\nEmbora outros criminosos estejam no local, seu foco principal deve ser completar a recompensa.\n\nRESPONSABILIDADES\n- Fornecer transporte próprio para ~mission(Location|Address).\n- Neutralize ~mission(TargetName); use a força se necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n- Filiação à Guilda dos Caçadores de Recompensa e certificação apropriada.\n- Acesso a equipamento de combate e transporte.\n- Disponível para uso imediato.\n\nQUALIFICAÇÕES ESPECIAIS\n- Capacidade de lidar com situações de pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x4, Reinforcements x9, Targets x1
mtps_bounty_fps_desc_rehire_001=SOBRE O TRABALHO\nMesmo que seu desempenho passado não tenha atendido aos nossos padrões, a MicroTech Protection Services decidiu dar a você uma chance de se redimir. \n\nPara reavaliar suas habilidades, queremos que você capture ~mission(TargetName) de ~mission(Location|Address).\n\nEmbora haja outros criminosos no local, seu foco principal deve ser completar a recompensa \n\nResponsabilidades\n- Fornecer transporte próprio para ~mission(Location|Address).\n- Neutralize ~mission(TargetName); use a força se necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n- Filiação à Guilda dos Caçadores de Recompensa e certificação apropriada.\n- Acesso a equipamento de combate e transporte.\n- Disponível para uso imediato.\n\nQUALIFICAÇÕES ESPECIAIS\n- Capacidade de lidar com situações de pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x4, Reinforcements x9, Targets x1
