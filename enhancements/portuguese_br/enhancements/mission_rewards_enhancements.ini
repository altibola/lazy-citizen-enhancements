Shubin_Industrial_ShipMining_Nyx_E_Local_Desc_001=AVISO: Ordem de Compra\nLOCALIZAÇÃO: <EM4>~mission(System) </EM4>\n\nTERMOS*: \nDevido a mudanças na nossa cadeia de suprimentos, a Shubin Interstellar está atualmente buscando comprar diversos materiais refinados de mineradores independentes operando na região. Embora vender em um entreposto comercial possa render um preço mais competitivo do que cumprir nossa ordem, muitos mineradores consideram que fortalecer os laços com a Shubin é um investimento inteligente a longo prazo para a carreira.\n\n~mission(Hint_Location) Para uma lista completa de onde encontrar esses minerais, consulte <EM4>Fundamentos da Mineração #2: Onde Minerar</EM4> no seu Jornal do mobiGlas. Já que está lá, fique à vontade para ler a primeira parte <EM4>Fundamentos da Mineração #1: Visão Geral Básica</EM4> caso precise relembrar como obter os materiais.\n\nComo esta é uma ordem de compra e não um contrato de mineração, espera-se que você providencie seu próprio equipamento, como um <EM4>~mission(Hint_Tool)</EM4>.\n\nObserve que, para agilizar o uso futuro desses materiais, <EM4>eles devem ser refinados antes da entrega</EM4>. Isso pode ser feito em qualquer refinaria, cujas localizações podem ser encontradas no seu Starmap.\n\nQuando estiver pronto para nos vender os materiais refinados exigidos, deposite-os no elevador de carga localizado em <EM4>~mission(Destination|Address)</EM4>.\n\n*Ao aceitar este contrato, você assume todos e quaisquer riscos associados ao trabalho descrito neste documento, e em nenhuma circunstância a Shubin Interstellar poderá ser responsabilizada por quaisquer danos ocorridos durante a vigência do contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Nyx]</EM4>\n- Arclight "Stormfall" Pistol\n- Arclight Pistol\n- [S1-A] Arclight Pistol Battery (30 cap)\n- [S1-A] Horizon Helmet\n- [S1-A] Venture Arms\n- [S1-A] Venture Core\n- [S1-A] Venture Legs\n\n<EM4>[Nyx, Rank 0–1]</EM4>\n- [IND-S0-C] Surveyor-Go\n- [IND-S1-C] Survey