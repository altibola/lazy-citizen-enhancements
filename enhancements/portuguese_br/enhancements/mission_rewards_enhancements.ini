RAIN_CollectResources_storm_desc_001=A todos os contratantes disponíveis,\n\nNós, da Rayari, estamos dedicando toda a nossa energia para impedir a crise da tecnologia de regeneração, mas para que nossos cientistas continuem seus esforços, eles precisam de recursos que os fornecedores da empresa não têm conseguido entregar. \n\nHá uma população considerável de kopions que foram expostos à radiação perto de <EM4>~mission(Location)</EM4>. A Rayari está procurando um contratado para coletar <EM4>irradiated kopion horns</EM4> e entregá-los em <EM4>~mission(Destination|Address)</EM4>. Devido à escassez desse recurso, estamos dispostos a pagar uma alta taxa de serviço. \n\nJuntos, podemos tornar o universo melhor para todos.\n\nNarina Lerrem\nGerente sênior\nTerceirização de pesquisa clínica\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Contractor:</EM4> +150 Rep
RAIN_CollectResources_storm_desc_002=A todos os contratantes disponíveis,\n\nNós, da Rayari, não medimos esforços para deter a crise de regeneração em curso, mas, para continuar seus esforços, nossos cientistas precisam de um recurso raro que os fornecedores da empresa não conseguem obter. \n\nA Rayari está procurando um contratado experiente para coletar <EM4>irradiated valakkar pearls</EM4>, que podem ser extraídas de valakkar adultos que foram amplamente expostos à radiação. Nossas varreduras encontraram uma população qualificada dentro da tempestade perto de <EM4>~mission(Location)</EM4>. Como esses animais são altamente perigosos, a Rayari está disposta a compensar generosamente qualquer pessoa que possa ajudar na coleta das pérolas. \n\nDepois de obtidos, leve esses recursos valiosos para <EM4>~mission(Destination|Address)</EM4>.\n\nJuntos, podemos tornar o universo melhor para todos.\n\nNarina Lerrem\nGerente sênior\nTerceirização de pesquisa clínica\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Contractor:</EM4> +150 Rep
RAIN_CollectResources_storm_desc_003=A todos os contratantes disponíveis,\n\nNós, da Rayari, estamos dedicando toda a nossa energia para impedir a crise da tecnologia de regeneração, mas, para continuar seus esforços, nossos cientistas precisam de materiais que os fornecedores da empresa não conseguem obter. \n\nA Rayari está procurando um contratado experiente para coletar <EM4>irradiated valakkar fangs</EM4>, que podem ser extraídas de valakkar adultos que foram amplamente expostos à radiação. Nossas varreduras revelaram a existência de uma população qualificada dentro da tempestade perto de <EM4>~mission(Location)</EM4>. \n\nComo esses animais são altamente perigosos, a Rayari está oferecendo uma remuneração premium a qualquer pessoa que possa ajudar na coleta das presas.  \n\nDepois de obtidos, leve esses recursos valiosos para <EM4>~mission(Destination|Address)</EM4>.\n\nJuntos, podemos tornar o universo melhor para todos.\n\nNarina Lerrem\nGerente sênior\nTerceirização de pesquisa clínica\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Contractor:</EM4> +150 Rep
RAIN_CollectResources_storm_desc_004=A todos os contratantes disponíveis,\n\nNós, da Rayari, estamos trabalhando dia e noite para resolver a atual crise de regeneração, mas, para continuar seus esforços, nossos cientistas precisam de recursos raros que os fornecedores da empresa não podem entregar. \n\nPortanto, estamos procurando um contratante para garantir um <EM4>irradiated valakkar egg</EM4>. Nossas varreduras confirmaram várias tempestades radioativas com presença conhecida de valakkar em Pyro I. Você pode encontrar um ônibus espacial perto de <EM4>~mission(Location)</EM4> que o levará para dentro da tempestade. Mais uma coisa: as análises indicam que esses ovos se deterioram com o tempo. O estado do ovo não deve afetar nossa pesquisa, mas quanto mais cedo melhor. Devido aos riscos à saúde associados à exposição à radiação necessária para entregar uma amostra viável, a Rayari está disposta a pagar bem por qualquer pessoa que consiga obter e entregar esse item com segurança. \n\nDepois de obtido, leve este recurso valioso para <EM4>~mission(Destination|Address)</EM4>.\n\nJuntos, podemos tornar o universo melhor para todos.\n\nNarina Lerrem\nGerente sênior\nTerceirização de pesquisa clínica\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Contractor:</EM4> +150 Rep
