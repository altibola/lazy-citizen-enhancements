Foxwell_DefendEntitesAndEscort_VH_Desc=Ajuda urgente necessária em <EM4>~mission(Location|Address)</EM4>. Um grupo de fora da lei destrutivos que vem tentando ganhar notoriedade recentemente atacou com força um dos nossos clientes de alta prioridade, <EM4>atacando suas naves e mirando nos ~mission(Objects)</EM4>. Sua missão será manter todos e tudo seguros — embora não seja tarefa fácil.\n\nNão posso enfatizar o suficiente o quão perigosos esses atacantes são, então não deixe de <EM>chamar reforços</EM>. Se você, a tripulação e as estruturas saírem intactos, estamos oferecendo uma boa quantia de <EM4>~mission(ScripAmount) MG Scrip</EM4> ao contratante principal.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Security, Your Way'\n\nA Foxwell Enforcement é uma especialista em segurança licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntar à nossa equipe. Se você ou alguém que você conhece tiver interesse, entre em contato com um de nossos representantes.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Nyx]</EM4>\n- [CIV-S0-A] Tepilo\n- [CIV-S0-C] Fridan\n- [CIV-S0-C] Frost-Star SL\n- [CIV-S1-A] Gelid\n- [CIV-S1-C] ArcticStorm\n- [CIV-S1-C] Berian\n- [CIV-S1-C] Frost-Star\n- [CIV-S2-A] Aufeis\n- [CIV-S2-C] ColdSnap\n- [CIV-S2-C] Frost-Star EX\n- [CIV-S2-C] Graupel\n- [CIV-S3-A] Kragen\n- [CIV-S3-B] Elsen\n- [CIV-S3-C] Draug\n- [CIV-S3-C] Frost-Star XL\n- [CIV-S3-C] FrostBurn\n- [E-S1-A] CF-117 Bulldog Repeater\n- [E-S2-A] CF-227 Badger Repeater\n- [E-S3-A] CF-337 Panther Repeater\n- [E-S4-A] CF-447 Rhino Repeater\n- [E-S5-A] CF-557 Galdereen Repeater\n- [E-S6-A] CF-667 Mammoth Repeater\n- [MIL-S0-A] V60-26\n\n<EM4>[Pyro]</EM4>\n- [CIV-S0-B] IonWave\n- [CIV-S0-C] Radix\n- [CIV-S1-B] IonBurst\n- [CIV-S1-B] MagnaBloom\n- [CIV-S1-C] LightBlossom\n- [CIV-S1-C] PowerBolt\n- [CIV-S2-B] IonSurge\n- [CIV-S2-B] Radiance\n- [CIV-S2-C] FullForce\n- [CIV-S3-B] Celestial\n- [CIV-S3-B] IonSurge Pro\n- [CIV-S3-C] FullForce Pro\n- 