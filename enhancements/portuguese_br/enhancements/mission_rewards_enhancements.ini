blacjac_recoverspace_desc_intro=ATTN: Mercs / Caçadores de Recompensas com Experiência em Manuseio de Carga\n\nAcabamos de receber a notícia de que um ladrão chamado ~mission(TargetName) está voando por aí com sua pontuação mais recente a bordo de sua nave.\n\nNormalmente, mandaríamos alguém prender o desgraçado e acabar com isso, mas no momento o mais importante é que os bens roubados sejam recuperados. \n\nSe isso parece ser o seu tipo de coisa, você será autorizado a rastrear ~mission(TargetName|Last), proteger o ~mission(Item) roubado como puder e entregá-lo a ~mission(Destination|Address). ~mission(Contractor|RecoverSpaceTimed)~mission(Danger)\n\nObrigado,\nGloria Mesa\nSupervisor de Contrato Privado\nSegurança BlacJac, "Proteção Fornecida"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
blackbox_recover_desc=~mission(Contractor|BlackBoxRecoverDescription)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
