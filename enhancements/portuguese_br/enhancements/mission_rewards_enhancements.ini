vaughn_assassination_FPS_UGF_illegal_boss_desc_001=Não sei se você conhece ~mission(Location|Address), mas ~mission(TargetName) é o responsável por lá. Eles devem ser eliminados.\n\nÉ mais fácil falar do que fazer, infelizmente. Eles são notoriamente relutantes em lidar com os assuntos pessoalmente, preferindo que seus subordinados façam o trabalho sujo. No entanto, elimine subordinados suficientes e eles não terão escolha a não ser lidar com você eles mesmos.\n\nHonestamente, \nVaughn\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Pulverizer LMG\n- Tripledown Pistol\n- [S1-A] Carnifex Armor Core\n- [S1-A] Carnifex Armor Legs\n- [S1-A] Citadel Arms Base\n- [S1-A] Citadel Core Base\n- [S1-A] Citadel Legs Base\n- [S1-A] Fortifier Helmet Base\n- [S1-A] Pulverizer LMG Magazine (120 Cap)\n- [S1-A] Tripledown Pistol Magazine (12 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Backup x4, Boss x1, Hostiles x10\n<EM4>Elite Assassin:</EM4> +8,000 Rep\n<EM4>Failure Penalty:</EM4> -4,000 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
vaughn_assassination_FPS_UGF_illegal_desc_001=Dizem que não há honra entre ladrões. Hoje você parece estar almejando um de sua autoria. \n\nPor favor vá para ~mission(Location|Address) e mate ~mission(TargetName). O que você faz com os outros depende inteiramente de você.\n\nHonestamente, \nVaughn\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Deadrig Shotgun\n- Killshot Rifle\n- [S1-A] Badami Helmet\n- [S1-A] Deadrig Shotgun Magazine (8 cap)\n- [S1-A] Killshot Rifle Magazine (45 Cap)\n- [S1-A] Overlord Arms Supernova\n- [S1-A] Overlord Core Supernova\n- [S1-A] Overlord Helmet Supernova\n- [S1-A] Overlord Legs Supernova\n- [S1-A] Piecemeal Armor Arms\n- [S1-A] Piecemeal Armor Core\n- [S1-A] Piecemeal Armor Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 10\n<EM4>Low Level Assassin:</EM4> +1,000 Rep\n<EM4>Failure Penalty:</EM4> -500 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
vaughn_assassination_FPS_UGF_illegal_title_001=TODAS AS COISAS CHEGAM AO FIM <EM4>[BP]</EM4> <EM4>[1,000–8,000 Rep]</EM4>
vaughn_assassination_FPS_UGF_legal_boss_desc_001=Um oficial de segurança de alto escalão chamado ~mission(TargetName) está prestes a levar sua longa carreira a um fim violento e repentino. Eles estão atualmente em ~mission(Location|Address), mas não serão fáceis de alcançar. Receio que será preciso um pouco de trabalho para atraí-los. \nEu recomendo matar um número suficiente de seus subordinados para que eles sejam forçados a enfrentá-lo pessoalmente. É claro que, quando eles finalmente decidirem mostrar a cara, o assunto deverá ser bastante simples. \n\nHonestamente, \nVaughn\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Pulverizer LMG\n- Tripledown Pistol\n- [S1-A] Carnifex Armor Core\n- [S1-A] Carnifex Armor Legs\n- [S1-A] Citadel Arms Base\n- [S1-A] Citadel Core Base\n- [S1-A] Citadel Legs Base\n- [S1-A] Fortifier Helmet Base\n- [S1-A] Pulverizer LMG Magazine (120 Cap)\n- [S1-A] Tripledown Pistol Magazine (12 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Backup x4, Boss x1, Hostiles x10\n<EM4>High Value Assassin:</EM4> +4,000 Rep\n<EM4>Failure Penalty:</EM4> -2,000 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
vaughn_assassination_FPS_UGF_legal_desc_001=Um segurança chamado ~mission(TargetName) precisa urgentemente de aposentadoria antecipada. Eles estão atualmente estacionados em ~mission(Location|Address) junto com um monte de outros caras uniformizados. \n\nSinta-se à vontade para satisfazer seus caprichos violentos, mas somente a morte de ~mission(TargetName) lhe renderá meu reconhecimento e gratidão.\n\nHonestamente, \nVaughn\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13, Targets x1
vaughn_assassination_FPS_UGF_legal_title_001=SENTIREMOS SUA FALTA <EM4>[BP?]</EM4> <EM4>[500–4,000 Rep]</EM4>
vaughn_assassination_PA_E_desc=Não vejo muita dificuldade nisso pra você, mesmo que seja um pouco mais desafiador que seu contrato anterior. Vá até <EM4>~mission(Location|Address)</EM4> e se encarregue do membro da People’s Alliance chamado <EM4>~mission(TargetName)</EM4>. Minhas fontes dizem que eles podem ter um ou dois escoltas. Nada que você não aguente, claro.\n\nAtenciosamente,\nVaughn\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1\n<EM4>Jr. Contractor:</EM4> +100 Rep
vaughn_assassination_PA_E_title=FRAGMENTANDO A ALIANÇA <EM4>[100 Rep]</EM4>
vaughn_assassination_PA_H_desc=<EM4>~mission(TargetName)</EM4> da People’s Alliance claramente tem certa reputação, dado o quanto nosso cliente quer que isso seja resolvido rápido e com precisão.\n\nMas vamos poupar os detalhes. Tudo que precisa fazer é viajar até <EM4>~mission(Location|Address)</EM4> e dar um fim na vida deles. Espere encontrar uma nave bem armada e backup competente. Eles parecem se levar muito a sério.\n\nAtenciosamente,\nVaughn\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Reinforcements x6, Targets x1\n<EM4>Sr. Contractor:</EM4> +200 Rep
vaughn_assassination_PA_H_title=QUEBRANDO A ALIANÇA <EM4>[200 Rep]</EM4>
vaughn_assassination_PA_M_desc=Parece que a People’s Alliance andou mexendo com gente errada ultimamente. Um cliente nosso ficaria muito satisfeito se você impedisse que ~mission(TargetName) se intrometa nos assuntos dele de novo.\n\nVocê os encontrará por volta de <EM4>~mission(Location|Address)</EM4>, e pelo que nosso cliente contou, é improvável que estejam sozinhos. Esses não são pilotos comuns; podem representar uma ameaça à sua segurança.\n\nFaça o possível para manter tudo o mais limpo possível.\n\nAtenciosamente,\nVaughn\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1\n<EM4>Contractor:</EM4> +150 Rep
vaughn_assassination_PA_M_title=FRAGMENTANDO A ALIANÇA <EM4>[150 Rep]</EM4>
vaughn_assassination_PA_S_desc=Tenho o prazer de informar que temos uma missão particularmente ambiciosa para você.\n\n<EM4>~mission(TargetName)</EM4> foi marcado para eliminação. Você talvez já os conheça: um membro de alto perfil da People’s Alliance, notório por ter frustrado várias tentativas contra sua vida. Inicialmente achamos trabalhoso demais até o cliente oferecer uma quantia de créditos ainda mais absurda para ver isso concluído.\n\nA última localização conhecida do alvo foi em <EM4>~mission(Location|Address)</EM4>. Espere uma nave topo de linha e uma escolta habilidosa.\n\nEsperamos receber notícias sobre sua morte prematura.\n\nAtenciosamente,\nVaughn\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 7/7\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1\n<EM4>Head Contractor:</EM4> +300 Rep
vaughn_assassination_PA_S_title=ANIQUILANDO A ALIANÇA <EM4>[300 Rep]</EM4>
vaughn_assassination_PA_VH_desc=Prepare-se para um desafio, porque esse está longe de ser passeio no parque.\n\nPor motivos que nosso cliente se recusou a divulgar, um membro bastante proeminente da People’s Alliance precisa ser eliminado. O alvo, <EM4>~mission(TargetName)</EM4>, foi visto por último em <EM4>~mission(Location|Address)</EM4> pilotando uma nave de alto nível acompanhado por vários aliados experientes.\n\nAproveite bem essa oportunidade.\n\nAtenciosamente,\nVaughn\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Reinforcements x6, Targets x1\n<EM4>Neutral:</EM4> +50 Rep\n<EM4>Veteran Contractor:</EM4> +200 Rep
vaughn_assassination_PA_VH_title=DESTRUINDO A ALIANÇA <EM4>[50–200 Rep]</EM4>
vaughn_assassination_VE_desc_intro=Primeiro, permita-me me apresentar. Para dizer de forma um tanto dramática: eu negocio com a vida. \nAs pessoas me contratam quando uma alma precisa ser exterminada e, em troca, eu contrato a pessoa perfeita para servir de limpador. Isso dá segurança a todos os envolvidos porque ninguém sabe a identidade do outro. Uma situação ideal no que diz respeito a essas coisas. \n\nRecentemente fui informado de que você pode ter habilidades que usaria para me servir, e decidi que valeria a pena examinar a validade dessa afirmação. \n\nSe você estiver interessado em um relacionamento de trabalho, preciso demonstrar essas habilidades para você. \n\nEncontre ~mission(TargetName) em ~mission(Location|Address) e mate-os discretamente.\n\nSe você fizer isso com sucesso, você será recompensado. Não apenas isso, mas você provará ser digno de mais consideração.\n\nAtenciosamente, \nVaughn\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +250\n<EM4>Hostiles:</EM4> Targets x1
vaughn_assassination_VE_desc_rehire=Não é sempre na vida que temos outra chance de causar uma primeira impressão, mas vou lhe dar exatamente isso.\n\nDizer que fiquei desapontado com a forma como as coisas aconteceram durante sua última tentativa de assassinato expirou seria um eufemismo grosseiro. No entanto, aqui está sua chance de provar que você é capaz de mais. \n\nMate ~mission(TargetName) em ~mission(Location|Address) e considerarei o assunto resolvido. \nNAtenciosamente,\nVaughn\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250\n<EM4>Hostiles:</EM4> Targets x1
vaughn_assassination_VE_title_intro=UMA CHANCE DE IMPRESSIONAR <EM4>[100–500 Rep]</EM4>
vaughn_assassination_VE_title_rehire=OUTRA CHANCE DE IMPRESSIONAR <EM4>[50–500 Rep]</EM4>
