xenothreat_destroy_server_HH_desc_01=Um de nossos DataNners foi MIA enquanto transportava informações operacionais vitais.Algumas horas atrás, determinamos que eles foram atingidos por uma festa de invasão de Headhunterss e o conteúdo dos dados de dados da nave foram transferidos para seus servidores em ~mission(location|Address).\n\n.Você está sendo ordenado a ir para lá e garantir que nossos dados permaneçam privados, destruindo os servidores da HeadHunters.Raze tudo e todo mundo que puder no chão. \n\ncomm.Espec.Engler \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
xenothreat_destroy_server_HH_title_01=LIMPEZA TOTAL DO SERVIDOR <EM4>[50 Rep]</EM4>
xenothreat_eliminateall_CFP_outpost_desc_01=O grupo de instigadores que se chama de "cidadãos para pireo" não pode mais continuar a espalhar suas mentiras e propaganda sem repercussão.Presença em ~mission(location|Address).É provável que a resistência, mas esperamos que você lide com pouca dificuldade.Faça conforme indicado e você será bem pago pelo seu trabalho. \n\ncomm.Espec.Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
xenothreat_eliminateall_CFP_outpost_title_01=Ordem para Matar: "Cidadães" em ~mission(Location) <EM4>[1,000 Rep]</EM4>
xenothreat_eliminatespecific_desc_001=Os esforços de Xenothreat para impedir que as influências externas infectem esse sistema estão sendo testadas por um grupo que se atreve a se chamar cidadãos de Pyro.Um membro proeminente do grupo, ~mission(TargetName), estabeleceu operações em ~mission(location|Address) e já está trabalhando duro, espalhando suas mentiras e propaganda para qualquer pessoa que ouvirá.Se queremos que o Pyro permaneça independente da influência UEE e alienígena, algo deve ser feito sobre isso agora.\n\n\ \ \ \ \ \ \ \ ods throught whymesteat está emitindo uma ordem de matar para ~mission(TargetName|Last).E, sabendo o quanto eles são importantes para os cidadãos para as operações da Pyro, eu não ficaria surpreso se você tivesse que lutar pelo seu caminho através de um monte de seguidores mais fanáticos antes mesmo de conseguir uma chance neles.Mas lembre -se de ~mission(TargetName|Last) é sua meta, e o pagamento depende apenas de você, certificando -se de que eles sejam eliminados.\n\ncomm.Espec.Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Unknown:</EM4> 1
xenothreat_eliminatespecific_desc_002=Os Headhunters montaram uma equipe de ataque especial cujo único objetivo é atacar, interromper e prejudicar nossas operações. Por mais que eu não queira admitir, eles tiveram alguns pequenos sucessos e estão rapidamente se tornando uma preocupação. \n\nA XenoThreat sabe que a melhor maneira de matar uma cobra é cortando sua cabeça, portanto, estamos emitindo uma ordem de morte para o comandante da equipe de ataque ~mission(TargetName), que, de acordo com nossas fontes de inteligência, está escondido na ~mission(Location|Address) há alguns dias. \n\nEu esperaria uma forte resistência das forças da HeadHunters lá. Pelo que ouvimos, a ~mission(TargetName|Last) recebeu esse comando em parte por causa da lealdade feroz que inspira nos outros. Reunir sua própria equipe para lidar com isso seria uma estratégia operacional sólida. \n\nFeliz Caça às Cabeças,\n\nCom. Spec. Engler\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Unknown:</EM4> 1
xenothreat_eliminatespecific_title_001=LUTE PELA LIBERDADE DE PYRO <EM4>[1,000 Rep]</EM4>
