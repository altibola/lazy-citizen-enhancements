headhunters_killship_gen_vlrt_desc_001=Temos um peixinho que acha que pode atacar os Headhunters e escapar impune. Então ~mission(TargetName) tentou derrubar um dos nossos esconderijos e acha que pode escapar impune. \n\nA última vez que ouvimos, eles foram vistos em torno de ~mission(Location|Address). Precisamos de alguém para ir até lá e enviar uma mensagem muito clara sobre quem é o poder reinante no sistema.\n\nFaça isso rápido e limpo.\n\nStows Desliga.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1\n<EM4>Jr. Contractor:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_killship_gen_vlrt_rank0_desc_001=Você nos conhece. Você sabe o que fazemos. O sistema está ficando um pouco lotado, então estamos procurando alguns bons soldados para ajudar a manter nosso lugar aqui.\n\nSe você estiver a fim e não se importar em sujar as mãos, temos algo para provar que você tem o que estamos procurando.\n\n~mission(TargetName) era um ex-membro que nos vendeu para a XenoThreat e fez com que alguns de seus irmãos e irmãs fossem mortos. Agora eles acham que podem viver suas vidas sem consequências.\n\nVocê os elimina. Você é impulsionado. Parece uma troca justa.\n\nEles foram vistos em ~mission(Location|Address), então vá lá e cuide disso.\n\nStows Desliga.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1\n<EM4>Neutral:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_killship_gen_vlrt_rank0_title_001=QUER SER UM HEADHUNTER? <EM4>[BP]</EM4> <EM4>[50 Rep]</EM4>
headhunters_killship_gen_vlrt_title_001=~mission(TargetName) PRECISA SER PISOTEADO <EM4>[BP]</EM4> <EM4>[50 Rep]</EM4>
headhunters_killship_xenothreat_ert_desc_001=Preciso que você seja rápido nessa missão. Há um tenente da XenoThreat chamado ~mission(TargetName) que apareceu para tomar ar. O juiz acha que essa é uma grande chance de atrapalhar o comando da XenoThreat, eliminando-os. Ouvi dizer que ~mission(TargetName|Last) foi visto voando por ~mission(Location|Address), então chegue lá rápido antes que ele desapareça de novo. Eu levaria reforços, pois duvido que ele vá desistir sem lutar. \n\nStows encerrando.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 7/7 | Risk 7/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1\n<EM4>Elite Contractor:</EM4> +3,200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_killship_xenothreat_ert_title_001=DESAPAREÇA COM ALGUNS LIXOTHREAT <EM4>[BP]</EM4> <EM4>[3,200 Rep]</EM4>
headhunters_maintenance_H_desc_001=As tempestades em <EM4>~mission(Location|Address)</EM4> estão ficando um verdadeiro saco. Um dos nossos postos foi destruído ontem e precisa de reparos sérios, então estamos procurando ajuda.\n\nAcredito que você vai precisar trazer <EM4>uns seis fusíveis</EM4>, uma <EM4>Ferramenta de Sucateamento</EM4>, e <EM4>canisters de RMC suficientes para lidar com no máximo oito canos quebrados</EM4>. Acreditamos que isso vai cobrir, mas você vai receber os números exatos no local.\n\nJá estou de saco cheio desse lugar.\n\nEspero que saiba o que está fazendo, mas caso contrário, aquele <EM4>“Guia de Manutenção”</EM4> no seu mobiGlas Journal pode ser útil.\n\nStows encerrando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Head Contractor:</EM4> +400 Rep
headhunters_maintenance_H_title_001=~mission(Location) PRECISA DE MUITOS REPAROS <EM4>[400 Rep]</EM4>
headhunters_maintenance_M_desc_001=Preciso de alguém com habilidades manuais para ir até <EM4>~mission(Location|Address)</EM4> e dar uma mão nos reparos. O último cara que veio para consertar fez a maior parte, mas ainda tem algumas coisas que precisam de atenção.\n\nAcho que se você tiver <EM4>seis fusíveis</EM4>, uma <EM4>Ferramenta de Sucateamento</EM4>, e <EM4>canisters de RMC suficientes para consertar uns cinco canos</EM4>, você deve estar coberto.\n\nEspero que saiba o que está fazendo, mas caso contrário, o <EM4>“Guia de Manutenção”</EM4> no seu mobiGlas Journal pode ser útil.\n\nStows encerrando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Sr. Contractor:</EM4> +100 Rep
headhunters_maintenance_M_title_001=~mission(Location) PRECISA DE MUITOS REPAROS <EM4>[100 Rep]</EM4>
headhunters_maintenance_local_E_desc_001=Ei, se você está lendo isso, precisamos de uma ajuda. Um de nossos postos em <EM4>~mission(Location|Address)</EM4> foi atingido por uma tempestade feia e sofreu danos. Nenhum dos nossos técnicos de costume está disponível (ou vivo) para ir lá, então queremos contratar alguém para consertar alguns fusíveis (não faço ideia de quantos, mas <EM4>não mais do que três</EM4>, eu acho). Se você puder trazer uma <EM4>Ferramenta de Sucateamento</EM4> com <EM4>canisters de RMC suficientes para consertar uns três canos</EM4>, deve dar certo.\n\nEspero que saiba o que está fazendo, mas caso contrário, o <EM4>“Guia de Manutenção”</EM4> no seu mobiGlas Journal pode ser útil.\n\nStows encerrando.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 4/7\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Jr. Contractor:</EM4> +50 Rep
headhunters_maintenance_local_E_title_001=~mission(Location) PRECISA DE ALGUNS REPAROS <EM4>[25–50 Rep]</EM4>
headhunters_maintenance_local_H_desc_001=Lá em <EM4>~mission(Location|Address)</EM4>, o local foi totalmente destruído em uma tempestade e precisa de alguns reparos sérios. \n\nSe alguém tiver um <EM4>grupo de fusíveis</EM4> (ouvi dizer que <EM4>seis</EM4> devem ser suficientes), uma <EM4>ferramenta de sucateamento</EM4> e <EM4>latas de RMC suficientes para lidar com cerca de oito canos bagunçados</EM4>, nós lhe daremos alguns créditos para fazer o conserto. \n\nEsperamos que você saiba o que está fazendo, mas, por via das dúvidas, talvez valha a pena dar uma olhada no <EM4>“Guia de Manutenção”</EM4> do seu mobiGlas Journal.\n\nStows Desliga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 1/7 | Complexity 1/7 | Risk 1/7 | Knowledge 2/7
headhunters_maintenance_local_H_title_001=~mission(Location) PRECISA DE MUITOS REPAROS
headhunters_maintenance_local_M_desc_001=Enviando uma chamada para qualquer pessoa próxima. Tenho uma ordem de serviço bastante pesada para um de nossos postos avançados em <EM4>~mission(Location|Address)</EM4>. Parece que precisamos de <EM4>seis fusíveis</EM4> consertados. Você também precisará de uma <EM4>ferramenta de sucateamento</EM4> com <EM4>RMC suficiente para consertar cerca de cinco canos</EM4> para impedir que o local desmorone.\n\nSe você trouxer todas as coisas necessárias para consertá-los, nós lhe pagaremos. \n\nEsperamos que você saiba o que está fazendo, mas, por via das dúvidas, talvez valha a pena dar uma olhada no <EM4>“Guia de Manutenção”</EM4> do seu mobiGlas Journal.\n\nStows Desliga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 1/7 | Complexity 1/7 | Risk 1/7 | Knowledge 2/7
headhunters_maintenance_local_M_title_001=~mission(Location) PRECISA DE MUITOS REPAROS
headhunters_multikillship_base_Generic_M_desc_001=Muitas gangues aspirantes se aproximaram dos Headhunters ao longo dos anos pensando que poderiam forçar sua entrada no sistema. Ainda estamos aqui. Eles não estão. Mas parece que os sobreviventes desses grupos decidiram se unir e tentar novamente. Acho que algumas pessoas nunca aprendem.\n\nO último grupo atingiu alguns de nossos comboios durante uma corrida de suprimentos. Não deveria ser uma surpresa que o Juiz queira eliminá-los rapidamente. Soubemos que eles estão perto de ~mission(Location|Address) e provavelmente se rearmando para outro ataque. \n\nQueremos que você vá lá e faça com que eles desejem ter morrido com sua antiga gangue.\n\nStows Desliga\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Defenders x6, Targets x2\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_multikillship_base_Generic_M_title_001=ATAQUE ALGUMAS NAVES <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
headhunters_sabotage_generators_E_CFP_desc_001=Temos grandes planos para acontecer, mas infelizmente a Citizens for Prosperity tem pessoas por perto em ~mission(Location|Address).\n\nComo não posso permitir que esses bastardos estraguem as coisas para nós, quero que você vá lá e destrua os geradores de energia deles.\n\nDevemos mantê-los afastados até terminarmos nossos negócios. \n\n-Stows encerrando\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Jr. Contractor:</EM4> +75 Rep
headhunters_sabotage_generators_E_CFP_title_001=CORTE A ENERGIA DA CITIZENS FOR PROSPERITY <EM4>[75 Rep]</EM4>
headhunters_sabotage_generators_VE_desc_001=Este é um trabalho bem direto. Temos alguns babacas em ~mission(Location|Address) que estão pensando que são melhores do que são. Vá e desligue a energia deles para lembrá-los de que os Headhunters estão no comando.\n\n-Stows Desliga\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Jr. Contractor:</EM4> +25 Rep
headhunters_sabotage_generators_VE_title_001=DESLIGUE A ENERGIA EM ~mission(Location) <EM4>[25 Rep]</EM4>
headhunters_sabotage_generators_multi_M_desc_001=Tenho alguns scavs que se enraizaram em ~mission(Location|Address). Temos nossos próprios planos lá e precisamos limpar o lugar. \n\nÉ por isso que quero que você desligue a energia deles. Vamos ver se isso não faz com que esses ratos abandonem o lugar para sempre.\n\n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Sr. Contractor:</EM4> +200 Rep
headhunters_sabotage_generators_multi_M_title_001=DERRUBE A ENERGIA <EM4>[200 Rep]</EM4>
headhunters_sabotage_servers_E_CFP_desc_001=Resumindo a história - um Headhunter fez uma grande besteira e agora a Citizens for Prosperity colocou as mãos em alguns dados que podem realmente nos causar danos. \n\nO bastardo vai precisar de um tempo para se curar, então você tem que limpar a bagunça. Você pode ir para ~mission(Location|Address) e destruir os servidores que eles armazenaram lá? Quero ter certeza de que não há chance dessas informações vazarem.\n\n-Stows Desliga\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Jr. Contractor:</EM4> +75 Rep
headhunters_sabotage_servers_E_CFP_title_001=LIMPE OS SERVIDORES DA CITIZENS FOR PROSPERITY <EM4>[75 Rep]</EM4>
headhunters_sabotage_servers_H_XT_Title_001=ELIMINE OS SERVIDORES XENOTHREAT <EM4>[75–1,500 Rep]</EM4>
headhunters_sabotage_servers_H_XT_desc_001=Algo caiu no meu colo que é bom demais para deixar passar. A coleta de informações do XenoThreat é uma lenda nos círculos em que corro e descobri que eles estão armazenando um monte de suas melhores informações em ~mission(Location|Address).\n\nSeria uma pena se alguém, digamos como você, fosse lá e explodisse tudo, hein? \n\n-Stows Desliga\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Contractor:</EM4> +75 Rep\n<EM4>Veteran Contractor:</EM4> +1,500 Rep
headhunters_sabotage_servers_M_CFP_desc_001=Acontece que aqueles bastardos do Citizens for Prosperity têm reunido informações sobre nós. Eles vão tentar nos cortar de várias fontes de renda e nos sugar até secar. Não podemos deixar isso acontecer. \n\nVá para ~mission(Location|Address) e destrua o armazenamento de dados deles. \n\nIsso deve ensiná-los a não meter o nariz onde não são chamados.\n\n-Stows Desliga\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Jr. Contractor:</EM4> +75 Rep\n<EM4>Jr. Contractor:</EM4> +200 Rep
headhunters_sabotage_servers_M_CFP_title_001=LIMPE OS DADOS DO CITIZENS FOR PROSPERITY DATA FARM <EM4>[75–200 Rep]</EM4>
headhunters_sabotage_servers_VH_XT_desc_001=Estou tão bravo agora que mal consigo enxergar direito. Um Headhunter em quem eu achava que podia confiar acabou de ir para o XenoThreat. É, alienígenas mataram sua família. Uma merda, mas você não vira as costas para seu povo. \n\nPara piorar a situação, o bastardo deu ao XenoThreat um monte de informações nossas. Tenho outras pessoas rastreando o traidor, mas preciso que você cuide de apagar os dados roubados para mim. Eles estão sendo mantidos em servidores em ~mission(Location|Address).\n\n-Stows Desliga\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Elite Contractor:</EM4> +3,200 Rep
headhunters_sabotage_servers_VH_XT_title_001=LIMPAR SERVIDORES XENOTHREAT <EM4>[3,200 Rep]</EM4>
hurston_RetrieveConsignment_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE TERCEIRIZAÇÃO\n\nCONTRATO: Varredura de instalações e recuperação de pacotes\nAFILIAÇÃO DO CONTRATANTE: Independente\nGERENTE DE TERCEIRIZAÇÃO: G. Livingston\nAVALIAÇÃO DE RISCO: Alto\nCONTRATO URGENTE: Sim\n\nHurston descobriu que o ataque da Nine Tails a ~mission(Location|Address). As nossas forças no terreno sofreram pesadas baixas e já não respondem às comunicações. Relatos iniciais indicam que a gangue estava tentando obter material confidencial que foi entregue recentemente nas instalações. Felizmente, temos salvaguardas que nos devem dar tempo para responder. Precisamos de um agente para ir imediatamente às instalações, recuperar as caixas e movê-las para um local seguro. Você e os reforços que traz consigo estão autorizados a tomar qualquer ação necessária para enfrentar os intrusos. Os suspeitos são considerados armados e perigosos. Hurston não fornecerá suporte material e/ou atualizações sobre a situação das forças de segurança das instalações. \n\nOs materiais confidenciais foram entregues discretamente em uma remessa junto com outras caixas e trancados em nosso cofre automatizado. Os códigos necessários para acessar as caixas estão em blocos de dados mantidos por seguranças seniores. Localize esses blocos de dados e insira os códigos de rastreamento na esteira de pacotes para recuperar as caixas. O pagamento será feito assim que todos os materiais confidenciais forem entregues em ~mission(dropoff1|Address). \n\n\n** As informações enviadas podem conter material confidencial e/ou proprietário. É proibida qualquer revisão, encaminhamento, distribuição ou outro uso destas informações por qualquer pessoa ou entidade que não seja o destinatário pretendido. **\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Guards x4, Hostiles x22
hurston_RetrieveConsignment_title_001=DEFENDA O LOCAL E RECUPERE MATERIAIS CONFIDENCIAIS <EM4>[500–4,000 Rep]</EM4>
hurston_UGF_defend_E_desc_001=HURSTON DYNAMICS\nOUTSOURCING DEPARTMENT\n\nCONTRATO: Proteção de instalações\nCONTRATANTE: Independente\nOUTSOURCE MANAGER: T. Spooner\nAVALIAÇÃO DE RISCO: Alto\nCONTRATO DE ARRECADAÇÃO: Não\n\nUma pequena gangue local tem feito ameaças contra a ~mission(Location|Address) e a Hurston Security está procurando um contratado para montar uma equipe de segurança para proteger a instalação contra quaisquer incursões.\n\nO pagamento será enviado assim que a instalação for confirmada como segura. \n\n\n** As informações transmitidas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x1, Hostiles x10, Private Security x4, Sentries x6\n<EM4>Unknown:</EM4> 11
hurston_UGF_defend_E_title_001=DEFENDA A INSTALAÇÃO CONTRA AMEAÇAS <EM4>[500 Rep]</EM4>
hurston_UGF_defend_VH_desc_001=HURSTON DYNAMICS\nOUTSOURCING DEPARTMENT\n\nCONTRACT: Facility Protection\nCONTRACTOR AFFILIATION: Independent\nOUTSOURCE MANAGER: T. Spooner\nRISK ASSESSMENT: Very High\nRUSH CONTRACT: No\n\nA growing outlaw faction have been making threats against ~mission(Location|Address) e Hurston Security exige que um empreiteiro monte uma equipe de segurança e guardasse a instalação contra qualquer incursões.\n\n\n\n ** As informações transmitidas podem conter material confidencial e/ou privilegiado.Qualquer revisão, retransmissão, disseminação ou outro uso ou ação de dependência dessas informações por pessoas ou entidades que não sejam o destinatário pretendido é proibido.**\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x3, Hostiles x8, Private Security x4, Sentries x4\n<EM4>Unknown:</EM4> 21
hurston_UGF_defend_VH_title_001=DEFENDA A INSTALAÇÃO CONTRA AMEAÇAS PERIGOSOS <EM4>[500 Rep]</EM4>
hurston_UGF_defend_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE TERCEIRIZAÇÃO\nCONTRATO: Proteção de instalações\nAFILIAÇÃO DO CONTRATADO: Independente\nGERENTE DE TERCEIRIZAÇÃO: T. Spooner\nAVALIAÇÃO DE RISCO: Alta\nCONTRATO URGENTE: Nenhum\n\nCriminosos locais fizeram ameaças contra ~mission(Location|Address) . e a Hurston Security está procurando um empreiteiro para montar uma equipe de segurança para proteger a instalação contra quaisquer incursões.\n\nO pagamento será feito assim que a instalação for confirmada como segura. \n\n\n\n** As informações enviadas podem conter material confidencial e/ou confidencial. É proibida qualquer revisão, encaminhamento, distribuição ou outro uso destas informações por qualquer pessoa ou entidade que não seja o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x8, Private Security x4, Sentries x8\n<EM4>Unknown:</EM4> 10
