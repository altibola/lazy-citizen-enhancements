cfp_ChainElimAll_1C_ElimSpec_GenAttack_E_desc_001=Precisamos de qualquer segurança disponível para se reportar a ~mission(Location|Address). Um grupo de indivíduos armados atacou um dos nossos grupos de postos avançados e precisamos desesperadamente de ajuda. Embora o grupo pareça não ser afiliado a nenhuma das gangues conhecidas, recebemos a notícia de que seu líder é ~mission(TargetName), um fora da lei local com uma reputação cruel.\n\nPor favor, saia o mais rápido possível e proteja a área eliminando os fora da lei e ~mission(TargetName|Last).\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Brimstone" Rifle\n- [S1-A] Artimex Arms Lodestone\n- [S1-A] Artimex Core Lodestone\n- [S1-A] Artimex Helmet Lodestone\n- [S1-A] Artimex Legs Lodestone\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x7, Juggernauts x1, Soldiers x5, Technicians x5\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_1C_ElimSpec_GenAttack_E_title_001=ALERTA: ~mission(Location) SOB ATAQUE <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_1C_ElimSpec_HHAttack_M_desc_001=No momento, estamos procurando agentes de segurança qualificados e disponíveis para ir até ~mission(Location|Address) e recuperar uma instalação da CFP que foi tomada pelos Headhunters. \n\nO grupo que está atualmente ocupando o posto avançado está sendo liderado por ~mission(TargetName), um Headhunter de destaque que tem um histórico de agressão contra moradores locais e voluntários da CFP.\n\nPrecisamos que todos os Headhunters sejam protegidos e ~mission(TargetName|Last) eliminado.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Brimstone" Rifle\n- [S1-A] Artimex Arms Lodestone\n- [S1-A] Artimex Core Lodestone\n- [S1-A] Artimex Helmet Lodestone\n- [S1-A] Artimex Legs Lodestone\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x6, Juggernauts x1, Soldiers x7, Technicians x6\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_1C_ElimSpec_HHAttack_M_title_001=PEGANDO DE VOLTA DOS HEADHUNTERS <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_1C_HHAttack_M_desc_001=Acabamos de receber uma comunicação frenética de ~mission(Location|Address) e estamos procurando por especialistas em combate disponíveis para ajudar a repelir um ataque de Headhunter. Ainda há hostis no local e há relatos de várias baixas, então precisamos que isso seja resolvido rapidamente.\n\nFornecerei todos os dados relevantes após a aceitação. Obrigado por sua ajuda.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Fate" Rifle\n- [S1-A] Artimex Arms (Modified)\n- [S1-A] Artimex Core (Modified)\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x6, Soldiers x7, Technicians x7\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_1C_HHAttack_M_title_001=AJUDE A DEFENDER ~mission(Location) DOS HEADHUNTERS <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_2C_ElimSpec_GenAttack_M_desc_001=Vários grupos de CFP perto de ~mission(Location|Address) acabaram de ser atingidos por um grupo de foras da lei liderados por ~mission(TargetName). Estamos procurando por especialistas em combate disponíveis para ajudar a retomar os postos avançados.\n\nPosso fornecer os locais após a aceitação, mas precisamos limpar o posto avançado principal e as instalações de satélite de todas as forças hostis e eliminar ~mission(TargetName|Last), pois é improvável que eles não cessem suas hostilidades se escaparem.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Brimstone" Rifle\n- [S1-A] Artimex Arms Lodestone\n- [S1-A] Artimex Core Lodestone\n- [S1-A] Artimex Helmet Lodestone\n- [S1-A] Artimex Legs Lodestone\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x8, Juggernauts x1, Soldiers x7, Technicians x6\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_2C_ElimSpec_GenAttack_M_title_001=ATAQUE DE FORA DA LEI EM ~mission(Location) <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_2C_ElimSpec_HHAttack_H_desc_001=A Citizens for Prosperity está procurando por agentes de segurança disponíveis para retomar várias antigas instalações do CFP perto de ~mission(Location|Address) do controle do Headhunter. Esses grupos foram violentamente tirados de nós por ~mission(TargetName) e resultaram na morte de muitos voluntários.\n\nTrazer esses postos avançados de volta ao nosso controle ajudará a fornecer mais estabilidade ao sistema. Os relatórios indicam que ~mission(TargetName|Last) tende a se esconder atrás de sua base, então eles provavelmente aparecerão quando você tiver eliminado a maioria dos hostis.\n\nXenoThreat é treinado e motivado para que não desista facilmente.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Brimstone" Rifle\n- [S1-A] Artimex Arms Lodestone\n- [S1-A] Artimex Core Lodestone\n- [S1-A] Artimex Helmet Lodestone\n- [S1-A] Artimex Legs Lodestone\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x7, Juggernauts x1, Soldiers x7, Technicians x8\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_2C_ElimSpec_HHAttack_H_title_001=RETOMANDO OUTPOST DOS HEADHUNTERS <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_2C_ElimSpec_XTAttack_H_desc_001=Procurando por qualquer pessoal de segurança disponível para recuperar vários clusters perdidos anteriormente para os agressores da XenoThreat. Localizados perto de ~mission(Location|Address), eles foram capturados em ataques brutais liderados por ~mission(TargetName), um notório tenente da XenoThreat.\n\nEstamos procurando recuperar esses clusters para que possamos restabelecer as operações e continuar nosso bom trabalho. Você precisará limpar todos os hostis que ainda estão no local, bem como ~mission(TargetName|Last).\n\nSó um lembrete, que a XenoThreat é altamente treinada e rápida para lutar, então prepare-se adequadamente.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Brimstone" Rifle\n- [S1-A] Artimex Arms Lodestone\n- [S1-A] Artimex Core Lodestone\n- [S1-A] Artimex Helmet Lodestone\n- [S1-A] Artimex Legs Lodestone\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x10, Juggernauts x1, Soldiers x8, Technicians x9\n<EM4>Head Contractor:</EM4> +400 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_2C_ElimSpec_XTAttack_H_title_001=RECUPERANDO OUTPOST DA XENOTHREAT <EM4>[BP]</EM4> <EM4>[400 Rep]</EM4>
cfp_ChainElimAll_3C_ElimSpec_GenAttack_M_desc_001=A presença de foras da lei aqui se tornou muito mais ousada ultimamente e muitas pessoas estão se machucando. Perdemos recentemente vários grupos em torno de ~mission(Location|Address). Embora não gostemos de ter que recorrer à violência, o conselho reconheceu que esses locais são cruciais para estabelecer a estabilidade no sistema e autorizou o uso de uma equipe de segurança para retomá-los.\n\nTambém estamos cientes de que os hostis incorporados estão sendo liderados por ~mission(TargetName) que tem um histórico de atacar os interesses do CFP. O conselho gostaria que ~mission(TargetName|Last) fosse tratado para evitar ataques futuros.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Fate" Rifle\n- [S1-A] Artimex Arms (Modified)\n- [S1-A] Artimex Core (Modified)\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x7, Juggernauts x1, Soldiers x8, Technicians x7\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_3C_ElimSpec_GenAttack_M_title_001=PRECISA RETOMAR VÁRIOS OUTPOST DO CFP <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_3C_ElimSpec_HHAttack_VH_desc_001=O conselho da Citizens for Prosperity acaba de autorizar fundos para contratar pessoal de segurança para retomar vários aglomerados perto de ~mission(Location|Address) que caíram nas mãos dos Headhunters. Enquanto tentamos apenas aceitar a perda, ficou claro que eles são cruciais para nossas operações contínuas no sistema.\n\nVocê precisará limpar cada um dos locais que serão fornecidos, mas, mais importante, você também precisará eliminar ~mission(TargetName), que está no comando dos hostis no local.\n\nEsses Headhunters estão fortemente enraizados e têm um histórico de violência, então você deve se preparar adequadamente. \n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Fate" Rifle\n- [S1-A] Artimex Arms (Modified)\n- [S1-A] Artimex Core (Modified)\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x9, Juggernauts x1, Soldiers x8, Technicians x8\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_3C_ElimSpec_HHAttack_VH_title_001=RECUPERANDO CLUSTERS DE HEADHUNTERS <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_ChainElimAll_3C_ElimSpec_XTAttack_VH_desc_001=Embora a Citizens for Prosperity esteja comprometida com a mudança por meios não violentos, tornou-se aparente que exceções podem ter que ser feitas. As zonas seguras da CFP perto de ~mission(Location|Address) foram recentemente e violentamente tomadas pelas forças XenoThreat sob o comando de ~mission(TargetName).\n\nEstamos procurando por quaisquer agentes de combate disponíveis para ajudar a retomar esses postos avançados. Sem dúvida, isso será um esforço difícil, pois a XenoThreat é altamente treinada e ansiosa para lutar, então você deve se preparar adequadamente.\n\nAlém de limpar cada grupo de forças XenoThreat, você precisará eliminar ~mission(TargetName|Last), cuja perda certamente tornará o sistema mais seguro.\n\nBoa sorte,\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Fate" Rifle\n- [S1-A] Artimex Arms (Modified)\n- [S1-A] Artimex Core (Modified)\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 5/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> CQC x16, Juggernauts x1, Soldiers x13, Technicians x11\n<EM4>Head Contractor:</EM4> +400 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_ChainElimAll_3C_ElimSpec_XTAttack_VH_title_001=CAMPANHA PARA RECUPERAR OUTPOST DA XENOTHREAT <EM4>[BP]</EM4> <EM4>[400 Rep]</EM4>
cfp_EliminateAllFF_Desc_001=CFP Pyro EliminateAll FrontierFighters\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x2, Kopions x2, Sentries x1, Soldiers x4, Technicians x2\n<EM4>Neutral:</EM4> +25 Rep
cfp_EliminateAllFF_Title_001=cfp EliminateAllFF Title 001 <EM4>[25 Rep]</EM4>
cfp_EliminateSpecific_Generic_E_desc_001=Relatórios indicam que ~mission(Location|Address) foi atacado por um grupo de indivíduos armados liderados por um notório fora da lei chamado ~mission(TargetName). Houve várias mortes e ferimentos relatados, então a Citizens for Prosperity tem procurado agentes de combate qualificados para fornecer algum suporte. \n\nEmbora não defendamos a resolução de conflitos por meio da violência, acreditamos que o grupo se dispersará se ~mission(TargetName|Last) não estiver lá para liderá-los.\n\nVá até lá o mais rápido possível. Vidas estão em jogo.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x3, Snipers x2, Soldiers x4, Technicians x3\n<EM4>Neutral:</EM4> +75 Rep
cfp_EliminateSpecific_Generic_E_title_001=PROTEÇÃO CONTRA ~mission(TargetName|Last) <EM4>[75 Rep]</EM4>
cfp_HaulCargo_RegionLink_desc_001=Olá, precisamos mover uma carga pelo sistema e queríamos saber se você pode ajudar. Sei que isso está fora do seu escopo habitual, mas estou com poucas opções. Esta também seria uma ótima maneira de mostrar seu comprometimento com a missão maior da Citizens for Prosperity aqui.\n\nSe você for para ~mission(Location|Address), deve haver alguma carga acessível por um elevador de carga que precisaremos que você leve para outro elevador de carga em ~mission(Destination|Address).\n\nA única coisa a ser destacada é que sua nave deve ser capaz de lidar com contêineres de carga ~mission(MissionMaxSCUSize).  Para facilitar sua vida, certifique-se de ter um <EM4>Tractor Beam portátil</EM4> com você. Caso contrário, deve ser uma corrida simples. \n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +200 Rep
cfp_HaulCargo_RegionLink_title_001=PRECISO DE UM TRANSPORTADOR <EM4>[200 Rep]</EM4>
cfp_RetrieveConsignment_desc_001=Você está disponível para um trabalho? Um dos nossos locais seguros foi atacado por bandidos e alguns materiais altamente confidenciais foram roubados. Como você pode imaginar, a Citizens for Prosperity está ansiosa para recuperá-los o mais rápido possível.\n\nGraças a um contato local, conseguimos rastrear os bandidos até ~mission(Location|Address) onde eles estão armazenando os materiais confidenciais dentro de um cofre automatizado seguro. Para acessá-lo, você precisará primeiro encontrar o código de recuperação relevante e inseri-lo no transportador de pacotes do cofre. Nosso melhor palpite é que um dos líderes fora da lei estará carregando o código consigo, então há uma grande chance de você ter que entrar em contato com ele diretamente para obtê-lo.\n \nDepois de obter a posse do material confidencial, queremos que você o entregue para ~mission(Dropoff1|Address).\n\nVocê fará uma grande diferença para muitas pessoas se conseguir fazer isso.\n\nObrigado antecipadamente,\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Hostiles x54
cfp_RetrieveConsignment_title_001=MATERIAL CONFIDENCIAL ROUBADO <EM4>[1,000–4,000 Rep]</EM4>
cfp_bombingrun_E_desc_001=Temos tido problemas crescentes com os foras da lei em ~mission(Location|Address) e não podemos mais ficar parados e assistir enquanto suas ações agressivas prejudicam nossa comunidade. \n\nEstamos cautelosos em lançar um ataque em grande escala, mas acreditamos que se seus estoques de combustível forem eliminados, isso os impedirá de novas ações hostis. \n\nSe você puder, eu agradeceria se você cuidasse da destruição do combustível pessoalmente. Uma nave capaz de lançar mísseis provavelmente faria mais sentido, mas deixo isso para você.\n\nObrigado,\n \nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- A03 Sniper Rifle\n- P6-LR Sniper Rifle\n- [S1-A] A03 Sniper Rifle Magazine (15 cap)\n- [S1-A] Argus Helmet\n- [S1-A] CBH-3 Helmet Base\n- [S1-A] P6-LR Magazine (8 cap)\n- [S1-A] PAB-1 Arms\n- [S1-A] PAB-1 Core\n- [S1-A] PAB-1 Legs\n- [S1-A] TrueDef-Pro Arms\n- [S1-A] TrueDef-Pro Core Base\n- [S1-A] TrueDef-Pro Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_bombingrun_E_title_001=ACABE COM OS ESTOQUES DE COMBUSTÍVEL <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
cfp_bombingrun_sabotage_generators_desc_001=Há um grupo de foras da lei em ~mission(Location|Address) que se tornaram cada vez mais descarados em seus ataques aos ativos da Citizens for Prosperity no sistema. \n\nPara minimizar a perda de vidas, queremos primeiro tentar convencê-los a ir para outro lugar desabilitando seus geradores e destruindo suas reservas de combustível. \n\nEspero que isso seja o suficiente para convencê-los a ir para pastos mais verdes.\n\nObrigado,\n \nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- A03 Sniper Rifle\n- P6-LR Sniper Rifle\n- [S1-A] A03 Sniper Rifle Magazine (15 cap)\n- [S1-A] Argus Helmet\n- [S1-A] CBH-3 Helmet Base\n- [S1-A] P6-LR Magazine (8 cap)\n- [S1-A] PAB-1 Arms\n- [S1-A] PAB-1 Core\n- [S1-A] PAB-1 Legs\n- [S1-A] TrueDef-Pro Arms\n- [S1-A] TrueDef-Pro Core Base\n- [S1-A] TrueDef-Pro Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_bombingrun_sabotage_generators_title_001=REDUZIR A PRONTIDÃO OPERACIONAL DOS FORAS DA LEI <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_bounty_desc_HeadHunters_001=Este é um aviso geral. Soubemos que os Headhunters estão transportando uma grande quantidade de armas para o sistema com a intenção de lançar ataques contra assentamentos de propriedade da CFP.\n\nEmbora acreditemos que a mudança só pode chegar a este sistema por meio da não violência. A presença dessas armas, sem dúvida, causará consideravelmente mais derramamento de sangue e devastação, então queremos removê-las da equação.\n\nQualquer um de nossos apoiadores com treinamento de combate apropriado é solicitado a realizar esta tarefa perigosa perto de ~mission(Location|Address). Nós o compensaremos pelo tremendo risco que você está correndo.\n\nObrigado e fique seguro lá fora,\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Reinforcements x2, Targets x1\n<EM4>Neutral:</EM4> +200 Rep
cfp_bounty_title_HeadHunters_001=PERIGO: ARMAS DE CONTRABANDO CHEGANDO <EM4>[200 Rep]</EM4>
cfp_defend-criminals_desc_001=Soubemos que ~mission(Location|Address) está sob ameaça de ataque por foras da lei e pediu ajuda. Precisamos de alguém para protegê-los e afugentar os foras da lei. \n\nCertifique-se de ficar por perto após o ataque inicial. Muitas vezes, os foras da lei vencem as lutas apenas enviando mais corpos do que qualquer um pode se defender razoavelmente, então certifique-se de lutar contra quaisquer reforços antes de deixar a área. \n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro]</EM4>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM4>[Pyro RegionB]</EM4>\n- Karna "Fate" Rifle\n- [S1-A] Artimex Arms (Modified)\n- [S1-A] Artimex Core (Modified)\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x6, Juggernauts x2, Soldiers x10, Technicians x4\n<EM4>Neutral:</EM4> +75 Rep\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend-criminals_title_001=DEFENDA ~mission(Location) DOS BANDIDOS <EM4>[BP]</EM4> <EM4>[75–200 Rep]</EM4>
cfp_defend-xenothreat_desc_001=Soubemos que a XenoThreat está prestes a lançar um ataque em ~mission(Location|Address). Se eles forem bem-sucedidos, o número de baixas deve ser alto. Espero que, com sua ajuda na defesa deles, possamos garantir que isso não aconteça.\n \nSabemos por encontros anteriores que a XenoThreat envia vários grupos de ataque para realizar seus ataques, então certifique-se de não deixar o posto avançado até que tenha lutado contra todos os reforços. \n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna "Fate" Rifle\n- [S1-A] Artimex Arms (Modified)\n- [S1-A] Artimex Core (Modified)\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x9, Soldiers x7, Technicians x9\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend-xenothreat_desc_002=Urgente!\n\nA XenoThreat está mirando em ~mission(Location|Address) para enviar uma mensagem a outros colonos sobre o que acontece se eles aceitarem nosso apoio. \n\nSe você conseguir se defender dos atacantes, tenho certeza de que eles enviarão forças adicionais, então você precisará se preparar para vários ataques. Como a XenoThreat tem muitos recursos à disposição, você deve pensar em recrutar outros para ajudar a manter todos seguros.\n\nEstamos todos contando com você.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x2, Juggernauts x1, Snipers x2, Soldiers x4, Technicians x4\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend-xenothreat_desc_003=Urgente!\n\nA XenoThreat está se mobilizando para uma incursão massiva para varrer ~mission(Location|Address) do mapa. Você é a única esperança deles de suportar esse ataque e protegê-los da crueldade da XenoThreat.\n\nSei que estou pedindo para você se colocar na linha de fogo, mas esse sistema não mudará a menos que pessoas como você sejam corajosas o suficiente para enfrentar esses perigos. Nenhuma quantidade de créditos pode se comparar ao bem que você estaria fazendo ao intervir.\n\nSe você estiver disposto e for capaz de assumir essa missão, certifique-se de levar alguns aliados com você. A XenoThreat certamente enviará reforços mais fortes quando perceberem que estão sofrendo perdas.\n\nAcreditamos em você.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> CQC x4, Juggernauts x2, Snipers x3, Soldiers x8, Technicians x4\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend-xenothreat_title_001=PROTEJA ~mission(Location) DO ATAQUE DA XENOTHREAT <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_defend-xenothreat_title_002=PROTEJA ~mission(Location) DO ATAQUE DA XENOTHREAT <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
cfp_defend-xenothreat_title_003=PROTEJA ~mission(Location) DA INCURSÃO DA XENOTHREAT <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_defend_boss_Generic_desc_001=Acabamos de receber relatos de um ataque massivo contra ~mission(Location) por um grande grupo de indivíduos armados liderados por ~mission(TargetName), um notório fora da lei que vem ameaçando o pessoal da Citizens for Prosperity há meses. Os detalhes ainda não foram confirmados, mas sabemos que houve várias baixas.\n\nA Citizens for Prosperity está procurando por qualquer pessoal de segurança qualificado para ir e retomar os postos avançados desses elementos hostis. Nosso entendimento é que ~mission(TargetName|Last) tende a se esconder atrás de seus soldados, mas surgirá se você tirar o suficiente da base.\n\nEmbora não gostemos de recorrer à violência, a gerência não vê outra maneira de resolver esta situação e continuar nosso bom trabalho no sistema.\n\nBoa sorte,\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms Canuto\n- [S1-A] Artimex Core Canuto\n- [S1-A] Artimex Helmet Canuto\n- [S1-A] Artimex Legs Canuto\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> CQC x90, Juggernauts x4\n<EM4>Veteran Contractor:</EM4> +800 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend_boss_Generic_title_001=~mission(Location|Address) PRECISA DE AJUDA <EM4>[BP]</EM4> <EM4>[800 Rep]</EM4>
cfp_defend_cave_Generic_desc_001=Recebemos um chamado de socorro de ~mission(Location|Address) dizendo que eles estão sendo roubados por um pequeno grupo de foragidos. ~mission(Location|CaveSize) Embora remoto, este posto avançado é uma parte crucial da infraestrutura da CFP na área, então precisamos recuperá-lo.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x2, Soldiers x6\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend_cave_Generic_title_001=ASSISTÊNCIA NECESSÁRIA EM ~mission(Location) <EM4>[BP]</EM4> <EM4>[25 Rep]</EM4>
cfp_defend_headhunters_H_desc_001=Um chamado de socorro acabou de chegar de ~mission(Location|Address) alegando que uma grande força de Headhunters atacou nosso posto avançado lá. Houve várias mortes e ferimentos daqueles que conseguiram fugir do local. Estamos procurando por qualquer segurança disponível para ir até lá e retomar o posto avançado.\n\nRelatos de testemunhas identificaram os atacantes como agentes de elite dos Headhunters, então tome cuidado e traga ajuda se puder. \n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x2, Snipers x2, Soldiers x6, Technicians x3\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend_headhunters_H_title_001=ATAQUE DA HEADHUNTERS EM ~mission(Location) <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
cfp_defend_headhunters_M_desc_001=Headhunters lançaram um ataque não provocado contra ~mission(Location|Address). Embora não apoiemos o uso de violência, a Citizens for Prosperity não deixará pessoas inocentes morrerem. Precisamos de pessoal de segurança qualificado para retomar o posto avançado.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x1, Juggernauts x1, Snipers x1, Soldiers x3, Technicians x3\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend_headhunters_M_title_001=~mission(Location) PRECISA DE ASSISTÊNCIA <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
cfp_defend_regionshift_desc_001=Recebemos um chamado de socorro de ~mission(Location|Address). Um grupo de assaltantes desconhecidos lançou um ataque. Houve várias mortes relatadas e precisamos recuperar o posto avançado.\n\nSei que isso está longe de sua posição atual, mas estamos desesperados para proteger a área e fazer o posto avançado voltar a funcionar.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM4>[Pyro RegionC]</EM4>\n- Karna Rifle\n- [S1-A] Artimex Arms Canuto\n- [S1-A] Artimex Core Canuto\n- [S1-A] Artimex Helmet Canuto\n- [S1-A] Artimex Legs Canuto\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM4>[Pyro RegionD]</EM4>\n- Karna "Brimstone" Rifle\n- [S1-A] Artimex Arms Lodestone\n- [S1-A] Artimex Core Lodestone\n- [S1-A] Artimex Helmet Lodestone\n- [S1-A] Artimex Legs Lodestone\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x2, Juggernauts x1, Soldiers x6\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defend_regionshift_title_001=PEDIDO DE AJUDA: ~mission(Location) <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
cfp_defendship_Intro_Desc_001=Os Citizens for Prosperity estão precisando de pilotos com experiência em combates. Se você está procurando uma oportunidade para testar suas habilidades, tenho uma missão aqui para você tentar.\n\nUma nave civil solicitou suporte de combate perto de <EM4>~mission(Location|Address)</EM4>. Vá até lá e mostre que você tem as habilidades necessárias para se destacar neste tipo de missão e faremos bom uso de você.\n\nPor favor, esteja ciente de que esta missão não é um exercício de treinamento. Trata-se de um encontro real, então faça o seu melhor para salvar a nave em perigo.\n\nBoa sorte,\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x2\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +50 Rep
cfp_defendship_Intro_title_001=PROCURO POR PILOTOS DE COMBATE EXPERIENTES <EM4>[50 Rep]</EM4>
cfp_defendship_LRT_SB_Desc_001=Preciso de um piloto que consiga se manter firme em um combate aéreo. Uma nave de reconhecimento dos Citizens for Prosperity teve um problema com o Shattered Blade perto de <EM4>~mission(Location|Address)</EM4>. Deve ser uma área de interesse especial para eles. Eles lançaram um ataque quando nossa nave se aproximou e não parecem satisfeitos em apenas afugentar. Parece que estão atrás de sangue.\n\nVocê poderia dar uma ajuda antes que percamos essa nave?\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_LRT_SB_title_001=PRESTE SUPORTE EM UM COMBATE <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
cfp_defendship_LRT_desc_001=Um dos nossos pilotos tinha acabado de pegar um carregamento de suprimentos perto de ~mission(Location|Address) quando foi atacado por alguns sequestradores de naves cruéis. \n\nAcabamos de receber o sinal de socorro deles e espero que você possa ir dar suporte de combate a eles.\n\nQualquer assistência que você puder dar faria toda a diferença.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Jr. Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> 100% chance (Easy only)\n\n<EM4>? = only the Easy variant awards blueprints</EM4>
cfp_defendship_LRT_title_001=PILOTO BUSCANDO APOIO DE COMBATE <EM4>[BP?]</EM4> <EM4>[100–150 Rep]</EM4>
cfp_defendship_MRT_SB_title_001=IMPEÇA ATAQUE À NAVE\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_MRT_bombingrun_desc_001=Um dos nossos está atualmente sob ataque em ~mission(Location|Address). Eles tentaram escapar dos atacantes para chegar em segurança, mas os bandidos provaram ser habilidosos demais para que eles escapassem. \n\nPrecisamos que você voe até lá, entre em contato com os atacantes e destrua as reservas de combustível próximas. A esperança é que essa demonstração de destruição os dissuada de continuar a perseguição.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Friendlies:</EM4> Ships to Defend x2\n<EM4>Veteran Contractor:</EM4> +200 Rep
cfp_defendship_MRT_bombingrun_title_001=AUXILIAR A NAVE EM RETIRADA <EM4>[200 Rep]</EM4>
cfp_defendship_MRT_desc_001=uma nave afiliado à Citizens for Prosperity estava tentando entregar alguns suprimentos para ~mission(Location|Address) quando foi atacado pelos destinatários que não quiseram pagar pela compra e escolheram a violência.\n\nInstruirei nossos comerciantes a serem mais cuidadosos com quem eles lidam no futuro, mas por enquanto, eu realmente apreciaria se você os ajudasse a lutar contra esses atacantes. \n\nAgradecido,\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> 100% chance (Medium only)\n\n<EM4>? = only the Medium variant awards blueprints</EM4>
cfp_defendship_MRT_title_001=NAVE PRECISA DE ASSISTÊNCIA EMERGENTE <EM4>[BP?]</EM4> <EM4>[150–200 Rep]</EM4>
cfp_defendship_VLRT_SB_desc_001=Recebemos uma comunicação de emergência de uma nave dizendo que o Shattered Blade está os assediando. Acredita-se que o piloto tenha chamado a atenção deles se aproximando demais de seu território. O piloto admitiu que não tem muita experiência em combate, então não sei por quanto tempo eles conseguirão resistir.\n\nVocê poderia ir até <EM4>~mission(Location|Address)</EM4> agora para ajudá-los a sobreviver ao ataque?\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x2\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_VLRT_SB_title_001=APOIAR NAVE SOB ATAQUE <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
cfp_defendship_VLRT_desc_001=Parece que uma das rotas que pensávamos ser relativamente seguras provou o contrário. Foras da lei atacaram um dos nossos pilotos em ~mission(Location|Address) e eles não vão durar muito mais sem apoio. \n\nEu apreciaria se você pudesse voar para lá o mais rápido possível e ajudá-los a lidar com esses atacantes.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> 100% chance (VeryEasy only)\n\n<EM4>? = only the VeryEasy variant awards blueprints</EM4>
cfp_defendship_VLRT_title_001=PILOTO EM PERIGO <EM4>[BP?]</EM4> <EM4>[100 Rep]</EM4>
cfp_defendship_multi_HRT_SB_desc_001=Um de nossos comboios está precisando de suporte de combate. Parece que eles encontraram um esconderijo do Shattered Blade enquanto tentavam fazer uma entrega. Agora, apesar de seus melhores esforços, o comboio não consegue escapar. Estamos à procura de um piloto de combate disposto a ir até <EM4>~mission(Location|Address)</EM4> para ajudá-los a combater esse ataque antes que seja tarde.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_multi_HRT_SB_title_001=AJUDAR COMBOIO EMBOSCADO <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
cfp_defendship_multi_HRT_desc_001=Acabamos de receber a notícia de que um comboio de naves afiliadas à Citizen for Prosperity foi alvo de bandidos e que nosso povo precisa urgentemente de assistência. \n\nSe você estiver disponível, precisamos de pilotos prontos para combate em ~mission(Location|Address) para defender nosso povo. Observe que neste momento terrível, não podemos nos dar ao luxo de perder nem mesmo uma única nave e esperamos que, com sua assistência, todo o nosso povo saia vivo.\n\nBoa sorte,\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_multi_HRT_title_001=COMBOIO É PEGO EM ATAQUE BRUTAL <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
cfp_defendship_multi_SRT_SB_desc_001=Um de nossos comboios se meteu em uma situação difícil e está desesperado por ajuda. O Shattered Blade lançou um ataque brutal contra nossas naves em uma área que pensávamos ser segura. Esse comboio está transportando principalmente suprimentos e novos recrutas. Pelas comunicações que estou recebendo, estão resistindo bem, mas não sei por quanto tempo durarão.\n\nSe estiver disponível, precisamos de você em <EM4>~mission(Location|Address)</EM4> pronto para enfrentar algumas forças sérias.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_multi_SRT_SB_title_001=IMPEDIR ATAQUE VIOLENTO DO SHATTERED BLADE <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_defendship_multi_SRT_desc_001=Estou recebendo relatórios de que um comboio dos Citizens for Prosperity, transportando suprimentos vitais, está sendo atacado em <EM4>~mission(Location|Address)</EM4>. Seria um grande golpe para nossas operações se perdermos essa carga.\n\nSe você tem as habilidades de combate para enfrentar hostis altamente agressivos, estamos mais do que dispostos a pagar pela sua ajuda.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_multi_SRT_title_001=VENHA AJUDAR O COMBOIO <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_defendship_multi_VHRT_SB_desc_001=Perdemos o contato com um comboio de suprimentos e estamos preocupados que ele possa estar sendo atacado. O último comunicado que recebemos dizia que naves do Shattered Blade estavam se aproximando, mas não ouvimos mais nada desde então. Você está disponível para ir rapidamente até <EM4>~mission(Location|Address)</EM4> e apoiar nossas forças?\n\nDescobrimos que o Shattered Blade é muito protetor de seus territórios de caça. Nossos últimos encontros com eles foram bem intensos, então eu recomendaria levar uma grande quantidade de fogo pesado.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_multi_VHRT_SB_title_001=COMBOIO SOB ATAQUE <EM4>[BP]</EM4> <EM4>[250 Rep]</EM4>
cfp_defendship_multi_VHRT_desc_001=Um comboio dos Citizens for Prosperity, em uma missão de reabastecimento, ativou um sinal de socorro perto de <EM4>~mission(Location|Address)</EM4>. Eles não estão respondendo a nenhum chamado, então presumo que a situação seja grave. Esse comboio tem alguns pilotos experientes, então se eles não estão respondendo, eles definitivamente precisam de ajuda.\n\nNós vamos compensá-lo para apoiar esse comboio.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_defendship_multi_VHRT_title_001=RESPONDER AO SINAL DE SOCORRO <EM4>[BP]</EM4> <EM4>[250 Rep]</EM4>
cfp_delivery_desc_001=Oi, \n\nRecebemos informação de que o pessoal está esperando uma entrega importante que ainda não chegou. Parece que foi levada por engano para o lugar errado. Enquanto investigamos o que houve, precisamos que alguém vá até <EM4>~mission(Pickup1|Address)</EM4> buscar o pacote <EM4>#~mission(item1|serialnumber)</EM4> e leve para o destino certo em <EM4>~mission(Dropoff1|Address)</EM4>. \n\nAh, e pra facilitar sua vida, é bom levar um <EM4>Tractor Beam portátil/EM4> com você. \n\nTopa essa entrega?\n\nLima Endicott\nCoordenadora de Logística\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_delivery_desc_002=E aí, \n\nPreciso que dois pacotes sejam entregues. O pacote <EM4>#~mission(item1|serialnumber)</EM4> precisa ser retirado em <EM4>~mission(Pickup1|Address)</EM4> e levado para <EM4>~mission(Dropoff1|Address)</EM4>, e o pacote <EM4>#~mission(item2|serialnumber)</EM4> vai de <EM4>~mission(Pickup2|Address)</EM4> até <EM4>~mission(Dropoff2|Address)</EM4>. Boa chance de fazer uns créditos fáceis. \n\nAh, e pra facilitar sua vida, é bom levar um <EM4>Tractor Beam portátil</EM4> com você. \n\nVoa com cuidado, \n\nLima Endicott\nCoordenadora de Logística\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_delivery_desc_003=E aí, \n\nDe vez em quando, os Citizens for Prosperity gostam de surpreender o pessoal nos postos com um presente pra levantar o moral. Já temos o próximo lote pronto, só falta alguém pra fazer as entregas. Quer ajudar a espalhar um pouco de ânimo?\n\nSegue a lista de entregas. Pode fazer na ordem que quiser. \n\n- Pacote <EM4>#~mission(item1|serialnumber)</EM4> vai de <EM4>~mission(Pickup1|Address)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>.\n- Pacote <EM4>#~mission(item2|serialnumber)</EM4> vai de <EM4>~mission(Pickup2|Address)</EM4> para <EM4>~mission(Dropoff2|Address)</EM4>.\n- Pacote <EM4>#~mission(item3|serialnumber)</EM4> vai de <EM4>~mission(Pickup3|Address)</EM4> para <EM4>~mission(Dropoff3|Address)</EM4>.  \n\nAh, e pra facilitar sua vida, é bom levar um <EM4>Tractor Beam portátil</EM4> com você. \n\nValeu,\n\nLima Endicott\nCoordenadora de Logística\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_delivery_desc_004=Oi,\n\nSe queremos que a galera comece a se mudar pra Pyro, precisamos mostrar que os serviços básicos funcionam. Tornar entregas algo confiável, que ninguém precise se preocupar, é exatamente o que os Citizens for Prosperity estão tentando fazer. Quer dar uma força?\n\nTemos várias entregas prontas. Pode fazer na ordem que preferir. O importante é que cheguem no destino. \n\n- Pacote <EM4>#~mission(item1|serialnumber)</EM4> vai de <EM4>~mission(Pickup1|Address)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>.\n- Pacote <EM4>#~mission(item2|serialnumber)</EM4> vai de <EM4>~mission(Pickup2|Address)</EM4> para <EM4>~mission(Dropoff2|Address)</EM4>.\n- Pacote <EM4>#~mission(item3|serialnumber)</EM4> vai de <EM4>~mission(Pickup3|Address)</EM4> para <EM4>~mission(Dropoff3|Address)</EM4>.\n- Pacote <EM4>#~mission(item4|serialnumber)</EM4> vai de <EM4>~mission(Pickup4|Address)</EM4> para <EM4>~mission(Dropoff4|Address)</EM4>.\n\nAh, e pra facilitar sua vida, é bom levar um <EM4>Tractor Beam portátil</EM4> com você. \n\nBoa sorte,\n\nLima Endicott\nCoordenadora de Logística\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_delivery_desc_005=E aí,\n\nParece que rolou um bug no nosso sistema que marcou alguns pacotes como entregues quando, na real, nunca foram. Ainda estamos tentando resolver tudo, mas alguns já conseguimos separar. \n\n- Pacote <EM4>#~mission(item1|serialnumber)</EM4> vai de <EM4>~mission(Pickup1|Address)</EM4> para <EM4>~mission(Dropoff1|Address)</EM4>.\n- Pacote <EM4>#~mission(item2|serialnumber)</EM4> vai de <EM4>~mission(Pickup2|Address)</EM4> para <EM4>~mission(Dropoff2|Address)</EM4>.\n- Pacote <EM4>#~mission(item3|serialnumber)</EM4> vai de <EM4>~mission(Pickup3|Address)</EM4> para <EM4>~mission(Dropoff3|Address)</EM4>.\n- Pacote <EM4>#~mission(item4|serialnumber)</EM4> vai de <EM4>~mission(Pickup4|Address)</EM4> para <EM4>~mission(Dropoff4|Address)</EM4>.\n- Pacote <EM4>#~mission(item5|serialnumber)</EM4> vai de <EM4>~mission(Pickup5|Address)</EM4> para <EM4>~mission(Dropoff5|Address)</EM4>.\n\nSeria ótimo resolver isso o quanto antes, se você estiver disponível. \n\nAh, e pra facilitar sua vida, é bom levar um <EM4>Tractor Beam portátil</EM4> com você. \n\nValeu,\n\nLima Endicott\nCoordenadora de Logística\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_delivery_nodanger_cave_desc_001=pu delivery local legal cave pyro cfp 2\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
cfp_delivery_nodanger_cave_title_001=cfp delivery nodanger cave title 001 <EM4>[500 Rep]</EM4>
cfp_delivery_title_001=Entrega para ~mission(Destination) Pronta <EM4>[50 Rep]</EM4>
cfp_delivery_title_002=VÁRIAS ENTREGAS PRONTAS <EM4>[50 Rep]</EM4>
cfp_destroy_idris_desc_001=Ei, \n\n Os rumores são verdadeiros.A Xenothreat implantou uma Idris para perseguir e atacar cidadãos por operações de Pyro em uma escalada dramática de sua hostilidade em relação a nós.Acabamos de receber a palavra que a nave, sob o comando de ~mission(TargetName), está avançando em direção à ~mission(location|Address).Não podemos obter nossas próprias forças lá rápido o suficiente para combatê -las e precisam desesperadamente de ajuda.\n\nwe está procurando contratar alguém corajoso o suficiente para levá -lo a esses bastardos.Não basta assustá -los, precisamos garantir que isso não pode vir atrás de nós novamente.Não tenho certeza se você já enfrentou uma Idris antes, mas é uma tarefa alta para alguém enfrentar sozinho.Eu recomendo recrutar outras pessoas para a causa.\n\nbest, \n\nlima endicott \nlead Dispatcher \nCitizens for Prosperity \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x15, Targets x1
cfp_eliminateall_XT_E_desc_001=Apesar de nossos esforços para promover a não violência, grupos locais de fora da lei continuam a atacar nossa organização. O XenoThreat recentemente atacou ~mission(Location|Address) e expulsou nossos voluntários que estavam trabalhando lá.\n\nEstamos procurando recrutar pessoal de combate para retomar o posto avançado. Idealmente, poderíamos trabalhar em algo para encorajá-los a seguir em frente, mas o XenoThreat rapidamente recorre à violência para resolver todos os seus problemas, então, sem dúvida, haverá uma luta.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms Canuto\n- [S1-A] Artimex Core Canuto\n- [S1-A] Artimex Helmet Canuto\n- [S1-A] Artimex Legs Canuto\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x4, Technicians x2\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_eliminateall_XT_E_title_001=RECUPERE O OUTPOST XENOTHREAT <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
cfp_eliminateall_fromCFP_Gen_E_desc_001=A Citizens for Prosperity está procurando por operadores de combate disponíveis para ~mission(Location|Address). Um grupo de foras da lei lançou um ataque não provocado e nosso pessoal de segurança precisa desesperadamente de suporte.\n\nPor favor, envie para ~mission(Location) com toda a urgência e boa sorte.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms Canuto\n- [S1-A] Artimex Core Canuto\n- [S1-A] Artimex Helmet Canuto\n- [S1-A] Artimex Legs Canuto\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_eliminateall_fromCFP_Gen_E_title_001=ATAQUE AO OUTPOST DO CFP <EM4>[BP]</EM4> <EM4>[25 Rep]</EM4>
cfp_eliminateall_fromCFP_XT_M_desc_001=As forças da XenoThreat lançaram um ataque não provocado perto de ~mission(Location|Address). Estamos procurando por operadores de combate disponíveis para ir e fornecer suporte. \n\nSe você nunca lidou com eles antes, é importante saber que a XenoThreat são lutadores treinados, então esta não será uma luta fácil, mas é necessária.\n\nBoa sorte,\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms Canuto\n- [S1-A] Artimex Core Canuto\n- [S1-A] Artimex Helmet Canuto\n- [S1-A] Artimex Legs Canuto\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Sr. Contractor:</EM4> +400 Rep\n<EM4>Blueprint Reward:</EM4> 100% chance (XTEliminateAll only)\n\n<EM4>? = only the XTEliminateAll variant awards blueprints</EM4>
cfp_eliminateall_fromCFP_XT_M_title_001=PROTEGENDO O OUTPOST DA XENOTHREAT <EM4>[BP?]</EM4> <EM4>[200–400 Rep]</EM4>
cfp_eliminateall_fromCFP_hh_M_desc_001=Recebemos uma comunicação de emergência de ~mission(Location|Address) relatando que eles estão atualmente sob ataque de um grupo de Headhunters. Sabemos que nossa presença no sistema perturbou os Headhunters, mas isso dificilmente justifica esse ataque não provocado.\n\nSe disponível, reúna seu equipamento e saia. Apenas entenda que os Headhunters são lutadores experientes e não recuarão facilmente.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionC]</EM4>\n- Karna Rifle\n- [S1-A] Artimex Arms Canuto\n- [S1-A] Artimex Core Canuto\n- [S1-A] Artimex Helmet Canuto\n- [S1-A] Artimex Legs Canuto\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM4>[Pyro RegionD]</EM4>\n- Karna "Rager" Rifle\n- [S1-A] Artimex Arms Wildwood\n- [S1-A] Artimex Core Wildwood\n- [S1-A] Artimex Helmet Wildwood\n- [S1-A] Artimex Legs Wildwood\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_eliminateall_fromCFP_hh_M_title_001=DEFENSORES NECESSÁRIOS CONTRA OS HEADHUNTERS <EM4>[BP]</EM4> <EM4>[100–200 Rep]</EM4>
cfp_eliminateall_hh_E_desc_001=A Citizens for Prosperity está procurando pessoal de segurança para tomar um antigo posto avançado da CFP que atualmente serve como esconderijo para os Headhunters lançarem ataques em todo o sistema. \n\nLocalizado perto de ~mission(Location|Address), recuperar este posto avançado permitirá que a CFP forneça maior suporte aos esforços locais para construir estabilidade.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Karna Rifle\n- [S1-A] Artimex Arms\n- [S1-A] Artimex Core\n- [S1-A] Artimex Helmet\n- [S1-A] Artimex Legs\n- [S1-A] Karna Rifle Battery (35 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x4, Technicians x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_eliminateall_hh_E_title_001=RECUPERE O OUTPOST DA HEADHUNTERS <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
cfp_hauling_intro_desc_001=Bem-vindo ao sistema. Não tenho certeza se você conhece nossa organização, mas a Citizens for Prosperity é uma organização sem fins lucrativos dedicada a levar segurança e civilização a sistemas não reivindicados.\n\nSe você está procurando trabalho no sistema e gostaria de ajudar a atingir nossa meta, precisamos que um pacote seja retirado de ~mission(Location|Address) e levado para ~mission(Destination|Address).\n\nDepois de concluído, podemos oferecer a você uma variedade de novas oportunidades de emprego neste sistema e além.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Neutral:</EM4> +25 Rep
cfp_hauling_intro_title_001=PRIMEIRO TRANSPORTE NO SISTEMA <EM4>[25 Rep]</EM4>
cfp_maintenance_E_desc_001=Oi,\n\nUm de nossos postos avançados em <EM4>~mission(Location|Address)</EM4> precisa de reparos leves. A galera no local estimou que você vai precisar de <EM4>três fusíveis</EM4>, uma <EM4>ferramenta de sucateamento</EM4> e <EM4>canisters de RMC suficientes para consertar até três canos</EM4>.\n\nSe precisar de mais informações sobre o trabalho de manutenção, veja a entrada <EM4>“Guia de Manutenção da Cornerstone Developments”</EM4> no seu mobiGlas.\n\nObrigado pela ajuda,\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 4/7\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Jr. Contractor:</EM4> +50 Rep
cfp_maintenance_E_title_001=PEQUENOS REPAROS NECESSÁRIOS ~mission(Location) <EM4>[25–50 Rep]</EM4>
cfp_maintenance_H_desc_001=Precisamos de ajuda. A instalação CFP em <EM4>~mission(Location|Address)</EM4> sofreu sérios danos durante uma recente tempestade elétrica e estamos procurando alguém para ajudar com os reparos.\n\nFazendo a inspeção no local, você precisará trazer <EM4>seis fusíveis</EM4>, uma <EM4>ferramenta de sucateamento</EM4> e <EM4>canisters de RMC suficientes para consertar oito canos</EM4>. Isso deve ser o suficiente para reparar os danos e colocar o posto em operação novamente.\n\nSe precisar de mais informações sobre o trabalho de manutenção, veja a entrada <EM4>“Guia de Manutenção da Cornerstone Developments”</EM4> no seu mobiGlas.\n\nVocê pode ajudar?\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Head Contractor:</EM4> +100 Rep\n<EM4>Head Contractor:</EM4> +400 Rep
cfp_maintenance_H_title_001=REPAROS EXTENSOS NECESSÁRIOS: ~mission(Location) <EM4>[100–400 Rep]</EM4>
cfp_maintenance_M_desc_001=Olá,\n\nRecebemos informações de que uma tempestade devastadora atingiu <EM4>~mission(Location|Address)</EM4> e causou danos nas estruturas. Nosso técnico no local ainda está tentando avaliar o que pode ser consertado, mas não consegue resolver tudo. Se você trouxer <EM4>seis fusíveis</EM4>, uma <EM4>ferramenta de sucateamento</EM4> e <EM4>canisters de RMC suficientes para reparar cerca de cinco canos</EM4>, deveremos ser capazes de cuidar do restante.\n\nSe precisar de mais informações sobre o trabalho de manutenção, veja a entrada <EM4>“Guia de Manutenção da Cornerstone Developments”</EM4> no seu mobiGlas.\n\nObrigado,\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Sr. Contractor:</EM4> +100 Rep
cfp_maintenance_M_title_001=REPAROS MODERADOS NECESSÁRIOS: ~mission(Location) <EM4>[100 Rep]</EM4>
cfp_maintenance_local_E_desc_001=Um de nossos postos próximos, em <EM4>~mission(Location|Address)</EM4>, está sofrendo com falhas mecânicas e precisa de reparos. Nosso técnico usual está em outro serviço, então estamos procurando contratar um profissional externo.\n\nPrecisaremos que <EM4>três fusíveis sejam substituídos</EM4>, e se você puder trazer uma <EM4>ferramenta de sucateamento</EM4> com <EM4>canisters de RMC suficientes para consertar cerca de três canos</EM4>, isso deverá resolver.\n\nSe precisar de mais informações sobre o trabalho de manutenção, veja a entrada <EM4>“Guia de Manutenção da Cornerstone Developments”</EM4> no seu mobiGlas.\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7
cfp_maintenance_local_E_title_001=PEQUENOS REPAROS NECESSÁRIOS: ~mission(Location)
cfp_maintenance_local_M_desc_001=Se você estiver por perto, por favor leia isso.\n\nCitizens for Prosperity está procurando um mecânico qualificado para ir até <EM4>~mission(Location|Address)</EM4> com os materiais necessários e realizar os reparos.\n\nComo está, você precisará de <EM4>seis fusíveis</EM4>, uma <EM4>ferramenta de sucateamento</EM4> e <EM4>canisters de RMC suficientes para consertar cerca de cinco canos</EM4>. Isso deve nos ajudar a colocar o posto novamente em funcionamento. Vamos compensar pelo seu tempo e materiais.\n\nSe precisar de mais informações sobre o trabalho de manutenção, veja a entrada <EM4>“Guia de Manutenção da Cornerstone Developments”</EM4> no seu mobiGlas.\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7
cfp_maintenance_local_M_title_001=REPAROS MODERADOS NECESSÁRIOS: ~mission(Location)
cfp_recovery_desc_001=Olá,\n\nPoderíamos usar sua ajuda.\n\nUma moradora local com quem trabalhamos estava concluindo uma entrega para nós, mas infelizmente, ela encontrou alguns foras da lei e teve que entregar seu ~mission(Item). O lado bom é que os foras da lei não notaram os rastreadores que colocamos na carga e agora sabemos que eles levaram seu carregamento para ~mission(Location|Address). \n\nGostaríamos que você recuperasse os pacotes para nós e terminasse de entregá-los para ~mission(Destination|Address). Não imagino que os foras da lei os entregarão de bom grado, mas eu não pediria que você se colocasse em perigo se esses suprimentos não fossem de importância crítica.\n\nAlém disso, para facilitar sua vida, eu recomendaria que você tivesse um <EM4>Tractor Beam portátil</EM4> com você.\n\nEntão, o que você diz?\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_recovery_tile_001=Suprimentos roubados <EM4>[50 Rep]</EM4>
cfp_sabotage_VH_desc_001=A Citizens for Prosperity tem monitorado um grupo de criminosos muito perigoso em ~mission(Location|Address) e acreditamos que eles estão planejando um grande ataque que pode deixar todo o sistema em convulsão.\n\nPara proteger todo o progresso que fizemos aqui, gostaríamos que você invadisse o complexo deles e destruísse todos os servidores que hospedam seus planos. \n\nIsso deve pelo menos nos dar um alívio suficiente para que eles reconsiderem sua ofensiva.\n\nObrigado,\n \nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_VH_title_001=DESTRUIR SERVIDORES DE DADOS FORA DA LEI <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
cfp_sabotage_generators_M_desc_001=Recebemos a notícia de que os bandidos da ~mission(Location|Address) começaram a recrutar com a esperança de lançar um ataque contra os Citizens for Prosperity. \n\nPara acalmar a situação antes que ela saia do controle, gostaríamos que você desabilitasse os geradores de energia e interrompesse a expansão. \n\nFaça isso e poderá salvar muitas vidas.\n \nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_generators_M_title_001=DEIXE OS FORAS DA LEI EM ~mission(Location) OFFLINE <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
cfp_sabotage_generators_VE_desc_001=Após uma série de ataques contra assentamentos alinhados a Citizens for Prosperity, acreditamos ter rastreado os responsáveis até ~mission(Location|Address).\n\nAtacá-los diretamente representará um risco muito grande e provavelmente incentivará represálias agressivas. Em vez disso, acreditamos que, se os geradores de energia deles forem desativados, isso poderá forçá-los a se estabelecer em outro lugar.\n\nVocê acha que pode cuidar disso para nós? \nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- A03 Sniper Rifle\n- P6-LR Sniper Rifle\n- [S1-A] A03 Sniper Rifle Magazine (15 cap)\n- [S1-A] Argus Helmet\n- [S1-A] CBH-3 Helmet Base\n- [S1-A] P6-LR Magazine (8 cap)\n- [S1-A] PAB-1 Arms\n- [S1-A] PAB-1 Core\n- [S1-A] PAB-1 Legs\n- [S1-A] TrueDef-Pro Arms\n- [S1-A] TrueDef-Pro Core Base\n- [S1-A] TrueDef-Pro Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Jr. Contractor:</EM4> +25 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_generators_VE_title_001=DESABILITE FORTALEZA DOS FORAS DA LEI EM ~mission(Location) <EM4>[BP]</EM4> <EM4>[25 Rep]</EM4>
cfp_sabotage_server_elimiatespecific_HH_desc_001=Estamos apenas juntando o quadro completo agora, mas até agora descobrimos que um Headhunter chamado ~mission(TargetName) recentemente roubou alguns dados confidenciais que, se expostos, serão prejudiciais à causa da Citizens for Prosperity. \n\nPrecisamos garantir que todos os vestígios dos dados roubados sejam erradicados. Isso significa eliminar todos os servidores do Headhunter em ~mission(Location|Address), bem como rastrear ~mission(TargetName|Last) para impedi-los de disseminar ainda mais as informações.\n\nSua ajuda é muito apreciada,\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- A03 Sniper Rifle\n- P6-LR Sniper Rifle\n- [S1-A] A03 Sniper Rifle Magazine (15 cap)\n- [S1-A] Argus Helmet\n- [S1-A] CBH-3 Helmet Base\n- [S1-A] P6-LR Magazine (8 cap)\n- [S1-A] PAB-1 Arms\n- [S1-A] PAB-1 Core\n- [S1-A] PAB-1 Legs\n- [S1-A] TrueDef-Pro Arms\n- [S1-A] TrueDef-Pro Core Base\n- [S1-A] TrueDef-Pro Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Head Contractor:</EM4> +1,500 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_server_elimiatespecific_HH_title_001=ELIMINE TODOS OS VESTÍGIOS DE DADOS DO HEADHUNTER <EM4>[BP]</EM4> <EM4>[1,500 Rep]</EM4>
cfp_sabotage_servers_H_XT_desc_001=Temos um pequeno problema que espero que você possa resolver para mim. Um dos nossos informantes revelou que o XenoThreat vem acumulando dados sobre as operações do Citizens for Prosperity em todo o sistema. \n\nEssas informações, se usadas corretamente, podem colocar nosso pessoal em sério risco. A melhor solução é você destruir completamente os servidores onde os dados estão sendo armazenados em ~mission(Location|Address).\n\nCom seu tesouro de informações eliminado, isso deve dar ao nosso pessoal uma chance de lutar.\n \nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionB]</EM4>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM4>[Pyro RegionD]</EM4>\n- A03 Sniper Rifle\n- P6-LR Sniper Rifle\n- [S1-A] A03 Sniper Rifle Magazine (15 cap)\n- [S1-A] Argus Helmet\n- [S1-A] CBH-3 Helmet Base\n- [S1-A] P6-LR Magazine (8 cap)\n- [S1-A] PAB-1 Arms\n- [S1-A] PAB-1 Core\n- [S1-A] PAB-1 Legs\n- [S1-A] TrueDef-Pro Arms\n- [S1-A] TrueDef-Pro Core Base\n- [S1-A] TrueDef-Pro Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Veteran Contractor:</EM4> +75 Rep\n<EM4>Contractor:</EM4> +75 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_servers_H_XT_title_001=DESTRUIR DADOS LOGÍSTICOS DA XENOTHREAT <EM4>[BP]</EM4> <EM4>[75 Rep]</EM4>
cfp_sabotage_servers_M_HH_desc_001=Os Headhunters atacaram recentemente um dos nossos transportes e infelizmente conseguiram colocar as mãos em alguns dados seguros. Embora a criptografia nele seja forte, é apenas uma questão de tempo até que eles consigam acessá-lo.\n\nAntes que isso aconteça, precisamos que você vá para ~mission(Location|Address) e destrua todos os vestígios de informações dos servidores deles.\n\nVocê realmente estaria ajudando a Citizens for Prosperity se conseguisse fazer isso.\n \nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- A03 Sniper Rifle\n- P6-LR Sniper Rifle\n- [S1-A] A03 Sniper Rifle Magazine (15 cap)\n- [S1-A] Argus Helmet\n- [S1-A] CBH-3 Helmet Base\n- [S1-A] P6-LR Magazine (8 cap)\n- [S1-A] PAB-1 Arms\n- [S1-A] PAB-1 Core\n- [S1-A] PAB-1 Legs\n- [S1-A] TrueDef-Pro Arms\n- [S1-A] TrueDef-Pro Core Base\n- [S1-A] TrueDef-Pro Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Neutral:</EM4> +75 Rep\n<EM4>Jr. Contractor:</EM4> +75 Rep\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_servers_M_HH_title_001=DESTRUIR DADOS ROUBADOS DO HEADHUNTER <EM4>[BP]</EM4> <EM4>[75–150 Rep]</EM4>
cfp_sabotage_servers_VH_XT_desc_001=Um dos membros do Citizens for Prosperity que tem servido como informante do XenoThreat nos informou que os servidores de dados localizados em ~mission(Location|Address) estão abrigando um tesouro de informações vitais para a operação da gangue. \n\nSe vocês pudessem destruir esses servidores em nosso nome, seria uma grande vitória para a segurança de todo o sistema.\n \nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- BR-2 Shotgun\n- FS-9 LMG\n- Gallant Rifle\n- [S1-A] ADP Arms Woodland\n- [S1-A] ADP Core\n- [S1-A] ADP Legs Woodland\n- [S1-A] ADP-mk4 Arms Woodland\n- [S1-A] ADP-mk4 Core Woodland\n- [S1-A] ADP-mk4 Helmet Woodland\n- [S1-A] ADP-mk4 Legs Woodland\n- [S1-A] BR-2 Shotgun Magazine (12 cap)\n- [S1-A] Balor HCH Helmet\n- [S1-A] FS-9 Magazine (75 cap)\n- [S1-A] Gallant Rifle Battery (45 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
cfp_sabotage_servers_VH_XT_title_001=DESTRUIR SERVIDORES DE DADOS XENOTHREAT <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
cfp_searchbody_danger_cave_desc_001=Estamos tentando entrar em contato com o membro da comunidade ~mission(TargetName), mas não temos notícias deles há alguns dias. Pelo que a Citizens for Prosperity conseguiu descobrir, eles estavam explorando perto de ~mission(Location|Address), que é um conhecido ponto de concentração de criminosos.\n\nPrecisamos que alguém vá lá para nós e tente localizá-los, ou, na pior das hipóteses, seus restos mortais. \n\nSe você conseguir encontrá-los, há uma recompensa em oferta.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_searchbody_danger_cave_title_001=DESAPARECIDO: ~mission(TargetName) <EM4>[50 Rep]</EM4>
cfp_searchbody_danger_outpost_desc_001=Infelizmente, um dos nossos parceiros da comunidade, ~mission(TargetName), está desaparecido há alguns dias. A família deles contatou a Citizens for Prosperity para obter ajuda e eu disse a eles que faríamos o que pudéssemos. Dito isso, com tanto tempo passado, não estou muito esperançoso.\n\nSeja qual for o estado atual deles, estamos procurando alguém para ser nossos olhos no chão para isso. Há uma grande chance de que eles estivessem indo para ~mission(Location|Address), uma área conhecida por ser muito perigosa.\n\nSe você puder rastreá-los e confirmar o status deles, de uma forma ou de outra, farei com que você seja devidamente compensado.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_searchbody_danger_outpost_title_001=DESAPARECIDO: ~mission(TargetName) <EM4>[50 Rep]</EM4>
cfp_searchbody_danger_station_desc_001=Ei,\n\nEstou ficando bem preocupado com um dos nossos contratados locais, ~mission(TargetName). Eles terminaram uma troca em ~mission(Location|Address) e não foram vistos desde então. Estamos ouvindo relatos de que bandidos estão se esgueirando para lá, e se isso for verdade, suspeito que o pior pode ter acontecido.\n\nDe qualquer forma, ~mission(TargetName|First) fez um bom trabalho para nós no passado e eu odiaria que eles acabassem como apenas mais um Pyro desaparecido. Se você estiver disposto a encontrá-los para mim, eu vou garantir que você receba uma recompensa. \n\nSó tome cuidado. Odeio que você desapareça também.\n\nObrigado,\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
cfp_searchbody_nodanger_cave_desc_001=~mission(TargetName) é um local que só fez alguns trabalhos para o Citizen for Prosperity, mas eles eram promissores. Isto é, até que eles desapareceram enquanto exploravam ~mission(Location|Address) na semana passada. Infelizmente, não ouvimos sobre isso até hoje. As chances de sobrevivência neste ponto são muito pequenas, mas ainda achamos que vale a pena confirmar o que aconteceu com eles.\n \nO CFP poderia usar ajuda nisso se alguém estiver interessado. E além de ser uma boa ação, o pagamento deve valer a pena o esforço. \n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_searchbody_nodanger_cave_title_001=DESAPARECIDO: ~mission(TargetName) <EM4>[50 Rep]</EM4>
cfp_searchbody_nodanger_outpost_desc_001=Um dos nossos, ~mission(TargetName), deveria estar fazendo um trabalho preliminar de reconhecimento em ~mission(Location|Address), mas eles nunca apareceram. Esperamos que eles tenham tido um pouco de azar, mas muitas vezes aqui fora até o menor passo em falso pode ser fatal.\n\nEu apreciaria que alguém fosse para lá e visse se eles podem ser localizados. Seria ótimo se você os encontrasse vivos, mas se não, algum encerramento é o mínimo que podemos fazer por sua família.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50
cfp_searchbody_nodanger_outpost_title_001=DESAPARECIDO: ~mission(TargetName) <EM4>[50 Rep]</EM4>
cfp_searchbody_nodanger_station_desc_001=Dois moradores locais com quem trabalhamos estavam fazendo sucateamento em ~mission(Location|Address) quando tiveram alguns problemas com equipamentos defeituosos. Um conseguiu escapar, mas seu parceiro, ~mission(TargetName) infelizmente foi deixado para trás.\n\nCom o estado em que foram relatados pela última vez, imagino que não tenham sobrevivido, mas gostaria de ter certeza. Se você estiver disposto, posso usar sua ajuda para encontrar os restos mortais deles.\n\nSe você puder localizá-los, farei com que seja devidamente compensado pelo esforço.\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
claimsweep_desc=~mission(Contractor|ClaimSweepDescription)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Turrets:</EM4> 3 (hostile)
claimsweep_title=~mission(Contractor|ClaimSweepTitle) <EM4>[50 Rep]</EM4>
combatassist_desc=ATENÇÃO: Um relé ECN em seu setor recebeu um sinal de socorro enviado de uma Nave em perigo. Solicita-se a todas as naves disponíveis na área que possam prestar assistência que o façam imediatamente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
commarray_hack_desc=~mission(Contractor|CommArrayHackDescription)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
commarray_repair_desc=~mission(Contractor|CommArrayRepairDescription)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
commarray_repair_title=~mission(Contractor|CommArrayRepairTitle) <EM4>[1,000 Rep]</EM4>
covalex_UGF_collect_desc_001=Olá,\n\nTenho uma entrega que preciso que seja feita. O pedido está aguardando em <EM4>~mission(Location|Address)</EM4> para ser levado para <EM4>~mission(Destination|Address)</EM4>. \n\nTenho certeza de que você ficará bem, mas, para fins de divulgação completa, estou vendo vários avisos de segurança surgirem para esta área. Parece que houve vários ataques nessa área nos últimos dias. Não estou dizendo que você vai se deparar com alguma coisa, mas provavelmente seria melhor se você levasse um pouco de proteção.\n\nBoa sorte,\n\nChase Hewitt\nJr. Coordenador de Logística\nCovalex Shipping \n'Tudo o que você precisar, em qualquer lugar que precisar.'\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Unknown:</EM4> 4
covalex_UGF_collect_title_001=ENTREGADOR PARA COVALEX <EM4>[500 Rep]</EM4>
covalex_delivery_desc_0006=Olá, \n\n~mission(Contractor|Reaction)\n\nEncontramos o contrato de transporte perfeito para você. Há uma remessa esperando em <EM4>~mission(Location|Address)</EM4> para ser levada para <EM4>~mission(Destination|Address)</EM4>. Parece bom, certo? ~mission(Contractor|Timed)~mission(Contractor|Danger)\n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordenador de Logística\nCovalex Shipping \n'Tudo o que você precisar, em qualquer lugar que você precisar.'\n\n\n\n\n\nCovalex Shipping é uma corporação de responsabilidade limitada. Ao aceitar este contrato, você está concordando com todos os termos e condições descritos em nosso 'Independent Workers Supplemental Information Guide v.2948.01.29' estendido. A Covalex Shipping não é responsável por quaisquer danos que ocorram enquanto você estiver operando como um contratado independente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexrand_desc=~mission(description)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0001=Olá,\n\nEntendo perfeitamente se você não quiser me ajudar, mas se puder, seria fantástico.\n\nVeja, meu amigo morreu durante a tragédia de Covalex Gundo. Eles disseram que eu recuperaria todos os pertences de Scott assim que a investigação fosse concluída, mas até onde eu sei já faz um tempo e eles ainda não deram nenhuma indicação de quando poderei recuperar seus bens. Já é difícil lidar com tudo isso, e saber que um pacote vai aparecer em um ou dois meses e abrir todas essas feridas é demais. Eu preferiria fazer isso agora e acabar logo com isso. Se você pudesse encontrar uma maneira de recolher os pertences pessoais dele (ID de Funcionário #104) e deixá-los na ~mission(Destination), eu ficaria muito grato.\n\nObrigado pela sua ajuda,\nAnya\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0002=Meu irmão foi uma das pessoas que morreu quando a estação Covalex explodiu perto de Crusader. O pior é que ele estava pedindo emprestado de mim quando isso aconteceu. Agora algum idiota burocrático quer me dizer que tenho que esperar até receber minhas coisas de volta. Okay, certo. Primeiro você mata meu irmão e agora devo ser paciente? Que atrevimento desses rapazes da empresa. Esqueça isso. Em vez disso, pensei em contratar alguém para pegar minhas coisas com Gundo e trazê-las para a ~mission(destination) para mim. Quero dizer, o que diabos eles podem fazer sobre isso? De qualquer forma, meu irmão teria querido que fosse assim. Será a caixa marcada 156. Ed.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0003=Estou um pouco desconfortável falando sobre isso, mas acontece que Kyomi Santos, uma das pessoas que morreram no desastre da Estação Covalex, deixou algo para mim em seu testamento. Fiquei surpreso ao ouvir isso, mas aparentemente sou agora o orgulhoso proprietário de tudo o que está guardado na Caixa 173. O pessoal da Covalex diz que posso conseguir quando a estação reabrir, mas... essa é a parte desagradável... eu realmente preciso muito dele agora. Normalmente eu apenas esperaria, mas estou tentando começar meu próprio negócio (fazendo bolos no formato de planetas natais) e os créditos que receber por vendê-los serão de grande ajuda. Agora tenho um pouco reservado que posso usar para pagar alguém para entregá-los para mim de Gundo para ~mission(destination). Eu sei que a coisa toda é um pouco irregular, mas se houvesse outra opção eu não perguntaria.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0004=Meu filho Nico infelizmente estava entre as vítimas do trágico acidente na Estação Covelex Gundo e ainda não me devolveram todos os seus pertences pessoais. Entendo que tenham que seguir as regras, mas acho imperdoável que não acomodem os familiares enlutados. Para isso procuro alguém que possa me dirigir até a estação de trem. Para ser claro, Gundo é actualmente considerada uma área restrita, o que significa que não seria aceitável, mas penso que a minha situação merece uma consideração especial. Minha irmã diz que o preço que estou oferecendo é a quantia certa para pegar a caixa com as coisas do Nico (#964) e trazê-la para a ~mission(Destination), então espero encontrar uma pessoa competente que possa resolver esse assunto rapidamente .\n\nAtenciosamente,\nGlória Theolone\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0005=Você disse que eu poderia encontrar alguém aqui para ir até Gundo por mim e pegar uma caixa que pertencia à minha esposa. Se o nome não lhe parece familiar, esta é a estação onde ocorreu o grande acidente. Minha esposa trabalhava para a Covalex e sei que isso não torna a perda dela mais fácil, mas na verdade só quero as coisas da Cláudia de volta. Quando penso na coleção de fotos dela ou no colar que dei para ela, sentada naquela estação de trem fria e morta, em uma caixa marcada com 249, não está certo. Ela merece coisa melhor. Então, como está? Você está pronto para ir até Gundo e arrastar a caixa dela de volta para ~mission(Destination)?\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
covalexspec_description_0006=Olá,\n\nEstou procurando alguém para ir até a estação Covalex Gundo, perto da Crusader, e pegar alguns itens. Sei que isso pode soar como roubo, mas são coisas do meu pai. Ele estava na estação Gundo quando houve o acidente. Minha mãe diz que precisamos esperar até que a Covalex diga, mas não acho justo, pois sinto muita falta dele. Gostaria de ter algo para me lembrar dele e não quero esperar mais, pois posso começar a me esquecer das coisas. Eu lhe pagarei para pegar a caixa 510 para mim e levar para a ~mission(Destination) para que eu possa tê-la.\n\nMuito obrigado,\nBaylor Ward\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
crus_markerhunt_from=Sociedade Histórica dos Crusader\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
crusader_RetrieveConsignment_desc_001=De acordo com relatos, nosso pessoal de segurança em ~mission(Location|Address) foi exterminado por um grupo de Nine Tails que tentava roubar materiais confidenciais recentemente entregues nas instalações. A Crusader Security precisa de um empreiteiro experiente para expulsar os inimigos e proteger os materiais confidenciais. \nCom base nos relatórios iniciais, recomendamos fortemente que você venha bem equipado e traga reforços. Por questões de segurança, os materiais confidenciais foram transportados para lá como parte de uma remessa com outras caixas e trancados em cofre automático. Os códigos de acesso às remessas são armazenados em suportes de dados mantidos por pessoal sênior de segurança. Uma vez encontradas, eles usam os códigos apropriados na esteira de embalagens para retirar as caixas. \n\nQuando você tiver todas as caixas, entregue-as em ~mission(dropoff1|Address) para receber o pagamento.\n\nCONTRATO AUTORIZADO POR: \nLiaison Officer Bautista \nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Guards x4, Hostiles x54
crusader_RetrieveConsignment_title_001=APOIE AS FORÇAS DE SEGURANÇA E PROTEJA AS REMESSAS <EM4>[500–4,000 Rep]</EM4>
crusader_UGF_defend_E_desc_001=A Crusader Security descobriu que ~mission(Location|Address) está atualmente sob ameaça de uma gangue local e estamos procurando um empreiteiro para montar uma equipe de segurança para lidar com possíveis ataques. \n\nEssa turma está ficando um pouco velha, mas no geral eles ainda são bastante inexperientes. Espero que seja relativamente fácil para você e sua equipe lidar com isso.\n\nCONTATO APROVADO POR:\nOficial de Ligação Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x1, Hostiles x10, Private Security x4, Sentries x6\n<EM4>Unknown:</EM4> 11
crusader_UGF_defend_E_title_001=DEFENDA O LOCAL CONTRA INIMIGOS <EM4>[500 Rep]</EM4>
crusader_UGF_defend_VH_desc_001=A Crusader Security descobriu que ~mission(Location|Address) está atualmente sob ameaça de uma gangue conhecida que opera na área e estamos procurando uma equipe de segurança experiente para lidar com quaisquer possíveis ataques. \nTente garantir que todos que você traz consigo sejam devidamente qualificados. Você precisará de toda a ajuda possível para lidar com este grupo.\n\nCONTATO AUTORIZADO POR:\nOficial de Ligação Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x3, Hostiles x8, Private Security x4, Sentries x4\n<EM4>Unknown:</EM4> 21
crusader_UGF_defend_VH_title_001=DEFENDA O LOCAL CONTRA INIMIGOS PERIGOSOS <EM4>[500 Rep]</EM4>
crusader_UGF_defend_desc_001=A Crusader Security descobriu que ~mission(Location|Address) está atualmente sob ameaça de um grupo de criminosos e estamos procurando um contratado para montar uma equipe de segurança para impedir quaisquer ataques. \nSei que você pode ficar tentado a cuidar disso sozinho, mas precisa formar uma equipe para fazer isso. Acredite, não vale a pena tentar os créditos sozinho.\n\nCONTATO APROVADO POR:\nOficial de Ligação Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x8, Private Security x4, Sentries x8\n<EM4>Unknown:</EM4> 10
crusader_UGF_defend_title_001=DEFENDA O LOCAL CONTRA INIMIGOS PERIGOSOS <EM4>[500 Rep]</EM4>
crusader_UGF_destroy_E_desc_001=Descobrimos que um grupo está tentando iniciar seu próprio negócio de drogas em ~mission(Location|Address). O produto que eles fabricam é tóxico e responsável pela morte de vários civis, por isso não podemos nos dar ao luxo de vendê-lo.\n\nEstamos trabalhando em uma operação maior que irá eliminá-los para sempre, mas enquanto isso, devemos interromper o fluxo de suas drogas. É por isso que Crusader quer que você visite a área e destrua o esconderijo que eles têm lá. Eles sem dúvida terão guardas protegendo o esconderijo, mas não espero que representem uma grande ameaça.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Civilians x4
crusader_UGF_destroy_E_title_001=DESTRUA DROGAS ILEGAIS <EM4>[500 Rep]</EM4>
crusader_UGF_destroy_H_desc_001=Um jovem sindicato se estabeleceu em ~mission(Location|Address) e está tentando entrar no mercado de drogas. Infelizmente, seu produto tem sido associado a várias mortes dentro e ao redor do Crusader. A substância é tão poderosa que representa uma séria ameaça ao público. \n\nCrusader está trabalhando para derrubar toda a operação, mas enquanto seu produto estiver por perto, os corpos continuarão se acumulando. \n\nQueremos que você vá até o local e destrua o estoque antes de vendê-lo. No entanto, você deve presumir que seu estoque estará extremamente bem guardado.\n\nCONTATO APROVADO POR:\nOficial de Ligação Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
crusader_UGF_destroy_H_title_001=DESTRUA OS CONTRABANDOS MORTAIS <EM4>[500 Rep]</EM4>
crusader_UGF_destroy_desc_001=Estamos investigando um recente surto de overdoses e parece que todas foram causadas por um lote ruim de medicamentos fabricados em ~mission(Location|Address). Estou trabalhando com outros empreiteiros para encontrar os responsáveis, mas enquanto o produto ainda estiver em circulação, pessoas morrerão. \n\nQuero que você vá até o local e destrua o esconderijo que eles têm lá. Isso deve nos dar algum tempo antes de eliminá-los para sempre. Eles terão guardas protegendo seus suprimentos, então esteja preparado para enfrentar os inimigos.\n\nCONTRATO AUTORIZADO POR:\nOficial de Ligação Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
crusader_UGF_destroy_title_001=DESTRUA DROGAS TÓXICAS <EM4>[500 Rep]</EM4>
crusader_UGF_eliminateall_allies_desc_001=A Crusader Security descobriu que a ~mission(Location|Address) está atualmente sob ameaça de um grupo de criminosos.\n\nEmbora tenhamos pessoal de segurança no local, planejamos contratar prestadores de serviços adicionais para ajudá-los a se defender de quaisquer ataques . \n\nBem, como empreiteiro, não sei se você está acostumado a trabalhar em equipe, mas não quero ouvir falar de "fogo amigo" ou haverá problemas.\n\nCONTATO APROVADO POR: \nOficial de ligação Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
crusader_UGF_eliminateall_allies_desc_intro=Em um esforço para aumentar a segurança do Crusader e seus arredores, a Crusader Security está procurando indivíduos qualificados para ajudar no trabalho de segurança neste setor. \nDeterminamos que você possui as habilidades necessárias para oferecer um contrato experimental inicial. Você ajudará a Crusader Security no combate a um pequeno grupo inimigo que fez ameaças contra ~mission(Location|Address). \n\nObserve que já temos equipe de segurança no local, então você precisa ter cuidado com o fogo amigo.\n\nApós a conclusão bem-sucedida deste contrato, você estará qualificado para se candidatar a funções de segurança futuras assim que estiverem disponíveis.\n\nCONTRATO AUTORIZADO POR:\nOficial de ligação Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
crusader_UGF_eliminateall_allies_desc_rehire=Parabéns! A Crusader Security decidiu dar a você outra chance de se tornar um contratado de segurança. Esperamos que com um pouco de trabalho e esforço você consiga superar quaisquer problemas de desempenho anteriores. \n\nMas primeiro, gostaríamos de pedir que você ajude a Crusader Security a combater um grupo fora da lei que vem fazendo ameaças contra a ~mission(Location|Address).\n\nAgora que você teve problemas de desempenho no passado, quero você lembra que fogo amigo não será tolerado.\n\nApós a conclusão bem-sucedida deste processo, sua elegibilidade será restabelecida e você poderá se inscrever novamente para trabalho de segurança com a Crusader.\n\nCONTATO APROVADO POR:\nOficial de ligação Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
crusader_UGF_eliminateall_allies_title_001=FORNEÇA APOIO <EM4>[500 Rep]</EM4>
crusader_UGF_eliminateall_allies_title_intro=AVALIAÇÃO PARA TRABALHO DE SEGURANÇA <EM4>[500 Rep]</EM4>
crusader_UGF_eliminateall_allies_title_rehire=REVISÃO PARA TRABALHO DE SEGURANÇA <EM4>[500 Rep]</EM4>
crusader_UGF_eliminateall_desc_001=A Crusader Security descobriu que a ~mission(Location|Address) está atualmente sendo usada como base de operações para inúmeras atividades ilegais.\n\nPara acabar com esse "ninho de criminosos", estamos procurando um empreiteiro vá até o local e todos os ocupantes sejam removidos. Se necessário, à força.\n\nCONTATO APROVADO POR:\nOficial de Ligação Bautista\nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Nine Tails x4
crusader_UGF_eliminateall_nocivs_desc_001=A Crusader Security descobriu que ~mission(Location|Address) está sendo usado atualmente como base de operações para inúmeras atividades ilegais.\n\nPara acabar com esse "ninho criminoso", estamos procurando um empreiteiro ir ao local e todos os elementos hostis eliminados. E, só para você saber, essas gangues às vezes enganam os civis para que trabalhem para elas, muitas vezes sob coação. Isto deveria ser desnecessário dizer, mas quando você vê civis, eles precisam ser protegidos. A Crusader Security não pode permitir que um de seus contratados atire em pessoas indiscriminadamente.\n\nCONTATO APROVADO POR:\nOficial de Ligação Bautista\nID# 948J030K\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13\n<EM4>Friendlies:</EM4> Civilians x4
crusader_UGF_eliminateall_title_001=ELIMINE O GRUPO DE CRIMINOSOS <EM4>[500 Rep]</EM4>
crusader_bounty_desc_first=Em um esforço para aumentar a segurança do Crusader e seus arredores, a Crusader Security está procurando indivíduos qualificados para ajudar na coleta de recompensas na área. \n\nDeterminamos que você possui as habilidades necessárias e gostaríamos de lhe oferecer um contrato inicial de recompensa experimental para ~mission(TargetName), visto pela última vez em ~mission(Location|Address). \n\nApós a conclusão bem-sucedida deste contrato, você será colocado na lista de freelancers verificados do Crusader e será elegível para futuras coleções de recompensas assim que estiverem disponíveis.\n\n\nCONTATO APROVADO POR:\nLiaison Officer Bautista\nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
crusader_bounty_desc_rehire=Boas notícias! A Crusader Security decidiu dar a você outra chance de se tornar um empreendedor de recompensas. Esperamos que durante esse período você tenha resolvido todos os problemas de desempenho passados e possa ser útil novamente.\n\nPrimeiro, porém, precisamos reavaliá-lo e gostaríamos que você concluísse este CONTRATO DE CAÇA para ~mission(TargetName). \n\nApós a conclusão bem-sucedida deste exame, você será adicionado novamente à lista de freelancers verificados do Crusader e estará qualificado para recompensas futuras assim que estiverem disponíveis.\n\n\nCONTATO APROVADO POR:\nOficial de ligação Bautista\nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
crusader_bounty_fps_UGF_desc_001=Graças a uma prisão recente, descobrimos a localização de uma recompensa ativa com o nome de ~mission(TargetName). Acredita-se que eles estejam escondidos em ~mission(Location|Address). Você foi autorizado a entrar no local, encontrá-los e resolver a recompensa.\n\nTemos todos os motivos para acreditar que haverá outros elementos criminosos no local, mas, no momento, apenas ~mission(TargetName|Last) é sua preocupação. \n\nCONTRATO AUTORIZADO POR:\nOficial de Ligação Gibbs\nID# 91G66BW0\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
crusader_bounty_fps_UGF_nocivs_desc_001=Tivemos sorte e algumas varreduras recentes de ~mission(Location|Address) revelaram que há uma recompensa aberta escondida lá chamada ~mission(TargetName). Eles foram autorizados a entrar no local, encontrá-los e desmontar a recompensa.\n\nNo entanto, é provável que haja civis no local, além da recompensa e cúmplices criminosos. Embora estejamos ansiosos para ver ~mission(TargetName|Last) concluída, não podemos usar vítimas civis. Tenha cuidado ao enfrentar os inimigos. \nCONTRATO AUTORIZADO POR:\nOficial de Ligação Gibbs\nID# 91G66BW0\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
crusader_bounty_fps_title_001=CAÇA A RECOMPENSA: ~mission(TargetName) (MRT) <EM4>[500–1,000 Rep]</EM4>
crusader_bounty_title_E=RECOMPENSA EMITIDA: ~mission(TargetName) (LRT) <EM4>[500 Rep]</EM4>
crusader_bounty_title_H=RECOMPENSA EMITIDA: ~mission(TargetName) (HRT) <EM4>[500 Rep]</EM4>
crusader_bounty_title_M=RECOMPENSA EMITIDA: ~mission(TargetName) (MRT) <EM4>[500 Rep]</EM4>
crusader_bounty_title_S=RECOMPENSA EMITIDA: ~mission(TargetName) (ERT) <EM4>[500 Rep]</EM4>
crusader_bounty_title_VE=RECOMPENSA EMITIDA: ~mission(TargetName) (VLRT) <EM4>[500 Rep]</EM4>
crusader_bounty_title_VH=RECOMPENSA EMITIDA: ~mission(TargetName) (VHRT) <EM4>[500 Rep]</EM4>
crusader_bounty_title_first=AVALIAÇÃO PARA CAÇADOR FREELANCER <EM4>[500 Rep]</EM4>
crusader_bounty_title_rehire=REVISÃO PARA CAÇADOR FREELANCER <EM4>[500 Rep]</EM4>
crusader_platform_EliminateAll_description_001=Após a última tentativa de cerco, as forças do Nine Tails começaram a realizar ataques direcionados em um esforço para continuar a interromper as operações dos Crusaders. O ataque atual teve como alvo a ~mission(MissionCluster|Address) e é vital que coloquemos um fim à agressão lá. \n\nA Crusader Security está procurando uma empresa contratada disposta a eliminar todos os operadores do Nine Tails na área. Os contratados devem esperar o uso da força e são fortemente encorajados a considerar a possibilidade de trazer reforços. \n\nCONTRATO AUTORIZADO POR:\nOficial de ligação Bautista\nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x20
crusader_platform_EliminateAll_title_001=ACABE COM A INVASÃO EM ORISON <EM4>[500 Rep]</EM4>
crusader_platform_EliminateSpecific_desc=A Crusader Security recebeu informações de que uma invasão do Nine Tails que está ocorrendo atualmente na ~mission(MissionCluster|Address) inclui um importante executor de gangues. Acabar com essa invasão e levar os responsáveis à justiça é uma das principais prioridades da Crusader Security. É por isso que estamos procurando um prestador de serviços disposto a ir à ~mission(MissionCluster|Name) para deter a ameaça e prender o executor que a lidera.\n\nUma vez no local, você precisará esgotar as forças do Nine Tails até conseguir retirar a ~mission(TargetName). \n\nConsiderando a brutalidade empregada pelo Nine Tails durante seu recente cerco, recomendamos que os contratados estejam preparados para usar a força e os incentivamos fortemente a considerar a possibilidade de trazer reforços.\n\nCONTRATO AUTORIZADO POR:\nOficial de Ligação Gibbs\nID# 91G66BW0\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Backup x6, Boss x1, Hostiles x19
crusader_platform_EliminateSpecific_title=CAÇA AO EXECUTOR DA NINE TAILS (HRT) <EM4>[1,000 Rep]</EM4>
crusader_platform_MultiEliminateAll_description_001=Após a última tentativa de cerco, as forças do Nine Tails começaram a realizar ataques direcionados em um esforço para continuar a interromper as operações da Crusader. O ataque atual teve como alvo vários edifícios em ~mission(MissionCluster|Address) e é vital que coloquemos um fim à agressão lá.\n\nA Segurança da Crusader está procurando uma empresa contratada que esteja disposta a eliminar todos os operadores do Nine Tails na área. Os contratados devem esperar o uso da força e são fortemente encorajados a considerar a possibilidade de trazer reforços. \n\nCONTRATO AUTORIZADO POR:\nOficial de ligação Bautista\nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x60
crusader_platform_MultiEliminateAll_title_001=ACABE COM MÚLTIPLAS INVASÕES EM ORISON <EM4>[500–2,000 Rep]</EM4>
crusader_platform_MultiEliminateSpecific_desc=A Crusader Security recebeu informações de que uma incursão do Nine Tails que está ocorrendo atualmente na ~mission(MissionCluster|Address) inclui vários executores de gangues proeminentes. Acabar com essa invasão e levar os responsáveis à justiça é uma das principais prioridades da Crusader Security. É por isso que estamos procurando um prestador de serviços disposto a ir e prender os responsáveis.\n\nEm cada local de ataque, você precisará esgotar as forças do Nine Tails até conseguir atrair o executor responsável. \n\nConsiderando a brutalidade empregada pelo Nine Tails durante seu recente cerco, recomendamos que os contratados estejam preparados para usar a força e os incentivamos fortemente a considerar a possibilidade de trazer reforços.\n\nCONTRATO AUTORIZADO POR:\nOficial de ligação Gibbs\nID# 91G66BW0\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Backup x16, Boss x4, Hostiles x45
crusader_platform_MultiEliminateSpecific_title=CAÇA AOS EXECUTORES DA NINE TAILS (VHRT) <EM4>[1,000–4,000 Rep]</EM4>
crusader_retakelocation_kareah_desc_001=O Security Post Kareah está sob ataque de um número desconhecido de atacantes. \n\nA Crusader está procurando empreiteiros para viajar rapidamente até a estação e eliminar qualquer intruso próximo antes que nossas forças de segurança sejam sobrecarregadas. \n\nNão temos certeza se os invasores têm como alvo o contrabando em nossa sala de evidências ou em nosso banco de dados de Status Criminal, mas seja o que for que estejam planejando, temos que lidar com eles. Você ganha um bônus de combate para cada alvo neutralizado. \nAo aceitar este contrato, você concorda em seguir todos os protocolos de segurança do Crusader: Se você violar qualquer guarda ou outro contratado autorizado enquanto estiver na estação, seu contrato será rescindido e você será marcado como alvo. \n\nO tempo é essencial, mas certifique-se de estar bem equipado para lidar com os inimigos antes de reagir. \n\nCONTRATO AUTORIZADO POR: \nOficial de Ligação Bautista \nID# 948J030K\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
