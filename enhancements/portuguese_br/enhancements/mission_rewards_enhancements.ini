Covalex_LocalDelivery_desc_03=Ei, eu realmente espero que você tenha tempo porque estamos completamente sobrecarregados no momento. Aqui está um pedido local que eu esperava que você pudesse atender. \n\nPACOTES PARA COLETA (CADA PEDIDO)\n· Pacote #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n· Pacote #~mission(item2|serialnumber) de ~mission(Pickup2|Address) \n· Pacote #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n\nLOCAIS DE ENTREGA (CADA PEDIDO)\n· Pacote #~mission(item1|serialnumber) para ~mission(Dropoff1|Address) \n· Pacote #~mission(item2|serialnumber) para ~mission(Dropoff2|Address)\n· Pacote #~mission(item3|serialnumber) para ~mission(Dropoff3|Address)\n\nA propósito, recomendamos fortemente que tragam um <EM4>Tractor Beam portátil</EM4>.   \n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordenador de Logística\nCovalex Shipping \n'Tudo o que você precisa, onde você precisar.'\n\n\n\n\n\n\nA Covalex Shipping é uma sociedade anônima. Ao aceitar este Contrato, você concorda com todos os termos e condições estabelecidos em nosso 'Guia de Informações Suplementares para Trabalhadores Independentes v.2948.01.29' expandido. A Covalex Shipping não se responsabiliza por quaisquer danos incorridos ao atuar como contratante independente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Covalex_LocalDelivery_desc_04=Olá,\n\nTenho uma entrega com seu nome quando você estiver disponível. É difícil, então certifique-se de ter espaço.\n\nPACOTES PARA COLETA (CADA PEDIDO)\n· Pacote #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n· Pacote #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n· Pacote #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n· Pacote #~mission(item4|serialnumber) de ~mission(Pickup4|Address)\n\nLOCAIS DE ENTREGA (QUALQUER SÉRIE)\n· Pacote #~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n· Pacote #~mission(item2|serialnumber) para ~mission(Dropoff2|Address)\n· Pacote #~mission(item3|serialnumber) para ~mission(Dropoff3|Address)\n· Pacote #~mission(item4|serialnumber) para ~mission(Dropoff4|Address)\n\nA propósito, recomendamos fortemente que tragam um <EM4>Tractor Beam portátil</EM4>.   \n\n~mission(Contractor|SignOff)\nChase Hewitt\nJr. Coordenador de Logística\nCovalex Shipping \n'Tudo o que você precisa, onde você precisar.'\n\n\n\n\n\n\nA Covalex Shipping é uma sociedade anônima. Ao aceitar este Contrato, você concorda com todos os termos e condições estabelecidos em nosso 'Guia de Informações Suplementares para Trabalhadores Independentes v.2948.01.29' expandido. A Covalex Shipping não se responsabiliza por quaisquer danos incorridos ao atuar como contratante independente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Covalex_LocalDelivery_desc_05=Olá!\n\nPreciso mover alguns pacotes se você tiver tempo e espaço. Aqui está a lista.\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n· Pacote #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n· Pacote #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n· Pacote #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n· Pacote #~mission(item4|serialnumber) de ~mission(Pickup4|Address)\n· Pacote # ~mission(item5|serialnumber) de ~mission(Pickup5|Address)\n\nLOCAIS DE ENTREGA (QUALQUER SÉRIE)\n· Pacote #~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n· Pacote # ~mission(item2|serialnumber) para ~mission(Dropoff2|Address)\n· Pacote #~mission(item3|serialnumber) para ~mission(Dropoff3|Address)\n· Pacote #~mission(item4|serialnumber) para ~mission(Dropoff4|Address)\n· Pacote #~mission(item5|serialnumber) para ~mission(Dropoff5|Address)\n\nA propósito, recomendamos fortemente que tragam um <EM4>Tractor Beam portátil</EM4>.   \n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordenador de Logística\nCovalex Shipping \n'Tudo o que você precisa, onde você precisar.'\n\n\n\n\n\n\nA Covalex Shipping é uma sociedade anônima. Ao aceitar este Contrato, você concorda com todos os termos e condições estabelecidos em nosso 'Guia de Informações Suplementares para Trabalhadores Independentes v.2948.01.29' expandido. A Covalex Shipping não se responsabiliza por quaisquer danos incorridos ao atuar como contratante independente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Covalex_LocalDelivery_desc_intro=Olá! \n\nA Covalex está atualmente em busca de novos prestadores de serviços de entrega. Para ver se você é material Covalex ou não, configuramos a rota de entrega abaixo para avaliar suas capacidades.\n\nPACOTE PARA COLETA\n· Pacote #~mission(item1|serialnumber) de ~mission(Pickup1|Address) \n\nLOCAIS DE ENTREGA\n· Pacote #~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n\nA conclusão bem-sucedida desta execução irá certificá-lo como um contratante oficial da Covalex.\n\nA propósito, recomendamos fortemente que tragam um <EM4>Tractor Beam portátil</EM4>.   \n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nJr. Coordenador de Logística\nCovalex Shipping \n'Tudo o que você precisa, onde você precisar.'\n\n\n\n\n\n\nA Covalex Shipping é uma sociedade anônima. Ao aceitar este Contrato, você concorda com todos os termos e condições estabelecidos em nosso 'Guia de Informações Suplementares para Trabalhadores Independentes v.2948.01.29' expandido. A Covalex Shipping não se responsabiliza por quaisquer danos incorridos ao atuar como contratante independente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500
Covalex_LocalDelivery_desc_rehire=Olá,\n\nComo a Covalex vem sofrendo com uma abundância de entregas e uma falta de contratados, consegui convencer a administração a reconsiderar seu status. Tudo o que você precisa fazer é concluir com êxito a entrega a seguir e você estará de volta à rotação. \n\nPACTOS PARA RECOLHA (QUALQUER ORDEM)\n · Pacote #~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n · Pacote #~mission(item2|serialnumber) de ~mission(Pickup2|Address)\n · Pacote #~mission(item3|serialnumber) de ~mission(Pickup3|Address)\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n · Pacote #~mission(item1|serialnumber) para ~mission(Dropoff1|Address)\n · Pacote #~mission(item2|serialnumber) para ~mission(Dropoff2|Address)\n · Pacote #~mission(item3|serialnumber) para ~mission(Dropoff3|Address)\n\nA propósito, recomendamos fortemente que tragam um <EM4>Tractor Beam portátil</EM4>.   \n\nBoa sorte. Seria ótimo tê-lo na equipe novamente.\n\nChase Hewitt\nJr. Coordenador de Logística\nCovalex Shipping \n'Tudo o que você precisar, onde você precisar.'\n\n\n\n\n\nCovalex Shipping é uma corporação de responsabilidade limitada. Ao aceitar este contrato, você está concordando com todos os termos e condições descritos em nosso 'Independent Workers Supplemental Information Guide v.2948.01.29' estendido. A Covalex Shipping não é responsável por quaisquer danos que ocorram enquanto você estiver operando como um contratado independente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
