Hockrow_FacilityDelve_P2M2_Repeat_desc=Agência Hockrow \nArquivo de Caso #JD10285\nInvestigador Principal: Arken Mallor\n\nAtualização do Caso:\nPor precaução excessiva, seria bom verificar se os sistemas de segurança captaram algo novo desde o último lote de dados que você entregou. Assim podemos garantir que estamos atualizados sobre o que está acontecendo lá embaixo.\n\nAções do Investigador Contratado:\nExplore a ala de <EM4>Pesquisa</EM4> e <EM4>recupere os dados de Segurança</EM4> e entregue-os a <EM4>~mission(Destination|Address)</EM4>.\n\nNotas Adicionais:\nFique atento a possíveis forças hostis no local.\n\nViaje até Onyx em um veículo que possa ser armazenado em um hangar grande.\n\nAssim que você entregar esses dados, enviarei a você um <EM4>ASD Secure Drive</EM4> que você poderá coletar no seu local de residência.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Fresnel "Rockfall" Energy LMG\n- Zenith "Landslide" Laser Sniper Rifle\n- [S1-A] Corbel Arms Patina\n- [S1-A] Corbel Core Patina\n- [S1-A] Corbel Helmet Patina\n- [S1-A] Corbel Legs Patina\n- [S1-A] Fresnel Energy LMG Battery (165 Cap)\n- [S1-A] Geist Armor Arms\n- [S1-A] Geist Armor Core\n- [S1-A] Geist Armor Helmet\n- [S1-A] Geist Armor Legs\n- [S3-A] Novikov Backpack Patina\n\n<EM3>ITEM REWARDS</EM3>\n- ASD Secure Drive\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
