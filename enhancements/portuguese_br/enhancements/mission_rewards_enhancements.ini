EckhartSecurity_EliminateAll_DC_Desc_001=ECKHART SECURITY, LLC.\nCONTRATOS E DESPACHO\n\nTIPO DE CONTRATO: Limpar Localização\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPROCESSAMENTO IMEDIATO\n\nUm cliente está mandando comunicações desesperadas dizendo que uma de suas instalações está sob ataque. Precisamos de um contratado que possa se mover rápido até <EM4>~mission(Location|Address)</EM4> e limpar o local de qualquer elemento hostil. \n\nDe acordo com o pessoal no local, os fora da lei estão escondidos próximos de <EM4>~mission(Location)</EM4>. Avance com cautela e esteja preparado para usar força letal se resistirem à remoção.\n\nPagamento será feito após a conclusão bem-sucedida do contrato.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações são destinadas apenas para o uso da pessoa ou entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x20, Juggernauts x2, Snipers x4, Soldiers x12, Technicians x2\n<EM4>Security Trainee:</EM4> +500 Rep (Failure: -50)\n<EM4>Security Trainee:</EM4> +500 Rep
EckhartSecurity_EliminateAll_DC_Title_001=EXPULSE FORAS-DA-LEI <EM4>[500 Rep]</EM4>
EckhartSecurity_EliminateAll_storm_data_H_desc_001=ECKHART SECURITY, LLC.\nCONTRATOS E DESPACHOS\n\nTIPO DE CONTRATO: Localização clara\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nRecebemos um pedido urgente da Associated Science & Development para fornecer apoio de combate em ~mission(Location). Aparentemente, eles foram atacados por bandidos e suas forças de segurança não conseguiram lidar com a situação sozinhas. \n\nVocê foi autorizado a ir ao local e ajudar as forças de segurança locais a eliminar os bandidos, mas a ASD reserva-se o direito de restringir seu acesso a determinadas áreas.\n\nEsta é uma operação de combate confirmada, portanto, prepare-se adequadamente.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso da pessoa física ou jurídica designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x4, Soldiers x9, Technicians x4\n<EM4>Applicant:</EM4> +2,000 Rep
EckhartSecurity_EliminateAll_storm_data_H_title_001=Suporte em Combate: ~mission(Location) <EM4>[2,000 Rep]</EM4>
EckhartSecurity_EliminateAll_storm_shut_H_desc_001=ECKHART SECURITY, LLC.\nCONTRATOS E DESPACHOS\n\nTIPO DE CONTRATO: Localização clara\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nRecebemos um pedido de emergência da Associated Science & Development para que todos os operadores disponíveis se apresentem em ~mission(Location) e lidem com alguns hostis que invadiram uma de suas instalações. \n\nUma vez no local, você precisará enfrentar e eliminar quaisquer elementos hostis. A ASD indicou que esta instalação fornece serviços de transporte para um de seus centros de pesquisa integrados, mas deixou bem claro que você não está autorizado a viajar para lá. Invasores serão baleados e você não será exceção, portanto, permaneça na área de operação prescrita.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso da pessoa física ou jurídica designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x4, Soldiers x9, Technicians x4\n<EM4>Applicant:</EM4> +2,000 Rep
EckhartSecurity_EliminateAll_storm_shut_H_title_001=Solicito Ajuda <EM4>[2,000 Rep]</EM4>
EckhartSecurity_EliminateBoss_DC_Desc_001=ECKHART SECURITY, LLC.\nCONTRATOS E DESPACHO\n\nTipo de contrato: Recompensa\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nRecebemos informações úteis sobre uma recompensa perigosa, que se mostrou extremamente evasiva. <EM4>~mission(TargetName)</EM4> foi visto com um contingente dedicado de associados conhecidos em <EM4>~mission(Location|Address)</EM4>. Estamos procurando um contratado pronto e disposto a executar essa recompensa antes que eles desapareçam novamente.\n\nCom base em tentativas anteriores de prender esse criminoso, há uma boa chance de que <EM4>~mission(TargetName|Last)</EM4> tente evitar um confronto direto e, em vez disso, envie seus aliados para confrontá-lo. Acreditamos que neutralizar essas forças de proteção e destruir a rede de segurança que elas fornecem é a melhor maneira de atrair a <EM4>~mission(TargetName|Last)</EM4> para enfrentá-lo diretamente. \n\nEspere enfrentar uma força significativa e habilidosa. Aconselhamos que você se planeje adequadamente. O pagamento será emitido após a conclusão bem-sucedida do contrato.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou da entidade designada acima.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [B-S2-A] Tigerstrike T-19P\n- [B-S4-A] C-788 Cannon\n- [B-S4-A] Revenant Gatling\n- [B-S6-A] Draugar Gatling\n- [MIL-S1-B] Fierell Cascade\n- [MIL-S2-B] UltraFlux\n- [MIL-S3-B] MegaFlux\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x32, Juggernauts x1, Snipers x2, Soldiers x13, Technicians x3\n<EM4>Security Trainee:</EM4> +500 Rep\n<EM4>Jr. Security Contractor:</EM4> +500 Rep\n<EM4>Blueprint Reward:</EM4> 100% chance (EliminateBoss only)\n\n<EM4>? = only the EliminateBoss variant awards blueprints</EM4>
EckhartSecurity_EliminateBoss_DC_Title_001=CAÇA DE ALTO-RISCO: ~mission(TargetName) <EM4>[BP?]</EM4> <EM4>[500 Rep]</EM4>
EckhartSecurity_Mercenary_Rehire_Desc_001=ECKHART SECURITY, LLC.\nCONTRATOS E DESPACHO\n\nTipo de contrato: Teste - Defender Local\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nA Eckhart Security continua a avaliar possíveis novos contratados. De acordo com nossos registros, você já tentou um contrato de teste anteriormente. Entendemos como essa linha de trabalho pode ser exigente e imprevisível e gostaríamos de lhe dar outra chance de concluir um contrato de qualificação. \n\nSe estiver interessado, apresente-se à <EM4>~mission(Location|Address)</EM4> pronto para defendê-la de um ataque de foras da lei. Conclua este contrato com êxito para receber o pagamento e mais oportunidades de trabalho da Eckhart Security.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso do indivíduo ou da entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Boss x1, Hostiles x10, Private Security x4, Sentries x6\n<EM4>Unknown:</EM4> 11\n<EM4>Applicant:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -1,000 Rep
EckhartSecurity_Mercenary_Rehire_Title_001=REAVALIAÇÃO DO CONTRATANTE PARA SEGURANÇA <EM4>[500 Rep]</EM4>
EckhartSecurity_RecoverCargo_Easy_Description=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Recuperar Carga\nCódigo de aprovação: = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nA carga de um cliente estava em transporte quando a nave apresentou problemas, e agora um grupo de fora-da-lei oportunistas está tentando lucrar com isso.\n\nSe aceitar, siga para <EM4>~mission(Location|Address)</EM4> e lide com os fora-da-lei que estão guardando a carga. Extraia-a usando um <EM4>Tractor Beam pesado</EM4>, recupere a carga, carregue em uma nave capaz de transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e entregue no elevador de carga em <EM4>~mission(Destination|Address)</EM4>.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso exclusivo do indivíduo ou entidade mencionados acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Unknown:</EM4> 1\n<EM4>Jr. Contractor:</EM4> +100 Rep
EckhartSecurity_RecoverCargo_Easy_Title=CARGA DE CLIENTE PRECISA SER RECUPERADA <EM4>[100 Rep]</EM4>
EckhartSecurity_RecoverCargo_Hard_Description=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Recuperar Carga\nCódigo de aprovação: = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nTemos um transporte precisando de apoio em <EM4>~mission(Location|Address)</EM4>. O sinal estava falhando, mas nas comunicações deu a entender que um grupo de fora-da-lei descobriu o que eles estavam transportando e tentou roubar a carga.\n\nConsiderando a situação antes de perdermos contato, estou tratando isso como uma missão de recuperação. Vários hostis são esperados no local, então uma equipe experiente é essencial para o sucesso da operação. Haverá um grande volume de carga para lidar, então será necessário uma nave capaz de transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e um <EM4>Tractor Beam pesado</EM4>. \n\nApós extrair a carga com sucesso, entregue no elevador de carga em <EM4>~mission(Destination|Address)</EM4>.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso exclusivo do indivíduo ou entidade mencionados acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Unknown:</EM4> 1\n<EM4>Sr. Contractor:</EM4> +200 Rep
EckhartSecurity_RecoverCargo_Hard_Title=RECUPERAÇÃO DE REMESSA DE ALTO RISCO <EM4>[200 Rep]</EM4>
EckhartSecurity_RecoverCargo_Medium_Description=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Recuperar Carga\nCódigo de aprovação: = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nProcuramos um contratado competente que consiga resolver uma situação complicada. O piloto de confiança de um cliente aparentemente não era tão confiável assim e fugiu com uma remessa. Felizmente, nossos rastreadores indicam que a carga está parada no momento, esperando para ser recolhida. Se jogarmos certo, ainda dá tempo de resolver isso.\n\nA nave abandonada está localizada em <EM4>~mission(Location|Address)</EM4> e será necessário um <EM4>Tractor Beam pesado</EM4> para transportar as mercadorias. Uma nave capaz de lidar com <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> é essencial, e espere contato com quaisquer fora-da-lei para quem esse piloto traíra pretendia vender a carga. \n\nDepois de recuperar, entregue a carga no elevador de carga em <EM4>~mission(Destination|Address)</EM4>.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso exclusivo do indivíduo ou entidade mencionados acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Unknown:</EM4> 1\n<EM4>Contractor:</EM4> +150 Rep
EckhartSecurity_RecoverCargo_Medium_Title=OPERAÇÃO PADRÃO DE RECUPERAÇÃO DE CARGA <EM4>[150 Rep]</EM4>
EckhartSecurity_RecoverCargo_Super_Description=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Recuperar Carga\nCódigo de aprovação: = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nEstamos convocando imediatamente um contratado altamente qualificado para recuperar a carga de um cliente localizada em <EM4>~mission(Location|Address)</EM4>.\n\nO cliente contratou um cargueiro especialista para transportar algo discretamente, mas parece que informações sobre a remessa foram hackeadas ou vazadas. O piloto foi atacado e agora a carga está abandonada. Precisamos que você e quaisquer naves de apoio que trouxer cheguem ao local antes que a carga seja perdida de vez. \n\nVocê vai precisar de um <EM4>Tractor Beam pesado</EM4> e de uma nave capaz de armazenar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>.\n\nApós avaliar a situação e a importância que o cliente deu à recuperação da carga, decidimos oferecer um pagamento elevado pela entrega bem-sucedida da remessa no elevador de carga localizado em <EM4>~mission(Destination|Address)</EM4>.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso exclusivo do indivíduo ou entidade mencionados acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Unknown:</EM4> 1\n<EM4>Head Contractor:</EM4> +300 Rep
EckhartSecurity_RecoverCargo_Super_Title=RECUPERAÇÃO DE CARGA DE RISCO EXTREMO <EM4>[300 Rep]</EM4>
EckhartSecurity_RecoverCargo_VeryEasy_Description=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Recuperar Carga\nCódigo de aprovação: = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nUm dos meus clientes estava transportando uma carga quando foi atacado por um grupo de fora-da-lei. Não conseguimos contato com a tripulação a bordo, mas os rastreadores indicam que a carga continua intacta.\n\nPrecisamos de um contratado que vá até <EM4>~mission(Location|Address)</EM4>, recupere a carga e a entregue no elevador de carga localizado em <EM4>~mission(Destination|Address)</EM4>. Uma nave que possa armazenar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e um <EM4>Tractor Beam pesado</EM4> são essenciais para isso. No momento não detectamos hostis, mas isso pode mudar quando você chegar.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso exclusivo do indivíduo ou entidade mencionados acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2\n<EM4>Unknown:</EM4> 1\n<EM4>Neutral:</EM4> +50 Rep
EckhartSecurity_RecoverCargo_VeryEasy_Title=RECUPERAÇÃO DE CARGA DE BAIXO RISCO <EM4>[50 Rep]</EM4>
EckhartSecurity_RecoverCargo_VeryHard_Description=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Recuperar Carga\nCódigo de aprovação: = ~mission(ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nChamando um contratado experiente para recuperar uma remessa deslocada localizada em <EM4>~mission(Location|Address)</EM4>. O cargueiro do cliente estava transportando uma carga de alto valor quando decidiu responder a um sinal de socorro e acabou caindo em uma emboscada de um grupo de fora-da-lei. O cliente acredita que seu piloto não sobreviveu, mas a carga ainda pode ser recuperada.\n\nAs informações que temos até agora indicam que você precisará de uma nave capaz de transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>, um <EM4>Tractor Beam pesado</EM4> para mover as mercadorias e também naves de apoio para lidar com os fora-da-lei no local. \n\nO cliente espera que a entrega final seja feita no elevador de carga em <EM4>~mission(Destination|Address)</EM4>.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso exclusivo do indivíduo ou entidade mencionados acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Unknown:</EM4> 1\n<EM4>Veteran Contractor:</EM4> +200 Rep
EckhartSecurity_RecoverCargo_VeryHard_Title=EXTRAÇÃO CRÍTICA DE CARGA <EM4>[200 Rep]</EM4>
Eckhart_Assassin_Sync_E_Desc_001=Um preço foi colocado nas cabeças de ~mission(TargetName) e ~mission(TargetName2). \n\nEmbora não seja estranho que dois alvos precisem ser atingidos, o cliente deseja transmitir uma mensagem muito específica e, portanto, os dois alvos precisam ser atingidos exatamente no mesmo momento. Os créditos adicionais devem compensar o esforço.\n\nE como os dois infelizmente não estão viajando juntos, nem é preciso dizer que você precisará de ajuda para conseguir isso. Certifique-se de trazer pessoas em quem você confia para lidar com mais de um Nave, pois os alvos costumam viajar com reforços. \n\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x2
Eckhart_Assassin_Sync_E_Title_001=TOQUE DUPLO <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_H_Desc_001=A missão é para dois alvos que devem ser eliminados ao mesmo tempo. \n\nPresumo que o cliente esteja preocupado porque, se não forem eliminados juntos, um deles se esconderá e tentará se vingar.\n\nEles se autodenominam ~mission(TargetName) e ~mission(TargetName2). \n\nEscolha uma equipe, divida e conquiste.\n\nE certifique-se de que quem quer que seja tenha habilidades, porque esses dois são conhecidos por serem capazes de se defender em uma luta, e você certamente não estará sozinho. Esteja preparado para que eles lhe causem problemas.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x2
Eckhart_Assassin_Sync_H_Title_001=DOIS EM MENTE <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_Intro_Desc_001=Recebi uma tarefa interessante. Preciso eliminar dois alvos diferentes: ~mission(TargetName) e ~mission(TargetName2) \n\nO problema é que se um dos dois alvos descobrir que o outro foi atingido, eles cairão. Não podemos arriscar perder nenhum deles. \n\nIsso exigirá uma coordenação considerável, mas quero que você encontre os dois exatamente ao mesmo tempo. \nE como você não pode estar em dois lugares ao mesmo tempo, você precisa encontrar alguém em quem possa confiar para ajudá-lo.\n\nFelizmente, minhas informações dizem que ambos os destinos devem viajar sozinhos. Isso deve tornar as coisas um pouco mais fáceis para você.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x1, Targets x2
Eckhart_Assassin_Sync_Intro_Title_001=DERRUBADA COORDENADA <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_M_Desc_001=Tenho a tarefa de eliminar dois homens promissores que estão causando problemas. Tem que estar limpo, as duas coisas têm que ser feitas ao mesmo tempo, senão podem causar mais problemas. Resumindo, você vai precisar de ajuda com isso.\n\nTanto ~mission(TargetName) quanto ~mission(TargetName2) sabem como lidar com eles mesmos, e nem as pessoas com quem voam para desprezar. Você pode esperar que cada um deles seja guardado por alguns Naves.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x2
Eckhart_Assassin_Sync_M_Title_001=ELIMINAÇÃO DUPLA <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_S_Desc_001=Normalmente o par ~mission(TargetName) e ~mission(TargetName2) seria demais para incluir juntos. Ambos são os melhores quando se trata de combates aéreos, e a tripulação com quem voam é quase tão boa.\n\nMas recentemente eles se separaram - não sei por que - e estão voando separados por um momento. Alguém acha que esta é a melhor chance de eliminá-los. \n\nReúna algumas pessoas em quem você possa confiar e planeje um ataque simultâneo aos dois alvos. É muito perigoso arriscar que algum deles permaneça vivo após um ataque tão direto.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x2
Eckhart_Assassin_Sync_S_Title_001=DIVIDIR E CONQUISTAR <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_VE_Desc_001=Eu tenho outro par que precisa ser eliminado: ~mission(TargetName) e ~mission(TargetName2)\n\nEles estão no vento há alguns dias, mas acabaram de ressurgir. Se não os conseguirmos agora, não tenho certeza se teremos outra chance. Você precisará trazer um parceiro para garantir que ambos os alvos sejam atingidos ao mesmo tempo.\n\nNo que diz respeito a resistir, ~mission(TargetName) é conhecido por trazer um amigo para protegê-lo, e eu suspeito que ~mission(TargetName2) fará o mesmo.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x2, Targets x2
Eckhart_Assassin_Sync_VE_Title_001=COMBINAÇÃO UM-DOIS <EM4>[500 Rep]</EM4>
Eckhart_Assassin_Sync_VH_Desc_001=~mission(TargetName) e ~mission(TargetName2).\n\nDois agentes sérios que recentemente decidiram agir contra seu chefe. Cada um dos dois viaja com uma armada pequena e bem treinada e penetra profundamente em território que não lhes pertence. Você e qualquer pessoa que você recrutar para ajudar irão eliminá-los, ambos ao mesmo tempo, para que eles não possam se reagrupar.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x2
Eckhart_Assassin_Sync_VH_Title_001=COMBINAÇÃO MORTAL <EM4>[500 Rep]</EM4>
Eckhart_EscortShips_E_desc=ECKHART SECURITY, LLC.\nCONTRATOS E DESPACHO\n\nTIPO DE CONTRATO: Escolta de Naves\nCódigo de aprovação = ~mission(ApprovalCode)\n\nPROCESSAMENTO IMEDIATO\n\nUm grupo de naves em <EM4>~mission(Location|Address)</EM4> está pedindo escolta. Se aceitar, vá até o local imediatamente e aguarde instruções. O cliente afirma que é apenas uma medida de precaução, mas não baixe a guarda. Espere encontrar forças hostis e lide com elas de forma adequada.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações são destinadas apenas para o uso da pessoa ou entidade designada acima.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] M3A Cannon\n- [E-S2-A] M4A Cannon\n- [E-S3-A] M5A Cannon\n- [STH-S1-C] Shimmer\n- [STH-S2-C] Obscura\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4, Hostiles x2, Reinforcements x8\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Eckhart_EscortShips_E_title=DETALHE DE PROTEÇÃO EXECUTIVA <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Eckhart_EscortShips_H_desc=ECKHART SECURITY, LLC.\nCONTRATOS E DESPACHO\n\nTIPO DE CONTRATO: Escolta de Naves\nCódigo de aprovação = ~mission(ApprovalCode)\n\nPROCESSAMENTO IMEDIATO\n\nPrecisamos de um contratado que possa se apresentar agora. Um cliente se meteu em encrenca em <EM4>~mission(Location|Address)</EM4> e precisa de uma escolta para escapar de uma base de asteroides. Relataram várias naves hostis bem armadas, então você vai precisar de uma equipe sua pra lidar com elas. Pelo relato do cliente, os atacantes parecem bem determinados e não vão recuar fácil.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações são destinadas apenas para o uso da pessoa ou entidade designada acima.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [B-S1-A] Havoc Scattergun\n- [B-S2-A] Hellion Scattergun\n- [B-S3-A] Predator Scattergun\n- [E-S3-A] Quarreler Cannon\n- [STH-S1-A] Mirage\n- [STH-S2-A] Umbra\n- [D-S1-A] Suckerpunch Cannon\n- [D-S2-A] Suckerpunch-L Cannon\n- [D-S3-A] Suckerpunch-XL Cannon\n- [STH-S1-B] Veil\n- [STH-S2-B] Sheut\n- [E-S1-A] M3A Cannon\n- [E-S2-A] M4A Cannon\n- [E-S3-A] M5A Cannon\n- [STH-S1-C] Shimmer\n- [STH-S2-C] Obscura\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x5, Hostiles x3, Interdiction Ships x2, Reinforcements x16\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
