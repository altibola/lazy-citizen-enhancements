Eckhart_EscortShips_S_desc=ECKHART SECURITY, LLC.\nCONTRATOS E DESPACHO\n\nTIPO DE CONTRATO: Escolta de Naves\nCódigo de aprovação = ~mission(ApprovalCode)\n\nPROCESSAMENTO IMEDIATO\n\nEste contrato só deve ser considerado pelos pilotos mais capazes. Um cliente de alto valor está atualmente sob ataque em <EM4>~mission(Location|Address)</EM4> e precisa de extração imediata. Eles estão prontos no hangar, mas não podem sair até que as naves hostis na área sejam neutralizadas. \n\nOs fora da lei não parecem dispostos a recuar, e o cliente informou que estão equipados com armamento pesado. Isso vai testar tanto sua habilidade quanto sua resistência. Monte sua equipe e vá pra lá agora mesmo.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações são destinadas apenas para o uso da pessoa ou entidade designada acima.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [B-S1-A] Havoc Scattergun\n- [B-S2-A] Hellion Scattergun\n- [B-S3-A] Predator Scattergun\n- [E-S3-A] Quarreler Cannon\n- [STH-S1-A] Mirage\n- [STH-S2-A] Umbra\n- [D-S1-A] Suckerpunch Cannon\n- [D-S2-A] Suckerpunch-L Cannon\n- [D-S3-A] Suckerpunch-XL Cannon\n- [STH-S1-B] Veil\n- [STH-S2-B] Sheut\n- [E-S1-A] M3A Cannon\n- [E-S2-A] M4A Cannon\n- [E-S3-A] M5A Cannon\n- [STH-S1-C] Shimmer\n- [STH-S2-C] Obscura\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x10, Hostiles x3, Interdiction Ships x6, Reinforcements x20\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
