mgClovus_opensalvage_desc_001=O destino nos abençoou mais uma vez. Acabei de saber de uma batalha perto da ~mission(Location), longe dos olhares indiscretos de quaisquer instalações de comunicação intrusivas, e reforços de ambas as forças envolvidas ainda não foram enviados. Isto significa que há uma oportunidade para uma alma empreendedora limpar o cemitério. Gostaria de estender esta oportunidade a todos os meus contatos de confiança. Todos os interessados podem ter o lugar... pelo preço certo. As coordenadas serão fornecidas a você assim que você aceitar o contrato e permanecerão disponíveis até que você decida rescindi-lo.\n\É claro que a velocidade é essencial, pois você não apenas enfrentará a concorrência potencial de outras empresas de recuperação, mas também com a possibilidade iminente de chegada de reforços para monitorar o campo de batalha. \n\nSe você ainda hesitar, lembre-se de que a sorte favorece os corajosos.\n\n-cd\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Friendlies:</EM4> Salvageable Ships x8
