foxwell_DefendShip_E_desc_001=A Foxwell está procurando um piloto de combate disponível para fornecer assistência imediata a uma ~mission(Ship) sob ataque por ~mission(Location|Address). Não identificamos os perpetradores do ataque, mas nos garantiram que é uma força pequena.\n\nPor favor, despache rapidamente e elimine todos os hostis. Precisamos que o cliente passe por isso, pois eles ainda não nos pagaram.\n\nBoa sorte,\n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança, do seu jeito'\n\nA Foxwell Enforcement é uma especialista em segurança vinculada licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntar à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes contratados.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x3\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Blueprint Reward:</EM4> Guaranteed
foxwell_DefendShip_E_title_001=CONTRATO DE NÍVEL AMARELO: NAVE SOB ATAQUE <EM4>[BP]</EM4>
foxwell_DefendShip_H_desc_001=Um contrato de emergência acabou de chegar sobre uma briga perto de ~mission(Location|Address). Aparentemente, um grupo de naves foi emboscado por bandidos liderados por ~mission(TargetName), que é procurado em vários planetas por assassinato e roubo de nave. A Foxwell está procurando pilotos de combate de alto nível para proteger os clientes contra eles.\n\nEste foi sinalizado como um contrato de nível vermelho, então é realmente perigoso. Se você tiver pessoas que possa trazer, provavelmente deveria. Se tiver, também deve informá-las sobre as políticas de contratação da Foxwell. \n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança, do seu jeito'\n\nA Foxwell Enforcement é uma especialista em segurança vinculada licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntar à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostiles x9\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Blueprint Reward:</EM4> Guaranteed
foxwell_DefendShip_H_title_001=CONTRATO DE NÍVEL VERMELHO: NAVE SOB ATAQUE <EM4>[BP]</EM4>
foxwell_DefendShip_M_desc_001=Tenho um contrato de nível laranja para qualquer piloto de combate disponível. Uma ~mission(Ship) está sob ataque em torno de ~mission(Location|Address) e precisa desesperadamente de assistência. Não temos certeza de quantos perpetradores existem, mas eles parecem motivados e perigosos, então tenha cuidado.\n\nUma vez no local, envolva e destrua quaisquer hostis que encontrar e proteja o cliente. Depois que eles transferirem os créditos, encaminharemos seu pagamento.\n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança, do seu jeito'\n\nA Foxwell Enforcement é uma especialista em segurança vinculada licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntar à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Blueprint Reward:</EM4> Guaranteed
foxwell_DefendShip_M_title_001=CONTRATO DE NÍVEL LARANJA: ~mission(Ship) PRECISA DE ASSISTÊNCIA <EM4>[BP]</EM4>
