UDM_UGF_collect_desc_001=Saudações, parceiro de remessa qualificado!\n\nSe você está procurando trabalho como piloto de entregas, temos a oportunidade perfeita para você! \n\nUma coleta está aguardando em <EM4>~mission(Location|Address)</EM4> para ser entregue em <EM4>~mission(Destination|Address)</EM4>. Parece divertido, certo? \n\nAviso, houve vários alertas de segurança sinalizados na área. Não se esqueça de trazer algumas medidas defensivas para que você possa se manter seguro.\n\nSe isso parece ser algo em que você está interessado, aceite esta oferta imediatamente! \n\nEstamos ansiosos para trabalhar com você,\n\nUnified Distribution Management\n -Delivering the Total Package-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Unknown:</EM4> 4
UDM_UGF_collect_title_001=COLETA DE PACOTES UDM <EM4>[500 Rep]</EM4>
UDM_courier_dc_small_title_001=ROTA LOCAL DA UDM <EM4>[500–1,000 Rep]</EM4>
UDM_courier_fromdc_med_desc_001=Greetings Qualified Shipping Partner!\n\nHoje é o dia perfeito para ganhar alguma experiência adicional de remessa em primeira mão.\n\nSe você tem uma nave com armazenamento adequado, há um número razoável de pacotes na ~mission(Pickup1) na ~mission(Pickup1|Address) prontos para serem entregues. \n\nFale sobre uma grande oportunidade de crescimento na carreira. \n\nPACKAGES FOR PICK UP \n - Todos os pacotes na ~mission(Pickup1) na ~mission(Pickup1|Address)\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n · Pacote #~mission(item1|serialnumber) para a ~mission(Dropoff1|Address)\n · Pacote #~mission(item2|serialnumber) para a ~mission(Dropoff2|Address)\n · Pacote #~mission(item3|serialnumber) para a ~mission(Dropoff3|Address)\n · Pacote #~mission(item4|serialnumber) para a ~mission(Dropoff4|Address)\n · Pacote #~mission(item5|serialnumber) para a ~mission(Dropoff5|Address)\n · Pacote #~mission(item6|serialnumber) para a ~mission(Dropoff5|Address)\n · Pacote #~mission(item7|serialnumber) para a ~mission(Dropoff6|Address)\n · Pacote #~mission(item8|serialnumber) para a ~mission(Dropoff6|Address)\n · Pacote #~mission(item9|serialnumber) para a ~mission(Dropoff7|Address)\n · Pacote #~mission(item10|serialnumber) para a ~mission(Dropoff7|Address)\n\nEstamos ansiosos para trabalhar com você, \n\nGerenciamento de Distribuição Unificada\n - Entregando o Pacote Total-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
UDM_courier_fromdc_small_desc_001=Greetings Qualified Shipping Partner!\n\nSe você está procurando uma maneira simples de ganhar créditos, não procure mais! Há alguns pacotes esperando para serem entregues na ~mission(Pickup1|Address) em ~mission(Pickup1). \n\nPACOTES PARA COLETA \n - Todos os pacotes na ~mission(Pickup1) na ~mission(Pickup1|Address)\n\nLocais de entrega (QUALQUER ORDEM)\n · Pacote #~mission(item1|serialnumber) para a ~mission(Dropoff1|Address)\n · Pacote #~mission(item2|serialnumber) para a ~mission(Dropoff2|Address)\n     · Pacote #~mission(item3|serialnumber) para a ~mission(Dropoff3|Address)\n · Pacote #~mission(item4|serialnumber) para a ~mission(Dropoff4|Address)\n · Pacote #~mission(item5|serialnumber) para a ~mission(Dropoff5|Address)\n\nEstamos ansiosos para trabalhar com você, \n\nGerenciamento de Distribuição Unificada\n - Entregando o Pacote Total-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_courier_todc_med_desc_001=Greetings Qualified Shipping Partner!\n\nPronto para tentar entregar uma remessa considerável de pacotes? Então, que tal você ajudar a levar essa remessa para a ~mission(Dropoff1) em ~mission(Dropoff1|Address). Basta liberar espaço suficiente em sua nave primeiro e tudo estará pronto! \n\nPACTOS PARA RECOLHA (QUALQUER ORDEM) \n · Pacote #~mission(item1|serialnumber) da ~mission(Pickup1|Address)\n · Pacote #~mission(item2|serialnumber) da ~mission(Pickup2|Address)\n · Pacote #~mission(item3|serialnumber) da ~mission(Pickup3|Address)\n · Pacote #~mission(item4|serialnumber) da ~mission(Pickup4|Address)\n · Pacote #~mission(item5|serialnumber) da ~mission(Pickup5|Address)\n · Pacote #~mission(item6|serialnumber) da ~mission(Pickup5|Address)\n · Pacote #~mission(item7|serialnumber) da ~mission(Pickup6|Address)\n · Pacote #~mission(item8|serialnumber) da ~mission(Pickup6|Address)\n · Pacote #~mission(item9|serialnumber) da ~mission(Pickup7|Address)\n · Pacote #~mission(item10|serialnumber) da ~mission(Pickup7|Address)\n\nLOCAL DE ENTREGA\n - Todos os pacotes entregues para a ~mission(Dropoff1) na ~mission(Dropoff1|Address)\n\nEstamos ansiosos para trabalhar com você, \n\nGerenciamento de Distribuição Unificada\n - Entregando o Pacote Total-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
UDM_courier_todc_small_desc_001=É UM PRAZER PARCEIRO QUALIFICADO!\n\nInteressado em uma rota de remessa simples sem muitas complicações? \nEntão, levar alguns pacotes para ~mission(Dropoff1) em ~mission(Dropoff1|Address) deve ser o trabalho perfeito para você! \nPACOTES PARA COLETA (QUALQUER ORDEM) \n · Pacote #~mission(item1|serialnumber) da ~mission(Pickup1|Address)\n · Pacote #~mission(item2|serialnumber) da ~mission(Pickup2|Address)\n · Pacote #~mission(item3|serialnumber) da ~mission(Pickup3|Address)\n · Pacote Pacote #~mission(item4|serialnumber) da ~mission(Pickup4|Address)\n · Pacote #~mission(item5|serialnumber) da ~mission(Pickup5|Address)\n\nLOCAL DE ENTREGA\n - Todos os pacotes entregues à ~mission(Dropoff1) na ~mission(Dropoff1|Address)\n\nEstamos ansiosos para trabalhar com você, \n\nGerenciamento de Distribuição Unificada\n - Entregando o Pacote Total-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_internaldelivery_dc_desc_001=Saudações, manipulador de pacotes qualificado!\n\nAnsioso para mergulhar no mundo complexo do gerenciamento de armazenamento e do realinhamento de instalações? Então não perca esta oportunidade de ajudar na organização dos seguintes pacotes em ~mission(location|Address).\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n · Pacote #~mission(item1|serialnumber) da ~mission(Pickup1)\n · Pacote #~mission(item2|serialnumber) da ~mission(Pickup2)\n\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n · Pacote #~mission(item1|serialnumber) para a ~mission(Dropoff1)\n · Pacote #~mission(item2|serialnumber) para ~mission(Dropoff2)\n\nSe isso soa como algo de seu interesse, aceite esta oferta imediatamente! \n\nEsperamos trabalhar com você,\n\nGerenciamento de distribuição unificada\n -Entregando o pacote total-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
UDM_internaldelivery_dc_desc_003=Saudações, manipulador de pacotes qualificado!\n\nPronto para enfrentar um trabalho desafiador, mas gratificante, em uma embalagem adjacente de transporte? Então temos uma oportunidade perfeita para você em ~mission(location|Address).\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n · Pacote #~mission(item1|serialnumber) da ~mission(Pickup1)\n · Pacote #~mission(item2|serialnumber) do ~mission(Pickup2)\n · Pacote #~mission(item3|serialnumber) do ~mission(Pickup3)\n · Pacote #~mission(item4|serialnumber) do ~mission(Pickup4)\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n · Pacote #~mission(item1|serialnumber) para ~mission(Dropoff1)\n · Pacote #~mission(item2|serialnumber) para ~mission(Dropoff2)\n · Pacote #~mission(item3|serialnumber) para ~mission(Dropoff3)\n · Pacote #~mission(item4|serialnumber) para ~mission(Dropoff4)\n\nEntão pegue esse contrato e vamos mãos à obra.\n\nEsperamos trabalhar com você,\n\nGerenciamento de distribuição unificada\n - Entregando o pacote total-\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
UDM_internaldelivery_dc_desc_005=Saudações, Manipulador de Pacotes Qualificado!\n\nEmbora possam não estar indo muito longe, os seguintes pacotes em ~mission(Location|Address) ainda precisam ser manuseados com cuidado especializado. Você é o especialista que estamos procurando? \n\nPACTOS PARA RECOLHA (QUALQUER ORDEM)\n - Pacote #~mission(item1|serialnumber) da ~mission(Pickup1)\n - Pacote #~mission(item2|serialnumber) da ~mission(Pickup2)\n - Pacote #~mission(item3|serialnumber) da ~mission(Pickup3)\n     - Pacote #~mission(item4|serialnumber) da ~mission(Pickup4)\n - Pacote #~mission(item5|serialnumber) da ~mission(Pickup5)\n - Pacote #~mission(item6|serialnumber) da ~mission(Pickup6)\n\nLocais de entrega (qualquer ordem) ORDEM)\n - Pacote #~mission(item1|serialnumber) para a ~mission(Dropoff1)\n - Pacote #~mission(item2|serialnumber) para a ~mission(Dropoff2)\n - Pacote #~mission(item3|serialnumber) para a ~mission(Dropoff3)\n - Pacote #~mission(item4|serialnumber) para a ~mission(Dropoff4)\n - Pacote #~mission(item5|serialnumber) para a ~mission(Dropoff5)\n - Pacote #~mission(item6|serialnumber) para a ~mission(Dropoff6)\n\nTudo o que você precisa fazer é aceitar o contrato e você estará a caminho. \n\nEstamos ansiosos para trabalhar com você,\n\nUnified Distribution Management\n -Delivering the Total Package-\n\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000
UDM_internaldelivery_dc_title_001=GERENTE DE PACOTES UDM <EM4>[500–2,000 Rep]</EM4>
UWC_Refueling_easy_desc_001=Olá,\n\nSe você está equipado para reabastecimento, essa pode te interessar.\n\nUm beacon acabou de ficar ativo em <EM4>~mission(Location|Address)</EM4>, de um cliente cuja <EM4>~mission(Ship)</EM4> está seca, então garanta que seus tanques estejam cheios.\n\nA nave do cliente vai te pagar na taxa de <EM4>~mission(FuelRate) aUEC por SCU de Hidrogênio</EM4> e <EM4>~mission(QTFuelRate) aUEC por SCU de Quantum</EM4>, e como contratado do United Wayfarers Club, você também vai receber a taxa de serviço da UWC listada acima ao concluir.\n\nParece simples, sem dor de cabeça, mas nunca custa manter os scanners ligados.\nMe avise se tiver interesse e vamos colocar esse pessoal de volta na rota.\n\nAguardando resposta,\n\nDina Deloit\nCentral de Despacho\nUnited Wayfarers Club\n"Estamos com você"\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Bendix\n- Ezra\n- Harkin\n- Lindstrom\n- Marlin\n- Norfield\n- RN-7s\n- Torrez\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Targets x1\n<EM4>Friendlies:</EM4> Recipient x1\n<EM4>Unknown:</EM4> 2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Neutral:</EM4> +200 Rep\n<EM4>Jr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
UWC_Refueling_easy_title_001=PEDIDO DE REABASTECIMENTO: ~mission(Ship) <EM4>[BP]</EM4> <EM4>[100–200 Rep]</EM4>
UWC_Refueling_high_desc_001=Olá,\n\nMais um dia, mais um beacon. Tem uma <EM4>~mission(Ship)</EM4> com tanque vazio em <EM4>~mission(Location|Address)</EM4>. A nave do cliente vai te pagar na taxa de <EM4>~mission(FuelRate) aUEC por SCU de Hidrogênio</EM4> e <EM4>~mission(QTFuelRate) aUEC por SCU de Quantum</EM4>, e como contratado do United Wayfarers Club, você também vai receber a taxa de serviço da UWC listada acima ao concluir.\n\nNão vou mentir: é um lugar ruim de ficar preso e pior ainda de ser pego de surpresa. Já perdemos gente boa por lá — até quem teve sorte voltou faltando pedaços.\n\nSe decidir aceitar, me faz um favor e fique atento a tudo. Se tiver um parceiro disponível, talvez seja bom chamar um reforço.\n\nPosso estar sendo paranoica, mas isso não quer dizer que não estejam atrás de você, como a Mamãe Deloit diria.\nNa verdade ela nunca disse isso — mas tenho certeza que diria se trabalhasse com isso.\n\nSó faz o trabalho e volta inteiro, ok?\n\nDina Deloit\nCentral de Despacho\nUnited Wayfarers Club\n"Estamos com você"\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Bendix\n- Ezra\n- Harkin\n- Lindstrom\n- Marlin\n- Norfield\n- RN-7s\n- Torrez\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 3/7 | Risk 4/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Targets x4\n<EM4>Friendlies:</EM4> Recipient x1\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
UWC_Refueling_high_title_001=PEDIDO CRÍTICO DE REABASTECIMENTO: ~mission(Ship) <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
UWC_Refueling_intro_desc_001=Ei!\n\nDD do United Wayfarers Club aqui.\n\nA UWC oferece serviços de reparo, rearmamento e reabastecimento por toda a UEE. Acontece que estamos procurando novos afiliados cujas naves estejam equipadas para reabastecimento. Se você tem os tanques e gosta de ser bem recebido, a UWC pode ser o clube certo pra você.\n\nE se você acha que pode ser, tenho um beacon ativo que pode te interessar.\n\nSe gostar, vai uma dica: <EM4>garanta que seus tanques estejam cheios antes de sair</EM4>.\n\nUm membro do Clube ficou sem combustível em <EM4>~mission(Location|Address)</EM4>. Não sei exatamente como ele foi parar lá sem combustível, mas a UWC não deixa ninguém na mão.\n\nA nave do cliente vai te pagar na taxa de <EM4>~mission(FuelRate) aUEC por SCU de Hidrogênio</EM4> e <EM4>~mission(QTFuelRate) aUEC por SCU de Quantum</EM4>. Como contratado da UWC, você também recebe a taxa de serviço listada acima ao concluir.\n\nÉ um trabalho direto. Perfeito pra pegar o jeito. Vá até lá, abasteça a <EM4>~mission(Ship)</EM4> e coloque eles de volta na rota. Depois de alguns serviços assim, vira automático. Até lá, tem uma <EM4>entrada no diário</EM4> no seu mobiGlas chamada ""Refueling Protocols"" com o básico.\n\nNão há relatos de atividade fora da lei no setor, mas fique atento. Recomendo sempre ser rápido. Quanto antes terminar, mais cedo posso te arrumar outro contrato. A UWC está sempre procurando novos afiliados.\n\nAnsiosa pra trabalhar com você.\n\nDina Deloit\nCentral de Despacho\nUnited Wayfarers Club\n"Estamos com você"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Friendlies:</EM4> Recipient x1\n<EM4>Neutral:</EM4> +200 Rep
UWC_Refueling_intro_title_001=UWC PROCURA REABASTECEDORES <EM4>[200 Rep]</EM4>
UWC_Refueling_moderate_desc_001=Ei, você!\n\nTenho um beacon em <EM4>~mission(Location|Address)</EM4>. Disseram que os tanques estão secos e precisam de reabastecimento completo. Se tiver interesse, tenho a sensação de que vão ficar muito felizes em te ver.\n\nA nave do cliente vai te pagar na taxa de <EM4>~mission(FuelRate) aUEC por SCU de Hidrogênio</EM4> e <EM4>~mission(QTFuelRate) aUEC por SCU de Quantum</EM4>, e como contratado do United Wayfarers Club, você também vai receber a taxa de serviço da UWC listada acima ao concluir.\n\nEles estão presos em uma área com má reputação, embora esteja mais tranquila ultimamente. Ainda assim, melhor ficar atento — nunca se sabe se ainda tem problema por lá.\n\nDe qualquer forma, quanto antes todo mundo puder voltar a voar — incluindo você — melhor.\n\nBoa jornada,\n\nDina Deloit\nCentral de Despacho\nUnited Wayfarers Club\n"Estamos com você"\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Bendix\n- Ezra\n- Harkin\n- Lindstrom\n- Marlin\n- Norfield\n- RN-7s\n- Torrez\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 3/7 | Risk 4/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Targets x3\n<EM4>Friendlies:</EM4> Recipient x1\n<EM4>Jr. Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
UWC_Refueling_moderate_title_001=PEDIDO URGENTE DE REABASTECIMENTO: ~mission(Ship) <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
UWC_Refueling_multiple_med_desc_001=Ei de novo,\n\nTenho um beacon em <EM4>~mission(Location|Address)</EM4> e esse é grande. Uma pequena frota inteira ficou sem combustível ao mesmo tempo. Impressionante e desastroso ao mesmo tempo.\n\nA nave do cliente vai te pagar na taxa de <EM4>~mission(FuelRate) aUEC por SCU de Hidrogênio</EM4> e <EM4>~mission(QTFuelRate) aUEC por SCU de Quantum</EM4>, e como contratado do United Wayfarers Club, você também vai receber a taxa de serviço da UWC listada acima ao concluir.\n\nComo a área é relativamente segura, não deve ter muita dor de cabeça, mas hoje em dia nunca se sabe. Melhor colocar eles de volta no ar o quanto antes.\n\nBoa jornada,\n\nDina Deloit\nCentral de Despacho\nUnited Wayfarers Club\n"Estamos com você"\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Bendix\n- Ezra\n- Harkin\n- Lindstrom\n- Marlin\n- Norfield\n- RN-7s\n- Torrez\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Targets x3\n<EM4>Friendlies:</EM4> Recipient x3\n<EM4>Sr. Contractor:</EM4> +50 Rep\n<EM4>Head Contractor:</EM4> +50 Rep\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
UWC_Refueling_multiple_med_title_001=REABASTECIMENTO URGENTE DE FROTA <EM4>[BP]</EM4> <EM4>[50–150 Rep]</EM4>
Vaughn_EliminateSpecific_FPS_Rockcracker_Maintenance_desc_001=Tenho tido dificuldades para rastrear este alvo. Ele faz parte de uma gangue conhecida como Claw Salamanders, que tende a ser bastante itinerante. No entanto, parece que o grupo está tentando colocar uma antiga QV Breaker Station de volta em funcionamento, e acredito que esta pode ser a chance de eliminar ~mission(TargetName) de uma vez por todas.\n\nComece sua busca em ~mission(Location|Address). Essas estações podem ser bastante cavernosas às vezes, então pode levar algum esforço para localizar o alvo quando você estiver no local.\n\nMas tenho total confiança em suas habilidades,\nVaughn\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Juggernauts x1\n<EM4>Jr. Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Vaughn_EliminateSpecific_FPS_Rockcracker_Power_desc_001=Um pedido chegou à minha mesa a respeito do fim prematuro de ~mission(TargetName), um membro dos Claw Salamanders que atualmente está se escondendo em uma antiga QV Breaker Station.\n\nÉ muito provável que você o encontre em ~mission(Location|Address). No entanto, tenha em mente que, com uma estação desse tamanho, pode levar algum tempo de busca para encontrá-lo.\n\nEspero que aproveite seu tempo em Nyx,\nVaughn\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Juggernauts x1\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Vaughn_EliminateSpecific_FPS_Rockcracker_Warehouse_desc_001=Há um membro da gangue de Nyx chamada Claw Salamanders, ~mission(TargetName), que entrou para a minha lista negra. Ele estava fugindo há bastante tempo, mas recentemente reapareceu em uma antiga estação de mineração no Cinturão Keeger. Nosso dia de sorte será o último dele.\n\nDizem que você pode encontrá-lo em ~mission(Location|Address). Infelizmente, há uma grande chance de que você precise fazer alguns reparos na própria estação antes de conseguir acesso a essa área específica.\n\nMas tenho certeza de que você está mais do que preparado para o desafio.\n\nAtenciosamente,\nVaughn\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Juggernauts x1\n<EM4>Neutral:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Vaughn_EliminateSpecific_FPS_Rockcracker_title_001=UMA PAUSA MAIS QUE MERECIDA <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
WSTR_TimeTrial_repeat_desc_01=Pronto para estabelecer um novo recorde pessoal com a Wildstar Racing Amateur League? \n\n~mission(RaceDetails)\n\nDISCLAIMER\nA Wildstar Racing exige que o piloto contratado seja o piloto do veículo, não sendo permitidos substitutos ou substitutos. Lembre-se de que a Wildstar Racing utiliza pistas acessíveis ao público e que outras pessoas podem estar presentes. A Wildstar Racing não é responsável por nenhum dano que sua nave possa sofrer durante a corrida.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
