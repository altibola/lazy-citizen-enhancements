Foxwell_DefendLocation_S_Desc_001=Procuramos um profissional de alto nível pra uma missão crítica. Temos clientes VIPs em <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> enfrentando fora da lei extremamente agressivos e organizados, que estão atacando naves nas proximidades. Ainda estamos recebendo detalhes do ataque, mas parece ser uma operação ampla e coordenada.\n\nSe puder aceitar, recomendo fortemente levar reforço, suprimentos e estar pronto pro pior. Faça tudo certo e o contratado principal receberá um bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n‘Segurança do seu jeito’\n\nA Foxwell Enforcement é uma empresa de segurança licenciada para operar em todo o espaço da UEE. Estamos sempre em busca de novos operadores para integrar nosso time. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- [S1-A] Antium Arms Storm\n- [S1-A] Antium Core Storm\n- [S1-A] Antium Helmet Storm\n- [S1-A] Antium Legs Storm\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x10, Hostiles x3, Interdiction Ships x6, Reinforcements x20\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Head Contractor:</EM4> +16,000 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
