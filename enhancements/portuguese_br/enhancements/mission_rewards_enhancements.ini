TheCollector_Ships_ARGO_Raft_Desc=RAFT é muito útil. Wikelo pega e faz ser muito muito útil. Faz trabalho e te deixa feliz. Quer? Traga itens para Wikelo para trocar.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_ARGO_Raft_Title=PRONTO PARA A RAFT? <EM4>[30 Rep]</EM4>
TheCollector_Ships_Anvil_Asgard_Desc=Wikelo modifica Asgard e faz ela lutar mais. Se você for lutar, este mod é o que você quer. Além disso, boa troca. Traga itens aqui e eu te dou a nave.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +250
TheCollector_Ships_Anvil_Asgard_Title=ASGARD MODIFICADA PARA ATAQUE <EM4>[250 Rep]</EM4>
TheCollector_Ships_Constellation_Taurus_Desc=Wikelo encontrou planos para construir a nave Constellation Taurus. Nave legal, mas o Wikelo pode fazer uma ainda melhor. Mais bonita também. Se quiser, traga as coisas.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +250
TheCollector_Ships_Constellation_Taurus_TItle=QUER A NAVE TAURUS? <EM4>[250 Rep]</EM4>
TheCollector_Ships_Crusader_A2_Desc=Traga as coisas para o Wikelo e eu faço para você um A2 Starlifter que luta melhor. Faz guerra tão bem que vai te fazer chamar de A1! Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +500
TheCollector_Ships_Crusader_A2_Title=Starlifter A2 War Mod <EM4>[500 Rep]</EM4>
TheCollector_Ships_Drake_Golem_Dec=O universo precisa de recursos, então Wikelo sempre respeita as pessoas que escavam. Boa profissão. Se você está começando e quer um reforço para a nave Golem, eu posso ajudar.\n\nTraga.\n\nEu farei.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_Drake_Golem_Title=GOLEM DAS ROCHAS <EM4>[30 Rep]</EM4>
TheCollector_Ships_F7_MK2_Desc=Sei o quanto vocês Humanos gostam da Marinha, então o Wikelo tem uma agora. Se você quiser a versão Wikelo da F7 MK2, traga as coisas e você está dentro. Muito engraçado. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_F7_MK2_TItle=F7 NAVY DO WIKELO <EM4>[100 Rep]</EM4>
TheCollector_Ships_F8C_Mil_Desc=Posso fazer uma versão customizada da F8 que pega uma nave de combate boa e a torna ainda melhor. Traga as coisas e eu faço. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +250
TheCollector_Ships_F8C_Milt_TItle=F8 DE GUERRA MODIFICADA <EM4>[250 Rep]</EM4>
TheCollector_Ships_F8C_Stealth_Desc=Tenho as peças para construir uma nave útil para quem gosta de se esconder e depois lutar. Pegue a nave F8C e faça ainda melhor. Coloque o que o Wikelo precisa para construir para você. Agora, você decide. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +250
TheCollector_Ships_F8C_Stealth_TItle=F8 SILENCIOSA <EM4>[250 Rep]</EM4>
TheCollector_Ships_Firebird_Desc=Estive fuçando as naves Aegis Sabre. Firebird é bem bombada. Boa construção, mas poderia fazer umas mudanças interessantes nela. Se quiser, posso fazer. Dê uma olhada e me diga. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_Firebird_TItle=FIREBIRD MODIFICADA <EM4>[100 Rep]</EM4>
TheCollector_Ships_Fortune_Indus_Desc=Olá, estou praticando para fazer a nave voar melhor. Xi'an ajudou os humanos a fazer a nave. Voa bem. Faz sucateamento bem. Mas Wikelo pode fazer melhor, se quiser. Traga as coisas e eu farei. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_Fortune_Indus_TItle=NAVE FORTUNE PARA VOCÊ <EM4>[30 Rep]</EM4>
TheCollector_Ships_GuardianMX_Desc=Vocês humanos gostam de combinações estranhas de letras. É muito engraçado. A nave Guardian é muito útil, mas se você quiser algo ainda mais útil, me traga coisas. Eu te dou uma nave melhor. Fica melhor. Funciona melhor.\n\nObrigado. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_GuardianMX_Title=Guardian WiK-X <EM4>[100 Rep]</EM4>
TheCollector_Ships_GuardianQI_Desc=Nave inseto de novo. Essa ajuda a derrubar outras naves, mas se quiser que ela derrube melhor, posso fazer. Veja a lista e me avise. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_GuardianQI_TItle=NAVE GUARDIAN DE INTERDIÇÃO <EM4>[100 Rep]</EM4>
TheCollector_Ships_Guardian_Desc=Essa nave parece um inseto no Protectorate. Visual divertido. Ferroada dolorida. O Wikelo pode fazer uma versão customizada para você, se quiser. Faça os inimigos sentirem a ferroada. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_Guardian_TItle=GUARDIAN DE COMBATE MODIFICADA <EM4>[100 Rep]</EM4>
TheCollector_Ships_Idris_Desc=Como Wikelo fez bons negócios com você, te faço essa troca especial. Idris é uma nave poderosa, perfeita para pessoas importantes como você. Wikelo até fez um mod para torná-la mais perigosa! Traga alguns itens e a nave será sua.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Ships_Idris_Title=IDRIS ESPECIAL PARA MATAR
TheCollector_Ships_Intrepid_Desc=Se você está procurando uma nave Intrepid ainda mais destemida, o Wikelo pode ajudar. Traga as coisas e você vai ter um toque especial na nave e uma nova pintura nela. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_Intrepid_TItle=UPGRADE NA INTREPID <EM4>[30 Rep]</EM4>
TheCollector_Ships_Kruger_Wolf_Desc=Se você quer ser silencioso e surpreender as pessoas, esse é o Wolf que você quer. Wikelo modificou ele para ser mais furtivo. Troco por ele quando você trouxer os itens que quero.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_Kruger_Wolf_Title=ONDE ESTÁ A WOLF? AQUI ESTÁ A WOLF <EM4>[30 Rep]</EM4>
TheCollector_Ships_MISC_Prospector_Desc=Wikelo adora pedras. Quer te ajudar a conseguir pedras melhores. Fez este Prospector melhor para esse trabalho difícil. Troque itens e você pode ter.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_MISC_Prospector_Title=PERSPECTIVAS BOAS <EM4>[30 Rep]</EM4>
TheCollector_Ships_Meteor_Desc=O Meteor é grande. Ele é pesado. Tem muitas armas. Mas Wikelo descobriu uma maneira de tornar ele ainda melhor. Você tem coisas que eu vou pegar para fazer isso.\n\nIsso é tudo.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_Meteor_Title=RSI Meteor Modificada <EM4>[30 Rep]</EM4>
TheCollector_Ships_Nox_Desc=Wikelo conhece muitos Xi'an. Falam devagar, mas são bem interessantes se você tiver paciência. Essa aqui é bem rápida, ótima para atravessar planetas. O Wikelo fez alguns ajustes para deixá-la mais veloz. Se quiser, o Wikelo faz pra você. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Ships_Nox_TItle=NOX MODIFICADA <EM4>[20 Rep]</EM4>
TheCollector_Ships_Peregrine_Desc=Wikelo não quer correr, mas posso fazer uma nave rápida ficar mais rápida. Se quiser, traga as coisas e vai voar mais rápido.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_Peregrine_TItle=PEREGRINE MODIFICADA DO WIKELO <EM4>[30 Rep]</EM4>
TheCollector_Ships_Prowler_Util_Desc=Wikelo trabalha duro. Você trabalha duro. Prowler Utility trabalha duro. Mas se você me trouxer os itens certos, eu faço ele trabalhar mais ainda, aí você trabalha menos. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +250
TheCollector_Ships_Prowler_Util_Title=PROWLER COM MAIS UTILIDADE <EM4>[250 Rep]</EM4>
TheCollector_Ships_Pulse_Desc=O Wikelo realmente gosta dessa nave pequena dos Humanos. A Pulse parece bem rápida. Dá pra configurar várias formas para deixá-la ainda mais veloz. Se quiser, posso te dar uma Pulse configurada que eu gosto. Olhe a lista do que preciso e me avise. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Ships_Pulse_TItle=PULSE PLUS <EM4>[20 Rep]</EM4>
TheCollector_Ships_Scorpius_Desc=Não sei o que significa o nome, mas a nave é muito rápida e ótima em combate. Com alguns ajustes, pode ficar ainda melhor. Veja a lista do que o Wikelo precisa, vai lá e eu faço. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_Scorpius_TItle=CONSTRUIR UMA SCORPIUS MODIFICADA <EM4>[100 Rep]</EM4>
TheCollector_Ships_Spirit_C1_Desc=O Wikelo adora naves de carga úteis. A Spirit é bem útil. Se você quiser uma, posso fazer para você. Traga as coisas e eu faço. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_Spirit_C1_TItle=SPIRIT DE CARGA MODIFICADA <EM4>[30 Rep]</EM4>
TheCollector_Ships_Starfighter_Inferno_Desc=Starfighter Inferno é uma boa nave, mas e se você quiser que ela seja ainda melhor em combate? Wikelo sabe exatamente o que fazer. Me traga os itens e eu faço isso para você. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_Starfighter_Inferno_Title=STARFIGHTER INFERNO ESPECIAL <EM4>[100 Rep]</EM4>
TheCollector_Ships_Starfighter_Ion_Desc=Starfighter Ion é uma boa nave, mas poderia ser mais furtiva, né? Surpreenda seus inimigos quando você os atirar. Eu ajudo você com isso. Preciso dos itens certos e então eu posso te entregar. Me traga. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_Starfighter_Ion_Title=STARFIGHTER ION FURTIVA <EM4>[100 Rep]</EM4>
TheCollector_Ships_Starlancer_ATC_Desc=Se você gosta de espaço grande para mover coisas, Wikelo pode fazer coisas úteis e maravilhosas para a nave MISC. Traga-me as peças e eu vou te dar uma versão ainda melhor do que os Xi'an podem fazer.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +250
TheCollector_Ships_Starlancer_ATC_Title=NOVA MOVER GRANDE NAVE STARLANCER <EM4>[250 Rep]</EM4>
TheCollector_Ships_Starlift_Max_Desc=Se você quer mover muitas coisas, a nave Hercules é ótima para isso. O Wikelo até conhece o Souli lá no Protectorate que começou a usar. Muito grande. O Wikelo pode te dar uma versão parecida se você pegar o que eu preciso. Olhe a lista e me diga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +250
TheCollector_Ships_Starlift_Max_TItle=MAIS QUE UMA MAX <EM4>[250 Rep]</EM4>
TheCollector_Ships_Terrapin_Medic_Desc=Wikelo não conhece essa palavra humana, mas a nave é muito útil quando as coisas ficam perigosas. Se quiser, posso te dar uma nova versão dela. Talvez mais útil?\n\nVocê voa e me conta. Adeus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_Terrapin_Medic_Title=O QUE É TERRAPIN? <EM4>[100 Rep]</EM4>
TheCollector_Ships_Ursa_Desc=Wikelo também está entrando no ramo das naves. Dei uma olhada na Ursa e melhorei ela. Traga as peças e eu faço para você. Explore melhor o planeta. Vai lá fazer.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Ships_Ursa_TItle=FAÇO UMA URSA MODIFICADA <EM4>[20 Rep]</EM4>
TheCollector_Ships_Wolf_Unique_Desc=Você tem sido um bom parceiro de troca para Wikelo. Ofereço esse mod de Wolf muito especial. Torne a troca ainda melhor - Traga o que eu quero e te dou o Wolf especial, ARMADURA Antium E uma LMG VOLT. Um ótimo negócio para meu ótimo cliente.\n\n<EM3>ITEM REWARDS</EM3>\n- Antium Helmet Midnight Sun\n- Antium Core Midnight Sun\n- Antium Arms Midnight Sun\n- Antium Legs Midnight Sun\n- Fresnel "Deepwater" Energy LMG\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Ships_Wolf_Unique_Title=UMA WOLF MAIS ESPECIAL
TheCollector_Ships_ZeusCL_Desc=Wikelo pode fazer uma nova versão da nave de carga Zeus. Se quiser, traga o que for necessário, e aí você terá a nave. Justo. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +100
TheCollector_Ships_ZeusCL_TItle=ZEUS DE CARGA ESPECIAL <EM4>[100 Rep]</EM4>
TheCollector_Ships_ZeusES_Desc=Wikelo pode fazer uma nova versão da nave Zeus. Sei que é uma nave importante para os Humanos. Não sei o motivo, mas sim, é uma nave bem útil. Enfim, posso fazer um upgrade e deixá-la um pouco mais bonita. O que eu preciso está listado, se quiser, traga. Tchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +30
TheCollector_Ships_ZeusES_TItle=ZEUS ESPECIAL <EM4>[30 Rep]</EM4>
