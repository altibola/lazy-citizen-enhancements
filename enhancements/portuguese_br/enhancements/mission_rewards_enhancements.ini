mg_miles_groupbounty_desc_001=TIPO DE CONTRATO: Mandado de Grupo\nSTATUS DO CONTRATANTE: Independente\nCódigo de aprovação: = ~mission(Contractor|ApprovalCode)\n\nPARA PROCESSAMENTO IMEDIATO\n\nEm relação a um crime cometido em conjunto, um mandado de grupo foi emitido para:\n     ~mission(Target1)\n     ~mission(Target2)\n     ~mission(Target3)\n\nAtualmente, acredita-se que eles não estão mais viajando juntos para escapar da captura e podem em breve fugir do sistema. Você deve considerar fortemente o recrutamento de ajuda adicional para executar todos os mandados no prazo limitado. \n\nVocê está autorizado a usar qualquer força necessária para neutralizar os alvos. \n\nO pagamento será emitido após a conclusão bem-sucedida do contrato, quando todos os alvos tiverem sido atendidos no prazo estipulado.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas Informação. As informações destinam-se ao uso do indivíduo ou entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x6, Targets x3
