Foxwell_EliminateSpecific_NonHostiles_desc_001=Consegui uma ponta em uma recompensa chamada <EM4>~mission(TargetName)</EM4>. Alguém os viu junto com cúmplices criminosos conhecidos em <EM4>~mission(Location|Address)</EM4>. Preciso que você chegue lá antes que eles comecem. \n\n<EM4>~mission(TargetName|Last)</EM4> tem a reputação de só aparecer em lugares com civis. Preciso muito que você pegue essa recompensa sem nenhum dano colateral civil. Foxwell não pode se dar ao luxo de ser pega na tempestade de merda que surgiria com a perda de vidas inocentes. \n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança, do seu jeito'\n\nA Foxwell Enforcement é uma empresa especializada em segurança licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes contratuais.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4\n<EM4>Security Trainee:</EM4> +1,000 Rep\n<EM4>Failure Penalty:</EM4> -500 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
