headhunters_ChainElimAll_1C_AttackCFP_E_desc_001=Tenho ouvido falar que a segurança do CFP está ficando um pouco mais agressiva e começou a expulsar as pessoas das casas que construíram com sucata no sistema e eles querem vingança, então eles vieram até nós.\n\nVá para ~mission(Location|Address) e limpe o CFP lá. Deve ser bem fácil e seco com um bom pagamento.\n\nStows Desliga.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x2, Soldiers x5, Technicians x5\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_1C_AttackCFP_E_title_001=UMA PEQUENA RETALIAÇÃO <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
headhunters_ChainElimAll_1C_AttackXT_M_desc_001=Acabei de receber autorização do meu Juiz para começar a atacar o XenoThreat. Estou de olho em alguns pontos sob o controle deles perto de ~mission(Location|Address).\n\nVou te dar os alvos para atingir, você mata todos que encontrar. Caramba, eu adoraria ir eu mesmo, parece divertido.\n\n-Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x2, Soldiers x5, Technicians x5\n<EM4>Sr. Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_1C_AttackXT_M_title_001=TIRANDO UM POUCO DO LIXO DA XENOTHREAT <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
headhunters_ChainElimAll_1C_ElimSpec_AttackCFP_M_desc_001=Estamos tentando ser legais com essas pessoas do Citizens for Prosperity, mas eles deixaram bem claro que não temos lugar em seu "sistema seguro". O uso de mercenários para segurança tem causado todos os tipos de violência irracional, como quando esse babaca ~mission(TargetName) abriu fogo contra um grupo de colonos para afastá-los de um posto avançado que eles estavam de olho. Então agora as luvas estão saindo.\n\nPreciso de alguns trabalhadores esforçados para atacar ~mission(Location|Address) e eliminar ~mission(TargetName|Last). As chances são de que eles ficarão escondidos até você provar que é uma ameaça o suficiente, então certifique-se de causar algum dano.\n\nArruma-se.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x4, Juggernauts x1, Soldiers x5, Technicians x5\n<EM4>Veteran Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_1C_ElimSpec_AttackCFP_M_title_001=EXPULSANDO O CFP <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
headhunters_ChainElimAll_2C_ElimSpec_AttackCFP_H_desc_001=Recebi uma mensagem do meu Juiz de que devemos retomar alguns dos postos avançados que a CFP assumiu. Eles estão um pouco irritados que a CFP esteja se firmando tanto no sistema quanto eles e acham que isso está fazendo os Headhunters parecerem fracos.\n\nEncontrei alguns candidatos perto de ~mission(Location|Address) que poderiam usar uma varredura. A cereja do bolo é que o chefe de segurança lá é ~mission(TargetName). Não sei se você já ouviu falar deles, mas eles atiraram em um punhado de Clips no mês passado, então é uma situação ganha-ganha. Recupere um pouco de território e dê um soco em alguém que realmente poderia ser pego.\n\nStows Desliga.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x5, Juggernauts x1, Soldiers x6, Technicians x6\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_2C_ElimSpec_AttackCFP_H_title_001=VARRER E LIMPAR ALGUNS OUTPOSTS DO CFP <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
headhunters_ChainElimAll_2C_ElimSpec_AttackXT_H_desc_001=Precisa de bons soldados com gosto pela violência para atacar alguns esconderijos da XenoThreat localizados em ~mission(Location|Address). Vou te dar os detalhes se você estiver caído, mas você terá que acabar com dois grupos separados de esconderijos. \n\nTambém ouvimos que ~mission(TargetName) está espreitando por lá. Se você tirar muitos XenoThreat, eles vão estourar a cabeça. \n\nQuando isso acontecer, coloque uma bala nele.\n\nGuarda.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x4, Juggernauts x1, Soldiers x5, Technicians x6\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_2C_ElimSpec_AttackXT_H_title_001=TOMANDO O TERRITÓRIO XENOTHREAT <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
headhunters_ChainElimAll_3C_ElimSpec_AttackCFP_VH_desc_001=Tem um grande aqui. Precisamos de uma equipe para ir até ~mission(Location|Address). Dizem que os CFP estão entrincheirados em três grupos diferentes na área. Nosso juiz quer todos eles limpos. Parece que um dos mercenários deles, um verdadeiro canalha chamado ~mission(TargetName), está escondido em um deles. Queremos que você vá lá, limpe todos eles e acabe com ~mission(TargetName|Last).\n\nGanhe um bom pagamento no processo.\n\nStows Desliga.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x6, Juggernauts x1, Soldiers x8, Technicians x8\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_3C_ElimSpec_AttackCFP_VH_title_001=ACERTE UM COMPLEXO CFP <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
headhunters_ChainElimAll_3C_ElimSpec_AttackXT_VH_desc_001=Tenho uma tarefa suculenta para qualquer grande executor que queira limpar um grande dia de pagamento. Em ~mission(Location|Address) temos um território XenoThreat administrado por um verdadeiro bastardo chamado ~mission(TargetName). Agora, se você está no sistema há tempo suficiente, provavelmente já ouviu falar de ~mission(TargetName|Last) ou pelo menos viu o trabalho deles. Skag tem uma tendência a deixar corpos por onde passa.\n\nDe qualquer forma, Judge quer essa área limpa, o que significa que você tem que atingir todos os três grupos e matar cada sujeira XenoThreat que encontrar. Mate o suficiente e ~mission(TargetName|Last) não será capaz de se esconder.\n\nElimine todos eles e faça um contra nós.\n\nStows Desliga.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 6/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x6, Juggernauts x1, Soldiers x10, Technicians x8\n<EM4>Head Contractor:</EM4> +400 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_3C_ElimSpec_AttackXT_VH_title_001=DERRUBANDO UM ESCONDERIJO XENOTHREAT <EM4>[BP]</EM4> <EM4>[400 Rep]</EM4>
headhunters_ChainElimAll_AttackCFP_E_desc_001=Procurando por alguém com um dedo no gatilho coçando. Estamos querendo nos mover contra alguns CFP em ~mission(Location|Address) e tomar para nós. Você tem que jogar isso de forma inteligente. Há um monte de postos avançados de satélite ao redor do principal e todos eles têm segurança, então você deve tirar cada um deles antes de tomar a base principal.\n\nMas ei, se você quiser pular direto para o fundo do poço e lutar contra todos os reforços, isso é problema seu. Contanto que você faça isso.\n\nStows Desliga\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 6/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x6, Snipers x4, Soldiers x6, Technicians x4\n<EM4>Head Contractor:</EM4> +400 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_AttackCFP_E_title_001=HORA DE AVANÇAR PARA O CFP <EM4>[BP]</EM4> <EM4>[400 Rep]</EM4>
headhunters_ChainElimAll_AttackGen_E_desc_001=Procurando por alguns rebatedores para irem soltar um pouco de violência em alguns idiotas locais que têm feito trabalhos no sistema contra os Headhunters. Tentamos entrar em contato para explicar o erro de seus caminhos, mas eles atiraram em nosso mensageiro, então agora vamos com a opção B.\n\nVocê os encontrará escondidos perto de ~mission(Location|Address). Vá lá e repinte as paredes com o sangue deles.\n\nDivirta-se.\n\nStows Desliga.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 6/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x6, Snipers x4, Soldiers x9, Technicians x4\n<EM4>Elite Contractor:</EM4> +400 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_AttackGen_E_title_001=ENTRE EM PÉ DE GUERRA <EM4>[BP]</EM4> <EM4>[400 Rep]</EM4>
headhunters_ChainElimAll_Boss_XenoThreat_VH_desc_001=Esses babacas do XenoThreat são como aloprats. Toda vez que você pensa em acabar com eles, eles simplesmente reaparecem. Eles parecem estar de volta às suas merdas de sempre e tentando montar algo grande. Não faço ideia do que, mas fomos liberados para impedir antes que comece.\n\nUm grupo de figurões do XenoThreat está supostamente se reunindo em ~mission(Location|Address) para planejar ou apenas se enfurecer ou o que quer que eles façam, mas nós vamos acabar com isso. Ou você vai.\n\nVá até lá e acabe com todos que encontrar. Com certeza, tenho certeza de que os figurões vão pular na luta. É o que eles sempre fazem.\n\nEssa vai ser difícil. Por mais que eu odeie o XenoThreat, eles são muito bons em uma luta, então tome cuidado e traga ajuda se puder.\n\nStows Desliga.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 6/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x90, Juggernauts x4\n<EM4>Elite Contractor:</EM4> +400 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_ChainElimAll_Boss_XenoThreat_VH_title_001=ACERTE O COMANDO DA XENOTHREAT <EM4>[BP]</EM4> <EM4>[400 Rep]</EM4>
headhunters_EliminateAll_XenoThreat_H_desc_001=Um dos nossos tropeçou em um grupo de XenoThreat escondido perto de ~mission(Location|Address). Não tenho certeza se eles estão entrincheirados ou apenas de passagem, mas queremos atacá-los antes que se movam.\n\nTalvez traga algumas pessoas se você as tiver, porque XenoThreat não costuma cair facilmente. Chegue lá e lembre-os de quem é o poder neste sistema.\n\nArruma-se.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x2, Juggernauts x1, Snipers x1, Soldiers x2, Technicians x1\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateAll_XenoThreat_H_title_001=ACERTE A XENOTHREAT EM ~mission(Location) <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
headhunters_EliminateSpecific_Asteroid_Generic_M_desc_001=Precisa cuidar de alguém. Eles estão escondidos perto de ~mission(Location|Address). Não sei se você se importa com quem eles são, mas o nome deles é ~mission(TargetName). Não há muito a dizer, bandido local que matou alguém que estava conectado.\n\nEles estavam foragidos, então vão ficar nervosos. Eu me aproximaria com cautela.\n\nEsconde-se.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Ravager-212 Twin Shotgun\n- Ripper "Sunblock" SMG\n- [S1-A] Deadrig Shotgun Magazine (8 cap)\n- [S1-A] Dust Devil Armor Arms\n- [S1-A] Dust Devil Armor Core\n- [S1-A] Dust Devil Armor Legs\n- [S1-A] Manticore Helmet\n- [S1-A] Ravager-212 Twin Shotgun Magazine (16 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x30, Juggernauts x4\n<EM4>Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_Asteroid_Generic_M_title_001=PRECISO DE UMA MORTE NA ~mission(Location) <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
headhunters_EliminateSpecific_Asteroid_Generic_VE_desc_001=Ouvi dizer que a equipe está pegando trabalhos e construindo uma reputação para si. Já que eles disseram que não querem ter nada a ver com os Headhunters, estamos querendo separá-los antes que se tornem um problema. O líder deles é um punk chamado ~mission(TargetName) e achamos que se eles encontrassem o lado errado de uma bala, o resto deles se separaria.\n\nDisseram que você pode encontrar ~mission(TargetName|Last) em torno de ~mission(Location|Address). Vá até lá e cuide disso.\n\nEles não devem representar um grande problema para um profissional como você.\n\nStows Desliga\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- Coda "Big Boss" Pistol\n- Coda "Nighthawk" Pistol\n- Coda Pistol\n- Scalpel Sniper Rifle\n- [S1-A] Coda Pistol Magazine (6 cap)\n- [S1-A] Morozov-SH Arms\n- [S1-A] Morozov-SH Core\n- [S1-A] Morozov-SH Helmet\n- [S1-A] Morozov-SH Legs\n- [S1-A] Scalpel Sniper Rifle Magazine (12 cap)\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- Devastator "Midnight" Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator Shotgun\n- [S1-A] Devastator Shotgun Battery (12 cap)\n- [S1-A] Morozov-SH Arms Thule\n- [S1-A] Morozov-SH Core Thule\n- [S1-A] Morozov-SH Helmet Thule\n- [S1-A] Morozov-SH Legs Thule\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x24, Soldiers x3\n<EM4>Neutral:</EM4> +50 Rep\n<EM4>Jr. Contractor:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_Asteroid_Generic_VE_title_001=IMPACTO NO ESPAÇO PROFUNDO <EM4>[BP]</EM4> <EM4>[50 Rep]</EM4>
headhunters_EliminateSpecific_CFP_E_desc_001=Meu chefe está procurando um rebatedor disponível. Os Headhunters estão querendo retomar ~mission(Location|Address). Os CFP Mercs de lá estão se preparando para uma longa luta. Olha, não queremos matar ninguém que não seja necessário, então estamos procurando outras opções.\n\nA segurança de lá está sendo administrada por ~mission(TargetName) e meu Juiz acha que se eles forem eliminados, o resto vai se dispersar. Derramar um pouco de sangue é melhor do que muito, certo?\n\n-Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Coda "Big Boss" Pistol\n- Coda "Nighthawk" Pistol\n- Coda Pistol\n- Scalpel Sniper Rifle\n- [S1-A] Coda Pistol Magazine (6 cap)\n- [S1-A] Morozov-SH Arms\n- [S1-A] Morozov-SH Core\n- [S1-A] Morozov-SH Helmet\n- [S1-A] Morozov-SH Legs\n- [S1-A] Scalpel Sniper Rifle Magazine (12 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x1, Juggernauts x1, Snipers x1, Soldiers x2, Technicians x2\n<EM4>Jr. Contractor:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_CFP_E_title_001=UM TIRO NO CAOS <EM4>[BP]</EM4> <EM4>[50 Rep]</EM4>
headhunters_EliminateSpecific_CFP_H_desc_001=Headhunters estão lançando um ataque perto de ~mission(Location|Address). Esse ex-fuzileiro naval babaca chamado ~mission(TargetName) tem enviado seus mercenários para limpar os acampamentos próximos se eles não entregarem suas armas.\n\nEmbora toda a segurança tenha recebido sinal verde, ~mission(TargetName|Last) foi escolhida. Em seu último ataque, eles espancaram um invasor até a morte por responder. Acontece que o invasor era primo de um dos nossos Clips, então eles estão pagando mais para garantir que a justiça seja feita.\n\nMas tome cuidado, ~mission(TargetName|Last) pode ser um canalha que merece isso, eles ainda são ex-militares, então não serão fáceis de derrubar.\n\n-Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Devastator "Midnight" Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator Shotgun\n- [S1-A] Devastator Shotgun Battery (12 cap)\n- [S1-A] Morozov-SH Arms Thule\n- [S1-A] Morozov-SH Core Thule\n- [S1-A] Morozov-SH Helmet Thule\n- [S1-A] Morozov-SH Legs Thule\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> CQC x6, Juggernauts x2, Snipers x4, Soldiers x6, Technicians x4\n<EM4>Head Contractor:</EM4> +1,200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_CFP_H_title_001=ALVO PAGO EM CFP <EM4>[BP]</EM4> <EM4>[1,200 Rep]</EM4>
headhunters_EliminateSpecific_CFP_M_desc_001=Precisa de um gatilho disponível para derrubar um alvo em um posto avançado do CFP. Eles são um verdadeiro pedaço de trabalho chamado ~mission(TargetName). Mercenários da velha escola cheios de crueldade de cano de chumbo. \n\nOuvi dizer que eles estão postados em ~mission(Location|Address). Passe por lá e elimine-os. Tente não causar muito dano. Eles são o alvo, ninguém mais.\n\nArruma-se.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- Coda "Big Boss" Pistol\n- Coda "Nighthawk" Pistol\n- Coda Pistol\n- Scalpel Sniper Rifle\n- [S1-A] Coda Pistol Magazine (6 cap)\n- [S1-A] Morozov-SH Arms\n- [S1-A] Morozov-SH Core\n- [S1-A] Morozov-SH Helmet\n- [S1-A] Morozov-SH Legs\n- [S1-A] Scalpel Sniper Rifle Magazine (12 cap)\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- Devastator "Midnight" Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator Shotgun\n- [S1-A] Devastator Shotgun Battery (12 cap)\n- [S1-A] Morozov-SH Arms Thule\n- [S1-A] Morozov-SH Core Thule\n- [S1-A] Morozov-SH Helmet Thule\n- [S1-A] Morozov-SH Legs Thule\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x1, Snipers x2, Soldiers x3, Technicians x4\n<EM4>Jr. Contractor:</EM4> +75 Rep\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_CFP_M_title_001=PRECISO QUE ELIMINE UM CFP <EM4>[BP]</EM4> <EM4>[75–100 Rep]</EM4>
headhunters_EliminateSpecific_Defector_desc_001=Essa merda me entristece. Não sei se você já cruzou o caminho de ~mission(TargetName) em suas negociações conosco. Pensei que eles fossem muito bons. Estou com os Headhunters há anos, mas algo deve ter acontecido porque eles correram para o CFP em busca de proteção. Traíram alguns de nossos irmãos e irmãs ao longo do caminho.\n\nTodos os juízes estão furiosos e querem sangue. É aí que você entra. Vá para ~mission(Location|Address), encontre ~mission(TargetName|Last) e mate-os.\n\nNão precisa ser nada extravagante. Só quero o resultado.\n\nQue pena.\n\nStows Desliga\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Devastator "Midnight" Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator Shotgun\n- [S1-A] Devastator Shotgun Battery (12 cap)\n- [S1-A] Morozov-SH Arms Thule\n- [S1-A] Morozov-SH Core Thule\n- [S1-A] Morozov-SH Helmet Thule\n- [S1-A] Morozov-SH Legs Thule\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x1, Juggernauts x1, Snipers x2, Soldiers x3\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_Defector_title_001=PRENDA UM TRAIDOR <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
headhunters_EliminateSpecific_Generic_E_desc_001=Procurando por rebatedores disponíveis para um show rápido. Lá em ~mission(Location|Address), eles estão sendo atacados por alguns gênios liderados por ~mission(TargetName). Nós lutamos contra ~mission(TargetName|Last) no passado, então não é surpresa que eles não tenham se dado conta. \n\nQueremos que você vá até lá e os derrube. Mate quem você quiser, mas ~mission(TargetName|Last) deve ser seu foco.\n\nStows Desliga\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Devastator "Midnight" Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator Shotgun\n- [S1-A] Devastator Shotgun Battery (12 cap)\n- [S1-A] Morozov-SH Arms Thule\n- [S1-A] Morozov-SH Core Thule\n- [S1-A] Morozov-SH Helmet Thule\n- [S1-A] Morozov-SH Legs Thule\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x1, Snipers x2, Soldiers x3, Technicians x4\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_Generic_E_title_001=MATE O REI <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
headhunters_EliminateSpecific_Generic_M_desc_001=Tenho uma equipe que tem atacado naves Headhunter ultimamente. O líder deles é um verdadeiro sujeito chamado ~mission(TargetName). Nós os rastreamos até ~mission(Location|Address), então estamos procurando alguém para acabar com eles de uma vez por todas.\n\nEste grupo gosta de lutar, mas não deve ser um problema para alguém como você. \n\nVá lá e acabe com isso.\n\nStows Desliga\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Coda "Big Boss" Pistol\n- Coda "Nighthawk" Pistol\n- Coda Pistol\n- Scalpel Sniper Rifle\n- [S1-A] Coda Pistol Magazine (6 cap)\n- [S1-A] Morozov-SH Arms\n- [S1-A] Morozov-SH Core\n- [S1-A] Morozov-SH Helmet\n- [S1-A] Morozov-SH Legs\n- [S1-A] Scalpel Sniper Rifle Magazine (12 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x1, Snipers x1, Soldiers x2, Technicians x2\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Neutral:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_Generic_M_title_001=PRECISO QUE MATE ALGUÉM <EM4>[BP]</EM4> <EM4>[25–50 Rep]</EM4>
headhunters_EliminateSpecific_Generic_VH_desc_001=Meus chefes disseram que estamos liquidando dívidas antigas. Tenho uma linha aberta com um velho conhecido chamado ~mission(TargetName) que acumulou uma lista de mortes pesada. Soubemos que eles estavam se escondendo com algumas pessoas em ~mission(Location|Address) que não são os maiores fãs de nós, então eles provavelmente não vão gostar de você. ~mission(TargetName|Last) é o alvo aqui, mas você pode ter que se misturar com eles.\n\nNovamente, sempre que tentamos eliminar ~mission(TargetName|Last), eles mataram o assassino. Sinto que você se sairá melhor, mas eu traria reforços se você os tiver.\n\nBoa sorte.\n\n-Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Coda "Big Boss" Pistol\n- Coda "Nighthawk" Pistol\n- Coda Pistol\n- Scalpel Sniper Rifle\n- [S1-A] Coda Pistol Magazine (6 cap)\n- [S1-A] Morozov-SH Arms\n- [S1-A] Morozov-SH Core\n- [S1-A] Morozov-SH Helmet\n- [S1-A] Morozov-SH Legs\n- [S1-A] Scalpel Sniper Rifle Magazine (12 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> CQC x5, Juggernauts x1, Snipers x3, Soldiers x5, Technicians x4\n<EM4>Head Contractor:</EM4> +1,200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_Generic_VH_title_001=LUZ VERDE EM ~mission(TargetName|Last) <EM4>[BP]</EM4> <EM4>[1,200 Rep]</EM4>
headhunters_EliminateSpecific_XenoThreat_H_desc_001=Os Headhunters acabaram de reunir uma equipe para ir até ~mission(Location|Address) e acabar com a XenoThreat lá, mas estou procurando adicionar algum seguro extra. \n\nVeja, tem um peso pesado lá chamado ~mission(TargetName) que está na estrutura de comando da XenoThreat e queremos que eles sejam eliminados. Qualquer outro que você matar é moleza, mas eles são seu alvo principal.\n\n-Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Coda "Big Boss" Pistol\n- Coda "Nighthawk" Pistol\n- Coda Pistol\n- Scalpel Sniper Rifle\n- [S1-A] Coda Pistol Magazine (6 cap)\n- [S1-A] Morozov-SH Arms\n- [S1-A] Morozov-SH Core\n- [S1-A] Morozov-SH Helmet\n- [S1-A] Morozov-SH Legs\n- [S1-A] Scalpel Sniper Rifle Magazine (12 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Juggernauts x1, Snipers x1, Soldiers x2, Technicians x2\n<EM4>Sr. Contractor:</EM4> +75 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_XenoThreat_H_title_001=O TENENTE XENOTHREAT PRECISA SER MORTO <EM4>[BP]</EM4> <EM4>[75 Rep]</EM4>
headhunters_EliminateSpecific_XenoThreat_VH_desc_001=O negócio é o seguinte: acabamos de saber que um jogador poderoso do XenoThreat chamado ~mission(TargetName) saiu do esconderijo e foi visto em ~mission(Location|Address). \n\nOs Headhunters estão ansiosos para acabar com esse babaca há meses, então lançamos um ataque contra o posto avançado, mas o Juiz quer ter certeza de que ~mission(TargetName|Last) não escape, então eles querem usar você como seguro.\n\nSerá uma tarefa difícil no meio de uma zona de guerra, mas pagaremos se você conseguir.\n\nEsconde-se.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Coda "Big Boss" Pistol\n- Coda "Nighthawk" Pistol\n- Coda Pistol\n- Scalpel Sniper Rifle\n- [S1-A] Coda Pistol Magazine (6 cap)\n- [S1-A] Morozov-SH Arms\n- [S1-A] Morozov-SH Core\n- [S1-A] Morozov-SH Helmet\n- [S1-A] Morozov-SH Legs\n- [S1-A] Scalpel Sniper Rifle Magazine (12 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x3, Snipers x2, Soldiers x4, Technicians x3\n<EM4>Veteran Contractor:</EM4> +600 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_XenoThreat_VH_title_001=PROCUR: ~mission(TargetName) <EM4>[BP]</EM4> <EM4>[600 Rep]</EM4>
headhunters_EliminateSpecific_XenoThreat_desc_001=Tenho uma pista sobre um XenoThreat que tem sido um pé no saco. Não sei se você já ouviu o nome, mas ~mission(TargetName) é um canalha até mesmo para os padrões do XenoThreat. Cruel, sádico e um babaca para começar. Queremos que alguém marque o número deles. Você topa?\n\nA última palavra foi que eles estavam em algum lugar perto de ~mission(Location|Address). Vá até lá e acabe com eles. Bem simples.\n\nStows Desliga\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Devastator "Midnight" Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator Shotgun\n- [S1-A] Devastator Shotgun Battery (12 cap)\n- [S1-A] Morozov-SH Arms Thule\n- [S1-A] Morozov-SH Core Thule\n- [S1-A] Morozov-SH Helmet Thule\n- [S1-A] Morozov-SH Legs Thule\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x1, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Veteran Contractor:</EM4> +400 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_EliminateSpecific_XenoThreat_title_001=SOLTE UM XENOTHREAT <EM4>[BP]</EM4> <EM4>[400 Rep]</EM4>
headhunters_HaulCargo_RegionLink_desc_001=Você tem feito um bom trabalho para nós, então eu tenho um favor para pedir. Eu ainda vou te pagar, mas é um favor. Tenho uma carga que precisa ser transferida de ~mission(Location|Address) para ~mission(Destination|Address) e o cara que deveria fazer isso se viu do lado errado de uma câmara de descompressão, mas ei, a merda ainda precisa ser feita.\n\nA única coisa é que você vai precisar de uma nave que possa transportar Contêineres de ~mission(MissionMaxSCUSize).   Um <EM4>Tractor Beam portátil</EM4> também seria uma boa ideia levar. \n\nSe você pudesse resolver isso para mim, seria ótimo.\n\n- Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +200 Rep
headhunters_HaulCargo_RegionLink_title_001=PEDIDO DE TRANSPORTE. <EM4>[200 Rep]</EM4>
headhunters_bombingrun_E_CFP_desc_001=Parece que não consigo passar um dia sem acordar com um dos meus reclamando e gemendo sobre o quão difícil a Citizens for Prosperity está tornando a vida deles. \n\nEventualmente, vamos acabar com esses benfeitores do sistema, mas por enquanto vou me contentar com um pouco de paz e sossego. \n\nVá para ~mission(Location|Address) e destrua os estoques de combustível que a CFP tem lá. Isso deve pelo menos mantê-los fora do nosso negócio por um tempo.\n\n-Stows Desliga\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Contractor:</EM4> +200 Rep
headhunters_bombingrun_E_CFP_title_001=RETIRE O COMBUSTÍVEL DA CITIZENS FOR PROSPERITY <EM4>[100–200 Rep]</EM4>
headhunters_bombingrun_E_desc_001=Alguma competição se enraizou em ~mission(Location|Address) e eles realmente estão atrapalhando as nossas operações na área.\n\nAgora, parte de mim vê algum potencial nos novatos, então espero trazê-los para o grupo, mas, ao mesmo tempo, não posso realmente me dar ao luxo de deixá-los voando por aí causando problemas.\n\nEm vez disso, quero que você vá e exploda os tanques de combustível deles. Isso deve mantê-los no chão por tempo suficiente para que eu possa colocar algum senso em suas cabeças duras.\n\n-Stows Desliga\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Jr. Contractor:</EM4> +100 Rep
headhunters_bombingrun_E_title_001=ZONA DE EXCLUSÃO AÉREA <EM4>[100 Rep]</EM4>
headhunters_bombingrun_H_XT_desc_001=Parece que o XenoThreat conseguiu a mesma informação que nós e está querendo fazer o mesmo trabalho que nós. \n\nQuero que você tire a competição da jogada. Vá para ~mission(Location|Address) e destrua os tanques de combustível que eles têm lá.\n\nEntão meu pessoal pode terminar sem se preocupar com o XenoThreat estragando a festa.\n\n-Stows Desliga\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Contractor:</EM4> +100 Rep
headhunters_bombingrun_H_XT_title_001=EXPLODA RESERVAS DE COMBUSTÍVEL DA XENOTHREAT <EM4>[100 Rep]</EM4>
headhunters_bombingrun_H_desc_001=Olha, os Headhunters não perdem tempo com vingança mesquinha, mas também não vou deixar essa palhaçada passar.\n\nAlgum idiota eliminou vários membros da minha equipe e anda se gabando disso por aí. Também ouvi dizer que esse cabeça-oca está acumulando combustível quântico em <EM4>~mission(Location|Address)</EM4>. Quero ver como ele lida com pressão de verdade quando você voar até lá e reduzir tudo o que ele construiu a cinzas. Ah, e com todo o poder de fogo que eles reuniram por lá, não seria inteligente ir sozinho, então leve uma equipe com você.\n\n-Stows out\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Sr. Contractor:</EM4> +200 Rep
headhunters_bombingrun_H_title_001=DESPERDIÇANDO O ESTOQUE DELES <EM4>[200 Rep]</EM4>
headhunters_bombingrun_M_CFP_desc_001=Estou ficando bem enjoado dos Citizens for Prosperity metendo o nariz onde não são chamados. \n\nComecei a pensar que seria bem legal aterrar a frota deles por um tempo. Nós explodimos os tanques de combustível deles em ~mission(Location|Address) e aqueles pequenos cabeças-duras não vão a lugar nenhum rápido.\n\nParece o seu tipo de coisa?\n\n-Stows Desliga\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Sr. Contractor:</EM4> +200 Rep
headhunters_bombingrun_M_CFP_title_001=EXPLODA RESERVA DE COMBUSTÍVEL DA CITIZENS FOR PROSPERITY <EM4>[100–200 Rep]</EM4>
headhunters_bombingrun_M_title_001=PARANDO A CONCORRÊNCIA <EM4>[150 Rep]</EM4>
headhunters_bombingrun_S_desc_001=Recebemos informações de que uma nova gangue está planejando atacar um local em <EM4>~mission(Location|Address)</EM4>. Eles acham que, se destruírem o combustível, o lugar é deles.\n\nMas o que eles não sabem é que vamos te mandar antes pra explodir os tanques e garantir o local antes deles. Se tudo sair como planejado, limpamos o lugar e ainda ferramos com essa gangue. Dois coelhos com uma cajadada só.\n\nO único problema é que o local está fortemente armado. Leve uma equipe e coloque esses tanques fora de operação. Do resto, a gente cuida.\n\n-Stows out\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Head Contractor:</EM4> +300 Rep
headhunters_bombingrun_S_title_001=SUPERANDO NOSSOS INIMIGOS <EM4>[300 Rep]</EM4>
headhunters_bombingrun_VE_desc_001=Os Headhunters não chegaram onde estão sendo bonzinhos. Rastreamos o esconderijo de um bando de novatos que estão invadindo nosso território. Preciso que você mande um recado.\n\nVá até <EM4>~mission(Location|Address)</EM4> e destrua completamente os tanques de combustível deles. Eles vão pensar duas vezes antes de mexer com nossas operações quando as naves deles ficarem no chão.\n\n-Stows out\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Neutral:</EM4> +100 Rep
headhunters_bombingrun_VE_title_001=DEIXANDO OS NOVATOS NO CHÃO <EM4>[100 Rep]</EM4>
headhunters_bombingrun_VH_XT_desc_001=Não vou entrar na longa e complicada política do porquê estou pedindo para você fazer isso, mas é o suficiente para você saber que eu quero que seja feito. \n\nVá para ~mission(Location|Address) e exploda as reservas de combustível do XenoThreat lá. Isso realmente vai me ajudar a sair de uma situação difícil.\n\n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Elite Contractor:</EM4> +3,200 Rep
headhunters_bombingrun_VH_XT_title_001=DESTRUIR AS RESERVAS DE COMBUSTÍVEL DA XENOTHREAT <EM4>[3,200 Rep]</EM4>
headhunters_bombingrun_VH_desc_001=Tenho um plano para lidar com um rato com quem estou tendo problemas e preciso de ajuda.\n\nUm cliente deixou de pagar algumas dívidas e agora decidiu que não vai pagar. Recebi uma dica de que ele está escondido em <EM4>~mission(Location|Address)</EM4>. Se você destruir os tanques de combustível dele, não terá outra escolha a não ser reconsiderar as decisões idiotas que tomou.\n\nSó não subestime esse canalha. Ele pode ser burro, mas não é completamente estúpido, se é que me entende. Ouvi dizer que o lugar está cheio de naves e torretas, seria muita estupidez não levar reforços.\n\n-Stows out\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Veteran Contractor:</EM4> +250 Rep
headhunters_bombingrun_VH_title_001=ENCURRALANDO UM RATO <EM4>[250 Rep]</EM4>
headhunters_bombingrun_killship_M_desc_001=Todo mundo está falando sobre um novo jogador chamado ~mission(TargetName) que está operando a partir de ~mission(Location|Address). Eles se tornaram uma preocupação real para os Headhunters. \n\nÉ hora de desligá-los. \n\nVá até lá, derrote ~mission(TargetName|Last) e então limpe qualquer estoque de combustível que eles tenham lá para convencer qualquer um que tenha sobrado a sair. \n\nImagino que depois que você fizer isso, ninguém vai nem lembrar do nome deles.\n\n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Defenders x2, Targets x1\n<EM4>Sr. Contractor:</EM4> +200 Rep
headhunters_bombingrun_killship_M_title_001=CONVENCER OS NOVATOS A ABANDONAR O SETOR <EM4>[200 Rep]</EM4>
headhunters_bombingrun_multi_E_CFP_desc_001=Todo dia parece que o Citizens for Prosperity está por aqui tentando recrutar mais gente pra causa ridícula deles e complicar a vida de trabalhadores como nós.\n\nAcho que eles precisam de um lembrete de quem manda aqui. Vá até ~mission(Location|Address) e detone o lugar.\n\nNada como um bom dano à propriedade pra deixar o recado claro.\n\n-Stows out\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Jr. Contractor:</EM4> +100 Rep
headhunters_bombingrun_multi_E_CFP_title_001=ENSINE UMA LIÇÃO A CITIZENS FOR PROSPERITY <EM4>[100 Rep]</EM4>
headhunters_bombingrun_sabotage_servers_VH_desc_001=Quando as pessoas aprenderão que não podem fazer o que bem entendem no território dos Headhunters? Esses idiotas estão planejando um grande trabalho e pensaram que eu os deixaria fazer isso? De jeito nenhum.\n\nEu quero que você voe para ~mission(Location|Address) e destrua seus tanques de combustível e servidores de dados. Mostre a eles o que os Headhunters realmente pensam deles.\n\nVamos vê-los tentar fazer alguma coisa depois disso.\n\n-Stows Desliga\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Defenders x8, Targets x4\n<EM4>Elite Contractor:</EM4> +3,200 Rep
headhunters_bombingrun_sabotage_servers_VH_title_001=IMPEÇA OS RIVAIS DE LANÇAREM ATAQUES <EM4>[3,200 Rep]</EM4>
headhunters_bounty_Pyro1_desc=pu bounty pve pyro headhunters generic pyro1\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
headhunters_bounty_Pyro2_desc=pu bounty pve pyro headhunters generic pyro2\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
headhunters_bounty_Pyro3_desc=pu bounty pve pyro headhunters generic pyro3\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
headhunters_bounty_Pyro5_desc=pu bounty pve pyro headhunters generic pyro5\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
headhunters_bounty_Pyro6_desc=pu bounty pve pyro headhunters generic pyro6\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
headhunters_defend_xt_desc_001=Aqueles punks do XenoThreat lançaram um ataque contra ~mission(Location|Address), então estamos procurando pessoas para afastá-los. \n\nVá lá e destrua todo XenoThreat que você vir.\n\nStows Desliga\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_defend_xt_title_001=REFORÇO NECESSÁRIO NO OUTPOST <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
headhunters_defendship_LRT_PA_desc_001=Está ocupado? Um prospect promissor estava fazendo uma missão especial para mim, mas se meteu em problemas com a People’s Alliance perto de <EM4>~mission(Location|Address)</EM4>. Essa é por minha conta. Já sabia que não eram os melhores no dogfight, mas achei que conseguiria fazer isso sem encontrar outros inimigos.\n\nMandei eles se segurarem e fazerem o possível para sobreviver até o apoio chegar. Não deve ser muito problema para alguém com suas habilidades.\n\n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +100 Rep
headhunters_defendship_LRT_PA_title_001=HEADHUNTER PRECISA DE AJUDA <EM4>[100 Rep]</EM4>
headhunters_defendship_LRT_desc_001=Acabei de saber que um Headhunter perto de ~mission(Location|Address) foi envolvido em uma briga e agora eles não conseguem ir até o fim. O idiota quer que eu salve a bunda deles.\n\nAcho que sou um molenga, porque vou pagar você para fazer isso por mim. O que você diz? Quer salvar a vida de um idiota?\n\n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +150 Rep
headhunters_defendship_LRT_title_001=PILOTO HEADHUNTER EM APUROS <EM4>[150 Rep]</EM4>
headhunters_defendship_MRT_PA_desc_001=Alguns membros da People’s Alliance com um desejo suicida decidiram atacar uma das nossas naves. Precisamos de alguém para correr até <EM4>~mission(Location|Address)</EM4> e mostrar para eles o que acontece quando mexem com os Headhunters.\n\nStows fora.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +150 Rep
headhunters_defendship_MRT_PA_title_001=APOIO NECESSÁRIO AGORA <EM4>[150 Rep]</EM4>
headhunters_defendship_MRT_desc_001=Um dos meus pilotos não estava pensando direito e se meteu em uma confusão na ~mission(Location|Address). \n\nO problema é que o idiota tem um porão cheio. Não dá para perder as coisas que eles estão carregando, então eu agradeceria se você pudesse ir resgatá-los para mim. \n\n- Arruma tudo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +200 Rep
headhunters_defendship_MRT_title_001=A NAVE HEADHUNTER PRECISA DE REFORÇOS <EM4>[200 Rep]</EM4>
headhunters_defendship_VLRT_PA_desc_001=Parece que algumas pessoas não sabem o que é um dogfight. Enviei um prospect jovem para patrulhar e agora estou sendo bombardeado com comms dizendo que ele está quase sendo derrubado. Pedi para me atualizarem com os detalhes de quem eles estão enfrentando, e quase caí da cadeira de tanto rir.\n\nSe esse garoto não consegue lidar com uma nave da People’s Alliance, ele não está pronto para missões de voo. Agradeceria se você pudesse salvar a pele dele de qualquer maneira.\n\nSe tiver livre, poderia ir até <EM4>~mission(Location|Address)</EM4> e mostrar como se faz?\n\n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x2\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep
headhunters_defendship_VLRT_PA_title_001=AJUDE O PROSPECT DOS HEADHUNTERS <EM4>[100 Rep]</EM4>
headhunters_defendship_VLRT_desc_001=Parece que temos alguns novatos tentando forçar nossas operações ao atingir uma nave Headhunter perto de ~mission(Location|Address). Não tenho certeza de como eles esperavam escapar impunes.\n\nEles precisam aprender da maneira mais difícil que não é assim que as coisas funcionam em Pyro. Você está a fim de ir até lá e dar uma lição nesses bastardos?\n\n- Stows Desliga\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep
headhunters_defendship_VLRT_title_001=O PILOTO DA HEADHUNTER PRECISA DE AJUDA <EM4>[100 Rep]</EM4>
headhunters_defendship_multi_HRT_PA_desc_001=Enviei naves para investigar um sinal de socorro, mas isso virou uma emboscada pela People’s Alliance. Eles têm lutado como loucos para escapar, mas não conseguem se extrair.\n\nVamos dar um help para eles o mais rápido possível. Você consegue dar uma força em <EM4>~mission(Location|Address)</EM4>?\n\n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Sr. Contractor:</EM4> +200 Rep
headhunters_defendship_multi_HRT_PA_title_001=ACABE COM A EMBOSCADA <EM4>[200 Rep]</EM4>
headhunters_defendship_multi_SRT_PA_desc_001=Nos metemos em um grande problema aqui. Uma nave dos Headhunters em uma missão importante foi atacada perto de <EM4>~mission(Location|Address)</EM4>. Não posso entrar em detalhes, mas é vital que eles sobrevivam. A People’s Alliance sabe disso, porque estão lançando tudo o que podem contra eles.\n\nNão vou esconder nada. Essa é uma situação de vida ou morte, que muitos não sobreviveriam. Se você conseguir, vou cantar seus louvores e garantir que você seja bem pago.\n\n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Head Contractor:</EM4> +300 Rep
headhunters_defendship_multi_SRT_PA_title_001=PROCURANDO UM MALDITO HERÓI <EM4>[300 Rep]</EM4>
headhunters_defendship_multi_VHRT_PA_desc_001=Um dos nossos Clips está em apuros. Acabei de receber um comm dizendo que o comboio deles está sendo atacado pela People’s Alliance e que precisam de ajuda urgentemente. Bem, disseram de uma forma mais colorida do que isso. Só vou dizer que não quero nem ouvir o que eles vão dizer se não sobreviverem e tiverem que regenerar.\n\nA situação deve estar feia, já que esse Clip está desesperado. Realmente preciso que você vá até <EM4>~mission(Location|Address)</EM4> imediatamente e garanta que eles saiam vivos.\n\nStows fora.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Veteran Contractor:</EM4> +250 Rep
headhunters_defendship_multi_VHRT_PA_title_001=REÚNA-SE PARA AJUDAR O COMBOIO DOS CLIPS <EM4>[250 Rep]</EM4>
headhunters_eliminateall_XT_derelicts_desc_01=Um dos nossos juízes descobriu que o XenoThreat estava tentando invadir nosso território. Parece que eles estão tentando assumir ~mission(Location|Address). Não queremos deixar esses psicopatas ganharem mais espaço no sistema do que já têm, então estamos colocando alguns créditos em jogo para fazê-los recuar.\n\nQueremos que vocês os ataquem com força. Não desistam até que o lugar inteiro seja um cemitério. Enviaremos seu pagamento assim que os corpos estiverem prontos para serem enterrados.\n\n- Stows.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x2, Snipers x2, Soldiers x4, Technicians x3\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_XT_derelicts_title_01=GUERRA TERRITORIAL <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
headhunters_eliminateall_base_Generic_E_desc_001=Então aqui está o acordo, temos alguns pequenos canalhas que pensam que são figurões correndo de uma base perto de ~mission(Location|Address). Não sei que merda tóxica eles estão bebendo, mas eles acharam que seria uma boa ideia ir até alguns Headhunter Clips. Matou um, feriu mais três. Então, estou querendo mandar alguém lá para explodir a ambição deles direto da cabeça.\n\nVá lá e faça isso. Você vai ganhar um belo aumento de créditos por isso.\n\n- Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x27\n<EM4>Jr. Contractor:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_base_Generic_E_title_001=PRECISO DE UM BATEDOR <EM4>[BP]</EM4> <EM4>[50 Rep]</EM4>
headhunters_eliminateall_cfp_E_desc_001=Precisa de alguém para varrer ~mission(Location|Address). As forças de segurança do CFP tomaram o posto avançado de um grupo de moradores que estava lá há anos. Deram uma surra neles pelo que ouvi, então eles foram até os Headhunters pedindo vingança. \n\nPreciso que seja feito rápido e limpo. \n\nStows Desliga\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x1, Juggernauts x2, Snipers x1, Soldiers x2, Technicians x2\n<EM4>Jr. Contractor:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_cfp_E_title_001=ACERTANDO UM LOCAL DA CFP <EM4>[BP]</EM4> <EM4>[50 Rep]</EM4>
headhunters_eliminateall_cfp_M_desc_001=O juiz nos informou que devemos atacar ~mission(Location|Address). É propriedade da CFP e a segurança de lá tem sido pouco hospitaleira com alguns moradores locais, então eles têm que ir.\n\nEles podem falar muito sobre trazer segurança, mas eles têm armas e estão mais do que felizes em usá-las.\n\nStows Desliga.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x2, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Jr. Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_cfp_M_title_001=~mission(Location) RECEBEU SINAL VERDE <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
headhunters_eliminateall_cfp_desc_001=Aqui está o acordo. Alguns desses mercenários que a CFP contratou como segurança foram e atiraram em alguns Headhunters que estavam apenas se movendo pelo sistema. Eles nem estavam fazendo nada, apenas voando.\n\nDe qualquer forma, nós os rastreamos de volta para ~mission(Location|Address) e queremos dar um troco. Pegue seu equipamento e seja nossa arma, faremos valer a pena.\n\n- Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_cfp_title_001=PROCURANDO POR UMA PEQUENA VINGANÇA <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
headhunters_eliminateall_outpost_desc_01=Alguns idiotas estão se recusando a nos pagar o que nos é devido. O problema é que esses idiotas estão se gabando disso. Se tivessem ficado quietos, poderíamos ter cuidado disso de forma mais cirúrgica, mas agora precisamos enviar uma mensagem.\n\nOs idiotas estão operando de ~mission(Location|Address). Precisamos que todos eles se vão. Fale o mais alto que puder. Enviaremos seu pagamento assim que todos estiverem resolvidos.\n\n- Guarde-se.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x3, Technicians x2\n<EM4>Neutral:</EM4> +25 Rep\n<EM4>Sr. Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_outpost_title_01=GERENCIANDO REPUTAÇÃO <EM4>[BP]</EM4> <EM4>[25–300 Rep]</EM4>
headhunters_eliminateall_retrievestolen_base_Generic_M_desc_001=A tripulação local decidiu atacar um dos nossos comboios e roubar nossas coisas. Eles escaparam, mas não vamos deixá-los comemorar por muito tempo. Quero que você vá para ~mission(Location|Address) onde eles têm uma base, os exploda em cinzas e pegue nossas coisas de volta. \n\nAssim que você pegar a carga, leve-a para ~mission(Destination|Address) e todos nós podemos esquecer que esses idiotas existiram.\n\nArmazene.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA, Pyro RegionB]</EM4>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM4>[Pyro RegionC, Pyro RegionD]</EM4>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x27\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_retrievestolen_base_Generic_M_title_001=MORTE E CARGA <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
headhunters_eliminateall_xt_desc_001=É triste dizer, mas perdemos um dos nossos postos avançados para o XenoThreat. Terrível, se você me perguntar, mas é por isso que estamos procurando alguém que tenha tempo e munição para recuperá-lo.\n\nSe for você, vá até ~mission(Location|Address) e recupere-o.\n\nStows Desliga.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Yubarev "Igniter" Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev Pistol\n- [S1-A] DustUp Arms Tactical\n- [S1-A] DustUp Core Tactical\n- [S1-A] DustUp Helmet Tactical\n- [S1-A] DustUp Legs Tactical\n- [S1-A] Yubarev Pistol Battery (10 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> CQC x3, Snipers x2, Soldiers x4, Technicians x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
headhunters_eliminateall_xt_title_001=LUZ VERDE EM ~mission(Location) <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
headhunters_eliminatespecific_desc_001=Algumas informações interessantes caíram no meu colo.Acho que o notório líder do Xenothreat ~mission(TargetName) está escondido na ~mission(location|Address) trabalhando em uma grande opção para eles.Oportunidade perfeita para matar o pedaço de merda de uma vez por todas.Não há como mobilizar e implantar uma tripulação sem ~mission(TargetName|Last) sendo derrubada.Por isso, estou oferecendo a você a chance de fazer do Pyro um lugar melhor e ganhar alguns Creds ao mesmo tempo.Você só será pago se for retirar ~mission(TargetName|Last), mas não hesite em matar outros pequenos xenoturs que possam estar escondidos lá com eles.\n\nStows Desliga\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x1
headhunters_eliminatespecific_title_001=PRONTO PARA A RETRIBUIÇÃO <EM4>[1,000 Rep]</EM4>
headhunters_killship_asteroid_rank0_desc_001=Então aqui está o acordo, os Headhunters estão procurando expandir seu grupo de talentos e têm algumas vagas para qualquer um que tenha coragem.\n\nHá um verdadeiro sujeito chamado ~mission(TargetName) que acha que tem sido muito inteligente roubando cargas de transportadores que se movem pelo sistema. Pedimos uma parte de seus lucros como imposto de licenciamento para continuar operando. Quando ~mission(TargetName|Last) respondeu, eles foram muito desrespeitosos.\n\nRastreamos a nave deles até ~mission(Location|Address) e precisamos que eles sejam eliminados. Você deveria saber, eles estão sendo espertos e se mantendo próximos de alguns aliados para não ficarem sozinhos.\n\nFaça isso e nós o consideraremos para futuros trabalhos de Headhunter.\n\nArruma-se.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro RegionA]</EM4>\n- [B-S1-A] 9-Series Longsword Cannon\n- [B-S1-A] Sledge I Mass Driver Cannon\n- [B-S2-A] 10-Series Greatsword Cannon\n- [B-S2-A] Sledge II Mass Driver Cannon\n- [B-S2-A] Strife Mass Driver Cannon\n- [B-S3-A] 11-Series Broadsword Cannon\n- [B-S3-A] Sledge III Mass Driver Cannon\n\n<EM4>[Pyro RegionB]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Dominance-1 Scattergun\n- [E-S2-A] Dominance-2 Scattergun\n- [E-S3-A] Dominance-3 Scattergun\n- [STH-S1-C] HeatSafe\n\n<EM4>[Pyro RegionC]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] NN-13 Cannon\n- [E-S2-A] NN-14 Cannon\n- [E-S3-A] NN-15 Cannon\n- [STH-S1-B] VaporBlock\n\n<EM4>[Pyro RegionD]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [E-S1-A] Singe Cannon (S1)\n- [E-S2-A] Singe Cannon (S2)\n- [E-S3-A] Singe Cannon (S3)\n- [E-S4-A] M6A Cannon\n- [E-S5-A] M7A Cannon\n- [E-S6-A] M8A Cannon\n- [STH-S1-A] SnowBlind\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Reinforcements x4, Targets x1\n<EM4>Neutral:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guara