Foxwell_DefendLocation_M_Desc_001=Recebemos relatos de clientes sobre ataques de fora-da-lei contra naves nos arredores de <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4>. A área tá fechada e qualquer um que tente entrar ou sair vira alvo. Toda tentativa de resolver a situação só atraiu mais reforços dos fora-da-lei. \n\nO cliente tá desesperado por uma solução, então estamos contratando um freelancer pra ir lá e restaurar a ordem. Se surgir qualquer outro problema quando você chegar, eu te passo as instruções pelo comms.  \n\nPrecisamos de alguém pra isso com urgência. Pra deixar o serviço mais atraente, o contratado principal também vai receber um bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n‘Segurança, Do Seu Jeito’\n\nA Foxwell Enforcement é uma especialista em segurança credenciada, com licença para operar em toda a UEE. Estamos sempre em busca de novos operadores pra fazer parte da nossa equipe. Se você ou alguém que conhece estiver interessado, entre em contato com um dos nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- [S1-A] Antium Arms Storm\n- [S1-A] Antium Core Storm\n- [S1-A] Antium Helmet Storm\n- [S1-A] Antium Legs Storm\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4, Hostiles x2, Interdiction Ships x1, Reinforcements x14\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
