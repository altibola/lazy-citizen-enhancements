Foxwell_DefendLocation_VH_Desc_001=Precisamos de apoio aéreo imediato em <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4>. Os interesses do nosso cliente na área estão sendo duramente atacados por forças fora da lei. Procuramos alguém que possa pegar seu equipamento, chamar naves de apoio de confiança e se deslocar antes que seja tarde demais. Assim que chegar, te envio atualizações da situação.\n\nNão dá pra vacilar. Esses clientes estão pagando por proteção de alto nível. Se der ruim, perdemos o contrato. Por isso, quem cumprir a missão sem falhas vai receber um bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n‘Segurança do seu jeito’\n\nA Foxwell Enforcement é uma empresa de segurança licenciada para operar em todo o espaço da UEE. Estamos sempre em busca de novos operadores para integrar nosso time. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- [S1-A] Antium Arms Storm\n- [S1-A] Antium Core Storm\n- [S1-A] Antium Helmet Storm\n- [S1-A] Antium Legs Storm\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x7, Hostiles x3, Interdiction Ships x4, Reinforcements x16\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_DefendLocation_VH_Title_001=CONTRATO NÍVEL VERMELHO: SALVAE AS NAVES EM ~mission(DefendLocationWrapperLocation) <EM4>[BP]</EM4> <EM4>[250 Rep]</EM4>
Foxwell_DestroyNarcotics_E_desc_001=Algumas pessoas fazem qualquer coisa por alguns créditos. Há um grupo de bandidos novatos em <EM4>~mission(Location|Address)</EM4> que decidiu começar a fabricar drogas. Acontece que eles não são muito bons nisso, ou talvez sejam um pouco bons demais. O lixo que eles estão produzindo é mais forte do que o normal e representa um perigo real para quem o usa. \n\nFomos contratados para acabar com a operação deles e destruir qualquer estoque de drogas que esteja no local. Guardas armados estão protegendo o local, mas eles não parecem muito habilidosos. Nossas equipes de vigilância observaram que um deles quase deu um tiro no próprio pé. Não posso dizer com certeza, mas é provável que eles não causem muitos problemas a um profissional como você.  \n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança, do seu jeito'\n\nA Foxwell Enforcement é uma empresa especializada em segurança licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes contratuais.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Civilians x4\n<EM4>Jr. Security Contractor:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_DestroyNarcotics_E_title_001=ACABE COM UMA NOVA OPERAÇÃO DE DROGAS <EM4>[BP]</EM4> <EM4>[500 Rep]</EM4>
Foxwell_DestroyNarcotics_H_desc_001=Relatos de um aumento no número de overdoses de drogas em Stanton preocupam os serviços de segurança. Parece que uma equipe de dois bandidos está aumentando seus lucros cortando suas coisas com produtos químicos tóxicos. Acabar com essa equipe e interromper a distribuição de suas drogas se tornou prioridade máxima.\n\nUm informante da Foxwell revelou que parte dessa equipe se instalou em <EM4>~mission(Location|Address)</EM4>. Estou contratando uma empresa terceirizada para ir até lá e destruir as drogas que eles têm escondidas antes que sejam espalhadas pelo sistema. Mas é melhor tomar cuidado, pois dizem que essa equipe está armada até os dentes e determinada a lucrar com esse veneno, custe o que custar.\n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança, do seu jeito'\n\nA Foxwell Enforcement é uma empresa especializada em segurança licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes contratuais.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4\n<EM4>Sr. Security Contractor:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_DestroyNarcotics_H_title_001=DESTRUA DROGAS PERIGOSAS <EM4>[BP]</EM4> <EM4>[500 Rep]</EM4>
Foxwell_DestroyNarcotics_M_desc_001=Fomos contratados para cuidar de um problema na <EM4>~mission(Location|Address)</EM4>. Houve um recente aumento de atividade na área ligada ao tráfico de drogas. Parece ser uma operação bem administrada e há uma preocupação crescente de que ela se expanda mais se não for interrompida. Há alguma chance de você estar disponível para garantir que isso não aconteça?   \n\nO trabalho é bem simples. Vá até o local e destrua o estoque de drogas deles. Dessa forma, eles não terão credenciais para expandir ainda mais suas operações. No entanto, eu não esperaria que eles facilitassem as coisas para você. Guardas armados são vistos regularmente nas instalações, portanto, certifique-se de ter equipamento suficiente para lidar com eles também. \n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança, do seu jeito'\n\nA Foxwell Enforcement é uma empresa especializada em segurança licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes contratuais.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4\n<EM4>Security Contractor:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
