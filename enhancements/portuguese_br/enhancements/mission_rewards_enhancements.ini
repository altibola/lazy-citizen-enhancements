HeadHunters_DefendEntitesAndEscort_VH_Desc=Achei que a gente tinha mantido isso discreto, mas parece que vazou que <EM4>~mission(Location|Address)</EM4> tem ligação com os Headhunters. Agora tem uns operadores pesados causando caos lá, atacando os <EM>~mission(Objects)</EM4> e me dando uma baita dor de cabeça.\n\nCom o poder de fogo desses caras, você vai precisar levar uma <EM4>equipe própria</EM4> pra dar conta. Ainda mais porque quero que você proteja quaisquer <EM4>naves aliadas</EM4> que precisarem de ajuda.\n\nEssa operação precisa sair perfeita, então estou oferecendo <EM4>~mission(ScripAmount) Council Scrip</EM4> pro contratante principal.\n\nStows out.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Nyx]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [CIV-S0-B] Kelvid\n- [CIV-S0-D] Winter-Star SL\n- [CIV-S1-B] Cryo-Star\n- [CIV-S1-B] Endo\n- [CIV-S1-B] FlashFreeze\n- [CIV-S1-D] BlastChill\n- [CIV-S1-D] Winter-Star\n- [CIV-S2-B] Cryo-Star EX\n- [CIV-S2-B] FullFrost\n- [CIV-S2-B] Taiga\n- [CIV-S2-D] WhiteOut\n- [CIV-S2-D] Winter-Star EX\n- [CIV-S3-B] Cryo-Star XL\n- [CIV-S3-B] FrostBite\n- [CIV-S3-D] ColdSurge\n- [CIV-S3-D] Winter-Star XL\n- [B-S1-A] Tarantula GT-870 Mark 1 Cannon\n- [B-S1-A] YellowJacket GT-210 Gatling\n- [B-S2-A] Scorpion GT-215 Gatling\n- [B-S2-A] Tarantula GT-870 Mark 2 Cannon\n- [B-S3-A] Mantis GT-220 Gatling\n- [B-S3-A] Tarantula GT-870 Mark 3 Cannon\n- [MIL-S3-A] V880\n\n<EM4>[Pyro]</EM4>\n- [CIV-S0-D] DuraJet\n- [CIV-S1-D] ZapJet\n- [CIV-S2-A] Lotus\n- [CIV-S2-D] SparkJet\n- [CIV-S3-A] TigerLilly\n- [CIV-S3-D] SparkJet Pro\n- [IND-S0-B] Defiant\n- [B-S4-A] AD4B Ballistic Gatling\n- [B-S5-A] AD5B Ballistic Gatling\n- [B-S6-A] AD6B Ballistic Gatling\n- [MIL-S1-A] V801-11\n- [MIL-S2-A] V801-12\n\n<EM4>[Stanton]</EM4>\n- [CIV-S0-C] PIN\n- [CIV-S1-B] 6SA 'Arbiter'\n- [CIV-S1-B] HEX\n- [CIV-S1-C] 5SA 'Rhada'\n- [CIV-S1-C] WEB\n- [CIV-S2-B] 6MA 'Kozane'\n- [CIV-S2-B] BLOC\n- [CIV-S2-C] 5MA 'Chimalli'\n- [CIV-S2-C] STOP\n- [CIV-S3-B] 6CA 'Bila'\n- [CIV-S3-C] 5CA 'Akura'\n- [CIV-S3-C] GUARD\n- [B-S1-A] SW16BR1 “Buzzsaw” Repeater\n- [B-S2-A] SW16BR2 “Sawbuck” Repeater\n- [B-S3-A] SW16BR3 “Shredder” Repeater\n- [MIL-S1-B] Tige\n- [MIL-S2-B] Vigilance\n- [MIL-S3-B] Devoue\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x24, Interdiction Ships x4, Reinforcements x16\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Rep:</EM4> +250\n<EM4>Blueprint Reward:</EM4> Guaranteed
