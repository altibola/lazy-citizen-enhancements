Eckhart_EscortShips_VE_desc=ECKHART SECURITY, LLC.\nCONTRATOS E DESPACHO\n\nTIPO DE CONTRATO: Escolta de Naves\nCódigo de aprovação = ~mission(ApprovalCode)\n\nPROCESSAMENTO IMEDIATO\n\nUm cliente pediu suporte adicional para um grupo de naves saindo de uma base de asteroides em <EM4>~mission(Location|Address)</EM4>. Após aceitar, vá até lá e aguarde instruções. Sua missão é garantir uma passagem segura. Pode haver inimigos, mas nada que deva ser problema.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações são destinadas apenas para o uso da pessoa ou entidade designada acima.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] M3A Cannon\n- [E-S2-A] M4A Cannon\n- [E-S3-A] M5A Cannon\n- [STH-S1-C] Shimmer\n- [STH-S2-C] Obscura\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2, Hostiles x1, Reinforcements x6\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
