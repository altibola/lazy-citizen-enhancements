EckhartSecurity_DestroyServers_FacilityDelving_Desc_001=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Destruir Servidor\nCÓDIGO DE APROVAÇÃO = VS-14\n\nPARA PROCESSAMENTO IMEDIATO\n\nNosso cliente solicitou a destruição imediata de um grupo de servidores localizados em um antigo centro de pesquisa da ASD que está desativado há anos. Os servidores em questão contêm informações que o cliente considera extremamente comprometedoras e quer ver esses dados completamente eliminados.\n\nA vigilância inicial indica que os servidores estão dentro do <EM4>Laboratório de Energia da instalação, localizado na ala de Pesquisa</EM4>. Também detectamos várias forças hostis na área, então fique em alerta.\n\nO pagamento será liberado após a conclusão bem-sucedida do contrato.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso exclusivo do indivíduo ou entidade mencionados acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Applicant:</EM4> +50 Rep
EckhartSecurity_DestroyServers_FacilityDelving_Desc_002=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Destruir Servidor\nCÓDIGO DE APROVAÇÃO = VS-14\n\nPARA PROCESSAMENTO IMEDIATO\n\nUm cliente nos solicitou infiltrar um antigo centro de pesquisa da ASD e apagar o conteúdo de alguns servidores específicos no local.\n\nAcreditamos que os servidores estejam em algum lugar dentro do <EM4>Laboratório de Xenotech, na ala de Pesquisa</EM4>. O cliente também informou que, apesar das instalações terem sido oficialmente declaradas como fechadas, ainda é provável encontrar forças hostis por lá.\n\nO pagamento será liberado após a conclusão bem-sucedida do contrato.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso exclusivo do indivíduo ou entidade mencionados acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Applicant:</EM4> +50 Rep
EckhartSecurity_DestroyServers_FacilityDelving_Desc_003=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Destruir Servidor\nCÓDIGO DE APROVAÇÃO = VS-14\n\nPARA PROCESSAMENTO IMEDIATO\n\nEste é um contrato simples de localizar e destruir. O cliente solicitou que vários servidores localizados em um centro de pesquisa da ASD sejam destruídos o mais rápido possível. Em hipótese alguma esses servidores devem ser acessados ou ter cópias de seus dados feitas.\n\nO cliente acredita que os servidores estejam em algum ponto da <EM4>ala de Engenharia</EM4>, provavelmente na área de <EM4>Administração</EM4>. Além disso, há grandes chances de você não ser a única presença no local, então fique atento a possíveis hostis.\n\nO pagamento será liberado após a conclusão bem-sucedida do contrato.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso exclusivo do indivíduo ou entidade mencionados acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Applicant:</EM4> +50 Rep
EckhartSecurity_DestroyServers_FacilityDelving_Desc_004=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Destruir Servidor\nCÓDIGO DE APROVAÇÃO = VS-14\n\nPARA PROCESSAMENTO IMEDIATO\n\nO cliente solicitou um contratado discreto para infiltrar um centro de pesquisa da ASD, localizar um grupo de servidores e destruir permanentemente as informações armazenadas neles.\n\nO cliente conseguiu compartilhar a localização dos servidores dentro da instalação: o <EM4>Centro de Controle na ala de Engenharia</EM4>. O local foi oficialmente fechado, mas ainda podem existir forças hostis por lá. Fique em guarda.\n\nO pagamento será liberado após a conclusão bem-sucedida do contrato.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações destinam-se ao uso exclusivo do indivíduo ou entidade mencionados acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Applicant:</EM4> +50 Rep
