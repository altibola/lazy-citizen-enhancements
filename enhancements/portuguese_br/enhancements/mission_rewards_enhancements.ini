Hockrow_FacilityDelve_P2M1_Repeat_desc=Agência Hockrow \nArquivo de Caso #JD10285\nInvestigador Principal: Arken Mallor\n\nAtualização do Caso:\nSeria útil ter os dados mais recentes sobre a anomalia energética para que possamos compará-los com os dados que você entregou da última vez. Qualquer diferença entre os dois conjuntos de dados pode ser útil.\n\nAções do Investigador Contratado:\nExplore a ala de <EM4>Engenharia</EM4> e <EM4>recupere os dados da Anomalia Energética</EM4> e entregue-os a <EM4>~mission(Destination|Address)</EM4>.\n\nNotas Adicionais:\nFique atento a possíveis forças hostis no local.\n\nViaje até Onyx em um veículo que possa ser armazenado em um hangar grande.\n\nAssim que você entregar esses dados, enviarei a você um <EM4>ASD Secure Drive</EM4> que você poderá coletar no seu local de residência.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Fresnel Energy LMG\n- Zenith Laser Sniper Rifle\n- [S1-A] Corbel Arms Mire\n- [S1-A] Corbel Core Mire\n- [S1-A] Corbel Helmet Mire\n- [S1-A] Corbel Legs Mire\n- [S1-A] Fresnel Energy LMG Battery (165 Cap)\n- [S1-A] Geist Armor Arms Forest\n- [S1-A] Geist Armor Core Forest\n- [S1-A] Geist Armor Helmet Forest\n- [S1-A] Geist Armor Legs Forest\n- [S3-A] Novikov Backpack Mire\n\n<EM3>ITEM REWARDS</EM3>\n- ASD Secure Drive\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
