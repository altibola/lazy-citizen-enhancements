p_protectandresupply_PreXeno_desc=Atenção, voluntários da CDF, a XenoThreat finalmente lançou seu ataque contra a Jericho Station no Pyro Gateway em Stanton.\n\nA Marinha solicitou forças da CDF para ajudar a combater as forças da XenoThreat na área e/ou recuperar suprimentos dos destroços e entregá-los com segurança à Jericho Station. \n\nA Marinha organizou um estipêndio comunitário para lidar com a distribuição do pagamento. Isso será distribuído entre todos os voluntários da CDF em intervalos designados. Um indicador aparecerá em seu HUD para medir esses pagamentos.\n\nPor favor, observe que os suprimentos são altamente voláteis se não forem manuseados corretamente. Tenha cuidado ao transportar esses materiais:\n* O Zeta-Prolanide se degrada com o tempo até se decompor completamente.\n* O AcryliPlex Composite se torna explosivamente instável se for danificado.\n* O Diluthermex libera um pulso de energia destrutivo se for exposto a viagens quânticas.\n\nA ASAIC Rowena Dulli, da Advocacia, é a adida oficial da CDF e comandará a operação.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Difficulty (1-7):</EM4> 5/7\n<EM4>Rep:</EM4> +4,000
p_protectandresupply_PreXeno_title=INICIATIVA OVERDRIVE: EMBOSCADA XENOTHREAT – SUPORTE NECESSÁRIO <EM4>[4,000 Rep]</EM4>
p_protectandresupply_desc_v2=*PARA DIVULGAÇÃO IMEDIATA EM TODO O SISTEMA*\n\nAtenção, as forças da XenoThreat começaram a emboscar naves de comboio da Marinha que transportavam suprimentos vitais enquanto estavam a caminho da Estação Jericho em Pyro Gateway no Sistema Stanton. A Navy solicitou que as forças da CDF ajudassem a recuperar esses suprimentos dos destroços e a entregá-los com segurança na estação Jericho. \n\nA Navy organizou um estipêndio comunitário para lidar com a distribuição do pagamento. Isso será distribuído entre todos os voluntários da CDF em intervalos designados. Um indicador aparecerá em seu HUD para medir esses pagamentos.\n\nPor favor, observe que alguns desses suprimentos são altamente voláteis se não forem manuseados corretamente. Tenha cuidado ao transportar esses materiais:\n* O Zeta-Prolanide se degrada com o tempo até se decompor completamente.\n* O AcryliPlex Composite se torna explosivamente instável se for danificado.\n* O Diluthermex libera um pulso de energia destrutivo se for exposto a viagens quânticas.\n\nAlém disso, embora não sejam tão voláteis, os suprimentos de DynaFlex perdidos durante o ataque ainda são urgentemente necessários para a Marinha concluir os reparos do Javelin e devem ser uma prioridade para recuperação.    \n\nAlém disso, os hostis da XenoThreat ainda podem estar na área, portanto, tenha cuidado. Os voluntários da CDF com experiência em combate também devem contribuir, protegendo essas áreas das forças remanescentes da XenoThreat.\n\nA CSAIC Rowena Dulli, da Advocacia, é a adida oficial da CDF e comandará a operação.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 5/7\n<EM4>Rep:</EM4> +4,000
p_protectandresupply_title=ALERTA CDF: EMBOSCADA XENOTHREAT - SUPORTE NECESSÁRIO <EM4>[4,000 Rep]</EM4>
p_showdown_PreXeno_desc=Atenção, as forças navais se reagruparam para o ataque final que a XenoThreat vem planejando. A Marinha solicitou oficialmente qualquer voluntário da CDF para ajudar a fornecer suporte de combate nesse esforço final para proteger nosso sistema. Isso incluirá outros voluntários além daqueles que participaram da Overdrive Initiative.\n\nSAIC Rowena Dulli, da Advocacy, é a adida oficial da CDF e comandará a operação.\n\nSe for bem-sucedida, esta série da Overdrive Initiative será concluída e você receberá acesso temporário aos F7A Hornets ou uma atualização gratuita se já tiver um F7C.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Difficulty (1-7):</EM4> 5/7\n<EM4>Rep:</EM4> +4,000
p_showdown_PreXeno_title=INICIATIVA OVERDRIVE: ATAQUE AO XENOTHREAT <EM4>[4,000 Rep]</EM4>
p_showdown_desc=*LANÇAMENTO IMEDIATO EM TODO O SISTEMA*\n\nAtenção, as forças da Marinha se reagruparam para um ataque final ao bando XenoThreat sem lei que tem atormentado o Sistema Stanton. A Marinha solicitou oficialmente a todos os voluntários da CDF que ajudassem neste esforço final para proteger o nosso sistema. Rowena Dulli, da SAIC Advocacy, é adida oficial do CDF e liderará a operação.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 5/7\n<EM4>Rep:</EM4> +4,000
p_showdown_title=ALERTA CDF: ATAQUE A XENOTHREAT <EM4>[4,000 Rep]</EM4>
