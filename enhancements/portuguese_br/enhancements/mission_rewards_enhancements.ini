Shubin_Industrial_ShipMining_VH_Org_Desc_001=AVISO: Ordem de Compra\nLOCALIZAÇÃO: <EM4>~mission(System) </EM4>\n\nTERMOS*: \nA Shubin Interstellar está buscando cumprir mais uma ordem de compra para diversos materiais refinados. Esta ordem é mais complexa que o padrão, exigindo múltiplos métodos de mineração, mas como você já mostrou serviço até aqui, acreditamos que você e sua equipe estão prontos pro desafio.\n\nLembrete: os <EM4>materiais devem estar refinados antes da entrega</EM4> e, como isso é uma ordem de compra e não um contrato de mineração, você deve fornecer seu próprio equipamento, como um <EM4>~mission(Hint_Tool)</EM4>.\n\nQuando estiver pronto para nos vender os materiais exigidos, deposite-os no elevador de carga localizado em <EM4>~mission(Destination|Address)</EM4>.\n\n*Ao aceitar este contrato, você assume todos os riscos envolvidos no trabalho descrito e, em nenhuma hipótese, a Shubin Interstellar poderá ser responsabilizada por quaisquer danos ocorridos durante a vigência do contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Shubin_RG_ShipMining_Rank4_Org]</EM4>\n- Arclight "Nightstalker" Pistol\n- Arclight "Warhawk" Pistol\n- [S1-A] Arclight Pistol Battery (30 cap)\n- [S1-A] Aril Arms\n- [S1-A] Aril Core\n- [S1-A] Aril Helmet\n- [S1-A] Aril Legs\n- Arclight "Stormfall" Pistol\n- Arclight Pistol\n- [S1-A] Horizon Helmet\n- [S1-A] Venture Arms\n- [S1-A] Venture Core\n- [S1-A] Venture Legs\n\n<EM4>[Shubin_RG_ShipMining_Rank4_Org, Rank 0–1]</EM4>\n- [IND-S0-C] Surveyor-Go\n- [IND-S1-C] Surveyor-Lite\n- [IND-S2-C] Surveyor\n- [IND-S3-C] Surveyor-Max\n- [MIN-S0-A] Arbor MHV Mining Laser\n- [MIN-S0-B] Helix\n- [MIN-S0-B] Hofstede\n- [MIN-S0-C] Lawson Mining Laser\n\n<EM4>[Shubin_RG_ShipMining_Rank4_Org, Rank 2–3]</EM4>\n- [IND-S0-B] BroadSpec-Go\n- [IND-S2-B] BroadSpec\n- [IND-S4-B] BroadSpec-Max\n- [MIN-S1-A] Arbor MH1 Mining Laser\n- [MIN-S1-A] Helix I Mining Laser\n- [MIN-S1-A] Hofstede-S1 Mining Laser\n- [MIN-S1-A] Impact I Mining Laser\n- [MIN-S1-A] Klein-S1 Mining Laser\n- [MIN-S1-A] Lancet MH1 Mining Laser\n- [MIN-S1-A] Pitman Mining Laser\n\n<EM4>[Shubin_RG_ShipMining_Rank4_Org, Rank 4]</EM4>\n- [IND-S0-A] FullSpec-Go\n- [IND-S2-A] FullSpec\n- [IND-S3-A] FullSpec-Max\n- [MIN-S2-A] Arbor MH2 Mining Laser\n- [MIN-S2-A] Helix II Mining Laser\n- [MIN-S2-A] Hofstede-S2 Mining Laser\n- [MIN-S2-A] Impact II Mining Laser\n- [MIN-S2-A] Klein-S2 Mining Laser\n- [MIN-S2-A] Lancet MH2 Mining Laser\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Veteran Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
