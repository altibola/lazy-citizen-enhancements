BHG_Certification_Criminal_Desc=--------------------------------------------------------\n----------------- CONTRATO DE CAÇA -----------------\n--------------------------------------------------------\n\nGUILDA DE CAÇADORES DE RECOMPENSA\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Guilda de Caçadores de Recompensa autorizou uma caçada oficial.\n\nNOME: ~mission(TargetName) \nSISTEMA: Desconhecido\nAVALIAÇÃO DE RISCO: Alto\nÚLTIMA LOCALIZAÇÃO CONHECIDA: Desconhecida\nAFILIAÇÕES CONHECIDAS: <Nenhuma>\nNOTAS: Por recomendação de um de nossos membros, a Guilda de Caçadores de Recompensa gostaria de oferecer a você a chance de obter sua Certificação de Apreensão de Suspeitos.\n\nIsto significaria que você está qualificado para rastrear e apreender suspeitos procurados que se mostraram mais esquivos do que as recompensas típicas. Eles frequentemente possuem habilidades avançadas de pilotagem, comportamento imprevisível e mais recursos do que um alvo comum, tornando-os um desafio real.\n\nPara completar com sucesso este processo de certificação, você deve apreender o suspeito procurado <EM4>~mission(TargetName)</EM4>.\n\n\nGUILDA DE CAÇADORES DE RECOMPENSA\nEm Busca da Justiça\n\nA Guilda de Caçadores de Recompensa é um serviço de segurança sancionado pela Guilda de Mercenários e autorizado a operar tanto na UEE quanto além, de acordo com os Atos da Autoridade Xenotrade.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50
BHG_Certification_Criminal_Title=CERTIFICADO PARA PRISÃO DE SUSPEITOS <EM4>[50 Rep]</EM4>
BHG_Certification_Easy_Desc=--------------------------------------------------------\n----------------- CONTRATO DE CAÇA -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName) \nSISTEMA: ~mission(System)\nAVALIAÇÃO DE RISCO: Baixo\nÚLTIMA LOCALIZAÇÃO CONHECIDA: ~mission(Location)\nAFILIAÇÕES CONHECIDAS: <Nenhuma>\nNOTAS: Com base em uma avaliação das suas habilidades em desenvolvimento, a Bounty Hunters Guild gostaria de oferecer a você a chance de obter sua Permissão de Rastreador Iniciante.\n\nEssa permissão indica que você está qualificado para rastrear e capturar Alvos de Baixo Risco (LRT). Esses criminosos normalmente pilotam naves menores, mas geralmente contam com algumas escoltas, o que torna a missão mais desafiadora.\n\nPara concluir com sucesso este processo de certificação, você deve capturar um criminoso classificado como LRT chamado <EM4>~mission(TargetName)</EM4>, visto pela última vez em <EM4>~mission(Location|Address)</EM4>.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca da Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Mercenary Guild e autorizado a operar tanto dentro da UEE quanto além, de acordo com os Atos da Autoridade Xenotrade.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 3
BHG_Certification_Easy_Title=CERTIFICADO DE PERMISSÃO PARA RASTREADOR INICIANTE <EM4>[50 Rep]</EM4>
BHG_Certification_EscapedConvict_Desc=--------------------------------------------------------\n----------------- CONTRATO DE CAÇA -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName) \nSISTEMA: ~mission(System)\nAVALIAÇÃO DE RISCO: Alto\nÚLTIMA LOCALIZAÇÃO CONHECIDA: Instalação de Reabilitação Klescher\nAFILIAÇÕES CONHECIDAS: <Nenhuma>\nNOTAS: Devido ao aumento de fugitivos na região, a Bounty Hunters Guild gostaria de oferecer a você a chance de obter sua Certificação de Recuperação de Fugitivos.\n\nIsso indica que você está qualificado para rastrear e capturar condenados fugitivos. Esses indivíduos desesperados podem ser bastante difíceis de recapturar, exigindo habilidades especiais e grande intuição.\n\nPara concluir com sucesso este processo de certificação, você deve capturar o fugitivo <EM4>~mission(TargetName)</EM4>.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca da Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Mercenary Guild e autorizado a operar tanto dentro da UEE quanto além, de acordo com os Atos da Autoridade Xenotrade.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50
