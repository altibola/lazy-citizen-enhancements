RAIN_collectresources_multiple_GEN_desc_01=Para todos os contratados disponíveis,\n\nOs cientistas da Rayari estão trabalhando arduamente para tentar resolver os problemas com a tecnologia de regeneração falha. Atualmente, seus esforços são prejudicados pela falta de materiais que, segundo eles, poderiam ser essenciais para seus experimentos.  \n\nEm particular, nossos cientistas da <EM4>~mission(Destination|Address)</EM4> tiveram que suspender seu trabalho depois de ficarem sem esses recursos. Como o reabastecimento de nosso fornecedor normal não será possível por meses devido à escassez de suprimentos, pagaremos um prêmio a qualquer pessoa que possa ajudar a reabastecer os materiais.\n\nPara obter mais informações sobre os animais em questão, consulte o “Explorer's Guide to Harvestables” em seu Journal.\n\nJuntos, podemos tornar o universo melhor para todos.\n\nNarina Lerrem\nGerente Sênior\nTerceirização de Pesquisa Clínica\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- P8-AR Rifle\n- [S1-A] P8-AR Rifle Magazine (15 Cap)\n- [S1-A] Palatino Arms\n- [S1-A] Palatino Arms Moonfall\n- [S1-A] Palatino Core\n- [S1-A] Palatino Core Moonfall\n- [S1-A] Palatino Helmet\n- [S1-A] Palatino Helmet Moonfall\n- [S1-A] Palatino Legs\n- [S1-A] Palatino Legs Moonfall\n- Prism "Bonedust" Laser Shotgun\n- Prism "Deep Sea" Laser Shotgun\n- Prism "Firesteel" Laser Shotgun\n- Prism Laser Shotgun\n- [S1-A] Prism Laser Shotgun Battery (20 cap)\n- [S1-A] Siebe Helmet\n- [S1-A] Stirling Exploration Suit\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> 25% chance (YormandiEyes, IrradiatedPearls only)\n\n<EM4>? = only the YormandiEyes, IrradiatedPearls variants award blueprints</EM4>
RAIN_collectresources_multiple_GEN_name_01=RECURSOS ADICIONAIS PARA PESQUISA <EM4>[BP?]</EM4> <EM4>[100–200 Rep]</EM4>
RAIN_collectresources_multiple_OLP_desc_01=Para todos os contratados disponíveis,\n\nOs cientistas da Rayari estão trabalhando arduamente para tentar resolver os problemas com a tecnologia de regeneração falha. Atualmente, seus esforços são prejudicados pela falta de três recursos essenciais para seus experimentos: <EM4>saldynium, jaclium, and carinite</EM4>.  \n\nEm particular, nossos cientistas da <EM4>~mission(Destination|Address)</EM4> tiveram que suspender seu trabalho depois de ficarem sem esses recursos. Como um reabastecimento do nosso fornecedor normal não será possível por meses devido à escassez de suprimentos, pagaremos um prêmio a qualquer um que possa ajudar a reabastecer os materiais.\n\nEmbora não tenhamos conseguido fazer varreduras completas, há uma forte crença entre nossas equipes de que as plataformas de laser orbital extintas de Hathor foram construídas sobre áreas com alta concentração desses recursos. Reativar essas OLP pode ser sua melhor esperança de adquirir o que precisamos.\n\nJuntos, podemos tornar o universo melhor para todos.\n\nNarina Lerrem\nGerente Sênior\nTerceirização de Pesquisa Clínica\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Pulse "Blacklist" Pistol\n- Pulse "Rouge" Pistol\n- Pulse Laser Pistol\n- Quartz "Black Op" Energy SMG\n- Quartz "Deadfall" Energy SMG\n- Quartz "Lumen" Energy SMG\n- Quartz Energy SMG\n- [S1-A] Pulse Laser Pistol Battery (60 Cap)\n- [S1-A] Quartz Energy SMG Battery (45 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 7/7\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> 25% chance
RAIN_collectresources_multiple_OLP_name_01=RECURSOS VITAIS NECESSÁRIOS PARA A PESQUISA <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
RAIN_collectresources_single_OLP_desc_01=Para todos os contratados disponíveis,\n\nNossa equipe de pesquisa em <EM4>~mission(Destination|Address)</EM4> está trabalhando incansavelmente para resolver a atual “Crise de Regeneração” e abordar a questão das impressões instáveis. O trabalho deles produziu resultados promissores, mas a falta de um recurso importante está impedindo a capacidade de realizar mais experimentos. \n\nRecebemos informações de nosso fornecedor de que o aumento da demanda, combinado com a redução da produção de mineração, significa que não receberemos nossa remessa programada por mais alguns meses. Nossa equipe de pesquisa não pode esperar tanto tempo e esperamos que você possa ajudar.      \n\nO recurso é difícil de ser encontrado, mas sabemos de fonte segura que as antigas instalações de mineração da Hathor foram construídas em áreas com alta concentração do minério. Como a Hathor foi extinta pouco tempo depois de estabelecer suas operações no sistema, há uma boa chance de que a ativação de um desses lasers de mineração possa lhe fornecer o que precisamos.\n\nJuntos, podemos tornar o universo melhor para todos.\n\nNarina Lerrem\nGerente Sênior\nTerceirização de Pesquisa Clínica\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Pulse "Blacklist" Pistol\n- Pulse "Rouge" Pistol\n- Pulse Laser Pistol\n- Quartz "Black Op" Energy SMG\n- Quartz "Deadfall" Energy SMG\n- Quartz "Lumen" Energy SMG\n- Quartz Energy SMG\n- [S1-A] Pulse Laser Pistol Battery (60 Cap)\n- [S1-A] Quartz Energy SMG Battery (45 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 7/7\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> 25% chance
RAIN_collectresources_single_OLP_name_01=NECESSIDADE DE RECURSOS PARA PESQUISA\n <EM4>[BP]</EM4> <EM4>[100–150 Rep]</EM4>
RAIN_intro_desc_01=Para todos os contratantes disponíveis,\n\nA Rayari Incorporated está procurando contratantes independentes para fornecer suporte adicional em nossos esforços para expandir os limites da ciência, agricultura e medicina no Empire e além. \n\nUma iniciativa de pesquisa na <EM4>~mission(Destination|Address)</EM4> está precisando desesperadamente de <EM4>chifres de kopion de tundra</EM4>, por isso estamos procurando um contratante confiável para obter e entregar esses componentes cruciais. \n\nPara obter mais informações sobre os animais em questão, consulte “O Guia da Vida Selvagem de Stanton” em seu Journal.\n\nA Rayari oferece salários competitivos e a certeza de que você está construindo um universo melhor.\n\nVamos crescer juntos,\n\nNarina Lerrem\nGerente Sênior\nTerceirização de Pesquisa Clínica\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Neutral:</EM4> +100 Rep
