BHG_Certification_Medium_Desc=--------------------------------------------------------\n----------------- CONTRATO DE CAÇA -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName) \nSISTEMA: ~mission(System)\nAVALIAÇÃO DE RISCO: Moderado\nÚLTIMA LOCALIZAÇÃO CONHECIDA: ~mission(Location)\nAFILIAÇÕES CONHECIDAS: <Nenhuma>\nNOTAS: Com o progresso que você tem feito no desenvolvimento das suas habilidades, a Bounty Hunters Guild gostaria de oferecer a você a chance de obter sua Licença Completa de Rastreador.\n\nEssa licença indica que você está qualificado para rastrear e capturar Alvos de Risco Moderado (MRT). Esses criminosos normalmente pilotam naves de médio porte com várias escoltas. Essa categoria de fora-da-lei representa grande parte dos contratos que caçadores de recompensa costumam enfrentar.\n\nPara concluir com sucesso este processo de certificação, você deve capturar um criminoso classificado como MRT chamado <EM4>~mission(TargetName)</EM4>, visto pela última vez em <EM4>~mission(Location|Address)</EM4>.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca da Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Mercenary Guild e autorizado a operar tanto dentro da UEE quanto além, de acordo com os Atos da Autoridade Xenotrade.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 2
