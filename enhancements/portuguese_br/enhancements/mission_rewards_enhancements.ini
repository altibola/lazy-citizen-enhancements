Covalex_HaulCargo_AtoB_desc_DeliverAll=Fala aí, \n\nÉ o seguinte, preciso de alguém bom pra uma missão especial. Temos um cliente importante ameaçando levar o contrato pra outra empresa porque as entregas anteriores chegaram faltando carga. Eles exigiram que 100% da carga chegue nessa entrega, senão não pagam. Como isso aconteceu antes da minha gestão e meu supervisor quer provar que não vai acontecer de novo, aceitamos o desafio. Acho que você é a pessoa certa pra isso. \n\nSe topar o risco, aqui estão os detalhes. A carga pode ser coletada em <EM4>~mission(Location|Address)</EM4> e entregue em <EM4>~mission(Destination|Address)</EM4>. O maior contêiner que você vai precisar lidar é de <EM4>~mission(MissionMaxSCUSize)</EM4>, então traga uma nave grande o bastante e um <EM4>Tractor Beam portátil</EM4> pra ajudar a mover tudo.  \n \n~mission(Contractor|SignOff) \n\nElla Tieno \nAssistente de Logística Jr. \nCovalex Shipping   \n“Tudo que você precisa, onde quer que precise.”\n\n\n\n\n\n\n\nA Covalex Shipping é uma corporação de responsabilidade limitada. Para incentivar entregas pontuais e evitar fraude em transportes de carga, a Covalex estabelecerá um limite de tempo para entrega e, ao expirar, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será ajustado proporcionalmente à porcentagem de carga entregue com sucesso.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-A] Palisade\n- [IND-S2-A] Rampart\n- [IND-S3-A] Parapet\n- [MIL-S1-A] VK-00\n- [MIL-S1-B] Siren\n- [MIL-S2-A] XL-1\n- [MIL-S2-B] Yeager\n- [MIL-S3-A] TS-2\n- [MIL-S3-B] Balandin\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x24\n<EM4>Blueprint Reward:</EM4> Guaranteed
Covalex_HaulCargo_AtoB_desc_FromLevski=E aí, \n\nA People's Alliance nos contratou pra mover uma carga de Levski até <EM4>~mission(Destination|Address)</EM4>. Pra ser sincera, tô surpresa que eles exportem esse tipo de coisa, mas acho que precisam vender algo pra bancar o que importam. \n\nPra esse frete, você vai precisar de uma nave que possa carregar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e um <EM4>Tractor Beam portátil</EM4> pra manuseá-los. É só isso.  \n\n~mission(Contractor|SignOff)\n  \nElla Tieno \nAssistente de Logística Jr. \nCovalex Shipping   \n“Tudo que você precisa, onde quer que precise.” \n\n\n\n\n\n\n\nA Covalex Shipping é uma corporação de responsabilidade limitada. Para incentivar entregas pontuais e evitar fraude em transportes de carga, a Covalex estabelecerá um limite de tempo para entrega e, ao expirar, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será ajustado proporcionalmente à porcentagem de carga entregue com sucesso.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-A] Palisade\n- [IND-S2-A] Rampart\n- [IND-S3-A] Parapet\n- [MIL-S1-A] VK-00\n- [MIL-S1-B] Siren\n- [MIL-S2-A] XL-1\n- [MIL-S2-B] Yeager\n- [MIL-S3-A] TS-2\n- [MIL-S3-B] Balandin\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x24\n<EM4>Blueprint Reward:</EM4> Guaranteed
Covalex_HaulCargo_AtoB_desc_FromRuinStation=E aí, aqui é a El. \n\nTemos um cliente em <EM4>~mission(Location|Address)</EM4> que precisa que a carga dele seja retirada da Ruin Station. Já estão esperando faz um tempo e estão ficando impacientes. Consegue dar conta disso pra gente? \n\nVocê vai precisar de uma nave que caiba <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e um <EM4>Tractor Beam portátil</EM4> pra movimentá-los. \n\n~mission(Contractor|SignOff)\n\nElla Tieno \nAssistente de Logística Jr. \nCovalex Shipping   \n“Tudo que você precisa, onde quer que precise.” \n\n\n\n\n\n\n\nA Covalex Shipping é uma corporação de responsabilidade limitada. Para incentivar entregas pontuais e evitar fraude em transportes de carga, a Covalex estabelecerá um limite de tempo para entrega e, ao expirar, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será ajustado proporcionalmente à porcentagem de carga entregue com sucesso.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-A] Palisade\n- [IND-S2-A] Rampart\n- [IND-S3-A] Parapet\n- [MIL-S1-A] VK-00\n- [MIL-S1-B] Siren\n- [MIL-S2-A] XL-1\n- [MIL-S2-B] Yeager\n- [MIL-S3-A] TS-2\n- [MIL-S3-B] Balandin\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x24\n<EM4>Blueprint Reward:</EM4> Guaranteed
Covalex_HaulCargo_AtoB_desc_ProcessedFood_Stanton2=Oi, \n\nParece que Orison precisa de mais um reabastecimento de comida processada e gelo pressurizado. Eles têm isso num cronograma padrão, mas pediram uma entrega o quanto antes.  \n\nVocê pode fazer essa rota? A carga (<EM4>~mission(MissionMaxSCUSize)</EM4> ou menor) está pronta pra ser coletada em um elevador de carga em <EM4>~mission(Location|Address)</EM4>. Deve ser uma corrida rápida e fácil até um elevador de carga em <EM4>~mission(Destination|Address)</EM4>. \n\nAh, e recomendamos fortemente que os contratados levem um <EM4>Tractor Beam portátil</EM4> com eles.   \n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nAssistente de Logística Jr.\nCovalex Shipping  \n“Tudo que você precisa, onde quer que precise.”\n\n\n\n\n\n\n\nA Covalex Shipping é uma corporação de responsabilidade limitada. Para incentivar entregas pontuais e evitar fraude em transportes de carga, a Covalex estabelecerá um limite de tempo para entrega e, ao expirar, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será ajustado proporcionalmente à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +2,000
Covalex_HaulCargo_AtoB_desc_RawOre_Stanton1=E aí,\n\nUm gerente de logística da Hurston acabou de solicitar uma coleta prioritária da instalação deles. Parece que encontraram uma nova veia de minério e precisam liberar espaço pro que estão extraindo.\n\nO minério bruto precisa ser transportado de um elevador de carga em <EM4>~mission(Location|Address)</EM4> pra um elevador de carga em <EM4>~mission(Destination|Address)</EM4>. Serão contêineres de <EM4>~mission(MissionMaxSCUSize)</EM4> ou menores. Topa esse serviço? \n\nAh, e recomendamos fortemente que os contratados levem um <EM4>Tractor Beam portátil</EM4> com eles.   \n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nAssistente de Logística Jr.\nCovalex Shipping  \n“Tudo que você precisa, onde quer que precise.”\n\n\n\n\n\n\n\nA Covalex Shipping é uma corporação de responsabilidade limitada. Para incentivar entregas pontuais e evitar fraude em transportes de carga, a Covalex estabelecerá um limite de tempo para entrega e, ao expirar, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será ajustado proporcionalmente à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 3/7\n<EM4>Rep:</EM4> +500
Covalex_HaulCargo_AtoB_desc_RefinedOre_Stanton4=Oi, \n\n<EM4>~mission(Destination|Address)</EM4> precisa de uma entrega de minério refinado pra manter as linhas de produção funcionando. A carga (<EM4>~mission(MissionMaxSCUSize)</EM4> ou menor) está pronta pra ser coletada em um elevador de carga em <EM4>~mission(Location|address)</EM4>. Consegue pegar e entregar em um elevador de carga em ~mission(Destination)?\n\nAh, e recomendamos fortemente que os contratados levem um <EM4>Tractor Beam portátil</EM4> com eles.   \n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nAssistente de Logística Jr.\nCovalex Shipping  \n“Tudo que você precisa, onde quer que precise.”\n\n\n\n\n\n\n\nA Covalex Shipping é uma corporação de responsabilidade limitada. Para incentivar entregas pontuais e evitar fraude em transportes de carga, a Covalex estabelecerá um limite de tempo para entrega e, ao expirar, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será ajustado proporcionalmente à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +50
Covalex_HaulCargo_AtoB_desc_ScrapWaste_Stanton3=E aí, \n\nTem um monte de sucata e lixo esperando em um elevador de carga em <EM4>~mission(Location|Address)</EM4> que precisa ir pra um elevador de carga em <EM4>~mission(Destination|Address)</EM4> pra triagem. Sei que a ArcCorp começou uma iniciativa pra reduzir resíduos e reciclar mais sucata no planeta, mas ainda não vi diminuir esse tipo de transporte vindo deles.\n\nVocê tá disponível pra mover esse lote de tralha variada (<EM4>~mission(MissionMaxSCUSize)</EM4> ou menor) pra fora do planeta pra eles? \n\nAh, e recomendamos fortemente que os contratados levem um <EM4>Tractor Beam portátil</EM4> com eles.   \n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nAssistente de Logística Jr.\nCovalex Shipping  \n“Tudo que você precisa, onde quer que precise.”\n\n\n\n\n\n\n\nA Covalex Shipping é uma corporação de responsabilidade limitada. Para incentivar entregas pontuais e evitar fraude em transportes de carga, a Covalex estabelecerá um limite de tempo para entrega e, ao expirar, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será ajustado proporcionalmente à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +50
Covalex_HaulCargo_AtoB_desc_ToLevski=Oi,\n\nTem uma carga em <EM4>~mission(Location|Address)</EM4> que precisa ser levada pra Levski. A People's Alliance tem um pedido fixo desse material porque tão precisando muito, mas não é fácil conseguir isso em Nyx. Engraçado como eles não querem fazer parte da UEE, mas ainda dependem da gente pra sobreviver.  \n\nEnfim, você vai precisar de um <EM4>Tractor Beam portátil</EM4> e de uma nave que possa carregar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> pra dar conta desse frete. \n\n~mission(Contractor|SignOff) \n \nElla Tieno \nCoordenadora de Logística Jr. \nCovalex Shipping   \n“Tudo que você precisa, onde quer que precise.” \n\n\n\n\n\n\n\nA Covalex Shipping é uma corporação de responsabilidade limitada. Para incentivar entregas pontuais e evitar fraudes em transportes de carga, a Covalex estabelecerá um limite de tempo para entrega e, ao expirar, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será ajustado proporcionalmente à porcentagem de carga entregue com sucesso.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-A] Palisade\n- [IND-S2-A] Rampart\n- [IND-S3-A] Parapet\n- [MIL-S1-A] VK-00\n- [MIL-S1-B] Siren\n- [MIL-S2-A] XL-1\n- [MIL-S2-B] Yeager\n- [MIL-S3-A] TS-2\n- [MIL-S3-B] Balandin\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x24\n<EM4>Blueprint Reward:</EM4> Guaranteed
Covalex_HaulCargo_AtoB_desc_ToRuinStation=E aí,\n\nTô procurando um transportador disposto a fazer uma entrega pra Ruin Station. Sei que levar carga pra Pyro pode deixar alguns receosos, mas é uma rota que fazemos direto pra manter o posto abastecido. Já confirmei que tudo no manifesto da carga tá dentro das normas. \n\nSe topar, a carga tá pronta pra retirada em <EM4>~mission(Location|Address)</EM4>. Só não esquece de levar um <EM4>Tractor Beam portátil</EM4> e uma nave que caiba <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>, senão vai ser complicado.\n\n~mission(Contractor|SignOff)\n\nElla Tieno \nCoordenadora de Logística Jr. \nCovalex Shipping   \n“Tudo que você precisa, onde quer que precise.” \n\n\n\n\n\n\n\nA Covalex Shipping é uma corporação de responsabilidade limitada. Para incentivar entregas pontuais e evitar fraudes em transportes de carga, a Covalex estabelecerá um limite de tempo para entrega e, ao expirar, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será ajustado proporcionalmente à porcentagem de carga entregue com sucesso.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S1-A] Palisade\n- [IND-S2-A] Rampart\n- [IND-S3-A] Parapet\n- [MIL-S1-A] VK-00\n- [MIL-S1-B] Siren\n- [MIL-S2-A] XL-1\n- [MIL-S2-B] Yeager\n- [MIL-S3-A] TS-2\n- [MIL-S3-B] Balandin\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x24\n<EM4>Blueprint Reward:</EM4> Guaranteed
Covalex_HaulCargo_MultiToSingle_Waste_Waste_Stanton1=Oi,\n\nPrecisamos que o lixo seja recolhido de alguns locais da Hurston e levado até o elevador de carga em <EM4>~mission(Destination|Address)</EM4>. Pode ficar tranquilo, nenhum contêiner é maior que <EM4>~mission(MissionMaxSCUSize)</EM4>.\n\nLOCAIS DE COLETA (QUALQUER ORDEM)\n\n~mission(MultiToSingleToken)\n\nCuriosidade: Hurston é o único planeta em Stanton que não separa lixo e sucata. Um dos funcionários me contou que décadas atrás fizeram uma análise de custo-benefício e decidiram que não valia a pena implementar um sistema planetário pra isso. Bem a cara da Hurston, né?   \n\nAh, e recomendamos fortemente que os contratados levem um <EM4>Tractor Beam portátil</EM4> junto.   \n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nCoordenador de Logística Jr.\nCovalex Shipping  \n“Tudo que você precisa, onde quer que precise.”\n\n\n\n\n\n\n\nA Covalex Shipping é uma corporação de responsabilidade limitada. Para incentivar entregas pontuais e evitar fraudes em transportes de carga, a Covalex estabelecerá um limite de tempo para entrega e, ao expirar, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será ajustado proporcionalmente à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 3/7\n<EM4>Rep:</EM4> +2,000
