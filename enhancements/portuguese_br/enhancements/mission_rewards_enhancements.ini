ForceDepletionUnlawful_Desc=Diminua a segurança neste sistema. 750 UEC por cabeça, com um bônus de 1.500 UEC após a conclusão.\n\nTodos os membros das seguintes organizações contam para esta missão:\n\nBlackJac Security\nCrusader Security\nHurston Security\nAdvocacy\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +4,000
