Shubin_Industrial_HandMining_Intro_Local_Desc_001=PUBLICAÇÃO: Ordem de Compra\nLOCALIZAÇÃO: <EM4>~mission(System) </EM4>\n\nTESTE DE PRÉVIA TECNOLÓGICA:\nComplete esta missão para obter projetos de armas Volt. Para este teste, esses projetos possuem alguns slots que aceitam diferentes materiais para ajustes variados de atributos.\n\n~mission(Hint_Location) Para uma lista completa de onde encontrar esses minerais, consulte <EM4>Fundamentos da Mineração #2: Onde Minerar</EM4> no seu Journal do mobiGlas. Já que estará lá, sinta-se à vontade para ler também a primeira parte <EM4>Fundamentos da Mineração #1: Visão Geral Básica</EM4> se quiser relembrar como obter os materiais.\n\nComo esta é uma ordem de compra e não um contrato de mineração, espera-se que você forneça seu próprio equipamento, como um <EM4>~mission(Hint_Tool)</EM4>.\n\nQuando estiver pronto para nos vender os materiais necessários, deposite-os no elevador de carga localizado em <EM4>~mission(Destination|Address)</EM4>.\n\n*Ao aceitar este contrato, você assume todos e quaisquer riscos associados ao trabalho descrito aqui e, de forma alguma, a Shubin Interstellar poderá ser responsabilizada por quaisquer danos ocorridos durante a vigência do contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Pyro]</EM4>\n- Arclight "Desert Shadow" Pistol\n- Arclight "Herrero" Pistol\n- [S1-A] Arclight Pistol Battery (30 cap)\n- [S1-A] Novikov Exploration Suit\n- [S1-A] Novikov Helmet\n- [S1-A] Pembroke Exploration Suit\n- [S1-A] Pembroke Helmet\n\n<EM4>[Stanton]</EM4>\n- Arclight "Midnight" Pistol\n- [S1-A] Arclight Pistol Battery (30 cap)\n- [S1-A] Strata Arms\n- [S1-A] Strata Core\n- [S1-A] Strata Helmet Shooting Star\n- [S1-A] Strata Legs\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
