bitzeros_shipheist_E_desc_001=Veja só, estávamos vasculhando algumas comunicações e percebemos a empolgação com um grande resultado. Foi um trabalho fácil descobrir onde eles estão escondendo uma nave carregada de carga e pensamos: por que guardar esse conhecimento lucrativo para nós? \n\nEnvie-nos alguns créditos em taxas de localização e nós lhe enviaremos as coordenadas da base de asteroides onde a nave está escondida. Ela está trancada em um hangar, portanto, você precisará chegar até ela pelos elevadores da estação. Mas, uma vez lá dentro, você poderá anular o bloqueio em um console. Faça isso e será fácil pegá-lo.\n\n57 65 65 76 69 6c\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x30, Heist Target x1, Juggernauts x4, Snipers x1
bitzeros_shipheist_E_title_001=COLETA FÁCIL
bitzeros_shipheist_H_XT_desc_001=Sabe quem provavelmente merece ser rebaixado? A XenoThreat. \n\nObtivemos algumas informações de um servidor que contém detalhes de todas as operações futuras e, pelo preço certo, podemos enviar as coordenadas exatas de onde uma nave XT totalmente carregada com carga de primeira linha está esperando. \n\nAqui está uma pequena amostra das informações que temos para que você saiba que não estamos brincando. A XenoThreat escondeu a nave em um hangar na base em asteroide trancado que só pode ser acessado pelos elevadores da estação. Não podemos abrir as portas do hangar para você, mas ajustamos os protocolos de segurança para que você possa usar um console no hangar para anular o bloqueio.  \n\nInteressado? \n\n57 65 65 76 69 6c\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x54, Heist Target x1, Juggernauts x4, Snipers x1
bitzeros_shipheist_H_XT_title_001=XenoThreat = Bom Saque
bitzeros_shipheist_M_desc_001=Você imaginaria que, se as pessoas estivessem planejando um grande roubo, não deixariam todos os detalhes espalhados pelo espectro onde qualquer um poderia hackeá-los? \n\nMas, ei, a perda deles é o seu ganho. Atualmente, uma nave de carga pesada está trancada no hangar de uma base de asteroides. A única maneira de acessá-la é pelos elevadores da estação. Uma vez lá dentro, você poderá usar um console para anular o bloqueio e tirar tudo de lá. Teremos prazer em lhe vender as coordenadas, mas o resto é com você. \n\nAcho que a perda deles será o nosso ganho também.\n\n57 65 65 76 69 6c\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x42, Heist Target x1, Juggernauts x4, Snipers x2
bitzeros_shipheist_M_title_001=PRODUTOS PARA OBTER
blacjac_RetrieveConsignment_desc_001=ATENÇÃO: Mercenários com experiência em manuseio de carga\n\nNine Tails estão atualmente atacando uma de nossas instalações em ~mission(Location|Address). Como acabaram de receber uma remessa de materiais confidenciais, não acreditamos que seja uma coincidência. BlacJac precisa de alguém para correr para este local e proteger essas caixas importantes antes que o Nine Tails o faça. Você está autorizado a usar força letal contra qualquer pessoa que tente impedi-lo. \nComo parte do nosso protocolo de segurança padrão, os materiais confidenciais foram incorporados em outra remessa e guardados no cofre automatizado. Você deve encontrar os códigos de saída apropriados para a remessa e inseri-los na esteira transportadora para descarregar as caixas. Os códigos de troca são armazenados localmente em blocos de dados e são fornecidos apenas a funcionários de alto escalão, portanto, você deve localizá-los primeiro. Esperamos que eles ainda estejam vivos para ajudá-lo, mas dado o total bloqueio de comunicações, tememos que não seja o caso. \nDepois de coletar todos os materiais confidenciais, eles devem ser entregues em ~mission(dropoff1|Address). O pagamento depende da entrega. Obrigado, Gloria Mesa, supervisora de contratos privados da BlacJac Security, “Protection Provided”.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000\n<EM4>Hostiles:</EM4> Backup x8, Boss x2, Guards x4, Hostiles x54
blacjac_RetrieveConsignment_title_001=PROTEJA O LOCAL E COLETE MATERIAIS CONFIDENCIAIS <EM4>[500–4,000 Rep]</EM4>
blacjac_UGF_defend_E_desc_001=ATENÇÃO: Operadores Mercenários Verificados\n\nUm dos locais sob o controle de BlacJac teve um desentendimento com alguns bandidos locais. Queremos que você vá até a ~mission(Location|Address) e proteja o local contra essas ameaças inimigas.\n\nCom base nos relatórios iniciais, presumo que esta será uma questão bastante simples, mas se você fizer isso, se você sentir melhor, sinta-se à vontade para recrutar uma equipe para fornecer suporte adicional.\n\nObrigado,\nGloria Mesa\n\nSupervisor de Tarefa Privada\nBlacJac Security, "Proteção Fornecida"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x1, Hostiles x10, Private Security x4, Sentries x6\n<EM4>Unknown:</EM4> 11
blacjac_UGF_defend_E_title_001=DEFENDA O LOCAL CONTRA AMEAÇAS MENORES <EM4>[500 Rep]</EM4>
blacjac_UGF_defend_VH_desc_001=ATENÇÃO: Operadores Mercenários Verificados Recebi um relatório de que alguns operadores estão planejando um ataque em ~mission(Location|Address). BlacJac quer que você reúna uma equipe e defenda o local contra essa ameaça perigosa.\n\nÉ altamente recomendável que você não empreenda esta missão sozinho. Seria mais sensato contratar uma equipe de mercenários experientes para ajudar.\n\nObrigado,\nGloria Mesa\n\nSupervisor de Contrato Privado\nBlacJac Security, "Proteção Fornecida"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x3, Hostiles x8, Private Security x4, Sentries x4\n<EM4>Unknown:</EM4> 21
blacjac_UGF_defend_VH_title_001=PROTEJA O LOCAL CONTRA AMEAÇAS PERIGOSAS <EM4>[500 Rep]</EM4>
blacjac_UGF_defend_desc_001=ATENÇÃO: Operadores Mercenários Verificados\n\nSoubemos que alguns bandidos locais fizeram ameaças contra ~mission(Location|Address). BlacJac quer que você monte uma equipe e proteja o local contra essas ameaças inimigas.\n\nE por mais que todos gostemos de créditos, não recomendo tentar isso sozinho. Contratar uma equipe seria benéfico para o seu sustento.\n\nObrigado,\nGloria Mesa\n\nMonitor de Contrato Privado\nBlacJac Security, "Proteção Fornecida"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x8, Private Security x4, Sentries x8\n<EM4>Unknown:</EM4> 10
blacjac_UGF_defend_title_001=DEFENDA O LOCAL CONTRA AMEAÇAS <EM4>[500 Rep]</EM4>
blacjac_UGF_destroy_E_desc_001=ATENÇÃO: Operadores Mercenários Verificados\n\nParece que um novo operador está tentando fabricar drogas em ~mission(Location|Address), mas o produto que eles estão lançando é extremamente tóxico. \n\nEstamos considerando como lidar com as prisões, mas o mais importante é evitar que mais material circule. Quero que você vá até lá e destrua as drogas que estão armazenadas no local. Há uma boa chance de a instalação não estar deserta, então você pode encontrar esses bandidos se for lá, então esteja preparado para uma briga. Mas se suas habilidades com armas corresponderem à sua química, provavelmente não haverá muita luta. \n\nObrigado,\nGloria Mesa\n\nSupervisor de Atribuição Privada\nBlacJac Security, "Proteção Fornecida"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Civilians x4
blacjac_UGF_destroy_E_title_001=DESTRUA O ESTOQUE DE DROGAS <EM4>[500 Rep]</EM4>
blacjac_UGF_destroy_H_desc_001=ATENÇÃO: Operadores Mercenários Verificados\n\nAlguns químicos empreendedores desenvolveram um novo produto que é duas vezes mais poderoso e duas vezes mais mortal que o produto normal. Conseguimos rastrear algumas amostras até a fonte em ~mission(Location|Address). \n\nBlacJac quer que você se mova o mais rápido possível para destruir todo o lote antes que ele possa prejudicar mais pessoas. Podemos nos preocupar com as prisões mais tarde. Pelo que sabemos sobre esta tripulação, você deve esperar uma forte resistência se tentar limpar o esconderijo. Obrigada, Glória Mesa. Supervisor de Contrato Privado.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
blacjac_UGF_destroy_H_title_001=DESTRUA DROGAS PERIGOSAS <EM4>[500 Rep]</EM4>
blacjac_UGF_destroy_desc_001=ATTN: Operadores Mercenários Verificados Recebemos a notícia de que um sindicato adulterou o pacote de drogas de um rival e está causando o caos nas ruas. A perícia identificou a fonte, uma instalação de produção em ~mission(Location|Address). Dizem que os fabricantes de drogas nem sabem que têm uma safra envenenada nas mãos.\n\nEstamos decidindo como lidar com as prisões, mas o importante é tirar essa porcaria das ruas agora. Preciso que você vá até lá e destrua as drogas que eles estão armazenando no local.\n\nEles não ficarão felizes com isso, então você provavelmente terá uma briga em suas mãos, mas o importante é eliminar o produto.\n\nObrigada,\nGloria Mesa\n\nSupervisora de Contrato Privado\nBlacJac Security, "Proteção Fornecida"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
blacjac_UGF_destroy_title_001=DESTRUA AS DROGAS <EM4>[500 Rep]</EM4>
blacjac_UGF_eliminateall_allies_desc_001=ATENÇÃO: Operadores Mercenários Verificados\n\nFomos informados pela equipe de segurança de ~mission(Location|Address) que alguns tipos de escória locais têm realizado ataques. BlacJac pede que você vá até o local e ajude a protegê-lo das ameaças inimigas.\n\nCertifique-se de verificar seu fogo lá embaixo. Não quero ouvir sobre nenhum incidente azul.\n\nObrigado,\nGloria Mesa\n\nMonitor de Atribuição Privada\nBlacJac Security, "Proteção Fornecida"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
blacjac_UGF_eliminateall_allies_desc_intro=ATTN: Operadores Mercenários Verificados\n\nBlacJac está buscando expandir nossa lista de profissionais de segurança. Para avaliar se você é uma boa opção, gostaríamos que você desse suporte à ~mission(Location|Address), pois eles estão tendo problemas com alguns hostis na área. \n\nSe você for capaz de ajudar a proteger o local e eliminar a ameaça, poderemos lhe oferecer mais trabalho de segurança.\n\nObserve que incidentes de fogo amigo não serão tolerados.\n\nBoa sorte,\nGloria Mesa\n\nSupervisor de Contrato Privado\nBlacJac Security, "Proteção Fornecida"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
blacjac_UGF_eliminateall_allies_desc_rehire=ATENÇÃO: Ex-Operador Mercenário\n\nSei que BlacJac não oferece mais trabalho de segurança, mas devido a mudanças do pessoal foi decidido dar-lhe outra chance.\n\nAprendemos que ~mission(Location|Address) Ajuda necessária na luta contra uma gangue local de bandidos. BlacJac quer que você vá ao local e ajude a eliminar esta ameaça. E como você já está no gelo, não quero ouvir que esteve envolvido em nenhum incidente de fogo amigo. Se você conseguir realizar esta operação, poderemos ver você ser reintegrado.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
blacjac_UGF_eliminateall_allies_title_001=PROTEJA O LOCAL <EM4>[500 Rep]</EM4>
blacjac_UGF_eliminateall_allies_title_intro=CONTRATO DE AVALIAÇÃO: PROTEJA O LOCAL <EM4>[500 Rep]</EM4>
blacjac_UGF_eliminateall_allies_title_rehire=CONTRATO DE AVALIAÇÃO: PROTEJA O LOCAL <EM4>[500 Rep]</EM4>
blacjac_UGF_eliminateall_desc_001=ATENÇÃO: Operadores Mercenários Verificados\n\nAprendemos que ~mission(Location|Address) está sendo usado como base de operações por alguns criminosos locais. BlacJac quer o local limpo e todos os moradores removidos. \nVocê está autorizado a usar força letal, se necessário. Obrigado, Gloria Mesa, supervisora de contratos privados da BlacJac Security, “Protection Provided”.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x15
blacjac_UGF_eliminateall_nocivs_desc_001=ATENÇÃO: Operadores Mercenários Verificados\n\nAprendemos que ~mission(Location|Address) está sendo usada como base de operações por alguns criminosos locais. BlacJac quer que você vasculhe o local e elimine todos os inimigos. \nDe acordo com os nossos relatórios iniciais, é bem possível que a gangue local tenha alguns civis trabalhando para eles. Não queremos ser manchetes aqui, então lembre-se de que você só tem permissão para enfrentar inimigos confirmados. \n\nObrigado,\nGloria Mesa\n\nSupervisor de Atribuição Privada\nBlacJac Security, "Proteção Fornecida"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13\n<EM4>Friendlies:</EM4> Civilians x4
blacjac_UGF_eliminateall_title_001=LIMPE O LOCAL <EM4>[500 Rep]</EM4>
blacjac_bounty_desc_ERT=ATENÇÃO: Caçadores de Recompensa\n\nVocê deve ter ouvido falar de ~mission(TargetName). Eles são um alvo de risco extremamente alto e têm ganhado as manchetes recentemente. Esperamos que você consiga montar uma equipe de ataque e ajudar BlacJac a derrotá-los para sempre. De acordo com nossas informações mais recentes, Sua Nave subcapital e escoltas fortemente armadas estão voando através de ~mission(Location|Address).\n\nEu recomendo que você obtenha um cabeçalho atual antes de sair. Apenas no caso de. \n\nBoa sorte,\nGloria Mesa\n\nSupervisor de Atribuição Privada\nSegurança BlacJac, "Proteção Fornecida"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
blacjac_bounty_desc_HRT=ATENÇÃO: Caçador de Recompensas\n\nSeu próximo caçador de recompensas, ~mission(TargetName), é considerado um alvo de alto risco por um bom motivo. Eles são conhecidos por viajar com poder de fogo significativo e são acompanhados por proteção suficiente para fazer qualquer um pensar duas vezes antes de começar uma briga.\n\nFontes indicam que ~mission(TargetName|Last) terminou em ~mission(Location|Address) escondido. Quando você decidir localizá-los, certifique-se de estar preparado. Você pode até considerar trazer alguns reforços você mesmo. \n\nObrigado,\nGloria Mesa\n\nSupervisor de Atribuição Privada\nBlacJac Security, "Proteção Fornecida"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
blacjac_bounty_desc_LRT=ATENÇÃO: Caçador de Recompensas\n\nA recompensa veio para um alvo de baixo risco chamado ~mission(TargetName). O alvo em si não é motivo de preocupação, mas parece que ele geralmente voa em grupo, então há uma boa chance de que ele tenha alguns amigos com ele quando você o localizar.\n\nEntão eu começaria a caça na ~mission(Location|Address), pois temos relatos de que eles foram vistos na área.\n\nObrigado,\nGloria Mesa\n\nSupervisor de Contrato Privado\nBlacJac Security, "Proteção Fornecida"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
blacjac_bounty_desc_MRT=ATENÇÃO: Caçador de Recompensas\n\nVocê deve localizar ~mission(TargetName), uma recompensa de risco médio vista pela última vez em ~mission(Location|Address), onde eles estavam pilotando um pequeno Nave com vários tripulantes. \n\nNão conseguimos descobrir exatamente o que eles estavam voando, mas parece que eles tinham alguns outras naves com eles. Esteja preparado para muita resistência quando você vier. Obrigado, Gloria Mesa, supervisora de contratos privados da BlacJac Security, “Protection Provided”.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
blacjac_bounty_desc_VHRT=ATENÇÃO: Caçador de Recompensas\n\nBlacJac acaba de saber que um alvo muito perigoso, ~mission(TargetName), foi visto se movendo pelas rotas de voo em ~mission(Location|Address) e está carregando um enorme Nave com um pesado escolta. Queremos que esta recompensa seja distribuída antes que cometam mais crimes. Reúna todos os recursos ou suporte necessários e comece a agir o mais rápido possível.\n\nObrigado,\nGloria Mesa\n\nSupervisor de Tarefa Privada\nBlacJac Security, "Proteção concedida"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
blacjac_bounty_desc_VLRT=ATENÇÃO: Caçador de Recompensas\n\nTenho um alvo de risco muito baixo para você cuidar: ~mission(TargetName).\n\nSeu último local conhecido foi ~mission(Location|Address).\n\nEste é uma recompensa de baixa ameaça, então espero que você consiga finalizá-la rapidamente. Eles normalmente pilotam um Nave pequeno e não têm muitos conhecidos. Não poderia ser muito mais simples. Obrigada, Glória Mesa. Supervisor de contrato privado para BlacJac Security, "Proteção concedida"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Reinforcements x1, Targets x1
blacjac_bounty_desc_intro=ATENÇÃO: Caçador de Recompensas\n\nNão tenho certeza se você está interessado, mas BlacJac está querendo expandir nossa lista de caçadores de recompensas. Temos mais trabalho do que nossos empreiteiros atuais podem realizar, então espero que talvez você possa nos ajudar a compensar um pouco. \nSuas qualificações parecem boas no papel, mas antes de fazermos qualquer coisa oficial, BlacJac precisa ver seu desempenho em campo. Até preparamos um caso de teste - queremos que você complete ~mission(TargetName). Você foi visto pela última vez em ~mission(Location|Address). Esta deve ser uma recompensa bastante simples, sem muita resistência. Perfeito para afiar os dentes. Boa sorte, Glória Mesa. Supervisor de contrato privado para BlacJac Security, "Proteção concedida"\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
blacjac_bounty_desc_rehire=ATENÇÃO: Ex-Caçador de Recompensas BlacJac Eu sei que sua última caçada por BlacJac não foi bem, mas um número crescente de casos significa que você tem sorte de ter outra chance.\n\nSe você conseguir, complete o recompensa por ~mission(TargetName) em ~mission(Location|Address), então poderemos ver você sendo reintegrado.\n\nObrigado,\nGloria Mesa\nSupervisor de Missão Privada\nBlacJac Security, "Proteção Fornecida "\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
blacjac_bounty_fps_UGF_desc_001=ATENÇÃO: Caçador de Recompensas\n\nEu tenho uma recompensa que precisa ser coletada em ~mission(TargetName). O bastardo está se escondendo em ~mission(Location|Address) com um monte de outras escórias, então tome cuidado ao entrar lá.\n\nObrigado,\nGloria Mesa\n\nSupervisor de Contrato Privado\nBlacJac Security, "Proteção Fornecida"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13, Targets x1
blacjac_bounty_fps_UGF_nocivs_desc_001=ATENÇÃO: Caçador de Recompensas: Preciso que você capture uma recompensa chamada ~mission(TargetName) em ~mission(Location|Address). Mesmo que haja outros cúmplices criminosos no local, quero que você esteja ciente de quaisquer civis ou trabalhadores que possam estar lá.\n\nJá tenho muito o que fazer, não preciso explicar por que um empreiteiro faria isso Atirou em vários civis.\n\n\nObrigado,\nGloria Mesa\n\nSupervisor de Contrato Privado\nBlacJac Security, "Proteção Fornecida"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
blacjac_bounty_fps_desc_001=ATENÇÃO: Caçador de Recompensas\n\nBlacJac tem uma recompensa pela sua cabeça que precisa ser obtida. O perpetrador tem um nome: ~mission(TargetName). \n\nConseguimos rastreá-los até ~mission(Location|Address), mas não temos uma avaliação completa das condições no local, portanto, tenha cuidado ao entrar no local.\n\nObrigado,\nGloria Mesa\n\nSupervisor de Contrato Privado\nBlacJac Security, "Proteção Fornecida"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
blacjac_bounty_fps_desc_first=ATENÇÃO: Caçadores de Recompensas\n\nTenho mais recompensas do que caçadores de recompensas no momento, então quero expandir nossa lista. \n\nSe você fizer um bom trabalho neste primeiro trabalho, mais trabalhos virão. \n\nVamos ver como você cuida da recompensa por ~mission(TargetName). Acredita-se que eles estejam escondidos em ~mission(Location|Address). \n\nObrigado, \nGloria Mesa\n\nSupervisor de Atribuição Privada\nBlacJac Security, "Proteção concedida"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13, Targets x1
blacjac_bounty_fps_desc_rehire=ATENÇÃO: Ex-Caçador de Recompensas BlacJac Eu sei que BlacJac não lhe dará mais recompensas, mas os tempos mudam e nós lhe daremos outra chance.\n\nSe você conseguir a recompensa por ~mission(TargetName) over em ~mission(Location|Address), então poderemos ver você sendo reintegrado.\n\nObrigado,\nGloria Mesa\n\nSupervisor de Atribuição Privada\nBlacJac Security, "Proteção Fornecida"\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13, Targets x1
