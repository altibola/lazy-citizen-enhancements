FTL_Courier_Nyx_Easy_Desc_001=CONTRATO FTL DISPONÍVEL\nPARA ATRIBUIÇÃO IMEDIATA\n\n**DETALHES DO CONTRATO**\nA FTL precisa de um entregador iniciante para realizar entregas em Nyx.\nO entregador deve fornecer sua própria nave.\nExperiência prévia em movimentação manual é preferível, com <EM4>capacidade de mover caixas de até .25 SCU</EM4>.\nAo aceitar este contrato, você concorda em assumir total responsabilidade pela segurança dos pacotes designados.\n\n~mission(Contractor|SignOff)\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S0-B] Defiant\n- [IND-S1-B] Colossus\n- [IND-S2-B] Huracan\n- [IND-S2-B] Sedulity\n- [IND-S3-B] Agni\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
