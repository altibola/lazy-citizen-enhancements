Criminal_RetrieveData_Reclaimer_desc=Estou em busca de um pacote de dados específico e, no momento em que estou fazendo uma pausa, a Nave é atacada por este Recuperador da Nine Tails convertido chamado Black Kite. Tentei invadir os servidores da Black Kite para ver se eles copiaram os dados, mas não consegui encontrar uma maneira de superar remotamente seus protocolos de criptografia sem a chave física.\n\nAí você entra no jogo. Preciso que alguém invada a Nave deles, pegue a chave de descriptografia e descriptografe o servidor para que eu possa obter remotamente o que preciso. Você é inteligente o suficiente para saber com quem estamos lidando aqui, então planeje adequadamente. Já que isso vai causar sérios problemas, não devemos deixar nada ao acaso. Destrua o Dragão Negro quando terminar para nos manter seguros.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Unknown:</EM4> 8
DataDownload_Mobi_Description=WIP Ouvi dizer que você é a pessoa certa para este trabalho, então vou direto ao assunto. Encontrámos uma estação UEC falsificada num velho destroço. Se você for rapidamente para a estação de falsificação, poderá fazer o download do UEC sozinho. Existem alguns guardas guardando os destroços, mas tenho certeza que você será capaz de lidar com isso. Ah, e um aviso final. Não sou a única pessoa com essa informação, então espere uma briga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
