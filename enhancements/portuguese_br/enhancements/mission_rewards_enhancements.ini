Covalex_courier_todc_med_desc_001=Oi,\n\nTenho um pedido de tamanho decente que precisa ser entregue na ~mission(Dropoff1) em ~mission(Dropoff1|Address). Eu sugeriria levar um raio trator, mas você é quem sabe! \n\nPACTOS PARA RECOLHA (QUALQUER ORDEM) \n · Pacote #~mission(item1|serialnumber) da ~mission(Pickup1|Address)\n · Pacote #~mission(item2|serialnumber) da ~mission(Pickup2|Address)\n · Pacote #~mission(item3|serialnumber) da ~mission(Pickup3|Address)\n · Pacote #~mission(item4|serialnumber) da ~mission(Pickup4|Address)\n · Pacote #~mission(item5|serialnumber) da ~mission(Pickup5|Address)\n · Pacote #~mission(item6|serialnumber) da ~mission(Pickup5|Address)\n · Pacote #~mission(item7|serialnumber) da ~mission(Pickup6|Address)\n · Pacote #~mission(item8|serialnumber) da ~mission(Pickup6|Address)\n · Pacote #~mission(item9|serialnumber) da ~mission(Pickup7|Address)\n · Pacote #~mission(item10|serialnumber) da ~mission(Pickup7|Address)\n\nLOCAL DE ENTREGA\n - Todos os pacotes entregues à ~mission(Dropoff1) na ~mission(Dropoff1|Address)\n\nMuito obrigado, \n\nChase Hewitt Jr. Coordenador de Logística\nCovalex Shipping \n'Qualquer coisa que você precisar, em qualquer lugar que você precisar.'\n\n\n\n\n\nCovalex Shipping é uma corporação de responsabilidade limitada. Ao aceitar este contrato, você está concordando com todos os termos e condições descritos em nosso 'Independent Workers Supplemental Information Guide v.2948.01.29' estendido. A Covalex Shipping não é responsável por quaisquer danos que ocorram enquanto estiver operando como um contratado independente.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
Covalex_courier_todc_small_desc_001=Olá! \n\nTenho uma solicitação para transferir alguns pacotes para a ~mission(Dropoff1) na ~mission(Dropoff1|Address). Bastante simples, como essas coisas são. \n\nPACTOS PARA RECOLHA (QUALQUER ORDEM) \n · Pacote #~mission(item1|serialnumber) da ~mission(Pickup1|Address)\n · Pacote #~mission(item2|serialnumber) da ~mission(Pickup2|Address)\n · Pacote #~mission(item3|serialnumber) da ~mission(Pickup3|Address)\n · Pacote Pacote #~mission(item4|serialnumber) da ~mission(Pickup4|Address)\n · Pacote #~mission(item5|serialnumber) da ~mission(Pickup5|Address)\n\nLOCAL DE ENTREGA\n - Todos os pacotes entregues à ~mission(Dropoff1) na ~mission(Dropoff1|Address)\n\nAgradeço por você ter dedicado um tempo para resolver isso para mim, \nChase Hewitt Jr. Coordenador de Logística\nCovalex Shipping \n'Qualquer coisa que você precisar, em qualquer lugar que você precisar.'\n\n\n\n\n\nCovalex Shipping é uma corporação de responsabilidade limitada. Ao aceitar este contrato, você está concordando com todos os termos e condições descritos em nosso 'Independent Workers Supplemental Information Guide v.2948.01.29' estendido. A Covalex Shipping não é responsável por quaisquer danos que ocorram enquanto estiver operando como um contratado independente.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Covalex_internaldelivery_dc_desc_001=Olá!\n\nPreciso de ajuda extra em ~mission(Location|Address) para ajudar a mover alguns itens entre alguns dos locais de armazenamento dentro das instalações. Quando os lugares ficam tão grandes, eles precisam de toda a ajuda logística que puderem conseguir! \n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n · Pacote #~mission(item1|serialnumber) da ~mission(Pickup1)\n · Pacote #~mission(item2|serialnumber) da ~mission(Pickup2)\n\nLOCAIS DE ENTREGA (QUALQUER ORDEM)\n · Pacote #~mission(item1|serialnumber) para ~mission(Dropoff1)\n · Pacote #~mission(item2|serialnumber) para ~mission(Dropoff2)\n\nBoa sorte!\n\nChase Hewitt\nJr. Coordenador de Logística\nCovalex Shipping \n'Tudo o que você precisar, onde você precisar.'\n\n\n\n\n\n\n\nA Covalex Shipping é uma sociedade anônima de responsabilidade limitada. Ao aceitar este contrato, você concorda com todos os termos e condições descritos em nosso 'Guia de informações suplementares para trabalhadores independentes v.2948.01.29' estendido. A Covalex Shipping não se responsabiliza por quaisquer danos que ocorram durante a operação como contratante independente.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Covalex_internaldelivery_dc_desc_003=Olá,\n\nRecebi uma solicitação de ~mission(Location|Address) para ajudar a realocar internamente alguns pacotes de onde eles estão armazenados no momento. Achei que você poderia estar disposto a resolver isso.\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n · Pacote #~mission(item1|serialnumber) da ~mission(Pickup1)\n · Pacote #~mission(item2|serialnumber) da ~mission(Pickup2)\n · Pacote #~mission(item3|serialnumber) da ~mission(Pickup3)\n · Pacote #~mission(item4|serialnumber) da ~mission(Pickup4)\n\nDROP LOCAIS FORA (QUALQUER ORDEM)\n · Pacote #~mission(item1|serialnumber) para ~mission(Dropoff1)\n · Pacote #~mission(item2|serialnumber) para ~mission(Dropoff2)\n · Pacote #~mission(item3|serialnumber) para ~mission(Dropoff3)\n · Pacote #~mission(item4|serialnumber) para ~mission(Dropoff4)\n\nTenha uma boa noite!\n\nChase Hewitt\nJr. Coordenador de Logística\nCovalex Shipping \n'Tudo o que você precisar, onde você precisar.'\n\n\n\n\n\n\n\nA Covalex Shipping é uma sociedade anônima de responsabilidade limitada. Ao aceitar este contrato, você concorda com todos os termos e condições descritos em nosso 'Guia de informações suplementares para trabalhadores independentes v.2948.01.29' estendido. A Covalex Shipping não se responsabiliza por quaisquer danos que ocorram durante a operação como contratante independente.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
Covalex_internaldelivery_dc_desc_005=Olá,\n\nHá um monte de pacotes em ~mission(Location|Address) que precisam ser transportados pelas instalações até o local de armazenamento adequado. Significaria muito se você pudesse cuidar pessoalmente de tudo sendo resolvido.\n\nPACOTES PARA COLETA (QUALQUER ORDEM)\n · Pacote #~mission(item1|serialnumber) da ~mission(Pickup1)\n · Pacote # ~mission(item2|serialnumber) da ~mission(Pickup2)\n · Pacote #~mission(item3|serialnumber) da ~mission(Pickup3)\n · Pacote #~mission(item4|serialnumber) da ~mission(Pickup4)\n · Pacote #~mission(item5|serialnumber) da ~mission(Pickup5)\n · Pacote #~mission(item6|serialnumber) da ~mission(Pickup6)\n\n\nLOCAIS DE ENTREGA (QUAISQUER ORDER)\n · Pacote #~mission(item1|serialnumber) para ~mission(Dropoff1)\n · Pacote #~mission(item2|serialnumber) para ~mission(Dropoff2)\n · Pacote #~mission(item3|serialnumber) para a ~mission(Dropoff3)\n · Pacote #~mission(item4|serialnumber) para a ~mission(Dropoff4)\n · Pacote #~mission(item5|serialnumber) para a ~mission(Dropoff5)\n · Pacote #~mission(item6|serialnumber) para ~mission(Dropoff6)\n\n\nAgradeço muito tudo o que você faz,\n\nChase Hewitt\nJr. Coordenador de Logística\nCovalex Shipping \n'Tudo o que você precisar, onde você precisar.'\n\n\n\n\n\n\n\nA Covalex Shipping é uma sociedade anônima de responsabilidade limitada. Ao aceitar este contrato, você concorda com todos os termos e condições descritos em nosso 'Guia de informações suplementares para trabalhadores independentes v.2948.01.29' estendido. A Covalex Shipping não se responsabiliza por quaisquer danos que ocorram durante a operação como contratante independente.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000
