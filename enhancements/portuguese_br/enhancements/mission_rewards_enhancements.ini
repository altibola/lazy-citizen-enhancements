Shubin_Industrial_GroundVehicle_Nyx_VH_Interstellar_Desc_001=POSTAGEM: Ordem de Compra\nLOCALIZAÇÃO: <EM4>~mission(System) </EM4>\n\nTERMOS*: \nA Shubin Interstellar está buscando atender outra ordem de compra para materiais raros. Agradecemos sua ajuda neste assunto.\n\nExistem apenas alguns locais conhecidos onde esses materiais podem ser extraídos, principalmente de antigos locais do Hathor Group em <EM4>Daymar e Aberdeen</EM4>. Nossa sugestão seria ir até as Instalações de Alinhamento de Plataforma (PAF) e tentar reativar sua Plataforma Laser Orbital (OLP) para acessar os materiais abaixo da superfície do planeta.\n\nLembrete: como esta é uma ordem de compra e não um contrato de mineração, você deverá fornecer seu próprio equipamento, como um <EM4>~mission(Hint_Tool)</EM4>.\n\nQuando estiver pronto para nos vender os materiais exigidos, deposite-os no elevador de carga localizado em <EM4>~mission(Destination|Address)</EM4>.\n\n*Ao aceitar este contrato, você está assumindo todos os riscos associados ao trabalho aqui descrito, e em nenhuma circunstância a Shubin Interstellar poderá ser responsabilizada por danos ocorridos durante a duração do contrato.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 4/7 | Knowledge 6/7\n<EM4>Veteran Contractor:</EM4> +200 Rep
Shubin_Industrial_GroundVehicle_Nyx_VH_Interstellar_Title_001=XL ORDEM DE COMPRA: MINERADO POR VEÍCULOS <EM4>[200 Rep]</EM4>
Shubin_Industrial_GroundVehicle_Pyro_E_DiscoverPlanetary_Desc_001=POSTAGEM: Ordem de Compra\nLOCALIZAÇÃO: <EM4>~mission(System) </EM4>\n\nTERMOS*: \nDevido a mudanças em nosso pipeline de fornecimento, a Shubin Interstellar está buscando comprar uma variedade de materiais de mineradores independentes que operam na área. Embora vender em um hub comercial possa render um preço mais competitivo do que atender nosso pedido, muitos mineradores consideram que fortalecer seus laços com a Shubin é um investimento inteligente a longo prazo para suas carreiras.\n\n~mission(Hint_Location) Para uma lista completa de onde encontrar esses minerais, consulte <EM4>Fundamentos da Mineração 2: Onde Minerar</EM4> no seu mobiGlas Journal. Aproveite e leia também a primeira parte <EM4>Fundamentos da Mineração 1: Visão Geral Básica</EM4> se precisar de um lembrete sobre como extrair os materiais.\n\nComo esta é uma ordem de compra e não um contrato de mineração, você deverá fornecer seu próprio equipamento, como um <EM4>~mission(Hint_Tool)</EM4>.\n\nQuando estiver pronto para nos vender os materiais exigidos, deposite-os no elevador de carga localizado em <EM4>~mission(Destination|Address)</EM4>.\n\n*Ao aceitar este contrato, você está assumindo todos os riscos associados ao trabalho aqui descrito, e em nenhuma circunstância a Shubin Interstellar poderá ser responsabilizada por danos ocorridos durante a duração do contrato.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +100 Rep
