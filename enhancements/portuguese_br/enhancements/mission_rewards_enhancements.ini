HeadHunters_RecoverCargo_Easy_Description=Conseguimos interceptar uma nave carregando umas mercadorias lá em <EM4>~mission(Location|Address)</EM4>, mas deu ruim — a galera não teve espaço suficiente nas naves pra guardar tudo. Quer ganhar umas credits rápido? Vai lá e pega a carga. Pode já ter alguns saqueadores por perto, então fique de olho.\n\nSó não esquece de levar um <EM4>Tractor Beam pesado</EM4> porque essa porra é pesada.\n\nQuando terminar, entregue no elevador de carga em <EM4>~mission(Destination|Address)</EM4> que a gente resolve o resto.\n\nStows desliga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Unknown:</EM4> 1\n<EM4>Jr. Contractor:</EM4> +100 Rep
HeadHunters_RecoverCargo_Easy_Title=PEGANDO O QUE É NOSSO <EM4>[100 Rep]</EM4>
HeadHunters_RecoverCargo_Hard_Description=Procurando alguém pra transportar uma carga pra mim. Mas tem um detalhe.\n\nA carga está na traseira de uma nave abandonada localizada em <EM4>~mission(Location|Address)</EM4>. Como você deve imaginar, essa carga não é nossa, mas também não merece cair nas mãos de mais ninguém. Não vou deixar aqueles babacas da CFP colocarem as mãos nisso antes da gente.\n\nSe tivermos sorte, fomos os primeiros a descobrir isso, mas aposto que vai ter mais naves lá do que mosca em carniça. Se tiver amigos de confiança, leva junto e dá um jeito nesses desgraçados. E não esquece do seu <EM4>feixe trator pesado</EM4>.\n\nSe conseguir pegar a carga e levar até o elevador de carga em <EM4>~mission(Destination|Address)</EM4>, posso te dar uma boa parte do lucro.\n\nStows out.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Unknown:</EM4> 1\n<EM4>Sr. Contractor:</EM4> +200 Rep
HeadHunters_RecoverCargo_Hard_Title=Jackpot <EM4>[200 Rep]</EM4>
HeadHunters_RecoverCargo_Medium_Description=Um dos nossos pilotos devia trazer uma remessa de volta, mas parece que deu merda lá em <EM4>~mission(Location|Address)</EM4>. Ou o cara levou um tiro na cabeça e foi pro beleléu, ou surtou e abandonou a nave. Tomara que tenha sido a primeira opção pra eu não ter que caçar esse desgraçado. O importante é que nossa carga tá lá parada.\n\nSe você tem um <EM4>Tractor Beam pesado</EM4> e uma nave decente, pode ir lá buscar o que é nosso? É provável que os babacas que atacaram meu piloto ainda estejam por lá, e aposto que são durões.\n\nSe sair vivo, leva a carga pro elevador de carga em ~mission(Destination|Address) e eu te pago.\n\nStows desliga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Unknown:</EM4> 1\n<EM4>Contractor:</EM4> +150 Rep
HeadHunters_RecoverCargo_Medium_Title=CONCLUA O SERVIÇO <EM4>[150 Rep]</EM4>
HeadHunters_RecoverCargo_Super_Description=Esse aqui vai ser bom pra você. Chegou a informação de que um transporte quebrou em <EM4>~mission(Location|Address)</EM4>. Só que todo vagabundo da região parece saber disso. O lugar tá infestado de fora-da-lei tentando botar a mão na carga. É aí que você entra.\n\nSe você juntar seus melhores pilotos e um <EM4>Tractor Beam pesado</EM4>, pode derrubar a concorrência e pegar a carga. Não vai ser fácil. Um dos meus batedores disse que os caras que guardam essa nave têm tecnologia pesada.  \n\nJá tenho um comprador esperando, você só precisa levar a carga pro elevador de carga em <EM4>~mission(Destination|Address)</EM4> e eu te mando a grana.\n\nStows desliga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Unknown:</EM4> 1\n<EM4>Head Contractor:</EM4> +300 Rep
HeadHunters_RecoverCargo_Super_Title=VALE O ESFORÇO <EM4>[300 Rep]</EM4>
HeadHunters_RecoverCargo_VeryEasy_Description=Acabou de chegar um relato de uma nave abandonada com uma bela quantidade de carga pronta pra ser pega. Se interessar, vai até <EM4>~mission(Location|Address)</EM4>. A notícia pode já ter se espalhado, então pode ter uns saqueadores por perto, mas é só passar por cima deles e pegar o que tem.\n\nLeve a carga pro elevador de carga em ~mission(Destination|Address) e eu te pago.\n\nCertifica‑se de ter um <EM4>Tractor Beam pesado</EM4> instalado também, não faço ideia do tamanho da carga.\n\nStows desliga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2\n<EM4>Unknown:</EM4> 1\n<EM4>Neutral:</EM4> +50 Rep
HeadHunters_RecoverCargo_VeryEasy_Title=PEGA E VAZA <EM4>[50 Rep]</EM4>
HeadHunters_RecoverCargo_VeryHard_Description=Seguinte: tenho um pepino em <EM4>~mission(Location|Address)</EM4> e preciso de alguém com juízo pra resolver. Um ex‑piloto meu achou que podia fazer um acordo com outra gangue e, pasmem, deu ruim. Agora minha carga tá parada e sendo vigiada por um bando de idiotas esperando o carregador deles chegar.\n\nPreciso que vá lá com um <EM4>Tractor Beam pesado</EM4> e uma equipe forte pra pegar minha mercadoria antes que vaze de vez.\n\nLeve tudo pro elevador de carga em <EM4>~mission(Destination|Address)</EM4> e eu te dou uma fatia generosa do saque.\n\nStows desliga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Unknown:</EM4> 1\n<EM4>Veteran Contractor:</EM4> +200 Rep
HeadHunters_RecoverCargo_VeryHard_Title=PEGANDO O QUE MERECEMOS <EM4>[200 Rep]</EM4>
HeadHunters_ShipAmbush_E_desc_001=Algum interesse em realizar uma <EM4>~mission(AmbushTarget)</EM4> para nós? \n\nNão deve ser muito trabalhoso. Já fizemos o trabalho braçal e descobrimos que eles estão programados para passar pela <EM4>~mission(Location|Address)</EM4> em breve. Basta escurecer na nuvem de emissão próxima e você terá um bom avanço sobre eles.  \n\nEles podem passar sozinhos ou com alguns amigos. Todos seriam monopostos, mas podem se manter firmes em uma briga de cães. Vamos deixar algumas forças na região que podem fornecer suporte assim que a diversão começar.\n\nVocê conseguir fazer isso e eu darei <EM4>~mission(ScripAmount) Council Scrip</EM4> ao contratante principal por um trabalho bem feito.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x2, Hostile Wave x7, Targets x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +1,000 Rep
HeadHunters_ShipAmbush_E_title_001=ATAQUE SILENCIOSO <EM4>[100–1,000 Rep]</EM4>
HeadHunters_ShipAmbush_H_desc_001=Recentemente, um esquadrão de naves destruiu um de nossos comboios, e dez créditos dizem que eles tentarão fazer isso novamente. Estamos procurando alguém para lançar um ataque de represália antes que isso aconteça.  \n\nIdentificamos os idiotas como sendo compostos por várias naves grandes e uma escolta considerável. Acreditamos que o líder esteja pilotando uma <EM4>~mission(AmbushTarget)</EM4> e definimos essa nave como o alvo principal. Como se trata de um esquadrão considerável e agressivo, um ataque surpresa parece uma jogada inteligente. Eles geralmente passam por <EM4>~mission(Location|Address)</EM4>, que tem uma nuvem de emissão para se esconder. Seja esperto e paciente e, em seguida, ataque quando for a hora certa. \n\nA menos que você se considere um verdadeiro ás, provavelmente é melhor levar alguns amigos. Talvez você possa seduzir as pessoas dizendo que elas podem procurar objetos de valor nos destroços depois que a ação estiver concluída.\n\nE, além disso, darei ao contratante principal um bônus de <EM4>~mission(ScripAmount) Council Scrip</EM4> para adoçar o pote.\n\nStows Desliga.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x13, Targets x5\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
HeadHunters_ShipAmbush_H_title_001=ATAQUE DE REPRESÁLIA <EM4>[200–2,000 Rep]</EM4>
HeadHunters_ShipAmbush_Intro_desc_001=Tem uma oportunidade para alguém disposto a mostrar suas habilidades de pilotagem. Os Headhunters têm se metido com esse idiota voando um <EM4>~mission(AmbushTarget)</EM4> e a gente vai acabar com isso de uma vez por todas.\n\nVocê vai nos ajudar a armar uma armadilha para eles. Veja, tem uma <EM4>Nuvem de Emissão</EM4> perto de <EM4>~mission(Location|Address)</EM4> que eles costumam passar com frequência. \n\nVá até lá, se esconda dentro da nuvem desligando sua nave, e ataque o babaca assim que vê-lo, junto com outros pilotos solitários burros o suficiente para voar com ele. Vai ser tudo com você no primeiro ataque, mas vamos deixar algumas naves de apoio por perto para ajudar a finalizar o serviço. \n\nE em homenagem a esse ser seu primeiro ataque surpresa para nós, tem um bônus de <EM4>~mission(ScripAmount) Council Scrip</EM4> para o contratante principal no final da missão. \n\nStows desliga.\n\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x6, Targets x2\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +500 Rep
HeadHunters_ShipAmbush_Intro_title_001=ARMANDO UMA ARMADILHA <EM4>[100–500 Rep]</EM4>
HeadHunters_ShipAmbush_M_desc_001=Um de nossos Clipes emitiu uma ordem de morte em uma <EM4>~mission(AmbushTarget)</EM4>. Quer deixá-los felizes eliminando-o? \n\nAqui está o que você precisa saber. O alvo e sua escolta estão programados para passar por <EM4>~mission(Location|Address)</EM4>. Parece que há uma nuvem de emissão próxima que pode ocultar o sinal de sua nave. Espere lá até que você esteja pronto para atacar. \n\nO Clipe só se preocupa em eliminar o alvo. Qualquer coisa de valor que você encontrar flutuando nos destroços é toda sua. \n\nE, além disso, darei ao contratante principal um bônus de <EM4>~mission(ScripAmount)</EM4> Council Scrip para adoçar o pote. \n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x6, Targets x3\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
HeadHunters_ShipAmbush_M_title_001=OP EMBOSCADA <EM4>[150–2,000 Rep]</EM4>
HeadHunters_ShipAmbush_S_desc_001=A Headhunters está procurando alguém com as habilidades e a equipe para executar uma operação de elite. Uma fragata militar e naves de escolta estão perseguindo um de nossos Clipes pelo sistema. Não sei quais são suas intenções, mas não devem ser boas. Enquanto eles estiverem com os olhos focados em seu prêmio, nós conseguiremos alguém para reunir uma tripulação para atacá-los.  \n\nJá tenho um local escolhido. Se você chegar a <EM4>~mission(Location|Address)</EM4>, há uma nuvem de emissão que é exatamente o que precisamos. Vá até lá com seus amigos, desligue suas naves e aguarde a <EM4>~mission(AmbushTarget)</EM4> e suas escoltas passarem. \n\nCom um bônus de <EM4>~mission(ScripAmount) Council Scrip</EM4> para o contratante principal, o pagamento por si só já deve fazer valer a pena, mas você também pode ficar com tudo o que conseguir dos destroços.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x10, Targets x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Tier 2:</EM4> +16,000 Rep
HeadHunters_ShipAmbush_S_title_001=OP DE ELITE <EM4>[300–16,000 Rep]</EM4>
HeadHunters_ShipAmbush_VE_desc_001=Algum idiota pilotando uma <EM4>~mission(AmbushTarget)</EM4> foi pego espionando nossas operações. Nós os expulsamos com uma advertência, mas depois os vimos fazendo a mesma coisa em outro lugar. Como eles não receberam a mensagem, parece que temos que enviar uma mais forte.    \n\nHá uma nuvem de emissão perto de <EM4>~mission(Location|Address)</EM4> pela qual eles passam com frequência. O melhor lugar para desligar, se esconder e lançar um ataque surpresa. Às vezes eles voam sozinhos, às vezes há outros monopostos com eles. Será só você no primeiro ataque, mas colocaremos algumas naves de apoio por perto para ajudar a terminar o trabalho. \n\nE se precisar de alguma motivação extra, há um bônus de <EM4>~mission(ScripAmount) Council Scrip</EM4> para o contratante principal no final do trabalho. \n\nStows Desliga.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x6, Targets x2\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +500 Rep
HeadHunters_ShipAmbush_VE_title_001=FESTA SURPRESA <EM4>[100–500 Rep]</EM4>
HeadHunters_ShipAmbush_VH_desc_001=Algumas pessoas não parecem satisfeitas conosco. Soube que várias naves subcapitais e várias escoltas estão mirando em nossas operações. Achei que a melhor maneira de evitar que elas nos causem problemas é atingi-las antes que elas nos atinjam. \n\nEstamos de olho em uma <EM4>~mission(AmbushTarget)</EM4> que faz parte desse esquadrão, e parece que eles passam regularmente por <EM4>~mission(Location|Address)</EM4>, um local feito sob medida para um ataque surpresa. Uma nuvem de emissão próxima pode ocultar você e qualquer pessoa que você trouxer para ajudar. Isso não vai ser fácil. Mas a recompensa deve fazer valer a pena. Termine o trabalho e o contratante principal receberá um bônus de <EM4>~mission(ScripAmount) Council Scrip</EM4>. \n\nAlém disso, quem sabe que tipo de coisa boa você encontrará flutuando em todos esses destroços.\n\nStows Desliga\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 5/7 | Risk 7/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x12, Targets x4\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Tier 2:</EM4> +8,000 Rep
HeadHunters_ShipAmbush_VH_title_001=ATAQUE TÁTICO <EM4>[250–8,000 Rep]</EM4>
Headhunters_DefendDestructibleEntites_E_Desc_001=Uns idiotas com o ego inflado decidiram fazer a burrice de atacar os <EM>~mission(Objects)</EM4> em <EM4>~mission(Location|Address)</EM4>. Temos interesses lá, então não podemos deixar barato.\n\nSe quiser ajudar, vai até lá e resolve com esses caras antes que causem muito dano. Não deve dar muito trabalho pra você.\n\nPra dar um incentivo, vou pagar <EM4>~mission(ScripAmount) Council Scrip</EM4> pro contratante principal.\n\nStows out.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x10\n<EM4>Rep:</EM4> +100
Headhunters_DefendDestructibleEntites_E_Title_001=PROTEGER ~mission(Objects) DE ARRUACEIROS <EM4>[100 Rep]</EM4>
Headhunters_DefendDestructibleEntites_H_Desc_001=Recebemos notícia de aliados em <EM4>~mission(Location|Address)</EM4> de que estão sob ataque. Uma gangue com quem já tivemos problemas está tentando dominar o local destruindo os <EM4>~mission(Objects)</EM4>.\n\nEsse grupo é problema de verdade e sabe lutar. Vai dar trabalho impedir que destruam tudo. Talvez seja bom <EM>levar ajuda</EM>.\n\nResolve isso direito e eu pago <EM4>~mission(ScripAmount) Council Scrip</EM4> pro contratante principal.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x17\n<EM4>Rep:</EM4> +200
Headhunters_DefendDestructibleEntites_H_Title_001=PARAR GANGUE DE DESTRUIR ~mission(Objects) <EM4>[200 Rep]</EM4>
Headhunters_DefendDestructibleEntites_M_Desc_001=Nossos aliados em <EM4>~mission(Location|Address)</EM4> foram comprometidos. Uma nova gangue está ameaçando o local ao atacar os <EM4>~mission(Objects)</EM4>.\n\nSe destruírem isso, vai prejudicar seriamente os negócios, então quero você lá agora protegendo.\n \nSe precisar de incentivo, tô adicionando <EM4>~mission(ScripAmount) Council Scrip</EM4> pro contratante principal.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x15\n<EM4>Tier 1:</EM4> +150 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
Headhunters_DefendDestructibleEntites_M_Title_001=GARANTIR ~mission(Objects) DOS RIVAIS <EM4>[150–2,000 Rep]</EM4>
Headhunters_DefendDestructibleEntites_S_Desc_001=Nossos parceiros em <EM4>~mission(Location|Address)</EM4> precisam de ajuda. Uma equipe rival está invadindo a área e atacando os <EM4>~mission(Objects)</EM4>. Isso já seria ruim, mas esse local é crítico pros nossos planos futuros e precisa continuar operacional.\n\nCom a escala do ataque e a habilidade desses pilotos, é melhor levar <EM>reforço confiável</EM>. Reúna sua equipe, vá até lá e pare esses puxa-sacos antes que causem danos permanentes.\n\nPra mostrar o quanto isso é importante, o contratante principal vai receber <EM4>~mission(ScripAmount) Council Scrip</EM4> garantindo que nada dê errado.\n\n- Stow\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 7/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x22\n<EM4>Rep:</EM4> +300
Headhunters_DefendDestructibleEntites_S_Title_001=PROTEGER ~mission(Objects) A QUALQUER CUSTO <EM4>[300 Rep]</EM4>
Headhunters_DefendDestructibleEntites_VE_Desc_001=Você não precisa de todos os detalhes, mas os Headhunters têm interesse no que acontece em <EM4>~mission(Location|Address)</EM4> e acabei de saber que estão sendo atacados por novatos agressivos.\n\nEsses idiotas estão tentando destruir o local eliminando os <EM>~mission(Objects)</EM4>. Isso não vai acontecer.\n\nVai até lá e proteja antes que tudo seja destruído. Esses caras são fracos, então não devem ser problema.\n\nElimina todos eles e eu pago <EM4>~mission(ScripAmount) Council Scrip</EM4> como bônus.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Rep:</EM4> +100
Headhunters_DefendDestructibleEntites_VE_Title_001=MANTER ~mission(Objects) SEGURO <EM4>[100 Rep]</EM4>
Headhunters_DefendDestructibleEntites_VH_Desc_001=Um grupo de mercenários foi enviado pra ferrar nossos interesses em <EM4>~mission(Location|Address)</EM4>. Parece que descobriram que destruir os <EM>~mission(Objects)</EM4> vai prejudicar muito nossas operações.\n\nNão vou mentir, esses caras são perigosos. Ir sozinho seria burrice. Você vai precisar estar bem equipado e trazer <EM>amigos de confiança</EM>.\n\nEssa operação precisa sair perfeita, então estou oferecendo <EM4>~mission(ScripAmount) Council Scrip</EM4> pro contratante principal.\n\nStows out.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x17\n<EM4>Rep:</EM4> +250
Headhunters_DefendDestructibleEntites_VH_Title_001=DEFENDER ~mission(Objects) DE MERCENÁRIOS <EM4>[250 Rep]</EM4>
Headhunters_DefendLocation_E_Desc_001=Uns idiotas com um desejo suicida estão atacando nossas naves ao redor de <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4>. Não podemos deixar isso passar sem que paguem o preço. Topa a missão?\n\nSe sim, vá até lá e enfrente esses malucos. A galera na área está monitorando os movimentos dos atacantes e eu vou te passar atualizações da situação conforme forem chegando. \n\nAlém disso, vou deixar a oferta ainda mais atraente, dando um bônus de <EM4>~mission(ScripAmount) Council Scrip</EM4> para o contratante principal, só pra demonstrar minha gratidão. \n\nStows fora.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4, Hostiles x2, Reinforcements x8\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +1,000 Rep
Headhunters_DefendLocation_E_Title_001=PROTEJA NOSSO LOCAL <EM4>[100–1,000 Rep]</EM4>
Headhunters_DefendLocation_H_Desc_001=Recebemos informações de que naves dos Headhunters indo pra <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> estão sendo atacadas. Os sensores detectaram forças inimigas na região com a intenção clara de sabotar nossas operações.\n\nTem inimigo demais pra um só dar conta. Se puder pegar seu equipamento e chamar uns aliados, preciso de você lá o quanto antes.\n\nOs pontos de ataque e alvos estão mudando. Não se preocupe com os detalhes agora. Só chega lá que eu te passo tudo que precisa saber.\n\nSe fizer tudo certo, o contratado principal vai receber um bônus de <EM4>~mission(ScripAmount) Council Scrip</EM4>.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x5, Hostiles x3, Interdiction Ships x2, Reinforcements x16\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
Headhunters_DefendLocation_H_Title_001=AJUDE OS HEADHUNTERS EM ~mission(DefendLocationWrapperLocation) <EM4>[200–2,000 Rep]</EM4>
Headhunters_DefendLocation_M_Desc_001=Nosso espaço aéreo em torno de <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> foi comprometido. Naves inimigas estão ameaçando a base e qualquer uma das nossas naves por perto. Isso precisa acabar agora, então junta seu equipamento e vai pra lá. Só vai que eu te passo o resto das informações conforme necessário.\n\nSe precisar de motivação extra, estou oferecendo um bônus de <EM4>~mission(ScripAmount) Council Scrip</EM4> pro contratado principal.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4, Hostiles x2, Interdiction Ships x1, Reinforcements x14\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
Headhunters_DefendLocation_M_Title_001=ASSEGURE NOSSO ESPAÇO AÉREO <EM4>[150–2,000 Rep]</EM4>
Headhunters_DefendLocation_S_Desc_001=Nosso pessoal em <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> precisa de ajuda. As naves inimigas estão invadindo a área e atacando tudo o que conseguem encontrar. Já seria ruim o suficiente, mas este local tem equipamentos e pessoal absolutamente cruciais que não podemos deixar ser destruídos ou comprometidos. \n\nConsiderando o tamanho e a escala do ataque, você vai precisar de uma nave bem equipada e de alguns wingmen confiáveis. Reúna sua tripulação, voe até o local e eu vou te passar os detalhes de onde você é mais necessário.\n\nPra provar o quanto estamos sérios em garantir que isso seja feito do jeito certo, o contratante principal vai receber um bônus de <EM4>~mission(ScripAmount) Council Scrip</EM4> por garantir que absolutamente nada dê errado.\n\n- Stow\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x10, Hostiles x3, Interdiction Ships x6, Reinforcements x20\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Tier 2:</EM4> +16,000 Rep
Headhunters_DefendLocation_S_Title_001=RESTAURE A ORDEM EM ~mission(DefendLocationWrapperLocation) <EM4>[300–16,000 Rep]</EM4>
Headhunters_DefendLocation_VE_Desc_001=Headhunters que estão chegando ou saindo de <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> estão sendo perturbados por uns novatos folgados. Precisamos acabar com eles antes que virem um problema de verdade.\n\nVá até lá que eu te atualizo sobre o que esses insetos estão fazendo pra você caçar um por um.\n\nAcabe com todos e mando <EM4>~mission(ScripAmount) Council Scrip</EM4> como bônus pra quem pegou esse trampo.\n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2, Hostiles x1, Reinforcements x6\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +500 Rep
Headhunters_DefendLocation_VE_Title_001=ELIMINE O INCÔMODO <EM4>[100–500 Rep]</EM4>
Headhunters_DefendLocation_VH_Desc_001=Procurando alguém que saiba não só lutar no dogfight, mas também recrutar outros para a causa dos Headhunters. Nosso centro de operações em <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4>, junto com todas as naves que entram e saem de lá, estão sendo alvo de forças hostis. Precisamos de apoio imediato por lá. \n\nNão vou mentir, mas a pressão por lá tá grande. Por isso, você vai precisar de uma nave bem equipada e de alguns amigos de confiança pra voar ao seu lado. Quando reunir sua tripulação, voe até lá e eu te aviso se surgir algum problema na área que precise da sua atenção.\n\nEssa missão precisa ser feita sem erros, então estou oferecendo um bônus de <EM4>~mission(ScripAmount) Council Scrip</EM4> para o contratante principal por um trabalho bem feito. \n\nStows fora.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x7, Hostiles x3, Interdiction Ships x4, Reinforcements x16\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Tier 2:</EM4> +8,000 Rep
Headhunters_DefendLocation_VH_Title_001=INTERROMPA O ATAQUE EM ~mission(DefendLocationWrapperLocation) <EM4>[250–8,000 Rep]</EM4>
Headhunters_Delivery_Outpost_Multi_desc_001=Tenho um monte de caixas em <EM4>~mission(Location|Address)</EM4> que precisam ser movidas para <EM4>~mission(Destination|Address)</EM4>. Parece fácil o suficiente, certo? Bem, acho que não é. \n\nO idiota que deveria mover essas coisas jogou as costas para fora tentando carregar todas de uma vez. Então, você sabe, talvez traga um <EM4>Tractor Beam portátil</EM4> e tente levá-las uma de cada vez como uma pessoa normal. Mas, ei, não deixe que eu lhe diga como fazer seu trabalho. Apenas faça. \n\nUm <EM4>Tractor Beam portátil</EM4> também seria uma boa ideia levar. \n\nStows Desliga\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +200 Rep\n<EM4>Contractor:</EM4> +400 Rep\n<EM4>Sr. Contractor:</EM4> +800 Rep
Headhunters_Delivery_Outpost_Multi_title_001=UM POUCO DE TRABALHO PESADO EM ~mission(Destination) <EM4>[200–800 Rep]</EM4>
Headhunters_Delivery_Outpost_desc_001=Tenho uma caixa em <EM4>~mission(Location|Address)</EM4> que precisa ir para <EM4>~mission(Destination|Address)</EM4>. Tem alguma chance de você conseguir resolver isso bem rápido?\n\nPode ser o trabalho mais fácil que já atribuí. A única ameaça real seria tropeçar nos próprios pés.\n\nUm <EM4>Tractor Beam portátil</EM4> também seria uma boa ideia levar. \n\nStows Desliga\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Neutral:</EM4> +50 Rep
Headhunters_Delivery_Outpost_title_001=RECADO À ~mission(Destination) <EM4>[50 Rep]</EM4>
Headhunters_EliminateAll_OLP_H_desc_001=Ola, Ola. Parece que nem todo mundo está feliz com o fato de os Headhunters estarem fazendo incursões em Stanton. Uma equipe em particular tem batido em nosso pessoal e depois voltado correndo para <EM4>~mission(Location|Address)</EM4>. \n\nQuero que você vá até lá e dê a eles um pouco de seu próprio remédio. A remoção desses lambe-botas deve enviar uma mensagem bem clara sobre o que acontece se você nos atrapalhar. \n\n\nStows Desliga\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x10, Juggernauts x4
Headhunters_EliminateAll_OLP_H_title_001=TRANSMITIR UMA MENSAGEM
Headhunters_EliminateAll_PAF_H_desc_001=Soube-se que estamos expandindo para Stanton e uma equipe local atacou algumas de nossas casas seguras. Conseguimos rastrear os bastardos até um antigo local de mineração de Hathor. \n\nVocê está disposto a mostrar a eles como os Headhunters lidam com as coisas? Se sim, vá até <EM4>~mission(Location|Address)</EM4> e mostre a eles que estamos falando sério. \n\n \n-Stows\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x10, Juggernauts x4
Headhunters_EliminateAll_PAF_H_title_001=MOSTRE A ELES QUEM MANDA
Headhunters_EliminateSpecific_PAF_desc_001=Não consigo acreditar na quantidade de criminosos que estão rastejando por esse maldito sistema. Acho que teremos que abrir espaço para nós mesmos. \n\nTemos uma lista de líderes de alto nível aqui. Nada traz mais caos e desordem para as gangues existentes do que um bom ataque de decapitação. O próximo alvo é <EM4>~mission(TargetName)</EM4>, que rastreamos até <EM4>~mission(Location|Address)</EM4>. Quer dar uma olhada neles?   \n\nEssas antigas instalações da plataforma Hathor são grandes e espalhadas. Duvido que haja uma maneira de fazer isso e não atrair a atenção de seus soldados de infantaria. Não vai ser fácil, mas parece divertido.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x10, Juggernauts x4
Headhunters_EliminateSpecific_PAF_title_001=FANTASMA ~mission(TargetName)
Headhunters_HaulCargo_AToB_OLP_Illegal_desc_01=Preciso de alguém que pegue uma carga para nós. Estávamos usando um velho Hathor PAF para as entregas, mas uma gangue local se infiltrou e não conseguimos pegar nossas coisas.\n\nSe você quiser dar uma surra, pegue a carga do elevador de carga em <EM4>~mission(Location|Address)</EM4> e entregue-a no elevador de carga em <EM4>~mission(Destination|Address)</EM4>. \n\nPelo que ouvi, esse lugar está cheio de todos os tipos. Não será fácil recuperar nossas coisas, mas é para isso que estamos pagando você.\n\nApenas certifique-se de ter uma nave que possa lidar com uma carga de <EM4>~mission(MissionMaxSCUSize)</EM4> e tente não levar um tiro no processo.\n\nUm <EM4>Tractor Beam portátil</EM4> também seria uma boa ideia levar. \n\nStows Desliga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Neutral:</EM4> +1,000 Rep
Headhunters_HaulCargo_AToB_OLP_title_01=RECUPERE A CARGA <EM4>[1,000 Rep]</EM4>
Headhunters_HaulCargo_AToB_PAF_Illegal_desc_01=Não vou aborrecê-lo com os detalhes, tudo o que você precisa saber é: um de nossos transportadores foi atacado e agora nossas mercadorias estão paradas em um elevador de carga em <EM4>~mission(Location|Address)</EM4>. \n\nDepende de você como retirar as mercadorias, mas, se por acaso você matar alguns de nossos rivais no processo, não vou reclamar. Assim que tiver o material, leve-o para o elevador de carga em <EM4>~mission(Destination|Address)</EM4>, e então poderemos resolver seu pagamento.\n\nUm <EM4>Tractor Beam portátil</EM4> também seria uma boa ideia levar. \n\nStows Desliga\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Neutral:</EM4> +1,000 Rep
Headhunters_HaulCargo_AToB_PAF_title_01=TOMADA DE AÇÕES <EM4>[1,000 Rep]</EM4>
Headhunters_HaulCargo_MultiToSingle_desc_01=Temos usado a antiga Hathor <EM4>~mission(Location1|Address) e ~mission(Location2|Address)</EM4> como esconderijos, mas parece que alguns cérebros nulos ansiosos demais os farejaram e estão tentando usar nossas coisas para eles mesmos.\n\nPor sorte, as mercadorias ainda estão lá - por enquanto. Precisamos de alguém para visitar o PAF e o OLP, pegar nossas coisas nos elevadores de carga e levá-las para o elevador de carga em <EM4>~mission(Destination|Address)</EM4>, onde poderemos mantê-las no gelo. \n\nAqui está a lista do que você deve pegar. Não importa a ordem em que você as faça. Certifique-se de trazer uma nave que possa armazenar <EM4>~mission(MissionMaxSCUSize)</EM4> no mínimo. \n\n<EM4>~mission(MultiToSingleToken)</EM4>\n\nCertifique-se de estar pronto para lidar com todos os idiotas que encontrar.\n\nUm <EM4>Tractor Beam portátil</EM4> também seria uma boa ideia levar. \n\nStows Desliga\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Neutral:</EM4> +1,000 Rep
Headhunters_HaulCargo_MultiToSingle_title_01=RECUPERANDO NOSSOS BENS <EM4>[1,000 Rep]</EM4>
Headhunters_SabotageRelays_CFP_001_Desc=CFP acham que estão seguros lá em <EM4>~mission(Location|Address)</EM4> mas temos grandes planos pra eles. Você vai abrir o caminho para nós indo até lá e desligando suas torres de comm.\n\nDeve ter um <EM4>terminal de controle no topo</EM4> que você pode usar para desligar a torre. Você resolve isso e eles não vão poder pedir reforço. Aí podemos mostrar pra essa escória a quem pertence este sistema.\n\nA maioria dos postos usa o mesmo sistema, então isso vai ser útil da próxima vez que você quiser garantir que reforços não atrapalhem.\n\n\nStows, fora.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +75
Headhunters_SabotageRelays_CFP_001_Title=DESLIGUE O COMMS DA CFP <EM4>[75 Rep]</EM4>
Headhunters_SabotageRelays_XT_001_Desc=Estamos dando um golpe para acertar uns idiotas da XenoThreat onde dói, mas precisamos ser espertos. Por isso estamos te enviando primeiro para destruir suas torres de comm para que eles não possam pedir reforços. Você faz isso e podemos entrar e sair antes que eles percebam.\n\nVá para <EM4>~mission(Location|Address)</EM4> e suba nas torres de comm lá. Deve ter um <EM4>painel de controle no topo</EM4> que você pode usar para desligá-las.\n\nNa verdade, o mesmo vale para a maioria dos outros postos. Em vez de ter que lidar com reforços, você pode simplesmente desligar as torres de comm. Mas ei, se você quiser tocar o sino para eliminar mais alguns Xenothreat, eu não vou reclamar.\n\n\nStows, fora.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +100
Headhunters_SabotageRelays_XT_001_Title=SILENCIE A XENOTHREAT <EM4>[100 Rep]</EM4>
Headhunters_SecurityPatrol_E_Desc_001=Os Headhunters estão se expandindo, mas ainda precisamos de ajuda para mapear nosso novo território. Tenho uma missão pronta para verificar alguns pontos que precisamos escanear. \n\nA missão começa no <EM4>location marker</EM4> no seu HUD e depois vamos olhar mais alguns locais, mas vou te atualizando conforme formos limpando os lugares. Não espero que você tenha problemas, mas não tem garantia. Parece que o perigo sempre nos persegue.\n\nSe você terminar isso, vou dar um bônus de <EM4>~mission(ScripAmount) Council Scrip</EM4> para o contratante principal como agradecimento.\n\nStows desliga.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Targets x15\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +1,000 Rep
Headhunters_SecurityPatrol_E_Title_001=RECONHECER E ESCANEAR <EM4>[100–1,000 Rep]</EM4>
Headhunters_SecurityPatrol_H_Desc_001=Percebi um aumento nos ataques às naves dos Headhunters e isso está me deixando apreensivo. Tenho uma carga importante que não podemos perder, e preciso de ajuda para decidir qual rota seguir. Montei alguns pontos que eu usaria se fosse atacar. Você pode dar uma olhada e eliminar qualquer elemento indesejado por lá? \n\nA rota começa no <EM4>location marker</EM4> no seu HUD. Depois que você escanear e limpar o que encontrar, vou te mandar para outros lugares que podem ser interessantes. Tenho ouvido que a galera tem passado por esses pontos, então seria inteligente <EM4>trazer um amigo</EM4> para te dar cobertura.\n\nSe você chegar ao final, vou dar um bônus de <EM4>~mission(ScripAmount) Council Scrip</EM4> para o contratante principal. \n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Targets x54\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
Headhunters_SecurityPatrol_H_Title_001=PROCURANDO POR PROBLEMAS <EM4>[200–2,000 Rep]</EM4>
Headhunters_SecurityPatrol_M_Desc_001=O Clip local quer informações atualizadas sobre alguns dos nossos setores. Não sei o que eles estão procurando, mas também não vou perguntar. Meu trabalho é achar alguém disposto a dar uma passada nesses lugares e fazer a varredura. Você está disponível? \n\nTudo o que você precisa fazer é ir até o <EM4>location marker</EM4> no seu HUD, fazer uma varredura, e se estiver tudo limpo, seguir para o próximo ponto. Se encontrar algum problema, resolve. \n\nNão parece muito difícil, né? Além disso, vou dar um bônus de <EM4>~mission(ScripAmount) Council Scrip</EM4> para o contratante principal como agradecimento. \n\nStows desliga.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Targets x23\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Tier 2:</EM4> +2,000 Rep
Headhunters_SecurityPatrol_M_Title_001=PATRULHA ESPACIAL <EM4>[150–2,000 Rep]</EM4>
Headhunters_SecurityPatrol_S_Desc_001=Tem um babaca tentando nos tirar do sistema. Você está a fim de dar o troco?\n\nVeja, tem umas pessoas que realmente não querem a gente aqui e começaram a enviar grupos de caçada de cinco a sete naves, normalmente com uma nave maior de apoio, para os lugares onde estamos aumentando nossa presença. Está na hora de mostrar que estamos aqui para ficar.  \n\nMontei alguns pontos, começando pelo <EM4>location marker</EM4> no seu HUD, onde estamos vendo os maiores conflitos. Preciso que você passe por cada um e faça uma varredura para ver se conseguimos atrair esses caras para a briga.\n\nEu sei que essa missão vai ser dura, então não seja arrogante e tente fazer tudo sozinho. Se fosse você, eu traria pelo menos <EM4>três amigos</EM4> para te dar cobertura. Para compensar, prometo um bônus de <EM4>~mission(ScripAmount) Council Scrip</EM4> para o contratante principal que conseguir completar a missão. \n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 7/7\n<EM4>Hostiles:</EM4> Targets x87\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Tier 2:</EM4> +16,000 Rep
Headhunters_SecurityPatrol_S_Title_001=CACE ALGUMAS CABEÇAS <EM4>[300–16,000 Rep]</EM4>
Headhunters_SecurityPatrol_VE_Desc_001=Os Headhunters querem informações sobre o que está acontecendo por aqui no território. Já montamos alguns satélites de monitoramento, mas nada melhor que uma boa patrulha. Você topa?\n\nSe sim, vá até o <EM4>location marker</EM4> no seu HUD. Comece escaneando aquela região e depois vamos te orientar para mais alguns lugares que queremos monitorar. \n\nE se precisar de um incentivo extra, tem um bônus de <EM4>~mission(ScripAmount) Council Scrip</EM4> para o contratante principal no final da missão. \n\n- Stows\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Targets x4\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Tier 2:</EM4> +500 Rep
Headhunters_SecurityPatrol_VE_Title_001=VEJA O QUE ESTÁ ACONTECENDO <EM4>[100–500 Rep]</EM4>
Headhunters_SecurityPatrol_VH_Desc_001=Estamos recebendo resistência de pessoas que não parecem felizes com nossa presença por aqui. A galera já pegou o nosso esquema e começou a mandar esquadrões para atacar nossas naves. Topa visitar alguns desses pontos e mostrar que não vamos ser intimidados? \n\nSe sim, comece dando uma olhada no que tem ao redor do <EM4>marcador do local</EM4> no seu HUD. Depois, vou te guiar para outros pontos quentes que precisamos checar. Melhor já deixar tudo pronto antes de sair. Eu recomendaria carregar munição e convencer <EM4>dois amigos</EM4> a se juntarem à patrulha.\n\nSe você fizer isso pelos Headhunters, vou garantir que o contratante principal ganhe um bônus de <EM4>~mission(ScripAmount) Council Scrip</EM4>.\n\nStows fora.\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Targets x66\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Tier 2:</EM4> +8,000 Rep
Headhunters_SecurityPatrol_VH_Title_001=MANTENHA NOSSA POSIÇÃO <EM4>[250–8,000 Rep]</EM4>
Headhunters_bounty_desc_001=Os Headhunters recentemente emprestaram créditos à ~mission(TargetName) sob algumas condições claras. Especificamente, pague-nos de volta ou nós o mataremos. É estranho pensar que isso não foi um incentivo suficiente, mas aqui estamos nós após o prazo de pagamento. Agora, por mais que gostemos de ~mission(TargetName|First), preciso que você cumpra a nossa promessa.\n\n~mission(TargetName|Last) foi visto pela última vez em ~mission(Location|Address). Rastreie-os, elimine-os e receba o pagamento. É simples assim. \n\n- Stows Desliga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
Headhunters_bounty_desc_002=O tempo está pronto para ~mission(TargetName).O Skav está vencido por pagar os Headhunters, então eu preciso que você os dê um soco.\n\nkill ‘eles, não os atingem, apenas para o caso de isso não estar claro.\n\nomeone viu recentemente ~mission(TargetName|Last) em torno de ~mission(location|Address), então vá para lá e leve -os para fora.\n\nDivulgação completa, recebemos relatos de que eles usaram alguns de nossos Creds para contratar proteção extra.Preparar de acordo.\n\nStows Desliga\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
Headhunters_bounty_desc_003=~mission(TargetName) pegou emprestado um monte de Creds dos Headhunters e pensei que a jogada inteligente era tentar se esconder em vez de nos pagar de volta, então eu preciso de alguém para fazer um exemplo de ~mission(TargetName|Last).foram vistos em ~mission(location|Address), então eu recomendo ir lá agora antes que a trilha fique fria.~mission(TargetName|Last) é um tipo paranóico, então não se surpreenda se não estiverem sozinhos.Lidar com isso como você quiser, desde que ~mission(TargetName|Last) seja poeira quando terminar.\n\n- Stows Desliga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1
Headhunters_bounty_title_001=DEADBEAT <EM4>[50 Rep]</EM4>
Headhunters_bounty_title_002=VENCIDO <EM4>[100 Rep]</EM4>
Headhunters_bounty_title_003=AVISO DE COLEÇÃO <EM4>[250 Rep]</EM4>
Headhunters_bounty_xenothreat_desc_001=Os HeadHunters receberam a notícia de que há um Xenothreat OP nas obras que está mirando em uma de nossas equipes.Não temos detalhes precisos sobre o plano, mas sabemos que ~mission(TargetName) o está organizando.Em vez de sentar e esperar que algo aconteça, decidimos ser proativos.\n\n ~mission(TargetName|Last) foi visto com outras pessoas em torno da ~mission(Location|Address).Não podemos mobilizar ninguém rápido o suficiente para chegar lá.Eu quero que você corra para lá e entregue uma greve preventiva.\n\n- Stows Desliga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Headhunters_bounty_xenothreat_desc_002=O Xenothreat recentemente atingiu a fortaleza de um HeadHunter.Vou poupar -lhe os detalhes, mas eles fizeram algumas merdas verdadeiramente hediondas com a nossa equipe.Identificamos o líder do OP como ~mission(TargetName) e estamos procurando um pequeno retorno.Não nos importamos com o que você faz para fazer o trabalho.Somente essa ~mission(TargetName|Last) está morta.\n\na fonte acabou de nos dizer que você pode rastrear essa escória do Xenothreat em ~mission(location|Address).Isso é um profissional e nunca viaja sozinho, portanto, não espere que levá -los a ser um passeio no parque.\n\nStows Desliga\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Headhunters_bounty_xenothreat_desc_003=~mission(TargetName) foi recentemente revelado como uma toupeira para Xenothreat.Tudo faz sentido agora porque o Skav era um imbecil importante.Infelizmente, eles se separaram antes que pudéssemos lidar com isso sozinhos.\n\nBaseado em tudo o que aprenderam sobre nossas operações, precisamos que eles sejam retirados.Eles vêem um de nós chegando e eles vão correr novamente, mas achei que alguém como você tem uma chance melhor de se aproximar o suficiente para uma matança.\n\nNós acabamos de receber a palavra ~mission(TargetName|Last) estava em torno de ~mission(location|Address).Parece que há outros naves protegendo -os também.Acha que você tem a habilidade de livrar o verso de um bastardo traidor e seus amigos bastardos?\n\nStows Desliga \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
Headhunters_claimsweep_desc_easy=Alguns entorpecedores estão tentando desenterrar sujeira nos Headhunters.Algumas sentinelas orbitais foram retiradas em ~mission(location|Address) para espionar nós.Também vimos uma nave checando neles.Proposição simples para você.Vá limpando as sentinelas lá e nós pagaremos por isso.Parece algo em que você estaria?É assim que essas coisas vão.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Hostiles:</EM4> Hostile Wave x3, Prospectors x1\n<EM4>Turrets:</EM4> 2 (hostile)
Headhunters_claimsweep_desc_hard=Alguns idiotas acham que podem espalhar descaradamente os Headhunters e se safar.Eles criaram várias sentinelas orbitais em ~mission(location|Address) e têm algumas naves patrulhando a área.Não sabemos quem está por trás disso, mas honestamente não nos importamos.Só precisamos disso.\n\nAvise-nos se tiver vontade de colocar alguns bastardos realmente impetuosos em seu lugar.Vamos pagar bem e entregar os Creds no segundo em que o trabalho está pronto.\n\nTenha em mente que são realmente apenas as sentinelas com as quais nos preocupamos. Os naves que eles conseguiram patrulhando são apenas uma preocupação se atrapalharem o seu caminho ou se tentarem chamar alguns amigos para impedi -lo.\n\nStows Desliga\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +250\n<EM4>Hostiles:</EM4> Hostile Wave x5, Prospectors x4\n<EM4>Turrets:</EM4> 4 (hostile)
Headhunters_claimsweep_desc_intro=Recebi um pequeno aborrecimento com o qual os Headhunters precisam lidar.Há uma sentinela orbital em ~mission(location|Address) que algum pequeno criador de problemas criou para espionar nossas operações.Deseja fazer alguns Creds fáceis e explodir para nós?\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +50\n<EM4>Turrets:</EM4> 1 (hostile)
Headhunters_claimsweep_desc_medium=Os HeadHunters estão procurando um Merc para fazer um pouco de limpeza para nós.Descobriu que alguém está tentando nos espionar em ~mission(location|Address).Não posso deixar isso ficar de pé.Precisamos de um operador qualificado para cuidar das sentinelas orbitais que eles caíram para lá e, se necessário, lidar com qualquer um de suas Naves que atrapalhem o seu caminho.Parece um OP decentemente executado, então acertar isso pode não ser fácil, mas com certeza deve ser divertido.\n\nDeixe-nos saber se você é a pessoa certa para o trabalho.Os Creds serão transferidos assim que nossas varreduras mostrarem que se foi.\n\nStows Desliga\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostile Wave x4, Prospectors x2\n<EM4>Turrets:</EM4> 3 (hostile)
Headhunters_claimsweep_desc_rand=Os Headhunters descobriram recentemente algumas sentinelas orbitais focadas em nossas operações e não gostamos nem um pouco.Estou procurando pagar alguém para ir para ~mission(location|Address) e deixá -lo claro que eles devem ficar fora dos nossos negócios.Duvido que eles sejam receptivos a uma discussão sobre isso, então eu estaria preparado para despejá -los com extrema força.\n\nBased em nossas varreduras, isso não será uma caminhada no parque.Não seria uma má idéia vir preparada com muita munição.O pagamento será enviado prontamente assim que o trabalho for feito.\n\n- Stows desliga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +100\n<EM4>Hostiles:</EM4> Hostile Wave x32, Prospectors x5\n<EM4>Turrets:</EM4> 4 (hostile)
Headhunters_claimsweep_title_easy=ELIMINE A ESCUTA <EM4>[50 Rep]</EM4>
Headhunters_claimsweep_title_hard=EXTERMINE AS ESCUTAS <EM4>[250 Rep]</EM4>
Headhunters_claimsweep_title_intro=APAGUE A ESCUTA <EM4>[50 Rep]</EM4>
Headhunters_claimsweep_title_medium=ERRADIQUE AS ESCUTAS <EM4>[100 Rep]</EM4>
Headhunters_claimsweep_title_rand=EXECUTE ESCUTAS DE ESCUTAS <EM4>[100 Rep]</EM4>
Headhunters_defend_XT_VH_desc_001=A XenoThreat está em pé de guerra agora. Eles lançaram ataques simultâneos em vários locais dos Headhunters e esgotaram nossos caças. Soube que eles estão planejando invadir ~mission(Location|Address) em seguida, e não conseguimos ninguém lá para defendê-la. \n\nEstou procurando pagar alguém para reunir uma equipe, reunir suprimentos e montar uma defesa forte para nós. Vou ser honesto com você, isso está se tornando uma luta e tanto. Os Xenos estão enviando algumas de suas forças mais experientes para lá. Não há muito mais que eu possa dizer, exceto que eles provavelmente vão escalonar a chegada de suas forças, acabar com todos eles e você será bem pago. \n\nAcha que pode estar à altura da ocasião? \n\n-Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x2, Snipers x2, Soldiers x9, Technicians x2\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Headhunters_defend_XT_VH_title_001=BLOQUEIE A EXPANSÃO dA XENOTHREAT <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
Headhunters_eliminateall_caves_desc_01=Ei,\n\nAlguns bandidos de meia-tigela estão escondidos em ~mission(Location|Address). Não lhes daria atenção, exceto pelo fato de que esses idiotas arrogantes tentaram atacar um posto avançado sob nossa proteção.\n\nNós os afugentamos sem grandes problemas, mas não podemos deixar esse tipo de desrespeito passar impune. Nossos Clipes estão ocupados com peixes maiores, então gostaríamos que você cuidasse disso para nós. \n\nStows Desliga\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Atzkav Sniper Rifle\n- [S1-A] Atzkav Sniper Rifle Battery (8 cap)\n- [S1-A] Calico Arms Tactical\n- [S1-A] Calico Core Tactical\n- [S1-A] Calico Helmet Tactical\n- [S1-A] Calico Legs Tactical\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x2, Soldiers x6\n<EM4>Neutral:</EM4> +50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Headhunters_eliminateall_caves_title_01=UMA REPRESÁLIA RÁPIDA <EM4>[BP]</EM4> <EM4>[50 Rep]</EM4>
Headhunters_theft_outpost_xenothreat_desc_001=pu theft outpost pyro hh vs xt pyro6\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
HexPenetrator_Bounty_desc=Nossos analistas examinaram as informações apreendidas dessas equipes de reconhecimento do XenoThreat, mas os dados parecem estar bloqueados por um sistema de criptografia sofisticado e exigem uma chave criptográfica personalizada para serem acessados.\n\nConseguimos localizar vários tenentes do XenoThreat operando no sistema, você devemos encontrar e envolver os suspeitos e ver se eles possuem uma chave criptográfica que nos permitirá acessar a informação.\n\nComo um lembrete, os militares doaram generosamente alguns Hornets F7A antigos para os membros da CDF que acompanham esta iniciativa. até o fim.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Hostiles:</EM4> Reinforcements x5, Targets x1
HexPenetrator_Comm_Description=Um dos suspeitos capturados durante os ataques recentes revelou que a XenoThreat está tentando acessar remotamente várias matrizes de comunicação em todo o sistema.\n\nTer a XenoThreat ouvindo as comunicações é extremamente perigoso para as pessoas que vivem aqui, portanto, a CDF foi recrutada para redefinir a matriz de comunicação e, em seguida, defendê-la de qualquer Vanguarda da XenoThreat que tente se reconectar aos servidores. \n\nUma vez que essas Vanguardas tenham sido derrotadas, limpe todas as naves hostis restantes na área.\n\nComo lembrete, os militares doaram generosamente alguns F7A Hornets antigos para os membros da CDF que levarem essa iniciativa até o fim.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Hostiles:</EM4> Hostile Wave x17
HexPenetrator_DataHeist_description=Recebemos informações de que a XenoThreat está pretendendo lançar outro ataque ao sistema Stanton. A CDF solicitou à Advocacia a criação de uma nova iniciativa chamada Operação Overdrive para impedir esse ataque antes que ele aconteça. \nA CDF está enviando voluntários para se infiltrarem e obterem qualquer informação que possa dar uma ideia do que eles estão planejando. Não é preciso dizer que é preciso esperar resistência pesada de qualquer XenoThreat no local.\n\nComo incentivo adicional, os militares doaram generosamente alguns F7A Hornets antigos para os membros da CDF que levarem essa iniciativa até o fim.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Hostiles:</EM4> Hostiles x54, Technicians x2\n<EM4>Unknown:</EM4> 12
HexPenetrator_Incursion_Desc=Ondas de naves XenoThreat estão entrando no sistema Stanton e atacando civis aleatórios. Não sabemos dizer se esse é um ataque isolado ou uma reação às nossas iniciativas recentes, mas precisamos detê-los.\n\nComo lembrete, os militares doaram generosamente alguns F7A Hornets antigos para os membros da CDF que levarem essa iniciativa até o fim.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
HexPenetrator_Kareah_Desc=Atenção a todos os voluntários da CDF, recebemos um pedido de socorro do Posto de Segurança Kareah. Acontece que a XenoThreat usou as matrizes de comunicação como uma distração para atrair a polícia e lançar um ataque à estação.\n\nFicamos sabendo que eles estão tentando acessar seus sistemas, portanto, todos os voluntários devem se desviar imediatamente para retomar Kareah e eliminar todas as forças da XenoThreat.\n\nComo lembrete, os militares doaram generosamente alguns F7A Hornets antigos para os membros da CDF que levarem essa iniciativa até o fim.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Hostiles:</EM4> Hostile Wave x3
HexPenetrator_RecoverDeliver_description=Atenção voluntários da CDF, a XenoThreat saiu do ar. Suspeitamos que eles tenham ficado no escuro para se preparar para a fase final de seu plano. \n\nA história provou que a XenoThreat gosta de lutar, portanto, é lógico que isso pode ser um ataque de algum tipo, por isso estamos convocando voluntários para entregar suprimentos na estação Gateway, perto do ponto de salto Stanton-Pyro, para se prepararem para um possível ataque.\n\nComo lembrete, os militares generosamente doaram alguns F7A Hornets antigos para os membros da CDF que levarem essa iniciativa até o fim.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
HexPenetrator_RewardRecord_Desc=Obrigado por sua diligência nessa Iniciativa Overdrive. \n\nComo prometido, aprovamos seu upgrade de um F7C mk ii civil para um F7A mk ii de nível militar, se você tiver um.\n\nAlém disso, você recebeu um aluguel temporário de um F7A mk ii militar que pode ser acessado em seu ASOP.\n\n\n_________________\n\nPara fazer o upgrade, visite o site da RSI para aplicar o token, reinicie o jogo e acesse a nave.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique
Highpoint_KillAnimal_OneType_desc=Temos monitorado uma situação em <EM4>~mission(Location)</EM4> em relação a um aumento na população de <EM4>~mission(Creature)</EM4> nos últimos meses. Nossos modelos indicam que, se isso continuar, muitas das plantas e animais nativos serão afetados negativamente. É imperativo que a população de <EM4>~mission(Creature)</EM4> seja reduzida antes que isso aconteça.     \n\nSe puder ajudar, consulte <EM4>“O Guia da Vida Selvagem de Stanton”</EM4> em seu Journal para obter mais detalhes sobre a criatura visada.\n\nO melhor,\n\nWanda Werkheiser\nGerente de Contratos\nHighpoint Wilderness Specialists\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7
Highpoint_KillAnimals_MultiType_H_desc=As plantas e os animais nativos próximos à <EM4>~mission(Location)</EM4> estão à beira de um colapso ambiental devido ao aumento drástico da população de várias espécies invasoras. Fomos contratados para reduzir drasticamente a população atual dessas espécies para ajudar a evitar um colapso ambiental. Precisamos de um exterminador dedicado e altamente qualificado para cumprir esse contrato.     \n\nVocê pode se familiarizar melhor com as criaturas em questão consultando <EM4>“Guia da Vida Selvagem de Stanton”</EM4> em seu Journal.     \n\nWanda Werkheiser\nGerente de contratos\nHighpoint Wilderness Specialists\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7
Highpoint_KillAnimals_MultiType_H_title=ESFORÇO INTENSIVO DE ERRADICAÇÃO
Highpoint_KillAnimals_MultiType_M_desc=A Highpoint Wilderness Specialists se dedica a manter o equilíbrio dos delicados ecossistemas do império. Um cliente nos contratou recentemente para avaliar o impacto ambiental de várias criaturas invasoras perto de <EM4>~mission(Location)</EM4>. Determinamos que, para preservar a ordem natural da região, é necessário um abate consciente dessas espécies.  \n\nProcuramos alguém capaz e disposto a ajudar nesse esforço. Consulte <EM4>“O Guia da Vida Selvagem de Stanton”</EM4> em seu Journal para obter mais informações sobre as criaturas que estão sendo visadas.     \n\nO melhor,\n\nWanda Werkheiser\nContract Manager\nHighpoint Wilderness Specialists\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7
Highpoint_KillAnimals_MultiType_M_title=ElIMINE AS CRIATURAS INVASORAS
Highpoint_KillAnimals_OneType_title=REDUZA A SUPERPOPULAÇÃO
Highpoint_KillAnimals_rockcracker_desc_E_001=Se você tiver algum trabalho que vá levá-lo a uma daquelas antigas QV Breaker Stations no Cinturão Keeger, temos algo mais em que poderíamos usar sua ajuda enquanto estiver por lá.\n \nRecentemente fomos contatados pela People's Alliance para ajudar em uma iniciativa de preparar essas estações abandonadas para reparos. Infelizmente, uma infestação de Valakkar está criando sérios problemas não apenas para a infraestrutura das estações, mas também para as chances de voltarem a funcionar um dia. Devido ao status do Valakkar como espécie invasora, decidimos que reduzir sua população é a única opção viável.\n \nReduza o número de Valakkar em qualquer uma das antigas QV Breaker Stations e ofereceremos pagamento.\n \nAtenciosamente,\n \nWanda Werkheiser\n\nGerente de Contratos\n\nHighpoint Wilderness Specialists\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Highpoint_KillAnimals_rockcracker_title_E_001=REDUZIR POPULAÇÃO DE VALAKKAR NAS BREAKER STATIONS <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Highpoint_KillAnimals_storm_H_desc_001=Como consequência da tempestade de radiação em curso em Pyro I, alguns dos kopions invasivos foram irradiados. Isso representa uma ameaça à saúde da fauna indígena e àqueles que vivem e trabalham em <EM4>~mission(Location)</EM4>. \n\nEstamos procurando um contratado qualificado que possa abater quaisquer kopions irradiados em <EM4>~mission(Location|Address)</EM4> e arredores. Não aceite este contrato a menos que você tenha as armas e equipamentos adequados que possam funcionar de forma confiável em um ambiente radioativo. \n\nSua remuneração será ajustada de acordo com os riscos associados a este contrato.\n\nAtenciosamente,\n\nWanda Werkheiser\nGerente de Contratos\nHighpoint Wilderness Specialists\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7
Highpoint_KillAnimals_storm_H_title_001=Elimine os Irradiated Kopions
Hockcrow_SearchBody_Easy_Description_001=Agência Hockrow \nArquivo do Caso #MP51132\nInvestigador Principal: Arken Mallor\n\nResumo do Caso: \nPrecisamos de um agente para nos ajudar a localizar o paradeiro atual de um funcionário de um cliente. Ele estava em missão em ~mission(System), mas deixou de reportar sua situação. Nosso cliente começa a temer o pior.\n\nAções do Investigador Contratado:\nLocalize <EM4>~mission(MissingPersonList)</EM4> em <EM4>~mission(Location|Address)</EM4> e confirme seu estado.\n\nCaso esteja falecido, examine o corpo cuidadosamente para que possamos confirmar a morte através do seu mobiGlas.\n\nNotas Adicionais:\nEste contrato foi classificado como <EM4>combate-provável</EM4>, portanto prepare-se adequadamente.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +100 Rep
Hockcrow_SearchBody_Easy_Title_001=LOCALIZAR FUNCIONÁRIO DESAPARECIDO <EM4>[100 Rep]</EM4>
Hockcrow_SearchBody_Hard_Description_001=Agência Hockrow \nArquivo do Caso #MP45648\nInvestigador Principal: Arken Mallor\n\nResumo do Caso: \nUm cliente nos encarregou de rastrear um de seus familiares que desapareceu. Após apresentar comportamento errático, ele cortou todas as comunicações e partiu para ~mission(System). Conseguimos rastrear sua localização aproximada, mas precisamos que um investigador vá até lá pessoalmente para avaliar a situação.\n\nAções do Investigador Contratado:\nLocalize <EM4>~mission(MissingPersonList)</EM4> em <EM4>~mission(Location|Address)</EM4> e confirme seu estado.\n\nCaso esteja falecido, examine o corpo cuidadosamente para que possamos confirmar a morte através do seu mobiGlas.\n\nNotas Adicionais:\nHá grande chance de você encontrar hostis durante a busca. Recomendamos considerar levar reforços para apoiá-lo.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Sr. Contractor:</EM4> +200 Rep
Hockcrow_SearchBody_Hard_Title_001=LOCALIZAR FAMILIAR DESAPARECIDO <EM4>[200 Rep]</EM4>
Hockcrow_SearchBody_Medium_Description_001=Agência Hockrow \nArquivo do Caso #MP74384\nInvestigador Principal: Arken Mallor\n\nResumo do Caso: \nEnviamos uma equipe de duas pessoas para ~mission(System) para investigar um caso, porém não recebemos nenhum relatório deles há vários dias. Neste ponto somos obrigados a assumir que encontraram algum obstáculo inesperado e podem precisar de resgate ou, no pior cenário, terem sido mortos.\n\n\nAções do Investigador Contratado:\nLocalize <EM4>~mission(MissingPersonList)</EM4> em <EM4>~mission(Location|Address)</EM4> e confirme seu estado.\n\nCaso esteja falecido, examine o corpo cuidadosamente para que possamos confirmar a morte através do seu mobiGlas.\n\nNotas Adicionais:\nConsiderando a natureza perigosa da investigação deles, há uma chance muito grande de haver hostis no local.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Contractor:</EM4> +150 Rep
Hockcrow_SearchBody_Medium_Title_001=LOCALIZAR EQUIPE DESAPARECIDA <EM4>[150 Rep]</EM4>
Hockcrow_SearchBody_Super_Description_001=Agência Hockrow \nArquivo do Caso #MP65648\nInvestigador Principal: Arken Mallor\n\nResumo do Caso: \nUma tripulação inteira desapareceu enquanto realizava um contrato em ~mission(System) para um cliente cujos detalhes completos infelizmente não estou autorizado a revelar. Digamos apenas que não era o trabalho mais seguro e o fato de a tripulação não estar respondendo às comunicações não é surpreendente, mas é preocupante. É vital que descubramos o que aconteceu com eles.\n\nAções do Investigador Contratado:\nLocalize <EM4>~mission(MissingPersonList)</EM4> em <EM4>~mission(Location|Address)</EM4> e confirme seu estado.\n\nCaso esteja falecido, examine o corpo cuidadosamente para que possamos confirmar a morte através do seu mobiGlas.\n\nNotas Adicionais:\nEsta investigação tem grande probabilidade de envolver hostis agressivos e perigosos no local. Arme-se adequadamente e considere levar outros associados experientes com você.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Head Contractor:</EM4> +300 Rep
Hockcrow_SearchBody_Super_Title_001=LOCALIZAR TRIPULAÇÃO DESAPARECIDA <EM4>[300 Rep]</EM4>
Hockcrow_SearchBody_VeryEasy_Description_001=Agência Hockrow \nArquivo do Caso #MP51643\nInvestigador Principal: Arken Mallor\n\nResumo do Caso: \nProcuramos um agente para confirmar o estado de um cliente. Ele e seu parceiro perderam uma reunião agendada e todas as tentativas de contato foram em vão. A última informação que tivemos é que estavam tratando de alguns negócios em ~mission(System), e tememos que possam ter sido vítimas de alguma tragédia.\n\nAções do Investigador Contratado:\nLocalize <EM4>~mission(MissingPersonList)</EM4> em <EM4>~mission(Location|Address)</EM4> e confirme seu estado.\n\nCaso esteja falecido, examine o corpo cuidadosamente para que possamos confirmar a morte através do seu mobiGlas.\n\nNotas Adicionais:\nTenha cautela durante a busca. Se o cliente realmente sofreu algum dano, seria lamentável que você tivesse o mesmo destino.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Neutral:</EM4> +100 Rep
Hockcrow_SearchBody_VeryEasy_Title_001=LOCALIZAR CLIENTES DESAPARECIDOS <EM4>[100 Rep]</EM4>
Hockcrow_SearchBody_VeryHard_Description_001=Agência Hockrow \nArquivo do Caso #MP12854\nInvestigador Principal: Arken Mallor\n\nResumo do Caso:\nFomos solicitados a rastrear dois contratados que trabalham para um cliente nosso após perderem contato com eles. A última informação é que estavam viajando juntos em ~mission(System). Até que a situação deles seja avaliada com precisão, nosso cliente permanece aguardando notícias.\n\nAções do Investigador Contratado:\nLocalize <EM4>~mission(MissingPersonList)</EM4> em <EM4>~mission(Location|Address)</EM4> e confirme seu estado.\n\nCaso esteja falecido, examine o corpo cuidadosamente para que possamos confirmar a morte através do seu mobiGlas.\n\nNotas Adicionais:\nVocê estará entrando em uma área considerada particularmente perigosa. Reforços são altamente recomendados para este encontro.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Veteran Contractor:</EM4> +200 Rep
Hockcrow_SearchBody_VeryHard_Title_001=LOCALIZAR CONTRATADOS DESAPARECIDOS <EM4>[200 Rep]</EM4>
Hockrow_FacilityDelve_P1M1_desc=Agência Hockrow \nArquivo de Caso #JD10285\nInvestigador Principal: Arken Mallor\n\nResumo do Caso: \nUm cliente solicitou que a Hockrow compilasse um dossiê completo sobre o infame cientista <EM4>Dr. Logan Jorrit</EM4>. Acredita-se que ele seja responsável pelos incidentes no local Lazarus da Associated Science & Development, e o cliente está ansioso para obter uma visão mais ampla sobre o Dr. Logan e sua pesquisa.\n\nAções do Investigador Contratado: \nObter acesso à instalação <EM4>Onyx Facility</EM4> da ASD, que foi desativada, onde o Dr. Jorrit foi anteriormente o Cientista Chefe. Uma vez lá, localize e <EM4>acesse os arquivos do pessoal do laboratório de pesquisa</EM4> para que possamos obter uma visão geral do que estava acontecendo por lá.\n\nNotas Adicionais:\nO Nav Point QT para o local foi desativado quando a instalação foi fechada, então você terá que voar a última parte manualmente.\n\nEmbora a ASD tenha formalmente fechado a instalação, é aconselhável cautela. Não só os próprios laboratórios podem ser perigosos, mas a área ao redor apresenta sinais de visitantes recentes. Especuladores ou invasores podem estar no local.\n\nTambém consegui garantir um código de identificação de funcionário para você, então, enquanto estiver no trabalho, poderá acessar os computadores lá.\n\nAlém disso, a Instalação Onyx só tem grandes hangares disponíveis, então planeje sua viagem adequadamente.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 3/7
Hockrow_FacilityDelve_P1M1_title=DOSSIÊ JORRIT: ARQUIVOS DO PESSOAL DA ONYX
Hockrow_FacilityDelve_P1M2_desc=Hockrow_FacilityDelve_P1M2_desc=Agência Hockrow \nArquivo de Caso #JD10285\nInvestigador Principal: Arken Mallor\n\nAtualização do Caso: \nA partir dos arquivos do pessoal recuperados na Instalação Onyx, agora sabemos que o Dr. Jorrit recentemente visitou o local e acessou arquivos enquanto estava lá. O próximo passo será seguir essa pista e tentar descobrir exatamente o que o Dr. Jorrit estava fazendo em seu antigo laboratório.\n\nAções do Investigador Contratado:\nExplore a ala de <EM4>Engenharia</EM4> e <EM4>acesse os arquivos recentes do Dr. Jorrit</EM4>.\n\nNotas Adicionais:\nEncontrei uma solução para o problema do QT, então agora você poderá viajar diretamente para o local.\n\nCuidado com possíveis forças hostis no local.\n\nViaje até Onyx em um veículo que possa ser armazenado em um hangar grande.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 3/7
Hockrow_FacilityDelve_P1M2_title=DOSSIÊ JORRIT: ACESSE OS ARQUIVOS DA ENGENHARIA
Hockrow_FacilityDelve_P1M3_desc=Agência Hockrow \nArquivo de Caso #JD10285\nInvestigador Principal: Arken Mallor\n\nAtualização do Caso:\nOs arquivos que você encontrou na Engenharia confirmam que o Dr. Jorrit está perseguindo algo ativamente no local, mas ainda não está claro o que ele está fazendo. Espero que, se você encontrar os dados que ele estava acessando na Pesquisa, isso traga mais clareza.\n\n\nAções do Investigador Contratado:\nExplore a ala de <EM4>Pesquisa</EM4> para localizar e <EM4>acessar os arquivos recentes do Dr. Jorrit</EM4>.\n\nNotas Adicionais:\nFique atento a possíveis forças hostis no local.\n\nViaje até Onyx em um veículo que possa ser armazenado em um hangar grande.\n\nAssim que você acessar esses arquivos, estarei enviando <EM4>5 Secure Drives</EM4> com cópias de todos os dados que reunimos até agora. Você pode coletá-los no seu local de residência.\n\n<EM3>ITEM REWARDS</EM3>\n- ASD Secure Drive\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 3/7 | Knowledge 3/7
