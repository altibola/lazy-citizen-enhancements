Covalex_courier_fromdc_large_desc_001=Olá,\n\nTemos uma remessa de tamanho considerável aguardando na ~mission(Pickup1) em ~mission(Pickup1|Address) que está pronta para ser entregue.\n\nCom esse número de caixas para transportar, provavelmente seria bom ter um par extra de mãos para ajudar a transferir tudo para dentro e para fora de sua nave. \n\nPACKAGES FOR PICK UP \n - Todos os pacotes na ~mission(Pickup1) na ~mission(Pickup1|Address)\n\nLocais de entrega (QUALQUER ORDEM)\n · Pacote #~mission(item1|serialnumber) para a ~mission(Dropoff1|Address)\n · Pacote #~mission(item2|serialnumber) para a ~mission(Dropoff2|Address)\n · Pacote #~mission(item3|serialnumber) para a ~mission(Dropoff3|Address)\n · Pacote #~mission(item4|serialnumber) para a ~mission(Dropoff4|Address)\n · Pacote #~mission(item5|serialnumber) para a ~mission(Dropoff5|Address)\n · Pacote #~mission(item6|serialnumber) para a ~mission(Dropoff5|Address)\n · Pacote #~mission(item7|serialnumber) para a ~mission(Dropoff6|Address)\n · Pacote #~mission(item8|serialnumber) para a ~mission(Dropoff6|Address)\n · Pacote #~mission(item9|serialnumber) para a ~mission(Dropoff7|Address)\n · Pacote #~mission(item10|serialnumber) para a ~mission(Dropoff7|Address)\n · Pacote #~mission(item11|serialnumber) para a ~mission(Dropoff8|Address)\n     · Pacote #~mission(item12|serialnumber) para a ~mission(Dropoff8|Address)\n · Pacote #~mission(item13|serialnumber) para a ~mission(Dropoff9|Address)\n · Pacote #~mission(item14|serialnumber) para a ~mission(Dropoff9|Address)\n · Pacote #~mission(item15|serialnumber) para a ~mission(Dropoff9|Address)\n\nBoa sorte, \n\nChase Hewitt Jr. Coordenador de Logística\nCovalex Shipping \n'Tudo o que você precisar, em qualquer lugar que você precisar.'\n\n\n\n\n\nCovalex Shipping é uma corporação de responsabilidade limitada. Ao aceitar este contrato, você está concordando com todos os termos e condições descritos em nosso 'Independent Workers Supplemental Information Guide v.2948.01.29' estendido. A Covalex Shipping não é responsável por quaisquer danos que ocorram enquanto estiver operando como um contratado independente.\n\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +2,000
