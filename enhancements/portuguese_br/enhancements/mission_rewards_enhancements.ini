BHG_Certification_VeryEasy_Desc=--------------------------------------------------------\n----------------- CONTRATO DE CAÇA -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName) \nSISTEMA: ~mission(System)\nAVALIAÇÃO DE RISCO: Muito Baixo\nÚLTIMA LOCALIZAÇÃO CONHECIDA: ~mission(Location)\nAFILIAÇÕES CONHECIDAS: <Nenhuma>\nNOTAS: Com base em uma avaliação das suas habilidades, a Bounty Hunters Guild gostaria de oferecer a você a chance de obter sua Permissão de Treinamento de Rastreador.\n\nEssa permissão indica que você está qualificado para rastrear e capturar Alvos de Risco Muito Baixo (VLRT). Esses criminosos normalmente pilotam naves menores e raramente contam com mais de uma escolta. Ideal para Caçadores de Recompensa que estão começando agora.\n\nPara concluir com sucesso este processo de certificação, você deve capturar um criminoso classificado como VLRT chamado <EM4>~mission(TargetName)</EM4>, visto pela última vez em <EM4>~mission(Location|Address)</EM4>.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca da Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Mercenary Guild e autorizado a operar tanto dentro da UEE quanto além, de acordo com os Atos da Autoridade Xenotrade.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 2
BHG_Certification_VeryEasy_Title=PERMISSÃO DE TREINO DE RASTREADOR <EM4>[50 Rep]</EM4>
BHG_Certification_VeryHard_Desc=--------------------------------------------------------\n----------------- CONTRATO DE CAÇA -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName) \nSISTEMA: ~mission(System) \nAVALIAÇÃO DE RISCO: Muito Alto\nÚLTIMA LOCALIZAÇÃO CONHECIDA: ~mission(Location)\nAFILIAÇÕES CONHECIDAS: <Nenhuma>\nNOTAS: Com seu histórico comprovado, a Bounty Hunters Guild gostaria de oferecer a você a chance de obter uma Licença Avançada de Rastreador.\n\nEssa licença indica que você está qualificado para rastrear e capturar Alvos de Risco Muito Alto (VHRT). Esses criminosos podem viajar em grandes naves com múltiplos tripulantes e escoltas pesadas. Com vários hostis para enfrentar, encontros com esses alvos podem frequentemente ser letais.\n\nPara concluir com sucesso este processo de certificação, você deve capturar um criminoso classificado como VHRT chamado <EM4>~mission(TargetName)</EM4>, visto pela última vez em <EM4>~mission(Location|Address)</EM4>.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca da Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Mercenary Guild e autorizado a operar tanto dentro da UEE quanto além, de acordo com os Atos da Autoridade Xenotrade.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +50\n<EM4>Unknown:</EM4> 4
BHG_Certification_VeryHard_Title=CERTIFICADO PARA RASTREADOR AVANÇADO <EM4>[50 Rep]</EM4>
BHG_ShipWaveAttack_DrawOutBoss_H_Desc_001=--------------------------------------------------------\n-------------- CONTRATO DE CAÇA ---------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName) \nAVALIAÇÃO DE RISCO: Alto\nÚLTIMA LOCALIZAÇÃO CONHECIDA:  ~mission(Location|Address)\nAFILIAÇÕES CONHECIDAS: Desconhecido\nNOTAS: Este alvo específico tem se mostrado extremamente difícil de capturar. Ele costuma permanecer escondido a menos que surja uma ameaça grande o suficiente para chamar sua atenção. Por isso, você e sua equipe de apoio precisarão eliminar vários dos subordinados dele para provocar sua reação. Apenas mantenha posição, elimine qualquer hostil que aparecer, e o alvo eventualmente dará as caras.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca da Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Mercenary Guild e autorizado a operar tanto dentro da UEE quanto além, de acordo com os Atos da Autoridade Xenotrade.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x24\n<EM4>Probationary Guild Member:</EM4> +200 Rep
BHG_ShipWaveAttack_DrawOutBoss_H_Title_001=RECOMPENSA RECLUSA: ~mission(TargetName) | ALTO RISCO <EM4>[200 Rep]</EM4>
BHG_ShipWaveAttack_DrawOutBoss_S_Desc_001=--------------------------------------------------------\n-------------- CONTRATO DE CAÇA ---------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName) \nAVALIAÇÃO DE RISCO: Extremo\nÚLTIMA LOCALIZAÇÃO CONHECIDA:  ~mission(Location|Address)\nAFILIAÇÕES CONHECIDAS: Desconhecido\nNOTAS: Este alvo específico tem se mostrado extremamente difícil de capturar. Ele costuma permanecer escondido a menos que surja uma ameaça grande o suficiente para exigir sua atenção. Por isso, você e sua frota de apoio mais confiável precisarão eliminar vários dos subordinados dele para forçá-lo a confrontar você. Apenas mantenha posição, elimine qualquer hostil que aparecer, e o alvo eventualmente chegará em sua nave capital.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca da Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Mercenary Guild e autorizado a operar tanto dentro da UEE quanto além, de acordo com os Atos da Autoridade Xenotrade.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 7/7 | Risk 7/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x33\n<EM4>Probationary Guild Member:</EM4> +300 Rep
BHG_ShipWaveAttack_DrawOutBoss_S_Title_001=RECOMPENSA RECLUSA: ~mission(TargetName) | RISCO EXTREMO <EM4>[300 Rep]</EM4>
BHG_ShipWaveAttack_DrawOutBoss_VH_Desc_001=--------------------------------------------------------\n-------------- CONTRATO DE CAÇA ---------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Bounty Hunters Guild autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName) \nAVALIAÇÃO DE RISCO: Muito Alto\nÚLTIMA LOCALIZAÇÃO CONHECIDA:  ~mission(Location|Address)\nAFILIAÇÕES CONHECIDAS: Desconhecido\nNOTAS: Este alvo específico tem se mostrado extremamente difícil de capturar. Ele raramente aparece, a menos que precise lidar pessoalmente com uma ameaça grande o suficiente. Por isso, você e sua equipe de apoio precisarão eliminar vários dos subordinados dele para garantir que ele venha enfrentá-lo. Apenas mantenha posição, elimine qualquer hostil que aparecer, e o alvo eventualmente dará as caras.\n\n\nBOUNTY HUNTERS GUILD\nEm Busca da Justiça\n\nA Bounty Hunters Guild é um serviço de segurança sancionado pela Mercenary Guild e autorizado a operar tanto dentro da UEE quanto além, de acordo com os Atos da Autoridade Xenotrade.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x27\n<EM4>Probationary Guild Member:</EM4> +250 Rep
BHG_ShipWaveAttack_DrawOutBoss_VH_Title_001=RECOMPENSA RECLUSA: ~mission(TargetName) | RISCO MUITO ALTO <EM4>[250 Rep]</EM4>
Bitzeroes_bombingrun_dc_desc_001=Estamos tentando acessar alguns dados confidenciais em ~mission(Location|Address) mas parece haver apenas um backdoor que podemos usar. O problema é que precisamos de alguém no local para acioná-lo. E eu realmente quero dizer acioná-lo.\n\nSe você puder ir até lá e destruir parte da infraestrutura deles, os sistemas de backup de emergência entrarão em operação e poderemos acessar tudo o que quisermos. \n\nGostaria de poder ver a expressão de surpresa nos rostos dos bandidos que comandam o lugar quando isso acontecer.\n\n-Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Turrets:</EM4> present (hostile)
Bitzeroes_bombingrun_dc_title_001=VIRANDO FUMAÇA <EM4>[500–2,000 Rep]</EM4>
Bitzeroes_destroygen_locked_dc_desc_001=Preciso da sua ajuda em um trabalho, mas não consigo detalhar muito os detalhes. Se isso não funcionar para você, não se preocupe.\n\nVocê irá para ~mission(location|Address) e explodirá um gerador de energia para nós. Agora, eles mantêm a geração trancada, então você terá que primeiro procurar os códigos de acesso. Felizmente, eles normalmente mantêm cópias do código em datapads. (Acha que isso os impedirá de serem hackeados.)\n\nSe esse gerador for destruído, sua conta bancária será a próxima a explodir.\n\n- Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Bitzeroes_destroygen_locked_dc_title_001=BLACKOUT OBRIGATÓRIO <EM4>[500 Rep]</EM4>
Bitzeroes_destroyitem_dc_desc_001=Não vou entrar em toda a longa e chata história do porquê, mas há alguns pedaços de ~mission(Location|Address) que precisamos destruir. A parte importante é que quero pagar a você uma boa quantia de créditos para fazer isso. Quase sinto que você deveria nos pagar por isso porque vai ser divertido.\n\nNem me importo como você fará isso. Granadas, lançador de foguetes, Torpedo Burrito de um dia, é tudo a mesma coisa para nós.\n\n-Bit Zeros \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Bitzeroes_destroyitem_dc_title_001=DEFEITO GRAVE <EM4>[500 Rep]</EM4>
Bitzeroes_destroyservers_locked_dc_desc_001=Olá,\n\nTenho um problema para o qual precisamos da sua ajuda. Um de nossos ex-recrutas fez um péssimo trabalho em um hack e acabou deixando uma pegada digital tão confusa que poderia muito bem ser uma confissão completa. \n\nUma exclusão remota não será boa o suficiente, então quero que você vá para ~mission(Location|Address) e certifique-se de que seus servidores de dados sejam apagados da existência.\n\nComo se isso não fosse grande o suficiente já está uma bagunça, os códigos de acesso à porta trancada da sala do servidor só são armazenados fisicamente no local. Isso significa que você terá que liberar um datapad com o código antes mesmo de chegar perto deles.\n\nMas não se preocupe. Vou garantir que os créditos valham todo o trabalho. \n\n- Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
Bitzeroes_destroyservers_locked_dc_title_001=SERVIDOR NÃO ENCONTRADO <EM4>[1,000 Rep]</EM4>
Bitzeroes_destroystash_dc_desc_001=Os idiotas da ~mission(Location|Address) decidiram que seria uma boa ideia interferir em nossos negócios, e agora precisamos informá-los inequivocamente de que estavam enganados. \n\nUm pouco de investigação em seus dados e conseguimos descobrir onde os idiotas guardam seus esconderijos. Agora tudo o que precisamos que você faça é ir até lá e destruir tudo. \n\nAcho que isso deve ser o suficiente para mostrar o ponto de vista.\n\n- Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
Bitzeroes_destroystash_dc_title_001=ACERTE ONDE DÓI <EM4>[500 Rep]</EM4>
Bitzeroes_eliminateall_dc_desc_001=Os cretinos nojentos de ~mission(Location|Address) têm nos vendido dados inúteis enquanto tentam fazer um acordo duplo. Não posso deixar isso assim.\n\nQueremos que você ensine a eles uma última lição e acabe com todos os covardes que encontrar. A última vez que ouvi foi que eles estavam escondidos perto da ~mission(Location). \n\nDerrame o sangue deles e nós encheremos sua carteira. \n\n-Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Juggernauts x2, Soldiers x12, Technicians x2
Bitzeroes_eliminateall_dc_title_001=EXCLUIR PERMANENTEMENTE <EM4>[1,000 Rep]</EM4>
Bitzeroes_heist_buyin_dc_desc_001=Estou olhando para um registro de transferência de estoque agora que está repleto de uma carga muito valiosa que está praticamente implorando para ser roubada. Claro que provavelmente há algumas pessoas lá guardando as mercadorias, mas quanto mais difícil a luta, mais doce será o saque, certo?\n\nNormalmente, estaríamos em um trabalho como esse, mas temos outro alvo em vista agora e Eu odiaria que informações tão boas apodrecessem. \n\nO que você diz? Você quer quebrar isso? Envie-me alguns créditos e a localização será toda sua.\n\n-Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Unknown:</EM4> 10
Bitzeroes_theft_dc_desc_001=Beleza,\n\nLá na ~mission(Location|Address) tem umas coisinhas que eles têm em posse que precisam ser liberadas. Claro que pode ter uns guardas ou indivíduos preocupados que você vai ter que lidar, mas no geral é uma transação relativamente direta – pega as coisas do ~mission(Location) e traz pra gente na ~mission(Destination|Address). \n\nÀs vezes simples é melhor.\n\n-Bit Zeros \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
Bitzeroes_theft_dc_title_001=REATRIBUIÇÃO DE PROPRIEDADE <EM4>[500–1,000 Rep]</EM4>
Bitzeroes_theft_mines_dc_desc_001=Eu realmente espero que você concorde em fazer isso, pois não parece haver muita gente disposta a assumir um monte de minas de proximidade. Veja, há uma pontuação que obtivemos em ~mission(Location|Address), mas a segurança física está se mostrando mais difícil do que o esperado. \n\nSe você conseguir encontrar uma maneira de navegar pelas minas ou possivelmente uma maneira de acioná-las remotamente, deve ser relativamente fácil pegar as mercadorias e sair de lá. Deixe-os em ~mission(Destination|Address) e você receberá mais do que sua parte justa dos créditos por ter assumido o risco.\n\n-Bit Zeros\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
BlockadeRunner_Counter_Desc=Dizem que muita Zeta-Prolanide foi roubada da ~mission(Location|Address).\n\nSe você encontrar alguma, traga-a para a ~mission(DropOffLocation|Address) e faremos com que você consiga um bom preço.\n\nE se não, você pode abandonar essa oferta, sem ressentimentos.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
BlockadeRunner_Desc=*PARA DIVULGAÇÃO IMEDIATA EM TODO O SISTEMA*\n\nUma frota hostil de naves equipadas com bloqueadores quânticos criou um bloqueio ao redor de ~mission(Location|Address), desativou as torres defensivas da estação e roubou um grande suprimento de Zeta-Prolanide. Em resposta, a CDF recebeu autorização para ativar sua força de voluntários. \n\nEmbora a situação geral seja terrível, o roubo da Zeta-Prolanida é nossa prioridade. Sem ação direta, a perda das lojas de Zeta-Prolanide do setor pode ter um efeito devastador para a economia mais ampla de todo o sistema. \n\nEnquanto as forças de segurança locais estão investigando a incursão, elas rastrearam o inventário roubado em vários locais. Os voluntários da CDF têm a tarefa de ir até esses locais, recuperar o Zeta-Prolanide roubado e transferi-lo de volta para a estação antes que o material se degrade completamente e não seja mais viável. Tenha cuidado, pois as informações sugerem que grupos maiores de Zeta-Prolanide têm maior presença de foras da lei.\n\nComo o tempo é essencial, é altamente recomendável ter um Tractor Beam para ajudar na movimentação da carga.\n\nComo incentivo adicional, os voluntários receberão pagamentos de bônus regulares por seus esforços combinados.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000
BlockadeRunner_Title=ALERTA CDF: ACABE COM O BLOQUEIO EM ~mission(Location) <EM4>[1,000 Rep]</EM4>
BrightSky_Desc=O CDF fez parceria com a Anvil Aerospace para encontrar os agentes mais capazes no sistema. \n\nSe você encontrar uma dessas certificações Platinum, poderá resgatar o ingresso por um F8C grátis em um quiosque de Nave no New Deal, Astro Armada ou Crusader Showroom. \nO problema é que sua identidade e localização foram compartilhadas com os participantes em todo o sistema. Para todos os outros, se você conseguir parar o portador do ingresso antes que ele chegue ao quiosque, você poderá reivindicar o ingresso como seu.\n\nQuem conseguir fazer isso não apenas pegará esse caçador de superioridade da próxima geração, mas também provará que ele tenha o que é preciso para as missões CDF mais difíceis.\n\nBoa sorte.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
CFP_Delivery_Outpost_Multi_desc_001=Olá,\n\nCitizens for Prosperity precisa de ajuda para transportar suprimentos em um de nossos postos avançados. As caixas precisam ser retiradas de <EM4>~mission(Location|Address)</EM4> e levadas para <EM4>~mission(Destination|Address)</EM4>. \n\nNão parece muito difícil, não é? Apenas certifique-se de usar um par de sapatos confortáveis. \n\nAlém disso, para facilitar sua vida, eu recomendaria que você tivesse um <EM4>Tractor Beam portátil</EM4> com você\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +200 Rep\n<EM4>Contractor:</EM4> +400 Rep\n<EM4>Sr. Contractor:</EM4> +800 Rep
CFP_Delivery_Outpost_Multi_title_001=ENTREGA INTER-OUTPOST EM ~mission(Destination) - MÚLTIPLAS CAIXAS <EM4>[200–800 Rep]</EM4>
CFP_Delivery_Outpost_desc_001=Olá,\n\nTemos uma oportunidade para qualquer transportador interessado em dar uma mãozinha ou duas para a Citizens for Prosperity.\n\nHá uma caixa que precisa ser movida de <EM4>~mission(Location|Address)</EM4> para <EM4>~mission(Destination|Address)</EM4>. Não deve demorar muito, se você estiver perto do posto avançado e disponível. \n\nAlém disso, para facilitar sua vida, eu recomendaria que você tivesse um <EM4>Tractor Beam portátil</EM4> com você\n\nLima Endicott\nDespachante Líder\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 2/7\n<EM4>Neutral:</EM4> +50 Rep
CFP_Delivery_Outpost_title_001=ENTREGA INTER-OUTPOST EM ~mission(Destination) <EM4>[50 Rep]</EM4>
CFP_RecoverCargo_Easy_Description=A vida é dura na fronteira, e cada entrega para nossos colonos é importante. Realmente não podemos nos dar ao luxo de perder mais nenhuma este ano.\n\nUm dos nossos principais fornecedores foi atacado por um grupo de fora-da-lei em <EM4>~mission(Location|Address)</EM4> e desde então perdemos contato com eles. Temo o pior, mas se ainda conseguirmos recuperar os suprimentos que estavam transportando, isso pode fazer uma grande diferença.\n\nHá boas chances de que os fora-da-lei que os atacaram ainda estejam por lá, então fique alerta. Depois de lidar com eles, pegue a carga e leve até o elevador de carga em <EM4>~mission(Destination|Address)</EM4>. Certifique-se de estar pilotando uma nave capaz de transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e leve também um <EM4>Tractor Beam pesado</EM4>.\n\nVoe com cuidado por aí,\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- C54 SMG\n- P8-SC SMG\n- S71 Rifle\n- [S1-A] C54 SMG Magazine (50 cap)\n- [S1-A] G-2 Helmet Woodland\n- [S1-A] ORC-mkV Arms\n- [S1-A] ORC-mkV Core\n- [S1-A] ORC-mkV Legs\n- [S1-A] ORC-mkX Arms Woodland\n- [S1-A] ORC-mkX Core Woodland\n- [S1-A] ORC-mkX Helmet Woodland\n- [S1-A] ORC-mkX Legs Woodland\n- [S1-A] P8-SC SMG Magazine (45 cap)\n- [S1-A] S71 Rifle Magazine (30 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Unknown:</EM4> 1\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
CFP_RecoverCargo_Easy_Title=REMESSA DE SUPRIMENTOS INTERCEPTADA <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
CFP_RecoverCargo_Hard_Description=Estávamos no processo de entregar um carregamento urgente para o pessoal em <EM4>~mission(Destination|Address)</EM4> quando nosso piloto encontrou um grupo de fora-da-lei. Eles tentaram fugir, mas já era tarde demais.\n\nAinda assim, há um lado positivo. Os rastreadores indicam que a carga ainda está intacta, localizada em <EM4>~mission(Location|Address)</EM4>. Há uma boa chance de que os fora-da-lei estejam guardando a carga enquanto procuram uma nave grande o suficiente para transportar tudo. Eu não queria arriscar perder outro piloto, mas a necessidade desses suprimentos é tão urgente que justifica enviar alguém para recuperá-los.\n\nIsso não vai ser fácil. Esses fora-da-lei não tiveram piedade do nosso piloto. Você vai precisar eliminar eles primeiro antes de recuperar a carga. Traga uma nave capaz de armazenar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e um <EM4>Tractor Beam pesado</EM4> para mover tudo. Entregue no elevador de carga em <EM4>~mission(Destination)</EM4> e vamos consertar essa situação.\n\nVoe com cuidado,\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- C54 SMG\n- P8-SC SMG\n- S71 Rifle\n- [S1-A] C54 SMG Magazine (50 cap)\n- [S1-A] G-2 Helmet Woodland\n- [S1-A] ORC-mkV Arms\n- [S1-A] ORC-mkV Core\n- [S1-A] ORC-mkV Legs\n- [S1-A] ORC-mkX Arms Woodland\n- [S1-A] ORC-mkX Core Woodland\n- [S1-A] ORC-mkX Helmet Woodland\n- [S1-A] ORC-mkX Legs Woodland\n- [S1-A] P8-SC SMG Magazine (45 cap)\n- [S1-A] S71 Rifle Magazine (30 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x7\n<EM4>Unknown:</EM4> 1\n<EM4>Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
CFP_RecoverCargo_Hard_Title=SUPRIMENTOS CRUCIAIS PRECISAM SER RECUPERADOS <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
CFP_RecoverCargo_Medium_Description=Uma nave da Citizens for Prosperity foi emboscada por um grupo de fora-da-lei em <EM4>~mission(Location|Address)</EM4> e precisamos de um piloto habilidoso para ajudar.\n\nPerdemos contato com eles no meio da comunicação, mas parecia que estavam sob fogo pesado. Pode ser tarde demais para eles, mas os suprimentos vitais que transportavam ainda podem ser aproveitados. Vá até lá, elimine qualquer hostil e recupere a carga. Você vai precisar de uma nave que suporte <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e um <EM4>Tractor Beam pesado</EM4> para mover os suprimentos para dentro da sua nave.\n\nLeve tudo para o elevador de carga em <EM4>~mission(Destination|Address)</EM4> e eu garanto que serão bem utilizados.\n\nCuidado por aí,\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- C54 SMG\n- P8-SC SMG\n- S71 Rifle\n- [S1-A] C54 SMG Magazine (50 cap)\n- [S1-A] G-2 Helmet Woodland\n- [S1-A] ORC-mkV Arms\n- [S1-A] ORC-mkV Core\n- [S1-A] ORC-mkV Legs\n- [S1-A] ORC-mkX Arms Woodland\n- [S1-A] ORC-mkX Core Woodland\n- [S1-A] ORC-mkX Helmet Woodland\n- [S1-A] ORC-mkX Legs Woodland\n- [S1-A] P8-SC SMG Magazine (45 cap)\n- [S1-A] S71 Rifle Magazine (30 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Unknown:</EM4> 1\n<EM4>Jr. Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
CFP_RecoverCargo_Medium_Title=RECUPERAÇÃO DE SUPRIMENTOS VALIOSOS <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
CFP_RecoverCargo_Super_Description=Eu normalmente não pediria para alguém fazer algo tão arriscado, mas estas são circunstâncias excepcionais.\n\nNosso piloto estava transportando uma carga vital quando foi alvo de um grupo de fora-da-lei. Em hipótese alguma podemos permitir que eles coloquem as mãos nessa carga.\n\nPelo tamanho da força hostil que atacou, você não conseguirá fazer isso sozinho. Será necessário trazer uma tripulação experiente com você até <EM4>~mission(Location|Address)</EM4> para eliminar esses fora-da-lei e recuperar a carga. Certifique-se de que pelo menos um de vocês tenha uma nave capaz de armazenar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e um <EM4>Tractor Beam pesado</EM4>.\n\nSe por algum milagre você conseguir recuperar essa carga, leve-a até o elevador de carga localizado em <EM4>~mission(Destination|Address)</EM4>.\n\nÉ pedir muito, eu sei, mas se vocês conseguirem completar essa missão terão minha gratidão e a de toda a organização.\n\nBoa sorte,\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- C54 SMG\n- P8-SC SMG\n- S71 Rifle\n- [S1-A] C54 SMG Magazine (50 cap)\n- [S1-A] G-2 Helmet Woodland\n- [S1-A] ORC-mkV Arms\n- [S1-A] ORC-mkV Core\n- [S1-A] ORC-mkV Legs\n- [S1-A] ORC-mkX Arms Woodland\n- [S1-A] ORC-mkX Core Woodland\n- [S1-A] ORC-mkX Helmet Woodland\n- [S1-A] ORC-mkX Legs Woodland\n- [S1-A] P8-SC SMG Magazine (45 cap)\n- [S1-A] S71 Rifle Magazine (30 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x9\n<EM4>Unknown:</EM4> 1\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
CFP_RecoverCargo_Super_Title=OPERAÇÃO ESPECIAL DE RECUPERAÇÃO <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
CFP_RecoverCargo_VeryHard_Description=Cada vez mais naves da CFP estão sendo alvo de ataques ultimamente e, apesar de todos os nossos esforços para manter nossas rotas comerciais discretas, ainda estamos perdendo cargueiros para ataques de fora-da-lei.\n\nNosso piloto em <EM4>~mission(Location|Address)</EM4> é a mais recente vítima. Dói pensar em tudo que perdemos, mas enquanto houver pessoas precisando da nossa ajuda, precisamos continuar lutando.\n\nSe você tem uma nave capaz de transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> e um <EM4>Tractor Beam pesado</EM4>, precisamos que vá até o local acima e recupere essa carga.\n\nIsso não será fácil. O piloto era um dos nossos melhores e não teria caído sem lutar. Não vamos subestimar esses fora-da-lei - leve uma tripulação de confiança e cuidem uns dos outros.\n\nDepois de recuperar a carga, entregue-a no elevador de carga em <EM4>~mission(Destination|Address)</EM4> e eu cuidarei do processamento.\n\nBoa sorte e se cuidem,\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- C54 SMG\n- P8-SC SMG\n- S71 Rifle\n- [S1-A] C54 SMG Magazine (50 cap)\n- [S1-A] G-2 Helmet Woodland\n- [S1-A] ORC-mkV Arms\n- [S1-A] ORC-mkV Core\n- [S1-A] ORC-mkV Legs\n- [S1-A] ORC-mkX Arms Woodland\n- [S1-A] ORC-mkX Core Woodland\n- [S1-A] ORC-mkX Helmet Woodland\n- [S1-A] ORC-mkX Legs Woodland\n- [S1-A] P8-SC SMG Magazine (45 cap)\n- [S1-A] S71 Rifle Magazine (30 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x8\n<EM4>Unknown:</EM4> 1\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
CFP_RecoverCargo_VeryHard_Title=A REMESSA DE CARGA PRECISA SER CONCLUÍDA <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
CFP_SabotageRelays_HH_001_Desc=A violência nunca é nossa primeira escolha, mas às vezes deve ser usada como medida preventiva.\n\nEstamos planejando um ataque a um posto de controle dos Headhunters e precisamos da sua ajuda.\n\nPrecisamos garantir que se algo der errado, eles não consigam pedir reforços e escalar a situação. É aí que você entra. Precisamos que você vá até <EM4>~mission(Location|Address)</EM4> e desative as torres de comunicação. Deve ter um <EM4>painel de controle no topo</EM4> de cada torre que você pode usar para desativá-las.\n\nSe você conseguir fazer isso, os Citizens for Prosperity poderão ganhar terreno vital em Pyro.\n\nTambém vale lembrar para contratos futuros que você pode escolher destruir as torres de comms em vez de arriscar uma luta com dropships de reforço.\n\nFique alerta e fique seguro.\n\nObrigado,\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +75
CFP_SabotageRelays_HH_001_Title=DESATIVE AS TORRES COMMS DOS HEADHUNTERS <EM4>[75 Rep]</EM4>
CFP_SabotageRelays_XT_001_Desc=Os Citizens for Prosperity estão ansiosos para ajudar o povo de Pyro, e isso começa libertando-os das garras da XenoThreat.\n\nEstamos preparando uma equipe para infiltrar um de seus postos, mas precisamos de alguém para ir primeiro e destruir suas torres de comunicação. Uma vez que essas torres estejam offline, eles não poderão pedir reforços e podemos prosseguir com nosso plano.\n\nVá para <EM4>~mission(Location|Address)</EM4> e encontre as torres. No <EM4>topo há um painel de controle</EM4> que pode ser usado para desativá-las.\n\nAlém disso, vale notar que a maioria dos postos usa um sistema similar, então você saberá como desativar as torres de comms em vez de arriscar lutar contra dropships de reforço quando estiver fazendo outros trabalhos.\n\nBoa sorte,\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +100
CFP_SabotageRelays_XT_001_Title=DESLIGUE AS TORRES COMMS DA XENOTHREAT <EM4>[100 Rep]</EM4>
CFP_SecurityPatrol_E_Desc_001=Notamos um aumento de tráfego numa das rotas que monitoramos. Provavelmente não seremos os únicos de olho. Quero que vá até lá numa nave pronta pra combate e verifique se não tem fora-da-lei tentando tirar vantagem dessa sensação de segurança.\n\nDepois de aceitar o contrato, vá até o <EM4>location marker</EM4> no seu HUD e escaneie os pontos de passagem ao longo da rota. Depois que todos estiverem seguros, o contratante principal recebe um bônus de <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Targets x15\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +100 Rep
CFP_SecurityPatrol_E_Title_001=PATRULHAR ROTAS DE VIAGEM ARRISCADAS <EM4>[100 Rep]</EM4>
CFP_SecurityPatrol_H_Desc_001=Identificamos um setor que tem sido alvo de ataques de fora-da-lei recentemente e, com a sua ajuda, esperamos mudar isso. Recomendamos <EM4>levar cobertura</EM4> em naves prontas pra combate para enfrentar quaisquer forças hostis que apareçam.\n\nDepois de aceitar o contrato, vá até o <EM4>location marker</EM4> no seu HUD e escaneie os pontos de passagem ao longo da rota. Depois que todos estiverem seguros, o contratante principal recebe um bônus de <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Targets x54\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Sr. Contractor:</EM4> +200 Rep
CFP_SecurityPatrol_H_Title_001=PATRULHAR TERRITÓRIOS DE CAÇA DE FORA-DA-LEI <EM4>[200 Rep]</EM4>
CFP_SecurityPatrol_M_Desc_001=Fora-da-lei aumentaram a atividade numa das rotas mais populares do sistema e queremos agir antes que o problema saia do controle. Por isso, queremos que você vá até lá numa nave pronta pra combate e lide com quaisquer hostis que encontrar.\n\nDepois de aceitar o contrato, vá até o <EM4>location marker</EM4> no seu HUD e escaneie os pontos de passagem ao longo da rota. Depois que todos estiverem seguros, o contratante principal recebe um bônus de <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Targets x23\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +150 Rep
CFP_SecurityPatrol_M_Title_001=PATRULHAR ROTAS DE VIAGEM PERIGOSAS <EM4>[150 Rep]</EM4>
CFP_SecurityPatrol_S_Desc_001=Após semanas vendo o aumento da criminalidade, conseguimos identificar um setor que acreditamos ser a origem da atividade dos fora-da-lei que tem se espalhado para as áreas vizinhas. Não dá pra esperar erradicar todas as ameaças, mas acreditamos que, ao enviar patrulhas de combate para a área, podemos começar a reverter essa tendência preocupante. Nossos analistas de combate recomendam levar cerca de <EM4>três wingmen</EM4> em naves prontas pra combate para enfrentar quaisquer forças hostis que encontrar.\n\nDepois de aceitar o contrato, vá até o <EM4>location marker</EM4> no seu HUD e escaneie os pontos de passagem ao longo da rota. Depois que todos estiverem seguros, o contratante principal recebe um bônus de <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 7/7\n<EM4>Hostiles:</EM4> Targets x88\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Head Contractor:</EM4> +300 Rep
CFP_SecurityPatrol_S_Title_001=PATRULHAR SETOR EXTREMAMENTE PERIGOSO <EM4>[300 Rep]</EM4>
CFP_SecurityPatrol_VE_Desc_001=Precisamos de alguém com experiência de combate para patrulhar uma rota de viagem pra gente. Ao longo dos anos, descobrimos que é bom aparecer — às vezes um piloto como você passando pela área já vira um fator de dissuasão. Mas caso encontre alguém com ambições maiores, recomenda-se uma nave pronta pra combate.\n\nDepois de aceitar o contrato, vá até o <EM4>location marker</EM4> no seu HUD. Depois de escanear todos os pontos de passagem e garantir que a rota está segura, o contratante principal recebe um bônus de <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Targets x4\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep
CFP_SecurityPatrol_VE_Title_001=PATRULHAR ROTAS DE VIAGEM <EM4>[100 Rep]</EM4>
CFP_SecurityPatrol_VH_Desc_001=Identificamos um setor que tem sido cada vez mais alvo de ataques de fora-da-lei e achamos que, se começarmos a patrulhar ativamente a área, podemos virar o jogo. Recomendamos juntar pelo menos <EM4>dois wingmen</EM4> para ir até lá em naves prontas pra combate e enfrentar quaisquer forças hostis que encontrar.\n\nDepois de aceitar o contrato, vá até o <EM4>location marker</EM4> no seu HUD e escaneie os pontos de passagem ao longo da rota. Depois que todos estiverem seguros, o contratante principal recebe um bônus de <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Targets x66\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Veteran Contractor:</EM4> +250 Rep
CFP_SecurityPatrol_VH_Title_001=PATRULHAR SETOR PERIGOSO DE FORA-DA-LEI <EM4>[250 Rep]</EM4>
CFP_ShipWaveAttack_ClearHostiles_Desc_E_001=Para ajudar a proteger nossos pilotos, a Citizens for Prosperity costuma recomendar o uso de rotas menos tradicionais pelo sistema. Porém, parece que uma gangue de fora-da-lei descobriu uma dessas rotas e começou a montar emboscadas repetidas ao longo desse trajeto de voo. Em vez de simplesmente contornar o problema e correr o risco de ele aparecer novamente em outra rota, acreditamos que o melhor seja enfrentar esses fora-da-lei de frente.\n\nVocê e qualquer nave de apoio que recrutar deverão ir até ~mission(Location|Address) e neutralizar todos os hostis que estiverem emboscados por lá. Eles costumam operar em pequenos grupos, então é vital permanecer na área até que todos os hostis sejam eliminados.\n\nAgradecemos muito sua ajuda,\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x12\n<EM4>Jr. Contractor:</EM4> +100 Rep
CFP_ShipWaveAttack_ClearHostiles_Desc_H_001=Uma frota criminosa criou raízes em um setor que a Citizens for Prosperity está tentando desenvolver, e todo o progresso foi interrompido por causa das ações violentas deles. É essencial para nossos objetivos de longo prazo que encontremos uma maneira de neutralizar essa frota antes que cause ainda mais danos.\n\nVocê e suas naves de apoio mais confiáveis deverão ir até ~mission(Location|Address) e neutralizar todos os hostis que estiverem à espreita no local. Eles costumam operar em pequenos grupos, então é vital permanecer na área até que todos os hostis sejam eliminados.\n\nAgradecemos muito sua ajuda,\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x22\n<EM4>Sr. Contractor:</EM4> +200 Rep
CFP_ShipWaveAttack_ClearHostiles_Desc_M_001=Parece que sempre que começamos a fazer progresso real no sistema, os fora-da-lei aparecem para nos fazer retroceder. Recentemente limpamos ~mission(Location|Address), apenas para descobrir que uma nova gangue de fora-da-lei se instalou lá, usando o local como base para diversas atividades criminosas.\n\nComo não podemos deixar esse problema se espalhar, você e algumas naves de apoio foram encarregados de ir até lá e eliminar todos os grupos da gangue. Depois de lidar com um grupo, permaneça na área até que todos os grupos hostis tenham sido neutralizados.\n\nSaiba que você está realmente fazendo a diferença,\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x13\n<EM4>Contractor:</EM4> +150 Rep
CFP_ShipWaveAttack_ClearHostiles_Desc_VE_001=Recentemente recebemos vários relatos de incidentes envolvendo contratados da Citizens for Prosperity que tiveram confrontos com um grupo de caça de fora-da-lei operando a partir de ~mission(Location|Address).\n\nPara ajudar a restabelecer rotas mais seguras nesse setor, você será enviado até lá para enfrentar esses fora-da-lei. O grupo costuma viajar em pequenos bandos, então é importante que você e qualquer reforço que levar permaneçam na área para lidar com todos eles, ou existe a chance da ameaça continuar.\n\nObrigado por nos ajudar,\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Neutral:</EM4> +100 Rep
CFP_ShipWaveAttack_ClearHostiles_Title_E_001=LIMPAR ROTA DA CFP DE HOSTIS <EM4>[100 Rep]</EM4>
CFP_ShipWaveAttack_ClearHostiles_Title_H_001=NEUTRALIZAR FROTA CRIMINOSA PERIGOSA <EM4>[200 Rep]</EM4>
CFP_ShipWaveAttack_ClearHostiles_Title_M_001=REMOVER GANGUE EMERGENTE DO SETOR <EM4>[150 Rep]</EM4>
CFP_ShipWaveAttack_ClearHostiles_Title_VE_001=AJUDAR A LIDAR COM GRUPO DE CAÇA FORA-DA-LEI <EM4>[100 Rep]</EM4>
CleanAir_Collect-Milestone1_desc=\nDeixe-me começar dizendo que o seu trabalho contínuo ajudando os esforços da Aliança Aid até agora fez uma diferença considerável não apenas para nós em Rayari, mas para o resto das organizações coordenando com a Divisão de Coleta. É por isso que quis entrar em contato com você diretamente. \n\nEmbora tenhamos feito grandes avanços no combate a essa crise de saúde em andamento, há preocupações entre nossos pesquisadores de que o Mofo Molina tem o potencial de mutar para uma nova cepa fúngica. \nPara garantir que nossa investigação em andamento sobre o mofo seja a mais precisa possível, gostaríamos que você fosse até a origem do crescimento em Levski e <EM4>colhesse novas amostras do Mofo Molina</EM4> lá diretamente. \n\nApós coletar as amostras, você precisará entregá-las em <EM4>~mission(Destination|Address)</EM4>. \n\nObrigado pela sua ajuda neste ponto crucial. \n\nNarina Lerrem\nGerente Sênior\nPesquisa Clínica e Terceirização\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Unique, Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Unknown:</EM4> 1\n<EM4>Rep:</EM4> +424
CleanAir_Collect-Milestone1_title=ALLIANCE AID: AMOSTRAS DE MOFO MOLINA <EM4>[424 Rep]</EM4>
CleanAir_Courier_Combat_desc=ATENÇÃO A TODOS OS COURIERS FTL\nPARA ATRIBUIÇÃO IMEDIATA\n\n**DETALHES DO CONTRATO** \n\nLOCAL DE COLETA – Uma nave FTL carregando uma entrega para a Alliance Aid caiu em <EM4>~mission(Location|Address)</EM4>. Precisamos de um courier para recuperar o pacote e continuar a entrega.\n\nLOCAL DE ENTREGA – O pacote deve ser levado para <EM4>~mission(Destination|Target|Address)</EM4>. \n\nNÍVEL DE AMEAÇA – Há uma grande chance de que o courier tenha sido atacado por foras-da-lei ansiosos por adquirir os suprimentos vitais para combater o surto de molde Molina em Levski. <EM4>Engajamentos de nível médio</EM4> são esperados.\n\nVIAGEM – Todas as necessidades de transporte devem ser providenciadas pelo courier.\n\nOs Serviços de Courier FTL agradecem por ajudar na nossa parte para a Alliance Aid.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Unknown:</EM4> 3\n<EM4>Rep:</EM4> +225
CleanAir_Courier_Derelict_desc=ATENÇÃO A TODOS OS COURIERS FTL\nPARA ATRIBUIÇÃO IMEDIATA\n\n**DETALHES DO CONTRATO** \n\nLOCAL DE COLETA – Uma nave FTL carregando uma entrega para a Alliance Aid não completou seu contrato. A última localização conhecida ainda está em <EM4>~mission(Location|Address)</EM4>. Precisamos de um courier para recuperar o pacote e continuar a entrega.\n\nLOCAL DE ENTREGA – O pacote deve ser levado para <EM4>~mission(Destination|Target|Address)</EM4>. \n\nNÍVEL DE AMEAÇA – Não está claro o que aconteceu com a nave, mas esperamos uma falha. Ainda assim, a cautela é recomendada. <EM4>Engajamentos de baixo nível</EM4> são esperados.\n\nVIAGEM – Todas as necessidades de transporte devem ser providenciadas pelo courier.\n\nOs Serviços de Courier FTL têm orgulho de apoiar os esforços da Alliance Aid no combate ao surto em Levski.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 6\n<EM4>Rep:</EM4> +150
CleanAir_Courier_Derelict_title=ALLIANCE AID: RECUPERAÇÃO DE PACOTE VITAL <EM4>[150 Rep]</EM4>
CleanAir_Courier_title=ALLIANCE AID: COURIER NECESSÁRIO <EM4>[225 Rep]</EM4>
CleanAir_DefendShip_Easy_desc=Perdemos o contato com um comboio de suprimentos da Alliance Aid e estamos preocupados de que ele possa estar sob ataque de foras-da-lei. Precisamos que você vá rapidamente até <EM4>~mission(Location|Address)</EM4> e os apoie. Qualquer atraso nos esforços de alívio pode custar vidas em Levski.\n\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Rep:</EM4> +150
CleanAir_DefendShip_Easy_title=ALLIANCE AID: NAVE EM APUROS <EM4>[150 Rep]</EM4>
CleanAir_DefendShip_Hard_desc=Todos estão se unindo à Alliance Aid para ajudar na crise em Levski, mas parece que você não pode fazer o bem sem atrair o mal. Um dos comboios críticos de alívio foi atacado por uma poderosa frota de foras-da-lei. Precisamos que você <EM4>forme uma frota própria</EM4> e se desloque até <EM4>~mission(Location|Address)</EM4> o mais rápido possível. Com sorte, você poderá corrigir essa injustiça antes que seja tarde.\n\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Rep:</EM4> +300
CleanAir_DefendShip_Hard_title=ALLIANCE AID: NAVE SOB ATAQUE <EM4>[300 Rep]</EM4>
CleanAir_DefendShip_Medium_desc=Você pensaria que esses foras-da-lei teriam a decência de não interferir nos esforços de alívio, mas infelizmente recebemos a notícia de que um comboio da Alliance Aid está sendo atacado. Esses criminosos parecem representar uma ameaça séria, então seria recomendado <EM4>trazer apoio</EM4> com você.\n\nQuando estiver pronto, vá até <EM4>~mission(Location|Address)</EM4> e enfrente esses criminosos de frente.\n\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Rep:</EM4> +225
CleanAir_DefendShip_Medium_title=ALLIANCE AID: NAVE EM PERIGO <EM4>[225 Rep]</EM4>
CleanAir_Defense-Milestone1_desc=Como você tem feito tanto trabalho ajudando a Divisão de Defesa, eu quis trazer esse contrato direto para você. É uma situação meio delicada. Dois VIPs passaram mal e havia o receio de que, se vazasse a informação de que estavam sendo transportados, se tornariam alvos prioritários.\n\nInfelizmente, parece que foi exatamente isso que aconteceu. Nossas tentativas de contrabandeá-los de Nyx para Stanton para tratamento médico falharam, e agora a nave que os transporta está sob ataque.\n\nPrecisamos que você vá com urgência até <EM4>~mission(Location|Address)</EM4>, neutralize os atacantes e garanta que as cápsulas criogênicas cheguem em segurança ao elevador de carga em <EM4>~mission(Destination|Address)</EM4>.\n\nNa verdade, quero que você se certifique de estar com uma nave capaz de transportar as cápsulas criogênicas, caso o transporte original esteja danificado demais para continuar.\n\nEspero sinceramente que você consiga concluir essa missão de resgate com sucesso.\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Unique, Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Unknown:</EM4> 1\n<EM4>Rep:</EM4> +675
CleanAir_Defense-Milestone1_title=ALLIANCE AID: MISSÃO DE RESGATE URGENTE <EM4>[675 Rep]</EM4>
CleanAir_EscortShip_Easy_desc=Os Citizens for Prosperity precisam de um piloto experiente em combate para fornecer apoio extra a um piloto da Alliance Aid que está realizando uma viagem vital de <EM4>~mission(Location|Address)</EM4> para os esforços de alívio em andamento.\n\nOs foras-da-lei têm lançado mais ataques devido à maior atividade gerada pelo surto de molde Molina, então será seu trabalho garantir que eles fiquem seguros enquanto realizam seu trabalho. Esta rota é relativamente segura, então não esperamos muitos problemas, mas é melhor não arriscar.\n\nSe estiver interessado, você se encontrará no local e aguardará mais instruções.\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2, Reinforcements x4\n<EM4>Friendlies:</EM4> Escort Wings x1\n<EM4>Rep:</EM4> +120
CleanAir_EscortShip_Easy_title=ALLIANCE AID: ESCOLTA NECESSÁRIA <EM4>[120 Rep]</EM4>
CleanAir_EscortShip_Hard_desc=A Alliance Aid possui uma nave vital para os esforços de alívio partindo de <EM4>~mission(Location|Address)</EM4>. Eles receberam ameaças credíveis de que podem ser atacados e estão procurando reforços de segurança.\n\nQuando estiver pronto, vá até o ponto de encontro com você e <EM4>qualquer nave de combate adicional que você possa recrutar</EM4> e aguarde mais instruções.\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x2, Reinforcements x4\n<EM4>Friendlies:</EM4> Escort Wings x1\n<EM4>Rep:</EM4> +150
CleanAir_EscortShip_Hard_title=ALLIANCE AID: DETALHES DE PROTEÇÃO NECESSÁRIOS <EM4>[150 Rep]</EM4>
CleanAir_EscortShip_Medium_desc=Acabei de ser contatado por um representante da Alliance Aid que está profundamente preocupado com um de seus contratados partindo de <EM4>~mission(Location|Address)</EM4>. As naves que estão ajudando nos esforços de alívio têm atraído muita atenção de foras-da-lei e eles estão preocupados de que sem proteção extra, não conseguirão concluir seu trabalho vital.\n\nDado o aumento do risco e o valor da nave, talvez seja conveniente <EM4>trazer apoio de combate</EM4> com você.\n\nSe estiver interessado, vá até o ponto de encontro e aguarde mais instruções.\n\nLima Endicott\nDespachante Chefe\nCitizens for Prosperity\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x2, Reinforcements x4\n<EM4>Friendlies:</EM4> Escort Wings x1\n<EM4>Rep:</EM4> +135
CleanAir_EscortShip_Medium_title=ALLIANCE AID: SEGURANÇA NECESSÁRIA <EM4>[135 Rep]</EM4>
CleanAir_Hauling_Bulk_MedicalSupplies_desc=Oi,\n\nO surto da Doença do Povo devido ao molde Molina tem sobrecarregado a disponibilidade de suprimentos médicos. Temos uma corrida prioritária em grande escala para reabastecer <EM4>~mission(Destination|Address)</EM4> com os medicamentos e equipamentos necessários. Você estaria disponível?\n\nA coleta deste transporte será em <EM4>~mission(Location|Address)</EM4>. Você lidará com contêineres de até <EM4>~mission(MissionMaxSCUSize)</EM4>. Lembre-se de trazer um <EM4>Tractor Beam portátil</EM4> e uma nave capaz de carregar contêineres desse tamanho. \n\nElla Tieno\nCoordenadora de Logística Jr.\nCovalex Shipping\n'Qualquer coisa que você precise, onde você precisar.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +540
CleanAir_Hauling_Bulk_MedicalSupplies_desc_02=Olá,\n\nCom a emergência em Levski em andamento, a Alliance Aid precisa de todas as mãos para transportar o suficiente de suprimentos médicos para salvar o maior número de vidas possível. Temos uma carga de grande escala em <EM4>~mission(Location|Address)</EM4> pronta para ser levada até <EM4>~mission(Destination|Address)</EM4>.\n\nEssa missão precisa de uma nave que possa carregar até <EM4>~mission(MissionMaxSCUSize)</EM4> de contêineres de carga. Você também precisará de um <EM4>Tractor Beam portátil</EM4> para lidar com as caixas.\n\nPor favor, me avise se puder assumir isso por nós.\n\nSafe Hauling,\nReyes Ling\nCoordenador de Logística de Carga\nLing Family Hauling\n\nLing Family Hauling sabe que é um universo perigoso e imprevisível, por isso estabeleceu vários protocolos para proteger você e o cargamento do nosso cliente. Para garantir que você não seja punido por circunstâncias fora do seu controle, o pagamento total será prorrogado para a porcentagem do carregamento entregue com sucesso. Um cronômetro de entrega será configurado para cada transporte. Qualquer carga que permanecer não entregue após a expiração será marcada como roubada e tratada como tal. Todas as coletas e entregas devem ser carregadas automaticamente ou feitas em um elevador de carga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Rep:</EM4> +285
CleanAir_Hauling_Bulk_MedicalSupplies_title=ALLIANCE AID: TRANSPORTE INTERSTELAR DE CARGA GRANDE (SUPRIMENTOS MÉDICOS) <EM4>[540 Rep]</EM4>
CleanAir_Hauling_Bulk_MedicalSupplies_title_02=ALLIANCE AID: TRANSPORTE DE CARGA MÉDICA - GRANDE ESCALA <EM4>[285 Rep]</EM4>
CleanAir_Hauling_Bulk_MoldSample_desc=Oi,\n\nUma equipe de contenção especial em <EM4>~mission(Location|Address)</EM4> coletou e embalou com segurança uma quantidade suficiente de amostras de molde Molina para um transporte de grande escala. Os pesquisadores em <EM4>~mission(Destination|Address)</EM4> estão ansiosos pela chegada delas para continuar os testes. Você teria disponibilidade para fazer essa entrega?\n\nEu confirmei com a equipe de contenção que eles usaram contêineres de grau biohazard, então não há risco de você contrair a Doença do Povo. Só é necessário trazer uma nave que possa transportar contêineres de até <EM4>~mission(MissionMaxSCUSize)</EM4> e um <EM4>Tractor Beam portátil</EM4>.\n\nEspero que seja uma carga segura e tranquila para você,\n\nElla Tieno\nCoordenadora de Logística Jr.\nCovalex Shipping\n'Qualquer coisa que você precise, onde você precisar.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +600
CleanAir_Hauling_Bulk_MoldSample_title=ALLIANCE AID: TRANSPORTE INTERSTELAR DE CARGA GRANDE (PESQUISA) <EM4>[600 Rep]</EM4>
CleanAir_Hauling_Bulk_MoldTreatment_desc=Oi,\n\nAs pessoas estão respirando aliviadas pelo fato de um tratamento para a Doença do Povo ter sido encontrado, mas ainda não estamos fora de perigo. Há muita gente sofrendo ainda. Esperamos que você possa ajudar na causa transportando um grande lote desse tratamento.\n\nSe você estiver disponível, precisamos que vá até <EM4>~mission(Location|Address)</EM4> e depois leve até <EM4>~mission(Destination|Address)</EM4>. Lembre-se de trazer um <EM4>Tractor Beam portátil</EM4> e uma nave que possa carregar contêineres de até <EM4>~mission(MissionMaxSCUSize)</EM4>.\n\nSafe Hauling,\nReyes Ling\nCoordenador de Logística de Carga\nLing Family Hauling\n\nLing Family Hauling sabe que é um universo perigoso e imprevisível, por isso estabeleceu vários protocolos para proteger você e o cargamento do nosso cliente. Para garantir que você não seja punido por circunstâncias fora do seu controle, o pagamento total será prorrogado para a porcentagem do carregamento entregue com sucesso. Um cronômetro de entrega será configurado para cada transporte. Qualquer carga que permanecer não entregue após a expiração será marcada como roubada e tratada como tal. Todas as coletas e entregas devem ser carregadas automaticamente ou feitas em um elevador de carga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +570 Rep\n<EM4>Tier 2:</EM4> +600 Rep
CleanAir_Hauling_Bulk_MoldTreatment_title=ALLIANCE AID: TRANSPORTE DE CARGA DE TRATAMENTO - GRANDE ESCALA <EM4>[570–600 Rep]</EM4>
CleanAir_Hauling_Bulk_Ventfilters_desc=Oi,\n\nA crise do molde Molina realmente tem deixado as pessoas nervosas. Os pedidos de novos filtros de ventilação dispararam, até mesmo de lugares que não estavam usando aqueles filtros baratos da Gyson.\n\nEnfim, tenho aqui um transporte de filtros que espero que você possa resolver. Trata-se de um lote pequeno de filtros esperando em <EM4>~mission(Location|Address)</EM4> e precisa ser levado até <EM4>~mission(Destination|Address)</EM4>. Você estaria disponível?\n\nDe acordo com as especificações do transporte, os contêineres terão até <EM4>~mission(MissionMaxSCUSize)</EM4> de tamanho ou menos. Não se esqueça de trazer um <EM4>Tractor Beam portátil</EM4> para ajudar a mover tudo.\n\nAgradecemos por fazer essa missão importante para nós!\n\nElla Tieno\nCoordenadora de Logística Jr.\nCovalex Shipping\n'Qualquer coisa que você precise, onde você precisar.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +600
CleanAir_Hauling_Bulk_Ventfilters_title=ALLIANCE AID: TRANSPORTE INTERSTELAR DE CARGA GRANDE (FILTROS) <EM4>[600 Rep]</EM4>
CleanAir_Hauling_Small_Cryopods_desc=Olá,\n\nEu tenho uma missão extremamente importante e sensível aqui que espero que você possa assumir. Para reduzir as fatalidades do surto de molde Molina, aqueles que sofrem com a Doença do Povo estão sendo colocados em cryopods para impedir que a doença avance antes de receberem o tratamento necessário.\n\nVocê pode ir até <EM4>~mission(Location|Address)</EM4> para pegar um pequeno lote de cryopods e levá-los até <EM4>~mission(Destination|Address)</EM4> para que eles possam receber a ajuda necessária?\n\nSe você nunca lidou com cryopods, precisará de uma nave com um compartimento que possa carregar até <EM4>~mission(MissionMaxSCUSize)</EM4> de tamanho. Um <EM4>Tractor Beam portátil</EM4> também será necessário para mover os pods.\n\nAgradecemos por ajudar a Alliance Aid a enfrentar essa crise.\n\nElla Tieno\nCoordenadora de Logística Jr.\nCovalex Shipping\n'Qualquer coisa que você precise, onde você precisar.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +390
CleanAir_Hauling_Small_Cryopods_title=ALLIANCE AID: TRANSPORTE INTERSTELAR DE CARGA PEQUENA (CRYOPODS) <EM4>[390 Rep]</EM4>
CleanAir_Hauling_Small_MedicalSupplies_desc=Oi,\n\nHouve um aumento na demanda por suprimentos médicos desde que o surto de molde Molina começou. Por isso, a equipe médica em <EM4>~mission(Destination|Address)</EM4> está ficando sem alguns itens essenciais e não pode esperar pela reposição regular. Você teria disponibilidade para fazer uma corrida prioritária até lá agora?\n\nOs bens estão prontos e esperando em <EM4>~mission(Location|Address)</EM4>. É um transporte pequeno, mas você ainda precisará de um <EM4>Tractor Beam portátil</EM4>. Parece que os contêineres terão até <EM4>~mission(MissionMaxSCUSize)</EM4> de tamanho.\n\nEspero que seja uma missão tranquila e segura para você.\n\nElla Tieno\nCoordenadora de Logística Jr.\nCovalex Shipping\n'Qualquer coisa que você precise, onde você precisar.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +360
CleanAir_Hauling_Small_MedicalSupplies_desc_02=Oi,\n\nParece que o pessoal tem esgotado os recursos médicos tentando descobrir como tratar a Doença do Povo. A Alliance Aid está sobrecarregada com os pedidos de transporte de suprimentos médicos agora. Você pode me ajudar a resolver um desses pedidos?\n\nAqui está um pequeno transporte pronto para ser feito. Os suprimentos estão em <EM4>~mission(Location|Address)</EM4> e a entrega vai para <EM4>~mission(Destination|Address)</EM4>. O único requisito é um <EM4>Tractor Beam portátil</EM4> para mover a carga e uma nave que possa carregar até <EM4>~mission(MissionMaxSCUSize)</EM4> de contêineres.\n\nSafe Hauling,\nReyes Ling\nCoordenador de Logística de Carga\nLing Family Hauling\n\nLing Family Hauling sabe que é um universo perigoso e imprevisível, por isso estabeleceu vários protocolos para proteger você e o cargamento do nosso cliente. Para garantir que você não seja punido por circunstâncias fora do seu controle, o pagamento total será prorrogado para a porcentagem do carregamento entregue com sucesso. Um cronômetro de entrega será configurado para cada transporte. Qualquer carga que permanecer não entregue após a expiração será marcada como roubada e tratada como tal. Todas as coletas e entregas devem ser carregadas automaticamente ou feitas em um elevador de carga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Rep:</EM4> +225
CleanAir_Hauling_Small_MedicalSupplies_title=ALLIANCE AID: TRANSPORTE INTERSTELAR DE CARGA PEQUENA (SUPRIMENTOS MÉDICOS) <EM4>[360 Rep]</EM4>
CleanAir_Hauling_Small_MedicalSupplies_title_02=ALLIANCE AID: TRANSPORTE DE CARGA MÉDICA - PEQUENA ESCALA <EM4>[225 Rep]</EM4>
CleanAir_Hauling_Small_MoldSample_desc=Olá,\n\nOs cientistas em <EM4>~mission(Destination|Address)</EM4> estão desesperados para conseguir amostras do molde Molina para realizar uma série de testes. Acabamos de receber a informação de que há um pequeno lote de amostras esperando em <EM4>~mission(Location|Address)</EM4> para serem entregues. Você pode fazer esse transporte?\n\nVocê precisará de uma nave que consiga carregar até <EM4>~mission(MissionMaxSCUSize)</EM4> de contêineres de carga, além de um <EM4>Tractor Beam portátil</EM4> para lidar com eles. Finalmente, para sua tranquilidade, as amostras de molde estão embaladas com segurança dentro dos contêineres, então não há risco de você ficar doente.\n\nElla Tieno\nCoordenadora de Logística Jr.\nCovalex Shipping\n'Qualquer coisa que você precise, onde você precisar.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +405
CleanAir_Hauling_Small_MoldSample_title=ALLIANCE AID: TRANSPORTE INTERSTELAR DE CARGA PEQUENA (PESQUISA) <EM4>[405 Rep]</EM4>
CleanAir_Hauling_Small_MoldTreatment_desc=Oi,\n\nNos unimos ao esforço para ajudar os afetados pelo surto de molde Molina. Temos um transporte de pequena escala de tratamento urgentemente necessário esperando para ser coletado em <EM4>~mission(Location|Address)</EM4> e entregue em <EM4>~mission(Destination|Address)</EM4>. Você teria disponibilidade?\n\nTudo o que você precisará é de uma nave que possa carregar até <EM4>~mission(MissionMaxSCUSize)</EM4> de contêineres e um <EM4>Tractor Beam portátil</EM4> para facilitar o movimento das cargas.\n\nSafe Hauling,\nReyes Ling\nCoordenador de Logística de Carga\nLing Family Hauling\n\nLing Family Hauling sabe que é um universo perigoso e imprevisível, por isso estabeleceu vários protocolos para proteger você e o cargamento do nosso cliente. Para garantir que você não seja punido por circunstâncias fora do seu controle, o pagamento total será prorrogado para a porcentagem do carregamento entregue com sucesso. Um cronômetro de entrega será configurado para cada transporte. Qualquer carga que permanecer não entregue após a expiração será marcada como roubada e tratada como tal. Todas as coletas e entregas devem ser carregadas automaticamente ou feitas em um elevador de carga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +225 Rep\n<EM4>Tier 2:</EM4> +405 Rep
CleanAir_Hauling_Small_MoldTreatment_title=ALLIANCE AID: TRANSPORTE DE CARGA DE TRATAMENTO - PEQUENA ESCALA <EM4>[225–405 Rep]</EM4>
CleanAir_Hauling_Small_Ventfilters_desc=Oi,\n\nEsse surto de molde Molina tem deixado todo mundo em alerta. Os pedidos de filtros de ventilação novos estão nas alturas, até de lugares que nem estavam usando aqueles baratos da Gyson.\n\nDe qualquer forma, tenho aqui um transporte de filtros que espero que você possa fazer. Trata-se de uma carga de pequena escala de filtros aguardando em <EM4>~mission(Location|Address)</EM4> e que precisa ser levada até <EM4>~mission(Destination|Address)</EM4>. Você pode cuidar disso?\n\nDe acordo com os detalhes do transporte, os contêineres terão até <EM4>~mission(MissionMaxSCUSize)</EM4> de tamanho ou menos. Não se esqueça de trazer um <EM4>Tractor Beam portátil</EM4> para ajudá-lo a mover tudo.\n\nAgradecemos por fazer essa corrida importante para nós!\n\nElla Tieno\nCoordenadora de Logística Jr.\nCovalex Shipping\n'Qualquer coisa que você precise, onde você precisar.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +405
CleanAir_Hauling_Small_Ventfilters_title=ALLIANCE AID: TRANSPORTE INTERSTELAR DE CARGA PEQUENA (FILTROS) <EM4>[405 Rep]</EM4>
CleanAir_Hauling_Supply_Cryopods_desc=Oi,\n\nCom as instalações médicas completamente sobrecarregadas pelo surto de molde Molina, elas começaram a colocar as pessoas em cryopods para evitar que ficassem ainda mais doentes. Felizmente, o pessoal em <EM4>~mission(Destination|Address)</EM4> liberou espaço nos hospitais para tratar alguns dos afetados. Agora eles só precisam dos pacientes.\n\nProcurando alguém disposto a pegar alguns cryopods em <EM4>~mission(Location|Address)</EM4> com uma nave que consiga carregar contêineres de até <EM4>~mission(MissionMaxSCUSize)</EM4>. Você também precisará de um <EM4>Tractor Beam portátil</EM4>. Não sei se você já lidou com um cryopod antes, mas não é exatamente algo que você possa transportar à mão.\n\nElla Tieno\nCoordenadora de Logística Jr.\nCovalex Shipping\n'Qualquer coisa que você precise, onde você precisar.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +465
CleanAir_Hauling_Supply_Cryopods_title=ALLIANCE AID: TRANSPORTE INTERSTELAR DE CARGA MÉDIA (CRYOPODS) <EM4>[465 Rep]</EM4>
CleanAir_Hauling_Supply_MedicalSupplies_desc=Espero que esta mensagem te encontre bem,\n\nAs coisas estão mais agitadas do que o normal por aqui, porque vários dos nossos pilotos acabaram ficando doentes enquanto faziam corridas para Levski. Felizmente, a Covalex está contribuindo com a 'Alliance Aid', então esperamos poder deixar esse caso para trás em breve. \n\nAtualmente, tenho uma carga média de suprimentos médicos esperando em <EM4>~mission(Location|Address)</EM4>. Precisamos de alguém para levar até <EM4>~mission(Destination|Address)</EM4>, para que a equipe lá consiga operar a plena capacidade. \n\nO maior contêiner dessa carga será de <EM4>~mission(MissionMaxSCUSize)</EM4> de tamanho, então tenha uma nave que consiga carregar isso. Ah, e não esqueça do seu <EM4>Tractor Beam portátil</EM4>. \n\nObrigado por se juntar a nós e à Alliance Aid para ajudar a acabar com essa crise!\n\nElla Tieno\nCoordenadora de Logística Jr.\nCovalex Shipping\n'Tudo o que você precisar, onde você precisar.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +465
CleanAir_Hauling_Supply_MedicalSupplies_desc_02=Olá,\n\nPrecisamos da sua ajuda! Suprimentos médicos estão em alta demanda após o surto de mofo Molina que esgotou os estoques. Felizmente, há uma carga média desses itens em <EM4>~mission(Location|Address)</EM4>, pronta para ser levada até <EM4>~mission(Destination|Address)</EM4>.\n\nEssa corrida precisa de um transportador com uma nave que possa carregar <EM4>~mission(MissionMaxSCUSize) containers de carga</EM4>. Você também vai precisar de um <EM4>Tractor Beam portátil</EM4> para lidar com os contêineres. \n\nPor favor, me avise se você pode cuidar disso para nós.   \n\nBoa sorte nas entregas,  \nReyes Ling \nCoordenador de Logística de Carga\nLing Family Hauling\n\nLing Family Hauling sabe que o universo é perigoso e imprevisível, e estabeleceu vários protocolos para proteger você e a carga de nossos clientes. Para garantir que você não seja punido por circunstâncias fora do seu controle, o pagamento total será calculado com base na porcentagem da carga entregue com sucesso. Um temporizador de entrega será configurado para cada corrida. Qualquer carga que não for entregue até o vencimento será marcada como roubada e tratada como tal. Todas as coletas e entregas devem ser feitas com carregamento automático ou em um elevador de carga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Rep:</EM4> +390
CleanAir_Hauling_Supply_MedicalSupplies_title=ALLIANCE AID: CARGA INTERSTELAR DE MÉDIO PORTE (MÉDICA) <EM4>[465 Rep]</EM4>
CleanAir_Hauling_Supply_MedicalSupplies_title_02=ALLIANCE AID: CARGA MÉDICA - MÉDIO PORTE <EM4>[390 Rep]</EM4>
CleanAir_Hauling_Supply_MoldSample_desc=Oi,\n\nTemos uma corrida importante que precisamos que você cuide. Há uma carga média de amostras de mofo Molina, embaladas com segurança e esperando em <EM4>~mission(Location|Address)</EM4>. Precisamos que alguém pegue os contêineres e os leve até <EM4>~mission(Destination|Address)</EM4> para ajudar na pesquisa. \n\nApesar de o mofo ser extremamente tóxico, esses contêineres vão te proteger. O que você precisa se preocupar é em ter uma nave grande o suficiente para transportar contêineres de até <EM4>~mission(MissionMaxSCUSize)</EM4> de tamanho. Além disso, você vai precisar de um <EM4>Tractor Beam portátil</EM4> para movimentar tudo de forma rápida e eficiente. \n\nAgradeço por cuidar dessa corrida importante para nós!\n\nElla Tieno \nCoordenadora de Logística Jr. \nCovalex Shipping \n'Tudo o que você precisar, onde você precisar.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +465
CleanAir_Hauling_Supply_MoldSample_title=ALLIANCE AID: CARGA INTERSTELAR DE MÉDIO PORTE (PESQUISA) <EM4>[465 Rep]</EM4>
CleanAir_Hauling_Supply_MoldTreatment_desc=Oi,\n\nÉ meio triste ouvir o que está acontecendo com as pessoas em Levski por causa do surto de mofo Molina, né? Nossa família decidiu fazer tudo o que pode para ajudar com a Alliance Aid. Temos uma carga média de antifúngicos esperando para ser retirada em <EM4>~mission(Location|Address)</EM4> e levada até <EM4>~mission(Destination|Address)</EM4>. Você acha que consegue cuidar disso pra gente?\n\nAntes de ir, certifique-se de trazer uma nave que consiga carregar até <EM4>~mission(MissionMaxSCUSize) containers de carga</EM4>. Também será necessário um <EM4>Tractor Beam portátil</EM4> para lidar com os contêineres. \n\nBoa sorte nas entregas,  \nReyes Ling \nCoordenador de Logística de Carga\nLing Family Hauling\n\nLing Family Hauling sabe que o universo é perigoso e imprevisível, e estabeleceu vários protocolos para proteger tanto você quanto a carga de nossos clientes. Para garantir que você não seja punido por circunstâncias fora de seu controle, o pagamento total será proporcional à quantidade de carga entregue com sucesso. Um temporizador de entrega será configurado para cada corrida. Qualquer carga não entregue após o vencimento será marcada como roubada e tratada como tal. Todas as coletas e entregas devem ser feitas com carregamento automático ou em um elevador de carga.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +375 Rep\n<EM4>Tier 2:</EM4> +465 Rep
CleanAir_Hauling_Supply_MoldTreatment_title=ALLIANCE AID: CARGA DE TRATAMENTO - MÉDIO PORTE <EM4>[375–465 Rep]</EM4>
CleanAir_Hauling_Supply_Ventfilters_desc=Oi,\n\nTemos uma carga média de novos filtros de ventilação em <EM4>~mission(Location|Address)</EM4> esperando para ser levada até <EM4>~mission(Destination|Address)</EM4>. Você está disponível para cuidar disso? \n\nA equipe em <EM4>~mission(Destination)</EM4> está obviamente muito ansiosa para receber esses filtros novos, e não para de me cobrar sobre a entrega até eu dar uma previsão. Não é à toa, com todo mundo tão preocupado com o surto de mofo Molina. Vai ser uma corrida fácil. Tudo o que você precisa é de uma nave que consiga carregar containers de até <EM4>~mission(MissionMaxSCUSize)</EM4> de tamanho ou menores, e um <EM4>Tractor Beam portátil</EM4>. \n\nElla Tieno\nCoordenadora de Logística Jr.\nCovalex Shipping \n'Tudo o que você precisar, onde você precisar.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +465
CleanAir_Hauling_Supply_Ventfilters_title=ALLIANCE AID: CARGA INTERSTELAR DE MÉDIO PORTE (FILTROS) <EM4>[465 Rep]</EM4>
CleanAir_Killship_Easy_desc=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Neutralizar Nave \nCÓDIGO DE APROVAÇÃO = RT-04\n\nPROCESSAMENTO IMEDIATO\n\nCom remessas valiosas sendo transportadas para Levski graças a toda essa história de Alliance Aid, os foras-da-lei estão fazendo a festa atacando os transportadores carregados. Um bandido em particular, <EM4>~mission(TargetName)</EM4>, já derrubou meia dúzia de naves e todo mundo está bem animado para parar com essa farra. \n\nEle foi visto pela última vez atormentando naves em <EM4>~mission(Location|Address)</EM4>. Vá até lá e destrua a nave dele. O pagamento será liberado assim que ele for neutralizado. \n\nEste contrato é inegociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações são destinadas ao uso da pessoa ou entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Unknown:</EM4> 2\n<EM4>Rep:</EM4> +75
CleanAir_Killship_Easy_title=ALLIANCE AID: LADRÃO DE CARGA <EM4>[75 Rep]</EM4>
CleanAir_Killship_Hard_desc=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Neutralizar Nave \nCÓDIGO DE APROVAÇÃO = RT-06\n\nPROCESSAMENTO IMEDIATO\n\nUma das gangues locais de Nyx, a Moraine, tem aproveitado a emergência que está acontecendo em Levski e colocou um dos melhores pilotos deles, <EM4>~mission(TargetName)</EM4>, para atacar qualquer transportador da Alliance Aid que conseguir pegar. Pelo ritmo em que estão roubando os suprimentos dessa operação, se não forem parados logo, vai acabar resultando em um monte de pessoas doentes em Levski sem ajuda nenhuma. \n\nConseguimos rastrear o grupo até <EM4>~mission(Location|Address)</EM4>, mas antes de você partir, vai precisar recrutar alguns aliados. A menos que você <EM4>leve alguns aviões de apoio com você</EM4>, não tenho certeza se vai conseguir neutralizar essa gangue sozinha. \n\nEste contrato é inegociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações são destinadas ao uso da pessoa ou entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Unknown:</EM4> 4\n<EM4>Rep:</EM4> +225
CleanAir_Killship_Hard_title=ALLIANCE AID: CAÇADORES DE TRANSPORTADORES <EM4>[225 Rep]</EM4>
CleanAir_Killship_Medium_desc=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Neutralizar Nave \nCÓDIGO DE APROVAÇÃO = RT-05\n\nPROCESSAMENTO IMEDIATO\n\nParece que a People's Alliance não é a única que está atrás dos recursos necessários para combater o surto de mofo Molina. A gangue Moraine tem atacado as rotas de transporte com força para tentar pegar o maior número possível de transportadores. Um membro específico, <EM4>~mission(TargetName)</EM4>, e sua tripulação têm sido especialmente bem-sucedidos, derrubando mais de uma dúzia de naves. O pessoal organizando a Alliance Aid está bem ansioso para ver esse problema crescente resolvido. \n\nRelatórios recentes indicam que eles estão atacando perto de <EM4>~mission(Location|Address)</EM4>. Vá até lá com qualquer nave de apoio que quiser levar e neutralize-os antes que mais suprimentos vitais sejam perdidos. \n\nEste contrato é inegociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações são destinadas ao uso da pessoa ou entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Unknown:</EM4> 3\n<EM4>Rep:</EM4> +150
CleanAir_Killship_Medium_title=ALLIANCE AID: SAQUEADORES DE RECURSOS <EM4>[150 Rep]</EM4>
CleanAir_RecoverCargo_Easy_desc=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Recuperação de Carga \nCÓDIGO DE APROVAÇÃO = JJ-11\n\nPROCESSAMENTO IMEDIATO\n\nCom todos esses transportadores da Alliance Aid levando carga valiosa, os foras-da-lei da área entraram em um frenesi. Acabamos de receber a informação de um dos seus últimos alvos via sinal de emergência e precisamos que você vá até <EM4>~mission(Location|Address)</EM4>, avalie a situação, <EM4>neutralize qualquer inimigo restante</EM4> na área e, se necessário, garanta a carga para entrega em <EM4>~mission(Destination|Address)</EM4>. \n\nNão se esqueça de levar um <EM4>Tractor Beam portátil</EM4> para lidar com a carga. \n\nEste contrato é inegociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações são destinadas ao uso da pessoa ou entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x2\n<EM4>Unknown:</EM4> 2\n<EM4>Rep:</EM4> +300
CleanAir_RecoverCargo_Easy_title=ALLIANCE AID: TENTATIVA DE ROUBO DE CARGA <EM4>[300 Rep]</EM4>
CleanAir_RecoverCargo_Hard_desc=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Recuperação de Carga \nCÓDIGO DE APROVAÇÃO = JJ-13\n\nPROCESSAMENTO IMEDIATO\n\nA Alliance Aid acaba de entrar em contato em pânico. Uma remessa vital que eles estavam contando não apareceu. Todos os sinais indicam que foi roubada por ladrões ao longo do caminho, então estão contando conosco para garantir que ela seja entregue. \n\nVocê vai até <EM4>~mission(Location|Address)</EM4>, avalia a situação, <EM4>neutraliza qualquer inimigo restante</EM4> na área e garante a carga para entrega em <EM4>~mission(Destination|Address)</EM4>. Não se esqueça de levar <EM4>algumas naves de apoio</EM4> com você, caso as coisas fiquem ainda mais complicadas. \n\nNão se esqueça de levar um <EM4>Tractor Beam portátil</EM4> para lidar com a carga. \n\nEste contrato é inegociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações são destinadas ao uso da pessoa ou entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Unknown:</EM4> 2\n<EM4>Rep:</EM4> +600
CleanAir_RecoverCargo_Hard_title=ALLIANCE AID: IMPEDIR ROUBO DE CARGA <EM4>[600 Rep]</EM4>
CleanAir_RecoverCargo_Medium_desc=ECKHART SECURITY, LLC.\nCONTRATOS & DESPACHO\n\nTIPO DE CONTRATO: Recuperação de Carga \nCÓDIGO DE APROVAÇÃO = JJ-12\n\nPROCESSAMENTO IMEDIATO\n\nNada como uma emergência para trazer o pior das pessoas. Esse mofo Molina está matando gente de todos os lados, e o que os canalhas desse sistema decidem fazer? Isso mesmo, estão tentando sequestrar remessas vitais. A Alliance Aid quer garantir que eles não saiam impunes. \n\nVocê vai até <EM4>~mission(Location|Address)</EM4>, avalia a situação, <EM4>neutraliza qualquer inimigo restante</EM4> na área e garante a carga para entrega em <EM4>~mission(Destination|Address)</EM4>. Eu espero que esses ladrões resistam, então fique à vontade para levar reforços, caso queira. \n\nNão se esqueça de levar um <EM4>Tractor Beam portátil</EM4> para lidar com a carga. \n\nEste contrato é inegociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações são destinadas ao uso da pessoa ou entidade designada acima.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Unknown:</EM4> 2\n<EM4>Rep:</EM4> +450
CleanAir_RecoverCargo_Medium_title=ALLIANCE AID: IMPEDIR ROUBO DE CARGA <EM4>[450 Rep]</EM4>
CleanAir_ResourceGathering_Bulk_Filters_desc=POSTAGEM: Coleta de Recursos \nLOCALIZAÇÃO: Sistema Pyro, Sistema Stanton\nEXPERIÊNCIA DE TRABALHO: Mineração, Comércio de Mercadorias\nCONDIÇÕES*: \nA Shubin Interstellar está intensificando os esforços para ajudar a parar a disseminação da Doença do Povo. Nossas instalações estão ajudando na produção dos tão necessários filtros de ventilação para substituir os defeituosos responsáveis pela propagação do perigoso Mofo Molina, mas precisamos da sua ajuda para alcançar essa meta ambiciosa. \n\nNossos estoques atuais de um recurso importante não são suficientes, então precisamos de contratados que possam entregar uma grande carga desse recurso até <EM4>~mission(Destination|Address)</EM4>. \n\nRecursos vinculados a outro contrato não serão aceitos. \n\n*A Shubin Interstellar é uma contratante de igualdade de oportunidades. Ao aceitar este contrato, você assume todos os riscos associados ao trabalho descrito aqui e, em nenhum caso, a Shubin Interstellar poderá ser responsabilizada por danos ocorridos durante a duração do contrato.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 6/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +589 Rep\n<EM4>Tier 2:</EM4> +603 Rep
CleanAir_ResourceGathering_Bulk_Filters_title=ALLIANCE AID: COLETAR RECURSO DE FABRICAÇÃO - GRANDE ESCALA <EM4>[589–603 Rep]</EM4>
CleanAir_ResourceGathering_Bulk_MoldResearch_desc=Para todos os contratados disponíveis,\n\nCientistas da Rayari estão trabalhando 24 horas para ajudar no tratamento do surto de fungos em Levski. Devido a problemas logísticos, nossa equipe em <EM4>~mission(Destination|Address)</EM4> está ficando sem um recurso chave em sua pesquisa. Perder a produção nesse local prejudicaria o esforço da Alliance Aid para curar as pessoas que sofrem com essa terrível doença de forma rápida. \n\nPor isso estamos ansiosos pela ajuda de qualquer um que consiga encontrar e entregar esse suprimento vital até <EM4>~mission(Destination)</EM4>. \n\nPor favor, lembre-se de que os bens contratados são rastreados pelos seus proprietários legais e não podem ser aceitos.\n\nJuntos, podemos tornar o universo melhor para todos.\n\nNarina Lerrem\nGerente Sênior\nOutsourcing de Pesquisa Clínica\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 6/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +589 Rep\n<EM4>Tier 2:</EM4> +609 Rep
CleanAir_ResourceGathering_Bulk_MoldResearch_title=ALLIANCE AID: GRANDE FORNECIMENTO DE RECURSO DE PESQUISA <EM4>[589–609 Rep]</EM4>
CleanAir_ResourceGathering_Small_Filters_desc=POSTAGEM: Coleta de Recursos \nLOCALIZAÇÃO: Sistema Pyro, Sistema Stanton\nEXPERIÊNCIA DE TRABALHO: Mineração, Comércio de Mercadorias\nCONDIÇÕES*: \nComo membro da Alliance Aid, a Shubin Interstellar está dedicada a ajudar na produção de filtros de ventilação de alta qualidade. Esses filtros são essenciais para parar a propagação do Mofo Molina e evitar que mais pessoas sejam atingidas pela Doença do Povo. \n\nAcabamos de receber informações de nossa instalação em <EM4>~mission(Destination|Address)</EM4> de que seu estoque de um recurso vital está ficando baixo. Nosso fornecedor normal não poderá fazer uma reposição por um tempo, então esperamos que você consiga fazer uma corrida de pequeno porte agora para cobrir essa lacuna. \n\nSe você estiver disponível, basta adquirir o recurso da forma que achar melhor e entregá-lo em nossa instalação, e nós o compensaremos bem. \n\nRecursos vinculados a outro contrato não serão aceitos. \n\n*A Shubin Interstellar é uma contratante de igualdade de oportunidades. Ao aceitar este contrato, você assume todos os riscos associados ao trabalho descrito aqui e, em nenhum caso, a Shubin Interstellar poderá ser responsabilizada por danos ocorridos durante a duração do contrato.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +327 Rep\n<EM4>Tier 2:</EM4> +365 Rep
CleanAir_ResourceGathering_Small_Filters_title=ALLIANCE AID: COLETAR RECURSO DE FABRICAÇÃO - PEQUENA ESCALA <EM4>[327–365 Rep]</EM4>
CleanAir_ResourceGathering_Small_MoldResearch_desc=Para todos os contratados disponíveis,\n\nA Rayari precisa da sua ajuda. Como parte do esforço da Alliance Aid, nossos cientistas focaram completamente em ajudar Levski a lidar com o Mofo Molina. Infelizmente, o progresso da equipe foi interrompido devido à falta de um recurso essencial. \n\nObter esse recurso de nossos distribuidores regulares pode levar semanas. Considerando o número de pessoas que precisam desesperadamente de ajuda, interromper a pesquisa por tanto tempo prejudicaria seriamente nosso esforço. Estamos procurando indivíduos motivados dispostos a procurar e entregar uma carga de pequeno porte desse recurso para entrega em <EM4>~mission(Destination|Address)</EM4>. \n\nPor favor, lembre-se de que os bens contratados são rastreados pelos seus proprietários legais e não podem ser aceitos. \n\nJuntos, podemos tornar o universo melhor para todos.\n\nNarina Lerrem\nGerente Sênior\nOutsourcing de Pesquisa Clínica\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +303 Rep\n<EM4>Tier 2:</EM4> +309 Rep
CleanAir_ResourceGathering_Small_MoldResearch_desc_harvestable=Para todos os contratados disponíveis,\n\nA Rayari precisa da sua ajuda. Como parte do esforço da Alliance Aid, nossos cientistas focaram completamente em ajudar Levski a lidar com o Mofo Molina. Infelizmente, o progresso da equipe foi interrompido devido à falta de um recurso essencial. \n\nObter esse recurso de nossos distribuidores regulares pode levar semanas. Considerando o número de pessoas que precisam desesperadamente de ajuda, interromper a pesquisa por tanto tempo prejudicaria seriamente nosso esforço. Estamos procurando indivíduos motivados dispostos a procurar e entregar uma carga de pequeno porte desse recurso para entrega em <EM4>~mission(Destination|Address)</EM4>. \n\nSe precisar de ajuda para localizar esse recurso, sugiro verificar o <EM4>'Guia do Caçador'</EM4> no seu mobiGlas Journal para mais informações.\n\nPor favor, lembre-se de que os bens contratados são rastreados pelos seus proprietários legais e não podem ser aceitos. \n\nJuntos, podemos tornar o universo melhor para todos.\n\nNarina Lerrem\nGerente Sênior\nOutsourcing de Pesquisa Clínica\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Rep:</EM4> +255
CleanAir_ResourceGathering_Small_MoldResearch_title=ALLIANCE AID: PEQUENO FORNECIMENTO DE RECURSO DE PESQUISA <EM4>[255–309 Rep]</EM4>
CleanAir_ResourceGathering_Supply_Filters_desc=POSTAGEM: Coleta de Recursos \nLOCALIZAÇÃO: Sistema Pyro, Sistema Stanton\nEXPERIÊNCIA DE TRABALHO: Mineração, Comércio de Mercadorias\nCONDIÇÕES*: \nA Shubin Interstellar está redirecionando uma parte considerável do nosso foco para ajudar na produção de filtros de ventilação para ajudar a parar a propagação do Mofo Molina. Embora tenhamos a capacidade e o desejo de ajudar, nosso acesso a um recurso está prejudicando nossos esforços. \n\nEstamos procurando indivíduos motivados dispostos a procurar e entregar um fornecimento de médio porte desse recurso para nossa instalação em <EM4>~mission(Destination|Address)</EM4> para que os esforços de alívio possam continuar a todo vapor. \n\nRecursos vinculados a outro contrato não serão aceitos. \n\n*A Shubin Interstellar é uma contratante de igualdade de oportunidades. Ao aceitar este contrato, você assume todos os riscos associados ao trabalho descrito aqui e, em nenhum caso, a Shubin Interstellar poderá ser responsabilizada por danos ocorridos durante a duração do contrato.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 5/7 | Risk 3/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +449 Rep\n<EM4>Tier 2:</EM4> +463 Rep
CleanAir_ResourceGathering_Supply_Filters_title=ALLIANCE AID: COLETAR RECURSO DE FABRICAÇÃO - MÉDIO PORTE <EM4>[449–463 Rep]</EM4>
CleanAir_ResourceGathering_Supply_MoldResearch_desc=Para todos os contratados disponíveis,\n\nBoa notícia! A Rayari está trabalhando arduamente para ajudar a curar a Doença do Povo. Infelizmente, tem sido extremamente difícil obter um recurso chave por meio de nossas fontes normais. Para nos ajudar a expandir nosso acesso a ele, estaremos oferecendo uma excelente taxa para aqueles que ajudarem a encontrar e entregar esse recurso para nossos cientistas em <EM4>~mission(Destination|Address)</EM4>. \n\nPor favor, lembre-se de que os bens contratados são rastreados pelos seus proprietários legais e não podem ser aceitos. \n\nJuntos, podemos tornar o universo melhor para todos.\n\nNarina Lerrem\nGerente Sênior\nOutsourcing de Pesquisa Clínica\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Tier 1:</EM4> +446 Rep\n<EM4>Tier 2:</EM4> +463 Rep
CleanAir_ResourceGathering_Supply_MoldResearch_title=ALLIANCE AID: FORNECIMENTO MÉDIO DE RECURSO DE PESQUISA <EM4>[446–463 Rep]</EM4>
CleanAir_Transport-Milestone1_desc=Beleza, essa vai ser um pouco diferente. Veja, com tudo o que está acontecendo com o Alliance Aid, tivemos um erro com nossos contratos e uma remessa importante acabou sendo esquecida. Como vidas estão em jogo, e você já fez tanto para ajudar a Divisão de Transporte, eu estava meio que torcendo para que você pudesse dar uma força e fazer uma corrida dupla para nós?\n\nTemos uma carga de médio porte de <EM4>tratamento de Mofo Molina em Microtech</EM4> e uma remessa de <EM4>filtros de ventilação em Hurston</EM4> esperando para ser retirada. Você vai precisar fazer as duas paradas, carregar tudo e levar para <EM4>~mission(Destination|Address)</EM4>. \n\nPara transportar a carga, sua nave deve ser grande o suficiente para carregar containers de carga até <EM4>~mission(MissionMaxSCUSize)</EM4> de tamanho. \n\nAh, e eu daria uma conferida para garantir que você tem seu <EM4>feixe de trator portátil</EM4> com você antes de sair. Vai ser um baita transtorno se você esquecer de levar um! \n\nÉ realmente incrível da sua parte ajudar assim,\n\nElla Tieno \nCoordenadora Júnior de Logística \nCovalex Shipping \n'Qualquer coisa que você precisar, onde você precisar.'\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Unique, Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x6\n<EM4>Unknown:</EM4> 1\n<EM4>Rep:</EM4> +1,166
CleanAir_Transport-Milestone1_title=ALLIANCE AID: TRANSPORTE INTERESTELAR DUPLO (MÉDICO / FILTROS) <EM4>[1,166 Rep]</EM4>
Covalex_Delivery_Nyx_Medium_Desc_001=Oi,\n\nEsse aqui é bem direto ao ponto - Temos um monte de carga que precisa ser transportada através de Nyx e precisamos de um contratado competente com um <EM4>Tractor Beam portátil</EM4> e uma nave que consiga transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>.\n\nOs detalhes estão anexados. Boa sorte por aí!\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nCoordenadora de Logística Jr.\nCovalex Shipping\n'Tudo o que você precisa, onde você precisar.'\n\n\n\n\n\n\n\nCovalex Shipping é uma corporação de responsabilidade limitada. Para incentivar entregas dentro do prazo e evitar fraudes em transportes de carga, a Covalex Shipping estabelecerá um limite de tempo para entrega e, após o vencimento desse prazo, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será proporcional à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Neutral:</EM4> +100 Rep
Covalex_Delivery_Nyx_Medium_Title_001=ENTREGA COVALEX DIST. MÉDIA NYX <EM4>[100 Rep]</EM4>
Covalex_Delivery_Stanton_Hard_Desc_001=Oi,\n\nPrecisamos de um contratado confiável para coletar alguns pacotes para nós e entregá-los no destino.\n\nEssa rota é mais longa, então certifique-se de ter combustível suficiente e não esqueça de levar um <EM4>Tractor Beam portátil</EM4>.\n\nE não sei que nave você estava pensando em usar, mas vai precisar de uma que consiga transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>.\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nCoordenadora de Logística Jr.\nCovalex Shipping\n'Tudo o que você precisa, onde você precisar.'\n\n\n\n\n\n\n\nCovalex Shipping é uma corporação de responsabilidade limitada. Para incentivar entregas dentro do prazo e evitar fraudes em transportes de carga, a Covalex Shipping estabelecerá um limite de tempo para entrega e, após o vencimento desse prazo, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será proporcional à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +100 Rep
Covalex_Delivery_Stanton_Hard_Title_001=ENTREGA COVALEX LONGA DISTÂNCIA STANTON <EM4>[100 Rep]</EM4>
Covalex_Delivery_Stanton_Medium_Desc_001=Oi,\n\nEstamos procurando um contratado com uma nave que consiga transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4> para fazer uma entrega para nós pelo sistema Stanton.\n\nEssa não é uma rota particularmente longa, mas você vai precisar passar por alguns locais diferentes. Para garantir que tudo ocorra sem problemas, leve combustível suficiente e um <EM4>Tractor Beam portátil</EM4> para agilizar a movimentação das caixas.\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nCoordenadora de Logística Jr.\nCovalex Shipping\n'Tudo o que você precisa, onde você precisar.'\n\n\n\n\n\n\n\nCovalex Shipping é uma corporação de responsabilidade limitada. Para incentivar entregas dentro do prazo e evitar fraudes em transportes de carga, a Covalex Shipping estabelecerá um limite de tempo para entrega e, após o vencimento desse prazo, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será proporcional à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Neutral:</EM4> +100 Rep
Covalex_Delivery_Stanton_Medium_Title_001=ENTREGA COVALEX DIST. MÉDIA STANTON <EM4>[100 Rep]</EM4>
Covalex_Delivery_Stanton_Super_Desc_001=Tenho uma missão especial - Um grande volume de pacotes pronto para entrega pelo sistema inteiro. É mais do que o normal, então estou chamando apenas meus melhores contratados para essa.\n\nClaro que parte do pagamento vai cobrir seu combustível, porque essa entrega vai bem longe. Você também vai precisar do equipamento de sempre, como um <EM4>Tractor Beam portátil</EM4> e uma nave com espaço para armazenar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>.\n\nBoa sorte. Estou contando com você.\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nCoordenadora de Logística Jr.\nCovalex Shipping\n'Tudo o que você precisa, onde você precisar.'\n\n\n\n\n\n\n\nCovalex Shipping é uma corporação de responsabilidade limitada. Para incentivar entregas dentro do prazo e evitar fraudes em transportes de carga, a Covalex Shipping estabelecerá um limite de tempo para entrega e, após o vencimento desse prazo, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será proporcional à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Sr. Contractor:</EM4> +200 Rep
Covalex_Delivery_Stanton_Super_Title_001=ENTREGA ESPECIAL COVALEX SISTEMA STANTON <EM4>[200 Rep]</EM4>
Covalex_Delivery_Stanton_VeryHard_Desc_001=Oi,\n\nA Covalex precisa de alguém confiável para coletar alguns pacotes e levá-los ao destino.\n\nEssa entrega está classificada como longa distância, então abasteça bem a nave com combustível e suprimentos. E não esqueça de levar um <EM4>Tractor Beam portátil</EM4>.\n\nQuanto à nave, você também vai precisar de algo que consiga transportar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>.\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nCoordenadora de Logística Jr.\nCovalex Shipping\n'Tudo o que você precisa, onde você precisar.'\n\n\n\n\n\n\n\nCovalex Shipping é uma corporação de responsabilidade limitada. Para incentivar entregas dentro do prazo e evitar fraudes em transportes de carga, a Covalex Shipping estabelecerá um limite de tempo para entrega e, após o vencimento desse prazo, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será proporcional à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Contractor:</EM4> +150 Rep
Covalex_Delivery_Stanton_VeryHard_Title_001=ENTREGA COVALEX DISTÂNCIA MUITO LONGA STANTON <EM4>[150 Rep]</EM4>
Covalex_HaulCargo_AToB_Intro_desc=Ganhando prêmios como “Top 10 Empresas de Transporte da Imperial Finances” e “Transporte Mais Confiável de 2945 pela Delivery Digest”, a Covalex está mais ocupada do que nunca. E isso significa mais carga indo para mais lugares. É aí que você entra.  \n\nA Covalex está procurando pilotos confiáveis e trabalhadores para se juntar à nossa família em expansão. Você tem acesso a uma nave que pode carregar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>? Consegue passar por uma checagem de antecedentes da Advocacy se for necessário? Então, um universo de oportunidades está esperando por você. \n\nBasta completar um “Teste de Avaliação” pegando uma carga de <EM4>~mission(Item)</EM4> em um elevador de carga em <EM4>~mission(Location|Address)</EM4> e entregando com sucesso em um elevador de carga em <EM4>~mission(Destination|Address)</EM4>.\n\nApós a conclusão satisfatória, você estará apto a fazer parte da vasta rede de especialistas independentes em transporte da Covalex Shipping*.\n\nAh, e recomendamos fortemente que os contratados levem um <EM4>Tractor Beam portátil</EM4> com eles.   \n\n\nCovalex Shipping  \n“Tudo que você precisa, onde quer que precise.”\n\n\n\n\n\n\n\n*A Covalex Shipping é uma corporação de responsabilidade limitada. Para incentivar entregas pontuais e evitar fraude em transportes de carga, a Covalex estabelecerá um limite de tempo para entrega e, ao expirar, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será ajustado proporcionalmente à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +50
Covalex_HaulCargo_AToB_Intro_title=OPORTUNIDADE PARA TRANSPORTADOR INDEPENDENTE <EM4>[100 Rep]</EM4>
Covalex_HaulCargo_AToB_Rehire_desc=E aí,\n\nTenho boas notícias pra você. A Covalex acabou de finalizar uma avaliação do nosso grupo de contratados e decidiu reconsiderar seu status como transportador de carga. Pra se requalificar, tudo o que precisa fazer é completar com sucesso a seguinte entrega.\n\nPegue <EM4>~mission(Item)</EM4> em um elevador de carga em <EM4>~mission(Location|Address)</EM4> e entregue em um elevador de carga em <EM4>~mission(Destination|Address)</EM4>. Pra concluir esse transporte de forma rápida e eficiente, você vai precisar de uma nave que possa carregar <EM4>~mission(MissionMaxSCUSize) contêineres de carga</EM4>.\n\nEspero que tudo corra tranquilo pra podermos te dar boas-vindas de volta ao time.\n\nAh, e recomendamos fortemente que os contratados levem um <EM4>Tractor Beam portátil</EM4> com eles.   \n\nCovalex Shipping  \n“Tudo que você precisa, onde quer que precise.”\n\n\n\n\n\n\n\nA Covalex Shipping é uma corporação de responsabilidade limitada. Para incentivar entregas pontuais e evitar fraude em transportes de carga, a Covalex estabelecerá um limite de tempo para entrega e, ao expirar, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será ajustado proporcionalmente à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +50
Covalex_HaulCargo_AToB_Rehire_title=REAVALIAÇÃO PARA TRANPORTADOR COVALEX <EM4>[50 Rep]</EM4>
Covalex_HaulCargo_AToB_Scrap=Olá,\n\nTem umas sucatas esperando em um elevador de carga em <EM4>~mission(Location|Address)</EM4> que precisam ir pra um elevador de carga em <EM4>~mission(Destination|Address)</EM4> pra processamento. Confirmei que os contêineres não vão ser maiores que <EM4>~mission(MissionMaxSCUSize)</EM4>. \n\nMinha mãe teria adorado esse frete. Ela é daquelas que acha que todo ferro-velho tem tesouros escondidos. Nem te conto quantas horas eu passei entediado seguindo ela por um desses. Se isso é sua praia, aqui tá sua chance de ganhar uns créditos enquanto faz isso.\n\nAh, e recomendamos fortemente que os contratados levem um <EM4>Tractor Beam portátil</EM4> com eles.   \n \n~mission(Contractor|SignOff)\n\nChase Hewitt\nAssistente de Logística Jr.\nCovalex Shipping  \n“Tudo que você precisa, onde quer que precise.”\n\n\n\n\n\n\n\nA Covalex Shipping é uma corporação de responsabilidade limitada. Para incentivar entregas pontuais e evitar fraude em transportes de carga, a Covalex estabelecerá um limite de tempo para entrega e, ao expirar, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será ajustado proporcionalmente à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 3/7\n<EM4>Rep:</EM4> +500
Covalex_HaulCargo_AToB_Stanton_Interstellar=E aí,\n\nTá a fim de fazer o trecho de Stanton de uma rota interestelar? \n\nTem uma carga de <EM4>~mission(Item)</EM4> esperando em contêineres de <EM4>~mission(MissionMaxSCUSize)</EM4> ou menores pra ser coletada de um elevador de carga em <EM4>~mission(Location|Address)</EM4> e entregue em um elevador de carga em <EM4>~mission(Destination|Address)</EM4>. Não precisa levar mais longe que isso. Já tem alguém preparado pra levar o resto da rota até o destino final. \n\nAh, e recomendamos fortemente que os contratados levem um <EM4>Tractor Beam portátil</EM4> com eles.   \n\n~mission(Contractor|SignOff)\n\nChase Hewitt\nAssistente de Logística Jr.\nCovalex Shipping  \n“Tudo que você precisa, onde quer que precise.”\n\n\n\n\n\n\n\nA Covalex Shipping é uma corporação de responsabilidade limitada. Para incentivar entregas pontuais e evitar fraude em transportes de carga, a Covalex estabelecerá um limite de tempo para entrega e, ao expirar, qualquer carga não entregue será considerada roubada e tratada como tal. O pagamento total será ajustado proporcionalmente à porcentagem de carga entregue com sucesso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> 2/7\n<EM4>Rep:</EM4> +2,000
