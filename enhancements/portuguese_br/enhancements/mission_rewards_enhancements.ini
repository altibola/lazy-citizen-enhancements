DeadSaints_HaulCargo_AToB_desc_Cryopods_Danger=Peguei uma missão interessante. Alguns caras que caíram em contratos de vida/trabalho com a Hurston Dynamics querem se afastar de Lorville o máximo possível. Eles fecharam um acordo com um transporte de pessoas e acabaram sendo congelados. Agora, só precisam de alguém para buscá-los e dar uma carona. \n\nSe você topar um contrabando de picolé, vai encontrar ~mission(total) criopods em <EM4>~mission(Location|Address)</EM4> que precisam ser levados até <EM4>~mission(Destination|Address)</EM4>. Certifique-se de ter espaço no seu compartimento de carga para containers de tamanho <EM4>~mission(MissionMaxSCUSize)</EM4>. Se você usar um <EM4>Tractor Beam portátil</EM4>, deve conseguir carregar tudo antes que a segurança de Hurston perceba. \n\nA HD não gosta de ninguém fugindo dos contratos, então fique esperto. Eles atiram para matar. \n\nSe você conseguir, vai sair com um bom pagamento no final.\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x6\n<EM4>Rookie:</EM4> +100 Rep
DeadSaints_HaulCargo_AToB_desc_ToGrimHEX_Danger=Se está buscando grana, os Saints precisam de alguém com experiência em transporte para fazer uma entrega de suprimentos de <EM4>~mission(Location|Address)</EM4> até <EM4>~mission(Destination|Address)</EM4>. \n\nVocê vai precisar de uma nave que aguente containers de carga tamanho <EM4>~mission(MissionMaxSCUSize)</EM4> e de um <EM4>Tractor Beam portátil</EM4> para mover as caixas. \n\nNão abra as caixas, mas só para você saber, a maioria das coisas é legal, mas nem tudo. Evite cruzar com alguém que possa transformar isso num problema para você. Entendeu?\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x1\n<EM4>Rookie:</EM4> +100 Rep
DeadSaints_HaulCargo_AToB_intro_desc=Me chama de Twitch. Eu comando os Dead Saints.\n\nDuvido que seja a primeira vez que ouve falar da gente, mas caso seja, nós cuidamos de muitos tipos de serviço — um deles é transporte de cargas que exigem discrição.\n\nConsegui suas informações com um contato. Disseram que você tem a nave que a gente curte pra esse tipo de trampo, e isso é perfeito, porque estamos precisando de um piloto.\n\nA proposta é simples: estamos pagando bem pra quem puder transportar uma carga especial pra gente. Seu porão precisa ter espaço pra <EM4>~mission(MissionMaxSCUSize) contêineres</EM4>, e você vai precisar de um <EM4>Tractor Beam portátil</EM4> pra carregar e descarregar. Só tem que levar tudo de <EM4>~mission(Location|Address)</EM4> pra <EM4>~mission(Destination|Address)</EM4> sem chamar atenção da segurança.\n\nSe fizer o trabalho direito, os Saints terão mais contratos pra você no futuro.\n\n-Twitch\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x38\n<EM4>Trainee:</EM4> +50 Rep\n<EM4>Trainee:</EM4> +100 Rep
DeadSaints_HaulCargo_AToB_intro_title=DEAD SAINTS - TRANSPORTE DE CARGA DE TESTE <EM4>[50–100 Rep]</EM4>
