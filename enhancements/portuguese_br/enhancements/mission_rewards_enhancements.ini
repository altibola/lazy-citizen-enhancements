InterSec_ResourceGathering_Cryopods_Desc=ESPECIFICAÇÕES DA MISSÃO\n\nÁrea de Operação: Sistema Nyx\nForças Inimigas: Fora da Lei armados e presentes\nEspecificações de Equipamento: <EM4>Nave Cargueira</EM4>, Armas Pessoais, <EM4>Tractor Beam Pesado</EM4>\nBriefing: \nNosso último relatório de inteligência indica que o grupo Shattered Blade reabasteceu seu estoque de cadáveres Vanduul e em breve os transferirá da antiga <EM4>estação QV Logistics</EM4> para um comprador interessado. A UEE não pode permitir outro incidente como o que aconteceu com o ASD, então eles nos pediram para <EM4>recuperar os cryopods</EM4> e entregá-los no <EM4>elevador de carga em ~mission(Destination|Address)</EM4>.\n\nEmbora os membros do Shattered Blade presentes no local possam oferecer resistência, eles não são o foco da sua missão. Lide com eles conforme necessário e pegue os cryopods.\n\nRespeitosamente,\n\nDeacon Tobin\nGerente de Operações\nInterSec Defense Solutions\n\nEsta comunicação contém informações confidenciais, destinadas exclusivamente ao destinatário. Por favor, ignore se recebida por engano e notifique o remetente. Todas as operações são realizadas por conta e risco do contratante, devendo seguir as leis da UEE e do sistema aplicável.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Pulse Laser Pistol\n- [S1-A] Pulse Laser Pistol Battery (60 Cap)\n- [S1-A] Testudo Arms Earthshake\n- [S1-A] Testudo Core Earthshake\n- [S1-A] Testudo Helmet Earthshake\n- [S1-A] Testudo Legs Earthshake\n- [S2-A] Testudo Backpack Earthshake\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 5/7 | Knowledge 6/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
