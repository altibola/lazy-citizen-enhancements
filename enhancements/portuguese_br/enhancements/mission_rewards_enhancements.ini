Adagio_Industrial_Salvage_Universal_Intro_Desc_001=Adagio Holdings\nUm Orgulhoso Empregador de Oportunidades Iguais\n\n> Sobre nós <\nComo a principal compradora e distribuidora de direitos de sucateamento, a Adagio Holdings agora busca expandir para a aquisição e distribuição de materiais recuperáveis tanto para pequenas quanto para grandes empresas.\n\n> Sobre o trabalho <\nComo parte dessa iniciativa, precisamos de contratados atentos e ligeiros, capazes de identificar materiais aproveitáveis, desmontá-los com eficiência e nos entregar o Compósito de Material Reciclado (RMC) e os componentes recuperados.\n\nEste contrato introdutório vai exigir que você se dirija até <EM4>~mission(Location|Address)</EM4> e desmonte uma nave abandonada aprovada para sucateamento.\n\nDepois de juntar o RMC, você vai entregar tudo no elevador de carga localizado em <EM4>~mission(Destination|Address)</EM4>.\n\n> Requisitos <\n     - Qualquer classe/tamanho de nave de sucateamento\n\nPara dicas sobre sucateamento, consulte <EM4>Guia do Sucateiro para Coleta de Materiais</EM4> no seu diário do mobiGlas.\n\n> Aviso Legal <\nOs contratados são responsáveis por garantir que estão coletando materiais de veículos considerados sucateamento legítimo conforme as leis vigentes da UEE. A Adagio Holdings não se responsabiliza por quaisquer crimes ou contravenções cometidos pelos contratados e não oferecerá compensação ou reparação a quaisquer pessoas afetadas por essas ações.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Abrade Scraper Module\n- [S1-A] Cinch Scraper Module\n- [S1-A] Trawler Scraper Module\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Friendlies:</EM4> Salvageable Ships x1\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
