Shubin_Rockcracker_CollectLenses_Desc_001=CONTRATO: Ordem de Fabricação\nLOCALIZAÇÃO: Nyx\n\nDETALHES:\nSe por acaso você tiver algum outro trabalho que o leve até uma das Estações QV Breaker no Cinturão Keeger, a Shubin Interstellar teria grande interesse em contratá-lo para obter um suprimento de lentes de foco para laser de mineração, que são difíceis de conseguir.\n\n<EM4>TERMOS*:</EM4>\nEmbora algumas lentes de foco possam ser recuperadas do armazenamento da QV Breaker Station, provavelmente você precisará fabricá-las usando <EM4>cristais de Sadaryx</EM4> e o fabricador de lentes disponível no local. Embora o minério seja raro, essas estações Breaker normalmente possuem veios de Sadaryx que podem ser minerados diretamente com um <EM4>Multi-Tool com Acessório de Mineração</EM4>.\n\nEntregue as lentes obtidas no elevador de carga localizado em <EM4>~mission(Destination|Address)</EM4> para processamento.\n\nContratados relataram que essas estações podem ter sido infiltradas por fora-da-lei, portanto recomenda-se cautela.\n\n*Ao aceitar este contrato, você assume todos e quaisquer riscos associados ao trabalho descrito aqui e, de forma alguma, a Shubin Interstellar poderá ser responsabilizada por quaisquer danos ocorridos durante a vigência do contrato.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +100 Rep
Shubin_Rockcracker_CollectLenses_Title_001=Ordem de Suprimento: Lentes de Foco Sadaryx <EM4>[100 Rep]</EM4>
SingleIdrisFight_Description=Derrube Idris por meios legais. (WIP)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
StealEvidence_desc=~mission(Contractor|StealEvidenceDescription)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +1,000
StealEvidence_title=~mission(Contractor|StealEvidenceTitle) <EM4>[1,000 Rep]</EM4>
TarPits_ShipStrip_desc_001=Temos um trabalho de sucateamento específico onde precisaríamos de algumas mãos extras. \n\nPrecisamos que você encontre uma ~mission(ship) que foi destruída perto de ~mission(Location). A segurança já está procurando por ele e, se o encontrarem, com certeza irão identificá-lo e teremos muitos problemas.\n\nPortanto, queremos que você o desfaça antes que alguém o veja. Rasgue todo o casco para que ninguém saiba a quem ele pertence, não deixe nenhuma mancha de tinta para trás e, claro, mantenha a boca fechada sobre tudo o que vê. Nós iremos compensá-lo e você poderá ficar com tudo o que descartar. Mas se a segurança encontrar a Nave antes de você terminar, estaremos todos ferrados e você não será pago, então não nos decepcione.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Friendlies:</EM4> Salvageable Ships x1
Tarpits_assassinate_dc_desc_001=Não tenho tempo a perder, então vou direto ao ponto - ~mission(TargetName) precisa estar morto e quero que você faça isso. Você pode encontrá-los perto de ~mission(Location) em ~mission(Location|Address). Eles não estarão sozinhos, mas não se distraiam com aquelas outras pilhas inúteis. Você só é pago por realizar ~mission(TargetName|Last).\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x18, Juggernauts x1, Snipers x2, Soldiers x9, Technicians x3
Tarpits_destroyitem_dc_desc_001=Quero enviar uma mensagem forte para a tripulação em ~mission(Location|Address) e saber a maneira perfeita de fazer isso: danos à propriedade.\n\nTudo o que você precisa fazer é avançar e destruir algumas coisas aqui e ali, e realmente levar para casa uma lição importante sobre como respeitar os seus superiores. \n\nFaça isso por mim e eu me sentirei muito feliz. E generoso.\n\nInteressado?\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Tarpits_eliminateboss_dc_desc_001=Já faz um tempo que estamos pensando em realizar ~mission(TargetName), mas nunca conseguimos encontrar o momento certo. Chega de esperar. Você criará o momento certo para nós.\n\nVá para ~mission(Location|Address) e elimine um bando de vilões correndo pela ~mission(Location). Mate um número suficiente desses perdedores, e ~mission(TargetName|Last) não terá escolha a não ser enfrentá-lo. É quando você os tira e ganha um belo e gordo dia de pagamento. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> CQC x20, Juggernauts x1, Snipers x2, Soldiers x7
Tarpits_theft_mines_dc_desc_001=Eu esperava que você estivesse interessado em fazer um pequeno trabalho para nós. Tenho alguns produtos em ~mission(Location|Address) que são perfeitos para serem levados. O único problema é – e é um grande problema – que os bastardos que administram o lugar têm toda a área equipada com minas de proximidade. \n\nVocê precisará encontrar uma maneira de acionar o lote ou, se não puder ser incomodado, alguma maneira de acionar o lote. De qualquer forma, tente não se explodir. Então você só precisa pegar as coisas e levá-las para ~mission(Destination|Address).\n\nNão será fácil fazer isso, mas se você fizer isso, prometo que farei valer a pena. \n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
Test_Description=Descrição da missão (WIP)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
Test_Title_Revenge_01=VINGANÇA 01 (wip) <EM4>[500 Rep]</EM4>
TheCollector_Conversion_Favors_Desc=Talvez o Wikelo não tenha algo que você queira fazer (isso é estranho, mas tudo bem). O velho souli daria <EM4>favores</EM4>, uma ótima maneira de provar que você trabalha para mim. Colete o suficiente e troque quando eu tiver algo que você queira.\n\nTraga coisas para <EM4>~mission(destination|ListAll)</EM4> e trocaremos por favores.\n\nTchau.\n\n<EM3>ITEM REWARDS</EM3>\n- Wikelo Favor\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Conversion_Favors_Desc_1=O Wikelo tem outra maneira de obter <EM4>favores</EM4> se você estiver interessado. \n\nSua souli mercenária tem <EM4>scrip</EM4> de metal, usado como favores, mas feito de um metal muito interessante que o Wikelo precisa para um novo projeto.\n\nSe você trouxer scrips para <EM4>~mission(destination|ListAll)</EM4>, trocará por favores.\n\nTchau.\n\n<EM3>ITEM REWARDS</EM3>\n- Wikelo Favor\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Conversion_Favors_Desc_2=Se você quiser outra maneira de obter <EM4>favores</EM4> do Wikelo, tenho algo para você. O Wikelo precisa de <EM4>scrip</EM4> fornecido pelo grupo do Conselho. Wikelo não faz parte da souli de ladrões, mas tem negócios de tempos em tempos.\n\nSe você trouxer scrips para <EM4>~mission(destination|ListAll)</EM4>, trocará por favores.\n\nTchau.\n\n<EM3>ITEM REWARDS</EM3>\n- Wikelo Favor\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Conversion_Favors_Desc_3=Tenho uma nova maneira de conseguir <EM4>favores</EM4> do Wikelo. Ouvi muito sobre coisas estranhas em tempestades de radiação. São muitas peças interessantes que o Wikelo pode usar. \n\nSe você levar as peças para <EM4>~mission(destination|ListAll)</EM4>, trocarei por favores.\n\nTchau.\n\n<EM3>ITEM REWARDS</EM3>\n- Wikelo Favor\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Conversion_Favors_Title=TRANSFORMAR AS COISAS EM FAVORES
TheCollector_Conversion_Favors_Title_1=TROCA MERC SCRIP POR FAVORES?
TheCollector_Conversion_Favors_Title_2=TROCA COUNCIL SCRIP POR FAVORES?
TheCollector_Conversion_Favors_Title_3=TROCA PARTES DE MINHOCAS POR FAVORES?
TheCollector_Conversion_SpecialFavors_Desc=Wikelo precisa de grandes quantidades de <EM4>quantainium</EM4> e está disposto a dar um belo Polaris em troca, mas também sabe que muitos humanos não têm muito espaço, então você negocia aos poucos. Wikelo lhe dará <EM4>Polaris bits</EM4> se quiser trocar quantainium. Funciona como favores. Ajude Wikelo a lembrar quanto você entregou.\n\nTraga quantainium para <EM4>~mission(destination|ListAll)</EM4> e ele trocará por bits.\n\nTchau.\n\n<EM3>ITEM REWARDS</EM3>\n- Polaris Bit\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Conversion_SpecialFavors_Title=QUER A POLARIS? PRECISO DE ALGO ESPECIAL.
TheCollector_Intro_Desc=Olá, eu sou o Wikelo. Sou uma adição recente ao seu sistema e estou muito empolgado por estar aqui. Passei muito tempo aqui na UEE e fico feliz em passar ainda mais.\n\nTenho um lugar onde faço coisas a partir de outras coisas.\n\nPreciso de alguém pra me trazer itens úteis pra terminar um projeto em que estou trabalhando. Você tem a lista. Pegue, por favor. Estou em <EM4>~mission(destination|ListAll)</EM4>.\n\nVou te dar um item pela ajuda.\n\nAh, e quando terminar, se quiser fazer mais. Tenho muitas coisas que posso montar na minha lojinha humilde. Vem, olha o cartaz bonito e decide o que quer que eu faça.\n\nTchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Rep:</EM4> +10
TheCollector_Intro_Title=WIKELO CHEGA AO SISTEMA <EM4>[10 Rep]</EM4>
TheCollector_Lunch_Desc=Vocês, humanos, mantêm o Wikelo muito ocupado. Trabalho mais do que quando eu estava no antigo souli. Mas Wikelo está com muita fome agora e não consegue comer.\n\nPor favor, ajuda. Traga comida e bebida para o Wikelo Emporium em <EM4>~mission(destination|ListAll)</EM4>.\n\nAgradeço muito sua ajuda. Darei algo em troca.\n\nTchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Lunch_Title=MUITA FOME
TheCollector_Menu_Desc_PolarisShip=Recentemente, o Wikelo obteve muitos projetos em um comércio com humanos que não são muito inteligentes. Agora é possível fazer uma nave muito grande. \n\nNão é barato e precisa de muitas peças, mas será feito. Se você quiser, vá rápido, isso custa muito para o Wikelo, então não será possível fazer por muito tempo, mas eu gosto do novo sistema humano, então quero agradecer a todos por serem bem-vindos.\n\nTraga para <EM4>~mission(destination|ListAll)</EM4> se quiser.\n\nTchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +1,000
TheCollector_Menu_Title_PolarisShip=AGORA FAÇA A POLARIS. OFERTA DE CURTO PRAZO. <EM4>[1,000 Rep]</EM4>
TheCollector_Mod_ATLS_Geo_Grad1_Desc=Wikelo viaja para um planeta humano e acha muito frio, mas muito bonito. Isso me lembra isso.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Mod_ATLS_Geo_Grad1_Name=ATLS Snowland Color <EM4>[20 Rep]</EM4>
TheCollector_Mod_ATLS_Geo_Grad2_Desc=Muitos locais de trabalho humanos têm a cor laranja. Deve significar trabalho para você. Este traje funciona. Faz sentido.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Mod_ATLS_Geo_Grad2_Name=ATLS Orange Line <EM4>[20 Rep]</EM4>
TheCollector_Mod_ATLS_Geo_Grad3_Desc=Wikelo dá cores vermelho escuro e verde para fazer com que as pernas da ATLS pareçam estar esfriando do calor. Muito bonito.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Mod_ATLS_Geo_Grad3_Name=ATLS Cool Metal Color <EM4>[20 Rep]</EM4>
TheCollector_Recipes_Desc_ApolloSkin=Apollo é uma nave muito boa. Seria muito melhor se fosse vermelha. Wikelo torna todas as coisas possíveis. Você troca pelo que eu quero e temos um acordo.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Recipes_Desc_AtlsJump=Encontrei uma peça bem divertida para adicionar ao grande traje humano que te deixa pular bem alto. Agora você pode atirar e pular. Empolgante.\n\nSe quiser, traga para mim esses itens em <EM4>~mission(destination|ListAll)</EM4>. Vou fazer.\n\nWikelo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Recipes_Desc_AtlsPew=Olá. Sei que vocês, humanos, gostam de trajes metálicos estranhos. Que tal um traje metálico com ikti? Desculpe, ikti é uma palavra Banu, vocês chamam isso de “arma”. \n\nSe quiser, traga as coisas que eu disse e eu farei para vocês. A arma vai atirar. Causará muitos danos. \n\nTchau.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +20
TheCollector_Recipes_Desc_Battle=Me traga armaduras e outras coisas e eu te dou uma armadura de teste especial. Primeira versão. Bem especial. Traga e eu te dou. Tchau.\n\n<EM3>ITEM REWARDS</EM3>\n- Palatino Helmet Mark I\n- Palatino Arms Mark I\n- Palatino Legs Mark I\n- Palatino Core Mark I\n- Palatino Backpack Mark I\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +25
TheCollector_Recipes_Desc_BigBooma=Wikelo encontra uma arma muito estranha, mas funcional, enquanto vagava pelos seus sistemas. Muito simples, mas muito eficaz. Se você me trouxer coisas, eu mostro o que faço com isso.\n\nMuito divertido.\n\n<EM3>ITEM REWARDS</EM3>\n- Boomtube "Clanguard" Rocket Launcher\n- Boomtube Rocket\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_GMNI_Shotgun=Atirar pode ser algo bagunçado. Sangue humano vermelho por todo lado. Não é problema com esta shotgun. Os respingos se misturam perfeitamente! Eu dou para você se me der tudo que eu quero na lista. Boa troca.\n\n<EM3>ITEM REWARDS</EM3>\n- R97 "Crimson Camo" Shotgun\n- R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_HeavyUtil=Você vai precisar de um traje utilitário. Bom para o trabalho. Se quiser, o Wikelo pode deixar mais brilhante. Vai ficar bom. Veja o que o Wikelo precisa e traga.\n\n<EM3>ITEM REWARDS</EM3>\n- Corbel Helmet Crush\n- Corbel Core Crush\n- Corbel Arms Crush\n- Corbel Legs Crush\n- Novikov Backpack Crush\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain
TheCollector_Recipes_Desc_Hush=Você quer ficar escondido. Wikelo entende. Não pergunta o porquê. Mas o que fazer quando estiver na neve? Wikelo tem um traje para isso.\n\nBem-vindo.\n\n<EM3>ITEM REWARDS</EM3>\n- Geist Armor Arms Snow Camo\n- Geist Armor Core Snow Camo\n- Geist Armor Helmet Snow Camo\n- Geist Armor Legs Snow Camo\n- Geist Backpack Snow Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +25
TheCollector_Recipes_Desc_IrrArm=Wikelo teve uma ideia interessante durante um breve intervalo no trabalho. Estava pensando nos pequenos pirilampos em Pyro e viu a armadura mudar para se parecer com eles. \n\nSe você me trouxer as peças, leve-as para <EM4>~mission(destination|ListAll)</EM4> e eu farei para você, então você também poderá brilhar. \n\nAté mais.\n\n<EM3>ITEM REWARDS</EM3>\n- Bokto Core\n- Bokto Arms\n- Bokto Legs\n- Bokto Helmet\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +25
TheCollector_Recipes_Desc_KopSkull=Olá. Se quiser, posso fazer uma alteração divertida na arma. Use a pele de kopion para o padrão e um pequeno pingente de caveira. Muito eficaz. Atira muito melhor.\n\nTudo o que você precisa é me trazer as peças para <EM4>~mission(destination|ListAll)</EM4> e eu as farei. \n\nTchau.\n\n<EM3>ITEM REWARDS</EM3>\n- Parallax "Fun Kopion Skull" Energy Assault Rifle\n- Parallax Rifle Battery (80 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_L22Wolf=Wikelo muito empolgado. Ter ideia de novo material. Mas fabricar é muito complicado. Muito complexo. Preciso de ajuda pra criar amostra de teste. Eu te dou o projeto, você faz, traz pra mim e eu negocio. Te dou L-22 Wolf extra especial. Muito poderosa, muito lobo.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Metamaterial Test #146\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Blueprint Reward:</EM4> Guaranteed
TheCollector_Recipes_Desc_MiltSkull=Olá. Posso fazer uma versão da arma se você for um soldado kopion. Faça material como camuflagem de soldado, mas com crânio morto na frente. Se quiser, traga a peça para <EM4>~mission(destination|ListAll)</EM4> e eu a farei.\n\n<EM3>ITEM REWARDS</EM3>\n- Parallax "Fun Military Skull" Energy Assault Rifle\n- Parallax Rifle Battery (80 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_Molten=Se você tiver uma armadura, o Wikelo pode deixar ela com aparência quente. Vai ficar boa para uma armadura útil. Traga as coisas e ele vai fazer.\n\n<EM3>ITEM REWARDS</EM3>\n- Strata Core Heatwave\n- Strata Arms Heatwave\n- Strata Legs Heatwave\n- Strata Helmet Heatwave\n- Strata Backpack Heatwave\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +25
TheCollector_Recipes_Desc_NoneAR=Este rifle é muito bom pra disparo, mas podia ter um visual melhor. Wikelo resolve. Agora está bem bonito. Te dou na troca. Traga o que preciso e eu te entrego o rifle. Até te dou o projeto se precisar.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Killshot "Dominion Camo" Rifle\n\n<EM3>ITEM REWARDS</EM3>\n- Killshot "Dominion Camo" Rifle\n- Killshot Rifle Magazine (45 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10\n<EM4>Blueprint Reward:</EM4> Guaranteed
TheCollector_Recipes_Desc_NonePistol=Você precisa de uma boa arma, né? Tenho uma para você. Pequena, mas poderosa. Igual uma pimenta balalu extra picante. O Wikelo deixou essa pistola ainda mais "picante". Você traz o que eu preciso e eu faço um negócio.\n\nAté mais.\n\n<EM3>ITEM REWARDS</EM3>\n- Tripledown "Heatwave" Pistol\n- Tripledown Pistol Magazine (12 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_RedHunterArmor=Wikelo ouviu que humanos pensam que vermelho é a cor da paixão e da raiva. Esta armadura é boa para ambos. Você me dá os itens da lista e esta armadura vermelha será sua.\n\n<EM3>ITEM REWARDS</EM3>\n- Monde Helmet Crimson Camo\n- Monde Core Crimson Camo\n- Monde Arms Crimson Camo\n- Monde Legs Crimson Camo\n- Warden Backpack Crimson Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_SandArmour=Olá, sei que muitos humanos querem saldynium para o problema de regeneração. Os créditos são bons, sim, mas o Wikelo pode usar isso, chifre de kopion e outras coisas para fazer armaduras especiais. \n\nUma vez feita, você será muito resistente. Muito assustador.\n\nVocê vê itens necessários. Traga-os para <EM4>~mission(destination|ListAll)</EM4> e eu os farei para você.\n\nTchau.\n\n<EM3>ITEM REWARDS</EM3>\n- Ana Arms Endro\n- Ana Legs Endro\n- Ana Core Endro\n- Ana Helmet Endro\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +25
TheCollector_Recipes_Desc_SlimyLMG=Essa arma tem a imagem de uma criatura incrível na lateral. Use-a e você vai ficar grande e forte como o Yormandi. Vai cuspir raios. Traga os itens que preciso e então você recebe a arma. Tchau.\n\n<EM3>ITEM REWARDS</EM3>\n- Fresnel "Yormandi" Energy LMG\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_SpikeyArmor=Vanduul tem maneiras estranhas. Eu nunca falo com eles, o velho souli costumava falar, mas não Wikelo. Enfim, embora não sejam amigáveis, eles fazem coisas interessantes. Se você gostar, Wikelo pode fazer você parecer mais com eles.\n\nTraga coisas. Eu faço.\n\nTchau.\n\n<EM3>ITEM REWARDS</EM3>\n- Testudo Helmet Clanguard\n- Testudo Arms Clanguard\n- Testudo Core Clanguard\n- Testudo Legs Clanguard\n- Testudo Backpack Clanguard\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +25
TheCollector_Recipes_Desc_VGLflightsuit=Naves têm janelas grandes. Todo mundo pode te ver pilotando. Você precisa estar no melhor estilo. Wikelo tem traje de voo muito bom pra você. Faça a troca, traga o que preciso e Wikelo te dá o traje. Dou o projeto também se você não tiver.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Tailwind Flight Helmet Dominion Camo\n- [S1-A] Tailwind Flight Suit Dominion Camo\n\n<EM3>ITEM REWARDS</EM3>\n- Tailwind Flight Suit Dominion Camo\n- Tailwind Flight Helmet Dominion Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10\n<EM4>Blueprint Reward:</EM4> Guaranteed
TheCollector_Recipes_Desc_VoltThwack=Você acha que a arma não é suficientemente poderosa? A espingarda VOLT é muito potente, muito perigosa, mas não assustadora? Traga-a para mim. Posso torná-la muito assustadora e poderosa.\n\nEntão eles respeitarão você. Leve para <EM4>~mission(destination|ListAll)</EM4> e eu far ei. \n\nTchau.\n\n<EM3>ITEM REWARDS</EM3>\n- Prism "Irradiated" Laser Shotgun\n- Prism Laser Shotgun Battery (20 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
TheCollector_Recipes_Desc_ZipZap=Quer atirar de longe e ficar escondido. Mas está nevando? Wikelo tem uma arma para você.\n\nTraga os itens. Eu vou te dar.\n\nAdeus.\n\n<EM3>ITEM REWARDS</EM3>\n- Zenith "Snow Camo" Laser Sniper Rifle\n- Zenith Laser Sniper Rifle Battery (22 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Rep:</EM4> +10
