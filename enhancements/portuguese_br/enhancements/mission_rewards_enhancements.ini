FTL_Courier_Stanton_Medium_Desc_001=CONTRATO FTL DISPONÍVEL\nPARA ATRIBUIÇÃO IMEDIATA\n\n**DETALHES DO CONTRATO**\nEntregador nível júnior necessário para entregas pelo Sistema Stanton.\nO transporte deve ser fornecido pelo próprio entregador.\nSerá <EM4>necessário levantar até .25 SCU</EM4> de peso.\nOs entregadores são responsáveis pelo manuseio correto e pela segurança de todos os pacotes sob sua responsabilidade.\n\n~mission(Contractor|SignOff)\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [IND-S0-B] Defiant\n- [IND-S1-B] Colossus\n- [IND-S2-B] Huracan\n- [IND-S2-B] Sedulity\n- [IND-S3-B] Agni\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 3/7 | Risk 2/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
