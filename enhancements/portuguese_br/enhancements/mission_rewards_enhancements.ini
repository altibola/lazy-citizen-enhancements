Foxwell_X2_AttackIdris_Desc=Temos um contato confirmado com uma Idris da XenoThreat com escolta de caças em <EM4>~mission(Location|Address)</EM4>. A disciplina de comunicação deles é péssima. Pelo chatter de rádio, o Comandante está a bordo do Idris. Não lembro da última vez que tivemos uma oportunidade tão clara de pegá-lo. Pode ser a chance de derrubar toda a operação.\n\nVai encarar?\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Security, Your Way'\n\nA Foxwell Enforcement é uma especialista em segurança licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntar à nossa equipe. Se você ou alguém que você conhece tiver interesse, entre em contato com um de nossos representantes.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 7/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Defenders x10, Targets x1\n<EM4>Neutral:</EM4> +120,000 Rep
Foxwell_X2_AttackIdris_Title=ALVO: GRUPO DE ATAQUE XENOTHREAT <EM4>[120,000 Rep]</EM4>
Foxwell_X2_DrawOutBoss_Desc=Interceptamos um sinalizador de localização que coloca <EM>~mission(TargetName)</EM4> e sua ala de ataque pessoal em <EM4>~mission(Location|Address)</EM4>. Eles são um dos executores mais brutais da XenoThreat desde a fundação.\n\n<EM>~mission(TargetName|Last)</EM4> não costuma recuar de uma luta, então ataque suas naves com força suficiente e cause dano o bastante que ele não vai resistir a entrar no combate. Quando aparecer, será seu alvo principal.\n\nPronto para ir?\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Security, Your Way'\n\nA Foxwell Enforcement é uma especialista em segurança licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntar à nossa equipe. Se você ou alguém que você conhece tiver interesse, entre em contato com um de nossos representantes.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x32\n<EM4>Neutral:</EM4> +8,400 Rep
Foxwell_X2_DrawOutBoss_Title=ELIMINAR EXECUTOR DA XENOTHREAT <EM4>[8,400 Rep]</EM4>
Foxwell_X2_ShipAmbush_Desc=Recebemos intel sólida sobre a rota de voo de uma ala de ataque da XenoThreat. Procuramos contratados que possam decolar imediatamente e se posicionar em <EM4>~mission(Location|Address)</EM4> antes deles. As condições locais vão mascarar suas assinaturas de scanner, permitindo que você pegue eles de surpresa. Vamos transformar os caçadores em presas.\n\nInteressado?\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Security, Your Way'\n\nA Foxwell Enforcement é uma especialista em segurança licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntar à nossa equipe. Se você ou alguém que você conhece tiver interesse, entre em contato com um de nossos representantes.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Wave x7, Targets x1\n<EM4>Neutral:</EM4> +4,000 Rep
Foxwell_X2_ShipAmbush_Title=EMBOSCAR ALA DE ATAQUE XENOTHREAT <EM4>[4,000 Rep]</EM4>
Foxwell_X2_ShipDefend_Desc=Recebemos um sinal de socorro vindo de <EM4>~mission(Location|Address)</EM4> sobre uma nave sob ataque da XenoThreat. O piloto relatou que os escudos estão falhando e não consegue fugir dos atacantes.\n\nA nave é uma <EM4>~mission(Ship)</EM4>, mas o piloto é Humano, o que, segundo a ideologia distorcida da XenoThreat, o torna um traidor da Humanidade e um alvo.\n\nEstamos procurando operadores para ir até lá e fazer o bem.\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Security, Your Way'\n\nA Foxwell Enforcement é uma especialista em segurança licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntar à nossa equipe. Se você ou alguém que você conhece tiver interesse, entre em contato com um de nossos representantes.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x3\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +4,000 Rep
Foxwell_X2_ShipDefend_Title=URGENTE - NAVE SOB ATAQUE DA XENOTHREAT <EM4>[4,000 Rep]</EM4>
Foxwell_X2_ShipWaves_Desc=Múltiplos relatos indicam naves da XenoThreat se reunindo em <EM4>~mission(Location|Address)</EM4>\nEstamos procurando contratados prontos para enfrentá-los.\n\nEles querem que acreditemos que estão do lado certo. Querem que acreditemos que têm força esmagadora. Essa é a chance de mostrar que sabemos a verdade.\n\nNão vou mentir, isso é mais do que apenas um contrato de segurança para mim. Eu realmente odeio esses intolerantes de merda e tudo o que representam.\n\nTá dentro?\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Security, Your Way'\n\nA Foxwell Enforcement é uma especialista em segurança licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntar à nossa equipe. Se você ou alguém que você conhece tiver interesse, entre em contato com um de nossos representantes.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x16\n<EM4>Neutral:</EM4> +3,800 Rep
Foxwell_X2_ShipWaves_Title=INTERDITAR FORÇAS DE ATAQUE DA XENOTHREAT <EM4>[3,800 Rep]</EM4>
Foxwell_bombingrun_E_desc_001=Acabamos de receber a localização de um posto avançado de fora-da-lei onde alguns criminosos emergentes têm se reunido. Agora, nosso cliente diz que não há necessidade de enfrentá-los diretamente. Em vez disso, você vai atingir as linhas de suprimento deles.\n\nVoe até <EM4>~mission(Location|Address)</EM4> e destrua os depósitos de combustível deles enquanto lida com qualquer resistência mínima que aparecer. Fica a seu critério o quanto vai se envolver com as forças hostis, só não esqueça que seu objetivo principal é garantir que esses tanques de combustível fiquem fora de operação.\n\nEste é um contrato de nível amarelo, então o pagamento será proporcional.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança licenciada para operar em todo o UEE. Estamos sempre procurando novos operadores para se juntar à nossa equipe. Se você ou alguém que conhece tiver interesse, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_bombingrun_E_title_001=CONTRATO NÍVEL AMARELO: INTERROMPER OPERAÇÕES <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_bombingrun_H_desc_001=Uma oportunidade surgiu para um cliente tomar medidas contra um grupo de criminosos que vem prejudicando seus negócios.\n\nSegundo relatórios, esse grupo de fora-da-lei está atualmente escondido em <EM4>~mission(Location|Address)</EM4>. O cliente acredita que este é um bom momento para pegá-los de surpresa e levá-los à justiça. O trabalho é destruir os tanques de combustível deles e acabar de vez com as operações de contrabando.\n\nEsses caras não devem ser subestimados. É melhor trazer reforços e voar baixo para evitar as torres. Como sempre, a prioridade são os tanques de combustível.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança licenciada para operar em todo o UEE. Estamos sempre procurando novos operadores para se juntar à nossa equipe. Se você ou alguém que conhece tiver interesse, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_bombingrun_H_title_001=CONTRATO NÍVEL LARANJA: DESTRUIR INFRAESTRUTURA FORA-DA-LEI <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
Foxwell_bombingrun_M_desc_001=Estamos precisando de um contratado afiado para uma operação de ataque rápido. O cliente diz que alguns capangas locais estão se reunindo em números preocupantes e fomos encarregados de atrapalhar a base de operações deles.\n\nVá até <EM4>~mission(Location|Address)</EM4> e destrua os tanques de combustível deles. Se tiver sucesso, podemos atrasar bastante os planos desse pessoal e, mais importante, sem precisar enfrentá-los diretamente.\n\nRelatórios indicam algumas naves rondando a área e algumas torres de defesa. Foque apenas nos tanques de combustível e você deve ficar bem.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança licenciada para operar em todo o UEE. Estamos sempre procurando novos operadores para se juntar à nossa equipe. Se você ou alguém que conhece tiver interesse, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_bombingrun_M_title_001=CONTRATO NÍVEL LARANJA: DESTRUIR SUPRIMENTOS DE COMBUSTÍVEL <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
Foxwell_bombingrun_S_desc_001=Estamos procurando uma equipe de mercenários altamente competente para ajudar em uma demolição desafiadora para um cliente VIP.\n\nOs fora-da-lei que operam em <EM4>~mission(Location|Address)</EM4> foram identificados como uma ameaça crescente na área e, para lidar com essa situação, sua equipe terá a tarefa de destruir os tanques de combustível no local.\n\nNo entanto, não será tão simples quanto entrar e sair — espere enfrentar vários hostis e torres que já estarão esperando por vocês. Quanto mais forte sua equipe, maiores serão as chances de completar a operação com sucesso.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança licenciada para operar em todo o UEE. Estamos sempre procurando novos operadores para se juntar à nossa equipe. Se você ou alguém que conhece tiver interesse, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_bombingrun_S_title_001=CONTRATO NÍVEL VERMELHO: DESTRUIR INFRAESTRUTURA FORA-DA-LEI <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
Foxwell_bombingrun_VE_desc_001=Um bando de fora-da-lei vem atormentando nosso cliente e recentemente a situação piorou. Eles tomaram a propriedade do cliente e já esgotamos todas as outras opções.\n\nPrecisamos de um piloto competente para ir até <EM4>~mission(Location|Address)</EM4> e destruir os tanques de combustível deles. Se você cortar o suprimento deles, pode abrir caminho para que o cliente recupere sua propriedade.\n\nEssa não deve ser difícil. Talvez você encontre uma ou duas naves e algumas torres, mas você está autorizado a usar força letal. Tudo que precisamos é que você entre lá, destrua os tanques de combustível e saia.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança licenciada para operar em todo o UEE. Estamos sempre procurando novos operadores para se juntar à nossa equipe. Se você ou alguém que conhece tiver interesse, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_bombingrun_VE_title_001=CONTRATO NÍVEL AMARELO: LIMITAR AMEAÇA POTENCIAL <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_bombingrun_VH_desc_001=A Foxwell foi contratada por um cliente para participar de uma operação em várias etapas em uma base conhecida de fora-da-lei em <EM4>~mission(Location|Address)</EM4> e precisamos de um piloto forte para cumprir seu papel nisso.\n\nVocê, e quaisquer naves de apoio que organizar, terão a tarefa de destruir os tanques de combustível localizados lá para preparar o terreno para o restante da operação.\n\nInfelizmente, o local está cheio de naves e torres antiaéreas. Então certifique-se de que você e sua equipe estejam prontos e lembre-se: os tanques de combustível são a prioridade. Não precisa bancar o herói.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Segurança do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança licenciada para operar em todo o UEE. Estamos sempre procurando novos operadores para se juntar à nossa equipe. Se você ou alguém que conhece tiver interesse, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostiles x2\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_bombingrun_VH_title_001=CONTRATO NÍVEL VERMELHO: DEMOLIÇÃO DE TANQUES DE COMBUSTÍVEL <EM4>[BP]</EM4> <EM4>[250 Rep]</EM4>
GFS_ShipWaveAttack_Mission01_Desc=Deseja ganhar experiência prática crítica lutando contra uma variedade de alvos e situações? Então o meu Combat Gauntlet pode ser a opção perfeita para você.\n\nPor favor, entenda que este curso é destinado a pilotos que já dominaram os conceitos básicos de voo e estão prontos para levar suas habilidades para o próximo nível. Se estiver começando e quiser aprender o básico, recomendo que passe algumas horas em um simpod Arena Commander. Mas para aqueles que estão prontos para enfrentar um desafio real, acredito firmemente que os alunos aprendem melhor fazendo. \n\nÉ por isso que projetei esses oito cenários para serem o mais realistas possível. Prometo a você que este é o mais próximo do treinamento de piloto de combate da Marinha que você pode obter sem se alistar, portanto, não espere muita instrução. <EM4>O risco de ferir a si mesmo ou a sua nave deve ser levado muito a sério.</EM4>\n\nCENÁRIOS DE GAUNTLET:\n1. Alvos únicos\n2. Vários alvos\n3. Prioridade do alvo\n4. Furtividade do alvo\n5. Mísseis e contramedidas\n6. Alvos com várias tripulações\n7. Corveta com escoltas\n8. Encontro de naves capitais\n\nEntão, se você está pronto para se desafiar e provar que tem o que é preciso para ser um grande piloto, o primeiro cenário se concentrará em lidar com um único alvo. Vá para <EM4>~mission(Location|Address)</EM4> para começar.\n\nComo bônus, a conclusão bem-sucedida do cenário renderá ao contratante original um prêmio de <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nTRUQUES DA TROCA:\n- Consciência situacional - Não fique tão concentrado em atingir um alvo que não esteja observando sua trajetória de voo. Não adianta derrubar o inimigo se você voar de frente para um asteroide.\n\nBoa sorte lá fora, \nInstrutor Gilly \n\nSobre a GILLY'S FLIGHT SCHOOL \nO instrutor Lucas “Gilly” Baramsco serviu em seis esquadrões e tem mais de dez anos de experiência em ensino. Seja um aluno com zero de experiência de voo ou um profissional que deseja aprimorar suas habilidades, a Gilly Flight School oferece uma variedade de cursos para “Lançar sua carreira de piloto”. \n\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3
GFS_ShipWaveAttack_Mission01_Title=DESAFIO DE COMBATE - CENÁRIO #1
GFS_ShipWaveAttack_Mission02_Desc=Parabéns por ter concluído a primeira parte deste curso de oito partes.\n\nO cenário dois se concentrará em como lidar com vários alvos ao mesmo tempo. O objetivo aqui é dar a você um melhor controle sobre como equilibrar ataque e defesa.   \n\nQuando estiver pronto, pegue uma nave de combate e vá para <EM4>~mission(Location|Address)</EM4> para começar.\n\nComo bônus, a conclusão bem-sucedida do cenário renderá ao contratante original um prêmio de <EM4>~mission(ScripAmount) MG Scrip</EM4>. \n\nTruques das trocas:\n- Escolha sua luta - Para situações em que você está enfrentando vários alvos com a mesma ameaça, sua melhor estratégia é se concentrar em neutralizar um alvo de cada vez para reduzir gradualmente a quantidade de fogo que chega.\n\nBoa sorte lá fora, \nInstrutor Gilly \n\nSOBRE A ESCOLA DE VOO DO GILLY \nO instrutor Lucas “Gilly” Baramsco serviu em seis esquadrões e tem mais de dez anos de experiência em ensino. Seja um aluno com zero de experiência de voo ou um profissional que deseja aprimorar suas habilidades, a Gilly Flight School oferece uma variedade de cursos para “Lançar sua carreira de piloto”.\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x3
GFS_ShipWaveAttack_Mission02_Title=DESAFIO DE COMBATE - CENÁRIO #2
GFS_ShipWaveAttack_Mission03_Desc=Parabéns por ter concluído a segunda parte deste curso de oito partes.   \n\nO terceiro cenário traz considerações táticas para a mistura. Desta vez, as naves atacantes são de classes diferentes com aplicações distintas no campo de batalha. Saber quais alvos priorizar é vital para sobreviver a combates contra várias naves.      \n\nQuando estiver pronto, vá para <EM4>~mission(Location|Address)</EM4> para começar.\n\nComo bônus, a conclusão bem-sucedida do cenário renderá ao contratante original um prêmio de <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nTRUQUES DA TROCA:\n- Maiores - Tente avaliar qual ameaça é a mais perigosa e elimine-a primeiro. \n- Escudos - Se estiver sofrendo muito dano, não tenha medo de dar um impulso e deixar seus escudos se regenerarem.\n\nBoa sorte, \nInstrutor Gilly \n\nSobre a GILLY'S FLIGHT SCHOOL \nO instrutor Lucas “Gilly” Baramsco serviu em seis esquadrões e tem mais de dez anos de experiência em ensino. Seja um aluno com zero de experiência de voo ou um profissional que deseja aprimorar suas habilidades, a Gilly Flight School oferece uma variedade de cursos para “Lançar sua carreira de piloto”.\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 4/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4
GFS_ShipWaveAttack_Mission03_Title=DESAFIO DE COMBATE - CENÁRIO #3
GFS_ShipWaveAttack_Mission04_Desc=Parabéns por ter concluído a terceira parte deste curso de oito partes.\n\nOs bons pilotos de combate sabem que nem todas as ameaças são aparentes. São as ameaças que você não espera que podem ser as mais devastadoras. O cenário quatro se concentra em como identificar e lidar com alvos furtivos. Esperamos que, ao final, você entenda a importância do seu radar para determinar quem você realmente está enfrentando. Espere ter naves regulares e furtivas caçando você.    \n\nVá para <EM4>~mission(Location|Address)</EM4> sempre que estiver pronto e lembre-se de ficar de olho no radar.\n\nComo bônus, a conclusão bem-sucedida do cenário renderá ao contratante original um prêmio de <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nTRUQUES DA TROCA:\n- Ataques surpresa - O envio de ping ao seu redor às vezes pode revelar naves ocultas. Esteja pronto para que os contatos apareçam inesperadamente.\n\nBoa sorte lá fora, \nInstrutor Gilly \n\nSobre a GILLY'S FLIGHT SCHOOL \nO instrutor Lucas “Gilly” Baramsco serviu em seis esquadrões e tem mais de dez anos de experiência em ensino. Seja um aluno com zero de experiência de voo ou um profissional que deseja aprimorar suas habilidades, a Gilly Flight School oferece uma variedade de cursos para “Lançar sua carreira de piloto”.\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4
GFS_ShipWaveAttack_Mission04_Title=DESAFIO DE COMBATE - CENÁRIO #4
GFS_ShipWaveAttack_Mission05_Desc=Parabéns por ter concluído a quarta parte deste curso de oito partes.   \n\nO quinto cenário se concentra em táticas defensivas. Saber quando tomar medidas evasivas e implantar iscas ou contramedidas de ruído é essencial para sua sobrevivência. É por isso que os agressores neste exercício estarão armados com mísseis.   \n\nCertifique-se de que suas contramedidas estejam totalmente estocadas e, em seguida, vá para <EM4>~mission(Location|Address)</EM4> para começar.\n\nComo bônus, a conclusão bem-sucedida do cenário renderá ao contratante original um prêmio de <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nTRUQUES DA TROCA:\n- Pronto para lançar - O acesso fácil às suas iscas e contramedidas pode ser fundamental para o seu sucesso ao lidar com o fogo de mísseis. \n- Fique de pé e lute - Resista à tentação de acionar o pós-combustor para escapar, pois você aumentará sua assinatura e facilitará o ataque do míssil. De qualquer forma, é quase certo que eles são muito mais rápidos do que você.\n- Feche a lacuna - Embora possa parecer contraintuitivo, aproximar-se de uma nave inimiga pode ser uma vantagem. Os mísseis têm um alcance mínimo e, se você estiver dentro desse alcance, eles não conseguirão travar em você.\n\nBoa sorte lá fora, \nInstrutor Gilly \n\nSobre a GILLY'S FLIGHT SCHOOL \nO instrutor Lucas “Gilly” Baramsco serviu em seis esquadrões e tem mais de dez anos de experiência em ensino. Seja um aluno com zero de experiência de voo ou um profissional que deseja aprimorar suas habilidades, a Gilly Flight School oferece uma variedade de cursos para “Lançar sua carreira de piloto”.\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4
GFS_ShipWaveAttack_Mission05_Title=DESAFIO DE COMBATE - CENÁRIO #5
GFS_ShipWaveAttack_Mission06_Desc=Parabéns por ter concluído a parte cinco deste curso de oito partes.\n\nEstou trazendo as armas grandes para o cenário seis. Chegou a hora de você enfrentar naves maiores e com várias tripulações, que oferecem alguns novos desafios. Além de ter de enfrentar o poder de fogo aprimorado, os escudos multifacetados significam que você terá de mirar continuamente em uma face do escudo para causar danos reais. É mais fácil falar do que fazer quando vocês dois estão se movendo em velocidades tão rápidas.      \n\nVá até <EM4>~mission(Location|Address)</EM4> quando estiver pronto.\n\nComo bônus, a conclusão bem-sucedida do cenário renderá ao contratante original um prêmio de <EM4>~mission(ScripAmount) MG Scrip</EM4>. \n\nTruques das Trocas:\n- Vantagem de tamanho - Quando estiver enfrentando uma nave maior, tente ficar longe da frente dele, pois normalmente é onde está localizada a maior parte do fogo ofensivo. \n\nBoa sorte lá fora, \nInstrutor Gilly \n\nSobre a GILLY'S FLIGHT SCHOOL \nO instrutor Lucas “Gilly” Baramsco serviu em seis esquadrões e tem mais de dez anos de experiência em ensino. Seja um aluno com zero de experiência de voo ou um profissional que deseja aprimorar suas habilidades, a Gilly Flight School oferece uma variedade de cursos para “Lançar sua carreira de piloto”.\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x3
GFS_ShipWaveAttack_Mission06_Title=DESAFIO DE COMBATE - CENÁRIO #6
GFS_ShipWaveAttack_Mission07_Desc=Parabéns por ter concluído a parte seis deste curso de oito partes.\n\nVocê adquiriu muita experiência nos últimos seis cenários e agora é hora de colocar tudo isso em prática. O cenário sete coloca você contra uma nave da classe corveta e suas escoltas. Esse encontro prolongado o levará ao limite e testará tudo o que você tem.   \n\nA única coisa que resta é entender o limite de seu conjunto de habilidades. Para simplificar, você não pode fazer tudo sozinho. Desenvolver e manter relacionamentos com outros pilotos a quem você pode pedir apoio é realmente a última peça do quebra-cabeça. Não estou dizendo que você não pode superar encontros como esse sozinho, mas nem mesmo a Marinha envia seus melhores pilotos em uma patrulha sozinhos.    \n\nDepois de decidir se vai fazer isso sozinho ou se vai chamar algum apoio, vá para <EM4>~mission(Location|Address)</EM4> para dar início ao encontro.\n\nComo bônus, a conclusão bem-sucedida do cenário renderá ao contratante original um prêmio de <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nTRUQUES DA TROCA\n- Força na diversidade - Pense nas funções que seus aliados desempenharão e escolha com cuidado quem trazer para ajudar a equilibrar os pontos fortes e fracos. Você vai querer naves capazes de enfrentar a Corvette enquanto outros lidam com a escolta.\n\nBoa sorte lá fora, \nInstrutor Gilly \n\nSobre a GILLY'S FLIGHT SCHOOL \nO instrutor Lucas “Gilly” Baramsco serviu em seis esquadrões e tem mais de dez anos de experiência em ensino. Seja um aluno com zero de experiência de voo ou um profissional que deseja aprimorar suas habilidades, a Gilly Flight School oferece uma variedade de cursos para “Lançar sua carreira de piloto”.\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x4
GFS_ShipWaveAttack_Mission07_Title=DESAFIO DE COMBATE - CENÁRIO #7
GFS_ShipWaveAttack_Mission08_Desc=Bem-vindo ao cenário final do Combat Gauntlet.\n\nAo longo deste curso, você experimentou as táticas avançadas de combate e defesa necessárias para sobreviver a uma variedade de encontros. Chegou a hora de usar todas essas novas habilidades e conhecimentos e ver como eles se comportam contra uma grande nave capital e algumas naves de escolta.\n\nVocê já conhece o procedimento. Depois que você e todos os seus aliados estiverem prontos, vá até <EM4>~mission(Location|Address)</EM4> para ver como você se sai quando realmente levado ao limite.\n\nComo bônus, a conclusão bem-sucedida do cenário renderá ao contratante original um prêmio de ~mission(ScripAmount) MG Scrip. \n\nTRUQUES DA TROCA\n- Paciência é uma virtude - Se você equilibrou seu esquadrão adequadamente, deve conseguir sair por cima, mas não espere que seja uma luta rápida. Naves desse porte não caem rapidamente.\n\nBoa sorte lá fora, \nInstrutor Gilly \n\nSobre a GILLY'S FLIGHT SCHOOL \nO instrutor Lucas “Gilly” Baramsco serviu em seis esquadrões e tem mais de dez anos de experiência em ensino. Seja um aluno com zero de experiência de voo ou um profissional que deseja aprimorar suas habilidades, a Gilly Flight School oferece uma variedade de cursos para “Lançar sua carreira de piloto”.\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 7/7 | Risk 7/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x5
GFS_ShipWaveAttack_Mission08_Title=DESAFIO DE COMBATE - CENÁRIO #8
GMCapture_Desc=Para testar o preparo de nossas equipes de resposta, gostaríamos que os voluntários simulassem um ataque contra uma Idris da CDF, neutralizando e assumindo o controle da embarcação.\n\nPara deixar claro, o objetivo do exercício não é destruir o Idris, mas tentar abordar a embarcação e manter o controle dela pelo maior tempo possível. Os voluntários devem esperar encontrar resistência total da tripulação altamente treinada da Idris e são incentivados a obter uma impressão atualizada com antecedência.\n\nAs coordenadas serão fornecidas após a confirmação de sua participação.\n\nObrigado e boa sorte.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
