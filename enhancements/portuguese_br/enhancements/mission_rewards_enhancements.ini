ForceDepletion_Desc=Elimine os membros da Organização Nine Tails. \nPara cada membro neutralizado você receberá 500 UEC e ao completar receberá 1000 UEC como bônus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +4,000
ForceDepletion_Title=ELIMINAÇÃO DE MEMBROS DA ORGANIZAÇÃO NINE TAILS <EM4>[4,000 Rep]</EM4>
Foxwell_DefendDestructibleEntites_E_Desc_001=Algum piloto disponível na área? Precisamos de proteção em <EM4>~mission(Location|Address)</EM4> para um cliente. Um grupo de fora da lei tem atacado seus <EM4>~mission(Objects)</EM4>, e se nada for feito vão causar um estrago sério. Precisamos de alguém para proteger ao máximo a propriedade do cliente e lidar com esses marginais.\n\nPelas informações que conseguimos levantar, esses caras são de baixo nível, mas podem dar trabalho se você vacilar. Então, se você cumprir isso nos padrões da Foxwell, estamos oferecendo <EM4>~mission(ScripAmount) MG Scrip</EM4> para o contratante principal.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Security, Your Way'\n\nA Foxwell Enforcement é uma especialista em segurança licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntar à nossa equipe. Se você ou alguém que você conhece tiver interesse, entre em contato com um de nossos representantes.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x10\n<EM4>Rep:</EM4> +100\n<EM4>Blueprint Reward:</EM4> 100% chance (Easy only)\n\n<EM4>? = only the Easy variant awards blueprints</EM4>
Foxwell_DefendDestructibleEntites_E_Title_001=CONTRATO NÍVEL AMARELO: PROTEGER ~mission(Objects) <EM4>[BP?]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_DefendDestructibleEntites_H_Desc_001=Um dos nossos clientes de alta prioridade está sob ataque de uma gangue criminosa que está mirando nos <EM4>~mission(Objects)</EM4> em <EM4>~mission(Location|Address)</EM4>. Os ativos do cliente são valiosos, então precisamos mantê-los seguros a qualquer custo — mas não vou mentir, vai ser uma missão complicada com esses marginais determinados a causar estrago.\n\nSe fosse eu, não pensaria duas vezes em <EM>chamar reforços</EM4>. Esses caras não são brincadeira, então estamos oferecendo <EM4>~mission(ScripAmount) MG Scrip</EM4> ao contratante principal que lidar com eles com sucesso.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Security, Your Way'\n\nA Foxwell Enforcement é uma especialista em segurança licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntar à nossa equipe. Se você ou alguém que você conhece tiver interesse, entre em contato com um de nossos representantes.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x17\n<EM4>Rep:</EM4> +200\n<EM4>Blueprint Reward:</EM4> 100% chance (Hard only)\n\n<EM4>? = only the Hard variant awards blueprints</EM4>
Foxwell_DefendDestructibleEntites_H_Title_001=CONTRATO NÍVEL LARANJA: PROTEGER ~mission(Objects) <EM4>[BP?]</EM4> <EM4>[200 Rep]</EM4>
Foxwell_DefendDestructibleEntites_M_Desc_001=Esperamos que você possa fornecer serviços de proteção em <EM4>~mission(Location|Address)</EM4>. Um dos nossos clientes de alta prioridade está tendo sérios problemas com um grupo de fora da lei atacando seus ~mission(Objects). É necessário manter os ativos o mais seguros e intactos possível. O cliente espera o serviço pelo qual está pagando, então não cometa erros ou podemos perder um cliente fiel.\n\nPor enquanto, ainda sabemos pouco sobre esses fora da lei, mas se você cumprir isso nos padrões da Foxwell, estamos oferecendo <EM4>~mission(ScripAmount) MG Scrip</EM4> ao contratante principal.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Security, Your Way'\n\nA Foxwell Enforcement é uma especialista em segurança licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntar à nossa equipe. Se você ou alguém que você conhece tiver interesse, entre em contato com um de nossos representantes.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x15\n<EM4>Rep:</EM4> +150\n<EM4>Blueprint Reward:</EM4> 100% chance (Medium only)\n\n<EM4>? = only the Medium variant awards blueprints</EM4>
Foxwell_DefendDestructibleEntites_M_Title_001=CONTRATO NÍVEL LARANJA: DEFENDER ~mission(Objects) <EM4>[BP?]</EM4> <EM4>[150 Rep]</EM4>
Foxwell_DefendDestructibleEntites_S_Desc_001=Um contrato de emergência acabou de chegar sobre uma gangue de marginais violentos causando destruição na infraestrutura de um dos nossos clientes VIP. Se estiver disponível, precisamos que você vá imediatamente para <EM4>~mission(Location|Address)</EM4> e defenda os valiosos <EM4>~mission(Objects)</EM4> do cliente a qualquer custo.\n\nA Foxwell conhece bem esse grupo, então acredite quando digo que esses pilotos não devem ser subestimados. Recomendo fortemente que você organize uma <EM>força de apoio altamente competente</EM> para ir com você.\n\nSe conseguir sobreviver ao confronto com a propriedade do cliente intacta, estamos oferecendo <EM4>~mission(ScripAmount) MG Scrip</EM4> ao contratante principal corajoso o suficiente para assumir esse trabalho.\n\nFique seguro e boa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Security, Your Way'\n\nA Foxwell Enforcement é uma especialista em segurança licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntar à nossa equipe. Se você ou alguém que você conhece tiver interesse, entre em contato com um de nossos representantes.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 7/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x22\n<EM4>Rep:</EM4> +300\n<EM4>Blueprint Reward:</EM4> 100% chance (Super only)\n\n<EM4>? = only the Super variant awards blueprints</EM4>
Foxwell_DefendDestructibleEntites_S_Title_001=CONTRATO NÍVEL VERMELHO: PROTEGER ~mission(Objects) <EM4>[BP?]</EM4> <EM4>[300 Rep]</EM4>
Foxwell_DefendDestructibleEntites_VE_Desc_001=Chamando todos os pilotos — um dos nossos clientes precisa de proteção para seus <EM4>~mission(Objects)</EM4>, localizados em <EM4>~mission(Location|Address)</EM4>. Pelo que apuramos, os atacantes são um bando de aspirantes a fora da lei, provavelmente sem noção do valor dos ativos que estão tentando destruir, apenas causando caos por diversão. Ainda assim, a propriedade do cliente é importante e deve ser mantida o mais intacta possível.\n\nSe você cuidar deles dentro dos padrões da Foxwell, estamos oferecendo <EM4>~mission(ScripAmount) MG Scrip</EM4> ao contratante principal.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Security, Your Way'\n\nA Foxwell Enforcement é uma especialista em segurança licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntar à nossa equipe. Se você ou alguém que você conhece tiver interesse, entre em contato com um de nossos representantes.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Rep:</EM4> +100\n<EM4>Blueprint Reward:</EM4> 100% chance (VeryEasy only)\n\n<EM4>? = only the VeryEasy variant awards blueprints</EM4>
Foxwell_DefendDestructibleEntites_VE_Title_001=CONTRATO NÍVEL AMARELO: DEFENDER ~mission(Objects) <EM4>[BP?]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_DefendDestructibleEntites_VH_Desc_001=Suporte urgente necessário em <EM4>~mission(Location|Address)</EM4>. Uma organização criminosa conhecida por destruição vem testando os limites com a propriedade de um dos nossos clientes há meses, e agora partiu pra cima dos <EM4>~mission(Objects)</EM4>. Esses ativos são extremamente valiosos, então precisam ser protegidos a qualquer custo — embora saibamos que não será fácil.\n\nNão posso enfatizar o suficiente o quão perigosos esses caras são, então não hesite em <EM>chamar reforços</EM>. Se você e os ativos saírem intactos, estamos oferecendo <EM4>~mission(ScripAmount) MG Scrip</EM4> ao contratante principal.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Security, Your Way'\n\nA Foxwell Enforcement é uma especialista em segurança licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntar à nossa equipe. Se você ou alguém que você conhece tiver interesse, entre em contato com um de nossos representantes.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x17\n<EM4>Rep:</EM4> +250\n<EM4>Blueprint Reward:</EM4> 100% chance (VeryHard only)\n\n<EM4>? = only the VeryHard variant awards blueprints</EM4>
Foxwell_DefendDestructibleEntites_VH_Title_001=CONTRATO NÍVEL VERMELHO: DEFENDER ~mission(Objects) <EM4>[BP?]</EM4> <EM4>[250 Rep]</EM4>
Foxwell_DefendEntitesAndEscort_E_Desc=Precisamos de um contratado para fornecer serviços de comboio e proteção em <EM4>~mission(Location|Address)</EM4>. Um de nossos clientes de elite está sob ataque de um grupo de fora da lei que está mirando nos <EM4>~mission(Objects) and ships</EM4>. Você precisará manter a tripulação segura enquanto atravessam a área, além de garantir que os ativos permaneçam intactos. Esses marginais parecem capazes de causar bastante dano, então aja com cautela ou o cliente pode não ser o único a sofrer grandes perdas.\n\nSe você cumprir isso nos padrões da Foxwell, estamos oferecendo <EM4>~mission(ScripAmount) MG Scrip</EM4> como pagamento ao contratante principal.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Security, Your Way'\n\nA Foxwell Enforcement é uma especialista em segurança licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntar à nossa equipe. Se você ou alguém que você conhece tiver interesse, entre em contato com um de nossos representantes.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Nyx]</EM4>\n- [CIV-S0-A] Tepilo\n- [CIV-S0-C] Fridan\n- [CIV-S0-C] Frost-Star SL\n- [CIV-S1-A] Gelid\n- [CIV-S1-C] ArcticStorm\n- [CIV-S1-C] Berian\n- [CIV-S1-C] Frost-Star\n- [CIV-S2-A] Aufeis\n- [CIV-S2-C] ColdSnap\n- [CIV-S2-C] Frost-Star EX\n- [CIV-S2-C] Graupel\n- [CIV-S3-A] Kragen\n- [CIV-S3-B] Elsen\n- [CIV-S3-C] Draug\n- [CIV-S3-C] Frost-Star XL\n- [CIV-S3-C] FrostBurn\n\n<EM4>[Pyro]</EM4>\n- [CIV-S0-B] IonWave\n- [CIV-S0-C] Radix\n- [CIV-S1-B] IonBurst\n- [CIV-S1-B] MagnaBloom\n- [CIV-S1-C] LightBlossom\n- [CIV-S1-C] PowerBolt\n- [CIV-S2-B] IonSurge\n- [CIV-S2-B] Radiance\n- [CIV-S2-C] FullForce\n- [CIV-S3-B] Celestial\n- [CIV-S3-B] IonSurge Pro\n- [CIV-S3-C] FullForce Pro\n- [CIV-S3-C] NewDawn\n\n<EM4>[Stanton]</EM4>\n- [CIV-S1-A] 7SA 'Concord'\n- [CIV-S1-D] INK\n- [CIV-S2-A] 7MA 'Lorica'\n- [CIV-S2-D] RPEL\n- [CIV-S3-A] 7CA 'Nargun'\n- [CIV-S3-D] HAVEN\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x14, Reinforcements x8\n<EM4>Friendlies:</EM4> Escort Wings x3\n<EM4>Rep:</EM4> +100\n<EM4>Blueprint Reward:</EM4> Guaranteed
