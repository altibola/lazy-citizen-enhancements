Foxwell_HaulCargo_AToB_OLP_desc_01=Procurando um contratado com as habilidades e a nave certas para uma missão importante. Os bandidos emboscaram um Hull C que transportava uma carga de <EM4>~mission(CargoGradeToken)</EM4> e a levaram para <EM4>~mission(Location|Address)</EM4>. Fomos contratados para recuperar tudo.  \n\nA carga está sendo armazenada em algum lugar em uma instalação extinta da Hathor. O local é grande e está cheio de bandidos. Precisamos de alguém para recuperar as mercadorias do elevador de carga de lá e entregar tudo de volta ao <EM4>elevador de carga em ~mission(Destination|Address)</EM4>. Não pense que isso será um passeio no parque. Traga muita munição e uma nave que possa lidar com <EM4>Contêineres de Carga de ~mission(MissionMaxSCUSize)</EM4>. \n\nTambém não seria má ideia levar um <EM4>Tractor Beam portátil</EM4> com você.   \n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança, do seu jeito'\n\nA Foxwell Enforcement é uma empresa especializada em segurança licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes contratuais.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_HaulCargo_AToB_OLP_title_01=CONTRATO DE NÍVEL VERMELHO: RECUPERAR CARGA <EM4>[BP]</EM4>
Foxwell_HaulCargo_AToB_PAF_desc_01=Recentemente, uma equipe invadiu um centro de distribuição e fugiu com <EM4>~mission(CargoGradeToken) carga de carga</EM4>. A Foxwell foi contratada para recuperar todas essas mercadorias. Estamos recebendo relatos de que esses bandidos estão usando antigas instalações da Hathor como esconderijos e acreditamos que os itens roubados estão atualmente em <EM4>~mission(Location|Address)</EM4>.\n\nSe estiver interessado, você precisará de uma nave que possa lidar com <EM4>Contêineres de Carga de ~mission(MissionMaxSCUSize)</EM4>. Não há dúvida de que você conseguirá entrar e sair desse PAF sem ser notado, portanto, é melhor estar preparado para limpar o local. Quando estiver seguro, pegue as mercadorias do elevador de carga e entregue-as ao <EM4>elevador de carga em ~mission(Destination|Address)</EM4>. \n\nTambém não seria má ideia levar um <EM4>Tractor Beam portátil</EM4> com você.   \n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança, do seu jeito'\n\nA Foxwell Enforcement é uma empresa especializada em segurança licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes contratuais.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_HaulCargo_AToB_PAF_title_01=CONTRATO DE NÍVEL VERMELHO: RECUPERE A CARGA ROUBADA <EM4>[BP]</EM4>
Foxwell_HaulCargo_MultiToSingle_desc_01=Algo estranho está acontecendo nas antigas instalações de mineração de Hathor. Tanto as instalações de alinhamento de plataformas quanto as plataformas de laser orbital foram abandonadas e acumularam poeira por décadas, mas os bandidos começaram a usá-las como base de operações.\n\nFomos contratados por uma parte interessada que recentemente perdeu muita carga importante para uma dessas gangues. Atualmente, as coisas estão escondidas em <EM4>~mission(Location1|Address)</EM4> e <EM4>~mission(Location2|Address)</EM4>, mas há um medo crescente de que a gangue possa descarregar suas mercadorias em breve. É por isso que fomos contratados para atacar essas duas instalações da Hathor, recuperar a carga dos elevadores de carga e levá-la para o elevador de carga em <EM4>~mission(Destination|Address)</EM4>. \n\nAqui estão os detalhes sobre o que pegar em cada local. Não importa a ordem em que você faz isso, desde que tudo seja coletado e entregue. Apenas certifique-se de trazer uma nave que possa lidar com <EM4>Contêineres de Carga de ~mission(MissionMaxSCUSize)</EM4>.  \n\nTambém não seria má ideia levar um <EM4>Tractor Beam portátil</EM4> com você.   \n\n~mission(MultiToSingleToken)\n\nFoxwell não conseguiu explorar esses locais, mas se eu fosse você, esperaria enfrentar uma séria resistência armada. É melhor trazer um monte de equipamentos e alguns amigos.\n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança, do seu jeito'\n\nA Foxwell Enforcement é uma empresa especializada em segurança licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes contratuais.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_HaulCargo_MultiToSingle_title_01=CONTRATO DE NÍVEL VERMELHO: LIBERE PAFS, RECUPERE CARGA E ENTREGUE AO OLP <EM4>[BP]</EM4>
Foxwell_Mercenary_Rehire_desc_001=Devido a uma reestruturação corporativa, a Foxwell tem algumas novas vagas que precisam ser preenchidas imediatamente. A Foxwell sabe que você já expressou interesse nessa linha de trabalho e queremos saber se você gostaria de tentar um novo contrato.\n\nUm de nossos clientes precisa de suporte na <EM4>~mission(Location|Address)</EM4>, onde suas forças de segurança estão lutando para lidar com uma incursão de fora da lei. Vá até lá e ajude as forças locais a se livrarem do problema antes que seja tarde demais. \n\nConclua esse contrato com êxito e a Foxwell terá prazer em enviar mais trabalhos para você.\n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança, do seu jeito'\n\nA Foxwell Enforcement é uma empresa especializada em segurança licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes contratuais.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [S1-A] Antium Arms Moss Camo\n- [S1-A] Antium Core Maroon\n- [S1-A] Antium Core Moss Camo\n- [S1-A] Antium Helmet Jet\n- [S1-A] Antium Helmet Maroon\n- [S1-A] Antium Helmet Moss Camo\n- [S1-A] Antium Legs Maroon\n- [S1-A] Antium Legs Moss Camo\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5\n<EM4>Applicant:</EM4> +500 Rep\n<EM4>Failure Penalty:</EM4> -50 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_Mercenary_Rehire_title_001=PROCURANDO POR TRABALHO? <EM4>[BP]</EM4> <EM4>[500 Rep]</EM4>
Foxwell_SecurityPatrol_E_Desc_001=Precisamos de alguém para neutralizar uma patrulha de segurança. Você vai precisar ir até o <EM4>marcador do local</EM4> no seu HUD e então escanear vários pontos de verificação designados, garantindo que tudo esteja seguro e tranquilo. \n\nOs satélites naquela região estão apresentando problemas ultimamente. Não sabemos exatamente o que está acontecendo por lá, mas é melhor estar preparado caso surja algum problema.\n\nComplete esse contrato e o contratante principal receberá um bônus de <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n‘Segurança, Do Seu Jeito’\n\nA Foxwell Enforcement é uma especialista em segurança credenciada, com licença para operar em toda a UEE. Estamos sempre em busca de novos operadores para fazer parte da nossa equipe. Se você ou alguém que conhece estiver interessado, entre em contato com um dos nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sanguine" Energy Assault Rifle\n- [S1-A] Antium Arms Sand\n- [S1-A] Antium Core Sand\n- [S1-A] Antium Helmet Sand\n- [S1-A] Antium Legs Sand\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Targets x15\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_SecurityPatrol_E_Title_001=CONTRATO DE NÍVEL AMARELO: INSPEÇÃO DE SEGURANÇA <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_SecurityPatrol_H_Desc_001=Várias naves desconhecidas foram avistadas em áreas frequentadas por cargueiros que entregam mercadorias para o nosso cliente. Eles estão preocupados que essas naves estejam monitorando os cargueiros, se preparando para uma emboscada, por isso contrataram a gente para patrulhar a região. \n\nComece indo até o <EM4>marcador do local</EM4> no seu HUD e escaneando para garantir que esteja tudo limpo. Depois disso, vamos te enviar para outras áreas para escanear possíveis ameaças. Recomendamos que leve um <EM4>companheiro de voo</EM4> e muitos suprimentos, pois pode precisar de ajuda para lidar com o que aparecer. \n\nAlém disso, ao concluir o contrato, o contratante principal receberá um bônus de <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n‘Segurança, Do Seu Jeito’\n\nA Foxwell Enforcement é uma especialista em segurança credenciada, com licença para operar em toda a UEE. Estamos sempre em busca de novos operadores para fazer parte da nossa equipe. Se você ou alguém que conhece estiver interessado, entre em contato com um dos nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sanguine" Energy Assault Rifle\n- [S1-A] Antium Arms Sand\n- [S1-A] Antium Core Sand\n- [S1-A] Antium Helmet Sand\n- [S1-A] Antium Legs Sand\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Targets x54\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_SecurityPatrol_H_Title_001=CONTRATO DE NÍVEL LARANJA: AMEAÇA POTENCIAL À SEGURANÇA <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
Foxwell_SecurityPatrol_M_Desc_001=Um cliente está preocupado com a atividade próxima aos seus interesses. Fomos contratados para patrulhar a área e realizar varreduras em vários locais. Interessado? Se sim, vá até o <EM4>marcador do local</EM4> no seu HUD para iniciar a patrulha.\n\nO cliente não especificou quais as ameaças, mas ele não acha que a situação esteja normal por lá. Esperamos poder trazer um pouco de tranquilidade para ele.\n\nAlém disso, o cliente providenciou um bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4> para o contratante principal.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n‘Segurança, Do Seu Jeito’\n\nA Foxwell Enforcement é uma especialista em segurança credenciada, com licença para operar em toda a UEE. Estamos sempre em busca de novos operadores para fazer parte da nossa equipe. Se você ou alguém que conhece estiver interessado, entre em contato com um dos nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sanguine" Energy Assault Rifle\n- [S1-A] Antium Arms Sand\n- [S1-A] Antium Core Sand\n- [S1-A] Antium Helmet Sand\n- [S1-A] Antium Legs Sand\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Targets x23\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_SecurityPatrol_M_Title_001=CONTRATO DE NÍVEL LARANJA: PATRULHA DE SEGURANÇA <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
Foxwell_SecurityPatrol_S_Desc_001=Precisamos de um piloto experiente para uma patrulha importante. Um cliente de peso está farto de fora-da-lei atacando suas naves e satélites. Fomos contratados para escanear as áreas em questão e lidar com quaisquer forças hostis. A patrulha começa no <EM4>marcador do local</EM4> no seu HUD, e depois vamos te enviar para vários outros pontos que você precisará limpar.\n\nNão sabemos exatamente com o que você vai se deparar por lá, mas com base nas informações fornecidas pelo cliente, frequentemente há grupos de caças de cinco a sete naves circulando pela região. Alguns deles têm naves maiores liderando o ataque. Isso significa que você deve estar preparado para uma luta pesada. Se puder, tente recrutar pelo menos <EM4>três amigos</EM4> para essa missão. Mesmo um piloto experiente vai precisar de toda a ajuda possível contra essa galera. \n\nComo essa missão será difícil, o contratante principal vai receber um bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4> no final da patrulha.\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n‘Segurança, Do Seu Jeito’\n\nA Foxwell Enforcement é uma especialista em segurança credenciada, com licença para operar em toda a UEE. Estamos sempre em busca de novos operadores para fazer parte da nossa equipe. Se você ou alguém que conhece estiver interessado, entre em contato com um dos nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sanguine" Energy Assault Rifle\n- [S1-A] Antium Arms Sand\n- [S1-A] Antium Core Sand\n- [S1-A] Antium Helmet Sand\n- [S1-A] Antium Legs Sand\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 7/7\n<EM4>Hostiles:</EM4> Targets x84\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_SecurityPatrol_S_Title_001=CONTRATO DE NÍVEL VERMELHO: PROTEJA O ESPAÇO DE PERIGOS <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
Foxwell_SecurityPatrol_VE_Desc_001=Hora de fazer uma patrulha de rotina para um de nossos clientes de longa data. O trajeto consiste em uma série de pontos de verificação que precisam ser visitados e escaneados para confirmar que tudo está como esperado. Parece simples o suficiente. \n\nSe estiver interessado, aceite e vá até o <EM4>marcador do local</EM4> no seu HUD para começar. Conclua isso e o contratante principal receberá um bônus de <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n‘Segurança, Do Seu Jeito’\n\nA Foxwell Enforcement é uma especialista em segurança credenciada, com licença para operar em toda a UEE. Estamos sempre em busca de novos operadores para fazer parte da nossa equipe. Se você ou alguém que conhece estiver interessado, entre em contato com um dos nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sanguine" Energy Assault Rifle\n- [S1-A] Antium Arms Sand\n- [S1-A] Antium Core Sand\n- [S1-A] Antium Helmet Sand\n- [S1-A] Antium Legs Sand\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Targets x4\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_SecurityPatrol_VE_Title_001=CONTRATO DE NÍVEL AMARELO: PATRULHA DE ROTINA <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_SecurityPatrol_VH_Desc_001=Um cliente precisa da nossa ajuda. Fora-da-lei estão circulando por certos setores onde eles fazem negócios e atacando qualquer um que cruzar o caminho. Nosso cliente já perdeu várias naves e não pode perder mais nenhuma. \n\nPrecisamos de alguém para patrulhar essas áreas e atrair as forças hostis. O trabalho começa com você indo até o <EM4>marcador do local</EM4> no seu HUD e escaneando. Depois, vamos te enviar para mais alguns pontos de patrulha para escanear. \n\nPelas informações, essas turmas de naves possuem pilotos habilidosos e agressivos. É bom estar pronto para a luta caso você encontre algum deles. Seria bom ter pelo menos <EM4>dois pilotos de confiança</EM4> ao seu lado para essa missão.\n\nNo final de uma patrulha bem-sucedida, o contratante principal receberá um bônus de <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\nBoa sorte,\n\nKevin Walton\nDespachante, Foxwell Enforcement\n‘Segurança, Do Seu Jeito’\n\nA Foxwell Enforcement é uma especialista em segurança credenciada, com licença para operar em toda a UEE. Estamos sempre em busca de novos operadores para fazer parte da nossa equipe. Se você ou alguém que conhece estiver interessado, entre em contato com um dos nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sanguine" Energy Assault Rifle\n- [S1-A] Antium Arms Sand\n- [S1-A] Antium Core Sand\n- [S1-A] Antium Helmet Sand\n- [S1-A] Antium Legs Sand\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Targets x63\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_SecurityPatrol_VH_Title_001=CONTRATO DE NÍVEL VERMELHO: PATRULHA DE SEGURANÇA DE ALTO RISCO <EM4>[BP]</EM4> <EM4>[250 Rep]</EM4>
Foxwell_ShipAmbush_E_desc_001=Um fora da lei que estava fugindo finalmente voltou ao sistema. Parece que eles esperavam que o fato de desaparecerem por um tempo nos faria esquecê-los. Eles nem mesmo estão tentando esconder sua identidade ou variar sua rotina, o que significa que sabemos exatamente onde eles estarão.\n\nAs últimas informações indicam que eles estão voando em uma <EM4>~mission(AmbushTarget)</EM4> e passarão por <EM4>~mission(Location|Address)</EM4> em breve. Eu já localizei uma nuvem de emissão que é um lugar perfeito para você se proteger, desligar sua nave e esperar. A única variável real é se eles estarão sozinhos ou não. Ouvimos dizer que, às vezes, eles vão com amigos que pilotam monopostos. Fazer o primeiro ataque surpresa será importante, pois essa tripulação é testada em batalha, mas teremos reforços prontos para dar apoio se você precisar deles.\n\nFaça isso e daremos ao contratante principal um pagamento de bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4>. \n\nBoa sorte,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nA Foxwell Enforcement é uma empresa especializada em segurança licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes contratuais.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sunstone" Energy Assault Rifle\n- [S1-A] Antium Arms Jet\n- [S1-A] Antium Core Jet\n- [S1-A] Antium Legs Jet\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x2, Hostile Wave x7, Targets x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipAmbush_E_title_001=CONTRATO DE NÍVEL AMARELO: ATAQUE SURPRESA <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Foxwell_ShipAmbush_H_desc_001=Recentemente, uma <EM4>~mission(AmbushTarget)</EM4> atraiu as forças da Foxwell com um falso sinalizador de resgate. Quando nossas forças perceberam o que estava acontecendo, um esquadrão de naves desencadeou um ataque devastador e apenas um contratado da Foxwell sobreviveu. Os registros de varredura identificaram a nave-isca e, desde então, temos batedores monitorando-a.\n\nNossa vigilância revelou que o esquadrão tem um padrão de voo regular que achamos que podemos explorar. Há uma nuvem de emissão considerável em <EM4>~mission(Location|Address)</EM4>, o que a torna um local ideal para se postar. Você acha que tem o que é preciso para lidar com isso para nós? \n\nSerá você contra a <EM4>~mission(AmbushTarget)</EM4>, outra nave grande e uma escolta considerável. Gostaria de ser mais específico do que isso, mas essa tripulação faz um rodízio regular de naves dentro e fora do esquadrão. Seria inteligente trazer algum apoio para que você não seja esmagado pelo número deles.   \n\nConclua o trabalho e daremos ao contratante principal um pagamento de bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nBoa sorte,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Segurança, do seu jeito'\n\nA Foxwell Enforcement é uma empresa especializada em segurança licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes contratuais.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sunstone" Energy Assault Rifle\n- [S1-A] Antium Arms Jet\n- [S1-A] Antium Core Jet\n- [S1-A] Antium Legs Jet\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x12, Targets x5\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipAmbush_H_title_001=CONTRATO DE NÍVEL LARANJA: RETRIBUIR O FAVOR <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
Foxwell_ShipAmbush_M_desc_001=Foxwell tem rastreado uma <EM4>~mission(AmbushTarget)</EM4> usada por bandidos e descobriu um padrão para seus movimentos. A nave deve passar por <EM4>~mission(Location|Address)</EM4> em breve.\n\nProcura-se um empreiteiro disposto a se apressar até lá, esconder-se na nuvem de emissão e, em seguida, lançar a armadilha na hora certa. Normalmente, há naves de escolta com a <EM4>~mission(AmbushTarget)</EM4>. Cuidado para não se precipitar e estragar seu disfarce. O elemento surpresa é crucial, pelo que li.\n\nFaça isso e daremos ao contratante principal um pagamento de bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nBoa sorte,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Segurança, do seu jeito'\n\nA Foxwell Enforcement é uma empresa especializada em segurança licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes contratuais.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sunstone" Energy Assault Rifle\n- [S1-A] Antium Arms Jet\n- [S1-A] Antium Core Jet\n- [S1-A] Antium Legs Jet\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x5, Targets x3\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Contractor:</EM4> +2,000 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipAmbush_M_title_001=CONTRATO DE NÍVEL LARANJA: ARME UMA ARMADILHA <EM4>[BP]</EM4> <EM4>[150–2,000 Rep]</EM4>
Foxwell_ShipAmbush_S_desc_001=Recebemos várias comunicações sobre ataques recentes realizados por uma <EM4>~mission(AmbushTarget)</EM4> e suas naves de escolta. Depois de abrir um arquivo, começamos a rastrear os movimentos da nave e notamos que ela passa frequentemente por uma nuvem de emissão perto de <EM4>~mission(Location|Address)</EM4>. Queremos usar isso a nosso favor para lançar um ataque surpresa. \n\nUma vez no local, você deve se esconder na nuvem de emissão para ocultar sua assinatura o suficiente para permitir que você faça o primeiro ataque. Infelizmente, a Foxwell não pode fornecer reforços adicionais para essa operação, portanto, você será responsável por trazer quaisquer forças de apoio. Talvez você também precise de ajuda. A tripulação da ~mission(AmbushTarget) é agressiva e resistente à batalha.        \n\nFaça com que isso seja resolvido para nós e haverá um pagamento de bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4> para o contratante principal.\n\nBoa sorte,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Segurança, do seu jeito'\n\nA Foxwell Enforcement é uma empresa especializada em segurança licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes contratuais.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sunstone" Energy Assault Rifle\n- [S1-A] Antium Arms Jet\n- [S1-A] Antium Core Jet\n- [S1-A] Antium Legs Jet\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x6, Targets x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipAmbush_S_title_001=CONTRATO DE NÍVEL VERMELHO: ATAQUE SURPRESA <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
Foxwell_ShipAmbush_VE_desc_001=Topa ajudar a derrubar um elemento? \n\nFomos contratados pra caçar um fora-da-lei que tá pilotando um <EM4>~mission(AmbushTarget)</EM4>. Não deve ser difícil — ele segue a mesma rota de voo todo dia. Isso o torna um alvo perfeito pra uma emboscada, se é que já vi um. Analisei a rota e determinei que <EM4>~mission(Location|Address)</EM4> é o ponto ideal pra atacar. Tem uma nuvem de emissão lá que vai ser perfeita pra mascarar a assinatura da sua nave enquanto vocês esperam.   \n\nO serviço é simples, se você topar. Vá até o local, esconda-se, desligue os sistemas e espere eles passarem. Às vezes vêm sozinhos, mas frequentemente tão acompanhados por outras naves de assento único. Não deve ser difícil pra um profissional. Além disso, teremos reforços por perto, prontos pra entrar em ação quando rolar confusão.\n\nSe você conseguir, damos ao contratante principal um pagamento bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nBoa sorte,\n\n\nKevin Walton\nDespachante, Foxwell Enforcement\n'Security, Your Way'\n\nA Foxwell Enforcement é uma especializada em segurança licenciada pra operar em toda a UEE. Estamos sempre buscando novos operadores pra nossa família. Se você ou alguém que você conhece tiver interesse, entre em contato com um dos nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sunstone" Energy Assault Rifle\n- [S1-A] Antium Arms Jet\n- [S1-A] Antium Core Jet\n- [S1-A] Antium Legs Jet\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x6, Targets x2\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Neutral:</EM4> +500 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipAmbush_VE_title_001=CONTRATO DE NÍVEL AMARELO: EMBOSQUE UM AMADOR <EM4>[BP]</EM4> <EM4>[100–500 Rep]</EM4>
Foxwell_ShipAmbush_VH_desc_001=A Foxwell recebeu informações de um cliente importante de que os bandidos montaram um esquadrão que está perseguindo o sistema com naves subcapitais e caças de escolta. Nosso cliente está preocupado com o fato de que, se não forem controlados, os fora da lei criarão mais esquadrões de ataque e desestabilizarão a segurança do sistema. Fomos contratados para acabar com esse grupo antes que isso aconteça. \n\nPrecisamos de um prestador de serviços confiante e qualificado para essa tarefa. A boa notícia é que temos um plano em andamento. Uma das naves usadas por esse esquadrão, uma <EM4>~mission(AmbushTarget)</EM4>, foi roubada de nosso cliente, que ainda é capaz de rastrear seus movimentos. Eles compartilharam os dados de localização conosco e descobrimos que esse esquadrão costuma usar o nome <EM4>~mission(Location|Address)</EM4>. Nós examinamos o local e descobrimos que uma grande nuvem de emissão é um ponto ideal para uma emboscada.  \n\nNão vou mentir, isso não vai ser fácil. Não temos nenhuma força adicional disponível para mobilizar, portanto, seria bom trazer seu próprio apoio. \n\nSe você conseguir fazer isso, providenciei um pagamento de bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4> para o contratante principal.\n\nBoa sorte,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Segurança, do seu jeito'\n\nA Foxwell Enforcement é uma empresa especializada em segurança licenciada para operar em toda a UEE. Estamos sempre procurando novos operadores para se juntarem à nossa família. Se você ou alguém que você conhece estiver interessado, entre em contato com um de nossos representantes contratuais.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax "Sunstone" Energy Assault Rifle\n- [S1-A] Antium Arms Jet\n- [S1-A] Antium Core Jet\n- [S1-A] Antium Legs Jet\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 5/7 | Risk 7/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Ace Pilots x1, Hostile Allies x1, Hostile Wave x11, Targets x4\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipAmbush_VH_title_001=CONTRATO DE NÍVEL VERMELHO: EMBOSQUE ESQUADRÃO DE ATAQUE <EM4>[BP]</EM4> <EM4>[250 Rep]</EM4>
Foxwell_ShipWaveAttack_ClearHostiles_Desc_E_001=Ok, isso pode ser meio puxado pra fazer sozinho, então se tiver alguns favores pra cobrar, talvez seja uma boa hora de usar essas fichas. Tem um grupo de desesperados atacando naves de entrega por todo este setor e fomos encarregados de dar um fim neles.\n\nQuando sua equipe estiver pronta, vá até ~mission(Location|Address) e elimine os hostis por lá. Agora, esses desgraçados são meio espertos, então costumam se dividir em grupos menores. Certifique-se de ficar por lá até limpar cada um deles.\n \nBoa sorte,\n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança licenciada para operar em todo o UEE. Estamos sempre procurando novos operadores para se juntar à nossa equipe. Se você ou alguém que conhece tiver interesse, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x12\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipWaveAttack_ClearHostiles_Desc_H_001=Parece que algumas gangues pequenas decidiram juntar recursos e começar a fazer ataques coordenados. Sozinhas não eram grande coisa, mas juntas estão se tornando uma ameaça séria que precisa ser resolvida.\n\nRecrute alguns reforços de confiança e voe até ~mission(Location|Address). Assim que atacar os primeiros membros da gangue que encontrar por lá, os outros grupos vão chegar para apoiar. Certifique-se de permanecer até eliminar todos eles.\n \nBoa sorte,\n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança licenciada para operar em todo o UEE. Estamos sempre procurando novos operadores para se juntar à nossa equipe. Se você ou alguém que conhece tiver interesse, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 6/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x22\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipWaveAttack_ClearHostiles_Desc_M_001=Um grupo dissidente de fora-da-lei se separou de uma das gangues principais do sistema e está tentando agir por conta própria. Pelo tanto de problemas que vêm causando, está claro que querem construir reputação o mais rápido possível. Caberá a você e à sua equipe de apoio colocar um fim nisso.\n\nQuando sua equipe estiver pronta, vá até ~mission(Location|Address) e enfrente a gangue. Nem todos estarão esperando no local. Espere reforços chegando assim que o ataque começar. Apenas certifique-se de permanecer até que todos tenham sido eliminados.\n \nBoa sorte,\n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança licenciada para operar em todo o UEE. Estamos sempre procurando novos operadores para se juntar à nossa equipe. Se você ou alguém que conhece tiver interesse, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Wave x13\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Foxwell_ShipWaveAttack_ClearHostiles_Desc_VE_001=Há um pequeno grupo de criminosos marcando território e atacando qualquer cargueiro que chegue perto demais. Só que eles ficaram gananciosos demais, e agora alguém está pagando a gente para lidar com eles.\n\nQuando você e quem for levar estiverem prontos, vá até ~mission(Location|Address) e enfrente esses criminosos. Como eles gostam de voar em bandos separados, certifique-se de ficar por lá até eliminar todos.\n \nBoa sorte,\n\nMarcus Clenn\nFoxwell Enforcement\n'Segurança do Seu Jeito'\n\nA Foxwell Enforcement é uma especialista em segurança licenciada para operar em todo o UEE. Estamos sempre procurando novos operadores para se juntar à nossa equipe. Se você ou alguém que conhece tiver interesse, entre em contato com um de nossos representantes de contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Parallax Energy Assault Rifle\n- [S1-A] Antium Arms\n- [S1-A] Antium Core\n- [S1-A] Antium Helmet\n- [S1-A] Antium Legs\n- [S1-A] Parallax Rifle Battery (80 Cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
