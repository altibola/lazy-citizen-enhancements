InterSec_SecurityPatrol_H_Desc_001=ESPECIFICAÇÕES DA MISSÃO\n\nÁrea de Operação: Sistema Nyx\nForças Inimigas: Fora-da-lei\nEspecificações de Equipamento: Naves de combate\nBriefing: A InterSec recebeu informações de que foras da lei estão planejando atacar um alvo dentro da UEE. Para evitar que isso aconteça, precisamos de um contratante para patrulhar um setor que acreditamos estar sendo usado pelos foras da lei para se prepararem para o ataque.\n\nA atividade de foras da lei neste setor está mais alta do que o normal, por isso a InterSec recomenda que você <EM4>traga reforços</EM4>. Quando pronto, dirija-se ao <EM4>marcador de localização</EM4> no seu HUD e escaneie os pontos de passagem ao longo da rota. Uma vez que você tenha confirmado que todo o setor está limpo, o contratante principal receberá um bônus de <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\nAtenciosamente,\nDeacon Tobin\nGerente de Operações\nInterSec Defense Solutions\n\nEsta comunicação consiste em uma oferta não vinculativa que, após aceitação, pode ser imediatamente encerrada por qualquer uma das partes sem aviso prévio. Todas as operações são realizadas por conta e risco do contratante, devendo aderir à legislação do sistema quando aplicável.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Quartz "Deadfall" Energy SMG\n- Quartz "Lumen" Energy SMG\n- [S1-A] Quartz Energy SMG Battery (45 cap)\n- [S1-A] Testudo Arms Nightveil\n- [S1-A] Testudo Arms Turfwar\n- [S1-A] Testudo Core Nightveil\n- [S1-A] Testudo Core Turfwar\n- [S1-A] Testudo Helmet Nightveil\n- [S1-A] Testudo Helmet Turfwar\n- [S1-A] Testudo Legs Nightveil\n- [S1-A] Testudo Legs Turfwar\n- [S2-A] Testudo Backpack Nightveil\n- [S2-A] Testudo Backpack Turfwar\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Targets x54\n<EM4>Friendlies:</EM4> Ships to Defend x1\n<EM4>Neutral:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
