ServiceBeacon_CombatAssist_Mission_Desc=~mission(InitiatorName) está solicitando assistência de combate em ~mission(InitiatorLocation). Se aceito, você receberá ~mission(PaymentAmount) aUEC após a eliminação da ameaça.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
ServiceBeacon_CombatAssist_Mission_Spoofed_Desc=~mission(InitiatorName) está solicitando assistência de combate no espaço profundo. Se aceito, você receberá ~mission(PaymentAmount) aUEC após a eliminação da ameaça.\n\\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
ServiceBeacon_CombatAssist_Mission_Spoofed_Difficulty_Easy_Desc=[LOW THREAT]\n\n~serviceBeacon(InitiatorName) solicita assistência em combate no espaço profundo. Se aceito, você receberá ~serviceBeacon(PaymentAmount) aUEC após a ameaça ser eliminada.\n\nDistância até ~serviceBeacon(InitiatorName) : ~serviceBeacon(DistToInitiator)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
ServiceBeacon_CombatAssist_Mission_Spoofed_Difficulty_Hard_Desc=[HIGH THREAT]\n\n~serviceBeacon(InitiatorName) solicita assistência em combate no espaço profundo. Se aceito, você receberá ~serviceBeacon(PaymentAmount) aUEC após a ameaça ser eliminada.\n\nDistância até ~serviceBeacon(InitiatorName) : ~serviceBeacon(DistToInitiator)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
ServiceBeacon_CombatAssist_Mission_Spoofed_Difficulty_Medium_Desc=[MODERATE THREAT]\n\n~serviceBeacon(InitiatorName) solicita assistência em combate no espaço profundo. Se aceito, você receberá ~serviceBeacon(PaymentAmount) aUEC após a ameaça ser eliminada.\n\nDistância até ~serviceBeacon(InitiatorName) : ~serviceBeacon(DistToInitiator)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
