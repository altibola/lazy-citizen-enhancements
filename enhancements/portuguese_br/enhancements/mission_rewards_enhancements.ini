Hockrow_FacilityDelve_P2M3_Repeat_desc=Agência Hockrow \nArquivo de Caso #JD10285\nInvestigador Principal: Arken Mallor\n\nAtualização do Caso:\nUm dos maiores problemas quando se trata de investigações em andamento é a inteligência ficando desatualizada. Para ajudar a aliviar isso, vou mandar você voltar para Onyx e pegar os dados mais recentes dos sensores sísmicos. Seria bom ver o que as últimas leituras indicam.\n\nAções do Investigador Contratado:\nExplore a ala de <EM4>Pesquisa</EM4> e <EM4>recupere os dados Sísmicos</EM4> e entregue-os a <EM4>~mission(Destination|Address)</EM4>.\n\nNotas Adicionais:\nFique atento a possíveis forças hostis no local.\n\nViaje até Onyx em um veículo que possa ser armazenado em um hangar grande.\n\nAssim que você entregar esses dados, enviarei a você um <EM4>ASD Secure Drive</EM4> que você poderá coletar no seu local de residência.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Zenith "Thunderstrike" Laser Sniper Rifle\n- [S1-A] Corbel Arms Halcyon\n- [S1-A] Corbel Core Halcyon\n- [S1-A] Corbel Helmet Halcyon\n- [S1-A] Corbel Legs Halcyon\n- [S1-A] Geist Armor Arms Desert\n- [S1-A] Geist Armor Arms Whiteout\n- [S1-A] Geist Armor Core Desert\n- [S1-A] Geist Armor Core Whiteout\n- [S1-A] Geist Armor Helmet Desert\n- [S1-A] Geist Armor Helmet Whiteout\n- [S1-A] Geist Armor Legs Desert\n- [S1-A] Geist Armor Legs Whiteout\n- [S1-A] Zenith Laser Sniper Rifle Battery (22 Cap)\n- [S3-A] Novikov Backpack Halcyon\n\n<EM3>ITEM REWARDS</EM3>\n- ASD Secure Drive\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Blueprint Reward:</EM4> Guaranteed
