Hockrow_FacilityDelve_P2M1_desc=Agência Hockrow \nArquivo do Caso #JD10285\nInvestigador Responsável: Arken Mallor\n\nAtualização do Caso: \nRevendo os arquivos recentes do Dr. Jorrit que você enviou, ficamos com mais perguntas do que respostas. Sabemos, com certeza, que o doutor esteve dentro da Onyx, mas ainda não sabemos exatamente o que ele estava fazendo. O cliente está ansioso para que descobramos mais sobre as atividades do Jorrit, então teremos que voltar lá.\n\nTenho algumas ideias sobre como podemos usar os sistemas da instalação para rastrear as atividades do Dr. Jorrit, mas desta vez você terá que trazer os dados fisicamente para que possamos analisá-los corretamente. O primeiro passo são os sensores de energia em Engenharia. Eles ainda estão ativos e sensíveis o suficiente para detectar qualquer leitura anômala.\n\nAções do Investigador Contratado:\nExplore a ala de <EM4>Engenharia</EM4> e <EM4>recupere os dados da Anomalia de Energia</EM4> e entregue-os em <EM4>~mission(Destination|Address)</EM4>.\n\nNotas Adicionais:\nCuidado com possíveis forças hostis no local.\n\nViaje para Onyx em um veículo que possa ser armazenado em um hangar grande.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7
