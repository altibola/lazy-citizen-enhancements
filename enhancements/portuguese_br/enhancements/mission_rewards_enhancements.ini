Eckhart_EscortShips_VH_desc=ECKHART SECURITY, LLC.\nCONTRATOS E DESPACHO\n\nTIPO DE CONTRATO: Escolta de Naves\nCódigo de aprovação = ~mission(ApprovalCode)\n\nPROCESSAMENTO IMEDIATO\n\nPreciso de um piloto altamente competente que possa reunir uma equipe igualmente capaz para uma missão de escolta. A base de mineração em <EM4>~mission(Location|Address)</EM4> está sob ataque de um grupo de fora da lei e a equipe no local não consegue sair sem ajuda. Nossos batedores relataram que os atacantes estão armados com equipamento pesado e naves poderosas.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações são destinadas apenas para o uso da pessoa ou entidade designada acima.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [B-S1-A] Havoc Scattergun\n- [B-S2-A] Hellion Scattergun\n- [B-S3-A] Predator Scattergun\n- [E-S3-A] Quarreler Cannon\n- [STH-S1-A] Mirage\n- [STH-S2-A] Umbra\n- [D-S1-A] Suckerpunch Cannon\n- [D-S2-A] Suckerpunch-L Cannon\n- [D-S3-A] Suckerpunch-XL Cannon\n- [STH-S1-B] Veil\n- [STH-S2-B] Sheut\n- [E-S1-A] M3A Cannon\n- [E-S2-A] M4A Cannon\n- [E-S3-A] M5A Cannon\n- [STH-S1-C] Shimmer\n- [STH-S2-C] Obscura\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Wave x7, Hostiles x3, Interdiction Ships x4, Reinforcements x16\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Eckhart_EscortShips_VH_title=NECESSÁRIO DETALHE DE PROTEÇÃO - ALTO RISCO <EM4>[BP]</EM4> <EM4>[250 Rep]</EM4>
Eckhart_ShipAmbush_E_desc=ECKHART SECURITY, LLC.\nCONTRATOS E DESPACHO\n\nTIPO DE CONTRATO: Emboscada de Nave\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPROCESSAMENTO IMEDIATO\n\nUm cliente nosso vem recebendo ameaças anônimas em tentativa de extorsão, e após alguma investigação rastreamos o responsável, que pilota uma <EM4>~mission(AmbushTarget)</EM4>. O cliente quer que a gente resolva o problema antes que ele aja. \n\nPelo que avaliamos, o alvo não deve ser difícil de lidar. Ele costuma passar por <EM4>~mission(Location|Address)</EM4>, onde há uma <EM4>nuvem de emissão</EM4> perfeita pra desligar os sistemas e esperar. Às vezes voa sozinho, mas pode estar com escolta leve. Planeje bem sua emboscada pra não deixar o <EM4>~mission(AmbushTarget)</EM4> escapar. Vamos alertar outros contratados da área pra dar suporte quando o confronto começar.     \n\nPagamento será feito após o sucesso da missão. O cliente também adicionou um bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4> pro contratado principal.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações são destinadas apenas para o uso da pessoa ou entidade designada acima.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] Lightstrike I Cannon\n- [E-S2-A] Lightstrike II Cannon\n- [E-S3-A] Lightstrike III Cannon\n- [STH-S1-C] SonicLite\n- [STH-S2-C] Cirrus\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Allies x2, Hostile Wave x7, Targets x2\n<EM4>Jr. Contractor:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Eckhart_ShipAmbush_E_title=HORA DE DAR UMA LIÇÃO <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Eckhart_ShipAmbush_H_desc=ECKHART SECURITY, LLC.\nCONTRATOS E DESPACHO\n\nTIPO DE CONTRATO: Emboscada de Nave\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPROCESSAMENTO IMEDIATO\n\nProcuramos um contratado experiente que possa recrutar um ala pra ajudar numa emboscada. O alvo é uma <EM4>~mission(AmbushTarget)</EM4> envolvida em várias operações contra um dos nossos clientes mais importantes. Eliminando ela de vez, a vida do cliente vai ficar bem mais fácil. Embora o foco seja a ~mission(AmbushTarget), ela costuma voar com uma escolta grande, incluindo naves pesadas. \n\nFicamos sabendo que esse grupo vai passar por <EM4>~mission(Location|Address)</EM4> em breve. Consegue chegar antes deles? O local tem uma <EM4>nuvem de emissão</EM4> onde dá pra desligar os sistemas e se esconder até o momento certo.  \n\nPagamento será feito após o sucesso da missão. O cliente sabe que essa vai ser puxada, então incluiu um bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4> pro contratado principal.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações são destinadas apenas para o uso da pessoa ou entidade designada acima.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] Lightstrike I Cannon\n- [E-S2-A] Lightstrike II Cannon\n- [E-S3-A] Lightstrike III Cannon\n- [STH-S1-C] SonicLite\n- [STH-S2-C] Cirrus\n- [E-S1-A] FL-11 Cannon\n- [E-S2-A] FL-22 Cannon\n- [E-S3-A] FL-33 Cannon\n- [STH-S1-B] DeltaMax\n- [STH-S2-B] GammaMax\n- [E-S4-A] Lightstrike IV Cannon\n- [E-S5-A] Lightstrike V Cannon\n- [E-S6-A] Lightstrike VI Cannon\n- [STH-S1-A] Slipstream\n- [STH-S2-A] Eclipse\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Allies x1, Hostile Wave x13, Targets x5\n<EM4>Sr. Contractor:</EM4> +200 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Eckhart_ShipAmbush_H_title=EMBOSCADA COMPLICADA <EM4>[BP]</EM4> <EM4>[200 Rep]</EM4>
Eckhart_ShipAmbush_Intro_desc=ECKHART SECURITY, LLC.\nCONTRATOS E DESPACHO\n\nTIPO DE CONTRATO: Emboscada Espacial\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPROCESSAMENTO IMEDIATO\n\nEstamos procurando por contratados com experiência em combate, dispostos a sujar as mãos, por assim dizer. Um dos nossos clientes foi traído por um <EM4>~mission(AmbushTarget)</EM4> e estamos esperando uma boa oportunidade pra resolver isso. Depois de semanas rastreando o alvo, identificamos <EM4>~mission(Location|Address)</EM4> como o ponto ideal pra interceptar. O local tem uma <EM4>nuvem de emissão</EM4> onde você pode desligar a nave e ficar à espreita esperando o <EM4>~mission(AmbushTarget)</EM4>.\n\nA inteligência sugere que eles podem estar acompanhados de escolta. Se estiverem, você vai ter que lidar com eles também. Como esse é seu primeiro contrato, teremos outros contratados na área prontos pra dar apoio quando o ataque começar.\n\nO pagamento será feito após a conclusão bem-sucedida do contrato. Há também um bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4> pro contratante principal.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações são destinadas ao uso exclusivo do indivíduo ou entidade designada acima.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] Lightstrike I Cannon\n- [E-S2-A] Lightstrike II Cannon\n- [E-S3-A] Lightstrike III Cannon\n- [STH-S1-C] SonicLite\n- [STH-S2-C] Cirrus\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Allies x1, Hostile Wave x6, Targets x2\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Eckhart_ShipAmbush_Intro_title=NOVA OPORTUNIDADE - ATAQUE SURPRESA <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Eckhart_ShipAmbush_M_desc=ECKHART SECURITY, LLC.\nCONTRATOS E DESPACHO\n\nTIPO DE CONTRATO: Emboscada Espacial\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPROCESSAMENTO IMEDIATO\n\nPrecisamos de alguém pra eliminar um <EM4>~mission(AmbushTarget)</EM4> e lidar com as naves de escolta que o protegem. Eles já interferiram em várias das nossas operações e estão virando um problema sério nos casos da Eckhart Security. Não sabemos o que eles querem, mas isso vai deixar de importar quando você acabar com eles.\n\nEspalhamos um boato de que estaríamos trabalhando num serviço em <EM4>~mission(Location|Address)</EM4>, o que deve servir de isca pra atrair o alvo. O local é perfeito pra uma emboscada por causa da <EM4>nuvem de emissão</EM4>, um ótimo lugar pra desligar a nave e esperar o momento certo de atacar. Se estiver disponível, o <EM4>~mission(AmbushTarget)</EM4> e suas escoltas devem passar por lá em breve.   \n\nO pagamento será feito após a conclusão bem-sucedida do contrato. O contratante principal também receberá um bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações são destinadas ao uso exclusivo do indivíduo ou entidade designada acima.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] Lightstrike I Cannon\n- [E-S2-A] Lightstrike II Cannon\n- [E-S3-A] Lightstrike III Cannon\n- [STH-S1-C] SonicLite\n- [STH-S2-C] Cirrus\n- [E-S1-A] FL-11 Cannon\n- [E-S2-A] FL-22 Cannon\n- [E-S3-A] FL-33 Cannon\n- [STH-S1-B] DeltaMax\n- [STH-S2-B] GammaMax\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Allies x1, Hostile Wave x6, Targets x3\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Eckhart_ShipAmbush_M_title=LANCE UM ATAQUE SURPRESA <EM4>[BP]</EM4> <EM4>[150 Rep]</EM4>
Eckhart_ShipAmbush_S_desc=ECKHART SECURITY, LLC.\nCONTRATOS E DESPACHO\n\nTIPO DE CONTRATO: Emboscada Espacial\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPROCESSAMENTO IMEDIATO\n\nRecentemente enviamos um contratado atrás de um <EM4>~mission(AmbushTarget)</EM4> que liderava uma equipe atacando as operações de um cliente muito importante. Infelizmente, era uma armadilha e perdemos gente boa. Não podemos deixar o alvo escapar de novo, então decidimos dar a eles um pouco do próprio veneno.  \n\nFazer uma emboscada parece a melhor opção, e já identificamos um bom ponto pra isso. Há uma <EM4>nuvem de emissão</EM4> perto de <EM4>~mission(Location|Address)</EM4> que o alvo e sua equipe costumam sobrevoar. Você pode desligar a nave e se esconder lá até o momento certo de atacar. Essa equipe é cruel e extremamente habilidosa. Não cometa o mesmo erro do último contratado e não vá sozinho. O ideal é levar alguns aliados de confiança pra ajudar a lidar com essa tripulação.    \n\nO pagamento será feito após a conclusão bem-sucedida do contrato. Além disso, daremos um bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4> pro contratante principal por eliminar o alvo.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações são destinadas ao uso exclusivo do indivíduo ou entidade designada acima.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] Lightstrike I Cannon\n- [E-S2-A] Lightstrike II Cannon\n- [E-S3-A] Lightstrike III Cannon\n- [STH-S1-C] SonicLite\n- [STH-S2-C] Cirrus\n- [E-S1-A] FL-11 Cannon\n- [E-S2-A] FL-22 Cannon\n- [E-S3-A] FL-33 Cannon\n- [STH-S1-B] DeltaMax\n- [STH-S2-B] GammaMax\n- [E-S4-A] Lightstrike IV Cannon\n- [E-S5-A] Lightstrike V Cannon\n- [E-S6-A] Lightstrike VI Cannon\n- [STH-S1-A] Slipstream\n- [STH-S2-A] Eclipse\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 6/7\n<EM4>Hostiles:</EM4> Hostile Allies x1, Hostile Wave x10, Targets x1\n<EM4>Head Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Eckhart_ShipAmbush_S_title=EMBOSCADA ALTAMENTE PERIGOSA <EM4>[BP]</EM4> <EM4>[300 Rep]</EM4>
Eckhart_ShipAmbush_VE_desc=ECKHART SECURITY, LLC.\nCONTRATOS E DESPACHO\n\nTIPO DE CONTRATO: Emboscada Espacial\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPROCESSAMENTO IMEDIATO\n\nUm dos nossos clientes vem sofrendo assédio constante, então chegou a hora de mandar um recado claro eliminando o <EM4>~mission(AmbushTarget)</EM4> deles. Esse sujeito segue uma rotina bem previsível, o que o torna um alvo fácil pra uma emboscada. Identificamos <EM4>~mission(Location|Address)</EM4> como o local ideal. O ponto tem uma <EM4>nuvem de emissão</EM4> onde dá pra desligar a nave e esperar o momento certo.\n\nAh, o <EM4>~mission(AmbushTarget)</EM4> costuma voar sozinho, mas às vezes é acompanhado por uma nave de assento único. Nenhum dos dois deve dar muito trabalho, mas temos outros contratados na área que podem dar apoio quando o ataque começar.\n\nO pagamento será feito após a conclusão bem-sucedida do contrato. Há também um bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4> pro contratante principal.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações são destinadas ao uso exclusivo do indivíduo ou entidade designada acima.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] Lightstrike I Cannon\n- [E-S2-A] Lightstrike II Cannon\n- [E-S3-A] Lightstrike III Cannon\n- [STH-S1-C] SonicLite\n- [STH-S2-C] Cirrus\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Allies x1, Hostile Wave x6, Targets x2\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
Eckhart_ShipAmbush_VE_title=ACERTAR AS CONTAS <EM4>[BP]</EM4> <EM4>[100 Rep]</EM4>
Eckhart_ShipAmbush_VH_desc=ECKHART SECURITY, LLC.\nCONTRATOS E DESPACHO\n\nTIPO DE CONTRATO: Emboscada Espacial\nCÓDIGO DE APROVAÇÃO = ~mission(ApprovalCode)\n\nPROCESSAMENTO IMEDIATO\n\nUm cliente de alto perfil perdeu uma carga importante recentemente quando um piloto o traiu e fugiu com o produto. Depois de semanas caçando, descobrimos que o traidor tem ligação com um bando de fora-da-lei. O cliente quer garantir que isso não aconteça de novo. O alvo é o piloto de um <EM4>~mission(AmbushTarget)</EM4>, líder da equipe responsável. Isso não vai ser fácil. Eles nunca viajam sem caças de escolta e naves de médio porte. Por isso, recomendamos fortemente que você leve aliados de confiança pra essa missão.  \n  \nDe acordo com a inteligência coletada, eles costumam sobrevoar uma <EM4>nuvem de emissão</EM4> próxima de <EM4>~mission(Location|Address)</EM4>, o que oferece uma excelente área pra montar um ataque surpresa.\n\nO pagamento será feito após a conclusão bem-sucedida do contrato. Também adicionamos um bônus de <EM4>~mission(ScripAmount) MG Scrip</EM4> pro contratante principal.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações são destinadas ao uso exclusivo do indivíduo ou entidade designada acima.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [E-S1-A] Lightstrike I Cannon\n- [E-S2-A] Lightstrike II Cannon\n- [E-S3-A] Lightstrike III Cannon\n- [STH-S1-C] SonicLite\n- [STH-S2-C] Cirrus\n- [E-S1-A] FL-11 Cannon\n- [E-S2-A] FL-22 Cannon\n- [E-S3-A] FL-33 Cannon\n- [STH-S1-B] DeltaMax\n- [STH-S2-B] GammaMax\n- [E-S4-A] Lightstrike IV Cannon\n- [E-S5-A] Lightstrike V Cannon\n- [E-S6-A] Lightstrike VI Cannon\n- [STH-S1-A] Slipstream\n- [STH-S2-A] Eclipse\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 5/7 | Risk 7/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Hostile Allies x1, Hostile Wave x12, Targets x4\n<EM4>Veteran Contractor:</EM4> +250 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
