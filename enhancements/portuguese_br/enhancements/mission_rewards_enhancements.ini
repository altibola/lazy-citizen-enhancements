Shubin_Industrial_HandMining_Nyx_M_PlanetarySystem_Desc_001=CONTRATO: Ordem de Mineração\nLOCALIZAÇÃO: Nyx\n\nDETALHES:\nUma de nossas equipes de prospecção confirmou recentemente que os asteroides que abrigam as estações QV Breaker ao longo do Cinturão Keeger em Nyx contêm um tipo raro de minério, Sadaryx.\n\nNo entanto, devido à dificuldade de acesso a essas estações e aos riscos inerentes envolvidos, estamos buscando equipes de mineração externas para realizar a extração.\n\nNão temos uma localização confirmada de onde os depósitos de Sadaryx estão dentro da estação, mas recomendamos começar pelas seções de cavernas onde os minerais se formam naturalmente. Se tiver muita sorte, você pode até encontrar alguns cristais armazenados que foram minerados pelas antigas equipes da QV.\n\n<EM4>TERMOS*:</EM4>\nSua equipe precisará obter acesso a uma <EM4>Estação QV Breaker</EM4>, coletar o <EM4>minério Sadaryx</EM4> necessário e entregá-lo no elevador de carga localizado em <EM4>~mission(Destination|Address)</EM4>.\n\nIsso exigirá uma <EM4>Multi-Tool com Acessório de Mineração</EM4> e um conhecimento básico de mineração manual.\n\nNossas equipes de prospecção relataram que essas estações podem ter sido infiltradas por fora da lei. Cautela é recomendada.\n\n*Ao aceitar este contrato, você assume todos os riscos associados ao trabalho descrito aqui e, de forma alguma, a Shubin Interstellar poderá ser responsabilizada por quaisquer danos ocorridos durante a vigência do contrato.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Jr. Contractor:</EM4> +100 Rep
Shubin_Industrial_HandMining_Nyx_M_PlanetarySystem_Title_001=PEQUENA ORDEM DE MINERAÇÃO: Sadaryx <EM4>[100 Rep]</EM4>
Shubin_Industrial_HandMining_Pyro_E_Local_Desc_001=PUBLICAÇÃO: Ordem de Compra\nLOCALIZAÇÃO: <EM4>~mission(System) </EM4>\n\nTESTE DE PRÉVIA TECNOLÓGICA:\nComplete esta missão para obter projetos de armas Volt. Para este teste, esses projetos possuem alguns slots que aceitam diferentes materiais para ajustes variados de atributos.\n\n~mission(Hint_Location) Para uma lista completa de onde encontrar esses minerais, consulte <EM4>Fundamentos da Mineração #2: Onde Minerar</EM4> no seu Journal do mobiGlas. Já que estará lá, sinta-se à vontade para ler também a primeira parte <EM4>Fundamentos da Mineração #1: Visão Geral Básica</EM4> se quiser relembrar como obter os materiais.\n\nComo esta é uma ordem de compra e não um contrato de mineração, espera-se que você forneça seu próprio equipamento, como um <EM4>~mission(Hint_Tool)</EM4>.\n\n\n\nQuando estiver pronto para nos vender os materiais necessários, deposite-os no elevador de carga localizado em <EM4>~mission(Destination|Address)</EM4>.\n\n*Ao aceitar este contrato, você assume todos e quaisquer riscos associados ao trabalho descrito aqui e, de forma alguma, a Shubin Interstellar poderá ser responsabilizada por quaisquer danos ocorridos durante a vigência do contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Arclight "Desert Shadow" Pistol\n- Arclight "Herrero" Pistol\n- [S1-A] Arclight Pistol Battery (30 cap)\n- [S1-A] Novikov Exploration Suit\n- [S1-A] Novikov Helmet\n- [S1-A] Pembroke Exploration Suit\n- [S1-A] Pembroke Helmet\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 5/7 | Knowledge 4/7\n<EM4>Neutral:</EM4> +100 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
