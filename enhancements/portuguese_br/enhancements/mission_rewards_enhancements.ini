shubin_claimsweep_desc_easy=POSTAGEM: Segurança / Mercenários \nLocalização: ~mission(LagrangeLocation)\nExperiência Profissional: Piloto de Caça (experiência militar é uma vantagem)\nTERMOS*: \nAcabamos de saber que um empreiteiro Shubin foi expulso de uma de nossas reivindicações por bandidos que estão lá operam ilegalmente. Para piorar a situação, eles criaram algumas sentinelas orbitais para se protegerem enquanto exploram. \n\nNossa esperança é contratar um mercenário que possa localizar e destruir os guardas em ~mission(Location). Se você se deparar com um minerador ilegal, lembre-se de que é comum esses caras pedirem reforços. Talvez seja melhor neutralizá-los o mais rápido possível antes que possam fazer isso. \n\n\n\n\n*Shubin Interstellar é uma empresa que oferece oportunidades iguais. Ao aceitar este contrato, você assume todos os riscos associados ao trabalho aqui descrito e a Shubin Interstellar não pode ser responsabilizada de forma alguma por quaisquer danos decorrentes durante a vigência do contrato.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x3, Prospectors x1\n<EM4>Turrets:</EM4> 1 (hostile)
shubin_claimsweep_desc_hard=POSTAGEM: Segurança / Mercenários \nLocal: ~mission(LagrangeLocation)\nExperiência Profissional: Piloto de Caça (experiência militar é um plus)\nTERMOS*: \nUma equipe de mineração local independente de Stanton trabalhou como empreiteira para Shubin Interstellar em ~mission(Location), quando uma força inimiga atacou e assumiu o controle da instalação. Acreditamos que os perpetradores ainda estão no local e estão usando o equipamento ali deixado para extrair o valioso minério para si próprios.\n\nEntre os equipamentos perdidos estava um punhado de sentinelas orbitais que infelizmente estavam desaparecidas no momento do ataque, não estavam ainda totalmente operacional. Varreduras de longo alcance da reivindicação nos levaram à conclusão de que os bandidos ativaram os Guardas Orbitais e os estão usando para proteger suas operações ilegais.\n\nPara retomar o local, estamos procurando empreiteiros para irem à ~mission(Location), os Guardas Orbitais destroem e limpam a área dos mineiros inimigos. A eficiência é altamente recomendada, pois há um alto risco de que eles peçam reforços quando perceberem que estão sendo expulsos. \n\n\n\n\n*Shubin Interstellar é uma empresa que oferece oportunidades iguais. Ao aceitar este contrato, você assume todos os riscos associados ao trabalho aqui descrito e a Shubin Interstellar não pode ser responsabilizada de forma alguma por quaisquer danos incorridos durante a vigência do contrato.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x5, Prospectors x4\n<EM4>Turrets:</EM4> 4 (hostile)
shubin_claimsweep_desc_intro=POSTAGEM: Segurança / Mercenários \nLocalização: ~mission(LagrangeLocation)\nExperiência Profissional: Piloto de Caça (experiência militar é uma vantagem)\nTERMOS*: \nFoi recentemente descoberto que uma área de mineração de Shubin estava sendo saqueada ilegalmente por um mineiro renegado. Embora o próprio mineiro não pareça estar roubando mais minério da área, ele deixou para trás uma sentinela orbital cujas capacidades ofensivas estão nos impedindo de retomar a área.\n\nEstamos procurando um mercenário disposto a ir para ~mission(Location) para viajar, caçar a sentinela e destruí-la em preparação para a retomada da área por Shubin.\n\n\n\n\n*Shubin Interstellar é uma empresa que oferece oportunidades iguais. Ao aceitar este contrato, você assume todos os riscos associados ao trabalho aqui descrito e a Shubin Interstellar não pode ser responsabilizada de forma alguma por quaisquer danos decorrentes durante a vigência do contrato.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Turrets:</EM4> 1 (hostile)
shubin_claimsweep_desc_med=POSTAGEM: Segurança / Mercenário \nLocalização: ~mission(LagrangeLocation)\nExperiência profissional: Piloto de Caça (experiência militar é um plus)\nTERMOS*: \nUm local de mineração Shubin Interstellar recentemente adquirido, aguardando processamento, foi invadido por um grupo de mineração renegado , que rouba ativamente minério do local. Embora as autoridades locais tenham sido notificadas, há temores de que bens valiosos possam ser roubados antes que uma investigação oficial possa ser iniciada.\n\nPortanto, como é nosso direito como detentores de reivindicações, gostaríamos de solicitar uma força mercenária para responder à ~mission(Location) e destruir os vários postos de guarda orbitais que protegem esta operação ilegal. Aconselhamos cautela, pois ainda pode haver alguns mineiros ilegais neste local, juntamente com quaisquer reforços que eles reúnam. \n\n\n\n\n*Shubin Interstellar é uma empresa que oferece oportunidades iguais. Ao aceitar este contrato, você assume todos os riscos associados ao trabalho aqui descrito e a Shubin Interstellar não pode ser responsabilizada de forma alguma por quaisquer danos decorrentes durante a vigência do contrato.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x4, Prospectors x2\n<EM4>Turrets:</EM4> 3 (hostile)
shubin_claimsweep_desc_rand=POSTAGEM: Segurança / Mercenários \nLocalização: ~mission(LagrangeLocation)\nExperiência Profissional: Piloto de Caça (experiência militar é uma vantagem)\nTERMOS*: \nAo investigar as alegações de Shubin neste setor, ficamos desapontados ao descobrir que existe um A um pequeno grupo de bandidos se estabeleceu em ~mission(Location) e está minerando recursos ilegalmente lá. Pior, eles criaram um perímetro defensivo com vários guardas orbitais ao redor do local, tornando difícil expulsá-los. \nPara que possamos recuperar a posse da área, procuramos mercenários para encontrar e destruir os poucos guardas orbitais. A tarefa é ainda mais complicada pelo facto de não sabermos exactamente quão fortes são estes mineiros fora da lei. Se tiverem a oportunidade de chamar reforços, esperem desde um pequeno contingente até uma força completa de combatentes treinados. \n\n\n\n\n*Shubin Interstellar é uma empresa que oferece oportunidades iguais. Ao aceitar este Contrato, você assume todos os riscos associados ao trabalho aqui descrito e a Shubin Interstellar não será de forma alguma responsabilizada por quaisquer danos decorrentes durante a vigência do Contrato.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Hostiles:</EM4> Hostile Wave x32, Prospectors x5\n<EM4>Turrets:</EM4> 4 (hostile)
shubin_rockcracker_pvp_desc_01=CONTRATO: Transferência de Direitos de Mineração\nLOCALIZAÇÃO: Nyx\n\nDETALHES:\nProspectores da Shubin Interstellar descobriram recentemente a localização de uma Estação Breaker da QV Planetary Service abandonada próxima ao cinturão Keeger. Essas estações eram originalmente usadas pela empresa, hoje extinta, para extrair recursos valiosos do interior de asteroides, mas o conhecimento de suas localizações exatas foi perdido ao longo dos anos.\n\nEmbora esta estação específica esteja offline, nossa equipe de reconhecimento acredita que ela pode voltar a funcionar com os reparos necessários. Além disso, caso seja reativada, já existe um asteroide rico em recursos posicionado e pronto para ser fragmentado pelo laser de mineração da estação.\n\nInfelizmente, com todos os desafios envolvidos em operar em Nyx, a Shubin atualmente não possui recursos disponíveis para lidar com esses reparos por conta própria. Isso, no entanto, criou uma oportunidade para uma operação de mineração independente interessada, como a sua.\n\n<EM4>TERMOS*:</EM4>\nEstamos disponibilizando os <EM4>direitos de mineração compartilhados</EM4> desta QV Breaker Station. Após a compra, forneceremos as coordenadas da estação para você e sua tripulação. (Lembre-se, qualquer outra parte interessada que comprar os direitos de mineração também terá acesso à estação.) Sua equipe poderá então ir até lá com uma <EM4>nave de mineração</EM4>, restaurar o <EM4>laser de mineração da estação</EM4> para status operacional, fragmentar o asteroide e <EM4>extrair os recursos</EM4> do interior.\n\nObserve que, como este é um contrato compartilhado, podemos oferecer esses direitos de mineração a um preço reduzido, porém os recursos do asteroide estarão disponíveis em regime de <EM4>ordem de chegada</EM4> para qualquer outra equipe de mineração no local. Também existe a possibilidade de outras partes interessadas, como fora-da-lei, descobrirem a localização da estação por conta própria. Proceda com cautela.\n\n*Ao aceitar este contrato você assume todos os riscos associados ao trabalho descrito e, sob nenhuma circunstância, a Shubin Interstellar poderá ser responsabilizada por quaisquer danos ocorridos durante a duração do contrato.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 "Kismet" Shotgun\n- R97 "Righteous" Shotgun\n- [S1-A] Monde Arms Delta Camo\n- [S1-A] Monde Arms Hemlock Camo\n- [S1-A] Monde Core Delta Camo\n- [S1-A] Monde Core Hemlock Camo\n- [S1-A] Monde Helmet Delta Camo\n- [S1-A] Monde Helmet Hemlock Camo\n- [S1-A] Monde Legs Delta Camo\n- [S1-A] Monde Legs Hemlock Camo\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Blueprint Reward:</EM4> Guaranteed
