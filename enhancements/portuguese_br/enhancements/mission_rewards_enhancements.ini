HeadHunters_DefendEntitesAndEscort_VE_Desc=Não vou entrar em detalhes, mas pode confiar que <EM4>~mission(Location|Address)</EM4> é importante pros Headhunters. Então imagina minha raiva ao saber que estão sendo atacados por uns novatos agressivos tentando destruir os <EM>~mission(Objects)</EM4> deles.\n\nVai até lá e garante a proteção antes que tudo vá pro espaço, incluindo quaisquer <EM4>naves aliadas</EM4> na área. Esses idiotas não devem dar muito trabalho pra alguém como você.\n\nAcaba com todos eles e eu pago <EM4>~mission(ScripAmount) Council Scrip</EM4> pra quem aceitar esse trampo.\n\n- Stows\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n<EM4>[Nyx]</EM4>\n- [CIV-S0-B] Cryo-Star SL\n- [CIV-S0-B] Kelvid\n- [CIV-S0-D] Winter-Star SL\n- [CIV-S1-B] Cryo-Star\n- [CIV-S1-B] Endo\n- [CIV-S1-B] FlashFreeze\n- [CIV-S1-D] BlastChill\n- [CIV-S1-D] Winter-Star\n- [CIV-S2-B] Cryo-Star EX\n- [CIV-S2-B] FullFrost\n- [CIV-S2-B] Taiga\n- [CIV-S2-D] WhiteOut\n- [CIV-S2-D] Winter-Star EX\n- [CIV-S3-B] Cryo-Star XL\n- [CIV-S3-B] FrostBite\n- [CIV-S3-D] ColdSurge\n- [CIV-S3-D] Winter-Star XL\n\n<EM4>[Pyro]</EM4>\n- [CIV-S0-D] DuraJet\n- [CIV-S1-D] ZapJet\n- [CIV-S2-A] Lotus\n- [CIV-S2-D] SparkJet\n- [CIV-S3-A] TigerLilly\n- [CIV-S3-D] SparkJet Pro\n- [IND-S0-B] Defiant\n\n<EM4>[Stanton]</EM4>\n- [CIV-S0-C] PIN\n- [CIV-S1-B] 6SA 'Arbiter'\n- [CIV-S1-B] HEX\n- [CIV-S1-C] 5SA 'Rhada'\n- [CIV-S1-C] WEB\n- [CIV-S2-B] 6MA 'Kozane'\n- [CIV-S2-B] BLOC\n- [CIV-S2-C] 5MA 'Chimalli'\n- [CIV-S2-C] STOP\n- [CIV-S3-B] 6CA 'Bila'\n- [CIV-S3-C] 5CA 'Akura'\n- [CIV-S3-C] GUARD\n\n<EM3>ITEM REWARDS</EM3>\n- Council Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Standard\n<EM4>Difficulty (1-7):</EM4> Combat 3/7 | Complexity 3/7 | Risk 3/7 | Knowledge 3/7\n<EM4>Hostiles:</EM4> Hostile Wave x5, Reinforcements x3\n<EM4>Friendlies:</EM4> Escort Wings x2\n<EM4>Rep:</EM4> +100\n<EM4>Blueprint Reward:</EM4> Guaranteed
