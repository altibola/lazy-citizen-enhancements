bhg_bounty_desc_ShatteredBlade_001=--------------------------------------------------------\n-------------- CONTRATO DE CAÇA À RECOMPENSA ---------------\n--------------------------------------------------------\n\nGUILDA DOS CAÇADORES DE RECOMPENSA\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Guilda dos Caçadores de Recompensa autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName)\nSISTEMA: Nyx\nAVALIAÇÃO DE RISCO: Alta\nÚLTIMA LOCALIZAÇÃO CONHECIDA: ~mission(Location|Address)\nAFILIAÇÕES CONHECIDAS: Shattered Blade\nNOTAS: O Shattered Blade é conhecido por atacar Vanduul a fim de adquirir e vender tecnologias de mercado negro, no entanto, também foram reportados usando violência contra figuras de autoridade que interferem em seus negócios.\n\nGUILDA DOS CAÇADORES DE RECOMPENSA\nEm Busca da Justiça\n\nA Guilda dos Caçadores de Recompensa é um serviço de segurança sancionado pela Guilda dos Mercenários e autorizado a operar tanto na UEE quanto além, de acordo com os Atos da Autoridade Xenotrade.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Defenders x18, Targets x2\n<EM4>Probationary Guild Member:</EM4> +500 Rep (Failure: -250)\n<EM4>Probationary Guild Member:</EM4> +1,000 Rep (Failure: -500)\n<EM4>Probationary Guild Member:</EM4> +2,000 Rep (Failure: -1,000)\n<EM4>Probationary Guild Member:</EM4> +8,000 Rep (Failure: -4,000)\n<EM4>Probationary Guild Member:</EM4> +16,000 Rep (Failure: -8,000)\n<EM4>Blueprint Reward:</EM4> Guaranteed
bhg_bounty_desc_XT_001=--------------------------------------------------------\n----------------- CONTRATO DE CAÇA -----------------\n--------------------------------------------------------\n\nGUILDA DOS CAÇADORES DE RECOMPENSAS\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Guilda dos Caçadores de Recompensas autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName)\nSISTEMA: ~mission(System)\nAVALIAÇÃO DE RISCO: ~mission(Danger)\nÚLTIMA LOCALIZAÇÃO CONHECIDA: ~mission(Location|Address)\nAFILIAÇÕES CONHECIDAS: XenoThreat\nNOTAS: Xenothreat tem demonstrado agressão não provocada contra qualquer força de segurança ou policial. Existe uma boa chance de que eles estejam acompanhados por outros membros do grupo, então tenha cautela ao confrontá-los.\n\nGUILDA DOS CAÇADORES DE RECOMPENSAS\nEm Busca da Justiça\n\nA Guilda dos Caçadores de Recompensas é um serviço de segurança autorizado pela Guilda dos Mercenários e autorizado a operar tanto na UEE quanto além, conforme os Atos da Autoridade Xenotrade.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 7/7 | Complexity 7/7 | Risk 7/7 | Knowledge 7/7\n<EM4>Hostiles:</EM4> Defenders x17, Targets x1\n<EM4>Probationary Guild Member:</EM4> +16,000 Rep\n<EM4>Failure Penalty:</EM4> -8,000 Rep
bhg_bounty_desc_gen_001=--------------------------------------------------------\n----------------- CONTRATO DE CAÇA -----------------\n--------------------------------------------------------\n\nGUILDA DOS CAÇADORES DE RECOMPENSAS\nPROCESSAMENTO & DISTRIBUIÇÃO\n\nA Guilda dos Caçadores de Recompensas autorizou uma recompensa oficial.\n\nNOME: ~mission(TargetName)\nSISTEMA: ~mission(System)\nAVALIAÇÃO DE RISCO: ~mission(Danger)\nÚLTIMA LOCALIZAÇÃO CONHECIDA: ~mission(Location|Address)\nAFILIAÇÕES CONHECIDAS: <Nenhuma>\nNOTAS: Eles têm vários associados conhecidos com registros criminais, então pode ser que não estejam sozinhos. Armar-se e tomar cuidado ao confrontá-los.\n\nGUILDA DOS CAÇADORES DE RECOMPENSAS\nEm Busca da Justiça\n\nA Guilda dos Caçadores de Recompensas é um serviço de segurança autorizado pela Guilda dos Mercenários e autorizado a operar tanto na UEE quanto além, conforme os Atos da Autoridade Xenotrade.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 2/7 | Complexity 2/7 | Risk 2/7 | Knowledge 2/7\n<EM4>Hostiles:</EM4> Defenders x17, Targets x2\n<EM4>Probationary Guild Member:</EM4> +500 Rep (Failure: -100)\n<EM4>Probationary Guild Member:</EM4> +500 Rep (Failure: -250)\n<EM4>Probationary Guild Member:</EM4> +1,000 Rep (Failure: -500)\n<EM4>Probationary Guild Member:</EM4> +2,000 Rep (Failure: -1,000)\n<EM4>Probationary Guild Member:</EM4> +8,000 Rep (Failure: -4,000)\n<EM4>Probationary Guild Member:</EM4> +16,000 Rep (Failure: -8,000)
