Hockrow_FacilityDelve_P2M4_desc=Agência Hockrow \nArquivo de Caso #JD10285\nInvestigador Principal: Arken Mallor\n\nAtualização do Caso:\nOs dados sísmicos que você extraiu trouxeram algumas revelações interessantes. Minha especialista diz que acha que o Jorrit pode estar fazendo escavações lá embaixo. Odeio pensar no que ele está fazendo, mas é nosso trabalho descobrir. Acho que estamos perto de desvendar isso, então quero que você volte para Onyx e reúna os dados de Consumo de Energia. Se conseguirmos rastrear o fluxo de energia dos últimos meses, um padrão deve se revelar.\n\nAções do Investigador Contratado:\nExplore a ala de <EM4>Engenharia</EM4> e <EM4>carregue os dados de Consumo de Energia</EM4>.\n\nNotas Adicionais:\nFique atento a possíveis forças hostis no local.\n\nViaje até Onyx em um veículo que possa ser armazenado em um hangar grande.\n\nAssim que você entregar esses dados, estarei enviando a você <EM4>10 Secure Drives</EM4> com cópias das informações que reunimos até agora. Você pode coletá-los no seu local de residência.\n\n<EM3>ITEM REWARDS</EM3>\n- ASD Secure Drive\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7
Hockrow_FacilityDelve_P2M4_title=DOSSIÊ JORRIT: DADOS DE CONSUMO DE ENERGIA
Hockrow_FacilityDelve_P3M1_desc=Agência Hockrow \nArquivo do Caso #JD10285\nInvestigador Principal: Arken Mallor\n\nAtualização do Caso: \nToda sua investigação em Onyx valeu a pena. Consegui confirmar que Jorrit vem operando um laboratório não oficial no Site-B da instalação para conduzir um experimento que ele chama de "Projeto Hyperion". Vou enviar as <EM4>anotações de laboratório dele para o seu mobiGlas</EM4> assim que você estiver a caminho, mas resumindo a história, o desgraçado está tentando fazer os Humanos evoluírem ou algum nonsense desse tipo.\n\nO cliente quer os dados experimentais, então você vai voltar para Onyx e fazer tudo o que for necessário para colocar o Projeto Hyperion em funcionamento. \n\nAções do Investigador de Contrato:\nPrepare o experimento coletando um <EM4>código de Reagente na ala de Engenharia</EM4> e um <EM4>código de Catalisador na ala de Pesquisa</EM4>.\n\nUma vez que você tenha esses, desça para o <EM4>Laboratório no Site-B</EM4> e <EM4>execute o experimento</EM4> para que você possa <EM4>fazer upload dos resultados</EM4>.\n\nNotas Adicionais:\nComo este é um laboratório ativo, pode haver segurança da ASD no local.\n \nViaje para Onyx em um veículo que possa ser armazenado em um hangar grande.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- Fresnel "Molten" Energy LMG\n- Zenith "Darkwave" Laser Sniper Rifle\n- [S1-A] Geist Armor Arms ASD Edition\n- [S1-A] Geist Armor Core ASD Edition\n- [S1-A] Geist Armor Helmet ASD Edition\n- [S1-A] Geist Armor Legs ASD Edition\n- [S1-A] Zenith Laser Sniper Rifle Battery (22 Cap)\n- [MIL-S1-B] DynaFlux\n- [MIL-S2-B] Bolide\n- [MIL-S3-B] Fulgur\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain, Starter\n<EM4>Difficulty (1-7):</EM4> Combat 6/7 | Complexity 6/7 | Risk 6/7 | Knowledge 5/7\n<EM4>Blueprint Reward:</EM4> 100% chance (Repeat only)\n\n<EM4>? = only the Repeat variant awards blueprints</EM4>
Hockrow_FacilityDelve_P3M1_title=DOSSIÊ JORRIT: PROJETO HYPERION <EM4>[BP?]</EM4>
Hurston_bounty_boss_dc_desc_001=TERCEIRIZAÇÃO DA HURSTON DYNAMICS\nCONTRATO: Coleta de recompensas\nGERENTE DE TERCEIRIZAÇÃO: I. Takao\nAVALIAÇÃO DE RISCO: Alvo de alto risco (apoio armado)\n\nA Hurston Dynamics está procurando um empreiteiro para completar uma recompensa pela ~mission(TargetName). Esta recompensa provou ser extremamente evasiva até agora, mas relatórios de inteligência rastrearam o alvo e um grupo de seus associados conhecidos até ~mission(Location|Address). \n\nNo entanto, há uma grande chance de que ~mission(TargetName|Last) não arrisque um confronto, a menos que seja absolutamente forçado. É nossa recomendação que você neutralize primeiro uma parte significativa dos aliados do criminoso, a fim de atraí-los. O relatório indica que um grande grupo desses hostis está atualmente perto da ~mission(Location).\n\nO pagamento será liberado somente depois que a recompensa for considerada concluída.\n\n\n\n\n** A informação transmitidos podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Juggernauts x1, Snipers x2, Soldiers x13, Technicians x3
Hurston_bounty_boss_dc_title_001=CAÇA ELUSIVA: ~mission(TargetName) (HRT) <EM4>[500 Rep]</EM4>
Hurston_bounty_multiboss_dc_desc_001=TERCEIRIZAÇÃO DA HURSTON DYNAMICS\nCONTRATO: Coleta de recompensas\nGERENTE DE TERCEIRIZAÇÃO: I. Takao\nAVALIAÇÃO DE RISCO: Alvo de risco muito alto (apoio armado)\n\nA Hurston Dynamics está procurando um empreiteiro para completar uma recompensa pela ~mission(TargetName). Este alvo e a grande força hostil com a qual ele está viajando acabaram de ser relatados invadindo ~mission(Location|Address). \n\nNo entanto, se seu MO for verdadeiro, ~mission(TargetName|Last) normalmente permanece oculto durante os ataques, preferindo direcionar suas forças de longe. É nossa recomendação que você se concentre primeiro em diminuir seus aliados e, uma vez que seus números tenham sido significativamente enfraquecidos, ~mission(TargetName|Last) não terá escolha a não ser confrontá-lo diretamente. \n\nO pagamento será liberado somente após a recompensa ser considerada concluída.\n\n\n\n\n** As informações transmitidas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Backup x5, Juggernauts x1, Soldiers x18, Technicians x32
Hurston_bounty_multiboss_dc_title_001=Alvo Evasivo: ~mission(TargetName) (VHRT) <EM4>[1,000 Rep]</EM4>
Hurston_eliminateall_dc_desc_001=HURSTON DYNAMICS OUTSOURCING\nCONTRATO: Neutralize a Força Hostil\nGERENTE DE TERCEIRIZAÇÃO: T. Dalik\nAVALIAÇÃO DE RISCO: Alto\n\nNossas forças de segurança foram notificadas de uma incursão fora da lei em andamento em ~mission(location|Address), e precisamos de um operador independente capaz de expulsar os intervenientes hostis. \n\nDe acordo com o pessoal no local, os bandidos estão atualmente escondidos perto da ~mission(Location). Aproxime-se com cautela e esteja preparado para usar força letal caso os bandidos resistam à remoção.\n\nO pagamento só será autorizado quando o local for efetivamente liberado.\n\n\n\n\n** As informações transmitidas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> CQC x20, Soldiers x4
Hurston_eliminateall_dc_title_001=NEUTRALIZE A INCURSÃO DOS FORAS DA LEI <EM4>[500 Rep]</EM4>
Hurston_eliminatespecifc_dc_desc_001=TERCEIRIZAÇÃO DA HURSTON DYNAMICS\nCONTRATO: Coleta de recompensas\nGERENTE DE TERCEIRIZAÇÃO: T. Davik\nAVALIAÇÃO DE RISCO: Alvo de risco moderado\n\nA Hurston Dynamics está procurando um empreiteiro para concluir uma recompensa pela ~mission(TargetName). Os relatórios da Intel rastrearam o alvo até ~mission(Location|Address) onde foram vistos pela última vez perto de ~mission(Location). \n\nEsteja preparado para que eles resistam à apreensão e para o uso de força letal, se necessário.\n\nO pagamento será liberado somente depois que a recompensa for considerada concluída.\n \n\n\n\n** As informações transmitidos podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> CQC x18, Juggernauts x1, Snipers x2, Soldiers x6
Hurston_eliminatespecifc_dc_title_001=Alvo Localizado: ~mission(TargetName) (MRT) <EM4>[500 Rep]</EM4>
Hurston_searchbody_dc_desc_001=HURSTON DYNAMICS OUTSOURCING\nCONTRATO: Localize Indivíduo Desaparecido\nGERENTE DE TERCEIRIZAÇÃO: I. Takao\nAVALIAÇÃO DE RISCO: Baixo\n\nA equipe da ~mission(location|Address) apresentou recentemente um relatório de pessoas desaparecidas para uma ~mission(TargetName). Eles estão desaparecidos há vários dias e foram vistos pela última vez indo para ~mission(Location).\n\nVocê está sendo contratado para realizar uma busca no local por ~mission(TargetName|Last) e ver se consegue determinar o paradeiro deles. \n\nO pagamento está dependente da devolução de um registo da sua localização actual, viva ou morta.\n\n\n\n\n** A informação transmitida pode conter material confidencial e/ou privilegiado. É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
InterSec_KillShip_Vanduul_Desc_Super_001=ESPECIFICAÇÕES DA MISSÃO\n\nÁrea de Operação: Sistema Nyx\nForças Inimigas: Vanduul\nEspecificações de Equipamento: Naves de combate\nBriefing: A InterSec precisa dos serviços de um piloto habilidoso que esteja preparado para ajudar a eliminar um alvo Vanduul perigoso, envolvido em vários ataques.\n\nAs incursões Vanduul têm aumentado recentemente, representando uma ameaça não apenas para o sistema Nyx, mas para a UEE como um todo. É imprescindível que esses avistamentos sejam respondidos de maneira rápida e eficiente.\n\nPrecisamos que você voe até o último avistamento conhecido da nave Vanduul em <EM4>~mission(Location|Address)</EM4> e elimine-os imediatamente.\n\nPilotos Vanduul são altamente habilidosos e extremamente perigosos. Enfrente o inimigo imediatamente e não hesite – eles não mostrarão a mesma misericórdia.\n\nA compensação será proporcional ao risco do contrato.\n\nAtenciosamente,\nDeacon Tobin\nGerente de Operações\nInterSec Defense Solutions\n\nEsta comunicação consiste em uma oferta não vinculativa que, após aceitação, pode ser imediatamente encerrada por qualquer uma das partes sem aviso prévio. Todas as operações são realizadas por conta e risco do contratante, devendo aderir à legislação do sistema quando aplicável.\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- R97 Shotgun\n- [S1-A] Monde Arms\n- [S1-A] Monde Arms Hiro\n- [S1-A] Monde Core\n- [S1-A] Monde Core Hiro\n- [S1-A] Monde Helmet\n- [S1-A] Monde Helmet Hiro\n- [S1-A] Monde Legs\n- [S1-A] Monde Legs Hiro\n- [S1-A] R97 Shotgun Magazine (18 cap)\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 5/7 | Complexity 5/7 | Risk 5/7 | Knowledge 5/7\n<EM4>Hostiles:</EM4> Reinforcements x3, Targets x1\n<EM4>Veteran Contractor:</EM4> +300 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
