hurston_UGF_destroy_E_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE TERCEIRIZAÇÃO\n\nCONTRATO: Eliminação de contrabando\nAFILIAÇÃO DO CONTRATANTE: Independente\nGERENTE DE TERCEIRIZAÇÃO: R. Russel\nAVALIAÇÃO DE RISCO: Médio\nCONTRATO URGENTE: Nenhum\n\nCriminosos locais usaram ~mission(Location|Address) .para produzir grandes quantidades de contrabando. A Hurston Security exige que um empreiteiro vá até a instalação e destrua todo o contrabando armazenado lá.\n\nO pagamento será feito assim que todo o contrabando for destruído. \n\n\n\n** As informações enviadas podem conter material confidencial e/ou confidencial. É proibida qualquer revisão, encaminhamento, distribuição ou outro uso destas informações ou qualquer ação com base nessas informações por qualquer pessoa ou entidade que não seja o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x8\n<EM4>Friendlies:</EM4> Civilians x4
hurston_UGF_destroy_E_title_001=DESTRUA O ESTOQUE DE CONTRABANDO <EM4>[500 Rep]</EM4>
hurston_UGF_destroy_H_desc_001=HURSTON DYNAMICS\nOUTSOURCING DEPARTMENT\n\nCONTRATO: Eliminação de contrabando\nCONTRATAÇÃO: Independente\nOUTSOURCE MANAGER: R. Russel\nAVALIAÇÃO DE RISCO: Muito alto\nCONTRATO DE ARRANQUE: Não\n\nUm pequeno sindicato tem usado a ~mission(Location|Address) para fabricar grandes quantidades de narcóticos altamente perigosos. A Hurston Security está procurando um contratado para ir até a instalação e eliminar todo o contrabando armazenado lá.\n\nO pagamento será enviado assim que todo o contrabando for eliminado. \n\n\n** As informações transmitidas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
hurston_UGF_destroy_H_title_001=DESTRUA O ESTOQUE DE NARCÓTICOS <EM4>[500 Rep]</EM4>
hurston_UGF_destroy_desc_001=HURSTON DYNAMICS\nOUTSOURCING DEPARTMENT\n\nCONTRATO: Eliminação de contrabando\nCONTRATAÇÃO: Independente\nOUTSOURCE MANAGER: R. Russel\nAVALIAÇÃO DE RISCO: Alto\nCONTRATO URGENTE: Não\n\nCriminosos locais foram identificados usando ~mission(Location|Address) para fabricar grandes quantidades de produtos ilegais. A Hurston Security exige que um contratado vá até a instalação e elimine todo o contrabando armazenado lá.\n\nO pagamento será enviado assim que todo o contrabando for eliminado. \n\n\n** As informações transmitidas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Boss x2, Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
hurston_UGF_destroy_title_001=DESTRUA O ESTOQUE DE DROGAS <EM4>[500 Rep]</EM4>
hurston_UGF_eliminateall_allies_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE TERCEIRIZAÇÃO\nCONTRATO: Proteção de Instalações\nAFILIAÇÃO DO CONTRATADO: Independente\nGERENTE DE TERCEIRIZAÇÃO: T. Spooner\nAVALIAÇÃO DE RISCO: Alto\nCONTRATO URGENTE: Não\n\nA equipe de segurança da ~mission(Location|Address) é gerenciada por um elemento criminoso local é ameaçado e a Hurston Security está procurando empreiteiros para fortalecer suas defesas e eliminar quaisquer inimigos que tentem entrar nas instalações.\n\nObserve que você só tem permissão para interagir com inimigos confirmados. Um ataque ao pessoal de segurança no local resultará na quebra do contrato.\n\nO pagamento será feito assim que a segurança da instalação for confirmada. \n\n\n\n** As informações enviadas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, encaminhamento, distribuição ou outro uso destas informações ou qualquer ação com base nessas informações por qualquer pessoa ou entidade que não seja o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
hurston_UGF_eliminateall_allies_desc_intro=HURSTON DYNAMICS\nOUTSOURCING DEPARTMENT\n\nCONTRATO: Proteção de instalações\nCONTRATANTE: Independente\nOUTSOURCE MANAGER: T. Spooner\nAVALIAÇÃO DE RISCO: Alto\nCONTRATO URGENTE: Não\n\nUm grupo criminoso local tem ameaçado a ~mission(Location|Address)  e a Hurston Security está buscando contratados para reforçar suas defesas e eliminar quaisquer hostis que tentem invadir o local.\n\nObserve que você só está autorizado a se envolver com hostis confirmados. Agredir qualquer equipe de segurança no local resultará em uma quebra de contrato.\n\nO pagamento será enviado assim que a instalação for confirmada como segura. A conclusão bem-sucedida desta avaliação permitirá que você seja considerado para futuros trabalhos como prestador de serviços de segurança.\n\n\n** As informações transmitidas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
hurston_UGF_eliminateall_allies_desc_rehire=HURSTON DYNAMICS\nDEPARTAMENTO DE TERCEIRIZAÇÃO\nCONTRATO: Proteção de propriedade\nAFILIAÇÃO DO CONTRATADO: Independente\nGERENTE DE TERCEIRIZAÇÃO: T. Spooner\nCLASSIFICAÇÃO DE RISCO: Alto\nCONTRATO URGENTE: Não\n\nNosso departamento realiza regularmente reavaliações de prestadores de serviços de segurança anteriores e tem determinou que você pode ser um candidato adequado para uma possível reintegração.\n\nPara recuperar seu status, a Hurston Security está procurando prestadores de serviços para ajudar a eliminar um elemento criminoso local que está ameaçando a ~mission(Location|Address).\n\nObservação, que você só está aprovado para lidar com inimigos confirmados. Um ataque ao pessoal de segurança no local resultará na quebra do contrato.\n\nO pagamento será feito assim que a instalação for confirmada como segura. A conclusão bem-sucedida desta reavaliação permitirá que você seja considerado para futuras atribuições de segurança.\n\n\n\n** As informações enviadas podem conter material confidencial e/ou proprietário. É proibida qualquer revisão, encaminhamento, distribuição ou outro uso destas informações por qualquer pessoa ou entidade que não seja o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Attackers x10, Defenders x4, Hostiles x5
hurston_UGF_eliminateall_allies_title_001=AJUDE NA DEFESA DO LOCAL <EM4>[500 Rep]</EM4>
hurston_UGF_eliminateall_allies_title_intro=AVALIAÇÃO PARA SEGURANÇA <EM4>[500 Rep]</EM4>
hurston_UGF_eliminateall_allies_title_rehire=REVISÃO PARA SEGURANÇA <EM4>[500 Rep]</EM4>
hurston_UGF_eliminateall_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE TERCEIRIZAÇÃO\nCONTRATO: Varredura de instalações\nAFILIAÇÃO DO CONTRATADO: Independente\nGERENTE DE TERCEIRIZAÇÃO: G. Livingston\nAVALIAÇÃO DE RISCO: Alta\nCONTRATO URGENTE: Não\n\nHurston está procurando um empreiteiro disposto a enfrentar os residentes criminosos de ~mission(Location|Address).\n\nO local tem sido usado para inúmeras atividades ilegais, por isso é imperativo protegê-lo. \n\nVocê está autorizado a tomar qualquer ação necessária. O pagamento será efetuado assim que a segurança do sistema for confirmada. \n\n\n\n** As informações enviadas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, encaminhamento, distribuição ou outro uso destas informações por qualquer pessoa ou entidade que não seja o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x20, Sentries x10, Snipers x2
hurston_UGF_eliminateall_nocivs_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE TERCEIRIZAÇÃO\nCONTRATO: Varredura de instalações\nAFILIAÇÃO DO CONTRATADO: Independente\nGERENTE DE TERCEIRIZAÇÃO: K. Restle\nAVALIAÇÃO DE RISCO: Alto\nCONTRATO URGENTE: Não\n\nHurston está procurando um empreiteiro disposto a contratar residentes criminosos de ~mission(Location|Address).\n\nO local tem sido usado para inúmeras atividades ilegais, por isso é imperativo protegê-lo. \n\nObserve que você só tem permissão para agir contra inimigos confirmados. Um ataque a civis no local é considerado uma violação do tratado. \n\nO pagamento será feito assim que a instalação for confirmada como limpa. \n\n\n\n** As informações enviadas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, encaminhamento, distribuição ou outro uso destas informações ou qualquer ação com base nessas informações por qualquer pessoa ou entidade que não seja o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13\n<EM4>Friendlies:</EM4> Civilians x4
hurston_UGF_eliminateall_title_001=DESPEJAR INVASORES ILEGAIS <EM4>[500 Rep]</EM4>
hurston_bounty_desc_intro=HURSTON DYNAMICS\nDEPARTAMENTO DE TERCEIRIZAÇÃO\nCONTRATO: Coleção de recompensas\nAFILIAÇÃO DO CONTRATANTE: Independente\nGERENTE DE TERCEIRIZAÇÃO: ~mission(Contractor|Auth)\nAVALIAÇÃO DE RISCO: ~mission(Danger)\nCONTRATO URGENTE: ~mission(Contractor|BountyTimed)\n\nDepois Para ofensas repetidas e persistentes, uma recompensa foi colocada no seguinte indivíduo - ~mission(TargetName).\n\nPara avaliar seu potencial para ajudar na captura de criminosos esquivos, a Hurston Dynamics avaliará sua capacidade de completar ~mission(TargetName|Last) para localizá-lo e prendê-lo usando todos os meios à sua disposição. De acordo com as últimas informações sobre a localização atual de ~mission(TargetName|Last), ela foi vista pela última vez em ~mission(Location|Address).\n\nO pagamento não será liberado até que a recompensa seja liquidada. \n\n\n** As informações enviadas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, encaminhamento, distribuição ou outro uso destas informações ou qualquer ação com base nessas informações por qualquer pessoa ou entidade que não seja o destinatário pretendido. **\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Unique\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
hurston_bounty_desc_rehire=HURSTON DYNAMICS\nOUTSOURCING DEPARTMENT\n\nCONTRATO: Coleta de recompensas\nCONTRATO DE AFILIAÇÃO: Independente\nOUTSOURCE MANAGER: ~mission(Contractor|Auth)\nAVALIAÇÃO DE RISCO: ~mission(Danger)\nCONTRATO DE ARRECADAÇÃO: ~mission(Contractor|BountyTimed)\n\nNosso departamento realiza reavaliações periódicas de caçadores de recompensas anteriores e determinou que você pode ser um candidato adequado para uma possível reintegração.\n\nComo demonstração de sua adequação, prenda com sucesso o seguinte indivíduo procurado: \n~mission(TargetName).\n \nAs informações mais recentes sobre o paradeiro atual de ~mission(TargetName|Last) é que ele foi visto pela última vez em ~mission(Location|Address).\n\nA readmissão como caçador de recompensas da Hurston Dynamics e o pagamento seguirão a conclusão bem-sucedida deste contrato.\n \n\n** As informações transmitidas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Targets x1
hurston_bounty_fps_UGF_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE TERCEIRIZAÇÃO\n\nCONTRATO: Coleta de recompensas\nAFILIAÇÃO DO CONTRATADO: Independente\nGERENTE DE TERCEIRIZAÇÃO: I. Takao\nAVALIAÇÃO DE RISCO: Alvo de risco moderado (provável suporte armado)\nCONTRATO URGENTE: Não\n\nA Hurston Dynamics está procurando um empreiteiro para completar uma recompensa por ~mission(TargetName). \n\nRelatórios da Intel rastrearam o alvo até ~mission(Location|Address). Este local é conhecido por ser frequentado por criminosos que provavelmente estão armados e hostis. Envolva-se com eles como achar melhor, mas sua principal prioridade é a neutralização de ~mission(TargetName|Last).\n\nO pagamento será liberado somente depois que a recompensa for considerada concluída.\n \n\n** As informações transmitidos podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Hostiles x13, Targets x1
hurston_bounty_fps_UGF_nocivs_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE TERCEIRIZAÇÃO\n\nCONTRATO: Coleta de recompensas\nAFILIAÇÃO DO CONTRATADO: Independente\nGERENTE DE TERCEIRIZAÇÃO: L. Paleski\nAVALIAÇÃO DE RISCO: Alvo de risco moderado (provável suporte armado)\nCONTRATO URGENTE: Não\n\nA Hurston Dynamics está procurando um empreiteiro para completar uma recompensa por ~mission(TargetName). \n\nOs relatórios da Intel localizaram o paradeiro atual do alvo em ~mission(Location|Address). Embora você possa interagir com qualquer criminoso no local conforme achar adequado, todos os civis no local devem ser protegidos.\n\nO pagamento será liberado somente depois que a recompensa for considerada concluída.\n \n\n* * As informações transmitidas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Hostiles x14\n<EM4>Friendlies:</EM4> Civilians x4
hurston_bounty_fps_desc_001=HURSTON DYNAMICS\nDEPARTAMENTO DE TERCEIRIZAÇÃO\n\nCONTRATO: Coleta de recompensas\nAFILIAÇÃO DO CONTRATANTE: Independente\nGERENTE DE TERCEIRIZAÇÃO: ~mission(Contractor|Auth)\nAVALIAÇÃO DE RISCO: Alvo de risco moderado (possível suporte armado)\nCONTRATO URGENTE: ~mission(Contractor|BountyTimed)\n\nSob a autoridade da Hurston Dynamics concedida pela UEE, uma recompensa foi emitida para ~mission(TargetName) relacionada a crimes contra a corporação. \n\nAcredita-se que o alvo tenha sido localizado recentemente em ~mission(location|Address), potencialmente com vários aliados. A força pode ser necessária para obter acesso ao local e neutralizar ~mission(TargetName|Last). ~mission(Location|CaveSize)\n\nO pagamento será liberado somente após a recompensa ser considerada concluída.\n \n\n** As informações transmitidas podem conter material confidencial e/ou privilegiado. É proibida qualquer revisão, retransmissão, disseminação ou outro uso ou ação com base nessas informações por pessoas ou entidades que não sejam o destinatário pretendido. **\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> FPS\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
