Eckhart_EscortShips_M_desc=ECKHART SECURITY, LLC.\nCONTRATOS E DESPACHO\n\nTIPO DE CONTRATO: Escolta de Naves\nCódigo de aprovação = ~mission(ApprovalCode)\n\nPROCESSAMENTO IMEDIATO\n\nUm dos nossos clientes precisa de uma escolta imediata por um espaço perigoso. Encontre-se em <EM4>~mission(Location|Address)</EM4> e eles se juntarão a você após o lançamento. Há relatos de aumento na atividade de fora da lei na área, então mantenha-se alerta.\n\nEste contrato não é negociável.\n\nEsta mensagem pode conter informações confidenciais, proprietárias, privilegiadas e/ou privadas. As informações são destinadas apenas para o uso da pessoa ou entidade designada acima.\n\n\n<EM3>POTENTIAL BLUEPRINTS</EM3>\n- [D-S1-A] Suckerpunch Cannon\n- [D-S2-A] Suckerpunch-L Cannon\n- [D-S3-A] Suckerpunch-XL Cannon\n- [STH-S1-B] Veil\n- [STH-S2-B] Sheut\n- [E-S1-A] M3A Cannon\n- [E-S2-A] M4A Cannon\n- [E-S3-A] M5A Cannon\n- [STH-S1-C] Shimmer\n- [STH-S2-C] Obscura\n\n<EM3>ITEM REWARDS</EM3>\n- MG Scrip\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Mission Type:</EM4> Chain\n<EM4>Difficulty (1-7):</EM4> Combat 4/7 | Complexity 4/7 | Risk 4/7 | Knowledge 4/7\n<EM4>Hostiles:</EM4> Hostile Wave x4, Hostiles x2, Interdiction Ships x1, Reinforcements x14\n<EM4>Friendlies:</EM4> Escort Wings x4\n<EM4>Contractor:</EM4> +150 Rep\n<EM4>Blueprint Reward:</EM4> Guaranteed
