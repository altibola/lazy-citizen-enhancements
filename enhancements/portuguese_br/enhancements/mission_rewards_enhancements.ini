MTPS_eliminateall_dc_desc_001=SOBRE O TRABALHO\nmicroTech Protection Services está procurando um profissional mercenário detalhista que possa nos ajudar com rapidez e segurança na remoção completa do grupo fora da lei que ganhou temporariamente o controle da ~mission(Location) em ~mission(Location|Address).\n\nRESPONSABILIDADES\n• Fornecer transporte próprio para ~mission(location|Address).\n• Remover todos os membros da força ilegal hostil; usando a força conforme necessário. \n\nQUALIFICAÇÕES MÍNIMAS\n• 2 anos de experiência combinada em mercenários e segurança.\n• Acesso a equipamento de combate e meio de transporte.\n• Disponível para implantação imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n• Experiência com hostilidade rápida. -técnicas de escalonamento.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Juggernauts x2, Soldiers x12, Technicians x2
MTPS_eliminateall_dc_title_001=ACABE COM O CONFLITO <EM4>[500 Rep]</EM4>
MTPS_eliminateboss_dc_desc_001=SOBRE O TRABALHO\nA microTech Protection Services está procurando um caçador de recompensas para apreender ~mission(TargetName) que vive escapando da captura. Para nossa sorte, eles estão tramando um ataque em ~mission(Location|Address), e acreditamos que eles podem finalmente ser atraídos para fora da toca se suas forças que estão atacando ~mission(Location) enfrentarem resistência forte o suficiente. \n\nRESPONSABILIDADES\n• Ir por conta própria até ~mission(location|Address).\n• Neutralizar os criminosos de ~mission(TargetName) próximos à ~mission(location) para atrair o alvo para o espaço aberto.\n• Neutralizar ~mission(TargetName).\n\nQUALIFICAÇÕES MÍNIMAS\n• Ter acesso a bom equipamento de combate.\n\nQUALIFICAÇÕES PREFERENCIAIS\n• Ser capaz de lidar com alvos de alto risco.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> CQC x3, Juggernauts x1, Soldiers x7, Technicians x5
MTPS_eliminateboss_dc_title_001=APREENDA O ALVO: ~mission(TargetName) (HRT) <EM4>[500 Rep]</EM4>
MTPS_eliminateboss_multi_dc_desc_001=SOBRE O TRABALHO\nmicroTech Protection Services está procurando um caçador de recompensas qualificado para apreender ~mission(TargetName) que até agora conseguiu escapar da captura. Eles estão coordenando um ataque ativo que se espalhou por ~mission(Location|Address). \n\nNossa esperança é que você consiga finalmente tirá-los do esconderijo se confrontar suas forças em vários pontos de ataque diferentes. Com seus números suficientemente enfraquecidos, ~mission(TargetName|Last) provavelmente correrá risco de exposição e você poderá confrontá-los diretamente.\n\nRESPONSABILIDADES\n• Fornecer transporte próprio para ~mission(Location|Address).\n• Confronte os associados criminosos de ~mission(TargetName) para atrair o alvo para o mundo aberto.\n• Neutralize ~mission(TargetName); usando a força, se necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n• Acesso a equipamento de combate e meio de transporte.\n• Disponível para implantação imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n• Capacidade de lidar com situações de alta pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +1,000\n<EM4>Hostiles:</EM4> Backup x5, Juggernauts x1, Soldiers x18, Technicians x32
MTPS_eliminateboss_multi_dc_title_001=SEGURANÇA: ~mission(TargetName) (VHRT) <EM4>[1,000 Rep]</EM4>
MTPS_eliminatespecific_dc_desc_001=SOBRE O TRABALHO\nA microTech Protection Services está procurando um caçador de recompensas qualificado para apreender ~mission(TargetName) de ~mission(Location|Address). Eles foram avistados recentemente perto da ~mission(Location) e acredita-se que ainda estejam naquela área.\n\nEmbora possa haver outros criminosos ativos no local, seu foco principal deve ser completar a recompensa.\n\nRESPONSABILIDADES\n• Fornecer transporte próprio para ~mission(Location|Address).\n• Neutralizar ~mission(TargetName); usando a força conforme necessário.\n\nQUALIFICAÇÕES MÍNIMAS\n• Acesso a equipamento de combate e meio de transporte.\n• Disponível para implantação imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n• Capacidade de lidar com situações de alta pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500\n<EM4>Hostiles:</EM4> Juggernauts x1, Snipers x5, Soldiers x14
MTPS_eliminatespecific_dc_title_001=CAÇA ATIVA: ~mission(TargetName) (MRT) <EM4>[500 Rep]</EM4>
MTPS_searchbody_danger_dc_desc_001=SOBRE O TRABALHO\nA MicroTech Protection Services está procurando um contratado qualificado para ajudar na busca de ~mission(TargetName) que foi visto pela última vez perto de ~mission(Location) em ~mission(Location|Address), mas cujo paradeiro atual é desconhecido. \n\nNossa investigação preliminar nos levou a suspeitar que um crime pode estar por trás de seu desaparecimento. Dessa forma, recomenda-se maior cautela, pois pode haver agentes hostis envolvidos.\n\nRESPONSABILIDADES\n- Fornecer transporte próprio para ~mission(Location|Address).\n- Confirmar a localização de ~mission(TargetName) e se ele ainda está vivo. \n\nQUALIFICAÇÕES MÍNIMAS\n- 2 anos de experiência em segurança.\n- Disponível para mobilização imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n- Experiência em conduzir investigações de pessoas desaparecidas.\n- Capacidade de lidar com situações de alta pressão.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
MTPS_searchbody_dc_desc_001=SOBRE O TRABALHO\nDepois de receber um relatório de que ~mission(TargetName) está faltando, a microTech Protection Services está procurando um empreiteiro qualificado para iniciar uma pesquisa no local de ~mission(Location|Address) para saber seu paradeiro atual. O indivíduo desaparecido foi visto pela última vez entrando na ~mission(Location), por isso é recomendado começar a busca lá.\n\nRESPONSABILIDADES\n• Fornecer transporte próprio para ~mission(location|Address).\n• Confirmar a localização da ~mission(TargetName) e se ainda estiverem vivos.\n\nQUALIFICAÇÕES MÍNIMAS\n• 2 anos de experiência em segurança.\n• Disponível para implantação imediata.\n\nQUALIFICAÇÕES PREFERENCIAIS\n• Experiência na condução de investigações de pessoas desaparecidas.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
NTLockdown_FleetDestroy_Antagonist_MBroker_desc=Agora que a Crusader encontrou sua frota, a Nine Tails parece ter finalmente percebido o quão útil uma ajudinha extra pode ser.\n\nResumindo a história, eles estão procurando por alguns bandidos contratados para manter a Crusader sob controle. . Você e todos os outros voluntários receberão uma recompensa por cada Nave de segurança retirado. \n\nE se você mantiver a Crusader ocupado por tempo suficiente para que a Nine Tails termine o que quer que esteja tentando fazer com esse bloqueio quântico, você receberá um grande bônus.\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
NTLockdown_FleetDestroy_MBroker_desc=A Crusaders Security confirmou a localização da frota dos foras-da-lei Nine Tails e agora está se mobilizando para acabar com o bloqueio quântico em ~mission(Location).\n\nEstamos mais uma vez procurando profissionais de segurança treinados para se juntarem aos nossos esforços de resposta a emergências e ajudar para neutralizar esta ameaça perigosa.\n\nAntes de se comprometer, esteja ciente de que haverá uma resistência significativa da Nine Tails e que até o fim do bloqueio, Quantum Travels neste setor não serão possíveis.\n\nCONTATO APROVADO POR:\nDiretor Sasha Rust\nID# 122L964G\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +4,000
NTLockdown_FleetDestroy_MBroker_name=Bloqueio Ilegal - Neutralize a Frota Nine Tails <EM4>[4,000 Rep]</EM4>
NTLockdown_FleetFind_Antagonist_MBroker_desc=Eu disse a Nine Tails que bloquear o Quantum Travel para manter uma área inteira como refém atrairia o tipo errado de atenção, mas eles me ouviram? Não. Agora a Crusader tem dezenas de scanners por aí enfiando o nariz em coisas que prefiro manter escondidas. \n\nÉ por isso que estou tentando contratar o máximo de pessoas possível para me ajudar. Quero pagar por cada Nave scanner Crusader que você destruir. \nEu até aumentarei seu preço por Nave se todos vocês atingirem um certo número de mortes. Chame isso de incentivo de desempenho. E se você realmente estiver se sentindo um nerd, elimine qualquer idiota corajoso o suficiente para tentar entregar carga na estação bloqueada. Tenho alguns fornecedores que apreciarão a demanda adicional.\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
NTLockdown_FleetFind_MBroker_desc=A Crusader Security descobriu que a organização criminosa conhecida como Nine Tails estabeleceu um bloqueio ilegal em torno de ~mission(Location) e interrompeu todo o tráfego quântico de entrada e saída neste setor.\n\nA frota sem lei deve ser encontrada e o bloqueio terminará .\n\nPedimos a todos os profissionais de segurança treinados no sistema que se juntem às forças de segurança dos Crusader e protejam nossas naves de varredura enquanto localizam a localização da frota Nine Tails que causou este bloqueio. Tenha em mente que esta operação é de alto risco devido a a Quantum Travel desativada e os numerosos inimigos nesta área. Recomenda-se fortemente que todos os pilotos que participam nesta operação de resgate estejam adequadamente equipados e carreguem um tanque de combustível cheio. \n\nContrato autorizado por:\nDiretor Sasha Rust\nID# 122L964G\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +4,000
NTLockdown_FleetFind_MBroker_name=Bloqueio ilegal - Encontre a frota Nine Tails responsável <EM4>[4,000 Rep]</EM4>
NTLockdown_StationSupply_MBroker_desc=O bloqueio quântico ilegal em ~mission(Location) interrompeu as rotas comerciais normais e suprimentos vitais estão em falta. \n\nA Crusader Security está procurando comerciantes e transportadores para abastecer a estação com suprimentos médicos urgentemente necessários. \n\nOs preços oferecidos pela administração da estação serão ajustados à situação no Nine Tails e, além disso, devido ao aumento do risco, a Crusader concederá um bônus de perigo se os suprimentos médicos forem transportados com sucesso. \n\nAgradeço antecipadamente pelo seu apoio durante estes tempos difíceis.\n\nCONTATO APROVADO POR:\nDiretor Sasha Rust\nID# 122L964G\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard
NorthRock_Delivery_Local_DerelictOutpost_Desc_01=O negócio é o seguinte: um de nossos clientes (que deveria ter gasto os créditos extras em uma escolta Northrock) teve um de suas Naves atacado e agora eles precisam de nós para recuperar um pacote importante que foi roubado.\n\nFelizmente, conseguimos um avanço e conseguimos rastrear os responsáveis pela ~mission(Pickup1|Address). Você tem que ir lá e pegar o pacote. Você pode identificá-lo pelo número de série: ~mission(item1|serialnumber).\n\nPresumo que os bandidos irão revidar, mas lembre-se de que eles não são a prioridade.\n\nDepois de receber o pacote, voe devolvê-lo ao cliente ~mission(Dropoff1|Address). \n\nUma última coisa, certifique-se de levar um Nave com espaço suficiente para alguma carga. Não quero que você voe com seu Gladius ou qualquer outra coisa até lá só para voltar.\n\nDeixe-nos orgulhosos,\n\nBraden Corchado\nOficial de Logística - Filial Stanton\nNorthrock Service Group\n\n*RESUMO DA RECUPERAÇÃO OPERAÇÃO*\n* Pacote ~mission(item1|serialnumber) de ~mission(Pickup1|Address)\n* Entregar para ~mission(Dropoff1|Address)\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
NorthRock_Delivery_Local_DerelictOutpost_Desc_02=Aqui está a história: Um cliente nosso (que deveria ter gasto os créditos extras em uma escolta Northrock) teve um de suas Naves atacado e agora precisa de nós para recuperar pacotes importantes que foram roubados.\n\nFelizmente eles conseguiram rastreamos os responsáveis em ~mission(Pickup1|Address). Você tem que ir lá e pegar os pacotes de volta. Você pode identificá-los pelos números de série: ~mission(item1|serialnumber),\n~mission(item2|serialnumber) e\n~mission(item3|serialnumber).\n\nEspero que os bandidos revidam vontade, mas lembre-se que eles não são a prioridade.\n\nDepois de receber os pacotes, entregue-os no respectivo destino: ~mission(Dropoff1|Address), ~mission(Dropoff2|Address) e ~mission(Dropoff3|Address) . \n\nUma última coisa: traga um Nave que tenha espaço suficiente para carga. Não quero que você vá até lá em seu Gladius ou algo assim e depois tenha que voltar.\n\nDeixe-nos orgulhosos,\n\nBraden Corchado\nOficial de Logística - Filial Stanton\nNorthrock Service Group\n\n*RESUMO DA OPERAÇÃO DE RECUPERAÇÃO*\n* Recuperar pacotes ~mission(item1|serialnumber), ~mission(item2|serialnumber) e ~mission(item3|serialnumber) de ~mission(Pickup1|Address)\n* Entregar para ~mission(Dropoff1|Address), ~mission(Dropoff2|Address) e ~mission(Dropoff3|Address)\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
NorthRock_Delivery_Local_DerelictOutpost_Desc_03=Aqui está a história: Um cliente nosso (que deveria ter gasto os créditos extras em uma escolta Northrock) teve um de suas Naves atacado e agora precisa de nós para recuperar alguns pacotes importantes que foram roubados. Você tem que ir lá e pegar os pacotes de volta. Você será capaz de identificá-los por seus números de série: ~mission(item1|serialnumber), ~mission(item2|serialnumber) e ~mission(item3|serialnumber).\n\nPresumo que os bandidos irão revidar , mas lembre-se de que eles não são a prioridade.\n\nDepois de receber os pacotes, leve-os de volta para o cliente ~mission(Dropoff1|Address). \n\nUma última coisa: traga um Nave que tenha espaço suficiente para carga. Não quero que você dirija seu Gladius ou qualquer outra coisa até lá e depois tenha que dar meia-volta.\n\nDeixe-nos orgulhosos,\n\nBraden Corchado\nOficial de Logística - Filial Stanton\nNorthrock Service Group\n\n* RESUMO DA OPERAÇÃO DE RECUPERAÇÃO*\n* Recuperar pacotes ~mission(item1|serialnumber), ~mission(item2|serialnumber) e ~mission(item3|serialnumber) de ~mission(Pickup1|Address)\n* Entregar para ~mission(Dropoff1|Address)\n\n\n<EM3>MISSION DETAILS</EM3>\n<EM4>Engagement Type:</EM4> Ship\n<EM4>Mission Type:</EM4> Standard\n<EM4>Rep:</EM4> +500
NorthRock_Delivery_Local_DerelictOutpost_Title_01=OPERAÇÃO DE RECUPERAÇÃO <EM4>[500–600 Rep]</EM4>
