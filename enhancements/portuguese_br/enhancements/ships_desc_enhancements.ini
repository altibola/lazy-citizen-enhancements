vehicle_DescCRUS_Star_Runner=Fabricante: Crusader Industries\nFoco: Frete Médio\n\nQuando você precisa chegar rápido e seguro, o Mercury atende a todos os requisitos de um Nave de entrega confiável e muito mais. Construído usando os mesmos princípios de engenharia e design que fizeram de Industries o fabricante preferido para transporte galáctico de todos os tamanhos, o Mercury Star Runner permite que você fique à frente do cronograma, dos problemas e da concorrência.\n\n--- STATS ---\nSCM: 217 m/s  |  Max: 1,300 m/s\nBoost: +510 m/s  /  -218 m/s\nCrew: 1  |  Length: 51.0m  |  Class: Transportador  |  Role: Cargueiro\nMédio\nInsurance: 21.00 min base  |  7.00 min express
vehicle_DescCRUS_Starfighter_Inferno=Fabricante: Crusader Industries\nFoco: Heavy Fighter\n\nSeja como líder de uma tripulação ou como um lutador solitário em busca de grandes Naves - o Ares Inferno é uma força a ser reconhecida. Equipada com uma Gatling balística, esta variante penetra na blindagem das naves de combate e reduz caças menores a pó em segundos.\n\n--- STATS ---\nSCM: 205 m/s  |  Max: 1,050 m/s\nBoost: +385 m/s  /  -210 m/s\nCrew: 1  |  Length: 27.0m  |  Class: Combate  |  Role: Caça\nPesado\nShields: 2× S2  |  Coolers: 3× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 14,400\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 50  |  E 36  |  D 0  |  T 0\nInsurance: 10.30 min base  |  3.43 min express
vehicle_DescCRUS_Starfighter_Inferno_Collector_Military=Fabricante: Crusader Industries\nFoco: Caça Pesado\n\nSeja liderando uma equipe ou caçando grandes naves sozinho, o Ares Inferno é uma força a ser respeitada. Essa variante equipada com Gatling balístico destrói a blindagem de gunships e transforma caças menores em pó em segundos.\n\nWikelo aqui. Fiz modificações úteis para deixar a nave muito mais parecida com um caça. Muito impressionante.\n\n--- STATS ---\nCrew: 1  |  Length: 27.0m  |  Class: Combate  |  Role: Caça\nPesado\nShields: 2× S2  |  Coolers: 3× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 14,400\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 50  |  E 36  |  D 0  |  T 0\nInsurance: 10.30 min base  |  3.43 min express
