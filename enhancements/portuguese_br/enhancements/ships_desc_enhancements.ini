vehicle_DescDRAK_Clipper=Fabricante: Drake Interplanetary\nFoco: Generalista\n \nSe há uma coisa que todo capitão precisa lembrar é: espere o inesperado. Com compartimento de carga, instalações médicas e capacidade de fabricação, o Clipper é uma nave versátil ideal para qualquer operação.\n\n--- STATS ---\nSCM: 205 m/s  |  Max: 1,000 m/s\nBoost: +405 m/s  /  -230 m/s\nCrew: 1  |  Length: 26.5m  |  Class: Exploração  |  Role: Generalista\nInsurance: 8.17 min base  |  2.05 min express
