vehicle_DescESPR_Blade=Fabricante: Clãs Vanduul\nFoco: Caça Leve\n\nEsses caças leves, designados 'Blade', são frequentemente usados pelos Vanduul como batedores e naves de ataque da primeira onda. Eles também são eficazes como unidades de escaramuça devido à sua velocidade, permitindo-lhes perseguir qualquer nave tentando fugir da área. Por algumas décadas, esquadrões de agressão do Império Unido da Terra têm operado caças Blade produzidos sob contrato exclusivo pela Esperia, Inc.\n\n--- STATS ---\nSCM: 227 m/s  |  Max: 1,191 m/s\nBoost: +500 m/s  /  -260 m/s\nCrew: 1  |  Length: 20.5m  |  Class: Combate  |  Role: Caça\nLeve\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 3,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 7  |  D 0  |  T 0\nInsurance: 10.33 min base  |  3.44 min express
vehicle_DescESPR_Glaive=Fabricante: Esperia\nFoco: Caça Médio\n\nO Glaive é uma versão simétrica do Scythe. Geralmente pilotado por Vanduul com mais experiência de combate, é mais bem armado e possui duas grandes lâminas/asas, ao invés de uma no Scythe padrão.\n\n--- STATS ---\nSCM: 218 m/s  |  Max: 1,150 m/s\nBoost: +480 m/s  /  -230 m/s\nCrew: 1  |  Length: 33.0m  |  Class: Combate  |  Role: Caça\nMédio\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 6,600\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 22  |  E 14  |  D 0  |  T 0\nInsurance: 7.59 min base  |  2.53 min express
vehicle_DescESPR_Prowler=Fabricante: Esperia\nFoco: Nave de Desembarque\n\nNomeada a partir da designação militar da UPE, a Prowler é uma versão modernizada da infame nave de abordagem Tevarin da Primeira Guerra Tevarin. A eficácia da Prowler como veículo de implantação rápida de tropas se devia principalmente ao seu silêncio. Com a Prowler, você encontrará a fusão perfeita de duas culturas: a elegância e eficiência da máquina de guerra Tevarin combinadas com a confiabilidade da tecnologia moderna da UEE.\n\n--- STATS ---\nSCM: 212 m/s  |  Max: 1,200 m/s\nBoost: +450 m/s  /  -240 m/s\nCrew: 1  |  Length: 34.0m  |  Class: Combate  |  Role: Dropship\nShields: 2× S2  |  Coolers: 2× S2  |  Power: S2  |  QD: S2\nArmor HP: 12,150\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 32  |  E 39  |  D 0  |  T 0\nInsurance: 23.22 min base  |  7.74 min express
vehicle_DescESPR_Prowler_Utility=Fabricante: Esperia\nFoco: Carga Leve\n\nEmbora não existam exemplos conhecidos dessa nave histórica feitos pelos Tevarin, historiadores da Esperia estudaram relatórios militares de campo da UPE para reconstruir esta Prowler modificada. Usada pelos militares Tevarin para entregar suprimentos urgentes na linha de frente, a Prowler Utility combina um feixe trator com um compartimento totalmente acessível, além do armamento ainda significativo da nave de guerra, tornando a transferência de carga em condições de combate uma operação precisa.\n\n--- STATS ---\nSCM: 208 m/s  |  Max: 1,110 m/s\nBoost: +437 m/s  /  -240 m/s\nCrew: 1  |  Length: 34.0m  |  Class: Transportador  |  Role: Cargueiro\nLeve\nShields: 2× S2  |  Coolers: 2× S2  |  Power: S2  |  QD: S2\nArmor HP: 12,150\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 32  |  E 39  |  D 0  |  T 0\nInsurance: 21.00 min base  |  5.25 min express
