vehicle_DescCRUS_Starfighter_Ion_Collector_Stealth=Fabricante: Crusader Industries\nFoco: Caça Pesado\n\nInspire medo nos corredores das gunships e fragatas mais formidáveis com o Ares Ion. Essa variante equipada com laser dispara tiros extremamente poderosos para desabilitar rapidamente os escudos até das maiores naves inimigas.\n\nWikelo aqui. Fiz modificações úteis para deixar a nave muito mais difícil de ser vista. Furtivo.\n\n--- STATS ---\nCrew: 1  |  Length: 27.0m  |  Class: Combate  |  Role: Caça\nPesado\nShields: 2× S2  |  Coolers: 3× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 14,400\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 50  |  E 36  |  D 0  |  T 0\nInsurance: 10.30 min base  |  3.43 min express
vehicle_DescCRUS_Starlifter_A2=Fabricante: Crusader Industries\nFoco: Bombardeiro Pesado\n\nO A2 Starlifter tem sido utilizado com efeito devastador em ataques aéreos, operações de busca e resgate e desembarques. Com mais que o dobro do poder de fogo do M2 e um compartimento de bombas personalizado capaz de lançar cargas massivas, o A2 é ideal para quem transporta grandes volumes por áreas potencialmente hostis.\n\n--- STATS ---\nSCM: 160 m/s  |  Max: 950 m/s\nBoost: +320 m/s  /  -170 m/s\nCrew: 8  |  Length: 70.0m  |  Class: Combate  |  Role: Bombardeiro\nPesado\nTurrets: 12\nInsurance: 39.24 min base  |  13.08 min express
vehicle_DescCRUS_Starlifter_A2_Collector_Military=Fabricante: Crusader Industries\nFoco: Bombardeiro Pesado\n\nO A2 Starlifter tem sido utilizado com efeito devastador em ataques aéreos, operações de busca e resgate e desembarques. Com mais que o dobro do poder de fogo do M2 e um compartimento de bombas personalizado capaz de lançar cargas massivas, o A2 é ideal para quem transporta grandes volumes por áreas potencialmente hostis.\n\nWikelo aqui. Fiz modificações úteis para deixar a nave muito mais parecida com um caça. Muito impressionante.\n\n--- STATS ---\nCrew: 8  |  Length: 70.0m  |  Class: Combate  |  Role: Bombardeiro\nPesado\nTurrets: 12\nInsurance: 39.24 min base  |  13.08 min express
vehicle_DescCRUS_Starlifter_C2=Fabricante: Crusader Industries\nFoco: Carga Pesada\n\nUtilizando a estrutura espacial Hercules de nível militar patenteada e expandindo a capacidade de carga sem praticamente sacrificar poder de fogo, o C2 conquistou o setor privado. Tornou-se padrão da indústria para equipes de corrida, comerciantes de naves, construtoras, mineradoras e grandes produções itinerantes.\n\n--- STATS ---\nCrew: 2  |  Length: 70.0m  |  Class: Transportador  |  Role: Cargueiro\nMédio\nTurrets: 2\nCoolers: 2× S3  |  QD: S3\nArmor HP: 13,000\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 385  |  E 300  |  D 0  |  T 0\nInsurance: 32.70 min base  |  10.90 min express
vehicle_DescCRUS_Starlifter_M2=Fabricante: Crusader Industries\nFoco: Carga Pesada\n\nO M2 Hercules é o principal cargueiro tático da UEE. Sua combinação de capacidade, manobrabilidade, durabilidade e armamento robusto garante que sua carga e tripulação cheguem ao destino em segurança.\n\n--- STATS ---\nSCM: 160 m/s  |  Max: 950 m/s\nBoost: +320 m/s  /  -170 m/s\nCrew: 3  |  Length: 70.0m  |  Class: Transportador  |  Role: Cargueiro\nMédio\nTurrets: 3\nCoolers: 2× S3  |  QD: S3\nArmor HP: 23,400\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 385  |  E 300  |  D 0  |  T 0\nInsurance: 25.00 min base  |  8.00 min express
vehicle_DescDRAK_Buccaneer=Fabricante: Drake Interplanetary\nFoco: Caça Leve\n\nO Buccaneer foi projetado do zero para voar e lutar do jeito que você vive. Nada de luxo aqui: é uma nave bruta feita para manobrar e enfrentar inimigos maiores. Esse caça de fronteira pode ser mantido mesmo nas piores condições para manter tripulações vivas.\n\n--- STATS ---\nSCM: 240 m/s  |  Max: 1,400 m/s\nBoost: +600 m/s  /  -260 m/s\nCrew: 1  |  Length: 15.2m  |  Class: Combate  |  Role: Caça\nLeve\nShields: S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,160\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 8  |  D 0  |  T 0\nInsurance: 5.40 min base  |  1.80 min express
