vehicle_DescDRAK_Ironclad_Assault=Fabricante: Drake Interplanetary\nFoco: Nave de Desembarque\n \nProjetada para incursões completas, a Ironclad Assault transporta múltiplos veículos e possui armamento pesado.\n\n--- STATS ---\nSCM: 130 m/s  |  Max: 940 m/s\nBoost: +320 m/s  /  -150 m/s\nCrew: 7  |  Length: 13.4m  |  Class: Combate  |  Role: Dropship\nPesado\nInsurance: 18.00 min base  |  6.00 min express
vehicle_DescDRAK_Pitbull=Fabricante: Drake Interplanetary\nFoco: Caça Snub\n\nUma máquina de combate enxuta e brutal. A Pitbull combina manobras em alta velocidade com puro poder de fogo para entregar um verdadeiro colosso destruidor — tudo isso em um pacote compacto para um único piloto.\n\n--- STATS ---\nSCM: 232 m/s  |  Max: 1,275 m/s\nBoost: +555 m/s  /  -270 m/s\nCrew: 1  |  Length: 6.0m  |  Class: Caça\nCompacto  |  Role: Caça\nCompacto\nInsurance: 2.00 min base  |  0.60 min express
