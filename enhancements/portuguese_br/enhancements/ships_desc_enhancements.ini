vehicle_DescESPR_Stinger=Fabricante: Esperia\nFoco: Caça Pesado\n\nCausando estrago nos sistemas de fronteira da Humanidade, este caça pesado Vanduul, designado como “Stinger” pela Marinha da UEE, conquistou uma reputação sangrenta como uma grande ameaça tanto para pilotos quanto para naves capitais. Originalmente criado para treinar esquadrões de agressão, a Esperia agora está disponibilizando sua réplica detalhada para o público civil em geral.\n\n\n--- STATS ---\nSCM: 207 m/s  |  Max: 1,050 m/s\nBoost: +440 m/s  /  -230 m/s\nCrew: 1  |  Length: 36.0m  |  Class: Combate  |  Role: Caça\nPesado\nInsurance: 25.30 min base  |  6.30 min express
