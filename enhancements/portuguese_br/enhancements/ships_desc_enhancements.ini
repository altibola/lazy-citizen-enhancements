vehicle_DescDRAK_Herald=Fabricante: Drake Interplanetary\nFoco: O Drake Herald é uma pequena Nave blindada projetada para transportar informações com segurança do Ponto A ao Ponto B. Equipado com um poderoso motor central (para trânsito em alta velocidade e geração da energia necessária para criptografia/backup de dados eficaz), software de criptografia avançado e um núcleo de computador blindado, o Herald é único entre as Naves pessoais na forma como é projetado, que ele pode ser facilmente "limpo" se estiver em perigo de ser capturado.\n\n--- STATS ---\nSCM: 245 m/s  |  Max: 1,450 m/s\nBoost: +670 m/s  /  -260 m/s\nCrew: 1  |  Length: 24.8m  |  Class: Transportador  |  Role: Dados\nMédio\nInsurance: 2.02 min base  |  0.68 min express
