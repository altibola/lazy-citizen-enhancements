vehicle_DescRSI_Zeus_CL=Fabricante: Roberts Space Industries \nfocus: Frete médio \n \nready para transportar toda uma nova geração de viajantes em todo o universo, a Roberts Space Industries tem o orgulho de introduzir uma nave estelar oito séculos em fabricação - a nova espaçonave Zeus MK II.Dou uma homenagem ao design clássico que lançou a humanidade às estrelas em 2140, o Zeus Mk II foi atualizado para exceder os padrões modernos, mantendo o coração desse amado ícone de mudança de espaço.Com foco no comércio, a edição Zeus Mk II CL apresenta espaço de carga adicional e um feixe de trator ideal para lidar com grandes volumes de carga.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,000 m/s\nBoost: +400 m/s  /  -210 m/s\nCrew: 3  |  Length: 46.0m  |  Class: Transportador  |  Role: Cargueiro\nMédio\nShields: 3× S2\nInsurance: 10.67 min base  |  2.67 min express
