vehicle_DescDRAK_Cutlass_Blue=Fabricante: Drake Interplanetary\nFoco: Interdição\n\nSuave, mesquinho e majestoso. O Cutlass Blue acrescenta foguetes, motor mais agressivo e células Durasteel na área de carga ao modelo padrão. O Cutlass Blue é a Nave patrulha padrão da Milícia Outworld.\n\n--- STATS ---\nSCM: 220 m/s  |  Max: 1,165 m/s\nBoost: +467 m/s  /  -230 m/s\nCrew: 3  |  Length: 37.5m  |  Class: Combate  |  Role: Interdição\nInsurance: 9.99 min base  |  3.33 min express
vehicle_DescDRAK_Cutlass_Red=Fabricante: Drake Interplanetary \nFoco: Medical \n\n O vermelho de cutlass converte a carga padrão em uma instalação médica bem equipada, incluindo um Autodoc.Esta ambulância Starbound apresenta o Transponder NAV-E7 Echo, um scanner de longo alcance e um colarinho seguro, tornando-o ideal para pesquisa e sucateamento.Este modelo também apresenta uma pele exclusiva dos ossos cruzados.\n\n--- STATS ---\nSCM: 212 m/s  |  Max: 1,125 m/s\nBoost: +460 m/s  /  -230 m/s\nCrew: 2  |  Length: 37.5m  |  Class: Suporte  |  Role: Médico\nInsurance: 14.99 min base  |  5.00 min express
