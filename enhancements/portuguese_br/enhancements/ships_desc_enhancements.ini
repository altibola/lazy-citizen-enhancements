vehicle_DescARGO_SRV=Fabricante: Argo Astronautics\nFoco: Recuperação\n\nQuando se trata de fazer o trabalho, a Argo não brinca. De reboque de carga a operações de busca e resgate, a SRV dá conta de tudo. Seu sistema trator inovador permite operação solo ou em equipe com alta precisão. A tripulação permanece segura graças a escudos resistentes e blindagem pesada que protegem a cabine e os sistemas em situações críticas.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,100 m/s\nBoost: +460 m/s  /  -235 m/s\nCrew: 1  |  Length: 31.5m  |  Class: Suporte  |  Role: Recuperação\nShields: S2  |  Coolers: S2  |  Power: S2  |  QD: S2\nArmor HP: 3,740\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 10  |  E 9  |  D 0  |  T 0\nInsurance: 13.22 min base  |  4.75 min express
vehicle_DescBanu_Defender=Fabricante: Banu \nFoco: Nave de Combate Leve\n\nO Banu Defender é um Nave de combate multi-tripulação cujo design patchwork incorpora tecnologias de várias espécies. Com acomodações modestas para a tripulação e fácil acesso aos componentes, o Defender leva o nome do papel que desempenha: a primeira linha de defesa contra ataques inimigos. Por esta razão, o Defensor é o companheiro ideal do Mercador: um para transporte pesado, outro para combate corpo-a-corpo mortal.\n\n--- STATS ---\nSCM: 222 m/s  |  Max: 1,175 m/s\nBoost: +480 m/s  /  -255 m/s\nCrew: 1  |  Length: 24.5m  |  Class: Combate  |  Role: Caça\nLeve\nMRacks: 2× S3\nShields: S2  |  Coolers: 2× S1  |  Power: 2× S1  |  QD: S1\nArmor HP: 5,400\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 20  |  E 16  |  D 0  |  T 0\nInsurance: 13.61 min base  |  4.54 min express
vehicle_DescCNOU_HoverQuad=Fabricante: Consolidated Outland\nFoco: Passageiros\n\nProjetado como um veículo terrestre complementar para o Nomad, o HoverQuad possui uma estrutura angular elegante que utiliza quatro placas gravlev para máxima manobrabilidade, tornando-o o transporte perfeito em todos os tipos de superfície.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 550 m/s\nBoost: +280 m/s  /  -120 m/s\nCrew: 1  |  Length: 1.4m  |  Class: Exploração  |  Role: Passageiros\nCoolers: S0  |  Power: S0\nArmor HP: 1,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.15 min base  |  0.05 min express
vehicle_DescCNOU_Mustang_Alpha=Fabricante: Consolidated Outland \nFoco: Inicial / Carga Leve\n\nInspirado na visão inovadora do CEO da Consolidated Outland, Silas Koerner, o Mustang Alpha é uma espaçonave elegante e estilosa que utiliza ligas ultraleves para levar a relação potência/peso ao limite — às vezes até de forma arriscada. E agora, com o módulo opcional de carga, você pode aproveitar as vantagens do Alpha sem abrir mão da capacidade de transporte.\n\n--- STATS ---\nSCM: 228 m/s  |  Max: 1,218 m/s\nBoost: +500 m/s  /  -260 m/s\nCrew: 1  |  Length: 21.5m  |  Class: Multifunção  |  Role: Inicial / Cargueiro Leve\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,000\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 10  |  E 9  |  D 0  |  T 0\nInsurance: 0.68 min base  |  0.00 min express
