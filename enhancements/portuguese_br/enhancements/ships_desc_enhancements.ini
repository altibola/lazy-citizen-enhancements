vehicle_DescAEGS_Vanguard_Harbinger=Fabricante: Aegis Dynamics\nFoco: Caça Pesado / Bombardeiro\n\nA Vanguard Harbinger é o caça/bombardeiro padrão da Terra, convertendo a cápsula de escape do modelo Warden em um poderoso compartimento de bombas. O longo alcance da Vanguard e seu perfil relativamente compacto permitem que ela vá onde naves baseadas em porta-aviões ou bombardeiros estratégicos maiores não conseguem, ataque com força e retorne à base.\n\n--- STATS ---\nSCM: 212 m/s  |  Max: 1,085 m/s\nBoost: +462 m/s  /  -224 m/s\nCrew: 1  |  Length: 48.0m  |  Class: Combate  |  Role: Caça Pesado / Bombardeiro\nGuns: 5  |  Turrets: 1  |  MRacks: 4× S4  S5\nShields: 2× S2  |  Coolers: 2× S2  |  Power: S2  |  QD: S2\nArmor HP: 9,900\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 50  |  E 40  |  D 0  |  T 0\nInsurance: 16.39 min base  |  5.46 min express
vehicle_DescAEGS_Vanguard_Hoplite=Fabricante: Aegis Dynamics\nFoco: Nave de Desembarque\n\nA Vanguard Hoplite é uma combinação do consagrado caça de espaço profundo Vanguard com uma nave dedicada de abordagem. Adaptada de projetos de naves de assalto comprovados, a Hoplite é a ferramenta perfeita para inserir uma equipe de ataque blindada com poder de fogo suficiente para retirá-los em segurança.\n\n--- STATS ---\nSCM: 209 m/s  |  Max: 1,115 m/s\nBoost: +435 m/s  /  -246 m/s\nCrew: 1  |  Length: 48.0m  |  Class: Combate  |  Role: Dropship\nGuns: 5  |  Turrets: 1  |  MRacks: 2× S4\nShields: 2× S2  |  Coolers: 2× S2  |  Power: S2  |  QD: S2\nArmor HP: 14,850\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 50  |  E 40  |  D 0  |  T 0\nInsurance: 13.25 min base  |  4.42 min express
