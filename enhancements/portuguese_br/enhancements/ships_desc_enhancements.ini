vehicle_DescANVL_Hornet_F7CM=Fabricante: Anvil Aerospace\nFoco: Caça Médio\n\nO mais próximo do equipamento militar legalmente possível para um modelo civil, o F7C-M Super Hornet Mk I reconecta a torre esférica e oferece peças quase milspec sob o capô. Provando que duas cabeças pensam melhor que uma, um segundo assento foi adicionado para dividir a logística e a tarefa de combate, tornando o Super Hornet um alvo verdadeiramente assustador de se enfrentar.\n\n--- STATS ---\nSCM: 219 m/s  |  Max: 1,142 m/s\nBoost: +477 m/s  /  -249 m/s\nCrew: 1  |  Length: 28.2m  |  Class: Combate  |  Role: Caça\nMédio\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 6,600\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 24  |  E 13  |  D 0  |  T 0\nInsurance: 9.72 min base  |  3.24 min express
vehicle_DescANVL_Hornet_F7CM_Heartseeker=Fabricante: Anvil Aerospace\nFoco: Caça Médio\n\nProjetado para pilotos cujo verdadeiro amor é a emoção de um duelo angustiante, a edição limitada F7C-M Heartseeker Mk I é 'aquele' para os verdadeiros obstinados em combate . Carregado com componentes de última geração e equipado com quatro imponentes canhões laser Behring, este feroz erradicador aprimora a lendária proficiência de combate do Super Hornet para oferecer a você a última palavra em combate espacial.\n\n--- STATS ---\nCrew: 1  |  Length: 28.2m  |  Class: Combate  |  Role: Caça\nMédio\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 6,600\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 24  |  E 13  |  D 0  |  T 0\nInsurance: 9.72 min base  |  3.24 min express
vehicle_DescANVL_Hornet_F7CM_Heartseeker_Mk2=Fabricante: Anvil Aerospace\nFoco: Caça Médio\nQuando o F7C-M Super Hornet foi atualizado para o Mk II, não havia dúvida de que a Anvil Aerospace daria o mesmo tratamento à edição muito especial do Heartseeker. Com seu robusto pacote de armas projetado para pilotos cujo verdadeiro amor é a emoção de um angustiante dogfight, a edição limitada do F7C-M Heartseeker Mk II está pronta para se tornar a nave favorita de uma nova geração de verdadeiros fanáticos por combate.\n\n--- STATS ---\nCrew: 2  |  Length: 24.0m  |  Class: Combate  |  Role: Caça\nMédio\nShields: 3× S1  |  Coolers: 2× S1  |  Power: S2  |  QD: S1\nInsurance: 11.17 min base  |  2.80 min express
vehicle_DescANVL_Hornet_F7CM_Mk2=Fabricante: Anvil Aerospace\nFoco: Caça Médio\n\nRefinando seu renomado caça de superioridade de classe militar com a tecnologia mais atualizada, a Anvil Aerospace criou o F7C-M Super Hornet Mk II, mantendo o segundo assento e a torre esférica que tornaram o original um alvo realmente aterrorizante.\n\n--- STATS ---\nSCM: 215 m/s  |  Max: 1,125 m/s\nBoost: +465 m/s  /  -240 m/s\nCrew: 2  |  Length: 24.0m  |  Class: Combate  |  Role: Caça\nMédio\nShields: 3× S1  |  Coolers: 2× S1  |  Power: S2  |  QD: S1\nInsurance: 10.17 min base  |  2.55 min express
vehicle_DescANVL_Hornet_F7CR=Fabricante: Anvil Aerospace\nFoco: Pathfinder\n\nSe o Fantasma foi feito para se esconder, o Rastreador foi feito para procurar. O F7C-R Hornet Tracker Mk I possui um conjunto de radar avançado que o torna ideal para exploradores do espaço profundo que exigem profundidade e precisão em seus pacotes de varredura. Milícias locais e unidades mercenárias maiores também redirecionarão os Rastreadores para atuarem como naves C&C móveis para seus esquadrões.\n\n--- STATS ---\nSCM: 219 m/s  |  Max: 1,142 m/s\nBoost: +477 m/s  /  -249 m/s\nCrew: 1  |  Length: 28.2m  |  Class: Exploração  |  Role: Desbravador\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 6,600\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 24  |  E 13  |  D 0  |  T 0\nInsurance: 8.10 min base  |  2.70 min express
vehicle_DescANVL_Hornet_F7CR_Mk2=Fabricante: Anvil Aerospace\nFoco: Pathfinder\n\nAo buscar a próxima grande fronteira, quem melhor para confiar do que um pathfinder de última geração? O F7C-R Hornet Tracker Mk II apresenta uma suíte de radar revisada, ideal para exploradores do espaço profundo que exigem profundidade e precisão em seus pacotes de varredura.\n\n--- STATS ---\nSCM: 220 m/s  |  Max: 1,150 m/s\nBoost: +480 m/s  /  -250 m/s\nCrew: 1  |  Length: 22.5m  |  Class: Combate  |  Role: Desbravador\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nInsurance: 9.33 min base  |  2.33 min express
