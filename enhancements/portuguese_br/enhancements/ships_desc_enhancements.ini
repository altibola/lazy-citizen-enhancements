TheCollector_ShipMod_F7_Hornet_VehicleDesc=Fabricante: Anvil Aerospace\nFoco: Caça médio\n \nAperfeiçoando seu renomado caça de superioridade militar com a tecnologia mais avançada, a Anvil Aerospace criou o F7C-M Super Hornet Mk II, mantendo o segundo assento e a torre esférica que tornavam o original uma ameaça verdadeiramente assustadora.\n\nOlá, eu sou Wikelo. Fiz alterações na nave. Já era impressionante, sim, mas ficou ainda melhor.\n\n--- STATS ---\nCrew: 2  |  Length: 24.0m  |  Class: Combate  |  Role: Caça\nMédio\nShields: S1\nInsurance: 10.17 min base  |  2.55 min express
TheCollector_ShipMod_MISC_Fortune_VehicleDesc=Fabricante: MISC\nFoco: Sucateamento\n\nPara aqueles que estão prontos para elevar sua profissão ao próximo nível, os engenheiros da MISC criaram cuidadosamente a Fortune como a melhor embarcação de recuperação pequena da categoria. Equipada com um braço de resgate versátil e um elevador de carga, a MISC Fortune foi construída desde os suportes para transformar lixo em tesouro.\n\nOlá, eu sou Wikelo. Você gosta de encontrar coisas para fazer outras coisas. Eu também. Esta nave é muito boa para isso. Wikelo a tornou um pouco melhor.\n\n--- STATS ---\nCrew: 1  |  Length: 26.5m  |  Class: Industrial  |  Role: Sucateiro\nLeve\nArmor HP: 4,114\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 5.18 min base  |  1.30 min express
TheCollector_ShipMod_MRAI_GuardianQI_VehicleDesc=Fabricante: Mirai\nFoco: Interdição\n\nNão é surpreendente que os inimigos possam fugir quando confrontados com um adversário poderoso, mas graças às suas capacidades de amortecimento quântico, o Mirai Guardian QI garante que seus inimigos não serão capazes de lutar outro dia. Aproveitando as melhores características do Guardian básico, os engenheiros da Mirai tornaram a variante QI o complemento ideal para qualquer força de proteção.\n\nGostei muito da nave. Tive que entrar e brincar com ela. Adicione peças para torná-la ainda mais útil. Aproveite.\n\n--- STATS ---\nCrew: 1  |  Length: 24.3m  |  Class: Combate  |  Role: Interdição\nInsurance: 12.00 min base  |  3.00 min express
TheCollector_ShipMod_MRAI_Pulse_VehicleDesc=Fabricante: Mirai\nFoco: Combate\n \nOs engenheiros da Mirai decidiram criar uma moto com capota aberta capaz de mais. Uma conexão mais íntima entre o piloto e o desempenho com uma silhueta que se adapta ao corpo. Uma maneira mais intuitiva de domar paisagens formidáveis com um sistema grav-lev responsivo. Uma experiência de combate mais inteligente com uma arma personalizada totalmente integrada ao espírito do veículo. O resultado final? A Mirai Pulse. \n\nA Wikelo passou muito tempo no planeta go fast. Faça algumas mudanças para você também ir rápido. Você vai gostar.\n\n--- STATS ---\nCrew: 1  |  Length: 3.5m  |  Class: Combate  |  Role: Desbravador\nArmor HP: 1,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 6  |  E 4  |  D 0  |  T 0\nInsurance: 0.15 min base  |  0.05 min express
