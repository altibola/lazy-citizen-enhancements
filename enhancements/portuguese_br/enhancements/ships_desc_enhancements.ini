vehicle_DescDRAK_Cutter_Rambler=Fabricante: Drake Interplanetary\nFoco: Expedição\n\nOs chefes da Drake ouviram o que você tinha a dizer e a resposta deles foi o Cutter Rambler. Com base no original, o Rambler preserva 2 SCU de espaço de carga e, ao mesmo tempo, acrescenta os confortos necessários e armazenamento pessoal suficiente para fazer com que até mesmo a viagem mais longa passe em um piscar de olhos.\n\n--- STATS ---\nCrew: 1  |  Length: 20.0m  |  Class: Exploração  |  Role: Expedição\nCoolers: S1  |  Power: S1  |  QD: S1\nArmor HP: 1,980\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 8  |  D 0  |  T 0\nInsurance: 1.25 min base  |  0.00 min express
