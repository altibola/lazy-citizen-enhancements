vehicle_DescAEGS_Sabre=Fabricante: Aegis Dynamics\nFoco: Stealth Fighter\n\nParte da segunda fase dos novos modelos de Naves da Aegis Dynamics, o Sabre foi projetado como um caça de superioridade espacial para situações onde uma pegada menor é necessária. Projetado para ser uma Nave de resposta rápida, o Sabre é mais do que capaz de dominar o campo de batalha em uma variedade de cenários de combate.\n\n--- STATS ---\nSCM: 223 m/s  |  Max: 1,235 m/s\nBoost: +480 m/s  /  -230 m/s\nCrew: 1  |  Length: 24.5m  |  Class: Combate  |  Role: Caça\nFurtivo\nMRacks: 2× S4\nShields: 2× S1  |  Coolers: 2× S1  |  Power: 2× S1  |  QD: S1\nArmor HP: 2,772\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 20  |  E 16  |  D 0  |  T 0\nInsurance: 9.45 min base  |  3.15 min express
vehicle_DescAEGS_Sabre_Comet=Fabricante: Aegis Dynamics\nFoco: Stealth Fighter\n\nO Comet foi desenvolvido como parte da série 'Masters of Flight' em conjunto com a simulação de voo Arena Commander e presta homenagem ao famoso piloto Capitão Kamur Dalion por seu trabalho com Aegis, que inaugurou uma nova era no design de Naves de combate. Este Sabre apresenta equipamento especial focado em combate aéreo e uma pintura especial que homenageia este Nave icônico.\n\n--- STATS ---\nCrew: 1  |  Length: 24.5m  |  Class: Combate  |  Role: Caça\nFurtivo\nMRacks: 2× S4\nShields: 2× S1  |  Coolers: 2× S1  |  Power: 2× S1  |  QD: S1\nArmor HP: 2,772\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 20  |  E 16  |  D 0  |  T 0\nInsurance: 9.45 min base  |  3.15 min express
vehicle_DescAEGS_Sabre_Firebird=Fabricante: Aegis Dynamics\nFoco: Caça Furtivo\n \nQuando confrontos de linha de frente exigem uma ofensiva rápida e decisiva, a Sabre Firebird é o caça médio ideal para qualquer arsenal. Partindo da já comprovada Sabre Raven, a Aegis projetou a variante Firebird com um lançador de mísseis aprimorado capaz de enfrentar uma ampla variedade de ameaças.\n\n--- STATS ---\nSCM: 240 m/s  |  Max: 1,400 m/s\nBoost: +600 m/s  /  -260 m/s\nCrew: 1  |  Length: 24.5m  |  Class: Combate  |  Role: Caça\nFurtivo\nMRacks: S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: 2× S1  |  QD: S1\nArmor HP: 4,752\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 20  |  E 16  |  D 0  |  T 0\nInsurance: 7.56 min base  |  2.52 min express
