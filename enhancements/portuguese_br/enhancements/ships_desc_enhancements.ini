vehicle_DescANVL_Terrapin=Fabricante: Anvil Aerospace\nFoco: Pathfinder\n\nApresentando a Nave de exploração/exploração classe Anvil Aerospace U4A-3 Terrapin. O Terrapin foi desenvolvido no final do século 28 para servir como o primeiro Nave na reestruturação defensiva da marinha do Império. Projetado para proteção, o Terrapin apresenta extensos sistemas de blindagem e camadas de blindagem projetadas para fornecer a maior proteção possível aos pilotos e tripulantes. Embora lhe falte a capacidade de manobra de um Nave de combate puro, ele possui um arsenal avançado e poderoso de armas projetadas para manter até mesmo o mais temível atacante Vanduul afastado.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,150 m/s\nBoost: +320 m/s  /  -240 m/s\nCrew: 1  |  Length: 20.0m  |  Class: Suporte  |  Role: Desbravador\nInsurance: 7.88 min base  |  2.62 min express
vehicle_DescANVL_Terrapin_Medic=Fabricante: Anvil Aerospace\nFoco: Médico\n\nMantendo a famosa resistência do Terrapin original, os projetistas da Anvil criaram um veículo ideal para operações de resgate com o Terrapin Medic. Com um leito médico de nível 2, o Terrapin Medic pode extrair feridos até mesmo das situações mais perigosas graças à sua poderosa blindagem e proteção.\n\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,150 m/s\nBoost: +320 m/s  /  -240 m/s\nCrew: 1  |  Length: 20.0m  |  Class: Suporte  |  Role: Médico\nInsurance: 9.50 min base  |  2.38 min express
vehicle_DescANVL_Terrapin_Medic_Collector_Medic=Fabricante: Anvil Aerospace\nFoco: Médico\n\nMantendo a famosa resistência do Terrapin original, os designers da Anvil criaram um veículo ideal para operações de resgate com o Terrapin Medic. Equipado com uma maca médica nível 2, o Terrapin Medic pode evacuar feridos até das situações mais perigosas graças à sua armadura e escudos potentes.\n\nWikelo aqui. Fiz modificações úteis para deixar a nave ainda melhor e facilitar seu trabalho de cura.\n\n--- STATS ---\nCrew: 1  |  Length: 20.0m  |  Class: Suporte  |  Role: Médico\nInsurance: 9.50 min base  |  2.38 min express
vehicle_DescANVL_Valkyrie_CitizenCon=Fabricante: Anvil Aerospace\nFoco: Nave de Desembarque\n\nPor mais de um século, as naves da Anvil se destacaram em inúmeras operações civis e militares. Honre essa tradição com a edição limitada Liberator da Valkyrie, que apresenta um acabamento exclusivo em comemoração à estreia da nave na CitizenCon 2948.\n\n--- STATS ---\nCrew: 1  |  Length: 48.0m  |  Class: Combate  |  Role: Dropship\nTurrets: 7\nShields: 2× S2  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 23,760\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 139  |  E 88  |  D 0  |  T 0\nInsurance: 19.82 min base  |  4.98 min express
vehicle_DescARGO_MOTH=Fabricante: Argo Astronautics\nFoco: Salvamento Médio\n\nExperimente séculos de expertise industrial da Argo com a MOTH. Utilizando um chassi testado e aprovado, a MOTH conta com três torres de salvamento dedicadas e um autocarregador externo, permitindo que uma equipe de quatro pessoas trabalhe com máxima eficiência na coleta de sucata.\n\n--- STATS ---\nSCM: 140 m/s  |  Max: 960 m/s\nBoost: +340 m/s  /  -150 m/s\nCrew: 3  |  Length: 0.0m  |  Class: Industrial  |  Role: Sucateamento Médio\nInsurance: 12.50 min base  |  3.13 min express
vehicle_DescARGO_MPUV=Fabricante: Argo Astronautics\nFoco: Carga leve\n\nO MPUV Cargo da Argo Astronautics é um Nave especial para transferência de mercadorias. Como um estivador intergaláctico onipresente, um grande número de MPUV Cargos são responsáveis por carregar e descarregar Naves que de outra forma não poderiam pousar em planetas ou em docas secas, como o Hull D e o Orion. Alguns capitães de transporte optam por possuir e operar o seu próprio Argo, enquanto outros preferem contratar os proprietários locais do Argo encontrados em muitos dos portos mais movimentados.\n\n--- STATS ---\nSCM: 170 m/s  |  Max: 890 m/s\nBoost: +360 m/s  /  -140 m/s\nCrew: 1  |  Length: 10.5m  |  Class: Transportador  |  Role: Cargueiro\nLeve\nShields: S1  |  Coolers: 2× S0  |  Power: S0\nArmor HP: 1,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.17 min base  |  0.00 min express
