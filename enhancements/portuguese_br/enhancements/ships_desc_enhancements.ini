vehicle_DescRSI_Hermes=Fabricante: Roberts Space Industries\nFoco: Carga Média\n\nDiferente de seu homônimo mitológico, a RSI Hermes não é enganadora — ela é realmente rápida. Com um conjunto de propulsores inovador e exclusivo, um impressionante conjunto de medidas defensivas e um amplo compartimento de carga, a Hermes está pronta para acelerar entregas até seus destinos finais, mesmo em locais perigosos que outros cargueiros evitariam.\n\n--- STATS ---\nSCM: 180 m/s  |  Max: 1,200 m/s\nBoost: +370 m/s  /  -170 m/s\nCrew: 2  |  Length: 58.0m  |  Class: Transportador  |  Role: Cargueiro\nMédio\nInsurance: 11.18 min base  |  2.80 min express
vehicle_DescRSI_Mantis=Fabricante: RSI\nFoco: Interdição\n\nPare as naves em seu caminho com a principal Nave de Execução Quântica da RSI. O Mantis apresenta um Dispositivo de Execução Quantum personalizado da Wei-Tek, capaz de arrancar Naves do QT com seu Quantum Snare e evitar uma fuga precipitada com seu Quantum Dampener.\n\n--- STATS ---\nSCM: 236 m/s  |  Max: 1,400 m/s\nBoost: +605 m/s  /  -257 m/s\nCrew: 1  |  Length: 30.0m  |  Class: Combate  |  Role: Interdição\nInsurance: 6.48 min base  |  2.16 min express
vehicle_DescRSI_Meteor=Fabricante: RSI\nFunção: Caça Médio\n\nCom um poder de fogo de respeito, a Meteor é o tipo de visão que nenhum inimigo quer ter pela frente. Inspirada na icônica Mantis, essa nave de combate pesada abre mão do sistema de interdição quântica e, em vez disso, vem equipada com dois canhões balísticos personalizados S5 e quatro suportes de mísseis S4 de disparo único — transformando a Meteor em uma força capaz de riscar os céus como uma estrela cadente.\n\n--- STATS ---\nSCM: 229 m/s  |  Max: 1,405 m/s\nBoost: +570 m/s  /  -235 m/s\nCrew: 1  |  Length: 30.0m  |  Class: Combate  |  Role: Caça\nMédio\nInsurance: 13.50 min base  |  4.50 min express
vehicle_DescRSI_Meteor_Collector_Military=Fabricante: RSI\nFoco: Caça Médio\n\nCom um poder de fogo sério, o Meteor é uma visão que os inimigos não querem ver. Inspirado no icônico Mantis, esse caça pesado dispensa o reforço quântico e apresenta dois canhões balísticos S5 sob medida e quatro racks de mísseis de carga única S4; tornando o Meteor uma força capaz de iluminar o céu como uma estrela cadente.\n\nEsta variante apresenta uma pintura exclusiva e configuração de carga para a nave.\n\n--- STATS ---\nCrew: 1  |  Length: 30.0m  |  Class: Combate  |  Role: Caça\nMédio\nInsurance: 13.50 min base  |  4.50 min express
