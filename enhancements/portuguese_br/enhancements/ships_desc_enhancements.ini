vehicle_DescRSI_Aurora_ES=Fabricante: RSI\nFoco: Inicial / Exploradora\n\nA Aurora é a descendente moderna da nave X-7 da Roberts Space Industries, que testou os primeiros motores de salto. Totalmente utilitária, a Aurora é a nave perfeita para iniciantes: o que falta em estilo é compensado por amplo espaço para módulos de melhoria.\n\n--- STATS ---\nCrew: 1  |  Length: 19.0m  |  Class: Multifunção  |  Role: Inicial / Desbravador\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nInsurance: 2.16 min base  |  0.72 min express
vehicle_DescRSI_Aurora_LN=Fabricante: RSI\nFoco: Light Fighter\n\nCom um gerador de escudo mais robusto e um par de pontos de arma adicionais, o Legionário é um lutador dedicado, capaz de enfrentar qualquer obstáculo que o universo tenha a oferecer.\n\n--- STATS ---\nCrew: 1  |  Length: 19.0m  |  Class: Combate  |  Role: Caça\nLeve\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nInsurance: 2.92 min base  |  0.97 min express
vehicle_DescRSI_Aurora_LX=Fabricante: RSI\nFoco: Pathfinder\n\nTenha orgulho de suas raízes com o novo Aurora Deluxe, construído para o piloto exigente que nunca se esquece de onde veio. O LX apresenta um interior em couro envernizado que garante conforto em longas distâncias em preto profundo.\n\n--- STATS ---\nCrew: 1  |  Length: 19.0m  |  Class: Exploração  |  Role: Desbravador\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nInsurance: 2.70 min base  |  0.90 min express
vehicle_DescRSI_Aurora_MR=Fabricante: RSI\nFoco: Inicial / Caça Leve\n\nTalvez você esteja procurando algo que ofereça capacidade de carga, mas também tenha poder de combate? A Aurora Marque vem equipada com um par de lasers de qualidade Behring e um sistema de resfriamento de armas de alta qualidade.\n\n--- STATS ---\nCrew: 1  |  Length: 19.0m  |  Class: Combate  |  Role: Caça\nLeve\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nInsurance: 2.92 min base  |  0.97 min express
vehicle_DescRSI_Aurora_Mk2=Fabricante: Roberts Space Industries\nFoco: Inicial / Carga Leve\n\nUma nova abordagem da nave clássica, a Roberts Space Industries reinventou a consagrada Aurora do zero. Apresentando a Aurora Mk II. Tudo, desde o desempenho e usabilidade até o estilo, foi reformulado pensando em uma nova geração de pilotos. Além disso, esta versão mais recente introduz um novo recurso para a série Aurora – módulos intercambiáveis. Em vez de prender os pilotos a um único caminho de carreira, esses módulos permitem especialização operacional de forma simples, direto do seu hangar. Seja você um novo proprietário ou um piloto experiente pronto para evoluir sua nave do dia a dia, a Aurora Mk II está esperando por você.\n\n--- STATS ---\nSCM: 225 m/s  |  Max: 1,230 m/s\nBoost: +460 m/s  /  -240 m/s\nCrew: 1  |  Length: 27.4m  |  Class: Multifunção  |  Role: Inicial / Caça Leve\nInsurance: 5.82 min base  |  1.45 min express
vehicle_DescRSI_Aurora_SE=Fabricante: RSI\nFoco: Multifunção\n\nIntegrando o melhor do que tornou a série Aurora Mk I tão querida por gerações, esta edição especial alcança um equilíbrio impressionante que permite aos pilotos lidar com uma ampla variedade de tarefas. Com a Aurora Mk I SE estacionada no seu hangar, essa nave versátil certamente se tornará sua companheira do dia a dia graças à sua capacidade de lidar com qualquer situação que surgir no seu caminho.\n\n--- STATS ---\nCrew: 1  |  Length: 19.0m  |  Class: Combate  |  Role: Caça\nLeve\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nInsurance: 2.92 min base  |  0.97 min express
vehicle_DescRSI_Constellation_Andromeda=Fabricante: RSI\nFoco: Cargueiro médio / Nave de Armas\n\nO Constellation Andromeda é um cargueiro confiável com várias tripulações que atrai comerciantes de todo o império graças à sua versatilidade. Uma das naves mais populares que a RSI produz, a icônica Andromeda apresenta um compartimento de carga bem equipado, uma porta de acoplamento de caça e uma ponte envolvente característica.\n\n--- STATS ---\nSCM: 190 m/s  |  Max: 1,000 m/s\nBoost: +390 m/s  /  -191 m/s\nCrew: 1  |  Length: 63.5m  |  Class: Multifunção  |  Role: Cargueiro Médio / Armeiro\nTurrets: 2  |  MRacks: 4× S4  4× S5\nShields: S3  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 20,160\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 116  |  E 110  |  D 0  |  T 0\nInsurance: 13.50 min base  |  4.50 min express
vehicle_DescRSI_Constellation_Aquila=Fabricante: RSI\nFoco: Expedição\n\nProjetado pela RSI para atravessar fronteiras distantes, o Constellation Aquila apresenta um cockpit redesenhado para máxima visibilidade, sensores avançados, uma nave P-52 e um rover Ursa para exploração planetária. Descubra por si mesmo por que os exploradores de todo o mundo escolhem o Aquila como capitão.\n\n--- STATS ---\nSCM: 180 m/s  |  Max: 1,075 m/s\nBoost: +380 m/s  /  -191 m/s\nCrew: 1  |  Length: 63.5m  |  Class: Exploração  |  Role: Expedição\nTurrets: 2  |  MRacks: 4× S5\nShields: S3  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 20,160\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 116  |  E 110  |  D 0  |  T 0\nInsurance: 16.20 min base  |  5.40 min express
