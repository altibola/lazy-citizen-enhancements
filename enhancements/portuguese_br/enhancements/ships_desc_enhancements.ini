vehicle_DescRSI_Zeus_ES_Collector_Indust=Fabricante: Roberts Space Industries\nFoco: Expedição\n\nPronta para transportar uma nova geração de viajantes pelo universo, a Roberts Space Industries orgulhosamente apresenta uma nave com oito séculos de desenvolvimento — a nova Zeus Mk II. Prestando homenagem ao design clássico que levou a humanidade às estrelas em 2140, a Zeus Mk II foi atualizada para superar os padrões modernos, mantendo a essência deste ícone espacial. Com foco em exploração, a versão ES conta com um pacote de radar robusto para descobrir novas oportunidades, além de armamentos e escudos aprimorados para garantir o retorno seguro.\n\n--- STATS ---\nCrew: 3  |  Length: 46.0m  |  Class: Exploração  |  Role: Expedição\nInsurance: 8.67 min base  |  2.17 min express
vehicle_DescVNCL_Mauler=Fabricante: Clãs Vanduul\nFoco: Destróier\n\nO Mauler é uma enorme nave de escolta essencial para a frota Vanduul. Este verdadeiro tanque espacial dá aos seus pilotos uma sensação de poder, com seu design angular em múltiplos níveis, vasto arsenal de armas e pontas afiadas nas laterais para aerodinâmica e intimidação.\n\n--- STATS ---\nSCM: 140 m/s  |  Max: 850 m/s\nBoost: +270 m/s  /  -150 m/s\nCrew: 19  |  Length: 425.0m  |  Class: Combate  |  Role: Destruidor\nTurrets: 62  10× S6\nShields: 3× S4  |  Coolers: 2× S4  |  Power: S4  |  QD: S4\nArmor HP: 72,930\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 528  |  E 378  |  D 0  |  T 0\nInsurance: 33.33 min base  |  3.33 min express
vehicle_DescVNCL_Scythe=Fabricante: Esperia\nFoco: Caça Médio\n\nA Foice rapidamente se tornou o símbolo da raça Vanduul e é o soldado de infantaria em todos os ataques e o alvo de todo piloto de caça humano. O Scythe tem uma elevada carga útil de armas, mas o seu verdadeiro trunfo é a sua manobrabilidade, que reside nos seus dois motores principais e nos doze motores de manobra.\n\n--- STATS ---\nSCM: 222 m/s  |  Max: 1,150 m/s\nBoost: +480 m/s  /  -230 m/s\nCrew: 1  |  Length: 33.0m  |  Class: Combate  |  Role: Caça\nMédio\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 6,600\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 22  |  E 14  |  D 0  |  T 0\nInsurance: 5.91 min base  |  1.97 min express
vehicle_DescXIAN_Nox=Fabricante: Aopoa\nFoco: Corrida\n\nO 2947 Nox está derrapando. Este rápido e ágil piloto de canopy aberto de Aopoa é capaz de correr através de superfícies planetárias ou através do espaço. Disponível pela primeira vez no espaço humano, o Nox foi redesenhado especificamente para pilotos humanos e está pronto para competir.\n\n--- STATS ---\nSCM: 225 m/s  |  Max: 619 m/s\nBoost: +305 m/s  /  -145 m/s\nCrew: 1  |  Length: 1.4m  |  Class: Competição  |  Role: Corrida\nCoolers: S0  |  Power: S0\nArmor HP: 1,560\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.10 min base  |  0.00 min express
vehicle_DescXIAN_Nox_Kue=Fabricante: Aopoa\nFoco: Corrida\n\nDerivado da palavra Xi’an para ‘impulso’, o Nox Kue entrega isso e muito mais. Esta versão limitada do modelo de cockpit aberto apresenta um acabamento deslumbrante em prata escovada e foi criada especificamente para celebrar a venda inaugural do primeiro NOX para pilotos humanos.\n\n--- STATS ---\nCrew: 1  |  Length: 1.4m  |  Class: Competição  |  Role: Corrida\nCoolers: S0  |  Power: S0\nArmor HP: 1,560\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.10 min base  |  0.00 min express
vehicle_DescXIAN_Scout=Fabricante: Aopoa\nFoco: Nave de Combate Leve\n\nXi'an Aopoa Corporation produz um modelo de exportação do Qhire Khartu, o Khartu-al, que é vendido a civis humanos como um batedor/explorador dedicado. O modelo de exportação possui o mesmo equipamento de manobra de Xi'an, mas superfícies de controle modificadas para uso humano e armamento mais limitado.\n\n--- STATS ---\nSCM: 224 m/s  |  Max: 1,183 m/s\nBoost: +504 m/s  /  -254 m/s\nCrew: 1  |  Length: 32.0m  |  Class: Combate  |  Role: Caça\nLeve\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,400\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 10  |  E 9  |  D 0  |  T 0\nInsurance: 5.06 min base  |  1.69 min express
vehicle_DescXNAA_SantokYai=Fabricante: Aopoa \nFoco: Fighter Medium \n\nharnessing O poder dos sistemas de vôo Xi'an da próxima geração, propulsores de vetor duplo atualizados e um pacote assustador de armas, a AOPOA criou um lutador que retém a dexteridade de Nimble e a manipulação apertada do The Tight the thea marca é conhecida.\n\n--- STATS ---\nSCM: 227 m/s  |  Max: 1,161 m/s\nBoost: +493 m/s  /  -225 m/s\nCrew: 1  |  Length: 24.0m  |  Class: Combate  |  Role: Caça\nMédio\nInsurance: 7.50 min base  |  2.50 min express
vehicle_Descprobe_comms_1_a=Fabricante: Chimera Communications \nFoco: Reconhecimento\n\nO Auris do fabricante Chimera Communications permite a fácil captura e armazenamento de transmissões, tornando-o ideal para monitorar atividades próximas. Projetado para ser praticamente invisível durante a operação, este monitor de aquisição passiva de dados (PDC) de baixo consumo de energia é perfeito para fornecer segurança adicional a qualquer estação ou instalação com registro detalhado de transmissões de dados e registros de tráfego de embarcações locais. Além disso, o transmissor de rajada de backup incluído permite que os conjuntos de dados sejam transferidos em caso de emergência, garantindo assim segurança adicional.\n\n--- STATS ---\nCrew: 1  |  Length: 18.0m  |  Class: Transportador  |  Role: Cargueiro\nLeve\nShields: S1  |  Coolers: S1  |  Power: S3\nInsurance: 33.33 min base  |  3.33 min express
vehicle_descANVL_Paladin=Fabricante: Anvil Aerospace\nFoco: Gunship\n\nProjetado pela Anvil Aerospace, o Paladin é um combate intimidador na linha de frente que causa um impacto ousado sempre que chega à batalha. Seja executando uma operação perigosa ou liderando o ataque contra adversidades esmagadoras, com seu poderoso conjunto de armas e artilharia com torreta, o Paladin está pronto para ir ao resgate.\n\n--- STATS ---\nSCM: 175 m/s  |  Max: 950 m/s\nBoost: +340 m/s  /  -200 m/s\nCrew: 4  |  Length: 0.0m  |  Class: Armeiro  |  Role: Armeiro\nInsurance: 24.00 min base  |  6.00 min express
vehicle_descMISC_Starlancer_MAX=Fabricante: MISC\nFoco: Carga Média\n\nPara aqueles que desejam expandir suas operações de transporte, os engenheiros da MISC aprimoraram o Starlancer MAX com um compartimento extra espaçoso pronto para transportar cargas e veículos. Combinado com acomodações confortáveis para viagens longas e um pacote defensivo completo para quando você sair do caminho comum, fica fácil entender por que o Starlancer MAX é a nave de carga preferida de pilotos trabalhadores por todo o 'verso.\n\n--- STATS ---\nCrew: 1  |  Length: 90.0m  |  Class: Transportador  |  Role: Cargueiro\nMédio\nTurrets: 2\nShields: S3  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 12,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 315  |  E 360  |  D 0  |  T 0\nInsurance: 12.33 min base  |  3.08 min express
vehicle_descMISC_Starlancer_TAC=Fabricante: MISC\nFoco: Nave de Combate\n\nPara aqueles que procuram uma nave versátil capaz de se sustentar em combate, os engenheiros aprimoraram o Starlancer TAC com um pacote ofensivo agressivo pronto para enfrentar os inimigos mais ferozes. Ao assumir trabalhos de alto risco e alta recompensa, o Starlancer TAC garante que você e sua tripulação consigam ir até o fim.\n\n--- STATS ---\nSCM: 150 m/s  |  Max: 960 m/s\nBoost: +315 m/s  /  -155 m/s\nCrew: 1  |  Length: 90.0m  |  Class: Combate  |  Role: Armeiro\nTurrets: 9\nShields: 2× S3  |  Coolers: S3  |  Power: S3  |  QD: S2\nArmor HP: 18,150\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 347  |  E 396  |  D 0  |  T 0\nInsurance: 13.33 min base  |  3.33 min express
vehicles_DescOrbital_Sentry=O Supervisor Broad & Raibee permite a vigilância de atividades defensivas em uma área específica. Quando uma ameaça é detectada, o Supervisor é capaz de atacar e atacar inimigos não autorizados com eficiência brutal. Isto o torna perfeito para garantir segurança adicional para qualquer estação, instalação ou área controlada.\n\n--- STATS ---\nCrew: 1  |  Length: 18.0m  |  Class: Combate  |  Role: Torreta\nTurrets: 1\nShields: S2  |  Coolers: S3  |  Power: S3\nInsurance: 33.33 min base  |  3.33 min express
