vehicle_DescMISC_Freelancer=Fabricante: MISC\nFoco: Carga Leve\n\nAs Freelancers são usadas como naves mercantes de longa distância por grandes corporações, mas também são frequentemente adaptadas como naves de exploração por capitães independentes que desejam operar nas fronteiras da galáxia.\n\n--- STATS ---\nSCM: 197 m/s  |  Max: 1,050 m/s\nBoost: +400 m/s  /  -205 m/s\nCrew: 1  |  Length: 38.0m  |  Class: Transportador  |  Role: Cargueiro\nLeve\nTurrets: 1  |  MRacks: 2× S3  2× S4\nShields: 3× S2  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 10,560\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 41  |  E 43  |  D 0  |  T 0\nInsurance: 12.99 min base  |  4.33 min express
vehicle_DescMISC_Freelancer_DUR=Fabricante: MISC\nFoco: Expedição \n\nA variante Freelancer DUR é especializada em exploração. Renunciar a 25% da capacidade de carga padrão do Freelancer por um jump drive melhorado, um scanner mais avançado e um tanque de combustível expandido pode ser uma má decisão para alguns, mas para aqueles que valorizam a descoberta em vez do lucro, é a Nave preferido.\n\n--- STATS ---\nSCM: 200 m/s  |  Max: 1,100 m/s\nBoost: +403 m/s  /  -205 m/s\nCrew: 1  |  Length: 38.0m  |  Class: Exploração  |  Role: Expedição\nTurrets: 1  |  MRacks: 2× S3  2× S4\nShields: 3× S2  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 10,560\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 41  |  E 43  |  D 0  |  T 0\nInsurance: 12.99 min base  |  4.33 min express
vehicle_DescMISC_Freelancer_MAX=Fabricante: MISC\nFoco: Carga de tamanho médio\n\nVariante Freelancer com capacidade de carga adicional em detrimento de armas. A variante Freelancer MAX sacrifica o armamento para aumentar a capacidade de carga, tornando-o ideal para o transporte de equipamentos ou matérias-primas.\n\n--- STATS ---\nSCM: 195 m/s  |  Max: 1,025 m/s\nBoost: +395 m/s  /  -205 m/s\nCrew: 1  |  Length: 38.0m  |  Class: Transportador  |  Role: Cargueiro\nMédio\nTurrets: 1  |  MRacks: 2× S3  2× S4\nShields: 3× S2  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 10,560\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 41  |  E 43  |  D 0  |  T 0\nInsurance: 16.46 min base  |  5.49 min express
vehicle_DescMISC_Freelancer_MIS=Fabricante: MISC\nFoco: Gunship\n\nO Freelancer MIS é uma variante limitada e militarizada do clássico Nave mercante desenvolvido pela UEE. Devido a alguns incidentes iniciais com a carga útil, estes foram produzidos apenas em números muito pequenos. Esta versão sacrificou grande parte da capacidade de carga para dar espaço aos foguetes.\n\n--- STATS ---\nSCM: 204 m/s  |  Max: 1,000 m/s\nBoost: +410 m/s  /  -205 m/s\nCrew: 1  |  Length: 38.0m  |  Class: Combate  |  Role: Armeiro\nTurrets: 1  |  MRacks: 4× S4  S5\nShields: 3× S2  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 15,840\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 41  |  E 43  |  D 0  |  T 0\nInsurance: 15.59 min base  |  5.20 min express
vehicle_DescMISC_Hull_A=Fabricante: MISC\nFoco: Carga Leve\n\nA menor e mais acessível da linha Hull. A Hull A é ideal para quem está começando sozinho na galáxia. É semelhante à Aurora e à Mustang, mas não possui a versatilidade “faz-tudo”. Enquanto as outras equilibram capacidade de carga com poder de fogo ou velocidade, a Hull A é 100% focada em transporte.\n\n--- STATS ---\nSCM: 185 m/s  |  Max: 1,050 m/s\nBoost: +385 m/s  /  -195 m/s\nCrew: 1  |  Length: 30.0m  |  Class: Transportador  |  Role: Cargueiro\nLeve\nShields: S2  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 4,840\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 18  |  E 19  |  D 0  |  T 0\nInsurance: 5.95 min base  |  1.98 min express
vehicle_DescMISC_Hull_C=Fabricante: Misc \nFoco: Frete pesada \n\ntambém Chamada de nave mais comum na galáxia, o casco C é o mais produzido da faixa e é considerado por muitos como o mais versátil.Destinado a atingir o 'ponto ideal' entre os transportes menores de pessoa única e os enormes superfreighters que compõem o restante do alcance, o Hull C oferece a modularidade expansiva dos naves maiores, mantendo um modicum da manobrabilidade permitida o baixoFim do intervalo.\n\n--- STATS ---\nSCM: 110 m/s  |  Max: 890 m/s\nBoost: +290 m/s  /  -100 m/s\nCrew: 1  |  Length: 91.2m  |  Class: Transportador  |  Role: Cargueiro\nPesado\nShields: 3× S3  |  Power: S3\nArmor HP: 12,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 315  |  E 360  |  D 0  |  T 0\nInsurance: 45.00 min base  |  15.00 min express
vehicle_DescMISC_Prospector=Fabricante: MISC\nFoco: Mineração Leve\n\nPor anos, a Prospector tem sido a nave de mineração preferida por operadores solo. Com o design elegante característico da MISC e uma série de ferramentas de mineração avançadas, a Prospector 2947 equilibra perfeitamente forma e função.\n\n--- STATS ---\nSCM: 156 m/s  |  Max: 994 m/s\nBoost: +371 m/s  /  -160 m/s\nCrew: 1  |  Length: 26.5m  |  Class: Industrial  |  Role: Mineração\nLeve\nShields: 3× S1  |  Coolers: S2  |  Power: S2  |  QD: S1\nArmor HP: 8,228\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 18  |  E 19  |  D 0  |  T 0\nInsurance: 9.00 min base  |  3.00 min express
vehicle_DescMISC_Prospector_Collector_Indust=Fabricante: MISC\nFoco: Mineração Leve\n\nPor anos, a Prospector tem sido a nave de mineração preferida por operadores solo. Com o design elegante característico da MISC e uma série de ferramentas de mineração avançadas, a Prospector 2947 equilibra perfeitamente forma e função.\n\nWikelo aqui. Fez modificações úteis para tornar a nave ainda mais industrial. Você vai gostar.\n\n--- STATS ---\nCrew: 1  |  Length: 26.5m  |  Class: Industrial  |  Role: Mineração\nLeve\nShields: 3× S1  |  Coolers: S2  |  Power: S2  |  QD: S1\nArmor HP: 8,228\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 18  |  E 19  |  D 0  |  T 0\nInsurance: 9.00 min base  |  3.00 min express
vehicle_DescMISC_Razor=Fabricante: Mirai \nFoco: Corrida\n\nEste piloto avançado apresenta uma estrutura aeroespacial composta avançada que coloca a velocidade pura acima de tudo... é a Nave para pilotos que querem deixar a competição comendo poeira.\n\n--- STATS ---\nSCM: 265 m/s  |  Max: 1,450 m/s\nBoost: +595 m/s  /  -290 m/s\nCrew: 1  |  Length: 12.5m  |  Class: Competição  |  Role: Corrida\nInsurance: 6.08 min base  |  2.02 min express
vehicle_DescMISC_Razor_EX=Fabricante: Mirai\nFoco: Stealth\n\nEquipado com materiais de redução de assinatura, o Razor EX foi feito sob medida para a UEE Advocacy para uso em operações de vigilância e extração. Embora o EX tenha sido rejeitado para uso geral, uma variante do modelo foi lançada para o público que desejava manter um perfil discreto.\n\n--- STATS ---\nSCM: 265 m/s  |  Max: 1,450 m/s\nBoost: +595 m/s  /  -290 m/s\nCrew: 1  |  Length: 12.5m  |  Class: Combate  |  Role: Caça\nFurtivo\nShields: S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nInsurance: 5.91 min base  |  1.97 min express
vehicle_DescMISC_Razor_LX=Fabricante: Mirai\nFoco: Corrida\n\nA Razor ficou ainda mais potente. A versão LX possui um motor com overclock que libera velocidades máximas impressionantes. Esse poder vem com um custo: menor manobrabilidade e armamento reduzido, tornando-a ideal para corridas em linha reta. Mas quem precisa de armas quando você deixa a concorrência comendo poeira?\n\n--- STATS ---\nSCM: 275 m/s  |  Max: 1,525 m/s\nBoost: +490 m/s  /  -290 m/s\nCrew: 1  |  Length: 12.5m  |  Class: Competição  |  Role: Corrida\nInsurance: 6.08 min base  |  2.02 min express
vehicle_DescMISC_Reliant=Fabricante: MISC\nFoco: Inicial / Carga Leve\n\nCom a Reliant Kore, a MISC adiciona à sua já impressionante linha de naves uma espaçonave menor de nível introdutório. Utilizando designs avançados Xi’An, a Reliant apresenta asas largas e elegantes, propulsores omnidirecionais e um cockpit articulado de dois assentos que suporta modos de voo horizontal e vertical. Tudo isso, combinado com maior capacidade de carga que muitas naves da sua classe, faz da Kore uma escolha natural para transporte de curta distância — ou, com alguns componentes opcionais, uma nave capaz de fazer praticamente qualquer coisa.\n\n--- STATS ---\nCrew: 1  |  Length: 14.8m  |  Class: Transportador  |  Role: Inicial / Cargueiro Leve\nGuns: 2  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,200\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 0.68 min base  |  0.00 min express
vehicle_DescMISC_Reliant_Mako=Fabricante: MISC\nFoco: Reportagem\n\nO Império depende de informações atualizadas, e é por isso que os repórteres devem ser capazes de ir onde as notícias acontecem: onde e quando quiser. É aí que entra o Mako, combinando a flexibilidade e confiabilidade de um MISC Reliant com um pacote de câmera Cernan de última geração para capturar cada momento com a clareza e precisão que fazem as manchetes.\n\n--- STATS ---\nSCM: 220 m/s  |  Max: 1,150 m/s\nBoost: +480 m/s  /  -250 m/s\nCrew: 1  |  Length: 14.8m  |  Class: Suporte  |  Role: Reporte\nGuns: 2  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,200\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 5.36 min base  |  1.79 min express
vehicle_DescMISC_Reliant_Sen=Fabricante: MISC\nFoco: Ciência da Luz\n\nMagalhães, Pierce, Croshaw - nomes que ressoam na história graças ao seu espírito aventureiro, sua natureza curiosa e Sua Nave confiável. O Reliant Sen é uma plataforma científica versátil e móvel equipada com recursos de longo alcance para levá-lo cada vez mais longe, bem como o avançado sistema de sensores Samos. Perfeito para o aspirante a explorador que deseja sussurrar seu nome nos corredores da história.\n\n--- STATS ---\nSCM: 220 m/s  |  Max: 1,150 m/s\nBoost: +480 m/s  /  -250 m/s\nCrew: 1  |  Length: 14.8m  |  Class: Industrial  |  Role: Ciência\nLeve\nGuns: 2  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,200\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 4.82 min base  |  1.61 min express
vehicle_DescMISC_Reliant_Tana=Fabricante: MISC\nFoco: Caça Estelar Leve\n\nÀ medida que a humanidade continua a se expandir por todo o universo, a necessidade de um caça estelar leve e versátil também aumentou. A construção robusta e de fácil manutenção do Reliant Tana é ideal para defender fronteiras e postos avançados, graças ao seu motor personalizado de alto desempenho, escudos mais fortes e suportes de armas adicionais.\n\n--- STATS ---\nSCM: 222 m/s  |  Max: 1,150 m/s\nBoost: +480 m/s  /  -250 m/s\nCrew: 1  |  Length: 14.8m  |  Class: Combate  |  Role: Caça\nLeve\nGuns: 2  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 3,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 9  |  E 10  |  D 0  |  T 0\nInsurance: 4.82 min base  |  1.61 min express
vehicle_DescMISC_Starfarer=Fabricante: MISC\nFoco: reabastecimento pesado\n\nO Starfarer difere dos graneleiros convencionais em um ponto crucial: é uma plataforma de combustível especial. O Starfarer foi projetado não apenas para carregar, armazenar e proteger unidades de estase de propelente, mas também para receber gases do espaço e prepará-los para uso sem pouso. Além desta tarefa, o Starfarer também pode ser utilizado para transportar contêineres convencionais para granéis.\n\n--- STATS ---\nSCM: 106 m/s  |  Max: 845 m/s\nBoost: +295 m/s  /  -106 m/s\nCrew: 1  |  Length: 102.0m  |  Class: Suporte  |  Role: Reabastecimento Pesado\nTurrets: 1\nShields: 3× S3  |  Coolers: 2× S3  |  Power: S3  |  QD: S3\nArmor HP: 12,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 315  |  E 360  |  D 0  |  T 0\nInsurance: 18.00 min base  |  6.00 min express
vehicle_DescMISC_Starfarer_Gemini=Fabricante: MISC\nFoco: Reabastecimento Pesado\n\nAs forças armadas do Império Unido da Terra usam uma variante 'áspera e acidentada' adaptada do Starfarer para suas operações de linha de frente. O G2M Gemini, mais conhecido como Starfarer Gemini ou "Star G", troca alguma capacidade de carga e manobrabilidade por maior blindagem, maior blindagem, motores mais potentes e versões mais poderosas das três torres tripuladas.\n\n--- STATS ---\nSCM: 106 m/s  |  Max: 845 m/s\nBoost: +295 m/s  /  -106 m/s\nCrew: 2  |  Length: 102.0m  |  Class: Suporte  |  Role: Reabastecimento Pesado\nTurrets: 1\nShields: 3× S3  |  Coolers: 2× S3  |  Power: S3  |  QD: S3\nArmor HP: 18,150\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 331  |  E 378  |  D 0  |  T 0\nInsurance: 35.34 min base  |  11.78 min express
vehicle_DescMISC_Starfarer_Teach=Fabricante: MISC\nFoco: Reabastecimento Pesado\n\nO Starfarer difere dos cargueiros tradicionais em um aspecto chave: ele é uma plataforma dedicada ao reabastecimento de combustível. O Starfarer é projetado não apenas para carregar, armazenar e proteger unidades de combustível em estase, mas também para captar gases espaciais e refiná-los para uso sem a necessidade de pousar. E embora seja excelente nisso, o Starfarer também pode ser usado para transportar pods tradicionais de carga em massa.\n\nAtendendo às difíceis condições de trabalho de Nyx, a Loja de Naves Teach equipou esta edição especial com um conjunto personalizado de componentes robustos para que você possa lidar melhor com a tarefa em mãos.\n\n--- STATS ---\nCrew: 1  |  Length: 102.0m  |  Class: Suporte  |  Role: Reabastecimento Pesado\nTurrets: 1\nShields: 3× S3  |  Coolers: 2× S3  |  Power: S3  |  QD: S3\nArmor HP: 12,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 315  |  E 360  |  D 0  |  T 0\nInsurance: 18.00 min base  |  6.00 min express
vehicle_DescMISC_Starlancer_MAX_Collector_Indust=Fabricante: MISC\nFoco: Carga Média\n\nPara aqueles que desejam expandir suas operações de transporte, os engenheiros da MISC aprimoraram a Starlancer MAX com um compartimento ainda mais espaçoso, pronto para transportar cargas e veículos. Combinada com acomodações confortáveis para viagens longas e um pacote defensivo completo para quando você sair do caminho tradicional, fica fácil entender por que a Starlancer MAX é a transportadora preferida de pilotos trabalhadores em todo o ‘verso.\n\n--- STATS ---\nCrew: 1  |  Length: 90.0m  |  Class: Transportador  |  Role: Cargueiro\nMédio\nTurrets: 2\nArmor HP: 12,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 315  |  E 360  |  D 0  |  T 0\nInsurance: 12.33 min base  |  3.08 min express
vehicle_DescMISC_Starlancer_TAC_Collector_Military=Fabricante: MISC\nFoco: Nave de Combate\n\nPara aqueles que procuram uma nave versátil capaz de se manter sozinha em combate, os engenheiros aprimoraram a Starlancer TAC com um pacote ofensivo agressivo pronto para enfrentar os inimigos mais perigosos. Ao encarar trabalhos de alto risco e alta recompensa, a Starlancer TAC garante que você e sua equipe consigam ir até o fim.\n\nWikelo aqui. Fez modificações úteis para tornar a nave muito mais semelhante a um caça. Muito impressionante.\n\n--- STATS ---\nCrew: 1  |  Length: 90.0m  |  Class: Combate  |  Role: Armeiro\nTurrets: 9\nShields: 2× S3  |  Coolers: S3  |  Power: S3  |  QD: S2\nArmor HP: 18,150\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 347  |  E 396  |  D 0  |  T 0\nInsurance: 13.33 min base  |  3.33 min express
vehicle_DescMISC_Starlite=Fabricante: MISC\nFoco: Reabastecimento Leve\n\nSe existe uma constante no universo, é que as naves eventualmente ficarão sem combustível. É aí que entra a Starlite. Equipada com dois tanques de combustível padrão e um design elegante e refinado, a Starlite foi meticulosamente criada pelos engenheiros da MISC para oferecer serviços de reabastecimento a naves necessitadas, onde quer que estejam à deriva.\n\n--- STATS ---\nSCM: 150 m/s  |  Max: 970 m/s\nBoost: +340 m/s  /  -160 m/s\nCrew: 1  |  Length: 32.0m  |  Class: Suporte  |  Role: Reabastecimento Leve\nInsurance: 5.82 min base  |  1.45 min express
vehicle_DescMRAI_Guardian=Fabricante: Mirai\nFoco: Caça Pesado\n\nLevando ao pé da letra o ditado de que a melhor defesa é o ataque, os engenheiros da Mirai aplicaram sua experiência em desempenho e manobrabilidade ao caça de longo alcance Guardian. Voe em círculos ao redor de seus oponentes com o Mirai Guardian enquanto estabelece sua superioridade espacial.\n\n--- STATS ---\nSCM: 213 m/s  |  Max: 1,125 m/s\nBoost: +465 m/s  /  -225 m/s\nCrew: 1  |  Length: 24.3m  |  Class: Combate  |  Role: Caça\nPesado\nInsurance: 11.33 min base  |  2.83 min express
vehicle_DescMRAI_Guardian_Collector_Military=Fabricante: Mirai\nFoco: Caça Pesado\n\nLevando ao pé da letra o ditado de que a melhor defesa é o ataque, os engenheiros da Mirai aplicaram sua experiência em desempenho e manobrabilidade ao caça de longo alcance Guardian. Voe em círculos ao redor de seus oponentes com o Mirai Guardian enquanto estabelece sua superioridade espacial.\n\nWikelo aqui. Fez modificações úteis para tornar a nave muito mais semelhante a um caça. Muito impressionante.\n\n--- STATS ---\nCrew: 1  |  Length: 24.3m  |  Class: Combate  |  Role: Caça\nPesado\nInsurance: 11.33 min base  |  2.83 min express
vehicle_DescMRAI_Guardian_MX=Fabricante: Mirai\nFoco: Caça Pesado\n\nTomando a estrutura do caça Guardian e adicionando ainda mais opções ofensivas, o Mirai Guardian MX tem poder de fogo adicional e armadura ideal para derrotar oponentes. Embora não seja tão ágil quanto o Guardian básico, esse caça pesado ainda é mais ágil do que muitas outras naves de sua classe.\n\n--- STATS ---\nSCM: 208 m/s  |  Max: 1,100 m/s\nBoost: +455 m/s  /  -221 m/s\nCrew: 1  |  Length: 26.0m  |  Class: Combate  |  Role: Caça\nPesado\nInsurance: 8.33 min base  |  2.08 min express
vehicle_DescMRAI_Guardian_MX_Collector_Military=Fabricante: Mirai\nFoco: Caça Pesado\n\nPegando a estrutura do caça Guardian e adicionando ainda mais opções ofensivas, o Mirai Guardian MX oferece mais poder de fogo e armaduras ideais para sobrecarregar os oponentes. Embora não seja tão ágil quanto o Guardian base, este caça pesado ainda é mais ágil do que muitas outras naves em sua classe.\n\nWikelo aqui. Fiz modificações úteis para tornar a nave mais focada em combate. Muito impressionante.\n\n--- STATS ---\nCrew: 1  |  Length: 26.0m  |  Class: Combate  |  Role: Caça\nPesado\nInsurance: 8.33 min base  |  2.08 min express
vehicle_DescMRAI_Pulse=Fabricante: Mirai\nFoco: Combate\nOs engenheiros da Mirai se propuseram a criar uma motocicleta de teto aberto capaz de fazer mais. Uma conexão mais íntima entre o piloto e o desempenho com uma silhueta ajustada à forma. Uma maneira mais intuitiva de domar paisagens formidáveis com um sistema grav-lev responsivo. Uma experiência de combate mais inteligente com uma arma personalizada totalmente integrada ao espírito do veículo. O resultado final? O Mirai Pulse.\n\n--- STATS ---\nSCM: 204 m/s  |  Max: 561 m/s\nBoost: +284 m/s  /  -124 m/s\nCrew: 1  |  Length: 3.5m  |  Class: Combate  |  Role: Desbravador\nCoolers: S0  |  Power: S0\nArmor HP: 1,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 6  |  E 4  |  D 0  |  T 0\nInsurance: 0.15 min base  |  0.05 min express
