vehicel_DescANVL_Valkyrie=Fabricante: Anvil Aerospace\nFoco: Nave de Desembarque\n\nA Valkyrie eleva o nível no transporte de tropas. Projetada para transportar até vinte soldados, além de veículos, para os locais mais hostis, esta nave militar pronta para combate é uma força formidável tanto ofensiva quanto defensivamente. Desenvolvida com militares e contratantes de defesa privada em mente, a Valkyrie é um dos transportes de pessoal mais eficientes e eficazes de sua categoria.\n\n--- STATS ---\nSCM: 207 m/s  |  Max: 1,110 m/s\nBoost: +431 m/s  /  -245 m/s\nCrew: 1  |  Length: 48.0m  |  Class: Combate  |  Role: Dropship\nTurrets: 6\nShields: 2× S2  |  Coolers: 2× S2  |  Power: 2× S2  |  QD: S2\nArmor HP: 23,760\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 139  |  E 88  |  D 0  |  T 0\nInsurance: 19.82 min base  |  4.98 min express
vehicl_DescMISC_Hull_B=Fabricante: MISC\nFoco: Carga Média\n\nA MISC Hull B é uma opção robusta para pilotos que buscam um transporte dedicado de carga. Embora não seja tão grande quanto alguns outros modelos da série Hull, o perfil menor da Hull B oferece maior flexibilidade e mais opções de acesso.\n\n--- STATS ---\nSCM: 145 m/s  |  Max: 960 m/s\nBoost: +340 m/s  /  -180 m/s\nCrew: 2  |  Length: 71.0m  |  Class: Transportador  |  Role: Cargueiro\nMédio\nInsurance: 11.66 min base  |  2.85 min express
vehicle_DescAEGS_Avenger_Stalker=Fabricante: Aegis Dynamics\nFoco: Interceptor\n\nInicialmente projetada como nave de linha de frente da Aegis para o exército, a Avenger Stalker seguiu um caminho diferente, tendo uma longa e marcante carreira como nave de patrulha padrão da UEE Advocacy. Utilizando seu compartimento de carga para transporte de prisioneiros, a Avenger possui um casco resistente e confiável, além da capacidade de suportar motores maiores do que o esperado.\n\n--- STATS ---\nSCM: 262 m/s  |  Max: 1,425 m/s\nBoost: +610 m/s  /  -280 m/s\nCrew: 1  |  Length: 20.0m  |  Class: Combate  |  Role: Interceptador\nGuns: 2× S1 (empty)  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 1,232\nDmg Mult: P 0.80x  |  E 0.65x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 4.86 min base  |  1.62 min express
vehicle_DescAEGS_Avenger_Titan=Fabricante: Aegis Dynamics\nFoco: Carga Leve \n\nSem as celas de prisão do Stalker ou o gerador EMP do Warlock, o porão do Titã está livre para transportar carga. Quando você combina esse espaço disponível com as capacidades de combate comprovadas do Avenger, você obtém um cargueiro leve que pode se sair bem em uma luta.\n\n--- STATS ---\nSCM: 262 m/s  |  Max: 1,425 m/s\nBoost: +610 m/s  /  -280 m/s\nCrew: 1  |  Length: 20.0m  |  Class: Transportador  |  Role: Cargueiro\nLeve\nGuns: 2× S1 (empty)  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,640\nDmg Mult: P 0.80x  |  E 0.65x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 4.05 min base  |  1.35 min express
vehicle_DescAEGS_Avenger_Titan_Renegade=Fabricante: Aegis Dynamics \nFoco: Frete leve \n\nCriado como parte da série 'Masters of Flight' em conjunto com o comandante da arena de voo-sim, o renegado presta homenagem ao famoso piloto Danny Solomon por seu notável trabalho com a defesa de Advocacy to to theTraga justiça a Bremen.Este Avenger Titan vem equipado com um loadout especializado em brigas de cães e uma edição especial personalizada em homenagem a este Nave icônico.\n\n--- STATS ---\nCrew: 1  |  Length: 20.0m  |  Class: Transportador  |  Role: Cargueiro\nLeve\nGuns: 2× S1 (empty)  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,640\nDmg Mult: P 0.80x  |  E 0.65x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 4.05 min base  |  1.35 min express
vehicle_DescAEGS_Avenger_Warlock=Fabricante: Aegis Dynamics\nFoco: Interceptor\n\nO Avenger Warlock foi construído com uma única filosofia de design: parar Naves, não destruí-los. A coisa mais próxima de um caça não letal, o Warlock está equipado com um gerador Behring REP-8 EMP que pode emitir uma poderosa onda eletromagnética que desativa qualquer dispositivo eletrônico que tenha a infelicidade de estar dentro do raio de radiação.\n\n--- STATS ---\nSCM: 262 m/s  |  Max: 1,425 m/s\nBoost: +610 m/s  /  -280 m/s\nCrew: 1  |  Length: 20.0m  |  Class: Combate  |  Role: Interdição\nGuns: 2× S1 (empty)  |  MRacks: 2× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,640\nDmg Mult: P 0.80x  |  E 0.65x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 4.86 min base  |  1.62 min express
vehicle_DescAEGS_Eclipse=Fabricante: Aegis Dynamics\nFoco: Stealth Bomber\n\nO Aegis Eclipse é um bombardeiro projetado para atacar antes mesmo de ser detectado. Após extensas operações com a UEE, este dispositivo militar de alta tecnologia estreou no mercado civil em 2947.\n\n--- STATS ---\nSCM: 210 m/s  |  Max: 1,100 m/s\nBoost: +510 m/s  /  -215 m/s\nCrew: 1  |  Length: 24.5m  |  Class: Combate  |  Role: Bombardeiro\nFurtivo\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,464\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 16.54 min base  |  5.51 min express
vehicle_DescAEGS_Firebird_Collector_Milt=Fabricante: Aegis Dynamics\nFoco: Caça Furtivo\n \nQuando confrontos de linha de frente exigem uma ofensiva rápida e decisiva, a Sabre Firebird é o caça médio ideal para qualquer arsenal. Partindo da já comprovada Sabre Raven, a Aegis projetou a variante Firebird com um lançador de mísseis aprimorado capaz de enfrentar uma ampla variedade de ameaças.\n\n--- STATS ---\nCrew: 1  |  Length: 24.5m  |  Class: Combate  |  Role: Caça\nFurtivo\nMRacks: S3\nArmor HP: 4,752\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 20  |  E 16  |  D 0  |  T 0\nInsurance: 7.56 min base  |  2.52 min express
vehicle_DescAEGS_Gladius=Fabricante: Aegis Dynamics\nFoco: Light Fighter\n\nO Gladius é um design antigo que foi atualizado ao longo dos anos para acompanhar a tecnologia moderna. Nos círculos militares, o Gladius é apreciado pelo seu desempenho e simplicidade. O Gladius é um caça rápido e leve focado no combate corpo a corpo e é um interceptador ou Nave de escolta ideal.\n\n--- STATS ---\nSCM: 226 m/s  |  Max: 1,193 m/s\nBoost: +520 m/s  /  -268 m/s\nCrew: 1  |  Length: 21.0m  |  Class: Combate  |  Role: Caça\nLeve\nMRacks: 4× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 3,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 5.83 min base  |  1.94 min express
vehicle_DescAEGS_Gladius_Dunlevy=Fabricante: Aegis Dynamics\nFoco: Caça leve \n\nHomenageie a famosa capitã que moldou o curso do esquadrão de caças de elite da Marinha da UEE com a variante Dunlevy para o Aegis Gladius. Esta nave especial presta homenagem à capitã Alexandra Dunlevy e ao Esquadrão 42 com detalhes em vermelho sobre uma pintura cinza e componentes de nível militar.\n\n--- STATS ---\nCrew: 1  |  Length: 21.0m  |  Class: Combate  |  Role: Caça\nLeve\nMRacks: 4× S3\nQD: S1\nArmor HP: 3,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 5.83 min base  |  1.94 min express
vehicle_DescAEGS_Gladius_PIR=Aegis Gladius Pirata\n\n--- STATS ---\nCrew: 1  |  Length: 21.0m  |  Class: Combate  |  Role: Caça\nLeve\nMRacks: 4× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 3,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 10.12 min base  |  1.94 min express
vehicle_DescAEGS_Gladius_Valiant=Fabricante: Aegis Dynamics\nFoco: Light Fighter\n\nO Valiant foi desenvolvido como parte da série "Masters of Flight" em conjunto com a simulação de voo Arena Commander e é uma homenagem ao famoso piloto de defesa Condi Hillard, o primeiro humano já derrotou um Vanduul em batalha. Este Gladius está equipado com equipamento especializado de combate aéreo e uma pintura especial que homenageia Sua Nave icônico.\n\n--- STATS ---\nCrew: 1  |  Length: 21.0m  |  Class: Combate  |  Role: Caça\nLeve\nMRacks: 4× S3\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 3,300\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 11  |  E 9  |  D 0  |  T 0\nInsurance: 5.83 min base  |  1.94 min express
vehicle_DescAEGS_Hammerhead=Fabricante: Aegis Dynamics \nFoco: Heavy Gunship\n\nComo um Nave patrulha rápido com múltiplas torres para combater caças, o Hammerhead é igualmente adequado para apoiar Naves capitais maiores em uma frota ou servir como carro-chefe para grupos de caças.\n\n--- STATS ---\nSCM: 160 m/s  |  Max: 1,000 m/s\nBoost: +340 m/s  /  -170 m/s\nCrew: 2  |  Length: 120.0m  |  Class: Combate  |  Role: Artilharia Pesada\nTurrets: 6\nShields: 2× S3  |  Coolers: 2× S3  |  Power: 2× S3  |  QD: S3\nArmor HP: 25,740\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 531  |  E 380  |  D 0  |  T 0\nInsurance: 48.60 min base  |  16.20 min express
vehicle_DescAEGS_Idris_M=Fabricante: Aegis Dynamics\nFoco: Fragata\n\nMaiores que um bombardeiro, mas menores que uma nave de linha, as fragatas ocupam um espaço interessante no panteão das naves de guerra da Marinha. Embora não tenham a armadura pesada e o armamento principal de um cruzador, a Marinha da UEE valoriza suas fragatas, pois elas são manobráveis e podem ser adaptadas para uso em uma ampla gama de cenários de combate.\n\n--- STATS ---\nCrew: 1  |  Length: 243.0m  |  Class: Combate  |  Role: Fragata\nTurrets: 1\nInsurance: 253.00 min base  |  63.25 min express
vehicle_DescAEGS_Idris_P=Fabricante: Aegis Dynamics\nFoco: Fragata\n\nUma variante “pacificadora” Mark Two desenvolvida para os serviços de patrulha da UEE, o Idris-P retira o canhão nave-a-nave padrão e a montagem da coluna vertebral em favor da capacidade de carga adicional e da velocidade superior.\n\n--- STATS ---\nCrew: 1  |  Length: 243.0m  |  Class: Combate  |  Role: Fragata\nArmor HP: 72,930\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 528  |  E 462  |  D 0  |  T 0\nInsurance: 199.00 min base  |  49.75 min express
vehicle_DescAEGS_Idris_P_Collector_Military=Fabricante: Aegis Dynamics\nFoco: Fragata\n\nUma variante mark dois 'pacificador' desenvolvida para os serviços de patrulha da UEE, o Idris-P remove o canhão padrão de combate entre naves e o suporte espinhal em favor de maior capacidade de carga e velocidade superior.\n\nWikelo aqui. Fez modificações úteis para deixar a nave mais resistente em combate. Muito impressionante.\n\n--- STATS ---\nCrew: 1  |  Length: 243.0m  |  Class: Combate  |  Role: Fragata\nArmor HP: 72,930\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 528  |  E 462  |  D 0  |  T 0\nInsurance: 199.00 min base  |  49.75 min express
vehicle_DescAEGS_Javelin=Fabricante: Aegis Dynamics \nFoco: Destroyer \n\nDesenvolvido para os militares da UEE, o Javelin é um Nave enorme, modular e de grande capacidade que pode ser usado para fins corporativos. Com interior detalhado, muitas opções de espaço modular e alta capacidade de tripulação, o Javelin é um Nave que se destacou em diversas funções.\n\n--- STATS ---\nSCM: 50 m/s  |  Max: 900 m/s\nBoost: +290 m/s  /  -230 m/s\nCrew: 1  |  Length: 0.0m  |  Class: Destruidor  |  Role: Destruidor\nTurrets: 28\nShields: 4× S4  |  Coolers: 4× S4  |  Power: 4× S4  |  QD: S4\nArmor HP: 117,810\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 539  |  E 473  |  D 0  |  T 0\nInsurance: 168.75 min base  |  56.25 min express
vehicle_DescAEGS_Reclaimer=Fabricante: Aegis Dynamics\nFoco: Trabalho de sucateamento pesado \n\nO Aegis Reclaimer é uma Nave de sucateamento industrial. Equipado com um compartimento de carga reforçado, um sistema de salto de longo alcance e cápsulas de lançamento para drones não tripulados, o Reclaimer é um Nave ideal para explorar destroços nas profundezas do espaço. Feixes tratores, holofotes, opções de scanner e portas de docagem completam os recursos desta espaçonave capaz e funcional.\n\n--- STATS ---\nSCM: 110 m/s  |  Max: 870 m/s\nBoost: +290 m/s  /  -115 m/s\nCrew: 1  |  Length: 160.0m  |  Class: Industrial  |  Role: Sucateiro\nPesado\nTurrets: 3\nShields: S4  |  Coolers: S4  |  Power: S4  |  QD: S3\nArmor HP: 32,912\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 495  |  E 418  |  D 0  |  T 0\nInsurance: 30.69 min base  |  10.23 min express
vehicle_DescAEGS_Reclaimer_Teach=Fabricante: Aegis Dynamics\nFoco: Sucatamento Pesado\n\nO Aegis Reclaimer é uma nave de sucateamento industrial. Equipado com um compartimento de carga reforçado, um drive de salto de longo alcance e pods de lançamento para drones não tripulados, o Reclaimer é a nave ideal para aproveitar os destroços no espaço profundo. Feixes de tração, luzes de inundação, opções de scanner e portas de acoplamento completam as ferramentas desta espaçonave prática e utilitária.\n\nAtendendo às difíceis condições de trabalho de Nyx, a Loja de Naves Teach equipou esta edição especial com um conjunto personalizado de componentes robustos para que você possa lidar melhor com a tarefa em mãos.\n\n--- STATS ---\nCrew: 1  |  Length: 160.0m  |  Class: Industrial  |  Role: Sucateiro\nPesado\nTurrets: 3\nShields: S4  |  Coolers: S4  |  Power: S4  |  QD: S3\nArmor HP: 32,912\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 495  |  E 418  |  D 0  |  T 0\nInsurance: 30.69 min base  |  10.23 min express
vehicle_DescAEGS_Redeemer=Fabricante: Aegis Dynamics\nFoco: Gunship \n\nO Redeemer foi desenvolvido pela Aegis Dynamics e é um poderoso Nave de combate que pode se sair bem em combate com uma grande carga de armas. O Redeemer está equipado com torres e mísseis e também serve como Nave blindado de desembarque que pode transportar soldados para a linha de frente.\n\n--- STATS ---\nSCM: 203 m/s  |  Max: 1,050 m/s\nBoost: +400 m/s  /  -215 m/s\nCrew: 4  |  Length: 51.0m  |  Class: Combate  |  Role: Armeiro\nGuns: 2  |  Turrets: 7  |  MRacks: 2× S4\nShields: 6× S2  |  Coolers: S3  |  Power: 2× S3  |  QD: S2\nArmor HP: 21,120\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 116  |  E 110  |  D 0  |  T 0\nInsurance: 28.35 min base  |  9.45 min express
