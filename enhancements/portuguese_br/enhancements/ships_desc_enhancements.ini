vehicle_DescANVL_Hornet_F7CS_Mk2=Fabricante: Anvil Aerospace\nFoco: Stealth Fighter\n\nAo abordar o redesenho do Mk II do F7C-S Hornet Ghost, os engenheiros da Anvil Aerospace queriam preservar o que os pilotos adoravam nos motores de baixa emissão, nas armas de baixo consumo e na tecnologia Void Armor do original, mas refiná-los a um nível ainda mais alto de desempenho para uma nova era de operações furtivas.\n\n--- STATS ---\nSCM: 220 m/s  |  Max: 1,150 m/s\nBoost: +480 m/s  /  -250 m/s\nCrew: 1  |  Length: 22.5m  |  Class: Combate  |  Role: Caça\nFurtivo\nShields: 2× S1  |  Coolers: 2× S1  |  QD: S1\nInsurance: 9.50 min base  |  2.38 min express
