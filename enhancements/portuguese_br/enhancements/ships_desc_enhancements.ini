vehicle_DescAEGS_Sabre_Raven=Fabricante: Aegis Dynamics \nFoco: Interdição \n\nA Aegis Dynamics mais uma vez elevou a fasquia com a variante Raven. Ela tem a velocidade e a capacidade de manobra de seu antecessor Sabre, mas possui uma assinatura de Nave menor, o que a torna uma infiltradora rápida e furtiva.\n\n--- STATS ---\nSCM: 240 m/s  |  Max: 1,400 m/s\nBoost: +600 m/s  /  -260 m/s\nCrew: 1  |  Length: 24.5m  |  Class: Combate  |  Role: Interdição\nMRacks: 2\nShields: 2× S1  |  Coolers: 2× S1  |  Power: 2× S1  |  QD: S1\nArmor HP: 2,218\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 20  |  E 16  |  D 0  |  T 0\nInsurance: 7.56 min base  |  2.52 min express
vehicle_DescAEGS_Tiburon=Fabricante: Aegis Dynamics\nFoco: Gunship Pesada\n\nUma evolução de um design comprovado da Aegis, a configuração antinavio capital da Tiburon consiste em uma arma de feixe montada na espinha dorsal e voltada para frente, complementada por torretas montadas nas laterais.\n\n--- STATS ---\nSCM: 150 m/s  |  Max: 975 m/s\nBoost: +330 m/s  /  -160 m/s\nCrew: 7  |  Length: 121.0m  |  Class: Combate  |  Role: Artilharia Pesada\nTurrets: 1\nCoolers: 2× S3  |  Power: 2× S3\nInsurance: 48.60 min base  |  16.20 min express
