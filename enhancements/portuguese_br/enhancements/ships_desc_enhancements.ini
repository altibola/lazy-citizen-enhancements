vehicle_DescRSI_Perseus=Fabricante: RSI\nFoco: Canhoneira Pesada\n\nQuando a RSI decidiu criar a definição moderna de poder dissuasivo, olhou para seu próprio passado, para as históricas canhoneiras Perseus. Capaz de despedaçar gigantes da classe subcapital, a simples presença de uma Perseus em um bloqueio ou patrulha é suficiente para fazer até os inimigos mais agressivos pensarem duas vezes antes de atacar.\n\n--- STATS ---\nSCM: 150 m/s  |  Max: 1,050 m/s\nBoost: +350 m/s  /  -160 m/s\nCrew: 6  |  Length: 100.0m  |  Class: Combate  |  Role: Artilharia Pesada\nInsurance: 38.00 min base  |  9.50 min express
vehicle_DescRSI_Polaris=Fabricante: Roberts Space Industries\nFoco: Corvette\n\nA Polaris é uma Nave capital manobrável da classe corveta que possui um poder poderoso com um conjunto completo de torres e torpedos. Pretendido ser tanto um Nave de patrulha naval quanto um carro-chefe para operações de milícias, o Polaris pode conduzir operações de busca e sucateamento, missões de ataque leve e patrulhas de segurança geral. O Polaris tem a capacidade de reparar, atualizar e reabastecer um único caça, bombardeiro leve ou Nave de apoio.\n\n--- STATS ---\nSCM: 145 m/s  |  Max: 940 m/s\nBoost: +250 m/s  /  -155 m/s\nCrew: 12  |  Length: 181.0m  |  Class: Combate  |  Role: Corvette\nTurrets: 22\nShields: S4  |  Coolers: S4  |  Power: S4  |  QD: S3\nArmor HP: 48,960\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 495  |  E 418  |  D 0  |  T 0\nInsurance: 75.83 min base  |  18.96 min express
vehicle_DescRSI_Salvation=Fabricante: Roberts Space Industries\nFoco: Sucatamento\n\nPor séculos, a Roberts Space Industries se orgulhou de criar naves que não apenas atendem às necessidades dos pilotos, mas superam as expectativas. Embora a RSI Salvation possa parecer uma simples nave de sucateamento à primeira vista, cada detalhe, desde o braço de sucateamento, a planta de processamento a bordo, até o conveniente armazenamento externo, foi refinado e otimizado para fazer até mesmo um amador se sentir como um expert.\n\n--- STATS ---\nSCM: 205 m/s  |  Max: 1,150 m/s\nBoost: +290 m/s  /  -230 m/s\nCrew: 1  |  Length: 8.5m  |  Class: Industrial  |  Role: Inicial / Sucateamento Leve\nInsurance: 6.00 min base  |  1.50 min express
