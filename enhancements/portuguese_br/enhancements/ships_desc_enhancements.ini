vehicle_DescARGO_MPUV_Transport=Fabricante: Argo Astronautics\nFoco: Passageiros\n\nA Argo MPUV-1P (conhecida como ‘Argo Personnel’) é voltada para uma função simples, porém essencial: transportar pessoas de um lugar para outro. Amplamente utilizada pela Marinha da UEE, muitos recrutas lembram do momento em que foram levados para sua primeira missão espacial. No uso civil, é adaptada para serviços de táxi ou até como nave improvisada de assalto. Pode transportar até oito pessoas com seus equipamentos.\n\n--- STATS ---\nSCM: 170 m/s  |  Max: 890 m/s\nBoost: +360 m/s  /  -140 m/s\nCrew: 1  |  Length: 10.5m  |  Class: Transportador  |  Role: Passageiros\nShields: S1  |  Coolers: 2× S0  |  Power: S0\nArmor HP: 1,100\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 5  |  E 4  |  D 0  |  T 0\nInsurance: 0.68 min base  |  0.23 min express
vehicle_DescARGO_Mole=Fabricante: Argo Astronautics\nFoco: Mineração Média\n\nO icônico extrator a laser multioperador da Argo, conhecido como MOLE, permite trabalhar com mais rapidez e eficiência graças ao seu sistema de mineração trilateral patenteado. Três estações independentes garantem máxima potência e versatilidade. O MOLE segue o lema: “muitas mãos fazem o trabalho leve”.\n\n--- STATS ---\nSCM: 140 m/s  |  Max: 960 m/s\nBoost: +340 m/s  /  -150 m/s\nCrew: 5  |  Length: 45.0m  |  Class: Industrial  |  Role: Mineração\nintermediária\nShields: S3  |  Coolers: S3  |  Power: S3  |  QD: S2\nArmor HP: 11,220\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 45  |  E 40  |  D 0  |  T 0\nInsurance: 13.50 min base  |  4.50 min express
vehicle_DescARGO_Mole_Teach=Fabricante: Argo Astronautics\nFoco: Mineração Média\n\nO icônico extrator a laser multioperador da Argo, conhecido como MOLE, permite trabalhar com mais rapidez e eficiência graças ao seu sistema de mineração trilateral patenteado. Três estações independentes garantem máxima potência e versatilidade. O MOLE segue o lema: “muitas mãos fazem o trabalho leve”.\n\nPensando nas condições difíceis de Nyx, a Teach's Ship Shop equipou esta edição especial com componentes reforçados para melhorar seu desempenho.\n\n--- STATS ---\nCrew: 5  |  Length: 45.0m  |  Class: Industrial  |  Role: Mineração\nintermediária\nShields: S3  |  Coolers: S3  |  Power: S3  |  QD: S2\nArmor HP: 11,220\nDmg Mult: P 0.70x  |  E 0.50x  |  D 1.00x  |  T 1.00x\nDeflect: P 45  |  E 40  |  D 0  |  T 0\nInsurance: 13.50 min base  |  4.50 min express
vehicle_DescARGO_RAFT=Fabricante: Argo Astronautics\nFoco: Carga Média\n\nA Argo RAFT possui um compartimento de carga de 192 SCU e é capaz de transportar contêineres padronizados de 32 SCU. Ideal tanto para iniciantes quanto veteranos, é uma solução confiável para transporte local.\n\n--- STATS ---\nSCM: 140 m/s  |  Max: 990 m/s\nBoost: +340 m/s  /  -150 m/s\nCrew: 2  |  Length: 39.5m  |  Class: Transportador  |  Role: Cargueiro\nMédio\nInsurance: 14.00 min base  |  2.00 min express
