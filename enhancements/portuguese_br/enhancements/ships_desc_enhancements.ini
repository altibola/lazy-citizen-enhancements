vehicle_DescCNOU_Mustang_Beta=Fabricante: Consolidated Outland \nFoco: Pathfinder\n\nCom seu alcance sem precedentes, o Mustang Beta é perfeito para voos de longa distância. Com o motor de salto Tarsus Leaper padrão, o Beta pode viajar para os sistemas mais distantes da galáxia com facilidade, enquanto os alojamentos Com4T exclusivos da Nave garantem que a viagem pareça como se você nunca tivesse saído de casa.\n\n--- STATS ---\nSCM: 228 m/s  |  Max: 1,218 m/s\nBoost: +500 m/s  /  -260 m/s\nCrew: 1  |  Length: 21.5m  |  Class: Exploração  |  Role: Desbravador\nShields: 2× S1  |  Coolers: 2× S1  |  Power: S1  |  QD: S1\nArmor HP: 2,000\nDmg Mult: P 0.75x  |  E 0.60x  |  D 1.00x  |  T 1.00x\nDeflect: P 10  |  E 9  |  D 0  |  T 0\nInsurance: 3.71 min base  |  1.24 min express
