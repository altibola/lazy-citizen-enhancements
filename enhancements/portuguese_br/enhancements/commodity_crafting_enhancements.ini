items_commodities_beradom=Beradom <EM4>[CF|Collection]</EM4>
items_commodities_beradom_desc=Formada quando a seiva do abeto Beraber é cristalizada durante incêndios florestais, essa “pedra preciosa” azul profunda e transparente é geralmente polida e usada em joias. Embora possa ser fabricada pelo cultivo de árvores e, em seguida, por meio de uma queima controlada, o investimento de tempo para que as árvores atinjam a maturidade adequada ainda faz com que essa seja uma mercadoria rara.\n\n<EM3>BLUEPRINT DATA</EM3>\n- Karna Rifle\n- vehiclegear/shield: 27 items
