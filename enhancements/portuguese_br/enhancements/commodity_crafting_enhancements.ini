items_commodities_feynmaline=Feynmaline <EM4>[CF|Collection]</EM4>
items_commodities_feynmaline_desc=A estrutura cristalina paramórfica desse mineral é extremamente volátil. Quando uma energia extra é introduzida, como é típico na mineração moderna, o minério geralmente se degrada de forma explosiva na estrutura mais estável da janalita. Essa instabilidade torna a aquisição do Feynamline muito perigosa, mas também extremamente valiosa como precursor industrial de antimatéria, se puder ser colhido adequadamente.\n\n<EM3>BLUEPRINT DATA</EM3>\n- vehiclegear/shield: 9 items
