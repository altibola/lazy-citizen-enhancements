items_commodities_carinite_pure_desc=As fontes típicas de carinite apresentam várias impurezas. No entanto, em certas condições extremamente raras, veios de carinite com mais de 90% de pureza podem se formar. Hardware de computação que exige precisão exata geralmente busca por carinite puro.\n\n<EM3>BLUEPRINT DATA</EM3>\n- Parallax Energy Assault Rifle\n- Quartz Energy SMG
