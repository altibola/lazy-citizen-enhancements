items_commodities_goldenmedmon_desc=NDR: 39\nHEI: 19\nEfeitos: Energizante, Hidratante\n\nCultivados em climas temperados na Maru Ebony Tree, os Golden Medmons são deixados para cair da árvore quando maduros e coletados. A fruta nesse estágio é extremamente firme e adstringente. Eles só se tornam comestíveis após serem "bletted" ou amolecidos por meio do amadurecimento do etileno.\n\n<EM3>BLUEPRINT DATA</EM3>\n- Electron Ammo\n- Fresnel Energy LMG\n- Pulse Laser Pistol, Pulse Pistol\n- Parallax Energy Assault Rifle\n- Prism Laser Shotgun\n- Quartz Energy SMG\n- Zenith Laser Sniper Rifle\n- vehiclegear/radar: 11 items\n- vehiclegear/shield: 11 items\n- NDB-26 Repeater, NDB-28 Repeater, NDB-30 Repeater\n- Cannons (4 types)\n- Scatters (4 types)
