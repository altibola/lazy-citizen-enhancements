items_commodities_aslarite_desc=Aslarite é um mineral de ocorrência natural encontrado mais comumente em asteroides. Procurado por suas propriedades naturais de isolamento térmico, pode ser processado e utilizado na construção de armaduras pessoais para ajudar o usuário a suportar temperaturas extremas.\n\n<EM3>BLUEPRINT DATA</EM3>\n- 8 sets (Heavy Combat)\n- 5 sets (Light Combat)\n- 9 sets (Medium Combat)\n- Horizon, MacFlex, Venture (Light Cosmonaut)\n- Corbel, Palatino (Heavy Engineer)\n- 4 sets (Light Engineer)\n- 5 sets (Heavy Environment)\n- Dust Devil, Manticore (Heavy Explorer)\n- Badami, Microid Battle, Piecemeal Armor (Light Explorer)\n- Antium, Morozov-CH, Morozov-SH (Heavy Hunter)\n- Arden-CL, Arden-SL (Light Hunter)\n- Inquisitor, Morningstar (Medium Hunter)\n- Chiron (Medic Armour)\n- Strata (Medium Miner)\n- Stirling Exploration (Heavy Radiation)\n- Aril (Medium Salvager)\n- 5 sets (Light Stealth)\n- Artimex (Medium Stealth)
