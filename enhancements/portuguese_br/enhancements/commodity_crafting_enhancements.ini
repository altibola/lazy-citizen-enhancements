items_commodities_carinite_desc=Mineral raro porque a pressão extrema necessária para sua formação é muito incomum, ele é muito procurado graças ao seu uso em processadores de computador avançados e outros componentes eletrônicos de ponta.\n\n<EM3>BLUEPRINT DATA</EM3>\n- Parallax Energy Assault Rifle\n- Quartz Energy SMG
