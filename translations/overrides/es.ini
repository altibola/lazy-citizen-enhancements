; translations/overrides/es.ini — traducciones personalizadas por clave (opcional).
;
; Cada línea sustituye POR COMPLETO el texto generado para esa clave en los
; archivos *_enhancements.ini, con prioridad sobre el glosario.
;
; Formato (igual que global.ini — \n literal para saltos de línea):
;   Clave_De_La_Mejora=Texto completo personalizado\ncon saltos\nde línea
;
; Las claves disponibles están en enhancements/spanish/enhancements/*.ini.
