; translations/overrides/pt_br.ini — traduções customizadas por chave (opcional).
;
; Cada linha aqui substitui POR COMPLETO o texto gerado para aquela chave nos
; arquivos *_enhancements.ini, vencendo o glossário. Use quando a tradução
; automática por glossário não ficar boa para um texto específico.
;
; Formato (igual ao global.ini — \n literal para quebras de linha):
;   Chave_Do_Enhancement=Texto completo customizado\ncom quebras\nde linha
;
; Exemplo:
;   TheCollector_ShipMod_MISC_Fortune_VehicleDesc=Fabricante: MISC\n...texto completo customizado...
;
; As chaves disponíveis estão em enhancements/<idioma>/enhancements/*.ini.
