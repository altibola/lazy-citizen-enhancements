; translations/overrides/fr.ini — traductions personnalisées par clé (optionnel).
;
; Chaque ligne remplace ENTIÈREMENT le texte généré pour cette clé dans les
; fichiers *_enhancements.ini, prioritaire sur le glossaire.
;
; Format (comme global.ini — \n littéral pour les sauts de ligne) :
;   Cle_De_Lamélioration=Texte complet personnalisé\navec sauts\nde ligne
;
; Les clés disponibles sont dans enhancements/french/enhancements/*.ini.
